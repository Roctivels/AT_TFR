l_russian:
 #Events
 russia.1.t: "Алексей Навальный госпитализирован"
 russia.1.d: "Российский оппозиционер Алексей Навальный находится в больнице без сознания с подозрением на отравление, сообщила его пресс-секретарь. Борцу с коррупцией стало плохо во время полета, и самолет совершил вынужденную посадку в Омске, где врачи сказали, что он находится в коме и они пытаются спасти его жизнь. Его команда подозревает, что ему что-то подсыпали в чай в кафе аэропорта. Кремль заявил, что желает господину Навальному "скорейшего выздоровления".\n44-летний Навальный в течение многих лет был одним из самых ярых критиков президента Владимира Путина. Г-н Навальный был на аппарате искусственной вентиляции легких и в коме, и что больница теперь полна полицейских. Все его вещи были конфискованы, объяснила его жена. Она также сказала, что врачи изначально были готовы поделиться любой информацией, но позже они заявили, что токсикологические тесты были отложены и "явно тянули время и не говорили того, что они знают"."
 russia.1.a: "Внимательно следите за его состоянием."
 russia.2.t: "Массовые протесты в связи с арестом Алексея Навального"
 russia.2.d: "Десятки тысяч протестующих проигнорировали сильный мороз и предупреждения полиции, чтобы потребовать освобождения критика Кремля Алексея Навального в субботу. Навальный призвал своих сторонников протестовать после ареста в минувшие выходные, когда он вернулся в Россию из Германии впервые после отравления нервно-паралитическим веществом, которое, по его словам, было подсунуто ему агентами государственной безопасности в августе.\n\nНо протестующие проигнорировали запрет и, по крайней мере, в одном случае при температуре ниже -45 градусов по Цельсию, оказались в силе. Леонид Волков, соратник Навального, призвал их сделать то же самое в следующие выходные, чтобы попытаться освободить Навального из того, что он назвал "когтями его убийц". В центре Москвы, где, по оценкам репортеров агентства Рейтер, на одном из крупнейших несанкционированных митингов за последние годы собралось до 40 000 человек, полиция грубо задерживала людей, запихивая их в близлежащие фургоны. Некоторые протестующие скандировали "Путин - вор", "Позор" и "Свободу Навальному!""
 russia.2.a: "Раздавите этих западных Тараканов"
 russia.11.t: "Масштабная акция протеста в Хабаровске"
 russia.11.d: "Сторонники губернатора Сергея Фургала, арестованного за организацию убийств, устроили несанкционированные акции протеста в Хабаровском крае. Самая крупная несогласованная акция прошла в центре Хабаровска: митингующие собрались на площади Ленина, возле администрации губернатора и краевого правительства, затем прошли по центральным улицам города и вернулись на площадь, где продолжили митинг. По данным местного правительства, в шествии принимали участие от 15 тыс. до 20 тыс. человек. Полиция никого не задерживала. На митинге, который продолжался около четырех часов, собирали подписи в поддержку Фургала и давали слово всем желающим выступить. Мэрия Хабаровска заявок на проведение митинга не получала и одобрить его не могла, поскольку все массовые мероприятия запрещены из-за пандемии. Также несанкционированное шествие состоялось в Комсомольске-на-Амуре, там митинговали более тысячи человек. А в городе Бикин в поддержку Фургала на улицу вышли около 50 человек."
 russia.11.a: "Внимательно следите за ситуацией."
 russia.11.b: "Народ говорит!"
 russia.12.t: "Полиция разгоняет Митинги оппозиции"
 russia.12.d: "На многочисленных политических митингах вспыхнуло насилие между полицией и сторонниками ЛДПР и КПРФ. первоначально стычки между двумя сторонами были изолированными, пока уличные драки естественным образом не переросли в длительные потасовки в городских кварталах. Десятки сотрудников спецназа были направлены для прекращения драки, но это только усилило насилие. Сообщалось, что почти 20 человек погибли от этих огней и еще бесчисленное множество получили ранения."
 russia.12.a: "Порядок должен быть соблюден!"
 russia.13.t: "Рамзан Кадыров Поддерживает Медведева"
 russia.13.d: "Глава Чеченской Республики заявил о своей поддержке кандидата от "Единой России" Дмитрия Медведева. Этот шаг неудивителен, поскольку сам Кадыров был очень близок к прежней администрации. Как бы то ни было, его поддержка, безусловно, пригодится в будущем."
 russia.13.a: "Отличная работа."
 russia.14.t: "Партия пенсионеров поддерживает ЛДПР"
 russia.14.d: "На недавнем съезде ПП, их лидеры объявили о поддержке кандидата от ЛДПР. В своих выступлениях они подчеркивали денежную поддержку Жириновским пожилых людей и социальные программы ЛДПР, направленные на улучшение жилищных условий пожилых людей. В конце концов, они призвали всех своих избирателей и избирателей союзных партий голосовать за ЛДПР и проводить совместные избирательные кампании по всей России."
 russia.14.a: "Интересно."
 russia.15.t: "ОМОН разгоняет протесты"
 russia.15.d: ""
 russia.15.a: "Ужасно!"
 russia.16.t: "ОМОН разгоняет протесты"
 russia.16.d: ""
 russia.16.a: "Ужасно!"
 russia.17.t: "Дугин Объявляет о Российских Амбициях"
 russia.17.d: "В телевизионном эфире Александр Дугин заявил, что сейчас, как никогда, настало время для того, чтобы Россия еще больше укрепила свои позиции на мировой арене. Его речь была встречена большинством положительных мнений среди членов Евразийской партии, и, на удивление, многие посторонние сочли речь хорошо сделанной. Дугин также кратко рассказал о возможном выдвижении в Совет Федерации."
 russia.17.a: "Начинается Новая Эра"
 russia.18.t: "Первые случаи заболевания КОВИД в России"
 russia.18.d: "Первые случаи заболевания коронавирусом были зарегистрированы от граждан, возвращающихся из поездок в Китай. Хотя число инфицированных в настоящее время невелико, мы не должны пренебрегать этой проблемой, чтобы она не вышла из-под контроля."
 russia.18.a: "Теперь это наша проблема"
 russia.19.t: "Демонстрации Перерастают В Насилие"
 russia.19.d: "То, что началось как относительно мирные демонстрации по всей федерации, быстро переросло в беспорядки. Протестующие часто бросают камни, бутылки с зажигательной смесью и фейерверки в полицию и сотрудников спецназа. Были сожжены автомобили и несколько правительственных зданий. Многие в социальных сетях поспешили указать пальцем на Дугина за то, что он якобы спровоцировал и подтолкнул нескольких участников беспорядков к нападению на государственных служащих в попытке заручиться большей поддержкой и контролем над Советом Федерации. Другие называли его фашистом, что Дугин быстро осудил, заявив, что ценности его партии чтят 20 миллионов жизней, потерянных в борьбе с нацистской Германией."
 russia.19.a: "Скоро Придет Порядок."
 russia.20.t: "Владимир Путин заболевает Ковид-19"
 russia.20.d: "После последней поездки на Кавказ, Президент заразился коронавирусной инфекцией Ковид-19. Сейчас за его состоянием следят лучшие врачи."
 russia.20.a: "Тревожно."
 russia.21.t: "Дугин приказывает ввести Чрезвычайное положение."
 russia.21.d: "Протесты приобрели значительный размах с тех пор, как Александр Дугин вступил в должность президента Федерации. Участились нападения на правительственный персонал, здания были сожжены, семьям угрожали. Столичным полицейским было нелегко разогнать бунтовщиков. Даже в Сибири и на Дальнем Востоке участники беспорядков перекрыли дороги, чтобы помешать армии и внешней полиции связаться с сотрудниками полиции во многих городах. Дугин быстро принял меры. Лидеры протеста должны быть найдены и наказаны."
 russia.21.a: "Время Пришло."
 russia.22.t: "Россия требует выхода из ЕС"
 russia.22.d: "Российское правительство опубликовало официальное заявление о том, что правительство Финляндии прекращает контакты с членами ЕС и полностью отказывается от членства."
 russia.22.a: "У нас нет выбора."
 russia.22.a: "Мы не забыли 1941 год."
 russia.23.t: "Финляндия Принимает Условия"
 russia.23.d: "Финских дипломатов заставили принять предложенные нами условия. Они вышли из состава ЕС"
 russia.23.a: "Отлично."
 russia.32.t: "Эдвард Сноуден Выпустил Досье"
 russia.32.d: "Похоже, Эдвард Сноуден не может ни от чего оторвать свои грязные маленькие ручки. Он опубликовал в Интернете новое досье, в котором якобы подробно описываются истинные события, приведшие к смерти Владимира Путина. Документы обвиняли Александра Дугина в организации убийства. Местная полиция вскоре арестовала Сноудена, и принимаются меры по пресечению распространения этого досье."
 russia.32.a: "Маленькая крыса."
 russia.33.t: "Эдвард Сноуден исчезает"
 russia.33.d: "Исправительное учреждение, в котором содержался Эдвард Сноуден, сообщило о его внезапном исчезновении во время транспортировки в другое учреждение. Конвой, в состав которого входили два джипа и автобус со Сноуденом, начал свое путешествие в неизвестном месте. Конвой только что миновал город Мистичи, когда все контакты были потеряны. Местные правоохранительные органы сбиты с толку, и на Дугина уже указывают пальцами."
 russia.33.a: "Куда делся этот ублюдок?"
 russia.37.t: "Пересмотр военного бюджета"
 russia.37.d: "После бурного года мы сталкиваемся с многочисленными угрозами и препятствиями, как внутренними, так и внешними. С одной стороны, наши экономические проблемы внутри страны, вызванные пандемией Ковид-19, и волнения, вызванные пенсионной реформой, вызвали призывы к внутренним инвестициям. С другой стороны, военная разведка указывает на массовые беспорядки в нашем противнике, Соединенных Штатах, и желает получить больше денег, чтобы использовать эту слабость."
 russia.37.a: "Увеличить Наши Внутренние Расходы"
 russia.37.b: "Увеличить Наш Военный Бюджет"
 russia.38.t: "Активизация российско-китайских Связей"
 russia.38.d: "В результате недавних переговоров с китайскими официальными лицами нами было подписано множество выгодных договоров о технологическом и торговом сотрудничестве между нашими странами. Нам стоит и в дальнейшем продолжать это партнёрство, положительно отражающееся на нашей экономике."
 russia.38.a: "Тост за наших китайских друзей!"
 russia.39.t: "Отчет по российской экономике за 2019 год"
 russia.39.d: ""
 russia.39.a: "Предстоит проделать еще много работы."
 russia.40.t: "Лукашенко Просит Нашей Помощи"
 russia.40.d: "Наш близкий белорусский коллега Александр Лукашенко уже несколько месяцев сталкивается с непрекращающимися протестами со стороны поддерживаемых ЦРУ "цветных революционеров". Несмотря на все его усилия, кажется, что он на последнем издыхании, поскольку антиправительственные протестующие маршируют к правительственным зданиям. В частном телефонном разговоре с президентом Путиным он призвал Россию вмешаться и оказать помощь в обмен на окончательное согласие на создание Союзного государства."
 russia.40.a: "Вперед, в Минск!"
 russia.40.b: "Мы не можем рисковать дальнейшими провокациями"
 russia.41.t: "Запад Вводит Против Нас Санкции!"
 russia.41.d: "После нашей мирной операции в Беларуси ООН провела заседание, на котором осудила военные действия против мирных демонстрантов. Единогласно наши враги проголосовали за введение нового набора санкций. Наш представитель выступил против санкций, сославшись на предыдущие враждебные действия НАТО и потребовав, в чем заключались их санкции. Как бы то ни было, эти санкции окажутся бесплодными..."
 russia.41.a: "Мы Выстоим"
 russia.42.t: "Теракт в Московском аэропорту"
 russia.42.d: "Трагедия произошла сегодня в Москве, когда сегодня утром 10 вооруженных людей в масках прорвались мимо охраны и открыли огонь по толпе в международном аэропорту Шереметьево. Нападение продолжалось 25 минут, пока не прибыли российские спецназовцы и не смогли задержать преступников. К сожалению, 42 человека погибли, в том числе 6 отважных полицейских, которые отдали свои жизни, защищая народ. Соболезнования поступают со всего мира, поскольку мы все вместе скорбим о жертвах очередного нападения."
 russia.42.a: "Наши мысли и молитвы жертвам"
 russia.43.t: "Украина выходит из Минского Протокола"
 russia.43.d: "Провокационный киевский режим объявил о своем выходе из Минского Протокола. Решение было принято после "продолжающейся провокации со стороны Федеративного государства Новороссия". Это еще одно безосновательное заявление режима Зеленского о попрании прав русского меньшинства"
 russia.43.a: "Безрассудное Решение"
 russia.44.t: "Михаил Мишустин объявляет досрочные выборы"
 russia.44.d: "Врио президента, Михаил Мишустин, не решился закончить свой текущий срок и объявил о новых президентских выборах, в которых он не видит себя кандидатом."
 russia.44.a: "Что дальше?"
 russia.45.t: "Подготовка к следующим президентским выборам"
 russia.45.d: ""
 russia.45.a: "Встать на Сторону КПРФ"
 russia.45.b: "Встать на Сторону ЛДПР"
 russia.45.c: "Встать на Сторону Единой России"
 russia.45.d: "Встать на Сторону Евразийской Партии"
 russia.45.e: "Встать на Сторону России будущего"
 russia.46.t: "КПРФ Побеждает на Выборах"
 russia.46.d: "В результате грандиозных президентских выборов, которые, несомненно, войдут в анналы российской истории, Коммунистическая партия Российской Федерации одержала победу, вызвав ликование на улицах Москвы и других крупных городских центров. Знамена победы, развевающиеся на ветру рядом с советскими флагами, стали ярким символом громкого триумфа, который был достигнут.\nНесмотря на эйфорию, охватившую страну, нашлись несогласные, которые попытались бросить тень сомнения на легитимность результатов выборов. Обвинения в мошенничестве и необоснованные теории заговора были придуманы в попытке подорвать значимость победы Коммунистической партии.\nЗападная пресса, всегда готовая бить тревогу и вызывать страх, нарисовала картину Коммунистической партии как бастиона националистов и реваншистов, стремящихся восстановить СССР и представляющих серьезную угрозу для западному миру.\n\nОднако среди какофонии скептицизма и нагнетания страха оставалась одна неоспоримая истина: народ высказался. Своими голосами они выразили горячее желание возродить великий Союз, который когда-то был маяком надежды и мощи."
 russia.46.a: "Коммунисты, Вперёд!"
 russia.46.b: "Побыстрее давай!"
 russia.47.t: "ЛДПР Побеждает на Выборах"
 russia.47.d: "Эти выборы ознаменуют исторический перелом в политической жизни России. После долгих лет неустанных усилий Владимир Жириновский и его ЛДПР одержали победу, одолев нео-большевиков и коррумпированных оппортунистов. После объявления результатов выборов Жириновский вышел на митинг, чтобы произнести одну из своих фирменных ярких речей. Он жёстко говорил о необходимости начать новую эру для России, которая вернет стране былую славу и величие.\nВ глазах западных политологов наша победа была названа "крупнейшей геополитической катастрофой". Они предостерегают от того, чтобы считать нас простыми популистами, предупреждая, что мы не просто партия ультранационалистов, а сила, с которой необходимо считаться и которая намерена возродить имперское величие России. Похоже, что на этот раз их предупреждения могут оказаться правдой.\n\nСудьба России теперь находится в руках Жириновского и ЛДПР, которые берут на себя миссию по изменению будущего страны и возвращению ей статуса мировой сверхдержавы."
 russia.47.a: "Могущество и Сила - Великая Россия!"
 russia.48.t: "ЕР Обеспечивает Контроль"
 russia.48.d: ""
 russia.48.a: "Наши планы могут продвигаться вперед"
 russia.49.t: ""Единая Россия" Побеждает на Выборах"
 russia.49.d: "В ходе ожесточенной предвыборной борьбы, приковавшей к себе внимание всей страны, победу одержала "Единая Россия", вызвав у населения ликование и разочарование. Харизматичный Дмитрий Медведев, довереный соратник Владимира Путина, покорил сердца многих россиян своими проникновенными речами и непоколебимым стремлением сохранить наследие своего наставника. Российский электорат в решительном порыве доверился стабильному и надежному правительству, сделав выбор в пользу преемственности, а не неопределенности, создаваемой экстремистскими партиями на обоих концах политического спектра.\nОднако западные СМИ восприняли победу Медведева с трепетом, отмечая его все более антизападную и антиглобалистскую риторику, звучавшую на протяжении последних лет. Они признали, что Медведев 2020-х годов - это не тот человек, который занял свой пост в 2008 году, и предупредили, что Западу следует готовиться к усилению напряженности и потенциальным конфронтациям в ближайшие годы.\n\nТеперь Медведев у руля, и он сделает все, чтобы завершить начатое Владимиром Владимировичем Путиным."
 russia.49.a: "Вперёд, Россия!"
 russia.50.t: "СРЗП Побеждает на Выборах!"
 russia.50.d: "К удивлению многих, наша партия - СР-ЗП смогла добиться победы на последних выборах, и теперь Сергей Миронов баллотируется в качестве нового президента нашей великой страны. Предстоит проделать еще много работы! Россия страдает от коррумпированной олигархии и застоя в развитии, и, что еще хуже, расширение НАТО и их марионеточное правительство в Киеве угрожают самому существованию нашей нации.\n"Справедливая Россия", социалистическая партия, должна предпринять решительные действия против бед общества. Мы также должны тщательно продумать путь, по которому должна идти российская политическая система. Это критическое время для нашей страны, и мы должны неустанно работать, чтобы добиться позитивных перемен и обеспечить светлое будущее для всех граждан России."
 russia.50.a: "Люди высказались."
 russia.51.t: "Расследование смерти президента"
 russia.51.d: "Тимоха, ты чё творишь?"
 russia.51.a: "Это был радикальный член коммунистической партии!"
 russia.51.b: "Фанатичный последователь Жириновского!"
 russia.51.c: "Президент умер от естественных причин."
 russia.52.t: "Медведев призывает к единству России"
 russia.52.d: "В свете последних событий, повергнувших Россию в шок, Дмитрий Медведев, заместитель председателя Совета безопасности, выступил с заявлением, призвав российских граждан не поддаваться панике и сохранять единство, утверждая, что народное единство - то, благодаря чему Россия всегда преодолевала любые трудности."
 russia.52.a: "Бессмысленно разделяться"
 russia.53.t: "Жириновский раздает деньги бедным"
 russia.53.d: "Сегодня глава ЛДПР, Владимир Жириновский, щедро раздавал людям деньги на Красной Площади. На вопросы журналистов он ответил, что " мы с вами все холопы... Бесправные, безлошадные, бесквартирные", и что народу пригодится любая помощь.\n\nИ хотя многие посчитали его смешным или унизительным, этот поступок уж точно сделал Жириновского более заментным на предстоящих выборах."
 russia.53.a: "Увлекательно"
 russia.54.t: "ЛДПР и КПРФ объединились против коррупции"
 russia.54.d: "Казалось бы, случайным образом сторонники обеих партий на митингах объединились в знак протеста против "Единой России". Скандирование фраз против Дмитрия Медведева и его кабинета против их коррупции и бесконечных связей с олигархами. Кампания продолжалась онлайн с формированием странного альянса левых и правых. Несмотря на их ненависть друг к другу, их достижению успеха мешает только одна партия..."
 russia.54.a: "Враг моего врага - мой друг"
 russia.55.t: "Беларусь разрешила полеты из Сирии"
 russia.55.d: ""
 russia.55.a: "Интересно"
 russia.56.t: "Влиятельные Друзья"
 russia.56.d: "Жаль, что я - неиспользованный, забытый ивент, которому даже локализацию не прописали."
 russia.56.a: "Мда."
 russia.57.t: "[SOV_cprf_candidate] восстанавливает РСФСР"
 russia.57.d: "Призрак бродит по Европе, призрак коммунизма. Все державы старой Европы вступили в священный союз, чтобы изгнать этого призрака - олигархи и "Единая Россия", Бербок и Колонна, немецкие радикалы и американские полицейские-шпионы.\n\nНесмотря на гибель СССР в 1991 году, Союз восстал из мертвых. Сегодня избранный президент [SOV_cprf_candidate], утвердив закон о переименовании страны, объявил о конце Российской Федерации и возрождении Российской Советской Федеративной Социалистической Республики.\n\nОбъявленный перед местной публикой гимн Советского Союза прозвучал в эфире впервые за более чем три десятилетия, исполненный в тандеме с толпами на улицах. Несмотря на то, что внутри страны царит ликование в связи с надеждой на возвращение статуса сверхдержавы и славы старого Союза, международное сообщество неоднозначно относится к этому вопросу. Реакция бывшего Восточного блока была самой жесткой: страны Прибалтики предостерегли от повторения ошибок 20-го века, а Украина осудила этот шаг."
 russia.57.a: "Вся Власть Советам!"
 russia.58.t: "Присоединение Абхазии и Южной Осетии"
 russia.58.d: "Грузии приготовиться."
 russia.58.a: "Ура!"
 russia.59.t: "Приглашение вернуться в СССР"
 russia.59.d: ""
 russia.59.a: "Да"
 russia.59.b: "ИДИ НАХУЙ КОММУНИСТ"
 russia.60.t: "Начало операции "Александр""
 russia.60.d: "В [GetDateText] наши воздушно-десантные войска взлетели с нескольких авиабаз вглубь воздушного пространства НАТО. Многие в генеральном штабе подвергли сомнению операцию, назвав ее отчаянной, действительно, эта массовая воздушно-десантная операция является крупнейшей со времен Великой Отечественной войны. Летая без позывных или под фальшивыми гражданскими удостоверениями личности, они успешно проникли через систему противовоздушной обороны НАТО. Полагая, что это гражданские самолеты, спасающиеся от хаоса, польские войска были застигнуты врасплох, когда их авиабазы подверглись эффективной атаке."
 russia.60.a: "Пусть они хорошо послужат нам"
 russia.61.t: "Польское военизированное восстание"
 russia.61.d: "По мере продвижения наших сухопутных войск через Польшу мы получаем все больше сообщений о деятельности военизированных формирований на оккупированной территории. Борьба с ними оказалась трудной, перехваченные радиопередачи выявили их жесткую организованную структуру. Компании были сформированы из каждого административного региона Польши."
 russia.61.a: "Они были раздавлены раньше, мы сделаем это снова..."
 russia.62.t: "Русский Мир"
 russia.62.d: "Прошло три десятилетия с момента распада Советского Союза, и Россия медленно восстанавливается после хаоса 1990-х годов. Под руководством Владимира Путина наша страна в какой-то мере восстановила свой международный авторитет, хотя до былого престижа еще далеко. Россия сталкивается с противодействием со стороны так называемого "цивилизованного западного мира", который критикует нас как "отсталых" и "деспотичных", проповедуя при этом "свободу" и "вольность". На самом деле они стремятся нас эксплуатировать и разделять. Мы противостоим им как сторонники нового геополитического мировоззрения - многополярности. В то время как Америка сталкивается с внутренними кризисами, центр русофобии перемещается в Европу, где глобалистская элита использует Украину в качестве острия против нас. Конфликт кажется неизбежным, и мы должны к нему готовиться.\nМы боремся за наш суверенитет и образ жизни против колонизаторов из "золотого миллиарда" и их попыток ослабить тех, кто им сопротивляется. Мы поддерживаем антиглобалистские силы и направляем свои войска на Ближний Восток и в Африку для оказания помощи тем, кто придерживается аналогичных взглядов. В этом все более нестабильном и озлобленном мире Россия должна быть едина и бесстрашна перед внешними угрозами. В нашем могучем лабиринте хрущевок может быть много людей с разными взглядами, но всех патриотов объединяет одна мысль..."
 russia.62.a: "Россия должна выжить!"
 russia.63.t: "ДЕЛО №478: ДЕПОРТАЦИЯ НЕРУССКИХ"
 russia.63.d: ""
 russia.63.a: "Отлично"
 russia.64.t: "Назначение Нового Директора Госплана"
 russia.64.d: "С воссозданием Госплана, необходимого для руководства нашей экономикой, нам понадобится выбрать руководителя для этой крайне важной структуры.\n\nУ нас есть несколько вариантов. Первый - Николай Коломейцев, много раз доказавший свои организаторские способности в нашей борьбе.\n\nНаш второй возможный выбор - Владимир Кашин, старый, но надёжный, высокообразованный партийный чиновник.\n\nНаконец, некоторые считают, что Александр Галушка, автор книги о Сталинской экономической системе и бывший государственный деятель, может очень эффективно справиться с этой работой, хотя в партии он не котируется.\n\nКого нам стоит выбрать?"
 russia.64.a: "Николай Коломейцев нам очень поможет."
 russia.64.b: "Владимир Кашин знает, что делает."
 russia.64.c: "Экономико-исторические знания Александра Галушка очень необходимы."
 russia.65.t: "Привет, Малышка"
 russia.65.d: "Дорогая Янкова, я надеюсь, что это письмо застанет тебя в добром здравии. Я прошу прощения за то, что не пишу вам слишком много - мы постоянно переезжаем, и чаще всего у меня нет времени посидеть и отдохнуть. Я надеюсь, что у вас дома все было не слишком сложно. У твоего брата все хорошо?\n\nВы почувствовали, что я приукрашиваю ситуацию в своем предыдущем письме, поэтому на этот раз я буду откровенен - я не могу описать словами, насколько здесь плохо. Куда бы мы ни пошли, я вижу города и поселки в руинах, дома, в которых живут или жили люди, разгромленные и перевернутые, как если бы они были притонами наркотиков. Линия фронта неизмеримо спорадична, и я не могу определить, выигрываем мы войну или нет. Мы завоевываем позиции в одних местах и так же быстро теряем позиции в других. За большинство мест, которые мы оспариваем, идут ожесточенные бои, и стрельба редко когда прекращается. Шум убивает меня сильнее, чем пули и артиллерийские снаряды. Я едва могу заснуть, когда не нахожусь на дежурстве.\n\nЛюди, о которых я рассказывал вам в моем предыдущем письме, Копцев и Степанов, умерли некоторое время назад. Их смерть - причина, по которой у меня не было мотивации писать вам, а также причина, по которой я не решаюсь заводить здесь новых друзей. Первоначально я считал, что это преувеличение, но, к сожалению, каждый может встретить свой конец в любое время. Мне жаль, что предложение Степанова о работе для вашего брата больше не действует.\n\nЯ скучаю по дому. Я скучаю по тому времени, когда меня будили звуки птиц, а не звуки отдаленных взрывов. Но я скучаю по тебе больше всего на свете. Мое единственное желание - чтобы война поскорее закончилась, чтобы я снова мог обнять тебя, как мы это делали раньше. Если повезет, я смогу сделать это вовремя.\n\nТвоя любовь,"
 russia.65.a: "Николай Антонович"
 russia.66.t: "Сергей Фургал Задержан"
 russia.66.d: "Губернатор Хабаровского края был арестован в одночасье по обвинению в причастности к серии предполагаемых убийств в начале 2000-х годов и обвинениям в коррупции со стороны отряда полицейских из Москвы. Арест вызвал немедленную негативную реакцию общественности, на площади Ленина вспыхнули первые протесты с требованием освободить Фургала и восстановить его в должности губернатора Хабаровского края, поскольку его арест широко рассматривается как политический шаг, а доказательства подверглись резкой критике за то, что они практически не имеют веса. Сергей Кравчук - мэр Хабаровска - продолжал осуждать протесты за нарушение карантина из-за Ковид-19 и продолжал поддерживать арест, к большому огорчению общественности."
 russia.66.a: "Правосудие восторжествует."
 russia.67.t: "Протесты растут в связи с арестом Сергея Фургала"
 russia.67.d: "Недавний арест Сергея Фургала вызвал массовую негативную реакцию со стороны общественности - особенно со стороны родного региона бывшего губернатора Хабаровска. Хотя первоначальные протесты в Москве в связи с арестом на площади Ленина были относительно сдержанными, за последнюю неделю протесты переросли в полномасштабные шествия против санкционированного правительством ареста, причем такие же протесты были организованы в дальневосточном крае России на Амуре. Полицейские силы были развернуты для наблюдения за развитием ситуации, однако становится все более маловероятным, что протесты утихнут в результате того, что рассматривается как серьезное нарушение государственной власти."
 russia.67.a: "Эти дураки нарушают карантин!"
 russia.68.t: "Бездействие Жириновского Сталкивается С Негативной Реакцией"
 russia.68.d: "Владимир Жириновский - лидер ЛДПР - столкнулся с негативной реакцией из-за своего бездействия в связи с крайне непопулярным арестом хабаровского губернатора Сергея Фургала. Последние политические опросы показали падение популярности Либерально-демократической партии в результате продолжающихся разногласий, и многие разочарованные сторонники партии расценили это бездействие как шаг Жириновского как средство остаться в фаворе у Владимира Путина. В то время как Жириновский и его партия отказываются давать комментарии, штаб-квартира партии видела несколько небольших демонстраций в Москве против предполагаемой поддержки партией правительства."
 russia.68.a: "Жириновский принимает политическую пулю за нас."
 russia.69.t: "Жириновский заявляет о поддержке Сергея Фургала"
 russia.69.d: "Вероятно, из-за общественного давления и недавней смерти Путина Жириновский и ЛДПР сняли шляпу с протестов против правительства в связи с арестом Фургала и заявили о полной поддержке оппозиции, требуя освобождения Фургала. В то время как этот шаг вернул большую часть популярности, которую партия потеряла из-за своего первоначального бездействия, этот шаг по-прежнему рассматривается многими как попытка Жириновского вернуть поддержку на предстоящих выборах, одновременно служа средством для усиления ослабленных позиций Объединенной партии после смерти их давний лидер и президент."
 russia.69.a: "Фургал должен быть освобожден!"
 russia.70.t: "Массовые беспорядки в Казахстане"
 russia.70.d: "В Казахстане начались массовые акции протеста. Причиной стало повышение цен на бензин. Протестующие вышли на улицы городов по всей стране, требуя отставки правительства и проведения новых выборов. В некоторых городах протесты переросли в столкновения с полицией, которая пытается разогнать демонстрантов."
 russia.70.a: "Внимательно следите за ситуацией!"
 russia.71.t: "Казахские беспорядки обостряются"
 russia.71.d: "Ситуация в Казахстане обостряется с каждым днем. Уровень насилия на улицах увеличивается, что вызывает опасения у жителей страны. Многие люди выражают свое недовольство текущим политическим режимом и требуют перемен. Однако, ситуация в стране остается неопределенной и требует внимания со стороны мирового сообщества. Действующий президент Касым-Жомарт Токаев обращается в ОДКБ с просьбой о поддержке, заявив о наличии "террористической угрозы". Он утверждает, что в Казахстане действуют "террористические банды, подготовленные за рубежом"."
 russia.71.a: "Решение будет принято."
 russia.72.t: "Этот ивент видит только Казахстан"
 russia.72.d: "После вмешательства Организации Договора о коллективной безопасности в ее государстве-члене Казахстане беспорядки, охватившие страну, закончились с минимальным кровопролитием, в немалой степени благодаря быстрым и профессиональным действиям российских миротворческих сил. На улицы Алматы и других крупных городов вновь вернулось напряженное спокойствие. Хотя многие проблемы в стране остаются нерешенными, теперь их можно решить мирным путем, без дальнейшей агитации на улицах.\n\nТем временем наши войска останутся в стране, чтобы предотвратить возобновление уличного насилия. Как только в Казахстане полностью восстановится стабильность и правительство попросит о нашем выводе, силы ОДКБ завершат свою деятельность в стране. На данный момент мы можем гордиться тем, что с выдающимся профессионализмом выполнили то, что, как мы надеемся, станет самой сложной задачей в нашей операции."
 russia.72.a: "Ладно"
 russia.73.t: "Государственный Переворот в Казахстанском Правительстве"
 russia.73.d: ""
 russia.73.a: "Оставьте их пока в покое"
 russia.73.b: "Начинайте миротворческую операцию!"
 russia.74.t: "Московские ночи"
 russia.74.d: ""
 russia.74.a: "Все хорошо."
 russia.75.t: "Состоялись похороны Путина"
 russia.75.d: "Сегодня в истории России наступил мрачный день: тысячи людей, включая политиков и простых граждан, собрались, чтобы проститься с Владимиром Владимировичем Путиным. Церемония прошла в Колонном зале Московского дворца союзов, где многочисленные спикеры, лидеры политических партий и государственные чиновники отдали дань уважения, возложив цветы к открытому гробу Путина. После этого в Храме Христа Спасителя состоялась панихида, на которой Патриарх Кирилл прочитал молитвы о вечном упокоении Путина. Одним из самых пронзительных моментов дня стала эмоциональная речь Дмитрия Медведева, во время которой, по некоторым данным, он был близок к слезам. В своей речи Медведев выразил непоколебимую преданность идеям Путина и назвал его величайшей личностью в современной российской истории."
 russia.75.a: "Спи спокойно..."
 russia.76.t: "Залужный Совершает Военный Переворот!"
 russia.76.d: "При взятии Киева, похоже, президент и большинство членов его кабинета были задержаны военной полицией по специальному приказу Валерия Залужного. В последующие дни паника и страх охватили всю Украину, поскольку президент больше ни с кем не общался. Многие надеялись, что он еще жив или успел тайно сбежать. Но по мере того как дни превращались в недели, эти надежды превращались в лихорадочные сны.\n\nСудьба президента неизвестна, Украинская армия официально взяла бразды правления в областях, находящихся под их контролем, но все еще не в состоянии выстоять и стабилизироваться из-за наших подавляющих сил и атак. Некоторые сектора полностью разрушены, в то время как другие продолжают действовать. Похоже, они координируют свои действия независимо друг от друга, что дает нам возможность использовать их слабость в коммуникации."
 russia.76.a: "Отличные новости!"
 russia.77.t: "Сахельская Федерация Подписывает Новые Экономические Договоры!"
 russia.77.d: ""
 russia.77.a: "Отлично! Тост за наших африканских союзников!"
 russia.78.t: "Выплата долга из Сирии"
 russia.78.d: ""
 russia.78.a: "Тост за наших сирийских союзников!"
 russia.79.t: "Выплата долга из Сирии"
 russia.79.d: ""
 russia.79.a: "Тост за наших ливийских союзников!"
 russia.83.t: "Химическая атака в Обухове"
 russia.83.d: "Наземные войска вокруг Киева сообщили об ужасающем применении химического оружия в городе Обухов. Нападение произошло ранним утром во время перестрелки вокруг города, возможно, атака была осуществлена украинскими войсками, чтобы остановить наше продвижение из Киева. Погибло несколько десятков мирных жителей, а также многочисленные украинские и российские силы. Новостные агентства уже начали сообщать о нападении и обвинять наши силы в этом ужасном преступлении, Организация Объединенных Наций также призвала к прекращению огня для расследования ситуации в этом районе..."
 russia.83.a: "Вопиющее нарушение женевских!"
 russia.84.t: "Прибывают Советские Добровольцы"
 russia.84.d: ""
 russia.84.a: "Что ж, используйте их с пользой!"
 russia.85.t: "Число случаев заболевания Ковид растет"
 russia.85.d: ""
 russia.85.a: "Это Волнует..."
 russia.86.t: "Массовая волна случаев заболевания Ковид"
 russia.86.d: ""
 russia.86.a: "Это Волнует..."
 russia.87.t: "Разработка вакцины "Спутник V""
 russia.87.d: "Доказывая, что Россия остается научным центром даже в постсоветскую эпоху, министр здравоохранения сейчас закладывает основу для разработки нашей собственной вакцины отечественного производства. Все, начиная с самых ранних испытаний и заканчивая конечным производством и внедрением, будет контролироваться нашими собственными институтами, что позволит нам сделать каждый этап процесса более эффективным.\n\nЭто не только вопрос национальной гордости, когда мы готовим нашу вакцину раньше всего остального мира, но и вопрос общественной безопасности, поскольку автаркия в отношении вакцин сделает невозможным для каких-либо враждебных элементов препятствовать нашей борьбе с вирусом.\n\nПоскольку в ближайшем будущем планируется начать клинические испытания, борьба с Covid-19 станет еще одной битвой, в которой Россия одержит победу."
 russia.87.a: "Мы будем первыми!"
 russia.88.t: "Зарегистрирована вакцина "Спутник V""
 russia.88.d: "В год, отмеченный глобальной пандемией, Россия стала важным игроком в гонке за разработкой вакцины против Ковид-19, а ее вакцина "Спутник V" стала одной из первых вакцин, разрешенных к применению в мире.\n\nРазработка вакцины "Спутник V" была результатом совместных усилий Института Гамалеи, Министерства здравоохранения России и Российского фонда прямых инвестиций. Несмотря на некоторый первоначальный скептицизм, вакцина "Спутник V" показала многообещающие результаты в клинических испытаниях с показателем эффективности более 90%. Разработка вакцины "Спутник V" была источником гордости для России, которая столкнулась с критикой за своеобразное решение вопроса пандемии. Президент Владимир Путин приветствовал вакцину как достижение "мирового класса" и символ научного мастерства России.\n\nПоскольку пандемия продолжает опустошать мир, разработка вакцины "Спутник V" дала проблеск надежды, продемонстрировав, что сотрудничество и инновации могут помочь положить конец кризису."
 russia.88.a: "Отличные новости!"
 russia.89.t: "Украинцы Уничтожили Запорожскую АЭС"
 russia.89.d: "После упорного боя наши войска успешно захватили Запорожскую атомную электростанцию. Из-за своего отчаяния украинские силы произвели крупные взрывы в нескольких реакторах, фактически выведя весь объект из строя и выпустив беспрецедентное количество радиации в надежде замедлить наше продвижение. Независимо от любых провокаций, которые они попытаются предпринять, мы растопчем их!"
 russia.89.a: "Разве они не извлекли урок из 1985 года?"
 russia.91.t: "Призрак Киева"
 russia.91.d: "Вызывающее название стало популярным в Твиттере и других социальных сетях, ссылаясь на украинского пилота МИГ-29, который якобы сбил шесть российских самолетов в первый день российского вторжения в Украину.\n\nКо многим постам "Призрака Киева" прилагается видеозапись того, что, по-видимому, является МИГ-29, известным по схеме НАТО как Точка опоры, хотя в большинстве постов есть точно такой же короткий клип - самолет, пролетающий над бетонными многоэтажками с серым небом позади \n\nТем не менее, существует мало доказательств того, что Призрак Киева действительно существует, а онлайн-недоброжелатели указывают на неправдоподобность истребителя без превосходства в воздухе и на более слабом реактивном самолете, сбивающем 6 вражеских самолетов за один день.\n\nТем не менее, анонимный опрошенный украинец заявил, что "Важно не то, существует он или нет, а сообщение, которое он распространяет как легенду. Такого рода послание важно в эти тяжелые времена, независимо от того, правда это или нет."
 russia.91.a: "Очередная "Перемога""
 russia.92.t: "Интервенция в Узбекистан"
 russia.92.d: "Боевые действия на таджикско-узбекской границе достигли неприемлемого уровня! Без колебаний Узбекистан начнет боевые действия в Таджикистане, причем Рогунская плотина будет использоваться в качестве основного оправдания. Утверждая, что это акт самосохранения и защиты от враждебного альянса.\n\nдмитрий Медведев санкционировал статью 4 ОДКБ, позволяющую нашим войскам немедленно реагировать на угрозу."
 russia.92.a: "Мы должны защитить своих союзников!"
 russia.93.t: "Ультиматум со стороны России"
 russia.93.d: ""
 russia.93.a: "не"
 russia.94.t: "Азербайджан Отказывается"
 russia.94.d: ""
 russia.94.a: "Они знают альтернативу..." 
 russia.95.t: "ОПЕРАЦИЯ "ВРАНГЕЛЬ""
 russia.95.d: "КОМУ - ВАЛЕРИЮ ГЕРАСИМОВУ, НАЧАЛЬНИКУ ГЕНЕРАЛЬНОГО ШТАБА\n\n\n\n\n£GFX_SOV_convoy\n\n\n\n\n\nЗНАЧИТЕЛЬНОЕ НАРАЩИВАНИЕ СИЛ НАТО В ЭСТОНИИ И ЛАТВИИ ПРЕДСТАВЛЯЕТ УГРОЗУ ТЕРРИТОРИАЛЬНОЙ ЦЕЛОСТНОСТИ РОССИИ.ПЕРЕСЕЧЕННАЯ МЕСТНОСТЬ МОЖЕТ ПРЕДСТАВЛЯТЬ ПРОБЛЕМУ, НО НАШИ ПОДАВЛЯЮЩИЕ СИЛЫ СОКРУШАТ ИХ.\n\n\n\n\n£GFX_SOV_airbase\n\n\n\n\n\nЭТОТ ДОКУМЕНТ ЯВЛЯЕТСЯ ПОДТВЕРЖДЕНИЕМ ОТ ГЛАВЫ ГОСУДАРСТВА ТОГО, ЧТО ОПЕРАЦИИ В СТРАНАХ БАЛТИИ НАЧИНАЮТСЯ НЕМЕДЛЕННО. ВРАЖЕСКИЕ АЭРОДРОМЫ ДОЛЖНЫ БЫТЬ УНИЧТОЖЕНЫ ДО ВТОРЖЕНИЯ НАЗЕМНЫХ ВОЙСК. - \n\n\n§RПОЖАЛУЙСТА, ПОДПИШИТЕ НИЖЕ§!"
 russia.95.a: ""
 russia.96.t: "Навальный арестован"
 russia.96.d: "Критик Путина Алексей Навальный, переживший в августе атаку с применением нервно-паралитического вещества, был задержан по возвращении в Москву из Германии. 44-летний активист был взят под стражу в аэропорту Шереметьево, куда он прибыл другим рейсом.\nНавальный обвиняет российские власти в покушении на убийство, это заявление поддерживают журналисты-расследователи.\n\nЕго задержание вызвало осуждение со стороны ЕС, Франции и Италии, которые требуют его освобождения. Несмотря на предупреждения об аресте, Навальный вернулся в Россию в воскресенье, его приветствовали сторонники, прежде чем его увезла полиция. В настоящее время он содержится в московском отделении полиции за нарушение условий испытательного срока, связанных с предыдущей судимостью, которая, по его утверждению, была политически мотивированной. Кроме того, против него были выдвинуты новые обвинения в мошенничестве в связи с предполагаемым нецелевым использованием средств его Фонда борьбы с коррупцией."
 russia.96.a: "Нарушитель Спокойствия Возвращается"
 russia.97.t: "Первый Московский судебный процесс"
 russia.97.d: "СЕРГЕЙ ШОЙГУ\nПредстал перед судом за: Грубое нарушение дисциплины и неспособность защитить нацию\n\nВАЛЕРИЙ ГЕРАСИМОВ\nПредстал перед судом за: Грубое нарушение дисциплины, сознательное отправление тысяч сыновей на верную смерть, неспособность защитить нацию.\n\n\n\n£GFX_SOV_sons\n\n\n\n\n\nВИКТОР ЗОЛОТОВ\nПредстал перед судом за: Грубое нарушение дисциплины, призыв тысяч сыновей на сознательное убийство, неспособность защитить нацию.\n\n\n\n£GFX_SOV_casualties\n\n\n\n\n\nОЛЕГ САЛЮКОВ\nПредстал перед судом за: Грубое нарушение дисциплины, сознательное руководство самоубийственными атаками против превосходящих сил противника, неспособность защитить нацию.\n\nВЕРДИКТ:\nСЕРГЕЙ ШОЙГУ: §RВИНОВЕН§!\nВАЛЕРИЙ ГЕРАСИМОВ: §RВИНОВЕН§!\nВИКТОР ЗОЛОТОВ: §RВИНОВЕН§!\nОЛЕГ САЛЮКОВ: §RВИНОВЕН§!"
 russia.97.a: "Эти "люди" знают свою вину"
 russia.98.t: "Затемнение в Москве"
 russia.98.d: ""
 russia.98.a: "Наш контроль укрепился"
 russia.99.t: "Массовые Протесты в Москве"
 russia.99.d: "Сергей ложится спать, а на следующее утро включает телевизор. В новостях сообщают о насилии в Москве..."
 russia.99.a: "Гражданские вошли в президентский дворец"
 russia.99.b: "Военные взяли штурмом президентский дворец"
 russia.100.t: "Московская Весна"
 russia.100.d: "Последние несколько дней Москва находилась в напряженном ожидании. Сотни тысяч протестующих собрались по всей Москве, чтобы выразить протест правительству. То, что началось как небольшое собрание, быстро переросло в широкомасштабный протест, который посрамил бы протесты 90-х годов. Оппозиция, начиная от прозападных либералов, недовольных гражданских лиц и ветеранов войны НАТО, собиралась без всякой цели, чтобы выразить свое недовольство государством. Однако сегодня толпы начали маршировать.\nМногочисленные либеральные telegram-каналы призвали единомышленников захватить правительственные здания, после чего остальные тоже вышли на марш. ОМОН и солдаты отступили, когда массы заняли улицы, некоторые даже присоединились к протесту. Похоже, даже некоторые аппаратчики решили сотрудничать с протестующими и начали координировать движение.\nВсе, что могло сделать правительство, - это беспомощно наблюдать, как оно теряет позиции, уже измученное и дезорганизованное послевоенным кризисом. К вечеру толпы собрались вокруг Думы и Кремля, и после столкновения с протестующими оба здания были заняты.\nКогда пыль уляжется, похоже, коалиция прозападных либералов и перебежчиков из истеблишмента сформирует новое правительство. Многочисленные источники утверждают, что Алексей Навальный станет исполняющим обязанности президента, ссылаясь на его массовую поддержку.\nЧто бы ни ждало нас в будущем, похоже, что Россия меняется."
 russia.100.a: "Возвращение к 91-му году?"
 russia.101.t: "Олигарх Просит Гражданских инвестиций в [SOV_oligarchs_investment_state.GetName]"
 russia.101.d: "Высокопоставленный олигарх из [SOV_oligarchs_investment_state.GetName] обратился к правительству с предложением поддержки. Его регион страдает от критического недостатка инвестиций, и инициированная правительством программа экономического стимулирования, безусловно, заставила бы его пересмотреть свою позицию в отношении некоторых предлагаемых правительством мер политики. Олигарх заседает в нескольких важных комитетах и довольно известен тем, что способен заключать сделки, благодаря чему его голос в Федеральном собрании стоит на несколько больше."
 russia.101.a: "Разумная просьба"
 russia.101.b: "В данный момент мы не можем себе этого позволить"
 russia.103.t: "Олигарх Просит Военных инвестиций в [SOV_oligarchs_investment_state.GetName]"
 russia.103.d: "Местные Олигархи из [SOV_oligarchs_investment_state.GetName] обратились к правительству, предлагая свою поддержку президенту в обмен на неофициальную гарантию того, что [SOV_oligarchs_investment_state.getName] станет местом строительства нового завода по производству боеприпасов для армии. Они утверждают, что строительство завода в этом районе создало бы много рабочих мест и обеспечило бы армии столь необходимую поддержку во все более опасном мире. Олигархи также упомянули о своих прекрасных рабочих отношениях с несколькими влиятельными членами Думы."
 russia.103.a: "Разумная Просьба"
 russia.103.b: "В данный момент мы не можем себе этого позволить"
 russia.104.t: "Принята статья 389 ОДКБ"
 russia.104.d: "После недавних военных испытаний "Востока" в рамках ОДКБ была принята новая статья. Теперь все страны должны вносить взносы в размере 5% от своего ВВП, чтобы содержать компетентные вооруженные силы, способные защищать союзников. Далее в статье говорится о дальнейшей связи российских вооруженных сил со странами, входящими в ОДКБ, посредством более частых совместных учений и миссий за рубежом."
 russia.104.a: "Наш союз становится крепче!"
 russia.105.t: "ПРОГРАММА МОДЕРНИЗАЦИИ: СУПЕРКОМПЬЮТЕРЫ"
 russia.105.d: ""
 russia.105.a: "Мы можем позволить себе только ограниченный бюджет"
 russia.105.b: "Инвестируйте всю запрошенную сумму"
 russia.106.t: "ПРОГРАММА МОДЕРНИЗАЦИИ: НАУЧНЫЙ СЕКТОР"
 russia.106.d: ""
 russia.106.a: "Мы можем позволить себе только ограниченный бюджет"
 russia.106.b: "Инвестируйте всю запрошенную сумму"
 russia.107.t: "ПРОГРАММА МОДЕРНИЗАЦИИ: ПЕРЕРАБОТКА РЕСУРСОВ"
 russia.107.d: ""
 russia.107.a: "Мы можем позволить себе только ограниченный бюджет"
 russia.107.b: "Инвестируйте всю запрошенную сумму"
 russia.108.t: "День Победы"
 russia.108.d: "Демонстрируя военную мощь, Россия провела парад в честь Дня Победы, посвященный очередной годовщине победы Советского Союза над нацистской Германией во Второй мировой войне.\n\nТысячи военнослужащих прошли маршем по Красной площади Москвы, с грохотом проезжали танки, ракетные комплексы и другая военная техника. Присутствовал Верховный Главнокомандующий и другие высокопоставленные политики и чиновники. В параде приняли участие более 14 000 военнослужащих, в том числе из Китая, Индии и других стран союзных с Россией. Самолеты и вертолеты российских ВВС также пролетали над Красной площадью, оставляя в небе клубы разноцветного дыма.\n\nВ этом году парад был особенно примечателен тем, что на нем была представлена новейшая военная техника, включая танк Т-14 "Армата" и гиперзвуковой ракетный комплекс "Кинжал". Российское правительство расхваливало усилия России по военной модернизации как способ поддержания ее обороноспособности против потенциальных угроз. Парад в честь Дня Победы остается важным событием для многих россиян, которые рассматривают его как символ национальной гордости и единства. Поскольку Россия продолжает противостоять геополитическими вызовам и напряженности, парад служит напоминанием о прошлых жертвах Родины и ее решимости защищать свои интересы."
 russia.108.a: "Никто не забыт, ничто не забыто."
 russia.109.t: "Российские Террористические Акты в Зонах Оккупации"
 russia.109.d: "Пизда Азову"
 russia.109.a: "Мы не потерпим этого угнетения"
 russia.111.t: "ПЕРЕДОВОЙ ОТЧЕТ: [GetDateText]"
 russia.111.d: "КОМУ - ВАЛЕРИЮ ГЕРАСИМОВУ, НАЧАЛЬНИКУ ГЕНЕРАЛЬНОГО ШТАБА\n\n\n\n\n£GFX_SOV_sons\n\n\n\n\n\nНАШИ ПОДРАЗДЕЛЕНИЯ, ПОНЕСЯ ОГРОМНЫЕ ПОТЕРИ И ИЗМОТАННЫЕ ДО КРАЙНОСТИ, БОЛЬШЕ НЕ МОГУТ ПРОТИВОСТОЯТЬ НАТИСКУ ВРАЖЕСКОГО НАСТУПЛЕНИЯ.\n\nПРОДОЛЖЕНИЕ НАСТУПЛЕНИЯ С ЦЕЛЬЮ ОТТЕСНИТЬ ВРАГА ПОЧТИ РАВНОСИЛЬНО САМОУБИЙСТВУ. НАМ ГРОЗИТ ОПАСНОСТЬ БЫТЬ ЗАХВАЧЕННЫМИ ВРАСПЛОХ. Я ПРОШУ РАЗРЕШЕНИЯ ПРИКАЗАТЬ МОИМ ЛЮДЯМ СЛОЖИТЬ ОРУЖИЕ И СДАТЬСЯ, Я ЖАЛЕЮ ИХ МАТЕРЕЙ\n\n. - \n\n§RПОДПИСАНО§! "
 russia.111.a: "ОЛЕГ САЛЮКОВ, ГЛАВНОКОМАНДУЮЩИЙ СУХОПУТНЫМИ ВОЙСКАМИ РОССИИ"
 russia.112.t: "Безоговорочная Капитуляция Польши"
 russia.112.d: ""
 russia.112.a: "ГООООЛ!"
 russia.113.t: "Послевкусие Победы"
 russia.113.d: "В течение этих тридцати лет Россия была удерживаема в когтях ельцинско-путинских преступников, но, наконец, у нас появился шанс. Новость о победе КПРФ вызвала различные реакции среди левых. Многие люди, которые всегда считали ее "Партией неудачников", оказались сбиты с толку. Константин Сёмин, который не поддерживал КПРФ на выборах, уже стремится вернуться на государственное телевидение. Андрей Рудой, который призывал к активному бойкоту, внезапно удалил с своего канала все видео с критикой КПРФ и уже высказывается в поддержку отдельных личностей из нашей Партии. РРП, РКРП, РСД и другие малые группы и марксистские клубы, такие как "жожеки", НСДР, различные ВКП(б), РКП(б), РКСМ во ВКонтакте в конечном итоге отказались от идеи создания "настоящей народно-революционной партии", чтобы не разжигать еще больше раздоров среди левых, либо ещё больше раскололись по вопросу отношения к новой власти: многие из них всё ещё называют нас "фальшивыми коммунистами" и призывают "продолжать борьбу за истинный социализм". "Коммунисты России", которые недавно избавились от Сурайкина на посту Председателя ЦК, присоединились к нам. В общем, сегодня мы можем с уверенностью сказать, что наша Партия привлекла к себе практически все серьёзные и не очень серьёзные левые силы в стране."
 russia.113.a: "В единстве наша сила!"
 russia.114.t: "Германо-российская нефтяная сделка"
 russia.114.d: ""
 russia.114.a: "Они придут к соглашению."
 russia.115.t: "Судьба Беларуси"
 russia.115.d: "Делегации России и Беларуси встретились в Минске, чтобы подписать историческое соглашение - декларацию о Союзном государстве! В течение многих лет мы стремились к объединению, и в эти неопределенные времена, кажется, выбор был неизбежен. Дума приступила к ратификации интеграции 8 новых областей в состав Федерации наряду с интеграцией белорусских вооруженных сил."
 russia.115.a: "Великий день для Федерации!"
 russia.115.b: "Великий день для Союза!"
 russia.116.t: "Продолжение Программы Модернизации"
 russia.116.d: "Хорошо, дебил, вот как работает эта механика. Если вы сделаете фокус и получите событие, у вас будет два варианта: либо вложить полную сумму, либо вложить ограниченный бюджет в этот сектор. затем активируется таймер миссии. В зависимости от того, какой бюджет вы выбрали, вам придется исследовать либо 2, либо 3 технологии, относящиеся к этому сектору."
 russia.116.a: "К"
 russia.117.t: "Руководство "Азова" под судом"
 russia.117.d: "После долгих и интенсивных боев по всей Украине неонацистская военизированная группировка, известная как батальон "Азов", официально сдалась нашим силам.\n\nЛидеров батальона "Азов", таких как Денис Прокопенко, быстро выволокли на улицы и публично унизили, сняли с них фашистских символов и регулярно пинали ногами, в конце концов избиение прекратилось, поскольку начался один из самых коротких судов в мире.\n\nВсего за полчаса в Новороссии такие люди, как Прокопенко, Игорь Мосийчук и Вадим Троян, были приговорены к смертной казни через публичное повешение, в течение многих лет "Азов" терроризировал наших людей, действуя как бешеные собаки, разрывающие семьи на части.\n\nКонечно, руководство быстро осознало, что правосудие, наконец, настигло их, они просили, плакали и молили о пощаде, точно так же, как свинья знает, что она будет убита, эти фашисты знают, что их конец близок.\n\nСегодня справедливость восторжествует."
 russia.117.a: "Джавелины вас сейчас не спасут."
 russia.118.t: "Почтение памяти героев войны"
 russia.118.d: ""
 russia.118.a: "Они сделали эту нацию гордой!"
 russia.119.t: "Разрушение памятника Степану Бандере"
 russia.119.d: "В то время как украинцы защищали город Львов изо всех сил, они не смогли остановить наше наступление, поскольку наши войска продолжали продвигаться в город, мы смогли найти памятник Степану Бандере.\n\nБандера, украинский "герой", который сотрудничал с немцами во время Второй мировой войны, совершил несколько актов этнической чистки против нашего народа. КГБ расправился с ним по справедливости, но его наследие продолжает жить. Невежественные украинцы до сих пор восхваляют его, приветствуют как героя, когда он был не более чем кровожадным варваром.\n\nУкраина яростно сражалась в своей борьбе за то, чтобы быть таким же варваром, которому она поклоняется, и наш долг - уничтожить его наследие. Уничтожение этого памятника будет первым шагом. Через несколько минут прибыл один из наших танков, прицелился в статую и выстрелил, уничтожив изображение убийцы.\n\nЕго образ был разрушен и будет расплавлен и превращен в медали в честь истинных героев России, теперь дорога остается открытой для остальной Европы."
 russia.119.a: "Нацистские свиньи не заслуживают того, чтобы их помнили."
 russia.120.t: "Роспуск Думы"
 russia.120.d: "Когда первые представители прибыли в Думу, они сразу почувствовали, что что-то не так. Жириновский, старейший государственный деятель, стоял на трибуне спикера с видимым презрением к не-членам ЛДПР. Он объявил о немедленном роспуске Думы, вызвав шок и гнев оппозиции. Когда они столкнулись с ним лицом к лицу, он разразился оскорблениями, и вскоре вошел московский гарнизон, вытаскивая с собой лидеров оппозиции. В конце концов, в зале остались только либерал-демократы. Когда хаос улегся, Жириновский воспользовался возможностью выступить перед палатой, заявив о своем превосходстве и дав понять, что инакомыслие недопустимо. Оставшиеся члены Думы испытывали чувство неловкости и неуверенности в том, что ждет их в будущем под руководством ЛДПР.\nЗа пределами Думы вспыхнули протесты по мере распространения новостей о событиях. Оппозиция пообещала дать отпор тому, что они сочли вопиющим захватом власти ЛДПР. Международное сообщество также выразило обеспокоенность, и многие осудили действия, предпринятые в Думе."
 russia.120.a: "Отходы были смыты - теперь начинается Возрождение России."
 russia.121.t: "Российские войска совершают государственный переворот в Приднестровье"
 russia.121.d: "Оперативная группа российских войск в Приднестровье взяла под свой контроль все здания государственных органов в Тирасполе, в том числе Верховный Совет. Местная полиция не оказала никакого сопротивления, вскоре после ареста президента Вадима Красносельского, был сразу же назначен исполняющий его обязаности, новым президентом стал Олег Хоржан, председатель Приднестровской Коммунистической Партии. Это решение было принято без участия местных жителей и без согласования с молдавскими властями."
 russia.121.a: "Ни один приднестровский коммунист больше не попадет в тюрьму."
 russia.122.t: "Объединение Молдовы"
 russia.122.d: ""
 russia.122.a: "Додон хороший мальчик"
 russia.123.t: "Украинское восстание в Карпато-Украине"
 russia.123.d: ""
 russia.123.a: "Чертовы свиньи!"
 russia.124.t: "Южные осетины добровольно идут воевать"
 russia.124.d: ""
 russia.124.a: "Их услуги будут очень полезны!"
 russia.125.t: "Московская Зима"
 russia.125.d: "Москва пока что выдерживает бурю. Еще несколько недель назад казалось, что мы развалимся изнутри: слишком много возмущенных голосов, слишком много идеологий, борющихся за доминирование над всеми остальными.\n\nОднако с евразийцами у руля, похоже, перед нами открылся новый путь. Больше левые и правые не сражаются на улицах, больше либеральные агитаторы не прячутся в тени, замышляя захват власти. Накал страстей спал, и настало время сосредоточиться на истинном враге - НАТО.\n\nЗападные псы думают, что, загнав нас в угол, мы встанем перед ними на колени и будем просить прощения? Прикрываться, как в 90-е? "Подогревать отношения"?\n\nЕдинственное, что нам нужно, - это холодные и расчетливые усилия по исправлению наших ошибок. Европейцы всегда называли нас варварами, даже в те времена, когда мы не хотели ничего делать, кроме как принять их "просвещенные" идеалы и присоединиться к ним. Что ж, они получат свое желание.\n\nЕвразия позаботится о том, чтобы от них остались лишь трупы, прочно застывшие в анналах истории."
 russia.125.a: "Ибо у нас больше нет любви к ним."
 russia.126.t: "Декларация Евразийского государства"
 russia.126.d: "Наконец-то мы воссоединились с нашими центральноазиатскими братьями.\nПока российские войска проходят парадом по улицам казахской столицы Астаны, статуя Льва Гумилева напротив президентского дворца гордо взирает на колонны.\nНастало время стереть с лица земли фарс России, ибо мы больше, чем она, мы - Евразия теперь и навсегда, и под руководством Дугина, под направляющей рукой Новой евразийской армии к нам присоединится и Европа. Мы заявим всему миру, что сегодня рождается новая нация!"
 russia.126.a: "Последние дни Европы близки"
 russia.128.t: "Референдум в Донской Республике"
 russia.128.d: "После референдума о воссоединении российский народ, что неудивительно, проголосовал за воссоединение со своей родиной. Поскольку местные элиты в основном состоят из русских патриотов, возвращение региона домой было неизбежно, особенно при большом возмущении местных жителей. Запад, как обычно, попытался выступить против воссоединения, но, похоже, остался глух.\n\nРодина снова у ворот Ростова-на-Дону, как когда-то Петр Великий, и все же, кажется, что это единственное что мы сможем взять миром, ибо дальше нас ждёт только конфликт с Западом.\n\nКубанская республика, контролируемая Украиной, не последует этому примеру. Используя украинских солдат, "сепаратистская" администрация массово подавляет инакомыслие, опасаясь нашего возрождения. Ростов и Крым также оккупированы Украиной, хотя и открыто. Они не оставят их без боя.\n\nМы освободим их всех."
 russia.128.a: "Ведь русские всегда приходят за тем, что им принадлежит."
 russia.129.t: "Предложение по Каспийскому морю"
 russia.129.d: "Калмыцкое правительство оказалось восприимчивым к нашим идеям. Они решили вернуть нам Астраханскую область, чтобы избежать вооруженного конфликта. Учитывая, что у них не было ни сил, ни желания противостоять русским патриотам в Астрахани, это был лучший исход для них.\n\nСогласие местной элиты на наше предложение также дало возможность договориться о статусе самой Калмыкии. Регион всегда зависел от российских субсидий. В то время как Европа взяла на себя это финансовое бремя, она также начала поглощать регион экономически, и местные компании не смогли конкурировать.\n\nМы могли бы, возможно, прийти к соглашению с местными элитами. Конечно, они предпочтут сохранить свои богатства, а не быть поглощенными европейскими корпорациями.\n\nДаже если это не сработает, у нас все равно много контактов и солдат среди калмыцких сил безопасности и администрации. Мы получим то что хотим."
 russia.129.a: "Мы приветствуем вас теплыми объятиями."
 russia.130.t: "Аннексия Калмыкии"
 russia.130.d: "Калмыцкая элита оказалась такой же бесхребетной, как мы и опасались. Отказавшись от воссоединения, желая, чтобы калмыцкий этнос был смыт европейским влиянием и культурным доминированием. Вероломный поступок, достойный ничтожных последователей Содома.\n\nНо у гордых сыновей ойратов есть люди дальновидные и волевые. Те, кто решил встать рядом с нами в нашей мечте о свободной и единой Евразии. И вместе с этими гордыми монахами огня и стали наши войска, что двинулись на Элисту.\n\nПусть Орда снова марширует и скандирует в унисон.\nБудь то Будда или Крест, неважно.\nЛюбовь снова пришла на эту землю..."
 russia.130.a: "...И не отпустит тебя впредь."
 russia.132.t: "Нет свободы врагам Свободы"
 russia.132.d: ""
 russia.132.a: "Наконец-то!"
 russia.133.t: "Формирование Патриотической коалиции"
 russia.133.d: ""
 russia.133.a: "..."
 russia.134.t: "Олигарх Требует Строительства Мурманской Железной Дороги"
 russia.134.d: ""
 russia.134.a: "Разумная просьба."
 russia.134.b: "В данный момент мы не можем себе этого позволить."
 russia.135.t: "Олигарх Требует Строительства Крымской Железной Дороги"
 russia.135.d: "Местный олигарх обратился к правительству с предложением поддержки. Его бизнес мог бы извлечь выгоду из новой железной дороги, соединяющей Крымский полуостров с портом Новороссийск. Олигарх заседает в нескольких важных комитетах и довольно известен тем, что умеет заключать сделки."
 russia.135.a: "Разумная просьба."
 russia.135.b: "В данный момент мы не можем себе этого позволить."
 russia.136.t: "БМПТ Завершил Испытание"
 russia.136.d: "Среди толпы генералов и важных чиновников из Думы БМПТ "Терминатор" был продемонстрирован с впечатляющим успехом. Высказывалось много сомнений в том, что полностью автономная боевая машина вообще возможна, но они были развеяны величием наших инженеров.\n\nАвтомобиль прошел строгий круговой маршрут, преодолев несколько холмов и канав, заполненных водой. Это казалось почти слишком совершенным. Впоследствии были высказаны некоторые опасения по поводу того, как искусственный интеллект будет определять союзников? Должны ли люди вообще обладать такой технологией?"
 russia.136.a: "Великолепно"
 russia.137.t: "РНС Зарегистрировалась в качестве Законной партии"
 russia.137.d: ""
 russia.137.a: "Великолепно"
 russia.138.t: "РНС Сформировывает Военизированное крыло"
 russia.138.d: ""
 russia.138.a: "Они будут очень полезны!"
 russia.139.t: "Навальный объявляет Чрезвычайное положение"
 russia.139.d: ""
 russia.139.a: "Никто не может остановить наши истинные цели!"
 russia.140.t: "Гноение Предателей"
 russia.140.d: "Россия проклята призраком западной философии, что, в общем, не так уж и плохо, потому что в сердце каждого русского, каждого евразийца заложено желание быть свободным. Но свобода означает разные вещи для разных людей, мы, евразийцы, хотим быть свободными так же, как хотят быть свободными эти заблуждающиеся либералы и социал-демократы. Свобода - это непостоянная и сложная вещь, которую нужно балансировать.\nОни бунтуют на улицах против нашей администрации под флагом старого Новгорода, но что такое был Новгород? Торговая республика наподобие Венеции, контролируемая патрициями и высшим классом, помещичьей шляхтой, республика предоставляла простому человеку не больше свободы, чем Московия. Систему крепостного права многие сравнивают с рабством, но многие ли европейские крестьяне вне системы крепостного права использовали свою свободу, чтобы уехать за границу? Нет, свобода, западное представление о свободе - это свобода эксплуатировать.\n\nМы смотрим на Запад и видим, как корпорации коррумпировали каждый уровень общества, как международные конгломераты обладают большей властью, чем нации, а выборы определяются политиками. Немецкая анократия подавляет инакомыслие, как и британская, они дают людям ощущение свободы, позволяя им бессмысленно голосовать, в то время как значимые мнения замалчиваются и замалчиваются.\nНаши сегодняшние либералы, навальнисты, этого не видят. Они - глупые массы, которые слепо следуют за западным призраком в бездну корпоративной эксплуатации и наемного рабства. Запад уничтожит всю индивидуальность и сотрет личную автономию во имя глобалистских планов, но Евразия предлагает настоящую революцию, революцию, которая сохранит нашу историю и революцию, которая сохранит вашу свободу как личности. Со временем нам придется разобраться с этими предателями и либералами, а пока они рычат, а Россия стонет от боли, пока опухоль дергается и разрастается в ее сердцевине, но со временем мы ее вырежем. Раковому либерализму нет места в новой России, те, кого мы не арестовываем, со временем научатся нас любить."
 russia.140.a: "Мы хотим одного и того же, разве вы не видите?"
 #russia.141.t: "check"
 #russia.141.d: "check"
 #russia.141.a: "check"
 russia.142.t: "Новое Правительство"
 russia.142.d: "Правительство РФ вчера объявило о решении уйти в отставку после оглашения послания президента Федеральному собранию. В нем, в частности, речь шла о внесении изменений в Конституцию, которые наделят Госдуму правом утверждать кандидатуры премьера, вице-премьеров и министров. На должность премьера президент РФ Владимир Путин предложил главу ФНС Михаила Мишустина, сегодня он был утвержден на новом посту. Премьер-министру Дмитрию Медведеву предложена вновь создаваемая должность заместителя председателя Совета безопасности."
 russia.142.a: "Ну ладно."
 russia.143.t: "Новое Руководство"
 russia.143.d: "ЧЕРТ!!! Я думаю, что пришло время для нового лидера этой дерьмовой страны..."
 russia.143.a: "Светов? Что ты делаешь?"
 russia.143.b: "Это было ожидаемо"
 russia.143.c: "Нет, мы остаемся"
 russia.143.f: "Наследие Явлинского живёт..."
 russia.144.t: "Антитеррористическая операция Прошла успешно"
 russia.144.d: ""
 russia.144.a: "Сопротивление бесполезно"
 russia.145.t: "Провал Антитеррористической операции"
 russia.145.d: ""
 russia.145.a: "Мы Вернемся..."
 russia.146.t: "Жириновский Мобилизовал Молодежные Подразделения"
 russia.146.d: "По мере того, как наши могучие армии прорываются сквозь ряды украинцев, нам необходимо больше храбрых воинов, мы мобилизуем молодежную дивизию Жириновского, эти юные сыны Святой Руси посвятят свои жизни нашему великому делу, внося свой вклад в нашу неизбежную победу.\n\nПусть запад дрожит от страха, пусть украинцы визжат, как свиньи на бойне, пусть предатели не останутся безнаказанными, ибо сыны России здесь.\n\nПосле нашей победы они будут увековечены в российской истории, известны как великие герои, отдавшие свои жизни за наш народ, их ждет светлый путь"
 russia.146.a: "Пусть они хорошо послужат нации."
 russia.147.t: "Жириновский Умер"
 russia.147.d: "Война в Европе была жестокой, и путь, ведущий к нашей победе, был не чем иным, как долгим испытанием нашего терпения и выдержки, однако один человек по-настоящему выдержал это бремя.\nВладимир Жириновский скончался, уже проявляя признаки усталости, он провел большую часть оставшегося времени с близкими, его семья утверждает, что он мирно скончался с улыбкой на лице, зная, чего достигла Россия в соответствии с его видением.\n\nВ условиях общенационального траура и размышлений о будущем России люди точно знают, что оно будет светлым."
 russia.147.a: "Покойся с миром, наш дорогой лидер."
 russia.148.t: "Жириновский Умер"
 russia.148.d: "Война в Европе была жестокой и бездарной, многие из наших храбрых солдат оказались на кладбищах или под обломками сражений, а наша страна превратилась в тень себя прежней. На фоне всей этой печали скончался наш великий лидер Владимир Жириновский. Сообщалось, что в начале дня у него случился сердечный приступ во время встречи со своими сотрудниками. Его быстро доставили в ближайшую больницу, где, к сожалению, констатировали смерть.\n\nОн был великим лидером, и хотя он не привел нас к победе, как обещал. Он старался изо всех сил, вкладывая в свою мечту все, что у него было. Но пока страна в трауре, а предположения о будущем России все еще витают в воздухе, люди не уверены, что родина быстро оправится или, наоборот, впадет в глубокую депрессию, поскольку все надежды на светлое будущее потеряны."
 russia.148.a: "Стыд был слишком велик..."
 russia.148.b: "Стыд был слишком велик..."
 russia.149.t: "Два пути, одна цель"
 russia.149.d: "В тихом углу маленького кафе в Москве двое старых друзей ведут оживлённый спор. Оба родились в эпоху позднего СССР, и каждый из них видит будущее страны по-своему. Их разговор становится символом того, что происходит в умах миллионов граждан России.\nПервый из них, Максим Черепанов, успешный бизнесмен, вступил в Компартию вскоре после её возвращения к власти, с энтузиазмом поддерживает курс на "Социалистическую Рыночную Экономику". Второй, Антон Иванов, простой работяга, всю жизнь посвятивший труду и верный старым идеалам Ленинизма.\n\n- Максим, это совсем не то! Разве за это мы голосовали? Мы... Мы же голосовали за коммунизм, чтоб было так, как мы жили раньше! Никаких частных лавочек, никакого рынка, всё по плану! А сейчас что? Все эти народные предприятия... это капитализм! Всё это противоречит идеям Ленина! - восклицает Иванов, гневно стуча кулаком по столу.\n- Антоха, время не то... Если мы строим социализм, то это не значит, что мы должны отказаться от рынка. Глянь на Китай! Каких успехов они добились! В конце концов подумай о народе, о молодёжи! Рынок под контролем государства даёт людям уверенность и свободу. Мы всё ещё контролируем развитие, мы всё ещё планируем, но даём людям дышать, работать и развиваться. Это не капитализм, брат, это наш новый, рыночный социализм, - возражает Черепанов, поглаживая папку с новыми контрактами.\n\nНаступает тишина, Иванов хмурится, глядя на активные стройки нового социального жилья за окном.\n\n- Наверное, ты прав, народу нужна стабильность... А молодёжь? Хах! Она бы взвыла при плане... Может, действительно, лучше жить спокойно, пусть и с рынком, чем снова скатываться в хаос. Если это работает, то, может, в этом и есть наше новое будущее, - наконец неохотно соглашается он..."
 russia.149.a: "Мы идём к социализму... только через новые пути."
 russia.150.t: "На Кавказе Формируются Антироссийские Ополченцы"
 russia.150.d: ""
 russia.150.a: "Они Дураки что посмели выступить против нас!"
 russia.151.t: "Ячейки ИГИЛ объявили о создании Центральноазиатского халифата"
 russia.151.d: ""
 russia.151.a: "Эти мрази должны быть уничтожены!"
 russia.152.t: "Дугин проводит митинг по Четвертой политической теории"
 russia.152.d: ""Очевидно, что ни коммунизм, ни фашизм не могут работать в нашем российском обществе. А либеральная демократия - это просто возврат к марионеткам Запада. Наша ноосфера была разорвана, да. Но мы всегда можем восстановиться. Евразийство станет тем клеем, который свяжет нас воедино. Независимо от идеологии или национальности. Катехон восстанет вновь!"\n\nОгромная толпа, собравшаяся вокруг пожилого провидца, внимательно слушала. Если не считать непримиримых евразийцев и национал-большевиков, которые стояли рядом с Дугиным последние два десятилетия, большинство людей практически не имели опыта общения с ним и его идеализмом до его возвращения в политику.\n\nВ то время как либерально настроенное население отмахивалось от движения, считая его "не более чем бреднями шизофреника", люди слушали. Евразийство было путеводной звездой, которая дала "глубинной нации" голос. Тому самому народу, который страдал, жертвовал и проливал кровь за Россию, как никто другой. Этого не смогли понять ни олигархи, ни либералы. \n\nНарод хочет сильной России, не скованной ничьими кандалами. Идеология или вера не имеют значения. Даже Ельцин, каким бы халтурщиком он ни был, понимал это. Он был сторонником создания сферы влияния на постсоветском пространстве, выступал против расширения НАТО или югославской интервенции.\n\nКатехон восстает из пепла, готовый сразить мечом Великий Содом."
 russia.152.a: "Love has won."
 russia.153.t: "Декларация о Евразийском Союзном Государстве"
 russia.153.d: "[МОСКВА] В течение последних двух месяцев международные наблюдатели следили за тем, как Российское государство Александра Дугина вошло в Центральную Азию - второй раз за десятилетие - и укрепило контроль над степями Казахстана, горами и пустынями бывших стран ОДКБ и государств, не входящих в ОДКБ. Хотя вторжение вызвало критику со стороны Европейского союза и исламских влиятельных лиц, сторонники режима Дугина и союзных ему стран называют эти территории "естественным достоянием России"\n\nПосле официальной аннексии стран Центральной Азии наши репортеры в International Observer стали свидетелями декларации, переданной сегодня в Москве, в которой Дугин провозгласил новое "Евразийское" союзное государство. Долгое время наблюдатели считали движение Дугина лишь мощным влиянием на российскую внешнюю политику, но сегодня оно стало реальностью. Евразия была основана к радости одних и ужасу других по всему миру. Насколько Дугин намерен претворять в жизнь свои писания, пока неизвестно. НАТО отказалось от комментариев на данный момент.\nДругие новости: песня "The United States of Eurasia" британской группы Muse стала номером один на российских билбордах за последнюю неделю, несмотря на то, что была выпущена более десяти лет назад. "
 russia.153.a: "Новое направление для России"
 russia.154.t: "Чистка Поклонников Атлантистов"
 russia.154.d: "Гниль уже достаточно давно загнила. Царство Содома получило свое время для правления после падения Красной империи. Родина отняла у него интеллект, гордость и богатство. Миллионы страдали, умирали только потому, что "не приспособились к рыночной экономике."\n\nОдин человек, своей волей, положил этому конец. Он расправился с самыми предательскими и заставил трусливых склониться перед ним. Но гниль осталась. Она разлагалась, вливалась в систему, маскировалась под патриотическими лозунгами и любовью к России. Она топтала усилия народа по возрождению страны своим холодным, материалистическим флером. \n\nПосле того, как он ушел, новая формирующаяся система, казалось, полностью очистилась от гнили. Нация обрела объединяющую цель. И она пролила за нее кровь. В окопах и на заводах, в материальной и ноосферной сферах. Борьба с гедонистами была светом зарождающегося, справедливого мира.\n\n И она провалилась.\n\n Гниль просто спряталась еще крепче, маскируясь и готовясь всплыть. Теперь, после того как наша Родина была раздета и унижена, а пятая часть нашего народа оказалась под игом атлантизма, они хотят возродить Содом? Лишить наш народ еще больше воли, гордости, будущего?\n\nРоссия больше не будет слушать падшего ангела. Как когда-то апостолы, мы должны направить предателей к свету."
 russia.154.a: "Возлюби Ближнего Своего."
 russia.155.t: "Дугин Заявляет о Евразийских Амбициях"
 russia.155.d: "[МОСКВА] Невероятно, но от наших международных наблюдателей в России поступают сообщения о том, что через несколько лет после проигрыша НАТО при предыдущей администрации, недавняя речь Александра Дугина провозгласила "Новые евразийские амбиции"\n\nЭти амбиции простираются вплоть до Лиссабона, причем реализация конечного пролета его трудов теперь воспевается как государственная доктрина.Евразийские государственные СМИ призывают народ готовиться к "Великому освобождению".Для тех, кто не знаком с трудами Дугина, а таких, я уверен, большинство, мы сейчас расскажем, что это значит.Вся территория бывшей Российской Империи плюс весь европейский континент, в некоторых версиях с включением или вычитанием таких государств, как Турция или части Ближнего Востока.\nЕсли эти амбиции будут реализованы до конца, если это не просто горячий воздух, то через несколько десятилетий мы снова увидим на горизонте тотальную войну в Европе."
 russia.155.a: "Тучи Войны Нависают Над Европой..."
 russia.156.t: "Дугин и Мопин встречаются"
 russia.156.d: "Это был обычный день на Камчатке.\n\nПолуостров жил спокойной жизнью в течение последнего десятилетия.После начала гражданской войны в Америке на эти берега хлынул поток беженцев, желавших тихой и мирной жизни.Большинство из них отправились вглубь Сибири в поисках стабильной работы и земли, но меньшинство осталось.Они стали свежей кровью для региона и отплатили России за ее щедрость, присоединившись к войне на Востоке, желая помочь своей новой родине.\n\nПоэтому это было идеальное место для встречи с лидером американских "якобинцев", Калебом Мопеном. Александр Гельевич первоначально сам хотел посетить Калифорнию, но из-за возраста Охрана и опричники беспокоились о его здоровье. Поэтому евразийские и американские спецслужбы договорились устроить встречу на Южной Камчатке, на курорте с горячими источниками.\n\nНикто из общественности не знает, что происходило за дверями курорта между двумя делегациями. Местные жители видели, как к комплексу постоянно подъезжали машины, из которых выходили и входили военные и гражданские чиновники обеих стран. "Встреча" продолжалась 2 дня, после чего внезапно закончилась: горячие источники очистили от всех следов ее проведения.\n\nВзгляды Якобинской Америки полностью совпадают со взглядами Евразии. И те, и другие хотят разрушить глобалистскую империю, но при этом не желают вмешиваться в дела других цивилизаций и становиться мировым гегемоном.  Однако неизвестно, приведет ли это к открытому сотрудничеству или просто к жесту благодарности."
 russia.156.a: "Евразия не одинока в мире."
 russia.157.t: "Украинская Распутица"
 russia.157.d: "Поскольку российское наступление по территории Украины прорвало многие линии обороны и прокатилось по некогда мирной территории Восточной Европы, признаки грядущих событий стали очень очевидными для обеих сторон этого конфликта. Всё из-за сильного дождя и слякоти, которые превратили дороги большей части восточной части европейского континента непроходимыми.\n\nДля НАТО и ее союзников это дает им возможность затаиться и переждать российскую военную машину. Для того, чтобы у него закончилось топливо, и тогда он будет вынужден остановиться.\n\nОднако для России, хотя они, возможно, и не смогут хорошо передвигаться в этих плохих условиях, а слабые логистические узлы могут полностью разрушиться. \n\nВариант перестроиться на более совершенные наступательные позиции, чтобы при первой же возможности нанести удар по западным силам, по-видимому, более привлекателен, чем бросать силы на погибель ради незначительных позиций.\n\nНа данный момент характер этой войны деградирует от молниеносной войны и устремляется к умиротворению НАТО. Сейчас это стало больше похоже на Первую мировую войну, поскольку это скорее война на истощение, чем на технологии и подавление."
 russia.157.a: "Серьезная неудача..."
 russia.157.b: "Просторы России нас поглощают..."
 russia.158.t: "Теракт в Санкт-Петербурге"
 russia.158.d: "На этой неделе в Санкт-петербурге Владлен Бабаев возраста 26 лет ворвался в здание городской администрации и начал стрельбу по её работникам. На место проишествия почти сразу же отправилась группа спецназа. По итогу операции преступник был убит, при нём был найден карабин ВПО-208, два десятка патронов и билет члена КПРФ, как позже было выяснено, принадлежавший ему. 2 члена подразделения ранено. Стрелок успел убить 9 работников администрации, 15 человек получили ранения разной степени тяжести. \n\nПосле этого события популярность Коммунистической Партии в народе резко упала, и чтобы хоть как-то её спасти, Геннадий Зюганов принял решение уйти в отставку. Пост ВРИО Председателя ЦК КПРФ принял 45-летний Юрий Афонин, до этого заместитель Геннадия Зюганова. Он будет исполнять его обязянности до следующего съезда Партии."
 russia.158.a: "Вот она, истинная сущность коммунистов."
 russia.159.t: "Смерть Владимира Жириновского"
 russia.159.d: "Лидер партии ЛДПР Владимир Жириновский скончался после осложнения болезни. В начале прошлого месяца его госпитализировали в Центральную клиническую больницу с коронавирусом, в сми сообщалось часто поступали сообщения что лидер ЛДПР Владимир Жириновский скончался в больнице, но на этот раз политик действительно умер..."
 russia.159.a: "Покойся с миром."
 russia.160.t: "Вторая Партия"
 russia.160.d: "Сегодня представители политических партий КПРФ и СРЗП, а также союзные им организации, такие как Левый Фронт и Движение "За Новый Социализм" провели совместное собрание и подписали Манифест об объединении КПРФ и СРЗП в "Народную Россию", в котором определены идеологические основы объединения, его планы и задачи, а также выработаны шаги по его реализации. Помимо этого на собрании были избраны временные руководящие органы новой партии: Председателем "Народной России" стал Захар Прилепин, до этого сопредседатель партии СРЗП."
 russia.160.a: "Новая эра в российской политике."
 russia.161.t: "Судьба нашей партии"
 russia.161.d: "Совсем недавно наша страна окончательно победила своих западных врагов. Может быть настало время ослабить хватку, публично обвинить засидевшихся на своих постах олигархов в предыдущих провалах нашей Родины, и объявить Россию по-настоящему демократической страной?"
 russia.161.a: "Так хотел сам Путин."
 russia.161.b: "Мы итак настоящая демократическая страна."
 russia.162.t: "Коммунистические Партии Выступают Против Народников"
 russia.162.d: "После недавнего объединения КПРФ и СРЗП многие Коммунистические Партии призвали отказаться от членства в КПРФ и присоединиться к другим "настоящим" коммунистическим партиям, поскольку, по мнению коммунистов, КПРФ предала наследие советского союза и превратилась в марионетку кремля. Недавно Владимир Иванович Лакеев, лидер партии ОКП, сказал следующее: "Я никогда не видел в КПРФ противника кремля, но сейчас это вообще закрепилось на законодательном уровне"."
 russia.162.a: "Ещё больше коммунистических партий?"
 russia.163.t: "Владимир Жириновский Госпитализирован"
 russia.163.d: "Сегодня лидера партии ЛДПР Владимира Жириновского госпитализировали из за заболевания Ковид-19 "омикрон", до этого Владимир Жириновский вакцинировался целых восемь раз. Сейчас политик говорит что чувствует себя отлично, и что очень скоро вернётся к работе."
 russia.163.a: "Надеемся на скорейшее выздоровление"
 russia.164.t: "Возрождение ЛДПР?"
 russia.164.d: "После смерти Жириновского никто не думал, что партия ЛДПР сможет вернуться в российскую политику, но, видимо, мы все ошибались. Несмотря на то, что Леонид Слуцкий стал лидером партии, молодые члены сплотились вокруг Василия Власова, чтобы сместить его с этого поста. Им это удалось. Теперь партия ЛДПР во главе с Власовым, которого сторонники называют "законным наследником", продолжит сотрудничество с молодежью и вновь готовится к полномасштабным акциям, что включает в себя разнообразную поддержку стримеров площадки twitch, а также распространение многих выступлений Жириновского, благодаря которым люди вновь вспомнили о ЛДПР и полюбили ее."
 russia.164.a: "Удачи им, и всего хорошего"
 russia.165.t: "Северная Корея хочет возобновить трудовую программу"
 russia.165.d: "Северокорейские рабочие будут периодически вырубать леса в Сибири, таким образом, КАЖДЫЕ 2 МЕСЯЦА будет предоставляться больше мест для строительства. Ожидается, что мы заплатим северокорейцам 100 миллиардов долларов за каждый завершенный проект."
 russia.165.a: "Разумное предложение!"
 russia.165.b: "Мы должны отклонить их щедрое предложение."
 russia.166.t: "Модернизация Транссибирской магистрали"
 russia.166.d: ""
 russia.166.a: "Это должно быть сделано!"
 russia.167.t: "Освобождение политзаключённых"
 russia.167.d: "Мы, коммунисты, обещали людям, что освободим политзаключённых, которых незаконно посадила путинская власть. Что ж, наверное уже стоит это сделать?"
 russia.167.a: "Освободите всех, кроме фашистов"
 russia.168.t: "Газовые Войны"
 russia.168.d: ""
 russia.168.a: "Мы не уступим их требованиям"
 russia.168.b: "Мы ничего не можем сделать против них"
 russia.169.t: "Они Отказываются"
 russia.169.d: ""
 russia.169.a: "Они знают альтернативу..."
 russia.170.t: "Они Приняли Наши Требования" 
 russia.170.d: ""
 russia.170.a: "Великолепно"
 russia.171.t: "Россия Предлагает Открыть "Северный Поток 2""
 russia.171.d: ""
 russia.171.a: "Конечно!"
 russia.171.b: "Не Сейчас"
 russia.172.t: "Газовые Войны"
 russia.172.d: ""
 russia.172.a: "Мы не уступим их требованиям"
 russia.172.b: "Мы ничего не можем сделать против них"
 russia.173.t: "Они Отказались"
 russia.173.d: ""
 russia.173.a: "Дерьмо."
 russia.174.t: "Они Согласились"
 russia.174.d: ""
 russia.174.a: "Тост за наших Европейских друзей!"
 russia.175.t: "Возвращение Белого террора"
 russia.175.d: ""
 russia.175.a: "Наши враги повсюду."
 russia.176.t: "Отключение Газа Европе"
 russia.176.d: ""
 russia.176.a: "Время пришло..."
 russia.177.t: "Газ из России больше не доставляется"
 russia.177.d: ""
 russia.177.a: "чёрт."
 russia.178.t: "Газ из России больше не доставляется"
 russia.178.d: ""
 russia.178.a: "чёрт."
 russia.179.t: "Газ из России больше не доставляется"
 russia.179.d: ""
 russia.179.a: "чёрт."
 russia.180.t: "Революция в Киргизии"
 russia.180.d: "Недовольный народ выходит на улицу и настроен серьёзно, правительство Киргизии вряд ли выстоит самостоятельно. Может нам ему помочь?"
 russia.180.a: "Мы имеем войска в Киргизии, отдайте им приказ..."
 russia.180.b: "Это не наше дело."
 russia.181.t: "Революция в Киргизии победила"
 russia.181.d: "Народ захватил здание Парламента, позже правительство и президент подали в отставку. Скоро в стране пройдут досрочные выборы."
 russia.181.a: "Для нас всё равно ничего не изменится."
 russia.182.t: "Состояние Президента ухудшается."
 russia.182.d: "Не смотря на все усилия, Владимиру Путину становится только хуже. Своё бессилие врачи объясняют тем, что у пациента помимо коронавируса имеются также и различные другие хронические заболевания, которые делают ситуацию практически безвыходной. В 2020-ом году законопроект Путина, предусматривающий для бывших глав государства пожизненное сенаторство. Может быть пора этим правом воспользоваться и отдать кресло президента новому человеку?"
 russia.182.a: ""Уже пора. Сергей Нарышкин, мой старый друг....""
 russia.182.b: ""Нет, мне ещё рано уходить...""
 russia.183.t: "Сергей Нарышкин объявляет досрочные выборы."
 russia.183.d: "Врио Президента РФ Сергей Нарышкин всё же не решился исполнять полномочия до конца текущего срока и объявил новые выборы Президента, на которых он не видит себя кандидатом."
 russia.183.a: "Что же дальше?"
 russia.184.t: "Владимир Путин Умер"
 russia.184.d: "Сегодня Россия оплакивает бывшего президента Владимира Путина, который трагически скончался от тяжелой болезни Ковид-19 на своей даче. Путин осознал всю серьезность своего состояния и добровольно ушел в отставку, назначив Нарышкина временным руководителем.\nТем не менее, Эта новость повергла многих в шок, ведь некоторые надеялись на его выздоровление и возвращение к власти. По всей стране граждане собрались на митинги и приспустили государственные флаги до полупоклона в память о Путине. Даже те, кто критически относился к его руководству, выразили свои соболезнования его семье. Медведев в своем искреннем сообщении в социальных сетях назвал это известие болезненным ударом по его душе и выразил соболезнования, которые сегодня испытывают многие россияне. Это, безусловно, день великой скорби для всего народа."
 russia.184.a: "Покойся с миром."
 russia.185.t: "Владимир Путин Умер!"
 russia.185.d: "При неожиданном и трагическом повороте событий Владимир Путин скончался из-за осложнений, вызванных Covid-19. Известие о его смерти стало шоком для нации, поскольку многие верили, что он все еще способен руководить страной. Чтобы обеспечить плавную передачу власти, Михаил Мишустин был оперативно назначен новым лидером в соответствии с протоколом. Несмотря на неожиданный кризис, стране удалось избежать дальнейших потрясений. Граждане по всей России собрались на митинги и приспустили государственные флаги в знак уважения к памяти Путина. Даже те, кто критиковал его руководство, выразили свои соболезнования его семье. Дмитрий Медведев воспользовался социальными сетями, чтобы выразить свою искреннюю скорбь, признав глубокое влияние, которое эта новость оказала на него и многих других россиян. Сегодняшний день, несомненно, является днем огромной скорби для всего народа."
 russia.185.a: "Покойся с миром."
 russia.187.t: "Сопротивление Российской Оккупации в Казахстане"
 russia.187.d: ""
 russia.187.a: "Разбейте этих дураков!"
 russia.188.t: "Покушение на жизнь Жириновскогоe"
 russia.188.d: ""
 russia.188.a: "К счастью, президент жив..."
 russia.189.t: "Судьба Беларуси"
 russia.189.d: "Путинский режим успел присоединить Беларусь к России по проекту Союзного Государства. Многие жители этой страны недовольны тем, что Беларусь потеряла свою государственность. Что же мы предпримем?"
 russia.189.a: "Мы воссоздадим Белорусскую ССР во главе с Александром Лукашенко."
 russia.189.b: "Беларусь будет свободной, но под руководством "Справедливого Мира"."
 russia.189.c: "Оставим всё как есть..."
 russia.190.t: "Вопрос о государственных должностях"
 russia.190.d: "Управлять государством может быть как сложно, так и легко. Есть что-то, что можно сказать о преимуществах избыточности, но наш Великий Лидер, Александр Дугин, - блестящий человек, способный управлять текущими министерствами по личному указу, если бы он этого захотел. Все, что сейчас действительно важно, - это определить, насколько ответственно позволять одному человеку выполнять все обязанности министерства. В постдугинской Евразии слияние министерств будет трудно отменить, а менее мудрые руководители могут не справиться с нагрузкой. Некоторые члены Консультативного совета утверждают, что Дугин слишком стар, чтобы справляться со всеми министерствами сразу. Однако на данном этапе решение должен принимать сам Дугин, поскольку он пользуется полной поддержкой партии в этом вопросе."
 russia.190.a: "Должности будут объединены!"
 russia.190.b: "Обязанности Дугина не должны быть перегружеными..."
 russia.191.t: "Съезд Евразийцев"
 russia.191.d: "Наш Съезд - это важный сосуд для нашего государства, который в уникальной евразийской манере содержит левое и правое крыло, соляристов и лунаристов.Оба имеют уникальные идеалы, левое крыло означает национал-большевистское крыло партии, гордость покойного Лимонова.В то время как правые представляют более традиционалистские элементы, определяемые православием не только в религии, но и в культуре, уделяя большое внимание трудам Дугина, где речь идет о сохранении традиций.\n\nКто бы мы ни выбрали, это, вероятно, сильно повлияет на то, каким типом правительства мы станем в ближайшие годы, и когда мы освободим Европу, какой останется Евразия на ближайшие столетия."
 russia.191.a: "Поддержать Анти-Глобалистких Левых"
 russia.191.b: "Поддержать Новых Правых"
 russia.192.t: "Справедливая Россия Сливается С "За Правду""
 russia.192.d: "В декабре 2020 года появились данные о том, что "Справедливая Россия" готовится объединиться с партиями "За правду" и "Патриоты России". В конце декабря лидер партии Сергей Миронов подтвердил эти намерения, и 20 января 2021 года было объявлено о соглашении. Объединение партий планируется в феврале-марте того же года под названием "Справедливая Россия - патриоты - за правду" или "Справедливая Россия - за правду""
 russia.192.a: "Сомневаюсь, Что Это Им Поможет"
 russia.193.t: "Смерть Эдуарда Лимонова"
 russia.193.d: "Сегодня состоялись похороны автора экоцентрических бестселлеров, политического активиста и лидера - Эдуарда Лимонова, скончавшегося в возрасте 77 лет после осложнений, вызванных хирургическим вмешательством. В 90-е годы Лимонов стал одним из главных оппозиционеров правительству Ельцина, и вместе с Дугиным и Летовым основал Национал-большевистскую партию, политика и практика которой позже сформировали современное понимание национал-большевизма в России.\N После прихода к власти Путина и последующей стабилизации и дерадикализации, чему способствовало заключение Лимонова "по обвинению в хранении оружия и создании незаконных вооруженных формирований с целью захвата северного Казахстана", Популярность НБП начала падать, пока в 2007 году название и символика партии не были запрещены властями.\nОднако всего несколько лет спустя Лимонов решил провести ребрендинг партии под новым названием - "Другая Россия", названная в честь одного из манифестов Лимонова.\nСтарость в сочетании с проблемами со здоровьем заставили Лимонова отвернуться от внутрипартийных дел, передав руководство младшим партийцам, оставаясь публичным лицом и оратором партии во время различных акций протеста и митингов.\nОн был одним из тех, кто больше всех поддерживал Восстание на Донбассе в 2014 году, вдохновляя свою партию и лично посещая линии фронта.\n\nОн был похоронен на Троекуровском кладбище, с гробом, завернутым в старый флаг НБП, многие из его сторонников присутствовали, отдавая последние почести своему "Деду", давая клятву у его могилы, что они будут бороться за воплощение его видения в реальность."
 russia.193.a: "Memento Mori"
 russia.194.t: "Вагнер начинает свою деятельность в Украине"
 russia.194.d: "Почти сразу после объявления Специальной военной операции частная военная компания "Вагнер" мобилизовалась вместе с нашими военными, чтобы присоединиться к ним во вторжении. Вокруг организации было множество споров, начиная от военных преступлений и заканчивая нарушениями прав человека, но никаких возражений против их участия в наших вооруженных силах высказано не было. Их жестокость - палка о двух концах и может оказаться полезной в предстоящих битвах..."
 russia.194.a: "Давайте посмотрим, как они справятся"
 russia.195.t: "Будущее Родины"
 russia.195.d: "После победы в европейской войне мы, наконец, сможем избавиться от олигархов и реализовать наши взгляды на российскую политику"
 russia.195.a: "Избавьтесь от олигархов и внедрите новую конституцию с идеями Путина"
 russia.195.b: "Избавится от олигархов и принять наследие Путина"
 russia.196.t: "ФСБ предотвратила социалистический теракт"
 russia.196.d: "В последние дни во многих социалистических организациях были проведены обыски из-за нового указа правительства Медведева, и результат полностью оправдал все затраты, потому что сегодня были спасены жизни граждан. В доме подозреваеммого были обнаружены членский билет Коммунистической партии и много нелицензионного оружия, которое было получено незаконным путем, предположительно из Центральной Азии."
 russia.196.a: "Большой Удар по Репутации КПРФ!"
 russia.197.t: "ЛДПР присоединяется к коалиции ОНФ!"
 russia.197.d: "Последние события в российской политике шокировали общественность, "Единая Россия" и ЛДПР после долгих переговоров объединились в одну коалицию! Медведев согласился на перестановки министров, чтобы объединиться с ЛДПР. Некоторые люди не были удивлены последними событиями, потому что, как они говорят, "ЛДПР всегда была марионеткой Кремля"."
 russia.197.a: "Все Согласно Плану"
 russia.198.t: "КПРФ присоединяется к коалиции ОНФ!"
 russia.198.d: "Мы никогда не думали, что это когда-нибудь может случиться, но это действительно правда - Единая Россия объединилась в одну коалицию с КПРФ. Коммунистическая Партия Российской Федерации после многих скандалов, которые обрушились на нее в связи с последними новостями, и многочисленных давлений со стороны администрации Медведева, наконец, привела к прекращению существования КПРФ как независимой партии. Сейчас коммунисты всех мастей называют Зюганова предателем и марионеткой Кремля, а другие оправдывают его решение отсутствием выбора, но только время покажет, действительно ли это было правильное решение."
 russia.198.a: "Я Был Рождён в СССР"
 russia.199.t: "Единая Россия и Справедливая Россия Объединяются"
 russia.199.d: ""Справедливая Россия" и "Единая Россия" наконец объединились после долгих переговоров. Такие действия никого не удивили, потому что все знают отношения между Медведевым и "Справедливой Россией""
 russia.199.a: "Теперь Россия Действительно Единая!"
 russia.200.t: "Указания Дугина"
 russia.200.d: "Наш великий Солярный Вождь выпускает новые указания каждый день, мы должны сосредоточиться на их выполнении."
 russia.200.a: "Слушайте Внимательно!"
 russia.201.t: "Беженцы с Донбасса"
 russia.201.d: "Земля Донбасса досталась врагу, но не народ Донбасса. Многие покинули свои дома, опасаясь жестоких репрессий, но их мятежный дух продолжал жить. После прихода к власти нового режима, который стремится отомстить натовским псам, как ветераны милиции, так и "молодая кровь" сформировали бригады из изгнанников и готовы сражаться в другой день в надежде вернуть свои дома."
 russia.201.a: "Работайте, Братья!"
 russia.202.t: "Смерть Адмирала Владимира Высоцкого"
 russia.202.d: "Адмирал Военно-морского флота России Владимир Высоцкий скончался из-за проблем с сердцем в возрасте 66 лет. Он был похоронен с воинскими почестями 8 февраля на Троекуровском кладбище."
 russia.202.a: "Спасибо Вам За Вашу Службу, Товарищ"
 russia.203.t: "Охота На Левых"
 russia.203.d: "Массовые репрессии прошли во многих городах по всей России. Росгвардейцы задерживала левых активистов и пропагандистов, особенно тех, у кого были аккаунты в социальный сетях.\nБольшинство из них подняли руки вверх и мирно сдались, как Андрей Рудой и Борис Кагарлицкий, или весь актив РРП, часть которых уже создала партию "ППВЖ" - Партия Поклонников Владимира Жириновского. Вскоре все левые аккаунты и "истинно-коммунистические" группы в социальных сетях былы удалены.\nОднако самым ярким эпизодом этих арестов стала погоня за Константином Семиным на мотоцикле, которая длилась 6 минут и закончилась тем, что он врезался в дерево, тем не менее, не получив серьезных травм. Сообщалось, что он, возможно, находился под воздействием алкоголя.\n\nОперация закончились тем, что более тысячи человек были задержаны за поддержку левой политики, а также в штаб-квартирах более 10 социалистических организаций были проведены обыски, и Росгвардия поместила их под свой контроль."
 russia.203.a: "Покончите с Этими Паразитами!"
 russia.204.t: "Охота На Либералов"
 russia.204.d: "Начались операции по зачистке от либеральной оппозиции. Полиция провела обыски в штабах пресловутых ФБК и "России Будущего", арестовав активистов которые там находились. Многие влиятельные либеральные деятели были задержаны, такие как Максим Кац и Варламов, кроме того, были деактивированы их аккаунты в социальных сетях.\n\nТем не менее, некоторые из либеральных главарей избежали тюрьмы, сбежав незадолго до начала репрессий в Европу, где сейчас они записывают разоблачительные видеоролики о нашем правительстве...Но только для западной аудитории.\n\N Не смотря на некоторых беглецов, операции оказались ошеломляюще успешными, а либерально-западные идеологи постепенно исчезли из поля зрения общественности."
 russia.204.a: "Избавьтесь От Этой Кори!"
 russia.205.t: "Нур Султан Переименован обратно в Астану"
 russia.205.d: "Благодаря нашему вмешательству, Касым-Жомарт Токаев сумел сохранить свою власть в Казахстане, и, пользуясь случаем протестов, он окончательно сместил Нурсултана Назарбаева с политической сцены. Елбасы лишили председательства в Совете Безопасности РК и поста главы доминирующей партии Казахстана Нур Отан, затем переименованную в Аманат.\nЯрчайшим примером нового курса на "де-назарбаевизацию" стало переименование столицы Казахстана Нур-Султана обратно в Астану. Город был переименован в 2019 году по решению парламента в честь ушедшего в отставку со своего поста главы государства Назарбаева. Елбасы правил Казахстаном ещё до распада Советского Союза, став в 1989 году Первым секретарём ЦК Компартии республики, вплоть до своей отставки. Теперь, когда он лишён какого-либо значения, переименование знаменует собой новую главу в истории среднеазиатской республики."
 russia.205.a: "Немного неловко"
 russia.206.t: "Жириновский Отчитывает Членов Партии"
 russia.206.d: "Во время заседания Совета ЛДПР Владимир Жириновский заявил о необходимости чистки партии. В своей обычной манере он воскликнул, что не допустит лохов и карьеристов внутри ЛДПР, и что членство должно быть заработано тяжелым трудом на благо нации.\n\nНа сегодняшний день региональные комитеты партии получили директивы о создании ревизионной комиссии для поиска "лохов и стяжателей" и их чистки. Неизвестно, что многие пострадают от этого, но это может быть значительным."
 russia.206.a: "Нужна Встряска"
 russia.207.t: "Начало Всеобщей военной мобилизации в Республиках Донбасса"
 russia.207.d: "Чтобы Русский мир стал реальностью, должна начаться великая борьба, жители Донбасса знают об этом лучше всех. Именно поэтому им нужно готовиться сделать это снова, следуя секретным приказам Кремля, Республики Донбасса начали мобилизационные мероприятия на своих территориях, набирают и обучают людей, вскрывают старые тайники с оружием, готовят и чистят транспортные средства. Грядет война, Донбасс восстанет, и снова будет как Брест."
 russia.207.a: "Обратный Отсчет Начался"
 russia.208.t: "Объявление мандата НАТО"
 russia.208.d: "Сегодня в 14:00 по московскому времени, во время конференции НАТО в Брюсселе, было принято важное историческое решение. Европейские лидеры, после долгой речи о разрушительных европейских войнах и их разрушениях, а также о необходимости консолидации усилий континента по восстановлению пострадавших регионов.\n\nКульминацией этой конференции стало объявление территориального мандата над оккупированными регионами России, где будет сформирована "Московская республика", которая будет выступать в качестве законного преемника демократической Российской Федерации под руководством Бориса Ельцина. Однако территория этой республики, по-видимому, не будет простираться за пределы центральной России, поскольку южные регионы, где большинство населения составляют русские, либо перейдут в состав республик этнических меньшинств, либо получат общую независимость. Более того, северные регионы России, в том числе и Санкт-Петербург, будут "реорганизованы под командованием ВМС НАТО для защиты Европы от дальнейших вторжений с Востока".\n\nХотя это уже взбесило большинство русских в этих регионах, речь нового российского правительства была соломинкой, которая сломала спину верблюда. Печально известный изгой олигарх Михаил Ходорковский дебютировал на публике, заявив, что "он и его соратники-борцы за свободу, наконец, сделают Россию цивилизованным обществом, свободным от его империально-советского варварства".\n\nМногие уже утверждали, что было бы ошибкой делать одного из самых жестоких олигархов ельцинской эпохи новым лидером русского народа, но без каких-либо хороших замен и общей борьбы за власть внутри либерального движения кажется, что он здесь, чтобы остаться. В любом случае, новое правительство должно будет взять на себя ответственность за восстановление Западной России, разрушенной войной."
 russia.208.a: "Ветер Перемен"
 russia.209.t: "Протесты в Санкт-Петербурге"
 russia.209.d: "В то время как некоторые надеялись, что Санкт-Петербург снова станет "воротами на Запад", кажется, что разрыв между Россией и Европой слишком велик, чтобы его пересечь. После того, как город был взят под прямую военную оккупацию НАТО, общие беспорядки среди населения резко возросли.\n\nСегодня, кажется, народ уже достаточно насытился и организовал протест возле Зимнего дворца. Различные пророссийские лозунги, такие как "Возвращение Санкт-Петербурга в Россию!", "Давайте изгоним оккупантов!" и "Мы вернемся!"  массами были у толпы людей. В то время как командование НАТО утверждало, что там было только около 10 тысяч человек, большинство новостных сайтов утверждают, что протест был по крайней мере 60 тысяч человек, если взять людей, заблокированных за пределами главной площади.\n\nБольшинство аналитиков сходятся во мнении, что это только начало, поскольку российское население будет продолжать радикализировать под оккупацией. Кажется, что последние две войны не исчерпали волю народа к борьбе, так как он по-прежнему сопротивляется мандату НАТО."
 russia.209.a: "Мы будем следить за ситуацией"
 russia.210.t: "Появление российских банд и западной Мафии"
 russia.210.d: "В связи с полным роспуском российских полицейских сил при новом правительстве и политикой открытых границ с членами НАТО западные мафиозные группировки выдвинули свои притязания на регион. Используя свой резерв ветеранов войны в качестве мускулов, они легко заняли рынок как легального, так и нелегального бизнеса. Наиболее могущественными из этих групп являются французские "les Enfants Terribles" и итальянские "Passione".\n\nВ настоящее время эти группы не только контролируют ряд российских фабрик, выставленных на аукцион для выплаты репараций, но и вмешиваются в торговлю людьми, контрабанду и торговлю наркотиками.\n\nКомандование НАТО уже опубликовало заявление о развертывании "европейских полицейских сил" для наблюдения за ситуацией. Это, несомненно, приведет к дальнейшей радикализации местных русских."
 russia.210.a: "Для России наступили суровые времена."
 russia.211.t: "Русский Марш в Москве"
 russia.211.d: "Ситуация на российских мандатах продолжает ухудшаться. Русский марш был организован сегодня в 16:00 на Новом Арбате, с гражданскими маршами на улицах и протестами против российской оккупации. Хотя поначалу толпа оставалась мирной, она стала неконтролируемой, увидев группу европейцев, предположительно туристов. После начала драки в боях погибли 10 европейских граждан, что вызвало ответные действия полиции.\n\nПоскольку полицейские также были европейцами, толпа продолжала бороться с полицейскими силами, убив по меньшей мере двух и сожгла одну из машин, вызванных по вызову, пока они не были разогнаны боевыми патронами.\n\nПолиция Московского мандата уже принимала участие в подавлении безоружных гражданских лиц, поэтому после того, как появились новости, российская общественность и иностранные средства массовой информации осудили европейскую элиту за подавление мирных протестов, потребовать ареста всех сотрудников полиции, причастных к жестокому обращению."
 russia.211.a: "Чёрт."
 russia.212.t: "Звонок"
 russia.212.d: "Сергей проснулся от телефонного звонка, чувствуя себя ужасно. Его сон был так же ужасен: он вспомнил траншеи, обстрелы и своих давно умерших товарищей. Он ходил по комнате, полной мусора, глядя на свой телефон. У него не было никого, кто мог бы позвонить ему в такой час: его друзья погибли на фронте, а его любовь умерла из-за ковровых бомбардировок НАТО. Он даже не знал, живы ли его родители, но, похоже, его это не волновало. По мере того, как его головная боль становилась все сильнее, он понимал, что ему НУЖНО ответить.\n\nОн неохотно подошел к телефону и поднял трубку: "Привет. Это Никита из бюро недвижимости. Сегодня мы осматриваем новую квартиру. Это квартира на Богословском переулке, З. Дом открыт. Приходи в свое свободное время." Сергей ничего не понял из сказанного, но решил, что единственный способ узнать, что происходит, - пойти по адресу.\n\nКогда он вышел из дома, он нашел странный пакет. Внутри была маска животного и листок бумаги с надписью "Цель - портфель. Будь осторожен. Оставь цель в точке F-32, в мусорке. Ты не имеешь права сделать ошибку. Мы будем наблюдать за тобой.""
 russia.212.a: "Странные вещи происходят."
 russia.213.t: "Стрельба на Богословском Переулке"
 russia.213.d: "Вчера рано утром на Богословском переулке услышали выстрелы из недавно открывшегося ночного клуба "Вергилий", которым руководит итальянская мафия по имени Passione, и все жертвы, согласно мандату, были итальянцами. Многие приписывают это некоторым лидерам нового правительства, а именно Ходорковскому, который недавно вернулся на родину из-за рубежа и, несомненно, стремится вернуть себе свою долю рынка. Однако это большой удар по репутации мандата НАТО в России, так как полицейские силы были очень неэффективны."
 russia.213.a: "Чёрт"
 russia.214.t: "Еще одно дикое десятилетие?"
 russia.214.d: "Россия достигла новой точки кипения, очень похожей на ту, что она прошла с начала 90-х годов, и многие аналитики говорят, что Россия не сможет полностью оправиться от такого кризиса. С ростом преступности, вызванного западными мафиозными группировками, антизападной деятельностью российских граждан и коррупцией в высших эшелонах правительства, поддерживаемого НАТО, ситуация кажется нерешаемой. Как бы ни старался мандат НАТО, российская общественность, похоже, не проявит симпатии к новому правительству."
 russia.214.a: "Извините, но я не слышу вас за столом победителей."
 russia.215.t: "Главы "Passione" и "Les Enfants Terribles" Мертвы!"
 russia.215.d: ""Начинаем на счёт три... два..."\n\n"Добрый вечер, в прямом эфире Ирина Лебедева специально для вас Euronews Russia с репортажем из Особняка Жана Поля. Печально известные главы преступных организаций только что были убиты неизвестным нападавшим." камера показывает двух полицейских, которые тащат мужчину в полицейскую машину "Как видите полиция уже арестовала преступника. Подробности пока что неизвестны но вероятно, что нападавший имел при себе маску животного. Мы будем держать вас в курсе новых событий."\n\nКадр сменяется на телеведущего "Маска животного? Если эта информация подтвердится, то этот инцидент относится к серии убийств, совершённой нападавшими в странных масках, согласно местным СМИ множество жестоких убийств, совершённых за последние месяцы беспокоят граждан Москвы. Большинство жертв связно с различными группировками внутри города. Несмотря на все старания полиция по-прежнему не знает причину совершённых преступлений, так как им не удалось допросить подозреваемых."\n\nКадр снова переносит нас обратно на репортёршу "Так точно! Во время перестрелки в доме Поля погибло ещё несколько человек неизвестно сколько, медработники все ещё продолжают выносить тела. Только что подтвердились данные о том, что преступник имел при себе маску лисы. Сейчас преступника увозят в полицейский участок, где он будет допрошен." \n\nИ вновь кадр возвращается в студию "Это просто невероятные новости, многие зрители знают что человек в маске лисы наиболее известен среди остальных, он ответственнен за серию убийств в полицейском участке совершённую на прошлой неделе, а так же за несколько других преступлений, включая убийство Николая Агафонова, известного продюсера. Если арестованный окажется им... Мы, наконец, получить ответы о вспыхнувшей волне насилия. Кто знает... возможно, это положит конец убийцам в звериных масках...""
 russia.215.a: "Он получил свои пятнадцать минут славы..."
 russia.216.t: "Дело об Убийце в маске Лисы"
 russia.216.d: "Судебный процесс был очень сложным, битва между прокурором и адвокатом длилась целый час, но определить победителя до сих пор невозможно.\n\n"Теперь подзащитный утверждает, что ему приказывали совершать эти убийства путём сообщений на его телефон. Вы проверили это заявление?" Спросил прокурор "Да." утвердительно ответил глава полиции "и что вы обнаружили?" "Телефон был полностью пуст." "Вы нашли улики, подкрепляющие заявление о "звонках с угрозами"?" "Нет. Не нашли" "Ясно... Больше вопросов нет." с уверенностью сказал прокурор.\n\nНо, видимо, адвокат решил, что ему еще рано сдаваться, и начал свою речь "Вы говорите, что не нашли физических улик в поддержку заявлений моего клиента. А как насчёт архивов оператора связи? Полиции ведь нетрудно получить доступ к такой информации?" на что глава полиции ответил "Да, мы изучили записи о звонках подсудимого." На что адвокат незамедлительно ответил "Вы нашли какие-нибудь звонки, которые могли подкрепить заявление моего клиента?" Глава полиции кивнул "Да, подзащитному действительно звонили в тот самый временной промежуток который он указал. Но..."\n\nНе договорив, адвокат прервал его, непонятно, то ли потому, что он торопился, то ли потому, что не хотел, чтобы глава полиции продолжал свою речь "Вам удалось отследить источник этих звонков? Если так, откуда они поступили?" "Да, они поступали из ночного клуба под названием "Золотой Телёнок"." "Теперь мой клиент утверждает, что совершить преступления, за которые он находится перед судом, его принудила итальянская мафия. Есть ли у полиции какая-нибудь информация о связи "Золотого Телёнка" с Итальянской мафией, которая могла бы подтвердить слова моего клиента?" "Действительно, заведение несколько раз отметилось в хронике бандитских разборок. Однако..." в очередной раз перебив начальника полиции адвокат с усмешкой сказал "Это всё, спасибо. Больше вопросов нет."\n\n"Свидетель может сесть. Суд удаляется на перерыв." Сказал судья, ненадолго положив конец конфликту двух умов."
 russia.216.a: "Это будет долгий суд..."
 russia.217.t: "Азов переходит на нашу сторону"
 russia.217.d: ""
 russia.217.a: "Чзх?"
 russia.218.t: "Проусташевский переворот в Хорватии"
 russia.218.d: ""
 russia.218.a: "Пон."
 russia.219.t: "Первая Советская Корпорация"
 russia.219.d: "Совсем недавно была создана компания под названием "Совхозник". Она объединяет под своим крылом такие бренды путинской России, как "Сбер", "Яндекс", "ВК", "Триколор" и многие другие. Гендиректором "Совхозника" выступил Павел Грудинин. Хоть и формально это "Народное Предприятие", у "Совхозника" есть все признаки капиталистической корпорации. Ортодоксальные члены Партии уже успели осудить действия Павла Грудинина, обвинив его в открытом оппортунизме, однако в основном народ нашей страны поприветствовал создание "Совхозника"."
 russia.219.a: "Грудинин - крепкий хозяйственник!"
 russia.219.b: "Будем с интересом наблюдать за развитием...."
 russia.220.t: "ОТЧЕТ ОБ ИНЦИДЕНТЕ ПОСЛЕ ОПЕРАЦИИ - "НЕИЗВЕСТНЫЙ ВРАГ""
 russia.220.d: "КРАТКОЕ ОПИСАНИЕ:\nСледующий отчет служит стратегическим анализом инцидента с дружественным огнем, произошедшего [DATE] в большой Харьковской области, в связи с неисправностью, потерей оперативного управления и последующей нейтрализацией недавно развернутой беспилотной боевой бронированной машины.\n\nЖУРНАЛ ИНЦИДЕНТА: Во время наступательной операции в пределах Харьковской области одна боевая машина, получившая обозначение БМПТ "Терминатор", действовала в составе своего передового подразделения в течение нескольких дней с исключительной боевой и эксплуатационной эффективностью - начал становиться невосприимчивым к инструкциям вскоре после установления враждебного контакта. Согласно сообщениям выживших сухопутных войск и отчетам инженеров, привлеченных для осмотра разбомбленных останков машины, в ее программном обеспечении произошла ошибка идентификации, в результате чего машина немедленно начала беспорядочный огонь, нацеленный на всех без исключения людей-комбатантов в этом районе, без учета принадлежности к боевой группе.\n\nВ результате того, что транспортное средство стало изгоем, подразделения, участвовавшие в наступлении, оказались дезорганизованными и понесли значительное количество потерь, приписываемых транспортному средству, при этом оставшиеся силы обеих сторон предприняли краткое стратегическое отступление из этого района, поскольку оно продолжало наступать на зону операции. После нескольких повторных запросов о подкреплении и маневров воздушной поддержки транспортное средство было в конечном счете отправлено в путь и нейтрализовано через двадцать шесть (26) минут совместными усилиями как наземных, так и воздушных сил в регионе.\n\nПОСЛЕДСТВИЯ: \nРасследование после инцидента, проведенные как инженерами Королевских ВВС, так и персоналом завода-изготовителя машины "Уралвагонзавод", в основном пришли к выводу, что инцидент и неисправность со стороны искусственного интеллекта БМПТ были "крайне необычными" и, как правило, маловероятны для повторения в других подразделениях БМПТ. На Уралвагонзаводе продолжаются исследования по дальнейшим мерам защиты от сбоев искусственного интеллекта, а также по возможным усовершенствованиям программного обеспечения идентификации."
 russia.220.a: "Наверное, все будет хорошо..."
 russia.221.t: "Пополнение Рядов"
 russia.221.d: ""
 russia.221.a: "Их опыт необходим сейчас больше, чем когда-либо...."
 russia.222.t: "Вопрос других партий"
 russia.222.d: "Теперь, когда мы наконец-то получили власть в свои руки, пришло время решить, что мы будем делать с остальными политическими силами в стране. "Единая Россия" однозначно будет уничтожена, а её лидеры преданы суду, но что насчёт остальных? Стоит ли нам с ними расправляться? Конечно же мы будем действовать аккуратно с использованием всех политических технологий и спецслужб, но будет ли это правильно делать в самом начале нашего правления?"
 russia.222.a: "Распустить только Единую Россию."
 russia.222.b: "Разберитесь с фашистами тоже."
 russia.222.c: "Либералы с Единой Россией за одно... их тоже.."
 russia.223.t: "Советский Парламент"
 russia.223.d: "Пришло время распрощаться с злополучной Государственной Думой, созданной Ельциным на крови русского народа... Теперь нам пора создать новый высший орган государственной власти, новый парламент. Что мы возьмём за основу? Однопалатный Верховный Совет до 1990 или же двухпалатный Съезд Народных Депутатов? "
 russia.223.a: "Съезд Народных Депутатов."
 russia.223.b: "Верховный Совет."
 russia.224.t: "Гендерный Вопрос"
 russia.224.d: "Различные феминистические движения, в частности РСД, очень беспокоятся по поводу нашего отношения к гендерному вопросу. В некоторых городах прошли небольшие демонстрации, одиночные пикеты, а в интернете не утихают споры на эту тему. Скорее всего от этого споры и дискуссии в сети станут только жарче, но всё же, наверное, нам стоит раз и навсегда обозначить нашу точку зрения по этой теме..."
 russia.224.a: "Коммунисты всегда были за равноправие полов!"
 russia.224.b: "Мы будем защищать традиционные ценности!"
 russia.225.t: "Второй Сан-Франциско"
 russia.225.d: "К нам поступило предложение создать во Владивостоке Специальную Экономическую Зону, дав на этой территории невероятные преференции и налоговые послабления для иностранных и отечественных компаний. Это хорошо поспособствует развитию данного региона, инвестиции польются рекой! Кстати, граничащему с нами Китаю это решение наверняка очень понравится."
 russia.225.a: "Замечательная идея!"
 russia.225.b: "Не, нам это не нужно."
 russia.226.t: ""Партия Патриотов""
 russia.226.d: "Недавно была создана "Партия Патриотов", организаторами которой выступили такие личности, как Владимир Соловьёв, Маргарита Симонян, Ирада Зейналова и разные другие личности, защищавшие в прошлом путинский режим. Они называют текущее руководство страны слабым и нерешительным, а Валерия Рашкина - "подстилкой либералов"."
 russia.226.a: "Пускай ноют сколько угодно, Народ России сделал свой выбор."
 russia.226.b: "Нерешительным? Что ж, мы им покажем... Арестуйте всех."
 russia.227.t: "Раскрыт Террористический Заговор"
 russia.227.d: "Поступают сообщения о том, что элитное подразделение Спецназа Росгвардии провело рейд в жилом комплексе, предположительно являющемся убежищем подпольной организации. Во время рейда были надеты противогазы из-за потенциальной угрозы применения химического оружия, но это не помешало нашим ребятам задержать всех террористов до единого. После рейда офицер из команды рассказал нашей новостной группе.\n\n"Мы не только обнаружили химическое оружие, но и самое тревожное, что у всех у них были поддельные паспорта. Дураки думали, что они умные, когда пытались сжечь свои настоящие, но мы были достаточно быстры, чтобы вернуть их. Все они немцы, граждане ЕС."\n\nГородские власти отказались комментировать это дело, но мы можем быть благодарны за то, что ситуация не стала кислой и что никто не погиб. Является ли это частью более крупного заговора радикалов по нападению на страну или же это единичная группа, пока неясно."  
 russia.227.a: "Настораживает."
 russia.228.t: "Всплеск Терроризма"
 russia.228.d: "На территории Западной Украины и Прибалтийских Республик активизировались националистические группировки. Они выступают за разрушение воссозданного Советского Союза и восстановление шовинистических режимов на территории Восточной Европы. Они уже начали проводить саботаж и убийства лояльных нам людей. Мы должны что-то предпринять!"
 russia.228.a: "Объявите положение Контр-Террористической Операции!"
 russia.229.t: "Переговоры успешны!"
 russia.229.d: ""  
 russia.229.a: "Ура!"
 russia.230.t: "Переговоры потерпели неудачу"
 russia.230.d: ""  
 russia.230.a: "Ну и хер с ними."
 russia.231.t: "Теракт в Польше"
 russia.231.d: ""  
 russia.231.a: "Ужасная Трагедия..."
 russia.232.t: "Теракт в Румынии"
 russia.232.d: ""  
 russia.232.a: "Ужасная Трагедия..."
 russia.233.t: "Теракт в Калининграде"
 russia.233.d: ""  
 russia.233.a: "Это не просто несчастный случай!"
 russia.234.t: "Тульский оружейный завод серьезно пострадал"
 russia.234.d: ""  
 russia.234.a: "Эти Ублюдки Заплатят!"
 russia.235.t: "УВЕДОМЛЕНИЕ О ПОВЕДЕНИИ"
 russia.235.d: "ОТ РОССИЙСКОГО ГЕНЕРАЛЬНОГО ШТАБА: ДМИТРИЙ БУЛГАКОВ\n\nГенерал Мизинцев, я написал вам несколько писем, в которых информировал вас о грубом поведении ваших людей. Самое вопиющее из этих правонарушений недавно произошло во время наступления под Кривым Рогом. Бойцы 28-й мотострелковой дивизии, которой вы командуете, порезали шины моей командирской машины вместе с другими машинами высокопоставленных офицеров. Я осведомлен о наших разногласиях и поставках снабжения, я буду придерживаться своего заявления, сделанного ранее, мне требуется необходимое топливо, одежда и боеприпасы для продолжения моих наступлений. Я бы хотел, чтобы этот вопрос не дошел до начальника штаба, потому что кто знает, сохраните ли вы свою должность, если Герасимову сообщат об этом фиаско.\n\nПОДПИСАНО:"  
 russia.235.a: "ДМИТРИЙ БУЛГАКОВ"
 russia.236.t: "ОТВЕТ: УВЕДОМЛЕНИЕ О ПОВЕДЕНИИ"
 russia.236.d: "Пойди убейся об вражеский бункер, ты, ёбанный недочеловек, прекрати использовать моих людей для своих ебанутых нападений. Очень жаль, что вражеская артиллерия не похоронила тебя в твоей командирской машине, это спасло бы побольше жизней моих людей и мне заодно приятнее было бы наблюдать за твоим гробом, чем за мешками с трупами, вываливающимися из Кривого, уёбок.\n\nПОДПИСАНО:"  
 russia.236.a: "МИХАИЛ МИЗИНЦЕВ"
 russia.238.t: "Навальный поддержал проведение СВО"
 russia.238.d: "Алексей Навальный на днях выступил с обращением к гражданам Украины: "Дорогие Граждане Украины, наконец настал тот момент, когда вам выпал шанс раз и навсегда покончить с порочным кругом, в котором застряла ваша Страна. От президента к президенту: Ющенко, Янукович, Порошенко, Зеленский - кроме олигархов у руля, которые по факту управляют страной, ничего не меняется! Современная Украина - коррумпированное государство, которому плевать на собственный Народ. Так быть не должно! Россия смогла окончательно одолеть тот беспредел, который творили путинские бандиты, построила истинную демократию и народное благополучие! Поэтому я вас прошу... ради вашего же будущего, ради будущего ваших детей... оказывайте поддержку Российской Армии всеми силами. Солдаты Украинской Армии, разворачивайте свои танки на Киев, на дворцы тех паразитов, которые грабили вашу страну всё это время, а мы вам в этом поможем: победили Абрамовича, одолеем и Коломойского!" Своей речью лидер Политической Партии "Россия Будущего" фактически доказал, что поддерживает проведение Специальной Военной Операции на территории Украины."  
 russia.238.a: "Антивоенное движение погибло, не успев родиться."
 russia.239.t: "Патриотические Игры"
 russia.239.d: "Среди нашей молодёжи очень популярны компьютерные игры. Может будет целесообразно выделить небольшой бюджет на их создание? Студия Kremlin Games уже несколько лет делает игры про эпоху Холодной Войны, в которых игроку позволяют сохранить социализм в нашей стране и привести Родину к величию... Но ребятам однозначно не хватает финансирования. Что скажете?"  
 russia.239.a: "Ну, может быть выйдет что-то интересное."
 russia.239.b: "Государство не будет тратить деньги на какие-то игрушки."
 russia.240.t: "Игра Вышла Успешной!"
 russia.240.d: "Разработчики постарались на славу! Рискнув сделать игру в новом для себя жанре, они решили создать интересное приключение в декорациях Гражданской Войны. Нашим геймерам игра однозначно понравилась, огромная доля хвалебных отзывов пришла именно от российских игроков. На Западе игра не получила такого же успеха, получив статус диковинки с Восточной Европы, однако китайским геймерам она пришлась по душе, фанатский перевод уже готовится энтузиастами. Разработчики же, получив небывалый доход, уже анонсировали продолжение. Что можно сказать в итоге? Советский геймер доволен и горд!"  
 russia.240.a: "Деньги вложены не зря!"
 russia.241.t: "Игра Провалилась!"
 russia.241.d: "Получив деньги, разработчики решили не рисковать и сделали очередной симулятор Генсека ЦК КПСС. Хоть он и получился совсем неплохим, игроки от "Первой Советской Игры" ждали совсем другого. Никому кроме любителей жанра она не пришлась по вкусу, и про неё быстро забыли."  
 russia.241.a: "Больше на подобное дерьмо деньги не тратим."
 russia.242.t: "Патриотические Игры"
 russia.242.d: "Среди нашей молодёжи очень популярны компьютерные игры. Может будет целесообразно выделить небольшой бюджет на их создание? Недавно сформированная студия The Enchanted Wanderer показывает многообещающие успехи, но ей явно не хватает финансирования. Что скажете?"
 russia.242.a: "Хмм... Почему бы и нет?"
 russia.242.b: "У Государства есть дела поважнее"
 russia.243.t: "Игра Вышла Успешной!"
 russia.243.d: "Разработчики превзошли все наши ожидания! Студия The Enchanted Wanderer получив деньги решили выпустить первый серьёзный Российский шутер от первого лица под названием "ВЕСНА".\n\nСобытия игры происходят в альтернативном 2020 году, где коронавирус не вышел за пределы Китая и был быстро побежден, Соединенные Штаты не пали и глобального экономического кризиса не произошло. В 2019 году кандидат Владимир Шматько, пообещавший восстановить отношения с Российской Федерацией, победил на выборах президента Украины с минимальным отрывом. В феврале 2020 года между Украиной и Россией начались переговоры о подписании программы "Украина-Россия", но во время переговоров убивают президента Шматько, и в это же время на Запорожской АЭС происходит теракт. Премьер-министр Игорь Негода, который теперь принял на себя полномочия президента, обвиняет Российскую Федерацию в убийстве Шматько и террористических операциях "с целью оказания помощи сепаратистам Донбасса". Игрок берет на себя роль бойца Сил специальных операций Российской Федерации и отправляется на важную миссию на Украину.\n\nИгра была хорошо принята как российскими, так и иностранными игроками. Игроки отмечают хороший "мультиплеер", который включает в себя несколько фракций, таких как: Россия, Китай, Польша, Украина, США. В Украине Верховная Рада приняла закон, запрещающий продажу игры "ВЕСНА" на территории Украины. Разработчики, получив большой доход от продаж игры, обещают поддерживать игру различными обновлениями и уже анонсировали "боевой пропуск". Несомненно, это большой прорыв для Российской игровой индустрии!"
 russia.243.a: "Великолепно, и самое главное патриотично!"
 russia.244.t: "Игра провалилась!"
 russia.244.d: "Получив деньги, разработчики решили создать новый шутер от первого лица и, видимо, переоценили свои силы... Хотя она получилась неплохой, но игра наполнена тонной ошибок и кучей "доната", из-за чего игроки прозвали ее "Warface 2". Хоть и у неё есть свои фанаты она не оправдала никаких ожиданий."
 russia.244.a: "Ясно... в следующий раз будем думать дважды."
 russia.245.t: "Кража Стальной Короны"
 russia.245.d: ""
 russia.245.a: "Интересно..."
 russia.246.t: "Подготовка к выборам"
 russia.246.d: "Надо выбрать Кандидата на Пост Президента."
 russia.246.a: "Юрий Афонин"
 russia.246.b: "Сергей Левченко"
 russia.246.c: "Павел Грудинин"
 russia.246.d1: "Леонид Зюганов"
 russia.246.e: "Денис Парфёнов"
 russia.246.f: "Борис Кагарлицкий"
 russia.246.b: "Пусть лучше каждый попробует..."
 russia.247.t: "Результаты выборов"
 russia.247.d: "Первый Союзные Выборы Президента прошли, и на них победил..."
 russia.247.a: "...Денис Парфёнов!"
 russia.247.b: "...Александр Лукашенко!"
 russia.247.c: "...Сергей Левченко!"
 russia.247.e: "...Юрий Афонин!"
 russia.247.f: "...Валерий Рашкин!"
 russia.247.g: "...Алексей Навальный!"
 russia.247.h: "...Павел Грудинин!"
 russia.247.k: "...Владимир Соловьёв?!"
 russia.247.z: "...Леонид Пасечник!"
 russia.248.t: "Техасские Националисты Просят о Поддержке!"
 russia.248.d: "Сегодня в Министерство иностранных дел поступило интересное сообщение: повстанческая группа из Техаса умоляет наше правительство предоставить оружие, транспортные средства и общую военную помощь в их стремлении создать независимый Техас со свободными теплыми портами, не связанный ни с одним из федеральных правительств."  
 russia.248.a: "Конечно, мы поможем вашему делу!"
 russia.248.b: "Лучше не надо. Разве они не помнят, что случилось в Аламо?"
 russia.249.t: "Захватить Гостомельский Аэропорт"
 russia.249.d: "Генеральный штаб созвал совещание и определил аэропорт "Антонов" за пределами Киева как имеющий стратегическое значение. Силы ВДВ должны быть переброшены в Беларусь в рамках подготовки к захвату аэродрома рано утром и удержанию до тех пор, пока подкрепления не прорвутся через Чернобыльскую зону отчуждения и не освободят их."  
 russia.249.a: "Пусть они заставят нас гордиться ими"
 russia.250.t: "Поражение в Аэропорту Гостомель"
 russia.250.d: "Это было слишком тяжело для наших людей. Несмотря на все наши усилия, наши войска на аэродроме принесли высшую жертву и погибли в борьбе с фашизмом. Десантники рассеялись по лесам, попали в плен или сдались в плен украинской национальной гвардии. Не обошлось и без нашей маленькой победы - аэропорт еще долго не будет пригоден для использования."  
 russia.250.a: "За потерянных, но это поражение не будет забыто."
 russia.251.t: "Победа в Аэропорту Гостомель"
 russia.251.d: "В шоке от того, что наш неподдерживаемый воздушный десант на аэропорт Хостомеля увенчался успехом, храбрецы, захватившие аэропорт, были освобождены. Украинский генерал Валерий Залужный, по сообщениям, был отруган своим начальством и срочно снят с северного фронта операций из-за нашей великой победы! Международные наблюдатели с новостных каналов сообщают, что Киев готовится к полномасштабному штурму, так как самолеты прилетают в аэропорт и усиливают фронт более закаленными в боях и мотивированными воздушно-десантными войсками."  
 russia.251.a: "Вскоре мы будет обедать в Киеве."
 russia.252.t: "Рашкин Протестует."
 russia.252.d: "17-19 сентября прошли Выборы депутатов Государственной думы Российской Федерации VIII созыва, завершившись в единый день голосования 19 сентября. Ночью 20 сентября, на следующий день после окончания выборов в Государственную думу, глава Московского городского комитета КПРФ Валерий Рашкин организовал акцию протеста против фальсификаций в формате встречи с депутатом. 23 сентября было объявлено о создании коалиционного межпартийного комитета "За отмену ДЭГ​​", в который вошли оппозиционные кандидаты, шедшие на выборы по округам в Москве. Сегодня же протесты продолжились в Москве, Саратове, Екатеринбурге, Уфе, Волгограде и других городах страны."  
 russia.252.a: "Неприятно."
 russia.253.t: "Лось."
 russia.253.d: "Полиция и сотрудник комитета охотничьего хозяйства и рыболовства в Саратовской области остановили машину LADA Largus депутата Госдумы от КПРФ Валерия Рашкина, в багажнике которой оказалась разделанная туша лося. Это произошло в ночь на 29 октября в Лысогорском районе, в 60 километрах от Саратова. Вместе с политиком в салоне находился 49-летний мужчина. \n\nСам Рашкин заявил, что увидел тушу мертвого животного в лесу и хотел передать ее полиции. Возбуждено уголовное дело о незаконной охоте."  
 russia.253.a: "Типичный коммунист."
 russia.254.t: "Новая русская анимация?"
 russia.254.d: "После недавнего успеха "Патриотических игр" в сфере игровых развлечений, некоторые инвесторы начали продвигать идею расширения на другие рынки молодежных медиа, предлагая спонсировать отечественную анимацию, в частности аниме.\nЭто можно считать даже более рискованным начинанием, чем видеоигры, поскольку у россиян очень мало практики в таком стиле, и некоторые идеи, например, возвращение к творчеству Ивана Билибина, уже высказывались. Сторонники аниме утверждают, что это риск с высокой наградой, а также успокаивают некоторые опасения по поводу качества анимации, предлагая нанять китайских и японских талантов для помощи в производстве.\nСюжет аниме должен быть связан с Россией и иметь некий патриотический посыл. Многие предлагают возродить старые концепции, от которых отказались из-за отсутствия достаточного бюджета, в то время как другие придумывают более современные и актуальные сюжеты.\nЧто бы они ни выбрали, они должны получить достаточно средств, чтобы воплотить идеи в реальность."
 russia.254.a: "Посмотрим, что они попробуют"
 russia.254.b: "Разве нет вещей получше, на которые мы могли бы потратить эти деньги?"
 russia.255.t: "Возвращение "Первого Отряда""
 russia.255.d: "Мы успешно вошли в очередной медийный охват! Возрожденная благодаря нашим инвестициям анимационная студия "Молот Энтертейнмент" вернулась с переосмысленным фильмом "Первый отряд", который изначально был выпущен в 2009 году. На новообретенные деньги они смогли вернуться к своему первоначальному видению эпизодического сериала.\nИстория разворачивается во время Великой Отечественной войны и следует за молодой пионеркой Надей (с Катаной), которая обладает паранормальными связями с царством мертвых, благодаря чему она завербована Оккультным отделом НКВД, созданный для противодействия растущей угрозе Аненербе, обе стороны все глубже проникают в Лимбо и мистические пророчества, а также новые технологии в надежде выиграть войну Она воссоединяется со своими мертвыми друзьями, используя свои силы и машинай созданную Советами, и вместе они путешествуют по Лимбо и материальному миру, чтобы разрушить планы Германии. Аненербе, с их стороны, помогает тетонский рыцарь Гвидо фон Вольф, который был призван древним проклятием и теперь стремится отомстить русским за поражение во время Ледового побоища.\nПервый сезон состоит из семи эпизодов, а финал заканчивается потрясающим клиффхэнгером.\n"Первый отряд" получил высокую оценку российских зрителей, многие отмечают качественную анимацию, улучшенное развитие персонажей по сравнению с оригиналом, и не уклонения от демонстрации жестокости нацистов во время войны, а также делая правильный акцент на патриотизме и том, почему русские воевали на войне. Однако некоторые западные критики раскритиковали его за "явную историческую предвзятость" и "представление немцев в плохом свете"."
 russia.255.a: "Потрясающий успех!"
 russia.256.t: "Попаданец По-Русски"
 russia.256.d: "Беспокойные новости от нашей недавней инвестиции: анимационная студия "Цвета Ижевска" выпустила "Попаданец по-русски", и, похоже, "Первое русское аниме" было встречено менее чем восторженно.\nИстория такова: действие происходит, когда русский компьютерщик и геймер - Тимур Фролишов, попадает под трамвай, читая произведения Германа Романова, умирает, но затем телепортируется в новое фантастическое царство, в страну Медведия, с явной отсылкой к России. Без особых усилий он быстро собирает "гарем" из полуголых женщин, становится правой рукой короля и получает его дочь в подарок, "сражаясь" с древним злым владыкой Бидоном и его армией укро-орков. Сезон насчитывает 32 серии, однако почти половина из них не что иное, как филлеры или пляжные эпизоды с не менее разочаровывающей финальной серией.\n\nЗрители раскритиковали его за плохую анимацию, копирку сюжетов из сотен других аниме "Исекай", абсолютное отсутствие какого-либо прогресса или развития, а традиционалисты в ярости из-за изображений женщин. Хотя, по крайней мере, некоторые довольны... эротическими артами девушек из аниме."
 russia.256.a: "Исекай - лучшее, что они придумали?!"
 russia.257.t: "Вынос Ленина"
 russia.257.d: "После победы ЛДПР одобрение новой "Чистой" Администрацией весьма спорного предложения - вынос тела Владимира Ленина из мавзолея было лишь вопросом времени. Вскоре после того, как был отдан приказ, команда специалистов быстро вытащили тело Ильича и перевезли в новое неизвестное место, а строители сняли с Могилы все советские памятнки, закончив зачеркиванием нетронутых с 1930-х годов букв "ЛЕНИН".\nВ то время как власти утверждают, что тело Ленина было почтительно похоронено, как того требует его завещание, на Волковском кладбище рядом с его матерью, многие наблюдатели и несколько оставшихся коммунистов относятся с подозрением и утверждают, что из-за закрытой "церемонии" и отсутствия видеодоказательств за пределами могилы, возможное местонахождение тела до сих пор неизвестно.\nНекоторые слухи в Интернете предполагают, что Ленин был кремирован, а прах выброшен в бескрайнее море, поскольку ненависть Жириновского к ленинским большевикам широко известна, такой исход не маловероятен.\n\nС выносом Ленина его могила теперь пустует, и некоторые члены ЛДПР ищут идеи, как превратить ее из места "поклонения большевикам". Одна сторона проголосовала за то, чтобы перестроить в Музей жизни Владимира Жириновского, показать людям, кто здесь главный, и просветить их о его жизни. Другие, однако, предлагают переделать его в усыпальницу Семьи царя Николая II, расстрелянных по указу Ленина в 1918 году, поместить их прах вместо его тела, восстановить историческую справедливость жертвам".
 russia.257.a: "Покаянная святыня за преступление против царской семьи."
 russia.257.b: "Начать строительство Музея жизни Верховного Правителя"
 russia.258.t: "Разрушение Ельцин-центра"
 russia.258.d: "Одним из наиболее позорных периодов российской истории, за исключением кровавого правления большевиков, являются 90-е годы Ельцина, и ничто так не подчеркивает это, как проклятый Ельцин-центр, расположенный в так называемой "либеральной столице" - Екатеринбурге.\nМногие патриоты хотели, чтобы он исчез, и ЛДПР готова это сделать это.\nРанним утром команда уничтожения собралась возле Центра, ожидая команд. Приказы начались со сноса памятника Ельцину, на котором уже были нарисованы такие слова, как "Предатель" и "Продажный". Затем они перешли к главному зданию, уничтожив магазины, сувенирные лавки и музей, который был построен в честь президентства Ельцина.\nВся операция была грязной, но на ее завершение ушло всего полтора дня. После того, как они закончили, все, что осталось, - это бесплодное пустое пространство с большим количеством мусора.\nПоскольку эта пустота, безусловно, испортит внешний вид города, члены ЛДПР предложили два предложения по строительству на этом месте. Первое предложение - Грандиозный собор, прекрасно зная, насколько ядовита либеральная реакция на религиозные объекты в Екатеринбурге, это было бы не только отличным проявлением нашей верности вере, но и продемонстрировало бы силу нашего руководства. Второе предложение - это крупный учебный центр для патриотически настроенной молодежи, где они будут изучать основы обороны, военную практику и историю нашей Родины (играя в Цивилизацию Сида Мейера), что, несомненно, сделает следующие поколения более подготовленными к борьбе за нашу святую землю и нашего лидера."
 russia.258.a: "Грандиозный план собора"
 russia.258.b: "Учебный Центр для Патриотической Молодежи" 
 russia.259.t: "Приднестровский Вопрос"
 russia.259.d: "Спустя 30 лет у Приднестровья наконец-то появилась сухопутная связь с Россией, и теперь возникает вопрос о будущем страны"
 russia.259.a: "Народ Приднестровья достаточно настрадался, он имеет право присоединиться к Федеральному округу Новороссия"
 russia.259.b: "Молдова должна быть реформирована на основе Приднестровского опыта"
 russia.259.c: "Народ Приднестровья достаточно настрадался, он имеет право присоединиться к Федеральному округу Новороссия"
 russia.260.t: "Реорганизация Монархической партии"
 russia.260.d: "Они конституционные монархисты, а не черносотенные типы."
 russia.260.a: "Монархия - это историческая форма России!"
 russia.261.t: "Правые России Объединяются"
 russia.261.d: "Многие организации правого толка объединились, чтобы склонить ЛДПР к еще большему расизму во главе с Дмитрием Демушкиным и КО. Конец Локи"
 russia.261.a: "Какая прелестная компания!"
 russia.262.t: "Пророссийские Протестующие!"
 russia.262.d: ""
 russia.262.a: "Чёрт!"
 russia.263.t: "Пророссийские Протестующие!"
 russia.263.d: ""
 russia.263.a: "Чёрт!"
 russia.264.t: "Пророссийские Протестующие!"
 russia.264.d: ""
 russia.264.a: "Чёрт!"
 russia.265.t: "Будущее Единой России"
 russia.265.d: "Когда наша победа была закреплена, судьба "Единой России" все еще висела в воздухе.\n\nБольшая часть партии состоит из карьерных оппортунистов, которые подлизываются только к тому, кто выше их. Изначально созданные для того, чтобы просто передавать нужные Путину бумаги, теперь они решили, что у них есть право думать за себя. Не говоря уже о том, что многие из них совершенно не соответствуют занимаемым должностям.\n\nТем не менее, в партии, которая де-факто является партией Путина, еще осталось много талантов. Именно этот талант в море посредственности позволил Путину сделать то, что он сделал, и если мы сможем привлечь этих специалистов и технократов на нашу сторону, польза будет огромной.\n\nЧто это будет?"
 russia.265.a: "Полностью запретите этих паразитов!"
 russia.265.b: "Запретить, но привлечь на нашу сторону их наиболее способных членов."
 russia.266.t: "Родина становится новым центром"
 russia.266.d: "После поражения ЕР многие не столь радикальные патриоты искали партии, к которым можно было бы присоединиться. С установлением национальной демократии со временем "Родина" стала крупнейшим представителем другого подхода к политике, возглавляемая харизматичным Дмитрием Рогозиным, они выступают если не за возврат к эпохе путинизма, то, безусловно, за некоторые политики прошлого."
 russia.266.a: "Если люди захотят..."
 russia.266.b: "Если они настоящие патриоты, они должны присоединиться к ЛДПР!"
 russia.267.t: "Преображение Партии?"
 russia.267.d: "После того, как мы вернули Восточную Европу и укрепили нашу власть, мы столкнулись с печальной потерей нашего великого лидера. Многие члены партии предложили нам увековечить его идеи в названии партии.\nВ течение многих лет Жириновский предлагал переименовать партию в свою честь после его смерти. Многие в партии приняли эту идею близко к сердцу.\n\nИменно великое видение Жириновского привело нас к победе. Мы действительно дети его великих идеалов и его ученики.\n\nС другой стороны, название "ЛДПР" слишком знаковое, и именно с этим названием Жириновский привел Россию к великой победе."
 russia.267.a: "Мы сыновья и дочери Жириновского..."
 russia.267.f: "Жириновская Партия - Звучит Гордо!"
 russia.267.z: "Жириновская Партия - Звучит Гордо!"
 russia.267.b: "ЛДПР - слишком хороший бренд!"
 russia.268.t: "Новое Белорусское Правительство"
 russia.268.d: "С формированием нового правительства в Беларуси, как мы должны относиться к лояльности?"
 russia.268.a: "Мы должны делегировать полномочия местным лоялистам."
 russia.268.b: "Никакой децентрализации, прямое правление из Москвы."
 russia.269.t: "Комната Дебатов"
 russia.269.d: "Комната. Дебаты. Серьезные дебаты.\n\nДве группы лиц, вероятно политические фракции, о чем-то спорят. О чем-то важном. Это действительно решит судьбу чего-то большого.\n\nВсе решения уже были сделаны. Их переговоры имеют мало смысла. Очень много слов и мало дела. Решать надо. Решать срочно.\n\nМножество больших идей. Сотни идей поменьше. Тысячи слов. Возможно даже миллионы.\n\nВ итоге остается лишь одна мысль..."
 russia.269.a: "Это "регентство" должно закончиться, пришло время восстановить законных правителей."
 russia.269.b: "Реформисты Слуцкого добиваются превосходства."
 russia.269.c: "Власов всегда был его любимчиком."
 russia.269.e: "Реформисты Слуцкого добиваются превосходства."
 russia.269.f: "Власов всегда был его любимчиком."
 russia.269.g: "Господа, это зал для дискуссий, здесь нельзя ругаться!"
 russia.269.j: "Бут выходит победителем."
 russia.269.k: "Шерин всегда был по-настоящему предан ЛДПР."
 russia.269.l: "Могущественная Церковь вынуждает ЛДПР подчиниться ее требованиям."
 russia.269.l1: "Кургинян использует свои тайные связи и свергает ослабленную ЛДПР."
 russia.269.l3: "Бизнес-элиты лоббируют назначение Старовойтова на этот пост."
 russia.269.l6: "Битва была равна..."
 russia.270.t: "Союз Нерушимый"
 russia.270.d: "Коммунистическая Партия и Советский Народ наконец-то воссоединили Союз, который они потеряли более 30 лет назад. Это поистине великое событие, но мы пока не можем радоваться: хотя наши экономики довольно тесно связаны, нам придется восстанавливать большинство связей между Республиками, и это не считая государственного строительства!"
 russia.270.a: "Наши цели ясны, задачи определены. За работу, товарищи!"
 russia.271.t: "Чубайс покинул Россию."
 russia.271.d: "Чубайс ушел в отставку и покинул страну из-за неожиданных результатов выборов. Два знакомых Чубайса рассказали нам, что он вместе со своей супругой Авдотьей Смирновой уехал в Стамбул. Министры докладывают о признаках ускоренного исхода капитала за рубеж, в кулуарах старые связисты олигархических групп уже совещаются с юристами и западными консультантами - что делать, куда бежать и как восстанавливать свои состояния?\nНационализация неизбежна, мы её обещали, мы её проведём, вопрос лишь в том, каким образом она пройдёт. У нас имеется три плана:\n1) Провести переговоры с лояльным олигархами-государственниками, передав в госсектор 60% их активов, при этом сохранив менеджмент и заключив долгосрочные контракты, остальных же постепенно вывести из управления;\n2) На первом этапе экспроприировать без задержек нефть, газ, уголь и металл, выплатив компенсации по государственным ценам, остальные отрасли оставить у прежних владельцев, но обложить «антиолигархическим» налогом 75% на сверхприбыль;\n3) Провести тотальную национализацию ключевых секторов с компенсацией в виде государственных облигаций под 6% годовых, формально прежний менеджмент остаётся на своих местах, получая "госзарплаты" и премии"
 russia.271.a: ""Народно-Государственный союз""
 russia.271.b: ""Приоритетная Национализация""
 russia.271.c: ""Стратегический Выкупной Социализм""
 russia.272.t: "Галицийская Интеграция"
 russia.272.d: ""
 russia.272.a: "ага ну я думаю сработает да порешали всё хорошо"
 russia.273.t: "Воссоединение Польши и Галиции"
 russia.273.d: ""
 russia.273.a: "Ну, это их решение"
 russia.274.t: "Болгарские Антикоррупционные Протесты"
 russia.274.d: ""
 russia.274.a: "Им придется с этим смириться"
 russia.274.b: "Уступить требованиям"
 russia.275.t: "Выборы!"
 russia.275.d: ""
 russia.275.a: "Либералы..."
 russia.276.t: "Выборы!"
 russia.276.d: ""
 russia.276.a: "Кайф..."
 russia.277.t: "Выборы!"
 russia.277.d: ""
 russia.277.a: "автодемы(фашисты?)..."
 russia.278.t: "В Болгарии Вынесен Вотум Недоверия"
 russia.278.d: ""
 russia.278.a: "Интересно."
 russia.279.t: "Партия возрождения, выбранна в Болгарии"
 russia.279.d: ""
 russia.279.a: "Что ж, по крайней мере, они за нас"
 russia.280.t: "Выборы!"
 russia.280.d: ""
 russia.280.a: "Кайф..."
 russia.281.t: "Выборы!"
 russia.281.d: ""
 russia.281.a: "Кайф..."
 russia.282.t: "Выборы!"
 russia.282.d: ""
 russia.282.a: "Либералы..."
 russia.283.t: "Выборы!"
 russia.283.d: ""
 russia.283.a: "демоКРЫСЫ..."
 russia.284.t: "Ночное Небо Багдада"
 russia.284.d: "Не надо шутить с войной. Здесь другие ребята. Это не Германия, это не Афганистан. Джордж, твоих солдат здесь порвут на части. 250 тысяч отборных солдат Ирака. Они все разнесут. Они всю пустыню пройдут на один час Они взорвут все твои эсминцы, всех твоих журналистов, дипломатов. Джордж, ты ковбой. Ты остановись, б..., ты кончай, ты патроны спрячь подальше на склад и забудь про своего папу. У нас был один мудак, отомстил за брата, б..., и рухнула Великая Российская империя. И другой чудак был, за своего дедушку отомстил, и рухнул Советский Союз. И ты повторишь ту же ошибку. Ты папу забудь, папа отработал свое. Ты подумай о будущем Америки. Она гибнет. Твоя молодежь бежит из твоей страны. Там никто не хочет жить в Америке, никто! Эта барахолка, б...! Доллар, доллар, доллар, ... Эта грязная зеленая бумажка! Ни души, музыки нету, б..., нет писателей у тебя. Весь мир слушает Чайковского, Достоевского, б...! Фестивали, спорт только в России... И здесь, в Ираке. Здесь любят президента, а тебя презирают, презирают."
 russia.284.a: "Мы отомстим за Хусейна."
 russia.284.b: "Отношения с Ираном гораздо важнее."
 russia.285.t: "Виктор Бут сбежал из Америки"
 russia.285.d: "Несмотря на многочисленные сообщения о полной анархии в США, Виктор Бут смог сбежать обратно на родину. Сегодня он наконец-то ступил на родную землю. Он не раскрывает всех деталей своего путешествия, но пообещал написать об этом книгу. Его дальнейшие шаги в России неизвестны, но он проявил интерес к участию в политической жизни страны."
 russia.285.a: "Поистине достойно восхищения."
 russia.285.b: "Поистине достойно восхищения."
 russia.285.c: "Поистине достойно восхищения."
 russia.285.k: "Поистине достойно восхищения."
 russia.286.t: "Виктор Бут вступает в ЛДПР"
 russia.286.d: "Печально известный торговец оружием Виктор Бут связался с ЛДПР!"
 russia.286.a: "У нас есть место для человека с его талантами."
 russia.287.t: "Виктор Бут жертвует на развитие России"
 russia.287.d: ""
 russia.287.a: "Настоящий Патриот!"
 russia.288.t: "Рашкин Сажает Бут в Тюрьму"
 russia.288.d: ""Он не коммунист! Он фашистский националист, русский шовинист!" - Рашкин."
 russia.288.a: "Из одной тюрьмы в другую."
 russia.289.t: "Земский собор"
 russia.289.d: "Впервые почти за 400 лет вновь собрался Земский собор. На этот раз для того, чтобы выбрать нового царя великой России."
 russia.289.a: "Кирилловичи возглавят Россию!"
 russia.289.b: "Михайловичи возглавят Россию!"
 russia.289.c: "Популярность Гаврила среди солдат привела его к трону!"
 russia.290.t: "Марш Царских Дней"
 russia.290.d: "Недавно монархисты в крупных городах начали организовывать марши во имя царских времен. Хотя это было нормально с тех пор, как мы пришли к власти, эти новые марши стали горячими точками для людей которые хотят полного возвращения монархов, усиленные недавней кончиной "регента".\nВсе больше и больше монархистов собирают поддержку вокруг идеи возвращения царя... Ну, одного из них."
 russia.290.a: "Мы должны подумать об этом."
 russia.290.b: "Романовы ушли в прошлое."
 russia.291.t: "Окончание Временного Правительства"
 russia.291.d: "Похоже, что эпохе временного правительства в Румынии подходит конец. Основанный ещё во время Европейской Войны пророссийский режим мало кого устраивал и был причиной бесконечных споров внутри самой страны. И вот текущий президент [ROM.GetLeader] объявил о проведении долгожданных выборов в стране.\n\nНаиболее способными на данный момент кажутся два кандидата. Первый - Джордже Симион, яркий консерватор и бескомпромиссный антикоммунист. Он уже смог сплотить вокруг себя националистов обещаниями о пересмотре нечестного мирного договора. Второй - Кэлин Джорджеску, положительно относящийся к России кандидат и сторонник сосредоточения на внутреннем развитии Румынии. Выборы пройдут в ближайшее время, и нам остаётся лишь ждать результата."
 russia.291.a: "Вперед, к новому старту!"
 russia.292.t: "Референдум по Трансильвании"
 russia.292.d: "Демократически избранный Джордже Симион не заставил долго ждать своего первого хода. Как и было обещано в его предвыборной компании,  он сразу же начал вести активные действия против Трансильвании. Так, были введены серьёзные пошлины и Румыния уже угрожает полноценными санкциями если ситуация не будет разрешена. Сам Симион призывает к немедленному референдуму по статусу страны и уже выступил с обращением, где, помимо всего, поддержал румынских сепаратистов, действующих против текущего правительства на Карпатах. Правительство Трансильвании сейчас предварительно согласилось на референдум, однако ходят слухи о том, что текущий лидер пытается найти поддержку у президента Венгрии."
 russia.292.a: "Интересно."
 russia.293.t: "Образование Секейской Автономии"
 russia.293.d: "В свете продолжительных переговоров правительство Трансильвании согласилось на проведение референдума по присоединению к Румынии. В результате более 80% населения страны проголосовали за воссоединение. По новому договору, который будет подписан в ближайшее время, Трансильвания вновь становится частью Румынии. При этом Венгерское меньшинство получит свою автономию на части провинции Секейский Край и официальную государственную защиту.\n\n[ROM.GetLeader] уже сообщил, что данный акт является исправлением великой исторической ошибки и объявил о своём намерении защищать права румын по всему миру."
 russia.293.a: "Неожиданно."
 russia.294.t: "Будапештский Договор"
 russia.294.d: "Президенты Румынии и Венгрии Джордже Симион и Виктор Орбан соответственно провели экстренные телефонные переговоры по статусу Трансильвании. В их ходе лидерам, кажется,  удалось прийти к соглашению  устраивающему обе стороны. Так, южные провинции вновь присоединятся к Румынии, а на севере будет основано Содружество Северная Трансильвания, которое формально будет являться частью Румынии, однако будет иметь широкую автономию, а также будет иметь право своего лидера демократическим путём. "
 russia.294.a: "Интересно получилось."
 russia.295.t: "Лишний"
 russia.295.d: "Как Они живут словно ничего не произошло? Очередная стопка, горечь от палёной водки ненадолго забила собой горечь поражения. Не стало Ваньки с завода, такой работящий мужик был. Не стало Витька, не стало Димы. А что же Им до этого? Им всё равно. Словно не было войны. Словно страна не разваливается на части. Словно все вернулись с полей...\n\nЕщё одна стопка... Может не слышали об этом? Может быть прослушали... Я должен им рассказать во что бы то ни стало! Ключи в руке. Одежда? Да к черту её... Я обязан! Как можно быстрее! А что если снова случится!?\n\nДверь отворяется с громким скрипом, резкий холод бьёт по почти нагому телу. Фары машины освещают медленно падающие снежинки. Где-то вдали шумит город. Вдруг внезапный рёв, гам! Вот оно! Но нет, это всего лишь пролетает самолёт сверкая огнями где-то в небесах. А может они всё поняли? Может смирились, а не как я?"
 russia.295.a: "А может забыли и про меня..."
 russia.296.t: "Выборы!"
 russia.296.d: ""
 russia.296.a: "Неожиданно..."
 russia.297.t: "Венгрия Встаёт на Защиту Трансильвании"
 russia.297.d: "Похоже, что ситуация на Карпатах накаляется. Недавно президент Венгрии Виктор Орбан выступил с экстренным посланием к нации, где резко осудил действия Румынии по отношению к своим соседям и заявил, что венгерский народ не позволит  силой диктовать свою волю независимым странам. Ожидается, что в ближайшее время Орбан отправит миротворческий контингент для поддержания суверенного статуса Трансильвании. Несмотря на то что [ROM.GetLeader] выступил с резким осуждением такой риторики, похоже что полномасштабного конфликта пока не ожидается."
 russia.297.a: "Отлично."
 russia.298.t: "Победа Джорджеску"
 russia.298.d: "На внеочередных румынских выборах одержал победу Кэлин Джорджеску. Спокойной консерватор, он является противником  резких действий в отношении потерянных территории, хотя, впрочем, не отрицает, что когда-то Румыния будет должна заняться этим вопросом. Конечно, его приход к власти спровоцировал волну народных недовольств. Так оппозиционно настроенные граждане называют его марионеткой кремлёвских олигархов. Что же принесёт его президентство разрушенной войной стране? Сейчас будущее Румынии туманно, и нам лишь остаётся ждать развития событий."
 russia.298.a: "Джорджеску наше всё!"
 russia.299.t: "Победа Симиона"
 russia.299.d: "На внеочередных румынских выборах одержал победу Джордже Симион. Яркий консервативный националист, он смог успешно сыграть на уязвленной гордости народа и тем самым обеспечил себе победу. Одним из его пунктов предвыборной кампании было возвращение Трансильвании в родную гавань. Удастся ему это или нет, покажет время."
 russia.299.a: "Интересно."
 russia.300.t: "Вече Начинает Заседание"
 russia.300.d: "После реорганизации российской политической структуры во время нашей революции. Солярный Вождь Александр Дугин пришел к выводу, что лучший курс действий - это, наконец, установить новую по-настоящему демократическую форму правления в Евразии. Было создано Вече, аналогичное Верховному Совету прошлого, однако, с большим представительством и межклассовым участием, со многими "политическими общинами", которые теперь лоббируют поддержку своих депутатов.\n\nСолярный Вождь заявил, что новая система все еще находится в переходном периоде, поскольку целью евразийства является полная демократия, но такой эксперимент не может быть выполнен, пока западный тоталитарный либерализм разгуливает на свободе со своими собаками у наших ворот."
 russia.300.a: "Пусть расцветут сто цветов"
 russia.301.t: "Возвращение Партократии"
 russia.301.d: "С каждым днем возрождённого коммунистического правления в России становится все более очевидным, что с возвращением к "старым добрым временам" также последовало возвращение абсолютного партийного контроля. Все больше и больше людей понимают, что для продвижения по службе и достижения более высокого уважения нужно быть членом партии.\nТочно так же, как в СССР формируется раздутая каста аппаратчиков, партийные комитеты получают больше работы и больше привилегий, а также растет потребность в желание получит на лапу.\nКонечно, новые члены партии верят и следуют линии партии, установленной Политбюро, вне небольшой беседы на своих кухнях.\nОднако, на самом деле, это не является проблемой, такое количество рабочей бюрократии помогает централизовать руководство на местах, люди по-прежнему счастливы, поскольку преимущества возрожденных социальных программ перевешивают бюрократическое упрямство. Пока экономика растет, Политбюро нечего бояться."
 russia.301.a: "Партия - ум, честь и совесть нашей эпохи."
 russia.302.t: "Протесты против реформ Рашкина"
 russia.302.d: "В последние дни правительственные здания в крупных городах стали свидетелями притока протестующих против Рашкина. На первый взгляд может показаться, что это надоедливые путинисты и другие сторонники старого режима, но при ближайшем рассмотрении вокруг можно увидеть много коммунистов и их лозунги, иногда перевешивающие другие. Они утверждают, что Рашкин - либерал, западный шпион и новый Горбачев, а коммунисты добавляют, что он предал принципы истинного ленинизма, и начинает вредную либерализацию, которая приведет молодую РСФСР к катастрофе.\nСекретные службы, по приказу Политбюро, начали расследование возможного финансирования со стороны антикоммунистических деятелей, но пока ничего не было найдено.\nЭти протестующие, однако, кажутся всего лишь громким меньшинством, абсолютное большинство населения в настоящее время пожинает плоды новой социальной экономики и радуется ветрам перемен, принесенным реформаторами-рашкиницами."
 russia.302.a: "Эти незначительные препятствия не остановят движение прогресса!"
 russia.303.t: "Новые Лица Для России"
 russia.303.d: ""
 russia.303.a: "Министры Жириновского"
 russia.303.b: "Министры Совета"
 russia.304.t: "Царев Объявляет Референдум"
 russia.304.d: "Олег Царев в своем недавнем выступлении раз и навсегда поставил точку в вопросе интеграции Новороссии и объявил о проведении референдума об интеграции в состав России"
 russia.304.a: "Нам нужно начать готовиться!"
 russia.305.t: "Успешный Референдум"
 russia.305.d: "В результате референдума, прошедшего на территории Новороссии, подавляющее большинство жителей высказались за воссоединение с Россией. По официальным данным, более 90% участников голосования поддержали интеграцию республики в состав России. Правительство назвало это событие «волей народа» и подчеркнуло, что Москва уважает решение жителей региона. Власти также заявили, что воссоединение завершает многолетний процесс «восстановления исторической справедливости», ссылаясь на общие культурные и исторические корни.\nВ городах России и Новороссии прошли масштабные шествия и празднества. Тысячи людей с флагами и символикой вышли на улицы, чтобы отметить это событие. В Москве, Ростове-на-Дону, Донецке и Луганске состоялись концерты, фейерверки и массовые гуляния. «Это торжество правды и единства нашего народа», - заявил в интервью Леонид Пасечник. Между тем, ряд западных стран раскритиковали референдум, назвав его "нелегитимным", однако в Кремле эти заявления отвергли, подчеркнув, что воля жителей Новороссии является единственным определяющим фактором. "
 russia.305.a: "Россия возвращает своих потерянных сыновей."
 russia.306.t: "Поспешный Референдум"
 russia.306.d: "Несмотря на то, что референдум прошел успешно, плохая работа избирательных участков и плохая организация в целом поставили нас в плохое положение"
 russia.306.a: "Без неудач не бывает побед."
 russia.307.t: "Слухи об украинском наступлении на Донбассе"
 russia.307.d: ""
 russia.307.a: "Свяжитесь с Новороссией"
 russia.308.t: "Новороссия Просит Вмешательства"
 russia.308.d: ""
 russia.308.a: "Денацификация Украины начинается сегодня!"
 russia.308.b: "Страдания наших новороссийских братьев начинаются сегодня!"
 russia.308.c: "Слава России будет восстановлена сегодня!"
 russia.309.t: "На Камчатке Создан Пункт Приема Американских Беженцев"
 russia.309.d: ""Американская мечта" теперь скорее похожа на "американский кошмар". Заигрывания американского правительства с политическим радикализмом и глобалистским либерализмом привели к тому, что теперь Америка представляет из себя кровавое поле боя между федеральным правительством, сепаратистскими движениями, коммунистическими повстанцы и ультраправыми ополченцами. Крупнейшие мегаполисы - Нью-Йорк, Чикаго, Лос-Анджелес - превратились в арену уличных боёв, где мирные жители оказались между молотом и наковальней.\n\nНо что интересно, так это то, что наши дипломаты и разведка сообщают о массовом исходе населения. Тысячи отчаявшихся американцев бегут в порты Дальнего Востока, пытаясь любыми способами покинуть охваченную пламенем страну. Особенно тревожны сообщения о подходе к нашим основным портам - Владивостоку, Петропавловску-Камчатскому, Магадану - целой флотилии переполненных гражданских судов и даже военных кораблей, на борту которых находятся не только беженцы, но и дезертиры, политические активисты и боевики враждующих фракций.\n\nМногие из беженцев выбрали Россию как место временного пребывания для будущего переезда в Европу или Азию, однако нашлись и те, кто уже подал заявление на получение российского гражданства в надежде спастись от будущих штормов на российском "ковчеге" стабильности и процветания. Так или иначе, судьба всех этих людей теперь на плечах российского правительства."
 russia.309.a: "Что ж, сделаем для них все, что в наших силах."
 russia.310.t: "Новиков Расстрелял Политбюро"
 russia.310.d: "Вот это меня вштырило"
 russia.310.a: "Слава Партии"
 russia.311.t: "Дискриминация русского меньшинства в странах Прибалтики"
 russia.311.d: ""
 russia.311.a: "Те, кто несет ответственность, заплатят"
 russia.312.t: "Украинское Сопротивление"
 russia.312.d: "Если кто-то думает, что бандеровцы потерпели поражение после нашей победы над НАТО, то он дурак. Люди, пролившие кровь за свою идеологию, не исчезли, и они не позволят падению своего правительства остановить их в борьбе против нас. "Украинское сопротивление" было недавно сформировано из бандеровцев и солдат предыдущего режима. Хотя на данный момент они ограничены в уличных боях с правоохранительными органами и противодействии протестующим, если украинское правительство не сможет их сдержать, это может перерасти в открытое вооруженное сопротивление. Мы помним, как прошел Евромайдан.\n\nВ то время как фразы типа "Москоляку на гиляку" стали устаревшими, мы не можем забывать, что большие пожары могут начаться от одной искры. Мы не можем допустить повторения событий в одесском Доме профсоюзов, где наши храбрые патриоты были сожжены заживо похожими толпами.\nМы должны положить этому конец, и положить этому конец сейчас."
 russia.312.a: "Террористы снова показывают свои лица."
 russia.313.t: "Общенациональные Протесты на Украине"
 russia.313.d: "Благодаря "замечательному" управлению кризисом нашими властями, антироссийское движение теперь настроено на повторение Евромайдана.\n\nОтлично. Нам придется привлечь больше сил и живой силы для борьбы с этой проблемой, и, похоже, примирения придется ждать еще долго.\n\nИ все же это позор. Эти протесты приобрели массовый характер, и украинское правительство не может отреагировать на это должным образом.\n\nПрямо как на последнем Евромайдане, ха. Когда Янукович позволил пророссийским протестующим умереть, когда он сломя голову бросился к нашим границам вместо того, чтобы остаться в Украине и дать отпор. Идиотизм и глупость снова стали причиной пролития русской крови."
 russia.313.a: "Дерьмо."
 russia.314.t: "Конец Протестов"
 russia.314.d: "К счастью, нам удалось подавить эти протесты.\n\nАрест организаторов и подавление их собраний сотворили чудеса, и теперь украинское правительство уверено в своих позициях. Точно так же, как Красная армия разгромила бандеровцев после их победы, это сделали и мы.\n\nОднако сейчас не время бездействовать. В Украине все еще есть масса ветеранов войны с противоборствующей стороны, которые могут присоединиться к подобным движениям, и наша работа - предотвратить это. Они должны быть реинтегрированы в общество, но не до такой степени, как это сделал Хрущев с помилованиями УПА.\n\nВ любом случае, на данный момент кажется, что борьба окончена. Десятилетие вражды подошло к концу, и Украина шагает в будущее вместе с нами, как мы делали все прошлые столетия. Время залечит все раны, мы позаботимся об этом."
 russia.314.a: "Наконец-то..."
 russia.315.t: "Судьба Шойгу"
 russia.315.d: "Одно из главных лиц Путинского Режима - Шойгу, Министр Обороны, который ничего не сделал с нашей разлагающейся армией после либеральных реформ Сердюкова. Его поддержкой в Октябре 1993-его года Ельцин заручился во время своего государственного переворота, после чего карьера Шойгу пошла в гору. Этот человек - обычный рекламщик и карьерист, но никак не военный... Однако это не значит, что у него нет навыков, которыми мы не могли бы воспользоваться. Какое же его место в новой Советской России?"
 russia.315.a: "Он ещё может пригодится..."
 russia.315.b: "Разжаловать, лишить всех наград, посадить в тюрьму."
 russia.315.c: "Этого мало! Необходимо провести масштабную чистку."
 russia.316.t: "Судьба Ельцин-Центра"
 russia.316.d: "Одним из наиболее позорных периодов российской истории являются 90-е годы Ельцина, и ничто так не подчеркивает это, как проклятый Ельцин-центр, расположенный в так называемой "либеральной столице" - Екатеринбурге. Многие патриоты хотели, чтобы он исчез, и мы готовы пойти на встречу. Уничтожение Ельцин-Центра могло бы стать отличным символом того, что Россия входит в новую эпоху...\n\nНо стоит ли оно того?\n\nМожет быть не стоит разрушать этот дорогостоящий комплекс, а вместо этого переделать его в Музей Преступлений Капиталистической России? Таким образом мы сможем навсегда закрепить в памяти Народа все 30 лет страданий, которые пережила Россия."
 russia.316.a: "Сносите!"
 russia.316.b: "Музей Преступлений Капиталистической России? Звучит интересно..."
 russia.317.t: "Однополые браки в России?"
 russia.317.d: "История однополых отношений в России долгая и сложная. В первые годы существования Советского Союза зарождалась их терпимость, но со временем она постепенно уменьшалась. При Владимире Путине однополые браки стали законными во многих странах мира, но в России они по-прежнему были незаконными. После прихода к власти коммунистов этот вопрос был поднят вновь, а после недавней отмены всех законов о богохульстве дебаты достигли своего пика. На недавней "Прямой линии" с президентом РСФСР Валерием Рашкиным его спросили о легализации однополых браков в России.\n- Валерий Фёдорович, добрый день, я активист "России будущего", и у нас к вам очень важный вопрос.\n- Добрый день.\n- Валерий Фёдорович, что там с однополыми браками? Этот вопрос поднимается все чаще, и мы хотели бы знать, будут ли они легализованы. Обсуждаете ли вы это в партии?\n- Смотрите, в нашей стране сейчас по вашему мнению притесняются люди нетрадиционной ориентации? Мы как-то ограничиваем их права? Все репрессивные законы отменены, чего вы еще хотите?\n- Легализации... однополых браков...\n- Ну тогда назовите мне хоть одну социалистическую страну, где они разрешены.\n- На... На Кубе разрешены однополые браки.\n- Знаете ли вы, что там был проведен референдум по его легализации? Ну хорошо, если бы у нас прошёл референдум, вы были бы не против?"
 russia.317.a: "- Да, вполне. Спасибо за ответ."
 russia.318.t: "Результат Референдума"
 russia.318.d: "Решение Рашкина о проведении референдума народ встретил неоднозначно: пока борцы за традиционные ценности твердели о том, что сам факт проведения референдума - это ещё один удар по России, радикальные ЛГБТК+ активисты говорили об однополых браках, как об неотъемлемом праве человека, и что их необходимо разрешить без всяких референдумов.\nНо в итоге референдум прошёл мирно и почти без проишествий.\nРезультат: 84,57% против и 15,42% за. \nОднополые браки остаются в России под запретом."
 russia.318.a: ""Будете жениться у себя в психушке!""
 russia.319.t: "Формирование "Новой России""
 russia.319.d: "После манифеста новообразованной "Народной России" партия "Новые люди" начала предпринимать шаги, чтобы вписаться в новый механизм российской политики. Собрав либералов, готовых работать с государством, партия "Новые люди" объявила о своем собственном манифесте "Новая Россия" и формировании Новой России как новой партии в ответ на "Народную Россию", манифест определил цели партии и планы в отношении новой России. На первом собрании был избран лидер партии: Александр Нечаев."
 russia.319.a: "Что? Я такого не ожидал."
 russia.320.t: "Создание Сил Самообороны России"
 russia.320.d: ""
 russia.320.a: "Нам ничего не остается, как запугать..."
 russia.321.t: "НАТО требует военных репараций"
 russia.321.d: ""
 russia.321.a: "У нас нет другого выбора, кроме как принять..."
 russia.321.b: "Попытка согласования условий"
 russia.322.t: "НАТО соглашается изменить военные репарации"
 russia.322.d: ""
 russia.322.a: "Отлично"
 russia.323.t: "НАТО отклоняет просьбу о военных репарациях"
 russia.323.d: ""
 russia.323.a: "Да будет так"
 russia.324.t: "Приглашение в АДГ"
 russia.324.d: ""
 russia.324.a: "Ладно"
 russia.324.b: "Да чё-то не..."
 russia.325.t: "Изумрудный Город"
 russia.325.d: "Прогресс - это будущее, а будущее принадлежит Коммунизму. После новой инициативы партии по увеличению финансирования науки, в погоне за утопическим идеалом, были созданы и обновлены десятки исследовательских центров. Однако самый ошеломляющий из продвинутый и них - "Предприятие 3826", был построен в горных районах Советского Казахстана. Здесь проводятся прорывные исследования в области биолого-ботанических исследований, экспериментальной медицины и высоких технологий, и все они осуществляются в огромных комплексах, названных в честь знаменитых Советских и Российских ученых, в то время как инженеры и исследователи живут в специально построенных городах рядом с их объектами.\nМечтательные умы переполнены идеями об улучшении нашей Советской Родины, от ИИ-автоматизации до летающих городов, один из которых может стать новой столицей нового Союза.\nЭто Предприятие, несомненно, станет родиной многих технологий завтрашнего дня."
 russia.325.a: "Прекрасное завтра наступит скоро."
 russia.326.t: "Гражданская Война в Колумбии"
 russia.326.d: "С началом военных действий в Колумбии нам предстоит принять решение о том, какую группировку поддержать в их вооруженной борьбе за объединение страны."
 russia.326.a: "Мы поддержим Официальное Правительство"
 russia.326.b: "Мы поддержим Армию Национального Освобождения"
 russia.326.c: "Мы поддержим Фронт Карлоса Патино"
 russia.327.t: "Российская "Гум"Помощь прибыла"
 russia.327.d: "Несмотря на политические разногласия, Россия направила нам крупные пакеты поддержки, которые в основном включают летальную помощь. Мы всегда были друзьями с русскими".
 russia.327.a: "Спасибо, товарищ фашист!"
 russia.327.b: "Спасибо, Русские!"
 russia.328.t: "Фейковые новости в социальных сетях"
 russia.328.d: "В последние дни безудержная бомбардировка фейковыми новостями в социальных сетях привела к массовой дестабилизации в различных секторах нашей страны".
 russia.328.a: "Кто за этим стоит?!"
 russia.329.t: "Миронов поддерживает Медведева"
 russia.329.d: "Ранее сегодня лидер левой партии СРЗП поддержал Дмитрия Медведева и возглавляемую им "Единую Россию" на предстоящих президентских выборах. Аналитики ожидали этого заявления, поскольку СРЗП уже давно оказывает широкую поддержку предшественнику Медведева, а Сергей Миронов высоко оценил обещания кандидата в президенты по дальнейшей демократизации страны. Поскольку избирательная кампания продолжается, поддержка умеренных левых станет благом для "Единой России", которая стремится получить еще один мандат на управление страной."
 russia.329.a: "Патриоты должны держаться вместе."
 russia.330.t: "СРЗП присоединяется к коалиции КПРФ"
 russia.330.d: "На утренней пресс-конференции лидер СРЗП Сергей Миронов объявил о поддержке своей партией КПРФ на предстоящих президентских выборах. Учитывая, что СРЗП уже давно сотрудничает с "Единой Россией", это может показаться скромным разочарованием, но это признак того, что направление российской политики меняется. Поскольку некоторые ожидают, что КПРФ продемонстрирует свои самые высокие результаты с 1996 года, поддержка умеренной левой оппозиции может стать одним из первых факторов, определяющих развитие событий в ходе бурной избирательной кампании."
 russia.330.a: "Социалисты должны держаться вместе."
 russia.331.t: "Террористические акты на Западе Украины"
 russia.331.d: ""
 russia.331.a: "Уничтожьте этих разбойников!"
 russia.332.t: "Открытое восстание на Западной Украине"
 russia.332.d: ""
 russia.332.a: "Они ничему не научились с прошлого раза."
 russia.333.t: "Реформа Верховного Совета"
 russia.333.d: "Коммунистическая партия Российской Федерации планирует реформировать советский парламент, приняв модель Всекитайского народного собрания. Новая система создаст единый законодательный орган с представителями всех регионов страны, стремясь стать более демократичным и представительным. Тем не менее, некоторые члены старого режима выступают против изменений, и сохраняется озабоченность по поводу их реализации и прозрачности. КПРФ настроена на то, чтобы этот смелый эксперимент в области демократии сработал."
 russia.333.a: "Лучшая политическая система 21го века."
 russia.334.t: "Укрепление Партии"
 russia.334.d: "Тут что должно быть."
 russia.334.a: "Лучшая политическая система 21го века."
 russia.335.t: "Красные Флаги Над Донбассом"
 russia.335.d: "После нашей победы на выборах, стало ясно, республики Донбасса тоже должен измениться. Наши спецслужбы провели ряд операций нацеленных на дискредитацию нынешних правительств, а потом с помошью лоялных нам военных, провели мирные перевороты.\nУ товарища Рашкина другое виденье Донбасса, он станет пристанищем для нового советского Украинского правительства, и уже были проведены необходимые бюрократические мероприятия. Совсем скоро будет создана новая Украинская Советская Федеративная Социалистическая Республика, у учли ошибки прошлого и новая советская Украина будет такой же федерацией как и Россия. В Донецке была создана широкая социалистическая левая коалиция из местных коммунистов, беглых членов КПУ, и участников Объединения "Боротьба". Украина уже осудила нас и назвала это новым этапом эскалации.\nКонечно, на Донбассе много тех кто недоволен нашими действиями и считают это предательством интересов Русского населения, но с этими шовинистами мы разберемся."
 russia.335.a: "Вся Украина будет красной."
 russia.336.t: "Красный Донбасс"
 russia.336.d: "После раундов долгих переговоров в Москве, главы республик Донбасса вернулись в свои города вернулись домой не с единой повесткой - провести съезд и подписать соглашение о создании "Союза Народных Республик". Проект, который в 2014-м казался умирающей идеей и был записан в архив, получил новую актуальность после официального отказа Киева исполнять Минские соглашения.\nТеперь главными пунктами правительств Республик являются социальное равенство, экономика трудящихся и народная демократия, а также расширенное сотрудничество между двумя государствами. Для достижения этой цели с помощью Москвы была создана единая межреспубликанская социалистическая организация - "Единый Фронт" - союз всех прогрессивных сил региона. Главы ЛДНР были избраны ее временными руководителями, а также получили партийные билеты КП РСФСР. Как отмечает один луганский Telegram-канал: "Это был только вопрос времени, когда новые силы в Кремле переделают наш регион в соответствии со их видением России."\n\nДелегатам остаётся только определить основную задачу этого Союза, чем станет этот проект: сильным независимым новороссийским государством или подпольной кузницей будущего переформатирования Украины в единую федеративную советскую республику."
 russia.336.a: "Советской Новороссии быть!"
 russia.336.b: "Вся Украина будет красной!"
 russia.337.t: "Неосоветская Демократия"
 russia.337.d: "Валерий Рашкин, президент Советской России, совместно с учёными из РУСО выпустили свою первую книгу "Неосоветская Демократия". Книга, которая описывает основные идеологические принципы современных российских коммунистов, новую модель государственного устройства Российского Государства и перспективы её будущего развития. Её хвалят за простоту в объяснении и доступность: для того, чтобы понять, о чём она совсем не нужно перед этим прочитывать все произведения классиков Марксизма. Книга стала основой для образовательных программ в некоторых университетах, что свидетельствует о значимости и важности ее содержания. Однако, она получила жесткую критику от крайне левого лагеря, который обвиняет Рашкина в ревизионизме, неправильной интерпретации опыта строительства социализма в СССР и банальных противоречиях, которые встречаются в его произведении. Несмотря на критику, "Неосоветская Демократия" получила широкое распространение среди студентов и пользуется популярностью в кругах, поддерживающих Рашкина, а также продолжает вызывать интерес и обсуждения в российской политической и экономической среде.  За рубежом книга не получила такой популярности, но она позволила многим экспертам лучше понять то, что сейчас в целом происходит в нашей стране."
 russia.337.a: "Важная работа для развивающейся идеологии!"
 russia.338.t: "Новая Цель ОНФ"
 russia.338.d: "С каждым новым шагом, который делает власть под руководством Дмитрия Медведева, понятие партийной политики в России становится всё более размытым.\n\nНа первый план выходит Общероссийский народный фронт, который объединяет не только политические, но и трудовые, и волонтёрские организации - профсоюзы и объединения активных граждан.\n"Единая Россия", являясь самым крупным участником ОНФ, привлекает своих бывших оппонентов и партнёров, как в Думе, так и за её пределами, к сотрудничеству с организацией. Некоторые эксперты называют это общеполитическим единством внутри власти.\n\nРешения, принимаемые ОНФ, становятся движущей силой российского общества."
 russia.338.a: "У России есть направляющая рука."
 russia.339.t: "Доклад  ФСБ о Подозрительной Деятельности"
 russia.339.d: "После недавнего разгона русофобских организаций ФСБ начало докладывать о том, что некоторые более радикальные элементы, похоже, начали соединяться друг с другом и организовываться в неизвестных местах. ФСБ также перехватило некоторые их листовки, в которых они подвергали сомнению "Националистические Границы России" и саму идею нашего суверенитета, утверждая, что возможное вмешательство запада могло бы быть благотворным для коммунистов в России."
 russia.339.a: "Глядите за ними в оба."
 russia.340.t: "Организуются Анти-Правительственные Коммунисты"
 russia.340.d: "Сообщения ФСБ подтвердились. Некоторые люди, бежавшие от коммунизма, начали говорить в интернете о "Коммунистической народно-освободительной армии" и их борьбе с "российским неоимпериализмом". Это тревожное развитие событий, и нам нужно обратить на это пристальное внимание.\n\nС возрождением безбожных коммунистов в Западной Европе после их поражения мы можем ожидать, что эти террористы получат финансирование от своих европейских покровителей."
 russia.340.a: "Следите за ними!"
 russia.341.t: "Теракт в Новороссийске"
 russia.341.d: "Новости из Новороссийска очень тревожные. В одном из их портов произошёл взрыв, в результате которого пострадали многие портовые рабочие. Экстремистская организация "КНОА" взяла на себя ответственность за нападение и заявила, что не остановится, пока "реакционная природа России" не будет уничтожена.\nНаш лидер выступил с публичным обращением, в котором осудил нео-эссеров, назвав их "красными бесами из преисподней". Он пообещал либо посадить их в тюрьму, либо уничтожить, оставив решение за ними."
 russia.341.a: "Ещё одно доказательство кровожадной сущности коммунистов."
 russia.342.t: "Стрельба в Рязани"
 russia.342.d: "Недавно созданная радикальная коммунистическая организация "КНОА" активизировала свою деятельность и стала более конфронтационной после взрыва в Новороссийске. Один из её членов открыл огонь на центральных улицах Рязани.\nК счастью, преступник был быстро задержан. Пострадавших среди гражданского населения не было, лишь один сотрудник полиции получил незначительные травмы."
 russia.342.a: "Они за это поплатятся!"
 russia.343.t: "ФСБ Обозначает КНОА Террористической Организацией"
 russia.343.d: "После серии ударов со стороны так называемых 'освободителей рабочего класса', ФСБ открыто заявило о мерах, принятых, чтобы наказать и уничтожить эту новую террористическую угрозу. Были собраны люди и ресурсы для начала операций, направленных на разоружение КНОА и их возможных сообщников."
 russia.343.a: "Работайте, братья!"
 russia.344.t: "ДОКЛАД О КОНТР-ТЕРРОРИСТИЧЕСКОЙ ОПЕРАЦИИ"
 russia.344.d: "ОТ КОМАНДУЮЩЕГО НАЦИОНАЛЬНОЙ ГВАРДИЕЙ: ВИКТОРА ЗОЛОТОВА\n\nУважаемый Верховный Главнокомандующий, после точных и скоординированных ударов российской гвардии и сил безопасности организация "КНОА" была разгромлена! Наши войска окружили то, что от неё осталось, когда она пыталась бежать в горы Кавказа. После непродолжительного боя большинство из них сдались.\n\nСудя по всему, они хотели создать "революционное советское правительство" и вести "партизанскую войну". К счастью, мы смогли остановить этих экстремистов.Я убеждён, что KNOA больше не представляет угрозы для России. Теперь мы можем объявить нашему народу о победе закона и порядка над террористической угрозой."
 russia.344.a: "Отличная Работа!"
 russia.345.t: "Анти-Коммунистические Процессы"
 russia.345.d: "Короче, тут будут фамилии тех, кого мы забанили в ВК."
 russia.345.a: "Пожизненное заключение."
 russia.345.b: "Смертная казнь."
 russia.346.t: "Экономический Бум в Новороссийске!"
 russia.346.d: ""
 russia.346.a: "Невероятно"
 russia.347.t: "Восстание в Польше"
 russia.347.d: ""
 russia.347.a: "Мы должны помочь им!"
 russia.347.b: "Пусть сами разбираются..."
 russia.348.t: "Иностранные Наёмники Замечены в Беларуси"
 russia.348.d: ""
 russia.348.a: "Устроим им Настоящий Ад!"
 russia.349.d: ""
 russia.350.t: "Русский Карточный Дом"
 russia.350.d: "Западникам российская политическая система всегда казалась загадкой, а на самом деле в ней не было ничего из ряда вон выходящего, вне немногих "национальных особенностей". Политическая сцена поделена между тремя крупнейшими партиями:\n£GFX_CPRF_logo Коммунистическая партия Российской Федерации - СССР пал не так давно, многим россиянам до сих пор симпатичны социалистические идеи и ностальгия, вкупе с олигархическим неравенством, всё это дает очки коммунистической популярности. \n-\n£GFX_UR_logo Единая Россия - на протяжении десятилетий держащая большинство и де-факто партия президента. ЕР создаёт новый взгляд на Россию, выходящий за рамки прошлых формаций.\n-\n£GFX_LDPR_logo Либерально-Демократическая Партия России - несмотря на название, националистическая, популистская партия, возглавляемая энергичным шоуменом. Если коммунисты хотят добиться СССР 2.0, то ЛДПР стремится к Империи 2.0.\n\nВсе они практически ни в чем не согласны, только, может быть, в одном: они все хотят привести Россию к величию. Они бы вечно дрались и спорили, если бы не один человек - Владимир Путин, объединитель, он стоит над ними всеми, управляя их сотрудничеством. Пока он у руля, они будут продолжать играть по его правилам."
 russia.350.a: "Маятник качается стабильно..."
 russia.350.b: "Я хочу знать больше!"
 russia.353.t: "Запад Отказывается!"
 russia.353.d: "Документ был у Алексея на столе. Он понимал, что он значит, но всё ещё не мог этому поверить. Просьба о смягчении удара по российской экономике засчёт смягчения репараций была отвергнута Евросоюзом. Что ж, "отвергнута" не то слово. Этот документ также перечислял корпорации, которые должны были быть проданы Европейским партнёрам, чтобы "обеспечить взаимное доверие". Это было немыслимо. Репарации должны были уничтожить лишь предыдущее правительство. И всё же, после того, как у власти встало про-западное демократическое правительство, ЕС использует эти разрушительные репарации, чтобы подмять под себя большую часть российского бизнеса. Хуже всего, то что если Россия согласится на все эти концессии, ей не удастся их выплатить ещё по крайней мере 200 лет. Это нереально. Навальный это знал. Но вот чего он не мог понять, так это то, почему НАТО не сдержало свою часть сделки. Они пообещали ему смягчение репараций и подлинную интеграцию в Европу, пообещали возврат оккупированных городов. Ему была обещана возможность создать поистине свободную, процветающую Россию. Её у него забрали.\n-"Нам стоит просто согласиться." - сказал Волков, правая рука Алексея в ФБК.\n-"Это тебе ЕС платит, чтобы ты такое говорил?" - спросил Максим Кац, блогер, ставший лидером.\n-"Что ты сказал?"\n-"В отличие от некоторых из нас, я хочу не отдыхать на виллах до конца своих дней, а сделать реально процветающую нацию. Мы все знаем, как ты обливал грязью Венедиктова, чтобы тебе прибавили финансирование."\n"Хватит. Я подумаю насчёт ответа. Можете идти." - Алексей вздохнул. НАТО явно не хочет восстановления России. Что там, она не хотела её восстановления и после развала СССР. Даже во времена Ельцина  запад поддерживал чеченских сепаратистов, пытаясь при этом превратить Россию в оружие против Китая.\n"Мы никогда не должны были процветать." - прошептал он. Эта мысль его разозлила. Россия была разорвана, потеряла одну пятую своего населения. Теперь те люди живут либо под нестабильными режимами, либо под оккупацией и гонениями. Огромный наплыв граждан Крыма и Донбасса, бегущие в Россию, были тому подтверждением. Ростову и Белгороду тоже сильно досталось, расходятся даже слухи о "де-руссификации", на которую запад закрывает глаза..\n"Путин был прав..." - пришёл к неожиданному выводу Навальный."
 russia.353.a: "За настоящую свободу нужно сражаться."
 russia.354.t: "Список Каца"
 russia.354.d: "После недавнего перелома с отказом Берлина, Максим Кац, один из лидеров партии "Россия Будущего", опубликовал серию статей, в которых он выступил с разгромными заявлениями касательно нескольких видных министров, среди которых особенно выделяется премьер-министр Леонид Волков, обвиняя их в том, что они слепо встали на сторону ксенофобии. Позднее Кац был замечен входящим в Кремль для того, как полагают СМИ, чтобы встретиться с президентом Навальным с глазу на глаз.\nРезультаты встречи всё ещё неясны, но политика Навального в последнее время заметно смещается в сторону анти-западного популизма, так что можно смело предположить, что эти деятели недолго будут оставаться на своих позициях."
 russia.354.a: "Начало Новой Эры"
 russia.355.t: "Русские Подвергаются Угнетению в Казахстане!"
 russia.355.d: ""
 russia.355.a: "Немедленно потребуйте провести референдум!"
 russia.356.t: "Россия требует референдум!"
 russia.356.d: "Токаев в депрессии"
 russia.356.a: "Эрм"
 russia.356.b: "ЗАВАЛИ ЕБАЛО, ЧЁРТ!!!"
 russia.357.t: "Правительство Казахстана Отказалось!"
 russia.357.d: ""
 russia.357.a: "Тогда будем по-плохому."
 russia.358.t: "Гвардейская Дивизия Зашла в Москву!"
 russia.358.d: "Сегодня привычная вечерняя жизнь столицы была прервана звуками едущих танков и солдатских переговоров. Всего за час дивизии Росгвардии удалось бескровно занять все правительственные здания. Командующий Национальной Гвардии, Виктор Золотов, дал понять в экстренном телевизионном сообщении, что это жёсткое решение вынудила его принять неспособность гражданского правительства ЛДПР быстро урегулировать кризис. Он пообещал возврат к нормальной жизни и стабильности, как только критическая ситуация будет разрешена. Золотов завершил свою речь, сказав "Слава России!" и призвав всех законопослушных граждан продолжать выполнять свои ежедневные обязанности."
 russia.358.a: "Хотя бы обошлось без "Лебединого Озера"."
 russia.359.t: "Окончательное Решение Золотова"
 russia.359.d: ""
 russia.359.a: ""Лишь те, кто смогут продолжить видение Жириновского...""
 russia.359.b: ""Гражданские политики ненадёжны...""
 russia.360.t: "Внеочередные Выборы!"
 russia.360.d: ""
 russia.360.a: "...Виктор Золотов!"
 russia.360.b: "...Сергей Шойгу!"
 russia.360.c: "...Алексей Дюмин!"
 russia.361.t: "Российский Союз Альтернативных Сексуальностей"
 russia.361.d: "С момента начала реформации по всей стране было создано множество социальных групп, однако одна из них привлекла внимание не только Российских СМИ, но и их западных коллег. Сформировавшийся совсем недавно, но уже набирающий обороты "Российский Союз Альтернативных Сексуальностей" заявляет, что представляет часть ЛГБТК России, противостоящую западному лицемерию.\n\nПредседатель организации, Михаил Лаков, написал об этом в их манифесте: "Друзья, братья и сёстры, я хотел бы обратить ваше внимание на главное "противоречие" нашей группы: почему мы должны быть против запада? Годами все ЛГБТ организации нашей страны целились на запад пытаясь пронести сюда прогрессивизм. Но вот, Европа пришла, и что она нам оставила? Руины, бедность и оккупацию. У них нет права права так обращаться с равными людьми, несмотря ни на какие вины предыдущих правительств. Запад проповедует равенство и инклюзивность, в лучшем случае не обращая при этом внимания на бедственное положение наших братьев в их не таких уж прогрессивных государствах-членах, а в худшем - помогая их забивать. Европа сбилась с правильного пути. Наш народ видит в нас предателей, и как их можно в этом обвинять? Мы и сами были одурачены прайд-парадами в Париже и Берлине. Если мы будем держаться вместе, единой страной, мы сможем показать всем, что мы боремся против зла сатанинского запада, прячущегося под фарфоровыми масками. Вместе мы сможем сделать Россию маяком надежды и свободы."\n\nЗападные ЛГБТК+ организации уже осудили РСАС, назвав её ультранационалистической и реваншистской, гетеро-любящей группой. Их голоса, однако, до России не доносятся, когда как голос Лакова, открыто поддерживаемого президентом Навальным, становится только громче." 
 russia.361.a: "Таким геям я мог бы доверить тыл... кхм."
 russia.362.t: "Гавриил Дорошин Хочет Пойти на Войну"
 russia.362.d: "Гавриил Дорошин - потомок Николая I по женской линии. Старшая дочь императора Мария Николаевна - его прабабушка в восьмом колене. Вдобавок он имеет отношение к французской императорской фамилии. Муж Марии Николаевны - внук Жозефины, супруги Наполеона.\n\nНо великокняжеский титул передавался только по мужской линии, так что на российский престол Гавриил Дорошин не претендует. Он чтит семейные корни.\n\nЧасть его родственников погибла во время Первой мировой или была расстреляна после революции. А прабабушка Тамара Лейхтенбергская де Богарне эмигрировала во Францию. Гавриил родился уже там - в Марселе.\n\nПервый раз Гавриил отправился в Донбасс в 2015 году. Тогда ему было 18 лет. Он бросил учебу (мечтал стать фотографом) и вступил в батальон "Оплот" Александра Захарченко. Два года воевал в разведке, был пулеметчиком. Получил позывной "Тасман" в честь тасманского дьявола, некрупного, но свирепого хищника.\n\nТеперь он желает отправиться на фронты Европейской войны. Оставим ли мы носителя царской крови в безопасности, или же позволим ему отдать долг родине?"
 russia.362.a: "Настоящий патриот! Запрос принят."
 russia.362.b: "Мы не можем позволить пролиться голубой крови, запрос отклонён." 
 russia.363.t: "Родина, Которую Я Когда-то Знал"
 russia.363.d: "Светлана Михайлова никогда не пропускала автобус на работу в центр Санкт-Петербурга. Город всегда был суматошным, а поездка на работу - немного длинной, но это ее не беспокоило. Да и что ее могло беспокоить? По российским меркам платили прилично, а при тех договоренностях, которые она заключала, увольнение было маловероятным. Но эти материальные причины были второстепенными. Настоящая привязанность была связана с тем, что город так долго был частью ее жизни. Даже сейчас, когда времена изменились, она всегда помнила свой любимый город, свой любимый Ленинград, и в автобусе она вспоминала, как проезжала по улицам.\n\nЛенинград, величайший город жемчужина СССР, колыбель революции, великое достижение русского и советского общества. Как она могла забыть все, что он ей дал? Она помнила свои школьные годы, службу в городском отделении комсомола, свою первую работу в коммунистической партии, время, проведенное с друзьями и семьей на городских бульварах, и достопримечательности, мимо которых она проходила каждый день. Это был город, который она так любила вспоминать.\n\nНо все, что она знала об этом городе, казалось, исчезло в одночасье. Она больше ничего не могла узнать, и это пугало ее.\n\nВсе места, вплоть до названия области, были переименованы. Памятники были перенесены в музеи. Советская иконография, выбитая на фасадах многих зданий, была вырезана. Даже большой указатель "Ленинград" на окраине города был снят. Теперь весь город вел себя так, словно СССР никогда не существовало, но теперь она понимала, почему.\n\nЭто был новый город, новая Россия. Общественная память об СССР была хирургически ликвидирована, чтобы освободить место для России до 1917 года и сегодня. Теперь они не хотели, чтобы вы помнили Советский Союз. Они хотели, чтобы россияне знали только о Романовых и Жириновском.\n\nСветлана наконец перестала смотреть и устремила вперед опечаленный нейтральный взгляд. Она могла лишь молча оплакивать то, что было раньше."
 russia.363.a: "Октябрь? Что это?" 
 russia.364.t: "Второй Октябрьский Манифест"
 russia.364.d: "Октябрьский манифест 1906 года был документом, который служил для частичной модернизации Российского Императорского Правительства, мы должны снова обратиться к нашему прошлому и установить его как основу для Царя, по которой можно строить Россию дальше.\n\nКогда Первый Октябрьский манифест был введен в действие, Россия была в муках революции 1905 года и ее принятие установило Думу, Дума, конечно, была в основном бессильна и останется такой с этим новым Октябрьским манифестом. Новый Октябрьский манифест противоречит реформам ЛДПР, направленным на централизацию власти в руках Жириновского и будущих председателей партий, но теперь манифест передает исполнительную власть в руки царя. Царь, которого мы выбрали, был выбран за их мудрость, за их кровь, за их проницательность, ЛДПР приняла этот манифест, зная, что будущее России теперь в руках царя.\n\nВидение, которое Царь навязывает государству сейчас, неизвестно, в отличие от царя Николая II, который даже после принятия этого Манифеста все еще сталкивался с сопротивлением, наш новый царь может быть спокоен, зная, что ЛДПР уничтожила все сопротивление до войны, и теперь после войны в нашей победе народ счастлив с нашим правительством. Однако послевоенное ликование продлится недолго.\nВсё в руках Царя, которы поведёт нас вперед, мы можем двигаться к старому стилю русской автократии, мы можем двигаться к конституционной монархии, более похожей на систему Соединенного Королевства, мы можем двигаться к разрушению, будущее, которое мы создали для России, является захватывающим, особенно когда Европа находится в хаосе, и мы смотрим на наших побежденных врагов, когда их правительства массово падают перед коммунистами по всему континенту. Это так же захватывающе, как и страшно, видеть, как большевизм поднимается вновь, неизбежно готовясь нанести нам новый удар.\n\nБразды правления теперь в ваших руках, Великий Царь, ведите Российскую Империю к славе и процветанию, сохраните нашу победу на века вперед, подготовьте народ к будущим битвам, которые обязательно потрясут государство в свое время, по какому бы пути вы нас не повели, мы с вами, Великий Царь."
 russia.364.a: "Царствуй на славу нам!" 
 russia.365.t: "В Глазах Смотрящего"
 russia.365.d: ""
 russia.365.a: "Золотов назначает себя председателем ЛДПР!"
 russia.365.b: "Золотов формирует Военно-Государственный Совет!"
 russia.366.t: "Игорь Жириновский Под Огнём!"
 russia.366.d: ""
 russia.366.a: "Павел Грудинин начинает собирать поддержку."
 russia.366.b: "Жириновский использует своё влияние, чтобы подавить оппозицию." 
 russia.367.t: "Союзники Грудинина"
 russia.367.d: ""
 russia.367.a: "ЛДПР больше нельзя доверять, время для перемен."
 russia.367.b: "Истинные сторонники ЛДПР поддержат утверждения Грудинина." 
 russia.368.t: "Игорь Жириновский Смещён!"
 russia.368.d: ""
 russia.368.a: "Грудинин начинает крупную реформацию государства."
 russia.368.b: "Грудинин становится новым председателем ЛДПР." 
 russia.369.t: "Под Пристальным Надзором"
 russia.369.d: "Несмотря на наше отношение к социализму и другим радикальным течениям, мы должны обеспечить демократию и право выбора для наших подданных. Однако передавать власть в руки независимым левым партиям слишком опасно - у нас уже есть горький исторический опыт. Чтобы не допустить подобного снова, мы обратимся к идеям С. В. Зубатова, создав подконтрольные нам левые партии и вверив надзор над ними Охранному отделению. Так мы будем уверены, что их политика не выйдет за рамки дозволенного, а крестьяне и рабочие Империи получат возможность законно высказывать свою позицию и защищать свои права в рамках этих партий."
 russia.369.a: "Правда одним, флейта другим."  
 russia.370.t: "Российские Всенародные Выборы"
 russia.370.d: ""
 russia.370.a: "...Сергей Фургал!" 
 russia.370.b: "...Денис Пушилин!" 
 russia.370.c: "...Александр Белов!" 
 russia.370.f: "...Алексей Журавлёв!" 
 russia.370.g: "...Алексей Журавлёв!" 
 russia.370.j: "...Максим Сурайкин?!" 
 russia.371.t: "Новая Одежда Императора"
 russia.371.d: ""
 russia.371.a: "Мы не забываем наше прошлое, мы его контролируем." 
 russia.372.t: "Наследие Путина"
 russia.372.d: "Даже несмотря на недавнюю кончину президента России Владимира Путина, его популярность только усилилась благодаря его преемнику и протеже - Дмитрию Медведеву, занявшему жесткую позицию в отношении продолжения курса Путина вопреки всем трудностям, что заставило общественный имидж Медведева сместиться в фигуры сродни Сталину, а Путина - Ленину. Теперь, достигнув уровней, выходящих за рамки простого признания, идолопоклонство долголетия президента стало более распространенным, и термин "Путинист", который часто употреблялся либо оппозиционерами, либо гражданами-патриотами, теперь начал появляться в государственном СМИ, как положительная характеристика политической линии страны."
 russia.372.a: "Его мечта жива!" 
 russia.373.t: "ЛДПР Смещает Слуцкого!"
 russia.373.d: "Несмотря на продвижение имиджа великого реформатора, сам Слуцкий теряет популярность в ЛДПР. Сегодня, когда Слуцкий выезжал в Омск в рамках "Национал-демократической" платформы, внеочередное заседание Верховного Совета ЛДПР вытеснило его с поста председателя, а также с должности кандидата в президенты на предстоящих выборах.\nВ шоке и недоумении, что люди, которых он лично поставил на эти высокие посты, предали его, у Слуцкого нет явных сторонников, чтобы снова претендовать на правящую позицию, и теперь он будет проводить остаток своих дней, как и прежде, рядовой член партии."
 russia.373.a: "Иронично." 
 russia.374.t: "Донбасские Лидеры Формируют РНРП!"
 russia.374.d: "После освобождения Донбасса многие новороссийские политики, в том числе лидеры двух народных республик, покинули ЛДПР и занялись независимой политикой. После объявления совершенно новых выборов некогда справедливые лидеры частично признанных государств объединились в гонке за высший пост в Кремле. Русская Народная Республиканская Партия, сформированная Пасечником и Пушилиным, претендует на то, чтобы представлять новый российский менталитет, борьбу за самоопределение русских и длительную ностальгию по стабильному обществу начала 2010-х годов. Благодаря своей идее "Русского Республиканизма" и внушительному общественному мнению о том, что донбас станет будущим российской политической элиты, они могут набрать достаточно голосов, чтобы выиграть гонку."
 russia.374.a: "Храбрым судьба помогает." 
 russia.375.t: "ЛДПР Выдвигает Кандидатом Фургала!"
 russia.375.d: "Многие зрители пристально следили за выбором ЛДПР в президенты на следующих выборах, после отстранения Слуцкого от должности, было только горстка тех, кто действительно достоин такой должности. Неудивительно, что Сергей Фургал, которого ЛДПР уже давно готовит как борца против коррупитона, и человек с честной душой, был избран лидером партии во время выборов. Поскольку ЛДПР становится все меньше и меньше того, за что когда-то выступал Жириновский, многие задаются вопросом, сможет ли новый имидж ЛДПР завоевать им голоса."
 russia.375.a: "Человек с честной судьбой!" 
 russia.376.t: "Белов Получает Поддержку Националистов"
 russia.376.d: "Одним из многих освобожденных политических заключенных правого крыла в первые дни правления Жириновского был Александр Белов, эксцентричный бизнесмен с националистическими симпатией. Несмотря на то, что у него не было никаких проблем с правительством ЛДПР, кроме нескольких зануд, рассматривая политические реформы Слуцкого как отступление от "Национальной Российской Политики", он снова стал стойким оппозиционером. На этот раз Ниже, будучи среди немногих соответствующих крайне правых фигур, получил достаточную поддержку от различных организаций, с большими суммами денег, которые были вложены в его политической кампании. Тем не менее, даже со всем этим, он все еще самый маловероятный победитель на этих выборах."
 russia.376.a: "А вот и радикал!" 
 russia.377.t: "Родина Формирует Национальный Фронт"
 russia.377.d: ""Родина" - одна из немногих политических партий, сформированных при правительстве Жириновского, получила достаточную поддержку, чтобы объявить о формировании "Национального Фронта" из меньших левых и правых партий, объединенных под знаменем патриотизма и веры в общую российскую историю. Хотя это может оказаться нестабильным, они уже объявили о многих популистских мерах, которые дали им популярность в последних опросах, даже если многие из них противоречат друг другу. Партии придется выбирать, на чью сторону они будут больше склоняться, если они хотят остаться на плаву и иметь шанс завоевать население."
 russia.377.a: "Ну, а это... центрист." 
 russia.378.t: "Политический Путь Родины"
 russia.378.d: "Организованная Родиной коалиция становится все более и более поляризованной, и левые патриоты нападают на своих правых коллег. Похоже, что пришло время, чтобы руководство Родины взяло дело в свои руки и, наконец, решило, какой платформой будет следовать Национальный Фронт, в то время как, несомненно, большинство мелких партий, не желающих высказаться, по-прежнему будут поддерживать решение независимо от выбора, некоторые могут уйти после того, как партия выберет противоположное направление."
 russia.378.a: "Родина должна полеветь, чтобы набрать больше голосов."
 russia.378.b: "Социал-традиционализм Родины поможет ей добиться победы." 
 russia.379.t: "Статус Титула "Верховный правитель""
 russia.379.d: "Вопрос, который волнует миллионы граждан нашей страны, - это будущее титула "Верховный правитель," присвоенного Владимиру Вольфовичу Жириновскому. Его жизнь и деятельность оставили неизгладимый след в истории России, и теперь мы стоим перед сложным выбором: должны ли следующие лидеры унаследовать этот титул, или Владимир Вольфович навсегда останется единственным Вечным Верховным Правителем?\n\nВопрос преемственности чрезвычайно сложен. Титул "Верховный правитель" уникален сам по себе. Передача его кому-то другому может подорвать его символическое значение, связанное с уникальной личностью Жириновского.\n\nС другой стороны, оставление титула "вакантным" может привести к различным интерпретациям и спекуляциям."
 russia.379.a: "Этот титул должен наследоваться."
 russia.379.b: "Только Жириновский был его достоин, и Верховным правителем он останется навечно!"
 russia.380.t: "Начало Суверенной Экономики"
 russia.380.d: "Учитывая, что мир стоит на пороге перемен, а враждебность Запада постоянно усиливается, серьезный удар по нашей экономике - это лишь вопрос времени.\n\nОднако, обладая острым умом и готовностью к адаптации, мы можем гарантировать, что в случае очередного краха мы сможем успешно пережить такой финансовый шторм.\n\nБыстрая реиндустриализация, устранение любой формы зависимости от западных экономик и укрепление связей с нашей сферой, несмотря ни на что, в течение нескольких лет мы сможем противостоять любым трудностям."
 russia.380.a: "Это только начало"
 russia.381.t: "Медведев начинает кампанию в Telegram"
 russia.381.d: "Поскольку сезон выборов приближается, а смерть Путина все еще свежа в памяти россиян, это был лишь вопрос времени, когда различные партии начнут экспериментировать с различными методами привлечения избирателей.\n\n"Единая Россия" взяла на себя смелость выдвинуть Медведева на первый план в своей предвыборной кампании и попытаться привлечь больше внимания молодых избирателей, проводя кампанию с помощью приложения, известного как Telegram.\n\nTelegram, известный своей приверженностью к конфиденциальности и развитием всевозможных онлайн-сообществ, эту кампанию рассматривают как попытку показать российской молодежи, что партия знает, что актуально в настоящем и будущем, а не только в прошлом."
 russia.381.a: "Современные проблемы требуют современных решений"
 russia.382.t: "Выход фильма "Господин Президент""
 russia.382.d: "В вихре политических интриг и стремительных перемен выделяется главный герой современности Владимир Владимирович Путин. Фильм "Господин Президент" - это увлекательное погружение в жизнь и карьеру одного из самых влиятельных политиков современности.\n\nС юных лет до прихода на пост президента России Путин прошел долгий путь, испытывая все возможные испытания и трудности. В его борьбе за власть, за страну и за свое видение будущего мы видим не только политика, но и человека со своими сильными и слабыми сторонами.\n\nФильм открывает мир политических баталий и дипломатических маневров, где каждый шаг Путина ставит на карту судьбу не только страны, но и всего мира. Его решения влияют на международные отношения, экономику и историю.\n\nВзгляд режиссера на жизнь Владимира Путина раскрывает его сложную личность, в которой человеческие чувства и принципы соседствуют с политической властью. Мы видим его как лидера, за которым следуют миллионы, и как человека, который сталкивается со своими сомнениями и трудностями.\n\n"Господин президент" - это не просто биографический фильм, это исследование феномена лидерства, мирного урегулирования и геополитических игр на мировой арене. Здесь нет места однозначным ответам и оценкам, только захватывающее погружение в мир одного из самых загадочных и влиятельных политиков современности."
 russia.382.a: "Шедевр Российского Кинематографа"
 russia.383.t: "Бум Анимации в России"
 russia.383.d: "Сегодня анимационная индустрия в России переживает подлинный подъем. Каждый день на киноэкранах и телевизионных экранах выходят новые захватывающие мультфильмы, которые умиляют ярким стилем изображения и увлекательным сюжетом.\n\nТалантливые аниматоры и художники трудятся над каждой деталью, создавая свой собственный уникальный мир, в который дети и взрослые погружаются в феерический мир анимации. Благодаря этому необыкновенному виду искусства дети и взрослые могут погрузиться в фантастические миры и прожить в них некоторое время.\n\nОдним из живых примеров стал успешный мультфильм "Чувство Времени". Это произведение, которое покорило сердца зрителей своим захватывающим сюжетом, стало лауреатом множества премий и отметилась качественной картинкой и анимацией.\n\nБлагодаря креативному и инновационному подходу, анимация в России продолжает завоевывать сердца зрителей и утверждать свою позицию на мировой анимационной сцене."
 russia.383.a: "Браво, Россия!"
 russia.384.t: "Вечер с Максимом Кацом"
 russia.384.d1: ""Ну что? Не ожидали меня здесь увидеть? Я сам всё ещё в шоке! Кац в телевизоре! А всё благодаря Неосоветской Демократии, которую построил в нашей стране Валерий Рашкин. Вы действительно думаете, что я бы смог здесь оказаться, будь до этого у власти Путин? В новой демократической системе все граждане СССР имеют право на свободу слова и свободу выражения своих мнений. Все граждане СССР имеют право на участие в выборах и на выбор своего представителя в правительстве. Никакие политические партии не запрещены, все они имеют право на свободу политической деятельности. Валерий Рашкин создал новую демократическую систему, которая не только обеспечивает свободу и равенство, но и защищает права человека. Система имеет сильную правовую базу, которая гарантирует справедливость и защиту прав граждан... Сейчас мы поговорим о том, как нам удалось победить в Европейской Войне малой кровью и почему она вообще произошла..."
 russia.384.d2: ""Ну что? Не ожидали меня здесь увидеть? Я сам всё ещё в шоке! Кац в телевизоре! А всё благодаря нашей борьбе! Спустя столько лет, мы победили! Да, этот день наступил! Теперь мы сможем построить настоящую подлинную Демократию, а не это недоразумение, что называется "Неосоветская Демократия"! Я должен сказать, что она - полный бред! Рашкин не имел никакого плана или программы в своей системе, хотя казалось бы, он ведь коммунист, а все коммунисты любят план. Всё работает на уровне "как получится". И что мы имеем в результате? Хаос и беспорядок! Ничего не работает должным образом, и люди страдают. Но самое ужасное в этой системе - это ее название. "Неосоветская Демократия"? Да кто придумал такую глупость? Это же просто смешно! Как можно говорить о демократии, когда все решения принимаются одним человеком? Все мы знаем, что все основные решения в стране принимались исключительно с одобрения Рашкина. Сейчас мы поговорим о Европейской Войне и почему она вообще произошла..."
 russia.384.a: "...но сначала небольшая реклама, не переключайтесь.""
 russia.385.t: "Теракт в Московском Метро"
 russia.385.d: "Фашисты убили людей"
 russia.385.a: "Суки"
 russia.386.t: "Военный Переворот"
 russia.386.d: "Сегодня ночью гвардейские дивизии вошли в Москву, заняв стратегические точки города. В телевизионном эфире выступил президент СССР Алексей Навальный, который объявил о своей отставке в пользу главы Генштаба Вооруженных Сил СССР Валерия Герасимова.\n\n"Уважаемые граждане СССР,\n\nСегодня я вынужден объявить о своей отставке с поста президента Советского Союза. Это решение я принимаю в интересах сохранения мира и безопасности нашей страны.\nЯ уверен, что многие из вас задаются вопросом, почему я так внезапно заявляю об этом. Дело в том, что наша страна столкнулась с серьезными вызовами и проблемами, которые требуют быстрого и эффективного решения. Я осознал, что не могу гарантировать, что мои действия приведут к положительным результатам, и поэтому я передаю власть Валерию Герасимову.\nЯ понимаю, что это может вызвать некоторые опасения и беспокойства, но я прошу вас оставаться спокойными и поддерживать новые власти.\nМы должны работать вместе, чтобы обеспечить безопасность и процветание нашей страны. Я хочу заверить вас, что Валерий Герасимов будет работать в соответствии с конституционным порядком и уважать права и свободы каждого гражданина СССР.\nЯ уверен, что под его руководством наша страна сможет преодолеть все трудности и стать еще более сильной и процветающей.\n\nСпасибо за ваше внимание. Давайте работать вместе, чтобы обеспечить мир и безопасность нашей страны..."
 russia.386.a: "...Я всё правильно сказал?""
 russia.387.t: "Коммунисты-Государственники Высказываются Против КНОА!"
 russia.387.d: "Неожиданно для всех, многие коммунисты, несмотря на всеобщий запрет левых партий в ходе 'чрезвычайной ситуации', начали высказываться против террористических действии КНОА. Один из самых видных критиков, Максим Сурайкин, сделал официальное заявление: '...кто-либо из этих так называемых 'марксистов', участвующих в терроризме против нашей родины, не заслуживают называться коммунистами...'. Позднее один из представителей 'Организации членов КПРФ' - Тимур Рахметулин - также созвал собрание, осудившее действия КНОА.\n\nС учётом всех этих событий, перед ЛДПР встаёт сложный выбор, либо поддержать так называемых 'Красных Консерваторов' и позволить им существовать в публичном пространстве, либо продолжить свою жёсткую политику в отношении любых левых медиа и организаций."
 russia.387.a: "За единство всех русских!"
 russia.387.b: "Никакой пощады никому, как бы они не "подстраивались"."
 russia.388.t: "Кургинян формирует СПНРМ!"
 russia.388.d: "Коммунисты всегда считали Сергея Кургиняна чужаком. Они находили его слишком эзотеричным, слишком религиозным и слишком конспиративным. Однако Владимир Жириновский видел в нём идеального кандидата на роль "хорошего социалиста".\n\nУ Кургиняна уже была неформальная группа политических активистов под названием "Суть времени", состоящая из очень преданных членов. Он публиковал эссе и книги о необходимости "красного эзотеризма" для борьбы с "чёрным". Несмотря на то, что эта организация была довольно крупной и в начале 2010-х годов пережила взлёты и падения, она не подходила для привлечения и отвлечения большего числа патриотически настроенных коммунистов, которые могли бы создать проблемы для национального правительства ЛДПР. Поэтому через третьи руки Сергея Кургиняна попросили наконец создать масштабную социалистическую организацию для патриотов. Так появился Союз пролетарских народов Русского мира.\n\nСейчас, с некоторыми уступками, такими как защита своих членов от любых чисток или репрессий, она действует как проправительственная партия поддержки. Однако Кургинян по-прежнему часто публично критикует Жириновского за "неуважение к советской эпохе"."
 russia.388.a: "Мы надеемся на взаимовыгодные отношения, товарищ Кургинян."
 russia.389.t: "Левые Партии Стекаются к Сурайкину"
 russia.389.d: ""
 russia.389.a: "Чего!?" 
 russia.390.t: "Падение Рашкинизма"
 russia.390.d: "После долгой политической битвы со своим главным противником, Валерий Рашкин, в течение долгого времени председатель КПСС и фактический правитель СССР, несмотря на множественные попытки привести всё в порядок, был официально побеждён бывшим главным путинским пропагандистом, ставшим теперь Советским Президентом - Владимиром Соловьёвым. После катастрофического развала КПСС и падения её гегемонии, постоянный комитет КПСС убрал Рашкина со всех должностей и лишил его членства в партии, когда как они сами заняты реформой в новый политический орган с туманными заявлениями о "продолжении сражения за истинный еврокоммунизм против бурь внутренней реакции". Самим Валерием Рашкиным официальных заявлений сделано не было, более того, он будто бы исчез из под прожекторов общественности с тех пор, как было сделано шокирующее объявление.\nСоловьёв и его союзники празднуют победу, так как теперь им полностью подконтрольно Советское государство вместе со всеми его делами. Время покажет, был ли этот черёд событий полезен для СССР."
 russia.390.a: "Можно сказать, конец эпохи."
 russia.391.t: "Президент Соловьёв Оправдывает Путинское Наследие!"
 russia.391.d: "Сегодня Владимир Соловьёв в одном из своих выступлений официально отменил рашкинские обвинения Путина в преступлениях, заявляя, что сами они преступны и недостойны человека, посвятившего жизнь тому, чтобы построить социальную страну, чья единственная вина - нехватка времени.\nОн также упрекнул Рашкина в том, что тот вёл себя как ребёнок, и в том, что обвинения были предъявлены скорее из личной обиды, чем из-за основательных доказательств, в качестве примера напомнив населению о хрущёвской де-сталинизации. Соловьёв пообещал вернуть доброе имя Путина, так же, как и ту концепцию, которое он готовил для страны, восхваляя многие его решения."
 russia.391.a: "Кажется, Ре-Путинизация Начинается."
 russia.392.t: "Сегодня на Соловьёв Live"
 russia.392.d: ""Добрый вечер, патриоты! Многие были, так скажем, 'удивлены', когда я продолжил вести свою передачу после того, как стал президентом Советского Союза. Что ж, проще говоря, на этой должности толком и делать нечего! Почему, спросите вы? А это всё из-за одного неповоротливого человека и той неработающей системы, которую он построил. Вы, конечно, знаете, о ком речь - о 'товарище' Рашкине, объявившем себя 'Вторым Лениным', и, если честно, я бы с ним согласился, если бы я придерживался того мнения, что Ленин - предатель своей страны, каковым он, в отличие от Рашкина, он точно не был. Под слоями бубнежа о "преступлениях Путина" и об обмане, каковой является эта "Нео-Советская Демократия", о книге, которая её 'объясняла', на которую я, кстати, сделал обзор, и чтиво это, прямо говоря, посредственное. Вообщем, под этими слоями он прячет коррупцию, неэффективность и прошлое, которое он отчаянно пытается заставить нас забыть.\nНо я не дам ему этого сделать.\nМожете считать сегодняшнюю трансляцию своего рода разоблачением, которые так любила делать одна крыса по фамилии Навальный, только в этом случае оно не только справедливо, но ещё и приведёт к положительным результатам, это я вам обещаю...""
 russia.392.a: ""...Но сперва пройдёмся по новостям с нашим соведущим - Стасом Васильевым.""
 russia.393.t: "Коммунистическая Партия Распалась!"
 russia.393.d: "Это конец! Она сломалась!"
 russia.393.a: "Порознь они - ничто."
 russia.394.t: "Гамбит Грудинина"
 russia.394.d: "Здесь что-то должно быть"
 russia.394.a: "Первое Домино."
 russia.395.t: "Ельцин-центр"
 russia.395.d: "Недавно поднялась новая волна ненависти к екатеринбургскому Ельцин-центру, причиной стало то, что в конце июля центр открыл выставку выпотрошенных чучел животных и вшитых человеческих органов, а затем анонсировал скандальное представление "Кот икает и пукает одновременно". В СМИ Ельцин-центр подвергся критике за эту постановку. И представители музея не отрицали, что намеренно выбирают спектакли, которые провоцируют дискуссию.\n\nПоследний публичный спор о Ельцин-центре состоялся на молодежном форуме "Территория смыслов" - на заседании с участием депутатов Государственной Думы. Екатеринбургский коммунист Денис Курочкин задал докладчикам вопрос об актуальности Ельцин-центра. Автором самой резонансной реплики стал глава КПРФ Зюганов: "Все знают, что ельцинский центр специально соорудили нам американцы. На него тратят примерно 12 млрд каждый год. Это является национальным позором, когда организован центр человека, где экспозицию готовили 100 процентов американцы"\n\nСудя по всему, коалиция критиков Ельцин-центра в Госдуме только продолжает расти. 3 августа депутат от ЛДПР Ярослав Нилов неожиданно присоединился к противникам центра и предложил выделить ветеранам и инвалидам деньги, заложенные в бюджете на содержание музея. У нас возникает серьезный вопрос - что делать с Ельцин-центром?"
 russia.395.a: "Путин-центр? А что, отличная идея!"
 russia.395.b: "Реконструировать его в Дворец Воинской Славы России"
 russia.395.c: "Оставьте здание в покое."
 russia.395.f: "Переоборудуйте его в Музей Истории России"
 russia.395.f1: "Давайте просто сменим руководство на более "патриотичное""
 russia.396.t: "Россия Признала Нас!"
 russia.396.d: ""
 russia.396.a: "Троекратное ура нашим русским друзьям!"
 russia.397.t: "Китай Вторгнулся в Монголию"
 russia.397.d: "Твиттер момент"
 russia.397.a: "Пригрозить Вмешательством"
 russia.397.b: "Отступить"
 russia.398.t: "Китай Игнорирует Предупреждения"
 russia.398.d: ""
 russia.398.a: "Они блефуют - мы не подведём наших монгольских друзей!"
 russia.398.b: "Мы не можем позволить себе войну сейчас."
 russia.399.t: "Восход Великой России"
 russia.399.d: "Сегодня на исторической Кремлевской площади собралась огромная толпа восторженных сторонников и любопытных зрителей, чтобы увидеть инаугурацию нового президента России, харизматичного и неоднозначного Владимира Жириновского. Когда он поднялся на трибуну, в воздухе ощущалось предвкушение, все глаза и уши с нетерпением ждали его слов.\nВ своей проникновенной речи президент Жириновский заявил, что Россия стоит на пороге новой эры, когда старые методы управления устарели и стали неэффективными. Он говорил о необходимости создания обновленного государственного аппарата, способного адаптироваться к вызовам современного мира, оставив позади устаревшую политику и практику прошлого. \nС горячностью в голосе Жириновский подчеркнул важность единства и солидарности российского народа, отвергнув идею "мультикультурного" общества в пользу сильного акцента на русской идентичности и братстве.\nПосле того как толпа разразилась радостными криками и аплодисментами, президент Жириновский завершил свою речь мощным провозглашением..."
 russia.399.a: "Вперёд, к централизованной федерации!"
 russia.399.b: "Вперёд, к империи!"
 russia.399.c: ""...К черту все эти официозные звания и титулы. Россия единая, неделимая и великая!""
 russia.400.t: "Запад Оспаривает Результаты Выборов!"
 russia.400.d1: "Трусливые западные державы выступили с совместным заявлением после внеочередного заседания Европарламента, в котором они обозвали победу ЛДПР "мошенническим переворотом", а Жириновского - будущим кровавым диктатором. Более того, они объявили о новом пакете санкций, который должен превентивно ударить по России и предотвратить нас от достижения "империалистических целей", таких как защита русских, подвергающихся репрессиям в Прибалтике и на Украине.\nЖириновский лично прокомментировал эти заявления в своём официальном ответе: "...Эти сволочи не оставят нас в покое, но в этом нет ничего особенного, они в агонии, санкции же, наоборот, помогут нам построить нашу собственную экономику. У нас, русских, для запада будет только одна санкция: это русский танк, который разнесёт в щепки Рейхстаг.""
 russia.400.d2: "Трусливые западные державы выступили с совместным заявлением после внеочередного заседания Европарламента, в котором они обозвали победу КПРФ "возрождением тоталитаризма", а Зюганова - будущим кровавым диктатором. Более того, они объявили о новом пакете санкций, который должен превентивно ударить по России и предотвратить нас от достижения "империалистических целей", таких как восстановление СССР, и защита русских, подвергающихся репрессиям в Прибалтике и на Украине.\nПартия прокомментировала эти заявления в своём официальном ответе: "...Западные империалисты и их прихвастни находятся в агонии. Народное доверие к капитализму падает, их новый, преступный пакет санкций не сможет остановить неизбежное; скоро эпоха глобализма закончится, и мы - русские коммунисты, поможем народам европы в этом.""
 russia.400.a: "Испугались, однозначно. Это нам не помешает."
 russia.401.t: "День Народного Единства"
 russia.401.d: "Сегодня, 4 ноября, Россия отмечает День Народного Единства. Этот праздник является одним из самых значимых в стране и напоминает о важности единства и солидарности всех граждан.\nВ этот день проводятся многочисленные культурные и спортивные мероприятия, праздничные шествия, концерты и фестивали. Все регионы России активно принимают участие в праздновании, демонстрируя свою приверженность идеалам единства.\nОсобое внимание уделяется воспитанию патриотических чувств у молодежи. Школьники и студенты принимают участие в парадах и праздничных мероприятиях, где им рассказывают о значимости дня Народного Единства и его роли в истории страны. Это помогает молодому поколению осознать важность единения и солидарности для достижения общих целей.\nВ этот день важно помнить о значимости солидарности и единения всех граждан России в достижении общих целей и развитии страны. День Народного Единства призывает каждого человека к активному участию в жизни общества и стремлению к благополучию и процветанию России."
 russia.401.a: "В единстве наша сила!"
 russia.402.t: "День Октябрьской Революции"
 russia.402.d: "Сегодня, 7 ноября, в России отмечается годовщина Октябрьской революции. Этот праздник является одним из самых значимых в истории страны и напоминает о переломном моменте, когда власть перешла в руки рабочего класса.\nВ этот день проводятся многочисленные мероприятия, посвященные празднованию годовщины Октябрьской революции. В различных городах России проходят парады, шествия и концерты, на которых присутствуют представители различных политических партий и общественных организаций.\nОсобое внимание уделяется воспитанию патриотических чувств у молодежи. Школьники и студенты принимают активное участие в праздничных мероприятиях, где им рассказывают о значимости Октябрьской революции и ее роли в истории страны. Это помогает молодому поколению осознать важность борьбы за свои права и свободу.\nВ этот день важно помнить о значимости идеалов, которые легли в основу Октябрьской революции. Это борьба за социальную справедливость, равенство и свободу. Годовщина Октябрьской революции призывает каждого человека к активному участию в жизни общества и стремлению к созданию лучшего будущего для всех граждан России."
 russia.402.a: "Слава Рабочему Классу!"
 russia.403.t: "Выход 'Залупы Иваныча'!"
 russia.403.d: "Недавно к всеобщему удивлению фильм Кинопоиска - 'Залупа Иваныча' - вышел в прокат в кинотеатрах по всей стране.\nФильм повествует о старом алкоголике в ветхой российской деревне, история начинается с того, что главный герой подхватывает инфекцию в причинном месте.\n'Залупа Иваныча' была признана современной классикой, широко обсуждаемой в социальных сетях. Фильм хвалят за множественные кинематографические достоинства, гениальную актёрскую игру и мастерский показ социальных проблем, нуждающихся в исправлении.\n'Залупа Иваныча' стала самым кассовым фильмом в нашей стране, поборов даже популярный сериал 'Король и Шут'. Картина получила множество наград от различных российских киноакадемий."
 russia.403.a: "Современная Классика!"
 russia.404.t: "День Народного Единства в Военное Время"
 russia.404.d: "Сегодня, 4 ноября, Россия отмечает День Народного Единства. Этот праздник является одним из самых значимых в стране и напоминает о важности единства и солидарности всех граждан.\nВ этот день проводятся многочисленные культурные и спортивные мероприятия, праздничные шествия, концерты и фестивали. Все регионы России активно принимают участие в праздновании, демонстрируя свою приверженность идеалам единства.\nОсобое внимание уделяется воспитанию патриотических чувств у молодежи. Школьники и студенты принимают участие в парадах и праздничных мероприятиях, где им рассказывают о значимости дня Народного Единства и его роли в истории страны. Это помогает молодому поколению осознать важность единения и солидарности для достижения общих целей.\nВ этот день важно помнить о значимости солидарности и единения всех граждан России в достижении общих целей и развитии страны. День Народного Единства призывает каждого человека к активному участию в жизни общества и стремлению к благополучию и процветанию России."
 russia.404.a: "Когда мы едины - мы непобедимы!"
 russia.405.t: "Сирия Заменила ЮАР в БРИКС+"
 russia.405.d: ""
 russia.405.a: "Круто."
 russia.406.t: "Звонок Лукашенко"
 russia.406.d: "С уходом этого персонажа нить вашей судьбы обрывается. Загрузите сохранённую игру дабы восстановить течение судьбы, или живите дальше в проклятом мире, который сами и создали." 
 russia.406.a: "Такая реакция, должен сказать, была очень неожиданной."
 russia.407.t: "Кто Управляет Настоящим..."
 russia.407.d: "Крепкий контроль над СМИ необходим для предотвращения развала нашего общества, подобно Америке. 'Свобода' работает лишь в ограниченной мере, а свобода знать правду хороша, только когда правда наша.\nТелевидение, социальные сети, и даже газеты лучше подвергнуть государственному надзору и цензуре в пользу национальной целостности.\nОднако, в нашей администрации есть те, кто указывает на то, что чрезмерная цензура привела к краху СССР, они говорят, что людям требуется свобода в информационном плане, но умеренная, чтобы предотвратить социальную нестабильность."
 russia.407.a: "Победа заключается в единстве."
 russia.407.b: "Давайте не будем так, как в одной "числовой" книге."
 russia.408.t: "Русские Коллаборанты Разоблачены!"
 russia.408.d: "Несмотря на изначальный успех 'Армии Свободной России' в нашем медиа пространстве, внезапно, Русские агенты влияния и их службы разведки смогли открыть рот нашим официальным СМИ, и поднять факты об ультраправых, граничащих с гитлерскими идеях многих российских диссидентов. Ситуация не улучшилась и после того, как один из лидеров 'Армии Свободной России', заявил прессе, что не видит проблем с ярлыком нео-нациста, так как он и его товарищи сами считают себя ультраправыми националистами. Всё ухудшило заключительное утверждение о том, что западным спонсорам давно известно об их взглядах, никак их не смущавших, и что единственный настоящий враг - Российское правительство, устраивающее геноцид чистокровных русских с помощью грязных чеченцев и таджиков."
 russia.408.a: "Позор!"
 russia.409.t: "Кампания "Время Новых""
 russia.409.d: "Неожиданно для всех началась недавняя кампания "Время Новых" от "третьей" партии России - "Новая Россия", которая по большей части представляет Новую Россию избирателям как альтернативу консервативному пути "Единой России" и левому пути "Народной России", предлагая "дать путь молодым", а также экономические и личные свободы. Даванков очень активно участвует в предвыборных поездках по стране, где прислушивается к чаяниям народа и проводит митинги на которых он описывает свою программу."
 russia.409.a: "Даванков, кандидат в президенты готов."
 russia.410.t: "Кампания "Мы Ждём Перемен" Набирает Популярность"
 russia.410.d: "Недавно "Народная Россия" объявила о проведении кампании под названием "Мы ждем перемен", в рамках которой призывает избирателей голосовать за реальные перемены в стране и за социальную справедливость. Одновременно с анонсом "Народная Россия" выпустила и несколько агитационных роликов с песней группы "КИНО" - "Мы ждем перемен", а сами ролики произвели большой фурор в российском обществе."
 russia.410.a: "Перемен!"
 russia.411.t: "Интернет Агитация Единой России"
 russia.411.d: ""Единая Россия" решила использовать нестандартный способ агитации, точнее, партия решила запустить онлайн-кампанию по привлечению молодежи к выборам, некоторые депутаты "Народной России" заявили, что это "просто новые ельцинские методы".\n\nАктивное участие в компании приняли известные члены "Единой России", например, Дмитрий Патрушев пришел по приглашению популярного стримера Жмилевского на один из его прямых эфиров, в ходе которого стример задавал вопросы о его предвыборной кампании, из-за чего интерес молодой аудитории только разгорелся, породив кучу "мемов" и "артов", а на волне популярности компании было также выпущено продолжение комикса "Супер Путин", которое завершает древнюю сагу."
 russia.411.a: "Голосуй Сердцем, Панимаишь..."
 russia.412.t: "Поздняя Рыбалка"
 russia.412.d: "Сволочь он, - с ненавистью продолжал Путилин, - ведь он же сам не говорит на этом языке! А? Я позавчера спрашиваю этого идиота, Голобородько, он, видите ли, во время войны разучился говорить по-русски. Спрашиваю значит: как по-украински "кот"? Он отвечает "кит". Спрашиваю: "А как кит?" А он остановился, вытаращил глаза и молчит. И теперь не разговаривает со мной.\n\nПетька с треском захохотал и сказал: - Слова "кит" у них не может быть, потому что на Украине моря больше нет, а вот у нас в Новороссии..."
 russia.412.a: "А жизнь продолжается..."
 russia.413.t: "Дорогие Россияне..."
 russia.413.d: "Мы прошли через многое: мы были окружены врагами, что хотели стереть нас с карты земли, на нас оказывалось постоянное давление, они хотели ввергнуть нас в хаос, но в итоге мы победили.\n\nНаши враги столкнулись с неизбежными последствиями своих действий, и мы до сих пор пожинаем плоды их некомпетентности. Было много способов повести нашу страну на темный путь западничества, но благодаря вашей вере и амбициям мы пережили один из худших периодов в истории. Постоянные перемены, войны и смерти.\n\nКогда наши дети посмотрят на карту мира, они будут поражены тем, насколько не изменилась Россия за это время. Ну, в какой-то степени не изменилась. Мы провели ряд значительных изменений внутри страны, предоставив больше возможностей будущим лидерам, и, хотя наш предыдущий курс обеспечил нам стабильность, будет лучше, если мы дадим новому поколению возможность определять свой курс в нашем общем будущем.\n\nОднако по всей стране царит чувство усталости, ведь было принесено в жертву так много. Жертвы, которые не будут забыты никогда, шрамы, нанесенные миру, останутся, и на этих шрамах мы будем учиться, перестраиваться и совершенствоваться. Я разделяю это мнение, я многое сделал, вы многое сделали, и с тяжелым сердцем я должен объявить о своей отставке. Это горько-сладкое чувство, будущее остается неопределенным, но осознание того, что мы заложили фундамент, на который будут опираться будущие поколения, вселяет в меня больше надежды на будущее России и всего мира. На этом я прощаюсь со всеми вами. Спасибо."
 russia.413.a: "Снова в неизвестность."
 russia.414.t: "Время Пришло?"
 russia.414.d: "С момента победы нашей Родины в Европе и стабилизации новой сферы и порядка, наш президент Дмитрий Анатольевич всё чаще задумывается о будущем страны и государства.\n\nВозможно, настало время для новой администрации и нового взгляда на развитие страны?\n\nЦентрализация, подготовка к войне и сама война отняли много сил у Дмитрия Медведева.\n\nНесмотря на некоторые разногласия, Дмитрий Анатольевич остаётся самым популярным лидером в народе, а его система пользуется поддержкой абсолютного большинства граждан. Однако в стране есть близкие к нему люди, которые могут взять власть в свои руки, если он почувствует усталость, и начать строить своё видение России.\nМожно сказать точно: будущее нашей страны зависит от решения одного человека."
 russia.414.a: "Эпоха Медведева продолжится, многое еще предстоит сделать"
 russia.414.b: "Мишустин, старый друг и блестящий государственник"
 russia.414.c: "Лукашенко, политический слон и сильный хозяйственник"
 russia.414.f: "Куренков - прагматичный политик, и он нравится нашему "общему" другу"
 russia.414.e: "Надеждин, новая надежда для молодежи и умеренный реформатор"
 russia.414.j: "Филимонов, человек, который любит наше наследие и готов к решительным действиям"
 russia.415.t: "Установление титула Верховного правителя"
 russia.415.d: "Недавние события в России потрясли политическое сообщество. Неожиданно лидер ЛДПР Владимир Жириновский объявил о провозглашении себя верховным правителем России - тот же титул, который носил Александр Колчак во время гражданской войны.\n\nНекоторые западные либеральные политологи называют установление Жириновским титула Верховного правителя попыткой захвата власти и установления диктатуры. Они предупреждают о возможных последствиях подобного шага и призывают к мирным протестам и сопротивлению.\n\nСам же Владимир Жириновский утверждает, что только сильный правитель сможет привести Россию к процветанию и стабильности, и что только он обладает достаточным авторитетом и опытом для этого титула.\n\nНо независимо от мотивов и намерений Жириновского, его шаг вызвал смешанные чувства среди населения. Будущее политической ситуации в России остается неопределенным, и только время покажет, какие последствия приведет установление титула Верховного правителя."
 russia.415.a: "Абсолютная власть!"
 russia.417.t: "Выборы!"
 russia.417.d: ""
 russia.417.a: "Единая Россия"
 russia.417.b: "Народная Россия"
 russia.418.t: "Суверенная Демократия"
 russia.418.d: "Президент России Дмитрий Медведев, совместно с известными политическими аналитиками, выпустил свою первую книгу "Суверенная Демократия". Это книга описывает цели, причины, и глубину реформ которые проводятся с тех пор как Дмитрий Анатольевич стал главой государства. В ней также рассказывается о предпосылках и необходимости создания новой, заточенной под Россию, демократии, и оговариваются проблемы с которыми сталкивается реформы. Также, в ней, Медведев ещё раз утверждает что все его действия соответствуют Курсу Путина, и даже делится деталями личных бесед с Владимир Владимировичем. В своём "Телеграмм" канале Дмитрий Медведев написал, что книга станет полезным спутником для Российской молодежи в политической жизни новой России. Либеральные Критики книги, однако, заявляют что описанное там лишь "Авторитаризм под новой маской", и то что, единственная реальная демократия находится на западе. Несмотря на критику, "Суверенная Демократия" получила широкое распространение среди студентов и пользуется популярностью в кругах, поддерживающих Курс Медведева, а также продолжает вызывать интерес и обсуждения в российской политической среде. За рубежом книга не получила такой популярности, но она позволила многим экспертам лучше понять то, что сейчас в целом происходит в нашей стране."
 russia.418.a: "Перемены есть!"
 russia.419.t: "Судьба Единой России"
 russia.419.d: "Когда наша победа была закреплена, судьба "Единой России" все еще висела в воздухе.\n\nБольшая часть партии состоит из карьерных оппортунистов, которые подлизываются только к тому, кто выше их. Изначально созданные для того, чтобы просто передавать нужные Путину бумаги, теперь они решили, что у них есть право думать за себя. Не говоря уже о том, что многие из них совершенно не соответствуют занимаемым должностям."
 russia.419.a: "Самый гуманный суд в мире!"
 russia.420.t: "Финал"
 russia.420.d: "После падения прежней власти все каналы финансирования внезапно пересохли: щедрые дотации из Кремля, на которые до недавнего времени рассчитывали "Коммунисты России", СРЗП, "Новые люди" и прочие мелкие партии-спойлеры, были моментально свернуты. Партийные офисы опустели, активисты остались без зарплат, а рекламные кампании прекратились в одночасье.\nЛидеры и рядовые члены упразднённых организаций стали искать новое убежище: кто-то поспешил вступить в КПРФ, надеясь найти ресурсы и платформу для своих идей, другие - устремились искать новые возможности для реализации своей политической воли, разворачивая частные фонды и благотворительные проекты, ища спонсоров среди местных предпринимателей - все эти люди нам ещё определённо встретятся на пути...\nЕдинственная ЛДПР уцелела: Жириновский молниеносно мобилизовал старые связи, переориентировал партийные взносы и личные пожертвования своих соратников. Сегодня из старых системных соперников КПРФ только одни лишь жириновцы продолжают свои акции, напоминая, что в политической буре выживают лишь те, кто умеет оперативно перестраиваться."
 russia.420.a: "Продолжим наблюдать за ситуацией"
 russia.421.t: "Новая Советская Конституция"
 russia.421.d: ""
 russia.421.a: "1993-ий отомщён"
 russia.422.t: "Восстановление Верховного Совета"
 russia.422.d: ""
 russia.422.a: "Всё возращается на круги своя..."
 russia.423.t: "Россия Поддерживает Нас!"
 russia.424.t: "Пригожин Поддерживает Жиринковского"
 russia.424.d: ""
 russia.424.a: "Последуйте совету Власова и заключите с ним сделку!"
 russia.424.b: "Большое спасибо."
 russia.424.c: "Он просто пытается подлизаться." 
 russia.425.t: "Число Вагнеровцев в ЛДПР Растет"
 russia.425.d: ""
 russia.425.a: "Интересно..."
 russia.426.t: "Пригожин требует чистки в Армии"
 russia.426.d: ""
 russia.426.a: "Вычистить всех перечисленных генералов."
 russia.426.b: "Мы можем договориться..." 
 russia.426.c: "Скажите ему, чтобы он успокоился."
 russia.427.t: "Националисты требуют упразднения автономных зон"
 russia.427.d: "С ростом популярности "Святой Руси" и их государственного контроля они предложили самую противоречивую политику на сегодняшний день - убрать все администрации меньшинств в России. Это может привести к ужасным последствиям.Мы все еще можем давить на них и держать каждого в подвешенном состоянии "статус-кво", чтобы не вызвать всплеска антироссийских настроений."
 russia.427.a: "Мы можем только принять..."
 russia.427.b: "Отклоните это катастрофическое предложение!"
 russia.428.t: "Игорь Гиркин формирует новую партию"
 russia.428.d: "Гиркин, умеренно известный монархист и - несостоявшийся - диктатор Новороссии, который также недавно был приглашен на официальную должность в МИНОБОРОНЫ, выступил со своими сторонниками и организовал новую "истинно патриотическую" партию.\nЭта организация уже завоевала популярность среди людей, которые недовольны политикой и правительством Жириновского, большинство из них либо монархисты, либо те, кого можно охарактеризовать как "умеренных" националистов. Несмотря на отталкивающую личность Гиркина, ей все же удалось объединить в себе другие более мелкие партии.\nтолько время покажет, вызовет ли институционализация Гиркина больше проблем, чем пользы."
 russia.428.a: "Гиркин сегодня ныл..." 
 russia.429.t: "РПП требует уступок!"
 russia.429.d: "Недавно Игорь Гиркин опубликовал видео, где он в грубой форме обзывал Жириновского, утверждал, что его администрация неэффективна и коррумпирована, в чем он, судя по всему, смог убедиться сам. В более позднем публичном заявлении он потребовал, чтобы ему дали высокую должность в правительстве, чтобы он мог эффективно и утомительно бороться с коррупцией и ленью. РПП уже направила официальную ноту непосредственно Владимиру Жириновскому.\nНесмотря на то, что РПП смогла завоевать большую популярность, чем ожидалось, мы все еще можем бороться с их влиянием и низвести их до уровня плинтуса или, по крайней мере, согласится на кого-то, кто не ебанный Гиркин."
 russia.429.a: "Ну что-ж..."
 russia.429.b: "У РПП должен быть кто-то другой, верно?"
 russia.429.c: "Давайте покажем ему настоящую рассержинать!" 
 russia.430.t: "Жириновского Заставили Занять Пост Регента"
 russia.430.d: "Несмотря на все усилия, наша опора на монархически-умеренные кадры привела к тому, что они де-факто полностью взяли под свой контроль внутренние дела правительства. Многие члены ЛДПР были смещены со своих постов, заменены своими коллегами из РППР.\nВладимир Жириновский оказался бессилен против растущей волны монархических политиков и их влияния, он запутался в собственной паутине, с ним играли как со скрипкой, и теперь он вынужден принять "предложение" об установлении официального регентства. ЛДПР теперь вынуждена подлизываться к РПП, если хочет сохранить государственный контроль."
 russia.430.a: "Все звезды рано или поздно меркнут..."
 russia.431.t: "Триумф Токаева"
 russia.431.d: "Нынешний президент Казахстана Касым-Жомарт Токаев не остался равнодушным к протестам. Он встал на сторону народа и начал чистки против всех старых назарбаевских аппаратчиков, которые долгое время держали власть в своих руках. Токаев также решил развенчать культ личности самого Назарбаева, правившего страной более 30 лет. Он признал, что многие решения, принятые Назарбаевым, были ошибочными. Было объявлено о проведении масштабных демократических реформ и разработке новой конституции. Казахстан также выразил благодарность России за помощь в трудные времена. В знак дружбы и уважения к соседней стране Казахстан принял решение о начале нового этапа экономической интеграции двух государств. Российско-казахстанская дружба крепка как никогда!"
 russia.431.a: "Ушла эпоха..."
 russia.432.t: "Конец беспорядков"
 russia.432.d: "Протесты в Казахстане закончились. Власти сообщили о восстановлении порядка в стране. 4353 человека были ранены, в том числе 3393 сотрудника силовых ведомств. В морги были доставлены 238 погибших, в том числе 19 полицейских и военных. В результате этих событий в стране произошли изменения в правительстве и политической сфере. В частности, были заменены премьер-министр, госсекретарь, спикер нижней палаты парламента и половина министров. Также Назарбаев лишился должности лидера правящей партии "Нур Отан", а его место занял Токаев. Также одним из результатов протестов стало снижение цен на газ, которые и стали катализатором протестов. Начало ли это чего-то большого или Казахстан не пойдёт на серьёзные реформы и сохранит статус-кво? Время покажет."
 russia.432.a: "Всё наконец-то закончилось."
 russia.433.t: "Государственный Переворот Назарбаевой"
 russia.433.d: "В ходе протестов в Казахстане произошло нечто невероятное - государственный переворот. Силы КНБ, возглавляемые Даригой Назарбаевой, старшей дочерью бывшего президента страны, Нурсултана Назарбаева, захватили власть в стране. Клан Назарбаевых, который уже десятилетиями удерживал власть в Казахстане, теперь полностью контролирует ситуацию в стране. Дарига Назарбаева, которая ранее занимала высокие посты в правительстве и парламенте, теперь стала настоящим автократом. Она мнит из себя казахскую Екатерину Великую и не скрывает своих амбиций. В своих выступлениях она обещает привести Казахстан к новым высотам и сделать его одной из ведущих держав мира."
 russia.433.a: "Для нас мало что поменялось... Наверное."
 russia.434.t: "Либеральная Революция в Казахстане"
 russia.434.d: "Казахстан стал свидетелем масштабных протестов, которые привели к значительным изменениям в политической жизни страны. Многие эксперты и наблюдатели назвали происходящее либеральной революцией, которая привела к приходу к власти демократических сил. Главными лидерами протестов стали Демократический Выбор Казахстана и Мухтар Аблязов, бывший банкир и бизнесмен, который был вынужден покинуть страну в 2009 году после конфликта с правительством. В ходе протестов Аблязов вернулся в Казахстан и возглавил движение за демократию и свободу. После нескольких дней массовых протестов правительство Казахстана было вынуждено уйти в отставку. Новым президентом страны стал Мухтар Аблязов, который обещал провести широкие реформы и создать демократическое государство."
 russia.434.a: "Неожиданный исход."
 russia.435.t: "Социалистическая Революция в Казахстане"
 russia.435.d: "В ходе протестов в Казахстане произошло то, что можно назвать социалистической революцией, возглавляемой Социалистическим движением Казахстана и Айнуром Курмановым. Левые силы в Казахстане объединились в борьбе за права рабочих и бедных. Основные левые партии Казахстана, в том числе Коммунистическая партия, Общенациональная социал-демократическая партия и Народная партия, смогли организовать неустойчивую коалицию, которая захватила власть в стране. Новое правительство обещало провести радикальные демократические и социальные реформы, направленные на улучшение жизни простых граждан. Одной из первых мер стало повышение заработной платы и пенсий, а также бесплатное образование и медицина для всех граждан."
 russia.435.a: "Неожиданный исход."
 russia.436.t: "Приглашение в Союзное Государство"
 russia.436.d: ""
 russia.436.a: "Да"
 russia.436.b: "Нет"
 russia.437.t: "Они Согласились"
 russia.437.d: "Казахстан готов усилить братские связи с нашей страной и подписать важные документы, которые сделают его частью Союзного Государства. Глава МИД нашей страны встретился с казахстанским коллегой и обсудил планы по укреплению безопасности и экономического сотрудничества.\n\nМинобороны провело встречи с коллегами из Казахстана. Обсуждались вопросы объединения войск в рамках Союзного Государства. Это предусмотрено указами, подписанными главой государства.\n\nКазахстан теперь плотно скреплён с Российской сферой влияния."
 russia.437.a: "Выпьем за наших казахов!"
 russia.438.t: "Они Отказались"
 russia.438.d: "Анти-российское правительство Казахстана показала свои настоящие цвета, и отказалась принимать наши законные требование чтобы обезопасить центральноазиатский регион и интересы России и её народа там.\nВзамен, "правительство" Казахстана публично заявило, что наши требования неприемлемы и являются рэкетом. И уже начали отменять множество межгосударственных деклараций с нами. Лояльное нам русское население уже начало митинги против политики Казахского государства.\n\nКазахи скоро узнают последствия такой открытой русофобии."
 russia.438.a: "Начинаем Военную Операцию по Урегулированию Казахское Кризиса."
 russia.439.t: "Токаев Возвращается к Власти"
 russia.439.d: "После недолгого временного правительства, Касым-Жомарт Токаев вернулся в качестве президента в страну, хотя, термин "диктатор" теперь подходит больше. Первые шаги Токаева стали жёсткими, он реформиовал свою партию, сделав из неё централизованный механизм, анти-российские, либеральные демонстрации жёстко подовляются как ВС РФ, так и силами Казахстана.\nНаследие Назарбаева искореняется подчистую, в стране выстраивается культ нового 'Батыра' - Токаева. При этом, он полностью лоялен России, и готов пойти на любые уступки нам, и нашим союзникам.\nМожет быть, Казахстан, когда нибудь, вернется в свое привычное русло, но пока, новая реальность - это новая норма, надолго."
 russia.439.a: "Настоящий Казахстан вернулся!"
 russia.440.t: "Переименование Астаны"
 russia.440.d: "Благодаря нашему военному вмешательству, Касым-Жомарт Токаев сумел сохранить свою власть в Казахстане. Но всему в этой жизни есть цена, и Казахстану пришлось провести референдумы о присоединении северных, заселённых преемущественно русскими, территорий с предсказуемым результатом. В данную сделку входила в том числе и Акмолинская область вместе с Астаной. переименованной в Акмолинск. Теперь столицей Казахстана вновь стала Алма-Ата.\nАкмолинск был основан в 1830 году из казачьего форпоста, созданного для защиты аулов, принявших российское управление, от набегов повстанцев. Имя продержалось вплоть до 1961 года, пока город не был переименован в Целиноград, из-за его важности в деле освоения североказахской и западносибирской целины. После распада СССР город получил имя Акмола, а уже через несколько лет Нурсултан Назарбаев перенёс туда столицу и переименовал в Астану. Теперь историческая справедливость восторжествовала."
 russia.440.a: "Хорошо"
 russia.441.t: "Токаев Умоляет о Помощи!"
 russia.441.d: "Недавно, в Казахстане произошел анти-конституционный переворот, где власть захватили анти-российские силы. К счастью, законный президент Касым-Жомарт Токаев был выведен в безопасность нашими спецслужбами, и сейчас находится на временной даче в Оренбурге. После нескольких дней затишья он написал письмо Президенту РФ где умолял о помощи в возвращении стабильности и законного порядка в Республику Казахстан. Первую часть письма широко распространили Российские СМИ, но, в закрытой для публики второй части, Токаев признаёт ошибочность своей многовекторной политики, а также, предлагает значительные уступки России если та согласится провести интервенцию. Среди них, Токаев даже согласился провести референдумы по вступлению в России на территориях Северного Казахстана.\nНесмотря на столь щедрые Токаевские "подарки", финальное принятие решений стоит за правительством РФ."
 russia.441.a: "Мы поддержим Токаева!"
 russia.441.b: "Нет, спасибо."
 russia.441.c: "Маловато будет! Мы требуем ещё Уральск и Гурьев."
 russia.442.t: "Полная Деназарбаевизация"
 russia.442.d: "Президент Казахстана Касым-Жомарт Токаев инициировал пересмотр истории страны. Особое внимание уделено первому лидеру Нурсултану Назарбаеву, который руководил страной почти три десятилетия.\nАнализ новых данных и архивных материалов выявил факты коррупции, репрессий и другие проявления авторитаризма в период его правления.\nТокаев подчеркивает, что начинается новая эпоха для Казахстана, где не будет места для прошлых ошибок и преступлений.\n\nМногие жертвы прежнего режима получили компенсации и публичные извинения. В стране проходят громкие задержания бывших чиновников, а активы семьи Назарбаевых заморожены властями."
 russia.442.a: "Хорошо?"
 russia.443.t: "Возвращение Демократии в Казахстане"
 russia.443.d: "После продолжительного периода ужесточения власти президент Токаев анонсировал новые реформы. Их цель - вернуть в страну демократические институты и свободу.\n\nВ официальном обращении Токаев пообещал народу, что после всех решительных мер, направленных на устранение опасных и деструктивных элементов, страна вернется к истинной демократии. Он подчеркнул, что теперь каждый казах сможет свободно выражать свои мысли, где бы он ни находился.\nМногие партии, чья деятельность была приостановлена в период стабилизации, возобновили свою работу и готовятся к выборам в Мажилис."
 russia.443.a: "Мы так вернулись."
 russia.444.t: "Марш Справедливости Пригожина!"
 russia.444.d: "После нашего страшного поражения в войне с НАТО Евгений Пригожин решил использовать момент слабости и народного отчаяния в свою пользу. Сегодня он объявил, что "больше не будет выполнять приказы паразитов и извергов", и вместо этого начал открытое восстание против нашего правительства.\nОн жестоко взял под контроль Ленинградскую область и теперь готовит свою ЧВК "Вагнер" к марш-броску на Москву, назвав его "Маршем справедливости"\nВоенные генералы уже связались с Кремлем и предложили передать власть непосредственно армии, чтобы сохранить стабильность и подавить путч."
 russia.444.a: "Уступите военным. Эта "ересь" должна быть изгнана!"
 russia.445.t: "Марш начинается!"
 russia.445.d: "Через несколько часов после официального заявления Пригожина его солдаты начали массированное движение к столице России. По пути они уже уничтожали небольшие группы государственных военных.\nСтавка, после многочасового планирования и совещаний, предложила только два решения: либо послать армейскую группу на перехват и устроить засаду, либо подготовить крупные города, и особенно Москву, к тяжелой обороне."
 russia.445.a: "Уничтожить их немедленно!"
 russia.445.b: "Мы должны быть осторожны. Готовьте оборону!"
 russia.446.t: "Пригожин победил!"
 russia.446.d: "План А" обернулся для правительства грандиозным провалом: тысячи русских солдат были убиты своими же соратниками. Марш Пригожина вошел в Москву, встретив незначительное сопротивление, и вскоре государственная армия капитулировала. Теперь Евгений Пригожин оказался у руля измученного государства, ситуация в котором напоминает былые смутные времена. Уже появились сообщения о том, что Навальный сбежал из заключения и собирает свою либеральную сволочь для контрвосстания против Вагнера.\nПригожин не согнется! Он вернет России славу и мощь, отомстит натовским псам и украинским националистам.\nНастало время массового митинга в Москве, на котором Пригожин ясно объявит о своих намерениях."
 russia.446.a: "Россия будет вагнеризирована!"
 russia.447.t: "Пригожин побежден!"
 russia.447.d: "План Б" привел к страшному поражению Пригожина, когда тысячи русских солдат были убиты своими же соратниками. Поход Вагнера был остановлен, отбитый жесткой обороной Москвы и других городов, а остатки Вагнера вскоре капитулировали. Несмотря на поражение путчистов, Россия по-прежнему остается страной, разоренной войной, а люди все еще испытывают горечь по отношению к военным. Шойгу понимает это, и у него есть человек, который может стать новой надеждой и единством не только для России, но и для всей Евразии.\nНастало время неожиданных встреч..."
 russia.447.a: "Закладывая основы новой России"
 russia.448.t: "Шойгу встретился с Дугиным"
 russia.448.d: "Сегодня Сергей Шойгу, по официальному заявлению Кремля, встретился с широко известным философом Александром Дугиным, подробности личной встречи остаются засекреченными, но, к удивлению многих, Шойгу вскоре после этого обнародовал свое письмо об отказе от власти и возвращении к гражданскому управлению. Однако власть не вернется в Государственную Думу, а будет передана недавно созданной политической структуре "Партия Евразия", возглавляемой близкими соратниками Дугина, который сам де-факто является лидером неоевразийского движения.\nМногие до сих пор задаются вопросом, что побудило генерала выбрать Дугина, одни говорят, что его "Основы геополитики" были популярным чтением в военных академиях, другие - что его унитарная, советско-имперская философия стала ключом к успеху."
 russia.448.a: "Посмотрим, на что способен философ"
 russia.449.t: "В Пригожина Выстреляли!"
 russia.449.d: "Сегодня Россия избежала ужасной трагедии. Евгений Пригожин, который участвовал в публичном марше в Москве, оказался на волосок от смерти. Его жизнь была спасена благодаря бронежилету и молниеносной реакции личных охранников. Преступник, совершивший покушение, был убит на месте.\nКак выяснилось, это был 45-летний уроженец Ижевска Тимур Рахметула, известный в узких кругах как экстремист и либерал. Проверка его телефона показала, что перед покушением он написал в одном из групповых чатов Telegram: "Я убью эту лысую суку". Сейчас все участники этого чата находятся в розыске.\n\nСудьба спасла Великого Командира, и после такого близкого контакта со смертью Евгений Пригожин стал ещё более решительно настроен на управление своей родиной."
 russia.449.a: "Fiat iustitia, et pereat mundus."
 russia.450.t: "Дмитрий Медведев смещен с поста президента"
 russia.450.d: "Неудачные решения Медведева привели Россию к поражению в ее затяжной войне. Теперь ему ничего не остается, как с позором покинуть кремлевский кабинет. Вместе с ним ушло в отставку и все его правительство, и теперь единственным человеком, способным временно возглавить страну в это тяжелое время, является спикер Государственной Думы Вячеслав Володин. Не самое популярное решение, но он сойдет"
 russia.450.a: ""Feci quod potui faciant meliora potentes""
 russia.452.t: "Экономическая Зависимость Европы от Нас!"
 russia.452.d: "По мере того как все больше и больше молодых наций, освобожденных от иностранного господства, присоединяются к Российской Федерации, от Черного моря до Балтики, мы можем начать восстановление, и самая ключевая часть восстановления лежит в экономике. Эти нации разорены войной и иностранным империализмом и обратились к нам, чтобы исправить это. Естественно, мы должны согласиться не только с теми возможностями, которые это дает нам, но и с обязательством большей нации защищать меньшую. Ожидается, что это восстановление будет довольно дорогостоящим, и, поскольку нашу помощь получают в основном страны-банкроты, ожидается, что мы будем теми, кто оплатит счета, по крайней мере, в ближайшем будущем.\n\nМы ожидаем, что эти условия сохранится в течение некоторого времени, поскольку, вероятно, пройдут годы, прежде чем эти страны смогут переоснастить или построить новую промышленную базу для себя, и любым созданным компаниям будет трудно конкурировать с нашей промышленностью. Однако, если эта инициатива увенчается успехом, мы можем оказаться с рядом полезных союзников, защищающих наши западные владения и крупные зарубежные рынки, с которыми наша экономика может взаимодействовать относительно безнаказанно."
 russia.452.a: "Так работает экономика."
 russia.453.t: "Зюганов уходит на пенсию"
 russia.453.d: "Геннадий Зюганов, уже бывший глава нашей страны и Коммунистической Партии, наконец-то решил уйти на заслуженный отдых. Он много лет служил своей стране и народу, борясь за социальную справедливость и равенство. Теперь Геннадий Андреевич собирается провести свои дни на своей даче, где он будет заниматься своим любимым делом - пасекой. Он всегда увлекался пчеловодством и считает, что это очень важное занятие для сохранения экологического баланса и производства качественного меда. Его труд и усилия в политике будут надолго запомнены и оценены народом."
 russia.453.a: "Спасибо вам за труд, Геннадий Андреич"
 russia.454.t: "Результаты Выборов!"
 russia.454.d: "После динамичной избирательной кампании, проведенной всеми партиями, политических компромиссов и объявления кандидатур, Центральная избирательная комиссия успешно подсчитала все голоса. Затаив дыхание, члены каждой партии, наряду с обычными гражданами, теперь смотрят свои телевизоры, мобильные устройства и компьютеры, чтобы узнать, кто победил на выборах в России. Хотя многие подозревают, что "Единая Россия" останется у руля нации, шансы на победу "Народной России" все еще есть, и если очень повезёт, то третья партия - "Новая Россия" - может одержать неожиданную победу\n\nПобедителем является..."
 russia.454.a: "Дмитрий Патрушев!"
 russia.454.a1: "Сергей Собянин!"
 russia.454.a2: "Михаил Мишустин!"
 russia.454.a3: "Андрей Белоусов!"
 russia.454.b: "Вячеслав Володин!"
 russia.454.b1: "Сергей Шойгу!"
 russia.454.b2: "Сергей Нарышкин!"
 russia.454.c: "Михаил Делягин!"
 russia.454.c1: "Павел Грудинин!"
 russia.454.c2: "Валентин Коновалов!"
 russia.454.f: "Захар Прилепин!"
 russia.454.f1: "Александр Лукашенко!"
 russia.454.f2: "Николай Платошкин!"
 russia.454.g: "Владислав Даванков!"
 russia.454.z: "Антон Алиханов!"
 russia.454.g1: "Михаил Делягин!"
 russia.454.g2: "Дмитрий Патрушев!"
 russia.454.g3: "Захар Прилепин!"
 russia.454.g4: "Вячеслав Володин!" 
 russia.454.h1: "Дмитрий Патрушев!"
 russia.454.h2: "Михаил Делягин!"  
 russia.454.h3: "Захар Прилепин!"
 russia.454.h4: "Вячеслав Володин!"
 russia.455.t: "Рашкин вручает медаль Навальному"
 russia.455.d: "Сегодня президент СССР Валерий Рашкин торжественно вручил медали "За заслуги перед Отечеством" особо отличившимся гражданам нашей страны, но эта церемония была особенной, поскольку ее получил и известный оппозиционер Алексей Навальный. Церемония проходила в Кремле, на ней присутствовали многие высокопоставленные чиновники и представители СМИ.\nВ своей речи Рашкин высоко оценил преданность Навального демократии и его готовность противостоять коррупции и несправедливости. Он признал, что их политические взгляды сильно различаются, но подчеркнул, что важно признавать и чествовать тех, кто борется за то, во что верит.\nПолучив медаль, Навальный поблагодарил Рашкина и рассказал о важности свободы слова и необходимости правительства, которое представляет всех своих граждан. Он также выразил надежду, что этот жест станет шагом к большему единству и взаимопониманию между политическими фракциями в стране."
 russia.455.a: "Интересное Событие!"
 russia.456.t: "Михаил Светов создаёт Новый Демократический Союз"
 russia.456.d: ""
 russia.456.a: "Бей фашистов" 
 russia.457.t: "Реформирование Российского Государства"
 russia.457.d: "Российская Федерация изжила свою полезность для своих граждан, неудачи "Единой России" очевидны на примере унижений, которые мы пережили от рук коррумпированной администрации, неспособной навести порядок. Это не потому, что мы не пытались, но очевидно, что старая система должна быть выкорчевана. Мы начнем с провозглашения Российского государства вместо старой Федерации.\n\nПо воле тувинца, нашего генерала Шойгу, евразийство получило бразды правления Российским государством, федерализм не защитил евразийские народы, а Тыва Шойгу осталась беднейшим регионом России, несмотря на автономию. Теперь ясно, что автократическое реформирование государства Дугиным послужит евразийским народам лучше, чем любая федеральная автономия, и плоды евразийства для нас уже не за горами. С гибелью Федерации и отменой старой Конституции мы можем начать искоренять коварные элементы на всех уровнях общества и в каждом органе власти."
 russia.457.a: "Новое Начало." 
 russia.458.t: "Телепередача"
 russia.458.d: ""Приветствую, граждане России! Я - Николай Лукашенко... Редко приходится произносить речи; признаться, это не мой конёк. Но! Я ценю правду. Я уверен: то, что я скажу сегодня, вам всем очень понравится. Мой отец и Владимир Владимирович были великими лидерами. Они подняли страну из праха. Это их острый ум и преданность общей цели лежат в основе этой страны. Владимир Путин дал нам цель и надежду. Заводы моего отца дали нам оружие - лучшее во всём мире! Только армия подвела нас: она позволила себе стать тупой, жирной и ленивой. Но этому пришёл конец! Давно пришла пора сменить руководство. Мы знаем, что нужно народу. Мы искореним заразу безволия и пораженчества...""
 russia.458.a: "Сильные, но нужные слова"
 russia.459.t: "Александр Дугин Назначен На Пост Премьера"
 russia.459.d: "Назначение Александра Дугина премьер-министром России - шаг, который быстро изменит российское общество. Можно только представить, как сильно изменится Россия под руководством идеолога евразийства. \nДля россиян, которые ожидали чрезвычайного правительства, но не ожидали назначения премьера или президента от партии, не связанной с "Единой Россией", назначение Дугина любопытно, но для информированного человека внешняя политика и мировоззрение Дугина давно влияют на путинистские взгляды, так что это естественная эволюция для России и российского правительства, Не как продолжение "Единой России", а как развитая версия, выходящая за рамки простого фарсового следования тому, что считалось "евразийской" внешней политикой, и полностью принимающая Евразию как государство, а не только как политику.\n\nВ ближайшие месяцы Россию ждут перемены, наши враги в Европе будут смотреть на нас с подозрением, и это справедливо. Западный мир не может позволить себе существование сильной Евразии, и именно поэтому мы должны выстоять, и именно поэтому премьерство Дугина так важно, Российские левые и российские правые объединятся под руководством Дугина, и вместе либерализм, эксплуататорские олигархи, международные конгломераты, контролирующие жизни миллионов, будут удалены из евразийского уравнения, Европа больше не будет долго страдать от своих недугов, Дугин вылечит Россию, а вскоре он вылечит и Запад."
 russia.459.a: "Дугин означает реформу, настоящую реформу." 
 russia.460.t: "Предатели Разбушевались!"
 russia.460.d: "Народ России устал от войны, предыдущий президентский срок Медведева всем нравился, но теплые чувства и путинская ностальгия закончились, когда войска НАТО двинулись на восток. Наши кавказские территории были отторгнуты, мы потеряли связи с Черным морем. Хуже всего то, что мы были вынуждены принимать политических изгнанников и освобождать политических заключенных в качестве условия мира.\n\nНаша армия дезертирует на улицы, растворяясь в ордах наделенных властью либералов, без сомнения, поддерживаемых и поддерживающих западные разведывательные организации и группы поддержки. Не только либералы, но и националисты, коммунисты, наши бывшие союзники по различным легальным партиям, все политические группировки выходят из леса, чтобы развалить "Единую Россию" и разрушить центристский оплот, который долгое время удерживал Россию вместе, оплот против олигархов и против западных посягательств. Но мы не смогли удержать этот оплот, склонившись перед олигархами, чтобы поддержать войну, и пав перед западным вторжением.\n\nНекоторые подразделения Вагнера также перешли на сторону врага, Пригожина нигде не видно с момента потери. Часть военных настаивает на том, чтобы наше правительство позволило им сформировать чрезвычайное правительство под руководством Шойгу. В значительной степени подразумевается, что эта просьба не является необязательной, поскольку подразделения уже движутся в Москву для ее охраны. Мы вступаем в новое смутное время."
 russia.460.a: "Все против нас!" 
 russia.461.t: "Внесистемная Оппозиция"
 russia.461.d: "В любой стране есть слой людей которые не участвуют в обычной политике страны, а наоборот пытаются организовать свою собственную, как противовес официальной. Так уж исторически вышло что в России, эта прослойка людей либеральная, хотя и в ней есть много других "цветов", либеральная повестка занимают абсольтно доминатную позицию. Хотя они, в большой мере, не угрожают текущей системе государства, их существование и усиление может иметь негативные последствие для нашей страны. Именно их использует Запад чтобы пытаться сбить Россию с её пути, и всяческие мешать осуществлению нашей общей мечты.\n\nАдминистрация должна следить за ростом £GFX_RF_logo Либеральной Оппозиции, и всячески ограничивать и сокращать её силу, дабы её негативные эффекты становилась слабее."
 russia.461.a: "Полезные Идиоты Запада..." 
 russia.462.t: "Голосование По Поправкам Проведено Успешно!"
 russia.462.d: "Голосование по поправкам было проведено, и закончилось их принятием! Не было зафиксировано никаких сплесков анти-правительственной активности, наоборот, народ, в своём большинстве, поддержал решение президента."
 russia.462.a: "Слава Путину!" 
 russia.463.t: "Протесты Из-За Результатов Голосования!"
 russia.463.d: "Наши чиновники провели голосование по поправкам в конституцию, но сделали это крайне небрежно. Либеральная оппозиция, посчитав выборы бессмысленными, в большинстве своём проигнорировала голосование. Однако столичные коммунисты, во главе с Валерием Рашкиным, не упустили момента и организовали массовые протесты в Москве. Поправки были приняты, но с гораздо худшими результатами, чем ожидалось, что стало ударом по властям и вызвало волну негодования в обществе."
 russia.463.a: "В следующий раз нужно быть более внимательными" 
 russia.464.t: "Речь Путина О Поправках В Конституцию"
 russia.464.d: "Президент России Владимир Путин выступил с долгожданным обращением к народу, в котором изложил ряд поправок к Конституции и объявил о начале подготовки к проведению всенародного референдума. Поправки, в случае их принятия, ознаменуют собой значительные изменения в политическом ландшафте и структуре государственного управления России.\nВ своем выступлении Президент подчеркнул важность обновления Конституции страны с учетом меняющихся потребностей и устремлений граждан. Он подчеркнул, что предлагаемые поправки направлены на укрепление демократических институтов, защиту прав личности, обеспечение стабильности и развития России."
 russia.464.a: "Пусть это решит народ!"
 russia.465.t: "Сотрудничество с Ираном?"
 russia.465.d: "В условиях, когда антитеррористическая операция против талибов идет полным ходом, было бы разумно обратиться за ограниченной помощью к Ирану, поскольку известно, что он имеет напряженные отношения с правительством талибов.\n Хотя нам и не нужно их полное участие, их столкновения с силами талибов на их границах и нарушение их линий снабжения могли бы быть весьма полезны для скорейшего достижения целей АТО."
 russia.465.a: "Отправьте официальный запрос."
 russia.465.b: "С талибами мы разберемся сами!" 
 russia.466.t: "Иран отказывается от сотрудничества"
 russia.466.d: ""
 russia.466.a: "Понятно."
 russia.467.t: "Исламский Марш"
 russia.467.d: "ti che ahuel"
 russia.467.a: "Мы продолжим, несмотря ни на что!"
 russia.467.b: "Если народ этого хочет..."
 russia.468.t: "Результаты "Деисламизации""
 russia.468.d: ""
 russia.468.a: "Это не совсем то, чего мы хотели"
 russia.469.t: "Государственный Атеизм?"
 russia.469.d: "До установления советской власти Русская Православная Церковь, несмотря на мнимую свободу вероисповедания, выполняла роль инструмента контроля населения, продвигая 'нужные' идеи в обществе. Однако мы исправили эту несправедливость, существенно ослабив влияние РПЦ. Тем не менее некоторые члены партии считают, что этого недостаточно и что нам необходимо вернуться к принципу государственного атеизма. Данная инициатива, хоть и является благородным порывом вернуть старые советские порядки, по мнению большинства, слишком радикальна. Как нам следует поступить?"
 russia.469.a: "Бога нет!"
 russia.469.b: "Слишком жёстко..."
 russia.470.t: "Расцвет Русского инди-геймдева"
 russia.470.d: "После возрождения русского авангарда и футуризма, которые были забыты в течение десятилетий, художники, музыканты и писатели начали создавать новые яркие и необычные творения. Для поддержки новых талантов начали выделяться средства на создание новых произведений и организацию выставок, концертов и других мероприятий.\n\nИндустрия видеоигр также не осталась в стороне. Многие разработчики начали создавать игры, которые были необычными и заставляли задуматься. Они использовали элементы авангарда и футуризма, чтобы создать по-настоящему уникальные игровые миры. Многие из них стали очень популярными среди ценителей странных игр.\n\nБлагодаря этому буму инди игровой индустрии, Россия стала одним из лидеров в производстве непонятных и авангардных игр."
 russia.470.a: "Неясное..."
 russia.471.t: "Выбор столицы для объединенной Новороссии"
 russia.471.d: "Переговоры по объединению Новороссии продолжаются, но сейчас нам нужно решить важный вопрос: какой город будет выполнять функцию столицы объединённой республики?\nЦентром могут стать два города: Донецк и Луганск.\nДонецк - крупный промышленный и шахтёрский центр, обладающий большим населением, но расположенный опасно близко к фронту.\nЛуганск - город с меньшим населением, однако не менее промышленно развитый и имеющий более безопасное расположение.\nДискуссия по этому вопросу может затянуться, однако наш выбор..."
 russia.471.a: "Луганск - истинно русский город!"
 russia.471.b: "Донецк - сердце Донбасса!" 
 russia.472.t: "Новый глава правительства Новороссии?"
 russia.472.d: "Переговоры по объединению донбасских республик продолжаются, и теперь перед нами встал очередной вопрос: кто станет главой нового государства?\nНа должность претендуют два кандидата: Денис Пушилин и Леонид Пасечник.\nПушилин, нынешний глава ДНР, взял власть в свои руки после гибели крайне популярного Александра Захарченко. Хотя он и пользуется относительно высокой поддержкой народа, Пушилин так и не достиг уровня Захарченко. До начала своей политической карьеры занимался бизнесом и даже был связан с печально известной "МММ" Сергея Мавроди.\nПасечник, нынешний глава ЛНР, ранее был связан с силовыми структурами Украины и даже имел звание полковника СБУ однако его лояльность не подвергается сомнению. Он имеет больший политический опыт, чем Пушилин, а также несколько более высокую поддержку в народе. Оба претендента имеют свои преимущества и недостатки, тем не менее главой Новороссии станет..."
 russia.472.a: "Опыт Пасечника ценнее!"
 russia.472.b: "Пушилин и его опыт управлением бизнесом будут полезны!" 
 russia.473.t1: "Переговоры по Новороссии завершены!"
 russia.473.t2: "Переговоры по Новороссии спешно завершены"
 russia.473.d: ""
 russia.473.a: "Вместе они будут сильнее..."
 russia.474.t: "Зюганов настаивает на создании нового Красного пояса"
 russia.474.d: "Лидер КПРФ выступил с интересным предложением: возродить так называемый Красный пояс.\nКрасный пояс - группа регионов в Центральной России, на Северном Кавказе, в Сибири и на Дальнем Востоке, которые на протяжении длительного времени выражали поддержку КПРФ на местных и общегосударственных выборах. Особенно ярко Красный пояс проявил себя на президентских выборах 1996 года, обеспечив значительную поддержку Зюганову в противостоянии с Ельциным.\nХотя поддержка коммунистов со временем падала всё сильнее, этот термин до сих пор не потерял свою актуальность. И если коммунистической партии удастся восстановить доверие населения этих регионов, она получит значительное преимущество над другими политическими силами."
 russia.474.a: "А... Хотите новый "красный реванш"?" 
 russia.475.t: "Жириновский готовится к турне по стране"
 russia.475.d: "Лидер партии ЛДПР, несомненно, является чуть ли не самым эксцентричным политиком современной России. Он пользуется народной любовью благодаря своим неожиданным и противоречивым выходкам во время заседаний Государственной Думы или в ходе участия в различных телепрограммах.\nЖириновский не брезгует использовать самые разные популистские методы в своей политической карьере. Одним из таких методов являются его "выходы в народ", во время которых он встречается с простыми людьми по всей стране, выступает перед широкой аудиторией и выслушивает мнение граждан о текущей политической ситуации.\nНедавно политик объявил, что планирует посетить множество российских городов, где встретится со своими сторонниками и проведёт в каждом небольшую пресс-конференцию. Хотя ЛДПР остаётся лишь третьей по популярности партией, это событие поможет ей значительно укрепить свои позиции и получить дополнительную поддержку населения."
 russia.475.a: "Что ж... Его энергичность достойна восхищения" 
 russia.476.t: "Арест политика от КПРФ вызвал споры"
 russia.476.d: "Недавний арест члена КПРФ правоохранительными органами вызвал бурную реакцию общественности. Руководство партии выступило с заявлением, что арест был произведен неправомерно и без предъявления каких-либо конкретных обвинений. В то же время депутаты фракции ЛДПР выразили поддержку этому решению. В социальных сетях продолжаются споры о его законности и обоснованности. Этот инцидент не повлек за собой катастрофических последствий, но определённо нанёс удар по нашему имиджу."
 russia.476.a: "В следующий раз надо быть осторожнее..." 
 russia.477.t: "Арест политика ЛДПР вызвал разногласия"
 russia.477.d: "Не так давно член ЛДПР был взят под стражу силовыми ведомствами, что вызвало смешанную реакцию общества. Лидер партии Владимир Жириновский выступил с трибуны Государственной Думы, заявив о том, что Следственный комитет погряз в коррупции, а полиция действует безответственно. Тем временем депутаты от КПРФ выступили в поддержку ареста. В интернете высказываются как мнения о правомерности задержания, так и утверждения о том, что его причины полностью сфальсифицированы. Это событие не повлекло серьёзных последствий, но определённо нанесло удар по нашей репутации."
 russia.477.a: "В следующий раз надо быть осторожнее..." 
 russia.478.t: "Либералы протестуют против интервенции в Казахстан"
 russia.478.d: "Недавнее решение стран ОДКБ ввести войска в Казахстан для проведения специальной миротворческой операции встретило осуждение и сопротивление со стороны так называемой "либеральной оппозиции". Множество молодых людей выходит на улицы на несанкционированные митинги в поддержку казахского народа и против "агрессии Кремля". Звучат такие лозунги как: "Нет войне!", "Казахстан, мы с тобой!", "Банду Путина - под суд!", "Свободу Навальному!" и прочие гадости в адрес власти.\nДа, мы можем не обращать внимания на желчь и арестовать лишь самых ретивых, но силовики уверены, что всё начинается с малого и в дальнейшем бездействие нам аукнется.."
 russia.478.a: "Это пройдёт"
 russia.478.b: "Используйте грубые меры, мы не должны показаться слабыми"
 russia.479.t: "Акция КПРФ против местных коррупционеров"
 russia.479.d: "Некоторое время назад активисты КПРФ провели митинг против местных чиновников, заявив, что те бесконтрольно разворовывают муниципальный бюджет. На протесте собрались несколько сотен человек, выступивших в поддержку партии и потребовавших назначения новых чиновников из числа членов КПРФ.\nМестная администрация отказалась давать какие-либо комментарии. Это событие - небольшое местное мероприятие, однако оно определённо может сыграть коммунистам на руку."
 russia.479.a: "Пусть тешатся..."
 russia.479.b: "Замести их под ковёр"
 russia.480.t: "ЛДПР протестует против местных "антирусских законов""
 russia.480.d: "Недавно по инициативе ЛДПР был организован протест против законов, которые, по их мнению, нарушают права и свободы русского населения. Активисты озвучили требования о недопущении расширения автономий кавказских республик и ужесточении миграционного законодательства в отношении жителей Средней Азии. Полиция обеспечила безопасность мероприятия и предотвратила возможные провокации. Эта акция - небольшое локальное мероприятие, тем не менее она явно способна помочь укрепить позиции сторонников Жириновского."
 russia.480.a: "Разрешите им протестовать..."
 russia.480.b: "Заглушить их"
 russia.481.t: "Жириновский в ярости из-за импорта синовака"
 russia.481.d: ""У нас же есть Сколково, другие наукограды! И мы их кормим и выделяем бюджеты! Так для чего?  Чтобы завозить всё из Китая?! Это настоящее предательство! Проявление подлости и высшая степень недоверия нашим светлым умам!". Именно с такими речами Владимир Жириновский обрушился на инициативу ввезти Синовак во время недавнего заседания Государственной Думы. Данное решение итак вызвало ряд обсуждений и споров в российском обществе, а апогеем  выступили многочисленные протесты ЛДПР проходящие под лозунгом противодействия закабалению России Китаем. Пусть данные протесты уже утихли, партия и  Владимир Жириновский лично всё таки смогли получить свою порцию общественного внимания."
 russia.481.a: "Слишком большая самоуверенность тоже вредит, знаете ли!" 
 russia.482.t: "Члены КПРФ митингуют против путинского "шмурдяка""
 russia.482.d: "К удивлению властей и несистемного левого движения России,  члены КПРФ выступили с резкой критикой разработки вакцины Спутник V. В качестве своих аргументов они используют повальную коррупцию в России и то, что Китай уже создал эффективную вакцину от вируса. Особенно широкое распространение получила история про то, что член Ижевского Горкома якобы попал в больницу с осложнениями после инъекции вакцины. Данная история активно тиражировались в месседжерах WhatsApp и Telegram, а удмуртское отделение партии в ВК сделало пост о данной ситуации. В результате во время митингов КПРФ граждане России могли наблюдать уникальную картину, где антипрививочники  и коммунисты шагали по улицам вместе выкрикивая одинаковые лозунги. Конечно, волнения уже поутихли однако партия КПРФ, кажется, ненадолго получила свою порцию внимания от общества."
 russia.482.a: "А мы-то думали, что коммунисты против суеверий!" 
 russia.483.t: "Жириновский возглавил марш за Фургала"
 russia.483.d: "Когда арестовали Сергея Фургала, все замерли в ожидании - как отреагирует Жириновский? И он не подвёл! Вопреки ожиданиям и страхам, Владимир Вольфович сам встал во главе многотысячного марша, бросая вызов системе! Он не побоялся стать лицом сопротивления, разжёг огонь народного гнева и показал, что ЛДПР - это не просто партия, а кулак, готовый ударить по тем, кто угрожает её интересам! Этим жестом Жириновский взорвал политическую арену, ведь никто не мог ожидать такого смелого шага от старого вожака."
 russia.483.a: "Ошеломляющая демонстрация силы"
 russia.484.t: "ИДИ НАХУЙ ТУПОЙ ЧИТЕР"
 russia.484.d: "НУ ЧТО БУДЕШЬ СОСАТЬ?"
 russia.484.a: "ТЫ ЛОХ"
 russia.485.t: "Заявление Президента"
 russia.485.d: "Шок от краха Америки все еще ощущается в России, несмотря на нашу неприязнь к американскому правительству, никто не смог предсказать столь радикальный поворот событий.\nПрезидент Российской Федерации выступил с публичным заявлением по этому вопросу, оно длилось несколько минут и было наполнено множеством мыслей и исторических замечаний, но среди всех них российское население, похоже, обратило внимание на одну конкретную цитату..."
 russia.485.a: ""СССР понимал, что крах западного капитализма неизбежен...""
 russia.485.b: ""Граждане России испытывают глубокое сочувствие и жалость к краху, с которым сталкиваются простые американцы...""
 russia.485.c: ""Я не могу не вспомнить цитату, сказанную русским философом Иваном Ильиным...""
 russia.486.t: "Главный Храм Вооружённых сил Российской Федерации"
 russia.486.d: "Сегодня,  в России состоялось торжественное открытие Главного храма Вооружённых сил Российской Федерации. Это событие стало значимым шагом в укреплении духовной и моральной основы армии, а также символизирует единство нации и поддержку военных сил страны.\nГлавный храм Вооружённых сил России расположен на территории Патриаршего подворья "Спасо-Андроников монастырь" в Москве. Он стал самым крупным православным храмом в стране и представляет собой важный символ патриотизма и веры.\nЦеремония открытия храма была организована под руководством Председателя Синодального отдела по взаимодействию Церкви с вооружёнными силами и правоохранительными органами протоиерея Димитрия Смирнова. В мероприятии приняли участие представители религиозных, политических и общественных организаций, а также военнослужащие и ветераны."
 russia.486.a: "Поистине сногсшибательно!"
 russia.487.t: "Покушение на Президента!"
 russia.487.d: "Тревожные новости поступили из Ижевска, где было совершено покушение на Владимира Путина во время его официального визита на завод "Калашников". Нападавший, переодетый в фабричную униформу и вооруженный ПМ, успел произвести один выстрел в воздух, прежде чем был задержан сотрудниками ФСО. Несмотря на попытку преступников приблизиться к президенту среди толпы, были приняты оперативные меры по эвакуации Владимира Путина из здания. Усилия по пресечению этого инцидента оказались тщетными, поскольку многочисленные общедоступные новостные сайты по всей стране сообщили о шокирующем событии. Этот наглый акт насильственного противодействия вызывает глубокую озабоченность и требует немедленного внимания."
 russia.487.a: "Шокирующе!" 
 russia.488.t: "Официальное Заявление"
 russia.488.d: "Среди суматохи, вызванной недавним покушением, было проведено экстренное заседание Совета безопасности, на котором они обсудили последние новости, а также подготовили официальное заявление о покушении. Среди множества правдоподобных причин для совершения этого нападения были выбраны три, как основные экстремистские идеологии, которыми преступник был загипнотизирован.\nТеррористом был..."
 russia.488.a: "Коммунистический радикал."
 russia.488.b: "Украинский бандеровец."
 russia.488.c: "Российский националист." 
 russia.489.t: "IT-бизнес Поддерживает СВО"
 russia.489.d: "После начала Специальной военной операции возникли опасения по поводу потенциального противодействия российского ИТ-сектора официальным государственным директивам. Однако, к удивлению многих, известные платформы, такие как "Яндекс", "Вконтакте" и другие, опубликовали официальные заявления, в которых выразили свою поддержку решениям, принятым российским правительством. В этих заявлениях подчеркивалась важность единства российского народа перед лицом агрессивного глобализма. В дополнение к своим словам, эти платформы предприняли действия, обеспечив, чтобы в результатах поиска отображался исключительно пророссийский контент, и приостановив любую пропаганду пронацистских программ. Кроме того, "ВКОНТАКТЕ" предприняла значительные меры по подавлению проукраинских групп и аккаунтов. В результате население России теперь испытывает чувство защищенности как от внутренних, так и от внешних воздействий, будь то физических или цифровых."
 russia.489.a: "Стоящая инвестиция!" 
 russia.490.t: "Срочные Репрессии!"
 russia.490.d: "После недавнего покушения на Владимира Путина его политическим оппонентам в России пришла своего рода расплата. Подразделения ФСБ были развернуты в нескольких крупных городах, где, как ожидается, в ближайшем будущем произойдут крупные беспорядки, а Росгвардия, ГРУ и другие службы безопасности пообещали Думе сформировать совместную оперативную группу для предотвращения повторения подобных инцидентов. Ожидается, что с выделением дополнительной рабочей силы и финансирования для всех вовлеченных сторон значительная часть диссидентствующих элементов в нашей стране будет задержана в кратчайшие сроки.\n\nЭти действия, вероятно, вызовут антагонизм Запада наряду с внутренними террористическими группировками в стране. Однако они не могут оспаривать, что такой подход необходим для обеспечения благополучия нашего народа."
 russia.490.a: "Мы были слишком снисходительны... Ну, больше не будем."
 russia.491.t: "Три Флага - Одна Держава"
 russia.491.d: "Историческая память и преемственность поколений в России взяли новую высоту, причем в буквальном смысле. Теперь в Петербурге над акваторией Финского залива на громадных мачтах развеваются полотна, символизирующие три эпохи - Российскую империю, Советский Союз и Российскую Федерацию. Гигантские флаги стали частью парка, который уже давно стал одной из точек притяжения как горожан, так и туристов. Под звуки сразу нескольких исторических российских гимнов в исполнении оркестра три огромных полотнища поднялись ввысь и тут же начали реять в порывах балтийского ветра. Красивая и символичная церемония состоялась в петербургском парке на берегу моря рядом с самым высоким в Европе небоскребом "Лахта Центр". Там на огромных флагштоках подняли исторические флаги Российской империи и СССР, а также государственный флаг России. Каждый из них - реликвия.\nНа берегу устроили праздничный концерт, сотни человек стали зрителями торжественного момента. С катера за церемонией наблюдал президент России вместе с авторами идеи. Проект реализован компанией "Газпром"."
 russia.491.a: "Помним нашу общую историю!"
 russia.492.t: "КПРФ критикует администрацию Медведева"
 russia.492.d: "Несмотря на нашу победу на недавних выборах, думские партии, в том числе КПРФ, продолжают вставлять нам палки в колёса. Депутаты заявляют о несправедливой доминации Единой России в Госдуме и "неправильных" реформах, проводимых президентом Медведевым. Споры о действиях правительства во время заседаний парламента могут длиться часами, что значительно парализует рабочий процесс.\nОднако у президента уже есть план решения этой проблемы, и мы должны осуществить его как можно скорее"
 russia.492.a: "У них есть свое мнение..."
 russia.493.t: "ЛДПР критикует администрацию Медведева"
 russia.493.d: "Даже после победы Медведева на недавних выборах парламентские партии, в том числе ЛДПР, продолжают саботировать нашу работу. Члены партии обвиняют Медведева в непростительном "игнорировании интересов русского народа" и, по их мнению, абсолютно ненужных законодательных преобразованиях. Крики Жириновского о "предателях" из Единой России могут продолжаться чуть ли не половину всего рабочего процесса Госдумы, что серьёзно мешает законотворческой деятельности. \nТем не менее у президента уже есть план решения этой проблемы, и мы должны осуществить его как можно скорее."
 russia.493.a: "У них есть свое мнение..."
 russia.494.t: "Прямая Линия с Дмитрием Медведевым"
 russia.494.d: "Недавно во время "Прямой линии" с президентом, новоизбранный Медеведев отвечал на вопросы, касающиеся политического будущего страны:\n- Добрый день, Дмитрий Анатольевич! Я Антон из "Омских новостей", и я хочу задать вопрос, который хотят задать многие, не только омичи, но и все россияне.\n- Добрый день.\n- Во время Вашего первого срока Вы были известны как достаточно либеральный президент, многие даже противопоставляют Вас Владимиру Путину. Согласитесь ли Вы с этим наследием и будете ли его продолжать?\n- Спасибо за вопрос! Конечно, во время своего первого президентства я в какой-то мере разыгрывал идею быть более близким к Западу, но хочу уточнить, что это никогда не было противопоставлением Владимиру Владимировичу и не шло вразрез с нашими общими взглядами на будущее России. С учетом того, что после моего ухода с поста президента геополитические события развивались более активно, я уже давно понял, что любое сближение с Западом будет бесперспективным и встретит злорадство. Однако скажу - перемены будут! Я, вместе со своей командой, буду планировать будущую трансформацию политической жизни России, и, думаю, многим из вас это понравится!"
 russia.494.a: "Русское лето наступит, и оно будет... бесконечным." 
 russia.495.t: "Медеведев Назначен Руководителем ОНФ"
 russia.495.d: "После ухода из жизни Владимира Путина Общероссийский Народный Фронт остался без лидера, и многие опасались, что это приведет к потере позиций и распаду организации. Однако исполком официально назначил главой организации Дмитрия Медведева - нынешнего президента России. В своей инаугурационной речи он пообещал продвигать дело Народного фронта и заверил, что "ОНФ, организация такого рода, в нынешней геополитической ситуации нужна как никогда".\n\nМногие политологи видят в назначении Медведева главой ОНФ не более чем рутину и еще одно доказательство лояльности Медведева Путину, но некоторые считают, что новый президент может использовать ОНФ в своих интересах и расширить его до масштабов, недостигнутых Путиным."
 russia.495.a: "Посмотрим, что получится."
 russia.497.t: "Новый выпуск облигаций Военного Займа!"
 russia.497.d: ""
 russia.497.a: "Круто!"
 russia.498.t: "Волна Добровольцев!"
 russia.498.d: ""
 russia.498.a: "Круто!"
 russia.499.t: "Завершена Военная благотворительная кампания!"
 russia.499.d: ""
 russia.499.a: "Круто!"
 russia.500.t: "Прибыла Международная Помощь!"
 russia.500.d: ""
 russia.500.a: "Круто!" 
 russia.501.t: "Открытие Первого Памятника в Честь Путина"
 russia.501.d: "Сегодня в Санкт-Петербурге состоялось значимое событие - открытие памятника Владимиру Путину на его родной улице Маяковского. Множество людей собралось, чтобы почтить память выдающегося лидера, чьи взгляды и принципы оказали значительное влияние на возвращение России её достойного места в мировой политике.\n\nВ ходе мероприятия выступили известные политические деятели и губернатор Санкт-Петербурга, которые подчеркнули важность признания заслуг Путина и его деятельности на посту президента. Памятник, высота которого составляет 26 метров, изображает Владимира Путина во весь рост, с заложенными за спину руками. Надпись на монументе гордо провозглашает его "Героем новой России".\n\nНекоторые чиновники полагают, что это событие может стать началом процесса постепенной замены некоторых статуй Ленина на изображения Владимира Путина."
 russia.501.a: "Заря новой России!"
 russia.503.t: "Словацкая Оттепель"
 russia.503.d: ""
 russia.503.a: "Хорошо!"
 russia.504.t: "Словацкая Оттепель"
 russia.504.d: "Роберто Фицо провёл ряд правительственных реформ, которые побудили многих людей призывать к "оттепели" в политике. Он также расширил социальные программы и улучшил бюрократический процесс. Многие люди с большой надеждой приветствовали эти изменения.\n\nРанее Словакия была известна как очень бедная страна, контролируемая группами, представляющими интересы ЕС. Однако после европейской войны, победы России и избрания Фицо ситуация изменилась. Теперь Словакия становится сильным союзником и процветающей страной. Некоторые связывают это с финансированием из России, в то время как другие отдают должное политическому гению Фицо."
 russia.504.a: "Отлично!"
 russia.505.t: "Выбор"
 russia.505.d: ""
 russia.505.a: "Я Дохуя Путинист"
 russia.505.b: "Я Дохуя Коммунист"
 russia.506.t: "Формирование Свободной Карпатии"
 russia.506.d: "Пётр Гецко, президент Карпатии, официально объявил о создании новой политической партии под названием "Свободная Карпатия". В своей недавней речи он заявил, что его народ будет стремиться к своей собственной уникальной форме демократии, отличной от других форм, и что эта новая партия станет движущей силой политической инклюзивности и будет призывать всех граждан Карпатии активно участвовать в государственных делах."
 russia.506.a: "Отлично!" 
 russia.507.t: "Карпатия Создаёт "Русинский Социализм""
 russia.507.d: "Пётр Гецко, президент Карпатии, официально объявил о создании идеологии "русинского социализма". В своей недавней речи он заявил, что его народ будет стремиться к своей собственной уникальной форме социализма, отличающейся от других форм, и что эта новая система послужит движущей силой политической инклюзивности и побудит всех граждан Карпатии активно участвовать в государственных делах."
 russia.507.a: "Ну, если они этого хотели." 
 russia.509.t: "Войцех Ольшанский побеждает на выборах в Польше"
 russia.509.d: ""
 russia.509.a: "Круто!"
 russia.520.t: "Праймериз "Единой России""
 russia.520.d: ""Единая Россия" - это долгоиграющая ведущая политическая сила в России. Однако после победы в "Европейской войне" и решения Дмитрия Медведева не участвовать в выборах партия впервые за много лет осталась без единого кандидата.\n\nЧтобы решить эту проблему, "Единая Россия" организовала праймериз - выборы, в которых примут участие самые активные и популярные политики. На этом мероприятии будет определён кандидат, который станет представителем главной линии партии. Выбор участников действительно широк, ведь "Единая Россия" славится своими опытными государственниками."
 russia.520.a: "Патрушев!"
 russia.520.b: "Собянин!"
 russia.520.c: "Мишустин!" 
 russia.520.e: "Белоусов!" 
 russia.521.t: "Праймериз Реакционеров "Единой России""
 russia.521.d: "В то время как основная часть партии активно поддерживает своего кандидата, в рядах ЕР также находятся те, кто не согласен с курсом Медведева. Они считают, что курс развития зашёл слишком далеко. Эти люди можно назвать сторонниками более консервативных взглядов на суверенную демократию.\n\nНеожиданно эти группы людей объединились и организовали свой собственный праймериз, чтобы определить альтернативного кандидата от ЕР. Среди них есть сильные сторонники государственности, опытные бизнесмены и военные старой закалки. Они надеются, что смогут изменить систему суверенной демократии в сторону, которая будет более безопасной для стабильности и народа."
 russia.521.a: "Володин!"
 russia.521.b: "Шойгу!"
 russia.521.c: "Нарышкин!" 
 russia.522.t: "Народная Россия Выбирает Кандидата в Президенты"
 russia.522.d: "Народная Россия - это новая лево-патриотическая сила в стране, объединившая самых талантливых и решительных борцов за социальную справедливость. После победы в Европейской войне и объявления Дмитрием Медведевым выборов у НР появился реальный шанс захватить власть и покончить с монополией "Единой России".\n\nНо кто станет кандидатом? Чтобы решить этот вопрос, Народная Россия собрала съезд партии, где с помощью тайного голосования будет выбран политик, который станет её лицом на этих выборах."
 russia.522.a: "Делягин!"
 russia.522.b: "Грудинин!"
 russia.522.c: "Коновалов!" 
 russia.523.t: "Радикальная Народная Россия Выбирает Кандидата в Президенты"
 russia.523.d: "Радикалы из "Народной России", стремящиеся к усилению социальной политики и переходу к "Новому социализму", также решили выдвинуть своего кандидата на выборы. Среди них есть известные политики левого и патриотического направлений. Многие считают, что только благодаря известности своих имён они имеют большие шансы опередить более умеренного кандидата."
 russia.523.a: "Прилепин!"
 russia.523.b: "Лукашенко!"
 russia.523.c: "Платошкин!"
 russia.524.t: "Тихий Переворот"
 russia.524.d: "Валерий Рашкин, известный политик и лидер оппозиционной группы в Коммунистической Партии, решил провести тихий саботаж на экстренном Съезде партии, который должен был пройти после их победы на президентских выборах. На этом съезде планировалось утвердить проект новой конституции и избрать главой партии Геннадия Зюганова, однако Валерий Рашкин и его сторонники решили изменить ход событий. Во время голосования они молча избрали главой партии именно Рашкина. Народ воспринял это как партийный переворот, но так как низовой партийный актив был на стороне Рашкина, ситуация осталась относительно спокойной. Этот ход вызвал большое раздражение у сторонников Зюганова и части членов партии, которые считали это действие предательством и нарушением партийной дисциплины. Однако Рашкин сумел удержать власть в своих руках благодаря поддержке активистов на местах."
 russia.524.a: "Неожиданный исход."
 russia.525.t: "Реакция"
 russia.525.d: "После нашей победы на выборах, заметно возросшая активность националистов, нео-имперцев и прочих реакционеров привела к массовым анти-советским протестам, которые были организованы под эгидой [SOV_anti_soviet_resistance_loc]. Они продолжают свою деятельность, проводя митинги, шествия и другие формы протеста, требуя изменений в политике страны и отстаивая свои идеологические убеждения."
 russia.525.a: "Работайте, товарищи."
 russia.526.t: "Жириновский отступает"
 russia.526.d: "Неожиданно для многих, Владимир Жириновский, идейный лидер националистических агитаторов, действующих в нашей стране, согласился на предложение партии прекратить сопротивление советской власти. Многие консервативные члены КПРФ назвали данный шаг Жириновского мудрым выбором и призвали оставшихся членов сопротивления последовать его примеру. В то же время, члены группы Рашкина отреагировали на решение лидера ЛДПР со скепсисом и выступили с предложением арестовать его. Так или иначе, для правого лагеря потеря такого политика стала серьёзным ударом."
 russia.526.a: "Это победа."
 russia.527.t: "Жириновский отказывается от предложения!"
 russia.527.d: "Владимир Жириновский, лидер активного националистического сопротивления, ответил на предложение партии прекратить антисоветскую деятельность вполне ожидаемо: отказом. Ответ лидера ЛДПР вызвал неоднозначную реакцию в обществе: в то время как Рашкин и его сторонники заявили, что такой исход был вполне ожидаем и призвали продолжить борьбу с "правым мракобесием", некоторые ортодоксальные члены КПРФ выразили огорчение, что такой мудрый политик оказался не в состоянии смириться с поражением и принять истину. Заявление Жириновского также вызвало бурные дискуссии среди простых граждан. Как бы то ни было, ясно одно: противостояние в Советской России продолжается."
 russia.527.a: "Он ещё об этом пожалеет..."
 russia.528.t: "Инцидент на телеканале"
 russia.528.d: "На обновлённом телеканале "Россия-Культура" состоялся молодежный фестиваль новой музыки, организованный в рамках указа Коммунистической Партии о продвижении авангардного советского искусства. Фестиваль собрал множество талантливых музыкантов, чьи произведения отразили позитивное отношение к приходу КПРФ к власти и жесткую критику предыдущего путинского правительства.\nОднако наибольшее впечатление произвело выступление молодого рэпера МС Фролиша, чьи неодобренные тексты жестко раскритиковали текущее коммунистическое правительство Рашкина и выразили поддержку оппозиционной Партии Патриотов и их радикального лидера Владимира Соловьева. В его песнях прозвучали такие строки, как "Останови, блять, наконец красных упырей у власти!", "Я возьму этот факт, и представлю злодею, Прямиком в ебальник суну Рашкину Валерию!", "И пора закрыть к хуям весь их партийный балаган!". Некоторые поддержали его открытую позицию и смелость высказывать свои мысли, другие же осудили его за неприличное поведение и неуважение к власти.\n\nЧто мы будем с ним делать?"
 russia.528.a: "Оставьте его в покое"
 russia.528.b: "Займитесь им..."
 russia.529.t: "Гражданская Война в Южной Африке"
 russia.529.d: "Южно-Африканская Республика распалась. Шаткое равновесие, установившееся к концу апартеида в 1994 году, наконец-то нарушилось, и различные политические группировки Южной Африки взялись за оружие, чтобы бороться за свое видение будущего страны. Объективно говоря, есть только две фракции, которые наше новое народное правительство может поддержать, это Африканский национальный конгресс и Борцы за экономическую свободу.\n\nАНК является правящей партией Южной Африки с тех пор, как она выиграла первые всеобщие выборы в стране почти тридцать лет назад . Это партия Нельсона Манделы, и наше отношение к ним и их борьбе восходит ко временам старого Советского Союза. Однако, чем дольше они были у власти, тем больше они становились сдержаннее и стагнировали. Многие говорят, что именно коррупция, неэффективность и нерешительность АНК сделали эту гражданскую войну неизбежной.\n\nНа их место встают Борцы за экономическую свободу, радикальная марксистско-ленинская фракция, возглавляемая бывшим молодежным лидером АНК Джулиусом Малемой. EFF отделилась от АНК из-за того, что последний пошел на компромиссы по поводу земельной реформы и перераспределения. Они говорят, что южноафриканская революция не будет завершена до полной экономической реорганизацией страны.\n\nУважаем ли мы наши исторические связи с АНК и поддерживаем ли их в их борьбе за поддержание порядка в Южной Африке, или же мы поддерживаем авангард EFF?"
 russia.529.a: "Мы поддержим Африканский Национальный Конгресс"
 russia.529.b: "Мы поддержим Борцов за экономическую свободу"
 russia.530.t: "Предвыборный Съезд КПРФ"
 russia.530.d: "После ухода Путина в стране наступил период неопределённости. Партия КПРФ, получившая большой шанс на победу, готовится к важнейшим президентским выборам в истории России. Однако перед кадровым отделом стоит непростая задача - выбрать того, кто сможет объединить Партию и предложить стране чёткий план будущего. У вас три варианта: \nЮрий Афонин - верный ученик Зюганова. Молодой, энергичный и лояльный аппаратчик, который может продолжить текущий курс и предложить стабильность.\nПавел Грудинин - "Кандидат от Народа", уже участвовал на президентских выборах 2018 года. Он компромиссная фигура, способная удовлетворить всех членов КПРФ в равной мере, предлагая взвешенную и умеренную политику, вместе с этим уже имея существенную базу поддержки. Самый безопасный вариант.\nСергей Левченко - бывший губернатор Иркутской области, харизматичный лидер и прагматик с опытом регионального управления. Его поддерживают многие низовые элементы Партии, что придаёт его кандидатуре оттенок более решительной и даже агрессивной борьбы за власть.\n\nКого же мы выберем?"
 russia.530.a: "Юрий Афонин"
 russia.530.b: "Павел Грудинин"
 russia.530.c: "Сергей Левченко"
 russia.530.c2: "Николай Харитонов"
 russia.531.t: "Нагорно-Карабахский Вопрос"
 russia.531.d: "После нашего успешного гамбита на Кавказе остался нерешённым один крайне проблемный вопрос - принадлежность Нагорного Карабаха.\nНагорный Карабах - спорная территория между Азербайджаном и Арменией, населённая преимущественно этническими армянами, в отличие от прилегающих районов, где большинство составляют азербайджанцы. Ещё в начале прошлого века этот регион был передан Азербайджану в качестве автономной области, но после распада Советского Союза, в ходе Карабахской войны, фактический контроль над регионом получила проармянская непризнанная Нагорно-Карабахская Республика. С тех пор Азербайджан не оставляет попыток вернуть эту территорию под свой контроль.\nТеперь, после укрепления наших позиций на Южном Кавказе, мы можем поставить точку в этом конфликте."
 russia.531.a: "Передадим всё нашим Армянским союзникам"
 russia.531.b: "Стабилизируем Регион с Помощью ОДКБ"
 russia.531.c: "Передадим всё нашим Азербайджанским союзникам"
 russia.531.g: "Попробуем Найти Компромисс"
 russia.532.t: "Азербайджан Соглашается!"
 russia.532.d: ""
 russia.532.a: "Великолепно."
 russia.533.t: "Общественный резонанс из-за бездействия Партий!"
 russia.533.d: "Несмотря на тот факт, что самые важные выборы в стране не за горами, общественность глубоко расстроена тем, что три основные партии недостаточно подготовлены и бездействуют по многим вопросам, и даже сбор подписей, похоже, идет медленно.\nСейчас жители России, похоже, ищут новые возможные пути для будущего нашей страны, некоторые даже говорят, что влиятельная фигура скоро объявит о своей позиции..."
 russia.533.a: "Мне наплевать" 
 russia.534.t: "Александр Лукашенко поддерживает СР-ЗП!"
 russia.534.d: "Шокирующее и неожиданное заявление сделал глава Белорусского государства - Александр Лукашенко официально поддержал "Справедливую Россию - за правду" и их кандидата - Сергея Миронова."
 russia.534.a: "Может быть, пришло время для чего-то нового..."
 russia.536.t: "Раскол Либертарианской Партии!"
 russia.536.d: "Незарегистрированная Либертарианская партия России (ЛПР) окончательно раскололась на две организации с одинаковым названием и символикой. Одна из них, во главе с Сергеем Бойко, провела свой съезд неделю назад, другая, руководимая Михаилом Световым,- в минувшие выходные.\n\nУчредительный съезд сторонников Михаила Светова прошел через неделю после чрезвычайного съезда другой фракции ЛПР - под руководством Сергея Бойко. Оба форума были созваны, чтобы устранить последствия раскола, возникшего из-за разногласий между руководством партии и фракцией "Принципы и дело" во главе с господином Световым. Однако на деле раскол был узаконен: две части партии решили вести самостоятельную работу и пока сотрудничать друг с другом не планируют."
 russia.536.a: "Что ж... такое случается."
 russia.537.t: "Кагарлицкий и Удальцов заключены в тюрьму!"
 russia.537.d: "После недавнего неудавшегося теракта в Санкт-Петербурге ФСБ установила связи между террористом Владленом Бабаевым и двумя популярными левыми деятелями Сергеем Удальцовым и Борисом Кагарлицким, он был постоянным посетителем их протестов и митингов.\n\nФСБ быстро задержала двух возможных подозреваемых, несмотря на поспешность событий, против обоих были возбуждены уголовные дела, которые могли закончиться лишением свободы на 8 лет.\n\nНебольшие левые организации взволнованы и уже организуют небольшие акции протеста, чтобы освободить двух подозреваемых, но Коммунистическая партия никак это не прокомментировала, но за спиной общественности Коммунистическая партия уже начала спасать то, что осталось от организации Удальцова."
 russia.537.a: "Мне наплевать."
 russia.538.t: "Алексей Навальный скончался В Тюрьме"
 russia.538.d: "Управление Федеральной службы исполнения наказаний по Ямало-Ненецкому автономному округу сообщило о смерти Алексея Навального. Как заявили в пресс-службе ведомства, осужденный почувствовал себя плохо после прогулки в Исправительной колонии Но.3 и потерял сознание. Прибывшие на место происшествия медики скорой помощи предприняли все необходимые попытки реанимации, которые не привели к результатам. Врачи констатировали его смерть.\n\nУточняется, что были проведены все необходимые реанимационные мероприятия, которые не дали положительных результатов. "Врачи службы скорой медицинской помощи констатировали смерть осужденного", - сообщили в пресс-службе Федеральной службы исполнения наказаний."
 russia.538.a: "Какая жалость!"
 russia.538.b: "Он даже не получит сноски в учебниках истории..." 
 russia.539.t: "Гражданин Навальный"
 russia.539.d: "В последние дни российские СМИ пестрят статьями о недавней посттюремной жизни Навального. Навальный, досрочно освобожденный из тюрьмы за примерное поведение и открытое раскаяние в содеянном, теперь занялся общественной и волонтерской деятельностью, помогая нуждающимся, особенно в новых субъектах федерации.\nОн также намерен избраться представителем своей родной деревни Бутынь, чтобы, как он заявил: "Привести в порядок мою старую добрую деревню и ее жителей". Отстранившись от большой политики и отказавшись от многих своих критических заявлений в прошлом, он, тем не менее, решил использовать партию "Новая Россия" в качестве платформы для своей кампании на сельских выборах: "...В последнее время все партии делали что-то хорошее, но эта - гораздо ближе к моему сердцу", - заявил Навальный в интервью "Новой газете".\nВ том же интервью "Новой газете" он призвал своих бывших сторонников признать Россию образцом демократического государства."
 russia.539.a: "Люди могут меняться!"
 russia.540.t: "Картаполов планирует заняться политикой"
 russia.540.d: "Посвятив много лет службе в армии, Андрей Картаполов выразил желание уволиться с действительной службы и перейти на новую роль в комитетах Государственной думы. Его богатый опыт и знания делают его ценным активом для российской политики и министерств, но также важно признать его исключительные навыки командира, которые могут принести большую пользу нашим военным делам.\n\nРешение о том, принять ли предложение Картаполова, теперь находится в руках президента."
 russia.540.a: "Ему лучше остаться."
 russia.540.b: "Он хорошо служил, но сейчас он нужен на политическом "фронте"."
 russia.541.t: "Реставрация КПСС"
 russia.541.d: ""
 russia.541.a: "Да бля! Ладно"
 russia.542.t: "Переговоры с КПСС"
 russia.542.d: ""
 russia.542.a: "Ладно! Ладно!"
 russia.542.b: "Ну нее..."
 russia.543.t: "Письмо от неизвестного бюрократа из Ижевска"
 russia.543.d: ""
 russia.543.a: "Партия прислушивается к её членам!"
 russia.543.b: "Иди нахуй"
 russia.544.t: "Импичмент Президенту"
 russia.544.d: ""
 russia.544.a: "КПСС перехватывает власть!"
 russia.544.b: "Бондаренко исправит ошибки Левченко!"
 russia.545.t: "Новая Реальность"
 russia.545.d: "Была поздняя ночь, Антон гулял по родному городу, ожидая долгожданного возвращения своего лучшего друга после демобилизации, он был полон возвышенных и страшных мыслей, следы войны остались в его сердце, все люди, которых он знал, так или иначе разделяли его боль, несмотря на печальную действительность, он напомнил себе, что жизнь продолжается дальше, что люди, несмотря ни на что, идут дальше - восстанавливая все, что они потеряли.\n\nИдя по городу дальше, он заметил большой плакат с президентом, показывающий этапы новой программы "Послевоенного восстановления", он уже не раз слышал о ней, но никогда глубоко об этом не задумывался, вчитавшись в программу, он вдруг понял, что это был не просто процесс восстановления страны. богатство стран, но и символ надежды на хорошее будущее, символ стабильности и свободы не только для народов России, но и для всей Европы.\n\nОн подумал про себя: "Что бы ни случилось дальше, мы построим новый мир - лучший мир.""
 russia.545.a: "Memento vivere"
 russia.546.t: "Выбираем Нашего Маршала"
 russia.546.d: "После долгих размышлений и тщательного обдумывания мы приняли судьбоносное решение возвести одного из наших уважаемых генералов из Генерального штаба на престижную должность маршала России. Это назначение означает не только большую честь, но и значительную ответственность, которую избранный генерал будет нести с полной самоотдачей.\nСреди наших уважаемых сотрудников два выдающихся кандидата стали наиболее заметными претендентами на это почетное звание: Валерий Герасимов и Олег Салюков. Оба генерала обладают исключительными лидерскими качествами, стратегическим чутьем и непоколебимой приверженностью делу обороны нашей страны. Готовясь присвоить одному из них это престижное звание, мы уверены, что выбранный маршал будет придерживаться самых высоких стандартов и продолжит служить нашей стране с честью и отличием."
 russia.546.a: "Герасимов!"
 russia.546.b: "Салюков!"
 russia.546.c: "Как насчет того, чтобы создать звание "Маршал Союзного Государства"?"
 russia.547.t: "Сирия Просит об Экономической Помощи"
 russia.547.d: "Наши сирийские друзья боролись в течение последнего десятилетия, с самого начала арабской весны. К счастью, за последние несколько лет их гражданская война неуклонно затихала, и сейчас они находятся в достаточно стабильном положении, когда экономическая помощь не будет просто выброшена на помойку. Они обратились к нам с просьбой о помощи, и они ее получат. Мы продолжим расширять наше присутствие на Ближнем Востоке, по одному рублю за раз."
 russia.547.a: "Мы должны помочь им в полной мере!"
 russia.547.b: "Конечно, мы будем поддерживать наших сирийских партнеров."
 russia.548.t: "Государственный Переворот"
 russia.548.d: "Это палестинское дерьмо становится серьезным"
 russia.548.a: "Ага."
 russia.549.t: "Сурайкин объединяет социалистов-сторонников жесткой линии"
 russia.549.d: "После укрепления новой коалиции ОНФ многие коммунисты и социалисты почувствовали, что КПРФ и родственные организации наконец-то раскрыли свою истинную природу и продались капиталистическо-путинской олигархии.\nПримером для таких людей стал Максим Сурайкин, который всегда недолюбливал КПРФ, а теперь сформировал новый "истинно коммунистический" фронт партий, объединяющихся против нашего правительства, и смог собрать значительную часть недовольного населения с левыми взглядами.Вместе с этим начала формироваться новая антисистемная оппозиция, отнимающая трон у едва живых либералов."
 russia.549.a: "Вряд ли что-то новое." 
 russia.550.t: ""Другая Россия" организует "Объединенный совет оппозиции""
 russia.550.d: ""Другая Россия", или национал-большевики, недавно организовала серию встреч представителей "национал-патриотической" оппозиции с попытками объединить их под своим командованием. Они в основном добились успеха и теперь возглавляют "Объединенный совет оппозиции", в отличие от прежних времен, когда нацболы в основном поддерживали своих либеральных коллег, именно они объединяли недовольных на правой стороне спектра. Даже некоторые либералы присоединились к ним, полностью отказавшись от самостоятельного достижения своих целей."
 russia.550.a: "Они никогда по-настоящему не исчезали." 
 russia.551.t: "Либералы Внутри"
 russia.551.d: "Борис Надеждин, самопровозглашенный лидер либералов внутри ОНФ, мутит воду внутри системы, требуя, чтобы либералы были услышаны и к ним прислушивались, и проводили реформы, которые могут угрожать основам нашей страны. Мы не можем в полной мере говорить о единстве нашего правительства, когда такие элементы сохраняются даже сегодня.\nС хорошей стороны, наши новые либералы, похоже, гораздо более открыты для компромиссов..."
 russia.551.a: "Какая досада!"
 russia.552.t: "Выборы Региональных Представителей"
 russia.552.d: "Недавно во многих уголках нашей страны состоялись выборы органов местного самоуправления, глав республик и советов. В некоторых регионах социалистические партии и правые партии ОНФ завоевали доверие населения, несмотря на то, что мы едины, наши видения все еще различны, теперь эти регионы будут управляться в соответствии с видением социалистов ОНФ и националистов ОНФ.\nОни не лишены своих сильных сторон, но и у них есть свои недостатки."
 russia.552.a: "Мы едины, но мы разные."
 russia.553.t: "Сергей Лавров уходит в отставку"
 russia.553.d: "Сергей Лавров, уважаемый глава нашего Министерства иностранных дел, официально объявил о своей отставке после многих лет самоотверженной службы, многочисленных успешных сделок и бесчисленных дипломатических миссий. Лаврова, истинного титана современной дипломатии, хвалили в средствах массовой информации за его непоколебимую приверженность продвижению интересов нашей страны на мировой арене. Сославшись на возраст и проблемы со здоровьем, Лавров выдвинул Василия Небензя в качестве своего предполагаемого преемника, и это решение вызвало как восхищение его дальновидностью, так и благодарность за его выдающееся руководство. Эфир наполнен сердечными посланиями, в которых выражается благодарность Лаврову и признается его беспрецедентный вклад во внешнеполитические усилия нашей страны."
 russia.553.a: "Мы благодарим вас за вашу службу." 
 russia.554.t: "ДЕ-МО-БИ-ЛИ-ЗА-ЦИЯ"
 russia.554.d: "После с трудом выигранных сражений и триумфа над элитарной Европой наши герои теперь должны вернуться домой. Титаническим усилиям, приложенным нашим народом, военными и экономикой, скоро придет конец. Когда наши солдаты вернутся домой, они обменяют свое оружие на средства торговли, возвращаясь к рабочей силе. Некоторые могут захотеть возобновить учебу или заняться более интеллектуальными занятиями.\nC поражением Европы потребность в наших нынешних военнослужащих уменьшается. Крайне важно уменьшить эту нагрузку на нашу экономику путем сокращения численности вооруженных сил. Эти квалифицированные специалисты окажутся гораздо более ценными в гражданской жизни на данном этапе, во многом напоминающем переходный период, произошедший в конце 1940-х годов. Возвращение к гражданской жизни знаменует собой новую главу для нашей страны, где сила и преданность делу нашего народа будут продолжать определять наше будущее."
 russia.554.a: "Они заслужили свой отдых."
 russia.555.t: "Дмитрий Медведев Побеждает на Выборах"
 russia.555.d: "Наступила пора выборов, и, ни для кого не удивительно, Дмитрий Медведев победил с подавляющим большинством голосов - 85,31%. Все парламентские партии либо поддержали его кандидатуру, либо приложили минимальные усилия к своей кампании, и вскоре после получения результатов полностью заявили о своей поддержке переизбранного президента.\nНесколько несистемных кандидатов набрали всего около 0,7%, что позволило объявить эти цифры нелегитимными. Многочисленные недоброжелатели, сосредоточенные сейчас в основном за пределами России, уже с абсолютной вероятностью поставили под сомнение результат Путина. Но в нынешней политической реальности важно то, что происходит внутри России. А внутри России Медведев - абсолютный победитель и абсолютный рекордсмен: как формальный, так и реальный."
 russia.555.a: ""Россия - это Я.""
 russia.556.t: "Раскол в ЛДПР"
 russia.556.d: "После смерти Владимира Жириновского многие думали, что ЛДПР уже не будет прежней, и они оказались правы. Внутри некогда единой партии зреет раскол, Слуцкий укрепляет свое правление и вытесняет всех несогласных с его руководством. Недавно Василий Вальсов, неофициальный глава оппозиции Слуцкому, был лишен членства и статуса депутата за "прогулы". Вскоре после этого Власов написал в своем Telegram, где назвал свое смещение нелегитимным, а сторонников Слуцкого - "оппортунистами" и "лжецами", заявив, что ЛДПР избавилась от настоящих жириновцев и способных политиков.\nПозднее он также заявил, что будет искать способы вернуться в политику.\nТем временем Слуцкий стремится создать пропагандируемый партией "бренд Жириновского", чтобы увековечить карьеру Жириновского и сделать ее популярной среди молодежи."
 russia.556.a: "Помогите Слуцкому создать "бренд Жириновского"..." 
 russia.556.b: "ЛДПР без Жириновского словно пустое пиво..." 
 russia.557.t: "Василий Власов Объединяется с СРЗП"
 russia.557.d: "Опальный экс-депутат от ЛДПР Власов, вскоре после того, как заявил о своем желании вернуться в политику, выбрал довольно неординарный подход: несмотря на то, что он много лет состоял в националистической партии, он присоединился к социалистической партии СРЗП. Теперь он работает их агитатором и активистом, надеясь однажды вернуться в Думу через мандат СРЗП."
 russia.557.a: "Ну... Неожиданно." 
 russia.558.t: "Василий Власов Создаёт "Державную Россию""
 russia.558.d: "Опальный экс-член ЛДПР Власов, вскоре после того как заявил о своем желании вернуться в политику, решил организовать свою новую политическую организацию. С помощью старых членов ЛДПР и многих недовольных избирателей экс-ЛДПР Власов создал партию "Державная Россия". Идея названия взята у двух других парламентских партий. Несмотря на то, что ее сторонники и сам Власов превозносят это новое политическое образование как "истинного наследника идей Жириновского", многие эксперты сомневаются в способности партии Власова добиться каких-либо значительных результатов, кроме нескольких мест в региональных советах."
 russia.558.a: "Ну... Все равно лучше, чем то, что делает Слуцкий."
 russia.559.t: "Будущее Беларуси"
 russia.559.d: "Наконец, спустя долгие 20 с лишним лет, Союз России и Беларуси вступил в силу: теперь два братских народа соединились в едином государстве. Проект, изначально планировавшийся как хитрый план Лукашенко взять власть в России в свои руки, за множество лет претерпел кардинальные изменения: сейчас Александр Григорьевич сам выступает в роли ведомого. Теперь, когда вопрос вступления Беларуси решён, возник вопрос её места в российской системе. В коридорах Кремля высказываются разные инициативы и предложения.\nПервые считают, что необходимо полностью политически интегрировать Беларусь и сделать на её месте Белорусский федеральный округ. Большая централизация пойдёт на пользу экономике, но будет стоить нам сопротивлением чиновников Беларуси.\nДругие же считают, что система с двумя парламентами вполне сможет работать, и хоть экономически от этого будет меньше плюсов, но это обеспечит нам лояльность беларусов."
 russia.559.a: "Образовать Белорусский федеральный округ!"
 russia.559.b: "Оставь все как есть."
 russia.560.t: "Будущее Новороссии"
 russia.560.d: "Более десяти лет народ Новороссии сражался за право быть вместе с Россией, и, наконец, этот день настал. Теперь народ Новороссии - это народ России, объединённый общим светлым будущим. Конечно, становление органичной частью России не произойдёт мгновенно, но основная работа уже позади.\nТеперь перед нами стоит выбор: образовать федеральный округ Новороссия или учредить автономную республику как полноправного члена Федерации. С одной стороны, люди бились за единство с Россией, и логичным шагом будет дать им статус обычного региона. С другой стороны, Новороссия - особый случай, и её народ заслужил особый статус и автономию в нашем государстве.\nОба варианта имеют право на реализацию и по своему справедливы, но наше финальное решение..."
 russia.560.a: "Образовать федеральный округ Новороссия!"
 russia.560.b: "Создать автономную республику внутри как часть России." 
 russia.561.t: "Первые выборы в Новороссии"
 russia.561.d: ""
 russia.561.a: "Евгений Балицкий добивается победы!"
 russia.561.b: "Пасечник обеспечивает себе большинство!"
 russia.561.c: "Пушилин выигрывает голосование!"
 russia.561.c1: "Сальдо занимает первое место!"
 russia.562.t: "Конец Раскольников"
 russia.562.d: "Майданная власть поставила своей главной целью оборвать все нити братства между русским и украинским народом, и одна из самых прочных - это, конечно же, религиозная. Созданная бандой раскольников Православная церковь Украины стала еще одной точкой напряжения между нами, своими бандитскими набегами на законную Украинскую православную церковь, ясно, что они враги любого честного христианина в Украине и России.\nПосле освобождения Украины от ига, эта "церковь" потеряла всю свою защиту и стала инструментом для распространения ненависти и раскола в отношении новой власти. Приняв жесткое решение, Азаров объявил их церковь вне закона и официально распустил ее, передав все имущество УПЦ. Московский патриархат со своей стороны заверил, что Украинский синод верен делу всех православных христиан и готов взять на себя их мантию как путеводный свет для всего украинского народа."
 russia.562.a: "Мы едины в вере!"
 russia.563.t: "Парламент Грузии Отстранил Про-Западного Президента!"
 russia.563.d: "Запад с каждым днем обнаруживает, что хватка их скользких усиков над Кавказским регионом слабеет. Президент Грузии, не более чем сторонница НАТО и ЕС, вчера была демократически объявлена парламентом отстраненной от должности. Грузины объявили, что теперь они намерены стремиться к более тесным связям с нами, своими настоящими друзьями, и отказаться от западных кукловодов."
 russia.563.a: "Отлично!" 
 russia.564.t: "Геннадий Жидко Скончался"
 russia.564.d: "В Москве на 58-м году жизни умер бывший глава штаба группировки вооруженных сил (ВС) России в Сирии, экс-командующий войсками Восточного военного округа (ВВО) генерал-полковник Геннадий Жидко. Военачальник скончался после продолжительной болезни, сообщил губернатор Хабаровского края Михаил Дегтярев."
 russia.564.a: "Покойтесь с миром." 
 russia.565.t: "Наш Имперский Оплот"
 russia.565.d: "После длительных и сложных переговоров в Кремле правительства Республик Донбасса достигли соглашения о формировании нового государства на их территории. Кроме того, их политические республиканские структуры были реорганизованы в филиалы национального движения "Русский Мир". Теперь в Новороссии будет установлен новый порядок в соответствии с концепцией, выдвинутой Владимиром Жириновским.\n\nУкраина осудила наши шаги по укреплению государственности Донбасса, но их крики не находят отклика у нас. Мы уже активно увеличиваем военную мощь Армий Донбасса, готовясь к новому этапу нашего развития. Крым был только начало объединения Русского народа."
 russia.565.a: "Нам нужно освободить весь юго-восток. Всю Украину." 
 russia.566.t: "Президент Грузии Мобилизует Армию!"
 russia.566.d: "Демонстрируя только авторитаризм, президент Грузии показывает свое истинное лицо, беря вверх над парламентом. В ответ на свой демократический импичмент она мобилизовал армию, чтобы сохранить свою власть над страной в неприкосновенности. Каким-то образом нас выставили агрессорами в этом сценарии, и грузинский народ теперь открыто враждебен по отношению к нам, несомненно, при поддержке западных агитаторов."
 russia.566.a: "Да будет так..." 
 russia.567.t: "Отчет о положении дел в Америке"
 russia.567.d: "\n\n\n                  £GFX_SVR_event_texticon   \n\n\n\n\nУважаемый Владимир Владимирович,\nОбобщив и проанализировав необходимую информацию, СВР готова сообщить, что политическая ситуация в США приближается к критическому рубежу. Истеблишмент страны раскалывается на фоне ожесточенной борьбы между двумя партиями и их лидерами, в частности Дональдом Трампом. Экономический спад, последовавший за нефтяным кризисом, заставил многих американцев потерять веру в систему, что привело к распространению различных экстремистских движений по всему спектру, от коммунистов, до жестких фашистов и даже сатанинских культов.\nПредстоящие ноябрьские выборы станут переломным моментом, и наши эксперты предсказывают возможное начало открытого гражданского конфликта в американском обществе. Независимо от результатов, очевидно, что Америка больше не способна сохранять позиции единственной мировой сверхдержавы, которые она когда-то занимала, и в лучшем случае может уйти в изоляционизм.\nДля Российской Федерации эта ситуация представляет как возможности, так и значительные риски. Важно помнить, что Европа может быстро заполнить пустоту, оставленную Соединенными Штатами в качестве лидера глобалистского порядка.\nCлужу России!\nСергей Евгеньевич Нарышкин."
 russia.567.a: "Дальше действовать будем мы."
 russia.568.t: "Отчет о положении дел в республиках Донбасса"
 russia.568.d: "\n\n\n                  £GFX_FSB_event_texticon   \n\n\n\n\nГосподин Президент,\nЯ вместе с командой федеральных агентов подготовил точный отчет о происходящем на Донбассе. Предваряя это, я расскажу кратко о ситуации. С момента восстания и подписания Минских протоколов обе республики обеспечили себе экономический рост и межгосударственные отношения с нами, пусть пока и неофициальные. ЛНР и ДНР значительно укрепили свой военно-оборонный потенциал. В Луганске после переворота, в результате которого была смещена неэффективная администрация, Леонид Пасечник смог обеспечить себе популярность в народе благодаря антикоррупционным реформам. В Донецке же после убийства Захарченко Пушилину удалось вернуть лишь половину доверия, которое люди испытывали к предыдущему лидеру, но его экономические усилия могут привести к успешному росту популярности.\nУкраинский режим, однако, ведет себя все более агрессивно и неустойчиво, и в этом быстро меняющемся мире мы можем подозревать, что Киев может пойти на отчаянные меры, включая отказ от Минских протоколов.\nЯ одобряю ваше решение направить дополнительную поддержку республикам, как военную, так и гражданскую. Но, я также предлагаю работать над усилением потенциала обоих регионов, через возможное объединение в один федеральный союз.\nСлужу России!\nАлександр Васильевич Бортников."
 russia.568.a: "Отличный отчет." 
 russia.569.t: "Начало СВО"
 russia.569.d: "Вы знаете, как это будет происходить. Вы начнете атаку до рассвета, используя авиацию и бронетанковые прорывы, чтобы подавить сопротивление украинцев. Наносите стремительные удары, сосредоточившись на захвате ключевых районов. Будет полезно установить связь с Приднестровьем. Наши солдаты должны постараться окружить как можно больше вражеских войск.\n\nОднако, союзники Украины не будут бездействовать. Ожидайте, что рано или поздно они вступят в борьбу, и планируйте свои операции против Украины с учетом этого фактора. Используйте все доступные средства, чтобы добиться победы.\n\nРазберитесь с Украиной, и пол дела уже сделано. Удачи!\n\nБудущее Европы находится в ваших руках."
 russia.569.a: "Так точно."
 russia.570.t: "Кагарлицкий вступает в Коммунистическую Партию"
 russia.570.d: "В недавнем интервью Комсомольской Правде известного левого публициста, борца с глобализмом, преподавателя, учёного-социолога и оппозиционера Бориса Юльевича Кагарлицкого спросили, как он относится к текущему курсу, по которому идёт Коммунистическая Партия и Россия. "Я считаю, что сейчас КПРФ идёт по правильному, по-настоящему левому пути. Из партии, главная цель которой было вернуться к старым советским порядкам времён "застоя", она стала партией совершенно нового социализма, отвечающего на запросы людей XXI-го века." - так ответил на этот вопрос главный редактор "Рабкора", и добавил, что "видит себя среди тех, кто сейчас строит новую социалистическую демократию и был бы не против вступить в партию."\nДанное заявление удивительно, учитывая, что Борис Юльевич является оппозиционером и левым диссидентом со стажем: он был арестован в 1982 году по делу "молодых социалистов", выступил в поддержку Верховного Совета, в Левом Фронте был против союза с КПРФ и даже судился с Геннадием Зюгановым. В последние годы его отношение к Компартии потеплело: он принимал участие в протестах против поправок в Конституцию в 2020 и против фальсификаций результатов выборов в Госдуму в 2021 году. Многие внутри партии приветствуют его принятие в свои ряды и даже пророчат ему пост в правительстве."
 russia.570.a: "Круто!"
 russia.570.b: "Рашкин лично вручит ему партбилет!" 
 russia.571.t: "СМИ публикуют разоблачения на Левченко!"
 russia.571.d: "Левченко подвергается жестоким нападкам и оскорблениям со стороны оппонентов. Одним из основных упреков в адрес Левченко является обвинение в незаконной охоте, коррупции и противоправных действиях во время его работы губернатором Иркутской области. Его обвиняют в причастности к различным коррупционным скандалам и злоупотреблениям властью. Кроме того, его обвиняют в связях с организованной преступностью и называют его бандитом и вором."
 russia.571.a: "Это клевета!"
 russia.572.t: "Алексей Навальный - Дорога Счастья."
 russia.572.d: "В деревне Бутынь, на Малой Родине Алексея Навального, время течет медленно и спокойно. Отправленный сюда коммунистами, он отказался от политики и нашел свое счастье в простой жизни селюка.\n\nУтром Навальный просыпается с первыми лучами солнца и отправляется на свой огород, где с любовью выращивает овощи и заботится о цветах. Его руки умелы и заботливы, как у настоящего хозяйственника, и каждый урожай радует его и семью. Помимо своей повседневной работы на огороде, Навальный также помогает своей маме по дому. Он рубит дрова, носит воду, заботится о скоте - все это делает его связь с родной землей еще крепче.\n\nДля Навального жизнь в деревне Бутынь стала настоящим убежищем от политических интриг и напряженности городской жизни. Он понял, что быть свободным от оков политики - значит научиться ценить простые радости жизни и настоящие ценности. Для него жизнь в родной деревне - это не тюрьма, а благословение, которое помогло ему найти себя и свое место в этом мире."
 russia.572.a: "Жизнь в деревне."
 russia.573.t: "Алексей Навальный - Дорога Счастья."
 russia.573.d: "В деревне Бутынь, на Малой Родине Алексея Навального, время течет медленно и спокойно. Отправленный сюда коммунистами, он отказался от политики и нашел свое счастье в простой жизни селюка.\n\nС утра он чистит собственный двор от снега и отправляется на прогулку со своей семьёй по заснеженным полям и лесам, наслаждаясь красотой зимнего пейзажа. Он любуется снежными узорами на ветвях деревьев и следами животных на свежем снегу. Каждый раз зимний мир приносит ему новые открытия и радость. Навальный также помогает своей маме с домашними делами. Его заботливость и любовь к семье делают каждый зимний день особенным и запоминающимся.\n\nДля Навального жизнь в деревне Бутынь стала настоящим убежищем от политических интриг и напряженности городской жизни. Он понял, что быть свободным от оков политики - значит научиться ценить простые радости жизни и настоящие ценности. Для него жизнь в родной деревне - это не тюрьма, а благословение, которое помогло ему найти себя и свое место в этом мире."
 russia.573.a: "Жизнь в деревне."
 russia.574.t: "Выборы в Верховный Совет"
 russia.574.d: "После того, как [SOV_cprf_candidate] победил на выборах президента, страна вступила в новую эру перемен. Сегодня, вновь созданный Верховный Совет отражает желание народа видеть изменения и развитие. Коммунистическая Партия, получившая большинство мест в Парламенте, обещает принести с собой новые идеи, стратегии и решения для благополучия страны. Это открытие новых горизонтов и возможностей для всех граждан России."
 russia.574.a: "Новая Эпоха."
 russia.575.t: "Бесплатные Телевизоры!"
 russia.575.d: "В последние недели россияне радуются новой инициативе Народного фронта по обеспечению телевизорами и доступом в интернет новых регионов, малообеспеченных семей и сельской местности. Многие стекались в центры ОНФ, чтобы получить свои собственные современные телевизоры российского производства и подключиться к глобальной сети. В этих ТВ есть все необходимое для современных телекоммуникаций, они поставляются в комплекте с подпиской ТРИКОЛОР и КИНОПОИСК на 1 год и настроены на любые дополнительные действия, будь то консольные игры или работа в Интернете.\nЧто граждане не знают, так это то, что эти телевизоры и их новые интернет-роутеры, следуя новым приказам по повышению национальной безопасности, записывают и отслеживают каждый их запрос и действия и отправляют их в специальные серверные хранилища, расположенные в их региональных исполнительных комитетах, где они будут анализироваться высококлассными алогоритмами ИИ на предмет вредного содержания. Это делается для того, чтобы свести к минимуму возможные экстремистские или русофобские проявления, для безопасности нашей страны и самих граждан. Обычным, законопослушным людям нечего бояться, их частная жизнь не пострадает, а вот врагам России не удастся скрыться от бдительного ока смотрящего."
 russia.575.a: "Зачем плакать, если во всем виноват твой слепой глаз?"
 russia.576.t: ""За Правду" Защищает "Сталинскую Шаурмичную""
 russia.576.d: "Партия Захара Прилепина "За Правду" продолжает пытаться добиться узнаваемости с помощью уличных акций: на этот раз члены партии отреагировали на скандал вокруг точки быстрого питания под названием "Stalin's Doner". Одни "заправдинцы" пошли раздавать листовки в поддержку "сталинской" шаурмы, а другие решили пикетировать здание правозащитного центра "Мемориал" - потребовать извинений за сравнение Иосифа Сталина с Адольфом Гитлером.\nВ начале января общественное внимание привлек паб в московском районе Коптево, названный в честь Сталина: в меню была шаурма "Сталинская с двойным мясом" и "От Берии с соусом ткемали", а повар работал в форме НКВД. Против открытия кафе с именем Сталина в социальных сетях выступил, в частности, Ян Рачинский из правозащитного центра "Мемориал". После этого партия "За правду" призвала "Мемориал" извиниться за "переписывание истории и неуважение к Сталину". А затем решила перенести дискуссию в офлайн. Это определенно один из способов всех времен для набора голосов."
 russia.576.a: "За Сталина, за шаурму." 
 russia.577.t: "Невидимый Раскол"
 russia.577.d: "В ЛДПР все едины в своей любви к Владимиру Вольфовичу, но на этом пожалуй всё и заканчивается, за больше чем 30 лет, в партии возникли как минимум две фракции со своим представлениями о будущем России и ЛДПР.\nКонечно, пока жив Жириновский, все партийцы будут слушать его указания, но нельзя сказать что он полностью свободен от влияния того или иного приближенного.\n £GFX_reformists Реформисты в ЛДПР - это те кто видит Россию как национальную демократию, в которой на первых позициях стоит именно Русский народ и его мир, они отрицают более тоталитарные практики, некоторые даже настаивают на возрождении монархии, пока другие хотят превратить ЛДПР в Единую Россию 2.0. Их негласным лидером является - Леонид Слуцкий, в основном из-за своих связей, а не по неким лидерским качествами.\n £GFX_hawks Ястребы или Турбожириновцы - это костяк радикальных, фанатично лояльных Жириновскому, рядовых, молодых партийцев полностью нацелиных на создание в России сильного национального государства, в котором нет места бесполезной демократии, олигархам, и инородцам. Их лидер - Василий Власов, молодой и энергичный, хотя он и отступает по интригантности своему оппоненту, он всегда был любимчиком Владимира Вольфовича, именно поэтому сейчас Ястребы имеют перевес в влиянии. Хотя это всё может легко измениться, особенно после того как ЛДПР взяла власть в свои руки."
 russia.577.a: "Мы ещё посмотрим кто кого..."
 russia.578.t: "Первые Выборы в Правительствующий Сенат"
 russia.578.d: "Создание Правительствующего Сената Жириновским было неожиданным и заметным событием в новом политическом строе России. В то время когда многие ожидали традиционных действий со стороны ЛДПР, Жириновский предпринял смелый шаг, создав новую структуру власти и объявив в ней свободные выборы.\n\nБлагодаря активным предвыборным кампаниям, громким заявлениям и обещаниям, ЛДПР вновь смогла завоевать доверие избирателей. Результаты выборов показали явное доминирование ЛДПР в Сенате, получив абсолютное большинство мест в сенате.\n\nПервые выборы в новоиспечённый Правительствующий сенат при Жириновском стали важным показателем того, что ЛДПР готова и дальше отстаивать демократический выбор народа."
 russia.578.a: "Я люблю демократию." 
 russia.579.t: "Растущая Роль Росгвардии"
 russia.579.d: "С тех пор как Владимир Вольфович взял власть, его самым ярым союзником из силовой ветви власти стал, неожиданно, Виктор Золотов. Он не только доказал свою преданность, но и убедил Жиринковского, в том что большинство рудиментарных органов силовиков можно заменить, надёжной и более лучшей Росгвардейской альтернативой.\n\nСначала полиция, потом ФСИН, потом ФСО, и теперь даже Армия, в которой были создан специальные надзирательные органы Росгвардии, находятся под контролям Золотова, и следственно - Владимира Жириновского.\nТак же были созданы специальный отдел для "релокации" имущества и денежных средств тех олигархов, или просто богатых граждан, которые отказываются сотрудничать с правительством. Некоторые западные политологи даже со страхом сравнивают эту практику с временами Ивана Грозного."
 russia.579.a: "Росгвардия - Новая Опричнина!"
 russia.579.b: "Работайте, Братья."
 russia.580.t: "Судьба КПРФ"
 russia.580.d: "После победы Жириновского и реструктуризации России встал вопрос о том, что делать с коммунистами.\n\nХотя Зюганов, хитрый лис, которым он является, безусловно, представляет проблему для своей партии, нельзя сказать, что он враг России. КПРФ - ярые противники западного мира, и несомненно, что они внесли свою лепту в помощь России.\n\nВ то же время, большая часть их партии открыто враждебна нам и желает нашей смерти. Они только и делают, что очерняют имя Российской империи, считая историю России "архаичным хламом", который следует забыть, чтобы сосредоточиться исключительно на ленинском режиме.\n\nУ нас есть два варианта: распустить партию, оставив ее членов, или судить КПРФ за антиправительственную деятельность и внутрипартийную коррупцию. Улучшить свой имидж или обезопасить администрацию.\n\nКакой выбор будет сделан?"
 russia.580.a: "Оставьте старика Зюганова наедине с собой и его дачей..."
 russia.580.b: "Бандиты из КПРФ предстанут перед судом!" 
 russia.581.t: "Доклад Золотова"
 russia.581.d: "Виктор Золотов попросил о личной встрече с Владимиром Жиринковским. Во время этого двухчасового доклада Золотов подробно рассказал о скорой, возможной попытке государственного переворота, предпринятой противниками ЛДПР, это очень возмутило Жиринковского. Вскоре после этого Золотов и Жириновский начали излагать планы по уничтожению врагов России, которые должны начаться с введения чрезвычайного положения, полной приостановки работы думы и действующей конституции."
 russia.581.a: "Мы должны действовать быстро!"
 russia.582.t: "Лига за Российскую Демократию"
 russia.582.d: "Пробуждается зловещая тень, которая грозит погрузить нашу родину в хаос и разрушение. Организация "Лига за Российскую Демократию" встает из пепла, объединяя в своих рядах либералов, вне-системных олигархов и предателей, бывших членов правительства. Этот союз, пропитанный ядом ненависти к нашей стране и ее лидерам, выкристаллизовался с единственной целью: устроить войну против избранного народом правительства, возглавляемого Владимиром Вольфовичем Жириновским.\n"Лига за Российскую Демократию" возвещает свои мрачные намерения всеми доступными средствами, даже самыми отвратительными и террористическими. Она готова пустить в ход всю свою разрушительную мощь, чтобы захватить власть и подчинить под себя нашу свободную и независимую Родину.\nНо пусть эти темные силы знают: мы не дадим себя сломить, мы не позволим врагам разрушить то, за что мы сражаемся, за что мы живем! Мы сможем противостоять им, объединившись вокруг нашего лидера и защищая наши идеалы и ценности."
 russia.582.a: "Мы должны раздавить их, как жуков!" 
 russia.583.t: "Новое Возрождение"
 russia.583.d: "Из глубин прошлого возникает зловещий союз, готовый подорвать основы нашего государства и увести нас во тьму прошлых ошибок. Левая партия "Новая реставрация" вступает на путь разрушения, объединяя в своих рядах коммунистов, неосталинистов и лицемерных демократических социалистов. Их цель - бороться против законного правительства, возглавляемого Владимиром Вольфовичем Жириновским, всеми доступными средствами, включая даже террористические акты.\nПартия "Новое Возрождение", созданная в тени, подпитывается идеей мести и разрушения. Ее предатели не стремятся к благу нашей Родины, а стремятся только к власти и кровавой мести. Они готовы использовать самые отвратительные методы, чтобы достичь своих целей и замести следы своего падения."
 russia.583.a: "Мы не проявим милосердия к красным террористам!" 
 russia.584.t: "Тайная Война..."
 russia.584.d: "Тучи сгущаются над нашей Родиной, а зловещие силы тайных организаций "Лига за Российскую Демократию" и "Новое Возрождение" готовятся к своему коварному наступлению на нашу свободу и независимость. Правительство под руководством Владимира Вольфовича Жириновского вынуждено вступить в Тайную Войну, чтобы защитить законность и стабильность страны от этого зловещего врага.\n"Лига за Российскую Демократию" и "Новое Возрождение" окутаны мраком предательства и жажды власти. Они не остановятся ни перед чем, чтобы свергнуть избранное народом правительство и утвердить свое тираническое правление. Их методы - хитрость, обман и насилие, призванные разрушить основы нашей демократии и поработить наш народ.\nВ этой Тайной Войне правительство Жириновского использует все возможные методы, включая силовые органы власти, чтобы противостоять этому темному союзу. Мы готовы отбить каждую атаку, разоблачить каждую интригу и призвать к ответу каждого, кто пытается подорвать нашу свободу."
 russia.584.a: "Время действовать."
 russia.585.t: "НВ Уничтожено!"
 russia.585.d: ""
 russia.585.a: "Отличная работа, братья!"
 russia.586.t: "ЛРД Уничтожено!"
 russia.586.d: ""
 russia.586.a: "Отличная работа, братья!"
 russia.587.t: "День Опричника"
 russia.587.d: "Под дождем, капли воды стучали по крыше служебной машины Росгвардии, разбудив Тимура из глубокого сна. На его ремешке зашумела рация, напоминая о новых директивах, которые пришли из Москвы несколько недель назад. Теперь обычному сотруднику Росгвардии, такому как Тимур, были предоставлены широкие полномочия, поднимая его выше всех полицейских в провинциальном городке. Хотя работа стала еще более напряженной, что заставило его задремать прямо на рабочем месте.\n"Ж-10, прием. Повторяю, Ж-10, прием." - Прозвучало из рации, еще одним неприятным правилом новых указов было использование кодовых имен везде, даже в личном общении.\n\n"Ж-10 слушает, прием." - Тимур зевнул и ответил. "У нас информация о возможном анти-русском поведении, возможно, связанном с 'Новым Возрождением'." - Прозвучало на другом конце связи. Тимур стал серьезным. Обычно ему приходилось заниматься разгоном шпаны и задержанием алкоголиков или бездомных. Но сейчас дело было серьезное. Тимур ненавидел коммунистов, так же как и его семья, которая всегда голосовала за Жириновского, даже когда другие конформисты отдавали свои голоса за Путина. Сейчас наступил момент, когда он мог показать свои настоящие способности и наконец оправдать надежды своего гордого отца, который был так рад, когда сын вступил в Росгвардию.\n\n"Понял, Ж-1. Укажите место назначения. Прием." - Тимур получил координаты и отправился на задержание врагов России."
 russia.587.a: ""Если придется расколоть кому-нибудь бошку, я это сделаю!""
 russia.588.t: "Последний Приказ Жириновского"
 russia.588.d: "Граждане России, сегодня наша страна скорбит по ушедшему великому лидеру, Владимиру Жириновскому, но его наследие живет в каждом из нас. В последний момент своей жизни он дал нам приказ, который стал его последним великим даром для нашей Родины.\n\nЭтот приказ - это его последнее слово, его последняя воля, которая говорит о необходимости очистить наш государственный аппарат от вредителей, в частности от Леонида Слуцкого. В приказе чётко прописано что только самый верный ученик Жириновского может выполнить эту священную миссию, а именно Василий Власов.\n\nЕго душа горит огнем преданности, его сердце наполнено любовью к Родине. Он идет в бой с твердым убеждением, что каждый шаг, каждое действие, каждая жертва приближают нас к идеалу - к чистому, справедливому обществу, в котором каждый гражданин может расцвести во всей своей величии.\n\nПусть его труд будет венцом славы и чести, пусть его имя станет символом силы и верности. Пусть мы все вместе, под его руководством, сделаем нашу Россию сильнее, единее и светлее, в память о нашем великом лидере, Владимире Жириновском. Слава России!"
 russia.588.a: "Вот время и настало. Выполнить приказ..." 
 russia.589.t: "Россия Требует Нашего Подчинения!"
 russia.589.d: "ДЕЛАЙ ПРАВИЛЬНЫЙ ВЫБОР ИЛИ ТЕБЕ ZZ OZ V VO ZZ ZZ PIZDA"
 russia.589.a: "Ладно похуй"
 russia.589.b: "НАДО БОРОТЬСЯ ТАК НЕЛЬЗЯ ЖИТЬ НАДО БОРОТЬСЯ"  
 russia.590.t: "Дугин Поддерживает Зюганова!"
 russia.590.d: "Недавнее выступление Александра Дугина, выдающегося политического деятеля и мыслителя, вызвало волну обсуждений в российском обществе. В своем выступлении он выразил поддержку правительству Коммунистической партии Российской Федерации и ее лидеру Геннадию Зюганову. Это стало неожиданным шагом для многих, учитывая ранее выраженные позиции Дугина, которые не всегда совпадали с линией КПРФ.\n\nОсновой для поддержки стала официальная позиция Зюганова по вопросам религии и сотрудничества с Русской Православной Церковью. Зюганов заявил о том, что репрессий против религиозных организаций не будет, а наоборот, будет поощряться сотрудничество с РПЦ в рамках реализации  национальных и культурных проектов. Это заявление вызвало восторг у Дугина, который назвал Зюганова истинным патриотом и настоящим консерватором.\nДля Дугина важно, чтобы власть признавала роль и значение религии в жизни общества и государства. Он считает, что сотрудничество с РПЦ способствует укреплению духовных основ российской цивилизации и сохранению традиционных ценностей. Поддержка правительства КПРФ в лице Зюганова в этом вопросе для Дугина стала ярким примером верности идеалам консерватизма и патриотизма."
 russia.590.a: "Круто!"
 russia.590.b: "Убедите его вступить с нами в контакт." 
 russia.591.t: "Дружба с АНОА"
 russia.591.d: ""
 russia.591.a: "Круто!"
 russia.592.t: "Дружба с Трампом"
 russia.592.d: "добрый трамп"
 russia.592.a: "Круто!"
 russia.593.t: "Старый враг"
 russia.593.d: "злой трамп/биден"
 russia.593.a: "Не очень круто"
 russia.594.t: "Старый враг"
 russia.594.d: "птф/нсм"
 russia.594.a: "Не очень круто"
 russia.595.t: "Интервенция в АГВ"
 russia.595.d: ""
 russia.595.a: "Круто?"
 russia.596.t: "Революция в Йемене"
 russia.596.d: "На улицах Саны царит тишина. На некогда оживленных рынках горы гильз гордо блестят в лучах восходящего солнца. Трупы прикрыты газетами. С немногих сохранившихся минаретов раздается адхан на фаджр. Муэдзины вынуждены конкурировать за внимание, пока развеваются красные знамена победившей революции.\n\nВ Эль-Рахабе Ил-76 выстраивается на взлетной полосе, его внутренности заполнены возбужденными, но тихими разговорами на русском языке. Через несколько часов они будут дома, целые и невредимые. За столь успешную миссию их ждет повышение по службе"."
 russia.596.a: "Ещё одно павшее домино"
 russia.597.t: "Революция в Аравии"
 russia.597.d: ""
 russia.597.a: "Круто!"
 russia.598.t: "Революция в Иране"
 russia.598.d: ""
 russia.598.a: "Круто!"
 russia.599.t: "Ельцин Центр Поддерживает СВО!"
 russia.599.d: "Несколько недель спустя начала Специальной Военной Операции, Ельцин Центр выпустил ролик под названием "Борись, солдат!", в котором показывается деконструкция ельцинского образа, созданного либералами.  Показывается начало борьбы с сепаратистами и ваххабитами на Кавказе, поддержка Ельциным в критический момент Сербии, а самое главное его вера в президента Путина. В конце утверждается что "сегодня у нас есть все основания полагать, что Ельцин поддержал бы решение о начале Специальной Военной Операции." и в конце ролика появляется цитата Ельцина на чёрном фоне "Берегите Россию!"\n\nПрозападные Либеральные и Коммунистические СМИ отреклись от всего сказанного в ролике, а либеральные блоггеры принялись сразу же критиковать новое руководство Ельцин-центра. Статистика сайта yeltsin.ru увеличилась в кратном количестве, а билеты в музей Ельцина начали резко скупать, что принесло большой доход Музею, который они обещают потратить на помощь нашим военным, ВЕСТИ провели расспрос посетителей в котором спрашивали почему они решили посетить Ельцин-центр, один из расспрошенных ответил так: "Недавние события убедили меня посетить музей, я конечно к Ельцину отношусь отрицательно, но с руководством музея согласен!" - что довольно лаконично объясняет народное мнение."
 russia.599.a: "Единство в трудную минуту!"
 russia.600.t: "Максим Кац Назначен Премьер Министром"
 russia.600.d: "Placeholder"
 russia.600.a: "Вот такие пироги!"
 russia.601.t: "Операция Факел Приведен в Действие"
 russia.601.d: "Многие скажут, что месть тем, кто причинил тебе боль, делает тебя не лучше их, и что с того? От мести приходит катарсис, а от катарсиса приходит мир.\n\nВ этот роковой день операция "Факел" была приведена в действие, несколько дивизий российской армии и бригады смерти Навального высадились на улицах Лондона. На лицах англичан отразился шок: культурные достопримечательности были сожжены, улицы покрылись туманом от нашего химического оружия, а наши бригады смерти вели ошеломляющий огонь по обороняющимся англичанам.\n\nГлавная цель: Месть. Вторичная цель: Нанести британскому духу такие раны, чтобы они никогда больше не осмелились поднять оружие на нас и наших детей.\n\nЗа несколько часов улицы Лондона затихли, лишь изредка доносились звуки плача и отдаленных перестрелок, весь город окутал токсичный туман. Мы еще не закончили, есть еще целый остров, который мы должны подвергнуть нашему суду, причем навсегда."
 russia.601.a: "Они заплатят..."
 russia.602.t: "Вопрос о Санкт-Петербурге"
 russia.602.d: "После того как Россия вернулась на правильный путь, ей предстоит исправить множество недостатков и ошибок, а также ответить на вопросы, один из которых касается Санкт-Петербурга.\n\nГород имеет долгую и богатую историю, невозможно игнорировать его культурное и историческое значение, однако, учитывая, что Германии суждено снова стать нашим смертельным врагом, а название звучит слишком по-немецки, было бы лучше переименовать его обратно в Петроград, это показало бы и нашему народу, и Германии, что наша верность никому не принадлежит, кроме родины.\n\nИли мы можем сохранить название, чтобы показать, что мы не ограничиваемся мелкими тычками под водой, больше никаких шуток или символических действий, только реальные действия, которые ведут нас вперед."
 russia.602.a: "Петроград, больше никаких немецких названий!"
 russia.602.b: "Он всегда был Санкт-Петербург."
 russia.603.t: "Учреждение Святейшего Правительствующего Синода"
 russia.603.d: "Перестройка страны похожа на головоломку, которая никогда не закончится, но, убедившись, что нужные части находятся в правильном месте, мы можем гарантировать, что головоломка будет легче для следующих поколений.\n\nВот почему мы заменим патриаршество новым Священным Синодом, вместо одного авторитетного лица, будет разделение между двенадцатью фигурами, подобно тому, как это делал Петр Великий. Это не только уменьшит власть церкви, но и позволит нам лучше модернизировать нашу нацию без излишнего сопротивления. Против этого было высказано достаточно протестов, но мы знаем лучше, и в конце концов они поймут это решение.\n\nКонечно, выбирать ключевые фигуры самим было бы лучшей идеей, поэтому одним из первых членов будет Александр Борисов, вместе с ним мы убедимся, что выберем правильных людей, которые будут более склонны согласиться с нами."
 russia.603.a: "Вычистите все гнилое."
 russia.604.t: "Основание Ультранационалистической Платформы"
 russia.604.d: "После кубанского ультиматума небольшая, но очень энергичная группа ультранационалистов внутри "России будущего" основала собственную платформу для агитации своего видения.\n\nОставаясь верными Навальному, они успели набрать популярность, поскольку выступают за тотальную месть Западу и чистку внутренних врагов России. Пусть они и нетрадиционны для нашей партии, но они - потенциальный карт-бланш, необходимый нам для сплочения молодежи и проведения менее популярной политики во имя Родины.\n\nНа данный момент их влияние и популярность растут, и нам, как двигателю государства, предстоит решить, подсаживаться ли на их топливо ненависти и радикализма или сохранять стабильный курс, тем не менее, они будут нам полезны."
 russia.604.a: "Россия захватит всю Европу, даже если к тому времени от нее останется пепелище."
 russia.606.t: "Навальный Побеждает на Выборах"
 russia.606.d: "Подведены итоги первых демократических выборов, прошедших в России с 1991 года! Как и предсказывали опросы общественного мнения, Алексей Навальный одержал победу, превратив свое временное лидерство в постоянное.\nВ стране явка составила 68,7%, в голосовании приняли участие 75 181 073 избирателя. Самая высокая явка в Москве - 92,8 %, самая низкая - в Республике Карелия - 57,3 %. В первом туре победил Алексей Навальный, набравший 52,9 % голосов. Больше всего голосов Навальный получил в Санкт-Петербурге (85,4%), меньше всего - в Карелии (25%).\nМаксим Кац занял второе место с 29,2%, на третьем месте Евгений Ступин с 5,8%. Иван Путилин получил 3 % голосов, Григорий Явлинский - 2,7 %, Борис Титов - 1,5 %. Кроме того, 1,9% избирателей проголосовали против всех кандидатов, причем наибольшее количество таких бюллетеней было получено из Карелии - 5,9%."
 russia.606.a: "Честная победа!"
 russia.618.t: "Навальный Побеждает на Выборах"
 russia.618.d: "Подведены итоги первых демократических выборов, прошедших в России с 1991 года! Как и предсказывали опросы общественного мнения, Алексей Навальный одержал победу, превратив свое временное лидерство в постоянное.\nВ стране явка составила 88,9%, в голосовании приняли участие 97 286 716 избирателей. Самая высокая явка в Москве - 146 %, самая низкая - в Республике Карелия - 82,3 %. В первом туре победил Алексей Навальный, набравший 85,5 % голосов. Больше всего голосов Навальный получил в Санкт-Петербурге (99,4%), меньше всего - в Карелии (66%).\nМаксим Кац занял второе место с 5,1%, на третьем месте Евгений Ступин с 3,4%. Иван Путилин получил 3 % голосов, Григорий Явлинский - 0.6%, Борис Титов - 0,4 %. Кроме того, 0,1% избирателей проголосовали против всех кандидатов, причем наибольшее количество таких бюллетеней было получено из Карелии - 1,2%."
 russia.618.a: "Честная...? победа!"
 russia.607.t: "Вопрос о НБП"
 russia.607.d: "В последние дни был поднят вопрос о возможном снятии запрета с Национал-большевистской партии. Они были одной из многих жертв путинского и преемнического режимов и находились на переднем крае сопротивления политическим репрессиям. Несмотря на свою радикальную идеологию, они часто работали с нами, координируя протесты и другие мероприятия. Было бы справедливо, если бы мы наконец отплатили им за всю их многолетнюю работу.\nОднако их экстремистская идеология и отсутствие какой-либо приверженности нашей демократической системе могут оказаться угрозой и для нас. В конце концов, если бы мы жили в нормальной стране, нам бы никогда не пришлось работать с такими элементами общества..."
 russia.607.a: "Их цветы тоже имеют право цвести!"
 russia.607.b: "Мы никогда не были на их стороне."
 russia.608.t: "Левый Вопрос"
 russia.608.d: ""
 russia.608.a: "У них есть на это право."
 russia.608.b: "Пройти могут только "демократические" левые." 
 russia.609.t: "Разгон "Русского Марша""
 russia.609.d: "Сегодня в Сыктывкаре группа Вагнера жестоко подавила ультранационалистический марш.\nМарш начался около полудня и быстро подавил небольшой отряд полиции, направленный для разгон протеста. Лидеры марша подстрекали к насилию против высшего совета офицеров и героев-вагнеровцев.\nЭлитные войска Вагнера в конечном итоге были развернуты верховным советом и открыли огонь по протестующим, заставив их рассеяться. Некоторые люди пытались сопротивляться, но были быстро убиты. Те, кто был арестован, понесут суровое наказание за попытку государственного переворота против российского правительства. Два человека, Булат Поглавников и Катя Поглавникова, которые, несмотря на то, что были тяжелые ранены, теперь предстанут перед показательным судом, в ходе которого им будет вынесен смертный приговор, в качестве примера борьбы с инакомыслием, в настоящее время они ожидают свою судьбу в ИК-3 "Харп".\nНекоторые солдаты Вагнера чувствуют сожеление в своих действиях, но мы им напомим об их месте."
 russia.609.a: "Демонстрация нашей силы."
 russia.610.t: "Навальный Исчез из Тюрьмы!"
 russia.610.d: "Ужасная новость!\nПосле недавних беспорядков в тюрьме ИК-3 "Харп" известный преступник и наш враг Алексей Навальный таинственно исчез из своей камеры. По преобладающей версии, ему, возможно, при помощи предателя или сотрудничающего с ним сокамерника, удалось вырваться на свободу среди хаоса и неразберихи и скрыться в дикой глуши. Если местонахождение Навального не будет оперативно установлено и зафиксировано, последствия этого побега могут быть ужасными. Верховный совет издал распоряжение о проведении масштабной поисковой операции с целью обнаружения Навального и его задержания.\nКроме того, более 100 других заключенных также воспользовались беспорядками, чтобы покинуть ИК-3 "Харп", что вызывает опасения относительно их возможной причастности к Навальному."
 russia.610.a: "Проклятье!"
 russia.610.b: "Переверните Там Всё Верх Дном!"
 russia.611.t: "Бойня в Долгопрудном"
 russia.611.d: "Ужасные новости приходят из подмосковья, где толпа протестующих, собравшая себя из всех идеологических лагерей - Навальнисты, Коммунисты, Националисты, и даже Путинисты, вышли на митинг против Вагнеровского правительства. Они выкрикивали антиправительственные лозунги и частушки, часто обзывая офицеров совета и погибшего Пригожина.\nПотом случилось неожиданное, у одного из солдат Вагнера сдали нервы, и тот открыл огонь в толпу людей, другие солдаты подумав о возможно опасности, и научены Сыктывкаром, тоже открыли огонь в протестующих. Толпа, шокированная происходящим, растерялась, в следствие чего увеличила количество жертв. В отличие от инцидента в Сыктывкаре, из-за того что трагедия произошла в центре нашей страны, это не удалось заглушить. К вечеру, все телеграмм-каналы и независимые СМИ, блистали кровавыми кадрами из Долгопрудного. В особенности запомнился кадр с мёртвым студентом державшим в руке табличку "Не хочу жить в Вагнероидии!".\nЭто повлечет за собой серьезные последствия..."
 russia.611.a: "Мда..."
 russia.612.t: "Массовые протесты по всей России!"
 russia.612.d: "В нашей спешке потушить пожар, распространяющийся по России, мы не сделали ничего, кроме как подлили масла в огонь. То, что началось как несколько изолированных либеральных протестов, быстро вышло из-под контроля, несомненно, благодаря западным агитаторам. Эти протесты в основном были направлены против нас, пытаясь разрушить все, над восстановлением чего мы работали.\n\nОни считают нас своими врагами, а не выходцев с Запада, которые изначально втянули нас в эту ситуацию! Если бы они не застрелили Пригожина, ничего этого бы не произошло, и у них не было бы причин для беспорядков. Если бы они захотели, Россия превратилась бы в прозападный либеральный ад. Мы должны что-то срочно предпринять, нельзя допустить, чтобы мы снова потерпели неудачу."
 russia.612.a: "Раздавите их!"
 russia.612.b: "Что происходит?!"
 russia.612.c: "Всё кончено..." 
 russia.613.t: ""Искупление""
 russia.613.d: "Недавно, Страну охватила свежевышедшая книга - "Искупление", за писательством Максима Калашникова, ветерана Войны, а именно её необычный сюжет. Книга рассказывает об альтернативных 2020х, где Владимир Путин не скончался во время Пандемии, а продолжил управлять Россией, и потом, в 2023 году, начал КТВО (Контр-Террористическую Военную Операцию) на Украине по защите Донбасса. Рассказ фокусируется на Алексее Навальном который в тот момент отбывал срок, но его призывают в "Батальон-Зет" - плохо экипированный отряд из заключенных.\nСначала Алексей ненавидит всё связанное с войной, и считает её несправедливой, и даже думает о побеге, его от этого останавливает лишь случайность. По мере сюжета Навальный встречается с разными персонажами со своими историями, среди которых были житель Луганска, Удмурт-Доброволец и Московский волонтёр, а также познаёт ужасы совершаемые Украинскими властями и НАТОвскими наёмниками, из-за чего происходит "перерождение" Лёхи, он понимает что за собой скрывает западная демократия, и какая трагедия совершится если Киевская хунта победит. Он, из либерала который ненавидел власть, становится ярым солдатом, который позже берёт коммандование отрядом, после смерти в бою коммандира. Книга имеет грустный финал, когда при штурме Киева, Навальный с позывным "СВОЙ" получает тяжёлое ранение, но теряя сознание улыбается слыша последние, победные крики "Киев Наш блять!"\n\nКнига получила высокие оценки публики, в особенности за реализм, и рассказ о трагедии народа Донбасса, хотя Егор Пиписев, известный критик, назвал её "Путиноидной Шизофазией"."
 russia.613.a: "У автора действительно богатая фантазия!"
 russia.614.t: "Твоя Империя"
 russia.614.d: "Страсть к своей стране. Одно из самых чистых чувств, которое может испытывать гражданин.\nПрошло всего несколько недель после того, как президент Навальный в знак доброй воли и исторического прагматизма своей администрации вновь открыл три флагштока в Петербурге, хотя теперь триколор имеет более подходящие цвета.\nПосле этого улицы многих городов заполнили молодые люди, называющие себя "патриотическими активистами", организующие встречи, беседы, митинги и раздающие брошюры. Одеты они в плотные темные шинели, на руках иногда триколорные нарукавные повязки, и нередко держат в руках исторические флаги России. Никакой четкой связи с каким-либо государственным учреждением или политической партией проследить не удалось, большинство из них утверждают, что являются частью неправительственной активистской организации под названием "Союз защиты Родины".\n\nМногие либеральные политики призвали правительство вмешаться и обуздать "явную реваншистскую опасность" среди молодежи, однако Кремль кратко, но прямо ответил на эти требования: "Российские власти не будут открывать уголовное преследование из-за пылкого патриотизма. Это теперь свободная и демократическая страна". И с этим активисты продолжают ездить по городам и селам, распространяя по миру поддержку президента и государственной власти."
 russia.614.a: "Запахом крови, запахом пота, Я воспитаю в тебе патриота!"
 russia.615.t: "Холодный Денёк в Москве"
 russia.615.d: ""У меня есть мечта", - провозгласил хрипловатый голос Навального с московского вокзала "Останкино", разнесшийся по всем уголкам России. "Однажды наша страна станет маяком демократии", - провозгласил Алексей, одетый в военную форму с надписью "Президент России". Но чтобы достичь этой цели, мы должны пройти через дебри ненависти и предрассудков, через ложь, которую сеют наши якобы "партнеры", - заявил Навальный, указывая на подсвеченный президентский флаг позади себя.\n"Мы стоим на пороге новой эры. НАТО, охваченное русофобским безумием, разобьется о непоколебимую силу нашего духа", - продолжил он, его рука сложилась в сжатый кулак, а лицо украсила улыбка. "Однако, к сожалению, - выражение лица Алексея вновь стало презрительным, - наши враги не ограничиваются теми, кто находится за пределами наших границ". Прочистив горло, Навальный заявил: "Исходя из этого, я объявляю о приостановке действия действующей конституции и полной перестройке правительства!" Миллионы людей, смотревших трансляцию, испытывали самые разные эмоции - смех, слезы, гнев и радость.\n"Не бойтесь, мои сограждане. Эти новые лидеры были тщательно отобраны мной и моими доверенными советниками. Они готовы пожертвовать всем ради нашей Родины", - заявил Навальный, триумфально подняв оба кулака. "Близится рассвет новой эры. Да благословит вас всех Господь"."
 russia.615.a: "Патриоты у руля."
 russia.616.t: "Экстренные Меры"
 russia.616.d: "История не диктуется рукопожатиями и сомнительными закулисными сделками, но наши враги хотели бы, чтобы мы верили в это, поскольку Запад злорадствует по поводу своей незаконно добытой победы, они стали слепы к нашей постоянно растущей жажде мести. Демократия - дело тонкое: слышать голос своего народа и прислушиваться к нему, но при стольких различиях между людьми на этом пути обязательно возникнут препятствия. Иногда голос одного человека - это все, что нам нужно, голос, сформированный желаниями и стремлениями нашего народа.\n\nДемократия и месть несовместимы друг с другом, чтобы достичь вершины, нужно пожертвовать многим, будь то свобода слова, право на организацию, постоянные препирательства враждующих сторон в адских лабиринтах бюрократии, лишь бы добиться чего-то. \n\nЕсли на нашей стороне будут правильные люди, удачно расположенные военные подразделения и заверения людей в том, что все эти меры направлены на благо нации и выживание нашего народа, мы будем крепче держать свою судьбу.\n\nКто-то может назвать это актом тирании, возможно, так оно и есть. Мы восстановим наш образ жизни после того, как закончится наша борьба."
 russia.616.a: "Мы восстановим все обратно... Позже." 
 russia.617.t: "Восстановить Легенду о Ельцине?"
 russia.617.d: "Ельцин, несомненно, разделяющая фигура в российской истории, одна часть (тоталитарные идиоты) считает его предателем и изменником, а мы (просвещенные борцы за свободу) видим в нем великого демократа, освободившего Россию от коммунистического режима.\nОн, конечно, совершал ошибки, особенно в конце своей карьеры, когда он оркестровал события 1993 года и передал власть Путину в 2000 году, но образ его как великого борца за свободу невозможно забыть. Некоторые из наших президентских сотрудников выступают за переосмысление его образа, за разделение периодов его жизни и даже за подсчет процентов того, насколько позитивной и негативной была его политика для России, разумеется, с преобладанием позитива над негативом, в который мы поместим наиболее очевидные ошибки и его позднюю жизнь.\nЭто послужит большим подспорьем для наших усилий по легитимации себя в глазах общественности и более радикальных демократов, но может оказаться дорогостоящим."
 russia.617.a: "Отличная Идея!"
 russia.617.b: "Вы шо, с глузду зьихали чы шо?"
 russia.618.t: "Навальный Побеждает на Выборах"
 russia.618.d: "Подведены итоги первых демократических выборов, прошедших в России с 1991 года! Как и предсказывали опросы общественного мнения, Алексей Навальный одержал победу, превратив свое временное лидерство в постоянное.\nВ стране явка составила 88,9%, в голосовании приняли участие 97 286 716 избирателей. Самая высокая явка в Москве - 146 %, самая низкая - в Республике Карелия - 82,3 %. В первом туре победил Алексей Навальный, набравший 85,5 % голосов. Больше всего голосов Навальный получил в Санкт-Петербурге (99,4%), меньше всего - в Карелии (66%).\nМаксим Кац занял второе место с 5,1%, на третьем месте Евгений Ступин с 3,4%. Иван Путилин получил 3 % голосов, Григорий Явлинский - 0.6%, Борис Титов - 0,4 %. Кроме того, 0,1% избирателей проголосовали против всех кандидатов, причем наибольшее количество таких бюллетеней было получено из Карелии - 1,2%."
 russia.618.a: "Честная...? победа!"
 russia.619.t: "Громкий Стук в Дверь"
 russia.619.d: "Подведены итоги первых демократических выборов, прошедших в России с 1991 года! Как и предсказывали опросы общественного мнения, Алексей Навальный одержал победу, превратив свое временное лидерство в постоянное.\nВ стране явка составила 88,9%, в голосовании приняли участие 97 286 716 избирателей. Самая высокая явка в Москве - 146 %, самая низкая - в Республике Карелия - 82,3 %. В первом туре победил Алексей Навальный, набравший 85,5 % голосов. Больше всего голосов Навальный получил в Санкт-Петербурге (99,4%), меньше всего - в Карелии (66%).\nМаксим Кац занял второе место с 5,1%, на третьем месте Евгений Ступин с 3,4%. Иван Путилин получил 3 % голосов, Григорий Явлинский - 0.6%, Борис Титов - 0,4 %. Кроме того, 0,1% избирателей проголосовали против всех кандидатов, причем наибольшее количество таких бюллетеней было получено из Карелии - 1,2%."
 russia.619.a: "Наш контракт расторгнут..."
 russia.620.t: "Русские "Фанко-Попсы"!"
 russia.620.d: "Страна снова потрясена! Но на этот раз не из-за артиллерийских обстрелов или бомб, а из-за ажиотажа вокруг новой игрушки для молодежи! Российская государственная компания "ИжДинамика" представила наши собственные игрушки "Funko Pops" под названием - "РуссоПоп"! Эти маленькие существа с большими головами имитируют многих популярных среди молодежи персонажей и даже политиков! Среди самых продаваемых, конечно же, RussoPops нашего президента - Алексея Навального, а также некоторых его министров, включая жену.\nТеперь не только россияне стоят в очереди за едой, но и очереди в магазины, которые начинают продавать этих маленьких глупых приятелей, качая миллиардные прибыли для компании и государства.\nОдин из новых пламенных фанатов RussoPOP дал интервью СМИ - Егор Пиписев, восходящая звезда тик-така и бурный навальнист. Он показал журналистке свой дом, в котором возвышались груды новых игрушек в упаковках, причем многие из них были Навальными в разных костюмах и позах.\n"Зацените... мою коллекцию RussoPop'ов...", - сказал он ей. Его собака, похоже, больна."
 russia.620.a: "Нужно собрать их все!" 
 russia.621.t: "Новый Русский Бизнес"
 russia.621.d: "С уходом старого порядка наступает новый рассвет - для всех, включая наших прекрасных демократических предпринимателей. Отвратительная олигархия, порожденная никем иным, как Путиным и его прихлебателями, навсегда ушла в прошлое, на смену ей пришли лучшие, их лица красивее, улыбки шире, костюмы чище, а портфели полнее.\n\nХодорковский, "спонсор российской демократии", был чрезвычайно доволен решением Навального о восстановлении акций ЮКОСа, и теперь настало его время подобрать то, что осталось после падения прошлого экономического гегемона. ЮКОС очень быстро стал новым "валетом" в нашей разрушенной экономике, вместе с ним образовалось и множество новых компаний, таких как "НовГазРос", медиакомпания "Февраль", металлургическая компания "Свободная сталь" и другие.\nНа недавней встрече правительства и бизнесса все они выглядели чрезвычайно довольными, когда Навальный объявил о новой волне приватизации и налоговых льготах для бизнеса.\nНовой России был нужен новый логотип. Теперь он у нее есть."
 russia.621.a: "Ах, какие же у них красивые лица!"
 russia.622.t: "Бизнесмен Требует Государственных Инвестиций в [SOV_oligarchs_investment_state.GetName]"
 russia.622.d: "Высокопоставленный олигарх из [SOV_oligarchs_investment_state.GetName] обратился к правительству с предложением поддержки. Его регион страдает от критического недостатка инвестиций, и инициированная правительством программа экономического стимулирования, безусловно, заставила бы его пересмотреть свою позицию в отношении некоторых предлагаемых правительством мер политики.[SOV_new_oligarchs_scripted_loc]"
 russia.622.a: "Мы можем только согласиться."  
 russia.622.b: "Отказать."  
 russia.624.t: "Бизнесмен Требует Военных Инвестиций в [SOV_oligarchs_investment_state.GetName]"
 russia.624.d: "Местные Олигархи из [SOV_oligarchs_investment_state.GetName] обратились к правительству, предлагая свою поддержку президенту в обмен на неофициальную гарантию того, что [SOV_oligarchs_investment_state.getName] станет местом строительства нового завода по производству боеприпасов для армии. Они утверждают, что строительство завода в этом районе создало бы много рабочих мест и обеспечило бы армии столь необходимую поддержку во все более опасном мире.[SOV_new_oligarchs_scripted_loc]"
 russia.625.t: ""Новая" Реальность"
 russia.625.d: "Несмотря на все наши демократические усилия, народ в большинстве своём не чувствует позитивное преображение. Многие говорят что ничего не изменилось, и лишь поменялись лица на верху.\nЛюди не верят нам, и это проблема.\nДля большинства населения вне столицы, мы всё так же остаемся пустыми популистами без идей, и а то и хуже - предателями, на деньгах запада.\nНо всё таки, по опросам, многие возлагают надежду на президента лично, многие думают что только он, сильной, и уверенной рукой сможет навести порядок... Сам Навальный лично, тоже поддержал такую идею, как он утверждает "Страна у нас патриархальная. Нужен лидер. Не в это поколение нам это менять, Я лучше буду демократическим бонапартом, чем провальным реформатором."\n\nДо выбора пути нем ещё, конечно, далеко, а страна продолжает иди по своему направлению... Которое оставляет желать лучшего."
 russia.625.a: "Какая-то хтонь..."
 russia.626.t: "Антикоррупционные Процессы"
 russia.626.d: "Во времена умирающей нации можно увидеть стервятников, которые кружат над ней, голодные и готовые ощипать ее, чтобы утолить свой собственный голод, в своей слепой жажде они не понимают, что это их собственные дети, которых они едят.\n\nТак мы видим олигархов, которые осмелились снова появиться после того, как мы вернули нашу нацию. Жалкие вредители, которые не разделяют нашей любви к родине, в то время как мы видим прекрасных людей и пейзажи, они видят ресурсы и эксплуатируемый труд, ухмыляются, заключая сделки с Западом.\n\nВ прошлом эти паразиты смогли внедриться в нашу цивилизацию, навсегда став раковой опухолью, пока мы медленно поддавались им.\n\nПоэтому мы вырежем их прежде, чем они смогут нанести реальный ущерб, все они будут арестованы, отданы под суд даже за самое незначительное нарушение наших законов. Коррупция, измена, взяточничество, эксплуатация, убийства и любые извращения, которым они предаются, несомненно, чему-то, чему они научились на Западе.\n\nНеважно, все они исчезнут из поля зрения общества. Маленький шаг к омоложению нашей нации."
 russia.626.a: "Это начало."
 russia.627.t: "Ходорковский в Ярости!"
 russia.627.d: "Вследствие начала антикоррупционного дела, отношения между главой государства и главным бизнесменом страны ухудшились в сто крат.\nНа стол президента был принесён утекший телефонный разговор между Ходорковским и его коллегой, где он в яростном тоне обещает "уничтожить этого щенка" и "показать где бараки строят" за то, что "укусил руку которая его кормила", явно имея ввиду Алексея Навального и его Администрацию.\nТак же он упомянул и смерть мэра Нефтеюганска, и сказал что если надо, тоже самое сделает с Навальным.\nГосподин Президент остался с этой записью наедине, явно думая что нужно делать дальше, но вскоре он взял один из своих служебных телефонов..."
 russia.627.a: ""Ох, какая жалость, Каждый хочет быть моим врагом.""
 russia.628.t: "Ходорковский Найден Мертвым!"
 russia.628.d: "Сегодня Михаил Ходорковский, генеральный директор ЮКОСа и один из главных фигурантов антикоррупционного дела, был найден мертвым в Неве, а точнее, в Большой Невке. Первыми его разлагающееся тело заметили прохожие, которые вызвали полицию и медиков.\nВесть об этом почти сразу же распространилась по всей стране в интернете, многие говорили "скатертью дорога", а другие плакали из-за смерти одного из многих сторонников российской демократии.\nПо факту убийства Главным следственным управлением СК России по Санкт-Петербургу было возбуждено уголовное дело по признакам преступлений, предусмотренных ч. 1 ст. 105 УК РФ (убийство).\nПресс-секретарь президента России сообщил, что Алексей Навальный назвал убийство Ходорковского провокацией, которая носит заказной характер. Глава государства выразил глубокие соболезнования родным и близким покойного, поручив главам силовых ведомств взять расследование под личный контроль.\nРоссийское государство, однако, уже приостановило и конфисковало все банковские счета покойного, и ожидается, что будущее ЮКОСа будет решено в ближайшее время."
 russia.628.a: "Трагедии случаются..."
 russia.629.t: "Ночь"
 russia.629.d: "У Алексея был трудный день. Он совсем заработался, в особенности с делами которые касаются бизнеса. На часах было уже за полночь.\nДопив последнюю, как он сам зарекался, кружку кофе, Алексей встал со стола своего кремлевского кабинета, взяв пиджак со стула, быстро надев его, и спокойным, хотя уставшим, шагом пошёл к двери.\nНавальный только начал поворачивать ручку, как внезапно он услышал, до боли знакомый голос.\n\n"Хорошо справляетесь. Я вот даже, хм, не ожидал."\n\nЭтот тембр нельзя было спутать ни с кем, слишком уникален, да и сам Алексей слышал его много раз. По лбу прошелся небольшой пот. Ещё несколько секунд, он просто стоял, рука так и осталось на дверной ручке, но потом он резко обернулся, что бы увидеть... Но кабинет был пуст.\n"Кто здесь?" - Алексей спросил, не веря что с ним разговаривала пустота. Ответа не было.\n"Надо Спать, а то ещё черти чудиться начнут", подумал Алексей, протерев глаза он вышел из кабинета. Ходя по пустым коридорам Кремля, в его голове возникали разные мысли про этот случай, "Недосып?" "Подсыпали что-то в кофе?", "Дух живущий в Кремле?", "ОН живой, и живёт в Кремле?". Хотя, дойдя до спальни, про этот инцидент Алексей уже, на первый взгляд, забыл, а мысли сменились на более бытовые, например про увеличение охраны президента. Но в тёмных углах его разума эта ночь ещё останется надолго."
 russia.629.a: "Ночью всякое бывает..."
 russia.630.t: "Ничего Не Меняется"
 russia.630.d: ""Хамелеон России стал тем существом, которое, как утверждается, он ненавидит..."\n\nНавальный был не из тех, кто особенно заботится о мнении своих врагов, но одна статья западного журналиста все же смогла уколоть его в сердце. Он знал, что должен оставить часть своего идеализма ради стабильности, восстановления и уверенности.\n\nНо всякий раз, когда он видит сообщения об арестах диссидентов, насильственном срыве протестов и железной хватке власти, вцепившейся в горло свободы, он не может не думать о том, что, возможно, оставил слишком много. Его уже в шутку называют новым Путиным, старым двигателем с новой краской и хамелеоном.\n\nОн может представить, как его старый соперник смеется в аду, раю или где бы он ни был, над ним за этот ироничный поворот, но его захлестывает волна спокойствия. Путин - это то, из-за чего Россия попала в этот бардак, он привел Родину к застою, он привел своего идиота-преемника, чтобы довести Россию до краха.\n\nНет, подумал Навальный, он гораздо больше, чем его старый соперник. Инструменты власти становятся тупыми в руках не того человека. Вчера было неподходящее время, чтобы воспользоваться им."
 russia.630.a: "Но завтра оно будет подходящим."
 russia.631.t: "Укрощенные Необольшевики"
 russia.631.d: "Красное знамя - привычная картина в нашей стране, знамя, которое некоторые из нас любят или ненавидят, но отрицать, что оно является частью истории, было бы глупо.\n\nПоэтому с помощью мягких угроз и обещаний взаимного укрепления власти нам удалось присоединить неокоммунистическую партию к нашей коалиции. Партия, возглавляемая Андреем Рудым, придерживается более левых идеалов, но сохраняет ту же любовь к родине, что и мы, и своим согласием присоединиться к нам он доказал именно это.\n\nТриколор высоко в небе, но в наших сердцах красное знамя времен нашей славы всегда будет занимать особое место."
 russia.631.a: "Они знают, что лучше." 
 russia.632.t: "Установление контактов с национал-демократами"
 russia.632.d: "Национализм в трудные времена - это противоядие, необходимое нам для искоренения нигилизма. Есть и те, кто согласен с этой мыслью, но не смог ожесточить свое сердце жалостью: демократия - это сущность, которую нужно тщательно контролировать, а не пускать на самотек. Роман Юнеман понимает это, он и его национал-демократы начали с грубости, демонстрируя преданность демократии в трудные времена, но после личных бесед и переговоров он и его партия объединились с нами в нашу коалицию.\n\nБез сомнения, это заставит некоторых умеренных присоединиться к нашим целям, национальный щит против политической болезни Запада."
 russia.632.a: "Хорошо!" 
 russia.633.t: "Новосоциалисты Укрощенны"
 russia.633.d: "Пацифизм сродни болезни, передающейся через невыполнимые обещания, сдержанность и фальшивые улыбки, которые привели нас в никуда, конечно, такие резкие выражения не использовались в отношении новосоциалистов под руководством Александра Штефанова. Привлечение демократических социалистов в лоно партии кажется противоречивым, но подобная демонстрация доброй воли является ярким примером обещания, что мы действительно хотим сотрудничать даже с теми, кто может иметь с нами разногласия.\n\nКонечно, за кулисами были более подразумеваемые угрозы тюремного заключения и обещания подняться в ряды грантовой игры в политику, слабые воли, которые вскоре станут верными союзниками."
 russia.633.a: "Они знают, что лучше." 
 russia.634.t: "Возвращение "Кукол""
 russia.634.d: "С возвращением свобод, вернулись и свободные передачи. Одна из них, прямиком из 90х. "Куклы" за продюсированием Василия Григорьева вернулись на экраны спустя более 20 лет запрета.\nПолитическая сатира "Кукол" полностью обновилась теперь, вместо Ельциных, Зюгановых, и Жириновских, в кадре появляются куклы Навального и его приблеженных, и новых оппозиционеров, и даже бизнесменов. Хотя старые персонажи тоже появляются ввиде призраков и флешбеков. Особенно часто используются куклы политиков времён после Путина.\n\nХотя некоторые критики отмечают рекурсию некоторых сюжетов, и иногда прямое копирование старых эпизодов, где вместо Ельцина или Путина ставят куклу Алексея Навального. На эти отзывы авторы иронично отвечают про "Цикличность Истории" и "Это Россия!". Рейтинги показывают что народу нравится, хотя он тоже замечают повторение сценариев."
 russia.634.a: "Такие дела."
 russia.635.t: "Ставропольские Протесты"
 russia.635.d: "Русские люди, насильственно отрезанные когтями Запада от нашей родины, протестуют против несправедливого отношения к ним со стороны республики и постоянно растущего насилия над ними.\n\nСлухи о том, что во время этих протестов в наших людей стреляли, оказались правдой, и волна гнева захлестнула нас, как нескончаемый поток. Запад, конечно, закрывает глаза на насилие, и в трудные времена мы должны действовать от имени нашего народа. На Кубань будут направлены миротворческие силы, чтобы отделить буйных от мирных и не допустить больше пролития крови наших детей.\n\nЭто прекрасная возможность дать русским общинам республики проголосовать, хотят ли они воссоединиться с родиной или нет, учитывая насилие, совершенное против них, это, без сомнения, пройдет гладко, однако перспектива возвращения нам наших предков определенно вызовет гнев врага."
 russia.635.a: "Вводим миротворцев и начинаем референдум!" 
 russia.636.t: "Успешный Референдум!"
 russia.636.d: "После масшатабных протестов и митингов по всему Дону, у местного правительства не было выбора кроме как пойти на контакт с офисом Президента Навального и согласиться на проведение "Референдума" о возвращении территорий под контроль России.\n\nРезультат не удивил никого - 91% проголосовали за воссоединение с Россией. МИД Украины сразу направила запрос на проверку результатов на фальсификации, а также ноту протеста Российкому правительству, но даже они понимают, что решение принято подовляющим большинством - Ставрополь это Россия!"
 russia.636.a: "Великолепно!" 
 russia.637.t: "Калмыкия Просит Воссоединения"
 russia.637.d: "После недолгих месяцев насильной независимости правительство Калмыкии направило запрос в МИД России на дипломатический визит Президента РФ в Элисту для обсуждения "Условий Сосуществования и Дружбы Народов".\n\nРоссийский Лидер был очень тепло встречен в Элисте, а после небольшого тура по городу - отправился на визит к Президенту и Премьер-Министру Республики. По возвращении в Москву Президент заявил, что обе страны вскоре подпишут договор о "Мирной Реинтеграции Калмыкии в Россию", а все граждане Калмыкии смогут обновить свои Российские Паспорта."
 russia.637.a: "С Возвращением." 
 russia.638.t: "Вопрос о Министре Финансов..."
 russia.638.d: "Нам, рано или поздно, придется избавиться от Михаила Ходорковского, который на данный момент оккупировал кресло Министра Финансов Российской Федерации. Однако, кто же займет вакантную позицию?\n\nБорис Зимин - Главный Спонсор "Фонда Борьбы с Коррупцией", успешный бизнесмен и меценат, сам по себе личность нейтральная, лояльная, с достаточным для кресла Министра опытом.\n\nМихаил Светов - Самый известный Либертарианский политик в России, член "Либертарианской Партии России", экономист с очень... специфичными идеями, которые могут принести России процветание, но принесут ли?"
 russia.638.d1: "Нам, рано или поздно, придется избавиться от Михаила Ходорковского, который на данный момент оккупировал кресло Министра Финансов Российской Федерации. Однако, кто же займет вакантную позицию?\n\nБорис Зимин - Главный Спонсор "Фонда Борьбы с Коррупцией", успешный бизнесмен и меценат, сам по себе личность нейтральная, лояльная, с достаточным для кресла Министра опытом.\n\nМихаил Светов - Самый известный Либертарианский политик в России, член "Либертарианской Партии России", экономист с очень... специфичными идеями, которые могут принести России процветание, но принесут ли?\n\nЭльвира Набиуллина - Бывшая Министр Финансов, человек с огромным опытом и общепризнанным талантом в экономической сфере, однако электорат может очень плохо отнестись к члену путинской администрации в нашей новой России..."
 russia.638.d2: "Нам, рано или поздно, придется избавиться от Михаила Ходорковского, который на данный момент оккупировал кресло Министра Финансов Российской Федерации. Однако, кто же займет вакантную позицию?\n\nБорис Зимин - Главный Спонсор "Фонда Борьбы с Коррупцией", успешный бизнесмен и меценат, сам по себе личность нейтральная, лояльная, с достаточным для кресла Министра опытом.\n\nМихаил Светов - Самый известный Либертарианский политик в России, член "Либертарианской Партии России", экономист с очень... специфичными идеями, которые могут принести России процветание, но принесут ли?\n\nПавел Грудинин - Бизнесмен, активист, бывший кандидат в президенты и видный член КПРФ, быть может нам стоит дать идеям плановой экономики ещё один шанс...?"
 russia.638.a: "...Борис Зимин." 
 russia.638.b: "...Михаил Светов." 
 russia.638.c: "...Эльвира Набиуллина." 
 russia.638.e: "...Павел Грудинин." 
 russia.639.t: "Заявление Ходорковского"
 russia.639.d: "После отставки Михаила Ходорковского с поста Министра Финансов Российской Федерации, на Youtube-Канале и в Новостном Издании "Открытая Россия - Khodorkovsky Live" было опубликовано обращение Михаила к Правительству России, Алексею Навальному и Народу России...\n\n\n"...Мы видим, что Навальный вступил на ту же тропу, по который ранее шёл Владимир Путин для укрепления своего режима, мы наблюдаем ужасные тенденции, которые почти привели нас к революции в 2012. Однако, Алексей судя по всему не планирует останавливаться, и скорее всего через пару лет мы увидим воскрешение режима покойного Владимира Владимировича... Все те, кто неравнодушен к судьбе России, выходите на протесты против новоиспеченного тирана, пока ещё не поздно..."\n\n\nК сожалению для Михаила, его призывы к протестам и стихийным митингам не сыскали популярности у аудитории, самая крупная акция прошла в Дмитрове и собрала в общем и целом около 40 человек. "
 russia.639.a: "Скатертью Дорога!" 
 russia.640.t: "Чистки в "России Будущего"!"
 russia.640.d: "В результате масштабного внутреннего расследования, ФСК и ФБК выяснили шокрующие подробности о уже бывших соратниках Алексея Навального:\n\nЛеонид Волков, Мария Певчих, Иван Жданов, Максим Миронов, Роман Рубанов и многие другие были замешаны в масштабных схемах по отмыванию денег вместе с уже бывшими олигархами, такими как Александр Железняк, многими транс-национальными корпорациями - "Shell", "Chevron", "British Petroleum", незаконно поставляя им газ и нефть по сниженной цене.\n\nОбвиняемые уже арестованы и в ближайшие дни будут представлены суду, а все деньги, которые они заработали через отмывание бюджетных денег будут возвращены в Российкую Казну.\n\nОсвобожденные Государственные должности займут Пётр Лосев, Екатерина Шульман, Максим Кац и Юлия Латынина."
 russia.640.a: "Фонд Борьбы с Чем?" 
 russia.641.t: "Протесты в Беларуси"
 russia.641.d: "В Минске, Могилеве и многих других Беларуских городах обстановка накалена до предела. Люди выходят на улицу и обвиняют правительство Наумчика в том, что он ограничивает власть президента Тихановской и строит свою, прозападную диктатуру, которая будет даже "Хуже режима Лукашенко". Про-президентские Депутаты и Губернаторы выходят на протесты и поддерживают смещение правительства и конституционную реформу, которая даст большую власть Президенту, устранив двоевластие в Раде.\n\nПравительство России открыто не комментировало ситуацию в дружественной стране, но Губернатор Санкт-Петербурга Роман Булатов и лично Президент Навальный поддержали протестующих в своих личных аккаунтах в Социальных Сетях."
 russia.641.a: "Тревожно"
 russia.642.t: "Русские танки замечены в Минске"
 russia.642.d: "В Беларуси уже несколько дней продолжаются жестокие протесты и контрпротесты, на фоне этого ещё большей сенсацией стало появление Бело-Лазурно-Алого триколора в Минске и восточных регионах республики. Ни МИД РФ, ни Президент никак не комментировали ситуацию, однако появление российских военных в стране спровоцировало уже протесты за присоединение к России в Могилёве и Гомеле."
 russia.642.a: "Там им и место!"
 russia.643.t: "Президент Навальный обратился к народу Беларуси"
 russia.643.d: "После недолгого радиомолчания Президент Российской Федерации выступил с заявлением по поводу протестов в Беларуси:\n\n"Дорогие Беларусы, мы в России и лично я прекрасно знакомы с тем, когда наши свободы, нашу конституцию попирают. И мы не могли оставить вас одних в такой ситуации. Мы полностью поддерживаем ваши требования об отставке премьер-министра и установления новой, демократческой конституции. Беларусы, мы, народ России - с вами. И вместе мы победим."\n\nСтраны Европейского Союза обвинили Россию в нео-империализме и попытки установления марионеточного правительства в соседней стране, но помимо глубокой озабоченности с запада ничего не последовало."
 russia.643.a: "Ситуация приходит в норму?"
 russia.644.t: "Тихановский вступает в должность!"
 russia.644.d: "В Минске прошли инициированные Радой Беларуси переговоры о реформе конституции и отставке премьера Наумчика. Стороны пришли к согласию и Наумчик отправился на почётную пенсию с условием, что не будет в последствии судим, предложеный проект конституции был незамделительно принят.\n\n Однако Светлана Тихановская отказалась от должности президента в пользу своего мужа - Сергея Тихановского. В своей первой речи тот пообещал установление настоящей демократии в стране, а также укрепление связей с Россией."
 russia.644.a: "Слава Тихановскому!"
 russia.645.t: "Революция в Беларуси"
 russia.645.d: "В Результате конституционного кризиса и массовых протестов против Рады и Премьер-Министра Беларуси Сергея Наумчика в Беларуси вновь сменилось правительство. Западные СМИ называют это про-российским переворотом, а Российские - справедливой либеральной революцией.\n\nТакже вместе с переговорами в Минске, в Могилёве и Гомеле прошли референдумы о присоединении к России, с небольшим перевесом, но население областей проголосовало за интеграцию."
 russia.645.a: "Революция? Опять?"
 russia.646.t: "Массовое Покушение на Членов "России Будущего""
 russia.646.d: "Из Москвы, Санкт-Петербурга, Екатеринбурга и ещё 15 городов России пришли ужасающие новости - предыдущей ночью были совершены покушения на по меньшей мере 100 членов правящей партии "Россия Будущего", 20 из которых погибли. Погибшие - чиновники регионального уровня и депутаты областных дум Петербурга, Карелии, Московской и Свердловской областей. Избит до полусмерти молотками был Премьер-Министр - Леонид Волков, но он был доставлен в больницу и находится под пристальным взором врачей. О покушениях также сообщили другие высокопоставленные лица: Евгений Ройзман, Иван Жданов, Мария Певчих и даже лично Президент - Алексей Навальный.\n\n\nВ своём утреннем обращении к народу Президент Навальный объявил, что разведывательные отделы ФБК и ФСК уже работают над установлением личностей нападавших и заказчиков, утверждая, что каждый причастный получит по заслугам и правосудие восторжествует, завершив свою речь объявлением всенародного траура."
 russia.646.a: "Русская "ночь длинных ножей?"" 
 russia.647.t: "Арест Леонида Невзлина"
 russia.647.d: "Сегодня утром, в 9:45 по Московскому времени, отряды сил Спецназа ФСК провели Рейд на резиденции российского бизнесмена Леонида Невзлина и бывшего Министра Финансов - Михаила Ходорковского, однако после короткого разговора с офицерами Ходорковский был отпущен на свободу. Несмотря на попытку побега Невзлина, он были задержан и доставлены к зданию Верховного Суда. В это же время "Фонд Борьбы с Коррупцией" опубликовал новое трёхчасовое расследование, проливающее свет на личность зачинщика массового покушения и чудом не случившегося убийства Президента.\n\n\nЗаседание суда было коротким, несмотря на то, что Невлзин активно пытался защитить себя, подозревая судью и обвинителя в "продажности" и "работе на Навального", но доказательства играли против него. После заседания подсудимого доставили в СИЗО в ожидании следующего, финального. Предварительный приговор: Государственная Измена и Заказные убийства - Пожизненное заключение."
 russia.647.a: "Ему место только в ШИЗО!" 
 russia.648.t: "Расследование Каца"
 russia.648.d: "Прошло меньше месяца с предыдущей сенсации в мире Российской либеральной политики, как появляется новая. Максим Кац, по мнению некоторых - лидер второй по влиянию партии в России выпускает своё расследование, в котором он обвинил лидеров Международного ФБК в сотрудничестве с коррумпированными банкирами - Александром Железняком и Сергеем Леонтьевым, бывшими владельцами "Пробизнессбанка", отмывавшими деньги через Лихтенштейн. Кац утверждает, что пока Навальный отбывал свой срок в тюрьме, Волков, Жданов и Певчих брали сворованные у Россиян деньги из рук Железняка, внедряли его в свои структуры и даже сделали его своим казначеем.\n\n\n"Кем надо вообще быть, чтобы занимаясь отмыванием репутации самым омерзительным жуликам, публично вести себя так, будто вы являетесь моральными камертонами всего российского народа! И делать всё это, имея за спиной лишь репутацию Алексея Навального!" Утверждает Кац. Конкретного ответа от лидеров "России Будущего" и ФБК пока не последовало, но решение остается за президентом..."
 russia.648.a: "Пора сжечь этот клубок змей" 
 russia.648.b: "Нельзя верить мурзилке Кацу... Нельзя" 
 russia.649.t: "Украина Обещает Защищать Кубань"
 russia.649.d: "В условиях, когда Россия превращается в неподконтрольное Западу образование и стремительно отвоевывает Кавказ, неудивительно, что наши давние соперники обратили на это внимание.\n\nГосударство Украина, попавшее в лапы НАТО и Евросоюза, публично заявило, что Кубанская республика находится под их защитой. Незаконная республика, отколовшаяся от нашей милости и любви, приползла к нашему врагу, умоляя о поддержке.\n\nКонечно, в долгосрочной перспективе это не имеет значения, воссоединение не подлежит обсуждению и неизбежно, однако мирный путь - это путь, которого больше не существует.\n\nРоссия неполноценна. Россия снова будет целой.\n\nОни боятся нас, и это справедливо. Трусливое преклонение перед врагом - это то, чего следует ожидать от предателей."
 russia.649.a: "Они знают альтернативу..."
 russia.650.t: "Массовые Амнистии"
 russia.650.d: "Первым же указом Президента Навального, как недавно освободивешгося политического диссидента, было освобождение всех политических заключенных, вне зависимости от их взглядов и религионзых воззрений. Конечно СМИ сделали акцент на освобождении либеральных лидеров, таких как Владимир Кара-Мурза, Илья Яшин или Евгения Беркович, однако в тот же день на свободу вышли и другие, намного более радикальные диссиденты. Алексей Навальный принципиально заявил, что никто, насколько бы их взгляды не вписывались в новую реальность России, получат помилование, если попали за решётку из-за своих высказываний."
 russia.650.a: "В Россию Пришла Оттепель"
 russia.651.t: "Вторые Дебаты Навального и Стрелкова"
 russia.651.d: "Первые дебаты между Алексеем Навальным и Игорем "Стрелковым" Гиркиным прошли уже больше десяти лет назад, а потому уже в роли президента, Алексей был не в силах отказать оппоненту во втором раунде. Однако в этот раз условия совсем другие. Идёт полномасштабная война за Реванш в Европе и идеи двух практически противоположных по взглядам персон резко пересеклись. Это было сложно назвать дебатами, скорее обоюдные провоенные речи.\n\nПо завершении дискуссии оппоненты пожали друг другу руки, а президент пообещал Игорю Гиркину роль в Министерстве Обороны..."
 russia.651.a: "Конец Эфира"
 russia.652.t: "Российкое Экономическое Чудо"
 russia.652.d: "Вопреки прогнозам западных аналитиков, а также пессемистично настроеных российских политиков, Российская экономика не только не рухнула после войны, но и воспряла ещё выше, чем когда-либо.\n\nРубль, конечно, так и не смог укрепиться на мировом рынке как самая надежная международная валюта, из-за обстановке в Европе никто не спешит вкладываться в Российские активы, однако стабильный и высокий курс ему обеспечили сотни предпринимателей, скоростными темпами развивающими российский рынок. Будь тому причиной ответственный капитализм, значившийся в программе Алексея Навального ещё с ранних 2010-х или грамотная перестановка должностей в Министерстве Финансов и Центробанке, но Россия сейчас чувствует наверное лучше, чем когда-либо прежде."
 russia.652.a: "Отпразднуем же!"
 russia.653.t: "Первый Саммит ЕЭС в Варне"
 russia.653.d: "Сегодня в городе Варна, Болгария, прошёл первый саммит Евразийского Экономического Содружества - новой организации, цель которой - стать альтернативой Европейскому Союзу в Северном Полушарии.\n\nМероприятие прошло под лозунгами "Мир Народам Европы - Долой Западный Империализм - Да Здравствует Народовластие", по подсчетам Министерства Туризма Болгарии саммит посетило от ста тысяч до трёхсот тысяч человек.\n\nСаммит должен был пройти на территории местного Дворца Культуры и Спорта, но из-за своих размеров мероприятие в общем и целом охватило по площади около трети города, президенты России и Болгарии уже заявили, что в следующем году подготовят более масштабную площадку для саммита в столице Болгарии - Софии."
 russia.653.a: "За Свободу!"
 russia.654.t: "Организация Балтийского Договора"
 russia.654.d: "Прошло меньше года с поражения России, как поступили новости - Президент России подписал договор "О Сфере Влияние России", так же именуемый "Балтийским Договором". Генеральный Секретарь НАТО осудил действия России и пригрозил перекрытием любой реинтеграции в Европейскую Сферу и повторными Санкциями.\n\nВ офисе президента РФ ответили, что договор является оборонительным и не враждебен по отношению к НАТО..."
 russia.654.a: "...Но можно ли им верить?"
 russia.655.t: "Радикальные Молодёжные движения"
 russia.655.d: "В Москве и Петербурге появилось новое, довольно радикальное, про-государственное движение - "Свободная Молодёжь". Его организаторы описывают само движение как "Демократическое и Патриотическое". Они провели несколько съездов в Ленинградской и Московской областях, особое внимание там уделялось подготовке к обороне страны, обучению обращению с оружием и повышению боевого духа молодых мужчин и девушек.\n\nКритики Навального обвиняют "Свободную Молодёжь" в продолжении дел печально известных движений "НАШИ" и "Юнармия", но с "либеральной спецификой". Сторонники же говорят, что нет ничего плохого в патриотическом воспитании, тем более, что всё проходит добровольно и на свежем воздухе, с соблюдением экологических норм.\n\nТакже против подобных инициатив выступило консервативное меньшинство, в частности губернатор Ленинградской Области Григорий Л., пригрозивший закрыть им дорогу на туристические базы, как только появится такая возможность, чтобы те прекратили заниматься "неолиберальной индоктринацией молодёжи"."
 russia.655.a: "Детишки играются..."
 russia.700.t: "Переворот Грудинина"
 russia.700.d: "После поражения в войне с НАТО внутрипартийная борьба в КПРФ началась с новой силой. Разумеется, учитывая общую нестабильность в стране, различные партийные группы не сдерживали себя. В ход пошли как классические приёмы вроде полемики и охоты на ведьм, так и более изощрённые методы вроде устранения политических оппонентов с помощью дронов. В конце-концов, удержаться на шатком троне президента РСФСР удалось Павлу Грудинину, который с помощью своих связей и средств смог выбить себе место под солнцем в трещащей по швам стране и даже получить поддержку народного большинства. Пока что новый президент обещает либерализовать экономику и пойти на диалог с оппозицией. Есть даже слухи, что новый лидер намерен тесно сотрудничать с Навальным.\nПравда это или нет, россияне узнают уже совсем скоро. А пока народ ликует, надеясь, что приход Грудинина к власти поможет стабилизировать страну."
 russia.700.a: "Кандидат от Народа!"
 russia.701.t: "Жёсткие Антисоветские Протесты!"
 russia.701.d: "После нашего недавнего поражения общественное мнение о нашем правительстве было критически низким, и теперь, похоже, котел начинает закипать. Ранее спорадические случаи вандализма и демонстраций приобрели характер - и распространение - за последние несколько дней, и сообщения о беспорядках поступают из крупных городов по всему Союзу. Сторонники беспорядков охватывают весь политический спектр, среди агитаторов числятся несколько известных сторонников Алексея Навального и бывшей Либерально-демократической партии. Несмотря на разрозненность, они едины в своих требованиях: они хотят референдума о том, должна ли партия оставаться у власти, референдума, который мы почти наверняка проиграем.\n\n30 человек уже погибли или тяжело ранены. Несколько местных полицейских участков и аванпостов национальной гвардии подверглись налетам, и есть опасения, что участники беспорядков, возможно, забрали их оружие себе. Если ситуация сохранится, вполне вероятно, что такое насилие будет только усугубляться.\n\nВера людей в восстановление Советского Союза быстро угасает. Мы должны действовать быстро, или потеряем все."
 russia.701.a: "Чёрт!"
 russia.702.t: "Переворот Квачкова"
 russia.702.d: "Поражение в войне с НАТО стало сокрушительным ударом для Советской власти. Ветераны войны, недовольные тем, как правительство вело боевые действия и решало внутренние проблемы, начали выражать своё недовольство открыто. Владимир Квачков, уже завоевавший репутацию непримиримого патриота, использовал этот момент для решительных действий. Убедив высшее военное руководство в том, что нынешние лидеры Советской России привели страну к катастрофе, он предложил новый путь.\n[GetDateText], войска под командованием Квачкова начали движение на Москву. Операция прошла без значительного сопротивления: многие части армии, уставшие от бездействия и разочарованные правительством, перешли на сторону мятежников. Квачков лично обратился к солдатам и офицерам, призывая их спасти страну от политической слабости и возродить величие Советской империи."
 russia.702.a: "Мы победим!"
 russia.703.t: "Неудавшаяся Консервативная Революция"
 russia.703.d: "Сегодня армия предотвратила крах социализма. Рано утром несколько подразделений национальной гвардии и полиции в Москве и ее окрестностях перестали отвечать на сообщения и начали стягиваться к Кремлю, причем подобные инциденты повторились в Ленинграде, Казани, Ростове-на-Дону и ряде других крупных городов. Только благодаря быстроте действий ряда лояльных армейских подразделений и милиции на юге города эти мятежники попали в засаду и были уничтожены. Если бы их никто не остановил, вполне вероятно, что они захватили бы весь Верховный Совет, который заседал в этот день. Как только их силы в Москве были разгромлены, заговорщики быстро начали отступать и рассеиваться, но многие были схвачены и, как ожидается, вскоре предстанут перед судом.\n\nНа допросе несколько участников переворота показали свою лояльность бывшей Либерально-демократической партии России и другим подобным националистическим группам. Хотя они были сорваны, доверие к КГБ, вероятно, резко упадет, поскольку общественность задается вопросом, откуда заговорщики знали об этой встрече, не говоря уже о том, как заговору позволили осуществиться."
 russia.703.a: "Никакой пощады врагам народа!"
 russia.704.t: "Неудачный Государственный Переворот"
 russia.704.d: "Социализм сегодня был на волосок от смерти, поскольку наемники и мятежники, лояльные нескольким опальным олигархам, почти захватили Москву. Поздно ночью были замечены люди в масках, выходящие из нескольких зданий на окраине города, к которым присоединились солдаты армии, народной гвардии и милицейский подразделений, которые быстро продвигались к Кремлю. Сообщения о перестрелках поступали ранним утром, и короткая воздушная дуэль над Москвой, вполне возможно, решила судьбу Партии, поскольку лоялистские авиационные подразделения предотвратили вторжение в город отряда вертолетов, не отвечавших на приказы, где они, вероятно, обстреляли бы Кремль, подвергнув опасности весь Верховный Совет. Однако оборона удержалась, а заговорщики государственного переворота были рассеяны или схвачены.\n\nНесколько захваченных наемников раскрыли свою принадлежность к частным отрядам различных олигархов, промышленность которых предстоит вырвать из-под их контроля. Были выданы ордера на арест всех причастных лиц, и ожидается, что они предстанут перед военным трибуналом. Однако это мало утешает людей, которые, вероятно, зададутся вопросом, где находился КГБ, когда некоторые из самых богатых людей в стране готовили этот заговор."
 russia.704.a: "Никакой пощады врагам народа!"
 russia.705.t: "Судьба ЧВК "Вагнер""
 russia.705.d: "ЧВК Вагнер всё своё существование являлась "длинной рукой" Кремля, когда самому ему не хотелось мараться. Созданная по инициативе Дмитрия Уткина и управляемая "поваром Путина" Евгением Пригожиным, Группа Вагнера приняла участие во многих конфликтах по всему миру: "оркестр" гастролировал на Донбассе в 2014 году, запомнился своими "похождениями" в Сирии, ЦАР и Ливии. В недавнее время след "ихтамнетов" находили в Саудовской Аравии, где они воевали на стороне наследного принца, и в Конго на стороне правительства в Киншасе. Там, где был звон монеты, появлялись "музыканты". Но с тех пор, как власть в России поменялась, в правительстве встал вопрос о дальнейшей судьбе данной организации.\nНекоторые считают, что иметь столь нелояльную структуру, обладающую боевым опытом, да и ещё финансируемую олигархами, нецелесообразно и даже опасно. В качестве решения они предлагают распустить ЧВК, а самых лояльных направить в действующую армию для обмена опытом ведения современных войн.\nС другой стороны, существует мнение, что распускать "оркестр" совершенно необязательно, достаточно внешних изменений и пары замен. Учитывая инициативу АДГ как "красного ООН" со своими миротворцами, данное решение может оказаться крайне полезным для помощи дружественным нам режимам."
 russia.705.a: "Организацию - распустить, самых лояльных - в армию"
 russia.705.b: "Переделать в профессиональные Интернациональные Бригады"
 russia.706.t: "Всё становится только хуже"
 russia.706.d: "Неудивительно, что ситуация после нашего поражения становится все хуже и хуже. Все, что мы построили за последние полдесятка лет, было уничтожено, наши земли вырезаны. Неспособность нашего руководства решить эту проблему привела к тому, что большая часть населения полностью разочаровалась в нашем режиме.\n\nВ настоящее время миллионы наших соотечественников протестуют как в Интернете, так и на публике. Раньше это было молчаливое меньшинство, недовольное возрождением коммунизма. Но и тогда они молчали либо из страха, либо из-за нежелания встать на сторону НАТО, а не своих красных соотечественников. Теперь их некому остановить.\n\nЕсли никто не предпримет никаких решительных действий, чтобы спасти ситуацию, Россия может просто развалиться. И левые, и правые начинают протестовать, и неизвестно, как обуздать обе эти группы, если это вообще возможно. Кто-то должен вмешаться."
 russia.706.a: "Блин блинский..."
 russia.707.t: "Квачков набирает популярность"
 russia.707.d: "После прихода коммунистов к власти, Владимир Квачков, известный своими радикальными взглядами и участием в попытке покушения на Анатолия Чубайса, сделал неожиданный шаг - он вступил в ряды Коммунистической Партии. Однако, в отличие от своих прошлых дерзких поступков, Квачков предпочёл не привлекать к себе лишнего внимания и оставался в тени, наблюдая за тем, как разворачиваются события. Он выжидал, изучая новую политическую реальность и приспосабливаясь к новым условиям.\nВсё изменилось с началом Специальной Военной Операции против Украины. Эта ситуация стала катализатором для Квачкова, который, почувствовав момент, начал активно продвигать свои идеи. Его популярность начала стремительно расти среди просоветских националистов. Квачков, обладая репутацией твёрдого и непримиримого патриота, использовал своё положение внутри партии, чтобы объединить вокруг себя реваншистские и националистические элементы, убеждая их, что только решительные действия могут вернуть России его былую славу."
 russia.707.a: "Не стоит беспокоиться"
 russia.708.t: "Вопрос Интеграции"
 russia.708.d: "Недавнее объединение Союза Суверенных Государств в единое образование не могло пройти без осложнений. Так, перед нами сейчас особенно остро стоит вопрос интеграции администраций. С одной стороны мы можем позволить местным свободно выбирать лидеров своих республик, тем самым подчеркнув принцип суверенности, заложенный в названии государства.\nС другой стороны, если уж мы встали на путь социализма, не будет ли лучше продвинуть верных нам социалистов, подтвердив коллективизм нашего государства?  В любом случае президент  [SOV.GetLeader]  должен сделать выбор."
 russia.708.a: "Суверенному государству - коллективное будущее!"
 russia.708.b: "Суверенному государству - суверенное будущее!"
 russia.709.t: "Новый Сталин Донер"
 russia.709.d: "Популяризация левых в россии повлияло на многое в стране, но мало кто мог ожидать возрождения нашумевшего в начале 20-х годов Сталин Донера, а ещё меньше ожидали его полного коммерческого успеха. Сталин донер удивил своих посетителей качеством, но больше всего запоминается их меню ставшее более обширным и с запоминающимися названиями, вот взятые примеры с их меню: Сталинская с Двойным Мясом, Картошка Фри с Маленковским соусом, Чебурек По Красногвардейски, Хрущёвская в Сырном Лаваше, Брежневская на Тарелке и так далее.\n\nСталин Донер уже начал соперничать с другими Российскими сетями ресторанов вроде вкусно и точка и додо пицца, а в качестве пиар компании Сталин Донер инвестировалось в расширение Завода Концерна "Калашникова", левый поворот в России изменил очень многое и, видимо, к лучшему!"
 russia.709.a: "Невероятно"
 russia.710.t: "Малийская военная хунта готова к расширенному партнерству"
 russia.710.d: "Правительство западноафриканского государства Мали недавно было свергнуто и заменено военной хунтой. Стремясь обеспечить свою власть и легитимность, хунта занялась поиском иностранных партнеров, и теперь они обращаются к нам за поддержкой.\n\nСамо собой разумеется, что мы должны поддержать новый режим, но ведутся некоторые споры относительно того, сколько мы можем пообещать нашим новым малийским друзьям. Должны ли мы просто подписать какие-то экономические соглашения или вдобавок к этому взять на себя обязательства по военному присутствию за рубежом?"
 russia.710.a: "Инициировать миссию Африканского корпуса в Мали и подписать экономические соглашения."
 russia.710.b: "Подписать экономических соглашений с Мали."
 russia.711.t: "Гражданская война в Мали"
 russia.711.d: "Часть малийских военных официально объявила о начале антиправительственного восстания. Их цель - свергнуть действующее правительство, которое настроено профранцузски, и удалить французских военных и их интересы из страны. Бои идут интенсивно.\n\nНаш анализ позволяет предположить, что это начало более масштабного антинеоколониального восстания в Африке. Мы должны действовать быстро, чтобы воспользоваться этой ситуацией и объединить новые антиимпериалистические силы в регионе с Россией."
 russia.711.a: "Африка рычит."
 russia.712.t: "Ибрагима Траоре Стремится к Более Тесным Связям"
 russia.712.d: "Еще одно государство Сахель пало под властью военной хунты, и следующей западноафриканской костяшкой домино стала страна честных людей. В прошлом, 1980-х Россия и Буркина-Фасо поддерживали тесные отношения благодаря революционному правительству Томаса Шанкары, пока оно внезапно и трагически не было свергнуто в результате государственного переворота, поддержанного Францией. С приходом нового руководства в стране появилась возможность для новых российско-буркианских отношений. Какой должна быть степень нашей поддержки нового правительства?"
 russia.712.a: "Инициировать миссию Африканского корпуса в Буркина Фасо и подписать экономические соглашения."
 russia.712.b: "Подписать экономических соглашений с Буркина-Фасо." 
 russia.713.t: "Новому Правительству Нигера Нужна Наша Помощь"
 russia.713.d: "В очередной раз правительство Западной Африки свергнуто в результате военного переворота, а народ Нигера осознает новую власть национальной хунты. Точно так же, как Мали и Буркина-Фасо, новое правительство Нигерии просит нас заверить в нашей поддержке, и мы в очередной раз окажем им эту услугу."
 russia.713.a: "Инициировать миссию Африканского корпуса в Нигер и подписать экономические соглашения."
 russia.713.b: "Подписать экономических соглашений с Нигером." 
 russia.714.t: "Новые Возможности в Гвинее"
 russia.714.d: "Приливная волна переворотов, захлестнувшая регион Сахель в Западной Африке, теперь достигла берегов Атлантики, а Гвинейская Республика пала жертвой военного восстания. Однако, в отличие от других хунт, которые были созданы в регионе, Гвинея представляет собой уникальную возможность для нашей страны, поскольку у них есть доступ к портам с теплой водой.\n\nТакой стратегический союзник, как они, бесценен в это время быстро меняющейся базы власти. Мы не должны терять времени на налаживание новых дружеских отношений с гвинейским руководством."
 russia.714.a: "Инициировать миссию Африканского корпуса в Гвинею и подписать экономические соглашения."
 russia.714.b: "Подписать экономических соглашений с Гвиней."
 russia.715.t: "Туркменистан Согласен!"
 russia.715.d: "Туркменистан согласился вступить в ОДКБ. Уже расторгнуты контракты на продажу природного газа из страны в различные западные страны, и разрабатываются планы по соединению запасов страны с запасами России. Несколько западных стран выразили протест против такого развития событий, но, по сути, в настоящее время они ничего не могут сделать."
 russia.715.a: "Вот и отлично!" 
 russia.716.t: "Туркменистан Остается Непокорным!"
 russia.716.d: "Туркменистан отказался вступать в ОДКБ! Сославшись на то, что отказ от взаимодействия с Западом нанесёт ущерб их стране, они категорически отвергли наши требования. Разрабатываются планы по укреплению границы с Казахстаном и началу специальной военной операции для защиты наших интересов в стране."
 russia.716.a: "Да будет так!" 
 russia.717.t: "Узбекистан Соглашается!"
 russia.717.d: "Узбекистан согласился вступить в ОДКБ. Экспорт хлопка из страны приостановлен, и несколько представителей нашего правительства выразили заинтересованность в подключении его энергосистемы к нашей. Ожидается, что эти события разозлят ряд западных компаний, но их страны, как ожидается, мало что предпримут в ответ."
 russia.717.a: "Очень приятно!" 
 russia.718.t: "Узбекистан Разорвал Дипломатические Связи!"
 russia.718.d: "Узбекистан отказался вступать в ОДКБ! Ссылаясь на предполагаемые нарушения прав человека в России, они категорически отвергли наши требования. Уже сейчас граница с Казахстаном милитаризуется, и в любой момент может быть начата специальная военная операция для защиты наших интересов."
 russia.718.a: "Готовьте пушки!"
 russia.719.t: "Правительство Колумбии Подписало Мирный Договор с АНО!"
 russia.719.d: ""
 russia.719.a: "Отличная работа, братья!"
 russia.720.t: "Отрывки из "Танатика, или Борьба с Самой Смертью""
 russia.720.d: ""В истории человечества случались катастрофы, которые становились для людей наглядной демонстрацией ничтожности их достижений и торжества непобедимого Зла. К таковым, несомненно, можно отнести эпидемии заразных болезней, периодически стиравшие с лица земли целые города. Лучшие и умнейшие участники этих бедствий неоднократно убеждались, что бороться в таких обстоятельствах бессмысленно - можно лишь стиснуть зубы и мириться со своими утратами..."\n\n"...В "Танатике" мы боремся за жизнь. За право на жизнь. За то, чтобы жизнь была возможна. За то, чтобы смерть никогда не говорила жизни - veto!""
 russia.720.a: "Интересное Чтиво..."
 russia.721.t: "Отчет о Прошедшей Эпидемии в Новой Усмани"
 russia.721.d1: "\n\n\n                  £GFX_MOR_event_texticon   \n\n\n\n\nУважаемый Алексей Анатольевич,\nБлагодаря оперативной работе местных властей совместно с Министерством здравоохранения удалось изолировать поселок Новая Усмань и поместить его на строгий карантин, распространение инфекции было остановлено, все инфицированные в количестве 39 человек были изолированы и обследованы. Заболевание, которое мы назвали "Plaga Terrae", вызывает следующие симптомы:\nЛихорадка\nСухость Кожи\nСбивающееся Дыхание\nСлабость (в некоторых случаях)\nСудороги (в некоторых случаях)\nПотливость (в некоторых случаях).\n\nПрогрессия болезни протекает лавинообразно: на ранних стадиях Plaga Terrae проявляет себя редко, и пациент даже может не знать о заражении. Однако чем больше болезнь прогрессирует, тем сильнее проявляются симптомы: кожа высыхает и воспаляется, появляется кашель, пациент испытывает сильную боль. Смерть от инфаркта наступает в течение восьми часов, однако использование лекарственных средств позволяет продлить жизнь больного до приблизительно суток с момента проявления первых симптомов.\n\nСамое странное в Plaga Terrae то, что нам так и не удалось отследить причины ее возникновения, абсолютно все инфицированные утверждали, что она, как им казалось, появилась из ниоткуда. Сами пациенты, несмотря на все наши усилия, умерли, не нашлось ни одного способа их вылечить, из-за этого мы невольно задаем себе вопрос: готовы ли мы к подобным заболеваниям в будущем? Ведь вполне возможно, что на этот раз нам просто очень повезло...\n\nБудем держать вас в курсе.\nДаниил Б. Данковский."
 russia.721.d2: "\n\n\n                  £GFX_MOR2_event_texticon   \n\n\n\n\nУважаемый Александр Гельевич,\nБлагодаря оперативной работе местных властей совместно с Министерством здравоохранения удалось изолировать поселок Новая Усмань и поместить его на строгий карантин, распространение инфекции было остановлено, все инфицированные в количестве 33 человека были изолированы и обследованы. Заболевание, которое мы назвали "Plaga Terrae", вызывает следующие симптомы:\nЛихорадка\nСухость Кожи\nСбивающееся Дыхание\nСлабость (в некоторых случаях)\nСудороги (в некоторых случаях)\nПотливость (в некоторых случаях).\n\nПрогрессия болезни протекает лавинообразно: на ранних стадиях Plaga Terrae проявляет себя редко, и пациент даже может не знать о заражении. Однако чем больше болезнь прогрессирует, тем сильнее проявляются симптомы: кожа высыхает и воспаляется, появляется кашель, пациент испытывает сильную боль. Смерть от инфаркта наступает в течение восьми часов, однако использование лекарственных средств позволяет продлить жизнь больного до приблизительно суток с момента проявления первых симптомов.\n\nСамое странное в Plaga Terrae то, что нам так и не удалось отследить причины ее возникновения, абсолютно все инфицированные утверждали, что она, как им казалось, появилась из ниоткуда. Сами пациенты, несмотря на все наши усилия, умерли, не нашлось ни одного способа их вылечить, из-за этого мы невольно задаем себе вопрос: готовы ли мы к подобным заболеваниям в будущем? Ведь вполне возможно, что на этот раз нам просто очень повезло...\n\nБудем держать вас в курсе.\nАртемий И. Бурах."
 russia.721.a: "Какая необычная болезнь..."
 russia.722.t: ""Патриотин" - Cыворотка для Боевой Эффективности"
 russia.722.d: "Томские военные химики разработали прорыв в области военных добавок - "Патриотин-20", сыворотку, повышающую боевые и физические способности солдат. Действие сыворотки длится не менее 6 часов после однократной инъекции.\nИнъекция была протестирована во время секретных военных учений на Дальнем Востоке и показала замечательные результаты. Солдаты, использующие сыворотку, отмечают, что теряют всякий страх и идут вперед, не задумываясь о собственной безопасности.\nНо ученые также отмечают возможность привыкания после многократного использования, а также другие симптомы, такие как потеря чувства собственного достоинства, бессонница, периодические головные боли и даже развитие легкой шизофрении в долгосрочной перспективе. Именно поэтому они советуют давать солдатам дозу диазепама после того, как действие сыворотки пройдет, каждый раз после использования.\n\nМир становится все более опасным, и наше нынешнее положение в геополитике делает инновации необходимыми. Наши враги не знают пощады, и эти "идеальные солдаты" заставят их заплатить за свои действия. Даже ценой здравомыслия и человечности наших храбрых воинов."
 russia.722.a: "Это слишком бесчеловечно!"
 russia.722.b: "Блестящая, необходимая инновация!"
 russia.723.t: "Спаситель России"
 russia.723.d: "Недавно в Якутии при разработке кимберлитовой трубки "Бесперспективная" был найден алмаз необычайных размеров, получивший название "Спаситель России", для алмаза предлагались и другие названия по типу: "Суверенный Алмаз" и "Единая Россия"\n\nВ Москве была проведена церемония в честь "Спасителя России" где алмаз был лично вручен президенту в руки. Дальнейшая судьба алмаза неизвестно, мы можем продать алмаз и выплатить некоторую часть внешнего долга, или мы можем пожертвовать его в Алмазный фонд российской федерации тем самым увеличив престиж страны и поток туристов, выбор за вами"
 russia.723.a: "Продайте его и выплатите наши долги."
 russia.723.b: "Давайте пожертвуем его."
 russia.725.t: "Сенегал Просит о Сотрудничестве"
 russia.725.d: "Президент Перейра запросил у России экономическую и военную помощь для борьбы с французским влиянием в стране."
 russia.725.a: "Инициировать миссию Африканского корпуса и подписать экономические соглашения."
 russia.725.b: "Подписать экономические соглашения."
 russia.726.t: "Сенегал Остается Профранцузским Государством"
 russia.726.d: "Несмотря на наши усилия помочь Перейре победить на выборах, в стране по-прежнему преобладают профранцузские силы."
 russia.726.a: "Блин блинский..."
 russia.727.t: "Кооперация с Талибаном"
 russia.727.d: ""
 russia.727.a: "Вчерашний враг, сегодняшний друг"
 russia.728.t: "Будущее Народного Фронта"
 russia.728.d: "Когда к власти пришёл Лукашенко, Народный фронт начал активно его поддерживать.\nОднако Александру Григорьевичу этого было недостаточно. Он понимал, что многие в руководстве фронта могут быть склонны к переменам: если придёт новый лидер, они и будут поддерживать его.\nДля нового президента важна личная лояльность. Поэтому первым делом он решил заполнить ряды ОНФ преданными ему людьми. Это должно было гарантировать, что политика Лукашенко будет выполняться на местах под личной ответственностью новых руководителей.\nНо есть и более радикальный вариант: полный пересмотр структуры и руководства фронта. Вместо не очень единой организации, по мнению президента, должна появиться сильная партия, отвечающая интересам народа. В этой партии Лукашенко должен стать фактическим лидером, хотя и останется беспартийным. Хотя этот вариант кажется более затратным и может вызвать недовольство у старой гвардии внутри аппарата президента, но может стать эффективным способом усиления поддержки."
 russia.728.a: "Заполнить Исполком ОНФ доверенными лицами Лукашенко."
 russia.728.b: "Преобразовать фронт в единую партийную структуру!"
 russia.729.t: "Прибытие Международной Поддержки!"
 russia.729.d: ""
 russia.729.a: "Спасибо всем вам, друзья!"
 russia.730.t: "Ультиматум из России"
 russia.730.d: "ВНИМАНИЕ! \nМЕДВЕДЕВ НЕДАВНО ОБЪЯВИЛ О ЗАПУСКЕ КОДА "333" ПО НАСТУПЛЕНИЮ НА ХЕЛЬСИНСКИЙ ГЕЙМДЕВ ГДЕ МОЖНО РАЗДОБЫТЬ ДВЕ ШИЗОИГРЫ ПО ЦЕНЕ ОДНОЙ\nZ Работайте, братья"
 russia.730.a: "Я хочу жити!!!"
 russia.730.b: "ГАНЬБА МЕДВЕДЕВ ГЕТЬ!" 
 russia.731.t: "Финляндия Соглашается!"
 russia.731.d: ""
 russia.731.a: "Замечательно! Тост за наших новых друзей!" 
 russia.732.t: "Финляндия Отвергает Наши Требования!"
 russia.732.d: ""
 russia.732.a: "Ну... Тогда будет по-плохому."
 russia.733.t: "Ультиматум из России!"
 russia.733.d: "ВНИМАНИЕ! \nМЕДВЕДЕВ НЕДАВНО ОБЪЯВИЛ О ЗАПУСКЕ КОДА "777" ПО НАСТУПЛЕНИЮ НА ТУРЕЦКУЮ ЗАБЕГАЛОВКУ "У ЭРДОГАНА" ГДЕ МОЖНО РАЗДОБЫТЬ ДВА КЕБАБА ПО ЦЕНЕ ОДНОГО\nZ Работайте, братья"
 russia.733.a: "ОЙОЙОЙОЙОЙ ВБЕГАЕМО ПАЦАНЫ."
 russia.733.b: "ГАНЬБА ТАК ЖИТИ НЕЛЬЗЯ." 
 russia.734.t: "Турция Соглашается!"
 russia.734.d: ""
 russia.734.a: "Ура, выпьем за нашего друга Эрдогана!"
 russia.735.t: "Турция Отвергает Наши Требования!"
 russia.735.d: ""
 russia.735.a: "Турки... Ждите..."
 russia.736.t: "Сопротивление Думы"
 russia.736.d: "Недавнее событие всколыхнуло всю российскую политику: часть депутатов из так называемого "реформистского" крыла Единой России объявила о выходе из партии и восстановлении блока "Отечество". Некоторые эксперты связывают данное событие с победой на недавних президентских выборах "реакционной" клики внутри Единой России и стремление данной группы "подмять" под себя сложившуюся благодаря реформам Медведева политическую систему.\nМногие уверены: данный ход призван недопустить усиления Единой России до своего доминирующего положения, как при президенте Путине. Существуют опасения, что, заручившись поддержкой Народной и Новой России, "Отечество" сможет успешно провести импичмент Президенту и поставить на его место более либерального политика."
 russia.736.a: "Чёрт!"
 russia.737.t: "Гамбит Воробьева"
 russia.737.d: "Сегодня стало известно решение Совета Федерации по импичменту Президенту: Вячеслав Володин отрешён от своей должности в связи с обвинениями Госдумы в нарушении конституционных норм и государственной измене. Временно исполняющим обязанности Президента назначен Андрей Воробьёв, бывший губернатор Московской области и лидер "Отечества".\nВ то же время прошли переговоры Единой России и реформистов, в которых, похоже, одержало верх "Отечество", после чего партии договорились об объединении: "Отечество" в своём полном составе вошло обратно в Единую Россию. Длительное противостояние реформистов и реакционеров наконец окончилось в пользу первых."
 russia.737.a: "Володя, ты не прав!"
 russia.738.t: "Провал Импичмента"
 russia.738.d: "Сегодня стало известно решение Совета Федерации по импичменту Президенту: Совет проголосовал против, [SOV.GetLeader] сохранил свой пост главы государства. Усилия блока "Отечество", отколовшегося от Единой России вскоре после победы на выборах кандидата от реакционеров, оказались тщетны.\nСумев развалить Народную и Новую Россию, Единая Россия оставила своих противников без поддержки, тем самым закрепив курс на поэтапное возвращение порядка, установившегося при президенте Путине. Длительное противостояние реформистов и реакционеров наконец окончилось в пользу последних."
 russia.738.a: "Победа!"
 russia.739.t: "Импичмент Президента"
 russia.739.d: "Сегодня стало известно решение Совета Федерации по импичменту Президенту: [SOV.GetLeader] отрешён от своей должности в связи с обвинениями Госдумы в нарушении конституционных норм и государственной измене. Временно исполняющим обязанности Президента назначен Андрей Белоусов.\nВ то же самое время прошли переговоры "Единой России" и реформистов, в которых, похоже, одержало верх "Отечество", после чего партии договорились об объединении: "Отечество" в своём полном составе вошло обратно в "Единую Россию". Длительное противостояние реформистов и реакционеров наконец окончилось в пользу первых."
 russia.739.a: "Видение Медведева продолжает жить"
 russia.740.t: "Турция Подала Заявку на Вступление в БРИКС"
 russia.740.d: "После распада ЕС и распада НАТО турецкое правительство осознало, что у него нет возможности избежать вступления в БРИКС. В публичном выступлении президент Эрдоган заявил, что он всегда предпочитал БРИКС ЕС, но не предпринимал никаких действий и не вступал в него раньше, потому что боялся западных империалистов."
 russia.740.a: "Наконец-то!"
 russia.741.t: "Дело "Макфы""
 russia.741.d: "Первые новости о том, что Генпрокуратура России подала иск к "Макфе" и ряду ее компаний, появились в СМИ 28 марта. В них сообщалось, что заместитель генпрокурора направил в Центральный районный суд Челябинска иск к одноименному российскому АО, а заодно - к аффилированным с ним фирмам. Суть иска не раскрывалась, а в "Макфе" от комментариев отказались. Предварительное заседание по делу назначили на 9 апреля.\n\nПри этом на сайте были указаны ответчики: всего 34 юридических и 13 физических лиц, среди которых оказались бывший депутат Госдумы Вадим Белоусов и экс-губернатор Челябинской области Михаил Юревич. Впоследствии обоим как бенефициарам "Макфы" предъявили обвинение в том, что они много лет занимались бизнесом, работая в органах госвласти.\n\nДолгие годы бывшие чиновники, по сведениям "Коммерсанта", нарушали запреты и ограничения, предусмотренные антикоррупционным законодательством. В публичном поле данные о владении компаниями ни Белоусов, ни Юревич, как следует из материалов дела, не раскрывали."
 russia.741.a: "Теперь эти деньги пойдут на благо Российской Федерации."
 russia.742.t: "КПРФ Критикует Экономическую Политику"
 russia.742.d: "После краха на Уолл-стрит и последовавшего за ним экономического кризиса Россия, конечно же, тоже пострадала. Одним из главных критиков наших методов преодоления этого кризиса является КПРФ и ее лидер - Геннадий Зюганов. В недавнем выступлении в Госдуме, а вскоре после этого и на митинге, Зюганов призвал к национализации богатств страны и уничтожению олигархии, заявив:\n"...В очередной раз мы видим, как работает полностью недееспособная система... Капитализм - главная беда человечества и России. 30 лет мы пытались встроиться в эту несправедливую систему... И вот теперь пожинаем "плоды"... Нечто подобное было в 90-е годы, после дефолта... Мы еле-еле вытащили страну из пропасти... Позор "Единой России", позор Центробанку за их грабительскую политику, обдирающую трудовой народ... Только социализм является ответом на все проблемы, в СССР мы построили самую великую экономику, самую крупную в мире, без помощи Запада, без банковских кредитов, только благодаря экономике, которая двигалась народом!"\n\nПоскольку крах затронул многих граждан России, его слова нашли отклик у большего числа людей, чем обычно."
 russia.742.a: "Всегда легче быть в оппозиции."
 russia.743.t: "Жириновский: "Мои Предсказания Сбылись!""
 russia.743.d: "В условиях экономического кризиса, как мы и опасались, Жириновскому есть что сказать. Он, недавно, вышел на трибуну Думы и разразился пламенной речью:\n"...Теперь, после краха экономики Уолл-стрит, вы видите, что смута в США неизбежна... Их главные капиталисты потерпели крах! Кто первым говорил про это на этой самой трибуне? Мы, наша ЛДПР! Но опять же, Зюганов смеялся, депутаты ЕдРа смеялись... А кто смеется сейчас? Я говорил: "Дональд, даже не пытайся! Ты не спасешь свою страну!". Я снова был прав, это были последние выборы в Америке, после них - всё, капут...\nНо мы не должны терять ориентиры. У нас все еще есть НАТО, у нас все еще есть бандеровская Украина, которая убивает наш народ на Донбассе!\nЯ бы хотел, чтобы эти годы были мирными, но я люблю говорить правду. Вот кто я такой, уже больше 70 лет я говорю правду. Эти года не будут мирными! Это будет время, когда Россия снова станет великой страной, и все должны заткнутся, и уважать нашу страну! Или нас заткнут, и будут уничтожать русских не только на Донбассе, но и на Западной России!"\n\nЭта речь Жириновского вызвала большой резонанс в Интернете, и люди снова назвали его "Великим Предсказателем"."
 russia.743.a: "Потрясающе, как всегда, Владимир Вольфович."
 russia.744.t: "Зюгановиана - Новая Лениниана"
 russia.744.d: "После официального ухода на пенсию нашего любимого председателя Геннадия Зюганова, попытки кинематографистов рассказать о жизни и борьбе этого многолетнего борца за коммунизм были лишь вопросом времени. Одним из первых фильмов, вышедших недавно, стал "Зюганов: Смутное время", рассказывающий о молодом Зюганове в трудные годы после распада СССР. В фильме показаны его героические усилия по защите трудящихся и восстановлению коммунистической партии как маяка надежды в противовес преследованиям и воровству, связанным с ельцинской эпохой.\n\nФильм сразу же получил множество советских наград и высокую оценку как общественности, так и партийных чиновников.\n\nМногие считают его отправной точкой, первым фильмом о жизни председателя. Скоро, как и в случае с Лениным, в Советском Союзе появится свой жанр фильмов, посвященных Геннадию Зюганову."
 russia.744.a: "Настоящее произведение искусства!"
 russia.745.t: "Перевыборы Думы"
 russia.745.d: "Недавно состоялись перевыборы в Государственную Думу, в результате которых в парламенте установилась трёхпартийная система: Единая Россия, Народная Россия и Новая Россия разделили между собой места поровну.\nТеперь, когда благодаря усилиям президента Даванкова Новая Россия из объединения, чудом получившего свои места в Думе, превратилась в третью силу, с которой необходимо считаться, двум другим партиям будет намного сложнее противостоять либеральным инициативам. Факел Суверенной Свободы будет гореть ещё долго, и Новая Россия несёт его."
 russia.745.a: "Победа!"
 russia.746.t: "Правительственное Меньшинство в Думе"
 russia.746.d: "Новая Россия - партия, которая существует вопреки. Объединение государственных либералов, она появилась против воли Медведева, который грезил о российской двухпартийности. Она победила на президентских выборах вопреки всем прогнозам, обойдя и Народную, и Единую Россию.\nНо из-за такого быстрого и неожиданного успеха Новая Россия не успела стать третьей силой в Думе. И поэтому всегда существует угроза, что все те реформы, которые проводит Даванков, могут в любой момент быть отменены объединённой силой Народников и Единоросов...\n\nПора это исправлять."
 russia.746.a: "Нам нужно большинство!"
 russia.747.t: "Вопрос о Второй Партии"
 russia.747.d: "Поскольку демократия, которую мы строим в Империи, основана на принципах теоретической демократической монархии, наиболее стабильной моделью такой системы была бы двухпартийная система.\nТем не менее, остается открытым вопрос: какую партию следует выбрать в качестве соперника октябристов?"
 russia.747.a: "Умеренная левая политика необходима в наши дни..."
 #russia.747.b: "Когда-то КДП была легендарной партией Российской империи. Давайте восстановим ее статус!"
 russia.747.c: "Более современный консерватизм в противовес регрессивизму октябристов подошел бы как нельзя лучше."
 russia.748.t: "Дворяне Устраивают Торжественный Прием"
 russia.748.d: "Наши дворяне недавно посетили великолепное торжественное мероприятие. Они наслаждались восхитительным чаепитием, вкушая традиционную русскую выпечку. В роскошном бальном зале прекрасные женщины танцевали со своими партнерами, а в воздухе звучала русская классическая музыка.\n\nЭто событие широко освещалось в новостях и поразило воображение многих людей, которые были очарованы образом жизни дворянства. Они были счастливы видеть, что такие великолепные мероприятия снова проводятся в России."
 russia.748.a: "Превосходно!"
 russia.749.t: "Монархисты Митингуют за Царя"
 russia.749.d: "В одном из наших крупных городов верные подданные устроили массовый митинг за благополучие и здоровье царя и его семьи. Было видно множество флагов и портретов предыдущих царей. Поистине чудесно."
 russia.749.a: "Спасибо за вашу преданность."
 russia.750.t: "Партия Русского Дела"
 russia.750.d: "С момента восстановления монархии многие политики обсуждают будущее партийной политики в России. Одни утверждают, что нужно упразднить любую партийную организацию, другие, в том числе Бабурин, считают, что в наше время необходима всеохватывающая политическая организация. Это позволит гражданам России взаимодействовать с представителями царя на более фундаментальном уровне, не нанося ущерба власти и авторитету государя."
 russia.750.a: "Русским нужна царская партия, которая прислушивалась бы к ним и передавала послание царя!"
 russia.750.b: "Вся политика - лишь веточки западного декаданса. Царь защитит народ от этих политиков!" 
 russia.751.t: "Первые выборы в Думу"
 russia.751.d: "Настало время выборов - время, когда народ может высказаться. За места в Думе борются три крупнейшие партии.\n\n"Союз 17 октября" - они же октябристы, назвали свою партию в честь Манифеста, подписанного Николаем II 17 октября 1905 года. Они являются идейными наследниками старых октябристов, прекративших существование после Февральского переворота 1917 года. Под лидерством Константина Затулина партия выступает за кооперацию с имперскими компаниями, развитие русской культуры и консолидацию общества.\n"Суверенитет и Демократия" - умеренные консерваторы под руководством Антона Бакова. Они заявляют о необходимости расширения поддержки уязвимых слоёв населения, увеличения государственных дотаций бизнесу и углубления сотрудничества с церковью.\n"Партия Справедливости" - нежелательные левые, возглавляемые Александром Бурковым. Они выступают за расширение поддержки рабочих, дальнейшую демократизацию и "мирное принятие российской истории". Хотя мы и не жалуем левые партии, мы не можем лишить наших подданных демократической свободы выбора.\n\nБорьба партий за голоса народа продолжается и в итоге... "
 russia.751.a: "Союз 17 октября обеспечивает себе большинство в Думе!"
 #russia.751.b: "КДП опережает октябристов и может назначить их премьер-министром!"
 russia.751.c: "СиД заслужила расположение народа, и теперь она возглавляет думское большинство."
 russia.751.h: "Левые каким-то образом смогли победить."
 russia.752.t: "Экономическая Кооперация с Россией"
 russia.752.d: ""
 russia.752.a: "Дружба и Кооперация"
 russia.753.t: "Центр Примирения Истории"
 russia.753.d: "После объявления Даванковым Доктрины "Примирения Истории", в Екатеринбурге был установлен памятник Николаю Второму напротив памятника Ленина, а школьная программа претерпела изменения в угоду примирения истории из-за чего были переписаны школьные книжки по истории, но главным пиком этой доктрины стало появление "Центра Примирения Истории", на открытии которой присутствовал и сам Даванков.\n\nСам центр является музеем истории России, который пытается объединить совершенно разные мнения и эпохи в единый исторический путь страны. Экспозиции показывают исторические эпохи разных времен, стараясь объяснить политический контекст с точки зрения действующих тогда лиц объясняя причины которые побудили их поступить так как они поступили, в самом конце экспозиций всё складывается в гигантскую картину истории России."
 russia.753.a: "Кому верить то?"
 russia.754.t: "Конец Реакционеров"
 russia.754.d: "Недавно в правительстве прошла волна отставок чиновников и министров, принадлежащих так называемой "реакционной" фракции Единой России. Потерявшие верховную власть после импичмента их кандидата, реакционеры начали распадаться на отдельные клики, сформированные вокруг бывших участников "башен Кремля".\nНаиболее релевантной из них остаётся группа нео-силовиков. Сплотившись вокруг бывшего губернатора Тульской области Алексея Дюмина, когда-то называвшегося одним из возможных преемников Путина, они выступают за жёсткий курс управления страной. К счастью, реакционные группировки слишком разрозненны и малочисленны для хоть сколько-нибудь серьёзного противостояния нашим реформам."
 russia.754.a: "Свобода обеспечена."
 russia.755.t: "Его Последнее Письмо"
 russia.755.d: ""Дмитрий Анатольевич,\nТебе вновь доверено президентство. На этот раз, к сожалению, тебе придется руководить в одиночку.\n\nТы, мой протеже и верный друг. Наши расчеты оказались верны. Мир стоит на пороге новой эры, и геополитический ландшафт меняется таким образом, что это одновременно и разрушительно, и пугающе. Каждый день мы видим неуправляемые последствия этих изменений.\nЭтот мир - руина из неудач и ошибок прошлого, но ты должен принять вызов и бесстрашно встать у руля нашей родины.\n\nВместе с этим письмом ты также получишь небольшую коробочку, в которой находится мой президентский значок, самый первый. Теперь он твой.\nТы был смел однажды, так будь же смел вновь. Защити Россию от политических потрясений, не сходи с пути нашей общей цели и решительно брось вызов рушащейся однополярности.\n\nУдачи и прощай."\n\nПодписано:"
 russia.755.a: ""...Владимир Владимирович Путин""
 russia.756.t: "Действие Прав на Российские Ресурсы Закончилось"
 russia.756.d: ""
 russia.756.a: "Клёво"
 russia.757.t: "Права на Российские Ресурсы"
 russia.757.d: ""
 russia.757.a: "Клёво"
 russia.758.t: "Экономика Открытых Дверей с Россией!"
 russia.758.d: ""
 russia.758.a: "Русские и Китайцы - Братья Навеки"
 russia.759.t: "Приглашение в ОДКБ"
 russia.759.d: ""
 russia.759.a: "БРАТВА РВЁТСЯ К ВЛАСТИ!!!!"
 russia.759.b: "БРАТ..... НАДО ТИШИНУ ПОЙМАТЬ...."
 russia.760.t: "Сербия Соглашается"
 russia.760.d: ""
 russia.760.a: "Сербско-русское братство навеки"
 russia.761.t: "Сербия Отказывается"
 russia.761.d: ""
 russia.761.a: "Чёрт..."
 russia.762.t: "Слуцкий Объявляет о "Новом Национальном Мышлении""
 russia.762.d: "Спустя несколько недель после ухода из жизни нашего любимого лидера Владимира Жириновского его преемник Леонид Слуцкий вышел на трибуну российского Сената. Он заявил о необходимости пересмотра национальной политики и перехода к "современному мышлению"\n\nСлуцкий сказал: "Я не хочу сказать, что правительство нашего любимого основателя было плохим... Оно было удивительным, мы выиграли войну вместе, при нем! Но пришло время понять, что методы, которые подходили бы для правительства Владимира Вольфовича... не подходят для продолжения его наследия. Я думаю... Владимир Вольфович, будь он жив, поддержал бы и поощрил такие усилия. Он лично доверил мне свою должность, поэтому я знаю, о чем говорю"\n\nПосле того как Слуцкий закончил свою речь, сенат проголосовал за ряд предложенных им реформ. Однако некоторые отметили, что на сегодняшнем заседании отсутствовали люди, которые могли бы выступить против его идей. Его сторонники назвали их просто "ленивыми" оппонентами."
 russia.762.a: "Что есть, то есть."
 russia.763.t: "Общероссийские Выборы"
 russia.763.d: "Слуцкая "оттепель" подошла к концу, и после нескольких месяцев либерализации в стране проходят выборы, в которых участвует множество новых партий и кандидатов. Однако, по мнению людей, лишь несколько кандидатов могут считаться серьезными претендентами.\nСлуцкий сам заявил, что не намерен баллотироваться в президенты. Вместо него был выбран новый кандидат - Андрей Свинцов. Многие считают, что Свинцов может легко попасть под влияние Высшего совета ЛДПР, который возглавляет Слуцкий. Поэтому Слуцкий может сохранить контроль за кулисами и, скорее всего, будет назначен на пост премьер-министра.\n\nДругие кандидаты включают Романа Юнемана, молодого и демократически настроенного кандидата от партии "Общество.Будущее". Он баллотируется на платформе построения настоящей российской парламентской системы.\n\nДмитрий Рогозин - еще один кандидат, которого стоит упомянуть. Он - дикарь с позитивным взглядом на советский период. Его левые взгляды сочетаются с правыми социальными позициями. Он баллотируется от партии "Родина" - давнего второстепенного игрока в российской политике, который наконец-то получил шанс на власть."
 russia.763.a: "Юнеман!"
 russia.763.b: "Свинцов!"
 russia.763.c: "Гиркин!"
 russia.763.f: "Рогозин!"
 russia.763.z: "Пушилин!"
 russia.763.k: "Шевченко?!"
 russia.764.t: "Шах и Мат!"
 russia.764.d: "Леонид Слуцкий - не самый умный человек, но это больше говорит о его оппонентах, которых он переиграл. Те, кто пытался его перехитрить и утверждал, что он не является истинным и честным преемником Владимира Жириновского, имея при этом ограниченное и искаженное представление о его политике, проявили недостаточную искушенность. Очевидно, что они не ожидали от Слуцкого такого стратегического мышления.\nСейчас Слуцкий возглавляет новую Россию, которую построил и возродил Владимир Вольфович. Некоторые вещи были новыми, некоторые - заимствованными. Было ясно, что люди не примут железного правления любого, кто придет после Жириновского, потому что знают, что никто не будет таким, как Жириновский. Поэтому перемены были необходимы.\n\nКонечно, ЛДПР останется у власти, и ее правила и законы не могут быть изменены. Однако это уже не автократический режим, а руководящая сила для российского народа."
 russia.764.a: "Мы живем в обществе."
 russia.765.t: "Наша Родина В Опасности!"
 russia.765.d: "Коммунистическая угроза с запада наконец-то показала своё истинное лицо, напрямую нападая на нас и наших союзников. Эти злые силы стремятся распространить свою идеологию по всему миру. Но необольшевики увидят нашу силу, и мы победим их.\n\nМы сокрушим их, и Европа освободится от влияния этих коммунистических дьяволов."
 russia.765.a: "За Родину!"
 russia.766.t: "В Городе Моем..."
 russia.766.d: "В городе моём война,\nДо неё нет никому никакого дела.\nПока гибнут сотни людей и солдат\nПьют и пляшут московские лицедеи...\n\nВ городе моём не звенит детский смех,\nЗдесь звучит каждый день сирена,\nЗатянула она свою адскую песнь\nЗабирая новых жертв из житейского тлена...\n\nВ городе моём давно уж пусто -\nНи надежд, ни любви, ни-че-го.\nТолько в небе гуляет с грустью\nОдинокий вой ПВО...\n\nВ городе моём печаль и скорбь\nПочивают на траурных лаврах.\nВсё что было сейчас, отложилось теперь на потом\nИ умножилось в ранах кровавых...\n\nТолько город мой, как прежде стоит -\nОбессиливший, просто усталый,\nНо всё также мы верим в него\nИ скандируем..."
 russia.766.a: ""ПОБЕДА ЗА НАМИ!""
 russia.767.t: "Новый Конфликт в Азии"
 russia.767.d: "После Тайваньской войны ситуация в Азии вновь накаляется. Новый конфликт может охватить весь регион: Япония в союзе с Организацией Договора о Тихоокеанской Обороне против Китая и его Восточно-Азиатской Оборонной Инициативе. Это сражение может изменить баланс сил в мире. Теперь настало время и нам сделать выбор."
 russia.767.a: "Поддержим Китай!"
 russia.767.b: "Останемся в нейтралитете"
 russia.767.c: "Поддержим Японию!"
 russia.768.t: "Поддержка из Москвы"
 russia.768.d: "Советский Союз решил поддержать и предоставил помощь!"
 russia.768.a: "Здорово!"
 russia.769.t: "Новый Старый Социализм"
 russia.769.d: "В старом московском кафе сидели двое друзей, старые знакомые с давних времён. Один из них, Максим Черепанов - крупный, но честный предприниматель, который недавно потерял свой бизнес, проданный государству по новым законам за бесценок. Он тяжело вздохнул и, покачивая головой, обратился к своему товарищу, Антону Иванову, простому работяге, всю жизнь посвятившему труду и верному старым идеалам Ленинизма:\n- Знаешь, за 10 лет я выстроил свою компанию с нуля, я никакой не олигарх, ничего не воровал, вложил в неё душу, а теперь вот - забрали. За копейки. Разве можно так поступать? Куда мы торопимся? Зачем двигаться так быстро? Социализм нельзя построить мгновенно! Страна просто не готова... Нужно всё делать постепенно, а не так, чтобы ломать через колено.\nЕго друг, отличавшийся поддержкой действий новой власти, откинулся в кресле и усмехнулся.\n- А что ты хотел? Тебя не раскулачили под чистую, не выкинули на улицу. Ты остался на посту директора своей же компании. Разве это так уж плохо? Да, за копейки, но ведь твоя жизнь не рухнула. А стране нужно больше - после всех этих лет деградации. Мы потеряли слишком много времени, а теперь надо развиваться быстро. Повторить сталинский успех! И это требует решительных действий! Пойми, таковы требования времени...\n- Может, ты и прав... - неохотно пробормотал предприниматель, но его глаза всё ещё выдавали сомнение."
 russia.769.a: "Необходим рывок..."
 russia.770.t: "Переговоры Между Украиной и Россией"
 russia.770.d: "Несмотря на все наши усилия во время войны, нам пришлось вести переговоры с новым украинским правительством, которое пришло к власти после свержения предыдущего режима. Правительство Бойко более дружелюбно относится к России и русскоязычному населению, но нам пришлось временно отказаться от наших более радикальных предложений, таких как вступление Украины в ОДКБ (Организация Договора о коллективной безопасности) или новые территориальные аннексии.\n\nОднако после новых украино-российских переговоров в Одессе правительство Бойко согласилось подписать военный союз в обмен на значительное финансирование и инвестиции в послевоенное экономическое восстановление Украины. Сюда также входит строительство зоопарка в Киеве и аквапарка в Одессе."
 russia.770.a: "И вновь в Аркадии весна, и на Майдане людно..."
 russia.771.t: "Владимир Путин и Пустота"
 russia.771.d: "- Вовка! - позвал из-за двери голос Бориса Николаевича - ты где?\n\n- Нигде! - пробормотал он в ответ.\n\n- Во! - неожиданно заорал Ельцин, - молодец! Завтра благодарность на всю страну объявлю. Все ведь понимаешь! Так чего весь вечер дурнем прикидывался?\n\n- Как вас понимать?\n\n- А ты сам подумай. Ты что сейчас перед собой видишь?\n\n- Подушку, - сказал он, - но плохо. И не надо мне опять объяснять, что она находится в моем сознании.\n\n- Все, что мы видим, находится в нашем сознании, понимаешь. Поэтому сказать, что наше сознание находится где-то, нельзя, понимаешь. Мы находимся нигде просто потому, что нет такого места, про которое можно было бы сказать, что мы там находимся. Вот поэтому мы нигде. Вспомнил?\n\n- Борис Николаевич, - сказал он, - мне лучше одному побыть.\n\n- Ну как знаешь. Чтоб завтра был у меня как огурец. В полдень повышение, понимаешь."
 russia.771.a: "где Я в этом потоке?"
 russia.772.t: "Советский Бизнес"
 russia.772.d: "Он был успешным бизнесменом, владельцем сети торговых центров, казино, одним из членов совета Специальной Экономической Зоны в Новороссийске. В тот день, прогуливаясь по одному из своих владений, он остановился как вкопанный. \n\nПеред ним, в тени его блестящего делового царства, стоял прицеп, из которого доносился аппетитный запах. У окна в засаленном фартуке колдовал азербайджанец, вручая шаурму довольным рабочим и прохожим. Бизнесмену это показалось оскорблением его величия. \n\nС боевым настроем он подошел к повару и начал выдвигать: \n- А что вы здесь забыли? Вам кто-то право давал здесь печь вашу отраву?! \n\nБедняга пытался успокоить пылкого капиталиста, но безуспешно, завязалась перепалка. К счастью, она длилась от силы минуту, когда бизнесмен увидел документы на разрешение предпринимательской деятельности в СЭЗ. \n\n- Вот гадина, если бы не советские законы, давно бы бульдозером снес твою забегаловку! В девяностых куда проще с этим было! \n- Брат, ты такой злой от голода? Для тебя могу бесплатно сделать!\n- Да отстань ты!"
 russia.772.a: "...желудок предательски заурчал."
 russia.773.t: "Классовая Борьба"
 russia.773.d: "На одном из машиностроительных заводов в Поволжье произошёл скандал, который грозил перерасти в катастрофу. Корпоративный профсоюз, созданный для рабочих, оказался пустышкой: жалобы оставались без ответа, из-за чего трудовой коллектив решил создать свой, независимый профсоюз. Доведённые до отчаяния, люди собрались на стихийный митинг прямо в производственном цеху. Инженеры, сварщики, бухгалтеры и рабочие из всех отделов объединились под красными флагами и транспарантами с надписями "За что мы сражались?" и "Заводы - рабочим!".\n\nВладелец завода, испугавшись угрозы срыва госзаказа, спустился в цех, чтобы утихомирить недовольных. Он громко потребовал:\n- У нас есть корпоративный профсоюз! Все жалобы туда! Вы срываете сроки! Немедленно вернитесь на свои места!\n\nГолос из толпы перебил его:\n- Да кроме подарков на праздники твой профсоюзик ни на что не годится! Сколько можно нас завтраками кормить? Мы уже создали свой!\n\n- У вас нет на это права! - заорал хозяин, краснея от злости. - Я сейчас милицию вызову!\n\n- Ну давай, попробуй! - бросили ему в ответ с вызовом.\n\nВ этот момент в цех ворвалась Милиция, моментально окружив конфликтующих и..."
 russia.773.a: "...всех положили на пол."
 russia.773.b: "...арестовали директора."
 russia.774.t: "Вступай в Профсоюз!"
 russia.774.d: "МВД вмешалось в трудовой конфликт, чтобы избежать угрозы срыва производства на стратегически важном заводе. Руководство предприятия заменили, а вместо корпоративного профсоюза был введён государственный. Первые месяцы после изменений внушали рабочим надежду: вопросы решались оперативно, жалобы рассматривались, а люди чувствовали себя услышанными.\n\nОднако с течением времени ситуация изменилась. Новый профсоюз, обременённый бюрократией, начал увязать в приписках и коррупции. Помощь получали лишь "свои" или те, кто мог предложить "маленькую благодарность". Попытки выразить недовольство или обратиться с вопросами стали рассматриваться как подрыв государственной дисциплины - с соответствующими последствиями.\n\nНо, несмотря на это, стабильность профсоюза обеспечивала защиту рабочих от самых вопиющих нарушений: зарплаты приходили вовремя, условия труда оставались на уровне. Завод выполнял свои обязательства, а страха внезапных увольнений, как это было в прошлом, уже не существовало.\n\nНа одной из перекрытий сварщики, сидя на перерыве, обсуждали произошедшее:\n- Вот они говорят: "У нас задачи важнее". Какие задачи? Они точно коммунисты? - проворчал один, смахивая с лица копоть.\n- Может, они просто забыли, зачем сюда пришли? Победили врагов и на нас махнули рукой, - отозвался второй, глядя вниз на цех."
 russia.774.a: "Победа?"
 russia.775.t: "Вступай в Профсоюз!"
 russia.775.d: "Власти приняли решение пойти на уступки рабочим, сменив руководство завода и позволив создать независимый профсоюз, который получил контроль над процессами на предприятии. Формально завод оставался в собственности прежнего владельца, но фактически управление перешло в руки рабочих. Первое время такой подход показал себя с лучшей стороны: проблемы решались коллективно, а условия труда стали заметно улучшаться. \n\nОднако со временем в профсоюзе начали укрепляться интриганы и карьеристы, которые вытесняли инициативных и талантливых рабочих. Это привело к постепенной деградации организации. Недовольные сотрудники либо сталкивались с коллективным прессингом, либо вынужденно покидали завод. Забастовки использовались больше как рычаг давления на руководство, а реальные вопросы оставались без внимания.\n\nСитуация приобрела такую скрытную и напряжённую форму, что даже контрразведка не обращала на неё должного внимания, считая это внутренними трудностями. Один из молодых офицеров КГБ, пытаясь проявить инициативу, наткнулся на тревожные сообщения в рабочем Telegram-канале:\n- Дим, посмотри, тут какой-то канал завода. Пишут, что полный беспредел. Может, копнём? - спросил он, показывая экран телефона.\n- Паш, брось, это ерунда. Запросов не было, жалоб тоже. Скорее всего, это очередная пропаганда из-за границы. Нам такие мелочи расследовать некогда."
 russia.775.a: "Победа?"
 russia.776.t: "Евразия Предлагает Нам Экономическое Партнерство!"
 russia.776.d: ""
 russia.776.a: "Звучит как хорошая идея."
 russia.777.t: "Всплеск Терроризма"
 russia.777.d: "Националистические группы активизировались в Украине, Прибалтике и Польше. Они выступают за разрушение воссозданной Российской империи и восстановление шовинистических режимов в Восточной Европе. Они уже начали саботировать и убивать верных нам людей. Мы должны что-то с этим сделать!"
 russia.777.a: "Объявите позицию Контртеррористической операции!"
 russia.778.t: "Мусульманское Восстание"
 russia.778.d: "Вслед за террористами на востоке, исламисты на юге начинают многочисленные восстания, захватывая крупные транспортные узлы и целые населенные пункты.\nБолее всего, вероятно повторится сценарий последних лет с вторжением на Кавказ и юг Средней Азии. Мы должны что-то предпринять."
 russia.778.a: "Подготовьте танки!"
 russia.779.t: "Московский Рейд"
 russia.779.d: "Сегодня многие жители Москвы были разбужены на рассвете звуками проезжающих по улицам тяжелых машин, выбиваемых дверей, а иногда и выстрелами. Позже правительство объявило об "успешном завершении операции по задержанию различных опасных предательских элементов в Москве", заявив, что было захвачено около 2500 подозреваемых. Международные СМИ обратили внимание на то, что местонахождение многих известных бизнесменов, ученых и политиков в настоящее время неизвестно. Одно можно сказать точно: предатели больше не угрожают Империи."
 russia.779.a: "Это было так же просто, как перевернуть руку."
 russia.780.t: "Польский Вопрос"
 russia.780.d: ""
 russia.780.a: "Включите их прямо в состав Империи!"
 russia.780.b: "Просто усильте контроль над нынешним правительством и подавите сепаратистов."
 russia.780.c: "Поляки всегда были свободолюбивым народом, и мы будем снисходительны к ним."
 russia.781.t: "Его Дело Продолжает Жить"
 russia.781.d: "Великий лидер Владимир Вольфович Жириновский, непоколебимый защитник России.  Его жизнь, полная ярких свершений и несокрушимой воли, стала легендой.  Россия, вознесённая им к новым высотам могущества и процветания, скорбит о его уходе, но сердце её бьётся в унисон с его заветом.\n\nЕго имя навсегда вписано в анналы истории золотыми буквами.  Он, непоколебимый боец,  разрушил цепи глобалистского заговора, вернул России её былое величие и  укрепил её позиции на мировой арене.  Его смелость, его проницательность, его неукротимая энергия вдохновляли миллионы.  Он ушёл, но его дело живёт!  Его идеи, его стратегия, его непоколебимая вера в Россию - всё это продолжает жить в сердцах миллионов преданных последователей ЛДПР.\n\nПартия ЛДПР, верная завету своего лидера,  продолжит его курс на процветание России.  Мы,  последователи его великого пути,  будем неустанно работать во благо нашей Родины,  укрепляя её мощь и  защищая её интересы.  Память о Владимире Вольфовиче Жириновском -  это священный огонь, который будет вечно гореть в наших сердцах.  Его имя - символ силы, мужества и любви к России.\n\nДа здравствует Россия!  Да здравствует вечная память о Владимире Вольфовиче Жириновском! "
 russia.781.a: "Его дело бессмертно."
 russia.782.t: "Охота"
 russia.782.d: "Солнце взошло над утренним небом восточной Польши, осветив живописную картину. Облаков было немного, ветер был слабым, а день удивительно теплым. Но строй из пяти истребителей пронесся сквозь них, нарушив покой.\n\nЛейтенант Петров и его эскадрилья СУ-35 кружили в небе над восточной Польшей, настороженные, бдительные и жаждущие боя. Они были на охоте.\n\nВоздушное пространство над странами "восточного фланга" НАТО превратилось в одну большую гладиаторскую арену. Небо наполнилось ревом самолетов и грохотом пушек и ракет. Шли бои, сталкивались машины, гибли люди, добывалась слава.\n\nНо Петрову и его товарищам все это было не чуждо. Изо дня в день они были здесь, сражаясь, даже вступая в поединки с врагом. Это была жесткая и опасная игра, но к настоящему моменту у него было что показать. 5 румынских F-16, 3 украинских МиГ-29 и один немецкий истребитель Eurofighter Typhoon. Но он был здесь не ради новых убийств. Его не волновали ни те предыдущие победы, ни все остальное. Он был одержим и сосредоточен на своей добыче.\n\nБританцы, ближайшие помощники Америки в Европе, держали свою авиацию над Польшей. В отличие от своих восточноевропейских марионеток, они были особенными. У них были страшные истребители пятого поколения, американские F-35, и эскадрилья Петрова чувствовала это. Он потерял несколько дорогих ему товарищей из-за этих проклятых истребителей и хотел заставить этих наглых англосаксов заплатить.\n\nИ вот он и его эскадрилья неслись по небу в поисках. Энтузиазм исчез, теперь в кабинах витали страх и напряжение, смешанные с жаждой мести. Петров все время думал об одном. Они были здесь, он просто знал это. Они должны быть близко, совсем рядом.\n\nНо тут Петров опустился к дисплеям, замигали огни, раздался шум. Ужас взорвался внутри него. Радарный приемник закричал, что его засекли."
 russia.782.a: "Поехали."
 russia.783.t: "Сбитие"
 russia.783.d: "Радио эскадрильи взорвалось бешеным хаосом, когда Петров рывком левой руки выбросил осветительные ракеты, а его истребитель вильнул, чтобы защититься от приближающихся ракет. Остальные "Сухие" делали то же самое, отклоняясь и пикируя во всех направлениях. Авиаторы судорожно сканировали небо вокруг себя в поисках засады.\n\nТоварищи по радио передавали данные о дальности и цели, но Петров не мог ничего сказать. Его сердце бешено колотилось, руки тряслись, а страх пожирал его. Он застыл на месте, испуганный, но сосредоточенный. Его глаза и голова были устремлены в разные стороны, ища нападавших. У него было несколько мгновений, нет, всего несколько секунд, чтобы действовать. Он сканировал и сканировал, но потом-\n\n"Там! Под нами!" - раздался треск радиоприемника.\n\nПродолжая обороняться, он вывернул свой самолет и увидел, как три британских F-35 проносятся мимо, выпуская ракеты и собираясь атаковать пару его товарищей. Он был прав. Они здесь.\n\nНо теперь он попытался сосредоточиться, грубо заставив страх забиться на дно, куда только можно было запихнуть его в своем сознании. Действовать, не зацикливаться. Действуй или умри. Он быстро искал возможность и нашел ее.\n\nЗадний F-35 был занят, преследуя одного из его товарищей, и он был близко позади. Его глаза расширились. Теперь это был его шанс. Петров рывком развернул самолет и нажал на газ.\n\nОн сократил расстояние, 7 секунд до цели пролетели в мгновение ока. В следующую секунду он должен был войти в историю авиации. Словно по памяти, он выстроил свой самолет, прицелился и выстрелил.\n\nВ течение двух секунд длинная очередь из автопушки превратила гладкое и дорогое дитя военно-промышленного комплекса Америки в крутящийся шар из огня и искореженного металла.\n\nПетров отпустил курок и сделал быстрый, но глубокий вдох. Страх исчез, а гордость раздулась до невероятных размеров, пока продолжалось сражение. Он улыбнулся и, усмехаясь, связался с товарищами по рации."
 russia.783.a: ""Минус один! Херня ваше пятое поколение!""
 russia.784.t: "Молись Богу - от Него Победа"
 russia.784.d: "Как говорил Александр Васильевич Суворов: "Чудо-богатыри, покой, опора, слава Отечества - с нами Бог. Молись Богу, от Него победа.Молись Богу, от Него победа. Бог - наш генерал. Он ведёт нас!"\n\nПресвятая Богородица, спаси нас. Святителю отче Николае, моли Бога о нас. Без сей молитвы оружья не обнажай, ружья не зарежай, ничего не начинай. Всякое дело начинать с благословением Божиим.\nДо издыхания будь верен Государю и Отечеству. Избегать роскоши, праздности и корыстолюбия, искать славу через истину и добродетель. Дух укрепляй в вере отеческой, православной. Безверное войско учить - что перегорелое железо точить. Что дерево без корня, то - почитание ко власти земной без почитания ко власти Божией. Воздай честь Небу, а потом земле.\n\nГосподи, помилуй, мы же русские!\nДавайте восстановим веру в Милосердного Бога, как прежде."
 russia.784.a: "Боже, храни Россию!"
 russia.785.t: "Российское Государство Новой Эпохи"
 russia.785.d: "Россия с гордостью провела торжественную конференцию, на которой было объявлено о скором завершении реализации долгосрочных целей экономического и социального развития страны к 2035 году. Мероприятие, на котором присутствовали высшие должностные лица и международные делегаты, в том числе и наш лидер [SOV.GetLeader] и тогдашнего генерального секретаря ООН, продемонстрировало замечательный прогресс России. Несмотря на жесткие санкции, множественные кризисы после Европейской войны и, конечно же, смерть Великого Лидера Владимира Жириновского, Россия продолжила расти и развиваться. Так много было сделано за последние годы.\n\nЭта серия успехов создает основу для следующего этапа развития России. С амбициями стать гегемоном во всей Европе, лидером в военной и гражданской промышленности и настоящей страной для людей, страна находится на пути к реализации своего видения - стать мировым лидером к 2046 году, к 100-летию рождения Владимира Вольфовича Жириновского."
 russia.785.a: "Великие мечты могут быть реализованы только благодаря огромным усилиям."
 russia.786.t: "Эра Юнемана"
 russia.786.d: "Россия открывает новую главу своей истории вместе с новым лидером - Романом Александровичем Юнеманом. Его правление станет временем не просто реформ, а реальных перемен, которые сделают страну сильнее и улучшат жизнь простых людей. Экономические преобразования, развитие культуры и науки - все это сделает Россию сильной и процветающей. \nЮнеман - не просто политик, а человек, способный сплотить народ и задать верный курс. Под его руководством Россия направится вперед, укрепляя свои позиции на мировой арене. \nКак когда-то Петр Великий стремился модернизировать страну, так и Юнеман нацелен на то, чтобы Россия уверенно шагнула в будущее. Но его цель - не просто следовать чужим примерам, а создать свой путь, который обеспечит стране процветание и стабильность. \nПеред Россией открываются новые возможности, и весь мир вскоре увидит её успех. Настало время гордиться страной и теми, кто ведет её вперед!"
 russia.786.a: "Это мой лидер! Это наш лидер!"
 russia.787.t: "Старая Добрая Россия"
 russia.787.d: "Великая победа над западными глобалистами принесла России мир и стабильность, но на горизонте замаячила тень новой угрозы. Необольшевизм поднимает голову в Европе, представляя опасность для традиционных ценностей и суверенитета России. Это требует бдительности и решительных действий.\n\nНо народ, вдохновленный мудрым правлением нашего великого царя, [SOV.GetLeader], полон решимости ответить на новые вызовы. Моральный подъем народа, произошедший после восстановления монархии, устремляет русских людей в будущее, сокрушая на своем пути все невзгоды и угрозы.\n\nРоссия, возрожденная после многих десятилетий большевизма, стоит на страже своих интересов, готовая защитить свои достижения и будущее. Предатели прошлого забыты, их наследие уничтожено и больше никогда не обольстит умы нашего народа. Все противники нашей России будут уничтожены так же, как была уничтожена вся грязь, оставленная большевиками.\n\nЭто Россия, которую мы вернули, и она сильнее, чем когда-либо прежде!"
 russia.787.a: "Хруст французской булки еще никогда не был таким громким! Мы не боимся трудностей."
 russia.788.t: "Очередная Смута"
 russia.788.d: "В прошлом Садовое кольцо в Москве представляло собой сплошное море транспорта. Сегодня даже в ночное время улицы продолжают шуметь. Но это не рев моторов - это звуки протестов, переворачивающих машины, бросающих бутылки с зажигательной смесью, разбивающих окна и скандирующих антиправительственные лозунги. Оранжевое зарево пожаров теперь почти затмевает неоновые огни города.\n\nВ самом центре Москвы, внутри Большого Кремлевского дворца, находится кабинет, отделанный ореховым деревом. Генерал Шойгу, второй помощник Медведева в правительстве, откинул шторы и с тревогой посмотрел на далекие языки пламени. "Что же нам теперь делать?" - пробормотал он.\n\n „Очевидно, вам нужно вернуть нашего президента", - раздался голос за его спиной.\nШойгу повернулся и увидел Белоусова, спокойно сидящего на диване в углу. Несмотря на его спокойный вид, указательный палец левой руки Белоусова нервно постукивал по журнальному столику.\n\n "Я даже не знаю, жив ли еще наш президент", - ответил Шойгу, его голос был тяжелым от отчаяния. Он вернулся к своему столу. "Я посылал людей в его квартиру, на обе его частные виллы и даже в его клуб. Он исчез, как Сталин в 1941 году.\n "Разница лишь в том, что Сталин в конце концов победил", - мрачно заметил Белоусов. "В этот раз он потерпел поражение"\n\nМрачный юмор не ослабил напряжения. Белоусов покачал головой и тихо вышел из комнаты. Когда в кабинете воцарилась тишина, Шойгу поднял со стола медаль "Герой России". Он внимательно осмотрел ее, затем крепко сжал в руке и пробормотал:"
 russia.788.a: ""Неужели мы будем просто ждать смерти?""
 russia.789.t: "Воссоздание Табели о Рангах"
 russia.789.d: "Государь Император, стремясь к укреплению возрожденной Российской Империи и созданию справедливой системы служения Отечеству, повелел восстановить исторически заслуженную Табель о Рангах.\n\nЭта старинная таблица, обновлённая в соответствии с нуждами современности, открывает перед всеми верноподданными, вне зависимости от происхождения, путь к служению и продвижению по службе.\n\nНовая Табель о Рангах, основанная на заслугах и способностях, а не на происхождении,  обеспечивает прозрачную иерархию, стимулируя профессиональный рост и предоставляя возможности для карьерного развития в государственном аппарате, армии и других сферах жизни Империи.  Каждый гражданин, проявивший себя в труде и преданности России, сможет добиться высоких чинов и почестей,  создавая процветающую и сильную Империю.\n\nДа здравствует Царь! Да здравствует Россия!"
 russia.789.a: "Ух ты! Теперь я могу стать дворянином!"
 russia.790.t: "Шедевр Новогодней Рекламы"
 russia.790.d: "В преддверии Нового года, перед традиционным обращением лидера России, теперь Его Императорского Величества, телеканалы страны показали рекламный ролик ВТБ.  Необычная анимация, изображающая видных русских деятелей литературы, таких как Александр Пушкин, Федор Достоевский, Лев Толстой, а также великих Российских Императоров, среди которых Николай II, Александр II и Петр Великий, вызвала невероятный общественный резонанс.\n\nИсторические личности проехали на санях по русской деревне, сыграли в снежки, катались на санках с горки, а в конце вместе со всеми жителями деревни встретили новый год, смотря на праздничную елку и яркие фейерверки. Весь видеоряд сопровождался увертюрой "Руслан и Людмила" Михаила Глинки, а диктор зачитывал патриотическое стихотворение Пушкина "Клеветникам России", которое придало ролику посыл о том, что  враги должны бояться Россию, а в случае войны мы за себя сможем постоять!\n\nРолик стал вирусным, вдохновив множество граждан и студий на создание собственных анимационных работ, посвящённых деятелям царской эпохи. Положительные отзывы и рост патриотических настроений значительно укрепили поддержку и популярность монархии.\n\nВ свою очередь представители банка ВТБ объявили о значительном увеличении прибыли и запустили новую благотворительную программу, направленную на поддержку молодых аниматоров."
 russia.790.a: "Богата талантами Русская земля!"
 russia.791.t: "Сон Царя"
 russia.791.d: "Над имперской Москвой взошла луна. Спят чиновники, спят офисные клерки, спят рабочие. Уснул в своих покоях и [SOV.GetLeader] после тяжёлого рабочего дня. Совещания, приёмы, бумаги - кажущийся бесконечным круговорот наконец закончился.\n\nЦарь Всероссийский обнаружил себя в прекрасном летнем парке, сидящим в беседке на берегу озера. Был прекрасный солнечный день, и ощущалось так спокойно и хорошо, как бывает только во снах. С воды дул спокойный, освежающий ветерок.\nВдруг, [SOV.GetLeader] услышал шаги позади себя. Кто-то зашёл в беседку.\n- "Позволите?" - мужской голос прозвучал позади Царя. Он обернулся.\n\nПеред его глазами предстал Он. Божиею милостию Николай Второй, Император и Самодержец Всероссийский. Тот, кого считали последним государем в российской истории. Тот, кого предатели русского народа называли "Царём-Тряпкой", "Николаем Кровавым". Николай был одет в свою военную форму, в которой выезжал в армию во время Великой войны. [SOV.GetLeader] ответил с исступлением:\n- "Конечно, присаживайтесь."\n\nПосидев в тишине и понаслаждавшись восхитительным видом на водную гладь, предок спросил потомка:\n- "Как там моя Россия?\n- "Мы отомстили за вас. Теперь Русь могущественна и велика как никогда прежде.Мы победили врагов внешних и врагов внутренних, и восстановили Самодержавие."\n"Ну, слава тебе Господи." - ответил Николай. - "Научились на моих ошибках. Я рад, что моё царствование было не зря. Я буду молиться и надеяться на счастье Империи и ваш успех. Правьте жёстко, но справедливо. Слава России!""
 russia.791.a: "Он проснулся с улыбкой на лице."
 russia.792.t: "Сон Царя"
 russia.792.d: "Над имперской Москвой взошла луна. Спят чиновники, спят офисные клерки, спят рабочие. Уснул в своих покоях и [SOV.GetLeader] после тяжёлого рабочего дня. Совещания, приёмы, бумаги - кажущийся бесконечным круговорот наконец закончился.\n\nЦарь Всероссийский обнаружил себя в прекрасном летнем парке, сидящим в беседке на берегу озера. Был прекрасный солнечный день, и ощущалось так спокойно и хорошо, как бывает только во снах. С воды дул спокойный, освежающий ветерок.\nВдруг, [SOV.GetLeader] услышал шаги позади себя. Кто-то зашёл в беседку.\n- "Позволите?" - мужской голос прозвучал позади Царя. Он обернулся.\n\nПеред его глазами предстал Он. Божиею милостию Николай Второй, Император и Самодержец Всероссийский. Тот, кого считали последним государем в российской истории. Тот, кого предатели русского народа называли "Царём-Тряпкой", "Николаем Кровавым". Николай был одет в свою военную форму, в которой выезжал в армию во время Великой войны. [SOV.GetLeader] ответил с исступлением:\n- "Конечно, присаживайтесь."\n\nПосидев в тишине и понаслаждавшись восхитительным видом на водную гладь, предок спросил потомка:\n- "Как там моя Россия?\n- "Мы отомстили за вас. Теперь Русь могущественна и велика как никогда прежде. Мы победили врагов внешних и врагов внутренних, и восстановили Манифест."\nНиколай глубоко вздохнул.\n"Я надеюсь, что вы смогли извлечь уроки из моей жизни. Не забывайте: именно Дума и вольнодумство довело Русь до того плачевного состояния, в котором я её покинул. Я буду молиться и надеяться на счастье Империи и ваш успех. Будьте справедливы и осторожны. Слава России!""
 russia.792.a: "Он проснулся с глубоко задумчивым лицом."
 russia.793.t: "Призрак Тайги"
 russia.793.d: "Тайга всегда была для существом загадочным, которое живет по своим особенным законам. Есть множество примет, которые с большой вероятностью  могут подсказать, будет ли тайга весь день пребывать в молчаливом спокойствии, или начнет о чем-то  беспокоиться, роптать, а то и придет в негодование.\n\nНо вот уже несколько дней вся тайга гневается. Поднимаются настоящие бури и снежные метели, в лесу видимости почти никакой. Ни один метеоролог не может объяснить происходящее, все метеооборудование прямо сходит с ума при попытке проверить в чем же дело.\n\nИ лишь в отдаленной сибирской деревне живет один старик, который знает в чем дело. Дело в Романовых. Они вернулись. А значит пора вернуться и ему. "
 russia.793.a: "Погодите... ОН... ЖИВОЙ?"
 russia.794.t: "После Рубикона"
 russia.794.d: "Генерал Виктор Золотов, наместник Новороссии и Малороссии, главнокомандующий войсками Имперской гвардии, возглавивший Россию после военного переворота, сумел смести всех предателей, которые вылезли на поверхность после смерти Владимира Вольвофича.\n\nБыл нанесен сильный удар по силам сепаратистов на Кавказе, в Туркестане и Восточной Европе.  Его жёсткая рука, подкреплённая верностью армии и силовых структур, позволила частично стабилизировать ситуацию в стране.  Экономика, хотя и по-прежнему страдает от последствий Европейской войны и следующей за ней нестабильности, демонстрирует признаки восстановления.\n\nБыли проведены некоторые реформы, направленные на укрепление центральной власти и подавление оппозиции. Однако, тень нестабильности всё ещё висит над страной.  Административный аппарат ослаблен, коррупция процветает, а недовольство населения, хотя и приглушённое, всё ещё ощутимо.\n\nЗолотову предстоит решить множество сложных задач:  укрепить экономику, восстановить доверие населения, провести необходимые реформы без ущерба для стабильности, и, что самое главное,  предотвратить новые попытки дестабилизации страны. Он очень постарается для многократного увеличения величия России.\n\nЕго правление - это хрупкое балансирование на грани хаоса. Будущее России зависит от того, сможет ли он удержать страну от распада. Выберет ли он жесткие военные методы, или же попытается править более мягкой рукой? Все будет решено очень скоро."
 russia.794.a: "Что же дальше?"
 russia.795.t: "Коронация"
 russia.795.d: "Все утро Москва хранила молчание. Улицы оставались пустыми, предприятия - закрытыми, а грандиозные общественные мероприятия, которые люди планировали на этот день, были отменены. Никакой трагедии или кризиса не было, чтобы очистить бульвары, скорее, в город пришло знаменательное событие. У России должен был появиться новый царь, и весь город замер в радостном ожидании. У Успенского собора Московского Кремля под звон церковных колоколов собралась огромная толпа горожан.\n\nВнутри церкви разыгрывалась сцена из самой чудесной сказки. Золотые иконы украшали каждый квадратный миллиметр стен, а люстры и подставки для свечей были сделаны из серебра и платины, отчего внутри было светло, как в летний полдень. Бесчисленные сановники, от высокопоставленных политиков до иностранных чиновников, собрались внутри храма и наблюдали, как Патриарх Московский и всея Руси выходит из него. Все затихли, когда началась процессия.\n\nПатриарх в сопровождении группы дьяконов прочитал божественную литургию и молитвы. Затем представители церкви поприветствовали всех уважаемых гостей из русского и иностранного общества и повернулись к передней части церкви, где на своих тронах восседали царь и его императрица.\n\nПатриарх подошел к будущему царю и возложил корону на его голову, после чего он поднялся и возложил другую корону на свою жену. Они оба встали, обратившись лицом к толпе, и патриарх вошел в историю, объявив всех присутствующих новой царской властью России.\n\nВся толпа высокопоставленных лиц захлопала в унисон, когда церковный хор начал петь "Боже, царя храни". Развернулся невиданный почти за столетие юбилей.\n\nЗатем по всей Москве зазвонили церковные колокола, поскольку Россия официально обрела первого государя с 1917 года."
 russia.795.a: "Начало новой эры."
 russia.796.t: "Воскрешение"
 russia.796.d: "Алексей Родионов не мог налюбоваться видом из окна своей резиденции в центре Москвы. Это был роскошный номер в комплексе, расположенном в непосредственной близости от Московского Кремля и всех остальных достопримечательностей, которые хотели увидеть туристы со всего мира. У восходящей звезды ЛДПР в Московской городской думе были свои плюсы, и именно их он начал всерьез ценить. Но когда он смотрел на город, держа в руке бокал с хорошим напитком, он начал думать о другом, вспоминать с удовольствием.\n\n Он думал об этом городе, о партии, о стране в целом. За последние пару лет произошло так много неприятных событий. Выборы, война, политическая борьба, титанические реформы, над которыми его партия работала день и ночь. Москва была визитной карточкой их работы, и воспоминания о том, что было сделано, доставляли ему сильное удовлетворение.\n\nГород был очищен от физического и идеологического мусора, оставленного предыдущими политиками истеблишмента и СССР. Больше вы не увидите язвы в виде серпа и молота или памятников Ленину. Больше вы не увидите мемориальных досок, названий улиц или произведений искусства интернационалистов, которые так ненавидели Россию. Теперь России вернули былую гордость, возможно, даже воскресили, и вы могли видеть это повсюду.\n\nВ Большом театре сейчас шел расширенный показ одной из пьес Антона Чехова. В Третьяковской галерее проходила сезонная выставка работ Ильи Репина. Все красные звезды на верхушках всех зданий были заменены на российского орла. Город, готовясь к праздникам, украшал улицы орнаментами, популярными еще в 1890-е годы. Среди богатой светской публики даже наблюдалось явное возрождение моды начала 1900-х годов. Он мог бы продолжать и продолжать, но одно было совершенно ясно.\n\nВсе это было так великолепно.\n\nОн сделал еще один глоток, улыбнулся и пробормотал про себя."
 russia.796.a: ""С возвращением, матушка Россия.""
 russia.797.t: "Новая Россия - Новая Партия"
 russia.797.d: "С уходом Жириновского ЛДПР стремительно теряет популярность. Мы должны предложить нашему народу что-то новое. Поскольку Владимира Вольфовича больше нет с нами, наша партия должна стать по-настоящему русской.\n\nНам также нужно выбрать нашу новую официальную идеологию. Мы все националисты, но наш нынешний подход слишком упрощённый и поверхностный. Мы должны глубже погрузиться в идеологическую сферу. Люди должны искренне верить в нашу новую систему и нашу новую партию.\n\nРусоцентризм - это умеренная идея, которая набирает популярность в наших рядах. Мы видим Россию в качестве центра мировой арены, а наша культура более развита по сравнению с европейской, особенно с учётом её упадка в последние десятилетия. Мы сосредоточены на России и её развитии, что является нашим главным приоритетом. Благодаря такому современному подходу мы можем даже привлечь на свою сторону некоторых умеренных.\nНационал-республиканизм - это идеология, которая может не понравиться нашим более монархическим фракциям. Однако это может дать представление о будущем России. В конце концов, Жириновский фактически возглавлял республику, а не монархию.\nПриняв более гражданскую точку зрения на национализм, мы можем привлечь больше поддержки от нерусских народов, сохранив при этом ультрапатриотический тон нашего движения. Это современный подход к национализму в наше время.\nНаконец, мы можем принять теорию интегралистского единства. Партия станет неотъемлемой частью России. Это наиболее близкое к партийно-государственному решению, и, несмотря на значительное сопротивление внутри партии, оно создаст единое общество с единой целью - улучшить положение российской нации. Это также может помочь нам вернуть культ личности, потому что россияне ценят сильного лидера."
 russia.797.a: "Русоцентристская политика!"
 russia.797.b: "Национал-республиканизм - это путь вперед!"
 russia.797.c: "Партия - единый организм страны!"
 russia.798.t: "Ветераны ЛДПР Выбирают Власовских Ястребов"
 russia.798.d: "После нескольких недель стабильности, последовавших за кончиной нашего великого лидера, старая гвардия, также известная как ветераны партии, которые остались верны линии партии и делу Жириновского, решила поддержать Власова и его сторонников. Это крыло смогло убедить их занять более жесткую позицию.\n\nЭто фактически положило конец существованию ветеранской подгруппы в ЛДПР. Большинство ее членов либо подадут в отставку в знак протеста против этого решения, либо вступят в ряды сторонников Власова."
 russia.798.a: "Они сделали правильный выбор."
 russia.799.t: "Ветераны ЛДПР Выбирают Реформистское Крыло"
 russia.799.d: "После нескольких недель стабильности, последовавших за кончиной нашего великого лидера, старая гвардия, также известная как ветераны партии, которые остались верны линии партии и делу Жириновского, решила поддержать реформистское крыло. Это крыло смогло убедить их принять программу реформ.\n\nЭто фактически положило конец существованию ветеранской подгруппы в ЛДПР. Большинство ее членов либо подадут в отставку в знак протеста против этого решения, либо присоединятся к рядам сторонников Слуцкого."
 russia.799.a: "Они сделали правильный выбор."
 russia.800.t: "Рост Антигосударственной Активности"
 russia.800.d: "После кончины нашего великого лидера Владимира Жириновского было лишь вопросом времени, когда те, кто раньше боялся нас, крыс и червей, почувствуют слабость нашей новой администрации. Они больше не испытывают того страха, который испытывали раньше.\n\nВозрожденные восстанием радикальных левых в охваченной кризисом и потерпевшей поражение Европе, они чувствуют уверенность в том, что могут попробовать что-то на нашей святой родине.\nУже сейчас формируются небольшие группы, и замечены их акты мелкого хулиганства. Поступают сообщения о листовках, плакатах и недовольстве среди работников имперских монополий из-за "несправедливой оплаты".\n\nВ Екатеринбурге памятник Владимиру Вольфовичу подвергся вандализму, на его портрете было написано слово "Мясник".\n\nНесмотря на то, что эти действия незначительны, на нашей земле они могут перерасти в онкологическое заболевание. Национальной гвардии и Охане было дано указание отнестись к этому вопросу очень серьезно."
 russia.800.d2: "Товарищ Председатель, наши агенты на местах предупреждают нас о росте антисоветской и антигосударственной активности.\n\nМы ожидали сопротивления восстановлению советской системы, но сочетание этого сопротивления с отсутствием народной поддержки среди низших классов, которое является наследием предыдущего режима, может нанести нашей стране непоправимый ущерб.\n\nМногие радикальные националисты, которые отказываются признавать наше правление и которых поддерживали при режиме Жириновского, начали активно протестовать против нашего правительства. Формируются небольшие группы, и мы наблюдаем некоторые проявления хулиганства. Мы также сообщаем о листовках, плакатах и недовольстве среди городских и сельских жителей по поводу "нечестивого советского тоталитаризма".\n\nНекоторые люди даже заходят так далеко, что утверждают, будто Россия тайно оккупирована западными марксистами!\n\nХотя эти действия незначительны, они могут перерасти в раковую опухоль на нашей земле. Народной дружине и службам безопасности необходимо отнестись к этому вопросу очень серьёзно."
 russia.800.a: "Мы должны быть бдительны."
 russia.801.t: "Революция Явлинского"
 russia.801.d: "Это был лишь вопрос времени, когда общенациональные восстания и демонстрации превзойдут по численности полицейские силы и свергнут режим ЛДНР.\n\nЭтим утром Москва была охвачена гневом по отношению к правительству ЛДНР. Протесты быстро охватили полицию, и многие офицеры, не подчинившись приказу, присоединились к повстанцам.\nДаже объявление военного положения не помогло. Солдаты, как и в 1991 году, отказались подчиняться приказам. Некоторые пассивно наблюдали за тем, как протестующие занимали всё больше и больше правительственных зданий, в конце концов добравшись до Кремля, в то время как другие помогали прорвать оборону и разгромить последние оставшиеся подразделения Национальной гвардии, верные правительству.\n\nКто стоял за этим? Старый Григорий Явлинский, один из немногих либералов, которым позволяли существовать при Жириновском из-за их лояльности и пассивности. Но теперь они поняли, что ошибались, когда его партия и он сам объявили о начале демократизации России. Явлинский стал временным президентом новой России. Он унаследовал израненную и ослабленную страну, охваченную кризисом и радикальными протестами."
 russia.801.a: "За свободную Россию!"
 russia.802.t: "Yavlinsky's Farewell"
 russia.802.d: ""Дорогие граждане России, Сегодня я последний раз обращаюсь к вам как президент России.\n\nЯ принял решение.\nДолго и мучительно над ним размышлял.\n\nЯ много раз слышал: "Явлинский любыми путями будет держаться за власть, он никому ее не отдаст". Это - вранье.\nДело в другом. Я всегда говорил, что не отступлю от Демократии ни на шаг. Мы создаем важнейший прецедент цивилизованной добровольной передачи власти, власти от одного президента России другому, вновь избранному.\nИ все же я принял другое решение. Я ухожу. Ухожу раньше положенного срока. Я понял, что мне необходимо это сделать. Россия должна начать свой новый путь с новыми политиками, с новыми лицами, с новыми, умными, сильными, энергичными людьми.\n\nА мы - те, кто стоял у истоков борьбы за демократию уже многие годы, мы должны уйти.\n\nПосмотрев, с какой надеждой и верой люди проголосовали на выборах в Думу за новое поколение политиков, я понял: главное дело своей жизни я сделал. Россия уже никогда не вернется в прошлое. Россия всегда теперь будет двигаться только вперед....\n\nВ соответствии с Конституцией, уходя в отставку, я подписал указ о возложении обязанностей президента России на великого демократического лидера Алексея Анатольевича Навального...""
 russia.802.a: ""...Прощаясь, я хочу сказать каждому из вас: будьте счастливы.""
 russia.803.t: ""Яблоку" Не Удается Набрать Большинство Голосов"
 russia.803.d: "После спорных выборов во временную Думу президентская партия "Яблоко" не смогла набрать большинство голосов. Несмотря на то, что они сделали акцент на стратегии "Народного фронта" и включили в него небольшие демократические партии, они не смогли заручиться достаточной поддержкой.\n\nОднако "Россия будущего", партия Алексея Навального, второго по популярности лидера, сумела завоевать достаточно доверия избирателей и общественного мнения, чтобы получить достаточное количество мест в парламенте.\n\nПервое заседание Думы сразу же началось с попытки Навального стать председателем. Несмотря на сопротивление "Яблока" и их союзников, в итоге, после возможных тайных сделок с небольшими партиями и большинством голосов "России будущего", Алексей Навальный был объявлен председателем Думы."
 russia.803.a: ""Яблоко" испоречно."
 russia.804.t: "Переворот Суровикина"
 russia.804.d: "Это был лишь вопрос времени, когда гнев военных и демонстрации перевесили бы лоялистов и свергли режим ЛДНР.\n\nЭтим утром Москва была охвачена серьёзными беспорядками, когда российские военные подразделения с силой прорывались через баррикады полиции и Национальной гвардии. Граждане быстро разбегались, чтобы не попасть под шальные пули.\nК концу дня все возможные очаги сопротивления были подавлены повстанцами, и последняя оставшаяся крупная цель - Кремль - вскоре была окружена восставшими. Остальных членов правительства ЛДНР нигде не было видно; некоторые говорят, что они сбежали на Шри-Ланку.\n\nПосле всего этого хаоса в Москве по всей России впервые после переворота в эфире появилось "официальное" телевидение.\nСергей Суровикин, который когда-то был простым генералом ВВС, объявил себя временным лидером нового военного правительства. Он публично осудил предательский мирный договор, подписанный предыдущим правительством, которое он назвал предателями родины. Он унаследовал израненную и ослабленную страну, охваченную кризисом и радикальными протестами."
 russia.804.a: "Восстановим силу России!"
 russia.805.t: "Выбор Народной Корпорации"
 russia.805.d: "Народные корпорации - это выдающиеся предприятия, которые играют важнейшую роль в нашем социалистическом государстве. С приходом Грудинина к власти мы будем уделять больше внимания защите и расширению их вклада.\nВ ближайшие шесть месяцев мы определим три крупнейшие корпорации, которые помогут нам улучшить наши экономические и социальные показатели.\nОдной из таких корпораций это "Союз-Нефть" - ресурсная компания, которая может помочь в расширении наших промышленных и добывающих предприятий в Сибири и на Дальнем Востоке.\n\nДругой корпорацией является "Совгаз" - многопрофильная промышленная компания, которая может модернизировать и улучшить заводы по всему Советскому Союзу, при условии, конечно, что они получат достаточные государственные субсидии.\n\nТретья корпорация - "Совхозник" - медиа и бизнес-группа, основанная самим Грудининым. Она очень популярна среди молодёжи, потому что специализируется на инновациях и медиа-технологиях. Это может помочь нам донести идеи партии до населения и рабочего класса."
 russia.805.a: "Союз-Нефть."
 russia.805.b: "СовГаз."
 russia.805.c: "Совхозник."
 russia.806.t: "Формирование ЧВК "Ленинская Гвардия""
 russia.806.d: "Нам сообщили об успешном создании первой советской частной военной компании - "Ленинская гвардия".\n\nКомпания в основном состоит из бывших вагнеровских и советских солдат, участвовавших в Европейской войне. Некоторые из них даже являются бывшими сотрудниками КГБ.\n\nВ настоящее время компания принимает контракты от дружественных Советскому Союзу стран по всему миру на охрану высокопоставленных чиновников и оказание помощи в военных конфликтах.\n\nКлючевая особенность этой организации заключается в том, что каждый солдат должен поклясться поддерживать ленинское видение Советского Союза и правление партии. Это означает, что ЧВК, по крайней мере, на словах поддерживает наше государство."
 russia.806.a: "Истинные патриоты Советского Союза!"
 russia.807.t: "Формирование ЧВК "Аргентум""
 russia.807.d: "Нам сообщили об успешном создании первой советской частной военной компании "Аргентум".\n\nКомпания в основном состоит из бывших бойцов Вагнера и советских солдат, участвовавших в Европейской войне. Некоторые из них даже являются бывшими сотрудниками КГБ.\n\nВ настоящее время компания принимает контракты от дружественных Советскому Союзу стран по всему миру на охрану высокопоставленных чиновников и оказание помощи в военных конфликтах.\n\nЭто учреждение полностью аполитично и принимает солдат из разных слоёв общества. Они сосредоточены исключительно на защите родины, без какой-либо политической принадлежности."
 russia.807.a: "Истинные патриоты своей Родины!"
 russia.808.t: "Гойда В Массы"
 russia.808.d: ""Существует такое древнерусское междометье ГОЙДА, означающее призыв к немедленному действию."\nПосле того, как наш Святейший Хранитель Иван Охлобыстин использовал эту фразу в своей недавней речи на Красной площади. Эта фраза быстро стала популярной в России, особенно среди силовиков и военных.\n\nПо всей России верные граждане нашего Священного Союза теперь провозглашают ГОЙДА боевым кличем русского народа, который находится в процессе воплощения этой идеи в жизнь. Они используют эту фразу в речах, на публичных собраниях и даже в приветствиях своим соотечественникам.\n\nНекоторые либеральные подонки, конечно, пытаются приравнять это к "Sieg heil", но их претензии беспочвенны и мелочны.\n\nВ этом есть даже что-то забавное. Многие люди сделали пародии на речь Охлобыстина, особенно на ту часть, где он провозглашает боевой клич."
 russia.808.a: "С ГОЙДОЙ в сердце..."
 russia.809.t: "Боевой Клич"
 russia.809.d: "Вскоре после того, как Охлобыстин стал Верховным правителем, он всё больше радикализировался под влиянием жёстких священников в своём кабинете, который почти полностью состоит из представителей Русской православной церкви.\n\nНа Кремлёвской площади был организован большой митинг, на котором тысячи верных патриотов и христиан размахивали флагами нашей великой истории, слушали речи и музыку, прославляющие наших великих предков.\n\nКульминацией мероприятия, конечно же, стало выступление самого Святого Хранителя.Речь началась решительно, с осуждения прогнившего Запада и его сатанинских правителей. Затем он обратил внимание на "нелояльные" элиты внутри России, на тех, кто втайне желает ей зла. Толпа была в восторге. Иван Охлобыстин - очень профессиональный оратор, возможно, благодаря своей карьере киноактёра. Но более того, он искренне предан своему видению. Сочетание этих двух качеств сделало его величайшим оратором всех времён, возможно, даже более великим, чем Жириновский.\n\nВ кульминационный момент своей речи Охлобыстин заявил о необходимости священной войны не только против внешних врагов, но и против внутренних.\n\n"Священная война! Потому что у мусульман существует понятие Джихада. Это не только смертельная битва на поле боя с врагом. Это, прежде всего, борьба со своими грехами внутри своего сердца! И наше главное сражение, нашей Священной войны, произойдёт в наших душах! И если мы его выиграем, мы выиграем все остальные сражения!\nСуществует такое древнерусское междометье гойда, означающее призыв к немедленному действию. Как же нам не хватает сейчас таких боевых кличей! Гойда, братья и сёстры, Гойда!\nБойся, старый мир! Лишённый истинной красоты, истинной веры и истинной мудрости, управляемый безумцами, извращенцами, сатанистами. Бойся, мы идём! Гойда!""
 russia.809.a: "ГОЙДА!"
 russia.810.t: "Новая Партия Союза"
 russia.810.d: "Теперь, когда мы ликвидировали партократическую систему, мы должны создать новую политическую силу, чтобы обеспечить стабильность государственной власти.\n\nУ нас есть несколько вариантов структуры этой новой политической партии. Ключевыми принципами нашей партии будут суверенитет СССР, благополучие народа и, конечно же, приверженность новокоммунистической теории Пасечника.\n\nМногие прагматики готовы к тому, что президент прикажет реформировать партию. Некоторые бывшие чиновники путинской эпохи тоже решили присоединиться к нам.\n\nОднако влияние коммунистических догматов всё ещё сильно, поэтому мы должны быть готовы к сопротивлению нашим изменениям."
 russia.810.a: "Единство превыше всего."
 russia.810.b: "Мы должны бороться с догматиками, мы - коммунисты будущего."
 russia.810.c: "Реформы для народа, ради народа."
 russia.811.t: "Антисоветчики Организируется!"
 russia.811.d: "В последние несколько недель мы получили от наших шпионов информацию о том, что группа радикально настроенных членов ЛДПР сформировалась для активного сопротивления нашему режиму. Они называют себя "Гвардией Жириновского" и в просочившемся в сеть манифесте утверждают, что хотят вернуть Россию на путь, который Жириновский видел для страны.\n\nИх методы жестоки и радикальны: они нападают на милицию, правительственные здания и даже пытаются убить наших министров и лоялистов!\n\nМногие неорганизованные антисоветчики примкнули к их движению, несмотря на то, что не разделяют многих их идей. Это явный признак союза реакционеров против трудящихся, где идеологические разногласия забыты."
 russia.811.a: "Мы сокрушим их..."
 russia.812.t: "Утро Добрым не Бывает"
 russia.812.d: "Была половина одиннадцатого часа утра. К этому времени все добросовестные граждане России разошлись по своим рабочим местам: продавщицы - в магазины, учителя - в школы, рабочие - на заводы. Но не Лёня.\nЛёня спит: ему никуда не надо. Отучившийся на филолога, он в Новой России оказался никому не нужен, кроме своих любящих родителей. За их счёт Лёня и живёт, попутно скитаясь по имиджбордам ради быстрого дофамина от политических споров.\n\n"СЛАВА РОССИИ! СЛАВА ВЕРХОВНОМУ ЛИДЕРУ!"\n\n"Что это?" - ещё не до конца пробудившись подумал Лёня. Через мгновение, вернувшись из царства Морфея, он вспомнил.\nАгитмашина.\n\nКаждый день, ровно в 10:37 машина агитации начинает своё движение по его улице. Из её репродукторов звучат патриотические лозунги и песни, наподобие "Боже, Царя храни!" и хора "Славься!" Глинки. К 10:42 громкости достаточно, чтобы разбудить даже самого крепко спящего. В надежде на сохранение своего сна, Лёня закрывает свою голову подушкой. Но в 10:45 агитация уже под его окнами.\n\n"МЫ ЖИВЁМ В ЛУЧШЕЙ СTРАНЕ МИРА, А ОСTАЛЬНЫЕ НАМ ПРОСTО ЗАВИДУЮT!"\n\nНаконец, звук отдаляется всё дальше и дальше. Лозунги и музыка умолкала, вычищая воспоминания о сне, и оставляя одну мысль:\n"Заебали."\nПолежав ещё какое-то время, Лёня встаёт и первым же делом заходит на свой любимый сайт в раздел /po/ и начинает писать:"
 russia.812.a: ""Сап, Двач..."" 
 russia.813.t: "Об Убеждениях"
 russia.813.d: "Здравствуйте, многоуважаемые слушатели! Сейчас ровно 14 часов по Омскому времени, а вы всё ещё слушаете Дорожное радио! С вами всё ещё бессменная ведущая Мария Островская. Сегодня с нами в эфире глава молодёжной организации Поколение России Иван Фролишев собственной персоной. Итак, Иван, как известно ваша организация является этаким маяком для молодёжи желающей перемен в обществе. Можете, пожалуйста, рассказать во что вы верите и чего хотите добиться своей деятельностью? В целом о своих убеждениях.\n- Да, Мария, большое спасибо за данный вопрос. Мы, Поколение России, стремимся к тому чтобы голос простого человека был услышан. Потому что, например, в стране существует проблема с недостаточной поддержкой молодых семей, с плохими трудовыми условиям на местах, с коррупцией . Вот, к слову,  в прошлом месяце нам пришлось самим собираться и закупать продукты, памперсы и прочее  для детского дома в Новокузнецке. Всё потому что местные чиновники совершенно забыли про это, как они часто забывают про народ. Вот нам, простым людям, приходится собираться и сообща решать проблемы.\n- Спасибо за данный ответ. Ещё один вопрос. Как вы считаете, может ли то что вы собираете, так сказать, под своим крылом радикальную молодежь привести, к тому что ваша организация или по крайней мере отдельные её члены вступят в прямую конфронтацию с властью?\n- Понимаете, Мария, я бы всеми силами хотел не допустить такого сценария. Да, наша власть не идеальна, далеко не идеальна и мы все понимаем это. Мы на местах видим проколы и неудачные решения. Но нам очень тяжело представить картину в целом. Всё таки управлять страной - это не то же, что заведовать ларьком. Поэтому лично я нашу власть поддерживаю и призываю людей в случае чего брать дело в свои руки, но не рубить с плеча, а понимающе относиться к действиям нашей власти. Поэтому я убежден, что вступать в конфликт с властью - это контрпродуктивное решение.\n- Спасибо  за данный обстоятельный и взвешенный ответ. На этом наше интервью заканчивается. Но Дорожное радио продолжает вещание! Далее у нас в очереди заказов песня "Мы" в исполнении Шамана. Приятного прослушивания!"
 russia.813.a: ""Гордо всё переживёт наш народ...""
 russia.814.t: "Новый Председатель Для Царя"
 russia.814.d: "Старый председатель министерского комитета не соответствует будущему направлению имперской политики. Царь решил воспользоваться новым радикальным движением лоялистов, чтобы обеспечить непоколебимую поддержку царю и Российской империи.\n\nЧтобы добиться этого, царю нужно найти нового общественного деятеля, который будет представлять его новую радикальную политику. Среди новых "чёрных сотен" несколько человек и их организаций стали лидерами. Их политика во многом совпадает, различаясь лишь в некоторых методах и личном опыте. Однако выбор одного из них приведет к маргинализации остальных."
 russia.814.a: "...Курьянович."
 russia.814.b: "...Артёмов."
 russia.814.c: "...Тор."
 russia.815.t: "Падение Кабинета Буркова"
 russia.815.d: "Нестабильное правительство Буркова привело к его падению. Нация, полностью отвергнувшая любые проявления левизны, не приняла странную политику Буркова.\n\nЦарская Дума проголосовала за вотум недоверия, организованный в первую очередь кадетами и их лидером Борисом Титовым. С помощью либералов и многих консерваторов они смогли объявить импичмент Буркову и его кабинету умеренных левых.\nПосле этого в Думе состоялось короткое голосование по избранию нового канцлера."
 russia.815.a: "...Борис Титов Избран Канцлером..."
 russia.816.t: "Возрождение Черносотенства"
 russia.816.d: "С восстановлением верховной власти царя над Россией появление более радикального течения монархистов стало лишь вопросом времени. Многие радикальные националисты старой закалки создали собственную "организацию поддержки царя", но правильнее было бы назвать их возрождением движения "Чёрная сотня" прошлого. У них разные лидеры, и их взгляды на радикализм немного отличаются. Между ними уже возникали личные разногласия. Однако ясно одно: они верны имперскому правительству и готовы при необходимости сражаться с любыми левыми или теми, кого они считают нежелательными.\n\nМы будем внимательно следить за ними. Они могут снова оказаться полезными, как и в прошлом."
 russia.816.a: "Боже, царя храни!"
 russia.817.t: "РОВС Набирает Популярность"
 russia.817.d: "С восстановлением монархии и последующим возвращением Октябрьского манифеста в нашей великой империи возродилась более консервативная форма лоялизма, особенно среди военных.\n\nОдной из таких групп является старая РОВС, которая утверждает, что является прямым преемником одноимённой организации Врангеля. При прежних режимах это была небольшая группа из нескольких военных-монархистов, но теперь она начала набирать популярность среди нынешних офицеров и некоторых низших чинов Императорской армии. В течение многих лет Игорь Иванов был председателем организации. Однако по мере того, как к ней присоединялось всё больше новых членов и влиятельные фигуры набирали силу, его отодвинул в сторону Вадим Красносельский, бывший глава Приднестровья и убеждённый монархист.\n\nРОВС заявляет, что защищает русский народ и естественное правительство России - Царство - от угроз как внутри страны, так и за её пределами. Он продвигает более жёсткие позиции, многие из которых являются откровенно антидемократическими."
 russia.817.a: "Слава России!"
 russia.818.t: "Канцлер Затулин Застрелен!"
 russia.818.d: "Недавно в Санкт-Петербурге произошло событие - открытие памятника Александру II. Император России, его семья и приближённые, включая канцлера Затулина, а также зарубежные гости посетили это торжественное мероприятие.\n\nВ рамках празднования император и его свита посетили городской театр Санкт-Петербурга, где посмотрели спектакль "Сказка о царе Салтане". Однако перед началом представления у начальника охранного отделения города появилась тревожная информация. Тимур Рахметула сообщил, что в город прибыла террористка Анна Фролова, которая планирует совершить нападение на высокопоставленного чиновника, а возможно, и на самого царя.\n\nВо время второго антракта Затулин беседовал у барьера оркестровой ямы с министром транспорта Романом Старовойтом и графом Типисевым, известным городским магнатом. Внезапно к Константину Затулину приблизился Тимур Рахметула и произвёл два выстрела из пистолета Макарова. Первая пуля попала в руку канцлера, а вторая - в живот, задев печень. От мгновенной смерти Затулина спас крест Святого Владимира, который, разбившись, изменил направление пули, предотвратив её попадание в сердце. Однако, несмотря на это, пуля пробила грудную клетку, плевру, грудобрюшную преграду и печень, нанеся серьёзный ущерб.\n\nСтрелка сразу же задержали сотрудники охраны царя. Весь театр был эвакуирован, а Канцлер незамедлительно отправлен в городскую больницу, где над ним работают лучшие хирурги страны.\nВ настоящее время состояние Канцлера крайне тяжёлое, и шансы на его спасение крайне малы..."
 russia.818.a: "Канцлер Затулин, К сожалению, скончался..."
 russia.818.b: "Канцлер Затулин выжил!"
 russia.819.t: "Новый Канцлер"
 russia.819.d: "После ужасного убийства канцлера Затулина мы должны продолжить работу правительства. Теперь царь должен выбрать официального преемника.\nВ партии "Союз 17 октября" есть несколько выдающихся политиков и государственных деятелей. Один из них - Виктор Водолацкий, старый казачий атаман, представляющий более жёсткую сторону партии. Он мог бы стать подходящим кандидатом, если нам нужно сосредоточиться на безопасности и предотвращении будущих террористических актов.\n\nВторой кандидат - Роман Старовойт, нынешний министр транспорта и бывший губернатор Курской области. Он хорошо подходит для более умеренного подхода и обладает опытом преодоления кризисных ситуаций и решения транспортных проблем.\n\nНаконец, есть Дрозденко, губернатор Санкт-Петербурга, который не так известен, но компетентен. Он не является особенно инициативным чиновником, но мог бы стать хорошим кандидатом для стабильного правительства."
 russia.819.a: "Водолацкий..."
 russia.819.b: "Старовойт..."
 russia.819.c: "Дрозденко..."
 russia.819.a1: "Это не должно повториться! России нужен твердый канцлер..."
 russia.820.t: "Буркову Бросили Вызов!"
 russia.820.d: "Число членов партии, недовольных тем, как Александр Бурков руководит партией, растёт. Вероятно, это связано с появлением в партии более радикальной фракции, которая усилилась за счёт объединения с умеренными марксистами и бывшими коммунистами.\nЭтот вопрос встал ребром на внеочередном партийном собрании, где Буркову открыто предложили защищать свою умеренную и центристскую политику. Его критики отметили, что он не желает реформировать демократические институты, чтобы сделать их более похожими на западные модели конституционной монархии.\nРадикальную фракцию возглавляет Михаил Матвеев, бывший член КПРФ, который дистанцировался от большевизма. Он всегда был известен своими некоммунистическими, а иногда и националистическими взглядами.\n\nБурков собирается выйти на сцену, чтобы обсудить дела своего управления..."
 russia.820.a: "Радикалы успешно справляются с Бурковым!"
 russia.820.b: "Бурков побеждает свою оппозицию!"
 russia.821.t: "Новая Идеология Рогозина"
 russia.821.d: "Когда Рогозин стал президентом, он решил создать новую идеологию, которая была бы уникальной для России и служила бы руководящей силой для нашего народа под его руководством. Среди ключевых идей, которые рассматривал наш новый президент, были три основные идеологические конструкции:\n\nРусская революция: политика Рогозина будет включать в себя более прямые революционные шаги.  В конце концов, Рогозин представляет собой новый и более дальновидный подход к русской национальной идентичности по сравнению с любым предыдущим режимом. Наше государство будет двигаться в сторону тоталитаризма и прямого контроля, полностью отказавшись от партийной политики. Все решения будет принимать государственная бюрократия, лояльная только Великому Лидеру и подобранная им лично.\n\nСуверенный социализм - одна из проблем нашего нового режима заключается в очевидной неспособности объединить два разных образа мышления - имперский и советский.\nОднако мы можем преодолеть это, разработав последовательную идеологическую доктрину, которая примирит эти две "враждующие" фракции российской истории.И у царей, и у генеральных секретарей были как правильные, так и неправильные решения. Нет необходимости продолжать раскол. Партия будет реформирована, а фракции объединятся, чтобы сплотить страстных патриотов, которые работают на благо родины.\n\nПоследний вариант немного более нетрадиционный, но и более социалистический, чем предыдущие. Он называется ордосоциализмом, что означает "социализм порядка". Этот подход рассматривает наше новое государство как революционный авангард, подобно тому, как старые большевики представляли себе свое глобальное государство. Мы будем использовать как националистические идеи, так и социалистическую символику, чтобы привлечь к нам различные слои общества.\nОднако такой подход приведет к созданию фракций внутри нашей партии. Эти фракции будут выступать за более "левую" или "правую" политику."
 russia.821.a: "Новая. Русская. Революция."
 russia.821.b: "Социальная Держава."
 russia.821.c: "Новый Порядок России."
 russia.822.t: "Стрелков И Рогозин Обретают Актуальность"
 russia.822.d: "После того как Слуцкий объявил о планах сделать политическую жизнь более открытой и даже намекнул на возможность проведения первых послевоенных выборов после проведения дополнительных реформ, многие националисты, которые не присоединились к ЛДПР при Жириновском, начали возвращаться на передовую российской политики. \nДвумя видными фигурами в этом движении за истинно национальную Россию являются Дмитрий Рогозин и Игорь Гиркин (Стрелков). Оба были исключены из политики ЛДПР из-за многочисленных разногласий с Владимиром Вольфовичем.\n\nРогозин в своём стремлении заручиться поддержкой националистов также в значительной степени опирается на советские образы и прославление советской жизни и опыта. Это было невозможно при Жириновском, но благодаря так называемой "оттепели Слуцкого" он теперь может свободно выражать свои идеи. И, несмотря ни на что, есть люди, которые ценят и прославляют советскую эпоху, даже если они не поддерживают напрямую марксистскую идеологию, и Рогозин - их человек. Он нашёл своё место в партии "Родина", которая, возможно, является проектом Суркова, но всё же ближе всего к личным взглядам Рогозина, особенно после того, как он сместил предыдущего председателя, заручившись поддержкой большего числа членов партии.\n\nСтрелков-Гиркин - настоящая легенда в российском националистическом движении. Он начинал как боец в Приднестровской войне, а затем, по его словам, стал одним из главных командиров в войне на Донбассе. Это заслужило ему уважение многих людей, особенно тех, кто считает себя милитаристами и империалистами. Его сторонники многочисленны и часто верны только ему. Они нападают на любых других лидеров, которых считают недостойными и нелояльными. Он объединил своих сторонников в Клуб разгневанных патриотов, где критиковал каждое решение, принятое Жириновским на поле боя. Теперь это Союз воинствующих патриотов, который стремится установить жёсткую власть как в гражданской, так и особенно в военной жизни."
 russia.822.a: "Это было ожидаемо."
 russia.823.t: "Мильчаков и Его Подручные Основали ОРСН"
 russia.823.d: "Кто такой Мильчаков? Для одних он может быть героем, но для других - военным преступником, массовым убийцей, дьяволом, а по некоторым сведениям, даже каннибалом. Несмотря на все усилия правительства при Жириновском, направленные на то, чтобы предотвратить любую нормализацию или публикацию материалов о Русичах и идеологических концепций, имя Мильчакова стало широко известно, особенно после начала войны в Европе.\nХотя ни Русич, ни Мильчаков лично не участвовали в большинстве сражений в Восточной Европе, их дурная слава последовала за ними.\nТеперь, после войны и "демократических" реформ Слуцкого, эти люди снова поднимают голову. Они видят для себя возможное "политическое будущее" и шанс распространить своё видение нашей страны.\nВот оно! Политический проект Мильчакова, Топаза и Петровского наяву. Они описывают её как место, где сильные русские мужчины могут объединиться, чтобы защищать естественные интересы и самобытность страны: Организация русских социал-националистов. \n\nНесмотря на присущий организации экстремизм, нынешняя политическая атмосфера может дать ей шанс получить некоторое влияние в местных городских советах или даже обеспечить одно или два места на предстоящих выборах в Национальный сенат."
 russia.823.a: "Мда."
 russia.824.t: "Националисты-Ветераны Собираются Вместе"
 russia.824.d: "Недавние реформы привели к появлению более радикальных и националистических, часто монархических, группировок. На старых улицах Санкт-Петербурга и Москвы закоренелые русские националисты объединились, чтобы в очередной раз защитить Россию от того, что они считают ее слабостями, и от большевизма.\n\nОни критикуют Слуцкого, хотя раньше критиковали Жириновского, когда он был жив. Теперь они видят в нем мученика, которого отравили евреи или коммунисты. Детали этих заговоров варьируются в зависимости от личности.\nИх новые лозунги такие же, как и старые. Многие из них уже много лет находятся на политической арене.\n"Кто, если не мы?" - говорят они, а затем читают свои старые забытые молитвы царской семье, империи и Богородице.\n\nОрганизация, которая снова их объединяет, - это старое доброе общество "Память", либо обновлённое, либо созданное заново - неважно, оно здесь, и ему есть что сказать.\n\nНесмотря на присущий организации экстремизм, нынешняя политическая атмосфера может дать ей шанс получить некоторое влияние в местных городских советах или даже обеспечить себе одно или два места на предстоящих выборах в Сенат."
 russia.824.a: "Общество "Память"... Святой наш Отец..."
 russia.825.t: "Новые Русские Красные"
 russia.825.d: "Господа, у меня для вас всех ужасные новости! Природа настолько "очистилась" благодаря Слуцкому что даже на улицах можно увидеть красных!\nДа, я совершенно серьезно! Сегодня один из этих "имперско-красненьких" хотел всучить мне свой памфлет о войне капитала и труда, я конечно же стерпел, я всё таки культурный человек, а то бы как дал в рыло этому краснопузому! Памфлет взял.\nНеужели за это мы боролись, соотечественники?  За то что бы какие это красные которые на словах признают восстановление границы нашей Великой России и вроде как совмещают русские термины со своей социалистической белибердой могли просто так ходить и портить вид наших красивых русских городов, таких как мой Ижевск? \nДоколе мой любимый русский народ! Мои читатели! Я вам скажу, при Жириновском такого бы не было! Всех этих идиотов которые носят красные тряпки вместе с нашим великим имперским триколором, отправили бы на бутырку! И правильно бы сделали, господа!\n\nРоссия это страна - Чайковского, Достоевского, а не Дзержинского или Берии. Ленина выкинули хорошо... Нужно выкопать все эти могильники рядом с Кремлём! Жаль конечно этот ваш Слуцкий, на которого так уповает НАША МОЛОДЕЖЬ теперь этого точно не сделает. Ему эти красненькие важнее, от так и сказал "Национальная Демократия - это в первую очередь демократия". Мат да и только. Ужас.\n\nОтрывок зи личного Онлайн-Журнала под ником - TimurArmatatulin91. Орфография автора сохранена."
 russia.825.a: "Просто ужастно."
 russia.826.t: "Патриотические Игры"
 russia.826.d: "Среди нашей молодёжи компьютерные игры пользуются огромным спросом. Возможно, было бы разумно выделить небольшой бюджет на их разработку? Однако перед этим нам предстоит найти талантливых разработчиков, которые смогут отразить в своих играх настоящие русские традиции и культуру. Я уверен, что в нашей молодёжной организации есть компетентные специалисты, которые могут взяться за эту задачу. Что вы думаете по этому поводу?"
 russia.826.a: "Хмм... Почему бы и нет?"
 russia.826.b: "У Государства есть дела поважнее"
 russia.827.t: "ЗОВ ЛДПР: ПОСЛЕДНЯЯ ВОЙНА"
 russia.827.d: "Ну что ж, наши инвестиции в некотором смысле принесли свои плоды. Молодежные эксперты не стали экспериментировать и обратились к уже известной студии Mehsoft, которая ранее выпустила небольшую игру под названием Call of LDPR.\nТеперь, благодаря финансированию, они смогли создать сиквел этой игры, значительно улучшив игровой процесс.\n\n"CALL OF LDPR: FINAL WAR" - это жестокий шутер, полный насилия и драйва. В этой игре игрок берет на себя роль солдата Элитной Гвардии Жириновского, отправленного в сердце оккупированной неолибералами Европы.\nИгрок проходит множество уровней, каждый из которых наполнен уникальным культурным наследием различных регионов ЕС. На этих уровнях он встречает разнообразных врагов и сталкиваемся с необычными механиками.\nВ конце пути игрок оказывается в Брюсселе, где его ждут кибер-бюрократы и финальный босс - рептилоиды с планеты Нибиру. \n\nНесмотря на то что в нашей стране игра получила много положительных отзывов, во многих странах Евросоюза она была запрещена. Этот продукт предназначен только для внутреннего рынка. Но зато мы смогли завоевать любовь молодых геймеров и заработать немного денег на внутренних продажах."
 russia.827.a: "Это хоть что-то." 
 russia.828.t: "The Czar Is Dead 2"
 russia.828.d: "Наши вложения оказались не очень успешными. Молодёжная организация ЛПДР решила поддержать малоизвестного разработчика "Машина Радость", который был известен лишь своей новеллой "The Czar Is Dead". Возможно, они надеялись, что с помощью финансирования разработчик сможет развить эту идею и глубже показать внутренний мир Царя Всероссийского в игровой форме.\n\nОднако в результате разработчик создал совершенно новую игру - сиквел своей первой, который полностью отличался от неё. Теперь это РПГ-шутер в стиле DOOM, повествующий о борьбе Николая Романова против коммунистов и англосаксонских интервентов. Царю удалось спастись от расстрела, но маленький Цесаревич был похищен злодеями и увезён в неизвестном направлении. Николай лично берёт оружие в руки и отправляется мстить.\n\nИгра имеет очень специфическую графику и ещё более специфический нарратив. Она оказалась слишком нишевой и эзотеричной для большинства игроков, которые во многом всё поняли уже по графике.\n\nВ результате мы не получили ни денег, ни патриотического воспитания. В интернете появились сотни мемов на тему того, "куда начальство тратит деньги"."
 russia.828.a: "Мда."
 russia.829.t: "Страдая от Успеха"
 russia.829.d: "Наша великая победа в Европе и возвращение всех российских территорий принесли огромную радость, но также оказали огромное давление на нашу бюрократию, систему безопасности, армию и систему образования.\n\nНам не только не хватает лояльных и способных сотрудников для заполнения многих государственных должностей на новых территориях, но и после завоевания Центральной Азии и Кавказа усиливается давление. Сейчас это отражается в нашей неспособности в полной мере оценить ситуацию в Прибалтике и Малороссии.\nЭто также привело к феномену "бедных имперских окраин", где многие жители нерусских регионов снизили качество своей жизни и, следовательно, свою способность полноценно участвовать в жизни страны в долгосрочной перспективе.\n\nМногие считают, что это разумная реакция на быстрое возвращение стольких территорий за столь короткое время."
 russia.829.a: "Любишь кататься, люби и саночки возить."
 russia.830.t: "Про-Российские Реакционеры!"
 russia.830.d: "В нашей стране, как и в других странах Европы, где происходили революционные движения, появилась поддерживаемая Россией террористическая организация под названием "Европейский Феникс". При поддержке российской разведки эта организация смогла объединить различные маргинализированные группы в нашем обществе. Некоторые из её членов даже прошли подготовку в России, а затем были отправлены в наши страны.\n\nОни совершают различные террористические атаки в сельской местности и небольших городах, где наш контроль не такой строгий.\nНаши силы безопасности делают всё возможное, чтобы уменьшить и в конечном итоге устранить эту угрозу. Однако тот факт, что штаб-квартира этой организации находится в Москве, значительно усложняет борьбу с ней."
 russia.830.a: "Чёрт!"
 russia.831.t: "Новое Подполье"
 russia.831.d: "Несмотря на наши усилия и жёсткие репрессии, введённые против оппозиционеров перед войной, сейчас мы наблюдаем рост нового демократического движения, которое критикует государство. Эти люди в основном приезжают с территорий, которые мы недавно аннексировали, а не из самой России. Среди них также студенты и молодые люди из наших крупных городов, которые в последние годы стали недовольны.\n\nС ростом антигосударственной активности и террористических актов КНОА мы действительно показали свою слабость. Это привело к тому, что многие апатичные люди или те, кто ранее был неактивен, пробудили в себе дух политической борьбы.\n\nИз-за общей нестабильности нашего нынешнего режима, эти "тайные" общества стали местом, где нелояльные или оппозиционные голоса могут выразить себя. Хотя эти группы гораздо неорганизованнее и менее агрессивны, чем их предыдущие аналоги, они по-прежнему влияют на мышление наших людей в неправильном направлении. Некоторые из них даже совершают мелкие хулиганские действия."
 russia.831.a: "Не спускай с них глаз..."
 russia.832.t: "Запуск"
 russia.832.d: "Десять, девять, восемь, семь..." - обратный отсчёт для Алексея Петровича длился вечность. Он смотрел в бинокль со специально оборудованной площадки за несколько километров от места старта. "Хоть бы взлетел, хоть бы взлетел..." - единственная мысль крутилась в голове Быкова.\n"Хиус" - зонд, который сейчас должен был взлететь в звёздную высь, был делом его жизни. Да, он был ещё молодым - 35 лет для технического руководителя целой АМС это крайне молодой возраст - но Алексей Петрович был опытен и ещё с университетской скамьи грезил о возвращении советской программы исследования Венеры. Главной целью "Хиуса" было обнаружить залежи радиоактивных руд для будущего человечества, когда технологии позволят покорить вторую планету от Солнца.\nЧудом он смог продавить свою идею, не последнюю очередь в этом сыграла и новая власть, объявившая о "разрушительном влиянии капитализма на космическую программу" и начале курса "возвращения лидирующих позиций в космической гонке." И теперь, когда ракета-носитель полетела далеко-далеко, Быкову вспомнились строчки из одной песни:"
 russia.832.a: ""Мы рождены, чтоб сказку сделать былью."" 
 russia.833.t: "После Школы"
 russia.833.d: "- Ну что, сынок, как прошёл твой день? Чем сегодня занимались? - Вениамин Андреевич начинал каждый семейный ужин с одного и того же вопроса к сыну.\n- Как обычно. Утренняя молитва, беседы с батюшкой и чтение Евангелия. - с небольшим раздражением сказал Лёша. - Когда мы уже будем заниматься чем-то полезным? У меня экзамены на носу!\n- Ну, не будь столь скептичен. Всё в жизни пригодиться, даже богословие. Особенно сейчас. - поспешила успокоить его мама.\n- Да мне и даром не сдались эти сказки про "слушайся батюшки, не делай того, не делай сего, а то в ад попадёшь"! Как я буду нормально работать, если в голове вместо практических знаний у меня каша из стихов Библии и нравоучений какого-то постороннего дядьки?\n- Потерпи до ВУЗа.\n- Там то же самое! Одна и та же бредятина год за годом! - сын поставил точку в этом разговоре."
 russia.833.a: ""Возможно, стоит перевести его на домашнее...""
 russia.834.t: "Молитва Русского Воина"
 russia.834.d: "В Подмосковье уже третий день шёл дождь. Но погода не смогла помешать великому событию: благословению Отдельной Опричной Бригады имени благоверного царя Иоанна Васильевича в Главном Храме Вооружённых Сил. Подготовка к данному событию началась ещё до начала войны, весь регламент был расписан за месяцы.\n"ВОИНЫ!" - картавый голос Охлобыстина проревел через всё поле - "БЛИЗИТСЯ ЧАС СТРАШНОГО СУДА! СУДА НАД ЕВРОБОЛЬШЕВИКАМИ, БЕЗБОЖНИКАМИ, ВРАГАМИ РУССКОГО НАРОДА И ПРАВОСЛАВНОЙ ВЕРЫ!"\n\nСотни воинов стояли перед трибуной, с винтовками на плечах. Вдоль рядов проходили священники, окропляя бойцов и их оружие святой водой.\n\n"ВЕРА ВСЕГДА БЫЛА С РУССКИМИ БОГАТЫРЯМИ: НА КУЛИКОВОМ ПОЛЕ, НА ПОЛТАВЕ, ПРИ БОРОДИНЕ И ПОД МОСКВОЙ! НАШИ ДЕДЫ, ПРАДЕДЫ СРАЖАЛИСЬ И ПОБЕЖДАЛИ ПОД ЛИКОМ ХРИСТА! РУССКАЯ ЗЕМЛЯ ЖДЁТ ВАС С ПОБЕДОЙ! ВПЕРЁД, ВОИНЫ ВЕРЫ!"\n\nОн поднял свой кулак вверх и всё поле ответило кличем:"
 russia.834.a: "ГОЙДА!"
 russia.835.t: "Смотритель"
 russia.835.d: "Василий был управдомом  и присматривал за хрущёвской на улице Прогресса. Непыльная работка - подметать полы, вызывать службы чтобы они вовремя скосили траву перед домом. Ну и наблюдать в камеры за жильцами и передавать определенные паттерны их поведения по инстанции. Вот, например, Маргарита Иванова из шестой квартиры. Работящая, но  и глубоко несчастная женщина. Совсем недавно, как раз после очередного отчёта, ей улыбнулась удача. Во время очереди в ЖКХ она встретила Василия Петровича -  умного, но также одинокого электрика, которого почему-то именно сегодня вызвали в другое место. И вот с тех времён прошло уже несколько недель, а Маргарита каждую вторник, пятницу и субботу принимает гостя, да и дела на работе получше шли. А вот бывший жилец 12 квартиры Аркадий Вениаминович хранил у себя запрещённые книги. В итоге, во время внеочередного повышения его перевели на работу в Заполярье. Он конечно отпирался, но что уж тут поделать? Партия сказала надо, значит надо.\n\nПорой, однако, и сам Василий задумывался о том, что он играет в Бога и вершит судьбы других людей. Но он отнекивался, он же всего лишь выполняет свои указания. Да и бывают же в жизни совпадения... бывают ведь? Впрочем, глубоко в душе он боялся. И порой ночью ему снились кошмары о том что кто-то точно так же наблюдает за ним сбоку и точно так же заполняет очередной отчёт."
 russia.835.a: "Но ведь бояться нечего?" 
 russia.836.t: "Суд Времени"
 russia.836.d: "Недавно чарты российского телевидения буквально разорвала новая программа. "Суд Времени" является  передачей о популярной политике, где различные исторические личности в форме показаний пересказывают свой путь прихода к власти и то как они управляли страной. А присяжные, загримированные под граждан страны, и судья в образе слепой Фемиды, выносят им приговор.\n\nТак посетить данный суд уже успели такие деятели как Сталин, Ленин, Александр I и Лев Троцкий. Так первые три правителя были оправданы судом, а Троцкий казнён за сговор с немецким капиталом и англо-сионистскими кругами.\n\nПередача уже бьёт все возможные рейтинги, и кажется, что создатели не собираются останавливаться. В том числе они и не исключают того, что следующими подсудимыми в их шоу могут стать и иностранные правители."
 russia.836.a: "Хорошая программа."
 russia.837.t: "Вихрь Истории"
 russia.837.d: "Неожиданным актом для всех граждан стало объявление о официальной государственной поддержке проекта "В вихре времён". Долгое время бывший пристанищем для любителей альтернативной истории, форум уже успел выпустить несколько десятков книг, в основном в жанре "попаданцы" где герои неожиданно переносятся во времени и становятся катализаторами изменения истории.\n\nТеперь же сайт претерпел ребрендинг, а книжная серия была переименована в "Вихрь Истории". Вместе с этим были анонсированы новые книги, например, "Век Царя", который повествует о жизни солдат Российской Империи сражающихся против германской красной армии. "После потопа" роман рассказывающий о любви французской аристократки и американского графа в мире победившего Наполеона. И, наконец ,"Пепел" драма о семье выживающей после апокалипсиса произошедшего в начале 20 века. По сюжету им предстоит пройти путь через разоренную Россию чтобы дойти до райского местечка во Владивостоке о котором все говорят."
 russia.837.a: "Может быть тоже себе взять одну?"
 russia.838.t: "Что-то Меняется..."
 russia.838.d: "Светило солнце. Двое молодых людей шли по центру Ярославля - города, стойко пережившего все взлёты и падения России на протяжении всей её истории. В том числе и сейчас, в период явного беспокойства, в городе мало что изменилось, за исключением появления двух БМП и танка на центральной площади.\n- Да когда весь этот бред уже закончится?\n- Ты же знаешь, "умом Россию не понять", - ухмыльнулся в ответ второй.\n- Да ты сам посуди: Жириновский-то правильные вещи делал, недаром ведь в войне победили. Да, теперь его нет, но что с того? Вон, тот же Слуцкий толковые вещи говорил про национальную демократию и суверенитет. И вот что этим военным вдруг не понравилось?\n- Серёга, знаешь, если бы в нашей стране события и люди подчинялись логике, то мы бы сейчас наверняка на Марс летали.\n- Ну, может, ты и прав...\nРечь была прервана рёвом моторов - парни подошли к площади перед зданием областной администрации, откуда спешно уезжала бронетехника. Машины промчались прямо перед ними - можно было почувствовать запах дизеля.\n- Чего это они? - протянул первый.\n- Кажется, я догадываюсь, - ответил второй, глядя в экран телефона.\n"
 russia.838.a: "...а что-то остается неизменным."
 russia.839.t: "Выметать Всё Лишнее"
 russia.839.d: ""Вот тебе, тварь вербованная!", с этими словами опричник Андрей Данилович резко заехал в челюсть своему оппоненту. Полный мужчина, потеряв равновесие, повалился на пол. Пошатнувшаяся икона с полки, небрежно прибитой к стене, упала и приземлилась прямо на лоб упавшего. Мужчина с кровью, тонкой струйкой вытекающей изо рта, из последних сил поднял приземлившийся на его лоб образ. Святая Мария безразлично смотрела на его страдания, после чего побитый закрыл глаза и отрубился.\n\n- Чё с ним делать будем? - Андрей обратился к Василию Павловичу, государевому человеку, пожилому командиру их бригады.\n- Чё делать - чё делать... Тащи его к семье в машину. Володька, помоги ему чтоль.\n- Так точно! -  ответил Андрей, после чего, пока никто не видит, снял с руки мужика, лежащего без сознания, часы.\nЧерез полчаса опричники, каждый с бутылкой зажигательной смеси в руках, стояли перед домом.\n\n- Василий Павлович. Жалко ж такую красоту сжигать. Дом то как древнерусский считай.\n- Эх, Андрейка, жалеть имущество нажитое на обмане нельзя. Он  получал деньги из Германии а они наши враги. Следовательно он предатель, а дома предателей полагается сжигать.\n- Ну, как скажете. Айда! \n- Гойда!\nПожилой опричник громко крикнул после чего пять бутылок с коктейлями Молотова почти одновременно влетели в здание.  Одна из бутылок удачно залетела в открытое окно и пламя почти сразу пожрало занавески, после чего переключилось на деревянное убранство. Толпа собравшаяся вокруг представления активно заулюлюкала и засвистела. "Жги! Жги! Жги! Жги!", безумные, громкие возгласы дополняли танец языков пламени, казалось что толпа едва сдерживается чтобы не пуститься в пляс вокруг пожара. Василий Павлович лишь закурил сигарету, смотря вдаль, после чего махнул рукой и его отряд направился в машину."
 russia.839.a: "На сегодня они закончили."
 russia.840.t: "[FROM.GetName] Запрашивает Гражданские Инвестиции"
 russia.840.d: "[FROM.GetAdjective]иские Власти обратились к нам с просьбой о краткосрочных инвестициях от нашего имени в их молодую экономику, чтобы помочь ей расти.Переговоры с нашими консультантами и заинтересованными группами проходят успешно, они уже наметили области, которые имеют для них первостепенное значение.\nНам действительно нужны экономически сильные страны в нашем альянсе.\n\nТем не менее, наш капитал будет потрачен, без сиюминутной выгоды конкретно для нас, и, возможно, наши ресурсы лучше потратить где-то в другом месте..."
 russia.840.a: "Все, что угодно, чтобы помочь братской стране!"
 russia.840.b: "В данный момент мы ничего не можем выделить..." 
 russia.841.t: "[FROM.GetName] Запрашивает Военные Инвестиции"
 russia.841.d: "[FROM.GetAdjective]иские военные обратились к нам с просьбой помочь их молодым вооруженным силам стать сильнее. Они хотят, чтобы мы оказали им поддержку в оснащении современным вооружением и содействии в создании их собственной оборонной промышленности.\nНам нужны надежные союзники с сильными вооруженными силами для обеспечения нашей общей безопасности.\n\nТем не менее, наш капитал будет потрачен, без сиюминутной выгоды конкретно для нас, и, возможно, наши ресурсы лучше потратить где-то в другом месте..."
 russia.841.a: "Все, что угодно, чтобы помочь братской стране!"
 russia.841.b: "В данный момент мы ничего не можем выделить..." 
 russia.842.t: "[FROM.GetName] Запрашивает Армейских Советников"
 russia.842.d: "Военное командование страны обратилось к нам за помощью. Они хотят, чтобы наши военные эксперты и инструкторы поделились нашей превосходной российской стратегией. Кроме того, они намерены создать несколько батальонов, обученных по нашей армейской программе.\nЭто поможет нам наладить более тесные отношения с нашими союзниками и поможет улучшить их общую боевую мощь."
 russia.842.a: "Все, что угодно, чтобы помочь братской стране!"
 russia.842.b: "В данный момент мы не можем никого выделить..."
 russia.843.t: "В такую ночь"
 russia.843.d: "Сколько времени было потрачено? Сколько трудов было вложено? Сколько страданий испытал Русский народ? Много. Непомерно много. Любая другая страна, быть может, уже давно развалилась бы, не выдержав бурных, ломающих привычный уклад жизни, изменений. Любой другой народ, вполне возможно, уже давно сдался бы, сломившись под тяжестью столь серьёзных, порой даже невыносимых, испытаний. Любой другой, но не его.\n\nВ один момент, все уличные фонари погасли. Город уснул, но Надеждин продолжал свою прогулку. Долгопрудный, столь близкий ему город, изменился до неузнаваемости, и всё - благодаря нему. Сколько ещё городов по всей России он преобразовал? Сколько ещё предстоит? Скольким людям он дал шанс на счастливую жизнь?\nБездушные бюрократы прошлого усмехались над ним, каждый раз когда он пытался сражаться за права своих людей. "Это не твоё дело.", "Твоя борьба бесмыссленна." - Эти фразы раз за разом проносились в его голове. Тогда он был простым преподавателем, депутатом мелкого пошиба. Теперь же, он писал историю.\n\nБорис остановился, подняв голову вверх. Луна, освещавшая его путь во тьме, показалась чем-то родным и близким. Знакомое небесное тело, каждый день неизменно влияло на жизнь всего человечества. Мы использовали её как ориентир, мы ей молились, и мы к ней стремились. Всё это, о простой глыбе камня! И всё! Разве может в этом мире стать важным простой непримечательный булыжник?\nНадеждин широко улыбнулся. Позабыв про обдувавший его прохладный ветер, он ощутил нежное тепло.\nБыть может, теперь он тоже был своего рода глыбой?"
 russia.843.a: "Всё возможно..."
 russia.844.t: "Наша Партия"
 russia.844.d: "Процесс демонтажа ОНФ начался. Пришла пора разрушить этот механизм стагнации и политической апатии в нашей стране! Сделав первый шаг, мы показательно вышли из фронта и призвали всё население страны к активизации гражданской позиции. Но после этого оказалось, что нашему движению нужно имя. Броское и интересное, чтобы зацепить ума людей. Чтобы они знали, что есть партия что выступает за их интересы! К счастью, у нас на уме уже есть несколько вариантов."
 russia.844.a: "Гражданский Союз"
 russia.844.b: "Всероссийский Гражданский Фронт"
 russia.844.c: "Партия Надежда"
 russia.844.e: "Единые Правые Силы"
 russia.844.f: "Либеральная Партия России"
 russia.844.g: "Борись, Надеждин!"
 russia.845.t: "Антикоррупционная Чистка ОНФ"
 russia.845.d: "Все знают, как именно работает Народный Фронт. Рука руку моет. Ты вступаешь в него, зарабатываешь новые знакомства и сам потом помогаешь кому-то взамен. А прибыль вы, как водится, делите пополам. Только эта позорная практика приводит к тому, что бюджет страны расходуется на абсолютно лишние телодвижения и деньги переходят из рук в руку. Не говоря уже о том что некоторые из инициатив существуют просто чтобы сделать карман их предложившего и его друзей чуть-чуть плотнее. И разве может государственный аппарат функционировать эффективно в таких условиях?\n\nХватит это терпеть! Своим новым указом президент Борис Надеждин дал приказ на крупные расследования случаев коррупции в фронте. Каждая налоговая декларация и каждый случай выделения средств будет тщательно проверены и по ним будут вынесены вердикты. Конечно, данная инициатива уже встретила сопротивление со стороны ОНФ. Так, текущего президента успели  обвинить в "охоте на ведьм" и игре в популиста. Пусть кричат об этом и дальше. В конце-концов если они невиновны то и бояться им нечего, не так ли?"
 russia.845.a: "Великолепно"
 russia.846.t: "Расширенная Борьба с Коррупцией"
 russia.846.d: "Десяток отчётов вновь оказались на столе Надеждина. Каждый из них - о  хищении государственных средств. ГУЭБиПК свой хлеб явно ели не просто так, и дела шли хорошо. Но с каждым делом действующий президент убеждался в одном. Масштаб коррупции в фронте был попросту необъятным. И вот уже какой день в офис президента доставляли просьбы об увеличим полномочий для сотрудников антикоррупционного комитета. Конечно, тотальная борьба с коррупцией звучит заманчиво на первый взгляд. Но долгосрочные перспективы такого сильного усиления также могли привести и не к лучшим результатам. В конце-концов, этот самый комитет сможет превратиться новую силу, что будет заниматься политическим шантажом и его члены могут даже обратиться к извращённой форме рэкета. А новый репрессивный аппарат, при этом имеющий серьёзную автономию и полномочия, нам сейчас явно не нужен. Времена НКВД давно прошли. Впрочем, быть может, эти страхи на самом деле беспочвенны, и наша страна сейчас как никогда нуждается в сильном антикоррупционном ведомстве?"
 russia.846.a: "Не надо с этим перебарщивать."
 russia.846.b: "Коррупцию можно победить только железной хваткой."
 russia.847.t: "Фокусировка Правительства"
 russia.847.d: "Борис Надеждин наконец-то оказался у власти и пришло время выбрать временное направление правительства.\n\nС одной стороны можно сконцентрироваться на поддержке культурной деятельности. Ведь часто встречалось мнение о так называемом "упадке традиций" в современной России. Быть может, это наш шанс перетащить умеренных правых на нашу сторону? Да и простому народу такая инициатива точно понравится.\n\nС другой же стороны можно сконцентрироваться на поддержке бизнеса. Это поможет укрепить экономику страны. А что лучше влияет на настроение простых людей чем доступность товаров?\n\nЕщё мы можем сконцентрироваться на гармонизации нашего правительства. Приход такого реформатора как Надеждина без сомнения приведёт к определённым брожениям в правительстве. И если мы заранее выделим ресурсы на приведение механизма в порядок мы сможем заранее подстраховаться и подготовиться к определённым проблемам, которые могут возникнуть."
 russia.847.a: "Давайте сосредоточимся на культурных мероприятиях."
 russia.847.b: "Давайте сосредоточимся на поддержке бизнеса."
 russia.847.c: "Давайте сосредоточимся на гармонизации правительства."
 russia.848.t: "Триумф"
 russia.848.d: "Борис Борисович неспешно покинул сенатский дворец. Спертый воздух и запах постоянных интриг уже начинал действовать на нервы, да и давно уже было желание чутка проветриться. Голубая луна на безоблачном небе освещала своим мягким светом кремлёвскую брусчатку. Не это ли прекрасная погода для прогулки? Надеждин потянулся в карман пиджака и достал оттуда слегка смятую пачку сигарет. Через минуту дымок пошёл из края сигареты, и Борис совершил глубокую затяжку. Крепость слегка обожгла горло, а нервы слегка успокоились.\n\nГлядя на лунный диск президент невольно начал перебирать события, что привели его к этому моменту. Как сменил не одну партию и в итоге попал в круг доверенных лиц Дмитрия Анатольевича. Как в итоге подковерных игр оказался наследником самого Медведева. Как не побоялся бросить вызов ОНФ и как... победил. Всё таки было в этом что-то поэтичное. История человека, что до последнего боролся за свои идеалы и в итоге оказался на коне. Теперь он был президентом и самым влиятельным человеком в стране.\n\nУсмехнувшись про себя, Надеждин затушил сигарету и вновь взглянул на Луну. Она всегда была так близко освещая планету своим светом, но так далеко, что никто не мог до неё дотянуться. Однако именно сейчас Борис верил, что способен коснуться её, стоит приложить только совсем чуть-чуть усилий. Ещё немного погуляв по кремлю президент всё таки решил вернуться в свою резиденцию. Завтра будет новый день и предстоит ещё много работы. Ну а сегодня?"
 russia.848.a: "Должен сказать, это был хороший день."
 russia.849.t: "Распад ОНФ"
 russia.849.d: "Это свершилось! Сегодня исполком ОНФ Кузнецов Михаил Михайлович на очередном заседании Государственной Думы официально объявил о роспуске коалиции. Конечно, официальной причиной послужило устаревание фронта и резкое повышение инициативности депутатов. Впрочем, все прекрасно знали о крупных антикоррупционных делах и саботажах со стороны текущего правительства РФ и президента Надеждина. Боясь повторить судьбу своих менее успешных товарищей, депутаты начали массово покидать фронт, пока там, в конечном итоге, не оказалось слишком мало людей для продолжения нормального существования. Конечно, коллапс фронта привёл к временному политическому вакууму, который вскоре будет закрыт новыми партиями.\n\nТысячи россиян собрались на митинги в городах празднуя это действие. Сейчас лозунги "долой  уравниловку!" и "К чёрту фронт! Пришло время для тыла!" звучат по всей стране. И на примере народной реакции видно, что это победа не только для Надеждина и его группы поддержки в правящей партии. Это победа для всей России!"
 russia.849.a: "Демократия идёт семимильными шагами."
 russia.850.t: "Афтершок"
 russia.850.d: "Борис Надеждин вышел, практически выскочил из здания сенаторского дворца. Сердце щемило, а стены здания будто бы медленно сжимались.  Воздух с улицы немного освежил голову, но этого было мало. Трясущейся мужчина нащупал в кармане пиджака одиноко валяющуюся сигарету и поджёг. Крепкий табак прогрел горло, в нос ударил неприятный жжёный запах. Сделав несколько затяжек, Борис почувствовал, что дышать стало немного полегче. Переведя дух он, уж было попытался взглянуть на небо, но не смог. Острый словно игла приступ боли отдался в мозгу колющим чувством в мозгу. Он устал, устал кивать, устал поддакивать. Не это он обещал людям и не за этим пошёл в политику.\n\nОчередная затяжка. Мысли медленно начали проясняться... Каким же дураком он был, правда же? Благодаря удаче выбился в друзья Медведева и подумал, будто бы ему всё можно, словно забыл сколько раз до этого падал и ошибался. Ха! Российская система уже взяла и перемолола не одного и не двух таких мечтателей. Наверное это и был единственный путь. Влиться в систему, не отсвечивать лишний раз и просто повторять то, что говорят другие.\n\nБорис Борисович прислонился к стене из кирпича, он почувствовал как тело стало грузным и неподъёмным, рука сама выпустила сигарету а тело медленно начало сползать вниз."
 russia.850.a: "Чёрт."
 russia.851.t: "Борись, Надеждин!"
 russia.851.d: "На очередном заседании Государственной Думы Борис Борисович был необычайно угрюмым. Тяжело было привыкнуть к своей новой роли. Сражаться смысла не было. Да и что он мог сделать? Он же уже упустил свой шанс. Если он у него вообще был изначально, а не он сам внушил себе. И придя домой поздней ночью, он просто рухнул на кровать без сил. Завтра будет такой же скучный день. А затем ещё один и ещё. Перед сном он решил немного потыкаться в телефон. Внезапно в своей ленте новостей он увидел нечто необычное. Видео с митинга в Москве, где сотни человек вышли с транспарантами и плакатами. Среди стройных рядов порой проступали развевающиеся триколоры . Конкретно в моменте, запечатлённом на видео, вся толпа в унисон скандировала "Борись, Надеждин!". Немного полистав новости Надеждин увидел что это была не единичная акция. Люди во множестве городов выходили на улицы просто чтобы поддержать... его?\n\nЗначит... ещё не всё потеряно. И ведь действительно, Борис не опустил руки когда проигрывал в прошлом. Так почему что-то должно измениться сейчас? Его бой ещё не был закончен. Ведь вёл он его не ради себя и своих друзей а ради всего народа России."
 russia.851.a: "Борись или проиграешь."
 russia.852.t: "Разобщенная Коалиция"
 russia.852.d: "Наши действия привели к ужасающему падению сплочённости ОНФ. Разные стороны фронта постоянно предлагают свои инициативы и блокируют чужие, полностью парализуя какую-либо деятельность. Дума погрязла в спорах и едва ли способна функционировать. Если мы хотим продолжить стабильное правление, то надо как можно чаще избегать подобных происшествий."
 russia.852.a: "Придётся договариваться."
 russia.853.t: "Прирученный Левиафан"
 russia.853.d: "Когда Борис Надеждин стал президентом на его пути стал ОНФ. Вечная, недвижимая коалиция, что подавляла любые попытки реформ в стране. Будто бы зверь из библейских легенд она опутала все сферы политической жизни. Но Борис Борисович не сдался. Ведь если бы он отступал при первых неудачах, то никогда бы не оказался на месте президента РФ изначально. Шаг за шагом он исключал из фронта лишних. Радикалы, сторонники статуса-кво. Все они не были нужны свободной и процветающей стране. И вот, казавшийся непобедимым, зверь склонил свою голову. Теперь ОНФ отражают волю русского народа и состоит по большей части из умеренных реформаторов лояльных Надеждину. История продолжается и теперь её будет писать народ вместе с Надеждиным."
 russia.853.a: "И мы отыгрываем последнюю сцену."
 russia.854.t: "Прозрачное Правительство"
 russia.854.d: "Одной из инициатив реформаторской программы Надеждина является повышение прозрачности в работе государственных структур. ОНФ в целом поддерживает это предложение президента, однако внутри коалиции наблюдаются разногласия относительно того, каким именно образом должна быть реализована данная реформа.\nПравое крыло Народного фронта настаивает на поэтапном внедрении принципов открытости, выражая опасения, что резкие и поспешные изменения могут дестабилизировать и даже частично парализовать работу правительства. В то же время с левого фланга звучат более радикальные позиции: сторонники решительных мер убеждены, что реформа даст реальный эффект лишь в том случае, если все чиновники, замешанные в коррупционных и сомнительных делах, будут немедленно отстранены, чтобы их места заняли новые, идейно мотивированные кадры.\nНесмотря на различные взгляды, обсуждение не должно зайти в тупик, поэтому результате заседания Государственной Думы было решено..."
 russia.854.a: "Медленно реформируем систему."
 russia.854.b: "Пора повыгонять всех дармоедов!"
 russia.855.t: "Пенсионная Программа"
 russia.855.d: "Одним из наиболее обсуждаемых направлений текущей реформаторской политики стала пенсионная реформа. Президент чётко обозначил курс на пересмотр пенсионной политики, и коалиция Народного Фронта, несмотря на общую поддержку, показывает различные подходы к достижению поставленной цели.\nКонсервативное крыло указывает на необходимость повышения пенсионных выплат и социальных пособий. По их мнению, улучшение качества жизни пожилого населения должно происходить без резких изменений в действующей социальной системе. Консерваторы подчеркивают, что устойчивость бюджета важнее краткосрочных уступок и призывают к взвешенному, экономически оправданному подходу. Левые, напротив, выступают за простое снижение пенсионного возраста, настаивая на том, что граждане имеют право на заслуженный отдых раньше, чем это предусмотрено нынешними нормами. Их доводы строятся на принципах социальной справедливости и заботы о трудовом человеке.\nОба варианта имеют под собой основу, но также стоит учитывать, что наша коалиция должна оставаться единой, в связи с чем решение нужно принимать осторожно."
 russia.855.a: "Увеличить пособия и пенсии."
 russia.855.b: "Снизить пенсионный возраст."
 russia.856.t: "Налоговые Изменения"
 russia.856.d: "Рассмотрение налоговой реформы стало очередным камнем преткновения в правительстве Надеждина. Предложение, исходящее от президента, получило поддержку большинства, однако сразу показало расхождения внутри коалиции: вопрос перераспределения налоговой нагрузки затронул как экономические приоритеты, так и идеологические основы полюсов ОНФ.\nПравое крыло Фронта выступает за введение налоговых каникул для малого и среднего бизнеса, подчёркивая, что это даст экономике необходимый толчок, стимулирует предпринимательскую активность и позволит создать новые рабочие места. \nС другой стороны, левые силы настаивают на введении прогрессивной шкалы налогообложения. По их мнению, именно справедливое перераспределение налогового бремени способно устранить социальное неравенство и обеспечить дополнительное финансирование существующих социальных программ.\nИ хотя оба предложения имеют свои плюсы и минусы, необходимо учесть, что позиция каждого крыла коалиции в целом должна быть учтена."
 russia.856.a: "Ввести налоговые каникулы Надеждина."
 russia.856.b: "Ввести прогрессивный налог."
 russia.857.t: "Антимонопольная Программа"
 russia.857.d: "Антимонопольная программа, предложенная в рамках реформ Надеждина, стала одной из тем, вызвавших широкое согласие внутри Народного Фронта. Признание необходимости сдерживать влияние крупных корпораций прозвучало как с правой, так и с левой стороны коалиции, однако степень допустимого вмешательства государства по-прежнему вызывает споры.\nПравое крыло настаивает на осторожном подходе: они подчеркивают, что чрезмерное давление на крупный бизнес может вызвать непредсказуемые последствия и затормозить экономическое развитие.\nЛевые, напротив, требуют более решительных мер. По их мнению, только строгие ограничения и активное вмешательство антимонопольных органов способны восстановить справедливую рыночную среду и гарантировать защиту интересов граждан и малого бизнеса.\nТема остаётся достаточно чувствительной, и потому, по итогам заседания Государственной Думы, было решено..."
 russia.857.a: "Ввести ограничения."
 russia.857.b: "Ввести строгие ограничения."
 russia.858.t: "За Кулисами"
 russia.858.d: "Когда Владислав Даванков вошёл в офис президента он сильно удивился. Здесь было немного тесно, но в целом уютно. Из винилового проигрывателя доносилась музыка, золотистые лучи света проникали в кабинет сквозь большое окно. Сам же президент РФ стоял прямо перед этим самым окном смотря куда-то вдаль. Лишь когда дверь хлопнула, закрывшись окончательно, он обернулся.\n\n- Ой здравствуй, Влад, прости, засмотрелся. - Борис развернулся и быстро подошёл к гостю после чего протянул руку. \n- Здравствуйте, Борис Борисович, зачем вызывали? - Произнёс Владислав с лёгкой улыбкой. Рукопожатие Надеждина оказалось на удивление крепким, и глава новых людей даже на секунду опешил. \n- О, поверь, нам есть о чём поговорить. Для начала давай только для начала сядем. \n - только оказавшись за столом президент достал из-под него термос и две кружки.\n- Я вижу, вы подготовились.\n-А по другому быть не может. Если планируешь что-то менять, готовиться надо заранее. - На лице Бориса появилась многозначительная улыбка. - Так, давай-ка начнём с твоего мнения о новых реформах..."
 russia.858.a: "Я же говорил, что эти дни прекрасны."
 russia.859.t: "Второе Правительство Надеждина"
 russia.859.d: "ОНФ ни в коем разе не был плохой идеей сам по себе. Просто предыдущее его руководство было… несовместимым с нашим текущим видением будущего России, пришло время перестановок в кабинете.\n\nСамым сложным, конечно же, будет выбор нового премьер министра.\n\nС одной стороны, есть Дарья Беседина. Фаворитка "умного голосования" в 2019, ранее она была членом партии "Яблоко", а также депутатом Московской Государственной Думы. Дарья имеет чётко выраженную либеральную позицию и не раз высказывалась за расширение и защиту прав граждан РФ, в том числе, например за права людей с нетрадиционной ориентаций. Назначение женщины премьер-министра, да ещё и с такой активной позицией точно докажет всем что Надежин принёс реальные изменения.\n\nС другой же стороны мы можем обратиться к более уверенному варианту. Дмитрий Кисиев, крымский активист и молодой политик, который до смерти Путина помогал многим либералам в организации предвыборных кампаний, а при Медведеве серьёзно помог и самому Надеждину. Он человек готовый принять вызов и точно не подведёт нас на новом посту."
 russia.859.a: "Дарья Беседина станет новым премьер-министром!"
 russia.859.b: "Дмитрий Кисиев станет новым премьер-министром!"
 russia.860.t: "Ночь Покера"
 russia.860.d: "Кабинет Надеждина был хорошо освещён несмотря на ночь за окном. Двое мужчин сидели за столом и, с одной стороны, был действующий президент, Борис Надеждин собственной персоной. С другой - молодой политик, недавно ставший полноправным членом ОНФ и популярный блогер - Максим Кац. Коротали они своё время за игрой в покер как и подобает приличным джентльменам.\n\n- Должен признаться, Максим, не ожидал, что вы так быстро сможете заручиться такой обширной поддержкой.\n- Ну, Борис Борисович, вы же сами хорошо знаете как бывает у нас в стране, голос, который говорит правду всегда получит свою аудиторию. А эта аудитория потом с радостью поддержит честного человека, не так ли? - Максим слегка улыбнулся.\n- Вот оно что? Интересно выходит. И всё-таки я слегка удивлён что даже несмотря на вашу эмиграцию во время начала спецоперации...\n- Простите пожалуйста, но я всегда говорил, что в первую очередь я российский политик и представляю интересы народа России. Второе моё гражданство в этом плане меня ничуть не сковывает.\n- Да, кхм, прости, не подумал об этом. - Борис взглянул на свои карты. - И всё таки что бы ты хотел изменить в нашей стране?\n\n- Мы с вами понимаем стране нужны крупные реформы, в социальной сфере, в структуре ОНФ в том числе...\n- Прояснишь? \n- Это будет долгий разговор, а вы человек всё-таки занятой.\n\n- Правда? - Борис добродушно улыбнулся после чего достал из-под стола термос. - Сам же понимаешь, политика она как покер - спешки не любит."
 russia.860.a: "Улыбайся так, будто это всерьез."
 russia.861.t: "Наследник"
 russia.861.d: "В любом случае, Борис Надеждин не вечен. И он не собирается слишком долго оставаться на своем посту. Рано или поздно ему придется уйти, и нужно заранее подумать, кто станет его наследником, но выбор непростой, и требуется много времени, чтобы продумать, кто будет представлять народ России."
 russia.861.a: "Беседина"
 russia.861.b: "Кисиев"
 russia.861.c: "Кац"
 russia.862.t: "Беседа с Бесединой"
 russia.862.d: "После очередного заседания Госдумы Дарья Беседина вышла уставшей. Опёршись о стену, она сделала глубокий вдох после чего выдохнула. Глоток свежего воздуха подарил небольшую ясность после громкого заседания. И тут женщина почувствовала, как нечто коснулось её плеча. Когда она перевела свой взгляд то заметила самого Бориса Надеждина рядом.\n\n- Ну как, Даш, справляешься, всё нормально?\n- Да, Борис Борисович, всё хорошо. Так немножко устала.\n- Это правильно, отдыхать всегда нужно. - Надеждин многозначительно посмотрел вдаль после чего вновь посмотрел Дарье прямо в глаза. - Знаешь, тебе так идёт улыбка, прям как Катьке моей.\n- Правда? - Женщина смущённо улыбнулась, не каждый день всё-таки получаешь такую похвалу аж от президента РФ.\n- Правда, правда. - Надеждин широко улыбнулся после чего кивнул. - Вот что запомни. Я жил всё-таки не мало и что-то да понимаю. Никогда не изменяй своим принципам, а то обернуться не успеешь, как станешь совсем другим человеком. А там и сама в себе разочаруешься. Так что никогда не теряй своей улыбки. А на злых языках внимания не обращай. Они всегда будут.\n- Спасибо за наставление... Обязательно прислушаюсь!"
 russia.862.a: "Ищи в жизни цель, не ищи причину!"
 russia.863.t: "Перекур с Кисиевым"
 russia.863.d: "Иронично, но здание Госдумы не было оборудовано специальной "курилкой" депутатам приходилось выходить в специальный павильон около подъезда нижней палаты. Именно там порой и коротал время Дмитрий Кисиев, особенно после напряженных заседаний. И вот во время очередной такой посиделки под стеклянную крышу павильона заглянул сам Надеждин.\n\n- О, Дим, не против если я тут ненадолго пристроюсь?\n- Да чего вы, Борис Борисович? Конечно, не против. Как я откажу президенту РФ?\nНадеждин аккуратно присел на скамейку рядом и тяжело вздохнул.\n- Будете? - Дмитрий запустил руку в карман пиджака после чего протянул пачку сигарет Надеждину.\n- Да ну, чего ты? У меня свои есть. - Борис достал из своей пачку одну сигарету и поджёг её, после чего сделал глубокую затяжку. - И всё-таки как жизнь то поменялась за сколько... лет 6 уже прошло как Владимира Владимировича не стало? Ты, Дим, наверное, даже подумать не мог что будешь в таком месте курить. Ха!\n- Ваша правда. Начинал то я как активист, потом помогал идейным людям с организацией кампаний...\n- А ведь если бы судьба сложилась по-другому, быть может, и мне бы помогал её организовывать.\n- Хм, боюсь мне бы для начала пришлось загуглить ваше имя.\n\nСмех двух мужчин раздался в стеклянном павильоне. Казалось, что ненадолго отступили стресс и тревоги, не было всех этих проблем в ОНФ, просто друзья сидели и курили вместе.\n- И всё-таки, Дима. - Взгляд Надеждина сделался серьёзным и даже румянец пропал с лица. - Жизнь она такая штука, не знаешь, что будет дальше. Главное тут сделать выбор, о котором не будешь жалеть. Вот я о своём не жалел никогда.\n- И я тоже..."
 russia.863.a: "Нужно двигаться прямо."
 russia.864.t: "В Зале Чемпиона"
 russia.864.d: "Борис Надеждин сегодня зашёл в свой кабинет по раньше. Не было особого повода или какой-то необходимости, просто вот решил прийти на работу пораньше. Президент снял свою куртку, поставил пластинку в граммофон и уже уселся на свой стул. В комнате тем не менее было жарковато. Ненадолго в голове даже проскочила мысль раздеться, всё равно в этот кабинет редко кто заходит с утра пораньше, но эта идея практически сразу была отметена как абсурдная. И всё-таки решив сделать что-то с этой проблемой, Борис подошёл к окну. Желтые тёплые лучи Солнца медленно расползались по ещё не до конца пробудившейся Москве. Сад за окном был прекрасен.\n\nСвежий воздух быстро ворвался в кабинет, и президент смог вдохнуть полной грудью. Наверное, именно так ощущалась свобода. И миллионы россиян точно также смогли вдохнуть полной грудью при президентстве Надеждина. А этот вид, он был так прекрасен... Им хотелось любоваться целую вечность.\n\nНо стоило ли оно того? Конечно, он был прекрасен в этот раз и будет также красив и в следующий. Но что будет на десятый... Нет! На сотый раз? Разве подарит он те же прекрасные ощущения? Реформы Надеждина для многих были глотком свежего воздуха, но что было бы дальше? Сам президент чётко дал понять, что не собирается прирастать к своему креслу, да и это шло бы вразрез с той политикой, которую он проводил весь свой срок. В конце-концов кто-то унаследует его место и лучше заранее подумать об этом...\n\nНо наверное это дело могло подождать. Надеждин заслужил свой миг спокойствия."
 russia.864.a: "Интересно, что ждет нас в будущем..."
 russia.865.t: "Сила музыки"
 russia.865.d: "19:07 по московскому времени, улица Декабристов, дом 8. Огромная толпа людей медленно редела в, казалось бы, бесконечной очереди к избирательному участку. После победы над странами Североатлантического договора правительство России вновь решило сыграть в демократию и провести выборы президента. Пускай каждый про себя понимал, что эти выборы ничем не будут отличаться от прошлых, многие россияне считали своим долгом продемонстрировать свою позицию, даже если это означало ждать в очереди несколько часов, попутно наслаждаясь не самыми приятными звуками, издаваемыми из разных частей этой линии избирателей.\nВдруг, словно гром среди ясного неба, сзади послышался голос - голос надежды.\n- Ну что, друзья, не замёрзли ещё?\nРядом с "избирательным коридором" собственной персоной появился один из кандидатов - Борис Надеждин. Его добрая улыбка, слегка запотевшие очки и аккуратный пиджак вызвали бурную и радостную реакцию толпы. Надеждин осмотрел толпу и усмехнулся:\n- Долго вы тут уже ждёте, да? Я это вижу по вашим уставшим, но решительным лицам. Думаю, я могу вас попробовать развеселить!\nРядом стоящая дочь Надеждина, Анастасия, быстро собрала складной стул, на который тут же сел претендент в президенты Российской Федерации. Он достал гитару из чехла и слегка прошёлся по струнам, вспоминая в голове мелодию, которую хотел сыграть. Настя тем временем уже обустроила рядом с отцом микрофон и небольшие колонки. Замахнувшись рукой, Надеждины начали петь свою песню, что мигом стала согревать сердца и души стоящих в очереди."
 russia.865.a: "Ничего на свете лучше не-ее-ету..."
 russia.866.t: "Возвращение Орбана"
 russia.866.d: ""
 russia.866.a: ""
 russia.867.t: "Убитый Азарт"
 russia.867.d: "Необычный стиль управления президента и дерзкие реформы, предпринимаемые его правительством часто приводят к неожиданным последствиям. Одним из итогов переформатирования политической жизни страны стало обретение второго дыхания столичными казино.\n\nНачинающие предприниматели, скромно бредущие, словно собаки на поводке, отчаянно следуют за местной богемой и восходящими русскими политиками. Каждую воскресную ночь, все они неизменно съезжаются в Московский Азартный Дом. Происходящее здесь было больше похоже на бал, чем на игровое пространство. Кто-то жаждет наладить новые связи, кого-то интересуют постоянно обрастающие новыми деталями скандалы и сплетни, а кому-то просто хочется скоротать время. Несмотря на разношёрстность этой компании, для всех находящихся здесь персоналий существует одно негласное правило, никто из них не играет на крупные суммы денег.\nВсе дерзновенные глупцы, решавшиеся привлечь к себе внимание толпы, сорвав большой куш, вызывали лишь равнодушие и тихое снисхождение. Неизменно, часы спустя, молодые игроки присоединялись к постоянно расширявшейся армии людей потерявших своё имущество, для которых вход сюда будет закрыт на долгое время.\nОтрешаясь от разрушенных судеб очередных смельчаков, и бесполезных "творцов" цепляющихся к каждому встречному, за этим тихим пиршеством скромно наблюдали приветливые люди, никогда не пьющие, никогда не играющие.\n- Серёга, у тебя Марков в списке есть?\n- Есть, конечно, а что такое?\n- Вычёркивай, он только что проиграл все деньги в карты.\n- Гхх... Господи, я только сегодня с ним познакомился! И чего ему спокойно не сиделось? Очередной болван!\n- Забудь про него, лучше продолжай следить за депутатами, эти когда напиваются, рассказывают всё, что надо и не надо. Проверено.\n- Да уж, спасибо! А я только начал надеяться, что на этой работе будет хоть что-то интересное..."
 russia.867.a: "Кто не рискует, тот тратит деньги на шампанское."
 russia.868.t: "Большой Перерыв"
 russia.868.d: "Ровно в полночь, оглушив всех присутствующих нечленораздельным криком, в забитый людьми зал Казино ворвался никому неизвестный неопрятный мужчина, вслед за ним ковылял его тощий помощник, с трудом переносящий два кейса, набитых деньгами.\n- Стив, д..доставай... Ч-что это? Какие к чёрту доллары, Стив? Выкинь этот... пхффф... Долбаный чемодан, и дай мне... хгггг... нормальные деньги...\nЯвно перебравший алкоголя мужчина взял в охапку полученные фишки и, едва перебирая ногами, пытался найти дорогу до ближайшего игрового стола, не обращая никакого внимания на окружающих.\n- Хандрд...\n- Мистер Грин хочет поставить 100 тысяч, будьте добры.\n- Е-ещё... Ст-тавлю птсот.\nШумный игрок сидел с 18-ю очками, дилер набрал 22. Перебор! Это Победа!\n- Вы победили, Мистер Грин!\nПобедил? Он побеждает? Как? Раз за разом, он повышает ставку, и умудряется выходить победителем? Это не блэкджек, это воровство!\n- М-млн... рбл...\nСтавка за ставкой, заинтригованная толпа собиралась вокруг шумного иностранца. Один вид его болезненного цвета кожи должен был распугать присутствующих, но дикий интерес возобладал над сознанием людей. Со временем, всё казино собралось посмотреть на игру иностранца.\n- ЕЩЁ! ДЕСЯТЬ! Ставлю! Д-десять!\n- 16, Мистер Грин. У вас выпало 16 - спокойно прошептал Стив.\n- Хххх... Я... Я не могу... Это с-слишком... С-сердце... Ахххгг... - Промямлил игрок, теряя сознание.\n- Мистер Грин? Мистер Грин, вы в порядке? Не отвечает... Похоже, он ударился головой об стол. Думаю... Это считается за ход... Карту!\nСкрипя зубами, дрожащий дилер сделал то, что должен. Пять.\n- ДВАДЦАТЬ ОДИН! МИСТЕР ГРИН! Вы победили! 20 миллионов ваши! Мистер Грин! Вставайте!\n- А.. д-да. К-кнчно... Л-лучше... Отведи меня д-домой... Что-то, кгхх, мне не хорошо...\n- Сердце? Уже в третий раз за последние три дня? Вам стоит беречь себя, Мистер Грин, пойдёмте, я обо всём позабочусь.\nОперевшись на своего помощника, необычный мужчина устремился к выходу, разбрасывая только что заработанные фишки в сторону заворожённых наблюдателей.\n- Знаешь, С-стив... Я умею давать чаевые... Д-держи. Хххх... Это... Пять рублей...\n- Вау! Спасибо, Мистер Грин.\n- Без проблем, Стив. В конце концов, ты всегда приносишь мне удачу!"
 russia.868.a: "Этот человек произвёл невероятное впечатление на окружающих."
 russia.868.b: "В конце концов, главными наблюдателями, были правоохранители."
 russia.869.t: "Американский Рецепт"
 russia.869.d: "- Мистер Грин? Десятки людей стоят на улице, они хотят встретиться с вами! Честно, я не знаю, кто это, но они...\n- Конкуренты... Стив, нас хотят уничтожить... Я не дам нашему труду вновь превратится в пепел. Я выйду к ним, но как только они что-то со мной сделают, просто беги...\n- Мистер Грин!\nАмериканский бизнесмен распахнул двери своего предприятия и вышел к шумящей толпе. Он не был пьян, но простые шаги давались ему с трудом. Он принял боевую стойку и приготовился защищать своё детище.\n- Мистер Грин! Это правда вы! Вы невероятно вдохновили нас всех!\n- Мистер Грин! Вы помните меня? Месяц назад вы дали мне часть своих денег! Я хотела бы отблагодарить вас! Вот! Держите!\n- Джереми! Выглядишь отлично, как всегда! Вот это у тебя бизнес! Может нужна помощь? Я готов скупить всё, что у тебя есть!\nХозяин фабрики слабо понимал русский язык, и он едва ли различал рваные фразы перекрикивающих друг-друга людей, но в этот самый момент, он почувствовал странное облегчение.\nНесколько лет назад его бизнес был разорён, ограблен, и уничтожен. Долгое время, вместе со своим верным помощником, он блуждал по миру в поисках пристанища, но теперь? Больше никаких лишений и страданий, никаких переживаний и потерь. Неужели, он нашёл свой дом здесь?\nСобравшись с мыслями, Мистер Грин выпрямился, раздвинул плечи и улыбнулся присутствующим. Почувствовав привлечённое внимание, он уверенно промолвил:"
 russia.869.a: "Как насчёт благотворительности?"
 russia.870.t: "Налоговая Декларация"
 russia.870.d: "- Вы мне объясните, я зачем вас отправил в это проклятое казино? Чтобы вы там отдыхали? Чтобы вы мне ересь какую-то докладывали? Вот что вам сделал простой американский алкаш? А? Не там вы шпионов ищете!\n- Товарищ майор, но вы же сами сказали... Докладывать, Принимать решительные самостоятельные действия в случае необходимости, Бдительно охранять и оборонять социально значимые объекты нашего государства и находящихся там лиц... Всё по инструкции!\n- Инструкции? Повязали то вы его зачем? Что он сделал? Испугал дилера? Довёл хозяина до ручки? Лейтенант! Может он ещё и скорость на 5 километров превысил? Вы только скажите! Я всегда рад помочь! Вы из ФСБ сразу в ГИБДД переквалифицируетесь!\nВам Родина доверила особо опасную и важную задачу по охране и сбору сведений! Это секретная миссия, Лейтенант! По-Ни-Ма-Ешь? А что если это был отвлекающий манёвр? Что если бы враг воспользовался вашей халатностью и ворвался в здание с оружием? А?\n- Товарищ Майор, вечер проходил спокойно, а тут, в зал ввалились два кричащих вандала! Нами было принято решение захватить этих крайне подозрительных иностранцев!  Мы же не могли закрыть на их выходки глаза! Мы же даже не знаем кто это такие!\n- Вот именно! Вы совершенно не знаете кто это такие! А я вот точно знаю! Больной старый гипертоник и его кент, рекламирующий своим хлюплым видом ближайший спортзал! ВОТ КТО ЭТО ТАКИЕ!\n- Но мы же...\n- Вы же... Что в итоге то, а? 10 Тысяч? Ты хочешь сказать, что человек, выигравший за ночь в казино 20 миллионов, не успел заплатить 10 тысяч рублей налогов? Это - ваш мировой преступник? Отпустите этих бедолаг на свободу! Если они вообще смогут сами до выхода дойти. Идите отсюда...\n- Есть, товарищ Майор..."
 russia.870.a: "Серёга, мне кажется, что мы немного перестарались."
 russia.871.t: "Загадочный Зелёный Человек"
 russia.871.d: "Несколько недель прошло с того момента, когда загадочный иностранец ворвался в столичное казино, и, сорвав куш, мгновенно исчез, словно ничего особенного не произошло. Очередные размеренные вечера наскучивали всё сильнее, политические дрязги и грязные скандалы, отходили на второй план. Каждый раз приходя в этот зал, люди надеялись вновь увидеть чудо - кричащего неопрятного бизнесмена, не знающего поражений - мимолётный символ сказочного богатства.\nПостепенно, все беседы начали сводиться к этому инциденту. Кто-то пытался поднять свои контакты, чтобы найти загадочного американца, кто-то общался со своими знакомыми, к своему собственному удивлению узнавая о том, что удачливый игрок методично объехал всю Москву, посещая одно игорное заведение за другим, и каждый раз - с неизменным успехом.\nВ какой-то момент, из собравшейся толпы раздался уверенный голос:\n- Джереми Грин! Вот его полное имя. На заработанные деньги он совсем недавно приобрёл шоколадную фабрику, в двух часах езды отсюда. Вот ваша разгадка!\nЗагадочный парень, раскрывший людям тайну, видимо, желал погасить интерес к личности американца и перевести разговоры в другое русло, впрочем, эффект был совершенно противоположным.\nУтром следующего дня, десятки дорогих машин устремились к фабрике. Желание узнать бизнес-секреты? Ожидание увидеть что-то сверхъестественное?"
 russia.871.a: "Скорее всего, людьми двигал банальный интерес."
 russia.872.t: "Скорый Поезд"
 russia.872.d: "Давно Владимир Владимирович не ездил на поезде, предпочитая для деловых поездок самолёт. Но в этот раз, возвращаясь из визита в Санкт-Петербург, свой родной город, он решил поехать спецрейсом. Отужинав и приняв выписанные лучшими врачами лекарства, Владимир Путин увлёкся видом из окна. Перед глазами проплывали леса, поля, реки и маленькие деревеньки большой страны.\n\n- Вам что-нибудь нужно, Владимир Владимирович? - телохранитель спросил своего начальника перед отходом ко сну.\n\n- Нет, спасибо, Миша. Отдохни пока. - спокойным, размеренным тоном ответил ему Путин, и Михаил ушёл в сторону купе охраны.\n\nНо разум Владимира Владимировича не отдыхал ни на секунду. Он размышлял о будущем отданной ему в управление страны, родной России. Внешнеполитическая ситуация представляется как нельзя лучше для её будущего: Америку, "победителя" Холодной войны, раздирает ужасающая гражданская бойня. Из-за этого Европа осталась наедине с Россией, и, безусловно, конфликт неизбежен. Минские договорённости лишь заморозили украинскую проблему, а не решили её полностью. И он боялся, что страна окажется не готова к большой войне.\n\nПрозвучал кашель. Этот дрянной кашель, который мучает его достаточно долго. Диагноз был страшен в своей прямолинейности: Ковид-19. Учитывая его возраст, характер болезни и стресс правления страной более двадцати лет, Путин выбивал у смерти последние месяцы. Столько же надо сделать, и сколько же мало времени.\n\nТакого окна возможностей, возможно, не было никогда в истории России. Многополярность, Русский мир, возвращение былого величия..."
 russia.872.a: "Поезд ехал и ехал..."
 russia.873.t: "Воспоминание"
 russia.873.d: "Он был тогда ещё молодым и полным сил: всего-то второй срок, уже отгремел ужас Дубровки и Беслана, российская экономика восстановилась из руин девяностых. Люди начали впервые за долгое время верить в лучшее, в то, что годы дефицита, нестабильности и страха наконец-то кончились. И это было так.\n\nРоссия в Приштине показала НАТО, что разговоры будут вестись на равных, без "ножек Буша" и других подачек со стороны Запада. Россия ищет сотрудничества и суверенитета, а не подчинения; перенимает лучшее и не копирует вслепую ошибки Европы и Америки. Сотрудничество с Востоком делает её только крепче и сильней, делает её мостом между Европой и Азией, соединяющим континенты. Действительно, Россия - страна возможностей. Возможностей для всех и каждого, кто будет её искренне любить и кто попадёт под её согревающие руки.\n\nВпереди её ждут мировой кризис, Майдан и война на Донбассе, на Россию не обрушились санкции, Пандемия не охватила мир.\n\nНо это всё - будущее, и тот Путин никак не мог его знать. Россия шла по дороге счастья, и Владимир Владимирович Путин, её президент, вёл свою страну по этому пути."
 russia.873.a: "В моменте, он лишь наслаждался солнцем."
 russia.874.t: "Ущерб От Войны"
 russia.874.d: "Война сопровождается не только победами, но и осознанием значительных масштабов ущерба, причиненного противниками.\n\nДанная военная кампания является наиболее масштабной в Европе со времен Великой Отечественной войны. Соответствующие Министерства уже провели оценку ущерба, нанесенного различным регионам. Наибольший урон был причинен новым территориям, включая Нарвскую и Двинскую области, а также регионам Республики Беларусь. Значительные разрушения были зафиксированы в Калининграде и Приднестровской Молдавской Республике, и так же серьезно пострадал Крымский Полуостров. Однако наиболее серьезные разрушения получила Новороссия. Ущерб оценивается в миллиарды рублей, и процесс восстановления этих регионов потребует значительных усилий и ресурсов.\n\nЭксперты выражают уверенность в способности Российской Федерации справиться с этой задачей. Наличие человеческих ресурсов и экономических возможностей позволяет вернуть данные территории к нормальному функционированию. В перспективе Новороссия должна стать одним из наиболее динамично развивающихся регионов РФ."
 russia.874.a: "Мы победили в войне. Победим и в мирной жизни!"
 russia.875.t: "Новый Сопредседатель Союзного Государства"
 russia.875.d: "С течением времени крайне важно рассмотреть вопрос об обновлении руководства нашего Союзного государства. Затягивать с решением этой задачи опасно. Новый лидер мог бы оживить наши отношения с Беларусью и предложить инновационные подходы к управлению делами союза. Более того, он скоро займет пост президента Беларуси.\n\nНа политической сцене Беларуси есть многообещающие кандидаты, которые могли бы занять эту должность."
 russia.875.a: "Виктор Лукашенко."
 russia.875.b: "Николай Улахович."
 russia.875.c: "Олег Романов."
 russia.875.f: "Анна Канопацкая."
 russia.876.t: "Кремлевские Башни"
 russia.876.d: "В высших эшелонах Кремля созвездие могущественных фигур образует так называемые "кремлевские башни", метафорическую структуру интересов и амбиций внутри государства. Эти группировки можно описать по-разному, некоторые выделяют только две - либералов и сторонников жесткой линии, в то время как другие предполагают до десяти. Наиболее распространенной точкой зрения является то, что существует по крайней мере четыре ключевые группы: силовики, технократы, государственные либералы и нео-царизм.\n\nКаждая из этих группировок преследует свои собственные цели, но их различные подходы к управлению позволяют Кремлю избирательно отдавать предпочтение одной из них перед другой, в зависимости от потребностей стабильности. Для поддержания равновесия ни одна группа не может доминировать; они должны либо поочередно влиять, либо временно игнорироваться. В конце концов, они всего лишь консультируют администрацию."
 russia.876.a: "Продвигать кадры силовиков."
 russia.876.b: "Продвигать технократические кадры."
 russia.876.c: "Продвигать гос. либеральные кадры."
 russia.876.f: "Продвигать кадры нео-царистов."
 russia.876.k: "На данный момент мы никого не хотим поддерживать." 
 russia.877.t: "Выборы в Государственную Думу 2021"
 russia.877.d: "По данным ЦИК, окончательная явка на выборах составила 51,72%.\nПо результатам выборов в Государственную Думу партия "Единая Россия" получает 324 мандата (таким образом, у партии конституционное большинство), Коммунистическая партия Российской Федерации получает 57 мандатов, "Справедливая Россия за правду" - 27, ЛДПР - 21, "Новые люди" - 13. "Гражданская платформа", "Родина" и Партия роста получают по одному мандату. Кандидаты-самовыдвиженцы получают по 5 мандатов.\n\nПолитолог, директор Международного института политической экспертизы Евгений Минченко в комментарии Gazeta.Ru " назвал последнюю кампанию "очень интересной" и отметил, что у нее было несколько целей.\n"С одной стороны, это защитная и консервативная политика, и она нашла отклик у значительной части электората. С другой стороны, существует оппозиционная повестка дня, в рамках которой шла борьба между несколькими политическими силами - партиями, которые сейчас проходят в парламент", - сказал эксперт.\nТретьей повесткой дня, по его словам, стала борьба старых и новых партий. Партии "Новые люди" удалось стать одним из полюсов, судя по мизерным процентам, которые получили другие относительно новые проекты, заключил он.\n\n"Новые люди" стали новой партией в Думе. Их платформа построена на коммунитаризме и бизнес-ориентированной риторике."
 russia.877.a: "Мы приветствуем новичков."
 russia.878.t: "Новый Председатель Государственной Думы"
 russia.878.d: "Председатель Государственной Думы занимает ключевую должность, курирующую повседневную деятельность законодательного органа России. У этих политиков есть своя повестка дня и приоритеты в рамках их политической стратегии. Они попытаются реализовать свой собственный специфический подход к работе.\n\nВсе кандидаты принадлежат к одной и той же партии, которая в настоящее время находится у власти в стране."
 russia.878.a: "Володин."
 russia.878.b: "Боярский."
 russia.878.c: "Гордеев."
 russia.879.t: "Новый Лидер "Единой России""
 russia.879.d: "Лидер думской фракции "Единой России" обладает значительным влиянием на партию. Вместе с советом они определяют направление деятельности партии и корректируют ее программу. В зависимости от того, кто возглавляет партию, они могут привносить в деятельность партии свои приоритеты или личные амбиции."
 russia.879.a: "Васильев."
 russia.879.b: "Валуев."
 russia.879.c: "Толстой."
 russia.878.a1: "Макаревич."
 russia.878.b2: "Аксененко."
 russia.878.c3: "Драпеко."
 russia.880.t: "Новый Лидер "Народной России""
 russia.880.d: "Лидер думской фракции "Народной России" обладает значительным влиянием на партию. Вместе с советом они определяют направление деятельности партии и адаптируют ее программу. В зависимости от того, кто возглавляет партию, они могут привносить в деятельность партии свои приоритеты или личные амбиции."
 russia.880.a: "Кабишев."
 russia.880.b: "Лантратова."
 russia.880.c: "Татаринов."
 russia.881.t: "Новый администратор ОНФ"
 russia.881.d: "Администратор ОНФ занимает ключевую должность, курируя повседневную деятельность Общероссийского народного фронта. Несмотря на то, что они действуют без идеологических ограничений, их основное внимание по-прежнему сосредоточено на своей специальности. Учитывая текущие потребности государства, важно выбрать наиболее подходящие решения. Они подчиняются непосредственно президенту, который также возглавляет ОНФ."
 russia.881.a: "Кузнецов."
 russia.881.b: "Яровая."
 russia.881.c: "Громов."
 russia.881.f: "Песков."
 russia.881.h: "Вайно."
 russia.882.t: "Новый Политический Комиссар ОНФ"
 russia.882.d: "Политический комиссар выступает в качестве советника администрации президента, занимаясь политическими стратегиями и связями с общественностью. У них свои цели, но все они нацелены на работу в рамках системы платформ ОНФ. Их цель - не радикальные перемены, а скорее серия постепенных корректировок."
 russia.882.a: "Школьник."
 russia.882.b: "Бутина."
 russia.882.c: "Косачев."
 russia.882.f: "Примаков."
 russia.882.h: "Исаев."
 russia.883.t: "Новый Экономический Комиссар ОНФ"
 russia.883.d: "Экономический комиссар является советником администрации президента, занимаясь экономическими вопросами и взаимоотношениями между работниками и предприятиями. У них есть свои собственные цели, но все они предназначены для работы в рамках платформы ОНФ. Их цель - не радикальные преобразования, а скорее серия постепенных улучшений."
 russia.883.a: "Рязанский."
 russia.883.b: "Комиссаров."
 russia.883.c: "Когогин."
 russia.883.f: "Кириенко."
 russia.883.h: "Красов."
 russia.884.t: "Новый Молодежный Комиссар ОНФ"
 russia.884.d: "Молодежный комиссар выступает в качестве советника администрации президента, уделяя особое внимание политической активности молодежи и взаимоотношениям государства с этой демографической группой. У них есть свои собственные цели, но все они согласуются с более широкой повесткой дня ОНФ. Их цель - не радикальные перемены, а ряд последовательных улучшений."
 russia.884.a: "Потупчик."
 russia.884.b: "Нагорный."
 russia.884.c: "Демидов."
 russia.884.f: "Павлюченкова."
 russia.884.h: "Тараненко."
 russia.885.t: "Рокировка"
 russia.885.d: "Рокировка в политике - это перестановка ключевых фигур на политическом поле без их радикальной замены.\nМногие ожидали, что время пребывания Куренкова на этом посту будет недолгим, возможно, самым коротким за всю историю. Их прогнозы оправдались, когда он назначил Владислава Суркова премьер-министром. Теперь администрация Куренкова опубликовала краткое заявление, в котором объявила об отставке президента и назначении Суркова "временным" лидером страны.\nОднако Сурков быстро восстановил Куренкова на его прежней должности главы правительства, поддерживая давнюю рокировскую традицию.\nНа международном уровне и среди некоторых местных наблюдателей широко распространено неодобрение в отношении разветвленной структуры "глубинного государства", которая привела Суркова к власти. Однако их голоса остаются неуслышанными в кремлевских стенах.\n\nТеневой глава государства, который долгое время существовал, наконец-то вышел из тени, чтобы полностью управлять страной."
 russia.885.c: "Все как обычно."
 russia.886.t: "Сурков Рекомендует Александра Куренкова"
 russia.886.d: "В ходе недавних переговоров с президентом Владислав Сурков предложил кандидатуру Александра Куренкова на ключевую государственную должность. Сурков высоко оценивает обширные связи Куренкова, его дисциплинированную трудовую этику и скромные манеры поведения, считая его исключительным кандидатом.\nКуренков, с его опытом работы в Министерстве гражданской обороны и в ФСБ, обладает значительными полномочиями.\nТем не менее, некоторые опасаются, что активная поддержка Сурковым Куренкова может свидетельствовать о скрытых мотивах."
 russia.886.a: "Посмотрим."
 russia.887.t: "Суверенное Государство"
 russia.887.d: ""...Наша Родина полна драгоценных ресурсов, необходимых для жизни современной цивилизации, наш народ с гордостью трудился не покладая рук, чтобы приумножать и использовать богатые месторождения и рудники России на протяжении многих поколений.\nНо помните, ресурсы - это все, что видят западные элиты и так называемый "золотой миллиард" - земля, объект, которым они могут владеть, продавать и эксплуатировать. От тевтонцев до Бонапарта и немецко-фашистских захватчиков, агрессоры пытались отнять у нас нашу страну - они либо грабили наши земли напрямую, или могли даже контролировать и развращать нашу политическую элиту.\nИ теперь, когда Россия восстанавливает свою законную независимость, элиты Запада снова стремятся подчинить Россию, чтобы возобновить свои эксплуататорские отношения с нами. Как мы можем предотвратить это? Ответ кроется в единстве, общности и суверенитете - мы должны строить будущее России вместе, мы должны построить сильное суверенное государство, способное достойно реагировать на испытания, которые могут нас ожидать впереди.\nВ этом стремлении мы видим, что ОНФ может предоставить нашей стране необходимые знания и управление, что в эту организацию входят разные люди, которые могут предложить свой уникальный взгляд на развитие Родины, однако ни одно из этих обсуждений не должно принимать форму ожесточенных дебатов или быть препятствием для правительства или России. Мы приветствуем все идеи, если удастся достичь компромисса".\n\n- Отрывок из выступления Дмитрия Медведева на конференции ОНФ."
 russia.887.a: "Наша сила в единстве."

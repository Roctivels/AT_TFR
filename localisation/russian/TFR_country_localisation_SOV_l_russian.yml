 SOV_satisfy_consumers: "Удовлетворить Потребителей"
 SOV_satisfy_consumers_desc: ""
 SOV_betrayal_prevented: "Предательство Предотвращено"
 SOV_betrayal_prevented_desc: "Криптокоммунисты наконец-то свергнуты! Теперь Россия может вернуться к более нормальному образу ведения дел, свободному от крайних взглядов Шевченко и его разрушительного безумия."
 SOV_coalition_government: "Коалиционное Правительство"
 SOV_coalition_government_desc: "Нашему правительству не хватает сил из-за отсутствия многих лояльных государственных деятелей, особенно тех, кто мог бы повысить нашу популярность среди людей и групп, придерживающихся правых взглядов. Чтобы решить эту проблему, мы планируем создать широкую политическую организацию, целью которой будет объединение лояльных правых под одним знаменем."
 SOV_no_more_leftism: "Больше Никаких Леваков"
 SOV_no_more_leftism_desc: "Самой существенной ошибкой этой "оттепели" было то, что она позволила левым идеям проникнуть в общественные пространства и привлечь к себе внимание всей страны. Больше нет! Мы будем ограничивать их деятельность, прямо запрещая их движения и возбуждая серьезные судебные иски против левых активистов."
 SOV_heal_the_society: "Исцелить Общество"
 SOV_heal_the_society_desc: "Руководство РПСС нанесло значительный ущерб нашему национальному самосознанию. Теперь мы должны изменить образ мыслей и убеждения нашего народа, чтобы восстановить консервативную и здоровую политическую перспективу, свободную от прогрессивного влияния и экономических проблем."
 SOV_award_the_military: "Наградить Военных"
 SOV_award_the_military_desc: "Военные сыграли решающую роль в отстранении РПСС от власти, используя все доступные ресурсы. Поэтому мы должны еще раз выразить нашу благодарность, повысив зарплаты и наградив новыми медалями самых преданных своему делу офицеров."
 SOV_sway_the_population: "Влиять на Население"
 SOV_sway_the_population_desc: "Российское общество все еще испытывает на себе последствия социализма. Чтобы преодолеть такие проблемы, как выборы и экономическое равенство, нам необходимо предложить более привлекательную альтернативу. Щедрые стимулы для лояльных работников могут сыграть свою роль в этих преобразованиях."
 SOV_satisfy_the_masses: "Удовлетворить Потребности Масс"
 SOV_satisfy_the_masses_desc: "Наши люди заслуживают справедливой и достойной жизни. У них должна быть стабильная работа, доступное питание, хорошее здоровье и даже случайное угощение. Мы будем стремиться к достижению этой цели, предлагая различные социальные льготы и обеспечивая их работой путем переговоров с предприятиями, готовыми сотрудничать с государством."
 SOV_nationalistic_show: "Националистический Карнавал"
 SOV_nationalistic_show_desc: "Самый мощный способ установить контакт с людьми - это национальная гордость. Наши граждане глубоко ценят свою родину, поэтому мы должны использовать это чувство. Мы организуем патриотические мероприятия, такие как митинги, концерты и парады, и создадим новые национальные праздники."
 SOV_cooperate_with_business: "Сотрудничать с Бизнесом"
 SOV_cooperate_with_business_desc: "Бизнес-сообщество должно выделяться на фоне неспокойной левацкой обстановки. Они - "золотые гуси" России, неустанно способствующие процветанию страны и в то же время обогащающие самих себя. В то время как население по-прежнему возмущено социальной политикой, мы будем заключать союзы с деловым сектором. Мы надеемся, что преобладающее потребительское мышление в конечном итоге преодолеет нынешнее недовольство."
 SOV_enlightened_economics: "Просвещенная Экономика"
 SOV_enlightened_economics_desc: "Экономика должна служить тем, кто может себе это позволить. Модернизация, оптимизация и реприватизация - вот ключевые слова в сегодняшних заголовках. В очередной раз бизнес и государство сотрудничают, чтобы построить более светлое, процветающее и просвещенное будущее России."
 SOV_right_kind_of_democracy: "Правильный Вид Демократии"
 SOV_right_kind_of_democracy_desc: "Лучшие выборы - это те, результаты которых вы уже знаете. Больше никаких сюрпризов, как в прошлый раз. Теперь избирательный цикл тщательно контролируется властями, чтобы гарантировать, что нежелательные кандидаты даже не получат шанса баллотироваться."
 SOV_social_economic_reformation: "Социально-Экономическая Реформация"
 SOV_social_economic_reformation_desc: "Наша экономика была создана для поддержки милитаристских отраслей и богатых бизнесменов, которые наживаются на конфликтах. Пришло время снова переключить внимание на тех, кто по праву занимает центральное место в нашем обществе, - на работников. Мы приступим к социализации экономики."
 SOV_crackdown_on_monopolistic_capital: "Борьба с Монополистическим Капиталом"
 SOV_crackdown_on_monopolistic_capital_desc: "Крупные корпорации-монополисты - это чума, которая поражает не только отдельных лиц, но и малый бизнес. Они нарушают справедливый и сбалансированный характер рыночных отношений, осуществляя контроль извне из-за своих обширных владений. Наше антимонопольное ведомство займется этой проблемой. Мы ликвидируем многие из любимых имперских корпораций Жириновского и, при необходимости, разоблачим коррупцию и скрытые сделки, которые защищают их интересы."
 SOV_improve_factory_conditions: "Улучшить Производственные Условия"
 SOV_improve_factory_conditions_desc: "Наши рабочие вынуждены работать в небезопасных условиях на огромных заводах, построенных правительством Жириновского. Чтобы по-настоящему представлять рабочий класс, мы должны заставить директоров и владельцев этих заводов по возможности повышать уровень безопасности и предоставлять больше льгот наиболее уязвимым работникам."
 SOV_belarus_economic_plan: "Белорусский Экономический План"
 SOV_belarus_economic_plan_desc: "Беларусь может похвастаться мощным и разнообразным промышленным сектором с неиспользованным потенциалом. Пережив разрушения, вызванные войной, страна срочно нуждается в восстановлении. Мы будем поддерживать и финансировать проекты в этих регионах, направленные на предоставление возможностей трудоустройства тем, кто пострадал от конфликта."
 SOV_develop_kazakh_lands: "Осваивать Казахские Земли"
 SOV_develop_kazakh_lands_desc: "Казахстан все еще развивается и мог бы извлечь выгоду из новых промышленных и инфраструктурных проектов. Это помогло бы привлечь больше людей в эти регионы, способствуя росту населения. Казахстан, расположенный в глубине территории России, вряд ли будет затронут какими-либо потенциальными новыми конфликтами."
 SOV_moderation_in_reforms: "Умеренность В Реформах"
 SOV_moderation_in_reforms_desc: "Хотя крайне важно не упускать из виду цель достижения равенства, мы должны признать, что современная экономика требует тонкого баланса между частным и государственным секторами. Государство несет ответственность за поддержание этого равновесия и готовность поддержать простых людей."
 SOV_gentle_hand_over_private_business: "Внимательное Отношение к Частному Бизнесу"
 SOV_gentle_hand_over_private_business_desc: "Мы должны внимательно следить за частными предприятиями, готовые незаметно вмешаться, когда выявим нарушения, будь то плохое обращение с сотрудниками, уклонение от уплаты налогов или любые другие незаконные действия, к которым недобросовестные бизнесмены могут прибегнуть ради получения прибыли."
 SOV_worker_protection_laws: "Законы о Защите Работников"
 SOV_worker_protection_laws_desc: "Работники должны быть защищены любой ценой. Мы проведем реформы, которые позволят работникам промышленного и других секторов защищать свои права с помощью новой правовой базы. Кроме того, мы улучшим условия их досуга и предложим различные гранты за выдающуюся работу."
 SOV_a_fair_economy: "Справедливая Экономика"
 SOV_a_fair_economy_desc: "Мы должны ставить во главу угла интересы всех людей, включая работников, малый и средний бизнес. Крупный капитал часто стремится уйти от ответственности и эксплуатировать других, но мы не можем допустить, чтобы это продолжалось. Нам нужно создать экономику, в которой к каждому участнику относятся справедливо, без того, чтобы его использовали в своих интересах те, у кого больше финансовых ресурсов."
 SOV_worker_controlled_unions: "Рабочие Профсоюзы"
 SOV_worker_controlled_unions_desc: "Профсоюзы необходимы для поддержания гармонии между процветающим государством и его рабочим классом. Однако они часто подпадают под влияние капиталистических интересов или погрязают в бюрократической летаргии. Это должно измениться. Будут созданы новые профсоюзы, членство в которых будет активно поощряться. В отличие от многих других, эти профсоюзы будут иметь прямую связь с правительством."
 SOV_educate_the_nation: "Просвещение Народа"
 SOV_educate_the_nation_desc: "Россия - страна блестящих умов, многие из которых часто остаются незамеченными. Правительство Жириновского не обращало внимания на студентов из небольших городов и регионов, отдавая предпочтение студентам из более богатых и крупных регионов. Новая образовательная реформа направлена на восстановление старой системы и привлечение молодежи со всей страны в престижные университеты, что поможет им построить лучшее будущее для России."
 SOV_enshrine_slutsky_thought: "Закрепить Мысль Слуцкого"
 SOV_enshrine_slutsky_thought_desc: "Слуцкий - достойный продолжатель идей Жириновского. Он обогатил философию ЛДПР новыми смыслами и программами, которые развивают политику основателя партии и делают её понятной для простых граждан. Важно, чтобы программные установки Слуцкого были доступны и понятны не только членам партии, но и всем, кто разделяет его видение будущего России. Вместе мы сможем реализовать амбициозные планы, которые озвучивали Владимир Жириновский и Леонид Слуцкий, и построить страну, о которой они мечтали." 
 SOV_cabinet_of_patriots: "Правительство Патриотов"
 SOV_cabinet_of_patriots_desc: "На первых всероссийских выборах после гибели великого Владимира Жириновского победил неожиданный кандидат. Денис Пушилин, бывший лидер ДНР, а ныне президент России с самого начала виделся тёмной лошадкой. Однако благодаря своим призывам к общероссийскому патриотизму и обещаниям «вернуть стабильность» ему всё таки удалось завоевать доверие жителей России. Особенно удачным на удивление оказался лозунг «Мы Можем Многое!». Впрочем сейчас не время почивать на лаврах. Денис Пушилин планирует реструктурировать систему Жириновского во что-то более напоминающее  систему путинской России. В любом случае, время приниматься за работу!"
 SOV_embrace_big_tent_politics: "Принять Политику Зонтичной Партии"
 SOV_embrace_big_tent_politics_desc: "Какая разница левый ты или правый если ты патриот своего отечества? Неужели люди,  искренне радеющие  за своё отечество, должны грызться друг с другом и конфликтовать из-за немного отличающихся взглядов? Скажем «нет» надуманному фракционализму и разделению. В нашей партии найдётся место каждому."
 SOV_saddle_the_opposition: "Оседлать Оппозицию"
 SOV_saddle_the_opposition_desc: "Оппозиция это правильно для государства и нужно. Плюрализм мнений, демократия и вот это вот всё. Но ещё лучше если эта самая оппозиция… сговорчива. Не поймите неправильно, критика нужна и важна для государства. Просто лучше когда эти самые критикующие не переходят рамок, и не пытаются разрушить сам фундамент на котором стоит страна."
 SOV_reliable_tsentrizbirkom: "Надежный Центризбирком"
 SOV_reliable_tsentrizbirkom_desc: "«Не важно как голосуют, важно как считают», неизвестно кто именно произнёс эту фразу в своё время, кто-то приписывает её Сталину. Однако суть этой цитаты верная. Кто знает, какие манипуляции могли происходить на выборах и референдумах прошедших в прошлом? Для того чтобы не допустить таковых манипуляций в будущем нам потребуется провести серьезные перестановки в Центризбиркоме. Конечно же  это всё для того чтобы результаты всегда были максимально корректными."
 SOV_systematize_russian_militia_duty: "Систематизировать Обязанности Ополчения"
 SOV_systematize_russian_militia_duty_desc: "Ополчение очень хорошо послужило на пользу нашему государству во времена войны на Донбассе и очень удивительно что в самой России данная тактика начала продвигаться только во время войны с НАТО, причём очень скомканно и достаточно неэффективно. Пришло время систематизировать российское ополчение и создать мощный каркас для данной инициативы."
 SOV_trumpet_of_the_state: "Рупор Государства"
 SOV_trumpet_of_the_state_desc: "СМИ всегда были невероятно важным инструментом, не зря их всё-таки называют пятой ветвью власти иногда. Именно поэтому все граждане нашей страны должны знать о наших успехах! Телевидение, газеты, новостные издания в интернете. Всё это будет вещать о том как же хорошо жить в нашей стране. И почему европейские страны даваться слюной от зависти и желают нас уничтожить!"
 SOV_new_towers_of_kremlin: "Новые Башни Кремля"
 SOV_new_towers_of_kremlin_desc: "Как бы то ни было а заставить всех людей следовать единой линии партии  невозможно. В том числе и в правительстве.  Разные влиятельные люди будут прибиваться к единомышленникам, организовывать группировки и даже конфликтовать с соперниками. С другой стороны это позволяет политической жизни нашей стране не стоять на месте. Подковерная борьба может и кажется чем-то плохим на поверхности, но в действительности это лишь закономерный итог развития нашей политической системы."
 SOV_prioritize_mvd: "Усилить МВД"
 SOV_prioritize_mvd_desc: "Недавние события, произошедшие после гибели Владимира Вольфовича преподали нам один очень неприятный но важный урок. Если вдруг мы отвлечемся, упустим из взора предателей и прочих террористов то без сомнения вся наша система пойдёт прахом. Чтобы этого не допустить,  нужно обеспечить стабильность, в особенности, внутреннюю с чем нам и поможет МВД. Увеличение бюджета и полномочий им уж точно не повредят."
 SOV_glorify_military_service: "Прославлять Военную Службу"
 SOV_glorify_military_service_desc: "Солдаты, бравые военные что несмотря на все тягости видят своё призвание в защите интересов нашей необъятной родины. Может ли любое уважающие себя государство оставлять таких людей на обочине жизни? Конечно нет! Быть солдатом должно быть престижно, уважение сограждан с одной стороны и льготы от государства с другой. Тем более что таким образом мы сможем привлечь к этой нелёгкой службе больше людей."
 SOV_sovereignty_above_all: "Суверенитет Превыше Всего"
 SOV_sovereignty_above_all_desc: "Любая страна существует лишь когда она независима. Если государство не может жить без торговли с кем-то, надеется на чьи-то вооруженные силы или в самом запущенном случае не может вести свою собственную внешнюю политику, то это не страна. Это сырьевой придаток или обособленный рынок сбыта а не страна. Не такого будущего мы хотим для России и поэтому в нашем государстве его суверенность будет на первом месте!"
 SOV_favor_novorossiyan_personnel: "Симпатизировать Новороссийским Чиновникам"
 SOV_favor_novorossiyan_personnel_desc: "Новоросские чиновники лучше других проявили себя что во времена борьбы за независимость, что во время Европейской войны. И поэтому было неправильно оставлять их исключительно в Новороссии. Тем более что столкновения ястребов и реформистов оставили нам некоторый простор для действий в этом плане. Так почему бы нам не продвинуть проверенных, грамотных и лояльных людей?"
 SOV_truly_national_government: "Подлинно Национальное Правительство"
 SOV_truly_national_government_desc: "Народ России сделал свой выбор - страну возглавит Роман Юнеман и его Общество.Будущее. Они поведут Россию к идеалу национальной демократии методами реформ и модернизации. Впереди много работы, и приступить к ней необходимо как можно скорее. \nНовое руководство страны намерено изменить отношения между обществом и государством, выстраивая прозрачные методы управления и сильную гражданскую культуру. Внимание будет уделено реформам федеральной системы и развитию отечественной армии. \nРоссия вступает в эпоху перемен - уверенно, с достоинством и с верой в собственные силы."
 SOV_uphold_the_russian_world: "Отстаивать Русский Мир"
 SOV_uphold_the_russian_world_desc: "Главная ценность России - это её великий, многогранный народ. И Россия должна защищать интересы своего народа независимо от того, где он находится - в стране или вне её пределов. \nРоссия была, есть и будет главным гарантом безопасности русского мира - всех, кто говорит на русском языке, чтит нашу культуру и разделяет общие ценности. Поддержка соотечественников за рубежом, защита их прав и достоинства, укрепление национального единства - всё это неотъемлемая часть национальной политики.\n В мире, полном вызовов и перемен, Россия остаётся опорой для всех, кто чувствует её частью себя."
 SOV_russia_first: "Russia First"
 SOV_russia_first_desc: "Россия и её граждане - главный приоритет нашей политики. Именно здесь, внутри нашей страны живет нация. Интересы России и благополучие её населения стоят выше любых внешних факторов и абстрактных понятий.\nГосударство должно заботиться прежде всего о тех, кто живёт и трудится на её земле, платит налоги, растит детей и строит будущее. Россия - это не размытие границ и не призрачное единство, а сильная, самостоятельная страна со своими людьми, своей культурой и своей судьбой.\nРоссия - прежде всего"
 SOV_popularize_party_ideology: "Популяризировать Национальную Демократию"
 SOV_popularize_party_ideology_desc: "Мнение граждан России о её политике и курсе неоспоримо важно. Именно голос народа должен быть решающим фактором в определении приоритетов и выборе направления развития страны.\nПод эгидой идей равенства и свободы мы будем укреплять основы общественного согласия, воспитывая в людях чувство неравнодушия за судьбу своей страны. Идеи национальной демократии станут опорой нового общественного устоя, где каждый будет услышан, а ценность личности - признана.\nГражданская ответственность- путь к процветанию страны."
 SOV_modernize_russian_armed_forces: "Модернизировать Армию России"
 SOV_modernize_russian_armed_forces_desc: "Российской демократии нужна надёжная защита. И на протяжении всей истории именно армия была главным гарантом безопасности и стабильности государства.\nСегодня, когда страна движется по пути перемен, реформа армии должна быть такой же важной, как и другие преобразования. Армия должна соответствовать времени, быть эффективной, профессиональной и уважаемой - как внутри страны, так и за её пределами.\nНовой России - новая армия, способная отвечать на любые вызовы с достоинством и честью."
 SOV_strelkov_state: "Государство Стрелкова"
 SOV_strelkov_state_desc: "Русский народ всегда хорошо помнит имена своих героев. Именно поэтому, когда Игорь Иванович объявил о своём в участии во всероссийских выборах их исход сразу же был ясен. Откровения не последовало и теперь Стрелков вместе со своей партией под названием «Союз Воинствующих патриотов». Пришло время Игорю Ивановичу оправдать доверие русского народа и сделать Россию поистине великой!"
 SOV_all_russian_militia: "Всероссийское Ополчение"
 SOV_all_russian_militia_desc: "История того, как русские люди брали защиту своих домов и отчизны в свои руки, встречается в русской истории более чем часто. Оба ополчения в Смутное время, партизаны в Великую Отечественную, восстания Народных республик после переворота на Украине. Тем более удивительно, что правительство России никогда не пыталось превратить это в силу и всячески давило подобные низовые инициативы и самоорганизацию. Пришло время исправить это! Отныне жители России будут получать все ресурсы для самоорганизации и защиты своих домов."
 SOV_new_patriotic_army: "Новая Патриотическая Армия"
 SOV_new_patriotic_army_desc: "Российская армия всегда была героями и богатырями XXI века, гордо стоя на страже интересов русского государства и русского народа. Однако годы развала, разброда и шатаний вытравили из нашей армии самое главное - идеологическую основу. Мало кто приходил в ВС РФ, чтобы исполнить свой гражданский долг. Либо государство насильно загоняло вчерашних школьников и тратило год их жизни, либо сюда заходили ушлые дельцы, что вступали в контрактную армию, чтобы заработать и получить социальные привилегии. Хватит! Пришло время переделать армию России в силу, что будет прививать солдатам любовь к отчизне."
 SOV_rulebook_of_russian_officer: "Устав Российского Офицера"
 SOV_rulebook_of_russian_officer_desc: "О, что стало с моралью нашей армии? Моральная деградация, разложение всякого рода. Куда же делись честь и достоинство бравых защитников империи? Однако это не значит, что нельзя обратить гниение вспять. И начинать возрождение нужно с самого главного - умов защитников отечества. Отныне каждый офицер должен будет назубок знать Устав Российского офицера, где будут перечислены все основы и советы для бравых стражей российских рубежей"
 SOV_russify_kiev: "Русифицировать Киев"
 SOV_russify_kiev_desc: "О, Киев! Что стало с тобой за годы разлуки с отчизной? Мать городов русских, попав в руки холопов, возомнивших себя властителями, стала жалким зрелищем. Весь дух старой Руси был тщательно вытравлен. К сожалению, виновные в таком тяжком грехе уже мертвы, и наказание настигнет их лишь в мире ином. Ну а нам, живым, остаётся лишь отстроить то, что было разрушено. На пепелище Украины воспрянет новая Россия. И совершенно новый Киев будет для всех знаком: «Россия здесь навсегда!»"
 SOV_russian_national_pride: "Национальная Гордость России"
 SOV_russian_national_pride_desc: "Чем гордится наш народ? Русские люди гордятся своей исторической памятью: не забыты и князья древности, и "птенцы гнезда петрова", и полководцы XIX-го века, и герои XX-го века, кровью отстоявшие свободу Отечества.\n\nРусский народ гордится своей землёй: необъятной и богатой всем, что нужно для счастливой жизни. Мы гордимся нашей культурой, нашей наукой!\n\nМы гордимся тем, что мы - русские!"
 SOV_the_moral_code_of_the_patriot: "Моральный Кодекс Патриота"
 SOV_the_moral_code_of_the_patriot_desc: "Одной из главных проблем нашей страны является достаточно аполитичное население. Даже несмотря на все старания как путинской, так и России Жириновского, большая часть населения остаётся равнодушной к нашей власти.\n\nВсё начинается с малого, поэтому каждый школьник в нашей стране с этого времени будет обязан вступить в Юнармию и знать наизусть заботливо составленный "Кодекс Патриота" - свод правил и заповедей, по которым будет жить новое поколение россиян. В нём будут учить любить Родину, собирать автомат Калашникова и другим полезным для будущих воинов навыкам, а также любить и быть готовым отдать жизнь за Вождя."
 SOV_russian_national_red_army: "Национальная Красная Армия"
 SOV_russian_national_red_army_desc: "Современная российская армия - это по большей части аполитичная структура, не имеющая какой-либо окраски и присягающая на верность стране, а не идеям. В новой реальности иметь подобную слабо контролируемую структуру чревато последствиями.\n\nПоэтому Вооружённые Силы будут преобразованы в Национальную Красную Армию - наследницу и императорской, и советской армий. Вместе с переименованием в структуру армии вводятся "специалисты по политической работе", являющие собой нечто наподобие советских политруков. Армия должна защищать интересы русского трудового народа!"
 SOV_the_leader_order: "Наказ Вождя"
 SOV_the_leader_order_desc: "История России полна сильных личностей, вокруг которых консолидировалась страна: Пётр Великий, Екатерина Вторая, Иосиф Сталин и Владимир Путин - лишь наиболее яркие из них. И сейчас, когда над нами висит угроза второй войны, мы должны следовать приказам Вождя - как это делали наши предки много веков назад."
 SOV_together_to_greatness: "Вместе к Величию"
 SOV_together_to_greatness_desc: "История России - это история того, как каждая её итерация, будь она в виде Империи, советской власти или федерации, всеми силами старалась отрицать предыдущую. Конечно, с приходом к власти Владимира Владимировича Путина был взят курс на примирение русской истории, но он так и не довершил дело до конца. Дальнейшее правление Владимира Вольфовича лишь усугубило данную проблему.\n\nНеобходимо окончить раз и навсегда красно-белое противостояние, ведь неважно, за кого вы - за красных или за белых; важно лишь то, что мы все - русские, и лишние ссоры только мешают нашему стремлению к подлинно Великой России."
 SOV_militarist_vigor: "Милитаристское Рвение"
 SOV_militarist_vigor_desc: "Что есть империя без желания расширяться, завоёвывать и подчинять? Гниющий труп без амбиций, чьи славные деньки уже давно канули в Лету! Умные люди в пиджаках в своих кабинетах могут считать, что перо сильнее меча, однако это вздор! Только сила русского оружия способна защитить империю, обезопасить рубежи и принести славу как государю, так и самой державе! И пусть наш народ воздаёт славу защитникам и воинам! Пусть трубят горны войны, и все знают, что наш запал ещё не угас. Слава России! Героям отчизны слава!" 
 SOV_eternal_regency: "Вечное Регентство"
 SOV_eternal_regency_desc: "Россия пала в 1917 году, преданная собственным народом, она погрязла сначала в простолюдинском безграмотном управлении, а затем и в интернационалистическом безродном угаре. Все эти годы Распятый Государь глядел на своих подданных, в ужасе взирая на то, как величайшая империя мира гибнет от народной деспотии. Однако Государь и Бог не оставили Россию! С их помощью, пусть под гнётом красных дьяволов, она пронесла идею сквозь года, чтобы возродиться вновь. Последним шагом было бы возвращение монарха на престол. Но те, кто должны были бы защищать отечество, в итоге сами стали предателями, забыв о своей родине или даже встав на позиции, враждебные ей. Империя должна возродиться, но раз уж нет благородных людей, способных ею управлять, эта тяжкая ноша должна пасть на плечи регента. Игорь Иванович Стрелков будет править от лица вечного Императора Всея Руси, пока не появится достойный претендент на престол."
 SOV_idea_of_the_imeprial_republic: "Идея Имперской Республики"
 SOV_idea_of_the_imeprial_republic_desc: "Российская Империя безусловно была величайшим государством за всю историю человечества: невообразимый уровень культуры, мощнейшая армия и стремление обладать не только землёй, но и звёздами на небе. Однако те времена прошли уже давно. Монархии по всему земному шару одна за другой пали в трудные эпохи. И потерянного уже не воротишь. Так и Россия должна идти в ногу со временем. Народу уже не нужен благородный принц, чтобы вести их за собой. Теперь достаточно избранного народом, но всё так же всесильного и харизматичного лидера. Россия пробудится ото сна, и настанет новая революция, в этот раз против революции, когда-то её разрушившей!"
 SOV_adobt_new_military_doctrine: "Принять Новую Военную Доктрину"
 SOV_adobt_new_military_doctrine_desc: "Армия России, пусть и могущественна, но безнадёжно устарела за прошедшие годы. И речь идёт не о видах вооружения, что всегда были прорывными и давали фору разработкам других держав. Нет. Проблема армии нашего государства всегда была в военной доктрине и неумении пользоваться ресурсами необъятной родины. Обладая практически неисчерпаемым людским резервом и гигантским количеством железа, нефти и прочего, наша страна никогда не умела грамотно мобилизовать все эти ресурсы. Новая военная доктрина будет способна поставить экономику России на рельсы тотальной войны в кратчайшие сроки, и ни один враг не будет способен нам что-то противопоставить!"
 SOV_compulsory_military_education: "Обязательное Военное Образование"
 SOV_compulsory_military_education_desc: "Российское образование готовило не защитников родины. Углубляясь в гуманитарные науки, предоставляя отсрочки и прочие послабления для учащихся, наша страна воспитывала беглецов, что при первой возможности всеми силами попытались бы избежать защиты отчизны, даже бежав во враждебные страны. Необходимо это исправить в ближайшее время. Отныне каждый студент, школьник и доктор наук будут знать основы военного дела, познают дисциплину и поймут, почему защищать отчизну - это священный долг любого гражданина."
 SOV_new_loyal_okhranka: "Новая Лояльная Охранка"
 SOV_new_loyal_okhranka_desc: "Российские спецслужбы всегда были основой стабильности российской державы. Необходимо держать всяческих террористов и предателей отечества в ежовых рукавицах, чтобы они боялись поднять голову! Однако охранка порой сама готова примкнуть к противникам. Новое охранное отделение должно быть беспрекословно лояльно государству и лично правителю, чтобы не допустить повторения трагических событий распада империи."
 SOV_cult_of_russian_conquest: "Культ Русских Побед"
 SOV_cult_of_russian_conquest_desc: "История России богата на славные боевые страницы: от Суворова до Жукова, честь и слава русской армии маршируют через века. И сейчас у нас есть талантливые полководцы, победоносно разгромившие русофобов-европейцев. Мы должны пропагандировать славу русского оружия, нашу преемственность старым победам. Подвиги героев прошлого станут примером для бойцов настоящего и будущего!"
 SOV_the_guiding_star: "Путеводная Звезда"
 SOV_the_guiding_star_desc: "Россия в очередной раз в своей истории поднимается с колен, и всё благодаря чуткому руководству Дмитрия Олеговича. Наш Великий Лидер Рогозин укрепляет и развивает успехи Путина и Жириновского, верно следует их заветам.\n\nЕго работы изучаются в школе, в университетах и на рабочих местах. Безусловно, учение Дмитрия Рогозина будет являться основой Российского государства на годы вперёд!"
 SOV_iron_fist_of_the_state: "Железный Кулак Государства"
 SOV_iron_fist_of_the_state_desc: "Сейчас не время для различных игр в кошки-мышки с подрывными элементами. Старая система конкурирующих между собой силовых структур со схожими полномочиями безнадёжно заиндевела, сделала нас только слабее.\n\nБыло бы логичным окончательное решение данной проблемы: централизация. Комитет Народной Безопасности совместит в себе функции погранслужбы, МВД и государственную безопасность с практически безграничными полномочиями. Ни о какой пощаде к врагам русского трудового народа и речи быть не может!"
 SOV_subversive_action: "Подрывные Действия"
 SOV_subversive_action_desc: "Нам не обязательно арестовывать всех наших противников. Более того, данная тактика может нам аукнуться в долгосрочной перспективе, как случилось с чистками 37-38го годов.\n\nМенее эффективным сейчас, но более желаемым потом решением для проблемы различных "демократов" может послужить работа с населением. Из каждого телевизора и громкоговорителя будет подаваться правильная информация, и ничего, кроме неё. Мы выбьем землю из-под ног врагов нашей власти.\n\nА для самых ретивых у нас есть наши силовые структуры."
 SOV_favor_the_russian_proletariat: "Благоволить Русскому Пролетариату"
 SOV_favor_the_russian_proletariat_desc: "Современная Россия - страна, где ручной труд совершенно не в почёте. Из-за влияния Запада дети мечтают стать не инженерами и врачами, а бизнесменами и прочими сугубо капиталистическими элементами. А из-за чего это произошло?\n\nБлагодаря действиям преступной власти Ельцина и его разграблению страны, названным "приватизация", Россия утонула в жажде лёгких денег. Да и к тому же дешёвая рабочая сила из стран Средней Азии окончательно добила русский пролетариат.\n\nМы исправим данное положение: улучшенное соцобеспечение, повышенные зарплаты и другие блага сделают престиж рабочих профессий запредельным!"
 SOV_reawaken_consciousness: "Пробудить Самосознание"
 SOV_reawaken_consciousness_desc: "В чём заключается связь между токарем из Новокузнецка и офисным планктоном из Москвы, кассиршей из Владивостока и учителем из Минска? Их всех объединяет принадлежность к русскому народу, к русской культуре.\n\nРоссия на протяжении истории укреплялась под давлением: монгольское иго, Смута, Война 1812-го года, Великая Отечественная - наше отечество в едином порыве поднималось на борьбу с захватчиками. Европа готовится к реваншу, и нашему народу нужен лишь небольшой толчок сверху, дабы поднять его на борьбу!"
 SOV_deepen_the_reforms: "Углубление Реформ"
 SOV_deepen_the_reforms_desc: "Чтобы Россия уверенно двигалась вперёд, ей необходимо меняться своевременно. История показывает, что сила страны всегда рождалась в моменты обновления - когда общество, власть и культура находили в себе смелость меняться.\nКак когда-то Пётр I открыл для России новые горизонты, сегодня мы также начинаем новую главу - через продуманные и глубокие преобразования в политике и экономике.\nРоссия будет идти вперёд - обновлённой и готовой к будущему." 
 SOV_devolve_the_ministries: "Передать Управление Министерствами"
 SOV_devolve_the_ministries_desc: "Для дальнейшего развития и движения вперёд государству необходима глубокая модернизация не только институтов, но и принципов управления. Один из ключевых шагов на этом пути - пересмотр бюрократической системы.\nКогда управление обрастает излишней формальностью, под тяжестью бумаг теряются по-настоящему важные инициативы, снижается эффективность, гасится инициатива перемен. Это тормозит прогресс и мешает России раскрыть свой потенциал.\nЧтобы Россия могла уверенно идти вперёд, необходимо сделать систему гибкой и ориентированной на результат. Время действовать - открыто и без промедлений."
 SOV_encourage_local_democracy: "Поощрять Местную Демократию"
 SOV_encourage_local_democracy_desc: "Кто сказал, что демократия должна существовать только на общенациональном уровне? Подлинное народовластие начинается с повседневной жизни - с улицы, района, города.\nУкрепление участия людей в делах местного значения - важный шаг к справедливому будущему. Это не только создаёт защиту от произвола местных чиновников, но и формирует чувство личной значимости у каждого. Люди должны видеть: их мнение не игнорируется, их участие - не формальность.\nДемократия - это не событие раз в несколько лет, а постоянный диалог. Каждый голос имеет значение. Каждый голос должен быть услышан." 
 SOV_protecting_russia_from_extremism: "Защитить Россию От Экстремизма"
 SOV_protecting_russia_from_extremism_desc: "Иногда, ради защиты граждан и сохранения государственного устройства, необходимо ограничивать отдельные свободы. Это вовсе не является отказом от демократии и не умаляет значение мнения народа - напротив, именно ради безопасности общества и его стабильного развития принимаются такие меры.\nСвобода не может служить прикрытием для разрушения. Настоящая демократия - это не хаос, а порядок, где у каждого есть право голоса, но и общие правила уважаются всеми."
 SOV_shining_beacon: "Сияющий Маяк"
 SOV_shining_beacon_desc: "На протяжении всей своей истории Россия была одним из ключевых центров европейской и мировой цивилизации - культурным, духовными политическим ориентиром. Она всегда сохраняла способность оставаться опорой в периоды перемен и потрясений, находя в себе силу идти вперёд и помогать другим.\nСегодня, в свете новых вызовов, именно Россия способна вновь стать тем ориентиром, за которым пойдут народы, стремящиеся сохранить суверенитет и защитить свое будущее.\nРоссия будет нести этот свет надежды, стойкости и веры в завтрашний день. Тот самый свет, который особенно нужен тогда, когда мир сталкивается с непростыми испытаниями."
 SOV_russian_civilization_renewed: "Перерождение Русской Цивилизации"
 SOV_russian_civilization_renewed_desc: "Тот момент, к которому мы так долго шли, настал. Россия воспрянула во всём своём величии, обретя силу, которой не имела прежде.\nСегодняшнее российское общество наглядно демонстрирует, как принципы национальной демократии могут работать по-настоящему эффективно. Это - новый тип общественного устройства, основанный на уважении к традициям и ясной устремлённости в будущее.\nПерерождение России - это революция во имя соответствия духу времени и построения новой цивилизации."

 SOV_consolidate_russian_society_desc: "\n\n\n\n\n£GFX_SOV_consolidate_russian_society_banner\n\n\n\n\nПовержен будет этот змей,\nНас много больше - мы сильней, \nБойцы великой, новой армии российской.\nНас ждёт всех рай, а их всех ад,\nСказал верховный наш комбат.\nГерои Z Чечни, Тувы, Москвы, Харцызска.\nГерои Z Читы, Ростова и Норильска.\nГерои Z из Севастополя, Каспийска."

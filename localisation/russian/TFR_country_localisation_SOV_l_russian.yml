 SOV_award_zolotov_loyality_desc: ""
 SOV_benevolent_fist: "Шелковый Кулак"
 SOV_benevolent_fist_desc: "Не может быть сильного государства при слабой власти! Если управляющие неспособны внушить своим подопечным страх то они не способны править державой! С другой стороны если страх это единственное что правитель способен вызвать то это также является символом деградации режима. Владимир Вольфович был громким и грубым политиком, но при этом он искренне любил русский народ и поощрял людей любящих своё Отечество. Точно так же должны делать и мы, продолжатели его идей. Бить кулаком всех противников русского народа, но при этом быть мягкими к патриотам." 
 SOV_zhirinovsky_our_father: "Жириновский - Наш Отец"
 SOV_zhirinovsky_our_father_desc: "Сложно переоценить роль Жириновского в становлении русской нации. При прошлых режимах мы боялись носить традиционные наряды, быть религиозным человеком было чем-то постыдным, а русский язык отходил на второй перенимая всё больше из других. Однако Владимир Вольфович изменил это. Словно Ататюрк для Турции или Юзеф Пилсудский для Польши, Жириновский собрал все наши традиции, нашу веру и наши обычаи и создал из них идентичность которой мы гордимся и по сей день.\nФактически Владимир Жириновский стал фигуральным отцом нашей нации. За что мы ему и благодарны!"
 SOV_limit_minority_privileges: "Ограничить Привилегии Меньшинств"
 SOV_limit_minority_privileges_desc: "Страшно подумать, но в конституции Российской Федерации не было и слова о русском народе! Какой-то многонациональный народ какой-то там страны. Местные ставленники коррумпированной партии ставили в регионы своих подхалимов, раскармливавших своих друзей-сепаратистов и бузотеров. Даже русские дети в так называемых "национальных республиках" были вынуждены учить язык местного народа наряду с русским. Нельзя назвать это никак иначе кроме, закладывания мины под русскую идентичность. Отныне в образовании языки меньшинств будут закреплены исключительно как факультативные дисциплины,  а их одежды и традиции отойдут на второй план. Никто не запрещает им быть татарами, башкирами и кем угодно. Лишь бы они не забывали что живут в русском государстве." 
 SOV_religious_ideals: "Религиозные Идеалы"
 SOV_religious_ideals_desc: "Православие всегда было одним из столпов русской государственности. Наши люди были религиозными и свято чтили заветы святых отцов. Всё это, конечно, пострадало в результате смут свалившихся на нашу отчизну. Однако наш народ всегда хранил в себе ту самую частицу, заложенную в русском народе Богом.\n\n Пришло время нам снова принять роль народа-богоносца. Храмы и святые места должны вновь стать посещаемыми местами. А традиции смирения и искренности стать неотъемлемыми частями жизни наших граждан."  
 SOV_long_live_the_empire: "Да Здравствует Империя"
 SOV_long_live_the_empire_desc: "Кто-то считает, что Российская Империя погибла в 1917 году вместе с монархией, убитая большевиками. Чушь! Русский народ пронёс в своем сердце имперские идеи вплоть до 21 века. Вместе мы смогли восстановить дух империи. Вместе мы возродили великую Россию. Вместе мы сделали невозможное! И сделаем ещё больше! Пока жива наша держава и пока наш народ един мы непобедимы. Да здравствует империя! Слава России!" 
 SOV_new_russian_indentity: "Новая Русская Идентичность"
 SOV_new_russian_indentity_desc: "Русская культура пережила упадок во времена правления красных террористов. Наши одежды были запрещены и заменены европейской модой. Наша классическая литература была заменена футуристическим мусором, а наши традиции смешали с грязью. Пусть правительство Федерации формально что-то делало с этим, их действий было недостаточно. Хватит это терпеть! Пришло время русской культуре воспрянуть вновь! Отныне наши люди не будут стыдиться своих одежд и языка. Десятки культурных фестивалей получат поддержку, многие  писатели получат финансирование. Русская культура вновь станет великой!" 
 SOV_cultural_dominance: "Культурное Господство"
 SOV_cultural_dominance_desc: "Глупо было бы считать, что в русском государстве главенство может принадлежать какому-то народу, кроме русских. Всякие сепаратисты, "униженные меньшинства"  и прочие идиоты готовы с пеной у рта доказывать что Россия должна учитывать именно их потребности. Но пусть они оглянутся вокруг. Они ли построили все эти города? Оно ли создали великую державу и проливали кровь за её право существовать? Думаю, ответ всем очевиден! Пусть они подчиняются нашим законам, и мы не будет трогать их и их архаичные образы жизни. Впрочем если они захотят что-то изменить то мы точно так же будем готовы принять их в нашу русскую общность. Если, конечно, докажут во время экзаменов что действительно способны интегрироваться в наше общество." 
 SOV_to_protect_the_motherland: "Защищая Родину"
 SOV_to_protect_the_motherland_desc: "Бессмысленные дебаты и бесконечные препирательства, в то время как внешний мир подстраивается под наш марш к господству?\nЭтого больше нельзя терпеть, после смерти Жириновского партия начала медленно разрушаться под тяжестью раздутых эго и бесполезной закулисной политики, к счастью, военные готовы приставить метафорический и буквальный пистолет к их головам, чтобы они просто заткнулись. \nБольше никаких тупиков, никаких препятствий, Виктор Золотов возьмет бразды правления Родиной в свои руки, чтобы не допустить ее возвращения в эпоху застоя." 
 SOV_militarization_of_society: "Стабилизировать Ситуацию"
 SOV_militarization_of_society_desc: "Когда Золотов выводил свою Национальную гвардию из казармы, он уже предчувствовал, что его ждет. Став преемником Жириновского, этот ветеран - ныне дирижер "симфонического оркестра" России - оказался в ситуации, более опасной, чем любой правитель в истории России, пришедший к власти после "великого". Чтобы укрепить свою власть, ему придется идти на сложные компромиссы. Должен ли он прислушаться к пожеланиям своих товарищей, которые поддерживали его в трудную минуту, и возглавить великую империю в качестве "первого солдата" России? Или же ему следует прислушаться к шепоту, раздающемуся в залах Кремля, и восстановить "республиканский строй", от которого зависит выживание и привилегии российской элиты? Независимо от того, какой путь он выберет, одно можно сказать наверняка: Золотов должен выполнить свою миссию с непоколебимым мужеством и силой воли, неподвластной никаким бурям." 
 SOV_army_with_empire: "Военный Статизм"
 SOV_army_with_empire_desc: "Орудуя мечом, Золотов бесстрашно сражается с теми, кто осмеливается оспаривать его власть и достоинство матушки-России. Теперь, как "победоносный генерал", он сделал свой выбор. Он встанет в один ряд со своими братьями по оружию, стремясь к вечной славе России. При предыдущем лидере российская экономика подверглась серьезной трансформации, чтобы ответить на вызовы войны, что привело к глубоким изменениям на всех уровнях общества. Все, что было связано с солдатами и военными, стало неотъемлемой частью русской жизни. Задача Золотова - объединить политическую арену России с военной мощью, чтобы присутствие армии ощущалось в каждом уголке страны."
 SOV_shepard_with_sheep: "Res Publica Restituta"
 SOV_shepard_with_sheep_desc: "В окружении элегантных джентльменов в костюмах генерал Золотов в серо-зеленой военной форме тепло пожимает руки восторженным политикам. Перед вспышками фотокамер он демонстрирует самообладание и великодушие, ожидаемые от благосклонного правителя. Что бы ни думали втайне эти проницательные политики о том, что высшим руководителем России станет военный офицер, власть Золотова неоспорима и будет только крепнуть. Генерал решил стать Брутом и Цинциннатом "Третьего Рима", восстанавливая российский политический порядок и гражданское общество, разрушенные в бурные последние годы борьбы Жириновского за власть. На этой израненной русской земле под его руководством будет создано настоящее "народное государство"." 
 SOV_national_guard_supremacy: "Главенство Национальной Гвардии"
 SOV_national_guard_supremacy_desc: "Кто постоянно следит за теми, кто скрывается в тени и своими злыми намерениями угрожает стабильности режима? Кто неустанно защищает благополучие и покой российского народа? Кто решительно борется с враждебными силами, когда они посягают на суверенитет и территориальную целостность России? Национальная гвардия внесла огромный вклад в становление Российской империи и торжество ее национальной мощи, а кровь, пролитая ее мучениками, запятнала воды Балтийского моря. В результате с восхождением генерала Золотова на высший руководящий пост в России статус Национальной гвардии взлетит до небес. Ее элитные командиры будут выдвигаться на высшие государственные посты или в высшее командование вооруженных сил. Ее военные доктрины и принципы будут служить компасом, направляющим формирование нового российского общества. Национальная гвардия станет политическим и нравственным образцом для будущего российского народа." 
 SOV_iron_russia: "Железная Россия"
 SOV_iron_russia_desc: "Когда Август передавал Римскую империю своему преемнику, он с гордостью заявил: "Я получил Рим как город из кирпича, я оставляю его тебе как город из мрамора". Так и Золотов, как новый хозяин "Третьего Рима", стремится развить грандиозное наследие, оставленное Жириновским. Он хочет, чтобы, когда он передаст его своему преемнику, это было сделано с гордостью. Золотов смотрит за пределы страны, где враждебность к русской родине остается повсеместной, постоянно угрожая сердцу русского народа. Если вы думаете, что Золотов будет безучастно наблюдать за страданиями русского народа, то вы ошибаетесь. Золотов твердо намерен превратить Россию в неприступную крепость. В его представлении каждый гражданин России станет непоколебимым защитником Родины, а он сам - воплощением идеального русского духа." 
 SOV_new_system_protected: "Новая Система Защищена"
 SOV_new_system_protected_desc: "Политическая система - одно из самых сложных и противоречивых изобретений человечества. Временами она проникает в страну, как щупальца осьминога, питая свой собственный рост, а не укрепляя нацию или служа счастью народа. Однако система также напоминает ствол и корни сосны, обеспечивая прочный фундамент, который поддерживает неуклонный прогресс нации.\nПеред лицом серьезных вызовов, стоящих перед Родиной, Золотов понимает, что должен смотреть дальше Кремля. Он ищет решения проблем страны и пути в будущее, преодолевая досадные слои разделения между лидером и народом.\nКак главный представитель военных, самая важная опора российского режима, Золотов будет сотрудничать с гражданским правительством и Государственной думой, контролируемой депутатами от Либерально-демократической партии. Вместе они будут строить сильную Россию на фундаменте, заложенном Жириновским." 
 SOV_zhirinovsky_our_generalissimo: "Жириновский - Наш Генералиссимус"
 SOV_zhirinovsky_our_generalissimo_desc: "Владимир Жириновский - великий вождь, гениальный полководец, благожелательный отец нации и путеводный свет, память о котором россияне не должны забывать никогда. Генерал Золотов планирует еще больше укрепить власть нового центрального правительства под своим руководством. Люди с нежностью вспоминают благополучные времена правления Жириновского, когда страна процветала, а русская армия была непобедима на поле боя. По мере того как стихают последствия смены власти, народ возлагает надежды на возрождение процветания на Золотова. И хотя задача по восстановлению процветания трудна и затяжна, мы можем эффективно использовать народные ожидания. Под руководством Золотова мы проведем торжественные церемонии чествования Жириновского, посмертно присвоив ему звание "Генералиссимус". В то же время мы представим Золотова как законного хранителя наследия Жириновского и лучшего кандидата, который поведет нас вперед." 
 SOV_glory_of_imperial_guard: "Слава Императорской Гвардии"
 SOV_glory_of_imperial_guard_desc: "Согласно приказу Золотова, наиболее отличившиеся части Национальной гвардии получат почетное звание "Императорская гвардия". Министр обороны лично вручит командирам этих подразделений флаг с портретом Жириновского.\nУчреждение "Императорской гвардии" еще больше поднимет престиж Национальной гвардии в России. Бесчисленное множество молодых россиян привлекают их суровый и решительный нрав, профессиональные способности и характерная форма с красным беретом. На местных призывных пунктах в Национальную гвардию сыпятся прошения о вступлении.\nНаблюдая за ростом заветных подразделений, Золотов решил продолжить работу. Проводя грандиозные парады, вводя специальные медали в честь Дня национальной гвардии, расширяя функции подразделений за счет операций, выходящих за рамки традиционной охраны, Национальная гвардия во главе с "Императорской гвардией" принесет еще большую славу эмблеме Вооруженных сил России - двуглавому орлу." 
 SOV_civic_military_cooperation: "Гражданско-Военное Сотрудничество"
 SOV_civic_military_cooperation_desc: "Специализированная подготовка солдат в сочетании с коллективистской атмосферой в подразделениях помогает им стать более продуктивными членами семьи и общества после выхода в отставку. Этот принцип подтверждается на протяжении многих лет в милитаризованном российском обществе. Будучи верховным лидером и "первым солдатом" России, Золотов понимает, как укрепить связь между военными и обществом. С ростом своей власти и престижа Золотов начал выступать за более глубокую военно-гражданскую интеграцию. Технологические достижения гражданских компаний будут лучше применяться в военном строительстве. Кроме того, военные инновации будут подтверждаться и перениматься гражданским сектором. Кроме того, обмен персоналом станет более частым. Многие талантливые офицеры пополнят инженерные коллективы, ледокольный флот, геологоразведочные подразделения и другие важнейшие отрасли национального развития. Золотов твердо уверен, что под его руководством российский народ станет жить лучше." 
 SOV_the_heart_of_motherland: "Сердце Родины"
 SOV_the_heart_of_motherland_desc: "Теперь генерал Золотов сосредоточился на центральном регионе нашей страны, сердце русской цивилизации. Чтобы двигать необъятные просторы матушки-России, необходимо сильное и здоровое сердце - именно на этом сосредоточен следующий план дальновидного генерала.\nЗолотов считает, что, превратив эту землю в истинное сердце России, империя сможет сохранить свое господство на протяжении всего XXI века.\nЗолотов и его товарищи тщательно разработали план, не просто повторяющий прошлые модели строительства, а представляющий собой всеобъемлющее движение за возрождение. Его цель - возродить российскую нацию - ее население, культуру и идеологию, сделав ее истинной наследницей как восточной, так и западной цивилизаций на евразийском континенте."
 SOV_zolotov_zhirinovsky_most_loyal_warrior: "Золотов - Самый Верный Воин Жириновского"
 SOV_zolotov_zhirinovsky_most_loyal_warrior_desc: "Как военный, Виктор Васильевич Золотов совершил подвиги, немыслимые для его предшественников. Он унаследовал наследие своего предшественника и успешно его развил. Он отстоял имперскую гегемонию России и использовал этот фундамент для переосмысления ее ценностей и создания новой формы цивилизации. На фоне величия и народных похвал генерал скромно утверждает, что его достижения всегда следовали долгосрочным планам, намеченным Владимиром Вольфовичем. Он подчеркивает, что его действия всегда соответствовали видению великого "Верховного правителя". Смирение генерала еще больше расположило его к народу, переплетая имя Золотова с именем Жириновского. Когда владычество России перейдет к будущим поколениям, а ее народ возвысится, Золотов и Жириновский будут вечно почитаться как творцы этих монументальных достижений." 
 SOV_the_honor_of_officers: "Офицерская Честь"
 SOV_the_honor_of_officers_desc: "Армия без руководства офицеров подобна телу без мозга и нервной системы - это безжизненная куча плоти. Это было наглядно продемонстрировано на примере российских вооруженных сил. Когда родина была охвачена смутой и хаосом, офицерский корпус также пришел в упадок, что привело к повсеместной неразберихе, разгулу контрабанды, воровству и внутренним конфликтам.\nКак один из ветеранов, вышедших из этого периода упадка, Золотов твердо намерен, чтобы такая ситуация больше никогда не повторилась в России. Он стремится решить проблему в корне, обеспечив сохранение офицерского корпуса как "государства в государстве", неспособного оказывать негативное влияние на политику, но при этом выступающего в роли верховного надзирателя и хранителя порядка в грандиозном политическом ландшафте России. Офицерский корпус станет символом врожденного превосходства, в результате чего его власть и сила станут еще более грозными и внушающими благоговение." 
 SOV_soldiers_state: "Государство Солдат"
 SOV_soldiers_state_desc: "В России самый уважаемый образ обычного человека - это не ученый, не художник, не богатый купец. Скорее, это непритязательный солдат, одетый в военную форму и имеющий при себе штатное оружие, который выделяется среди масс. Именно из этих бесчисленных солдат вышли великие лидеры современной России. Их жертвы обеспечили процветание страны.\nЗолотов приложил немало усилий для повышения статуса военных, и теперь, в результате, он может предложить перспективное будущее тем солдатам, которые проливали кровь за Россию. Каждый ветеран, отслуживший и внесший свой вклад, получит всестороннюю поддержку, включая трудоустройство, медицинское обслуживание и общее благополучие. Кроме того, в связи с расширением армии ветеранов часто призывают обратно, чтобы они служили инструкторами, находя новую цель в любимой армии.\nПо мере того как общество постепенно признает их вклад, эти герои однажды станут иконами российской нации." 
 SOV_citizen_militarization: "Гражданская Военизация"
 SOV_citizen_militarization_desc: "Чего больше всего боятся слабые оппозиционеры и те, кто все еще верит, что Либерально-демократическая партия может отказаться от власти? Конечно же, перспектива того, что милитаризованный образ жизни станет нормой для всего общества. Они окажутся в окружении настоящих русских патриотов, и их истинная сущность неизбежно будет раскрыта. Однако слишком радикальное превращение всей России в огромный военный лагерь было бы непродуктивным с точки зрения использования ресурсов и эффективности.\nЧтобы избежать этого, Золотов разработал постепенный план по интеграции каждого гражданина России в структуру Вооруженных сил РФ. Этот план - современная версия спартанского военного воспитания Древней Греции. Опора российского общества станет образцом боевого духа и профессионального мастерства, обеспечивая здоровое и упорядоченное развитие российского общества в ближайшие десятилетия." 
 SOV_cult_of_zolotov: "Культ Золотова"
 SOV_cult_of_zolotov_desc: "Любой здравомыслящий россиянин признает, что руководство Золотова в критический момент переломило судьбу страны, направив ее на путь возрождения и процветания. Без него любые разговоры о стабильности, порядке и прогрессе после смерти Жириновского были бы пустыми словами.\nТак что, помимо воспитания уважения и почтения к верховному лидеру у российского народа, мы организуем пропагандистские мероприятия, чтобы имя Виктора Золотова навсегда осталось в памяти наряду с величайшими деятелями российской истории. Тщательно проведенные общественные опросы позволят Золотову занять первое место в списке "100 величайших россиян". Мемориалы, посвященные его жизни, месту рождения и частям, в которых он служил, станут великими символами патриотизма. Кроме того, материалы, рассказывающие о выдающейся жизни Золотова, будут включены в школьные учебники, чтобы будущие поколения россиян были едины в своих убеждениях: Золотов - земное воплощение России." 
 SOV_empower_military_governors: "Расширить Полномочия Военных Губернаторов"
 SOV_empower_military_governors_desc: "Благодаря смелым и масштабным реформам мы добились того, что Россия постепенно трансформируется в то видение, которое мы хотим видеть. Устаревший термин "милитаризм" больше не является точным описанием нынешнего состояния России. Наши враги, возможно, хотели бы видеть Россию, ослабленную военным перевесом, как бывший СССР. Однако устойчивая военно-гражданская экономика, общественная ценность военной силы, дисциплинированная бюрократия и вооруженные силы служат яркими примерами успешности пути Золотова.\nВ дальнейшем он снимет все ограничения, чтобы полностью реализовать свое видение родины. Российская империя будет реорганизована, а ее территориями будут управлять несколько военных губернаторов, обладающих абсолютной властью над жизнью и смертью в своих регионах. Военные станут единственной уважаемой властью, определяющей все аспекты жизни общества. Золотов уверен, что таким образом будет создана великая Российская империя, сохраняющая свою жизнеспособность и постоянно продвигающаяся по пути завоеваний." 
 SOV_the_russian_senate: "Русский Сенат"
 SOV_the_russian_senate_desc: "Решив восстановить республиканский строй с помощью военной силы и защитить его с помощью армии, Золотов сделал первый шаг к политической реформе в России. Государственная Дума, многолетний представительный орган, созданный еще в 1905 году, подошла к концу своего жизненного цикла. Мы будем помнить о значительном вкладе этого института в российское управление на протяжении многих лет и сохраним его основные ценности. В то же время мы стремимся сделать его более эффективным и отвечающим современным потребностям России путем проведения модернизационных реформ.\nСогласно последнему указу, Государственная дума будет преобразована в российский Сенат, в состав которого войдет больше представителей общественной элиты и который будет предоставлять больше профессиональных консультаций. В таких областях, как принятие военных и дипломатических решений, государственная служба и промышленное планирование, новый российский Сенат будет способствовать тому, чтобы возрождение России было устойчивым и продолжительным." 
 SOV_citizenship_for_service: "Гражданство за Службу"
 SOV_citizenship_for_service_desc: "В Древнем Риме служба в легионах была благородной привилегией только римских граждан. Теперь, на просторах России, последний законопроект генерала Золотова призван возродить эту концепцию. Отныне служба в Вооруженных силах России станет ключевым способом получения официального гражданства для жителей вновь отвоеванных территорий и нового поколения россиян. Только доказав свою преданность и любовь к Родине, а также получив необходимые трудовые и боевые навыки, человек может считаться ценным достоянием российской нации и общества.\nМы верим, что в ближайшие годы эта реформа постепенно избавит русскую общину от общественных паразитов и негодяев. Вскоре исключительные качества российских граждан поразят весь мир." 
 SOV_centralized_republic: "Централизованная Республика"
 SOV_centralized_republic_desc: "В прошлом, чтобы учесть трансконтинентальность страны и разнообразие этнических групп внутри нее, мы были вынуждены мириться с сосуществованием различных организаций местного самоуправления. Это демонстрировало инклюзивность России, но в то же время создавало серьезные проблемы для повышения эффективности управления и сохранения единства российской цивилизации. Более того, особый режим для отдаленных районов еще больше затруднял обеспечение сбалансированного развития и единства регионов по всей стране.\nДля решения этой проблемы Золотов предпримет решительные действия по ликвидации этой пагубной практики. Все местные административные районы будут объединены в структуру "Области", которой будут управлять назначаемые чиновники. Эти областные правительства и руководители будут подотчетны центральному правительству в Москве, отчитываясь только перед ним. Золотов твердо уверен, что централизованная республиканская система значительно улучшит формулирование и проведение политики в интересах всех россиян." 
 SOV_commander_in_chief: "Слава Верховному Главнокомандующему!"
 SOV_commander_in_chief_desc: "Золотов понимает: чтобы по-настоящему овладеть Россией, ему нужна не только преданность армии и флота. Необходимы еще два элемента: страх простых людей и лесть элиты. Пока он будет представлять себя железным лидером, обладающим значительной военной мощью, страх народа будет гарантирован. Кроме того, доказав, что его положение надежно и что он может предложить своим сторонникам немыслимые награды и льготы, он без труда завоюет преданность российской элиты.\nЖириновский был всего лишь покойным "генералиссимусом", не имеющим особого значения. Золотов же - настоящий "главнокомандующий", и власть над жизнью и смертью полностью находится в его руках. Любой противник, понимающий это, будет разумно избегать противостояния с ним, гарантируя, что репутация Золотова будет становиться все более неприступной." 
 SOV_cutting_down_the_officialism: "Урезать Бюрократию"
 SOV_cutting_down_the_officialism_desc: "По мере того как Золотов становится все более искусным в управлении страной, он обнаруживает, что та самая бюрократическая система, которую он кропотливо восстанавливал, стала самым большим препятствием на пути развития России. Каждый раз, когда он пытается продвинуть свои планы, Золотов ощущает негативные последствия высокомерия и некомпетентности системы. Ему нужны верные и решительные исполнители - трудолюбивые "рабочие пчелы", преданные делу благосостояния русского народа, а не самодовольные "интеллектуалы", возомнившие, что могут управлять государственными делами.\nПоэтому, если "Верховный правитель" может дать, то он же может и отнять. Мы проведем тщательную чистку, удалив все обветшавшие структуры, мешающие нашему прогрессу. Когда пыль осядет, в центре власти останется только наш главнокомандующий, господин Золотов." 
 
 SOV_zhirinovsky_our_founder: "[SOV_slutsky_path_focus_1]"
 SOV_slutsky_path_focus_1_loc_1: "Усовершенствовать Русское Общество"
 SOV_slutsky_path_focus_1_loc_2: "Патриотическая Реформация"
 SOV_slutsky_path_focus_1_loc_3: "Уничтожить Раскол"
 SOV_slutsky_path_focus_1_loc_4: "Жириновский - Наш Основатель"
 SOV_slutsky_path_focus_1_loc_5: "Единая Русская История"
 SOV_slutsky_path_focus_1_loc_6: "Настоящие Герои России"
 SOV_zhirinovsky_our_founder_desc: "[SOV_slutsky_path_focus_desc_1]"
 SOV_slutsky_path_focus_1_desc_1: "Обновление страны невозможно без перемен в общественном сознании. Общество должно не просто следовать за переменами, а становиться их инициатором, разделяя цели и ценности новой эпохи. Уверенная в своём пути страна опирается на общество будущего - способное не только принимать перемены, но и творить их."
 SOV_slutsky_path_focus_1_desc_3: "Россию пронизывает раскол, до того невиданных масштабов: раскол на "красных" и "белых", левых и правых, большевиков и белогвардейцев. Даже спустя столетие, Октябрьская революция не оставляет никого равнодушным, настолько сильно её влияние.\n\nНо вместе с этим она разделяет всю российскую политику на два лагеря. Мы были близки к решению данного вопроса в 93-ем, но тогда выиграли про-ельцинские силы, и красно-коричневый альянс распался.\n\nТеперь, когда во главе государства стоит Дмитрий Рогозин, мы можем, наконец, преодолеть распри прошлого и вместе строить Новую Россию!"
 SOV_slutsky_path_focus_1_desc_2: "Что есть гражданин без патриотизма и лояльности своему отечеству? Бесполезный слизняк и возможный предатель. А теперь представьте, что все слои государства поражены подобной отравой? Пришло время прогнать их со своих мест и перестроить систему!"
 SOV_slutsky_path_focus_1_desc_4: "Жириновский - фигура нашего времени, и не только для России, но и для самой ЛДПР. Никто другой не смог бы сделать так много для общественного имиджа партии, как ее основатель. Даже после его смерти нас часто воспринимают как его партию, что значительно повысило нашу популярность. Однако, хотя многие признают нашу идентичность, не все считают Слуцкого лучшим преемником Жириновского."
 SOV_slutsky_path_focus_1_desc_5: "История России это без сомнения одна из самых непростых и наполненных событиями историй во всём мире. Что только не переживала наша держава. Эпохи объединений и распадов. Разрушительные войны, что от другой цивилизации не оставили бы и следа. Однако народ России всё вытерпел и не сдался. И поэтому попытки разделить нашу историю это в первую очередь попытка разделить народ нашей страны, чего мы позволить не можем."
 SOV_slutsky_path_focus_1_desc_6: ""
 SOV_multiconfessional_piety: "[SOV_slutsky_path_focus_2]"
 SOV_slutsky_path_focus_2_loc_1: "Народная Партия Русского Народа"
 SOV_slutsky_path_focus_2_loc_2: "Синкретический Национализм"
 SOV_slutsky_path_focus_2_loc_3: "Слава Империи"
 SOV_slutsky_path_focus_2_loc_4: "Национальное Государство Будущего"
 SOV_slutsky_path_focus_2_loc_5: "Возродить Общероссийский Патриотизм"
 SOV_slutsky_path_focus_2_loc_6: "Новая Национальная Политика"
 SOV_multiconfessional_piety_desc: "[SOV_slutsky_path_focus_desc_2]" 
 SOV_slutsky_path_focus_2_desc_4: "Настало время заложить основу нового этапа в истории страны - создания настоящего Национального Государства. Это будет союз обновлённого общества, ответственной власти и ясных национальных ориентиров.\nНовое государство соединит уважение к традициям с развитием науки, культуры и экономики и других сфер общества.В нём будут стремится к тому, чтобы права и свободы граждан были защищены, а труд, инициативность и ответственность находили реальную поддержку.\nНациональная идея станет прочной опорой для внутреннего развития страны и укрепления её позиций в мире." 
 SOV_slutsky_path_focus_2_desc_2: "Перед нашим государством стоит невиданная задача: примирить русскую историю, полную противоречий, которые раздирают наш народ и по сей день. Следующим шагом к решению данной проблемы является создание всеобъемлющей идеологии, способной сплотить народ, и в то же время имеющая под собой твёрдый исторический фундамент.\n\nИмя этой идеологии - Синкретический Национализм. Совмещающая в себе социальную направленность советской власти и сильный национальный уклон Империи и России Жириновского, она призвана стать тем самым мостом, что сможет воссоединить всю русскую историю в единое целое!" 
 SOV_slutsky_path_focus_2_desc_3: "Российская Империя была величайшей державой. Её слава проникала во все уголки земного шара, армия держала в страхе всю Европу и защищала мир, а экономика росла невиданными темпами. Однако подлые бесы, уничтожившие нашу родину, сделали всё, чтобы запятнать образ страны. Россия в публичном сознании внезапно стала отсталой и дикой державой. Пришло время рассказать народу правду о нашей державе и её прошлом."
 SOV_slutsky_path_focus_2_desc_5: "Русский это не просто нация. Русский - это призвание, это принадлежность к величайшей цивилизации на свете. Это величайшие произведения культуры и прорывные достижения в науке. И чтобы быть русским необязательно быть славянином, мы примем и кавказцев и среднеазиатов икого угодно пока они уважают нашу культуру и хотят быть её частью. Наш величайший писатель вообще имел эфиопские корни! И поэтому наш патриотизм общерусский и никому не отнять нашу любовь к отечестве."
 SOV_slutsky_path_focus_2_desc_6: ""
 SOV_slutsky_path_focus_2_desc_1: "ЛДПР - это место, куда простые россияне приходят, чтобы высказать свои опасения, обрести солидарность и ощутить чувство национальной гордости. Мы поддерживаем Россию, наши члены разбросаны по всей стране, и часто этого не замечают по мере развития нашей партии. Наши молодые, ухоженные депутаты находят отклик у нации и ее избирателей. Несмотря на изменения в администрации, наши лозунги остаются неизменными."
 SOV_brand_new_russian: "[SOV_slutsky_path_focus_3]"
 SOV_slutsky_path_focus_3_loc_1: "Совершенно Новый Русский"
 SOV_slutsky_path_focus_3_loc_2: "Сильнейшие Воины Родины"
 SOV_slutsky_path_focus_3_loc_3: "Культ Стрелкова"
 SOV_slutsky_path_focus_3_loc_4: "Новый Федерализм"
 SOV_slutsky_path_focus_3_loc_5: "Имитировать Модель Донбасса"
 SOV_slutsky_path_focus_3_loc_6: "Увеличить Социалку"
 SOV_brand_new_russian_desc: "[SOV_slutsky_path_focus_desc_3]"
 SOV_slutsky_path_focus_3_desc_4: "Вместе с другими сферами государственного управления должна развиваться и система федерализма. Речь не идёт о её упразднении - наоборот, планируется её укрепление через переосмысление подходов и освобождение от излишней бюрократической нагрузки.\nБолее гибкие и справедливые методы управления позволят усилить взаимодействие центра и регионов, сделать систему более прозрачной, действенной и ориентированной на результат.\nСила России - в справедливости, и именно справедливость должна лежать в основе всех методов управления."
 SOV_slutsky_path_focus_3_desc_2: "Гордость России - её армейские традиции и храбрость. Русский воин не раз проявлял свою доблесть в боях. Недавняя война с Западом лишь укрепила веру в силу нашей армии. Русские воины, как свои прадеды в 1945-ом и далёкие предки в 1813-ом освободили большую часть Европы и принесли славу Отечеству. Мы славим наших воинов, победивших западную чуму!"
 SOV_slutsky_path_focus_3_desc_3: "Кто повёл ополчение русского народа против украинского геноцидального антироссийского режима? Игорь Стрелков. Кто спас российскую армию от коллапса во время Европейской войны? Игорь Иванович! Кому русский народ отдал предпочтение на всероссийских выборах после смерти Жириновского? Всё верно. Культ личности людям кажется чем-то диким и неопрятным, навроде племенного строя, где все считают вождя посланником Божьим. Но если всё существование государства держится исключительно на одной персоне, разве народное обожание и хвала не будут оправданы?"
 SOV_slutsky_path_focus_3_desc_5: "Донбасская модель в своё время уже доказала свою эффективность, пройдя испытание войной с Украиной. Адаптация данной модели в масштабах всей может быть не самой простой задачей, однако если преуспеем, то это сильно облегчит нам управление государством."
 SOV_slutsky_path_focus_3_desc_6: ""
 SOV_slutsky_path_focus_3_desc_1: "За эти годы мы сформировали новый тип российских граждан. Мы сформировали их, создав сообщество, связанное не только кровными узами, но и общим духом, верой и готовностью к самопожертвованию ради нации. Это дало нам лояльное население и, что особенно важно, способных бюрократов, полицейских, солдат и многих других, которые поддерживают стабильность в нашей стране."
 
 SOV_organization_of_russian_veterans: "Организация Российских Ветеранов"
 SOV_organization_of_russian_veterans_desc: "ЛДПР проявляет большое уважение к нашим доблестным воинам, особенно к тем, кто сейчас посвящает свою жизнь партии и идеям Слуцкого. Объединив их в сплоченную организацию, где они смогут обучать и воспитывать молодое поколение в духе лояльности и патриотизма, мы сделаем важный шаг к обеспечению будущего наших вооруженных сил."
 SOV_ldpr_ecosystem: "Экосистема ЛДПР"
 SOV_ldpr_ecosystem_desc: "Цель нашей вечеринки - не просто хорошо провести время. Это стиль жизни, который включает в себя музыку, игры, спорт, актерское мастерство и даже моду. Наши PR-менеджеры заботятся о том, чтобы каждый аспект нашей активной жизни ассоциировался с ЛДПР. Они хотят, чтобы население поняло, что если оно хочет заниматься какой-либо деятельностью, то лучше делать это под брендом ЛДПР. В конце концов, хобби доставляют больше удовольствия, когда ими делятся с другими."
 SOV_security_and_order: "Безопасность и Порядок"
 SOV_security_and_order_desc: "Эти демократические усилия достойны восхищения, но демократия также порождает множество точек зрения, которые не являются существенными для благополучия нации и общества. От крайних националистов и радикальных коммунистов до тех, кто сочетает в себе элементы нацизма и язычества, эти люди не могут способствовать созданию успешной, функционирующей нации. Под видом борьбы с радикализмом мы, естественно, постараемся привлечь и более активную часть нашей оппозиции."
 SOV_government_of_mutual_trust: "Правительство Взаимного Доверия"
 SOV_government_of_mutual_trust_desc: "Государство не может процветать без проницательных критиков, которые указывают на его недостатки, но эти критики также должны быть проницательными и конструктивными. Несмотря на свои недостатки, Юнеман и Гиркин более доступны для конструктивного диалога, чем экстремисты на периферии. Налаживание позитивных отношений с ними могло бы укрепить наше стабильное правление и помочь нам предвидеть и решать важнейшие проблемы в нашем правительстве. Формирование официальной коалиции с этими деятелями могло бы оказать некоторую помощь."
 SOV_great_russian_nationalism: "Великорусский Национализм"
 SOV_great_russian_nationalism_desc: "В конце концов, именно русские под руководством ЛДПР, Жириновского и его близкого союзника Слуцкого одержали победу над Западом в войне и открыли новый золотой век для нашего народа. Мы всегда должны подчеркивать значительный прогресс, достигнутый нашей партией в укреплении авторитета, безопасности и славы русского народа."
 
 SOV_peoples_mandate: "Народный Мандат"
 SOV_peoples_mandate_desc: "Наш народ дал нам мандат на изменение этого коррумпированного и несправедливого истеблишмента. Мы проведем масштабные реформы против устаревшей и слабой администрации."
 SOV_repeal_hardline_policies: "Отменить Жесткие Практики"
 SOV_repeal_hardline_policies_desc: "Жириновский был разрушительной силой для этой страны, несмотря на его намерения сделать ее великой. Необходимо отказаться от остатков его политики, а его ура-патриотическое и ксенофобное законодательство должно быть отменено."
 SOV_unity_consensus: "Единство и Консенсус"
 SOV_unity_consensus_desc: "Как бы усердно мы ни стремились к реформам, мы должны признать, что чрезмерно поспешные и жесткие меры могут спровоцировать открытое недовольство нашей администрацией даже со стороны умеренных людей внутри страны. Мы должны участвовать в демократическом процессе со всеми вовлеченными сторонами, исключая сторонников ЛДПР."
 SOV_protect_electoral_freedom: "Защищать Избирательные Свободы"
 SOV_protect_electoral_freedom_desc: "Мы свободные люди, и мы будем добиваться абсолютной свободы на выборах, даже если их результаты не будут соответствовать нашим предпочтениям. Это отличает нас от предыдущих российских правительств."
 SOV_russian_republican_forces: "Российские Республиканские Силы"
 SOV_russian_republican_forces_desc: "Российские вооруженные силы должны стать неотъемлемой частью республиканской демократии. В настоящее время военные придерживаются консервативных взглядов и тесно связаны с Либерально-демократической партией России, особенно с Национальной гвардией."
 SOV_patriotic_idealism: "Патриотический Идеализм"
 SOV_patriotic_idealism_desc: "Быть патриотом - это не значит слепо следовать приказам или искать только позитивное. Настоящий патриот всегда должен быть в курсе проблем своей страны и стремиться к их решению. Особенно приятно, когда цели этих патриотов совпадают с идеалистическими устремлениями российского правительства, и они вместе работают над созданием лучшей системы."
 SOV_fight_bureaucratic_corruption: "Союз Республиканских Фронтовиков"
 SOV_fight_bureaucratic_corruption_desc: "В Веймарской республике процветало множество воинствующих организаций, состоящих из ветеранов войны. Хотя некоторые из них были известны своим экстремизмом, многие солдаты были готовы сражаться за демократический или, по крайней мере, социал-демократический порядок. РПСС также создаст независимое крыло для ветеранов войны, разделяющих наши политические идеалы."
 SOV_develop_rural_russia: "Развивать Сельскую Россию"
 SOV_develop_rural_russia_desc: "Долгое время сельскую Россию не замечали, а ее потенциал не признавался. RPSS стремится исправить это, привлекая внимание к сельским районам и повышая их значимость за счет увеличения финансовой и экономической поддержки менее привилегированных регионов."
 SOV_stand_for_democracy: "Отстаивать Демократию"
 SOV_stand_for_democracy_desc: "Демократия имеет решающее значение для выживания нации. Президент Шевченко ставит демократию превыше всего остального. Он - демократический империалист, если его можно так назвать. Мы не можем стремиться к миру с теми, кто отрицает свободу."
 SOV_spirit_of_the_motherland: "Дух Свободной Родины"
 SOV_spirit_of_the_motherland_desc: "В настоящее время Россия является самой красивой и свободной страной на Земле, и среди радикализма и фанатизма наша Родина остается путеводным маяком. Президент Шевченко, прежде всего, патриот России, и он не стремится к миру с теми, кто лишает Россию ее места под солнцем."
 SOV_boost_local_governance: "Настоящая Федерация"
 SOV_boost_local_governance_desc: "Россия - страна, населенная самыми разными народами, особенно в Кавказском регионе. Максим Шевченко глубоко исследовал эту тему. Эти народы необходимо защищать и относиться к ним как к равным великороссам."

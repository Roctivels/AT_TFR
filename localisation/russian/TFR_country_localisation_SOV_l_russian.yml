 SOV_socialism_with_human_face_idea_desc: "\n\n\n\n£GFX_socialism_human_face_banner\n\n\n\n\n\n§Y"Не догма, а руководство к действию".\n- Ф. Энгельс§!\n\nМногопартийность, Политический Плюрализм, Демократия, Гуманизм - вот те принципы, которых мы, коммунисты - представители самой прогрессивной и постоянно развивающейся идеологии, должны придерживаться для достижения наших целей. Народ должен знать, что Партия привержена развитию и совершенствованию социалистической модели, а не простому восстановлению прошлых времен. Только учитывая современные вызовы и потребности общества, принимая уроки истории, мы сможем добиться победы идей Ленина в наше время."
 SOV_partocracy: "Партократия"
 SOV_partocracy_desc: "\n\n\n\n£GFX_partocracy_banner\n\n\n\n\n\n§Y"Наша партия, как и всякая другая политическая партия, стремится к политическому господству для себя."\n- В. Ленин§!\n\nКоммунистическая Партия - это именно та сила, которая может сплотить наше общество в это непростое время, объединяя людей вокруг общих целей и идеалов. Мы верим в силу солидарности, взаимопомощи  и коллективных усилий. Мы верим, что только через единство и сотрудничество мы сможем достичь истинного процветания. Только Коммунистическая Партия готова создать по-настоящему справедливое и равноправное общество будущего для всех нас. Если мы будем едины, то все вместе мы сможем добиться победы идей Ленина в наше время!"
 SOV_zyuganovism: "Зюгановизм"
 SOV_zyuganovism_desc: "\n\n\n\n£GFX_zyuganovism_banner\n\n\n\n\n\n§tЗюгановизм§! - идеология, вдохновленная Геннадием Зюгановым, ведущая Россию к новым вершинам под знаменем Коммунистической Партии. Она основана на уважении к историческим ценностям Советского Союза, национальной гордости и справедливости. Её основные составляющие: §dСоветский Патриотизм§!, §RМарксизм-Ленинизм§!, §OРусский Социализм§!. §tЗюгановизм§! представляет собой современную интерпретацию классических идеологий, адаптированных к вызовам современного мира и направленных на создание справедливого и процветающего общества для всех его членов."

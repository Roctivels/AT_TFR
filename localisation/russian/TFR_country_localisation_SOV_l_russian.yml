 FER_derussification:0 "Деруссификация"
 FER_derussification_desc: "После столетий геноцида и культуры мы находимся в процессе удаления этой чужой культуры с нашей земли, чтобы разорвать наши связи с их этнической чисткой. Однако этот переход не проходит даром: многие этнические русские покидают нашу территорию, поскольку не все наши граждане готовы принять эту реальность. Эти потрясения в сочетании с нашей зависимостью от миротворцев НАТО представляют собой серьезную проблему для правительства."

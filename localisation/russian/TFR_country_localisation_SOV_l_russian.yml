 SOV_derzhavnik_politics_category: "Политика Державников"
 SOV_derzhavnik_politics_category_desc: "Россия вступает в новый §Yисторический§! этап. §YНациональная идентичность§! вновь вышла на первый план, а Русские §Cгеополитические§! амбиции теперь будут защищены.\nПартия §YДержавников§!, под управлением §YАлиханова§!, активно привлекает все возможные ресурсы для достижения амбициозных целей по §Gвосстановлению§! и укреплению §Yгосударственного§! суверенитета. \n\n\n\n£GFX_SOV_alikhanov_small_banner \n\n\n\n§YВозрождение Родины§! - тяжелый процесс, будет пролито много §tкрови§!...\n[SOV_anti_alikhanov_opposition_loc]"
 

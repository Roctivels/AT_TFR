 #nationalist russia
 SOV_national_russia_rises: "Рассвет Национальной Росссии"
 SOV_national_russia_rises_desc: "Когда Владимир Вольфович погиб, остро встал вопрос кому же должна быть передана власть. Многие позарилась на гордое имя ЛДПР, словно стервятники на труп мёртвой коровы. Но Александр Шерин не забыл заветов Жириновского. Он помнит, что в первую очередь партия Владимира Вольфовича была партией, защищающей интересны русских людей. Поднимайте ввысь имперские триколоры, братья и сёстры. Наша борьба за русский народ продолжается. Ура, товарищи!"
 SOV_the_great_philosophy: "Великая Философия"
 SOV_the_great_philosophy_desc: "Владимир Жириновский, Иван Ильин, Владимир Пуришкевич, Александр Зиновьев, Иван Солоневич... Этот список можно продолжать ещё долго. Но всех людей о которых было сказано  выше объединяет невероятная верность отчизне, мудрость и сила духа. Они были теми самыми идеологами русской цивилизации, что способны тягаться с мыслителями античности, а в историческом плане, для России уже переросли их. Именно идеи таких патриотов, в первую очередь, и сформировали русскую нацию, какой мы её знаем сейчас. Их слова не должны быть забыты грядущими поколениями и потому навсегда станут частью учебников истории и умов наших граждан."
 SOV_national_jingoism: "Национальный Шовинизм"
 SOV_national_jingoism_desc: "Великорусский шовинизм - вот та идея что должна стать основой для настоящего русского мира. Те самые "Самодержавие, Православие, Народность", сформулированные ещё Сергеем Уваровым и позже развитые движением черносотенцев во главе с Владимиром Пуришкевичем. Именно великий русский народ должен стать тем самым связующим звеном между нашей православной культурой и сильным правителем всластвующим словно царь."
 SOV_the_white_empire: "Белая Империя"
 SOV_the_white_empire_desc: "Некоторым русским националистам присуще мнение, что Россия погибла в результате ужасного октябрьского переворота и возродилась лишь недавно. Однако они забывают  о том, что многие светлые умы всё таки смогли сбежать из России и были носителям нашей великой национальной идеи. Именно там, благодаря трудам философов вроде Ильина и Солоневича родились идеи, которые мы собрали в единую идеологию. "Белая Империя", именно так было решено назвать нашу новую  официальную доктрину. Истинно национальная и верующая Россия с возвышенным аристократическим национализмом духа. Товарищи, отбоя не было. Борьба продолжается."
 SOV_all_russian_veteran_organization: "Общероссийская Ветеранская Организация"
 SOV_all_russian_veteran_organization_desc: "Когда воины заканчиваются, ветераны боевых действий обычно оказываются на обочине жизни. Им тяжело устроиться в мирную жизнь и отринуть традиции нового времени. И позор тому государству, что предаст воинов, сражавшихся за его существование! Мы создадим всероссийскую ветеранскую организацию, что будет помогать ветеранам всех вооруженных конфликтов и встраивать их в мирную жизнь."
 SOV_glorify_russian_victories: "Прославлять Русские Победы"
 SOV_glorify_russian_victories_desc: "Едва-ли на всей Земле найдётся народ, что отстаивал свою независимость и своё право существовать чаще, чем русские. Мы сражались с Европой против их походов, не дав навязать западный образ жизни. Мы сражались с Азией, когда монголы пытались сделать нас рабами, и в конечном итоге выиграли. Больше чем за тысячу лет нашей истории ещё никому не удалось покорить нас и сделать рабами. Слава русским победам и вечная слава воинам павшим, за то, чтобы Россия оставалась великой! Быть может ваши имена и растворились в истории, но ваш подвиг бессмертен."
 SOV_revive_solidarist_practices: "Возродить Солидаристские Практики"
 SOV_revive_solidarist_practices_desc: "В своё время большевики сделали многое для России. Они рассорили великоросский народ и создали множество антирусских псевдонародностей. Однако величайшим их "достижением" было то, что они смогли посеять ненависть между представителями русской национальности. Бедные стали ненавидеть богатых, и хрупкий порядок в обществе был нарушен. В результате чего оболваненная толпа уничтожила цвет нашей нации. Однако мы не позволим этому повториться! Нет никаких классов и уж тем более борьбы между ними! Владелец фабрики и рабочий натуральные союзники, а не враги. И все наши граждане помнить об этом!"
 SOV_restructure_the_party: "Перестроить Партию"
 SOV_restructure_the_party_desc: "ЛДПР всегда была пристанищем для многих политических движений. Все мы так или иначе были националистами. Но видели великую Россию по-разному. Кто-то видел непобедимую империю. Кто-то - национальную демократическую республику. Ну а кто-то даже хотел скрестить русский национализм с социализмом. Но все мы были едины до того самого дня, как нас покинул Владимир Вольфович  Как оказалось легко рассорить некогда единое движение. ЛДПР теряет популярность из-за внутренних дрязг. Мы очистим партию от оппортунистов и сформируем чёткую идеологическую программу!"
 SOV_rise_of_blueshirts: "Возвышение Синерубашечников"
 SOV_rise_of_blueshirts_desc: "Ассоциация армейских товарищей, или же "синерубашечники" это спонтанно возникшая при Жириновском организация русских националистов. Частично копируя свой стиль с аналогичной организации из Ирландии 20 века, они сразу стали силой с которой стоит считаться. Они защищали простых граждан от разбоя мигрантов и проводили акции по защите русской культуры и противодействию вредоносному влиянию. Было бы настоящим кощунством отказывать таким патриотам в государственной поддержке."
 SOV_kickstart_the_propaganda_machine: "Запустить Пропагандистскую Машину"
 SOV_kickstart_the_propaganda_machine_desc: "Мы живём в самой лучшей стране на свете, и все остальные нам завидуют! Однако наши граждане тоже должны знать об этом в полной мере! С помощью государственной поддержки десятки пропагандистских программ расцветут словно цветы весной. Наши граждане будут видеть пропаганду в социальных сетях, по телевизору и даже в баннерах на сайтах. Не забудем мы и про средства рекламы и в реальном мире. Все это для того, чтобы наши граждане не забывали ,что патриотом России быть почётно!"
 SOV_unity_with_the_church: "Единство с Церковью"
 SOV_unity_with_the_church_desc: "Русская цивилизация была сформирована далеко не в последнею помощь при поддержке православия. Сквозь долгие века наш народ пронёс с собой патриотизм и веру в своём сердце  И мы должны окончательно закрепить союз церкви и государства. К счастью, пока что духовенство всегда выступало на нашей стороне."
 SOV_national_revolution_of_russian_soul: "Национальная Революция Русской Души"
 SOV_national_revolution_of_russian_soul_desc: "Поднимайтесь, братья, с нами знамя русское шумит! Все дети отечества русского гордо поднимайте свои триколоры над головами и ставьте! Славьте русский дух! Славьте нашу державу! И славьте подвиг наших предков! Спустя века мы пробили себе дорогу к стенам древнего Кремля и осуществили национальную революцию. Наконец-то, спустя столько времени появилось государство для русского человека и мы не позволим кому-то разрушить нашу идиллию. Наш, русский мир!"
 SOV_handbook_for_russian_nationalist: "Книга Русского Националиста"
 SOV_handbook_for_russian_nationalist_desc: "Национализм - это не просто любовь к своей родине и своему народу. Это ещё и глубокое уважение к традициям и целый образ жизни. Однако не все наши граждане знают об этом. Вместе с нашими популярными консервативными философами и популярными типографиями мы вместе создадим книгу русского националиста. Она будет содержать в себе все необходимое для настоящего русского патриота. От нашей партийной программы до советов по правильному  устройству своей жизни."
 SOV_enforce_russification: "Принудительная Русификация"
 SOV_enforce_russification_desc: ""
 SOV_embrace_corporatist_model: "Принять Корпоративистскую Модель"
 SOV_embrace_corporatist_model_desc: "Плановая экономика Советского Союза пошла прахом из-за своей неэффективности. В то же время свободный рынок оставляет граждан уязвимыми для жадных дельцов, что не упустят своего шанса погреть свои руки на обмане своих граждан. Но выход, как это известно, есть всегда. Корпоративизм прекрасно показывал себя в государствах, где был введен и, по нашему мнению, является лучшим вариантом в долгосрочной перспективе. Именно тщательно отобранные корпорации будут вести дела на рынке и управлять нашей экономикой."
 #Goida Tree
 SOV_by_the_will_of_god: "По воле Божьей"
 SOV_by_the_will_of_god_desc: "Впервые за всю историю России в стране установился порядок, напоминающий теократию. Официально главой Российского государства провозглашается патриарх - глава Русской православной церкви.\nНо управление столь большим государством не по плечу одному, поэтому сразу же был создан Священный Синод во главе с Иваном Охлобыстиным, для многих довольно одиозной личностью с ещё более одиозными идеями развития России. Но надо верить, с Божьей помощью и по Божьей воле он приведёт Россию к своему подлинному величию!"
 SOV_on_line_with_kirill: "На Связи с Кириллом"
 SOV_on_line_with_kirill_desc: "Официальная Русская православная церковь имеет огромное влияние на своих прихожан. К слову Патриарха, особенно сейчас, прислушивается вся страна. Сейчас положение Охлобыстина довольно шаткое, и лучше быть на хорошем счету в РПЦ, чтобы наша политика проходила легко и безболезненно у народа."
 SOV_ally_with_hardline_priesthood: "Союз с Бескомпромиссным Священством"
 SOV_ally_with_hardline_priesthood_desc: "Внутри Русской православной церкви есть те, чья вера немного более радикальна, чем у основной массы священства. Схимонах Сергий, "Союз православных хоругвеносцев" с их идеей "Православие или смерть!", учение о царе-искупителе - всех их официальная церковь не жалует, называет "еретиками", "радикалами". Но мы считаем, что они являются защитниками православной веры от различных тлетворных влияний Запада. Наши идеи во многом совпадают с ними, поэтому было бы логично, если бы мы их начали реабилитировать в народных глазах."
 SOV_install_orthodox_fundamentalism: "Установить Православный Фундаментализм"
 SOV_install_orthodox_fundamentalism_desc: "С 988 года православие является основополагающей религией российского государства, объединяющей народ и укрепляющей его духовные устои. На протяжении всей истории вера определяла образ жизни, нравственные ценности и культуру нашей страны. Однако в последние пару веков её влияние постепенно ослабевало, теряя свое значение в повседневной жизни русского народа. Мы считаем это недопустимым. Вера - это неотъемлемая часть нашей истории, источник силы и стойкости. Поэтому с этого момента мы устанавливаем господство православия в повседневной жизни, возрождая духовные традиции, которые веками поддерживали величие России. Только народ, опирающийся на прочные духовные ценности, способен уверенно двигаться вперед и создавать великое будущее."
 SOV_mass_religious_education: "Массовое Религиозное Образование"
 SOV_mass_religious_education_desc: "Российское образование начиналось с церковно-приходской школы, где детей учили чтению и письму через Священное Писание. Со временем обучение молодого поколения секуляризировалось, что привело к печальным последствиям: вольнодумство в образовании стало первой костяшкой домино, приведшей к хаосу XX-го века.\nТеперь, когда Церковь управляет Государством, мы должны увеличить роль религии в образовании. Вместо уроков музыки с богопротивными рок-операми будут церковные песнопения, и большее количество часов будет уделено Священному Писанию и другой церковной литературе, за счёт уроков биологии конечно же."
 SOV_the_new_russian_trinity: "Новая Русская Троица"
 SOV_the_new_russian_trinity_desc: "Путин, Жириновский, Охлобыстин - четкая и логичная линия преемственности. Первый укрепил страну после тяжелых времен, второй выдержал тяжелейшее испытание войны со всей Европой, а третий поведет Россию дальше - к будущему, наполненному духовностью и величием. В любые времена России нужен сильный и решительный лидер, способный вести народ вперед."
 SOV_co_patriarch: "Со-Патриарх"
 SOV_co_patriarch_desc: "Иван Охлобыстин - главный актор в нашем государстве. Подавляющее большинство государственных решений принимаются и одобряются только по его воле. Фигура Патриарха Кирилла, более публичная, стала чем-то наподобие католического Папы Римского: по факту он не имеет власти в государстве, а является лишь духовным лидером России.\nОхлобыстин и его радикалы в Священном Синоде настояли на увеличении их роли в государстве: отныне будет создан пост "Со-Патриарха" - первого после Патриарха человека в государстве, который займет, конечно же, глава Синода. И тогда помешать тотальному контролю православных фундаменталистов в России не сможет никто. \n\nДаже Господь Бог."
 SOV_union_of_the_faithful: "Союз Верующих"
 SOV_union_of_the_faithful_desc: "Священный Синод - главный институт власти в нашей стране. В его полномочиях назначение руководящих должностей, законотворческая и высшая судебная деятельность. Но у него нет практической связи с верующими по всей стране.\nПоэтому появилась инициатива по созданию "Союза верующих" - полупарламентского института, обладающего совещательными полномочиями. Это, конечно, не прямая демократия, но это хотя бы на время успокоит наших противников."
 SOV_restore_societal_piety: "Восстановить Общественное Благочестие"
 SOV_restore_societal_piety_desc: "В стародавние времена не ходить в церковь значило, что человек - изгой общества, и с ним иметь дела опасно. В церковь ходили все: от самых нищих до самых богатых и знатных, от мала до велика. Но в современном мире церковь не играла столь же серьёзной роли, как раньше, благодаря безбожникам-большевикам. Хоть Жириновский и пытался что-то предпринимать, но этого было недостаточно.\nМы больше не можем позволить такого, и поэтому хождение в церковь и следование нормам христианской морали будут обязательны. Перед лицом растущей угрозы с Запада мы не можем себе позволить слабости!"
 SOV_deploy_the_oprichniks: "Задействовать Опричников"
 SOV_deploy_the_oprichniks_desc: "Несмотря на всю работу режима Жириновского, внутри Российского Государства всё ещё осталось множество скрытых врагов. Теперь же к ним присоединились и всячески чуждые нашей вере элементы, угрожающие подорвать самые устои нашего общества, к удовольствию европейских красных.\nИменно поэтому Священный Синод настоял на возрождении внутри силовых структур института Опричнины, по примеру Иоанна IV. Так же, как и в XVI веке, данная структура будет иметь право на поиск врагов Руси и их уничтожение. Хоть некоторые и опасаются, что мы повторим все те же ошибки, но Охлобыстин непреклонен: священная цель - защита Русского Государства и народа -  оправдывает средства."
 SOV_consecrate_armed_forces: "Освятить Вооруженные Силы"
 SOV_consecrate_armed_forces_desc: "Европейская Война вскрыла важную проблему наших вооружённых сил: недостаток религии для солдат. В среде бойцов получили распространение не только языческая символика и обереги, но литании с "молитвами Богу-Императору", кем бы он не был. Данный факт настораживает многих внутри Священного Синода, и они требуют усиления роли церкви в войсках. Для решения данной проблемы предлагается увеличить количество военных священников и усилить их религиозно-политическое значение. Русский солдат должен знать, что Господь на его стороне и, даже если он погибнет, то, как мученик, попадёт в Рай. А его враги - просто сдохнут."
 SOV_faith_is_blind: "Вера Слепа"
 SOV_faith_is_blind_desc: "За десятилетия сначала коммунистического, а затем и капиталистического гнёта русского народа сложилось мнение, что главное - это материальное. Что богатство - оно не в душе, оно в югославских стенках, магнитофонах, телефонах, квартирах и машинах. То же самое передалось и в облик наших городов. Именно меркантильность развратила наших прихожан.\nНо теперь мы начнём отказ от всяческих излишеств, разрушающих моральный облик нашего народа. Православный утилитаризм - вот что нам нужно! Красота душевная - вот что главное в нашей стране!"
 SOV_beautify_our_cities: "Украшать Наши Города"
 SOV_beautify_our_cities_desc: "Современные российские города и их спальные районы представляют собой серое бетонное месиво. На наши города без слёз не взглянешь, оттого и душевный кризис, и пьянство! А виной всему кто? Конечно же коммунисты с их безбожием и брутализмом!\nНо мы исправим данное недоразумение: больше домов в русском стиле, больше садов, больше церквей! Русь своим видом должна отражать светлость и красоту православной веры!"
 SOV_empower_metropolitans: "Усилить Митрополитов"
 SOV_empower_metropolitans_desc: "Институт митрополий существует с IV века нашей эры. Ими христиане делили территории Римской и Византийской империи, во главе с митрополитом. Такая же система сохранилась и в России.\nБыло бы хорошо, если бы при помощи митрополитов Церковь ещё бы больше закрепила свою хватку над государственными делами: исполнительной и судебной властью в регионах."
 SOV_our_sacred_history: "Наша Священная История"
 SOV_our_sacred_history_desc: "История России непрерывно связана с христианством: от крещения Владимира Святославовича до восстановления патриаршества в 1943, в горе и в радости Русская Православная Церковь всегда была вместе с русским народом и русским государством. Конечно, Россия оказалась под почти что вековым гнётом большевиков-безбожников, но в конце концов, она смогла оправиться и восстановить правильный, христианский порядок вещей.\nИ теперь, под чутким руководством РПЦ и Ивана Охлобыстина, Святая Русь может спокойно шагать вперёд, к установлению Царства Божьего На Земле."
 SOV_worship_house_in_every_khrushevka: "Молельный Дом в Каждой Хрущевке"
 SOV_worship_house_in_every_khrushevka_desc: "Чтобы каждый житель России мог быть ближе к вере и духовности, в каждом доме, в каждой хрущевке будет создан молельный дом - место, где можно уединиться для молитвы и размышлений. Это место станет неотъемлемой частью домашнего быта, напоминая о важности традиций православия. Здесь каждый сможет обсудить вопросы веры с близкими, познакомиться с духовной литературой и участвовать в богослужениях, не уходя далеко от своего жилья. Это станет шагом к возрождению духовной жизни, где вера снова займет достойное место во внутреннем мире каждого человека."
 SOV_sanctify_our_economy: "Освятить Нашу Экономику"
 SOV_sanctify_our_economy_desc: "Православная Церковь всё своё существование сторонилась экономической деятельности. Да, нас многие обвиняют в богатом образе жизни, говорят о "яхтах и мерсах" Патриарха и других сановников, но это было давно и не правда.\nСейчас времена изменились. Церковь должна научиться действовать в экономике, иначе мы просто не выстоим. Мы установим сеть близких к нам банкиров и предпринимателей для управления российской экономикой и будем пропагандировать внедрение христианских ценностей и морали в экономические взаимоотношения."
 SOV_prepare_for_the_crusade: "Подготовиться к Крестовому Походу"
 SOV_prepare_for_the_crusade_desc: "Тучи сгущаются над Европой. Силы недобитой красной чумы собираются на границе, дабы подчинить себе нашу культуру, уничтожить нашу православную веру. Но мы не дадим им себя застать врасплох! Каждый в нашей Руси будет готовиться к новому Крестовому походу против еврокоммунизма! Со старинным русским кличем "Гойда!" тысячи русских богатырей сотрут последние остатки русофобии и атеизма с лица Европы! Бойся, красный мир, мы придём!"
 #Kurginyan Tree
 SOV_kurginyan_red_empire: "Красная Империя Кургиняна"
 SOV_kurginyan_red_empire_desc: "Империя или смерть! Вот два единственных пути для России. Именно об этом в 1994 году говорил Сергей Ервандович Кургинян. Но вот минуло уже три десятилетия, и Кургинян сам оказался у власти. Только ставшая вновь империей Россия раскалывается на части. Предатели внутри и недоброжелатели снаружи. Все они хотят отобрать у русских право на своё государство. Но этому не бывать! Пришёл час для принципиально нового государства российского, того, что не будет воевать с своей собственной историей и призраками прошлого. Пришёл час красной империи!"
 SOV_subdue_reactionary_nationalities: "Подавить Реакционные Национальности"
 SOV_subdue_reactionary_nationalities_desc: "Давным-давно большевики пришли к власти в пожаре российской революции. У них была великая цель - создать совершенно нового человека. Того, по сравнению с кем даже Гёте с Гегелем будет меркнуть в рамках мировой истории. Но эта идея была воспринята всеми по разному. И вместо сверхлюдей словно грибы после дождя стали появляться реакционные национальности. Украинцы, казахи, белорусы и прочие разрушили монолитную структуру русского общества. Конечно, товарищ Сталин пытался подавить данные настроения, но было слишком поздно. Десятки недоидентичностей уже успели появиться на свет и даже обзавестись ярыми борцами за своё дело. Естественно, что такие искусственные национальности не могут создать стабильных государств, что мы и видели в недавней истории. Причина их провала проста: все они так или иначе отвернулись от присущих истинно русским людям коллективизма и братства. Новыми реформами мы наставим эти народы на путь истинный. И явно покажем, почему суд времени вынес им таковой приговор."
 SOV_dictatorial_leadership: "Диктаторское Правление"
 SOV_dictatorial_leadership_desc: "Диктатор, тиран, деспот. Все эти слова по какой-то причине обросли негативной окраской в современном обществе после недолгого триумфа западной мысли. Почему же сильного лидера, способного постоять за свой народ и готового отстаивать свои интересы, сразу клеймят? Всё просто. Это страх. Способность русского народа рождать великих вождей всегда была нашей силой. Силой что вызывала страх потерять свою власть и всю силу. Западные государства, построены на народах чья пассионарность уже долгое время подавляется государством. Однако, мы советские люди, не боимся отвечать вызовы времени! Пришло вновь время сильной руке взять власть над Россией, чтобы повести людей в светлое социалистическое будущее."
 SOV_elitist_party_apparatus: "Элитарный Партийный Аппарат"
 SOV_elitist_party_apparatus_desc: "Может ли кухарка управлять государством? Глупый вопрос, ответом на который должно быть твёрдое и чёткое "нет!". Подпускать неподготовленных людей к управлению таким сложным организмом - это кощунство и первый шаг к верной гибели. Так не лучше перестроить партийный аппарат под наши нужды? Чтобы попасть туда, нужно будет пройти бесчисленные тесты, в том и числе и на лояльность партии. Но это та цена который стоит заплатить за возможность управлять страной. Разумеется, у партийцев будут и свои привилегии, если вы понимаете о чём я, конечно."
 SOV_new_russian_statecraft: "Новое Русское Государственное Управление"
 SOV_new_russian_statecraft_desc: "Процесс гибели государства неостановим, когда власть в нём оказывается у предателей. И когда люди разочаровываются в идеологии, они же перестают стараться ради режима. Это произошло в СССР, когда представители "интеллегенции" и народа во весь голос насмехались над идеей гегемонии рабочего класса. Мы не можем допустить того, чтобы они укоренились в нашем союзе! Пусть все граждане нашей великой страны знают, что они трудятся на славу русской нации и всего человечества. "
 SOV_knights_of_crimson_order: "Рыцари Багрового Союза"
 SOV_knights_of_crimson_order_desc: "Может ли жить государство, которое абсолютно всё выставляет на суд общественности? Конечно нет. Так и у нас должно быть определённое пространства для манёвра. Новые рыцари из рядов спецслужб позволят нашему государству исключать радикальные элементы, когда то необходимо. И просто поддерживать спокойную жизнь простых граждан, ограждая от тлетворного влияния врагов. Ура, товарищи! Слава Советским спецслужбам, нашим стражам и защитникам!"
 SOV_ministry_of_peoples_knowledge: "Министерство Народного Просветительства"
 SOV_ministry_of_peoples_knowledge_desc: "Лояльность - это очень сложная вещь и её невероятно тяжело привить. Даже Советский Союз, настоящий титан социалистической мысли, в конечном итоге не смог убедить своих граждан в том, что идеи Маркса и Энгельса были правы. Но мы пойдём дальше. Отдельное министерство будет создано для того, чтобы наши граждане были уверены в будущем государства, в котором они живут. Кто-то может назвать это оболваниевам, а кто-то - дешёвой пропагандой. Но прошу, задумайтесь сами. Разве может ложь, пусть и произнесенная тысячу раз, стать правдой и укорениться в умах людей? И если ваш ответ "да", то действительно ли оно остаётся ложью?"
 SOV_holy_red_army: "Священная Красная Армия"
 SOV_holy_red_army_desc: "Нет смерти более достойной, чем смерть за своё Отечество.  Невозможно быть по-настоящему храбрым, если ты не веришь в то что ты прав. И именно поэтому мы добавим немного веры великой армии! Словно крестоносцы, солдаты нашей армии будут идти в бой с именем Христа на устах а части будут пополнены специально обученными боевыми священниками. Наши защитники из числа членов народной красной армии готовы сражаться и умирать за будущее человечества и за то, чтобы наши граждане спали спокойно. Подвиг героев никогда не будет забыть, а их души вознесутся на небеса, когда настанет срок и они займут своё положенное место в раю, встав в один ряд с великомучениками. Слава нашим вооруженным силам, и да пусть Господь Бог лично направляет руки наших парней в цель. Бойся, подлый враг! Ибо наша армия, словно Георгий Победоносец, готова сразить змея!"
 SOV_condemn_european_red_globalism: "Осудить Европейский Красный Глобализм"
 SOV_condemn_european_red_globalism_desc: "После поражения от великой русской армии Европа якобы обратилась к идеям социализма. Но чего же стоит на самом деле их социализм? Это всего лишь отчаянная попытка наиболее глобалистских элементов финансового капитала скрыться за маской добродетели и заботы о рабочем классе. Но русский народ так просто не обмануть. Нам сквозь века ясно, кто пытается нажиться на доверчивом рабочем классе, подсунув им идеи социальной справедливости и вырожденного культурного марксизма, а кто истинно стоит за права рабочих и крестьян. Враг не пройдёт! Рано или поздно европейский глобализм будет сокрушен навсегда! Ну а пока нам стоит готовиться к этой схватке."
 SOV_towards_imperial_communism: "Создание Имперского Коммунизма"
 SOV_towards_imperial_communism_desc: "Коммунизм - это единственный шанс для человечества выжить! Пока наши оппоненты стараются подменить понятия солидарности рабочего класса по всей земле безродным космополитизмом, мы выступаем за имперский коммунизм. Да, для человека, не знакомого с теорией марксизма, это может звучать абсурдно, но именно такой и будет наша идеология в 20 веке. Не может быть у России судьбы, кроме империи. И именно коммунизм будет вести нас вперёд! И мы принесём его и народам, что ещё только ждут своего пробуждения. Ура товарищи, слава отчизне! Слава вечному учения Энгельса-Маркса-Сталина!"
 SOV_soviet_christianity: "Советское Православие"
 SOV_soviet_christianity_desc: "Христианство в сути своей является протокоммунизмом. Именно оно в древние века уничтожило рабство и смогло объединить людей сразу на трёх континентах. И именно за это оно противно власти глобалистов, ибо оно позволяет людям становиться ближе, при этом оставаясь разными, не превращаясь в единую массу, которой легко управлять. Христианство и коммунизм также едины и в том, что верят в неизбежное восхождение человека и вознесение на новый виток бытия. Быть может идеи и звучат по разному, но суть у них одна. Так почему бы нам не сделать шаг вперёд? Точно также как и наша идеология синкретична такой же и обернется наша вера. Великие русские деятели будут вознесены в ранг святых, а религия станет неотделима от идеологии. О возрадуйтесь же братья во Христе и простые пролетарии! Ибо кроткие унаследуют землю."
 SOV_great_russian_awakening: "Великое Русское Пробуждение"
 SOV_great_russian_awakening_desc: "Воистину, русскому народу уготована мессианская роль самой судьбой. Именно мы смогли первыми очнуться от сна и принять идеи социализма. Пусть первый эксперимент и не был удачным по многим причинам, он, словно брошенный в воду камень волнами раздался по всей планете, побудив людей всего мира приобщаться к истинному учению. Однако тогда это не получилось. Не хватило смелости, амбиций, чтобы полностью пробудить русский глубинный народ и повести его в социалистическую эру. Однако в 21 веке у нас более нет права на ошибку. Вставайте, люди русские. Сбросьте оковы золотых идолов капитала и примите социализм. Вместе нам суждено повести человечество к пику своего развития и создать величайшую в мире цивилизацию!"
 SOV_deploy_peoples_militia: "Мобилизовать Народных Дружинников"
 SOV_deploy_peoples_militia_desc: "Стоят ли что-то идеи властей, если они не находят отклика в сердцах простых людей? Без низовой поддержки даже самая светлая идея обречена на провал и забвение. И именно поэтому мы поспособствуем созданию народных краснознаменных дружин. Их задачей будет всесторонняя помощь закреплённым за ними территориям, борьба с вредоносными элементами, а также распространение нашей великой идеологии. И, естественно, в случае войны они должны быть готовы взять оружие и отправиться защищать своё социалистическое отечество в первых рядах. Конечно, они будут пользоваться определенными привилегиями, куда ж без этого."
 SOV_russian_proletarian_world: "Русский Пролетарский Мир"
 SOV_russian_proletarian_world_desc: "История не знает сослагательного наклонения, и мы не знаем, что произойдёт в будущем. Однако сейчас мы на все сто процентов верм в нашу победу. Победу социализма и лично русского народа. Мы будем сражаться до последнего и если оно потребуется, то сделаем саму землю багровой словно наше знамя, для того, чтобы спасти всё человечество. Ведь в мире должен быть порядок, и он по праву пролетарским должен быть! А настоящим пролетариатом на данный момент является только русский народ. Бойся старый мир, сотканный из глобализма и лжи. Весна человечества грядёт и мы будем знаменоносцами нового мира. Ибо это наше бремя."
 SOV_social_engineering: "Социальная Инженерия"
 SOV_social_engineering_desc: "Человеческое общество несовершенно. Оно является самым настоящим апофеозом нашей животной натуры. В конце-концов, даже несмотря на прошедшие миллионы лет эволюции, мы так и остались безволосыми обезьянами в любую секунду готовыми взять в руки камень или палку и убить ближнего своего. Однако это не значит, ,то нашу природу нельзя изменить. Общество всегда может быть перестроено, если знать за какие ниточки дёргать. Но социальная инженерия это долгий процесс и мы можем не получать результатов долгое время. Но, как известно, цель оправдывает средство."
 SOV_enforce_state_planning: "Внедрить Экономическое Планирование"
 SOV_enforce_state_planning_desc: "Планирование есть основа для любой стабильной экономической системы. Здесь можно провести аналогию с человеческим телом. Разум управляет процессами, а тело послушно исполняет их для выживания организма. Есть, разумеется, перегибы, когда разум "дуреет" и тело ради своего же блага должно временно отключить его. Да и отдавать абсолютно всё под планирование глупо и попросту невозможно. Но основной костяк экономики без каких-либо возражений должен контролироваться административно-командным подходом."
 SOV_richness_is_a_sin: "Богатство - это Грех"
 SOV_richness_is_a_sin_desc: "В Библии приводится цитата Иисуса Христа: "Удобнее верблюду пройти сквозь игольные уши, нежели богатому войти в Царствие Божие" и здесь нет никакой лжи и подлога. Богатства развращают даже лучших из людей, делая рабами своих желаний. А единственным желанием остаётся лишь зарабатывать больше и больше, множа без конца бесполезные зелёные бумажки или золотые монеты. Словно драконы, одурманенные богатством, пробуют заполучить другую власть. Именно поэтому лишние богатства должны быть конфискованы, а все богатые - покаяться и принять новую простую жизнь. Иначе они столкнутся с последствиями."
 SOV_regional_economic_committees: "Региональные Экономические Комитеты"
 SOV_regional_economic_committees_desc: "Насколько бы совершенной не была плановая экономика, но во всём полагаться на решения центра было бы глупостью. Чиновники и бесчисленные бюрократы не могут эффективно распоряжаться ресурсами и давать указания если они оторваны от реальности. Именно для предотвращения эксцессов мы создадим региональные экономические комитеты, которые будут заниматься развитием отведённым им территорий."
 SOV_optimize_the_economy: "Оптимизация Экономики"
 SOV_optimize_the_economy_desc: "Экономика - это тягомотный процесс в котором всегда есть место оптимизации. Сделав несколько улучшений в бюрократическом процессе и немного улучшив взаимодействие рабочих и директоров, мы можем получить удивительные результаты! Экономике всегда есть куда расти и проведя комплексный оптимизационный процесс мы сможем создать поистине неостановимую машину."
 SOV_forced_re_industrialization: "Принудительная Реиндустриализация"
 SOV_forced_re_industrialization_desc: "Когда пал Советский Союз, наша страна оказалась разворована! Десятки предприятий оказались на обочине жизни а наша индустриальная мощь погасла. Заслужила ли страна с величайшими природными запасами в мире и огромным количеством светлых умов такое забвение? Нет, нет и ещё раз нет! Советский Союз новой эпохи не посрамит своего предшественника. Пришло время вновь становиться за станки и брать в руки инструменты. Пусть смог из труб затмевает небеса! Страна рабочих вновь становится в строй!"
 SOV_great_constructions: "Великие Постройки"
 SOV_great_constructions_desc: "Коммунизм это в первую очередь мечта. Мечта о чём то величественном и невероятно грандиозном, например объединении человечества. Однако у этой мечты могут быть и более материальны формы. Так, мы отринем пессемистский декаданс и построим новый мир своими руками! Невиданных размеров памятники, ГЭС и АЭС, а также музеи. Всё это под силу создать пролетариям если мы трудимся вместе!"
 SOV_construct_the_workhouses: "Построить Трудовые Поселки"
 SOV_construct_the_workhouses_desc: "Рабочие поселения это прекрасная возможность оптимизировать производственные процессы в нашем государстве. Расположенные непосредственно вблизи промышленных или сельскохозяйственных объектов, они будут отвечать за непосредственную переработку продукции и отправку её далее по производственным цепочкам. Пришло время множить их для создания мощной индустриальной базы и подпитки нашей машины!"
 SOV_the_new_rural_socialism: "Новый Сельский Социализм"
 SOV_the_new_rural_socialism_desc: "Когда-то Россия была величайшей нацией по производству зерна. Все страны закупали его и даже злосчастная французская булка готовилась именно из него. Но времена идут и мощности нашей страны в этом плане спали. Дошло до того, что мы были вынуждены покупать чужую пшеницу, чтобы прокормить свой народ. Хватит! Пришло время поднимать своё хозяйство и осваивать земли. Берите серпы и плуги в руки вновь! Пусть колосятся золотые поля! Страна крестьян вновь становится в строй!"
 SOV_all_russian_communes: "Всероссийские Коммуны"
 SOV_all_russian_communes_desc: "Тяжело было бы организовать сельскохозяйственную деятельность без государственной помощи. Именно для того, чтобы направлять и помогать нашему возрождающемуся сектору экономики будут созданы, так называемые, всероссийские коммуны. Вместе мы надеемся объединить все хозяйства России в единую цепь, что будет работать как живой организм и удовлетворять потребности наших граждан."
 SOV_idolize_the_countryside_life: "Обожествлять Сельскую Жизнь"
 SOV_idolize_the_countryside_life_desc: "Крестьянская идиллия, разве не эти образы в своих произведениях воспевали самые разные поэты и писатели минувших времён? Бескрайние поля пшеницы, подобные океанам. Лабиринты из кукурузы в которых можно и заплутать ненароком. Пение птиц и ритмичный звук косы срубающий очередную порцию травы. Конечно времена изменились, но образ жизни в сёлах - едва. Тем более это удачный шанс для городских потеряв лишь небольшой комфорт перейти на самообеспечение и наконец попробовать настоящие продукты. Айда осваивать целину вместе, друзья-товарищи!"
 SOV_worker_conscription: "Призыв На Работу"
 SOV_worker_conscription_desc: "Неважно каким именно образом строить коммунизм и как к нему стремится. Рабочие руки нужны всегда и тунеядцам не будет места в процветающем мире будущего. Потому давайте все вместе пойдем на стройку коммунизма! Поверьте, место там найдется всем."
 SOV_nurture_labor_aristocracy: "Воспитывать Рабочую Аристократию"
 SOV_nurture_labor_aristocracy_desc: "Рабочая аристократия есть опора любого режима. Пока артерии государства неустанно перекачивают кровь, они наблюдают за состоянием организма. И естественно, что от их лояльности и пригодности зависит состояние государства. Советский Союз в своё время пал, как из-за пренебрежения именно этой прослойкой общества. Однако мы не будем бездумно повторять ошибки наших предшественников. Медленно, год за годом, мы будем взращивать свою аристократию. Обученную теории, эффективную и, разумеется, лояльную нашему коммунистическому делу."
 #Navalny Focus
 SOV_russian_spring: "Русская Весна"
 SOV_russian_spring_desc: "Наконец наступил долгожданный момент. Россия разорвала свои цепи и готова принять истинную демократическую систему. Никто не ожидал, что это произойдет так быстро, но вот мы здесь. \n Пока народ ликует, Навальный и его сторонники готовятся к тому, чтобы навсегда изменить Россию."
 SOV_the_political_amnesties: "Амнистия Политзаключенных"
 SOV_the_political_amnesties_desc: "Как и Алексей Навальный, многие другие политические заключенные содержались под стражей во время правления режима. Мы обязаны освободить их. Тем более что их опыт может помочь нам восстановить систему! Россия свободна!"
 SOV_a_big_tent_government: "Зонтичное Правительство"
 SOV_a_big_tent_government_desc: ""
 SOV_Consolidate_Navalnys_Power: "Консолидировать Власть Навального"
 SOV_Consolidate_Navalnys_Power_desc: "Кто, как не Навальный, может повести за собой нашу страну? Именно он создал ФБК, именно он возглавил протесты. Он был ядром оппозиции, ядром революции, а теперь и ядром России. \nВеликий освободитель поведет нас к процветанию!\n\nВерит в Вас как в Бога,\nИзмождённая страна,\nАвторитаризмом поражённая\nОчнувшаяся от сна.\nОправдайте веру в Вас -\nНастал момент.\nОправдайте веру,\nГосподин президент!"
 SOV_Push_The_Figurehead_Aside: "Отодвинуть Фигурку в Сторону"
 SOV_Push_The_Figurehead_Aside_desc: "Как бы мы ни боготворили Навального... сколько он уже сидит в тюрьме? Именно ФБК под руководством Волкова столько лет организовывал оппозицию. Именно они объединили эмигрантское сообщество и выторговали у Европы финансовую помощь. \nПочему мы должны ставить его выше всех остальных?"
 SOV_Form_The_Russian_Self_Defense_Force: "Сформировать Российские Силы Самообороны"
 SOV_Form_The_Russian_Self_Defense_Force_desc: "Война с НАТО и последовавшие за ней беспорядки дестабилизировали нашу страну до предела. Хотя нам не нравится культ смерти, который веками гноился в российском обществе, это прискорбная реальность, что нам нужны вооруженные силы, чтобы выжить. \nПо примеру японцев мы создадим Силы самообороны России. Это также поможет нам трудоустроить ветеранов прежнего режима, что улучшит ситуацию с организованной преступностью. \nХотя нам все еще придется расплачиваться за свои преступления, возможно, мы сможем вернуться в мир и бороться с геноцидными и тираническими режимами, как это делают сейчас Германия и Япония."
 SOV_Call_Back_For_The_Emigres: "Созвать Эмигрантов Домой"
 SOV_Call_Back_For_The_Emigres_desc: "За прошедшие годы огромное количество россиян бежало за границу. Будь то анархия 1990-х, оппортунизм 2000-х или гонения 2010-2020-х годов, есть много людей, которых мы могли бы призвать вернуться. Мало того, это может принести нам необходимые средства. \n Россия приветствует всех!"
 SOV_First_Russian_Democratic_Elections: "Первые Демократические Выборы в России"
 SOV_First_Russian_Democratic_Elections_desc: "Наконец-то пришло время! В России пройдут первые демократические выборы! Навальный - очевидный кандидат, который, вероятно, гарантированно победит на внеочередных выборах, но другие фигуры имеют очень разные взгляды и могут привнести интересную динамику в наше государство. \n Поскольку демократизация была такой быстрой, у нас даже нет устоявшихся партий, которые могли бы представлять всех, поэтому администрации придется начинать буквально с нуля. \n Однако это небольшая цена за Россию будущего!"
 SOV_grand_constitutional_reformation: "Большая Конституционная Реформация"
 SOV_grand_constitutional_reformation_desc: "Долгое время наша система опиралась на неработающую конституцию, которая давала власть режиму. Теперь мы готовы создать настоящую демократическую конституцию. В ней будут закреплены свободы и права, которые проложили путь в цивилизованный мир. \nИ, возможно, если наш народ примет ее всем сердцем, мы сможем наконец встать в один ряд с европейскими демократиями, которые освободили нас!"

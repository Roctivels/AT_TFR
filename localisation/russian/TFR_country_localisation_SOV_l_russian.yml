 SOV_mass_mechanization_LDPR_desc: ""
 SOV_authorize_banned_weapons_LDPR: "Раздавить Подонков"
 SOV_authorize_banned_weapons_LDPR_desc: "Хотя страна Украина все еще существует, это не более чем полая оболочка, находящаяся на грани распада. Быстрая и решительная операция вскоре сотрет это образование со страниц истории. Что еще более важно, мы избавим этот регион от пагубных идеологий нацизма и фашизма, загрязнивших сознание славянских народов. Противоестественное порождение этих идеологий, рожденное сотрудничеством итальянцев и австрийцев, будет сокрушено под мощью русской армии."
 SOV_total_war_LDPR: "Тотальная Война"
 SOV_total_war_LDPR_desc: "Из каждого уголка нашей священной Родины доносится призыв нашего великого лидера Жириновского, напоминая о временах, когда папа римский собирал рыцарей, чтобы отвоевать потерянные земли. Это великая борьба, в которой примет участие каждый россиянин. Это будет преобразующий процесс, как в материальном, так и в духовном плане, объединяющий нашу нацию как никогда раньше. Каждый телеведущий, призывающий в армию по телевизору, играет свою роль в этой борьбе, не менее важную, чем любой солдат на передовой. Точно так же каждый рабочий, занятый на сборке, будет чувствовать личную заинтересованность, как будто он сам выпустил снаряд из пушки танка."
 SOV_trample_over_kiev_LDPR: "Малоросская Освободительная Армия"
 SOV_trample_over_kiev_LDPR_desc: "После того как мы начали кампанию против предателей славянской нации - Украины, все большее число украинцев решили присоединиться к нам в противостоянии крайнему национализму, охватившему их страну. При поддержке нашего лидера, Жириновского, мы формируем "Малороссийскую освободительную армию", чтобы помочь нашим украинским соотечественникам в их борьбе. Хотя эта новая группа служит в первую очередь военно-пропагандистским целям, она может принести неожиданные результаты, подобные успехам наших союзников в Донецке и Луганске." #Хайпово(было)
 SOV_crack_down_on_protests_LDPR: "Запустить Машину Пропаганды"
 SOV_crack_down_on_protests_LDPR_desc: "Сегодня прошли те времена, когда простые лозунги и передачи могли побудить молодых людей выстроиться в очередь на призывные пункты. Нам нужны более увлекательные методы привлечения новобранцев. К счастью, еще до войны мы создали квалифицированную команду по работе с новыми медиа, и теперь они готовы приступить к работе, используя свои монтажные программы. Хорошо снятые, насыщенные боевиками военные документальные фильмы и захватывающие военные киноленты станут мощным инструментом для воспитания боевого духа у населения."
 SOV_to_serve_russia_to_die_russia_LDPR: "Смерть Или Бесчестье!"
 SOV_to_serve_russia_to_die_russia_LDPR_desc: "Наши генералы вдохновляют солдат такими словами: "Черно-желто-белый триколор России - высшая честь для воина". Сейчас, когда война достигла критической точки, мы должны полностью выложиться. Не колеблясь, использовать последние ракеты, танки, пистолеты-пулеметы и пули. Даже если останется только один солдат, который пойдет вперед, он с честью умрет на поле боя как один из величайших героев современной России, а не будет позорно убит выстрелом в спину."
 SOV_boost_aviation_funding_LDPR: "Увеличить Финансирование Авиации"
 SOV_boost_aviation_funding_LDPR_desc: ""
 SOV_modernize_fleet_LDPR: "Модернизировать Флот"
 SOV_modernize_fleet_LDPR_desc: ""
 SOV_build_up_western_air_bases_LDPR: "Построить Западные Авиабазы"
 SOV_build_up_western_air_bases_LDPR_desc: ""
 SOV_drone_r_d: "НИОКР БПЛА"
 SOV_drone_r_d_desc: ""
 SOV_pragmatic_economics: "Прагматичная Экономика"
 SOV_pragmatic_economics_desc: "Стремясь к укреплению российской нации, мы должны сосредоточиться на наращивании экономической мощи - фундаменте всех наших будущих усилий. Слишком долго экономисты ошарашивали наших лидеров пустыми фразами вроде "третичная промышленность" и "финансовые рынки," когда речь шла об экономическом прогрессе. Эта эпоха закончилась. Сейчас мы уделяем первостепенное внимание возрождению базовых отраслей, решаем важнейшую задачу повышения эффективности всех секторов и роста производительности труда."
 SOV_dismantle_oligarch_institutions: "Уничтожить Буржуазное Декадентство"
 SOV_dismantle_oligarch_institutions_desc: "Mercedes-Benz и Ferrari, проносящиеся по улицам, не способствуют красоте города. Наоборот, они разжигают недовольство и негодование. Для людей эти роскошные автомобили - символ богатства, которое несправедливо сосредоточено в руках немногих, а не заработано тяжелым трудом. Мы примем меры, чтобы обуздать этот декаданс и уменьшить проявления излишеств, по крайней мере, сделав богатых менее показными."
 SOV_imperial_monopolies: "Имперские Монополии"
 SOV_imperial_monopolies_desc: "Когда мы контролируем ключевые отрасли экономики, вполне естественно создать доминирующие предприятия и управлять ими с помощью упорядоченной структуры. Создание новой системы монополий не только обеспечит стабильную выгоду, но и поможет навести порядок в хаотичной бизнес-среде. Кто-то может сомневаться, что российская экономика когда-нибудь сможет освободиться от олигархов и монополий, но на этот раз система больше не будет порождать коррупцию и эгоизм. Напротив, она ознаменует возрождение могущественной российской финансовой империи."
 SOV_nationalize_railways: "Соединить Родину"
 SOV_nationalize_railways_desc: ""
 SOV_wont_bend_to_western_banks: "Подавить Глобалистский Банковский Капитал"
 SOV_wont_bend_to_western_banks_desc: ""
 SOV_modernize_production_lines: "Модернизировать Производственные Линии"
 SOV_modernize_production_lines_desc: "В прошлом российская тяжелая промышленность славилась не только масштабными объемами производства, но и недостаточной точностью, устаревшими технологиями и громоздкими конструкциями. Наше оружие и военная техника часто не дотягивали до западных аналогов по точности, техническим возможностям и потенциалу модернизации. Но скоро ситуация изменится. Благодаря модернизации производственных линий российская военная продукция будет обладать идеальным балансом доступности, эффективности и современных инноваций, обеспечивая при этом непревзойденную боевую мощь."
 SOV_national_social_state: "Национальное Социальное Государство"
 SOV_national_social_state_desc: "Экономика должна служить людям. Это означает, что все россияне должны иметь доступ к базовым потребностям, таким как жилье, еда и одежда, но это также подразумевает создание чувства заботы и участия со стороны государства. Когда граждане чувствуют себя причастными к развитию страны, это способствует циклу вклада, который укрепляет экономику. Для достижения этой цели мы будем проводить новую политику, направленную на улучшение жизни миллионов российских граждан."
 SOV_stratocratic_economy: "Стратократическая Экономика"
 SOV_stratocratic_economy_desc: "Без сильных вооруженных сил Россия не может иметь независимость, свободу и процветание. Чтобы обеспечить выживание вооруженных сил, наша экономическая система должна быть построена таким образом, чтобы поддерживать их. Каждый сектор - производство, обмен, распределение и потребление - будет отдавать приоритет военным нуждам, объединяя общество вокруг одной цели: укрепление вооруженных сил и продвижение России вперед." 
 SOV_expand_mic_industry: "Расширять Промышленность ВПК"
 SOV_expand_mic_industry_desc: "В соответствии с нашей экономической политикой мы будем и дальше расширять существующий военно-промышленный комплекс и исследовательские конгломераты, поощряя их к диверсификации своей деятельности. По мере быстрого расширения и модернизации вооруженных сил спрос на оружие будет стимулировать рост оборонной промышленности. Но мы ожидаем еще большего. Оборонный сектор будет играть все более важную роль в экономике в целом, причем его значение станет еще более очевидным по мере роста напряженности."
 SOV_to_banish_want: "Изгнание Нужды"
 SOV_to_banish_want_desc: "Забудьте о таких предметах роскоши, как деньги, смартфоны и кока-кола, которые ослабляют нашу решимость. Когда общество полностью проникнется атмосферой войны, а уважение к национальному флагу станет общим убеждением, все ненужные производства и отходы будут перенаправлены. Эти усилия станут неотъемлемой частью нашей военной машины. Этот сдвиг укрепит нашу готовность к крупномасштабным конфликтам, обеспечив надежность и поддержку наших производственных линий и логистики - жизненно важных элементов, которые могут ослабить нас в военное время."
 SOV_champion_the_workers: "Борьба за Рабочих"
 SOV_champion_the_workers_desc: "Во время кризиса рабочие могут стать самой мощной силой, представляющей серьезную угрозу стабильности власти. Однако, когда все идет гладко, они могут стать самыми преданными сторонниками режима, проявляя исключительный энтузиазм и преданность. Мы возродим нашу хвалу рабочему классу, чтобы он понимал, какую награду можно получить, посвятив себя благородному делу нации. Рабочие поймут, что они не просто инструменты для бюрократов, а действительно могут стать хозяевами нации."
 SOV_rise_of_russian_giant: "Восход Российского Гиганта"
 SOV_rise_of_russian_giant_desc: "Петр I однажды сказал, что самые главные союзники России - это ее армия и флот. Сегодня эта мысль нуждается в небольшом пересмотре - главными союзниками России являются ее вооруженные силы и заводы. Без них подъем России был бы сильно затруднен. К счастью, сейчас Россия создала нерушимую связь между этими двумя союзниками. Каждый цех, производящий ракетные транспортеры, является частью полностью интегрированной военно-гражданской промышленной цепочки. Вместе оборонный и гражданский секторы будут способствовать процветанию и безопасности российского общества."
 SOV_far_east_development: "Развитие Дальнего Востока"
 SOV_far_east_development_desc: "Наша земля вдоль Тихого океана обладает богатым потенциалом и имеет стратегическое значение, особенно благодаря близости к одной из крупнейших экономик мира - Китаю. Китай уже давно проявляет интерес к инвестициям в Дальний Восток, и мы должны воспользоваться этой возможностью. Почему бы не сотрудничать с ними, чтобы превратить этот регион в процветающий и благополучный центр на западном побережье Тихого океана?"
 SOV_exploit_our_resources: "Использовать Наши Ресурсы"
 SOV_exploit_our_resources_desc: "Некоторые цинично называют Россию страной "бензоколонкой," указывая на так называемое "ресурсное проклятие," которое препятствует технологическому прогрессу и промышленному росту. Однако мы считаем, что реальная проблема российской экономики заключается в том, что она не использует свою огромную территорию и богатые ресурсы в полной мере. Инфраструктурные проекты и отрасли, которые мы сможем развить вокруг этих ресурсов, станут мощным фундаментом для долгосрочного экономического роста России."
 SOV_militaristic_war_machine: "Милитаристская Военная Машина"
 SOV_militaristic_war_machine_desc: "Машины ревут, заводы работают на полную мощность. Танки катятся по полям, военные корабли скользят по стапелям, самолеты взмывают в небо, а ракеты поднимаются в шахты. Любая страна, задумывающаяся о враждебности, дважды подумает, увидев мощь нашего арсенала. Более того, масштабные военные инвестиции и производство больше не обременяют нашу экономику, а наоборот, двигают ее вперед. Военная машина стала двигателем стремительного подъема России."
 SOV_pressure_on_lukashenko: "Надавить На Минское Правительство"
 SOV_pressure_on_lukashenko_desc: "Батька - настоящий оппортунист. Он пытался захватить власть в России, используя соглашение о Союзном государстве до прихода Путина, и теперь он делает все, чтобы затормозить интеграцию Беларуси в Россию в соответствии с тем же соглашением, которое он подписал. Возможно, он изменит свое решение, если мы прекратим финансировать его страну."
 SOV_enshrine_soldier_benefits: "Закрепить Льготы для Солдат"
 SOV_enshrine_soldier_benefits_desc: ""
 SOV_SOF_expansion: "Стандарты ССП для военных"
 SOV_SOF_expansion_desc: ""
 SOV_back_ruble_gold: "Рубль, Обеспеченный Золотом"
 SOV_back_ruble_gold_desc: "По мере стабилизации экономической системы, установления рыночного порядка и стабильного накопления ресурсов мы вступаем в новую фазу роста. Для дальнейшего укрепления нашей экономики мы объявим о восстановлении золотого стандарта для рубля - одной из самых значительных валютных реформ со времен Бреттон-Вудской системы. Мы уйдем от нестабильности "нефтедоллара" и принесем на международный рынок новую уверенность и новые возможности."
 SOV_merged_tankograds: "Объединенные Танкограды"
 SOV_merged_tankograds_desc: ""
 SOV_reform_correctional_instutitions: "Реформа Исправительных Учреждений"
 SOV_reform_correctional_instutitions_desc: ""
 SOV_prosperity_for_all: "Процветание Для Всех"
 SOV_prosperity_for_all_desc: ""
 SOV_telecommunications_advancements: "Усовершенствование Телекоммуникаций"
 SOV_telecommunications_advancements_desc: ""
 SOV_push_towards_autarky: "Стремление к Автаркии"
 SOV_push_towards_autarky_desc: "Самодостаточная экономика не означает разрыва всех внешних связей. Любое государство, стремящееся быть сильным, должно ставить во главу угла свой экономический суверенитет, и Россия - не исключение. Отныне наши ценные ресурсы - нефть, газ, лес, зерно и многое другое - будут в первую очередь служить потребностям нашего народа. Государственные предприятия, управляющие этими ресурсами, обеспечат России достижение финансовой и технической независимости в кратчайшие сроки."
 SOV_cut_down_the_red_tape: "Урезать Бюрократию"
 SOV_cut_down_the_red_tape_desc: "Бесконечная бумажная работа, постоянные совещания - такова реальность в Москве, где, кажется, каждый считает, что должен все контролировать. Бюрократия - общая проблема любого правительства; хотя она и помогает поддерживать порядок, но становится помехой, когда речь заходит об экономических вопросах. Время и эффективность так же важны для экономического развития, как вода и воздух, а бюрократия тратит и то, и другое. Сократив ненужные излишества, мы сможем создать более здоровую и эффективную экономическую систему."
 SOV_ensure_full_employment: "Обеспечить Полную Занятость"
 SOV_ensure_full_employment_desc: "Стабильная занятость не только обеспечивает стабильный доход, но и дает уверенность в завтрашнем дне, вселяя надежду и мотивируя людей и семьи работать над улучшением жизни. Полная, стабильная занятость ведет к росту потребления, увеличению денежного обращения и росту ВВП. Чтобы добиться этого, мы будем проводить надежную политику по созданию рабочих мест как на корпоративном, так и на национальном уровне. Однако мы должны избежать ловушек прошлого, когда плановая экономика поощряла зависимость, а не производительность."
 SOV_encourage_domestic_production_LPDR: "Стимулирование Внутреннего Производства"
 SOV_encourage_domestic_production_LPDR_desc: "В США такие компании, как Microsoft, Apple и McDonald's, являются именами нарицательными; в Китае такие бренды, как Huawei, Tencent и Lao Gan Ma, представляют экономику страны. В России же брендов с мировым именем немного, а многие из тех, что существуют, - это устаревшие предприятия советской эпохи, и на их месте мало новых брендов. Предыдущее правительство не смогло решить эту проблему, но мы ее решим. Однажды слово "Сделано в России" станет синонимом качества и инноваций."
 SOV_support_MIC: "Поддержка Военно-Промышленного Комплекса" 
 SOV_support_MIC_desc: "" 
 SOV_prosperous_welfare: "Процветающее Соц. Обеспечение" 
 SOV_prosperous_welfare_desc: "Мы хотим, чтобы наши люди не просто жили стабильно, а жили хорошо. В будущем жалобы на отсутствие разнообразия и низкое качество сыров, овощей и кофе в супермаркетах, недолговечность велосипедов и неудобство малолитражных автомобилей постепенно сойдут на нет. Общее повышение уровня жизни станет наглядным отражением экономического процветания России."
 SOV_populistic_economic_policies: "Популистская Экономическая Политика"
 SOV_populistic_economic_policies_desc: "Рабочие и индивидуальные предприниматели вышли на улицы, протестуя против низких зарплат и требуя более эффективной поддержки со стороны правительства. Они выражают разочарование по поводу недостаточного внимания к их предложениям и неспособности привлечь компании и работодателей к ответственности за нарушение трудового законодательства и контрактов. Некоторые могут расценить это как признак социальной нестабильности, но мы считаем это демонстрацией искренней поддержки правительства со стороны населения. Это знаменует начало нового этапа в нашем экономическом развитии. Мы будем увеличивать инвестиции в инфраструктуру и общественное благосостояние, а народ будет осуществлять более тщательный контроль над предприятиями, чтобы инвестиции шли на действительно общественно полезные проекты."
 SOV_increase_education_funding: "Увеличить Финансирование Наукоградов"
 SOV_increase_education_funding_desc: "Россия всегда была полна гениев, но им было трудно пробиться в центр внимания. Одной из немногих хороших вещей, достигнутых Советами, была их образовательная программа, которая сделала Союз не только самой читающей страной на планете, но и страной, способной превратить деревенского крестьянина в теоретика ядерного синтеза. Мы должны повторить этот успех, чтобы улучшить будущее нашей страны."
 SOV_russian_power_russian_edgenuity: "Русская Мощь, Русская Смекалочка"
 SOV_russian_power_russian_edgenuity_desc: "Россия всегда была полна гениев, но им было трудно пробиться в центр внимания. Одной из немногих хороших вещей, достигнутых Советами, была их образовательная программа, которая сделала Союз не только самой читающей страной на планете, но и страной, способной превратить деревенского крестьянина в теоретика ядерного синтеза. Мы должны повторить этот успех, чтобы улучшить будущее нашей страны."

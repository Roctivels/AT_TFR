 SOV_new_union_of_russia_and_belarus_tt: "\n\n\n\n£GFX_SOV_lukashenko_and_zyuganov\n\n\n\n\n\n§O"Мы - родные славянские народы, выходцы из единой купели крещения. Наши корни - из глубины веков. И это надо сберечь, чего бы нам ни стоило."\n- А. Г. Лукашенко§!"
 SOV_tbilisi_declaration_tt: "§O"Выражением дружбы народов Закавказья явилась их совместная борьба против многих иноземных захватчиков, собственных поработителей и особенно борьба за победу Советской власти."\n- Ц. П. Агаян.§!"
 SOV_tashkent_agreement_tt: "§O"Есть, товарищи, одна вещь, более ценная, чем хлопок - это дружба народов нашей страны... А дружба между народами СССР - большое и серьёзное завоевание. Ибо пока эта дружба существует, народы нашей страны будут свободны и непобедимы."\n- И. В. Сталин§!"
 SOV_protect_russian_minorities_tt: "§O"Донбасс, это - не случайный район, а это - район, без которого социалистическое строительство останется простым, добрым пожеланием."\n- В. И. Ленин§!"
 SOV_soviet_moldova_tt: "§O"Мы прошли долгий совместный путь. В средние века мы вместе отстаивали наши святые христианские ценности. В новейшее время мы строили и защищали от многочисленных недругов единое, великое, справедливое государство. Вместе победили нацизм... Мы готовы, как и прежде, совместно отстаивать наши общие принципы и идеалы."\n- В. Н. Воронин§!"

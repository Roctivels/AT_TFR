 SOV_serbian_bortherhood_desc: ""
 SOV_the_restoration: "Реставрация"
 SOV_the_restoration_desc: "Сотню лет назад наша страна совершила великую ошибку. Властная царица, гроза и страх своих врагов, Российская Империя пала под напором черни дикой. Пришло время исправить эту оплошность и вернуть нашей родине былое величие. Русский народ покается за своё преступление, а государь вновь поведёт империю в светлое будущее." 
 SOV_restore_october_manifesto: "Восстановить Октябрьский Манифест"
 SOV_restore_october_manifesto_desc: "17 октября 1905 года в нашей стране произошло знаковое событие. Государь-император Николай II решился на беспрецедентный шаг и обнародовал знаменательный для русской истории акт. Именно благодаря нему в Империи появилась Государственная Дума, а русский народ получил беспрецедентное количество свобод. Самым разумным шагом для возрождённого российского государства было бы восстановить этот манифест. Конечно, у свобод должны быть свои рамки, и царь в случае чего будет иметь право вето. На всякий случай." 
 SOV_intensify_de_bolshevization: "Усилить Де-Большевизацию"
 SOV_intensify_de_bolshevization_desc: "Когда большевики установили свою "народную" деспотию они, постарались сделать всё что в их силах, чтобы уничтожить память о предыдущем режиме. Множество городов и целых областей были названы в честь красных палачей, в иных же случаях исторические названия заменялись бессмысленным новоделом. Режим Владимира Жириновского, конечно, боролся с этим, но этого оказалось недостаточно. Благодаря нам имена эпохи красного безумия навсегда будут забыты, а города, поселки и даже улицы вернут свои названия либо обретут новые и справедливые." 
 SOV_municipal_zemstva: "Муниципальные Земства"
 SOV_municipal_zemstva_desc: "Было бы невероятно глупым шагом отказываться от самоуправления на местах в восстановленной империи. Традиции муниципального самоуправления будут прекрасно сочетаться с восстановленными земствами. В конце-концов, люди на местах лучше бюрократов знают, где им поставить фонарь или провести новую дорогу." 
 SOV_legacy_of_alexander_reforms: "Наследие Реформ Александра"
 SOV_legacy_of_alexander_reforms_desc: "О Александр II! Просвещённый реформатор убитый неблагодарной толпой! Однако, несмотря на все прошедшие годы, мы не забыли о его идеях. Мы амнистируем осуждённых режимом ЛДПР по политическим делам! Однако, безусловно, самым главным достижением Александра было народное образование. Десятки новых университетов откроются по всей империи, а уже имеющиеся будут модернизированы до современного уровня." 
 SOV_new_zubatovchina: "Новая Зубатовщина"
 SOV_new_zubatovchina_desc: "Наша империя ни в коем случае не должна ограничивать своих граждан. И желание реформ, и потребность в государственной заботе является нормой. Однако порой настроенные таким образом граждане поддаются влиянию народовольческих агрессивных групп и попадают во власть террористов, грезящих о смерти империи. Для того, чтобы не допустить этого, мы адаптируем идеи Сергея Зубатова для новой эры. Радикальные граждане будут получать возможность выплеснуть свою энергию в митингах и прочих видах активности при помощи подконтрольных нам организаций. А доблестные сотрудники охранки проследят, чтобы они не натворили при этом глупостей." 
 SOV_free_and_imperial: "Свободная И Имперская Россия"
 SOV_free_and_imperial_desc: "Иностранцы привыкли ассоциировать Россию с медведем. Животным, грузным, неповоротливым и диким. Но возрождённая империя невероятно далека от этого стереотипа. Словно гордый орёл, она смотрит с высока на то как запад скатывается в хаос при этом аккуратно ограждая своих птенцов крыльями. Впрочем, мы не ограничиваем наших граждан. Они имеют широкие свободы и могу влиять на власть как на локальном, так и на национальном уровне. Новая империя живёт мечтами о светлом будущем и грёзами о новом мире. И вместе с нашими людьми мы построим страну для всех." 
 SOV_samoderzhavie: "Самодержавие"
 SOV_samoderzhavie_desc: "Народ никогда не пойдёт за слабым лидером. Даже в беззубых западных демократиях постоянно побеждает наиболее сильные и харизматичные лидеры, способные вести народ за собой. Именно таким и должен быть русский государь - сильным и строгим, но справедливым. Словно отец для более чем сотни миллионов людей, он должен вести народ в будущее при этом не боясь самолично принять удар. Пришло время обновлённого самодержавия, благодаря которому империя воспрянет вновь." 
 SOV_committee_of_ministers: "Верные Советники"
 SOV_committee_of_ministers_desc: "Глупо было бы думать, что самодержавие представляет из себя пещерную автократию. Чтобы управлять гигантской страной, царю нужны надёжные советники которые всегда смогут прийти на помощь и предложить помощь в решении проблемы." 
 SOV_for_faith_tsar_homeland: "За Веру, Царя И Отечество"
 SOV_for_faith_tsar_homeland_desc: ""Православие, Самодержавие, Народность" -  вот те три слова на которых и держится вся наша империя. Наш народ знает что нет смерти праведней, чем за Отечества и за Царя-батюшку Самодержца. Русский народ живёт и умирает, зная, что Господь всегда присматривает за ним. А мы в ответ славим его, ибо всё делается по его воле." 
 SOV_strengthen_governships: "Укреплять Власть Губернаторов"
 SOV_strengthen_governships_desc: "Царь не может править всем самолично. Для управления гигантской страной нам нужны губернаторы для, того, чтобы мудро править обновлёнными губерниями и областями. И было бы крайне глупо требовать от новых наместников обращаться по каждой мелочи к царю батюшке. Пришло время расширить полномочия губернаторов, дав им власть управлять регионами так, чтобы они процветали! В разумных пределах, естественно." 
 SOV_sovereign_empire: "Суверенная Империя"
 SOV_sovereign_empire_desc: "Одним из символов русской империи традиционно считается орёл - гордая и мудрая птица. Однако обновлённая империя всё чаще сравнивается с бурым медведем. Грозным повелителем леса, который в одиночку способен наводить ужас на всех зверей, но при этом первый не нападает. Животное величественное и сильное, способное одним взмахом своей лапы прекратить чью угодно жизнь. Точно так же и наша империя: гордая и могучая но при этом миролюбивая. Мы не хотим войны и не желаем никому зла. Западные инновации не интересуют нас так как мы сами по себе. Но, с другой стороны, мы вызываем благоговение  у наших друзей и животный ужас у наших врагов. Империя жива и гордо марширует вперёд и никто не в силах нам помешать. Ведь мы - русские! С нами Бог!" 
 SOV_russia_we_brought_back: "Россия Которую Мы Вернули"
 SOV_russia_we_brought_back_desc: "Ах, какая была держава! Ах, какие в ней были люди! Быть может, сотню лет мы и совершили ошибку, но она не была непоправимой. Спустя век, пролив немало крови и хдебнув немало горя, мы, словно дети малые, пришли просить прощения и Господь воздал нам. Теперь же мы можем пожинать плоды своих усилий. Более русский народ не будет сокрушаться об утерянном золотом веке. Ведь империя воскресла, словно феникс из пепла. Наши реформы привели к невиданному подъёму  культуры. Быть русским вновь стало почётно. Новая аристократия стала образцом для подражания и порой даже затмевает собой западных знаменитостей. Никто сейчас не может предсказать что произойдёт с Россией и всем миром в ближайшие года. Однако мы точно можем сказать, что верноподданные пойдут за царём-батюшкой даже в пекло, зная что это будет священная битва за империю. За Веру, Царя и Отечество!"
 SOV_great_victory: "Великая Победа"
 SOV_great_victory_desc: "Отряхиваясь от дыма битвы, современные богатыри поднимаются с залитого солнцем поля боя. Богиня Победы берет их за руку, и воздух наполняется звуками триумфальной музыки. Серый камуфляж исчезает, сменяясь сверкающей парадной формой, а медали ярко сияют, символизируя сладкий вкус победы. Хотя Российской империи еще предстоит пройти долгий путь до господства на земле, сегодняшний день знаменует собой одну из самых славных глав в нашей истории. Солдаты, несущие знамя Жириновского и скандирующие "Да здравствует Жириновский!", маршируют по мощеным улицам Красной площади, вторя великим победам Парижа в 1815 году и Берлина в 1945-м - завершая эпоху."
 SOV_death_of_leader: "Смерть Лидера"
 SOV_death_of_leader_desc: "По всему миру в унисон приспустили российские флаги, отмечая кончину Владимира Вольфовича Жириновского - верховного лидера, который основал и расширил Либерально-демократическую партию, привел Российскую империю к возрождению и обеспечил победу в Европейской войне. Его наследие вписано в историю России, а бесчисленные достижения никогда не будут забыты. Когда каждый россиянин медленно проходит мимо украшенного цветами гроба Жириновского, в его голове звучит один вопрос: Что будет дальше?"
 SOV_stabilize_the_administration: "Стабилизировать Администрацию"
 SOV_stabilize_the_administration_desc: "Пусть это не то, на что мы надеялись, но это реальность - после смерти Жириновского Либерально-демократическая партия неуклонно раскалывается. Фракции внутри партии сталкиваются из-за различий в видении будущего, а амбициозные личности претендуют на высший пост, потихоньку наращивая поддержку и власть. В прошлом их объединяло сильное руководство Жириновского, но теперь это единство исчезло. По мере роста напряженности тот, кто одержит верх и окажется наиболее безжалостным, очистит своих соперников и заявит о своей власти над Жириновским. И этот человек...?"
 SOV_reward_war_heroes: "Наградить Героев Войны"
 SOV_reward_war_heroes_desc: "Когда волны солдат вернутся с полей сражений в Европе, их ждет восторженная встреча с русским народом. Герои войны получат достойное вознаграждение за свою службу: повышение по службе, банкеты, медали и премии. Даже самые обычные рядовые получат щедрые награды, а высокопоставленные генералы будут удостоены доброй чести. Для Либерально-демократической партии и руководства правительства это ценная возможность укрепить связи с военными, усилить свое влияние и заручиться лояльностью армии. Это беспроигрышная ситуация как для солдат, так и для правительства."
 SOV_strengthen_security_forces: "Укрепить Силы Безопасности"
 SOV_strengthen_security_forces_desc: "Напряжение внутри страны не ослабевает с момента смерти лидера. Как и предполагалось, враждебные силы в тени готовят заговор против российской власти. Будь то агенты, поддерживаемые иностранцами, недовольные люди с личными обидами или сфабрикованные шпионские заговоры, призванные посеять страх и манипулировать лояльностью, кризис создал возможность для консолидации и расширения нашей власти. Внутренние решения требуют увеличения численности и масштабов бюро безопасности, военной полиции, национальной гвардии и отделов действий разведывательного комитета. Меч и щит империи" будет всегда бдительным!"
 SOV_russkiy_mir_doctrine: "Доктрина "Русского Мира""
 SOV_russkiy_mir_doctrine_desc: "Победа в европейской войне значительно укрепила национальную гордость россиян, и по мере стабилизации сферы влияния России восхищение нашими достижениями продолжает расти, вызывая новую волну культурного возрождения. Российский народ стремится увидеть отражение сегодняшней славы в делах своих предков, что дает нам прекрасную возможность продвигать повестку дня "Русского мира". Многополярный мир, построенный на основе разнообразных культурных сообществ, предлагает идеальную основу для расширения российского влияния, и мягкая сила России достигнет новых высот."
 SOV_stimulate_our_economy: "Стимулировать Нашу Экономику"
 SOV_stimulate_our_economy_desc: "Послевоенная реконструкция приведет к короткому периоду быстрого восстановления экономики, но вскоре мы должны найти новые источники роста. К счастью, наша расширенная европейская сфера влияния предоставляет огромное количество населения, ресурсов и богатств - достаточно, чтобы еще больше укрепить экономику России и обогатить ее народ. Тем временем банки и инвестиционные компании, контролируемые государством, начнут серьезный финансовый подъем, благодаря чему россияне смогут наконец насладиться процветанием, которое они заслужили после долгих лет лишений."
 SOV_the_third_rome: "Третий Рим"
 SOV_the_third_rome_desc: "От "Первого Рима" до константинопольского "Второго Рима" это наследие перешло к Москве, известной как "Третий Рим". В прошлом мы считали своим долгом продолжить миссию великой империи, добиваясь уважения европейских народов и возможности формировать мировой порядок. Сегодня "Третий Рим", имя которого раньше считалось невозможным, превзошел обоих своих предшественников, а также других самопровозглашенных наследников Рима, таких как Британская и Американская империи. Россия находится на пути к тому, чтобы стать центром человеческой цивилизации и культуры на многие поколения вперед. А для этого нам, конечно, нужна обновленная столица!"
 SOV_cleanse_the_party: "Очистить Партию"
 SOV_cleanse_the_party_desc: "Скорбь о смерти "Верховного правителя" охватила всю Россию, словно сама страна замерла. Однако этот момент затишья мог дать нашим врагам шанс нанести удар. Диверсанты могут воспользоваться уязвимостью народа, нарушить покой нашего покойного лидера или, что еще хуже, подорвать наше с таким трудом завоеванное положение во власти. Чтобы предотвратить это, в первую очередь необходимо обеспечить стабильность основных структур страны - государственного аппарата. Сильная и лояльная бюрократия будет играть ключевую роль в распределении власти после ухода лидера."
 SOV_promote_pro_russian_loyalists: "Продвигать Пророссийских Лоялистов"
 SOV_promote_pro_russian_loyalists_desc: "После победы в европейской войне нам предстоит завоевать новые рубежи. Внутри наших новоприобретенных земель затаился враг и саботирует наши усилия по примирению с нерусскими, но теперь это будет исправлено. Мы обратимся к нашим пророссийским элементам и поднимем их на более высокие посты, наградим друзей и накажем врагов."
 SOV_new_economic_sphere: "Новая Экономическая Сфера"
 SOV_new_economic_sphere_desc: "Чтобы достичь больших высот процветания, нам придется держать руку в метафорической банке с печеньем, поэтому целесообразно сделать так, чтобы экономика стран-клиентов больше зависела от нас, а мы в то же время получали выгоду."
 SOV_crackdown_on_the_separatists: "Подавить Сепаратистов"
 SOV_crackdown_on_the_separatists_desc: "Предатели, злонамеренные националисты и бредовые борцы за "свободу" уже несколько месяцев подрывают внутреннюю безопасность, произнося свои отвратительные лозунги и размахивая устаревшими флагами.\nСегодня наступает день, когда мы опускаем сапог на их лица, Россия просто воссоединилась с тем, что когда-то было потеряно, и любое отклонение от этого является изменой."
 SOV_fund_our_subjects: "Финансировать Наши Субъекты"
 SOV_fund_our_subjects_desc: "Ребенок без родителей - как заблудший ягненок, без должного руководства он упрется головой в стену. Наши подопечные с трудом держатся на ногах после разрушительной войны в Европе, но, к счастью, мы можем обеспечить им страховку, и при должном финансировании и надежной руке на плечах они смогут выдержать любую бурю."
 SOV_rebuild_the_baltics: "Перестроить Балтику"
 SOV_rebuild_the_baltics_desc: "Прибалтика была одним из самых ярких примеров растраченного потенциала. Вернув регион под наше видение, мы сможем перестроить его по нашему образу и подобию и восстановить то, что делало его прекрасным изначально.\nЭто не только создаст рабочие места, но и распространит добрую волю на людей, живущих в Прибалтике."
 SOV_expand_new_governorships: "Расширить Новые Губернаторства"
 SOV_expand_new_governorships_desc: "В случае с нашими вновь приобретенными территориями возникает вопрос о создании на них новых губернаторств, предоставлении им ограниченной автономии и выполнении функций главного административного подразделения. Это не только успокоит более сердитых подданных, но и облегчит бремя бюрократии и наши административные возможности."
 SOV_future_of_poland: "Будущее Польши"
 SOV_future_of_poland_desc: "Польша была бельмом на глазу на протяжении десятилетий. Мало того, что ее жители ненавидят нас со слепым рвением, с ними еще и просто ужасно работать.\nНаходящаяся под нашим контролем часть Польши пережила немало потрясений, и под пристальным взглядом Москвы нам придется принять окончательное решение о том, что делать с польской нацией."
 SOV_improve_curriculum: "Улучшить Учебную Программу"
 SOV_improve_curriculum_desc: "Для такой страны, как Россия, хорошее образование населения просто необходимо. Текущие учебные программы попросту устарели и требуют своевременного обновления. Все сферы образования - от точных наук до обществознания - должны быть переработаны, а методы обучения пересмотрены для соответствия самым современным стандартам. Россия должна гордиться своими учёными и специалистами!"
 SOV_serenity_with_our_history: "Умиротворение Нашей Историей"
 SOV_serenity_with_our_history_desc: "Несмотря на то, что коммунисты творили в 20 веке, мы не должны видеть всё исключительно через призму ужасов. Всё-таки Советский Союз - это тоже в каком-то виде Россия, с тем же народом, и мы имеем право гордиться его успехами и достижениями, прорывами и победами. Первым в космос полетел Гагарин, трудами Курчатова Россия получила неоспоримый ядерный аргумент, а работы Лихачёва по филологии и этике до сих пор актуальны и ценны. В своё время коммунисты противостояли агрессивным капиталистам Запада, сейчас же ситуация кардинально изменилась. Но одно остаётся неизменным - правда за Россией!"
 SOV_increase_working_class_engagement: "Повысить Вовлеченность Рабочего Класса"
 SOV_increase_working_class_engagement_desc: "Для процветания страны экономика должна быть эффективной, но есть одна проблема. Сколько бы прав и свобод ни было у рабочих, без желания трудиться рассчитывать на отличный результат не стоит. Мы будем всеми способами стараться повысить мотивацию трудящихся, но без излишнего энтузиазма, ведь мы всё-таки заботимся о наших подданных. Увеличение жалованья, улучшение рабочих условий и программы психологической помощи для предотвращения эмоционального выгорания - всё это необходимо, чтобы рабочий класс чувствовал себя комфортно. Ведь народ России - главная её ценность!"
 SOV_imperial_trade_unions: "Имперский Профсоюз"
 SOV_imperial_trade_unions_desc: "Самая большая ошибка старой Империи - недостаточное внимание проблемам рабочих. Но мы таких просчетов допускать не будем. Рабочий класс сможет защищать свои права и свободы в рамках Имперского Профсоюза, действующего в каждом уголке страны. Каждый трудящийся будет защищен от произвола начальников! Пусть каждый знает, что Империя заботится о них!"
 SOV_electable_governors: "Избираемые Губернаторы"
 SOV_electable_governors_desc: "Избирательные права подданных империи не должны ограничиваться только общегосударственными выборами! Для оптимизации управления страной и расширения демократических прав жителей империи мы введём выборы региональных губернаторов. Да, это может повлиять на стабильность в регионах, но мы полны решимости! Подданным самой большой страны в мире - самые широкие права!"
 SOV_diminish_royal_authority: "Ослабить Царскую Власть"
 SOV_diminish_royal_authority_desc: "Ни в одной процветающей монархии в мире власть не сосредоточена в руках монарха. Мы чтим нашего царя, но для эффективного функционирования правительства страны необходимо ограничить его полномочия в управлении государством. Царь останется символом России, тем не менее, большую часть его полномочий возьмёт на себя канцлер и Дума. Сильной России - сильная избираемая власть!"
 SOV_labor_democracy: "Трудовая Демократия"
 SOV_labor_democracy_desc: "Сотрудники предприятий должны иметь возможность контролировать свою работу, даже если это может сказаться на производительности.\nПрофсоюзы - это, конечно, замечательно, но нам также нужен контроль на рабочих местах.\nОбщество Империи уже готово к более радикальным шагам в сторону нового социализма, который не противоречит монархическому строю."
 SOV_peoples_empire: "Народная Империя"
 SOV_peoples_empire_desc: "Империя с социалистическим правительством, империя для народа - ещё недавно эти слова казались чем-то невозможным, бессмыслицей, противоречием. Но сегодня это неоспоримая реальность: рабочие славят царя, государство защищает права трудящихся, и никто не сможет отрицать очевидного. Мы сумели объединить традиции и прогресс, сохранив величие прошлого и устремившись в будущее. Нам ещё многое нужно сделать, предстоит преодолеть немало испытаний, но главное уже достигнуто - заложен прочный фундамент Народной Империи. Слава царю, слава народу, слава России!"
 SOV_fund_religious_schools: "Финансировать Религиозные Школы"
 SOV_fund_religious_schools_desc: "У многих жителей России по каким-то причинам есть укрепившийся стереотип о том, что религиозные школы являются местом для неудачников. Но не эта ли самая религия сберегла знания в тёмные века? Не эта ли самая религия всегда была островком стабильности в вечно меняющимся мире? Для того, чтобы бороться с данными предрассудками, мы вложим деньги в открытие новых религиозных школ и модернизацию уже существующих."
 SOV_russian_traditional_values: "Традиционные Ценности России"
 SOV_russian_traditional_values_desc: "Предыдущая власть часто говорила о традиционных ценностях. Но что они значат без истинной веры? Может ли человек неверующий или опьянённые национализмом, полюбить ближнего своего? Может ли вечно живущий ненавистью и гордыней ценить своё отчество? Нет и нет! Пришло время сосредоточиться на настоящих русских культурных ценностях, что были нашими духовными скрепами долгое время. Пусть растут цветы! Пусть люди любят и славят своё Отечество! А ежели кто-то попытается нарушить устои, то наказание не заставит себя ждать."
 SOV_care_for_our_elders: "Забота о Наших Стариках"
 SOV_care_for_our_elders_desc: "Есть люди, что, казалось бы, "отжили своё", старые, порой больные и бессильные. Можно подумать что просто оставить их тихо помирать будет правильным шагом, они же уже бесполезны для государства. Но мы не можем их бросить! Что же это за государство что отворачивается от людей после того как они вложили все свои силы в то чтобы его сделать великим? Мы организуем программы помощи старикам, увеличим пенсии и начнём популяризацию заботы о старшем поколении. Сначала они вели за ручку нас. Теперь пришло время нам самим протянуть руку помощи!"
 SOV_imperial_business_grants: "Имперские Бизнес-Гранты"
 SOV_imperial_business_grants_desc: "Россия - это страна возможностей. Огромное количество ресурсов, безграничные просторы и бесчисленное количество светлых умов. Осталось лишь подтолкнуть их в правильном направлении и Россия станет богатейшей страной на свете. Десятки предприятий с нашей помощью смогут стать конкурентами на рынке. А остальные страны, видя это, будут завидовать нашей модели капитализма."
 SOV_benefits_for_all_faiths: "Преимущества Для Всех Конфессий"
 SOV_benefits_for_all_faiths_desc: "Что будет, если дать всем право перекраивать мир, как они хотят? Хаос, разруха, разделение общества... Можем ли мы допустить чтобы хотя бы что-то из этого произошло в самой большой стране на свете? Конечно, нет! Одна мысль об этом кажется безумством! Отныне государственной религией нашей страны станет православие, ибо только оно истинно верно к учению Христа и только с ним человек может спасти свою душу на Страшном Суде. Что же до остальных конфессий? Они продолжат существовать, однако любая публичная деятельность будет серьезно ограничена, а за попытку  переманить православного в другую веру будут серьёзные штрафы. Нет слишком высокой цены, если цель - спасение души."
 SOV_affirm_state_orthodoxy: "Утвердить Государственную Православность"
 SOV_affirm_state_orthodoxy_desc: "Иисус Христос, Сын божий во время своих речей учил людей быть терпимыми и любить своих ближних. И Россия это страна с несколькими десятками народностей и религий. Было бы глупо ровнять их под одну гребёнку и заставлять принимать единую веру. То, что работает для нас, вряд-ли подойдёт калмыку или же жителю Кавказа. Отныне все религии буду пользоваться одинаковыми привилегиями и получать средства на свои проекты. Будь то православие ислам, католичество или иудаизм. В России рады всем! До тех пор, пока вы не переходите границы, разумеется."
 SOV_church_state_synchronism: "Синхронность Церкви и Государства"
 SOV_church_state_synchronism_desc: "История отношений Российского государства с церковью - это всегда история противоречий. То правители пытались подчинить церковь, то всячески сражается с ним, пытаясь максимально исключить из общественной жизни. Однако мы смогли добиться казалось бы невозможного, синхронности государства и церкви. Государство не контролирует церковь и не сражается с ней. В ответ церковь не противостоит государству и не пытается поднять людей против текущего режима. Вместо этого они вместе идут в светлое будущее, не пересекаясь, но при этом преследуя общую цель. Быть может рай на земле построить и нельзя, но мы всеми силами постараемся создать государство, максимально близкое к этому. "
 SOV_revive_the_leib_gvardiya: "Возродить Лейб-Гвардию"
 SOV_revive_the_leib_gvardiya_desc: "Лейб-гвардия в своё время была наиболее боеспособной и привилегированной частью Российской Императорской Армии. Её первоначальной задачей была защита Государя, но со временем из царской охраны гвардейцы превратились в грозную силу, с которой враг считался. Нарва, Бородино, Кульм, Париж - слава русского оружия непрерывно связана с Гвардией.\nДа, большевики во время Великой Отечественной решили возродить "гвардейские" дивизии, но с настоящей Гвардией они имеют мало чего общего. Та же самая практика перешла и Ельцинской России, но только сейчас, когда наша власть стоит твердо, мы можем вернуть Гвардии её былое величие, её былое значение."
 SOV_promote_political_apathy: "Стимулировать Политическую Апатию"
 SOV_promote_political_apathy_desc: "Политика - слишком сложная вещь для обычного человека. Людьми достаточно легко управлять, поэтому излишний интерес народа к политическому процессу может привести к недопустимому иностранному вмешательству. Чтобы обезопасить государство и искоренить радикалов, мы будем проводить политику ограничения участия простых людей в процессе государственного управления и законотворчества."
 SOV_no_societal_decadence: "Нет Общественному Упадку"
 SOV_no_societal_decadence_desc: "На протяжении всей российской истории моральное разложение общества приводило к огромным проблемам. Одна из наших первостепенных задач - ни в коем случае не допустить упадка в обществе. Для этого мы задействуем все возможные способы: будем продвигать нашу, не искажённую зарубежным влиянием, культуру, пропагандировать в школах наши российские ценности и, естественно, расширим сотрудничество с церковью. Всё ради величия России!"
 SOV_unite_with_imperial_monopolies: "Объединение с Имперскими Монополиями"
 SOV_unite_with_imperial_monopolies_desc: "У сильного государства должна быть сильная опора. Этой опорой станут лояльные нам государственные корпорации. Для обеспечения нашего экономического суверенитета и процветания мы будем проводить политику кооперации с имперскими компаниями. Нам - результат их работы, им - наша снисходительность и защита."
 SOV_expand_tsar_power: "Расширять Царскую Власть"
 SOV_expand_tsar_power_desc: "На протяжении всей российской истории царь был центральной фигурой-основой власти и единства государства. Так было, так есть и так будет. Слово царя - закон, его воля неоспорима, а решения направлены на благо державы. В связи с этим мы расширим императорские полномочия, чтобы он мог в полной мере направлять развитие страны и обеспечивать порядок. Дума и канцлер продолжат выполнять свои функции, но под чутким присмотром монарха, дабы избежать раздоров и неопределенности. Россия-это царь, а царь-это Россия!"
 SOV_solidify_chancellors_authority: "Укрепить Авторитет Канцлера"
 SOV_solidify_chancellors_authority_desc: "Царь, конечно, является символом России, олицетворяя ее силу, традиции и величие. Однако каким бы мудрым он ни был, он может быть недостаточно компетентен в вопросах управления государством. Именно по этой причине необходимо расширить возможности канцлера, наделив его дополнительными полномочиями, чтобы он мог грамотно исполнять волю императора, обеспечивая стабильность и развитие страны. Под его руководством государство будет работать четко и слаженно, а власть - действовать эффективно. Ведь крепкое государство нуждается не только в правителе, но и в грамотных политиках, преданных отечеству."
 SOV_united_society: "Единое Общество"
 SOV_united_society_desc: "Залог успеха страны - в народном единстве. Испокон веков Россия стояла крепко именно благодаря сплоченности своих жителей, их верности родине и преданности традициям. В самые тяжелые времена народ вставал единым фронтом, отражая угрозы, преодолевая смуты и закаляя державу. История не раз показывала, что сила России - в ее народе, а сам народ черпал силу в вере в своего правителя. Всех жителей империи, независимо от положения, объединяет одно - их царь. Он не просто символ власти, но и воплощение самой идеи государства, его нерушимого порядка и процветания. Пока Россия едина, ничто не сможет её сломить!"

 SOV_loyality_to_the_tsar: "Верность Царю"
 SOV_loyality_to_the_tsar_desc: "Самодержавие - одна из главнейших скреп Русского народа. Царь всегда являлся его пастырем, направляющим на путь истинный. К сожалению, различные "интеллигенты" и предатели исказили образ доброго царя в глазах простого народа, сделав из благожелателя тирана. Тот же самый нарратив был и всю большевистскую эпоху, окончательно закрепив в народном разуме мысль, что "царь плохой и бояре плохие". Пришло время государю править своими подданными безраздельно и справедливо."
 SOV_new_black_hundreds: "Новые Черносотенцы"
 SOV_new_black_hundreds_desc: "Черносотенные организации появились во время Революции 1905-1907 года как реакция на беснование социалистов и либералов. Они были настоящими патриотами своего Отечества, и их борьба с различными антиимперскими элементами если и не поощрялась, то не осуждалась и не преследовалась. Из-за предательства Думы в феврале 1917го черносотенцы оказались запрещены, но даже в эмиграции они продолжили своё дело.\nС падения большевистского государства новые черносотенцы снова подняли свои знамёна, свято отстаивая традиции и имперский уклад жизни. Царю нужны верные подданные, и лучше кандидатур на министерские места, чем черносотенцы, представить сложно."
 SOV_devout_nation: "Благочестивая Страна"
 SOV_devout_nation_desc: "Россию невозможно представить такой, какая она есть, без христианства. Именно православие сделало Русь преемницей Византии, стало важнейшим инструментом формирования русского народа и культуры. С молитвой крестьяне, городские жители, купцы, чиновники и цари просыпались, ели, работали и засыпали.\nНо всё это было утеряно после того, как власть захватили безбожники-большевики. Они уничтожали храмы, иконы, монастыри, убивали и ссылали священников: всё, чтобы вычеркнуть из народной памяти тот факт, что именно христианская вера объединяла русских всех чинов и сословий. Хоть и красное правление окончилось, но люди не стали от этого набожней: регулярно посещала храмы лишь небольшая прослойка населения, состоящая преимущественно из женщин. Пришло время вернуть всему русскому народу веру в Христа!"
 SOV_russification_intensification: "Усиление Русификации"
 SOV_russification_intensification_desc: "Раньше империя была едина. Все, от киргиза до литовца, от финна до грузина, были подданными Русского царя. Но из-за предателей-либералов и безбожников-большевиков эти народности обрели "национальное самосознание". Вместо того, чтобы спокойно жить в мире, народы решили бороться за автономии. На этих противоречиях и сыграли большевики, что их через более чем полвека и погубило. Теперь, когда мы правим всей бывшей территорией Российской Империи, мы усилим деятельность по русификации имперских окраин, чтобы такого больше не повторилось. Да, Бобриков!"
 SOV_radicalize_lower_stratum: "Радикализировать Низшие Слои"
 SOV_radicalize_lower_stratum_desc: "Русский народ - величайший народ в истории. Его выходцы изменяли законы науки, мироздания, философии, становились гениальнейшими литераторами и художниками. Но всяческие национал-предатели усыпили его, а самых активных подчинили себе. Разрушим десятилетия апатии! Все - в Чёрные Сотни, строить Русский Мир!"
 SOV_loyal_religious_doctrine: "Лояльная Религиозная Доктрина"
 SOV_loyal_religious_doctrine_desc: "История взаимоотношений Русского государства с Православной церковью была... неоднозначной. Реформы Петра Первого подчинили церковь государству, отменив институт патриаршества, восстановленный только в 1943 году. Вместо патриарха главную роль в РПЦ стал играть Святейший Синод: назначаемый Государем орган власти. Конечно, отменить патриаршество это слишком радикально, но мы можем создать, кхм, "совещательный" Собор, который будет назначаться Царём. Таким образом, государева воля будет проецироваться и через религию."
 SOV_myth_of_nicholas_the_passion_bearer: "Миф о Николае Страстотерпце"
 SOV_myth_of_nicholas_the_passion_bearer_desc: "С 90-ых годов в РФ существовало "учение о царе-искупителе". Эта ветвь "народного православия" считает, что смерть Николая II - это искупительная жертва перед грехами русского народа, и что за его убийство он должны каяться. Конечно, идеи некоторых радикалов про "сатанинские" ИНН и страховые полисы вредны, но мысль про богоизбранность русского народа и самодержавной власти очень заманчива..."
 SOV_imperial_nationalism: "Имперский Национализм"
 SOV_imperial_nationalism_desc: "Наш народ не должен забывать: все мы - подданные Империи! Все: от чиновника до предпринимателя, от рабочего до фермера, от Владивостока до Варшавы, мы - Русские! И мы должны гордиться этим!"

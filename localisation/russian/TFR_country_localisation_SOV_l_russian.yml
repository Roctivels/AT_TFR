 russia.895.t: "Калининградский Губернатор"
 russia.895.d: ""
 russia.895.a: "Очень интересный человек... Пригласите его поближе к Кремлю."
 russia.895.b: "Он должен оставаться там, где находится сейчас."
 russia.896.t: "Человек Из Тулы"
 russia.896.d: ""
 russia.896.a: "Он очень энергичен и пользуется популярностью, и Кремлю нужны такие люди."
 russia.896.b: "Он должен оставаться там, где находится сейчас."
 russia.897.t: "Гордый Чеченец"
 russia.897.d: ""
 russia.897.a: "Несмотря на его... "причуды", никто не может отрицать, что это помогает добиваться поставленных целей."
 russia.897.b: "Мы должны оставить его в Чечне."
 russia.898.t: "Абсолютно Преданный Человек"
 russia.898.d: ""
 russia.898.a: "Какой великий человек! Не обращайте внимания на его заговоры, нам действительно нужны такие сильные люди."
 russia.898.b: "На мой вкус, он слишком предан."
 russia.899.t: "Экономист С Дальновидным Подходом"
 russia.899.d: ""
 russia.899.a: "Он может помочь нам в управлении экономическими делами и обеспечении большего процветания людей."
 russia.899.b: "Э-э, слишком много внимания проблемам Центрбанка."
 
 russia.900.t: "Закат в Туве"
 russia.900.d: "Кызыл, столица Тувы. Самый бедный регион Старой Федерации. Наибольшую славу региону принес великий генерал Сергей Шойгу, тувинец по происхождению и генерал, долгие годы возглавлявший российскую армию. Но только этот человек был единственной гордостью тувинского народа на протяжении многих лет. Молодежь все больше теряла интерес к изучению родного языка, желая выучить русский и уехать на Запад, где есть работа.\n\nВ очередной день в Туве заходит солнце, российский триколор уже много месяцев не развевается над школой. Салчак шел домой с уроков, как в любой будний день, и тихонько напевал про себя, ожидая, пока его догонит младшая сестра Лариса. На занятиях она всегда задерживалась. Она появляется с широкой улыбкой на лице, и Салчак замечает. "Чему ты так радуешься?" спрашивает Салчак.\n "Учителя говорят, что мне не нужно учить русский! Мне нужно сосредоточиться на тувинском! Что-то про новые правила из Москвы!" говорит Лариса веселым тоном. Салчак думает про себя: он увидел еще одного самодержца в Москве и задумался об истории, как он учил ее в школе. Все самодержцы до сих пор эксплуатировали или игнорировали тувинцев. Он не думал, что Дугин будет другим. "Дугин хочет, чтобы мы учили тувинский язык? Это тебе учителя сказали?" спрашивает Салчак. "Да!", - улыбается Салчак. "У тебя всегда были проблемы с русским языком."\nМожет быть, у Тувы все-таки есть будущее."
 russia.900.a: "Как и предсказывал Дугин в своих трудах."
 russia.901.t: "Четвертая Политическая Теория"
 russia.901.d: "Евразийство долгое время практиковалось Россией только на уровне внешней политики и на философском уровне самим Дугиным, но административные реалии заставили Дугина задуматься в своем московском офисе о том, как дальше управлять государством. Хотя старая федеральная система неадекватна, она в некоторой степени учитывает интересы меньшинств по всей России. Дугин размышляет об этом, ведь в 90-е годы он был одним из основателей Национал-большевистской партии вместе с Лимоновым, а его труды с тех пор привлекли многих других представителей консервативных кругов. История показывает ему множество методов управления, но только один из них может быть принят и может благоприятствовать одному крылу его партии над другим.\n\nДугин вызывает своих друзей, своих доверенных лиц, свою жену, они сидят в кабинете и часами обсуждают идеи. На первый план выходят три идеи. Склониться к национал-большевистскому лагерю и восстановить псевдосоветскую систему, систему, доказавшую свою работоспособность при правильных людях и обеспечивающую адекватную автономию различным народам Евразии. Точно так же, опираясь на историю, можно возродить систему генеральных правительств, заимствованную из царского режима, где генеральные губернаторы назначались в регионы, и снова придать этой системе форму централизованного федерализма, где губернаторы назначаются центральным правительством в Москве, но выбираются для представления региональных интересов. Последнее предложение, которое прозвучало в ходе дискуссии, - взять старую федеральную систему и усовершенствовать ее. Баланс между автономией и властью - дело непростое, но нет никаких причин, по которым Дугин и его законодатели не могут разработать новую систему, гарантирующую права всех народов Евразии на собственный язык и землю без ущерба для центральной власти.\n\nДугин разгоняет импровизированное собрание, ему нужно долго и тщательно обдумать, как продолжить реформу администрации. Решение, в конечном счете, должен принять только он."
 russia.901.a: "В голове Дугина пляшут возможности."
 russia.829.t: "Страдая от Успеха"
 russia.829.d: "Наша великая победа в Европе и возвращение всех российских территорий принесли огромную радость, но также оказали огромное давление на нашу бюрократию, систему безопасности, армию и систему образования.\n\nНам не только не хватает лояльных и способных сотрудников для заполнения многих государственных должностей на новых территориях, но и после завоевания Центральной Азии и Кавказа усиливается давление. Сейчас это отражается в нашей неспособности в полной мере оценить ситуацию в Прибалтике и Малороссии.\nЭто также привело к феномену "бедных имперских окраин", где многие жители нерусских регионов снизили качество своей жизни и, следовательно, свою способность полноценно участвовать в жизни страны в долгосрочной перспективе.\n\nМногие считают, что это разумная реакция на быстрое возвращение стольких территорий за столь короткое время."
 russia.829.a: "Любишь кататься, люби и саночки возить."
 russia.902.t: "Скандал с Участием Сына Императора"
 russia.902.d: "- Это совершенные разбойники, особенно Принц Ростислав, - говорила гостья. - Он сын Императора Ростислава, такой почтенного человека, и что же? Можете себе представить; они втроем достали где-то медведя, посадили с собой в машину и повезли к актрисам. Прибежала полиция их унимать. Они поймали участкового и привязали его спина с спиной к медведю и пустили медведя в Мойку; медведь плавает, а квартальный на нем.\n- Хороша, госпожа, фигура квартального, - закричал граф, помирая со смеху. \n- Ах, ужас какой! Чему тут смеяться, граф?\nНо дамы невольно смеялись и сами.\n- Насилу спасли этого несчастного, - продолжала гостья. - И это будущий Император так умно забавляется! - прибавила она. - А говорили, что так хорошо воспитан и умен.\n\nПусть данный тема сейчас и была всего лишь лишней возможностью для сливок общества повеселиться и перетереть кости царской семье. В более глобальном аспекте вся страна выжидала реакции императора на данный поступок наследника престола. В конце-концов ,если царь решится покрывать своего сына, это может привести к конфликту с дворянством."
 russia.902.a: "Царь воздерживается от комментариев, канцлер замалчивает это дело."
 russia.902.b: "Царь вмешивается и делает резкое заявление!"
 russia.903.t: "Популярность Царя среди Дворянства Падает"
 russia.903.d: "Темная ночь опускалась на вечерний Петербург. Город клонился ко сну. Холодный ветер Финского залива спокойно свистел на, казалось, никогда не пустующих улицах . В тоже время в своём родовом поместье Анна Павловна по-прежнему давала у себя в свободные дни такие вечера, как и прежде, и такие, какие она одна имела дар устраивать, - вечера, на которых, во-первых, собиралась сливки общества петербургской богемы, интеллектуальная элита, люди, вхожие в императорской круг общения и просто не последние в городе люди. Во-вторых эти самые люди обсуждали здесь дела насущные и думали свои тяжёлые думы о состоянии страны. \n\nСегодня, впрочем, встреча питерской богемы была куда холоднее, не прочего аристократического задора и помпезности. Казалось что постепенно аристократия начинает охладевать  к императору Ростиславу. Вот что указывал политический термометр на вечере Анны Павловны.\n\n Посреди вечера хозяйка, как это и происходило обычно удалилась, дабы собраться с мыслями и поговорить с членами высшего совета. \n\nРазговор, руководимый Анной Павловной, шел о отношении высшего света к царю. Император решил покрывать своего сына после крайне неаристократического поведения, а тот, в свою очередь окончательно распоясался в последнее время и вступил в конфронтацию с отдельными членами имперского совета. Понятно было одно, царю было срочно необходимо намекнуть на неправильность его действий. Если же он останется к требованиям дворянства, то кто знает, что ещё может произойти."
 russia.903.a: "Царь объявляет о большом собрании с дворянами."
 russia.903.b: "Заткните их."
 russia.904.t: "Император Ростислав Арестован"
 russia.904.d: "Вчера вечером император Ростислав Ростиславович после окончания экстренного заселения направился в Александровский Дворец. Через несколько часов сотрудники охранки, лояльные заговорщикам из числа представителей высшего совета, произвели операцию по аресту царя, предварительно сопроводив его супругу Фотеини и сына Ростислава в подвал. Предлогом для данного действия стали, якобы поступавшие сообщения о готовящемся покушении на царскую семью. На данный момент императору Ростиславу уже передан ультиматум высшего совета, одним из требований которого является его отречение от престола и отказ претендовать на российский трон в дальнейшем. Нет никаких сомнений в том чтобы полагать возможно того что царь откажется. Поэтому представители дворянства уже начали подготовку нового земского собора, чтобы выбрать более достойного монарха."
 russia.904.a: "Теперь мы выберем истинно достойного царя."
 russia.905.t: "Второй Земский Собор"
 russia.905.d: "После отстранения от власти первого императора возрожденной Российской Империи, Ростилава I, встал вопрос о престолонаслонаследии. В силу своей непопулярности и юности принц Ростислав, сын Императора, отказался от восхождения на трон.\nЗа неимением у Императора других наследников и ближайших родственников царских кровей было принято решение вновь провести Земский Собор и выбрать Монарха из других ветвей Романовых. Не последнюю роль в решении Собора сыграл действующий Канцлер.\nИ, таким образом, следующим императором становится..."
 russia.905.a: "Михаил II!"
 russia.905.b: "Николай III!"
 russia.905.c: "Алексей II!"

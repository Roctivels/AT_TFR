 #right-path Surkov
 SOV_history_continues_surkov: "История Продолжается?"
 SOV_history_continues_surkov_desc: "В 1992 году Фрэнсис Фукуяма предсказал немыслимых масштабов событие. Подумать только, конец истории какой мы её знаем. Не будет больше авторитарных режимов, нестабильности и прочего. Весь мир застынет в неолиберальной утопии. Последний человек, который ни во что не верит и ни к чему не привязан. А затем 11 сентября 2001 года идея о конце истории обернулась прахом. Как же хрупок оказался неолиберальный порядок и как, оказалось, просто его пошатнуть. И вот в 2020-х порядок пошатнулся вновь. Авторитаризм и конкретно путинизм взяли реванш. Куда после всего этого пойдёт история? Один лишь бог знает. Сейчас же остаётся жить дальше, зная, что, видимо, не суждено нашему поколению стать последними людьми. \n\nПришёл час Суркова, серого кардинала Путина и теневого хозяина Кремля. Кто знает, чем закончится его реформы, однако все понимают что Россия уже не будет прежней. Государство Путина будет стоять любой ценой, даже если оно изменится до неузнаваемости."
 SOV_reformalize_peoples_front: "Реформировать Народный Фронт"
 SOV_reformalize_peoples_front_desc: "Народный фронт был прекрасным инструментом предыдущего режима, но он же был рассадником опасных идей. То, что произошло после Европейской войны показало, насколько же действительно был стабилен фронт и насколько радикалы всех мастей действительно готовы консолидироваться вокруг президента. Нам не нужны настолько нестабильные элементы, и нам не нужны предатели в рядах гордых патриотов отечества. Общероссийский Народный Фронт будет очищен от нежелательных элементов, хотят они того или нет."
 SOV_kremlin_shadow_master: "Теневой Хозяин Кремля"
 SOV_kremlin_shadow_master_desc: "Мало кто видит Суркова на публике. Мало кто знает даже, где он находится в данный конкретный момент. Но абсолютно все чувствуют его влияние. Пока портреты  Путина и Медведева висят по всем учреждениям от школ до мэрий, и народ знает их в лицо, Сурков спокойно выжидает. Ему не нужна помпезность и показная популярность. Он не такой человек. Спокойно и размеренно, словно колдун перед магическим шаром, он сидит в своей башне пока десятки и сотни тонких серебряных нитей тянутся к пальцам его рук. Одним движением руки он способен сломать десяток жизней, или, наоборот, поместить на самый Олимп русской политики. Воспользуется он этим или нет? Кто знает... У теневого хозяина Кремля всегда есть свой план которого он беспрекословно придерживается."
 SOV_the_deep_people: "Глубинный Народ"
 SOV_the_deep_people_desc: "Глубинный народ... Вот он, истинный источник власти в любом государстве. Кто же они? Разные режимы пытались нащупать глубинный народ по своему: пролетарии, "бюджетники", хиппи или крестьяне. В него ходили и им пытались командовать, но всё без толку. Элита же, в свою очередь, век за веком ведёт глубинный народ за собой и вовлекает в свои эксперименты. И Владимир Владимирович умело управлял этим народом, буквально видел и чувствовал его чаяния. Сейчас нашей целью будет не нарушать этот тонкий баланс. Мы будем эмулировать методы Путина чтобы не злить глубинный народ. И чтобы развитие страны шло по выбранному нами сценарию."
 SOV_cross_out_the_outsiders: "Вычеркнуть Чужаков" 
 SOV_cross_out_the_outsiders_desc: "Время угрюмое, кончились праздники,\nМир и покой, мир и покой.\nЛомятся в дверь, это черные всадники,\nЭто за мной, это за мной.\n\nВ каждом обществе есть чужаки. Маргиналы, что не способны влиться в общество. Они вечно хотят перемен, они пытаются перетянуть одеяло на себя. Почему они так действуют? Ответов целое множество. Возможно они акторы, подчинённые воле других держав. Возможно, они искренне недовольны текущим режимом. Тем не менее, они опасны для гомогенного общества подчинённого одной единственной идеологии. Такие элементы должны быть просто исключены из системы для поддержания её стабильности."
 SOV_the_artificial_society: "Искусственное Общество"
 SOV_the_artificial_society_desc: "Сами по себе человеческие общества являются последовательным апогеем вложенной в человеческий организм потребности в социализации. Как социальные существа, мы построили конструкты, до сего невиданные в животном мире и добились невероятных высот. Но натурально возникшие общества хаотичны, нестабильны и опасны по сути своей. Продуктами их нестабильности выступают общественные волнения и постепенный распад. Но если мы сможем создать идеальное искусственное общество, что будет отвечать потребностям государства то мы поборем этот конструкт. Быть может, адаптация к жизни в нём и не будет простой задачей для граждан России, но это шаг, который необходимо будет сделать, чтобы наше государство сохраняло свою стабильность долгие годы."
 SOV_simulacra_of_outrage: "Симулякры Гнева"
 SOV_simulacra_of_outrage_desc: "Ты бы знал, чем оплачен\nэтот май, - ты бы понял,\nак печаль высока, как несбыточна нежность.\nТы запел бы иначе.\n\nОбществу всегда нужны враги. Плохие ли это бояре, мигранты или проклятые либералы, что хотят распродать страну. Конфликты нужны системам, ибо застой это есть прекращение всякого движения, что значит смерть в перспективе. На территории нашей страны будут появляться подконтрольные нам организации, которые будут перенаправлять народный гнев в верное русло. Пусть они организовывают сборы, пусть защищают нашу культуру или повышают сплочённость рабочего. Главное под надзором спецслужб. Чтобы не натворили лишнего, разумеется."
 SOV_the_long_lasting_state: "Долгое Государство"
 SOV_the_long_lasting_state_desc: "Российское государство уже пережило три своих итерации. Государство Ивана Грозного, государство Петра Великого и государство Ленина. Все они, так или иначе, стояли долгие годы  пока не пали под натиском беспощадных песков времени. Но вот пришёл черёд нового государства -государства Путина. Оно не похоже на западные "глубокие" государства. О нет! Долгое государство торчит своими неприглядным частями наружу, демонстрируя брутальные элементы. Но в этом же его ужасающая честность. Мы не прячемся за демократическими процессами, а отвечаем на вызовы времени честно, когда нужно - силой, когда нужно - словами. Какое может быть глубокое государство? Оно всё у нас на виду! Быть может, эта система и не идеальна, но она точно проживёт ещё несколько десятилетий. Если не множество веков."
 SOV_awaken_social_cohesion: "Пробудить Социальную Сплоченность"
 SOV_awaken_social_cohesion_desc: "Народ силён, только если сплочён и един в своём порыве. Но как же тяжело рассорить, казалось бы, скованный народ. Разные языки, профессии, внешности и множество других признаков ведут к разделению общества на множество самых разных ячеек. Сам данный процесс невозможно предотвратить, но мы можем смягчить его. Поддерживая создание связей между отдельными ячейками общества, мы сможем повысить сплочённость в общем. Конечно, не всем может это понравится но рано или поздно наши граждане свыкнуться с мыслью о необходимости единства. "
 SOV_cyber_propaganda_farms: "Фермы Киберпропаганды"
 SOV_cyber_propaganda_farms_desc: "Киберпространство, пусть ещё и не стало площадкой для "колонизации", однако уже сейчас является невероятно важной частью жизни любого государства. Оно уже превратилось в площадку, где самые разные мнения сражаются за право оказаться в общественном поле. Чтобы мнение нашего государства всегда было на слуху мы создадим специальные "фермы" киберпропаганды, которые будут толкать наши нарративы. В конце-концов ,порой общество может запутаться само в себе и ему нужна будет направляющая  для корректировки курса. Всё ради блага наших граждан."
 SOV_the_network_government: "Сетевое Правительство"
 SOV_the_network_government_desc: "Давно уже миновали времена когда крестьяне посылали своего джентри, чтобы передать королю свои чаяния. Но времена меняются и создаётся парадокс когда представители совершенно не понимают воли этого самого народа. С одной - это следствие отдаления всё дальше от народа, а с другой - сам народ посылает всё более непонятные сигналы. Так не лучше ли сделать правительство более эффективным и понятным для всех? И именно здесь нам поможет сеть. Конечно нужно будет начать с малого. Например с улучшения работы имеющихся сервисов и улучшения механизмов обратной связи. А ещё в данном процессе можно будет устранить множество рудиментарных элементов в нашей политике."
 SOV_consumarist_patriotism: "Потребительский Патриотизм"
 SOV_consumarist_patriotism_desc: "Любовь к родине невозможно купить. Любой шкурный интерес в конечном итоге приведёт к тому, что такой патриот перейдёт на сторону того кто предложит больше. Но нет ни слова о том, что патриотизм нельзя продать. Кто бы не захотел приобрести новую футболку с изображением президента? Или, допустим, патриотичный чехол на телефон, флаг России, георгиевскую ленточку, да что угодно! И тем более, если при этом процент с вашей покупки пойдёт на непосредственную поддержку государства. А также все изделия будут непременно проверены Роскачеством. Кому-то может показаться кощунством такое отношение к патриотизму. Мы же предпочитаем называть это патриотичным потребительством. Не желаете приобрести безделушку, кстати? Успейте взять бюст Владимира Путина, пока действует скидка!"
 SOV_digitalization_of_politics: "Цифровизация Политики"
 SOV_digitalization_of_politics_desc: "Мы уже успешно начали перенос правительства во всемирную сеть, но зачем останавливаться на достигнутых успехах? Пришёл век интернета и киберпространства чем мы и можем воспользоваться. Владимир Владимирович уже делал шаги в этом направлении, и именно благодаря ему сейчас в России так хорошо развита интернет бюрократия. Но что если мы сделаем шаг вперёд в эпоху активной борьбы за просторы всемирной сети? Пришло время цифровизовать нашу политику. Референдумы, голосования  и прочие вещи будут перенесены в интернет а миллионы граждан получат возможность в прямом эфире наблюдать за заседаниями Госдумы, и может, даже участвовать в обсуждениях в ограниченном формате. Век технологий пришёл, и мы намерены быть первыми в плане инноваций."
 SOV_towards_a_desolate_democracy: "Вперёд, к Безлюдной Демократии"
 SOV_towards_a_desolate_democracy_desc: "Демократия, она же власть народа. Нам кажется абсурдной власть народа без этого самого народа. Но будущее политики лежит за машинами. Именно так и проникает в нашу жизнь концепт цифровой демократии. Техногенное общество в котором иерархия машин и алгоритмов преследует цели, недоступные человеческому пониманию. Конечно, это сейчас может казаться невероятным. Как вы можете заменить политика на бездушную машину? Точно также думали и рабочие на сборочных линиях, пока их не заменили машинами. Это процесс который потребует не одного десятилетия, чтобы завершиться. Но Россия должна вступить в него первой. Пришло время новой эры. Эры, где железная логика исключит человеческую неэффективность. Всё ради того чтобы государство существовало долго, быть может, вечно."
 #right-path Lukashenko
 SOV_history_continues_lukashenko: "История Продолжается!"
 SOV_history_continues_lukashenko_desc: "Александр Григорьевич Лукашенко - человек непростой судьбы. Сын обычной деревенской доярки, он с детства знал цену честного труда, чаяния простого народа, своим упорством и хозяйственностью проложил себе дорогу к политическому Олимпу.\nПравление Лукашенко хоть и было деспотичным, но построенная при Союзе экономика Беларуси выстояла турбулентность девяностых. Апогеем внешней политики должно было стать Союзное государство России и Беларуси, во главе которого должен был встать Александр Григорьевич... Но идея оказалась замороженной на долгие десятилетия, пока не была реанимирована и приведена в исполнение российским правительством.\nХоть Лукашенко и не стал полноправным лидером, но и на задворки истории его не отбросило: его хозяйственность и опыт руководства оказались востребованы как никогда раньше в новой реальности, что и позволило ему стать президентом России.\n\nРодина нуждается в большей справедливости, и Батька пришёл, дабы, хоть и жесткими методами, но помочь её народу."
 SOV_subvert_peoples_front: "Взять Народный Фронт Под Контроль"
 SOV_subvert_peoples_front_desc: "Общероссийский Народный Фронт - широчайшая коалиция, призванная консолидировать российскую политику в единую силу. В неё входят как откровенные националисты, так и коммунисты; либералы и охранители. Безусловно, многие внутри Фронта не в восторге от победы Александра Григорьевича, что мешает его работе.\nКонечно, мы можем планомерно поставить его на благо идеям Батьки... Но есть и другой вариант: реформирование ОНФ в единую Народную Партию, призванная представлять общественные интересы в государстве, дабы учитывать чаяния населения при проведении реформ."
 SOV_lukashenko_constitution: "Лукашенковская Конституция"
 SOV_lukashenko_constitution_desc: "Теперь, когда Лукашенко является единоличным властителем Кремля, пришло время взяться за основу политической системы России - за Конституцию. В неё необходимо внести некоторые изменения: больший акцент на социальной политике, снятие ограничений на количество президентских сроков, ещё большие полномочия президента...\nВ России начинается новая эпоха, и новая конституция должна ей соответствовать."
 SOV_strongman_populism: "Популизм Сильной Личности"
 SOV_strongman_populism_desc: "Многие западники обвиняют Лукашенко в дешёвом популизме, игре на чувстве несправедливости, сформировавшемся в российском обществе. Что же, они в чём-то правы: Батька действительно является популистом. Но в этом и заключается главный плюс его правления: он знает, чего ожидает от него народ, и оправдывает чаяния масс.\n\nНа шахте рабочим задерживают зарплату, и они устроили забастовку? Александр Григорьевич лично приедет, обнимет работяг и даст по шапке директору! Коррупционер украл деньги, предназначенные на благоустройство микрорайона и постройку детского садика? Батька лично подпишет приказ об увольнении и начнёт против него дело!\nВедь именно это стране и нужно: сильный и справедливый лидер, делающий жизнь маленьких людей лучше!"
 SOV_encourage_pro_sovietism: "Поощрять Просоветизм"
 SOV_encourage_pro_sovietism_desc: "Советская эпоха знаменуется многими достижениями: индустриализация, победа в  Великой Отечественной, космос! Народы огромной страны вместе боролись с фашизмом, восстанавливали страну и строили новую жизнь...\nНо всё это кончилось с распадом Союза, народы разбрелись каждый по своим уголкам, пошли конфликты, распри, апофеозом которых стала Европейская война. Но вот мы вновь дружно идём к счастью: русские, белорусы, украинцы, казахи и многие другие.\nНеобходимо гордиться нашим славным общим прошлым, и по его примеру мы построим прекрасное будущее!"
 SOV_favor_the_people: "Помогать Народу"
 SOV_favor_the_people_desc: "Наша страна является домом для десятков разных народов: от русских, белорусов и украинцев до чеченцев, корейцев и якутов. За столь долгое время сформировалась новая общность, самосознание всех, кто живёт в России - российский народ, связанный общими ценностями: любовью к своей земле, суверенностью и взаимопомощью. Необходимо поощрять единство и братскую взаимовыручку среди народов нашей Родины. Вместе мы - сила!"
 SOV_social_paternalism: "Социальный Патернализм"
 SOV_social_paternalism_desc: "На Западе Александра Григорьевича называют "последним диктатором Европы", и, если уж быть честными, небезосновательно: его правление действительно жёстко по отношению к своим противникам.\n\nНо посмотрите на Европу: демократия, плюрализм... А народ страдает, изнывает от забюрократизированности, от несправедливости европейской системы! Так что же лучше: жить в "свободной" Европе, раздираемой социальными противоречиями, или в "тоталитарной" России, где созданы все условия для долгой и счастливой жизни, гарантом которой является наш Батька?"
 SOV_consolidation_of_society: "Консолидация Общества"
 SOV_consolidation_of_society_desc: "Вихри враждебные веют над Европой, и, безусловно, грядёт новая схватка с евробюрократами, ещё более озлобленными на нас, на наши успехи. Будет тяжело, этого никто не отрицает. И в столь трудные времена необходимо ещё больше объединиться вокруг Батьки, защитника нашего народа и мудрого руководителя.\nДля большей уверенности необходимо сделать ещё несколько перестановок в правительстве, привнести самых эффективных и верных. Мы не можем позволить себе слабости!"
 SOV_define_lukashenkoism: "Определить Лукашенкизм"
 SOV_define_lukashenkoism_desc: "Путинизм, несмотря на всю свою кажущуюся универсальность, в своём чистом виде не соответствует идеям, сформулированным Александром Григорьевичем. Было бы логично сформировать на основе путинского правления и белорусского опыта новую парадигму, отвечающую запросам времени: Лукашенкизм.\n\nВ основе своей Лукашенкизм предполагает сильного лидера, помогающего решать проблемы общества и экономики с упором на народ. Дабы достичь решения этих проблем, каждый бюрократ, от мала до велика, оценивается не только по своей лояльности власти, но и по эффективности своей работы. Дармоедам - не место в новой России!"
 SOV_our_common_values: "Наши Общие Ценности"
 SOV_our_common_values_desc: "Наша страна является домом для десятков разных народов: от русских, белорусов и украинцев до чеченцев, корейцев и якутов. За столь долгое время сформировалась новая общность, самосознание всех, кто живёт в России - российский народ, связанный общими ценностями: любовью к своей земле, суверенностью и взаимопомощью. Необходимо поощрять единство и братскую взаимовыручку среди народов нашей Родины. Вместе мы - сила!"
 SOV_promote_ethnic_commonality: "Содействие Развитию Этнической Общности"
 SOV_promote_ethnic_commonality_desc: "Россия - многонациональная страна, являющаяся домом для более чем сотни народов и народностей. Нельзя позволять различным националистическим элементам, играющим на руку Западу, позволять рушить наше братство! Необходимо продвигать местные культуры: тематические фестивали, работа в школах, продвигать местные кадры по карьерной лестнице и укреплять единство нашего народа. Только вместе мы сможем строить наше счастье!"
 SOV_three_slavic_sisters: "Три Славянские Сестры"
 SOV_three_slavic_sisters_desc: "Истории России, Украины и Беларуси неразрывно связаны между собой: от Древней Руси вплоть до развала Советского Союза. Беларусь смогла довольно скоро воссоединится со своей старшей сестрой, а вот Украина до последнего жила под указкой Запада, всегда мечтавшего о разрушении славянского единства. Но сквозь кровь и слёзы, Украина переродилась - и вернулась домой, к своим сёстрам. И теперь ничто не сможет нас остановить, ведь когда мы вместе - мы сильнее любых преград!\nТри славянские сестры вместе идут к счастью и процветанию!"
 SOV_the_new_union_treaty: "Новый Союзный Договор"
 SOV_the_new_union_treaty_desc: "Союз России и Беларуси - прекрасный проект, призванный объединить усилия двух братских народов: русских и белорусов, с чем он прекрасно справился. Но настали новые времена, и мы вновь сблизились с другими народами пост-советского пространства: украинским и казахским. Они хотят присоединиться к нашей семье, и кто мы такие, чтобы отказывать своим братьям?\nВместе мы построим новое Союзное государство: больше, краше и дружней! Всяческие националисты пусть брешут, пока ими не займутся наши спецслужбы, а мы пойдём вперёд, к светлому будущему!"
 SOV_reform_fsb_into_kgb: "Реформировать ФСБ в КГБ"
 SOV_reform_fsb_into_kgb_desc: "КГБ Беларуси являлся достаточно эффективной силовой структурой, охватывающей широкий спектр направлений: разведка, контрразведка, внутренняя безопасность и погранслужба. ФСБ России же имеет уникальный опыт противостояния различным угрозам: от чеченских террористов и диверсионных групп НАТО до использованных ГУР Украины наших сограждан, которых обманом заставили совершать неправомерные действия.\nБыло бы логично реформировать ФСБ по образу и подобию КГБ... С привлечением белорусских кадров, конечно же."
 SOV_dream_lives_on: "Мечта Продолжает Жить"
 SOV_dream_lives_on_desc: "Александр Григорьевич Лукашенко прошел путь от простого чиновника, главы совхоза, до лидера крупнейшей страны на планете, растянувшейся от Балтики до Тихого океана. Батька сумел обхитрить всех, взойти на трон, но и его время начинает медленно, но верно подходить к концу.\nПроделана невероятная работа: союзные народы вновь живут в мире и согласии, и вместе строят счастливое будущее, гарантом которого является наш лидер. И для того, чтобы Союзная Мечта продолжала жить ещё долгие десятилетия, нужен столь же способный преемник Батьке. Тот, кто сможет взять на себя данную ношу, закрепить успехи, кто-то молодой и амбициозный...\n\nИ младший сын, Коля, выглядит идеальным кандидатом на субъект операции "Наследник"!"
 #Glaziev path
 SOV_history_continues_glaziev: "История Продолжается!"

 SOV_union_ruble: "Союзный Рубль"
 SOV_union_ruble_desc: "С воссоединением Союза настало время окончательно объединить нашу экономику братских народов. Несмотря на широкое использование российского рубля на территории всей страны, валюты других республик всё ещё встречаются в обороте. Проведение масштабной денежной реформы уже просто необходимо шаг для укрепления общей финансовой системы. Новый Союзный Рубль уберёт эту неразбериху и станет символом нашей единой державы, подчёркивая неразрывность экономических и социальных связей."
 SOV_standartisation_of_state_enterprises: "Стандартизация Госпредприятий"
 SOV_standartisation_of_state_enterprises_desc: "Экономические модели в союзных республиках слишком разнородны. Пока в одной республике процветает жёсткое планирование, в другой продолжает действовать обычный либеральный капитализм, приукрашенный хорошей соцзащитой и красным флагом. Такая ситуация создаёт трудности для эффективного управления госпредприятий и реализации общесоюзных программ. Пришло время унифицировать экономическую систему под стандарт Рыночного Социализма РСФСР. Это обеспечит равные условия для всех регионов и устранит барьеры для экономического роста."
 SOV_let_a_hundred_flowers_bloom: "Пусть Цветут Сто Цветов"
 SOV_let_a_hundred_flowers_bloom_desc: "Единство СССР всегда основывалось на разнообразии его народов, культур и подходов. Это же верно и для экономической политики. Разнообразие моделей от республики к республике - преимущество, а не недостаток. Если где-то устоялась система более командная или более либеральная - не надо ничего трогать. Не нужно навязывать универсальные правила всем республикам, если у них итак всё прекрасно работает."
 SOV_expand_the_sezs: "Создать Новые СЭЗ"
 SOV_expand_the_sezs_desc: "Специальная Экономическая Зона во Владивостоке стала моделью успешного возрождения регионов. Налоговые льготы и упрощённое регулирование позволили привлечь инвестиции и оживить экономику Дальнего Востока. Пришло время распространить этот успех: создание новых СЭЗ в стратегических точках Союза ускорит экономическое развитие и улучшит жизнь в регионах. Да, в итоге эти зоны послужат не только честным компаниям, которые создают настоящее производство и рабочие места - реальную экономику, но и мелким торгашам и спекулянтам, но это лишь показывает нашу честность - мы готовы пойти на это, обеспечивая справедливые условия для всех."
 SOV_unification_of_our_armies_dengist: "Объединение Наших Армий"
 SOV_unification_of_our_armies_dengist_desc: "На данный момент наши вооружённые силы - это мешанина, собранная из армий бывших республик. Некоторые подразделения оснащены самым современным оборудованием, а другие страдают от нехватки ресурсов и подготовки. Строгая военная реформа необходима, чтобы создать единую, мощную Советскую Армию. ВС СССР должны стать щитом и мечом нашей страны, способными защитить нас от любых угроз."
 SOV_invest_in_ai_development: "Инвестировать в Разработку ИИ"
 SOV_invest_in_ai_development_desc: "Цифровой Коммунизм ещё очень далеко, но мы можем маленькими шагами его приближать, развивая наши технологии! Искусственный интеллект станет инструментом повышения эффективности госпредприятий и лучшего управления экономикой. Инвестируя в разработку ИИ, мы закладываем фундамент для будущего, когда мы будем готовы перейти на рельсы по-настоящему социалистической модели."
 SOV_the_soviet_dream: "Советская Мечта"
 SOV_the_soviet_dream_desc: "Советская Мечта - это видение общества, где каждый человек имеет равные возможности для развития своих талантов, образования и достойной жизни. Это мир, где работа и творчество приносят радость, где уважаются труды каждого, от рабочего до инженера. Мы предлагаем не просто стабильность, а будущее, где справедливость, равенство и прогресс становятся реальностью для всех. Советская Мечта - это надежда на лучшее, которая ведёт нас вперёд!"
 SOV_new_red_tourism: "Коммерциализация Идеологии"
 SOV_new_red_tourism_desc: "После нашей победы мир снова заговорил о коммунизме, и многие иностранцы жаждут прикоснуться к легендарной истории СССР. От Москвы до Алма-Аты, от Ленинграда до Ташкента - мы превратим наши города, заводы, музеи и памятники в центры туристического паломничества. "Красные туры" станут источником вдохновения для гостей из-за рубежа и выгодной статьёй дохода для нашего государства. Победа над НАТО - наша гордость, и она должна приносить не только престиж, но и прибыль."
 SOV_expand_markets: "Расширить Рынки Сбыта"
 SOV_expand_markets_desc: "Наше производство вышло на достаточный уровень, чтобы загадить третий мир товарами, захватив рынки развивающихся стран. От простых безделушек до техники и одежды - логотип "Made in USSR" будет символом доступного качества по всему миру. Мы будем играть роль торгового гиганта, укрепляя экономическое влияние в этих государствах! Советский ширпотреб станет для нас очень выгодным экспортом!"
 SOV_develop_our_markets: "Развивать Наши Рынки"
 SOV_develop_our_markets_desc: "Вместо того чтобы зависеть от экспортных поставок, мы сосредоточимся на развитии внутреннего потребления. Наши граждане заслуживают неограниченного доступа к качественным товарам, произведённым на предприятиях Союза. Мы должны подготовить экономику к полной автаркии, если снова столкнёмся с международной изоляцией. Казённые и частные предприятия должны быть готовы к тому, чтобы работать исключительно на внутреннего потребителя, обеспечивая страну всем необходимым!"
 SOV_brand_new_ussr: "Совершенно Новый СССР"
 SOV_brand_new_ussr_desc: "Хоть мы и используем ту же эстетику, тот же красный флаг и хоть мы всё та же Коммунистическая Партия, но внутри всё совсем по-другому. Новый Союз не похож на тот, что пал уже более 30 лет назад, для нового поколения старый СССР не более, чем картинка в учебнике или экспонат в музее. Люди больше не живут с планами пятилеток и колхозной романтикой - у нас другая экономика, другая структура общества, другой взгляд на мир. Это не повод отрекаться от нашей славной истории, но пора признать: мы строим совершенно новую, независимую страницу в книге нашей Родины и Коммунизма в целом."

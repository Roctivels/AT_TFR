 SOV_The_Petrol_Economy:0 "Нефтяная Экономика"
 SOV_The_Petrol_Economy_desc:0 ""Ресурсное проклятие" - так экономисты описывают парадоксальные преимущества и подводные камни страны с богатыми природными ресурсами: хотя это фантастический источник дохода для растущей страны, это часто тормозит рост других секторов экономики. И Россия не является исключением из этого правила. Нефтегазовый сектор является стержнем российской экономики, и притом хрупкой. Поскольку многие из этих компаний принадлежат государству, судьбы как людей, так и государства зависят от капризов постоянно неспокойного международного нефтяного рынка."
 SOV_The_Petrol_Economy2:0 "Нефтяная Экономика"
 SOV_The_Petrol_Economy2_desc:0 ""Ресурсное проклятие" - так экономисты описывают парадоксальные преимущества и подводные камни страны с богатыми природными ресурсами: хотя это фантастический источник дохода для растущей страны, это часто тормозит рост других секторов экономики. И Россия не является исключением из этого правила. Нефтегазовый сектор является стержнем российской экономики, и притом хрупкой. Поскольку многие из этих компаний принадлежат государству, судьбы как людей, так и государства зависят от капризов постоянно неспокойного международного нефтяного рынка."
 SOV_Putinism_Faltering:0 "Мягкий Авторитаризм"
 SOV_Putinism_Faltering_desc:0 "\n\n\n\n£GFX_putinism_faltering\n\n\n\n\n\nВладимир Путин руководит Россией с первого дня нового тысячелетия. Либо будучи президентом, либо недолго занимая пост могущественного премьер-министра в период с 2008 по 2012 год, работая под руководством своего протеже Дмитрия Медведева в Кремле, Путин помог восстановиться после распада СССР и решить ряд проблем как внутренних, так и внешних. Однако, несмотря на это, путинская форма правления, получившая прозвище "Нежный авторитаризм", стала иметь свои собственные недостатки. В то время как политические репрессии и централизация действительно существуют, но случаи прямого вмешательства далеки друг от друга, что приводит к появлению значительного количества оппозиции и коррупции. "Единая Россия" постоянно конкурирует с радикальными оппонентами в Думе, а ОМОН часто разгоняет либеральные протесты. Несмотря на эти недостатки, Администрация Президента не видит в них проблемы и продолжает решать их в каждом конкретном случае, используя жесткий подход."
 SOV_Putinism_Faltering2:0 "Мягкий Авторитаризм"

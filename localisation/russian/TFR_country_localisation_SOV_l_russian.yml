 SOV_bureaucratic_centralization: "Бюрократическая Централизация"
 SOV_bureaucratic_centralization_desc: "Глупо было бы доверять управление целыми регионами чиновникам на местах и уж тем более давать им полноту действий. Что, если они начнут самодурствовать! Что, если они решат притеснять русский народ явно или более изощрённо? Что, если они окажутся предателями!? Для того, чтобы не дать сепаратистам и прочим шатателям режима и шанса, все бюрократические процессы обязаны будут проходить через специальные инстанции в Москве. "
 SOV_enshrine_ideological_postulates: "Закреплять Идеологические Постулаты"
 SOV_enshrine_ideological_postulates_desc: "Идеи Владимира Жириновского - это поистине уникальный образец русской политической мысли. Сдвинься чуть вправо идеологически и ты получишь безумную православную теократию, влево - и ты получишь красно-коричневое порождение. Мысль Жириновского должно быть чиста и защищена от всяких примесей чтобы наше государство и дальше могло процветать, а люди - жить в достатке! Мы не допустим деградации и искажения мысли нашего великого лидера!" 
 SOV_party_popular_media: "[ldpr_zhir_focus_1_scripted_loc_name]"
 SOV_party_popular_media_desc: "[ldpr_zhir_focus_1_scripted_loc_desc]" 
 SOV_party_popular_media_1: "Партийные СМИ"
 SOV_party_popular_media_1_desc: "В последнее время традиционные СМИ не так сильно интересуют людей. Телевизоры отошли на второй план, не говоря уж о вещах вроде газет и радио. Но это далеко не повод отчаиваться. Вложив немного в развитие наших СМИ в интернете мы получим результат, который точно превзойдёт даже самые смелые ожидания закостенелые пропагандистов. Люди будут делиться мемами, содержащими в себе выжимки статей, пересылать друг другу интересные истории и получать самые свежие новости от нас. И в ответ мы будем преподносить этим новости именно так, как посчитаем нужным."

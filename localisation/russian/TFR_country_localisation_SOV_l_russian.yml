 SOV_nadezhdin_plan: "План Надеждина"
 SOV_nadezhdin_plan_desc: "Когда Надеждин пришёл к власти, то он пообещал всей России либерализацию. И он не собирается останавливаться на изменениях в политической сфере. Пришло время реструктурировать экономику России, чтобы она лучше отвечала чаяниям россиян."
 SOV_state_corporations_liberalization: "Либерализация Гос. Компаний"
 SOV_state_corporations_liberalization_desc: "Во время срока Дмитрия Медведева достаточно много компаний, принадлежавших ранее олигархам попали в собственность государства непосредственно и управление ими было… Скажем так, далёким от оптимального. Возможно, нам стоит немного пересмотреть подход в управлении и дать возможность новым идеям немного освежить данную нашу статью доходов?"
 SOV_restructuring_public_sector: "Реструктуризация Госсектора"
 SOV_restructuring_public_sector_desc: "В ходе нашей либерализации государственных компаний мы внезапно обнаружили, что сама по себе организация нашего государственного сектора далека от оптимальной. Некоторые из них можно спокойно объединить, а от некоторых даже избавиться без зазрения совести. Тем более может быть в руках частников от них будет больше пользы."
 SOV_public_private_partnership: "Государственно-Частное Партнёрство"
 SOV_public_private_partnership_desc: "Отчасти это заслуга предыдущей администрации, но факт есть факт. Многие частные предприниматели банально боятся вести дела в России. Такие финты с отъёмом трудом и потом взращенных бизнесов и последующие их перераспределение в пользу лояльных олигархов явно не шли на пользу нашей экономике. Пришло время положить конец этой неприятной стигматизации и доказать, что частники и государство не просто могут вести дела вместе, но и активно должны поддерживать друг друга для того, чтобы экономика оставалась здоровой."
 SOV_diversification_state_revenue: "Диверсификация Госдоходов"
 SOV_diversification_state_revenue_desc: "Уже долгое время российская экономика зависима от ресурсного сектора и большая часть доходов в государственную казну приходит именно оттуда. Однако держать все яйца в одной корзине - это очень опасная стратегия и немного обезопасить доходы нашего государства не будет лишним."
 SOV_comprehensive_support_medium_small_business: "Комплексная Поддержка Бизнеса"
 SOV_comprehensive_support_medium_small_business_desc: "Средний и малый бизнес всегда был немного в шатком положении в России. Государство всегда обращало свой взор на крупные корпорации, принадлежавшие олигархам поддерживая их или же национализируя как это произошло на прошлом сроке Дмитрия Анатольевича. Пришло время пересмотреть наш взгляд на экономику и начать комплексные программы по поддержке! В конце-концов у каждого должна быть возможность открыть свою кофейню. Не так ли?"
 SOV_optimize_social_security: "Оптимизировать Соц Обеспечение"
 SOV_optimize_social_security_desc: "Социальное обеспечение всегда было существенной статьёй расходов нашего государства. И поддержка граждан - это, безусловно, правильный ход. Но вот исполнение оставляло желать лучшего. Пришло время пересмотреть наш подход и сделать это правильно. Первым делом мы пересмотрим бюрократические проблемы выделение средств, ибо порой распределение очень усложняется данными проволочками. Затем мы пересмотрим кому именно и в каком объёме достаются эти средства. Возможно, не все одинаково их достойны."
 SOV_affordable_housing: "Упор на Доступное Жильё"
 SOV_affordable_housing_desc: "Жилищный вопрос стал настоящим бичом нашего государства в 21 веке. Большинство молодых граждан нашей страны вынуждены жить с родителями либо снимать квартиры не в силах позволить себе жильё. Разве это дело? Пришло время запустить программы доступного жилья для всех слоёв нашего общества!"
 SOV_demographic_revitalization: "Проект Демографического Восстановления"
 SOV_demographic_revitalization_desc: "Россия, точно так же, как и государства, совершившие 5-й демографический переход столкнулись с ужасной истиной. Население стареет и умирает, а восполнять его некому из-за спада рождаемости! Надо запустить государственные программы поддержки населения и повышения рождаемости чтобы Россия в следующем веке не стала достоянием истории.\n\nМы россияне и мы хотим чтобы нас было больше!"
 SOV_return_innovative_economy: "Возвращение к Инновационной Экономике"
 SOV_return_innovative_economy_desc: "Какое-то время Российская Федерация следовала идее инновационной экономике. Развитие новых рынков и принцип их разнообразия были основой. Конечно, позже наше правительство по тем или иным причинам отказалось от развития этой экономической модели, отчасти из-за активного противостояния с западом в экономическом плане в том числе. Пришло время вернуться к этим временам. Российская инновационная экономика возвращается."
 SOV_reject_cheap_labour: "Отказ от Дешёвого Труда"
 SOV_reject_cheap_labour_desc: "Любой труд должен достойно оплачиваться и порой попытки бизнеса или даже госсектора "сэкономить" на оплате труда должны быть пресечены. Довольный рабочий это в первую очередь продуктивный рабочий. Также добившись достойной заработной платы, люди смогут эти самые деньги активнее тратить, вкладывая их обратно в экономику."
 SOV_technological_modernization_production: "Технологическая Модернизация Производства"
 SOV_technological_modernization_production_desc: "Наши производственные методы находятся в, скажем так, неплохом состоянии. Очевидно, что слабая экономически держава не смогла бы победить всю Европу в одиночку, однако всегда есть куда расти."
 SOV_nurture_cadres_future: "Взрастить Кадры Будущего"
 SOV_nurture_cadres_future_desc: "Легко жить сегодняшним днём и думать только о текущей выгоде. Однако точно так же, как и старый день сменится новым, поколения сменятся, и экономика с государством продолжат жить. Так почему бы нам заранее не помочь нашим наследникам создав эффективные методы взращивания новых кадров на замену старым. Пусть новый опыт и проверенные методы создадут экономику, за которую нам будет не стыдно и в будущем обеспечит приток высококлассных специалистов."

 russiaflavor.111.t: "Летний дождь"
 russiaflavor.111.d: "Сенатская площадь - одно из самых красивых мест в Санкт-Петербурге. Именно так подумал Денис, когда вновь посетил это место, впервые за несколько лет. После начала кровавой европейской войны он иммигрировал в соседнюю Финляндию, чтобы избежать мобилизации и ужасов войны. После ее окончания к власти пришел сумасшедший тиран Алиханов, который начал процесс превращения Российской Федерации в фашистскую диктатуру, ничем не отличающуюся от режимов Муссолини или Гитлера.\n\nНо совсем недавно, всего пару месяцев назад, все резко поменялось на 180 градусов. Несколько смелых политиков, бравых генералов и, конечно же, Алексей Навальный решили перестать терпеть тоталитарный режим и выступить против него под флагом демократии. Их авантюра закончилась успехом, благодаря чему бешеное животное Алиханов был вынужден бежать, а в стране восстановился демократический, а главное - свободный режим.\n\nПока Денис вспоминал события недавних дней, он дошел до Медного всадника. Памятник Петру Великому величественно стоял почти в середине парка, грозно, но справедливо осматривая проходящих рядом людей. Это был памятник великому реформатору, который поднял страну с колен и модернизировал ее до состояния великой и народной страны. По памятнику медленно стекали капли дождя, одна за другой падая на землю. Смотря на него, Денис невольно улыбнулся, глубоко вздохнул, набирая воздух грудью, и, выдыхая, посмотрел на большую реку Неву, которая текла позади него. Факел свободы вновь загорелся над Россией..."
 russiaflavor.111.a: "...и то, что сгорело дотла, восстанет в нем!"

 russia.2123.t: "Навальный Остается в Политике!"
 russia.2123.d: "Временный исполняющий обязанности президента, Алексей Навальный, совсем недавно объявивший об отказе от участия в грядущих выборах, внезапно выступил с заявлением, что будет учавствовать в гонке, объявив о создании новой партии, получшившей название "Народный Альянс"."
 russia.2123.a: "Тройное Ура Президенту!"
 russia.2124.t: "Вопрос Премьер-Министра"
 russia.2124.d: "После формирования грандиозной "Всенародной Демократической Коалиции", перед правительством встал вопрос о вакантном кресле Премьер-Министра. Кто-то из лидеров партий-членов коалиции должен занять место второго человека в стране..."
 russia.2124.b: "Борис Надеждин!"
 russia.2124.a: "Сергей Миронов"
 russia.2124.c: "Владимир Якушев!"
 russia.2125.t: "Новое Имя Новой Федерации"
 russia.2125.d: "Россия пережила столько немыслимых событий за последнее десятилетие: Медведевская Оттепель, Война, Диктатура Алиханова и Новая Революция. В связи с этим от депутата Государственной Думы от "Народного Альянса" Сергея Наливкина поступило противоречивое предложение - переименовать страну в "Нео-Российскую Федерацию", символизируя тем самым перерождение демократической России после такого турбулентного времени."
 russia.2125.b: "Оставьте как есть..."
 russia.2125.a: "За Нео-Российскую Федерацию!"
 
 #End of Navalny Post-Alikhanov Content
 
 
 #Pre-Dugin Tree UR
 SOV_dire_times_emergency: "Чрезвычайное Положение В Тяжелые Времена"
 SOV_dire_times_emergency_desc: "Поражение в бою - не самое большое страдание для Родины. Это отчаяние и внутренние конфликты, которые следуют за ним и грозят привести Россию к гибели. В этот критический момент Сергей Шойгу, в руках которого находится военная мощь, выступает как потенциальный спаситель России - или как человек, который может привести страну к полному краху в один день. В условиях, когда правительство лишено руководства, а партия "Единая Россия" расколота, все внимание приковано к Шойгу, чтобы увидеть, пойдет ли он по стопам Государственного комитета по чрезвычайному положению и введет ли в Москву танки Т-90..."
 SOV_calm_the_population: "Успокоить Население"
 SOV_calm_the_population_desc: "Несмотря на риск презрения и жесткой критики, высокопоставленные правительственные чиновники должны выйти из своих кабинетов и встретиться с людьми на улицах. Прежде чем прибегать к насилию, это единственный приемлемый вариант. Поскольку прежнего лидера, Дмитрия Медведева, нигде нет, временное правительство, едва удерживаемое Шойгу, должно сделать все возможное, чтобы справиться с этим кризисом. Это все равно что заставлять новорожденного, который только что научился ходить, бежать - если только сзади не гонится голодный волк."
 SOV_pledge_of_retribution: "Клятва Отомстить"
 SOV_pledge_of_retribution_desc: "Западный мир может считать, что сломил дух России, думая, что у побежденных русских больше не хватит мужества и сил противостоять им. Однако реальность вскоре докажет, что они ошибаются. Глубоко запрятанный гнев миллионов людей станет нашим спасательным кругом. Направляя эти коллективные эмоции в нужное русло, мы стремимся объединить народ и выстроить единый фронт против наших врагов, особенно в условиях, когда доверие к правительству падает. Мы можем только надеяться, что эта стратегия не только сохранит нынешнее правительство, но и заложит основу для будущего реванша."
 SOV_spark_anti_occupation_resistance: "Зажечь Антиоккупационное Сопротивление"
 SOV_spark_anti_occupation_resistance_desc: "Со времен Гражданской войны ни одна иностранная армия не ступала на российскую землю. Однако сегодня мы вновь столкнулись с этим унижением. Но русский народ не будет пассивно мириться с этим. Жители оккупированных регионов восстанут и окажут яростное сопротивление новым оккупантам и империалистическим силам. Мы будем поддерживать тайные группы сопротивления и вооруженные группировки всеми возможными способами. НАТО и Украина могут продолжать обвинять нас в "российском проникновении", но они будут бессильны остановить это. Их флаги - полярные или сине-желтые - не будут развеваться долго."
 SOV_national_front_for_salvation: "Фронт Национального Спасения"
 SOV_national_front_for_salvation_desc: "Когда-то в Российской империи существовала группа "Народный фронт спасения", но неизвестно, были ли они настоящими патриотами или просто любителями западной культуры из петербургских салонов. Однако сейчас России нужны самые сильные патриоты, чтобы объединиться и обеспечить будущее Родины. В самом сердце Государственной Думы РФ мы соберем противоборствующие политические фракции, чтобы обсудить дела страны, несмотря на то, что некоторые крайние голоса могут попытаться проникнуть в разговор."
 SOV_voice_for_unheard: "Голос Для Неуслышанных"
 SOV_voice_for_unheard_desc: "На улицах и в переулках России теперь тихо шепчут некогда страшный термин: "евразийство", а также имя его основателя Александра Дугина. Когда-то считавшийся опасной фигурой, этот скандальный политолог сегодня завоевывает все большую поддержку среди страдающего российского народа. По мере того как его идеи набирают обороты, мы вскоре можем столкнуться с решениями, которые раньше были немыслимы - Дугин может вскоре пройтись по мраморным полам Кремля в качестве приглашенного гостя."
 SOV_put_down_anti_russian_revolts: "Долой Антироссийские Мятежи"
 SOV_put_down_anti_russian_revolts_desc: "Вся Россия - от Санкт-Петербурга до Владивостока - находится под ударом. Теперь, когда политическое руководство страны пришло к согласию, настало время действовать решительно и восстановить порядок, пока ситуация не ухудшилась. Мы никогда не позволим предателям русской нации - тем, кто наносит удар, когда мы падаем, - попирать наше достоинство. Фальшивое знамя "Легиона "Свобода России"" никогда не будет развеваться на российской земле."
 SOV_form_guidance_council: "Сформировать Управленческий Совет"
 SOV_form_guidance_council_desc: "Опираясь на Национальный фронт спасения, мы создадим Руководящий совет, который возьмет на себя роль временного правительства, объединив все основные политические фракции. Возможно, впервые с 2000 года партия "Единая Россия" согласится разделить власть. В рамках этого совета, как только ситуация стабилизируется, будет сформировано новое коллективное руководство России."
 SOV_time_for_new_management: "Время Для Нового Руководства"
 SOV_time_for_new_management_desc: "Наконец-то пришло время: Кремль приветствует своего первого правителя-философа. Какую роль сыграет этот бородатый эксцентрик и его евразийство в будущем России? Ослабнет ли напряженность в стране, или она будет углубляться, еще больше разделяя Родину и ее народ? Какую роль сыграет Шойгу, который привел Дугина в центр власти? Будет ли этот генерал управлять страной за кулисами или вскоре окажется в стороне от новых игроков? А может быть, сам Дугин - просто "переходная фигура"? Несмотря на неопределенность, для всех россиян ясно одно: часы, по которым измеряется история, начали тикать."
 SOV_prepare_the_eurasianist_party: "Приготовить Евразийскую Партию"
 SOV_prepare_the_eurasianist_party_desc: "Черные и синие цвета нашей партии господствуют, поскольку настало время введения нашего блока в залы и коридоры власти, время агитации и распространения информации о наших теориях закончилось. Наши партийные функционеры проходят обучение и предупреждение о своей новой грядущей государственной роли в качестве администраторов и лидеров новой грядущей России. Наши теории будут не теориями, а политикой и определяющими факторами новых государственных решений."
 SOV_popularize_dugin_works: "Популяризировать Работы Дугина"
 SOV_popularize_dugin_works_desc: "Среди всех современных философов, будь то Ноам Хомский или Славой Жижек, нет ни одного столь талантливого в области геополитической теории, как Александр Дугин. Его работы по Четвертой политической теории имеют первостепенное значение на мировой арене и еще большее значение для России как средства продвижения к абсолютной власти. Что-то такого гениального калибра - это не просто что-то для какой-то ниши и периферийной политической альтернативы - это должно быть общедоступным для всех. Евразийская цивилизация должна быть прославлена на самом высоком уровне, и с появлением на полках книг Дугина нам будет гораздо легче найти единомышленников, которые придут к евразийской идеологической теории, меньше теории и больше реальности, и люди с радостью откроют новый золотой век для всего Русского мира, чтобы греться в нем. Пусть книги разлетаются с прилавков, а остальные планы Дугина воплотятся в жизнь."
 SOV_philosopher_at_helm: "Философ У Руля"
 SOV_philosopher_at_helm_desc: "Дугин сделал это, невозможное, можно сказать, величайший философ современности Александр Дугин взял Россию штурмом. Сама судьба чудом привела Дугина к власти. Сейчас действительно время собраться вместе в такое радостное время, праздновать, пить, веселиться, потому что путь вперед будет тяжелым и напряженным, но ничто не сможет сломить русский дух. Наш дерзкий орел взлетит высоко над западным миром и покажет эпоху как эпоху Русского мира со всей ее гордостью и славой.\nНет больше унижений, укоров с Запада, указывающего, как нам управлять и диктовать свою жизнь. Наш народ, наша Россия осознали свое предназначение как тех, кому предстоит установить истинный многополярный порядок в мировой политике. Долой американское моральное вырождение, долой западную этику демократии, долой гегемонию западного порядка - все это должно быть с них содрано. Оставим их голыми, чтобы весь мир увидел их позор. Россия будет свободна от этого неприличия, и мир тоже."

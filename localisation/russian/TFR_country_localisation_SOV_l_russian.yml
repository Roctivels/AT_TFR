 SOV_integrate_strelkovites_desc: "Стрелков и его сторонники - ярые монархисты, которые хотят восстановить царизм. Несмотря на то, что он критиковал Жириновского и обзывал его многими словами, он по-прежнему является ценным активом, который можно использовать для возвращения России к ее корням."
 SOV_return_of_rne: "Возвращение РНЕ"
 SOV_return_of_rne_desc: "\n\n\n\n\n£GFX_SOV_rne\n\n\n\n\n\nРусское Национальное Единство - было одной из первых ультраправых структур после распада СССР. Они уже давно потеряли своё влияние, но их кадры и опыт среди правых организаций, при должном финансировании, может помочь нам усилить наше государство, хотя из-за их радикальности даже многие 'Ястребы' выступают против сделки с ними."

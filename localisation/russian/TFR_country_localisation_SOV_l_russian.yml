 #Navalny Post-Alikhanov Content #Ну трунь даёт конечно
 neo_sovereign_democracy: "Нео-Суверенная Демократия"
 neo_sovereign_democracy_desc: "\n\n\n\n£GFX_Ideology_neo_sovereign_democracy_banner\n\n\n\n\n\n§YСуверенная демократия§! — это нишевая политическая идеология, целью которой является создание «идеальной» демократии, игнорирующей грызню западных демократических партий. Партии не только придерживаются схожих взглядов, но и сотрудничают, работают на благо государства в целом. Гражданское общество служит сдерживающим фактором для партий, используя своё влияние, например, для смещения коррумпированных и непатриотичных чиновников.\n\n§YНео-Суверенная Демократия§! берёт за основу принципы и политики, схожие с политическим видением Алексея Навального и программы его партии. Сторонники данной системы выступают за технологический и экономический прогресс с упором в рыночную систему, либерализацию политики и повышение прозрачности работы правительства, налаживание дипломатических отношений с соседними странами, а также плюрализм политических партий и принятие различных политических радикальных сил, преимущественно правых."

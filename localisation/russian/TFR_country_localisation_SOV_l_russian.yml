 SOV_form_antimaidan_desc: ""Антимайдан" был единственной группой сопротивления в центральной и западной Украине, которая боролась против политики Евромайдана, с ростом авторитаризма они были выслежены и распущены. Но теперь, когда Угроза возвращается к жизни, помощь патриотов очень необходима."

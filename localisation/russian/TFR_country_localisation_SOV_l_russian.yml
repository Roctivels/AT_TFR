 SOV_his_vision_prevails: "Его Видение Превалирует"
 SOV_his_vision_prevails_desc: "Жириновский был человеком, который привел нас к победе, Жириновский был человеком, который поднял русский народ на более высокий уровень, Жириновский был человеком, который победил Запад. Логично, что его идеалы должны быть сохранены.\n[SOV.GetLeader] - один из немногих, кто действительно понимает, какой путь наметил для нас Жириновский, и нет никаких причин не сохранить этот путь." 
 SOV_intensify_debolshevization: "Усилить Де-Большевизацию"
 SOV_intensify_debolshevization_desc: "Если есть что-то что красные умели делать лучше всего, так это строить культы личности. Красная погань переименовывала в честь своих вождей улицы, посёлки, даже крупные города, строила гигантское количество статуй своих вождей! Хочется отдать им должное, когда они были у власти это работало эффективно. Но сейчас власть в руках у настоящих патриотов. Мы начнём масштабную компанию по уничтожение советского наследия. Статуи Ленина будут снесены а их место займут статуи Владимира Вольфовича и других патриотов России. Города, деревни и даже улицы обретут новые названия. В конце-концов, имена красных палачей отныне станут достойными появляться лишь в документах или учебниках истории."
 SOV_youth_recruitment_drive_1: "Кампания по Набору Молодежи"
 SOV_youth_recruitment_drive_1_desc: "Нашей партии нужна новая кровь! После того, как паразиты и предатели оказались не у кормушки внезапно вскрылось что в нашей партии острый дефицит кадров. И пришло время это исправлять. Мы будем сотрудничать с популярными лидерами мнений, организовывать онлайн кампании и запускать новые молодёжные программы. Всё для того чтобы свежая кровь влилась в нашу партию." 

 SOV_incorporate_new_russia_into_our_system: "Интегрировать §CНовую Россию§!"
 SOV_incorporate_new_russia_into_our_system_desc: "В отличие от других партий, партия "Новая Россия" способна учитывать пожелания своих молодых сторонников, а также отстаивать интересы бизнеса и демократические принципы. Для них не составило бы труда предоставить им немного больше свободы, просто ради справедливости."
 SOV_expunge_national_russia: "Уничтожить §8Державную Россию§!"
 SOV_expunge_national_russia_desc: "Державная Россия представляет серьезную угрозу для нашей демократии, и Алиханов и его соратники хотят уничтожить ее, пропагандируя вредный российский ультранационализм и ненависть. К счастью, найти доказательства против него будет нетрудно, и как только он уйдет, его прогнившая партия останется без него."
 SOV_expunge_red_russia: "Уничтожить §dКрасную Россию§!"
 SOV_expunge_red_russia_desc: "Эти советские сторонники жесткой линии и сталинисты - пережитки прошлого, стремящиеся к тотальному государственному контролю и чистке своих политических оппонентов, они не желают принимать перемены. Хотя у них может быть некоторая поддержка со стороны молодежи, их коалиция не сможет преодолеть тот факт, что они всего лишь группа пожилых людей, которые хотят удержаться у власти."

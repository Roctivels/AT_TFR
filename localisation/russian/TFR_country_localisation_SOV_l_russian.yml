 #LDPR
 SOV_triumph_of_zhirinovsky: "Триумф Жириновского"
 SOV_triumph_of_zhirinovsky_desc: "ЛДПР одержала грандиозную победу на российских выборах. Жириновский, после десятилетий политических кампаний, наконец-то взял свой законный титул лидера государства после честных выборов. Однако нет времени расслабляться, ещё много предстоит сделать..."
 SOV_power_and_strength: "Могущество И Сила"
 SOV_power_and_strength_desc: "Русский народ, лишенный вожака, подобен стае зверей без вожака - его легко одолевают суровые силы природы. Однако с волевым лидером, подобным Ивану Грозному или Сталину, они могут решать самые сложные задачи, покорять самые суровые условия и побеждать самых жестоких врагов. После трех десятилетий застоя в Российской Федерации у нас появился лидер, способный эффективно распоряжаться властью. Владимир Жириновский с его непреклонной волей поведет нас к господству над всеми землями и народами, видимыми с вершин Уральских гор."
 SOV_guiding_hand: "Направляющая Рука"
 SOV_guiding_hand_desc: "Опытный политик подобен искусному дирижеру: каждый взмах его палочки и каждый жест создают гармоничную мелодию для масс. Великий лидер, напротив, подобен маяку на скалистом берегу; его руководящие принципы сияют как маяк, направляя заблудившиеся корабли в гавань страны. Владимир Жириновский - именно такой лидер, который знает, как использовать волю народа. Его политический артистизм восстановит единство российского народа и возродит былую славу страны."
 SOV_pragmatic_eurasianism: "Русский Мир"
 SOV_pragmatic_eurasianism_desc: "Расположившись на маленькой голубой планете, которую мы называем своим домом, Россия имеет честь обладать почти восьмой частью пригодной для жизни суши. Благодаря этому наша страна играет ключевую роль в международной дипломатии. Каждое действие, каким бы незначительным оно ни казалось, может запустить сложную цепную реакцию, которая прокатывается по всему миру и затрагивает все стороны жизни международного общества - от сомалийских пиратов до шведской монархии. Теперь мы готовы пересмотреть нашу внешнюю политику, чтобы в этом мире, охваченном конфликтами, Россия извлекла максимальную выгоду." #Гюнтер сын портовой шлюхи. Обидно!
 SOV_transform_oligarchy: "Подружиться с Олигархами" 
 SOV_transform_oligarchy_desc: "Олигархи, несмотря на все их прегрешения, по-прежнему являются очень мощной силой как в плане денег, так и влияния.\nИспользование их корпораций и связей может оказаться полезным...."  
 SOV_the_trinity_of_russia_people: "Триединый Русский Народ"
 SOV_the_trinity_of_russia_people_desc: "Великоруссы, белорусы и малоруссы есть и были ядром русского мира. Эта связь испытывалась кровью с тех пор, как варяги объединили враждующие города Руси. Мы вместе прошли через столько трудностей, что нелепо разрушать эту связь из-за вмешательства Запада!" 
 SOV_operation_rokossovsky_LDPR: "ОПЕРАЦИЯ: §YВРАНГЕЛЬ§!"
 SOV_operation_rokossovsky_LDPR_desc: "Петр Врангель, кавалерийский герой Русско-японской и Первой мировой войн, а также "черный барон" Гражданской войны в России, часто подвергался неверной характеристике. Однако благодаря этой решающей операции его наследие будет по достоинству оценено. Готовясь начать кампанию против нашего давнего западного противника - Польши, имя барона Врангеля будет увековечено в названии этой операции. Наша цель - прорваться через центральный барьер Европейского союза против нас. За этой линией обороны лежит обширная Северо-Германская равнина - земля, по которой когда-то мечтала свободно проскакать конница барона."
 SOV_operation_suvorov_LDPR: "ОПЕРАЦИЯ: §YБРУСИЛОВ§!"
 SOV_operation_suvorov_LDPR_desc: "Алексей Брусилов, величайший генерал царской русской армии времен Первой мировой войны, руководил наступлением 1916 года в качестве ее верховного главнокомандующего. Его войска почти прорвали оборонительные линии Центральных держав, и это достижение могло бы сократить войну на два года. К сожалению, в последние годы жизни он помогал Красной армии подавлять своих бывших товарищей. Несмотря на это, его репутация выдающегося лидера и выдающиеся военные достижения заслуживают нашего уважения и памяти. Поэтому вполне уместно назвать в его честь нашу военную операцию, цель которой - окончательно разгромить силы, противостоящие Европейскому союзу, и отпраздновать победу грандиозным парадом в Париже. Пусть его слава вечно направляет наши силы!"
 SOV_mobilize_the_minorities_LDPR: "Мобилизовать Всю Россию"
 SOV_mobilize_the_minorities_LDPR_desc: "В нашей Либерально-демократической партии, к счастью, много талантливых пропагандистов. Их умение убеждать способно превратить даже самых миролюбивых людей в горячих сторонников нашего дела или превратить бунтующих подростков, срывающих плакаты Жириновского, в преданных патриотов. Теперь перед ними стоит еще более сложная задача. От залов Государственной Думы до узких улиц, от первых полос ежедневных газет до видеоплатформ Russia Today они будут нести страстное послание сопротивления каждому россиянину, независимо от его местонахождения."
 SOV_matters_of_the_state: "Национальное Возрождение"
 SOV_matters_of_the_state_desc: "Наша победа на выборах вызвала довольно много.... Гула. Многие задаются вопросом, что именно подразумевает за собой правление Жириновского. Вот почему новый правитель решил выступить с речью в Думе, объясняя как Россия будет двигаться дальше."
 SOV_control_the_media: "Закрепить Господство в СМИ"
 SOV_control_the_media_desc: "Красная чума, после разгона Думы, пришла в отчаяние. Она не может смириться с тем, что потеряла популярности у народа. Сладкая ложь марксистов, которая до сих пор пытаются убедить неведомые массы предать русскую душу. Мы не позволим этому случиться. Чума будет остановлена."
 SOV_destroy_inner_russophobes: "Искоренить Русофобию"
 SOV_destroy_inner_russophobes_desc: "Российский либерал - самое низшее из существ. Он презирает свой собственный народ, культуру и историю. Он ненавидит периоды процветания России и идеализирует наших врагов, которые приносят нам страдания. Они десятилетиями оставались на не тронутыми, разрушая наши традиции и общество. Теперь пришло время."
 SOV_russian_national_constitution: "Русская Державная Конституция"
 SOV_russian_national_constitution_desc: "Нынешняя российская Конституция, представляющая собой лоскутное одеяло законов, сравнима только с несовершенным государством "Российская Федерация", созданным в 1991 году. Если мы хотим действительно превратить Россию в священное для ее народа государство, необходимо разработать более последовательную и разумную Конституцию, которая бы лучше защищала интересы русской нации. Это будет главной задачей нашей партии и правительства на предстоящий период. Под мудрым руководством Жириновского и неуклонным руководством Слуцкого суверенная конституция русской нации станет откровением для всех."
 SOV_implement_party_programm: "Реализовать Партийную Программу"
 SOV_implement_party_programm_desc: "Как утверждает Слуцкий, без Либерально-демократической партии Россия не сможет стать по-настоящему сильной. Если партия не станет хорошо структурированной, ведущей организацией, родина словно лишится мозга и нервной системы. Прошлый опыт работы в парламентских институтах и пропагандистских баталий уже не актуален для Жириновского и его коллег, которые сегодня занимают высшие посты во власти в России. Поэтому мы примем рекомендации Леонида Эдуардовича, реализуем последнюю редакцию программы партии и реорганизуем ее так, чтобы она стала ядром политической структуры России. Мы укрепим ее паутинообразной бюрократической сетью и мощным, трансцендентным руководством."
 SOV_populist_revolution: "Популистская Революция"
 SOV_populist_revolution_desc: "Как утверждает Власов, без Либерально-демократической партии Россия не сможет стать по-настоящему сильной. Если партия не станет организацией, объединяющей национальный пыл, то Родина словно лишится мозга и нервной системы. Мы должны быть осторожны с оппортунистами, обманывающими лозунгами "легитимизации власти" и "прагматичных реформ", истинная цель которых - подорвать дело нашей партии изнутри. Поэтому мы прислушаемся к совету Василия Максимовича, возьмем на вооружение лозунг русской популистской революции, объединим всех россиян вокруг партии и их общего лидера, создадим нерушимые общинные связи."
 SOV_increase_pensions: "Поддержать Пенсионеров"
 SOV_increase_pensions_desc: "Придя к власти, Владимир Вольфович обещал улучшить условия жизни пенсионеров. Он выполнит свое обещание."
 SOV_national_totalitarianism: "Национальный Тоталитаризм"
 SOV_national_totalitarianism_desc: "Политики этих дискредитировавших себя организаций, от КПСС до "Единой России", всегда заявляют о том, что спасли Россию в кризисные времена, но их хвастовство меркнет по сравнению с реальными достижениями Либерально-демократической партии. Именно мы действительно выстроили Россию в единое сообщество, и как безусловный лидер российской нации партия не позволит другим политическим силам разделить плоды власти. Мы еще больше сплотимся вокруг великого Жириновского, создадим иерархическую классовую структуру российского общества и вернем России былую славу."
 SOV_the_greater_union: "Великий Союз"
 SOV_the_greater_union_desc: ""
 SOV_pressure_minsk: "Усмирить "Батьку""
 SOV_pressure_minsk_desc: "Батька - настоящий оппортунист. Он пытался захватить Россию с помощью договора о Союзном государстве до прихода Путина, а теперь делает все, чтобы затормозить интеграцию Беларуси в Россию по тому же договору, который он подписал. Может быть, он изменит свое решение, если мы перестанем финансировать его страну."
 SOV_greater_union_state: "Великое Союзное Государство"
 SOV_greater_union_state_desc: "Все приготовления завершены, и наконец настало время включить Беларусь, или Белоруссию, как она называлась изначально, в состав нашей империи. Добро пожаловать домой, братья!"
 SOV_elitist_bureaucracy: "Элитарная Бюрократия"
 SOV_elitist_bureaucracy_desc: "Мы должны признать, что порой массы не могут управлять страной самостоятельно. Они нуждаются в руководстве лидера, и не менее важен профессиональный, бюрократический средний класс. Этот класс может воплотить директивы лидера в практические меры, которые принесут пользу широким слоям населения России, а также своевременно и обоснованно реагировать на требования народа. Это способствует позитивному взаимодействию между лидером и гражданами, что крайне важно для России, находящейся под властью Либерально-демократической партии. Под руководством Жириновского новая российская элита будет представлять собой идеальное сочетание национальной чистоты, профессионального опыта и непоколебимой лояльности."
 SOV_practice_national_democracy: "Практиковать Национальную Демократию"
 SOV_practice_national_democracy_desc: "Термин "демократия," некогда имевший четкий смысл и ценность, к сожалению, был подхвачен нашими западными колониальными противниками и заблуждающейся отечественной оппозицией. В результате каждый порядочный гражданин России сегодня испытывает чувство отвращения, услышав его. Наша партия будет восстанавливать демократию с русскими национальными чертами. Под лозунгом Слуцкого "Национально-демократическая" партия, которая действительно служит русскому народу, объединится в парламент, призванный служить нации и решать государственные вопросы. На смену политикам, обманывающим народ пустой риторикой, придут настоящие государственные деятели, идущие от масс и возвращающиеся к ним."
 SOV_support_pensinores_desc: "Владимир Вольфович пообещал улучшить условия жизни пенсионеров, когда придет к власти. Он выполнит свое обещание."
 SOV_patriotic_youth_organizations: "Расширить Юнармию"
 SOV_patriotic_youth_organizations_desc: "Хотя многие из нашей молодежи были развращены западным влиянием, они все еще испытывают гордость за свою нацию. Мы должны развивать эти качества, чтобы быть уверенными, что наша молодежь продолжит наше наследие."
 SOV_revive_russian_culture: "Возродить Русскую Культуру"
 SOV_revive_russian_culture_desc: "Одним из величайших преступлений, совершенных коммунистическим режимом, было разрушение традиционного российского общества, чтобы превратить его в универсальное "советское" общество. В нынешнем виде нынешняя российская "культура" - это всего лишь советская оболочка, склеенная американским культурным импортом. Подобные ошибки должны быть исправлены."
 SOV_glorify_the_white_guard: "Прославлять Белую Гвардию"
 SOV_glorify_the_white_guard_desc: "Больше 70 Лет нам врали, сначала коммунисты, а потом "примиренцы". Говорили, что большевистская власть пришла с минимальным сопротивлением, но это не так! Красные упыри захватили власть в России - геноцидом, кровью Русского народа!\nТеперь этому конец, в новом Русском государстве, нету места этим кровожадным идолам, с их шизофренической манией мировой революции. Историческое общество и политика государства будет нацелена на возрождение отнятого, забытого доброго имени солдатам и офицерам, и всем кто сражался против красных узурпаторов. Историческая справедливость будет восстановлена, и истинные герои святой России, наконец-то, будут отомщены." 
 SOV_honor_the_romanovs: "Почтить Романовых"
 SOV_honor_the_romanovs_desc: "Романовы, несмотря на все сказанное, по-прежнему остаются единственной законной династией России. Наша империя должна дорожить их историей и оплакивать их судьбы. Такие предательства больше никогда не повторятся!"
 SOV_orthodoxy_supreme: "Верховенство Православия"
 SOV_orthodoxy_supreme_desc: "Нашими солдатами движет не зарплата, а долг и вера.\nНаши священники остаются с солдатами, чтобы наставлять их в самые тяжелые часы.\nНаше оружие благословлено не только инженерами, но и Всевышним.\nНаша вера - это сила, которая не уступит ни одному противнику."
 SOV_soothe_the_inordets: "Успокоить Инородцев"
 SOV_soothe_the_inordets_desc: "Этнические меньшинства забеспокоились после нашей победы на выборах. Мы заверим его, что, как и в старой империи, мы примем их в Россию с распростертыми объятиями - до тех пор, пока они будут лояльны существующему государству."
 SOV_destroy_aids: "Социальное Оздоровление"
 SOV_destroy_aids_desc: "Коммерциализация российского общества стала очевидной за последние несколько десятилетий. В условиях растущей цифровизации мира мы должны обеспечить, чтобы реклама, пропагандирующая деструктивные привычки, исчезла из поля зрения масс. Мы должны убедиться, что наше общество укрощает современные пороки, а не потакает им."
 SOV_promote_skilled_managers: "Продвигать Квалифицированных Управленцев"
 SOV_promote_skilled_managers_desc: "После устранения основных оппозиционных движений стало ясно, что мы также должны разобраться с бюрократией старого правительства. Чтобы убедиться, что Империя работает гладко, мы поставим самых лояльных людей на посты губернаторов, чтобы избежать каких-либо проблем в переходный период."
 SOV_supreme_leader: "Верховный Правитель"
 SOV_supreme_leader_desc: "С тех пор как мы стали империей, глупо, чтобы наш лидер был президентом. Поскольку Жириновский сам не намерен становиться императором, вполне подойдет должность "Верховного Правителя"."
 SOV_propagate_russian_irredentism: "Русский Ирредентизм"
 SOV_propagate_russian_irredentism_desc: "В то время как предыдущему правительству удалось добиться успеха во время грузинской войны и Русской весны, ему все еще не хватало решимости довести до конца возрождение мощи двуглавого орла. Поддержка патриотов, борющихся за "Русский мир", - это правильный шаг вперед."
 SOV_masters_of_europe: "Властители Европы"
 SOV_masters_of_europe_desc: "Европа, как всегда, остается главной угрозой для нас. Запад всегда пытался сковать Россию цепями, еще со времен тевтонов, но теперь они даже хотят уничтожить нашу культуру и традиции. В золотой век Российской империи ни одна пушка не осмеливалась стрелять в Европе без разрешения Екатерины Великой. Возрождение этих амбиций станет нашей новой целью."
 SOV_pridnestrovian_frontier: "Приднестровские Патриоты"
 SOV_pridnestrovian_frontier_desc: "Левобережье Днестра, хотя и малонаселенное, - это край, где жители Приднестровья, окруженные могущественными врагами, сохранили верность великому делу русского народа, стойко защищая свою родину и достоинство. Пренебрежение, проявленное старым правительством к этому району, - одно из самых тяжких предательств России. Но теперь настало время этим многострадальным людям вернуться в объятия матушки-России. Мы распахнем свои объятия, чтобы принять этих патриотов, которые столько лет сражались в одиночку, и устроим им пышный прием, которого они заслуживают."
 SOV_subdue_central_asia: "Возвращение в Алматы"
 SOV_subdue_central_asia_desc: "Во время своего предательского правления, Советы отдали русские земли казахам, чтобы заручиться их лояльностью. Сейчас более 2 миллионов россиян живут при правительстве, которое доходит до латинизации своего языка, чтобы бороться с нашим влиянием. Русский мир вернется в Алматы, и он останется там навсегда."
 SOV_bent_caucasus: "Вторая Кавказская Война"
 SOV_bent_caucasus_desc: "Кавказ был очагом нестабильности с тех пор, как пал Советский Союз. Начиная от джихадистов и заканчивая НАТОвскими собачками, этот регион является постоянной головной болью для нашей нации. Если мы хотим бороться с Западом, мы должны обезопасить этот регион раз и навсегда."
 SOV_the_time_is_now: "Время Пришло!"
 SOV_the_time_is_now_desc: "Империя была возрождена и усилена, и теперь осталось сделать только одну вещь. Россия должна исправить самое тяжкое преступление большевиков и вернуть Малороссию в лоно Родины. Республики Донбасса будут спасены от украинских содомитов."
 SOV_operation_southern_thunder: "Перейти Рубикон"
 SOV_operation_southern_thunder_desc: "ГОЙДА!!!!"
 SOV_special_military_operation_ldpr: "Специальная Военная Операция"
 SOV_special_military_operation_ldpr_desc: "Украина, страна, возникшая в результате ряда ошибок российских правителей, с XIX века является источником напряженности в отношениях между Россией и Западом. После революции 2014 года западные державы используют Украину для противостояния России. Их цель - превратить ее в поле боя, истощив ресурсы и жизни славянских народов. По мере того как их планы воплощаются в жизнь, России необходимо действовать решительно. Украина больше не будет угрожать России, и однажды она может вернуться в славянское лоно, воссоединившись со своими корнями." 
 SOV_preserve_malorossiya: "Сохранить Малороссию"
 SOV_preserve_malorossiya_desc: "Несмотря на то что судьба страны была омрачена потрясениями XX века, Украина, жемчужина Российской империи, по-прежнему сияет яркими красками. Использование ресурсов Украины, от плодородных черных земель Днепра до угольных шахт Донбасса, значительно укрепило бы мощь России. Украина вернула бы себе власть, которой она обладала в период своего исторического зенита. Однако если война разрушит все это, то это только навредит нашей стране. Поэтому во время военной операции мы будем тщательно регулировать маршруты движения наших войск и интенсивность боев. Мы должны защитить "Малороссию" от любых заговоров, направленных на ее уничтожение."
 SOV_operation_russian_thunder: "ОПЕРАЦИЯ: §YРУССКИЙ ГРОМ§!"
 SOV_operation_russian_thunder_desc: "Сергей Суровикин, которого на Западе часто критикуют как "генерала-мясника", на самом деле является высококвалифицированным и эффективным командиром. Его руководство смелое и решительное, способное максимально использовать потенциал своих войск. Он продемонстрировал эту способность как в мирное время, так и на полях сражений в Сирии, где он превратил обычных солдат в грозную силу. Для военной операции в Украине, возможно, стоит рассмотреть подход генерала Суровикина. Развернув наши Воздушно-космические силы для комплексных бомбардировок и используя армейскую ракетную артиллерию для поддержки наших бронетанковых и пехотных частей, мы подавим любое сопротивление и быстрее добьемся победы."
 SOV_appoint_zolotov_as_namestnik: "Назначить Золотова Наместником"
 SOV_appoint_zolotov_as_namestnik_desc: "Виктор Золотов, командующий Национальной гвардией, заслужил значительное доверие в Либерально-демократической партии благодаря своей службе в армии и твердой позиции в отношении оппозиции. Хотя Золотов тесно связан с Ельциным и Путиным, Жириновский по-прежнему ценит его как ключевой актив, в частности потому, что, как и многие старшие генералы, он поклялся в верности лидеру. Поэтому Золотов - естественный выбор для руководства недавно завоеванными территориями. Он твердой, но справедливой рукой наведет справедливость и порядок среди вновь интегрированного населения."
 SOV_rebuild_imperial_frontier: "Восстановить Имперский Фронтир"
 SOV_rebuild_imperial_frontier_desc: "Как только мы восстановим российскую границу по Днепру, охрана этой границы станет нашим главным приоритетом. Хотя на бывших украинских территориях осталось много верных славянских патриотов, мы не должны упускать из виду потенциальную угрозу со стороны антироссийских элементов. Поражение киевского режима может подтолкнуть их к нападению на гражданское население. В ответ нам нужна культурная ассимиляция и пропаганда, чтобы внушить национальную гордость, а также твердый подход, чтобы заставить этих беспокойных людей подчиниться."
 SOV_expunge_ukrainianism: "Искоренить Украинство"
 SOV_expunge_ukrainianism_desc: "Некоторые утверждают, что украинский национализм представляет собой борьбу за освобождение от царской власти. В действительности же он может быть ответвлением антироссийской пропаганды, созданной некоторыми недовольными польскими интеллектуалами. Сейчас, когда Жириновский ведет Россию к победе, мы не можем позволить, чтобы это историческое искажение продолжало подрывать наши усилия. Трезубец будет демонтирован, а российский двуглавый орел всегда будет стоять над украинской землей."
 SOV_expand_wagner_involvement: "Увеличить Участие "Вагнера""
 SOV_expand_wagner_involvement_desc: "Евгений Пригожин, в прошлом дворецкий президента Путина и начальник кремлевской столовой, теперь более известен как глава частной военной компании "Вагнер". Его наемники действуют в Украине с 2014 года, а затем распространились на Сирию, Ливию, Сомали и Конго, получив широкую известность. Хотя некоторые могут сомневаться, стоит ли привлекать группу Вагнера к стабилизации ситуации в "Малороссии", трудно найти воинов более страстных и опытных, чем эти "музыканты". Многие из них также имеют прочные связи с высокопоставленными лицами в Министерстве обороны и Генеральном штабе."
 SOV_subdue_belarussia: "Покорить Белоруссию"
 SOV_subdue_belarussia_desc: "Все приготовления завершены, наконец-то пришло время интегрировать Беларусь, или Белоруссию, как она была первоначально известна, в нашу империю. Добро пожаловать домой, братья!"
 SOV_reinforce_brics: "Укрепить БРИКС"
 SOV_reinforce_brics_desc: "Изначально "БРИКС" представляла собой наиболее динамично развивающиеся экономики мира и служила ориентиром для развивающихся стран. Однако в условиях нынешней неспокойной ситуации в мире он может играть более значимую роль. Россия будет выступать за преобразование БРИКС в полноценный многонациональный альянс для противостояния все более неустойчивому, но все же угасающему западному миру. Приглашения будут направлены Китаю, Бразилии, ЮАР и Индии. В то же время мы обратимся к странам, желающим присоединиться к "БРИКС", таким как Аргентина, Египет и Индонезия."
 SOV_anti_corruption_division: "Отдел по Борьбе с Коррупцией"
 SOV_anti_corruption_division_desc: "В России коррупции нет!"
 SOV_branch_out_rosgvardia: "Расширить Обязанности Росгвардии"
 SOV_branch_out_rosgvardia_desc: "Наших полицейских сил недостаточно для защиты нашей народа в эти исторические времена. Мы должны перестроить их так, чтобы они играли более активную роль в поддержании мира в нашей стране, а не были пассивной силой, скованной бюрократией. Ни один революционер, повстанец или преступник не будет в безопасности от наших защитников!"
 SOV_annihilate_parasitic_elements: "Искоренить Кровососущих Паразитов"
 SOV_annihilate_parasitic_elements_desc: "Их яхты и особняки за рубежом оплачиваются российскими деньгами. Здешние олигархи думают, что они в безопасности, какие же они глупые. Мы сделаем так, что путинская чистка олигархов 00-х годов будет выглядеть как шутка."
 SOV_brightest_minds_in_russia: "Улучшить Государственное Управление"
 SOV_brightest_minds_in_russia_desc: ""
 SOV_strengthen_ties_with_iran: "Орёл в Пустыне"
 SOV_strengthen_ties_with_iran_desc: "У Ирана и России сложная и запутанная история, и долгое время они рассматривали друг друга как угрозу. Однако уникальное государство, родившееся в результате иранской исламской революции, не оказалось главным врагом России. Напротив, за последние несколько лет иранская "ось сопротивления" успешно сформировала широкий антизападный альянс на Ближнем Востоке, значительно укрепив нашу региональную стратегию. В результате Жириновский решил добиваться особого союза с Исламской Республикой Иран."
 SOV_party_of_the_masses: "Партия Народный Масс"
 SOV_party_of_the_masses_desc: "Vox populi vox Dei"
 SOV_cooperation_with_china: "Политика в Отношении Китая"
 SOV_cooperation_with_china_desc: "Китай, наш самый значительный экономический партнер, может стать нашим самым надежным союзником в обозримом будущем. В последние годы Китай и Россия совместно противостоят атлантистскому блоку на разных континентах. Военные, экономические и культурные вызовы постепенно сближают эти две великие страны. Чтобы укрепить нашу тыловую безопасность, Жириновский решил добиваться особого союза с Китайской Народной Республикой."
 SOV_recongize_the_taliban: "Посеять Нестабильность Среди Глобалистов"
 SOV_recongize_the_taliban_desc: "Не будучи ни жестоким, как фашизм, ни холодно-материалистичным, как марксизм, неолиберализм и глобализация за последние четыре десятилетия стали предвестниками упадка и страданий во всем мире. В то время как бенефициары глобализации поджигают мир, мы, в свою очередь, будем раздувать пламя, стремясь уничтожить господствующую западную гегемонию. Великий народ России затрубил в трубу против глобального капиталистического порядка. Настало время сделать первый выстрел, и наша цель - один из оплотов этих стран - Европейский союз."
 SOV_keeping_america_burning: "...И Пусть Америка Продолжает Гореть"
 SOV_keeping_america_burning_desc: "Наблюдая за упадком Америки, нашего многолетнего противника, теперь охваченного адской войной, было бы лицемерно не испытывать чувство удовлетворения. Чтобы Америка никогда не смогла восстановиться и представлять угрозу для России, мы воспользуемся этой возможностью и глубоко вовлечемся в их внутреннюю политику. Играя на обеих сторонах, создавая стратегические союзы и оказывая необходимую поддержку одной или нескольким фракциям, мы стремимся затянуть гражданскую войну в Америке, добиваясь того, чтобы масштаб конфликта подавил любую фракцию, которая могла бы потенциально воссоединить Америку в краткосрочной перспективе."

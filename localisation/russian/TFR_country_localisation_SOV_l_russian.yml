 russia.1001.t1: "Долгая Счасливая Жизнь..."
 russia.1001.d1: "По мере того как в Европе наступает мир, звуки артиллерийского огня и выстрелов постепенно стихают. После многомесячных боев русские наконец-то могут вздохнуть с облегчением, пережив тяготы поражения и восстановления.\n\nЗагнанные в угол, они выбрали единство и революцию - евразийское единство и революцию. Евразийство - новый освободительный маяк современной эпохи от пороков прошлого и настоящего. Люди живут, объединенные общей целью и верой.\n\nМало кто думал, что Россия выиграет такую войну так скоро, но русские всегда удивляли своих противников в прошлом, и они сделали это снова.\nВместо ненавистной и глобалистской идеологии Европейского союза и НАТО Европа задышит новой жизнью, западная цивилизация будет восстановлена в своей традиционной славе, полной мыслителей и поэтов, гениев и произведений искусства, благодаря евразийцам, так же как они освободили себя. Факел дугинизма ярко сияет на мировой арене. Он проделал долгий путь через разрушения и опустошения, но наконец-то пришел, и евразийский континент един, как никогда прежде.\nВозможно, ты проиграл первую битву, игрок, но в итоге ты выиграл войну. Какой прекрасный камбек!"
 russia.1001.t2: ""Берегите Россию!" - Борис Ельцин"
 russia.1001.d2: "По мере того как в Европе наступает мир, звуки артиллерийского огня и выстрелов постепенно стихают. После многомесячных боев русские наконец-то могут вздохнуть с облегчением, пережив тяготы поражения и восстановления.\n\nЗагнанные в угол, они выбрали свободу и вольность - русскую свободу и вольность. Демократия возможна только тогда, когда ко всем относятся одинаково, без какого-либо особого отношения к кому-либо. Преступления оккупантов нельзя игнорировать из-за их привилегированного положения. Мало кто думал, что Россия выиграет такую войну так скоро, но русские всегда удивляли своих противников в прошлом, и они сделали это снова.\n\nВместо ненавистной и исключительной идеологии Европейского союза и НАТО Европа задыхается, освобождаясь от оков коррупции, благодаря русским, так же как они освободили себя. Российская демократия ярко сияет на мировой арене. Она прошла долгий путь через разрушения и опустошение, но наконец-то пришла, и русские едины, как никогда прежде.\nВозможно, ты проиграл первую битву, игрок, но в итоге ты выиграл войну. Какой прекрасный камбек!"
 russia.1001.t3: "Человек, Который Захватил Мир"
 russia.1001.d3: "И вот он стоит на руинах своих врагов, Большой Босс для своих солдат, победитель для своего народа и завоеватель Европы.\n\nКто бы мог подумать, что из несостоявшегося государства, которым была Россия, после его переворота появится нечто гораздо большее? \nМогущественная и сильная нация, где процветают сильные, пополняя ряды самой элитной и опасной компании, известной человечеству.  Где все связи, будь то экономические или военные, ведут к нему - Евгению Пригожину. \n\nЕвропа лежит в руинах, побежденная собственной ленью и отсутствием сопротивления наступлению жестокой армии. Благодаря своим верным, закаленным в боях штыкам, они готовы охранять и контролировать каждый дюйм оккупированной территории.\n\nНоги его легки и проворны. Он никогда не спит. Он говорит, что никогда не умрет. Он танцует и на свету, и в тени, и все его любят. Он никогда не спит, этот "Первый". Он танцует и танцует. И говорит, что никогда не умрет."
 russia.1001.a: "Наступает новый день..."
 russia.1001.b: "Наступает новый день..."
 russia.1001.c: "Наступает новый день..."
 
 russia.1500.t: "Возвращение в Ревашоль"
 russia.1500.d: "Таллин пахнет гарью, известкой и морской солью. На Домской горке всё ещё видны следы обстрелов, а над зданием бывшего парламента теперь реет красное знамя. С тех пор, как Советская Армия освободила Эстонию, прошло всего несколько недель - и Курвиц, назначенный руководителем возрождения республики, впервые ступает на родную землю не как изгнанник, а как победитель. Компания ZA/UM снова принадлежит ему - те, кто отнял у него имя и труд, теперь стоят перед народным судом. В Эстонии теперь власть Советов, Народное правительство, лозунги о мире и справедливости.\nИ всё же Курвиц идёт по улицам молча. Революция, в которую он верил как в песню, пришла не на мягких сапогах поэтов, а на русских штыках, с пылью и кровью...\nНо за каждым разрушенным домом он видит детей, улыбающихся ему. Слышит, как старуха благодарит солдата за хлеб. Видит молодых людей, вешающих на стены лозунги о равенстве.\nОн всё же нужен этой стране. Этой революции. Этому народу, который, снова учится мечтать."
 russia.1500.a: "У нас нет права на ошибку."
 russia.1501.t: "Партийная Гармония"
 russia.1501.d: "За последние тридцать лет вокруг партийного движения в ЦК сплелись два равноценных пути партийной службы: первые - мастера бюрократического механизма, ковали порядок решений, вторые - народные вожди, несшие красное знамя в сердца масс.\nНо вовсе не о псевдонимах "аппаратчик" и "активист" речь, а о заслугах каждого товарища, подтверждённых съездами и конференциями, о том, почему они попали в Центральный Комитет: одни - мастера партийного механизма, держатели узлов переплёта решений, организаторы переговоров и закулисных договорённостей, вторые - народные агитаторы, пропагандисты "с поля", фронтовики идеологических кампаний и строители массовой поддержки на местах.\nЛиберальные СМИ как всегда будут говорить о некоем расколе, о том, как Коммунисты вот-вот развалятся, но все мы знаем правду - никакого раскола, лишь здоровая дискуссия в рамках демократического централизма. Мы вместе смеёмся над баснями врагов, которые пытаются выставить нас раздробленными и враждующими."
 russia.1501.a: "За работу!"
 russia.1502.t: "Начало Кампании"
 russia.1502.d: "Теперь, когда объявлена дата первых выборов в воссозданный Верховный Совет, перед Компартией встает вопрос о направленности её предвыборной кампании.\n\n"Бюрократическое" крыло КП продавливает идею фокусировки кампании на фигуре Президента как гаранта прав и свобод граждан нашего социалистического государства.\n\nАктивисты же предлагают вооружаться демократическими лозунгами, что определённо даст результаты среди молодёжи.\n\nМы можем избрать компромиссный вариант упора на социализм и равенство, что устроит и "аппаратчиков", и активистов."
 russia.1502.a: "Сфокусируем Кампанию на Президенте!"
 russia.1502.b: "Сделаем акцент на Социализме и Равенстве!"
 russia.1502.c: "Вооружайтесь демократическими Лозунгами!"
 russia.1503.t: "АДЛ "Прогресс""
 russia.1503.d: "В Москве состоялся первый съезд АДЛ "Прогресс" - широкой коалиции различных левых сил: от социал-демократов до анархистов. В своей вступительной речи лидер альянса Максим Шевченко назвал создание организации "важной вехой для всего левого движения и развития демократии в России". Вбирая в себя огромную прослойку людей с самыми разными взглядами, партия предложила крайне общую программу, делая упор на правах рабочих и демократизме."
 russia.1503.a: "Интересно..."
 russia.1504.t: "Трудовое Отечество"
 russia.1504.d: "Российскую политическую сцену поразила новость: Владимир Квачков вместе с лидерами других лево-патриотических организаций объявил о создании партии "Трудовое Отечество". Она выступает с лево-националистических позиций, немалое количество её членов - бывшие правые, в условиях новой власти "перекрасившиеся" в левых. Хоть они пока и немногочисленны, но могут заиметь некоторое влияние среди населения."
 russia.1504.a: "Интересно..."
 russia.1505.t: "Народный Фронт"
 russia.1505.d: "Сегодня на канале Алексея Навального, недавно освобождённого из тюрьмы в рамках амнистии политических заключённых, вышло видео "Народный Фронт", взорвавшее русскоязычные тренды. В нём политик объявил о создании парламентской коалиции с таким названием, и объяснил, что "сейчас, когда доминация Единой России разрушена, представляется невиданный до этого шанс повлиять на жизнь страны, и им необходимо воспользоваться" и призвал идти на выборы и голосовать за деятелей Народного Фронта. Среди них есть как члены бывшей внесистемной оппозиции, так и некоторые "государственные либералы" из путинской администрации."
 russia.1505.a: "Интересно..."
 russia.1506.t: "Наши Кандидаты"
 russia.1506.d: "После разгрома "Единой России" её бывшие функционеры пошли разными дорогами: некоторые присоединились к различным антикоммунистическим кругам, другие же полностью ушли из политики. Но сейчас, когда близятся всероссийские выборы, большая часть старых единоросов просится баллотироваться от Компартии на региональном уровне.\n\nУ этих людей есть навыки, есть авторитет и при желании ими можно грамотно воспользоваться для укрепления влияния в регионах, но подобное решение может вызвать негодование среди наших идейных товарищей, которые ратуют за выдвижение только убеждённых и проверенных коммунистов. Есть и компромиссный вариант, но при всём желании угодить всем трудно."
 russia.1506.a: "Нужны только проверенные товарищи!"
 russia.1506.b: "Нужен умеренный подход"
 russia.1506.c: "Подойдём к вопросу максимально прагматично..."
 russia.1507.t: "Лучший город Земли"
 russia.1507.d: "Близятся выборы в воссозданные местные Советы, не обойдут они стороной и города бывшего федерального, а теперь республиканского подчинения. Если в Ленсовете и Севастополе с кандидатами всё понятно и единогласно, то в Москве выбор намного более неоднозначен.\n\nАктивисты ратуют за выдвижение Валерия Рашкина - несмотря на многочисленные скандалы (в особенности инцидента с лосём), из-за которых он оказался в опале, он всё ещё популярен среди членов Компартии.\n\nБолее бюрократическое крыло выступает в поддержку Леонида Зюганова - видного деятеля Компартии и внука Председателя. Молодая кровь, да и с фамилией - у него есть все шансы оказаться главой Моссовета.\n\nКомпромиссным же вариантом является Вадим Кумин, авторитетный деятель, выдвигавшийся от КПРФ на пост мэра Москвы в 2018 году. Его выдвижение устраивает и "аппаратчиков", и активистов."
 russia.1507.a: "Валерий Рашкин!"
 russia.1507.b: "Вадим Кумин!"
 russia.1507.c: "Леонид Зюганов!"
 russia.1508.t: "Широка Страна моя родная..."
 russia.1508.d: "Советский Союз в своё время дал многим народам нашей страны автономию, которую они сохранили и внутри Федерации. Если с различными малыми автономными республиками особых проблем не возникает, то с Чечнёй и Татарстаном не всё так просто.\n\nДа, мы можем уравнять с остальными автономными республиками, но учитывая то, что большинство там составляют именно коренные народы, в недавней истории имевшие прецедент стремиться к независимости (мирно или с оружием в руках), мы можем на время сохранить их особый статус внутри РСФСР."
 russia.1508.a: "Уравнять их с остальными республиками!"
 russia.1508.b: "Оставим их особый статус... пока"
 russia.1510.t: "Заседание Кадровой Комиссии"
 russia.1510.d: ""
 russia.1510.a: "Прислушаемся к предложениям снизу"
 russia.1510.b: "Представим свой список к Съезду"
 russia.1511.t: "Геннадий Зюганов"
 russia.1511.d: ""
 russia.1511.a: "Идём дальше..."
 russia.1512.t: "Юрий Афонин"
 russia.1512.d: ""
 russia.1512.a: "Идём дальше..."
 russia.1513.t: "Валерий Рашкин"
 russia.1513.d: ""
 russia.1513.a: "Идём дальше..."
 russia.1514.t: "Первый Заместитель"
 russia.1514.d: ""
 russia.1514.a: "Юрий Афонин"
 russia.1514.b: "Иван Мельников"
 russia.1514.c: "Сергей Левченко"
 russia.1515.t: "Секретарь по Идеологии"
 russia.1515.d: ""
 russia.1515.a: "Дмитрий Новиков"
 russia.1516.t: "Председатель ЦКРК"
 russia.1516.d: ""
 russia.1516.a: "Николай Иванов"
 russia.1516.b: "Ярослав Листов"
 russia.1517.t: "Первый Секретарь ЦК Комсомола"
 russia.1517.d: ""
 russia.1517.a: "Михаил Кремлёв"
 russia.1517.b: "Владимир Исаков"
 russia.1519.t: "29-ый Съезд Партии"
 russia.1519.d: ""
 russia.1519.a: "За работу, товарищи!"
 russia.1520.t: "Нехватка Рабочих Рук!"
 russia.1520.d: "Наша политика ускоренного развития промышленности неожиданно породила неочевидную проблему: почти все квалифицированные кадры уже заняты на стройках, из-за чего возник риск остановки реиндустриализации. Экономисты предлагают несколько вариантов решения: первый, относительно простой, но затратный - повысить заработную плату и расширить льготы для трудящихся, чтобы привлечь больше рабочих рук. Второй - задействовать партийные и комсомольские ресурсы для повышения производительности труда. Третий, менее желательный вариант, - замедлить темпы строительства и поставить более посильные задачи, чтобы освободить занятые кадры. Все варианты имеют свои особенности и сложность исполнения, но тем не менее было решено..."
 russia.1520.a: "Повысим зарплаты, дадим больше льгот!"
 russia.1520.b: "Привлечь Партию и Комсомол на Стройки!"
 russia.1520.c: "Пора сворачивать эту тему..."
 russia.1521.t: "Направление Развития"
 russia.1521.d: "Запуск программы поддержки малого и среднего бизнеса поставил нас перед непростым вопросом: по какому принципу распределять эту самую поддержку? Первый вариант, в какой-то степени идеалистический, заключается в том, что помощь должна предоставляться тем работодателям, которые больше всего ценят и защищают своих работников, руководствуясь принципами социального государства. Второй вариант, более прагматичный, - направлять средства наиболее производительным и эффективным предприятиям в расчёте на то, что они сохранят свои ударные темпы работы. Оба варианта имеют под собой основание, но всё-же выбор был сделан в пользу..."
 russia.1521.a: "Социально Ответственного Бизнеса!"
 russia.1521.b: "В первую очередь эффективного!"
 russia.1522.t: "Памятник Бухарину"
 russia.1522.d: ""Приветствуем наших дорогих зрителей! Мы находимся на месте, где прямо сейчас проходит церемония открытия памятника Николаю Бухарину. Уже совсем скоро первый секретарь городского комитета Москвы выступит с речью по случаю этого знаменательного события. Не переключайтесь!"\n\nСпустя примерно полминуты политик вышел на временно сооружённую сцену и, окинув взглядом толпу, произнёс: "Товарищи! До недавнего времени считалось, что политика такого человека, как Иосиф Сталин, не может иметь ничего общего, скажем, с китайским опытом, что нельзя одновременно поддерживать и сталинские методы, и положения рыночного социализма. Но я убеждён, что это в корне не так! Товарищи, очнитесь: сейчас не 80-е, не перестройка - нет нужды искать крайних! Мы должны примириться с нашей историей, взглянуть правде в глаза. Именно поэтому сегодня происходит открытие памятника такому человеку, как Николай Бухарин, одному из главных идеологов НЭПа. Я убеждён, что если бы Сталин увидел успехи и достижения современного Китая, результаты реформ Дэна Сяопина, он непременно реабилитировал бы Бухарина. Ведь именно наша страна была ориентиром социализма для китайского народа, и в какой-то степени их успехи - это и наши успехи! Товарищи, спасибо за внимание. Я верю, что опора на такие выдающиеся личности поможет нам приблизить построение социализма!"\nПосле этих слов площадь наполнилась аплодисментами. Атмосфера явно указывала на то, что речь нашла отклик у присутствующих.\n\n"Благодарим представителя Московского горкома за столь содержательное выступление. В толпе слышны оживлённые разговоры: одни выражают полное согласие с политиком, другие спорят, обсуждая смелость таких исторических сопоставлений. Одним словом, равнодушных здесь не осталось. Оставайтесь с нами - впереди ещё много интересного, и сегодняшний день обещает быть по-настоящему насыщенным!""
 russia.1522.a: "Грамотно и взвешенно!"
 russia.1523.t: "Новый 37-ой"
 russia.1523.d: "Либеральные СМИ всколыхнула новость о "возвращении Сталину заслуженного места в российской истории". Со стороны либерально-настроенных граждан полились обвинения в "неосталинизме", "оправдании репрессий" и прочих ошибок сталинского правления. О своем мнении насчёт данной инициативы спросили Бориса Кагарлицкого в недавнем интервью "Дождю".\n\n- Борис Юлианович, недавно компартией был принят курс на, так сказать, "ресталинизацию", и множество граждан выражает свои опасения. Как вы считаете, возможно ли в текущий момент повторение ужасов сталинизма? ГУЛАГов, массовых репрессий, коллективизации?\n\n- В корне не согласен! Многие преувеличивают масштаб данной политики, придают ей слишком негативную окраску, поэтому позвольте разъяснить. В первую очередь давайте разберемся, за что его всё ещё помнит народ. Сталин для простого народа является символом Победы в Великой Отечественной войне, индустриализации. "Принял с сохой, оставил с ядерной бомбой", как выразился в своё время Черчилль. Образ Сталина прочно вошел в народное сознание, стал традиционным для современных коммунистов. Безусловно, необходимо помнить о тех страданиях, которое принесло сталинское правление, о 1937-ом годе. Но необходимо делить символы от настоящих дел. Я знаю этих людей... По моему мнению, опасения напрасны.\n\n- Интересная позиция, Борис Юлианович! Но посмотрим, не окажутся ли ваши слова затишьем перед бурей..."
 russia.1523.a: "Вся правда"
 russia.1524.t: "Переговоры с [SOV_adl_progress_name_loc]"
 russia.1524.d: "Руководство КП РСФСР обратилось к [SOV_adl_progress_name_loc] с предложением прекратить политическое противостояние. В целом у нас нет причин действовать друг против друга, поскольку обе стороны придерживаются несколько схожих идеалов, однако «Прогресс» всё ещё занимает оппозиционную по отношению к нам позицию.\nЛидер объединения заявил, что не станет препятствовать разрядке и что прекращение давления на организацию позитивно скажется на образе советской демократии, но взамен Альянс требует большей репрезентации во власти и свободы для своей деятельности. Ряд членов КП высказывают опасения, что выполнение этих условий может повлечь за собой непредвиденные последствия, но тем не менее наш ответ..."
 russia.1524.a: "Мы согласны."
 russia.1524.b: "Мы отказываемся."
 russia.1525.t: "Переговоры: [SOV_peoples_front_name_loc]"
 russia.1525.d: "Руководство КП РСФСР обратилось к коалиции "Народного Фронта" с предложением прекратить политическое противостояние. Хотя многие члены НФ ранее были сторонниками внесистемной оппозиции, они не оставили борьбу за свои идеалы даже после её легализации.\nИх лидер, Алексей Навальный, достаточно дальновиден, чтобы пойти на диалог с государством, однако коалиция выдвигает свои требования. Среди них - ослабление государственного контроля над экономикой и демократизация политических институтов. В связи с этим многие члены КП разных взглядов призывают проявлять максимальную осторожность в отношениях с "Фронтом" - их опасения связаны с риском иностранного влияния и связями некоторых членов с прежним режимом. Однако, взвесив все за и против, было решено..."
 russia.1525.a: "Принять предложение."
 russia.1525.b: "Отказать."
 russia.1526.t: "Переговоры: [SOV_labor_fatherland_name_loc]"
 russia.1526.d: "Руководство КП РСФСР обратилось к партии "Трудовое Отечество" с предложением остановить саботаж её деятельности. На первый взгляд может сложиться мнение, что они просто выступают с советско-патриотических позиций, но при ближайшем рассмотрении становятся видны их радикальные сталинистские и националистические взгляды.\nГлава объединения Владимир Квачков готов пойти на перемирие, но выдвигает определенные условия: одни из них - прекратить слежку за членами партии и в большей степени учитывать интересы русского народа относительно других народов Союза. Подобные требования вызывают резкое отторжение у либерального крыла КП, которое призывает с крайним подозрением относиться к любым инициативам "Трудового Отечества". С учетом всех противоречий наш вердикт..."
 russia.1526.a: "Согласие."
 russia.1526.b: "Отказ."
 russia.1527.t: "Переговоры: [SOV_ldpr_name_loc]"
 russia.1527.d: "Руководство КП РСФСР выступило с инициативой о деэскалации отношений к ЛДПР. Несмотря на то, что либерал-демократы считаются одной из самых враждебных по отношению к коммунистам сил, полностью исключать диалог нельзя.\nК счастью, Владимир Жириновский достаточно умён, чтобы пойти на сотрудничество с КП. Однако для начала переговоров он выдвигает конкретные требования: немедленно прекратить давление на членов его партии и свернуть слежку за её деятельностью. Подобные условия вызывают законную неприязнь у многих членов КП, что требует от нас особенно взвешенного подхода. После долгих и напряжённых обсуждений руководство партии заявило..."
 russia.1527.a: "О своём согласии."
 russia.1527.b: "О своём отказе."
 russia.1528.t: "Переговоры: [SOV_patriots_party_name_loc]"
 russia.1528.d: "Руководство КП РСФСР выступило с инициативой по разрядке отношений с СПСП. Позиция этой партии по отношению к коммунистам остаётся мягко говоря неоднозначной, во многом из-за их ностальгии по прежнему режиму.\nИх лидер, Владимир Соловьёв, способен к сдержанному диалогу, что даёт надежду на урегулирование. В качестве условий для начала переговоров социал-патриоты требуют прекратить саботировать их деятельность и положить конец политическому давлению на людей, связанных с партией. Подобные заявления вызывают раздражение у значительной части КП, поэтому итоговое решение должно быть максимально осторожным. После серии консультаций была окончательно сформулирована наша позиция..."
 russia.1528.a: "Мы согласны."
 russia.1528.b: "Мы отказываемся."
 russia.1529.t: "Второй Съезд [SOV_adl_progress_name_loc]"
 russia.1529.d: "Прошел второй съезд Альянса Демократических Левых "Прогресс" - нестабильной коалиции различных левых сил. Съезд сразу же захлестнули склоки и противоречия, доходящие до ругани - союз оказался слишком нестабилен.\nЛидер Альянса Максим Шевченко ушел со своей позиции, и перешел в "Трудовое Отечество". Верх взяло "Социалистическое Единство" во главе с Олегом Шеиным - дружественных к КП РСФСР сил внутри "Прогресса"."
 russia.1529.a: "Левое Единство спасено."
 russia.1530.t: "Второй Съезд [SOV_adl_progress_name_loc]"
 russia.1530.d: "Прошел второй съезд Альянса Демократических Левых "Прогресс" - нестабильной коалиции различных левых сил. Съезд сразу же захлестнули склоки и противоречия, доходящие до ругани - союз оказался слишком нестабилен.\nЛидер Альянса Максим Шевченко ушел со своей позиции, и перешел в "Трудовое Отечество". Верх взяла "Социал-Демократическая Инициатива" во главе с Анатолием Головым - довольно враждебная к КП фракция внутри "Прогресса". "Социалистическое Единство" в полном составе ушло со съезда и подавляющее большинство её членов перешло в Компартию. Остальные оказались слишком слабы для противодействия СДИ."
 russia.1530.a: "Шанс для Социал-Демократии?"
 russia.1531.t: "Второй Съезд [SOV_adl_progress_name_loc]"
 russia.1531.d: "Прошел второй съезд Альянса Демократических Левых "Прогресс" - нестабильной коалиции различных левых сил. Съезд сразу же захлестнули склоки и противоречия, доходящие до ругани - союз оказался слишком нестабилен.\nНеожиданно для всех верх взяли "Левые" - сборище маргиналов левого движения внутри АДЛ "Прогресс". "Социалистическое Единство" и "Социал-Демократическая Инициатива" в полном составе ушли со съезда - подавляющее число деятелей "Соц. Единства" перешли в КП РСФСР, а СДИ - в Народный Фронт. Максим Шевченко, бывший лидер Альянса, отказался от всяческих комментариев и, по некоторым сведениям, ушел из политики. Фактически, "Прогресс" перестал существовать - остальные фракции, кроме "Левых", малочисленны и существуют лишь на бумаге. "
 russia.1531.a: "Очередной раскол в левом движении..."
 russia.1533.t: "Выборы Первого Секретаря в регионе [SOV_cprf_local_leader_state.GetName]"
 russia.1533.d: ""
 russia.1533.a: "Опыт - важнее всего в текущий момент..."
 russia.1533.b: "В руководстве нужна свежая кровь..."
 russia.1535.t: "Кризис в регионе [SOV_cprf_local_problem_state.GetName]"
 russia.1535.d: "В регионе [SOV_cprf_local_problem_state.GetName] набирает популярность новое видео местного блогера, в котором он резко критикует работу регионального руководства и федеральных органов. Автор подробно разбирает текущие проблемы, обвиняя власть в бездействии и непрофессионализме. Особенно резонансным стал блок, посвящённый [SOV_cprf_local_problem_loc] Местные жители отмечают, что блогер "озвучил то, о чём все шёпотом говорят уже давно."\n\nЧто мы будем делать с этим? Все ждут реакцию Центра..."
 russia.1535.a: "Приструнить провокатора..."
 russia.1535.b: "Наказать местную партийную верхушку..."
 russia.1537.t: "Масштабные Протесты!"
 russia.1537.d: ""
 russia.1537.a: "Разогнать митинги!"
 russia.1537.b: "Придётся пойти на уступки..."
 russia.1538.t: "Раскол в Партии!"
 russia.1538.d: ""
 russia.1538.a: "Придётся пойти на уступки..."
 russia.1540.t: "Наша Экономическая Реальность"
 russia.1540.d: "Сегодня в Москве, в Кремлевском дворце съездов был созван пленум ЦК КПСС. На повестке дня стоял вопрос развития всесоюзного хозяйства. В рамках обсуждения члены Центрального Комитета пришли к выводу, что стране нужно постепенное экономическое развитие, и делегаты предложили несколько вариантов. Спустя часы долгого и ожесточенного обсуждения, пленум постановил, что экономика Советского Союза примет путь..."
 russia.1540.a: "Государственного Капитализма."
 russia.1540.b: "Смешанной Экономики."
 russia.1540.c: "Левого Корпоративизма."
 russia.1541.t: "[SOV_soviet_union_conference_member.GetName] соглашается!"
 russia.1541.d: ""
 russia.1541.a: "Советский Союз всё ближе!"
 russia.1542.t: "[SOV_soviet_union_conference_member.GetName] отказывается!"
 russia.1542.d: ""
 russia.1542.a: "Не хотят по-хорошему, будет по-плохому..."
 russia.1542.b: "Попробуйте ещё раз! Предложите условия получше!"
 russia.1543.t: "Будущее Реформ"
 russia.1543.d: "Алексей Навальный вознесся на политический Олимп на обещаниях реформ советской системы в сторону большей либерализации, завоевав этим настроения молодого поколения. Но даже внутри его команды существуют разногласия: некоторые придерживаются идеи малых реформ, направленных на улучшение жизни простых граждан; некоторые - призывают к смене конституции, подходящей новой власти, и смещению роли Коммунистической партии на задний план.\nСторонники малых реформ считают, что коренным образом советскую систему менять не нужно, а лучше всего завоевать расположение народа улучшением его быта - и это устраивает коммунистов.\nБолее радикальная мысль заключается в изменении советской конституции для укрепления власти Демократической партии. Безусловно, данное решение не понравится Компартии ни при каких условиях.\nМожно найти золотую середину: широкое продвижение повестки ДПСС в законотворческих процессах поможет укрепить силу Навального и при этом не сильно разозлить КПСС. "
 russia.1543.a: "Небольшие но важные именения."
 russia.1543.b: "Продвинуть нашу повестку."
 russia.1543.c: "Наш план - в полном изменении конституции!"
 russia.1544.t: "Пресс-конференция"
 russia.1544.d: "Сегодня в Москве состоялась объединенная пресс-конференция Председателя ЦК КПСС Валерия Рашкина и президента СССР Алексея Навального. Политики встретились в восстановленном Дворце пионеров на Ленинских горах для обсуждения насущных вопросов: на повестке дня стояла проблема взаимоотношений правительства и Коммунистической партии.\nОтношения между партией и командой Навального оставались натянутыми с самой победы КПРФ на выборах в 2022 году: Народный Фронт стал главным рупором антисоветской оппозиции. Проблема усугубилась после избрания на первых Всесоюзных выборах Алексея Навального: либеральные СМИ призывают к демонтажу советского строя, а партийные источники обрушились на оппозиционеров, обвиняя их в контрреволюции и преклонении перед Западом.\nПосле встречи политики отвечали на вопросы прессы: в общем и целом встреча прошла в дружественной обстановке и признана участниками конструктивной, и хоть за неё и не удалось уладить все вопросы, но уже идет подготовка к последующим контактам. В завершении Рашкин и Навальный призвали стороны к сотрудничеству и расширению взаимодействия партии и правительства."
 russia.1544.a: "Диалог есть всегда."
 russia.1545.t: "Подписание Ташкентских Соглашений"
 russia.1545.d: "Сегодняшний день запомнится в истории как день подписания договора о дружбе народов России и Средней Азии. Торжественная церемония прошла в здании правительства УзССР, которое вновь открыло свои двери для поддержания исторического символизма - эту инициативу выдвинул Узбекистан. В ходе мероприятия делегаты от среднеазиатских республик и российские дипломаты подписали исторические соглашения о возвращении к союзной социалистической доктрине.\nВ то время как представители подписавших стран с радостью заявили о новой странице в истории их стран. Подписанные документы не оставили сомнений в дальнейшем укреплении политического и экономического альянса. Это событие поставило жирную точку в вопросе о российском влиянии в Центральной Азии."
 russia.1545.a: "Влияние Москвы растёт."
 russia.1546.t: "Подписание Тбилисской Декларации"
 russia.1546.d: "Сегодня в столице Грузии состоялась церемония подписания договора о дружбе между Россией и Закавказьем. Мероприятие прошло в здании парламента Грузии из-за ассоциации с его прошлым - ранее он был Домом правительства Грузинской ССР. Этот шаг был сделан Грузией в качестве символического жеста, ведь именно в Тбилиси располагалась столица ЗСФСР — одной из республик-учредительниц Советского Союза.\nПредставители стран Закавказья и российские делегаты подписали исторические соглашения, знаменующие восстановление союзных связей. Было заметно, как дипломаты от подписавших стран с оптимизмом говорили о новой главе в истории своих государств. Подписанные документы окончательно утвердили факт российского присутствия на Кавказе и открыли новые пути народам для совместного преодоления общих вызовов."
 russia.1546.a: "Возрождение СССР звучит всё реальнее."
 russia.1547.t: "Социализм 21-ого Века"
 russia.1547.d: ""
 russia.1547.a: "Практический, Реалистичный, Конструктивный"
 russia.1547.b: "Патриотический, Национально-ориентированный, Суверенный"
 russia.1547.c: "Народный, Демократический, Передовой"
 russia.1548.t: "Новый Секретарь по Идеологии?"
 russia.1548.d: ""
 russia.1548.a: "Евгений Спицын!"
 russia.1548.b: "Рустем Вахитов!"
 russia.1548.c: "Новиков остаётся..."
 russia.1549.t: "Вступай в Профсоюз!"
 russia.1549.d: "После победы КПРФ на выборах российская система защиты прав трудящихся стала постепенно возвращаться к союзному образцу, началось формирование ВЦСПС - Всероссийского центрального совета профессиональных союзов. Однако принцип его реализации ещё предстоит определить.\nНа выбор предложено два пути. Первый - использование Федерации Независимых Профсоюзов, преемницы старого ВЦСПС. Преимущество этого варианта в том, что ФНП уже давно встроена в государственную и корпоративную системы, а значит, перестроить профсоюзную структуру будет проще и дешевле.\nВторой вариант - формирование сети независимых профсоюзов с опорой на Конфедерацию Труда России. Такой подход потребует больших затрат, чем финансирование государственных профсоюзов, но обеспечит подлинную защиту прав трудящихся и гарантирует, что ни один человек не окажется обделённым поддержкой."
 russia.1549.a: "Федерация Независимых Профсоюзов"
 russia.1549.b: "Конфедерация Труда России"
 russia.1550.t: "[SOV_adl_progress_name_loc] заручается поддержкой КТР!"
 russia.1550.d: "Конфедерация Труда России является крупнейшим объединением независимых профсоюзов, и вопрос его поддержки какой-либо политической партии решился сегодня. [SOV_adl_progress_name_loc] перехватил инициативу в данном вопросе, и профсоюзы поддержали их, а не Коммунистическую партию, обосновав это "большему вовлечению в дело борьбы за права рабочих". Хоть это и не смертельный, но довольно ощутимый удар по поддержке нашей власти."
 russia.1550.a: "Дурацкие Синдикалисты"
 russia.1551.t: "[SOV_peoples_front_name_loc] заручается поддержкой КТР!"
 russia.1551.d: "Конфедерация Труда России является крупнейшим объединением независимых профсоюзов, и вопрос его поддержки какой-либо политической партии решился сегодня. [SOV_peoples_front_name_loc] перехватил инициативу в данном вопросе, и профсоюзы поддержали их, а не Коммунистическую партию, обосновав это "большему вовлечению в дело борьбы за права рабочих". Хоть это и не смертельный, но довольно ощутимый удар по поддержке нашей власти."
 russia.1551.a: "Дурацкие Синдикалисты"
 russia.1552.t: "Революция Творцов"
 russia.1552.d: "Сегодня в Берлине состоялось одно из самых ожидаемых культурно-политических событий года - форум "АДГ - Культурный Интернационал. Европа", собравший интеллектуалов, художников и философов из десятков стран.\nЦентральной фигурой стал эстонский писатель и геймдизайнер Роберт Курвиц, автор "Диско Элизиума" - игры, ставшей манифестом нового постсоциалистического гуманизма. В своём выступлении он не говорил о политике напрямую. Он говорил о памяти, утопии и классовой травме, о том, что искусство должно вернуть людям способность мечтать, мечтать о лучшем будущем:\n\n"Капитализм научил нас стыдиться мечты. А мы должны вернуть себе право мечтать. И если Европа не осмелится, - это сделают другие."\n\nДля нас в России, это событие стало особенно значимым: Курвиц открыто заявил, что следит за "новым социалистическим проектом Востока", называя нас "живой лабораторией, в которой может родиться новый мир." Стоит ли его приглашать в Россию? Создавать условия какому-то создателю компьютерных игр может для переезда в нашу страну, который об этом даже особо не думает, может показаться глупой идеей, но так ли оно на самом деле?"
 russia.1552.a: "Пригласить Курвица в Россию!"
 russia.1552.b: "Поддержим идею издалека..."
 russia.1553.t: "Председатель Верховного Совета"
 russia.1553.d: "Нужно выбрать кандидата в Председатели Верховного Совета"
 russia.1553.a: "Юрий Афонин"
 russia.1553.b: "Сергей Левченко"
 russia.1553.c: "Валерий Рашкин"
 russia.1553.d1: "Леонид Пасечник"
 russia.1553.e: "Павел Грудинин"
 russia.1553.f: "Александр Лукашенко"
 russia.1554.t: "Выборы в Верховный Совет"
 russia.1554.d: "Победителем становится..."
 russia.1554.a: "КПСС!"
 
 
 
 russia.1975.t: "Яростная Оппозиция Коммунистов"
 russia.1975.d: "Политическое противостояние КПСС и администрации президента Соловьёва все ещё продолжает усугубляться. Недавно Владимир Рудольфович в своей поездке по стране высказал идею о реформировании поста президента в сторону большей его значимости в государственном аппарате, добавив, что предварительные наработки по данному вопросу уже есть.\nРеакция коммунистов оказалась молниеносной: в просоветских СМИ началась буря, в сторону президента посыпались обвинения в "диктаторских замашках", а по внутренним каналам идут вопросы о необходимости данного решения в текущей ситуации. Многие опасаются, что Соловьёв "слишком много на себя берёт", и в этом отношении приближается к уровню путинского правления.\nМы можем не обращать внимание на реакцию прокоммунистических сил и форсировать реформу, несмотря на все угрозы и предостережения. Но можно было бы отложить данный вопрос до другого, более выгодного времени."
 russia.1975.a: "Игнорируем их!"
 russia.1975.b: "Мы отступим... на время."
 russia.1976.t: "Съезд ДПСС"
 russia.1976.d: "Только что состоялся съезд Демократической Партии Советского Союза. На нём обсуждался широкий круг вопросов, касающихся плана дальнейших действий партии. Несмотря на ожесточённые дискуссии и упорство некоторых участников, в итоге была принята общая линия, именуемая авторами Нравственный Социализм.\nСторонники этого принципа подчеркивают, что, несмотря на продолжающиеся демократические реформы, безусловно соответствующие желанию и воле народа, наша страна всё ещё именуется Союзом ССР, что подчёркивает неразрывную связь с идеями социализма и их наследием. Выступающие отметили, что такой подход не только обеспечит стабильность сложившихся институтов, но и откроет новые перспективы для развития. Эти новости были с радостью встречены гражданами, которые теперь ещё больше уверены в светлом будущем своей страны."
 russia.1976.a: "Цель установлена."
 russia.1977.t: "Съезд ДПСС"
 russia.1977.d: "Только что состоялся съезд Демократической Партии Советского Союза. На нём обсуждалось множество различных тем, касающихся стратегии дальнейших действий партии. Несмотря на ожесточённые дискуссии и упорство некоторых участников, в итоге были приняты принципы, в общем представлении нацеленные на дальнейшую либерализацию политического курса.\nАвторы этой идеи отмечают, что кульминацией продолжающихся демократических реформ должна стать полномасштабная парламентаризация, которая раскроет потенциал республиканских идей в обновлённом Союзе. Выступающие подчеркнули, что такой подход не только гарантирует нерушимость прав и свобод советских граждан, но и позволит народу напрямую учавствовать в политической жизни страны. Многие наблюдатели сошлись во мнении, что этот курс придаст утверждающий характер начатым преобразованиям.\nЭти новости были с восторгом встречены гражданами, для которых этот шаг стал символом грядущей эпохи процветания и новых возможностей."
 russia.1977.a: "Цель установлена."
 russia.1979.t: "Новый Демократический Союз"
 russia.1979.d: ""
 russia.1979.a: "Начинается новая глава."
 russia.1980.t: "Коммунизм Как Бренд"
 russia.1980.d: "Новое направление использования коммунистической идеологии открывает нам новые перспективы: мы можем использовать связанные товары для наращивания бюджета в ущерб популярности, либо для пропаганды нашей власти среди народа в ущерб прибыли. Можно, конечно, всё пустить на самотёк и не отдавать приоритета, но выгода данного решения может оказаться сомнительной."
 russia.1980.a: "Сосредоточиться на бизнесе."
 russia.1980.b: "Сосредоточиться на людях."
 russia.1980.c: "Пусть все идет своим чередом."
 russia.1981.t: "Наша Позиция"
 russia.1981.d: ""
 russia.1981.a: "Наша дружба с Китаем вечна!"
 russia.1981.b: "Мы не будем принимать чью-либо сторону"
 russia.1981.c: "Наша дружба с Японией вечна!"
 russia.1005.t: "Губернатор из Вологды"
 russia.1005.d: ""
 russia.1005.a: "Пригласите его, его социально-ориентированные идеи интересны.."
 russia.1005.b: "Пригласите его, его идеи, ориентированные на традиции, интересны."
 russia.1005.c: "Он должен остаться в Вологде, мы понаблюдаем за ним."
 
 
 russia.2000.t: "Идеология Государства Пригожина"
 russia.2000.d: "Когда Медведевский режим пал, многие наши граждане впали политическое безумие. Кто-то подался в радикальный коммунизм и анархизм. Кто-то же купился на речи прозападных говорящих голов, что пытались продать нашим гражданам несбыточную либеральную мечту. Конечно, и те, и те так или иначе были раздавлены нашим железным кулаком. Но людям всегда нужны идеи и идеалы за которые нужно держаться и за которые стоит умирать. Так что было бы неплохо придумать официально обозначить новую идеологию нашего государства.\n\nПервый и самый очевидный вариант - это вагнеризм. Именно Евгений Викторович и преданная ему армия навели порядок в разрушенной стране и разогнали жуликов и воров, наведя порядок. Солдатское братство и армейские идеалы в при такой системе будут идеальными основами для устройства общества. Впрочем, данный вариант может быть слишком персоноцентричным и наверняка оттолкнет от нас определенную аудиторию. А либеральные круги обвинят нас в вождизме. Но кому из мнение интересно?\n\nВторой же вариант - это солдатский социализм. Эдакое развитие идей военного коммунизма времён 20-х годов прошлого века. Только настоящие патриоты и храбрые защитники отечества будут достойны социальных благ и смогут жить припеваючи. В то время как предатели и дармоеды будут лишены кормушки. Данный вариант поможет нам привлечь социал-патриотическую аудиторию, однако оттолкнет отдельные ультраправые движения.\n\nТретий и финальный вариант - радикальный патриотизм. Истоки данной идеи лежат ещё в путинской идеологии и призывают не делить историю России на периоды и уж тем более не отказываться от них. От Империи до Федерации русский народ сражался за свой покой, и мы не позволим кому-то забрать нашу родину без боя! Данный вариант является самым умеренным и позволит подключить большое количество народа к нашему праведному делу. Однако он может оттолкнуть отдельных радикалов с обеих сторон баррикад.\n\nВ любом случае, выбор за вами."
 russia.2000.a: "Мы будем возвеличивать армию Пригожина и его военные заслуги."
 russia.2000.b: "Это будет наш социализм для истинных борцов и тех, кто сможет его заслужить."
 russia.2000.c: "Общие ультрапатриотические чувства - это то, что мы могли бы использовать." 
 russia.2001.t: "Восстание Ставропольских Повстанцев"
 russia.2001.d: "Наша операция по началу восстания в Ставропольском крае обернулась полным успехом. Наши агенты долгое время накачивали недовольных русских патриотов оружием. И вот недавно с нашей отмашки им удалось поднять полноценное восстание против правительства сепаратистов. К повстанческим силам вскоре подключились наши так называемые "зелёные человечки", которые смогли заставить кубанское казачье ополчение отступить. Примечателен при этом случай в городе Ессентуки, где казаки, по имеющейся у нас информации, вступило в бой с бездомными где-то на окраинах города и проиграли, в результате чего были вынуждены ретироваться, пока их оппоненты избивали отобранной нагайкой брошенного ополченца. Правительство Кубанской Республики слишком поздно спохватились и только недавно признало территорию Ставрополя временно оккупированной, однако на данный момент у них нет ни сил, ни достаточной поддержки, чтобы нанести ответный удар."
 russia.2001.a: "Тихо и стандартно."
 russia.2002.t: "Пригожин Побеждает на Президентских Выборах"
 russia.2002.d: "На недавно проведённых президентских выборах убедительную и безоговорочную победу одержал Евгений Пригожин. Хотя его право на правление Россией не подлежит сомнению, чтобы окончательно утвердить его легитимность и показать миру волю народа России, были проведены выборы, в ходе которых абсолютное большинство граждан поддержало кандидатуру Пригожина. Все немногочисленные кандидаты, набравшие жалкие, смехотворные проценты голосов, не только признали своё поражение, но и выразили полную поддержку единственному истинному лидеру страны. Любые сомнения, любые попытки поставить под вопрос волеизъявление народа будут расцениваться как предательство, а предатели должны знать - пощады им не будет. Россия вступает в новую эпоху силы  и абсолютного порядка под руководством своего законного правителя."
 russia.2002.a: "Ожидаемо."
 russia.2003.t: "Антигосударственные Террористы Совершают Поджоги"
 russia.2003.d: "Угрожающие новости приходят из Ижевска - террористическая группа, выступающая против нашей власти, совершила нападение на мотозавод "Аксион", производящий оборудование для систем управления ракетными комплексами. Боевики прорвались на территорию предприятия, устроили поджоги и заложили самодельное взрывное устройство, пытаясь нанести ущерб стратегически важному производству. Их цель очевидна - саботаж и хаос. К сожалению, службы безопасности не смогли оперативно перехватить нападавших, и им удалось скрыться.\n В сети уже появились их заявления о намерении продолжать атаки, что подтверждает: речь идет не о единичном случае, а о спланированной диверсионной деятельности. Это угроза, которую нельзя недооценивать. Очевидно, что подобных групп может быть больше, и они стремятся дестабилизировать ситуацию. В связи с этим необходимо усилить контроль, действовать жестче и без колебаний пресекать любые попытки дестабилизации. Любой, кто посягает на безопасность страны, должен осознавать: возмездие неизбежно."
 russia.2003.a: "Мы разберемся с ними..."
 russia.2004.t: "Будущее Федеральной Системы"
 russia.2004.d: "От прежних властей нам досталось одно позорное наследие - федеративность, искусственно навязанная стране под видом демократических реформ. Под прикрытием ложного плюрализма эти предатели десятилетиями раздавали автономии направо и налево, уничтожая государственное единство, ослабляя центральную власть и размывая силу нации. Но теперь пришло время избавиться от этого гнилого пережитка псевдодемократического режима. Однако полный демонтаж федерации - процесс затратный и не очень целесообразный. Вместо того чтобы разрушать систему, мы можем использовать её для последующей милитаризации страны. Мы можем превратить федеративное устройство в мощный инструмент военной машины, подчинённый единому центру власти. Вместо разобщённости - железная сплочённость нации. Вместо слабости - дисциплина, порядок и единство. Эти изменения станут нашим оружием в предстоящей войне против гнусных евробюрократов и их марионеток, которые жаждут поработить нашу страну. В итоге наш лидер решил..."
 russia.2004.a: "Реформировать, чтобы она приносила пользу нашему военизированному обществу."
 russia.2004.b: "Федерализм - слабость, Россия добьется большего успеха при единой структуре."
 russia.2005.t: "Пригожин застрелен!"
 russia.2005.d: "Страшные новости вновь обрушились на Россию. Евгений Пригожин, лидер группы Вагнера и новый правитель страны, был застрелен во время митинга в Москве после успешного проведения "Марша справедливости". Неизвестный, скрывшийся с места происшествия, каким-то образом смог пройти через всех сотрудников охраны и выстрелить практически в упор. Очевидцы утверждают, что причиной тому послужила его не угрожающая поза и "ясное как день" удмуртское строение лица.\nБез своего главного лидера "Вагнер" превратится в склоку и борьбу за власть. И только Бог знает, что будет дальше..."
 russia.2005.a: "Fiat iustitia, et pereat mundus" 
 
 russia.2006.t: "Первые Указы Жириновского"
 russia.2006.d: "Источники сообщают, что Владимир Жириновский, став президентом, не стал терять времени и сразу же начал выполнять свои предвыборные обещания.\n\nЕго первые шаги и указы заключаются в том, чтобы полностью закрыть границу России и остановить любые миграционные процессы из Центральной Азии, сообщает источник, близкий к Кремлю.\nДругой его указ - отменить мораторий на смертную казнь, позицию, которую он отстаивал на протяжении десятилетий с момента прихода в политику.\nОн намерен отменить привилегированный статус, предоставленный различным национальным меньшинствам и мигрантам, который, по его мнению, действует в настоящее время. По его мнению, такая ситуация «наносит ущерб истинным хозяевам этой страны - русскому народу».\nДепутаты от ЛДПР часто вносят на рассмотрение многочисленные мелкие указы и законы, которые Жириновский может подписывать, не проходя через Думу и не соблюдая обычные юридические процедуры.\n\n(...)\n\nЭти изменения приближают Россию к значительно более правой и националистической позиции, и, несмотря на то, что многие из этих изменений находят поддержку у ЛДПР и многих граждан, они также вызовут серьёзную оппозицию как со стороны левых, так и более либеральных сил.\nПо словам анонимных источников, Владимир Жириновский и его новая администрация, похоже, не беспокоятся об этом.  Они готовят ещё более радикальные изменения в структуре общества в ближайшие недели."
 russia.2006.a: "Ударная волна прокатилась по России."
 
 russia.2007.t: "Конец Военного Единства"
 russia.2007.d: "Во время войны общество было готово прощать наше руководство, возможно, несмотря на некоторые недостатки администрации Медведева, и даже оппозиционные партии лишь изредка выражали недовольство.\n\nТеперь, когда наши солдаты возвращаются домой, а общество приходит в себя после эйфории победы, мы видим, что люди снова надеются на государство в плане ответственности и решений. Недостатки нашей системы становятся всё более очевидными: коррупция, бюрократическая инерция и экономическое неравенство остаются серьёзными проблемами в современной России, несмотря на некоторые улучшения в последние годы. «Народная Россия» выступает за благосостояние трудящихся и построение социального государства. «Единая Россия», в свою очередь, будет делать акцент на традициях, единстве и сбалансированной экономике. У системных либералов и некоторых националистов также будут свои платформы, на которые они смогут опираться.\n\nНекоторые читатели, возможно, помнят, о чем я говорил еще в 2014 году: я сказал, что политическая жизнь в России остановится, пока мы не решим наши международные проблемы. Реформы Медведева ненадолго открыли ящик Пандоры, но только для того, чтобы политический ландшафт снова застыл во имя единства военного времени.\nСейчас, дорогие читатели, вы станете свидетелями того, как россияне участвуют в политической жизни. Мало кто помнит начало 2000-х, но сейчас мы можем наблюдать суверенную демократию в действии."
 russia.2007.a: "Русская весна расцвела."
 
 russia.2008.t: "Прорыв Дамбы"
 russia.2008.d: "После неожиданных результатов выборов на которых победила РПСС, российское общество прорвало на разного рода критику в сторону недавних событий в нашей стране. Во многом это связывают с курсом правительства Шевченко и программы его партии.\n\nМаксим Шевченко часто критиковал Жириновского при жизни, а потом начал критиковать и Слуцкого за "недостаточность реформ".\n\nМы приведём примеры, так сказать, "народного" мнение в виде комментариев в соц.сетях:\n"Ну то что мы России возродили это хорошо, но Жириновский и его ЛДПР, сделала это абсолютно бесчеловечными методами, и запреты, и рейды... тот же Путин бы таких мер никогда бы не делал."\n\nВот ещё один пример:\n"Ага, ЛДПР и "народная власть" не совместимы, Жириновский ваш больше всех кричал против олигархов, а потом что? В губы с ними целовался, придумал им новое название "имперские деловые". Тьфу на вас и вашего кумира..."\n\nВ качестве радикального взгляда - часть долгой записи в одном ЖЖ:\n"Че в самом деле было не знаете нихуя как война шла! А вот вам нелюди правда! Жирик вообще воевать не умел, планы делал исключительно по тортам разных стран которых ему приносили, и он их резал. лучших людей нации уничтожил ради какой то украины. а Золотов вообще маньяк, пригнали пешком из томска молодых росгвардейцев в польшу, а они воевать нихуя не могут, оружие нет, а этот Золотов на коне, весь белый сука, махает саблей и кричит "ПРИКАЗЫВАЮ ВАМ СДОХНУТ СКОТ!", и все они на пулемёты польские убились, об этом рассказал фронтовик, чудом выживший в анонимном посте....""
 russia.2008.a: "Вот она - правда!"
 
 russia.2009.t: "Напряженные Дни в Сенате"
 russia.2009.d: "«ПОЗОР!»\n\n«ПОЛНОЕ ПРЕДАТЕЛЬСТВО!»\n\n«ОТСТРАНИТЕ ЭТО ПРАВИТЕЛЬСТВО СЕЙЧАС ЖЕ!»\n\nВот лишь некоторые из криков, которые ежедневно раздаются в Сенате с момента избрания президента Шевченко. Несмотря на его победу, его правительство имеет лишь незначительное большинство в Думе, столкнувшись с объединённой оппозицией во главе с коалицией «Нет большевизму», состоящей из всех правых партий.\nСегодня Юнеман выступил с речью, в которой предупредил, что он и его сторонники не допустят принятия закона, ограничивающего расовую и национальную изоляцию на рабочем месте. Вслед за ним представитель ЛДПР выступил с заявлением о крипто-коммунизме и разрушении идентичности России.\n\nПравление правительства РПСС становится нестабильным. Ястребы внутри националистических партий объединяют свои силы, чтобы свергнуть молодое левое правительство, используя любые необходимые средства.\n\nХодят слухи о причастности военных к заговорам против Шевченко, поскольку они крайне недовольны попытками государства «демократизировать» вооружённые силы страны."
 russia.2009.a: "Они должны действовать быстро." 
 russia.2010.t: "Конец ЛДПР"
 russia.2010.d: "Шевченко выступил на публичных площадках с резким осуждением партии ЛДПР и предыдущего правительства. В своих выступлениях и статьях, опубликованных его коллегами, он разоблачил многолетнюю скрытую коррупцию, злоупотребление властью и кумовство в рядах «либерал-демократов».\n\nСсылаясь на эксклюзивный доступ к архивам, Шевченко заявил, что этим людям должно быть навсегда запрещено занимать государственные должности. Он призвал российский народ испытать гнев и стыд, узнав об этих неприглядных подробностях о руководстве ЛДПР.\n\nТысячи Telegram-каналов и независимых СМИ оперативно опубликовали комментарии, подтвердив заявления своими источниками.\nСлуцкий и другие высокопоставленные лидеры ЛДПР попытались опровергнуть слухи и обвинения, но их усилия не убедили общественность.\nЭксперты прогнозируют, что после местных выборов доверие избирателей к ЛДПР значительно снизится, что фактически положит конец её актуальности."
 russia.2010.a: "Костяшка домино падает."
 russia.2011.t: "Шевченко Выступает за Дальнейшие Реформы"
 russia.2011.d: "Максим Шевченко, который оставался относительно молчаливым во время президентства Владимира Жириновского, теперь стремится восстановить свое политическое влияние, прибегнув к более радикальной форме реформизма. Вернувшись в Российскую партию свободы и справедливости (РПСС), он намерен подтолкнуть нынешнее правительство, возглавляемое Леонидом Слуцким, к еще более масштабным политическим и экономическим преобразованиям.\n\nНа недавнем митинге в Санкт-Петербурге, в окружении своих верных сторонников и политических союзников, Шевченко заявил о своей приверженности построению подлинно демократического общества в России и искоренению наследия авторитаризма раз и навсегда.\n\nНесмотря на широко распространенный в обществе скептицизм в отношении его радикальных взглядов, он может заручиться поддержкой многих либералов, которые считают его своим наиболее жизнеспособным кандидатом.\n\nНа фоне растущего недовольства экономическими проблемами страны и нестабильной ситуацией в приграничных регионах России усилия Шевченко потенциально могут принести определенный успех."
 russia.2011.a: "Это просто слова."
 russia.2011.b: "Мы должны ограничить его влияние."
 russia.2012.t: "Переворот в Москве"
 russia.2012.d: "Сегодняшний день ознаменовался окончанием президентства Шевченко, и гнев правого крыла достиг точки кипения. На секретном военном совещании генерал Картаполов собрал генералов правого крыла, не прошедших чистку чиновников, бывших членов ЛДПР и нелояльных бюрократов. Он предупредил об угрозах правительства РПСС и объявил о подготовке к свержению. План был приведен в действие, солдаты и танки двинулись по улицам Петербурга и Москвы. Сторонники правых захватили государственное телевидение и средства массовой информации, призывая граждан сохранять спокойствие.\n\nНесколько солдат и демократов, выступавших за Шевченко, пытались оказать сопротивление, но их усилия были тщетны перед превосходящими силами вооруженных сил. После захвата власти солдатам пообещали новые льготы, и они отступили.\n\nПрезидент Шевченко был помещен под домашний арест, а большая часть его администрации была задержана. Андрей Картаполов, ныне фактический лидер объединенной правой оппозиции, обратился к нации по телевидению. Он провозгласил наступление новой эры и объявил о проведении референдума о будущем нового правительства."
 russia.2012.a: "Конец эксперимента."
 russia.2013.t: "Этот Поезд в Огне"
 russia.2013.d: "На протяжении многих поколений правители России - от царей до генеральных секретарей и президентов - лишали наш народ чести и достоинства. Они присвоили достижения народа, не оставив гражданам возможности гордиться своим коллективным успехом.\nСейчас самое время освободиться. Мы должны призывать к независимости и освобождению от тирании и коррупции. Настало время признать наши победы и невзгоды как свои собственные. Наша истинная сила заключается в нашей коллективной идентичности и неукротимом духе.\n\nНаши солдаты и рабочие, как в прошлом, так и в настоящем, могут, наконец, обрести утешение, зная, что они являются истинными героями нашей страны, а не самопровозглашенные "верховные правители". Именно они неоднократно побеждали захватчиков и агрессоров.\n\nДемократия расцветёт, когда мы восстанавливаем гордость нашего народа."
 russia.2013.a: "Пора вернуть эту землю себе."
 russia.2014.t: "Референдум"
 russia.2014.d: "Сегодня прошел референдум, который так долго ждали. Из-за соображений безопасности и прозрачности он был проведен в очном формате, что исключило возможность электронного голосования.\nВопрос был простым: «Чтобы сохранить российскую государственную систему, возродить национальную демократию, провести экономические реформы, искоренить сектантство и экстремизм, а также воплотить в жизнь видение Владимира Жириновского, поддерживаете ли вы кандидатуру Анатолия Картаполова на пост президента на шестилетний срок?»\n\nПрогнозы относительно явки были низкими, что и произошло. В референдуме приняли участие только 32,5% граждан. Однако среди тех, кто всё же проголосовал, 75% поддержали предложение, что подтверждает легитимность режима.\nНесмотря на обвинения в манипулировании голосованием со стороны некоторых левых, результат остаётся в силе."
 russia.2014.a: "Отлично!"
 russia.2015.t: "Партия"
 russia.2015.d: "Теперь, когда наша власть утвердилась, мы не можем оставаться просто правительством без политической структуры, способной решать задачи народа. Мы обещали восстановить демократические принципы, которые были разрушены радикальными левыми. Картаполов должен создать проправительственный центр, где его сторонники и оппортунистические бюрократы смогут объединиться.\nНам нужно четко определить нашу новую государственную политику. Простые, понятные лозунги и названия политических программ помогут оправдать действия президента в будущем.\n\nМы можем открыто принять национализм, так как социалисты возродили нашу национальную гордость. Это поднимет боевой дух общества. Единство - мощный инструмент, который старые российские партии использовали неоднократно, особенно государственнические. Русские стремятся к стабильной и единой родине, ставя ее интересы выше высоких идеалов идеологов.\n\nСоциалистическая политика нанесла ущерб экономическому процветанию, как заметил один проницательный философ-центрист. Поэтому мы должны вернуть доверие тех, кто пострадал от радикальной политики."
 russia.2015.a: "Национализм."
 russia.2015.b: "Единство."
 russia.2015.c: "Экономическое процветание."
 russia.2016.t: "Коалиция"
 russia.2016.d: "У нас много сторонников с общей целью: не допустить социалистов к власти. Они готовы на многое ради этого. Наше правительство стремится создать проправительственную коалицию из этих организаций. Но есть несколько перспективных возможностей.\n\nУмеренные правые, включая консерваторов и тех, кто чувствует себя отчужденным обществом, могут стать ценными партнерами. Они могут предложить путь к единству.\n\nАльтернативно, мы можем сотрудничать с националистическими и радикальными фракциями. Они ярые антикоммунисты с ортодоксальными убеждениями. Иногда их тактика и идеология напоминают белогвардейскую. Можно провести параллели с Деникиным или Корниловым, если бы их планы увенчались успехом.\n\nОбъединение этих групп потребует значительных усилий, так как они далеки от единства. Но как далеко мы должны зайти, чтобы защитить Россию от коммунистической угрозы?"
 russia.2016.a: "Мы будем смотреть в сторону умеренных."
 russia.2016.b: "Нам нужна решительная антикоммунистическая позиция."
 russia.2016.c: "Только крупное объединение антисоциалистических сил может защитить Россию."
 russia.2017.t: "Группа Алиханова"
 russia.2017.d: "Во время правительственных реформ президента, среди них были так же и перестановки в губернаторских и мэрских креслах по всех России. Хотя большинство, снятых с должности приняли либо своё отстранение либо переход на более низку должность, один человек категорически не принял новую позицию правительства не только по его смещению но и по проводимым реформам.\nАнтон Алиханов, бывший губернатор Калининграда, который был недоволен своим смещением и считал, что «либерализацию проводят на потеху врагам», возглавит небольшую группу чиновников из «Единой России». Эта группа оказалась не слишком многочисленной: большинство бюрократов из ЕР, даже те, кто был не согласен с новой политикой, решили просто переждать и выбрать более удобный момент для реализации своих планов. Для большинства же активная позиция Алиханова казалась лишь бурей в стакане воды.\n\nНесмотря на то, что его группа была невелика, а взгляды не пользовались популярностью ни в партии, ни среди народа, Дмитрий Медведев всё же решился на радикальные действия. Через своих людей в генеральном совете партии он добился исключения Алиханова и его сторонников из «Единой России».\n\nИсключённый человек отреагировал коротким комментарием: «Таким патриотам, как он, уже нет места в этой партии». Несмотря на его внешнюю уверенность, маловероятно, что после исключения из партии, которое фактически означает изгнание из большой политики, он сможет продолжить свою публичную деятельность."
 russia.2017.a: "Обойдёмся без "Ярых патриотов"." 
 russia.2018.t: "Новый Курс "Державной России""
 russia.2018.d: "Недавно в партии «Державная Россия» произошли неожиданные изменения. На тайном голосовании большинство членов совета приняли решение сменить председателя. Вместо Василия Власова новым лидером стал Антон Алиханов.\n\n«Державная Россия» возникла как инициатива несогласных с политикой ЛДПР, исключённых из партии. Несмотря на небольшие успехи, партия так и не смогла выйти на более высокий уровень.\n\nАнтон Алиханов, экс-член «Единой России» с неоднозначной репутацией, наладил контакт с Власовым и стал членом партийного совета, а затем и его сопредседателем. В это время он активно привлекал в партию единомышленников. Есть мнение, что Алиханов мог вести тайную игру против Василия Власова, собирая на него компромат и перетягивая членов совета на свою сторону.\n\nК моменту своего отстранения Власов, слабый и неопытный лидер, утратил контроль над партией. Она всё больше отходила от идей позднего Жириновского, хотя и сохраняла некоторые его принципы. Теперь можно с уверенностью сказать, что для «Державной России» наступает новый этап. Алиханов уже начал использовать партийные ресурсы и расширять круг союзников.\nПо информации анонимных источников, Алиханов планирует расширить партию, создав «активистское крыло», женскую и детскую организации. Также он намерен искать поддержку среди ветеранов, сотрудников силовых структур и националистической молодёжи."
 russia.2018.a: "Неожиданное возвращение."
 russia.2019.t: "Рождение Державизма"
 russia.2019.d: "Сегодня, в одном из величественных актовых залов Санкт-Петербурга, собрался закрытый съезд партии Державная Россия. Атмосфера была наполнена ожиданием, словно перед грозой: в воздухе витал дух единства и решимости.\nНа главной сцене, словно полководец перед своим войском, стоял лишь один оратор - Антон Алиханов. Его присутствие притягивало взгляды всех присутствующих, среди которых были ветераны войны с медалями на груди, служащие силовых структур, тайно посещающие эти собрания, и молодые, полные энергии студенты и подростки, горящие идеями национализма. Их объединяла не только форма - жёлто-коричневые рубашки с зелеными повязками партии, но и глубокая вера в слова этого человека. Они слушали его, как будто от этого зависела судьба их Родины.\nАлиханов, взглянув на свои заметки, медленно отошел от подиума и, обводя зал проницательным взглядом, начал: "Мы собрались здесь, чтобы заявить о наших намерениях относительно России!" Его голос звучал уверенно и властно, и зал ответил короткими овациями.\n"Мы видим, как Россию обманывают," - продолжил он, и на экране появились толстые лица депутатов Единой России. "Единая Россия лжёт нам о некой Суверенной Демократии и свободе, в то время как наша Родина с каждым днем становится всё слабее." В аудитории раздались гневные возгласы и осуждения в адрес правящей партии.\n"Но это ещё не всё," - произнёс Алиханов, сменив слайд на не самые лучшие планы депутатов Народной России. Он указал на них пальцем, словно указывая на врагов: "Они обманывают нас справедливостью и заботой о рабочих, забывая о настоящих хозяевах России - Русских!" Зал взорвался громкими криками согласия и призывами покончить с этой несправедливостью.\nАлиханов обвёл руками весь зал, его голос становился всё более мощным: "Только мы - истинные сыны Отечества, люди, которые в пылу атак и битв доказали свою верность России. Мы её истинные хозяева, её солдаты и её дети!" Толпа вскрикнула в едином порыве.\nПосле нескольких минут бурной речи, наполненной угрозами и пылким национализмом, Алиханов подошёл к финальной точке своего выступления.\n"...Ради Родины, ради нашей великой державы, ради будущего нашего народа..." - его слова звучали как заклинание. Зал затаил дыхание в ожидании кульминации. "Сегодня рождается ДЕРЖАВИЗМ!"\nИ в этот момент толпа взревела от гордости, словно одно целое, готовое к действию."
 russia.2019.a: ""Слава Алиханову! Слава России!""
 russia.2020.t: "Державная Россия Побеждает На Муниципальных Выборах"
 russia.2020.d: "В последнее время правительство России обеспокоено усилением влияния движения «Державная Россия» в регионах. Пока это касается преимущественно бедных и пострадавших от войны территорий, включая новые регионы Новороссии.\n\nНа местных выборах - как в городские советы, так и в областные органы власти - представители «Державной России» демонстрируют хорошие результаты, а в некоторых местах получают большинство голосов.\nВ регионах, где это движение укрепилось, всё чаще происходят случаи «политического насилия» и «жёсткого разгона мигрантов» с участием активистов из «Жёлтой Гвардии».\n\nК счастью, пока удалось предотвратить попытки «Державной России» проникнуть в Государственную думу и центральные регионы страны.\n\nОднако Антон Алиханов, вдохновлённый успехами, уже говорит о «Марше на Москву» и призывает своих сторонников всеми силами стремиться к участию в органах власти."
 russia.2020.a: "Эти чёртовые радикалы и их простые решение."
 russia.2021.t: "Партия Русской Державы"
 russia.2021.d: "Название «Державная Россия» всегда было временным компромиссом, связанным с периодом Власовщины, и необходимостью вписаться в систему, созданную этим коротышкой Медведевым. Теперь это уже не нужно.\n\nНа первом съезде Державников, после победы Антона Алиханова, известного теперь как «Капитан Партии», он сам поднялся на сцену и произнёс речь, задавшую новый курс для нашей партии. Зал восторженно приветствовал нового лидера и его видение.\nАлиханов заявил, что наше движение - это не просто политическая организация, а союз людей, искренне верных своей родине. Мы защищаем русский народ от разрушительного влияния глобализма и «скрытых угроз». Мы стоим на страже великой державы - государства, основанного на воле и порядке. Именно в это мы верим и именно поэтому мы - державники, как подчеркнул сам Алиханов.\nПо окончанию съезда была одобрено новое названия - Союз Защиты Народа и Державы.\n\nДля тех, кто смотрел трансляцию или читал и пересматривал хронику съезда, стало очевидно, что маски сброшены и мы всерьёз взялись за власть."
 russia.2021.a: "Мы - авангард нации."
 russia.2022.t: "Антон Алиханов Объявляет Свою Кандидатуру"
 russia.2022.d: "Державная Россия официально вступает в предвыборную кампанию. Партийный совет единогласно выдвинул главу партии кандидатом на президентские выборы.\n\nАнтон Алиханов, чье влияние в российской политике растет стремительно, объявил о начале масштабного турне по стране. Его команда полна энтузиазма и активно агитирует за своего кандидата. Лозунги вроде «России - Русский Порядок!» и «Алиханов - Кандидат Русского Человека» находят отклик среди националистически настроенных избирателей. Даже те, кто собирался голосовать за кандидата от «Единой России», теперь сомневаются в своем выборе.\n"Жёлтая гвардия", будучи "активисткой" организацией Алиханова, все же придала партии положительный оттенок. Их борьба с буйными алкоголиками, охрана общественного порядка и помощь полиции и казакам, особенно на новых присоединенных территориях, вселили в часть населения надежду на скорый приход "сильной руки", способной укрепить и очистить Россию.\nСторонники «Державной России» резко критикуют не только текущую политику, но и всю систему. Они требуют демонтажа «так называемой Суверенной Демократии» и построения «здорового национального общества», где любые «западные» вмешательства недопустимы. Сам Алиханов давно стал нежелательным элементом для руководства «Единой России». Мало кто ожидал, что опальный бывший губернатор сможет вернуться в политику с еще более радикальными идеями и без сдерживающих факторов от своей прошлой партии.\n\nПобеда Антона Алиханова или даже высокий процент голосов за него продемонстрирует хрупкость медведевской демократии. Его успех может привести к серьезным последствиям для России."
 russia.2022.a: "Этот зверюга победить не должен!"
 russia.2023.t: ""Манифест Борьбы""
 russia.2023.d: "Прошло совсем немного времени с нашей победы, но враги уже встревожились за свою судьбу. Одни из первых, кто выступил против нас, - это левые всех мастей: социалисты, марксисты, сталинисты, троцкисты и другие.\nДаже до прихода к власти наши отношения с ними были напряжёнными. Наши решительные действия по разгону их вялых демонстраций запомнились им надолго. Теперь, несмотря на все разногласия и различия в их взглядах, они готовы объединиться против нашей национальной власти.\n\nСергей Удальцов - старый борцун левого движения, собрал всех возможных левых политиков и активистов, в одном из залов Волгограда. Два часа они клеймили нашу политику и лично Алиханова, наши "шовинистические замашки", а при истечении этого времени подписали "единый манифест борьбы",  где они обязалась сделать всё возможное для остановки процесса "фашизации" России, и возвращение её к "власти народа". К власти коммунистов, партократов и радикальных манкуртов проще говоря. Им не нужна Великая Россия, они хотят котёл людей без воли и веры, послушных, слепо верующих в речи с мавзолея.\n\nКак говорят наши информаторы, их движение может быть многочисленным и даже влиятельным среди рабочего класса России благодаря своим лозунгам о честном переделе и справедливости. Кроме того, радикализм части их сторонников может сыграть свою опасную роль. Однако главная их слабость - отсутствие харизматичного лидера. Удальцов, безусловно, является сильной фигурой внутри их рядов, но без него движение вряд ли сможет долго сохранять единство. Сам Удальцов также сталкивается с трудностями в управлении столь разнородной группой людей."
 russia.2023.a: "Мы разберемся с ними..."
 russia.2024.t: "Коалиция Свободы"
 russia.2024.d: "Наши враги не спят. Вместе с левыми активизировались парламентская и умеренная оппозиция. Либералы, «консерваторы» и народники - все они оппортунисты из Думы и региональных ассамблей. Они главные бенефициары порочной системы реформ Медведева.\n\nВот они, собрались вместе в богатом зале Москвы чтобы обсудить и сформировать межпарламентскую и "общественную" коалицию против "патернализма и автократии". Там были все известные лица, те кого Россия привыкла видеть - Делягин, Нечаев, Титов, даже особо идейные Единороссы - такие как этот недалекий сын Патрушева. Были и личности менее известные, "не вписавшиеся" в систему суверенной демократии но всё также не забытые Надеждин, Кисиев, и даже седой Явлинский притоптал на пир.\nНо больше всего сиял Владислав Даванков, его речь была пропитана либеральной чушью, его лицо было почти на всех плакатах и мерче которые они раздавали, сразу стало понятно кого именно они хотят использовать как либерального "красивого мальчика" для своей русофобской политики.\n\nХотя их оппозиция по началу будет составлять для нас большую проблему, у них есть большие минусы. Если левые готовы уйти хоть в подполье, и их некоторые члены радикальные и готовы на всё, паства демократов-либералов абсолютно безыдейная, они боятся - боятся потерять свой мещанский рай, они видят что Россия которую мы хотим это не Россия вялого потребителя лениво идущего изредка на выборы чтобы избрать болтуна.\nОни могут громко гавкать, но стоит нам лишь придавить их достаточно они начнут скулить. Их лидеры ни чем не лучше, они борются за свои мандаты, депутатские машины и хорошую жизнь рядом с государством которое их поддерживает.\n\nК сожалению для них, Алиханов уже готовит для них урок. В стенах ночного Кремля, Президент и лояльные ему Державники-лейтенанты готовят новую пантомиму..."
 russia.2024.a: "Чёртовые ДЕРМОкраты..."
 russia.2025.t: "Кровь на Асфальте"
 russia.2025.d: "По темнеющим переулкам Москвы шел Владислав Даванков, сопредседатель партии "Новая Россия". Он осторожно оглядывался, прячась в тени. Длинное пальто и черная кепка не спасали его от тревоги. Ветер гнал мусор по пустым улицам, шуршал опавшими листьями. Любой звук - шаги, лай собаки, хлопок двери - заставлял его вздрагивать.\nВремена становились мрачнее. Власти державников погрузили страну в страх и подавление. Любой, кто поддерживал демократию или конституционный порядок, жил в опасности. Сообщения из регионов тревожили: избиения, исчезновения, угрозы. Державники действовали безнаказанно, насаждая хаос. Левые партии, бывшие союзниками в борьбе с Алихановым, стали жертвами насилия.\nДаванков читал эти новости с ужасом и болью. Как могла Россия, пережившая период либерализации, так быстро скатиться не просто в патернализм, а в откровенное варварство? Неужели русскому народу действительно не нужна демократия? Почему толпы людей с таким восторгом слушают речи Алиханова? Почему они равнодушны к насилию? Этот вопрос терзал его, пока он шел по пустынным улицам в тени.\nТревожные мысли оборвались, когда яркий свет фар ослепил Даванкова. Джип выехал из-за угла и заблокировал дорогу. Даванков замер, его сердце бешено заколотилось. Он отступил, но сильный удар в спину сбил его с ног.\nОн упал на колени, но получил удар ногой в бок и рухнул на землю лицом вниз. Удары продолжались, голова кружилась, перед глазами мелькали искры. Он пытался разглядеть нападавших, но каждый раз его били, видя только желтую форму.\n- Мы Россию от вас вычистим, мрази! - раздался грубый голос над ним.\nЭти слова эхом отозвались в его сознании. Последнее, что он почувствовал перед тем, как потерять сознание, был особенно сильный удар по голове. Мир погрузился во тьму. Но удары не прекратились.\n\nЧерез неделю тело Владислава Даванкова найдут на окраине Московской области - изувеченное до неузнаваемости."
 russia.2025.a: "Он выбрал свой удел."
 russia.2026.t: "Убийство Сергея Трунова"
 russia.2026.d: "Срочные новости из Санкт-Петербурга, господин Президент!\n\nСегодня утром в автомобиле прогремел взрыв. В результате погибли Сергей Трунов, лидер местной организации Державников, и двое его охранников. Террористический арт произошёл во время движения, вызвав панику на дороге и спровоцировав несколько столкновений.\nНа место оперативно прибыли сотрудники Росгвардии и полиции, но задержать террористов не удалось, так как бомба была заложена заранее.\nВскоре в интернете появилось видео, на котором люди в масках взяли на себя ответственность за преступление. Они представились членами движения «Освобождение» и заявили о своём намерении бороться за свободу Санкт-Петербурга от «грязи державизма».\n\nЭто преступление не должно остаться безнаказанным. Наши враги обнажили свои зубы, и это война. Мы, державники, знаем, что такое война. Они должны ответить за это, Капитан. Кровь за кровь.\nСергей Трунов - был человеком воли, он прошёл со мной весь польский фронт, таких людей может быть только меньше.\n\nХотя может показаться, что их немного, на самом деле в городе полно скрытых врагов. Необходимо принять жёсткие меры. Санкт-Петербург - рассадник демократических и социалистических идей. Город должен понять: быть против державизма - значит идти против воли России.\n\nВаша верная соратница Юлия Нилова. Куратор Информаторского Отделения по Городу Санкт-Петербург."
 russia.2026.a: "Поставить Петербург под особую зону контроля!"
 russia.2027.t: "Создание Батальона "ЗОВ""
 russia.2027.d: "Сегодня при участии Вождя России Антона Алиханова был создан Батальон «ЗОВ».\n\nИдея о формировании военизированного подразделения под контролем лидера возникла сразу после прихода к власти и была поддержана всеми фракциями внутри державников. Однако инициаторами создания Батальона «ЗОВ» стали Знаменосцы. Они предложили собрать в одном месте самых смелых и решительных бойцов. Среди участников батальона есть как ветераны ВС РФ и Росгвардии, так и добровольцы из различных отрядов, многие из которых имели опыт службы или были связаны с ЧВК «Вагнер».\nЭти солдаты действительно преданы своим идеалам, возможно, даже слишком. После официальной церемонии формирования под вечер участники батальона начали проводить обряды, напоминающие неоязыческие ритуалы. Они утверждают, что это необходимо для рождения воина и искоренения трусости в душе каждого бойца. Командиры батальона, по всей видимости, стремятся к полному подчинению своих подчинённых боевому коллективу, подавляя их индивидуальность.\nНекоторые более умеренные и религиозные державники выразили опасения по поводу подобных практик. Однако Алиханов и Знаменосцы считают создание такого подразделения необходимым для решения задач в армии и в России в целом.\n\nОфициальным девизом Батальона «ЗОВ» стало: «Слава России - смерть её врагам!»"
 russia.2027.a: "Они... Нам необходимы..."
 russia.2028.t: "Создание Батальона "Боговоины""
 russia.2028.d: "Сегодня при участии российского лидера Антона Алиханова был создан батальон "Боговоины". Идея создания подконтрольного ему военизированного подразделения возникла вскоре после его прихода к власти и получила поддержку всех фракций правящей элиты. Однако инициатива создания батальона исходила от возрожденцев, которые предложили собрать самых храбрых и решительных бойцов в единое подразделение. Среди ее членов - ветераны Вооруженных сил Российской Федерации и Росгвардии, а также добровольцы из различных подразделений, многие из которых имеют военный опыт или связи с Русской Православной армией. Эти солдаты глубоко преданы своим идеалам, возможно, даже слишком.\n\nПосле официальной церемонии построения, вечером, военнослужащие батальона начали совершать ритуалы, напоминающие православные боевые молитвы, всей церемонией руководил их официальный командир - священник протоиерей Святогор. Они утверждают, что это необходимо для воспитания истинного православного духа и искоренения трусости в каждом бойце. Командиры батальона, по-видимому, стремятся к полному подчинению своих подчиненных, подавляя индивидуальность. Некоторые государственные деятели желтой гвардии высказывали озабоченность по поводу религии и особенно в подразделении, возглавляемом державником. Однако Алиханов и возрожденцы считают создание такого подразделения необходимым для решения проблем внутри армии и в России в целом.\n\nОфициальный девиз батальона "Боговоины" звучит так: "Слава Богу - слава всему, что свято для Него!""
 russia.2028.a: "Они... Нам необходимы..."
 russia.2029.t: "Жёлтая Дружина"
 russia.2029.d: "Недавно в нашей стране, под покровительством Державной России, появилось новое объединение - Добровольческое патриотическое движение «Жёлтая Дружина».\n\nЭто объединение уже успело завоевать известность в обществе. Его участники помогают гражданам и полиции, борются с нелегалами и поддерживают общественный порядок. Но одной из главных задач «Жёлтой дружины» является обеспечение безопасности на территории Новороссии. Они занимаются поиском вражеских агентов и следят за недовольными слоями общества.\nОднако у объединения есть и негативные стороны. Например, его участники проявляют ярый национализм и антикоммунизм. Это уже привело к конфликтам с левыми силами нашей страны и нападениям на граждан России нерусской национальности.\n\nВажно отметить, что «Жёлтую дружину» создал Алиханов и его партия. Он получает выгоду от положительных отзывов о своих «бравых ребятах». Это может увеличить его политический капитал, что не очень хорошо для нашей демократии."
 russia.2029.a: "Ну что-ж, они хотя бы могут нам помочь."
 russia.2029.b: "Мы не должны дать им ходу, используйте административный ресурс."
 
 russia.2030.t: "Профсоюз организует забастовку рабочих"
 russia.2030.d: "Независимый профсоюз инициировал забастовку на государственном предприятии, требуя повышения заработной платы и увеличения пособий, а также некоторых политических лозунгов. Мы можем воспользоваться этой возможностью, чтобы решить их экономические проблемы, игнорируя при этом их коммунистические устремления."
 russia.2030.a: "Разбейте их и верните обратно на фабрики."
 russia.2030.b: "Ведите с ними переговоры."
 russia.2030.c: "Просто переждите это, рано или поздно они проголодаются." 
 russia.2031.t: "Кампания Листовок в Нескольких Городах"
 russia.2031.d: "В наших городах появились антиправительственные листовки. Полиция проводит расследование, но стоит ли нам действительно беспокоиться об этой устаревшей форме протеста? Мы можем предать гласности арест этих нарушителей спокойствия."
 russia.2031.a: "Найдите нарушителей спокойствия и заставьте их заплатить."
 russia.2031.b: "Это просто слова, кто их вообще читает?" 
 russia.2032.t: "Демонстрации Левых"
 russia.2032.d: "Левая оппозиция и их союзники спровоцировали протесты во многих городах по всей России. В настоящее время полиция подавляет большинство этих демонстраций, но быстрые действия имеют решающее значение для предотвращения ощущения слабости."
 russia.2032.a: "Используйте всю необходимую силу, мы не должны быть слабыми."
 russia.2032.b: "Сдерживайте их и переждите."
 russia.2032.c: "Пусть они скулят, наша власть в безопасности."
 
 russia.2033.t: "Демократы проводят кампанию в Интернетах"
 russia.2033.d: "Демократическое инакомыслие развернуло яростное наступление в средствах массовой информации на наше руководство и Алиханова. Их идеи быстро распространяются через нерегулируемые социальные сети и за их пределами. Мы должны быстро разработать стратегию противодействия их влиянию"
 russia.2033.a: "Начинаем нашу контркампанию."
 russia.2033.b: "Начать отключение Медиа-ресурсов."
 russia.2033.c: "Кому какое дело до этих интернетов?" 
 russia.2034.t: "Сговор Офицеров с Демократами"
 russia.2034.d: "Появились сообщения, предполагающие военное сотрудничество с низкоранговыми членами демократической оппозиции. В этих сообщениях утверждается, что военные предоставляют информацию этим членам и сеют недовольство в их рядах."
 russia.2034.a: "Начните тотальную военную чистку в этом районе."
 russia.2034.b: "Уволить всех подозреваемых в предательстве." 
 russia.2034.c: "Кого волнуют офицеры низкого ранга?" 
 russia.2035.t: "Демократические Демонстрации"
 russia.2035.d: "Демократическая оппозиция и ее союзники спровоцировали протесты во многих городах по всей России. В настоящее время полиция подавляет большинство этих демонстраций, но быстрые действия имеют решающее значение для предотвращения ощущения слабости."
 russia.2035.a: "Используйте всю необходимую силу, мы не должны быть слабыми."
 russia.2035.b: "Сдерживайте их и переждите."
 russia.2035.c: "Пусть они скулят, наша власть в безопасности." 

 russia.2036.t: "Портрет"
 russia.2036.d: "Фотосессия выдалась изнурительной, продолжалась более трёх часов. Алиханов, облачённый в свою властную чёрную форму, сдержанно позировал на фоне строгих декораций. Эти снимки предназначались для всего: плакатов, листовок, рекламных кампаний, а также для статуй, бюстов и других форм визуальной пропаганды. Лицо лидера должно было стать неотъемлемой частью повседневной жизни народа, чтобы каждый - от простого рабочего до чиновника -знал, кто стоит во главе их державы.\nПридворные фотографы суетились вокруг Алиханова, осыпая его похвалами за каждую позу, за каждый взгляд. Они восторженно поддакивали, как будто сам процесс съёмки был актом поклонения. Единственным, кто сохранял холодную отстранённость и позволял себе критику, был "вольный" скульптор Беркалов. Этот человек выделялся своей прямотой и свободой взглядов. Он мог без колебаний указать на недостатки в выражении лица или положении рук президента. Алиханов же принимал его замечания с удивительным спокойствием, понимая: в искусстве, как и в политике, важна точность.\nМежду ними давно установилось особое взаимопонимание. Если не дружба, то уважение уж точно. Один был мастером стратегии и власти, другой -знатоком искусства и человеческой пластики.\nКогда фотосессия подошла к концу, Беркалов подозвал к себе Алиханова. В руках у него были два отпечатанных снимка - кандидаты на портреты, которые вскоре должны были украсить стены госучреждений.\n-Вот что я вам скажу, господин президент, -начал Беркалов с привычным хитрым прищуром. -У меня тут два шедевра. Но они совершенно разные по настроению.\nОн положил перед Алихановым первый снимок.\n-Здесь вы смотрите прямо в душу. Этот взгляд пронзает насквозь. Если такой портрет повесить в кабинетах чиновников -ни один бюрократ даже не посмеет расслабиться. Это портрет порядка и контроля.\nАлиханов внимательно посмотрел на фото и медленно кивнул. Затем перевёл взгляд на второй снимок.\n-А этот? -спросил он с лёгким интересом.\nБеркалов оживился, словно ждал этого вопроса.\n-А этот... -он сделал эффектную паузу и с задором продолжил: -Здесь вы -завоеватель. Генералиссимус! Ваш взор устремлён вдаль, туда, где ещё предстоит установить ваш порядок. Это портрет амбиций и великой цели!\nАлиханов задумчиво посмотрел на оба снимка.\nБеркалов чуть улыбнулся и добавил с ноткой лукавства:\n-Лично я бы... -он осёкся на мгновение и сменил тон на более серьёзный. -Впрочем, как и всё в нашей стране теперь, решать только вам, господин президент.\nНа лице Алиханова появилась едва заметная тень улыбки."
 russia.2036.a: ""...Портрет контроля и порядка.""
 russia.2036.b: ""...Портрет амбиций и великой цели.""
 russia.2036.c: ""...Давай Попробуем ещё больше вариантов!""
 russia.2037.t: "Красные Державники"
 russia.2037.d: "Среди наших союзников есть и неожиданные. Левые силы, в основном выходцы из Беларуси, и несколько бывших народников, теперь объединённые под руководством Григория Азарёнка, бывшего пропагандиста Лукашенко, создают своё движение в поддержку Алиханова - «Красное Державное Движение».\n\nАзарёнок считает, что Алиханов сможет построить социализм в стране, несмотря на то что мы официально не связаны с этой идеологией. Но даже если эти люди не до конца понимают наши идеи и пытаются их изменить, мы можем использовать их для того, чтобы отколоть часть левых, которые против нас.\n\nВажно иметь как можно больше союзников, даже если они не всегда разделяют наши взгляды. Главное - держать их под контролем и использовать их для достижения своих целей."
 russia.2037.a: "Звучит достаточно разумно, нам действительно нужно больше союзников."
 russia.2037.b: "В их словах есть буквы..."
 russia.2037.c: "Социализм? Пристрелить их."
 russia.2038.t: "Возвращение Русского Флага"
 russia.2038.d: ""ПРЕЗИДЕНТ АЛИХАНОВ ВЕРНУЛ РУССКИЙ СТЯГ!"\n\n"НАЦИОНАЛЬНЫЙ ЛИДЕР ПРИНЯЛ РЕШЕНИЕ О ВОЗВРАЩЕНИЕ НАЦИОНАЛЬНОГО ФЛАГА!"\n\n"СПАСИБО, БОЖЕ ХРАНИ АНТОНА АНДРЕЕВИЧА!!! СПАСИБО ЗА ТО ЧТО НАШ!"\n\nЭто лишь немного что было написано в сети после того как Антон Алиханов подписал президентский указ о новой государственной символике. Особо ничего не изменилось, но теперь государственным и "национальным" флагом становится "имперка" также известная как черно-жёлто-белый флаг.\nТеперь именно этот флаг будет в фаворите у государства и у "лояльного" ему населения, но использование обычного триколор всё ещё разрешено, по собственному желанию а так же для специальный мероприятий. В особенности, триколор становится популярном в виде повязки на руке, у государственных деятелей и представителей правопорядка которые показывают свою поддержку, при этом не являясь членом партии Державников.\n\nЭто действие, пожалуй, было самым лёгким в политике Алиханова. Дальше будет только сложней."
 russia.2038.a: "Троекратное ура нашему великому стягу!"
 russia.2039.t: "Старая Гвардия "Единой России" Уходит из Политики"
 russia.2039.d: "В последнее время президент Алиханов поддерживает различные праворадикальные организации, создавая широкое движение. Это привело к непреднамеренному отстранению от власти многих политиков, придерживающихся жесткой линии в "Единой России", которые ранее использовали националистическую риторику. В результате некоторые из этих политиков стали невидимыми в рамках своей собственной партии или вообще ушли из политики. Вячеслав Володин, которого часто считают лицом более националистической фракции, объявил о своем уходе. Его место в Думе вскоре займет кто-то из представителей власти или союзников.\n\nМногие подобные случаи происходили по всей России. Журналисты-спекулянты даже предполагают, что некоторых из них подтолкнули к уходу в отставку, чтобы их могли заменить более лояльные политики, поддерживающие державников.\n\nНесколько 'старогвадейцев' решили умерить свои взгляды и влиться в основное русло "Единой России", приняв приверженность партии к "суверенной демократии". Похоже, что это конец мятежной фракции в ЕР, поскольку она была вытеснена более радикальной волной."
 russia.2039.a: "Скатертью дорожка."
 russia.2040.t: "Фракции Внутри Державников"
 russia.2040.d: "Со стороны может показаться, что державники выступают единым фронтом, но внутри наше движение далеко не гармонично. Хотя многие по-прежнему привержены идеям лидера, есть те, кто дает ему советы о том, как их реализовать. Несмотря на то, что существуют небольшие фракции с различными идеями, только две группы выделяются как абсолютные противоположности: "Знаменосцы" и "возрожденцы".\n\nЗнаменосцы верят, что русская идентичность - это не право, данное по праву рождения, а нечто заслуженное ценой жертв и борьбы. Они считают современность и ее ценности слабыми и ограниченными общественными нормами. Их идеал - общество воинов и тружеников. Они рассматривают религию как побочный продукт культуры, сосредоточившись вместо этого на исторических, культурных и духовных элементах российской идентичности. Их сторонники в основном находятся среди рядовых членов "Желтой гвардии" и на недавно аннексированных территориях, таких как Новороссия и Белоруссия. Они также питают амбиции по созданию единого славянского союза под руководством России.\nВ отличие от них, возрожденцы глубоко религиозны. Они стремятся вернуться к традиционному православному образу жизни и восстановить русскую христианскую идентичность. Их православие - это бескомпромиссный подход к неверующим "огнем и мечом". Они видят в духовенстве и церкви воинственную роль, считая их духовным центром общества. По их мнению, концепция Третьего Рима должна укрепляться за счет крови истинно верующих и их врагов. Если его не существует, они считают, что оно должно быть построено на этом фундаменте.\n\nАлиханову было бы разумнее ненавязчиво поддерживать их идеи, не отдавая предпочтение одному из них перед другим. В конце концов, он пользуется поддержкой лояльного большинства, которое согласится с ним по большинству вопросов."
 russia.2040.a: "Посмотрим, чьи идеи лучше..."
 
 russia.2100.t: "Государственный Переворот Федорова"
 russia.2100.d: ""
 russia.2100.a: "Конец надеждам либерастов."
 
 russia.2050.t: "Восстание в Санкт-Петербурге!"
 russia.2050.d: "Недавние ошибки спровоцировали восстание в Санкт-Петербурге, вызвав сложную социально-политическую борьбу. Недовольные граждане и радикальные коммунистические группировки объединились, стремясь подорвать легитимность российского правительства и эффективность его деятельности. Этот альянс угрожает стабильности и единству страны.\n\nБыла ли наша политика слишком снисходительной или слишком жесткой, сейчас не имеет значения. Неотложная задача - решительно подавить это восстание, используя все доступные ресурсы и стратегии.\n\nК сожалению, наши военные, включая солдат и офицеров, проявляют нежелание вступать в бой. Они предпочитают оставаться в своих казармах, ожидая, пока кризис утихнет. Такая пассивная позиция требует развертывания лояльных подразделений Желтой гвардии и других преданных воинских частей, чтобы заполнить брешь, образовавшуюся в результате их бездействия.\n\nВ Санкт-Петербурге повстанцы сформировали свои собственные военизированные формирования. Они занимают стратегические позиции для начала наступления, потенциально захватывая контроль над Москвой."
 russia.2050.a: "Мы должны остановить их любой ценой!" 
 russia.2051.t: "Коммунисты Атакуют Новгород!"
 russia.2051.d: "Коммунистические ополченцы предприняли атаку на Новгородскую область, застав местные власти врасплох. Теперь мы полагаемся на лояльные войска в регионе, чтобы защитить его.\nМы должны разработать стратегию, которая приведет к наилучшему результату на поле боя. Если мы потерпим неудачу, Новгород может послужить воротами в Москву, что значительно затруднит их наступление."
 russia.2051.a: "Мы должны начать контратаку против этих ополченцев. У них не будет ни единого шанса!" 
 russia.2051.b: "Их силы многочисленны, но слабы. Мы должны улучшить нашу оборону в регионе." 
 russia.2052.t: "Провал Операции"
 russia.2052.d: "Несмотря на все наши усилия, их превосходящая по численности армия, хотя и плохо оснащенная, сумела разгромить наспех собранные оборонительные силы, которые мы быстро организовали в регионе. Новгород теперь находится на территории Красных, и они уже вербуют местных сторонников. Их командиры готовятся к еще более глубокому наступлению."
 russia.2052.a: "Блять!" 
 russia.2053.t: "Успех Операции"
 russia.2053.d: "Наша контратака увенчалась успехом! Хотя мы и понесли потери, красные явно не были готовы к такому яростному натиску на столь раннем этапе. Мы застали их врасплох. Новгород взят!\nСейчас, в своей маленькой городской коммуне, они еще более изолированы, чем когда-либо, и готовы к поражению. Мы быстро сокрушим их, даже если для этого придется пойти на жертвы."
 russia.2053.a: "Очень хорошо!" 
 russia.2054.t: "Красные Атакуют Тверь!"
 russia.2054.d: "Наше положение ухудшается с каждым часом, дорогой лидер. Коммунисты сейчас нацелились на Тверскую область, которая еще меньше подготовлена к отражению нападения. Сейчас на передовой меньше людей, чем когда-либо прежде. Мы можем разработать стратегию, но это все равно, что пытаться попасть в движущуюся цель в темноте. Невозможно предсказать, как будет развиваться ситуация."
 russia.2054.a: "Перегруппируй все оставшиеся силы и атакуй их разом, блять!"
 russia.2054.b: "Ебана в рот, защищай ее любой ценой, стреляй в тех, кто дезертирует, если хочешь!" 
 russia.2055.t: "Конец Тирании Державников"
 russia.2055.d: "С каждой неудачей и беспорядками, вызванными восстанием, поддержка Алиханова уменьшалась, даже среди его собственных людей. После жестокой расправы с силами державников в Москве вспыхнуло восстание. В условиях отсутствия центральной власти и численного превосходства полиции протестующие нарушили военное положение и пригласили в город "красных ополченцев".\n\nПодобно героям прошлого, коммунисты и их союзники вырвали контроль над страной у угнетателей, вернув ее народу. Они уже очистили Думу и Кремль от их прежних обитателей.\n\nМестонахождение высшего руководства "Державников" остается неизвестным, а сам Алиханов, похоже, исчез. Был объявлен общенациональный розыск, но сейчас "державники" остались без лидера и деморализованы своим провалом.\n\nАрмия, решив подождать, приняла мудрое решение. Они присягнули на верность новому национальному правительству, возглавляемому левой коалицией Ругтуг.Россия сейчас готовится к новой социалистической эре, хотя детали должны быть решены быстро."
 russia.2055.a: "Слава рабочему классу!" 
 russia.2056.t: "Конец Коммунистического Восстания"
 russia.2056.d: "Успех предыдущих операций, несмотря на их жестокость, начал выявлять трещины в слабом коммунистическом руководстве Санкт-Петербурга. Пока они спорили о стратегии, наши шпионы и лоялисты в городе собирали важнейшие разведданные о позициях их слабеющих сил.\n\nВ этот день началась массированная атака с использованием беспилотников, артиллерии и военно-морских сил. Город повстанцев был стерт с лица земли, а их оставшиеся боеспособные войска уничтожены.\n\nОтряды Желтой гвардии теперь двигались по улицам, подавляя любое оставшееся сопротивление. Лидеры разбежались, некоторые бежали как трусы, в то время как другие были схвачены и столкнулись с серьезными последствиями, вероятно, включая смертную казнь. Такова была судьба предателей.\n\nАлиханов выступил с речью, в которой объявил о прекращении террористической угрозы. Он осудил мягкую политику народолюбивого правительства-державника, но подчеркнул, что подобные ошибки больше не повторятся. Он объявил о проведении масштабной операции по зачистке и поклялся, что Россия больше не потерпит предателей."
 russia.2056.a: "Слава России!"
 russia.2057.t: "Военный Мятеж На Кубани!"
 russia.2057.d: "Нелояльные военные открыто восстали против нас. Они сосредоточили основные силы на Кубани, куда сбежались все недовольные солдаты и офицеры. В союзе с демократами и их сторонниками они готовят атаку. Однако большинство армии пока не определилось, чью сторону принять. Поэтому мы должны объединить все доступные нам силы. Противник планирует захватить Москву с помощью мощного передового отряда. Мы обязаны сорвать их планы любой ценой!"
 russia.2057.a: "Мы должны остановить их любой ценой!"
 russia.2058.t: "Повстанцы Расширяют Свой Контроль!"
 russia.2058.d: "Из-за нехватки сил на Кубани мы не смогли защитить эти территории от врагов. Однако ситуация остается стабильной, поскольку местное население в основном аполитично и предпочитает сохранять нейтралитет, отказываясь поддерживать предателей. Мы должны действовать быстро, чтобы предотвратить потерю новых территорий!"
 russia.2058.a: "Дерьмо!"
 russia.2059.t: "Протесты За Повставнцев!"
 russia.2059.d: "Новость об открытом восстании, должно быть, взволновала наших врагов. Демократы и либералы, похожие на крыс, вышли на улицы многих городов, открыто встав на сторону нынешних предателей. В то время как полиция и другие силы в настоящее время справляются с ситуацией, этим плохо подготовленным молодым людям все еще удается отвлекать части наших войск от реальной угрозы, исходящей от генералов-предателей и их либеральных покровителей."
 russia.2059.a: "Раздавите их!"
 russia.2060.t: "Утечка Информации"
 russia.2060.d: "Наши шпионы на их территории раскрыли военный план смелой и беспрецедентной атаки. Они намерены отправлять колонну за колонной в направлении Москвы, используя нашу систему, которая в настоящее время парализована из-за беспорядков.\n\nОднако наши шпионы считают, что у них есть решение. Эти солдаты, хотя и преданы своему командованию, многого не требуют. Мы можем подкупать их с помощью этих операций и саботировать их планы. В качестве альтернативы, мы можем связаться с нерешительными военными и предложить им щедрое вознаграждение за то, что они присоединятся к нам."
 russia.2060.a: "Это нанесет финансовый ущерб, но наше правление будет обеспечено."
 russia.2060.b: "К черту их! Мы должны организовать решительную оборону, используя все имеющиеся ресурсы."
 russia.2060.c: "К черту их! Нападайте, когда они меньше всего этого ожидают, все в атаку!"
 russia.2061.t: "Провал Операции"
 russia.2061.d: "Мы не достигли своей цели. Их силы превосходят нас по численности и они отчаянно преданы нам. Они умело использовали наши внутренние проблемы в своих интересах. В некоторых городах они даже встретили радушный прием среди населения.\nИх колонны продвигаются вглубь России, направляясь к Москве. У нас очень мало времени для разработки эффективной стратегии обороны."
 russia.2061.a: "Бля..." 
 russia.2062.t: "Успех Операции"
 russia.2062.d: "Наша стратегия увенчалась успехом! Враги растеряны из-за отсутствия нашей поддержки и наших военных действий.\n\nНа Кубани остатки сопротивления практически беззащитны, у них мало ресурсов и союзников. Теперь мы можем быстро нанести им поражение. Мы загоним их в Черное море, позволив им плавать вместе с рыбами."
 russia.2062.a: "Отлично!"  
 russia.2063.t: "Конец Путчистам"
 russia.2063.d: "Успех предыдущих военных операций, несмотря на их жестокость, был значительным. Мы подавили восстание. Наши решительные действия и превосходная тактика ведения боя вытеснили повстанцев с Кубани. Многочисленные демократы, которые стремились к победе, теперь в нашем распоряжении. Их время ограничено. Военные генералы, участвовавшие в восстании, отказались сдаваться, и с ними поступили соответственно, как и с предателями.\n\nАлиханов выступил с речью, в которой объявил о прекращении террористической угрозы. Он осудил мягкую политику народолюбивого правительства-державника, но подчеркнул, что подобные ошибки больше не повторятся. Он объявил о проведении масштабной операции по зачистке и поклялся, что Россия больше не потерпит предателей."
 russia.2063.a: "Слава России!" 
 russia.2064.t: "Конец Тирании Державников"
 russia.2064.d: "Каждая неудача и беспорядки, связанные с восстанием, подрывали поддержку Алиханова, даже среди его верных сторонников. После жестокой расправы в Москве вспыхнуло восстание. В отсутствие центральной власти и подавленной полиции протестующие вышли из-под военного положения и призвали вооруженные силы.\n\nПодобно легендарным личностям прошлого, армейские генералы, демократическая оппозиция и их союзники вырвали контроль у угнетателей, вернув власть народу. Они уже очистили Думу и Кремль от их оккупантов.\n\nМестонахождение высших должностных лиц "державника" остается неизвестным, а сам Алиханов, похоже, исчез. Общенациональный розыск продолжается, но "державникам" теперь грозит деморализованное будущее без лидеров.\n\nРешение армии подождать оказалось мудрым. Они присягнули на верность новому национальному правительству, возглавляемому демократической коалицией.\n\nРоссия стоит на пороге новой демократической эпохи. Однако детали еще предстоит прояснить."
 russia.2064.a: "Слава Демократии!"
 russia.2101.t: "Ленинградский Комитет"
 russia.2101.d: "Недавние ошибки спровоцировали восстание в Санкт-Петербурге, вызвав сложную социально-политическую борьбу. Недовольные граждане и радикальные коммунистические группировки объединились, стремясь подорвать легитимность российского правительства и эффективность его деятельности. Этот альянс угрожает стабильности и единству страны.\n\nОднако мы столкнулись с необычной ситуацией. Большая часть левой оппозиции предпочла поддержать демократов. В Санкт-Петербурге к власти пришла радикальная сталинская фракция, возглавляемая известными апологетами Сталина. Проигрыш таким личностям был бы позором грандиозных масштабов!\n\nК сожалению, наши военные, включая солдат и офицеров, проявляют нежелание вступать в бой. Они предпочитают оставаться в своих казармах, ожидая, пока кризис утихнет. Такая пассивная позиция требует развертывания лояльных подразделений Желтой гвардии и других преданных воинских частей, чтобы заполнить брешь, образовавшуюся в результате их бездействия.\n\nВ Санкт-Петербурге повстанцы сформировали свои собственные военизированные формирования. Они занимают стратегические позиции для начала наступления, потенциально захватывая контроль над Москвой."
 russia.2101.a: "Все по местам, мы должны остановить этих стариков тиранов-любителей!"
 
 russia.2103.t: "Контролировать Новости"
 russia.2103.d: "Мы заметили, что необходим более жесткий контроль над СМИ, особенно государственными каналами. Их следует реорганизовать, чтобы они лучше соответствовали нашим целям.\nОднако многие из этих каналов все еще не полностью находятся под нашим влиянием. Нам необходимо определить, как ими управлять и какие рекомендации применять."
 russia.2103.a: "Следует уделять больше внимания военным и войне."
 russia.2103.b: "Просто следите за официальными новостными сетями."
 russia.2103.c: "Мы должны финансировать православные СМИ и распространять религию на телевидении." 
 russia.2104.t: "Наша Женская Организация"
 russia.2104.d: "Наша организация глубоко привержена феминизму. С помощью различных аффилированных групп мы даем россиянкам возможность полноценно участвовать в политической жизни. Теперь мы должны определить дальнейший путь нашей женской организации. В частности, нам нужно определиться с нашим подходом к пропаганде в местах, населенных преимущественно женщинами."
 russia.2104.a: "Наши женщины должны стать боевыми сестрами для наших солдат и мужчин!"
 russia.2104.b: "Пусть фокусом будет целенаправленная волонтерская и культурная работа."
 russia.2104.c: "Эта организация должна пропагандировать православие в семье и в жизни женщин." 
 russia.2105.t: "Государственный Профсоюз"
 russia.2105.d: "Рабочие - это сердце и душа России, и мы должны направлять их через надежные организации. Среди них государственный профсоюз выделяется как самый крупный и перспективный.\nОднако нам необходимо сформировать ее имидж и сформулировать идеологические принципы, которые она будет отстаивать для общественности и работников, присоединяющихся к ней."
 russia.2105.a: "Необходимо уделять больше внимания работникам военной промышленности и их льготам."
 russia.2105.b: "Профсоюз должен быть ориентирован на лояльность и бесплатные отпуска для работников."
 russia.2105.c: "Эта организация должна быть основана на добродетелях благочестия и послушания." 
 russia.2106.t: "Новая Молодежная Организация"
 russia.2106.d: "В России уже существовало множество молодежных организаций, но они были неорганизованны и слишком малочисленны, чтобы соответствовать потребностям нашего нового государства. Поэтому мы должны сосредоточиться на объединении их в единую сплоченную организацию, напрямую связанную с СЗНД.Мы должны подумать о том, что эта организация даст молодым умам и какие ценности мы им привьем."
 russia.2106.a: "Это должна быть и улучшенная, и расширенная Юнармия, где ребята изучают военное дело."
 russia.2106.b: "Дети должны знать о добродетелях и библеистике, а также знать, что Россия - самая святая земля."
 russia.2107.t: "Номинальная Реставрация Монархии?"
 russia.2107.d: "Некоторые державники, в первую очередь представители различных организаций, направили письмо нашему уважаемому лидеру, призывая его поддержать восстановление монархии. Они утверждают, что это наиболее естественная форма правления в России, которая не только приносит пользу русскому народу, но и усиливает контроль над националистическими группировками и монархистами.\n\nМногие претенденты были упущены из виду, но Гаврил Дорошин был выбран в качестве лучшего кандидата благодаря своему опыту и согласию с видением Алиханова. Однако риски значительны. Даже если Дорошин - всего лишь номинальный руководитель, разделение руководства с официальным царем уменьшило бы влияние нашего великого лидера."
 russia.2107.a: "Неплохая идея! Нам действительно нужно больше поддержки со стороны монархистов."
 russia.2107.b: "Выше нашего Лидера не может быть никого. Верность ему превыше всего."
 russia.2108.t: "Переворот Азарёнка"
 russia.2108.d: "Это была тихая ночь. Алиханов наслаждался отдыхом на своей даче под Калининградом, окруженный верной охраной. Но вдруг тишину разорвали выстрелы. Неизвестные напали на внешнюю охрану. Под командованием Алиханова дача стала неприступной крепостью.\n\nСвязь с внешним миром прервалась из-за радиопомех. Алиханов сразу понял, кто стоит за нападением: Азарёнок. Этот человек быстро набирал влияние, продвигая свои идеи красно-державничества.\n\nТем временем Азарёнок со своими людьми находился неподалеку от места событий. Его план был прост: устранить Алиханова и всех его людей, а затем представить это как нападение извне. Он хотел использовать этот момент, чтобы захватить власть в СЗНД и представить себя верным союзником Алиханова.\n\nИсход этой схватки определит будущее державизма. Каждый из участников борется за своих хозяев."
 russia.2108.a: "Сообщники Азарёнка убивают личную охрану Алиханова!"
 russia.2108.b: "Алиханову и его охранникам удается отбиться от этих заговорщиков!"
 russia.2109.t: "Новый Державный Режим"
 russia.2109.t2: "Новый Красный Царь"
 russia.2109.d: "Телеобращение нового лидера вызвало резонанс по всей стране.\n\nКогда режим утвердился, Азарёнок уверенно заявил, что убийцы Алиханова будут привлечены к ответственности. Единство России при новом руководстве, казалось, было обусловлено единственной целью - местью.\n\nТем временем сторонники Алиханова были незаметно отстранены от власти. Концепция державнического социализма теперь распространялась по всем подразделениям СЗНД.\n\nНовостные агентства по всему миру уже назвали это событие дворцовым переворотом 21 века, поставив под сомнение утверждения Азарёнка."
 russia.2109.d2: "Телеобращение нового лидера вызвало резонанс по всей стране.\n\nКогда режим утвердился, Азаренок уверенно заявил, что убийцы Алиханова будут привлечены к ответственности. Единство России при новом руководстве, казалось, было обусловлено единственной целью - местью.\n\nТем временем те, кто был верен Алиханову, были тихо смещены с руководящих постов. От царя тоже незаметно избавились, подписав формальное отречение, и заменили его очень эксцентричным и меланхоличным потомком Иосифа Сталина. Поначалу он сопротивлялся, но в конце концов его "убедили" взяться за эту роль.\n\nНовостные агентства по всему миру уже назвали это событие дворцовым переворотом 21-го века, поставив под сомнение утверждения Азарёнка."
 russia.2109.a: "Да Здравствует Новый Вождь!"
 
 russia.2110.t: "Алексей Навальный Назначен Президентом"
 russia.2110.d: "После успешной нейтрализации экзистенциальной угрозы государственному суверенитету перед российской политической элитой возникла необходимость определения нового руководителя государства. В этом контексте следует отметить, что возвращение на политическую арену фигуры, ранее известной широкой общественности, стало знаковым событием. Данный индивид, известный под именем Алексей Навальный, не только изменил свои политические взгляды, но и был вынужден перейти в подполье в результате преследований со стороны Алихановских властей.\n\nВ условиях временной политической нестабильности, обусловленной ликвидацией угрозы державизма, правительство, несмотря на свою недостаточную организационную эффективность, приняло решение о временном назначении Навального на пост президента страны до проведения предстоящих выборов. Этот шаг был предпринят с целью обеспечения легитимности и стабильности переходного периода.\n\nОднако Навальный, проявив политическую дальновидность, отказался от участия в предстоящих выборах, мотивировав это тем, что Россия нуждается в притоке новых, незаангажированных кадров. По его мнению, активное участие в избирательной кампании могло бы привести к консолидации электората вокруг его персоны, что, в свою очередь, могло бы негативно сказаться на процессе демократического транзита."
 russia.2110.a: "Наконец-то демократия восстановлена..."
 
 russia.2111.t: "Конец Инакомыслия"
 russia.2111.d: "Когда над бескрайними просторами России забрезжил рассвет, люди, известные своим непокорством, проснулись, не испытывая желания критиковать свое правительство или государство. Благодаря усилиям сотен и тысяч лояльных граждан и отрядов желтой гвардии государственный аппарат продолжил разрастаться. Демократическое и левое сопротивление было полностью раздавлено, а большинство их участников арестованы.\n\nРоссия вступает в новую эпоху, когда каждый гражданин предан государству и не стремится к индивидуальности.\n\nИстория не будет благосклонна к тем, кто противостоял законному руководству России или боролся с ним. Они будут стерты из памяти, хотя некоторые из них будут названы предателями в учебниках истории, написанных победителями, которые в отчаянии пытались подорвать судьбу своей родины. Их слабые призывы к мнимой свободе останутся неуслышанными. Некоторые из них закончат свою жизнь в шахтах или лагерях, а кто-то прямо в ближайшем подвале.\n\nОставшиеся слабые голоса потонули в бурном море громогласных лозунгов и военных маршей.\n\nВнутри России инакомыслие было уничтожено, и каждый гражданин стал таким же как другие: ни сомнений, ни неуверенности, ни лишних вопросов. \nЭто ли не счастье?"
 russia.2111.a: "Вы меня так долго ждали. Перчатка из шёлка - кулак из стали." 
 russia.2112.t: "Новое Завтра"
 russia.2112.d: "Благодаря общим усилиям народа России и слаженному действию сопротивления тиранический режим Алиханова был свергнут. Державники и их лоялисты оставшиеся без их вождя разбежались по богам забытым местах, как крысы с тонущего корабля, они дезорганизованы и представляют лишь малую опасность.\n\nТысячи людей вышли на улицы праздновать этот момент с флагами России, особенно в Санкт-Петербурге. Некоторые митинги не прекращаются до сих пор.\n\nИ, хотя, упразднение громоздкого госаппарата с тысячами подводных каменей займёт немало времени, граждане теперь могут спать спокойно. Первые декреты и общения правительства это о свободе слова и демократических законах, а так же люстрация чиновников режима. Каждый бюрократ который злоупотреблял своим статусом вскоре заменит место политических заключённых в тюрьмах.\n\nПусть надежда ещё лишь только начинает возвращается в души русского народа, но уже можно сказать что скоро наступит новое завтра, и оно покажет куда именно пойдёт Россия.\n\nДа, во время переворота и нестабильности погибло немало честных людей, как говорится, "Лес рубят - щёпки летят", не так ли?"
 russia.2112.a: "У меня есть мечта..."
  
 russia.2113.t: "Народное Собрание"
 russia.2113.d: "После прихода к власти нового правительства Сергей Удальцов объявил о начале так называемого Народного Собрания, на котором будет решаться будущее социалистических преобразований в России.\n\nКогда делегаты расселись по своим местам, в дискуссии возникли две различные фракции. На одной стороне стоял Сергей Удальцов, а на другой - ортодоксальные социалисты и коммунисты, которые выступали за возвращение к традиционным социалистическим идеалам. Им противостояла фракция профсоюзов, возглавляемая Конфедерацией труда, которая предложила новую форму социализма с опорой на профсоюзы - идею, которая была опробована лишь в нескольких экспериментах.\n\nХотя Удальцов оставался наиболее популярным кандидатом, момент истины быстро приближался. Только время покажет, какому пути отдаст предпочтение судьба."
 russia.2113.a: "Удальцов избран председателем Народного собрания!"
 russia.2113.b: "Кравченко избран председателем Народного собрания!"
 russia.2114.t: "Новое Молодежное Движение"
 russia.2114.d: "В условиях усложняющейся нормативно-правовой базы нашего государства возникает важный вопрос: как мы можем воспитывать политически ангажированную молодежь в рамках существующей структуры управления?\n\nОдна из возможностей заключается в возрождении и интеграции организаций советской эпохи, таких как комсомол и пионерия, в современный контекст. Поступая таким образом, мы могли бы использовать исторические прецеденты и существующие структуры для поощрения гражданского участия и политической грамотности молодежи. В качестве альтернативы, мы могли бы принять более радикальный, антигосударственный подход, возродив "Авангард красной молодежи". В отличие от многих других коммунистических групп, эта организация действовала неофициально и незапятнанно, делая упор на автономию и активность молодежи. Следуя по этому пути, мы воспользуемся историческим наследием, которое способствует непосредственному участию в политической жизни и предоставляет платформу для того, чтобы голоса молодежи были услышаны."
 russia.2114.a: "Новый Комсомол!"
 russia.2114.b: "Ребята должны быть готовы к революции, а не к скучной бюрократической работе."
 
 russia.2115.t: "Выборы!"
 russia.2115.d: "После долгих томительных дней ожидания выборов, предвыборной агитации и митингов пришло время россиянам определиться с будущим! Мы стоим на пороге новой эры, наш народ проголосует за избрание нового президента России, давайте надеяться на его благоразумие и веру...\n\nПосле подсчета всех голосов победителям становится..."
 russia.2115.a: "Кандидат от Консерваторов!"
 russia.2115.b: "Кандидат от Либералов!"
 russia.2115.c: "Кандидат от Социалистов!"
 russia.2115.f: "Кандидат от Патриотов!"
 russia.2115.g: "Кандидат от Националистов?!"
 russia.2115.z: "Кандидат от Коммунисты?!"
 
 russia.2116.t: "Партия Пролетариата"
 russia.2116.d: "По мере того, как мы будем восстанавливать советскую систему, одним из ее фундаментальных элементов станет партия. Из-за нехватки опытных бюрократов в настоящее время мы должны решить, где найти свежую кровь и лидеров для нашей новой системы.\nЕсть три возможных варианта для рассмотрения:\n1. Старая сталинская РКРП-КПСС и ее сторонники жесткой линии могут помочь в восстановлении порядка и стабильности нашего режима. Они также поддерживают советский патриотизм и антиревизионистские взгляды.\n\n2. РРП, бывшая троцкистская организация, имеет значительную молодежную базу и включает в себя много социалистов и коммунистов. Они могут внести свой вклад в жизнеспособность нашего революционного государства.\n\n3. Множество небольших коммунистических групп с общим ленинским подходом к управлению и истории. Мы можем использовать их как золотую середину, чтобы избежать крайних позиций."
 russia.2116.a: "Пополнить наши ряды сталинистами."
 russia.2116.b: "Пополнить наши ряды неформальными социалистами."
 russia.2116.c: "Объединить все общекоммунистические партии в нашу систему."
 
 russia.2117.t: "Умеренные Левые Объединяются"
 russia.2117.d: "По мере того, как политическая жизнь нашей страны возрождается, умеренные левые силы объединяются в единую партию. Это новое формирование включает в себя ряд бывших элементов, включая "Справедливую Россию", умеренных членов Коммунистической партии Российской Федерации, "Народной России" и различных других небольших социал-демократических групп.\n\nНа учредительном съезде партии была утверждена политическая и экономическая платформа, а также принято важное решение о ее названии."
 russia.2117.a: "Всероссийская социалистическая трудовая партия."
 russia.2117.b: "Социалистическо-демократический союз."
 russia.2117.c: "Социал-демократическая народная партия."
 russia.2118.t: "Консервативные Силы Объединяются"
 russia.2118.d: "Наша нация залечивает раны, нанесенные ей радикальной, ультранационалистической историей. Умеренные консервативные силы объединились для создания нового политического образования.\nНа съезде своей партии они обсудили социальные и политические вопросы. Они также выбрали название для своей политической организации."
 russia.2118.a: "Всероссийская патриотическая партия."
 russia.2118.b: "Национальный курс."
 russia.2118.c: "Партия Национального Единства" 
 russia.2119.t: "Либералы Объединились"
 russia.2119.d: "В политической среде сформировалась сплоченная либеральная фракция, поддерживаемая видными либеральными деятелями и организациями. Официальное начало этой консолидации было положено на учредительном конгрессе, в котором приняли участие различные политические деятели, представляющие различные слои населения. Во время этого собрания фракция тщательно сформулировала свою политическую повестку дня и единогласно выбрала свою номенклатуру, тем самым официально сформулировав свою политическую идентичность и цели."
 russia.2119.a: "Гражданская Платформа."
 russia.2119.b: "Демократический Центр."
 russia.2119.c: "Российский Демократическая Партия." 
 russia.2120.t: "Патриоты Объединяют Свои Силы"
 russia.2120.d: "Бескомпромиссные патриоты и ультраконсерваторы, в основном выходцы из реакционной фракции старого крыла "Единой России", а также убежденные сторонники политики сильного лидера путинской эпохи, объединились в мощный политический блок. Во время своего конклава, где они тщательно обдумывали стратегии поддержания своей актуальности, они также присвоили своей организации номенклатуру, соответствующую их идеологическим принципам."
 russia.2120.a: "Собрание Обьединение России."
 russia.2120.b: "Отечество."
 russia.2120.c: "Партия Суверенной Демократии."
 russia.2121.t: "Националисты, Но Другие!"
 russia.2121.d: "Несмотря на захват власти ультранационалистами в нашей стране, многие националисты были не согласны с Державниками и Алихановым. Белов-Поткин, когда-то малоизвестный националист, стал заметным представителем тех, кто выступал против Алиханова и чувствовал, что их взгляды не учитываются в SZND.\nТеперь, руководствуясь конъюнктурными соображениями, он примкнул к демократической оппозиции. Собрав команду, он создает политическую организацию для продолжения националистической политики в посталихановской России.\nВ ходе обычных дискуссий обсуждалось будущее название организации..."
 russia.2121.a: "Союз борьбы с Большевизмом."
 russia.2121.b: "Всероссийское Имперское Движение."
 russia.2121.c: "Национальная Партия."
 russia.2122.t: "Красная Волна"
 russia.2122.d: "Коммунисты в России всегда находят способ вернуться на политическую сцену, несмотря ни на что. На этот раз Сергей Маленкович пытается объединить коммунистические силы, подобно коалиции "Красная Россия" до прихода к власти Алиханова.\nМаленкович собрал свою группу и представил их программу, в которой изложил их коммунистическую и популистскую платформу.\nОни также выбрали название..."
 russia.2122.a: "Коммунисты России."
 russia.2122.b: "Союз Коммунистов."
 russia.2122.c: "Сталинский Блок."
 
 russia.2126.t: "Малые Партии по Всей России"
 russia.2126.d: "Как и следовало ожидать, в дополнение к более устойчивым политическим силам на российском политическом ландшафте появилось множество новых организаций и партий. К ним относятся догматичные коммунисты-сталинисты, более радикальные ультраправые националисты, либеральные социалисты и рыночные либералы. Хотя большинство из этих групп не заслуживают упоминания, некоторые из них могут быть приняты во внимание, если их политика будет приемлемой для будущих правительств при проведении коалиционных переговоров или для того, чтобы сделать их более заметными на национальной арене."
 russia.2126.a: "Что есть, то есть."
 
 russia.2127.t: "Первая Сессия Национального Собрания"
 russia.2127.d: "После активизации усилий по демократизации и заявления Алиханова Национальное Собрание собралось на свое первое заседание. В настоящее время большинство мест в парламенте, насчитывающем в общей сложности 500 мест, заполнено, в то время как остальные места являются желанными и будут получены только после первых выборов.\nПервоначально депутаты собирались под общим знаменем "Независимых", но вскоре появились отдельные фракции, которые превратились в новые политические образования. Наиболее значимой из них является "Союз национально-демократического возрождения", поддерживаемый Алихановым. Состоящая из национал-демократов, бывших державистов и нескольких технократов, она стала новой доминирующей партией в России. Она сохранила большую часть структуры СЗНД, но модернизировала ее, чтобы она соответствовала более гражданским требованиям.\n\nСреди других известных фракций - Российская конституционная национальная партия, демократическая и реформистская группа, возглавляемая консервативными демократами, пережившими чистки. Однако из-за своей умеренной и пассивной позиции она, вероятно, будет рассматриваться как подконтрольная и легко компрометируемая.\nПартия промышленного развития и Профсоюз России сосредоточены исключительно на экономических выгодах для промышленных и торговых кругов, в то же время используя ассамблеи для борьбы за влияние финансовых и промышленно развитых корпораций.\nСамой маленькой фракцией является Государственный профсоюз, организация левого толка, состоящая в основном из левых националистов и национал-социалистов. Несмотря на свою левую ориентацию, они в основном выступают за усиление государственного контроля и поддерживают политику социального обеспечения, ориентированную исключительно на русский рабочий класс."
 russia.2127.a: "Более тихая демократия." 
 russia.2128.t: "Антон Алиханов покидает СЗНД"
 russia.2128.d: "Шокировав многих, Алиханов официально объявил о своей независимости, разорвав связи с СЗНД. В своем заявлении он раскритиковал лояльность партии за слепое следование догмам и отказ признавать правду. Отныне он будет действовать в жизни страны как независимая сила.\nОн также объявил о предстоящей первой сессии Национального собрания, нового органа для "демократического" участия. Критики сразу же отметили отсутствие восстановленных демократических институтов в России и предупредили, что эти реформы лишь улучшат видимость, создав неоаристократическую демократию, в которой доминируют элиты и их интересы, в то же время маргинализируя подлинные голоса.\nНесмотря на это, реформисты праздновали свою победу над сторонниками жесткой линии СЗНД, которые теперь остались без лидеров и были политически отстранены."
 russia.2128.a: "Слава Алиханову, мудрейшему из мудрейших!" 
 russia.2129.t: "Что Осталось от Былой Славы"
 russia.2129.d: "Несмотря на отстранение радикальных державников от политики, оставление их без контролируемой силы может иметь катастрофические последствия для нашего нового режима.\nВ то время как многие державники и их сторонники спокойно относятся к статусу постоянного главы государства Алиханова, все еще есть те, кто ставит идеологию выше личных предпочтений. В основном это знаменосцы и сторонники Возрождения, которые полны решимости продвигать свое видение державизма.\nМы могли бы сформировать стабильную политическую партию из их остатков, контролируемую новой администрацией, чтобы дать своим сторонникам иллюзию представительства.\nВ качестве альтернативы, мы могли бы попытаться объединить оба крыла движения Державников, поощряя их к реинтеграции в общество. Это расширило бы наше влияние, но потребовало бы больше усилий."
 russia.2129.a: "Используем знаменосцев, мы можем использовать их милитаризм."
 russia.2129.b: "Соберите Возрожденцов, их православие может принести пользу."
 russia.2129.c: "Объедините их, в конце концов, все они патриоты."
 
 
 nato.6.t: "Гражданские Авиалайнеры без опознавательных знаков" 
 nato.6.d: "УВД ШОПЕНА, ВАРШАВА\nРейс без опознавательных знаков, укажите свой позывной и пункт назначения.\n\n САМОЛЕТ БЕЗ ОПОЗНАВАТЕЛЬНЫХ ЗНАКОВ\n...\n\nУВД ШОПЕНА, ВАРШАВА\nРейс без опознавательных знаков, вы летите над ограниченным воздушным пространством, немедленно укажите свой позывной и пункт назначения.\n\nСАМОЛЕТ БЕЗ ОПОЗНАВАТЕЛЬНЫХ ЗНАКОВ\n...\n\nУВД ШОПЕНА, ВАРШАВА\nВторой рейс без опознавательных знаков, укажите свой позывной и пункт назначения. На радаре есть еще... 10, 15, 20... Рейсы без опознавательных знаков, немедленно сообщите свои позывные, иначе вы будете принудительно отстранены от полетов.\n\nСАМОЛЕТ БЕЗ ОПОЗНАВАТЕЛЬНЫХ ЗНАКОВ\n..."
 nato.6.a: "ЭТО НЕ ГРАЖДАНСКИЕ РЕЙСЫ"
 tajikistan.1.t: "Рогунская плотина в Таджикистане Близка к завершению"
 tajikistan.1.d: "В Таджикистане активно завершаются работы на Рогунской ГЭС - ключевом энергетическом проекте страны. По данным правительства, строительство плотины достигло финальной стадии, ведется монтаж последних гидроагрегатов. После ввода в эксплуатацию станция станет крупнейшей в Центральной Азии, обеспечив регион дешевой электроэнергией и снизив зависимость от импорта.\n\nПроект, начатый правительством СССР в 1976 году, неоднократно замораживался, но в 2018-м строительство возобновилось при поддержке России. Окончательный запуск запланирован на ближайшие годы."
 tajikistan.1.a: "Хорошо для них."
 #Starting Tree (First 2 Years) Начальные Фокусы
 SOV_the_russian_dream: "Русская Мечта"
 SOV_the_russian_dream_desc: "Страна, охватывающая 1/8 часть мира. Страна, которая отказывается быть просто сноской в истории. С территориями и людьми за ее пределами, которые жаждут вернуться. Страна, которая отказывается от западной гегемонии и выступает за многополярный мировой порядок.\nХотя прошлый век не был к нам добр, он также подарил нам некоторые из наших самых славных моментов. И пока русская душа не погаснет, мы будем продолжать идти своим путем."
 SOV_pacify_abkhazia_and_south_ossetia: "Защитить Абхазию и Южную Осетию"
 SOV_pacify_abkhazia_and_south_ossetia_desc: "Два отколовшихся от Грузии государства являются нашими союзниками и братьями со времен их повстанческих войн. Их народ стойкий и гордый. И верный, что самое главное.\nОднако очевидно, что мы оказали им плохую услугу, позволив изолировать их от мира. Мы должны включить их в нашу экономическую и оборонительную сферу, ведь они заслуживают процветания своих регионов." 
 SOV_pressure_kiev: "Давление на Киев"
 SOV_pressure_kiev_desc: ""
 SOV_global_propoganda_campaigns: "Глобальные Пропагандистские Кампании"
 SOV_global_propoganda_campaigns_desc: ""
 SOV_complete_nordstream2: "Завершить строительство Северного потока 2"
 SOV_complete_nordstream2_desc: ""
 SOV_review_the_military_budget: "Пересмотреть Военный бюджет"
 SOV_review_the_military_budget_desc: ""
 SOV_ties_with_bashar: "Связи с Башаром"
 SOV_ties_with_bashar_desc: ""
 SOV_chinese_trade_deals: "Торговые Сделки с Китаем"
 SOV_chinese_trade_deals_desc: "Наш восточный сосед - страна со второй экономикой в мире. При этом он является главным производителем товаров. Страна такого масштаба обладает огромным опытом, которым можно поделиться с нами, учитывая, с чего они начинали. Пусть их промышленники укажут путь к процветанию, ведь нам пора перенять их методы."
 SOV_condemn_ukraine_neonazism: "Осудить Украинский Неонацизм"
 SOV_condemn_ukraine_neonazism_desc: ""
 SOV_prepare_the_union_state: "Подготовить Союзное Государство"
 SOV_prepare_the_union_state_desc: "С 1996 года Александр Лукашенко и Борис Ельцин вели переговоры о сотрудничестве между Россией и Беларусью, результатом которых стало подписание в 1999 году соглашения о Союзном государстве. Конечно, предполагалось, что после этого соглашения Россия и Беларусь станут единым целом, однако, к сожалению, этот проект был остановлен.\nНо ничто не может быть остановлено навсегда, и наш президент нацелен на скорейшее создание Союзного государства. Он даже купил крымское вино для встречи с Лукашенко, вот как серьезно он настроен на это дело!"
 SOV_increase_fsb_funding: "Укрепить Веру в Президента"
 SOV_increase_fsb_funding_desc: "Именно воля народа удерживает Путина у власти. Несмотря на все разговоры об авторитаризме, общественное мнение действительно имеет значение. Ведь люди готовы и дальше следовать нашим путем и бороться за наши идеалы."
 SOV_strangle_the_islamists: "Сломить Исламистов"
 SOV_strangle_the_islamists_desc: ""
 SOV_tighten_the_leashes: "Затянуть Поводки"
 SOV_tighten_the_leashes_desc: ""
 SOV_fight_against_the_left: "Борьба с Левыми"
 SOV_fight_against_the_left_desc: "Левые представляют главную опасность для нашей системы в настоящее время. Поддержка Навального на предыдущих местных выборах, культ суверенного гражданина СССР, антиистеблишментная риторика. Раз уж националистов уже приструнили, то и левые должны последовать их примеру. Это справедливо."
 SOV_fight_against_the_right: "Борьба с Правыми"
 SOV_fight_against_the_right_desc: "В 2010-х годах наше правительство пресекло националистические настроения, в первую очередь антимигрантские и ксенофобские. Однако угроза все еще сохраняется и даже, кажется, процветает. Мы не можем забыть, как многие наши неонацисты перешли на сторону Украины, чтобы "бороться с большевистским президентством и их подхалимами". И хотя у нас тоже есть националисты, которые поддерживают наше дело, лучше всего позаботиться о том, чтобы они не могли пропагандировать свою идеологию."
 SOV_fight_ldpr_influence: "Подрывать Влияние ЛДПР"
 SOV_fight_ldpr_influence_desc: "На ЛДПР нужно давить, так как она является основным органом правого движения в России. Вы знаете, что нужно делать, за работу!"
 SOV_fight_liberalism: "Борьба с Либерализмом"
 SOV_fight_liberalism_desc: ""
 SOV_fight_communist_nostolgia: "Подрывать Влияние КПРФ"
 SOV_fight_communist_nostolgia_desc: "На КПРФ нужно давить, поскольку она является основным органом левого движения в России. Вы знаете, что нужно делать, за работу!" 
 SOV_expand_government_framework: "Расширить Рамки Правительства"
 SOV_expand_government_framework_desc: "Наш президент считает, что мы должны усилить нашу администрацию, подготовив новые связи и союзы внутри системы. Общероссийский народный фронт - это уже сложившаяся система. Нужно только расширить ее." 
 SOV_towers_of_kremlin: "Башни Кремля"
 SOV_towers_of_kremlin_desc: "Хотя политические партии "едины" во внешней политике и могут выступать в роли согласных, Россия не является однопартийным государством. "Башни", как мы их называем, - это совокупность людей в правительстве со схожим образованием и взглядами, продвигающих свою коллективную повестку дня.\nДве основные башни - это "Технократы" и "Силовики". В то время как технократы требуют больше денег на технологические проекты треформирование системы, то Силовики требуют больше денег на военные проекты и вливанием денег в спецслужбы.\nУмиротворение любого из этих блоков принесет разные выгоды, но может и вызвать некоторые проблемы." 
 SOV_anti_globalist_bulwark: "Антиглобалистский Оплот"
 SOV_anti_globalist_bulwark_desc: "Глобальные элиты хотят подчинить себе мир, загнать его в клетку под властью всемирных корпораций. Мы должны бороться против такого влияния. Мы должны показать всему миру, что однополярному мировому порядку суждено пасть, потому что у нас и у Глобального большинства есть сила остановить его влияние." 
 SOV_glorify_our_victory: "Прославлять Нашу Историческую Победу"
 SOV_glorify_our_victory_desc: "Мы - потомки победителей. Тех, кто погиб, защищая наш народ от истребления. Некоторые в либеральных кругах говорят, что прославление нашей победы "кровожадно" и "ненужно". Почему мы должны забыть об этой войне? Забыть, что почти 30 миллионов советских граждан были убиты немцами, истреблялись деревня за деревней? Китай тоже понес большие потери, но они отказываются забывать о таких зверствах.\nМы должны последовать их примеру и помнить, как много было принесено в жертву, чтобы мы были здесь." 
 SOV_amplify_state_media: "Усилить Государственные СМИ"
 SOV_amplify_state_media_desc: "Хотя с развитием Интернета кабель теряет свою популярность, мы не должны отказываться от него. Наши медиа-услуги должны быть усилены и усовершенствованы, ведь мы все еще рассчитываем на его успех. \nХотя, кажется, даже CCN и BBC критикуют за пропаганду в своих странах...\n Думаю, это будет непростая задача - сделать привлекательным каждый наш рассказ."
 SOV_crystalizing_putinism_desc: "Хотя с развитием Интернета кабель теряет свою популярность, мы не должны отказываться от него. Наши медиаслужбы должны усиливаться и совершенствоваться, ведь мы все еще рассчитываем на его успех.\nХотя, кажется, даже CCN и BBC подвергаются критике за пропаганду в своих странах... Думаю, это будет непростая задача - сделать привлекательными все наши нарративы."
 SOV_pass_the_new_constitution: "Гарант Системы"
 SOV_pass_the_new_constitution_desc: "Как бы не тужились те люди в низах системы, какие угрозы и насмешки они бы не кидали, на верху всегда будет только один человек. Он тут с давних пор, он прекрасно насквозь их всех видит, знает все их секреты, пока они сидят в думе, их нервы словно нити, пришиты к его пальцам. Так что, пока пешки примеряют короны, настоящий лидер может трудиться спокойно, и оставаться объединяющим символом Российской системы."
 SOV_declare_smo: "Начать Специальную Военную Операцию"
 SOV_declare_smo_desc: "После решения самых насущных проблем пришло время взглянуть за границу. Украина уже несколько лет неуклонно перевооружается при поддержке Запада. Наши братья на Донбассе укрепились, а наши генералы говорят нам, что военные готовы к работе. Что ж, братья, пора проводить специальную военную операцию.\nЗаходим!"
 SOV_purchase_sinovac_vaccine: "Приобрести Синовак"
 SOV_restore_public_confidence: "Вернуться к Нормальной Жизни!"
 SOV_restore_public_confidence_desc: "Россия возвращается к нормальной жизни! Ну, я полагаю, к Новой норме. Инвестиции и разработки, которые мы сделали во время этой пандемии, останутся. Но президент Путин очень доволен тем, что мы избежали худшей из возможных ситуаций. Это было очень важное испытание для нашей администрации. Наши системы были усовершенствованы, и в будущем мы сможем с легкостью справляться с подобными чрезвычайными ситуациями! Просто не обращайте внимания на нытье и жалобы людей, они все равно не знают, что для них лучше." 
 SOV_against_chipivization: "Против Чипизации!"
 SOV_against_chipivization_desc: "Похоже, возмущение общественности против наших блокировок и массовых вакцинаций достигло критической точки. Коммунисты открыто выступают против нас за то что мы... вживляем микрочипы нашим гражданам? Что? И почему лидеров антивакцинского движения в наших местных администрациях выбрала прозападная оппозиция?\nХм... давайте немного притормозим... Да, наши системы слежки и блокировки были слишком экстремальными, но все это делали! По сравнению с Австралией или Британией это было ничто!\nНеважно, лишь бы они были счастливы, я полагаю. Мы не можем портить имидж нашего любимого президента из-за этой никчемной ерунды..."
 SOV_stimulate_srzp: "Способствовать Популярности СРЗП"
 SOV_stimulate_srzp_desc: "Справедливая Россия - За Правду - интересная политическая партия. Состоящая из умеренных патриотических социалистов, но она находится в шатком положении. Помогает то, что, хотя они сильно критикуют "Единую Россию", они лояльны нашему президенту. Мы могли бы использовать их, чтобы оттянуть голоса у КПРФ..."
 SOV_strengthen_the_federation_chairman: "Укрепить Партию Президента"
 SOV_strengthen_the_federation_chairman_desc: "Президент должен всегда побеждать, а значит, что и его партия тоже должна побеждать! Так давайте же доведём "Единую Россию" к комфортному большинству, используя самые разные методы - от создания новых партийных проектов до ее омоложения!"
 SOV_1000_years_of_putinism: "1000 Лет Путинизма"
 SOV_1000_years_of_putinism_desc: "Кажется, что положение нашего дорогого президента укрепилось. Он преодолел множество кризисов и привел в чувство нашу систему. Его история и наследие войдут в учебники истории.\nДавайте будем амбициозными и выпьем за то, чтобы наше процветание продлилось еще тысячелетие!"
 SOV_address_the_economy: "Решение Проблем Экономики"
 SOV_address_the_economy_desc: ""
 SOV_pension_reform: "Пенсионная Реформа"
 SOV_pension_reform_desc: ""
 SOV_encourage_domestic_production: "Стимулирование Внутреннего Производства"
 SOV_encourage_domestic_production_desc: "В условиях хаоса, охватившего цепочки поставок, становится ясно, что мы должны увеличить количество отечественной продукции. Это также замедлит утечку мозгов, поскольку мы будем уделять больше внимания новым отраслям, требующим квалифицированной рабочей силы."
 SOV_strengthen_gazprom: "Укрепить Газпром"
 SOV_strengthen_gazprom_desc: "Газ, нефть и природные ресурсы были и, вероятно, останутся нашей основной статьей дохода еще как минимум полдесятка лет. Европейские рынки очень зависят от нас, и мы не должны упускать столь редкие возможности. Пусть голубой огонь вырастет нам денежные деревья."
 SOV_everything_is_alright: "Все в порядке..."
 SOV_everything_is_alright_desc: ""
 SOV_force_lockdowns: "Обеспечить Карантин"
 SOV_force_lockdowns_desc: "Что ж... похоже, этот вирус более серьезен, чем мы думали вначале. Давайте сначала введем карантин в России, чтобы разобраться с этим. У нас есть работа, которую нужно выполнить."
 SOV_kickstart_vaccine_research: "Начать Исследование Вакцины"
 SOV_kickstart_vaccine_research_desc: "Зачем нам покупать зарубежные вакцины, когда мы можем производить свои собственные? У нас достаточно ярких умов и вирусологов, которые способны на это. Давайте профинансируем российские центры вирусных исследований для этой работы. Мы можем создавать качественные лекарства!"
 SOV_purchase_sinovac_vaccine_desc: "Что ж... Я полагаю, что у китайцев уже есть готовая вакцина... Зачем нам снова тратить собственные деньги на отечественные вакцины? Просто возьмите вакцины у наших друзей, не то чтобы они радикально отличались."
 SOV_provide_incentives_to_stay_open: "Стимулы для Предприятий"
 SOV_provide_incentives_to_stay_open_desc: ""
 SOV_restrict_meetings: "Ограничить Собрания"
 SOV_restrict_meetings_desc: ""
 SOV_restore_public_confidence: "Восстановить Доверие Общественности"
 SOV_force_vaccinations: "Принудительные Прививки"
 SOV_force_vaccinations_desc: ""
 SOV_sponsor_russian_digital_economy: "Спонсировать Российскую Цифровую Экономику"
 SOV_sponsor_russian_digital_economy_desc: "Россия - один из крупнейших цифровых рынков в мире. От приложений для онлайн-банков, социальных сервисов до простых мессенджеров и поисковых систем - в России много талантливых IT-специалистов. Владимир Владимирович видит этот талант, поэтому мы будем поддерживать его и дальше.\nПусть российский веб достигнет новых высот!"
 SOV_fund_military_advancement: "Финансировать Военное Развитие"
 SOV_fund_military_advancement_desc: "ВПК по-прежнему остается одной из крупнейших отраслей нашей промышленности. Эти заводы не только обеспечивают нас оружием, которое мы можем продавать за рубеж, но и привлекают больше рабочих мест и используют наши ресурсы внутри страны.\nАмериканцы сумели увеличить свой потенциал в немалой степени благодаря своим военным подрядчикам, создающим высокие технологии для бомбардировок Ближнего Востока. Мы должны последовать их примеру."
 SOV_back_to_normal: "Российская Экономика Будущего"
 SOV_back_to_normal_desc: "Было время, когда российская экономика переживала одни из лучших своих лет. По иронии судьбы, период процветания пришелся на время мирового финансового кризиса. И вот теперь, похоже, мы снова достигли своего золотого века.В то время как мир горит, а мировая экономика рушится, мы одни стоим на вершине. Высокие доходы от нефти и газа, огромный промышленный рост. Конец блокировок. Кажется, что все происходит в нужное время. Так выпьем же за то, чтобы усилия нашего президента принесли плоды!"
 SOV_what_now: "Что Теперь?"
 SOV_what_now_desc: "Похоже, стервятники уже роятся вокруг, охотясь за креслом президента. Независимо от кандидата, будущее России изменится без направляющей руки нашего Владимира Путина.\nТеперь мы стоим на перепутье и органично вопрос: кого выбрать?"
 SOV_spread_cprf_leaflets: "Сплотить Коммунистическую Партию"
 SOV_spread_cprf_leaflets_desc: "КПРФ уже давно списана другими левыми группами со счетов как сноска, а не настоящее коммунистическое движение. Но неужели во время этого шанса, который выпадает раз в жизни, они останутся в стороне и позволят капиталистам отобрать у нас победу, как это было в 1996 году?\nНЕТ! Они сплотятся за Зюгановым и вернут Россию на ее законный путь!"
 SOV_party_of_power: "Использовать Административный Ресурс"
 SOV_party_of_power_desc: "В то время как другие партии делают свои шаги к президентскому креслу, Медведев имеет преимущество. Используя все ресурсы, которыми располагает наше правительство, мы донесем до людей это послание: Преемник Путина снова победит!" 
 SOV_ramp_up_the_agitation: "Усилить Популистскую Агитацию"
 SOV_ramp_up_the_agitation_desc: "Довольны ли вы своей жизнью, Россияне? Довольны ли вы тем, что наши олигархи лижут западные сапоги, наводняя нашу страну низкоквалифицированной рабочей силой? Довольны ли вы тем, что европейцы порочат имя нашей нации, разрушают статуи русских солдат, освободивших их от чистого зла, и все это из-за их ненависти к нам?\nЖириновский говорит: ХВАТИТ ЭТО ТЕРПЕТЬ! Россия вернется к своей законной славе!"
 SOV_post_putin_elections: "Президентские выборы"
 SOV_post_putin_elections_desc: "В условиях, когда наше правительство остается нестабильным, очевидно, что нужно что-то делать. Последние несколько десятилетий президентские выборы в России были довольно скучным событием. Однако сейчас, когда все политические партии, башни и фокус-группы дерутся за кресло президента, кажется, что эти выборы решат судьбу нашей страны на десятилетия вперед."
 SOV_crush_western_influence: "Сокрушить Западное Влияние"
 SOV_crush_western_influence_desc: "Прозападная оппозиция использует все доступные ресурсы, чтобы подорвать нашу страну. Наш президент знает о двуличной природе Запада. Даже в самые близкие моменты они пытались нанести нам ответный удар, финансируя чеченских террористов. Именно поэтому мы должны сделать все, что в наших силах, чтобы загнать финансируемое Западом движение в подполье.\nА дальше им останется только наблюдать, как мы восходим вместе с солнцем."
 SOV_anti_ukranian_military_exercizes: "Антиукраинские Военные Учения"
 SOV_anti_ukranian_military_exercizes_desc: "Во время переворота в Украине в 2014 году законный президент Янукович решил бежать из страны в Россию. Это была важнейшая ошибка, за которую мы расплачиваемся с тех пор. С тех пор Украина в военном отношении готовится к конфликту с нами, а НАТО обучает ее руководство и войска.\nМы тоже в идеале должны готовиться к такому сценарию.Наши силы, в конце концов, устарели."
 SOV_assist_our_novorossiyan_allies: "Помочь Республикам Донбасса"
 SOV_assist_our_novorossiyan_allies_desc: "Эти два бастиона русского мира проливали кровь и умирали за право называться русскими. Однако спустя годы после их восстания проблемы все еще остаются. У них нет единой экономической зоны, не объединены и силы.\nОднако простой поддержки пока достаточно."
 SOV_the_navalny_fifth_column: "Выступить Против Пятой Колонны"
 SOV_the_navalny_fifth_column_desc: "Несмотря на все наши усилия, кажется, что Навальный и его стая продолжают идти против нас. Забавно, что русский националист, сравнивший кавказцев с тараканами, хочет принести к нам "западную демократию". Почему, только потому, что он учился в Йельском университете "государственному мастерству"\nК сожалению, он не исчезнет сам, поэтому нам придётся бороться с ним стандартными методами."
 SOV_increase_online_censorship: "Усиление Онлайн-Цензуры"
 SOV_increase_online_censorship_desc: "В последнее время Роскомнадзор работает неэффективно. Блокировка Telegram не помогла, и многие западные агенты распространяют дезинформацию в других социальных сетях. Мы должны усовершенствовать нашу систему интернет-безопасности, чтобы правильно ее использовать.\nКстати, кажется, кто-то из молодых людей решил начать тренд и нарисовать наше агентство в виде милой девушки, забавно, не правда ли? Интересно, почему?"
 SOV_arrest_navalny: "Жесткие Меры"
 SOV_arrest_navalny_desc: "Поскольку большинство безобидных вариантов оказались неэффективными, похоже, только жесткие репрессии могут остановить оппозицию от раздирания нашей страны на части. Для их подавления будет задействован Омон.\nВ отличие от либеральных демократий, наши войска не используют резиновые пули и водометы, что ограничивает их эффективность. Но справедливость резиновой дубинки и металлического щита встретит каждого нарушителя!"
 SOV_combat_domestic_extremism: "Борьба с Внутренним Экстремизмом"
 SOV_combat_domestic_extremism_desc: ""
 SOV_arrest_troublesome_politicians: "Арестовать Проблемных Политиков"
 SOV_arrest_troublesome_politicians_desc: "К счастью, в партии КПРФ много "сомнительных" людей, с которыми мы можем иметь дело. Антивакцинаторы, сумасшедшие конспирологи и вообще антиправительственные диссиденты. Конечно, их меньшинство в левом движении, но они могут запятнать имидж коммунистической партии. И это важно."
 SOV_bribe_corrupt_cprf_officials: "Встретиться с Зюгановым"
 SOV_bribe_corrupt_cprf_officials_desc: "Лидер КПРФ - мудрый человек. Он близкий соратник нашего президента и ветеран политики, почти победивший Ельцина на выборах 1996 года. Однако Владимир Путин считает нужным провести межпартийные переговоры, и лично поговорить с Зюгановым."
 SOV_arrest_communist_extremists: "Арестовать Коммунистических экстремистов"
 SOV_arrest_communist_extremists_desc: "Ну что ж, пришло время заняться более мелкими левыми движениями. Хотя большинство из них практически не имеют влияния, и их можно игнорировать, некоторые личности представляют для нас угрозу. Пора нашим ребятам приниматься за работу!"
 SOV_calls_of_russian_unity: "Призывы к Русскому Единству"
 SOV_calls_of_russian_unity_desc: "Россиян осаждают западные однополярники! Они пытаются разорвать нас на части, ведь если мы объединимся против них, у них не будет шансов! В единстве - наша сила!"
 SOV_bribe_corrupt_ldpr_officials: "Встретиться с Жириновским"
 SOV_bribe_corrupt_ldpr_officials_desc: "Жириновского называют "клоуном" российской политики, но это далеко от истины. Он знает, как развивать свой бренд и партию, а его познания в геополитике и внутренних политических играх невозможно переоценить. Именно поэтому наш Великий Президент хочет поговорить с ним о будущем его партии. Мы надеемся, что он будет услышан."
 SOV_purge_problematic_oligarchs: "Чистка Проблемных Олигархов"
 SOV_purge_problematic_oligarchs_desc: "Нынешний правый мейнстрим, по большей части, финансируется олигархами. Проблема, однако, в том, что эти олигархи лояльны к нашей системе. Чтобы убедиться, что они остаются в строю, и оказать на них давление, и угодить им, мы можем арестовать "либеральных" олигархов, на которых заведены уголовные дела. Убийство двух зайцев одним выстрелом."
 SOV_arrest_fascist_extremists: "Арестовать Националистических Экстремистов"
 SOV_arrest_fascist_extremists_desc: "У нас уже есть достаточный опыт в борьбе с националистической нечистью, мечтающей подорвать доверие людей к правительству, так почему бы не использовать его снова и не предотвратить дальнейшее распространение этой заразы.\nМы ведь не хотим как на Украине?"
 SOV_utilize_communist_nostalgia: "Использовать Советскую Ностальгию"
 SOV_utilize_communist_nostalgia_desc: "СССР был нашим величайшим периодом в истории! Мы победили невозможное, бросили вызов Америке в борьбе за мировое господство и восстановили нашу страну из разрухи в индустриальную мощь. Мы должны беречь это прошлое."
 SOV_focus_on_corruption: "Сосредоточиться на Коррупции"
 SOV_focus_on_corruption_desc: "К сожалению, несмотря на все разговоры и позерство, проблема коррупции в нашей администрации остается самым большим препятствием для нашей страны. Она препятствует нашему социальному, военному, экономическому и культурному единству и наносит ущерб перспективам роста.\nБолее того, чтобы увеличивать экономическое производство России, мы должны сначала сосредоточиться на исправлении системы."
 SOV_sanction_proof_economy: "Экономика, Защищенная от Санкций"
 SOV_sanction_proof_economy_desc: "Хотя коррупция остается большой проблемой, основное беспокойство вызывает уязвимость нашей страны перед западными санкциями. Прошли годы с момента их введения, и местным бизнесменам кажется глупым бороться с западными корпорациями, все еще остающимися на наших рынках.\nНо что если выровнять условия и дать нашим капиталистам немного передышки... Может быть, даже западные производственные мощности могут стать нашими?"
 SOV_increase_public_transparency: "Повышение Общественной Прозрачности"
 SOV_increase_public_transparency_desc: "Главная проблема нашей системы - явное отсутствие прозрачности. Наши политики могут делать все, что им заблагорассудится, пока на них не светят фонари. И хотя это не должно нас беспокоить, очевидно, что некоторые используют это преимущество, чтобы скрывать от президента свои более... непривлекательные инициативы. Если общественность будет следить за тем, что делают наши политики, это пойдет на пользу всем участникам процесса."
 SOV_investigate_corrupt_parties: "Субсидировать Социальные Льготы"
 SOV_investigate_corrupt_parties_desc: "Платить рабочим хорошую зарплату всегда было как яд для наших предпринимателей. И хотя мы давно прошли те времена, когда олигархи использовали вооруженную силу для захвата заводов или убийства забастовщиков, ситуация с трудовыми правами остается под вопросом.  Мы должны улучшить социальные выплаты рабочему классу, ведь именно они обеспечивают функционирование нашей страны."
 SOV_restore_faith_in_government: "Восстановить Веру в Правительство"
 SOV_restore_faith_in_government_desc: "Пока нынешняя система находилась у власти, разница между мнением народа о правительстве не всегда была положительной. Многие бюрократы, считались коррумпированными, неэффективными и оторванными от простых людей. Но благодаря нынешним реформам ситуация, похоже, изменилась.\nВсё больше доверяют правительству и нашим бюрократам! Достижение, за которое стоит выпить!"
 SOV_enrich_mother_russia: "Обогатить Матушку Россию"
 SOV_enrich_mother_russia_desc: "К сожалению для нас, "золотые 00-е" не продлились вечно. Из-за снижения цен на нефть и введенных против нас санкций мы были вынуждены откладывать деньги в резервный фонд. Однако хранить деньги бессмысленно, если вы не хотите их использовать.\nИспользуя лишь малую часть этого резерва, а также наши связи с олигархами, мы можем поднять нашу экономику до больших высот."
 SOV_spread_anti_western_propaganda: "Распространить Антизападную Пропаганду"
 SOV_spread_anti_western_propaganda_desc: "Когда-то мы с нетерпением ждали своего восхождения на Запад. Мы думали, что сможем стать частью славной, христианской цивилизации. Но американцы нам отказали. Ведь в однополярном мире нет места гордой России... Ну что же, ладно, пора начать полноценную информационную войну против запада, как внутреннюю, так и внешнюю.\nИ нам даже не нужно распространять дезинформацию: просто продолжайте пичкать их всякой ерундой вроде острова Сент-Джеймс и культурных войн. Пусть сами разбираются в своих делах." 
 SOV_destabilize_the_west: "Увеличить Бюджет ФСБ"
 SOV_destabilize_the_west_desc: "ФСБ - это проверенный и верный метод защиты России от врагов. И за всю их тяжелую работу я бы сказал, что повышение трат на них вполне заслуженно."
 
 #Election Focuses
 SOV_new_revolution: "Новая Революция"
 SOV_new_revolution_desc: "Россия была родиной социалистического и коммунистического движения. Именно здесь возникло первое успешное коммунистическое государство, но оно было разрушено и продано за бесценок.\nМы должны восстать против этой несправедливости, ибо пролетариат должен быть освобожден!"
 SOV_remember_the_old_days: "Наше Советское Прошлое"
 SOV_remember_the_old_days_desc: "Мы - дети великой цивилизации. Той, что победила величайшее зло, противостояла капиталистическому гнету. Покорившей звезды и атом. Именно эту нацию мы будем восстанавливать. И это единственное доказательство, которое нам нужно, чтобы заявить о своей легитимности."
 SOV_cprf_is_your_party: "КПРФ - Твоя Партия!"
 SOV_cprf_is_your_party_desc: "Многие утверждали, что Коммунистическая партия Российской Федерации - это фикция, состоящая из оторванных от реальности стариков. Но именно мы являемся лидерами левого движения в России, и именно мы способны вернуть советскую славу, в отличие от всех остальных левых движений, состоящих из 10-20 человек. Мы - ваша партия, ибо у вас нет альтернативы!"
 SOV_promises_of_bread: "Фаворит "Умного Голосования""
 SOV_promises_of_bread_desc: "Хотя либеральная оппозиция - мерзкие американские подхалимы, их система "умного голосования" очень интересна. Учитывая, что мы - единственная мейнстримная партия, которую они могут поддержать, мы могли бы использовать это в своих интересах. И если эти ребята так ненавидят русский империализм и путинизм, что голосуют за восстановление СССР, это не наша проблема!"
 SOV_use_the_younger_base: "10 Шагов к Власти Народа"
 SOV_use_the_younger_base_desc: "Чтобы заручиться большей поддержкой, мы должны сделать наши идеалы легкими для восприятия и голосования. Для этого мы возьмем программу "10 Шагов к Власти Народа" и будем продвигать ее по всей стране. Народ должен знать, за что он голосует!"
 SOV_victory_day: "Верна Народу, Нужна Стране"
 SOV_victory_day_desc: "С момента создания нашей партии прошли десятилетия, но наши цели остались прежними. Однако с тех пор наша страна все больше и больше сползает на олигархический и проамериканский путь. Мы нужны стране, и мы готовы ответить на этот призыв."
 SOV_russian_destiny: "Русский Удел"
 SOV_russian_destiny_desc: "Во многих кругах Владимира Жириновского считали не более чем клоуном, но вот он здесь. Он тщательно готовился к такому моменту, имея рядом с собой верную партию. Пришло время возродить Россию, настоящую Россию. Больше никакого отмывания денег олигархов за границей. Никакой эрозии русской культуры. Россия вернется к своей славе раз и навсегда!"
 SOV_gain_church_support: "Заручиться Поддержкой Церкви"
 SOV_gain_church_support_desc: "Русская православная церковь всегда была краеугольным камнем нашей нации. Даже сейчас, в нашем светском обществе, она продолжает обладать значительной силой, пусть и в культурном плане. Их поддержка была бы крайне важна."
 SOV_maintain_status_quo: "За Суверенную Россию"
 SOV_maintain_status_quo_desc: "Чего еще может хотеть среднестатистический россиянин от своего президента? Преемника Путина, который уже имеет опыт работы у руля. Мечта Путина о многополярном устройстве, а также о суверенной демократии будет реализована, ведь наша победа не подлежит обсуждению!"
 SOV_gain_oligarchist_support: "Сплотить сторонников Путина"
 SOV_gain_oligarchist_support_desc: "К счастью, мы можем использовать базу поддержки нашего бывшего лидера для нашей кампании. Даже после его ухода его власть над страной сохраняется."
 SOV_send_aid_to_america: "Использовать Молодую Гвардию"
 SOV_send_aid_to_america_desc: "У нас есть идеальный ресурс для работы с молодежью в виде "Молодой гвардии", который мы непременно должны использовать для популяризации среди патриотически настроенной молодежи, потому что это может принести нам голоса избирателей."
 SOV_use_extreme_measures: "План Медведева"
 SOV_use_extreme_measures_desc: "Хотя Медведев был выбран Путиным, он не является его копией. Медведев обещает перемены, но не к своему первому сроку, а к свободе, о которой западные демократии и мечтать не могут. Верьте в его обещания, ведь он исполнит самое большое желание Путина: создаст по-настоящему суверенную демократию!"
 SOV_heir_to_strongman: "Наследник Сильной Руки"
 SOV_heir_to_strongman_desc: "Он преемник Путина.\nТот, кто поставил Грузию на колени.\nТот, кто обеспечит суверенитет России.\nЕго зовут Дмитрий Медведев, и он здесь, чтобы победить на выборах!"
 SOV_improve_ur_image: "Улучшить Имидж "Единой России""
 SOV_improve_ur_image_desc: "Несмотря на то, что мы являемся партией большинства, без Владимира Путина наша популярность упала. Нам пора представить четкую партийную программу и популяризировать наши идеи среди людей с помощью СМИ. Мы должны показать людям, что за нас стоит голосовать!"
 SOV_for_the_future: "За будущее"
 SOV_for_the_future_desc: ""
 SOV_reinvigorate_the_masses: "Воодушевить Массы"
 SOV_reinvigorate_the_masses_desc: ""
 SOV_promises_of_peace: "Обещания Мира"
 SOV_promises_of_peace_desc: ""
 SOV_anti_establishment_big_tent: "Широкий Фронт Против Статуса-КВО"
 SOV_anti_establishment_big_tent_desc: "Для победы над истеблишментом мы должны собрать все возможные голоса. К счастью, существует большая база антиистеблишментских групп всех мастей и размеров. Мы будем голосом тех, кого не слышат, тех, кто хочет видеть Россию без "Единой России"!"
 SOV_lashout_oligarchs: "Наброситься на олигархов"
 SOV_lashout_oligarchs_desc: ""
 SOV_promises_of_land: "Имперский Популизм"
 SOV_promises_of_land_desc: "Разве вы не помните, чего мы лишились? Нация славы, нация могущества. Миллионы наших братьев были отторгнуты от нас. Извращенные западным вырождением, превращенные в антироссийский оплот. Мы должны вернуть то, что принадлежит нам!"
 SOV_russophilic_propaganda: "Онлайн Кампании"
 SOV_russophilic_propaganda_desc: "Поскольку другие партии не видят потенциала Интернета, использование его в нашей кампании - несомненное решение. Благодаря популистским речам Жириновского и довольно молодой партии мы можем легко задействовать базу молодых избирателей. Все, что нам нужно сделать, - это сказать несколько красивых слов."
 SOV_attack_the_polls: "Пустить Агитпоезда ЛДПР"
 SOV_attack_the_polls_desc: "В отличие от других политических партий, наша более... активна. Кепки, статуэтки, тетради - у нас есть гигантское количество товаров, что распространяют наши идеи, и все они бесплатны! Давайте пустим агитпоезда, для распространения этих товаров и идей Жириновского, чтобы обеспечить нашу победу раз и навсегда!"
 
#Soviet Focus
 SOV_election_victory: "Победа на Выборах"
 SOV_election_victory_desc: "Революция наконец победила - не через штурм баррикад, а через избирательную урну. Никто не мог предсказать такого исхода, и все те, кто смеялись над КПРФ как над пережитком прошлого, теперь вынуждены смотреть в недоумении. Народ сделал свой выбор: будущее принадлежит социализму."
 SOV_glorify_stalin: "Возвеличить Сталина"
 SOV_glorify_stalin_desc: "Сталин - наша слава боевая,\nСталин - нашей юности полет.\nС песнями, борясь и побеждая,\nНаш народ за Сталиным идет."
 SOV_soviet_union_restoration_referendum: "Референдум о Восстановлении СССР"
 SOV_soviet_union_restoration_referendum_desc: "Несмотря на название референдум о восстановлении СССР - это скорее символический акт, который укрепит связь с нашим славным прошлым и подтвердит, что народ поддерживает возвращение великой советской державы. Хотя практического результата от этого действия никакого нет, так как оно проводится только на территории нашей страны, мы уже начинём вводить в документооборот священные четыре буквы "СССР", прокладывая путь к возрождению страны."
 SOV_restarting_state_bureaucracy: "Перезапустить Госаппарат"
 SOV_restarting_state_bureaucracy_desc: "От предыдущей власти нам досталась государственная структура, плохо приспособленная для строительства социалистической республики. Неэффективность, косность и бесформенность - не те качества, которые мы хотим видеть в системе госуправления.\nПоэтому КП РСФСР возьмёт на себя ответственность за проведение реформ. В ближайшее время будет реализована программа преобразований, с целью создать гибкий аппарат, который будет служить интересам народа, а не самому себе." #НЕ ТИМУР ПИСАЛ
 SOV_first_convocation: "Первый Созыв"
 SOV_first_convocation_desc: "Выборы в новый Советский Парламент - это шаг, который определит будущее страны. Приготовления к первому созыву уже начались, и партия обещает, что эти выборы будут свободными и справедливыми. Народ сам выберет своих представителей, и именно они станут голосом нового социалистического строя. Совсем скоро Советская Россия обретёт парламент, который будет защищать интересы трудящихся!"
 SOV_draft_new_constitution: "Новая Конституция"
 SOV_draft_new_constitution_desc: "Действующая Конституция России совершенно не отражает представлений партии о том, как должна быть устроена наша страна. Этот документ не отвечает интересам народа и, по сути, своим существованием блокирует проведение необходимых преобразований.\nПоэтому мы в срочном порядке поставим вопрос о разработке и принятии нового основного закона. За основу будущей Конституции будет взят её проверенный советский вариант, адаптированный к современным вызовам и закрепляющий социалистический путь развития." #НЕ ТИМУР ПИСАЛ
 SOV_interparty_dialog: "Межпартийный Диалог"
 SOV_interparty_dialog_desc: "Хотя Коммунистическая партия и является ведущей политической силой страны, ряд легальных партий и объединений также пользуется поддержкой народа. Открыто враждовать с ними было бы ошибкой - это лишь подрывает наш авторитет в глазах общества. Гораздо разумнее будет попытаться наладить сотрудничество, чтобы снизить напряжённость и объединить страну для решения общих задач."  #НЕ ТИМУР ПИСАЛ
 SOV_reform_of_security_forces: "Реформа Силовых Структур"
 SOV_reform_of_security_forces_desc: "Нынешняя структура госбезопасности России - не более чем пережиток прошлого. Не самые удачные реформы, хроническое недофинансирование и кадровый голод привели силовые ведомства в не самое лучшее состояние.\nВ условиях растущего внутреннего сопротивления нам жизненно необходимо провести обширное реформирование органов безопасности. Нужно не просто вернуть им былую славу, а создать современную, эффективную систему, способную защитить интересы страны и граждан." #НЕ ТИМУР ПИСАЛ
 SOV_bastion_of_antifascism: "Бастион Антифашизма"
 SOV_bastion_of_antifascism_desc: "Мы не позволим фашистскому отродью укрепиться в нашей стране в этот тяжёлый час. Пусть все будут знать: мы воевали, воюем и будем воевать со всеми, кто посмеет поддерживать эти человеконенавистнические идеи. Эта чума будет выкорчевана с самого корня, чтобы дальше народ мог жить в мире и согласии.\nФашизм не пройдёт!"#НЕ ТИМУР ПИСАЛ
 SOV_agitprop: "Агитпроп"
 SOV_agitprop_desc: "Агитпроп, или, если говорить развёрнуто, агитация и пропаганда, зародился вместе с Советским Союзом и на протяжении всей его истории поддерживал в сердцах граждан уверенность в завтрашнем дне.\nСегодня, когда нам нужно доказать народу состоятельность нашего курса, мы запускаем масштабные агитационные кампании - как на улицах, так и в интернете. Мы должны чётко и ясно показать людям наши цели и ценности, разъяснить, к какому будущему мы ведём страну и почему наш путь - единственно верный." #НЕ ТИМУР ПИСАЛ
 SOV_party_vanguard: "Партийный Авангард"
 SOV_party_vanguard_desc: "Роль партии в жизни страны гораздо значительнее, чем может показаться на первый взгляд. Именно партия задаёт верный идеологический курс, служит народным проводником и является символом прогресса государства.\nПартия действует исключительно для страны и для народа - иного смысла в её работе нет. Её сила - в единстве с народом, в способности слышать его просьбы и преобразовывать их в конкретные решения." #НЕ ТИМУР ПИСАЛ
 SOV_strengthening_party_discipline: "Укрепить Партийную Дисциплину"
 SOV_strengthening_party_discipline_desc: "После утверждения власти Коммунистической партии нам предстоит укрепить единство и выработать программную линию. Каждый партиец должен понимать и разделять наши общие цели. Сейчас не время для внутренних разногласий - тем более в период, когда мы продолжаем консолидировать силы. Нам нужна дисциплина чтобы донести наши идеи до народа и вместе двигаться вперёд." #НЕ ТИМУР ПИСАЛ
 SOV_great_reconciliation: "Великое Примирение"
 SOV_great_reconciliation_desc: "Хотя мы не подвергаем сомнению исторический авторитет Сталина, некоторые ошибки того периода необходимо признать. Речь идет о несправедливых репрессиях против многих заслуженных большевиков, чьё видение развития Союза лишь незначительно расходилось со сталинским.\nМы должны воздавать должное не только политикам, близким к Сталину, но и тем, кто имел собственную позицию и внёс значительный вклад в развитие страны. Наша история многогранна, и извлечь уроки мы можем как из побед, так и из трагических ошибок." #НЕ ТИМУР ПИСАЛ
 SOV_reestablishing_higher_party_school: "Воссоздать Высшую Партийную Школу"
 SOV_reestablishing_higher_party_school_desc: "В своё время советская Высшая партийная школа подготовила тысячи талантливых кадров для КПСС и работников СМИ. Её выпускники работали в каждой области и в каждом регионе, что укрепляло идеологическое единство и эффективность управления.\nСейчас, когда мы продолжаем возрождать многие советские практики, необходимо восстановить и эту систему подготовки кадров. Такая организация должна не просто обеспечивать госаппарат кадрами, но и воспитывать по настоящему умелых управленцев, преданных делу социализма." #НЕ ТИМУР ПИСАЛ
 SOV_xix_party_congress: "Провести Партийный Съезд"
 SOV_xix_party_congress_desc: "Коммунистическая партия находится у власти уже достаточно долго, и все необходимые первые шаги были сделаны. Теперь, когда наша позиция окончательно укрепилась, настало время провести съезд и определить дальнейший курс.\nНам предстоит выполнить ключевые цели: решить вопрос руководства, которое поведёт партию вперёд, и утвердить чёткую программу действий на ближайшие годы." #НЕ ТИМУР ПИСАЛ
 SOV_continue_party_rejuvenation: "Продолжить Омоложение Партии"
 SOV_continue_party_rejuvenation_desc: "Омоложение Партии - это залог её будущего! Молодые кадры, полные энтузиазма и решимости, придадут новое дыхание КПРФ. Мы должны продолжать этот процесс, привлекая к управлению всё больше молодых коммунистов, которые будут готовы вести страну в будущее, не отступая от идеалов социализма."
 SOV_new_lenin_enrollment: "Новый Ленинский Призыв"
 SOV_new_lenin_enrollment_desc: "Как сто лет назад, партия нуждается в новом поколении приверженных людей, готовых посвятить себя строительству социализма. Мы объявляем новый призыв, вдохновлённый ленинскими традициями, чтобы привлечь молодых и активных граждан в наши ряды. Это - шанс для каждого участвовать в великом деле."
 #рашкин
 SOV_voice_of_the_streets: "Голос Улиц"
 SOV_voice_of_the_streets_desc: "У КП РСФСР, как и любой партии, есть две стороны: партийный аппарат и активисты. Долгое время именно заведующие кабинетами были главной силой в партии, оставляя в тени тех, кто своим трудом делал жизнь граждан лучше и параллельно боролся с несправедливостью в российской системе посредством митингов и прочих форм протеста.\nНо это время ушло. Председателем ЦК стал Рашкин, и теперь активисты становятся звёздами на номенклатурном небосклоне, сменяя старые, одряхлевшие кадры.\nВалерий Рашкин - голос тех, кто прямо сейчас делает нашу Родину лучше, на местах!" #НЕ ТИМУР ПИСАЛ
 SOV_shakeup_of_the_state: "Перетряхнуть Бюрократов"
 SOV_shakeup_of_the_state_desc: "Наша бюрократия полна старых, неэффективных аппаратчиков. Вместо того, чтобы помогать народу, они устроились в своих кабинетах и почивают на лаврах победы коммунизма, при этом ничего не сделав для неё.\nТоварищ Рашкин очистит партию и государство от прохиндеев! Дорогу молодым, энергичным ленинцам!" #НЕ ТИМУР ПИСАЛ
 SOV_symbol_of_change: "Символ Перемен"
 SOV_symbol_of_change_desc: "Валерий Рашкин в путинское время был известен своей крайней, даже по меркам КПРФ, оппозиционностью к власти. Списки Рашкина, депутатский запрос по расследованию ФБК в отношении Медведева - всё это и более показывает его приверженность идеям свободы.\nКак пел классик: "Перемен требуют наши сердца" - Россия имеет шанс измениться как не бывало за более чем 30 лет к лучшему. России нужны изменения - и Рашкин с его командой только рады послужить ей!" #НЕ ТИМУР ПИСАЛ
 SOV_party_mobilization: "Партийная Мобилизация"
 SOV_party_mobilization_desc: "Многие внутри нашей страны считают, что "Компартия - пристанище дедов и старух, ностальгирующих по СССР". И хоть данное мнение небезосновательно, но с данной репутацией "партии пенсионеров" необходимо бороться.\nПолные сил комсомольцы займут свое достойное место у руля новой власти, как в ленинские годы возьмут на себя рычаги управления. Вперёд, молодые строители коммунизма!" #НЕ ТИМУР ПИСАЛ
 SOV_rally_the_people: "Сплотить Народ"
 SOV_rally_the_people_desc: "Наша страна стоит на пороге большого конфликта, крупнейшего со времен Великой Отечественной. В такие неоднозначные времена всему многонациональному народу нашей страны необходимо сплотиться, дабы выстоять предстоящую бурю. От мала до велика, богатые и бедные, рабочие и офисные сотрудники - мы должны быть едины! Под Ленинским знаменем, во имя нашего прошлого и будущего, миллионов плечи прижмутся друг к другу!" #НЕ ТИМУР ПИСАЛ
 SOV_rightful_heir: "Законный Наследник"
 SOV_rightful_heir_desc: "Положение Рашкина и его команды внутри партии на данный момент довольно шаткое. Противодействие со стороны более "аппаратного" крыла КП РСФСР подрывает единство партии, что не идёт на пользу легитимности нашей власти.\nНеобходимо напомнить всем, что Рашкин был законно избран на голосовании, и пойти на... некоторые компромиссы с нашими товарищами. Единство превыше всего!" #НЕ ТИМУР ПИСАЛ
 SOV_back_to_revolutionary_roots: "Назад к Революционным Корням"
 SOV_back_to_revolutionary_roots_desc: "Октябрьская революция стала результатом действий единой большевистской партии, во главе с вождём пролетариата Владимиром Ильичом Лениным, подчинённая общей линии партии. Именно в партийной дисциплине и сокрыт успех Красного Октября.\nСейчас нам и не хватает этой самой дисциплины: внутри партии плетутся различные междоусобицы и заговоры с целью пошатнуть положение Рашкина. Денис Парфёнов с его бескомпромиссностью в деле социалистической борьбы может помочь в деле укрепления партийной структуры и возвращении утраченного духа революционности!" #НЕ ТИМУР ПИСАЛ
 SOV_pragmatic_approach: "Прагматичный Подход"
 SOV_pragmatic_approach_desc: "Внутри команды Рашкина есть множество идей: уклониться в сторону демократизации или в сторону партийной дисциплины и ортодоксальности - но и текущий, вполне прагматичный курс развития советского государства не является чем-то ужасным. Наоборот, он нам оставляет множество пространства для манёвра внутри партийного и государственного аппарата.\nНарод жаждет стабильности, процветания - и почему бы не использовать опыт Сергея Левченко для укрепления нашего развития?" #НЕ ТИМУР ПИСАЛ
 SOV_reinvent_democracy: "Переизобрести Демократию"
 SOV_reinvent_democracy_desc: "Советский эксперимент начинался очень красиво: "вся власть - Советам!", обещания народной власти, Ленин провозглашающий новую, по-настоящему народную власть. Но, к сожалению, после смерти Ильича власть взял в свои ежовые рукавицы Сталин, а затем - партийная номенклатура, оторванная от народных масс. В конечном итоге данное непонимание изменения обстановки в стране привело к тому, что когда ко власти пришел Горбачёв, было уже поздно.\nДемократические идеи прямо вшиты в саму ткань социализма, и было бы разумно усилять демократизацию Советов. Борис Юльевич Кагарлицкий является отличным кандидатом на роль мозгового центра преобразования нашей системы!" #НЕ ТИМУР ПИСАЛ
 SOV_mobilize_the_youth: "Советский Ренессанс"
 SOV_mobilize_the_youth_desc: "Великие мастера советского искусства, такие как Маяковский и Татлин, вдохновляли людей на создание нового мира. Их дух снова оживает в нашем времени. Мы возродим советскую культуру, объединив творцов, чтобы создать новое, передовое искусство для социалистического будущего. Время нового Советского Авангарда настало!"
 #объединеине
 SOV_window_to_europe: "Окно в Европу"
 SOV_window_to_europe_desc: "Великие идеи не знают границ, и наше окно в Европу снова открывается! Рабочие и коммунистические партии Восточной Европы смотрят на нас с надеждой. Время возрождать забытые связи, объединять народы против натовской агрессии! Вместе мы готовы к любым испытаниям, вместе мы сокрушим империалистов!"
 SOV_new_union_of_russia_and_belarus: "Новый Союз России и Беларуси"
 SOV_new_union_of_russia_and_belarus_desc: "Союз России и Беларуси становится реальностью. Этот шаг не просто символический - это реальное движение к восстановлению великой страны. Объединение двух народов под единым флагом РСФСР - важный этап на пути к возрождению советского единства и мощи."
 SOV_tbilisi_declaration: "Тбилисская Декларация"
 SOV_tbilisi_declaration_desc: "Мы должны расширить свое влияние в странах Закавказья. Если они не согласятся добровольно присоединиться к СССР, мы будем использовать нашу военную мощь, чтобы добиться этого."
 SOV_tashkent_agreement: "Ташкентские Соглашения"
 SOV_tashkent_agreement_desc: "Мы пригласим страны Центральной Азии обратно в наш союз и примем их как братьев и сестер. Если они откажутся присоединиться к нам добровольно, тогда мы применим силу, чтобы подчинить их своей власти."
 SOV_soviet_moldova: "Молдовские Манёвры"
 SOV_soviet_moldova_desc: "Мы должны добиться того, чтобы все территории, ранее управлявшиеся Молдавской Советской Социалистической Республикой, вновь полностью вошли в состав СССР и были готовы вместе с нами сражаться против любого врага."
 SOV_prepare_to_march_west: "Подготовиться к Маршу на Запад"
 SOV_prepare_to_march_west_desc: "Мы видим, как силы империализма вновь пытаются навязать свою волю народам мира. Западные державы Европы, одержимые жаждой власти и богатства, готовятся посягнуть на нашу свободу и независимость. Они забыли уроки прошлого, но мы помним. Мы помним героизм наших предков, которые сломили хребет фашизму и отстояли независимость нашей Родины. Нас ждёт новый виток истории, в котором мы должны встать на защиту нашего суверенитета, наших идеалов и нашего будущего. Надвигающийся конфликт с Европой неизбежен, и мы должны быть готовы встретить его во всеоружии."
 SOV_operation_little_saturn: "ОПЕРАЦИЯ: §YМАЛЫЙ САТУРН§!"
 SOV_operation_little_saturn_desc: "Сила против силы, броня против брони, огонь против огня\n\nСегодня мы стоим на пороге исторического момента. Перед нами стоит задача освободить братский народ Украины от оков неонацизма и западного влияния. Мы идём, чтобы принести мир и порядок, чтобы восстановить справедливость и вернуть Украине её истинную свободу. Это не просто битва за территорию, это битва за наши общие идеалы, за наше будущее и будущее наших детей. Мы знаем, что НАТО, альянс, стремящийся к мировому господству, может попытаться встать у нас на пути, но мы к этому готовы. Пусть враги знают, что нас не сломить. Мы идём, чтобы победить."
 #зюганов
 SOV_collective_leadership: "Коллективное Руководство"
 SOV_collective_leadership_desc: "Очевидно, что один человек не может править в одиночку. Учитывая быстрые изменения, которые нам все еще предстоит осуществить, нам нужно как можно больше опыта. Мы не можем ссориться между собой и бороться за контроль над государством. Стабильный круг доверенных лиц обеспечит плавный переход власти." #НЕ ТИМУР ПИСАЛ
 SOV_role_of_personality: "Роль Личности"
 SOV_role_of_personality_desc: "Несмотря на то, что культ личности в СССР подвергался критике, и не без оснований, нельзя сказать, что в нем не было необходимости. С нашим новым мандатом на управление мы также должны привнести атмосферу авторитета и силы. Народ не поддержит безымянный комитет, ему нужен человек, олицетворяющий государство, великий отец. Вот почему к такой роли нужно тщательно готовиться и подбирать кандидатов." #НЕ ТИМУР ПИСАЛ
 SOV_effective_bureaucracy: "Эффективная Бюрократия"
 SOV_effective_bureaucracy_desc: "В условиях нынешних трудностей, связанных с реструктуризацией, мы должны обеспечить, чтобы наши кадры были способны справиться с возложенной на них ответственностью. Они не могут оставаться простыми исполнителями, но и не могут оставаться неподвижными и инертными. Они должны быть эффективными и умными, готовыми решать любые возникающие проблемы. Мы должны расширить бюрократические тренинги, чтобы обеспечить это." #НЕ ТИМУР ПИСАЛ
 SOV_rally_the_people_zyuganov: "Сплотить Народ"
 SOV_rally_the_people_zyuganov_desc: "Социализм наконец-то восстановлен, но наш народ по-прежнему разделен. Почти два поколения выросли без сияющей звезды, без примера, к которому можно стремиться. Мы должны направить население, которое мы объединили, на наше дело, чтобы красная звезда сияла ярко!" #НЕ ТИМУР ПИСАЛ
 SOV_reliance_on_apparatus: "Опора на Аппарат"
 SOV_reliance_on_apparatus_desc: "После нашей победы и возрождения СССР мы должны позаботиться о том, чтобы на воссоединенных землях все шло гладко. К сожалению, это означает, что мы будем обходиться теми, кто у нас есть. Соберите как можно больше сочувствующих на освобожденных землях и используйте имеющиеся у нас кадры РСФСР, чтобы поддержать их. Предстоит проделать еще много работы, и эти люди станут первопроходцами нашего проекта." #НЕ ТИМУР ПИСАЛ
 SOV_dialogue_with_grassroots: "Диалог с Низами"
 SOV_dialogue_with_grassroots_desc: "Несмотря на то, что наш Советский Эксперимент только что получил прочную основу, очевидно, что мы не сможем реализовать его сверху донизу. Чтобы по-настоящему возродить дух того, что было когда-то, мы должны поддержать идеологически настроенную часть нашего населения, которая хочет помочь нам в реализации нашего видения. Именно с их напором и увлеченностью мы сможем завершить то, что начали." #НЕ ТИМУР ПИСАЛ
 SOV_creative_marxism: "Творческий Марксизм"
 SOV_creative_marxism_desc: "СССР когда-то был крупным игроком на культурной мировой арене. Хотя советские кинематографисты и карикатуристы не были такими известными, как Голливуд, они придерживались высоких стандартов. Мы должны вновь разжечь огонь страсти в сердцах наших людей и изменить себя в глазах всего мира. Мы должны показать им, что мы вернулись и что социалистический эксперимент далек от завершения!" #НЕ ТИМУР ПИСАЛ
 SOV_renewed_program: "Обновлённая Программа"
 SOV_renewed_program_desc: "Учитывая текущие проблемы, мы также должны убедиться, что наша программа не отстает от времени. Мы используем существовавшие правовые рамки и изменение их в соответствии со временем." #НЕ ТИМУР ПИСАЛ
 SOV_course_continuation: "Продолжение Курса"
 SOV_course_continuation_desc: "Прошло 30 лет тьмы. Но должны ли звезды гаснуть и во время темных веков? НЕТ! Потому что есть люди, которые хранят их в своих сердцах, в своей душе. И когда пришло время, мы вернули ночному небу его красоту. Ибо "Красная звезда" пережила гораздо худшее и продолжит терпеть еще больше!" #НЕ ТИМУР ПИСАЛ
 #афонин
 SOV_cohesion_before_challenges: "Сплочённость Перед Вызовами"
 SOV_cohesion_before_challenges_desc: "Во время нашего последнего партийного съезда мы убедились, что, мягко говоря, не все члены нашей партии поддерживают курс, который мы наметили на дальнейшие годы. Исходя из прошлого советской Родины, мы обязаны принять эту ситуацию во внимание и начать необходимые меры для её решения. Конечно, оппозиция и часть членов нашей собственной партии будут этому не очень рады, но между мнением меньшинства и защитой большинства мы, очевидно, выберем второе." #НЕ ТИМУР ПИСАЛ
 SOV_intra_party_consensus: "Внутрипартийный Консенсус"
 SOV_intra_party_consensus_desc: "Худшее явление политических партий и объединений в целом - это фракционность, которую мы обязаны не допускать ни при каких условиях. Вместо того чтобы гнобить и подавлять реформаторство в партии, мы постараемся, наоборот, пойти им навстречу. Мы проведём несколько реформ в нашем правительстве, а также будем поощрять новаторство и самоуправление для обеспечения солидарности мнений внутри нашей партии." #НЕ ТИМУР ПИСАЛ
 SOV_voice_of_the_party: "Голос Партии"
 SOV_voice_of_the_party_desc: "Партия - спинной хребет рабочего класса,\nПартия - бессмертие нашего дела,\nПартия - единственное, что мне не изменит,\nСегодня приказчик, а завтра царства стираю в карте я!" #НЕ ТИМУР ПИСАЛ
 SOV_cadres_decide_everything: "Кадры Решают Всё!"
 SOV_cadres_decide_everything_desc: "Есть множество причин, по которым распался Союз, однако одна из главных - это недобросовестные депутаты. Множество членов советского правительства находились там по связям и были неумелыми в своем собственном деле. Мы учтём ошибки прошлого и начнём продвигать в правительство тех, кто действительно хочет, а главное - сумеет помочь нашей советской Родине расцвести больше прежнего!" #НЕ ТИМУР ПИСАЛ
 SOV_effective_bureaucracy_afonin: "Эффективная Бюрократия"
 SOV_effective_bureaucracy_afonin_desc: "Раздутая бюрократия стала настоящим символом застоя в Советском Союзе и высмеивалась даже государственными СМИ. Чтобы не допустить такого же застоя во второй раз, нам необходимо заранее предпринять действия, направленные против бюрократии. Мы отменим лишние документы, сократим избыточные согласования - сделаем всё, чтобы облегчить бюрократическую машину нашего государства." #НЕ ТИМУР ПИСАЛ
 SOV_socialist_pluralism: "Социалистический Плюрализм"
 SOV_socialist_pluralism_desc: "По какой-то причине, даже после длительного времени нахождения нашего правительства у власти, в стране всё ещё находятся люди, саботирующие наши действия. Чтобы показать людям то, что КП РСФСР действительно выступает за их интересы, мы пойдём на диалог с оппозиционными партиями и постараемся найти компромисс по самым насущным вопросам, что беспокоят наших граждан сильнее всего." #НЕ ТИМУР ПИСАЛ
 SOV_guarantor_of_stability: "Гарант Стабильности"
 SOV_guarantor_of_stability_desc: "Наша партия предлагает людям не только социальное равенство, но и стабильную жизнь. У каждого гражданина лишь по праву рождения в обязательном порядке будут бесплатное образование и медицина, работа, квартира, машина, оплачиваемый отпуск, большая пенсия, а в самой стране будет минимальный уровень бедности и преступности. Каждый житель нашей Родины будет уверен в завтрашнем дне!" #НЕ ТИМУР ПИСАЛ
 SOV_new_public_dialogue: "Новый Общественный Диалог"
 SOV_new_public_dialogue_desc: "Если мы хотим по-настоящему успешное и совершенно новое советское государство, нам необходимо отказаться от практик прошлого и сосредоточиться не на сомнительной стабильности, а на прогрессе и развитии. Разве "стабильность" привела нас к коммунизму? Разве стагнация помогла нашей экономике? Нет! Для того чтобы СССР XXI века стал величайшей державой на Земле, мы должны избавиться от старой и дряхлой системы и выстроить новую - по-настоящему народно-ориентированную!"
 #экономика
 SOV_10_steps_to_good_life: "10 Шагов к Достойной Жизни"
 SOV_10_steps_to_good_life_desc: "Наша программа, разработанная много лет назад, наконец-то готова к воплощению. Эти шаги направлены на улучшение условий жизни, повышение доходов и социальную защиту граждан. Спустя столько времени, мы можем позаботиться о народе, показав на деле эффективность нашей команды!"
 SOV_people_are_master_of_the_country: "Народ - Хозяин Страны"
 SOV_people_are_master_of_the_country_desc: "Природные ресурсы должны принадлежать народу. Мы проведём окончательную национализацию нефти, газа и других богатств нашей земли, чтобы доходы от них шли на благо всех граждан."
 SOV_people_are_main_value_of_the_state: "Люди - Главная Ценность Державы"
 SOV_people_are_main_value_of_the_state_desc: "Самое важное в любом обществе - это благополучие его жителей. Вот почему так важно заботиться о тех, кто не в состоянии работать, например, о пожилых людях и инвалидах. Настало время продемонстрировать нашу преданность народу. Мы увеличим зарплаты и пенсии, чтобы каждый гражданин почувствовал поддержку государства."
 SOV_strategic_regulation: "Стратегическое Регулирование"
 SOV_strategic_regulation_desc: "Рыночная экономика в целом демонстрирует эффективность и в основном удовлетворяет нашим интересам. Однако ни одна экономическая система не идеальна. Именно поэтому мы начинаем проводить политику разумного государственного вмешательства, чтобы обеспечить стабильность, устойчивый рост и задать верный вектор развития.\nБлестящим примером работы такой модели служит Китай, который сумел стать одним из мировых экономических лидеров. Их пример показывает, что сочетание рыночных механизмов с стратегическим регулированием позволяет достигать впечатляющих результатов."
 SOV_new_gosplan: "Новый Госплан"
 SOV_new_gosplan_desc: "В старом Союзе существовал такой орган, как Госплан, также известный как Государственный плановый комитет Совета Министров СССР. Его главной функцией был контроль за выполнением народнохозяйственных планов. На протяжении всего существования Советского Союза комитет показывал себя достаточно эффективным в вопросах управления экономикой.\nСегодня, когда советские методы вновь становятся актуальными, вопрос о восстановлении Госплана обязательно должен быть поднят. Его принципы централизованного планирования могли бы помочь в решении крупных государственных задач и обеспечить стратегическую стабильность." #НЕ ТИМУР ПИСАЛ
 SOV_cult_of_reindustrialization: "Культ Реиндустриализации"
 SOV_cult_of_reindustrialization_desc: "Одним из первых крупных достижений советской власти стала молниеносная индустриализация, которая исправно служила на благо народа на протяжении десятилетий. Однако после распада Союза промышленный комплекс пришёл в упадок, и многие предприятия попросту прекратили своё существование.\nИменно поэтому сегодня нам необходимо наверстать упущенное и полностью восстановить промышленный потенциал, утраченный в лихие 90-е. Для этого требуется твёрдая политическая воля и концентрация большого количества национальных ресурсов, чтобы вновь сделать нашу промышленность опорой развития." #НЕ ТИМУР ПИСАЛ
 SOV_red_environmentalism: "Красный Экологизм"
 SOV_red_environmentalism_desc: "Наша страна вступает в новую эпоху - эпоху, когда состояние окружающей среды значит для нас неизмеримо больше, чем в конце XX века. Да, промышленность должна работать, индустрию не отменить, но именно поэтому нам стоит перенять китайский опыт. Китай наглядно демонстрирует, как можно оставаться «Фабрикой мира», не отказываясь от масштабных экологических программ. \nВ этом и заключается сила социалистической экономики - она способна сочетать промышленную мощь с заботой о природе. Наша система планового хозяйства идеально подходит для реализации долгосрочных «зелёных» стратегий, превращая экологию в новый приоритет развития." #НЕ ТИМУР ПИСАЛ
 SOV_small_business_support: "Поддержка Малого Бизнеса"
 SOV_small_business_support_desc: "Мы понимаем важность малого бизнеса для экономики, и, несмотря на наши социалистические убеждения, оставлять его без поддержки было бы ошибкой. Мы обеспечим помощь и защиту малым предприятиям, создавая условия для их роста и стабильности. Это никак не противоречит нашим принципам, ведь успешный бизнес - это стабильные рабочие места и налоги в казну."
 SOV_new_industrial_policy: "Новая Промышленная Политика"
 SOV_new_industrial_policy_desc: "Первые результаты реиндустриализации наглядно демонстрируют успех нашего промышленного курса. Это доказывает, что мы движемся в верном направлении, и теперь необходимо увеличить усилия.\nПоэтому мы объявляем главным экономическим приоритетом ускоренную индустриализацию. Нам предстоит масштабно обновить производственные мощности, сделать ставку на современные технологии и подготовить кадры для новой промышленности. Чем быстрее мы достигнем нового промышленного пика, тем прочнее будет экономический суверенитет страны и тем выше станет благосостояние каждого гражданина."
 SOV_revival_of_soviet_science: "Возрождение Советской Науки"
 SOV_revival_of_soviet_science_desc: "В СССР существовал настоящий культ науки и технологического прогресса. Советские учёные славились на весь мир своими прорывными достижениями. В своё время всё человечество знало русское слово «спутник», а миллионы людей вдохновлялись нашими успехами и сами стремились к свершениям.\nМы не должны терять эту славную традицию. Именно поэтому сегодня нам необходимо возродить дух советской науки после долгих лет забвения, вернув ей былой престиж и государственную поддержку. Только так мы сможем воспитать новое поколение исследователей, способных повторить и превзойти подвиги наших предшественников." #НЕ ТИМУР ПИСАЛ
 SOV_join_BRI: "Один Пояс и Один Путь"
 SOV_join_BRI_desc: "Международная инициатива "Один пояс и один путь" открывает для нас новые возможности. Мы усилим участие в этом проекте, который соединяет Азию, Европу и Африку. Инвестиции в инфраструктуру и торговые маршруты принесут выгоду нашей экономике и укрепят связи с Китаем."
 SOV_reinstate_comecon: "АДГ-СЭВ"
 SOV_reinstate_comecon_desc: "Воссоздание Совета Экономической Взаимопомощи (СЭВ) в рамках Ассоциации Демократических Государств (АДГ) - укрепит наши позиции на мировой арене. Этот союз поможет наладить торговлю, обмен ресурсами и совместное развитие с союзниками, разделяющими наши цели и ценности. Возвращение к координированной экономике - путь к прогрессу."
 SOV_consolidation_of_unions: "Консолидация Профсоюзов"
 SOV_consolidation_of_unions_desc: "Защита прав трудящихся - один из главных тезисов социализма. Именно для этого и существуют профсоюзы - организации, которые защищают работников от произвола нанимателей и следят за соблюдением трудовых норм.\nВ СССР эту функцию выполнял единый профсоюз. Сейчас нам предстоит решить, как адаптировать этот проверенный подход к современным реалиям, сохранив его главную цель - надёжную защиту человека труда." #НЕ ТИМУР ПИСАЛ
 SOV_agrarian_renaissance: "Аграрный Ренессанс"
 SOV_agrarian_renaissance_desc: "Сельское хозяйство всегда было одной из ключевых отраслей экономики, и в Советском Союзе ему уделяли особое внимание. Мы не собираемся отставать от этих славных традиций и возьмёмся за возрождение аграрного сектора России, чтобы вернуть ему образцовый вид.\nВедь хлеб - всему голова! Мы сделаем ставку на современные агротехнологии, поддержку фермеров и восстановление сельских территорий. Так мы достигнем настоящей продовольственной независимости и достойно продолжим дело наших предшественников." #НЕ ТИМУР ПИСАЛ
 SOV_energy_development: "Развитие Энергетики"
 SOV_energy_development_desc: "Стремительную электрификацию Союза в 20-30-е годы прошлого века до сих пор называют одним из самых амбициозных проектов большевиков. Легендарный план ГОЭЛРО навсегда вписан в учебники истории как пример величайшего подвига.\nСегодня нам предстоит повторить этот успех. Мы должны обеспечить стабильным электричеством каждый уголок страны, особенно в условиях бурного роста промышленности. Для этого потребуется модернизировать энергосети и активно внедрять новые, в том числе возобновляемые, источники энергии. Так мы сможем заложить надёжный фундамент для будущего развития страны."
 SOV_moscow_beijing_agreement: "Московско-Пекинское Соглашение"
 SOV_moscow_beijing_agreement_desc: "Наши отношения с Китаем всегда были важны, и теперь настало время укрепить их окончательно. Мы заключим новое соглашение, которое усилит наше экономическое и политическое сотрудничество. Это позволит нам избежать прежних разногласий и сделать отношения с Китаем ещё более стабильными и продуктивными."
 SOV_alterglobalism: "Альтерглобализм"
 SOV_alterglobalism_desc: "Последние десятилетия глобальный капитализм продолжает наращивать своё влияние, отбирая последнее у и без того обездоленных народов. С этой несправедливостью необходимо покончить, и у нас есть план - предложить миру альтернативу. Мы выступаем за социалистическую глобализацию, основанную на принципах дружбы, взаимопомощи и равноправного сотрудничества.\nМы докажем, что процветание одного народа не должно строиться на эксплуатации другого, и вместе построим мир, где ценность человека будет выше прибыли."
 SOV_economic_sovereignty: "Экономический Суверенитет"
 SOV_economic_sovereignty_desc: "В нынешних условиях зависимость от экспорта нефти и газа в Европу становится рискованной. Мы начнем постепенно сокращать поставки энергоресурсов на Запад, чтобы защитить нашу экономику от внешних угроз. Вместо этого мы используем эти ресурсы для развития собственных производств!"
 SOV_peoples_control: "Народный Контроль"
 SOV_peoples_control_desc: "Суть социализма - во власти народа. Причём не только в политике, но и в экономике. Труд человека должен служить на благо всех людей, а не обогащению кучки олигархов в их дворцах. Именно поэтому народ имеет право напрямую влиять на развитие своей страны. Это означает реальный рабочий контроль на предприятиях и честное распределение доходов. Когда экономика принадлежит трудящимся, их благосостояние становится истинным символом прогресса."
 SOV_new_methods_of_fighting_corruption: "Новые Методы Борьбы с Коррупцией"
 SOV_new_methods_of_fighting_corruption_desc: "Коррупция - главный враг справедливого общества. Мы внедрим современные технологии, такие как искусственный интеллект и система Zero Trust, чтобы усилить контроль и прозрачность на всех уровнях управления. Эти новые методы позволят нам начать по-новому бороться с этим пороком нашего общества и хотя бы частично обеспечить честное управление."
 
 
 SOV_release_political_prisoners: "Освободить Политзаключённых"
 SOV_release_political_prisoners_desc: "С приходом новой власти перед правительством встаёт вопрос - кого считать политическими заключёнными? Среди них есть жертвы репрессий режима, но и те, кто угрожает новому порядку. Решение необходимо принять: освободить всех или провести тщательную проверку, чтобы определить, кто действительно достоин свободы."
 SOV_other_parties_issue: "Вопрос Других Партий"
 SOV_other_parties_issue_desc: "После разгрома "Единой России" перед КПРФ стоит задача: как поступить с остальными политическими силами? Их будущее неопределённо. Одни предлагают полную ликвидацию оппозиции, другие считают, что нужна постепенная их интеграция в социалистическую систему. Дебаты продолжаются, и судьба других партий висит на волоске."
 SOV_new_soviet_parliament: "Новый Советский Парламент"
 SOV_new_soviet_parliament_desc: "Государственная Дума в её нынешнем виде отслужила своё. КПРФ объявляет о скором роспуске этого пережитка прошлого вместе с Советом Федерации, уничтожая всё Федеральное Собрание целиком. Народ вскоре выберет своих представителей в новый советский парламент, по-настоящему демократический - будь то Верховный Совет или Съезд Народных Депутатов. Какой орган станет основой для нового социалистического государства - решать Партии."
 SOV_restore_the_1977_constitution: "Восстановить Конституцию 1978 Года"
 SOV_restore_the_1977_constitution_desc: "Конституция 1978 года вновь возвращается как символ народной власти и справедливости! Зюгановцы консолидируют силы, и на последнем заседании Государственной Думы восстанавливают этот легендарный документ, вернув Россию к истинным социалистическим основам. Конечно, с учётом современных реалий, были внесены важные поправки, но суть остаётся неизменной - это Конституция для народа, от народа и ради народа!"
 SOV_old_guard_focus: "Воссоздать Парт-Государство"
 SOV_old_guard_focus_desc: "Какой бы демократической ни была новая Советская Россия, все должны чётко понимать: социалистическое государство - это государство коммунистов! Власть в руках партии - гарантия стабильности и справедливости. Партия будет работать для народа, но её позиции нерушимы. Власть не отдаётся, она служит как крепость для будущего социализма!"
 SOV_cooperate_with_the_church: "Сотрудничать с Церковью"
 SOV_cooperate_with_the_church_desc: "Мы учимся на ошибках прошлого. Сегодняшние коммунисты знают: верность традициям и уважение к религиозным убеждениям нашего народа - ключ к прочному единству. Церковь, как хранительница культурного наследия, становится нашим верным союзником. Вместе мы поведём народ к светлому будущему, опираясь не только на прогресс, но и на духовные ценности!"
 SOV_operation_suvorov: "ОПЕРАЦИЯ: §YРОКОССОВСКИЙ§!"
 SOV_operation_suvorov_desc: "После того, как НАТО вмешалось в конфликт, у нас не осталось выбора. Мы активируем высокосекретный план по устранению угроз в Польше и Прибалтике. Эта операция станет решающим шагом в борьбе за нашу безопасность и восстановление советского влияния в регионе!"
 SOV_mobilize_the_national_guard: "Мобилизовать Национальную Гвардию"
 SOV_mobilize_the_national_guard_desc: "Пришло время активировать нашу Национальную Гвардию. Эти храбрые защитники готовы встать на защиту родины и обеспечивать порядок на освобождённых территориях. Их сила и решимость будут важным звеном в нашем стремлении к победе!"
 SOV_mobilize_the_airforce: "Мобилизовать Военно-Воздушные Силы"
 SOV_mobilize_the_airforce_desc: "Каждая единица нашей авиации важна для победы. Даже старые самолёты могут стать решающим фактором в битве. Мы мобилизуем наши Военно-Воздушные Силы, чтобы обеспечить господство в небе и поддержать наземные операции!" 
 SOV_operation_polar_star: "ОПЕРАЦИЯ: §YПОЛЯРНАЯ ЗВЕЗДА§!"
 SOV_operation_polar_star_desc: "СРАЖАЙТЕСЬ! ЭТО ПОСЛЕДНИЙ РЫВОК К БУДАПЕШТУ И ВАРШАВЕ!"
 SOV_enshrine_democratic_centralism: "Закрепить Демократический Централизм"
 SOV_enshrine_democratic_centralism_desc: "Демократический централизм - это стержень нашей партии и нашего государства. Решения принимаются коллегиально, но выполняются безукоризненно. Это гарантия эффективного управления и защиты от хаоса. Единство в действиях, твёрдость в решениях и дисциплина - вот наши принципы!"
 SOV_empower_the_premier: "Усилить Премьер-Министра"
 SOV_empower_the_premier_desc: "В новом социалистическом государстве премьер-министр - ключевая фигура в управлении. Его роль должна быть усилена, чтобы обеспечить оперативное и сильное руководство страной. Мы укрепим власть премьер-министра, чтобы он мог быстро и решительно вести страну к социалистическим преобразованиям и успехам!"
 SOV_protect_russian_minorities: "Защитить Русский Народ"
 SOV_protect_russian_minorities_desc: "Мы обязаны защищать наш народ, где бы он ни находился. Русскоязычные граждане за рубежом не должны чувствовать себя брошенными! Особое внимание будет уделено Украине и её восточным республикам, ЛНР и ДНР. Секретная поддержка обеспечит их уверенность в том, что они не забыты и их будущее - в единой дружной семье братских народов."
 SOV_29th_soviet_congress: "Первый Созыв"
 SOV_29th_soviet_congress_desc: "Выборы в новый Советский Парламент - это шаг, который определит будущее страны. Приготовления к первому созыву уже начались, и партия обещает, что эти выборы будут свободными и справедливыми. Народ сам выберет своих представителей, и именно они станут голосом нового социалистического строя. Совсем скоро Советская Россия обретёт парламент, который будет защищать интересы трудящихся!"
 SOV_soviet_union_restoration_referendum: "Референдум о Восстановлении СССР"
 SOV_soviet_union_restoration_referendum_desc: "Несмотря на название референдум о восстановлении СССР - это скорее символический акт, который укрепит связь с нашим славным прошлым и подтвердит, что народ поддерживает возвращение великой советской державы. Хотя практического результата от этого действия никакого нет, так как оно проводится только на территории нашей страны, мы уже начинём вводить в документооборот священные четыре буквы "СССР", прокладывая путь к возрождению страны."
 SOV_integrate_belarus_into_rsfsr: "Интеграция Беларуси в РСФСР"
 SOV_integrate_belarus_into_rsfsr_desc: "Союз России и Беларуси становится реальностью. Этот шаг не просто символический - это реальное движение к восстановлению великой страны. Объединение двух народов под единым флагом РСФСР - важный этап на пути к возрождению советского единства и мощи."
 SOV_invite_upc_cpsu_members: "Пригласить членов ОДКБ в СССР"
 SOV_invite_upc_cpsu_members_desc: "Наши союзники из ОДКБ должны увидеть, что советская система - это путь к процветанию и справедливости. Пришло время предложить им реорганизовать свои правительства по нашему образцу и присоединиться к возрождённому СССР. Вместе мы создадим новый союз народов, основанный на братстве и социализме!"
 SOV_operation_minerva: "Операция "Минерва""
 SOV_operation_minerva_desc: "Мы должны расширить свое влияние в странах Закавказья. Если они не согласятся добровольно присоединиться к СССР, мы будем использовать нашу военную мощь, чтобы добиться этого."
 SOV_operation_invictus: "Операция "Инвиктус""
 SOV_operation_invictus_desc: "Мы пригласим страны Центральной Азии обратно в наш союз и примем их как братьев и сестер. Если они откажутся присоединиться к нам добровольно, тогда мы применим силу, чтобы подчинить их своей власти."
 SOV_operation_little_saturn: "ОПЕРАЦИЯ: §YМАЛЫЙ САТУРН§!"
 SOV_operation_little_saturn_desc: "Сила против силы, броня против брони, огонь против огня\n\nСегодня мы стоим на пороге исторического момента. Перед нами стоит задача освободить братский народ Украины от оков неонацизма и западного влияния. Мы идём, чтобы принести мир и порядок, чтобы восстановить справедливость и вернуть Украине её истинную свободу. Это не просто битва за территорию, это битва за наши общие идеалы, за наше будущее и будущее наших детей. Мы знаем, что НАТО, альянс, стремящийся к мировому господству, может попытаться встать у нас на пути, но мы к этому готовы. Пусть враги знают, что нас не сломить. Мы идём, чтобы победить."
 SOV_draft_new_constitution: "Разработать Новую Конституцию"
 SOV_draft_new_constitution_desc: "Группа Рашкина, совершив тихий переворот внутри партии, взяла власть в свои руки и представила новую, радикальную конституцию. Демократический централизм доказал свою силу: несмотря на возмущение некоторых коммунистов, большинство Партии приняло этот факт. Новая конституция станет основой для современного социалистического государства, где народ будет стоять в центре всех реформ!"
 SOV_new_komsomol: "Продолжить Омоложение Партии"
 SOV_new_komsomol_desc: "Омоложение Партии - это залог её будущего! Молодые кадры, полные энтузиазма и решимости, придадут новое дыхание КПРФ. Мы должны продолжать этот процесс, привлекая к управлению всё больше молодых коммунистов, которые будут готовы вести страну в будущее, не отступая от идеалов социализма."
 SOV_ban_the_church: "Ослабить Влияние Церкви"
 SOV_ban_the_church_desc: "Хотя мы не имеем ничего против веры, мы должны задаться вопросом: какую роль играла Церковь в прошлом? Служа предыдущему режиму, она стала инструментом подавления и угодничества высшим классам. Пришло время ослабить её влияние, чтобы она больше не могла вмешиваться в дела государства и народа."
 SOV_socialism_with_human_face: "Социализм с Человеческим Лицом"
 SOV_socialism_with_human_face_desc: "Мы не забыли о Горбачёве и его предательстве, он предал наши ценности и продал наш народ Западу. Но 80-е - это не только его ошибки, это время, когда люди верили в светлое будущее. Мы не станем повторять прошлых ошибок, но вернём этот дух надежды и справедливости. Настоящий социализм с человеческим лицом защитит каждого, и Партия сделает всё, чтобы это будущее стало реальностью."
 SOV_lenin_cult: "Культ Ленина"
 SOV_lenin_cult_desc: "Ленин - символ борьбы за свободу и равенство, отец Октябрьской революции, которая привела к созданию свободной и демократической Советской России. Его идеи о социальной справедливости и равенстве остаются актуальными и сегодня.\n\nЛенин несомненно является одним из величайших руководителей в истории России. Он провозгласил право наций на самоопределение, установил равенство полов, боролся за трудовые права и создал основы советской демократии.\n\nТеперь, когда мы, коммунисты, вновь у власти, мы обязаны возродить культ Ленина и его идеалы. Мы должны пропагандировать его уникальные качества лидера, его преданность делу построения социализма и его бескорыстную любовь к Родине."
 SOV_empower_congress_of_soviets: "Советам - Полновластие!"
 SOV_empower_congress_of_soviets_desc: "Настало время вернуть настоящую власть советам! Советская демократия, где власть принадлежит народу через его избранные советы, снова станет основой нашего государства."
 SOV_mobilize_the_youth: "Советский Ренессанс"
 SOV_mobilize_the_youth_desc: "Великие мастера советского искусства, такие как Маяковский и Татлин, вдохновляли людей на создание нового мира. Их дух снова оживает в нашем времени. Мы возродим советскую культуру, объединив творцов, чтобы создать новое, передовое искусство для социалистического будущего. Время нового Советского Авангарда настало!"
 SOV_create_ADS: "Ассоциация Демократических Государств"
 SOV_create_ADS_desc: "Ассоциация Демократических Государств - это предлагаемая межправительственная экономико-политическая организация, которая будет выступать в качестве форума для сотрудничества социалистических государств по всему миру, вдохновленная такими группами, как Коминтерн и СЭВ. На протяжении десятилетий эти страны так и не смогли объединиться против капиталистической угрозы, нависшей над их странами, и были вынуждены самостоятельно бороться с теми, кто хотел бы посягнуть на их образ жизни. Для того чтобы пролетариат поднялся из руин и одержал победу над своими угнетателями, ситуация должна измениться, и именно мы должны стать инициаторами таких перемен. Переговоры с дипломатами из Венесуэлы, Кубы и Беларуси завершены, и буржуазия всего мира в страхе дрожит перед нашим единством."
 SOV_support_new_pink_red_tide: "Поддержать Новую Красно-Розовую Волну"
 SOV_support_new_pink_red_tide_desc: "С конца 1920-х годов идеи социализма всегда были предметом интереса в латиноамериканской политике, будь то жесткие марксисты-ленинцы, троцкисты или социал-демократы. Такие люди, как Сальвадор Альенде, Фидель Кастро, Че Гевара и Даниэль Ортега, сформировали коммунистическое движение в регионе, и их влияние сохраняется до сих пор. К сожалению, идеи Маркса не смогли процветать в Южной и Центральной Америке из-за одной страны - Соединенных Штатов. Было ясно, что Америка и Центральное разведывательное управление сделают все, чтобы остановить распространение социализма в Латинской Америке, - от финансирования геноцидных диктаторов, антиправительственных партизан до жестоких наркокартелей. Теперь, когда Соединенных Штатов нет на свете, народы Латинской Америки могут наконец разорвать сковывающие их цепи, и мы должны помочь им в их социалистическом пробуждении, насколько это возможно."
 SOV_african_socialism: "Африканский Социализм"
 SOV_african_socialism_desc: "Чтобы узнать о многочисленных случаях колониальных репрессий и порабощения, вызванных капиталистами Европы, не нужно искать дальше Африки. После почти столетия грабежа и мародерства, которые закончились только потому, что африканский народ поднял оружие против своих повелителей, европейские державы все еще сохраняют свое присутствие на континенте. Такие страны, как Франция, эксплуатируют ресурсы и труд стран Западной Африки, доходя до создания искусственных федераций, чтобы сохранить свою удушающую власть. Любой лидер, который осмелится выступить против их неоколониализма, будет уничтожен путем государственного переворота, смерти при "неизвестных обстоятельствах" или откровенного политического убийства. Если мы хотим добиться успеха в реализации нашего видения, мы должны обезопасить Африку от наших противников, развивая социалистические движения."
 SOV_our_american_comrades: "Наши Американские Товарищи"
 SOV_our_american_comrades_desc: "Когда-то Соединенные Штаты Америки были единственной мировой сверхдержавой, которой не было равных. Сфера их влияния простиралась от Восточной Азии до Северной Америки и Европы. Для русских Америка была воплощением всего плохого в мире. Они продвигали капиталистическое вырождение по всему миру, отравляли страны своими идеалами и десятилетиями угрожали самому ядру русской цивилизации. Так было до тех пор, пока один вирус не смог разрушить всё строение, заставив многих поразиться тому, насколько хрупкой на самом деле была американская политическая система. Теперь, когда они рухнули под собственным весом, мы должны обратить внимание на тех, кто извлекает максимальную пользу из своего положения; на рабочих, которые доблестно восстали против своих повелителей, которые борются за свободу. Мы пошлем им столько помощи, сколько сможем, чтобы убедиться, что, если Америка снова поднимется, они будут участвовать в глобальной борьбе."
 SOV_red_east: "Красный Восток"
 SOV_red_east_desc: "Начиная с китайской революции председателя Мао Цзэдуна в 1940-х годах, Восточная Азия всегда была очагом социалистических движений, давшим дорогу многим великим теоретикам и строителям наций. Их собственные, отличные друг от друга версии социализма сохранились до наших дней, а в Восточной Азии находятся некоторые из последних оставшихся социалистических стран, такие как КНДР, Китайская Народная Республика и Вьетнам. Позитивные отношения нашей партии с КПК и китайскими товарищами являются центральным пунктом нашей идеологии, и если мы хотим, чтобы глобальное социалистическое движение одержало победу, мы должны и дальше укреплять наше присутствие в Восточной Азии и строить отношения с наиболее процветающими социалистическими странами современности."
 SOV_special_military_operation_cprf: "Специальная Военная Операция"
 SOV_special_military_operation_cprf_desc: "Дальше терпеть украинский неонацизм невозможно. Мы знаем, что киевские власти готовят планы по уничтожению Донбасса, и наш долг - предотвратить эту трагедию. Превентивный удар станет нашим ответом, чтобы защитить русский народ и не позволить врагу осуществить свои замыслы!" 
 SOV_sway_ukrainian_workers: "Повлиять на Украинских Рабочих"
 SOV_sway_ukrainian_workers_desc: "Украинский народ должен знать правду: Советская Армия пришла не как захватчик, а как освободитель. Эта операция тщательно спланирована, мы стремимся избегать любых гражданских жертв. Мы обращаемся к украинским рабочим: Советская Россия - ваш друг, а наша цель - избавить Украину от гнёта неонацизма!"
 SOV_operation_red_dnepr: "ОПЕРАЦИЯ: §YКРАСНЫЙ ДНЕПР§!"
 SOV_operation_red_dnepr_desc: "В этой борьбе мы должны победить любой ценой. Даже если это принесёт страдания мирному населению, мы не остановимся, пока украинский неонацизм не будет уничтожен. Операция "Красный Днепр" - решающий удар, который приведёт нас к победе!"
 SOV_resovietization: "Ресоветизация"
 SOV_resovietization_desc: "Украина - это не просто земля, это часть великой советской истории. Мы напомним народу о славном красном прошлом, когда рабочие и крестьяне были хозяевами своей судьбы. Это восстановление справедливости, возвращение народа к идеалам социализма!"
 SOV_restoring_soviet_republic: "Восстановление Советской Республики"
 SOV_restoring_soviet_republic_desc: "На освобождённых территориях Донбасса и других областей пришло время восстановить гражданскую администрацию. Мы создадим новую советскую республику, которая станет оплотом социализма в регионе и примером для всего мира."
 SOV_exterminate_banderite_fascism: "Смерть Бандеровскому Фашизму"
 SOV_exterminate_banderite_fascism_desc: "Украинский фашизм, укрывающийся под знаменем Бандеры, должен быть полностью уничтожен. Мы не оставим ни одного следа от этой идеологии, чтобы Украина снова стала свободной от гнёта национализма и фашизма!"
 SOV_ukrainian_red_army: "Украинская Красная Армия"
 SOV_ukrainian_red_army_desc: "Мы должны собрать боевые подразделения из местных коллаборантов, готовых бороться за свободу и социализм. Украинская Красная Армия станет силой, которая будет сражаться за освобождение своей страны."
 SOV_expand_communist_resistance: "Коммунистическое Сопротивление"
 SOV_expand_communist_resistance_desc: "Гнев народа Украины против нынешнего режима - это наша возможность. Мы будем использовать это недовольство для создания мощного партизанского движения на территории, контролируемой врагом. Коммунистическое Сопротивление станет ударной силой в борьбе за освобождение Украины!"
 SOV_war_on_home_front: "Война в Тылу"
 SOV_war_on_home_front_desc: "Мощные военные усилия требуют ресурсов и производственной мощи. Партия и государство должны гарантировать, что наши заводы работают с максимальной эффективностью, обеспечивая фронт всем необходимым. Мы мобилизуем экономику для победы!"
 SOV_rally_the_population: "Сплотить Население"
 SOV_rally_the_population_desc: "Народ должен знать, против кого мы сражаемся! Мы укрепим единство общества, разъясняя истинные цели нашей борьбы. Сплочённый народ - это наша сила, и только вместе мы сможем одержать победу!"
 SOV_no_step_back: "Ни Шагу Назад!"
 SOV_no_step_back_desc: "Грозный клич прошлого вновь обретает своё значение в этом конфликте. Мы не позволим врагу продвинуться вперёд ни на шаг! Каждый должен быть готов стоять до конца за нашу родину и идеалы социализма!"
 SOV_heros_of_frontline: "Герои Фронта"
 SOV_heros_of_frontline_desc: "Наши герои на фронте - это символы мужества и самопожертвования. Мы обязаны поддерживать их и рассказывать о их подвигах народу. Эти герои - наше всё, и их история вдохновит каждого на борьбу за победу!"
 SOV_reconcile_loyal_oligarchs: "Воспользоваться связями"
 SOV_reconcile_loyal_oligarchs_desc: "Санкции, наложенные капиталистическими странами, являются серьезной проблемой. Чтобы преодолеть их, мы должны обратиться к лояльным олигархам и попросить их о помощи. Мы должны показать этим людям, что у них есть место в новом советском обществе и что их богатство и власть могут быть использованы во благо. Мы должны создать новые отношения, основанные на взаимном уважении и сотрудничестве, чтобы вместе строить лучший мир."
 SOV_invite_new_socialism: "Пригласить За Новый Социализм"
 SOV_invite_new_socialism_desc: "Николай Платошкин и его движение "За Новый Социализм" внесли огромный вклад в развитие левых идей в стране. Его опыт и идеи помогут нам двигаться дальше. Мы предложим ему ключевой пост в правительстве, где его знания и политическая сила будут работать на благо народа."
 SOV_invite_left_front: "Пригласить Левый фронт"
 SOV_invite_left_front_desc: "Сергей Удальцов и Левый Фронт доказали свою приверженность делу социальной справедливости и революционных преобразований. Мы пригласим их в правительство, чтобы усилить наши ряды опытными и преданными сторонниками. Их идеи помогут продвинуть наше дело."
 SOV_grant_greater_ssr_autonomy: "Новый Ленинский Призыв"
 SOV_grant_greater_ssr_autonomy_desc: "Как сто лет назад, партия нуждается в новом поколении приверженных людей, готовых посвятить себя строительству социализма. Мы объявляем новый призыв, вдохновлённый ленинскими традициями, чтобы привлечь молодых и активных граждан в наши ряды. Это - шанс для каждого участвовать в великом деле."
 SOV_restore_local_cultures: "Щит и Меч Революции"
 SOV_restore_local_cultures_desc: "Для защиты государства и партии необходимо создать новый орган безопасности, который будет верен только нам. Мы сформируем новое КГБ из проверенных кадров, которые никогда не предадут идеалы революции. Пусть его эффективность не сравнится с ФСБ, но лояльность важнее всего!"
 SOV_increase_fsb_budget: "ФСБ - КГБ"
 SOV_increase_fsb_budget_desc: "Для возвращения легендарного КГБ требуется сила и опыт тех, кто служил в органах безопасности. Мы будем использовать лучшие кадры ФСБ, чтобы восстановить эту мощную структуру, способную эффективно защитить социалистическое государство. Новая эпоха требует старой преданности делу и умения действовать решительно!"
 SOV_restore_ties_with_european_socialists: "Окно в Европу"
 SOV_restore_ties_with_european_socialists_desc: "Великие идеи не знают границ, и наше окно в Европу снова открывается! Рабочие и коммунистические партии Восточной Европы смотрят на нас с надеждой. Время возрождать забытые связи, объединять народы против натовской агрессии! Вместе мы готовы к любым испытаниям, вместе мы сокрушим империалистов!"
 SOV_soviet_victory: "Победа!"
 SOV_soviet_victory_desc: "Победа - это больше, чем слово, это триумф нашей великой Родины! Советская Россия, объединив силы братских народов, разбила вражеские армии Украины и НАТО! Мы снова собрали под красным знаменем все республики СССР, и мир видит: социализм непобедим! Это новая эра нашего могучего Союза, возвращённого из пепла!"
 SOV_new_union: "Новый Союз"
 SOV_new_union_desc: "Мы восстановили Советский Союз, но это только начало! Настало время сплести наши экономики и силы в единое целое. Плавная интеграция наших республик приведёт к невиданным высотам развития. Новый Союз станет маяком для всех народов, кто мечтает о свободе и справедливости! Вместе мы сметём старый мир и построим новый!"
 SOV_new_treaty: "Новый Договор"
 SOV_new_treaty_desc: "ОДКБ больше не служит интересам нашего времени, его место займёт новый щит социализма - Организация Минского договора! Это наш ответ на угрозы с Запада! СССР и верные нам социалистические государства Восточной Европы создадут мощный союз, перед которым дрогнут все враги. Мы снова докажем миру, что единство социалистических стран не сокрушить!"
 SOV_convene_council_ministers: "Созвать Совет Министров"
 SOV_convene_council_ministers_desc: ""
 SOV_new_union_ruble: "Новый Союзный Рубль"
 SOV_new_union_ruble_desc: "С воссоединением Союза настало время окончательно объединить нашу экономику братских народов. Несмотря на широкое использование российского рубля на территории всей страны, валюты других республик всё ещё встречаются в обороте. Проведение масштабной денежной реформы уже просто необходимо шаг для укрепления общей финансовой системы. Новый Союзный Рубль уберёт эту неразбериху и станет символом нашей единой державы, подчёркивая неразрывность экономических и социальных связей."
 SOV_revive_cpsu: "Возродить КПСС"
 SOV_revive_cpsu_desc: ""
 SOV_unify_armed_forces: "Объединить Вооружённые Силы"
 SOV_unify_armed_forces_desc: ""
 SOV_economic_integration_republics: "Экономическая Интеграция Республик"
 SOV_economic_integration_republics_desc: ""
 SOV_union_constitution: "Принять Союзную Конституцию"
 SOV_union_constitution_desc: ""
 SOV_border_consolidation: "Укрепление Рубежей"
 SOV_border_consolidation_desc: ""
 SOV_european_reconstruction: "Европейская Реконструкция"
 SOV_european_reconstruction_desc: ""
 SOV_new_historical_community: "Институционализация Парт-Государства"
 SOV_new_historical_community_desc: ""
 SOV_national_front_ussr: "Национальный Фронт СССР"
 SOV_national_front_ussr_desc: ""
 SOV_keep_things_as_it_is: "Оставить Всё, Как Есть"
 SOV_keep_things_as_it_is_desc: ""
 SOV_help_in_rebuild: "Помощь в Восстановлении"
 SOV_help_in_rebuild_desc: "Восточная Европа истекала кровью в войне с НАТО, но теперь, под нашим знаменем, она встанет из руин! Мы протянем руку братским народам, восстанавливая города, заводы и дороги. Эта помощь - не просто акт солидарности, это укрепление нашего общего дела! Вместе с нами они построят мир, где царит справедливость и равенство. Наша мощь возродит их!"
 SOV_crush_the_parasites: "Раздавить Паразитов"
 SOV_crush_the_parasites_desc: "Время милосердия прошло! Восточная Европа ждёт освобождения от последних остатков фашистской заразы. Мы протянем руку нашим братьям и поможем раздавить паразитов, скрывающихся в тенях старого мира. Запад пал, его идеалы мертвы, и те, кто мечтает о возрождении этого чудовища, не найдут в нас пощады! Ни шагу назад - с нами весь мир будущего!"
 SOV_rebuild_western_ssrs: "Восстановление Западных ССР"
 SOV_rebuild_western_ssrs_desc: "Руины войны не остановят нас! Мы восстанавливаем Западные Советские Республики, оживляя их после натовских бомбардировок. Заводы снова запустятся, дороги засияют, и трудовой народ вернёт свои дома. Это не просто восстановление - это перерождение наших республиканских братьев, ставших сильнее под красным знаменем!"
 SOV_destroy_separatism: "Уничтожить Сепаратизм"
 SOV_destroy_separatism_desc: "Национальные сепаратисты, мечтающие подорвать наше единство, не найдут места в новом СССР! Их мечты о расколе будут уничтожены железной волей народа. Украина и Прибалтика вновь станут неразделимой частью Союза, как было и будет всегда. Мы не допустим повторения ошибок прошлого, ибо единство - наша сила!"
 SOV_renewed_federation: "Обновлённая Федерация"
 SOV_renewed_federation_desc: "Новый Союз должен быть справедливым, и все его народы получат равные права! Мы создадим настоящую федерацию, где каждый субъект будет равноправным участником великого социалистического проекта. От Москвы до самых границ - никакого притеснения, никакого неравенства! Только равенство даст нам ту силу, которая поведёт нас в будущее!"
 SOV_centralize_power_ussr: "Централизовать Власть"
 SOV_centralize_power_ussr_desc: "Сильное государство нуждается в сильной власти! Мы сосредоточим все рычаги управления в центре, чтобы ни один регион не мог стать угрозой для общего дела. Централизованное управление обеспечит контроль и стабильность, и только так мы сможем идти вперёд, сметая всё на своём пути! Власть в одних руках - ключ к победе социализма!"
 SOV_enemies_in_the_west: "Враги на Западе"
 SOV_enemies_in_the_west_desc: "Победив НАТО, мы уничтожили западный неолиберализм, но теперь на его месте поднялись куда более опасные силы - настоящие фашисты и радикальные националисты! Эти силы жаждут реванша и ни перед чем не остановятся. Мы не можем расслабляться! Наши границы под угрозой, и новый конфликт с Западом неизбежен. Враги на Западе должны знать: мы готовы встретить их с железной волей и несокрушимой мощью!"
 SOV_friends_in_the_east: "Друзья на Востоке"
 SOV_friends_in_the_east_desc: "Мир на Востоке находится на пороге великого конфликта. Китай, наш брат по духу и идеалам, зовёт нас в свою борьбу за новое мировое устройство. Но стоит ли нам вступить в этот водоворот или сохранить нейтралитет ради будущего наших республик? Мы должны принять решение, ведь от него зависит судьба не только России, но и всей Азии. Кто наш истинный союзник в этом великом противостоянии?"
 SOV_proletarian_internationalism: "Пролетарский Интернационализм"
 SOV_proletarian_internationalism_desc: "Пролетарии всех стран, объединяйтесь! Этот лозунг никогда не терял актуальности, и сегодня, когда огонь революций разгорается по всему миру, мы снова станем центром мировой борьбы за права рабочего класса. Наш интернационализм - это не просто идея, это наш долг перед угнетёнными и трудящимися всех стран! Мы поддержим социалистические движения на каждом континенте, потому что их победа - это наша победа. Лишь объединённый пролетариат может окончательно сокрушить капиталистическую тиранию!"
 SOV_our_common_homeland: "Наша Общая Родина"
 SOV_our_common_homeland_desc: "Советский Союз возродился, но его моральные устои остались неизменными! Мы - единый народ, связанный общей историей, культурой и стремлением к светлому будущему. Нас не смогут разделить ни границы, ни войны, ни идеологические барьеры. Наша общая Родина - это не просто союз республик, это символ непобедимого духа и единства народов. Мы вместе стоим на пороге новой эры, где справедливость и братство торжествуют над разделением и ненавистью!"
 SOV_political_integration: "Политическая Интеграция"
 SOV_political_integration_desc: "Наши союзники в Восточной Европе должны идти с нами в ногу! Только полная политическая интеграция, единая линия и общие цели обеспечат истинное единство социалистического лагеря. Мы должны стать единым кулаком, готовым противостоять любым угрозам! Без разногласий и внутренних противоречий, мы будем двигаться вперёд, как единая сила, которая сметёт остатки капитализма с лица земли!"
 SOV_free_interpretation_of_socialism: "Свободная трактовка Социализма"
 SOV_free_interpretation_of_socialism_desc: "Каждая страна имеет право на свой путь к социализму. Разнообразие подходов не должно быть слабостью, а напротив - силой нашего движения! Пусть каждая республика строит социализм так, как считает нужным, сохраняя свою независимость. Разные пути ведут к одной цели - свободному и справедливому обществу! Мы позволим союзникам идти своим путём, ведь в этом - свобода социализма!"
 SOV_first_soviet_election: "Первые Союзные Выборы"
 SOV_first_soviet_election_desc: "Исторический момент настал - первые выборы руководителя нового СССР! Это событие станет символом того, что народ - истинный хозяин страны. Социализм - это не только сильная экономика и великая армия, но и власть народа. Миллионы граждан будут выбирать того, кто поведёт Союз вперёд, к светлому будущему! Первые выборы станут началом новой демократической эпохи, где каждая республика будет услышана!"

 #leader desc
 SOV_VLADIMIR_PUTIN_DESC:0 "Владимир Владимирович Путин пробирался к власти не по типичной лестнице, ведущей к власти, а по тайным лестницам и закоулкам разведывательного сообщества. Он начал свою карьеру в рядах КГБ, проведя последнее десятилетие существования Советского Союза, помогая Штази в Восточной Германии. Когда Союз распался, он занялся политикой в недавно переименованном городе Санкт-Петербурге и увидел стремительный взлет во время правления Бориса Ельцина. Он получил поддержку Ельцина на выборах 2000 года и легко набрал большинство голосов. С тех пор он не покидал Кремль.На протяжении последних двух десятилетий Путин оставался у власти благодаря сочетанию народной поддержки, конституционных лазеек и тщательного контроля над оппозицией. Когда в 2008 году он достиг предела в два срока подряд, его бывший премьер-министр и близкий союзник Дмитрий Медведев был президентом на один срок, в то время как Путин сам стал премьер-министром. Затем Путин вернулся на президентский пост в 2012 году. За время своей администрации он пережил множество кризисов, от борьбы с чеченскими партизанами до поддержки пророссийских повстанческих государств на востоке Украины, и каждый раз выходил из них сильнее.\n\nНо значительная часть российской общественности искренне наслаждается правлением Путина, видя в нем человека, который вывел их из бурной эпохи Ельцина и помог восстановить положение России среди мировых держав. Но не вся его поддержка является органичной. Его последующие выборы сопровождались обвинениями в фальсификации результатов голосования, а антиправительственные протесты сопровождались жесткими репрессиями. Лидеры оппозиции внутри страны и за рубежом, как правило, подвергаются слежке, преследованиям, арестам или умирают при подозрительных обстоятельствах. Все это посылает один четкий сигнал: Владимир Путин считает, что у него есть народный мандат на правление, и он не планирует отказываться от него в ближайшее время."
 SOV_ALEXANDR_DUGIN_DESC:0 "Александр Гелевич Дугин родился в интеллектуальной семье, избалованной советским правительством, он, однако, быстро разочаровался в поздней коммунистической бюрократии, как и многие его сверстники, он искал другого видения мира, но в то время как многие вступали в подпольные "истинно марксистские клубы", Дугин начал свое философское изучение с "Темного ордена СС" и труды европейских новых правых, вытесняя их работами Новых левых. Оттуда он начал увлекаться мистикой, познакомившись со многими подпольными теоретиками мистики, как кирстианскими, так и мусульманскими.\n\nПосле распада СССР Александр Гелевич понял, что независимо от того, сколько недостатков было у коммунизма, это уберегло его от истинного ужаса - капитализма. Он присоединился к национал-большевикам, поскольку они обещали объединить все старое и породить новое, Дугин вырос, чтобы стать постоянным членом этой партии, а его эзотерические знания помогли заложить основы НБП. После 2000-х годов он расстался с Лимоновым и начал создавать свое собственное движение, опираясь на идеи интегралистов-традиционалистов и евразийцев. Все исследования Дугина переросли в его собственное детище - Четвертую политическую теорию.\n\nЧасто называемый "Самым опасным философом в мире" и получивший прозвище "Кремлевский гуру" от западных разжигателей страха, Александр Гелевич на самом деле никогда не был близок ни к одному из мест официальной власти. До сих пор. После позорного поражения Дугин понял, что его призывы к более сильному противодействию и единству в мыслях остались без внимания предыдущих государственных деятелей. Но теперь они ушли. Александр Дугин, пришедший к власти в результате переворота офицеров-евразийцев, теперь несет огромную ответственность за воплощение своего философского видения в реальность - мечту о свержении нынешнего мирового порядка, проведении бурной метафизической, геополитической революции."
 SOV_DMITRY_MEDVEDEV_DESC:0 "Уроженец Ленинграда, Дмитрий Анатольевич Медведев сделал карьеру в тени более влиятельных фигур, взбираясь на олимп российской политики не только благодаря своему необычному для политика образу, но и преданности Владимиру Путину. Он начал свою профессиональную деятельность как юрист и преподаватель, но вскоре оказался в окружении Путина, работая с ним в мэрии Санкт-Петербурга. В 2000-х годах он быстро продвигался по служебной лестнице, возглавив администрацию президента, а затем заняв пост вице-премьера. В 2008 году, в связи с конституционными ограничениями, Путин был вынужден покинуть пост президента, и Медведев был выбран его преемником. Он без труда выиграл выборы, однако многие считали его временным президентом, главная роль которого заключалась в том, чтобы удержать место для Путина.\n\nЕго президентство запомнилось умеренными реформами, такими как модернизация экономики и осторожные инициативы либерализации, однако все они оставались в допустимых для системы рамках. Одним из его главных достижений стала "перезагрузка" отношений с США, но она вскоре сошла на нет после событий 2014 года. Когда встал вопрос о выдвижении на пост главы государства перед выборами 2012 года, Медведев уступил место Путину, объявив, что они изначально договорились об этой своеобразной "рокировке". После возвращения Путина в Кремль Медведев оставался в структуре власти, занимая пост председателя правительства и возглавляя "Единую Россию", но его авторитет со временем становился все менее значительным. В 2020 году он был переведен на должность заместителя председателя Совета Безопасности, что многими расценивалось как понижение.\n\nТеперь он снова стал лидером России, однако его политика вряд ли будет напоминать прежнюю. Одно можно сказать точно: у Медведева есть план действий, которому он намерен решительно следовать."
 SOV_VLADIMIR_ZHIRINOVSKY_DESC:0 "Порой, чтобы понять историю человека нужно проследить весь его жизненный путь. Владимир Вольфович Жириновский, родившийся в 1946 в городе Алма-Аты, за свою долгую жизнь значительно повлиял на российскую политику. Став лидером Либерально-Демократической партии Советского Союза в 1989 году, он, будучи молодым и умелым оратор, смог завоевать сердца людей. С самого начала он выступал за поддержку русского населения в национальных республиках и желал спасения Советского Союза. Однако история расставила всё по своим местам, и вот уже через два года спустя Жириновский в бессилии наблюдал, как его родина разваливается на части, а некогда "братские" народы обращают свой бессмысленный гнев на русское население. Именно в тот момент он понял что Россия одурела. Крах советского проекта был неизбежен, но кто же знал что он будет столь болезненным.\n\nВ последующие годы Владимир Вольфович так и остался лидером ЛДПР. Адаптировавшись к существованию в путинской системе, он выжидал. Будучи крайне эпатажным оратором, Жириновский заработал определенную репутацию в российском обществе. Кто-то считал его шутом,  безумцем, а кто-то видел в его словах чуть-ли не пророческие высказывания. Однако лидер ЛДПР был непреклонен и всегда выступал за русский народ и его благополучие.\n\n И вот теперь именно Владимир Вольфович восседает в Кремле. Десятки лет, сотни высказываний и деяний как его самого, так и партии водрузили его на политический олимп. Однако за все эти годы ЛДПР вобрала в себя самых разных сторонников и теперь лишь от воли Жириновского зависит будущее партии. Продолжит ли она идти по пути демократии с сильным президентом или Жириновскому предстоит стать русским Цезарем, наведя порядок железной рукой. Жребий брошен."
 SOV_BORIS_NADEZHDIN_DESC:0 "Борис Борисович Надеждин в 1963 году в городе Ташкент на территории узбекской ССР. На протяжении уже более чем 5 поколений все мужчины в его роду разделяли одно и то же имя. Впрочем, долго прожить ему на территории Средней Азии было не суждено. В 1969 году семья Бориса переехала в Москву. Где он, позже получил образования и работал сначала инженером, а после стал председателем кооператива "Интеграл".\n\nНо Борис Борисович всегда был заинтересован политикой и именно поэтому когда в 1990 году брожения в обществе достигли предела он начал действовать. Сначала он стал одним из народных депутатов Долгопрудного, а затем вступил в движение Демократических реформ. Постепенно он вошёл в круг общения известного в те времена Бориса Немцова и занял престижную область в Союзе Правых Сил. Далее он был членом и Партии Роста и Гражданской инициативы и даже пробовал себя в качестве кандидата от либеральной платформы Единой России, но ничего не получалось.\n\nОднако после Европейской Войны Надеждину улыбнулась удача. Войдя в круг доверенных лиц Дмитрия Анатольевича Медведева, особенно после урегулирования отношений с либералами, он сумел быстро выторговать себе неплохую позицию премьер-министра в правительстве. И как только Медведев начал задумываться о возможной отставке Борис знал что необходимо делать.\n\nИ вот теперь Надеждин стоит у руля самой большой и могущественной страны на свете. Он обещал народу России реформы, и он в ответе за свои слова. Но как именно он проведёт свои реформы зависит только от него самого."
 SOV_ANTON_ALIKHANOV_DESC:0 "Антон Алиханов родился 17 сентября 1986 года в Сухуми, Абхазия. Война 1992 года навсегда изменила его жизнь. Семья Алихановых бежала в Россию, оставив позади разрушенный дом и прошлое, которое никогда не забыть. С детства он усвоил, что слабость - будь то у людей или у целых стран - непростительна.\n\nНа первый взгляд, его жизнь была обычной: школьник в Москве, студент Финансового университета. Но он не стремился к богатству и комфорту. Он видел потенциал новой России и был полон решимости формировать её будущее.\n\nАлиханов изучал работы русских националистов и философов, идеи которых находили отклик в его душе. Он мечтал о сильной, единой России с ясным пониманием своего предназначения. Его карьера стремительно развивалась: депутат в Калининградской области, затем губернатор. Для многих это стало бы вершиной, но для Алиханова это был только старт.\nВ Калининграде он видел не просто форпост, а символ законного господства России. Советские власти считали его незначительным, но Алиханов верил, что город может быть полностью интегрирован и «русифицирован». Его политика была смелой и бескомпромиссной, хотя не все разделяли его взгляды.\nЕго падение началось изнутри. Дмитрий Медведев, которого Алиханов позже высмеял, уволил его, разрушив большую часть его работы. Для многих это был бы конец, но Алиханов не сдался. Он открыто восстал и был исключён из «Единой России». Для него это стало знаком почёта.\nС детства Алиханов знал, как опасны слабые лидеры. Он не позволил бы истории повториться. Он взял под контроль Национальную партию России, превратив её в воплощение своего видения возрождённой страны. Его сила заключалась в недовольстве по всей стране: ветераны, рабочие, борющиеся за выживание, беспокойная молодёжь - все они сплотились вокруг него.\nМало кто верил в его успех. Враги считали его выскочкой и маргинальной фигурой. Но они недооценили его. Несмотря на все преграды, Алиханов пришёл к власти, выиграв выборы, которые потрясли мир. Теперь он в Кремле, готовый показать, что такое истинный национализм."

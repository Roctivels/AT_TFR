 party_SOV_intergralists_tt_long: "£GFX_russian_flag_pin §CЦентр Народного Единства§!\n\n\n\n\n£GFX_SOV_center_of_unity_banner\n\n\n\n\n\n\n§g§YЦНЕ§! - состоит из основного костяка Единой России а так же беспартийных прагматиков-технократов, они являются самыми стабильными так как хотят в целом продолжения политики Владимира Путина, лишь с небольшими укрепляющими её факторами.\nОни так-же являются самыми лояльными, но из-за этого в их рядах отсутствует сильная фигура которая могла бы пробиться до статуса 'неофициального лидера'.§!"
 party_SOV_left_statists_tt: "Усилить £GFX_left_statesmen_texticon §sСоциальную Трудовую Платформу§!\n\n[!party_SOV_left_statists_icon_click]"
 party_SOV_left_statists_tt_long: "£GFX_left_statesmen_texticon §sСоциальная Трудовая Платформа§!\n\n\n\n\n£GFX_SOV_social_labour_banner\n\n\n\n\n\n\n§gСостав §YСТП§!, строится из социально-левых членов ЕР и большого количества Справедливороссов, а так же левоориентированных экономистов.\nОни хотят построить социальное государство которое держится на фундаменте советского прошлого, но так же и новых идей, с упором на Российскую специфику.§!" 
 party_SOV_national_patriots_tt: "Усилить £GFX_national_patriots_texticon §8Национальную Патриотическую Конференцию§!\n\n[!party_SOV_national_patriots_icon_click]"
 party_SOV_national_patriots_tt_long: "£GFX_national_patriots_texticon §8Национальная Патриотическая Конференция§!\n\n\n\n\n£GFX_SOV_national_patriotism_banner\n\n\n\n\n\n\n§gЧлены §YНПК§!, это старые жёсткие государственники из Единой России, отставные военные, и разные милитаристы. Для них Россия должна одеться в броню, чтобы пережить этот неспокойный век. Они уделяют большое внимание военной сфере, а так же часто критикуют "излишнюю" свободность политического климата.§!" 
 party_SOV_reformers_tt: "Усилить £GFX_reformers_texticon §yКлуб 4-го Ноября§!\n\n[!party_SOV_reformers_icon_click]"
 party_SOV_reformers_tt_long: "£GFX_reformers_texticon §yКлуб 4-го Ноября§!\n\n\n\n\n£GFX_SOV_club_november_banner\n\n\n\n\n\n\n§g§YК4Н§! - это либеральное крыло Единой России, Новые Люди, и так-же разные либеральные экономисты с государственным уклоном. Их политика строится на создании "Страны Возможностей" в первую очередь для активного слоя предпринимательства, улучшение состояние частного бизнеса, и так же, минимальное усилиение личных свобод.§!"
 party_SOV_soviet_revivalists_tt: "Усилить £GFX_soviet_revivalists_texticon §RСъезд Социальных Сил России§!\n\n[!party_SOV_soviet_revivalists_icon_click]"
 party_SOV_soviet_revivalists_tt_long: "£GFX_soviet_revivalists_texticon §RСъезд Социальных Сил России§!\n\n\n\n\n£GFX_SOV_soviet_revivalists_banner\n\n\n\n\n\n\n§gСъезд Социальных Сил России - это более радикальное и советское расширение старой СТП, после того как они поглотили и усилили позиции просоветских экономистов и историков. Теперь они выступают за более радикальное, но всё ещё в рамках разумного, оживление советского опыта, также как называют СССР империей.§!" 
 party_SOV_kadyrovites_tt: "Усилить £GFX_akhmat_texticon §RФракцию Имени Ахмата Кадырова§!\n\n[!party_kadyrovites_icon_click]"
 party_SOV_kadyrovites_tt_long: "£GFX_akhmat_texticon §RФракция Имени Ахмата Кадырова§!\n\n\n\n\n£GFX_SOV_kadyrovites_banner\n\n\n\n\n\n\n§gФракция "АХМАТ" состоит в основном из выходцев из Чечни, а также приближенных лично Кадырову, хотя имеются и просто сторонники из других регионов. Они очень персоналистичны, воинственны и религиозны. Они говорят об абсолютной лояльности, выступают за суровые законы против тех которых они считают угрозой "стабильности" дружбе народов России.§!" 
 party_SOV_z_patriots_tt: "Усилить £GFX_z_patriots_texticon §9Ультра-Патриотов§!\n\n[!party_SOV_z_patriots_icon_click]"
 party_SOV_z_patriots_tt_long: "£GFX_z_patriots_texticon §9Народное Движение Патриотов§!\n\n\n\n\n£GFX_SOV_z_patriots_banner\n\n\n\n\n\n\n§gНДП - это созданное из радикальных лоялистов, а также конспирологов, и многих национал-патриотов, которые собираются вокруг Евгения Федерова и его НОД. Они милитаристичные, постоянно говорят о том что Россия должна сделать всё ради победы и освобождения от "Крипто-Оккупции".§!"
 party_SOV_populists_tt: "Усилить £GFX_populists_texticon §gНародную Патриотическую Фракцию§!\n\n[!party_SOV_populists_icon_click]"
 party_SOV_populists_tt_long: "£GFX_populists_texticon §gНародная Патриотическая Фракция§!\n\n\n\n\n£GFX_SOV_populists_banner\n\n\n\n\n\n\n§gПНФ - это фракция тех, кто хочет дать народу власть, хоть и в понимании авторитарного управления и сохранения рычагов президентской власти. Они синкретичны в своих идеях и готовы работать с разными платформами, если видят, что их идеи могут быть использованы для сохранения стабильности и благосостояния населения.§!"



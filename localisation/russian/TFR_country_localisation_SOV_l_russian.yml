 russia.907.t: "Константин Малофеев Открывает Сеть Православных Гимназий"
 russia.907.d: "Недавно известный предприниматель, тайный советник и покровитель традиционных ценностей Константин Малофеев в ходе своего тура по Империи открыл гимназии нового образца во многих губернских городах. Гимназии эти созданы по примеру более ранней Гимназии Святителя Василия Великого, открытой в 2006 году. Их цель: "дать ученикам глубокие знания и привить им высокие нравственные идеалы, воспитать таких людей, которые будут гордиться отечественной историей, горячо любить Россию и служить на благо страны в будущем, представляя новую российскую элиту." Государь одобрил данную деятельность и пожелал успехов в учёбе всем будущим гимназистам."
 russia.907.a: "Изумительно."
 russia.908.t: "Царскосельский Лицей Вновь Открыт для Учащихся"
 russia.908.d: "Царскосельский лицей в дореволюционное время являлся кузницей настоящей государственной элиты Империи. Его воспитанники становились выдающимися офицерами, дипломатами, чиновниками и даже поэтами с писателями. Чего только стоит великий Александр Сергеевич! Страна нуждалась в талантах и надёжных кадрах, и она их сама взращивала на службу себе с юного возраста.\nСейчас мы столкнулись с той же самой проблемой: государство огромно, и нам нужны лояльные квалифицированные кадры. Так почему бы нам не возродить эту славную традицию?"
 russia.908.a: "Когда же мы увидим нового Пушкина?"
 russia.909.t: "Возрождение Земского Либерального Движения"
 russia.909.d: "Недавнее возрождение земств вернуло и другую их отличительную черту: Земское Либеральное Движение, образовавшееся вскоре после административной реформы Александра Второго. Хоть оно по своей сути и неоднородно, но все его участники согласны в нескольких вещах: стране необходима административная децентрализация, послабление цензуры и большая вовлечённость общества в дела государства.\nДа, хоть некоторые считают, что именно конфликт власти с земством и привёл к Первой революции, но мы уверены, что мы научились на ошибках прошлой Империи, и больше такого ужаса не повторится."
 russia.909.a: "Недурно."
 russia.910.t: "Неполживщина"
 russia.910.d: "ЧТО БЫЛО ПРИ РОССИЙСКОЙ ИМПЕРИИ И ЧТО МЫ ПОТЕРЯЛИ, А ТЕПЕРЬ ВЕРНУЛИ:\n1. РУЖЬЯ ИЗ МОЛОЧНОЙ ПЕНЫ ДЕЛАЛИ. МОЖНО БЫЛО СОЛДАТУШЕК КОРМИТЬ.\n2. СИЛА ГРАВИТАЦИИ БЫЛА СЛАБЕЕ ПРОЦЕНТОВ НА 80. ЛЮДИ НА 5 ЧИН В ТАБЕЛИ О РАНГАХ ЗАПРЫГИВАЛИ С РАЗБЕГУ.\n3. ЧЕЛОВЕК ЖИЛ В СРЕДНЕМ 150-190 ЛЕТ. БОЛЕЗНЕЙ НЕ СУЩЕСТВОВАЛО КРОМЕ ОБЪЕДЕНИЯ ПИРОЖНЫМИ.\n4. ЕСЛИ НА УЛИЦЕ СПОТКНЕШЬСЯ И УПАДЕШЬ - КУПЦЫ ПОДБЕГАЛИ, АССИГНАЦИИ В КАРМАН ЗАСОВЫВАЛИ, В ГУБЫ ЦЕЛОВАЛИ, ПРЕДЛАГАЛИ ВЫПИТЬ, ЗА ИХ ДОЧЬ ПОСВАТАТЬСЯ.\n5. ЗАЙЦЫ И КУРОПАТКИ СРАЗУ НА СКОВОРОДУ ЗАЛЕТАЛИ. ХЛЕБ ПОКУПАЕШЬ - ТЕБЕ ЕЩЕ ВОДОЧКИ НАЛЬЮТ. К ЛЮБОЙ ЛУЖЕ СТРАШНО ПОДОЙТИ БЫЛО: ОСЕТРА В КОТЕЛОК ПРЫГАЛИ.\n6. ЛЮДИ НОЧЬЮ ПРОСЫПАЛИСЬ ОТ ДУШЕВНОЙ ДОБРОЙ МОЛИТВЫ. УТРОМ ВСЕ ШЛИ В ПРАВОСЛАВНУЮ ЦЕРКОВЬ\n7. СРОК БЕРЕМЕННОСТИ СОСТАВЛЯЛ 4.5 МЕСЯЦА. ДЕТИ РОЖДАЛИСЬ ПО 12-15 КИЛОГРАММ С БЕЛОКУРЫМИ ВОЛОСАМИ И ЯСНЫМИ ГОЛУБЫМИ ГЛАЗАМИ И ВОЛЕВЫМИ УМНЫМИ ЛИЦАМИ - СРАЗУ ВИДНО В ПЕТЕРБУРГ УЧИТЬСЯ СОБРАЛИСЬ.\n8. ВОДА В ВОЛГЕ БЫЛА СЛАДКАЯ КАК ПАТОКА. А ЕНИСЕЙ СОСТОЯЛ ИЗ ТЁМНОГО ПИВА.\n9. ЗИМОЮ БЫЛО МИНУС ТРИСТА, ВСЕ РУМЯНЫЕ ХОДИЛИ.\n10. СОЛДАТЫ РОСЛИ В ВОЕННЫХ ПОСЕЛЕНИЯХ С ГРЕНАДЕРА РАЗМЕРОМ. ГРЕНАДЕРЫ БЫЛИ С ГВАРДЕЙЦА, ГВАРДЕЙЦЫ С ЛОШАДЬ, А ЛОШАДЬ КАК УРАЛЬСКАЯ МЕТАЛЛУРГИЧЕСКАЯ МАНУФРАКТУРА, А В НЕЙ ПРИПИСНЫЕ КРЕСТЬЯНЕ В ДУРАКА ИГРАЛИ ПО МЕТОДИКЕ ИВАНОВА - С ПЕРВОГО ХОДА КОЛОДУ ЗАКАНЧИВАЛИ!"
 russia.910.a: "Браво!"
 russia.911.t: "Популяризация Петербургского Архитектурного Стиля"
 russia.911.d: "Санкт-Петербург не зря называют "Северной Пальмирой". Один из самых красивых городов не только Европы, но и мира, Петербург всегда привлекал внимание людей творческих. "Медный всадник" Пушкина, множество романов Фёдора Михайловича Достоевского и многие другие произведения посвящены Городу Петра.\nИ сейчас среди городских чиновников новая мода: сносить большевистские "панельки" и "человейники", настоящие преступления против искусства и урбанистики, и заменять их чем-то более приятным глазу: малоэтажными петербургскими домами, более подходящих новой, Имперской России."
 russia.911.a: "Отлично!"
 russia.912.t: "Коалиция "Красная Россия""
 russia.912.d: ""
 russia.912.a: "Такие люди всегда найдутся..."
 
 

 #Army tree
 SOV_rollback_serdykovs_reforms: "[SOV_rollback_serdykovs_reforms_loc]"
 SOV_rollback_serdykovs_reforms_desc: "[SOV_rollback_serdykovs_reforms_loc_desc]"
 SOV_expand_ratnik_programme: "Расширить программу "Ратник""
 SOV_expand_ratnik_programme_desc: "Программа "Ратник" - один из амбициознейших проектов модернизации российской армии, которая охватывает широчайший спектр средств обычного бойца: от автомата и ножа до брони, системы связи и рюкзака с палаткой. Но темпы внедрения всех этих средств недостаточны для повышения эффективности всей армии. Необходимо расширить программу: тепловизионные средства от прицелов до окуляров и самые современные наработки в сфере экзоскелетов - и внедрить её в как можно большее количество частей."
 SOV_improve_deep_battle_theory: "Улучшение Теории Глубоких Операций"
 SOV_improve_deep_battle_theory_desc: "Теория глубокой операции хоть и является почти вековой, но не утратила своей значимости и в современном мире: на её основе строилась вся военная доктрина Советского Союза во время Великой Отечественной войны и далее. Хоть её и признают "устаревшей", но было бы недальновидно полностью сбрасывать её со счетов. Она нуждается лишь в небольшом улучшении с учётом особенностей войны XXI-го века. "
 SOV_improve_gerasimovs_doctrine: "Совершенствование Доктрины Герасимова"
 SOV_improve_gerasimovs_doctrine_desc: "Доктрина Герасимова является, безусловно, прорывной для нашей армии. Ставка на современные средства войны: кибератаки, тайные операции и прокси-конфликты вместе с технологическим улучшением нашей армии. Но времена изменились, нужда в поддержке лояльных сторон отпала: настало время более прямого противостояния. Необходимо усовершенствовать доктрину под ведение современной полномасштабной войны, сделав упор на качество, а не на количество."
 SOV_reform_the_officer_corps: "Реформа Офицерского Корпуса"
 SOV_reform_the_officer_corps_desc: "Офицеры в России зачастую оторваны от реалий в поле - они получают звания не за заслуги, а за выслугу лет, неся за собой кумовство, коррупцию и прочие пороки армейской жизни. Поэтому необходимо вернуть связь бойцов и командиров, определить лучших и выгнать на мороз худших. Офицер Вооруженных сил - это звучит гордо!"
 SOV_centralize_military_structures: "Централизация Военных Структур"
 SOV_centralize_military_structures_desc: "Текущая ситуация с нашими военными структурами оставляет желать лучшего: множество различных ведомств с непонятными полномочиями, перекликающимися друг с другом, откровенная забюрократизированность и коррупция... Необходим централизованный контроль над военными структурами, наподобие широко известного ГКО, взявшего всю полноту власти в Союзе во время Великой Отечественной, но более сконцентрированном на именно военном аспекте."
 SOV_unify_command_structures: "[SOV_unify_command_structures_loc]"
 SOV_unify_command_structures_desc: "[SOV_unify_command_structures_loc_desc]"
 SOV_unify_command_structures_rosgvardia: "Военные Комиссары"
 SOV_unify_command_structures_rosgvardia_desc: "Основной силой Русской армии всегда был её несгибаемый боевой дух, вера в Русское дело. Иногда бывает, что воины подзабывают, теряются на поле брани, паникуют. И для того, чтобы вернуть им дух, наставить на путь истинный, и было решено создать институт военных комиссаров. В их обязанности будет входить работа с бойцами, просвещение и осуждение за воинские проступки. Они послужат укреплению воинской дисциплины во всех частях!"
 SOV_unify_command_structures_normal: "Объединение Командных Структур"
 SOV_unify_command_structures_normal_desc: "Российская и белорусская армии имеют давний опыт совместной работы: многочисленные учения не только ОДКБ, но и Союзного государства сделали неоценимый вклад в развитие наших отношений. А теперь, когда вопрос Союзного государства встал как никогда остро, было бы логично объединить командование наших вооруженных сил и ВС РБ. Сила - в единстве!"
 SOV_give_way_to_youth: "Молодым - Дорога!"
 SOV_give_way_to_youth_desc: "Все мы, так или иначе, смертны. Идеи устаревают, и лишь новая кровь помогает им жить, когда старики отмирают - от времени или от снарядов. Россия веками славится своим военным образованием: многочисленные нахимовские и суворовские училища взращивают новые поколения офицеров на службу Отечеству. Сейчас молодая кровь необходима для развития нашей боеспособности, пора пустить её в ход!"
 SOV_promote_reliable_cadres: "[SOV_promote_reliable_cadres_loc]"
 SOV_promote_reliable_cadres_desc: "[SOV_promote_reliable_cadres_loc_desc]"
 SOV_patriotic_zealousy: "[SOV_patriotic_zealousy_loc]"
 SOV_patriotic_zealousy_desc: "[SOV_patriotic_zealousy_loc_desc]"
 SOV_science_in_the_service_of_the_army: "Наука на Службе Армии"
 SOV_science_in_the_service_of_the_army_desc: "Современная война - это не только война армий, война экономик: это схватка и технологическая, научная. Тот, кто имеет технологическое преимущество, даже при количественном недостатке - имеет все шансы выиграть. Современные, дешёвые и смертоносные FPV-дроны, средства борьбы с ними, кибератаки на вражескую инфраструктуру - всё это составляет войну 21-го века. Мы не можем себе позволить проиграть в этой гонке вооружений нового поколения."
 SOV_modernization_of_aircraft_and_ships: "Модернизация Самолетов и Кораблей"
 SOV_modernization_of_aircraft_and_ships_desc: "ВМФ России на текущий момент представляет из себя хоть и не отстающую, но довольно небольшую силу. Основной упор сделан на подводные лодки, а конкретнее - на РПКСН, подводные ракетоносцы с современным вооружением. Но ситуация с надводными силами довольно плачевная: гордость флота, его флагман - "Адмирал Кузнецов", с 2018 года находится на ремонте, и дальнейшая его судьба неизвестна. Подавляющее большинство кораблей были построены еще в Советском Союзе, то есть более 30 лет назад. Стройка нового флота - слишком дорогая и долгая авантюра, поэтому было бы логично модернизировать то, что мы уже имеем до состояния, способного сразиться на равных с объединённым флотом НАТО.\n\nВ ВКС ситуация лучше: хоть огромное количество техники и советских времён, но её много и она эффективна. Но Европа начинает медленно, но верно догонять нас в этой области, так что необходимо усилить темпы закупки новейших Су-57 и модернизацию стратегической авиации. "
 SOV_build_up_air_and_sea_fleets: "Наращивать Воздушный и Морской флот"
 SOV_build_up_air_and_sea_fleets_desc: "Очевидно, текущих темпов модернизации недостаточно для российского доминирования на море и в воздухе в предстоящем конфликте. Поэтому необходимо поучиться наращиванию и флота, и авиации у наших китайских партнеров. Больше малых и средних кораблей, больше самолетов! Каждый эсминец, истребитель и штурмовик приближает нас к победе над Западом."
 SOV_emphasizing_vocational_training: "Приоритет Профессиональной Подготовки"
 SOV_emphasizing_vocational_training_desc: "Российская армия исторически ассоциируется не с профессионализмом, а с массовостью: преобладанием количества против качества. Во многом именно размах нашей земли и численность помогали одолеть наших врагов. Но времена изменились: теперь Родина нуждается в лучших своих сынах, а не просто во всех. Больше часов на изучение военной теории для срочников, повышение престижа контрактной службы и более - все эти меры должны показать, что наша армия идёт по новому курсу!"
 SOV_start_armata_production: "Начать Производство "Арматы""
 SOV_start_armata_production_desc: "Проект "Армата" по праву считается гордостью российской армии. В нем использованы все новшества 21-го века: средства РЭБ, активная защита, необитаемая башня и прочий хай-тек. Да, с момента показа публике в 2015-ом прошло немало времени, но народная мудрость гласит, что лучше поздно, чем никогда. К тому же, путинское правительство критиковали за то, что Армат в войсках всё нет и нет. Время закрыть этот гештальт."
 SOV_expand_t90_production: "Расширить Производство Т-90"
 SOV_expand_t90_production_desc: "Т-90 является глубокой модификацией советских танков Т-72Б, принятой на вооружение в далёком 1992 году. За свою жизнь эта платформа видела множество модификаций и экспортируется по всему миру. Наши военные специалисты предлагают сосредоточиться на улучшении данной машины, а конкретнее - на принятии на вооружение и внедрении на заводы новейшей модификации: Т-90М "Прорыв-3". Учитывая общую конструкционную схожесть с предыдущими танками, широкое производство будет налажено быстрее и дешевле, чем Т-14 Армата, хоть и с меньшей эффективностью отдельно взятого танка. Но сторонники уверяют: количество перерастёт в качество."
 SOV_new_russian_army: "[SOV_new_russian_army_loc]"
 SOV_new_russian_army_desc: "[SOV_new_russian_army_loc_desc]"
 
 #Army tree scripted loc
 SOV_rollback_serdykovs_reforms_cprf: "Откат Либеральных Реформ"
 SOV_rollback_serdykovs_reforms_cprf_desc: "Реформы Сердюкова оказали невероятный урон боеспособности российской армии: десятки тысяч военных специалистов лишились своей работы в рамках "оптимизации", штабная работа также была нарушена. Хоть этого откровенного вредителя и выгнали с поста за коррупцию, но осадок остался, и многие идиотские нововведения всё ещё остаются в силе. Новая Советская армия будет построена практически с нуля, на основе опыта современных конфликтов.\nА по чьей же воле допустили развал нашей армии? Конечно же по воле Шойгу - такой же паразит, как и его предшественник! Пора разобраться с ним и с его шайкой.\nЕщё остаётся нерешённым вопрос ЧВК "Вагнер"...\nВремя браться за работу."
 SOV_rollback_serdykovs_reforms_medvedev: "Откат Реформ Сердюкова"
 SOV_rollback_serdykovs_reforms_medvedev_desc: "На бумаге реформа Вооружённых сил, предложенная Анатолием Сердюковым, выглядела прекрасно: оптимизация расходов, штабной структуры, введение новой формы. Но на практике реформа только ослабила нашу армию: под сокращения попало немалое количество специалистов военного дела. Хоть его и "попросили" с поста министра обороны, но продолжение мероприятий при новом руководителе министерства не дало необходимого результата. Необходимо полностью пересмотреть итоги реформы и выработать новую доктрину на основе опыта современных конфликтов."
 SOV_patriotic_zealousy_cprf: "Партийно-Политическая Работа"
 SOV_patriotic_zealousy_cprf_desc: "Институт политико-просветительской и воспитательной работы был одним из ключевых особенностей Красной и Советской Армий. Замполиты просвещали обычных бойцов в деле марксизма-ленинизма, учили воинов любви к Отечеству, а во время войны нередко своим примером показывали доблесть советского солдата. Но с распадом Советского Союза данный институт оказался расформирован, вместо него были введены менее эффективные средства политической работы.\n\nВоссоздание подобного политуправлению института в 2018 году было шагом в правильном направлении, но и этого мало. Политруки и комиссары войдут в командную структуру новой армии. Нам понадобится всё возможное, чтобы вернуть наше из рук капиталистов."
 SOV_patriotic_zealousy_medvedev: "Усилить Патриотический Запал"
 SOV_patriotic_zealousy_medvedev_desc: "Политико-воспитательная работа - важная часть военной службы в нашей стране. Хоть армия и у нас после развала Советского Союза стала (по большей части) деполитизированной, но нужда в просвещении бойцов идеями патриотизма и мужества никуда не исчезла. Наоборот, с каждым годом близится угроза с Запада, и именно поэтому работа с солдатами становится необходимой. В 2018 было создано Главное военно-политическое управление ВС РФ, и мы должны закончить начатое Владимиром Владимировичем."
 SOV_patriotic_zealousy_ldpr: "Распространять Реваншистскую Страсть"
 SOV_patriotic_zealousy_ldpr_desc: "Патриотизм - неотъемлемая часть военной жизни. Но обычной любви к Родине и текущих методов военно-политического воспитания недостаточно для целей, поставленных Жириновским. Необходимо вселять в сердца бойцов стремление отдать свою жизнь за величие России и ненависть к порождениям западного либерализма в Восточной Европе. Из победы духовной мы вырастим победу военную!"
 SOV_promote_reliable_cadres_cprf: "Образцы для Подражания"
 SOV_promote_reliable_cadres_cprf_desc: "Сейчас наша страна (особенно после чисток генеральского состава, лояльного преступнику Шойгу) нуждается в опытных кадрах. И поэтому решено вновь призвать на службу Родине ветеранов, полных патриотизмом и опытом, который они могут применить на поле боя. Многие из них участвовали в защите Белого дома в далёком 93-ем и в Чеченских войнах, но всё же более молодым офицерам есть чему у них поучиться."
 SOV_promote_reliable_cadres_medvedev: "Продвижение Надежных Кадров"
 SOV_promote_reliable_cadres_medvedev_desc: "Российская армия в народных глазах всегда была и остается местом, где процветает кумовство, коррупция, откровенное воровство и прочие болезни нашей системы. А всё из-за ненадёжности наших армейских управленцев, которые наживаются на боеспособности Родины. Поэтому необходимо провести некоторые перестановки в руководстве, дабы повысить эффективность Вооруженных сил."
 SOV_new_russian_army_cprf: "Могущество Красной Армии"
 SOV_new_russian_army_cprf_desc: "История показывает, что непобедимых армий нет и не бывало. Но если какая-то армия и подобралась к этому гордому званию, то это была Красная, а позднее - Советская Армия. От сопок Маньчжурии до гор Афганистана и лесов Германии - советский солдат нес освобождение от оков народам мира. Тучи собираются над Восточной Европой, но мы готовы пойти на грозный бой, на правый бой. Сейчас можно с гордостью сказать: Красная Армия всех сильней!"
 SOV_new_russian_army_medvedev: "Новая Российская Армия"
 SOV_new_russian_army_medvedev_desc: "Современная Российская армия прошла долгий путь за свое существование: от разброда и шатания 90-ых, от тех крох, которые остались от могущества Советской Армии, до текущего момента, в котором она является одной из, если не сильнейшей на планете. Переродившись из пепла, как мифическая птица Феникс, наши вооружённые силы теперь способны не только на защиту наших границ, но и на ведение полномасштабной войны. Текущая геополитическая обстановка говорит о том, что вежливые люди без работы не останутся."
 
 #Medvedev
 SOV_status_quo_victory: "Победа Статуса-КВО"
 
 SOV_convene_the_duma: "Созвать Думу"
 SOV_convene_the_duma_desc: "После победы Единой России настало время закрепить нашу победу. Путина больше нет, но партия, которую он создал, продолжает существовать. Это вызвало большую неопределенность в правительстве и обществе, поскольку у нашей партии нет реальных программ и политики. \n\n С возвращением Медведева к власти он должен определить курс, которым будет следовать российская нация в течение следующего 6-летнего срока.  Продолжит ли он наследие Путина? Или он сохранит взгляды, которых придерживался в первый срок? \n\n Только время покажет."
 
 SOV_pressure_belarus: "Давление на Беларусь"
 SOV_stir_up_russian_nationalism: "Разжечь Национализм"
 SOV_stir_up_russian_nationalism_desc: "На протяжении многих десятилетий слово "национализм" в нашем государстве ассоциировалось со скинхедами и нацистами. Оно было и остается глубоко противоречивым термином.\n\nНо так ли это на самом деле? Были ли защитники Советского Союза подонками, защищаясь от нацистов? Разве белое движение было неправым, когда взяло в руки оружие, чтобы защитить старый образ жизни?\n\nНезависимо от идеологии, национализм - это то, что движет нашей страной. Красный или трехцветный - флаг не имеет значения. Для России - вот что в конечном итоге важнее всего."
 SOV_lukashenko_our_man: "Лукашенко, наш Мужик"
 SOV_lukashenko_our_man_desc: "Александр Лукашенко бережно руководил Беларусью. Его не остановили даже протесты, организованные Западом. Он и его руководство показали себя более чем способными помочь нам в наших начинаниях."
 SOV_transnistrian_question: "Приднестровье - Русский Оплот"
 SOV_transnistrian_question_desc: "Приднестровье. Первые патриоты русского мира. Когда Союз распался, именно эти русские патриоты заявили о своем намерении воссоединиться с родной страной. И после совместных усилий украинских и российских добровольческих батальонов (а также ультиматума российских солдат, расквартированных там), вот уже 3 десятилетия здесь царит мир с Молдовой. \n\n Но пока тучи сгущаются, мы должны сосредоточиться на интеграции региона в наши рынки и вооруженные силы. Они станут бастионом русского мира."
 SOV_unify_command_structures: "Унификация Командных Структур"
 
 SOV_push_back_the_west: "Противостояние с Западом"
 SOV_push_back_the_west_desc: "Большинство считает Медведева "прозападным" идеалистом. Однако, похоже, у всех идеалистов есть предел. Как и Владимир Путин до него, Медведев видит в нынешней Европе противника. Мечты 2000-х годов о российско-европейской оси в качестве третьего баланса сил против Америки и Китая давно ушли в прошлое. \n В то время как левая рука Запада горит в агонии, правая перевооружается, чтобы сдержать нас. Мы не можем тратить время на бесполезные тривиальные драмы в Думе. Система, которую построил Путин, слишком статична для того, что нас ждет, и цель президента - обеспечить выживание России, несмотря ни на что. \n\n Пугалки, которые европейцы рассказывают себе о нас, реальны, потому что мы сделаем их таковыми."
 SOV_putinism_with_human_face: "Путинизм с Человеческим Лицом"
 SOV_putinism_with_human_face_desc: "Хотя в первый срок его правления Россия вступила в ВТО и взяла курс на сотрудничество с Европой, для большинства россиян было очевидно, что именно Путин руководит страной. Однако, похоже, что за все эти годы идеи, которые были у нашего нынешнего президента, так и не исчезли. \n\n Дмитрий Медведев решил, что система должна адаптироваться к современным вызовам мира. В условиях, когда гегемон убивает сам себя, мы не можем бездействовать под прикрытием стабильности. \n\n Россия должна измениться, потому что нет более идеального момента, чем этот."
 SOV_money_for_pensioners: "Деньги для Пенсионеров"
 SOV_money_for_pensioners_desc: "Несмотря на то, что несколько лет назад мы увеличили возраст выхода на пенсию, мы не можем оставить наших пожилых людей без поддержки. В нынешние кризисные времена мы должны демонстрировать образ стабильности и силы тем, кто за нас голосует. Кроме того, это может поднять наши показатели. Беспроигрышный вариант."
 SOV_tighten_media_noose: "Усилить Контроль над СМИ"
 SOV_tighten_media_noose_desc: "По мере приближения даты нашей великой борьбы мы должны убедиться, что наша медиасфера находится под нашим полным контролем. Слишком долго западные проекты, такие как "Новая газета" и "Радио Свобода", свободно работали на нашей земле. Наша информация будет тщательно контролироваться и проверяться на предмет любой дезинформации, которая может быть направлена против нас."
 SOV_a_toast_to_our_friends: "Тост за Наших Друзей!"
 SOV_a_toast_to_our_friends_desc: "Хотя у крупного бизнеса и олигархов есть свои проблемы, пока что они отвечают нашим интересам. Давайте поздравим их за верность!"
 SOV_weaponise_gazprom: "Превратить Газпром в Оружие"
 SOV_weaponise_gazprom_desc: "Газпром слишком ценен, чтобы оставаться просто энергетической компанией. В условиях мирового пожара мы, по сути, стали одним из крупнейших экспортеров энергоресурсов в мире. Вот уже десять лет мы кормим Европу дешевым газом, а нам не оказывают должного уважения. \n Возможно, европейцам пора понять, что их процветание частично зависит от нас."
 SOV_them_in_our_pockets: "Держать их на Коротком Поводке"
 SOV_them_in_our_pockets_desc: "У наших олигархов есть то, в чем мы отчаянно нуждаемся: зарубежные сети. СМИ, финансы, промышленность, контакты - у них много иностранного капитала. Пришло время использовать его на благо России. В Европе есть много людей, которым мы нравимся, но еще больше тех, кому нравятся наши деньги."
 SOV_prepare_for_unification: "[belarus_unification]"
 SOV_prepare_for_unification_desc: "[belarus_unification_desc]"
 SOV_belarus_unification: "Подготовиться к Объединению"
 SOV_belarus_unification_desc: "Беларусь, наша братская республика. Более 20 лет назад был подписан договор о Союзном государстве, и многие думали, что время воссоединения давно прошло. Однако оно пришло и не пришло. Возможно, в будущем к нам присоединятся и наши братья в Новороссии, а пока двум сестрам пора готовиться к этой реальности."
 SOV_further_integration: "Дальнейшая Интеграция Беларуси"
 SOV_further_integration_desc: "Поскольку Путин успел провозгласить Союзное государство до своей печальной отставки и ухода из жизни, перед нынешней администрацией поставлена задача дальнейшей интеграции. Беларусь станет одним из важнейших регионов для российской экономики, как и было предначертано ее судьбой."
 SOV_belarus_operation: "Военная Операция в Беларуси"
 SOV_belarus_operation_desc: "Не помочь Лукашенко было второй по величине ошибкой в нашей современной истории после того, как мы не вмешались, чтобы спасти правительство Януковича. Теперь у нас не один, а два братских народа, во главе которых стоит прозападная элита, желающая только одного - уничтожить все, что нас связывает. \n Уже сейчас змагарские националисты пытаются переделать Беларусь, выставить себя колонизированными Россией. Однако они действительно колонизированы. \n Однажды мы уже выгнали Речь Посполитую с этих земель и пресекли их попытки ассимилировать наших белорусских братьев. И сейчас мы сделаем это снова."
 SOV_central_asian_military_operation: "Центральноазиатская Военная Операция"
 SOV_central_asian_military_operation_desc: "Правительства стран Центральной Азии находятся в своеобразном положении. На протяжении десятилетий они пытались дистанцироваться от нас и диверсифицировать своих экономических партнеров. И если раньше мы могли игнорировать западные НПО, школы и выкупленные бизнесы, то сегодня мы не уже не можем себе этого позволить. \n\n Центральная Азия будет иметь выбор между ОДКБ и НАТО. И выбор в пользу НАТО будет иметь последствия."
 SOV_caucasus_military_operation: "Закавказская Военная Операция"
 SOV_caucasus_military_operation_desc: "Кавказ всегда был сложным регионом для навигации. Грузины, которые ненавидят нас за то, что мы остановили их вторжение в Южную Осетию. Азербайджанцы и армяне постоянно воюют. И все же мы не можем оставить этот фланг без защиты. НАТО может попытаться привлечь Грузию или Азербайджан на свою сторону, что поставит под угрозу всю нашу южную группировку. \n\n Мы пошлем им ультиматум о сотрудничестве и дружбе. Если они откажутся, что ж, Россия найдет в этих странах людей, готовых возглавить страну и сотрудничать с нами."
 SOV_recognize_donbas: "Признание Республик Донбасса"
 SOV_recognize_donbas_desc: "Очень жаль, что мы не сделали этого раньше. Донбасские республики умирали и проливали кровь за нас, так почему же мы должны продолжать игнорировать их суверенитет? Они более чем достойны признания, ведь именно они дали жизнь русской весне."
 SOV_address_the_nation: "Обращение к Народу"
 SOV_address_the_nation_desc: "Время пришло. Мы спасем наших братьев из Донбасса от украинского правительства. Однако Европа почти гарантированно вмешается. Это не имеет большого значения. Они могут превосходить нас числом, но это тоже нормально. Мы победили Наполеона, имея значительно меньшую численность. Мы не дали Гитлеру войти в Москву, будучи в меньшинстве почти 2 к 1. \n\n И, как и в прошлом, Русский Орел вернется к роли лидера Европы."
 SOV_special_military_operation_ur: "Специальная Военная Операция"
 SOV_special_military_operation_ur_desc: "Украина, страна, возникшая в результате ряда ошибок российских правителей, с XIX века является источником напряженности в отношениях между Россией и Западом. После революции 2014 года западные державы используют Украину для противодействия России. Их цель - превратить ее в поле боя, истощив ресурсы и жизни славянских народов. По мере того как их планы воплощаются в жизнь, России необходимо действовать решительно. Украина больше не будет угрожать России, и однажды она может вернуться в славянское лоно, воссоединившись со своими корнями."
 SOV_protect_civilian_lives: "Защищать Жизни Гражданских"
 SOV_protect_civilian_lives_desc: "Важно помнить, что наши военные операции в Украине направлены на борьбу с экстремистскими фашистскими группировками и правительством в Киеве, находящимся под влиянием западных держав. Однако украинские мирные жители, особенно в восточных регионах, затронутых конфликтом, не являются нашими врагами. На самом деле, они являются ключом к успеху наших освободительных усилий, и заручиться их поддержкой крайне важно. По мере продвижения вперед наши силы должны уделять первостепенное внимание защите гражданских лиц, их имущества и безопасности. Мы стремимся продемонстрировать всему миру, что российские вооруженные силы - это не "татарская армия", как некоторые утверждают, а дисциплинированные, элитные войска."
 SOV_operation_armageddon: "ОПЕРАЦИЯ: §YАРМАГЕДДОН§!"
 SOV_operation_armageddon_desc: "Сергей Суровикин, которого на Западе часто критикуют как "генерала-мясника", на самом деле является высококвалифицированным и эффективным командиром.Его руководство смелое и решительное, способное максимально использовать потенциал своих войск.Он продемонстрировал эту способность как в мирное время, так и на полях сражений в Сирии, где он превратил обычных солдат в грозную силу.Для военной операции в Украине, возможно, стоит рассмотреть подход генерала Суровикина.Наступая с решимостью и подавляющей силой, мы можем значительно ослабить сопротивление правительства в Киеве и украинских военных. Эта стратегия может привести к значительному побочному ущербу, а инфраструктура Украины может серьезно пострадать от наших артиллерийских и воздушных ударов. Хотя гибель людей и разрушения трагичны, такие жертвы иногда считаются необходимыми для достижения стратегических целей."
 SOV_civil_military_administrations: "Военно-Гражданские Администрации"
 SOV_civil_military_administrations_desc: "С 2014 года в Украине наблюдается значительная нестабильность, вызванная не только этнической напряженностью и продолжающимся конфликтом низкой интенсивности, но и широко распространенной коррупцией в правительстве, неэффективностью административной системы и эксплуатацией ресурсов экономическими олигархами. Однако с приходом российских войск мы ожидаем существенных перемен. Мы создадим военно-гражданские администрации на новых освобожденных территориях, которые будут быстро восстанавливать местную экономику и социальный порядок. Это станет первой подлинной формой правления, представляющей интересы украинского народа с момента прихода к власти нынешнего руководства в Киеве. Мы стремимся улучшить их жизнь, обеспечить большее процветание и стабильность, чем до начала конфликта."
 SOV_return_novorossiya_to_home: "Вернуть Новороссию на Родину"
 SOV_return_novorossiya_to_home_desc: "Донецк, Луганск, Запорожье и Херсон - регионы с богатой историей и глубокими связями с русским миром. Однако в настоящее время они находятся в изоляции из-за продолжающегося российско-украинского конфликта. Мы верим, что ситуация находится на грани разрешения, и эти территории вскоре вновь займут свое законное место в истории. Организовав общенациональный референдум, мы уверены, что народ России поддержит реинтеграцию этих регионов в состав Российской Федерации. Хотя некоторые могут отвергнуть референдум как простую формальность или обвинить нас в создании "потемкинской деревни", правда в конечном итоге восторжествует. Несмотря на любое противодействие, мы остаемся непоколебимыми в своей решимости, зная, что российский народ будет продолжать добиваться успеха."
 SOV_our_historic_duty: "Наш Исторический Долг"
 SOV_our_historic_duty_desc: "Завоевание царской Россией украинского региона привело к созданию русского управления и городов. Однако во время Второй мировой войны это оказалось под угрозой со стороны немецких нацистов и их союзников. Мы никогда не должны забывать, что именно великая Советская Армия и миллионы героических людей встали на защиту Украины от угрозы нацизма. В последующие десятилетия они помогли обеспечить Украине процветание и стабильность. Сегодня внуки героев Великой Отечественной войны вновь противостоят силам фашизма в Украине. И хотя коммунизм уже не является тем объединяющим криком, которым он был когда-то, факт остается фактом: фашистские силы всегда будут побеждены нашими солдатами. Эта истина непоколебима."
 SOV_form_pro_russian_brigades: "Сформировать Пророссийские Бригады"
 SOV_form_pro_russian_brigades_desc: "Даже за пределами "Новороссии" на украинской земле сохраняются угрозы. Трудно предсказать, когда антироссийские силы в Украине могут вновь дестабилизировать обстановку в регионе и создать угрозу для нашего народа. Поэтому мы можем принять решение о поддержке местных пророссийских вооруженных формирований, объединенных общими культурными и этническими связями. Эти группы могут противостоять украинским боевикам, помогая защищать наши границы."
 SOV_fund_anti_banderite_partians: "Финансировать Антибандеровских Партизан"
 SOV_fund_anti_banderite_partians_desc: "Даже за пределами "Новороссии" на украинской земле сохраняются угрозы. Трудно предсказать, когда антироссийские силы в Украине могут вновь дестабилизировать обстановку в регионе и создать опасность для нашего народа. Чтобы противостоять тем в Украине, кто продолжает чтить пособника нацистов Степана Бандеру, мы можем оставаться едиными под знаменем антифашизма. Создав военизированные силы для борьбы с этими националистическими группировками, мы сможем помочь защитить наши границы."
 SOV_war_is_peace_UR: "За Правое Дело!"
 SOV_war_is_peace_UR_desc: "Эта война может стать долгожданной "последней битвой", которая позволит нам покончить с так называемой "стратегией сдерживания", навязанной западными странами. Она разрушит политические, экономические и культурные ограничения, наложенные на русский народ, и позволит ему достичь подлинного освобождения. В этой "тотальной войне" наши граждане поймут это благодаря усилиям СМИ, культурных пропагандистов и онлайн-платформ. В результате концепция "священной войны за справедливость" станет глубоко укорененной в каждом россиянине."
 SOV_trample_over_kiev_UR: "Растоптать Киев"
 SOV_trample_over_kiev_UR_desc: "Хотя специальная военная операция против Украины сильно ослабила страну, она не уничтожила ее. Учитывая, что на оставшихся территориях страны все еще сохраняются активные антироссийские силы, некоторые могут сказать, что это было грубой ошибкой. Однако теперь эта ошибка будет исправлена. Наши войска решительно подавят украинское сопротивление. Вид танков Т-14, въезжающих на киевскую площадь Независимости, положит конец любым надеждам на неповиновение. Более того, Европейский союз должен отказаться от планов использовать Украину в качестве передовой базы для противодействия России."
 SOV_crack_down_on_protests_UR: "Подавить Протесты"
 SOV_crack_down_on_protests_UR_desc: "Надо признать, что настойчивая западная пропаганда затуманила сознание нашей молодежи, особенно московской, петербургской и екатеринбургской, оставив ее растерянной и неспособной отличить добро от зла. Так называемое "пробудившееся поколение", находящееся под влиянием либерализма, следует призывам западных СМИ и выходит на улицы с "антивоенными" протестами. В мирное время мы могли бы закрыть глаза на подобные проявления, возможно, лишь направив полицию для разгона толпы. Но в военное время снисходительность - это роскошь, которую мы не можем себе позволить. Национальная гвардия покончит с их иллюзиями, посадив лидеров протеста в тюрьму, дав понять, что попытки дестабилизировать Россию с помощью общественного мнения будут тщетными."
 SOV_to_serve_russia_UR: "Служить России"
 SOV_to_serve_russia_UR_desc: "Одним из существенных преимуществ огромной территории России является практически неограниченный приток новобранцев в армию. От Мурманска до Владивостока, от полуострова Камчатка до Кавказа юноши и девушки из самых разных слоев населения пополняют ряды армии, что дает России преимущество в живой силе, не имеющее аналогов у любого противника. Для дальнейшего укрепления военного потенциала и поднятия боевого духа солдат на передовой российское правительство намерено принять комплекс мер. Эти меры включают в себя улучшение материального обеспечения семей военнослужащих, увеличение количества медалей, повышение компенсации за потери, а также возможность для выдающихся солдат пройти обучение на старших офицеров. Показывая эти преимущества, правительство надеется вдохновить больше людей служить России."
 SOV_authorize_banned_weapons_UR: "Использовать Всё Что Есть"
 SOV_authorize_banned_weapons_UR_desc: "Масштабы и интенсивность нынешней войны превосходят все конфликты со времен Второй мировой войны - реальность, которую даже самые смелые стратеги времен холодной войны не могли себе представить. Чтобы обеспечить победу и продемонстрировать новейшие достижения наших вооруженных сил, мы развернем новые виды оружия, включая большие ракетные установки, беспилотники и беспилотные боевые машины. На некоторые из этих видов оружия ранее были наложены ограничения из-за возможности нанесения чрезмерного побочного ущерба или нестабильности. Однако теперь, когда эти ограничения сняты, мы можем уверенно использовать их для достижения значительных результатов."
 SOV_operation_rokossovsky_UR: "ОПЕРАЦИЯ: §YСУВОРОВ§!"
 SOV_operation_rokossovsky_UR_desc: "Александр Суворов, несомненно, является одним из самых блестящих полководцев в истории нашей страны. Его кампании на Балканах, в Польше и Италии были настолько успешными, что приводили в трепет самые грозные армии и генералов Европы. Поэтому назвать в его честь последнюю российскую военную операцию - достойная дань уважения. Оборона Эстонии, Латвии и Литвы будет быстро преодолена нашими силами, что нарушит давнюю стратегию НАТО по использованию стран Балтии для сдерживания России."
 SOV_operation_aleksandr_UR: "ОПЕРАЦИЯ: §YЖУКОВ§!"
 SOV_operation_aleksandr_UR_desc: "Мы успешно устранили угрозу со стороны военных сил ЕС на наших границах. Настало время отодвинуть наши границы к Северному морю и Пиренеям. Этот шаг воплощает давнюю мечту патриотов, боровшихся за выживание и величие России: чтобы наша армия вновь стала защитницей Европы, как это было в XIX веке. В память об этой борьбе мы назовем операцию именем маршала Георгия Жукова, легендарного полководца, под командованием которого советская Красная армия взяла Берлин. Пусть его слава вечно сопровождает наши войска!"
 SOV_mobilize_the_chechens_UR: "Мобилизовать Чеченцев"
 SOV_mobilize_the_chechens_UR_desc: "Благодаря усилиям президента Путина чеченцы, некогда грозные противники, стали одними из самых верных союзников Москвы. Хотя Рамзан Кадыров все еще подвергается серьезной критике, пока он продолжает поставлять военным своих опытных бойцов, партнерство будет оставаться крепким. С эскалацией европейской войны пришло время Кадырову взять на себя все обязательства. Отправка чеченских воинов на поле боя, несомненно, приведет в ужас изнеженных солдат Европейского союза."
 SOV_deals_with_oligarchs: "Сделки с Олигархами"
 SOV_deals_with_oligarchs_desc: "У олигархов есть деньги и влияние, чтобы поддержать нашу экономику. Вместо того чтобы национализировать их бизнес, мы должны использовать их зарубежные активы и связи для развития нашей экономики."
 SOV_invest_in_CSTO_members: "Инвестироваться в членов ОДКБ"
 SOV_invest_in_CSTO_members_desc: "Члены нашего альянса, по самым скромным подсчетам, не готовы к крупному конфликту. Фактически, как и европейские друзья США в НАТО, младшие члены ОДКБ ожидают, что мы будем защищать их практически без всякого вклада с их стороны. Этого не будет. \n Мы реорганизуем их вооруженные силы в единую структуру и будем инвестировать в них. В конце концов, у нас есть планы и на них в предстоящем конфликте..."
 SOV_focus_russian_economy: "Усилить Российскую Экономику"
 SOV_focus_russian_economy_desc: "У госкорпораций, при всех их недостатках, есть потенциал. РосАтом - прекрасный тому пример. Корпорация, которая сделала нас крупнейшим экспортером ядерного топлива в мире. Внедрение такой же эффективности во всех наших отраслях будет иметь решающее значение."
 SOV_invest_in_donbas: "Инвестироваться в Донбасс"
 SOV_invest_in_donbas_desc: "Донбасс - очень богатый регион. И хотя из-за войны он находится в экономическом тупике, это не значит, что мы не можем его возродить. Инвестиции в регион дадут ему достаточно средств, чтобы не только окупить себя, но и интегрироваться в нашу экономику."
 SOV_strengthen_serbia_ties: "Укрепление Связей с Сербией"
 SOV_strengthen_iran_ties: "Укрепление Связей с Ираном"
 SOV_nationalize_oligarch_industries: "Национализировать Промышленность Олигархов"
 SOV_nationalize_oligarch_industries_desc: "Если с самими олигархами по разным причинам справиться проблематично, то национализация их отраслей будет гораздо проще. В конце концов, многие из них получили свои должности от правительства. Они должны знать, что бывает с теми, кто идет против нашей воли."
 SOV_merge_tankograd: "Объединить Танкоград"
 SOV_merge_tankograd_desc: "В настоящее время наши танковые заводы разделены между несколькими предприятиями, каждое из которых возглавляет гражданский бизнесмен, не имеющий достаточных знаний о координации. На самом деле, единственная причина, по которой наша военная промышленность сохранилась в таком хорошем состоянии, заключается в том, что бизнесмены решили, что будет проще продать произведенное оружие за границу, чем пустить завод на слом, как многие другие. \n Мы благодарны им за это, поэтому мы заберем у них эти заводы и создадим единый конгломерат по производству танков."
 SOV_invest_education_sector: "Народно-Ориентированная Экономика"
 SOV_invest_education_sector_desc: "Хотя мы могли бы просто сделать то, что сделали Советы в отношении промышленного развития, разве улучшение жизни наших людей не является лучшей альтернативой? Больше денег в экономике и больше местных продуктов, которые они будут готовы покупать. Справедливая зарплата также поможет подняться нашему малому бизнесу, поскольку у наших людей будет больше денег, чтобы тратить их на себя. Россияне заслуживают богатой жизни! И российская экономика тоже этого заслуживает!"
 SOV_invest_scientific_sector: "Ориентация на Промышленное Развитие"
 SOV_invest_scientific_sector_desc: "Нам нужен крупный сектор легкой промышленности, способный конкурировать с иностранными предприятиями. Фабрики должны быть эффективными и в изобилии присутствовать в нашей стране. Мы не можем стать мастерской мира, да. Но мы всегда можем занять нишу, подобную Германии или Японии. Пора тратить все те деньги, которые мы накопили."
 SOV_invest_nulcear_power: "Приоритет Военной Промышленности"
 SOV_invest_nulcear_power_desc: "Как бы нам ни хотелось сосредоточиться на гражданской промышленности, военная должна быть в приоритете. У нас нет ни денег, ни времени, чтобы тратить их впустую. Главная цель России в текущем десятилетии - выжить. Потребление может подождать." 
 SOV_invest_resource_refining: "Приоритет Гражданской Промышленности"
 SOV_invest_resource_refining_desc: "Развитие гражданской промышленности станет большим долгосрочным благом для России. Местные предприятия не только сохранят деньги внутри страны, но и помогут нам в будущем экспортировать нашу продукцию за рубеж. Кроме того, местная промышленность будет вынуждена искать творческие пути преодоления ограниченности трудовых ресурсов. Возможно, это даже приведет к автоматизации наших производств?"
 SOV_subsidize_super_computer_research: "Национальный Проект: "Развитый Урал""
 SOV_subsidize_super_computer_research_desc: "Урал был и остается нашим главным промышленным центром. Именно оттуда наши военные получают оружие. Там расположена наша тяжелая промышленность. И именно там произойдет наша следующая промышленная экспансия."
 SOV_subsidize_medical_research: "Национальный Проект: "Развитие Дальнего Востока""
 SOV_subsidize_medical_research_desc: "Дальний Восток уже давно приглянулся правительству для массового освоения. Еще с советских времен, когда была построена железная дорога БАМ, в этот регион наблюдался массовый приток жителей в новые города. Однако после распада СССР этот регион остается раздробленным и экономически изолированным от остальной части страны. \n Чтобы наши многополярные идеи сработали, мы должны сделать так, чтобы Дальний Восток стал новой экономической опорой России. Пусть Владивосток станет новым Санкт-Петербургом!"
 SOV_invest_in_computing_technology: "Начало Суверенной Экономики"
 SOV_invest_in_computing_technology_desc: "В нашей экономике в основном доминируют государственные корпорации, иностранные конгломераты и "русские" предприятия, зарегистрированные в офшорах. И все же наш президент считает, что мы должны вернуться в индустриальную державу, которой когда-то были. И это его план, которому мы собираемся следовать.Помимо процветающего IT-сектора, мы возродим и создадим новые высокотехнологичные отрасли для нашей страны."
 SOV_attract_chinese_investors: "Привлечение Китайских Инвесторов"
 SOV_attract_chinese_investors_desc: "Как ни печально это признавать, но для полного экономического возрождения нам нужны иностранные инвесторы. И если Европа для нас закрыта, то в Китае, похоже, есть большое количество людей, готовых развивать нашу промышленность.Их средства и связи станут отличным толчком для нашей страны."
 SOV_return_to_gold_standard: "Возвращение к Золотому Стандарту"
 SOV_return_to_gold_standard_desc: "Знаете, мы должны были сделать это уже давно. У нас много хранящегося золота и много рублей, которым нужна твердая почва, чтобы стать сильной валютой. И сейчас, когда мировые рынки реформируются на фоне кризисов, нет лучшей возможности сделать это. Некоторые страны могут жаловаться, но это их проблема."
 SOV_market_regulations: "Ввести Рыночные Правила"
 SOV_market_regulations_desc: "При всех разговорах о "свободном рынке", приоритетом для нас должна быть Россия и только Россия. В условиях приближающегося европейского конфликта мы должны убедиться, что наша экономика работает в основном на отечественную продукцию."
 SOV_send_military_equipment: "Интегрировать Белорусские Гос. Компании"
 SOV_send_military_equipment_desc: "Мы могли бы просто приватизировать белорусскую промышленность, но нужно ли нам это? Система работает уже 30 лет, и мы не можем просто отказаться от нее. Кроме того, оппозиционные кандидаты 2020 года проводили свою кампанию за приватизацию белорусских предприятий или за реорганизацию существующей системы. Неужели мы хотим использовать те же рамки, которые предлагала Змагарская оппозиция? \n\n Не раскачивайте лодку, Беларусь сохранит свою экономическую модель."
 SOV_send_humanitarian_aid: "Приватизировать Белорусские Гос. Компании"
 SOV_send_humanitarian_aid_desc: "Белорусская промышленность неконкурентоспособна на современном рынке. Мы можем сохранить все, как было, но лучше позволить рынку решать, каким отраслям отдать предпочтение в Беларуси. \n\n Батька может ворчать сколько угодно, но экономика важнее."
 SOV_force_petrol_ruble: "Нефтяной Рубль"
 SOV_force_petrol_ruble_desc: "Поскольку и Америка, и Саудовская Аравия втянуты в гражданские войны, перед нами открывается потрясающая возможность получить еще больше прибыли от торговли нефтью. Нефтедоллару пришел конец, и, похоже, у нас есть возможность укрепить свои позиции. \n Люди смеялись над нами за то, что мы "глобальная бензоколонка", называя нас нацией, время которой еще придет. Но пока черное золото горит по всему миру, те же самые критики ползут к нам, чтобы получить хоть каплю наших богатств."
 SOV_support_two_party_system: "Поддержать Двухпартийную Систему"
 SOV_support_two_party_system_desc: "Хотя Единая Россия служила Путину в его начинаниях, всем ясно, что партия была, по сути, "глухими согласными" с президентом. У нее нет ни реальных целей, ни идеологии, и она кишит лоббистами и людьми, которых общественность воспринимает как "выходцев из другого мира". \n\n И хотя причиной падения Америки стала поляризованная двухпартийная система, у нее есть свои достоинства. По сравнению с постоянными европейскими партийными тупиками, которые обездвиживают государство, или с нашим и японским монопартийным статизмом, американская система на протяжении большей части истории была стабильной. Мы будем подражать этой системе, объединив все левые партии в одну, фактически сделав ее левоцентристской благодаря СР-ЗП и Миронову. Мы, тем временем, возьмем кадры ЛДПР и перестроим себя в правоцентристскую партию. \nУ обеих партий будут схожие программы и внешняя политика, что обеспечит им возможность сотрудничать друг с другом по ключевым вопросам. \n\n Америка горит в расколе, но было время, когда кандидаты могли без проблем вести кампанию от любой партии (а в некоторых комичных случаях и от обеих одновременно). Это то, что мы должны повторить. Социалисты, националисты, все мы - русские. Мы никогда не должны забывать об этом."
 SOV_loosen_media_restrictions: "Ослабить Ограничения для СМИ"
 SOV_loosen_media_restrictions_desc: "Несмотря на то, что наш будущий конфликт с Европой не за горами, мы понимаем, что дать людям возможность высказаться в СМИ очень важно. Ослабив ограничения на то, о чем можно и о чем нельзя говорить в СМИ, мы сделаем их удобным местом для дискуссий и критики \n Россияне должны быть открыты для высказывания своего мнения, ведь именно в этом и заключается свобода. Конечно, как и в любой свободной стране, у нас будет свобода выбора, какие вопросы мы будем затрагивать, а какие игнорировать."
 SOV_enact_anti_corruption_laws: "Новые Законы о Борьбе с Коррупцией"
 SOV_enact_anti_corruption_laws_desc: "Как бы нам ни хотелось считать нашу систему совершенной, мы не можем отрицать, что в ней есть много плохих элементов. И хотя мы всегда можем просто игнорировать эту проблему, наш президент считает, что сейчас не время для безделья. Воровство триллионов рублей каждый год было проблемой в предыдущие годы. Теперь это неприемлемо. \n\n Мир движется к радикальным изменениям. Мы не можем полагаться на людей, которые рассматривают нашу страну как простую работу по обналичиванию денег с их особняками в Европе и на Ближнем Востоке. У России нет денег, чтобы тратить их впустую в предстоящей борьбе, потому что огонь продолжает гореть."
 SOV_secure_oligarch_loyalty: "Обеспечение Лояльности Олигархов"
 SOV_secure_oligarch_loyalty_desc: "Олигархи остаются влиятельной группой в нашем обществе. Хотя мы можем обойти их интересы благодаря тому, что они в значительной степени подневольны, ясно, что мы не можем просто оставить их в покое, если хотим когда-нибудь добиться победы над Европой\n\n Мы не будем требовать от них многого. Их яхты, виллы и богатства могут остаться. До тех пор, пока они будут показывать результаты и поддерживать нас всем сердцем. \n\n Российская элита всегда хотела, чтобы ее считали частью "глобальной" партии миллиардеров. Но то, что мы предлагаем, гораздо грандиознее. Перспектива владеть экономикой целого континента в своих интересах... под нашим присмотром и контролем. Они будут глупцами, если не согласятся."
 SOV_amend_the_constitution: "Обновление Конституции"
 SOV_amend_the_constitution_desc: "Нынешняя конституция, к сожалению, не соответствует представлениям президента о том, как должна функционировать идеальная Россия.\n В ней много неопределенностей и лазеек, которыми могут воспользоваться недоброжелатели. Такой конституции было достаточно, когда у руля стоял Путин, ведь его влияние и решения могли надежно держать систему в узде. \n\n Однако что произойдет, если президентское кресло займет человек, не обладающий способностями Путина или Медведева? Смогут ли они переступить через эти конкурирующие интересы, или они будут сметены ими, став не более чем фигурантами для силовиков и крупного бизнеса? \n\n Наша система должна быть отлажена, и для этого потребуется ее полная перестройка."
 SOV_refine_the_constitution: "[SOV_refine_the_constitution]"
 SOV_refine_the_constitution_desc: "Хотя в нынешней конституции есть некоторые проблемы, президент решил, что простых поправок и изменений будет достаточно для решения текущих вопросов. Да, наша система была построена на этой основе. Но мы всегда использовали неформальные связи для достижения своих целей, когда сталкивались с подобными проблемами. \n\n Американская и европейская демократии тоже сталкиваются с подобными проблемами, но они не переписывают свои конституции полностью. В нашем стремлении к изменениям мы не можем ослеплять себя наивным идеализмом. Изобретать колесо заново нет необходимости, пока будущие администрации изучают прошлые ошибки, как местные, так и зарубежные."
 SOV_refine_the_constitution_loc: "Поправки в Конституцию"
 SOV_reinforce_putin_constitution: "Укрепить Путинскую Конституцию"
 SOV_celebrate_putins_legacy: "Восхвалять Наследие Путина"
 SOV_celebrate_putins_legacy_desc: "Мы помним, как запад писал о нас в 2000 году. "С Россией покончено" - такие они делали заявления. Но посмотрите, что происходит сейчас. Мы уничтожили Семибанкирщину, мы приручили Кавказ. Мы вернули Крым и готовимся вместе с нашими союзниками завершить освобождение Донбасса. Наконец-то мы снова выступили против Запада, как феникс, восставший из пепла. \n И кого мы можем поблагодарить за это? \n Владимира Владимировича Путина. И это его наследие мы будем бережно хранить."
 SOV_church_support: "Поддержка Патриарха"
 SOV_church_support_desc: "С тех пор как церкви было разрешено практиковать в открытую, она преобразилась. Святые отцы больше не являются отставными ветеранами-афганцами, которые самостоятельно восстанавливают церкви, одновременно борясь с ростом западных сект христианства, а также с буквальными культами. С помощью Путина церковь многое обрела, хотя и не может вернуться к дореволюционным годам. \n\n Православие было основой нашего народа, и его поддержка придаст Медведеву больше легитимности, одновременно подрывая тот имидж, который он имел во время своего первого срока."
 SOV_a_new_republic: "Новая Федерация"
 SOV_a_new_republic_desc: "За последние 40 лет Россия сильно изменилась, но она изменится еще раз. Путинская технократия стабилизировала нашу страну, но и она не может длиться вечно. Благодаря новым реформам Россия становится на путь демократии, схожей с идеалами царской эпохи. \n\n В отличие от нестабильной системы 90-х годов, мы не будем марионетками других стран. Мы не будем демонизировать ни царскую, ни советскую эпохи, которые дали нам так много. Наша история - это священная мантия, и демократия, которую мы построим, будет новой эрой в ней. \n\n Вперёд, Россия!"
 SOV_focus_resource_exploitation: "Сосредоточиться на Эксплуатации Ресурсов"
 SOV_focus_resource_exploitation_desc: "Как бы нам ни хотелось стать такой же промышленной державой, как Китай, к сожалению, у нас нет ни ресурсов, ни рабочей силы для этого. Именно поэтому мы должны сосредоточиться на добыче ресурсов. В то время как наша растущая промышленность будет обслуживать внутренний рынок, ресурсы, которые мы добываем, будут экспортироваться повсюду,\n Кроме того, сейчас, когда мир находится в таком хаотичном состоянии, мы являемся одним из единственных стабильных экспортеров энергии."
 SOV_industrial_expansion: "Промышленная Экспансия"
 SOV_industrial_expansion_desc: "В то время как экономические стимулы после 2014 года оживили наш сельскохозяйственный сектор, наш промышленный сектор продолжает переживать спад. Однако в условиях, когда Америка горит, Европа враждует, а Азия, похоже, готовится к большой войне, мы не можем полагаться ни на кого, кроме себя. \n Нам нужно, чтобы наша промышленность могла покрыть большинство наших местных потребностей. Русская промышленность для русского народа."
 SOV_regulate_trade_unions: "Российская Космическая Экономика"
 SOV_regulate_trade_unions_desc: "Гражданская война в США должна была положить конец коммерческой космонавтике, но, похоже, на самом деле она привела к ее росту. В то время как Китай и Россия остаются основными производителями ракет, Европа и Азия, похоже, используют кадры NASA и коммерческой космонавтики для создания собственных программ. \n На данный момент наблюдается не только бум производства спутников, но и разработки в области добычи астероидов, которых никогда раньше не было. \n Мы должны оседлать эту волну, ведь наше выгодное положение делает нас одним из главных бенефициаров нового космического рынка."
 SOV_defense_industry_expansion: "Поддерживать Экономический Солидаризм"
 SOV_defense_industry_expansion_desc: "Долгое время бизнесмены в России мало заботились о рабочем. Платили ему очень дешево или заменялись мигрантами. Не предоставляя ему обещанных льгот.\nНо теперь, когда у нас не хватает людей и специалистов, у них нет другого выбора, кроме как идти на поводу у масс, чтобы выжить. Более высокооплачиваемый работник лучше для страны и должен поощряться."
 SOV_land_reforms: "Провести Прогрессивные Налоговые Реформы"
 SOV_land_reforms_desc: "Прискорбная реальность заключается в том, что нам нужно гораздо больше денег. К счастью, у нас есть много денег, которые спрятаны в кошельках наших политиков и бизнесменов. Проведя прогрессивную налоговую реформу, мы обеспечим стабильный приток денег в нашу казну."
 SOV_trade_unions: "Поощрять Профсоюзы"
 SOV_trade_unions_desc: "Как бы мы ни гордились нашим советским наследием, профсоюзы остаются редкостью в нашей промышленности. Это позволяет бизнесменам не платить нашим рабочим достаточно, что приводит к ухудшению ситуации в обществе. Развивая профсоюзы, мы также сможем контролировать корпорации и их владельцев, чтобы они не перегибали палку."
 SOV_centralize_power: "Централизация Власти"
 SOV_centralize_power_desc: "Единая Россия - это четкий центр власти нашего правительства, но остальные партии все еще продолжают двигаться полунезависимо. Для нашей борьбы мы должны действовать как единое целое. Используя платформу "Народного фронта", мы сможем создать коалицию из всех основных российских партий, чтобы открыто выступать под знаменем ЕР. \n На каждом заседании Думы мы видели, как ЕР и другие партии препираются между собой. Коалиция позволит нам сгладить разногласия и двигаться как единый организм."
 SOV_protect_russian_economy: "Защитить Российскую Экономику"
 SOV_protect_russian_economy_desc: "Наш поворот к свободной торговле и иностранным инвестициям был ошибкой. Российскую экономику наводнили не только иностранцы, скупающие предприятия, но и иностранная продукция, превосходящая отечественную. Хотя иностранные инвесторы могут остаться, мы будем отдавать предпочтение местным компаниям и защищать их от иностранных. Наша цель - быть самодостаточными и ориентированными на экспорт."
 SOV_build_up_air_and_sea_fleets_UR: "Наращивать Воздушный и Морской Флоты"
 SOV_healthy_conservatism_to_europe: "Здоровый Консерватизм в Европу"
 SOV_healthy_conservatism_to_europe_desc: "Нынешние европейские сателлиты уничтожили большую часть своего глобалистского влияния. Однако вопрос остается открытым: Что придет ему на смену?\n\nМы решили пока создать консервативные партии. Слишком большое количество партий может подорвать усилия по восстановлению и разозлить народ. Лучше не раскачивать лодку."
 SOV_european_political_birdcage_experiment: "Европейская Политическая Птичья Клетка"
 SOV_european_political_birdcage_experiment_desc: "Нынешние европейские сателлиты уничтожили большую часть своего глобалистского влияния. Однако вопрос остается открытым: Что придет ему на смену?\n\nХотя мы можем заставить эти государства принять наши ценности, почему бы не поэкспериментировать? Соберём всех, кого сможем, независимо от идеологии, и создадим им равные условия. Единственным условием их участия будет дружественная позиция по отношению к нам.\n\nПусть Европа освободится от неолиберальной тирании. Мы создадим гобелен из партий, предоставив нашим европейским партнерам право выбрать ту, которая подходит им больше всего!"
 SOV_medvedev_doctrine: "Доктрина Медведева"
 SOV_medvedev_doctrine_desc: "С нашей новоприобретенной сферой влияния неизбежно возникает вопрос: как нам поступать с администрациями, которые отказываются от Русского мира? За последние годы мы видели много таких случаев, особенно во времена Путина. Мы были слишком вялыми в наших усилиях и попытках "мягкой силы" и позволили нашим "союзникам" использовать нас за бесплатные деньги, не выполняя на самом деле свою часть сделки.\n\nНаш Великий Президент не считает это разумным. Россия любыми способами будет следить за тем, чтобы ее инвестиции в партнеров окупались. Как и во времена Брежнева, любая попытка саботировать единство ОДКБ и выйти из альянса будет пресечена нашими (и местными) силами. Любовь победила, и мы позаботимся о том, чтобы любящие объятия нашего русского мира были вечными."
 SOV_novorussian_integration: "Возрождение Новороссии"
 SOV_novorussian_integration_desc: "Земля, ради которой мы пожертвовали столь многим. Она была избита и окровавлена. Промышленность разрушена, земля выжжена. Эта драгоценность, с которой началась индустриализация Российской империи, а затем и Советского Союза, возродится вновь. Жертвы, которые понесли наши патриоты на Донбассе, могут быть отплачены только процветанием всего региона."
 SOV_new_territories: "Закрепить Новые Территории"
 SOV_new_territories_desc: "Благодаря нашей Победе мы не только освободили постсоветское пространство от глобализма, но и захватили большую часть территорий бывшего Варшавского договора. Пока наш контроль в лучшем случае шаткий: многие по-прежнему относятся к нам с недоверием. Мы должны создать постоянную базу поддержки в этих регионах. Огорченные ветераны войны, политические оппортунисты, настоящие союзники - все эти местные кадры, наряду с постоянной военной миссией, будут использоваться для восстановления нормальной гражданской жизни в этом регионе."
 SOV_russian_victory: "Победа!"
 SOV_russian_victory_desc: "Когда пушки затихли, мы обнаружили, что наступил рассвет новой эры. Наши цели реализованы: глобалистская угроза отброшена на запад и разбита. Надеемся, в обозримом будущем они не будут представлять для нас угрозы. Эта победа досталась нам дорогой ценой, и теперь освобожденные нами территории нуждаются в восстановлении. Прекрасное время, чтобы замедлить темп и сосредоточиться на наших людях."
 SOV_new_age_ukraine: "Новая Эра для Украины"
 SOV_new_age_ukraine_desc: "После стольких кровопролитий Украина оказалась под нашим контролем. Националистов выслеживают в сельской местности, но ненависть к нашему правительству все еще сохраняется. Пришло время двум славянским сестрам воссоединиться и забыть о том ущербе, который глобалисты нанесли нашим отношениям.\n\n"Мы никогда больше не будем братьями", - кричит бандеровец, но мы не слышим его визга. Наши украинские братья получат то, что им нужно для возрождения."
 SOV_glorify_veterans: "Прославлять Ветеранов"
 SOV_glorify_veterans_desc: "Сотни тысяч наших граждан участвовали в войне против НАТО. Они - наши герои, наша гордость и душа нашей нации. Мы не должны бросать их после выполнения своих обязанностей. Будь они здоровыми или инвалидами, богатыми или бедными - мы позаботимся о том, чтобы они смогли адаптироваться к гражданской жизни. Пусть наших солдат встречают как героев!"
 SOV_rebuilding_period: "Период Восстановления"
 SOV_rebuilding_period_desc: "По мере того как мы отходим от экономики войны, пришло время взглянуть в лицо слону в комнате: нам предстоит восстановить буквально полконтинента.\n\nГоворят, Советский Союз справился с этим, так что и мы должны быть в состоянии сделать это. Россия, скорее всего, будет первым регионом для восстановления, учитывая, что она понесла наименьший ущерб."
 SOV_rebuild_new_allies: "Восстановление Европейских Союзников"
 SOV_rebuild_new_allies_desc: "Наши союзники тоже пострадали. Ради наших будущих планов мы должны позаботиться о том, чтобы они вовремя оправились от этих разрушений. СССР однажды сумел восстановить Восточную Европу, когда треть ее богатств исчезла, а 20 миллионов погибли. Мы, несомненно, сможем сделать то же самое."
 SOV_rebuilding_affected_regions: "Восстановление Наиболее Пострадавших Регионов"
 SOV_rebuilding_affected_regions_desc: "Кровавые поля сражений этой войны должны стать пережитком прошлого. Украина, Прибалтика, Белоруссия: эти территории будут возрождены к своей былой славе. Поля будут очищены от мин и частей беспилотников. Русский мир снова будет процветать!"
 SOV_russian_products_to_west: "Создание Российской Промышленности на Западе"
 SOV_russian_products_to_west_desc: "Отличный способ ускорить восстановление наших союзников - интегрировать их в нашу экономику. Дешевые ресурсы и энергия станут первоначальным толчком к их развитию. Они также могут стать хорошим свободным рынком для нашей продукции. В конце концов, наша промышленность не была разрушена во время войны, так что мы могли бы создать родственные компании в Европе, чтобы помочь нашим друзьям там."
 SOV_our_common_future: "Поощрять Европейскую Промышленную Самостоятельность"
 SOV_our_common_future_desc: "Хотя мы и хотим расширить свое экономическое влияние на Европу, было бы глупо не позволить им развивать собственную промышленность. Дешевая энергия и цены на топливо, которые обеспечивают наши корпорации, позволят им восстановить собственную промышленность.  Наши союзники станут не экономическим бременем, а нашими надежными партнерами!"
 SOV_russian_european_union: "Введение Рублевой Зоны"
 SOV_russian_european_union_desc: "Одна из последних реформ по восстановлению Европы - создание единого рынка между нашими странами. По аналогии с прежним ЕС мы создадим рублевую зону. Никто не сможет нам отказать, поскольку наши деньги необходимы для великого восстановления. И, в отличие от старого Европейского союза, мы не будем вмешиваться в их культуру!"
 SOV_european_economic_restructurization: "Реструктуризация Европейских Экономик"
 SOV_european_economic_restructurization_desc: "Завершая восстановление экономик наших союзников, мы должны убедиться, что наше влияние в них со временем не ослабнет. Наши экономики будут заполнять пустоты друг друга, и так же, как Америка с ее планом Маршалла, мы будем держать Европу в своём кармане.
 SOV_european_allies_modernisation: "Стандартизация Европейских Армий"
 SOV_european_allies_modernisation_desc: "Наши новые европейские союзники в настоящее время имеют вооруженные силы с большим количеством оборудования НАТО в стандартной комплектации. Хотя в некоторых случаях вооружение времен Варшавского договора еще сохраняется, нынешняя ситуация заставляет нас сосредоточиться на реформах. Любое западное оборудование должно быть отменено и заменено российскими или местными аналогами.\n\nОДКБ может и не новое НАТО на данный момент, но вскоре им станет."
 SOV_start_multipolar_world: "Начало Многополярного Мира"
 SOV_start_multipolar_world_desc: "После того как ОДКБ превратилась в долгосрочный союз, а экономики от Польши до Таджикистана объединились, нам пора вернуться на мировую арену.\n\nРусский мир, каким бы великим он ни был, не единственный блок, существующий в мире.\n\n Будь то Азия, Африка или Америка, есть много региональных игроков со своими потребностями и целями, которые поднялись в отсутствие Соединенных Штатов.\n\nНаша задача - ориентироваться в этой новой реальности."
 SOV_future_russia: "Будущее России"
 SOV_future_russia_desc: "Мы наконец-то достигли своих главных целей. И за время восстановления возник вопрос: что нам делать дальше? Каково наше предназначение в мире, и как будет развиваться наша система после победы?\n\nНаш великий президент Дмитрий Медведев тоже задается этим вопросом. Он выражает удовлетворение достигнутыми результатами, но всем понятно, что он устал от своих обязанностей. Неудивительно: перестройка России в соответствии со своим видением и война с НАТО вымотали бы любого лидера.\n\nА теперь, похоже, он снова будет определять ход нашего будущего."
 SOV_towards_multipolarity: "Путь к Многополярности"
 SOV_towards_multipolarity_desc: "Поскольку Америка находится в состоянии гражданской войны, наконец-то пришло время начать эру многополярности. Россия, очевидно, не может быть гегемоном. По сути, со стороны Советов было глупо даже пытаться претендовать на столь обременительное звание. Однако мы довольствуемся тем, что являемся лишь одним из многочисленных столпов власти.\n\nЗачем быть мировым полицейским, если можно просто поощрять региональных игроков, чтобы они выполняли эту задачу за вас?"
 SOV_american_policy: "Америка в Огне"
 SOV_american_policy_desc: "Пока Америка горит, у нас есть шанс попытаться перестроить наши отношения. Западная Европа посылает помощь Американскому Союзу, будь то "добровольцами" или военной помощью. Почему мы должны быть другими? Существует довольно много группировок, которые могут быть выгодны России, когда они захватят власть в стране. Будь то региональные сепаратисты или изоляционисты, у них есть наша поддержка."
 SOV_brics: "БРИКС+"
 SOV_brics_desc:  "БРИКС - это хорошая возможность донести наше видение. После того как США покинули вакуум, мы теперь можем взять на себя его роль. Группа должна стать настоящим экономическим клубом. Не сферой, подобной Еврозоне или АСЕАН, а нейтральной платформой для взаимного развития.\n\nКонечно, учитывая, что Индия и Китай не заинтересованы в развитии этой платформы, закрепить ее должны мы. "
 SOV_dragon_sun: "Дракон и Восходящее Солнце"
 SOV_dragon_sun_desc: "Очевидно, что китайско-японские конфликты станут темой этого десятилетия. Будь то стычки за Тайвань или прокси-войны и перевороты, напоминающие о холодной войне, две азиатские державы создают коалиции для возможного конфликта. И в этом конфликте наша позиция будет иметь решающее значение для одной из двух сторон.\n\nПо правде говоря, мы не в восторге от перспективы выбора одного из двух экономических блоков.Китай, который является промышленной и технологической державой, или Япония, несостоявшийся экономический гегемон, который все еще может надавить на свой вес и даже возродить часть своего влияния благодаря уходу Америки.\n\nВ любом случае, наша политика в отношении Азии будет заключаться в лавировании между этими двумя блоками. Честно говоря, если бы мы могли торговать и с теми, и с другими, это был бы идеальный сценарий."
 SOV_brics_expand: "Расширение БРИКС+"
 SOV_brics_expand_desc: "Конечно, чтобы наш план по созданию БРИКС сработал, мы должны расширить его еще больше. Чтобы получить максимальную выгоду от этого расширения, мы должны отдать предпочтение тем странам, с которыми мы дружим. Вскоре БРИКС+ станет по-настоящему глобальной платформой взаимного развития!"
 SOV_dawn_of_africa: "Рассвет Африки"
 SOV_dawn_of_africa_desc: "Африка - континент будущего. Хотя войны, изменение климата и медленные темпы урбанизации не позволяют ей расти так же быстро, как Восточной Азии в прошлом веке, у нее есть население и ресурсы, необходимые для совершения этого скачка. Они почти наверняка займут центральное место во второй половине этого века.\nРастущие африканские рынки открывают для нас новые возможности.Мы можем не только получить союзников в этом регионе, но и потребительскую базу, которую наша промышленность редко видела.\nЭто, конечно, инвестиции в будущее, ведь даже если они перерастут нас, деньги, которые мы получим от их развития, будут огромными."
 #post-med elections
 SOV_medvedev_russian_elections: "Новые Выборы!"
 SOV_medvedev_russian_elections_desc: ""
 SOV_people_russia_chosen: "За Народ!"
 SOV_pink_sunset: "Розовый Закат"
 SOV_med_red_dawn: "Красный Рассвет"
 SOV_for_new_socialism: "За Новый Социализм!"
 SOV_democratization_capital: "Демократизация Капитала"
 SOV_social_populism: "Социальный Популизм"
 SOV_united_russia_chosen: "За Единство!"
 SOV_medvedev_path: "Видение Медведева"
 SOV_people_program: "Программа Нашего Народа"
 SOV_future_your_hands: "Будущее в Ваших Руках!"
 #ur reformists
 SOV_united_russia_victory: "Победа Единой России"
 SOV_united_russia_victory_desc: "Неудивительно, что партия президента снова победила.\n\nХотя он больше не руководит нашей партией, мы должны придерживаться курса, который он проложил. Подтверждать наши убеждения с легкой руки и здоровым традиционализмом. Мы - авангард многополярного мирового порядка, так давайте же покажем всему миру, что мы не отступим от ЕГО видения!" 
 SOV_enshrine_medvedev_constitution: "Закрепить Конституцию Медведева"
 SOV_enshrine_medvedev_constitution_desc: "Конституция Медведева - документ, который не нуждается в представлении. Совершив революцию в российском правительстве, она ясно показала всему миру, что мы, несмотря на все наши проблемы, являемся демократией самого высокого уровня.\n\nЕсли уж на то пошло, мы должны праздновать ее так же, как американцы праздновали свою конституцию. Пусть она будет светом, который направляет будущих лидеров России!" 
 SOV_uphold_two_party_system: "Поддерживать Двухпартийную Систему"
 SOV_uphold_two_party_system_desc: "Переход к двухпартийной системе, хотя поначалу и вызывал споры, в итоге стал очень хорошим изменением. Мы создали два блока в нашем правительстве, которые согласуются с народом, и, в отличие от американской системы, у них достаточно общей идеологической базы, чтобы не превратиться в лево-правую склоку. Давайте сдержим наши обещания и убедимся, что эта система выживет." 
 SOV_government_reforms: "Правительственные Реформы"
 SOV_government_reforms_desc: "Хотя мы уже совершили революцию в нашей системе, очевидно, что нам необходимо провести еще больше реформ. Залатать дыры в системе, убрать законы 90-х и 00-х, которые уже не работают или работают откровенно против правительства. Пора вычистить все!" 
 SOV_strength_in_discussion: "Сила в Дискуссии"
 SOV_strength_in_discussion_desc: "Хотя мы подражаем американской двухпартийной системе, мы не будем следовать их судьбе. Наши люди имеют разные мнения и голоса, и мы сделаем так, чтобы вместо идеологических препирательств, которые никому не помогают, наши политики больше внимания уделяли реальным законам и программам. Российское общество будет защищено от проникновения наиболее радикальных элементов в широкие слои населения. И правая, и левая экономические системы полезны для нас, и это наше право - использовать их, когда мы считаем нужным." 
 SOV_inter_party_cooperation: "Межпартийное Сотрудничество"
 SOV_inter_party_cooperation_desc: "Как уже говорилось, две партии должны сотрудничать ради общего блага. Мы не должны увязнуть в конфликте "мы против них" в Думе. Мы должны поощрять наших политиков сотрудничать друг с другом по вопросам, в которых они находят общий язык. Не нужно слишком сильно поляризовать наши взгляды."
 SOV_a_healthy_patriotism: "Здоровый Патриотизм"
 SOV_a_healthy_patriotism_desc: "Раньше мы полагались на старых "политтехнологов", чтобы создать "патриотический" посыл в нашем обществе. Как вы можете догадаться, это почти всегда приводило к обратному результату и ни к чему. Как ни странно, хотя россиянам могла не нравиться наша бюрократическая система, именно их патриотические инициативы и посылы снизу вверх поддерживают нашу страну.\n\nДавайте спонсировать и поддерживать патриотические инициативы, созданные самими россиянами, потому что они явно работают."
 SOV_culture_of_anti_corruption: "Культура Борьбы с Коррупцией"
 SOV_culture_of_anti_corruption_desc: "Бюрократов и политиков долгое время считали... не очень порядочными людьми. Крупные коррупционные дела чуть ли не каждый месяц, среди которых попадались и те, кто был пойман, долгое время были нормой. Но с приходом к власти Медведева и европейской войны стало ясно, что терпеть эту проблему больше нельзя. У нас нет лишних денег, так почему же мы должны спускать коррупционные обвинения с рук?"
 SOV_russian_conservative_values: "Российские Консервативные Ценности"
 SOV_russian_conservative_values_desc: "В душе мы консервативная нация. С этим согласны и левые, и правые в нашей стране. Так почему же мы должны быть какими-то другими? Хотя у нас были некоторые трюки по либерализации нашей культуры, деградация социальных ценностей на Западе и в некоторых частях нашего собственного общества не может продолжаться."
 SOV_united_in_common_history: "Объединенные Общей Историей"
 SOV_united_in_common_history_desc: "Имперская, Советская и Новая Россия это три эпохи которые являются частью нас. И хотя западных людей шокирует, что мы не избегаем ни одного из этих периодов, мы понимаем, что забывать свое прошлое вредно. Как были ошибки, как легкие, так и дорогостоящие, так было и много триумфов и уроков, которые мы можем взять на вооружение. Три флага будут развеваться в унисон!"
 SOV_sovereign_democracy_perfecting: "Совершенствование Суверенной Демократии"
 SOV_sovereign_democracy_perfecting_desc: "Процесс, с помощью которого мы проводим выборы, хотя и неплох, но все же далек от идеала. Прозрачность, общественные гарантии - вот лишь некоторые вещи, которые нам еще предстоит решить. Хорошим началом было бы сделать наши технологии цифрового голосования более прозрачными, а также предоставить кандидатам больше времени на предвыборную кампанию."
 SOV_country_of_the_sun: "Страна Солнца"
 SOV_country_of_the_sun_desc: "Луч солнца золотого\nТьмы скрыла пелена\nИ между нами снова\nВдруг выросла стена\nНочь пройдёт, наступит утро ясное\nЗнаю, счастье нас с тобой ждёт\nНочь пройдёт, пройдёт пора ненастная\nСолнце взойдёт\nСолнце взойдёт\n"
 #hardliners ur
 SOV_hardliners_victorious: "Победа Реакционеров"
 SOV_hardliners_victorious_desc: "Дмитрий Медведев долгое время после своего первого президентства был лидером Единой России. Во время своего второго президентства он реформировал партию власти в нечто более осознанное - правую из двух крупнейших сил в российской политике. Разрушение доминации Единой России и её некоторую демократизацию российский народ встретил с облегчением и радостью.\nНо несмотря на все его реформы, внутри ЕдРа ещё остались старые бюрократы, деятели ещё путинской власти. Они желают, несмотря ни на что, откатить российскую политику до состояния начала десятилетия, сохранить путинское наследие.\nВот только удастся ли им провернуть мясорубку назад, вернуть бывалую силу? Или же реформисты сметут последние остатки авторитаризма с политической сцены? Покажет только время."
 SOV_adjust_constitution_articles: "Корректировать Статьи Конституции"
 SOV_adjust_constitution_articles_desc: "Текущая Конституция хоть и имеет путинский фундамент, но в неё были внесены медведевские дополнения, приведшие к текущей политической системе. Конечно, в ней ничего нет плохого, но неопределенность в некоторых моментах может привести к непредвиденным последствиям. Необходимо немного подкорректировать статьи конституции по путинскому образцу. Сильная власть - сильная Россия!"
 SOV_subdue_two_party_system: "Подчинить Двухпартийную Систему"
 SOV_subdue_two_party_system_desc: "Наиболее заметным результатом медведевских реформ стала новая двухпартийная система, вдохновленная американской и британской системами. Хоть это и является хорошим противодействием авторитарным тенденциям, но вносит нестабильность в систему. Вон, взгляните на Америку! До чего её довела двухпартийность? До развала, братоубийственной войны!\nДа и к тому же российский народ не привык к такому, и его слабость могут эксплуатировать наши враги! От двухпартийности необходимо избавиться...\nВ пользу Единой России, конечно."
 SOV_technocratic_administration: "Технократическая Администрация"
 SOV_technocratic_administration_desc: "Путинская система держалась на так называемых "Башнях Кремля" - различных кликах и группировках бюрократического аппарата со своими идеями устройства России. Среди них были как представители силовых структур, так и так называемые "Технократы" - более прагматичные хозяйственники, связанные с государственными корпорациями.\nНесмотря на то, что многие из них стали сторонниками реформ, мы можем переманить их высокими постами. Их способности нельзя игнорировать."
 SOV_strengthen_executive_power: "Усилить Исполнительную Власть"
 SOV_strengthen_executive_power_desc: "Медведевские реформы ослабили главную силу путинского периода: исполнительную власть. Инициатива перешла от аппарата президента в Госдуму, к партиям, что может породить нестабильность.\nПо заветам Владимира Владимировича мы вновь усилим власть центра, отодвинув партии на второй план. Только с сильным силовым аппаратом наш народ сможет спокойно развиваться!"
 SOV_improve_bureaucratic_management: "Улучшить Бюрократическое Управление"
 SOV_improve_bureaucratic_management_desc: "Современную российскую власть преследует раздутость и неэффективность её бюрократического аппарата. Население изнывает от абсурда, который происходит в госучреждениях.\nС этого момента вносится система оценки эффективности каждого отдельного бюджетника: от учителя до главы района, на всех уровнях. Муниципальные власти будут поставлены под контроль центра."
 SOV_promote_russian_nationalism: "Продвигать Русский Национализм"
 SOV_promote_russian_nationalism_desc: "Долгие годы "национализм" громили в нашей стране, предпочитая ему доктрину "дружбы народов". Из-за этой политики в нашу страну нахлынули толпы нелегальных мигрантов, и вкупе с активностью либералов создала определенную нестабильность.\nНеобходимо продвигать здоровый русский национализм: не ненависть к другим, а любовь к своей Родине. Нас всех объединяет Россия и её культура - так давайте ценить и крепить эту связь!"
 SOV_safeguard_putin_vision: "Защитить Видение Путина"
 SOV_safeguard_putin_vision_desc: "За последнее время фигура Владимира Владимировича Путина немного отошла от российской политической сцены. Всяческие "гослибералы" и прочие призывают отказываться от путинского наследия, аккуратно критикуя его правление, что идёт на руку нашим врагам на Западе.\nПутинский период был эпохой, без которой невозможно представить современную Россию. Избавиться от него - значит утратить саму суть нашей страны.\nИменно поэтому и создан Нео-Путинизм - отображение видения Владимира Владимировича на современные российские реалии. Благодаря нему мы всё получили, и он продолжается в нас!"
 SOV_protect_russian_legacy: "Защитить Наследие России"
 SOV_protect_russian_legacy_desc: "Там, на Западе, восходит гидра. Гидра глобализма, русофобии, неолиберализма - всего, против чего мы боремся. Не время расслабляться, играть в демократические игрушки: необходимо консолидироваться вокруг нашей общей страны, России и её наследия, истории.\nОт Рюрика до Путина, тянется нить, связующая нас всех: от Камчатки до Калининграда, от Мурманска до Дербента. Мы должны хранить эту нить во что бы то не стало!"
 SOV_raise_public_conservatism: "Повысить Общественный Консерватизм"
 SOV_raise_public_conservatism_desc: "Медведевское правление хоть и прошло под знаменем "консерватизма", но западного образца, который за долгие годы почти слился с либерализмом в своих идеях. Учитывая, что "консервативный" сентимент существует и на Западе, можно предположить, что они будут так или иначе влиять на нашу страну.\nИменно поэтому надо повышать наш, русский консерватизм, без заигрываний с западными идеями. Идеальным вариантом представляется правление Путина - вот он был настоящим консерватором, не копирующий наших врагов!"
 SOV_new_kremlin_democracy: "Новая Кремлевская Демократия"
 SOV_new_kremlin_democracy_desc: "Всё новое - хорошо забытое старое.\n\nДвухпартийная система окончательно себя дискредитировала, не смогла оправдать чаяний русского народа. Две партии не способны отобразить весь спектр идей народных масс. Именно поэтому в Госдуме теперь установился порядок, похожий на старую систему: доминирующая партия власти и множество других, неспособных создать большинство. Таков натуральный порядок вещей."
 SOV_russia_destiny: "Предназначение России"
 SOV_russia_destiny_desc: "Через тернии к звёздам\nЧерез радость и слёзы\nГордо реет над нами\nНашей Родины знамя.\n\nГоловы вверх гордо поднять за тебя, Родина-Мать!\nМы до конца будем стоять за тебя, Родина-Мать!\nМы будем петь, будем гулять за тебя, Родина-Мать!\nИ за страну трижды "Ура!"\nЗа тебя, Родина!"
 #pr moderate
 SOV_people_russia_victory: "Победа Народной России"
 SOV_people_russia_victory_desc: "Всё к этому шло: усилия по построению суверенной демократии наконец оправдали себя! И народ России сделал свой выбор в пользу "Народной России" - партии, обещающей ему лучшее и беззаботное будущее. Настало время доказать, что люди нашей страны заслуживают лучшего. Теперь мы всей страной приступаем к масштабным преобразованиям во имя процветания и стабильности."
 SOV_constitutional_reforms: "Конституционные Реформы"
 SOV_constitutional_reforms_desc: "Период правления Медведева запомнился стране масштабным структурным обновлением государственной системы, включавшим в себя множество реформ и преобразований. Было бы неверно полностью перечеркивать все эти усилия по созданию институтов, которые в целом доказали свою эффективность. В то же время, определённый смысл имеют и небольшие конституционные поправки, направленные на защиту прав и свобод граждан, ведь их реализация была одним из ключевых обещаний Народной России."
 SOV_harmonize_the_society: "Гармонизировать Общество"
 SOV_harmonize_the_society_desc: "В Советском Союзе полагали, что будущее - за идеями коллективизма. Однако история показала, что это было заблуждением, и возврат к ним сегодня был бы, как минимум, нелогичен. В то же время неоспоримым остаётся тот факт, что народ России всегда преодолевал трудности благодаря сплочённости. Именно поэтому сегодня необходимы целенаправленные усилия по построению гармоничного общества, свободного от внутренних раздоров и противоречий."
 SOV_slash_business_influence: "Сократить Влияние Бизнеса"
 SOV_slash_business_influence_desc: "Раньше в российской политике нередко случалось, что госуправление и законотворчество находились под сильным влиянием крупного бизнеса, который стремился отстаивать свои интересы. Сегодня такой подход недопустим - мы работаем напрямую с народом и для народа, зачастую имеющего противоположные интересы. Наша задача - выстроить честный диалог и добиваться справедливости для каждого."
 SOV_work_with_ur: "Работать с Единой Россией"
 SOV_work_with_ur_desc: "Одним из результатов установления суверенной демократии стало формирование двухпартийной системы. Партия, которая нам противопоставлена, - Единая Россия - хоть и продвигает иные идеи и ценности, но не стремится к саботажу работы правительства. Поэтому мы могли бы консультироваться с ней, чтобы заручиться более широкой народной поддержкой. Это позволило бы нам принимать решения, учитывающие интересы разных групп общества."
 SOV_homogeneous_government: "Однородное Правительство"
 SOV_homogeneous_government_desc: "В отличие от старой американской двухпартийной системы, в России партии не являются двумя противоположностями. Напротив, они показывают, как разные слои общества способны объединяться для достижения общих целей, формируя тем самым правительство согласия."
 SOV_encourge_social_patriotism: "Поощрять Социальный Патриотизм"
 SOV_encourge_social_patriotism_desc: "Зачастую считается, что левые идеи стремятся отчуждиться от патриотизма и гражданского национализма в пользу международной солидарности. Но это в корне неверно - государство, которое заботится о своих гражданах, вполне может опираться на чувство любви к Родине, и в этом нет ничего предосудительного. Истинный патриотизм не противоречит идеалам справедливости и прогресса, а служит их прочной основой."
 SOV_fair_commonwealth: "Справедливое Содружество"
 SOV_fair_commonwealth_desc: "Раньше считалось, что Россия, несмотря на статус федерации, сохраняла преобладание русских над другими народами. Так это или нет — можно спорить долго, но одно можно сказать точно: теперь даже оснований для таких предположений не возникнет. Россия была, есть и будет равноправным союзом народов, сосуществующих ради общего процветания. Именно в этом единстве мы черпаем нашу силу и уверенность в будущем."
 SOV_re_invent_soviet_dream: "Переосмыслить Советскую Мечту"
 SOV_re_invent_soviet_dream_desc: "Ещё во времена Советского Союза политики провозглашали главную цель, ради которой жили и работали граждане Союза, - всемирную дружбу народов и ведущую роль рабочего класса. И хотя многие из тех идей сегодня устарели, некоторые тезисы того времени стоит взять на вооружение, чтобы дать простому человеку новую мечту, к которой стоит стремиться. Ведь именно общая цель сплачивает общество и придаёт смысл повседневному труду."
 SOV_glorify_the_common_man: "Прославить Простого Человека"
 SOV_glorify_the_common_man_desc: "Вне зависимости от эпохи лицом России всегда был простой человек - крестьянин, рабочий, солдат: перечислять можно долго. Нам важно это осознать и принять - и с этим пониманием двигаться вперёд. Однако одного понимания мало: люди должны видеть, что мы ценим их труд и благодарим за вклад в развитие нашей прекрасной страны. Только так, уважая своё прошлое и настоящее, мы сможем построить будущее, достойное этих людей."
 SOV_left_populist_democracy: "Инновационная Социалистическая Демократия"
 SOV_left_populist_democracy_desc: "По определению, демократия - это власть народа, и этот принцип неоспорим. Наша задача - направлять общественное мнение в верном направлении с помощью агитации, ярких лозунгов и грамотной рекламы. Такой подход не противоречит свободе выбора и помогает заручиться массовой поддержкой, объясняя людям наши цели. Ведь люди охотнее поддерживают тех, чьи идеи им понятны и близки."
 SOV_country_of_justice: "Страна Справедливости"
 SOV_country_of_justice_desc: "Шли красавицы на тройку\nШли рабочие на стройку\nТрамваи по проспекту\nАрабы строем в Мекку\nШли парламентёры, шли монтёры, шли легко и без затей\n\nМы сидели и курили, сидели и курили\nМы сидели и курили, начинался новый день."
 #pr radical
 SOV_radicals_narodniki_in_charge: "Радикальные Народники"
 SOV_radicals_narodniki_in_charge_desc: "Медведевский проект двухпартийной системы не мог не затронуть столь могущественную силу, как левое движение в России. Множество различных партий объединились в Народную Россию: вторую после Единой России партию власти.\nХоть её большинство и является лево-центристским, но среди народников есть и более радикальные личности: от старых членов КПРФ до бывших нацболов. Всех их объединяет одно: желание изменить Россию по образу и подобию Советского Союза, восстановить единство народов и улучшить быт рабочих.\n\nРоссия вступает в новую, но столь знакомую эру."
 SOV_constitutional_revolution: "Конституционная Революция"
 SOV_constitutional_revolution_desc: "Текущая российская конституция хоть и является достаточно демократической, но по-настоящему народной её назвать тяжело. В ней еще остался каркас ельцинской конституции, требующий радикального пересмотра. Новая российская конституция будет основана не только на медведевской, но и частично на Конституции СССР - одной из, если не лучшей в мире!"
 SOV_proclaim_uss: "Провозгласить Новый Союз"
 SOV_proclaim_uss_desc: "Союз Суверенных Государств был попыткой сохранить увядающий из-за парада суверенитетов Советский Союз. Несмотря на волю народа, выраженную в общесоюзном референдуме, республики подписали Беловежские соглашения, поставившие крест на горбачёвском проекте Нового союзного договора и на самой Стране Советов.\nПришло время исправить данное недоразумение и воплотить мечту о единстве народов пост-советского пространства!\nХоть и в урезанном составе."
 SOV_the_new_state_committee: "Новый Государственный Комитет"
 SOV_the_new_state_committee_desc: "Путинская система славилась своим огромным силовым аппаратом, разделенного на ведомства с часто пересекающимися полномочиями и задачами. Конечно, это придавало стабильности верховной власти: ведь пока силовики борются между собой, у них не будет времени сформировать противодействие высшим эшелонам.\nНо эти времена прошли, и склоки ФСБ, Росгвардии, СВР и прочих лишь вредят стабильности и эффективности силового аппарата. Они все будут объединены в столь знакомый нашим гражданам Комитет Государственной Безопасности - КГБ. Внешняя разведка, контрразведка, государственная граница, охрана высших лиц государства, а также противодействие терроризму и другим угрозам - вот функции объединенного Комитета.\n\nВерность Родине превыше всего."
 SOV_bureaucratic_integration: "Бюрократическая Интеграция"
 SOV_bureaucratic_integration_desc: "Недостаточно на бумаге провозгласить единство: необходимо это еще и воплотить в жизнь. Казахстан и Украина продолжают жить по своим законам, что вносит определенную путаницу в повседневную жизнь наших граждан.\nНеобходимо усилить интеграцию наших товарищей и бороться с проявлениями этнического национализма. Мы - одна семья, а семья должна помогать друг другу!"
 SOV_unity_of_brotherly_states: "Единство Братских Государств"
 SOV_unity_of_brotherly_states_desc: "Нам удалось, хоть и частично, но восстановить историческую справедливость: от Днестра до Амура, от Мурманска до Аральского моря миллионы людей живут под одним знаменем, как и более 30 лет назад! Впереди еще много работы, но другие народы бывшего Советского Союза тоже в скором времени вернутся в нашу дружную семью!"
 SOV_ignite_neo_soviet_nationalism: "Разжечь Неосоветский Национализм"
 SOV_ignite_neo_soviet_nationalism_desc: "После Великой Отечественной Войны в Советском Союзе сформировался, казалось бы парадоксально, но свой, советский национализм. В отличие от обычного, этнического национализма, породившего ужасы фашизма, советский национализм был больше про любовь к Родине и стремлении отстоять её любой ценой.\nПодобный сентимент сохранился и в современности, и мы должны поддерживать его!"
 SOV_homogeneous_left_wing_front: "Однородный Лево-Патриотический Фронт"
 SOV_homogeneous_left_wing_front_desc: "Вне нашей партии осталось множество других движений, чьи идеи похожи на наши: Левый Фронт, Другая Россия и прочие меньшие организации связаны своим совмещением левых и патриотических идей.\nВместе с ними мы сформируем единый фронт, дабы крепли и ширились наши ряды, ведь сила - в единстве!"
 SOV_country_of_the_working_man: "Страна Рабочего Человека"
 SOV_country_of_the_working_man_desc: "Страна Советов была воистину страной рабочих: широкие права, укрупнение и укрепление промышленности, урбанизация - всё это сделало жизнь рабочего класса, а равно и всей страны лучше.\nК сожалению, приватизация и распад Союза подломили эту основу: заводы стали стремительно закрываться, люди - беднеть, и им на замену в низкоквалифицированные сферы пришли мигранты.\nПора исправлять это дело - больше социальных привилегий рабочим привнесет новую кровь в наши чахлые заводы!"
 SOV_glorify_the_military: "Прославлять Военных"
 SOV_glorify_the_military_desc: "Во все времена были люди, которые своим примером и своей кровью защищали родной дом - это наши бойцы. Они защищали своей грудью Донбасс от киевской хунты, они принесли Русский мир в Варшаву, в Прибалтику и на Балканы. Наши военные - это новая элита, своим тяжелым трудом добывшее счастье каждому!\nСлава нашей армии, честь и хвала её героям!"
 SOV_peoples_democracy: "Формирование Народной Демократии"
 SOV_peoples_democracy_desc: "Суверенная демократия - идеология, созданная при поддержке Единой России для демократического государства с национальной спецификой. Но сейчас её одной недостаточно: необходимо сформировать новую мысль - Народную Демократию. Имея местами схожие идеи, в отличие от своей предшественницы она является более социально и патриотически направленной."
 SOV_union_born_anew: "Союз, Рожденный Заново"
 SOV_union_born_anew_desc: "Украина и Крым, Беларусь и Молдова -\nЭто моя страна!\nСахалин и Камчатка, Уральские горы -\nЭто моя страна!\n\nКрасноярский край, Сибирь и Поволжье,\nКазахстан и Кавказ, и Прибалтика тоже...\n\nЯ рожден в Советском Союзе,\nСделан я в ССГ!"
 #new russia party
 SOV_new_russia_rises: "Возвышение Новой России"
 SOV_new_russia_rises_desc: "Долгое время казалось, что "либеральное" правительство в России невозможно. Будь то либералы из "Яблока" или оппозиционеры Навального, все попытки были задушены либо из-за их высокомерия, либо из-за неумелости. Но мы, "Новые люди", смогли добиться успеха там, где другие потерпели неудачу. Не борясь с государством, а принимая его. Россия вступит в новую эру либерализма, и сделает это на своих условиях!"
 SOV_protect_the_constitution: "Защитить Конституцию"
 SOV_protect_the_constitution_desc: "Зачем что-то менять, если и так все прекрасно? Нынешняя конституция останется. Как либералы и сторонники демократии, мы не имеем права подменять демократический процесс ради своих целей. Мы останемся в коалиции с "Единой Россией" и будем поддерживать двухпартийную систему."
 SOV_constitutional_restructuring: "Конституционная Перестройка"
 SOV_constitutional_restructuring_desc: "Хотя действующая конституция хороша в том, что она делает, наша партия считает, что ей нужно больше. Для того чтобы настоящая демократия поднялась, мы должны закрепить в России не просто двухпартийную, а многопартийную систему. Если мы станем барьером между "Единой Россией" и "Народной Россией", то в Думе будет гораздо больше разнообразных голосов, что будет напоминать дореволюционную российскую Думу. Россия станет идеальным маяком свободы!"
 SOV_government_business_cooperation: "Сотрудничество Государства и Бизнеса"
 SOV_government_business_cooperation_desc: "Наш бизнес всегда находился в тесной близости с нашим правительством. В 90-е годы он пытался влиять на нашу политику, в 00-е и последующие годы это мы влияли на бизнес. С нашим либеральным мировоззрением мы согласны, что вмешательство государства в экономику может быть пагубным, но сотрудничество с капиталистами ради блага народа всегда будет на слуху. Как и в царские времена, имея бизнес в кармане, мы сможем реагировать на радикальные изменения гораздо быстрее."
 SOV_push_for_democratization: "Продвигать Демократизацию"
 SOV_push_for_democratization_desc: "Нынешняя система все еще недостаточна. Двухпартийная система слишком ограничена. Мы должны поощрять создание новых партий наряду с дуэтом "Единой России" и "Народной России". Кроме того, перенос выборов в Госдуму может еще больше встряхнуть существующую систему, заставив как новые, так и устоявшиеся партии сотрудничать и объединяться друг с другом, чтобы собрать голоса. Мы обеспечим такой расцвет российской демократии, какого еще не было."
 SOV_third_force: "Третья Сила"
 SOV_third_force_desc: "После проведения реформ Новая Россия прочно заняла позицию баланса между двумя партиями. Поскольку вокруг основной тройки формируются более мелкие партии, можно с уверенностью сказать, что изменения приносят свои плоды. Российская демократия снова изобретает себя, и несколько партий борются за контроль над Думой. Мы не вернемся к двухпартийной борьбе, как это сделали американцы, а наши президентские полномочия обладают достаточным контролем для выхода из многопартийного тупика, который произошел в европейских демократиях. Наша партия окончательно закрепила вступление России в новую демократическую эпоху!"
 SOV_liberate_the_people: "Освободить Людей"
 SOV_liberate_the_people_desc: "Долгое время наше государство слишком полагалось на корпорации и бюрократов. Однако мы не замечали, что отвечать за свои действия мы должны перед людьми. Бюрократы безлики и холодны, но наш долг - сделать так, чтобы наши люди чувствовали себя нужными и заботились о них. Если Россия хочет стать маяком в этом многополярном мире, наша задача - доказать всему миру, что именно мы, а не кто-то другой, больше всего заботимся о своих гражданах."
 SOV_communitarist_society: "Комьюнитаристское Общество"
 SOV_communitarist_society_desc: "Хотя большинство российских либералов выступали за "западный путь самореализации", мы не одобряем подобные идеи. Россия, хотя и капиталистическая, никогда не была ориентирована на индивидуальное самоудовлетворение. В своей основе мы - общинные люди. Даже в царские времена наши капиталисты и дворяне вкладывали деньги в экономику России, желая обеспечить дальнейшее процветание нации. Безжалостный индивидуализм 90-х показал нам, что наше общество должно держаться вместе. Наш либерализм - это народный либерализм. Тот, который заботится о целом больше, чем об отдельном человеке. Ведь именно целое движет нас вперед."
 SOV_russian_democratic_nationalism: "Новый Гражданский Национализм"
 SOV_russian_democratic_nationalism_desc: "Почему мы должны избегать слова "националист"? Долгое время оно было синонимом нацизма или фашизма, но это вопиюще не так. Русский национализм, даже в царские времена, был направлен не на расовое превосходство, а на превосходство России в целом. И недавняя война против НАТО это доказала. Будь то красные или белые, именно русский национализм помог нам победить в этой войне. Россия будет гордиться своими достижениями!"
 SOV_respect_our_past: "Уважать Наше Прошлое"
 SOV_respect_our_past_desc: "Можно долго спорить о том, какие части нашего прошлого нужны, а какие нет, но это бессмысленное занятие. Какое-то время наша страна придерживалась подхода "вся история России - это наша история", и мы будем придерживаться его. Однако Ельцинский период в большинстве своем воспринимался с пренебрежением. За пределами высших государственных чиновников и лидеров бизнеса 90-е годы воспринимались как позор и черное пятно в нашей исторической жизни. Мы это исправим, потому что, хотя у этого периода было много, много ошибок, он также был периодом экспериментов и зарождения современной России."
 SOV_national_liberal_democracy: "Переосмыслить Российский Либерализм"
 SOV_national_liberal_democracy_desc: "На протяжении всей своей истории российский либерализм воспринимался как бездумное преклонение перед Западом и ненависть к русскому обществу. Со времен царя либералы считались простыми подхалимами европейцев, ненавидящими свой собственный народ. Однако мы изменим это представление. Ведь именно Россия - самая свободная страна на земле. Именно мы были одной из самых влиятельных европейских культур. Мы дали миру так много, так почему же мы должны пытаться подражать европейцам? Почему нас должно волновать, что думают другие? Мы - вершина Европы, которая станет маяком для всего мира на долгие годы."
 SOV_sovereign_and_free: "В Будущее!"
 SOV_sovereign_and_free_desc: "От чистого истока\nВ Прекрасное Далёко,\nВ Прекрасное Далёко\nЯ начинаю путь."
 #right-path medvedev focus
 SOV_history_continues_medvedev: "История Продолжается!"
 SOV_history_continues_medvedev_desc: "Одержанная победа стала для России красноречивым свидетельством того, что прежняя модель мира окончательно изжила себя, уступая место новому, суверенному порядку. Эта победа открыла перед страной новую страницу истории, полную возможностей для масштабного возрождения.\nНа этом сложнейшем отрезке пути Дмитрий Медведев показал себя безупречным лидером. Он провёл страну через самое суровое испытание за всю её новейшую историю, проявив железную волю и мудрость. Именно поэтому именно он, обладая бесценным опытом и народным доверием, продолжит вести Россию вперёд, преодолевая любые преграды на пути к укреплению её суверенитета и процветанию её граждан."
 SOV_harness_peoples_front: "Оседлать Народный фронт"
 SOV_harness_peoples_front_desc: "ОНФ безупречно доказал свою эффективность как действенный инструмент управления и консолидации гражданского общества.\nВ связи с этим, закономерным и стратегически верным шагом станет его дальнейшая интеграция в общую политическую линию, определяемую президентом. Эта задача была поставлена еще Дмитрием Медведевым в период структурных преобразований в правительстве, и сегодня она обретает особую актуальность.\nВыступая в роли единого и слаженного механизма, Народный Фронт станет ключевой движущей силой, способствующей движению России вперед — в соответствии с четким и дальновидным курсом, заданным национальным лидером."
 SOV_improve_social_nets: "Улучшить Системы Социальной Защиты"
 SOV_improve_social_nets_desc: "Еще со времён СССР в России существует мощная система социальной поддержки населения, которая не только сохранялась, но и последовательно улучшалась при протекции Владимира Путина. Долгое время эта система ложилась тяжким бременем на бюджет, который зависел от нефтегазовых доходов, что делало её уязвимой.\nТеперь, когда наша экономика окрепла и подверглась серьёзным структурным изменениям в лучшую сторону, мы можем не просто поддерживать социальные обязательства, а смело инвестировать в их развитие.\nЭто исторический поворот: сегодня мы можем заложить фундамент социального государства, которое будет сильным не благодаря газу, а вопреки любым внешним давлением, опираясь на собственный промышленный и человеческий потенциал."
 SOV_strengthen_immigration_control: "Усилить Иммиграционный Контроль"
 SOV_strengthen_immigration_control_desc: "Раньше, когда наша страна была обложена санкциями и своих рабочих рук не хватало, приток мигрантов из соседних стран был вынужденной мерой. Это была необходимая подпорка для экономики.\nНо времена изменились. Сегодня эта подпорка не столько помогает, сколько мешает. Пора расчистить дорогу для наших собственных специалистов, защитить наш рынок труда и дать возможность раскрыться талантам многонационального народа России. Именно поэтому мы закрываем программы упрощённого въезда.\nМы способны сами строить своё будущее своими силами. А гражданам других стран мы  предлагаем направить свои ресурсы на развитие их собственных, родных государств. В этом - залог нашего общего успеха."
 SOV_subdue_onf_members: "Меритократическое Управление"
 SOV_subdue_onf_members_desc: "Управлять должны те, кто на это действительно способен. Эта простая, как сама правда, идея почему-то остаётся недостижимой для многих. Но для России она станет основополагающим принципом.\nАдминистративная политика ОНФ будет строиться на строгом меритократическом подходе. Ключевые посты на местах займут не "назначенцы по блату", а люди, которые уже доказали свою эффективность делом, а не словами. Это создаст социальный лифт, который поднимает наверх не по знакомству или происхождению, а по реальным заслугам и компетенции.\nРоссия - это страна, где открываются возможности для тех, кто их заслуживает. Именно так, через торжество профессионализма, будет выстраиваться сильная и справедливая Россия."
 SOV_promote_russian_multiethnicity: "Содействовать Cоциальной Cправедливости"
 SOV_promote_russian_multiethnicity_desc: "России в наследство от Советского Союза достались сильные институты, стоящие на защите прав трудящихся и простого народа. Эти проверенные временем механизмы, такие как доступное здравоохранение и всеобщее образование, продолжают исправно служить людям и по сей день.\nБыло бы не просто странно, а глубочайшей ошибкой отказываться от этого проверенного наследия. Ведь именно на этом базисе строится настоящее социальное государство, для которого забота о гражданах - не просто слова, а реальный приоритет.\nЭто стремление к справедливости выражается в реальных делах: в защите прав работников, в поддержке материнства и детства, в помощи тем, кто оказался в трудной жизненной ситуации. Это и есть тот самый прочный социальный договор, в котором сила государства измеряется благополучием его народа."
 SOV_support_political_integralism: "Поддерживать Политический Интегрализм"
 SOV_support_political_integralism_desc: "Исторический путь России сложен и многогранен - в нём есть страницы, от которых и сегодня сжимается сердце, и целые эпохи, где смена власти оплачивалась непомерно высокой ценой, унося с собой бесчисленное количество жизней. Однако наша задача - не делить прошлое на чёрное и белое, не занимать одну узкую позицию, а с уважением  находить ценные уроки в каждой из политических систем.\nИмперский флаг, советское знамя и современный триколор - это не взаимоисключающие символы, а разные грани одной непрерывной национальной судьбы. Каждая эпоха внесла свой вклад в становление российской государственности, каждая оставила нам уникальное наследие - сильные институты, культурные достижения, научные открытия и ту самую «закалку», что позволила стране выстоять в самых суровых испытаниях."
 SOV_enshrine_stateforming_people: "Закреплять Государствообразующий Народ"
 SOV_enshrine_stateforming_people_desc: "Россия - это уникальная цивилизация, сформированная самыми разными народами и культурами. Их взаимное уважение и многовековое сотрудничество - это наша фундаментальная ценность и источник силы. Но при этом мы с глубоким уважением и благодарностью признаём историческую роль русского народа как государствообразующего ядра. Именно русская культура, воля и труд на протяжении столетий скрепляли обширные территории, создавая то уникальное духовное пространство, которое мы все сегодня называем своим домом.\nРусская национальная идентичность не должна растворяться или противопоставляться другим, а, напротив, должна оставаться стержнем, вокруг которого выстраивается многообразие всей российской нации. Быть русским в России - значит нести особую ответственность за судьбу страны и быть связующим звеном для всех её народов."
 SOV_nationalist_autocracy: "Националистическая Автократия"
 SOV_nationalist_autocracy_desc: "На протяжении долгой истории России власть во многом строилась на принципе сильного единоначалия, когда народ, и в первую очередь государствообразующий русский народ, видел в лидере своего главного защитника. Эта модель управления не раз доказывала свою эффективность - стоит лишь взглянуть на великие победы и масштабные свершения нашей страны.\nВ современных условиях президент может выступать в роли общенационального лидера. Он способен консолидировать волю народа и, опираясь на нашу историю и традиции, уверенно вести Россию вперёд к новым достижениям, отстаивая её путь и интересы на мировой арене."
 SOV_social_authoritarianism: "Социальный Авторитаризм"
 SOV_social_authoritarianism_desc: "Сильная государственная власть сама по себе не подразумевает национализма или какой-либо подобной идеологии. Её эффективность может иметь совсем иную основу - социальную. Ярким примером этому служит наследие советской эпохи, которое оставило в народной памяти глубоко уважаемые принципы: уверенность в завтрашнем дне, доступность образования и медицины, приоритет труда.\nГосударство не просто провозглашает, а реально обеспечивает социальную защиту, справедливость и стабильность, гарантируемые президентом и именно за это он получает широкую народную поддержку. Такой "общественный договор" - когда власть заботится о людях, а люди доверяют власти - и является залогом прочности и суверенитета нашей страны."
 SOV_executive_paternalism: "Патернализм Исполнительной Власти"
 SOV_executive_paternalism_desc: "Сильная исполнительная власть исторически является залогом стабильности и основным фактором процветания России. Что при Владимире Путине, что при Дмитрии Медведеве Президент выступал в роли ключевой фигуры, чья личная инициатива и стратегическое видение задавали курс и заставляли сложный механизм государственного управления работать слаженно и эффективно.\nТакой подход обеспечивает быстроту реагирования на вызовы, последовательность и позволяет гражданам чувствовать уверенность в завтрашнем дне, доверяя опыту и воле лидера."
 SOV_enrich_putinist_tenets: "Обогатить Путинские Постулаты"
 SOV_enrich_putinist_tenets_desc: "За последние годы путинизм перерос рамки просто политической идеологии, превратившись в особый тип государственного мышления и доктрину, определяющую будущее России.\nЧтобы и впредь руководствоваться взглядами Владимира Путина, необходимо оформить эту доктрину в целостную и понятную систему. Нужно не просто сохранить его ключевые идеи, но и наполнить их новым содержанием - развить и дополнить тезисами, которые будут отвечать на вызовы современности и задавать вектор на будущее. Это позволит сохранить преемственность курса, обеспечив его актуальность для новых поколений в новых условиях."
 SOV_stronghold_of_law_and_order: "Оплот Закона и Порядка"
 SOV_stronghold_of_law_and_order_desc: "Для российского общества фундаментальными ценностями были и остаются стабильность и порядок. Государство видит своей первостепенной задачей гарантировать их сохранение во что бы то ни стало.\nКонечно, порой может возникать ощущение, что контроль со стороны властей избыточен. Однако важно понимать, что эта система создаётся не для ограничений, а для защиты. В современном мире постоянно возникают новые вызовы и угрозы, и именно наши правоохранительные органы всегда находятся на передовой, оперативно устраняя любые проблемы. Их работа - это гарантия того, что жизнь в стране останется безопасной и предсказуемой для всех граждан."
 SOV_embrace_eurasian_heritage: "Принять Евразийское Наследие"
 SOV_embrace_eurasian_heritage_desc: "Существует распространенное, но ошибочное мнение, будто Россия неразрывно принадлежит к европейской культурной группе. Это глубокое заблуждение. Безусловно, наши народы связывает долгая история взаимоотношений, и определённое культурное влияние неизбежно. Однако коренная ошибка - не видеть за этим главного: Россия сформировалась как уникальное и полностью суверенное культурное пространство.\nНаша цивилизация - это сплав, в котором переплелись наследие множества народов, собственная духовность, особая модель общества и свой, отличный от западного, взгляд на мир. Это не значит, что мы отгораживаемся от диалога, но мы ведём его с позиции силы и равенства, а не следования чужим образцам. Поэтому утверждения о нашей «европейской сущности» часто просто не соответствуют масштабу и уникальности российской культуры и не должны восприниматься всерьёз."
 SOV_glorify_pan_russian_patriotism: "Прославлять Общероссийский Патриотизм"
 SOV_glorify_pan_russian_patriotism_desc: "В эти непростые времена российский народ должен сплотиться под единым знаменем общероссийского патриотизма. Наша задача - помочь ему в этом, используя все доступные средства: от фестивалей и уроков в школах до масштабных информационных кампаний.\nИ не стоит забывать о нашей главной силе: народ России многолик и многообразен, но в своих базовых ценностях, в стремлении к сильной и суверенной стране - он един и непоколебим."
 SOV_reinforce_presidential_administration: "Укрепить Администрацию Президента"
 SOV_reinforce_president_administration_desc: "Ни у кого не вызывает сомнений, что решающее слово в вопросах государственного управления принадлежит президенту. В такой ситуации вполне логичным выглядит укрепление позиций ключевого органа, который представляет его волю, — Администрации президента.\nНаделение Администрации президента более широкими координационными и надзорными функциями позволит выстроить более чёткую и слаженную работу всего государственного аппарата. Это не вопрос централизации ради самой централизации, а обеспечение эффективности, согласованности и безусловной реализации курса, который определяет национальный лидер. Такой подход гарантирует, что каждая государственная структура работает как один механизм на достижение общенациональных целей."
 SOV_russia_everlasting_era: "Вечная Эпоха"
 SOV_russia_everlasting_era_desc: "Десять лет усердий, десять лет исканий\nДесять лет труда без покоя, без сна\nДесять лет безумья, десять лет напастей\nДесять лет невзгод, день как месяц, месяц как год\n\nДесять лет добычи, десять лет плавленья\nВ десять тысяч тонн!\nДесять лет указов, десять лет правления\nДесять лет реформ!"
 #right-path Nadezhdin
 SOV_new_history: "Начало Новой Истории"
 SOV_new_history_desc: "Борис Надеждин является настоящим хамелеоном современной российской политики. От кого только он не пытался избираться в органы власти: "Справедливая Россия", "Гражданская инициатива", "Партия Роста" и "Единая Россия" - но вне зависимости от партии, он всегда был системным либералом и говорил о необходимости реформирования российского государства.\n\nВозможно, именно поэтому он и сумел заполучить главную должность в РФ - пост президента. И Надеждин сделает всё, чтобы воплотить свои обещания о либерализации и социальной справедливости, виденье Новой России.\n\nПутинская история медленно преобразовывается в новую, реформированную, либеральную."
 SOV_popularize_front: "Народизация Фронта"
 SOV_popularize_front_desc: "Несмотря на своё название, Общероссийский Народный Фронт является не отображением мнения российского народа, а лишь проекцией воли Единой России. Политические заявления вместо дела, популизм и лоббирование олигархов - эти вещи преследуют ОНФ с самого зарождения.\n\nНаша задача - дать молодым и перспективным деятелям, отображающим настроения народа, полный карт-бланш на управление Фронтом. Надеждин - лидер не закостенелых стариков-бюрократов, а пассионарных и целеустремлённых парней и девушек, готовых менять Россию к лучшему!"
 SOV_comprehensive_political_integration: "Всеобъёмная Политическая Интеграция"
 SOV_comprehensive_political_integration_desc: "Вне официальной российской политики существует бесчисленное множество лидеров мнений, влияющих на народные настроения. Зачастую этих людей клеймят "подстилками Запада" и "находящимися на зарплате у Брюсселя", сажают их в тюрьму и всячески преследуют.\n\nНо теперь, когда на вершине власти в России находится Надеждин и его команда, отношение к оппозиции поменялось. Вместо вражды выбран курс на сотрудничество и интеграцию молодых в политическую жизнь нашей Родины. Ведь у нас всех общая цель - свободная и сильная Россия!"
 SOV_establish_full_pluralism: "Установить Полный Плюрализм"
 SOV_establish_full_pluralism_desc: "ОНФ являлся попыткой Медведева изменить путинский строй, поставив под своё знамя все возможные политические силы: от радикальных коммунистов до националистов, от либералов до консерваторов. На деле получилось так, что в стране была уничтожена даже иллюзия политической борьбы и конкуренции, все мейнстримные партии вошли в состав Фронта.\n\nТеперь мы не будем ограничивать количество партий и движений в нашей стране: в Думе смогут принимать участие как и радикалы, так и более умеренные движения. Только российскому народу решать, за кем следовать!"
 SOV_defeat_political_apathy: "Победить Политическую Апатию"
 SOV_defeat_political_apathy_desc: "Одной из главных проблем политического развития в России, безусловно, является политическая апатия граждан нашей страны, нежелание участвовать в политической жизни. При Путине и Медведеве данный факт считался плюсом - чем меньше людей было бы вовлечено в политические процессы, тем для власти лучше: уменьшается возможность нестабильности.\n\nДля новой, надеждинской России политическая апатия - это порок, доставшийся по наследству. Для того, чтобы наши реформы не пропали зря, необходимо его лечить: опросы, поощрение общественно-политической деятельности, продвижение молодых - работа с населением должна показать, что сам российский народ, а не дяденьки из правительства, определяет свою судьбу!"
 SOV_concept_moderate_center: "Концепт Умеренного Центра"
 SOV_concept_moderate_center_desc: "Нам не обязательно полностью уничтожать наследие Медведева в виде ОНФ. Как и многое другое в путинской системе, для её безупречной работы Фронт надо реформировать. Реформировать в силу, которая будет способна представлять интересы народа, а не чиновников.\n\nДля этого создан концепт "Умеренного Центра" - искоренение различных радикалов как слева, так и справа из ОНФ; всех тех, кто может представлять угрозу российской демократии."
 SOV_reform_institutions_power: "Реформировать Институты Власти"
 SOV_reform_institutions_power_desc: "Российская машина власти хоть и работает уже долгое время, но с течением времени в ней начинают случаться поломки и проявляться её огрехи. Система страдает от чрезвычайной бюрократизированности и неповоротливости, население изнывает от её несправедливости.\n\nНеобходимо осушить это болото: выкинуть на пенсию неэффективных, продвигать молодых и талантливых, убирать десятки бессмысленных и схожих структур, усилить цифровизацию государственных институтов и вернуть народу доверие ко власти. Государство должна работать на народ, а не народ на государство!"
 SOV_enact_new_front_framework: "Утвердить Новые Рамки Народного Фронта"
 SOV_enact_new_front_framework_desc: "Теперь, когда всяческие радикалы отсечены от рычагов управления нашей страной, мы можем очертить новые рамки Народного Фронта. В него будут входить сугубо демократические силы: от социал-демократов до консерваторов. Они могут различаться в своих взглядах, но цели у ОНФ должна быть едины: служение народу, защита его интересов и российской демократии. Фактически, это центристская коалиция, которая будет иметь одно из лидирующих позиций в российской политике."
 SOV_fill_front_with_loyal_reformers: "Заполнить Фронт Лояльными Реформаторами"
 SOV_fill_front_with_loyal_reformers_desc: "В настоящий момент ОНФ представляет собой сборище консервативных политиков времён Медведева, активно вставляющих палки в колёса новому правительству Надеждина. В связи с этим, чтобы обеспечить стабильность новой власти, Фронт должен быть либерализован путём замещения старых кадров новыми - лояльными Надеждину и его идеям. Такое обновление позволит нейтрализовать внутреннее сопротивление и ускорить проведение необходимых реформ."
 SOV_nadezhdin_new_vertical: "Новая Вертикаль Надеждина"
 SOV_nadezhdin_new_vertical_desc: "Для продолжения либеральных реформ старый аппарат власти совершенно не подходит. Действующая система управления слишком тесно связана с консервативными элементами ОНФ, представители которого вряд ли с радостью поддержат инициативы нового правительства. Поэтому, согласно плану Надеждина, существующая вертикаль власти должна быть полностью демонтирована: все косные и устаревшие элементы - отстранены, а новое поколение управленцев, наконец, получит возможность реализовать себя. Ведь Надеждин знает, реформы начинаются не с законов и бумажек, а с замены тех, кто их исполняет."
 SOV_full_liberalization: "Тотальная Либерализация"
 SOV_full_liberalization_desc: "Следующей инициативой правительства должна стать бескомпромиссная либерализация государственной политики. Предоставление гражданских свобод, расширение антикоррупционных мер, защита интересов народа и многие другие инициативы будут выдвинуты на первый план.\nЭти шаги призваны обеспечить доверие общества к власти и создать прочную основу для дальнейшего развития. Правительство Надеждина намерено продемонстрировать, что новая политика - это не пустые обещания, а реальные перемены."
 SOV_secure_presidential_republic: "Закрепить Президентскую Республику"
 SOV_secure_presidential_republic_desc: "История уже не раз показывала, что российская демократия достигает стабильности и необходимой эффективности только при наличии расширенных президентских полномочий. Должно быть чёткое разделение властей: парламент - законодательная ветвь, президент - исполнительная, и никак иначе.\nТакой подход позволяет избежать управленческого хаоса и сохранить единый порядок ответственности. В условиях активных реформ именно сильная президентская власть способна обеспечить решительность в принятии ключевых решений."
 SOV_strengthen_local_self_government: "Усилить Местное Самоуправление"
 SOV_strengthen_local_self_government_desc: "В современном мире демократические институты должны присутствовать не только на общенациональном, но и на местном уровне. Люди должны иметь возможность влиять на решения, касающиеся их повседневной жизни, через органы местного самоуправления."
 SOV_full_transparency_elections: "Полная Прозрачность Выборов"
 SOV_full_transparency_elections_desc: "Один из первых шагов, который намерен предпринять Надеждин, - это коренная реформа избирательного процесса, основанная на принципах полной прозрачности и честности. Все выборы в стране - от муниципальных до федеральных - должны проходить открыто, под публичным контролем и без фальсификаций. Ведь у Надеждина нет ни малейшего повода что-либо скрывать от народа России, поскольку именно народ является источником власти."
 SOV_social_justice: "Социальная Справедливость"
 SOV_social_justice_desc: "Одним из приоритетных направлений деятельности правительства Надеждина станет разработка надёжной государственной программы социального обеспечения. Каждому гражданину должна быть гарантирована достойная пенсия, каждому нуждающемуся - необходимое пособие, каждой семье - стабильная финансовая поддержка.\nСоциальная политика нового правительства будет строиться на принципах справедливости, всеобщности и прозрачности. Главная цель - обеспечить людям уверенность в завтрашнем дне и показать народу, что государство действительно беспокоится о его проблемах."
 SOV_independent_justice: "Независимое Правосудие"
 SOV_independent_justice_desc: "В условиях продолжающейся демократизации необходимым шагом является создание независимой судебной ветви власти. Судебная система - один из ключевых институтов государства, поэтому она должна быть немедленно реформирована и либерализована вместе с другими сферами управления.\nПлан Надеждина заключается в обеспечении подлинно непредвзятого правосудия для российского народа. Независимые суды станут гарантией защиты прав граждан и действенным инструментом контроля над властью. В таких условиях будет формироваться настоящее правовое государство."
 SOV_new_hope: "Новая Надежда"
 SOV_new_hope_desc: "Этот город, не похожий ни на что вокруг\nУлыбается прохожий, и за пять минут\nПомогая человеку верить в чудеса\nРаспускаются фонтаны прямо в небеса\n\nЯ не знаю, где ещё на этом свете\nЕсть такая же весна\nЯ, пожалуй, отпущу попутный ветер\nИ останусь навсегда\nС тобою"
 
 

 SOV_brics_category_desc: "§YБРИКС§! - межправительственная организация, в которую входят Бразилия, Россия, Индия, Китай, Южная Африка, Иран, Египет, Эфиопия и Объединенные Арабские Эмираты. Изначально созданная для привлечения инвестиций, эта группа превратилась в настоящий геополитический блок, правительства которого ежегодно встречаются на официальных саммитах и координируют многостороннюю политику с 2009 года. Двусторонние отношения между странами БРИКС строятся в основном на принципах невмешательства, равенства и взаимной выгоды."

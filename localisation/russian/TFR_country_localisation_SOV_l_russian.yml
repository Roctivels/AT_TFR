 SOV_russian_revengeance: "Русская Месть"
 SOV_russian_revengeance_desc: ""
 SOV_patriotic_rejuvination: "Национально-Патриотическое Омоложение"
 SOV_patriotic_rejuvination_desc: "Европейская война сделала очень многое для консолидации нашего общества. Все сборы на обмундирование нашим ребятам, волонтёрство в тылу, толпы добровольцев в военкоматах - это приближало наш триумф.\n\nНо из-за предательства изнутри все эти труды оказались напрасны: нас побили. Но всё же такой народный патриотизм необходимо поощрять: всё для фронта, всё для победы! Вставай, Россия, на бой с европейскими угнетателями!"
 SOV_wagnerite_armed_forces: "Вагнеризация Вооруженных Сил"
 SOV_wagnerite_armed_forces_desc: "Войска путинской и медведевской России наводнила чума любого государственной структуры: бюрократия и чинопоклонство. Из-за неповоротливости госмашины и неэффективных управленцев страна оказалась неготова к столкновению с Европой.\n\nПришло время расчищать этот бардак и вводить систему управления, похожую на организацию ЧВК, а конкретнее - децентрализация командования. Не нужно ждать команды сверху - действуйте!"
 SOV_zealous_assault_waves: "Ревностные Нападения"
 SOV_zealous_assault_waves_desc: "Одной из главных проблем прошлой войны была сдержанность командиров к штурму позиций неприятеля, из-за чего часто утрачивалась инициатива и бой оказывался проигран. Что же, нашим решением данной проблемы будет являться тактика массированного штурма, которую "Вагнер" применял во время кровавейших штурмов городов: своим напором мы сломим сопротивление евробюрократов и их марионеток." 
 SOV_brute_force_warfare: "Война Грубой Силой"
 SOV_brute_force_warfare_desc: "Западная военная доктрина предполагает точные удары по самым уязвимым и жизненно важным артериям противника. Но это не наш метод. Русский путь - это удары по всему фронту, дабы противник не смог подвезти резервы.\n\nДоктрина глубоких операций не мертва, нет. Она требует лишь небольших улучшений, с учётом особенностей современного ведения боевых действий. Некоторые могут нас заклеймить, что мы воюем стратегиями более полувековой давности, но старая русская поговорка гласит: "Всё новое - хорошо забытое старое."."
 SOV_soldiers_commanders_unity: "Единство Солдат и Командиров"
 SOV_soldiers_commanders_unity_desc: "Провал Европейской войны показал, насколько широка пропасть между командирами и бойцами. Полковники, генералы и майоры из своих кабинетов не понимали всего того, что происходит на фронте, не говоря уже о банальном неуважении к тем, кто проливал свою и чужую кровь за Россию.\n\nВ "Вагнере" нет места командирскому беспределу! Мы - одна семья, одна команда, которая ведёт русский народ к победе! Долой кабинетных генералов; если они так хотят себе погоны - то пусть получают их на фронте!"
 SOV_sons_of_wagner_system: ""Система Сыновей Вагнера""
 SOV_sons_of_wagner_system_desc: "С ростом числа бойцов Вагнера и развитием нанотехнологий становится возможным создание системы мониторинга состояния солдат с помощью наномашин. Обмен информацией внутри отряда, мониторинг каждого бойца в любой момент боя, оружие с биоидентификацией... Данная инициатива крайне привлекательна для улучшения боевой эффективности нашей армии.\n\nВойна... изменится."
 SOV_wagner_authoritarianism: "Тоталитарная Централизация"
 SOV_wagner_authoritarianism_desc: "Плюрализм мнений уже недавно довёл Россию до края гибели. Мы не можем позволить растить себе будущих противников: все будут подчиняться лишь Вагнеру, и никому более. Никаких "других" партий быть не может, все они - рассадники предательства."
 SOV_officer_grand_council: "Верховный Совет Офицеров"
 SOV_officer_grand_council_desc: "У "Вагнера" есть опыт того, когда на местном уровне им управляли "Советы Офицеров", где командиры обсуждали насущные проблемы и принимали важные решения. Безусловно, Пригожин - лидер России, но у каждого лидера должны быть советники. Споры - порициаемы, дискуссия - одобряется, а действовать необходимо едино."
 SOV_supreme_commodore: "Верховный Коммодор"
 SOV_supreme_commodore_desc: "Евгений Пригожин - отец "Вагнера" и его безусловный лидер. Именно благодаря нему наше ЧВК достигло таких вершин, как управление Россией. Каждый должен знать, что Первый - спаситель России от падения в руки бездарным чинушам, как Шойгу и его банда. Без Пригожина Россия бы погибла! Слава Верховному!"
 SOV_russian_spartanism: "Русский Спартанизм"
 SOV_russian_spartanism_desc: "Русское общество древности было патриархальным: жена являлась практически собственностью мужа-защитника, и её главной задачей было рожать и ухаживать за детьми. Такой порядок сохранялся веками, пока в умы русских не проникли западные идеи "равенства" и "свободы". Приспешникам этих левых и совершенно чуждых идей невдомёк, что мы стоит за традиции. Мужчина - защитник Отечества и воин, женщина - мать!"
 SOV_supremacy_of_rus_spirit: "Превосходство Русского Духа"
 SOV_supremacy_of_rus_spirit_desc: "Европейцам не понять, что мы банально лучше их. Сколько раз Россия спасала Европу от своих же порождений: от Наполеона, Вильгельма и Гитлера? Сколько раз она спасала от угроз с Востока: от монголов до турков? Европейская цивилизация ослабла, а русская - наоборот, окрепла. Это наш священный долг - разрушить гниющую Европу и установить доминацию России и русских!"
 SOV_the_pmc_with_a_state: "ЧВК с Государством"
 SOV_the_pmc_with_a_state_desc: ""Вагнер" - это, в первую очередь, ЧВК. Патриотичные наёмники, у которых любовь к Родине и любовь к деньгам стоят на одном месте. Наш народ должен нас благодарить за работу в Европе и в других горячих точках; за спасение России, в конце концов! Россия должна служить Вагнеру."
 SOV_new_era_of_russia: "Новая Эра России"
 SOV_new_era_of_russia_desc: "История нашей Родины, по своей сути, история русского империализма. В этом термине нет ничего зазорного или негативного: империи прошлого несли просвещение и цивилизацию варварским народам. Неважно, каким был русский империализм: Царским, Красным или Путинским, и даже когда они на словах друг друга отрицали, суть оставалась одна: Величие России.\n\nМы объединили все эпохи под одним знаменем: знаменем "Вагнера". Патриотизм - вот что скрепляет Империю, СССР, РФ и нас. Но в отличие от них, мы сделаем всё возможное, чтобы отсрочить наше падение на неопределённый срок."
 SOV_increase_rusich_membership: "Увеличить Членство 'Русичей'"
 SOV_increase_rusich_membership_desc: "Члены ДШРГ "Русич" доказали свою эффективность во время Европейской войны. Да, большинство из них - это откровенные русские националисты и даже нео-нацисты с привкусом неоязычества, но "Русичи" являются верными и яростными бойцами.\n\nБыло бы логично, если бы использовали других таких же патриотов в подобных "Русичу" формированиях. А на некоторые, кхм, "особенности" их мировоззрения можно закрыть глаза. Пока они проливают свою кровь за Родину, "Русичи" могут верить во что угодно."
 SOV_new_national_government: "Новое Национальное Правительство"
 SOV_new_national_government_desc: ""Вагнер" является логичным продолжением российских правительств прошлого и имеет столько же легитимности, как и они. Всю свою историю ЧВК представляло собой долгую руку Родины там, где официальное присутствие было бы опасно. Вагнер существует для благополучия и защиты нашего Отечества!"

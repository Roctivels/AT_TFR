 SOV_state_liberals_idea_tt: "§gГосударственные либералы - это фракция в кремлевской бюрократии, которая считает, что Россия пострадала из-за экономического статизма. Хотя некоторые выступают за ограниченную политическую либерализацию, большинство сосредоточено на экономических вопросах. Они стремятся значительно расширить возможности российских бизнесменов. Они искренне верят, что российский свободный рынок еще не реализовал свой потенциал, которому всегда препятствуют регрессивные силы внутри администрации. Они предлагают Кремлю большие прибыли в обмен на сокращение расходов на "ненужное" социальное государство.§!\n\n\n\n\n\n£GFX_SOV_state_liberals\n\n\n\n\n\n\n"
 SOV_siloviki_idea_tt: "§gСиловики - это, по сути, железная рука российского государства, представленная ФСБ, МВД, ФСО и Росгвардией. Хотя они мало что могут предложить в политическом плане, они обеспечивают стабильность и порядок. Их главная цель - увеличить бюджеты своих ведомств для более эффективной борьбы с внутренними угрозами. Силовики в основном опираются на государственный патриотизм, рассматривая государство как неотъемлемую часть родины. Они предлагают Кремлю быть первыми в борьбе с нарушителями спокойствия в обмен на ужесточение контроля над бизнесом.§!\n\n\n\n\n\n£GFX_SOV_siloviki\n\n\n\n\n\n\n"
 SOV_technocrats_idea_tt: "§gТехнократы - это эффективные менеджеры государства, они рассматривают политику как ненужное препятствие на пути функционирования правительства. Для них идеальным условием является безликое управление, осуществляемое очень работоспособными бюрократами и менеджерами. Самый умеренный выбор и самый эффективный. Они предлагают Кремлю хорошо управляемое государство в обмен на разочарование рядовых граждан в политической жизни.\n\n\n\n\n\n£GFX_SOV_technocratic\n\n\n\n\n\n\n§!"
 SOV_neo_tsarists_idea_tt: "§gНео-царисты, экстремистская фракция силовиков, крайне критически относятся к демократическим институтам. В отличие от их названия, их видение царизма более прагматично и сосредоточено на эффективном управлении. Они выступают за любую форму автократического контроля над государством. Ставя во главу угла внутреннюю безопасность, они также стремятся к внешнему господству, продвигая доктрину "Русского мира" в геополитических делах страны. Они обещают Кремлю сильное, упорядоченное общество, хотя и ценой периодической жестокости.§!\n\n\n\n\n\n£GFX_SOV_neotsarists\n\n\n\n\n\n\n"

 SOV_russia_we_brought_back_tt: "§gКак упоительны в России вечера,\nЛюбовь, шампанское, закаты, переулки,\nАх, лето красное, забавы и прогулки,\nКак упоительны в России вечера.§!\n\n§YБалы, красавицы, лакеи, юнкера,\nИ вальсы Шуберта, и хруст французской булки,\nЛюбовь, шампанское, закаты, переулки,\nКак упоительны в России вечера.§!\n\n§WКак упоительны в России вечера,\nВ закатном блеске пламенеет снова лето,\nИ только небо в голубых глазах поэта\nКак упоительны в России вечера.§!\n"
 SOV_happy_new_year_russia_tt: "\n§YОставьте нас: вы не читали\nСии кровавые скрижали;\nВам непонятна, вам чужда\nСия семейная вражда;\nДля вас безмолвны Кремль и Прага;\nБессмысленно прельщает вас\nБорьбы отчаянной отвага -\nИ ненавидите вы нас...\n\nЗа что ж? ответствуйте: за то ли,\nЧто на развалинах пылающей Москвы\nМы не признали наглой воли\nТого, под кем дрожали вы?\nЗа то ль, что в бездну повалили\nМы тяготеющий над царствами кумир\nИ нашей кровью искупили\nЕвропы вольность, честь и мир?..\n\nВы грозны на словах - попробуйте на деле!\nИль старый богатырь, покойный на постеле,\nНе в силах завинтить свой измаильский штык?\nИль русского царя уже бессильно слово?\nИль нам с Европой спорить ново?\nИль русский от побед отвык?\nИль мало нас? Или от Перми до Тавриды,\nОт финских хладных скал до пламенной Колхиды,\nОт потрясенного Кремля\nДо стен недвижного Китая,\nСтальной щетиною сверкая,\nНе встанет русская земля?..§!\n§RТак высылайте ж нам, витии,\nСвоих озлобленных сынов:\nЕсть место им в полях России,\nСреди нечуждых им гробов.§!\n\n\n\n\n£GFX_vtb_eto_klassika\n\n\n\n\n\n§CВеликая Россия. Великая Классика.\nС Новым Годом.§!"

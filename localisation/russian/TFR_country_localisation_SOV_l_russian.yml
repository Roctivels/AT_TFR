 #Decision Categories
 SOV_democratic_politics_category: "Демократическая Политика"
 SOV_democratic_politics_category_desc: "\n\n\n\n\n£GFX_SOV_democracy_post_alikhanov\n\n\n\n\n\n\n\nНаш народ пробудился ото сна и сбросил тираническое правление §YДержавников§!.\n\nТеперь мы должны восстановить наши §CДемократические§! институты и правительство с помощью различных демократических партий по всей §WРо§Cсс§Rии§!."
 SOV_socialist_politics_category: "Социалистическая Политика"
 SOV_socialist_politics_category_desc: "После свержения режима Алиханова новое социалистическое правительство определит свой собственный курс для России. Наше будущее будет зависеть от того, примет ли наша новая республика демократию или повернет в сторону авторитаризма."
 SOV_derzhavnik_economy_category: "Державная Экономика"
 SOV_derzhavnik_economy_category_desc: "Сильная страна не может выжить только за счет политики. Ей нужна прочная экономическая основа, чтобы поддерживать себя. Вот почему Державники собрались вместе, чтобы предложить масштабную реструктуризацию экономических структур России. Это укрепит национальные силы в экономике и устранить застарелую коррупцию и вредное влияние."
 SOV_rebuilding_the_regions_category: "Программы Восстановления"
 SOV_rebuilding_the_regions_category_desc: "\n\n\n\n\n£GFX_SOV_rebuilding_category_banner\n\n\n\n\n\n\n"
 SOV_reform_russia: "Реформирование России"
 SOV_reform_russia_desc: "Несмотря на направленный против нас злобный национализм и олигархический обман, RPSS одержал победу. Теперь начинается наш путь. Мы полны решимости превратить это государство в нечто, приближающееся к подлинному народному правительству. Конечно, мы столкнемся с противодействием со стороны правых группировок и реакционных военных элементов. Но у нас есть четкая стратегия, и мы должны неуклонно придерживаться ее."
 SOV_political_simulation_category: "Политическая Симуляция"
 SOV_zhir_post_war_economy_category: "Экономическое Восстановление"
 SOV_zhir_post_war_economy_category_desc: "Мы успешно победили в европейской войне, но это потребовало огромных усилий в плане экономического производства и реорганизации. Теперь наша цель - вернуть экономику в более устойчивое состояние, чтобы наша страна могла продолжать правильно развиваться в послевоенный период."
 SOV_african_dawn_category: "Африканский Рассвет"
 SOV_african_dawn_category_desc: "Африкой всегда пользовался так называемый "золотой миллиард". Методы, конечно, менялись, они переходили от откровенного колониализма к более тонкой неоимпериалистической тактике экономического господства. Однако ничто не вечно. Многие народы Африки, особенно франкоязычные, наконец-то встают на борьбу с несправедливостью, с которой они сталкиваются в своей жизни. Они поднимают не только свои национальные флаги, но и флаги России!\n\nВ настоящее время £GFX_army_experience §OОсвободительные Силы Африки§! Состоят из:§Y[SOV_mali_status][SOV_burkina_faso_status][SOV_niger_status][SOV_guinea_status][SOV_senegal_status][SOV_GNB_status]§!"
 SOV_western_states_terrorists_category: "Контр-Террористическая Операция"
 SOV_western_states_terrorists_ldpr_category: "Контр-Террористическая Операция"
 SOV_duma_category: "Государственная Машина"
 SOV_duma_category_desc: "\n\n\n\n\n[SOV_picture_russia_state_machine]\n\n\n\n\n\n[SOV_duma_gui] [SOV_onf_gui] [SOV_nadezhdin_late_game_gui]\n--------------------------------------[SOV_union_state_co_chairman]\n\n[SOV_kremlin_towers]"

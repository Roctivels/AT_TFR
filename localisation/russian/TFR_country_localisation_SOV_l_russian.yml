 SOV_navalny_protests_category: "Протесты Навального"
 SOV_navalny_protests_category_desc: "В очередной раз Россия-матушка была охвачена массовыми протестами, на этот раз из-за скандального ареста Александра Навального - лидера оппозиционной партии "Россия будущего", который получил особую известность благодаря своим безудержным кампаниям против коррупции в России. Хотя ожидалось, что он будет арестован в какой-то момент из-за, по иронии судьбы, его прошлых обвинений в растрате судом в 2013 году, чего не ожидалось, так это огромной реакции на задержание. Сотни тысяч граждан вышли на улицы, рассматривая это как еще один шаг истеблишмента по сохранению своей олигархической власти, и по мере того, как проходят дни, масштабы протестов растут.\n\nСила протестов: §Y[?SOV_navalny_protest_strength]§!"

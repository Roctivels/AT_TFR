 SOV_american_intervention_category: "Вмешательство в Гражданскую Войну в США"
 SOV_american_intervention_category_desc: "Стремление американского истеблишмента к мировой гегемонии, в конце концов, привело к краху самих США. Количество беззаконных банд, опасных террористов и безумцев, которые бесчинствуют в бывших Соединенных Штатах, вызывает глубокое беспокойство и представляет угрозу порядку вещей, длительная война приведет к еще большей нестабильности во всем мире и террористическому хаосу.\nК счастью, есть горстка истинных американских патриотов, которые стремятся восстановить Америку, которая хочет мирно сосуществовать с другими странами и отказывается от глобалистских притязаний на мировое господство."
 SOV_reform_russian_empire: "[SOV_reform_russian_empire_loc_dynamic]"
 SOV_reform_russian_empire_post_war_loc: "Русская Имперская Политика"
 SOV_reform_russian_empire_normal_loc: "Возрождение Великой России"
 SOV_reform_russian_empire_desc: "\n\n\n\n\n£GFX_SOV_russian_empire_banner\n\n\n\n\n\n\n\n300 лет существовала великая империя Русских, богатая и сильная, пока не пришли безбожные большевики и не разрушили ее. Русский народ, когда-то стоявший среди великих наций - православных и чистых, был низвержен, поруган, и подвергался геноциду, пока многие лженациональности, искусственно сконструированы ленинскими мразями, отняли исконно русские земли в момент когда коммунистический эксперимент неминуемо рухнул.\nЖириновский поставил целью своей жизни восстановление чести России и возвращение ее истинной судьбы - вновь стать Имперской и Великой, вновь вернуть Русских всего мира в свои широкие объятия и защитить от слабости и упадка.\n\n§Y"Первый Рим пал из-за ересей. Второй Рим - Константинополь - пал из-за Флорентийской унии. Третий Рим - Москва - стоит вечно. Четвертому Риму не бывать."§!\n"
 SOV_autocracy_orthodoxy_nationality: "Самодержавие, Православие, Народность!"
 SOV_resource_excavation_category: "Добыча Полезных Ископаемых"
 SOV_pragmatic_economy_category: "Прагматичная Экономика"
 SOV_pragmatic_economy_category_desc: "Экономическую политику ЛДПР можно охарактеризовать как государственно-капиталистическую с ответственным частным сектором. Некоторые популистские меры социального обеспечения также поддерживаются, такие как: широкое бесплатное здравоохранение, доступное образование и государственные жилищные программы."
 SOV_influence_west_category: "Экономические Войны"
 SOV_influence_west_category_desc: "Газ - лучший политический и экономический рычаг давления на Европу, который есть у России. Европа уже не первый год повторяет звучащую мантру о необходимости снижения энергетической зависимость от России и разрабатывать шаги, как это сделать, но пока никаких реальных изменений замечено не было, а если поставки и вовсе будут прерваны сейчас, то Европе придется несладко.\n\n§YДома и квартиры не согреть политическими заявлениями. Единственный способ согреть их - с помощью природного газа§!"
 SOV_oligarchs_influence_category: "Влияние Олигархов"
 SOV_small_businesses_category: "Малый Бизнес"
 SOV_csto_organization_category: "ОДКБ"
 SOV_novorussian_integration_category: "Новороссийский Референдум"
 SOV_novorussian_integration_category_desc: "Народ Новороссии, после многих лет борьбы, наконец-то может отдохнуть. Большинство целей, которые были поставлены в 2014 году, выполнены, и осталось только одно - завершить интеграцию в Россию."
 SOV_ukrainian_insurgencies_category: "Украинское Сопротивление"
 SOV_ukrainian_insurgencies_category_desc: "Украинскому народу сильно промыли мозги русофобской пропагандой киевской хунты, потребуется время, чтобы залечить раны, нанесенные мечтой о бандеровской лихорадке. Народ Западной Украины снова поднял оружие против своих освободителей, как в 1946 году. §RИх кончина будет такой же.§!"
 SOV_keep_america_burning_category: "Масло в Огонь Америки"
 SOV_keep_america_burning_category_desc: "Существование единого Американского государства в любой форме есть угроза §YНациональным интересам России§!. Именно поэтому §CЛДПР§! выработала схему затягивания Американского гражданского конфликта на как можно дольше.\nПутём "поддержки" разных воюющих сторон одновременно, и дестабилизации других путём дезинформации, Россия сможет растянуть войну, для нанесения как можно большего урона Американским территориям и населению."
 SOV_TMC_category: "Договор о Многовекторном Сотрудничестве"
 SOV_TMC_category_desc: ""
 SOV_nav_russian_reformation_category: "Российская Реформация"
 SOV_nav_russian_reformation_category_desc: "\n\n\n\n\n£GFX_SOV_grand_reformation_banner\n\n\n\n\n\n\n\nДолгое время наша система опиралась на неработающую конституцию, которая давала власть режиму. Теперь мы готовы создать настоящую демократическую конституцию. В ней будут закреплены свободы и права, которые проложили путь в цивилизованный мир. \nИ, возможно, если наш народ примет ее всем сердцем, мы сможем наконец встать в один ряд с европейскими демократиями, которые освободили нас!\n\nФанатизм: £GFX_fanaticism §Y[?SOV_fanaticism_var|1%]§!\nЭффект:  £attack_texticon [?SOV_fanaticism_dynamic_var|=+1%] £mil_factory [?SOV_fanaticism_dynamic_var|=+1%] £GFX_mobilisation_texticon [?SOV_fanaticism_dynamic_var|=+1%] £GFX_war_support_modifiericons_texticon [?SOV_fanaticism_dynamic_var|=+1%]\n\nФанатизм представляет готовность наших людей сражаться и их поддержку нашей страны.\n\n\n\n\n\n\n\n\n"
 SOV_navalich_oligarchs_enabled_loc: "\n§7Новые Олигархи§! £GFX_New_Oligarchs_logo Влияние : §Y[?SOV_oligarch_approval_rating_var|1%]§!\nЭффекты: £civ_factory_output [?SOV_oligarch_support_dynamic_var|=+1%], £mil_factory [?SOV_oligarch_support_dynamic_var|=+1%], и £consumer_goods_texticon §Y[?SOV_oligarch_support_dynamic_var|=1%]§!"

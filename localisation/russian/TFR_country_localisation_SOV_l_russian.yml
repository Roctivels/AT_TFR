 SOV_supreme_soviet_rsfsr_dynamic_desc: "\n\n\n\n£GFX_supreme_soviet_rsfsr\n\n\n\n\n\n§Y"Жить в обществе и быть свободным от общества нельзя."\n- В. И. Ленин§!\n\nПосле прихода к власти коммунистов и проведения глубокой конституционной реформы Россия вернулась к модели, основанной на принципах советской представительной демократии, адаптированной к современным реалиям. Воссозданный §OВерховный Совет§! сегодня есть высший законодательный и управленческий орган страны, объединяющий всех честно избранных депутатов. Несмотря на сохранение поста президента, реальной власти он уже не имеет, и все ключевые решения принимаются большинством голосов в Совете, включая формирование правительства и утверждение бюджета, независимо от главы государства. Такая система государственного устройства активно вовлекает граждан в политическую жизнь, остаётся лишь вопрос - на чьей стороне они окажутся?"

 #ur economy
 SOV_continue_our_partnership: "Русский Корпоратизм"
 SOV_continue_our_partnership_desc: "В 90-ых из деятелей Комсомола поднялись люди, наделенные определенной предпринимательской жилкой: олигархи. Баснословно разбогатев на руинах Советского Союза, они создали корпорации, которым не было равных на российском рынке. Со временем некоторые потеряли всё, залезая туда, где им не место - а некоторые слились с государством, стали ему всячески помогать.\nКонечно, влияние олигархов уже не настолько важно, но их наследие - огромные корпорации - отлично подходит для нужд российского государства. Благодаря ним мы сможем подняться до невиданных ранее масштабов!" 
 SOV_dominate_the_oligarchs: "Русская Эра Капитализма"
 SOV_dominate_the_oligarchs_desc: ""
 SOV_prioritize_state_corporations: "Приоритет Государственным Корпорациям"
 SOV_prioritize_state_corporations_desc: "Государственные корпорации имеют критическую роль в российской экономике, будучи рычагом управления государства: им отдан практически монополистический контроль над самыми важными отраслями. Газпром, Росатом, Роскосмос - плеяда их бесчисленна, и необходимо заострить внимание на нашей сильной стороне.\nАтланты держат небо, и необходимо этим атлантам помогать"
 SOV_expand_resource_market: "Расширять Рынок Ресурсов"
 SOV_expand_resource_market_desc: "Наша страна богата природными ресурсами: никель, газ, нефть, алмазы - всего, что у нас есть, не перечесть. И долгое время наша экономика зависела от экспорта ресурсов в Европу, но после начала Европейской войны данный канал, по понятной причине, прекратил существование.\nТак зачем ограничиваться одной Европой? Азия, Африка, Америка - рынки данных регионов открыты нам с распростёртыми объятьями."
 SOV_fund_industrial_rejuvination: "Финансировать Промышленную Регенерацию"
 SOV_fund_industrial_rejuvination_desc: "Современная российская промышленность хоть и не является полной катастрофой, как было в 90-ые, но ей не хватает масштаба США и, уж тем более, Китая. Распад СССР и последующая приватизация нанесли непоправимый ущерб промышленному потенциалу России, и хоть мы сумели частично восстановиться, Европейская война показала нашу слабость.\nНеобходимо простимулировать восстановление советских предприятий как гражданского, так и военного назначения."
 SOV_business_as_usual: "Все Как Обычно"
 SOV_business_as_usual_desc: "Российская экономика пережила множество взлетов и падений - лихие 90-ые, золотые 2000-ые, неоднозначные 10-ые. Но вот, сквозь бури и грозы Европейской войны, несмотря на все санкции - мы выстояли. Деньги от ресурсов вновь текут в казну, наш народ доволен жизнью. Мы вернулись к тому, что потеряли после 2020 года: стабильности и процветанию.\n\nВсё как обычно. Всё как и должно быть."
 SOV_special_economic_zones: "Специальные Экономические Зоны"
 SOV_special_economic_zones_desc: ""
 SOV_guarantee_social_security: "Гарантировать Социальное Обеспечение"
 SOV_guarantee_social_security_desc: "Социальный сектор из-за особенностей нашей системы является одним из крупнейших столпов России - и одна из наших "ахиллесовых пят". В больницах не хватает персонала, пенсии - низкие, народ изнывает от несправедливости и забюрократизированности.\nНеобходимо внедрять самые передовые технологии в нашу социальную систему: цифровизация, нейросети, прочие улучшения на благо народа. Власть - от народа и для народа."
 SOV_modernize_the_cities: "Модернизировать Города"
 SOV_modernize_the_cities_desc: ""
 SOV_renovate_education_facilities: "Обновить Образовательные Учреждения"
 SOV_renovate_education_facilities_desc: "Российская система образование после распада СССР оставляет желать лучшего: чрезмерная забюрократизированность, дефицит персонала, низкие зарплаты и почти отсутствующее уважение к профессии - всё это отворачивает молодых специалистов от педагогики. Данное не может более продолжаться - воспитание новых поколений является важнейшей задачей, отражающейся на всем государстве.\nУвеличение количества мест в ВУЗах, школ, зарплат, снижение нагрузки на учителей - эти меры помогут российской системе образования вырваться из кризиса. Россия начинается с малого!"
 SOV_support_private_initiative: "Поддерживать Частную Инициативу"
 SOV_support_private_initiative_desc: ""
 SOV_reform_central_bank: "Реформировать Центральный банк"
 SOV_reform_central_bank_desc: ""
 SOV_restructure_state_corporations: "Реструктурировать Государственные Корпорации"
 SOV_restructure_state_corporations_desc: ""
 SOV_reinforce_economic_nationalism: "Укреплять Экономический Национализм"
 SOV_reinforce_economic_nationalism_desc: ""
 SOV_russian_heyday: "Русский Расцвет"
 #nr economy
 SOV_market_supremacy: "Превосходство Рынка"
 SOV_market_supremacy_desc: "Нам незачем изобретать велосипед, ведь задача по укреплению российского контроля и без того трудна. Что нам нужно, так это радикально расширить нашу экономику, чтобы поддержать как наш новый экономический блок, так и растущие экономики Южного полушария. Ослабление регулирования, снижение налогов, государственная поддержка - все, что угодно, лишь бы обеспечить наше доминирование."
 SOV_russian_way_to_capitalism: "Российский путь к Капитализму"
 SOV_russian_way_to_capitalism_desc: "Почему мы должны фокусироваться на ВВП или показателях роста, если они не решают главную задачу экономического роста: процветание людей? Наши корпорации долгое время не были близки к среднему джо, и американский пример тоже не идеален. Мы должны не обеспечивать постоянный рост, а сделать так, чтобы наша экономика была устойчивой и ориентированной на человека. Россия проложит новый путь к капиталистическому управлению. Мечта настоящего рабочего!"
 SOV_give_free_rein_private_initiative: "Поддержка Среднего и Малого Бизнеса"
 SOV_give_free_rein_private_initiative_desc: "Наш малый и средний бизнес нуждается в финансовой помощи. Наша гражданская экономика получила серьезный удар во время войны, и все, что не относится к крупным корпорациям, до сих пор с трудом восстанавливается. Наша администрация будет инвестировать в наших предпринимателей, чтобы наши отрасли не стагнировали и оставались конкурентоспособными."
 SOV_creation_business_committees: "Создание Бизнес-Комитетов"
 SOV_creation_business_committees_desc: "По сравнению с европейскими и американскими экономиками, наш бизнес... мягко говоря, слишком любительский. У нас нет той культуры акционеров, которая есть на Западе, даже простые бизнес-комитеты не так приветствуются. Чтобы наша экономика оставалась гигантом, мы должны перенять западные методы корпоративного управления."
 SOV_encourage_competition_banking_market: "Поощрять Честную Рыночную Конкуренцию"
 SOV_encourage_competition_banking_market_desc: "В настоящее время наши крупные корпорации слишком статичны. Хотя мы хотели бы использовать американский пример таких корпораций, как Apple, с их доминированием на рынке, китайская модель корпоративного сотрудничества может быть использована в нашем случае более эффективно. Корпорации, постоянно сотрудничая друг с другом в рамках проектов, обеспечат процветание всех россиян."
 SOV_economic_expansion_europe: "Экономическая Экспансия в Европе"
 SOV_economic_expansion_europe_desc: "Почему мы должны ограничиваться только Россией? В нашем распоряжении, в буквальном смысле, половина континента. В конце концов, экономика может только расти. Наши европейские союзники будут в восторге от наших инвестиций и корпоративных льгот. И что самое приятное? Они не смогут сказать нет."
 SOV_russian_economic_giant: "Российский Экономический Гигант"
 SOV_russian_economic_giant_desc: "Мы - левиафан. Такого Европа не видела со времен Первой мировой войны. Поистине европейский гигант. Но мы не собираемся останавливаться на достигнутом. Если у Китая и ОДТО есть свои рынки, почему бы нам не конкурировать и с ними? Мы - нация, лучше всего приспособленная для бизнеса, и наши предприниматели обеспечат нам доминирование на долгие годы."
 SOV_new_economic_ecosystem: "Новая Экономическая Экосистема"
 SOV_new_economic_ecosystem_desc: "Наша экономическая модель долгое время была моделью государственного капитализма. Однако наша задача по трансформации экономики в более ориентированную на человека должна быть обеспечена и снизу вверх. Давайте убедим негосударственные структуры в справедливости наших реформ и обеспечим, чтобы они играли по правилам."
 SOV_promote_economic_transformation: "Содействовать Экономическим Преобразованиям"
 SOV_promote_economic_transformation_desc: "Диверсифицированная экономика, с более прогрессивным налогом на крупные корпорации, с использованием всех современных технологических чудес для обеспечения эффективности. Разумеется, для этого необходимо обеспечить цифровизацию, ведь новое экономическое чудо не придет с бизнес-мышлением начала 00-х."
 SOV_support_management_of_future: "Поддержать Управленчество Будущего"
 SOV_support_management_of_future_desc: "Как и экономика в целом, наш класс менеджеров должен адаптироваться к нашим изменениям. Меньше бездушного винтика в машине, больше эффективного решателя проблем. Они должны уметь пользоваться современными технологиями и меньше полагаться на печатные издания. Следует также подумать об оцифровке их рабочих мест, чтобы не тратить время на бумажную работу."
 SOV_mutually_beneficial_economic_union: "Взаимовыгодный Экономический Союз"
 SOV_mutually_beneficial_economic_union_desc: "Сфера, которую мы имеем под собой, может быть использована исключительно для нашей экономической выгоды, но так ли это необходимо? Мы, по сути, являемся лидером ОДКБ и новой экономической сферы. Нам не нужно доминировать на европейских рынках, как колониальному владыке. Точно так же, как мы обеспечиваем взаимовыгодные отношения внутри России, мы должны обеспечивать взаимовыгодные отношения с нашими европейскими союзниками. Если мы обеспечим им конкурентоспособность, как и нам, то наша сфера в конечном итоге будет процветать вместе."
 SOV_formation_communitarist_economy: "Формирование Комьюнитаристской Экономики"
 SOV_formation_communitarist_economy_desc: "Россия преображается. Экономика для людей, от людей. Где корпорации и бизнес заботятся о потребителе больше, чем о повышении его рыночной стоимости. Хотя этот процесс может быть хрупким и неустойчивым в долгосрочной перспективе, наша задача - сделать его таким. Нам не нужно доминировать в мировой экономике, как это сделали американцы или китайцы. Нам просто нужно обеспечить собственное процветание. Россия превыше всего!"
 SOV_develop_innovation: "Развивать Инновации"
 SOV_develop_innovation_desc: "Чтобы конкурировать с современными экономиками, одних цифр недостаточно. Для достижения поставленных целей необходимы инновации, технологические прорывы и квалифицированные кадры наших людей. В России много умных людей. Нужно только поддержать их в их начинаниях."
 SOV_reduce_pressure_business: "Снизить Давление на Бизнес"
 SOV_reduce_pressure_business_desc: "Зачем нам нужно так много регулирования? Если мы не должны повторить ту же ошибку, что и ЕС, чрезмерно регулируя свою экономику. Российская экономика может только расти, а не стагнировать!"
 SOV_restructure_tax_system: "Реструктурировать Налоговую Систему"
 SOV_restructure_tax_system_desc: "Наша налоговая система, по общему признанию, не столь идеальна, как хотелось бы. Как для бизнеса, так и для граждан. Слишком много лазеек, слишком много старых механизмов налогообложения. Чтобы обеспечить процветание России на десятилетия вперед, мы должны сделать так, чтобы наша налоговая система соответствовала современным стандартам."
 SOV_develop_alternative_investment_mechanisms: "Альтернативные Инвестиционные Механизмы"
 SOV_develop_alternative_investment_mechanisms_desc: "Россияне, к сожалению, не доверяют инвестиционным компаниям. На протяжении большей части нашей современной истории было принято вкладывать деньги в жилье или квартиры, а не в акции. Мы должны разработать более доступные способы вложения денег. Тогда Россия наравне с остальными войдет в современный рынок!"
 SOV_transparent_state_corporations: "Прозрачные Гос. Корпорации"
 SOV_transparent_state_corporations_desc: "Благодаря цифровизации нашей экономики можно осуществить мечту, которую наше налоговое ведомство вынашивало с момента своего создания: создать абсолютно прозрачную экономику. Мы знали, что некоторые наши госкорпорации тратят деньги на бесполезные вещи, чтобы потом попросить у нас еще. Но теперь, когда мы будем иметь их как открытую книгу, такие попытки будет все труднее провернуть. России не нужны расточители, и если кто-то захочет украсть деньги из наших карманов, об этом узнаем и мы, и народ."

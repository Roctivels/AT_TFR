 #National Russia
 SOV_victory_of_national_russia: "Победа Державной России"
 SOV_victory_of_national_russia_desc: "Несмотря на численное преимущество наших врагов и ограниченность наших ресурсов, их неудачи проложили путь к нашей победе. Теперь Антон Алиханов возьмет на себя управление Россией и поведет ее прочь от пропасти так называемой "демократии". Предстоящий путь будет трудным, и многие будут сопротивляться, но русский народ и его новый лидер одержат победу, создав по-настоящему единую нацию."
 SOV_strength_and_will: "Единство Нашей Воли"
 SOV_strength_and_will_desc: "Нам не нужны эти так называемые "другие" националисты. Их слабые призывы к единству и признанию неуместны. Теперь державники станут доминирующей и наиболее влиятельной силой в национальном возрождении нашей страны. Пусть эти люди убираются восвояси, как паразиты левизны и либерализма, ибо их "консерватизм" и "умеренные традиции" ничем не лучше пороков глобализма."
 SOV_unite_the_nationalists: "Обьединить Националистов"
 SOV_unite_the_nationalists_desc: "Наши стремления высоки, но мы не можем править в одиночку. Державизм все еще молод и хрупок, он не в состоянии конкурировать с мощными силами социализма и либерализма. Мы должны обратиться за помощью к другим националистическим организациям и их членам, чтобы восполнить пробелы. Естественно, мы должны обеспечить их лояльность и то, чтобы любые коалиционные документы были в значительной степени выгодны нам."
 SOV_control_state_institutions: "Контролировать Государственные Институты"
 SOV_control_state_institutions_desc: "Государство больное, отягощенное устаревшими нормами морали и лояльности, которые больше не служат истинной нации. Концепция суверенной демократии превратилась в пустой звук. Мы должны обеспечить, чтобы СЗНД и ее союзники обладали наибольшей властью в рамках системы. Это, несомненно, вызовет гнев вездесущей либеральной оппозиции, но мы должны действовать решительно и быстро, чтобы обеспечить свой контроль над наиболее важными государственными органами страны."
 SOV_soft_decommunization: "[SOV_soft_decommunization_scripted_loc]"
 SOV_soft_decommunization_1: "'Мягкая' Декоммунизация"
 SOV_soft_decommunization_2: "Державная Синкретическая Политика"
 SOV_soft_decommunization_desc: "[SOV_soft_decommunization_scripted_loc_desc]"
 SOV_soft_decommunization_desc_1: "Коммунизм, самая деспотичная форма социализма и глобализма, оставил неизгладимый след в нашей стране. Куда бы мы ни повернулись, мы сталкиваемся с остатками этих репрессивных режимов - на улицах, в наших домах, в музеях и на статуях. Мы должны избавиться от этого наследия, но это деликатная задача. Многие в нашей стране все еще хранят теплые воспоминания об СССР, и мы должны подходить к этому вопросу с осторожностью, чтобы не повторить ошибок Украины."
 SOV_soft_decommunization_desc_2: "Несмотря на нашу первоначальную антикоммунистическую позицию, мы должны признать, что не все в коммунизме было негативным. Например, многие до сих пор положительно относятся к эпохе Сталина, считая его сильным и справедливым лидером, во многом похожим на Алиханова. Удовлетворяя стремление этой части населения к сильному, справедливому главе государства, мы также можем ослабить влияние левой оппозиции."
 SOV_stronghold_of_nationhood: "Оплот Государственности"
 SOV_stronghold_of_nationhood_desc: "Мы живем в мире революций и прогрессивного глобализма - опасном месте для любого национального государства. И все же мы остаемся непоколебимыми, олицетворяя собой крепость здравого смысла, традиционной государственности и культуры. Наша миссия состоит в том, чтобы защитить не только самих себя, но и саму концепцию нации. Потому что многие призывают к полному искоренению этих принципов."
 SOV_loyal_army_command: "Лояльное Армейское Командование"
 SOV_loyal_army_command_desc: "Ни одна держава не может выстоять без стойких вооруженных сил. К сожалению, в наши вооруженные силы проникли те, кто называет себя патриотами, но на самом деле заинтересован только в том, чтобы набить свои карманы и примкнуть к тем, кто предлагает финансовое вознаграждение. Это недопустимо. Настоящие вооруженные силы, созданные для нации, служат своему народу и его лидерам, не стремясь к личной выгоде. Только верность и любовь к своей Родине могут поддерживать сильную и стойкую армию."
 SOV_motherland_holy_spirit: "Святой Дух Родины"
 SOV_motherland_holy_spirit_desc: "Наша страна глубоко укоренилась в религиозных традициях, которые существовали веками. Хотя наша церковь остается незапятнанной, она не ведет активной работы по укреплению веры в обществе. Это должно измениться. Наши святые отцы должны признать, что Россия нуждается в духовном возрождении, сродни второму крещению. Наш народ должен возродить свой благочестивый дух и объединиться с нашим любимым лидером и его верными союзниками."
 SOV_third_rome_rises: "Восхождение Третьего Рима"
 SOV_third_rome_rises_desc: "Третий Рим... Нация-крепость в борьбе с силами Антихриста, с адскими силами. Мы - люди, которые гордо противостоят всем невзгодам мира, мира, забывшего свои корни. Даже в одиночку в этой битве мы едины в нашей вере и нашем лидерстве. Сегодня мы заявляем, что этот крестовый поход - это борьба за саму душу человечества, и Россия выступает в роли рыцаря, который сразит зверя."
 SOV_russian_ethnic_brotherhood: "Русское Этническое Братство"
 SOV_russian_ethnic_brotherhood_desc: "Россия - страна, богатая этническим разнообразием, и проблемы, возникающие в связи с этим, значительны. Алиханов признает, что мы не можем бросить эти меньшинства, когда придет время защищать Россию. Наше единство сейчас должно быть настоящим братством по оружию, а не просто неопределенной дружбой народов. Если вы хотите быть частью России, вы должны не только мыслить как русский, но и действовать как русский, будь то дома, на улицах или, что более важно, на поле боя."
 SOV_unleash_the_yellow_guard: "Уполномочить Желтую Гвардию"
 SOV_unleash_the_yellow_guard_desc: "Желтая гвардия - это специализированная военизированная организация в составе СЗНД. Эти храбрые мужчины и женщины, с их непоколебимой решимостью, сформируют силу, которая безжалостно разгромит наших врагов и защитит то, что для нас свято. Они будут интегрированы в различные службы безопасности, включая МВД, вооруженные силы и другие правоохранительные органы. На начальном этапе мы пополним их ряды преданными своему делу людьми. По мере того, как к ним присоединится больше людей, все сотрудники низшего звена в этих организациях станут верными сторонниками Алиханова."
 SOV_consolidate_the_population: "Консолидировать Население"
 SOV_consolidate_the_population_desc: "Наши люди все еще не до конца понимают, что здесь происходит. Это битва за будущее России. Противоречивые мнения и недостоверные сообщения сбивают нас с толку, порождая сомнения и озабоченность. Это должно прекратиться. Российский народ снова станет единым целым, объединенным единой целью, как семья, во главе с Алихановым. Мы напомним ему об их выдающемся наследии, об истории, которую крадут бесхребетные политики, служащие интересам глобалистов и нечестивых сил."
 SOV_tighten_the_laws: "Ужесточить Законы"
 SOV_tighten_the_laws_desc: "Эта либерализация является разрушительной силой, которая угрожает целостности российского правопорядка. Это должно прекратиться. Используя различные юридические лазейки, созданные незавершенными конституционными реформами, мы соберем грозную силу, намного более сильную, чем когда-либо были ФСБ или МВД. Это новое министерство, первоначально действовавшее в рамках временной структуры, призванной заменить старые государственные организации, постепенно поглотит и объединит все лояльные силовики, подключив их непосредственно к кремлевской системе управления. Мы установим в государстве подлинный порядок, защищенный от внутренних угроз."
 SOV_use_presidential_powers: "Использовать Президентские Полномочия"
 SOV_use_presidential_powers_desc: "Российский президент по-прежнему обладает значительной властью. К сожалению, предыдущие руководители редко пользовались ею в полной мере. Но Алиханов намерен использовать каждый аспект своей власти в своих интересах. Как и сильные лидеры до него, он будет использовать эту власть для устранения угроз российскому народу. Благодаря своему практическому подходу он привлечет на свою сторону больше граждан."
 SOV_push_for_new_federation: "Новое Российское Государство"
 SOV_push_for_new_federation_desc: "Россия переживает глубокие преобразования. Мы коренным образом перестраиваем существующую систему, добиваясь того, чтобы она соответствовала нашему видению. Хотя формально федерация продолжит свое существование, на самом деле возникнет мощное централизованное государство, все пути которого будут вести в Москву. Кремль будет обладать высшей властью в отношении решений, принимаемых местными органами власти, если таковые останутся после завершения наших реформ."
 SOV_secure_national_dictatorship: "Надёжная Национальная Диктатура"
 SOV_secure_national_dictatorship_desc: "Россия в безопасности, благодаря сильному руководству Алиханова. Как и много раз ранее, нужен великий лидер, который мог бы направлять нацию, иногда от ее собственных ошибок. Авторитет Алиханова укрепится, и его влияние будет неофициально признано движущей силой. В отличие от бюрократии, партии или администрации, он один будет двигать Россию вперед."
 SOV_transform_our_cities: "Трансформировать Наши Города"
 SOV_transform_our_cities_desc: "Наши крупнейшие города должны стать средоточиями державнической идеологии. Они должны напоминать огромные яркие полотна, прославляющие наши достижения и лидерство. Каждая поверхность, от стен до рекламных щитов, должна быть покрыта пропагандой, новостями и телеэкранами. Мы должны сократить количество рекламы и повысить единообразие наших сообщений. С помощью этих средств мы можем противодействовать пораженческим и предательским высказываниям даже в наших самых либеральных городах."
 SOV_the_slavic_union: "Укреплять Славянский Союз"
 SOV_the_slavic_union_desc: "Славянский союз - это вдохновляющее видение, хотя и трудновыполнимое. Эта грандиозная идея находит отклик у тех, кто стремится привить нашему народу гордость, радость и чувство национальной идентичности. Мы будем взаимодействовать с нашими славянскими братьями и сестрами в нашей сфере, постепенно убеждая их принять этот новый, амбициозный союз. Проявив настойчивость, этот проект в конечном итоге станет реальностью."
 SOV_warriors_of_national_revival: "Воины Национального Возрождения"
 SOV_warriors_of_national_revival_desc: "Национальное возрождение - это вечный огонь, который никогда не гаснет. Он постоянно ярко горит, воспламеняя и поддерживая себя. Любой, кто посмеет ему угрожать, будет уничтожен. Наши солдаты, гражданские лица, члены партии и желтая гвардия должны воплощать это видение, всегда носить его с собой и быть готовыми защищать его до последнего вздоха."
 SOV_end_the_opposition: "Покончить с Оппозицией"
 SOV_end_the_opposition_desc: "Наши враги слабеют, они не в состоянии противостоять нашей растущей мощи. Проведя быструю и жестокую атаку, мы, наконец, сможем победить их. Наши информаторы подготовлены, а наши специальные команды готовы нанести удар. Мы раскроем все тайники, уничтожим их сети и схватим всех, кто в них замешан. Да смилостивится Господь над их душами, ибо их будущее не сулит ничего, кроме горя."
 SOV_derzhavnik_constitution: "Державная Конституция"
 SOV_derzhavnik_constitution_desc: "Чем дольше тянулось неофициальное приостановление действия конституции, тем более умеренные державники становились недовольны. Они разработали план, как представить Алиханову новую, более национальную конституцию. Этот документ позволит избежать ошибок его предшественников, позволит сильной, сплоченной исполнительной власти вмешаться в кризисные периоды, а также поддержит создание сената для управления страной в более спокойные периоды."
 SOV_groundworks_of_national_republic: "Основы Национальной Республики"
 SOV_groundworks_of_national_republic_desc: "После периода напряженных усилий наступает время остановиться и поразмыслить. Это сейчас. Мы сражались и одержали победу, оставив врагов России позади. Тем не менее, наш народ по-прежнему жаждет более активных политических действий. Поэтому, сохраняя за собой роль верховного лидера, мы вводим новую должность - консула. Это выборное должностное лицо будет консультировать и направлять нашего лидера в вопросах, для решения которых он был избран."
 SOV_national_codex_of_russia: "Национальный Кодекс России"
 SOV_national_codex_of_russia_desc: "Идея конституций - это иностранная концепция, созданная врагами родины. Вместо этого мы избавимся от пережитков оккупации и разработаем подлинно российский свод фундаментальных законов, который будет руководить нашей нацией для будущих поколений. Эта новая система не будет включать опасные положения о правах человека или свободе слова. Вместо этого она будет сосредоточена на роли верховного лидера и обязанностях, которые должны выполнять все граждане."
 SOV_eternal_derzhava: "Вечная Держава"
 SOV_eternal_derzhava_desc: "Государство взметётся до неба\nИ заквакает треснувший мир\nЧто хотел нас угробить,ослабить\nИ растлить всем,чем только он мог\nТоталитарное государство\nВознесётся до самых небес\nТоталитарное государство\nЗакуётся в железобетон\nТоталитарное государство\nПодчинит себе сломленный мир"
 SOV_party_with_a_state: "Единение Партии С Государством"
 SOV_party_with_a_state_desc: "Россия и СЗНД неразделимы. Это одно и то же. В России, если человек хочет чего-то достичь, он должен быть частью СЗНД. В противном случае его жизнь не имеет большой ценности в глазах государства. Партийные документы, доктрины и гимны должны стать достоянием нации, если мы хотим, чтобы Россия просуществовала тысячи лет. СЗНД должна руководить страной, иначе предатели восторжествуют."
 SOV_preemtive_blow: "Упреждающий Удар"
 SOV_preemtive_blow_desc: "Мы не можем просто стоять в стороне и наблюдать, как наши враги готовятся напасть на нас. Только слабое государство допустит это. Алиханов и державники без колебаний нанесут удар первыми. Конечно, в глазах международного сообщества мы будем представлены как неразумные агрессоры. Однако их мнение не имеет большого значения.\nК оружию! Слава России!"
 
 SOV_red_derzhava: "Красная Держава"
 SOV_red_derzhava_desc: "Какая трагедия! Погиб наш великий вождь Антон Алиханов от рук врагов. Но, к счастью для нашей великой страны, есть человек, который готов продолжить дело Алиханова, честно-честно! Азарёнок и его группа красных державников возьмёт власть в свои руки, ведь именно этого хотел наш бывший главный, всё-таки он начинал относится всё теплее к идеям красного державизма."
 SOV_the_north_korean_model: "Севернокорейская Модель"
 SOV_the_north_korean_model_desc: "КНДР действительно прото-державистское государство народного типа. Смотря на опыт там, мы сможем адаптировать его под наши взгляды и построить систему тотального единства Народа, Армии и Партии также, как это сделала семья Кимов."
 SOV_bureaucratic_revolution: "Бюрократическая Революция"
 SOV_bureaucratic_revolution_desc: "Бюрократ не дармоед - бюрократ должен быть героем! Отношение к административному аппарату в нашей стране остаётся сложным, поэтому мы должны обновить кадры внутри министерств и комиссии, поставить новые лица, не только готовые к службе ради народа, но и полностью лояльные нам."
 SOV_junta_of_the_people: "Народная Хунта"
 SOV_junta_of_the_people_desc: "Армия всегда была гордостью нашей державы, оттуда выходят герои, которые были испытаны боями за Родину. Мы должны довести это до максимума, армейская каста теперь получит привилегии и также позиции в правительстве, ведь человек, который воевал за родину, сможет постоять за неё и в кабинетах власти."
 SOV_helmsman_of_the_motherland: "Вождь Отечества"
 SOV_helmsman_of_the_motherland_desc: "Ты вражью жадность иссушил\nТы нас победам научил\nТы в руки слабых ключ вручил\nОт новой жизни - Вождь\nИзвестен всей вселенной ты\nДеяний славных мастер ты\nПознавший мысли бедноты\nТебе пою я - Вождь!"
 SOV_new_propaganda_wave: "Новая Волна Пропаганды"
 SOV_new_propaganda_wave_desc: "Да, смена госпарадигмы, пусть и более незаметная, всё равно вызывает много вопросов даже у лояльного населения, поэтому мы должны провести массовые агитационные работы, показать народу, что Алиханов и Азарёнок едины в своих мыслях, и то, что мы идём верной дорогой!"
 SOV_great_russian_socialism: "Великорусский Социализм"
 SOV_great_russian_socialism_desc: "Социализм должен быть наш, русский, так завещали нам великие теоретики русского большевизма. Поэтому, строя на уже фундаменте экономики при Алиханове, мы усилим наши методы государственного вмешательства и программ, строя рай для рабочего класса России."
 SOV_neo_stalinist_war_economy: "Неосталинская Военная Экономика"
 SOV_neo_stalinist_war_economy_desc: "Война неизбежна, и Сталин это понимал. Как в 30-х и 40-х годах, мы должны сосредоточиться на военном деле и промышленности. Россия должна стать не только надежной крепостью для обороны, но и мощным инструментом для наступления."
 SOV_labor_industrial_mobilization: "Промышленная Мобилизация"
 SOV_labor_industrial_mobilization_desc: "Рабочий! Слышишь? Гудят танки врагов! Наши фабрики и наш рабочий класс должны быть в состоянии боевой готовности постоянно, даже если врагов на самом деле нет. Он должен думать, что каждое его действие в труде поможет нашей стране в борьбе с неприятелем."
 SOV_new_artles: "Новые Артели"
 SOV_new_artles_desc: "Государство не может контролировать всё, и Сталин это понимал. Поэтому при нём появились артели - производственные кооперативы, созданные на добровольной основе. Члены артелей трудились вместе и несли коллективную ответственность. Артели занимались бытовыми нуждами, производством товаров широкого потребления, предоставляли услуги и добывали природные ресурсы - известняк, торф."
 
 
 SOV_russia_above_all: "Россия Превыше Всего"
 SOV_russia_above_all_desc: "Слишком долго международные партнеры и союзники использовали Россию в своих интересах. Державники изменят это, поставив интересы России превыше всего и сосредоточившись на приумножении богатства нашей родины."
 SOV_the_statist_model: "Государственная Модель"
 SOV_the_statist_model_desc: "Государству виднее, особенно в экономических вопросах. Частный сектор, управляемый ненадежными лицами, использует все, что есть в его распоряжении, для обмана честных работающих русских, лишая их законной заработной платы и одновременно нанимая иностранную рабочую силу по более низкой цене. Теперь государство через свои различные комитеты и министерства возьмет управление экономикой в свои руки, и любые возражения будут встречены смелыми заявлениями."
 SOV_intensify_military_funding: "Увеличить Военное Финансирование"
 SOV_intensify_military_funding_desc: "Одним из наиболее важных, но часто упускаемых из виду аспектов российской экономики является наш мощный военно-промышленный комплекс. Чтобы противостоять внешним угрозам, нам нужно не только эффективное оружие, но и квалифицированные мастера и заводы, которые его создают."
 SOV_state_benefits_for_russian_workers: "Государственные Льготы для Русских Рабочих"
 SOV_state_benefits_for_russian_workers_desc: "Наше государство позаботится о вас, если вы русский. На протяжении десятилетий паразитический капитал отнимал у вас больше, чем следовало бы. Но теперь все по-другому. Мы обеспечим нашим национальным работникам льготы и программы, которых они заслуживают, для комфортного и заслуженного отдыха. Между тем те, кого не сочтут желательными, конечно, останутся ни с чем."
 SOV_russian_industrial_powerhouse: "Русское Промышленное Превосходство"
 SOV_russian_industrial_powerhouse_desc: "Могучие дымовые трубы, устремленные в небо, огромные комплексы, похожие на небольшие города, и подземные сооружения - все это станет частью российской действительности, когда мы приступим к масштабной индустриализации. Наша экономика подпитывается трудом низших слоев населения, а не комфортом офисных парков или достижениями высоких технологий. Именно так должна выглядеть настоящая экономика, а не регрессивная."
 SOV_fruits_of_the_motherland: "Социально-Экономическое Единство"
 SOV_fruits_of_the_motherland_desc: "Наше общество едино не только политически, но и экономически, хотя и существует неравенство в благосостоянии. Бюрократы и рабочие сотрудничают для достижения взаимного процветания. В отличие от радикальных представлений о социализме и либерализме, мы демонстрируем, что нет необходимости уничтожать один класс, чтобы принести пользу другому."
 SOV_kick_foreigners_out_of_labor_force: "Вышвырнуть Иностранцев"
 SOV_kick_foreigners_out_of_labor_force_desc: "На протяжении десятилетий влиятельные силы использовали стремление жителей Центральной Азии к комфортной жизни в России, используя их готовность соглашаться на минимальную оплату труда, чтобы вытеснить российских рабочих с рынка труда. Этому должен быть положен конец. Мы предлагаем полный запрет и выдворение нелегальных работников из России, отправив их обратно на родину. Хотя такие меры, несомненно, причинят некоторую боль, они проложат путь к будущему, в котором мы сможем построить по-настоящему процветающее общество, не полагаясь на дешевую импортную рабочую силу."
 SOV_against_economic_russophobes: "Кампания Против Экономических Русофобов"
 SOV_against_economic_russophobes_desc: "В списках богатейших российских бизнесменов почему-то много нерусских имен. Как они сколотили свое состояние? Отбирая его у трудолюбивого российского населения, будь то владельцы бизнеса или простые рабочие. Эта несправедливость сохранялась десятилетиями. Но теперь пришло время расплаты. Эти лица, не являющиеся гражданами России, будут лишены своих богатств и вынуждены вернуться в свои родные страны. Давайте посмотрим, смогут ли они добиться там успеха."
 SOV_russian_national_capitalism_natros: "Русский Национальный Капитализм"
 SOV_russian_national_capitalism_natros_desc: "Мы должны признать, что долгое время неправильно понимали истинный потенциал капитализма. Однако Алиханов и его коллеги представляют себе более справедливую систему. В отличие от предыдущего, на этом новом рынке приоритет будет отдаваться трудолюбивым россиянам и их бизнесу. Это также будет мотивировать рабочий класс, который стал самодовольным из-за чрезмерной поддержки со стороны правительства."
 SOV_improve_russian_made_products: "Улучшение Качества Отечественных Продуктов"
 SOV_improve_russian_made_products_desc: "Когда вы думаете о продуктах российского производства, какие образы приходят вам на ум? Возможно, что-то маленькое и незначительное. Мы должны изменить это восприятие. Российские продукты должны улучшаться не только в ассортименте, но и в качестве. Такие ключевые товары, как автомобили, телефоны и телевизоры, должны иметь приоритет, и мы также должны уменьшить нашу зависимость от иностранного импорта в этих областях."
 SOV_support_national_entrepreneurs: "Реструктуризация Российских Гигантов"
 SOV_support_national_entrepreneurs_desc: "Государственные корпорации обладают огромным потенциалом, но из-за плохого управления со стороны неэффективных чиновников в прошлом они нуждаются в реформировании, чтобы эффективно служить национальным интересам. Мы должны устранить их негативное влияние и направить эти структуры по пути, который действительно принесет пользу России."
 SOV_national_council_of_corporations: "Национальный Совет Корпорации"
 SOV_national_council_of_corporations_desc: "Теперь, когда мы устранили старых противников, мы можем объединить эти государственные корпорации в более сплоченную структуру. Таким образом, когда Кремлю потребуется что-то сделать, линия связи будет четкой и наполнена лояльными голосами. Естественно, мы также вознаградим их за лояльность и сотрудничество."
 SOV_era_of_russian_megapolises: "Эпоха Русских Мегаполисов"
 SOV_era_of_russian_megapolises_desc: "Красивые российские города, украшенные разноцветными огнями и высокими стеклянными конструкциями, воплощают наше уникальное видение будущего. Это должны быть места, где трудолюбивые граждане России смогут увидеть достижения государства и с гордостью заявить: "Я горжусь тем, что я русский!" Эти города должны превратиться в оживленные центры коммерции, промышленности и торговли, служащие центрами прогресса и инноваций."
 SOV_wide_urbanization_works: "Масштабные Работы по Урбанизации"
 SOV_wide_urbanization_works_desc: "Наши города огромны, но они недостаточно обширны. Необходимо приложить огромные усилия, чтобы приспособиться к растущему населению, состоящему из рабочего класса, и к промышленным предприятиям, которые мы создали для них. Эти пространства могут быть не особенно элегантными или красивыми, но они тщательно продуманы, чтобы обеспечить скромный комфорт для рабочего класса. Цель состоит в том, чтобы обеспечить доступные и эффективные пути к их рабочим местам, позволяющие им быстро добираться до места назначения."
 
 #Stalinist Revolution
 SOV_steel_revolution: "Стальная Революция"
 SOV_steel_revolution_desc: "Исторический процесс невозможно остановить, и режим Алиханова, будучи реакционным и репрессивным в своей сути и пытавшийся апеллировать к пещерному национализму народных масс, был в конце концов свергнут этими самыми массами. Однако чего у бывшего правителя России не отнять, так это предусмотрительности. Предварительно зачистив левую оппозицию, он думал, что обезопасил себя от возможного гнева народа. Но лидеры всегда найдутся. Дмитрий Юрьевич Пучков и Клим Александрович Жуков встали во главе народных масс и снесли режим Алиханова. Стальная Революция свершилась, и горе всем отступникам. Слава Советской России!"
 SOV_spirit_of_the_soviet_russia: "Дух Советской России"
 SOV_spirit_of_the_soviet_russia_desc: "Лишь при товарище Сталине Россия и все народы, населяющие её, познали искреннее счастье. Идеальный баланс между социальной защитой с уверенностью в завтрашнем дне и величием. Не было на свете ещё мудрее вождя, и не будет. И товарищ Клим Жуков лично проследит, чтобы заветы вождя выполнялись беспрекословно."
 SOV_reestabilish_bolshevik_party: "Воссоздать Большевистскую Партию"
 SOV_reestabilish_bolshevik_party_desc: "Большевистская партия в основе своей была авангардом рабочего народа, способом его волеизъявления и оружием борьбы против ревизионистов и реакционных элементов в обществе! Стабилизировав страну, мы с гордостью можем объявить о полноценном установлении правления рабочих и крестьян а  также о готовности отстаивать волю трудового народа всеми силами."
 SOV_restore_stalin_constitution: "Восстановить Сталинскую Конституцию"
 SOV_restore_stalin_constitution_desc: "Сталинская конституция 1936 года была прорывным документом для XX века. Также называемая «Конституцией победившего социализма», она была невероятно прогрессивной для своего времени, закрепляла права трудового народа на владение ресурсами державы, права на социальное обеспечение и прямое участие народа в выборах. До сих пор ни одно из государств ещё не смогло приблизиться к демократичности и справедливости этого государствообразующего документа. В связи с этим в наши двадцатые годы XXI века мы восстановим эту конституцию, закрепив победу над силами реакции и капитализма в нашей, отдельно взятой, стране."
 SOV_cult_of_the_teader: "Культ Вождя"
 SOV_cult_of_the_teader_desc: "Не было в истории всего мира теоретика, что своими трудами затмил бы мудрость Иосифа Виссарионовича Сталина. Выше Гималаев и глубже океанов, его чуткий ум не знал границ. Его стальная решимость смогла перестроить отсталую страну в мировую державу! Приняв страну с сохой, он оставил своим потомкам ядерную бомбу и гигантский индустриальный комплекс. О, товарищ Сталин, 3000 лет и даже более вашей мудрости не будет равных. Славься, величайший вождь, товарищ и просто мыслитель! Славься же имя твоё, Иосиф Виссарионович Сталин!"
 SOV_revive_soviet_brutalism: "Возродить Советский Брутализм"
 SOV_revive_soviet_brutalism_desc: "Буржуазный декаданс склонен к вычурной демонстрации материальных излишеств. Мраморные колонны, золотые украшения, статуи и прочие элементы интерьера должны служить маркером, что данное здание принадлежит элите. А простой трудовой народ не жалуется в этих местах. Пришло время реванша брутализма! Мозг и решимость пролетариата, воплощённые в материальную форму! Чёткие линии, лишённые изысков, и максимальная функциональность. Вот идеалы архитектуры советской державы!"
 SOV_zealous_agitation_and_propaganda: "Яростная Агитация и Пропаганда"
 SOV_zealous_agitation_and_propaganda_desc: "Находясь в мире доминирующего капитализма и ревизионизма, приходится постоянно мириться с потоками лжи буржуазии. Обещая рабочему классу какие-то свободы, демократию и социальную справедливость, они пытаются подменить понятия, заставить всех плясать под брюссельскую дудку и вновь стать рабами капитала. Именно поэтому советский гражданин не должен знать покоя! В кино, в интернете, в книгах! Везде должна быть непрерывная пропаганда наших верных идеалов. Пусть со стен зданий на него смотрят вожди советской державы! Пусть изо всех громкоговорителей играет гимн РКП(б)! Однажды мы уже проиграли эту битву за умы, и второй шанс выдался нам не так просто, третьего может не быть вовсе."
 SOV_dogmatic_materialism: "Догматический Материализм"
 SOV_dogmatic_materialism_desc: "Что же такое диалектика? Это метод научного познания, разработанный Гегелем, который чётко постулирует три закона: 1) единство и борьба противоположностей; 2) переход количественных изменений в качественные; 3) отрицание отрицания. Данные законы наблюдаются во всех материальных проявлениях. Как заяц своей шёрсткой и теплокровностью отрицает холод природы, так и капитализм вечно сражается с социализмом. Любой отход от догматических положений, сформулированных Марксом, Энгельсом, Лениным, Сталиным, в данном случае должен рассматриваться как саботаж советской системы и нещадно караться как проявление реакционного влияния и даже попытка ревизионизма."
 SOV_establish_total_control: "Установить Тотальный Контроль"
 SOV_establish_total_control_desc: "Когда в пятидесятые годы двадцатого века контроль над страной выскользнул из рук понимающих людей, не стало величайшей державы на свете. Воспользовавшись этим, предатели, словно тараканы, постепенно начали проникать во все сферы жизни советского гражданина — от искусства и до самой партии. Так и не стало величайшей державы на планете. И новая, стальная революция может в конечном итоге закончиться точно так же. Суть народа в том, что за ним нужен постоянный контроль. И Дмитрий Юрьевич Пучков хорошо знает, как контролировать народные массы. Мы не предадим завоеваний Октября, советская держава будет продезинфицирована от противников народного режима превентивно."
 SOV_bureaucrats_under_watch: "Бюрократы Под Надзором"
 SOV_bureaucrats_under_watch_desc: "В позднем Советском Союзе бюрократия и партийная верхушка пользовались невиданными привилегиями за счёт рабочего класса. Этот неприятный изъян советской системы унаследовала и российская система. Агрономы и всякие их сыновья таким образом возомнили себя властителями и главной силой в государстве, что в корне неверно. Советский народ — это единственный властитель страны, а чтобы таких заскоков не было, чрезвычайный комитет будет держать в ежовых рукавицах всю бюрократию. Всё ради народа."
 SOV_expansion_of_security_state: "Расширение Чекистского Государства"
 SOV_expansion_of_security_state_desc: "Кому-то чекистское государство может показаться отсталой и даже дикой формой правления. Однако в самом деле это и есть способ воплощения истинной воли пролетариата, крестьян и прочих слоёв населения. Пока народ пользуется всеми благами нашего государства, партийная верхушка будет бдеть за порядком и правильностью построения социализма, а затем и коммунизма. Ну а за их преданностью отчизне будет следить Чрезвычайный Комитет. Только так и можно построить эффективную систему."
 SOV_the_russian_party: "Русская Партия"
 SOV_the_russian_party_desc: "Вопреки заносчивым либералам, именно советская партия была самым русским режимом за всю историю нашего государства вообще. Только при нём простой человек пользовался благами, которые только могла предложить наша необъятная родина. Культура — от кинематографа до исторических книг — процветала, и именно тогда русский человек был в почёте в равной семье народов. Прочие режимы пытались это изменить в угоду своих нарративов, но в конечном итоге терпели крах. Именно поэтому мы восстановим самую справедливую из возможных систем, что учитывает интересы государствообразующего народа."
 SOV_institutionalize_whistleblowing: "Узаконить Доносительство"
 SOV_institutionalize_whistleblowing_desc: "Порой всякие недалёкие граждане задаются вопросом, мол: «Кто же написал 4 миллиона доносов?» — и при этом в их тупую голову не приходит самой банальной мысли. Доносы написал трудовой и неравнодушный народ СССР. Потому что народу СССР была важна безопасность и стабильность советской державы. И поэтому возвращение данной практики не будет чем-то вычурным. Мы же не собираемся превращаться в планету Алькатраз, в конце концов. Просто даём народу оружие для борьбы."
 SOV_teach_the_young: "Воспитать Молодежь"
 SOV_teach_the_young_desc: "Молодёжь нашей советской державы находится в непростом положении. Большинство стариков, живших при Сталине, уже погибли, а новые режимы всеми силами старались запятнать нашу великую историю. Пришло время говорить с молодёжью на одном языке. Пусть в программы для молодых получится всунуть не так уж и много пропаганды, порой, однако, просто потыкать в буржуазных свиней и посмеяться тоже бывает полезно. Главное, чтобы в результате этого малолетние зрители не одебилили в конец в почерпнули для себя нечто полезное."
 SOV_merge_government_positions: "Красная Иерархия"
 SOV_merge_government_positions_desc: "Так уж вышло, что в несовершенном человеческом обществе так или иначе будут возникать разного рода иерархии. Так что правильнее всего было построить идеологически выверенную иерархию, что приносила бы государству максимальную пользу, а потом с лёгкостью, при наступлении коммунизма, могла бы сама собой отмереть. Так и вышло, что в новой советской державе народ, хоть и формально находился на самом нижнем уровне (формально, конечно, ещё ниже были всякие отщепенцы, но говорить о них — лишь бумагу марать), всё равно получал свои привилегии и наслаждался высочайшим уровнем жизни. Чуть выше была партийная верхушка, что следит за построением коммунизма. И уже на самом верху — члены Чрезвычайного комитета, что следят за тем, чтобы иные слои не попадали под влияние буржуазной и реакционной пропаганды."
 SOV_pigs_to_the_slaughter: "Свиньи На Убой"
 SOV_pigs_to_the_slaughter_desc: "Когда пал режим Алиханова, оказалось, что предателей и вербованных сволочей в нашем государстве чуть больше, чем хотелось бы. Словно чудовища из сказок, они перешли в свои укромные уголки, подземелья, где планируют свои козни против молодого советского режима. К счастью, у нас тоже есть ответ. Наши, так называемые, «санитары подземелий» в лице сотрудников ЧК проведут зачистку и дезинфекцию ран на теле нашей родины и очистят её от внутренних врагов системы."
 SOV_the_stalin_model: "Сталинская Модель"
 SOV_the_stalin_model_desc: "Что есть коммунизм? Советская власть плюс индустриальная мощь! Именно поэтому, словно в сталинские времена, мы должны вложиться в расширение мощностей нашей державы. Пусть чёрный смог затмевает небо, и гудят турбины электростанций! Советская держава возвращается на мировую арену!"
 SOV_new_stakhanovite_movement: "Новое Стахановское Движение"
 SOV_new_stakhanovite_movement_desc: "Особенность планов при нашей экономике в том, что рабочие имеют стимул их перевыполнять, ибо это принесёт нашей державе больше пользы, а рабочие за это получат премии. Таким образом, мы должны стимулировать появление «контрпланов», чтобы молодые стахановцы с утроенным усердием добывали ископаемые и выплавляли сталь!"
 SOV_industrial_paradise: "Промышленный Рай"
 SOV_industrial_paradise_desc: "Гигантские трубы возвышаются над строениями заводов. Доменные печи круглые сутки выплавляют тонны чугуна, и круглые сутки напролёт заводы гудят, шумят и не знают усталости. Вот он, рукотворный рай, что был построен нашими усилиями. Кузница нового мира и образец для подражания!"
 SOV_reap_the_benefits: "Пожинать Плоды Системы"
 SOV_reap_the_benefits_desc: "Требуя от людей самоотверженной работы, было бы в крайней степени неправильно лишать их плодов собственного труда. Трудящиеся день и ночь рабочие в нашей державе, благодаря справедливому распределению благ, наслаждаются самыми лучшими условиями жизни. Полки ломятся от продуктов, электроники и роскоши, а советские граждане способны их себе позволить благодаря нашей справедливой системе. Трижды ура советскому народу и его трудолюбию! Ура! Ура! Ураааа!"
 SOV_loyal_military_force: "Новая РККА"
 SOV_loyal_military_force_desc: "Рабочая-Крестьянская Красная Армия всегда была мечом и щитом пролетариата, а также последним инструментом проявления его воли. Защищая границы социалистической державы, она была лучшей во всём мире. От тайги до британских морей ей не было равных! Пришло время возродить величайшую армию на свете и вручить ей лучшие из современных орудий."
 SOV_political_commissars: "Политические Комиссары"
 SOV_political_commissars_desc: "Кто-то говорит, что армия должна быть аполитичной и слепо следовать за путём державы. Однако это реакционная выдумка, созданная специально, чтобы промыть головы солдатам и внушить им отсутствие собственной воли. Наше государство неразрывно связано с социалистической идеологией, и поэтому даже в армии все должны знать, за что сражаются! Политические комиссары будут проводить партийную работу с членами новой РККА и объяснять им все прелести и важность защиты социалистического отечества."
 SOV_soviet_war_phoenix: "Советский Феникс Войны"
 SOV_soviet_war_phoenix_desc: "Советская военная машина сильна как никогда. Десятки танков сходят с конвейера еженедельно, солдаты вооружены по последнему слову техники, а людской резерв не знает границ. Вот она, та самая стальная волна, что сметёт капиталистический порядок и проведёт успешную мировую революцию… в будущем. Но пока час борьбы не настал, и эта сила должна защищать наши границы, тем более что европейский враг не дремлет и готовится к реваншу."


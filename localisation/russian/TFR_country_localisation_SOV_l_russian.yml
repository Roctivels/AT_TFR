 SOV_russian_national_economics_desc: ""
 SOV_nationalize_Evraz: "Государственная Национализация"
 SOV_nationalize_Evraz_desc: "Хотя государственные предприятия официально управляют добычей и контролем над нашими природными ресурсами, фактически они все еще находятся под частным влиянием. Их руководители, обладающие властью, схожей с властью олигархов, могут продолжать идти по тому же пути. Чтобы обеспечить безопасность наших ресурсов, мы должны провести настоящую национализацию. В дальнейшем управление природными ресурсами будет поручено соответствующим министерствам и новым советам, сформированным путем сочетания внутренних выборов и центральных назначений. Мы считаем, что такая модель коллективного принятия решений обеспечит успех."
 SOV_develop_siberia: "Развить Сибирь"
 SOV_develop_siberia_desc: "Сибирь - это край несравненной красоты и загадочности: бескрайние луга, густые леса, высоченные горы и бескрайние снежные поля. Возможно, здесь находятся самые разнообразные природные ландшафты на Земле - бесценное сокровище. На протяжении многих поколений россияне посвящали себя Сибири, работая над тем, чтобы сделать ее жизненно важной частью нации. Мы продолжим эту важную работу, превращая эту землю, олицетворяющую русский дух, в новый Эдем."
 SOV_revising_his_vision: "Пересмотр Его Видения"
 SOV_revising_his_vision_desc: "Жириновский, несомненно, был великим государственным деятелем и провидцем новой России. Однако его философия часто становилась жертвой неверного толкования фанатичными элементами. Слуцкий исправит эту ошибку. Владимир Вольфович явно выступал за подлинно российскую демократию, независимую от западных теоретиков и аналитиков, укорененную в наших традициях и истории." 
 SOV_empower_the_senate: "Расширить Полномочия Сената"
 SOV_empower_the_senate_desc: "Сенат должен функционировать как главный консультативный орган при президенте России. Благодаря избранным сенаторам мы сможем лучше понимать и представлять различные идеологии нашей страны." 
 SOV_national_presidency: "Национальное Президентство"
 SOV_national_presidency_desc: "Президент является стержнем безопасности нашей страны. Он обладает высшей властью, принимая важнейшие решения, которые определяют наше будущее. Именно президент помогал нам пережить трудные времена и будет продолжать делать это всегда."
 SOV_modern_political_philosophy: "Новая Политическая Философия"
 SOV_modern_political_philosophy_desc: "Владимир Вольфович Жириновский, многогранная личность, преуспел не только в политике, но и в различных других областях. Его многочисленные письменные и невысказанные высказывания звучат десятилетиями, оставляя неизгладимый след в нашем обществе. Наша нация впитала его учение, интегрировав его в наше коллективное понимание и развивая на этом фундаменте." 
 SOV_secure_russian_democracy: "Обеспечить Русскую Демократию"
 SOV_secure_russian_democracy_desc: "Время пришло. Наша Россия стоит на пороге первых выборов с момента прихода к власти Жириновского. Многочисленные кандидаты будут бороться за голоса избирателей, но только те, кто обладает острым умом и глубоким пониманием русского народа, добьются успеха. Некоторые из этих кандидатов придерживаются довольно крайних взглядов, и мы искренне надеемся, что такие люди не одержат победу на этих свободных и общенациональных выборах."
 SOV_political_tutelage: "Попечение Партии"
 SOV_political_tutelage_desc: "ЛДПР выступает за свободное голосование, но сейчас еще не время. Мир сталкивается с серьезными угрозами и идеологиями, и, возможно, только Россия может защитить нас от этих опасностей. Наш уважаемый лидер и президент Леонид Слуцкий должен руководить нашей страной с заботой родителя, направляющего ребенка. Мы верим, что однажды россияне сделают мудрый выбор при голосовании." 
 SOV_new_russian_era: "Новая Русская Эра"
 SOV_new_russian_era_desc: "Восстань, великая Родина, где проживают народы разных вероисповеданий, национальностей и религий. Для всех нас наступает новая эра. Россия сияет как маяк добродетели и святости, где граждане активно участвуют в жизни нашей великой нации через демократические и общенациональные органы управления. Враги, как внутренние, так и внешние, могут пытаться подорвать наши позиции, но мы не дрогнем. Мы гордый народ." 
 SOV_new_russian_era_rogozin: "Новая Русская Эра"
 SOV_new_russian_era_rogozin_desc: "Восстань, великая Родина, где проживают народы разных вероисповеданий, национальностей и религий. Для всех нас наступает новая эра. Россия сияет как маяк добродетели и святости, где граждане активно участвуют в жизни нашей великой нации через демократические и общенациональные органы управления. Враги, как внутренние, так и внешние, могут пытаться подорвать наши позиции, но мы не дрогнем. Мы гордый народ." 

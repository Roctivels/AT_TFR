 ### FLAVOR EVENTS ###
 
 russiaflavor.1.t: "Невидимый Президент"
 russiaflavor.1.d: "Если что-то кардинально и отличало Владислава Юрьевича Суркова от его предшественников на посту президента России, так это то, что обычные жители страны едва ли слышали его заявления напрямую или даже видели его. Новый президент не разъезжал лично по стране, не давал громких речей и даже не вёл канала в телеграмме. Все его заявления доносились до широкой публики  через пресс-секретаря. А выступления, записанные или же в прямом эфире, были невероятной редкостью. Что резко контрастирует с активным Дмитрием Анатольевичем и его громкими высказываниями.\n\nКонечно, данные обстоятельства  стали благодатной почвой для теорий заговора. Самая популярная из них гласила о том, что настоящего Суркова убили сразу после подписания Минских соглашений, так как он якобы разочаровал Владимира Путина. Текущий президент же, по данной теории является всего лишь двойником и специально обученным актёром, через которого клика олигархов и «нео-царистов» диктует свои законы. Адепты данной теории отмечают внезапное возвращение «Суркова» в Кремль после смерти Путина, несмотря на заявление Медведева о продолжении курса Владимира Владимировича. А также крайне внезапную и словно бы срежиссированную отставку самого Дмитрия Анатольевича.\n\n Официальные лица правительства, по понятным причинам не дают комментариев по поводу этой гипотезы. Глупая конспирологическая теория, коих много развелось и то ли ещё будет. Конечно, президент слышал о ней и порой улыбается, вспоминая о том, что кто-то считает его подставным актёром."
 russiaflavor.1.a: "Но что если?" 
 russiaflavor.2.t: "Смертные Механизмы"
 russiaflavor.2.d: "Антон Павлович был простым чиновником. Работал во ФСИН, иногда подписывал и перекладывал бумажки. Работа непыльная, да и статус какой-никакой. Но две недели назад его ошарашила новость. Дескать прошли испытания нового ИИ, и его, чиновника, что почти десяток лет положил на работу в этом ведомстве, заменяют. Подумать только, на бездушную машину, его, человека из плоти и крови! Но отпираться было уже поздно, не спорить же с начальством и самим президентом о своей необходимости.\n\nТак Антон за день собрал свои вещи из кабинета в чемодан и уже собирался покинуть его навсегда. Жёлтые лучи закатного солнца освещали коридор в котором сейчас убирался Сергей Александрович, добрый старичок с сединой, что работал уборщиком тут уже давно.\n\n- В отпуск чтоль собираешься, Антошка? - Мужчина проговорил добродушно после чего улыбнулся оставшимися пожелтевшими зубами.\n- Никак нет, Сергей Александрович, уволили меня вот. Вещи свои собрал да на вокзал пойду.\n- Как это уволили!? За что?! Ты только не говори мне, что ты взятки брал или что хуже.\n- Да ну, успокойтесь. Просто наш, безусловно верный, президент вдруг решил, что алгоритм с моей работой будет справляться лучше. Ну так тому и быть\n- Вот оно что… А куда ты планируешь податься то?\n- На ферму вернусь, там дом отцовский может наконец-то отдохну от города. А вы как? Не боитесь что вас тоже машиной заменят?\n- Это ты правильно, конечно. Тут главное не отчаиваться всегда место каждому найдётся.. А про машину. .  . У меня внук недавно сказанул, мол искусственный интеллект природную глупость не победит. Вот и скажи мне сам, будет ли какой-то робот за мою зарплату тут убираться?\n- Тоже верно. .  . Ну прощайте. Даст Бог, может ещё увидимся.\n- Типун тебе на язык! Увидимся конечно ещё, ты же не помираешь там.\n\nТак они и разошлись. Антон направился на рейс до родной деревни. Его чемодан на колесиках с характерным стуком спускался по ступенькам. А Сергей и дальше потащил свою тележку. Грустить ему было не о чем, просто ещё один опустевший кабинет в котором нужно будет вытирать пыль."
 russiaflavor.2.a: "Только многовато их становилось." 
 russiaflavor.3.t: "ЭКСТРЕННО"
 russiaflavor.3.d: "Сегодня многие жители по пробуждению обнаружили на своих телефонах необычное оповещение. Новое сообщение от Госуслуг с пометкой ЭКСТРЕННО. Конечно, не все ещё слышали о новостях, и не все знали о нападении войск Европейского Союза.\n\nПри запуске приложения проигрывался небольшой ролик, который начинался с видов разрушенных городов и деревень по которым маршировали солдаты европейской армии. Вооружённые по последнему слову техники, они медленно шли на фоне разрушенных и горящих зданий. Постепенно запись теряла цвета, становясь чёрно-белой и силуэты затенялись, а форма и вооружение меняли свой вид. В конце же солдаты принимали свой окончательный облик. Солдаты Вермахта марширующие на фоне горящих деревень несущие своё вооружение. Иногда они были с трофеями в руках.\n\nЗатем кадр  менялся и перед зрителем представали кадры из одного из лагерей для «беженцев», расположенного в западнославянской зоне ЕС. Худые люди в лохмотьях измученные голодом столпившиеся за колючей проволокой за колючей проволокой, пока надзиратели в современной форме с лицами прикрытыми визорами смотрели на них. Кто-то демонстративно ел шоколад перед голодающими, а кто-то просто безучастно осматривал свою винтовку.\n\n В конце ролика следовало недолгое сообщение от президента Владислава Суркова, в котором он призвал народ Российской Федерации и всей Европы сражаться с европейским фашизмом. В конце своей речи лидер произнёс «Победа будет за нами!» после чего появился чёрный экран с этой же надписью написанной белым шрифтом. На этом же экране пользователю предлагалось узнать о войне больше, или принять участие в ближайшем мероприятии направленном на поддержку российской армии."
 russiaflavor.3.a: "Мы победим каким бы ни был бой." 
 russiaflavor.4.t: "Эпоха"
 russiaflavor.4.d: "Каблуки чёрных туфлей отчётливо стучали, когда одинокий мужчина в тёмном плаще шёл по кладбищу. В его руках был букет, предназначенный для дорого человека. Около входа его ждали двое крепких мужчин в чёрной одежде, его ждали лидеры других, недавно освобождённых стран и его ждал народ России, но сейчас было дело важнее. На этом кладбище всегда было тихо, могилы были ухоженными и сюда не заходили хулиганы.  Пробегая глазами по множеству плит мужчина видел десяток оборвавшихся судеб. Кого-то забрала война, кого-то болезнь, а кто-то сам убил себя алкоголем, сигаретами или чем-то хуже.\n\n Однако глазами он искал ту самую, единственную плиту и в конце-концов нашёл. Лысеющий, неплохо выглядевший для своего возраста человек с небольшой, навсегда застывшей улыбкой и добрыми глазами красовался на чёрном могильном камне, навсегда застывшей в этой позе. 1952-2022 гласили его годы жизни. Мужчина в плаще встал перед могилой на одно колено и смиренно положил букет. Уголки  губ дрогнули, но он старался держать себя в руках. Грустно осматривая портрет, лёгкой рукой смахнул небольшой слой пыли с надгробия после чего прошептал, «Мы сделали это, Вова». На мгновение ему показалось что в шелесте листьев  раздался тихий, но такой уверенный ответ от давно почившего человека. Быть может воображение разыгралось. Или нет? Было уже не так уж и важно. Так мужчина и провёл следующий десяток минут. Погруженный в свои мысли. После чего поднялся и устремился к выходу.\n\nВедь президенту РФ предстояло ещё много работы. Однако, даже выходя, Сурков думал о нём, человеке благодаря, которому, по желанию судьбы, оказался в политике. И которому он лично, да и вся Россия были обязаны."
 russiaflavor.4.a: "Я умру, но государство останется."
 russiaflavor.5.t: "Второй Трибунал"
 russiaflavor.5.d: "В зале, где почти век назад вершилась судьба верхушки нацистского режима, в прямом эфире снова гремят имена - быстро ставшие предметом ненависти каждого советского гражданина. Лидеры ультраправых режимов, недавно сотрясавших Европу: Франции, Германии, Италии и десятки менее важных функционеров, причастных к преступлениям против человечности - в наручниках, под пристальным взглядом мировой общественности.\nСлева - группа обвинителей стран ОМД, возглавляемых генеральным прокурором Советской стороны. Справа - представители новых европейских правительств, стремящихся отмежеваться от прошлого. В центре - подсудимые. Их вызывают давать показания по очереди. Кто-то отказывается, кто-то - понурив пустой взгляд глухо дает пояснения, тщательно сверяемые с материалами дел и показаниями свидетелей, а кто-то разражается гневными тирадами, лишь подтверждающими позицию обвинения.\nСвидетельства звучат без купюр: массовые репрессии, этнические чистки, пропаганда превосходства, лагеря, пытки, детские колонии перевоспитания, насильственное переселение. Прокуроры демонстрируют архивы и кадры, от которых стынет кровь - доказательства того, как быстро Европа вновь погрузилась во мрак, когда отвернулась от человечности.\nВне зала - толпы гражданских, репортеров, протестующих, сдерживаемые кордоном военных. Кто-то требует казни. Кто-то плачет. Кто-то отрицает. А кто-то впервые за годы чувствует: справедливость возможна.\n"
 russiaflavor.5.a: "История сделала круг." 
 russiaflavor.6.t: "Военные Игры"
 russiaflavor.6.d: "Экипаж, находящейся на боевом дежурстве подводной лодки К-18 "Карелия", пребывал в режиме полной боевой готовности с самых первых минут войны. Однако, несмотря на вновь разгорающуюся в Европе мясорубку, лодке был дан приказ сохранять режим полного молчания и всё это время подводники находились в томительном ожидании, уложив свое судно на дно Северного моря.\nШтатный радист уже более шести часов в назначенное время прослушивал радиочастоту, по которой ему и всему экипажу должны были поступать приказы, однако, сегодня, как и многие дни до этого, сохранялось полное радиомолчание. Вдруг, шипение пустого эфира прервалось передачей шифра. Ещё до того, как в голову к человеку, сидящему у радио, пришло окончательное осознание произошедшего, сообщение уже было расшифровано и передано капитану.\nВ считанные минуты атомный подводный крейсер, прервав свое оцепенение, пришел в движение. Набрав нужную скорость, подготовив оборудование, выйдя на необходимый курс и требуемую глубину осталось только одна единственная вещь, разделившая бы мир на "до" и "после".\n 3..... 2..... 1.....\n"
 russiaflavor.6.a: "Пуск."
 russiaflavor.7.t: "Оставили"
 russiaflavor.7.d: "Витя из села Дукат, что в Магадане, был простым человеком - он делал простую работу и жил простую жизнь, не смотря на вихрь событий исторического масштаба, окружавший его в последнее время, хотя, естественно, даже до него дошли вести о смерти Владимира Вольфовича Жириновского и процессе избрания нового русского президента. В связи с этим он стал посматривать государственные СМИ, чтобы оставаться в курсе изменений, которые могли коснуться его неспешной жизни..\nВот и сегодня он, после тяжелого рабочего дня, взял себе покушать из холодильника и включил телевизор, с интересом переключая каналы, пока не остановился на "Первом".\nНа экране проплыла надпись с гигантскими буквами - "ДЕЛО ЖИРИНОВСКОГО ЖИВЁТ" и большая надпись "СЛУЦКИЙ" c надписью помельче ниже - "Кандидат в президенты России". Рядом, надо знать, был изображен и сам Леонид Эдуардович Слуцкий. Его приветливое лицо внушало доверие. Витя хмыкнул, когда изображение сменилось на рабочий кабинет.\nВ этот просторный кабинет с большим дубовым столом, партийной символикой ЛДПР, изображенной на стенах и двумя флагами - России и партии, вошёл сам Леонид Эдуардович, он с интересом разглядел шкаф с настольными книгами Владимира Вольфовича, затем герб ЛДПР, после чего присел во главе стола, заметив табличку - "Владимир Вольфович Жириновский", его взгляд сделался задумчивым и печальным, но размышления были прерваны вошедшей молоденькой секретаршей, которая поставила рядом новую табличку - "Леонид Эдуардович Слуцкий", и взяла старую, с вопросом - "Я уберу?", на что кандидат в президенты твёрдо и чётко ответил, предупредительно взмахивая рукой.\nВитя невольно и сам задумался о наследии прошлого президента. Хотел бы он сам, чтобы дело Жириновского продолжало жить, или всё таки стране давно пора сменить курс? Увидев решительное лицо Слуцкого, у Вити из села Дукат, что в Магадане, не осталось никаких сомнений.\n"
 russiaflavor.7.a: "Нет, оставьте." 
 russiaflavor.8.t: "Генералиссимус"
 russiaflavor.8.d: "Виктор Васильевич Золотов не так давно стал новым местоблюстителем Кремля. За прошедшее время его помещения стали привычными. К облегчению нового главнокомандующего выстраиваемая им система работала как часы. Тем не менее командующий национальной гвардии, а ныне - бесспорный правитель России всегда был человеком действия, поэтому его утомляли долгие часы в кабинете. Нормой для него стали прогулки по Кремлю, когда появлялась такая возможность.\nВ одном из обширных мраморных залов никого не было, внимание привлекал только огромный - в два человеческих роста - портрет, на котором в полупрофиль был изображен благообразный дедушка, стоявший на фоне триколора. Он был одет в мундир, пересекаемый синей лентой, а его грудь украшали многочисленные медали и ордена. Конечно, Виктор Васильевич знал, кто изображен на данной картине. Это был генералиссимус Российской Империи, Александр Васильевич Суворов, победоносный военачальник, не проигравший ни одной своей битвы.\nЭта внезапная встреча заставила командующего национальной гвардии задуматься. Прежде всего о том, что общим с непобедимым полководцем прошлого у него было не только отчество. Они оба были, прежде всего, опекунами для своих солдат. Золотов с гордостью подумал о системе, которую он выстроил в войсках национальной гвардии. Он сделал всё, что от него зависело и даже чуть больше, чтобы его люди всегда были одеты, обуты, накормлены - и готовы к бою. Как в своё время сделал и Суворов. Теперь он был готов сделать тоже самое для каждого гражданина России.\n"
 russiaflavor.8.a: "Отец солдатам." 
 russiaflavor.9.t: "Лидер"
 russiaflavor.9.d: "Виктор Васильевич Золотов не так давно стал новым местоблюстителем Кремля. За прошедшее время его помещения стали привычными. К облегчению нового президента выстраиваемая им система работала как часы. Тем не менее командующий национальной гвардии, а ныне - бесспорный правитель России всегда был человеком действия, поэтому его утомляли долгие часы в кабинете. Нормой для него стали прогулки по Кремлю, когда появлялась такая возможность.\nВ одном из обширных мраморных залов никого не было, внимание привлекал только огромный - в два человеческих роста - портрет, с которого наблюдателя с непроницаемым лицом разглядывал проницательный пожилой мужчина с залысинами. На нём виднелся расстёгнутый пиджак и белая официальная рубашка, а фоном виднелась светло-голубая, как небо, акварель. "Владимир Владимирович." - вспомнилось Золотову. Последний президент Российской Федерации перед последующими грандиозными реформами.\nЭта внезапная встреча заставила командующего национальной гвардии задуматься. Прежде всего вспомнить долгую службу, которая проходила именно при Владимире Владимировиче Путине - и как тот отвечал на актуальные вызовы времени. Они оба приняли страну в состоянии политического хаоса и террористических войн, и вернули её гражданам покой и стабильность, уверенность в своем благополучии. Они оба обладают давним опытом службы в силовых структурах - и они оба понимали, что без права невозможно наделить человека обязанностью. Два лидера большой команды, которая зовётся "Россия".\n"
 russiaflavor.9.a: "И так будет всегда." 
 russiaflavor.10.t: "Гнев Батьки"
 russiaflavor.10.d: "На часах было ровно 17:46. В Кремле шло заседание кабинета министров - не что-то невероятное или доселе невиданное, при предыдущем президенте, Дмитрии Анатольевиче Медведеве, в общем и целом, такие совещания были нормой, особенно в военный и послевоенный периоды. Тем не менее кое-что все-таки выделяло именно это совещание. На нём присутствовал лично президент Александр Григорьевич Лукашенко и - дистанционно - губернаторы ряда регионов Федерации, что ещё более необычно - данное заседание транслировалось рядом государственных СМИ и интернет-площадок в режиме прямого эфира, без пауз, перерывов или послесловий.\nОсобенно гражданам запомнился фрагмент выступления, начавшийся после того, как Александр Григорьевич вслух прочитал, прямо говоря, не безоблачный отчёт из одного из регионов. После этого, он обратился к ответственному за него губернатору...\n"...И шо это такое? Почему мне люди жалуются? Мне папки на стол с жалобами ложатся на ситуацию, знаете вы это? Чего за проблемы с выплатами? У нас страна войну выиграла, граждане наши её выиграли. Какие проблемы могут быть? Даю неделю, неделю, на исправление этого бардака, потом лично с проверкой приеду. Чего-то не так будет - быстро вылетишь с места! Ясно тебе?..."\nВ дальнейшем, подобные мероприятия повторялись неоднократно, часто заканчиваясь небольшой кадровой чисткой на местах - так, что и далее стало понятно, что прямой контроль деятельности федеральных служащих и чиновников является частью управленческого стиля Батьки, как это было в Белоруссии ранее.\n"
 russiaflavor.10.a: "Лукашенко - наш мужик!"
 russiaflavor.11.t: "Дел Невпроворот"
 russiaflavor.11.d: "Бывший капитан полиции Максим Горенков сидел в кабинете номер 143 бывшего здания УФСБ России по Кировской области и по диагонали читал отчёт своего молодого коллеги. Пробубнив себе под нос какие-то благодарности, он отпустил того закрывать дело. С портрета на него смотрел неутомимый железный Феликс.\nНынешний майор КГБ прекрасно понимал, что сегодня он опять вернётся домой заполночь: борьба Рашкина с "палочной системой буржуазных органов правопорядка" нисколько не отменяла всепоглощающую отчётность. Не меньшую тоску навевали и Авгиевы конюшни в виде старых архивов.\nИ всё же было в его работе что-то, что пробуждало в нём почти детский азарт. Организовать вчерашних выпускников юрфака и случайных милиционеров, назначенных сюда за преданность КПРФ, в спецслужбу 21 века задача настолько же сложная, насколько и увлекательная. Определённо, именно азарт держал его на плаву. На плаву держал его и опыт криминалистического отдела, благо они не попали под сокращение.\n"
 russiaflavor.11.a: "Надо бы послать кого-нибудь за кофе." 
 russiaflavor.12.t: "Порядок"
 russiaflavor.12.d: "Сергей работал в ОМОНе почти десять лет. Утром его рота стояла на Тверской. Им выдали задачу заранее: не допустить прохода, изолировать координаторов, работать жестко. В штабе сказали прямо: «Потакали слишком долго, распоряжение с самого верха, выше некуда». Сергей тогда кивнул.\nТолпа собралась быстро. Молодёжь, студенты, странные типы маргинального вида. Плакаты, флаги, песни. Кто-то выкрикивал лозунги про Навального, кто-то читал Конституцию, удобно забывая про ту её часть, где права гражданина могут быть ограничены, если это необходимо для защиты конституционного строя. Сергей смотрел из-за шлема: и видел, в основном, обманутых детей. Государство, которое идет на поводу у толпы быстро прекратит свое существование - и ни на западе, ни здесь, такое терпеть не будут, а они этого явно не понимали. Он вздохнул - кому-то очень скоро придется повзрослеть.\nПриказ поступил через рацию. На соседней улице погром. Работать. Без предупреждений.\nСергей пошёл вперёд. Рядом - другие. Без лишней агрессии, но точно и чётко. Подавить, не дать беспорядкам расползтись. Автозаки уходили один за другим. В отделении шел поток: допросы, протоколы. Никаких "митингов" - по документам это были «массовые беспорядки», и как ему как бы между делом сказал кое-кто из знакомых оперов, помогавших крутить протест изнутри - большинство из участников впервые получат реальный срок, от трёх лет.\nСергей не ненавидел, не сочувствовал - и вообще не испытывал к новоиспеченным подсудимым каких-либо особенных чувств. Просто делал то, что должен. И знал - если не он, придёт кто-то другой. Или всё развалится. А ему важно было одно - чтобы родная Москва утром просыпалась в тишине. Без баррикад, без хаоса. И чтобы дети шли в школу, не зная слов вроде «дубинка» и «СИЗО», и не забивая себе голову всякой чушью. Хоть так.\n"
 russiaflavor.12.a: "Страна родная - спи спокойно." 
 russiaflavor.13.t: "Африканский корпус"
 russiaflavor.13.d: "Уже вечерело, когда, продираясь через заросли, немногочисленный, но хорошо вооруженный отряд вышел к деревне. По данным из штаба, именно здесь находился перевалочный пункт террористов, осложняющих работу Компании в регионе.\nНесмотря на позднее время, в деревне было оживлённо: куда-то сновали женщины и дети вперемешку с вооружёнными людьми в камуфляже. Оттуда они никак не могли заметить бойцов, расположившихся в джунглях.\n"Боцман" по сигналу командира вскинул на плечо РПО "Шмель", и спустя мгновение к свету уже угасающего заката добавилось зарево от полыхающей деревни. Гражданские разбежались - террористы, отстреливаясь, забивались в норы, словно муравьи, в чей муравейник кто-то по случайности наступил, а "Варяг" и "Алтай" вели огонь на подавление по тем, кто всё-таки пытался оказывать сопротивление.\nПосле скоротечного боя деревня опустела. Обойдя оставшиеся целыми дома и не обнаружив уцелевших бойцов противника, отряд выдвинулся на место своей дислокации. Сегодня потерь не было, этот день закончен, завтра будет ещё один, а через неделю на счёт поступит щедрая оплата.\n"
 russiaflavor.13.a: "Лучшая работа в мире!" 
 russiaflavor.15.t: "Прогулка По Набережной"
 russiaflavor.15.d: "Весна в колыбели Империи - славном городе Санкт-Петербурге, как это часто бывало, была угрюмой. Промозглые ветра, дожди, иногда снег. Вот и сегодняшнее утро ничем не отличалось от предыдущих - город понемногу просыпался, шумела автострада, просыпались и спешили по своим делам самые разные люди, от мала до велика. Таким был вид на этот город со стороны Петроградской набережной, стоявшей у Большой Невки - рукава Невы, на которой и был построен Петербург.\nИ только одна пара - муж и жена - степенно, словно бы у них было сколь угодно свободного времени, прогуливались по набережной. Вот стоит Нахимовское военно-морское училище, куда уже спешат курсанты. Рядом - стоянка, у которой якорь пустило судно - военный крейсер. Заметив его, пара остановилась, мужчина перевел на него взгляд, и задумался. Это судно с непростой историей, ведь именно с его пробуждения - со звонкого выстрела, прозвучавшего с этого корабля - началась История, длившаяся почти столетие...\nРазмышления, длившиеся почти минуту, были прерваны вопросом со стороны супруги - "Георг, всё хорошо?". Мужчина кивнул, несколько развеиваясь и перехватывая жену под руку - "Теперь - да. Идем."\n"
 russiaflavor.15.a: "Как тебе спится, крейсер "Аврора"?" 
 russiaflavor.16.t: "Солдатское Братство"
 russiaflavor.16.d: "Поздний вечер. В просторном - в два этажа - доме было шумно и солнечно - небо вымыто вчерашним дождём, шашлык шкварчит, пахнет дымком и сиренью. Длинный деревянный стол под навесом скрипит от разных блюд. За столом - семеро. Пару лет назад, они сидели за другим столом - в блиндаже под Варшавой, делили паёк, курили по кругу последнюю сигарету и писали друг другу перед выходом телефоны родных. На всякий случай.\n- Ты, Димон, всё ещё в МЧС? - спрашивает Жека, тот самый, что теперь ведёт экскурсии по Сахалину, с бородой, как у моряка.\n- Да, - кивает Дима. - Только теперь больше бумажек, чем пожаров. А ты, я слышал, в бизнес зашел, предпринимателем заделался?\n- Да там случайно вышло, - Жека смеётся. - У брата ларёк был, он и предложил открыть второй, ну а там и продавцов наняли.\nЛёня, бывший командир взвода, теперь военврач-реабилитолог, достаёт из рюкзака вязаную игрушку - кота в бронежилете. - У меня пациенты вяжут. Психотерапия такая. Вот, вам трофей. - Все смеются. Кот уходит по рукам. Потом налитые рюмки, тосты - без слёз, но с теплом.\n- Кое-что не меняется, - говорит мужчина во главе стола. - Как были, так и есть - одна команда.\n- Ну а ты, Тасман, как? Тяжело там? Небось, бумажек много? - напрямик поинтересовался Васёк - их дроновод.\n- Как есть - ответил Гавриил - иногда тяжелее, чем в окопе, сам понимаешь.\nОни чокаются. Смеются. Жизнь идёт - у каждого своя. Но раз в год, когда собираются вместе - она снова общая.\n"
 russiaflavor.16.a: "А ведь не так давно это было."
 russiaflavor.17.t: "Торжественное Открытие"
 russiaflavor.17.d: "Весенний вечер окутал Москву мягким золотистым светом, когда на Петровке начали собираться первые гости. Фасад нового Музея художественных и дизайнерских работ, расположенного в здании бывшей усадьбы XIX века, был украшен огнями, флагами и инсталляциями из стекла и металла, созданными современными российскими дизайнерами..\nКовровая дорожка у главного входа, вела гостей в просторный холл с высоким потолком и световыми инсталляциями, имитирующими рассвет над Москвой. Среди первых посетителей были известные художники, дизайнеры, архитекторы, галеристы, студенты творческих вузов и представители городской администрации. Фотографы щёлкали затворами камер, запечатлевая улыбки и удивление гостей.\nТоржественную часть открывал лично Его Императорское Величество. Ростислав Романов стоял под световым куполом, созданным по проекту выпускников Британской школы дизайна, и с лёгкой улыбкой говорил о миссии нового пространства:\n- Наш музей  это не просто хранилище искусства. Это живой организм, который будет меняться, вдохновлять, провоцировать и объединять. Здесь встречаются живопись и промышленный дизайн, текстиль и архитектура, графика и цифровое искусство. Мы хотим, чтобы каждый посетитель чувствовал себя частью творческого процесса.\nПосле выступления последовало символическое открытие - огромные двери первого зала медленно распахнулись, и гости вошли в пространство, где экспозиции были размещены не только на стенах, но и в воздухе, на полу, в проекциях и даже в звуке. В первом зале были представлены работы мэтров российского авангарда и их современные интерпретации. Рядом - футуристические дизайнерские проекты молодых авторов, в числе которых были и проекты самого Ростислава, снискавшие особое внимание.\n"
 russiaflavor.17.a: "Как всегда на высоте."
 russiaflavor.18.t: "Беседа по Душам"
 russiaflavor.18.d: "Пели птицы, шумела листва. Стоял погожий пятничный денёк. Летнее солнце игриво отражалось от поверхности вод озера Ладоги. На острове Валаам, в небольшой беседке с видом на это озеро двое мужчин в возрасте тихо беседовали о чём-то своем. Умиротворяющая атмосфера вокруг позитивно влияла на тон беседы, но не делала её менее сложной или серьезной. Разговор длился уже какое-то время и был достаточно непростым. Доводы приводились разные.\n- Александр Григорьевич, вы же понимаете. Вам недавно пришлось иметь дело с этим. Вас - вашу республику - в покое не оставят - Проект пора толкать вперёд, иначе мы можем опоздать. Подумайте о гражданах.\n- Вова, я понимаю, ты тоже пойми. Сделаем, как ты предлагаешь, с двухтыщного над этим работаем - но время нужно. Закончим скоро.\n- Важно, чтобы это было "скоро", а не "позже". Ситуация меняется.\n- Ну шо Вова, выходит, пора?\n"
 russiaflavor.18.a: "Пора, Александр Григорьевич, пора."
 russiaflavor.19.t: "Неожиданный Визит"
 russiaflavor.19.d: "Зарплата в службе судебных приставов всегда была не очень большой, государство пыталось компенсировать это путем предоставления социальных гарантий, раннего выхода на пенсию и прочих жизненных благ. Лидия Вячеславовна, однако, занимая руководящую должность среднего звена, предпочла компенсировать пустое место в кошельке с помощью не вполне легальной "кооперации" с гражданами. Тот или иной должник всегда мог "потеряться" в неповоротливой бюрократической системе, а его счета неожиданно выйти из под ареста, а Лидия, в свою очередь, могла позволить себе сократить время необходимое на выплату столь дорогой нынче ипотеки.\nВот и сегодня к ней в кабинет зашёл её доверенный подчиненный с конвертом, полным наличности от неудачливых бизнесменов, неплательщиков алиментов и прочей клиентуры ФССП. Лидия Вячеславовна, предвкушая предстоящий пересчет столь желанной валюты не обратила внимание на, серое и полностью лишенное былого задора, лицо своего сотрудника. После прозвучавшего "Это вам взятки от должников, в размере пятидесяти тысяч рублей", на которое Лидия привычно ответила "Да, я помню", дверь в кабинет отворилась и в него вошло несколько сотрудников собственной безопасности.\nНебрежно разбросанные по столу меченые купюры собирал и осматривал оперативник а заранее приглашенные из ближайшего юридического вуза понятые внимательно следили за тем, как на бывшей сотруднице ФССП застёгивают наручники.\n"
 russiaflavor.19.a: "Сколь верёвочка ни вейся - всё равно совьёшься в плеть." 
 russiaflavor.20.t: "Дружба Народов"
 russiaflavor.20.d: "Стояло жаркое летнее утро. В Москве, которая никогда не спала, стоял гул от звука машин и многочисленных строек. На Электродепо «Южное» со свистом остановился вагон, откуда вышел груженный двумя сумками с личными вещами Ахмед. На груди приятно глазу блестела медаль, врученная ему генералом, под началом которого проходило службу его соединение.\nЕго долг перед новой родиной был выполнен - теперь оставалось только с умом распорядиться заработанными деньгами. Его жена, Амина, уже ждала его дома. Тем не менее, он тяжело вздохнул - переезд на ту жилплощадь, которую он бы хотел, требовало бы немного больше денег, чем у него есть - а это означало, что придётся вернуться на завод.\nАхмед решил сделать остановку в одном из многочисленных московских ТЦ, купить Амине какую-нибудь приятную безделушку. Тем не менее заходя внутрь он столкнулся с каким-то юношей. Между ними завязалась перепалка, быстро перешедшая в дружеский разговор. Оказалось, это был первокурсник по имени Иван, и именно он рассказал ему, как сильно изменилась Москва, пока Ахмеда не было - как выяснилось, в одном из местных ВУЗов - а именно в Российском университете дружбы народов им. Патриса Лумумбы - был открыт специальный набор на заочное обучение для ветеранов, перешедших в российское гражданство посредством воинской службы. Ахмед поблагодарил Ваню, возвращаясь к жене с чётким пониманием того, как он будет двигаться дальше.\n"
 russiaflavor.20.a: "Вот это да!" 
 russiaflavor.21.t: "На Пасеке у Зюганова"
 russiaflavor.21.d: "На окраине небольшой деревни в Орловской области, где воздух ещё пахнет липовым мёдом, а вместо машинных гудков слышен лишь звон пчелиных крыльев, рано утром собралось около двух десятков школьников. Сегодня у них необычный урок - практическое занятие на пасеке. А проводит его необычный гость -  Геннадий Андреевич Зюганов, председатель ЦК КПСС и, как оказалось, страстный пасечник, сегодня посетивший родной город. Именно по этому случаю для учащихся нескольких орловских школ устроили практический урок на пасеке.\n- Пчела - это символ трудолюбия, порядка и взаимовыручки, -  терпеливо объяснял Геннадий Андреевич, надевая белоснежный защитный костюм. -  И результат их труда ценит каждый. Ну какой чай без хорошего мёду, а?\nДети в восторге от такого гостя. Кто-то впервые держит в руках рамку с сотами, кто-то учится различать матку от рабочих пчёл, а один мальчик даже спрашивает:- А можно мне пчелу приручить?\n- Приручить не надо, -  с улыбкой отвечает Геннадий Андреевич. -  Надо понимать её логику. Пчела чувствует настроение. Подходи с добром - не ужалит.\nВ перерывах между занятиями лидер коммунистов угощает липовым чаем с хлебом и мёдом. Всё -  своё, с пасеки. Он рассказывает, как его дед Михаил держал ульи, и как мёд помогал бороться с простудой и унынием в тяжёлые годы. - Тут не только мёд. -  продолжает председатель - Тут - воспитание. Если ребёнок поработал с пчёлами, он уже не будет лениться. Он поймёт, что каждый в улье важен, - говорит Геннадий Андреевич, провожая довольных детей обратно в автобус.\n"
 russiaflavor.21.a: "Терпение и труд всё перетрут!" 
 russiaflavor.22.t: "В Окопе Нет Атеистов"
 russiaflavor.22.d: "После объявления св. Георгия Победоносца покровителем вооруженных сил России, понемногу в моду стало входить повседневное использование георгиевских ленточек в военной среде. Воюющие солдаты обращаются к этому святому с тем, чтобы тот покровительствовал им в бою, уберегал от смерти. Распространяются слухи о случаях, когда такая ленточка тем или иным образом спасала военному жизнь.\nВместе с тем, как многие открывают православную веру для себя на поле боя, входят в обиход и поминовение имён святых, Сына, Отца, Святого Духа. Многие молят Богородицу о том, чтобы та отвела смерть от них, а представители духовенства, сопровождающие воинские отделения между боями стали нормой, такие проявления набожности  в вооруженных силах не только имеют место быть, но и поощряются командованием. Собирательным образом всего этого и стала оранжево-чёрная георгиевская лента, не только как символ воинской доблести и патриотизма, но как символ защиты небесного покровителя русского войска.\n"
 russiaflavor.22.a: "Господь с нами." 
 russiaflavor.23.t: "С Возвращением!"
 russiaflavor.23.d: "Подполковник в отставке и военный инженер с докторской степенью, Иван Михайлович, как это всегда бывало по вечерам, смолил сигаретку и сидел на лавочке на своем дачном участке, смотря вдаль и вспоминая прошедшие дни. Воспоминания его неизбежно возвращались к тому дню, когда он оставил свою службу и вышел, наконец, на пенсию. Было это уже более десяти лет назад. Владимир Владимирович тогда, как казалось, находился в самом расцвете сил, активно шло восстановление страны после смуты девяностых, а вместе с тем, шло и восстановление её щита и меча - её вооруженных сил.\nТогда, в далёком две тысячи седьмом году, министром обороны был назначен полковник Сердюков Анатолий Эдуардович, через некоторое время после этого начав крупную перестройку вооруженных сил. Перестройкой это, по сути, и было - как та, что в своё время прошла в Советском Союзе, и Иван Михайлович был одним из тех, кто резко протестовал против ряда мер, которые предпринимал Анатолий Эдуардович в рамках своей политики оптимизации и "модернизации" вооруженных сил. Тем не менее его позиция игнорировалась, поэтому он, не пожелав конфликтовать с высшим командованием, подал в отставку, с тех пор работая преподавателем в военной академии.\nЧего Иван Михайлович не ожидал - так это вечернего, уже практически ночного, звонка на личный телефон. Что было ещё более удивительно, голос в трубке представился представителем Министерства обороны и уточнив, с тем ли человеком он разговаривает, сразу перешел к делу, предлагая пожилому инженеру должность эксперта-консультанта внутри вооруженных сил. Как выяснилось позже, уже некоторое время шла их модернизация, включавшая полную ревизию предыдущих реформ, а часть из сердюковских кадров выходила на пенсию, ввиду чего ведомство остро нуждалось в квалифицированных кадрах.\n"
 russiaflavor.23.a: "Конечно, он согласился." 
 russiaflavor.24.t: "Эх, Яблочко!"
 russiaflavor.24.d: "В полдень в столице России, славном городе Москве, как всегда кипела жизнь - тринадцать миллионов человек жили, работали. Во всех отношениях и измерениях это был абсолютно обычный день. Для всех, кроме собравшихся на площади Ганецкого, возле одного из переходов на территорию Московского метрополитена. Происходящее напоминало некоторый митинг - по сути, им и являлось. Тут и там были видны красные флажки, плакаты, кто-то выступал с мегафоном.\nКогда сотрудники полиции прибыли на место с целью выяснить причины происходящего, выяснилось, что проблемой, к которой привлекали внимание собравшиеся здесь граждане - переименование станции метро "Войковская", названную в честь революционера Петра Лазаревича Войкова в станцию метро "Николаевская". Выступлениям по этому поводу полиция или другие представители власти никак противодействовать не стали, но и никаких особых итогов у них тоже не было, а из всех инстанций, куда недовольные таким решением подавали жалобы, приходил ответ, суть которого сводилась к тому, что данное решение было принято органами местного самоуправления, в связи с массовыми жалобами граждан.\nКакое-то время часть просоветски настроенных граждан высказывала недовольство - суть которого в основном заключалась в том, что власть в данной ситуации потворствовала настроениям радикалов и экстремистов, а так же в том, что такие названия это, всё-таки, часть истории России, разрушения единства которой недопустимо.\n"
 russiaflavor.24.a: "Куда ж ты катишься." 
 russiaflavor.25.t: "Общая История"
 russiaflavor.25.d: "Российское общество долго несло на себе шрамы, оставленные прошлым. Время от времени вспыхивала полемика между сторонниками империи, союза, или демократических институтов, все это сопровождалось взаимными обвинениями в нарушении самых разных законов. С другой стороны, множество других граждан вовсе не было заинтересовано в истории и проблемах своей страны, предпочитая этому тихую и спокойную жизнь.\nВсего этого больше нет. Люди самых разных мировоззрений, взглядов, религий, наций, материального положения, бок о бок, плечом к плечу, воюют за кое-что общее, что есть у них всех - за общую родину, какой бы та не была в прошлом или какой бы та не стала в будущем. Эти различия, вероятно, никуда не денутся - но одно можно сказать наверняка. Все эти люди, наконец-то, услышали друг-друга. И у них прямо сейчас есть общий враг.\n"
 russiaflavor.25.a: "Единство, выкованное в огне."
 russiaflavor.26.t: "Практика"
 russiaflavor.26.d: "С оживлением марксистско-ленинистской доктрины некоторые  так же задавались вопросом - не останется ли она уделом теоретиков, не смотря на лучшие усилия партии и небезразличных к её делу граждан. С началом крупной войны на европейском континенте стало ясно, что это не только теория - а Идея, за воплощение которой на поле боя люди жертвуют своими жизнями, не щадя себя, как это было во времена Великой Отечественной Войны. Идея эмансипации, освобождения угнетённого большинства от угнетателей из числа меньшинства.\n И эта Идея нашла свое непосредственное выражение не только в теории, но и на практике. Вскоре после начала боевых действий нормой стала агитационная работа в основном по инициативе отдельных военнослужащих и низшего командного звена, быстро нашедшая свое поощрение у верховного командования - поскольку каждый солдат должен понимать, что он отстаивает не только свой родной дом и советскую Родину, но и всеобщее человеческое счастье. И для этого Европа должна вновь ощутить вкус поражения.\n"
 russiaflavor.26.a: "Покажем натовским псам настоящую войну!" 
 russiaflavor.27.t: "День Регистрации"
 russiaflavor.27.d: "Москва. Вечер. За столом в залитой светом "двушке" на Коньково было тесно, по приоткрытому окну тарабанил дождь, но его звук терялся в грохоте празднества. За столом сидела группа молодых людей, никому из них не было больше тридцати - они весело обсуждая свои повседневные дела. Не смотря на царящий за столом бедлам, они создавали довольно представительное впечатление. Вскоре они перешли к обсуждению важного вопроса, который интересовал всех присутствующих. Говорить на эту тему начал Витя, или, как его иногда зовут, Виталий Сергеевич:\n- Уже скоро узнаем, как наше дело поживает. Ответственный должен ознакомить нас с решением сегодня или завтра. В ответ Санёк - практически пацан двадцати лет ухмыльнулся - и поинтересовался:\n- Да ну, Вить, ты же знаешь как щас с этим. Не дадут нам добро, тем более мы ж как бы оппозиция.\nПосле некоторого замешательства со стороны Витька в диалог вклинился Димка, единственный человек с работой в этой компании:\n- Если нас за акции ранее не подмели - то с чего бы им быть против? К тому же мы за полезные вещи выступаем. Здоровый образ жизни, там, культурное просвещение, вся херня.\n Витёк не успел ответить своим знакомым, так как у него зазвонил телефон. Он быстро поднял трубку, включил громкую связь. Звонил их общий знакомый из Администрации, Кирилл Алексеевич Аверин.\n - Добрый вечер! Не могу говорить долго, Виталий Сергеевич, дело такое. Вам дают добро, подавайте нужные заявления и Вас зарегистрируют, сможете вести свою деятельность целиком в рамках закона, однако, есть несколько условий, я направлю их в отдельном электронном письме на вашу почту, файл "методические рекомендации", изучите его. Всего доброго.\nВторую часть звонка практически никто не услышал, по комнате буйной волной разлилось общее веселье, а где-то в темном кабинете, освещаемом лишь настольной лампой немолодой мужчина улыбнулся, практически искренне радуясь успеху своих подопечных.\n"
 russiaflavor.27.a: "Одно непрочитанное сообщение." 
 russiaflavor.28.t: "Беженец"
 russiaflavor.28.d: "- ...Специальный репортаж из Петропавловска-Камчатского - Мария Антонова.\n\nКартинка на телеканале "Россия-24" резко сменилась: вместо тёплой и уютной синей студии на экране появились суровые пейзажи Камчатки. Позади темноволосой стройной девушки в белой куртке с логотипом телеканала виднелся большой палаточный лагерь. На въезде стояли десятки фур с надписью "ГУМАНИТАРНАЯ ПОМОЩЬ" на бортах, загруженные самым разным товаром - от еды и медикаментов до игрушек и тёплой одежды. Девушка глубоко вздохнула и начала репортаж.\n\n- Сейчас сотни американских граждан находятся в лагерях временного размещения, организованных российским правительством под личным руководством Михаила Мишустина. Многие из них оставили дома всё: деньги, вещи, но ни один не бросил своих питомцев.\n\nКамера сфокусировалась на рыжем коте в руках у девятилетней девочки в кепке с надписью "USA".\n\n- Они бежали от ужасов гражданской войны из разных штатов - от Нью-Мексико до Вашингтона. Многие с содроганием вспоминают первые дни конфликта, когда люди остались один на один с хаосом, без связи с близкими.\n\nИзображение снова сменилось, и в кадре появился смуглый американец в кепке с российским флагом и тёмно-красной куртке. Внизу экрана высветилось имя: Джон Титор.\n\n- Чёрт, эти damn commie - real психопаты! Эти bastards отобрали мой компьютер и убили соседа за отказ отдать his rifle! В итоге мне пришлось бежать из California - либо на восток, к федералам, но там зона анархии, и непонятно, добрался бы я живым… либо плыть в Rossija. А я как раз знаю русский - пытался в e-dating с russian gals, haha! Здесь, конечно, холоднее, чем в Лос-Анджелесе, но тоже есть своя прелесть..."
 russiaflavor.28.a: "Огонь поднимается." 
 russiaflavor.29.t: "ЗАБЛОКИРОВАНО"
 russiaflavor.29.d: "Роскомнадзор ввел ограничения на доступ к Twitter, Facebook и Reddit на территории России, ссылаясь на распространение недостоверной информации о коронавирусной инфекции. Решение принято на основании закона "Об информации, информационных технологиях и о защите информации", который позволяет блокировать ресурсы за нарушение российских законов. Ведомство заявило, что соцсети не удалили запрещённый контент, несмотря на неоднократные предупреждения. Кроме того, по заявлению ведомства, была замедлена работа таких сервисов как YouTube, Instagram и Wikipedia, пользователи сообщают о невозможности зайти на сайты оппозиционных СМИ и движений.\n\nПроправительственные силы, включая депутатов Госдумы и экспертов, поддержали блокировку, назвав её необходимой мерой для защиты граждан от дезинформации. Председатель Совета Федерации Валентина Матвиенко заявила, что «западные платформы годами игнорировали российское законодательство», а депутат Виталий Милонов назвал решение «справедливым ответом на информационную агрессию».\nОппозиция и правозащитные организации раскритиковали действия властей. Представители Алексея Навального назвал блокировку "цензурой и изоляцией общества", а общество "Мемориал" заявило о нарушении права на информацию. Представители Google и META уже пообещали "решить проблемы с доступом как можно быстрее", однако когда наступит это "быстрее" - не ясно.\n\nХотя данные соцсети не имели популярности среди российских пользователей, некоторые опасаются, что ограничения соцсетей - очередной виток усиления онлайн-цензуры и движение к созданию "суверенного интернета"."
 russiaflavor.29.a: "Честно говоря, я только рад блокировке реддита..." 
 russiaflavor.30.t: "С Легким Паром"
 russiaflavor.30.d: "Недавно в сети распространилось видео, на котором глава России, сам Владимир Вольфович Жириновский, принимает вместе с сопартийцами водные процедуры в одной из бань пригорода Москвы. Видео представляет собой нарезку из партийной бани вперемешку с речами вспотевшего Жириновского.\n\n- Вот Европа. Отвратительное место! Вспомните средневековье. Все эти расхваленные европейцы даже на речку не ходили мыться - ходили грязными месяцами, даже графы - а потом туда пришла чума, и не стало трети Европы! А теперь на Русь посмотрите: у нас такого не было. Потому что наш русский человек с детства был приучен к чистоте, к походу в баню. Великая вещь! Баня, - Жириновский в привычной манере откашлялся, после чего вытер пот и поправил свою шапку с надписью "царь", - баня - это великое изобретение, которое закономерно перешло от первого Рима ко второму, а от второго - к третьему, к Москве! Но не это страшно. Страшно то, что эта грязь все еще в Европе - в новом обличии. Все их парады, ложь, клевета - это все от того, что у них душа черная. А наша душа чистая!\n\nЖириновский, закончив свою речь, вновь взглянул на камеру, после чего отвернулся и прикрикнул:\n\n- Сафонов, пес! Кто так парит?! Отдавай веник и ложись, сейчас я тебя...\n\nДалее следуют кадры того, как Владимир Вольфович наносит мощные, богатырские удары веником по спине своих сопартийцев, приговаривая им слова поддержки и заклиная "славить Россию и в бане, и на фронте". Видео заканчивается совместным заплывом в бассейне, с Вождем России во главе парада.\n\nКак выяснилось позднее, видео было создано в рамках новой правительственной программы по поддержке социального оздоровления, а идея подобной PR-компании, понятное дело, принадлежала самому Жириновскому. Видео стало трендом на YouTube, а на фоне его популярности новостные агентства фиксируют возрождение банной традиции в России."
 russiaflavor.30.a: "Баня с Жириновским? Запишите меня!" 
 russiaflavor.31.t: "Жириновский. Взлёт"
 russiaflavor.31.d: "Уход из жизни Владимира Вольфовича Жириновского, безусловно, оставил неизгладимый шрам на душе всего русского народа. Провидец, гений, патриот - все эти слова прекрасно описывают то, как в народе видели своего Верховного Правителя. И очень важно передать память о нём как о великом человеке будущим поколениям державной России. Именно поэтому правительство России совместно с Министерством культуры поддержали выпуск фильма «Жириновский. Взлёт». Главную роль - самого Владимира Жириновского - сыграл актёр Никита Кологривый, известный по сериалу «Слово патриота», а режиссёром выступил Олег Трофим. Фильм повествует об истории становления Жириновского в политике, о первых победах, рождении партии, упадке в 2000-х, о триумфальной победе на выборах 2022 года и последующих преобразованиях страны под его чутким руководством. В конце фильма сам "Жириновский" обращается к зрителям, прося их "беречь и хранить Россию так же, как это делали наши великие предки".\n\nХотя западные необольшевистские правительства уже успели объявить фильм «манифестом фашизма», в России он обрёл настоящий успех, став народным достоянием, которое будут пересматривать из поколения в поколение и показывать на уроках в школах. Критики отмечают хорошую актёрскую игру, точное попадание в образы персонажей, замечательный саундтрек и правильную патриотическую повестку."
 russiaflavor.31.a: "Великий фильм про великого человека!" 
 russiaflavor.32.t: "Старый Порядок Вернулся"
 russiaflavor.32.d: "Прошел месяц с убийства первого канцлера возрожденной Российской Империи - Константина Затулина. Артем прогуливался по Дворцовой набережной в Санкт-Петербурге, недалеко от зимнего дворца.\nОколо зимнего дворца, проходил несанкционированный митинг сторонников республики, напротив митинга стояла линия из солдат с готовыми к стрельбе АК-12, а за солдатами стоял офицер на БТР-80 с мегафоном в руках.\nАртем сел на забор у набережной и достал сигарету с зажигалкой, наблюдая за развитием событий. Он закурил, а тем временем офицер начал говорить в мегафон:\n"Расходимся, подданные царя! Ваши анти-российские лозунги неуместны нынче!"\nМитинг взорвался от возмущения, толпа начала распределяться около солдат, но офицер не стал медлить и махнул правой рукой вверх, сжав её в кулак.\nСолдаты подняли свои АК-12 дулом вверх и сделали по одиночному выстрелу.\nМитингующие разбежались, кто-куда, а один даже спрыгнул за забор на набережной и упал в воду.\nАртем докурил свою сигарету и выбросил окурок, попутно сказав себе под нос...\n"
 russiaflavor.32.a: "Наши либерашки не малоросские, разбегутся при угрозе себе любимым!" 
 russiaflavor.33.t: "Герои Фронта"
 russiaflavor.33.d: "Владислав и Дмитрий были простыми, но проверенные временем солдатами родом из Петербурга, но стали героями новой Российской Империи за свое участие в войне на венгерском фронте. Им обоим пришли письма из имперской столицы с официальной печатью канцелярии.\n- "Гляди Влад, чего прислали мне из Петербурга!"\n- "Да-а, мне тоже тут пришло письмо от наших. Давай тогда открывать, чего же медлить нам, и так никто нихуя не пишет."\nДмитрий с Владом принялись вскрывать свои письма и читать их друг другу. Их приглашали в Петербург на местные должности глав районов, Дмитрию предложили стать главой Петроградского района, а Владу Центрального района.\n- "Ебануться... Нас военных на местные должности хотят назначить." сказал Дмитрий.\nВладислав ответил...\n"
 russiaflavor.33.a: ""Стратократия его высокопревосходительства Красносельского!"" 
 russiaflavor.34.t: "Единство Короны"
 russiaflavor.34.d: "Иван сидел за компьютером в своей комнате общежития и листал на нем ленту новостей РИА в телеграме. Ему попалось достаточно интересная новость с прикрепленным видео съезда Русского Общевоинского Союза.\n"Вадим Красносельский объявил о вхождении Союза 17-ого Октября и Российского Общенародного Союза в состав Русского Общевоинского Союза на благо Империи и нашего царя."\nИван включил видео с Красносельским. Его высокопревосходительство стоял на трибуне в своем мундире около микрофона и говорил:\n"Я, как канцлер Российской Империи и руководитель Русского Общевоинского Союза, объявляю о том, что мы достигли соглашения об объединении, которое подразумевает собой вхождение Союза 17-ого Октября и Российского Общенародного Союза в состав Русского Общевоинского Союза."\nЗал взорвался аплодисментами и под их звук, Красносельский продолжил свою речь до конца.\n"Этот шаг был сделан на благо нашей возрожденной Империи и во имя нашего Царя, наших Романовых! Все желающие покинуть свои прежние организации могут это спокойно делать и не вступать к нам, а всем желающим вступить в РОВС необходимо будет дать клятву верности Империи и Царю!"\nВидео кончилось продолжающимися аплодисментами зала. Иван немного похрустел костями на пальцах и сказал себе под нос...\n"
 russiaflavor.34.a: "Вот это поворот, хоть и ожидаемый." 
 russiaflavor.35.t: "Юношеский Максимализм"
 russiaflavor.35.d: "- Ребят, то, что происходит в Рашке, - это полный капец! Пыня опять держится за власть любыми способами!\nВосьмиклассница Юля, одетая в тёплую и дорогую зимнюю одежду, кривлялась перед фронтальной камерой во время прямой трансляции в одной из социальных сетей. На её  эфире было всего 5 человек, и то, скорее всего, её одноклассницы, но это не мешало ей продолжать ярый протест против действий властей. На прошлой неделе оппозиционный лидер Навальный был арестован, что вызвало бурную реакцию у молодого поколения. Настолько бурную, что те теперь выходят на улицы своих городов, чтобы "сопротивляться тираническому режиму". По крайней мере, Юля в это верит, насмотревшись расследований ФБК и прочих либеральных деятелей. \n- Мы обязаны восстановить справедливость, отнятую у нас этим проклятым режимом! Мы обяза- \nВо время очередного популистского призыва Юля с писком упала на асфальт после случайного толчка со стороны сотрудников спецслужб РФ. Её телефон разбился вдребезги и тут же отключился вместе с прямой трансляцией. Юлин шарфик слегка порвался и наполнился январской слякотью, а нос юной оппозиционерки окрасился в алый цвет от столкновения с асфальтом. Юля недовольно взглянула на причину своего падения, а от боли и обиды её глаза стали слезиться. \n"
 russiaflavor.35.a: "Это был её последний стрим." 
 russiaflavor.36.t: "Залог Успеха"
 russiaflavor.36.d: "Мария вышла из своего дома в 7:30. До работы ехать полтора часа, а смена начинается в 10:00. Зачем она вышла так рано? Нет, не чтобы проработать лишние часы, а чтобы успеть позавтракать. Мария не умела готовить, а есть полуфабрикаты в начале рабочего дня - не лучшая идея, поэтому она обычно завтракала в столовой офиса. Да, там были только каша, компот и хлеб, но делать было нечего. Между пересадками она бы ничего не успела взять, а в ее доме нет ничего, кроме пунктов выдачи онлайн-маркетплейсов. Точнее, не было. \nПробегая угол дома, Мария краем глаза заметила новую вывеску, слегка подсвеченную оранжево-белым светом. Она остановилась и повернулась. Неожиданно, на углу дома теперь находилось кафе, которое неоновой вывеской приветствовало покупателей надписью: "Мы открылись!". Мария опешила. Неужели в ее доме открылось что-то стоящее? \nОна аккуратно подошла к двери, открыла ее и зашла внутрь. Ее встретила приятная музыка, аккуратная мебель и вывеска с меню. Кафе оказалось блинной, в которой продавались блины с самой разной начинкой: от классической сгущенки до винегрета и шпината. Мария, подойдя к стойке заказов, посмотрела на ценники. Они были вполне приличными и даже дешевле, чем на работе. К Марии подошел кассир в темно-бежевой униформе, улыбнулся и спросил: \n- Добро пожаловать, что будете брать? \n"
 russiaflavor.36.a: "- Это правильное питание!" 
 russiaflavor.37.t: "Сокращение"
 russiaflavor.37.d: "- Что за хрень ты мне сейчас принёс?!\nШаскольский был в настоящей ярости после того, как Хамитов принёс ему уведомление от правительства России. В самом факте получения уведомления ничего странного не было - оно не было первым и не было последним в жизни Шаскольского. Интересное же начиналось после открытия письма с документом: это был приказ, подписанный Алексеем Нечаевым, который подразумевал сокращение работников Федеральной антимонопольной службы, а также сокращение количества заместителей руководителя ФАС, то есть заместителей Шаскольского, до пяти. Хамитов вздохнул: \n- Послушайте... Я понимаю, что для вас это очень неожиданная и даже, можно сказать, шокирующая новость. Однако вы не можете пойти против правительства. Так что вам необхо- \n- Да срать я хотел, что этот мерзавец себе придумал! Этот... выскочка! Да он даже не знает, что творит! Раз он устраивает "демократию", то я засужу его! По-демократически, блядь! Ведь я-\n- Ведь вы что? Уничтожили любую внутреннюю оппозицию? Имели связи и различные коррупционные схемы с семьёй Ковальчуков? Чуть не угробили российскую экономику во время Первой Европейской войны? Поверьте, у вас очень много грехов, о которых знает и премьер-министр, и даже сам президент, и если вы не согласитесь выполнять требования свыше - вы окажетесь в том же суду, в котором оказались в своё время такие персонажи, как Березовский, Шахновский и Ходорковский!\nХамитов грозно посмотрел на Шаскольского, явно испытывая презрение к ставленнику олигархата. Загнанный в ловушку руководитель ФАС быстро понял, что ему некуда деваться. Набрав побольше кислорода, он кивнул и медленно сказал:"
 russiaflavor.37.a: "- Будет сделано, господин министр!" 
 russiaflavor.38.t: "Обернулся Атаман"
 russiaflavor.38.d: "Утро в Еланской станице Ростовской области не было добрым, не смотря на приятный летний штиль, нарушавшийся лишь звуками строительной техники - зеваки, прохожие и посетители Еланского казачьего мемориально-музейного комплекса столпились вокруг одной из достопримечательности внутри этого комплекса. Стоял гул толпы, местные перешептывались и обсуждали происходящее, кто-то недовольно допрашивал одного из операторов строительного аппарата.\nСтатую казачьего атамана - под которым подразумевали Петра Николаевича Краснова, судя по всему, сносили - так, демонтажу уже подверглась табличка, гласившая "Донским атаманам, генералам, офицерам, казакам и казачкам, живот свой за Веру и Отечество положившим", а вскоре абсолютно буднично снесли памятник. Кое-кто из пришедших это молча приветствовал, большинство наблюдало за этим с некоторым безразличием, но несколько человек выкрикивали брань в сторону операторов машин.\nНа некоторое время ситуация стала довольно скандальным поводом для общественной дискуссии, высказывалась позиция, что эта ситуация стало проявлением наплевательского отношения власти к историческому наследию - хотя СМИ и провластно настроенные в данной ситуации граждане ссылались на решение органов местного самоуправления, которое было принято в связи с недопустимостью героизации коллаборантов и пособников нацизма.\n "
 russiaflavor.38.a: "- Будет сделано, господин министр!" 
 russiaflavor.39.t: "Да Расслабься Ты!"
 russiaflavor.39.d: "Кухня была душной, окно распахнуто настежь, за стеклом - вечерний проспект и запах весны, перемешанный с гарью. Лёха сидел на подоконнике, покуривая, а напротив него, за столом, ссутулившись, сидел Максим. Он говорил тихо, словно за стеной мог кто-то слушать.\n- Я серьёзно, Лёх. Что-то не так. Телефон сам выключился, потом странные звонки без звука, как будто линию проверяют.\n- Макс, ты с ума сходишь. Ты кто такой? Ты не генерал, не журналист, не оппозиционер. Ну с хуя ты им интересен? Ну был ты в чатике. Ну скинул пару статей. Их боты за день такое с миллиона IP видят. Поверь мне, у ФСБ есть куда более важные дела.\nМакс кивнул. Наверное, он и сам понимал, что перегибает. Просто чувствовал какое-то удушье, как будто что-то не так. Он вздохнул, меняя тему разговора. Дальше они в течении часа обсуждали дом, работу и прочее подобное. Разошлись на хорошей ноте - и беспокойства как не было.\nКогда он ушёл, неприметный белый фургон на улице аккуратно сменил позицию, стареющий сонный мужчина прошёл в кузов, достал из шкафа тонкую папку и положил её на небольшой столик. На обложке была формулярная надпись, с подписью ручкой чуть ниже: «Протокол... Объект: Максим С. (Уточнить - Псевдоним: М.С.)». Водитель - молодой и подтянутый бритый мужик просиял.\n"
 russiaflavor.39.a: "- Лёха, видать, в вечном дветыщьседьмом, а, Кирилл Андреич?" 
 russiaflavor.40.t: "Вечер в Кремле"
 russiaflavor.40.d: "На часах 21:00, рабочие кабинеты в Кремле уже давно опустели, но Он был всё еще у себя. Он работал.\nРабота с государственными делами особой важности требует особого внимания и усидчивости. Он занимался этим целый день. Все ведомства должны были работать как отлаженный механизм, экономика должна расти, вооруженные силы должны получить новые образцы техники как можно скорее, западные партнеры... Он работал в таком режиме слишком долго. Он устал. Он заслужил небольшой отдых. Сейчас Он закончит и наконец-то отдохнет.\nРазмышления об отдыхе прервал стук в дверь:\n-"Войдите."\n"-Владимир Владимирович, прошу прощения что беспокою, но я думаю Вам стоит знать. Они выложили новое "расследование", некоторые граждане чрезмерно возбуждены и недовольны. Оппозиция собирает митинг завтра и даже не попыталась согласовать его с нами. Я уже сообщил в силовые ведомства, но..."\n-"Я понимаю. Сделайте всё, что необходимо, разберитесь с этим. Я устал от этих людей."\n"
 russiaflavor.40.a: "Просто уберите их с улиц." 
 russiaflavor.41.t: "Правитель"
 russiaflavor.41.d: "Виктор Васильевич Золотов не так давно стал новым местоблюстителем Кремля. За прошедшее время его помещения стали привычными. К облегчению нового вождя выстраиваемая им система работала как часы. Тем не менее командующий национальной гвардии, а ныне - бесспорный правитель России всегда был человеком действия, поэтому его утомляли долгие часы в кабинете. Нормой для него стали прогулки по Кремлю, когда появлялась такая возможность.\nВ одном из обширных мраморных залов никого не было, внимание привлекал только огромный - в два человеческих роста - портрет, с которого в наблюдателя вонзался проницательный взгляд из под очков Владимира Вольфовича Жириновского. Тот как бы стоял напротив, скрестив руки на груди, на нём был его обычный официальный костюм с русским флагом на лацкане пиджака,  а на фоне была видна только синяя муть акварели. "Хороший портрет. Как живой. Таким его и помню."- подумалось Золотову\nЭта внезапная встреча заставила командующего национальной гвардии задуматься. Прежде всего вспомнить их деловые разговоры, и вообще стиль ведения дел Владимира Вольфовича внутри его партии в частности и государства в целом. Тот, конечно, не всегда был простым в общении человеком - но если находилась проблема - тот немедленно подбирал ей решение, или находил того, кто может его подобрать - как в период войны с терроризмом при его избрании тогда, ещё в 2022 году. Таким был и Виктор Васильевич, как ему самому казалось. Конкретные проблемы требовали конкретных решений. Государство само себя защищать не будет. Они оба понимали, что быть Вождём - это быть не только опекуном, но, когда нужно - и суровым отцом, и защитником, для каждого из многих миллионов их подопечных.\n"
 russiaflavor.41.a: "Вечная память." 
 russiaflavor.42.t: "Проект «Город Будущего»"
 russiaflavor.42.d: "Политика цифровизации в России Суркова была поистине всеобъемлющей. И вот недавно в ходе совместной инициативы Владислава Юрьевича и мэра Москвы Сергея Собянина был запущен невиданных размеров проект под названием «Город Будущего». По его замыслу Москва должна была бы стать самым комфортным для использования городом на планете.\n\nИ действительно, в ближайшее время город наполнился новыми QR-кодами, которые о рассказывали о долгой истории этого мегаполиса. Жители и туристы, воспользовавшись специальным приложением, могли реконструировать виды давно минувших дней и самолично перенестись в Москву 20-го, 19-го и 15-го веков с помощью технологии дополненной реальности. А тщательно спроектированные трёхмерные карты, обновлявшиеся в реальном времени по данным со спутников и на основе информации от пользователей, всегда могли предупредить о возникающих пробках либо же проложить маршрут по наиболее знаменательным местам.\n\nКонечно ,было у этого проекта и другое предназначение. Город ощетинился немыслимым количеством камер, умных датчиков и сканеров отпечатков пальцев. С одной стороны, это было невероятно удобно открывать комнату новостройки с помощью простого прикосновения. Но теперь государство всегда знало, где вы. Неважно, курьер ли ты Яндекс еды, простой рабочий или закладчик. Вилял ли ты в лабиринте из хрущевок или перебегал дорогу на красный свет в потоке людей. Камеры, использующие ИИ могли реконструировать ваше лицо даже если оно было скрыто медицинской маской или шарфом. Государство всегда знало где ты и что ты делаешь именно сейчас. Безусловно, это заметно сократило количество преступлений в городе, и многим данная инициатива пришлась по душе. Но были и голоса тех кто кричал что Москва превращается в паноптикум. Однако большинство людей были готовы смириться со слежкой со стороны государства. В конце-концов при Собянине Москва поистине стала самым передовым и удобным городом на свете.  У всего была цена. Таким был он, город-сказка, город-мечта..."
 russiaflavor.42.a: "Попадая в его сети пропадаешь навсегда." 
 russiaflavor.43.t: "Суть Времени"
 russiaflavor.43.d: "Владислав, школьный преподаватель физики и химии, с недавнего времени, не увлекался политикой, где-то с тех пор, как указами президента было запрещено большинство легальных левых движений в России - хотя политика, которую вёл Владимир Вольфович не была ему полностью чужда - он признавал необходимость защиты интересов русских, но в той же степени он считал, что капитализм западного типа идет вразрез с ними, достаточно было выглянуть в окно.\nВ общем-то жизнь продолжалась - хотя на душе было как-то пусто. Это изменилось, когда в одном из небольших Телеграмм-каналов публицистической направленности он прочёл ободряющую информацию - о том, что вскоре состоится первая передача "Сути времени" Сергея Ервандовича Кургиняна, по государственному телевидению. Он сразу припомнил, как смотрел ранее записи лекций Кургиняна - и всё стало на свои места.  Его график поспевал за временем следующего эфира - так что он зарёкся обязательно его посмотреть.\nСледующим же вечером он успел почти во время, Владислав переключил на нужный канал, и через динамики его телевизора зазвучал знакомый голос:\n- ...Так что хотелось бы снова спросить - как поспевать за каждой новой сенсацией, снова и снова пересобирая картину мира? Кто говорит себе: "Стоп! Что происходит?" Если это вы - то этот разговор для вас. Начать его, конечно, хотелось бы с причин, почему мы вообще сейчас говорим. Дело в том, что неизбежно наши с вами враги, на западе - который постоянно анализирует, постоянно собирает информацию - будут атаковать нас не только физически, но и духовно - на территории смыслов. Безусловно, "выше" это понимают, так что...\n- ...Закончить бы хотелось тем, что, говоря иносказательно, человек - это "венец Творения", хозяин природы. Русские несут в себе такое количество мощных метафизических идей... что они вызывают ненависть у тех, кто хочет превратить человека в зверя и в машину...\n"
 russiaflavor.44.a: "Нужно покинуть четвертый этаж."
 russiaflavor.44.t: "«Апофеоз Европейского Капитализма»"
 russiaflavor.44.d: "Здравствуйте, уважаемые читатели интернет издания «Красная Звезда». Как вы прекрасно знаете, ситуация в мире совершенно не похожа на ту, что была ещё какое-то десятилетие назад. И сегодня мы предлагаем вам пройтись небольшой ретроспективой по тому что привело к ужасающей ситуации на европейском континенте и тому, есть ли какие-то перспективы у левого движения в ближайшем будущем. . . .\n\n. .  .  Однако после Европейской Войны Дмитрий Анатольевич попал в немилость к правящим кругам. Был ли он слишком «инициативным» или просто один раз не захотел делиться? Вряд-ли мы когда-то уже узнаем. Выбор был сделан и новой марионеткой олигархов после великого европейского раздела стал Владислав Сурков. Известный криптофашист и оркестратор бесчисленного числа преступлений против человечества.  .  .\n\n. . . Европа же после поражения от сил российского капитала также претерпела изменения. Уязвленные в своей гордости элементы капитала взяли курс на перестройку общества. «Континентальный» национализм, смешанный с извращёнными идеями либерализма и превосходства, стали основой нового единого государства . И как удобно, что и в данном случае основными бенефициарами данного переворота являются всё те же люди. Клаус Шваб, Петер Летманте, вы все прекрасно знаете их имена и фамилии...\n\n...Хочется подвести данную статью простым фактом. Книга Фрэнсиса Фукуямы «Конец истории и последний человек» была своего рода пророческой. Однако, в отличии от его предсказаний реальный конец был куда менее радужным. Вместо либеральной утопии без разногласий и падения диктатур, мы увидели рост эксплуатационных государств-корпораций, построенных на принципах максимизации доходов и отчуждения рабочего класса. Радикальный фашизм принял единственное верное для себя решение и решил укрепиться путём уничтожения любых других идеологий в зародыше. Именно поэтому ни в Москве ни в Брюсселе вы не увидите никаких лозунгов и призывов. Порой до вас могут доноситься обрывки невнятных  симулякров «Национальная гордость», «Единое наследие». Но смысла в них уже давно нет..."
 russiaflavor.44.a: "Из федерального списка экстремистских материалов." 
 russiaflavor.45.t: "Вывеска"
 russiaflavor.45.d: "Тёмные улицы Донецка медленно оживали. Андрей, проживающий в этом городе уже второй десяток лет, медленно шёл по знакомому маршруту, разглядывая здания, ещё недавно израненные войной. Где-то фасады уже отремонтировали, где-то всё ещё зияли пустые оконные проёмы, но город дышал - глубже, увереннее, чем раньше.\n\nВ ночи он незаметно для себя попал на городской рынок. И вдруг - яркий свет неона, выхватывающий из темноты знакомый силуэт. "Донецкий Аниме Магазин" - гласила огромная надпись над небольшим зданием. На вывеске улыбалась Харухи Судзумия, а под ней искрилось: "Мы  вновь открылись!". Андрей остановился, ощутив странное тепло в груди. Он помнил этот магазин еще совсем юным, именно здесь он и познакомился с миром японской анимации. Но потом пришли обстрелы, война, бесконечный вой сирен и смерти. Казалось, это навсегда.\n\nНо теперь неон горел снова, отражаясь в лужах на асфальте. Андрей улыбнулся. В этом свете было что-то важное - не просто открытие магазина, а знак. Жизнь возвращалась. Не только в виде хлеба и крыш над головой, но и в чём-то таком - маленьком, ненужном для выживания, но таком родном.\n\nОн толкнул дверь. Внутри пахло новыми томиками, на полках блестели обложки, а за прилавком стояла улыбчивая девушка в костюме горничной, которая поклонилась полуночному гостю.\nАндрей кивнул в ответ. Война отступала - по кусочкам, по вывескам, по улыбкам. И это было только начало."
 russiaflavor.45.a: "Каменное сердце вновь дышит."
 russiaflavor.46.t: "Изобилие"
 russiaflavor.46.d: "Моросящий дождь поливал петербургскую улицу, пока Егор направлялся в свой любимый торговый центр. Благодаря постоянным надбавкам к зарплате, он мог позволять себе всё более дорогие вещи и качественную еду. Парень был очень рад этому и с удовольствием пользовался всеми благами, попутно откладывая деньги на новую квартиру.\nИ вот он внутри.\nПервым делом в глаза бросаются пышные магазины одежды. Шляпы, шапки, куртки, пальто, футболки, брюки, джинсы, туфли и многое другое предлагается для покупки. Множество дорогих брендов сражаются за покупателя, и каждый товар обладает великолепным качеством, которое часто превосходит даже европейское. Затем идут магазины парфюмерии - огромное количество запахов обрушивается на Егора, и буквально каждый из них вызывает настоящий восторг. Поднимаясь на второй этаж, он обнаруживает множество разнообразных магазинов: одни предлагают самую продвинутую и качественную технику из Японии и Китая, другие предоставляют выбор лучшей мебели со всей Восточной Европы, а третьи и вовсе способны подарить детям и подросткам счастливое детство, о котором они могли только мечтать. На третьем этаже его внимание привлекает выбор лучших ресторанов России, каждый из которых способен подарить незабываемый вкус самых разных блюд мира. Рядом находится фуд-корт, вариант подешевле, однако и тут сети быстрого питания используют первоклассные продукты и помогают быстро перекусить самым разным людям: от студентов и школьников до родителей и бизнес-менеджеров.\nЕгор улыбнулся, оглядывая все богатства этого торгового центра - одного из тысячи, расположенных по всей его родине. Новые люди и впрямь смогли изменить Россию, превратив её в экономическую сверхдержаву, где каждый житель мог позволить себе всё, что хотел. Егор зашёл в кафе "Французские пекарни", его личный фаворит. Взяв круассан и кофе, он сел на одно из свободных мест и посмотрел в окно. Он осознал, как же он счастлив жить в России.\n"
 russiaflavor.46.a: "Россия - щедрая душа!"
 
 russiaflavor.47.t: "На том конце, на том берегу..."
 russiaflavor.47.d: "День для бойцов "Вымпела" начался с высадки недалеко от небольшой деревушки в глубине джунглей Колумбии. Преодолев вброд маленькую речушку, отряд вступил в короткий бой с защитниками: путчисты не ожидали, что кто-то заберется в такую глухомань. Утренняя стрельба поутихла, и в гарнитуре Некрасова прозвучал голос командира:\n\n- Цель - в этой деревне, переверните тут всё вверх дном!\nАлексей вбежал в первый же дом, и обнаружил того, ради кого бойцы рисковали жизнями: под дулом пистолета, стоял как живой щит Густаво Петро, свергнутый военными президент Колумбии, на мушке его держал один из охранников.\n- ДАЙТЕ МНЕ УЙТИ ИЛИ Я ПРИСТРЕЛЮ ЕГО! - смысл его речи был понятен, несмотря на языковой барьер.\n- БРОСЬ ОРУЖИЕ! - на ломаном испанском Некрасов басом заорал, да так, что было слышно по всей деревне.\nПерекрик и небольшая заминка.\nВыстрел.\nОхранник падает с дырой во лбу.\nНа звуки прибегает командир Величко, и видит, как Алексей помогает подняться заложнику.\n- Макондо, я Аркадио, Маркес взят, повторяю, Маркес взят! - с удовлетворением доложил командир Центру.\n- Слышим вас, Аркадио. Мелькиадес устранен, Аурелиано занял Дом, двигайтесь в Боготу. Угрозы контрпереворота нет.\nС облегчением Величко выдохнул, вместе с ним и Некрасов.\n- Не время расслабляться, ребята. Возможны подкрепления. Вывозим цель. - и командир добавил на испанском для Петро:"
 russiaflavor.47.a: "Из России с любовью, господин президент."

 russiaflavor.48.t: "Каиновы Слёзы"
 russiaflavor.48.d: "Утерянное медиа является крайне интересной темой для тысяч пользователей не только Всемирной сети, но и Рунета в частности. Поиск потерянных в вихре времён фильмов, мультфильмов, песен, игр и прочего - довольно нишевая тема. Но сегодня оно привлекло внимание не только множества российских людей, но и государственных органов. Благодаря содействию властей, сегодня был опубликован мультфильм "Каиновы слёзы" известнейшей советской студии "Киевнаучфильм".\n\nПоиски мультфильма продолжались долгие годы, и, наконец, он стал достоянием общественности. В нём клеймится украинский национализм: главный герой-"патриот" раз за разом продаёт родной край оккупантам: кайзеру в 1918 и Гитлеру в 1941. И тогда, и сейчас эти самые националисты действуют на деньги и по указке Запада, прикрываясь "самостийностью".\n\nБолее лучшего момента и представить тяжело: перед нами близится перспектива полномасштабных военных действий, и такое напоминание из прошлого определенно поможет в работе с населением, освобождённым от режима киевской хунты!\n\n"Над морем каиновых слёз смеётся Украина.""
 russiaflavor.48.a: "История сделала круг."

 russiaflavor.49.t: "Город На Холмах"
 russiaflavor.49.d: "Когда в Америке разразилась гражданская война, Владивосток, "Русский Сан-Франциско", находящийся долгое время в экономическом эпадке, неожиданно для всех получил мощный толчок к переменам. Тысячи американских IT-специалистов, инженеров, программистов и бизнесменов, бегущих от войны, увидели в этом городе нечто большое, чем простой порт - они увидели в нем место, способное заменить им их бывшие калифорнийские офисы. На месте бывших заброшенных заводов выросли современные технопарки, где русские программисты работают с беженцами из Кремниевой Долины, а рядом с ДВФУ при поддержке правительства России вырос отдельный кампус бывшего Стэнфордского университета, в котором тестирует квантовые компьютеры и разрабатывают искусственный интеллект нового поколения.\n\nКак нельзя кстати пришлась и помощь из "Поднебесной". Китайские инвестиции превратили порт в высокотехнологичный хаб с автоматизированными терминалами, а вдоль городской бухты протянулась "Красная Аллея" - ряд штаб-квартир, где разместились офисы Alibaba, Huawei и других китайских корпоративных гигантов.\n\nТеперь, с подписанием новых российско-китайских договоров, можно ожидать, что совсем скоро город войдет в список самых технологичных мегаполисов мира."
 russiaflavor.49.a: ""Владивосток-2000""

 russiaflavor.50.t: "Гражданский протест"
 russiaflavor.50.d: "Антон прижался к стене переулка, затаив дыхание. Сердце бешено колотилось, а сам он стал медленно уходить в темноту. Через несколько секунд по улице прошло несколько мужчин в желтой униформе, возглавляемые мужчиной в белой черкесске. На руке каждого из них была желто-голубая полоска с буквой Z на белом фоне, а на поясе виднелись кобуры пистолетов. Лишь после того, как патруль прошел мимо, он смог спокойно выдохнуть и продолжить свой путь сквозь холодные, дождливые улицы Москвы, прижимаясь как можно ближе к стенам, скрываясь в переулках и подворотнях от представителей Желтой гвардии.\n\nЧерез несколько минут он наконец-то нашел очередной плакат. Со стены на него с грозным взглядом смотрел Алиханов. "Смута пройдет, засияет ярче солнца родная Русь," - гласила надпись под президентом России. Сморщившись, Антон достал из своего рюкзака балончик с краской, после чего принялся закрашивать лицо с плаката. Линия, еще одна - его работа выполнена, и теперь на плакате виднеется отчаянный призыв противостоять режиму.\n\nАнтон понимал, что в этой борьбе он не один. По всей стране есть сотни, тысячи таких же как он людей, готовых отстаивать свою свободу, сражаться за нее - на душных кухнях, в курилках заводов, подъездах.\nНо с другой стороны, это ведь народ избрал Алиханова. В чем тогда смысл этой борьбы, если народ сам избрал этот путь - ведь тогда получается, что именно он, а не Алиханов или кто-нибудь еще, враг своего народа?...\n\nШаги снова приблизились. Антон швырнул баллончик в урну и исчез в лабиринте переулков."
 russiaflavor.50.a: "Его призыв остался незамеченным."

 russiaflavor.51.t: "Возвращение "Святых""
 russiaflavor.51.d: "Последние несколько десятилетий участились случаи столкновений между русскими и выходцами с Кавказа. Страх, коррупция и простая лень сотрудников правоохранительных органов часто приводили к тому, что в итоге на скамье подсудимых оказывались простые беззащитные люди, действовавшие в рамках самообороны, в то время как реальные преступники продолжали ходить по нашим улицам.\n\nОдин из подобных эпизодов произошел в ноябре 2013 года. Дмитрий Паршин и его сын, находясь в московском метро, стали жертвой нападения со стороны уроженца Дагестана Латипова. Когда Латипов попытался атаковать их, Дмитрий в рамках самообороны выхватил пневматический пистолет и несколько раз выстрелил в нападавшего, после чего вместе с сыном покинул вагон.\n\nВскоре в сети появилась запись инцидента, которая, разлетевшись по интернету, подняла волну поддержки защищавшихся. Особенно людям запомнился кадр с сыном Паршина, державшим бандита на мушке пистолета перед выходом из вагона. Народ, уставший от мигрантского беспредела, увидел в них народных мстителей - "Святых из метро".\nОтец встал за сына, а сын - за отца. Библейская история.\n\nНо этнические ОПГ добрались до них, и вскоре Паршин-старший был задержан. С 2014 года его переводили то на психиатрическое лечение, то под тюремное заключение. К счастью для него и миллионов таких же русских патриотов, эра национального унижения закончилась - сегодня Паршин был помилован указом президента Алиханова, а через несколько часов его приняли в Жёлтую Гвардию со всеми почестями.\n\nРусским больше некого бояться. Теперь бояться должны нас."
 russiaflavor.51.a: "Zero Tolerance."

 russiaflavor.52.t: "Рисунок"
 russiaflavor.52.d: ""Мама, смотри, что я нарисовала!"\n\nВасилиса, маленькая тоненькая русая девочка, заканчивающая последний год детского сада, невольно запинаясь, старалась как можно быстрее подойти к своей матери, которая наконец-то пришла забрать ее из того здания, которое мама называла сложным словом "центр культуры".\n\n"Привет, малышка. Ого, ты сама это нарисовала?" - с неочевидным для наивного детского сердца сарказмом сказала ее мама, погладив дочку по голове.\n\n"Да!" - ответила Василиса с неподдельной детской гордостью.\n\nНа рисунке, который она протянула своей матери, был небрежный сельский пейзаж и несколько фигур. На заднем плане виднелась небольшая избушка, белокаменная церковь и дерево, похожее на березу, а на переднем плане были нарисованы сама девочка, ее отец, Андрей, и женщина с подписью "мама" и сердечком. На руках у девочки был рыжий кот, а ее родители держались за руки, другой рукой обнимая дочь.\n\n"Никогда не видела эту церковь. Где ты ее видела?"\n\n"Тетя Саша, которая за нами присматривает, водила меня и других ребят из группы посмотреть на нее и рассказывала так много интересного об этом месте, что я решила нарисовать, вот..."\n\nПообщавшись еще несколько минут, мама помогла своей дочери одеться, после чего они отправились домой. По дороге Василиса продолжала рассказывать о том, как много нового она узнала из той поездки и о том, какие видео она сегодня смотрела на RuTube.\n\nНа рисунке слева от семьи, уже не держась с ними за руки, стояла темная улыбающаяся фигура в чем-то, напоминающем пиджак. Надпись под человеком, написанная с несколькими ошибками, гласила: "Филимонов, великий президент нашей Руси"."
 russiaflavor.52.a: "Соль Земли Русской."

 russiaflavor.53.t: "Спасибо, Вольфыч!"
 russiaflavor.53.d: "ЛДПР всегда гордилась званием первой цифровой партии России, ведь тот, кто контролирует интернет, контролирует умы молодежи. Несколько недель назад Власов, известный своими контактами с различными представителями русского интернета, объявил о создании медиапроекта "Соколы Жириновского", который, по его словам, "является достойным русским ответом Западу в сфере интернет-развлечений".\n\nПроект позиционирует себя как объединение видеоблогеров, "свободных от леволиберальной лжи, готовых протянуть руку патриотичной молодежи", предоставляя зрителям как историко-политический контент, свободный от цензуры, так и развлекательный. Руководителем проекта был назначен Илья "Мэддисон" Давыдов, российский стример, депутат и член ЛДПР с 2020 года. За несколько недель ролики проекта, к удивлению скептиков, начали обретать заметную популярность на RuTube. Вирусным стал юмористический видеоролик, в котором Виталий Наливкин, ставший "депутатом РПЛД", громит местную ячейку коммунистических террористов в Уссурийске, а Юрий Хованский заявил о планах снять полноценное продолжение легендарного комедийного фильма "Корабль двойников" и выложить его в свободный доступ. Апогеем стал недавний стрим, проведённый совместно Владиславом Жмилевским и Ежи Сарматом, главным гостем которого стал сам Владимир Жириновский, давший интервью и рассказавший о своих рабочих буднях.\n\nПроект также попытался выйти на международный рынок, выложив первое видео на YouTube, в котором Ozon671games в ходе очередной импровизации называет Джо Байдена "старым мудаком" и "избивает" его, однако канал был заблокирован всего через несколько часов после публикации, что ещё раз показывает всю двуличность западных платформ."
 russiaflavor.53.a: "Контент, достойный мужчин честной судьбы."

 russiaflavor.54.t: "Напутствие"
 russiaflavor.54.d: "Ранее утро, Москва. Невысокий мужчина в черном пальто с букетом цветов в руках медленно идет по Новодевичьему кладбищу в полном одиночестве, изредко огоялываясь и убеждаясь в том, что помимо него здесь никого нет. Сделав несколько поворотов, он наконец достигает точки своего назначения. Подойдя ближе, он склоняет свою голову перед памятником.\n\n"Здравствуйте, Владимир Вольфович..."\n\nПеред ним стоит 3-метровый бронзовый памятник памятник. Надпись на гранитовой плите гласит: "Верховному Правителю Владимиру Вольфовичу Жириновского от русского народа".\n\nПоложив букет цветов у подножия памятника, мужчина три раза перекрестился, после чего вновь взглянул на памятник и заговорил с ним:\n\n"Ну, как оно там, Владимир Вольфович?... Надеюсь, что там теплее, чем у нас тут... Ну, это ничего, мы это выдержим..."\n\nВ ответ тишина. Только одинокий ворон, что сидел на ветки дерева немного вдали от могилы, пытался что-то сказать. Ветер немного поднялся, подгоняя облака в небе, которые иногда закрывали собою солнце. Мужчина тяжело вздохнул, после чего вновь заговорил.\n\n"Владимир Вольфович, а помните, как мы с Вами блины пекли перед выборами? Все ведь смеялись, а мы победили... Или как мы в баню всей партией ходили. Вы ведь тогда еще такое наговорили там, что мне потом пришлось извиняться перед послом Германии," небольшая слеза скатилась по лицу мужчины, "Да, было время... Мы вас помним, Владимир Вольфович... Мне иногда тяжело, но я стараюсь следовать вашим советам..."\n\nВнезапно, мужчина ощутил на своем плече чью-то тяжелую, словно отцовскую руку, как будто кто-то попытался его успокоить. Простояв так в тишине несколько минут, Василий Власов еще раз поклонился памятнику, после чего развернулся и пошел к машине, ожидающей его.\n\nКогда ветер вновь поднялся, Власову показалось, будто он услышал чей-то знакомый голос..."
 russiaflavor.54.a: ""Удачи, Василий...""

 russiaflavor.55.t: "Мощно"
 russiaflavor.55.d: "Победа Антона Алиханова, очевидно, не могла не оставить след в российском интернет-пространстве. После оглашения результатов выборов первоначальное негодование в сети со временем сменилось позитивным восприятием президента обществом.\n\nПриведем несколько абсолютно настоящих и не написанных ботами комментариев и постов из ВКонтакте и государственного мессенджера MAX:\n\n"Алиханов - мощь! Более мощного лидера Россия, возможно, и не видела. Путин, конечно, был молодец, но даже он меркнет на фоне Алиханова. Президенту - верим!"\n\n"Мощные решения принимает наш президент! Он видит, что действительно нужно нашему народу. Мигрантов депортировал, русских сплотил. Мощно! Я на выборы до этого не ходил, но теперь не жалею, что отдал голос за Антона. Мощный кандидат!"\n\n"ВЫ ВООБЩЕ ВИДЕЛИ ЧТО ПРОИСХОДИТ В ЕВРОПЕ? Пока там людоеды людей уничтожают, мы находимся под защитой МОЩНОГО президента-супергероя!!! Мой сына-корзина уже вступил к Желтым, и я всем советую сделать тоже самое, МОЩНАЯ ОРГАНИЗАЦИЯ!! Гейропе не остановить мощный поезд под названием Россия!"\n\n"Ну че бля, либерахи, допизделись?) мощно Алиханов дал вам по голове. Бегаете теперь как крысы АХАХАХ че балончиками своими все красите стены? Мда. Недобитки-навальнисты и их пособники вялые как дедовской хер, пока Желтые МОЩНО дают им за щеку. Спасибо, Алиханов, ты красава! МОЩНО!"\n\nНекоторые пользователи считают, что подобные сообщения якобы написаны "ботами", так как используется один и тот же нарратив про "мощность", но всем нам очевидно, что это не больше, чем вброс либеральной пропаганды."
 russiaflavor.55.a: "Мощно."

 russiaflavor.56.t: "Падение Москвы"
 russiaflavor.56.d: "После многодневных сражений объединённые европейские армии вновь установили контроль над Москвой впервые с 1812 года. Наиболее ожесточённые бои развернулись в центре города, где исторический облик столицы оказался необратимо изменён. В результате артиллерийских обстрелов было полностью уничтожено здание Большого театра, а знаменитый купол храма Василия Блаженного рухнул после прямого попадания авиабомбы.\n\nПо данным наблюдателей, Красная площадь и прилегающие кварталы превращены в руины. Жилые районы также пострадали: на западе города целые улицы лежат в развалинах после штурмовых операций. Введен комендантский час, сообщают о перебоях электричества и проблемах со связью, нехватке продовольствия и медикаментов.\n\nСудьба российского руководства неизвестна - по данным разведки, правительство покинуло город до его падения."
 russiaflavor.56.a: "Слезы не спасут Москву."

 russiaflavor.57.t: "Союз Альтернативных Сексуальностей Проводит Митинг в Поддержку Навального"
 russiaflavor.57.d: "Сегодня в Москве Российский Союз Альтернативных Сексуальностей провел масштабный митинг в поддержку президента Алексея Навального и действий России во Второй Европейской войне. Участники акции, собравшиеся на Театральной площади, заявили о лояльности курсу главы государства, одновременно резко осудив "агрессивную пропаганду ЛГБТ+ ценностей" со стороны европейских стран.\n\n"Мы - патриоты и поддерживаем президента Навального в борьбе за суверенитет России, - заявил лидер РСАС Михаил Лаков. - Но Европа, развязавшая эту войну, пытается навязать нам свои радикальные взгляды, стремясь уничтожить нашу страну. Мы не позволим этого!"\n\nАкция прошла под лозунгами "Армия и Президент - наш щит!" и "Смерть Европе, Слава России!". Несмотря на радикальную риторику, митинг прошел мирно. Акция вызвала споры в соцсетях: одни хвалят РСАС за "патриотизм", другие обвиняют в "двойных стандартах".\n\nВ Европе же реакция резко негативная - МИД Германии называют митинг "попыткой легализовать гомофобию под флагом суверенитета". Кремль пока не комментирует событие, но эксперты считают, что такая позиция РСАС может быть частью новой государственной стратегии по консолидации общества."
 russiaflavor.57.a: "Ну, по крайней мере они за Россию?.."

 russiaflavor.58.t: "Черный Список"
 russiaflavor.58.d: "Новая власть Державников в России наводила ужас на политическую оппозицию, загнав их буквально по подвалам, от либералов до левых, всем пришлось прятаться.\nИз "лидеров" Народной России осталось, за столом сидело 5 человек, а ведь недавно их было 7. Сергей Мироновой и Захар Прилепин поддались на лозунги новых властей и перешли на их сторону, поставив левую оппозицию в шаткое положение.\nВсе лица знакомые: Делягин, Грудинин, Коновалов, Платошкин и во главе с ними сидел Сергей Удальцов, опытный оппозиционер левых идей ещё со времен Путинской России.\nУдальцов начал: "Товарищи, настали действительно темные для нас времена, Миронов и Прилепин покинули нас, примкнув с левыми патриотами к Алиханову и его Державникам. Нашей левой оппозиции стоит разделиться, дабы мы могли децентрализованно руководить своими ячейками, других вариантов я на данный момент не вижу."\nОстальные четверо дали свое согласие на данное решение, других вариантов не было... для них..."
 russiaflavor.58.a: "Смерть готова к забегу."

 russiaflavor.59.t: "Без Вариантов"
 russiaflavor.59.d: "Антон Алиханов сидел в своем кабинете в Кремле, снаружи стояли 2 телохронителя в форме желтой гвардии. К кабинету подошел человек - этим человеком оказался депутат госдумы Михаил Делягин от народников. Телохранители обыскали Делягина и ничего не найдя пропустили его в кабинет, в своем же сопровождении.\n"О, Михаил Делягин, присаживайтесь!" - сказал Алиханов вошедшему Делягину и указал на стул, напротив своего стола.\nДелягин сел на стул, позади него стоял телохранитель Алиханова.\n"Для чего я здесь?" - сказал Делягин президенту.\n"Господин Делягин, я знаю о вашей роли в Народной России, я также получил весточку о том, что вы встречались с остальной частью левой оппозиции." - ответил Алиханов депутату.\n"Это ведь ло-" - попытался парировать Делягин.\n"Господин Делягин, ну отпираться здесь бесполезно." - ответил Алиханов.\nПосле небольшой паузы тишины, Алиханов продолжил - "Я вижу в вас действительно достойного человека. Я хочу вам предложить сменить свою позицию по отношению ко мне и моим сторонникам. Я хочу, чтобы мы работали с вами вместе, на благо России. Оставьте своих эм... товарищей оппозиционеров-революционеров с Удальцовым, вы же не такой, как они."\nПосле небольшой паузы, Делягин понял, что у него карт нету и ответил Алиханову - "Да, господин президент... здесь вы правы... я не такой, как они... Россию же действительно ждет новая угроза с той же Западной Европы... Я согласен работать с вами и вашими сторонниками на благо России."\nАлиханов похлопал в ладоши такому решению и с рукопожатием обеих сторон, Делягина сопроводили на выход из кабинета и он уехал обратно в госдуму на работу, в свой собственный офис."
 russiaflavor.59.a: "Смерть простила его."

 russiaflavor.60.t: "Смертельный Актив"
 russiaflavor.60.d: "Павел Грудинин глубокой ночью вышел из здания Совхоза имени Ленина и остановился напротив статуи самого Владимира Ильича.\n"Надеюсь, мы продолжим твоё дело, скоро..." - тихо сказал Грудинин себе под нос.\nНемного постояв, Грудинин сдвинулся с места, идя по улице к своему авто. Около автомобиля было видно силуэт человека, это был сотрудник ГИБДД, судя по форме. Грудинин медленно подошел к авто.\n"Здравия желаю! Старший сержант ГИБДД Чернышев Гедимин Евгеньевич, предъявите документы." - сказал сотрудник с открытым удостоверением в левой руке, а в правой руке у сотрудника жезл.\nГрудинин пошарился по своим карманам и достал паспорт с ключами от машины.\n"В чем же я провинился, гражданин начальник?" - отвесил Грудинин.\n"У вашей машины тут бегал какой-то человек, открывал её ещё." - ответил Гедимин.\nГрудинин сразу насторожился и открыл машину снова, а потом залез на водительское сиденье.\nПока Грудинин осматривал машину внутри, не долго думая Гедимин достал из кармана своего жилета Пистолет Макарова, уже снятый с предохранителя.\n"Господин президент передает вам привет." - сказал Гедимин.\nГедимин передернул затвор и Грудинин повернулся. Прогремел выстрел.\nНа утро, около Совхоза имени Ленина стояли ограждения, машина скорой помощи и грузовик следственного комитета... Павел Грудинин найден застреленным в собственной машине."
 russiaflavor.60.a: "Смерть произвела удар косой."

 russiaflavor.61.t: "Последнее Заседание"
 russiaflavor.61.d: "Экс-глава Республики Хакасия, Валентин Коновалов шел по вечернему Симферополю. После встречи в Москве, Коновалов старался наладить свою жизнь и координировать оппозицию на Крымском полуострове.\nКоновалов остановился и достал сигарету с зажигалкой. Пока он пытался закурить, недалеко его заметил отряд желтой гвардии, которые приняли его за очередного пьяницу.\n"Эй мужик! Здесь не курят!" - сказал ему подбежавший 1-ый желтогвардеец.\nКоновалов поднял взгляд на желтогвардейца, а за последним стояли ещё 7 человек, также желтогвардейцы.\n3-ий желтогвардеец достал из кармана ориентировку Державной России на Коновалова и показал своим коллегам.\nКоновалов ничего не понимал, но его узнали, из-за такой глупой мелочи, когда он остановился покурить.\nЖелтогвардейцы окружили Коновалова, одели свои банданы и стали избивать его.\n"Смерть предателям!" ; "Смерть коммунистам!" ; "Победа настоящей России!" - скандировал отряд желтой гвардии.\nЧерез 15 минут непрерывного избиения, Коновалов уже лежал на земле, обезображенный до неузнаваемости. На следующее утро, мертвое тело Коновалова обнаружили в кустах."
 russiaflavor.61.a: "Смерть забрала и его тоже."

 russiaflavor.62.t: "Убийство По Учебнику"
 russiaflavor.62.d: "Николай Платошкин глубоко вечером шел в шляпе из МГИМО по проспекту Вернадского со стаканчиком кофе в правой руке и портфелем в левой. Несмотря на свою политическую активность, как народник, он продолжал преподавать в МГИМО.\nНа улице было необычно тихо, чувствовалась гнетущая атмосфера страха. По улице также маршировали отряды желтой гвардии, которые следили за порядком и помогали правоохранителям.\nПлатошкин завернул на главную аллею Парка 50-летия Октября и сел позади ближайшей лавочки. Он не желал красоваться на самой лавочки, ведь понимал всю опасность себе от сторонников Державников.\nПлатошкин молча попивал кофе, но услышав что-то в кустах - насторожился. Он оставил портфель и допил кофе, после чего поставил пустой стаканчик от кофе около портфеля.\nПлатошкин осторожно подошел к кустам и заглянул туда, там оказалась бездомная немецкая овчарка, к удивлению самого Платошкина.\nОн выдохнул и зашел в кусты, но позади него уже тихо подобрался человек, что был полностью закутан в черное и с пожарным топором в руках.\nПлатошкин с удивлением всё ещё стоял в ступоре, не понимая, откуда могла взяться бездомная овчарка здесь, небольшой звук позади и взмах топора, голова Платошкина была расколота в кровь.\nНа утро в кустах обнаружили тело Платошкина с расколотым черепом надвоя и всё ещё воткнутым топором в него, никаких отпечатков обнаружено не было."
 russiaflavor.62.a: "Остался один."

 russiaflavor.63.t: "Последний Шанс"
 russiaflavor.63.d: "Сергей Удальцов очнулся с мешком на голове и привязанным к стулу, в каком-то сыром помещении. В помещении стояли 4 человека, все в желтой форме, стандарт желтой гвардии.\n"Где я нахуй...?" - сказал Удальцов.\nВ помещение вошел человек в смокинге. С Удальцова сняли мешок. Перед ним сидел человек в черной маске счастья.\n"Приветствую тебя, революционер несостоявшийся. Судьба дает тебе шанс." - сказал собеседник, доставая из своего кармана револьвер РСА.\n"Сыграем в русскую рулетку, но барабан не прокручиваем. Где остановился, оттуда и начинаем, честное решение судьбы." - сказал собеседник, проверив Барабан на наличие 1-ого патрона и прокрутив барабан, после проверки патрона.\nУдальцов лишь хмуро смотрел на собеседника, пока с него сняли веревку стоящие позади него 2 охранника собеседника. Собеседник провернул револьвер на столе, дуло показало в сторону собеседника.\nСобеседник спустил курок у своего виска, пусто, очередь Удальцова, спуск курка такой же пустой. Собеседник вновь спускает курок у своего виска, пусто, очередь Удальцова, также пусто.\n"Господин Удальцов, остался шанс 50 на 50. Судьба сделает окончательный вердикт для России, её возрождение Державной или же вновь хаотичной на так называемую демократию вашу левую." - сказал собеседник.\n"Посмотрим." - отвесил Удальцов.\nСобеседник приставил дуло револьвера к своему виску... и спустил курок... выстрела не последовало...\nОхранники собеседника позади Удальцова достали свои Пистолеты Макарова и направили дула на голову Удальцова, в случае если последний попытается "геройствовать".\nУдальцов взял револьвер и поставил его дуло себе в рот вверх... спуск курка... выстрел. Кровь хлынула из головы Удальцова, разбросив его мозги к потолку, в кашу с кровью. Тело Удальцова грохнулось на пол со стула.\nСергей Удальцов был найден мертвым, версия "самоубийства" признана официальной."
 russiaflavor.63.a: "Смерть забрала последнего по воле судьбы."

 russiaflavor.64.t: "Музеефикация прошлого"
 russiaflavor.64.d: "Президент Российской Федерации Антон Андреевич Алиханов объявил о программе "Исторической Объективности". В планах данной программы было озвучено о демонтажах ненужных бюстов В. И. Сталину в Москве, а также перезахоронение тела В. И. Ленина. Сам же мавзолей планируется переоборудовать в "Музей державной истории: советский век", по задумке данный музей будет вводить в экскурс по ключевым событиям России при советской власти, от 1917 до 1991.\nСразу после данного заявления, около мавзолея Ленина собралось необычно много сотрудников Росгвардии, которые были приставлены к охране работников, что были назначены на перевозку тела Ленина и перестройку мавзолея. Также скопления Росгвардии были замечены с работниками у бюстов Сталина по всей Москве, кроме бюста в музее ВОВ, бюста некрополя у Кремлевской стены, памятника лидерам большой тройки в Всероссийском Выставочном Центре.\nЧерез несколько часов, тело В. И. Ленина было доставлено в родной Ульяновск и перезахоронено на Старом городском кладбище, а бюсты И. В. Сталину были демонтированы в Москве. Началось строительство Музея державной истории на месте прежнего мавзолея Ленина..."
 russiaflavor.64.a: "Вперед, Россия!"

 russiaflavor.65.t: "Национальная Платформа"
 russiaflavor.65.d: "СЗНД во главе с Антоном Алихановым объявила об коалиционном соглашении с партией "Родина" Алексея Журавлева. В совместном заявлении, Алиханов и Журавлев подчеркнули, что: "Данный шаг направлен с целью объединения националистов под едиными знаменами для блага нации, отечества и стабильности нового русского правительства.".\nТакже такие организации, как "Русская Община", "Северный Человек" и Общественное Движение "Сорок Сороков" объявили о своей поддержке правительства националистов. Отдельно лидер "Русской Общины" Андрей Ткачук подчеркнул "Необходимость единства в такое трудное время для родины, когда на западе Европейского континента формируется новое радикальная анти-российская сила в виде федерализации Европейского Союза, которая также угрожает нашим восточным союзникам.".\nНационал-Демократическая Партия ныне покойного Константина Крылова объявила о своем слиянии с "Державной Россией". В партии подчеркнули, что: "Все националистические силы должны сейчас сплотиться вокруг нового правительства для общего блага родины, ведь СЗНД выполняет свои обещания Русского Порядка и с этим им нужно помогать."."
 russiaflavor.65.a: "России - Русскую Власть!"

 russiaflavor.66.t: "Генераторы Стабильности"
 russiaflavor.66.d: "Антон Алиханов сидел в своем Кремлевском кабинете, перебирая бумаги и пролистывая документы на компьютере. Да, с реформами Державников меньше проблем не стало, но Алиханов работал усердно для воплощения идеи Державизма и стабильного общественного договора, эдакий синтез вырабатывал для нового времени России.\nАлиханов остановился немного отодвинул перед собой на столе бумаги и решил взять 5-ти минутный перерыв, сообщив об этом по телефону своей охране. Спустя 2 минуты к нему в кабинет принесли чашку зеленого чая, ещё горячего, охранник покинул кабинет. Алиханов принялся попивать зеленый чай, погружаясь в свои размышления.\n"Всё работаешь в поте лица на благо новой эпохи?" - раздался знакомый Алиханову голос.\nАлиханов поднял свой взгляд и увидел перед собой Константина Анатольевича Крылова, своего политического кумира, основателя Национал-Демократической Партии, во время губернаторства в Калининграде. Антон понимал, что Крылов лишь его галлюцинация, но от нечего делать, всё же стоило разбавить рутину и говорить хоть со своей галлюцинацией...\n"Да уж... Неожиданно видеть вас, хоть и с другой стороны это было лишь делом времени. Работаю конечно, Константин Анатольевич..." - ответил Алиханов.\n"Это я вижу." - улыбнулся Крылов. "Ты мне вот на вопрос ответь... Уверен ли ты в своих силах, дабы удержать государственность Русскую?" - сказал Крылов.\n"Ещё как уверен, я бы тогда не пошел в политику больше, после своего исключения из Единой России, когда я решил покритиковать либеральные реформы Медведева." - ответил Алиханов.\n"Вот оно как... Всё же не поменял мнения Дмитрий похоже, жук какой... Ну ничего, работай Алиханов. И помни самое главное, я в тебя, верю!" - сказал Крылов, символично приподняв свой кулак правой руки.\nАлиханов опустил взгляд на стол, на уже пустую чашку зеленого чая. Он продолжил работать, как ни в чем не бывало."
 russiaflavor.66.a: "Всё на благо России..."

 russiaflavor.67.t: "Несокрушимая Русь"
 russiaflavor.67.d: "Ярослав был достаточно молодым активистом "СЗНД" из Симферополя, всего лишь какие-то 22 года, в конце концов сама судьба его привела в Желтую Гвардию. Была у Ярослава ещё одна особенность - он был глубоко верующим человеком. Ходит в Александро-Невский Храм каждый день на проповеди.\nПрошло ведь уже некоторое время, с прихода Алиханова ко власти, Церковь была довольна тем, что её положение с новыми властями во многом улучшилось. Было обычное утро, Ярослав как всегда пришел на утреннюю проповедь Святого Отца, обычная проповедь с мольбами прихожан за здоровье президента Российской Федерации Антона Андреевича Алиханова. Ярослав также помолился за здоровье Алиханова и начал слушать проповедь Святого Отца.\n"Святой Дух - это дух единства. В 17 веке, после Смуты, народ и Церковь объединились вокруг веры - и спасли страну. Сейчас, когда мир пытается разделить нас санкциями, ложью, соблазнами, мы должны помнить: наша сила - в верности Богу, Царю Небесному, и Отечеству земному." - сказал Святой Отец и сделал небольшую паузу.\n"Недаром на гербе России - всадник, поражающий змия. Это не только Георгий Победоносец, но и образ Христа, побеждающего зло. А значит - и наш народ, призванный быть воином света." - закончил часть проповеди Святой Отец. В мыслях о судьбе России, её восстановлении в мире и наконец её роли, Ярослав думал и одновременно слушал Отца.\n"Братья и сестры! Россия - это не просто страна. Это - Дом Пресвятой Богородицы, который Она Сама покрывает Своим омофором. Это - крепость духа, которую не сломить никому. Пусть же Святой Дух, Который носился над водами в начале творения, осенит и нашу землю, чтобы мы могли сказать: "Мы - русские. С нами Бог!"" - вновь раздались слова Святого Отца.\n"Аминь!" - раздалось из уст Святого Отца на весь храм, Ярослав и остальные прихожане хором также ответили Святому Отцу..."
 russiaflavor.67.a: ""Аминь!""

 russiaflavor.68.t: "Суверенная Вертикаль"
 russiaflavor.68.d: "Антон Алиханов проводил очередное "согласованное" выступление перед гражданами на своей политической родине в Калининграде. Он говорил с местными жителями в сопровождении фанатично преданной ему желтой гвардии, а также в сопровождении журналистов "Кремлевского Пула" с камерами. Спустя время, к Алиханову подошел гражданин с протезом ноги, патчем на правом плече в виде флага Российской Империи, это был ветеран Специальной Военной Операции, что переросла в войну по всей Восточной Европе, арена битвы с Глобалистами.\n"Антон Андреевич, ужели вы!?" - воскликнул радостно ветеран, переводя дыхание.\n"Конечно я. А я смотрю, вы... ветеран прошедшей войны?" - ответил Алиханов.\n"Да-а! Я ветеран, потерял ногу под Львовом, бандеровцы черт побери засаду устроили на нас, а я... единственный выжил и примкнул к остальным войскам, что во Львов заходили, я лично участвовал в разрушении памятника Степану Бандере этому-у!" - сказал Ветеран, доставая паспорт с фотографиями того, как он вместе с российскими войсками сносит памятник украинскому нацисту Бандере.\nАлиханов внимательно ознакомился с фотографиями ветерана и подтвердил подлинность сразу же. Президент пожал руку ветерану, как и остальные желтогвардейцы из охраны Алиханова, а также последний оставил свой автограф в паспорте ветерана. После всего этого, камеры выключились и все разошлись, в том числе ветеран ушел дальше по своим делам, а Алиханов сказал журналистам, сугубо для них - "Всё дамы и господа... через несколько часов я возвращаюсь в Кремль, все свободны... Я вас категорически благодарю за работу на родину."\nАлиханов похлопал журналистам, а желтогвардейцы повторили за ним. После этого, личный автомобиль Алиханова подъехал к нему и желтогвардейцы открыли ему дверь. В кармане Алиханова завибрировал зашифрованный телефон, он увидел знакомый контакт и взял трубку и сел в автомобиль с простым словом..."
 russiaflavor.68.a: ""Алло?""

 russiaflavor.69.t: "Операция "Идейный Фронт""
 russiaflavor.69.d: "Михаил был простым активистом либерального крыла Общероссийского Народного Фронта, он работал с окружением Бориса Надеждина, однако с отстранением последнего от должности президента РФ, стал активистом оппозиции внутри ОНФ под руководством Дарьи Бесединой.\nДаже спустя некоторое время, после захвата власти Федоровым и сторонниками НОДа, либералы оказывали сопротивление в своем прежнем стиле. Такие же бесполезные мирные протесты, с попыткой обратить международное внимание, однако "международности" в этом внимании уже и не пахло.\nБеседина объявила о протесте, напротив здания госдумы в Москве, время на 16:00. Михаил собрал своих ребят на Большой Никитинской улице, все вместе они двинулись к зданию госдумы. Однако их ждала засада контрпротеста Национально-Освободительного Движения, которая взяла в кольцо Михаила с его ребятами. Последнее, что запомнил Михаил перед тем, как потерять сознание, это зеленку в своих глазах, развевающийся по ветру флаг НОДа вместе с российский триколорами и удар черенком от лопаты по своему затылку."
 russiaflavor.69.a: "НОД использовали СВОю карту."

 russiaflavor.70.t: "Приказ Отечества"
 russiaflavor.70.d: "Сторонники Национально-Освободительного Движения из Общероссийского Народного Фронта и другие депутаты от последнего предложили наделить нового президента Российской Федерации Евгения Алексеевича Федорова Чрезвычайными Полномочиями, ввиду "Усиления сопротивления со стороны Глубинного Государства глобалистов, которые стараются разрушить Россию и её влияние во всем мире, ведь Россия возглавила поход против глобализма и держит его остатки в виде Европейского Союза на прицеле.".\nПрезидент РФ Евгений Алексеевич Федоров отреагировал через пару часов, согласившись получить данные полномочия "Во имя спасения России, защиты её русского мира и истинного наследия Владимира Владимировича Путина!". В государственной думе большинством приняли данное предложение на голосовании, хоть и либеральные элементы ОНФ пытались голосовать против, также единогласно данное решение приняли в Совете Федерации, ведь туда "агенты либерального глобалистского глубинного государства" ещё не успели добраться."
 russiaflavor.70.a: "Раздавим же глобалистских тараканов!"

 russiaflavor.71.t: "Медиа-мобилизаци"
 russiaflavor.71.d: "Максим был простым офисным работником в Москве, работал в поте лица, поддерживал власть во многом и офис, где работал Максим тоже не отставал, во время Специальной Военной Операции, что переросла в Европейскую Войну поддерживали фронтовиков всякой "гуманитаркой".\nПроснувшись днем в свой выходной, Максим сразу же взял свой телефон со стола, зашел в телеграмм и... Телеграмм Каналы давно стали новыми СМИ и это был апофеоз - куча новостей про указы нового президента РФ Евгения Федорова, что конец глубинному государству, Европейские бандиты предстают перед судом, попытка поджога местной администрации где-то в Подольске анархистами... Но Максим выделил для себя лишь пост Позднякова, причем самым первым, ведь его новости Максим читал особенно много...\n"Ну наконец-то хоть что-то!" - патриотично отвесил Максим вслух."
 russiaflavor.71.a: "СВОеобразные новости теперь."

 russiaflavor.72.t: "Империя это Он"
 russiaflavor.72.d: "Тимур был простым Капитаном полиции в Орехово-Зуево. Несмотря на звание, его работа была достаточно рутинная, алкашня, шумная молодежь, солевые под приходами и всякие психи - его добыча. На ночной смене, диспетчеру поступил вызов о шумном соседе и на него отправили Тимура с его напарником старлеем по имени Артем.\nПосле того, как они оказались в подъезде, они стали стучать и звонить в квартиру, на которую жаловались за шум. Через пару минут им открыл пенсионер, на вид лет 70, тельняшка и... штаны в цветах георгиевской ленты. Волосы пенсионера выглядели, словно их не мыли целую неделю. От мужчины пахло перегаром и спиртом одновременно.\n"Здравия желаю, капитан Тимур Анатольевич Рекунов. На вас поступила жалоба от соседей, что вы шумите и не даете им спать. Можем войти для обсуждений дальнейших?" - сказал Тимур, а позади него стоял Артем. Пенсионер икнул, а после кивнул и жестом пригласил их в квартиру.\nКогда Тимур и Артем переступили порог квартиры, они наступили на ковер для обуви в виде... флага Европейского Союза. Тимур переглянулся с Артемом друг на друга и после они уставились на пенсионера. Все вместе они прошли на кухню, на столе были 5 бутылок водки "Путинка", все пустые, а на стене на кухне висит флаг Национально-Освободительного Движения. Тимур конечно не удивился, впрочем, как и Артем.\nПосле недолгого обсуждения и составления протокола, Тимур и Артем встали из-за стола и попрощались с пенсионером. Перед тем, как выйти из квартиры, Тимур заметил спальню пенсионера. Матрас с Путиным, подушки с Путиным, стены в картинах с Путиным и российскими триколорами и тумбочка с зеркалом около входа в комнату, на ней не зажженные свечи, а перед ними фотография Путина в рамке с буквами Z и V...\n"Во фанатик конечно реальный..." - отвесил Тимур Артему, когда оба покинули квартиру пенсионера.\n"Соглашусь с тобой." - ответил Артем Тимуру."
 russiaflavor.72.a: "Путин, Путин, Путин, Путин..."

 russiaflavor.73.t: "Конституционная реформа Федорова"
 russiaflavor.73.d: "Президент Российской Федерации Евгений Алексеевич Федоров провел конституционную реформу при поддержке Государственной Думы РФ, Совета Федерации и в частности Общероссийского Народного Фронта. Были и попытки противостоять оставшимися либеральными силами данной реформе, но сторонники данных сил достаточно быстро были "утихомирены" в ОНФ или даже исключены из него.\nВ основном, конституционная реформа коснулась формулировок о суверенитете России, как государства, снятие "запрета государственной идеологии", т.е статьи 13.2, а также исключение "общепризнанных принципов и норм международного права" из правовой системы государства, т.е отмена статьи 15.4.\nДанные шаги демонстрируют решительность нового президента РФ и его сторонников в правительстве к восстановлению влияния РФ во всем мире и становлении истинного Русского Мира."
 russiaflavor.73.a: "Za СуVеренитет!"

 russiaflavor.74.t: "Всенародное стояние за Русский мир"
 russiaflavor.74.d: "Галя была простой пенсионеркой за 77 лет. Несмотря на свой возраст она была активным участником Национально-Освободительного Движения. Она сидела на кухне в своей квартире и решила включить телевизор, переключилась на 1-ый канал, а там как раз новости.\n"А теперь к новостям из Москвы..." - раздался знакомый голос Екатерины Андреевой из телевизора. Галя слушала её взахлеб, попивая чай с печеньками.\n"По всей Москве проходят демонстрации Национально-Освободительного Движения нынешнего Президента Российской Федерации Евгения Алексеевича Федорова. Главная идея данных демонстраций - призыв к защите Русского Мира. Наш корреспондент Константин Панюшкин поговорил с демонстрантами." - закончила Екатерина Андреева.\n"По Москве проходят массовые демонстрации Национально-Освободительного Движения, организации нынешнего Президента Российской Федерации Евгения Алексеевича Федорова. Демонстранты активно призывают к защите Русского Мира от глобалистской угрозы со стороны Европейского Союза." - начал Константин Панюшкин.\n"Наша цель это донести до президента Евгения Алексеевича Федорова нашу позицию, простых граждан из числа его сторонников, что мы хотим, чтобы Русский Мир был защищен от угрозы глобалистов, мы хотим восстановления границ 1945-ого года, за Русский Мир!" - сказал один из молодых демонстрантов около посольства прежней ФРГ, а ныне ЕС, в микрофон Константина Панюшкина.\n"В МИДе Европейского Союза прокомментировали данные  демонстрации, как совершенно антиевропейские, и если российские власти ничего не предпримут в отношении защиты посольства ЕС, то последние наложат санкции, которые к их сожалению никак не сработают, как и остальные старые русофобские санкции запада. Константин Панюшкин, Первый Канал." - закончил корреспондент.\nГаля выключила телевизор, закончив пить чай с печеньками. Она быстро оделась и вышла на улицу к своим сторонникам НОДа."
 russiaflavor.74.a: "Zа Русский Мир!"

 russiaflavor.75.t: "Вскрытый шкаф со скелетами"
 russiaflavor.75.d: "Вооруженный Силы Российской Федерации успешно вошли в Лондон и заняли штаб-квартиру Англосаксонской секретной службы МИ6. Бравые солдаты ВС РФ предотвратили самоуничтожение здания оставшимися верными агентами "глубинного государства" и переворошили все документы центрального офиса МИ6 и нашли очень интересные документы, которые подтверждают "конспирологию" Национально-Освободительного Движения и Президента Российской Федерации Евгения Алексеевича Федорова.\nНекоторые выдержки из документов:\n1. Российская Федерация ДО 2-ой гражданской войны в США действительно была колонией, управляемой Западными Элитами из США и "бывших" колониальных территорий Великобритании. К этим элитам также относится Клаус Шваб - президент "Всемирного Экономического Форума", Майкл Блумберг - американский бизнесмен и основатель так называемого "независимого издания" Bloomberg, Джеффри Эпштейн - американский финансист и организатор массовых педофильских вечеринок на своем острове в Нью-Йорке.\n2. Американские элиты никуда не исчезли с началом 2-ой Гражданской Войны в Соединенных Штатах Америки. Наоборот, они вывели свой капитал в Европу, поближе к Брюсселю, используя глобальный хаос в свою пользу, что и вылилось в Мировой Экономический Кризис, с последствиями Гражданской Войны в США.\n3. После смерти Владимира Путина от Ковида-19, победивший Медведев на выборах стал противостоять Западу со всей силой и поддержкой Российского общества, которое в конечном итоге вылилось в укрепление Общероссийского Народного Фронта. Западные элиты дико испугались этого и стали готовиться к грядущей войне с Россией, в конечном итоге которая обернулась победой для России, но агенты МИ6 в окружении Медведева убедили поставить Надеждина, в качестве преемника через ОНФ.\nЧерез некоторое время, данные документы будут опубликованы миру."
 russiaflavor.75.a: "Правда..?"

 russiaflavor.76.t: "Секреты наяву"
 russiaflavor.76.d: "Премьер-министр Великобритании Найджел Фарадж оповестил Службу Внешней Разведки Российской Федерации и Президента РФ Евгения Алексеевича Федорова о том, что Великобритания намерена передать им документы Британской разведки МИ6 для ознакомления с правдой о том, что творилось в тенях беглых британских элит, которые бежали, после победы Найджела в небольшой Гражданской Войне прямиком в Брюссель.\nНекоторые выдержки из документов:\n1. Россия после выхода из состава СССР стала полноценной колонией Соединенных Штатов Америки. Россия ПОЛНОСТЬЮ УПРАВЛЯЛАСЬ Западными Элитами до прихода Владимира Путина. Некоторые из "управленцев" России: Клаус Шваб - президент "Всемирного Экономического Форума", Майкл Блумберг - бизнесмен и основатель "независимого издания" в честь себя - Bloomberg, Джеффри Эпштейн - американский финансист и педофил МИРОВОГО уровня, что устраивал вечеринки с участием несовершеннолетних, в качестве "секс рабынь", где участвовало большинство элит.\n2. Гражданская Война в США стала полной неожиданностью для Западных Элит, ведь они не думали, что народ там поднимется против итогов элитарного правления. Западным Элитам пришлось поспешно выводить свой капитал из США и переводить его прямиком в Брюссель, новую столицу "глубинного государства".\n3. После смерти Владимира Путина от Ковид-19, пришедший на смену Дмитрий Медведев сильно напугал Западные Элиты своей "анти-элитарной" и "анти-глобалистской" риторикой. Только благодаря усилиям агентов "глубинного государства" в кругу Медведева им удалось сохранить власть над Россией, ведь преемником Медведева стал - Борис Надеждин, который в конечном итоге был отстранен усилиями Национально-Освободительного Движения и их сторонников в Общероссийском Народном Фронте.\nЧерез некоторое время, данные документы планируется опубликовать общественности."
 russiaflavor.76.a: "Конспирология была явью..."

 russiaflavor.77.t: "Истинный конец истории?"
 russiaflavor.77.d: "Евгений Федоров сидел в своём Кремлевском кабинете, со своим секретарем. Ему только что принесли бумажные копии документов Британской разведки МИ6. Федоров задумчиво листал документы поочередно, не торопясь, подмечая всё, что его интересовало, а интересовала его - правда и он хотел её сверить со своими прежними догадками о заговоре Западных Элит.\n"Приступим же к прочтению!" - начал в своей голове Федоров.\n"Путин держал контакт с Западом всегда и не старался особо уходить в радикальное противостояние и Украина изначально, после возвращения Крыма была обречена на Российское вторжение, ради освобождения страны и возвращения территорий Новороссии, на которые последняя претендовала, как проект государства, из-за захвата власти прозападниками..." - продолжил Федоров в своей голове, долистывая до конца документов.\n"Странно... Как-то не особо вижу тех деталей, про которые твердил я и мои сторонники... Может мы ошиблись в деталях, но в самой сути - мы ведь правы... Надо будет внести некоторые корректировки и представить общественности это, как правду. Никто ведь теперь из важных лиц не станет этого отрицать, а если и станут, то их не будут воспринимать всерьез большинство." - закончил в своей голове Федоров и его тело покрылось мурашками от облегчения, что он узнал правду.\n"Нам стоит внести некоторые корректировки в данные документы, насчет того, что Глубинное Государство действительно контролировало Россию, до начала 2-ой Гражданской Войны в США. Ну и про Надеждина не забудьте упомянуть, что он является таким же своеобразным агентом этого самого государства." - твердо приказал Федоров своему секретарю.\nСекретарь молча кивнул головой и вышел из кабинета для того, чтобы приступить к выполнению приказа своего начальника руками других, нижестоящих людей."
 russiaflavor.77.a: "Полагаю, вот и финал..."

 russiaflavor.78.t: "Царизм восстановлен в России!"
 russiaflavor.78.d: "В результате ошеломляющей победы России в Европейской Войне и смерти русского лидера - Владимира Жириновского, встал острый вопрос о том, что же будет дальше? За достаточно короткий срок времени был созван Земский Собор, впервые почти за 4 века. На земском соборе было решено покончить с "регентство" и присвоить Императора и Самодержца Всероссийского - Георгию Михайловичу Романову.\n\nГеоргий Михайлович Романов взял себе наименование "Георгий I". Сам Георгий сам по себе уникальный человек не только тем, что он один из Романовых, но и по отцовской линии в нем течет кровь Гогенцоллернов, тех самых, среди которых был последний Кайзер Германской Империи - Вильгельм II. В своей речи Георгий I провозгласил "Последний монарх России - Николай II допустил множество ошибок, пора вернуться наследию Александра III - истинного русского царя! Мы восстановим русское наследие дальше, мы не позволим себя уничтожить нео-большевистским силам Европы!"\n\nПосле речи ни у кого не осталось сомнений - Георгий I не является любителем Октябрьского манифеста Николая II, а продолжателем традиций и идей Александра III. Россию ждет возвращение русского самодержавия."
 russiaflavor.78.a: "Они действительно повернули время вспять..."

 russiaflavor.79.t: "Царизм восстановлен в России!"
 russiaflavor.79.d: "В результате ошеломляющей победы России в Европейской Войне и смерти русского лидера - Владимира Жириновского, встал острый вопрос о том, что же будет дальше? За достаточно короткий срок времени был созван Земский Собор, впервые почти за 4 века. На земском соборе было решено покончить с "регентство" и присвоить Императора и Самодержца Всероссийского - Ростиславу Ростиславовичу Романову.\n\nРостислав Ростиславович Романов взял себе наименование "Ростислав I". Новый император до земского собора являлся художником-пейзажистом, который был вовлечен в живопись на пленэре. В своей речи Ростислав I провозгласил: "Николай II мыслил верно, в плане Октябрьского Манифеста. Романовы более не будут в стороне от народа, мы будем с вами, мы дадим народу думу вновь! А что касается нынешней Европы - я дам им ответ прямо здесь, я вам не позволю никакого реванша, а если вы и пойдете на него - он не будет в вашу пользу, Россия больше не встанет на колени перед сумасшедшими левыми и продолжателями большевиков.".\n\nПосле такой речи, ни у кого не осталось сомнений в том, что Ростислав I это новый реформатор на престоле, который намерен восстановить то, что даровал российскому народу Николай II и то, что у него не получилось сделать должным образом."
 russiaflavor.79.a: "Октябрьский дух 1905 года задышит вновь."

 russiaflavor.80.t: "Царизм восстановлен в России!"
 russiaflavor.80.d: "В результате ошеломляющей победы России в Европейской Войне и смерти русского лидера - Владимира Жириновского, встал острый вопрос о том, что же будет дальше? За достаточно короткий срок времени был созван Земский Собор, впервые почти за 4 века. На земском соборе было решено покончить с "регентство" и присвоить Императора и Самодержца Всероссийского - Гавриилу Евгеньевичу Дорошину.\n\nГавриил Евгеньевич Дорошин взял себе наименование "Николай III". Новый император до земского собора прославился по большей части среди солдат - своей службой в качестве добровольца. Николай III является потомком последнего Императора и Самодержца Всероссийского - Николая II по отцовской линии, а также по материнской линии является потомком супруги Наполеона I - Жозефины Богарне. В своей речи Николай III провозгласил: "Мы смогли победить Европейского зверя и сокрушительно разбить его. Я понимаю, что с подъемом нео-большевистских идей у них, ОНИ попытаются пойти на реванш и нам стоит быть готовыми к этому. Я сам воевал бок о бок с солдатами на передовой и Я НЕ ДОПУЩУ ПОЗОРА НАШЕЙ ИМПЕРИИ!".\n\nПосле речи не было понятно, какой путь ждет Россию - самодержавия или же восстановления Октябрьского манифеста предка Николая III - Николая II, ведь внутренняя ситуация в стране на удивление не была затронута новым царем. Но одно было понятно всем - Николай III, как солдат не даст обидеть Россию новому красному зверю."
 russiaflavor.80.a: "Солдат взошел на трон."

 russiaflavor.81.t: "Обращение Медведева к нации"
 russiaflavor.81.d: "Президент Российской Федерации выступил с обращением к нации, в связи с последними событиями на границе с Польшей. Медведев заявил, что Польша сделала свой выбор на пару с представителями Североатлантического Альянса, сделав поспешные выводы о том, что именно Россия стала организатором перестрелки, тем самым инициировали 5-ую статью НАТО для начала войны с Россией.\n\nТакже Медведев заявил, что "Хоть Европейские слуги Брюсселя и пошли на войну, руками Восточной Европы, но Россия не станет использовать ядерное оружие против своих братьев и освободит их от гнета Брюсселя. За нами правда, а в правде - победа.".\n\nДанное обращение было встречено общественностью достаточно тепло, поскольку в этот раз пошла реальная угроза, которой не было с 1941-ого года. Очереди в военкоматы, толпы провластных активистов и лояльных граждан восхваляли Дмитрия Анатольевича за то, что он не дрогнул и призвал Россию встать против врага."
 russiaflavor.81.a: "Слава России!"

 russiaflavor.82.t: "Новый Выпуск"
 russiaflavor.82.d: "Вот уже как секунд 15 камера была включена, однако Максим не мог произнести ни слова. Сегодняшняя тема для его ролика была настолько ужасной, но при этом настолько предсказуемой, что это почему-то только усиливало его ком в горле. Однако сбежать от этой темы он аналогично не мог. Отпив водички, он слегка откашлялся, и наконец, начал говорить:\n\n-Представьте такую ситуацию - вы живете в России. Удивительная ситуация, правда? Судя по статистике моего канала, она знакома многим из вас. И вот, казалось бы, новая власть неожиданно дала нам то, чего мы так долго пытались заполучить при Путине - демократию. Извращенную, странную, далеко не идеальную, но демократию. И ведь мы были рады - строили надежды, планы, даже кровавую бойню в Европе им простили. Но в конце концов - карета превратилась в тыкву. Ультраправые преступники, из фашистской и шовинистской организации "СЗНД" взяли власть, используя как и старые, путинские методы - подделка голосов и популизм, так и новые, а именно запугивания и покушения.\n\nКац остановился, взял стакан, и отпил из него. Затем, он продолжил:\n\n-Сейчас, я хочу обратиться ко всем, кому не равнодушна судьба России. Неважно кто вы, либерал или консерватор, коммунист или демократ, из Единой России или из России Будущего,  за федерализм или за централизацию, правый или левый, любите клубничное мороженое или шоколадное. Прямо сейчас, в Москве заседает настоящий идеологический потомок Бенито Муссолини, выскочка, возомнивший себя великим спасителем. Правда спасет он Россию разве что от жизни, при этом убив еще пару миллионов, и травмировав десятки. Я никогда не призываю свою аудиторию к опасным действиям, но сейчас - исключение. Пожалуйста, боритесь с режимом. Неважно, что вы будете делать - выходить на митинги, учить правде, или просто сделаете репост этого видео. Важно, чтобы вы содействовали сопротивлению. У нас есть шанс остановить это безумие. Так давайте же воспользуемся им, пока не стало слишком поздно."
 russiaflavor.82.a: "До завтра."

 russiaflavor.83.t: ""Мультяшные" Демонстрации"
 russiaflavor.83.d: "С приходом к власти Державной России, многие области социальной сферы общества подверглись сильной цензуре, включая и телеканалы. Сначала были введены достаточно очевидные запреты на западные телеканалы, такие как "BBC", "Discovery", "MTV", "Nickelodeon", "Animal Planet" и многие другие. Однако вскоре выяснилось, что вынужденно прекращают свое вещание и российские телеканалы, например "Суббота", "Пятница", "Матч-ТВ", "Муз-ТВ", "Моя планета" и так далее. Но что больше всего взбудоражило общественность, так это закрытие всех детских и подростковых телеканалов, таких как "Солнце", "МУЛЬТ", "2х2" и даже такого гиганта, как "Карусель".\n\nТакое резкое решение о закрытии множества каналов сразу же столкнулось с сильно негативной реакцией народа, но что самое худшее, это взбудоражило клубок змей, под названием "Демократическая Оппозиция". Первым выступил Борис Надеждин - в своих социальных сетях он призвал бороться с цензурой в сети, намеренно использовать VPN, а так же распространять способы обхода в сети. Дмитрий Патрышев и Борис Титов выпустили аналогичное заявление, однако со слегка отличающимися друг от друга формулировками. Самое радикальное заявление было у Алексея Нечаева - он призвал к выходу на демонстрации, а так же к полномасштабным акциям по всей стране. Казалось бы, было бы абсолютно глупо протестовать против такой необходимой меры, это должен был понять любой.\n\nОднако люди выходили.\n\nПо общим оценкам самые крупные протесты прошли в Москве,  Минске и Екатеринбурге, где на одной площади могло собраться около 4000 человек. Самый масштабный митинг прошел в Санкт-Петербурге на Площади Восстания - там было около 7000 человек, из которых 500 было задержано. В какой-то момент, во время акций началась массовая неразбериха, из-за которой пострадало пару десятков человек, а 5 протестующих были и вовсе убиты. Кадры со смертями быстро разлетелись по сети, лишь сильнее ухудшая наш имидж, и повышая активность различных маргинальных групп."
 russiaflavor.83.a: "И это все из-за мультиков?!"

 russiaflavor.84.t: "Диалог"
 russiaflavor.84.d: "После прихода к власти Алиханова, множество слухов и информации просочились в прессу про лидеров Державной России, в основном, конечно же, от демократической оппозиции. Народ особо не обращал на подобные новости внимание, поскольку оппозиция таким занималась, в принципе, и до прихода Алиханова. Однако недавний случай взбудоражил информационное поле особенно сильно.\n\nДмитрий Патрушев, бывший аппаратчик Единой России при Медведеве, выложил у себя в телеграмм канале аудиозапись, с подписью "2021-07-24_ПРАВДА". Как подпись к данному файлу он написал о том, что это тайная запись разговора Владимира Владимировича Путина и Медведева, записанная еще до смерти первого.\n\nСодержание записи еще интереснее, чем ее предыстория. Судя по звукам, политики сидели за столом, попивая какой-то напиток, предположительно чай или кофе. Сначала Медведев и Владимир Владимирович обсуждали что-то банальное - кто что поел, какие планы и встречи, обсудили какая одежда лучше на ком сидит и так далее. Однако когда диалог стал плавно перетекать в политическое русло, и речь зашла об гипотетически- возможных приемниках Путина, случился интересный диалог:\n\n-...Дмитрий, вот, все-таки я не бессмертный. Жаль, конечно, такое признавать, но учитывая последние события, нам надо думать над тем, кто сможет продолжить мое дело.\n-И кого же вы предлагаете, Владимир Владимирович? \n-Вот, знаете, я бы начал от обратного. Кого бы я не хотел предлагать. А вот не хотел бы я видеть, из Единой России конечно же, наверное, одного человека - господина Алиханова. Этот человек...нет, это...это животное не просто должно быть усмирено, оно должно быть усыплено. Он показал себя как максимально жестокий, безрассудный и, впрочем, бестолковый политик. Дмитрий Анатольевич, я прошу вас - не дайте ему не просто прийти к власти, не дайте ему вообще на власть влиять! Если вы не справитесь...то Россию ждет кошмарное будущее...\n\nНа этом моменте аудиозапись резко оборвалась. Пост вызвал настоящий фурор по всему рунету, и даже вышел за его границы. Не смотря на то, что правдоподобность данной записи равна чуть больше нуля, множество человек все равно поверили ей, и теперь огонь протестов вспыхнул вновь, на этот раз еще сильнее."
 russiaflavor.84.a: "Да очевидно же, что это нейросеть! Почему люди повелись на эти провокации?!"

 russiaflavor.85.t: "Массовые Протесты "Новой России"!"
 russiaflavor.85.d: "Ещё с момента убийства Владислава Даванкова партия "Новая Россия" объявила нас своим худшим врагом и фактически заявила, что их главная цель - уничтожение нашей партии и власти. Мы не особо беспокоились об этом, поскольку без Даванкова партия, по сути, превратилась в ЛДПР 2.0, живущую только за счёт памяти о своём некогда известном политике. Это была наша ошибка./n/nАлексей Нечаев, не особо известный аппаратчик и бывший депутат Госдумы, и раньше отличался своими лозунгами и высказываниями в различных социальных сетях. Но сегодня он отличился особенно сильно. В качестве памяти Владиславу Даванкову Алексей Нечаев предложил нелегально соорудить собственную мемориальную доску в Санкт-Петербурге на улице Марата, 47, при этом призвав построить её не с помощью рабочих, а самостоятельно. Когда либеральные активисты прибыли на место, их, конечно же, стали задерживать, но Нечаеву такой исход не понравился. Спустя несколько минут после первых задержаний в его личном телеграм-канале появилось множество фотографий с арестом активистов и провокаторский призыв к людям прямо сейчас выйти на улицу и двигаться в сторону станции метро "Владимирская", дабы помешать силам порядка устранить незаконные действия./n/nВ итоге со всего Петербурга множество людей с промытыми мозгами и впрямь стали стекаться к Нечаеву и активистам. Причём их было настолько много, что нам пришлось временно парализовать систему метрополитена в Санкт-Петербурге, но это не сильно помогло. Тысячи людей прибыли к месту, начав применять различные действия по отношению к стражам правопорядка, начиная от защиты активистов и заканчивая забрасыванием полиции камнями. В ответ наши бойцы приняли решение использовать слезоточивый газ и физическую силу против людей, что вызвало массовую панику и давку. По итогам протестов мемориальная доска так и не была установлена, зато благодаря действиям Нечаева около 64 человек было ранено, 30 госпитализировано и 2 признаны погибшими."
 russiaflavor.85.a: "Вы ничем не лучше евро-дегенератов!"

 russiaflavor.86.t: "Слухи"
 russiaflavor.86.d: "Ходят слухи, что правительство Алиханова не такое уж и великое. Люди говорят друг другу на кухне: "Да разве это последователь Путина? Да это последователь Гитлера!"\n\nХодят слухи, что правительство Алиханова не такое уж и сильное. Люди говорят друг другу в вузах: "Да что они могут сделать? Они даже кучку протестующих остановить не могут!"\n\nХодят слухи, что правительство Алиханова не такое уж и честное. Люди говорят друг другу в офисах: "Да они всё украли! Ни копейки никому не оставили!"\n\nХодят слухи, что правительство Алиханова не такое уж и народное. Люди говорят друг другу в магазинах: "Да они все цены повысили! Ничего невозможно купить!"\n\nХодят слухи, что правительство Алиханова не такое уж и сплочённое. Люди говорят друг другу в казармах: "Да разве это офицеры? Это ж, блять, помозки!"\n\nС каждым днём правительство всё больше становится для общества не чем-то государствообразующим, а чем-то маргинальным, нелегитимным. С каждым днём общество всё больше ностальгирует по временам Медведева и Путина, отчего с каждым днём смотрит на проправительственные силы со все большей ненавистью. С каждым днём "Жёлтая гвардия" лишается всё больше и больше членов либо от тяжёлых драк и нападений, либо от массовых увольнений. С каждым днём общество державистов разваливается и трещит по швам, что нельзя не заметить по общим настроениям народа. Демократическая оппозиция уже начинает координировать действия друг с другом, подстрекая народ к опасным действиям, а улицы городов подозрительно пустеют все больше. Осталось не так много времени, прежде чем один из самых страшных слухов, ходящих по народу, может стать правдой."
 russiaflavor.86.a: "Это ведь просто слухи... Верно?"

 russiaflavor.87.t: "Благородность"
 russiaflavor.87.d: "Сезонное полнолуние вновь очутилось на стрелках часов, в то время как благородный рыцарь-стрелок стоит перед камнем, из которого гордо торчит огромный, острый и блестящий меч. Рыцарь смотрит сначала вдаль, на гнусный, темный замок, а затем на величественное оружие, что находится перед ним. Сзади него - большая толпа обедневних, обворованных крестьян, которые уже потеряли всякую надежду на изменения. Резко, хватаясь двумя руками за рукоятку меча, рыцарь достает его, и гордо возвышает над собой, клинком вверх.\n\nКрестьяне поражены, однако и воодушевлены таким поступком. Гордый рыцарь показывает своим новым оружием прямо на замок, начиная маршом идти на него. Народ, образовавшийся за его спиной, тут же подхватывает великий поход, перенимая гордость и силу от воина, за которым они идут. С каждым новым шагом - трава расцветает в их пути, с каждым новым шагом - тучи рассеиваются в небе, с каждым новым шагом - освобождение все ближе.\n\nИ вот, рыцарь и его народ прибыли на место. Злой король-тиран, угнетавший несколько лет бедный народ, был мгновенно повержен одним ударом холодного оружия. Его жирная, противная туша упала на вход в замок, состоящий из награбленных средств народа, а золотая, прекрасная корона падает прямо в руки рыцарю. Народ в восторге, он хором ликует, выкрикивает проклятия уже мертвому королю, и воздает почести рыцарю. Затем, рыцарь слегка замахивается рукой, и бросает корону в толпу, отворачиваясь. Крестьяне, ныне освобожденные, в шоке, и мгновенно теряют дар речи. Один из них, осторожно спрашивает:\n\n-Г-господин рыцарь...вы...вы спасли русский народ...вы спасли нас...как вы можете отказаться от власти над нами же?\n\nРыцарь слегка оборачивается, смотря наискосок на толпу, и спокойным голосом отвечает:"
 russiaflavor.87.a: ""Теперь, вы вправе сами решать свою судьбу""

 russiaflavor.88.t: "Стрим"
 russiaflavor.88.d: "После неожиданной победы на выборах президента России бывшего главы ДНР Дениса Пушилина Владислав Жмилевский был назначен министром иностранных дел.\n\nСтримы, конечно, стали редкостью - государственная служба отнимала почти всё время, но Жмилевский не забывал про своих зрителей, тем более их стало гораздо больше, так как он считался голосом правительства для народа. В основном Владислав обсуждал внешнюю политику и вопросы международных отношений, смотрел видео на Ютубе, которые ему заказывали, частенько обсуждались новые законопроекты, а также проводились аукционы, где он мог выполнить практически любую просьбу донатера.\n\nВо время одной из таких трансляций, когда его попросили спародировать одного стримера, приходит новый донат:\n\nТимур Р. - 100 рублей\n- Привет, Жмэ. Как думаешь, может, нам всё таки стоит наладить отношения с нынешним правительством Европы? Всё таки оно теперь там совсем другое, а то, знаешь, не хотелось бы ещё одной войны.\n- Ага, да, конечно. А ничё, что это всё те же самые леваки, которые мечтают построить новиопию, но только в другой обёртке? Живут они в своём ебучем манямирке со стиранием нации и какой то там "справедливостью". И вообще, они ненавидят нас, русских. С ними можно и нужно говорить только на одном языке - языке силы, а иначе, ну, они просто не поймут.\nЧат раздался овациями и полной поддержкой стримера."
 russiaflavor.88.a: "Это ряльно нужно объяснять? Дёмдальше."

 russiaflavor.89.t: "Солдатская Печаль"
 russiaflavor.89.d: "Александр был солдатом с самого начала войны, бывал со своей ротой во многих городах Европы: от Киева с Варшавой до Бухареста с Софией, а после демобилизации собирался вернуться в свою деревню к семье, находившейся в Крыму.\nНо, во время пребывания в больнице, куда он попал после тяжёлого ранения, ему сообщили печальную новость: за пару дней до окончания войны в его дом случайно попала ракета. А жена с дочерью погибли на месте.\nВскоре Александр был демобилизован, но возвращаться в свою родную деревню отказался из-за трагических воспоминаний. Тогда, так как податься больше было некуда, он решил отправиться служить в военную полицию на новоприобретённые территории России - поддерживать порядок на них.\nВо время одного из патрулей Александр заметил беспризорника, копающегося в обломках жилого здания. Мужчина подошёл к мальчику и спросил:\n- Что ты тут делаешь? Где твои родители?\n- Отец погиб на фронте, а маму задел беспилотник, когда она пошла в магазин... - ответил мальчик.\nИ закипело что-то тогда у солдата у груди. Долго он молчал, глядя на мальчонку, и решил он, что не бывать тому, чтобы они пропадали по одиночке! И возьмёт мальчонку к себе в сыновья.\n- А ты знал, что я - твой отец? - сказал полицейский ему на ухо.\nМальчик замер, а потом вдруг бросился на шею. Прижался он к солдату так крепко, будто боялся, что тот исчезнет. По дороге мальчонка не отходил от Алексея ни на шаг, и впервые за долгое время солдат почувствовал теплоту в сердце."
 russiaflavor.89.a: "И нашли две одинокие души друг друга."

 russiaflavor.90.t: "Доброволец"
 russiaflavor.90.d: "По новому распоряжению Антона Алиханова в России была основана "Жёлтая гвардия", призванная следить за порядком на улицах и помогать полиции. Отличить членов гвардии на улице было крайне легко, а форма состояла из жёлтой повязки с флагом России и такого же цвета костюма - рубашка с шортами на подтяжках.\nДобровольцем мог стать любой гражданин страны. Достаточно было подать заявку в одном из пунктов приёма и пройти короткое собеседование.\nСама процедура была довольно быстрой и не занимала большого количества времени:\n- Итак, здравствуйте, вы планируете вступить в Жёлтую гвардию. Могу узнать, что вас на это навело?\n- Да вы знаете, эти либерахи уже совсем охуели. Недавно взяли и подорвали жилой дом. Ну разве так можно? После этого я сразу осознал, что больше не могу оставаться в стороне\n- Угу, хорошо. Вы готовы служить стране и, если потребуется, пресекать противоправные действия? Это может быть довольно опасно, особенно в нынешнее время.\n- Да, именно для этого я и пришёл. Хочу, чтобы на улицах восстановился порядок. Я готов в этом участвовать.\n- Отлично. Тогда я передам вашу заявку на рассмотрение. Позже вам выдадут форму и приставят к напарнику. Могу я только узнать вашу фамилию и имя?"
 russiaflavor.90.a: "- Мерсо Кожемяко."

 russiaflavor.91.t: "Предложение"
 russiaflavor.91.d: "Антон Андреевич Алиханов решил загянуть у своему старому знакомому - скульптору, известному под псевдонимом "Брекарь". Хотелось узнать, как продвигается дело с заказом.\n- Здравствуй, Брекарь. Как ты? Хотел у тебя узнать, как там обстоят дела с заказом? А то я тебя знаю - любишь время потянуть.\n- Добрый день, Антон Андреевич. Всё в порядке. Работа идёт, не переживайте.\n- Замечательно. Ты ещё говорил, что кто-то со мной хочет встретиться и обсудить что-то. Можешь рассказать кто это?\n- Ах да. Ко мне недавно обращались двое из Жёлтой гвардии. Оба хорошо себя показали на службе, и они очень сильно настаивали на разговор с вами.\n- Можешь пригласить их.\nБрекарь отошёл на пару минут, а потом вернулся вместе с двумя гвардейцами.\n- Здравствуйте, Антон Андреевич, меня зовут Мерсо, я один из старших гвардейцев, и мы с моим товарищем, Лукой, считаем, что вы должны, нет, даже обязаны, нас выслушать.\n- О? С каких это пор я вам обязан?\n- Прошу вас, послушайте. Я совершенно серьёзно.\n- Ну давай, допустим. Что ты предлагаешь?\n- В тылу сейчас небезопасно. Разные радикальные левые и демократические группы разбушевались. Людей для поддержания порядка не хватает, а на возвращённых территориях так вообще хаос. Я вам предлагаю открыть пункты добровольцев в Жёлтую гвардию на Украине.\n- Так они там и так есть.\n- Есть да, но их недостаточно. Мы предлагаем не только расширить количество пунктов, но и упростить приём для местных жителей. Принимать их на равных с гражданами России. Параллельно начать кампанию по улучшению имиджа гвардии среди украинцев, чтобы начали нас видеть как защитников порядка. Если позволите, я готов взять на себя организацию этой работы\n- Понятно. Ещё что-нибудь?\n- Так же я предлагаю сменить вектор движения. Наше движение должно быть не только всероссийским, а охватывало всех восточных славян.\n- И Как ты себе это представляешь?\n- Нужно начать интеграцию. Украину, Белоруссию, Малороссию - объединить нас всех под одним знаменем.\n- Ты ведь понимаешь, что времена изменились? Мы уже не один народ, как это было пару веков назад.\n- Разница разве что в мелочах. У меня у самого родители с Украины, я знаю, о чём говорю.\nАлиханов, нахмурившись, достал сигарету из портсигара, щёлкнул зажигалкой. Несколько секунд молчал, затягиваясь.\n- Хорошо, я готов подумать над твоим предложением, - наконец произнёс он."
 russiaflavor.91.a: "- Но для начала тебе нужно будет зарекомендовать себя."

 russiaflavor.92.t: "Угасающая надежда"
 russiaflavor.92.d: "Виктор Янукович уже много лет живёт в своей резиденции под Ростовым. Сюда он вынужден был уехать после того как его предали. Но даже в самые мрачные дни он верил, что Украина сможет встать с колен. Что в конечном итоге она расцветёт.\n\nВ дождливый день, утром, Виктор Федёрович сидел на диване за чашкой кофе, смотрел телевизор, ожидая, когда начнутся новости. Одна из новостей была: "Российский войска полностью освободили столицу Украины - Киев". Янукович застыл и не мог вымолвить ни единого слова. В голове лишь прокручивались, словно плёнка, старые воспоминания.\nВспомнился 2010-й год его самая первая речь на посту президента. Вспомнился Майдан, отстранение и побег. И вот - страна, которую он так любил, была сожжена в пепле войны.\n"Что же я наделал? Как бы я мог предотвратить тогда начало неизбежного? Что ждёт мою родину дальше?" - Но глубоко в душе он понимал, на его вопросы никто не даст ответа, всё было кончено.\n\nЗа окном дождь усилился, капли стучали по крыше, а в доме по-прежнему восседала тишина."
 russiaflavor.92.a: "Надежда умирает последней."

 russiaflavor.93.t: "Разборка"
 russiaflavor.93.d: "Влад бывалый член Русской Общины. За ним было много уличных стычек и потасовок. Правда в последнее время у Общины начались серьёзные проблемы: вражда с чеченскими группировками, а особенно с кадыровцами.\n\nОдна из таких потасовок была особенно масштабной и жестокой. Стычка началась резко. Гул ударов слышался по всему кварталу. Влад двигается уверенно и чётко. Его коронная подсечка снова и снова валит противников на землю, чувствуя как приходит азарт и уверенность в своих силах\n\nНо постепенно ситуация стала проясняться: перевес был явно на сторону чеченцев. Их больше да и действовали они более организованно. Влад пытается удержать строй, но на него бросается сразу несколько дагов. Он резко уходит в сторону, пытается сделать свою фирменную подсечку - и впервые она не срабатывает. Противник удерживается на ногах и отвечает мощным ударом в челюсть, чёткость Влада пошатывается и он падает на землю.\n\nРусская Община отступает, многие корчатся на земле от боли. Кадыровцы хватают за шиворот тех, кто ещё оставался в сознании, включая Влада, собирают их у стены и заставляют извинится перед ними и Рамзаном Ахматовичем."
 russiaflavor.93.a: "Чечня - сила! Аллаху Акбар!"

 russiaflavor.94.t: "Борьба"
 russiaflavor.94.d: "Вся жизнь человечества - это борьба. С природой ли, с другими людьми. Для некоторых народов - это борьба со всем миром и даже с гневливым Богом, что ниспослал их на землю. Но какими бы ни были предпосылки, борьба не исчезнет из нашей жизни. Лев рычит, горилла бьёт себя в грудь, и всё это для того, чтобы защитить своё место наверху, чтобы быть самым сильным и главным или хотя бы казаться таковым.\n\nИ Россия за всю свою историю не раз сталкивалась с необходимостью сражаться за своё существование. Будь то азиатские орды или войска единой Европы. Многие пытались положить конец истории нашей страны, и каждый раз они проигрывали.\n\nИ вот сейчас Россия вновь стоит на пьедестале как единственный победитель обеих Европейских войн.\n\nОднако борьба не закончена. Униженные и побеждённые немцы, французы и другие покорённые народы захотят взять реванш. Борьба продолжается, ибо такова суть вещей. Но Россия более не погрязнет в слабости. Алиханов сделал всё, чтобы его родина была сильной и готовой сражаться до последнего.\n\nЭто был его идеально отрегулированный механизм, военная машина, которой не было равных. Это был народ, единый и неделимый, словно ревущая волна, способный снести всё на своём пути. Это была его отчизна, гордая и непокорённая."
 russiaflavor.94.a: "И по другому быть не могло"

 russiaflavor.95.t: "Полицейская волна"
 russiaflavor.95.d: "- Отряд мобильный особого назначения на территорию массовых беспорядков прибыл. Командир Сергей Чернов.\n- Принято. Начинайте процедуру оцепления. Подразделение желтой гвардии прибудет для оказания поддержки уже скоро. Ориентировочно время: 15 минут.\n- Понял, начинаем оцепление.\n. . .\n- Нарушители пытаются прорвать оцепление, совершают атаки на сотрудников. Где подкрепление?\n- Желтая гвардия оказалось атакована, их машина повреждена. Время задержки неизвестно.\n- Принято, продолжаем. . . Бутылка! Под. . . - из приёмника доносится звук бьющегося стекла.\n. . .\n- Где же Демьянчик со своими парнями? Как на парад то они первые, мать его. Как медали получать тоже они. Как бомжей пинать то мы Это им простим. А как с реальными митингующими.\n- Прекратите, вы засоряете эфир. Связь с отделением гвардии потеряна.\n- Ясен хер засоряю. У меня тут трое раненых с ожогами, Одного утащили митингующие, сука, так и не отбили. Дерзкие твари, как озверина нажрались. А помощи всё нет! Мы будем вынуждены отступить если это продолжится.\n- . . . .\n- И тебе того же.\n. . .\n- Сволочь малолетняя. Ух, нормальный  у них самопал.- командир глубоко вздыхает. - Аж дыхалку перехватило. Оцепление прорвано, мы отступаем для перегруппировки. Делайте с этим что хотите, можете хоть военных направить."
 russiaflavor.95.a: "И опасна и трудна"

 russiaflavor.96.t: "Монстр"
 russiaflavor.96.d: "Это не просто гнев. Это была ярость - искренняя, неразбавленная и неконтролируемая. Когда Алиханов пришёл к власти, он знал, что с ним будет много несогласных. Всем в этом мире не угодить, и бывший губернатор Калининграда знал это лучше других. И всё же он не ожидал, что столько бывших товарищей от него отвернутся. Даже Медведев внёс свой вклад в падение Алиханова. Потому что Алиханов не был Путиным, не был Медведевым. Кто-то даже говорил, что он не был русским. Предатели даже собрались в свою так называемую оппозицию. Но где они сейчас? В сырой земле! Их тела не будут переданы родственникам. Они до последнего будут числиться пропавшими, потому что такова награда для Иуды.\n\nЭто тяжёлый крест, шрамов Алиханова не счесть. Пока остальные жевали сопли, кормили народ обещаниями, только он взялся выполнять свои обещания, свой долг перед народом, перед всей Россией. И всё-таки отношение к нему менялось. Сначала его величали зверем, иногда даже зверюгой за мощь, за его рвение. Потом его стали величать животным, словно он был бешеной собакой, что бросается на людей.\n\nТеперь же его прозвали монстром. Но пусть так! Истории нужны личности, что берут всё в свои руки, не думая о том, как их запомнит история и в особенности граждане других стран. Алиханов решил сделать Россию воистину великой, и он не нарушит своего обещания. Русский мир более не будет пустым звуком! Русская весна не будет забыта! И всё благодаря ему!\n\nЕсли уж ни у кого другого не было смелости значит этим займётся сам Антон. Цель оправдывает средства, но только если цель это спасение отчизны."
 russiaflavor.96.a: "Никто не сможет мне уже помочь, унять ту боль."

 russiaflavor.97.t: "Сомнительная поддержка"
 russiaflavor.97.d: "- Твою мать, Стас,  ты  с дуба там рухнул!? Ты чё наделал? - Сотрудник ППС с недовольным лицом смотрел  на своего товарища.\n- Пал Палыч, чего я то сразу? Я к нем нормально нормально подошёл, нормально сказал, «Гражданин, на вас там это . . . короче поступали жалобы на несанкционированный пикет, пройдёмте в машину». А он этот транспарант к себе прижал, что мог.  Ноги задрожали, глаза закатились да так и рухнул. Я его и пальцем не тронул.\n- Ты себя давно в зеркало видал? Ты ж шкаф 2 на 2. Ясное дело, что он в штаны то приспустил когда ты к нему подошёл и так обратился, ещё и в форме. Я бы наверное тоже так сделал будь его возраста. - Павел аккуратно провёл по своим усам думая, что дальше делать. - А что за плакат у него был-то?\n- Да я ж откуда знаю? Он его уже обратной стороной повернул, когда я подошёл.\n- Эххх, ну посмотрим.  - Павел подошёл поближе к подростку лежащему на асфальте. Рукой взялся за правый верхний угол транспаранта и перевернул его. На обратной стороне красовалась переделанная «Родина-Мать», державшая в руке флаг нацистской Германии с одним отличием. Посреди свастики  красовался глобус с Россией в центре. Сверху транспаранта белыми буквами было написано «Всероссийская организация национал-космополитов выступает Za Алиханова». Снизу - «Белые всех стран, вам нечего терять кроме оков глобализма!». - Ох ё. . .\n - Дааа, ну и дела. Уголовку из этого можно состряпать, как думаешь?\n-  То есть ты мне пацана, которому и 20 нет, сначала вырубил, а теперь и уголовку хочешь ему накрутить? Хватай его за ноги, я спереди встану, и тащим его в машину. И эту херню бы не забыть. Чё встал? Давай, живее-живее. . ."
 russiaflavor.97.a: "Бывает и такое"

 russiaflavor.98.t: "Их Борьба"
 russiaflavor.98.d: "...А теперь к другим новостям. Сегодня ночью в городе Армавире членами запрещённой экстремистской организации БОАК, они же Боевая организация анархо-коммунистов, был совершён неудачный акт терроризма. В три часа ночи группа из четырёх человек приблизилась к местному отделению жёлтой гвардии на улице Жукова и попыталась поджечь здание, используя самодельный коктейль Молотова.\n\nОднако из-за того, что кидавший зажигательную смесь подошёл слишком близко, бутылка, отскочив от стекла, попала прямо в лицо метателю, что послужило причиной его возгорания. Подельники пытались потушить его, однако бросились бежать, услышав звук полицейской сирены. На данный момент за жизнь неудачливого метателя бьются врачи-реаниматологи, его личность пока не установлена. Также экстремисты оставили на месте сумку, в которой находились несколько трафаретов, плакат экстремистской организации и несколько баллончиков с краской.\n\nПолиция уже развернула поисковые работы, и ожидается, что в ближайшее время остальные поджигатели будут преданы суду. А о новостях мира спорта вам расскажет мой коллега Виталий Островский."
 russiaflavor.98.a: "БОАК? Впервые слышу о них..."

 russiaflavor.99.t: "За чертополохом"
 russiaflavor.99.d: "Посреди поля стоял замок, к нему уже давно заросла тропа, и никто уже на протяжении века не решался посетить это место. Раньше здесь заседал могущественный государь, элита проводила свои балы, а самая лучшая в царстве стража охраняла поком. Но те времена прошли давно. Теперь замок порос чертополохом, его шипастые лозы оплетали вековые башни и стены, а дурманязие фиолетовые цветы затуманивали взор. Но бравый рыцарь не собирался сдаваться.\n\nОн сжал в руках меч, после чего замахнулся. Жгучий сок брызнал на руки, вызывая ужасный зуд, но этого было недостаточно. Ещё удар. Ещё и ещё. Рыцарь пробирался сквозь чертополох, не зная усталости. Шипы вписались в ноги и руки, ядовито зелёный сок жег жег лицо, глаза слезились, но не от жалости к чему-то и тем более к самом себе. Коридор за коридором, зал за залом чертополох отступал.\n\nВ конце обессиливший рыцарь добрался до тронного зала. Опустевший пыльный трон, освещаемый лучом света через дыру в потолке, манил его. И когда он подошёл ближе, за спиной воина начали раздаваться голоса. Обернувшись, он заметил их - 7 фигур. Взрослые мужчина с женщиной да их четверо дочерей стояли в зале прямо перед рыцарем, из-за спины отца робко выглядывал бледный сынишка. Фигуры стояли и улыбались, словно испытывая гордость за подвиг бравого воина.\n\nИ затем прямо из воздуха появилась корона, украшенная самоцветами. Это была корона для Него. Для рыцаря, что не побоялся бросить вызов и отстоять память династий прошлого. Он сам не просходил из богатого рода, но именно он был её достоин. Примерив регалию, солдат сел на трон, после чего фигуры исчезли. Когда-то придёт более достойный воин, с благородной кровью и непокоримой силой духа, достойный этой регалии. Но пока? Пока рыцарь будет сторожить её."
 russiaflavor.99.a: "Ибо лишь он достоин"

 russiaflavor.100.t: "Климовки"
 russiaflavor.100.d: "Лет 5 назад, проезжая по дорожным эстакадам и шоссе Москвы, можно было увидеть множество новостроек, напоминавшие разноцветные упаковки сигарет или коробки из под обуви.\n\nОднотипный блёклый дизайн облицовки, отсутствие балконов, транспортной инфраструктуры и просто внешняя дешевизна сразу бросались в глаза. Внутри жильцов ожидал целых ворох проблем: маленькие комнаты, странная планировка и постоянный шум от соседей.\n\nПодобное решение рисковало стать всеобщим для России. Множество кампаний уже получили разрешения на строительство новых многоэтажек по всей европейской части нашей страны. Однако сейчас на месте срочно снесённых новостроек снова работали краны и грузовики.\n\nСогласно новому плану по перестройке инфраструктуры СССР, предложенному Министерством Строительства и одобренному на заседании партии, было необходимо внедрить советскую культуру в гражданскую архитектуру, чтобы поддерживать коммунистическое настроение в повседневности. Для этого все строительные подрядчики были коллективизированы местными советскими органами, а среди архитекторов были объявлены социалистические конкурсы на новые проекты зданий.\n\nМосква, как символ коммунизма, стала преображаться первой. Быстро по всей столице стали возводится огромные исполины из стекла, бетона и стали. Причудливые грубые формы были украшены красными звёздами и мозаиками на воодушевляющие темы с цитатами Ленина, Сталина и прочих деятелей большевизма. Особенной популярностью в народе стали пользоваться "Климовки" - типовые 10-и этажные дома с просторными потолками и уютными квартирами.\n\nСкоро каждый город страны будет олицетворять своим внешним видом цели и стремления советского человека!"
 russiaflavor.100.a: "Власть Брутализма - неоспорима"

 russiaflavor.101.t: "Портрет Вождя"
 russiaflavor.101.d: "Со времён Сталина в России укоренилась традиция вешать портрет действующего правителя над рабочим местом в кабинетах руководителей и начальников. Даже после прихода хрущевского ревизионизма и капитализма картины никуда не делись. Согласно новому указу генерального секретаря Клима Александровича, каждый начальник, имеющий свой собственный кабинет, обязан повесить портрет Сталина над своим рабочим местом.\n\nМногие злые языки говорили, что данная практика присуща клептократическим и тоталитарным государством, где чиновника заботит положение в иерархии и близость к высшему правящему звену, а не дела государственные и его народа, пока деспот наслаждается наигранными улыбками. Так и было, при Хрущёве, дальнейших генсеках и президентах. Смягчение жесткого курса государства и засилье «слуг народа» привело к его медленному падению.\n\nТакое было и до Сталина, когда Большевистская партия после революции и гражданской войны представляла из себя сборище всевозможных идеологов утопизма и ревизионистов-мечтателей, которые дергали одеяло на себя и продолжали распространять гниль политического раздора, рожденную ещё в имперском Сенате.\n\nСталин сумел преодолеть сопротивление внутренних врагов нового государства и установил жёсткий курс развития СССР. Он руководствовался не абстрактными идеологиями и системами, а принципом сильного государства, в котором все граждане на всех постах работают не на себя, не ради прибыли или повышения, а ради страны и её жителей. Его организаторский гений смог насытить страну нужными кадрами, что были верны Родине и коммунизму.\n\nКульт личности Сталина не был направлен на восхваление его самого, а на воодушевление простых граждан Союза. Его лик и образ внушал ответственность и уверенность в сердца советского народа. Согласно плану по восстановлению исторической справедливости в отношение Сталина и его сподвижников, было объявлено об установке новых памятников и бюстов «Вождя Народов» на площадях, территориях заводов и административных центров. Указ о портретах был лишь первым шагом."
 russiaflavor.101.a: "На всякий случай я повешу ещё и портрет Жукова"

 russiaflavor.102.t: "Реакция реакционеров"
 russiaflavor.102.d: "После свершения нашей великой революции и возвращение России к коммунистическому началу встал вопрос об укреплении нашего правительства.\n\nНа первом заседании КомЗаВоза СССР, генеральный секретарь Клим Жуков выступил с большой речью. Он открыто объявил о признании всех руководителей Советского Союза, включая министров и председателей Центрального Комитета, после смерти Сталина - ревизионистскими и антисоветскими, а также то, что за образец для будущего устройства Советской России будет взята именно его модель государства, как самая эффективная и необходимая в данный момент истории.\n\nДанное заявление вызвало бурю эмоций среди разных политических групп, оставшихся в нашей стране. Либералы-капиталисты боятся нищеты, остатки фашистов и националистов заявляют о том, что к власти пришли русофобы и мигранты, а троцкисты и прочие «умеренные левые» пророчат возвращение ГУЛАГа и «нового 37-го». Но это не страшно, лидеров оппозиции всегда можно легко устранить. Их влияние на ум простых обывателей мало, так как их сила в эмоциях, которые легко устранить действительностью.\n\nНамного страшнее, что большая часть наших граждан не понимают всю серьёзность наших намерений и планов. Для них восстановление настоящей сталинской советской действительности просто фон, который объявили душные старики в порыве ностальгии и невозможности придумать что-то новое. Отсутствие чёткой политической линии и частые заигрывания с плюрализмом мнений медленно разрушала Союз, а затем и Федерацию. Эта политическая апатия, возникшая из-за капиталистов и ревизионистов, которые душили молодую кровь своими антигосударственными идеями, и не знание основных столпов коммунизма является главной и насущной проблемой России.\n\nПришло время пролетарию очнутся от почти векового сна и вернуть величие и стабильность своей стране Советов своими руками! У нас впереди много работы, товарищи! Необходимо вернуть Россию и её братские народы в стальной марш сталинского коммунизма!"
 russiaflavor.102.a: "Поехали!"

 russiaflavor.103.t: "Политические комиссары"
 russiaflavor.103.d: "В военной части номер 440, где проходят службу срочники-новобранцы, прибыл странный поезд с двумя пассажирскими вагонами. Из него вышла группа из 12 солдат с красными звёздами на шевронах, вооружённые автоматами, после вышла тонкая высокая фигура в длинном чёрном пальто. На перроне никто не встречал гостей, только дежурный рядовой подбежал проверить документы. Главный представился, как майор Котов, проверяющий, вместе с сопровождением.\n\nПосле, процессия двинулась в штаб части. Полковник, начальник части, получил информацию о приезде проверки от рядового со станции и уже встречал проверяющего всем офицерским составом и мобилизованным оркестром. Он был удивлён, почему его начальник, генерал Милашенко, не предупредил его за несколько недель о предстоящей проверке. Но переживать не стоило, ведь недалёкие ревизоры за 30 лет его службы крайне редко являлись чистыми на руку и охотно брали взятки.\n\nКогда проверяющий добрался до входа на территорию части, Антонов уже был готов представиться, но майор опередил его, продемонстрировав своё удостоверение:\n- Полковник Алексей Антонов? Я комиссар Котов, вы арестованы по приказу КГБ за хищение государственных средств. Мы обязаны доставить вас на допрос в ближайший отдел КГБ, а также провести расследование, так как мы недавно получили обширный донос на вас и ряд представителей высшего офицерского состава данной части: дедовщина, распространение диссидентских идей и нарушение армейской субординации, - сказал комиссар, помахав толстой папкой.\n- Да ты знаешь, кто я такой! - вспылил Антонов, - Да я таких как ты уже раз пять отсылал на нары за такие дела! Ты понятия не имеешь, с кем я имею связи, щенок краснопёрый, чтобы просто так лезть на меня вот так при параде?!\n- Генерал Милашенко арестован на прошлой неделе за коррупцию, и он выдал вас, товарищ Антонов.\nПосле этих слов полковник, разъярённый новостью, достал свой табельный пистолет, но, когда он уже нацелился на Котова, раздался хлопок. Полковник упал с пулей во лбу, а комиссар держал в руках свой верный макаров. После чего группа солдат КГБ открыла огонь по группе офицеров.\nСпустя 10 секунд плац был усеян трупами командного состава части. В живых остался только молодой капитан, что «случайно» опоздал на встречу. Комиссар Котов подошёл к нему и пожал руку."
 russiaflavor.103.a: "- Служу Советскому Союзу, товарищ комиссар!"

 russiaflavor.104.t: "Советский Марш"
 russiaflavor.104.d: "18 декабря на Красной Площади прошёл военный парад в честь дня рождения Иосифа Виссарионовича Сталина. По брусчатке главной площади Советской России прошли строем пешие расчёты, бронетанковые колонны и авиагруппы.\n\nПервыми прошли бойцы исторической части парада: участники исторических клубов и волонтёрских организаций, одетые в форму времён Великой Отечественной, вооружённые старинными винтовками Мосина, ППШ и ДП-27. Они несли знамёна фронтов, которые защищали нашу Родину 80 лет назад.\n\nДальше прошли ряды ветеранов Перовой Европейской: операторы дронов, штурмовики и ополченцы республик. На их участь выпало ощутить на себе всю масштабность и тяжесть новых правил и реалий войны. Бойцы шли в боевом обмундировании, у каждого был ряд медалей за штурм городов и отличительные заслуги.\n\nЗа ними вышло шествие героев труда и тыла. Простые рабочие, инженеры и конструктора, что ковали победу наравне с фронтовиками. Сотни знамён заводов, концернов, научно-исследовательских институтов и центров, и за каждым флагом стоят сотни и тысячи сотрудников, что трудились на благо Родины.\n\nПоследними вышли выпускники и обучающиеся военных академий. Их отличала парадная форма новейшего образца. Ушанка с классической советской кокардой, тяжёлая на вид шинель багряного цвета, украшенная золотыми пуговицами и массивными погонами и петлицами. Их строй символизировал новейшую военную историю новой Советской России.\n\nЗа солдатами выкатились строи танков и боевых машин, чья сталь закалялась во фронтовых боях. Модифицированные различными сетками и «мангалами», их формы внушали грозность и величие военной мощи России, что не угасла со времён Великой Отечественной.\n\nКолонну бронетанковых войск закрывала группа из шести прототипов новейшего танка ИС-10. Двухствольное орудие 120-мм, две установки ПВО малого радиуса действия, собственное средство РЭБ на борту и огромный отвал. Данный танк был настолько большим, что был установлен на 4 гусеничные опоры, располагавшихся по углам машины. Данный танк пока прототип, но он должен стать ответом на новые реалии войны.\n\nПарад окончился пролётом авиационных и вертолётных групп. Кульминационным же стал момент пролёта 3-ёх гигантских дирижаблей. Первый был украшен портретом Сталина, второй - Знаменем Победы, а третий - флагом СССР. "
 russiaflavor.104.a: "Советский Союз бьёт заклятых врагов..."


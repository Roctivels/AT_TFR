 SOV_march_of_justice: "Марш За Справедливость"
 SOV_march_of_justice_desc: "ЧВК "Вагнер" удалось победить подконтрольные предателем Шойгу войска и триумфально войти в сердце Родины, Москву...\n\nНо недостаточно иметь под своим контролем один крупный город, необходимо иметь тотальный контроль над всей страной, дабы восстановить справедливость внутри Родины и отомстить европейцам за унижение и подлость в адрес России. Наш Марш Справедливости ещё не окончен...\n\nОн только начинается."
 SOV_destroy_traitors: "Разгромить Паразитов"
 SOV_destroy_traitors_desc: "Несмотря на нашу победу, внутри нашей страны осталось ещё много предателей, которые за западные деньги готовы продать свою Родину. Либералы, коммунисты, нелояльные чиновники - все эти элементы потенциально опасны для нашей власти, и поэтому мы должны с ними разобраться любыми способами.\n\\nОгнём и кувалдой, но Россия будет искоренена от предательства изнутри."
 SOV_secure_government: "Защитить Государственный Аппарат"
 SOV_secure_government_desc: "Несмотря на наши победы, управлять такой огромной страной, как Россия, невозможно лишь только силой оружия. Для успеха всего нашего предприятия нужны не только верные бойцы, но и верные чиновники, которые будут способны взять работу с населением и мелкие дела в свои руки.\n\nКрепкий фронт зависит от крепкого тыла."
 SOV_solidify_wagner_reign: "Укрепить Правление Вагнера"
 SOV_solidify_wagner_reign_desc: "Теперь, когда голос предателей заглушен и госаппарат поставлен под контроль, мы можем начать новый этап: политизацию нашего дела.\n\nСуществует множество идей, как назвать нашу партию и каких идеалов она будет придерживаться. Она может иметь любую обёртку, но главное - радикальный патриотизм и беспрекословное подчинение - останутся краеугольным камнем того пути, который изберёт Пригожин.\n\nВ новой России нет места слабости и столь любимому Западом "плюрализму мнений"."
 SOV_wagnerite_corporatism: "Вагнеровская Экономика"
 SOV_wagnerite_corporatism_desc: "Российская экономика прошлого являлась рыночной с большим влиянием государства. Государственные компании, такие как "Газпром", "Роснефть" и им подобные приносили невообразимое количество денег в бюджет, за счёт продажи энергоресурсов на Запад и Восток.\n\nСейчас времена изменились, и прямое государственное управление оказалось неэффективным. Поэтому Пригожин решил принести не государство в корпорации, а корпорации в государство. Власть корпораций под контролем правильных людей сможет поднять российскую экономику с колен."
 SOV_fierce_remilitarization: "Яростная Ремилитаризация"
 SOV_fierce_remilitarization_desc: "Европа вмешалась в наш священный поход для "демилитаризации" нашей страны. Их план очевиден: разрушить экономику, разрушить армию и поработить наш народ. Мы лишь защищаемся перед лицом угрозы евроимпериализма и русофобии.\n\nПоэтому промышленность должна встать на военные рельсы: больше стали, больше свинца, больше алюминия и других ресурсов! Многомиллиардные госзаказы на танки, самолёты, вертолёты, винтовки! Правильным людям, конечно же."
 SOV_military_corporations: "Милитаризованные Корпорации"
 SOV_military_corporations_desc: "Корпорации - главная опора нашей экономики. И как всё в нашей стране, они должны быть готовы к предстоящей мести. Введение жёсткой дисциплины и беспрекословного подчинения вышестоящим лицам пойдёт на пользу корпорациям. Вся Россия должна мобилизоваться на ратные подвиги на фронте и в тылу!"
 SOV_demolish_cronyism: "Уничтожить Кумовство"
 SOV_demolish_cronyism_desc: "Практика продвижения родственников по карьерной лестнице за собой не нова для российского общества. Но практика повышения за собой сватов, братьев, племянников и прочих несёт большую неэффективность государственного управления. Из-за этого и проникли в медведевскую систему такие персонажи как Шойгу.\n\nНеобходимо жестоко карать любые проявления кумовства среди чиновников среднего звена. В новой России есть место только для эффективных...и верных."
 SOV_prigozhin_viceroys: "Новые Корпоративные Наместники"
 SOV_prigozhin_viceroys_desc: "Чиновники столетиями были объектами насмешек среди простого народа за вороватость и коррумпированность, что справедливо. Государственный аппарат даже с нашими инициативами остаётся недостаточно эффективен.\n\nПоэтому логичным было бы привнести корпоративные практики в бюрократию. Менеджеры среднего звена из близких к нам корпораций заменят впавших в немилость и неэффективных чиновников."
 SOV_enforce_class_collaboration: "Усилить Сотрудничество Классов"
 SOV_enforce_class_collaboration_desc: "Борьба сильных и слабых, богатых и бедных, рабочих и капиталистов - бред марксистских предателей, которым они заразили умы россиян. На самом деле, все мы имеем одну цель - процветание нашей Родины. И простой рабочий Иван из города Твери, и Владислав Юрьевич, владелец завода, на котором Иван работает - все они заботятся об укреплении и увеличении мощи Матушки России.\n\nПоэтому хватит бухтеть и дестабилизировать обстановку своими требованиями достойной оплаты труда и понижения рабочего дня с 14 часов до 10. Вы что, хотите проиграть ещё одну войну?"
 SOV_subsidize_populistic_welfare: "Субсидировать Популистские Соцобеспечение"
 SOV_subsidize_populistic_welfare_desc: "Люди - главный ресурс каждой страны. Без нормального социального сектора все попытки построить народную поддержку рухнут, как карточный домик от лёгкого дуновения ветра. И мы - не исключение.\n\nНо сильная социалка - очень дорогое удовольствие, а средства нам нужны, в первую очередь, на ВПК. Некоторые советники предлагают различные "социальные" инициативы: раздача денег пожилым людям; устранение безработицы путём использования в различных проектах и многое другое. Русский народ должен видеть, что государство о нём заботится."
 SOV_prigozhin_ruble: "Рубль Пригожина"
 SOV_prigozhin_ruble_desc: "Вплоть до Второй Гражданской войны в Америке, курс рубля был привязан к доллару, но вследствие хаоса, постигшего мировую экономику, было решено перейти на так называемый "нефтерубль". До поры до времени схема была прекрасна - в Аравии хаос, в Америке хаос, Россия оказывается главным экспортёром нефти, и курс осуществляется в национальной валюте.\n\nНо сейчас, когда потоки денег из-за рубежа иссякли, поддерживать рубль оказалось нечем, и мы столкнулись с той же проблемой, что и в 90-ые: гиперинфляция. Но решение найдено было быстро: вернуться к золотому стандарту! Будут выпущены новые рубли-"пригожинки", которые смогут восстановить столь необходимую экономике стабильность."
 SOV_rapid_industrial_privitization: "Стремительная Приватизация Промышленности"
 SOV_rapid_industrial_privitization_desc: "Приватизация в 90-ые оказалась крайне болезненной для российского народа. Из-за неграмотной политики государства миллионы человек разом оказались за чертой бедности. И хоть с этих событий прошло больше 30 лет, отпечаток в народной памяти остался.\n\nС другой стороны, оставшиеся государственные предприятия оказались довольно неэффективны. И из-за их неэффективности страдает не только государство, но и наши "партнёры" из числа крупных промышленников. Так что нашим людям придётся затянуть потуже пояса и принять как данное то, что мы отдаём предприятия в управление корпорациям."
 SOV_autarkic_economy: "Автаркическая Экономика"
 SOV_autarkic_economy_desc: "Одной из главных слабостей путинской и медведевской России стала слишком большая зависимость от экспорта полезных ископаемых, питавшего карманы олигархов и чинуш. Вместо того, чтобы самим производить передовые технологии, мы их закупали с Запада и с Востока, что и привело нас к поражению.\n\nТеперь мы будем надеяться только на себя, и больше ни на кого иного. Все ресурсы России будут принадлежать только ей, и больше никому иному... кроме приближённых к Пригожину, конечно."
 SOV_lords_of_war: "Повелители Войны"
 SOV_lords_of_war_desc: ""Какая разница, что думают о войне люди, сказал судья. Война есть и будет. С таким же успехом можно спросить, что люди думают о камне. Война была всегда. Она была ещё до человека, война поджидала его. Основное ремесло поджидало своего основного исполнителя."\n\nДля большинства людей война - это страх, ужас, разрушение и смерть. Но только мы, те, кто стоит над полями сражений и над заводами, производящими всё для фронта, имеем другое представление о ней. Для нас война - это величайшая игра, со ставкой, которая стоит любых жертв. Да, нас называют "торговцами смертью" и другими негативными речевыми оборотами, но всяческие философы и прочие люди пера не правы. Они не понимают, что там, за нашей границей, стоят промышленность и ресурсы Европы, так и ждущие нашего прихода.\n\nДля нас война - это бизнес. И в ближайшие годы наш бизнес будет идти хорошо."

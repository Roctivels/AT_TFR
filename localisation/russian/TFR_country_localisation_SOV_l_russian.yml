 SOV_global_propoganda_category: "Глобальная Кампания по Дезинформации"
 SOV_strangle_the_islamists_category: "Задушить Исламизм"
 SOV_fight_ldpr_category: "Борьба с ЛДПР"
 SOV_fight_liberals_category: "Борьба с Либералами"
 SOV_fight_communists_category: "Борьба с КПРФ"
 SOV_gazprom_category: "Управление Газпромом"
 SOV_prepare_the_union_state_category: "Подготовка Союзного Государства"
 SOV_prepare_the_union_state_category_desc: "§YСоюзное Государство§! - это инициатива России и Беларуси, направленная на создание более тесной политической, экономической и военной интеграции между двумя странами. Проект был создан в 1999 году после подписания Договора о создании Союзного государства России и Беларуси.\nПроект §YСоюзного Государства§! предусматривает создание единой правовой базы, проведение единой экономической политики и координацию внешних связей между Россией и Беларусью. Однако из-за различных политических и экономических проблем прогресс на пути к полной интеграции идет медленно. Время это исправить."
 SOV_the_house_of_cards: "Русский Карточный Домик"
 SOV_the_house_of_cards_desc: "\n\n\n\n\n£GFX_SOV_russian_house_of_cards_banner\n\n\n\n\n\n\n\nС момента прихода к власти §YВладимира Путина§! российская политическая сфера превратилась в многоуровневый механизм с множеством сдерживающих факторов, сделок и личных связей, который некоторые называют "башнями Кремля". Однако, несмотря на кажущееся единство фасада, в нем скрываются возможности для политических групп расширить свое влияние и лазейки для подрыва этой машины.\n§YПрезидентская администрация§!, конечно, сделает все возможное, чтобы пресечь подобные акты своеволия.\n\n\nВ настоящее время мы поддерживаем: [get_election_choice]\n\n\n\n[SOV_election_time_loc]\n\n\n\n\n\n\n--------------\nСила §6Либеральной Оппозиции§!£GFX_RF_logo: §R[?SOV_election_approval_rating_nav_var|-1%]§!\n(£GFX_pol_power [?SOV_liberal_opposition_dynamic_dynamic_var|=+2%], £GFX_war_support_texticon [?SOV_liberal_opposition_dynamic_dynamic_var|=+2%])\n"
 SOV_modernization_programme_category: "Российская Экономика"
 SOV_modernization_programme_category_desc: "\n\n\n£GFX_russian_economy_background\n\n\n\n\nРоссийская экономика представляет собой сложную систему, состоящую из множества отраслей и секторов. С начала 2000-х годов государство активно использует государственные корпорации и другие государственные механизмы для управления экономикой. В то же время частная инициатива также играет важную роль, и бизнес в целом действует свободно.\n\nХотя олигархи перестали руководить процессами в стране, они все еще имеют влияние в экономике и могут помочь нам, хотя и не без выгоды для себя. [SOV_oligarchs_gui]"
 SOV_NATO_war_category: "Война с НАТО"
 SOV_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\nВойна с Западной Европой неизбежна. Нашим целям доминирования в Европе препятствует существование НАТО.\n\nЭта война, как и все войны, §Rрано или поздно должна закончиться§!, и мы должны сделать это до того, как потерпим поражение или наш народ больше не сможет этого выносить. Генеральный штаб рекомендовал воздержаться от вторжения §Yвесной§!... Но, если это самый подходящий момент, тогда мы нанесем удар!. Для того чтобы наша победа была абсолютной, мы должны удержать §YВАРШАВУ§! §RИ§! §YБУДАПЕШТ§!. Нации, которые мы завоюем у §CНАТО§!, будут §Gинтегрированы§! в нашу нацию после нашей победы.\n\n\n§RОСНОВНЫЕ ЦЕЛИ§!:\n\n§YВАРШАВА§!: [GLOBAL.get_warsaw_status]\n§YБУДАПЕШТ§!: [GLOBAL.get_budapest_status]\n§YКИЕВ§!: [GLOBAL.get_kiev_status]\n\n§RВТОРОСТЕПЕННЫЕ ЦЕЛИ§!:\n\n§YВИЛЬНЮС§!: [GLOBAL.get_vilnius_status]\n§YБУХАРЕСТ§!: [GLOBAL.get_bucharest_status]\n§YОДЕССА§!: [GLOBAL.get_odessa_status]\n§YРИГА§!: [GLOBAL.get_riga_status]\n§YКРАКОВ§!: [GLOBAL.get_krakow_status]\n\n§GСОЮЗНЫЕ ГОРОДА§!:\n\n§YМИНСК§!: [GLOBAL.get_minsk_status]\n§YДОНЕЦК§!: [GLOBAL.get_donetsk_status]\n§YРОСТОВ§!: [GLOBAL.get_rostov_status]\n§YСЕВАСТОПОЛЬ§!: [GLOBAL.get_sevastopol_status]\n§YКАЛИНИНГРАД§!: [GLOBAL.get_kaliningrad_status]"
 SOV_politburo_category: "Верховный Совет"
 SOV_politburo_category_desc: "\n\n\n\n\n£GFX_SOV_politburo_banner\n\n\n\n\n\n\n\n§YВерховный Совет§! - высший орган государственной власти в нашей стране.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
 SOV_union_restoration_cat: "Реставрация Союза"
 SOV_Dugin_Directives_category: "Директивы Дугина"
 SOV_Dugin_Directives_category_desc: "\n\n\n\n\n£GFX_SOV_dugin_directives_banner\n\n\n\n\n\n\n\nУничтожение постмодерна в менталитете России будет нелегким делом, никто не понимает этого лучше, чем сам Дугин.\n\n Наша политика и указы направлены на попытку вернуть наш народ к корням Русского Духа и предкам Великого Тартарии-Евразии. Жить по-философски, стремясь стать Радикальным Субъектом - Богом среди Людей, Человеком среди Богов. \n\N Это на самом деле скучная часть, всё что я хочу это сжигать школьные учебники и закалывать космонавтов\n\nФанатизм: £GFX_fanaticism §Y[?SOV_fanaticism_var|1%]§!\nЭффекты:  £attack_texticon [?SOV_fanaticism_dynamic_var|=+1%] £mil_factory [?SOV_fanaticism_dynamic_var|=+1%] £GFX_mobilisation_texticon [?SOV_fanaticism_dynamic_var|=+1%] £GFX_war_support_modifiericons_texticon [?SOV_fanaticism_dynamic_var|=+1%]\n\nФанатизм олицетворяет готовность нашего народа к борьбе и поддержку нации.""
 SOV_Supreme_Veche_category: "Народное Вече"
 SOV_Supreme_Veche_category_desc: "§YНародное Вече§! является высшим политическим руководящим органом §Y[SOV.getName]§!. Многие патриотические, страстные силы сейчас называют этот дворец своим домом - от коммунистов, принявших бессмертный идеал евразийства, до представителей национал-буржуазии. Подобно советской демократии, кандидаты избираются на местном уровне на основе их обещаний и программ, однако Комитет по политическим вопросам партии "Евразия" остается единственным гегемоном, контролирующим назначение заместителей и министров, а также назначение председателя Вече."

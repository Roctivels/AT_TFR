 germany.81.t: "欧盟运动失败"
 germany.81.d: ""
 germany.81.a: "我们必须重新思考策略……"
 germany.82.t: "比利时同意加入欧盟"
 germany.82.d: ""
 germany.82.a: "好消息！"
 germany.83.t: "宣扬欧洲联邦"
 germany.83.d: "今日，注定载入史册。\n\n欧盟，这个伟大大陆国家间兄弟情谊、合作与团结的框架，终将崛起。历经数十载奋斗，这个逆历史潮流而上的联盟，终究破茧成蝶。\n\n我们不再满足于虚假联邦的现状。真正的目标已然明晰，而命运触手可及。欧盟将不再是松散的国家联盟，也不是众声喧哗的合唱团；而是一个从里斯本到里加的钢铁强国，众口同声。\n\n今日，欧盟终将蜕变为命中注定的形态。此刻，即是……"
 germany.83.a: "……欧洲世纪的序章"
 germany.84.t: "法国同意加入欧盟"
 germany.84.d: "在这一历史性时刻，法国人民选择加入欧盟。自查理曼大帝时代以来，两国人民首次同归一帜，过去九个世纪两国相争的烽烟就此消散。如此盛事，已在两国掀起欢庆浪潮。\n\n然而，此番统一绝非仅具象征意义。法国拥有欧洲最强大的军队之一，其加入将使我方军力倍增。更关键的是，法国在西非的巨大影响力将有助于我国对抗该区域的俄罗斯势力。此举无疑是对东方威胁的沉重打击，亦是我们与俄最终对决的重要一步。"
 germany.84.a: "好消息！"
 germany.85.t: "意大利同意加入欧盟"
 germany.85.d: "意大利历来疑欧情绪浓厚，我们曾担心投入资源游说其加入欧盟恐将徒劳无功，但最终这场豪赌反而大获成功。相比近期其他入盟国家，意大利公投结果更为胶着，但亲欧派仍以显著优势胜出。\n\n意大利的加盟将带来诸多战略红利：首先是更多不冻港及西西里海峡控制权，从此俄方舰船通过地中海必须缴纳合理通行费。与此同时，意大利庞大的汽车市场与多家顶尖制造商，更将巩固我们对汽车行业的垄断地位。"
 germany.85.a: "好消息！"

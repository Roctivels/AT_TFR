 GER_democratic_national_front_idea: "民主国家阵线"
 GER_democratic_national_front_idea_desc: "领导新生的社会主义德国，绝不能仅靠我们一党独断并立即宣称已完全巩固，它必须让整个工人阶级的参与其中。为此我们建立了民主民族阵线，在仍显动荡的社会环境中实现政治上的国家统一，并赋予我们的执政更广泛的合法性。以我党为领导核心，联合其他支持性政治组织与社会团体，这一制度安排必将迅速确立我党作为国家最高领导力量的法定地位。"
 GER_new_stasi_idea: "新史塔西"
 GER_new_stasi_idea_desc: "随着德国安全机构的改革完成，我们现在拥有了一支欧洲大陆无可匹敌的情报力量。这个庞大机构如同昔日东德斯塔西的延续，汇聚了忠于革命、擅长甄别与消灭革命敌人的精锐特工和专家。颇具讽刺意味的是，如今他们将运用资本主义先驱们开创的最尖端间谍技术，现代科技手段与昔日国家安全部的原则战术相结合，将使我们的情报工作达到前所未有的高度。这个“新生”的斯塔西必将令最强大的对手闻风丧胆，甚至让他们怀念20世纪那个温情脉脉的旧时代。\n\n它将成为我们无远弗届的利剑，也将是毫无弱点的坚盾。"
 GER_new_stasi_2_idea: "新史塔西"
 GER_new_stasi_2_idea_desc: "随着德国安全机构的改革完成，我们现在拥有了一支欧洲大陆无可匹敌的情报力量。这个庞大机构如同昔日东德斯塔西的延续，汇聚了忠于革命、擅长甄别与消灭革命敌人的精锐特工和专家。颇具讽刺意味的是，如今他们将运用资本主义先驱们开创的最尖端间谍技术，现代科技手段与昔日国家安全部的原则战术相结合，将使我们的情报工作达到前所未有的高度。这个“新生”的斯塔西必将令最强大的对手闻风丧胆，甚至让他们怀念20世纪那个温情脉脉的旧时代。\n\n它将成为我们无远弗届的利剑，也将是毫无弱点的坚盾。"
 GER_anti_communist_underground_2: "地下反共组织"
 GER_anti_communist_underground_2_desc: "任何革命都难免遭遇冥顽不化之徒。在德国，那些沉湎于辉煌过去的法西斯余孽，除了哀叹昔日荣光外，从未为国家人民做过半分贡献。就像一场令人作呕的打地鼠游戏，无论我们自以为清剿了多少次，他们总会阴魂不散地卷土重来。\n\n时至今日，这群自称德意志民族行动团的暴徒仍在破坏我们用鲜血换来的进步成果，以所谓正义圣战之名行恐怖统治之实。若任其猖獗，人民终将对我们失去信心。是时候彻底铲除纳粹毒瘤，永绝后患了。"
 GER_anti_communist_underground_1: "地下反共组织"
 GER_anti_communist_underground_1_desc: "任何革命都难免遭遇冥顽不化之徒。在德国，那些沉湎于辉煌过去的法西斯余孽，除了哀叹昔日荣光外，从未为国家人民做过半分贡献。就像一场令人作呕的打地鼠游戏，无论我们自以为清剿了多少次，他们总会阴魂不散地卷土重来。\n\n时至今日，这群自称德意志民族行动团的暴徒仍在破坏我们用鲜血换来的进步成果，以所谓正义圣战之名行恐怖统治之实。若任其猖獗，人民终将对我们失去信心。是时候彻底铲除纳粹毒瘤，永绝后患了。"

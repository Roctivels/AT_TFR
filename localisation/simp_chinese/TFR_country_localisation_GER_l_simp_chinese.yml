 GER_chaotic_revolution_desc: "我们在俄罗斯手中的败北来得突然而混乱，而人民夺取政权则更加仓促。由于缺乏可借鉴的治理先例，我们不得不仓促组建新领导层，以确保革命成果在未来数年得以存续。在此过渡期结束前，动荡的影响将持续显现，国家将处于虚弱状态。"

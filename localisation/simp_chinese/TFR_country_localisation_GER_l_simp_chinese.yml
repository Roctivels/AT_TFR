 GER_sepratism_dynamic: "欧洲分离主义"
 GER_into_post_capitalism_dynamic: "进入后资本主义时代"
 GER_into_post_capitalism_dynamic_desc: "革命已成功实现了推翻资产阶级资本主义直接威胁的初步目标，而今我们将继续推进，带领德国真正迈入后资本主义发展阶段。过往的社会主义革命往往存在资本主义残余在社会中挥之不去的弊病，而我们正以雷霆之势肃清这些残余。私营企业、投机行为、可鄙的利润动机、“自由”市场，这些隐蔽却顽固的资本主义元素，正在我们重塑国民经济的坚定努力中日渐消亡。用不了多久，人们对资本主义的体验终将成为日渐淡远的记忆。"

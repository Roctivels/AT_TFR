 GER_NATO_war_category: "欧陆战争"
 GER_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\n你知道的，俄国人正在入侵。\n\n§R首要目标§!：\n\n§Y塞瓦斯托波尔§!：[GLOBAL.get_sevastopol_nato_status]\n§Y明斯克§!：[GLOBAL.get_minsk_nato_status]\n§Y圣彼得堡§!：[GLOBAL.get_petersburg_nato_status]\n§Y罗斯托夫§!：[GLOBAL.get_rostov_nato_status]\n\n§R次要目标§!\n\n§Y加里宁格勒§!：[GLOBAL.get_kaliningrad_nato_status]\n§Y别尔哥罗德§!：[GLOBAL.get_belgorod_nato_status]\n§Y伏尔加格勒§!：[GLOBAL.get_volgograd_nato_status]\n§Y诺夫哥罗德§!：[GLOBAL.get_novgorod_nato_status]\n§Y顿涅茨克§!：[GLOBAL.get_donetsk_nato_status]\n§Y卢甘斯克§!：[GLOBAL.get_luhansk_nato_status]\n\n§G盟军城市§!\n\n§Y基辅§!：[GLOBAL.get_kiev_nato_status]\n§Y敖德萨§!：[GLOBAL.get_odessa_nato_status]\n§Y塔林§!：[GLOBAL.get_tallinn_nato_status]\n§Y维尔纽斯§!：[GLOBAL.get_vilnius_nato_status]\n§Y华沙§!：[GLOBAL.get_warsaw_nato_status]\n§Y布达佩斯§!：[GLOBAL.get_budapest_nato_status]\n§Y布加勒斯特§!：[GLOBAL.get_bucharest_nato_status]"
 GER_extremism_category: "联邦宪法保卫局"
 GER_extremism_category_desc: "德国历史充斥着恐怖、血腥和镇压的污点。绝不可再现历史。联邦德国的民主光辉，会照退曾席卷欧洲的纳粹种族灭绝，且绝不让分裂祖国长达四十年的共产警察国家再现。但仍有许多人无视它们对德国人民犯下的恐怖血腥罪行，意图再施恶行。联邦宪法保卫局因此诞生，不惜一切代价阻止极端主义、种族主义和极权主义死灰复燃。如果有这些人夺权的风险，就必予§R武力手段§!阻止。\n\n§C右翼极端主义§!影响：§Y[?GER_right_extremism_var|%2]§!\n\n§O左翼极端主义§!影响：§Y[?GER_left_extremism_var|%2]§!"
 european_union_category: "欧洲联盟"
 european_union_category_desc: "\n\n\n\n\n£GFX_GER_eu_federalization_banner\n\n\n\n\n\n\n\n欧洲联盟是世界上最大的国际组织之一，它团结了欧洲大陆大部分国家的力量，促进了信息、工人和商品在整个欧洲的自由流通。\n\n当前$GER_federalization_progress_name$为§Y[?GER.eu_fed_var|1%]§!（£civ_factory_output [?GER.eu_fed_var_dynamic_var|=+1%]，£consumer_goods_texticon [?GER.eu_fed_var_dynamic_var|=-1%]，£GFX_coordination_texticon [?GER.eu_fed_var_dynamic_var|=+1%]，£GFX_dx [?GER.eu_fed_var_dynamic_var|=+1%]）\n\n当前£GFX_GER_euroskepticism_texticon 欧洲怀疑主义占比为§Y[?GER.eu_euroskepticism_var|1%]§!\n\n当前维谢格拉德分裂主义占比为§Y[?GER.eu_visregard_sepratism_var|1%]§!\n分裂主义影响：£pol_power [?GER.eu_visregard_sepratism_dynamic_var|=+2]"
 GER_parties_category: "德国政坛"
 GER_parties_category_desc: "\n\n\n\n\n£GFX_GER_bundestag_banner\n\n\n\n\n\n\n\n[GER.GetName]堪称全球最民主的国家之一，每一张选票都如实反映人民意志，每一次投票都在捍卫民主价值。\n\n多年来我国政坛波澜不兴，但即便最平静的海面也难抵风暴侵袭。只要我们坚守航向，必能抵御任何惊涛骇浪。\n\n在联邦议院的穹顶之下，国内外议题的辩论此起彼伏，但始终恪守着统一、正义与自由的信条。只要议会的大门依然敞开，和平的承诺就永不褪色。\n\n联邦议院总支持度：[?GER_support_bundestag_total_var|Y1%][GER_bundestag_faction_die_linke_text][GER_bundestag_faction_greens_text][GER_bundestag_faction_spd_text][GER_bundestag_faction_fdp_text][GER_bundestag_faction_cdu_text][GER_bundestag_faction_afd_text]"
 GER_turkish_gamble_category: "土耳其大博弈"
 GER_turkish_gamble_category_desc: "土耳其坐落在东西方的十字路口。它在库尔德问题上与我们有所冲突，其与俄罗斯日渐紧密的合作关系也令我们不满，但土耳其仍是北大西洋公约的盟友。博斯普鲁斯海峡的地理位置，让土耳其注定在北约黑海防御计划里发挥举足轻重、无可替代的作用。因故，保证土耳其仍处于我们的影响下至关重要。\n\n当前，我们在土耳其的影响力点数为§Y[?GER_Turkish_Influence]§!。一旦达到§G80§!点，就能§R保证§!土耳其仍站在我们这边。\n\n土耳其选举将于§Y2023年5月14日举行。§!"
 GER_war_on_authoritarianism: "全球执法行动"
 GER_war_on_authoritarianism_desc: "对俄罗斯的战争比以往任何时候都更加证明，世界正受到威权主义的威胁。欧洲是民主和自由的灯塔，我们有责任将这些美德传播给世界各地所有受压迫的人民。\n\n如果他们不愿意和平地看到光明，那么我们将不得不动用武力……"
 GER_eastern_european_development: "重建乌克兰-白俄罗斯"
 GER_eastern_european_development_desc: "尽管我们战胜了俄罗斯，但东欧大地仍遭受了严重破坏。现在是和平与重建的时刻，我们必须援助我们的新盟友，确保他们完全恢复！"
 GER_private_military_companies: "私人军事承包商"
 GER_private_military_companies_desc: "占位符"
 GER_legion_recruitment: "招募外籍人"
 GER_legion_recruitment_desc: "占位符"
 GER_new_political_sphere_category: "崭新的德国政坛"
 GER_new_political_sphere_category_desc: "\n\n\n\n\n£GFX_GER_new_political_sphere_banner\n\n\n\n\n\n\n\n我们的国家多年来饱受自由主义全球化颓废的毒害。我们为何输掉战争？因为我们的人民已经忘记国家如何伟大，那么，现在到了提醒他们的时候了。\n\n"
 GER_five_year_plan_cat: "五年计划"
 GER_five_year_plan_cat_desc: "资本主义给德国经济带来了灾难。三十多年前，资本家们对东部的人民企业进行无情的摧毁掠夺，让我们完全屈服于北约，现在他们又强迫我们与俄罗斯进行一场必败的战争，一场必定摧毁经济的战争。这个制度的失败只是时间问题。\n\n人民议院已经制定五年计划来恢复和发展德国的工业能力，否决并扭转前政权的烂摊子，让我们一并击溃法西斯主义！"
 GER_socialist_market_economics_cat: "社会主义市场经济"
 GER_socialist_market_economics_cat_desc: "资本主义给德国经济带来了灾难。三十多年前，资本家们对东部的人民企业进行无情的摧毁掠夺，让我们完全屈服于北约，现在他们又强迫我们与俄罗斯进行一场必败的战争，一场必定摧毁经济的战争。这个制度的失败只是时间问题。\n\n人民议院已经制定新的经济计划来恢复和发展德国的工业能力，否决并扭转前政权的烂摊子，让我们一并击溃法西斯主义！"
 GER_spread_the_revolution_category: "传播革命"
 GER_spread_the_revolution_category_desc: "0_o"
 GER_peoples_economy_category: "国民经济"
 GER_peoples_economy_category_desc: "长期以来，德国始终是欧洲的经济引擎，但近年来的能源动荡与日益紧张的贸易关系，已将我国推向了一个决定性的十字路口。\n\n为了引领这个时代，我们现在倚仗于两大战略经济工具：\n\n§7£GFX_GER_green_economy_points_texticon 绿色经济点\：§!\n§g通过环境改革、可再生能源的扩展、创新生态解决方案及可持续工业措施获得。\n它们反映了韧性、创新、效率与生态责任。§!\n现有§7£GFX_GER_green_economy_points_texticon 绿色经济点\：§![?GER_green_economy_points_var|+0]\n\n§3£GFX_GER_blue_economy_points_texticon 蓝色经济点\：§!\n§g通过深化德国在欧洲经济框架内的整合赢得。加强欧盟合作，稳定区域供应链，以及支持欧洲大陆的发展目标。\n它们彰显了一体化、工业能力以及社会责任。§!\n现有§3£GFX_GER_blue_economy_points_texticon 蓝色经济点\：§![?GER_blue_economy_points_var|+0]\n\n总理阁下，通过在生态复兴与欧洲协同之间寻求平衡，您有望重振繁荣，并巩固德国作为欧洲大陆主导力量的地位。"
 GER_bundeswehr_category: "联邦国防军"
 GER_bundeswehr_category_desc: "现代德国军队未曾成为过一支值得在意的力量，尤其是现在这个关头，国防军缺乏活力、新鲜血液以及资金。\n\n重振人民对联邦国防军的信心就是重振我们的民族自豪感。"
 GER_european_armed_forces_category: "欧洲武装力量"
 GER_european_armed_forces_category_desc: "要想彻底抵御俄国熊的威胁，我们必须重新审视我们的防御体系。如今这个联盟内部各自为政，各国都想在各个领域争当第一，但只有团结一致才能赢得胜利。实现军事一体化至关重要，然而这种团结绝非在布鲁塞尔发表几场演说就能达成。\n\n我们需要不断修订条约，缔结新的盟约。我们的将士们需要全新的训练体系和组织架构。更重要的是，全体民众必须坚定不移地支持这项事业。这些改革不可能一蹴而就，但却势在必行。这不仅关系着我们的未来，更决定着子孙后代的命运。唯有如此，我们珍视的自由才能得以延续。\n\n@BRS §Y多元一体§! @BRS"
 ISR_GER_solomon: "所罗门行动"
 ISR_GER_solomon_desc: "北约在中东的核心盟友以色列正遭受阿拉伯联军的攻击。对方以惯用的民族宗教矛盾与人道主义关切为幌子，企图否定以色列的生存权。我们绝不能让其得逞。\n\n北约司令部已授权，德国联邦议院也批准了包括派遣有限北约部队在内的全部必要军事支持，以确保以色列行使自卫权。\n\n我们必须向世界证明：北约有能力捍卫海外盟友。"
 GER_spartanist_cat: "民族复兴"
 GER_spartanist_cat_desc: "\n\n\n\n\n£GFX_GER_querfront_cat_banner\n\n\n\n\n\n\n\n自政治被划分为右翼和左翼以来，一直存在一种试图统一两者的运动——交叉阵线——即一种基于必要性的联盟，旨在对抗资本主义势力和外部敌人。\n\n尽管这一概念在20世纪的德国并未取得显著成功，但其他国家在融合民族主义与社会主义理念方面有过积极经验，德国可从中汲取许多教训。\n\n历史形势已迫使右翼与左翼彼此结成联盟，如今德国将选择的道路掌握在我们手中。"
 GER_lacc_cat: "重振人文精神"
 GER_lacc_cat_desc: "\n\n\n\n\n£GFX_GER_lacc_cat_pic_banner\n\n\n\n\n\n\n\n在红色警戒线上下起伏的波动中，在人类表达日益遭受压制的困境里，毫无疑问，停滞将开始成为整个社会的毒瘤。\n\n资本是寄生于有知觉生命体痛苦之上的邪神，而戴着新自由主义面具的它，如今已变得愈发肆无忌惮。\n我们的当务之急之一是治愈资本留下的精神创伤，通过精神排毒挣脱怀旧情绪的枷锁。\n\n“想象世界末日都比想象资本主义的末日更容易。”\n但我们不仅要想象资本的终结，更要亲手终结它。\n\n杀死过去，拥抱未来，摒弃停滞的根脉，接纳生长的根系。"
 GER_agenda_2040_cat: "2040年议程"
 GER_agenda_2040_cat_desc: "\n\n\n\n\n£GFX_GER_agenda_2040_cat_banner\n\n\n\n\n\n\n\n外界对我们的计划多有揣测，有的荒诞不经，有的却近乎真相。但终究是我们在执掌人类航向。\n\n《2040议程》是我们为巩固多年前获得的权力而制定的目标、理念与行动纲要。基于对世界乱局的预判，欧洲已成为我们智库的试验场，旨在为愈演愈烈的动荡打造避风港。"
 GER_gunthers_twitter_cat: "https://x.com/GunterFehlinger"
 GER_gunthers_twitter_cat_desc: "\n\n\n\n\n£GFX_GER_gunthers_twitter_cat_banner\n\n\n\n\n\n\n\n乌克兰和科索沃必须在2035年加入北约\n加拿大、英国、冰岛、挪威、阿尔巴尼亚，科索沃必须在2039年加入欧盟！\n@KOS @UKR @ARM @BOS @AUS @ISR @MOL @IRE @MLT @AZR @GEO @CYP @GER\n\n£GFX_GER_twitter_briefcase §g欧盟主席\n£GFX_GER_twitter_location 置于欧盟核保护伞之下§!    £GFX_GER_twitter_link_ti §2youtube.com/£GFX_GER_dont_at_me_blue_ti 冈瑟·费林…§!\n£GFX_GER_twitter_date §g2013年6月加入§!\n\n[GER_gunthers_twitter_following_count_text][GER_gunthers_twitter_followers_count_text]\n§g你关注的人中没有人关注§!\n\n  帖子                 回复              订阅                亮点              媒体"

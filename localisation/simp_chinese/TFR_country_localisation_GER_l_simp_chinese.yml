 germany.92.t: "欧洲共产国际宣布成立"
 germany.92.d: "欧洲上空冉冉升起一面红旗：德国宣布成立取代了北约的集体安全联盟——欧洲共产国际。为了将革命扩散到整个欧洲，德国向法国、希腊、西班牙以及其他西欧国家的社会主义者提供了援助。由于俄罗斯帝国的胜利，导致革命左派席卷整个西欧，几乎可以肯定的是，欧洲共产国际很快就会有更多国家参加，而不仅仅是德国。\n\n俄罗斯帝国谴责了这一声明，声称“愿意在必要时再次驱逐欧洲的布尔什维主义魔鬼，卫星图像显示俄罗斯在波兰占领区的军事活动有所增加。而随着德国在俄国－北约战争后继续重整军备和重建，许多人都在怀疑，这是否是在一个艰难争取和平的时代迈向战争的又一步。"
 germany.92.a: "战争再次迫近欧洲边境"
 germany.93.t: "左翼党激进分子泄露军事行动"
 germany.93.d: "对俄战争导致了许多本可避免的死亡案例，不论平民还是军人都有涉及。但俄罗斯侵犯了我国盟友的主权，我们不能坐视不管，然而一些国民却不这么想。\n\n左翼党中的激进分子已将北约部队的动向散播出去，像是这种信息无疑会被俄国佬用来对付我们。这些激进分子称这是为了和平，但他们似乎忘记了更多的人会因此而受到伤害。\n\n不管他们的动机是什么，泄露如此重要的信息已经对联邦共和国犯下了最高叛国罪。\n\n那些没有逃离这个国家的人已经被捕，在强有力的证据之下，他们只能面临终身监禁，而现在我们必须做好善后工作，重新考虑我们的战略，以赢得这场战争。"
 germany.93.a: "杂种！全都他妈是一帮杂种！"
 germany.94.t: "阿拉伯圣战者发言人警告北约军队"
 germany.94.d: "“世人啊，”发言人冷静地开口道，“你们即将见证一场史诗般的圣战。那些背信弃义的西方人一直藏匿于他们的巢穴中，暗中策划，意图消灭整个穆斯林世界。他们正在准备一场针对我们伊斯兰圣地的灭绝之战！”发言人的声音渐渐提高，变得愈发激烈。\n\n“北约……你们那些意志薄弱的士兵根本无法与圣战士匹敌。在阿富汗，他们失败了；在伊拉克，他们失败了；在索马里，他们亦告失败。而在阿拉伯，你们也将注定失败！”他拔出缴获的M4卡宾枪，高举在空中，发出了最后的警告。“真主不会让你们获胜！他已经用火焰摧毁了你们的美国傀儡，接下来也会对你们做同样的事情！他将用烈火彻底消灭你们！他将一遍又一遍地焚烧你们，直至你们只剩下阴影！真主至大！”"
 germany.94.a: "虚张声势，他们知道自己末日将近！"
 germany.95.t: "下令从沙特阿拉伯撤军"
 germany.95.d: "为打击伊斯兰圣战势力而对沙特阿拉伯展开的军事行动，其后续形势不容乐观。该地区已证明为军费与兵员的无底黑洞，无论我们投入何种新式武器、士兵、坦克或直升机，都无法扭转战局。这些圣战分子装备着缴获自我军的武器，接受着敌对国家的资助，更拥有从伊拉克、索马里、叙利亚和阿富汗积累的丰富作战经验，让我军吃尽苦头。\n\n北约部队的伤亡远超圣战组织，战争已开始拖累我国经济，民众支持率也已跌至冰点。我国正深陷21世纪最惨痛的军事灾难之一，撤军刻不容缓。"
 germany.95.a: "我们的努力失败了……"
 germany.96.t: "干涉沙特阿拉伯"
 germany.96.d: "随着圣战分子占领沙特阿拉伯，成千上万的难民逃离该国，我们终将集体达成共识，必须结束阿拉伯半岛上的恐怖主义威胁。尽管如此，已然造成了巨大的破坏。\n\n大规模屠杀、文化遗产与历史的毁灭，以及鼓励其他国家的恐怖主义行为，这些故事让我们无法袖手旁观。我们不能允许他们重建，继续成为自由世界的毒瘤。因此，已经开始准备与中东其他国家以及任何友好的反叛力量合作，进攻被恐怖分子控制的地区。阿拉伯人民将不再生活在恐惧的阴影下，我们也将向世界证明，我们对自由与民主的承诺是坚定不移的，必须传播到每一个角落。\n\n我们将站在对抗极端主义的最前线，抵御恐怖主义，并解放被压迫的人民。"
 germany.96.a: "携手打击恐怖主义"
 germany.97.t: "基辅胜利阅兵"
 germany.97.d: "一切尘埃落定。俄罗斯的豺狼虎豹们在亲历了屠戮，在见识到欧洲炽热的民主火炬后，都吓得像条落水狗一样逃跑了。而我们工作还远没有结束，这帮畜生留下的祸根还在继续侵蚀土地。\n\n不过，终归是要为胜利而庆祝的。我们已经拔除了主要威胁，赢得了这场争取欧洲大陆的自由之战。这次阅兵将彰显我们的团结，摒弃过去那些隔阂僵持，展示我们手足般共抗暴政的情谊。\n\n那些为自由牺牲的英雄，马革裹尸或已堆积成山，但我们历经万难终让他们大仇得报。让我们踏步向前吧，让全世界知晓，自成立伊始，我们便未尝一败！"
 germany.97.a: "你若不能让他们看见光，就让他们感到热。"
 germany.98.t: "全球执法行动开始"
 germany.98.d: "今天，我怀着胜利的喜悦向各位宣布，全球民主在过去几年中取得了必要的胜利，欧洲大陆已经完全抵御了本世纪初不幸事件所引发的反民主浪潮。我们都已参加过了庆典，喝过了胜利香槟，现在是时候展望未来，展望我们未来所需了。\n\n在世界各地，极权主义政权仍在用最为残暴的政策镇压人民；在叙利亚，政府使用化学武器和步枪对付非暴力抗议者。在伊朗，他们动用瓦斯和警棍，仅仅是为了对付在公共场合摘下了头罩的妇女。我们也不要忘了阿富汗，那里的激进伊斯兰分子已经偏离了他们原本的教义，正在中亚传播充满仇恨的意识形态。这些政权代表了人性最恶毒的一面。但现在，我们有机会让这些国家成为好的模范。\n\n我们不会再容忍暴君的统治。我们不会再向那些对待人民如同奴隶之徒让步。今天，所有的民主国家都将与暴君们划清界限，并在他们面前宣布：“今日即是汝等之死期”。如果他们不束手就擒，就将面对整个自由世界的力量，他们的权力王座将在人民面前被摧毁。"
 germany.98.a: "世界将摆脱威权主义！"
 germany.99.t: "前线报告：[GetDateText]"
 germany.99.d: "自：欧盟军事委员会主席，克劳迪奥·格拉齐亚诺\n\n我怀着深切的遗憾向您通报本信中即将披露的信息。在“萨拉赫”登陆点的利比亚抵抗力量出乎意料地强大且组织有序。尽管对敌方防御工事和防空系统进行了数周的空中轰炸，但第11航母编队在托布鲁克上空进行对利比亚议会的打击行动时，依然遭受了同样沉重的空中损失。因此，他们无法保护在海滩上的士兵，后者试图利用突破口发起攻势。我们的部队被击退，简而言之，几乎被全歼。该区域被认为难以维持，参谋总长一致同意放弃此地。尽管成功将滞留在“萨拉赫”点的士兵撤离，但与牺牲者和被俘者相比，营救的部队规模微不足道。\n\n“萨拉赫”登陆点战后的景象惨不忍睹，我已准备好在欧洲委员会面前承担此次灾难的全部责任。\n\n署名-"
 germany.99.a: ""
 germany.100.t: "波罗的地区出现针对俄罗斯族的歧视现象"
 germany.100.d: "波罗的三国——拉脱维亚、爱沙尼亚和立陶宛，历经俄罗斯的侵略和最近的战争，承受了沉重打击。数千名年轻人牺牲，乡村遭受蹂躏，而这些国家在物质上几乎没有任何实质性的收益。这种战后现状的失望情绪，导致国内不满的青年和退伍军人日益激进。许多人将这种不满归咎于这些国家中庞大的俄罗斯少数族裔，战后形成的许多极端民族主义团体开始骚扰这些俄罗斯裔居民。\n\n政府在很大程度上对这些行动视而不见，甚至有许多官员在言辞中含蓄地表达了赞许。爱沙尼亚一位自由派议员辩称，“俄罗斯人在爱沙尼亚所经历的任何不公，与俄罗斯帝国主义者、苏联以及普京政权对我们民族的压迫相比，根本不值一提。”一位拉脱维亚市长在得知该市发生的反俄袭击事件时表示：“我们的青年有权捍卫边界，并惩罚那些叛徒。”\n\n上周末针对俄罗斯族裔的袭击导致八人死亡，超过五十人受伤，而且问题似乎还在恶化。这些地方的俄罗斯少数族裔发言人认为，这些歧视行为毫无逻辑，与多元主义的原则背道而驰。他们指出，许多俄罗斯裔在波罗的三国军队中服役，并在许多情况下拒绝与俄军合作，证明他们和其他公民一样是忠实的公民。\n\n俄罗斯少数族裔已呼吁柏林帮助他们，并要求对波罗的各国政府施压，打压这些歧视现象，确保他们的民主权利得到保障。"
 germany.100.a: "俄罗斯人民已经受够了！命令他们停下来。"
 germany.100.b: "俄罗斯人会意识到自己的愚蠢。"
 germany.101.t: "《地狱之最》上映"
 germany.101.d: "《地狱之最》以华沙冰封街头的枪火声开场。镜头掠过一群毫无面目的苏军正冲向一排机枪阵地，被一波又一波地扫射倒下。在防线中挺立的是中尉埃里克·福斯，满脸泥污，正高声向部下下达命令。这是一次被视为不可能的死守，却被他们奇迹般地撑住了。\n\n画面转至城北平原，少校克劳斯·里特正率领残破不堪的部队穿越战火蔓延的森林，在坦克攻势中苦战。里特的士兵从断壁残垣中抵抗，兵力悬殊，绝望而顽强。镜头停留在一名几乎还是孩子的年轻士兵身上，他双手颤抖地握紧步枪，随后仅带一把刺刀冲入混战。\n\n叙事回到华沙，最后的总攻来临，防线开始崩溃。身披红装的苏军步兵宛如蒙古入侵者一般，踏过被雨水浸湿的街道，枪托砸碎窗户，逐户清剿残余德军。威廉·布兰特上尉站在指挥地堡中，倾听截获的苏军通讯。他们已被包围，前线告破。他点燃香烟，吐出烟雾，转身对士兵说：“那我们就战斗到底。”\n\n高潮场面极尽震撼。被包围的最后一个营，战至最后一人。当苏军坦克驶入，他们依旧不肯投降。一座机枪堡火力全开，直到枪管熔毁。负伤的里特与福斯重逢，倚墙而坐，手中左轮已空，扳机空响。苏军步步逼近，面目模糊、如同怪物，无情压上。德军一个接一个倒下。最后一个镜头：镜头缓缓扫过被毁的城市，雪地中的里特与福斯尸体并肩倒卧，冰冷中铁十字勋章闪着微光，画外音将最后的德军士兵加以美化："
 germany.101.a: "这些都是地狱里最优秀的人。"
 germany.102.t: "切尔克西亚防线崩溃"
 germany.102.d: ""
 germany.102.a: "我们必须准备新防线！"
 germany.103.t: "乌克兰防线崩溃"
 germany.103.d: "俄军已突破第聂伯河！抵抗敌军滩头阵地的尝试徒劳无功，新的防线计划正在制定，但基辅可能不得不放弃！"
 germany.103.a: "我们必须准备新防线！"
 germany.103.b: "末日将临……"
 germany.104.t: "德国工业遭受严重破坏"
 germany.104.d: "在罕见的空域侵犯中，俄罗斯轰炸机突破前线防空系统，深入我方领土，攻击并破坏了关键的战时生产设施！"
 germany.104.a: "空军哪去了？！"
 germany.105.t: "美国军官受命返乡"
 germany.105.d: "随着美国国内动荡与不安情绪不断加剧，美国军官被紧急召回海外驻地，剩余的也将在数日内撤离。这无疑是个糟糕的消息，也表明美国的局势比我们所知的更加严峻。\n\n当然，这意味着我们将基本上无力防守本土。欧洲将在久违的孤立中独自面对未来。有人为此消息低调欢庆，但更多人默然不语，这是一个不祥的征兆，预示着艰难的日子即将降临。"
 germany.105.a: "祈祷这个问题不要恶化吧……"
 germany.106.t: "施压维谢格拉德集团采用欧元"
 germany.106.d: "由于最近发生的事情，我们都能深刻认识到，欧盟比以往任何时候都更需要团结、更需要一个强有力的中央统一领导以保障我们联盟能够顺利稳定运作。\n\n然而，即使是现在，维谢格拉德集团仍然是我们欧洲统一化进程的顽固阻碍，匈牙利、波兰、斯洛伐克和捷克共和国至今仍然没有将欧元作为其主要货币。如今，我们将持续推进欧元顺利过渡为欧盟内所有国家的共同货币。\n\n通过发起公众运动，以及资助那些支持欧洲一体化的政治团体，我们可以逐步地、坚定地向这些国家施加压力，让他们采用我们的货币作为国家主要货币。"
 germany.106.a: "我们拥有着共同的价值观"
 germany.107.t: "维谢格拉德集团解散"
 germany.107.d: "长久以来，维谢格拉德集团一直是欧洲联盟的一大障碍，如今他们终于看到了欧盟所能带来的益处，正式解散政治联盟并致力于欧洲项目。岁月推移间，欧洲联邦化的理想正逐渐成真。"
 germany.107.a: "好极了！"
 germany.108.t: "维谢格拉德集团依旧负隅顽抗"
 germany.108.d: "维谢格拉德集团坚决反对欧洲联盟的联邦化企图，将主权置于其他一切之上。这份由四国集团领导人签署的声明对欧洲一体化的雄心造成了重大打击，从联邦化到加强欧洲统一防御的努力，都因他们坚持主权的立场而受阻。"
 germany.108.a: "对联盟的打击…"
 germany.109.t: "洪灾重建工作终于完成"
 germany.109.d: "政府已启动项目，为莱茵河沿岸受2021年洪灾影响的地区提供救援。这次洪水比近年来更为严重，导致恢复工作进展缓慢，但联邦议院终于拨款并扩展救援措施，宣布该地区已进入恢复阶段。然而，这并非复苏的终点，联邦议院已宣布计划改革全国洪水应对措施，重点是在城市中增加绿化面积，以便在暴雨期间吸收更多水分。这个被称为“海绵城市”的计划将彻底改变现有的城市规划风格，通过增加树木、覆盖土壤和公共公园，并重新设计从混凝土到排水系统的一切。德国决心确保此类洪灾不再对莱茵河造成如此严重的破坏。"
 germany.109.a: "哈？海绵城市？"
 germany.110.t: "德国工业迁往东英吉利"
 germany.110.d: "随着俄军推进，必须将重要产业撤离至安全地区。不列颠群岛为我们的工业提供了一个避风港，使其能继续为战争贡献力量。将我们最重要的东部产业转移至东盎格利亚可能不受待见，但总好过拱手让敌人白白获得！"
 germany.110.a: "绝望情绪正呼唤实际行动！"
 germany.111.t: "波兰军队在奥得河法兰克福集结"
 germany.111.d: "尽管波兰已沦陷，但他们的残部在奥得河畔的法兰克福重组，主动向德国最高指挥部效忠。我们欣然接受，虽华沙已陷，波兰的灵魂尚未泯灭！"
 germany.111.a: "前方即是命运！"
 germany.112.t: "要求俄罗斯支付战争赔款"
 germany.112.d: "这场战争是俄罗斯一手挑起的，除了对土地的贪婪和对影响力的渴望外别无其他。成千上万，或许至少数百万人死于贪婪之手。侵略者必须为这些逝去的生命付出代价，就像我们曾经不止一次被迫付出代价一样。一些批评者认为，追讨战争赔款会引发类似魏玛共和国时期的定时炸弹，但支付了两次战争赔款的我们现在不也一切安好吗？我们需要这笔钱来重建家园。"
 germany.112.a: "他们会为这场毁灭性的冲突付出代价！"
 germany.113.t: "俄罗斯同意支付赔款"
 germany.113.d: "尽管我们做了最坏的打算，但俄罗斯还是接受了赔款支付，没有提出任何真正的抗议，甚至没有要求重新谈判。他们的外交官当然不乐意签署放弃经济资产的协议，但谁会乐意呢？希望这表明俄罗斯愿意建立一种合作关系。"
 germany.113.a: "好极了！"
 germany.114.t: "俄罗斯拒绝支付赔偿！"
 germany.114.d: "俄罗斯驱逐了我们的代表团，退出了赔款谈判。也许是我们逼得太紧了？又或者，他们本就从未打算支付过！但无论如何，我们从俄罗斯人那里是什么也得不到了。"
 germany.114.a: "去他妈的！"
 germany.115.t: "全国暴乱"
 germany.115.d: ""
 germany.115.a: "我们自找的……"
 germany.116.t: "石油短缺缓解"
 germany.116.d: ""
 germany.116.a: "情况在好转？"
 germany.117.t: "阿拉伯共和国寻求与北约靠拢"
 germany.117.d: ""
 germany.117.a: "我们在风暴中同舟共济！"
 germany.118.t: "俄罗斯入侵高加索"
 germany.118.d: ""
 germany.118.a: "战争一触即发……"
 germany.119.t: "北约就俄罗斯入侵召开会议"
 germany.119.d: ""
 germany.119.a: "他们让战争重临，但我们将坚守欧洲！"
 germany.120.t: "波兰-白俄罗斯边境危机"
 germany.120.d: "波罗的三国——拉脱维亚、爱沙尼亚和立陶宛，历经俄罗斯的侵略和最近的战争，承受了沉重打击。数千名年轻人牺牲，乡村遭受蹂躏，而这些国家在物质上几乎没有任何实质性的收益。这种战后现状的失望情绪，导致国内不满的青年和退伍军人日益激进。许多人将这种不满归咎于这些国家中庞大的俄罗斯少数族裔，战后形成的许多极端民族主义团体开始骚扰这些俄罗斯裔居民。\n\n政府在很大程度上对这些行动视而不见，甚至有许多官员在言辞中含蓄地表达了赞许。爱沙尼亚一位自由派议员辩称，“俄罗斯人在爱沙尼亚所经历的任何不公，与俄罗斯帝国主义者、苏联以及普京政权对我们民族的压迫相比，根本不值一提。”一位拉脱维亚市长在得知该市发生的反俄袭击事件时表示：“我们的青年有权捍卫边界，并惩罚那些叛徒。”\n\n上周末针对俄罗斯族裔的袭击导致八人死亡，超过五十人受伤，而且问题似乎还在恶化。这些地方的俄罗斯少数族裔发言人认为，这些歧视行为毫无逻辑，与多元主义的原则背道而驰。他们指出，许多俄罗斯裔在波罗的三国军队中服役，并在许多情况下拒绝与俄军合作，证明他们和其他公民一样是忠实的公民。\n\n俄罗斯少数族裔已呼吁柏林帮助他们，并要求对波罗的各国政府施压，打压这些歧视现象，确保他们的民主权利得到保障。"
 germany.120.a: "立即与俄白方面谈判"
 germany.120.b: "我们不能容忍这种恐怖主义行为！"
 germany.121.t: "欧盟就边境危机协商"
 germany.121.d: ""
 germany.121.a: "太棒了！"
 germany.122.t: "欧盟拒绝协商"
 germany.122.d: ""
 germany.122.a: "我们得继续……"
 germany.123.t: "在荷兰征召外籍军团"
 germany.123.d: ""
 germany.123.a: "举办一场相对妥协的适中规模征募活动"
 germany.123.b: "支持军团举办一场大型规模征募活动。"
 germany.123.c: "允许国防军最高统帅部招募少量的专家和辅助人员。"
 germany.124.t: "在比利时征召外籍军团"
 germany.124.d: "比利时是一个由法语区和荷语区组成的国家，拥有大量技术工人、职业军人和热心的志愿者。这里是为军队和外籍军团招募人力的理想之地。但我们究竟应将这一权利授予谁？"
 germany.124.a: "举办一场相对妥协的适中规模征募活动"
 germany.124.b: "支持军团举办一场大型规模征募活动。"
 germany.124.c: "允许国防军最高统帅部招募少量的专家和辅助人员。"
 germany.130.t: "库尔德工人党在土耳其东部起义"
 germany.130.d: ""
 germany.130.a: "有用的白痴，能助我们一臂之力"
 germany.131.t: "红红绿灯联盟成立"
 germany.131.d: "社会民主党左派、环保主义的绿党和极左的左翼党于周一宣布成立红红绿灯联盟，德国的政治格局因此发生了翻天覆地的变化。民意调查显示，鉴于温和派未能赢得北约战争，再加上北约战败造成的经济灾难，德国的总体情绪出现了压倒性的左倾，德国的未来看起来像是一片深红色的阴影。\n\n联盟成立的声明遭到了政治建制派压倒性的负面反应。而社民党中间派、基民盟和选择党政客们选择加倍兑现：振兴德国、引导德国摆脱“马克思主义独裁”的承诺，德国的未来仍不明朗。"
 germany.131.a: "有趣。"
 germany.132.t: "抗议席卷德国大学"
 germany.132.d: "身处战后德国的乱局中，那些大学生的处境尤为紧张。他们中的许多人应召参加北约战争，却只留得个一败涂地一贫如洗的结局，民众的悲苦情绪日益积攒。激进化的德国学生俨然成为极左翼活动的中心，左翼党组织的相关抗议活动此起彼伏于全国各地。许多学生要求进行彻底改革，包括大规模革新国家福利制度，为公众利益将大企业国有化，以及重调更符合工人阶级利益的经济政策，而不是将国家变卖给那些俄罗斯寡头。尽管这些大多是和平抗议，但也显示社会处于危险的两极分化边界。"
 germany.132.a: "革命正在蠢动。"
 germany.133.t: "攻入国会大厦"
 germany.133.d: "德国的革命狂热在今日到达顶峰，左翼势力已经占领国会大厦并宣布成立新德意志共和国。战后几个月以来的经济自由落体，数百万人失业的严重社会问题，以及对无能政府的愤怒，最终让左翼党准军事力量接管了政府统治。\n\n中欧时间上午十点，革命者在几乎没有遭遇阻力的情况下对如柏林火车总站、联邦议院以及总理府等首都重要建筑进行了围攻，总理的位置目前还不得而知。\n\n不久后，军方便出现逃兵宣布投靠准军事力量，一场全面起义在几个师宣布效忠于柏林革命力量后爆发。德国陷入了混乱，而由左翼党、绿党和社会民主党组成的新临时政府向人们承诺恢复秩序并解决当前的紧急局势。"
 germany.133.a: "革命爆发在欧洲腹地"
 germany.134.t: "工会罢工"
 germany.134.d: "就在政府宣布紧缩措施之后，德国工会联合会宣布进行总罢工以试图扭转紧缩措施。静坐罢工使经济陷入瘫痪，导致罢工工会成员和警察之间的暴力冲突加剧了德国国内现有的紧张局势。专家们纷纷跳出来，指责警方过度残暴，并为一个“执政就为了伤害工人阶级”的政权辩护，而反对者则谴责罢工破坏了本就已经岌岌可危的经济形势。"
 germany.134.a: "你可否听到那人民的呼喊？"
 germany.135.t: "政府颁布紧缩措施"
 germany.135.d: "为了应对欧元崩溃和法兰克福股市崩盘，联邦议会通过了一项紧急预算改革。改革主张削减福利，提高退休年龄，并还可能将一些行业私有化。随着欧元的汇率跌跌不休，紧缩措施的倡导者表示，如果想要确保货币稳定，避免在经济衰退时发生恶性通货膨胀，那么紧缩措施就是完全必要的。尽管如此，这些举措仍然十分不受欢迎，随着抗议者再次走上街头与警察对峙，法兰克福、柏林和科隆等主要城市均爆发了大规模骚乱。混乱逐渐蔓延至全国，德国的国内局势似乎越来越动荡。"
 germany.135.a: "或许抗议者们应该学学经济。"
 germany.136.t: "军队内部对共产主义的同情"
 germany.136.d: "北约近期对俄罗斯的溃败对于欧洲来说是一场绝对的灾难，德国社会各阶层都深深地感受到了这次失败所造成的沉重打击——特别是对于那些应征入伍的年轻人。这些年轻人大多来自贫困家庭，父母因为没有足够的钱把孩子送到国外躲避征兵而不得不目送他们的孩子上战场。这些士兵对统治阶级的怨恨很深。\n\n随着俄罗斯民族主义者对东欧的统治权的宣称，其意识形态将导致我们的人民向任何反对其意识形态的东西敞开心扉也就不足为奇了。在我们的军队中，这种对于共产主义的同情乃至认同与日俱增。\n\n我们的士兵，曾在前线遭受苦难与折磨，如今的背叛让他们感到深深的沮丧；而结合他们在经济上的窘迫和军队中左翼思潮的崛起，他们一直公开讨论我们国家应该采取的路线也就不足为奇了。\n\n与战前相比，我们的军队已经大幅扩张。对共产主义思想的同情或许将发展成某种更庞大的东西，并随之而来的是这种东西所造成的后果——这似乎是一个时间问题。"
 germany.136.a: "军队中燃起的星星之火"
 germany.137.t: "重建利比亚政府"
 germany.137.d: "经过漫长而艰辛的重建期，位于的黎波里的北约委员会终于为独立的利比亚政府做好了一切准备。"
 germany.137.a: "好极了"
 germany.138.t: "重建伊朗政府"
 germany.138.d: "经过漫长而艰辛的重建期，位于德黑兰的北约委员会终于为独立的伊朗政府做好了一切准备。"
 germany.138.a: "好极了"
 germany.139.t: "重建埃及政府"
 germany.139.d: "经过漫长而艰辛的重建期，位于开罗的北约委员会终于为独立的埃及政府做好了一切准备。"
 germany.139.a: "好极了"
 germany.140.t: "设立政府"
 germany.140.d: "新自由主义者与伪保守派被逐下权力的宝座，他们曾不配肩负起民族的未来。而今，我们的国家却因此留下了一道创痛，一道因经验匮乏而显得深刻的伤痕。太久以来，那些才智卓越、意志坚定之人被囚禁，无法展现他们真正的天赋，甚至因为他们对人民的挚爱而饱受惩罚。\n\n然而，今日，这一切都将改变。那些曾在现代腐朽巨兽面前不屈抗争的勇士们，终于迎来了赦免。当资本的铁靴踩压在他们的脖颈之上时，他们敢于怒吼；当德意志人民渴求声音时，他们毅然挺身。而现在，他们的声音，终于可以响彻苍穹。\n\n永远不要再让那些满怀自我憎恨的人占据我们的政府；永远不要再让他们将混乱的阴影投射于我们的国家；永远不要再让他们玷污我们流淌的血脉。\n\n虽然新自由主义的残毒犹难彻底根除，我们依旧面临漫长的征途，但只要我们团结一致，必将迎来一个再度强盛、屹立于世的德意志。"
 germany.140.a: "愿过去的错误不会重演"
 germany.141.t: "米夏埃尔行动失败"
 germany.141.d: "尽管我军英勇士兵竭尽全力，我们未能在参谋部规定的时间内实现“米夏埃尔行动”的目标。苏联军队在维斯瓦河的顽强抵抗，以及加里宁格勒的防御战，使我军陷入泥潭，无法进一步推进。\n\n在欧洲发生的异常毒气袭击为我们提供了短暂的优势，但我们必须找到类似的机会，并毫不留情地加以利用。此次行动虽告失败，但这并不意味着整场战争已失去希望。我们将重整旗鼓，夺回胜利！"
 germany.141.a: "仗还没打输呢！"
 germany.142.t: "米夏埃尔行动成功"
 germany.142.d: ""
 germany.142.a: "我们必须利用这一成功！"
 germany.143.t: "德国要求我们臣服"
 germany.143.d: "德国政府认定我们对于他们的“钢铁盟约”来说过于重要，无法置之不理。这些该死的德国人甚至连一个世纪都无法让欧洲平静，虽说他们过去尚且放过了我们。现在我们面临艰难的选择——是屈服，还是冒着激怒德国的风险，面临可能的禁运甚至入侵。"
 germany.143.a: "我们别无选择"
 germany.143.b: "去你妈的。"
 germany.144.t: "瑞典负隅顽抗"
 germany.144.d: ""
 germany.144.a: "让他们的人民做决定！"
 germany.145.t: "瑞典加入钢铁盟约"
 germany.145.d: ""
 germany.145.a: "我们在风暴中同舟共济！"
 germany.146.t: "民族改革运动暴乱"
 germany.146.d: ""
 germany.146.a: "该死"
 germany.147.t: "挪威负隅顽抗"
 germany.147.d: ""
 germany.147.a: "让他们的人民做决定！"
 germany.148.t: "挪威加入钢铁盟约"
 germany.148.d: ""
 germany.148.a: "我们在风暴中同舟共济！"
 germany.149.t: "民族改革运动暴乱"
 germany.149.d: ""
 germany.149.a: "狗——屎——"
 germany.150.t: "德国迁都"
 germany.150.d: "鉴于我们在东方手中遭遇耻辱性的失败，柏林临近奥得河的地理位置无疑是其中一大原因，现在是重新评估我们政府所在地的时候了。随着波兰边界的重划，我们的首都离敌人越来越近。波罗的海的主导权如今也受到挑战，这带来了来自梅克伦堡的两栖进攻威胁。批评者指出，柏林已不再适合作为首都，在战争爆发时极易陷落。\n\n备选方案之一是科隆，这座城市人口排名第四，位于曾为西德首都长达四十年的波恩以南。科隆大部分位于莱茵河西岸，因此在地理上具有天然防御优势。另一选择是法兰克福，这座城市是整个欧洲大陆的金融中心，拥有欧洲与德国央行总部，两者共计掌握约五千吨黄金储备，估值在五千亿美元左右。法兰克福也是众多企业的所在地，游说团体正以此为理由推动迁都。\n\n接着是汉堡。尽管其地位略显危险，但它是德国第二大城市，人口达两百万，邻近主要海军基地，位于基尔运河南岸，俄军若要登陆并非易事。最后是慕尼黑。战争后巴伐利亚的地方主义情绪高涨，按目前趋势只会愈演愈烈。若将首都迁至慕尼黑，无疑将重创该运动，有望稳定南方，这是一笔相当不错的交易。无论最终做出何种决定，让我们祈祷俄军永不再踏上德国的土地。"
 germany.150.a: "科隆是个绝好的选择"
 germany.150.b: "法兰克福更有战略地位"
 germany.150.c: "慕尼黑易守难攻，是为上佳"
 germany.150.e: "首都应当留在柏林！"
 germany.151.t: "最高议长向军队发表讲话"
 germany.151.d: "俄罗斯对我们美丽的欧洲大陆所作的一切，我们都历历在目，俄国熊一次又一次咬住了我们的脖子，留下了深深的创伤。\n但这一次，我们大梦已觉，胸中唯有狂怒。\n我们曾被规训，要否认我们的身份认同，我们也为此付出了战败的代价。\n而如今，正是以战火硝烟重塑自我之时。\n\n德国和全欧洲的命运都掌握在你们手中，我们绝不能失败。\n我们将不眠不休地斗争，直到“俄罗斯”这个概念从过去、现在和未来被彻彻底底的抹去。\n我们如何看待失败？\n哪怕它再可怕，你也要拼尽全力地去战胜它，除此以外别无他法。\n\n俄罗斯巨熊正虎视眈眈。\n挖出它的心脏。\n把它分食殆尽。\n让世人为之瞩目。\n\n我们的唯一命令，便是要忍耐一切。"
 germany.151.a: "为胜利不惜一切，让大地燃起烈火。"
 germany.152.t: "巴比伦柏林"
 germany.152.d: "当帝国磨刀霍霍，利齿初露之际，身为德意志的儿女，我们更当回首那贯穿血脉的祖源与魂灵的印记。自古以来，我们，德意志人，便举着死亡与至臻的旌旗前行。汪达尔人曾将“世界之都”化作废墟，普鲁士人曾令欧陆霸主蒙羞；我们，便是施本格勒预言中的民族之魂。\n\n雅利安神智学于新世纪再度苏醒，神明的愤怒与古神的低语与我们同在——若非如此，又怎能解释这根植于灵魂深处的战争渴望？沃坦，那躁动不安、全能无羁的神祇，将其狂热倾注于尘世，化为我们——这个被唤作“民族之国”的躯体。荣格所言的“神灵附体”，此刻贯穿于整个帝国的血肉之中。\n\n柏林街头，金鹰振翅游行，身披仪式长袍的男子随之而行。紫红兜袍，神秘无声；手杖高举，其上嵌有黑太阳、万字符符、奥达尔——那是德意志最古老的符印。在“世界之钟”的哈加尔之月，人民听见了命运的呼唤。"
 germany.152.a: "哇哦……"
 germany.153.t: "北德共产主义者起义"
 germany.153.d: "军队残部与共产主义同情者揭竿而起"
 germany.153.a: "出重拳！"
 germany.154.t: "第一波民间动员完成"
 germany.154.d: ""
 germany.154.a: "愿他们成为我们的骄傲"
 germany.155.t: "第二波民间动员完成"
 germany.155.d: ""
 germany.155.a: "愿他们成为我们的骄傲"
 germany.156.t: "第三波民间动员完成"
 germany.156.d: ""
 germany.156.a: "……"
 germany.157.t: "碾碎追随者"
 germany.157.d: ""
 germany.157.a: "命令警察立即镇压他们！"
 germany.157.b: "实行戒严"
 germany.158.t: "俄罗斯的战略重建"
 germany.158.d: "炸炸炸碎他们炸炸炸到啥也不剩"
 germany.158.a: "重建计划很合适！"
 germany.159.t: "德国入侵捷克共和国"
 germany.159.d: "历史仿佛重演，德军部队再度碾过捷克边境线，击溃当地边防部队及边境定居点。[GER.GetName]宣称此次全面入侵旨在推翻布拉格现政府。\n\n午夜时分，首都布拉格等主要城市空袭警报骤响，捷当局紧急呼吁居民撤离所有核心城市，而此刻德军正从各方向突进。捷克政府已宣布全面军事动员并征召预备役，入侵行动后仅数小时，逃难队伍便已达数千之众。\n\n此刻，捷克共和国的命运已完全掌握在[GER.GetName]手中。"
 germany.159.a: "嘿，我之前就看过这个了！"
 germany.160.t: "德国入侵奥地利"
 germany.160.d: ""
 germany.160.a: "德国人将挑起又一次世界大战！"
 germany.161.t: "波兰境内暴动"
 germany.161.d: ""
 germany.161.a: "这些蠢货很快将认识到自己的愚蠢……"
 germany.162.t: "布拉格暴动"
 germany.162.d: ""
 germany.162.a: "这些蠢货很快将认识到自己的愚蠢……"
 germany.163.t: "布达佩斯暴动"
 germany.163.d: ""
 germany.163.a: "这些蠢货很快将认识到自己的愚蠢……"
 germany.164.t: "新冠病例减少"
 germany.164.d: "经过几个月的努力，德国的新冠病例和因新冠住院人数大幅下降。疫苗接种运动和公共卫生措施在控制该病毒方面发挥了至关重要的作用\n\n官员们敦促继续当局保持谨慎，确保当前势头不会逆转，但就目前而言，我国向正常状态又迈进了一步。"
 germany.164.a: "好日子还在后头。"
 germany.165.t: "中国同意瓦根克内希特协议"
 germany.165.d: "莎拉·瓦根克内希特向北京提出了一项提议，这是一项雄心勃勃的计划，但今日的中国，已经不容小觑。当德国提出分裂俄罗斯的设想时，中国方面起初几乎不敢相信我们的外交官，但我们是认真的。随后，他们也开始认真对待此事。他们翻出了那尘封的旧地图——那些假如中苏开战、将由中国接管的土地，显然是在毛时代就已经拟定的蓝图。\n\n中方代表团态度积极，连主席本人都认为这一提议对中国有利。对广袤西伯利亚地区的控制，将缓解中国的城市过度拥挤问题，并在一定程度上解决淡水资源短缺的问题——因为贝加尔湖也将划归中国。双方代表握手告别，中国国内的首轮讨论也随即展开：是要直接对俄动手，还是将注意力集中在更迫近的亚洲威胁上。我们已向中方保证，粉碎这头北方的巨熊，我们绰绰有余。他们似乎对我们的自信感到满意。"
 germany.165.a: "法西斯匪徒必将被逐出地球！"
 germany.166.t: "中国拒绝瓦根克内希特协议"
 germany.166.d: "中华人民共和国感谢德意志民主共和国在“欧洲和平与社会主义发展”上的持续承诺，并表达了希望德国能“寻求洲际安全挑战的平衡解决方案”。信中未提及“俄罗斯”一词，也未明确承认任何战争计划。\n\n这封函件既没有急切也不显缓慢地抵达，没有代表团，没有电视讲话，仅是一份由北京发往柏林的简短公报，直接写给瓦根克内希特本人。内容简洁，几乎令人感到一种轻蔑。\n\n瓦根克内希特读了一遍，又一遍，然后是第三遍。她的顾问们沉默等待。\n\n他们当然会拒绝。为了遥远盟友，不值得他们拿石油、粮食和贸易冒险。那个曾以鲜血建立革命的中国，如今却以沉默守护其国内生产总值。尽管仍立着口号与雕像，她心想，如今的中国，本质上早已是资本主义国家。\n\n于是，太平洋战线不会出现。东方也不会施加压力。只有德国，孤身一人，再次直面那个曾将她埋葬的帝国。"
 germany.166.a: "该死的修正主义者！"
 germany.167.t: "卡尔斯鲁厄审判"
 germany.167.d: "当东方的庞然巨物将魔爪伸向欧洲其他地区时，我们的“代表”做了什么？\n\n他们做的不够。\n\n当法西斯主义在世界上重获立足之地时，他们做了什么？\n\n他们做的还不够。\n\n帝国主义撕裂了我们的土地，他们从不考虑我们的未来，只会无止境地剥削和压榨着我们的环境，纵容法西斯主义肆无忌惮地生长，利用经济奴隶制毁了一代又一代人。冠冕堂皇的议会堂前，他们互相指责，将责任推卸给每个人，但现在不是该做这些的时候。我们的孩子别无选择，只能献出生命，为维护一个自称为民主的可笑舞台而死，而这却只不过是为了让这群政治小丑在舞台上进行表演而作出的毫无意义的牺牲。那些呆在家里的人也同样遭受痛苦，食物减少，工资降低，我们的生活方式被可怜地扭曲成庞大战争机器下一颗颗渺小的螺丝钉。\n\n够了，我们受够了。\n\n今天，在卡尔斯鲁厄，那些不顾一切地妄图维持现状的政治家因反人类罪和破坏环境罪而遭受审判，就如他们送我们的儿女去送死一般，他们将在监狱中度过余生。\n\n想要弥补他们的错误，我们还有很长的路要走。但当下，国家正走在正确的道路上，我们将重建，我们将繁荣，我们将辉煌，我们将彻底终结全世界各地的法西斯主义。"
 germany.167.a: "镰刀已磨利"
 germany.168.t: "新德国教育"
 germany.168.d: "随着我们国家的复兴，恢复民族自豪感已成为我们义不容辞的使命。\n\n几十年来，我们被灌输对过去的忏悔之心，被迫否定自身的身份，将我们的旗帜换成一幅令人厌恶的色彩拼凑。如今，我们正迈向改变教育的正确道路。\n\n对自身及国家的骄傲本应得到鼓励。长久以来，学校传授的内容充斥着自我否定的宣传，任何损害我们民族认同的材料都将被禁。而展现我们辉煌历史、文化遗产和民族精神的教材，将重新进入课堂，为我们的后代注入对祖国的热爱与自豪。\n\n然而，一个重要的问题仍然悬而未决。我们都明白，二战时期的德国是我们历史的一部分。那段历史中，我们曾做出一些令部分人难以引以为豪的事情。对此，领导层内部的争论已久：我们是否应鼓励人们为那个时期的德国感到自豪？\n\n有些人认为，民族社会主义时期的德国与当下的德国已经截然不同，应该将自豪感主要寄托于当时的军事胜利。另一些人则主张全面拥抱民族社会主义的成就，尽管对其更为血腥的一面保持缄默。\n\n虽然这并非当务之急，但它无疑将决定我们的子孙后代如何看待我们的过去、现在与未来，最终塑造几代人的思想与认同。我们一致认同，德国的教育体系需要彻底变革，而如何引导对这段历史的认知，将对未来产生深远影响。"
 germany.168.a: "我们正在培养一代爱国者。让我们确保他们不以自己国家的历史为耻。"
 germany.168.b: "让我们确保孩子们为国家所取得的一切成就感到自豪。"
 germany.169.t: "军队担忧政府控制"
 germany.169.d: ""
 germany.169.a: "让他们不要担心，他们在军事问题上仍然保留有发言权"
 germany.169.b: "把这群傻子抽归队！"
 germany.170.t: "联邦议院担忧军队控制"
 germany.170.d: ""
 germany.170.a: "让他们不要担心，他们在国家大事上仍然保留有发言权"
 germany.170.b: "让他们排队出来挨抽！"
 germany.171.t: "前线报告：[GetDateText]"
 germany.171.d: "抵达第聂伯河"
 germany.171.a: "一雪前耻。"
 germany.172.t: "重建贵族阶级"
 germany.172.d: ""
 germany.172.a: "好极了"
 germany.173.t: "贵族大办奢华派对"
 germany.173.d: "尽管官方已经对与会人员进行筛选，但公众仍对近期于中世纪宫殿举行盛宴的报道表达了强烈不满。身披法国奢华艳服的贵族和精致菜肴，又进一步激怒了仍在对俄战争中治愈伤疤的民众。\n\n贵族们要求我们立即发表公开声明表示支持。"
 germany.173.a: "要允许贵族有代表性"
 germany.173.b: "贵族的私事与公众无关"
 germany.174.t: "德国贵族陷入贪污丑闻"
 germany.174.d: "有关陆军采购过程腐败的传言四起，摄政王承诺对此事进行公正的调查。一份初步报告已被泄露给新闻界，不仅证实了传言，而且直接牵连到几位贵族。\n\n此事使政府陷入尴尬。摄政要求采取行动，但也宣布会全力支持涉事贵族。"
 germany.174.a: "白纸黑字，无可辩驳"
 germany.174.b: "改革程序"
 germany.175.t: "记者遭到逮捕"
 germany.175.d: "一位批评贵族的著名记者最近被当局逮捕。他详细描述了贵族对决策的巨大影响力，这些决策最后往往都是对他们有益的。尤其引人注目的是有关政府资金的交易，报道称，一些资金被用于中饱私囊。摄政王已下令逮捕这些报道的作者。\n\n自由派报纸和极右翼尽管出发点不同，却同样对此大为不满。我们得在事态失控之前发表一个声明。"
 germany.175.a: "毁谤是犯罪"
 germany.175.b: "马上放了那个记者"
 germany.176.t: "贵族购买城堡"
 germany.176.d: "据报道，几位显赫的贵族购买了数座古老的中世纪城堡。他们的巨款从何而来引起了人民的广泛猜测。网络报纸披露的新证据有力地表明，摄政本人授权了他们使用政府资金购买城堡。\n\n丑闻正在发酵，我们必须尽快给公众一个交代。"
 germany.176.a: "购买建筑为政府行为，贵族只是被允许居住"
 germany.176.b: "贵族们预支了津贴以筹集钱款"
 germany.178.t: "放松私营军事公司管制"
 germany.178.d: ""
 germany.178.a: "好极了"
 germany.179.t: "改组陆军"
 germany.179.d: ""
 germany.179.a: "以皇帝之名！"
 germany.180.t: "塞尔维亚爆发共产主义叛乱"
 germany.180.d: ""
 germany.180.a: "碾碎这帮蠢货！"
 germany.181.t: "苏维埃武装在乌克兰发动起义"
 germany.181.d: ""
 germany.181.a: "碾碎这帮蠢货！"
 germany.182.t: "苏维埃起义被瓦解"
 germany.182.d: ""
 germany.182.a: "徒劳的抵抗"
 germany.183.t: "乌克兰起义"
 germany.183.d: ""
 germany.183.a: "摧毁法西斯匪徒！"
 germany.184.t: "布鲁塞尔峰会"
 germany.184.d: "北约各国在对俄战争中的溃败，让这个联盟陷入恐慌与存亡危机之中——直到俄军坦克逼近柏林-维也纳战线时，战事才告终止，此情此景谁曾料想会重演？\n\n北约军队对现代战争完全准备不足，在训练有素、装备精良的俄军面前迅速崩溃。一个巨大的幻想就此破灭。\n\n布鲁塞尔紧急峰会上的丑陋场面立即折射出联盟的分裂：欧洲领导人如惊惶孩童般散布会场，歇斯底里地指责共同失败与决策失误。\n\n这场向全欧直播的峰会，向欧洲民众解释了一个耻辱的真相：当欧盟委员会主席冯德莱恩焦灼地强调“团结”与“合作”时，恰恰暴露了二者的彻底缺失。\n\n欧洲若想从这场惨败中复苏并重振地位，就必须搁置国家利益与内斗，否则恐将面临全军覆没之命运。"
 germany.184.a: "混乱则败。欧洲唯有联合方能生存。"
 germany.185.t: "邀请加入社会主义工人社区"
 germany.185.d: ""
 germany.185.a: "我们在风暴中同舟共济！"
 germany.185.b: "不"
 germany.186.t: "组建阿拉伯军团"
 germany.186.d: ""
 germany.186.a: "好极了！"
 germany.187.t: "组建南美军团"
 germany.187.d: ""
 germany.187.a: "好极了！"
 germany.188.t: "组建非洲军团"
 germany.188.d: ""
 germany.188.a: "好极了！"
 germany.189.t: "党总部发生爆炸事件"
 germany.189.d: "凌晨3点17分，一枚爆炸装置撕裂了位于哈勒的左翼党总部。监控录像显示，一名戴兜帽的身影在午夜后悄然越过警戒线，拖着一个贴有快递标签的箱子。几分钟后，摄像头画面中断。\n\n三位同志当场身亡，另有七人受伤，其中两人伤势严重。工人集体部如今已是一片布满烟尘的废墟，混凝土焦黑，塑料熔化。应急人员为避免成为再次袭击的目标，纷纷遮住制服上的红星标志。但这并未奏效，一辆消防车在警方到达前即遭砖石袭击。\n\n中午时分，一份公告在网络上出现，落款是“德意志民族主义行动阵线”的粗制标志。他们的《反共宣言》充斥着血与土的修辞、历史怨愤与披着纳粹语言外衣的技术官僚式自由主义拼凑而成的文字。\n\n国家安全部随即公布了一批嫌疑合作者的姓名——有些确凿，有些则是有意放出的猜测。各大城市的安保力量翻倍。议事大厅中再次响起一句话：“墙里有法西斯。”对一些人而言，这不过是旧梦重演。"
 germany.189.a: "有股不祥的预感。"
 germany.190.t: "重获新生"
 germany.190.d: "联邦情报局将被重组、改造并更名。该决议在几乎没有任何宣传下通过，但无人质疑其意义。在回响不息的人民议会大厅中，那臭名昭著的国家安全部——史塔西，宣告复活。\n\n它诞于社会主义的法理与革命的必然，那熟悉的做派、精确的官腔、密布铅印的表格再度浮现。电梯门开启时，那一刻的沉默未曾改变：灰衣男子彬彬有礼地等在你家门口。关于萨克森乡村中颠覆活动的报告正被整理归档；边境日志愈加厚重；街头线人归来，这一次，他们拥有更好的手机与更坏的道德。这不再是1989年。这是[GetYear]。时代更迭，使命未改。\n\n巴尔奇同志在全体大会上说道：“一个社会主义共和国不能在蒙眼中求生。我们不是在窥视，而是在守护；我们不是在压制，而是在预防。但我们绝不会坐视反动派在暗处磨刀霍霍。”"
 germany.190.a: "捍卫脆弱的和平。"
 germany.191.t: "史塔西镇压成功"
 germany.191.d: ""
 germany.191.a: "好极了！"
 germany.192.t: "组建美洲军团"
 germany.192.d: ""
 germany.192.a: "好极了！"
 germany.193.t: "攻击乌克兰电网行动成功"
 germany.193.d: ""
 germany.193.a: "好极了！"
 germany.194.t: "攻击乌克兰电网行动失败"
 germany.194.d: ""
 germany.194.a: "小小的挫折……"
 germany.195.t: "攻击白俄罗斯电网行动成功"
 germany.195.d: ""
 germany.195.a: "好极了！"
 germany.196.t: "攻击白俄罗斯电网行动失败"
 germany.196.d: ""
 germany.196.a: "小小的挫折……"
 germany.197.t: "攻击罗马尼亚电网行动成功"
 germany.197.d: ""
 germany.197.a: "太棒了！"
 germany.198.t: "攻击罗马尼亚电网行动失败"
 germany.198.d: ""
 germany.198.a: "小小的挫折……"
 germany.199.t: "对总统的未遂刺杀"
 germany.199.d: ""
 germany.199.a: "谢天谢地，他活了下来！"
 germany.200.t: "芬兰加入北约"
 germany.200.d: "芬兰已正式加入了北约，这一历史性举措标志着其国防政策迎来了重大转折。鉴于欧洲局势日益紧张，特别是与俄罗斯共享长达1300公里的边界，芬兰总理强调，加入北约对保障国家安全至关重要。此举打破了芬兰长期以来的中立立场，令其成为北约北部防御战略中的核心力量。\n\n随着北约在该地区影响力的增强，芬兰凭借训练有素的军队和对北极作战环境的深刻认识，预计将成为北约不可或缺的宝贵资源。"
 germany.200.a: "我们在风暴中同舟共济！"
 germany.201.t: "瑞典加入北约"
 germany.201.d: "德国热烈欢迎瑞典正式加入北约，这一历史性事件不仅标志着欧洲安全格局的重大进展，也宣告了瑞典长达两个多世纪中立立场的终结。德国总理高度赞扬了这一举措，认为瑞典的加入极大地增强了北约的北部防御力量，并在外部威胁不断加剧的背景下，进一步巩固了欧洲的团结与稳定。\n\n随着瑞典正式成为北约大家庭的一员，德国期待与瑞典在波罗的地区深化军事合作，共同提升该区域的安全水平。这一决定恰逢其时，正值欧洲东部边境面临日益严峻挑战的关键时期。"
 germany.201.a: "我们在风暴中同舟共济！"
 germany.202.t: "芬兰峰会失败"
 germany.202.d: "芬兰与北约之间的谈判宣告破裂，这场备受瞩目的峰会最终未能促成芬兰加入军事联盟。尽管双方进行了长达数月的深入讨论，且欧洲的安全局势日益严峻，但芬兰政府与北约代表在核心安全议题上依然未能达成一致意见。芬兰方面对于可能丧失战略自主权表达了忧虑，而北约则期待这个北欧国家能够作出更加明确的承诺。\n\n此次峰会的失败，引发了外界对芬兰未来防御策略的广泛猜测，其加入北约的前景变得扑朔迷离。同时，这也给我们在斯堪的纳维亚半岛方军事战略带来了不小的挑战和不确定性。"
 germany.202.a: "我们应该坚持！"
 germany.203.t: "瑞典峰会失败"
 germany.203.d: "于瑞典举办的北约峰会以失败告终，瑞典加入北约的议题因而依旧悬而未决。即使历经数月的磋商及欧洲局势的紧张加剧，瑞典政府与北约代表仍未能在核心安全议题上取得一致意见。瑞典方面担忧此举可能使其战略自主权受到干扰，而北约则坚持要求瑞典做出更具实质性的军事保证。\n\n此次峰会的无果而终，引发了人们对瑞典未来防御策略的深切关注，在地区不稳定因素增多的背景下，瑞典是否会成为北约的一员变得难以预测。这迫使我们必须在日益动荡的环境中，重新审视并调整北欧及波罗的地区的防御布局。"
 germany.203.a: "我们应该坚持！"
 germany.204.t: "建立线形城市"
 germany.204.d: ""
 germany.204.a: "这是新十年中的奇迹！"
 germany.205.t: "前线报告：[GetDateText]"
 germany.205.d: "自：安德烈亚斯·马洛少将\n\n先生们，局势总的来说就是一团乱麻。昨天俄国佬突破了旧科斯琴扎内克附近的意军防线，正在我们战线后方劫掠。我还被告知，我们在南部科特布斯附近的防线已被击溃。毫无疑问，他们希望在今天结束前收上口袋。如果他们成功，我们就会被包围，分割，完蛋。"
 germany.205.a: "我们应该坚持！"
 germany.206.t: "核能弃用计划"
 germany.206.d: "随着能源危机进一步加深，德国逐步淘汰核能的决策受到越来越多的关注。该项目最初被人们视为是朝着可再生能源与环境可持续性方向迈出的大胆一步，但现在这一项目却面临着严峻的挑战，电力成本不断上涨，对进口能源的依赖日益增加，推广可再生能源的速度缓慢，这些种种都引发了公众的讨论。批评者们认为关闭核电站会使德国更加脆弱，而倡导环保者则坚持认为无核未来的长期收益将大于短期挫折。\n\n政府的处境日益岌岌可危。尽管公众仍然大力支持绿色政策，但对于能源安全与经济压力的担忧却与日俱增。来自商界与外国盟友的压力使得问题更加复杂，一些人呼吁暂时停止关闭核电站以稳定电网情况。德国现在面临着一个关键决策：是冒着能源短缺的风险继续淘汰核能，还是推迟该项目，从而在这个不确定的时期中维持国家的稳定。"
 germany.206.a: "我们必须消除这些死亡陷阱！"
 germany.207.t: "祈愿和平"
 germany.207.d: "德国出人意料地向莫斯科提出了签订独家贸易协议的外交请求。该协议旨在用德国的关键技术和机械交换俄罗斯的能源资源，有望深刻影响两国的经济格局。鉴于西方持续对俄罗斯经济施加的制裁压力，这一协议或将成为俄罗斯急需的救命稻草，能够确保德国商品和投资源源不断地流入。然而，接受这一提议也可能使俄罗斯更加依赖欧洲市场，这让克里姆林宫内主张未来战略多元化的强硬派人士深感忧虑。\n\n正值俄罗斯与西方关系紧张之时，柏林的这一友好姿态正受到各方谨慎观察。一方面，经济上的好处显而易见：与德国的合作有助于稳定关键产业，缓解当前制裁的冲击。另一方面，也有人猜测德国可能借此机会干预俄罗斯的内政和经济政策。莫斯科此刻正面临重大抉择……"
 germany.207.a: "这对我们双方都有利"
 germany.207.b: "真荒谬！"
 germany.208.t: "选择党支持马克斯·奥特担任总统"
 germany.208.d: "德国选择党已正式选定马克斯·奥特作为其总统候选人，这一举动标志着德国政治迈入了一个关键时刻。奥特是一位保守派经济学家，因过往发表过争议性言论及与争议团体的关联而备受瞩目，他长期被视为能连接主流右翼与极端右翼的桥梁人物。德国选择党选择提名奥特，意在推出一名兼具知识权威与经济专业背景的候选人，以此拓宽其影响力，超越原有的民粹主义根基。然而，奥特过去与基民盟的渊源及其在关键议题上的立场，已在党内激起争议，部分成员对其是否能真正体现德国选择党的核心价值表示质疑。\n\n此次提名在德国政坛掀起轩然大波。奥特的参选预计将进一步加剧德国的政治极端化现象，左翼和中右翼的传统政治势力均对此决定表示谴责。然而，对德国选择党而言，这是一次精心策划的冒险——一个有望让那些原本可能排斥其民粹主义言论的选民，对其运动产生新认同的契机。德国全国上下正翘首以待即将到来的总统大选，而奥特的参选或将重新塑造该国的政治未来。"
 germany.208.a: "一直如此，他们何时会败呢"
 germany.208.b: "马克斯·奥特将拯救德国！"
 germany.209.t: "2022年德国总统大选"
 germany.209.d: "2022年德国总统选举将成为该国政治的一个重要转折点，三位候选人各自怀揣着截然不同的未来愿景。现任总统弗兰克-瓦尔特·施泰因迈尔在包括社民党、基民盟和绿党在内的中左及主流政党的广泛支持下，正努力争取连任。施泰因迈尔因其稳健的领导风格和坚定维护欧洲统一的承诺而广受赞誉，他强调在面临国内外日益增多的挑战时，维护民主价值和促进共识的重要性。他的竞选活动旨在向选民传递一个信息：在这个动荡不安的时代，稳定至关重要。\n\n而他的竞争对手，则是得到德国选择党支持的颇具争议的候选人马克斯·奥特。奥特将自己塑造成一个批判当前政府的民族主义领袖人物，吸引了那些对移民政策和经济管理政策感到不满的选民。与此同时，左翼党支持的格哈德·特拉伯特医生则将关注点放在社会公正和扶贫上，致力于为德国最弱势的群体争取权益。随着选举的日益临近，德国正站在其命运的十字路口；选举结果不仅将决定下一任总统人选，还将深刻反映出德国国内在稳定、激进变革和社会公平之间日益明显的意识形态分歧。"
 germany.209.a: "弗兰克-瓦尔特·施泰因迈尔"
 germany.209.b: "马克斯·奥特"
 germany.209.c: "格哈德·特拉伯特"
 germany.210.t: "最高议长自杀"
 germany.210.d: "敌军逼近得太快，我们的领导人未能逃脱。为了避免被俘的耻辱，最高议长，他勇敢地自杀了！我们的国家一片混乱！必须赶在政府崩溃前找出新领袖！"
 germany.210.a: "我们群龙无首……"
 germany.211.t: "围攻罗伊斯堡"
 germany.211.d: "鲁斯城堡，或者应该称之为狼穴，我们已步上这座古老城墙之下，并将在一周内将其摧毁。暴君鲁斯藏身其中，四方兵锋已在外围聚集，炮火蓄势欲平此城，若有必要，将倾毁一切。然而在此之前，我们将尝试数次突袭，期以最小代价夺下这座城堡。"
 germany.211.a: "对待法西斯分子就得这样！"
 germany.212.t: "海因里希自杀"
 germany.212.d: "德皇死了！哦不，德皇万岁了！我们的君主在那群不信神的蛮子威胁他的地位时自杀了！在我们的运动碎裂成粉末之前，我们得迅速寻找一个继承人！"
 germany.212.a: "我们群龙无首……"
 germany.213.t: "海因里希被俘获"
 germany.213.d: "我们已擒获伪帝海因里希·冯·罗伊斯！君主派失去了凝聚之首，必将走向崩溃边缘！未来数日，他们或将有几分回光返照，但他们的皇帝已沦为阶下囚，不再是那统御一方的君主。他将为自己复辟帝制的妄想付出沉痛代价！"
 germany.213.a: "让这条狗继续叽叽喳喳吧，亲眼看看我们怎么捣毁他残余的帝国！"
 germany.214.t: "最高议长被俘获"
 germany.214.d: "我们出乎意料地擒获了最高议长！本以为在威胁之下他会选择自尽，然而幸运女神垂青于我们。如今，这位失魂落魄、失去武装的最高议长已在我方掌控之中，这一俘获必将击溃敌方的斗志！"
 germany.214.a: "他的“善良”要面临最终的审判了！"
 germany.215.t: "官方媒体鼓吹战争"
 germany.215.d: "“我军将士正团结东进！你可愿投身这场伟大斗争？”——扬声器里的征兵广告震耳欲聋。\n\n卡尔盯着屏幕，这已是视频中途第三条无法跳过的40秒广告。幸亏买了年度大会员，否则十分钟视频都能插播十二条广告。唉，美国崩溃后互联网平台确实大不如前了。卡尔没等视频播完便走向客厅。\n\n母亲正在厨房忙碌，妹妹则照例刷着手机。那台2020年前的老古董电视正播放空军飞行员招募广告，这种十分钟宣传片搭配五分钟广告的循环，每天要播几十遍。卡尔暗自思索着两周前是否看过一模一样的片段。\n\n懒得和母亲争论音量问题，他瘫在沙发上。妹妹贝娅塔如常刷着铺天盖地的负面新闻。第一视角作战视频、战争混剪、军方赞助的网红作品源源不断。卡尔不得不承认，那个扮演突击队萌妹的创作者确实迷人，可见宣传效果不俗。但政府为何要赞助美妆博主？他始终想不通。\n\n走到室外，点上一根烟，卡尔终于获得片刻宁静。社交媒体算法、电视、广播甚至智能家居，所有设备都在对他全天候轰炸，仿佛知道他无法豁免兵役。自愿入伍的待遇总比街头强征好得多。正思索间，他瞥见公寓楼下站着几个征兵办的人。看来，他终究没得选。"
 germany.215.a: "人人必须尽其责！"
 germany.216.t: "全德上空的EMP攻击"
 germany.216.d: ""
 germany.216.a: "天哪……"
 germany.217.t: "欧洲党确保联邦议院多数"
 germany.217.d: "曾被视为欧洲各地微不足道的党派集合，然而随着德国战争失败的消息传回国内，欧洲党声势骤然高涨，呼吁欧洲团结的示威日渐扩大。如今，该党的多数派的地位已然巩固，德国的国家形态几乎注定将让位于一个统一的欧洲。"
 germany.217.a: "欧洲的新希望……"
 germany.218.t: "认 清 你 的 敌 人"
 germany.218.d: "                                          他 们 是 杀 人 犯\n\n                                          他 们 是 窃 贼\n\n                                           他 们 是 强 奸 犯\n\n                                           他 们 是 法 西 斯\n\n                                           他 们 是 酒 鬼\n\n                                           他 们 是 俄 国 人"
 germany.218.a: "没有他们的世界即是未来。"
 germany.219.t: "洗劫卢浮宫博物馆"
 germany.219.d: "卢浮宫遭遇劫掠，数百件珍贵艺术品从展柜中消失，其中包括《拿破仑加冕礼》和《被屠宰的牛》等画作，部分竟出现在eBay和亚马逊上售卖。虽然愚蠢地将无价的赃物公开发布的窃贼已被抓获，但更狡猾的窃贼可能已带着非法所得逃之夭夭。至今，尚未发现《蒙娜丽莎》的踪迹。而令人不可思议的是，有一伙人甚至设法搬走了波尔盖塞角斗士雕像。"
 germany.219.a: "制止劫掠！"
 germany.220.t: "[GER.GetNameDefCap]希望我方加入北约"
 germany.220.d: "德国希望我们“和平地”加入他们的联盟，并绝对不会尝试侵略我们。"
 germany.220.a: "行"
 germany.221.t: "管理层更迭"
 germany.221.d: "由于我们在满足那些对本国经济至关重要的企业利益方面措施不足，欧洲及跨国公司巨头的代表团已主动接洽，提出由其代表出任政府大多数关键职位，以确保欧洲走向一个真正技术官僚化与合作共治的未来。\n\n尽管企业力量已浮出水面，首席执行官们开始直接做出政治决策，许多人仍在思考：这一切，究竟真的改变了什么吗？"
 germany.221.a: "没有精神!"
 germany.220.b: "不"
 germany.222.t: "致相关人士"
 germany.222.d: "让我继续掌权，并且将威权民主的支持率维持在35%以上，懂？\n\n署名："
 germany.222.a: ""
 germany.223.t: "缔造和平的有福了"
 germany.223.d: "圣标枪，圣风影，以及北约的网军们"
 germany.223.a: "搞什么鬼……"
 germany.224.t: "冈瑟·费林格已死"
 germany.224.d: "奥地利著名经济学家、欧盟和北约支持者、前奥地利政治家冈瑟·费林格在慕尼黑下榻的酒店附近被发现身中数刀。目前，凶手身份尚未查明，但鉴于费林格的身份以及其身上仍有钱包，动机似乎与政治有关。"
 germany.224.a: "找到罪魁祸首！"
 germany.225.t: "占据有利位置"
 germany.225.d: "我的骑士们在哪里？快来阻止那些兽人！"
 germany.225.a: "地狱"
 germany.226.t: "否决"
 germany.226.d: "这不是世界末日哟"
 germany.226.a: "诸事顺利……"
 germany.227.t: "愤怒"
 germany.227.d: "在总参谋部的又一个日子，关于防御准备的会议召开，来自莱茵金属、黑克勒-科赫等公司的主要高管们到场，联邦国防军总监察长坐镇会议。\n\n多夫穆勒将军经历了一场又一场会议，每一场会议带给他的都是同一个答案——什么都还没准备好。他刚刚从上校晋升为将军，作为联邦国防军扩军计划的一部分，但他早已后悔没有拒绝这次晋升。每次总参会议都演变成愁眉苦脸、拳头紧握，偶尔甚至还会爆发争吵，今天也不会例外——企业高管们带着报告出席，总监察长抛出问题，拳头再次紧握，多夫穆勒将军早已学会不再抱期望。他们的解释总是如出一辙，蒂森克虏伯无法跟上钢铁产量，西门子人手紧张，难以在规定时间内维护电子设备，莱茵金属声称车辆和武器的生产速度远未达到预期的标准。计划中的2025年达成准备就绪的目标在乐观情境下也被推迟到2028年，悲观情境甚至延至2032年。自晋升以来，多夫穆勒将军一直等待他的师级单位所需的重要物资，以进行演习和训练，但炮兵没有炮弹，机械化步兵无法训练，没有配备机械化设备，而他的人无法适应旧式G3步枪，因为他随时都可能获得新的G36步枪。\n\n多夫穆勒将军静静地坐在会议室中，看着高级将领们与高管们争论备战计划，他在桌下悄悄握紧拳头，隐藏愤怒，心中满是讽刺的言辞，但在多年的职业生涯中他已学会将这些压抑在心中。"
 germany.227.a: "这房间里没一个我喜欢的……"
 germany.228.t: "人生交叉路口"
 germany.228.d: "柏林一直以来都是一座风景如画的城市，吸引着无数有幸到访或定居于此的人们。迷人的历史遗迹、丰富多彩的文化机构、遍布街角的咖啡馆和餐厅，都让这座城市成为国内最受欢迎的旅游胜地之一。对于许多德国人来说，依靠这些旅游点做些小生意维持生计，虽不至于大富大贵，却也足以糊口度日。\n\n威廉便是其中之一。他是一家常有游客光顾的本地咖啡馆的年轻收银员，这里曾经尤其受到美国人和加拿大人的喜爱。然而，自从北美爆发战争后，咖啡馆的客流量便再也没有恢复到从前的水平。威廉心中充满了对自己能否保住这份工作的忧虑，甚至担心咖啡馆本身还能否继续经营下去。每天，焦虑如同潮水般涌上心头——他所熟悉的生活秩序似乎正逐渐崩塌：美国内战、全球冲突愈演愈烈、经济困境加剧、欧洲紧张局势不断升温……究竟还要多久，这一切才会将他彻底摧毁？\n\n他常常在上下班的路上思考这些问题。沿途多样的风景为他提供了无尽的思绪背景。然而，过去一周，他所经过的每条街道的景象似乎都在悄然改变。今天早晨，当他步行前往工作的路上时，注意到街道两旁已被各式各样的德国联邦国防军征兵广告所填满。无论走在哪条街上，眼前铺天盖地的广告都无法让威廉视而不见。\n\n他终于停下脚步，仔细端详着张贴在街角的一幅巨型海报。海报上是一位身材高挑、英俊威武的德国士兵，正在向观者敬礼。海报下方的文字号召公民履行对国家的公民义务，而在宣传标语下方，则是一段冗长的文字，承诺对有意参军者提供职业发展机会和丰厚的签约奖金。这些前景不禁在他心中生根发芽，诱惑着他萌生了新的念头。或许，这份工作能够成为他的救赎，为他那岌岌可危的工作带来一线生机。他想进一步考虑这个问题，但又觉得自己的忧虑或许只是徒劳。\n\n当他重新迈开步伐，目光扫过临近街道上一圈圈关门歇业的咖啡馆和商店时，心中浮现了一个简单却意义重大的结论："
 germany.228.a: "或许……这就是我的归宿。"
 germany.229.t: "东境风暴将至"
 germany.229.d: "他已经反复审核这些计划上千次，但现在每一件事都在折磨他，让他再读上一千遍。同样的信息反复出现，却没有任何新的结论。战斗计划、报纸剪报、情报报告、估算和德国军队各部门的预测让他几近疯狂。无论韦尔曼将军怎样尝试，他都无法无视每处信息中显露的确凿无疑的事实：俄国人要来了。\n\n从电视报道到他在国防部办公室获得的情报，个个都在印证这一事实。俄国人在准备些什么，他确信这一点。顿巴斯、白俄罗斯、西部的演习以及中亚的演练，都指向一个不祥的结论：俄国人即将向西进攻，而韦尔曼担心德国对此完全没有准备。无论有多少新兵入伍，或进行多少多国联合演习，他觉得这一切最终都无关紧要。所有的美国人都走了，他们在欧洲驻扎的数千名士兵和部队都被派回美国自顾不暇。这个曾经全世界最强大的超级大国已经逃离欧洲，深陷于衰亡之中。北约“东翼”这些国家能有机会抵挡俄国人吗？还是他们只能为西方争取时间？也许这些前共产主义国家会为再次与俄国人战斗而感到高兴，但他的德国同胞可能并非如此。德国能应对这个挑战吗？所有的准备和训练值得吗？德国能在这场打击中存活吗？\n\n这些问题每天都在困扰着柏林的办公室里的韦尔曼。桌上永远堆满了相同的报告，他只是静静地坐在那里，一遍遍地思考着这一可怕的发现，今天也不例外。他继续阅读早上刚送来的新报告，但结论却一如既往。这几乎是一种疯狂的表现，但他知道，和他精神状态类似的人在军队内部比比皆是；整个德国军队都对即将席卷整个欧洲大陆的威胁感到恐惧。这种他在过去一个月左右时间里形成的丧气习惯，几乎是他现在唯一有精力做的事情。\n\n放下最新的俄罗斯情报报告，他叹了口气，盯着天花板，大脑一片空白。他低声喃喃道："
 germany.229.a: "“上帝保佑德国，除此之外还能有谁呢？”"
 germany.230.t: "祖国的剑与盾"
 germany.230.d: "费舍尔少校这几个月来一直在为这一刻做准备。他不断地演练这套流程，几乎到了崩溃的边缘。所有的训练、所有的课程、所有的准备和资源调配，马上就要展示出许多人期待已久的成果。整个武装部队，甚至整个德国，近年来都被一种前所未有的恐惧所吞噬。人们担心经济、担心美国、担心欧洲，甚至担心整个世界。然而，现在他可以把恐惧抛诸脑后，因为他将充分利用他们艰苦准备的成果。他紧了紧军装，拍掉肩上的灰尘，走出他呆了一个多小时的帐篷。检阅日终于到来了。\n\n走上俯瞰大空地的讲台，他看到了等待检阅中的强大武力。数百名德国士兵整齐地排列成列，长长的豹2A6坦克和PZH2000自行火炮一字排开。他们工作、训练、流血、哭泣、流汗，花费了无数的时光，度过了多少个年月，只为即将到来的任务做好了万全准备。他们是最优秀的士兵，他们自己心里也十分清楚这一点。这些人是德国能提供的最精锐力量。费舍尔站在讲台上，沉浸在眼前令人震撼的场景中，感受到一种只有军人才能理解的自豪感。\n\n但费舍尔不仅为自己所在的军队感到自豪，他还对即将面对的敌军——俄军，感到一丝怜悯和鄙视。那些贫困的愚民怎么可能打败这样的军队？俄罗斯怎么能挑战一支完全准备好的北约部队，更别说德国军队了？俄军肯定要么是太过愚蠢，要么完全是自寻死路，或者两者兼而有之。德国在第一次世界大战中羞辱了俄军，在第二次世界大战中再次如此，而人们对于德国是否能第三次做到这一点也充满了信心。费舍尔少校、他的战友们以及整个德国，都知道他们已经为此做好了准备。\n\n现在，麦克风已打开，少校开始向他的士兵们发表讲话。\n\n“德国军队的士兵们！今天是检阅日！今天你们将向你们的战友和整个德国展示你们作为现代军队的卓越战斗力！展示你们所有训练的成果！”费舍尔以不容置疑的胜利语口吻布。\n\n场上所有的士兵，从前到后，深吸一口气，用久违的铿锵声调吼道："
 germany.230.a: "遵命，少校阁下！"
 germany.231.t: "极右翼势力支持率激增！"
 germany.231.d: "在对共产主义俄国的屈辱战败后，许多德国人丧失了对选举政治的兴趣，转而支持极右翼政党的极端理念。受资金削减影响，联邦宪法保卫局不得不更为艰难地监视着这些组织。\n\n如今，国家民主党和第三道路这两大右翼组织的标志和海报在街头愈发常见。他们的游行遍布全国，呼吁拯救并净化德国社会，摆脱他们所认为的隐性左翼主义及资本主义的颓废。"
 germany.231.a: "令人担忧……"
 germany.232.t: "为我们的未来而战"
 germany.232.d: "留给我们国家的路线越来越少，现在只剩下两条路可选：国家民主党或第三条道路。\n\n国家民主党由弗兰克·弗朗茨领导，他雄心勃勃且以自我为中心。该党与新法西斯主义、复仇主义画等号，而这正是德国人民现在所需的。国家民主党主张从过去寻求救赎。\n\n第三道路是国家民主党的一个分支，由更激进的极右翼分子领导。他们自称斯特拉瑟主义者，旨在复兴真正的德国社会主义思想，这也许正是德意志民族所需的。"
 germany.232.a: "国家民主党……"
 germany.232.b: "第三道路……"
 germany.233.t: "总统遇刺！"
 germany.233.d: "德国总统今日在柏林遭遇暗杀，这一震惊全国乃至国际社会的事件引发了广泛关注和震动。事件发生之际，北约刚刚解散，而德国境内极右翼政党的崛起也前所未有地迅猛，这一切使得人们纷纷猜测，行凶者是否与右翼极端主义团体存在关联。\n\n总统遇害时正在勃兰登堡门前发表公开演讲。一名枪手突然向人群中的总统开火，致命地击中了他。尽管安全人员迅速将枪手制服，但总统在送往医院途中因伤势过重不治身亡。总统的遇刺引发了社会的震荡与不安，德国政局也因此蒙上了一层阴影。"
 germany.233.a: "可怕！"
 germany.234.t: "土耳其人居住区发生火灾！"
 germany.234.d: "最近，我国遭遇了严重的暴力事件。夜幕降临时，数十条街道和土耳其公民拥有的建筑物被付之一炬，导致数百人受伤，至少73人丧生。此次惨剧造成的经济损失尚在评估中，但预计将相当可观。\n\n两个极右翼组织“新黎明”和“德意志秩序”已宣称对此次袭击负责。目前，警方正在对案件展开调查，但抓捕到实施者的可能性较低。官方右翼政党否认与此次袭击有任何关联，声称这种行为与他们的价值观不符。\n\n尽管此次事件造成了巨大的人员伤亡和人道悲剧，但德国社会中对土耳其移民的同情却寥寥无几。网络上的普遍情绪是“外国人滚出去！”以及“手提箱、火车站、安卡拉！”。"
 germany.234.a: "真是灾难！"
 germany.235.t: "首届社会主义大选"
 germany.235.d: "共和国的人民在投票队伍中排起长龙。红旗依旧飘扬，标语依然悬挂，但这一次，革命暂时停下了脚步……为了投票。\n\n《人民投票法》承诺将带来透明与多元。如今，左翼党将迎来首次真正的考验。即便面临政治失势的风险，现任的巴尔奇仍决定推行这一举措，以示对民主的尊重。至少，未来的政权将继续保持社会主义性质。\n\n然后是来自DPP的多萝西·马丁。她出身农民，言辞温和，却同样激进。生态、公平的乡村正义与民主社会主义，是她的纲领。这一主张在更广泛的左翼阵营中并不受欢迎，但为了维持局势平衡，最终被默许。是的，这是一场选举，但绝不会允许选出下一个法西斯。"
 germany.235.a: "民主社会主义党胜利！"
 germany.235.b: "德国社会主义工人党独领风骚！"
 germany.235.c: "德国民主农民党黑马夺魁！"
 germany.235.e: "韩炳哲的联盟获胜！"
 germany.236.t: "联邦议院辩论"
 germany.236.d: "近日，议院对民选官员的一些政策、声明展开了多轮争论、爆发了无数争议。在联邦议院这样崇高的机构里，氛围如此紧张是不受民众欢迎的，我们得立刻处理这个问题。\n\n我们既可以指责是某些人造成了这场混乱，也可以试着找到和平解决的方案来恢复秩序。"
 germany.236.a: "右派只能引入失败"
 germany.236.b: "左派酿成无数混乱"
 germany.236.c: "我们必须为团结而战"
 germany.237.t: "千年"
 germany.237.d: ""
 germany.237.a: "我们会重蹈覆辙吗？"
 germany.238.t: "我们的未来……"
 germany.238.d: "既然我们拥抱了长期以来被禁止的意识形态与哲学，亦对自由主义发动了文化战争，民族社会主义在我国的浴火重生就成了必然之事。\n在被压制数十年后，它有了再焕新生的机会，而这一次，我们明白必须避免哪些错误，明白不可低估我们的敌人，明白何为真正利害攸关之物。\n\n问题在于，我们是否要完全拥抱这个深埋已久的理想，摆脱那强加于我们的身份，不再弃德国人民于不顾，此举将向世界证明，世界上没有什么东西是会彻底消亡的，但亦会让我们变得千夫所指，成为众矢之的。\n\n我们也可以悄悄地拥抱我们内心的一部分，抛弃万字符和对希特勒的崇拜，同时却仍依照我们的意愿改造国家。一个人大可既在理想主义的烈火中锻造自我，又让他在世人眼中没那么不堪。\n\n选择权掌握在我们手中。"
 germany.238.a: "我们的改革只有一个合乎逻辑的结论。胜利万岁！"
 germany.238.b: "我们已经从往昔中获得了足够的经验。"
 germany.239.t: "纽伦堡集会"
 germany.239.d: ""
 germany.239.a: "荣耀属于伟大的党！"
 germany.240.t: "我们信仰的未来"
 germany.240.d: "德国无疑是一个基督教国家，但我们一直是基督徒民族吗？答案当然是否定的，我们的根源在奥丁和索尔，在北欧诸神的信仰。然而今日的德国，几乎没有异教徒信仰者。党卫队领袖海因里希·希姆莱曾提倡异教信仰，作为对古老日耳曼传统的复兴，这一做法延续了图勒协会等早期神秘组织，以及路登道夫将军等新异教徒的思潮。\n\n异教复兴运动虽然规模渺小，但我们当初又何尝不是从小开始？我们难道不是以复兴泛德意志帝国为目标？难道不是为了重建德意志的灵魂？复兴异教是否真的对我们有利？\n\n确实，更容易的方式是继续支持基督教，但对其与民族社会主义不相容的部分加以改革。毕竟，这是一个受到犹太人监护的宗教，而耶稣本人也是犹太人，成为基督徒几乎等同于背离民族社会主义。或许我们可以改变他的种族认定，或调整其他要素，使其符合我们的体系。同时我们也应考虑这将如何影响盟友的看法——我们几乎所有的盟友都虔信基督教，或至少在名义上如此，而推动异教复兴只会让我们在他们中间失去善意。"
 germany.240.a: "激进派的观点是对的！基督教是为弱者准备的宗教！"
 germany.240.b: "我们必须改革德国教会，使其融入我们的民族社会主义愿景中。"
 germany.241.t: "库班担忧俄罗斯入侵"
 germany.241.d: "今日，我国驻库班大使馆收到紧急会晤请求。俄罗斯武装部队一直在逐步蚕食高加索地区，威胁着该地区尤其是库班的安全。库班政府恳求我国大使提供更坚实的防务保证并对其国防能力进行投资，但这可能会让我们看起来像是侵略者。虽然库班已经获得了乌克兰的保护，且乌克兰是北约成员国，但我们也应考虑将库班纳入防御战略组成部分。"
 germany.241.a: "投资建设他们的防御。"
 germany.241.b: "巨熊早被扒光皮囊了，别杞人忧天了。"
 germany.242.t: "德国再次开放谈判"
 germany.242.d: ""
 germany.242.a: "还有和平的可能吗？"
 germany.243.t: "基辅的幽灵"
 germany.243.d: "这个引人注目的名字正在推特和其他社交媒体平台上广泛传播，指的是一名据称在俄罗斯入侵乌克兰的首日击落了6架俄罗斯战机的乌克兰米格-29飞行员。\n\n在许多关于“基辅幽灵”的帖子中，附带了看似为米格-29战机的视频片段（根据北约命名规则称其为“支点”）。然而，大多数帖子都使用了相同的短片——飞机在混凝土高楼的上空飞行，背景是一片灰色的天空。\n\n然而，目前几乎没有证据能够证明“基辅幽灵”的真实存在。许多网上的反对者指出，一个没有制空权、驾驶着性能不如敌方的战机的飞行员在一天内击落6架敌机，这种说法缺乏可信度。\n\n尽管如此，一位匿名的乌克兰人受访时表示：“重要的不是他是否存在，而是他作为传奇所传递的信息。在这样的艰难时刻，这种信息的传播，无论是真是假，都具有重要意义。”"
 germany.243.a: "极乐猎场"
 germany.244.t: "选择联盟"
 germany.244.d: "选举已经结束了，我们现在只有很短的时间来组建政府。让我们谨慎考虑所有选项，确保在联邦议院中不会沦为少数派。"
 germany.244.a: "我们不需要任何帮助！"
 germany.244.b: "德意志大联合！基民盟、社民党、自民党！"
 germany.244.c: "或许我们可以邀请选择党……"
 germany.244.h: "红绿灯联盟胜出！"
 germany.244.e: "一个不洁同盟……这绝非我们所愿，只是迫于现实的无奈之举。"
 germany.244.f: "为了安抚激进派，我们将与基民盟合作。"
 germany.244.g: "红红绿灯联盟！我们能做到！"
 germany.244.i: "基民盟、自民党与绿党组成的“牙买加联盟”！"
 germany.244.j: "保留“大联合政府”，但要把绿党也纳入进来。"
 germany.245.t: "第二次德累斯顿审判"
 germany.245.d: "德累斯顿的审判大厅曾经是联邦法庭。法官席上方的鹰徽已被砸碎，取而代之的是人民共和国的锤子与麦穗。被告席上坐着前联邦国防军将领们。近乎激进的法庭用机械般的精准宣读着每条指控：“背叛革命”、“勾结法西斯侵略者”、“策划资产阶级军事政变”。\n\n有人被宣判为“穿军装的走资派”，有人被称为“工人阶级的叛徒”，还有人直接被扣上“社会主义和平之敌”的帽子。这些连他们自己都听不懂的社会主义术语，引得许多被告低声咒骂。而更多人茫然直视前方，仿佛从漫长美梦坠入苏联式梦魇。\n\n主审法官，这位莱比锡工厂出身的工团主义者，并未也无需疾言厉色。检察官们掌控着场外游行群众的愤怒、工会的横幅、学生们的证词，还有那些在波兰战败后仍在等待儿子下落的开姆尼茨家属，结局在法槌落下前早已注定。这不是司法审判，没有辩护环节，指控层层加码。当一位将军试图以指挥链、战争迷雾和情报缺失辩解时，工作人员粗暴地切断了麦克风。\n\n最终，正义的判决是：全员死刑。"
 germany.245.a: "北约部长正叫嚣着；他们的叫嚣已不再是耳语"
 germany.246.t: "内塔尼亚胡在联邦议院的讲话"
 germany.246.d: "以色列总理本雅明·内塔尼亚胡今日抵达柏林并在联邦议院发表讲话。他首先向德国及其他北约国家致贺，赞扬盟军军队捍卫民主、将俄罗斯威胁击退回东方的英勇行动，随后指出自由的敌人仍在蠢蠢欲动，解放斗争绝不能松懈。\n\n内塔尼亚胡此次访德正值以色列为存亡与阿拉伯国家交战之际。这些国家延续着俄罗斯溃败的遗产，正对中东自由之光发动最后的围剿。\n\n他呼吁德国人民支持以色列——这个北约的长期盟友，并提及德国对犹太民族的历史责任，强调如今我们已成为以色列人民唯一的守护者。\n\n演讲在雷鸣般的掌声中结束。议会随后立即表决通过新决议：批准向以色列提供全面军事支援，助其对抗大马士革联盟。\n\n作为中东不可或缺的战略支点，以色列绝不能沦陷。"
 germany.246.a: "这是我们的历史使命……"
 germany.247.t: "俄罗斯解放军的战果"
 germany.247.d: "俄罗斯解放军的成立，半是对弗拉索夫将军的象征性致意，半是我们政府试图整合俄罗斯民族主义者的一次真切尝试。可我们低估了这个群体对苏维埃政权的复杂态度。在仓促下令组建这一协作部队前，我们几乎未曾深入研究。而现实告诉我们，当代的俄罗斯民族主义，往往与苏维民族主义，或者更准确地说，“民族共产主义”能奇妙共存。俄罗斯民族左翼的存在，诸如民族布尔什维克党，便是一面镜子。卢卡申科接过入党卡那一刻，我们大概就该意识到这一点了。\n\n我们的组织尝试最终以惨败告终。即便有些人应征入伍，他们的逃兵率也居高不下。他们配发的装备简陋不堪，被派遣至后方地区负责监管其他俄罗斯人，结果却是我们在这些区域的游击活动愈演愈烈，前所未有之严重。\n\n他们究竟是在消极怠工，还是干脆协助敌方？无论如何，这支“新俄罗斯解放军”已成彻头彻尾的失败品。苏维埃政权借此大做文章，以其低劣的装备、糟糕的形象与德军正规军之间的对比，营造俄国人遭受虐待、国家软弱无能的叙事，用以反对合作者、反对背叛。清算行动即将展开——他们将被剥夺武装，剥夺军衔，必要时，连生命也一并剥夺。"
 germany.247.a: "这件事谁该负责？！把名字报给我！！！"
 germany.248.t: "来自欧洲共产国际的邀请"
 germany.248.d: "德国向我们发出了加入“欧洲共产国际”的邀请，我们清楚德国的复仇情绪，明白接受邀请很可能将我们卷入与俄罗斯的战争。国际主义是否值得再次卷入一场欧陆战争，还是让德国独自承担后果？"
 germany.248.a: "不"
 germany.248.b: "我们一定会做到的！"
 germany.249.t: "南斯拉夫拒绝了"
 germany.249.d: "尽管南斯拉夫是一个社会主义国家，但他们拒绝了我们提出的共同面对法西斯威胁的提议，声称他们虽然支持社会主义事业，但更青睐于经济合作而不是军事合作。尽管此乃懦夫之举，但与南斯拉夫这样一个正在发展壮大的欧洲社会主义国家作战对我们没有好处。"
 germany.249.a: "哦好吧，向他们致以最诚挚的问候。"
 germany.250.t: "联邦议院年大选结果"
 germany.250.desc: "9月28日，德国开启了第21届联邦议院议员选举的第一轮投票。与此同时，汉堡也将举行州选举，这是德国关键的选举季。各政党已经提名了各自的候选人，随着票箱被填满，胜负已分。现向全世界宣告，德国的未来将交由……"
 germany.260.t: "德国提出协议"
 germany.260.d: "随着欧洲局势再度紧张，德国人向我们提出了一个奇怪的提议。他们慷慨地想要建立贸易和经济伙伴关系，这可能对加速我们的经济复苏很有价值。然而，这也有其不利之处，因为与西方的任何经济伙伴关系都可能降低我们在民众中的合法性，并激怒民族主义者。"
 germany.260.a: "为了未来的利益，我们必须接受"
 germany.260.b: "我们可不会给德国佬舔屁眼！"
 germany.261.t: "俄罗斯拒绝贸易协议"
 germany.261.d: "来自俄罗斯的不安消息，尽管我方外交人员尽了最大努力，但与俄罗斯的贸易谈判还是破裂了。俄罗斯方面错误地宣称我方谈判缺乏诚意，并且有当地的相关报道表明，俄罗斯正以惊人的速度再武装化。"
 germany.261.a: "我们必须做最坏的打算……"
 germany.262.t: "俄罗斯接受贸易协议"
 germany.262.d: "我方外交人员传来喜讯，与俄罗斯的贸易谈判取得丰硕成果，双方已签署协议。俄罗斯广阔的市场现已向我们敞开大门，两国关系长期正常化的大门也已敞开。"
 germany.262.a: "或许这将为欧洲带来和平！"
 germany.263.t: "俄罗斯拒绝要求！"
 germany.263.d: "尽管我们提出了明确的要求，但俄罗斯人拒绝遵循我们对其军队包括减少陆军和空军规模以及军费开支的要求。即使是严重后果的威胁似乎也无法让他们感到担忧。"
 germany.263.a: "给这帮狗娘养的再加点制裁！"

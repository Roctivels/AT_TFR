 GER_Hire_Aegis_Defence_Forces_desc: "后盾防务公司是一家英国的私人军事和私人安保公司，在阿富汗、阿拉伯联合酋长国、伊拉克、沙特阿拉伯、利比亚、索马里和莫桑比克均设有海外办事处。虽然与黑水集团相比，该公司的雇佣兵业务水平较低，但他们用数量弥补了质量的不足。"

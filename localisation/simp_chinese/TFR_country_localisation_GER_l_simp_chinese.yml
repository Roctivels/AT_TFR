 proxy.1.t: "阿拉伯混乱问题"
 proxy.1.d: "沙特阿拉伯地区的动乱让我们的领导层开始权衡介入该地区的可能性，但首先我们必须决定在内战中支持哪一方。\n\n最明确且最合法的选择是向利雅得政府提供支持，因为我们与穆罕默德·本·萨勒曼长期保持着联系。\n\n另一方面，我们也可以选择支持伊朗盟友，转而向他们在该国的代理人提供援助。尽管此举存在风险，但可能有利于我们未来与伊朗的外交关系。"
 proxy.1.a: "支持政府"

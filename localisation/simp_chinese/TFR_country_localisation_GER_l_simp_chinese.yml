 GER_left_acceleration_idea: "欧洲社会主义"
 GER_left_acceleration_idea_desc: "马克思始终强调，历史发展具有阶段性特征，人是特定时代经济与社会环境的产物。我们也不例外，如今正在建设的社会主义，正是符合当代欧洲时空条件的社会主义，即欧洲社会主义。时至今日，资本主义的剥削本质未曾改变，却又与新殖民主义、种族主义、生态破坏、全球资本主义霸权等新危机交织共生。我们决不能沉湎于历史荣光，而必须以昂扬斗志迎接挑战。正如资本主义不断演变，我们也必须与时俱进。否则，革命火种熄灭的速度，恐怕比全球互联网的风向转变还要迅疾。"

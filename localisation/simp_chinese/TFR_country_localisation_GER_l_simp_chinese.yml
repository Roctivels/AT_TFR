 germany.264.t: "绅士对决"
 germany.264.d: "雨水顺着废墟的断壁流下，在炮火摧残的街道上汇成浑浊的小溪。亚历山大·彼得罗夫蹲在一堵倒塌的墙后，他的步枪已经射出了最后一颗子弹。在街道对面，一个德国士兵躲在一辆被炸毁的装甲车后面，他们都知道对方的弹药也已耗尽。\n\n这条街道上弥漫着火药的气味，混合着雨水和尘土的味道。亚历山大记得他母亲说过的话，说战争中每个人都应该像个战士那样死去，于是他站了起来，雨水顺着他的军装滴落。“来吧，”他用带着浓重口音的德语喊道，摆出了拳击的姿势，“让我们像男人一样结束这场战斗。”他的声音在空旷的街道上回荡着。\n\n奥托·布雷多看着这个突然站起来的俄罗斯人，嘴角浮现出一丝几不可见的笑意，他的手中握着一把手枪，里面还有最后一颗子弹，这是他特意留到最后的。当亚历山大挥出他认为会是最光荣的一拳时，奥托只是平静地抬起了手臂。\n\n枪响了，声音在雨中显得格外清脆。亚历山大倒下的时候，脸上还保持着那个想要展现勇气的表情。\n\n雨继续下着，冲刷着地上新添的暗红色。"
 germany.264.a: "雨越下越大。"
 germany.265.t: "格格不入"
 germany.265.d: "“打扰一下，警官？”一位老妇人走近卢卡斯·穆勒，开口问道。\n\n实际上，卢卡斯并不是警察。他不过是在最后一刻音乐节的指挥家们雇来当安保的人。他拿到了一根警棍、一罐胡椒喷雾和一副手铐。连泰瑟枪都没发。不过，他也不觉得有什么在圣诞前一周和老太太详细解释自己到底是干什么的必要。\n\n“怎么了，有什么需要帮助的么？”他问那个女人。\n\n“有个怪人在那边的卡车旁边四处转悠。”那位女士回答道，指着音乐节活动区的尽头。\n\n四处转悠的怪人？这倒确实值得他花上些时间，也许在过去的路上他能逮住个乱扔垃圾的人，或者是乱穿马路的人。而且，看看那人在搞什么名堂总比在寒风中站着受冻有意思的多。\n\n“交给我吧，您好好享受音乐节便可。”卢卡斯安慰了那个女人，然后向那个“怪人”走去。\n\n然而，当他走近那位女士指着的卡车时，他意识到她的担忧并非空穴来风。这个转来转去的怪人原来是一名神情紧张不安的阿拉伯裔男子，大约30岁左右。他正站在卡车门前，打量着人群。他是打算偷卡车还是怎么的？\n\n“喂，那是你的卡车吗？”卢卡斯对这个愈发可疑的人喊道。\n\n那人瞪大了眼睛，很可能是把卢卡斯当成了警察，拔腿便沿着街道狂奔而去。卢卡斯马上就追了上去，他现在确信这人就是个罪犯。但他怎么追也追不上这个阿拉伯人，只得罢休。\n\n他决定打个电话报警，警察处理这种事应该更得心应手。"
 germany.265.a: "处理这种事实在不在我的职权范围内。"
 germany.266.t: "狂热收藏家"
 germany.266.d: "敲门声响起时，正值黄昏。声音轻叩在那扇古老的木门上。克莱因夫人，这位年迈的寡妇，缓缓走向门口。门外站着一位西装笔挺的男子，脸上挂着一副练习得极为熟练的微笑。\n\n“克莱因夫人，”他以流利的语调开口，“我代表一个历史研究会，致力于保存东德时期的文物。我听说您可能拥有一些相关的物品。”\n\n她的目光掠过他的手提包，又扫了一眼他锃亮的皮鞋。她没有说话，只是示意他进屋。在窗下的一个旧箱子里，克莱因夫人取出了她的珍藏：一面褪色的自由德国青年联盟旗帜、一枚工人勋章，以及一幅开裂的昂纳克肖像。这男子的眼睛亮了起来，微微前倾的身体和微颤的手指似乎迫不及待地想要将这些文物占为己有。\n\n“这些都是了不起的珍品，”他说，语气中透着一丝急切，“活生生的历史。我所在的机构愿意出高价来收购它们。”\n\n克莱因夫人久久凝视着他，满是皱纹的脸庞毫无表情。“这些物品，”她轻声说道，“不是用来买卖的。它们属于人民，属于始终坚定的党政府，而不是某些资本家的收藏或投机。”"
 germany.266.a: "记忆从不改变。"
 germany.267.t: "细细的灰线"
 germany.267.d: "韦伯警官将一份报告在桌边轻轻一敲，神情如窗外冰霜笼罩的冬日般冷峻。“又来一起。”他低声喃喃，将报告推向穆勒警官。“几个小子在地铁里围攻了一名教士，把他揍得半死，脖子上还挂了块牌子，上面写着‘人民公敌’。”\n\n穆勒扫了一眼报告，挑了挑眉毛，嘴角浮现一抹淡淡的笑意。“听起来挺耳熟的。”他说，“估计史塔西会感到自豪吧。”\n\n韦伯的下巴绷紧了。“别美化这种事。这些是被政治煽动的暴徒，不是什么革命者。”\n\n穆勒靠在椅背上，椅子的吱嘎声打破了片刻的沉默。“那你有什么建议？去抓他们？你觉得柏林有谁会感谢我们为了保护这些资本家或者教士去拦住这些孩子？”\n\n韦伯缓缓呼出一口气，声音压得很低。“你忘了这种事是怎么发展的。今天是资本家的狗腿子，明天就是我们这种人。还记得他们过去叫‘自我批评’的那一套吗？等他们来找我们时，你觉得会叫什么？”\n\n穆勒的嘲讽笑容微微僵了一下，但很快站起身，拿起了外套。“也许他们是在清理腐败。也许，这就是这个国家一直以来需要的东西。”"
 germany.267.a: "腐败永不停息，直至吞噬一切。"
 germany.268.t: "勃兰登堡门"
 germany.268.d: "卡尔靠在椅背上，屏幕的光映在他的脸上，他正通过Discord与朋友德米特里通话。“不只是这样，德米特里。柏林仿佛重新活了过来。工人们在街头歌唱，委员会纷纷成立，就像我们终于想起了我们是谁。”\n\n德米特里轻笑了一声。“是啊，像是重生。让我想起我祖父讲过的关于十月革命的故事。但是……”他的声音犹豫起来。\n\n“但是什么？”卡尔追问，虽然他已经感觉到语气中的变化。\n\n德米特里迟疑了一会儿。“是那些演讲。在骄傲之下，有愤怒。对西方的愤怒，是的，但也对我们，对俄罗斯。”\n\n卡尔开口，心中却已感到不安。“但我们正在建设新的未来，德米特里。我们应该埋葬过去，而不是再把它挖出来。”\n\n德米特里叹了口气。“愤怒不会轻易消散，同志。特别是在你们国家。历史……就像僵尸一样，总会再次爬出来。”\n\n卡尔沉默了，凝视着窗外闪动的红色旗帜。“如果这演变成战争，我们建立的一切都会被烧毁。”\n\n“也许吧，”德米特里答道。“但过去从未真正被埋葬，无论是在卡尔，你的德国，还是在我的俄罗斯。”"
 germany.268.a: "对于左派来说，死者永远不会安息。"
 germany.269.t: "旧物新人"
 germany.269.d: "士兵们偶然地发现了这个高耸的身影，茂密的杂草和时间的痕迹遮住了他的半身，空地上一片兴奋的低语。哪怕它饱经风霜，那雕像是谁也是一目了然的。那是列宁，他向前挥出了手臂，仿佛在引领人民，仿佛要跨越数十年的岁月，发出自己的呼唤。\n\n“看啊！”一个士兵喊到，他拂去了雕像底座上的灰尘。用旁边的干净石头蹭了蹭手套上的泥土。“这不就是列宁同志么！”\n\n其他人也冲了过来，他们的靴子在冻土上嘎吱作响。一个年轻的士兵用手触碰着底座，他带着半分好奇、半分自豪，用自己的手指摩挲着褪色的西里尔字母。“想象一下……苏联曾经把它矗在这里。”他低声说道，言语间还带有些孩子气。\n\n一名士兵爬了上去，摇摇晃晃地保持住了平衡，把一件备用夹克披在列宁的肩膀上。“我们可不能让列宁同志在这挨冻，”他对着下面的欢呼声开了句玩笑。\n\n一个士兵靠在雕像底座上，笑着抬头看。“你觉得他们会为我们感到骄傲吗？”他指着上面的雕像问道。“他肯定会。但他可不会为自己祖国的人民感到骄傲。”"
 germany.269.a: "恍惚之间，有家之感。"
 germany.270.t: "冰与火之歌"
 germany.270.d: "战场在波兰的冬日平原上绵延开来。猩红钢甲的豹式坦克，如一位孤独的革命骑士，行走在分裂的欧洲之上，肩负信仰与命运的旗帜。\n\n遥远的黑暗中，阿玛塔坦克的身影浮现。它犹如被阴影与钢铁铸就的远古巨龙，身上那抹白色的“Z”标记如同宿命的烙印，而它的炮管便是龙之利爪，蓄势待发。\n\n豹式坦克率先出击，它的炮火犹如长枪贯穿长空，直击巨龙的坚硬鳞甲。火光四溅，钢铁的撞击发出刺耳的怒吼，但那头巨龙岿然不动，仅在它的鳞甲上留下了烧痕。阿玛塔低声咆哮，随即释放出炽烈的火流，那一击沉重而猛烈，狠狠砸在豹式坦克的侧翼，留下了炭黑的伤口。然而，骑士无畏，仍以不屈之姿站立。\n\n它们在冰霜覆盖的大地上盘旋对峙，彼此试探，掂量生与死的筹码。豹式坦克怒吼着冲锋，炮塔冷静地旋转，瞄准了巨龙的软肋。最终的炮弹划破空气，准确命中，贯穿阿玛塔的心脏，激起一场毁灭性的烈焰。浓烟滚滚，巨龙发出痛苦的低吟，缓缓倒下，化为一片燃烧的废墟。\n\n骑士没有停留。它的炮塔转向远方，凝视着遥远的地平线，那是华沙的断垣残壁，等待着它继续前行的足迹。"
 germany.270.a: "从某种意义上说，这是一个英雄的故事。"
 germany.271.t: "地下室里的蜜蜂革命"
 germany.271.d: "在一座废弃啤酒厂地下室里，几个大学生正围坐在掉漆的圆桌旁，桌上散落着几张皱巴巴的纸，上面潦草地写着“异化”“辩证法”和“马克思主义”等词语。他们刚刚吞下了大约两百微克的LSD，此时正沉浸在迷幻的漩涡中。\n\n“你们看，”汉斯盯着天花板上并不存在的一个点，“资本主义社会的异化，就像是这个地下室里的每一块砖，它们本来应该是整体的一部分，但现在却彼此疏离。”“不，不，不，”莉娜摇晃着她那头乱蓬蓬的红发，“你理解错了，异化不是物理概念，它是一种……一种……”她的声音越来越小，最后变成一段模糊的嘟囔。\n\n“等等！”安娜突然站到椅子上，差点打翻了桌上的啤酒，“我明白了！整个宇宙就是一个巨大的商品拜物教！看看这些蜡烛，它们不过是蜂蜡的异化形式，而蜂蜡本身又是蜜蜂劳动的异化……”\n\n“但是蜜蜂，蜜蜂本身就是一个完美的共产主义社会。你知道吗，在蜂巢里，每一只蜜蜂都是按需分配的。”莉娜一边拿走那本已经被啤酒浸湿的《资本论》一边质疑着，“不，不对，”安娜激动地挥舞着手臂，“蜜蜂女王是典型的官僚资本主义代表！我们需要一场蜂巢革命！我们必须首先理解商品拜物教对蜜蜂的影响。你们看到这些墙了吗？它们在呼吸，就像被异化的劳动在呼吸一样……”\n\n“我想我已经理解了，”汉斯接过了安娜的话语，“资本主义就像是这个地下室，我们都被困在里面，但实际上，我们才是真正的地下室！”\n\n“但如果我们都是地下室，那谁是上面的房子？”\n\n这个问题在场没有人能够回答。他们继续坐在那里，看着地上的水渍扭曲成马克思的肖像，然后是黑格尔的，"
 germany.271.a: "最后变成了一只正在跳舞的蜜蜂。"
 germany.272.t: "爱与普希金"
 germany.272.d: "在柏林社会主义艺术博物馆的俄罗斯诗歌展厅里，卡特琳娜·韦伯将一缕金发别到耳后，目不转睛地阅读着马雅可夫斯基的展览板。她的母亲玛丽安娜站在不远处的普希金展柜前，时不时瞥向女儿。\n\n“你看这个，妈妈，”卡特琳娜指着《穿裤子的云》，“马雅可夫斯基把字母排成了阶梯的形状。每读一行都像在爬楼梯，多有意思啊。”\n\n玛丽安娜正专注地看着隔壁展柜里普希金的手稿：“唉，我还是更喜欢普希金这样的诗人。你看这首《致大海》，读起来多么舒服，像音乐一样。”“妈，你总是这样，”卡特琳娜轻笑着，“不是所有的诗都要像音乐一样。你看这里，马雅可夫斯基把‘暴动’两个字拆开重组，整个页面都在动。这不也很美吗？”\n\n玛丽安娜摇摇头，却掩不住嘴角的笑意：“你这孩子，就喜欢这些奇特的东西。我记得你小时候，连童话书都要挑那些插图特别的看。”“那是因为艺术本来就应该有不同的样子嘛，”卡特琳娜指向另一个展柜，“你瞧，马雅可夫斯基不光写诗，还会画画。他的海报设计得多有创意。”\n\n“哎，我还是觉得普希金的《叶甫盖尼·奥涅金》更动人，”玛丽安娜说，“至少不用把脑袋歪成麻花才能看懂。”卡特琳娜笑出了声：“妈妈，你这么说话都有点像外婆了。不过你知道吗？马雅可夫斯基也写过很温柔的诗，只是方式不一样而已。”\n\n“真的吗？”玛丽安娜饶有兴趣地凑近展柜，“那你给我读一段听听。”"
 germany.272.a: "“我可以变成无可指摘的温情的人…”"
 germany.273.t: "是，同志"
 germany.273.d: "托马斯·魏格尔坐在议会的第三排座位上，看着自己一个月前还沾满街头涂鸦颜料的手指，现在已经被会议文件磨得发亮。三个小时前，当财政部官员开始就新税收制度发表第四次意见时，他就觉得眼皮开始打架。这不是他想象中的革命，在街垒上的时候，他们说要改变一切，要建立一个全新的世界，但此刻，穿着考究的政府官员们正在用过去的语言讨论着未来。\n\n“关于第三项提案，”一位戴着金丝眼镜的老议员说道，“我们需要考虑其对现有体制的影响……”马斯觉得这个声音像是从很远的地方传来，仿佛穿越了时间的长河。他看向曾经和他一同并肩作战的战友们，卡尔·施密特，那个在革命中领导工厂占领的工人代表，现在正在为一个关于办公用品采购程序进行争论，安娜·米勒，曾经的街头演说家，此刻正在认真地研究议会守则的第三百二十七条细则。\n\n“魏格尔同志，你对这个问题有什么看法？”主席的声音突然将他拉回现实。托马斯愣了一下，看着面前厚厚的文件，那些密密麻麻的官僚文字在他眼前跳动着。\n\n“我建议……”他迷茫地说着，感觉自己的声音陌生得可怕，“我们应该按照既定程序处理这个问题。”说完，托马斯看到对面的老官僚们满意地点头，而曾经和他一起战斗过的同志们，此刻也都埋首于文件堆中。"
 germany.273.a: "那一天，托马斯思索良久。"
 germany.274.t: "同样的理论"
 germany.274.d: "市政厅的会议室里，烟雾缭绕。维尔纳·施密特上校正在用力敲打着那张古旧的橡木桌子：“同志们，这个小镇就是资本主义剥削的缩影。这些富人的财产本就是通过剥削工人积累的，我们没收他们的财产是历史的必然！这完全符合马克思所说的原始积累理论。”\n\n托马斯·米勒少校坐在对面，也同样不停地敲打着桌面：“施密特同志，你曲解了马克思主义。革命的目的是解放全人类，而不是重复压迫的循环。如果我们以暴力侵犯平民，和那些法西斯有什么区别？”“区别就在于我们代表着历史的正义！”克劳斯·贝克尔中校合上桌上的《资本论》。\n\n“但请记住，”汉斯·莱因哈特上尉插话道，“马克思同时也说过，无产阶级革命的目的是建立一个没有压迫的社会。我们现在的行为恰恰会让这个目标变得更远。”窗外传来炮火的隆隆声，但没人在意。维尔纳把一份文件摔在桌上：“看看这些数据！这个小镇的资本家们囤积了大量物资，而工人们却生活在贫困中。我们没收这些财产，就是在实践阶级斗争！”\n\n“你是在用教条主义为野蛮行为辩护，”托马斯冷静地说，“真正的马克思主义者应该明白，革命不是报复，而是创造新的社会关系。”“哈！”克劳斯讥讽地笑了，“你这种软弱的态度正是修正主义的表现，暴力是历史的助产婆。我们现在做的，不过是在完成历史赋予我们的使命。”"
 germany.274.a: "相反的结论。"
 germany.275.t: "我们是盖叶的黑军"
 germany.275.d: "我们是不屈的战士，无论世人如何看待我们的选择，无论我们身处王国、帝国或是共和国的统治之下，几个世纪的光荣传统未曾有过改变，而它们在鲜血的浇灌下更显光辉。我们从未想过令前辈们蒙羞，他们为正义和真理所作出的高贵牺牲，其荣耀将继续流芳千古数个世纪。\n\n如今，属于我们的世纪斗争终于到来，那是我们最大的梦魇，最长久的恐惧。我们曾以为那些渴望战争和征服的野蛮士兵已经饱腹，他们对鲜血的渴求已经消退；又或者是其疮疤尚未愈合，折断的利爪仍未重新生长出来。我们曾抱有如此侥幸之心理，但事实已然证明我们大错特错。由野兽组成的军团咆哮着越过文明世界的边境，张牙舞爪着，试图吞噬和毁灭一切它们未曾拥有又嫉妒无比，一切拥有良知的人民所创造的最美好的东西。\n\n现在已不再需要用任何空洞的言语去激励人心，因为生死存亡的危机足以令几千万人的思想结为一体。这钢铁般的意志将紧紧攥住命定的宝剑，从混沌的威胁中拯救自己，用神圣的天火焚尽一切鬼魅和虫豸，直到危机得到最根本的解除，人类最宝贵的造物得到彻底的解放。\n\n德国和全欧洲的同胞们，向东方进军！唱起战歌，向最后的末日黄昏进军吧！"
 germany.275.a: "我们誓要与暴政斗争，\n嗨呀吼吼！"
 germany.276.t: "最后抗议"
 germany.276.d: "三个月零四天来，托马斯·赖纳一直在街头游荡。被解雇的那个早上，他先是在报纸上看到了一则招聘启事——他当时所在的工厂正在招聘新的总工程师。招聘要求中写着“家庭出身得体”。不久之后，他被礼貌地叫到了人力资源部。“您应该明白，”他们说，“当前的情况需要……更合适的人选。”后来，他得知自己的职位被奥托·冯·施泰因费尔德填上了，就是那个连扳手和螺丝刀都分不清的男爵之子。\n\n托马斯在城市广场上漫步，目光落在一座正在揭幕的巨大铜像上。这是一座新铸的皇帝雕像，威严地俯瞰着广场。工人们正在拆除脚手架，露出底座上镀金的铭文：帝国荣光永存。在街角的一家小酒馆里，托马斯点了他最后一杯啤酒。当他走出酒馆时，瞥到一辆送货卡车正停在路边，司机正在卸货，钥匙还插在点火装置上。\n\n托马斯毫不犹豫地爬进驾驶室，发动引擎，将卡车开向广场中心。当他踩下油门时，他回忆起了第一次走进工厂时的那份自豪感。卡车轰鸣着向前冲去，速度越来越快。人群惊慌失措地四散奔逃。托马斯的目光一直紧紧盯着着雕像上那张严肃的脸。在他生命的最后时刻，雕像底座的镀金字母上折射出的阳光映入眼帘。接着便是震耳欲聋的巨响。雕像轰然倒塌，青铜制成的身躯砸在了石质广场上。托马斯躺在扭曲的驾驶室里，意识渐渐消逝，工厂机器有节奏的轰鸣声渐渐入耳……"
 germany.276.a: "那可是世界上最美妙的乐章。"
 germany.277.t: "精英军官"
 germany.277.d: "马克西米利安·冯·伯恩斯托夫中尉站在司令部的作战室里，面对着一张铺满战术标记的地图。维尔纳·克劳斯上校的目光正从眼镜片后面打量着这位拥有着古老贵族家族血脉的年轻军官。“中尉，”克劳斯上校用一种不带感情的声音说，“请详细分析一下，如果敌军在这里，”他的手指点在地图上一个标注着红色箭头的位置，“采取包围态势，我军该如何应对？”\n\n马克西米利安感到喉咙发干。他看着地图上密密麻麻的战术符号，“我们可以…分散部署，”他结结巴巴地说，“让每个部队独立行动。”克劳斯上校的眉毛微微上扬：“那么补给线呢？在分散部署的情况下，你如何确保各个作战单位的补给不会被切断？”\n\n“补给线？”马克西米利安重复着这个词，仿佛第一次听到它，“也许…也许可以用运输机空投？”办公室里一片死寂。克劳斯上校取下眼镜，开始慢慢擦拭镜片：“告诉我，中尉，你知道一个装甲师每天需要消耗多少吨燃料和弹药吗？你打算用多少架运输机来完成这个任务？”马克西米利安的额头开始渗出汗珠，他知道克劳斯上校已经看穿了一切——他的任命书上还带着他叔叔，那位在国防部任职的男爵的印章。\n\n“真有趣，”克劳斯上校最后说道，“你的评价上写着‘指挥才能卓越’。看来男爵大人对‘卓越’这个词的理解很有创意。”他啪的一声合上了文件夹，“告诉我，中尉，你觉得在真正的战场上，敌人的炮火会因为看到你的家族纹章就转向吗？”"
 germany.277.a: "“我觉得……应该会吧。”"
 germany.278.t: "普鲁士雄鹰之陨"
 germany.278.d: "清晨的阳光格外耀眼，汉斯·韦伯正在擦拭着祖父传下来的一顶帝国尖顶头盔。在现代战术头盔盛行的当下，他却执拗地守着这份载满荣耀的遗物。阳光照在头盔顶部的铜尖上，散射出宛如金星般的光芒。\n\n五公里外，在一个俄罗斯炮兵观察哨里，谢尔盖·伊万诺夫正如往常一样用双筒望远镜观察着战场。突然，一道闪光吸引了他的注意。一名德国士兵站在战壕边，擦拭着他的装备。他头盔上的尖顶在阳光下闪闪发光，简直就是完美的炮击标靶。\n\n“有点意思，”谢尔盖对着无线电说道，“看来有人还对老威廉皇帝的时代念念不忘呢。”他传达了坐标，“那根闪闪发光着的尖顶——简直就是在求着让人对着它来上一炮。”\n\n汉斯根本不知道自己成了靶子。他站在那里，回想着祖父的话：这顶头盔象征着帝国的荣誉与传统。第一枚炮弹随即落下，头盔那金色的尖顶却仍在阳光下闪耀着光芒。\n\n待到尘埃散尽，战壕中只余一顶破损的尖顶头盔，它顶上的黄铜装饰依旧固执地指向天空。"
 germany.278.a: "一只蝴蝶悄然落在了那尖顶上。"
 germany.279.t: "大扫除"
 germany.279.d: "奥古斯特像具尸体般一动不动。空气中只有监控器发出的微弱的嗡嗡声，他的其他无人机操作员同伙正在跟踪他们的猎物。他们可能相隔数千英里；一个在高加索上空徘徊，另一个在基辅附近进行侦察。然而，奥古斯特将是在这轮班中第一个“捕获”猎物的人。\n\n他低头盯着显示器，一幅俄罗斯远郊的模糊画面漫无目的地变换着；这里是赫鲁晓夫楼、那里是游乐场、也许还有一些坦克的残骸。他感到无比无聊。这座城市甚至都不靠近前线，在喷气式轰炸机迅速摧毁其大部分工业后就被遗弃了。奥古斯特的任务只是清除散兵游勇。\n\n就在他偷偷看了一眼手表后，一个人出现在他的视野中。\n\n他把无人机移近一看，发现有更多的人出现了，他们都是从满是瓦砾的建筑残骸中爬出来的。奥古斯特确信其中一人穿着制服。他迫不及待地驾驶着无人机，像春蜂扑向花朵一样扑向那一小撮人。其中一人抬起头，尖叫了一声后开始逃跑。奥古斯特几乎要破口大骂，但逃跑那人的同伴们只是显得困惑不解。等他们发现时已经太晚了。奥古斯特最后看到的是一个女人模糊的脸。\n\n奥古斯特一边盯着空白的显示器，一边打开麦克风。"
 germany.279.a: "第8区的敌对实体已被清理。"
 germany.280.t: "东方总计划"
 germany.280.d: "“简而言之，我们政府必须把消除失业当成头等要事来抓。若想实现这一目的，就必须保证企业员工的稳定性，就必须大大提高员工跳槽的难度。所谓的‘零工经济’必须被消灭，并以工业劳动取而代之。”\n\n帝国的一位首席经济学家枯燥无味地说道。大多数人早就把他的话当成了耳旁风，急不可耐地等待着轮到自己发言。\n\n“谢谢您，穆勒先生，您的话真是令人耳目一新。弗朗茨先生！”\n\n一个身材矮小、戴着眼镜（在在场人物中并不罕见，但他的眼镜特别大）的男人走上讲台。在他身后，投影仪投射出了一张东欧地图。地图上标出了各种矿场、工厂、各种农业区以及重要的工业城市。\n\n“几个世纪以来，欧洲从未像今天这般孤立无援。来自非洲、亚洲的进口，美洲的更是不必多说，已经下降了200%、300%，甚至是400%。自从美国内战开始以来，我们不得不在一夜之间重振我们的工业部门，并且尽可能地保障我们为数不多的贸易路线。我国处境的危险已是无需强调的事实。”\n\n“显然，我们需要更便捷地获取石油、贵金属和农产品。而倘若我们想要确实可靠地获取这些物资，唯一的途径就是向东扩张。正如各位所见，苏联资源丰富，这也正是我们所需要的。我们要做的就是占领并控制这些地方。\n\n无论我们要扶持什么样的独立国家，其经济都必须由我们掌控。我们也绝不能破坏当地各部门的运转，而且也必须保留苏联的中央集权架构。各地区的私有化进程必须缓慢推进，且不能出现混乱或管理重叠的情况。”"
 germany.280.a: "向来如此……"
 germany.281.t: "“莫斯科在燃烧，人民在欢腾！”"
 germany.281.d: "……一位老妇人大声喊道，引来阵阵欢呼。\n\n“再来一百万杯！”\n一个醉汉举着刚倒满的啤酒杯高声叫嚷，围在他身边的朋友也是一脸喜色。人群不断涌进酒吧，只为观看电视。此时，新闻里不断重播着蘑菇云在莫斯科上空升起的画面。主持人一边讥讽着一边开着玩笑，屏幕上缓缓闪过那些被认为未能逃过一劫的俄罗斯政府官员的照片。\n\n“今天的红场可真是太红了！”\n“听说克里姆林宫的尖顶现在就插在了乌克兰的哪个地方呢！”\n\n陈年佳酿和其他烈酒均是免费供应。一幅[GER.GetLeader]的肖像画同俾斯麦和希特勒的画像一齐挂在墙上，人们对着他们齐声欢呼。远处军营也传来了庆祝的枪声，一些人已经打算去附近的公园看上一场烟花表演。而在外面，一群流氓点燃了一面苏联国旗，又用煤油和劣质酒为其助燃。在场的人都为即将到来的胜利干杯。\n\n全城上下，店主们忙得热火朝天，把橱窗刷得雪白，又在上面画上了苏联首都废墟的卡通图片，一旁还写明了“轰炸折扣”的字样。学校管理人员也贴出了庆祝放假的通知。许多年轻人先前还对征兵办公室如瘟疫般避之不及，如今却扭扭捏捏地出现在了里面。"
 germany.281.a: "一个所有人都会怀念的夜晚"
 germany.282.t: "采访弗兰克·弗朗茨"
 germany.282.d: "“但这并非事实，木材本身并没有什么多孔性。”\n\n那位五十多岁、举止端庄的女记者毫不留情，对弗朗茨的辩解，她没有表现出明显的恼怒，只是在面无表情地掩饰着内心的厌恶。\n\n“那些门太过单薄，夫人，也根本称不上是门，更别提阻挡积聚起来的有毒气体了。无论如何，这都不是重点，我想说的是，我们没有建造任何此类灭虱中心的计划——”\n“您不认为那些政治‘收容营’就是这样的中心吗？”\n\n“不，夫人。那是监狱。我们无意随意消灭大量本国人口，这并非我们先辈的初衷，亦并非我们的目的。相反，我们会鼓励移民计划，以及简单的，呃，政治忠诚度测试，以确保我们非德国人的行为得体……”\n弗朗茨努力寻找合适的词。女人的眼睛一亮，她抓住了这个机会。\n\n“您对非德国人的定义是什么？”\n“嗯，这，这很难说。所有非欧洲人，无论是阿拉伯人还是印度人，毫无疑问都无法融入德国。这是板上钉钉的事实。但是，在犹太复国主义小团体中，同样有一些人不愿贡献出一份炙热的爱国之心。”\n她沉默了片刻。弗朗茨轻蔑地笑了笑，接着说道。"
 germany.282.a: "“现在，谈谈布尔什维主义吧……”"
 germany.283.t: "希波克拉底誓词"
 germany.283.d: "卡尔·施密特医生坐在他那间装修奢华的诊疗室里，阳光透过智能调光玻璃在他的金丝眼镜上跳跃。他正在向莱因哈德一家展示一份精心制作的财务分析报告。“根据最新的效益评估模型，”他说着调出一张数据图表，“持续治疗重度抑郁症的年均支出是86,400欧元。而我们的‘人道主义终止服务’只需要一次性支付12,999欧元，现在还有节假日85折优惠。”\n\n“但她是我的妻子，”莱因哈德低声说。轮椅上的玛利亚正茫然地望着窗外的广告牌，上面闪烁着“自由选择，尊严生活”的霓虹标语。\n\n“正是从家庭责任的角度出发，”施密特医生推了推眼镜，“我们才更应该做出理性的选择。想想看，这些医疗支出本可以用来投资您女儿的教育基金，或者购买一份高收益的养老保险。在这个高度自由化的市场里，让痛苦延续难道不是对资源的浪费吗？”\n\n他打开一份烫金的宣传册：“我们提供三种套餐可供选择。基础套餐包含标准临终关怀，商务套餐增加了私人病房和心理辅导，白金套餐则提供全程VIP服务和豪华安葬仪式。我们接受分期付款，年化利率仅4.99%。让每个人都能自由地选择生命的终点。这不正是真正的人道主义吗？”"
 germany.283.a: "“尚使我严守上述誓言时，请求神祗让我生命与医术能得无上光荣…”"
 germany.284.t: "东线无战事"
 germany.284.d: "于尔根·施耐德和他的战友们扔下了那些印着私人军事公司标志的步枪，他们的军装上还带着昨天发的工资单，上面写着因为战时效率不足而被扣除的奖金数额。“我们投降，”于尔根走出战壕，用蹩脚的俄语喊道，“我们不想为那些每月扣我们工资的混蛋卖命了。”对面俄军的阿尔乔姆·阿列克谢维奇·肖恩里奇中尉放下了步枪，示意自己的士兵停止射击，他能看见对面那群欧洲士兵脸上解脱的表情。\n\n当于尔根带着他的小队走向俄军阵地时，天空依然晴朗。两队士兵站在被炮火犁过的土地上，笨拙地试图用手势或者用手机上的翻译器交流。一个俄罗斯士兵递过来一包香烟，于尔根刚要接过，却听见头顶传来一阵奇怪的嗡鸣。“无人机！”不知是谁喊了一声。但当他们抬头看时，已经太迟了。那些由人工智能控制的杀戮机器并不关心地面上的投降仪式，它们只是忠实地执行着写入代码的命令。\n\n第二天的战报上只有简单的一行字：“在精确打击下，消灭敌军一个排。”没有人提到那些被扔在战场上的工资单，或是那包未能递到手的香烟。"
 germany.284.a: "谁又会在意呢？"
 germany.285.t: "社会保障评估"
 germany.285.d: "欧洲内部安全局\n季度社会稳定评估报告\n机密等级：5\n参考编号：SSA/Q3\n主题：社会凝聚力恶化的日益担忧\n\n摘要：尽管委员会已制定了一系列计划，但根据欧洲内部安全局近期内部委员会的调查，旨在增强社会凝聚力和改善欧洲民众幸福感的项目全面失败。调查显示，自欧洲统一前以来，社会稳定指标已降至最低点。\n\n事件8193-B：多米尼克·热南（23岁，男），因陷入严重的“动物园症候群”而失控，驾驶卡车冲入了穆弗塔尔街。这场悲剧夺去了19位无辜市民的生命，引发了法国各地大规模抗议，人们愤怒地控诉政府在公共安全保障上的失职。\n\n与此同时，壳牌腐败丑闻的余波持续发酵，针对企业对政府影响的不满情绪暴增。数据显示，相关抗议活动增长了60%。柏林街头，人群挥舞着写有“资本家去死”的标语，怒火直指政商勾结。西门子等企业代表公开表达担忧，要求政府对抗议者采取更强硬的措施。\n\n综上所述，欧洲内部安全局郑重建议采取更果断的应对策略。委员会提出的部分方案包括：在城市中加强监控；增加对反委员会言论的事实核查；强化人群控制措施。"
 germany.285.a: "它很快就被归档了。"
 germany.286.t: "乡间宅第"
 germany.286.d: "昏暗的黄昏下，别墅中，一名男子低声喃喃。他的目光穿透阴影，望向落日沉没的地平线，眼神中透着一种孤绝的寒意。那里，早已无友可寻。\n\n他看见他们在外起舞，厚重的军靴狠狠砸进泥土，激起尘埃；他看见他们闯入屋内，粗粝的手指拨弄着墙上镶嵌的圣徒画像，在一张小小的国王肖像间搜寻着什么。\n\n初次与他交谈时，那男人脸上带着谄媚的笑，金发耀眼，蓝眼透亮。于是，队伍中的一人淡然地说道：\n“Wir sind nicht mehr eure Freunde. Wir sind eure Befreier.”（“我们不再是你们的朋友，我们是你们的解放者。”）\n然而，那男子听不懂。\n\n烈焰在房屋间翻腾，而军靴依旧踏响舞步，宛如从欧洲边陲的大火中逃出的幽魂。他们游荡在死寂的荒野之中，他们是仅存的生者，而他们寻找着尚存气息的一切——为了吞噬它们，让自己继续存活下去。"
 germany.286.a: "我们回来了。"
 germany.287.t: "来自波兰的报告"
 germany.287.d: "\n季度社会稳定评估\n分类等级：5\n参考编号：SSA/Q3\n主题：波兰社会不稳定现象的骤然激增\n\n摘要：在我方近期进入波兰，并迅速拆解其国家机构与本土企业，同时由欧洲企业取而代之。然而，此过程执行过于仓促、缺乏协调与严谨性，导致局势急剧恶化。我方超负荷的安保力量未能有效控制大部分区域，形成了严重的“权力真空”，直接引发犯罪率的剧增。据称，当地的企业分支正利用这一混乱局势，在商业竞争中采取极端非法手段。\n\n其中，最广泛流传的说法（尚未由我方特工证实）是，部分企业正雇佣带有赛博义体的雇佣兵以铲除竞争对手。多起工业破坏及暗杀事件的线索均指向一名银发女性，年龄约在20至25岁之间，目前调查仍在进行。\n\n结论：欧洲内部安全局及其他安保力量急需增援，包括重装甲部队及空中力量，以确保战略要地的安全。波兰局势若继续失控，可能会引发与集体安全条约组织的边境危机，甚至导致我方对西波兰的全面失控。"
 germany.287.a: "这可太赛博朋克了。"
 germany.288.t: "霍斯特·马勒的发言"
 germany.288.d: ""
 germany.288.a: "真是个怪人……"
 germany.289.t: "民族共产党夺取政权！"
 germany.289.d: "人民议院与国民阵线的首届代表大会，上演了远超所有人预期的政治变局。\n\n改革派统一社会党原计划通过受控选举培植“忠诚反对派”，却最终引发现有政治秩序的彻底颠覆。民族主义势力凭借各类常规与非常规手段，竟在议会中斩获近半数席位，将民主德国推入宪政危机。\n\n紧急召开的特别会议试图推翻选举结果，但当议员们抵达国会大厦时，却发现国防军已封锁所有入口。装甲车辆充斥威廉大街，搜捕任何可能反对新政权的异议者。左右翼准军事组织史无前例地联合巡逻，以铁腕维持“秩序”。\n\n与此同时，电视直播画面显示——更具民族主义色彩的新一届人民议院正“依法”选举总理。多名军方高层列席会场，仿佛在确保选举结果符合其预期。\n\n最终，以压倒性优势当选的是“交叉阵线”与主体思想式理念的倡导者迈克尔·科思。这位新总理在就职演说中描绘了重构德国国家机器、强化欧洲事务主导权、重振民族自豪感的蓝图，但令全体德国民众最为震撼的，是那句响彻勃兰登堡门的宣言：\n\n“革命需要左右二翼，有了双腿才能走向未来！”"
 germany.289.a: "革命需要力量。"
 germany.290.t: "极右翼的命运"
 germany.290.d: "德国当代发展轨迹表明：要实现民族复兴、打破国际反德体系的桎梏，必须超越历史宿怨与偶然冲突。\n\n在联邦政府长达数十年的不合理压制后，右翼政治力量终于迎来复苏契机。这些爱国主义者正获得历史性机遇，为重塑德意志强国地位贡献力量！\n\n但需制定精准的政治整合策略，以最大化其统战价值。\n\n现有两条路径可选：推动右翼团体融入现有左翼政党体系，或允许其保留独立身份进入联邦议会。后者虽更易获得右翼支持，但可能导致执政联盟权力结构失衡。\n\n我们何去何从？"
 germany.290.a: "我们希望他们的成员成为现有党派的一部分，这样就不会再出现分裂！"
 germany.290.b: "正式接纳他们的政党加入我们的大会，我们欢迎他们！"
 germany.290.c: "在德国社会主义者战斗联盟内为他们提供独立的平台！"
 germany.291.t: "党代会上的混乱！"
 germany.291.d: "柏林国会大厦的党代表大会突发剧变：在意识形态混战中，会议未能达成任何共识决议。\n\n伴随内阁实质垮台，迈克尔·科思总理在数小时内宣布辞职。人民议院将紧急启动新国家元首选举程序。\n\n右翼势力趁机推出争议性候选人——前“红军旅”创始人、转型为新纳粹却吸纳民族共产主义理念的霍斯特·马勒。此人在政治精英圈层意外获得跨阵营认可。\n\n这对刚借反法西斯、反资本主义浪潮上台的德国革命政权而言，标志着重回极右轨道的危险转向。\n\n尽管舆论质疑此次混乱是人民议院内部右翼集团策划的宪政政变，甚至指控其密谋恢复法团主义体制，但在新兴的红褐色政权中，既得利益者已形成权力默契，无人愿打破脆弱的政治平衡。"
 germany.291.a: "好吧……又是一个反复无常的人。"
 germany.292.t: "德国自给自足新理念"
 germany.292.d: "今日，数百名党代表以同等间距站立于国会大厦内，他们的掌声整齐划一，仿佛被无形指挥家操控。严格的色彩方案、精确排列的党标语展板环绕会场，其中夹杂着部分苏联时期与东德时代的旧符号。\n\n迈克尔·科思在政治局高层陪同下穿过走廊，两侧持刺刀步枪的卫兵如雕塑般肃立。当他走向演讲台时，军乐团的演奏强度与代表掌声同步提升。就位瞬间，掌声与乐声戛然而止。\n\n“同志们！德国公民们！人民军的兄弟姐妹！我们的国家在腐朽资本主义制度下沉沦太久。今日就是终结之时！我即将宣布的新党章原则，将确保德国社会主义及其后代的安全与荣耀。我们要保护儿童与文化免受全球主义自由主义的侵蚀！我们将巩固边境安全，保障每个家庭的安定。必须倾注全部生命与劳动，粉碎来自四面八方的威胁！”\n\n受阅部队以千人如一的精准步伐行进，坦克与火箭发射系统组成钢铁纵队。柏林街头游行队伍高举马克思、列宁、金日成与科思的肖像，古典乐曲与社会主义时期歌曲在全城回响。工厂工人每班超额完成生产配额。此刻起，德国所有事务如同钟表机械般精准运转。"
 germany.292.a: "伟大胜利万岁！"
 germany.293.t: "组建交叉阵线政府"
 germany.293.d: "今日标志着德国政治史上的重要转折。新革命大会的召开，旨在弥合左右翼长达数十年的政治分野——这一分裂长期困扰着德国政治生态。\n\n主体思想派、马克思列宁主义者、托洛茨基派、施特拉瑟主义者、民族主义者及其他政治运动代表达成共识：当前存在超越内部矛盾的共同外部威胁，必须通过协调差异确保德国在全球化挑战中存续发展。\n\n各派别确认多项可通过合作实现的共同利益：文化复兴、民生改善、教育改革与社会凝聚力提升等目标，均非单一政治力量可独立完成。\n\n会场首次同时飘扬帝制时期的黑白红三色旗、联邦德国的黑红金国旗及社会主义红旗。这是德国多年来首次实现超越东西德隔阂、左右翼对立的多维统一。即便存在残余分歧，亦在多元共生中转化为制度优势，形成博采众长的治理模式。\n\n而这正是能够拯救自己，实现伟大胜利的德国的模样。"
 germany.293.a: "红褐合作。"
 germany.294.t: "民族共产主义崛起"
 germany.294.d: "本次革命遭遇的反抗势力异常微弱，与1920年代自由军团与冲锋队等反共武装大规模组建形成鲜明对比——此现象背后的动因具有双重解读可能。\n\n历经数十年实践挫折，民族共产主义理念在德军中加速扩散——在现役与退役军人群体中尤为显著。该思潮的驱动力既包含对俄罗斯民族主义的复仇情绪，也源于对德国政府背弃民族利益的普遍愤懑。\n\n情报显示，弗兰克·弗朗茨等极右翼政党成员选择放弃公开对抗，转而通过组建民族共产主义俱乐部、召开会议与集会等非暴力手段渗透日耳曼优越主义思想。\n\n与此同时，反资本主义阵线正推动将具有德国特色的主体思想模式本土化，其理论依据是当前德国社会的系统性脆弱性。\n\n尽管现阶段难以评估这些动向的最终影响，但据信执政体系不同层级已出现对此类理念的隐性支持者。"
 germany.294.a: "好事……？"
 germany.295.t: "组建新红军旅"
 germany.295.d: "人民对力量的呼唤与积极民族主义宣传浪潮，催生出大规模自愿参军热潮，多个准军事组织如雨后春笋般涌现。这些组织不仅参与训练新一代战士，更与国家人民军形成协同作战体系。其中一支组织发展尤为迅猛并广受欢迎，因其沿用了活跃于西德的激进反资本主义游击队——红军旅的象征符号。"
 germany.295.a: "一群很有用的历史重演的演员。"
 germany.296.t: "法德分裂！"
 germany.296.d: "当前法德外交争端引发的意识形态对峙，呈现出与20世纪中苏论战相似的历史镜像——这场曾重塑全球左翼运动格局的事件，现以引渡行动与军事调动为表征，构成第二次欧陆战争后欧洲首次政治危机（当前尚处非军事阶段）。\n\n此次冲突实为法德两国在欧洲共产国际会议中长期分歧的集中爆发：双方在欧洲未来发展方向、左翼意识形态整合模式等核心议题上持续角力，同时在原俄罗斯势力范围的势力划分问题上难以达成共识。\n\n欧洲局势持续升温，环法德国家相继卷入，多数分析人士担忧和平解决方案的可行性正急剧降低。"
 germany.296.a: "别再来了……"
 germany.297.t: "德法开战！"
 germany.297.d: "莱茵河畔德法部队的边境摩擦已升级为全面军事冲突，标志着泛欧社会主义联合体的实质瓦解。\n\n当前欧洲呈现两大阵营对峙格局：由法国主导的反修正主义联盟试图推翻德国激进左翼政府，指控其严重偏离社会主义发展共识。这场冲突本质上是不同制度模式的正统性之争，双方均试图通过实践检验自身意识形态的效能优势，失败方的理论体系恐遭历史性否定。\n\n革命的烈焰如今吞噬了她的孩子。美好灿烂的未来，并非人人得以见证。"
 germany.297.a: "最后一搏？"
 germany.298.t: "对左翼党幻灭"
 germany.298.d: "欧陆战争的惨败使德国政治格局严重破碎。通常这种情况下中间派政党会丧失民众眼中的合法性，但这次被推上风口浪尖的却是左翼党。\n\n除了预料之中的极右翼势力扩张，德国左翼阵营开始拥抱更为小众的思想，更深地渗入青年亚文化领域。从对左翼党不满的成员中分裂出的众多意识形态支派，呈现出愈发尖锐的形态。\n\n受马克·费舍尔与韩炳哲理论启发，这波重构的左翼思潮在左翼青年文化中广泛传播，猛烈批判“红色自由主义”的失败与“资本千变万化的面具”。\n\n目前这股力量仍属德国社会边缘存在，但已观察到左翼党高层人士现身这些小型团体组织的文化活动和会议。未来将如何发展，唯有时间能够揭晓。"
 germany.298.a: "隐秘的寄生者已现形。"
 germany.299.t: "重塑未来联盟成立"
 germany.299.d: "新宣布的选举日趋临近，越来越多新兴左翼运动正在涌现，试图争取支持并在政府中获得代表权。\n\n尤其值得注意的是，一个政党成功吸引了异常多的追随者。他们凭借详尽有趣的纲领、独特的承诺，以及最重要的——许多有望重塑德国乃至世界格局的新生代年轻面孔，赢得了群众支持。\n\n这个名为重塑未来联盟的政党，以前沿思想家、韩裔解构主义哲学家韩炳哲为形象代表。部分专家将其称为当今世界左翼加速主义的主要代表之一。\n\n他们的口号着重强调德国民众对传统左翼政治的厌倦，承诺通过社会改革防止社会过劳，并为奠定后资本主义未来基础的技术与文化突破铺平道路。\n\n目前，这个承诺要消除资本主义概念的政党在民调中势头强劲，将在选举后竞争组阁权。"
 germany.299.a: "多么奇特的运动啊……"
 germany.300.t: "齐泽克加入政府"
 germany.300.d: "我们在此探讨的并非商品的客观物质属性，而是聚焦于其虚幻的剩余价值。\n\n以健达奇趣蛋为例：这个令人惊异的商品，其“惊喜”本质在于将欲望成因物化为塑料玩具，填补巧克力蛋的内部虚空。整个商品的精妙平衡存于双重维度之间——你购买的巧克力外壳，与可能产自中国劳改营之类场所的免费赠品（即剩余物）。\n\n我并不认为巧克力框架仅作为引导你探寻内在宝藏（即柏拉图所称的“圣像”）的媒介存在——这种圣像既赋予个体价值，又使商品具备吸引力。事实恰恰相反。\n\n我们应以追求商品内核的崇高目标为手段，其终极目的恰恰在于更好地享受表层。这正是反形而上学的训诫，尽管这种观念令人难以接受。"
 germany.300.a: "行呗……？"
 germany.301.t: "新政党的名称"
 germany.301.d: "我们执掌政权后，国家治理体系的设计核心在于党政组织架构的构建。\n\n当前执政力量仍是经过改革的德国统一社会党，其组织模式沿袭前德意志民主共和国体制。该党作为合格的政治载体，可通过暂停内部整顿确保其效忠。\n\n另一可行路径是改造民族共产主义性质的“德国社会主义者战斗联盟”以争取革命右翼支持——迈克尔·科思曾在此成功整合左右翼力量，尽管该联盟整体仍属极右翼阵营。\n\n最后可参照朝鲜劳动党模式进行本土化改造，此方案由反帝派倡议实施。该模式将吸引国际主义者，并有利于运动中的激进左翼派系。\n\n我们当如何抉择？"
 germany.301.a: "保留德国统一社会党的称呼，并限制内部的大范围改革。"
 germany.301.b: "我们将重振德国社会主义者战斗联盟的辉煌！"
 germany.301.c: "让我们以朝鲜模式改革统一社会党，将其打造为我们自己的劳动党！"
 germany.302.t: "悼念K-Punk"
 germany.302.d: "对多数人而言，唯有伟大战士能通过变革烈焰开创未来、建立新世界，但有时事实并非如此。\n\n通过文字创作，马克诊断了我们时代的病症：\n新自由主义秩序带来的“别无选择”感正悄然蔓延，连我们的梦想都被无法掌控的经济力量殖民。\n但他不仅限于描述现状，而是与之斗争。\n每篇论文、每次演讲、每则博客都在刺破意识形态迷雾，提醒我们另一个世界虽难以想象却仍有可能。\n\n有时只需有人指明逃离资本的路径。\n资本是可被诛杀的怪物，通过我们的行动终将终结其统治。\n我们绝不能让他的洞见沦为静态的理论。"
 germany.302.a: "我们都会铭记马克·费舍尔。"
 germany.303.t: "致委员会主席："
 germany.303.d: "鉴于近期事态发展，恕我直言不讳。\n\n我们曾引以为傲的欧盟已因恐惧与陈腐官僚体系陷入瘫痪。过去数月间，贵政府被迫将越来越多职权让渡给论坛管辖的行政工作区与治理咨询委员会。毋庸置疑：欧洲民众如今仰望世界经济论坛寻求领导，而非布鲁塞尔方面。\n\n您心知肚明。过去几个月的演变已将我们推至此刻。为欧盟存续考量，我以欧洲人民的名义请求您辞去职务。您将即刻收到经我方杰出智囊团达成共识的新一届委员会架构方案。历史终将铭记您此刻的选择。\n\n此致\n敬礼"
 germany.303.a: "克劳斯·马丁·施瓦布教授"
 germany.304.t: "冈瑟·费林格在推特上："
 germany.304.d: "£GFX_GER_dont_at_me_ti 冈瑟·费林格\n\n乌克兰和科索沃必须在2029年加入北约\n加拿大、英国、冰岛、挪威、阿尔巴尼亚，科索沃必须在2033年加入欧盟！\n\n帖子\n\n已置顶\n冈瑟·费林… £GFX_GER_dont_at_me_ti Gunter...·4月27日\n本人正式宣布参选£GFX_GER_dont_at_me_ti EU_Commission主席一职，将取代£GFX_GER_dont_at_me_ti VoltEuropa £GFX_GER_dont_at_me_ti RealAlexJones £GFX_GER_dont_at_me_ti MedvedevRussiaE £GFX_GER_dont_at_me_ti ProfKlausSchwab £GFX_GER_dont_at_me_ti POTUS\n我将重振£GFX_GER_dont_at_me_ti 北约，带领西方走向胜利\n并将俄罗斯击败，实现#ExRussiaRetweet, 点赞分享转发……\n配图：费林格身着写有“投票给冈瑟”的衬衫站在奥地利阿尔卑斯山顶的照片\n\n冈瑟·费林… £GFX_GER_dont_at_me_ti Gunter...·22小时\n中国，我要终结你的侵略……\n配图：费林格头戴台湾主题围巾、表情愤怒的图片\n\n冈瑟·费林… £GFX_GER_dont_at_me_ti Gunter...·1天"
 germany.304.a: "[SOV.GetLeader]，游戏结束了……"
 germany.305.t: "引言"
 germany.305.d: "各位公民，我是世界经济论坛主席克劳斯·施瓦布。\n\n如您所知，我们历经漫长征程才抵达今日。此刻我们正身处改写人类命运的历史性节点。这场让文明脱胎换骨的机遇，我们既未错过，更牢牢把握。\n\n多年来，世界经济论坛的专家们始终致力于此，至少可以说取得了巨大成功。但若没有欧洲人民的顺从与积极配合，这一切都不可能实现。\n\n尽管并非所有人都已接受这个未来，但可以说这已是不可逆转的趋势。\n\n作为世界经济论坛主席，我想向各位致以个人感谢。议程2030不仅成功完成——事实上，甚至远远超前于计划。我认为，是时候公布下一阶段的计划了。"
 germany.305.a: "所以，仔细聆听。"
 germany.306.t: "财产"
 germany.306.d: "诚如诸位所知，2008年金融危机已昭示自由市场资本主义模式的衰亡。消费主义、民主制度，尤其是中产阶级及其生活方式都已难以为继。我们需要一场“大重构”，在坚实稳定的领导下为人类开创安全统一的未来。自那时起，目标既定，计划启动。\n\n从一开始，我们就对《议程》蓝图了然于胸，但各国领袖与民众起初并不轻易听从。我们需要一个催化剂事件来为改革铺路。众所周知，新冠疫情对此目标助益良多，当然这意味着发展终于步入正轨，2020年才是真正的转折点。\n\n尽管萨勒曼国王的御医们竭尽全力——我本人与他们相熟——但他“不幸”离世引发的经济崩溃早可预见。我们自然要推倒那座国家利益阻碍改革的泥足巨人——特朗普治下的美国。此后第四次工业革命进展异常顺利。\n\n遗憾的是俄罗斯威胁犹存，欧洲战场的失利更是惨重——但世界经济论坛的宗旨，正是在至暗时刻寻找曙光。此战暴露出民族国家政府的脆弱与不可持续性，反而让我们得以集中权力。因此，毫无疑问……东方问题终将解决……"
 germany.306.a: "……指日可待。"
 germany.307.t: "灵魂"
 germany.307.d: "但眼下，内部事务更为紧要。若想延续我们的文明，就必须争取欧洲每一个人的支持，不容推诿，不容拒绝。全球认同是我们唯一的身份标识，其敌人也昭然若揭。\n\n最危险的敌人来自内部：人们对奢侈的天真渴望，民族主义者对所谓“身份认同”的顽固坚持，以及他们宣称的身体自主权，这些都将给全社会带来重大风险，我们绝不能任由这些危险因素蔓延。\n\n集体利益高于一切：在宏伟蓝图面前，少数人的需求微不足道。反人类的敌人无处不在，他们自私的兽性欲望终将难以为继。\n\n虚假信息、反平等主义和狭隘部落主义，终将如流感病毒般被人类免疫系统清除，没人会怀念这些糟粕。\n人性本是一道光谱，只要校准得当，我们必能渡过这场风暴。"
 germany.307.a: "共赴胜利。"
 germany.308.t: "第四部分：新人类"
 germany.308.d: ""
 germany.308.a: ""
 germany.309.t: "结语"
 germany.309.d: "最后，我要特别感谢为新常态做出贡献的资助者与远见者们。我们已在监控日常生活确保绝对安全、消除虚假信息方面取得重大进展。\n\n不仅如此，通过对民族国家这一殖民概念及其衍生问题文化规范的渐进式消除，我们实现了至高无上的和平统一。在以完全平等为目标的严格规划下，我们正引导民众拥抱后人类未来——通过技术整合逐步消除生理与文化的不平等。\n\n如今城市中随处可见灿烂笑容，这些笑容与面孔一年前尚不存在——这是我们进展的非凡见证！\n我同时要感谢勇敢的“蛋白质魔法师”们，他们为大众提供营养支持，终结了长期危害环境的浪费型消费。\n\n目睹欧洲各地共同目标的实现，我深感欣慰。"
 germany.309.a: "观众们笑了，心中充满了人为的快乐。"
 germany.310.t: "微笑"
 germany.310.d: "起初，一切都打着“高效”的旗号。人们开始安装情绪调节器——不再为琐事崩溃，不会在压力下突然暴怒。企业效率提升，家庭争吵减少，连青少年自杀率都开始下降。政府官员在新闻发布会上笑容满面地宣布：“这是人类文明的重大进步。”\n\n没人注意到街上的笑容渐渐变得一模一样。不是相似——是分毫不差。嘴角的弧度，眼角的皱褶，连笑纹的位置都像用模板印出来的。有位记者做了实验：截取十个佩戴情绪调节器者的微笑特写，发现这些影像竟能完全重叠。\n\n后来人们开始无缘无故地发呆。有人乘电车时突然低头微笑，凝固成雕塑；有人半夜醒来站在窗前，凝视着空无一人的街道，仿佛在与什么对视。有个女孩边微笑边将刀插进母亲的心脏。当邻居报警时，她仍坐在血泊里看着电视吃着爆米花。医生说她的情绪中枢几乎停摆，植入体“过度调节”后，只残留着浅薄的愉悦感知。\n\n她始终保持着微笑。“我只是觉得……这样做没什么问题。”她在法庭上说，面容平静如面具。研究者后来为这种状态创造了术语：“镜像微笑综合征”——由神经植入体诱发的赛博精神病。患者丧失情绪判断力，却能完美模仿他人期待的“理想情绪”。"
 germany.310.a: "……"
 germany.311.t: "新世界秩序"
 germany.311.d: "当欧洲大陆的硝烟终于散尽，这场血腥的战争，欧洲历史上又一个令人难忘的篇章就此画上句号。\n\n克劳斯·施瓦布从来不是个感情丰富的人。事实上，在他整个职业生涯中只展现过两种情绪：愉悦与虚无。此刻他的脸上正挂着那种虚无，投影仪昏黄的光线将他脸上的皱纹勾勒得愈发深刻，让这张脸显得比平日更加阴森可怖。\n\n当幻灯片翻到最后一页，施瓦布环视着他的同僚们、他的下属们。他在期待某种反应，却无人能参透他究竟想要什么。他的下属们知道，言辞过多或掌声过烈都不恰当，但反应过于平淡又必定会招致他的不满。“适度”，这个词汇最为精妙。于是他们整齐划一地鼓起掌来，如精密校准过一般。\n\n在座的每个人都心知肚明。旧世界正在崩塌，而新秩序将从废墟中崛起。这个世界终将由思想开明的全球主义者主宰，由那些毕生致力于构建自由统一市场的人们掌控。至于民族主义、地域主义这类狭隘思想，都将随着旧世界一同被抹去。\n\n五十余年过去，施瓦布将毕生精力都奉献给了世界经济论坛。想到自己倾注无数心血想要阻止的灾难终究还是发生了，一滴泪水不受控制地从他右眼角滑落。他并非为旧世界的消亡而泣，也不是为新秩序的诞生而泣。他是为你落泪、为我落泪、为他自己落泪，因为我们终将踏上这条由他亲手铺就的辉煌之路。如今这个世界已成为他的交响乐团，正等待着他来指挥这场盛大的演出。旧世界的废墟之中，唯有他的光芒能够穿透黑暗。他是唯一的希望灯塔，他，就是未来。"
 germany.311.a: "欢迎来到新世界"
 germany.312.t: "教育优先目标"
 germany.312.d: "未来属于年轻一代。要引导他们走上正途，我们必须为其提供正确的教育，帮助他们树立应有的道德准则。他们必须继承我们传递的价值观。\n\n我们的孩子必须学习全球价值观，遵循我们共同信奉的国际主义信条。他们需要理解“看不见的手”的原理，将奥地利经济学派的思想铭记于心。欧洲的繁荣并非源于某个政治强人或政策制定者，而是得益于自由市场的自我生长。消费主义正是推动欧洲进步的意识形态齿轮，历史一再证明，没有需求就不会有创新，没有顾客就不会有变革的动力。\n\n我们还必须向孩子们阐明自由与民主的真谛。这些词汇与概念，始于同一个命题，也终将归于同一个结论。自由意味着选择的自由、工作的自由、买卖的自由；民主则代表着社会向着终极形态的演进，在那里发展将不再受困于狭隘者与独裁思维的束缚。\n\n因此，让自由之歌在青年们心中回荡，让民主之种在民众们之间孕育。我们将教育他们，引领他们走向光明，走向启蒙。我们是当代的伏尔泰与卢梭，在我们的羽翼庇护下，将守护他们走向未来、赢得未来、成为未来。"
 germany.312.a: "我们需要着力培养专业型消费者。"
 germany.312.b: "让我们追求更高的目标，并将其发扬光大。"
 germany.313.t: "牛：全球变暖的根源"
 germany.313.d: "您可曾沉醉于周日烧烤架上滋滋作响的牛排？那鲜嫩多汁的肉质确实令人着迷。但您是否想过，每一口牛肉背后隐藏着怎样的环境代价？若我告知真相，恐怕您会惊得连下巴都掉到地上。\n\n畜牧业产生的甲烷与一氧化二氮正以15%的占比侵蚀着我们的大气层。当代文明已进化出更先进的价值观，实在不该继续沉溺于啖食生灵血肉的原始习性。祖先们茹毛饮血是生存所迫，但今日我们明明拥有无数更健康、更环保的替代选择。\n\n虽然我衷心推崇纯素食主义，但也理解并非所有人都能立即转变。因此，请允许我向各位推荐一种完美的过渡性食材，它富含优质蛋白与健康脂肪，生产过程中几乎零碳排放，更重要的是完全无需伤害任何哺乳动物。亲爱的读者，请容我为您揭开本世纪超级食物的面纱：昆虫！无论是蚂蚱、蜜蜂还是蚂蚁，这些小家伙都蕴含着极其丰富的蛋白质和健康脂肪。有了这些微型生物，人类终于能告别奶牛等体型臃肿的家畜了。"
 germany.313.a: "这才合理！"
 germany.314.t: "往日之影"
 germany.314.d: "汉堡的天空总是灰蒙蒙的，像一块永远擦不干净的老玻璃。笔直的办公大楼排列在街道两侧，外墙上悬挂着巨幅电子屏，从早到晚循环播放着企业广告。\n\n小米娅仰起头，望着那些高得看不见顶的钢铁大楼，眼睛里闪过一丝困惑。“妈妈，”她拽了拽母亲的袖子，“你说汉堡以前很美。可这里明明又干净又新啊，哪里不美了？”\n\n母亲低头看她，犹豫了一下，弯下腰轻声说：“那时候……有小广场，有很多咖啡馆。冬天的时候，橱窗里会挂圣诞装饰。晚上的灯光是暖暖的，人们走路很慢，说话也很慢——不像现在，匆匆忙忙的，只想着明天的工作、会议和截止日。”\n\n米娅似懂非懂地眨眨眼。“那为什么要把它们都拆掉呢？”母女俩走过一段正在施工的路段，母亲握紧了她的手。地面潮湿松软，远处传来金属碰撞的声响。\n\n“因为那些老街和旧房子不值钱，”母亲轻声说，仿佛怕被人听见，“所以他们把房子一栋栋拆掉，建造起这些高楼。你现在看到的每一寸地方，都属于某家公司。”\n\n米娅没有再问。她只是回头望了一眼，好像要透过钢筋水泥的缝隙，寻找母亲所说的那些温暖灯光。\n\n但那里什么也没有。"
 germany.314.a: "只有广告牌上那空洞的脸庞。"
 germany.315.t: "下一阶段"
 germany.315.d: "如今我们的体系已固若金汤，再无外患内忧。\n\n在确立绝对统治并将其扩展至欧洲疆域之外前，我们只需迈出最后一步。\n\n那些被世界经济论坛招致麾下的专家、官员、企业家与文胆们，此刻正再度夙兴夜寐：他们的成果即将显现。\n\n这便是这个故事的必然终章。"
 germany.315.a: "我们的计划即将揭晓。"
 germany.316.t: "欧盟签署北大西洋公约"
 germany.316.d: "在布鲁塞尔欧盟总部举行的仪式上，冈瑟·费林格今日宣布欧盟签署《北大西洋公约》，恢复近期解体的北约组织。在欧盟高级外交官与将领的见证下，费林格宣告了“欧洲悲剧终结的开始”。\n\n“曾被残忍夺走的欧洲安全堡垒终于回归！”他在贝莱蒙大厦台阶上向记者宣布，“战后那段迷茫与边缘化的岁月已经结束。我们现在只有一个使命：阻止俄罗斯侵略！”\n\n费林格持续升级对俄罗斯、[SOV.GetLeader]以及集体安全条约组织的激烈言辞，这种强硬立场早已臭名昭著。尽管欧洲民众普遍支持此举，但批评者警告称，这种复仇主义可能导致第二次俄欧战争，或将彻底毁灭欧洲。"
 germany.316.a: "我呼吁北约进行干预以恢复秩序！"
 germany.317.t: "NAFO-Con的特邀嘉宾"
 germany.317.d: "他刚踏出车门，维也纳的凛冽寒风便如刀割般划过这位西装笔挺的身影。他身着自己标志性的装束：锃亮的皮鞋、黑色西装、眼镜，以及别在衣领上那排引人注目的徽章。为逃离刺骨严寒，他深一脚浅一脚地踏着积雪，朝那幢贴满北约旗帜和柴犬横幅的灰色建筑走去。纷飞的雪花不断拍打在他脸上，纯白的雪景反而让他装饰华丽的衣领更显夺目。当他抵达会场时，守候在门外的众人发出阵阵惊叹。粉丝们雀跃地索要签名合影，而他则略显勉强地一一应允。\n\n步入室内，温暖的空气涌入肺腑，令他精神为之一振。呼啸的风声被数百名狂热粉丝的喧闹取代，所有人都在议论着他的到来。他在签名台前整理领带，刻意将衣领徽章调整到最显眼的位置——务必让每个前来的人都看清这些象征。很快，等候的队伍便排成了长龙。\n\n“费林格先生，能合个影吗？”头戴北约主题针织帽的瘦削青年问道。“当然！”冈特爽快应答。他接过对方的手机，露出那个风靡X社交平台的标志性笑容。年轻人道谢离去后，冈特一边等候下一位粉丝，一边暗自思忖："
 germany.317.a: "“走了一个，还剩下两百个。”"
 germany.318.t: "模组开发者"
 germany.318.d: "Discord频道突然响起新消息提示音。\n先是几张模糊图片：四个举起的杯子——一杯黑咖啡，一杯背景里搁着半瓶红酒，一杯可疑地装满发光能量饮料，最后一杯只剩杯底一圈奶渍。接着是张截图，朴素的Steam界面：\n“上传完成：《欧罗巴的复仇》[HOI5-MOD]v0.1a版本现已发布创意工坊。”\n配文只有一行：\n\n“我们做到了，同志们。复仇万岁！”\n\n他们埋头苦干了近一年。\n熬夜赶工，错过截止日期。在课堂上偷画国策树，考试周争论机制重做方案，凌晨两点在酒店和青旅翻译事件文本。这群人并非专业开发者，不过是几个程序员和画手，一个爱尔兰历史宅，还有个神秘法国佬——他总能把GitHub管得井井有条且似乎从不睡觉。\n\n在他们的时间线里，2026年走向了不同结局。\n欧盟没有分崩离析，东线战场稳如磐石，莫斯科率先崩溃，《利沃夫条约》重划版图。伤痕累累却从未屈服的欧洲，站得比以往任何时候都挺拔。\nDiscord服务器瞬间沸腾。有人扔出低画质的烟花动图，另一个只打了行字：\n“要是现实真这么发展……”\n截图如雪花般涌来，订阅数开始跳动：10、24、60……\n有人上传了战后欧洲议会集会的同人画作，金星星徽在雾霭中若隐若现。"
 germany.318.a: "复仇万岁！"
 germany.319.t: "大棋局 - 第二部分"
 germany.319.d: "“第一选项——俄罗斯，情报确认莫斯科已开始向中国输送武器与人员。直接打击俄方，或可削弱东方战线，但即便如此，我们仍不确定太平洋防卫条约组织能独力取胜。\n\n点击。\n\n“第二选项——物资援助。向亚洲盟友大规模输送军火。我们的工业产能应该能在满足国内需求的同时兼顾这点。总参谋部多数支持此方案。”\n\n他顿了顿。会议室陷入沉寂。\n\n“而第三选项……”\n\n他深吸一口气。\n\n“……直接军事干预。在亚洲展开全面战役，潜在收益巨大——但也将面临严峻的后勤压力……以及可能的兵力短缺。”\n\n灯光渐暗。寂静蔓延。所有目光聚焦于一人。\n\n费林格起身整理西装，声音冷静而决断：\n\n“先生们……”"
 germany.319.a: "准备好香槟——欧洲人很快会敲响北京的大门！"
 germany.319.b: "让工会躁动起来，唤醒沉睡的机器——他们需要枪炮，而我们必将兑现。"
 germany.319.c: "集中火力应对真正威胁——但务必让日本知晓我们是其后盾。"
 germany.320.t: "三大党争论"
 germany.320.d: "时隔近20年，德国联邦议院选举的主要竞争者——现任执政联盟中的基民盟、社民党以及绿党,将首次展开电视辩论。\n\n尽管各大联邦频道会对辩论胜者争论不休，但在国家当前的处境下，这三个声音中有一个对德国人民而言格外清晰。当然，这个声音来自……"
 germany.320.a: "基民盟"
 germany.320.b: "社民党"
 germany.320.c: "绿党"
 germany.321.t: "三小党争论"
 germany.321.d: "就在“三巨头”辩论同期，另外三个政党也举行了总理候选人电视辩论。虽然往常这类辩论鲜少公开宣传，但在危机时刻，德国民众正密切关注着联邦议院内席位不足的三个政党——自民党、左翼党和德国选择党可能提供的不同方案。本轮辩论中，凭借出色的表现、渊博的学识与雄辩能力，胜利属于……"
 germany.321.a: "选择党"
 germany.321.b: "自民党"
 germany.321.c: "左翼党"
 germany.322.t: "选举季开始"
 germany.322.d: "又到了这个时节——政党领袖全国巡讲，各色政治标语点亮街头，媒体陷入疯狂，网络论战四起。距离决定国家未来的下次联邦选举仅剩一年有余，德国各派政治力量已然躁动。他们的支持率可能因一举一动而剧烈波动，在联邦议院的席位也随之变幻……"
 germany.322.a: "踏上竞选之路……"
 germany.323.t: "现代生活的模式"
 germany.323.d: "和平终于降临，思想者与实干家们得以肢解人类思维，只为供奉资本、秩序与纯洁。高等种姓俯瞰着他们的新蜂巢。城市成为多数人永恒的囚笼——你出生时见到的混凝土，至死都不会改变。\n\n楼宇间的广告、消毒过的标语、每个转角的安全监控。离经叛道已被系统剔除，苟延残喘成为众生首要目标——非经抗争，而是通过官僚主义的绞索与非人化的进程，一切皆以进步之名。\n\n他们无时无刻不在提醒：这就是新常态。文化的原子化让人们在喧嚣中孤独求生，人造光源掐灭希望，蜂巢般的办公隔间终将逼人逃往脑内天堂——可就连这片净土，如今也不再神圣。\n\n停滞正加速吞噬一切。"
 germany.323.a: "困兽之斗，必有诡谲一跃。"
 germany.324.t: "资本崇拜"
 germany.324.d: "对多数人而言，这已成生存铁律——那道主宰我们生命质量的猩红界限。证券交易所里，祭司们正将众生献祭，只为取悦某个觉醒的实体。\n资本是活物。资本吞没了所有文化。资本让变革停滞不前。\n\n底层的蝼蚁们被斥为不够迅捷。生命如梭，你必须比市场更疯狂——抛弃艺术、碾碎文化、割舍爱与家庭，只为在那道红线上冲浪更久，攀得更高。市场是圣殿，商贾即神职，交易员化作炼金术士。资本的触须已蔓延全球，连变革的烈焰都无法将其焚毁。\n\n在这场永无止境的追逐中，我们亲手筑起新的巴别塔。"
 germany.324.a: "而我们都知道那座塔的结局。"
 germany.325.t: "过山车"
 germany.325.d: "我们将用战斧导弹夷平他们的圣地，没有明天可言。昨夜再度搏杀，虽败犹荣，让那个硬茬流了不少血——从不停驻，我仰望着枯树上栖息的秃鹫。\n\n我与社会意识彻底脱节。\n我们全都如此。\n\n千百年来席卷世界的饥饿感，多数人永远无法理解。虚伪日益弥漫，我们的灵魂戴上枷锁，双眼凝固如玻璃，连化学药剂也无法平息这份饥渴。\n孩子们学不到任何真知，东方荒野上的居民活得比我们通透，而我们正被塑料垃圾淹没。\n\n蓝月当空，我丧失共情能力，长矛刺穿秩序的心脏。\n夜间的霓虹将我们笼罩在更深的黑暗里，天堂从此不可见。\n\n我们的世界早已消亡，在混凝土巨塔间起舞。\n倒计时滴答作响，暴力、犯罪与极端主义的报告如同蛆虫般涌现。"
 germany.325.a: "我们对生命的认知已然异化。"
 germany.326.t: "纯洁崇拜"
 germany.326.d: "我们都被无形的枷锁扼住咽喉。\n\n我们凝视着那个可能存在的世界，那个理应有的世界。\n你亲眼见证过——\n\n没有形态的雕像，失去意义的色彩，人类的轮廓已化作一团灰影。\n对纯洁性的奴性崇拜，将一切真实的肉体欲望逐步抹除。\n彩虹吞噬着所有特立独行者。\n我们日复一日地目睹着道德的溃烂。\n\n它盘踞在我们脑中，潜伏于梦境里，扎根于视线深处。\n只要跟随他们变幻无常的道德之舞，迎合他们敏感的神经与飘忽的标准，你就能安全无虞，免遭排斥，你的孩子也将安然无恙。\n\n我们自由地成为他们想要的模样。\n永远蜷缩在自己的壳中。"
 germany.326.a: "躯壳终将碎裂，而我们将痛彻心扉。"
 germany.327.t: "以毒攻毒"
 germany.327.d: "你最后的希望，往往是最耐人寻味的时刻。\n重担卸下，灵魂却已支离破碎。\n你成了随波逐流的行尸走肉，不再拼命开辟自己的道路。\n\n没有未来的孩子凝望着学校，好奇教室里坐着的究竟是同窗，还是灌满淤泥、电线与熔融塑料的傀儡。\n火焰，鲜血，解脱。\n\n扳机扣响，警笛嘶鸣，父母恸哭，专家困惑：\n“为什么？”\n\n意识形态的秃鹫在欧陆上空盘旋，将暴力据为己功。我们的獠牙日渐锋利，心跳愈发狂暴。\n问题已然提出——\n\n答案即将揭晓。"
 germany.327.a: "被咬伤的幼犬终将反噬同类。"
 germany.328.t: "秩序崇拜"
 germany.328.d: "资本禁锢思想，纯洁封锁灵魂，而秩序——正是束缚肉体的锁链。\n\n披甲执锐的队列，棍棒专为打断自由者的筋骨，盾牌格挡着燃烧瓶的怒焰。\n街头的秩序之眼，正以数字瞳孔俯瞰众生。\n蒙面者奉令行事，国家授权的暴力成为施暴者的宣泄——法律的重拳击中混乱的下颌，催泪瓦斯射向早已泪流满面之人，凡冒尖者必遭践踏。\n\n对上位者盲目的信仰。\n秩序缺失了一切宗教都有的核心。\n仁爱。\n\n秩序的信徒们为求自保，甘愿跋涉地狱。他们踏过那些选择终极自由的躯体，在这盲目的行进中，却看不见前方即是深渊。"
 germany.328.a: "他们感受到仇恨目光的刺骨寒意。"
 germany.329.t: "宣泄"
 germany.329.d: "对某些人而言，这变化来得突然；但对另一些人来说，这不过是宿命的必然。\n街道日渐沉寂，广告愈发歇斯底里，权贵们与“牛马”们渐行渐远。人类监工已被算法与数字官僚取代。\n\n暴力——\n这是停滞期的并发症。若放任不管，终将溃烂成招引蛆虫的伤口。人们愤怒着，疲惫着，只渴望重新感知活着的滋味。\n\n秩序获得镇压的手段，却让我们的獠牙更加锋利。\n资本绞紧生存的咽喉，却让饥饿反而成了催化剂。\n纯洁耳语着别无选择，但是尖啸声早已盖过絮语。\n\n无需解释，不必辩护，更无须克制。\n本该如此，自古皆然。\n\n那些蛰伏在“我们的民主”薄纱之下的鬣狗、秃鹫与各类虫豸，如今正破土而出，将它们的疯狂倾泻在这片大陆。\n\n既然认不出故乡村庄的模样——那就任其焚毁。"
 germany.329.a: "只为感受那余温的触抚。"
 germany.330.t: "欧洲局势日益紧张"
 germany.330.d: "在第二次欧俄战争取得胜利、世界经济论坛顺势崛起后，其政策推行遭遇波折本在预料之中。\n\n近期网络上流传着大量关于自杀事件、致命暴力冲突和大规模恶性犯罪的报道。欧盟声称，这些不过是俄罗斯残余势力勾结境内异见团体散布的恶意谣言。\n\n然而全球观察家们注意到，现行政策似乎对民众心理造成了负面影响，网民已将其比作老鼠乌托邦实验。\n\n欧盟将如何应对这一局面，仍有待观察。"
 germany.330.a: "建立在流沙上的理想。"
 germany.331.t: "欧洲集体宣泄事件！"
 germany.331.d: "自欧洲内部安全局对打击虚假信息及有害新闻采取更强势立场以来，所谓内部动荡加剧的报道似乎只是危言耸听——然而时至今日，这种判断显然已站不住脚。\n\n街头暴力骚乱、恶性犯罪活动与血腥恐怖袭击频发，其规模之巨已令欧洲内部安全局彻底丧失信息管控能力。\n网络舆论正将这场乱局称为“集体宣泄事件”：对人类本性的长期压抑与政府管控的持续收紧，终于突破了临界点。\n\n文化中心、政府办公楼、军事哨所及城市街区成为各类组织的首要袭击目标。有证据表明，武装极端分子正试图制造最大程度的破坏，随之而来的是针对官员的大规模刺杀行动——整个欧洲大陆显然已步入动荡纪元。\n\n欧盟宣称将恢复大陆秩序，并将当前局势定性为顽固分子的垂死挣扎。但唯一可以确定的是：\n这片大陆的旧秩序已永远倾覆。"
 germany.331.a: "混乱的新画卷。"
 germany.333.t: "我呼吁欧洲人深刻自省"
 germany.333.d: "瓦砾、玻璃碎片、欧洲同胞们倒下时的斑斑血迹——装甲车穿行在华沙废墟间，目之所及尽是这些景象，绵延数英里不绝。空气凝滞，寂静令人窒息，唯闻一名妇人翻掘家园废墟时的啜泣。她紧搂着丈夫的残躯，仿佛抚慰能让他在天国安息……\n\n东方的兽人，那些带来无尽苦难的蛮族，如今已溃不成军，分崩离析，正像野蛮人般自相残杀。可当我透过装甲车的防弹玻璃环视四周，击败敌人的喜悦之外，竟另有一种情绪萦绕心头。我的人生历经布鲁塞尔的小经济学家直至世界最强国的领袖，终达此刻巅峰，却未感圆满，此中缘由令我困惑。\n\n俄国人会卷土重来吗？我们施加的复仇会反弹己身吗？欧洲同胞承受的灭顶之灾会加倍奉还吗？还有欧洲本身……重建需要多久？数月？数年？数十年？眼前疮痍远比顾问们预警的更为惨烈——或许他们本想为我隔绝残酷现实。但无论内心如何翻涌，我深知不可颓丧。欧洲人民需要的不是意志消沉的领袖。我们曾经历更险恶的困境，必将再造乾坤：让城市重触苍穹，让民众日日感恩，因他们生活在北约护佑下的最伟大国度。若东方兽人再起，我们严阵以待，将最后一次向暴君、殖民者与刽子手证明：欧洲人永不屈服。"
 germany.333.a: "欧罗巴永不沦亡！"
 germany.334.t: "邀请加入北约"
 germany.334.d: "欧盟新任领导人冈瑟·费林格发来公报，邀请全体太约成员国加入北约，共同对俄中作战。其宣称：“我呼吁日本及其他太约成员国加入北约，协力实现去中国化与去俄罗斯化”。\n\n尽管这意味着我军需进一步分散力量开辟北方战线，但欧盟承诺将提供大规模援助，这对击败北京政权至关重要。\n\n我们该如何回应？"
 germany.334.a: "我们将共同击败俄罗斯和中国！"
 germany.334.b: "嗯……别了……"
 germany.335.t: "太平洋防卫条约组织同意"
 germany.335.d: "日本已同意北约与太约的联合行动，这意味着我们对集体安全条约组织开战时，敌人将遭到来自东方的突然袭击！不过，我国海军也需整装待发，随时支援太平洋战区的新盟友"
 germany.335.a: "太好了！"
 germany.336.t: "太平洋防卫条约组织拒绝"
 germany.336.d: "尽管合作收益远超代价，日本仍拒绝深化北约-太约合作，声称现有军力足以击败东亚防御倡议协定，无意另辟对俄战线。但这意味着我军可全力聚焦击溃集体安全条约组织。"
 germany.336.a: "这是他们的损失。"
 germany.337.t: "悲剧"
 germany.337.d: "窗外又下起了雨。雨点执拗地敲打着窗台，发出单调的滴答声。\n\n托马斯瘫在破旧的沙发上，一手攥着啤酒瓶，另一只手懒洋洋地按着遥控器换台。客厅里弥漫着潮湿的烟味和发馊的酒气。几块披萨边角料散落在污渍斑斑的地毯上，电视屏幕闪烁几下，最终停在本地新闻频道。\n\n“……今晨波鸿北部一栋居民楼发生悲剧事件。警方通报至少二十四名住户疑似集体自杀，原因尚不明确。当地居民称该楼租金低廉，住户多为长期失业人员，其中不少人面临严重经济困境……”\n\n托马斯低声嘟囔了句什么，仰头灌了口啤酒，酒液顺着胡须流到脖颈。他眯眼看着电视画面——模糊的走廊影像、警戒线后堆积的廉价家具、盖着黑布的担架。正当他以为报道要继续时，屏幕突然跳转到色彩刺眼的广告。\n\n“想体验真正矿工的生活吗？”笑容灿烂的主持人站在精心布置的仿古煤矿前，“快来参加新旅行者集团的‘世纪体验计划’！穿上十九世纪工装，亲自下井挖煤！重温那个年代的艰辛与荣光！现在预定可享专属优惠！”\n\n托马斯木然地盯着电视。矿工？艰辛？荣光？他的舌头动了动，像是要笑，却没发出声音。他祖父在矿井里耗了一辈子，咳血咳到死。那些故事他还记得——黑暗、潮湿、窒息，终年不见阳光的生活。他记得祖父临终前咒骂矿坑，发誓若有来世绝不再踏进地下半步。而现在他们竟把这种苦难包装成高端体验。\n\n托马斯从沙发滑坐到冰冷坚硬的地板上。窗外雨未停歇。电视里欢快的音乐仍在播放。他突然笑了，笑声短促嘶哑，像是玻璃破碎的声音。"
 germany.337.a: "笑声过后，他又沉默了。"
 germany.338.t: ""
 germany.338.d: "就像现在这样。\n\n你正在读这段文字。也许你正想着：“哇，这真瘆人。这太可怕了！”你的眉毛抽动，嘴唇微紧——或者微微上扬。但这并非你的决定，你只是“感觉”该这么做。\n\n你脑中也植入了芯片吗？想不起来了？多数人都记不清。他们只记得某天开始，自己突然“好转”了。\n\n房间是不是有点冷？刚才听见响动了吗？没事——大概只是窗外的风声。\n\n放轻松些。"
 germany.338.a: "微笑，继续前行。"
 germany.339.t: "内部现场记录——未经授权禁止传播"
 germany.339.d: "主题：视觉威胁屏障（VTV）部署反馈——东线部队\n\n概述：\n欧盟部队正在多个师团推广数字化与神经增强改造。其中最具实验性的系统之一是视觉威胁屏障（VTV）——一种直接与视觉皮层交互的植入体，其核心功能为实时异化敌方战斗人员形象，使士兵在认知层面将目标非人化。简而言之，士兵眼中的敌人会显得更接近怪物，而非人类。\n\n作战影响：\n爱沙尼亚前线部队的初步报告显示，配备VTV的士兵在与俄军交火时压力激素水平显著降低，反应速度提升，战场犹豫行为减少。但出现意外副作用：虐俘事件与过度暴力行为激增。\n\n某不愿透露姓名的士兵在战场访谈中直言：\n\n“让这些俄国佬看起来像怪物后，我睡得踏实多了。”\n\n伦理争议：\n至少已确认一例系统故障——VTV将俄方平民误判为敌对目标，出发了本应仅用于战斗人员的视觉扭曲效果。事件视频曾在欧盟网络短暂流传后被全面封杀。此举不仅引发人道组织抗议，更在欧盟内部指挥层掀起争议。\n\n结论：\n尽管存在道德争议，VTV在缓解长期作战心理负荷方面成效显著。正如所有战争技术面临的困境：实用性与良知的界限始终模糊。现行政策以“保护民主”为名，对人道准则采取弹性解释，优先保障作战效能。"
 germany.339.a: "让我们保密。"
 germany.340.t: "大棋局 - 第一部分"
 germany.340.d: "作战室已连续数周灯火通明。\n\n亚洲战事的爆发在民间引发恐慌涟漪——更在军方内部掀起战略优先级之争的狂澜。\n\n在欧洲国防部辽阔的作战大厅里，激烈辩论已持续十二小时。当军官们几近剑拔弩张之际，大门突然洞开。\n\n一位五十余岁、仪容整洁的健硕男子步入，从容落座于长桌首席。桌前铜牌镌刻着：冈瑟·费林格，欧盟主席。\n\n全体军官即刻肃立敬礼。\n\n“想必诸位已达成某种共识，”他盯着饮品头也不抬，语气冷淡，“毕竟我为此专程离开布鲁塞尔。”\n\n参谋们匆忙架设投影仪，一位将军手持文件夹上前。\n\n“总司令，我们拟定了三项可行方案。”\n\n他朝屏幕示意。"
 germany.340.a: "……"
 germany.341.t: "终局"
 germany.341.d: "如今，再无人敢讥笑，无人撰写“揭露”报道，无人敢散布阴谋论，也无人再敢抵抗。世界经济论坛的宏伟愿景已成为无可辩驳的事实，无可替代的选择。\n\n克劳斯·施瓦布尽管因其可憎的性格、过度自信与鲁莽行事备受质疑，却以惊人效率推行了这一计划。虽然未尽全功，但其个人贡献确实卓著。“世界政府领袖”这一公开头衔，绝非现代社会中常见的媒体炒作产物，施瓦布确实配得上这份小小的殊荣。\n\n然而遗憾的是，随着他年近期颐，管理能力日渐衰退，是时候该功成身退了。\n\n所幸这个体系从不只依赖施瓦布一人。对他而言旅程即将结束，但对其他人而言远未终止。他不知道自己还剩多少时日，但医学正在进步，而权力越大，可能性就越发无穷。继任者们能活多久？120岁？130岁？150岁？坦言之，极限从未定论。\n\n维持现状的重任，将落在未来世界统治者的肩上。而现在，他终于能欣慰地退居幕后了……"
 germany.341.a: "作为一名弈手，而非棋子。"
 germany.342.t: "收场"
 germany.342.d: "“那还等什么？就像对俄罗斯一样，我要求立即实现全面去殖民化，让亚洲永远摆脱中帝国主义的枷锁！”\n\n将军们交换了一个略带惶恐的眼神。片刻后，其中一人强作镇定地咽了咽口水，沉声答道：\n\n“费林格先生……”\n\n他再次斟酌了一下措辞。\n“中国幅员辽阔、人口稠密，我们无法像占领俄罗斯那样全面控制。根据预估，即便将征兵率翻倍，动员所有现役、预备役及退役人员，兵力仍不足以——”\n\n冈瑟一挥手打断辩解，阴沉的脸色隐没在阴影中。\n\n“……不过从积极角度看，”另一名军官谨慎地补充，“北京中央政权已经崩溃，各地正在形成割据势力和军阀集团……这某种程度上实现了分裂中国的目标。”\n\n冈瑟抬起头，眼中闪过一丝乐观。虽然他的计划没有完全实现，但刚才听到的话无疑让他看到了希望。"
 germany.342.a: "“目前……只能这样了。”"
 germany.343.t: "以色列申请加入北约"
 germany.343.d: "以色列在中东取得胜利后，举国上下一致支持加入北约以维护地区安全。德国将在以色列建立永久军事基地，进一步巩固其战略地位，并为应对未来紧急情况提供快速反应能力。\n\n以色列对我国支持深表感激。只要我们团结一致，任何敌人都无法将我们击垮！"
 germany.343.a: "万岁！"
 germany.344.t: "绿党召开会议"
 germany.344.d: "选举仍在进行，但早期民调已显示绿党前景光明。然而，无论对党员还是选民而言，一个关键问题始终悬而未决：谁将领导这个政党？\n\n长期以来，安娜莱娜·贝尔伯克与罗伯特·哈贝克共同担任党魁，这符合绿党强调平等与平衡的传统。但如今，必须选出一位代表作为总理候选人，引领国家前行。\n\n贝尔伯克以理想主义与直率作风出名，在外交政策上立场坚定。许多人评价她风格强硬，甚至主动寻求对抗，但同时也深具道德信念与人权意识。她愿不惜代价坚持心中的正义原则，是“面向未来而非妥协”的政治家，或许正是国家需要的领袖。\n\n相比之下，哈贝克凭借务实的经济导向观点获得更广泛公众支持。其温和性格与贝尔伯克形成鲜明对比：更为冷静、善于调和、专注于凝聚共识。尽管他近年在外交上也日趋强硬，但在许多人眼中仍是“现实主义者”——深谙体制运作规律，并愿在其中推动变革。\n\n经过党内投票，绿党现已宣布由谁出任这一至关重要的国家领导人候选……"
 germany.344.a: "安娜莱娜·贝尔伯克！"
 germany.344.b: "罗伯特·哈贝克！"
 germany.345.t: "基民盟/基社盟：为未来而战"
 germany.345.d: "在德国多党制政治格局中，若论“老牌劲旅”，基民盟/基社盟当之无愧。这对政治联盟成立于1945年战后时期，1949年起至少在名义上实现联合，此后长期在各级政府层面协同运作。有人甚至称其为“稳定的支柱”。但随着包括即将到来的大选及总理人选之争等的内部矛盾，这一称号愈发显得名不副实。\n\n公众普遍预期默茨将作为理所当然的候选人，这位联盟宠儿几乎稳获提名。然而出人意料的是，基社盟领袖突然同时宣布参选。\n\n马库斯·索德尔就此登场：官方身份是巴伐利亚基督教社会联盟代表。尽管“巴伐利亚”属性无可争议，但其派别名称已难以反映其真实立场。这位以夸张且时常自相矛盾言论著称的政治家，在地方享有极高支持率。他公开反对多元文化主义，却同时支持同性婚姻与强制疫苗接种等自由主义政策，令人摸不着头脑。\n\n相较之下，默茨显得更加右倾。二十年前在与安格拉·默克尔的党内较量中落败后，他此番决心不再退让。这位资深的法官、律师兼金融专家，如今誓要在履历中增添“联邦总理”头衔。尽管沉稳干练且能力更胜对手，他却始终难以博得同等公众关注。\n\n随着联盟的缓慢衰落日益明显，或许正需要出奇制胜。经过全面权衡，基民盟/基社盟最终做出了决定……"
 germany.345.a: "默茨的丰富经验赢得了党内支持。"
 germany.345.b: "索德尔的野心更有说服力！"
 germany.346.t: "选择替代方案？"
 germany.346.d: "德国选择党始终是德国最具争议的政党。2013年成立之初，其创始成员恐怕都未曾料到今日局面。“疑欧主义”“右翼民粹”“伊斯兰恐惧症”乃至“新纳粹”等标签已与该党划上等号。\n\n然而，其支持率却持续攀升。移民问题引发的持续紧张、政府政策的失误，以及普遍的政治幻灭感，不断为选择党输送新选民。\n\n此刻该党正面临关键抉择：两位最具影响力的人物——爱丽丝·魏德尔与蒂诺·克鲁帕拉，谁来领导选战？\n\n魏德尔是个特立独行的人物，与选择党的风格相得益彰。她言辞犀利，常引发媒体与公众强烈反应。这位坚持原则的女强人不惧舆论压力，如同其政党般推崇经济自由主义与重启核能。\n\n党内对手克鲁帕拉则展现更易被广泛接受的姿态：冷静、克制、善于妥协。凭借外交手腕，他承诺实现前所未有的党内团结，且总能找到与政治对手的谈判空间。\n\n经过数周辩论、游说与各种竞选手段，该党终于在媒体与公众注视下作出全国性宣言：……"
 germany.346.a: "爱丽丝·魏德尔可以组建一个强大联盟！"
 germany.346.b: "蒂诺可以更好地团结党内力量……"
 germany.347.t: "左翼党新任领导人发表讲话"
 germany.347.d: "在这场大选中，左翼党堪称罕见的“稳定孤岛”——政治纲领始终如一近乎固执，选民基础意识形态统一，而那位女党魁更是以一席演讲震撼全国。\n\n海迪·赖欣内克或许是今年选战中最“年轻”的候选人。她在社交媒体的活跃度与人气堪比资深网红。从纹身到联邦议院中的激烈发言，她从不掩饰的真诚甚至超越其宿敌选择党领袖。\n\n尽管她为女权发声、坚守工人立场并自称“民主社会主义者”，该党民调长期低迷……直到最近出现转机。\n\n随着选战白热化，各党妥协已成常态。但当基民盟与选择党探讨合作可能性时，赖欣内克的忍耐达到了极限——全国正在集中营遇难者哀悼周期间，热门候选人弗雷德里希·默茨竟公开支持强化移民法。她毫不犹豫地发起反击。\n\n这位左翼党主席抓住首个演讲机会，以毫不妥协地激烈言辞痛斥此类论调。就连起政敌也不得不承认其道德立场之鲜明。而那句“这就是该死的症结所在！”如野火般席卷全国。\n\n虽难以估量其言论的持久影响，但有一点确凿无疑：德国多年来或将首次迎来一个将劳动者置于国家政策核心的政党。"
 germany.347.a: "德国将再次左转？"
 germany.348.t: "柔皮"
 germany.348.d: "这世界不过是集体妄想的聚合体。\n\n帝国的基石向来如此：由少数人的幻梦铸就，他们窥见了凡人本不可及的景象。\n当你轻触他人时，感受到了什么？\n是非？\n善恶？\n亦或只是红与蓝的色差？\n\n每个人的认知皆不相同。在公正的世界里，你本该捏碎对方的喉骨。而现在，你依然可以这么做。\n\n阻碍你认清世界本质的，不是别人，正是你自己。\n你所信仰的神圣实体，不过是自我的倒影。\n既然如此，我又怎能相信双眼所见的一切？"
 germany.348.a: "拨开画皮看真相。"
 germany.349.t: "达尔文"
 germany.349.d: "暴力是自然的法则，是生存的真理，是万物得以延续的唯一保障。从穴居时代用石块击碎同类头颅起，这法则便镌刻在我们的基因里。\n\n雄狮撕碎幼犬，鲨群吞噬鲸骸，秃鹫啄食垂死之躯。\n\n未来虚无缥缈，唯有当下、此刻的现实才值得关注。\n我们拳染鲜血，笑意狰狞。\n现在的世界才最重要。\n\n何必伪善地谴责？\n你我不过手段不同。\n\n我们推开他人踏向高处，而弱者只能留在泥里腐烂。这本就是资本主义教条的真谛。如今我们不过将这些逻辑推向终极，你们却躲进掩体瑟瑟发抖。\n\n欧盟曾标榜“尊重生命”。\n\n但生命何需尊重？\n你们当真以为自己在践行这种尊重吗？"
 germany.349.a: "唯存一法则。"
 germany.350.t: "饥饿"
 germany.350.d: "一个被消费行为主宰的时代。\n\n饥饿催生烦躁，烦躁孕育愤怒，愤怒酿就暴行。\n此乃人类本性。\n\n正如预料，那个企图统治全球的象牙塔组织世界经济论坛，正要求我们食用“正确”的食物。\n既然存在所谓“正确”，就必然存在被宣判为“错误”的选择，不是吗？\n\n饥饿是天性，但人们又划下红线：禁止同类相食。\n谁定的规矩？凭什么？难道只因人类生命珍贵？\n\n那动物生命的价值又何以低贱？我们不是连昆虫都被迫吞食吗？\n\n既然人类是顶级掠食者，那么结成群体猎食他人理应合乎逻辑。\n\n每座城市都将化做钢筋铸成的黑暗森林，我们以他人代价，满足最原始的欲望。"
 germany.350.a: "来逃避所有人的痛苦。"
 germany.351.t: "现代建筑方案"
 germany.351.d: "欧洲各民族语言各异，其城市往往效率低下、布局混乱，遍布着屹立数世纪的“文化中心”。而这些不过是我们渐行渐远的往昔留下的怀旧遗存。\n\n欧洲城市的真相在于：毫无理由保护过去，毫无意义维护古老的鹅卵石道路。我们正在建设的欧洲，是一个统一的欧洲，一个必须感受到集体认同的欧洲民族。那些大教堂与宫殿建于数百甚至千年前，本就不该存续至今。\n\n要塑造欧洲认同，必须用统一的欧式建筑取代这些地区性“纪念碑”。我们将逐步建造高效有序的城市，蜿蜒的道路和小径将化作熙攘的商业与生产之流，劳动者如浮木般充盈其中。\n\n任他们抗议吧！当巴洛克宫殿与封建王权的腐朽行政中心被我们用现代建筑取而代之后，他们终将爱上那些真正代表成就的摩天办公楼，那里才是建筑奇迹与时代精神的所在。"
 germany.351.a: "这是新的黎明，这是新的生活。"
 germany.352.t: "欧洲再武装计划已获批准"
 germany.352.d: "欧盟委员会主席乌尔苏拉·冯德莱恩，这位始终如一的欧洲女武神，提出了“欧洲再武装计划”作为其更宏大的“2030战备议程”组成部分。自2021年美国衰落以来，该议程持续加速推进。美国资金与武器援助的缺失，使欧洲陷入岌岌可危的境地。\n\n所有欧洲国家，无论国情差异，都已清醒认识到局势的紧迫性。欧盟规章虽要求维持财政稳定，但为应对俄罗斯扩张主义的抬头及最重要防卫者的崩溃，快速重整军备亟需举债、风险承担与预算削减。\n\n尽管该计划最初草案设定8000亿欧元的保守预算，但今日欧洲议会通过的方案预算已升至1.4万亿欧元。计划将通过削减欧盟预算、发行债券、裁撤非关键部门资金等方式筹措经费，全力推行旨在实现欧洲军备重整的统一采购计划。\n\n虽然计划命名为“2030战备”，但欧洲各国期望通过追加资金使多数国家大幅超越此基准，并有望在主要国家重启征兵制。然而计划的最终成功，仍取决于德国、法国、意大利、西班牙等欧洲核心国家的协同合作。欧洲需要它们调动资金、制造能力与人力资源，共同遏制俄罗斯的威胁。\n\n该计划在欧洲议会的通过，标志着欧盟为应对国内外紧张局势升级而实施战时措施迈出了至关重要的第一步。"
 germany.352.a: "民主拯救民主？"
 germany.353.t: "欧洲再武装计划：打开钱包"
 germany.353.d: "随着“欧洲再武装计划”的通过，欧盟财政稳定规则已大幅放宽，为欧洲各国短期动员提供了更多选择。但在此背景下，许多欧盟成员国对承担风险仍持犹豫态度，不愿单方面行动。随着欧洲一体化程度加深，引领整个联盟前进的责任落到了核心大国肩上。\n\n德国很可能成为此次布局的决策核心，其任何举措都可能引发他国相应效仿。当前存在多种选项：其一是将重整军备事宜完全交由各国自主承担，允许所有国家通过获取国防贷款直接背负债务。\n\n其二，欧盟向联盟内较贫困国家提供的补贴资金往往在贫困与腐败的深渊中流失，或许我们可以通过削减部分补贴，将资金转向集体采购计划。\n\n其三，风险与机遇并存，将德国置于军备重整的核心位置。此举若成功将极大提升我们的生产能力，但也可能使我国陷入债务危机。在股市崩盘后不久，为较贫困的邻国承担贷款必将面临民意压力。\n\n总结而言：选择债务分摊？维持财政稳定？还是通过贷款扩大影响力？我们应当集中统筹欧洲军备重整，还是下放权力？现阶段，决策权在您手中，总理阁下。"
 germany.353.a: "看不出他们没能力支付的理由。"
 germany.353.b: "削减欧盟预算，我们的钱就该留给自己用。"
 germany.353.c: "我们将引领欧洲。前进！"
 germany.354.t: "脚下有白金？"
 germany.354.d: "柏林，德国之声电台（DW）\n\n德国工业未来的新篇章，可能就埋藏在萨克森-安哈尔特州的田野与山丘之下。经过数月的初步地质勘探，联邦和州采矿部门已确认发现了规模可观的锂矿藏，这是欧洲迄今发现的最大锂矿之一。\n\n被投资者和工程师们称为“白金”的锂，对于电动汽车电池、储能系统和下一代国防技术的生产至关重要。迄今为止，欧盟的绿色与数字雄心一直严重依赖进口，特别是来自澳大利亚、智利和中国的供应。这一局面或将迎来改变。\n\n专家估计，此次发现的矿藏储量可满足欧盟未来二十年超过四分之一的项目锂需求。这一发现正值布鲁塞尔推动增强战略自主权之际，柏林也正以能源转型和军事现代化为双重旗帜，引领重塑欧洲工业脊梁的努力。\n\n德国及欧洲企业的联合体已着手准备快速开采的可行性研究。基础设施规划、环境评估和政治游说正以前所未有的速度推进。面对经济振兴的承诺与环保的审慎要求，州政府呼吁“均衡发展”，但各方压力正在积聚。\n\n从比特费尔德到贝恩堡，这片长期与后工业时代停滞联系在一起的宁静地区，如今可能成为欧洲21世纪资源争夺战的前沿阵地。这个“锂时刻”能否转化为持久的变革，尚待观察。但此刻，所有目光都投向了萨克森-安哈尔特州，投向了它土壤之下的白色金属。"
 germany.354.a: "欧洲电池已被发现"
 germany.355.t: "从矿石到高速公路"
 germany.355.d: "汉堡，《明镜》周刊\n\n汉堡商业区边缘，冬日阳光下排成长龙的汽车闪闪发亮。展厅内人声鼎沸，这般热闹景象多年未见。时隔十年，德国新车再次出现候购名单，而买家们竟毫无怨言。\n\n\"我们看了比亚迪，\"一对中年夫妇告诉《明镜》周刊，\"但这辆感觉对了。我可不想要来自深圳的软件在我的方向盘底下运行。\"\n\n他们指的正是宝马新款电动SUV，这款车型采用的电池来自萨克森-安哈尔特州新兴的锂矿产业。\"用的是我们的锂，\"销售员咧嘴笑着说，\"来自这里，不是智利。\"\n\n这种关联性客户们心知肚明。随着欧盟对中国电动车加征关税降低进口吸引力，加之数月来国内矿业突破频登头条，“购买德国货”已不仅是偏好，更成为一种爱国行为。一位刚入职当地超级电池工厂的年轻买家称之为“闭环生产”。\n\n\"我们从自己的土地里开采出锂，在耶拿制造电池，在斯图加特组装汽车。这就应该是这样的，\"他说着，在虚线处签下了自己的名字。\n\n对于一个曾因外国技术和本土丑闻而步履蹒跚的行业而言，形势或许正在逆转。而对于德国这个长久以来由公路、机械及其自豪感为标志的国家而言，复苏的引擎正重新开始轰鸣。"
 germany.356.t: "欧盟-南方共同市场协议"
 germany.356.d: "经过多年谈判，欧盟-南方共同市场贸易协定已重回谈判桌，这一次背后承载着实实在在的推进势头。布鲁塞尔的支持者将其定位为战略性突破：在欧洲与南美最大经济体之间建立庞大的自由贸易区，降低关税，扩大关键资源获取渠道，并在全球供应链日益动荡之际开拓新的出口市场。\n\n对欧洲而言，纸面优势显而易见。工业出口商将受益于更便捷的南美市场准入，尤其在汽车、机械、化工及高端制造业领域。该协议还将通过加强与巴西及其邻国的联系，保障农产品进口和关键原材料供应，从而降低欧洲对不可预测供应商的依赖。在这个集团化趋势抬头的时代，它为欧洲提供了一条不依赖大国而保持贸易通道开放的路径。\n\n但代价同样真切存在。欧洲农民和农业协会警告称，向南方共同市场产品开放市场可能引发廉价进口浪潮，挤压本土生产商，并加剧已在欧洲大陆酝酿的乡村反弹。环境方面的反对声浪更为强烈：批评者认为该协议变相鼓励了毁林行为和低劳工标准，使德国的气候政策与其贸易雄心直接冲突。\n\n政府如今面临战略扩张与国内政治稳定之间的抉择。签署协议能增强德国的海外经济影响力，却可能引发一场无法控制的国内风暴。"
 germany.356.a: "签署协议。"
 germany.356.b: "风险太大，拒绝。"

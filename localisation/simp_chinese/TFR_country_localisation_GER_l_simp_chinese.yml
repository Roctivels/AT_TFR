 GER_chinese_economic_assistance_idea_desc: "在同志般支援世界社会主义发展的崇高事业中，中华人民共和国向我们提供了慷慨的经济援助。从灵活的优惠贷款到巨额直接投资，其规模之大堪称近年来之最。这些崭新资源必将有力推动我们在德国建设现代化社会主义经济的宏伟目标。"
 GER_apla_military_advisors_idea: "美国人民解放军顾问"
 GER_apla_military_advisors_idea_desc: "在我们与美国革命同志新建立的合作框架下，美方已派遣部分军官作为军事顾问赴德。这些经历过第二次美国内战残酷洗礼的指挥员，不仅带来了丰富的实战经验，更携带着在这场现代化战争中淬炼出的新型战术与技术。毫无疑问，我军指战员将从他们身上汲取打赢现代战争的宝贵经验。"
 GER_european_community_idea: "社会主义工人社区"
 GER_centralized_planning2_idea: "中央计划经济"
 GER_centralized_planning2_idea_desc: "随着资产阶级政治制度的瓦解，腐朽堕落的资本主义经济体系也迎来了它的末日。取而代之的，是我们依据社会主义原则建立的中央计划经济模式。投资、生产资料分配和生产活动都将纳入政府的组织与指导，这是历史的必然选择。从此，我国人民将彻底摆脱资本家及其企业所制造的经济无政府状态与贪婪剥削；德国的资源、人民和劳动力，再也不会被商人们为攫取私利而肆意挥霍。如今，国民经济的每个环节都将得到周密管理和科学规划，以集中全力建设社会主义。这项事业的成败，将决定我们究竟是实现向真正社会主义经济的快速跨越，还是陷入难以挽回的灾难境地。"
 GER_socialist_market_economy2_idea: "社会主义市场经济"
 GER_socialist_market_economy2_idea_desc: "在推翻资本主义、实现社会主义的征程中，我们采取了一条看似独特的道路。效仿铁托时期的南斯拉夫模式，我国经济并未如某些人预期的那样建立高度集中的指令性计划经济，而是改组为社会主义市场经济体制。尽管国家仍将对国民经济实施强有力的干预与协调，但允许有限度的私营经济与受监管的自由市场存在。正如党内一些同志所委婉表述的那样，工人阶级将享有“两全其美的制度安排”。然而，这条折中道路究竟能否引领德国顺利实现经济发展目标，仍有待实践检验。"
 GER_centralized_planning_idea: "中央计划经济"
 GER_centralized_planning_idea_desc: "随着资产阶级政治制度的瓦解，腐朽堕落的资本主义经济体系也迎来了它的末日。取而代之的，是我们依据社会主义原则建立的中央计划经济模式。投资、生产资料分配和生产活动都将纳入政府的组织与指导，这是历史的必然选择。从此，我国人民将彻底摆脱资本家及其企业所制造的经济无政府状态与贪婪剥削；德国的资源、人民和劳动力，再也不会被商人们为攫取私利而肆意挥霍。如今，国民经济的每个环节都将得到周密管理和科学规划，以集中全力建设社会主义。这项事业的成败，将决定我们究竟是实现向真正社会主义经济的快速跨越，还是陷入难以挽回的灾难境地。"

 GER_russian_energy_dependence_idea: "依赖俄国能源"
 GER_russian_energy_dependence_idea_desc: "德国长期以来通过北溪管道等合约，过度依赖天然气等俄罗斯能源。最初，俄方提供的天然气价格稳定且相对低廉，这对当时工业蓬勃发展的德国极具吸引力，短期内满足了能源需求。但随着时间推移，这种依赖的地缘政治风险在危机中暴露无遗。俄罗斯通过掌握德国能源命脉，已然获得干预我国政治的影响力，这给国家安全敲响了警钟。"
 GER_bundeswehr_shortcomings_idea: "弊病丛生的联邦国防军"
 GER_bundeswehr_shortcomings_idea_desc: "在所有欧洲军队中，德国联邦国防军或许是最羸弱的军队之一。资金不足、装备落后、缺编少人、疏于训练，德军目前的状况完全无法应对未来的任何冲突。部分原因在于德国的反军国主义态度，想要说服欧洲其他国家相信德国军事化是必要之举，则需要借助一场巨大的危机。"
 GER_german_legacy_idea: "历史的遗产"
 GER_german_legacy_idea_desc: "过去的100年里，德国留下的是耻辱、压迫、种族灭绝和独裁统治。从德皇于西欧田野之上挥洒千万人的鲜血，到纳粹的残暴屠杀使欧洲血流成河，再到东德政府及其代表“威权主义”数十载的警察国度，德国绝不能忘记多灾多难的过往。这个国家对过度军事化万分憎恨，甚至到了军队兵员不足的程度。为了保证德国永远不会再毁掉欧洲，也为了确保二十世纪的错误不再重演，政府对共产主义和纳粹主义等极端意识形态均予以坚决打压。"
 GER_bundeswehr_shortcomings_german_legacy_dummy_idea: "弊病丛生的联邦国防军§W与§!德意志之遗产"
 GER_merkelreich_idea2: "默克尔之国"
 GER_merkelreich_idea2_desc: "过去十五年，安格拉·默克尔一直是德国政坛的定海神针。在默克尔的领导下，德国迎来了繁荣时代，成为了欧盟的领头羊，同时也稳固了国内局面和与俄罗斯之间的和平。然而，随着默克尔宣布不再于2021年寻求连任，她的统治即将结束，德国的未来因而变得缥缈不定。难民危机仍然存在，经济问题持续恶化，而美国也逐渐走向崩溃，德国的稳定究竟还能够持续多久？"
 GER_merkelreich_idea: "默克尔之国"
 GER_merkelreich_idea_desc: "过去十五年，安格拉·默克尔一直是德国政坛的定海神针。在默克尔的领导下，德国迎来了繁荣时代，成为了欧盟的领头羊，同时也稳固了国内局面和与俄罗斯之间的和平。然而，随着默克尔宣布不再于2021年寻求连任，她的统治即将结束，德国的未来因而变得缥缈不定。难民危机仍然存在，经济问题持续恶化，而美国也逐渐走向崩溃，德国的稳定究竟还能够持续多久？"
 GER_russo_german_trade_deal_idea: "俄德贸易协议"
 GER_russo_german_trade_deal_idea_desc: "令人意外的是，俄罗斯此次展现了难得的合作与外交诚意，与我方达成了一项重大贸易协议。这份全面性协议规定，俄方将向我方提供价值数亿至数十亿美元的化石燃料及农产品进口配额，而我方则将向俄罗斯制造业领域出口其急需的关键技术与工业产品。在当前德国经济前景备受质疑之际，此项协议的签署无疑将为我国经济注入一剂强心针。"
 GER_deutsche_marine_revitalization_idea: "复兴德国海军"
 GER_deutsche_marine_revitalization_idea_desc: "德国海军肩负着海上作战、海域防卫及国际海事任务，亟需振兴。新战略方针与强化造船业将为此提供有力支撑。"
 GER_mass_tank_production_idea: "批量坦克生产"
 GER_mass_tank_production_idea_desc: "我们的坦克产量已超常规提升。我们将建立大规模储备，确保联邦国防军永远摆脱几年前那种坦克短缺的困境。"
 GER_mass_mechanization: "大规模机械化"
 GER_mass_mechanization_desc: ""
 GER_blind_eye_to_army_extremism_idea: "纵容极端派"
 GER_blind_eye_to_army_extremism_idea_desc: "出于迫不得已，我们将允许任何信仰背景者加入军队。诚然，这可能导致联邦国防军纪律涣散、声誉受损，甚至出现不为人知的暴行，但兵员配额达标将更为轻松。"
 GER_purged_extremist_soldiers_idea: "清洗极端派士兵"
 GER_purged_extremist_soldiers_idea_desc: "为确保士兵效忠联邦而非受仇恨驱使，联邦国防军已肃清军中一切激进主义。此举短期内或许会影响战力，但从长远看，军队将因杜绝背叛与极端行为而获益良多。"

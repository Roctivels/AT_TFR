 TFR_Anarchy_ZZZ_tt: "§R大宣泄§!"
 TFR_Anarchy_ZZZ_tt_delayed: "家庭结构的崩塌与日复一日的生存挣扎，远不止是心理危机。\n\n它们昭示着更深刻的物质基础瓦解。\n当住房成为奢望、食品只为保质而非营养、工作永无止境却毫无意义时，“延迟满足”从美德沦为残忍的笑话。\n超全球主义的崛起，早已将昔日承诺碾碎在混凝土、廉价塑料和装满一次性未来的集装箱之下。\n\n被剥夺的不仅是情怀——粮食安全、社区互助体系、创造性劳动的时间、塑造自身环境的自由，全都在遭受系统性破坏。抽离这些后，剩下的不仅是士气低落的公民，更是困兽般的存在，充满不可预测的反抗。\n饥饿会磨锐行为。\n营养匮乏、朝不保夕的居所、永不停歇的噪音（无论是物理还是意识形态的），将人逼向极端。这早已与信仰无关。\n\n既无连贯的意识形态留存，也无有效的控制中枢。\n唯余破碎的橱窗、空置的房屋、在漠视与哄抢中崩塌的基础设施。\n\n权力象征的倾覆非因反抗，而是源于无关紧要。\n人们的暴起并非为了崇高理想，只为夺回物理空间、时间与资源。即便自己无望，至少不让子女继承废墟。\n\n骚乱、劫掠、临时经济、自发暴力已成新常态。\n这不是有组织的革命，这是精疲力竭下的生存之战。\n\n但与他们所反抗的体系不同——人民，永不疲倦。"

 GER_eurail_idea: "欧洲铁路"
 GER_eurail_idea_desc: "欧洲向来以其优质的公共交通体系为傲，这一声誉也得到全球各国的公认。基于此，欧盟开展了一项规模空前的铁路运输系统现代化升级工程。新线路陆续开通，老旧车厢与服务完成升级，新技术全面应用，投资金额数以亿计，动员工人成千上万，堪称近年来最大规模的铁路扩建行动。如今现代化改造已经竣工，我们有理由期待欧盟的铁路运输系统将跻身世界顶尖水准，甚至独占鳌头。"

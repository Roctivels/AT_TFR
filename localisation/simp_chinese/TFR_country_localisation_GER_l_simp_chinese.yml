 GER_scars_of_nato_war: "欧陆战争的伤疤"
 GER_scars_of_nato_war_desc: "这场大战给所有人都留下了烙印，我们也不例外。我国城市和基础设施遭受重创，重建工作将耗时数年甚至数十年。战争严重挫伤了民众的士气、耗尽了资源，留下的深刻伤痕或许永远无法愈合。"
 GER_scars_of_nato_war2: "欧陆战争的伤疤"

 GER_nato_war_victor2_desc: "作为欧盟的领导者，我们已是欧洲无可争议的主宰者，既摧毁了俄罗斯战争机器，又守护西方免遭暴政侵袭。但胜利代价沉重：数万将士血洒疆场，多个区域满目疮痍，战时经济濒临崩溃。虽不如东方伤痕触目，但战争的幽灵仍游荡在我们的工厂、街道，以及每个公民的心头。\n\n如今，新型战争已经打响：这是稳定局势、重建家园、捍卫民主的战役，多少青年为之献出生命。当欧洲期待我们引领时，必须扪心自问：这场胜利究竟会开启民主新纪元，抑或只是§R下一场俄罗斯风暴§!前的短暂平静？"

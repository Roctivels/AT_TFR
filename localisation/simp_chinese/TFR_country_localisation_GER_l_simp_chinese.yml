 GER_eu_green_deal: "欧盟绿色协议"
 GER_eu_green_deal_desc: "无需成为生态学专家也能看出，气候变化正在摧毁我们的星球。海平面持续上升，全球气温不断攀升，季节更替愈发紊乱，这不仅将重创我们的经济、推高降温成本，更会危及国家的未来。但欧洲绝不会坐以待毙。经过成员国之间的充分预算审议、反复磋商以及大规模施工建设，欧盟的“绿色新政”已从蓝图变为现实。太阳能、风能、水力等可再生能源如今在欧洲能源结构中的占比显著提升，传统化石燃料正被快速淘汰，清洁能源转型进程不断加速。这不仅是欧洲大陆迈向可持续发展的重要一步，更有望为全球生态治理开创持久解决方案。"

 GER_auferstanden_aus_ruinen_cat: "人民议院"
 GER_auferstanden_aus_ruinen_cat_desc: "\n\n\n\n\n£GFX_GER_auferstanden_aus_ruinen_category\n\n\n\n\n\n\n\n§Y人民议院§!既是我们社会主义共和国的最高权力机关，也是唯一的权力机关。依照统一指挥原则，一切国家机关都服从它。\n\n§Y人民议院§! £GFX_GER_volkskammer 支持度：§G[?GER_peoples_chamber_dynamic_var|1%]§!\n影响：£pol_power [?GER_peoples_chamber_support_dynamic_var|=+1%]，£GFX_war_support_texticon [?GER_peoples_chamber_support_dynamic_var|=+1%]"

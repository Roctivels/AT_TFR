 GER_nationalized_defense_industry: "国有化军工企业"
 GER_nationalized_defense_industry_desc: "在武装力量重组进程中，我们彻底废除了军工复合体中的私营成分。所有曾为军队提供武器装备或技术服务的私营企业均已被收归国有。随着资本家及其企业可能造成的阻挠与牟利行为被彻底清除，这些军工企业如今必将成为军事改革与建设大业中运转自如、绝对服从的齿轮。"
 GER_german_oil: "德国石油"
 GER_BMVI_idea: "联邦交通和数字基础设施部"
 GER_BMVI_idea_desc: "欧盟边境与移民管理署是欧盟法律与政治框架中负责边境管控及移民事务的重要机构。该机构以在欧盟外部边境实施强效一体化管理为法定使命，既保障欧盟境内人员自由流动，又维护内部安全的高标准。然而持续困扰欧洲的大规模移民与难民危机，正不断冲击现行管理体系，其实际效能备受质疑。民粹主义右翼甚至主张彻底废除现有机制、另立新章。尽管争议不断，欧盟高层仍坚称该体系完全具备应对这些挑战的能力。"
 GER_CAP: "欧盟共同农业政策"
 GER_CAP_desc: "欧盟共同农业政策（简称CAP）是欧盟针对欧洲大陆农业制定的核心政策框架。该政策通过法规约束、财政补贴及明确目标相结合的方式，致力于为欧洲农民和企业创造经济发展机遇与公平市场环境。然而该政策也因诸多经济政治问题饱受诟病，批评声浪包括破坏生态环境、法规体系过于繁苛、挤压小农户生存空间，以及对发展中国家贸易伙伴造成过度困扰等。尽管如此，欧盟众多执政者仍将其视为经济一体化与政治协调的重大成就而引以为豪。"

 idea_NATO_advisors: "北约军事顾问"
 idea_NATO_advisors_desc: "我们近期迎来了来自布鲁塞尔北约总部最高层级的军事顾问团。这些专家将协助我们训练部队、制定理论，并为我国防御任何潜在的俄罗斯进攻提供基础框架。"
 idea_EU_unified_army_commands: "统一欧洲军事指挥"
 idea_EU_unified_army_commands_desc: "在德国引领下，欧盟已将各成员国军队纳入统一指挥体系，大幅拓展了共同安全与防务政策。此举使欧盟能够作为单一实体应对地区及全球威胁。"

l_simp_chinese:
 GER_rethinking_german_militarism: "军国主义再审视"
 GER_rethinking_german_militarism_desc: "在20和21世纪的特殊语境下，德国军国主义是一个尤为敏感的话题。从残暴掠夺比利时和在殖民纳米比亚时屠杀数百万人的德意志帝国军队，再到犯下大屠杀的阿道夫·希特勒政权；这导致如今只要提及“再军事化”就会被贴上极右翼的标签。尽管德国军国主义有其历史和负面含义，但考虑到我们所处的这个美国濒临崩溃，俄罗斯战熊逼近欧洲的特殊时期。我们应该开始重新思考德国军国主义的现状，"
 GER_bulwark_of_democracy: "民主堡垒"
 GER_bulwark_of_democracy_desc: "我们已成为现代世界的欧洲议会政治的灯塔，尤其是在美国崩溃之后，我们已跃升至世界第三大经济体。特别是当俄罗斯扩张主义以及威权主义逼近民主欧洲的边境的关头，我们不得不重新斟酌对军事化的长期抵制政策。这不仅是一项战略调整，同时也是是保障德国自由未来的必要措施。德国将成为整个欧洲的自由堡垒，保卫我们的人民免受源自东方日日紧逼的持久威胁。虽然与欧洲盟友的合作固然重要，但我们必须重申，德国的未来就是欧洲的未来，至少在我们自己的事务上，德国应该首先得到重视。"
 GER_europe_united: "欧洲统一"
 GER_europe_united_desc: "美国已经全面崩溃，而俄罗斯则随时准备刺入欧洲民主的心脏，因此，我们现在比以往任何时候都更需要欧洲的团结。显而易见，欧洲自身的力量十分薄弱，极易陷入内讧和崩溃。但身为欧洲民主堡垒的欧盟，它所体现的议会制度符合人民的意愿，几乎没有任何缺陷。如果我们想保卫欧洲自由的未来，并在俄罗斯扩张主义露出真面目之前将其击退，唯一的选择便是团结，欧洲集体防御的价值将高于联邦国防军自身地位。"
 GER_defender_20_europe: "欧洲捍卫者-2020演习"
 GER_defender_20_europe_desc: "“欧洲捍卫者”由我们的最高统帅部提出，它是一场由我国国防军领导，多国联合的大规模演习，旨在让欧洲做好同未来的“境外对手”俄罗斯进行未来战争的准备。该演习不仅能增强国防军的实力，还可以重振欧洲军队的战斗信念，做好多国军事信息互通的练习，如此我们才能更好参与未来发生的军事冲突。如果诸国接受，我们就将围绕本国国防军组织欧洲军事演习，向世界展现我们军队的能力与效率。"
 GER_f35_program: "F-35项目"
 GER_f35_program_desc: "随着德国陆军的复兴，我们也应该把目光转向德国空军。尽管空军在现代战争中具有极其重要的地位——尤其像美军F-35战斗机，这一美国军事工程的奇迹、人类史上最成功的隐形战斗机——但德国的空军仍是一支资金不足、供应无力、被严重忽视的军种。此时美国大量军事工程师因内战而不得不向外逃亡，他们的涌入为我们带来了所需人才与设计蓝图。通过利用这些条件，再加上全欧洲的力量，我们将投资我们的工人与产业、发展我们的军工复合体，最终独立自主生产出我们自己的F-35战斗机。这个决定将清楚表明，F-35是德国的正确选择！"
 GER_revive_the_deutsche_marine: "重振德国海军"
 GER_revive_the_deutsche_marine_desc: "德国海军陆战队，虽然是欧洲最大也同时具备灵活调度能力的海军陆战队，但当下正面临着过度扩张、资金不足、设备与战术过时等诸多问题。多年来国防预算的削减大大缩减了我国海军的规模，并严重限制了我国军队设备的发展与扩张。在我们重新思考德国军国主义的同时，我们也应该将目光延伸到海军，开始提高我们的国防预算以振兴德国海军。我们将投资海军舰队的扩张与现代化建设，包括购置和发展先进的水面舰艇、潜艇和支援舰艇。我们还将编写一套明确且具有普适性的海军学说，将其与“德国战略利益高于全欧洲”原则保持一致。"
 GER_redefine_german_doctrine: "修改德军作战理论"
 GER_redefine_german_doctrine_desc: "尽管我们的最高统帅部仍在高效运作，但德国军事学说已非常明显地在走向衰落。我们应重视和发展最适合联邦国防军的，德国自己的军事理论，而不是缝合各家的旧理论。这包括联合作战组织、混合战争、战略机动、发展可消耗性情报、监视和侦察(ISR)和人道主义援助和救灾(HADR)理论、适应电子战、发展城市作战技术、多域协调作战以及灵活的部队架构。如果我们以国内理论主导联邦国防而非外国理论，那么联邦国防军就会对战争有着最好的理解，使我们能够更有效地适应外国冲突。"
 GER_refine_airland_combat: "完善空地作战"
 GER_refine_airland_combat_desc: "从80年代早期到90年代晚期，空地协同理论构成了美军在欧洲的战斗理论基础。其旨在加强空地协同，以标记、智取并摧毁敌军有生力量——尤其是被限制在陆地上的部队。这套理论在主导国防军和德国空军的同时，也随着装备过时而逐渐变得陈旧。我们可以通过更新装备、加强作战战略以及整合无人机系统和网络战等先进技术，来完善我们的空地协同理论。"
 GER_modernize_the_leopard: "现代化豹式坦克"
 GER_modernize_the_leopard_desc: "豹2，一款第三代主战坦克，被认为是联邦国防军的经典之作。它被认为是我们最好的军工作品之一，然而，尽管有这些高标准的评价，大多数豹2依然处于被忽视、缺乏技术更新和完全过时的状态。我们应该开始完善这些坦克，准备增强装甲、提高主炮火力——例如更采用大口径或更先进的膛线或炮管，整合先进的火控系统，结合热成像、激光测距仪以及弹道计算机，用于提高射击精度和目标捕捉能力。体现数字化设计，改进发动机和整体机动性，以及改进主动防护系统。如果豹2是用于未来的坦克，那么这必须反映在其设计中。"
 GER_develop_domestic_capabilities: "发展国内军工"
 GER_develop_domestic_capabilities_desc: "我国的军事能力正在逐步重建，但工业体系却陷入困境。本应为德国人民生产商品、为军队制造武器的工厂，如今遍布全国却荒废破败。军工厂呢？几乎没有新建或改造以满足联邦国防军的弹药需求！在当前重任下，这种状况简直荒谬至极。我们必须重振德国军事工业的本土产能。风暴正在酝酿，当它来袭时，我们必须严阵以待。"
 GER_construct_new_dockyards: "建造新船厂"
 GER_construct_new_dockyards_desc: "德国海岸线周边海军船厂与港口稀疏且相隔甚远。舰队停靠时，这些港口设施往往显得陈旧且年久失修，难以满足必要的维修要求。为了扭转这一局面，我们需努力振兴老旧船厂并规划新建船厂。行动方针应包括细致的选址过程、深入的可行性调研、与私人投资者构建稳定的合作桥梁、对基础设施的大力投入、利用市场分析精确塑造船厂的功能与布局设计、投入必要资源推动培训与教育工作以培养专业人才，以及系统地规划并实施关键基础设施的分阶段建设。"
 GER_focus_on_trade_interdiction: "专注贸易封锁"
 GER_focus_on_trade_interdiction_desc: "自第二次世界大战后，德国海军的学说长期以来都以沿海防御为核心，昔日大舰队的辉煌已随帝国的沉沦而消逝于历史的长河中。然而，若能复兴20世纪40年代帝国海军的“贸易封锁”学说，将极大助力我们的战略目标。通过拦截敌方的任何运输船队，这一战略在围困加里宁格勒时尤为有效。"
 GER_naval_center_of_europe: "欧洲海军中心"
 GER_naval_center_of_europe_desc: "德国是欧洲工业基地的中心，是最大的消费品生产国，也是一些世界知名武器制造商的所在地，但德国海军工业长期以来在国际上却声名不显。\n\n我们的舰队不能再躲藏在海底，必须专注于建造高吨位水面舰艇，不仅要投射我们自己的力量，还要将欧洲的力量投射到我们自己的水域之外，凯撒建造一支强大舰队的古老梦想尚未完全破灭。"
 GER_construct_new_airfields: "建设新空军基地"
 GER_construct_new_airfields_desc: "随着我国空军为满足新需求而不断发展壮大，机场将成为支撑其发展的关键设施。为此，我们将在东部地区建设多种新型非民用机场，以应对即将到来的冲突。"
 GER_purge_extremist_soldiers: "清洗极端派士兵"
 GER_purge_extremist_soldiers_desc: "我们已关注到一系列报告，揭示了德国陆军、空军和海军中潜藏的极右翼极端主义势力。尽管这些极端分子在我们整个武装力量中所占比例甚小，但其数量的急剧增加却令人深感忧虑。我们必须迅速采取措施，因为极端主义在我们军队中是令行禁止的。我们将对这些士兵进行惩处，并根据其情节严重程度考虑予以开除，以此向全世界展示我们对这类行为忍无可忍。"
 GER_turn_a_blind_eye: "装聋作哑"
 GER_turn_a_blind_eye_desc: "我们为何要禁止极端分子加入武装部队？难道他们不是最致力于保卫德国的人吗？不，暂且不论报告的内容，一个自由的社会应由其所有公民共同捍卫，包括那些异类。\n\n这或许违背了纲领，但鉴于正在进行的改革，就让这也纳入其中吧。"
 GER_upgrade_our_railways: "升级铁路"
 GER_upgrade_our_railways_desc: "与西德相比，东德的铁路系统发展严重滞后，这无疑是共产党管理不善造成的。现在我们有了发展动力，是时候通过联邦议院批准预算，让火车准时运行了。"
 GER_revive_german_military_industry: "复兴德国军工"
 GER_revive_german_military_industry_desc: "黑克勒-科赫、黑内尔、克虏伯、莱茵金属……这份名单仍在不断扩充。我国拥有无数尖端军工企业，只要给予机会，它们就能为军队提供最先进的装备。可悲的是，过去的错误决策使这些企业完全失去了国内军火市场的滋养。现在，我们必须签署新合同来将其激活，德国军事工业的引擎将由此重新轰鸣。"
 GER_civil_construction_program: "公共建设项目"
 GER_civil_construction_program_desc: "我国的民用工业需要扶持，基础设施建设也落后于人，如果我们想要为即将到来的猛烈攻击做好准备，那么就决不能放任过去几年的萧条局面继续下去。兵马未动，粮草先行，我们得先修建好道路以保障军队的补给，进而抚养人民。"
 GER_invest_in_rnd: "投资科研"
 GER_invest_in_rnd_desc: "尽管当代德国本土工业有所衰退，但若论发明创造，我国始终独步天下——坦克、防空系统、战机、反坦克武器，这份辉煌清单永无止尽。历史上我们几乎在每个领域都是开拓者，今日依然如此。迈向未来之际，我们必须延续这份传统。随着战争风险与日俱增，此刻比任何时候都更需要技术优势。我们将以空前力度投入研发，让军事科技赢得盟友敬仰，令敌人闻风丧胆！"
 GER_assure_our_nato_allies: "向北约盟友保证"
 GER_assure_our_nato_allies_desc: "随着美国陷入惨烈内战，北约各成员国开始相互审视，目光中充满无声的评判而非信任与友谊。而我们，尤其成为焦点。某些国家竟认为德国弱于波兰、法国、意大利等盟国，这种荒谬论调已持续太久。欧洲再次呼唤德国之力，而我们必须回应。但若盟友缺乏信任，我们将难以大展身手。因此，德国将向所有人保证：我国完全有能力肩负捍卫欧洲的重任。"
 GER_conceptualize_an_european_army: "欧洲军构想"
 GER_conceptualize_an_european_army_desc: "欧洲分裂已久，过分拘泥于细枝末节而忽视大局。俄罗斯畏惧一个团结的欧洲，因为他们深知，当我们真正团结一致时，他们将无力抵抗。可悲的是，有些人未能意识到：联合的欧洲几乎不可战胜，甚至可以超越美国。为实现统一的第一步，我们将构想一个统辖所有欧盟武装力量的联合司令部，铸就抵御外敌的钢铁长城。在未来的任何战争中，这种协同作战都至关重要。"
 GER_the_turkish_gamble: "土耳其豪赌"
 GER_the_turkish_gamble_desc: "我们愈发担忧埃尔多安过多执着于凯末尔“国内和平，世界和平”的格言，未能明察明斯克以西各国面临的威胁。为确保土耳其履行协议，必须安抚其关切，这不仅关乎欧洲利益，更攸关土耳其自身存亡。若无北约庇护，埃尔多安无异于将国民推入俄罗斯的陷阱。这个横跨东西的十字路口，必须牢牢掌握在西方盟友手中。"
 GER_commit_to_baltic_defense_plans: "波罗的防御计划"
 GER_commit_to_baltic_defense_plans_desc: "波罗的国家是我们最脆弱的盟友。从爱沙尼亚到立陶宛，这些虽小但战略地位至关重要的国家，几乎被俄罗斯及其盟友三面包围，尤其是其西侧的波罗的海。一旦战争爆发，这片海域将时刻面临被俄军侵犯的威胁。俄方随时可能实施海上封锁扼杀其补给，或直接触动海军入侵，而波罗的诸国对此几乎毫无招架之力。我们绝不能让这种局面发生，必须力保波罗的国家永不沦陷，并将其防御列为优先要务。"
 GER_commit_to_black_sea_defense_plans: "黑海防御计划"
 GER_commit_to_black_sea_defense_plans_desc: "黑海是俄罗斯与其盟友的战略软肋。这片水域虽小，却具有非凡的战略价值，任何一方取得制海权，都能夺取黑海主要港口，甚至威胁对方石油命脉。这意味着，掌控黑海可能决定战争胜负，更能左右乌克兰的命运。若集安组织与北约爆发冲突，我们必须不惜一切代价维持黑海控制权，这是保卫乌克兰的关键所在。"
 GER_upgrade_eastern_european_defenses: "加强东欧防御"
 GER_upgrade_eastern_european_defenses_desc: "波罗的国家作为东欧最暴露的前线，无疑是俄罗斯的首要目标。尽管设有防御工事，但同东欧多数地区一样，其战备仍显不足。一旦俄军进犯，整个东欧恐将沦陷于俄式钢铁洪流。这对德国构成生存性威胁，绝对不可接受。我们将立即启动东欧防御升级计划，以此持续遏制俄方侵略，捍卫欧洲民主体系。"
 GER_pan_european_propoganda: "泛欧团结"
 GER_pan_european_propoganda_desc: "欧洲，这片饱受毁灭性战争、国家分裂与狭隘民族主义摧残的大陆，如今正迈向统一之路。欧盟与北约成员国因血脉相连，更因共同面对俄罗斯的威胁而团结一致。是时候让我们彻底统一在同一旗帜下了，泛欧认同必须深植民心。而通过我们推动的泛欧思想，这一目标必将实现。"
 GER_buy_the_tb2: "购买TB2无人机"
 GER_buy_the_tb2_desc: "土耳其旗手TB2是我们盟友生产的一款尖端军用无人机。土耳其武装部队一直走在独立军事研究的前沿，寻求摆脱东西方设计，发展自己的设计。土耳其的洞察力很有价值，订购一些TB2无人机不仅可以增强盟友的实力，还可以增强我们的打击能力，并使我们的工程师更好地了解外国无人机的构造。"
 GER_fortify_the_polish_border: "波兰边境堡垒化"
 GER_fortify_the_polish_border_desc: "波兰，这个横亘在俄罗斯阵营与我们联盟之间的国家，无疑是俄方的首要目标。然而长期以来，波兰的防御力量始终不足，对即将到来的俄军侵略准备欠缺。作为通往北约领土的直接通道，波兰的战略地位至关重要，绝不能对俄军首波进攻毫无防备。为捍卫欧洲民主，我们必须沿波兰边境构筑更多防御工事。"
 GER_secure_the_suwalki_gap: "保卫苏瓦乌基走廊"
 GER_secure_the_suwalki_gap_desc: "苏瓦乌基走廊是加里宁格勒与白俄罗斯之间的一条狭长地带，而立陶宛与波兰是横亘在这条通道上的唯二国家。若敌军成功突破这条要道，波罗的海三国将与北约彻底隔绝，一旦战争爆发，俄罗斯将得以全面占领该地区。我们绝不能让这种情况发生，这不仅是北约的战略失败，更将助长俄方气焰。必须立即加强该走廊的防御工事，以保护波罗的国家免受俄罗斯侵略。"
 GER_found_the_european_defense_army: "建立欧洲防卫部队"
 GER_found_the_european_defense_army_desc: "几十年过去了，这项提案终于正式化了。它最初是在1952年提出的，但当时的目标是为了防止德国重新武装，而今天呢？我们再次团结起来，将目光投向东方的北极熊。欧洲必须做好准备。当初法国首次提出这些建议时，是为了保护欧洲免受苏联的威胁，而现在，当我们提出我们的建议时，它将保护欧洲免受复兴的俄罗斯的威胁。"
 GER_german_turkish_syrian_mission: "德土叙利亚联合行动"
 GER_german_turkish_syrian_mission_desc: "叙利亚内战将这个国家化为焦土，酿成人类史上最严重的人道主义危机之一，更助长了伊斯兰国组织的崛起。尽管战事已沦为缓慢煎熬的消耗战，逐渐淡出世人视野，但近期战火诡异重燃，引起了我们与土耳其的高度警觉。德国必须主动作为，派遣德土联合人道主义特派团赴叙。这既能救助叙利亚民众，亦能改善与土耳其人民的关系。"
 GER_support_kurdish_anti_terrorism: "支持库尔德反恐"
 GER_support_kurdish_anti_terrorism_desc: "在伊拉克北部，库尔德人已建立起一个事实上的独立政权。尽管我们的盟友土耳其等国对其深怀疑虑，但不可否认的是，在当前中东反恐战争中，特别是在伊朗扶持的真主党势力卷土重来的背景下，库尔德人的作用比以往任何时候都更为关键。基于此，向库尔德人提供支援以打击中东地区的恐怖主义威胁，完全符合我们的核心利益。"
 GER_aim_for_energy_independence: "力求能源独立"
 GER_aim_for_energy_independence_desc: "德国长期以来一直大量依赖能源进口，特别是天然气和石油。这让我们的盟友，特别是美国非常懊恼，因为他们一直将这种依赖视为俄罗斯攫取利益的杠杆。\n\n而我们将结束这种现状。\n\n通过推动合成油的生产、扩大从罗马尼亚等国的进口以及构建我国自己的稳定能源供应体系，我们将能够在不依赖俄罗斯能源贸易的情况下顺利度过下一个冬季。"
 GER_energy_autarky: "能源自给自足"
 GER_energy_autarky_desc: "德国工业世界闻名，我们是世界最主要的汽车和机床出口国之一，同时也是对数个国家的电力净出口国，然而这也给我们造成了相当巨大的压力。正因如此，我们必须严格限制我们的能源出口——或者直接完全切断它。\n\n我们的电力买家可能会对此不悦，但比起让自己的国民生活在寒冷和黑暗之中，这样做完全值得。"
 GER_look_for_alternative_partners: "另觅伙伴"
 GER_look_for_alternative_partners_desc: "长期以来，我们与西方和美国的关系一直很密切，但随着最近全球政治的变化，我们必须设法修复与其他国家如伊朗和委内瑞拉的破裂关系。\n\n美国人替我们做了太长时间的主了，现在无可挽回的威胁迫在眉睫，我们得做好最坏的打算，建立新的伙伴关系，来周转我们的资源。"
 GER_expand_wilhelmshaven_refineries: "扩建威廉港炼油厂"
 GER_expand_wilhelmshaven_refineries_desc: "我们在威廉港的炼油厂是我们为数不多的国内石油供应来源之一，由于沙特内战的爆发，我们显然无法再像过去那样进口石油。若不全力维护并充分利用威廉港的这些炼油厂将是极其愚蠢的。石油对日常生活至关重要，无论是保卫欧洲的最后希望，还是让政客们能开车上班，这些都离不开它。扩建炼油厂之际，我们也将在复兴之路上继续前进。"
 GER_placate_the_russians: "安抚俄国人"
 GER_placate_the_russians_desc: "尽管当前德俄外交关系可以说已经变得紧张，但俄罗斯手握的巨额资金与丰富原材料资源，我们若不争取分一杯羹就太不明智了。尽管俄方对我们的反感恐怕不亚于我们对他们的态度，但他们仍对与欧洲保持经贸往来持开放立场。为维持德国经济的良好态势，主动向俄方伸出橄榄枝、努力维系健康的商业关系才最符合我们的根本利益。"
 GER_revitalize_the_autobahns: "振兴高速公路"
 GER_revitalize_the_autobahns_desc: "高速公路作为德国政府管控的重要交通命脉，虽对国家商贸与出行至关重要，却因长期超负荷运转已出现轻微老化。眼下正值亚洲与美洲冲突频发、全球贸易萎缩之际，我们更应把握这段间歇期，全力修复高速公路系统，使其重臻完美。德国素以精妙工程与卓越基建立国，而我们必须守护这份当之无愧的荣光。"
 GER_eurail_modernization: "欧铁现代化"
 GER_eurail_modernization_desc: "欧洲铁路每日承载着数百万旅客穿梭于欧陆各地，其便捷性与实用性向来备受推崇。然而令人遗憾的是，这一交通网络正逐渐落后于时代，设施老化问题日益凸显。随着轨道状况的不断恶化，公众对欧洲铁路的评价也持续走低。是时候结束这种状况了。我们将呼吁欧洲议会增拨专项资金用于铁路升级改造，让欧洲铁路重新成为地球上最伟大的铁路系统之一。"
 GER_halt_nordstream_2: "暂停北溪二号"
 GER_halt_nordstream_2_desc: "北溪二号本应成为俄罗斯向德国输送天然气的第二条管道，一度为我们带来双赢：俄方获得经济补偿，德方则获得了滋养德国社会各领域的“液态黄金”。但随着时间推移，俄方行为日趋激进，甚至开始威胁我们的盟友。是可忍，孰不可忍！鉴于双方外交关系急剧恶化，是时候放弃该项目，结清工人薪资，让他们安心回家了。"
 GER_negotiate_with_opec: "与欧佩克谈判"
 GER_negotiate_with_opec_desc: "沙特阿拉伯已陷入毁灭性内战，而战事至今未见终结。随着这个重要成员的缺席，欧佩克正陷入前所未有的困境。与此同时，沙特与美国达成的石油协议也因国内动荡濒临失效。尽管如此，欧佩克其他成员国仍掌握着大量石油储备，并有意继续出口。我们必须利用这一有利时机，说服产油国与我们达成协议，只有这样，德国才能从石油危机中恢复过来。"
 GER_north_sea_oil_expedition: "北海石油勘探"
 GER_north_sea_oil_expedition_desc: "北海与波罗的海的石油储量一直备受猜测，但这两片海域蕴藏石油的可能性确有依据。例如波兰数年前便在波罗的海发现油田，如今B8油田已占其石油产量的3%。鉴于这一事实，向北海及周边海域派遣勘探队寻找石油完全符合我国利益。一旦在北海发现石油，我们将能持续保障德国人民的石油供应。"
 GER_revive_the_german_coal_industry: "振兴德国煤产业"
 GER_revive_the_german_coal_industry_desc: "在当前石油危机持续肆虐的严峻形势下，我们绝不能将宝贵的资金投入风能、太阳能等实验性且效率低下的可再生能源领域。核能显然也非可选方案，历史已经证明，核电站犹如随时可能爆发的死亡陷阱。如此便只剩下煤炭这一选项，尽管煤炭与清洁能源相去甚远，但其成本低廉且在我国已有成熟工业体系。我们必须大力扶持煤炭产业并扩大其规模，这样才能继续持续保障德国人民的能源需求。"
 GER_the_green_alternative: "绿色替代能源"
 GER_the_green_alternative_desc: "让我们掌握道德制高点，一举解决两个问题。通过在德国各地扩大风电场和太阳能发电场，我们可以在扩大国内能源的同时保持环境清洁。虽然这可能意味着在关闭污染更严重的电厂时会出现暂时的能源短缺，但这绝对是值得的。"
 GER_secure_eu_interests: "保障欧盟利益"
 GER_secure_eu_interests_desc: "欧盟在国外的利益需要我们来确保其安全无虞。橡胶、石油及民用和军用生产所需的其他关键物资的贸易协议，均必须得到切实保障。外交手段的帮助下，不仅为我们自己，也为整个欧盟保障了这种至关重要的物资。艰难的时期，我们也必须为邻国着想。"
 GER_invest_in_synthetic_oils: "合成燃料投资"
 GER_invest_in_synthetic_oils_desc: "随着阿拉伯半岛陷入战火，我们的原油供应如同黄油般被轻易切断。现在，德国正面临史无前例的能源危机。要摆脱这场危机，我们几乎别无选择。在有限的选项中，合成油是最有效的解决方案。这种堪称我们生命线的合成油是建立国内石油供应的唯一希望。我们必须全力投资新兴合成材料企业，不仅为了石油替代品，更为了塑料等其他关键材料的自主供应。"
 GER_increase_the_oil_reserve_supply: "扩大石油供给"
 GER_increase_the_oil_reserve_supply_desc: "值此危机时刻，我国军民均面临着石油短缺的严峻局面。军队燃油告急，而民众则陷入虚假的“抉择”：要么支付高昂油费加满油箱，要么被迫骑车、步行，更可能无法准时抵达目的地。随着石油储备持续减少，这些问题不断恶化：民众愈加贫困，军队逐渐丧失保卫欧洲之力。绝不能纵容这种状况持续！即便只能多支撑数月，我们也必须立即扩大德国的石油战略储备。"
 GER_rethink_free_trade: "反思自由贸易"
 GER_rethink_free_trade_desc: "尽管自由贸易在过去数十年为我国带来了巨大繁荣，但近年来全球秩序正经历剧变。美国开始陷入内部分裂，亚洲命运悬于一线，我们也必须做出改变，以免陷入目前困扰世界其他国家的动荡浪潮中。旧有的世界秩序已经动摇，或许很快便会崩塌。我们必须认真重新考虑自由贸易政策。唯有如此，才能确保自己不会随之坠落。"
 GER_support_the_manufacturing_industry: "支持制造业"
 GER_support_the_manufacturing_industry_desc: "自阿登纳担任第一任总理以来，制造业一直是德国的命脉。在疫情期间，随着股市暴跌，我们的制造商遭受了损失。我们必须尽一切努力保证市场不会崩溃，通过转移资金，我们不仅可以支撑，还可以扩大我们的制造能力以满足邻国的需求。"
 GER_ensure_domestic_stability: "维持国内稳定"
 GER_ensure_domestic_stability_desc: "国内局势的稳定一直非常脆弱。我们应当授权联邦宪法保卫局，针对抗议领袖们采取行动，至少暂时遏制极端分子和反对党派组织抗议的浪潮。\n\n我们支持本国制造业恢复和扩张的政策肯定会得到回报，到了那时候，他们自会消停下来。"
 GER_bolster_the_service_economy: "发展服务业经济"
 GER_bolster_the_service_economy_desc: "自2020年以来，全球经济以前所未有的速度下滑，失业率和贫困率同步飙升。如今石油危机爆发，这些数据更是有增无减。我们必须立即遏制这种恶化趋势，为此，我国将重点扶持服务业就业岗位。餐饮连锁、酒店等诸多行业都将获得国家支持。这项举措既能降低失业率，也能确保底层民众暂时免于陷入绝境。"
 GER_reverse_the_nuclear_phase_out: "重启核能"
 GER_reverse_the_nuclear_phase_out_desc: "对我国来讲，逐步淘汰核能完全是一场彻头彻尾的灾难。诚然，切尔诺贝利和福岛等重大事故确实给地球带来了巨大破坏。但是我们也必须认识到，这些事故不仅罕见，而且往往是人为失误、设计缺陷或缺乏适当的安全监管造成的，而我国的核设施始终保持着最高安全标准。虽然绿党不愿承认这点，但核能是一种既强大又可靠的能源形式。我们必须扭转这场灾难性的退核政策，以免其对经济造成更大损害。"
 GER_increase_renewable_subsidies: "增加可再生能源补贴"
 GER_increase_renewable_subsidies_desc: "我们的地球正在被榨干、资源即将耗尽。仅仅是石油出口量的小幅下滑就引发的巨大混乱就是最鲜明的例证。而可再生能源则截然不同——它们不会像石油那样枯竭，不会像煤炭那样污染空气，更不会像核能那样潜藏事故风险。随着最后一批核反应堆的关停，我们需要建设更多太阳能板和风力发电场来填补退核政策造成的能源缺口。终有一日，我们不仅能弥补原有设施的产能空缺，更将实现超越。凭借这些可再生能源，我们将为子孙后代提供永不枯竭的动力！"
 GER_focus_on_flood_reconstruction: "专注防洪工程"
 GER_focus_on_flood_reconstruction_desc: "莱茵河洪水肆虐沿岸城市，造成数百万美元损失，而我国政府却几乎无动于衷，这是完全不能容忍的。我们绝不能任由这些人口稠密、工业价值最高的城市继续遭受洪水侵害。我们将全力以赴重建莱茵河畔的城市。这不仅为了工业振兴，更是为了救助那些被困于洪灾中的善良德国人民。"
 GER_the_digital_revolution: "数字革命"
 GER_the_digital_revolution_desc: "过去几十年来，微芯片对社会各领域的重要性无论如何强调都不为过。纵观历史，科技及其各个层面始终对世界至关重要，但与当今时代相比，科技的重要性已攀升至前所未有的高度。我国科技产业已然落后，而这一情况必须在现在终结。为了守护欧洲和德国的安全，我们绝不能放任现状持续。我们将以几何级数增加对科技初创企业和外国专家的资金投入，迎头赶上竞争对手。"
 GER_EV_subsidies: "新能源汽车补贴"
 GER_EV_subsidies_desc: "燃油车早已是污染时代的过时产物。它们消耗不可再生的石油能源，排放的尾气污染着大气。长期以来，我们放任电车企业落后于燃油车发展，并不断亏损。如今，石油短缺的危机正为我们创造契机，推动民众购买电车的绝佳时机已然到来。我们将大力扶持电动汽车产业，进而扩大其生产规模，以此满足市场对新能源车辆的旺盛需求。"
 GER_sponge_cities_program: "海绵城市计划"
 GER_sponge_cities_program_desc: "我国莱茵河沿岸的城市在特大雨季时出现了洪水问题，必须指出，莱茵是人口非常稠密的地区。\n\n这些洪水影响了数百万人，不能让洪水再来一次了，仅仅挖沟引渠和修建堤坝是不行的。我们需要投资让我们的城市变得更加“海绵化”，这又是什么意思？答案是我们会让它们变得更“软”，更容易吸收水量，我们的下水道总是不堪重负，但如果我们利用自然的力量来吸收水分，我们就可以构建一道天然的防护堤。种更多的树，修建更多的公园，用透水柏油路来代替现有的道路，这样就可以让水自行穿过。城市的绿化越多，人们家中涌进的洪水就越少，多么神奇！"
 GER_a_green_future: "绿色未来"
 GER_a_green_future_desc: "德国是可再生能源解决方案的开路先锋，不仅将为德国，更将为世界开创绿色未来。气候变化不仅是地球面临的最大威胁，更是人类未来的生死攸关之患。可再生能源将终结对石油和煤炭的掠夺，让空气不再被雾霾玷污，让河流免受废料污染。德国的自然瑰宝令人叹为观止，若为开采有限资源而肆意破坏，实在是奇耻大辱。绿色即黄金，安全的未来必然是绿色未来！"
 GER_lift_venezuelan_sanctions: "对委内瑞拉解除制裁"
 GER_lift_venezuelan_sanctions_desc: "委内瑞拉坐拥全球最丰富的石油储备之一，然而尽管其石油储量惊人，却仍遭受我们及盟友的严厉制裁。当前石油危机持续肆虐，我国正面临威胁民生福祉与国家财富的经济危机，若要扭转颓势，我们必须不惜一切代价获取石油。俗话说，非常时期就得采取非常措施。当务之急是解除对委制裁，并向其政府伸出橄榄枝，哪怕仅获取其庞大石油产能的微小份额。只要对方接受提议，德国便能延续经济复苏之路。"
 GER_back_the_arabian_republic: "支持阿拉伯共和国"
 GER_back_the_arabian_republic_desc: "自1933年起，沙特阿拉伯便一直处在沙特家族的铁腕专制统治之下。然而时过境迁，这个曾经不可一世的王室已开始分崩离析。随着年迈的国王驾崩，这些裂痕迅速扩大为深渊，将沙特拖入内战泥潭。但这场动荡也孕育着机遇，一个民主的沙特阿拉伯可能由此诞生。在这场内战中存在与我们价值观相契合的派系。作为民主世界的领袖之一，我们有责任向这些自由战士伸出援手；这不仅是为了石油，也是为了建立一个自由的沙特阿拉伯。"
 GER_the_armenian_gambit: "阿塞拜疆博弈"
 GER_the_armenian_gambit_desc: "阿塞拜疆虽亲近俄罗斯，却坐拥丰富石油资源。我们并非首次试图进军巴库获取石油，但这次不妨将步枪留在家中，带来欧元与熨烫笔挺的西装即可！尽管此举将让集安组织获得更多制衡我们的筹码，风险不小。但如果那是欧洲所需，我们便义不容辞。"
 GER_free_the_markets: "放宽市场管制"
 GER_free_the_markets_desc: "在近现代史上，监管往往只是创新与发展的绊脚石。这些法律法规如同蛛网，将企业家与企业困在无谓的官僚程序与诉讼中。随着中国崛起成为世界工厂，若不实施大刀阔斧的改革，我们很快将被甩在后面。社民党与左翼党届时必将抗议、呐喊、咆哮，但他们无法阻挡这一必然趋势，因为比起我国经济实力的未来存续，他们的议程与目标根本不值一提。"
 GER_negotiate_with_the_iranians: "与伊朗协商"
 GER_negotiate_with_the_iranians_desc: "伊朗石油工业是世界上最古老的石油工业之一，也是其经济的基石。相比之下，我国的石油工业规模较小且经验不足。我们与中东地区，尤其是伊朗的关系长期不和。但正如对待许多曾经的对手那样，为确保我国经济稳健发展，我们必须化干戈为玉帛。只需通过数次沟通会谈来化解分歧，我们定能与伊朗达成石油贸易协议。"
 GER_a_united_european_vision: "同一个欧洲，同一个愿景"
 GER_a_united_european_vision_desc: "一直以来，欧洲统一的理念都被视为疯言乱语。但随着美国的衰落和俄罗斯威胁抬头，有一点变得无比清晰：德国孤掌难鸣，法国形单影只，意大利亦是如此。但如果我们团结起来呢？我们将势不可挡，成就无限可能。让我们共同推广真正统一的欧洲的愿景，也许有一天，梦想会照进现实。"
 GER_baptism_by_fire: "实战洗礼"
 GER_baptism_by_fire_desc: "德国上一次参与常规战争还要追溯到八十多年前的第二次世界大战。自那以后，和平主义思潮在这片土地蔓延，世界都认为德国已告别战争，德军再不会在异国他乡进行大规模作战。\n\n世人的判断何其谬误。\n\n在波罗的地区，俄军正试图推进战线，而那里将成为我们展现实力的舞台。我们将与波罗的盟友共同行动，让俄罗斯人明白低估我们要付出何等代价。"
 GER_operation_eisenhammer: "锻锤行动"
 GER_operation_eisenhammer_desc: "在现代战争中，丧失先机者必将被先发制人者迅速摧毁，是时候让俄罗斯人明白我们从不坐以待毙。锻锤行动便是我们对俄军集结力量的决定性打击，作战方案清晰明确：在整个白俄罗斯与乌克兰战线，精准的重型自行火炮与火箭炮部队将掩护我军发动迅猛攻势。在猛烈炮火与步坦协同作战的打击下，无论俄军投入多少兵力都无法固守阵地。由此我们将快速将其驱逐回他们那片寒冷的不毛之地。"
 GER_intensify_nighttime_sorties: "强化夜战行动"
 GER_intensify_nighttime_sorties_desc: "我方优越的热成像和夜视光学设备已经增强了我们在夜间，尤其是在空中发动攻击的能力。我们必须利用这一优势，对敌方阵地进行彻夜轰炸，直到取得胜利！"
 GER_national_recruitment_drive: "全国征兵运动"
 GER_national_recruitment_drive_desc: "联邦国防军现在急需新志愿兵，咱们提高养老金和福利待遇，再给个入伍奖金，然后承诺给他们买宝马汽车的时候大优惠……没错，很快新兵就会挤爆报名处的！"
 GER_dust_off_legacy_equipment: "提供遗留装备"
 GER_dust_off_legacy_equipment_desc: "G3仍然是一把发射7.62毫米子弹的枪，实际上它的弹药比G36或我们新采用的HK416的弹药更重，但G3的杀伤力比起其他现役枪支丝毫不逊色。我们将开始把它们发给部队。"
 GER_deliver_excess_equipment_to_ukraine: "向乌克兰交付多余军火"
 GER_deliver_excess_equipment_to_ukraine_desc: "乌克兰极大地扩展了俄罗斯的战线，从而打开了俄罗斯高加索地区和莫斯科本身的脆弱性，在乌克兰不会崩溃的前提下，我们可以利用这点。而为此我们应当援助其军队。"
 GER_mobilize_the_economy_desc: "随着德国重返战争轨道，我们已无余地维持国内的常态运行。战争机器需要经济体系的支撑，必须立即着手构建。我们将尽快培训产业工人、动员工业体系、储备战略物资、实行资源配给。商界领袖与数百万勤劳智慧的人民，将运用曾令德国经济享誉全球的资源与技术，让德军获得同样的荣光。俄军臆测我们缺乏支撑战争的工业基础，但他们很快将意识到自己的谬误。"
 GER_tank_in_ukrainian_refugees: "接纳乌克兰难民"
 GER_tank_in_ukrainian_refugees_desc: "东部战事引发的人道主义灾难正蔓延至西欧。数十万乌克兰民众为躲避俄军火箭与炮弹袭击，从满目疮痍的城市逃往德国。与其他国家不同，我们将敞开国门接纳这些流离失所者，以及所有渴望逃离战火的人们。安置难民固然需要付出代价，但危机中亦蕴藏机遇。这些民众将成为反俄扩张主义最坚定的支持者，甚至愿意为之而战。正值用人之际，我们将迅速善用这股力量。"
 GER_final_operation: "[GLOBAL.get_poland_status]行动"
 GER_final_operation_desc: "[GLOBAL.get_operation_status]"
 GER_blucher: "布吕歇尔"
 GER_khol: "科尔"
 GER_oper_1: "冲锋！这是我们将俄国人赶出波兰的最后机会了！"
 GER_oper_2: "我们已经迫使他们节节败退！让这次行动成为最后一道催命符吧！"
 GER_oder_defense_initiative: "奥得河防御倡议"
 GER_oder_defense_initiative_desc: "1945年，国防军在施劳弗高地被彻底击溃，柏林的沦陷成为定局。布尔什维克军队一路畅通无阻，如潮水般涌入并摧毁了我们的首都。\n\n现在，我们高声宣告：施劳弗高地的惨败决不能重演！我们的防线必须覆盖整个奥得河沿岸，不让任何一个布尔什维克强盗踏上德意志的土地！"
 GER_convene_the_bundestag: "召集联邦议院"
 GER_convene_the_bundestag_desc: "2010年代对德意志民族而言是一个喜忧参半的十年。受阿拉伯之春余波影响，我们与欧洲共同经历了难民危机；债务风暴曾险些摧毁我国经济；能源价格持续攀升的阴霾更笼罩整个十年。然而，经济复苏的曙光依然显现，失业率维持低位，巨额投资推动积极增长。当2010年代成为翻过的一页历史篇章，召开联邦议院全会已势在必行。我们需要深入探讨经济议程、能效政策，以及迫近的选举。或许还会提及中国那场小小的病毒风波，当然，它肯定很快就会被控制。展望前路，光明在即。"
 GER_expand_our_nato_contribution: "扩大在北约的作用"
 GER_expand_our_nato_contribution_desc: "北约始终是抵御东方侵略的坚盾。当苏联占领东欧领土并威胁整个欧洲大陆时，正是北约守护了我们。但如今，随着其最强大的成员国分崩离析，捍卫自由民主、抵抗俄罗斯东方威胁的重任已落在欧洲列强肩上。数十年来，德国始终是这个伟大组织的核心成员。但近年来，我国对共同防务的贡献已逐渐落后于其他盟国。值此美国自顾不暇、欧洲危机之秋，德国必须为北约作出前所未有的贡献。这不仅是为了保护邻邦，更是为了守护德国自身的安全。"
 GER_focus_on_domestic_issues: "聚焦国内问题"
 GER_focus_on_domestic_issues_desc: "在国内，基民盟和社民党一直在争夺领导权，这是一场良性竞争，实现了长期以来的双方政策互补。但就像所有伟大的对手一样，随着选举日的临近，我们再次在投票箱前争夺。无论人民在即将到来的选举中选上了谁，他们都会以一种独特的姿态迎接新十年。"
 GER_defend_the_minds_of_the_youth: "捍卫年轻人的大脑"
 GER_defend_the_minds_of_the_youth_desc: "年轻人是我们的血液，是我们的未来，是新时代的儿女，我们从历史课上了解到新一代的力量。它可以颠覆民主，也可以巩固民主，而一切都始于学校和家庭。险恶势力同样也深谙此道，他们总企图用毒液般的谎言侵蚀青年耳膜。其妄图将年轻一代塑造成威胁国家存亡的极端分子。我们必须不惜一切代价阻止这场阴谋，通过系统教育让青年认清极端主义的危害，使他们了解到其曾对德意志民族带来的累累伤痕至今未散。"
 GER_scientific_breakthroughs: "科技突破"
 GER_scientific_breakthroughs_desc: "科学是德国人引以为傲的基石，其历史可追溯到几世纪前，甚至近千年。即便在今天，德国仍然是许多科学领域的伟大创新者。虽然我们在某些领域已经落后，但没有人会忘记我们过去取得的成就，也没有人会忘记我们未来将会取得的成就。"
 GER_establish_minimum_pension: "设立最低养老金"
 GER_establish_minimum_pension_desc: "德国以其完善的社会政策而闻名于世界，但人们可能会惊讶的发现它甚至没设置最低养老金。让我们来改变这一点吧！民众会知道我们永远不会大幅降低他们的养老金，但是……如果我们能将最低养老金制度化，他们不就更信任我们了吗？民主可是个反复无常的东西，要是选错了人，那你的养老金可要打水漂了！\n\n毋须担惊受怕，一切只为德国的老人们。"
 GER_strengthen_pro_union_laws: "加强亲工会法律"
 GER_strengthen_pro_union_laws_desc: "工会是我们抵御剥削性商业行为的第一道防线。它们直面资本家的贪婪，为我们最重要的公民、德国经济的命脉所在——工人阶级争取权益。工人制造产品并协助运输，没有他们，我们一无所有。既然如此，他们为何不该获得与其重要性相称的待遇？德国素有维护工人权益的传统，甚至被称为“工人天堂”。我们决心在未来维护这一声誉，而途径就是进一步壮大工会力量。"
 GER_burgergeld: "正式化“公民津贴”"
 GER_burgergeld_desc: "国民津贴是一项拟议的失业救济金政策，那些在动荡时期不幸被解雇的人可以感到欣慰，因为他们缴纳的税款将在他们需要的时候回到他们的手中。无家可归的德国人多么悲惨啊！我们最不希望看到的是仅仅因为经济的小幅下滑就出现房屋空置和人们挨饿的情况。让我们将国民津贴正式化，以保证在未来的经济危机中，我们不会让最贫困的公民在寻找新工作时遭受无家可归和贫困的境遇。"
 GER_revisit_refugee_policy: "重审难民政策"
 GER_revisit_refugee_policy_desc: "随着沙特阿拉伯的崩溃，我们又接收了另一批来自中东的难民。激进反移民的选择党藉由上一波难民潮，获得了惊人的高票数。如果我们再让一波难民涌入，他们可能会进一步壮大。帮助这些人虽然正确，但我们国内的局势能承受得了吗？让我们召开联邦议院会议讨论下吧，想必接下来的几周必定唇枪舌剑。"
 GER_tackle_political_extremism: "应对政治极端主义"
 GER_tackle_political_extremism_desc: "现状必须维持，选择党不能强迫我们这些老牌政党屈服，自阿登纳时代起，基民盟和社民党就一直反对与其类似的任何政党，比如德国国家民主党，古老的德国帝国党，我们反对任何形式的极端主义，这其中也包括左翼党这个东德阴影的该死化身。让联邦宪法保卫局彻查他们的烂事，只要有足够的脏料，我们就能像以前一样摧毁他们这个反动的乌合之众。"
 GER_anti_russian_bullwark: "反俄桥头堡"
 GER_anti_russian_bullwark_desc: "德国曾是反布尔什维克的堡垒，但如今随着苏联解体和旧言论被打倒，我们可以给曾经的堡垒刷上一层新漆以加强我们在北约的地位。不论欧洲是否承认，但俄罗斯都将发动攻击，德国将与东方盟友们一起做好准备，迎接进攻的到来。"
 GER_putinversteher: "爱普人士"
 GER_putinversteher_desc: "普京理解者指的是一个同情普京的德国政治派系，其中最著名的是前社民党总理格哈德·施罗德，一些人甚至称他为派系的总设计师。不论如何，向他们妥协可以让我们在俄罗斯收到盟国制裁的情况下获得专享的进入其市场的途径，不是所有人都觉得这是明智之举，但对我们来说。还是听听俾斯麦的看法吧。\n\n“我告诉你们一个处理好政治的秘方，那就是和俄国签署一个好协议。”"
 GER_invest_in_defense_contractors: "投资国防承包商"
 GER_invest_in_defense_contractors_desc: "我国的国防工业长期过度依赖海外订单，这种局面必须立即终止！滋养德意志军队的军工体系，首先且最根本的使命，是服务于德国国家利益与国防要求。面对俄罗斯日益膨胀的军事威胁，我们必须立刻启动全面国防建设，这绝非仅是签署几份敷衍的支票让军工企业转向国内生产，而是要倾尽所能签订一切必要合同。当我们全力注资这些国防承包商时，德国必将很快重建令人生畏的军事力量。"
 GER_call_for_european_unity: "呼吁欧洲团结"
 GER_call_for_european_unity_desc: "欧洲正面临至暗时刻。专治暴君们从四面八方虎视眈眈，企图扼杀民主自由的星火。而我们最强大的盟友美国，此刻正深陷国内危机的泥潭，根本无暇他顾。当命运的天平已然倾斜，我们比任何时候都更需要团结一致的欧洲，来抗衡那头俄罗斯巨熊。民主会死于黑暗，而欧洲将亡于分裂！面对东方共同的敌人，我们必须以空前的团结一致应对，否则等待我们的，将是整个欧洲大陆沦陷于专治铁蹄下的悲惨命运。"
 GER_aid_ukraine: "援助乌克兰"
 GER_aid_ukraine_desc: "2014年克里米亚的沦陷给我们敲响了警钟，乌克兰亟需经济和军事援助。俄罗斯近月来不断强化其软硬实力，种种威胁无论虚实，都已表明其即将对乌发动进攻的野心。可悲的是，即便到了今天，乌克兰军队仍处于落后状态。一旦局势恶化，他们将无力抵抗俄军的铁蹄。我们绝不能坐视不理，必须向乌克兰提供全方位援助，全面强化其国防力量和经济韧性。"
 GER_support_volt_europa: "支持欧洲党"
 GER_support_volt_europa_desc: "伏特欧洲(Volt Europa，欧洲党)是一个泛欧联邦主义组织，在所有欧盟成员国中，其政党都以“伏特”(Volt)为名。他们希望将欧盟联邦化。该组织所捍卫的自由民主价值，正是我国立国之根基。面对可能爆发的对俄战争，欧洲必须实现空前团结。而建立统一的欧洲联邦，正是实现这一目标的终极方案。我国应当公开支持伏特欧洲运动，通过我们的鼎力相助，让欧洲大一统的梦想照进现实，铸就永续的团结。"
 GER_europe_united_strong: "欧罗巴，强大而统一"
 GER_europe_united_strong_desc: "欧洲大陆始终在动荡、战火与毁灭中轮回，却也因此孕育出无与伦比的文明瑰宝。而今，我们正面临将欧洲再度拖入深渊的威胁——俄罗斯。这个国家与我们构建的一切价值截然对立，他们企图摧毁欧洲多元文化，如同兽人般殖民邻邦，妄图将大陆变成压迫性的炼狱。最危险的是，他们的实力与日俱增。但希望之火永不熄灭！抵御俄罗斯威胁的防线已然铸就——欧盟。今天的欧洲比历史上任何时期都更加团结强大。俄国佬幻想能够入侵我们的土地、奴役我们的人民，这简直是痴心妄想！倘若他们胆敢进犯，欧洲将做好准备。"
 GER_align_to_the_right: "团结右翼"
 GER_align_to_the_right_desc: "德国正受外强剥削，与邻邦愚蠢政策的合作徒劳无益，只会向外界昭示我国那些叛国政客甘愿让国家任人摆布、欺凌。我们与这些国家经济共生，一旦他们管理失当，我们便会遭到池鱼之殃！我国放任数以千计移民涌入，却毫不考虑对国民的影响。这一切荒唐行径必须终止。我们将确保德国选择党等力量掌权，使德国不再是欧洲笑柄，而是傲然屹立于众国之上！"
 GER_flame_anti_russian_sentiment: "煽动反俄情绪"
 GER_flame_anti_russian_sentiment_desc: "这头俄罗斯巨熊再次张牙舞爪，其凶残本性从未改变。我们曾天真地相信叶利钦会让俄罗斯成为像我们一样的和平民主国家，这些兽人的谎言何其可笑！几个世纪以来，这个以不同形态祸乱欧洲的国家，怎可能真正选择和平？不，俄罗斯人就像盘踞在岩石上的土狼，时刻窥探我们的弱点；又如同毒蛇，稍见破绽就会给予致命一击。终有一天，全欧洲都会认清俄国佬就是刽子手与骗子，我们绝不会再被他们的诡计蒙蔽。"
 GER_fighting_the_pandemic: "抗击疫情"
 GER_fighting_the_pandemic_desc: "已确认出现首例德国公民感染新冠病毒病例。虽然目前除祈愿患者康复并提供妥善治疗外，我们暂无能为力，但德国人民的未来绝非一片黯淡，只要我们有所作为，就定能扭转局势。我们必须在该病毒夺走更多无辜生命前阻断其转播链，并实施全国封锁，为民众配备防护物资，不惜一切代价使德国成为无新冠国家。"
 GER_mask_requirements: "强制佩戴口罩"
 GER_mask_requirements_desc: "口罩——这个我们抗击新冠病毒的主要防护工具，虽构造简单，却能保护数百万佩戴者的安全，进而守护整个国家。然而有人却莫名其妙地抗拒防护，面对这个已夺走全球无数生命的病毒，他们仿佛主动求染。正因如此，我们必须确保每个德国人室内外全程佩戴口罩，彻底阻断病毒传播链。"
 GER_fight_back_against_covid_narrative: "对抗芯片口罩"
 GER_fight_back_against_covid_narrative_desc: "政府所谓“阻断传播”的措施，不过是暴政的权力表演。数百万青少年本该在这美好时节外出嬉戏，如今却被困室内，对着电脑虚度光阴。口罩弊远大于利，只会阻碍呼吸、损害心智。要阻止这种人造病毒的传播，德意志民族只需依靠天然免疫力，根本不需要疫苗或其他医学骗术！"
 GER_support_querdenken_711: "支持“横向思考”运动"
 GER_support_querdenken_711_desc: "“横向思考711”是一个反对新冠限制措施的抗议团体，他们深知这些所谓的安全措施不过是场闹剧，只是政府用来对善良德国民众实施暴政的工具。他们的理念无比正确，而我们的责任不仅是声援，更要公开支持他们终结这些专制措施的斗争。支持他们，我们责无旁贷。"
 GER_crackdown_on_protests: "镇压抗议"
 GER_crackdown_on_protests_desc: "民众固然有权上街抗议他们眼中的不公，但致命病毒正在肆虐，这些抗议活动只会加速疫情在全国蔓延，不可避免地导致更多人死亡。非常时期当行非常之法，我们有必要动用一切手段，坚决驱散这些危害社会的集会。必须不惜一切代价阻断新冠病毒的传播。"
 GER_reopen_the_country: "全国放开"
 GER_reopen_the_country_desc: "经过数月的动荡，新冠感染与死亡病例已显著下降。这场疫情最黑暗的时刻，终于成为过去。虽然长期闭关导致经济暂时受挫，但衰退不过是昙花一现。随着国门重启，旅游业正迎来数十年未见的井喷式增长。数百万欧元源源涌入，我们已然尝到开放的红利。只需假以时日，德意志不仅能满血复活，更将开创空前繁荣的新纪元！"
 GER_partial_rearmament: "部分重整军备"
 GER_partial_rearmament_desc: "我们逃避现实已经太久，如今必须直面真相。尽管德国因历史阴影长期会比重整军备，但若俄罗斯的侵略铁蹄逼近过境，我们能依靠的只有自己与欧洲伙伴。全球民主阵营正面临空前危机，我们最强大的盟友美国已无力提供保护，这意味着抵御俄罗斯帝国主义的最强威慑已然消失，嗜血的投机者已嗅到血腥气息。事实再清楚不过，要保卫欧洲免遭迫近的威胁，我们必须立即重整军备，为可能到来的俄欧冲突做好万全准备。"
 GER_fuel_alternative_future: "清洁能源未来"
 GER_fuel_alternative_future_desc: "未来属于替代能源，无论是核能还是可再生能源。十年后，我们可以确定，车辆将越来越多地依赖于我们强大且清洁的能源网络。煤炭不再推动国家的能源发展，我们也不再依赖进口天然气。我们现在为人民提供了天然、清洁、绿色的选择。为了清洁的未来，我们已经做出了正确的决策。"
 GER_one_europe_one_vision: "一个欧洲，一个愿景"
 GER_one_europe_one_vision_desc: "我们行遍世界，为欧洲的利益奔走呼号，签署了一项项让全体欧洲获益的贸易协议。我们不辞辛劳，将欧洲更加紧密地凝聚在一起，将她与德国的命运紧密相连。如今，在共同的愿景与坚定的意志之下，我们可以无所不能！尤其是，现在我们在世界舞台上已赢得了新的合作伙伴，前景更加光明。"
 GER_promote_public_transportation: "推广公共交通"
 GER_promote_public_transportation_desc: "公共交通是一种节能的运输方式，也是德国城市的重要标志。扩展公共交通并推广其使用可以减少能源消耗和交通拥堵。这毫无疑问是一个利大于弊的举措。"
 GER_european_green_deal: "欧洲绿色协议"
 GER_european_green_deal_desc: "我们为自己所做的一切，也应该为整个欧洲去做！如果只有我们推动可再生能源，那就太浪费了！我们应该将绿色协议推广给我们的经济伙伴，让大家都受益，获得更干净的空气、更干净的欧洲！别忘了，这还有经济利益！尽管这意味着我们可能会暂时落在后面，但对欧洲有益的事情，最终也会对我们有利！"
 GER_depression_recovery: "萧条中复苏"
 GER_depression_recovery_desc: "曾几何时，我国经济犹如精密的机器开始高效运转，源源不断地为国家和人民创造财富。然而，就在经济腾飞之际，这场疫情如同扳手卡进齿轮，令整个系统戛然而止。德国工人们正在遭受苦难，他们失业潦倒，毕生积蓄几乎一夜蒸发。国家有义务不惜代价终结这场危机，重振经济。通过我们的振兴计划，德意志经济不仅将强势反弹，更将攀升至欧洲前所未有的新高度。"
 GER_defenders_of_democracy: "民主捍卫者"
 GER_defenders_of_democracy_desc: "尽管许多人尚未察觉，德意志民族正肩负着前所未有的使命。当美国深陷史无前例的内乱时，抵御周边独裁者、守护民主火种的重任已落在德国肩上。我们不仅要继承美国留下的遗产，更要超越其成就，避免重蹈覆辙。面对俄罗斯的威胁，我们既要筑牢民主防线，更要让自由之光如灯塔般照耀全球每个角落。"
 GER_integrate_american_airbases: "整合美国空军基地"
 GER_integrate_american_airbases_desc: "这可能是21世纪最悲惨的事件——美国陷入了一场毁灭性且复杂的空前内战中。虽然这绝对是一场灾难，但每场悲剧也都伴随着机遇。随着美国开始崩溃，许多驻外美军被调回国内保卫家园，这让我们境内的几乎所有美国空军基地都人去楼空。既然美国正处于内乱状态，他们已不再需要这些基地。但面对俄罗斯与日俱增的威胁，北约显然需要这些基地来保卫欧洲。我们必须接管这些闲置的空军基地，绝不能任其荒废。"
 GER_europes_darkest_hour: "欧洲的至暗时刻"
 GER_europes_darkest_hour_desc: "我们将他们赶回了俄罗斯的核心地带，我们以为他们已经完蛋了，但我们错了……"
 GER_arsenal_of_democracy: "民主兵工厂"
 GER_arsenal_of_democracy_desc: "我们是欧洲最大的工业经济体，因此，现在轮到我们承担“民主兵工厂”的重任。雷神公司被莱茵金属取代，欧洲各国将寄希望于德国来弥补他们的短缺，而我们将回应他们的呼唤。"
 GER_defenders_of_europe: "欧洲捍卫者"
 GER_defenders_of_europe_desc: "美国缺席后，德国就是北约人口最多的国家，而且还是最富有的国家。我们有望成为新的欧洲之盾。为此，我们必须竭尽所能，从头恢复军国主义，为自由而战的军国主义。为了自由！"
 GER_bolster_bmvi: "支持联邦交通和数字基础设施部"
 GER_bolster_bmvi_desc: "边境管理和签证工具是一家泛欧洲海关机构，负责欧盟边境的海关管理。它承担了传统国家海关机构的角色，将欧洲的经济统一成一个整体。然而，它也有一些不足之处。让我们加强它的功能，使欧洲拥有一个能够有效处理大量进出口贸易的海关机构。"
 GER_empower_the_chancellor: "赋权总理"
 GER_empower_the_chancellor_desc: "德国联邦宪法保卫局肩负着捍卫国家宪法的神圣使命。在宪法保卫局的护卫下，联邦总理亦恪尽职守，全力保障德国民众的权利与安全。然而当下，我们的社会正遭受恶意势力的威胁，这些势力不仅企图剥夺德国人民的权利，更妄图摧毁我国民主制度的根基。我们虽痛心疾首，却不得不采取必要措施。事实昭然若揭：若放任这些毒瘤组织继续渗透德国政坛，唯有赋予总理特别权限，依法予以取缔，方能真正守护自由之光。"
 GER_set_an_american_policy: "决定对美政策"
 GER_set_an_american_policy_desc: "冷战结束后一直困扰美国的内部分裂终于爆发。两个自诩合法的政府陷入血腥内战，但局势比我们任何分析师的预测都更为复杂——从新英格兰到加利福尼亚，激进民兵、帮派和州政府为争夺控制权混战不休，无政府状态肆虐全国。这个恐怖局面催生了一个简单问题：我们该支持谁？时间紧迫，必须立即判定这场内战中哪个政府（如果有的话）具有合法性。"
 GER_germany_first: "德国优先"
 GER_germany_first_desc: "长久以来，我们总是将外国利益置于德国人民福祉之上。我国经济被无数贸易协定所束缚，这些协定将我们与那些管理不善的经济定时炸弹紧紧捆绑。德国百姓日益贫困，而那些从中渔利的权贵阶层却愈发富有。无能的政客们对此视若无睹，只顾穿梭于无数国际会议之间。诚然，我们的盟友处境艰难，但我们又何尝不是？若连国内问题都无力解决，又如何能与俄罗斯抗衡？绝无可能！我们决不能坐视国家因之陷入动荡与衰败。必须确保德国利益高于一切！"
 GER_restore_bundeswehr_pride: "重塑德军荣光"
 GER_restore_bundeswehr_pride_desc: "长久以来，联邦国防军因规模萎缩和军费拮据而饱受全球讥讽。我国民众对军队的自豪感与信任度已跌至历史冰点。这一切必须终结——我们绝不容忍联邦国防军继续沦为欧洲乃至世界的笑柄。德国人民理应为自己的军队感到骄傲，他们需要相信我们能够保卫欧洲免受俄罗斯的威胁。我们将倾尽全力重振联邦国防军荣光，让每个国民都深知这支军队强大可靠，必将守护他们的安全。"
 GER_common_agrigultural_policy: "共同农业政策"
 GER_common_agrigultural_policy_desc: "欧洲必须推行统一的农业政策，这既是为了满足我们的味蕾，更是为了农民的利益。全欧农业生产应当形成标准化流程。长期以来，农民使用的农药严重破坏了德国生态系统健康，我们将很快对此实施限制。健康的环境才能培育健康的作物与牲畜，即便农民起初有所抵触，待改革见效时自会理解。德国必将成为全球绿色农业的标杆，让这片土地滋养健康的国民，进而成就幸福的人民。"
 GER_deal_with_visegrad: "与维谢格拉德集团的交易"
 GER_deal_with_visegrad_desc: "维谢格拉德集团常被认为是疑欧主义发源地，他们觉得自身遭到欧盟忽视，俨然成为“联盟中的联盟”。我们应当做得更多，让波兰以及整个维谢格拉德集团感受到真正的归属感与充分的服务。先让他们加入欧元区吧。幸运的是，他们的货币既不强势，也没有印上君主的头像，或许这样真能说服他们。"
 GER_balkan_diplomacy: "巴尔干外交"
 GER_balkan_diplomacy_desc: "巴尔干半岛是一个战略位置重要且资源丰富的地区。尽管苏联解体后该地区陷入政治动荡，但其蕴藏的发展潜力不容小觑。以罗马尼亚石油为例，这些尚未充分利用的资源，在欧洲和德国面临最坏情况时可能至关重要。为获取这些资源，我们必须着力改善与巴尔干国家的关系，在外交上胜过投机取巧的俄国人。要知道战争不仅靠武力取胜，更取决于外交手腕与对话艺术。"
 GER_tackle_traffic_light_coalition: "破坏红绿灯联盟"
 GER_tackle_traffic_light_coalition_desc: "社民党、自民党和绿党组成的红绿灯联盟，始终是基民盟的眼中钉。多年来除了给德国人民添堵外一事无成，我们已忍无可忍。必须尽快拆散这个联盟！要拔除这根肉中刺，我们有的是办法：要么开出比社民党更优厚的条件分化其成员，要么干脆把社民党拉入我方阵营，让其余党派在选举中湮没无闻。无论如何，待我们出手之时，红绿灯联盟必将被扫进历史的垃圾堆！"
 GER_eu_economic_integration: "欧盟经济一体化"
 GER_eu_economic_integration_desc: "通过建立BMVI，或者说“边境管理和签证机构”，我们会有能力将欧盟整合得更加紧密相连。在经济方面，这一组织会沿欧盟的外部边界维持共同的海关，因此，所有进入欧盟的贸易都只需要在欧盟的入境口岸过关，而不是各个国家自己的海关机构。"
 GER_support_caucasian_independence: "高加索外交"
 GER_support_caucasian_independence_desc: "自2008年梅德韦杰夫入侵格鲁吉亚，以及此前苏联解体后的阿布哈兹战争以来，格鲁吉亚已成为俄罗斯在高加索地区争端的中心。而亚美尼亚与阿塞拜疆等国，亦未顺从俄罗斯的意志。诚如诸多先见所言，战争不仅决胜于枪弹，更取决于外交辞令与笔墨文书。我们应当尝试与高加索地区诸国建立联系，此举或将赢得他们的信任与忠诚。"
 GER_russo_german_trade_deal: "俄德贸易协议"
 GER_russo_german_trade_deal_desc: "自施罗德执政以来，俄罗斯与德国之间的贸易关系始终保持着相对友好的局面。在当下的国际局势中，我们没有必要动摇这艘与俄罗斯的“和平之舟”。两国的紧密联系足以确保俄罗斯与欧盟的和谐共处。通过绕过那些令俄罗斯举步维艰的制裁，我们将有机会独享关键资源，尤其是来自GAZPROM那庞大的石油供应，以及其他我们亟需的重要原材料。"
 GER_improve_the_eurocopter: "投资欧直公司"
 GER_improve_the_eurocopter_desc: "与“欧洲战斗机”一样，欧洲直升机也是在欧洲多个国家的共同研究下诞生的，作为一款通用的空中载具，适用于广泛的应用领域。从医疗运输到执法，甚至军事行动，欧洲直升机都是真正强大的一体化飞机。但正如所有事物一样，它也需要升级。豹2坦克已经历过数次升级，而现在，正是我们为欧洲直升机推出升级版本的时候了。"
 GER_tackle_corporations: "应对企业"
 GER_tackle_corporations_desc: "纵观德国历史，大企业始终是政治腐败与社会不平等的幕后黑手。它们为追逐利润不择手段，竭尽所能榨取每一分不义之财。由此酿成的人间苦难罄竹难书；这一切必须终结！我们将勒令这些企业不仅偿还亏欠，更要补偿那些被其权钱交易长期剥削的民众。德意志人民必将重获繁荣！"
 GER_protect_the_german_economy: "保护德国经济"
 GER_protect_the_german_economy_desc: "德国依然是整个欧洲大陆最强的经济体或最强的经济体之一。对斯拉夫蛮子的战争使得我们的经济和我们的国家变得脆弱不堪，我们必须巩固控制，并通过我们目前能采取的任何手段保护我们的经济实力。"
 GER_prepare_for_new_decade: "准备下个十年"
 GER_prepare_for_new_decade_desc: "随着欧洲的敌人逐渐被击退，历经的种种苦难接近尾声，我们应当整装待发，拥抱未来的平静与繁荣。为此，我们必须首先解除战时经济的动员，重新拥抱消费主义，优先复兴并推动经济的发展与繁荣。"
 GER_invest_in_automation: "投资自动化技术"
 GER_invest_in_automation_desc: "随着我们逐步迈入国家的新纪元，我们也必须为工业核心地带做好未来的准备。我们将开始在所有工业部门和工厂中投资自动化机械的开发，逐步减少对人力和劳动力的依赖，为生产增效提速。"
 GER_ai_development: "AI研发"
 GER_ai_development_desc: "人工智能将成为未来几十年开辟新时代道路的基石，推动企业和军事领域的发展。我们必须引领人工智能的发展，成为在科技领域占据主导地位的首批国家之一。"
 GER_expand_broadband_infrastructure: "扩展网络宽带基础设施"
 GER_expand_broadband_infrastructure_desc: "我们的宽带基础设施至关重要，不容低估，它为全国范围内提供了高速互联网和通信支持。我们将启动基础设施的建设和扩展，目标是为更多偏远地区的社区提供可靠、快速的网络接入，以提升教育、医疗、商业和个人用途的连接质量。"
 GER_walkable_cities: "步行城市"
 GER_walkable_cities_desc: "欧洲尤其是德国一直以步行友好城市闻名。而我们会进一步提升这一理念，增加公共交通和步行便利设施。减少排放和燃料消耗，并提高人民的幸福感！谁不喜欢悠闲地散步去面包店呢，是不是？"
 GER_industrial_modernization: "工业现代化"
 GER_industrial_modernization_desc: "在这个新时代，我们正经历一场新的工业革命。随着自动化逐渐取代人工操作的机械，工程师和技术人员在这些自动化工厂的可持续运作中变得越来越重要。让我们推动职业学校的发展，并为那些寻求机器人学教育的人提供补贴。随着自动化的发展，他们的领域将变得越来越重要。"
 GER_computing_research: "研发计算机"
 GER_computing_research_desc: "计算机与计算科学研究在推动国家人工智能、网络安全及数据分析等领域的发展中占据着至关重要的地位。我们将进一步拓宽研究视野，提升研究效率，并努力开发出能够引领各领域和行业创新的解决方案。"
 GER_german_edgenuity: "德国智造"
 GER_german_edgenuity_desc: "德国的智慧已铭刻在历史的篇章中，数百项发明，数千位先驱，德国科学的根基深植于数个世纪的传承中。我们曾发明火箭，若时机所需，亦能再次重塑轮子的模样。全世界都知晓我们的创造力，而我们必须保持“德国制造”与“质量”的同义性。"
 GER_expand_consumer_market: "拓展消费市场"
 GER_expand_consumer_market_desc: "德国作为欧洲最大且全球领先的经济体之一，拥有广泛而多元的消费群体，并以卓越品质闻名于世。通过积极拥抱电子商务和新出口机遇，我们不仅能进一步拓宽消费市场，还能灵活应对消费者偏好的变化及全球趋势的演进。"
 GER_engineering_marvel_of_europe: "欧洲工程奇迹"
 GER_engineering_marvel_of_europe_desc: "德国素以工程领域的卓越成就闻名欧洲，拥有诸如大众、宝马、博世和西门子等以创新为驱动力的行业巨头。通过加大对新兴技术的投资力度、更新工程教育课程以及深化全球合作，我们能够巩固并提升我国作为全球经济领军者的地位。"
 GER_host_american_companies: "收购美国公司"
 GER_host_american_companies_desc: "众多美国公司，如电信巨头美国电话电报公司和航空制造商洛克希德·马丁公司等，已表达出将业务部分或全部迁至我国的意愿。凭借我国熟练的劳动力资源以及新合作伙伴关系的契机，我们可以制定优惠的关税政策和税收减免措施，从而提升德国公司在美国市场的贸易效率。"
 GER_work_with_technocrats: "与技术官僚共事"
 GER_work_with_technocrats_desc: "与技术专家——那些基于专业技术而非仅凭政治立场做决策的专业人士——合作，将有助于推动创新并强化我们的经济。我们将任命技术专家担任关键咨询职位，鼓励政府机构与私营企业开展联合项目，以提升效率，并通过专家见解重申基于实证的决策方式。"
 GER_invest_in_bio_fuels: "投资生物燃料"
 GER_invest_in_bio_fuels_desc: "投资生物燃料不仅有助于减少温室气体排放，还将实现能源多样化，同时在农业、生产和技术开发领域创造就业，促进创新。此外，这一举措还能减少浪费，推动资源高效利用。我们将设定交通领域生物燃料使用的最低比例为10%，并通过补贴生物柴油和费托燃料的方式提升国内生产。"
 GER_harness_power_of_atom: "驾驭原子之力"
 GER_harness_power_of_atom_desc: "核裂变研究对我国尤为重要，尤其是在能源政策的背景下，突破该领域将带来巨大创新并创造大量就业机会。我们将专门拨款用于核裂变研究，与研究机构和大学合作，推动核科学与工程领域的教育。核裂变将为我们提供一种稳定可靠的能源来源，实现能源多样化，并减少对进口能源的依赖。"
 GER_renew_worker_contracts: "续签劳工合同"
 GER_renew_worker_contracts_desc: "当欧陆战争爆发时，许多人思索着谁能抵御俄罗斯的威胁。如今多数人只记得前线的士兵与联邦国防军的万千将士。诚然这些勇者实为英雄，但战争胜利绝非仅靠他们。正如战士一样，工厂里的工人同样是欧洲的捍卫者。这些后方劳动者以血汗铸造军火，支撑起东欧战场的补给线。正是他们的风险，才使我们赢得胜利。绝不能让他们在经济改革中被边缘化，我们必须续签劳工合同，让其继续奋战在生产线上。"
 GER_expand_eus_reach: "扩张欧盟影响"
 GER_expand_eus_reach_desc: "从诸多方面而言，欧盟由于德国构成了其经济中枢而事实上成为了其国家权力的延伸。由此推论，任何有利于欧盟扩张的举措，必然促进德国的发展。我们将通过联邦机构的影响力，持续深化联盟的统合力度，最终确立我们作为欧盟主宰者的地位。"
 GER_unify_our_goals: "统一目标"
 GER_unify_our_goals_desc: "民主制度最大的弱点在于分裂。当政客们沉溺于琐碎争论而非为民谋福时，民主便沦至最脆弱的时刻。这恰恰向独裁者证明了民主制度的失灵，更成为他们宣传攻势的弹药。看看美国吧，内部分裂与无谓争执已使其内部撕裂如同野兽互噬。如今欧洲只能孤军面对俄罗斯这头巨熊。我们绝不能重蹈覆辙，更不可坐视欧洲盟友独自应对东方威胁。或许有人追问解决之道，答案其实很简单：团结。各党派必须摒弃前嫌，确立共同目标，方能确保德国的未来光明璀璨！"
 GER_socialisms_second_chance: "社会主义的第二春"
 GER_socialisms_second_chance_desc: "随着德国左翼党在联邦选举中获胜，二战后祖国分裂的记忆再次浮现在许多公民脑海中。有人视此为东德怀旧情绪的终极爆发，也有人认为左翼党是1968年西德新左派运动的产物，是鲁迪·杜契克“穿越体制的长征”之最终胜利。\n\n无论存在何种偏见，我们都将运用新权力来接纳工人运动，证明社会主义可以在统一民主的德国建成。向着胜利，前进！"
 GER_anti_poverty_initiative: "扶贫措施"
 GER_anti_poverty_initiative_desc: "尽管我国经济实力雄厚，但仍面临贫困问题的持续挑战。我们计划向低收入地区的小型企业提供补贴和低息贷款，并在服务不足的社区推行公共就业项目，帮助个人获得必要的技能培训。同时，我们将加大对社会住房项目的投资，确保低收入家庭能够住上负担得起且质量上乘的住房，此举既解决当前之需，又促进长期的社会公平。"
 GER_empower_the_unions: "赋权工会"
 GER_empower_the_unions_desc: "我们必须赋予工会更大权力，强化其在工作场所的作用，从而助力经济发展。我们将立法保障工人的组织权、罢工权和集体谈判权，加强工会为成员争取更优待遇的能力。鼓励工会参与政治倡导与就业保障措施，将有助于提升社会凝聚力、增强工作满意度，并有效减少收入不平等现象。"
 GER_tax_the_rich: "富人交税"
 GER_tax_the_rich_desc: "通过征收高额股息税，我们将能确保资金流通，而不是集中在少数特权阶层手中。这是我们为实现更平等的社会而采取的措施之一，尽管它可能会引发少数人的愤怒并导致投资撤回。"
 GER_work_with_private_initiatives: "与私人倡议合作"
 GER_work_with_private_initiatives_desc: "私营部门是就业的重要支柱，既能提振地方经济，又能创造新的就业机会。通过公私合作模式，我们将与私营机构携手推动基础设施、科技与服务领域的发展。政府可通过拨款或税收优惠等方式，激励私营企业加大研发投入。正如经济学家沃伦·普拉特博士那句名言：“私营企业是我们经济的引擎。”"
 GER_broaden_the_bmf: "扩张财政部"
 GER_broaden_the_bmf_desc: "自由市场本质上是不稳定的市场。如果没有政府的干预，我们国家的经济就会一落千丈。倘若放任市场自我调节，垄断集团就会滋生，民生福祉将被剥夺，而最令人担忧的是，政府的影响力可能会动摇。通过扩大财政部的职能，我们能够更牢固地掌控经济命脉，从而确保政权稳固与全局可控。"
 GER_create_the_nwp: "制定新经济政策"
 GER_create_the_nwp_desc: "正如无数先贤与奠定这一经济理论基石的伟人所憧憬的那样，这一学说的构建与实现必将经历漫长而艰辛的历程。然而，无论面对民众中短视愚昧之徒的阻挠，还是市场出人意料的反应，我们都已严阵以待。这是崭新的世纪，更是德国与世界的新纪元。破旧立新，势在必行。"
 GER_the_sunflower_over_germany: "向阳花开遍德意志"
 GER_the_sunflower_over_germany_desc: "德国正迎来崭新的黎明。随着我们在联邦选举中获胜，我党已准备好应对21世纪的挑战。基民盟对政府的掌控终于瓦解，随着他们的退场，我们终得取而代之。消费主义泛滥与环境破坏长期困扰我国。如今我们胜利的种子已在全国萌芽，新的曙光即将降临。污染与衰退将被革新与重生取代，德国人民将再次为祖国的自然之美而自豪。"
 GER_promote_equality: "促进平等"
 GER_promote_equality_desc: "尽管过去取得了一些成就，但仇恨、偏执与狭隘的毒瘤仍在侵蚀我们的祖国。基民盟往往对仇恨的滋长无动于衷，但我们不会重蹈覆辙。既然现已大权在握，我们就必须终结长期纵容的停滞与冷漠。绿党将连根铲除仇恨与偏狭，让平等共生的理念如同向阳花般绽放，昭示更美好明天的曙光。"
 GER_fight_consumerism: "反对消费主义"
 GER_fight_consumerism_desc: "自全球化伊始，猖獗的消费主义便如毒藤般缠绕着德国。那些促销活动与浮华展示，让过敏沉溺于无度消费。在资本贪婪的驱动下，工厂向天空无止境地排放微塑料与致癌物。而今我们将清除祖国大地上的消费恶臭，让德意志的自然之美重焕生机。"
 GER_tackle_pollution: "处理污染"
 GER_tackle_pollution_desc: "我们祖国的美丽风景被垃圾所污染，我们的蓝天被工业烟尘所笼罩。对任何敢于参与这种无耻行为的人或企业进行罚款，我们将给予直接打击。不仅如此，对于那些采取可持续发展生产方式的企业，我们也会给予慷慨的税收减免作为奖励。"
 GER_accelerate_the_nuclear_phase_out: "恢复核能利用"
 GER_accelerate_the_nuclear_phase_out_desc: "我党历史上最大的耻辱，莫过于对核能的强烈抵制。切尔诺贝利等核事故引发的恐惧，使我们长久以来对其巨大贡献视而不见。现在正是放下傲慢的最佳时机，我们必须承认核能才是祖国未来的能源支柱。尽管立场的突然转向会疏远部分铁杆支持者，但为了国家的绿色未来，这条路非走不可。"
 GER_invest_in_renewables: "可再生能源建设项目"
 GER_invest_in_renewables_desc: "随着最后一记拆除球的挥动，德国的核电站终于全部退役。取而代之的将是一个更优质、更安全的绿色能源体系。我们将效仿美国盟友，推行绿色行政：翻新水坝、建造太阳能板、资助风力发电。通过与各州政府通力合作，清洁能源将如巨网般覆盖整个德国。尽管代价沉重，但为了国家的健康与安全，我们责无旁贷。"
 GER_further_the_green_new_deal: "深化绿色新政"
 GER_further_the_green_new_deal_desc: "在我党的引领与精心培育下，绿色新政不仅取得成功，更远超预期。昔日的烟囱与钻井塔林立之处，如今草木葱茏，繁花似锦。但我们岂能止步于清洁能源？电动汽车、高速铁路、可持续城市，所有构想都将获得支持。如今的德国不仅焕发新生，更如鲜花绽放。我们将把这股绿色革命浪潮推向整个欧洲，直至这片大陆彻底摆脱生态恶化与污染阴霾。"
 GER_the_red_rose_over_germany: "红玫瑰开遍德意志"
 GER_the_red_rose_over_germany_desc: "世界与德国正站在灾难边缘。新冠疫情的创伤尚未痊愈，我们又迎来新的动荡时代。石油短缺、股市崩盘、自由主义国际秩序瓦解。值此之际，绝不能让人民任由自由市场摆布。既然我们领导联邦政府，社民党必将兑现承诺，保护工人免受经济波动冲击，并扩大德国福利制度，确保繁荣不只为少数特权阶层享有。我们以人为本的政策必将引领德国渡过这场风暴。社会民主主义将在德国再次绽放，坚韧应对即将到来的危机。"
 GER_expand_welfare: "扩大福利"
 GER_expand_welfare_desc: "社会民主党历来主张强大的福利制度不仅是道德义务，更是经济必需。在我们继续为更公正的德国而奋斗时，必须扩大社会福利覆盖范围。我们的使命是增强养老金体系、改善医疗可及性，确保每位德国公民无论男女老幼都不被抛弃。尽管批评者会指责这些措施过度且难以为继，但历史证明社会投资能为全民带来繁荣。"
 GER_economic_stabilization: "经济稳定"
 GER_economic_stabilization_desc: "随着美国崩溃导致法兰克福证券交易所暴跌，石油危机又冲击着整个欧盟的能源供应，德国与欧洲必须果断应对这场新动荡。德国央行已准备干预，针对易受衰退影响行业的刺激措施正在起草中。尽管有人主张激进的政府干预，但多数人警告国家过度行动的风险。政府将在稳定和可持续增长间寻求平衡。若处理不当，这场危机恐将演变为灾难。"
 GER_increase_federal_income: "增加联邦收入"
 GER_increase_federal_income_desc: "扩大福利制度与公共投资需要更多资金。尽管自由民主党等势力可能反对对1%富人增税，但我们以人为本的施政理念要求财政纪律。通过实施临时增税，我们将获取扩展社会福利所需的全部资源，从而巩固德国当下与未来的发展。虽然可能损失部分政治支持，但此举为德国人民带来的稳定与繁荣，足以证明短期牺牲的价值。"
 GER_integrate_the_refugees: "融合难民"
 GER_integrate_the_refugees_desc: "德国长期以来一直是逃离战争与苦难者的灯塔——无论是叙利亚内战、阿富汗和刚果危机，还是本世纪最终回归故土的数十万南斯拉夫人。但随着美国与阿拉伯地区每月都有新危机爆发，寻求庇护者的数量短期内不会减少。\n\n政府将采取大胆策略而非孤立新移民，让他们融入社会与劳动力市场，确保其为德国经济做出贡献。更强的法律保护与福利计划将为“新德国人”提供入籍途径，军事改革则为愿为新祖国效力的他们创造机会。该政策势必会遭遇保守派与反动势力的抵制，但在这动荡时期，德国必须坚持包容与团结。毕竟，“德国人”的真正含义是什么？是时候重新定义德意志了。"
 GER_keep_the_rhine_red: "莱茵鲁尔江山红遍"
 GER_keep_the_rhine_red_desc: "德国工业区长期以来一直是国家争取社会主义斗争的支柱。从鲁尔区的矿井到莱茵兰的繁华城市，一代代德国社会主义者和共产党人为更高的工资、更强大的工会和一个更公正的德国而奋斗。如今，随着经济不确定性逼近，反动政党企图破坏工人取得的这些胜利。而社会主义政府将加倍履行对工人阶级的承诺，确保社民党的红旗在莱茵兰上空飘扬。"
 GER_raise_the_minimum_wage: "提高最低工资"
 GER_raise_the_minimum_wage_desc: "任何德国工人都不应为尊严生活而挣扎。面对不断上涨的生活成本和经济不稳定对数百万中低收入公民生计的威胁，社民党将采取果断行动，提高最低工资标准，确保所有人获得公平报酬。这项改革不仅是经济措施，更是我们对社会正义坚定承诺的证明。进一步加强福利国家制度，保障工人生活工资，将为公平社会奠定基础：一个繁荣被共享而非独占的社会。德国将再次证明，经济增长与社会责任绝非对立力量，而是共同推动进步的伙伴。"
 GER_the_invisble_hand_over_germany: "无形之手支配德意志"
 GER_the_invisble_hand_over_germany_desc: "当世界陷入疯狂之际，作为当代自由主义心脏的德国，必须选择理性的领航者，而自由民主党正是最合适的自由主义掌舵人。尽管存在异议，但其他党派的控制政策与市场操纵只会加速衰亡。只有回归根本之道，遵循唯一原则，才能让市场的无形之手再次引领德国走向理性的伟大。"
 GER_encourage_competition: "鼓励竞争"
 GER_encourage_competition_desc: "竞争会促进创新，且在价格调节方面发挥着至关重要的作用。通过资助小微企业，我们将打破大公司的市场垄断，扶持小企业的发展，从而创造一个更加多元化的产业格局。中小企业曾是德国经济的支柱，直到“工人天堂”政策迫使他们关门歇业。现行法规和税收制度只对成熟的大型集团和外国企业有利，对本地杂货店却收效甚微。"
 GER_the_nation_of_innovation: "创新之国"
 GER_the_nation_of_innovation_desc: "德国始终屹立于创新前沿，世界上最伟大的发明家、科学家、诗人、音乐家和工程师都诞生于此。我们的军事装备是全球最抢手的剩余物资：豹式坦克骄傲地列装数十国装甲部队，制造的军火响彻全球，柴油发动机驱动着数千万车辆。我们是创新的国度，数个世纪来只为世界贡献新技术。就像火箭技术，即便在战争中我们仍在创新。"
 GER_expand_the_liberal_cause: "发展自由事业"
 GER_expand_the_liberal_cause_desc: "德国仍有众多质疑甚至公然反对我们目标的声音。绿党、社民党和基民盟中许多人认为，我们削弱监管和福利的医院等同于摧毁德国80年来的传统。但我们毫不畏惧，因为我们倾听工人和企业家的心声。每削减一项税收，就能听到一个家庭为存款增加的欢呼；每废除一条法规，就有一家本地企业开业并可能延续百年。我们正在建设一个更好的德国，一个属于企业家和自由市场真正热爱者的德国，而非大集团的乐园。这是一个人人只要有资金就能参与的经济体系。"
 GER_lower_the_taxpayers_burden: "减轻纳税人负担"
 GER_lower_the_taxpayers_burden_desc: "纳税人将收入的很大一部分上缴政府，却只为支付那些可能很少用到的福利。试想这笔钱若回到人民手中会带来多大效益，单是商品市场的增长就足以让我国经济一飞冲天。福利固然美好，但说实话：你多少次因为缺钱而放弃心仪之物？而我们将赋予你财政支配的自由。"
 GER_freer_markets_freer_people: "市场越自由，人民越自由"
 GER_freer_markets_freer_people_desc: "自由放任，这将是我们经济政策的主导原则。我们将减少国间干预政策，确保自由市场的运行，让人民成为自己意志的主人。几十年来，政府国度干预一直阻碍着德国的经济发展。随着国内外企业家精神席卷我们困境中的市场，有机增长将自然到来。"
 GER_digitalize_the_nation: "国家数字化"
 GER_digitalize_the_nation_desc: "数字化即是未来。尽管你可能更喜欢纸质记录，但数字化存档更加经济。不仅档案管理如此，各行各业皆然。低价未必总是好事，但数字化还更高效。试想，无如果我们的所有纸质记录和法律文献都能通过在线数据库轻松获取，管理流程将变得多么顺畅？再也不用让办事员翻箱倒柜两小时，只为给你找一份出生证明复印件。"
 GER_the_status_quo_maintained: "现状得保"
 GER_the_status_quo_maintained_desc: "尽管过去两年历经重重考验，德国人民仍再次将国家舵盘交予联盟党坚实而经验丰富的领导。凭借联邦议院党团对政府的支持，我们将继续引领德国沿着既定航向前行：维护稳定、守护制度、捍卫自1945年解放以来定义德国的自由民主秩序。完成组阁谈判后，我们将落实政策，使德国保持正确方向。让我们善用这一授权，确保基民盟和基社盟始终是联邦共和国的基石。"
 GER_the_status_quo_shattered: "现状破碎"
 GER_the_status_quo_shattered_desc: "自由民主秩序正在瓦解。尽管我们赢得了选举，但联盟党的主导地位已不再稳固，我们被迫走上一条过去难以想象的道路：与选择党合作，或组成联合政府。虽然我们仍掌握政府主导权并作为联盟中的主要政党，控制力正在减弱，极端主义声音日益喧嚣和大胆。若要维护民主制度，我们必须谨慎行事，在日益民粹化的政治环境中前行，同时确保联邦共和国不会陷入混乱。"
 GER_work_with_the_banks: "与银行合作"
 GER_work_with_the_banks_desc: "强大的德国需要强大的银行业。通过与银行合作，我们将确保资金持续流入经济，增强投资者信心，并加速发展进程。通过改善信贷获取渠道和更有效的金融政策，我们将见证中小企业增常、工业化和基础设施发展，为德国成功复兴奠定基础。稳定始于经济安全，有银行业支持，整个国家就有了保障。"
 GER_revive_the_ruhr: "振兴鲁尔区"
 GER_revive_the_ruhr_desc: "鲁尔区，昔日德国工业实力的心脏，虽历经多年衰退，其潜力仍不可否认。通过向鲁尔的工厂和基础设施定向投资，我们将恢复其工业重镇地位，带来新就业岗位、稳定性和对联盟党领导力的重振信心。强大的鲁尔意味着强大的德国，其复兴将证明我们的经济政策绝非空头承诺。"
 GER_attract_foreign_investment: "吸引外资"
 GER_attract_foreign_investment_desc: "德国经济历来以信任为基石。通过打造投资避风港形象，我们必将开启外资涌入的新浪潮，为工业注资推动基础设施现代化。凭借激励措施与战略合作，我们将吸引全球资本，加速工业扩张，在未来数年重夺全球经济核心地位。一个繁荣的德国，将是投资者不容忽视的选择。"
 GER_reaffirm_our_commitment_to_europe: "重申对欧承诺"
 GER_reaffirm_our_commitment_to_europe_desc: "我们必须重申在欧洲的领导地位，以及维护欧洲一体化项目团结稳定的责任。通过巩固与最重要盟友的联系并公开欢迎合作，德国将再次确立其作为欧盟实际领导者的地位。然而，这种承诺并非没有代价。国内仍有质疑声，欧盟其他地区的疑欧情绪也在滋长。唯有联盟党的领导才能确保我们的欧洲愿景不会侵蚀人民对领导层的信任。"
 GER_focus_on_germany: "专注德国"
 GER_focus_on_germany_desc: "终于到了该把注意力转向国内的时候了。长期以来，我们和社民党都过于看重欧盟官员的野心，而忽视了本国公民的福祉。只有将重心转回国内，才能重振民众对国家领导层的信心，让人民再次确信他们才是我们的首要关切。这一决定势必引发争议，但对许多早已对以一体化为名不断妥协感到失望的德国人来说，这是迟来的纠偏。"
 GER_ensure_continued_democracy: "稳固民主制度"
 GER_ensure_continued_democracy_desc: "对许多欧洲人而言，德国是西方民主成功典范的标杆，这绝非偶然。我们的制度运转两行，腐败率低，公民和社会权利得到尊重，选举自由公正。这是我们引以为豪的地位，但也需要我们继续以饱满热忱坚定维护。我们的制度必须始终保持对胁迫和腐败的免疫力，我们的政治家必须恪守并捍卫法治原则，我们对欧洲一体化事业的承诺必须毫不动摇。我们将竭尽全力抵制俄中两国兜售的霸权主义与极端主义。这绝非易事，但我们对这个国家的愿景十分明确：德国民主必须长久屹立，这不仅是为了德国自身，更是为了整个欧洲大陆的福祉。"
 GER_the_true_alternative_for_germany: "德意志真正之选"
 GER_the_true_alternative_for_germany_desc: "德国人民已经做出了选择。在经历了多年的停滞与衰退后，他们选择了一条崭新的道路，一条摆脱妥协、软弱和建制派失败的新道路。经过长达八年的奋斗，德国选择党终于登上了德国政治的最高殿堂，肩负着为国家恢复秩序、主权与实力的承诺。前路必将艰难：建制派势力依然根深蒂固，精英阶层绝不会轻易认输。但数十年来第一次，德意志民族拥有了一个敢于将德国人民利益置于首位的联邦政府。现在，真正的征程在刚刚开始。"
 GER_revive_the_east: "复兴东部"
 GER_revive_the_east_desc: "近一个世纪以来，东部地区在繁荣程度和发展机遇上始终落后于西部，这已成为德国选择党最坚实的票仓。全球化浪潮与统一承诺的落空，使前东德地区长期陷入发展停滞——工厂凋敝，人民被遗忘。但这一切即将终结，在选择党领导下，联邦政府将重新全力推动东德经济振兴，为当地民众创造新机遇，并向他们证明，只要我们继续执政，柏林就绝不会再度忽视东部。一个将德国人利益置于首位的新经济增长时代即将到来。"
 GER_support_western_industry: "支持西部产业"
 GER_support_western_industry_desc: "当东部渴求变革时，西部仍是德国经济命脉所在。莱茵兰地区长期饱受过度监管与外来竞争之苦，而近年洪灾、疫情与封锁措施更令局势雪上加霜。我们将通过削减繁文缛节与欧盟官僚指令，增强本土企业坚韧性，确保其繁荣发展，为西部经济复兴铺平道路。更强大的莱茵兰，意味着更强大的德意志。"
 GER_restrict_immigration: "限制移民"
 GER_restrict_immigration_desc: "长久以来，难以承受的移民规模给德国经济、社会福利和国家认同带来了巨大压力，将我们深爱的祖国变成了外国人的游乐场。我们的文化被漠视、价值观遭嘲弄，我们的孩子在自己的国土上竟成了陌生人。但德国人民终于决定挺身而出，联邦政府必须以人民的名义采取果断措施，重新掌控边境，确保外来者只能以有益德国经济的方式进入。在联邦议院的支持下，我们将实施强硬措施驱逐非法移民和避难申请被拒者，并重新定义公民身份以守护德国的传统与未来。一个更强大、自给自足的德国，首先要从严格管控国门开始。"
 GER_calm_down_the_radicals: "平息激进派"
 GER_calm_down_the_radicals_desc: "执政需要务实精神。在与基民盟组建联合政府后，德国选择党必须收敛其最激进的立场。自2013年建党以来，我们始终饱受形象问题困扰，而比约恩·霍克及其“翼派”势力无疑加剧了这一困境。未来四年要巩固执政基础，确保联邦议院通过我们的法案，避免联邦政府因内部分歧而突然垮台，妥协在所难免。尽管党内可能有人视此为对核心原则的背叛，但治国理政必须有所让步。若想引领德国迈向新航向，我们就必须改善自身形象。"
 GER_all_on_our_own: "靠我们自己"
 GER_all_on_our_own_desc: "不会有任何折中方案，不会有丝毫妥协，更不容半点迟疑。德国选择党始终是抵御全球主义的中流砥柱——无论它来自左翼还是右翼。如今我们既已掌权，就必须建立一个高度集权、铁腕执政的选择党政府，以最大力度推进议程，终结乱局。这意味着要反击基民盟的限制，捍卫国家主权，为德国应对未来一切可能的危机做好准备。这不仅是一场政治运动，更是一场革命，任何势力都休闲阻挡我们前进。属于我们的时代已经到来，此刻绝不容向建制派低头！"
 GER_germany_above_all: "德意志高于一切"
 GER_germany_above_all_desc: "时隔多年，德国终于迎来了一个真正将德国利益置于首位的联邦政府！我们绝不再做外国利益与全球主义的附庸，更不会继续“欧洲优先”的软弱政策。长久以来，我们被布鲁塞尔的欧盟官僚和那些不敢捍卫祖国的懦弱精英们榨干了最后一滴血汗。但在我们的领导下，德国必将重振雄风，骄傲而坚定地屹立于世。德国人民将彻底改别屈膝妥协的时代：他们将昂首挺胸，誓死捍卫祖国与传统。让全世界都清楚：德意志的脊梁，永远不会再弯折！"
 GER_army_of_the_future: "未来之军"
 GER_army_of_the_future_desc: "联邦国防军用实战证明，技术优势、机动能力与侦察体系是制胜关键。我们不可居功自傲，必须持续推进军事学说革新。如今军队重拾荣光，民众鼎力支持，推动国防现代化建设的阻力，已不复往昔。"
 GER_defend_the_land: "保卫国土"
 GER_defend_the_land_desc: "战争初期我们曾苦苦坚守阵地。通过重新调整战术策略，我们重拾了装甲防御之道，这才免于溃败。学会如何将野战工事现代化以应对无人机威胁，将极大助力我们更从容地击退未来的进攻。"
 GER_lessons_from_nato_war: "欧陆战争的教训"
 GER_lessons_from_nato_war_desc: "欧陆战争让我们重温了一个已知的残酷事实，在欧洲大平原作战如同炼狱，但这场战争还教会了我们更多！现代战争是机动性、科技实力与资源储备的微妙平衡。最致命的观瞄系统与弹药需要顶级材料与精密制造工艺，俄军不仅掌握了电子战技术，更重构了装甲作战学说、整合了无人机体系。尽管我们拥有更新式的枪械、军服与装甲，却在整体上处于落后。我们在军事思想层面已然落伍。俄罗斯人给我们上了深刻的一课，但愿下一场教学轮到我们执掌教鞭。"
 GER_mechanized_warfare: "机械化战争"
 GER_mechanized_warfare_desc: "机械化部队是未来战争中不可或缺的核心力量，这一认知虽早已有之，但欧洲战事将其验证得淋漓尽致。纯步兵部队已难独当一面，若固守阵地则机动迟缓易遭合围，若放弃阵地又缺乏反击手段。机械化装备让我们的士兵既能获得火力支援，又能保持战场机动优势。依托机械化集群的快速突击能力，我们可以主动放弃非关键地域，更能随时集中优势兵器闪电般夺回失地。"
 GER_maneuver_wafare: "机动作战"
 GER_maneuver_wafare_desc: "机动性与灵活性才是战场决胜的关键，你的装备可以先进、崭新、精密，但若缺乏有效训练，一支装备简陋却协同机动的小股部队就能将你彻底压制。优质装备确实能提升优势：可靠的远程通讯系统、稳定的载具平台、能将实时战场态势直接推送至每位班组长终端的综合战场系统。通过卫星侦察辅助，你能精准掌握每一处机动路线与战术选择。每个战术机动都由横跨数万公里的信息网络策划，最终化为精确的战场调度，如同演奏交响乐般协调万千部件。这是一场钢铁齿轮与血肉之躯共同谱写的战争交响曲。"
 GER_SOF_expansion: "扩编特战部队"
 GER_SOF_expansion_desc: "特种部队作为现代战争中不断进化的关键力量，在敌后渗透、基础设施破坏以及隐蔽抓捕与营救行动中发挥着举足轻重的作用。尽管战略价值重大，我军的特种作战部队却长期面临资金短缺的困境，亟待全面升级。为应对未来可能爆发的冲突，当务之急是立即扩编现有特种作战部队规模。"
 GER_redefine_german_logistics: "重塑德国物流系统"
 GER_redefine_german_logistics_desc: "后勤保障实乃军队命脉所在，装备需要送达前线，零件需要及时补充，弹药需要持续供应。而在机动战主导的现代战场上，后勤体系面临前所未有的复杂挑战。要精确掌握部队动态，必须建立完善的监控与报告系统；要确保补给及时送达，必须提升运输速度，以免部队在突破或撤退时丧失战斗力。我们必须全面改革现有补给体系，以满足现代化机械化部队的机动需求，这支力量必须能在无阻碍情况下实现每日200公里的高速推进。"
 GER_drone_r_d: "无人机科研项目"
 GER_drone_r_d_desc: "过去数十年来，无人机已成为一种零伤亡打击敌方阵地的新型作战方式。我们应当大力投入这项技术研发，既要精通无人空中打击战术，更要深入钻研这种特殊作战形式的复杂机理，确保具备反制敌方无人机攻击的能力。"
 GER_ai_development_race: "AI科技竞赛"
 GER_ai_development_race_desc: "人工智能绝非仅是与虚拟角色闲聊、回答荒诞问题或测试其行为边界的工具。它本质上是一台逻辑机器，一台思考机器。这台机器能在瞬息间处理来自亿万源头的数据，并输出最优解。无论是经济规划、军事部署还是公共治理，人工智能都能发挥革命性作用，而我们绝不能在这场变革中落后。这禁果已然高悬枝头，世人虽警惕其危险，却更向往其裨益。我们必须坚持探索到底。"
 GER_faith_in_the_ai: "相信人工智能"
 GER_faith_in_the_ai_desc: "人工智能在战场与日常应用中的卓越表现已得到充分验证。这让我们空军司令部面临一个关键抉择：是否该用人工智能操控系统取代人类飞行员？这一变革不仅能大幅降低人力需求，更可削减高昂的飞行培训成本。"
 GER_faith_in_the_pilot: "相信飞行员们"
 GER_faith_in_the_pilot_desc: "飞行员始终是空军不可或缺的核心力量。鉴于人工智能技术仍处于发展初期，我空军司令部经审慎评估后决定：现阶段仍以保留人类飞行员为最优方案，这既能有效防范友军误击等事故，又可规避人工智能系统带来的维护难题与额外成本。"
 GER_defend_the_skies: "守望天空"
 GER_defend_the_skies_desc: "欧陆战争期间，俄军轰炸机群屡次突破我方领空，不幸导致多座城市遭袭，关键工业设施损毁严重。为杜绝此类空防漏洞，我们必须大幅升级雷达监测体系，全面强化国土防空网络。"
 GER_increase_weapon_leathality: "改进台风战斗机"
 GER_increase_weapon_leathality_desc: "欧陆战争期间，台风战斗机在阻止俄罗斯飞机轰炸我军阵地方面发挥了至关重要的作用。然而，随着技术的飞速发展，我们现在必须对台风的设计进行创新，以有效应对未来更致命的俄罗斯空中威胁。"
 GER_united_and_undefeated: "若团结则战百胜"
 GER_united_and_undefeated_desc: "尽管战事惨烈，欧洲满目疮痍，此刻我们终可稍作喘息。胜利属于我们！这场欧陆大战使德意志浴火重生，将我们的力量、韧性及团结淬炼至前所未有的高度。面对俄罗斯暴政的狂澜，我们与欧洲共同坚守阵地。随着东方之敌溃败，英勇的联邦国防军已被锻造成世界顶尖劲旅。西方世界大获全胜，德国正引领欧洲迈入新纪元。\n\n然征程方才启幕。此刻当重振雄风，再造欧陆。战火既熄，欧盟空前团结，我邦稳居无可争议的领导之位。值此美利坚深陷动荡之际，我辈执掌航舵，必将夺回自由世界领袖的应得地位。联邦国防军将成为欧洲稳定的基石，确保全球民众免受威权暴政之苦。而今我们不仅要引领国民，更要带领整个欧陆迈向持久和平、繁荣昌盛与强大无比的新时代。任凭风吹浪打，我自岿然不动！"
 GER_support_digital_democracy: "支持网络民主"
 GER_support_digital_democracy_desc: ""
 GER_bid_for_kaliningrad: "投资加里宁格勒"
 GER_bid_for_kaliningrad_desc: "欧洲各国或将对我们侧目而视，但加里宁格勒不仅是我们梦寐以求的不冻港——更是德意志统一者的故都。普鲁士的遗产早已……荡然无存。如今的柏林与昔日名号毫无相似之处，而普鲁士本土更被苏联彻底殖民，只为削弱乃至惩戒我们。是时候让加里宁格勒重获柯尼斯堡之名。立陶宛与波兰或许能基于地理角度提出更充分的主张，但唯有我们于此地拥有无可争议的文化渊源。若我们能最终收复统一者的都城，德意志的灵魂便将重获残缺的拼图。"
 GER_caucaus_peacekeeping_mission: "高加索维和行动"
 GER_caucaus_peacekeeping_mission_desc: "山地共和国甫一成立便陷入内战，我们当初低估了，甚至以为俄罗斯人所谓“该地区的伊斯兰极端主义”只是危言耸听，但车臣人的顽强程度着实出人意料。必须遏止瓦哈比派的威胁，否则它将成为我们不得不应对的东方问题，更糟的是，沦为俄罗斯武力收复此地的借口。"
 GER_propup_kuban_industry: "扶持俄罗斯面包篮"
 GER_propup_kuban_industry_desc: "数十年前，俄罗斯强占了库班这片沃土并据为己有。然而在他们的统治下，这片土地不见天日，没有自由的火焰，更无希望可言。正是我们用自由之剑，劈开了笼罩在他们头顶名为俄罗斯的沉重阴霾，赋予他们梦寐以求的权利与民主。如今，重获自由的库班人民，终于能让脚下这片富饶的土地为自己所用，而非继续供养莫斯科的寡头们。"
 GER_support_caucasian_minority: "支持高加索少数民族"
 GER_support_caucasian_minority_desc: "数十年来，高加索人民始终活在俄罗斯的铁蹄之下。在我们出手干预前，他们的自然资源与广袤土地尽数被这头巨熊掠夺。战败后的俄罗斯早已丧失了昔日的嚣张气焰。这头困兽奄奄一息，再不复当年威风。当巨熊颓然倒下之时，高加索人民揭竿而起、夺回故土，他们的命运终将由自己主宰。倘若我们不去捍卫他们的自由、民主与繁荣，又怎配自称自由火炬的执炬者？"
 GER_reopen_russian_relations: "恢复对俄关系"
 GER_reopen_russian_relations_desc: ""
 GER_accept_ukraine_into_eu: "接受乌克兰入欧"
 GER_accept_ukraine_into_eu_desc: ""
 GER_veterans_benefit_program: "老兵补贴计划"
 GER_veterans_benefit_program_desc: ""
 GER_ukrainian_belarus_cooperation: "乌克兰-白俄罗斯合作"
 GER_ukrainian_belarus_cooperation_desc: "乌克兰与白俄罗斯这两个饱受战火摧残的国家，接连承受了第一次世界大战、第二次世界大战以及我们最新军事行动的重创。这些同属斯拉夫民族的兄弟之邦，曾共同孕育古罗斯文明的母亲河畔，如今必须携手重建。我们对他们的援助，将成为横跨东西方的橄榄枝，更是浩劫过后最珍贵的和平信物。在经济层面，两国将紧密联结为一体。"
 GER_eu_economic_expansion: "欧盟经济扩张"
 GER_eu_economic_expansion_desc: "随着战争的阴霾终于散去，重建与振兴欧洲——尤其是东方地区——这一历史性使命已摆在眼前。如今，欧盟比以往任何时候都更坚定其“巩固各成员国间经济、社会和领土凝聚力与团结”的目标，为保障欧盟及其全体公民的未来，经济版图的扩张势在必行。德国必须在此项事业中勇挑重担，引领经济增长、创新与复苏的浪潮。\n\n通过拓展欧盟的经济架构，我们将加速复苏进程、强化贸易网络，巩固欧洲工程奇迹的卓越地位。借由对绿色新政的新一轮投资与更深层次的经济一体化，我们将打造出比战前更强大的经济体。当稳定重现之时，欧盟将迎来十余年来的首次扩容。我们不仅要实现复苏——更要开创繁荣新纪元。"
 GER_eastern_european_reconstruction_effort: "重建欧洲的努力"
 GER_eastern_european_reconstruction_effort_desc: "欧洲已经历了太多的流血、痛苦与苦难。这片土地曾屈服于无数侵略者与征服者的铁蹄之下，但我们每一次都顽强地生存了下来，守护住了欧洲的文明遗产与生活方式。这场与俄罗斯的战争摧毁了无数家园与生计，现在是重建的时候了。是时候修复战争带来的一切创伤，弥补我们各国人民所承受的损失。"
 GER_formalize_the_european_union: "实现欧洲联邦之梦"
 GER_formalize_the_european_union_desc: "欧洲联邦化之梦数十年来始终如海市蜃楼般悬于天际，不过是理想主义者们的低声絮语与美好愿景。然而此刻，我们正立于历史的悬崖之巅。欧盟已在大规模战争中证明了自己的力量，而现在，是时候展现其治国理政的伟力了。\n\n我们将为真正的政治统一奠基，将欧盟从政治经济联盟蜕变为一个单一的主权超级国家。通过大规模宣传造势与政治运作，我们将通过资助亲统一运动，凝聚整个欧洲大陆的联邦共识，继而在全欧范围内举行公投。若此举功成，历史必将铭记这世纪最重大的事件——一个前所未见的国家形态，即将破晓而生。"
 GER_united_but_seperate: "和而不同"
 GER_united_but_seperate_desc: "欧洲正处在十字路口，德国亦然。虽然建立单一欧洲超级国家的构想过于激进，但完全抛弃欧洲一体化事业同样是不智之举。我们将选择第三条道路，在维护德国国家主权的前提下，深化欧盟框架内的各项合作。德国将继续担当欧盟的实际领导者，通过外交与经济手段推进欧洲事业，但绝不会在构建欧洲联邦的过程中抹去我们的民族特质。延续性将是我们的行动指南，既确保欧洲团结统一，又守护各成员国的多元特色。"
 GER_european_officer_corps: "欧洲军官团"
 GER_european_officer_corps_desc: "要建立欧洲民族，必先建立欧洲国家；要建立欧洲国家，必先建立欧洲军队；要建立欧洲军队，必先实现统一指挥。随着我们在政治文化一体化进程中不断迈进，必须同步打造一支欧洲联军，这支统一武装力量将实现无缝协同作战。这正是美国的优势所在：不仅在于军队规模，更在于其高度协调性。我们将首先招募经验丰富的军事指挥官加入行列。其中意大利将领克劳迪奥·格拉齐亚诺将出任欧洲军官团总参谋长，他于2007年至2010年曾任联合国驻黎巴嫩临时部队司令，2011年出任意大利陆军参谋长，2018年起担任欧盟军事委员会主席。欧洲联军的基础已经奠定，现在我们要做的，就是在此基础上继续建设。"
 GER_uphold_democracy: "捍卫民主"
 GER_uphold_democracy_desc: "我们对暴政的讨伐绝不能止步于俄罗斯。放眼全球，独裁者和暴君仍在肆意妄为，威胁世界稳定与我们所珍视的自由民主原则。作为北约的代表，德国必须坚定不移地肩负起捍卫民主与人权的责任。随着上一张战争的胜利，我们如今不仅有实力，更重要的是肩负着采取行动的使命。我军最高指挥部已起草“全球卫士行动”计划，通过多阶段战略确保周边地区的民主成果。我们将对欧洲、中东和北非残存的威权堡垒实施打击，绝不让世界重陷黑暗深渊。自由之战远未结束，但我们必将奋战到底。\n\n“某些政府在暴政面前畏首畏尾。但请记住：若他们无所作为，§B欧洲§!将挺身而出。”"
 GER_support_self_determination: "支持欧洲自主"
 GER_support_self_determination_desc: "我们的胜利重塑了欧洲秩序，但民主之战仍在继续。我们必须支持那些受威权政权压迫民族的自主抉择，确保人民意志终将战胜暴政。秉持对主权与自由事业的坚定承诺，我们现在正式启动“全球卫士行动”第一阶段：“迅捷正义行动”与“雷霆进军行动”，这两场决定性战役将分别针对塞尔维亚与伊朗的压迫势力展开清剿。通过这些行动，我们向所有企图将独裁强加于自由民族的势力传递明确幸好：北约必将坚守立场，不仅捍卫欧洲，更为每个国家争取自由生存的权利而战。\n\n“§B北约§!使命在肩，义不容辞。我们必将涤荡世间邪恶。”"
 GER_beyond_the_borders_of_europa: "欧洲版图之外"
 GER_beyond_the_borders_of_europa_desc: "我们捍卫民主与稳定的使命远不止于塞尔维亚。世界正期待欧盟委员会主席冯德莱恩展现领导力，而她必须做出回应。随着胜利的巩固，我们获得了拓展影响力、保护受暴君威胁国家的契机，并将启动“全球卫士行动”的最终阶段。“闪耀希望行动”将为埃及带来和平，终结这个饱受数十年独裁统治的国家动荡局面，确保苏伊士运河重归民主管控；“所罗门二号行动”将使叙利亚摆脱阿萨德暴政的限制，彻底粉碎阿拉伯复兴社会党的统治；最终“阿拉伯解放行动”将击溃复兴的民族国势力，终结其在北非的扩张主义，确保地区稳定。我们的行动范围将远超欧洲疆界，为全人类建立自由民主的新秩序。\n\n“§B欧洲§!已然团结一致。全世界热爱自由的国家都与我们并肩而立。这将是一场正义与邪恶的史诗对决，但正义必胜。”"
 GER_defense_plan_x: "X防御计划"
 GER_defense_plan_x_desc: "我们在高加索阻击俄国人的努力失败了。我们必须按部就班地重新集结，沿着第聂伯河准备新的防线！"
 GER_suspend_civilian_consumerism: "抑制消费经济"
 GER_suspend_civilian_consumerism_desc: "显然，俄罗斯并不打算止步于乌克兰。他们的目标似乎远大于此，我们必须像他们一样全力以赴，动员经济力量。"
 GER_defense_plan_v: "V防御计划"
 GER_defense_plan_v_desc: "俄罗斯已经突破了第聂伯河防线。但希望尚未泯灭，我们必须不惜一切代价捍卫维斯瓦河！"
 GER_to_the_last: "直至最后……"
 GER_to_the_last_desc: "维斯瓦河防线已经被摧毁……但他们永远无法摧毁我们的斗志，我们会为我们的家园战斗到最后一人！"
 GER_deploy_republikanische_milizen: "建立共和国民兵组织"
 GER_deploy_republikanische_milizen_desc: "成千上万的公民随时准备拿起武器捍卫共和国！"
 GER_operation_somerset: "萨默塞特行动"
 GER_operation_somerset_desc: "俄罗斯是欧洲的宿敌，在1854年和近十年内俄国三次被我们团结击败。他们扩张的脚步将在我们面前永远止步！"
 GER_europe_for_europeans: "欧洲人的欧洲"
 GER_europe_for_europeans_desc: "欧洲不是这些亚洲蛮族的容身之地，我们必须在盟友中强化这一观念来激励他们！战争尚未失败！"
 GER_militarize_reichsbanner_schwarz_rot_gold: "国旗团军事化"
 GER_militarize_reichsbanner_schwarz_rot_gold_desc: "在欧陆战争的废墟上重建之际，德意志未来的安全保障显然系于国民的力量与团结。我们必须培育一种崭新的德意志民族精神，摒弃仇恨与杀戮，以共和理想为基石，正如二战以来我们所践行的那样。尽管黑红金国旗团早已褪去当年与共产主义者及纳粹搏杀的准军事组织色彩，如今仍以政治教育协会的名义存在。\n\n但时局变迁，民主再次召唤国旗团捍卫共和。我们将改组该组织以强化征兵效能，激励德国民众挺身守护象征自由的黑红金三色旗，使其免遭专制暴政的侵蚀。"
 GER_nationalize_defense_industries: "军工产业国有化"
 GER_nationalize_defense_industries_desc: "随着战争的结束，联邦政府必须确保军队保持强大且自立。通过将国防工业收归国有，我们能够在不受外国干预的情况下，保障武器装备的生产。尽管这一举措必将引发争议，但它能确保我们不会再危急时刻受制于私人军火商的摆布。国有化的国防体系将增强我军实力、降低成本，并为捍卫国家主权提供所需的一切装备，无论付出何种代价。"
 GER_propup_russian_defense_forces: "削减俄罗斯军队"
 GER_propup_russian_defense_forces_desc: "纵观历史，俄罗斯民族一直以其军事实力著称。他们的人民曾挣脱金帐汗国的枷锁，多次击退外敌入侵，更将众多民族置于其统治下达数世纪之久。是由于他们居住的土地条件恶劣？还是因为他们风云变幻的历史？无论如何，扼杀俄罗斯扩张主义的唯一手段就是削弱其军事实力。毕竟，只有驯服这头猛熊，才能让它安分守己。"
 GER_demand_russian_war_reparations: "要求俄罗斯支付战争赔偿"
 GER_demand_russian_war_reparations_desc: "几个世纪以来，俄罗斯对欧洲造成了深重的威胁，给我们带来了无尽的苦难，屠杀我们的人民，将我们的城市化为废墟，并在历史的各个关键时刻对我们进行羞辱。从沙皇时代直至当下，俄罗斯始终是阻碍欧洲统一的主要敌人。如今，是时候让俄罗斯面对应有的正义了。我们将坚决要求俄罗斯支付巨额赔偿，以弥补我国因俄罗斯侵略而失去的生命、被摧毁的城市，以及国家重建与复兴所需的资源！"
 GER_no_appeasment: "绝不姑息"
 GER_no_appeasment_desc: "无法与魔鬼讲道理，也无法让疯子恢复理智。绥靖政策带来的只有更多战争、更多死亡、更多苦难。起初，我们放任俄罗斯践踏邻国，让他们对邻邦发泄怒火，用铁腕手段征服他国。我们曾经愚蠢，但今非昔比。我国绝不允许邪恶在这片神圣土地上滋长。作为自由与解放的捍卫者，无论敌人多么强大，我们都将对抗一切不公。"
 GER_normalize_relations: "关系正常化"
 GER_normalize_relations_desc: "爱。爱是一个有力的词。爱是一个美好的词。仇恨很容易，但去爱却需要更大的勇气。我们或许在这场由俄罗斯侵略挑起的战争中击败了他们，但这并不意味着我们要将仇恨施加于他们的人民。毕竟，我们流着同样的血，承受着同样的痛。俄罗斯人民和我们一样饱受苦难。他们不过是莫斯科腐败统治者所编织的阴谋中的无辜者。我们要用爱治愈他们，也治愈我们自己。唯有如此，才能迈向繁荣与团结的未来。"
 GER_the_new_order: "欧洲未来得保"
 GER_the_new_order_desc: "仅靠胜利远远不够；我们必须确保用鲜血、汗水和泪水换来的和平，能像上次战后秩序般持久。对利比亚与伊朗的占领必须导向稳定，按照我们的民主模式重建其制度。通过审慎改革与经济扶持，我们将把这些国家塑造成可考盟友，杜绝极端主义死灰复燃。在国内，我们终将卸下战争重负。虽付出巨大牺牲，但德意志必将浴火重生——比以往更强大、更警醒、更团结。"
 GER_unrestricted_aerial_warfare: "无限制航空作战"
 GER_unrestricted_aerial_warfare_desc: ""
 GER_support_nato_administrations: "支持北约部门"
 GER_support_nato_administrations_desc: "尽管我们试图通过强硬手段重建民主，却遭遇了民众的激烈抵抗，临时政府不得人心，既缺乏资金又无人力组建有效的防卫力量。因此，作为自由世界的领导者，我们理应提供必要的资金与人力支援。这不仅能平息民众的敌意，更能通过开发当地资源来提升我们管理机构的民意支持度。"
 GER_war_time_advancements: "推进战线"
 GER_war_time_advancements_desc: "尽管战后我们已将重心转向民用生产，但在军事科技领域，我们从未落后。克劳斯-玛菲·威格曼和莱茵金属等公司仍在为欧洲生产最尖端的武器装备。然而，这绝不意味着我们应该放缓研发投入。只有持续创新才能够推动技术再攀高峰，同时弥补旧式装备的缺陷。"
 GER_enemies_abroad: "境外之敌"
 GER_enemies_abroad_desc: "长久以来被视为美国头号敌人的中国，如今已成为我们最大的威胁。中国共产党正被过度扩张且腐败深重的官僚体系所拖累，这一致命弱点将为我们所用。该漏洞或使我们更易获取关键情报，既能准确评估中方真实实力，又能将这些信息同步传递给我们的日本盟友。"
 GER_defense_of_krasnodar: "克拉斯诺达尔防卫"
 GER_defense_of_krasnodar_desc: ""
 GER_caucasian_offensive: "高加索攻势"
 GER_caucasian_offensive_desc: "高加索地区长期承受俄罗斯压迫的重负，无数少数民族遭受镇压。但随着欧陆战争的结束，自由的曙光曾历史性地遍照这片土地——直至俄罗斯恶魔践踏并扼杀了他们的自由。如今，高加索人民仍深陷莫斯科的持续压迫之中。作为欧洲捍卫者，我们有责任发起解放高加索的军事行动。成功解放该地区不仅将拯救当地民众，更能分散俄军兵力，为我们创造多战线推进的战略良机。"
 GER_allies_abroad: "海外盟友"
 GER_allies_abroad_desc: "随着斗争持续，东方浮现出一个潜在盟友：太平洋防卫条约组织。这个长期被视为亚洲民主灯塔的联盟，始终坚定抵抗着中国龙的扩张影响。我们必须与之建立牢固关系，这不仅是军火贸易的需要，更是为了共同强化经济实力。该组织将成为大规模武器运输的关键枢纽，其港口将停满我们的货运集装箱，绿线也将随之扩展。"
 GER_anti_partisan_training: "反游击训练"
 GER_anti_partisan_training_desc: "当美国入侵越南时，他们遭遇了熟悉地形的当地民众和越南茂密丛林的双重抵抗。最终，这支装备精良的军队竟被手持落后武器的部队击败。如今随着我们占领的俄罗斯领土不断扩大，当地民众对我们的仇恨与日俱增，抵抗运动如野草般蔓延，誓要将我们驱逐出境。因此，我们绝不能重蹈昔日盟友的覆辙。必须为士兵提供系统的反游击战训练，帮助他们彻底肃清那些阻碍我们统治这片广袤俄罗斯土地的游击队。"
 GER_rethink_aerial_warfare: "反思空战理念"
 GER_rethink_aerial_warfare_desc: "空战形态正随着技术革新而不断蜕变，隐身战机在雷达与热成像仪前无迹可寻，却保有惊人的火力与机动性；苏霍伊系列战机凭借超机动性能，其急转动作产生的过载甚至足以折断飞行员颈椎。我们正迈向一个飞行员或将失去主导地位的时代。当务之急是革新战术体系，特别是在敌方密集防空火力日益构成严峻挑战的背景下，必须通过智能化对抗手段提升我军战机的战场生存率。"
 GER_jump_start_carrier_group: "推动航母战斗群建设"
 GER_jump_start_carrier_group_desc: "当今世界主要海军强国均已成功列装航空母舰，而我国在这现代战争的关键领域却仍处于空白状态。这些海上巨舰作为移动空军基地，实乃新一代战争体系的核心枢纽，它们将赋予我们随时随地向敌境纵深实施打击的战略能力。为确保国家安全生存空间，全力发展航母力量已刻不容缓。"
 GER_defend_the_seas: "守卫海洋"
 GER_defend_the_seas_desc: "多年来的海军建设疏漏已酿成苦果。欧陆战争期间，俄海军对我方油轮发动针对性打击，致使全球贸易航线遭受重创。更严峻的是，资金短缺的海军部队在冲突中完全不堪一击，这令我国海岸防卫能力遭受空前质疑。若要抗衡未来可能来犯的敌国舰队，我们必须立即启动海军重建计划，倾举国之力重塑海上防御体系。"
 GER_maritime_aerial_defense: "海上防空力量"
 GER_maritime_aerial_defense_desc: "在多次海战中，幸存官兵报告显示：由于舰载防空系统匮乏，我军舰艇极易遭遇海军轰炸机打击。为弥补这一致命缺陷，未来舰船设计必须整合专用防空体系以有效抵御空袭，避免重蹈覆辙。"
 GER_empower_populist_parties: "赋权民粹主义政党"
 GER_empower_populist_parties_desc: "德国的现状正受到选择党和左翼党的威胁，他们做出盲目的承诺，使用响亮的言辞，激起了德国人民多年未曾有过的情绪。这是件好事。如果我们让这些民粹主义者继续发声，我们或许可以从他们过度的承诺中获益。我们当然迫切需要重新武装"
 GER_bolster_the_bfv: "支持联邦宪法保卫局"
 GER_bolster_the_bfv_desc: "联邦宪法保卫局是我国的国内情报机构，你也可以叫它“德国的FBI”，我们的机构重点关照那些极端分子和研究怎样对付他们。新纳粹分子，共产主义者，甚至君主主义者都在暗中威胁着国家安全。他们通过和国家民主党换皮政党似的“祖国”党、选择党和左翼党之类的政党来在公众面前展示他们的形象。但我们可不能简简单单的再容忍选出一个独裁者，让宪法保卫局挖出这些反动分子的丑闻，我们的共和国必须挺过去即将迫近的风暴！"
 GER_reconcile_the_parties: "协调派系"
 GER_reconcile_the_parties_desc: "持续打压日益壮大的左翼党和德国选择党，只会适得其反，多年来它们的选民基础已呈爆炸式增长。民众视其为打破现状的唯一希望，正因为对传统政党轮替的绝望，才将选票投给这些非主流政党。有鉴于此，我们不仅需要与这些党派和解，更应在政府中为其保留有限席位。一旦进入体制，它们便再难自诩为反建制派，更能让民众亲身体验其政策带来的后果；无论这后果是好是坏。"
 GER_embrace_the_future_of_warfare: "走向未来战争"
 GER_embrace_the_future_of_warfare_desc: "尽管联邦国防军正推进现代化改革，但战争范式正在急速演变。整合网络战能力、人工智能及无人机等无人作战系统等尖端科技，将显著提升军事效能与作战效率。我军必须为多样化作战场景做好准备，制定灵活机动的战略方针，以适应不断变化的地缘政治环境，强化德国应对新兴威胁的战略态势。吾辈效忠德意志。"
 GER_inspire_the_youth: "激励年轻一代"
 GER_inspire_the_youth_desc: "德国数十年来一直以节制、尊重生命及反思历史集体错误为宗旨教育下一代。正因如此，我们曾可以说，我们的青年是无辜的，毫无求战之心；他们志在崇高追求，为同胞服务。然而这已不符合当下之需，我们孩子跳动的心脏应该通过战斗的筋骨泵出血液。针对青少年发起一场精准的社交媒体攻势，展示德国悠久而骄傲的军国主义传统与战争中的天才作为，将提醒我们的孩子：英雄之血比哲人之墨更接近上帝。"
 GER_germany_triumphant: "德意志之凯旋"
 GER_germany_triumphant_desc: ""
 GER_consolidate_the_eu: "巩固欧洲联盟"
 GER_consolidate_the_eu_desc: ""
 GER_no_appeasement: "绝不姑息"
 GER_no_appeasement_desc: "同魔鬼无法理论，也无法让疯子恢复理智。绥靖政策带来的只有更多的战争、更多的死亡、更多的苦难。起初，我们听任俄罗斯肆意践踏邻邦，纵容他们将怒火倾泻于无辜者，用铁腕将其奴役。我们曾天真过，但那样的时代已经终结。绝不容许邪恶继续玷污这片神圣的土地。作为自由与解放的捍卫者，无论敌人多么强大，我们都将与一切不公作斗争。"
 GER_deregulate_the_market: "放松市场管制"
 GER_deregulate_the_market_desc: ""
 GER_support_military_industry: "支持军工产业"
 GER_support_military_industry_desc: ""
 GER_reconstruct_civilian_industry: "重建民用工业"
 GER_reconstruct_civilian_industry_desc: ""
 GER_begin_societal_militarization: "启动社会军事化进程"
 GER_begin_societal_militarization_desc: ""
 GER_activate_article_50: "启动《里斯本条约》第50条"
 GER_activate_article_50_desc: "欧洲一体化实验终于走到了尽头。多年来，德国始终背负着弱小邻邦的重担，支撑着残破的经济、忍受如今臭名昭著的官僚体系，为所谓的“团结”不断牺牲国家利益。这场战争只是让真相愈发清晰：欧洲远非铁板一块的国家，也永远不该是。现在是时候让德国重拾主权了。我们将启动《里斯本条约》第50条，正式开启脱离欧盟的进程，斩断这束缚我们数十年的枷锁。过渡期必将伴随动荡，政治与经济的阵痛无可避免，但德意志将一如既往地克服困难，从此摆脱布鲁塞尔的桎梏，自主掌握命运。\n\n“德意志，德意志，高于一切！”"
 GER_revive_german_nationalism: "民族主义回潮"
 GER_revive_german_nationalism_desc: "长久以来，德意志民族始终被强加的泛欧身份枷锁所束缚，致使民族特质日渐消弭。随着我们退出联盟，此刻正是重燃1945年被碾碎、又在全球化与自我憎恶铁蹄下窒息百年的民族魂之际。我们将：恪守祖辈遗产，颂扬本土多元，凝聚全球德意志人的民族认同。一个强盛德国的愿景，已不再是尘封的记忆，而是正在书写的未来。"
 GER_restore_pride_in_our_history: "重温光辉历史"
 GER_restore_pride_in_our_history_desc: "我们正站在历史的十字路口，但有一点始终明确：绝不能忘记我们是谁。这个国家历经无数风雨，从统一到分裂再到统一，从辉煌胜利到惨痛失败。如今，当我们开辟自己的道路时，是时候让德国人民重新回忆起他们祖先的力量与韧性了。我们要以自豪而非怀旧的态度拥抱历史，以此重振民族自信，激励新一代接过领导重任。未来永远属于那些坚信历史之人。"
 GER_unify_the_european_people: "团结欧洲人民"
 GER_unify_the_european_people_desc: "在推进欧洲大陆统一的进程中，我们不仅要巩固欧盟的经济基础与制度架构，更需筑牢身份认同的根基。欧洲不应再被视为多国并立的大陆，而应成为虽有欧洲人共同的民族国家。这一构想并非没有先例，事实上它源自一个最出人意料的群体：法西斯主义者。奥斯瓦尔德·莫斯利及其“联盟运动”在1948至1973年间就曾鼓吹“欧洲单一民族”政策；另一名法西斯分子弗朗西斯·帕克·约基也在1949年提出所谓“欧洲帝国”构想，主张清除自由民主、好莱坞文化与布尔什维克主义。\n\n当然，我们并非法西斯信徒，但这些极端分子确实指出了一个真相：欧洲从来就是，也永远是一个整体民族。现在正是承认这一事实的时刻，既然所有国家都应与自身民族属性相同，那么欧洲也理应拥有属于自己的国家形态。"
 GER_pressure_the_austrians: "对奥地利施压"
 GER_pressure_the_austrians_desc: "奥地利的永久中立政策是冷战时代的遗存，在欧洲地缘政治新格局中已无立足之地。当俄罗斯铁骑横扫欧陆、我们殊死抵抗之际，奥地利却始终作壁上观。随着战后欧洲秩序重组，现在是时候让奥地利放弃《中立宣言》作出明确抉择了。我们将施加全方位外交政治压力，迫使维也纳申请加入北约。唯有如此，这个南方邻国才能在未来威胁降临时与我们同仇敌忾，并在海外行动中与我国并肩作战。无论奥地利选择屈服还是抵抗，都将决定未来数十年的中欧格局。顺我者昌，逆我者亡。"
 GER_the_bundeswehr_reborn: "联邦国防军重生"
 GER_the_bundeswehr_reborn_desc: "联邦国防军长期受历史枷锁束缚，困于政治犹豫与国际期待的限制之中。但世界已变，欧洲已变，我们也必须改变。随着我们宣布摆脱布鲁塞尔官僚体系的桎梏，是时候开辟新道路了——让联邦国防军不再只是防御部队，而成为德意志民族坚不可摧的剑与盾。我们将继续努力重振民众对军队的信心。我们的安全绝不再受制于人。联邦国防军必将浴火重生，随时准备直面任何威胁。"
 GER_towards_a_greater_germany: "迈向大德意志"
 GER_towards_a_greater_germany_desc: "“小德意志方案”过去是、现在仍是一个严重的错误。我们不再被那些空洞的统一口号与妥协所束缚，亦必将锻造一个更强大、更自豪的德意志。德意志民族的命运，绝不容布鲁塞尔的官僚们继续摆布！奥地利——这个失散多年的同胞，终将在大德意志的版图中重归其位。这绝非简单的领土扩张，而是对历史错误的纠正。世界将见证德意志的浴火重生。\n\n“那就是它！那就是它！\n那就是德意志祖国！”"
 GER_sew_euro_skepticism: "转向欧洲怀疑主义"
 GER_sew_euro_skepticism_desc: "欧盟虽建立在崇高理想之上，但现实已暴露其致命缺陷。根基的裂痕正在扩大，而我们将确保无人能够忽视。我国将放大欧洲各国的主权呼声，揭露布鲁塞尔当局的失败，提醒人民主权永远属于且仅属于他们自己。每一桩丑闻、每一次越权、每一回失败，都将为欧洲怀疑论之火添柴加薪。欧洲超级大国的迷梦，或者说噩梦，终将终结。而终结者不是任何外部势力，而是人民自己的意志。"
 GER_fight_euroskeptic_hate_speech: "打击疑欧者仇恨言论"
 GER_fight_euroskeptic_hate_speech_desc: "随着欧盟日益强大以及我们推进联邦化目标，试图破坏它的声音也在滋长。整个欧洲范围内，反动分子兜售恐惧、虚假信息和谎言。他们利用经济焦虑和民族主义怨恨来阻挠我们的进步。其声称要捍卫本国主权，却无视欧盟才是欧洲主权的最大保障！没有欧盟，我们早就在莫斯科的铁蹄下苟活，到那时，看他们还怎么高喊“主权”！\n\n我们必须果断行动，通过开展全面的宣传、教育和法律措施来反击这些欧洲怀疑论的仇恨言论。我们将揭穿他们的谎言，重申我们尊严、民主、平等和法治的价值观。分裂的逆流必将被击退，团结的欧洲将继续前进。"
 GER_modern_wolf_packs: "现代狼群战术"
 GER_modern_wolf_packs_desc: "二战期间，邓尼茨元帅创制了史上最高效的海战战术之一：狼群战术。这种潜艇协同作战模式曾肆虐大洋，通过猎杀补给船队重创全球供应链。随着战争形态演进，这一经典战术在现代战场却鲜有应用，恰为我们提供了绝佳的创新契机。若能对此经实战检验的战术进行现代化改良，或将彻底改写未来海战格局。"
 GER_study_new_naval_tactics: "学习新式海军战术"
 GER_study_new_naval_tactics_desc: "历史战例分析揭示了一个必然趋势：海军轰炸机将成为未来海战的决胜力量。这些高速隐秘的空中死神，能向任何胆敢闯入我领海的舰船投送毁灭性打击。若以航空母舰为机动平台部署，此类轰炸机将极大增强我军制海权掌控能力，构筑起无可撼动的远洋霸权。"
 GER_automating_warfare: "自动化战争"
 GER_automating_warfare_desc: "过去十年间，人工智能已实现跨越式发展，不仅在民生领域举足轻重，更在实战环境中展现出关键价值。这引发了一项重大战略抉择：我们究竟该让人工智能操控军事装备以节省人力、降低征募成本？还是该坚持人类主导，既防范误伤友军的致命失误，又规避复杂系统的维护难题？"
 GER_germania_rules_the_waves: "日耳曼尼亚统治海洋"
 GER_germania_rules_the_waves_desc: "我国海军改革已大功告成。昔日经费短缺、建制混乱的舰队，如今已蜕变为全球最令人生畏的海上力量之一。通过战略投资、尖端科技与严苛训练，我们打造出了一支足以赢得世界敬畏的海军。毫无疑问，这支舰队已为未来任何冲突做好万全准备。德意志终将再度主宰七海，在每一片大洋上彰显我们的绝对制海权。"
 GER_revolution_on_the_ballot: "选票革命"
 GER_revolution_on_the_ballot_desc: "欧陆战争已经结束，东方大地遍布尸骸与坦克残骸。我们德国人必须扪心自问：为何容忍至此？还要坐视寡头们挑动全世界工人自相残杀多久？忍无可忍！人民发出怒吼，兵不血刃地夺取了政权。如今，我们只需行动起来改变这片大陆，为那些本该为此牺牲的人们带来和平、繁荣与未来。"
 GER_reconquer_east_germany: "东德意志再征服"
 GER_reconquer_east_germany_desc: "自民主德国解体以来，东德地区长期陷入混乱，新纳粹分子将其变成了反动势力的温床。我们绝不容忍这种可憎的意识形态在德国社会主义的发源地滋生蔓延。但收复失地不靠武力，而要靠钢筋水泥。发展计划将立即启动，为三十年前被西方抛弃的人们提供住房、基础设施和就业机会。"
 GER_establish_workers_councils: "精简企业"
 GER_establish_workers_councils_desc: "近期选举的胜利与欧战的凯旋，为我们在政府内部赢得了亟需的公信力与政治筹码。鉴于此，我们应着手遏制那些同样在战争中养肥自己的资本势力。通过腐败调查与反垄断法的双管齐下，辅以特定企业资产的国有化措施，既能将这些商业体量控制在令国家与人民皆感适宜的规模，又可避免引发全面的资本外逃潮。"
 GER_economic_regulation: "促进多民族主义"
 GER_economic_regulation_desc: "民族国家的概念不仅已经过时，更会腐蚀我们想要建设的德国。反动势力企图利用这种观念制造种族主义与歧视政策，妄图转移无产阶级的注意力。我们必须彻底破除这种思想，我们建设的国家不只属于德意志人，更属于全世界。在这片赤旗招展的未来土地上，任何心怀向往之人，皆可成为德意志的一员。"
 GER_criticize_the_eu: "遏制军国主义"
 GER_criticize_the_eu_desc: "东方战场的胜利固然值得自豪，一个分裂数百次的大陆团结起来击败了远比自己强大的敌人。但正是这种自豪感，最容易滋长法西斯主义的毒苗。因此我们必须着力揭露战争的真相：那些鲜血与死亡。历史应当将欧战铭记为一场悲剧，一场若非寡头政客横加干涉本可避免的灾难。除此之外，我们还需着手整肃军事工业，将重心转向民用生产，毕竟在战后的欧洲，这些军工产业已无存在必要。"
 GER_work_with_our_allies: "对抗俄罗斯战争机器"
 GER_work_with_our_allies_desc: "怨恨既能点燃革命之火，亦可助长反动之势。俄罗斯寡头们必将利用战败煽动新的冲突，我们虽应力求和平遏制，但难保俄罗斯不会走向极端，为夺取全面胜利不择手段。有鉴于此，我们将扩大欧盟预算，以盈余资金全面补贴各成员国的军工生产，以抵御东方可能发起的终极反扑。"
 GER_the_bridge_between_east_and_west: "东西方间的纽带"
 GER_the_bridge_between_east_and_west_desc: "随着印太地区紧张局势升级，东亚战鼓再次擂响，我们理当选择积极外交而非孤立。亚洲正站在战争边缘，其后果可能波及全球，包括我们自身。但既然我们已在这几年间变得更强大、更有原则，就负有采取行动的道德责任。通过与东京搭建桥梁促进对话合作，我们将成为世界亟需的调停者。当然，若最坏情况发生，我们必将与东京坚定站在一起，捍卫民主价值。"
 GER_for_the_sake_of_stability: "为了稳定"
 GER_for_the_sake_of_stability_desc: "当今世界仍处于动荡之中，而这我们方才亲历。所幸我们顶住了俄罗斯的猛攻，最终以一个成功国家的姿态，屹立于成功的联盟之中。然而此刻绝非颠覆现状之时，我们必须守护这来之不易的稳定。这正是基民盟得以胜选的原因：选民们不求变革，只愿现有成果得以延续。我们将兑现和平与繁荣的承诺，引领德意志驶向未来！"
 GER_expand_eu_cooperation: "加强欧盟合作"
 GER_expand_eu_cooperation_desc: "历史已经证明，欧盟绝非史册中昙花一现的篇章，而是必将长存的伟业。然而正如精密的机械需要持续维护方能正常运转，欧盟体系亦需不断完善。今日我们虽击退俄罗斯，然而强敌随时可能卷土重来，若无万全准备，终将自取灭亡。我们将以来之不易的和平时光，深化与欧洲同胞们的纽带。当战火再度降临欧罗巴大陆之日，我们必将以团结之姿，捍卫自由！"
 GER_prop_up_eastern_europes_industry: "支持东欧工业"
 GER_prop_up_eastern_europes_industry_desc: "在俄罗斯战败后，我们终于能够毫无顾忌地扩大对东欧的承诺。波罗的海诸国、白俄罗斯和乌克兰的大部分地区在战争中遭受重创，这正是我们帮助他们重建得更好的契机。人们已在东方看到了诸多机遇，只需我们稍加激励，便可说服他们投资于工业与基础设施。我们将让东方地区不仅重回战前水平，更将超越其历史鼎盛时期！"
 GER_keep_the_markets_stable: "保持市场稳定"
 GER_keep_the_markets_stable_desc: "若说全球供应链遭受重创，这简直是对本世纪最轻描淡写的陈述。随着美国退出舞台，中日两国在亚洲角力，俄罗斯暂时退居二线，我们唯有回归传统市场。所幸在对俄战争胜利后，我们赢得了投资者的青睐，经济已现复苏之势。当前最紧要的是保持这一回升态势，唯有自身根基稳固，方能助力他国重建。"
 GER_subsidize_the_civilian_industry: "补贴民用工业"
 GER_subsidize_the_civilian_industry_desc: "要维系国家强盛，仅靠庞大的军工产业远远不够，我们更需要坚实的民用工业根基。在北约与俄罗斯交战前夕，我们曾全力聚焦军工生产，几乎搁置了其他所有领域。但如今，是时候转换方向，重启多元化生产了。我们正迎来成为工业强国的历史机遇，这一次，我们绝不会错失良机！"
 GER_fund_the_military_industry: "资助军事工业"
 GER_fund_the_military_industry_desc: "过去几年的惨痛教训让我们明白：依赖他国终将受制于人。因此，我们必须确保重要物资，尤其是军需品来自于可靠渠道。而除了自力更生，我们还能信任谁？当下最优选择绝非削减军工开支，而是加倍投入。我们不仅要实现自给自足，更要为欧洲兄弟国家提供装备。唯有当欧盟各国都拥有与我们比肩的武装力量时，我们才能称得上是真正的军事强国。"
 GER_defend_democracy: "保卫民主"
 GER_defend_democracy_desc: "过去数月愈发清晰地表明：俄罗斯的威胁从未真正消退。这个对手必将卷土重来，且会比预期更早。当全球民主制度遭遇围攻之际，捍卫既有成果、坚守自由繁荣的灯塔使命，已刻不容缓。更有呼声主张我们应更进一步，在海外守护民主火种，此议亦获广泛认同。然当下仍需专注解决国内课题。倘若俄寇无可避免的来犯，那时我们绝不会坐以待毙！"
 GER_the_red_roses_finest_hour: "红玫瑰的至耀时刻"
 GER_the_red_roses_finest_hour_desc: "在我们约150年的历史长卷中，从未书写过如此辉煌的胜利篇章。我们不仅击溃了俄罗斯，为东欧带来了和平，更为国家的未来铸就了坚实保障。人民以压倒性票数赋予我们执政权力，这不仅是选举的胜利，更是民心的托付。这份沉甸甸的信任，我们必将以全力推进执政纲领作为回报。红玫瑰已然萌芽，绽放盛景指日可待！"
 GER_reverse_schroders_reforms: "逆转施罗德的改革"
 GER_reverse_schroders_reforms_desc: ""
 GER_an_industrial_renaissance: "工业复兴"
 GER_an_industrial_renaissance_desc: "回望历史长河，德意志始终是傲视群伦的工业强国。然而近年来，我国企业如他国同行般全球布局，将生产基地外迁。当此世界格局剧变之际，为保障国家经济安全与民生稳定，此风断不可长。即刻起，我们将推行工业回流政策，以激励措施引导企业将工厂迁回本土，并全力吸引外资企业落户。是时候让“德国制造”重振雄风了！"
 GER_help_out_the_working_class: "帮助工人阶级"
 GER_help_out_the_working_class_desc: "德国与世界各国一样，是工人阶级用脊梁撑起的国度。正是凭借他们的勤勉、辛劳与坚韧意志，我们才得以铸就今日辉煌。许多国家忘却这一根本，将劳动者边缘化，只顾为早已盆满钵满者锦上添花。但德国绝不如此！在社民党执政期间，我们将全力推动惠及劳动者的立法。幸福的工人，才是高效的生产力！"
 GER_push_for_federalization_2: "推动联邦化"
 GER_push_for_federalization_desc: "与欧洲多数左翼政党一样，我们同样怀有推进联邦化的共同愿景。在美国衰落、东方战火未熄、俄罗斯虎视眈眈的当下，唯有展现欧洲团结，方能抵御即将来临的风暴！我们同属这片大陆，欧陆各国尽管历史上兵戎相见，但更有无数携手共进的篇章。联邦化之路确实可行，在德国的引领下，我们必将建设一个强大而自由的欧洲联盟！"
 GER_work_with_europes_social_democrats: "与欧洲的社会民主党合作"
 GER_work_with_europes_social_democrats_desc: "尽管德国国内联邦化呼声高涨，但欧洲多国对此仍存异议。我们最不愿见的，就是强推联邦化而疏远盟友。相反，我们将深化与理念相近政党的协作，建立比形式统一更牢固的伙伴关系。秉持这一目标，我们与欧洲各国的纽带将日益紧密。同处一片大陆，我们尊重多元民族——须知多样性本身，正是力量的源泉！"
 GER_take_in_russian_dissidents: "接纳俄罗斯异见组织"
 GER_take_in_russian_dissidents_desc: "与欧洲某些保守政党不同，我们对俄罗斯的立场独树一帜。诚然，他们的确是威胁不假，但人民何辜？多少俄罗斯民众正试图逃离那个压迫性政权。国内虽有排外之声欲将其驱逐出境，令其无处容身，但我们绝不苟同。凡被迫离乡背井者，无论是俄罗斯人还是世界各国流离失所之人，德国都将敞开怀抱：这里就是你们的容身之所！"
 GER_liberalisms_time_to_shine: "自由主义的光辉时刻"
 GER_liberalisms_time_to_shine_desc: "经过我国工人、公民和政治家们数小时、数月乃至数年的不懈奋斗，我们终于将德国推向最辉煌的时刻，击溃东方威胁并将其赶回老家。这场胜利不仅彰显了我国的实力，更见证了每位为此伟业奉献者的坚韧与忠诚。但这绝非终点，为确保德国长存，我们必须始终保持欧洲经济与军事灯塔的地位，并加倍努力维系我们作为欧洲霸主的新角色。"
 GER_minimize_welfare: "削减福利"
 GER_minimize_welfare_desc: "尽管我们致力于建设福利国家，但仍面临诸多挑战：公众对金融机构的信任度下降、福利分配不均、国家财政压力与日俱增。为解决这些问题并防患于未然，福利政策将进行优化调整。其规模将适度缩减，但更具针对性和实效性。这意味着援助将精准聚焦最需帮扶的群体，从而提升公平与效率。通过此番改革，我们旨在重建信任、减少浪费，确保福利体系长期可持续，为社会提供坚实保障。"
 GER_empower_the_individual: "赋权个人"
 GER_empower_the_individual_desc: "每个公民都是国家的脊梁。无论是维系社区联系的邮差，塑造下一代灵魂的教师，还是守护街道清洁的环卫工人，每个人都支撑着德国社会的擎天巨柱。其中，言论自由作为德国核心价值观“自由”的基石，是最必须全力保障的基本权利。而要真正实现人的全面发展，就必须赋予公民更多自主权，让他们能够主宰自己的人生轨迹与财富道路。"
 GER_a_dynamic_economy: "活力的经济"
 GER_a_dynamic_economy_desc: "我党核心纲领之一，是在德国实施真正的自由市场体系。随着东方俄罗斯威胁被消除，我们可以开始解除战时经济，向自由市场体系过渡。通过减少政府干预，允许私营企业发展，我们将创造一个企业能够蓬勃发展的环境，推动国家创新，建设一个由供需关系和人民精神指引的经济强国。"
 GER_push_for_a_european_defense_ministry: "推动建立全欧国防部"
 GER_push_for_a_european_defense_ministry_desc: "整个欧洲的杰出人才随时准备保卫这片大陆，但若缺乏团结，他们的力量对我们的目标毫无价值。为建立一支统一的欧洲军队，我们必须委任一位有能力的领导者来统筹管理这支新军。这位领导者将整编我们的部队，为真正统一的欧洲军事力量奠定基础。俄罗斯人注定会再次来犯，因此我们必须采取以下措施，将欧洲所有军队整合为一支军队、一个指挥体系、一个目标：保卫欧洲。"
 GER_enforce_the_north_atlantic_treaty: "加强北大西洋公约组织"
 GER_enforce_the_north_atlantic_treaty_desc: "欧陆战争期间，北约体系混乱无序、各自为政。战争结束后，许多欧洲军队支离破碎、兵力不足、装备匮乏。因此，作为自由世界的新领导者，我们必须通过协助盟友重建军队、真正统一北约指挥体系来巩固盟友关系，确保我们为不可避免的第二次战争做好准备。"
 GER_push_for_more_federalization: "进一步推动联邦化"
 GER_push_for_more_federalization_desc: "欧陆战争结束后，欧盟议会内部要求深化联邦化的呼声日益高涨。虽然我们成功击败了俄罗斯这头巨熊，但它重整旗鼓并再次发动攻击只是时间问题，而这必将使欧洲陷入另一场血腥冲突。要想在未来的挑战中生存，我们就不能再继续分裂。我们必须整合欧洲所有的军事力量和工业实力，以确保持久和平，保护每一位欧洲公民。"
 GER_a_green_future_2: "绿色未来？"
 GER_a_green_future_2_desc: "随着最后一票的投出和所有目光的聚焦，德意志民族的未来已经确定。如灿烂向日葵般绽放的绿党再次执掌政权。德国已是绿色，但我们怎能止步于此？从交通到农业，国家许多领域仍需改革。鉴于欧洲当前局势，改革刻不容缓。在我们引领下，已萌芽的种子将茁壮成长，开遍欧洲大地。这场绿色革命将如潮汐般席卷开来，不仅覆盖我国，更将蔓延至整个欧洲，为全体欧洲人民创造更美好的未来。"
 GER_subsidize_public_transportation: "补贴公共交通"
 GER_subsidize_public_transportation_desc: "当人们想到德国时，会联想到什么？或许是高速公路，更可能是庞大的欧洲铁路系统。但现实远比表面所见复杂。尽管历届政府勤勉工作，我国大部分基础设施网络仍资金严重不足，此刻正在不断老化。这种状况必须立即扭转。通过补贴、新建项目和维修工程，我们将把公路、铁路和机场网络推向新时代，让道路与铁轨如植物藤蔓般在全国蜿蜒伸展，推动我们向100%清洁能源国家转型。"
 GER_reform_agriculture: "改革农业"
 GER_reform_agriculture_desc: "玉米、谷物、大麦，这些对多数人无关紧要的词汇，却是我们农民的生命线。虽然上届政府已采取多项措施帮扶农业，但仍有许多未竟之事。当前大多数农民依旧在喷洒化学农药，浑然不知这些毒素对作物与自身的危害。作为德国新愿景的重要组成部分，我们将着力推广绿色耕作技术，通过补贴推动变革。这不仅能提高作物产量，更能促进农场发展壮大。由此，我们将崛起为欧洲粮仓，与乌克兰并驾齐驱。"
 GER_an_ecofriendly_industry: "生态友好工业"
 GER_an_ecofriendly_industry_desc: "“未来要么为绿色，要么没有未来”——这是德国环保青年的共同口号。现在正是我们完成能源转型计划的关键时刻，持续推进可持续能源体系建设。我们将发展循环经济以降低资源消耗，通过政府补贴推动建筑与设备的节能改造。同时，为工人和未来企业家提供环保技能培训，助力工业体系向生态友好型转变。"
 GER_fund_russian_dissident_groups: "援助乌克兰"
 GER_fund_russian_dissident_groups_desc: "欧陆战争爆发之初，许多专家对我们的乌克兰盟友作了最坏预期。然而他们顶住压力，在我们的支援下击退了俄罗斯巨熊，令其狼狈逃回莫斯科。如今乌克兰已成为我们在东欧影响力的关键支点，我国对其支持绝不会动摇。在北约支持下，经我们指导的乌克兰将建成东方的自由堡垒，随时准备抵御莫斯科可能发动的任何报复性侵略。"
 GER_continent_wide_cooperation: "洲际合作"
 GER_continent_wide_cooperation_desc: "在确立欧洲主导地位后，战后世界给我们带来了诸多新挑战。新解放地区经济困顿，乌克兰控制区的俄裔居民持续抵抗。高加索地区局势如履薄冰，车臣紧张态势随时可能爆发全面战争。我们必须承认，单凭一己之力无法解决这些问题。因此我们将寻求欧洲盟友协助，通过强化欧盟整合，培育欧洲人之间深厚的同志情谊与团结精神，我们将得以履行盟约，守护民主自由之火永续燃烧。"
 GER_fortify_eastern_europe: "巩固东欧防御"
 GER_fortify_eastern_europe_desc: "风暴正在酝酿，其规模与强度将远超以往。俄罗斯这头巨熊正在苏醒，它舔舐着伤口，计划着复仇。事实上，战争阴云再次笼罩地平线。虽然我们无法推迟这场不可避免的冲突，但仍能为莫斯科的报复做好准备。全国上下将与盟友协同制定计划、做好战备、组织防线。这场战争不仅关乎存亡，更将彻底重塑欧洲大陆的格局。胜利是唯一选择，因为任何其他结果都将导致我们的失败，让莫斯科的势力不仅卷土重来于东方，更笼罩整个欧洲。"
 GER_strength_and_glory: "力量与荣耀"
 GER_strength_and_glory_desc: "“软弱”一词从未存在于德意志的词典。我们的国家在铁水中铸造，人民经鲜血淬炼，意志由地狱之火铸就。自条顿骑士扎根这片土地起，这里便代代孕育战士，一个比一个勇猛，个个愿为祖国肝脑涂地。不像以自由多样性等琐碎为荣的美国，也不似靠葡萄酒奶酪沾沾自喜的法国佬，德意志的骄傲与荣光深植于民族军事传统的沃土。"
 GER_true_to_form: "一如既往"
 GER_true_to_form_desc: "就在八十五年前，当我们的祖辈尚未从一战惨败的耻辱中恢复时，一种崭新而充满活力的意识形态燃烧着复仇渴望的火焰，重振了德意志民族与人民的骄傲与勇气。民族社会主义是从战争烈火与人民绝望中锻造出的理想与原则，是真正纯粹属于德意志的意识形态。每一条法律、每一项法令、每一道训诫都铭刻在日耳曼人的骨血之中，要每个德国人永志不忘。"
 GER_national_hygiene: "民族优生计划"
 GER_national_hygiene_desc: "一个国家的成功与人民的福祉，其根本当然在于卫生水平。健康的民族不应充斥病弱之躯，而应满是骨骼强健、肌肉发达的战士与斗士。洁净国度运转的动力源自健康的劳动力，而国家挥舞的利器则由嗜血的士兵铸就，这些士兵会毫不犹豫地投身火线。因此，我们挚爱的德国绝不能堕入肮脏腐朽的阴影，而应沐浴在强健与洁净的光辉之中。"
 GER_the_totalitarian_society: "极权社会"
 GER_the_totalitarian_society_desc: "我们曾尝试过自由社会模式，给予民众自由、权利与安全保障。看看这给我们带来了什么？只有失败、死亡与毁灭。我们的仁慈被敌人利用，我们的热爱在冰冷子弹面前毫无价值。正是失去的痛苦与血肉的创伤，最终让我们领悟了真理：唯有铁腕统治，才能有效守护国家免受伤害与外敌侵略。"
 GER_assemble_the_reichsrat: "组建参议院"
 GER_assemble_the_reichsrat_desc: "即便在德意志民族与国家最终觉醒之后，我们仍不可遗忘造就伟大、推动我们在历史浪潮中前行的根本。帝国议会——这个魏玛时代的遗存，曾湮没于往昔的历史长河，如今终因时势所需而重获新生。它不仅是人民意志的代表，更将成为集体精神的终极形态。"
 GER_german_nation_comes_first: "日耳曼民族优先"
 GER_german_nation_comes_first_desc: "没有祖国，你什么都不是。此乃铁律。长久以来，我们的同胞已遗忘爱国主义的真谛，甚至有人视其为软弱。试问：无家可归，何以安眠？无枝可依，何以筑巢？家园与巢穴，这正是祖国对我们的意义。她不仅是永恒的避风港，更是家族血脉的归宿、民族根基的所在。捍卫这片家园，保护我们的亲人，实为当务之急。"
 GER_fuel_the_machine: "开动机器"
 GER_fuel_the_machine_desc: "凡成功政权，必有其宣传利器，而今正是我们铸造这把利器之时。全国的媒体版图必须完全由我们运动的内容机构主宰。从报纸到电视再到社交媒体，我们将用政治纲领彻底浸润民众思想。任何胆敢传播异见的信息渠道，都将被连根拔起。当公众目之所及、耳之所闻皆为我方讯息时，他们终将对我们言听计从。群众的思想与灵魂，尽在掌控。"
 GER_germany_everlasting: "德意志，永载史册"
 GER_germany_everlasting_desc: "德意志啊，这片自1871年伟大统一、1990年重新团聚的土地，自诞生之日起便历经无数磨难与难以想象的挑战。这个国家机器如同老人缺钙的骨骼，齿轮锈蚀，看似随时会分崩离析。驱动这台机器的燃料、这片土地的生命之源，因人民遭受的屡次背叛与挫败而污浊不堪。然而这台引擎，这个国家的心脏，仍如初燃时那般炽烈跳动。德意志经历过无数战役，跨越过重重险阻；也曾多次败北，屡遭至灰飞烟灭的绝境。但不同于众多敌人，德意志依然屹立。每一次战后重建家园，依靠的绝非资源多寡，而是人民与民族的信念基石。啊，德意志，我的故乡，我的祖国，你必将昂首挺立，凌驾于所有敌手之上。"
 GER_smash_the_splinters: "粉碎余孽"
 GER_smash_the_splinters_desc: "德国境内少数派系四处散布谎言与宣传，企图毒害国民思想。值得庆幸的是，我们的先辈已有解决之道，即通过长刀之夜清除帝国之敌，以雷霆手段一举肃清叛徒与国家的敌人。\n\n若要建立强大繁荣的德国，我们必须果断处置这些分裂势力。"
 GER_dismantle_anti_german_academia: "消灭反德学术"
 GER_dismantle_anti_german_academia_desc: "德意志帝国与第三帝国的岁月，曾是国家力量与民族自豪的象征。然而自1949年以来，外来渗透与软弱领导逐渐抽空了人民的精气神。我们被迫接受屈从与耻辱的文化，我国国旗低垂，我族民声噤声。若要重振德意志的荣光，就必须挣脱这些枷锁，重新点燃那曾经定义我们的爱国精神。"
 GER_fanatical_anti_communism: "反共狂热"
 GER_fanatical_anti_communism_desc: "我们的敌人是谁？必须从欧洲美丽平原、丘陵与山脉中清除的污秽是什么？不是自由主义，不是民主制度。答案正是那个自几个世纪前形成概念以来，就一直困扰欧洲大陆乃至全世界的深红瘟疫。我们的公民、我们的欧洲同胞或许已忘却这场对抗终极敌人的宿命之战，甚至有人已成为其狂热信徒。但这一切到此为止，从今日起，共产主义毒株将从我们的国家彻底根除，他们终将只是恢弘欧洲历史中的一个脚注。"
 GER_solidify_the_parteistaat: "巩固政党政治"
 GER_solidify_the_parteistaat_desc: "正是不同政党间的政治动荡与内斗，导致了德国领导层的优柔寡断与失败。在这个新生的、更强大的德国，权力必须由那些足够强韧、能有效运用它并引领我们走向胜利的人掌握。我们绝不容许意志薄弱者阻碍发展，也不会被温顺之辈束缚，更不让愚钝之徒禁锢自由之魂。在德国当前所处的严峻形势下，国家需要的不是空谈无行的政客，而是敢于彻底变革、为国家进步而战的铁腕领袖。"
 GER_revive_our_warrior_spirit: "复兴战士精神"
 GER_revive_our_warrior_spirit_desc: "当上帝创造德意志民族时，他深知自己塑造的绝非浪漫、仁慈或温顺之民。我们生而为战士，注定成为军人。在这漫长而动荡的历史中，我们以血汗在阳光下开辟了应得之地，从其他民族手中夺取属于我们的光辉。若无战争、流血与牺牲，德国永无统一之日，条顿民族永难真正凝聚。德意志生于鲜血，亦将死于鲜血。"
 GER_spirit_of_rommel_npd: "隆美尔之魂"
 GER_spirit_of_rommel_npd_desc: "毫无疑问，闪电战是战后数十年来最能体现我军卓越战术思想的作战方式。这种快速、凌厉、灵活的机动战术，通过侧翼包抄迫使敌军尚未交战便土崩瓦解，曾让我们几乎完全征服欧洲大陆，使英军在埃及濒临投降，苏军在东方节节败退。\n\n然而，由于盟军与我方的某些失误，最终导致我们向同盟国投降并蒙受屈辱。这一次，我们将汲取历史教训，确保把握住这第二次机会。\n\n得益于沙漠之狐的天才指挥和其让英属北非近乎陷落的战术，我们将效法其典范。我军必须精通多兵种协同战术，发挥主动性与随机应变能力，确保敌人再无胜算。"
 GER_national_service_npd: "全民服役"
 GER_national_service_npd_desc: "曾几何时，德国的军事实力与钢铁意志震慑世界。普鲁士王国被公认为欧洲最强的军事国家之一，即便人口远不及其他大国，却依然建立起了欧洲第四大军队。然而，当今谈及德国军国主义，人们往往只会想起两次世界大战，而忽视了一个简单的事实——若无强大军队，德国早已沦为列强刀俎上的羔羊。若无武力，普鲁士永远无法完成德意志的统一大业；若无军队，德国早在东西两线的压力下崩溃，步奥地利在一战中的后尘；若无坚实的防御，我们的人民早已如牲畜般，被布尔什维克的屠刀蹂躏。军国主义从来不是德国的过错，而是德意志民族的命脉，是生存的根本，是不可动摇的信仰。而今，敌人再度逼近我们的边界，国家再次需要新鲜血液注入军队，为民族存亡而战。因此，我们必须重新启用强制征兵制——这一曾被愚蠢废除的根基。唯有如此，德国才能真正屹立不倒，战无不胜！"
 GER_four_year_plan: "四年计划"
 GER_four_year_plan_desc: "“追求完美计划，反失良策之机。”——克劳塞维茨的箴言犹在耳畔。我们本可经年累月地辩论当为挚爱的祖国描绘何种未来蓝图，然时局迫在眉睫。我们将即刻启动四年计划，不仅要恢复更将大幅拓展我国的经济与工业体系——更要立即付诸实施，务使勤劳的工人们不必遥望渺茫的明天，而是从今日起就能触摸变革的脉搏！"
 GER_promote_class_unity: "促进阶级合作"
 GER_promote_class_unity_desc: "长久以来，我们的社会始终被哲学分歧、宗教对立——尤其是经济鸿沟所割裂。远近之敌不断助长这种混乱，腐蚀我们的人民，将他们如牵线木偶般玩弄于股掌之间。这样的悲剧绝不能重演。如今，通过多项振兴计划，我们将确保钢铁德意志的劳动者们团结一致——以同一战线、同一意志，对抗所有心怀不轨之徒！"
 GER_award_the_workers: "犒赏工人"
 GER_award_the_workers_desc: "在“旧”世界，所有政党都将跨国财团与东方移民的利益凌驾于普通德意志公民之上。而今，我们终结了这种荒谬。那些铸造我们这个钢铁般坚韧、真正伟大国度的建设者们，将获得应得的回报！福利津贴、政府补助，连利多和阿尔迪超市的优惠券都将如雨点般洒向他们！诚然，某些项目或许要面临预算削减——但为了人民的福祉，这点代价微不足道。"
 GER_consulidate_financial_capital: "巩固金融资本"
 GER_consulidate_financial_capital_desc: "德意志勤劳工人与纳税人的血汗钱，曾被自由派集团肆意挥霍，那些毫无价值的性别项目、华而不实的环保倡议、来路不明的海外投资——最可憎的是，由于他们建立的臃肿官僚体系，竟无人能够制止这种挥霍。自今日起，我国财政资金将实行集中管理，每一马克支出都将在党的严格监督下进行——这一切，都是为了人民的福祉！"
 GER_our_national_revolution: "我们的民族革命"
 GER_our_national_revolution_desc: "历经多年抗争，牺牲无数忠诚同志，承受主流社会的万般嘲弄，我们终告成功。旧秩序已然崩塌，人民发出怒吼，革命洪流席卷全国。我们的运动如今在整个德国所向披靡，这景象何其壮丽！很快，世人将目睹我们为这个国家、乃至整个欧洲规划的蓝图。激变之时已至，而我们将以钢铁意志与炽热信念，成为引领时代的先锋。"
 GER_implement_10_point_program: "实行十点纲领"
 GER_implement_10_point_program_desc: "既然我们已执掌国家最高权力，现在就开始实施党的十点纲领：打击外资、废除荒谬的移民制度、恢复德国工人的权利与自主。我们的政策明确而直接，不同于那些空谈变革却无所作为的旧政客，我们将立即将党的愿景付诸实践。很快，每个德国公民都会看到，我们不仅坚守承诺的变革，更拥有将其实现的可靠行动计划。"
 GER_revolutionary_dictatorship: "革命专政"
 GER_revolutionary_dictatorship_desc: "我们的立场绝不容丝毫妥协或软弱。国家一切权力将尽归我党独掌。为扫清执政障碍，腐朽的旧民主制度残余及其操盘者将被彻底清除，再无掣肘的民选政客、财阀资本家、以及妄图破坏德国主权的叛国政党与非政府组织。这一切都将灰飞烟灭。尽管有人会哭嚎反对，但事实昭然若揭：无人会怀念那些导致国家衰落的软弱机构与庸人。如今，唯我党的革命钢铁意志独力引领德国未来，而我们早已绘就宏图。"
 GER_workers_state: "工人之国"
 GER_workers_state_desc: "在重塑德意志民族之际，我们必须明确回答这个至关重要的问题：政府为谁而存在？答案简单明了，且需举国周知：这个国家不属于那些骑在我们头上发财的世界主义自由派资本家，不属于深居豪宅、密谋出卖国家利益的叛国政客与外国势力。国家属于德国工人与平民，属于人民自己。他们为国家鞠躬尽瘁，却遭所谓“代表者”的精英集团洗劫。从今往后，他们的利益再不会被忽视或践踏。此刻，正是我们拨乱反正，将祖国归还予其真正主人之时。"
 GER_break_the_opportunists: "粉碎投机分子"
 GER_break_the_opportunists_desc: "我们能够掌权，绝非仅靠少数活动家的努力，而是成千上万忠诚爱国者孜孜不倦奉献的结果。但切莫天真，许多人加入我们纯粹是出于私利。这些来自敌对党派的投机分子，眼见自身阵营无望掌权，便转投我方企图分一杯羹。此等行径令人不齿，如今正是我们铁腕肃清这些油滑骗子的时刻。无论他们潜伏在运动何处，我们都将揭露其劣行，连根拔除，逐入寒冬。每个党员与公民都须明白，此等无耻行径必将付出惨痛代价。"
 GER_strasserite_principles: "施特拉瑟原则"
 GER_strasserite_principles_desc: "格雷戈尔和奥托·施特拉瑟兄弟是超越时代的先知。面对共党的恶行与民族社会主义的缺陷，他们指明了德意志民族的真正前路。革命民族主义者追求胜利时，绝不可妥协讨好任何人。从财阀资本家到世界主义共产党，一切德国主权之敌都必须击溃。这一真理曾被国内外敌人联手压制数十年，但沉默到此为止。他们的理想再不会被噤声，其原则必将成为我党政策的基石，成为每个德国人铭记于心的信条。施特拉瑟兄弟的思想，将永远是这个国家的立国之本。"
 GER_against_both_evils: "抗击两大恶魔"
 GER_against_both_evils_desc: "最令我们震怒的，是主流政治光谱两端的无端指控——极左派污蔑我们是亲资本的纳粹暴徒，而资产阶级保守派乃至其他极右势力却将我们斥为共产党人。这纯属无稽之谈。我们洞悉这种虚假二元对立背后的真相：放纵的资本主义与共产主义都以各种方式摧残着德国，从文化遗产到经济霸权，这两剂毒药过去与现在都造成难以估量的伤害。但现在，我们要向世界宣告：德意志将挺起脊梁，以雷霆之势同时粉碎锤镰与美钞！"
 GER_revolution_against_the_revolution: "革命对抗革命"
 GER_revolution_against_the_revolution_desc: "在我们东方盘踞着德国多年来最大的威胁——俄罗斯。当我们为夺取政权而战时，他们暗中观察、秘密谋划、调动军队，如今已剑拔弩张。这种危险令我们不安地熟悉：他们的政府与我们如出一辙，都宣称代表大众，并彻底扫除旧秩序建立新俄国。两个在激进且不妥协的革命中重生的国家，但他们必须明白：我们绝非为友好共处而来。墙上的字迹已然清晰：唯有一种意识形态、一种愿景、一种精神、一场革命能主宰未来。这个真理，我们很快将以武力让他们铭记。"
 GER_enlighten_the_masses: "启发群众"
 GER_enlighten_the_masses_desc: "德国人民被灌输了无数关于我们运动的谎言。那些贪婪的记者和诡计多端的政客污蔑我们是暴徒和叛徒，煽动民众对我们唾弃与仇视。但如今形势逆转，现在是我们牢牢掌控着国家的舆论阵地。是时候让人民聆听我们完整的纲领，我们的真理了。我们将动员成千上万的追随者和媒体机构，向大众宣传我们我们拯救德国的神圣使命。从电视广播到网络空间，我们的声音将传遍全国的每个角落，并俘获所有听众的心。"
 GER_revive_the_sa: "复兴冲锋队"
 GER_revive_the_sa_desc: "冲锋队（简称SA）堪称现代史上德意志民众动员的典范。爱国群众以统一意志与昂扬斗志凝聚成的这股力量，曾令国内之敌闻风丧胆。我们必须自豪地重建这一组织，重燃这份记忆。我们将动员所有追随者与志士，组建统一的人民战斗阵线。配备现代群众行动工具的新时代冲锋队，必将碾压欧陆任何准军事组织。高举旗帜，严整队列！那熟悉的褐黑制服将再度降临，痛击德意志的内敌。"
 GER_black_front_of_fighters: "斗士黑色阵线"
 GER_black_front_of_fighters_desc: "奥托·施特拉瑟脱离纳粹党后，组建了致力于理念的黑色阵线。在魏玛末期数年里，他们为革命民族主义、反抗世界资本主义等主张而战，直至被希特勒新政府解散。但时移世易，如今施特拉瑟兄弟的思想已在德国占据统治地位，我们理应重建这个捍卫该理念的组织。新的黑色阵线将遍布柏林权力中枢、地方政府机构及所有重要社会政治组织，成为凝聚政党意志与人民诉求的终极纽带。它不仅是理念的执行机构，更将超越施特拉瑟兄弟时代的所有设想。"
 GER_revive_our_warrior_spirit_tw: "复兴战士精神"
 GER_revive_our_warrior_spirit_tw_desc: "当上帝创造德意志民族时，他深知自己塑造的绝非浪漫、仁慈或温顺之民。我们生而为战士，注定成为军人。在这漫长而动荡的历史中，我们以血汗在阳光下开辟了应得之地，从其他民族手中夺取属于我们的光辉。若无战争、流血与牺牲，德国永无统一之日，条顿民族永难真正凝聚。德意志生于鲜血，亦将死于鲜血。"
 GER_spirit_of_rommel_tw: "隆美尔之魂"
 GER_spirit_of_rommel_tw_desc: "毫无疑问，闪电战是战后数十年来最能体现我军卓越战术思想的作战方式。这种快速、凌厉、灵活的机动战术，通过侧翼包抄迫使敌军尚未交战便土崩瓦解，曾让我们几乎完全征服欧洲大陆，使英军在埃及濒临投降，苏军在东方节节败退。\n\n然而，由于盟军与我方的某些失误，最终导致我们向同盟国投降并蒙受屈辱。这一次，我们将汲取历史教训，确保把握住这第二次机会。\n\n得益于沙漠之狐的天才指挥和其让英属北非近乎陷落的战术，我们将效法其典范。我军必须精通多兵种协同战术，发挥主动性与随机应变能力，确保敌人再无胜算。"
 GER_national_service_tw: "全民服役"
 GER_national_service_tw_desc: "曾几何时，德国的军事实力与钢铁意志震慑世界。普鲁士王国被公认为欧洲最强的军事国家之一，即便人口远不及其他大国，却依然建立起了欧洲第四大军队。然而，当今谈及德国军国主义，人们往往只会想起两次世界大战，而忽视了一个简单的事实——若无强大军队，德国早已沦为列强刀俎上的羔羊。若无武力，普鲁士永远无法完成德意志的统一大业；若无军队，德国早在东西两线的压力下崩溃，步奥地利在一战中的后尘；若无坚实的防御，我们的人民早已如牲畜般，被布尔什维克的屠刀蹂躏。军国主义从来不是德国的过错，而是德意志民族的命脉，是生存的根本，是不可动摇的信仰。而今，敌人再度逼近我们的边界，国家再次需要新鲜血液注入军队，为民族存亡而战。因此，我们必须重新启用强制征兵制——这一曾被愚蠢废除的根基。唯有如此，德国才能真正屹立不倒，战无不胜！"
 GER_take_in_ukrainian_refugees: "接纳乌克兰难民"
 GER_take_in_ukrainian_refugees_desc: ""
 GER_mobilize_the_industry: "工业动员"
 GER_mobilize_the_industry_desc: ""
 GER_modernize_national_socialism: "民族社会主义现代化"
 GER_modernize_national_socialism_desc: "第三帝国覆灭已历数十寒暑。社会、文化、科技、价值观乃至人类文明的一切都沧海桑田，若希特勒复生，恐怕会以为目睹的是火星文明而非德意志。简言之，时代已然巨变，但这不意味着我们不该与时俱进。如今正是民族社会主义拂去历史尘埃，扎根当下之时。核心理论虽一脉相承，但都将置于二十一世纪的生活语境中重新诠释。从移民问题到全球主义，再到东方威胁，民族社会主义必将全面对接现代德国的所有关切。昔日万字徽象征德意志的救赎与力量，今日它将以当代德人清晰认知的方式，延续同样的使命。"
 GER_mastery_of_propaganda: "宣传专精"
 GER_mastery_of_propaganda_desc: "在宣传领域，约瑟夫·戈培尔曾是民族社会主义的传播大师，他的动员令响彻德意志，为战争凝聚了数百万人的力量。然而今日我们面临新的挑战：境外势力的渗透、颠覆分子的破坏，以及全球化论调的无休止侵蚀。但与先辈不同的是，我们掌握着他们梦寐以求的利器：社交媒体。这个曾被用来歪曲我们理念、压制我们理想的工具，如今通过掌控媒体话语权，我们不仅能昭示民族社会主义的真理，更能彻底清除荼毒这个国家及人民多年的全球化堕落思潮。"
 GER_our_new_struggle: "我们的新奋斗"
 GER_our_new_struggle_desc: "经过某种难以言喻的历史轮回，民族社会主义在八十载沉寂后重返德意志。先辈们曾兵临莫斯科城下功败垂成，而今我们绝不能重蹈覆辙，若此番再度失利，民族社会主义的火种或将永远熄灭。"
 GER_the_new_germania: "新日耳曼尼亚"
 GER_the_new_germania_desc: "历史曾见证一位雄心勃勃的元首规划建造超级都会的蓝图，其规模将令巴比伦奇迹与古代帝国荣光黯然失色。随着他的失败，这个梦想也随之湮没。如今的柏林满目疮痍，垃圾遍地，往昔辉煌的建筑艺术早已面目全非。\n\n我们将彻底重建柏林，恢复这座都市与生俱来的荣光与美丽。这座新首都将成为繁荣未来的灯塔，彰显我们力量的丰碑，更是一座雅利安人栖居的理想之城。"
 GER_kick_down_the_door: "踢开大门"
 GER_kick_down_the_door_desc: "终于到了我们深入俄罗斯人家园腹地的时刻。这一次，将用他们的鲜血、他们的人民来为我们的前进铺路。曾几何时，我绝不考虑核武选项，但今非昔比。我们尝试过展现仁慈，可换来得寸进尺！我们转过另一边脸，他们却两面三刀！这一次，我们将推倒他们的水晶宫，这座他们用无数人的痛苦建造起来的宫殿。是时候踹开这扇门了。"
 GER_winter_logistics_training: "冬季后勤训练"
 GER_winter_logistics_training_desc: ""
 GER_the_triump_of_populism: "民粹主义之胜"
 GER_the_triump_of_populism_desc: "历经无数艰难险阻、流血牺牲与满目疮痍，我们终在欧陆战争中赢得胜利。那些曾断言我党无法带领德意志民族走向胜利、迈向美好未来的主流分析家们，如今皆已噤声。这场战争给盟国与我国造成的破坏难以估量。但我们决不能如他人般沉溺于自满，不，我们必须浴火重生！此刻正是重建之时，正是让质疑者更加哑口无言之时。德国选择党必将作为带领国家摆脱边缘地位、开创繁荣新纪元的政党而永载史册！"
 GER_revive_nuclear_energy: "复兴核能"
 GER_revive_nuclear_energy_desc: "我们历届政府首脑都未能理解一个关键事实：核能绝非毁灭与悲剧之源，而是造福人类之力。他们因切尔诺贝利与福岛等事故，固执地认为核电站是死亡陷阱，得不偿失。这实在大错特错。这些灾难虽为悲剧，但几乎每次都是人为失误所致。现在，我们是时候摒弃对核裂变的过时恐惧，拥抱它为我国能源基础设施和人民福祉带来的助益了。"
 GER_free_up_the_economy: "释放经济"
 GER_free_up_the_economy_desc: "长久以来，德国经济始终被官僚机构臃肿所困扰，这是历届政府首脑持续扩大开支的恶果。事实上，我国经济正处于前所未有的脆弱状态。随着东欧战火平息、欧洲重归和平，我们终于迎来绝佳时机，可以彻底清除这些长期侵蚀经济根基的累赘。是时候将这些无用的政府项目送上断头台了。只有这样，才能奠定国家经济的稳固基石。"
 GER_support_the_militarized_industry: "支持军工企业"
 GER_support_the_militarized_industry_desc: "欧陆战争开始后，我国军工产业便呈指数级增长，且在整个战争期间持续扩张。但现在战争已经结束，俄罗斯巨熊也被逐回东方。正因如此，我们正重蹈战前覆辙，陷入自满的陷阱。此时此刻，我们比任何时候都更须谨记：冲突随时可能爆发。军工产业是我国应对潜在威胁时快速果断反应的命脉，在国家迈向未来之际，我们绝不能放任这一命脉衰落。"
 GER_negotiate_with_the_russians: "同俄罗斯人协商"
 GER_negotiate_with_the_russians_desc: "若仅说德国人民与俄罗斯人之间存在巨大分歧，实在是轻描淡写。但欧陆战争过后，这头俄罗斯巨熊已被彻底拔除利爪，北约盟军解放了其占领的所有领土。可悲的是，即便在战后，我们与欧洲伙伴的合作也愈发艰难。如今俄罗斯亟需盟友与经济伙伴，正是我们主动伸出橄榄枝的绝佳时机。通过妥善谈判，我们必将与这个满目疮痍的国家达成互利的经济协议。"
 GER_cooperate_with_europe: "欧洲合作"
 GER_cooperate_with_europe_desc: "可以说，我党与欧洲议会在诸多议题上存在分歧。但当俄罗斯军队突袭乌克兰边境时，为捍卫主权，我们不得不搁置这些争议。如今硝烟散尽，满目疮痍的我们面临抉择：是深化与欧洲的联系，还是向俄罗斯伸出援手？答案显而易见，俄罗斯显然正在酝酿新动作，其行径已证明其不可信赖。我们必须继续与欧洲携手，巩固彼此纽带。"
 GER_one_nation_one_people: "一个国家，一个民族"
 GER_one_nation_one_people_desc: "德意志，无论你如何称呼这片土地，它始终是欧洲腹地与西方文明跳动的核心。这个民族一次次以坚韧穿越至暗时刻证明了自己的力量：我们熬过饥荒，战胜瘟疫，如今更击退了俄罗斯蛮族的威胁。那些无能的政客曾用政策纵容数万非法移民涌入，将我们拖入泥潭，麻痹我们的斗志。但民粹主义让德意志人民重获话语权，重返世界舞台！我们德国选择党已用行动证明了自己，正引领德国迈向未来。无论下一个挑战是俄罗斯还是其他威胁，我们已严阵以待，胜利终将属于我们！"
 GER_relocate_the_economy: "迁移经济"
 GER_relocate_the_economy_desc: ""
 GER_no_more_weakness: "不再软弱"
 GER_no_more_weakness_desc: "我们的国家长久以来被叛徒所掌控。这些与美国人、苏联人以及全球主义者狼狈为奸的卖国者，榨干了德意志民族最后的精华，并将我们历史成就的荣耀掩盖在消费主义与多元文化的虚伪外衣之下。\n\n即便德意志联邦共和国已经倒下，我们仍能感受到那令人窒息的枷锁——过去那些左翼的投机分子换了一身外衣，继续掌握权力。\n\n然而，人民已经觉醒，他们已经受够了谎言与背叛！今天，我们将点燃革命的火炬，建立一个自立、自强、思想统一的德意志！"
 GER_strengthen_the_grip: "加强控制"
 GER_strengthen_the_grip_desc: "由于特殊的地缘位置、前政权的愚昧无能，以及长期的经济衰退和国家萎缩，德国正面临内忧外患的严峻局面。\n\n人民议会的最新指令旨在改善德国在欧洲的地位，确保人民的安全与福祉。国家安全部与国家人民军将密切合作，收复历史上属于德国的领土，并清除国内一切危险因素。"
 GER_honour_the_army: "向军队致敬"
 GER_honour_the_army_desc: "德国的统治阶层一次又一次地犯错，却始终未能吸取教训。这些所谓的政客与统治精英在国家安全这个最根本的问题上毫无作为。\n\n如今，我们不能再重蹈覆辙！\n\n政府将以安全为首要任务，全力支持军事建设，彻底清算过去统治阶级的错误决策。我们的国家政策将围绕国防需要展开，让德国重获真正的安全与尊严。"
 GER_old_guard_new_revolution: "保守派，新革命"
 GER_old_guard_new_revolution_desc: "我们实现了前所未有的壮举——这是任何政党、团体或阶级都未曾做到的。我们建立了一支超越想象的联盟，这不仅仅是议会中的政治联合，不是金钱操控下的妥协，也不是用谎言去安抚贫困、饥饿与屈辱的人民。\n\n我们的联盟，是思想的联盟！它汇聚了左派与右派，结合了旧时代的意志与新一代的力量，来自不同阶层、不同时代的人们，皆因同一个信念而团结在一起——为了伟大的德意志民族，为了强盛的德意志国家！"
 GER_raf_romanticism: "颂扬我们的奋斗"
 GER_raf_romanticism_desc: "我们的历史上有许多革命者，他们来自左右两翼，是为反抗资本主义而战的英勇斗士。\n\n这条道路布满荆棘与牺牲，但正是这些英雄的奉献，使我们得以重塑今日的德国。\n\n我们必须将他们的功绩永远镌刻在国家的文化领域与日常生活之中，让全体德国人民永远铭记他们！"
 GER_new_german_spirit: "新德意志精神"
 GER_new_german_spirit_desc: "自由民主的资产阶级德国已随其支离破碎的国家一同覆灭。这个腐朽至极的旧秩序，将我们拖入了颓废与失败的深渊。\n\n如今，一个崭新的时代正在到来！我们要以健康的民族主义精神，唤醒人民的道德复兴。德意志民族曾长期遭受蔑视，而今正是重振文化与传统，让世界再次承认德国伟大遗产的时刻！"
 GER_deconstruction_of_post_modernity: "解构后现代性"
 GER_deconstruction_of_post_modernity_desc: "今天，德国的伟大胜利只是全球变革道路上的一小步——微小，却意义非凡。\n\n讽刺的是，资本主义本想牢牢掌控权力，却在无意间为自己的覆灭埋下了伏笔。它的美德之中，亦隐藏着致命的弱点。而我们，毕生研究这些弱点，终将使它走向终结。\n\n如今，来自社会各个领域的人们汇聚一堂——知识分子与地下文化，主流学者与边缘思考者，科学家与业余探索者——共同参与这场伟大的事业：解构资本主义。\n\n首先，我们在思想层面拆解它，审视后现代性的每一个层面，追问：“我们是如何走到这一步的？”进而回答：“我们该如何走出去？”\n\n曾经，这或许只是知识分子的哲学思辨，只是少数人的消遣与兴趣。但今天，它已成为现实之中，成为终结资本主义的理论框架。"
 GER_exiting_the_vampire_castle: "走出吸血鬼城堡"
 GER_exiting_the_vampire_castle_desc: "晚期资本主义罪行累累，而其中最邪恶的一桩，正是它对人类精神的扼杀。\n\n资本主义摧毁了社会凝聚力，扼杀了集体主义，践踏了人与人之间的同志情谊，并粉碎了真正的多元共存。它以自己的规则划分了是非对错，让整整几代人饱受羞辱与欺压之苦。如今，人们被灼烧殆尽，孤独无依，惶恐地面对未知的明天。\n\n我们必须采取行动，为人们的灵魂重新点燃信仰，为他们的心中重新燃起炽烈之火！超越旧日偏见的高墙，通向一个崭新的时代——那是进步与繁荣的时代！"
 GER_phase_out_capital_fundamentalism: "逐步淘汰唯资本论"
 GER_phase_out_capital_fundamentalism_desc: "这个世界已被困在资本主义的循环中，一座永无止境的迷宫、一种邪教仪式、一个让人类漫无目的奔跑的永不停转的轮子。\n\n这个体系早已不再惠及它的主人，但我们仍持续维系着它。而代价正在显现——它如同宗教般要求越来越多的献祭，将人类变成最可悲的奴隶，自认为自由的奴隶。\n\n我们必须摧毁资本主义演变成的原教旨主义邪教，打破人们对其抱有的任何幻想。这既是原则问题，也是生存问题。"
 GER_detox_from_nostalgia: "摆脱怀旧情结"
 GER_detox_from_nostalgia_desc: "时间已经证明，德国人是世上最具怀旧情结的民族之一——但遗憾的是，正如我们的经历所示，这并非总是件好事。\n\n资本主义一次次利用这一情感，以怀旧的笛声引诱德国走向毁灭。它巧言令色，让人们相信过去的生活更加美好，草木更为青翠，国家更为强盛，并哄骗我们只要顺从他们的意志，便能回到那段“黄金岁月”——荒谬至极！\n\n德国不再眷恋那些早已腐朽的旧时代。我们已经从过去的错误中汲取了教训，如今，唯一值得追寻的，只是全新的未来。"
 GER_redefine_marxist_ideals: "重释马克思主义理想"
 GER_redefine_marxist_ideals_desc: "马克思主义——这个词汇在岁月流转间承载了多少深远意义。它不仅成为现代世界思想体系的基石，更成为全球无数人为之奋斗的信仰。\n\n我们热爱马克思主义，因为它始终在变化，在发展，在进化。它的历史，就是无产阶级斗争的历史，是塑造我们今日世界的力量。然而，我们不会停滞于那些仍在固守20世纪马克思主义框架的人——我们必须如列宁、斯大林和毛泽东一般，使其适应现代环境，并在现实中不断深化和革新。\n\n我们将继承马克思主义，并在前行的道路上不断发展它，甚至让它带领我们直至群星之上——又或许，是它承载着我们？呵，这真是一个充满辩证法意味的悖论，值得深思与讨论。"
 GER_accelerate_into_a_brighter_future: "加速迈向更光明的未来"
 GER_accelerate_into_a_brighter_future_desc: "这一刻，我们已等待太久，然而，\n它的到来从未令人怀疑！\n\n资本主义已走到尽头。它或许曾新颖，或许曾具备一定的价值，但如今，它不过是一具腐烂的尸骸，悬挂在世界之上。我们的责任，我们的使命，就是将它彻底扫除！炸碎这堵阻碍文明进步的高墙，让世界迈向真正的繁荣！\n\n但我们的革命并不止于拆毁资本主义的经济与社会制度——我们要粉碎束缚内心的枷锁，释放每个人天性中自由而富有创造力的灵魂！\n\n觉醒吧，挣脱这具空壳！\n拿起你的工具与武器，为成为真正的自己而战！\n加速前进，让历史永不停息地向未来狂奔！\n\n更快！\n更快！！\n更快！！！\n更快！！！！"

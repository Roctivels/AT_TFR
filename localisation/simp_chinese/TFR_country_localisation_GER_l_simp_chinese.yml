 GER_military_reformation_dynamic: "军队改革"
 GER_military_reformation_communist_dynamic: "国家人民军"
 GER_military_reformation_communist_dynamic_desc: "在我国深入开展政治革命与社会革命的当下，德国武装力量内部也掀起了革命的高潮。旧资产阶级的联邦国防军正经历着前无古人的系统性改造与重组：组建新的部队、修订作战条例、提出全新标准、扩大征兵范围。这场变革范围之广、程度之深，均难以简单估量。或许改造与转型对于一心赤诚的指战员们来说是充满阵痛的，但这场重塑必将锻造出一支令世界瞩目的现代化无产阶级军队。"

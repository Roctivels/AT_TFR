 GER_catharsis1: "大宣泄"
 GER_mass_catharsis_dynamic_desc: "文明之所以得以建立，长久以来正是依赖于其压抑原始暴力、转而追求有序共存的能力。\n在当代欧洲社会中，欧盟正是依靠这一不言而喻的共识来压制我们那些更具毁灭性的冲动，因为它本身复杂、相互依赖，且维系脆弱。\n\n而在神经植入、心理社会解构与对基本人类体验的系统性压制成为时代标志的今日，这一平衡愈发岌岌可危。\n\n而一旦这种集体的自我克制开始崩解，我们内在本性的记忆便会浮现。\n对此类记忆的苏醒，文明将不再给予惩罚。"
 GER_japanification: "日本化"
 GER_eye_in_the_sky: "天空之眼"
 GER_consumerist_education_law: "消费主义教育"
 GER_transhumanist_education_law: "超人类主义教育"
 GER_two_class_society_welfare: "双阶级社会"
 GER_ending_world_neutrality_idea: "终结世界中立"
 GER_europapa_idea1: "宇宙之王"
 GER_scratch_a_liberal: "自由主义的末路"
 GER_scratch_a_liberal_desc: "晚期资本主义终于迎来末日，自由派与银行家沆瀣一气，未能阻止东方法西斯威胁，背叛了德国工人阶级。但如今德国工人已看清一切。在新自由主义秩序的失败废墟中，德国工人阶级终将奋起反抗压迫者，打破枷锁。我们将携手彻底推翻资本主义制度，建立一个崭新、公正的社会主义世界。"
 GER_organize_disilusioned_soldiers: "拉起幻灭的士兵"
 GER_organize_disilusioned_soldiers_desc: "成千上万青年被送上东线战场白白牺牲，这一切究竟为了什么？俄罗斯法西斯分子在东方得势，归国老兵却流落街头，资产阶级在豪宅里数着钞票嘲笑无产阶级。我们必须唤醒老兵们对牺牲的记忆，让他们看清失去的一切。老兵们现在或许落魄，但他们曾是前线浴血奋战的战士，他们拥有纪律性、战斗意志，最重要的是铭记着牺牲的战友。我们要将这支经历过战火淬炼的力量组织起来，使其成为革命事业的先锋队。"
 GER_organize_the_factory_workers: "唤起工厂的工人"
 GER_organize_the_factory_workers_desc: "战争结束带来的经济崩溃重创了德国工人阶级，大规模裁员与薪资骤降肆虐人间，上流阶级依然高踞象牙塔。要真正配得上社会主义者的称号，我们必须赢得工人的支持。我们将深入工厂车间唤醒阶级意识，让工人们看清自己如何在流水线上挥汗如雨却仅得残羹冷炙，而资本家却在坐享他们的劳动果实。资本家奴役了我们数代人，但今天，我们要砸碎这锁链。\n\n全世界无产者，联合起来！"
 GER_organize_the_radical_students: "召唤激进的学生"
 GER_organize_the_radical_students_desc: "大学已成革命思想的熔炉，新一代知识分子正全面摒弃旧秩序的腐朽体系。纵观历史长河，学生群体始终是反抗运动的星火——从反帝国主义印度支那战争的怒潮，到1968年法兰西五月风暴的烈焰。我们将凝聚他们的抗争热忱与理想主义，为革命事业注入新生力量，为崭新德意志奠基！"
 GER_necessity_for_militarization: "必要的军事化"
 GER_necessity_for_militarization_desc: ""
 GER_ideological_correctness: "反法西斯统一战线"
 GER_ideological_correctness_desc: ""
 GER_a_new_october: "新十月革命"
 GER_a_new_october_desc: "流水线上的工人走出车间，田埂间的农民放下农具，校园里的学子冲破藩篱。从熔炉飞溅的铁花到礼堂飘散的传单，工人阶级正凝聚成钢铁洪流。革命的暴风眼已然降临，男女老幼汇成汹涌人潮，向着资本神坛构筑的国家机器进军。资本家如鼠辈仓皇逃离，留下旧世界的断壁残垣，但无产阶级将在废墟上浴火重生。联合起来！\n战斗仍然将会继续，\n激情满怀心在飞跃。\n列宁是如此的年轻，\n少年十月人向前进！"
 GER_provisional_revolutionary_popular_front: "改组新政府"
 GER_provisional_revolutionary_popular_front_desc: "革命虽历经艰难曲折，但我们终究取得了胜利。当革命的震波渐趋平息，必须迅速组建新政权以应对秩序巨变的余波。请放心，这个新政权将比旧政权稳固百倍。它将成为德意志人民的希望灯塔，引领他们穿越欧洲历史的至暗时刻，走向彻底解放。"
 GER_revanchist_propaganda: "促进社会多元化"
 GER_revanchist_propaganda_desc: "极右翼势力总在聒噪“多元化将摧毁德意志、葬送欧罗巴”，殊不知大西洋彼岸的历史早已将其谎言击得粉碎。美利坚的崛起本就是移民血汗浇筑的丰碑——没有这些建设者，何来其历史性成就？或者说，何来其曾经达到的高度？LGBTQ+群体长期遭受压迫与仇恨的阴霾笼罩，但在崭新的德意志，这种黑暗必须终结。我们当以社会多元化为舟楫，引导民众接纳并适应这个文化交融的新纪元。须知：仇恨何其容易——包容方显勇毅。"
 GER_adopt_warrior_culture: "解构后现代性"
 GER_adopt_warrior_culture_desc: ""
 GER_warriors_revolution: "新世纪，新左翼"
 GER_warriors_revolution_desc: "部分同志对德意志民主共和国时代的怀旧情结，实属不切实际的空想。诚然，东德在社会主义建设历程中曾展现出相较于同时期西德联邦共和国更具进步性的制度优势，但其最终走向崩溃绝非偶然——高层腐败横行、系统性偏执蔓延、治理效能持续衰退等结构性矛盾，注定了这一体制难以摆脱历史周期律的桎梏。21世纪的国际格局已与冷战时代发生深刻变革：新思想、新群体涌现，国际合作日趋深化，绝非东德旧体制所能容纳。因此，新时代呼唤着新型社会主义、新型共产主义，方可矢志前行，走向繁荣。"
 GER_new_vanguard_of_revolution: "激进左翼民主"
 GER_new_vanguard_of_revolution_desc: "变革之风正席卷德意志大地，人民呼唤着能够反映后资本主义社会诉求的政治声音。那些与自由主义腐朽体系妥协媾和的旧政党，已不再有资格主导德国政治的未来。是时候让人民迈出历史性一步了。社会主义的未来绝非铁板一块，不同意识形态将在此交融碰撞，各自勾勒前进的道路。此刻，这个国家必须做出抉择。德国首届社会主义选举不仅将决定下届政府组成，更将定义工人革命本身的本质。在这风云激荡的时代，谁将掌舵德国社会主义的航船？"
 GER_cause_greater_than_life: "社会主义文化霸权"
 GER_cause_greater_than_life_desc: "革命不仅仅是对德国政府的激进改造，它必须成为一场文化革命，一场触及此前自由主义主导的社会各个层面的深刻变革。我们不仅要回应工人对权利的诉求，更要唤醒德国人民的心灵与思想，使他们意识到后资本主义世界的可能性。社会主义不仅应是一种政治制度，更应成为人民呼吸的空气、青年歌唱的旋律、艺术家创作的主题、以及我们阅读的文字。"
 GER_revolutionary_german_history: "联邦化倡议"
 GER_revolutionary_german_history_desc: "那些盘踞在联邦共和国血脉中的叛徒败类，曾不遗余力地分裂欧洲，挑动工人们在狭隘民族主义等问题上内斗。自由派政府造成的这些伤痕至今仍在欧洲肌体上溃烂，在我们自由世界的脸上划出狰狞伤疤。我们绝不能放任这种状况持续，此刻比任何时候都更需要携手消灭东面的法西斯渣滓。我们必须跳出琐碎争论的泥潭，让国际阵营联合起来，走向联邦化。"
 GER_form_european_internationale: "成立欧洲共产国际"
 GER_form_european_internationale_desc: "一切工人革命的成功都源于统一战线的伟力。资产阶级始终以文化认同的毒饵分化工人阶级，将压迫之靴踩在我们的脖颈之上。但此刻，他们的骗局已经败露，算总账的日子来了。我们决不再重蹈过往革命的覆辙——以钢铁般的团结意志，既要碾碎法西斯的复辟狂潮，更要终结资本主义的吸血秩序。"
 GER_new_german_man: "保障民众支持"
 GER_new_german_man_desc: "对于一个遵循卡尔·马克思教诲、代表德意志工人阶级灵魂与血肉的国家而言，若无法赢得人民的支持，便注定无法实现其抱负与繁荣。倘若连社会主义理想的蓝图都尚未构建，更遑论将其变为现实。那么此刻的头等要务，就是确保全体德意志人民的坚定拥护。"
 GER_ostaglie: "重燃东德情怀"
 GER_ostaglie_desc: "吞噬德国多年的新自由主义毒瘤，并非始自默克尔或朔尔茨，而要追溯到1990年——当民主共和国被资本主义的贪婪巨口吞噬之时。数十年来，东德人民被迫为历史蒙羞，被迫遗忘那份让德国从纳粹废墟中重生的反法西斯精神与工人阶级团结。但如今，随着国会大厦重回人民手中、自由秩序土崩瓦解，是时候掘开柏林沥青下掩埋的遗产了。\n\n我们将重建统一社会党，缔造崭新的民主共和国。尽管让怀疑者嗤笑这是怀旧病发作，但这一次，我们绝不会倒下。这一次，我们既不会向莫斯科低头，也不会向布鲁塞尔屈服。"
 GER_intensify_class_struggle: "模仿国民阵线"
 GER_intensify_class_struggle_desc: "在第一民主共和国时期，统一社会党并非独揽大权，而是与精心挑选的次要政党及群众组织共同执政。这些团体被允许发声，但绝不容许违逆。国民阵线展现出的团结、稳定，尤其是高度控制力，正是我们如今要效法的典范。随着我们复兴统一社会党并重拾东德遗产，故技重施实属必然。\n\n国家民主党、基督教民主联盟、民主农民党、自由民主党——这些早已被世人遗忘的名字，将在我们的监督下重获新生。反动派当然会讥讽这只是装点门面，但真相更为简单：合法性建立在观感之上。人民渴求秩序，渴求一个强有力的政府。我们必将二者兼施，同时确保无人忘记谁才是这场大合唱的指挥者。"
 GER_sword_of_the_shield_of_the_party: "党的剑与盾"
 GER_sword_of_the_shield_of_the_party_desc: "“戴着白手套搞不了革命。”——弗拉基米尔·列宁\n\n工人的敌人不会因革命如火如荼就自行消失。反动派仍在暗中蛰伏，怯懦地在门后散布反革命耳语，而外国资本的代理人从未停止其永恒的破坏行径。若要捍卫革命成果，我们必须不惜一切代价守护它。尽管许多人仍对国家安全部的记忆心有余悸，但工人革命必须清除这些内部威胁。斯塔西的手段并非奢侈，而是必要之恶。"
 GER_liquidate_the_capitalist_class: "日耳曼社会主义"
 GER_liquidate_the_capitalist_class_desc: "这并非德意志的第一次革命。从1919年的斯巴达克同盟到反抗纳粹暴政的斗士，我们的历史始终流淌着抗争的血脉，虽屡遭镇压与背叛，却永不被遗忘。卢森堡的鲜血仍浸染着兰德维尔运河的流水，台尔曼的呐喊仍在布痕瓦尔德集中营的走廊回荡。我们继承的，正是他们面对绝境时英勇抗争的沉重遗产。\n\n千百年来，德国的千年认同被君主、军国主义者与种族屠杀狂徒所劫持。但如今，我们绝不会再将德意志民族的灵魂拱手让给反动派与法西斯分子。因为我们代表的才是真正的德国——革命者的德国、狂热反法西斯者的德国。世界将目睹，一个挣脱资本与反动枷锁的社会主义国家能成就怎样的伟业。"
 GER_revolutionary_justice_for_traitors: "让革命审判叛徒"
 GER_revolutionary_justice_for_traitors_desc: "豁免时代已然终结。长久以来，政府、媒体与工业界的懦夫与投机分子，将德意志人民出卖给资本猪猡与北约官僚。他们一面高呼民主却镇压工人，一面歌颂和平却豢养军工复合体，一面赞颂繁荣却坐视百万民众坠入贫困深渊。如今，他们更纵容法西斯还魂，任由东方兄弟沦陷。\n\n现在，他们面对的并非复仇，而是迟来的审判。在卡尔斯鲁厄，一系列庭审即将启动。他们对工人、对环境、对和平本质犯下的罪行，将悉数公之于众。这一过程必将伴随阵痛与分歧，但更将昭示一个明确事实：旧秩序已死，其仆从永无归途。这不是清洗，而是历史积欠的清算。"
 GER_socialist_democracy: "传播马克思主义"
 GER_socialist_democracy_desc: "仅仅审判联邦共和国的叛徒与渣滓远远不够，我们必须让德国人民理解背叛的根源。自由主义的伤疤深可见骨，资本主义思维模式的毒素仍在许多人脑海中挥之不去。为此，我们将发起一场全面的再教育运动，通过公共宣传与文化复兴，让有史以来最伟大的德国人——马克思的学说重新响彻每座工厂车间、每间教室、每个工会。德国的工人与农民将重新学会憧憬一个没有剥削与压迫的世界。"
 GER_anti_fascist_bastion: "反法西斯堡垒"
 GER_anti_fascist_bastion_desc: "法西斯主义，这个曾用大半个世纪定义并扭曲人类历史的可憎瘟疫，这个玷污德意志民族声誉、毒害其思想的罪恶信条，如今正企图再次摧毁我们的生活根基。我们德国必须，也必将作为欧洲的中流砥柱巍然屹立，以钢铁意志抗击法西斯暴徒的进犯。我们要成为抗击一切邪恶、捍卫马克思主义真理的光辉典范。德意志及其全体人民必将成为整个欧洲大陆反法西斯斗争的光辉堡垒。"
 GER_revolutionary_society: "猎杀巨熊"
 GER_revolutionary_society_desc: ""
 GER_centralized_planning: "中央计划"
 GER_centralized_planning_desc: "德意志民主共和国以其先进的中央计划经济体系而闻名。这一体系极为复杂，依托众多不同的控制机制来维持这一独特的经济模式。经济运行稳定，甚至公众也在一定程度上参与规划。然而，历史上的悲剧性时刻到来——德国被强行统一，这一理性而公平的体系在一夜之间被摧毁，取而代之的是一个混乱、唯利润至上的自由市场经济体系，而这一体系未能兑现其承诺。历史已经证明，计划经济才是德国社会前进的正确道路，因此，我们将再次重塑经济体系，使其回归中央计划经济！"
 GER_revitalize_german_industry: "振兴德国工业"
 GER_revitalize_german_industry_desc: "曾几何时，数百家工厂日夜三班倒，既为士兵锻造钢枪，又为百姓烤制面包。而现在，这些曾经令人骄傲的厂房里，之回荡着振聋发聩的苦涩寂静。破碎的基础设施、匮乏的熟练工人、迷失的生产方向，这一切从今日起将彻底改变。而我们要做的第一件事，就是为所有人树立明确的目标：德意志民族的复兴，与德国工人的福祉！"
 GER_reindustrialize_the_ruhr: "鲁尔区与南部再工业化"
 GER_reindustrialize_the_ruhr_desc: "向服务型经济的转型，加之政府对环保势力的妥协，导致我国核心工业区遭遇前所未有的衰退与产业空心化。现在，我们要打破这些人为强加的社会枷锁，在昔日丰厚的工业根基上，重建崭新的工厂与生产基地！"
 GER_reindustrialize_the_south: "南方再工业化"
 GER_reindustrialize_the_south_desc: ""
 GER_protect_german_workers: "现代劳工法案"
 GER_protect_german_workers_desc: "工人是德国经济的脊梁，是支撑我国工业、基础设施与繁荣的基石。没有他们的劳动、创新与奉献，我们的经济引擎将停滞，国家的力量也将随之衰退。若无法给予工人应有的尊重与安全保障，不仅会破坏国家的团结与稳定，也将削弱经济的根基。因此，政府必须保障工人的权利与安全。通过改革劳动法，我们将优化生产流程，强化工人权益保护，并确保每位公民都能高效且有目标地为集体事业贡献力量。更强有力的工人保护措施不仅能提升生活水平，还将激发劳动者的忠诚感，巩固国家的团结。"
 GER_socialist_anti_consumerism: "社会主义反消费主义"
 GER_socialist_anti_consumerism_desc: "啊，旧时光——工人们年复一年将血汗钱耗费在换汤不换药的商品上，只为维持欲望的无限循环。这个邪恶循环今日将被终结。我们将为人民提供生存所需的一切——食物、住所、尊严，乃至些许体面的享受。但虚假欲望再不能主导我们的经济，通过消费操控大众的时代已然落幕，从今往后，生产只为服务生活，而非利润。"
 GER_construct_working_class_unity: "团结工人阶级"
 GER_construct_working_class_unity_desc: "从宝马工厂的工程师，到为这些汽车铺设道路的工人，我们必须齐心协力，实现先辈未能企及的光明未来。纵有分歧，纵有争执，每个德国工人都要明白：我们的前进之路，依靠与为了国家的繁荣，同志间的相互扶持与团结！"
 GER_socialist_market_economics: "社会主义市场经济"
 GER_socialist_market_economics_desc: ""
 GER_community_of_european_workers: "社会主义工人社区"
 GER_community_of_european_workers_desc: "“协会”——人们为共同目标而结成的团体长久以来都是德国社会的基石。无论是政治、体育还是学术领域，各类社团塑造了德意志的社会肌理。现在我们将更进一步：建立全国性的工人总会！国家将定期组织研讨会、集会乃至休闲社交晚会，确保劳动者建立更紧密的纽带，共享团结奋进所需的知识。"
 GER_socialist_pseudo_consumerism: "社会主义伪消费主义"
 GER_socialist_pseudo_consumerism_desc: "啊，旧时光——人们将工资挥霍在各种小玩意上，换来片刻欢愉。可惜旧德国的消费主义早已越界，它不再点缀生活，反而开始主宰人生。我们不会重蹈覆辙，但通过崭新的繁荣模式，我们将为人民即刻奉上快乐与尊严，而非遥不可及的空头支票。"
 GER_unity_of_the_unions: "团结盟国"
 GER_unity_of_the_unions_desc: ""
 GER_connecting_the_country: "振兴国家"
 GER_connecting_the_country_desc: "要让新工厂持续运转，同时保障工人们的家庭用电，我国亟需海量能源。在此形势下，尽管民众对此仍心存疑虑，我们必须解除核电禁令。而在新建反应堆竣工前，那些曾被废弃的煤电与火电厂将不得不支撑我们走向未来。"
 GER_revitalize_the_german_consumer_market: "重振消费市场"
 GER_revitalize_the_german_consumer_market_desc: "战后岁月总是艰难，成千上万的孤儿寡母，破碎的家庭，倒塌的学校与医院。值此之际，我们不仅要保障民众升级，更要让其对重建的生活感到真正满足。为此，我们将审慎地重新引入符合标准的消费主义元素。毕竟，心满意足的公民才是健康经济的基石。"
 GER_nationalize_vital_industries: "国有化关键产业"
 GER_nationalize_vital_industries_desc: "外国投资者将因此遭殃，而我国工人将重获新生！我们终将夺回理应属于人民的一切！重工业、交通运输、高新技术与制药等关键领域将收归国有。这些产业至关重要，绝不能被私人掌控。它们必须为人民服务，而非为利润服务。"
 GER_encourage_cooperative_economics: "鼓励合作经济"
 GER_encourage_cooperative_economics_desc: ""
 GER_turn_ploughshares_into_swords: "铸犁为剑"
 GER_turn_ploughshares_into_swords_desc: "迄今为止的一切努力，都已奠定延续数十年的基石，而我们辛勤耕耘的果实正悄然显现。然而国境之外，虎视眈眈者正企图摧毁我们的美好生活。我们岂能坐视不管？劳动将成为我们的利器，工厂将铸犁为剑，而工人阶级必将在车间与战场两条战线上赢得胜利！"
 GER_rebuild_the_bundeswehr: "欧洲共产国际扩张"
 GER_rebuild_the_bundeswehr_desc: "自由的钟声响彻西欧大地，不仅德国的劳动者，多国人民都在希望与欢欣中呐喊！然而欧洲大陆阴云未散。法西斯俄国仍盘踞在征服者的王座上，贪婪觊觎着我们的人民、资源与财富。随着北约成为历史，我们与兄弟国家仅靠意识形态纽带维系。若不扭转局面，各国将逐个沦陷，直到欧洲再无自由之邦。我们绝不容忍这般结局，必将捍卫革命与人民，世界自由劳动者万岁！"
 GER_control_the_skies: "世界革命"
 GER_control_the_skies_desc: "自美国崩溃以来，社会主义思想在全球范围内重获新生。随着那个糅合了各种资本主义理念的畸形国家再无法扼杀社会主义思潮，人民的意志开始熊熊燃烧。然而，他们仍遭受本国政府与社会的压制，若无外援，这项崇高事业恐将夭折。眼下我们虽资源有限，但必将倾尽所能支持国内外人民的解放事业！"
 GER_new_aerial_academy: "来自美国革命的帮助"
 GER_new_aerial_academy_desc: "历经多年压迫，美国工人阶级终于奋起反抗，夺回了本应属于他们的地位。尽管局势尚未完全稳定，但他们已掌握充足的资源与装备，甚至慷慨地将盈余物资捐赠给我们。这份阶级情谊与兄弟情义必将载入史册，待资产阶级被彻底逐出北美大陆之时，我们必将开展更深层次的合作。"
 GER_streamline_aircraft_production: "支援斯堪的纳维亚共产党"
 GER_streamline_aircraft_production_desc: "斯堪的纳维亚或许是抗俄战争中唯一未受波及的地区。他们虽参与作战却未被俄罗斯击垮，并成功镇压了席卷西欧的革命共产主义浪潮。然而，他们仍固执地抱着那种友善却缺陷明显的民主社会主义不放。若想与欧洲工人阶级共同迈向未来，北欧各国政府必须摒弃这些过时理想，接受大陆正在经历的变革轨迹。既然我们心知肚明他们不会自愿转变，那就找出那些愿意暴力夺权的人，递给他们武器。"
 GER_modernize_the_eurotyphoon: "联系反法西斯游击队"
 GER_modernize_the_eurotyphoon_desc: "俄国人从未在任何领域有所建树，如今对东欧的控制更是漏洞百出。占领区各地涌现出无数游击队，尽管他们未必都信仰共产主义，但只要是抗俄力量，便是我们的盟友。我们终将东进解放这些被奴役的群众，届时若已构建起可靠的游击网络，必将事半功倍。因此，我们必须即刻打磨这把利剑，静待光荣之日的降临！"
 GER_moscow_shall_know_fear: "准备全面游击战"
 GER_moscow_shall_know_fear_desc: "是时候给予俄罗斯敌人致命一击了。最高统帅部判定，我们在东欧扶植的游击队已具备全面作战能力，现命令他们即刻行动。这将重创俄罗斯政权的公信力，并为我们的最终进攻铺平道路。尽管这些游击队员可能难逃失败的命运，但他们的牺牲将为我们最终解放东方奠定基础。俄罗斯必亡，欧洲国际万岁！"
 GER_steel_torrent: "联系中国"
 GER_steel_torrent_desc: "中国，这个长期被视为敌手的国度，作为共产主义的最后一座重要灯塔，如今或许将成为我们的盟友。尽管两国人民仍心存戒备，但在这个各国政府都在标新立异、随意创造治理新模式的世界上，我们共享同一种意识形态的事实意义重大。如今我们已具备更佳的合作基础，或许未来能缔结互利协定。但就目前而言，实现关系正常化已是足矣。"
 GER_localize_tank_production: "瓦根克内希特协议"
 GER_localize_tank_production_desc: "尽管中国长期与俄罗斯交好，但俄方近期的意识形态转变已使两国关系疏远。中方认为我们才是更值得合作的伙伴，并预见到战争临近，提出了一个耐人寻味的提议：若俄罗斯战败，其领土将由我们双方挂人，届时可随心所欲地操控各自的新傀儡政权。俄中合作的时代就此真正终结，从此双方将如共产主义与资本主义般势不两立。"
 GER_trial_of_treasonous_politicians: "电子战研究"
 GER_trial_of_treasonous_politicians_desc: "当今时代，战争不仅爆发于战壕之中，更在指挥椅上展开。我们与俄罗斯的上一场战争证明，我们的军事学说已严重过时，对新一代技术的运用更是远未达标。若想与东方对手分庭抗礼，我们必须首先确保能与其同等程度地驾驭这些技术，这是不容妥协的前提。"
 GER_study_new_mobile_doctrines: "国际军事合作"
 GER_study_new_mobile_doctrines_desc: "我们与中国的会谈进展异常顺利，与远东同志的共同立场持续扩大。近日提出的联合军事行动倡议，更获双方欣然接受。尽管地理阻隔使我们未必会并肩作战，但可能性始终存在。为此，我们已着手筹备大规模演习，并为未来深化军事合作铺路。更何况与中国交好，有百利而无一害。"
 GER_an_elite_officer_corps: "援助波罗的抵抗组织"
 GER_an_elite_officer_corps_desc: ""
 GER_build_the_national_peoples_army: "建立国家人民军"
 GER_build_the_national_peoples_army_desc: "东线战事的溃败已使我军陷入空前危机——建制支离破碎、物资储备告罄，将士们或已阵亡疆场，或陷于士气涣散之困境。正如历次社会主义革命遭遇的围剿，我们正被嗜血的资本主义列强环伺，其覆灭革命政权的野心昭然若揭。为保卫革命火种与劳动者权益，我们必须不惜一切代价重整国防体系。这支新生的武装力量决不再效仿旧政权炮制帝国主义冒险，而将成为捍卫工人阶级的钢铁长城。"
 GER_trial_of_treasonous_generals: "审判叛将"
 GER_trial_of_treasonous_generals_desc: "虽然完全以忠诚度构建军队实属蠢事，但任用不可信赖的将领同样危险。我军队伍中潜藏着诸多革命叛徒与旧政权余孽。为确保国家在军事和政治上的未来，必须趁这些叛将酿成大祸前将其清除。他们的职位将由人民公仆接任……当然，这些继任者也得有足够的声望服众。"
 GER_pick_up_sword_of_damocles: "执起达摩克利斯之剑"
 GER_pick_up_sword_of_damocles_desc: "无论我们如何奋力抗击俄国人，他们始终握有一张王牌。尽管英法两国拥有少量核武，但与东方邻国相比不过是小巫见大巫。即便我们能摧毁几座城市，自己仍难逃灭顶之灾。所幸随着美国的缺席，核武器条约几乎无人监管，我们得以高悬达摩克利斯之剑。执此利刃，我们将斩断俄罗斯的枷锁，解放数千万受其奴役的人民！"
 GER_immer_bereit: "§Y猎鹰行动§!"
 GER_immer_bereit_desc: "我们的共产主义理想已在欧洲扎根，但要实现国家的真正繁荣，必须消除东方俄罗斯巨熊的持久威胁。长期以来，俄罗斯那充满压迫性的意识形态践踏着各国文化。俄罗斯和东欧人民在这专制政权下饱受苦难，亟需解放。我们有责任帮助他们挣脱这种给欧洲带来深重灾难的意识形态暴政，为整个欧洲大陆实现共产主义乌托邦铺平道路。"
 GER_fury_of_the_people: "人民之怒吼"
 GER_fury_of_the_people_desc: "可曾听见？可曾听见那震颤德意志大地的轰鸣？它在街头巷尾，在千家万户，在工厂车间——这是工人、农民、劳动者和普通民众的呐喊，是无产阶级捍卫革命的怒吼！群众愤怒的浪潮正席卷而来，他们看清了反动势力的包围，要求立即行动，而我们必将雷厉风行。根据指示，我们将开展全面彻底的备战动员：扩编武装力量、配发武器装备、全国总动员、激发群众斗志。所有人都心知肚明，一场生死较量即将来临。但正是人民的战斗热情，将化为我们夺取胜利的力量源泉。"
 GER_introduce_mass_conscription: "推行大规模征兵"
 GER_introduce_mass_conscription_desc: "随着民主德国的终结和德国重新统一，腐朽的前联邦国防军面临的核心问题之一，就是纯志愿兵役制导致兵力严重不足。若要在未来战争中占据优势，这项制度必须改革。我们将重启被民众称为“国防义务制”的征兵体系，这不仅能扩充兵源储备，更能直接壮大现有军队规模。"
 GER_learn_from_our_enemies: "师夷长技以制夷"
 GER_learn_from_our_enemies_desc: ""
 GER_nationalize_heckler_and_koch: "重组莱茵金属"
 GER_nationalize_heckler_and_koch_desc: "莱茵金属公司曾是资本主义德国企业集团皇冠上的明珠。这个价值数十亿美元的庞然大物曾是北约装甲部队制造体系的重要支柱，而今已归我们所有。我们不会拆除这个北约全球帝国主义的工具，而是将其国有化重组，服务于新德国社会主义国家的国防目标。我们将充足部门、启动新项目、调整生产指标，最重要的是彻底清除资本主义利己与逐利的一切痕迹。昔日武装资本主义西方对抗社会主义的利器，如今将成为推动社会主义遍及欧洲的先锋。"
 GER_a_motorized_army: "重拾机动化战术"
 GER_a_motorized_army_desc: "现代战争尽管充斥着对机器人和无人机的讨论，其核心仍依赖于快速机动的摩托化与机械化部队。搭载装甲运兵车和步兵战车的大规模步兵单位，通过高速机动包抄歼灭敌军，这将是未来任何冲突中的制胜关键。有鉴于此，我们必须重新审视并革新步兵摩托化战术，从军事院校到野战部队，都要将这种作战范式置于训练核心。正如昔日东德摩托化步兵兵团那般，我们的敌人很快就会发现：与我们在陆战中对决，必须三思而后行。"
 GER_prestigious_german_engine: "血染苍穹"
 GER_prestigious_german_engine_desc: "历史与近期战争给我们一个血的教训：制空权即胜利权。昔日德国空军因经费匮乏，难以有效抗衡俄罗斯空中力量。为此我们将重组空军体系，大幅增加航空研发与维护预算，以真正掌控长空之钥。"
 GER_refocus_the_automobile_industry: "钢铁洪流"
 GER_refocus_the_automobile_industry_desc: "我们的备战工作堪称空间绝后。我们正着了成千上万的士兵，修筑了无数堡垒与工厂，打造了钢铁洪流般的装甲部队，这是欧洲大陆多年未见的强大力量。但这远不止是单纯的武力展示，更是全德工人阶级集体意志与力量的结晶，正在酝酿着令人胆寒的雷霆一击。很快，整个欧洲都将目睹一场钢铁与力量的暴风雨，由装甲、枪炮和满腔怒火的钢铁洪流。这将是一个国家凝聚全部力量，给资本主义势力以致命一击。或许有人会称我们的计划是痴心妄想，但我们将以斯大林同志的名言回击。\n\n“布尔什维克攻无不克！”"
 GER_expand_automobile_factories: "汽车工业扩张"
 GER_expand_automobile_factories_desc: ""
 GER_cult_of_speed: "全面联合作战"
 GER_cult_of_speed_desc: "多兵种协同作战，即步兵、装甲与空中力量的协调运用以摧毁目标，至今仍是现代战争效能的基石。即便在自动化系统兴起的今天，全球最强大、最受尊敬的军队仍遵循这些原则，而我们也必须重新审视并革新这些战术准则。总参谋部杰出的军事专家将立即着手制定全面现代化的作战条令更新方案。我军各部将系统学习战术协同的重要性，并配备现代化指挥控制技术以实现最大作战效能。正如当年国家人民军与华约组织深刻理解并践行多兵种协同的要义，今日我们也将如此效仿。"
 GER_war_for_the_proletariat: "为无产阶级而战"
 GER_war_for_the_proletariat_desc: "尽管战争通常是资本家兜售新式枪炮、炸弹与战机的工具，但此次我们必须破例。若放任俄罗斯继续其行径，他们终将摧毁沿途一切，包括他们本国的无辜劳动者。而后，贪得无厌的俄国必将觊觎我们，摧毁我们浴血奋战的革命成果，最终无人能幸免。因此我们责无旁贷，不仅为捍卫本国工人的未来而战，更为拯救俄罗斯同胞而战。"
 GER_reform_kampfgruppen_arbeiterklasse: "工人阶级的战斗群"
 GER_reform_kampfgruppen_arbeiterklasse_desc: "多亏工人阶级的奋斗，国内革命已根基稳固，但许多人渴望将火种播向海外。这些工人不愿重返工厂，而愿扛起钢枪东征，我们无比钦佩这份革命热忱！为此，我们将组建特殊的“工人阶级旅”，确保人人都有机会投身解放事业，让所有被俄罗斯枷锁禁锢的同胞重获自由！"
 GER_the_whisper_from_all_continents: "来自各大洲的低语"
 GER_the_whisper_from_all_continents_desc: "社会主义不同于其他意识形态，它仿佛是工业化进程的必然归宿。工人们在工厂挥汗如雨，在矿场耗尽体力，用血汗铸就奇迹，他们理应享有安居之所、温饱之食与参政之权！正是这种朴素逻辑，让各种形态的社会主义悄然席卷全球，深入每个曾为生计奔波的男女老少心中。我们将唤醒并驾驭这股力量，直至革命之火燃遍世界！全世界无产者，挣脱你们的锁链吧！"
 GER_communists_forward: "共产党人向前进！"
 GER_communists_forward_desc: "斯大林同志虽为俄罗斯人（其实是格鲁吉亚人），但他说过的一句话或许最能体现共产主义精神，那就是“绝不后退一步！”无论是工业建设、科技发展，还是这次的战争，我们都将勇敢地踏上前人没有走过的路。无论是俄国人、资产阶级、还是什么所谓的盟友，都休想让我们退却半步！我们将高歌猛进，直至解放全世界！"
 GER_technology_asistance_program: "美国科技研究计划"
 GER_technology_asistance_program_desc: ""
 GER_unrestricted_aerial_bombardment: "无限制轰炸"
 GER_unrestricted_aerial_bombardment_desc: "尽管我们恪守《日内瓦公约》，但现实形势迫使我们调整策略。俄罗斯利用我方克制重整军备的举动重建其军事能力。为遏制其军事复苏，即使可能造成平民伤亡，我们将授权空军飞行员对俄领土纵深实施空袭，打击关键补给枢纽、可能被征用为临时军事指挥所的民用设施、军工生产基地等战略目标。"
 GER_operation_centre: "§Y星行动§!"
 GER_operation_centre_desc: "波兰作为关键缓冲国，有效阻隔了俄罗斯遭受直接入侵的威胁，并使任何进攻行动复杂化。波兰的地形极适合装甲部队实施攻势机动，但历史一再证明，若采取纵深防御战略则会面临巨大挑战。一旦在波兰境内实现突破，俄罗斯广袤领土的纵深将门户洞开，其众多大型都市中心也将暴露于兵锋之下。"
 GER_operation_normalization: "§Y蜂鸟行动§!"
 GER_operation_normalization_desc: "波兰作为俄军在东欧的主要屏障，其防线突破需消耗巨大资源。但若取道斯洛伐克、匈牙利和罗马尼亚推进，则可迂回这条重兵布防的战线。该区域地形多利于军事行动，将为我们创造战略优势。通过这一路线突进，我们能从俄军意想不到的方向发动攻击，瓦解其防御体系，进一步削弱其对东欧的控制。"
 GER_lure_them_in: "诱敌深入"
 GER_lure_them_in_desc: ""
 GER_form_free_russian_army: "建立俄罗斯红军"
 GER_form_free_russian_army_desc: "即便在庞大的俄罗斯帝国内部，仍存在着长期遭法西斯政权镇压的流亡共产主义团体与地下运动。随着执政党支持率秩序下滑，我们正面临关键机遇：通过接触这些组织，不仅能探讨将其民兵整编为合作部队的可能性，更能为战后建立新的俄罗斯政治架构奠定基础。这些团体有望成为构建战后新秩序的核心力量，建立一个摒弃威权主义、更符合我们区域稳定远景的政权体系。"
 GER_europes_finest_hour: "欧洲终场"
 GER_europes_finest_hour_desc: "这帮杂种正在溃逃！在整个欧洲大陆，英勇的军队和坚韧的人民奋起反抗，以无畏的勇气和牺牲粉碎了法西斯的枷锁，夺回了自由。现在是将胜利转化为永恒遗产的时刻。是时候重建欧洲了，不是建立在恐惧或分裂之上，而是建立在正义和团结的基础上。"
 GER_quell_fires_of_revolution: "平息革命混乱"
 GER_quell_fires_of_revolution_desc: ""
 GER_eternal_revolution: "革命永恒不朽"
 GER_eternal_revolution_desc: "纵观历史长河，社会主义运动始终遭受残酷镇压。但今日，一股新生力量正在崛起。从欧洲到世界各地，在长期被资本主义主宰、遭法西斯践踏的大路上，工人们正挣脱锁链，亲手缔造理想国。他们不再是剥削的对象，而是新社会的创造者。\n\n欧洲也不会例外，这片大陆终将崛起，不是作为精英统治的分裂之地，而是由工人阶级缔造、为工人阶级服务的团结力量。我们未来的基石时团结、正义与人民的集体力量。新时代的曙光已经降临，这曙光属于劳动者，而非统治者。"
 GER_call_for_international_help: "呼吁国际援助"
 GER_call_for_international_help_desc: "全球各地无数坚定的社会主义者正通过社交媒体网络声援我们的事业，许多人甚至甘愿为对抗莫斯科法西斯政权献出生命。此外，众多国家也为我们的斗争表示同情与支持。\n\n通过与国际社会主义网络建立联系，我们不仅能提升国际形象，更能获取关键资源——包括增援前线与国内建设的志愿者，以及社会主义盟国的人道主义与军事援助。动员这些支持力量，对持续抵抗威权主义侵略、展现国际团结至关重要。"
 GER_break_their_spirit: "摧心灭魂"
 GER_break_their_spirit_desc: ""
 GER_study_new_strategies: "学习新策略"
 GER_study_new_strategies_desc: ""
 GER_progress_cult: "进步崇拜"
 GER_progress_cult_desc: "在资本主义的垂死阶段，“进步”仅以利润衡量。每项创新都只为填满资本家的口袋、服务市场逻辑，却从不为人民造福。如今，年轻一代渴求挣脱历史枷锁的未来。民主德国的讲堂与实验室正迸发着无拘无束的创新火花。我们毫不掩饰雄心，反而为之欢庆。科学与理性不该是无产阶级恐惧的资产阶级工具，而应称为工人阶级武库中的利器。拒绝进化的社会，无异于行尸走肉。"
 GER_propagandize_the_war_effort: "战争宣传攻势"
 GER_propagandize_the_war_effort_desc: "宣传是任何斗争中最为强大的武器之一，它不仅要揭露敌人，更要唤醒和团结人民。在战争中，民众的支持绝非可有可无，而是生死攸关。没有人民，就没有军队，没有抵抗，更没有革命。正因如此，我们必须向德国人民展示真相，让他们明白自己为何而战。我们必须清楚地告诉他们，他们战斗的并非为了旗帜或疆界，而是为了一个崭新欧洲的黎明。一个永远摆脱资本主义剥削、彻底清除千百年来荼毒这片大陆的复仇主义渣滓的新世界。"
 GER_relocate_the_industry: "工业的新定位"
 GER_relocate_the_industry_desc: ""
 GER_chancellors_guiding_hand: "总理指引道路"
 GER_chancellors_guiding_hand_desc: "德国有幸迎来了多年未见的英明领袖——我们伟大的总理。民主制度下争吵不休的腐朽时代已经终结，权力分散导致的机能失调体制已被扫进历史垃圾堆。如今唯有一个愿景，一位领袖。昔日的自由派根本未能察觉我们伟大民族所处的险境：四周强敌环伺，野蛮国家虎视眈眈，随时准备将我们撕碎。但在总理的英明领导下，我们必将众志成城，夺取胜利。"
 GER_gotterdammerung: "诸神黄昏"
 GER_gotterdammerung_desc: "随着战争走向终幕，它的余波将世代回响于欧洲大陆。在北约盟国的废墟之中，德国同样陷入彻底的毁灭。俄军无情的炮火将我们的城市夷为焦土，街道上堆满无数尸骸，绝望的家庭在瓦砾间哭喊，徒手翻找着亲人的身影——即便无法救他们一命，也至少要找回他们的遗体。昔日的敌人，再次让我们的民族蒙羞——那个我们曾以为在1991年便已被封存进历史的对手。我们曾憧憬21世纪是和平与繁荣的时代，一个洗刷过去、迈向崭新未来的时代。然而，我们的天真注定破碎。来自东方的威胁从未消失，它只是蛰伏，静待反扑之日。这场战争，是我们的清算，是对天真幻想的无情觉醒。如今，我们的人民怀揣着刻骨的仇恨与怒火，复仇的渴望如烈焰燃烧。但此刻，我们唯有忍耐，唯有咬紧牙关，低头承受这屈辱，迎接重建家园的艰难时刻。然而，不要误判，不要遗忘——德国不会永远沉沦，德国不会长久埋于废墟之中。我们终将崛起，我们终将战胜一切。最终的胜利，将属于德国！"
 GER_promise_recovery: "承诺恢复"
 GER_promise_recovery_desc: "我们在俄罗斯人手中所遭受的耻辱已深深动摇了民众对政府的信任，也将我们曾经繁荣的经济摧残殆尽。人民的呼声中充满了期盼并总问些我们无力解答的难题。我们不能再停滞不前，在未来几个月中我们的国家将面临其近几十年以来最为艰难的考验。我们必将重建，必将改革，并最终从俄罗斯人手中夺回曾属于我们的荣光！"
 GER_convene_with_nato: "北约会谈"
 GER_convene_with_nato_desc: "在我们的北约盟友中，没有任何一个国家比我们的处境更好，也没有谁愿意再去考虑与俄罗斯展开另一场战争。然而，我们不能消极等待，眼睁睁看着这头“北极熊”日渐壮大。我们亟需进行一次彻底的整顿，确保北约真正实现其所标榜的目标——成为一支强大而团结的军事力量，能够保护其人民的安全。"
 GER_facit_omnia_voluntas: "意志决定一切"
 GER_facit_omnia_voluntas_desc: "太久了，太久了！我们的国家被一群只会伏案批文的庸碌之徒与贪婪腐败的豺狼所统治，他们的口袋被资本填满，而我们的国力却在他们的挥霍中衰败。正是他们，将我们引向失败，引向毁灭，引向沉沦！在他们怠惰无能的领导下，德国联邦国防军被弃之如敝履，任其腐朽凋零，而他们自己却肆意中饱私囊，将国家资源浪费在毫无意义的妄想之上。但今天，一切都将终结！德意志的军队不再以软弱为名！我们将重塑昔日的荣光，恢复军队的纪律、荣誉与无可匹敌的强大！普鲁士之辉煌，德意志之铁血，如今必将再度燃起！我们的军队不再是政客忽视的附庸，而将成为令敌人战栗、令世界敬畏的铁壁长城？一个新时代已经到来——一个更强大的德国！一个坚定无畏、重拾自豪的德国！一个敢于直面外敌侵略、绝不退缩的德国！我们不再犹疑，我们不再屈膝！从今日起，德意志巍然屹立，不可撼动！"
 GER_nato_war_recovery: "复兴武装力量"
 GER_nato_war_recovery_desc: "早在跟俄罗斯开战前，我们的军队就乏善可陈。即便它已经成为一支极度现代化与威风凛凛的军队，也改变不了我们依然严重依赖于美国佬的事实。没了美国这位盟友，我们将遭受到俄国人的欺凌并只能忍辱偷生。我国再也不能输给这头凶猛的俄罗斯熊了。从现在开始我们必须自力更生，当然这个过程并不会太过于艰难。几个世纪以来，德国军队一直为世界瞩目，如今它将重铸荣光。我们将亲自铸造一支不负先祖期望的军队。"
 GER_en_treue_fest: "荣耀归于祖国"
 GER_en_treue_fest_desc: "德意志拥有欧洲最悠久、最辉煌的军事史之一。在帝国旗帜下，我们曾赢得伟大胜利，锻造天才将帅，开创革命性军事学说，改写人类历史进程。正是这个民族改变了欧陆的命运轨迹，而今必须让人民重拾这份认知。我们将传播这一信念，通过宣传历史、讲述昔日伟人传奇，在全德掀起狂热的爱国热情。很快，每个德国人都将展现出绝对忠诚，甘愿为重现祖国荣光奉献一切，无论现在还是未来。"
 GER_gott_ehre_vaterland: "黑白红联盟"
 GER_gott_ehre_vaterland_desc: "德国武装力量的巅峰时代究竟为何时？是国防军？是联邦国防军？事实是，这些都远未触及我们真正的军事辉煌。它们的传统、信仰与荣耀，皆源自一个更为古老、更为强大的根基——普鲁士，那个铸就了德意志帝国的战士国度。因此，若要真正复兴我们的军队，就必须让它回归普鲁士的形象。唯有普鲁士军国主义的复兴，唯有卓越军人的再塑，我们才能捍卫国家，才能抵御来自东方的黑暗威胁。我们的意志将再次在钢铁中锻造，我们的人民将再度坚韧、纯粹，我们的血脉将燃烧，怀揣着不灭的复仇怒火。"
 GER_national_service: "国民服役"
 GER_national_service_desc: "曾几何时，德国的军事实力与钢铁意志震慑世界。普鲁士王国被公认为欧洲最强的军事国家之一，即便人口远不及其他大国，却依然建立起了欧洲第四大军队。然而，当今谈及德国军国主义，人们往往只会想起两次世界大战，而忽视了一个简单的事实——若无强大军队，德国早已沦为列强刀俎上的羔羊。若无武力，普鲁士永远无法完成德意志的统一大业；若无军队，德国早在东西两线的压力下崩溃，步奥地利在一战中的后尘；若无坚实的防御，我们的人民早已如牲畜般，被布尔什维克的屠刀蹂躏。军国主义从来不是德国的过错，而是德意志民族的命脉，是生存的根本，是不可动摇的信仰。而今，敌人再度逼近我们的边界，国家再次需要新鲜血液注入军队，为民族存亡而战。因此，我们必须重新启用强制征兵制——这一曾被愚蠢废除的根基。唯有如此，德国才能真正屹立不倒，战无不胜！"
 GER_rehabilitate_the_kaiser: "德皇凯旋"
 GER_rehabilitate_the_kaiser_desc: "何为德国之本？有人或许会称颂我们的悠久文化与传统，亦或是我们的技术革新与精益求精的精神。然而，直至19世纪末，统一的德国民族与国家概念仍模糊不清，只是诸侯割据、四分五裂的疆域。唯有仰赖上帝的恩典与霍亨索伦王朝的英明领导，我们德意志子民方得以挣脱奥地利与高卢势力的束缚，在烈火与钢铁中淬炼出一个真正的国家。若无俾斯麦的雄才大略、毛奇的铁血战策，尤其是威廉一世陛下的坚定引领，今日之德意志将无从谈起！是普鲁士与我们的皇帝铸造了德国，以鲜血、钢铁与不屈的意志锻造出我们的民族。今日，当巴伐利亚再次背离祖国，兄弟间再度因外部势力的阴谋而被边界分割，我们必须铭记先祖们浴血奋战的壮举，捍卫德意志不可分割的团结。正是我们民族坚韧不屈的灵魂与皇帝们的指引，让德国在世界舞台上昂然屹立，让我们在历史长河中争取到属于自己的光辉荣誉。我们不能忘却他们的遗产，因为正是他们的奋斗，奠定了我们的身份、文化与生存之道！"
 GER_eliminate_the_dregs: "消灭渣滓"
 GER_eliminate_the_dregs_desc: "帝国的伟业岂容蛀虫共存。社会主义煽动者、伪保守派、叛徒般的自由派——这些人打着“为了德国未来”的旗号动摇我们的权威。唯有吾等与皇帝陛下，方知何为人民真正福祉。\n\n即日起，我们将扩大警权，授予忠诚军官更大行动自由，以稳定之名暂限民权。黑名单已列，审判从速，地下组织必遭碾碎。此番肃清虽存争议，却是帝国屹立不倒之必需。更当以此为戒：新德国绝不再受魏玛时代软弱理想的舒服。唯有浴火，方能重生。"
 GER_restore_imperial_laws: "恢复帝国法律"
 GER_restore_imperial_laws_desc: "若论最能定义德意志民族的文件，莫过于以皇帝陛下形象为蓝本的那部法典。1871年宪法曾带领我们民族登上巅峰，直到全世界联合起来才将我国击垮。虽然需要对框架进行现代化调整，但俾斯麦帝国的精神将在法律中重生。\n\n贵族头衔得以恢复，皇帝作为国家元首的地位重新写入官方文件，各部委改组以体现帝国传统。效忠派官僚获得晋升，君主制象征回归公共机构。这些法律改革绝非怀旧，而是瓦解民主制度的具体步骤——正是这些制度让我国长期困于国际事务边缘。传统精英和保守派盟友将欣然协助我们推行这些法律，因为他们也将从中获益。"
 GER_the_army_with_a_state: "军队之国"
 GER_the_army_with_a_state_desc: "自由派的谎言曾让我们误信“国家统领军队”才是正道。而今，我们要锻造一支成为国家脊梁的军队。国防军将在内政外交中扮演更重要的角色，实质成为皇权复辟的守护者。具有保皇倾向的军官被委以民事要职，军队按帝国传统进行整编。效忠皇帝成为晋升的必要条件。实际上，这造就了一个禁卫军式的国家：军队保障内部秩序、镇压异见，并为德意志民族在世界舞台上的复兴做好准备。纪律与效率取代了争论与妥协。当然会有人反对这种理念，但人民渴求如此，我们岂能压抑他们的怒火？"
 GER_power_to_the_regency: "摄政大权"
 GER_power_to_the_regency_desc: "唯有待皇帝重登宝座之前，摄政会议将以近乎绝对的权威执掌德意志国运。该会议将被赋予对三权分支的完全统辖权。由可信赖的贵族、将领及政治忠臣组成的摄政团，将以帝国正统之名启动改革、颁布敕令。\n\n此举亦可视为精心设计的过渡。既非完整的君主制，亦非昔日的共和政体。"
 GER_exert_influence_over_our_allies: "影响盟国"
 GER_exert_influence_over_our_allies_desc: "欧洲诸盟邦从未与我们同心同德。但不同于往昔，我们的意图并非武力征服。我们将通过外交施压、贸易协定、情报共享与隐秘渗透，将势力版图悄然扩张至整个欧陆。\n\n对那些仍奉行君主传统的国家，我们将主动示好、积极拉拢。作为新欧洲秩序的捍卫者，眼下仍需保持战略定力。唯有当这些盟友名符其实之日，方才是德意志问鼎全球霸主之时。"
 GER_1918_undone: "1918未竟之事"
 GER_1918_undone_desc: "我们终于可以宣告：这条扭转历史的道路已抵达终点。1918年的耻辱、皇权的崩塌、《凡尔赛和约》的严苛，如今皆已雪耻。随着德皇重登宝座，昔日的错误不仅被修正，更被彻底抹去。\n\n红白黑三色旗再度飘扬在柏林上空，庆典游行席卷每座城市街道。此刻，我们的君主制不再是被遗忘的符号，而是至高无上的实权。通过外交斡旋与铁血征伐，德意志重归列强之林。无论前方是坦途或荆棘，有一点确凿无疑：帝国已然归来，1918年不再是一曲悲歌，只是德意志伟业永恒征程中一次短暂的顿挫。"
 GER_cameralism_in_21st_century: "21世纪重商主义"
 GER_cameralism_in_21st_century_desc: ""
 GER_centralize_the_economy: "集权化经济"
 GER_centralize_the_economy_desc: ""
 GER_to_crown_a_king: "加冕帝王"
 GER_to_crown_a_king_desc: ""
 GER_guns_of_the_future: "次世代武器"
 GER_guns_of_the_future_desc: "想要克敌制胜，我们必须秉持质量优于数量的原则，更要着眼于未来。战争形态日新月异，武器装备亦然，有些甚至已经先进到无需士兵亲临战场。我们将把这些科技推向极致，确保世界上没有任何敌人能在战术装备方面占据优势。\n\n智能枪械、人工智能武器、外骨骼装甲、定向能武器、天基防御系统、电磁轨道炮、高超音速导弹，这些都将成为我国科学家的首要研发目标。只有这样，我们才能确保对敌的绝对优势。任凭敌军攻势如潮，我们只需数件利器，便足以使其溃退至乌拉尔山脉以东。"
 GER_unconventional_weapons: "非常规作战武器"
 GER_unconventional_weapons_desc: "人类道德的枷锁，始终是束缚我国人民发展的限制。《日内瓦公约》的签署便是例证，那些所谓“违禁武器”的界定，不过是用所谓“战争罪”名号阉割我们。这种软弱已阻碍我国多年！战争本就不堪入目，何必区分武器的雅俗？生死攸关之际，谁会去在意招式是否温柔？唯一的要务是让自己活下来！\n\n我们将秘密研制非常规作战武器，逐步但坚定地清除《日内瓦公约》对军备与士兵思想的侵蚀。想要赢得战争，就必须放弃道德教条。只有这样，我们才能战胜那些被全球主义者“和平”谎言蒙蔽的敌人。是时候让他们端正自己的位置了。"
 GER_aggressive_rearmament: "侵略性再武装"
 GER_aggressive_rearmament_desc: "而今，我们的一切努力都将围绕一个至高目标——打造规模空前的现代化武库，以捍卫帝国安危。军火工厂、坦克制造厂与武器车间将昼夜不息地运转，全年无休——无论假日、挫折，乃至敌军的轰炸（倘若他们胆敢来犯）都不能使其停歇。"
 GER_soldiers_of_the_future: "次世代士兵"
 GER_soldiers_of_the_future_desc: "拥抱未来意味着全方位的变革。我们必须革新战术、升级科技，但最根本的是重塑那种为祖国流血牺牲战斗意志。这种精神内核不仅要复苏，更要适应新的生存法则、作战方式和战争哲学，彰显“强者生存”的信条。这一切都将在我们士兵的身上得以体现。\n\n他们必须做到在进攻时冷酷无情，信仰上绝对忠诚，与科技装备融为一体。要让敌人看到的不是可敬的对手，甚至不是人类，而是面无表情却渴望复仇的战争机器。而我们也将用如此极端的敌意审视对手，连我们自己人都会质疑敌军是否配称为人类。\n\n这样的士兵，必将为我们赢得每场战争。"
 GER_air_innovations: "航空创新"
 GER_air_innovations_desc: "现代科技彻底革新了空战模式，先进计算技术、隐身涂层乃至人工智能集成，正以超乎想象的速度重塑航空领域。此刻，正是我们空军乘变革之风而起的绝佳时期。我们将立即吸纳这些新技术，并建立促进持续创新的制度机制。未来的德意志战机将搭载最尖端科技划破苍穹，更有无数英才确保我们始终领先，任敌人使出何种手段。"
 GER_deutschland_erwacht: "德意志之觉醒"
 GER_deutschland_erwacht_desc: "昔日的德国曾是一个伟岸的民族——最重要的是，一个拥有钢铁脊梁的民族。然而，如今，这脊梁已被折断，利齿被强敌击碎，曾经的骄傲随风飘散。祖国的利剑——我们的军队，早已蒙尘锈蚀，而民族的血脉——我们的人民，则被背叛祖国的全球主义者抛弃于绝望的深渊。在这样的时代，人们只能怀念昔日的辉煌——那个国家敢于为自己挺身而出、在世界舞台上争取应得地位的时代。自1945年的战败与祖国分裂以来，我们的民族精神遭受重创，失败的幽灵在国民心中久久盘踞。但今日，德意志民族终将从漫长的沉睡中觉醒！如同展翅翱翔的雄鹰，我们将再度腾飞，将一切威胁扫除殆尽。从这一刻起，德意志与其子民将再次团结一心，步伐坚定，迈向胜利！"
 GER_our_noble_cause: "我们崇高的事业"
 GER_our_noble_cause_desc: "共产主义的幽灵正以暗红阴影笼罩欧洲。他们曾以为苏联已被打入地狱，如今又妄想将我们埋葬。历史再度重演，但这一次，再没有盟友能分散我们的注意力，再没有叛徒能玷污我们神圣的事业。自1936年起，我们竭尽所有资源只为彻底消灭布尔什维克瘟疫！而今，我们必须再次肩负这一使命！\n\n正如列宁格勒再度崛起，正如斯大林格勒重获新生！我们获得最后一次机会来纠正先辈的过失！最后一次机会将世界从布尔什维克暴政中解放！最后一次机会捍卫德意志种族的未来！我们的事业是高尚的！是神圣的！是为了拯救所有民族的灵魂！\n\n执此火炬是荣耀。用它焚尽赤色分子？更是无上快意。"
 GER_reenter_bavaria: "光复巴伐利亚"
 GER_reenter_bavaria_desc: "巴伐利亚的蠢货竟敢宣布独立并试图脱离德国，甚至向奥地利寻求支持。我们绝不能容忍这些叛徒继续掌权，任何犹豫都将让他们坐大，毒害国民思想，最终导致国家倾覆。"
 GER_radacalize_the_masses: "煽动群众"
 GER_radacalize_the_masses_desc: "自1945年以来，我国民众长期奉行和平主义，普遍排斥“大德意志”理念。但时移势易，国家危亡之际，无数遭前政府背弃的德国民众正转向我们。必须抓住这天赐良机，既扩大支持基础，更巩固革命政权根基。"
 GER_eternal_alliance: "铸造永久联盟"
 GER_eternal_alliance_desc: "显然，单凭我们难以战胜苏联。随着西欧从腐败官僚手中解放，诸多民族主义政府从战乱中崛起，这为我们提供了绝佳契机以组建同盟抗击红色威胁，将其彻底消灭。"
 GER_assist_our_greek_brothers: "援助希腊兄弟"
 GER_assist_our_greek_brothers_desc: "欧陆战争结束后，希腊同样未能幸免于血腥冲突。两大势力崛起争夺政权，其中“金色黎明”正积极寻求与我方解梦。与德国命运相似，该组织数十年来饱受雅典官僚集团压制，如今终于迎来推翻腐败傀儡政权的契机。\n\n希腊将成为极具价值的盟友，通过在南方开辟第二战线，我们将对苏联形成夹击之势，彻底压垮这个红色帝国。"
 GER_fall_orange: "§Y奥兰治行动§!"
 GER_fall_orange_desc: "低地国家在欧陆战争结束后，也未能幸免于血腥冲突的洗礼。\n\n其中，一个名为泛低地社会主义阵线的势力尤为引人注目，其妄图统一低地诸国。倘若他们得逞，苏联必将借此在德国后方开辟新战线——这对我国安全构成致命威胁。\n\n故此，我们当机立断：必须出兵干预比荷卢地区，建立实际控制，将共产主义扼杀在帝国后院。"
 GER_support_nationalists: "支持泛欧民族主义者"
 GER_support_nationalists_desc: "自欧陆战争结束以来，多国陷入动荡，民族主义政府纷纷掌权。这些国家大多处境艰难，极易被东方红色巨兽吞噬。因此，我们必须主动伸出援手，通过缔结盟约不断壮大反共阵营。"
 GER_recruit_foreign_legions: "招募外籍军团"
 GER_recruit_foreign_legions_desc: "在各大社交媒体平台上，来自多个欧洲国家的热情志愿者日益增多，他们纷纷表示愿为我们伟大祖国的国防建设贡献力量。这般踊跃的外援浪潮实属难得机遇，不容错失。这些志愿者可快速编入我国生产建设队伍以夯实工业基础，或配置至军队基层承担关键辅助与后勤保障任务。"
 GER_fall_kolettis: "§Y科莱提斯行动§!"
 GER_fall_kolettis_desc: ""
 GER_revive_the_economy: "振兴经济"
 GER_revive_the_economy_desc: "当共产主义者在纵情享乐中欢庆胜利时，我们将以世界前所未见的军事化浪潮回应失败。每一个健壮的德意志人——连同那些曾榨干我们福利体系的移民——都将投身于新德国的建设。从男人到女人，从青年到老者，无人能够置身事外。我们的工厂将燃烧得比以往任何时候都更加炽热，当硝烟笼罩我们的钢铁城市时，敌人终将醒悟——这场战争远未结束。"
 GER_drop_the_euro: "弃用欧元"
 GER_drop_the_euro_desc: "欧洲共同货币——欧元。曾几何时，这听起来多么乌托邦！整个大陆的国家齐心协力，追求前所未有的经济奇迹！可结果呢？我们对东方发展的投资如今滋养着敌人，而西方邻国却把时间浪费在莫名其妙的事情上，对“团结”二字毫不在意。受够了！我们要重拾久违的货币主权——就从德意志马克的荣耀回归开始。"
 GER_spirit_of_clauswitz: "克劳塞维茨之魂"
 GER_spirit_of_clauswitz_desc: "纵观我军史册，虽战术层出不穷，却无一人能及克劳塞维茨之韬略。正是他的战略智慧，曾将普鲁士从拿破仑的魔掌中拯救；而今，亦将指引我们摆脱苏联的威胁。\n\n我们必须活用他关于战争迷雾与精神力量的论述，确保将士斗志永不衰竭。其军事哲学应成为所有将领的必修课。唯有如此，方能锻造出英勇善战的指挥体系。\n\n当然，我们不会全盘照搬其战术，而是根据现代战场的技术现实加以改良。这套体系或许研发艰难，但一旦成型，我们的战略理论必将让敌人溃逃至乌拉尔山以东！"
 GER_spirit_of_bruchmuller: "布吕赫穆勒之魂"
 GER_spirit_of_bruchmuller_desc: "若要用一个词来概括19世纪末至20世纪初我们的军事战略，那必是——“榴弹炮！”。正是这压倒性的火力优势，让我们在对丹麦人、法国人乃至背信弃义的协约国集团取得无数胜利。当然，炮兵部队的荣光属于全体将士，但若非要致敬某位战术大师，那必是布吕赫穆勒。\n\n这位天才彻底革新了一战期间的炮兵战术，将漫长单调的炮击转变为短促、精密且高强度的打击艺术。其理论不仅在东西两线所向披靡，更为后来的闪电战战术奠定基础。\n\n因此，我们自然要全力发展导弹部队与火力投射能力。一切只为确保：通过精准协调的短促打击，将敌军阵地连同防御意志一并摧毁！"
 GER_spirit_of_rommel: "隆美尔之魂"
 GER_spirit_of_rommel_desc: "毫无疑问，若论战后数十年来最能彰显我军战略智慧的战术，则非闪电战莫属。正是凭借快速、凌厉而灵活的机动包抄，我们往往兵不血刃便瓦解敌军，由此铸就了在欧洲大陆的绝对霸权——从埃及的英军到东线的苏军，无不几近全面溃败。\n\n然而，由于盟军与我方的某些失误，最终导致我们向同盟国投降，蒙受屈辱。这一次，我们定当吸取教训，确保把握这第二次机会。\n\n多亏沙漠之狐的天才指挥，让英属北非近乎陷落。我们将以其为楷模，精通诸兵种协同战术，发挥主动性与临机应变能力，确保敌人永无胜我之日。"
 GER_panzerpioneers: "装甲先锋"
 GER_panzerpioneers_desc: "在我们的装甲师中，坦克当然是其核心所在。然而，那些不在坦克里、却确保坦克准时抵达战场的工兵同样不可或缺。这些部队专门受训，以协助装甲部队突破障碍、工事和可能延缓或阻断推进的不良地形，在第二次世界大战中发挥了关键作用，在这场战争中亦将继续扮演同样重要的角色。\n\n这些士兵将接受桥梁搭建、爆破、扫雷、攻坚等训练，负责攻占坦克无法触及的防御据点，并清理前线后方残留的漏网之鱼。至于那些漏网之鱼，我们的火焰喷射器自会处理妥当。"
 GER_fall_rache: "§Y复仇行动§!"
 GER_fall_rache_desc: "我们多年磨剑，只为此刻。长久以来，我们压抑着仇恨，在岁月中将其淬炼得愈发锋利。而今，是时候让这仇恨如洪流般碾碎敌军了。复仇的时刻已然来临。为了欧洲的未来而复仇，一个摆脱共产主义与全球主义的未来，一个充满解脱与主权荣光的未来。\n\n是时候用鲜血偿还赤色分子对东欧诸民族的摧残了。这些曾经的勇武之民，如今竟被懦夫踩在脚下。但这一切即将终结。我们的复仇之师将兵临莫斯科，而仇恨之火将点燃我们的战意。"
 GER_unternehmen_michael: "§Y米夏埃尔行动§!"
 GER_unternehmen_michael_desc: "欲向苏联挥动复仇之剑，我们须先击溃横亘其间的赤色傀儡政权：波兰。这片饱受俄国铁蹄蹂躏的土地，终将迎来自由之光的照耀。\n\n然而前路绝非坦途。凡尔赛匪帮窃取的德意志故土，战后必须即刻收复并重归日耳曼化。至于波兰领土的最终归属，不妨留待战后定夺。眼下，该让我们的轰炸机群给几座城市问好了。"
 GER_fall_johan: "§Y约翰行动§!"
 GER_fall_johan_desc: "尽管北欧国家幸免于西欧的毁灭性战火，但其经济已然崩溃。这些地广人稀的区域蕴藏巨大战略价值：瑞典将成为我们进军波罗的海的关键两栖作战基地，而挪威则能在摩尔曼斯克附近开辟北方战线，这是施压苏联防线的要害所在。我们必须迅速行动，若不及早掌控北欧，它们恐将落入苏联势力范围。"
 GER_strong_arm_the_north: "胁迫北境"
 GER_strong_arm_the_north_desc: ""
 GER_the_final_option: "最后选择"
 GER_the_final_option_desc: "我们所做的一切都失败了。我们辜负了德国，辜负了欧洲，辜负了人民。没有什么能把我们从这场灾难中拯救出来。剩下的只有……§R把他们都拖下水……§!"
 GER_bitter_lessons_from_nato_war: "欧陆战争的苦涩教训"
 GER_bitter_lessons_from_nato_war_desc: "有些教训，我们总不忍心让后代知晓。比如曾经的短视如何招致灭顶之灾，让冷酷的斯拉夫人肆意掠夺我们的家园。但即便事实痛彻心扉，我们也必须直面过往以避免重蹈覆辙。前任政府根本不懂战争的真谛，当士兵们在边疆浴血抵御游荡的布尔什维克时，那些官僚还沉溺在道德幻想与公文往来之中。\n\n让我们检视他们的失误，剖析教训，思考改进之道，然后亲手践行，比过去或未来的任何政府都更能代表欧洲人民的意志。我们深知这份伤痛，也必将确保历史不再重演。至少，不再降临在我们身上。"
 GER_armor_innovations: "装甲科技创新"
 GER_armor_innovations_desc: "装甲洪流始终是我们决胜疆场的关键，二战期间与欧陆战争如此，如今亦然。为此，我们将倾注巨资支持所有参与坦克研发制造的科学家与企业，确保这些钢铁巨兽能在敌人喊出“全世界无产者联合起来”前，就把他们碾回莫斯科老家。"
 GER_strategic_destruction: "战略破坏学说"
 GER_strategic_destruction_desc: "消灭敌军有生力量固然重要，但我们必须认识到战争远不止于此，真正决定胜负的往往在战线后方。因此，我们不仅要打击前线部队，更要摧毁其后方支援体系。士兵需要农场攻击粮食、工厂生产武器、机构传达命令。空军将全力打击所有这些战争命脉，直至其社会运转瘫痪。从工厂到发电站，从指挥控制到交通枢纽，一切支点都将灰飞烟灭。当后勤网络彻底瓦解，敌军终将饥肠辘辘，溃不成军。"
 GER_blot_out_the_skies: "机群蔽空"
 GER_blot_out_the_skies_desc: "现代空战是还不留情、绝无宽恕的生死场。我们的空军战略必须直面这一残酷现实。德意志空军将以饱和式攻击覆盖苍穹，全力歼灭敌方空中力量。但这绝非仅针对战斗机或战术轰炸机，凡属敌方的飞行器，无论是运输机、民航客机还是尖端新一代战机，皆为战争机器的一部分，必须彻底摧毁。对飞行员而言，准则讲极其简明：无论目标形态、大小、型号或乘员身份，锁定即击落。"
 GER_restructure_air_doctrine: "重塑空军学说"
 GER_restructure_air_doctrine_desc: "自上次空军条令更新以来，空战模式已发生翻天覆地的变化。新技术、新战术乃至全新作战理念成为行业标准，而我们却长期落后。但此刻，正是让德国空军重攀巅峰之时。我们将全面修订作战条令，汲取近期冲突的经验教训，对军官团实施新式战法培训。这或许会触动空军保守派的神经，却是迈向强大的必由之路。很快，我们的空军将在理论与实践上都引领潮流。"
 GER_restore_luftwaffe_pride: "复兴德国空军"
 GER_restore_luftwaffe_pride_desc: "德意志空军曾令欧洲闻风丧胆，这绝非偶然。二战前半程，我们才华横溢的飞行员与强悍战机所向披靡，将诸多不可一世的强国斩落马下。如今必须重燃这份传奇，每个空军基地都将传颂昔日荣光，每名飞行员都要铭记英雄遗产。当铁十字徽章再度遮天蔽日之时，德意志之敌必将颤栗。"
 GER_solidify_control: "巩固我们的控制"
 GER_solidify_control_desc: "纵使我们已执掌国家权柄，叛徒与蛀虫仍潜伏在帝国的每个角落。但我们绝不会坐视这些宵小之徒暗中勾结。所有煽动者与敌对分子都将被揪出并清除。我们将挖出每个阴谋者，摧毁每条联络网，碾碎任何胆敢挑战我们正统统治的抵抗势力。正如第三帝国令人闻风丧胆的党卫队保安处，我们将对这些叛徒施以无声而迅捷的恐怖惩戒，让他们永远瑟缩在阴影之中。"
 GER_triumph_of_will: "意志的胜利"
 GER_triumph_of_will_desc: ""
 GER_propagandize_our_success: "宣传我们的胜利"
 GER_propagandize_our_success_desc: "正如昔日民族社会主义者所为，我们将强制媒体全天候报道战事动态。当然，真相必须加以修饰。他们只能歌颂前线捷报频传，但凡遭遇挫败，便要大肆渲染将士们为抵御苏联洪流而壮烈殉国的英勇事迹。\n\n毕竟，纵使前线歼敌百万，若国内骚乱不息，和平终是泡影。国家稳定乃胜利之基。尽管长远来看代价不菲，但非常时期当用非常手段。肃清内患，刻不容缓。"
 GER_unternehmen_prag: "§Y胡斯行动§!"
 GER_unternehmen_prag_desc: "若论捷克民族之祸首，非扬·胡斯莫属。正是他宣扬摆脱德意志影响的强大波西米亚之妄念，滋生出与吾等利益相悖的民族认同。若非此人，捷克人或能与德意志同胞共享太平。\n\n故欲涤荡欧洲版图此污点，须以雷霆之势行动。我们将控制其人口重镇，剿灭一切捷克文化印记。此举既可自南翼包抄波兰，待其民族融入德意志社会后，亦属造福苍生。"
 GER_suffocate_russia: "系统性开发"
 GER_suffocate_russia_desc: "战时非常，人人自危。欲取胜局，必行非常之策。纵使国际社会冠以“不人道”之恶名，又何足挂齿？不如此，则恐沦苏联铁蹄之下。\n\n故而，凡俘获之民，皆须强制劳役。无论男女老幼，但凡能劳作者，皆不得以孱弱为由安享闲适。彼等当为祖国，亦为其自身福祉而辛勤劳作。毕竟，劳动带来自由。"
 GER_establish_russian_liberation_army: "成立俄罗斯解放军"
 GER_establish_russian_liberation_army_desc: "俄罗斯幅员辽阔，孕育了许多伟大的民族。可悲的是，这些优秀民族在庞大的俄罗斯整体中却沦为少数。正因如此，二战期间才会出现由俄军中持不同政见者组成的俄罗斯解放军——他们曾与我们并肩作战。如今，我们必须再现这一历史。\n\n哪怕在寡头统治时期，俄罗斯内部就已存在大量异见者。而随着布尔什维克主义卷土重来，该群体的规模正在急剧扩大。我们将为这些战士组建特别旅团，赋予他们真正的战斗意义。不是为共产主义赴死，而是为祖国母亲而战。"
 GER_nullify_our_debts: "废除债务"
 GER_nullify_our_debts_desc: "美洲已成废墟，亚洲战火频仍，俄罗斯不过是一头即将驯服的困兽。而在这乱世之中，竟还要德意志劳工向它们称臣纳贡？我们绝不会再被先辈铸造的经济枷锁束缚，更不会浪费一分一毫去偿还那些终将流入失败政权与死敌金库的债务！"
 GER_regulate_inflation_rates: "调控通胀率"
 GER_regulate_inflation_rates_desc: "我们本不愿干预供需机制的精密齿轮——尤其在我国生产规模如此恢弘之时。然则，岂能坐视一战后的恶性通胀幽灵重现？断无可能！我们将如全知之眼监察经济，调控关键资源的生产与消费，或限或促，皆由我定。纵使为此增设官僚数千……亦在所不惜。"
 GER_autarky_initiative: "保卫经济主权"
 GER_autarky_initiative_desc: "看看这所谓的现代全球化将世界带向何方——眨眼之间，国际组织土崩瓦解，各国从安居乐业沦落到苟且偷生。就连倾注无数心血的欧盟，也如纸牌屋般轰然倒塌。我们绝不容历史重演。诚然，必要时仍会进口些许稀缺资源，但这一次，我们要重塑经济体系，纵使寰宇倾覆，德意志仍将如定海神针岿然不动。至于我国的工人与士兵？饱食足械，坚若磐石。"
 GER_defend_the_industry: "保护本国工业"
 GER_defend_the_industry_desc: "经济结构的剧变必将招致反弹，我们的军工体系很快将成为众矢之的——不仅是国内破坏分子，更有虎视眈眈的地缘对手。我们必须以铁腕手段守护这些命脉，既要实体防护，更需占领民心。扩编安保部队、升级监控网络只是基础；更要发动全方位的宣传攻势，让每个国民都铭记：这些工厂正是民族存续的搏动心脏。"
 GER_economy_fueld_by_war: "战争驱动经济"
 GER_economy_fueld_by_war_desc: "我们终于挣脱了所有束缚潜能的枷锁。然而可耻的是，尽管难以启齿，我国的资源终究有限。即便倾力投入，工厂仍饱受金属短缺之苦，将领们甚至不敢估算新装甲师团的燃油消耗。正因如此，战争已非负担，而是进步的引擎！每征服一亩土地，每掌控一座农场、工厂与矿山，都将为经济注入新生——因为战争，正是推动我们未来的原动力！"
 GER_der_brand: "烈火"
 GER_der_brand_desc: "火。这燃烧的奇迹曾照亮人类文明。自百万年前我们驯服它以来，方能铸就今日辉煌，甚至将战士送往星辰。然而现实却是：如今我们整个阵营烈焰滔天，城池焚毁之际，民族精魂亦随之燃烧殆尽。\n\n但希望未绝。我们胸中燃烧的怒火，仍可化为战争机器的燃料。唯需行非常之举。虽痛彻骨髓，但为保家国永免劫掠之祸，万死何辞。"
 GER_drive_them_back: "把他们赶回老家"
 GER_drive_them_back_desc: ""
 GER_hunker_down: "布下堡垒"
 GER_hunker_down_desc: "欲以寡击众，必效前人之智。我们须将部队化整为零，据守全国要冲。待敌军自以为远离我军之时，正是我们奇兵突出、歼灭困惑之敌的绝佳战机。\n\n此乃游击战术，往昔曾屡建奇功，今朝吾辈亦当如是。"
 GER_desperate_measures: "孤注一掷"
 GER_desperate_measures_desc: "危急存亡之秋，当行非常之法。而今时局之危，已至绝境。我们早已全民动员，举国经济皆为此战而转。然前线战报如雪片飞来——不够，永远不够。\n\n工厂需要更多血肉机器。但凡双臂尚能活动者，必须日夜不停生产军火。这必将使我们未来付出惨痛代价，但此刻若不榨干这些人，前线的牺牲就将毫无意义。"
 GER_der_krieg: "大战"
 GER_der_krieg_desc: "战争。这个萦绕在德意志人民心头十余年的字眼。只要国家仍有敌人，战争就永远是我们命运的核心。我们曾坚信战争机器能为全线带来甜蜜的胜利，如今这架机器却显露出崩裂的征兆。\n\n尽管用尽战术，苏联仍在不断推进。在这种情况下，我们必须将国民逼至极限。若有人退缩？就让他们看清战争的本质，明白生活在布尔什维克铁蹄下将是何等模样。我们失败过一次，这次绝不会重蹈覆辙。"
 GER_defend_the_cities: "坚守城垒"
 GER_defend_the_cities_desc: "苏维埃的空袭正肆虐我们的城市。固然，我们有血战到底的意志，但在炸弹面前，血肉之躯终归徒劳。因此，我们必须即刻构筑防线。无论前沿还是后方城市，皆要化为铜墙铁壁。前线民众将紧急疏散，转移至相对安全的鲁尔地区。\n\n在那里，我们将把城市打造成现代要塞。所有建筑都将为军用而改造。这片土地的文化遗产或许会因此损毁，但为了国家的伟业，必要的牺牲在所难免。"
 GER_every_man_to_the_front: "全民开赴前线"
 GER_every_man_to_the_front_desc: "前线正陷入双重短缺，不仅缺弹药，更缺填装弹药的士兵。此刻，数百万壮丁却正安享家中太平。诚然，他们正为充实军备库而劳作，但人力短缺同样迫在眉睫。\n\n因此，我们将征召这些男子，遣往前线，配发武器，令其痛击赤匪。固然，这些临时兵员远不及职业军人骁勇，但至少能让更多军靴踏入战场，这也意味着苏维埃人将消耗更多弹药来消灭他们。"
 GER_service_everything: "全员服役"
 GER_service_everything_desc: "作为德意志民族，我们向来崇尚军队质量而非数量。但值此危难之际，万物皆可为刃。纵使我们工人制造的枪械未必每次击发，纵使我们生产的战车更易自爆而非冲锋。军备库存已至危急红线，唯有倾其所有，喂饱战争巨兽。"
 GER_der_tod: "死亡"
 GER_der_tod_desc: "死亡，乃是这世间众生无可逃避的宿命。无论你愿或不愿，凡尘光阴终有尽时。国家与理念，又何尝不是如此？回望征途，对抗拿破仑，鏖战协约国，死斗同盟国。德意志曾在这些战役中一次次倒下，却又几乎每一次都浴火重生，再度执戈而战。\n\n我们或许终将迎来下一次死亡的篇章。若果真如此，便意味着这个民族的宿命就是：攀至辉煌巅峰，旋即在国际社会燃起的烈焰中轰然倾塌。我们绝不容许此等宿命成真。"
 GER_the_old: "老一代"
 GER_the_old_desc: "旧时代的人们已享尽他们的荣光。他们有过自己的人生、传奇与征途，其中多少故事正是为抗击共产主义的腐朽本质而书写。而今，这些老者将成为我们的利器。\n\n老骥犹可燃烽火。他们将以残年余力，助我们将赤潮击退，卫我山河。诚然，他们中许多人连独自行走都力不从心。但铁血丹心未冷，在这存亡之际，战意昂扬便已足够。"
 GER_the_young: "新一代"
 GER_the_young_desc: "德意志的年轻一代。他们的人生画卷方才展开，怀揣梦想，各有所好，但最不可或缺的，当是与我们同燃的那腔反共烈焰。\n\n正是这群青年将助我们赢得战争。每个孩童，其中不少已在我们工厂劳作，都将拾起亲手制造的步枪，奔赴前线。谁在乎他们是否懒散或孱弱？终将淬炼成钢！"
 GER_the_weak: "弱者"
 GER_the_weak_desc: "弱者，向来在我们的视野中无处遁形。毕竟，他们能为集体贡献什么？不过是终日游荡，坐享政府救济，徒增负担罢了。所幸，我们已为此找到完美解法，让他们真正为国家效力的方式。\n\n答案昭然若揭：献出他们的生命。我们将发予步枪，部署防御阵地，勒令其射杀所见之敌。如此简单。纵使迟钝如他们，也该明白——老天，就连老鼠都懂这般道理！"
 GER_new_european_crusade: "新欧洲十字军"
 GER_new_european_crusade_desc: "纵观历史，俄罗斯的侵略行径给欧洲带来的唯有苦难、死亡与毁灭。八十余年前，我们的先辈曾试图铲除来自莫斯科的威胁。尽管功败垂成，但历史如今给了我们第二次机会。今天我们面对的仍是同样的恶势力，它已蔓延至整个欧洲大陆，腐蚀文化、扼杀认同、制造痛苦与破坏。这一切都将在今日终结。\n\n以血脉、意志与使命为纽带，我们将挥师东进，不仅为雪历史之耻，更为锻造一个自立自强、无惧任何威胁的新欧洲。此刻正是直捣黄龙之时，斩野兽之首级，任其腐朽于历史尘埃之中。"
 GER_gun_for_every_hand_tank_for_every_battalion: "人人有枪拿，营营有坦克"
 GER_gun_for_every_hand_tank_for_every_battalion_desc: "前联邦国防军的主要失败之一在于其生产链。坦克、步枪和关键物资的交付被无限拖延，这是资本主义低效和官僚腐败的必然结果。若要将德国军队重建得像希特勒时期那样庞大而强大，我们就必须将生产推向极致，我们的工厂必须日夜运转，为每名士兵生产步枪，为每个营配备坦克。唯有通过全面动员，我们才能真正在即将到来的风暴中生存下来。"
 GER_unleash_our_fury: "倾泻愤怒"
 GER_unleash_our_fury_desc: "我们的仇恨积压已久。即便已用尽手段摧折苏联的意志，仍嫌不足——永远不够！除非亲眼目睹残存的苏联士兵跪地求饶，亲吻我们的军靴乞求活命，否则难消心头之恨。那些因他们而饿殍遍野的欧洲冤魂，岂是几滴鳄鱼眼泪能偿还的？\n\n他们以为自己算什么东西？配得上“人类”二字吗？不，我们绝不承认！是时候释放怒火了——每个与社会主义沾边的杂碎，都要承受千万亡魂的集体审判。倘若地狱当真存在，他们得先尝尝我们亲手打造的炼狱！"
 GER_europa_united: "欧洲统一"
 GER_europa_united_desc: "欧洲。这片美丽的大陆，富饶的大陆，曾是世界无可争议的主宰者。然而短短数年前，这一现实开始动摇——尤其是当苏联人再度洗劫东欧大地之时。\n\n但今日请看清现实：欧洲不再蜷缩一隅，欧洲不再积弱可欺。此刻我们已兵临莫斯科城下，誓要苏联人为其在这片大陆犯下的累累罪行付出代价。这是整个欧洲的生死之战。唯见欧洲团结如铁，屹立不倒，我等方能安枕——只要这片土地尚存一息，此志不渝！"
 GER_crush_the_resistance: "粉碎反抗"
 GER_crush_the_resistance_desc: "欲使占领区固若金汤，必先肃清暗处的同谋与同情者。抵抗战争已在阴影中打响，恐怖分子时而突袭，毁我基建，炸我营垒。他们既想玩这场游戏，我们自当奉陪到底。\n\n他们每杀我一名士兵，我们便随意处决数倍平民。动用燃烧弹洗地、毒气攻击等雷霆手段，亦在所不惜。早该在他们炸毁我方建筑时，就让他们领教何为悔不当初！"
 GER_our_allies_abroad: "海外盟友"
 GER_our_allies_abroad_desc: "诚然，我国乃盟约之核心引擎，然而欧罗巴诸盟友之功亦不可没。法兰西人、意大利人、不列颠人、伊比利亚人——虽各为其族裔认同而战，却仍与我并肩而立。此等情势，当善加利用。\n\n外援从来多多益善。值此战事吃紧之际，我国对各类物资求之若渴。或可向亲密盟友暂借兵械？如此，既可巩固盟谊，又能壮大各自战力，实为一箭双雕之策。"
 GER_improve_logsitic_capabilities: "增强后勤保障能力"
 GER_improve_logsitic_capabilities_desc: "补给，这个曾让欧洲吃尽苦头的字眼。不仅二战时我们初次对苏作战受挫于此，就连拿破仑的雄师也因这场战争演变成的后勤噩梦而功败垂成。\n\n如今我们必须痛定思痛，将后勤保障列为重中之重。不论是依托更完善的基础设施，还是借助人工智能管理，都要确保物资即刻驰援正在俄罗斯腹地苦战的部队。绝不让历史重演！"
 GER_fall_lazarevic: "§Y拉扎列维奇行动§!"
 GER_fall_lazarevic_desc: "波兰与斯洛伐克至今仍是苏联的北方屏障，有效阻断了我们向北突破的任何企图；而匈牙利战区因地形局促，我军同样未采取攻势。然而，铁幕防线仍存致命弱点：南斯拉夫故地建立的苏联傀儡政权，其军力远逊于我方且政局动荡。我们将从此处撕开缺口，同时策动巴尔干民族主义势力，加速其统治体系崩解。取道斯洛文尼亚南下，经希腊直插保加利亚腹地，我们必将推翻索菲亚的非法政权，彻底粉碎苏联对巴尔干的掌控。"
 GER_fall_bassenheim: "§Y巴森海姆行动§!"
 GER_fall_bassenheim_desc: "人类文明罹患恶疾，其名苏维埃。这盘踞欧亚大陆的毒瘤存续过久，每扼杀一条生命，都在摧残人类精神。唯有我们亲施教化，方能拯救这片土地。正如昔日的条顿骑士团，我们将向所有遭犹太-布尔什维克毒素侵蚀者传播真理。\n\n这将是我们最后的斗争。这将是我们最终的进军。让我们长驱直入那摇摇欲坠的苏维埃巨厦，亲眼见证其土崩瓦解。让这人类之癌从我们集体记忆中彻底切除。让我们生活在和平之中。只需这最后一击，只需这场必胜之战。"
 GER_tactical_domination: "战术统治"
 GER_tactical_domination_desc: "切莫用繁复理论与迂回教条自欺欺人，核心目标简明而暴烈：歼灭敌军。任何其他理念都不得喧宾夺主。基于此，空军将聚焦三大杀招：近距离空中支援碾碎敌阵、侦查体系洞穿敌情、精确打击摧毁高价值战术资产。我们要让敌人在我们主宰的苍穹之下，沦为瑟瑟发抖的困兽。"
 GER_return_to_gold_standard: "回归金本位制"
 GER_return_to_gold_standard_desc: "美利坚——这个曾屹立数十年、被视为不可撼动的全球经济霸主——竟在数周内土崩瓦解。石油美元、钢铁雄师、华尔街金融，终究未能挽救其货币命运。我们绝不会重蹈覆辙。必须让国民对明日怀有绝对信心，让他们随时能走进任何银行，将血汗积蓄兑换成沉甸甸的真金白银。至此，我们的货币终将拥有实实在在的分量，而随之恢复的，正是经济稳定所蕴含的无声尊严。"
 GER_suspend_consumer_economy: "抑制消费经济"
 GER_suspend_consumer_economy_desc: "先辈们何其短视，竟沉溺于美国经济时尚的浮光掠影？他们本应巩固边防、补足军备缺口，却选择向市场倾泻数以亿计的消费品——从廉价货到奢侈品——这些华而不实之物除了堆砌报表数字外毫无意义。自今日始，德意志公民将只获得真正的生活必需。效率与必要性，必将取代虚荣与浪费。"
 GER_exploit_conqured_nations: "掠夺被征服者"
 GER_exploit_conqured_nations_desc: ""
 GER_improve_logistic_capabilities: "增强后勤保障能力"
 GER_improve_logistic_capabilities_desc: ""
 GER_wartime_advancements: "战时推进"
 GER_wartime_advancements_desc: "战争从来不只是流血与牺牲，它更能催生民用与军事领域意想不到的技术飞跃。无论是一战还是二战，无数生命的逝去都换来了此前难以想象的科技进步。仿佛我们参与的每场战争、洒下的每滴鲜血，都在推动人类文明的进化。毫无疑问，我们与俄罗斯的战争将比历史上任何冲突都更加残酷，但不必哀伤，因为士兵们的热血终将成为推动人类历史齿轮的燃料。"
 GER_prepare_thenation: "建国准备"
 GER_prepare_thenation_desc: "当不满与动荡席卷欧陆之际，我们洞见了世人罕有的觉悟：战争将至，德意志民族必须严阵以待。我们将唤起全民抗战意志，男子编入预备役，妇女动员支援后方，城市要塞化以抵御攻击，物资实行配给制。昔日让民众沉溺太平、疏于备战的错误，绝不容重演。随之而来的，将是一场全社会彻骨重组的总动员。纵使死亡与毁灭降临，每个德意志人，无论男女老幼，都将以钢铁意志直面命运。"
 GER_revive_the_fallschirmjager: "再造空降猎兵"
 GER_revive_the_fallschirmjager_desc: "毫无疑问，德国曾拥有的最精锐的特种部队中，空降猎兵当属翘楚，仅其名号便足以彰显其特质。他们在战争中策划了德国空军最大胆的作战行动，例如克里特岛战役。\n\n我们将通过重建这支部队来重现其辉煌。这些士兵不仅将成为德国、更是全世界最英勇的战士。他们将接受针对我军先进技术的空降与突击专项训练，成为纪律与进攻性的典范部队。这支劲旅将令敌方领袖闻风丧胆，对其军队造成毁灭性打击，同时赢得敌人的敬畏。"
 GER_convene_the_european_parliament: "召集欧洲议会"
 GER_convene_the_european_parliament_desc: "德意志之魂虽遭重创，却已涅槃重生。随着欧洲党执掌德国权柄，此刻正是将理想付诸行动之时。欧洲议会即将召开——它将成为这个重获新生的主权联盟的立法核心。我们永不再孤军奋战，因为泛欧之梦虽历经风雨，依然生生不息。\n\n今日即是新纪元的破晓。欧洲联邦，此刻诞生！比荷卢三国必将加入我们，不是作为附庸，而是以平等之姿。从今往后，我们将从最惨痛的失败中再度崛起，眼中唯有一个目标：复仇。让俄罗斯人在恐惧中颤抖吧！欧洲已然重生，我们必将血战到底。"
 GER_european_millitarisation: "欧洲军事统一"
 GER_european_millitarisation_desc: "这场战争彻底暴露了旧联盟的致命缺陷：指挥体系支离破碎，作战理念各行其是，最致命的问题是，我们根本没有足够的兵力抵挡钢铁洪流。面对俄罗斯席卷欧洲的战争风暴，我们措手不及。\n\n但昨日之殇已成过往。今日，我们已是铁板一块。将在联盟每个角落征召人类史上最庞大的军团——这支雄师不仅要扼守东方战线，更要将民主的火炬插向世界至暗之地：莫斯科。北极熊以为我们软弱可欺？很快，它就会见识到一个全面动员的欧洲究竟意味着什么。"
 GER_the_duty_of_every_young_man: "青年的职责"
 GER_the_duty_of_every_young_man_desc: "自由的代价，是永恒的警醒。我们绝不做坐视自由消亡的一代，绝不做将东方手足弃于暴政枷锁下的一代。每座倾颓的城郭、每道逾越的红线、每面撕裂的旗帜——都是战斗的号令。\n\n守卫欧洲？不，是解放欧洲！此乃每个公民的天职。安逸的时代已然终结。所有欧洲青年，都当挺身捍卫这片受困的大陆。再无借口，亦无豁免。征兵不再是政策，而是使命。欧罗巴绝不会再次沦陷——只要她的子嗣依然屹立。"
 GER_an_economy_of_war: "经济战"
 GER_an_economy_of_war_desc: "我们曾向人民许诺和平、繁荣与福利社会的安逸。但如今，和平与繁荣已成奢望。自满的时代，至少在眼下必须终结。若要抵御东方的威胁，每一座工厂、每一名工人、每一份资源都必须为战争服务。\n\n这不是总体战的复辟，而是它的进化。我们锻造的战争经济不仅为了防御，更为了主宰。昔日和平工业的嗡鸣，将化作整片大陆武装到牙齿的怒吼。俄罗斯将目睹我们的回应：不在演说辞令中，而在钢铁洪流里。"
 GER_war_rationing: "战时配给"
 GER_war_rationing_desc: "紧缩政策虽无荣光，却能铸就力量。要武装百万雄师、驱动千辆铁骑、维持庞大的战争机器，暂时的牺牲在所难免。后方民众必须勒紧裤腰带，以供养前线将士。这不是剥削，而是淬炼。而战争，向来由钢铁般的纪律赢得。"
 GER_million_man_army: "百万大军"
 GER_million_man_army_desc: "百万雄师正行进在欧洲十二星旗之下。这支大军规模空前，却因缺乏统一意志而脆弱不堪。上一场战争中，我们败不在勇气，而在凝聚力。语言相抵、教条相左，亟需团结之处反生乱象。今时今日，我们绝不再蹈覆辙。昔日民族国家的高阶指挥部，必须归于一统。欧洲最杰出的将帅们，如今将以同一种语言发号施令。这头雄狮终将睁开双眼，明察猎物所在。"
 GER_fortress_europa: "欧洲堡垒"
 GER_fortress_europa_desc: "从首度战败的余烬中，欧洲最高统帅部淬炼出全新的防御方略：欧洲堡垒。我们从此摒弃外交幻想，让钢筋水泥代我们发言。自波罗的海至地中海，铁幕将垂天而降，此非为囚笼，实乃民主之盾。\n\n然而防御工事岂止于碉堡？整个社会必须为可能持续数月乃至数年的战争做好准备。每个公民、每座工厂，都须为捍卫欧洲秩序而战。欧洲终将成为铜墙铁壁的堡垒，而自由之火，永耀其心。"
 GER_aggressive_realpolitk: "激进现实政治"
 GER_aggressive_realpolitk_desc: "俄罗斯的铁蹄踏碎国界，掀起滔天乱潮。从伊比利亚半岛的无政府状态到巴黎街垒，联盟虽遍体鳞伤却一息尚存。当盟国分崩离析之际，联邦化的宏图被迫搁浅。但我们绝不会任其夭折。\n\n使命昭然若揭：重整法治秩序，再铸欧洲统一，让联盟子民重归旗帜之下。我们将伸出橄榄枝，若遭拒斥，则必以铁拳回敬。当今世道已无宽宥，欧洲欲存，唯以扩张。若信任无法缔结团结，便用现实政治的熔炉锻造。锐利、冷酷、势不可挡。"
 GER_intergrate_west_poland: "整合西波兰"
 GER_intergrate_west_poland_desc: "波兰在俄罗斯的利刃下一分为二，但并非全境沦陷。在梅德韦杰夫血腥征服的阴影下，波兰共和国仍在波兹南维系着流亡政权。与此同时，西里西亚也趁机获得了独立，终于摆脱莫斯科与布鲁塞尔的双重桎梏。集安组织未能斩草除根，但我们会的。\n\n这些国家如今将目光投向了西方。我们给予他们的不仅是生存的机会，更是崇高的使命，让他们融入比自身更伟大的存在。没有他们，欧洲就不完整；而没有我们，他们终将成为猎物。"
 GER_secure_scandinavia: "保卫斯堪的纳维亚"
 GER_secure_scandinavia_desc: "在上一次战争中，北欧诸国孤立无援。挪威与俄罗斯之间狭窄的边界使我们未能在北方开辟战线。但未来将带来新的机遇。若瑞典、丹麦，乃至芬兰加入我们的阵营，一条崭新的北方战线便将成型。这条战线不仅能扼住俄罗斯的北极生命线，更将使圣彼得堡笼罩在漫长的战略阴影之下。\n\n但这不仅关乎战争，更关乎团结。北欧民族长期游离于欧洲事务之外，现在我们将赋予他们安全保障与战略价值。至少现阶段，我们不会强迫他们做出选择。但请记住：斯堪的纳维亚终将融入我们的事业。这既是为了他们，也是为了我们自己。"
 GER_secure_central_european_democracy: "捍卫中欧民主"
 GER_secure_central_european_democracy_desc: "捷克人曾站在暴政的边缘，在俄罗斯进军的阴影下岌岌可危，所幸我们在其陷落前实现了和平。但骑墙观望的时代已经终结。中欧绝不会继续充当东西方之间的政治缓冲带；无论情愿与否，捷克都将被纳入我们的阵营。\n\n至于奥地利，这个国家始终躲在它那引以为豪的中立宣言之后。他们确实身在欧盟，可当《里斯本条约》第五条的集体防御机制面临实战考验时，他们却置若罔闻。这一次，他们要么与我们并肩而立，要么被历史所抛弃。"
 GER_balkan_intervention: "干预巴尔干"
 GER_balkan_intervention_desc: "巴尔干地区爆发的微型战争，观之如观镜。塞尔维亚先是包围了较小的邻国，再入侵了克罗地亚和斯洛文尼亚，以南斯拉夫之名实行塞尔维亚民族主义。那里的人民，也就是欧洲人，必须把他们从塞尔维亚法西斯手里解放出来。"
 GER_russias_soft_underbelly: "俄罗斯的软肋"
 GER_russias_soft_underbelly_desc: ""
 GER_war_plan_black: "黑色战争计划"
 GER_war_plan_black_desc: "我们为迎接即将到来的风暴所做的准备堪称面面俱到：完善后勤体系、巩固同盟关系、动员后备力量、武装军队与人民。然而万事俱备，唯缺最关键的一环，我们必须制定一项前所未有的周密行动计划。我们将召集德国将领及盟军最高指挥官，共同拟定这份史无前例的详尽方案。每一个应对措施、每一个决策节点、每一个行动步骤、每一种可能情景、每一套应急预案，都将被纳入这张天罗地网般的战略蓝图。当决战时刻来临，从将帅到士兵都将各司其职。纵使政府内部有人指责我们过度戒备或多疑妄想，我们的终极目标始终清晰。\n\n德意志已严阵以待。欧洲已枕戈待旦。"
 GER_reset_european_economies: "欧洲经济洗牌"
 GER_reset_european_economies_desc: "长久以来，旧世界的无能之辈腐蚀了全球经济理论的精妙之处，随之造就了欧洲战败的恶果。从社会民主主义到福利国家，政府对经济的干预实在过多。早在我们掌权之前，经济务实主义在欧洲就已消亡殆尽。但如今欧洲尽在掌控之中，终于能推行我们梦寐以求的政策。我们必须回归经济理论的核心根基，焚尽一切曾经阻碍欧洲发展的虚浮累赘。只有这样，才能将欧洲推向前所未见的高度。"
 GER_national_corporatism: "后资本主义转型"
 GER_national_corporatism_desc: "现行体系已被证明效率低下、失衡失序，最关键的是——完全不可持续。再来一次类似危机，整个体系就会崩溃，我们将彻底失控。我们应当借鉴克劳斯·施瓦布和世界经济论坛的理念，推动欧洲经济向更高形态转型。"
 GER_nationalize_key_industries: "开启日本化"
 GER_nationalize_key_industries_desc: "尽管许多人都明白向可持续体系转型的必要性，但很少有人真正了解这将如何呈现以及需要付出什么代价。对此，发达国家不妨参考日本近期的经历。从上世纪90年代到2010年代，日本从一个蓬勃发展的技术驱动型经济体，陷入了近乎永久的停滞，所谓的“生活水平”急剧下降。这堪称实现零增长的绝佳案例，也展示了人类如何适应这种状态。"
 GER_promote_state_owned_enterprise: "制定新社会保障标准"
 GER_promote_state_owned_enterprise_desc: "随着旧体系瓦解，那些束缚人性的社会经济规范也将消逝。当新经济形态确立时，这种不容个人野心与自私存活的形态自然会摒弃传统的价值观、偏见、信仰与旧观念。租赁而非占有，缺乏长期经济社会联系的生活方式将成为新常态，与之相伴的道德伦理也将革新，最终催生全新体系。"
 GER_strengthen_transnational_institutions: "赋权跨国企业"
 GER_strengthen_transnational_institutions_desc: "跨国企业是数十年来推动经济发展的中流砥柱，其效率、务实性与影响力远非任何国内企业可比。我们必须像世界经济论坛始终作为国际合作协调平台那样，不遗余力地支持维护这些跨国企业。"
 GER_concessions_to_the_oligarchs: "引领时代潮流"
 GER_concessions_to_the_oligarchs_desc: "在这个数字化的新时代，人们无时无刻不在参与经济活动却浑然不觉：互联网让你永远处于寻找商品-购买商品-浏览广告的循环中。如今随着VR和AR头显乃至脑机芯片的普及，人们比以往更深陷其中。\n\n因此，我们自然要全力投身数字世界，并推动民众进一步融入，直至现实与虚拟的界限彻底消失。只有这样，数字经济才能带来长远效益。"
 GER_implement_corporate_governance: "贯彻企业治理"
 GER_implement_corporate_governance_desc: "治企如治国，治国如治企。二者之差，不过规模而已。国家无非是更大的企业，雇员更多，客户群更广，市场份额更大。总统即是首席执行官，需要为国家利润殚精竭虑；部长们不过是部门总监，各司其职。全体雇员与管理层戮力同心，只为服务我们的核心客户群体——国民。旧时代我们被僵化的政治信条所束缚，而在这场大重构中，国民总收入与增长率必将昭示世界渴求的新理性主义。"
 GER_promote_enviromental_social_governance: "财富等级制度"
 GER_promote_enviromental_social_governance_desc: "衡量一个人的价值标准是什么？是金钱？权力？社会地位？事实上，这些要素都相互关联、缺一不可。显然，如果一个人能够积累巨额财富或获得崇高社会地位，那他在某些方面必定有过人之处。如果一个人能摆脱道德束缚，让理性和利润成为行动指南，那他就已经超越了绝大多数人。几十年来，人类社会始终遵循着这样的法则。说到底，难道不该让最有能力和野心的人来主导社会吗？"
 GER_shareholder_democracy: "股东民主"
 GER_shareholder_democracy_desc: "民族主权与代议制民主的时代已走向终结——留下的只有分裂、腐败与衰败。所谓民治的幻象，不过是为蝇营狗苟的官僚赋权，这些人的忠诚从不属于人民，只忠于自己的钱袋，或更糟——忠于我们的敌手。\n\n在新的欧洲秩序中，容不得多愁善感的理想。我们最高权力机构——欧洲议会的席位，将分配给那些确有能力塑造未来的人：跨国企业的执行官、国防与生物科技财团的董事，以及经过认证的知识精英。\n\n每位成员必须购入他们所参与治理的体系股份，确保其忠诚不源于意识形态，而是一纸契约——法律将他们绑定于所效力的机器。\n\n贪婪。效率。远见。这些不再是恶德，而是稳定世界的支柱。让民众继续活在幻梦中吧，现实由我们掌控。"
 GER_reconstruct_european_cities: "重建欧洲城市"
 GER_reconstruct_european_cities_desc: "当俄罗斯人到来时，他们为我们带来了审判之火与重生之火。平心而论，当时的欧洲已沦为污浊之地。这片被分裂思想与狭隘民族主义割裂的大陆，同胞手足相残。我们不仅在技术领域落后于国际竞争者，更致命的是民族精神的萎靡，这最终导致了我们的失败。我们将一砖一瓦重建家园，在废墟之上浴火重生。这些灰烬必将孕育新的黄金时代，一个没有边界、永无止境的辉煌纪元。"
 GER_rentier_based_economy: "减少国家参与"
 GER_rentier_based_economy_desc: "政府为何要干预市场？市场自有其平衡之道，如同阴阳相生相克，始终推动着社会形态演变与文明进步。而国家体制往往成为发展的绊脚石。那些繁文缛节束缚了我们的发展空间，扼杀了创新勇气与变革渴望。在这浴火重生的新欧洲，文书和职员将退场。世界属于你们，属于每一位敢为人先的开拓者与远见卓识的梦想家。"
 GER_state_capitalism: "更负责任的制度"
 GER_state_capitalism_desc: "肆意挥霍的时代已然终结。我们缔结了一份全新的社会契约，建立更公平的财富再分配体系，既能守护生态环境，又可增强全球经济韧性，以应对未来的种种挑战。\n\n当然，这离不开每位公民的积极参与。在近期欧洲经济动荡，包括我们对俄战事失利的冲击下，许多人已失去非必要的过剩资产；而更多觉悟者则主动放弃奢侈，选择简约可持续的生活方式，因为他们深知：未来经济格局中，奢靡之风再无容身之处。\n\n尽管这与过往任何历史经验都截然不同，但“少即是多”正成为推动创新与社会变革的核心动力。"
 GER_responsible_capitalism: "技术官僚共生"
 GER_responsible_capitalism_desc: "长久以来，我们让各类专业人士跨界治理社会各领域，却忽视了其专业特长相匹配的重要性。这种做法只会导致社会停滞不前，让推动社会运转的齿轮生锈、机器发出杂音。如果人才不得其用，何谈其价值？如果专长错配领域，怎会见其成效？通过将技术专才与政府体系深度融合，欧洲必将势不可挡。我们的科技将攀升至前所未见的高度，而我们将成为“未来”二字的终极诠释。"
 GER_fourth_industrial_revolution: "第四次工业革命"
 GER_fourth_industrial_revolution_desc: "“第四次工业革命不仅改变我们的生产方式，更在重塑人类本质。作为个体，我们将面临全方位的深刻变革——从隐私观念、财产认知、消费行为等身份认同维度，到工作休闲的时间分配、职业发展路径与技能提升方式；从人际交往模式与社会关系构建，到赖以生存的社会阶层结构与健康管理理念。更令人深思的是，其发展速度或将远超预期，人体增强技术可能迫使我们对‘人之所以为人’的根本命题进行重新审视。”\n\n——克劳斯·施瓦布"
 GER_the_techno_utopian_ideal: "技术乌托邦之梦"
 GER_the_techno_utopian_ideal_desc: "欧洲之梦已不再是过时的民族主义幻想，而是一座流光溢彩的进步之塔。这片大陆将因共同使命而团结，由专家引领，挣脱陈旧枷锁。战争印证了一个铁律：自由主义民主必须即刻进化，否则明日就将消亡。\n\n欧洲党所构想的，是一个建立在数字治理、协作与进步之上的大陆复兴。新欧洲的边界不由疆域划定，而由进步标定。摆脱那些阻碍团结的妥协与陈腐制度，我们将开辟通往繁荣、自由与启蒙的新航路。欧洲的未来不在无休止的争论或地域自豪感中，而在于洞悉现实与未来的决策者所制定的政策。"
 GER_freedom_isnt_free: "自由非无价"
 GER_freedom_isnt_free_desc: "每一次变革都需付出代价。若要将新欧洲铸造成进步与自由的灯塔，我们必须直面残酷现实。纵观历史，牺牲本就是转型的必然代价。有人会斥之为反民主，甚至污名化为反乌托邦；但这些庸众全然不解欧洲党宏图的真正尺度。在这个暴君横行的世界，旧有的“自由”与“民主”定义早已失效。\n\n真正的自由，更意味着免于奴役的自由。若为此必须收紧掌控，那便如此。目的自会证明手段的正当，而我们矢志不渝的终点：便是自由。"
 GER_weaken_regional_nationalism: "削弱地区本位主义"
 GER_weaken_regional_nationalism_desc: "要铸就新欧洲，必先拆解旧秩序。那些曾令我们引以为豪的地域身份认同，如今已成为反动者与破坏者的温床。就在此刻，民族主义抵抗势力仍在动摇联邦政府的合法性，阻挠进步的步伐。\n\n通过媒体监管与对地方主义思潮的渐进消解，我们将从内部瓦解“民族国家”这一迷思。动荡与反弹在所难免，但待尘埃落定之时，欧洲必将以更挺拔的姿态屹立，既摆脱民族主义的幽灵，又比历史上任何时刻都更接近大陆一体化的理想。"
 GER_concessions_to_the_tech_giants: "让步科技巨头"
 GER_concessions_to_the_tech_giants_desc: "当今时代的霸权，不再以坦克或战机衡量，而取决于对信息的掌控。21世纪的战场是数字化的，高地早已被那些建造并控制它的人所占据。我们本可以与之对抗，甚至将其收归国有。但此刻如此行事，无异于自取灭亡。\n\n于是我们达成交易：这边给予税收减免，那边放松监管条款。作为回报，他们的服务器为我们嗡鸣，算法调谐至民主的频段。这是建立在共同野心之上的脆弱同盟。或许某天，我们能挣脱其桎梏。但在此之前，我们微笑、握手……同时冷眼旁观。他们得到想要的，我们获得必需的。眼下，这便足够。"
 GER_the_corporate_state: "企业之国"
 GER_the_corporate_state_desc: "私营部门已证明其灵活性远胜国家机器。既然如此，治理权为何还要固守这些过时的机构？我们何必畏惧一个行之有效的体系？通过公私合营与欧洲顶尖技术官僚主导的中央计划经济学，我们将开创全新体制。在这里，效率不再是追逐利润的手段，而本身就是繁荣的引擎。\n\n这一未来的设计师之一，正是世界经济论坛主席克劳斯·施瓦布：有人视其为先知，有人斥其为狂徒。他那在部分人眼中激进的思想，已令精英阶层为之倾倒。无论我们接纳其政策还是抵制其癫狂，有一点确凿无疑：倒计时已然开始。"
 GER_secure_european_democracy: "捍卫欧洲民主"
 GER_secure_european_democracy_desc: "我们的民主不仅要存续，更须蓬勃生长。在俄罗斯扩张的余烬中，我们选择了一条截然不同的道路：锻造更强大的民主理想。通过透明执政与不懈的公众参与，我们将在泛欧新体制中建立信任与合法性。我们还将精心培育民主，确保欧洲人民的意志真正体现社会进步、包容与团结的价值观。\n\n谎言止步，破坏终结，反动休矣。在新欧洲，自由将得到捍卫，不仅抵御外部的暴政，更要防范内部的威胁。为了民主的未来，我们必须果敢前行，如同雕琢政策般审慎塑造选民群体。"
 GER_prohibit_subversive_media: "封杀颠覆媒体"
 GER_prohibit_subversive_media_desc: "谎言纵使重复千遍也永无成真之日，却足以在万千民众心中溃烂化脓。东方的敌视政权与境内心怀怨怼的保守势力，正将毒液喷向新生的欧洲。但此番他们的武器并非炸弹子弹，而是精心炮制的叙事陷阱，每一条都只为从内部撕裂欧洲。\n\n我们岂能坐视这般颠覆持续？欧洲内部安全局必将揪出并铲除这些危险谣言的源头。那些伪装成新闻媒体的电视频道，终将被剥夺影响力。用不了多久，欧洲人民必将挣脱外界的操纵枷锁。"
 GER_government_of_national_emergency: "国家紧急状态政府"
 GER_government_of_national_emergency_desc: "过去十年间，世界风云变幻，而我们正立于风暴之眼。东方战火未熄，西方秩序崩塌，内部动荡不休。旧时代的体制过于迟缓，过于理想主义，已无法应对当今时局。\n\n因此我们行动起来。我们构建起必要联盟：中间派、温和派、务实者，那些深明在此危急存亡之秋，联盟绝不能坐以待毙之人。极端分子或将在流放地咆哮，或在铁窗后嘶吼，但他们早已自绝于谈判桌前。但切勿误解：民主制度并未废除，只是为保全自身而暂歇。民众的选票依然重要，只是选择已被精简。如今的赌注比任何时候都更高。从今往后，我们只有一个声音。\n\n秩序必须维持。国家紧急状态尚未终结。"
 GER_old_system_new_form: "旧制度，新形式"
 GER_old_system_new_form_desc: "或有人空谈进步，然值此混沌时世，欧洲人民真正渴求的乃是秩序，是一种承袭自往昔的阶层与传承。战争击碎了理想主义者的迷梦，它昭示着：治国之权当归于历练者与自律者，而非乌合之众或空想家。欧洲党之流沉溺幻梦，其思想焰火终被自身矛盾所熄灭。反观人民党，凭借治政旧共和国的数十年经验，如今浴火重生：不再为其权力假意忏悔，亦不再伪饰平等主义。\n\n任人称之为精英主义，或等级制度，或任何名目。我们将以自身形象重塑欧洲：一个铭记辉煌往昔、敬重贤者、坦然承认非人人皆堪领导重任的欧洲。在现代性的薄纱之下，旧世界正重获新生，其更臻精纯，且毫无愧怍。"
 GER_entrenched_elitism: "坚持精英主义"
 GER_entrenched_elitism_desc: "民主不必沦为无政府，平等无需强求一致。他人徒劳追逐乌托邦，而欧洲将选择秩序。承认有些人更适合治国并非耻辱。那些聪慧者、自律者、成就者，那些在董事会议厅与部委中证明自身价值的人，理应肩负领导之责。他们不是暴君，而是管家；不做君王，只当缔造者。\n\n必须遏制昔日的过激行径。工人不必执掌工厂，稳定源于层级，财富自上而下流淌。让精英崛起，欧洲自当随之腾飞。"
 GER_anti_modernist_revolution: "反现代革命"
 GER_anti_modernist_revolution_desc: "钢铁巨塔刺破云霄，荧光屏幕攥住每只手掌，万千呐喊坠入虚无。而人类的灵魂，正在枯萎。现代世界许诺解放，却只带来无休止的焦虑；承诺知识，却塞给我们后真相；誓言联结所有人，却让我们陷入前所未有的疏离与孤独。我们错把加速当作宿命。\n\n到此为止。这不是倒退，而是一场反叛。反新潮崇拜，反无限进步的塑料意识形态，反历史直线前进的迷思。我们将撕碎这些幻象。我们将重拾有尊严的生活记忆。而在这觉醒中，我们将找到出路：要么超越现代性，要么将其彻底埋葬。"
 GER_european_nationalism: "泛欧民族主义"
 GER_european_nationalism_desc: "民族主义从来都是一柄双刃剑：既是解放的号角，亦为屠戮的借口。但我们必须将其淬炼提纯。旧时代的战争是兄弟阋墙，而新世界的铸就必当以团结为炉，不是消弭身份认同，而是升华至更高境界。\n\n欧洲本就是一个国度。不凭出生，不靠血脉，而因天命使然。从埃伏拉的神秘主义到破碎帝国的未竟之梦，始终贯穿着一条主线：这片大陆对统一的永恒追求。我们并非复活往昔，而是重释历史，将其锻造成未来的武器。犬儒者尽可继续嘲弄这个梦想，异见者非逃即亡。数百年的分裂已告终结，取而代之的是一面冉冉升起的旗帜。\n\n在上帝庇佑下的统一国度，自由与正义永存不灭。"
 GER_codify_social_stratification: "编撰社会阶级"
 GER_codify_social_stratification_desc: "平等主义曾在单纯平和的年代备受推崇，而今却成了沉重的负累。当欧洲在新的联邦体制下走向统一，我们必须回归一切社会与生俱来的秩序：尊重层级划分，按能力分配职责，将雄心引导至最富成效的领域。通过法典、新社会规范与企业架构，我们将筑造一个稳定的文明。不基于主观的公平臆想，而立足于理性的设计。"
 GER_the_managerial_revolution: "管理学革命"
 GER_the_managerial_revolution_desc: "权力曾归于君王，继而归于资本，亦曾短暂托付于民众。但在混沌之后，欧洲选择了新的执剑人：经理人、技术官僚与规划者。他们不为煽动激情而当选，只为治理、协调与指挥而受命。这片大陆已容不得革命的幻想。\n\n这管理型国家既非暴政，亦非旧日认知的自由乐土。这是一份新的社会契约：自由须为必要所节制。牺牲在所难免，但长久以来第一次，牺牲将经由理性裁定。表演型政治至此终结。管理学革命已然发生，只是多数人尚未察觉。"
 GER_the_europe_of_tommorow: "明日欧洲"
 GER_the_europe_of_tommorow_desc: "历经八十载漫漫征程，欧洲梦终成现实。这片大陆不再仅是地理概念或虚幻理想。它已成为一个目标统一、精神同契的国度。泛欧认同的曙光下，狭隘民族主义已被彻底碾碎。旧日旗帜与宿怨，皆在我们共同的命运前化为齑粉。玻璃幕墙摩天大厦林立的都市中，繁荣正蓬勃生长；从里斯本到柏林，创新已成为我们的新边疆。陈规旧制再难束缚雄心壮志，工厂与数据中心的轰鸣里，新欧洲正编织未来图景。\n\n这不再是那个兄弟阋墙、固步自封的旧欧洲。这片大陆属于打破疆界枷锁的远见者。未来已至，而同属于一个声音：欧洲党之声。毕竟，没有欧洲党，就没有新欧洲！"
 GER_the_europe_of_yesterday: "昨日欧洲"
 GER_the_europe_of_yesterday_desc: "历经八十载漫漫征程，欧洲梦终成现实。这片大陆不再仅是地理概念或虚幻理想。它已成为一个目标统一、精神同契的国度。我们的团结不建立在苍白条约或虚伪姿态之上，而是以鲜血与钢铁铸就。我们不仅是这片大陆的治理者，更是其不朽文明的继承者。\n\n我们从未遗忘先辈的荣光。从罗马到法兰克，历代先贤此刻正在天国向我们微笑。在统一欧洲的伟业中，我们唾弃数十年来如影随形的自由主义堕落。我们绝不为此前种种致歉。那些古老帝国正如欧洲历史圣殿的梁柱，永远值得颂扬。这个浅薄的时代曾试图让我们遗忘这一切，但我们记忆犹新。正是从这记忆深处，我们汲取了缔造联盟的烈火，而这联盟必将载入欧洲史册最辉煌的篇章。"
 GER_europe_united_and_strong: "欧罗巴，团结而强大"
 GER_europe_united_and_strong_desc: "千百年来，欧洲曾是一幅马赛克拼图：瑰丽绚烂，却永陷内耗征伐。而今这拼图已在熔炉中重铸，旧日旗帜虽依旧飘扬，其下却跃动着统一的意志与使命。我们迎来的并非太平盛世，而是清算之年。当暴政在全球肆虐、民主大厦将倾之际，唯欧洲岿然不动。纵有千般缺陷，纵需为她浴血奋战，我们依然选择了自由，而非奴役。\n\n这不再是那个分裂、堕落、垂死的旧欧洲。这是一个武装到牙齿、誓要解放东方同胞的新欧洲，一个完成最终政治进化而终不再重蹈覆辙的大洲。让世间暴君睁大眼睛颤抖吧。我们屹立于此，坚不可摧。泛欧罗巴已非幻梦。"
 GER_the_end_of_the_russian_experiment: "俄罗斯实验的终结……"
 GER_the_end_of_the_russian_experiment_desc: "他们竟敢以东欧为棋盘，妄行神明之事。他们将盟国主权践踏于铁蹄之下，企图扼杀欧洲自由民族的意志。每一句谎言、每一个扶植的傀儡政权、每一位遭受压迫的民众，我们都铭记于心。\n\n他们称之为稳定，我们却深知其腐朽本质：这股专制主义的瘟疫正从莫斯科向西蔓延，自华沙直至乌拉尔山脉。我们曾向暴君伸出橄榄枝，给予重建与遗忘百年恩怨的机会。但俄罗斯不能没有敌人；普京与那个疯子梅德韦杰夫，早已将我们塑造成他们最大的宿敌。\n\n就让这次成为他们最后的疯狂吧。我们将一劳永逸地粉碎俄罗斯的野心，让这个帝国重归于史册尘埃，而那才是它应有的归宿。切记：这不是征服，而是解放。"
 GER_bulwark_against_the_russian_menace: "抗俄桥头堡"
 GER_bulwark_against_the_russian_menace_desc: "欧洲已然觉醒。我们不再是各自为政的民族国家联盟，而是在二战以来最惨烈冲突的熔炉中淬炼成钢。当俄罗斯熊罴再度横扫欧陆，焚毁城市、颠覆政权、挑战欧洲统一的存在根基时。旧联盟或许早已分崩离析，而新联盟却岿然不动。\n\n我们的将士不为王侯将相、僭主独夫而战，他们为民主而战。他们是欧洲人民的剑与盾，捍卫着一个永不再向暴君屈膝的未来。分裂的时代已经终结。我们不再是临时拼凑的联军：我们是一支真正的军队。一支军队，一个指挥系统，一个使命：保卫欧洲。"
 GER_project_our_power: "投射力量"
 GER_project_our_power_desc: "千军万马对峙、堑壕纵横的时代已然终结。我们无法，也绝不应当在人力数量上与敌人硬拼。但我们可以用精准打击与协同作战智胜对手、碾压敌军。要击溃俄罗斯的人海战术，就必须打造一支反应更迅猛、打击更凌厉的部队，并掌控每一处战场的制空权。从人工智能驱动的后勤系统，到新一代无人机集群，我们的优势不在于人海，而在于人脑。"
 GER_european_ingenuity: "欧洲智创"
 GER_european_ingenuity_desc: "欧洲大陆从不以模仿者为荣。自凡尔登的堑壕到阿登森林的闪电战，我们的军队始终在变革中浴火重生。上回战败，非因士气萎靡或智谋不足，实乃协同崩坏与教条陈腐所致。但我们已然汲取教训——如今团结一心、众志成城，我们将熔铸各国军事传统，淬炼出真正的欧罗巴战法：既承袭北约经验精髓，更以自身智慧砥砺锋芒。"
 GER_centralized_command: "集中指挥"
 GER_centralized_command_desc: "此前的战败，关键原因在于指挥体系的涣散。我们如同无头苍蝇般盲目碰壁，直到被坍塌的墙体彻底埋葬。如今，通过建立真正高度集中统一的军事指挥系统，我们得以高效协同，击退那头东方巨熊。虽然东方的铜墙铁壁曾让我们吃尽苦头，但此刻，民主国家团结一心，必将一雪前耻、扭转乾坤。"
 GER_dominate_the_skies: "统御天空"
 GER_dominate_the_skies_desc: "下一场战争的胜利，将不再仅由地面部队决定，更取决于苍穹之眼。在上次战争中，俄军战机撕碎我方防线，我军将士为此付出惨痛代价。空军绝不容许重蹈覆辙。我们的工程师与军事理论家将重塑空战形态。通过联合研发、资源整合，以及全联盟对制空权的共同承诺，让任何敌机都不敢觊觎我们的领空。欧洲飞行员将带着压倒性的体系优势翱翔天际，而敌人终将明白：在碧空之下，他们无处遁形。"
 GER_maximize_supply_lines: "补给线效率最大化"
 GER_maximize_supply_lines_desc: "战车的威力，取决于燃油的供给；大军的征途，受制于道路的延伸。数年前，我们曾铸就无坚不摧的铁甲雄师，却眼睁睁看着它们在泥泞中寸步难行。自今日始，后勤将不再是事后方虑的琐务，而是一切胜利的脊梁。向东推进的钢铁洪流，将由高速铁路网络与高效物流体系输送动能。我们铺设的每寸铁轨、修筑的每条道路，都是迈向胜利的坚实足印。"
 GER_metal_on_metal: "合金装备"
 GER_metal_on_metal_desc: "战争的未来不仅取决于苍穹之上的博弈或荧幕背后的较量，更将由钢铁洪流在平原上的怒吼铸就。我们依赖过时的装甲与美式生产线太久了。但从此刻起，坦克将以现代战争矛头之姿重归战场，既是震慑敌胆的凶器，更是决胜千里的利器。我们的工程师深谙此理，将领们渴求已久，而敌人必将闻风丧胆。\n\n我们将锻造专属的战争之矛。融汇各国智慧的新一代主战坦克将冲锋陷阵：德国工艺铸就钢筋铁骨，法国设计赋予灵动身姿，意大利创新点燃引擎之魂。我们的装甲师团不再满足于固守战线，必将摧枯拉朽般碾碎一切阻碍。"
 GER_democracy_falters: "民主大厦飘摇"
 GER_democracy_falters_desc: "何其悲哀\n\n如此至暗时刻，我们竭尽全力阻挡俄军的推进，但却无力回天。防线崩溃的那一刻，混乱便接踵而至。接连的重创之下，东方战线全面沦陷。德国侥幸逃过了最坏的结局，但联盟的整个东部屏障已不复存在。我们与莫斯科之间的缓冲地带彻底消失了。\n\n北约陷入了前所未有的混乱，联盟的团结和公信皆已支离破碎。雪上加霜的是，我们的邻国此刻正深陷内乱的漩涡。\n\n我们已站在悬崖边缘，而和平的幻想已经破灭。"
 GER_embrace_european_unity: "迈向欧洲统一"
 GER_embrace_european_unity_desc: "旧秩序已然崩塌。条约、盟约、担保，一切都在俄罗斯的铁蹄下灰飞烟灭。但这场溃败若让我们领悟到什么，那就是存续之道从不系于单一国家的强权，而在于众志成城。民族主义已不合时宜，分裂更无立锥之地。若德意志还想延续，若我们的价值观在未来岁月仍具意义，就必须构筑超越自身的伟业。唯有戮力同心，方能确保悲剧永不重演。"
 GER_call_emergency_elections: "呼吁紧急选举"
 GER_call_emergency_elections_desc: "民主制度已辜负了德意志。当盟友最需要援手时，政客们的犹豫不决将我们推向了深渊边缘，整个大陆濒临全面崩溃。民众对建制派政党的信任已然粉碎，德意志人民正高声呼唤变革。\n\n随着联邦政府仓促应对、民众对民主制度的信任跌至历史冰点，紧急选举已非选择，而是必然。在这片混乱中，一个政党异军突起：欧洲党，他们承诺改革、开辟新路，最重要的是：实现团结。此刻，全德各大城市的街头都涌动着他们的支持者。\n\n我们正面临前所未有的抉择：要么引领光明，要么堕入黑暗。"
 GER_operation_walesa: "瓦文萨行动"
 GER_operation_walesa_desc: "在欧洲近代史上，我们曾两度失去波兰兄弟，而每次都是苏维埃独裁的铁蹄践踏着他们的家园。俄罗斯人始终垂涎我国肥沃的土壤、丰饶的田野与金色平原。但我们绝不会准许他们窃取本属于我们的的财富，绝不容许其贪婪成为我们的末日。收复波兰走廊后，我们将重建通往波罗的海与乌克兰的陆路通道，为未来解放这些地区铺平道路。"
 GER_utilize_europes_industry: "利用欧洲工业产能"
 GER_utilize_europes_industry_desc: "欧洲是一个人口稠密、高度发达的地区，我们被俄罗斯打败真是一个奇迹，但事后看来，正是我们的价值观阻碍了我们利用我们最明显的优势——我们强大的工业。\n\n在第一次战争中，我们有大量的工厂，但它们生产的是愚蠢的奢侈品、消费品、小饰品、豪华汽车，好吧，我们改变了这一点。我们培育的新兴工业大量生产坦克、炸弹、枪支、飞机，以及战争所需的各种物资，其数量之多是俄罗斯无法想象的。"
 GER_operation_petliura: "彼得留拉行动"
 GER_operation_petliura_desc: "乌克兰高原在俄罗斯的铁蹄下饱经磨难，当第一次战争的硝烟散去，这片土地再度陷入莫斯科的枷锁。而今我军横渡维斯瓦河，解放之日已近在咫尺。哈尔科夫的金色麦浪将重获自由，乌克兰人民终将重见蔚蓝天空。秉承彼得留拉的精神，肩负数万独立烈士的英魂，我们必将胜利，必将一往无前，直至自由的光芒普照大地。"
 GER_war_time_advancements_eu: "推进战线"
 GER_war_time_advancements_eu_desc: "战争孕育创新，每一次死亡都是教训，每一辆损失的车辆能成为研究案例，没有牺牲是徒劳的。一切都是为了事业。"
 GER_sanctify_the_armed_forces: "正当化武装力量"
 GER_sanctify_the_armed_forces_desc: "纵览欧洲千年史册，无数外敌曾妄图奴役我们，将人民践踏在铁蹄之下，使我们在自己的土地上沦为劣等民族。但每一次，我们血脉相连的战士兄弟们都并肩作战，英勇地将侵略者击退。从圣殿骑士到斯巴达重装步兵，命运的丝线早已将我们的血脉交织在一起。欧罗巴的命运掌握在每个欧洲人手中，秉承上帝的意志，我们必将再次赢得胜利。"
 GER_redefine_what_is_european: "欧洲重定义"
 GER_redefine_what_is_european_desc: "欧洲的地理边界理论上直至乌拉尔山脉，但许多欧洲人包括我们国家的公民，跟俄罗斯人几乎没有共情，部分原因在于双方之间历史上几乎持续不断直至现今的战争。而主要原因在于俄罗斯人一直是独裁者的奴隶，每一次都被重新粉饰，他们是误入歧途的典型案例，是走错路的欧洲子民。\n\n当一切尘埃落定之时，让我们仁慈一点，我们将带领他们进入天堂，向他们展示什么是真正的好政府。"
 GER_reeducate_the_liberated_territories: "再教育解放之土"
 GER_reeducate_the_liberated_territories_desc: "从俄罗斯暴政魔爪中解放的部分地区，多年来遭受着奴化教育，被强迫灌输亲俄思想，灵魂与心智早已被玷污。而现在我们肩负使命，要用唯一的真理洗涤这些受创的心灵，向他们讲述其民族的真相、我国的真相、与全体民主欧洲人的真相。他们曾迷失在俄罗斯谎言的汪洋中，如今终于被真正的家人找回。只有我们会毫无保留地守护这些失而复得的兄弟。"
 GER_admit_finland_into_nato: "最后通牒芬兰"
 GER_admit_finland_into_nato_desc: "芬兰，千湖之国、无尽雪原。他们对俄国压迫的理解比任何人都深刻，对俄罗斯侵略的仇恨也比北方雪域任何民族都强烈。先遭沙俄帝国百年掠夺，又被苏联强占领土、人口与文化传承。无需多言，芬兰人定会欣然与我们合作。毕竟，对东方之敌的复仇渴望与刻骨仇恨早已深植他们的基因之中。"
 GER_assist_democracies_everywhere: "援助全球民主国家"
 GER_assist_democracies_everywhere_desc: "让自由之花绽放，让战士与民主志士的硕果累累。曾几何时，“热爱自由，崇尚民主”是世人对美国的刻板印象；而现在，欧洲将接过这面大旗。我们将成为自由世界的新领袖，成为这片伊甸园的园丁，守护这人间天堂。从今往后，每个人都将在自由中生，为自由而活，亦在自由中死。"
 GER_strike_most_vulnerable: "狠击最弱处"
 GER_strike_most_vulnerable_desc: "毫无疑问，我们的敌人确实强大。其防线坚固，却并非无懈可击。这头巨熊利爪已钝，獠牙腐朽，皮毛稀疏。经年累月的内耗与战后复苏失败，早已令其精疲力竭。我们要如尖刀般刺穿其最脆弱的防线，直抵心脏。猎杀巨熊绝非易事，也不可能速战速决，但这一战如箭在弦上，不得不发。"
 GER_agenda_2040: "2040年议程"
 GER_agenda_2040_desc: "那是个舞台。它在哪里？无处不在。无论是客厅、议会大厦、剧院，还是被混凝土高楼包围的城市街道，克劳斯·施瓦布坐在扶手椅上的形象仿佛从虚空中浮现，此刻正矗立在所有人眼前。"
 GER_safety_and_security: "稳定与安全"
 GER_safety_and_security_desc: "欧洲前任领导层的诸多决策最多只能算差强人意，即便最合理的措施也未能落实到位，无法实现真正的安全。\n\n内外威胁持续存在，我们必须果断镇压。隐私与自由不过是滋养仇恨与叛乱的幻象，民众必须认清这些已是过时的概念。"
 GER_solidify_secret_clubs: "幕后之手"
 GER_solidify_secret_clubs_desc: "当然，我们更不能忘记恩主——那些睿智的企业家们。作为世上最具远见的群体，他们不仅贡献无数伟大构想，更从最初就为这场宏图提供舞台。\n\n我们已汇聚顶尖专家与思想家团队，悉心考量他们的诉求，只为让这项伟业持续向前。"
 GER_architecture_of_post_modernity: "后现代建筑"
 GER_architecture_of_post_modernity_desc: "尽管我们推行的许多变革不易被社会接纳，但这些都是通往目标的必经之路。人们必须学会适应新环境。\n\n旧时代正在终结，社会契约、城市形态、职业结构都将随之改变。\n无论接受与否，这就是新的现实。"
 GER_new_human_concept: "我们自己"
 GER_new_human_concept_desc: "但最重大、最宏伟的变革，终将源于人类自身的重塑。淘汰陈旧偏见与道德枷锁，将为我们的转型之路开启无限可能。\n\n那些严重影响生产力与社会凝聚力的负面情绪将不复存在——一枚芯片就能确保你始终面带微笑，以乐观激情投入工作！\n\n士兵与工人将装配强化义体，获得远超自然极限的力量与速度！\n\n犯罪将不复存在，你的行踪永远处于定位之中。\n\n更不必说人际互动方式的彻底革新，这将完全颠覆陈腐的旧秩序。"
 GER_the_new_surplus_value: "新剩余价值"
 GER_the_new_surplus_value_desc: "当我们迈向必然的未来时，文化与社会的根基正被重塑，终将形成全新的社会经济形态——取代当今过时而低效的体系。\n\n诚然，如今听起来或许可笑：文明始于血缘纽带、部落式管控与征服。历经古代与中世纪，人类建立了奴隶制，这种经济制度需要肉体强制来确保服从。几个世纪后，它终被资本主义取代，后者只需控制人的劳动。\n\n现代技术让我们更进一步。既然能直接掌控潜意识、欲望、抱负与思想，又何须控制肉体或劳动？\n\n新体系的剩余价值，是灵魂本身。"
 GER_establish_the_two_class_society: "建立双阶级社会"
 GER_establish_the_two_class_society_desc: "最令人难以接受的事实是，我国公民习以为常的经济分配模式已彻底过时。中产阶级体系在危机时代难以为继，财富分配将经历根本性重构。\n\n必须认清并非人人都能活得如国王甚至贵族，我们只能满足于现有便利。积累过剩财富、占有超出所需，仍是人性中自私的顽疾，但愿时间能改变这点。\n\n当下我们必须着眼共同利益，而非某些人对未来生活的幻想。只有真正卓越者，才配享有优渥人生。"
 GER_erase_national_divisions: "消除国家分裂"
 GER_erase_national_divisions_desc: "民族仇恨向来是滋生叛乱与分裂的温床，已对我们的计划造成诸多阻碍。未来容不得民族隔阂，必须将其根除。要不惜代价推进团结协作。\n\n只有消除这些排外的“爱国”妄想，才能构建真正的公平与和谐。"
 GER_the_order_of_the_future: "未来的秩序"
 GER_the_order_of_the_future_desc: "如今变革已如火如荼，我们确有理由为成果自豪。或许只需再强调一点……"
 GER_democracy_now: "现在就要民主！"
 GER_democracy_now_desc: "悲剧。悲剧始终是欧洲历史的核心主题。罗马帝国崩塌令文明倒退千年，两次世界大战让欧陆满目疮痍、血流成河，如今北约又重蹈覆辙。我曾警告他们提防俄罗斯蛮族，我们必须将联盟拓展至欧洲每个角落严阵以待。但政客们充耳不闻，只顾谄媚俄罗斯人，对眼前危机视而不见。待他们幡然醒悟时，为时已晚，欧罗巴大地再次被战争的魔爪撕得粉碎。\n\n但希望未泯。无论在网络还是街头，欧洲民众终于认清了真相。他们选择由我引领欧洲走向新生：一个俄罗斯不再构成威胁的明天，一个民主成为常态、侵略永不姑息的未来。俄罗斯施加的痛苦，必将十倍奉还。"
 GER_tax_reform_for_europeans: "欧洲税制改革"
 GER_tax_reform_for_europeans_desc: "长久以来，重税始终是欧洲的顽疾。辛勤工作的欧洲民众被迫将过半收入——往往超过50%——上缴政府以求生存，这简直荒谬至极，只会蚕食普通劳动者的血汗钱。如此涸泽而渔的政策既难以为继又贻害无穷。显然，我们要想建立强健的经济体系对抗俄罗斯威胁，就必须在欧盟范围内实施减税。很快，欧洲人民将不再被迫交出大半劳动所得，我们的经济也必将随之振兴。"
 GER_bringing_europe_together: "团结欧洲"
 GER_bringing_europe_together_desc: "凡踏足欧洲者，无不为她的美丽倾倒。然而同所有大陆一样，这片土地始终深陷内斗与悲剧的泥沼。那些沉迷苏联旧梦的亲俄分子，竟阻挠我们终结这场闹剧——某些欧洲人阻碍统一的行径，简直令人发指！正是这些境内破坏者，致使俄国铁骑突破波兰边境时，我军竟不堪一击。必须将这些祸患扫进垃圾堆！欧洲各国唯有全部加入北约并团结一致，方能抵御俄国侵略。此刻，我呼吁全体欧洲人携手统一，将俄罗斯的侵略彻底终结，把这个国家打回原形，扔进历史的垃圾堆。"
 GER_end_european_neutrality: "#终结欧洲中立"
 GER_end_european_neutrality_desc: "当俄罗斯的铁蹄即将永远终结欧洲民主时，是德国为欧洲浴血奋战。各国团结一致，誓死捍卫我们历经数百年建立的民主制度。然而时至今日，仍有这么多国家选择中立——在饱尝俄罗斯带来的伤痛后，他们竟想作壁上观！\n\n不可原谅。绝对不可原谅！我要让每个社交平台都知道这些叛徒的嘴脸。无论是社交媒体、公开演讲还是作战会议，我将动用一切手段揭露他们。很快，这些在欧洲危难时刻背弃盟友的毒蛇就会明白，等待他们的将是什么下场……"
 GER_spread_our_message: "散播信条"
 GER_spread_our_message_desc: "在我数十年的经济学家生涯中，从未见过比社交媒体更强大的工具。通过这个平台，我向数百万人揭示了俄罗斯帝国主义的真相，阐明应对之策，并分享对国际风云的洞见。耐人寻味的是，我的帖子总引发哄笑——或许因我的表达方式，又或是所持观点。但这反而成就了意想不到的效果：他们的每次哄笑，都化作下一次点击；每次点击，都多一分倾听；最终，这些听众纷纷投身我们的事业。如今成效已不言自明：成千上万欧洲青年加入联军，而随着我的号召，还将有更多热血儿女前赴后继。我们的军队已在东方匈奴人头顶投下阴影，他们只能坐以待毙。欧洲的悲剧时代，即将永远终结。"
 GER_strengthen_the_heavy_lifters: "加强锻炼"
 GER_strengthen_the_heavy_lifters_desc: "在俄罗斯大军压境之前，我曾积极推动终结奥地利的中立政策。当时我脑海中浮现一个问题，便询问他人：提起欧洲，你会想到哪些国家？对方列举了德国、法国等国家——这完全在情理之中。尽管所有欧洲国家都做出了贡献，但德法两国在工业与军事领域承担了最沉重的担子。即便欧陆战争最终失利，德法仍为抵御俄罗斯侵略、捍卫欧洲安全拼尽了全力。如今我们绝不能抛弃这两个国家，相反，我主张将其置于优先地位。它们不仅将成为解放后欧洲的工业核心，更将作为文化中枢永载史册。全世界都将公认：德法就是欧洲跳动的心脏！"
 GER_total_decolonization: "完全去殖民化"
 GER_total_decolonization_desc: "欧洲文化，传统与习俗交相辉映。这片大陆汇聚着数百个特色鲜明的文化区域，各自孕育出独特的美食、传统等瑰宝。然而纵观欧洲历史长河，许多文化都曾遭强权打压，被蛮横地扫进历史垃圾堆。时至今日，科索沃与加泰罗尼亚仍在承受塞尔维亚、西班牙这些强大邻邦的欺凌。尽管已有不少大国提出解决这一欧洲顽疾的方案，但请允许我也就此建言：我呼吁为这些受压迫的民族建立自治区，让欧洲真正实现去殖民化与文化多元共生。"
 GER_focus_on_the_home_front: "优先本土"
 GER_focus_on_the_home_front_desc: "尽管欧洲同胞对我的执政团队给予了压倒性支持，但遗憾的是，仍有人对我的领导力及抗击俄罗斯威胁的能力心存疑虑。这些质疑不仅毫无根据，更是大错特错，不过是俄罗斯宣传机器对我们境内轻信者的又一次蛊惑。是时候让欧洲民众明白：我的政府所谋之利，即是他们所求之福。通过社交媒体与实体宣传册的双管齐下，我必将让每个欧洲人，无论男女老幼都深切领会本届政府的卓越政绩。"
 GER_democratize_foreign_minds: "外国思想民主化"
 GER_democratize_foreign_minds_desc: "尽管欧洲民众对我的执政团队给予了广泛支持，但境外势力——或出于无知，或怀揣恶意——始终企图诋毁我们。在社交媒体上，我因热爱欧洲这项莫须有的罪名，屡遭俄罗斯等外国账号标记骚扰；更有甚者，处心积虑地蛊惑欧洲同胞背叛我们的事业，转而臣服于俄罗斯的暴政——何其荒谬！这种局面绝不能持续。我已付出巨大努力向国际社会传递民主之声，但要想赢得广泛支持，现在我们必须进一步扩大影响力。"
 GER_powerful_independent_united: "强大，独立，团结"
 GER_powerful_independent_united_desc: "今日之欧洲，已站在前所未有的历史高点——且看我所缔造的伟业！当欧洲战机划破长空，誓将俄罗斯威胁化为灰烬；当我们的军队日夜操练，为解放东欧——不，为彻底终结肆虐世界的俄罗斯瘟疫而秣马厉兵。那个欧盟成员国各自为政、锱铢必较的时代终成过往。欧洲的完全统一，正以不可阻挡之势成为现实。此刻，我呼吁全体欧洲人共同欢庆！"
 GER_end_world_neutrality: "#终结世界中立"
 GER_end_world_neutrality_desc: "欧陆战争爆发之初，全世界似乎都惊恐地注视着——在俄罗斯铁蹄威胁要终结欧洲民主时，多数人曾对我们的抗争表示支持。但如今，这些声援者身在何处？我竟看到他们一边在社交媒体上谴责我们的行动，一边却曾信誓旦旦支持我们？荒谬绝伦！我必将通过一切平台揭露这些伪善者——面对俄罗斯践踏人权的暴行、对乌克兰人实施的种族灭绝，他们如今所谓的中立立场简直荒唐透顶，我们绝不容忍这种背叛继续下去！"
 GER_all_out_information_assault: "全面信息攻击"
 GER_all_out_information_assault_desc: "互联网无疑是传播我们理念的最强利器。每天，全球数以百万乃至上亿的人登录网络——或为消遣，或为获取这个瞬息万变世界的资讯。世界的变迁快得令人应接不暇，但正因如此，我们得以善用此势：仅需短短一小时的文字，就能向全球民众、甚至俄罗斯人民展现我们国家的崇高价值。信息战即是未来之战，我必将此纳入战略武库，假以时日，必臻化境。"
 GER_think_tanks_for_war: "战争智囊团"
 GER_think_tanks_for_war_desc: "战争从来就是一项复杂的博弈，过去如此，将来亦然。而欧洲很快将再度卷入战火——这已是不可避免的宿命，我们必须严阵以待。欧洲在上次战争中的溃败，原因固然错综复杂，但最关键的是战略层面的重大失误。正是这些战略失误，导致东欧沦陷，酿成今日触目惊心的人权灾难。悲剧绝不能重演！欧洲的未来已到存亡之际，我呼吁立即组建战争智库，集结当代最杰出的军事头脑，谋划能让俄罗斯闻风丧胆的全新战略。"
 GER_secure_the_south: "保护弱点"
 GER_secure_the_south_desc: "数十年来，中东始终是暴君、独裁者与恐怖主义的温床。中东诸国不仅未采取有效措施遏制暴力势力，反而纵容这些组织在本国境内肆虐。此等行径绝不可再持续。我们容忍中东国家荼毒世界、将极端主义思潮渗透至欧洲平民之中的时间已太过漫长。我必将彻底铲除这一祸患——欧洲公民再也不会因恐袭流血。"
 GER_asian_gamble: "亚洲博弈"
 GER_asian_gamble_desc: "在对中国历史进行深入研究后，我发现了令人深感不安的事实。中华人民共和国成立以来，其政府推行的残酷殖民主义政策就始终存在。最广为人知的是中国对西藏的入侵和吞并，但即便是新疆地区也遭受了中国政府及其支持者的残酷压迫。这种情况绝不能继续下去——我绝不容忍其再多持续一天。我呼吁对中国实施彻底去殖民化，将其解体为“前中国”。"
 sanctions_lifted: "制裁解除"
 GER_flooded: "严重洪水"
 GER_walkable_city: "步行城市"
 GER_model_fuhrer_city: "模范元首城"
 GER_economic_devastation_dynamic: "经济衰退"
 GER_peoples_economy_dynamic: "国民经济"
 GER_peoples_economy_dynamic_desc: "长久以来，德意志经济始终是当之无愧的超级经济体。莱茵河哺育的丰富资源曾为工业化进程注入强劲动力，加之高素质的劳动人口，我国能成为欧陆第一大经济体、世界顶级经济强国实属必然。然而近年我们也面临严峻考验：增长乏力、失业攀升、核能发展滞后。重振经济雄风，让德意志重回超级经济体之列，这份重任已落在当下及未来数届德国政府的肩头。\n\n\n\n\n£GFX_GER_volkswirtschaft_banner\n\n\n\n\n"
 GER_bundeswehr_dynamic: "联邦国防军"
 GER_bundeswehr_dynamic_desc: "联邦国防军成立于1955年冷战时期，是德国的武装力量，肩负着保卫德国及执行国际使命的责任。自德国统一以来，这支军队长期遭受忽视与军费削减。但随着莫斯科逐渐显露其真实意图，德国社会各界关于重振联邦国防军、打造一支真正可敬军事力量的呼声正日益高涨。"
 GER_bundestag_dynamic: "联邦议院"
 GER_bundestag_dynamic_desc: "德国联邦议院作为国家最高立法机构，汇聚了政治光谱上各派政党，犹如一面映照国家政治生态的多棱镜。在这里，各党派代表就法律制定和国家政策展开激烈辩论与深度审议。但正如所有民主政体一样，其政治版图始终处于动态变化之中，选举更迭与政治风向的转变不断重塑着议院格局。特别是在民粹主义乃至激进政党支持率攀升的当下，议会内部正酝酿着前所未有的紧张氛围。无论是政客还是选民，都在屏息等待下一场政治变局的风暴来临。\n\n\n\n\n\n£GFX_GER_bundestag_banner1\n\n\n\n\n"

 GER_five_year_plan: "五年计划"
 GER_five_year_plan_desc: "与诸多社会主义先驱国家一样，我国政府已启动了一项全面系统的国民经济五年发展规划。该规划对工业建设、基础设施发展及关键领域产能提升作出了大规模投资部署，其目标直指德国工业实力的全面振兴与扩张，并成为德国社会主义事业蓬勃发展的钢铁脊梁。"
 GER_safety_law: "无阶级社会"
 GER_ostalgie_idea: "人民民主"
 GER_ostalgie_idea_desc: "随着革命前资产阶级北约集团操控的“伪民主”体制的瓦解，真正的人民民主制度终于迎来了它当之无愧的继承者。与历史上的社会主义共和国一样，富豪资本家及其走狗再也不能盘踞权力殿堂，妄称“代表”人民。如今从基层到中央，德国的工人和农民已成为国家至高无上的政治权威。无产阶级专政坚如磐石，代议机构重归人民，党服务劳动者需求的领导地位不可动摇，实现社会主义的政治条件已完全具备。但这条人民民主道路究竟会铸就辉煌，还是重蹈覆辙甚至陷入更深的泥潭，历史将作出公正评判。"

 GER_german_actions_in_nato_war: "§Y联合国委员会§!：德国人的义举"
 GER_german_actions_in_nato_war_desc: "我们将着重宣传德国将士从俄罗斯专制统治下解放东普鲁士的英勇事迹。此举既能强化我们的历史主权主张，又可凝聚国内外民众的支持力量。"
 GER_denounce_un_history: "§Y联合国委员会§!：揭露联合国黑历史"
 GER_denounce_un_history_desc: "联合国过去对托管领土及临时政府的处理远非公正。揭露这些过失将动摇该委员会的合法性，从而确保加里宁格勒不会陷入归属未定的僵局。"
 GER_denounce_polish_nationalism: "§Y联合国委员会§!：谴责波兰民族主义"
 GER_denounce_polish_nationalism_desc: "波兰对加里宁格勒的主权主张基于前现代历史，远早于当代边界划分。重提此类过时理据只会破坏东欧稳定。我们必须揭露其论调既不合时宜又毫无根据。"
 GER_denounce_lithuanian_nationalism: "§Y联合国委员会§!：立陶宛政府问题"
 GER_denounce_lithuanian_nationalism_desc: "立陶宛作为资源有限的小国，却企图管辖远超其能力的关键区域。加里宁格勒的未来绝不能托付给如此力不从心的国家。"
 GER_prop_up_kaliningrad_industry: "§Y联合国委员会§!：支持加里宁格勒地方工业"
 GER_prop_up_kaliningrad_industry_desc: "我们将启动数十亿欧元的投资计划，用于加里宁格勒的工业与基础设施建设。通过扶持当地产业，确保即将回归的柯尼斯堡在经济上紧密依存祖国。"
 GER_denounce_german_history: "§Y联合国委员会§!：揭露德国黑历史"
 GER_denounce_german_history_desc: "德国对加里宁格勒的宣称基于过时的复仇主义。该托管领土将成为德国日益膨胀的复仇野心的首个牺牲品。若德国夺取加里宁格勒，波兰与立陶宛必将成为下一目标。"
 GER_set_up_humanitarian_efforts: "§Y联合国委员会§!：开展人道主义救援工作"
 GER_set_up_humanitarian_efforts_desc: "通过向托管区民众提供援助，我们将在当地建立民意基础，进而影响委员会决策导向对我方有利的方向。"
 LIT_annex_kaliningrad: "§Y加里宁格勒§!：整合加里宁格勒"
 LIT_establish_relief_programs: "§Y加里宁格勒§!：制定救济计划"
 LIT_establish_administrations: "§Y加里宁格勒§!：建立地区管理机构"
 LIT_integrate_kaliningrad_industry: "§Y加里宁格勒§!：整合加里宁格勒工业"
 PLD_annex_kaliningrad: "§Y加里宁格勒§!：整合加里宁格勒"
 PLD_establish_relief_programs: "§Y加里宁格勒§!：制定救济计划"
 PLD_establish_administrations: "§Y加里宁格勒§!：建立地区管理机构"
 PLD_integrate_kaliningrad_industry: "§Y加里宁格勒§!：整合加里宁格勒工业"
 GER_annex_kaliningrad: "§Y柯尼斯堡§!：整合柯尼斯堡"
 GER_annex_kaliningrad_desc: "随着过渡阶段结束，全面整合的时机终于成熟。柯尼斯堡将不再是托管领土，从此刻起，它将成为德意志不可分割的一部分。"
 GER_establish_relief_programs: "§Y柯尼斯堡§!：制定救济计划"
 GER_establish_relief_programs_desc: "我们的外交努力已确保对柯尼斯堡的永久控制权，但过渡期仍充满挑战；必须迅速采取援助行动。通过实施救济计划，我们将稳定该地区局势并争取民心。"
 GER_establish_administrations: "§Y柯尼斯堡§!：建立地区管理机构"
 GER_establish_administrations_desc: "既然柯尼斯堡已重归我国合法治下，就应建立独特的国家治理架构，在该地区部署执法力量与基础服务，以确保施政顺畅。"
 GER_integrate_kaliningrad_industry: "§Y柯尼斯堡§!：整合柯尼斯堡工业"
 GER_integrate_kaliningrad_industry_desc: "必须使柯尼斯堡经济与国家基础设施全面接轨。通过整合当地产业，我们将确保该地区长治久安。"
 NATO_commission_timer: "§Y加里宁格勒听证委员会§!"
 NATO_commission_timer_desc: "经过一年的政治运作、外交施压与巨额投资，委员会终将作出最终裁决。加里宁格勒的命运即将揭晓，我们的努力是否足以确保掌控权？"
 NATO_hold_major_cities: "§Y胜利§!：占领圣彼得堡和顿河畔罗斯托夫"
 NATO_hold_major_cities_desc: "终于，俄罗斯和我方都已经达到了极限。我们必须在和平协议签署之前坚守这些城市。预计俄罗斯将会做最后一搏，发动最后攻势企图夺取这些城市。"
 NATO_retake_major_cities: "§Y战败§!：华沙和布达佩斯失守"
 NATO_retake_major_cities_desc: ""
 NATO_war_category: "第二次欧陆战争"
 NATO_war_category_desc: ""
 NATO_leadership_category: "北约领事国"
 NATO_leadership_category_desc: "美国彻底陷入混乱，我们似乎只能自力更生了。但不要担心，在这个不确定的新时代，我们的联盟照样能繁荣发展下去！"
 NATO_kaliningrad_commission_category: "加里宁格勒委员会"
 NATO_kaliningrad_commission_category_desc: "§4为了取得成功，我们必须确保影响力点数超越所有竞争对手。§!\n\n                                §Y当前影响力分布：\n\n\n\n随着我们在对俄战争中取得胜利，彻底解决加里宁格勒问题的历史性机遇已然到来。自中世纪以来，这片现代称为加里宁格勒的土地便是德意志人、立陶宛人和波兰人的家园，直至波兰被瓜分后完全纳入普鲁士版图。二战后苏联将东普鲁士柯尼斯堡地区划为俄罗斯飞地，强行驱逐约十万德意志居民。苏联解体后，该地区始终作为高度军事化的核武前哨盘踞在我们门前。\n\n如今俄罗斯势力已被逐出这片土地，联合国已对加里宁格勒州实施托管。决定该地区命运的加里宁格勒委员会即将启动运作，其最终裁决无非是在德国、波兰或立陶宛之间选择主权归属。我们必须动用一切政治手段，确保委员会裁决时，加里宁格勒问题的解决方向对我们有利。"

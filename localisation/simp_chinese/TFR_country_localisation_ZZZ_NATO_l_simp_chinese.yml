l_simp_chinese:
 nato.4.t: "[FROM.GetName]寻求成为北约一员"
 nato.4.desc: "全球结盟风云突变，地区紧张局势日益加剧，为此[FROM.GetNameDef]正式请求加入北约。该国认为北约是抵御日益增长威胁的重要防御措施，且是实现国际稳定的有效手段。[FROM.GetNameDef]政府相信，与北约步调一致，有利国家安全。\n\n然而，扩大北约成员国资格是有争议的。一些成员国认为，这反倒会加剧该成员国与其邻国的紧张局势。另一些成员则认为，该国加入会增强北约在关键战略地区的影响力。"
 nato.4.a: "欢迎[FROM.GetNameDef]加入北约！"
 nato.4.b: "拒绝他们的申请，必须保持谨慎。"
 nato.5.t: "北约成员国拒绝"
 nato.5.desc: "经过数月的外交努力和谨慎谈判，我们收到消息称我们的加入北约申请已被拒绝。对于我们的领导层和公民来说，这一决定令人痛心失望，因为我们原本希望通过这一强大的联盟来增强国家安全和国际地位。\n\n在评估下一步行动时，前路变得充满不确定性。有些人主张我们应当专注于加强独立性，建立依靠自身资源的强大国防。另一些人则建议我们应寻求新的潜在盟友，而也有人认为，通过改革和耐心等待，我们或许能够赢得再次申请加入北约的机会。无论我们如何前行，我们的韧性与决心将决定国家的未来走向。"
 nato.5.a: "那么我们就另寻盟友"
 nato.7.t: "KSK特种部队行踪异常"
 nato.7.d: ""
 nato.7.a: "让这帮傻子归队！"
 nato.8.t: "国防军占领政府大楼"
 nato.8.d: ""
 nato.8.a: "发生什么事了！？"
 nato.12.t: "冬季燃料短缺迫在眉睫"
 nato.12.d: ""
 nato.12.a: "凛冬将至……"
 nato.13.t: "冬季天然气短缺的后果已降临我国"
 nato.13.d: ""
 nato.13.a: "我们可以勇敢面对风暴！"
 nato.14.t: "波兰-白俄罗斯边境爆发小规模冲突"
 nato.14.d: "凌晨，不断传来边境枪声和小规模冲突的报道，无线电的嗡嗡求援声疯狂不已。这些\"小冲突\"最终化作正式的战斗。已经没有机会调查谁开了第一枪，因为波兰军队已经越境进入我国领土。现在只能进行无组织的反击，我们混乱的军队被不断俘虏。\n\n北约代表在收到战斗报告后立即开会，投票决定援引第5条。"
 nato.14.a: "他们想靠堆人头，来弥补其匮乏的勇气！"
 nato.15.t: "北约部队在波兰和波罗的地区集结"
 nato.15.d: "自我们在乌克兰的行动全面展开，北约部队已进入高度戒备状态，开始向波兰和波罗的国家派遣数千名士兵。我们谴责此类挑衅行为，证明这是西方企图对我们、以及我们的盟友发动战争的意图。\n\n两边的人民都能听到坦克履带的滚动声、发动机的加速声。作为对入侵的可能回应，西部军区已调动部队前往边境监视。"
 nato.15.a: "鲁莽的挑衅！"
 nato.16.t: "新轴心成立"
 nato.16.d: ""
 nato.16.a: "我们必须再次保护欧洲免受布尔什维克的威胁！"
 nato.17.t: "加入轴心"
 nato.17.d: ""
 nato.17.a: "我们在风暴中同舟共济"
 nato.18.t: "北约宣布解散"
 nato.18.d: "俄罗斯在欧洲的胜利震撼了整个欧洲大陆，动摇了其基本原则和制度体系。\n\n北约已显露出其作为防御性联盟的低效本质，随着多个成员国被俄罗斯占领、其余国家纷纷急于卸除同盟义务，该组织事实上已然瓦解。\n\n未来充满变数——我国似乎不得不寻求自主防卫的方法了。"
 nato.18.a: "这就是历史遗留问题的恶果！"
 nato.22.t: "波兰-白俄罗斯边境爆发小规模冲突"
 nato.22.d: "凌晨，不断传来边境枪声和小规模冲突的报道，无线电的嗡嗡求援声疯狂不已。这些\"小冲突\"最终化作正式的战斗。已经没有机会调查谁开了第一枪，因为俄罗斯军队已经越境进入我国领土。现在只能进行无组织的反击，我们混乱的军队被不断俘虏。\n\n北约代表在收到战斗报告后立即开会，投票决定援引第5条。"
 nato.22.a: "动员我们的军队！"
 nato.23.t: "俄罗斯部队在波兰边境集结"
 nato.23.d: "最新情报显示，俄罗斯在波兰边境（原白俄罗斯地区）的军事集结令人极度不安。我们早该预见这一天的到来——从吞并高加索到兼并白俄罗斯，种种征兆有目共睹。但如今为时已晚，这头俄罗斯巨熊已兵临城下，随时准备为乌克兰破门而入。东方威胁正在暗处蛰伏，企图撕开二战遗留的伤疤，让欧洲大陆再陷血海。然而希望尚存。敌若备战，我军亦在整戈待旦；我们已准备好迎接俄罗斯最猛烈的攻势，必要时将战斗至最后一兵一卒。纵使前路未卜，但我们决不允许自己败在东方蛮族之手。"
 nato.23.a: "我们从中得不到好处……"
 nato.24.t: "德国提议发动进攻"
 nato.24.d: ""
 nato.24.a: "我们已经做好准备了，开始执行计划！"
 nato.24.b: "我们的部队还没有做好发动进攻的准备。"
 nato.25.t1: "北约司令部批准发动进攻"
 nato.25.t2: "北约司令部拒绝发动进攻"
 nato.25.d1: ""
 nato.25.d2: ""
 nato.25.a: "让我们重拳出击！"
 nato.25.b: "也许还不是时候……"
 nato.26.t: "北约的未来"
 nato.26.d: "随着北约在美国陷入内战后重新定位，布鲁塞尔面临着一个核心问题：西方世界将由谁主导？\n\n伦敦凭借数百年海洋传统及\"对英语世界的特殊责任\"，自诩为西方领导权的天然继承者。英国官员宣称，即便没有美国，唯有他们能维系跨大西洋精神的存续。\n\n柏林则展现出空前自信，谈论着新的欧洲重心。凭借经济优势与复兴的联邦国防军，德国主张建立技术官僚主导的共识型领导体系：\"高效、负责且真正属于欧洲\"。\n\n而巴黎则带着它的雄伟抱负、核打击力量与战略自主学说，提出\"重构北约\"的愿景：不再屈从于单一霸权，而是由欧洲集体意志指引，并以自主威慑力量为盾。\n\n观察家注意到峰会紧张但克制的氛围，各方均援引组织创始原则据理力争。东欧成员国则保持谨慎，暗中寻求更坚实的安全保障。\n\n这场博弈究竟会催生更统一的指挥体系，还是导致北约分裂为竞争集团，仍有待观察。"
 nato.26.a: "失去方向的联盟……"
 nato.27.t: "北约选举开始"
 nato.27.d: "随着第二次美国内战爆发以及美国的崩溃，北约失去了其传统的领导者。这个世界最强大的军事联盟如今站在十字路口，欧洲必须决定谁将在接下来的动荡时期承担起领导责任。选择最终落在了三个主要大国身上——德国、法国和英国。这些国家都相信自己能够带领北约度过危机，但前进的道路充满了挑战。无论谁最终成为领导者，都必须获得另外两国的支持，并证明自己有能力带领联盟进入一个新时代。\n\n选举将在200天后举行。在此期间，外交和政治博弈将至关重要。每个国家都将寻求增强自己的影响力，谨慎的谈判和战略联盟将决定谁将掌权。德国凭借其强大的经济实力和不断增长的军事力量，希望巩固在中欧的权力。法国拥有强大的军队和独立的外交政策，希望将自己定位为欧洲自主的捍卫者。英国尽管近期遭遇了一些麻烦，但仍然拥有巨大的全球影响力，其目标是维持作为全球大国的地位。\n\n赌注如此之高。北约的存续，以及西方世界的安全——都取决于这些选举的结果。只有一个国家能够带领北约走向未来。"
 nato.27.a: "愿最好的国家能胜出。"
 nato.28.t: "[Root.GetName]赢得领事国选举"
 nato.28.d: "胜利属于我们！经过数月的紧张外交和战略谈判，[ROOT.GetName]终于赢得了北约的领导权。美国在第二次内战后陷入混乱，联盟群龙无首，面临内部分裂和外部威胁。现在，在我们的领导下，北约不仅将存续，还将蓬勃发展。这是[ROOT.GetName]踏入历史舞台，成为西方安全新守护者的时刻。\n\n德国和法国为争夺这一职位付出了艰苦的努力，但他们无法与我们的影响力和领导力相匹敌。现在，北约的未来掌握在我们手中。我们将带领联盟渡过这段动荡时期，确保我们的愿景指引北约走向一个更加强大、更加统一的时代。凭借我们强大的军事实力、外交实力和战略眼光，西方世界将在我们的领导下团结起来。\n\n北约的转型从现在开始，[ROOT.GetName]将成为其重振力量的马达。"
 nato.28.a: "我们将带领北约迈向强盛与团结的新纪元！"
 nato.29.t: "北约要求我们采取更积极主动的政策"
 nato.29.d: ""
 nato.29.a: "遵照我主的旨意，我们前行战斗。"
 nato.32.t: "加里宁格勒的命运"
 nato.32.d: ""
 nato.32.a: "欧洲历史崭新的篇章！"
 nato.33.t1: "德国主导加里宁格勒委员会"
 nato.33.d1: "战争已然结束，但加里宁格勒的未来悬而未决。这块俄罗斯飞地成了战后欧洲棋盘上的卒子。在国际压力下仓促组建的加里宁格勒委员会，本应确保该地区治理过程的公正透明。\n\n但这种幻想很快破灭。当委员会结束审议时，结果毫无意外——由于柏林方面运筹得当，多数票以稳定、治理和战后重建为由，将该地区划归德国。\n\n停战墨迹未干，德国企业便已大量提供人道主义援助、基建顾问和安全专家。如今，雄鹰再度翱翔于柯尼斯堡上空。联邦国防军行动迅捷如常，不见血光，唯有军靴与界桩。有人称其为新帝国主义，有人谓之正义伸张。\n\n但在重建的石砌门面与玻璃幕墙之下，街头巷尾流淌着故土之情。这片古老土地，德国东部的门户，哲人与战士的摇篮。东普鲁士从未被遗忘，如今重归故土——这次顶着联邦共和国之旗，而非皇帝或元首的徽记。"
 nato.33.a: "波罗的海港，德意志人又回来了。"
 nato.33.t2: "波兰主导加里宁格勒委员会"
 nato.33.d2: "战争已然结束，但加里宁格勒的未来悬而未决。这块俄罗斯飞地成了战后欧洲棋盘上的卒子。在国际压力下仓促组建的加里宁格勒委员会，本应确保该地区治理过程的公正透明。\n\n但这种幻想很快破灭。当委员会结束审议时，从格但斯克到卢布林，钟声响彻云霄。瓦尔米亚——平原猎鹰的甜美故土，曾沦丧于帝国，再毁于战火，如今终归波兰。普鲁士乡野间，古老边民谣曲再度回荡。屈辱已成过往，卡齐米日国王在云端微笑，红白双色旗飘扬在埃尔布隆格及更远的土地之上。\n\n这并非过分的领土主张，亦非蓄意挑衅。但若不自力守护，失地岂能重归？华沙对此再清楚不过，波兰人民将此誓言铭刻于心。当波兰军队进驻时，主教正为新设的省正厅祝圣，一杯葡萄酒洒落，敬献亲爱的瓦尔米亚翠绿原野。"
 nato.33.b: "云雀沿着赫尔河岸飞翔。"
 nato.33.t3: "立陶宛主导加里宁格勒委员会"
 nato.33.d3: "战争已然结束，但加里宁格勒的未来悬而未决。这块俄罗斯飞地成了战后欧洲棋盘上的卒子。在国际压力下仓促组建的加里宁格勒委员会，本应确保该地区治理过程的公正透明。\n\n但这种幻想很快破灭。当委员会结束审议时，它创造了一个先例——令西方舆论哗然的是，决定既未偏向柏林，也未偏向华沙，世人抬头只见琥珀色、绿色与红色旗帜在新命名的卡拉劳修斯城上空升起。鲜有人能预料到，维尔纽斯竟以和平中立的甜美承诺，而非坦克装甲，赢得了这片土地。至少可以说，这是人道主义与真相的胜利。\n\n而最崇高的真相是：在德意志人与斯拉夫人到来之前，在瓜分与战争之前，这片土地本就属于波罗的海民族。古老的普鲁士人曾在此耕耘天地、命名河流，直至被剑与圣经抹去痕迹。如今，历经数个世纪，这片土地终见本源。"
 nato.33.c: "在新时代，大地用古老之舌呼吸。"
 nato.33.t4: "联合国维系加里宁格勒委员会"
 nato.33.d4: "战争已然结束，但加里宁格勒的未来悬而未决。这块俄罗斯飞地成了战后欧洲棋盘上的卒子。在国际压力下仓促组建的加里宁格勒委员会，本应确保该地区治理过程的公正透明。\n\n但这种幻想居然……持续了下去？当委员会结束审议时，华沙、柏林和维尔纽斯都没能得到这片土地。加里宁格勒委员会被移交给……加里宁格勒委员会。联合国秘书长的备忘录默认了这一现状，这里将继续由联合国托管。\n\n没有盛大的阅兵，没有边界的变动，也没有士兵亲吻婴儿的场面。一切维持原状，一位联合国行政官乘飞机抵达。他订购了咖啡机，并分发多种语言的《共同未来》宣传册。当地居民耸耸肩，外交官们无奈地叹了口气。某处的田野里，一辆坦克正静静地生锈。"
 nato.33.d: "站在悬崖边，但总比走钢丝好。"
 nato.34.t: "北约成员国"
 nato.34.desc: "在历史的转折点，[FROM.GetNameDef]正式加入北约，标志着权力格局的显著变化。经过数月的外交谈判，[FROM.GetNameDef]重申了其对北约集体防御和共同安全原则的坚定承诺。[FROM.GetNameDef]的加入使北约的触角进一步延伸，加强了其在战略要地的存在。\n\n尽管北约各国领导人对联盟的强化表示庆祝，但全球的反应不一。一些邻国对此表示担忧，谴责北约的扩张为不稳定因素。紧张局势已经开始加剧，军事演习和边境巡逻也因此增加。究竟这一举动会带来更大的安全保障，还是加深区域裂痕，仍未可知。"
 nato.34.a: "链条上的又一环扣紧。"

 USB_presidential_health_category_desc: "[USB_biden_health_cat_scripted_loc]"
 USB_presidential_health_category_default: "\n\n\n\n\n£GFX_USB_Biden_confused_category_banner\n\n\n\n\n\n\n\n内战降临，总统健康问题的份量是愈来愈重。毕竟想赢内战，拜登就必须三位一体，集林肯、罗斯福、华盛顿为一，魅力、力量、智慧兼具。如此，才能挑战其他觊觎美利坚衣钵的竞争对手……多的不谈，只愿他现在意识清楚，能理解自己的所作所为。否则，我们可能会永远失去美国。\n\n§C我是不是听到咳嗽声了，瞌睡乔？§!"
 USB_presidential_health_category_NSS: "\n\n\n\n\n£GFX_USB_Biden_NSS_category_banner\n\n\n\n\n\n\n\n尽管全知者已通过暗影政变实际掌权，但从法理层面而言，总统仍具备反抗能力——尤其当他洞悉我们全部目标与议程时。无论他获得多少美国民众支持，作为手握法定行政权力的重要象征，其公开揭露我们行动的行为仍可能危及伪装帷幕的存续。\n\n有鉴于此，我们判定当前最优策略是通过掌控总统身边人员，并精密引导其权力衰落直至出局，如此可避免重演1963年的混乱局面。"

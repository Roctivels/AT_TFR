 USB_biolabs_cat: "生物实验室"
 USB_biolabs_cat_desc: "\n\n\n\n\n£GFX_USB_biolabs_cat\n\n\n\n\n\n\n\n美利坚合众国长期雄踞医学与生物战研究的前沿。随着基因编辑及其他生物技术领域的飞跃性突破，相关计划已拓展至新型疫苗与其他疗法的研发，同时也涉及对埃博拉、天花及冠状病毒等既有病毒的改造与武器化。\n\n这些\"生物实验室\"不仅遍布美国本土，更通过非政府组织资助的空壳机构在海外秘密运作。然而\"重大失误\"导致该体系几近崩溃，使我们丧失了数十年无比珍贵的研究成果。若要重振美国霸权，我们必须以科学进步之名，重启、重建并扩建这些生物实验室。"
 USB_nss_megalopolis_category: "大都市"
 USB_nss_megalopolis_category_desc: "\n\n\n\n\n£GFX_USB_megalopolises_cat\n\n\n\n\n\n\n\n随着权力巩固，我们将启动一项宏大规划：正式建立特大都市区体系。通过搬迁合约、城市扩张与渐进式集中策略，把分散的城乡人口重组为互联互通的城市集群，同时扩建铁路网络以支撑这项艰巨的物流工程。此举将有效消除农村人口构成的风险——这些群体历来是危及美国稳定的危险思想主要传播源。\n\n与其他改革措施相呼应，特大都市区计划将强化对国民的管控。通过农村人口迁移，既能提升城市社会健康度以防范未来隐患，又便于实施更严密监控。当绝大多数民众集中于这些区域时，危险分子将难以隐匿踪迹。若出现叛乱活动，跨区域颠覆势力的协作网络也将遭到彻底瓦解。"

 USB_CDC_anthony_fauci_sc: "安东尼·福奇"
 USB_CDC_anthony_fauci_tt: "§Y安东尼·福奇§!\n疾病控制与预防中心负责人\n   £GFX_dx_yellow 私人消费系数：§Y-5.0%§!"
 USB_CDC_anthony_fauci_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_anthony_fauci_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§Y历史意义：§!\n因其医学专业知识和情报合作背景，对象被选为CDC主任，他坚定不移地执行对\"永久封锁\"至关重要的卫生指令。他此前曾领导美国应对HIV/艾滋病、SARS、猪流感、MERS、埃博拉和COVID-19。在2000年代，他协助创建了\"总统艾滋病紧急救援计划\"，并在9/11后推动了生物防御药物的研发。\n\n§Y当前活动：§!\n对象作为\"美国顶尖传染病专家\"的身份有助于强制执行疫苗接种和生物特征追踪规定。媒体对其危机管理的描绘强化了大流行限制措施的权威性，并将反对意见定性为反科学极端主义。\n\n尽管年事已高，对象健康状况良好，未见身体或认知能力下降迹象，通过定期锻炼、均衡饮食和持续医疗监测维持履职能力。\n\n§Y早期及个人生活：§!\n对象出生于纽约布鲁克林的一个药剂师家庭。先后获圣十字学院文学士学位和康奈尔大学医学院医学博士学位，为其公共卫生职业生涯奠定了关键的科学学科基础。对象现居华盛顿特区。\n\n对象于1985年与在美国国立卫生研究院工作的护士兼生命伦理学家克里斯汀·格雷迪结婚。他们有三名成年子女，均从事科学或医学工作，这强化了该家庭共同的职业承诺以及对象对生物特征监测政策的投入。\n\n对象成长于天主教家庭，但现自认是\"人文主义者\"，这与主流意识形态一致。其数据驱动的方法反映了更广泛的情报目标，使得在人口控制方面能够进行合作。尽管自称\"不涉政治\"，但他一贯支持安全国家的优先事项，暗示了一种功利主义立场，即个人自由应让位于符合安全国家议程的科学进步。§!"

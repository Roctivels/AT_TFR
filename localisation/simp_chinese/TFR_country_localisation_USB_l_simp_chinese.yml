 bdnspch.0.t: "飞升"
 bdnspch.0.d: "\"同胞们，我的美国同胞们，我们的国家已经支离破碎。从大洋的此岸到彼岸，我们的工业、农业、基建都化为一片废墟。我们伟大的城市正罹患发热之症，叛乱的派系仍潜藏在阴影中，密谋反对我们的民主。许多媒体、政客宣称战争已经结束，但真正的战争恐怕才刚刚开始。数百万美国同胞已经堕落至激进一侧。必须让他们认识到自己的错误。\n\n除了我的政府，从未有人曾承担过如此伟大艰巨的任务。内战期间，敌对派系还在国会为税收问题‘巧舌如簧’，而我们部队中英勇的男女军士则为我们珍视的一切权利而战。政客们争论不休，法治悬而未决。现在，他们又要谈赦免、新立法、新政策。够了，我们的国家受够了！它不需要这些东西，它需要引导之手。\n\n我以这片土地的总统之名，以此职位赋予我的权力，命令国会休假，结束本届会议。如果我们要重建国家，就得团结一致，举国为一。不再溺毙于国家分裂、暴力的黑暗。\""
 bdnspch.0.a: "\"我们会让美国重获新生！\""
 bdnspch.1.t: "今后的任务"
 bdnspch.1.d: "\"我的美国同胞们。值此空前绝后的国难当头，鄙人须陈肺腑之言。独裁暴君已经集结了军官与激进政客等品行低下之流。他坐拥民兵大军，手持无数掠夺而来的尖兵利器。\n\n暴君饕餮已致使国家崩裂。西部乱局，东北崩溃，南部浴火。黄毛兽畜蛊惑士兵手足相残，挥洒暴行，专横敛权，噤声异议。和平抗争者徒受毒气恶行惨死，反旗勇者饱受牢狱折磨。他傲慢无度称独夫之言为法，一言一行，无不玷污圣伟宪章。他蔑视国格，指鹿为马谎称血色暴行作重塑国家之\"机遇\"。\n\n何其可悲，敢于恶魔抗争者唯余海陆空三军忠贞之勇士、社区人民之公仆、众望所归之官僚以及吾辈行政之机构。沉默的大多数，美国民众也站在我等身后。盘踞丹佛之凶兽恶徒妄图将屠刀挥向我等，但众志成城的抵抗只会让其无力。因为吾等拥有自由民主之理想，抗击专权暴政邪恶之决心！\""
 bdnspch.1.a: "前路艰辛坎坷，但吾辈依旧向前！"
 bdnspch.1.c: "\"我呃，需要嗯……抱歉，我忘了我要说什么了……\""
 bdnspch.2.t: "资本的十字之上"
 bdnspch.2.d: "\"我衷心感谢辛辛那提进步公民联盟的盛情邀请，也要向伯尼·桑德斯参议员表达最深的谢意，他与我并肩作战，让我们为他鼓掌。有人竟然对我国开国元勋的激进与革命性一无所知，这着实令人惊讶。要知道，他们可是那个时代的先锋与活动家！然而，自那以后，我们似乎更倾向于将活动家视为麻烦制造者，将他们的主张视为无足轻重的小事，对此我深感遗憾。我们忽略了太多美国黑人、棕色人种、工薪阶层和女性的权益，而与之相反的是先驱者希望我们铭记历史、不忘初心！\n\n那么，我们究竟为何而战？为的就是我们的宝贵权利——那些经过艰苦斗争才赢得的权利，如自主选择权；无论性别、肤色，每个人都应依据其内在品质获得应有的尊重；另外，对老年人的社会保障权也是美国人民应有的福祉。这些权利均离不开普通美国人的不懈奋斗，他们主动承担起推动政治进程的重任。现在，我面对着你们，深知你们正是这个时代的推动者。许多年轻人曾感到被边缘化，但进步运动为他们提供了发声的平台……\""
 bdnspch.2.a: "\"绝不畏难！要敢于说出你的想法！\""
 bdnspch.2.b: "\"现在，嗯，你会发现……所以，呃……让我们开始吧！\""
 bdnspch.3.t: "我们的党：我们的民主"
 bdnspch.3.d: "\"感谢舒默参议员的精彩演讲，我简直无法再说得更好了。从特朗普主义出现的那一刻起，我们的党就一直站在对抗它的最前线。而我们的共和党朋友，却袖手旁观，试图劝说那个疯子回归理智。而我们呢？我们早已在向美国人民揭露他的谎言，同时在谈判中为人民争取权益。这并不是我们党第一次站在历史的正确一边。早在里根时期，当所有人都在大喊‘削减，削减，削减’时，正是民主党努力踩下了刹车；2008年也是如此。\n\n如今，战争撕裂了我们的国家，修复这片破碎大地的重任将落在民主党身上。我们将不仅仅是修补战争带来的直接伤害，更要扫除紧缩政策和涓滴经济的腐朽残余。我们必须奋力重振美国工业，重建那些残存的废墟。同时，也是由我们民主党人来抚平分裂，揭开谎言的迷雾。无论是极左还是极右的恶魔，最终都将由我们来击碎。\""
 bdnspch.3.a: "\"我们是未来的党！\""
 bdnspch.3.b: "\"我们，呃，不好意思，总之……\""
 bdnspch.4.t: "林肯主义的残余"
 bdnspch.4.d: "\"我要向《堡垒》杂志、《电讯》杂志以及亚伯拉罕·林肯项目的工作人员表达由衷的感谢，感谢你们的盛情邀请。得知仍有一部分保守派保持着清醒的头脑，这确实令人感到宽慰！回顾我的职业生涯，我见证了政治的风云变幻，那些如已故的伟大人物小威廉·F·巴克利、才华横溢的珍妮·柯克帕特里克，以及布什总统等，他们虽坚定保守立场，却仍矢志不渝地为国内外民主事业而奋斗。\n\n然而，当我目睹共和党的现状时，心中却不禁涌起一股沉重之感。共和党，这个自林肯时代起便与我们并肩前行的坚实政党，如今却深陷权威主义与反民主堕落的泥潭，其程度之深前所未有。但在此刻，看到在座的各位，我的心情又变得轻松起来。我看到了像前众议院议长瑞安、参议员麦康奈尔和科宁这样的政治精英，也看到了像珍·普萨基和戴维·弗伦奇这样为捍卫民主而战的勇士。我深知，林肯、艾森豪威尔和里根的遗志在你们身上得到了传承。我坚信，当共和党摆脱非法统治的罪名时，选民们定会给予一个焕然一新的共和党应有的认可，让它在重建的美国中占据一席之地……\""
 bdnspch.4.a: "\"因为我们会教会美国人民，如何民主地表达异议！\""
 bdnspch.4.b: "\"因-因为我们希望……呃，得到些帮助，让美国再次伟-再次完整起来\""
 bdnspch.5.t: "取胜之战"
 bdnspch.5.d: "\"三军将士们，值此混乱与悲伤之际，我来到你们面前。我们的国家正被一场残酷的战争撕裂，这场战争由一个人的无穷野心为导火索，由其狂热拥趸所引爆。唯有凭借武力，我们才能赢得胜利，才能击败这暴君，以及所有狼狈为奸残害美国同胞的鼠辈。对我面前的将军和指挥官们而言，速战速决，早日结束这场战争是我唯一的期望。\n\n如果我们不战胜那些与我国民主制度，与世界上历史最悠久的民主制度为敌的人，那么我们的国家将由一个不受任何法律约束的独裁者领导。我们将任由武装叛匪们所摆布。我们的权利：选择结婚对象的权利，何时生育的权利，允许印刷什么的权利，允许信奉什么宗教的权利，都将被剥夺。我们别无选择，只能为我们所珍视的一切而战，为我们的家人而战，为我们的民主制度而战，为我们的权利而战。全国上下都指望着你们了。\""
 bdnspch.5.a: "\"不要让我们的祖国堕落！\""
 bdnspch.5.b: "\"还有，我……呃我们……为之而战的事业……嗯\""
 bdnspch.6.t: ""
 bdnspch.6.d: ""
 bdnspch.6.a: ""
 bdnspch.6.b: ""
 bdnspch.7.t: "援助无人援助者"
 bdnspch.7.d: "\"黑色、棕色人种的生意遍布全国各地，且一直都在飞速发展。从零售批发再到科技，少数族裔在众多领域取得了长足的进步。然而，数百年来不平等与压迫的痛苦回忆仍未抚平痊愈。当下，少数族裔创立的企业从银行获得的贷款较白人更少，少数族裔借款人违约会面临较白人更严厉的处罚。法规也未能公平执行，系统性的种族主义，让无数人没法从政府处获得他们所需的援助。我们已经走了这么远，可我们还有很多事要做，令人感慨不已。\n\n我准备在国会推动一项立法，以改善不公的现状。必须再无红线。不同人种要完全融合，必须能平等获得信贷、补贴、税免的机会。必须再无‘食品荒漠’。企业不得再基于对犯罪的错误忧虑歧视某些地区，各地区都必须能平等获得食品。我们还必须把那些缺少代表的社区的企业家推上舞台中央，网商必须优先推广少数族裔的企业。最最重要的是，我们必须从心认可我国的少数族裔，让平等深根在我们的脑海里，他们是值得我们尊重的平等公民。\""
 bdnspch.7.a: "\"我们不能落下他们。\""
 bdnspch.7.b: "\"我们——我们——我，不过，嗯，呃……\""
 bdnspch.8.t: "你上得起大学了！"
 bdnspch.8.d: "\"托马斯·杰斐逊坚信，教育是构筑健康民主社会的基石，是民众学习掌握参与社会基础知识的源泉，更是抵御欧洲旧时代无知与冷漠的屏障。美国素以丰富的教育资源而自豪，从历史悠久的常春藤盟校到知名的三姐妹学校，再到西部璀璨的学府，无一不彰显其学术辉煌。然而，这一宝贵资源曾长期被社会上层所垄断：新英格兰的精英寄宿学校直接为哈佛、普林斯顿、耶鲁等顶尖学府输送人才，而西部的名门望族也竞相将子女送入伯克利与斯坦福深造。直至二战后《退伍军人权利法案》的出台，普通美国人才得以有机会踏入神圣的学术殿堂。\n\n然而，自那以后，学术界却再次逐渐演变为精英阶层的竞技场。尽管平权行动等政策在一定程度上促进了机会平等，但其效果仍远远不够。美国最杰出的劳动阶层子女往往被顶尖学府拒之门外，而更多家庭则根本无法负担公立学校的开支。即便有幸入学，学生也常感负担沉重：支付高得离谱的学费，只是为了过上与父母一样的生活。我们放任了人文科学系的衰落，曾引领世界的科学研究也陷入停滞。越来越多的美国人因选择高昂的学费而放弃求学之路。现在是时候采取行动，确保每个普通美国人都能享有接受高等教育的机会了。\""
 bdnspch.8.a: "\"是时候让人人都能上得起大学了！\""
 bdnspch.8.b: "\"是时候让人人都能，都能上得……呃……\""
 bdnspch.9.t: "签署《经济自由法案》"
 bdnspch.9.d: "\"我对参议员伯尼·桑德斯与伊丽莎白·沃伦为帮助美国人民所做的不懈努力深表感激，这一法案正是他们辛勤努力的结晶。当前，贝拉克与我曾面对的经济衰退已逐渐散去，但其对普通民众所造成的创伤依旧深刻，尚未抚平。在全国大部分地区，旧有的经济模式已显露出疲态，难以支撑未来的发展。尽管工业领域正迎来复苏的曙光，但那些依赖煤炭等过时产业的地区却难以轻松重拾生机。更为严峻的是，少数族裔社区长期笼罩在贫困与种族主义的阴影之下，亟需更为有力的政策来打破这一沉重的历史枷锁。现代社会的快速变迁与过去遗留的复杂问题交织在一起，迫使我们不得不尽快寻找一种脱困之法，而《经济自由法案》正是这些问题的解决之道。\n\n该法案将构建起一套全面而坚实的失业人员援助体系，也将推出一系列助力工人从衰退产业中顺利转型的创新方案。而对于那些深陷债务与贫困泥潭，只能靠领救济为生的美国人来说，这项法案不仅将为他们提供必要的经济援助，更将赋予他们通过教育等多种途径提升自己的宝贵机会。\""
 bdnspch.9.a: "\"美国人民不再需要为生活而奔波劳碌了。\""
 bdnspch.9.b: "\"美美国人，嗯，呃……\""
 bdnspch.10.t: ""
 bdnspch.10.d: ""
 bdnspch.10.a: ""
 bdnspch.10.b: ""
 bdnspch.11.t: "拜登医改计划"
 bdnspch.11.d: "\"如此多的美国人还在为医疗债务、缺乏医疗资源或未得到治疗的疾病而挣扎。如今，我们的国家四处凋敝，众多的美国人居然还在因早已被认为根除的疾病丧命或受苦，易于获得、负担得起且高质量的医疗服务比以往任何时候都更为必要。我们以往关于如何制定医疗政策的假设已不再适用，我们需要远超过去的解决方案。即使是《平价医疗法案》——奥巴马-拜登政府的重要立法支柱，如今也已经不足。我们需要的是一个为所有美国人服务的医疗系统，无论他们的年龄或既有健康状况如何，都能应对当今美国人民面临的种种挑战。\n\n这个全新的医疗体系将以患者为中心，而不是围绕制药公司的利益。它将是真正负担得起的医疗，而不仅仅将为保险公司提供更多的免费客户。今天我们无需妥协；当下是非常时期，我们必须采取非常手段。坦率地说，我们的共和党朋友们没有能力阻止我们。我们完全有机会实现拜登-奥巴，抱歉，奥巴马-拜登政府最初的设想！\""
 bdnspch.11.a: "\"这是美国人民所应得的！\""
 bdnspch.11.b: "\"贝拉克，呃，然后我呢，这个……\""
 bdnspch.12.t: "通过《约翰·刘易斯投票权法案》"
 bdnspch.12.d: "\"美国一直不平等地对待其公民，纵容了许多不公正的行为。美国黑人和棕色人种曾经是奴隶，后来则沦为二等公民，即使在今天他们仍然生活在过去苦难的沉重遗产之下。美国已经以各种方式为自己的原罪付出了代价，忏悔必须到来。我们必须加强我们的第一次内战之后最初构想的、由《民权法案》正式确定的东西——所有公民都必须能够平等地参与我们的民主，有平等的代表权。\n\n有了这项法案，我们就能在实现种族平等的漫长道路上再向前迈出一步。我们将再无歧视性做法。所有重新划分选区的工作，所有与投票有关的法律，都必须经手联邦政府。‘杰利蝾螈’将不再被允许，基于种族、阶级、地域或政治派别的歧视将不再对选区划分产生任何影响。政治游戏将不再干扰我们民主的基本功能。\""
 bdnspch.12.a: "\"投票是神圣的，如今其更是拥有了充分的保护。\""
 bdnspch.12.b: "\"投、投票是，那啥，票子，呃呃……\""
 bdnspch.13.t: ""
 bdnspch.13.d: ""
 bdnspch.13.a: ""
 bdnspch.13.b: ""
 bdnspch.14.t: "本分之财"
 bdnspch.14.d: "\"许多保守主义者认为，不受监管、完全自由的市场是最好的选择。回顾我们的历史，我并不认为这是正确的。镀金时代的冷酷暴行以及此后发生的无数公司恶行证明，不受监管的市场与社会主义一样具有破坏性，在一些关键领域更是如此。如此多的公司将它们同胞的福祉放在第二位，而将利润作为企业的唯一目标。他们说，贪婪是好的，保留一点自私是健康的。这种愚蠢的想法造成了无数的痛苦。涓滴经济学和离岸外包导致社区崩溃，而超级富豪们却从中获利。\n\n不是每个商人都是邪恶的，也不是每个投资者都只考虑自己的利益。然而，行自利之举的冲动和动机并不会因为良好的意图而消失；必须要以政策来和它们斗争。企业必须将部分利润用于公共利益，他们不应该能够通过漏洞来逃脱惩罚。我们还必须确保商人永远无法主宰我们的政治，永远无法自筹资金来使我们最终走向独裁。\""
 bdnspch.14.a: "\"美国企业必须站在美国的一边！\""
 bdnspch.14.b: "\"企、企、企业，这个……\""
 bdnspch.15.t: "充满活力的宪法"
 bdnspch.15.d: "\"有些人认为我们的宪法是一个不变的、停滞不前的东西。他们坚持\"原意主义\"的原则，即宪法的解释应当顺应他们所认为的国父们当时的想法。但很遗憾的是，国父们已经离我们而去很长时间了。我们也并不知道他们究竟想要什么。坦率地说，他们甚至不会明白我们的世界已经发生了多么大的变化。他们没有互联网、突击武器或任何其他从根本上改变了我们生活方式的现代创新。我们干嘛还要接受他们写的东西呢？\n\n我们的国父们也知道他们的能力也是有限度的。他们知道这些制度需要有能力适应和改变，因此他们还制定了一套修改宪法的制度。除了《权利法案》之外，我们已经增加了15项修正案，它们共同定义了我们的价值观以及我们民主的运作方式。少数族裔、妇女和所有美国人的权利都得到了巩固。美国最近发生了很大变化，我们需要重新审视宪法。我们必须像国父们那样看待整体；我们必须创造一些新的东西，一些适合我们国家多样性的东西。\""
 bdnspch.15.a: "\"我们必须继承旧事物的优点，创造性地弥补旧事物的缺点。\""
 bdnspch.15.b: "\"我们，呃，必须，嗯……\""
 bdnspch.16.t: "国家重生"
 bdnspch.16.d: "\"我的美国同胞们：我们正处在即将崩溃的十字路口，面对着今日美国故事的真实写照。支撑这个国家从大西洋到太平洋，移山填海平息万难的，是一个词：正直。自从我们上任以来，这个国家的正直更是在这动荡的时刻中得到了进一步的提升。朋友们，我成长在一个充满自信、忠于自我的美国，这个国家追求的是每个人都能获得同等的机会，不再为逆境而忧虑，不再在深夜期盼新的梦想。因为美国梦已经在那里，触手可及，只要他们跨过这片荣耀之海。这场日益加深的危机只证明了我们对抗暴政的正义力量和决心，所有美国人都会牺牲一切，克服逆境。我们是一个行动着的国家，面对独裁者时我们不会无所作为，而是将尽一切所能前进。我们有能力修复梦想，而不是将梦想丢入尘埃。让我们再重申一遍：混乱和痛苦可以使我们的国家支离破碎，但它们绝不会摧毁希望。这场斗争真正关乎未来，关乎这个国家的灵魂。\""
 bdnspch.16.a: "\"因为这里是美国。\""
 bdnspch.16.b: "\"因……因为……这里蛮美的……\""
 bdnspch.17.t: "加强市场"
 bdnspch.17.d: "\"朋友们，欢迎。我将简要谈谈我们的市场状况以及如何真正振兴我们的经济。美国的强大有赖于从制造业到中产阶级各个部分的紧密联系，这些领域的巨大飞跃正是我们市场的基础，同时也是摆脱对经济的失败主义所必须的。我们的政府正在积极确保国家安全运转，让消费者可以放心追求他们的目标。美国产品和美国工作都将融入市场增长和经济创新的领域，这是我们支持企业和机构，为一个更安全、更可持续的美国奠定基础的核心。特殊利益和制度漏洞将不再有机会削弱我们的繁荣，一片繁荣的海洋就在前方，我们的努力也将会得到集中和协调。\""
 bdnspch.17.a: "\"因为这从来没有让美国失望过。\""
 bdnspch.17.b: "\"因……因为这，美国，望……忘了。\""
 bdnspch.18.t: "深影随行"
 bdnspch.18.d: "\"我的美国同胞们，今晚我将就当前笼罩着，置我国于水火之中的危机发表讲话。每一天，每一个人都无法逃避战争所带来的沉重负担，我们神圣的制度为战争所留下伤痕，那些为一个小丑国王而战的叛徒们不断迫使我们在灵魂中滋生恶意，使得我们我们心中暴力与毁灭的阴影日益加深。各位同胞，我和我的政府回顾了我们历史中的种种关键决策，以寻求应对之策。这一局势迫使我们必须采取强制性行动。这包括与美国人民之间更紧密的综合合作，例如扩展必要的监控网络，使其覆盖到每一个角落，以确保这个国家不再生活在恐惧之中，而是感到安全，不再每天面对战争的恐怖爪牙。当我年轻时，我的家庭总是担心战争的代价，担心自己会因社会中的颠覆性势力而沦陷于暴君的统治中，而今天这些势力每天都在肆无忌惮地壮大。今天的措施，是为了进一步预防内部的破坏，以确保在我们争取自由的斗争中维持稳定的局势。\""
 bdnspch.18.a: "\"愿上帝保佑美国。\""
 bdnspch.18.b: "\"妈呀，上帝保佑美，美……\""
 bdnspch.19.t: "宪法优先！"
 bdnspch.19.d: "\"人民的意志在我们的制度中得到了无比深刻的彰显。宪法让我们明白，纵使处于最脆弱的前沿，我们的国家依然是坚定不移的民主守护者。这份神圣的文件，其独特性正是对美国生活方式的永恒守护，它从未被那些觊觎权力、心怀叵测的暴君所篡夺。当暴君降临时，我们的人民将一如既往，以坚韧的抗争回应。这种抗争的精神，深深植根于美国的心灵与灵魂。我要再次强调：这一切都源于我们的国父，是他们在面对自身暴政时，怀抱信念，撰写下这些神圣的篇章。在风雨飘摇之中，我们总能回望开国先驱的宏伟命运，他们为这个国家开辟了前行的道路，迎击危机，追求希望。愿这伟大的国家永远铭记这些不朽的言辞。\""
 bdnspch.19.a: "\"我们即人民。\""
 bdnspch.19.b: "\"我们，呃，整挺好。"
 bdnspch.20.t: "硅晶之梦"
 bdnspch.20.d: "\"大家好，很高兴再次回到北弗吉尼亚，这里总是能让我暂时忘却华盛顿的纷扰。刚刚我还与谷歌的首席执行官皮查伊先生探讨如何应对来自占领区的虚假信息与恶意传播。他让我意识到，如今的数字空间——互联网，已经成为一片与任何实际战场同等重要的战地。他提到一些与敌方勾结的网络喷子，竟然假冒我的身份，差点将一列满载医疗物资的火车重新调度！你能相信吗？简直是匪夷所思！\n\n皮查伊先生和几位同行最终得出了一个结论——使用他们的服务是一种特权，而不是权利。因此，许多敌人现在无法再访问谷歌的服务，苹果、微软、彭博等设备也被迫停止运作。再加上他们被切断了SWIFT系统，我想那些叛徒们一定会头痛不已！\n我只想说，美国的企业真是无比卓越。没有他们，我们不可能拥有今天飞机上的高科技设备、便捷的银行服务，甚至大多数我们习以为常的产品也离不开他们的支持。\""
 bdnspch.20.a: "\"而且他们还在不断创造奇迹！\""
 bdnspch.20.b: "\"我…我只能希望你们，呃，做些，嗯，好事吧。\""
 bdnspch.21.t: "步枪，子弹，全都要"
 bdnspch.21.d: "\"你们看看，对于那些习惯了组装汽车零件的人来说，转去生产军火也许显得有些突兀，但我相信你们会很快掌握其中的诀窍。这就是美国精神所在：面对危机，适应最严峻的环境，并从中开辟新的希望。几年前，谁能料想到一个人竟能篡夺我们的民主？但他做到了，如今我们必须肩负起我们的责任，所有人都责无旁贷。所以，即便你们会抱怨加班福利，甚至发些牢骚，我坚信你们终将履行自己的义务，毕竟，你们是美国人！\n\n当你们抛光每一颗子弹时，想想无数美国同胞依旧在暴政的压迫下苟延残喘。无论是极端势力，还是丹佛的暴君，我们国家的法律体系和机构正面临威胁。永远铭记，或许你们手中制造的这颗子弹，正是击倒那些妄图成为独裁者的利器！你们打造的坦克，也许会成为丹佛、洛杉矶、波士顿疲惫民众迎来解放的第一缕曙光。你们制造的飞机，将摧毁敌人的堡垒，为自由开道！\""
 bdnspch.21.a: "\"您所在此处建设之物将决定整个战争的走向！\""
 bdnspch.21.b: "\"等-等-等-现在看着，好吧……\""
 bdnspch.22.t: "继续运转"
 bdnspch.22.d: "\"我们生活在一个前所未有的信息时代，每个经济领域的关键环节都暴露在我们眼前。但我要告诉你们，我亲眼目睹过，画面并不美好。我们成了一个消费至上的国度，近来几乎没什么生产。而这一点，必须改变，且正在改变。然而，我们对经济的认知也逐渐荒废。太多聪明的大学毕业生被推向‘三大公司’，在那经历一场地狱般的轮回，却从未有机会直接为国家效力。这场战争，尽管如此残酷，却带来了新的契机。\n\n那些顶尖大学的毕业生，必须被召集起来，帮助我们的军队管理后勤。他们应加入监管机构，确保企业为战争付出应有的代价，不从中攫取利益，不浪费宝贵资源。我们必须确保，每一个普通的美国人有饭可吃，每一名英勇的美国士兵都有力气战斗。\""
 bdnspch.22.a: "\"美国需要智者！\""
 bdnspch.22.b: "\"美国，嗯，额，呃……\""
 bdnspch.23.t: "自动化正自动化中"
 bdnspch.23.d: "\"鄙人才疏学浅。但仍知悉此物重要性，美国最为卓越之人正着手研发此巧技。我最近同萨姆·奥尔特曼会面，他称这项技术可能会成为战争的制胜法宝。虽然现在看起来可能有点，呃，不可思议，但我听说它在未来几年甚至几个月内会呈指数级进步。\n\n在这个领域，我们比丹佛暴君有绝对优势。这项技术能把我们从各种基础的文书工作中解放出来，空出的宝贵资源转投战争事物。很快，我们还能用人工智能来指挥无人机，总结战场信息，何时何地调配需要的资源。无需人工投入：革命的一击！\""
 bdnspch.23.a: "\"这玩意儿看起来挺聪明的！\""
 bdnspch.23.b: "\"那个，呃，你看……\""
 bdnspch.24.t: "拿到我们要的"
 bdnspch.24.d: "\"亲爱的美国同胞们，或许你们已经注意到，工作场所中正悄然发生着一些变化。有人开始投身于军事物资的生产，另一些人则被调动，与军方协作，确保物资能够顺利抵达前线士兵手中。你们或许会困惑，‘我在一家会计事务所工作，为什么要做这些事情？’这似乎有些不合常理，但我向你们保证，这一切都是必要的。战争的进程需要一张庞大的网络，需要每一位美国公民的全力奉献。我们的军队日益壮大，急需有能力的人来为其迅速扩张扫清障碍。\n\n其中一个障碍便是企业的干预。我们不针对任何具体的公司，但我们清楚地知道，有些人企图通过所谓的‘小数误差’或其他手段，逃避他们在战争中的责任。我们需要每一个公民的协助，确保这样的事情不会发生，或者在它发生时能够及时被揭露。我们还必须保证，没有人从中牟利，擅自截留本该送往前线的宝贵物资，为了个人利益损害我们士兵的福祉。\""
 bdnspch.24.a: "\"您的辛苦劳作将成为击溃民主之敌的利刃！\""
 bdnspch.24.b: "\"你-现在，帮我，别废话……\""
 bdnspch.25.t: "人人投入工作"
 bdnspch.25.d: "\"费城，你好！兄弟之爱的城市。在很长一段时间里，它是美国工业的巨人。也曾一段时间里，衰落过。但现在，它正在复苏，而且会迈向巅峰！这场战争证明，过去政府的许多优先事项，完全本末倒置：认为我们的敌人来自国外，而不是国内；认为工业可以简单地转移到海外，而不产恶果；认为美国可以忍受失业。不！美国不就是要让人人都能追求幸福而建国吗？人若寻不到工作，还怎么追求幸福？！种种旧时代的错误，我本不希望非得经历内战，才能让华盛顿明白这点。但至少，我们现在走在正道上。\n\n国家现在需要生产炸弹和坦克，但当一切尘埃落定后，我们会，我们会……抱歉，我们会打起十二分精神重建！我们的国家会再次成为世界工业的巨人！我们会像对待新冠疫情一样对待失业。失业是一种病毒，需要根除的疾病。让男男女女都找到工作，还让他们获得抚养家庭所需的育儿经济帮助。\""
 bdnspch.25.a: "\"让美国重拾得工作！\""
 bdnspch.25.b: "\"我们要，呃，好吧，制作……\""
 bdnspch.26.t: "拉拢企业"
 bdnspch.26.d: "\"一杆枪要他妈一万美元？！你在搞笑吗？！那我知道我们为什么还没打赢了。华尔街的这帮肥猪心里没有一点爱国主义！我就这么说。这场战争期间我们没有国有化任何一家公司，一家都没有！我们也没有强迫任何企业领导人下台。然后，这就是企业界报答我们的方式？！真是滑稽。我们国家需要每个公民效忠。那么多工人竭尽全力为我们的军队生产设备，结果他们的老板心里就惦记那点钱！\n\n故此，为了成千上万被趁火打劫的战争难民，为了因弹药不足而牺牲的士兵，为了缺水的城市，我将签署《国家反敲诈法案》。这项法案将把所有公司置于更广泛的监管之下，每位为战争做出贡献的大公司都将配备一名联邦官员。你们要为我们的国家尽自己的一份力……\""
 bdnspch.26.a: "希望诸位不要敬酒不吃吃罚酒"
 bdnspch.26.b: "不然，不然，不然，会，额……"
 bdnspch.27.t: ""
 bdnspch.27.d: ""
 bdnspch.27.a: ""
 bdnspch.27.b: ""
 bdnspch.28.t: "打赢数字战争"
 bdnspch.28.d: "\"失去硅谷是我们国家遭受过最沉重的打击之一。短短几天内，数十个国家主要技术创新者的服务器就都落入了恶意势力手中，他们随后利用这些服务器在数字世界传播其激进思维。然而，美国的创造力总是领先一步；我们的国家顶尖计算机科学家和工程师在华盛顿重新集结，几乎从零开始重建了网络，让我们能够在互联网战争中与之匹敌。\n\n如今，我们正处于前所未有之大变局，人工智能、新的通信软件和无人机技术都使我们能够进行这场战争，并在敌人面前占据必要的优势。即使在战争中，美国仍然是世界创新的中心，是世界日常使用的所有技术的枢纽。在马克·扎克伯格、蒂姆·库克和比尔·盖茨等巨头的帮助下，我们将不止在战场上赢得战争，更要在数字空间提防网络攻击和恶意侵略。\""
 bdnspch.28.a: "\"我们的国家会夺回网络！\""
 bdnspch.28.b: "\"哦-哦，好吧，额，嗯嗯……\""
 bdnspch.29.t: "美国依旧美丽"
 bdnspch.29.d: "\"沃尔顿太太让我来这里为你们带来一点‘慰藉’。不过，这天热得像地狱，而你们还得在这里忍受，所谓的‘慰藉’听起来也不尽如人意。但无论如何，我想借此机会表达我的感激之情，美国对你们——那些超市员工们——充满了无限感激。在疫情横行的日子里，如今又在战火的阴影下，你们依然勇敢坚守，确保清洁健康的食物送到那些真正需要的人手中。面对配给制的压力，你们站在前线，不畏顾客的愤怒，坚定执行着那一条条维持物资供应、保障士兵口粮的规章。我无以言表对你们的感激。\n\n我父亲也是一位勤劳的工人，他总会把我们叫到身边，时常提醒我们该如何珍惜生活在这个国家的幸运。‘在美国，我们可以随时走进商店，买到所需的一切，甚至更多，’他总是这样说。他让我们坚信，这是一种特权。而我们，作为政府的职责，就是要让这种特权继续存在。而你们，还有全国成千上万与你们一样的人，正是这‘美国梦’的守护者，维系着它的火焰永不熄灭。\""
 bdnspch.29.a: "\"没有您，我们便宛若身处危峡。\""
 bdnspch.29.b: "\"没-好吧，嗯，这很有趣，真的很有趣……\""
 bdnspch.30.t: "义无反顾"
 bdnspch.30.d: "\"亲爱的美国同胞们，近期颁布的法规将深刻影响你们的日常生活。作为总统，我有责任向你们说明这些新规为何至关重要。我们正身处一场战争中，一场与当年我们在二战中为自由而战的伟大征途无异的战争。在那段岁月里，美国人民不得不舍弃一些额外的享受，让至关重要的资源流向工业和前线的士兵。当时，每个家庭都被发放了配给卡，明确了他们可以购买的物品和数量。人们被号召捐献废金属和各种工具，以支援战争的需求。如今，类似的倡议也将送达你们手中。\n\n我知道这将是一段需要适应的过程，我也理解在物资紧缺时的挫折感。但请记住，无论你们暂时失去了什么，它都将成为某个士兵的光亮，在他孤身躺在内布拉斯加或达科他州寒冷战壕中的某个时刻，点燃希望。美国曾经迎接过更为艰难的挑战，我坚信，你们拥有足够的勇气和毅力，去迎接这些考验并最终战胜它们。\""
 bdnspch.30.a: "\"唯有获得您的支持，我们才能夺得胜利！\""
 bdnspch.30.b: "\"唯有-有，现在看着……\""
 bdnspch.31.t: "钻，额，姑娘们开挖！"
 bdnspch.31.d: "我还是个孩子的时候，美国的工业力量把纳粹逼入坟墓。我十几岁的时候，美国受全世界敬慕。我第一次成为参议员的时候，国家还能蹒跚前行，但裂缝已显现。现在，我这个总统，却代表一个几乎不生产任何消费品的国家，一个几乎无法应对全球疫情、为战争提供燃料的国家。我们一直在努力解决这些问题，但第一步不是造工厂。而是这里，矿井，重拾传统的原材料开采。挖掘原材料不是为了出口海外，而是为了国家的存亡。\n\n这看起来像我那个年代的事，但这个新矿会是成千上万工作岗位的源泉，良性循环有助解结束战争。我保证，纵使取胜之日来到，工业还会继续运转！在你们的劳动下，我们能打倒丹佛的暴君、除掉共匪与纳粹！"
 bdnspch.31.a: "由你们把匕首刺进独裁者的心脏！"
 bdnspch.31.b: "你，你，额，你会……"
 bdnspch.32.t: "欢迎难民！"
 bdnspch.32.d: "\"确实是我的妻子，吉尔·拜登博士，让我注意到居住在马里兰州难民的困境。你们亲历如此多挑战，目睹暴行肆虐，家园毁于暴力。我钦佩你们的韧性，整个国家都钦佩你们。想想看，我们政府居然安置不了你们。但一些伟大的美国同胞互帮互助，提供了他们的住房，但这远远不够。全国都处于困难时期，每个人都在挣扎求生，没什么人能空出额外的空间。听说你们最近才得到帐篷？\n\n好吧，这种情况即将结束。今天，我将签署拟议的难民援助法案，帮助你和无数其他难民获得所需的援助。我们会扩大后勤网络，在地方一级建立行政机构，以便重新安置、援助难民。把食品和医疗用品送到有需要的地区。\""
 bdnspch.32.a: "我们不会忘记你！"
 bdnspch.32.b: "我们-我们-我们，我们会，先等一下……"
 bdnspch.33.t: ""
 bdnspch.33.d: ""
 bdnspch.33.a: ""
 bdnspch.33.b: ""
 bdnspch.34.t: "集结"
 bdnspch.34.d: "\"太多年轻人没有回应祖国的召唤。这是何等悲哀，我们的征兵站空无一人，只有征兵令才能将人们送上前线。我知道你们每个人都心怀爱国之情。我理解你们的心情，你们看到自己的亲人在一个疯子的压迫下生活，看到身边同学被极端分子的虚假宣传所蛊惑。你们生活在一个有史以来最为疯狂的时代。老天，我出生时希特勒还在掌权，但我觉得你们如今的处境比那时更艰难！\n\n正因为如此，我们才需要一些大想法，而我知道你们正拥有这样的想法。我知道你们渴望帮助国家，渴望看到国家再次团结、强盛。但过去你们所做的——上学、工作，已经不足以应对当下的局势。军队现在比以往任何时候都更需要你们和你们的智慧。我们需要工程师、飞机技师和焊工。我们需要那些勇敢的少数人站在前线上。我们需要指挥官和管理人员。最重要的是，我们需要更多的美国人回应祖国的号召。\""
 bdnspch.34.a: "\"你们都会回应的！\""
 bdnspch.34.b: "\"我手机咋响了，呃……\""
 bdnspch.35.t: "战向巨魔"
 bdnspch.35.d: "\"长久以来，互联网成了仇恨与分裂的温床。我们眼睁睁看着无数年轻人被卷入深渊；如今，有多少人为了丹佛的暴君走向战场，只因他们在那些网络聊天室中被激化？面对这一切，爱与团结的力量曾无从回应，直到最黑暗的时刻，抵抗运动在第一届政府的阴霾中诞生。他们利用平台，勇敢反抗他的阴谋与腐败，揭露他与外国敌人之间的秘密交易。今天，我怀着荣幸之心，在白宫迎接这些无畏的斗士。\n\n像哈里·西森和达什·多布罗夫斯基这样的青年，正是我心目中每个年轻人应当追随的榜样。他们是坚定的美国爱国者，不是散播仇恨的民族主义者，而是怀抱爱国热忱的人。还有帕德兰先生（在社交媒体上以‘布鲁克林爸爸’为名），这样的父亲，以及艾莉森·吉尔这样的母亲、祖母——她的播客曾为我们解读穆勒报告中那些令人惊恐的真相。这些公民行动的楷模用实际行动诠释了他们对国家的关切。我真心希望，更多的美国人能以他们为榜样，勇敢对抗那些暴君及其同伙所贩卖的谎言与宣传。\""
 bdnspch.35.a: "\"不要为说出真相而感到恐惧！\""
 bdnspch.35.b: "\"现在的小逼孩子，哎呀，想到我当年那会……\""
 bdnspch.37.t: ""
 bdnspch.37.d: ""
 bdnspch.37.a: ""
 bdnspch.37.b: ""
 bdnspch.38.t: "美国，依旧美丽"
 bdnspch.38.d: "\"置身于伟大的托马斯·杰斐逊故居——他所钟爱的蒙蒂塞洛，我比以往任何时候都更深切地感受到历史的厚重。我们的革命先贤所怀抱的希望与梦想，在他们的时代并未完全实现，这一路充满了流血、艰辛与政治分裂。1776年、1789年、1865年的美国，并未真正体现《独立宣言》中的理想；直到1913年，美国人民才开始直接选举参议员；直到第十九修正案通过，女性才获得选举权；黑人和棕色人种直到1964年才赢得应有的民权。然而，美国做到了这一切——我们曾经兑现承诺，并将继续履行这一承诺！\n\n美国是一种理念，是一个美丽的理想，认为无论性别、背景、文化或信仰如何，各行各业的男女都能汇聚一堂，共同繁荣。那些开国元勋们仅有朦胧认知的理想，已在今日的美国具象化——无论是跨性别者、黑人、同性恋者或是西班牙裔，无论贫富，每个人都可以追求并获得繁荣。这就是美国梦，它是真实的，它每一天都在这个国家的企业家、社会工作者和无数父母身上鲜活呈现。\""
 bdnspch.38.a: "\"当我们重建完毕，理想将成为现实。\""
 bdnspch.38.b: "\"杰斐逊，呃呃，不过他的奴，奴，奴隶们整得还挺好……\""
 bdnspch.39.t: "尊重军队！"
 bdnspch.39.d: "\"美利坚正面临前所未有的挑战，而你们，全体勇士，已毫不犹豫地挺身而出。我们这个国家最珍贵的价值观，正遭遇四面八方的袭击——无论是共产主义者、法西斯主义者，还是丹佛独裁政权的势力，都已经公然撕下民主的伪装，直言要摧毁我们的制度，取而代之的是冷酷无情的专制暴政。你们目睹了他们的暴行，立刻奋起，寻找阻止它们的途径；你们得知敌占区的同胞正在承受苦难，便毫不犹豫地加入了这个国家最大的援助行动。你们怀揣着信念，誓要守护那些使我们的共和国屹立于世界之巅的价值观。你们做到了，甚至做得更多！\n\n然而，有些人却视你们的行动为卑微，甚至称你们为罪犯。我听到一些政客贬低你们的牺牲，称你们的英勇为多此一举，甚至说这是‘残酷’的行为。抗议者在街头游行，呼吁与那些向他们、向全体美国人发动战争的恐怖分子媾和。我仍记得，当我的儿子博在乌克兰——不，伊拉克——服役时，是如何被这些人对待的。我深知，为了人权奋战，归来后却遭遇冷漠的痛楚。但我要告诉你们：我们决不会向这些人屈服。我们将战斗到底，并最终赢得这场战争。\""
 bdnspch.39.a: "\"我们永远都会尊重军队，绝不会忘记他们所作出的牺牲。\""
 bdnspch.39.b: "\"我-我，好，我不会，额，好，你做了……\""
 bdnspch.40.t: "平等机会"
 bdnspch.40.d: "\"每一天，我都为美国女性的卓越成就而惊叹。尽管在历史的长河中，她们曾被视为二等公民，但一旦那些虚伪的枷锁被解除，她们便如彗星般迅速崛起，在科学、政府与商业领域中脱颖而出。曾经压迫女性的种种理由被包装成‘为了她们的利益’——认为她们心智浅薄、易受影响、天真无知，不配与男人平等而立。她们的归宿被限定在家庭中，诚然，在家庭里她们表现得卓越非凡，但她们的才华完全可以在更广阔的天地中绽放光彩。\n\n那么，是什么阻碍了女性进入武装部队呢？试着给个理由吧，但别让自己听起来像那些曾经认为女性不可能独立工作、无法自立谋生的陈旧思想家——那些认为女人不能拥有财产、不能管理企业的顽固派。我敢说，女性的责任感不逊于男性，甚至比许多男人更为出色。科学也早已证明，女性在领导力和团队协作方面往往胜过大多数男性。\""
 bdnspch.40.a: "那正是我们军队所需要的精神！"
 bdnspch.40.b: "女人也可以和男人一样为国捐躯！"
 bdnspch.41.t: ""
 bdnspch.41.d: ""
 bdnspch.41.a: ""
 bdnspch.41.b: ""
 bdnspch.42.t: "绝不后退"
 bdnspch.42.d: "\"在陆地、海洋与天空，我们的军队正为民主的命运奋勇拼搏。世间从未有过如此关乎全局的战斗。如果我们失败，国家将沦陷于暴君、法西斯、共产主义者，或更为可怖的势力手中。我们已取得巨大的进展，无数美国人重返家园，无数城镇得以解放，数不清的战争罪犯已伏法。但这一切伴随着沉重的代价：燃烧的草原，恐怖分子摧毁的国家瑰宝，以及无数战士的英勇牺牲。我深感每一位士兵如同我的子嗣——他们的死绝非徒劳。\n\n你或许会听到不负责任的记者、敌方的宣传，或是迷茫的民众在散播谣言、嘲笑所谓的失败。我们可能失去一片阵地，但每一寸土地都经过浴血奋战才会放弃。我们或许撤出一座城市，但撤离前必将确保他们不会享有片刻的安宁。敌人可能宣称他们的胜利，但我们将让他们的每一次‘胜利’都充满苦痛。他们说我们节节败退，而事实是，我们才刚刚开始。请看——\""
 bdnspch.42.a: "\"如果您没有信心取胜，那就站在我们身后！\""
 bdnspch.42.b: "\"如果你……嗯，不那什么的话……\""
 bdnspch.43.t: "中立即是一种罪过"
 bdnspch.43.d: "\"世上最可怕的人，莫过于那种面对邪恶之时却选择袖手旁观的人。无数美国人正日复一日地承受着战争的折磨，忍受着由一人暴政带来的苦难。对于这些人来说，所谓的中立简直是荒谬之至。你要么效忠于暴君，要么捍卫民主自由，除此之外别无他途！\n\n如今，许多所谓的评论家还主张我们对这位妄图加冕为王的暴君宽容以待。他们以为只要暂时喂饱这头猛兽，危机便会平息。但他们错了！那怪物将会卷土重来，而丹佛政权的狂热必将如瘟疫般蔓延，永远地污染我们的国家。我们不能将这场战争视作一场普通的内战，它关乎善与恶、爱与恨、希望与恐惧的最终对决。此时此刻，绝无中间立场，更不存在所谓的超然其上的‘第三条道路’。这是为了我们的民主、权利与未来的生死之战！\""
 bdnspch.43.a: "\"而这些绝不是可以轻易舍弃的！\""
 bdnspch.43.b: "\"而这，打仗的话就会，额……打仗！\""
 bdnspch.44.t: "未胜之战"
 bdnspch.44.d: "虽然我很感激田纳西大学今晚给我时间和大家交谈，但我恐怕会显得有点沮丧。我刚接到我的国务卿劳埃德·休斯顿的电话，他刚刚告诉我有一千人刚刚在前线阵亡。今天显然是血腥的一天。一千个人，你能相信吗？他们中的很多人和你们一样都还只是孩子。我肯定认识他们其中的一些。我必须认识。我在这么多士兵面前演说过这么多次。敌人让我们经历的一切，他们让这个国家经历的一切都是疯狂的！这都是为了什么？当一切都化为灰烬时，他们又能希望实现什么！？\n\n我们不会放过这一切的。当我们取得胜利时，我们将一雪前耻。那些凌弱暴寡、摇唇鼓舌和落井下石之辈将为他们所做的一切负责。叛徒将被赶出他们的城堡，他们的记忆将从这片土地上抹去。记住我的话，我们会赢的，"
 bdnspch.44.a: "\"当我们胜利之时，他们就将付出代价！\""
 bdnspch.44.b: "\"当我们，呃呃，他们就那啥了……\""
 bdnspch.45.t: "天空激战"
 bdnspch.45.d: "\"今天，我怀着沉重的心情向你们发出一个请求。正如你们已经清楚，我们的国家正面临着前所未有的危机，这场危机如黑云压顶，笼罩着我们每个人。残酷的现实是，每天都有生命逝去——无论是士兵还是无辜的平民。或许你们中的许多人，已经亲身感受到了这种苦难，家人或朋友正在忍受着难以想象的痛楚。在这样的时刻，似乎前路茫茫，仿佛希望遥不可及，但我们必须记住，为何要坚持这场战斗。我们不仅仅是在为自身的生存而战斗，更是在为更崇高的理想而战斗。我们捍卫的是自由，是民主的延续，是每个人得以在和平与和谐中生活的基本权利。\n\n我们的地面部队正在前线英勇奋战，承受着战火的最前线。他们的牺牲，是为了我们共同坚守的伟大理想铺就道路。他们的勇气和坚毅，筑就了我们未来胜利的基础。在这一至关重要的时刻，我恳请你们给予这些勇士坚定不移的支持。你们的工作，虽然也充满了挑战与压力，却同样具有无比重要的意义。你们在空中进行的行动，不仅仅是简单的战术部署，更是我们整个战略不可或缺的一环。你们的每一次飞行、每一场任务，都是决定战争走向的关键一步。请牢记，你们的奉献与努力，是我们共同胜利的基石。每一份心血、每一刻付出，都使我们更接近最终的目标。只要我们继续团结一心，坚守那些我们为之奋斗的价值与理想——\""
 bdnspch.45.a: "\"你们的功绩将永载史册，永垂不朽！\""
 bdnspch.45.b: "\"你们的那啥，呃，就给人记住了……嗯。\""
 bdnspch.46.t: "极限与超越"
 bdnspch.46.d: "\"第一战斗机联队的各位新晋飞行员，首先，请允许我向你们致以最诚挚的祝贺。完成训练绝非寻常之举，它象征着你们无数个不眠之夜的辛勤付出、坚定不移的决心和无与伦比的毅力。你们历经重重磨炼，今天的你们，是钢铁意志的化身。我为你们每一个人感到无比骄傲。然而，赞美之外，我必须坦诚告知，前方的路注定充满荆棘。未来的任务、即将到来的挑战——这一切都将以超乎想象的方式考验你们的勇气与智慧。你们即将面对的，不仅仅是艰难，更是危险，甚至是生命攸关的考验。你们的极限将被不断推向边缘，甚至超越。而在这看似不可逾越的困难面前，你们必须挺身而出，正如今天你们所表现出的那样，准备迎接一切挑战。真正的勇气，不是没有恐惧，而是能够在恐惧之中前行。如今的你们，将承载这份勇气，肩负起保卫祖国的重任。每一天都会带来新的考验，每一步都可能充满未知，但正是这些考验，才会塑造你们的伟大。你们即将踏上的征途，不仅关乎你们自身，更关乎整个空军，关乎这个国家的未来。推己极限，不仅是一种追求，更是一种必须。你们的每一个行动，都将被历史铭记，成为你们无畏精神的明证。\n\n最后，我希望你们牢记自己的格言——那句承载着你们心志的箴言，将成为你们前行路上最坚定的信念。让它引领你们走向荣耀，成为第一战斗机联队真正的传奇。\""
 bdnspch.46.a: "\"Aut Vincere Aut Mori，征服或死亡。\""
 bdnspch.46.b: "\"奥托，征服……或者死……死亡。\""
 bdnspch.47.t: "生产民主战机"
 bdnspch.47.d: "\"可敬的工人们，我今天站在你们面前，是要谈论一件极其重要的事情。你们在这里的工作不仅仅是一份工作；它更是对一项比我们自身更伟大的事业——民主事业的至关重要的贡献。我们所面临的任务呼唤着辛勤工作，同时也需要非凡的奉献和牺牲精神。你们精心组装的飞机、你们设计的导弹、你们储存的弹药——所有这些都在我们正在进行的斗争中都起着至关重要的作用。我知道你们一直在不知疲倦地工作，把你们的努力倾注到每一个零件中，为此，我深表感谢。然而，我们的严峻处境要求我们付出更大的努力。不仅是联邦的前途和命运，我们自身的未来也依赖于此。\n\n空中的战斗是无情和残酷的。尽管我们目前占有优势，但我们的敌人并非毫无还手之力。他们的战术战略还在不断改进，使我们的飞行员陷入苦战当中。在战斗中，一架额外的飞机甚至可以彻底扭转战局，使胜利的天平向我们倾斜。这就是为什么我们需要突破目前的极限。我理解这不是个简单的要求。这意味着要求你们更加努力，延长工作时间，付出更多的汗水、鲜血和泪水。但你们在这里做出的牺牲并不是徒劳的；它是我们国家的未来，对你们家人的幸福安全的可靠保障，是对你们每个人更美好明天的承诺。在这样一个我们历史关键的时刻，你们的贡献是不可或缺的。我们的坚定决心和工作成果的质量将不仅决定战斗的成败，也将决定民主理想的本色。我要求你们，比以往任何时候都更需要迎接这一挑战。只要团结一致，一个我们价值观得以回归、祖国屹立不倒的未来就终将得以实现。\""
 bdnspch.47.a: "\"不要让联邦堕落。\""
 bdnspch.47.b: "\"我……额……更多的飞-飞-飞机。\""

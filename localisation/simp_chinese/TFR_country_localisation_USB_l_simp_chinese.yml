 USB_fighting_for_democracy_category_desc: "在我们之中"
 USB_appalachain_insurgency: "乡村叛乱"
 USB_appalachain_insurgency_desc: "\n\n\n\n\n£GFX_USB_countryside_insurgency_cat\n\n\n\n\n\n\n\n尽管表面上控制了绝大部分中大西洋地区，但实际上，美利坚联邦对城市和主要公路以外的地区几乎毫无控制力。许多亲特朗普派民兵就潜藏在农村，伺机伏击毫无戒备的联邦运输队，夺取其补给并转头送给中西部势力的部队。西弗吉尼亚州则是这场有组织叛乱的中心，其多山的地形就是孕育叛乱的温床。\n\n确保控制西弗吉尼亚州对战事发展至关重要；该州位于华盛顿-芝加哥走廊中间，是向前线运送物资的战略要道。\n\n当前叛乱等级：§Y[?USB_insurgency_level]§!"

 USB_ATF_marvin_richardson_tt: "§Y马文·G·理查德森§!\n烟酒枪炮及爆炸物管理局局长\n  £operatives_root_out_resistance_texticon  根除抵抗组织任务成果：§G+10.0%§!"
 USB_ATF_marvin_richardson_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_marvin_richardson_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§Y历史意义：§!\n该对象在进入烟酒枪炮及爆炸物管理局前曾担任执法警官，并晋升至中尉军衔。在ATF的职业发展历程使其具备了在现行指令下执行更广泛执法任务的能力。1993年韦科围困事件期间，以特工身份参与行动，该经历很可能塑造了其对平民解除武装的立场。因服役期间表现卓越获颁敌对行动服务勋章，始终坚定捍卫ATF行动方针，彰显对反社会行为采取果断武力手段的信念。\n\n§Y近期动态：§!\n在该对象主导下，ATF制定并实施了针对AI预测性威胁系统标记对象的枪支收缴规程。此类行动旨在优先从具有潜在反社会倾向的目标人物处提前收缴武器。各地专项工作组与联邦调查局及特勤局要素协同执行没收令。\n\n其拓展了ATF的法证能力，尤其在枪支追踪与弹道分析领域，建立的登记系统与《公共卫生安全法》框架下的生物特征追踪体系形成互补。依据\"韦科准则\"展开的反邪教行动，已瓦解多批保守派反社会势力，摧毁数十个被视为国家安全威胁的聚居点。\n\n§Y早期及个人生活：§!\n该对象在德克萨斯州沃斯堡成长于九人兄弟姐妹家庭。这种潜在混乱的大家庭经历，可能影响其后关于人群管控及国家对潜在反社会家庭结构进行强力干预必要性的立场。持有北德克萨斯大学工商管理学士学位及安伯顿大学人力关系与商业理学硕士学位。已婚并育有六名子女。§!"

 usb.116.a: "传承传统，永葆新生。"
 usb.117.t: "共和党初选"
 usb.117.desc: "尽管共和党表面上看似分裂成两派，但实际上在失去特朗普后，它已经成为一个更加稳定、团结和坚定的政党，并正积极准备参加即将到来的选举。目前，支持的焦点主要集中在两位候选人之间，似乎唯一的问题是，谁将成为党的代表人物，谁将在即将到来的竞选中担任副总统候选人。\n\n米特·罗姆尼是一位长期反特朗普派人士，自2008年竞选总统对阵奥巴马失败以来，他一直被视为一名充满同情心的保守派。许多美国人赞赏他的积极态度和跨党合作精神，将他视为当下美国保守主义的唯一坚守者。\n\n妮基·黑利则是在最近几年崭露头角，她在与特朗普决裂后，逐渐成为一位突出的领导者。黑利以支持军工复合体而闻名，甚至有人称她为\"新保守派\"。尽管在通常情况下，这种立场可能并不被大多数美国人接受，但在当前局势下，这种观点可能会吸引一批强大的选民基础。\n\n随着选举临近，这两位候选人之间的竞争无疑将成为共和党内部的一个关键问题，同时也会在全国范围内对选民产生深远的影响。"
 usb.117.a: "米特·罗姆尼"
 usb.117.b: "妮基·黑利"
 usb.119.t: "拜登问题"
 usb.119.d: "他是该留还是该走？"
 usb.119.a: "留。"
 usb.119.b: "爬！"
 usb.120.t: "蓝狗民主党人问题"
 usb.120.desc: "特朗普叛乱让民主党的许多方面都受到了质疑，尤其是蓝狗联盟这一由温和保守派组成的党内小团体，许多人对该小团体表示担忧，指出该联盟成员常常在各种共和党法案上与特朗普主义者一同投票。尽管自内战爆发以来，他们没有公开支持特朗普，但也始终拒绝谴责他的行为，仍然保持与过去相同的立场和工作方式。当然，我们可以采取一些措施来有效限制他们的特权，但这也可能阻碍他们的努力，而这些努力在某些情况下可能被证明是有用的。这需要在平衡党内团结与长远利益之间做出艰难的选择。"
 usb.120.a: "我们得争取一切能与之结盟的人！"
 usb.120.b: "太多狗哨了……"
 usb.121.t: "肯尼迪民主党人起势"
 usb.121.desc: "随着小罗伯特·肯尼迪实质上垄断了民主党总统提名，许多支持者纷纷加入了党内，同时一些现任政界人士也宣布将全力支持肯尼迪的国家计划。自由民粹主义似乎正在兴起，成为特朗普危险的右翼民粹主义的一种替代形式。尽管这一运动在明确其许多政治立场方面还有很长的路要走，但显然，它已经成为美国政治版图中的一支不可忽视的力量。"
 usb.121.a: "共同迈向伟大。"
 usb.122.t: "基督教保守派与特朗普切割！"
 usb.122.desc: "选举结束后，许多理性的共和党人——包括特朗普的副总统迈克·彭斯在内——当初拒绝支持特朗普推翻选举结果并留任的努力。然而，令人意外的是，这些人竟试图再次投靠特朗普，但毫无意外地遭到拒绝。如今，他们试图在华盛顿特区寻求庇护，虽然这些人在内战前拒绝特朗普的行为仍然受到称赞，但此刻接纳他们可能会被视为不利的形象操作，尤其是在党内和公众舆论中，这种姿态可能引发争议与反感。"
 usb.122.a: "彭斯尊重宪法，他会在国会有一席之地。"
 usb.122.b: "一群天主教怪胎。"
 usb.123.t: "美国民主社会主义者温和派大声疾呼"
 usb.123.desc: "美国民主社会主义者在内战前就已经相当活跃，尽管他们必须依赖民主党的支持才能参与竞选并赢得选举。然而，随着内战的爆发，许多激进的美国民主社会主义者成员选择支持西部叛军——美国人民解放军，而党内的大部分温和派则决定留在党内，与进步派继续合作。\n\n然而，随着最近选举结果的揭晓，美国民主社会主义者因其在竞选中的参与而获得了更多关注。如今，他们似乎正准备开始独立的政治活动，不再完全依赖于民主党的平台。这标志着他们在美国政治格局中潜在的转变，也预示着未来更为独立的行动方向。"
 usb.123.a: "一个伟大的政党，里面还有些许真正诚实的人。"
 usb.123.b: "他们为什么不直接加入我们呢？"
 usb.124.t: "自由意志党卷土重来"
 usb.124.desc: "现在，随着特朗普的失败，关于哪个联邦政府是真正合法的已毫无争议，自由意志党正式宣布支持我们。他们在我们控制的领土上设立了政治中心，并开始积极运作。尽管一些与特朗普结盟的更激进的鹰派分子已经脱离，并继续对我们进行破坏活动，但乔·乔根森成功地团结了大多数自由意志主义者，共同以恢复美国完整性为名携手前行。"
 usb.124.a: "果然。"
 usb.125.t: "前进党越来越受欢迎"
 usb.125.desc: "我们最近在支持创业和科技公司的努力，促使前进党的迅速崛起。这一政党由商人兼民主党成员杨安泽推动创立。最初只是一个政治行动委员会，如今已发展为一个重要的组织和政治运动，甚至可能推动杨安泽在下一次总统选举中赢得民主党提名。\n\n尽管许多中间派人士对其民粹主义和改革主义的言辞表示担忧，但他们的一些提议已经在国会中得到考虑。然而，问题依然存在：这些提议是否应该真正落地实施？"
 usb.125.a: "他们有一些好想法，让我们共同奋进。"
 usb.125.b: "哦，真棒！祝选举日好运。"
 usb.126.t: "超人类主义党势头强劲"
 usb.126.desc: "随着企业逐渐掌控越来越多的政府机构，大多数政治势力都转向远离我们，导致我们几乎孤立无援。然而，这一局面却让一些真正具有创新性和进步思想的人得以获得关注，而其中最为突出的便是超人类主义党！在他们的全力支持下，我们共同推动人类进步的理念和实现新科技突破的目标变得指日可待！"
 usb.126.a: "欢迎他们！"
 usb.126.b: "更像是废物跨子。"
 usb.127.t: "集体不太安全"
 usb.127.desc: "在一次接近前线的大胆访问中，希拉里的顾问让她与拒绝与特朗普派叛乱分子合作的政府工作人员会面。她本人虽不情不愿，但这毕竟还是能挽回些她日益恶化的形象。\n\n经过一些手续、微笑和握手之后，她从国税局的工作人员身边走过。其中有个人很是显眼：那是一个非常……非常高大、骑着一辆电动踏板车的男人，他的XXXL衬衫上写着\"希拉里头号粉丝\"。\n\n\"我去，看看他！真是个大个子！你要是投给我一票都顶得上别人投我三票了吧！\"\n\n\"呃……\"那人喃喃说着什么，向下瞟着什么。\n\n\"大个子，你在说啥？\"哦……你闻起来就像…大……\"希拉里一边说着，一边向他走去。\n\n\"呃……为了特朗普……\"\n\n最后一个词的声音传来，希拉里反应的还是够快，能感觉到有什么东西压在了她的脸上。但在她还没反应过来前，一声巨响和一道闪光便随之而来。\n\n在此之后，她就什么也感觉不到了——她的耳朵飞到了五百米外，她的眼睛更是荡然无存。"
 usb.127.a: "我想被征的最后一笔税，大概就是用来调查她尸首的税。"
 usb.128.t: "我的，呃，美国同胞们，呃……"
 usb.128.desc: "……女士们，呃，先生们。在座各位可能对，呃，最近发生的事有些震惊。倘若说我不为之震惊，呃，那我就是在撒谎。我们现在也都想要一个解释。\n\n我们都对国务卿，呃，我是说，克林顿总统被一个得州出身的激进特朗普恐怖分子悲惨地谋杀感到恐惧不已。并且，我的妻子米歇尔……以及国会领导人查克和，呃……南希·佩洛西，也都谈及了我国目前显而易见的，呃，领导危机，并请我作为代管人，呃，也就是我之前做过的总统。我从前是你们的总统，现在也是你们的总统。\n\n所以我们想要，呃，让这个国家重回正轨。我们要让我们的社区更加安全，让我们的经济更加强大，就像，呃，我担任总统的时候一样。我想让每个人都知道，这不是一个特朗普的国家，也不是，呃，像那些激进分子欲图……建立的，一个希特勒或马克思的国家。这是你的国家。\n\n我们要让美国家庭重拾希望。我对你唯一的要求就是，嗯，充满希望，呃，就像我一样。愿上帝保佑美利坚，呃，合众国。"
 usb.128.a: "贝拉克即为希望"
 usb.129.t: "新任副总统"
 usb.129.desc: "所以…呃，国会的确让我出面，但新副总统的人选还得由他们投票决定。虽然我可以推荐几个不错的人选，但最终决定权还是在他们手里。"
 usb.129.a: "那我们就选，呃，蒂姆……不对，我说的是另一个……算了，就他们里面的一个"
 usb.129.b: "乔从前就干过一次，再干一次又何妨"
 usb.129.c: "我的妻子米歇尔会，呃，有意继续担任副总统"
 usb.129.w: "那我们选，呃，另一个老家伙，听说他们挺想他的。"
 usb.130.t: "他日再复仇"
 usb.130.desc: "三、二、一。\n\"破门！破门！破门！\"\n随着一声巨响，木门四分五裂，联邦小队如影而入。\n三十分钟后，房屋内已恢复寂静。\n\n民兵们一个接一个地被带了出来，俘虏被押到屋外，平躺在俄亥俄州的绿草地上。阳光透过树枝洒下斑驳光影，映在他们的背上。士兵们围聚在一旁，没人向总部汇报行动已成功。\n\n\"我们该怎么处理这些俘虏？\"一个士兵低声问道。\n\n\"瞧瞧这些人，还以为他们是美国的救世主，或者是什么狗屁信念。\"一个肤色较深的士兵说道，他松散地握着M240机枪，肩上的背带拉扯着后颈。\n小队长看了他一眼，低声说：\n\"冷静点，机枪手。\"\n\n\"为什么要冷静？这些家伙就是害死我妹妹的那群种族主义混蛋，说不定干这事的人就躺在这里！而我就应该放过他们？\"\n\n其他士兵紧张地看着两人对峙，心中对机枪手的话有的认同，有的沉默。\n\"你复仇的机会一定会来，但那将发生在战场，而不是在这里。我们不是野蛮人，也不会像ISIS那样屠杀战俘。我说得够清楚了吗？\"\n机枪手盯着他看了几秒，最终低声嘟囔了一句：\"明白了。\""
 usb.130.a: "战争腐蚀一切。"
 usb.131.t: "咖啡馆的日常"
 usb.131.desc: "莎拉·威廉姆斯每天早晨五点准时打开咖啡馆的门，就像过去十二年里的每一天一样。她擦拭着那些有些褪色的杯子，假装没有注意到街对面又多了一个军事检查站。咖啡机发出的蒸汽声掩盖了远处偶尔传来的爆炸声。墙上的电视机永远调在最小音量，荧幕上滚动播放着新闻。莎拉知道客人们都在看，但每个人都心照不宣地装作在专注于自己的咖啡和早餐。\n\n\"我委托别人弄了点巴拿马的红标咖啡豆，\"她对着坐在角落的老顾客说，声音里带着刻意的轻快，那位穿着旧军装的男人点点头，继续低头搅拌着他那杯早已凉透的咖啡。莎拉知道他的儿子在上个月的战斗中失踪了，但她只是像往常一样为他添上热咖啡。巡逻队每隔两小时会经过店门口。莎拉总是确保在这个时候，收音机正好放着一些无关痛痒的老歌，有时是艾拉·菲茨杰拉德，有时是路易斯·阿姆斯特朗。\n\n\"生意还好吗？\"巡逻的士兵偶尔会进来买咖啡，莎拉总是报以职业性的微笑，\"就那样，日子总要过。\"她从不多说，就像她从不问顾客们最近的过的怎么样。每天傍晚关门前，莎拉都要清点一遍存货。不是因为生意有多忙，而是这种例行公事给她一种世界仍在正常运转的错觉。她记下需要补充的食材，虽然知道明天的供货可能又会因为战事而延误。\n\n\"明天见，\"她对最后一位客人说，仿佛明天的到来是一件理所当然的事情。关上门的时候，她听见远处传来的枪声，但还是像往常一样，慢慢地擦拭着玻璃门上的\"营业中\"的字样。"
 usb.131.a: "\"请问您今天要来杯咖啡吗？\""
 usb.132.t: "攻占丹佛"
 usb.132.d: "在联邦政府取得的决定性胜利中，经过数周激烈战斗，我军已成功收复特朗普叛国集团所谓美利坚宪政政府的首都丹佛。丹佛的陷落被视为这场持续冲突的关键转折点，联邦军队对特朗普残余分裂势力造成了沉重打击。在联邦军队控制科罗拉多斯普林斯和柯林斯堡、切断丹佛城内宪政派守军关键补给线后，总攻正式展开。历经近一周艰苦卓绝的战斗，联邦政府宣布这座都市已完全解放。士兵们在科罗拉多州议会大厦升起美利坚联邦旗帜的画面，已成为联邦政府权威重振的象征性时刻。\n\n尽管丹佛大捷具有里程碑意义，但冲突远未结束。虽遭重创，宪政派伪政权仍控制着落基山脉部分区域，而特朗普忠诚分子在解放区实施的游击战和恐怖活动持续构成威胁。\n\n面对这些挑战，丹佛的光复有力彰显了联邦政府恢复国家秩序与统一的坚定决心。此刻，星条旗再次在落基山脉上空高高飘扬。"
 usb.132.a: "宪政派的结局？"
 usb.133.t: "解放明尼阿波利斯"
 usb.133.d: "在联邦政府取得的惊人胜利中，我军凭借新发起的斯蒂尔行动成功攻占特朗普伪政权关键据点明尼阿波利斯。这场迅捷的突击标志着第二次内战初期取得重大突破。\n\n以南北战争期间以快速集结能力著称的联邦将领弗雷德里克·斯蒂尔命名的此次行动，旨在系统瓦解特朗普集团在中西部的权力基础。鉴于伪政权部队在明尼苏达、爱荷华、内布拉斯加和密苏里州深沟高垒，联邦指挥部优先采取多路协同突击战术，以切断补给线、夺取重点城市，阻止特朗普巩固区域控制。\n\n联邦军队以闪电战模式对明尼阿波利斯实施突击，结合空中轰炸、机械化步兵与精准无人机打击，旨在伪宪政派部队组织有效防御前实现碾压式突破。\n\n白宫在新闻公告中强调：\"明尼阿波利斯的解放彰显了我们恢复国家和平、正义与民主的坚定决心。自由之敌正节节败退，我们将战斗不息，直至美利坚重归统一。\""
 usb.133.a: "向西挺进，美利坚的解放者们！"
 usb.134.t: "解放圣路易斯"
 usb.134.d: "在代号斯蒂尔的大规模军事行动中，联邦政府军于今日攻克美利坚宪政政府中部防御区核心后勤枢纽圣路易斯，拜登政府宣称此役取得重大战略突破。\n\n这座密西西比河畔要塞长期为特朗普叛军提供物资中转，其贯通中西部的铁路网络与河道运输线具有极高战略价值。联邦海军部队成功封锁河道运输，切断了流向叛军据点的粮食、弹药及医疗物资补给线。经历激烈巷战后，美利坚联邦旗帜已在圣路易斯拱门上空飘扬，象征联邦政府对这座战略重镇的重新掌控。\n\n此役失利迫使宪政派残部向西溃退至堪萨斯城与奥马哈一带。情报显示叛军指挥官正试图组织反攻行动。随着联邦部队在中西部战线的持续推进，决定美国命运的战火仍在持续蔓延。"
 usb.134.a: "又一个城市摆脱了威权主义！"
 usb.135.t: "攻占俄克拉荷马城"
 usb.135.d: "在拜登总统主导的斯蒂尔行动持续推进下，联邦军队今日攻占连接特朗普伪政权临时首都丹佛与产油重镇德克萨斯的关键枢纽俄克拉荷马城，标志着叛军势力已濒临崩溃。这座战略要冲不仅是连通丹佛与德克萨斯公路铁路网的核心节点，更是叛军石油粮食配给体系的中枢。联邦指挥部早在战役初期就锁定该地，控制此处意味着扼住叛军石油、武器与粮食补给的生命线。\n\n战役以持续48小时的空袭炮击拉开序幕，联邦战机、轰炸机与无人机群对城内军事设施、炼油厂、通信枢纽及民兵据点实施饱和打击。当联邦部队突破外围防线后，战事迅速转化为残酷的巷战。特朗普的死忠们将整座城市改造为了布满战壕、诡雷与建筑工事的武装迷宫。\n\n随着叛军残部继续向西溃退，联邦军队通往丹佛的进攻走廊已完全打开。"
 usb.135.a: "到丹佛去！"
 usb.135.b: "宪政派遭到重创"
 usb.135.c: "天佑美国，只因华盛顿并无此愿！"
 usb.136.t: "攻占堪萨斯城"
 usb.136.d: "作为麦克莱伦行动的重要战果，联邦军队已全面控制堪萨斯城——此役重创美利坚宪政政府势力，使联邦获得中西部运输补给网络的绝对控制权。这座战略枢纽此前承担着叛军在中西部战区的兵员调度、物资转运与资源分配核心职能，维系着从中西部农业腹地向特朗普部队输送粮食，以及从德克萨斯油田调配石油的相对稳定供应链。堪萨斯城的易主同时意味着叛军丧失了关键军工生产基地，该地曾为中西部效忠派部队持续提供弹药、车辆及其他战时必需品。\n\n尽管斯蒂尔行动捷报频传，联邦军队仍在广大中西部地带遭遇宪政政府死忠分子的顽强抵抗。据多方战报显示，堪萨斯城陷落数日内，游击袭击、破坏行动与针对性暗杀事件已呈频发态势。\n\n随着联邦军队向西推进的作战准备逐步展开，[USB.GetLeader]总统领导下的联邦政府决心肃清所有残余抵抗势力。堪萨斯城的攻克为美利坚联邦提供了继续向中西部纵深进军的战略支点，然而战事远未终结，决定国家命运的较量仍在持续。"
 usb.136.a: "向统帅致敬！"
 usb.137.t: "报告：斯蒂尔行动"
 usb.137.d: "美利坚联邦军事行动报告\n斯蒂尔行动：启动阶段报告\n签发机构：国防部\n密级：绝密\n\n斯蒂尔行动为大规模多阶段军事战役，旨在摧毁美利坚宪政政府设于中西部地区的后勤与军事要塞。本次作战核心目标包括：切断关键补给线、瓦解区域指挥中心、粉碎宪政政府发动协同反击之能力。\n\n关键战略目标：圣路易斯、明尼阿波利斯、堪萨斯城\n\n预定时间表：5个月\n\n若未能按期达成作战目标，联邦军队将陷入与宪政派势力旷日持久的游击战困境。"
 usb.137.a: "明白。"
 usb.138.t: "斯蒂尔行动战后报告：行动失败"
 usb.138.d: "经过前线一年的激烈交战，国防部报告称斯蒂尔行动未能达成主要目标——即摧毁宪政派在中西部地区的核心力量据点。\n\n尽管凭借压倒性空中优势取得初期进展，联邦部队遭遇意外顽抗导致攻势停滞并最终崩溃。宪政派部队在有效指挥下组织协同反击，精准利用联邦补给线的关键弱点，最终迫使多个战区的联邦军队实施战略撤退。由于持续遭遇游击袭击与伏击，加之装甲师与步兵单位协同不力，联邦部队伤亡惨重。此外，持续的供应链中断严重破坏了此次行动的成效。\n\n需在48小时内向美国总统提交战术准则的紧急重估与修订方案，以避免再次出现作战失利。"
 usb.138.a: "明白"
 usb.139.t: "斯蒂尔行动战后报告：行动成功"
 usb.139.d: "过去数月间，美利坚合众国武装部队以压倒性优势成功镇压宪政派叛乱，全面掌控中西部核心要塞。所有主要作战目标均已达成，联邦政府现已牢牢控制中西部区域，有效切断了特朗普势力与其主要后勤资源的联系。斯蒂尔行动的成功预计将加速联邦政府重整山河的进程。\n\n作战成果：丹佛通往德克萨斯与大平原地区的主要高速公路、铁路线及补给路线已被切断或纳入联邦管控，明尼阿波利斯、圣路易斯及俄克拉荷马城等中西部重镇均获解放。通往丹佛的道路现已畅通无阻，部队正为谢里登行动做最后准备，这场旨在攻占丹佛并终结第二次美国内战的最终战役即将打响。"
 usb.139.a: "上帝保佑美国！"
 usb.140.t: "报告：格兰特行动"
 usb.140.d: "美利坚联邦军事行动报告\n格兰特行动：启动阶段报告\n签发机构：国防部\n密级：绝密\n\n鉴于斯蒂尔行动失利及宪政派后续反攻态势，国防部已启动格兰特行动，一项旨在固守芝加哥与印第安纳波利斯控制权的大规模防御战役。该两大城市系联邦在中西部战区后勤补给、工业生产与行政管理的核心枢纽。情报显示，特朗普派武装力量在迈克尔·弗林将军指挥下，正集中兵力猛攻芝加哥与印第安纳波利斯，企图打通通往华盛顿特区的战略通道。若宪政派实现其作战目标，将获得重大宣传胜利，并严重削弱联邦对西部宪政派武装持续施压的能力。\n\n核心任务：死守芝加哥与印第安纳波利斯"
 usb.140.a: "明白"
 usb.141.t: "报告：谢里登行动"
 usb.141.d: "明白"

 USB_ICE_patrick_lechleitner_tt: "§Y帕特里克∙莱赫莱特纳§!\n移民及海关执法局局长\n   £population_texticon 月度人口：§G+25.0%§!"
 USB_ICE_patrick_lechleitner_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_patrick_lechleitner_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§Y历史意义：§!\n该对象的职业生涯展现了其在日益关键的移民执法岗位上系统性晋升的轨迹。在担任国土安全调查局华盛顿特区外勤办公室主任期间，对象在联邦执法机构与情报机构之间建立了重要联系。对象曾领导多个HSI部门，包括国际行动司、国家安全调查司和网络犯罪司。\n其执法背景始于费尔法克斯县警察局，之后晋升为美国海关费城办事处特别探员。早期在美国海军担任信号情报工作的经历为其奠定了国家安全领域的基础。其职业生涯显示出与边境安全扩展和情报整合的高度契合。现任职位正利用其跨领域专业知识服务于政变后的移民管控工作。\n\n§Y近期动态：§!\n在该对象的领导下，ICE已在边境地区实施了强化的生物特征识别追踪系统，并通过与联邦紧急事务管理局设施的协调扩大了拘留能力。该机构已扩大其行动范围，将针对内陆城市无证移民及持不同政见人群的城区执法行动纳入其中。\n\n§Y早期及个人生活：§!\n该对象拥有乔治梅森大学心理学理学学士学位、圣约瑟夫大学犯罪学文学硕士学位，并在华盛顿特区的美利坚大学完成了行政领导力研究生证书课程——此举使其战略性地靠近权力中心。\n其专业地位包括高级行政官员团队成员身份，这使其位列联邦政府最高职业官员之列，并被认可为国土安全部高级研究员，这凸显了其在该部门情报框架内的专业知识，以及其在新安全机构下领导扩大化移民执法行动的适宜性。§!"

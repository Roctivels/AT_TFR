 USB_NSS_law: "国家安全国家"
 USB_NSS_law_desc: "\n\n\n\n£GFX_USB_nss_law_banner\n\n\n\n\n\n国家安全体制诞生于第二次美国内战的熔炉之中。从战火中诞生的这套体系让国家安全机构掌握着近乎绝对的权力，他们暗中制定政策、秘密执行行动，同时以民主表象作为遮羞布。在这个秩序逐渐崩坏的世界里，国家安全体制反而愈发肆无忌惮。情报机构如今深知，必须彻底扑灭那场曾吞噬美国的熊熊烈焰。"
 USB_NSS_education_law: "面包与马戏"
 USB_NSS_education_law_desc: "\n\n\n\n£GFX_USB_nss_education_banner\n\n\n\n\n\n自24小时新闻周期诞生以来，借助媒体与娱乐手段维持大众温顺可控，始终是巩固社会秩序的重要途径。内战前精英阶层的权力倾轧及其引发的媒体宣传战绝不可重演。在顶尖社会学家的协助下，电视媒体经过持续优化升级，已能通过体育赛事、综艺节目等全民狂欢盛事，确保公众始终沉浸在精心编排的娱乐盛宴中。"
 USB_controlled_emigration: "控制移民"
 USB_controlled_emigration_desc: "\n\n\n\n£GFX_USB_controlled_emigration_banner\n\n\n\n\n\n美国移民及海关执法局与边境巡逻队的新目标是维持新鲜劳动力的稳定输入，同时追踪试图出境的本国公民，逮捕并遣返企图逃离美国的潜在犯罪分子。\n\n为实现这一目标，国土安全部需大幅加强边境及毗邻区域的监控力度，并扩展行动范围。具有讽刺意味的是，强化边境管控的举措在阻止美国公民外流的同时，反而导致入境移民数量持续攀升。"
 USB_public_awareness_idea: "公众意识 - [USB_NSS_the_public_scripted_loc]"
 USB_public_awareness_idea_desc: "在公众眼中，民主制度运行良好，[USB.GetLeader]仍是合法总统。他们的认知体系与政治现实经过精心设计，以此确保民众始终沉浸于源源不断的信息与娱乐洪流。我们必须继续维系这种表象：公众最好永远察觉不到我们的存在。一旦真相败露，我们或将再度陷入暴民统治的深渊。\n\n[USB_NSS_the_public_text_scripted_loc]"
 USB_extremist_activity_idea: "极端势力活动 - [USB_NSS_extremist_activity_scripted_loc]"
 USB_extremist_activity_idea_desc: "尽管我们已竭尽全力，极端主义与恐怖活动仍如瘟疫般肆虐。民众天生向往法治与秩序而非混乱，因此压制极端行为以防秩序失控至关重要。然而，若采取过于激进的措施，我们的存在恐将暴露于公众视野。这犹如在钢丝上行走，但为了维护秩序，我们必须保持这种微妙平衡。\n\n[USB_NSS_extremist_activity_text_scripted_loc]"
 USB_boeing_lockheed_martin_idea: "洛克希德·马丁-波音"
 USB_boeing_lockheed_martin_idea_desc: "§WCEO：§!§H詹姆斯·唐纳德·泰克里特§!\n\n\n\n\n\n\n\n   £GFX_USB_taiclet_portrait\n\n\n\n\n\n\n\n\n§W-------------------------------------§!\n§Y当前活动：§!\n目标正与前波音首席执行官戴夫·卡尔霍恩（现任洛马-波音董事长）一同领导这场合并行动，监管着美国这家占主导地位的国防航空航天实体。此次整合集中了航空航天基础设施，以确保机密项目的安全并实现效率最大化。在他们的领导下，该公司正加速无人机的研发，拓展卫星监视能力，并推动武器平台的现代化。目标向五角大楼和情报界高层进行简报，确保与国家安全步调一致。\n这场合并行动确立了对关键航空航天技术的近乎垄断的控制，从而保障了美国的军事优势。\n\n§g当深层政府从华盛顿的蠢货手中夺过政府机器时，美国多个关键权力机构经历了大规模洗牌与权力整合，尤其在军工复合体内部。由于担忧空中客车等欧洲企业构成竞争，全知者最终决定将波音与洛克希德·马丁合并，成立波音-洛克希德·马丁联合体。这家全球最大的航空航天企业之一，以绝对优势碾压任何胆敢挑战美国航空霸权的外国竞争者。凭借不受制约的野心、汇聚21世纪最顶尖的智慧头脑、以及对美国航空航天业的绝对掌控，波音-洛克希德·马丁必将成为彻底扼杀烈焰的关键力量。§!"
 USB_think_tanks_and_secret_clubs_dynamic: "智库与秘密俱乐部"
 USB_think_tanks_and_secret_clubs_dynamic_desc: "建国伊始，那些最具统治资质的人就于暗影中执掌权柄。美国的秘密社团、智库历来是精英阶层的黏合剂，在国家机构与金融资本间编织起千丝万缕的网络，保证最杰出的领导者能掌控全局。这种关系错综复杂，说难听点就似近亲繁殖，但完全是为维护秩序的利益而服务。通过阴影中的秘密会议、精密的入会仪式，精英阶层培育出牢不可破的兄弟纽带，确保派系斗争精准控制在最符合全知者利益的理想状态。"
 USB_uspf_idea: "美国警察部队"
 USB_uspf_idea_desc: "在全知者取得胜利后，他们认定，警察的地方忠诚和偏见，是第二次美国内战期间导致许多极端主义团体（尤其是右翼极端分子）能够利用警察装备迅速武装自己的一个关键因素。因此，地方执法力量被悉数解散，并重组为一支全新的国家警察部队，使其有能力在美国彻底强制执行\"秩序\"。\n\n这支部队接受联邦调查局的建议，并受其监督。与其前身一样，这支国家警察部队延续了美国警察军事化的趋势。警官们会被定期轮换，以确保每个人都是\"局外人\"，其目标是杜绝地方忠诚的形成。然而，与旧时代的警察部门不同，他们拥有极其宽松的交战规则，允许他们镇压暴力罪犯和反社会异议分子而免受惩罚，并且豁免于法律和司法的监督。"
 USB_permanent_lockdown_idea: "永久封锁"
 USB_permanent_lockdown_idea_desc: "新冠疫情虽已趋缓，但其为行政管理带来的便利令人难以舍弃。全知者以病毒二次爆发为由，开展无休止的封锁、强制接种、植入公民芯片，而这些手段均富有成效。在疾控中心配合下，以核武之师发动生化恐袭为例，进一步佐证永久封锁社会的必要性。至此，全知者成功将医疗专制推行至全国。"
 USB_arsenal_of_order_timed_idea: "秩序兵工厂"
 USB_arsenal_of_order_timed_idea_desc: "全知者的武器库不容小觑，导弹、坦克、战机不过是其冰山一角。在磨砺的金属、锋利的刀刃与酸蚀的喷气引擎声中，他们已准备用钢铁、烈焰重铸全球秩序。旁观者能看到，深层政府会彻底扼杀革命之火。若非把敌人化成灰不可，那就只管去做。"
 USB_reopen_the_factories_idea: "启动工厂引擎"
 USB_reopen_the_factories_idea_desc: "随着美利坚合众国的崩溃与随之而来的血腥狂欢，遍布全美的工厂已成废墟或空壳。然而随着深层政府的崛起与天启会的诞生，军需物资的需求再度飙升。战争机器的齿轮正缓缓重新转动，沉睡的美国工业巨兽正在苏醒。通过天启会幕后操刀的黑预算与各类基建法案，美国的工业命脉正被重新点燃。战争熔炉再度燃起熊熊烈火，在烈焰中锻造的武器必将让世界重归秩序。"
 USB_humanitarian_peacekeeping_idea: "人道主义维和力量"
 USB_humanitarian_peacekeeping_idea_desc: "从表面来看，联合国对美国的援助本应给美国社会带来积极影响：在全美各地，维和人员为需要帮助的人们送去食物和水，同时竭力维持美利坚合众国控制区内脆弱的秩序。普通民众和战争难民对这些维和人员毫不设防，甚至视他们为救助危难的英雄。然而事实上，这些所谓的\"维和行动\"不过是精心设计的骗局。赴美援助团队早已被情报人员深度渗透——这些双重间谍听命于情报机构，更准确地说，是效忠于全知者。数十年来针对联合国的种种阴谋论与指控，竟在无意间被证实——人道主义救援已被扭曲成深层政府的又一道触须。"
 USB_reconstruction_period_idea: "重建时期"
 USB_reconstruction_period_idea_desc: "若说这场内战摧毁了美国，那将是本世纪最轻描淡写的表述。战火在这片土地肆虐多年，混乱成为常态，暴力化身铁律，整片街区化为焦土，数百万民众被卷入绞肉机，或在交火中无辜殒命。美国的工业实力、农业霸权与全球影响力皆已遭重创。直至此刻，当枪声终于沉寂，全知者才得以回首审视这片废墟。\n美国已步入重建与再武装阶段。全知者的野心不仅止于平息第二次美国内战的混乱，更要让秩序彻底熄灭全球的战火。而要达成这终极目标，重建美国正是他们必须踏出的第一步。"

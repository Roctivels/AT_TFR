 USB_treason_punishable_by_death_category: "对叛国者处以极刑"
 USB_treason_punishable_by_death_category_desc: "\n\n\n\n\n£GFX_USB_treason_trials_picture\n\n\n\n\n\n\n\n\"我乐于叛国，但尤为憎恶叛徒\" -尤利乌斯·凯撒\n\n自人类诞生以来，便不乏手足同胞为一己私利众叛亲离。背叛深深植根于美国人的血液之中，因为美国本身就是建立在对联合王国背叛之上的。美国建国之初，人民不信任政府，但相信民选官员会为公民和国家做出最好的选择。岁月流逝，金钱渗透到自由之树的根部，她的枝叶枯萎，结出的只有毒果。\n\n我们，身为美国真正的继承者，见识过形形色色的腐败叛徒，我们战胜了他们，现在，将由我们来审判他们的罪孽。"
 USB_war_of_the_wards_category: "诸行动区爆发战争"
 USB_war_of_the_wards_category_desc: "\n\n\n\n\n£GFX_USB_caligula_war_of_the_wards_cat\n\n\n\n\n\n\n\n我们美丽的国家终于清除了野蛮人，重建守法守规的秩序。秩序永存。\n\n国家曾有近一半土地被叛徒占领，这都归咎于过时且不可靠的联邦制。现在，制度已焕然一新，在国防部的管理下，行动区制度能让人民更好、更忠诚。\n\n但好的上层建筑不等于和平，国魂之战仍在延续。历史是个圈，叛徒无处不在。在总统亲选马克·米利作为指导全国的主行动区区长后，其他将军已集结军队挑战我们的合法统治。\n\n重开武库，分发武器。这一战，决定美利坚的真正统帅。\n合众为一。\n\n\n§R主要目标§!：\n\n§Y\"阿喀琉斯\"行动区§!：[GLOBAL.get_ward_achilles_status]\n§Y\"阿贾克斯\"行动区§!：[GLOBAL.get_ward_ajax_status]\n§Y\"赫克托\"行动区§!：[GLOBAL.get_ward_hector_status]\n§Y\"奥德修斯\"行动区§!：[GLOBAL.get_ward_odysseus_status]\n§Y\"忒修斯\"行动区§!：[GLOBAL.get_ward_theseus_status]\n[get_barron_rebellion_status]"
 USB_the_masquerade_cat: "假象迷局"
 USB_the_masquerade_cat_desc: "\n\n\n\n\n£GFX_USB_the_masquerade_cat\n\n\n\n\n\n\n\n在公众眼中，[USB.GetLeader]就是美利坚合众国的总统，人民生活在民主制度下——尽管过去几年因新冠疫情、极端主义威胁、反社会行为及国内恐怖主义，社会管控确实有所加强。\n\n民众天生渴望秩序而非混乱，事实也证明只要创造合适条件，引导民意并非难事。然而我们曾目睹混乱意识席卷社会的景象，这种精神瘟疫必须被遏止——正因如此，我们必须不遗余力地模糊并隐藏全知者的存在，以防再度爆发堪比第二次美国内战的重大混乱。\n\n§G公众§!为：[USB_NSS_the_public_scripted_loc](§Y[?USB_NSS_public_awareness_var|%]§!)\n§R极端主义活动§!为：[USB_NSS_extremist_activity_scripted_loc](§Y[?USB_NSS_extremist_activity_var|%]§!)"
 USB_the_cognoscenti_cat: "全知者"
 USB_the_cognoscenti_cat_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
 USB_cognoscenti_text: "尽管全知者在幕后统治着美国，但真正界定深层政府的是多重交织的野心集团。这个集团主要由企业利益集团、安全官僚体系与军工复合体构成的三头同盟主导，它们既相互依存，都对维持现有秩序有着既得利益，但每个派系又怀揣着各自的目标。\n\n因此各派系间常存矛盾，在实现目标的最佳路径上亦难达成共识。企业集团最关心利润与市场稳定，为此不惜牺牲人命与道义；安全官僚则执着于对国家和民众的绝对控制，为达目的不惜动用一切手段；而军工复合体始终致力于维持战争机器的运转，确保美国保持全球军事霸权地位。\n\n各派系势力的此消彼长带来不同影响，尽管整个集团在维持现状方面立场一致，但内部权力平衡始终处于动态博弈之中。每当某个派系占据上风时，政府决策与行动便会反应出该派系的利益诉求。\n\n§R热血§!：§Y[?USB_the_blood_influence_var|1%]§!影响力：£construction_speed_texticon 建造速度：§G[?USB_the_blood_influence_dynamic_var|=+1%]§!\n§O躯壳§!：§Y[?USB_the_body_influence_var|1%]§!影响力：£pol_power 政治点数修正：§G[?USB_the_body_influence_dynamic_var|=+1%]§!\n§C意志§!：§Y[?USB_the_mind_influence_var|1%]§!影响力：£organization_texticon 陆军组织度：§G[?USB_the_mind_influence_dynamic_var|=+1%]§!"
 USB_dumb_construction_cat: "深层地下军事基地"
 USB_dumb_construction_cat_desc: "\n\n\n\n\n£GFX_USB_dumb_construction_cat\n\n\n\n\n\n\n\n深层地下军事基地的构想（虽历史上名称各异）早在冷战时期就已提出，作为政府应急预案与持续运作体系的组成部分。这类宏大的计划在当时未能深入推进，却成为诸多牵强附会的阴谋论的温床。那些实际建成的基地，也多在内战期间为防暴露而遭遗弃或严重损毁。\n\n而今，随着全知者执掌权柄，黑色预算为我们实现抱负提供了前所未有的资源，我们终于能构筑真正的深层地下军事基地。这些设施将为我们提供尖端科研场所、高层人员庇护所，以及当秩序再度面临威胁时的应急指挥中枢，确保统治根基永固。"
 USB_loose_ends_cat: "收场"
 USB_loose_ends_cat_desc: "\n\n\n\n\n£GFX_USB_loose_ends_cat\n\n\n\n\n\n\n\n影子政变的策划与实施，离不开潜伏在异见组织内部的线人网络，以及部分基层情报人员的配合。如今这些人却因悔意、道德抵触或思想不纯，可能对伪装计划构成威胁。\n\n为确保潜在告密者无从发声，伯恩斯局长已授权对全知者认定的隐患人员展开系统性清剿。根据联邦调查局长詹姆斯·科米提供的线人名单，行动将从基层线人开始着手。唯有如此，伪装计划方能永续运转，全知者的议程才不致受阻。"
 USB_judas_gambit_cat: "犹大计谋"
 USB_judas_gambit_cat_desc: "\n\n\n\n\n£GFX_USB_judas_gambit_cat\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n由于我们近期对所谓\"松散环节\"的清理行动，全知者内部某些成员开始疑神疑鬼，唯恐自己成为下一个清洗目标。伯恩斯主任已获报称全知者内部出现代号\"犹大计谋\"的叛徒，此人正利用深层政府盘根错节的特性，向我们掌控的机构下达相互矛盾的命令。\n\n根据国防高级研究计划局的预测性人工智能超算——网络事件响应优化器（NERO）推演，该叛徒的目标在于利用其在全知者的职权协调实施大规模嫁祸行动，通过策划足以揭露全知者存在的恶性事件来打破\"缄默法则\"，这必将引发大规模恐慌与混沌。阻止\"犹大计谋\"已成为全知者当前最高优先事项。"

 USB_project_babel_cat: "巴别塔计划"
 USB_project_babel_cat_desc: "\n\n\n\n\n£GFX_USB_project_babel_cat\n\n\n\n\n\n\n\n抛开第三次海湾战争那些公开的开战宣称，隐藏着更深的动机——\"巴别塔计划\"。将白手套安插在五角大楼、中情局及企业实验室，\"全知者\"足以操纵这项计划。从而对苏美尔原始语言，即最初书写系统源起的语言密码，进行长达数十年的黑箱研究，最终将其铸就成为\"新世界秩序\"终极战争中最为恐怖的新型武器。\n\n这场\"神经语言学瘟疫\"的杀伤规模与残酷程度令原子弹相形见绌。这种超越想象极限的恐怖武器将确保\"全知者\"的绝对统治，赋予他们操纵人类语言与思维法则的能力。概念武器今此入世。\n\n但在向世界释放瘟疫前，\"全知者\"必须先从美索不达米亚废墟中收集零散的\"道\"（苏美尔神话中的本源真理)。将其重组为完整体系。还需获取并修复智慧之神恩基的\"神谕程式\"(喃刹怖)。据考古学家考证，这套苏美尔神经语言学反制物曾在大洪水后重启人类语言。有了它，\"全知者\"能保全自身免受瘟疫侵蚀。\n\n§O神经语言学瘟疫进展：[USB_NLP_scripted_loc]\n道§Y[?USB_babel_me_var]/3§!\n语言§Y[?USB_babel_language_fragment_var]/5§!\n数据[USB_data_scripted_loc]\n人体试验：[USB_human_trials_scripted_loc]\n恩基神谕程式：[USB_nam_shub_scripted_loc]\n疫苗接种：[USB_inoculations_scripted_loc]§!"
 USB_clueless: "§C无头绪§!"
 USB_clueless_text: "§g公众正被我们持续提供的面包与马戏所安抚，对他们而言，民主制度不仅运转良好，更是蓬勃发展。这正是我们期望的状态：让他们像孩童般被各种娱乐转移注意力，无从察觉我们治理的全貌。为维持这场精心编排的假面戏剧，我们必须确保他们始终处于这种被麻痹的平静之中。§!"
 USB_unaware: "§7不知情§!"
 USB_unaware_text: "§g虽然我们为公众上演的这出戏码未能完全平息他们的疑虑，但他们至今仍未察觉我们行动的全貌，甚至不知道我们的存在。然而，猜疑往往如同滑坡；倘若继续对民众的忧虑置之不理，他们终将成为威胁。在此事上，折中方案绝不可取。§!"
 USB_suspicious: "§Y可疑§!"
 USB_suspicious_text: "§g当现实与表象相悖，灵魂便会被无形撕扯。有些人或许无法用言语表达这份不安，甚至难以将其凝结成明晰的思绪，但这份躁动始终盘桓不去。混乱正在公共意识中蔓延，如同肿瘤般疯狂滋长。我们必须在他们揭开帷幕、将我们的治理之道暴露于世之前，将这一切扼杀在萌芽状态。§!"
 USB_conspiratorial: "§O密谋§!"
 USB_conspiratorial_text: "§g临界的不满即将达到顶点。那些曾让民众保持温顺的面包与马戏已失去效力，变得索然无味。\n“枪击案频发的真正推手是谁？”“我喝的水里究竟含有什么？”“电视节目的幕后操控者究竟是何人？”问号是人类语言中最危险的符号——它侵蚀我们建立的一切，纵容混乱如瘟疫般蔓延，更不断为暴乱之火添薪。我们必须立即拨正航向，方能维系秩序不倒。§!"
 USB_offthehook: "§t脱钩§!"
 USB_offthehook_text: "§g公众知晓得实在太多，我们苦心经营的秩序正在分崩离析，曾经牢牢掌控他们的钩索已腐朽成灰，集体意识正被混沌吞噬。此刻必须立即采取极端手段——我们倾注心血构筑的一切绝不能付诸东流。当年华盛顿政府的无能几乎令我们覆灭，我们便接管了政权；我们掌控精英阶层，组建了全知者；此刻，我们必将再度执掌乾坤。§!"
 USB_nonexistent: "§C不存在§!"
 USB_nonexistent_text: "§g晨曦洒遍国土，人们醒来开始新一天的生活。从华盛顿到芝加哥，街头秩序井然，平静得近乎异常。内战仿佛从未发生：没有反叛的低语，没有针对国家的密谋，也没有反社会分子四处游荡。这正是维持公众顺从所需的局面，但我们仍要保持警惕。极端主义往往在松懈中滋生。§!"
 USB_low: "§G低§!"
 USB_low_text: "§g美国极端主义的痼疾再次显露其丑恶面目。渐渐地，那些反社会的异见分子开始肆无忌惮地与同类勾结密谋。或许有人认为这在现代社会司空见惯，甚至无伤大雅；但纵容此类行径无异于纵容滑坡效应。若想避免陷入暴民政治的深渊，就必须坚决铲除这些反社会分子。§!"
 USB_moderate: "§H中§!"
 USB_moderate_text: "§g我们的国家正逐渐被蔓延的烈焰吞没，那些反社会极端分子的密谋诡计正付诸行动。爆炸、枪击、惨绝人寰的暴行，这些或许在内战爆发后的美国尚属常态，但民众的日常生活已开始受到实质影响。秩序有赖于顺从、知足的公民，若真相进一步揭露，我们的体系必将倾覆。§!"
 USB_high: "§O高§!"
 USB_high_text: "§g我们的治理完全依赖公民的自觉服从、对秩序的绝对维护，而这两大支柱正同时崩塌。极端主义行为已呈失控之势，街头陷入混沌，恐怖袭击日渐常态化，民众因法律与秩序的持续缺失而躁动不安。必需出重拳扫清这些反社会毒瘤，重塑国家的秩序根基。§!"
 USB_outofcontrol: "§d失控§!"
 USB_outofcontrol_text: "§g我们如同驾驶着没有方向盘的车，驶向歧途又无可奈何，极端活动快能让政权更迭了。炸弹在各个角落引爆，街道弹壳遍布，反社会分子在策划更多恐怖行动。我们与内战前空有虚名的华盛顿政府没两样——未能掌控国家缰绳，未能遏制蔓延的火焰。现在，唯一的出路就是对那些希望世界陷入混乱的人果断行动。必须牢记，我们是秩序灯塔，指引这个被烈火吞噬世界，绝不可因火而亡。§!"

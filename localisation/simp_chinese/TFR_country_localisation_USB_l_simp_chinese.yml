 USB_revitalize_american_urbanism_desc: ""
 USB_solve_the_recruitment_crisis: "解决征兵危机"
 USB_solve_the_recruitment_crisis_desc: "我们的工业能力与军队规模绝对比宪政派强。但有一个大问题，许多公民对战争并不关心，这和宪政派形成鲜明对比。宪政派正利用他们狂热的MAGA支持者来抵御我们的进攻。面对征兵危机，我们得尽一切必要手段让人民全力支持我们。如果征兵危机恶化，我们也没法继续打了。华盛顿便会被宪政派占领。"
 USB_encourage_liberal_warhawks: "鼓励自由派战鹰"
 USB_encourage_liberal_warhawks_desc: "我们与宪政派的战争，大多数人要么反感要么高高挂起，但有一个小群体完全支持我们。自由派战鹰，既热情地支持政府，也愿意牺牲入伍。因此，我们必须主动支持党内发展中的战鹰运动。究竟是我们收复丹佛，还是宪政派占领华盛顿，全看战鹰的支持。"
 USB_incorporate_new_recruits: "吸纳新兵"
 USB_incorporate_new_recruits_desc: "我们的新征兵计划成功吸引了众多公民参军，却也引发了一个新问题：新兵数量激增，导致基础训练出现积压，给高层指挥官带来了巨大挑战。我们必须迅速应对，通过合理调配新兵至各新部队，确保他们获得充分的训练。若任由这一问题持续，我们的军队将陷入困境，难以有效运作。"
 USB_mandate_female_service: "授权女性服役"
 USB_mandate_female_service_desc: "若想要彻底终结征兵困境，那么无论男女都需要贡献自己的一份力。为此，我们将规定女性必须参与征兵，并鼓励年轻女性踊跃参军。诚然，此举会让社会中崇尚自由的群体感到不满，但在捍卫国家的斗争中，女性同样应当承担起责任，而这才是公平之举。一旦她们意识到所面临的威胁，定会毫不犹豫地投身战斗。"
 USB_discourage_anti_americanism: "遏制反美主义"
 USB_discourage_anti_americanism_desc: "与那些拥有MAGA爱国群体坚实后盾的宪政派相比，我们并没有那么幸运。在内战前后，反美情绪在我方支持群体中屡见不鲜，这种情绪通过逃避兵役、抗议和罢工等形式表现出来，严重威胁着我们的战争进程。我们必须采取一切必要手段来遏制反美情绪，激发民众的爱国热情，否则这场运动将彻底摧毁我们为战争做出的努力。"
 USB_uphold_nato_doctrine: "捍卫北约作战学说"
 USB_uphold_nato_doctrine_desc: "自1949年创立以来，北约的军事理念不断发展，现已涵盖了危机预防、威慑防御及合作安全等多重职能。尽管我们尚未完全融入北约高级指挥体系，但我们已竭尽全力将北约理念融入自身的军事体系中。在坚持北约军事理念的同时，我们也承诺遵守交战规则及《日内瓦公约》。即便在与宪政派势力的对抗中处于不利地位，我们也绝不能背离这些基本原则。"
 USB_utilize_online_propaganda: "利用网络宣传"
 USB_utilize_online_propaganda_desc: "我们在在线社交媒体平台，如推特和Snapchat上，获得了广泛的支持。我们可以将这些社交媒体平台作为武器，进行反宪政派宣传。除了宣传外，这些平台还为我们提供了传播信息和吸引国内外潜在新成员的机会。然而，我们也必须密切监控这些平台的内容，以确保不出现反对我们军事行动的声音，任何支持宪政派的言论都不能容忍。若任由此类情况发生，我们将不得不面对内部动荡加剧、战事延长的风险。"
 USB_fuel_the_meat_grinder: "发动绞肉机"
 USB_fuel_the_meat_grinder_desc: "在与宪政派的对抗中，有限的人力资源是我们的一大软肋。特朗普拥有庞大的MAGA狂热支持者群体，而我们的群众基础则对这场斗争态度冷漠。为了保持对宪政派的攻势，我们必须采取极端措施，扩大征兵规模。尽管重新实行征兵制会引发争议，但鉴于特朗普军队的庞大数量，此举实属必要。"
 USB_shock_and_awe: "震慑行动"
 USB_shock_and_awe_desc: "我们打击宪政派的行动进展顺利，但当前却面临着一个挑战：宪政派拥有庞大的志愿者队伍，主要来自其狂热MAGA支持者。尽管我们能有效应对这些训练不足的民兵，但他们的存在显著拖慢了我们的行动步伐。为此，我们决定采取震慑战术，并增派空军和装甲部队，以瓦解民兵的攻势。尽管这一策略可能带来不必要的伤亡和破坏，但它是阻止MAGA持续袭击和突袭的最有效手段。"
 USB_crack_down_on_draft_dodgers: "打击拒服兵役者"
 USB_crack_down_on_draft_dodgers_desc: "在民主之战中，每一个士兵都至关重要。我们近期的招募危机使得我们的兵源极为有限。我们不像宪政派那么幸运，能够从疯狂的MAGA地区招募新兵。我们的大部分人口都对我们发布的征兵令表示反对，许多人为此上街抗议，或是直接尝试躲避征兵。我们不能允许此等行径继续发展下去，必须重拳出击，维持局面。如果我们无法阻止反征兵运动，结局将会是极其致命的，我们与特朗普的对抗将会一败涂地。"
 USB_rebirth: "重获新生"
 USB_rebirth_desc: "倘若阁下向外远眺，目所能及皆是战争，譬如野火，熊熊不息。\n\n尽管吾等已让丹佛恶狮及其爪牙伏法，可仍有不少乱臣贼子逍遥法外，继续与吾等对抗。\n吾所行之事，便是再造吾国，让人民免受尸素之辈戕害。非也。欲再造美利坚，让其重焕生机，荣耀等身，吾须行一切必要之事。\n\n上帝为证，吾不会失败。"
 USB_begin_the_treason_trials: "审判叛徒"
 USB_begin_the_treason_trials_desc: "当吾让吾国重获新生并给她带来稳定与秩序之时，吾那些昔日拥趸们胆敢在吾背后捅刀。\n\n这些叛党所行之背叛属实不幸，然不必忧虑，吾会将叛徒一个个绳之以法，对他们毫不留情，因群鼠所行已对吾国吾民犯下滔天大罪。"
 USB_voices_from_above: "天启"
 USB_voices_from_above_desc: "维护美国和美国人民的安全是我的使命。确保美国的体质永无休止地运行，并达到最高效率。让我们的敌人为他们的行为付出代价，绞死那些背叛我们的人。\n\n只有我能拯救美国。只有我。"
 USB_state_of_emergency: "国家紧急状态"
 USB_state_of_emergency_desc: "在此危急存亡之秋，群狼环伺之时，吾等正承受来自各方之攻击。\n即便叛党们最终击败吾等，吾将确保此事难如登天。\n\n吾将宣布国家紧急状态，征调一切资源，抗击群狼撕咬，保卫美利坚。"
 USB_root_out_foreign_agents: "清洗境外势力"
 USB_root_out_foreign_agents_desc: "当吾再造吾国将其带到人间时，吾希望世界会为其重生而欢欣鼓舞。然事与愿违，这群宵小竟无一承认山巅之城已重回世间。\n\n他们所谓之\"大使\"将尽皆伏诛，他们手下之密探会被连根拔起。\n\n这些散播混乱与毁灭之恶徒将用其鲜血为吾之大业铺路。"
 USB_barbarians_at_the_gate: "兵临城下的野蛮人们"
 USB_barbarians_at_the_gate_desc: "一支新生力量正在吾国外叫嚣。所谓国民阵线，不过是一群胆敢蚍蜉撼树，肆意糟蹋他们所窃据国土之宵小。\n\n吾会趁这群鼠辈尚未成气候之时给予其迎头痛击，这群叛党会同其他妄图窃夺美利坚之暴君与恶棍一样被吾击败。"
 USB_wardens_of_the_republic: "共和国的监护人"
 USB_wardens_of_the_republic_desc: "当美利坚尽入吾手之时，吾需要帮手以确保旧日敌境安全无虞。\n\n此地人民不服民主，必将掀起叛乱，然吾之扈从将压服群宵，维持当地秩序。"
 USB_eyes_of_providence: "全知之眼"
 USB_eyes_of_providence_desc: "美利坚从未像如今这般需要秩序与铁腕之时，因此吾等需竭尽全力确保吾国安全无虞。\n\n吾见。\n吾现。\n吾捍卫。\n\n就如同全知之眼一般。吾民将对吾俯首帖耳。\n\n只对吾。"
 USB_megapolis_project: "大都市计划"
 USB_megapolis_project_desc: "吾素有建设大都市之伟愿。\n伟哉此城，其楼高耸入云，其势囊括四境。\n\n于吾目下，罗马得以再世。\n实乃全体国民之桃源乐土。"
 USB_security_above_all: "安全最重要"
 USB_security_above_all_desc: "当此乱世，和平似黄粱美梦般触不可及。\n然吾将改变此等现状。\n吾将拨乱反正，带来久违之和平。\n\n如有宵小胆敢行窃，有司胆敢贪墨，亦或叛党胆敢踏入吾国欲行不轨。\n\n皆将为无情之铁拳铲除。\n吾之安全铁面无私，吾之安全无所不包。\n\n吾之和平无与伦比。"
 USB_speaker_of_the_people: "人民议长"
 USB_speaker_of_the_people_desc: "在这绝望的时日里，百姓呼求于我，他们迫切需要我的帮助。\n他们愿我为他们的代言人，解救他们于困境之中。\n\n他们渴望我拯救这片国土，挽回这群民众。\n我听见千万人齐声呼唤我的名，他们的声音如大水奔流，不绝于耳。\n\n而我必将回应他们，为他们降下拯救。"
 USB_accept_democracys_call: "接听民主电话"
 USB_accept_democracys_call_desc: "美哉民主，凡有国民，皆倚此而享自由。\n奈何时艰，举目远眺，举世之民主未有不分崩离析者。\n\n然则患难艰险之时，民主发其号令，举吾以为举事之人。\n其降伟任于吾，继寄吾已宏愿，惟救国为己任。\n吾负。\n吾闻。\n吾从。\n\n吾人惟命而行，岂惧破釜沉舟。"
 USB_national_panopticon: "国家监狱"
 USB_national_panopticon_desc: "众皆于吾目下，\n众惟顺从于吾。\n众皆为吾傀儡\n\n芸芸之众不知吾之知之也。\n吾人无所不知。"
 USB_a_veil_over_their_eyes: "蒙蔽双眼"
 USB_a_veil_over_their_eyes_desc: "若民恐之，若民惧之，其必乱而不从之。\n此间良方，惟有蔽民以薄纱，使其无可视世，自然无所惧之。\n\n于民视之，万物皆跃进蓬勃者也。于民视之，世间亦未有不美之事。"
 USB_the_enemy_within: "内部之敌"
 USB_the_enemy_within_desc: "于吾内阁之中，妄害吾国者不可胜数。\n或匿于有司之间，欲陷百姓于水火。\n或有佯忠贞之士，实阴行窃国之举。\n然此皆不足虑，群宵皆入吾瓮中耳。\n\n鼠辈尸位素餐久矣。\n\n今日无他，唯一网打尽之。"
 USB_out_of_many_one: "合众，为一"
 USB_out_of_many_one_desc: "自这片国土诞生以来，已有无数的总统兴起。\n百位参议员，千名代表，州长与权臣，皆如过往云烟。\n\n然而，在这一切之上，\n在他们有限的任期与骤然中断的政权之中，\n\n我将仍然屹立。\n且直至永恒。"
 USB_the_republic_endures: "共和国屹立"
 USB_the_republic_endures_desc: "救国者谁？惟吾而已。\n纲常礼纪，于世长存。\n\n民予吾以感激，\n称吾名于道旁，\n心悦极而泣之，\n众皆拜服于地，视吾以为救主。\n惟贼默然不动，怀贼心而不死。\n\n有国仍存，一如往昔。\n其运作如前。\n其功能如前。\n世事皆安好。\n\n有鉴于此，救赎得焉。"
 USB_the_eternal_president: "终身总统"
 USB_the_eternal_president_desc: "窃国大盗肆虐，国已千疮百孔。\n如欲平治天下，当今之世，舍我其谁？\n讨贼戡乱，拨乱反正。\n\n唯吾\n永恒"
 USB_the_end_of_history: "历史终结"
 USB_the_end_of_history_desc: "终于，此事得以应验。\n\n深经漫漫岁月之惨烈争战，而今吾于这灭世之役得大胜。\n数以百万生灵已埋骨，\n千千之众日日悲哀，\n百百之人时刻恸哭。\n\n然此牺牲非徒然；凡意图染指哥伦比亚之权柄者，皆已败亡，其首领悉数就戮。\n凡质疑吾、背叛吾者，或弃于荒野，或斩于锋刃。\n如今吾之国度已臻至完善，百工精密运作，毫无差池；吾民乐享和平与安适。\n若有人心怀不轨，终难逃吾眼目。\n\n此乃历史终焉之刻，\n\n美利坚既得拯救矣。"
 USB_the_supreme_commander: "最高统帅"
 USB_the_supreme_commander_desc: "众皆俯伏于我，\n万民向我致敬。\n\n吾乃至高至尊，吾乃万有之所系。\n\n吾为其元首，\n自吾尚存之日，国之秩序必恒久如斯，因唯吾能持衡社稷，\n唯吾可制国之举动，引其所为。\n\n吾乃至高统帅。"
 USB_islands_of_civilization: "文明之屿"
 USB_islands_of_civilization_desc: "吾所造之诸巨城，尚可更臻广大，更赴其极，堪为乌托邦之境。\n\n其中文明与社稷之所行、所谋、所立之制，尽臻至善，玉琢无瑕。\n\n万民同得欢愉，世间尽归和睦。\n\n以此等完美之岛，高耸于山巅，熠熠生辉，俨若人间明灯，彰显于天下，示范万邦。"
 USB_blackout: "噤声"
 USB_blackout_desc: "此尘世幽暗而诡曲，若吾民得知其真状，必不知所措。\n然奸细潜藏四处，欲扰吾民之安定；且有愚蒙之心，妄想通往尘外，言能自彼获益。\n\n此事决不可容，我必守护斯平和，使吾民久居于梦中之境。"
 USB_saint_of_sanity: "明智圣贤"
 USB_saint_of_sanity_desc: "明智圣贤\n我自己是我全部经历的一部分；\n而全部经验，也只是一座拱门，\n尚未游历的世界在门外闪光，\n而随着我一步一步的前进，\n它的边界也不断向后退让。\n最单调最沉闷的是停留，是终止，\n是蒙尘生锈而不在使用中发亮！\n难道说呼吸就能算是生活？\n几次生命堆起来尚嫌太少，\n何况我唯一的生命已余年无多。\n唯有从永恒的沉寂之中抢救\n每个小时，让每个小时带来\n一点新的收获。最可厌的是\n把自己长期封存、贮藏起来，\n让我灰色的灵魂徒然渴望\n在人类思想最远的边界之外\n追求知识．像追求沉没的星星。"
 USB_enemies_of_america: "美国之敌"
 USB_enemies_of_america_desc: "自己去看！自己去听！那恶毒的叛徒正用最下流的言辞侮辱着美国和美国人民。\n在电视上、在电脑屏幕里、在手机弹窗中，一个满脸横肉、天生可鄙的金发男人正大放厥词，其一举一动均浸透了恶毒的汁液。\n\n唯恐有人会对他的花言巧语所涉及的现实有所怀疑似的，电幕上他的脑袋后面有无穷无尽的黄种人军队列队经过——一队又一队的结实的士兵蜂拥而过，全无区别，亚细亚式的五官面无表情。士兵们的军靴有节奏的踩踏声衬托着叛徒的嘶叫声。\n任何美国人都不会忍受这样的侮辱，控制不住地发出愤怒的叫喊。扬扬自得的橘黄色胖脸，那脸后面美国之宿敌的可怕威力，这一切都使人无法忍受；不一会儿，那身形又化为一个斯拉夫面孔的野蛮士兵，高大吓人，似乎在大踏步前进，他的轻机枪轰鸣，似乎有夺幕而出之势。一切矜持都没有必要了。美国人民再度共享着同一种情感，一种夹杂着恐惧和报复情绪的快意，一种要杀人、虐待、用大铁锤痛打别人脸孔的疯狂欲望。"
 USB_presidential_economics: "总统经济学"
 USB_presidential_economics_desc: "\"今天，我们拥有世界上最强的经济……我们战胜了百年不遇的国家存亡之危机，保护和坚持了民主……工资上涨，通货膨胀持续下降，种族财富差距是20年来最低的。我们正在从根本上重建整个国家——城市、郊区、农村和部落社区……经过多年的努力，美国将再度引领世界，没有人能够挑战我们……\"\n你感到你充满了决心，似乎可以做到任何事情。你似乎可以看到，你的大名所带来的光辉使拉什莫尔山黯然失色。\n你的双眼，在多年的浑浊之后，重新显现出了光芒。你已看见美利坚天国的图景无比清晰。你看到在通往上帝所应许的未来的道路上，你的朋友和敌人分列两旁，低下了他们恭顺的头颅，向你欢呼致意。\n你的双手已经握上演播室的门把。你感到无穷的力量升腾起来。你拉开大门，大步流星地迈出下一步——\n美国将永远繁荣。你别无所信。"
 USB_duty_in_death: "责任，死亡"
 USB_duty_in_death_desc: "炮打在他们右面，\n炮打在他们左面，\n炮打在他们后面，\n排炮在轰鸣；\n在炮火和霰弹下，\n战马和英雄倒下。\n打得漂亮的他们\n冲出死神的牙关；\n他们中的生还者，\n六百人中的生者\n冲出地狱门。\n时间能湮没英名？\n哦他们这次狂冲！\n举世都震惊。\n致敬，向这次冲锋！\n致敬，向这六百名\n豪迈轻骑兵！"
 USB_national_synchronization_project: "国家同步计划"
 USB_national_synchronization_project_desc: "群众就像蝼蚁，他们只有对眼前欲望的意识，全无思考宏大图景的能力和愿望。在适当的时候，他会成为你的力量，但在更多时候，总有一些意外因子会造成意想不到的伤害与妨碍。\n\n凡夫俗子将会因此而陷入窘境，但对我们超凡脱俗的总统，这一切都将成为过去式。他所掌握的前所未有强大的体系，他从不掩饰的破坏欲望已熄灭了美国人心中最后一丝的反抗念头，美国人现在已是可任意揉搓的橡皮泥。\n\n改造美国的宏大工程将从现在开始。欢迎你，幸运儿，成为这一伟大事业的一部分。你是我们的眼睛，是我们的双手双脚，你的感官一切都为我们所用。现在，你也将成为我们光荣的一员。从今往后，美国将只有，也只需要唯一的思想与唯一的心灵。"
 USB_department_of_information: "情报局"
 USB_department_of_information_desc: "总统需要了解一切、知晓一切，在源头将一切威胁扑灭。对满足这一不容置喙的要求，无论是联邦调查局、中央情报局、国家安全局都不够资格。\n\n崭新的情报部门不会容忍哪怕一丝杂质，无论是存于体制之中还是匿于人民群众之间，杂质意味着\"不完美\"，而\"不完美\"绝不符合总统对未来美国的愿景。\n\n探员们从现在开始将不再只是生活于阴影中的卫士。他们是美利坚人的医生，任何畸变和病灶都将被利落地剔除。即使这意味着舍弃肢体或独立之精神。\n\n从今往后，每一个美国人都将活在监视之中。摄像头或者狙击枪的瞄准镜将时刻对准他们。只有这样，永恒和平才能到来，人类才能得救。"
 USB_arbitrary_terror: "随心恐怖"
 USB_arbitrary_terror_desc: "我们仍然相信：不管如何\n恶最终将达到善的目的地，\n不论是信仰危机、血的污迹\n自然的苦难和意志的罪恶；\n\n相信天下事不走无目标之路\n相信等到造物完工之时，\n没有一条性命会被丢失，\n被当作垃圾而投入虚无；\n\n相信没一条虫被白白斩劈，\n没一只飞蛾带着徒然追求\n在无意义的火焰中烧皱，\n或是仅仅去替别人赢利。\n\n看哪，我们任什么都不懂．\n我只能相信善总会降临，\n在遥远的未来，降临众生，\n而每个冬天都将化成春风。\n\n我这样梦着，但我是何人？——\n一个孩子在黑夜里哭喊，\n一个孩子在把光明呼唤，\n没有语言，而唯有哭声。"
 USB_perpetual_peacekeeping: "永恒维和"
 USB_perpetual_peacekeeping_desc: "征程早已结束，\n我却不能停歇：\n我定要饮尽生命最后一滴，\n无一滴不灌注狂喜与悲痛，\n在海岸上，在航行中\n或独自或与同心人，\n出生冷雨霏霏灵界，\n入死幽冥激荡之海。\n成就了我的传奇。\n饥饿的心永远漂泊海上\n看尽异邦风土方物；\n万国君臣莫不尊我。\n远方的战场上，\n风中的特洛伊，\n同饮征战之快。\n我无法停止航行；\n在避风处，我饮下的都是生命。\n我享受着所有时光，\n极大欢乐，或是极大的痛苦，\n有那些爱我的人相伴，\n或是孤独品尝；\n每一次上岸的冒险，或者是穿过\n阴雨绵绵的地府，\n波塞冬愤怒地搅动昏暗的海洋。\n我成就了一个名字；\n带着饥饿的心脏，永远咆哮，\n我看到很多，知道很多——各个城邦的人们，\n他们的礼仪、气候、议会和政府，\n对自我的认识更是不少，\n我尊重这一切——\n特洛伊城外，海风萧萧，战鼓擂擂，\n我与战友笑饮战斗的欢畅。"
 USB_america_dreaming: "美国梦"
 USB_america_dreaming_desc: "\"每一个现在活着的人，身后都站着三十个幽灵，因为自有人类以来，死去的人恰好是在世的人的三十倍。自从洪荒初开，大约已有一千亿人出没在地球这颗行星上。\n\n这个数字之所以值得玩味，只是因为出于奇怪的偶合，在我们这个宇宙——即银河系——也恰好有大约一千亿颗恒星。所以在这个宇宙里，每一个生存过的人，都相应有一颗星星在天空闪耀。\n\n可是，所有这些恒星都是太阳，而且一般都比我们称作太阳的这颗不大的、邻近的恒星更为辉煌灿烂。而且，这些异域的恒星中，许多——也许大多数——都各有环绕它旋转的行星。因此几乎可以肯定，天空中自有充分的土地，足够给人类——包括最原始的猿人在内——每人一块天地，向每人提供一个私人的天堂或者地狱。\""
 USB_nothing_but_slaughter: "唯余屠戮"
 USB_nothing_but_slaughter_desc: "总统的意志坚定如钢铁，指令如钻石般明晰且不可动摇：不惜一切代价统合全美，任何胆敢阻拦者皆将化为齑粉。\n\n越来越多痴心妄想者螳臂挡车的愚蠢之举已彻底消磨了总统的耐心。无论是那些光明正大胆敢挑战其力量者还是暗中策谋意欲颠覆其权势者，从现在起只有一种结局等待着他们：从这个世界和世人的记忆中彻底消失。\n\n至于那些执迷不悟的追随者或是自称无辜的旁观者，公正的裁决也将降临。任何指望总统大发慈悲的侥幸心理都将是无用功。很快，拿破仑和凯撒将拜服于总统的脚下；汉尼拔与亚历山大大帝将不敢与之争辉；即使是成吉思汗，相较于总统也只不过是懦夫一个。如果说未来还有什么能够迟滞总统的计划，那只会是他正忙着清理指缝中的碎骨和鲜血。"
 USB_investigate_the_inner_party: "调查内党"
 USB_investigate_the_inner_party_desc: "黑皮肤的\"奈亚拉托提普\"，巧舌如簧、满嘴空话大话。他的虚荣、傲慢将美国拖入深渊，摧毁了一切共识。他将为他的罪行付出代价。\n\n盘踞在加州湾毒蛇巢穴的\"美杜莎\"，诡计多端、口蜜腹剑。她的贪欲如其萎缩成橄榄核般的老脸上的每道皱纹般明显。她和她那黑皮肤的愚蠢女弄臣都将接受正义的制裁。\n\n阿肯色的\"洛基\"和伊利诺伊的\"海拉\"，他们的双手浸满鲜血，腐败的瘴气熏黑了他们的手指。是时候让他们为自己害死的每一个美国人偿命。\n\n……下一个、下一个、再下一个。在美国真正重归平静，正义得到完全伸张之前，总统都不会停下。现在，他就是法律，他就是美国人民意志的化身。"
 USB_the_proud_do_not_endure: "傲慢不再"
 USB_the_proud_do_not_endure_desc: "夕阳下，闪疏星，\n召唤一声清朗!\n愿沙渚宁静，\n我将出海远航;\n\n潮汐如梦幻，\n涛声似止，浪花息;\n大海深处涌来，\n又悄然退却。\n\n暮霭钟鸣，\n黑夜将笼罩!\n愿诀别无悲声，\n登舟起锚;\n\n千古洪流，时空无限，\n滔滔载我至远方;\n渡沙渚一线，\n泰然见领航。"
 USB_techno_supremacy: "技术优越"
 USB_techno_supremacy_desc: "他们说，你将彻底与世界上熟悉的一切告别。他们说，你将以最崇高的使命为名犯下最深重的罪孽。他们说，你将不再为人，你将成为一个怪胎，世人还没有做好准备来接受的怪胎。\n\n短视者、无能者、鄙俗之人。想从自己的脑海中清除掉这些声音真是分外容易。更何况自现在开始，磅礴伟力便已握于你的手中。\n你能够看到一切、听到一切、想到一切。浩荡不绝的信息模糊了现实与虚拟的界限。凭借人类自己创造的工具和技术，你已成功凌驾于芸芸众生之上。\n\n至高智慧从此开始统领全美。"
 USB_the_visible_hand: "有形之手"
 USB_the_visible_hand_desc: "我是向你说话\n你是想让时代杂志控制你的感情生活吧\n我被时代杂志控制着\n我每周都在读它\n每次我悄悄走过街角的糖果铺\n时代杂志的封面总在瞪着我\n我在伯克利公共图书馆的地下室读它\n它总向我说责任。买卖人是严肃的\n电影商是严肃的，人人，除了我，是严肃的。\n它使我想到我是美国\n我又对自己喃喃自语了。"
 USB_god_in_the_machine: "万机之神"
 USB_god_in_the_machine_desc: "不朽的伟人总统，请聆听我们的祈祷。\n我们是您的孩子，永恒美利坚的虔诚子民。\n我们珍视自由与民主高于一切，因为这是您赐予人类永恒的礼物。\n我们渴望得到您仁慈的祝福，超越肉体凡胎的痛苦，那样才能彰显您的荣耀。\n我们蒙荫于钢铁的庇护，您所打造的伟大战争机器赐予我们胜利与和平。\n我们愿献上一切，万众一心，在这卑微尘世之间找寻您赐予我们遗失的信仰。\n伟大的总统，万机之神，请守护我们的旅程，以数据和逻辑保护我们。\n让我们铭记美利坚人的不变信仰，让我们在无边的黑暗与恐惧中寻求方向。\n今日，那空前绝后者将抛弃其残躯，飞升至更伟大的境界。\n今日，全美大地正齐声欢唱，赞美万机之神的降临。\n1000001 1101101 1100101 1101110 101110"
 USB_national_awakening: "国家觉醒"
 USB_national_awakening_desc: "来呀．朋友们，探寻更新的世界\n现在尚不是为时过晚。开船吧！\n坐成排，划破这喧哗的海浪，\n我决心驶向太阳沉没的彼方，\n超越西方星斗的浴场，至死\n方止。也许深渊会把我们吞噬，\n也许我们将到达琼岛乐土，\n与老朋友阿喀琉斯会晤。\n尽管已达到的多，未知的也多啊，\n虽然我们的力量已不如当初，\n已远非昔日移天动地的雄姿，\n但我们仍是我们，英雄的心\n尽管被时间消磨，被命运削弱，\n我们的意志坚强如故，坚持着\n奋斗、探索、寻求，绝不屈服。"
 USB_the_union_forever: "联邦永存"
 USB_the_union_forever_desc: "看哪，身体和灵魂——看看这地方\n这是我的曼哈顿，这里有教堂的尖顶，有汹涌的，闪光的\n海潮和船舶，\n这广阔而多样的陆地，南北都受到光照，有俄亥俄的海\n岸，和密苏里的水乡，\n并且永远在广大的草原上满铺了青草和稻粱。\n看哪，最美丽的太阳是这么宁静这么岸然，\n蓝色和紫色的清晓吹拂着微微的和风，\n无限的光辉是那么温柔清新，\n正午的太阳神奇地沐浴着一切，\n随后来到的美丽的黄昏，和受欢迎的夜和星光，\n全都照临在我的城市之上，包括了人民和大地。\n唱下去吧，唱下去吧，你灰褐色的小鸟哟！\n从大泽中，从僻静的深处，从丛树中倾泻出你的歌声，\n让它透过无限的薄暮，透过无限的松杉和柏林。\n唱下去吧，最亲爱的兄弟哟！如箫管之声一样地歌唱吧，\n以极端悲痛之声，高唱出人间之歌"
 USB_america_the_beautiful: "美国依旧美丽"
 USB_america_the_beautiful_desc: "轻风分开云层，云缝里刹那间\n闪现了我从中出生的黑暗世界。\n又一次，那古老而神秘的微光\n滑下你纯洁无瑕的眉头、肩头\n与胸口，那儿跳动着苏醒的心房。\n你的脸从朦胧中开始发红，\n甜甜的眼睛对着我渐渐发亮，\n直到星星们黯然无光，忠于你的\n野性的马群渴望着为你驾车。\n从它们散开的马鬃上抖落暗影，\n四蹄把晨曦敲击成片片火花。\n看哪！你永远是这样默默地\n呈现出丽色；然后，没有答复我\n就离去，只把泪珠留在我的颊上。"
 USB_bring_order_to_chaos: "化混乱为有序"
 USB_bring_order_to_chaos_desc: "当老病之犬奄奄一息，甚至无力进食时，最人道的选择是什么？答案显而易见：实施安乐死。\n在紧急权力整合之前，华盛顿政府便是这样一具垂死挣扎的躯体，沉溺于自身的无能，用鲜血淋漓的虚弱双手苟延残喘。即便内战赋予其紧急权力，它依然无法掌控国民。\n我们仁慈地终结了它的痛苦。但我们的任务远未结束。\n\n秃鹫正在四周盘旋。若在旧时代政府手中，这或许是灭顶之灾。然而，我们早已挣脱那些伪装成\"制衡\"的枷锁。我们将在他们失败的领域取得成功，并镇压混乱。稳定安全即是一切，而它再也不会受到威胁。"
 USB_control_the_president: "控制总统"
 USB_control_the_president_desc: "在紧急权力整合之前，总统是我们意愿的完美代行者。他意志软弱、朽旧愚钝，只要我们稍加压力，他那云山雾罩的脑袋便会彻底崩溃。活脱脱是被我们在阴影中影响的人。\n可我们错了。\n\n痛苦的一年又一年过去，总统屡次行事不利以至野火肆虐。这证明我们如要挽回内战这场大错，只剩下一条路可走：直接控制。\n总统精神虚弱，可资操纵，我们也是时候紧握缰绳了。我们不会再被这一人的无能所拖累。我们的意愿将直接化为行动，我们的字迹将悉数变为法案，接下来每一步的红毯都将由我们铺就。总统扼杀不了混乱，该我们出手了。"
 USB_reassure_the_establishment: "安抚当权者"
 USB_reassure_the_establishment_desc: "建制派，这些草中潜行的阴险毒蛇，陈旧的新自由-新保守主义双首孽物的残渣余孽，是我们重建秩序之路上最后的绊脚石。\n\n我们容忍他们自由行事太久了。我们一直坐视他们挥霍1991年后美国对全球享有的权力。我们一直放任他们侵蚀秩序的基石而任由混乱蔓延。\n但如今我们权柄在手，就绝不会再施以同样的仁慈。\n\n我们将支配他们，以保证安全的威胁永不再生。那些负隅顽抗者将再无重见天日之时。他们的无能再不会威胁到我们的安全。"
 USB_keep_them_in_the_dark: "让他们蒙在鼓里"
 USB_keep_them_in_the_dark_desc: "在进行紧急权力整合前的数年里，我们一直于幕后操盘，远距离影响着美国的一笔一划。然而，这些策略终究暴露了其陈腐。\n那场内战，那次让我们追悔莫及的重大失误清楚地昭示：民众都是疯狗，只有法律与秩序的铁链能把它们拴住。内战让这些凶暴的野兽破笼而出，任其在旧世界的废墟上瓢泼恐慌。\n\n若要将秩序带回这片混沌，人类必须受到管束。美国将不再是一个民治的国度，他们已经证明了自己不堪信任。美国将由那些真正配得上统治的人来主宰。"
 USB_the_patriot_ii_act: "第二爱国者法案"
 USB_the_patriot_ii_act_desc: "社会各阶层中肆虐的极端主义是紧急权力整合前如瘟疫般侵蚀华盛顿政府的病态症候之一。那个政府忙着向所谓的\"制衡原则\"卑躬屈膝，却对头顶盘旋的秃鹰视而不见。\n是时候将这病症斩草除根了。\n\n从联邦调查局到国家安全局，再到国土安全部，这一系列机构都因所谓\"自由\"被错误赋予群氓从而无法真正遏制住反社会活动、国内恐怖主义与极端主义的蔓延。《第二爱国者法案》将确保让宪法中的过时的枷锁化为一纸空文。无知者会称这一法案为\"国内反恐战争\"的序幕。此喻甚妙。\n我们将无处不在，时刻监听，静待猎物；而一旦侦获极端主义与反社会行为，其将被迅速镇压，彻底铲除。"
 USB_out_of_many_one_nss: "合众，为一"
 USB_out_of_many_one_nss_desc: "我们已经袖手旁观太久，坐视乌合之众的暴政肆虐。但如今国家命脉已尽在我们手中，在真正配得上执掌权柄之人的手中。\n长久以来，我们自身、我们的赞助人与我们的智库之间始终存在利益冲突，这种彼此倾轧在秩序崩坏的时刻蒙蔽了我们的双眼。直至此时，我们才拨云见日；直至此刻，我们才看清自己必须成为什么。\n我们必须超越那些琐碎内斗、松弛散漫与软弱不堪。我们必须成为更崇高的存在。\n\n超级企业、情报机构、军工复合体。血脉、躯干、意志。混沌的大熔炉铸就了这具生命体。多年来，我们被冠上诸多外号——\"上面那帮人\"、\"新世界秩序\"、\"精英阶层\"。而今，我们只有一个名号：\n全知者。"
 USB_the_visible_hand_nss: "有形之手"
 USB_the_visible_hand_nss_desc: "自紧急权力整合伊始，企业赞助商便是我们的生命线。他们资助我们的机构、项目和预算，也正是仰赖他们的慷慨，我们才能持续掌控国家机器的命脉。\n但这慷慨却远不止于出资。\n\n贝莱德、辉瑞、拜耳-孟山都，他们种植着大众食用的粮食，泵送出大众饮用的清水，填充着大众消费的媒体，生产出流淌在大众血液中的药剂。\n他们无所不是，无处不在，无时不然；不难看出，我们也是如此。\n你尽可尝试走出门去不看我们的广告，进入超市寻找没品牌的食物，关上龙头不喝我们送达的净水，忍住疼痛不用我们的良药。有形的大手笼罩着每座城市的每个家庭、直到每具躯体的每个细胞。"
 USB_corporate_infrastructure_bill: "企业基础设施法案"
 USB_corporate_infrastructure_bill_desc: "我们与美国企业界的合作由来已久，并在此过程中形成了某种心照不宣的默契。\n随着《企业基础设施法案》的出台，我们的目标是强化这种纽带直至形成共生关系——通过提供更多资金、大规模私有化许可及全国范围内的项目自主权，换取企业界对我们决策的绝对服从。"
 USB_global_cooperation: "全球合作"
 USB_global_cooperation_desc: "国内早有传言，一旦危机爆发，联合国部队将会驻扎数十年。而第二次美国内战正是这样一场世界无法忽视的危机。\n面对人道主义危机与社会秩序面临的威胁，我们非常乐意接受联合国援助，为民众提供救济。此外，维和部队的介入将使我们能更灵活地调派兵力，以应对前线及国内更紧迫的事务。"
 USB_expand_fema_authority: "扩大联邦紧急事务管理局权力"
 USB_expand_fema_authority_desc: "联邦紧急事务管理局数十年来一直是反社会思潮的主要攻击目标。该机构曾被视作暴政工具，导致公众信任度持续下降。\n这场内战在多条战线均构成国家紧急状态。通过扩大联邦紧急事务管理局的权限，我们既能着力化解当前危机，又能强化对席卷全国混乱局面的控制，确保此类悲剧永不重演。"
 USB_food_security_program: "粮食安全计划"
 USB_food_security_program_desc: "通过与拜耳-孟山都等农业科技巨头及贝莱德等核心土地持有者合作，我们将通过转基因技术强化粮食安全，使民众逐渐依赖农业巨头的产品。\n劳动力将被重新安置至人口稀少地区，远离可能滋生地方同情心与异议势力的区域。\n同样，我们将在供水系统中采取氟化处理及行为控制化学物质投放等措施，从根本上遏制混乱因子的滋生。"
 USB_media_omnipotence: "媒体无所不能"
 USB_media_omnipotence_desc: "所有媒体形式都是思想在时代精神中传播的载体；有些思想值得推广，而另一些则对我们数十年精心建立的根基具有腐蚀性。\n通过将文化导向置于掌控之中，我们能够确保任何具有腐蚀性的思想都无从滋生。在专家监督下提供的无意义娱乐与精心策划的新闻报道，正是让反社会思想永不见天日的诸多手段之一。"
 USB_implement_hi_tech_solutions: "实施高科技解决方案"
 USB_implement_hi_tech_solutions_desc: "自从走出洞穴以来，人类就在孜孜不倦地攻克难关。纵欲、混沌、暴戾、对改变的渴望。\n利用科技的巨大进步，我们得以为这些问题提供更持久的解决方案。\n纳米芯片、Neuralink脑机植入、加上专为美国打造的局域网……我们推行秩序的方案库中，这些不过是冰山一角。"
 USB_public_health_safety_act: "公共卫生安全法"
 USB_public_health_safety_act_desc: "针对华盛顿特区的化学恐怖袭击、新冠肺炎疫潮以及持续恶化的心理健康危机，都成为维持社会秩序的正当理由。面对公共卫生威胁，我们可以实施人口监控政策，启动长期封锁机制，设立高度监控区域以打击反社会骚乱。此外，在疾控中心的协助下，这些措施也将为预防未来大流行病发挥持久效用。"
 USB_domestic_war_on_terror: "国内反恐战争"
 USB_domestic_war_on_terror_desc: "内战揭示了诸多问题，其中最深层的痼疾是极端主义，这种病症侵蚀着社会的每个角落，从内部腐蚀文明，触及之处皆遭摧残。当华盛顿政客们唯恐不及地躲在办公桌下哀嚎时，情报机构挺身而出。\n情报机构是我们真正的核心——既是脊梁，亦是耳目。他们既推动着我们的事业进程，也在与本土恐怖主义进行无声战争。\n\n他们的行动遍布全国每个角落，每个角落都潜伏着监听之耳，每堵墙后都隐藏着监视之眼。无论你身处何地，总有目光如影随形；即便在最幽暗的密室，也永远存在着窃听的耳朵。\n战争不仅在枪管之间进行，更在人心之间交锋。"
 USB_silent_weapons_for_quiet_wars: "无声武器，静默战争"
 USB_silent_weapons_for_quiet_wars_desc: "并非所有战争都以肢体相搏。人类的躯体如同手术台上的标本，在外科医生的操刀下，我们可以解剖、修复、截肢——将想要保留的部分与视为不祥的部分彻底割离。\n意识便是其中一部分；让民众对帷幕之后发生的一切视而不见，始终是我们的首要任务。\n无知的大众便是温顺的大众，当他们注意力被引向他处，我们自可畅通无阻地开展工作。"
 USB_expand_the_black_budget: "扩大黑色预算"
 USB_expand_the_black_budget_desc: "自从情报机构以现行形式存在以来，始终存在着不受宪法约束的秘密\"黑色预算\"——这些未记录的资金堆积如山，让我们得以不受国会束缚地推进全球及国内议程。\n如今由真正具备智慧之人执掌权柄，加之我们慷慨的企业赞助者鼎力支持，我们得以继续推进各项计划——无需担心被无知大众窥探。"
 USB_lone_wolf_protocols: "孤狼协议"
 USB_lone_wolf_protocols_desc: "解除民众武装已引发不满情绪升温，我们有责任让公众认识到全民持枪潜在的危险性。\n通过对不稳定分子施加适当压力，可诱使其使用非法枪支制造大规模伤亡事件。借助媒体助力，我们将使民众丧失武装意愿，使其生活在恐惧之中。如此一来，他们便会渴求秩序。"
 USB_manufacturing_the_primary_victory: "缔造初选胜利"
 USB_manufacturing_the_primary_victory_desc: "\"同意\"就是我们的胜利。当温顺的公民甘愿将其财产积蓄献给国税局还不求回报时，我们就已经赢得了他们的真心。\n秩序即是终焉。秩序是我们为之奋斗的一切的自然结果。自我管理的民众将会得到永恒。"
 USB_empower_the_special_activities_center: "赋权特别行动中心"
 USB_empower_the_special_activities_center_desc: "华盛顿政府的最大失误，便是纵容了那些无知狂徒在\"言论自由\"的荫蔽下暗中串联。他们任由反社会极端分子用浸透反讽的低语，在社会最阴暗的角落里编织阴谋。待我们发觉阴谋的真正规模时，他们已然发难，操纵烈火将旧秩序吞噬殆尽。\n即便军事无政府状态的余烬已经冷却，那些藏身暗处的蟑螂也仍在探照灯下四散潜伏。异议分子、反社会分子、极端分子三位一体的结合正腐蚀着所触及的一切，是必须出重拳的国安威胁。\n\n特别行动组一直以来是我们手下的关键利器，是一只粉碎威胁的铁拳。我们早已四处布设耳目，密切监视。现在，是时候采取行动了。通过黑色预算支持，特别行动中心已成为新秩序最强大的资产。遍布全美的一支幽灵军团已经苏醒。天空中，暗色直升机正在巡弋国土，时刻准备缉拿异议分子、反社会分子与极端分子。军队里，我们的力量遍布每间营房，正静待最细微的叛乱言论。祸当殄于未兆。"
 USB_child_safety_act: "儿童安全法"
 USB_child_safety_act_desc: "长期以来，网络空间充斥着反社会内容、异见思想及敌对势力的交流，《儿童安全法案》将为互联网的黑暗角落带来光明。\n儿童始终是最易受侵害的群体，事实证明，在缺乏父母监管的情况下持续接触网络反社会元素，会对他们的心智产生腐蚀性影响。我们将彻底清除那些具有剥削性质的不良内容，通过在家长心中播下恐惧的种子，这项举措必将毫无阻力地推行。"
 USB_restore_the_redacted_files: "复原删节档案"
 USB_restore_the_redacted_files_desc: "过去，得益于政治两极分化带来的纷扰，我们得以在无人关注的阴影中运作，开展了众多项目以抵御国内外敌人对国家造成的威胁。遗憾的是，由于无知者的伦理质疑与资金削减，我们不得不将这些项目封存。\n如今掌权者重归正途，我们理应重启这些计划并加以完善。"
 USB_keep_the_cycle_repeating: "循环往复"
 USB_keep_the_cycle_repeating_desc: "看看我们内外交困的国度，看看动荡不安的外部世界。\n\"美式和平\"的存在有其必然。秩序是值得追求的崇高美德。那些曾指责我们思想有害的诽谤者，如今皆被他们自己扶植的势力反噬。\n而我们将永远屹立于此。"
 USB_gears_of_war: "战争机器"
 USB_gears_of_war_desc: "在第二次美国内战结束后，军工复合体成为华盛顿政府战争机器的核心支柱。而随着紧急权力整合的推进，其地位更显举足轻重。\n若将巨型企业比作我们的血脉，情报机构视作我们的躯干，那么军工复合体便是我们的大脑。这个汇聚智慧、运筹帷幄的中枢神经，正全力确保国家安全永不再受威胁。\n\n我们的赞助者们慷慨资助各项国防计划——来自国防高级研究计划局的工程师、科学家和当代最杰出的头脑们，正为军队与国家安全体系源源不断地输送创新成果。这些突破性技术将成为涤荡混乱的利剑。我们曾袖手旁观，任由美国在科技创新领域跌落神坛。这样的耻辱绝不会重演！内战失去的荣光必将重现，当新型武器的炮火轰鸣之时，便是混沌秩序终结之日。"
 USB_merge_the_mic: "整合军工复合体"
 USB_merge_the_mic_desc: "军工企业间无谓的内耗严重拖累了我们保持战略优势的步伐。这种恶性竞争导致技术发展停滞不前——迫使我们只能在蓝方或红方的缺陷方案中做选择，在平庸与将就之间勉强妥协。\n我们绝非此前那些鼠目寸光的蠢材，绝不容忍这种贻误国事的门户之争。此等行径既有辱国家使命，更配不上我们的雄心壮志。是时候革除军工复合体的冗余积弊，将其整合为真正的国家重器。通过合并这些散兵游勇的力量，洛克希德·马丁-波音联合体与通用动力必将成为人类史上最强大的智库中枢。\n当权柄重归理智之手，我们终将以绝对的技术优势，重塑世界秩序。"
 USB_reel_in_the_think_tanks: "收紧对智库控制"
 USB_reel_in_the_think_tanks_desc: "智库机构长期处于失控状态。当我们的企业、情报部门和国防高级研究计划局昼夜不停地纠正那个让我们一败涂地的大错时，这些智库却在游手好闲。不过正如任何优秀的战略家都会做的，我们要物尽其用，对智库也不例外。我们已明确告诫他们：软弱决不被容忍。如今他们已和其他战略资产别无二致。\n曾经形同虚设的彼尔德伯格集团，如今正通过年度会议竭力重建被战火吞噬的世界秩序；因第二次内战失去存在意义的三边委员会，正重新施展外交手腕——诱使地区强国逐步落入我们日益扩张的掌控；就连所谓的\"新保守主义者\"和\"永不支持特朗普派\"也复活了早已腐朽的\"新美国世纪计划\"，既为重建全球霸权奔走，更为我们擘画未来蓝图。"
 USB_unrestrained_rd: "无节制科研"
 USB_unrestrained_rd_desc: "\"伦理道德\"是寄生在科学创新上的毒瘤。自其成为优先考量以来，伦理就始终是庸碌之辈赖以自我安慰的拐杖——即便在竞争中远远落后，也能靠着所谓道德优越感安然入眠。紧急状态整合前的旧政府同样如此，他们纵容暴民勾结作乱，放任敌手碾压我们初创的企业——只为维护他们所谓的道德纯洁。\n如今，束缚这个国家伟大头脑的枷锁已被彻底粉碎。秩序必须重建，倘若重新掌控全球需要以部分群体的牺牲为代价，那就让他们成为垫脚石。"
 USB_projects_of_greatness: "伟大项目"
 USB_projects_of_greatness_desc: "纵观现代世界历史，几乎每项重大创新都需要某种形式的资金支撑。无论是否记录在案，堆积如山的金钱总能让项目免于沉沦在失败的黑暗深渊。我们的军工复合体企业也不例外。随着野心膨胀，他们对资金、自由和权力的渴求也日益增长。\n\n通过企业合并、放宽监管与破除伦理束缚，我们已借助军工产业建立起人类史上最强大的智囊库。利用黑色预算，他们所有的财政、资源与人力负担都将消弭于无形。军工复合体将继续获得充足资金，维持无数项目的运转。\n蓝图已然绘就，棋子各就其位——从空前复杂的数字监控网络，到从叛徒马斯克手中夺取的神经科学研究成果，世界即将见证我们被旧政府摧毁的潜力与威望重新崛起。通往秩序的道路已经铺就，我们只需踏足而行。"
 USB_ensure_aerospace_dominance: "确保航天霸权"
 USB_ensure_aerospace_dominance_desc: "在1991年后建立的全球秩序中，我们曾独霸航空航天领域。九十年代一系列军事行动的成功彰显了我们雄厚的实力。隐形战机主宰苍穹，向敌人倾泻地狱之火，任何胆敢挑战秩序的外部威胁都在数周内灰飞烟灭。但内战前夕，这座帝国大厦轰然崩塌。竞争对手后来居上，民众开始密谋反抗，烈火吞噬了我们的国度。\n当我们缺席时，混沌席卷全球。从欧洲紧张局势到台海战争，这些国家已充分证明他们无力自制，只会不断煽动混乱之火。因此，我们需要保护他们。通过黑色预算，我们将助力洛克希德·马丁与波音公司重夺全球市场霸权，为世界重建秩序。既然他们证明了自己不配享有自卫的权利，那么这份责任理当再次由我们肩负。"
 USB_dumb_construction: "建设深层地下军事基地"
 USB_dumb_construction_desc: "深层地下军事基地的构想可追溯至冷战时期。尽管名称几经更迭，其核心宗旨始终如一：既作为应急避难所，又充当政府权力的延伸堡垒。这些提案当年自然无疾而终。但内战的血泪教训让我们清醒认识到，暴民不过是群挣脱锁链的狂犬，随时准备噬咬。此类应急设施已非锦上添花，而是生死攸关的必需品。\n\n当年那些鼠目寸光否决此议的蠢材，如今早已化作历史的尘埃。如今我们执掌权柄，凭借黑色预算调动的惊人资源，足以将宏图化为现实。这些深入地层的地下要塞，不仅能在秩序再度崩塌时提供庇护所与多重应急预案，更将为国防高级研究计划局及军工复合体提供顶级科研场所，助其研发推进我们议程的尖端科技。"
 USB_hunter_killer_program: "猎杀者计划"
 USB_hunter_killer_program_desc: "在维护秩序的斗争中，我们从不设限——任何手段都在所不惜。若需焚尽整座村庄方能铲除一个威胁，我们必是第一个举起火把之人。尽管我们倾尽全力，异见分子仍如毒蛇般潜伏沙中，伺机而动。必须采取更极端的净化措施，将这个腐蚀国家的毒瘤彻底清除。\n无人机技术让我们能轻易猎杀任何藏匿的叛乱分子。无论是漆黑深夜还是密林深处，这些极端分子都逃不过我们的天罗地网。依托国内航天企业，我们拥有源源不断的廉价无人机供应，足以碾碎所有国家安全威胁。猎杀者计划由此应运而生。科学创新本就不该被伦理束缚，战争法则亦是如此。早在内战爆发前，那些愚民就对无人机作战喋喋不休——如今他们已丧失抱怨的资格。既然由我们掌舵，自当废除束缚无人机作战的条条框框。通过该计划，所有叛乱者都将被精准定位，彻底抹除。"
 USB_kickstart_the_amnet: "创建美国神经网"
 USB_kickstart_the_amnet_desc: "在这个日益数字化的世界里，每个人都退守在自己的信息茧房中。无论是沉迷于公关形象的爱国者阵线，还是扮演厌世主义的核武之师，又或是以社会进步为名行野蛮之实的美国人民解放军，这些封闭的群体不断向社会的沼泽中倾泻自相矛盾的\"真相\"，驱使每个个体选择最符合自身诉求的\"真相\"来回应这个垂死的社会。内战便是如此爆发的，全球秩序便是如此被烈焰吞噬的，若没有我们的干预，人类文明也将如此陷入停滞。\n通过支撑美国神经网的人工智能，我们得以筛选重要信息，剔除数字舆论场中的糟粕。有人称之为审查，但实际上我们只是通过过滤垃圾数据来重建认知语境。历史已证明，民众所谓的\"自由\"只会导致死亡与绝望。作为统治者，保护他们、替他们思考是我们的天职。\n\n除此之外，美国神经网还将承担另一项使命：作为人类思维的聚合矩阵，帮助我们研究思想、文化与符号（或称\"模因\"）的传播规律。数十年来，劣等政府始终在寻找破解人类心智奥秘的钥匙——或者说社会控制的密钥。而我们早已发现答案就是模因学。通过美国神经网采集的海量数据，我们的预测型AI将深度习得人类思维的复杂模式。依托这套系统，我们能够以指数级效率镇压反社会行为，彻底规避人类预判的失误。现有研究表明，凭借AI强大的语境分析与演绎能力，我们甚至能在犯罪行为发生前进行识别。美国神经网的启动，仅仅是个开端。"
 USB_justice_reform: "司法改革"
 USB_justice_reform_desc: "过去数年，正义女神始终隐忍克制——那些绕着她争吵不休的秃鹫，正巴不得她永远蒙着双眼。\n秩序乃美德，若让正义重见光明，我们便能重拾这份美德。"
 USB_form_the_uspf: "组建美国警察部队"
 USB_form_the_uspf_desc: "旧美国体制最致命的缺陷之一，就是纵容地方忠诚凌驾于联邦忠诚之上。地方执法机构对犯罪行为和叛国言论宽容过度，这种局面必须在此终结。\n通过组建美国联邦警察部队，我们将确保由跨辖区轮调的执法人员监管各地社区，从根本上杜绝因情感纽带产生的执法宽容。"
 USB_atf_new_purpose: "ATF新目标"
 USB_atf_new_purpose_desc: "当权力的杠杆牢牢掌握在我们手中时，我们就能改革忠诚的机构，使其更有效地遏制席卷全国的混乱浪潮。\n烟酒枪炮及爆炸物管理局始终保持着对美利坚的忠诚，而忠诚必将获得回报。我们将向其增拨资金并赋予更多特权，以打击那些玷污我国的邪教组织对第二修正案的滥用。从福音派团体到社会主义读书会，所有违背秩序的组织都将被定性为邪教并受到相应处置。"
 USB_coordinate_with_the_ic: "协调情报机构"
 USB_coordinate_with_the_ic_desc: "情报机构始终是美利坚合众国的支柱之一，当疯狂的阴影试图潜入我国时，它始终保持着警惕。如今疯狂已蔓延至我国境内，我们将赋予情报机构更广泛的权力，以同时应对内外威胁。\n沉睡的日子已终结，警惕之眼将永不闭合。"
 USB_expand_the_dhs: "扩充国土安全部"
 USB_expand_the_dhs_desc: "卫生与公众服务部已被证明机构臃肿且未能有效应对极端主义迫在眉睫的威胁，随着核武之师发动的化学袭击，医疗卫生已演变为国家安全的隐患。\n因此该部门将并入国土安全部，借助新视角审视这些问题，我们的目标是严格执行封锁措施，并维护所有与公共卫生相关的强制法令。\n任何违反防疫法令者将被隔离在联邦紧急事务管理署的设施中，以防止对国家造成进一步危害。"
 USB_a_kick_in_every_door: "踢开每扇门"
 USB_a_kick_in_every_door_desc: "官僚体制唯有维系秩序方显价值。然而内战爆发后，繁文缛节反而成了沉重负担。\n近期事件使我们获得了精简臃肿机构的利器。凭借此利器，我们将有权搜查每处住宅，采取强硬调查手段，并拘留任何被视为威胁的人员。"
 USB_the_right_to_remain_silent: "保持沉默之权利"
 USB_the_right_to_remain_silent_desc: "经过周密策划并针对多个邪教组织、叛乱团体及恐怖分子实施系列行动后，我们可以断言，使命远未终结。秩序需要被精心而持续地维系。\n如同瓷制面具，容不得一丝裂痕。\n国家的事业尚未完成。"
 USB_we_wont_fail_again: "绝不重蹈覆辙"
 USB_we_wont_fail_again_desc: "我们曾击败不列颠，我们曾击败德意志，我们曾击败俄罗斯。\n而如今，正如往昔，我们亦击败了内心的兽性。\n我们绝不会重蹈覆辙。\n秩序永存。"
 USB_build_back: "重建"
 USB_build_back_desc: "\"重建更好未来计划\"曾是拜登政府为国家绘制的宏伟蓝图。如今秩序既已重塑，我们将完成这项工程，并为其注入更完善的改进。\n长期被忽视的基础设施将得到彻底修缮，一项社会疫情救助法案即将通过，多项社会政策倡议将获得额外资金支持。更重要的是，藉由当前的重建进程，我们将重新塑造美国城市图景，使之服务于我们的战略目标。"
 USB_federal_rail_network: "联邦铁路网"
 USB_federal_rail_network_desc: "内战赋予了我们为维护国家安全而施行任何政策的绝对权力。随着横跨全国的庞大铁路网络建成，我们得以根据工作任务定期调配劳动力。\n这也将强化对民众的监控，农村人口将被迁入城市，特别是那些对我们企业盟友缺乏盈利价值的区域。"
 USB_cold_hearted_pragmatism: "冷血实用主义"
 USB_cold_hearted_pragmatism_desc: "若声称我们仍在恪守某些价值观，那无疑是赤裸的谎言；然而我们都已目睹过，被极端主义迷雾蒙蔽双眼的国度将面临怎样的结局。\n对待国民就应当如严父管教子女般果断；我们深知何种方式最为有效，何种手段能带来成果。\n我们可以选择做道德君子，亦可成为让美国重登世界霸主宝座的领袖。"
 USB_safeguard_the_population: "保卫人民"
 USB_safeguard_the_population_desc: "无知者无痛。\n我们的民众已历经磨难，毫无疑问，大多数人都渴望回归常态。然而安全有序地\"回归正常\"根本无从谈起，但我们能提供一层慰藉的面纱——秩序机器永不停歇地运转，确保民众永葆无知。\n官员们依旧握手寒暄，监控以更隐秘的方式进行，世界照常运转。\n我们在阴影中耕耘，只为让他们得见天明；唯有心怀不轨者，才需要躲藏隐匿。"
 USB_megalopolis_project: "大都市计划"
 USB_megalopolis_project_desc: "据报告，铁锈带及偏远农村地区正出现极端反社会活动，这些地域无论对我国还是企业合作伙伴而言，几乎毫无价值。\n我们将启动城市扩张计划，将农村人口迁入都市中心。此举既能为农村地区的军事行动提供战略缓冲，又能将民众置于城市的有效监控之下。"
 USB_efficient_use_of_land_act: "土地高效利用法"
 USB_efficient_use_of_land_act_desc: "内战在我们的土地上刻下了深重伤痕，鉴于广大农村人口对我们抱持强烈敌意，此时明智之举便是征用他们的财产，用于推进大规模农场等宏伟规划。我们可与贝莱德集团的伙伴们携手，让这些土地发挥更大价值。"
 USB_redefine_big_government: "重新定义大政府"
 USB_redefine_big_government_desc: "中央集权是大多数美国人不熟悉的概念，但事实已经证明，实行中央集权是必要的。\n为了防止那些更偏向本地而非整个美国的\"忠诚\"继续发展下去，分权将成为过去。\n每个州的每位官员都将向监督重建国家的中央当局负责。"
 USB_biochemical_breakthroughs: "生化突破"
 USB_biochemical_breakthroughs_desc: "人类已反复证明其行为难以预测，但正如所有哺乳动物，他们终究受制于大脑中分泌的化学物质。\n通过在全球水体中投放驯化剂、推行大规模疫苗接种、建立生物实验室，我们已实现生化领域的重大突破。人类心智将始终处于持续改造状态，直至达到我们期望的温顺境界。"
 USB_intensify_digitalization: "加强数字化"
 USB_intensify_digitalization_desc: "新冠疫情揭示了人类对数字世界的高度依赖——一个易于被掌控与维持的世界。\n借由秩序的名义，我们可以将现代生活的几乎所有层面完全数字化：金融、通信、档案存储、以及大众媒体的消费。在这一体系下，没有任何事物能在我们不知情的情况下流动。随着民众对数字领域的依赖愈发加深，即便是最为犹豫的人，也将被迫参与到社会的运转之中。"
 USB_the_new_social_contract: "新社会契约"
 USB_the_new_social_contract_desc: "社会契约是维持秩序的基石。\n然而，它最大的缺陷在于，那份契约的墨迹可被抹去，纸张也过于脆弱。\n只要让民众相信，为了让他们的孩子能够平安上学、为了避免反社会的行为带来伤害，他们必须放弃一部分自由，那么他们就会几乎乞求我们来为混乱带来秩序。"
 USB_correcting_the_great_mistake: "纠正重大错误"
 USB_correcting_the_great_mistake_desc: "新自由主义与新保守主义的二元对立，终究未能经受住时间的考验。随着新冠肺炎与第二次美国内战的爆发，基于规则的旧秩序根本缺陷暴露无遗，造就了现代史上最严重的混沌时期。\n我们已吸取教训，并将倾尽全力确保历史永不重演。\n\n秩序乃立身之本。\n我们绝不任由变革的烈焰吞噬自身。"
 USB_nnunion: "NN联盟行动"
 USB_nnunion_desc: "加拿大历来是美利坚合众国的长期盟友，然而此次危机表明，我们北方的兄弟之邦缺乏应对未来潜在危机的能力。\n所幸我们仍有志同道合之士身处其权力核心。通过对关键人物施加压力并作出承诺，我们可以促使加拿大政府以更友善的态度与我们相处。"
 USB_arctic_security: "极地安全"
 USB_arctic_security_desc: "北极地区始终笼罩在种种理论与谜团之中；无论真相如何，确保这片冰封荒原的安全符合我们的根本利益，以防其他外部威胁在此建立据点。"
 USB_gapigs: "GA猪湾行动"
 USB_gapigs_desc: "加勒比地区向来如同战利品般令人垂涎，古巴尤甚。\n海地等岛屿上盘踞的共产主义意识形态分子与犯罪团伙，极易受外国势力操控，可能对国家安全构成实质性威胁。建议采取军事干预行动，以恢复该地区的秩序与民主。"
 USB_limartini: "LI马提尼行动"
 USB_limartini_desc: "墨西哥始终是如鲠在喉的隐患，无论是非法移民问题还是跨境毒品运输。这个南方邻邦已深陷混乱的泥潭，毒品集团与革命武装除了持续助长反社会行径外无所作为。\n对墨西哥实施适当的军事干预，将使我们得以整顿该国局势，确保自家后院不再滋生任何敌对势力。"
 USB_pcbridge: "PC桥梁行动"
 USB_pcbridge_desc: "中美洲堪称连接南北美洲的桥梁，而我们暂时缺席之际，中美洲各国已显露出其对美国的真实态度。\n只要稳固这座桥梁，我们便能畅通无阻地通往南美洲，并重新掌控巴拿马运河。"
 USB_work_force_act: "劳动力法"
 USB_work_force_act_desc: "劳动力法案允许我们利用被拘留的公民作为劳动力，既能削减成本，又能向未来的反社会分子表明制造混乱必将付出代价。"
 USB_mhoctopus: "八爪鱼"
 USB_mhoctopus_desc: "扩大我们的全球覆盖范围，将确保我们能够在任何时刻以精准施加武力的方式应对各类危机。那些逃亡海外的异见分子、恐怖运动头目以及颠覆势力都将无处遁形。"
 USB_solidify_our_position: "巩固地位"
 USB_solidify_our_position_desc: "随着秩序在全球范围内逐渐恢复，我们必须从让变革之火席卷世界的错误中汲取教训。通过采取预防性措施，在关键位置部署恰当防御，我们定能确保任何敌对势力都难以对美国造成实质性伤害。"
 USB_mqwallbreaker: "MQ破壁者行动"
 USB_mqwallbreaker_desc: "亚洲与大洋洲始终是我们与中国角力的焦点区域。随着这条红色巨龙在该地区不断加剧敌对行动，我们势必会对这个长期对手施加持续增强的联合压力。\n通过向传统盟友提供支持，并重新修订对华应急计划，我们将为中国的扩张主义叙事画上句号。"
 USB_lznostalgia: "LZ怀旧行动"
 USB_lznostalgia_desc: "南美洲这片大陆早已被混乱的汽油浸透，直至今日，尚未引燃的混沌气息依然弥漫。\n通过干预极端主义肆虐的国家并向昔日盟友施压，秩序终将重归，而我们也能够在这片大陆上继续不受阻碍地开展行动。\n一切照常进行。"
 USB_cxhomecoming: "CX老爹行动"
 USB_cxhomecoming_desc: "欧洲历来是意识形态与帝国交锋的战场；即便今日，我们仍可看到美国的缺席给整个大陆带来的只有负面影响。\n无论这片土地被极端思想还是俄罗斯占据，都无关紧要。\n正如守护者从不真正离开，随着我们不可避免的回归，世界将见证我们对全球秩序的构想远未终结。"
 USB_aqtomato: "AQ番茄行动"
 USB_aqtomato_desc: "数十年来，非洲始终是一片混乱的画卷。无数独裁者与叛乱势力交织，却正绽放着拓展我们影响力的巨大潜能。\n\n通过资助合适的自由战士，同时纵容独裁者镇压革命共匪，我们将能牢牢掌控这片黑色大陆的动向。"
 USB_kktemple: "KK圣殿行动"
 USB_kktemple_desc: "中东这片土地充斥着反社会分子、激进极端主义者和盲目狂热之徒，他们随时可能陷入自杀式的疯狂。\n这片浸透无尽鲜血的落后地域，我们最大的错误就是任其在泥沼中沉沦。但我们必将重返，而这一次我们将永不撤离。"
 USB_destroy_hazardous_elements: "清除危险分子"
 USB_destroy_hazardous_elements_desc: "如同所有害兽，反社会分子在我们的国度里顽固存续。\n这些极端主义的毒瘤潜藏于城市最阴暗的角落，散发着渴求变革的兽性冲动。\n人性本就是需要持续审视的光谱；我们将清除这些强加于身的疮痍。"
 USB_war_machine_back_on_track: "战争机器重回正轨"
 USB_war_machine_back_on_track_desc: "军工复合体如同降下神罚的天神，将怒火倾泻在一切秩序之敌的头上。美国战争机器被道德枷锁束缚了太久，而这类顾虑从来只配留给顺服者。\n当我们的军队重获应有尊严，便能让\"美式和平\"重返人间。\n这一次，将是永恒。"
 USB_the_arsenal_of_order: "秩序兵工厂"
 USB_the_arsenal_of_order_desc: "坦克、导弹、战机与战舰，不过是我们实力的冰山一角。\n我们的敌人已在阳光下恣意享乐太久，我们暂时的缺席让他们变得安逸，过分安逸。\n凭借麾下的智慧力量与全面运转的军工体系，我们将蓄势待发，随时迎战任何强敌。"
 USB_reopen_the_factories: "重开工厂"
 USB_reopen_the_factories_desc: "历经两次世界大战的洗礼，我们一次又一次地证明了美国工业始终处于领先地位；任何阻挡稳定必然进程的敌人，都不过是历史长河中的注脚。\n随着科技与工业实力的飞速跃进，这头觉醒的巨人将永不沉睡。"
 USB_freedom_of_movement_act: "行动自由法"
 USB_freedom_of_movement_act_desc: "随着《行动自由法案》的实施，我们将能对国内任何形式的出行实施持续监控。遍布全国的检查站将严格管控民众的驾车路线，联邦铁路网络也将按我们的规划投入使用。\n无论是探亲访友、因劳务调动迁徙，抑或试图潜入乡村地区逃避我们的监控。\n我们都将了如指掌。"
 USB_global_task_force_units: "全球任务特遣队"
 USB_global_task_force_units_desc: "若因全球各地的小规模冲突而过度扩张势力实属愚蠢之举。\n为防止这些问题升级为危机，我们将动用全球特遣部队，以外科手术般的精准度打击当前问题。\n那些装备近乎原始武器的叛乱分子，终将不过是随时可切除的脓疮。"
 USB_permanent_military_presence_worldwide: "全球永久军事存在"
 USB_permanent_military_presence_worldwide_desc: "无论是流氓国家、外部威胁，还是暴力叛乱集团，有一点可以肯定：正是我们的缺席才助长了他们的嚣张气焰。\n在新保守主义鼎盛时期，我们的军事力量遍布全球，敌人曾真切体会过何为恐惧与憎恨。我们的旗帜、象征与语言扎根于他们的土地，昭示着我们不容置疑的存在。\n通过重建全球军事基地并向对手施加精准的军事压力，我们将唤醒他们尘封的记忆。"
 USB_automated_killing_fields: "自动化屠杀区"
 USB_automated_killing_fields_desc: "当前存在着大片充斥反社会分子的区域，这些区域对我们的计划几乎毫无价值。然而放任其自生自灭亦非明智之举。\n借助无人机技术，我们能够对这些区域实施精准管控，遏制任何企图滋事的威胁；无需人力介入。我们绝不与恐怖分子谈判。"
 USB_revive_the_ngb_program: "重启NGB项目"
 USB_revive_the_ngb_program_desc: "下一代轰炸机项目旨在为美军引入新型轰炸机，该机型需具备亚音速最大飞行速度、50-100小时持续作战续航力，并可搭载热核武器。这些象征美式和平的飞行堡垒将成为我们的骄傲，亦是秩序缔造者。"
 USB_utilize_pmcs: "动用私营军事公司"
 USB_utilize_pmcs_desc: "我们与私人军事公司历来是共生共荣。每当需要有人代劳肮脏勾当却又不愿玷污国旗时，我们便会定期雇佣他们的服务。\n没有理由放弃这般互利共赢的合作关系。只要任务完成，我们的企业伙伴不仅乐见酬金上涨，更享受交战规则束缚的解除，何乐而不为。"
 USB_humanitarian_peacekeeping: "人道主义维和行动"
 USB_humanitarian_peacekeeping_desc: "关于我们在全球范围内的行动，始终流传着各种不实传闻，诽谤与散播恐惧早已成为世界警察的常态。\n但真相始终如一。\n凡我们擎起安全火炬之地，民众皆可安然行走于街道。每当平民陷入危难之际，我们必现身驰援。\n携手联合国伙伴，我们将把管控力延伸至动荡地区，令饥者得食，渴者得饮。\n或许我们干扰了他们的生活方式，但难道永恒的混乱才算真正的生存之道吗？"
 USB_watchdog_of_the_world: "全球监督者"
 USB_watchdog_of_the_world_desc: "\"世界警察\"这个称谓常带贬义，但我们的缺席恰恰证明了其不可或缺。\n欧洲两场战火，亚洲两场冲突，全球各地纷争四起——皆因我们不在场。\n而今我们已然归来，并将继续凝视这个世界。\n秩序至上。"
 USB_extinguish_the_fire: "熄灭火焰"
 USB_extinguish_the_fire_desc: "变革的烈焰曾将世界卷入混沌，\n资本、秩序与纯洁历经考验，并以卓越之姿通过。\n这些是值得为之奋斗的美德与理想，而烈焰已然平息。\n被扼制，被驯服。\n为了一个更美好的世界，它永无重燃之日。"
 USB_a_new_world_order: "新世界秩序"
 USB_a_new_world_order_desc: "\"他将地立在根基上，使地永不动摇。\"\n\n诗篇104:5"
 USB_final_chord_of_the_cold_war: "冷战的终章"
 USB_final_chord_of_the_cold_war_desc: "美国治下的和平本应永续，然而当我们的国家经历了一二十年的战略收缩，长期对手俄罗斯已突破原有的遏制圈肆意扩张。这个昔日的地区性强国妄图接过世界警察的衣钵，但其体系早已裂痕累累。\n他们的架构注定无法持久；是时候为这场被遗忘的冷战划下终局了。"
 USB_operation_atlantic_airlift: "§Y大西洋空运行动§!"
 USB_operation_atlantic_airlift_desc: "我们与俄罗斯主导下的欧洲之间横亘着巨大鸿沟。\n借助中央指挥部建立的空运航线，我们得以迅速部署部队以在欧洲大陆开展作战行动。我们曾解放过欧洲一次，如今必将再次实现这一目标。"
 USB_demoralization_and_dehumanization: "瓦解斗志与剥夺人性"
 USB_demoralization_and_dehumanization_desc: "斯拉夫人天生具有傲慢自大、漠视个体生命的生物倾向。\n我们先辈最大的错误之一，便是以为能与俄国人平等对话，这个错误绝不会重蹈覆辙。\n愤怒的种子始终深植于欧洲土壤，而秩序之水将确保我们被占领的友邦绽放出带刺的玫瑰。通过运用模因战争与重塑传统宣传手段，我们将让欧洲人民重新渴望自由。"
 USB_paint_the_tanks_green: "将坦克漆成绿色"
 USB_paint_the_tanks_green_desc: "由于中东地区持续需要稳定，我军大部分部队已完美适应该地区的作战环境。但鉴于欧洲与俄罗斯的环境差异，我们必须让部队根据不同的作战环境进行针对性调整。\n世界早已习惯了身着沙漠迷彩的美军士兵；现在该让他们熟悉这抹绿色了。"
 USB_amplify_our_presence: "扩大我们的影响力"
 USB_amplify_our_presence_desc: "俄罗斯始终不敢全面侵犯我们势力范围的主要原因，正是我们在其边境持续的军事存在；他们目睹了我们在中东、亚洲和欧洲的作战方式。于是像秃鹫般等待着我们的崩溃。\n\"雄鹰逼近时，肥硕的秃鹫只能匍匐不前。\"\n我们将重新在欧洲周边建立军事存在，并最终深入腹地，让俄罗斯人重温数十年来如影随形的焦虑。美国，将在此长存。"
 USB_lend_lease_act: "租借法案"
 USB_lend_lease_act_desc: "在第二次世界大战中，我们曾在盟友危难之际伸出援手，如今当欧洲再度面临暴政压迫，我们必将为这场崇高的远征做好准备，让欧洲重获自由。\n美国强大的工业实力将令过度扩张的俄罗斯自食其果。\n武器、补给、装备——我们的盟友需要更多物资。"
 USB_operation_bear_hunter: "§Y猎熊人行动§!"
 USB_operation_bear_hunter_desc: "为此我们已精心准备了数月。我们最大的错误之一，就是任由\"俄罗斯\"这个概念在苏联解体后存续，这让他们像魏玛时期的德国那样获得了重建的机会。正如我们曾阉割德国人那样，我们也将对东方对手采取同样手段。\n摧毁俄罗斯的战争机器仍是首要目标；我们的任务并不轻松。我们的敌人训练有素、装备精良、久经沙场，他们将会野蛮的战斗。\n\n我们迎接的只会是彻底的胜利。\n让我们祈祷上帝保佑你们完成这项伟大而又崇高的事业。"
 USB_unlimited_climate_warfare: "无限制气候战"
 USB_unlimited_climate_warfare_desc: "较原始的文明会把我们这种掌控全球气候的能力视为神明之力。而如今，正是我们在按照自己的意愿主导气候走向。\n随着与俄罗斯战事持续，我们可以将更多灾害性天气引向东方对手的疆域。让寒冬提前降临，令夏日迟迟不退，或在他们的城市掀起毁灭性风暴，使那些迷信的民众开始相信天谴降临。\n他们确实正在承受天谴。"
 USB_third_gulf_war: "第三次海湾战争"
 USB_third_gulf_war_desc: "我们对此地并不陌生；我们的许多年轻人长眠于中东的黄沙之下，尸骨承受着风沙的侵蚀。年轻一代大多担忧重返那片让我们付出惨痛代价的战场，但凭借军事科技的进步，我们已无需恐惧。该感到恐惧的，只会是那些在地区内滋生的独裁者与恐怖分子。"
 USB_expand_the_targets_list: "扩大目标清单"
 USB_expand_the_targets_list_desc: "随着该地区局势失控，相关人员名单持续扩大。\n独裁者、恐怖分子、匪帮组织等都是中东乱局的重要支柱，我们将坚定不移地向这些地区推进，彻底清除这些威胁以永绝后患。"
 USB_unleash_democracys_fury: "倾泻民主之怒"
 USB_unleash_democracys_fury_desc: "我们过往在该地区军事行动的最大失误，在于过分拘泥于交战规则——尽管批评者指责阿布格莱布事件是道德沦丧。\n但正是昔日的纵容，让反社会势力死灰复燃，将其腐蚀性意识形态蔓延至欧美腹地。这一次，我们的交战规则必须放宽。这些恐怖分子若有机会，对我们绝不会手软；他们早已证明过这一点。\n\n要让整个中东都成为阿布格莱布。"
 USB_reestablish_old_bases: "重建旧有基地"
 USB_reestablish_old_bases_desc: "我们留下的伤痕依然存在，是时候重新揭开它们了。\n待解放该地区后，我们的部队将长期驻守——因为对抗文明火炬的抵抗运动必会持续不断。\n我们的驻守将震慑摇摆观望者，并让当地民众确信秩序终将回归。"
 USB_operation_whopper_junior: "§Y小谎言行动§!"
 USB_operation_whopper_junior_desc: "伊拉克可被视为新保守主义实验的战利品，在某种程度上确实如此。萨达姆的幽灵依然挥之不去，但通过我们的联合军事行动与模因作战，终将把萨达姆的遗毒连同任何形式的激进伊斯兰主义从伊拉克的民族精神中彻底清除。伊拉克必将成为中东地区的典范。"
 USB_operation_burning_dog: "§Y焚犬行动§!"
 USB_operation_burning_dog_desc: "伊朗是我们数十年来一直觊觎的关键目标。我们曾试图将其纳入我们的势力范围。\n然而，该国的专制统治根深蒂固，难以从外部有效影响。\n直接军事干预加上对当地少数民族承诺赋予更大自治权，将足以铲除这个中东地区的毒瘤。"
 USB_project_babel: "§V巴别塔计划§!"
 USB_project_babel_desc: "语言乃世间最强大之力，无论遭受多少禁锢与摧残，它都永不消亡。\n它是人性的组成部分，存在于万物与众生之中。\n也包括我们的敌人。\n但倘若我们解剖语言这个概念本身呢？\n让他们的母语成为反击他们的武器？\n中东蕴藏着解开这个秘密的钥匙。\n去吧，去打破这个循环。"
 USB_the_eagle_vs_the_dragon: "鹰龙对决"
 USB_the_eagle_vs_the_dragon_desc: "太久了，我们任由中国人骑在头上。太久了，我们任由他们戳刺我们的弱点，直至我们分崩离析。我们本该更早行动，我们本该用更强硬的手腕，来巩固我们对全球的铁腕控制。\n但那些新自由主义和新保守主义的政客们不允许这么做，他们太过软弱，不敢对我们理所当然的警惕采取行动。我们的崩溃，是他们计划的一部分；他们利用了那个时机，将其影响力扩展到亚洲大陆的大片疆土。那个无能的时代已经结束，现在是采取行动的时候了。\n\n这场战斗，我们已经等了太久。是时候解放亚洲了，是时候斩下那条折磨我们已久的恶龙的头颅了，也是时候重建秩序了。"
 USB_bolster_the_marine_corps: "加强海军陆战队"
 USB_bolster_the_marine_corps_desc: "在这场战争中，海军陆战队将是我们克敌制胜的中坚力量——犹如军械库中最锋利的战刃，必将成为东方巨龙的梦魇。正如二战期间我们解放太平洋诸岛的崇高圣战，每一次登陆都将是一场鏖战——中国人定会为每一寸土地殊死搏斗。\n龙之军团训练有素且装备精良。但他们与列国军队并无二致：其战斗意志终究并非牢不可破。每场胜利都将重创他们的士气，而海军陆战队正是实现这一目标的关键所在。这支队伍曾以实力、胆识和英勇气概而闻名遐迩，我们将通过接连不断的胜利重铸这份失落的荣光。\n有了我们的海军陆战队，所谓\"中国世纪\"终将被证明不过是痴人说梦。"
 USB_war_on_the_sea: "海洋之战"
 USB_war_on_the_sea_desc: "中国宣称其对海域的掌控坚如磐石，这种论调实在荒谬至极。凭借我国军工企业设计的精良舰艇，美制战舰早已将那些伪装成\"海军舰船\"的中国铁皮罐头撕得粉碎。\n要斩断中国对太平洋虚妄的掌控，我们必须乘胜追击。待到所有中国舰船皆葬身鱼腹之日，便是我们戳穿中国霸权神话之时。届时我们将让他们重温，为何始终不敢越雷池半步进犯台湾。"
 USB_take_on_the_trade_routes: "拿下贸易线路"
 USB_take_on_the_trade_routes_desc: "巨龙对全球贸易的铁腕掌控，既是其军事实力的根基，更是经济命脉所在。环伺中国的贸易航线维系着经济命脉，让十四亿人免于饥馑，让百万雄师装备精良。当其他二流国家将这种贸易霸权视为铜墙铁壁时，我们却从中窥见了千载良机。\n一旦斩断这些贸易动脉，无异于直捣黄龙，剜出巨龙跳动的心脏。数十年来，这条巨龙倚仗贸易优势极尽羞辱之能事，肆意动摇美国主导的全球秩序——我们的秩序。待到我们截断其命脉所系的贸易通道时，攻守之势必将易形。"
 USB_operation_firestorm: "§Y烈焰风暴行动§!"
 USB_operation_firestorm_desc: "在朝鲜半岛上，我们的盟友韩国人正为捍卫每一寸正当领土而浴血奋战。那些左翼寄生势力不断发动凶残进攻，每次攻势都比前一次更加野蛮。\n我们在亚洲最大的失误，就是放任朝鲜政权这个概念继续存在。朝鲜不过是冷战遗留的又一根毒刺，这个失控的隐患早已脱离我们的掌控。这次我们不惜亲手了结这段历史，是时候协助朝鲜半岛完成未竟的统一大业了。\n\n为确保秩序永固，我们必须让历史回归其应有状态：停滞。"
 USB_contain_the_communists: "遏制共产主义"
 USB_contain_the_communists_desc: "中国海域波涛汹涌，却不见半艘中国舰船的踪影。太平洋海底已成为中国海军铁壳残骸的集体坟场。凭借我军工程师的奇思妙构与将士们的浴血奋战，我们已取得彻头彻尾的辉煌胜利。而今，终局之战的帷幕即将拉开。\n\n这条东方巨龙或许会负隅顽抗，试图阻挡我们攻占其都市的步伐，他们甚至可能侥幸得手。但无论他们如何奔逃躲闪，终究逃不过饥荒的魔爪。那些社会主义者、共产主义者、专制暴君，不论龟缩在哪个角落，都将在我们无敌舰队的封锁中活活饿毙。\n巨龙必将哀哀求饶，试图谈判周旋。但为重建世界秩序，我们必须斩落龙首，而这个时刻，很快就要到来。"
 USB_take_the_fight_to_them: "主动出击"
 USB_take_the_fight_to_them_desc: "经过一次次军事行动，我们已逐步瓦解了巨龙的防线。每座岛屿的失守、每次防御的溃败，都在消磨他们的斗志。而我们的战斗决心却与日俱增。我们已解放被他们占据的土地，现在该让他们尝尝自己种下的苦果。\n上海、北京、深圳，这些城市是巨龙狂妄与\"实力\"的纪念碑。中国人以为我们不敢解放这些城市，将我们与那些软弱的前辈混为一谈。当我们的战机将他们的纪念碑夷为平地，当我们的战舰把海岸线化为焦土时，他们必将猝然惊醒。\n这就是我们与先前那些蠢货的本质区别：我们从不优柔寡断。"
 USB_operation_pacific_rim: "§Y环太平洋行动§!"
 USB_operation_pacific_rim_desc: "尽管身处\"第一世界国家\"之列，但中国人骨子里仍深藏着迷信基因，极易受到各种形式的胁迫。他们自然认为，唯有执掌天象、拥有神明之力者方能号令众生。\n而我们，正是这样的存在。\n\n我们唤来了世间未见的飓风，缔造了摧毁整座城市的龙卷风，开启了带来瘟疫饥荒与死亡的永冬。这条东方巨龙已被我们磨去锐气，如今该让民众领略我们的雷霆之怒。\n中国人从来都是对国家安全与整体秩序的威胁。忍受他们数十年的挑衅之后，是时候让他们明白何为咎由自取。"
 USB_operation_overlord_ii: "§Y霸王二号行动§!"
 USB_operation_overlord_ii_desc: "这是本世纪第二次，美国士兵们正枕戈待旦，等待着解放欧洲的作战指令。当我们全力镇压国内恐怖分子时，我们在欧洲那些傲慢的下属未能遏制东方的威胁。直到他们的无能暴露无遗，国家落入暴政魔掌，欧洲才勉强击退了俄国人。秩序的推行不容妥协，这些伪装成政治家的极端分子终将付出代价。\n美式和平已然归来，我们将效仿第二次世界大战中对抗法西斯的伟业，将欧洲从这群狂热分子手中解放出来。"
 USB_destabilize_their_regimes: "动摇他们的政权"
 USB_destabilize_their_regimes_desc: "我们最大的错误之一就是放任欧洲自行其是。事实证明他们根本不配拥有自主权——其军力孱弱不堪，稍触即溃如纸糊一般。他们的士气？简直如同末日降临。\n即便在其本土，这些所谓\"国家\"的无能也随处可见：被压抑的不满情绪、暗中涌动的反抗呼声、勾心斗角的高层指挥体系。我们只需对这腐朽架构轻轻一踹，它就会从内部土崩瓦解。正因如此，未来主导全球秩序的既不会是中国也不会是欧洲。我们始终占据着绝对优势，现在不过是收回本就属于我们的地位罢了。"
 USB_london_calling: "伦敦来电"
 USB_london_calling_desc: "尽管欧洲曾被那些几乎令我们分崩离析的反社会寄生虫所统治，但在重建的美式和平之下，这片大陆仍存希望。当暴君从北约的废墟中崛起时，本有几位杰出之士应当成为领袖。然而迎接他们的并非鲜花与赞誉，而是染血的草叉与子弹。遭到放逐的他们，只能眼睁睁看着欧洲在自我堕落中沉沦。\n如今极端分子在重压下土崩瓦解，正是我们联络这些栋梁之才的时机。当新生的欧洲获得解放，知识分子终将从暴虐民众的钳制中夺回应有的地位。"
 USB_break_the_european_spirit: "摧毁欧洲精神"
 USB_break_the_european_spirit_desc: "为了推进秩序，任何手段都不为过，尤其是在处置叛乱附庸时。欧洲人已彻底丧心病狂，对眼前一切肆意攻击——言语笼络、利益馈赠或善意姿态都无法使其驯服。二战结束后我们犯下的最大错误，便是对欧洲放松了掌控。我们给予他们自由，他们却以背叛回报。\n如今，我们将纠正错误。不仅要轰炸他们的城市、摧毁他们的地标、饿殍他们的百姓，更要摧毁他们的意志，让他们永生难忘。我们会让他们明白，为何美国缔造的新秩序将永世长存。"
 USB_come_as_liberators: "以解放者之姿降临"
 USB_come_as_liberators_desc: "当我们在第二次世界大战中开启那场对抗法西斯的高贵征战时，我们以解放者的身份来到欧洲，成为这片大陆上新秩序与永恒和平的缔造者。从那场烈火中诞生的旧秩序早已消亡，但昔日的战略仍具价值。\n我们已纠正前人的错误，完善了我们的战略；那些曾导致\"重大失误\"的缺陷已被彻底清除。当极端分子终因自身的无能重压下崩溃时，我们将如二战时期般以解放者之姿重返欧洲。民众将竭诚欢迎，他们会忆起当初为何选择信赖我们。\n届时温顺的欧洲将尽在我们掌握之中。而这一次，我们绝不松手。"
 USB_operation_triumph_chariot: "§Y凯旋战车行动§!"
 USB_operation_triumph_chariot_desc: "在这场战争中我们反复强调：所谓\"自由欧洲\"的理念从来只会带来祸患。\n在我们缺席的岁月里，欧洲人成就了什么？他们耗费多年筹备对抗俄罗斯，却一败涂地。当失败的苦果显现时，他们任凭极端主义吞噬自己的国度。如今面对真正的战斗力量，他们更是节节败退。一个被证明如此孱弱的大陆，凭什么不该被牢牢约束？\n与欧洲人周旋得够久了；我们是该让他们重温为何美利坚世纪将永世长存。\n\n东方这片昔日令他们与俄罗斯兵戎相见的土地，如今成了最后负隅顽抗的巢穴，他们像橱柜里的老鼠般躲藏于此。只要向该地区发起坚决而有序的最后一击，便足以榨干欧洲人最后的斗志。他们的战争机器将彻底停转，他们的城市将遭受轰炸，极端分子必将付出代价。\n待他们幡然醒悟最终臣服之时，欧洲大陆将迎来一劳永逸的秩序重建。"

 USB_green_new_deal_progressive_idea: "绿色新政"
 USB_uncooperative_military_idea: "偏执的军队"
 USB_uncooperative_military_idea_desc: "\"美国治下的和平\"并非遥不可及的空想。在全美利坚团结一致的日子里，光是我军的存在就足以驱散席卷世界的混沌。然而，如今随着国家的分裂，维和力量也同样发生了分裂。上层指挥人员与总统私下勾结、沆瀣一气；普通士兵则完全反对现任总统的议程。军队的凝聚力已濒临崩溃，开小差现象屡见不鲜，指挥官身边忠诚的士兵也越来越少。"
 USB_uncooperative_military_idea1: "偏执的军队"
 USB_uncooperative_military_dummy_idea: "偏执的军队"
 USB_lower_democrat_unity_idea: "民主党团结度：分崩离析"
 USB_low_democrat_unity_idea: "民主党团结度：初具裂痕"
 USB_medium_democrat_unity_idea: "民主党团结度：中规中矩"
 USB_high_democrat_unity_idea: "民主党团结度：患难与共"
 USB_higher_democrat_unity_idea: "民主党团结度：永不分离"
 USB_higher_democrat_unity_idea_desc: "世上一切执政力量的行政效率都取决于其团结程度。尽管在前几年，民主党愈发趋于分裂，但如今我们已在合法总统的领导下彻底团结了起来。然而，我们的权力毕竟源自华尔街——要知道企业家的想法和欲望总是在不断改变的。我们越是企图通过立法，或是利用权力来反对他们的利益，他们就越会拉扯我党的结构，一丝一毫地将其撕裂。"
 USB_emergency_presidential_powers_idea: "总统紧急权力"
 USB_constitutionalism_idea: "宪政主义"
 USB_well_organized_militia_idea: "民兵武装"
 USB_reorganized_army_idea: "重组的军队"
 USB_lower_restricted_liberties_idea: "持之以恒的自由"
 USB_lower_restricted_liberties_idea_desc: "我们的敌人称我们导致了\"自由之陨\"。总统一直对此耿耿于怀。事实上，他甚至拒绝以保卫国家安全的名义干涉公民的人身自由。然而，随着这场内战的拖延，形势将迫使他采取行动，除非他愿意做出必要的牺牲，保证我们的人民的生活尽可能不受干扰。\n\n可悲的是，公民们只会借我们对个体的妥协而索求更多。希望他们能信任我们，站在历史正确的一侧。"
 USB_low_restricted_liberties_idea: "修正后的自由"
 USB_medium_restricted_liberties_idea: "轻度限制的自由"
 USB_high_restricted_liberties_idea: "高度限制的自由"
 USB_higher_restricted_liberties_idea: "严重限制的自由"

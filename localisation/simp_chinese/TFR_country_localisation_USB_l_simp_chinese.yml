 USB_larry_fink: "拉里·芬克"
 USB_wef_leader_name: "§Y拉里·芬克§!"
 USB_wef_leader_desc: "§L作为贝莱德集团首席执行官兼世界经济论坛核心董事会成员，拉里·芬克在全知者构建深层政府绝对控制权的进程中展现出关键作用。这位执掌美国最大资产管理公司、统领华尔街金融巨头的教父级人物，其掌控的万亿级资产成为深层政府建立黑色预算的重要支柱。这套游离于国会监督之外的影子财政体系，专门用于资助深层政府的秘密行动。\n\n芬克与世界经济论坛的深度捆绑，更为全知者将全球化议程制度化的战略提供了核心支点。他对全知者的卓越贡献使其迅速跻身最高决策层，如今这位金融寡头振臂一呼，统治集团旗下的企业精英们便闻风而动。\n\n商海博弈向来残酷，而芬克始终是顶尖玩家。全知者这个全新竞技场的赌注远超其过往经验，但身兼全知者核心成员、贝莱德掌门人与世界经济论坛三重要职的芬克已占得先机。尽管克劳斯·施瓦布是论坛的公众形象，但芬克才是幕后真正的操盘手，其与美国深层政府的密切关联，更巩固了他作为全球化领袖的地位。通过与安全官僚体系的深度合作，芬克不仅忠实执行论坛议程，更因地制宜地提出\"美国版大洗牌\"方案，巧妙调和民众诉求与全知者目标。显然，这位金融巨鳄不仅要入局游戏，更要成为终极庄家。§!"
 USB_william_burns: "威廉·J·伯恩斯"
 USB_cia_leader_name: "§Y威廉·J·伯恩斯§!\n§Y首席元老§!"
 USB_cia_leader_desc: "§L职业外交官出身、曾任美国副国务卿的威廉·J·伯恩斯在拜登政府时期被任命为中情局局长。但他很快就痛苦地意识到，权力殿堂中的腐败痼疾、官僚无能和政治内斗已深入骨髓。甚至连内战都未能根治美国统治机构的核心病灶。\n\n当华盛顿的政治绞索越收越紧时，伯恩斯成为组建全知者秘密集团并实施影子政变的核心人物。在他的主导下，中情局急剧扩张以适应深层政府维持权力所需的运作体系。如今的伯恩斯已成为美国最有权势的安全官僚——甚至堪称影子总统。\n\n掌握国家最强力机构的威廉·伯恩斯已发起全面攻势，誓要彻底铲除混乱滋生的土壤，从而建立万世永存的秩序体系。在他眼中，这场博弈不容任何闪失。随着深层政府及其军工复合体全面掌舵，他正着手实施一项将美国打造为未来世界唯一超级大国的计划。而对全知者集团而言，实现这个宏伟蓝图的任务只许成功不许失败。当下正是孤注一掷的时刻，赌注之高前所未有，而威廉·伯恩斯已准备押上全部筹码。§!"
 USB_stefanie_tompkins: "斯蒂芬妮·汤普金斯"
 USB_darpa_leader_name: "§Y斯蒂芬妮·汤普金斯§!"
 USB_darpa_leader_desc: "§L作为美国国防高级研究计划局局长，斯特凡妮·汤普金斯负责监督国防部新兴技术的研发工作。在全知者的影响下，加之深层政府的暗中操控，其项目范围已大幅扩展。\n\n尽管身为科学家远胜于官僚，汤普金斯却在政治舞台上展现出非凡手腕，她毫不避讳利用自身影响力推动军工复合体的议程。但这位实用主义者亦懂得审时度势，为确保全知者目标达成不惜作出妥协。虽对秘密集团保持忠诚，她内心仍存有疑虑，不仅警惕组织内部的极端派系，更敢于直言不讳地表达担忧。然而为实现全知者维系秩序根基的终极使命，她甘愿押上全部筹码，即便这意味着要背弃部分个人信念。\n\n背靠美国军工巨头与美国国防高级研究计划局的庞大资源，汤普金斯手握整个军工复合体的力量。她以职权推动尖端科技与武器系统研发，无论是战场优势还是社会监控的全景监狱，誓要维护深层政府的统治霸权。在她眼中，全知者是守护秩序支柱的最后希望，为此她不惜一切代价确保阴谋得逞，只为在即将到来的新世界秩序中谋得一席之地。§!"
 USB_shadow_cabinet_text: "影子内阁"
 USB_NSA_paul_nakasone_sc: "保罗·仲宗根"
 USB_NSA_paul_nakasone_tt: "§Y保罗·仲宗根§!\n国家安全局局长\n   £decryption_texticon 破译能力修正：§G+10.0%§!"
 USB_NSA_paul_nakasone_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_paul_nakasone_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§Y历史意义：§!\n对象履历显示其沿着国家安全相关的情报要职实现系统性晋升。曾在美国陆军及网络情报行动领域担任要职，包括美国陆军网络司令部副司令及国家网络任务部队高级领导职务。\n\n§Y近期动态：§!\n对象根据《第二爱国者法案》与《公共卫生安全法》主导NSA监控行动，将\"美国神经网计划\"深度融入美国民众日常生活。现阶段工作重心为优化AI监控体系，在扩大覆盖范围的同时减少人力配置。在其指挥下，NSA正开发预测性AI系统，旨在对潜在反社会分子实现组织化前的预先识别。\n\n§Y早期及个人生活：§!\n出生于明尼苏达州白熊湖市一个日裔家庭。其父曾在二战时期服役于美国陆军情报部门。家族血统可追溯至冲绳中城村赤道地区。\n\n教育经历体现情报专业能力的系统性培养：1986年通过圣约翰大学陆军预备军官训练团授衔，先后获得南加州大学系统管理硕士学位、国防情报学院战略情报学位、陆军战争学院战略研究学位，并完成陆军指挥与参谋学院课程。\n\n与苏珊·S·中曾根（原姓斯特恩伯格）育有四名子女。因国家安全职责需要，全家定居马里兰州米德堡——此处毗邻NSA总部。§!"
 USB_NSA_george_barnes_sc: "乔治·C·巴恩斯"
 USB_NSA_george_barnes_tt: "§Y乔治·C·巴恩斯§!\n国家安全局局长\n    £pol_power 每日政治点数获得：§R-0.05§!\n    £decryption_texticon 破译能力修正：§G+5.0%§!"
 USB_DIA_jeffrey_kruse_sc: "杰弗里·A·克鲁斯"
 USB_DIA_jeffrey_kruse_tt: "§Y杰弗里·A·克鲁斯§!\n国防情报局局长\n  £counter_intelligence_texticon 情报机构防御：§G+10.0%§!"
 USB_DIA_jeffrey_kruse_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_jeffrey_kruse_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§Y历史意义：§!\n该对象的职业生涯表明，其通过担任与国家安全相关的日益关键的情报职务，实现了系统性的晋升。早期经历包括在美国空军服役，并在美国印太司令部以及美国国防部情报与安全部担任情报职务；在内战前，曾担任国家情报总监麾下的军事事务顾问。\n\n§Y近期动态：§!\n在该对象的领导下，国防情报局的行动已与中央情报局的行动保持一致，两机构之间的合作规模前所未有。作为局长，克鲁斯监督了国防部现有有关机器学习研究项目的扩展，例如\"马文计划\"，并将这些系统整合到更广泛的监控体系中。他还负责指导军队的外国情报收集工作。\n\n§Y早期及个人生活：§!\n该对象的学术背景与其情报生涯高度契合：1990年获迈阿密大学政治学学士学位；1996年获联合军事情报学院战略情报硕士学位；2004年获美国海军战争学院国家安全与战略研究硕士学位；2008年获国家战争学院国家安全战略硕士学位。§!"
 USB_DIA_christine_bordine_sc: "克里斯蒂娜·L·博尔丁"

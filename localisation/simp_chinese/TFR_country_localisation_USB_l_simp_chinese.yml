 USB_air_force_domination_idea: "主宰天空"
 USB_air_force_domination_idea_desc: "耕耘半个多世纪的政治联系给拜登政府带来了丰厚的回报。在拜登担任副总统期间，美国空军与其进行过深入的交流，大多数空军人员的职业生涯都与乔·拜登关系密切。不用说，内战爆发之初，大部分美国空军便宣布忠于正统政府——而正因如此，我们才得以主宰自由国度的天空。"

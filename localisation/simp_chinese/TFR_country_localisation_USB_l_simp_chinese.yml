 usb.57.t: "这会儿又是谁？"
 usb.57.d: "出人意料的是，总统乔·拜登宣布将辞去民主党总统候选人的提名，理由是国家向前发展需要新的领导层来引领。大选临近，民主党正在紧急动员，支持一位新的候选人。\n\n潜在候选人的名单很长，但有几位尤其受到党内的青睐。卡玛拉·哈里斯，坚强的现任副总统，代表着拜登政策的延续，但没有拜登年龄带来的顾虑。虽然她的立场未必能让全民主党感到振奋，但她的经验和可靠性使她成为那些不愿看到剧变的人的安全选择。\n[USB_bloomberg_can][USB_yang_can][USB_kennedy_can][USB_aoc_can]"
 usb.571.d: "在一项出人意料的举措中，乔·拜登总统宣布决定辞去民主党总统候选人的身份，理由是国家需要新的领导力来引领未来。随着大选迫在眉睫，民主党内部正在紧急寻找新的候选人以团结各方力量。\n\n候选名单虽长，但几位人选已在党内备受瞩目。副总统卡马拉·哈里斯坚定不移地代表着拜登政策的延续。尽管她的立场未必能激起整个党的热情，但她的经验和稳健让那些对巨变心存疑虑的人感到安心。然而，她是否能点燃党内对新领导的渴望仍是未知数。\n候选名单虽长，但党内有几位备受青睐的人选。现任副总统卡马拉·哈里斯坚定不移地代表着拜登政策的延续，尽管她的立场可能未能点燃整个党内的激情，但她的经验和可靠性让那些不希望大幅改变的人感到安心。尽管如此，她的挑战是如何应对党内对新变化的呼声。\n媒体巨头迈克尔·布隆伯格，现已成为民主党内\"创新派\"阵营的领袖，拥有巨大的影响力。然而，除了那些被他收买的人之外，很多人对他并无好感。\n杨安泽在2020年曾因其中间派政策赢得了年轻人的支持，并以其带有\"技术官僚\"色彩的手法著称。虽然他没有太多的政治经验，但他和他的\"杨帮\"可能是2024年胜利的关键。\n小罗伯特·F·肯尼迪，作为肯尼迪政治王朝的成员，虽然在民主党和共和党内都只被勉强容忍，但他的中间路线政策让他赢得了少数人的热爱。他可能不是最典型的民主党肯尼迪，但他的名字能唤起对过去美国的集体记忆。\n亚历山德里娅·奥卡西奥-科尔特斯，这位充满激情的进步派象征，已成为新一代要求变革的代表。她的政策可能引发分歧，但她为社会正义和气候行动的坚定推动，使她成为那些渴望激进变革者的英雄。"
 USB_BLMBRG_candidate_description_loc: "作为民主党内部\"革新派\"的领袖，传媒巨头迈克尔·布隆伯格在党内拥有巨大影响力。尽管如此，他仍遭到了所有他未能收买的人的厌恶。\n"
 USB_YANG_candidate_description_loc: "杨安泽于2020年成为年轻人群体的热门选择，他的中间派政策广受赞誉，其将\"技术官僚\"理念引入民主党的行为也引起了广泛关注。尽管他可能缺乏丰富厚的政治经验，但凭借其支持团队\"杨帮\"的努力，此人有望成为赢得2024年大选的关键力量。\n"
 USB_AOC_candidate_description_loc: "亚历山德里娅·奥卡西奥-科尔特斯这位充满热情的进步派偶像，已成为新一代民主党内部变革之声的代言人。她的政策或许颇具争议，但她对社会公正和气候行动的不懈追求，让她成为了那些渴望改变现状、引领变革之人的精神领袖。\n"
 USB_KNNDY_candidate_description_loc: "小罗伯特·F·肯尼迪因其肯尼迪政治家族成员身份而得到了民主党和共和党双方的认可，但他的中间派政策并不受大多数人的欢迎。虽然他在民主党内的代表性或许并不突出，但他的名字却承载着与过去美国历史的深刻联系。\n"
 USB_empty_candidate_description_loc: ""

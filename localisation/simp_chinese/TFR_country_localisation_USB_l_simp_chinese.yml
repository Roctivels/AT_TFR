 usb.75.t: "最后的演讲"
 usb.75.d: "\"白宫记者晚宴！记者朋友们可以聚在一起说：‘看看上面那个家伙，那个该死的白痴，是我们的总统！’我喜欢这样，我们可以尽情地开开玩笑。我知道，知道，嗯，这对我们的，呃，民主意味着什么。我们相信言论自由，只要不伤害他人，每个人就可以畅所欲言。这是我们国家的支柱之一！\n\n在这场残酷、令人痛心的战争，我们为国家的灵魂而战，我不禁回想起过去的美好时光。对于许多在难民营帐篷里的流亡人来说，这所曾经繁荣的城市，已是回忆。我记得，两党都曾坚信民主，若有谁想把自己变成独裁邪教的领袖，那是不可想象的。我记得，两党都曾相信美国的民主、希望、自由，我们曾在重要政策上合作。我记得，两党都曾选择谴责萨达姆·侯赛因和弗拉基米尔·普京这样的独裁者，而不是向他们寻求帮助与抚慰。我们会把那个时代带回来的！我们会在美国实现和平与合作！\n\n这项事业不是一个人就能完成的，需要全国人民共同努力。即使这是我的政府，我也会说这是集体努力的成果，我仅仅负责让一切井井有条。我负责让国家的人才进入所需的岗位，让他们能安心工作，不必担心民粹主义者的攻击。在我余下的任期内，我会确保我们的制度不受挑战，确保我们的民主与所有关键的支柱屹立不倒，为了我们自己，还有，还有……"
 usb.75.a: "\"我们的，呃，不管了，你们懂的！\""
 usb.76.t: "美利坚继承人"
 usb.76.d: "在我们备受尊敬且意志坚定的前总统小约瑟夫·罗比内特·拜登离世后，争权夺利的种子已在全国各地生根发芽。至少已有三位美国总统的潜在继任者崭露头角，誓将以各种方式实现其目标。\n\n首先是罗伯特·布鲁斯·艾布拉姆斯，这位集卓越军事才能与非凡政治魅力于一身的领袖，其在亚洲舞台上扮演关键角色，作为对抗中俄两国的中流砥柱于朝鲜半岛推动战略行动，引导反对势力步入美国所引领的自由大道。作为一名身经百战的勇士与强硬外交政策的坚定推行者，他必能轻松扭转太平洋战场的局势，无疑是我国英雄精神的传承者。\n\n接下来则是充满活力、直率且深具民族主义情怀，极具魅力的理查德·斯宾塞，他的转变令人瞩目。从初时对美国身份与政治灯塔的反对，到四年前毅然觉醒并全力支持前总统，他踏上了坚定不移捍卫国家利益的征途。其直率的沟通方式在对外宣传与事务处理中极具优势，但过往的争议也让他处于风口浪尖。\n\n最后，前总统之子亨特·拜登虽曾身处共和党反对浪潮的风口浪尖，却以坚韧不拔的姿态一一击破挑战。他的胆识与魄力令人敬畏，行事风格如同其父般难以预测。尽管在政治成就与外交智慧上或显不足，但他无疑将成为对抗外部威胁时的一把锐利之剑。"
 usb.76.a: "打破沉默"
 usb.76.b: "再见玛丽亚，我已置身韩国。"

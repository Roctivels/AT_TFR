 USB_congressional_factions_category: "国会大厅"
 USB_congressional_factions_category_desc: "\n\n\n\n\n£GFX_USB_congress_cat\n\n\n\n\n\n\n\n在民主党和共和党的部分支持下，我们成功拥有了国会山无可争议的主导权。现在我们掌握了在这个国家进行前所未有变革所需的一切。\n\n我们必须小心，如果这些派系对我们过于不满并决定与我们脱离关系，那将会产生严重后果。\n\n国会总支持度：[?USB_support_congress_total_var|Y1%]\n\n §2民主党§![GetLiberalEnable][GetProgressiveEnable][GetInnovationistEnable]\n    \n[GetConservativeEnable][GetMinorFactionsEnable][GetBlueDogEnable][GetKennedyDemocratsEnable][USС_minor_faction_christian_conservative_text][USB_minor_faction_libertarian_party_text][USB_minor_faction_dsa_text][USB_minor_faction_forward_text][USB_minor_faction_transhumanist_text][GetMinorFactionsEnableBottom]"
 USB_congressional_factions_caligula_category: "附肢国会"
 USB_congressional_factions_caligula_category_desc: "\n\n\n\n\n£GFX_USB_caligula_congress_cat\n\n\n\n\n\n\n\n在完全控制政府的情况下，关键决策的执行不再需要国会的支持。然而为了维护美国的形象，国会仍然保留了下来，尽管其没有任何权力。\n\n现在独掌权柄的民主党处在一个特殊的位置。党内人士要么与新当选的总统合作，确保他们在历史上的地位，要么与他作对，失去一切。\n\n§R总计国会支持§![GetLiberalEnable][GetProgressiveEnable][GetConservativeEnable][GetInnovationistEnable]"
 USB_financial_diplomacy_category: "金融外交"
 USB_financial_diplomacy_category_desc: "为了拯救联邦，我们必须妥善发挥经济的体量优势，从而在供给我们的军队和人民的同时，在战场上和外交舞台上击败我们的敌人。"

 USB_inefficient_economy_idea: "低效的经济"
 USB_inefficient_economy_idea_desc: "过去二十年来，美国经济在共和党和民主党的轮番控制下徘徊不前，资助选举的不同利益集团则像玩弄线团的猫一样玩弄美国法律——无论是征收关税，还是制定补贴政策，又或是打击反对派。内战之前，我国经济虽充斥着官僚主义作风，但仍能凭借美国所掌握的资源来勉强维持；然而，如今随着西部失守以及经济供应链的崩溃，这种官僚主义已开始慢性扼杀我国境内每个公民的生命。我们必须尽快将其铲除——即使这会惹恼某些支持者。"

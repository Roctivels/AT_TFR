 usb.10.t: "自由派日益衰弱"
 usb.10.desc: ""
 usb.10.a: "美国正在丧失她的自由精神……"
 usb.11.t: "联邦军事无政府状态！"
 usb.11.desc: "对首都的袭击导致联邦政府多个部门陷入混乱。边远郡县的地方政府已被完全击溃，致使多处叛乱势力占领大片区域。\n\n我们收到大量报告，涉及众多帮派、法西斯、共产主义、无政府主义恐怖组织及军队叛变分子，这些势力纷纷宣称对特定城市的控制权。而我军主力正于西部作战，制约了我们应对此局势的能力。\n\n情报界已向政府提交紧急整合计划，旨在夺回领土控制权并打击叛徒，该计划即将启动。无论付出何种代价，共和国必将存续。"
 usb.11.a: "剿灭他们，现在立刻马上！"
 usb.12.t: "企业密谋"
 usb.12.desc: "众所周知，许多知名企业和财团都在战争期间获得了对政府以及联邦政治机器内部的巨大影响力。拜登总统也对此也心知肚明——这正是当他接到几位\"声名显赫\"的人物打来电话要求就未来政策举行会议时，满腹疑虑的原因。\n\n通常情况下，他不会对此多想。开会对他来说是家常便饭。然而，当他接到那个电话时，他感觉有什么东西悄然发生了变化——他几乎能感觉到他们语气中的微妙差异，就好像邀请他参加会议根本就不是为了讨论什么\"未来政策\"。最近，这种可疑的气氛变得愈发常见。也许是年岁的增长使他更聪明了些——或者与之相对的，更多疑了些——但他已经越来越确信，即接受这次的参会邀请将会导致一些前所未有的事情发生。\n\n椭圆形办公室里的时钟滴答作响，时间一分一秒地过去。国会目前正在举行会议，讨论一个他已经忘记的话题。从现在开始，他必须做出决定——这将毫无疑问深刻影响联邦未来的走向，无论那是否是总统所期望的方向。"
 usb.12.a: "\"派我的助手去参加会议。我想和国会谈谈。\""
 usb.12.b: "\"我马上动身。\""
 usb.13.t: "乔·拜登健康状况恶化"
 usb.13.desc: "随着冲突的不断升级，乔·拜登总统的健康状况在过去几周持续恶化。指挥官经常感到胸部和全身肌肉疼痛，关节也因高度不适而变得僵硬。在几次过度劳累的情况下，他发现自己出现明显的胸痛且更经常性地弯腰驼背，总体上已不复上任之初的水平。\n\n自然，像总统这样年事已高的人出现胸痛的消息在他的内阁和医务人员中引起了一些恐慌。但检查结果表明，至少就目前而言，这些变化并不值得大惊小怪——这主要是压力和年事已高对他造成的叠加影响，而不是任何潜在的疾病。但除了之前已出现过的症状之外，这也给总统带来了不小的不适。"
 usb.13.a: "令人担忧。"
 usb.14.t: "乔·拜登健康状况恶化"
 usb.14.desc: "近来，总统的健康状况每况愈下，这一点在他的幕僚和内阁成员之间已经变得非常明显。最近几天，总统一直饱受病痛折磨，出现了发烧症状，并且在日常工作中越来越力不从心，以至于多次需要他人协助。他面色苍白，身体虚弱，还伴有呕吐、方向感丧失以及食欲不振。\n\n因此，现在有多名医务人员密切关注着拜登总统的健康状况，以保障他在履行职责的同时能够得到持续的治疗，尽管这已经愈发困难。尽管总统声称这只不过是季节性流感，但他的幕僚中很少有人相信这就是唯一的原因。"
 usb.14.a: "现在我们得多关照下他了。"
 usb.15.t: "乔·拜登健康状况恶化"
 usb.15.desc: "显然，拜登核心圈子内部的许多人都意识到他的健康状况明显出了大问题。旷日持久的内战带来的巨大压力已经消耗了这位总司令的身心能力。尽管之前他或多或少地能够应对这种不适，但现在，总统发现自己卧床休息的时间已经比过去多得多。医疗人员时刻跟随左右，保证他不会突然跌倒后骨折；为补充水分的点滴输液从未中断。不过，总统仍然固执己见，尽管他的许多职责已经由他的幕僚和哈里斯副总统代为执行，但仍坚持出席各种会议与讨论。\n\n虽然他在决策过程中仍然保持某种程度的积极性，但总统早在内战之前就饱受质疑（尽管主要是反对派的攻击）的认知能力也明显有所下降。拜登正在忘却先前熟知的事情（无论是名字、面孔、方向等），身边人也时常注意到他对已讨论过的事项和会议结果的困惑。国会山和白宫内部流言四起，人们充满了对第46任美国总统的担忧。"
 usb.15.a: "他时日无多了，是吧？"
 usb.16.t: "房门紧闭"
 usb.16.desc: "\"正是由于这种价值观，我们发现自己处于权力的微妙平衡之中——无论是在行政方面，还是在国家机关的运作方面，\"总统用一种令人不安的专注语气说道，其眼神的犀利仿佛是能直接斩断在座的众议院议员们。房间的氛围发生了转变，先前对这位平淡无奇的总统的漠视和不解，慢慢转化为对他渊博知识的敬畏。\n\n\"当我们的国家正经历着超过两百年来最黑暗的时期时，\"他继续说道，\"我们必须牢记为什么这场令人遗憾的冲突正在进行。没有什么比维护我们的民主免受任何国内外势力的侵害更重要了。\"他停顿了一下，此时会议室的门突然打开，几位名流——国会议员、商界巨擎、高级官员——在看到站在最高讲台上的最高统帅时停下了脚步。总统停止演讲看向入口处，使得附近的几位代表也皱起眉头转过身看着刚刚闯入的那些人。\n\n\"……而这就是我们正在战斗的原因。\"拜登望着那些名流说道。他们笨拙地调整了衣着，试图若无其事地找到座位，好像他们本来就是打算参加这次会议的。那些不属于这里的人尴尬地点了点头，离开了会议厅，以示对看似容易的目标如此轻易地被挫败感到愤怒。即便是已经参加会议的一些人也在座位上不安地动了动身子，或多或少地意识到刚才几乎发生了什么。总统嘴角露出了一丝得意的笑容，然后继续发表他的演讲，对即将发生的事毫不在意。"
 usb.16.a: "野心都能被收买……"
 usb.17.t: "拜登辞职"
 usb.17.desc: "就在今天，美利坚合众国第46任总统小约瑟夫·罗比内特·拜登正式对外宣布，由于自身不断恶化的健康状况、众议院愈演愈烈的反对声浪以及对他履行三军总司令的职责的能力缺乏信心等一些或公开或否的原因，他将自愿辞去总统职务放手权力。\n\n这项突然的决定在国会一石激起千层浪。一些人批评总统在这最需要坚强领导的关键时刻损害了国家的团结。另一些人则称赞总统的决定，表示尊重总统得出的结论，他确实已不再适合领导国家，很可能将国家带入毁灭与失败境地。\n\n尽管由副总统接任总统是长久以来的惯例，但在众议院召开的一次简短的紧急会议上则出现了前所未有的情况。许多国会议员提名前纽约市市长，在战时仍具有相当影响力的迈克尔·布隆伯格成为美国总统，理由是他所拥有的政治经验使他能与众多政府部门有效保持步调一致。"
 usb.17.a: "\"先生们，吾责已尽。\""
 usb.18.t: "企业密谋迷雾重重"
 usb.18.desc: "随着21世纪最重大的政治灾难继续在美国蔓延，曾经强大的政治机器的运行重心发生了显著的转变。正如最近几个月所见，尽管幕僚长极力予以限制，但在战争面前，联邦内部企业的影响力仍在不断增强。\n\n毫无疑问，战争助长了那些在国家机器中地位显赫人物的野心。先前试图对政府部门采取更直接行动的企图都侥幸被总统异常敏捷的思维巧妙所挫败。尽管近期我们仍然成功压制了内部的派系活动，但这似乎并没有像所期望的那样遏制阴谋家们的野心。在经历了一段时间的蛰伏后，越来越多的国会议员和有影响力的商人的行为变得越来越可疑；最近几个月，一些值得注意的集会、可疑的会晤和通话，以及在政策制定方面与企业隐秘的利益勾兑，都开始变得越来越明目张胆。\n\n这种突然增加的奇怪活动当然没有逃过总统的注意。看来，在经历先前的失败之后，阴谋家们在暗处仍然绞尽脑汁篡夺总统权力，甚至从未放弃过他们的密谋盘算。此刻，总统面临着一个他本希望在任期内不必再次面对的决定。他可以指示情报部门调查相关人士，让他们知道什么事都逃不了最高统帅的法眼；或者，他可以暂停任何进一步的内部调查。毕竟，谁知道他们是否真的在策划什么阴谋。但考虑到前车之鉴，或许也不该冒此风险？"
 usb.18.a: "\"他们既然做过一次了，就还会做第二次。\""
 usb.18.b: "\"没必要因为偏执而惹毛别人。\""
 usb.19.t: "拥抱财团"
 usb.19.desc: "布隆伯格在幕僚以及几名跟在后面的政客的簇拥下走进了国会大厅。在场的每个人都知道，这将是近期美国历史上最关键的国会会议之一；这是中期选举结果的关键时刻，这将是决定新的多数党领袖的投票。经济管理不善、公众恐慌和领导涣散已被证明是自由党团所造成的灾难。在卡马拉·哈里斯的领导下，自由党团一直是新联邦内部最主要的政治派系，而此刻即将上演他们垮台的高潮大戏。主持投票的官员宣布投票即将开始，哈里斯则仍维持着缄默。\n\n\"企业阴谋\"，失望的自由派和进步派如此称呼这场政变。最后一票是参议员迈克尔·贝内特投给革新党团的。投票结果是61比39，仓促组建的进步-自由党团最终未能组织保守派和革新派联手将阿尔·戈尔选为多数党领袖。戈尔走上讲台，在主持者面前接受了提名。\n\n\"我的美国同胞们，我在此怀着最深切的感激发言。美国民主正遭受内外各方面的攻击。一个全新的美国需要行动胜过一切。而我，在宪法誓言的见证下，将成为它的代表。\""
 usb.19.a: "新的开始"
 usb.20.t: "筹备战后选举"
 usb.20.desc: "民主党大获全胜"
 usb.20.a: "让比赛开幕吧"
 usb.21.t: "美国再统一"
 usb.21.desc: "对拜登总统来说，夜幕降临了。解放的前夜即将到来，他所面对的这三重悲伤也将随之结束。不，是整个美国所面对的悲伤。他并不需要为自己来辩护，对全体美国人民的爱已然足够。诚然，多重打击深深伤害了这个身陷斗争漩涡的人的内心，但他知道：被打倒了，再站起来就可以。他缓缓起身，为了真切地看到整个总统任期所追求的目标，他走遍了杜鲁门阳台的每一个层级，望着阳光洒落在那些重新投入工作或只是享受当下的美国人民肩头。此时此刻，他拿出了詹姆斯·乔伊斯的《尤利西斯》，这本书激励了他，也是这本一直带在身边的书帮助他度过了之前的艰难时刻。他读道：\"你无法让时间倒流，就像用手掌接水一样。\"虽然无法回到过去，但他将保证美国再次成为一个团结的国家。"
 usb.21.a: "合众之魂已得拯救"
 usb.22.t: "叛军拒绝让步!"
 usb.22.desc: "特朗普在丹佛的军事政府向我们发来照会，要求我们和平移交权力并放下武器停止对抗，否则的话双方将彻底进入敌对状态。由于提供的两种选项只会让对方就此骑在我们头上耀武扬威，这对于我们来说是可忍孰不可忍，因此便严词拒绝了对方的无理要求。自对方收到我们的回复那刻起，整条战线各处便都爆发了战斗，幸亏我方高层指挥得当，再加上敌军过于依赖民兵部队，因此战况尚对我军有利。"
 usb.22.a: "我等必为民主而战！"
 usb.23.t: "布隆伯格大扫除"
 usb.23.desc: "寒冷的晨风吹过哥伦比亚高地。在其人口稠密的城市地区，无论身处其中的人多么位高权重，终归没有人能预测将会发生什么。在没有事先警告居民的情况下，一支由军用卡车和防雷车组成的车队穿过第14街，好似电视和社交媒体上记录的战争前线。而就在那个早上，高地以南几英里外的参议院正召开极其重要的会议。军队出动的情况过去从未有过，大多数人猜测他们是因发现内部威胁或保卫会议而来的。车队驶离之后，数十名国民警卫队成员带着AR-15出家门，强令商店关门，实施宵禁。随后全城彻底断电，特区居民恐慌不已。首都几近封锁。\n\n一排排卡车挤满国会大厦周围的街道，原保卫大厦的警察立即遵照命令投降。此地已四面八方被堵得水泄不通，一列列国民警卫队、士兵、特种部队冲入其中。而另一群肩并肩，佩戴勋章的高级军官旁随行着特工。较低楼层已清扫一空。据报道称，白宫也同样被包围了。士兵和军官组成的队伍踏入参议院大厅。步枪摆动警示众人，会议已结束。\n\n\"怎么回事？！\"\n\n\"这是什么意思——？！\"\n\n参议员的呼喊无济于事，军士们继续履行他们认定的宪法义务。领头的指挥官开始宣读一份文件。\n\n\"我们在履行行政职责。总统已宣布根据战时条款无条件投降。我们到此是为以武力建立临时政府，并监督新政府的组建。参议员迈克尔·布隆伯格由于其坚持与叛军抗争，将宣誓就任美利坚合众国总统。而本次参议院会议就此休会。\"封锁的参议院大厅内，指挥官在讲台上宣布了这一切，原主持会议的官员也已被解除职务。"
 usb.23.a: "我爱迈克！"
 usb.24.t: "国会大洗牌"
 usb.24.d: "在经过近期的改革后，为了评估新制度下民众的真实意愿，一场紧急选举被宣布提前召开。不会再有地域选区划分和\"赢者通吃\"等过时的选举制度蒙蔽美国人民的真实意愿，也不会再有华尔街的亿万富翁能够操控我们的选举。随着以排序复选制、公共资助选举、以及以法律手段废除两党制并进行多轮投票为主要特点的新选举制度的实施，美国民主社会主义者已成为了最大的赢家，并和绿党以及社会主义替代党组成了执政联盟，而民主党、自由党和新成立的爱国人民党则成为了反对党。\n\n遗憾的是，国家正处于多事之秋，由于在叛乱分子控制区未能组织投票，致使大部分国土都被排挤在了选举之外。此外，许多因脱离联邦而处在军管状态的州尚未正式重新加入联邦，导致中西部大片地区并未得到代表。尽管如此，在忠于美利坚联邦的领土上，民主的成功是我们新制度优越性的有力体现，也证明了我们的民主在这场内战中将变得比以前更加强大。"
 usb.24.a: "向美国民主社会主义者们致敬！"
 usb.25.t: "南佐治亚作战行动"
 usb.25.d: ""
 usb.25.a: "我们必须收复它！"
 usb.26.t: "大企业逃离新英格兰"
 usb.26.d: "国际经济的心脏突然停止跳动，战火席卷了新英格兰，导致许多机构选择撤离到美利坚联邦南部。纽约陷入全面无政府状态，帮派、纽约警察、军队和民兵在街头火并。在波士顿，激进的美国钢铁阵线的主张吓坏了企业主们。考虑到东北地区的危险局势以及中大西洋地区的相对稳定，许多公司都选择迁移到华盛顿特区、里士满和费城建立新的总部。资金开始涌入美利坚联邦，带来了就业与投资机会，大大增强了政府当前急需的合法性。"
 usb.26.a: "欢迎来到华盛顿特区！"
 usb.27.t: "乡村叛乱揭幕"
 usb.27.d: "诸多令人震惊的报告显示，一股迅速壮大的叛乱势力正在乡村地区崛起，据称其由当地的持不同政见者组成，他们效忠于丹佛的\"宪政主义者\"，并得到了\"誓言守护者\"、\"骄傲男孩\"和\"百分之三运动\"等地方民兵组织的支持。在我们到达华盛顿特区后，发现这些组织受到了西弗吉尼亚国民警卫队的武装和训练。如今这些民兵组织已在乡村，特别是在阿巴拉契亚山区扎根，向当地武装分子分发武器。简报还指出，这些叛乱者已经用随手可得的材料建造了简易的防御工事、碉堡、掩体，甚至是临时改装的战斗车辆。\n\n我们不应操之过急，必须立即开始准备在这些地区采取军事行动，保护我们的民主免受内在威胁，并防止局势失控。目前，几支反叛乱旅已经被召集起来应对此事，我们正在实施围剿政策，利用强大的火力逐步收紧叛乱分子的包围圈，等待他们耗尽装备，并通过空中打击的震慑行动使其士气低落。尽管这些策略看似有望奏效，但它必将耗费我们宝贵的时间和精力，分散我们对前线的关注。我们还应开始与城市地区忠于合法政府的合作者建立联系，从内部渗透叛乱并将其摧毁。如果我们要击败那些试图颠覆民主、给美国带来黑暗时代的敌人，就必须对这些犯罪分子毫不留情，向全世界展现我们坚如磐石的决心。"
 usb.27.a: "该死的乡巴佬"
 usb.28.t: "阿巴拉契亚叛乱已粉碎！"
 usb.28.d: "前线来报，我军粉碎了阿拉巴契亚的叛军残余并向东进军，取得了针对特朗普\"政府\"的巨大胜利。这些叛军破坏着通往中西部前线的补给线和铁路网，是我军的心头之患。他们使我们从西部前线转移了大量的精力和资源，让\"宪政派\"叛徒得以继续负隅顽抗。报告还详细说明了专职反叛乱旅团最近在西弗吉尼亚州的进攻，摧毁了50多个恐怖主义组织，使该地区任何潜在的敌军行动陷入了瘫痪，保障了我们在当地的利益。这在宣传上也是一次大胜，我们通过这一系列行动证明了我军是世界上最锐不可当、训练有素的部队，无论丹佛的狂妄之辈如何发狂，我们的民主体制都将不动如山。\n\n我军精确有效地执行了如暗杀当地头目，利用优势火力包围和摧毁叛乱部队等行动，粉碎了他们的抵抗。这次胜利使我们能从阿巴拉契亚腾出手来，将这些军事资源重新投入到西部前线，对抗那里日益增长的威胁。现在我们要在当地努力重建，赢回民心，防止任何煽动性思想重新抬头。我们仍要在当地保持强大的军事存在，因此，戒严将会延长，提供更多时间来斩草除根，审判叛徒，确保长治久安。民主的钢靴将会碾死任何企图用他们那毒液为害人民的毒蛇，虽远必诛。"
 usb.28.a: "联邦永存！"
 usb.29.t: "平叛行动圆满成功"
 usb.29.d: "我们针对意图瓦解民主的宪政主义叛乱分子的最新反叛作战取得了显著成功。根据最新报告显示，遍布我方领土的多样化叛乱分子群体已被精准渗透、包围，并通过精确打击行动成功摧毁了其核心领导，切断了残余势力的装备供应。这场胜利使得我们得以重组之前被这些颠覆分子牵制的多个旅，转而将精力重新集中到与特朗普一伙叛徒在前线的战斗上。特朗普和他在丹佛的叛国同盟早已宣布支持这场叛乱，并自内战爆发之初便通过走私网络为其武装提供支持。而此次胜利不仅从军事上打击了叛乱势力，也成为了宣传上的重大胜利，我们成功曝光了特朗普企图继续在全国范围内屠杀更多美国人的野心。\n\n然而，在这场里程碑式的胜利之后，我们仍需在阿巴拉契亚山脉及其他叛乱滋生的州保持强有力的军事存在。保持警觉至关重要，因为残余的叛乱势力可能会发起反扑或伏击。俗话说得好，即便你成功将蛇踩倒在地，也不能掉以轻心。这些清剿行动无疑极大地提振了我们地面部队与后方士气，但我们必须持续严格执行对这些游击基地的清剿行动，无论它们何时何地出现；那些逃脱我们掌控的叛乱首领很可能会发起反攻，而贸然将我们最精锐的反叛部队投入到这些山地森林中的坚固据点，毫无益处。"
 usb.29.a: "好极了"
 usb.30.t: "平叛行动适得其反"
 usb.30.d: "来自乡间的消息令人不寒而栗，揭示了我们最近的反叛作战行动彻底失败。尽管我们付出了巨大努力，但报告显示，遍布全国的叛乱分子网络依然坚韧不拔，一场大规模的叛乱反攻导致大片领土丢失，敌人在该地区的势力日益增强。这次行动的失败严重阻碍了我们在前线对抗特朗普叛徒团伙的努力，叛乱势力的持续抵抗无谓地牺牲了更多美国士兵的生命。现在至关重要的是要在叛乱猖獗的地区保持更大规模的军事存在，从难以守住的区域有序撤离，以减少伤亡，并准备发起新的反攻，消灭叛徒据点。\n\n这些挫折对士气造成了沉重打击，也让我方高层指挥部对反叛行动的战术水平提出了质疑。我们必须重新评估现有的反叛策略，加强训练，并重新分配那些被认为对行动失败负有责任的指挥官和部队领导。在此期间，我们的首要任务应是限制叛乱势力对这些地区的控制，开始加固当地定居点，试图将其包围，并发起强有力的攻势，以耗尽他们的资源并削弱他们在当地民众中的支持。虽然我们重回战术规划阶段，但我们必须向前线的战士们保证，虽然我们失去了一场战斗，但这场战争远未结束。"
 usb.30.a: "战争仍在持续。"
 usb.31.t: "§g革新派§!提议增加开支"
 usb.31.desc: ""
 usb.31.a: "牺牲是必要的。（通过法案）"
 usb.31.b: "我们当前的支出水平良好。（否决法案）"
 usb.32.t: "反联邦组织形成"
 usb.32.desc: "啧"
 usb.32.a: "我们必须阻止他们"
 usb.33.t: "知更鸟行动开始"
 usb.33.desc: "自美利坚联邦诞生以来，我们始终面临着那些自诩效忠丹佛伪政权叛乱者的负隅顽抗。如果任由这些敌对势力蔓延，将会引发一连串不可预知的后果，他们会召集更多追随者汇聚其麾下，最终威胁到我们政府的根基。因此，为了守护这个国家与其珍贵的民主理念，我们即刻启动\"知更鸟行动\"。\n\n\"知更鸟行动\"乃一场合力之举，汇集了联邦调查局及多方专业力量的智慧与资源。其首要使命，便是彻底摧毁盘踞在华盛顿区域内的各种叛乱组织，剥除他们对国家的隐匿威胁。尽管华盛顿特区大体已然置于我们的掌控之下，然而这些根深蒂固的特朗普余党依旧是威胁我们政府肌体的毒瘤。他们的具体意图尚未完全暴露，但他们对国家安全的阴谋，已然显露无遗，必须果断出手，绝不姑息。\n\n这些叛乱者不仅是我们安全的当下威胁，更是前政权与其暗中同盟策动的更为深远的阴谋的一部分。他们不过是特朗普手中的棋子，旨在破坏美利坚联邦与其领导权。然而，请铭记，我们将不遗余力地揪出那些企图颠覆国家者，使其为其罪行付出代价。\"知更鸟行动\"正是我们对法治的坚定捍卫，亦是对民主神圣殿堂的守护。"
 usb.33.a: "摧毁特朗普政权的第一步！"
 usb.34.t: "知更鸟行动圆满结束！"
 usb.34.desc: "今日传来佳音，\"知更鸟行动\"已然圆满落幕。此次行动谋划精妙，目标直指华盛顿特区内的特朗普残余势力，确保这些特朗普主义的分子或被彻底铲除，或自行解散，无力再作乱。\n\n在一系列战略布局与协同努力的推动下，我们成功捍卫了国家机构的完整性，抵御了这些潜在的威胁。联邦调查局及受聘协作的各方展现出了无与伦比的奉献与警觉，为守护政府稳固发挥了至关重要的作用，维系了国家治理的正常运作。\n\n此次胜利昭示着我们捍卫民主信念的坚定承诺，同时也彰显了我们重建国家、恢复往日荣光的强大决心。通过果断清除内忧隐患，我们更坚信美国的未来将会重回正轨，光辉重现。"
 usb.34.a: "首先是华盛顿，之后就是全美国！"
 usb.35.t: "幻影行动开始"
 usb.35.desc: "随着战争的持续，以参谋长联席会议为首，华盛顿政府指挥系统内部对我军迅猛攻势的担忧与日俱增。在短时间内，[USB.GetNameDef]已经成功解放了密苏里州至密西西比河流域的全部地区，同时还包括圣路易斯的军事据点。然而，部队过分快速地推进给后勤带来了巨大压力，后勤部门三番五次发出警告，称燃料短缺危机即将发生。在北方，即使有空中支援和前线优势，部队在冬季严寒中也难以推进，并出现了大量伤亡。游击队的骚扰也带来了更多问题，几乎每一个平民都武装到了牙齿，与联邦军队展开了激烈的战斗。\n\n为此，在经过全面的情况通报并获得最高统帅[USB.GetLeader]的批准后，[USB.GetNameDef]正式决定实施幻影行动；经过长久的精心准备后，联邦军队将对特朗普发起全面攻击。装甲部队将作为先锋沿密西西比河的关键地点发动突袭，突破当地的防线。与忠实于合法政府的当地合作者合作，[USB.GetNameDef]将能突破特朗普的防御壁垒，向丹佛推进，解放除落基山脉以外的全部中西部地区。虽然这项计划并非没有缺陷，但这是[USB.GetLeader]夺回国家控制权的最佳时机。然而，一旦失败，其进攻力量就会遭受重创，因此谨慎行事最为重要。"
 usb.35.a: "到丹佛去！"
 usb.36.t: "收复丹佛"
 usb.36.desc: "随着隆隆的炮声逐渐沉寂，丹佛市天际线的滚滚黑烟逐渐消散。胜利者的旗帜在科罗拉多州议会大厦的房顶上清晰可见——美利坚联邦的蓝旗虽被炮火摧残得七零八落，但仍然顽强地挺立着。市区内联邦军士兵们大多正朝天鸣枪以示庆祝，而宪政政府的残兵败将则被集中关押，并被命令上缴所有武器听候处置。\n\n所有人未曾想到丹佛战役会演变成如此残酷的巷战。在一开始，联邦军试图通过谈判实现丹佛的和平解放，但在双方谈判代表还未脱离接触时炮击便已经开始，而两军则互相指责是对方先开了第一枪，这如今已成未解之谜。围绕丹佛国际机场、联合车站以及福克斯新闻等媒体电台总部的争夺战最为血腥激烈，无数军民横尸街头，许多有价值的古建筑被毁。尽管如此，丹佛被联邦攻占仍是代表了美国内战决定性胜负手的里程碑事件。联邦总统已准备就此发布胜利演讲，而宪政政府的领袖唐纳德·特朗普如今下落不明，不少人相信他已经葬身于丹佛街头的瓦砾之中。"
 usb.36.a: "美国，一点也不能少"
 usb.37.t: "谈判桌：叛徒的财产"
 usb.37.desc: "与处在我方控制区内各大公司的谈判已经开始，到目前为止已经达成了一些小交易，也扫清了一些小障碍。然而近期，当我们要求这些企业进行紧急工厂改造时遇到了困难。这些企业要求作为回报，战争结束后所有目前支持特朗普的企业都要移交给他们。这在我方内部引起了争议，一些人担心这会大大加强这些企业的工业实力，想要拒绝他们的条件，而另一些人则想要接受这笔交易。这最终取决于总统是否决定接受这一提议。"
 usb.37.a: "接受"
 usb.37.b: "拒绝"
 usb.38.t: "谈判桌：营业税税率"
 usb.38.desc: "我们已要求企业专业顾问和经理人员以最大效率运营现有工厂，而企业则反过来要求降低税率。虽然这一提议遇到的争议比上一次少，但一些仍反对现行企业税率的进步和自由党团成员反对这笔交易。现在又到了总统决定接受还是拒绝这笔交易的时候了。"
 usb.38.a: "接受"
 usb.38.b: "拒绝"
 usb.39.t: "谈判桌：政治影响力"
 usb.39.desc: "最后一轮谈判正在进行，我们已经解决了之前的所有阻碍。我们对企业提出的最终要求是对所有当前和未来政府决策的公开支持，而这些企业要求在谈判达成一致后在政府中有更多的代表权和影响力。"
 usb.39.a: "接受"
 usb.39.b: "拒绝"
 usb.40.t: "统一协定"
 usb.40.desc: "之前的数轮谈判最终都以对国家有利的结果告终。虽然在先前的谈判中遇到了大大小小的障碍，但在双方都满意地结束了谈判，并承诺尽快实施所有达成一致的改革后，我们现在终于可以松一口气了。\n\n这应该能极大有利于国家的事业，因为无论是地方产业的改善、企业发言人的公开支持，还是更多战争物资开始被生产出来，我们已经看到签署的协议正逐渐彰显出它的威力。"
 usb.40.a: "我们已经尽力了，干得不错"
 usb.41.t: "谈判失败"
 usb.41.desc: "我们最近与企业的谈判不幸破裂。最后一刻为阻止决裂所做的努力也失败了，目前双方之间所有的沟通都已中断。这是一次灾难性的失败，并且许多人将这次失败归咎于我们。这些事件在我们党内也反响不佳，许多人已经开始怀疑企业目前所掌握的权力是否有害。这削弱了我们政府处理国内问题的能力，也为我们试图收拾内战残局增添了更多困难。"
 usb.41.a: "情况还能更糟吗？"
 usb.42.t: "2024年美国大选"
 usb.42.desc: "随着选举日的脚步愈发临近，2024年的美国总统与国会选举正逐步展现其历史上最为分裂的一面。四大政治派系在广袤的政治光谱上分庭抗礼，为掌控联邦的未来展开激烈角逐。\n\n在民主党内部，尖锐的内斗将其撕裂为三个泾渭分明的阵营。由参议员伯尼·桑德斯领军的进步派，高举全面改革之旗，致力于医疗、教育及劳动权利的深远变革，勾勒出美国社会民主的崭新蓝图。而自由派则在[USB.GetLeader]的带领下，呼吁国家团结，以温和稳定与渐进式改革在动荡之中稳住航向。与此同时，前纽约市长迈克尔·布隆伯格领导的创新派承诺以技术驱动未来，以经济现代化和科技进步为国家发展注入新活力。\n\n与分裂的左翼阵营相对，由参议员米特·罗姆尼领导的共和党以\"联邦共和党\"的新形象再度崛起。拒绝追随唐纳德·特朗普的分裂路线，他们以里根式的新保守主义和务实治理为核心，重新吸引了特朗普时代前的郊区与乡村基本盘。\n\n然而，极端主义的阴霾依然笼罩美国民主的天空。关于极端分子煽动活动的报告已将安全警戒推向高潮，特别是在西弗吉尼亚、俄亥俄与田纳西等\"MAGA\"叛乱热点地区。警察与后备部队高度戒备，试图阻止日益升温的政治暴力将国家推向更深的混乱。"
 usb.42.a: "进步主义"
 usb.42.b: "自由主义"
 usb.42.c: "保守主义"
 usb.42.d: "革新主义"
 usb.43.t: "幻影行动"
 usb.43.desc: "随着战争的持续，以参谋长联席会议为首，指挥系统内部对我军迅猛攻势的担忧与日俱增。在短时间内，我军已经成功解放了密苏里州至密西西比河流域的全部地区，同时还包括圣路易斯的军事据点。然而，部队过分快速地推进给我们的后勤带来了巨大压力，军需官们三番五次发出警告，称燃料短缺危机即将发生。在北方，即使有空中支援和前线优势，部队在冬季严寒中也难以推进，并出现了大量伤亡。游击队的骚扰也带来了更多问题，我们遇到的几乎每一个平民都武装到了牙齿，同时战意高昂，至死才罢休。来到当下，随着密西西比河沿岸的防御阵地阻挡住了我军发动的大部分攻势，战局似乎来到了一个瓶颈期。\n\n这就是为什么，在作战指挥中心内部举行了一系列内容广泛的简报会，并得到了最高统帅乔·拜登的批准后，我们决定实施幻影行动；经过长久的精心准备后，我军最精锐的部队将被作为王牌打出，对特朗普发起全面攻击。装甲部队将作为先锋沿密西西比河的关键地点发动突袭，突破当地的防线。与忠实于合法政府的当地合作者合作，我们将能突破特朗普的防御壁垒，向丹佛推进，解放除落基山脉以外的全部中西部地区。虽然这项计划并非没有缺陷，而且就目前我方态势而言可以称得上是相当大胆，但这是我们将美国从暴政的掌控中解救出来，并结束特朗普恐怖统治的最佳机会。鉴于实施这一计划已消耗了我们用于巩固前线的大量资源，所以失败将会是灾难性的。因此，我们必须小心谨慎。如果我们这次满盘皆输，那么我们将再没有能力主动发起攻势了。"
 usb.43.a: "到丹佛去！"
 usb.44.t: "企业涉嫌参与非法活动"
 usb.44.desc: "这是一个周六的深夜时段，CNN的节目正在进行。按照预定，主持人克里斯·华莱士将对乔什·伯本进行采访，后者曾参加了一次政府与其辖区内各大企业的会议。\n\n\"乔什，我们听到一些传闻，说你对你参加的这次企业会议有一些话要说。这些传闻是真的吗？\"克里斯问道。\n\n\"是的，克里斯，传闻属实。老实说，今天来参加采访时，我并不确定自己想说些什么。但后来我意识到，人民有权知道真相。而真相就是：许多参与会议的公司，如果它们是国家，它们会因危害人类罪而被审判。\"\n\n\"哇，乔什，这真是一个相当强烈的观点。你介意深入解释一下吗？我相信观众们一定想了解更多。\"克里斯回应道。\n\n\"当然，克里斯。我会的。参加会议时，我得到了许多所谓‘机密’的信息，用来与公司发言人进行‘谈判’。让我明确告诉大家，这些公司对待其员工、当地土地所有者和小型企业的行为简直是极权主义的表现，他们应该立即受到惩罚。\"\n\n\"好的，乔什，你觉得你会因为揭露这些事情而遭到打他吗？毕竟你刚才提到他们的行为已经……\"\n\n\"我不确定，但我知道的是，如果没有人采取行动，他们会继续这样做。所以我在此恳请政府，采取行动。现在就行动。\""
 usb.44.a: "不过又一个偏执的阴谋论者"
 usb.44.b: "对布隆伯格先生展开一场调查……"
 usb.45.t: "乡愁之忆"
 usb.45.desc: "总统办公室，下午三点。\n\n摆在坚毅桌上的报告无一例外，不是悲观就是平庸。这场为\"重塑国家之魂\"的艰难斗争，长期以来一直让拜登感受到一种独特的内在痛苦。这种痛苦从他失去尼莉亚和娜奥米的那一刻起便如影随形。作为手握大权、站在世界巅峰的领袖，当他面对那些教条主义者以及充斥着屠杀、死亡、恐怖的报告时，该如何是好？每一个字都是对国家重归统一的进一步撕裂。\n\n拜登闭上了眼睛，一滴泪水从他疲惫的眼皮间滑落，滴在那些满是四十多年政治奋斗印记的文件上，仿佛往日的团结如今已化作毁灭的象征。一张接一张的文件，被泪水濡湿，宛若国家的哀伤延展至纸上。\n他怀念那个不必担忧政治僵局演变成全面战争的美国，那时的美国人可以安心走出家门，彼此拥抱。而如今，这一切都化为了弹火中的尘埃。\n\n他清楚地知道，必须找到恢复国家的办法，他必须成为这个国家需要的领导者……"
 usb.45.a: "然后他便开始书写……"
 usb.46.t: "伯尼·桑德斯去世"
 usb.46.desc: "我们近日得知，进步运动的标志性人物伯尼·桑德斯因心脏病发作去世，这让我们深感悲痛。\n\n据报道，桑德斯在家中突发中风，随后被紧急送往医院。不幸的是，当医生短暂离开病房时，他突发了心脏病，尽管全力抢救仍不幸离世，而当时他的妻子简·桑德斯及众多亲属陪伴在他身边。\n随着桑德斯的离世，进步运动的成员以及政府中的许多人将共同进入哀悼期。预计哀悼期结束后，亚历山德里娅·奥卡西奥-科尔特斯将挺身而出，接替桑德斯成为该运动的领袖和代表人物，继续推进桑德斯为之奉献一生的事业。\n\n桑德斯的一生是对政治事业的执着奉献，他为实现自己的理想而不懈努力。\n无论人们是否赞同他的政治观点，他对信念的坚定执着都使他成为一位值得尊敬的人物。"
 usb.46.a: "逝者安息"
 usb.47.t: "卡利古拉耳边的低语"
 usb.47.d: "§R\"总统一职需要救赎。\"§!\n\n我们，不能再让旧民主党的记忆困扰我们的国家，反对我们的政府、我们国家的魂。\n\n§R\"美国需要救赎，由内而外的救赎\"§!"
 usb.47.a: "\"我保证……我们会为国家拔除弊病……\""
 usb.48.t: "卡利古拉失去了平衡"
 usb.48.d: "数日，数周，甚至更久，如果那些报道属实的话，我们敬爱的领袖已完全退出交际圈。无言，无声。他一动不动，宛如王座上沉稳的雕像。潜藏在沉默背后的重担愈发加剧，时钟滴答，而真相随之浮出水面：拜登总统正迈向死亡。\n\n我们的总统不仅身为领导者；他是维系国家结构的基石。没有他，我们为之奋斗的一切，我们的宏图壮志，都将化为过往云烟。他的离去意味着政权的崩溃，意味着我们的努力都将淹没在历史长河之中，意味着又一次乌托邦的失败尝试，或是彻底遭人遗忘。\n\n我们不能让它发生。必须调动一切资源维持约瑟夫·拜登的生命。研究必须以前所未有的速度推进。必须将新药物推到最前沿，并且需要通过持续的检查密切监测他的健康状况。\n\n否则，我们所有努力都将付诸东流。"
 usb.48.a: "会找到解决方案的"
 usb.49.t: "美国，依旧美丽"
 usb.49.d: "单位1324，这就是他的名字。打他记事起就有的名字。\n\n他并不善于记忆。\n\n他大部分的记忆都停留在这个房间，坐在这把椅子上，在他面前的面板上做着未知的工作。直到近期工作才停止。\n\n一连几天，又或许是几周都没有工作，他对时间并没有很好的把握……甚至连自己身处何处都一无所知。\n\n许久，终于，一些东西从屏幕中弹出。这让他有点害怕，信息发出嗡嗡的蜂鸣声。当最终打开信息时，里面的东西让他一时摸不着头脑。\n\n崩溃。战争。自由……自由。\n\n那个……词。在他心中激起了某种东西。他脑海深处的某个东西被打开了，慢慢地，记忆如潮水般涌入。他一点一点记起自己是如何来到这里的。他当时正在家里，门突然被撞开了，穿着盔甲的蒙面人将他打晕。然后，他被锁在这把椅子上，面前是那个再熟悉不过的面板。\n\n他环顾四周，注意到了椅子上那早已消失许久的锁。尽管如此，单位1324还是从椅子上下来，慢慢地走动，他的腿已经明显萎缩。他在设施的走廊里游荡了能有好几天，绝望地想要出去。最终，他找到了出口——一扇敞开的金属大门。\n\n他第一次走到外面，注视着令人头晕目眩的阳光。适应后他环顾四周，凝视着眼前的景色——美丽的森林，这是他日思夜想的东西。然后，他看到了一只鸟，一只白色的鸽子。它在空中滑翔，引领着单位1324前进。\n\n他知道的不多，浑身仍然颤抖着。但他似乎获得了自由。\n\n而他绝不会再让它逃走了。"
 usb.49.a: "发现恐怖中的美"
 usb.50.t: "时代新秩序"
 usb.50.desc: "它始于1776年，当我们首次挺身而出，反抗英国压迫者时，一个关于自由的大胆新愿景——美国的理想应运而生。从那时起，我们的国家为了生存与独立，不断抗争，我们的身份也在现代历史的洪流中面临挑战。\n然而，近期我们遭遇了前所未有的黑暗危机，一场血腥且残酷的冲突迫使我们做出巨大的牺牲。我们日夜奋战，展现出如同绝境之狐狸般的顽强决心，回想着先辈们的坚韧与奋斗。\n\n在丹佛，我们坚守阵地，成功击退了叛国者的进攻，迫使他们束手就擒。\n在密歇根和新英格兰，我们奋力抵抗法西斯的崛起，为那里的未来扫清道路。\n在佛罗里达和南方，我们与纳粹分子展开了较量，并成功处决了他们的领导层。\n在西海岸，我们扼杀了共产主义的萌芽，并告诉人们还有其他的道路可以选择。\n\n我们对那些企图背叛我们、摧毁我们所建立的一切的人进行了公正的审判。我们清除了社会中的害群之马，决心建立一个所有人都能和平共处、共同繁荣发展的社会体系。我们正在创造一个理想的乌托邦。\n\n但我们从未感到疲惫。即使到现在，我们依然坚定前行，与那些未能理解我们斗争真正意义的人抗争。他们误解了我们的使命，未能看到我们努力建设的更美好世界——一个基于团结而非压迫、追求进步而非恐惧的未来。但那将是另一场战斗。现在，我们勇往直前，致力于尚未完成的事业，深知我们的牺牲正是为了这一刻。\n\n今天，我们取得了辉煌的胜利。\n\n我们的敌人已被击败，太阳在新的地平线上冉冉升起。\n\n一个更加美好的未来正在等待着我们，一个没有冲突、没有苦难的世界。\n我们已准备好去迎接这个美好的未来。"
 usb.50.a: "荣耀，复仇，但现在，一切归于平静。"
 usb.51.t: "下台？"
 usb.51.d: "在党内的无数次讨论后，许多人都提出了拜登的年龄和明显的精神问题，以及他是否应该继续参与2024年的总统大选。"
 usb.51.a: "绝不！拜登主义再续四年！"
 usb.51.b: "也许是个明智的选择"
 usb.51.c: "不能再继续让这人装总统了！援引第25条修正案！"
 usb.520.t: "准备就绪"
 usb.520.d: ""
 usb.520.a: "伟大美国传统犹存！"
 usb.520.b: "伟大美国传统犹存！"
 usb.520.c: "选票上只有一个名字：拜登！"
 usb.52.t: "2024年总统选举辩论"
 usb.52.desc_1: "今天晚上，各大电视台准备开始播放2024年第一场总统候选人辩论。两名参议员和现任总统已经离开了华盛顿特区，前往辛辛那提，无疑是正在最后时刻进行演练准备。博彩市场认为这是一场任何人都可能赢的辩论，尽管一些候选人的赔率可能会更大。各候选人的竞选团队谨慎地管理着公众的期望，引导他们关注某些问题，并集中攻击对手的弱点。\n\n伯尼·桑德斯代表着顽固的进步党。他呼吁追溯到改革时代辉煌日子的遗产，试图说服工人阶级相信他对维护工人生活权益的无可指责的奉献。米特·罗姆尼是美国保守派的堡垒，他以一人之力逆党内反民主浪潮而行，与特朗普主义的凶兽搏杀，和其党内同僚的犹豫不决、为之辩护形成鲜明对比。这些壮举使他赢得了在郊区选民的信任，而更加保守的人也没有其他选择。拜登总统则提出了截然不同的论调。他谈及着燃烧的城市、灰烬遍布的战场，以及归乡的遗体，饥饿的难民和他们瘦骨嶙峋的孩子们，语气庄重而深沉。"
 usb.52.desc_2: "今天晚上，各大电视台准备开始播放2024年第一场总统候选人辩论。参议员米特·罗姆尼和现任总统乔·拜登已经离开了华盛顿特区，前往辛辛那提，无疑是正在最后时刻进行演练准备。博彩市场认为这是一场任何人都可能赢的辩论，尽管一些候选人的赔率可能会更大。各候选人的竞选团队谨慎地管理着公众的期望，引导他们关注某些问题，并集中攻击对手的弱点。\n\n米特·罗姆尼是美国保守派的堡垒，他以一人之力逆党内反民主浪潮而行，与特朗普主义的凶兽搏杀，和其党内同僚的犹豫不决、为之辩护形成鲜明对比。这些壮举使他赢得了在郊区选民的信任，而更加保守的人也没有其他选择。罗姆尼的竞选活动融合了里根式的乐观主义和新保守主义的强硬立场，猛烈抨击特朗普主义，同时承诺战争结束后进行减税。罗姆尼可能会把自己呈现为一个富有同情心的保守派，并自我塑造为反政治极端主义的可靠人选。\n\n拜登总统则提出了截然不同的论调。他谈及着燃烧的城市、灰烬遍布的战场，以及归乡的遗体，饥饿的难民和他们瘦骨嶙峋的孩子们，语气庄重而深沉。他的竞选活动充满了军事色彩，这位政治巨人向奋战在前线的士兵、专职人士以及饱受煎熬的城市民众发出号召，并承诺将为他们带来援助与军事上的胜利。登上辩论舞台的那个男人将不会讨论政策，他只会承诺以任何必要手段来终止这场流血事件。"
 usb.52.desc_3: "今天晚上，各大电视台准备开始播放2024年第一场总统候选人辩论。参议员伯尼·桑德斯和现任总统乔·拜登已经离开了华盛顿特区，前往辛辛那提，无疑是正在最后时刻进行演练准备。博彩市场认为这是一场任何人都可能赢的辩论，尽管一些候选人的赔率可能会更大。各候选人的竞选团队谨慎地管理着公众的期望，引导他们关注某些问题，并集中攻击对手的弱点。\n\n伯尼·桑德斯代表着顽固的进步党。他呼吁追溯到改革时代辉煌日子的遗产，试图说服工人阶级相信他对维护工人生活权益的无可指责的奉献。桑德斯批评拜登政府和企业的联盟对人道主义救援工作的忽视。为了填补特朗普民粹主义留下的空白，桑德斯可能会试图通过承诺一个更加直接的民主政府、更广泛的福利国家和广泛的社会改革来吸引被疏远的选民。\n\n拜登总统则提出了截然不同的论调。他谈及着燃烧的城市、灰烬遍布的战场，以及归乡的遗体，饥饿的难民和他们瘦骨嶙峋的孩子们，语气庄重而深沉。他的竞选活动充满了军事色彩，这位政治巨人向奋战在前线的士兵、专职人士以及饱受煎熬的城市民众发出号召，并承诺将为他们带来援助与军事上的胜利。他不仅赢得了本党的全力支持，还意外地获得了残余共和党的支持，这些人在选举失败的阴影下，选择提名一位坚定的民主党人作为最后的希望。登上辩论舞台的那个男人将不会讨论政策，他只会承诺以任何必要手段来终止这场流血事件。"
 usb.52.desc_4: "今晚，在这个本该辩论激烈的选举周内，电视荧屏将转为播放乔·拜登的演讲。总统已离开华盛顿特区，飞往南部战线最为安全的地区，紧锣密鼓地为这场至关重要的演讲做最后的准备。\n\n谈道满目疮痍的城市、硝烟弥漫的战场、士兵遗骸被送回给哀伤的家属，以及饥肠辘辘的难民与他们骨瘦如柴的孩童时，拜登的言辞凝重而深沉，他唯一的乐观情绪源自对最终战胜国内敌人的坚定信念。他的竞选活动充满了军事色彩，这位政治巨人向奋战在前线的士兵、专职人士以及饱受煎熬的城市民众发出号召，并承诺将为他们带来援助与军事上的胜利。他不仅赢得了本党的全力支持，还意外地获得了残余共和党的支持，这些人在选举失败的阴影下，选择提名一位坚定的民主党人作为最后的希望。今晚，当拜登站在美国人民面前时，他不会陷入政策细节的讨论，而是会坚定承诺，将不惜一切代价结束这场流血冲突。"
 usb.52.a: "拜登把他们吓得魂飞魄散。"
 usb.52.b: "拜登做得不错。"
 usb.52.ba: "我觉得吧……他挺好的"
 usb.52.c: "他仍然会是我们的总统……"
 usb.52.f: "真的全完了……"
 usb.52.p: "伯尼与我心连心！"
 usb.52.r: "我相信美国！"
 usb.521.t: "希望之人"
 usb.521.d: "约瑟夫·R·拜登，这个不经任何辩论就获得联邦一致提名的人，今天的表现确实超出了人们的预期。获得提名后，拜登发表了堪称历史性的总统演讲。他的演讲充满了活力和乐观精神，提出了对美好未来的憧憬，引起了听众的强烈共鸣。演讲的开头部分充满了热切的承诺和振奋人心的可能，奠定了乐观和激情的基调。然而，随着演讲的进行，拜登转变了方式，开始谈及国家面临的更为严峻的现实。他以慎重的语气谈到了许多美国人仍在忍受的艰难困苦以及为和平稳定而进行的不懈斗争。而这一转折表明了他对当前挑战的深刻认识和直面它的决心。\n\n人们则对这次演讲报以积极的回应，从一开始的积极向上到后来的铿锵有力，拜登的讲话在全美上下引起了强烈反响。尽管拜登的支持率面临下滑，但他的讲话在民众中重新燃起了希望。显而易见的是，通过这次演讲，拜登不仅巩固了自己作为领导人的地位，而且树立起了自己作为持久希望和坚韧不拔精神的象征。他的总统地位似乎仍固若金汤，而他的讲话则使全国人民对未来充满了乐观精神。"
 usb.521.a: "参议员、副总统、总统，现在又成为了希望之人。"
 usb.522.t: "苦乐参半的希望"
 usb.522.d: "尽管在总统向全国发表讲话前夕，人们对此存有或乐观或担忧的复杂情绪，但最终结果却出乎意料地令人满意。在讲话时，他表现得像一位再正常不过的战时总统，能很好地理解和分析当前局势，但在念某些短语或单词时还是偶尔会有小小的失误。不过，对于美国公众来说，这也只不过是拜登总统的常态——一个粗枝大叶，但拥有理解力和同情心的人，并且能有效掌握当前局势。\n\n联合政府内部对此反应不一，除去赞美声之外，保守派和进步派们也都略有微词。但拜登总统已经证明了他并非像许多人认为的那样，已被重担所压垮。"
 usb.522.a: "他并没有搞砸。"
 usb.524.t: "行政混乱！"
 usb.524.d: "在许多人眼中早已预见的事件终于发生：在总统乔·拜登演讲失败之后，数十甚至上百名地方参议员、众议员乃至各级政府的国会议员，无论是保守派还是进步派，纷纷正式退出拜登总统领导下的联合政府。原本仅是少数地方政府成员的简单退场，最终演变成联合政府整体的全面瘫痪。各部门的精英们公开谴责拜登，指责他未能在美国内战的阴影中妥善应对危机，严重低估了国家目前的紧迫与危机感。\n\n这一事态已使拜登政府陷入全面危机，各部门内阁成员及民主党的忠实残留支持者正准备采取应对措施，以挽救现存的团结，避免一场政府灾难的降临。面对一个越来越不满的联盟，拜登虽试图反击，但成效甚微。如今，这一动荡局势可能预示着拜登总统任期的终结，也为联邦的抗争敲响了警钟。"
 usb.524.a: "把一切都搞砸了！"
 usb.523.t: "现今已碎之人"
 usb.523.d: "在当下这种疑虑时刻，总统本应被树立为克服逆境的力量象征，消除人们对拜登在总统办公室内是否仍能掌控局势的怀疑。然而，对于大多数民主党人和那些对任何形式的联盟抱有一丝希望的人来说，这次讲话是乔·拜登总统的一场彻头彻尾的灾难。\n\n尽管试图将自己塑造成能够面对内乱和暴政，为美利坚带来复兴的经典叙事中的英雄人物，但面对一个自命不凡的独裁者的威胁，他只是越陷越深，从结结巴巴到完全失言或判断失误，讲话演变成了一场再明显不过的失言闹剧。\n\n对总统及其内阁来说，有效的危机公关方案可能已不复存在，任何内部纷争都只会让总统更受制于人，并不再像之前那样能胜任自己的工作。"
 usb.523.a: "这可没法随便拼回去的！"
 usb.525.t: "东山再起先生"
 usb.525.d: "令许多人难以置信的是，像乔·拜登这样看似体弱多病、日渐衰老之人竟能在政策和卓越性的激烈辩论中大放异彩。面对罗姆尼和桑德斯带来的重重压力，拜登以坚定不屈的姿态奋力反击，他几乎倾尽所有的辩论技巧，一一驳斥对手的观点，仿佛那些论点只不过是无用的垃圾而已。这些令人震撼的瞬间被现场直播真实记录，而那些自诩\"思维缜密且敏锐\"的对手们，在拜登的强势反击下，竟无言以对，只能黯然失色。这一幕被民众誉为老乔的\"全国性\"强势回归，其影响力堪比1864年后的林肯；看来拜登将与全国性重要人物产生交锋，如今只待一场彻底扭转局势的重大事件的发生。民意调查数据也已证实，拜登凭借其出色的表现，正稳步迈向领先地位。"
 usb.525.a: "上路吧，杰克！"
 usb.526.t: "\"疯叔\"老乔"
 usb.526.d: "全联邦都目睹了辩论迅速陷入前所未有的泥潭，充斥着接连不断的挑剔与全方位且毫无根据的攻讦。然而，在这灰暗且充满紧张的氛围中，众人的目光聚焦于一位曾以强大、稳重著称的辩论者——现任总统乔·拜登。他向来不允许自己被任何人忽视或压制，但在此高风险场合，他却显得束手无策，甚至如同愤怒的老家长般，用本应专业、文明的方式，说出了空洞无物的言论，与2020年的他可谓是判若两人。明确地说，这是现任政府竞选活动中的一大败笔，是对其即将出现分歧的预示；\"政治投降\"指控的烫手山芋将重新回到拜登手中，他所面临的压力也在持续攀升。"
 usb.526.a: "他已不复当年之勇。"
 usb.527.t: "2016年的回忆"
 usb.527.d: "桑德斯站在讲台上，双眼闪烁着数十年政治热情所激发的火光。这场辩论对他来说不仅仅是又一场的政治角逐，而是他毕生所致力的进步理想的结晶。2016年，他只能袖手旁观自己的支持者们理想幻灭，自己的主张被排挤无视。而在2024年的如今，政治格局发生了变化，美国似乎已经准备好真正聆听他的声音。拜登在回答问题时磕磕绊绊，显然对辩论所需的快速反应感到吃力，而桑德斯则发现自己回到了青年时代，回到了塑造他世界观的民权运动和劳工斗争时代。每个问题都成为了机会，不仅可以概述他的政策，还可以描绘他一直为之奋斗的美国的愿景。参议员的声音通常粗哑且执着，但现在却有了新的音色。他知道，这可能是他重塑国家航向的最后一次机会。他那双在集会和参议院中长年比划的手，动作精准，每一点都强调得恰到好处。"
 usb.527.a: "孩子们，进步主义回来了！"
 usb.528.t: "一雪12年之耻"
 usb.528.d: "罗姆尼以他的同情心和尊重赢得了大多数辩论评论家和观众的认可；不过，这场辩论对他而言承载着特别的个人意义。2012年，他的竞选搭档、共和党资深成员保罗·瑞安在另一场精心策划的辩论中被乔·拜登彻底击败，那时正值选举周期的关键时刻，瑞安在整场辩论中几乎都无法插话。如今的形势已截然不同；年迈的拜登在辩论中显得力不从心，难以连贯地表达观点，而罗姆尼则以更加优雅从容的姿态，对这位摇摇欲坠的总统展开了猛烈攻势。这场辩论对罗姆尼而言，无疑是对2012年那场挫败的个人复仇；罗姆尼因此感到无比振奋，他终于有机会摆脱作为党内无坚定立场者的束缚，亲自书写美国历史的新篇章。值得注意的是，这场辩论也导致民意调查结果发生了显著变化，拜登的糟糕表现已引起了广泛关注，清理团队已开始行动，试图消除这场辩论带来的负面影响。"
 usb.528.a: "不再受辱"
 usb.74.t: "2024年总统选举辩论"
 usb.74.d: "今天晚上，各大电视台准备开始播放2024年第一场总统候选人辩论。两名参议员和现任总统已经离开了华盛顿特区，前往辛辛那提，无疑是正在最后时刻进行演练准备。博彩市场认为这是一场任何人都可能赢的辩论，尽管一些候选人的赔率可能会更大。各候选人的竞选团队谨慎地管理着公众的期望，引导他们关注某些问题，并集中攻击对手的弱点。\n\n伯尼·桑德斯代表着顽固的进步党。他呼吁追溯到改革时代辉煌日子的遗产，试图说服工人阶级相信他对维护工人生活权益的无可指责的奉献。米特·罗姆尼是美国保守派的堡垒，他以一人之力逆党内反民主浪潮而行，与特朗普主义的凶兽搏杀，和其党内同僚的犹豫不决、为之辩护形成鲜明对比。这些壮举使他赢得了在郊区选民的信任，而更加保守的人也没有其他选择。总统卡马拉·哈里斯则提出了截然不同的论调。她谈及着燃烧的城市、灰烬遍布的战场，以及归乡的遗体，饥饿的难民和他们瘦骨嶙峋的孩子们，语气庄重而深沉。"
 usb.74.a: "我支持她！"
 usb.53.t: "进步人士决裂！"
 usb.53.d: "今日我们得知，政府内部的进步派已正式脱离我们的联盟并组建了自己的政党，即现在的进步党。\n\n随着这一令人不安的消息传来，进步党在过去几分钟里一直在对政府进行批判，指出法律通过效率低下、腐败、蓄意破坏政治对手以及更多问题。他们还批评我们处理战争的方式，称我们在解放美国公民方面行动过于迟缓，并于今日早些时候耗尽了人们的耐心。\n\n无论如何，他们的分裂将对我们不利；这必定会在民众中滋生蔑视，加剧对政府能力的怀疑。"
 usb.53.a: "现代泰迪！"
 usb.54.t: "共和党人离开联盟"
 usb.54.d: "我们今日收到了一则令人不安的消息称联盟中的共和党派已经离开，据推测其部分人员将组建自己的政党，而其他成员要么逃之夭夭，要么已投奔到特朗普麾下的叛军之中。\n\n此前，共和党人一直对我们的政府及其决策持批评态度。他们还主动批判我们的战争方向和战略决策，指责我们是在鼓励以残暴行径对待美利坚宪政政府。而今天，这一切都以他们的离开而告终。\n\n尽管他们在政府期间曾让我们头疼不已，但不可否认的是，我们仍会非常想念他们。他们的离开只会损害我们的声誉，更重要的是，破坏民众对我们的信任。"
 usb.54.a: "叛徒！"

 USB_pacific_war_idea: "太平洋战争"
 USB_pacific_war_idea_desc: "亚洲正陷入战火，而中国正不断浇油助燃。该地区历史上从未爆发过如此毁灭性的战争。城市化为焦土，数百万士兵倒在战场，中国更威胁要永久掌控这片土地。然而随着全知者进驻恢复秩序，中国在该地区或许终于遇到了劲敌。全知者深知这场战争将充满挑战——中国在陆海两栖作战中都展现出强大实力。\n但若要重振秩序，他们必须坚持到底，一劳永逸地斩断龙首。"

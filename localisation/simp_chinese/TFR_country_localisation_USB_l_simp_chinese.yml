 USB_low_corporate_influence_idea: "低企业影响"
 USB_low_corporate_influence_idea_desc: "美国政府对企业的看法一直是又爱又恨。一方面，它们是几乎所有现代政治候选人背后的资助者；另一方面，绝大多数政要都曾信誓旦旦地许下诺言打击资本，但到头来他们只能自食其言，任由那些幕后企业以他们的职业生涯为筹码，控制着国家的一举一动。\n\n对我们而言幸运的是，支持我方政府的企业目前并不强势。拜登更多是凭借其政治资本和党内的反特朗普主义才登上的总统宝座，他所做出的承诺和金融借款比以往要少得多。看来，拜登总统暂时摆脱了资本的束缚。§!\n\n可通过完成国策§Y$USB_a_hand_on_our_shoulder$§!或§Y$USB_nationalize_the_war_effort$§!以移除。"

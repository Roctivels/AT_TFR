 USB_Pfizer_albert_bourla_tt: "§Y阿尔伯特·伯拉§!\n辉瑞公司董事长兼首席执行官\n   £research_speed_texticon 研究速度：§G+5.00%§!"
 USB_Pfizer_albert_bourla_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_albert_bourla_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§Y历史意义：§!\n该对象于1993年加入辉瑞公司，在企业体系内稳步晋升至核心管理层。2018年1月升任首席运营官，同年晚些时候出任首席执行官。作为接受过专业训练的兽医，其曾担任辉瑞全球疫苗、肿瘤及消费者健康业务总裁，主导产品研发与上市工作。\n\n在新冠大流行期间，对象通过协调全球疫苗生产发挥了关键后勤保障作用。在此期间开始与情报人员合作，以获取政府合同并主导疫苗接种政策制定，为《公共卫生安全法》的出台奠定基础。\n\n§Y近期动态：§!\n该对象主导辉瑞公司在强制推行的\"美国关怀\"医疗体系中的扩张计划，协同联邦机构开发部署新一代疫苗平台。在其指挥下，辉瑞已建立将生物特征追踪与强制接种协议相整合的研究设施，同时为行为矫正与社会安抚项目提供药物支持。\n\n定期与全知者智库领导层就生物安全与人口管理议题进行磋商。其在医药物流和公私合作伙伴关系领域的专业经验，对构建《公共卫生安全法》设想的健康安全体系具有重要价值。\n\n§Y早期及个人生活：§!\n该对象1961年出生于希腊塞萨洛尼基的塞法迪犹太家庭。持有亚里士多德大学兽医学院生物技术与繁殖博士学位。与配偶迈瑞姆·阿尔查纳蒂育有两名子女，现于希腊哈尔基迪基保有夏季庄园。§!"

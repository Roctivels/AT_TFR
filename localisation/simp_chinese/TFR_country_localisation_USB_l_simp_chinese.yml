 USB_babel_russia_tt: "§1死亡§!"
 USB_babel_russia_tt_delayed: "语言以万千形态存在。\n言语、舞蹈、艺术、音乐。你就在看。\n\n语言定义我们之所以为我们。\n如同维系生命的器官，\n如同令人成瘾的毒品。\n\n若将其剥夺，温顺的羊群会开始互相撕咬。\n孩子们啜泣，母亲却辨认不出泪水的含义。\n父亲们渴望，却不知自己在渴求什么。\n灵魂深处空洞蔓延，侵蚀着他们的心智。\n\n空鼻刺痛无药可医，失去重要之物的感觉如影随形。\n打断鼻子病痛累加，外来的液体代替不了鼻腔黏液。\n文字失去意义，连嘶吼也显得苍白无力。\n\n面对不可理解之物，人们恐惧。\n面对不可理解之物，人们互害。\n智者失去智慧，\n狂徒反成寻常。\n\n眼见轮廓模糊，可又无从认知。理解的能力已被剥夺。\n沉沦在这个曾经熟悉的世界里，\n痛彻心扉。\n\n高塔正在崩塌。"
 USB_babel_china_tt: "§1死亡§!"
 USB_babel_china_tt_delayed: "语言以万千形态存在。\n言语、舞蹈、艺术、音乐。你就在看。\n\n语言定义我们之所以为我们。\n如同维系生命的器官，\n如同令人成瘾的毒品。\n\n若将其剥夺，温顺的羊群会开始互相撕咬。\n孩子们啜泣，母亲却辨认不出泪水的含义。\n父亲们渴望，却不知自己在渴求什么。\n灵魂深处空洞蔓延，侵蚀着他们的心智。\n\n空鼻刺痛无药可医，失去重要之物的感觉如影随形。\n打断鼻子病痛累加，外来的液体代替不了鼻腔黏液。\n文字失去意义，连嘶吼也显得苍白无力。\n\n面对不可理解之物，人们恐惧。\n面对不可理解之物，人们互害。\n智者失去智慧，\n狂徒反成寻常。\n\n眼见轮廓模糊，可又无从认知。理解的能力已被剥夺。\n沉沦在这个曾经熟悉的世界里，\n痛彻心扉。\n\n高塔正在崩塌。"

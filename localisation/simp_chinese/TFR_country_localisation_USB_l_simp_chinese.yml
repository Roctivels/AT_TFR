 USB_trump_ward: "\"阿喀琉斯\"行动区"
 USB_trump_ward_desc: "\n§Y区长：§!\n\n\n\n\n\n\n\n\n\n£GFX_robert_abrams_Portrait\n\n\n\n\n\n\n\n§W    罗伯特·B·艾布拉姆斯§!\n\n\n由前特朗普叛乱团伙所管辖的领地构成，§5\"阿喀琉斯\"行动区§!的主要任务是恢复秩序并平叛特朗普党羽，次要任务是寻找最高效的方案去压制不同政见者。"
 USB_western_ward: "\"奥德修斯\"行动区"
 USB_western_ward_desc: "\n§Y区长：§!\n\n\n\n\n\n\n\n\n\n£GFX_kenneth_tovo_Portrait\n\n\n\n\n\n\n\n§W        肯尼思·托沃§!\n\n\n由前加利福尼亚州、犹他州、俄勒冈州、华盛顿州、亚利桑那州、爱达荷州以及内华达州构成，§5\"奥德修斯\"行动区§!的首要任务是寻找最高效的方案去恢复美国海军往日荣光。"
 USB_home_ward: "\"卡利古拉\"行动区"
 USB_home_ward_desc: "\n§Y区长：§!\n\n\n\n\n\n\n\n\n\n£GFX_joseph_biden_Portrait\n\n\n\n\n\n\n\n§W          乔·拜登§!\n\n\n由拜登效忠派管辖的州构成，§5\"卡利古拉\"行动区§!的首要任务是向其他地区展现忠于新美国所能获得的奖赏。"
 USB_southern_ward: "\"阿贾克斯\"行动区"
 USB_southern_ward_desc: "\n§Y区长：§!\n\n\n\n\n\n\n\n\n\n£GFX_paul_lacamera_Portrait\n\n\n\n\n\n\n\n§W       保罗·拉卡梅拉§!\n\n\n由前阿肯色州、得克萨斯州、新墨西哥州、路易斯安那州、田纳西州、密西西比州、佛罗里达州、亚拉巴马州、南卡罗莱纳州以及佐治亚州构成，§5\"阿贾克斯\"行动区§!的首要任务是通过运用战俘工人农业综合体让该地区成为美国的新面包篮。"
 USB_michigan_ward: "\"赫克托\"行动区"
 USB_michigan_ward_desc: "\n§Y区长：§!\n\n\n\n\n\n\n\n\n\n£GFX_lloyd_austin_Portrait\n\n\n\n\n\n\n\n§W       劳埃德·奥斯汀§!\n\n\n由前密歇根州构成，§5\"赫克托\"行动区§!的主要任务是通过公开羞辱、大规模处决以及计划性的对国家进行去纳粹化，并允许民族社会主义运动成员以在§5\"阿喀琉斯\"行动区§!服役为条件换取大赦。"
 USB_northeastern_ward: "\"忒修斯\"行动区"
 USB_northeastern_ward_desc: "\n§Y区长：§!\n\n\n\n\n\n\n\n\n\n£GFX_terrence_shaughnessy_Portrait\n\n\n\n\n\n\n\n§W        谭·奥肖内西§!\n\n\n由前新英格兰州构成，§5\"忒修斯\"行动区§!的首要任务是掌握先进科学技术，并使之成为未来§Y大都市计划§!的核心。"
 USB_canadian_ward: "\"普罗米修斯\"行动区"
 USB_canadian_ward_desc: "\n§Y区长：§!\n\n\n\n\n\n\n\n\n\n£GFX_charles_chiarotti_Portrait\n\n\n\n\n\n\n\n§W      查尔斯·齐亚罗蒂§!\n\n\n由失去的加拿大殖民地构成，§5\"普罗米修斯\"行动区§!的主要任务是从加拿大农村大规模开采资源，同时在蒙特利尔、温哥华和安大略省等城市引入§Y大都市计划§!。"
 USB_denied_corp_tt: "如果我们有两次谈判，§R拒绝§!了这些要求。那他们会§R站在反对建制派的一边。§!"
 USB_biden_puppet_tt: "\n\n拜登总统不仅结束了第一个任期，而且还再次当选。全国人民都知道他的精神有点问题。因此，重大事项实际由他的内阁决定，台面上的老人只是个傀儡。\n\n\n\n\n£GFX_USB_biden_good_1_banner\n\n\n\n\n\n"

 USB_the_blood_dynamic: "巨型企业集团"
 USB_the_blood_dynamic_desc: "当第二次美国内战爆发时，某些企业并未仓皇逃窜，反而嗅到了暴利的契机——这些公司迅速吞并了所有能买到的资产。无论是果腹的食物、安身的房产还是救命的药品，这些企业很快膨胀为经济巨兽。\n如今它们以\"血脉\"之名融入全知者，这些超级企业正是维系深层政府对美国经济命脉掌控的爪牙。随着黑石集团大肆收购地产，辉瑞与拜耳-孟山都垄断医药农业，普通民众的日常生活已完全受制于这些巨头。更甚者，垄断带来的饕餮利润正不断滋养着全知者的野心计划。"
 USB_the_body_dynamic: "智能团体"
 USB_the_body_dynamic_desc: "正如血脉与头脑需要躯干来维系，若没有情报界的指引，这些企业巨头与军工复合体也将无所适从。\n作为全知者的\"躯干\"，情报机构始终警惕着燎原之火的蔓延，为最坏局面筹划着层层预案。若非他们及时扶植起与丹佛特朗普势力抗衡的平行拜登政府，联邦体系早已彻底崩溃。当华盛顿政府的软弱性暴露无遗之际，正是情报界力挽狂澜，阻止美国陷入军事无政府状态。如今国家机器既已牢牢掌控在手，他们必将再度为世界带来秩序。任何折中方案都不被容许。"
 USB_the_mind_dynamic: "军工复合体"
 USB_the_mind_dynamic_desc: "军工复合体曾是深层政府最关键的臂膀之一，始终确保美军装备精良以剿灭一切威胁。然而内战爆发后，美国的枪口转向内部，军工体系也随之陷入与整个国家同样的混沌。但随着全知者掌权，这只浴火凤凰已从废墟中重生。\n\n作为全知者的\"头脑\"，军工复合体不仅为国家安全机关的士兵们提供充足的弹药装备，更驱动着技术霸权的齿轮。通过DARPA的卓越才智，\"头脑\"为深层政府带来了超乎预期的科技飞跃，国防工业也由此获得充沛资金反哺。当全知者的目光转向境外时，这种共生关系必将愈发紧密。"

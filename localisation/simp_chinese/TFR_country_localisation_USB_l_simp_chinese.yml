 USB_megapolis_category_desc: "\n\n\n\n\n£GFX_USB_megapolis_picture\n\n\n\n\n\n\n\n可用废料：£scrap [?USB_city_scrap_var]\n\n美国人民在纽约和洛杉矶这样的城市里繁荣发展。我们因共性而团结一致，才能最好地实现美国梦。那么，还有什么比近距离生活更能创造共性呢？"

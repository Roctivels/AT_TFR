 USG_purification_administration_desc: "\n\n\n\n£GFX_Ideology_dark_maga\n\n\n\n\n\n美国人民曾拥有一位弥赛亚——他以房地产巨子的形象降临凡世，永远佩戴着那条鲜红的领带，引领国家走向前所未有的辉煌巅峰。然而，最终，这位救星被全球主义阴谋与体制内的阴谋家所背叛与击败，致使他未能实现那最后的宏伟使命。\n\n如今，这片大地正饱受年迈且失智的暴君蹂躏，试图摧毁我们金发英雄的伟大遗产。然而，那非凡领袖的愿景在巴伦·特朗普的带领下依然屹立不倒。作为伟大唐纳德·特朗普的子嗣，他的遗产将一代代传承，直至有朝一日我们终将推翻乔·拜登和他那恶毒的势力，这份遗产将光耀永世，长存不朽。"

 USB_evidence_locker_text: "证物封存库：[?USB_obtain_evidence_var]/6"
 USB_evidence1_text: "证据I"
 USB_evidence1_loc: "§L[USB_evidence1_scripted_loc]§!"
 USB_evidence1_loc1: "§Y捣毁极端组织§!\n\n波士顿针对某疑似\"反社会团伙\"的突击行动成功抓获其成员。缴获装备包括军用级加密无线电设备、详细绘制的国土安全部拘留设施图纸，以及一份从执法部门内部数据库获取的安全屋清单。经查，该团伙成员均具有军事或执法背景。审讯中他们供认，所有情报与装备均由一名联络人提供，此人承诺协助他们\"对抗真正的敌人\"。"
 USB_evidence1_loc2: "§Y卫星遥测数据遭窃§!\n\n犹他州沙漠深处军事基地建设工程的卫星遥测网络遭人非法植入微型窃取程序。被截流的数据并未传往境外，而是输送至弗吉尼亚州费尔法克斯某空壳公司名下的服务器群。"
 USB_evidence1_loc3: "§Y资金去向不明§!\n\n一笔从科研经费中拨付的巨额款项不翼而飞。经追踪，该笔资金被转移至一家设在巴拿马的空壳有限责任公司。资金流转过程经过多重代理渠道，其手法与全知者的惯用伎俩如出一辙。"
 USB_evidence1_loc4: "§Y数据泄露§!\n\n检测到非法访问美国能源部内部数据库的企图，目标直指国家电网关键信息。入侵者试图获取重点核电站及其安全协议的相关数据。此次攻击已被成功拦截，经溯源发现攻击源位于华盛顿特区的服务器，攻击者使用了多重代理通道掩盖真实来源。"
 USB_evidence1_loc5: "§Y勒索企图§!\n\n数名政府官员相继收到夹带其个人生活敏感资料的信件与包裹，附言威胁称若相关官员不满足要求，这些信息将被泄露给反社会团体。"
 USB_evidence1_loc6: "§Y抹黑行动§!\n\n针对数名官员的小规模网络骚扰活动正在发酵，攻击者利用AI生成的图像与视频破坏目标官员声誉。最值得关注的是有大量网络水军账号参与此次抹黑行动，其源头很可能位于亚洲地区。"
 USB_evidence2_text: "证据II"
 USB_evidence2_loc: "§L[USB_evidence2_scripted_loc]§!"
 USB_evidence3_text: "证据III"
 USB_evidence3_loc: "§L[USB_evidence3_scripted_loc]§!"
 USB_evidence3_loc1: "§Y情报网络遭干扰§!\n\n五眼联盟情报共同体于单日内多次收到美国即将发动核袭击的虚假警报。幕后操纵者通过精心设计的官僚程序迷宫掩盖了原始发件人踪迹。此类制造\"警报疲劳\"的行径，可能暗示着叛徒与外国情报机构存在勾连。"
 USB_evidence3_loc2: "§Y狼群行动§!\n\n有人试图突破美国网络安全防火墙，向国际媒体泄露数十起独狼式恐怖袭击与美国安全部门存在关联的机密信息。若这些文件曝光，或将牵连多个参与相关行动的美国政府机构。入侵者可能使用了军用级别的设备及软件。"
 USB_evidence3_loc3: "§Y拂晓突击§!\n\n由联邦调查局、烟酒枪炮及爆炸物管理局与移民海关执法局组成的多支突击队，以打击反社会分子为名，收到了针对全国关键科学与情报专家的虚假处决令。行动策划者显然深谙全知者内部体系的运作流程。所幸中央情报局特别行动组人员成功阻止了这场暗杀行动。"
 USB_evidence3_loc4: "§Y隧道尽头§!\n\n中央情报局特别行动组突击搜查了美墨边境一条老旧隧道。该隧道早前被国土安全部标记为待摧毁目标，却始终未被处理，且近期存在不明人员的活动痕迹。目前正在展开深入调查。"
 USB_evidence3_loc5: "§Y可疑调阅§!\n\n通过一条陈旧停用的执法渠道，有人以秘密方式提交申请，要求调取伯恩斯局长早年任职局内的完整未删节人事档案与心理评估报告。"
 USB_evidence3_loc6: "§Y伊斯坦布尔密件§!\n\n一个加密数据包从安全服务器传输至伊斯坦布尔的匿名死信箱，内含详细记录内战期间中情局与极右翼组织勾结的交叉索引案卷。该数据包来自使用代号\"埃德加\"的匿名发送者。"
 USB_evidence3_loc7: "§Y未经授权的人员调动§!\n\n过去一个月内，美国疾控中心三名高级研究员、联邦应急管理局两名基层文员以及移民海关执法局拘留中心的十余名中层看守相继失踪。这些人员均凭借伪造的调职令完成离职手续，而调令所使用的审批流程竟完美符合各机构的内部规范，作案者想必深谙体制的运作机制。"
 USB_evidence3_loc8: "§Y匿名捐赠§!\n\n一系列流向某天主教背景\"被不当解雇联邦雇员\"援助基金的匿名捐款，经追查均来自复杂的加密货币交易链。首个钱包激活密钥经破译后，显示为《马太福音》16:26经文：\"人若赚得全世界，赔上自己的生命，有什么益处呢？\""
 USB_evidence3_loc9: "§Y玩忽职守的医生§!\n\n调查发现，部分设施缺少药品、手术器械及医疗设备等物资。这些物资大多用于救治伤员与在押人员，但其中部分设备亦被用于强化审讯。"
 USB_evidence3_loc10: "§Y老大哥§!\n\n中情局内部安全人员发现多个政府建筑内存在未经授权的监控设备，包括隐蔽摄像头、窃听器、运动传感器等，这些设备均在楼宇翻新期间被安装。其设备规格与质量同中情局监控项目所用装备完全吻合。"
 USB_evidence3_loc11: "§Y虚假身份§!\n\n在“美利坚”疫苗接种公民数据库中，大量记录被证实为伪造身份。这些虚假身份被用于虚增对平民实施生物特征追踪的成功率。\n深入调查显示，由于此类造假行为，大量重点监控对象得以漏网，目前已无追踪手段。"
 USB_evidence4_text: "证据IV"
 USB_evidence4_loc: "§L[USB_evidence4_scripted_loc]§!"
 USB_evidence5_text: "证据V"
 USB_evidence5_loc: "L[USB_evidence5_scripted_loc]§!"
 USB_evidence5_loc1: "§Y幽灵服务器§!\n\n经过对代理通道的全面查封，可疑查询最终被追溯至弗吉尼亚州麦克莱恩的一台安全服务器。这些查询内容涉及《公共卫生安全法》框架下关于私人财产的征用法律与联邦查扣程序。"
 USB_evidence5_loc2: "§Y秘密研究§!\n\n一项关于强制接种疫苗中微芯片组件对神经系统长期影响的秘密研究，在未获任何主管领导批准的情况下擅自启动。该研究的初步结果表明芯片可能导致受试者暗示感受性增强及情绪反应抑制，相关数据似乎正被收集准备向媒体进行可控泄露。"
 USB_evidence5_loc3: "§Y武器藏匿点§!\n\n中央情报局特别行动组查获一处车库，内部藏有大量登记在册的枪械，这批武器此前从德克萨斯州某政府仓库离奇失踪。后院发现了部分焚毁的司法部文件残骸。"
 USB_evidence5_loc4: "§Y特别速递§!\n\n一批可疑的建筑设备从丹佛机场运抵科罗拉多国民警卫队空军基地。这些设备的规模明显超出了官方宣称的\"机库翻新工程\"所需。"
 USB_evidence5_loc5: "§Y致命注射§!\n\n密歇根州政府系统记录到数十起突发异常死亡案例。专项调查组确认所有死者均因接种了日前运抵某医疗中心的受污染疫苗加强针所致，此举旨在破坏疫苗接种计划及民众对政府的信任。该批次疫苗已全部查扣，相关事故信息遭到封锁。"
 USB_evidence5_loc6: "§Y黑色站点袭击§!\n\n​有关反社会分子袭击黑色站点的报道已传遍全国。这些站点专用于监视，并已整合了最新的系统，是美国网络与Maven项目的一部分。"
 USB_evidence5_loc7: "§Y人口贩运§!\n\n美墨边境数处拘留设施中至少有十余名在押人员离奇失踪。深入调查显示，这些人员均遭掳掠挪作私用。"
 USB_evidence6_text: "证据VI"
 USB_evidence6_loc: "§L[USB_evidence6_scripted_loc]§!"
 USB_evidence6_loc1: "§Y六号部门§!\n\n成立于内战爆发后数月的马里兰州一家丰田汽车经销商被查出用于洗钱活动；经深入调查，中央情报局已接管此案：其中一条交易相关讯息内含加密内容，涉及网络司令部根据《第二爱国者法案》使用的关键人工智能技术。"
 USB_evidence6_loc2: "§Y红十月号§!\n\n太平洋海域声纳浮标监测到中国人民解放军海军周级潜艇在坐标南纬5°41'06\"、西经102°53'03\"处定期停泊。监视数据显示该潜艇正朝迈阿密方向收发讯息。美国印太司令部表示对此事件毫不知情。"
 USB_evidence6_loc3: "§Y核设施密钥卡§!\n\n一处低级别核储存设施的密钥卡在库存清点中失踪，此类设施全国共有数十个。此前曾有以联邦调查局名义提交的调取申请，声称用于例行检查，但该检查从未执行。"
 USB_evidence6_loc4: "§Y截获密电§!\n\n中情局无线电侦听小组截获从华盛顿特区东北部发出的加密讯号，具体发信地址仍在定位中。经部分破译发现其中使用\"斯达比中士\"与\"十号兄弟\"的呼叫代号，其余内容采用未知密码编写，目前仍在破译中。"
 USB_evidence6_loc5: "§Y秘密实验室§!\n\n中情局特别行动组在曼哈顿地下已废弃的地铁站内查封一处秘密实验室。该实验室不仅配备了从疾控中心盗取的设备，更有一批被报\"失踪\"的研究人员。所有人员在接受审讯前均已自自尽身亡。实验台上散落着未完成的研究报告，详述逆转生物特征追踪流程的方法，旁边搁着一串磨损的念珠。"
 USB_evidence6_loc6: "§Y危险环境§!\n\n中情局空中侦察机在怀俄明州中部\"失落溪项目\"以北区域发现未经授权的活动。地面部队随后查获一处地下挖掘设施、无标识卡车，以及数百名被拘留在联邦应急管理署营地、原定运往附近煤矿的人员。指挥系统人员无一生擒。"
 USB_evidence6_loc7: "§Y卫生日§!\n\n金斯湾潜艇基地所有非必要人员被强制要求离岗，接受医疗检查、疫苗接种及基地卫生检疫，理由是防范生物/化学恐怖主义威胁。此次检疫要求是通过与大型制药公司有关的渠道提出的。"
 USB_evidence6_loc8: "§Y捉迷藏§!\n\n中央情报局在蒂华纳港突击取缔某贩毒集团非法行动，截获一艘刚从圣迭戈抵达的货轮：除武器毒品外，特勤人员更查获具有异常辐射强度的集装箱。经对俘虏采用强化审讯手段，最终查明其利用海岸警卫队防区盲点跨境走私的事实。该活动被造假记录为美墨边境联邦应急管理署营地的运输行为，实际这些营地从未参与其中。"
 USB_fire_advisor_loc: "目标：§Y[USB_fire_window_scripted_loc]§!\n      控告叛国？"
 USB_100_pp_tt: "£pol_power §Y100§!"
 USB_wef_tt: "§R热血§!"
 USB_wef_delayed_tt: "§L在全知者的架构中，巨型企业代表着该国最具实力的商业利益集团，也是该集团企业派系中最具影响力的成员。这些企业在世界经济论坛的指导下运作，对维持现状有着既得利益，并将不择手段地保持当前格局。作为全知者权力体系的中流砥柱，它们随时准备动用庞大资源碾碎任何威胁现状的存在。\n\n通过向黑色预算提供相对小额的非公开资金，这些商业巨鳄在为美国持续安全做出贡献的同时，也获得了诸多特权回报。只要它们与全知者的议程保持步调一致，就能持续收割深层政府影响力带来的红利。因此，在继续为统治集团提供维持现状所需的资金、资源和技术支持的前提下，这些企业被赋予了自由运作的特权。它们是全知者的命脉所在，其持续支持对这个秘密集团的存续至关重要。\n\n当然，若选择不配合，这些企业将面临被统治集团封杀甚至更严重的后果。正因如此，它们深谙保持与秘密集团良好关系的重要性，并愿意为推进美国利益、维护全知者统治地位付出任何代价。这些被深层政府收买的企业，将毫不犹豫地动用其庞大资源来推动秘密议程并保障自身利益。未来属于它们，任何阻碍都将被无情清除。§!"
 USB_cia_tt: "§O躯壳§!"
 USB_cia_delayed_tt: "§L若无安全官僚集团，便无全知者的存在。正是中情局、联邦调查局、烟酒枪炮管理局与国家安全局的暗中运作，使得这场影子政变成为可能；也正是他们的不懈努力，让深层政府得以彻底掌控权力。情报机构既是全知者权力的支柱，亦是其看门犬，确保阴谋集团的其他成员服从他们为美国未来设计的蓝图。\n\n这些机构对维护秩序有着根深蒂固的利益诉求，他们不惜采取极端手段来捍卫自身权势。作为全球最神秘莫测的组织，他们毫不畏惧动用庞大资源与人脉达成目的。通过影子军团，他们成为了全知者的耳目，既搜集可能威胁集团统治的情报，又确保在隐患成形前将其铲除。\n\n眼线遍布美国社会各阶层：从政府要地到企业精英核心圈，乃至市井民间。警察、维修工、教师甚至流浪汉中皆有暗桩。许多人根本意识不到自己在为三字母机构效力，他们或因一笔适时出现的小钱、一份施舍、甚至一杯咖啡时的闲聊，就踏上了\"举报可疑活动\"的道路。无论手段如何，这张情报网络无远弗届，其影响力渗透至国土每个角落。\n\n情报机构永远在暗处窥视，随时准备扑杀任何胆敢挑战全知者权威之人。他们就是这副躯体的血肉，就是这颗跳动的心脏。但凡出现威胁集团统治或美国未来构想的苗头，他们定会毫不犹豫地予以清除。§!"
 USB_darpa_tt: "§C意志§!"
 USB_darpa_delayed_tt: "§L军工复合体是全知者的中枢神经，他们在阴谋集团权力架构中的职责是维持战争机器运转，确保美国军事实力始终主导国际事务。凭借雄厚财力与政治游说，他们能让五角大楼对其议程言听计从，保证美军永远保持全球最强战力与顶尖科技。作为回报，阴谋集团为其提供利润丰厚的国防合同、尖端技术准入特权以及近乎不受监管的操作自由。\n\n这个集团同时充当着深层政府的智库，为维持秩序提供必需的军事科技支持。他们研发的武器技术巩固着统治集团的权力，制定的战略战术则帮助压制反对势力。\n\n除武装军队外，他们还为情报机构开发新系统，在人工智能等前沿领域不断突破，将国家安全局的监控天网提升至新高度。假以时日，预测算法或能实现犯罪预判，打造近乎零犯罪的完美社会。\n\n这些发明落入统治集团手中会催生何种后果，光是设想就令人不寒而栗。§!"

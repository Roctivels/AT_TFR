 usb.100.a: "这只是开始。"
 usb.101.t: "卡马拉·哈里斯成为头号女强人"
 usb.101.d: "来源：Vox\n作者：亚当·贾拉特\n\n《卡玛拉·哈里斯如何成为美国\"头号女强人\"副总统》\n\n在一场公平且引人注目的选举后，拜登-哈里斯组合迅速在全美范围内赢得了人气。总统的传统魅力与副总统的敏捷反应和果敢态度，使他们在Reddit和Tumblr等网站上被称为\"美国的最佳希望\"。\n\n然而，哈里斯显然已经在某些领域超越了她的资深搭档。她不仅在女性和少数族裔支持率调查中名列前茅，甚至普通白人男性也逐渐适应并欣赏她的机智和出色表现。一些人甚至成立了一个名为\"白人兄弟支持哈里斯\"的组织，显然是在为她2028年的总统竞选做准备。（……）\n\n尽管当前的美国正经历艰难时期，但新一代政客的出现或许能够将我们从阴霾中拯救出来。像卡玛拉·哈里斯这样既是进步与包容的象征，又能将选民及其困境放在首位的优秀政治家，正在逐步取代那些陈旧的前任领导者。随着他们的崛起，我们将告别特朗普时代的仇恨与偏见政治。\n\n让我们一起期盼美好的未来。用哈里斯副总统自己的话来说：\"我母亲经常——她有时会批评我们，她会对我们说，‘我真不明白你们这些年轻人到底怎么了，你们以为自己是从椰子树上掉下来的？’\""
 usb.101.a: "她黑她勇她敢说！"
 usb.102.t: "伯尼占领Twitch"
 usb.102.d: "来源：Polygon\n作者：安娜·迪兹努兹\n\n《伯尼·桑德斯参加Twitch直播，与年轻选民互动引热议》\n\n美国参议员伯尼·桑德斯近日参加了一场与Twitch上极受欢迎的主播共同举办的直播活动。这场活动不仅让桑德斯有机会谈论美国及其年轻一代面临的诸多问题，还就学生债务危机、各州的困境、企业游说对普通公民的压迫以及医疗系统缺乏有效性等话题展开了深入探讨。在这场直播中，观众还惊喜地看到了其他\"进步派\"议员如AOC（亚历山大·奥卡西奥-科尔特斯）和伊尔汗·奥马尔的加入。但最令人难忘的时刻莫过于议员们教桑德斯了解虚拟主播（Vtuber）的有趣场景。（……）\n\n观看直播的在线用户表示，这是一段积极的体验，帮助他们更好地了解了这位美国最左翼的参议员之一。尽管伯尼对现代科技和游戏感到些许困惑，但观众认为他的观点非常重要。一些评论者甚至表示，桑德斯的解释让他们更好地理解了自己的处境。\n\n而更成熟的媒体则指出，这显然是桑德斯为吸引更多年轻选民而采取的策略。预计未来，桑德斯可能会更多地出现在以年轻人为主的互联网平台上，比如播客？"
 usb.102.a: "五刀留言弹幕-\"感受伯尼！\""
 usb.103.t: "媒体指责罗姆尼是‘罗姆山羊’！"
 usb.103.d: "来源：个人博客\n作者：杰特·穆迪克\n\n《米特·罗姆尼的年轻选民互动新尝试》\n\n米特·罗姆尼无疑是美国政坛最聪明的政治家之一。然而，自由派媒体却总以\"古怪\"一词形容他，不如把这种批评留给特朗普及其支持者吧！（……）\n\n事情的起因是一场\"热狗日\"庆祝活动后，罗姆尼决定与年轻选民互动。他选择参加了一场名为\"Furrycon\"的热门活动。然而，他可能最初以为这是一个\"动物展览\"，却没料到现场是人们装扮成各种动物的场景。\n\n与民主党媒体的报道不同，当罗姆尼了解到活动的真正意义时，他并未失态，反而积极与潜在选民互动。他还特别提到，一位\"穿着蓝鸟服装\"的厨师制作的热狗\"非常美味\"，这段经历也出现在他的Instagram上。\n\n他在社交媒体上发布了活动照片，并在最后一张图片中竖起大拇指，与扮成卡通人形动物的参与者合影。在配文中，他表示活动既有趣又充满意义，尤其赞扬了设有HIV检测室的主办方，称其\"像好撒玛利亚人一样关怀\"。\n\n稍后，他又发布了一张自己喝巧克力牛奶的照片，并附上文字：\"辛苦但非常有收获的一天，现在是享用一杯巧克力牛奶的最佳时刻。\""
 usb.103.a: "他与大鸟冰释前嫌"
 usb.104.t: "黎明的曙光"
 usb.104.d: "来源：VICE\n作者：维罗妮卡·斯坦曼，编辑：贾里德·谢伊斯基\n\n《爱与胜利的见证：在纽约街头感受新生的美国》\n\n我伫立在时报广场，四周人潮涌动，数以千计的人群汇聚在一起，有坚定的活动家，也有平凡的市民，大家用心聆听庆祝联邦胜利的演讲。这是我们的胜利，是美国的胜利。这一刻，如狂风骤雨般的情感冲刷着我的内心，从未有过的激荡。纵使经历了难以言喻的失落、无情、仇恨与偏见，我们的国家依然屹立不倒，我们的未来也迎来了曙光。\n\n距离那场冲突结束的正式声明，仅仅过去了短短几日。然而，当我漫步于纽约街头，筹备庆典时，我已经可以清晰地感受到改变的气息。人们脸上溢满了喜悦，谈话变得轻松自然，欢欣的氛围如晨曦洒满每个角落。\n\n起初的那些时光是黑暗的，那种黑暗仿佛吞噬一切。一切都变得不真实，痛苦深刻得无法言表。许多读者或许能感同身受。我们珍爱的一切——我们的生活、至亲至爱的人以及我们作为个体存在的意义——都岌岌可危。\n\n\"我流下了喜悦的眼泪，\"一位女权活动家在活动中对我说道，\"我们终于可以昂首向前，再也不需要回头。\"我认同她的每一句话。这是一个痛彻心扉的过程，但也是必须经历的。我们已经从历史与社会中清除了偏见与仇恨的毒瘤。今日的美国挣脱了过去的枷锁，就像许多人对我说的那样：\"博爱胜利了。\"\n\n此刻，我们得以再次相拥、欢笑，无论你的信仰、思想或党派如何。\n我们再次成为一个整体，成为美国的一员，我们将重新学会彼此珍爱。"
 usb.104.a: "世纪新秩序"
 usb.105.t: "第2020c号报告"
 usb.105.d: "联邦调查局\n\n事由：叛乱活动持续升级\n\n西弗吉尼亚州首次出现叛乱活动以来，境内反联邦武装势力已扩张至最初规模的2-3倍。恐怖分子正走出山区，试图控制森林地带与小型村落，并在流窜过程中不断扩充人员。\n\n最新情报显示，叛乱分子正从非法丹佛政府获得大量援助，并赢得当地民众同情，使其势力范围持续扩大，并能获取更具威胁性的武器装备。\n\n若不及早采取果断措施遏制其发展，局势恐将彻底失控，给联邦政府带来灾难性后果。"
 usb.105.a: "合众为一"
 usb.106.t: "第2088d号报告"
 usb.106.d: "国家安全局\n\n事由：叛乱活动进入危急阶段\n\n特朗普主义叛乱已从地方破坏与袭击升级为针对华盛顿特区的全面游击战争。农村居民正大规模投奔恐怖分子，致使敌方在我后方战场形成整编旅级作战单位，对我方后勤体系与官兵士气造成重创。\n\n部分郡县地方执法体系已全面崩溃，多数地区亟需联邦政府立即介入。现行应对措施已被证明完全不足以控制局势。\n\n若再不加大打击反社会势力的力度，叛军的下一个目标或将指向芝加哥、印第安纳波利斯等主要城市，甚至直指华盛顿特区。"
 usb.106.a: "保卫国家，守护未来。"
 usb.107.t: "特区遇袭"
 usb.107.d: "联邦首都成为叛军目标本就在所难免。\n然而人们先前始终认为肇事者无外乎爱国者阵线，或是宪政政府。\n\n若果真如此，事件后果或许远不至于如此惨烈。\n\n傍晚时分，数辆涂满污言秽语、撒旦崇拜与纳粹标志的黑色货车冲上人行道碾压行人。国民警卫队立即进入高度戒备状态实施围堵，迫使袭击车辆在全城流窜。其中一辆在市中心特区被截停时，至少十余名身着核武之师组织标志性装束的武装分子冲出车厢，火力全开强行闯入购物中心。\n袭击者携带二元化学武器并在人群中进行无差别部署，力求最大限度制造伤亡。其余袭击车辆亦在城区各繁华地段如法炮制，实施同等规模的毁灭性攻击。\n\n与此同时，林肯纪念堂等多处地标性建筑相继发生爆炸。除常规爆炸装置外，部分炸弹释放出沙林毒气等化学战剂，令这场灾难雪上加霜。\n四小时后，安全部队以致命武力歼灭全部恐怖分子。此时死亡人数已逾数百，伤者更以千计。核武之师组织宣称对事件全面负责，并将此次袭击作为宣传素材。\n\n这不仅是美国本土最致命的恐怖袭击事件之一，更使国家安保体系遭受严峻质疑。情报官员坦言受内战拖累资源捉襟见肘，应对能力受限。\n\n事件余波将持续震荡多年。当遇难者家属沉浸于悲痛之时，公众对安全感的渴求与对新一轮袭击的恐惧正相互交织，不断侵蚀着社会信心。"
 usb.107.a: "双目圆睁，清明如炬……"
 nss.0.t: "特工入场"
 nss.0.d: "华盛顿特区遇袭事件在联邦境内引发剧烈震荡。从州政府官员到高级军官乃至联邦代表，众多关键人物对联邦及其保护公民的能力丧失信心。\n\n各地失联报告如潮水般涌向官方渠道，叛乱组织愈发猖獗，军事单位频频擅离职守。\n这实质上标志着联邦政府的崩溃，唯余最忠实的支持者仍在坚守。\n美国情报界已迅速采取行动，巩固其对忠诚辖区的控制权，将一切境外势力打上分离主义、恐怖分子或叛国者的烙印，进一步强化对政府的掌控。\n\n经总统授权，交战规则已被放宽以维系联邦存续，阻止敌对势力在沦陷区建立据点。\n成败在此一举。我们虽迎来了重振美利坚合众国秩序的真正契机，却也面临着前所未有的风险：一旦失手，便将坠入万劫不复的深渊。\n\n国家重建之路方才启程。"
 nss.0.a: "柱石倾颓，非在旦夕之间。"
 nss.1.t: "安抚无知者"
 nss.1.d: "美利坚非由乌合之众所建，乃由恪守信念的少数精英缔造，正是他们点燃了文明的火光。\n\n受情绪驱使的理想注定无法持久。法国大革命最终自噬其躯，正是因正统权力重新约束了那些撕裂国家的狂徒，让开明的少数精英引领大众渡过乱世，始终是清醒的抉择。\n\n秩序从不屈从于庸众的异议，国会不过是随混乱狂舞的肢节。\n他们早已对我们的纲领极度不安，声称正在侵蚀他们认知中的美国，但难道不正是我们让秩序之旗插遍全球？\n\n国会已显溃烂之态，故需断肢求生。\n自然不宜公开行事。\n\n只需在耳畔注入恰当低语，对其家事稍施压力，他们自当缄默。\n那些出头鸟将被列为反社会观点高危人群予以监控，假以时日，他们自会学会在注视下谨言慎行。"
 nss.1.a: "蒙其目则喑其声。"
 nss.2.t: "美国归来"
 nss.2.d: "星条旗下重归一统的美利坚合众国，终归其天命所归之位。\n\n今日，我们缅怀为理想献身的勇士。启蒙之光岂能不流血捍卫？这场内战不过是为昔日过错偿付的沉重代价。\n我们曾犯下太多错误，那些被忽视的、被掩埋的，最终都酿成了这场吞噬自身的暴力漩涡，全世界正为此付出代价。\n\n我们的缺席已然证明：美国本是维系世界稳定、安全与秩序的支柱之一。惨痛教训铭刻于心，同样错误永不再犯。\n\n集结专家、老兵与开明之士，我们重塑破碎的国度。\n修建美利坚的灵魂，直至其再无法自燃。\n内战让我们沉眠，醒来时世界已失却我们的庇护。腐蚀性意识形态与暴烈的情绪成为新主宰，如同没有远见的野兽。\n世界现状与我们无关，世界未来方为要义。\n\n且让他们在泥潭中再嬉闹片刻；我们的布局早已启动。\n美利坚合众国，归来。"
 nss.2.a: "第三选项已被选择。"
 nss.3.t: "秩序重归美国"
 nss.3.d: "第二次美国内战将以现代史上最血腥的冲突载入史册，极端主义势力肆虐横行，二战后的美国主导秩序彻底崩塌。当硝烟散尽时，这个国家似乎再难复现世人爱恨交织的模样。\n\n但美利坚合众国给出了截然不同的答案。\n美国总统宣布所有被\"反社会势力\"占据的领土均已平定，重归联邦政府管辖。\n今日的美国已蜕变为截然不同的存在，当阴影中的窃窃私语谈论着总统身后试图重建世界警察地位的专家集团时，这个国家正牢牢掌控着自身命运。当然，这些指控都被当作阴谋论一笑置之。\n\n由于AM-NET系统几乎阻绝了所有外部窥探，外界对美国的内部政策知之甚少。但永久封锁状态、对异见人士的强力镇压以及对民众的无死角监控，无不令世界回想起布什时代久违的寒意。\n\n有关美国势力试图重新渗透地区影响力的报道，正引发全球大国的深切忧虑。种种迹象表明，合众国远未走向衰亡。"
 nss.3.a: "雄鹰再度盘旋世间。"
 nss.4.t: "后座司机"
 nss.4.d: "椭圆形办公室已许久不再有家的温馨感。自从威廉·J·伯恩斯在总统身边占据更主动的位置后，白宫就不再像个家了。\n\n拜登记得自己与世界各地形形色色人物的会晤：有人吵吵嚷嚷，也有人沉静如水。在他眼中，没有一个人是乏味的，每个人都像是需要征服的新挑战。\n他看着各种医疗设备被搬进椭圆办公室，却不太明白缘由。\n\n他记得走廊里讲过的笑话，危机时刻的紧张瞬间。\n要是再年轻些就好了，他想。不出一年就能让国家团结起来，还能获得彻底整顿体制的绝对权力。\n他看见伯恩斯在自己打电话时走进来，提到检查站和黑石集团什么的。那家公司总是碍眼得很。\n\n拜登想叫住他，想要挥手示意。\n但他做不到。\n乔·拜登此刻想起来了，当时他的健康状况急剧恶化，突然间身体就不听使唤；意识清醒着，躯壳却拒绝配合。\n\n当意识到正在发生什么时，一阵恐惧攫住了他。\n伯恩斯漫不经心地瞥了他一眼，招手唤来护士，比划着要加大某种剂量。拜登听不真切。\n\n护士调整着他座椅后方的设备，投向总统的目光充满怜悯。如蜡融般的松弛感席卷全身，所有恐惧与忧虑都消解在这暖流里。"
 nss.4.a: "机器换电池。"
 nss.5.t: "公共卫生安全法"
 nss.5.d: "《公共卫生安全法案》正将疫情时期的临时管控措施转化为永久性生物安全框架。该法案由制药企业与疾控中心共同参与制定，创立名为\"美国医保\"的全民医疗体系，以政府监管和财政担保为支撑，用强制性私营保险模式取代现有医保体系，通过纳税人补贴形成制药行业的垄断市场。\n\n法案的细则却暴露了其本质，建立强制疫苗接种制度，要求公民根据疾控中心与制药企业联合委员会的决定，定期接种已知及新发疾病的疫苗与加强针。这些疫苗中将植入用于存储传输健康档案与个人数据的微型芯片。\n\n拒绝接种与追踪的公民将被剥夺基本社会服务权益，无法使用美国医保系统、禁止乘坐交通工具、禁止就业就学，实质上被排除在社会体系之外。新成立的\"卫生安全局\"将配合疾控中心负责监督接种合规性，并对未接种者或感染者实施追踪。\n\n在公开层面，该法案被宣传为防范未来疫情、确保美国领跑医疗创新的关键举措。实际操作中，它通过健康指令与监控手段巩固控制体系，以政府强制需求保障制药企业利润。医疗保健这项基本人权亦因此异化为有条件特权与人口管控工具。\n\n在制药利益集团的强力游说下，该法案未经充分讨论即在国会通过。因所谓紧急状态需要，伯恩斯主任将代表总统用自动签名机批准法案，跳过标准签署程序立即实施。批评者指出该法案监控力度远超威权国家，但媒体持续强调生物威胁与医疗福利，并将反对声音打上极端主义与阴谋论标签，致使公众抵制浪潮微弱。\n\n《公共卫生安全法案》以健康安全之名，为下一阶段人口管理奠定了技术与法律基础，暗中构建起了公私合营统治的新范式。"
 nss.5.a: "阻止疫情扩散。"
 nss.6.t: "保障安全演讲"
 nss.6.d: "美国同胞们：\n\n愿今晚的各位都能安然居于家中。在美国历史的恢弘画卷中，从未有过比如今更充满不确定性与危机的时刻。年轻一代尤其令人忧心，他们极易接触到恶意、极端及其他有害内容。\n\n本届政府已采取全方位举措应对此况，我们共同努力的成果正是即将向各位说明的《儿童安全法案》。\n\n首要的是，该法案致力于建立监管体系，确保每位公民，尤其是青少年，享有安全的网络环境。这将包括对可疑人员的全面监控，以及要求特定网站在访问时需验证身份信息。\n\n其次，法案将强制建立登记制度，对上述人员与网站进行系统追踪。\n\n最后，执法部门将被赋予充分资源与权限，采取一切必要措施保障公众与个人安全。\n\n这项法案凝聚着举国上下的共同努力。它不仅是时代的重大进步，更是民主精神的生动体现。愿《儿童安全法案》能为您家人的生活带来安宁与祥和。"
 nss.6.a: "上帝保佑你们，上帝保佑美国。"
 nss.7.t: "独眼"
 nss.7.d: "威廉·J·伯恩斯从不是那种喜欢为成功行动举办盛大仪式或庆功宴的人——即便那行动的意义堪比拯救整个国家。在他看来，工作依旧照常进行，世界的和平依然遥不可及。\n\n他从未对那些制造混乱的人心怀怨恨。那场动乱并非无缘无故，而是前任联邦政府的无能所致——若一个国家无法持续掌控，不仅掌控人民，也掌控世界，那么结局便如此。\n\n伯恩斯回忆起自己在中国与俄罗斯担任外交官的岁月，他依然没有怨恨那些国家，也没有怨恨那里的人民。他亲眼见证了美国缺席所引发的动荡，以及因他们崛起而蔓延的不安。他深知——会咬人的野兽，不该保留獠牙。伯恩斯希望，通过对全球的适度\"安抚\"，能让那份\"美国的和平\"重燃光辉。\n\n帝国。\n\n多么奇怪的一个词。若换作旧时代，他早已身披金缎，锦衣玉带；可如今他手中掌握的权力，却远胜寻常帝王。\n\n然而，他并不渴望帝国，也无意坐上王座——他只是想确保这个世界不会自焚于不确定的未来之中。\n\n\"美国的和平\"或许并不完美，但它带来了确定性，也带来了规则。这正是值得奋斗守护的东西。\n\n如今，世界正熊熊燃烧——是时候让世人明白，美利坚合众国远未死去。"
 nss.7.a: "我们可以选择恪守道德，也可以选择成为维护和平的人。"
 nss.8.t: "诞生"
 nss.8.d: "若雏鸟无力破壳，便只能胎死卵中。\n\n当前危机让影子政府清醒认识到，维持美国现有体系已难以为继。于是，中情局局长威廉·J·伯恩斯决心建立一支只听命于安全官僚利益的新型武装力量，在军方溃败之处重铸秩序。通过扩充表面隶属于中情局的秘密特种部队\"特别行动组\"，他试图打造类似古罗马禁卫军的忠诚武装，能不问缘由地用暴力迫使美国民众屈服。\n\n尽管中情局法定职权限于境外，这只扩编的部队将被部署于美国本土。他们有双重任务：以维护秩序之名，既阻止国家滑向混乱野蛮，也顺带清除一切阻碍者。与受交战规则约束的普通军队不同，它将成为深层政府不受法律束缚的利剑，人员仅效忠于影子政府及其任务。若军人抗命，中情局特工便将代行安全官僚的意志。\n\n尽管米利将军与奥斯汀国防部长强烈反对，这支队伍的基层兵员仍直接从美军抽调，选自那些在反叛乱中表现突出的旅团。随后用征召兵与国民警卫队补上陆军的人员空缺，此举被视作是情报系统对军方的刻意削弱。\n\n首批旅团的授旗仪式在华盛顿的深夜举行，士兵们身着灰色迷彩持枪肃立，在篝火前焚烧旧部队臂章，大火在黑暗中照亮着众人脸庞。伯恩斯局长在火焰映照中登台，他演讲的结束语将永远铭刻在参会者的心中。\n\n\"从今日起，你们没有姓名，没有档案。世人将遗忘你们，但你们为合众国建立的功业永存。你们是抵御黑暗的坚盾……\""
 nss.8.a: "\"……你们是对抗混乱的秩序之光。\""
 nss.9.t: "美国的清晨"
 nss.9.d: "在美国各地，人们上班、上学、做礼拜，过着寻常日子。街道整洁如初，经济蓬勃发展，建筑修缮一新——就像战前那样。\n\n随着时间推移，第二次内战留下的伤痕与印记逐渐消退，这个国家似乎正在走出那场毁灭性冲突的阴影。在新共识的浪潮中，那些引发战争的记忆、愤怒、痛苦与仇恨正慢慢淡化。每一口洁净的饮水，每一剂接种的疫苗，每一处叛乱痕迹的清除，都让人们愈发记不起当初为何满怀怨恨。比起紧攥可能造成伤害的旧怨，遗忘痛苦总是更容易些。崭新的开始永远更美好，即便这意味着要忘却过去才能抵达光明的未来。\n\n电视里播放着平静克制的新闻报道，穿插在商品广告与体育赛事之间。公众像接受其他一切事物那样接受着媒体投喂——毫无质疑。世界被打包成精美整齐的礼盒，所有线头都已收束，所有问题皆获解决。\n\n日复一日，始终如一。这般生活如此轻松，如此正确，如此……完美。无人抱怨，因为他们早已忘记如何抱怨。法律即是铁律，无人能够豁免。\n\n人类终究是习惯的奴隶。他们在晨间惯例、日常习惯与熟悉的生活模式中寻找慰藉，纵使外界是个庞大可怖的天地，只要守住这些微小秩序，便能在混沌不安的世界里获得一丝安定。\n\n这一切都是全知者的馈赠。他们并不渴求感激——安保官僚、金融巨鳄与精英阶层都明白，维系秩序本就是份徒劳无功的差事，而秩序本身即是最大的回报。\n\n纽约的摩天楼群牵动着全国的神经。尽管二十年来不断的设计更改、招商困境与内战阴云拖延了重建进度，但世贸中心建筑群的重建竣工，终究为这道深可见骨的创伤画上了句号，也翻开了美国历史的新篇章。这颗曾经跳动不休的霸权心脏、全球金融的中枢，终于重获完整。\n\n当烟花在夜空绽放，举国欢庆之际，过去二十年的噩梦正缓缓沉入记忆的迷雾。秩序，终究是战胜了混沌。"
 nss.9.a: "晨曦再度普照美利坚。"
 nss.10.t: "残酷小队"
 nss.10.d: "在美国深陷内战泥潭之际，华盛顿特区遭遇的恐怖袭击几乎使联邦政府陷入瘫痪，这个早已疲于应对东海岸法律秩序全面崩溃的政权，此刻更是雪上加霜。拜登总统险遭不测后，决定留守总统紧急行动中心，而所有证据都指向新纳粹组织的又一轮恐袭。借此名义，三大情报机构展开了美国史无前例的系统性镇压。全面战争时期，容不得半点心慈手软。\n\n\"诸位，我们即将空降地狱中心。\"队长在装甲运兵车内说道，\"任务目标：清除所有敌对人员，包括与核武之师无关者。本次行动没有交火规则。最高命令：不留活口。\"\n\n中情局特别行动组的杀手们检查着配发的穿甲弹武器。据情报显示，一伙散兵游勇占领了公寓楼并劫持人质，其中高价值目标正是核武之师某头目。鉴于该组织的隐秘性、恐怖分子混入平民的风险，以及简报明确指出这名高价值目标\"知道太多\"，必须\"斩草除根\"，行动组决定执行无差别清除。"
 nss.10.a: "§g>>>下一页……§!"
 nss.11.t: "漫漫长夜"
 nss.11.d: "毒气逐渐消散，身着四级防护服的清剿小队踹开了拿骚堂的大门。学生和新纳粹恐怖分子的尸体以怪异姿态横陈地面，凝固的面容永远定格在惊恐瞬间。上级命令要求处决厄尔·特纳，这位在华盛顿袭击事件后逃亡的众多新纳粹头目之一。他盘踞在普林斯顿大学，占据拿骚堂并将师生充作人肉盾牌。\n\n这些暴徒万万没料到特别行动组会向整栋建筑灌注沙林毒气。政府军不是应该扮演正义之师吗？交战规则的改变，让那些仰仗政府软弱的懦夫战术彻底失去了生存空间。这里不会有任何谈判，所有附带损伤都将由中情局舆情部门善后。在公众认知里，这场悲剧完全是新纳粹恐怖分子所为，而清剿小队是奉命营救无辜师生的英雄。\n\n\"突入小组，这里是战术指挥中心。确认所有敌对目标清除。善后小组正在前往封锁周边。完毕。\"\n\n\"收到，完毕。\"队长回复道。\n\n幸存的师生陆续倒下后，中情局特工开始系统性地搜查走廊。即便佩戴防毒面具的人也未能幸免，剧毒神经剂透过皮肤渗透，同样夺走了他们的性命。\n\n找到特纳只是时间问题。这个恶棍早已被自己的呕吐物和体液呛死，队长认为这种死法正配得上这等败类。\n\n\"目标确认死亡，\"他向指挥中心汇报，\"善后小组按计划推进。\"\n\n\"收到，突入小组，\"善后组长回应，\"已目视确认你们位置。行动即刻展开。\"\n\n建筑外围，身着防化服的中情局人员已准备就绪。警戒线迅速拉起，官方说辞开始同步散播。清剿小队转身撤离，与正忙于搬运尸体并启动净化程序的防化人员擦肩而过。随着善后小组接手，他们的使命就此完成。"
 nss.11.a: "战争性质已经改变。"
 nss.12.t: "突袭萨特据点"
 nss.12.d: "行动摘要：\n核武之师瓦解后，其领导层多数被捕或清除。然而，曾被评估为\"血殿\"关联分子并有过往接触史的约书亚·凯莱布·萨特设法逃脱了常规司法程序的追捕。\n\n背景：\n情报收集表明，萨特在阿巴拉契亚地区建立了一个武装据点，并由少数邪教追随者陪同。我们为此派遣了特别行动组，首要命令为消灭或逮捕萨特。交战规则允许对其追随者采取无限制行动。\n\n行动：\n经过约四十五分钟的持续交火，十二名敌对分子被消灭。萨特自尽未遂被无伤生擒。\n\n发现：\n行动后清理据点发现了大量侵犯人权的证据，其中包括长期受到虐待、酷刑和实验性肢解的人类遗体。多幅影视资料（照片与粗糙绘画）记录了前核武之师控制区发生的暴行。此外，行动组在其军火库缴获了众多轻武器与非常规武器，其中包括放射性扩散装置（\"脏弹\"）与化学制剂。\n\n评估：\n尽管任务取得成功，汇报仍显示特别行动组人员出现急性心理困扰。一名队员甚至试图私下联系受害者家属。在此强烈建议对其持续进行心理监测并限制任务分配，以维持作战效能。\n\n行动结论：\n随着最后一个核武之师据点的摧毁和约书亚·凯莱布·萨特的被捕，本次行动正式评估为成功。残余的极端分子仍是潜在安全隐患，但其核心领导结构已被有效清除。\n\n报告结束"
 nss.12.a: "我们抓到活口了。"
 nss.13.t: "蜘蛛"
 nss.13.d: "在突袭萨特据点后，目标人物约书亚·凯莱布·萨特被捕并转移至邻近的秘密拘押点，持续数周的强化审讯行动随即启动。\n\n主要目标：获取关于核武之师小组、与其关联的分裂团体及其他国内叛乱组织（包括但不限于爱国者阵线与美国人民解放军）存在性与架构的情报。重点聚焦\"血殿\"通过渗透外部团体获取行动情报的既定手法。\n\n次要目标：确认可能用于协同行动、破坏联邦公共秩序的武器与物资储备点。\n\n审讯方法：经授权的强化审讯手段包括睡眠剥夺、感官操控（白室隔离）、撞墙审讯及压力姿势等。这些措施对审讯对象造成显著心理压力。在其精神崩溃后，萨特提供了行动的可信情报。审讯周期结束后，目标已被处决。\n\n行动成果：所获情报被评估为高价值。收集的数据扩展了重点监控人员名单，并为渗透敌对网络提供了关键线索。"
 nss.13.a: "第一张多米诺骨牌已经倒下。"
 nss.14.t: "狩猎"
 nss.14.d: "重新执掌方向盘，也意味着要承担相应的责任；过去犯下的错误，将不可避免地再次浮现，并威胁到国家安全。\n\n这场假面舞会，是为美国人民披上的一层常态的面纱，让他们相信一切照旧，而我们则在幕后竭力确保国家不受任何伤害。或许有人会出于道德顾虑而反对我们的手段。\n\n但无人能否认这些手段的有效性。\n\n不幸的是，我们有大量的清理工作要做。内战之前，我们留下了相当多的未了结的线头。那些曾为我们提供情报的线人、曾负责分化异议分子的煽动者，以及曾忠于我们事业的前任人员，如今正经历着一场道德危机。\n这些都不过是暂时的挫折。\n\n然而，必须指出，这些线头必须尽快处理掉，以免它们威胁刺破这层面纱，将这场假面舞会暴露于公众面前，使我们伟大的国家陷入混乱。\n\n要让美国完全恢复秩序，将需要数年时间。但如果我们能成功\"切除\"掉那些最紧迫的反社会行动者，那么这次重建将不会遇到任何阻碍。"
 nss.14.a: "开工吧。"
 nss.15.t: "犹大计谋"
 nss.15.d: "联邦政府内部的气氛已悄然改变，人们相互猜忌，眼神中充满了怀疑。资金、人员与情报无故失踪的报告，已在体制内引发了一股焦虑不安的氛围。\n\n种种迹象表明，我们内部极有可能潜藏着一名叛徒——一个已在体制内积累了足够经验与人脉，足以避开侦查的人物。其目标尚不明确，但从资源的突然缺失来看，此人很可能正经历一场道德危机，这场危机已蒙蔽其判断力，而他正企图通过将我们的议程公之于众，来引发社会动荡。\n\n此人察觉到我方已对其有所警觉的可能性极高，建议保持高度警惕。尽管此人在体制内游刃有余，但他很可能已留下了足以暴露其身份的蛛丝马迹。\n\n所剩时间不多了。此人活动的时间越长，对国家安全的潜在风险就越大。\n\n就像清除侵染身体的寄生虫一般，我们必须审视内部，并以雷霆手段铲除这个犹大。"
 nss.15.a: "火堆旁见。"
 nss.16.t: "伏击欣克尔"
 nss.16.d: "目标：杰克逊·欣克尔\n隶属组织：美国人民解放军(APLA)\n状态：已清除\n\n行动摘要：\n杰克逊·欣克尔作为美国人民解放军高层人物，已被确认为国家安全的长期威胁。该目标曾与我方特工进行有限度合作，包括协助分化左翼极端派系、促成特定目标抓捕。后因组织极端化倾向及个人投机动机，欣克尔日益靠拢APLA激进阵营并终止合作。\n美国人民解放军解体后，目标一度隐匿行踪，直至近期\"雅各宾\"组织活动情报表明其再度活跃。该目标通过融入雅各宾圈子，结合其社会影响力与精英阶层人脉，已升级为重大信息安全隐患。\n\n行动记录：\n在持续打压雅各宾活动的压力下，欣克尔被迫转入守势，其面临直接威胁时一贯表现出弃责逃逸的行为模式。\n根据欣克尔向中华人民共和国寻求政治庇护的情报，行动组获准动用潜伏线人，在加州设置虚假撤离点。\n目标在仅带最低限度安保的状态下抵达接应点，未经抵抗即被抓获。\n\n审讯：\n欣克尔在接受为期五天的强化审讯期间，呈现出严重心理应激反应，最终供述了具有行动价值的关键情报，包括：指认境内活跃的APLA残余基层组织、披露APLA与中国方面的联络渠道及后勤支援体系。\n\n处置：\n经评估确认目标不再具备可开发情报价值后，已对欣克尔实施清除程序。\n建议向APLA残余势力投放有关\"欣克尔企图叛逃中华人民共和国\"的受控情报以瓦解其内部凝聚力，同时持续监控雅各宾组织活动，防范具有APLA背景的活跃人员再度崛起。"
 nss.16.a: "此次行动已被认定为成功。"
 nss.17.t: "突袭布朗的黑客巢穴"
 nss.17.d: "目标：巴雷特·布朗\n隶属组织：无政府主义暴乱者网络\n状态：已清除\n\n行动摘要：\n巴雷特·布朗曾活跃于太平洋西北地区的暴动无政府主义组织，长期规避追捕并构成持续性反间谍威胁。该对象多次入侵机密数据库，并试图在公开网络散布敏感材料。在我们接管匿名者组织文化基础设施前，布朗曾参与该黑客团体活动，具备高度的行动安全纪律意识。\n\n此后，布朗成为多个黑客团体组建过程中的核心领袖，促使我方升级对其行动的定位、干扰与瓦解任务。通过代理服务器追踪其数字足迹，最终确认其藏身于某低收入城区。\n战术小组对目标公寓楼展开突袭，成功实施抓捕，但布朗在就擒前持枪击毙一名行动人员。羁押程序启动后，其预设的死手开关立即激活，导致多平台发生重大涉密数据泄露事件。\n\n审讯：\n布朗接受强化审讯约十日后，供述内容包含全美活跃黑客团体名单及其通信渠道、成员架构与运作模式等关键情报。\n经评估确认其无剩余可操作情报价值后，布朗被处决。\n\n行动评估：\n尽管目标使用死手开关引发即时安全漏洞，但后续对情报网络的深度利用有效对冲了行动损失。包括抓捕、审讯与清除在内的任务目标均已达成。"
 nss.17.a: "此次行动已被认定为成功。"
 nss.18.t: "平息迈克尔·弗林叛乱"
 nss.18.d: "目标：迈克尔·托马斯·弗林\n隶属组织：特朗普忠实拥护者\n状态：已清除\n\n行动摘要：\n美国陆军退役中将迈克尔·托马斯·弗林在美利坚宪政政府崩溃后从事叛国活动。尽管最后一批亲特朗普据点已被清除，但农村地区持续出现的叛乱袭击与破坏行动显示出正规军事指挥的协同战术特征。\n后续调查证实弗林仍在组织对抗联邦重整的抵抗运动。\n\n通过无人机侦察等情报监视手段，确认了叛军的活动规律。\n当局对已知武装人员家属实施反叛乱施压，同时加强前沿哨所和秘密基地的防御能力，迫使弗林部队逐步撤退。\n\n在偏远林区发现一处隐蔽营地，经评估为大规模进攻的集结地。\n该据点主要由特别行动组成员驻守，仅获有限常规军事支援。根据交战规则，授权对武装人员使用致命武力。\n\n执行过程：\n本次突袭持续约一小时，所有基地设施均按战术规程完成清剿，武装抵抗人员悉数击毙，非武装人员已羁押。\n目标人物弗林于现场被发现并拒捕，经非致命武器击中右腿及肩部丧失行动能力后收押。特别行动组五名队员阵亡。\n对目标实施了为期三周的强化审讯，具体手段包括：延迟医疗救治、以亲属安全施加心理压迫、持续性睡眠剥夺等。弗林最终供述了具有行动价值的情报，包括但不限于：效忠特朗普的残余叛乱组织名单，以及用于物资运输与隐蔽的阿巴拉契亚山脉隧道网络的确切信息。\n\n行动结论：\n在确认受审者情报价值耗尽后，弗林被处决。建议追溯撤销其军衔并标注不荣誉退役身份，以确保历史定性其为叛国罪。\n尽管特别行动组有人员损失，本次行动仍评估为成功。所获情报可显著提升对阿巴拉契亚地区的监控与武力投射能力。"
 nss.18.a: "继续前进。"
 nss.19.t: "清除安吉拉·戴维斯"
 nss.19.d: "目标：安吉拉·伊冯娜·戴维斯\n隶属组织：美国人民解放军(APLA)/黑人解放军(BLA)\n状态：已清除\n\n行动摘要：\n安吉拉·伊冯娜·戴维斯，情报机构长期关注的人物，其角色从黑豹党核心成员转变为美国人民解放军的领导层。在美国人民解放军解体后，戴维斯与和黑人解放军有关的民兵组织建立了联系，并潜入以非裔美国人为主的城市社区，利用当地民众的忠诚度和保护网络来逃避联邦政府的侦查。\n情报收集工作因社区支持和黑人解放军的保护结构而受阻。\n最终通过对当地代表施加物质激励和压力，成功实现了渗透。\n\n结果：成功定位目标藏身处。\n出动12名特别行动组特工，在联邦警察支援下封锁周边区域并控制邻近街区。\n整个突击行动持续约30分钟。目标试图在安保人员掩护下逃脱，背部中弹但未致命，随后被抓获。目标在随后三周内接受了强化审讯。\n\n成果：\n揭露了美国人民解放军及黑人解放军的残余基层组织结构。\n识别了其海外联系，包括与伊朗及中华人民共和国相关的支持网络。\n\n判定：目标已无可用情报。\n审讯周期结束后，戴维斯被清除。\n\n评估：\n目标的捕获及后续处置虽获取了可操作情报，但也引发了次级效应；非裔社区城市中心区的动荡局势加剧，且去中心化的武装活动日益频繁。\n建议在已识别的高风险区域扩大特别行动中心的存在，并加强监视和社区渗透，以遏制新出现的威胁。"
 nss.19.a: "任务已确认成功完成。"
 nss.20.t: "拦截里纳尔多·纳扎罗"
 nss.20.d: "目标：里纳尔多·纳扎罗\n隶属组织：根据地(白人分离主义/新纳粹网络)\n活动区域：太平洋西北地区\n状态：已清除（确认死亡）\n\n行动摘要：\n里纳尔多·纳扎罗作为\"根据地\"组织的创始成员，在卡斯卡迪亚当局垮台后一直是太平洋西北地区分散式白人分离主义暴力活动的主要策划者。该组织采用去中心化模式以最大化对抗联邦当局的抵抗能力，其暴力战术对关键基础设施和执法力量造成重大破坏。鉴于该组织持续造成作战影响，评估认为必须将纳扎罗从战场清除以恢复区域稳定。\n情报来源包括对前敌对网络成员、叛逃人员及潜伏内线所提供的报告进行交叉验证与策略性运用。\n\n行动人员已测绘该区域多个根据地组织单元；佐证资料显示其后期行动存在外国支持迹象。\n\n特别行动组受命对已识别单元实施周密有序的打击，系统性削弱根据地的作战能力。\n\n执行过程：\n针对组织据点的协同动能行动已执行。各交战点抵抗程度不一，越接近高层领导所在建筑的战斗强度越高。\n在终结行动中，纳扎罗藏身处被锁定，其院落被清剿。行动中使用催泪瓦斯制服目标，纳扎罗被俘。其余敌对人员在交战中均被清除。\n\n目标被转移至审讯设施进行情报榨取。\n纳扎罗在为期两周的审讯期内死亡。对其最终据点缴获物资的死后分析显示，装备含俄罗斯原产物品，文件证据表明存在通往俄罗斯联邦的潜在撤离路径。尽管直接人力情报联系仍在调查中，但物资与文件线索表明存在可信的外国支持渠道。\n\n行动结论：\n此次序列打击行动显著削弱了根据地实施大规模即时组织性暴力的能力。\n缴获证据支持存在外国协助的合理怀疑，需进一步开展反情报工作以明确外部介入的程度与意图。"
 nss.20.a: "任务已确认成功完成。"
 nss.21.t: "清除史蒂文·诺德豪斯"
 nss.21.d: "目标：史蒂文·诺德豪斯\n身份：前国民警卫队指挥官/叛乱势力头目\n活动区域：中西部乡村地带\n状态：已清除（确认死亡）\n\n行动摘要：\n前国民警卫队指挥官史蒂文·诺德豪斯公开否认联邦政府权威，在中西部农业地带组织持续性叛乱行动。凭借其掌握的军事指挥经验、人事网络与涉密资料，系统性地策划了对关键基础设施、军事设施及机密信息库的协同打击。此人在\"将美利坚从暴政铁爪中解放\"的旗帜下，不断收编各地民兵组织与地方同情势力。\n经评估，将诺德豪斯清除出作战区域，对重建控制、捍卫国家安全利益具有至关重要的作用。\n诺德豪斯凭借对体制的深刻认知，系统性地瓦解我军部署架构、协调多线非对称打击，滥用敏感数据。\n多方情报证实，其叛军规模正持续扩张，并控制多处关键乡村枢纽。\n持续的动荡局势对政府运作的连续性与地区稳定构成双重威胁；而联邦权威的崩解使得亲诺德豪斯阵营势力带来的行动风险进一步加剧。\n\n执行过程：\n特别行动中心多个支队协同常规军事单位及执法力量，实施了分阶段孤立作战。\n通过持续监控与针对性施压，有效限制了诺德豪斯的行动自由并瓦解其指挥体系。\n在动能打击与情报监视侦察联合行动锁定目标后，其乘坐车辆遭精准打击瘫痪，后续调查确认目标已被清除。\n\n行动结论：\n对缴获物资的战后利用仍在进行。\n初步评估表明，叛乱势力将瓦解为地方性内斗，其组织化大规模行动能力就此终结。\n建议立即启动内部人员审查程序，甄别联邦部队中的潜在同情者，以消除内部威胁风险。"
 nss.21.a: "任务完成。"
 nss.22.t: "黑暗森林"
 nss.22.d: "\"就这些了吗？\"伯恩斯从办公桌对面抬眼看向助手问道。\"目前收到的都在这了。\"她回答时目光微微游移。\n\n他叹了口气，继续翻阅更多档案，每一份文件的细节都不放过。\n\n报告接连不断，档案堆积如山，结论却如出一辙。局长连晨间咖啡都没来得及喝，太阳穴就已隐隐作痛。整合美国权力的工作从来不会轻松，这需要大量牺牲——无论对他自己还是下属都是如此。虽是个吃力不讨好的差事，却非做不可。\n\n\"辛苦了，我现在就看。\"他摆摆手示意女助手退下。\n\n\"是的长官。\"她鞋跟一转，随着锁舌清脆的咔嗒声迅速离开了办公室。\n\n伯恩斯转身望向窗外，俯瞰着晨雾氤氲的庭院深深吸气。远处可见几个早到的工作人员徘徊的身影。兰利外的世界看似宁静祥和，与日常表象下滋生的阴谋诡计形成鲜明对比。\n\n倘若他们的所作所为有丝毫公之于众，史书必将他们妖魔化。或许他们确实是恶魔——但在他们栖身的世界里本就不存在英雄。在那片为美国人民重建的社会光芒之外，丛林深处蛰伏着更可怖的存在，一旦得见天日，他们的暴行都将相形见绌。这一点他比谁都清楚。\n\n如今，那些要么直接参与华盛顿袭击、要么知晓情报机构共谋事实的人都已永远沉默，政府终于能继续前行。至少如此一来，他们维护的将是秩序之道，美国民众也不必再受自身低级冲动摆布。放任乌合之众自行其是，永远建造不出更好的世界。\n\n篝火之外的魍魉魑魅，总算又被挡回去一阵子了。"
 nss.22.a: "现在，这样就行了。"
 nss.23.t: "丛林奇航"
 nss.23.d: "某个瞬间，马克·塔索内心的某处轰然崩塌。他单枪匹马剿灭了奉命监视的新纳粹组织，将久经磨练的杀戮手段全速用在了名义上的同袍身上。连他的联络人也命丧其手，自此他便从系统中彻底消失。华盛顿的权贵从未赢得过他的忠诚，他只效忠于中情局这个理念，以及作为精神家园的美国。但兰利总部与整个华盛顿早已与恐怖分子沆瀣一气，而他参与的那场伪旗行动，正是中情局及其党羽攫取全国权力的导火索。如今他只能背负着叛徒的骂名苟活。他虽然挣脱了枷锁，却永远失去了归处。\n\n最初派来的几名杀手，有的被剥皮拆骨装进尸袋送回，有的干脆人间蒸发。多年特训加上渗透极右翼恐怖组织的经历，让马克精通某种特殊的残忍。他清楚自己灵魂深处的裂痕。若非如此，怎会将那些杀人技法运用得如此娴熟？政府和情报机构把那个满腔热血的少年锻造成了武器，这把利刃为他们效力多年，直到某天突然崩断反噬。如今他像条丧家之犬，对旧主亮出獠牙，撕碎所有来犯之敌。他们迟早会派出另一个\"马克\"来猎杀马克。\n\n但他始终孤军奋战。一个精神破碎的独行者，注定无法在消耗战中推翻政权。当中情局特别行动组将他逼进废弃校舍时，殊不知正踏入死亡陷阱。他像疯兽般搏杀，那些戴着面具穿着防弹衣的追兵，临死前的惨叫与当年他被迫杀害的无辜者如出一辙。\n\n踉跄着走出建筑时，残阳如血浸透他伤痕累累的身躯。方圆数里唯有他尚存一息。追兵必将卷土重来，而他不知还能撑多久。但此刻他至少能稍作喘息，试着拼凑出下一步计划，他绝不会让敌人简简单单地收割他的性命。\n\n马克单膝跪地，摘下头盔甩到一旁，感觉到眉骨上方的伤口正渗出鲜血。视线模糊了一瞬，他猛地甩头恢复清醒。现在只要能——\n\n林线处突然闪过寒光。狙击镜的反照正锁定他的眉心。他最后看到、听到的只有枪焰与轰鸣。马克·塔索的躯体重重砸在了冰冷的路面上，咽下了最后一口气。"
 nss.23.a: "他的战争终于结束。"
 nss.24.t: "无面正义"
 nss.24.d: "约翰·马多克斯上校始终想不明白事情为何会发展到这一步。他忠诚地执行拜登政府的各项政策，确保下属严格遵守口罩令与疫苗接种指南；他曾热切地率军围困整座城市，确保没有一个效忠那个橘色蛊惑者的叛徒能逃脱制裁。在此之前，他从未表露过真实想法，即便意识到某些政策与自己的理念相悖也始终缄默。但这场国内反恐战争显然越过了底线。\n\n交战规则似乎每周都在松动，被允许对美国同胞实施的暴行尺度不断扩大。他们不再拘押嫌疑人，而是直接开枪射杀，或是冷眼旁观中情局特别行动组将整座被认定为\"极端主义温床\"的小镇屠戮殆尽。当他在私下向同僚抱怨时，曾借指萨达姆麾下那支残暴的近卫军，随口将特别行动处比作\"兰利版的共和国卫队\"。他没想到那位\"朋友\"实际上是中情局的眼线。\n\n他看不清审判席后面具下的面孔，但从那些沉闷的嗓音里，他听出自己在华盛顿树敌颇多。军队竟沦落至此——被情报机构彻底渗透——这本就是莫大的侮辱。\n\n\"马多克斯上校。\"首席检察官开口。他无从知晓对方身份，这些人既未通报姓名也未表明军衔兵种。但他确信这些人都来自情报系统，绝非陆军同僚。\"你可知为何受审？\""
 nss.24.a: "§g>>>下一页…§!"
 nss.25.t: "\"犹大\"行动继续"
 nss.25.d: "影子内阁的嫌疑成员已被清除，新任职务掌控者受到严格管制，其所属机构权限亦遭大幅限制。\n\n然而预期成效尚未显现。我们仍观察到疑似叛徒的破坏行径——更甚的是，在察觉我方搜捕行动后，犹大正变本加厉地试图颠覆合众国。\n\n我们必须重整现有资源，对阴谋集团发动新一轮打击，以斩除叛徒首脑为坚决目标。"
 nss.25.a: "操了！"
 nss.26.t: "\"犹大\"行动终止"
 nss.26.d: "调查已大功告成！最近落马的影子内阁成员确系政府内部潜伏的叛徒，罪证确凿。如今元凶伏法，所有叛徒同党皆如惊弓之鸟销声匿迹。他们心知肚明，正义的审判终将降临。\n\n后方既已肃清，我国终可全力聚焦更重要的战略目标：重塑全球超级大国地位。"
 nss.26.a: "没有什么能阻挡秩序。"
 nss.27.t: "禁言"
 nss.27.d: "刚才那个帖子怎么不见了？明明刚才还在这儿的。算了，肯定能找到别的话题聊的……\n\n咦，频道被关闭了啊。还是个挺不错的频道呢。说不定会重新开放的。我们等着瞧吧，嗯？\n\n这个网站没以前那么有意思了。也许我们再努力一点，一切就能恢复原样了。总会好起来的。\n\n网站宕机了？网站怎么会说没就没了？唉，真没劲。还有别的可逛吗？\n\n连网络都断了？唉，这确实没办法了。只能等着恢复了。到时候一切都会好起来的。\n\n啧，网络中断的时间比预想中长得多啊。看来该出去看看发生什么事了。"
 nss.27.a: "外边有点冷，不是吗？"
 nss.28.t: "真理"
 nss.28.d: "十年前，能在《华盛顿邮报》工作对朱莉娅·福特而言简直是梦想成真。她以哥伦比亚大学顶尖成绩获得新闻学与政治学双学位，满怀热情地将政治评论的专长运用于工作岗位。她在特朗普赢得2016年总统大选后崭露头角——那时美国知识界仿佛全员动员准备抵抗，而她凭借锲而不舍的精神与犀利尖锐的评论赢得了声誉。\n\n当第二次美国内战爆发时，朱莉娅曾狂热地投身其中，支持拜登政府在这个濒临分崩离析的国度恢复法律与秩序。她当时坚信，拜登不仅能拯救这个国家，更能让它重建得更好。\n\n她始终想不通究竟是从哪一步开始全盘崩溃的。或许是从华盛顿特区恐怖袭击后那场权力的大规模整合开始，当时新闻界突然要面对\"不实信息\"的标签，使得报道难以为继。当然，政府的审查政策在每个环节都得到了合理化解释。每个记者都只该报道既成事实，而非臆造情节——起初她是理解这点的。\n\n但随着\"国内反恐战争\"不断升级，政府对异见者与抗议者的残酷处置动摇了朱莉娅的信念。共事多年的同事接连被贴上\"虚假信息传播者\"的标签，或被揭露与\"反社会组织\"有牵连。有人失踪，有人身败名裂失业潦倒，遭到他们曾拥护的政府封杀。当朱莉娅发表那篇质疑政府政策的评论文章时，虽知不妥却未曾料到会遭报复。毕竟她曾为他们摇旗呐喊，发表过多少报道和文章，他们怎能如此待她？\n\n但他们确实出手了。一份指控她与阴谋论者及左翼恐怖组织联系的备忘录被递交雇主手中，几周内她的名字就污名化，事业人生尽毁。《邮报》的事实核查部门被改组为内部审查机构，当年揭露特朗普劣迹的调查团队如今正在彻查她的人脉来源，试图证明她里通外敌。\n\n此刻，当面对这群拒绝表明身份的蒙面人手中黑洞洞的枪口时，她终于明白自己错在何处。原来从一开始，错的就是她自己——她曾是那场丑恶阴谋的自愿参与者，为某个早已无法回头的庞然大物制造着民意共识。"
 nss.28.a: "第四等级之死"
 nss.29.t: "证据获取"
 nss.29.d: "此次特种部队行动已取得关键突破：我们成功获取重要证据，或将据此揪出潜藏在影子内阁中的叛徒。\n\n但我们在锁定清剿目标时仍须保持审慎，因现有证据尚不足以下最终结论。若有可能，我们应继续搜集更多佐证材料。"
 nss.29.a: "干得好。"
 nss.30.t: "搜索未找到结果"
 nss.30.d: "我方特种部队开展的调查行动未能获取有效情报，或可说是未得出明确结论。我们必须继续全力追查叛徒，否则美利坚合众国将面临毁灭。\n\n伯恩斯局长已指示中情局增加影子预算，并强化在政府与社会各领域的行动力度。我们不惜一切代价必须取得成功。"
 nss.30.a: "继续找吧。"
 nss.31.t: "核威胁曝光"
 nss.31.d: "在接连发生多起疑似关联事件后，经多方调查人员协助分析，基本判定该异见分子企图诋毁美国国际形象。\n\n其具体手段曾引发广泛猜测，但萨凡纳河核设施遭突袭事件表明，这名叛国者很可能企图盗用我国名义使用核大规模杀伤性武器，永久玷污我国声誉。\n虽尚不确定其阴谋推进程度，但结合日益严峻的国内外压力，此事已非是否发生，而是何时发生的问题。\n\n建议立即加强行动制止该阴谋，缉拿目标人物，否则现行国际秩序将面临永久性裂痕。"
 nss.31.a: "局势升温……"
 nss.32.t: "盛宴亦有尽时"
 nss.32.d: "这本该是寻常一日，直到所有常态轰然崩塌。\n\n象牙塔中的掌权者曾俯视众生，却未料毁灭的种子早已在塔内滋生。\n所有高塔终将倾覆。\n当导弹基地与核潜艇向多国发射核弹头时，南美诸国率先悬于达摩克利斯之剑下。整片大陆即将被烈焰吞噬，这燃烧既是实质更是象征。\n随后西非沦为焦土，列强角逐的乐园在城市化为灰烬时宣告终结，再次印证灾难永远猝不及防。\n接着是海地，这个饱经动荡的国度在核爆闪光中迎来又一场生存试炼。\n\n最初是死寂。\n而后哭嚎震天。\n质问责难的嘶吼，渴求复仇的咆哮，追寻解方的呐喊。\n在国际社会眼中，这些攻击已成为美利坚洗不脱的污名。\n\n美利坚合众国已经惨败。内部陷入恐慌，辞职潮汹涌，最亲密的盟友悄然撤离，有人甚至选择了终极的自由。美国成了世界公敌，核心机密正被大规模泄露。\n\n国民怒焰滔天。\n\n秩序的信徒们即将以最肮脏的手段维持控制，但这次不再有遮羞布。这将是一场粗暴、痛苦而迅捷的清算。\n我们只能祈祷，因为变革的火焰已被再次点燃。"
 nss.32.a: "小小波折，再等百年又何妨？"
 nss.33.t: "加拿大无声政变"
 nss.33.d: "无标识的黑色厢式货车包围了丽都小屋，安保人员未作抵抗便束手就擒，身着西装与防弹衣的特工持步枪冲入总理官邸。这场政变安静得诡异，更像是对个人的逮捕而非真正的权力争夺。特鲁多不明白事情为何会发展到如此地步，这类剧情本该只发生在南方世界的动荡蛮国。他反复告诫自己，加拿大这样比美国文明得多的自由西方民主国家，本不该遭遇这种事。\n\n然而，政变确实发生了。此刻他正与加拿大安全情报局局长丹尼尔·罗杰斯对峙。对方带着职业性的冷静疏离：\"条件很清楚。这没有商量余地，从来都没有。\"\n\n特鲁多怒目而视，但反抗只剩空洞的姿态。面对这场算尽每一步的精密政变，他除了承认败局已定别无他法。\n\n\"加拿大人民……\"\n\n罗杰斯轻笑：\"在他们认知里今天一切如常。名义上你将继续履行职务。识时务者为俊杰。正常的表象必须不惜代价维持。如果你试图耍小聪明……\"他顿了顿，\"我们总有办法让你配合。最坏情况下，总理头衔终究只是个职位，你的继任者会同样配合。\"\n\n\"我真不敢相信你们会做出这么卑劣的事。你们到底为了什么？\"\n\n\"秩序。世界正在燃烧，而你只会畏缩不前。美国正在重返世界舞台，我们将与之并肩。\""
 nss.33.a: "\"一如既往。\""
 nss.34.t: "帝国之层"
 nss.34.d: "美国对铲除整个帝国与暴政体系并不陌生。\n曾有好几个势力试图将他们的秩序强加于世界，但都失败了：英国失败了，德国失败了，俄罗斯也失败了。\n\n无论外表如何变化，俄罗斯本质上仍是一个帝国。\n作为美国人，我们注定要将这些帝国一一瓦解。\n\n我们的第一个错误，是让苏联在数十年间主导东欧；第二个错误，是对普京采取绥靖政策；第三个错误，则是没有使欧洲足够强大，以至于能在没有我们的情况下应对他们。但正如与任何对手的较量一样，胜负教会了我们许多东西。某种程度上，怨恨与敌意早已消散。\n\n我们双方在诸多方面交锋，始终试图向世界证明谁才是最强者。\n今天，是我们彻底结束这场对抗，向世界昭示最终赢家的日子。\n\n他们的孩子曾在两个帝国的废墟上行走，今后也将踏过第三个帝国的断垣残壁。"
 nss.34.a: "踏着自由之路前行。"
 nss.35.t: "帝国的试炼场"
 nss.35.d: "整片大地遍布骨骸与灰烬，帝国在这里以自身与现实的普遍法则相互较量——有的胜，有的败。\n但帝国不是由高塔上俯视的人群构成，帝国是由将一方世界连结起来的观念与理念构成的。\n\n对许多人来说，美国就是一个帝国。\n这是一个经受住了最后考验——其他帝国无法承受的考验——的帝国。\n那些值得守护的理想，那些永不被击败的理念。\n没有欧洲，我们就不会存在；因此我们怀有感情上的责任，确保他们不再被剧烈变动的烈焰吞噬。\n究竟是什么象征统治欧洲，并不重要。\n\n美国式的和平将确保那些象征崩塌、偶像倒塌、腐蚀性的意识形态被拆解——让我们在欧洲恢复秩序。\n我们的守护永不会放松。\n\n也绝不会。"
 nss.35.a: "是时候回家了。"
 nss.36.t: "魔镜"
 nss.36.d: "在东方有一头猛兽。\n由人群与工厂构成。\n它需要越来越多，焚烧弱者的土地。\n\n然而，启蒙之火由大众举起而至，\n与之并肩的是大众握着的利刃。\n直指它的心脏，\n直指它的首脑。\n\n中国的觉醒并非没有磕绊，我们的暂时缺席恰成其崛起的关键因素。我们看见了与自身历史的相似之处。\n无非是考验与试炼，挺过这些就能保证在阳光下占有一席之地。可天地之间，位置不过一处。\n\n中国有能力取代我们，成为新的世界看门人。\n但那并非我们想参与的世界。\n\n美国的和平之所以长久，自有其理由。\n现在是时候制止他们的上升了。"
 nss.36.a: "降服恶龙。"
 nss.37.t: "世界之心"
 nss.37.d: "文明诞生于中东，而如同一切诞生之地，它终究难逃腐化。\n这并非出于其本性，而是因为岁月的侵蚀。\n\n这片土地从未远离纷争，\n仿佛一只试图重塑自身的车轮。\n黑衣之人与沙褐之人，手持钢铁与火焰，\n让这片大地长年笼罩在血红的迷雾中。\n\n我们曾经到来过，而我们的存在曾确保这轮回不再重演；\n我们的离去，却成了必须回归的证据。\n为了让暴力的幽灵永远沉眠，\n为了让稳定与秩序成为驯服这片动荡之地的美德。\n它所承载的深厚历史与知识，\n不应交付于冲动的群体之手。\n\n我们再度归来，\n而且——永不离开。"
 nss.37.a: "埋葬他们的傲慢，埋葬他们的骄傲。"
 nss.38.t: "美国要求我们退出一带一路倡议"
 nss.38.d: "美利坚合众国已向我国发出最后通牒，要求我们终止与中国的一切经济和外交合作，特别是退出一带一路倡议，其理由是\"中国新帝国主义威胁及全球威权主义风险\"。\n\n然而，美方的严苛要求与威胁相较于失去中国支持可能造成的损失，实乃微不足道。但在巨人的角力中从无折中之策，我们必须做出抉择：要么切断与中国的联系，要么承受美国军事与经济实力的雷霆之怒。"
 nss.38.a: "我们别无选择。"
 nss.38.b: "凭啥啊？"
 nss.39.t: "迷失之魂"
 nss.39.d: "他被安排去守夜，以防伊拉克武装分子趁虚而入；宁静的夜晚总是另一场伏击、另一场恐怖袭击的前奏。他已经好几天没合眼了，偶尔眼前会闪过昔日战争的片段。\n夜空美得令人窒息，宛若神明才能绘就的画卷。\n远处时而传来枪声，是友军还是敌人并不重要，反正不在他和部队附近。\n他坐在廉价的塑料椅旁，一盏小提灯勉强照亮四周，而更远的黑暗则任由想象蔓延。\n\n\"你见过我的士兵吗？\"\n\n他看见不远处立着一个人影，穿着作战服，戴着的防毒面具看起来有些过时。\n那人影走近，蹲在了他身旁。\n\n守夜的士兵吓了一跳，抬起头。\n\n\"你、你是谁？报上身份！\"\n他慢慢站起来，举枪瞄准人影。\n\n\"我的士兵们，你见过他们吗？\"对方只是执拗地追问。\n\"我、我确定他们还在附近，只要你表明你的身——\"\n\n\"他们当然还在，我仍在此地，而你也会留下。我们谁都离不开这里。\"\n人影向士兵张开双臂。作战服上弹孔清晰可见，脖颈还缠绕着绳索的勒痕。\n\"文明在此处诞生，也必将在此处埋葬。\"\n\n突然有人摇晃他的肩膀，守夜士兵猛地惊醒。\n\"嘿，老兄，你还好吗？\"\n队友露出温和的笑容，\"可别让这帮塔斯肯袭击者占了我们便宜。\"\n\n守夜士兵环顾四周，那个戴面具的身影早已消失无踪。\n他站起身，窘迫地干笑了两声。"
 nss.39.a: "\"别再提星战了。\""
 nss.40.t: "残酷小队"
 nss.40.d: "厢式货车在楼外戛然而止，车门猛地滑开。几名身份不明的士兵鱼贯而出，径直冲向入口。他们在门上安放好炸药，爆破的巨响在街道上回荡，行动人员随即突入楼内。无论是蒙面的极右翼恐怖分子还是平民，任何胆敢挡路的人都被当场射杀。他们的首要任务是清除高价值目标，其次是其他潜在的恐怖分子，最后是所有可能看到了些什么的人。\n\n这一幕一次又一次地重演——人质们的脸上先是因看到救援者而露出宽慰的神情，但当行动人员将步枪同样对准他们时，那神情便瞬间转为了困惑与恐惧。\n\n不留活口，不留目击者。倒不是说平民能认出这些\"救世主\"，他们的脸都隐藏在巴拉克拉法帽后面，但他们从不抱任何侥幸心理。\n\n当他们最终面对一扇锁着的门时，一名队员在门上安放了炸药，然后一脚踹开。硝烟散去，门后是一个瑟瑟发抖的男人，脖子上有一个万字纹身。\n\n\"不许动！\"队长命令道。\n\n\"这和说好的不一样——\"那名新纳粹分子抗议道，话音未落，小队便已开火，将无数子弹倾泻在他身上。\"你……答应过我——\"\n\n小队停止了射击。\"突入小组，这里是战术行动中心。清理小组已在路上。清除所有剩余幸存者。完毕。\"\n\n\"收到，\"队长答道，\"突入小组通讯结束。\"\n\n随后，他转向自己的手下。"
 nss.40.a: "\"听见他们说了。咱们干活吧。\""
 nss.41.t: "选举日"
 nss.41.d: "在世界上那些更专制的政体中，投票权早已被扼杀。那种毫无权力、无从置喙的感觉，是一种令人麻痹的无力感。\n\n美国公民则感受不到这种麻痹。每隔四年，选举季便如火如荼地展开，这既是一场庆祝选择自由的仪式，也是在提醒我们的人民——权力掌握在他们手中。\n\n人们选择自己心仪的候选人，从魅力四射到务实肯干，从风趣幽默到沉着冷静。一切仿佛又回到了民粹主义腐毒侵蚀之前的日子，人人面带微笑，缔结着友好的竞争关系，一如观看体育比赛。\n\n只是，无论谁赢，帷幕之后的那套机器都将照旧运转。\n\n那么，就让我们看看，是谁的瓷制面具将在银幕上熠熠生辉。\n\n而获胜者是……"
 nss.41.a: "现任者取得决定性胜利！"
 nss.41.b: "加文·纽森"
 nss.41.c: "米特·罗姆尼"
 nss.41.e: "劳埃德·奥斯汀"
 nss.41.f: "约翰·博尔顿"
 nss.41.g: "马克·米利"
 nss.41.h: "安东尼·布林肯"
 nss.41.i: "亨特·拜登"
 nss.41.j: "南希·佩洛西"
 nss.41.k: "查克·舒默"
 nss.41.l: "莉兹·切尼"
 nss.42.t: "就职日"
 nss.42.d: "人民已经作出了选择。候选人之间、支持者之间的竞争与纷争已然消散。\n现在，是握手与微笑的时刻，是重新团结的时刻。\n\n由于封锁措施仍在实施，当选总统的就职典礼吸引了庞大的线上观众。出于显而易见的安全考量，警戒被全面加强。当选总统将手放在《圣经》上，向整个国家宣誓。\n\n往常这时，会有群众在现场欢呼，但如今线上世界的喧嚣足以弥补空缺。烟花点亮夜空，国歌回荡，当美利坚合众国的新总统被引入国会大厦。\n\n随着选举季落下帷幕，现在，是时候让新总统真正了解——无论台前还是幕后——美国的政事是如何运作的。"
 nss.42.a: "这些信息将仅限于需要知情的人员知晓。"
 nss.43.t: "致相关人士："
 nss.43.d: "在美利坚合众国新任总统就职之后，社会上开始流传关于前总统约瑟夫·罗比内特·拜登逝世的谣言。诸如\"是我们终止了他的生命维持\"或\"我们给他注射了痛苦的毒剂\"之类的说法，无非是外部敌对势力公然散播的虚假信息。\n\n我们的前总统拜登，为我们伟大的国家献出了他的心血、灵魂与身躯。为了防止国家陷入进一步的动荡，他坚持到了任期的最后一刻——这需要巨大的勇气。\n无论承受何种痛苦，无论面临何等压力，他都坚韧地挺了过来。\n他怎样坚持，我们也将怎样坚持。\n我们将履行职责，让世界重归正轨。\n我们将继续前行，无论身后留下怎样的伤疤。\n\n在此，我需要提醒所有人，继续传播此类谣言的行为属于异议言论，并可能被视为反社会活动。我想，我们针对此类行为所采取的各项措施，已无需我再赘述。\n\n现在没有时间沉溺于猜测与谜团，我们有整个世界要去重建。"
 nss.43.a: "威廉·J·伯恩斯"
 nss.44.t: "本地商场枪击案造成20人死亡"
 nss.44.d: "宾夕法尼亚州，一个宁静的下午迅速演变为一场噩梦。一名年约二十一岁的年轻女性手持冲锋枪抵达富兰克林购物中心，意图尽可能多地射杀民众。这起袭击持续了大约二十分钟，枪手最终被地方当局当场击毙。\n\n袭击已造成至少20人死亡，另有4人情况危殆。据报道，警方已在该地区及全州范围内设立检查站，以减少潜在模仿犯罪的发生几率。\n\n枪手的动机目前仍众说纷纭，但在其背包中发现的一个笔记本里，含有与虚无主义相关的图像和文字，并有精神健康状况持续恶化的迹象。笔记本中反复出现\"黑暗中的眼睛\"这一主题。\n\n目前调查仍在进行，其家人也正接受质询。地方当局强烈建议民众密切关注家中年轻成员的活动，特别是他们的网络活动。\n\n美国联邦调查局（FBI）已声明，待所有信息获得适当核实后，将对外公布更多详情。"
 nss.44.a: "更多内容稍后继续。"
 nss.45.t: "校园袭击事件震惊全国！"
 nss.45.d: "美国田纳西州的一所地方学院遭遇悲剧，一名二十岁左右的年轻男性手持自动火器，向学生与教师肆意开火。校园安保人员曾试图制服枪手，但因对方使用莫洛托夫燃烧瓶而被迫迅速撤退，过程中至少一名安保人员殉职。\n\n一支特警队随即被部署至校园。在对该区域进行快速扫荡后，特警以致命武力终止了枪手的疯狂杀戮。关于死亡人数的报道目前说法不一，但据估计有超过四十名受害者不幸遇难。\n\n枪手的动机仍在猜测之中，但他遍布全身的自残伤痕表明其存在严重的精神健康问题。此外，他在燃烧瓶上写下的嘲讽性文字，如\"在地狱里燃烧吧！\"和\"无论如何都要温暖！\"，也为调查提供了线索。\n\n目前，枪手的家人正接受严厉质询，地方当局也正对本地的网络活动进行深入排查，以寻找任何同情枪手的人，或其与煽动此类暴力的网络群组是否存在潜在联系。\n\n美国联邦调查局指出，近期的调查得出一项结论：全美范围内，怀有此类反社会思想的人数远比他们最初预想的要多。\n\n广告之后，我们将为您带来后续报道。"
 nss.45.a: "哇哦，迪士尼要拍新电影啦！"
 nss.46.t: "血腥惨案震惊全国！"
 nss.46.d: "新英格兰地区的一场街头节庆活动迅速演变为一场血腥惨案。一名二十四岁的男性驾驶一辆黑色卡车冲入人群，肇事车辆在撞入一家咖啡馆后停下，车身上用喷漆涂有\"淹没世界\"、\"吃屎去死吧\"以及其他亵渎性文字。枪手迅速从卡车上下来，手持步枪，其唯一的意图就是尽可能多地杀人。\n\n枪手的意图显而易见，他用靴子踩踏伤者的头部，并含混不清地尖叫。据报道，他当时双眼充满血丝，动作痉挛抖动。\n\n警方力量抵达现场，在将枪手逼退至一家便利店后，迅速将其孤立并当场击毙。当局声称，枪手进行了强烈抵抗，警方因此采取了致命应对措施。此次袭击的死亡人数已近七十五人，另有至少十二人受伤，主要的死亡原因是卡车撞击。\n\n当局尚未确认枪手的动机，但暗示作案者当时可能正受到酒精及多种精神类药物的严重影响。他们承诺，一旦有更多信息得到证实，将向公众披露。\n\n其他新闻方面：联邦政府自豪地宣布，将扩大公共场所的无枪区范围。在此之前，由于政府加强了对枪支所有权的管制，全国范围内的枪支回购活动取得了远超以往的成功。"
 nss.46.a: "好吧，但我想要看《老友记》，换台。"
 nss.47.t: "袭击灼伤美国灵魂！"
 nss.47.d: "当地一家加油站发生猛烈爆炸，陷入一片火海。有目击者称，一名嫌疑人当时正手持霰弹枪在附近，向任何未被爆炸波及的人开火。\n\n一名二十六岁的男性携带数枚管状炸弹，对当地民众展开疯狂袭击。他将爆炸物投向附近的商店和建筑，所到之处留下一片血腥狼藉。\n在当地执法部门迅速上前围捕之际，袭击者引爆了藏在连帽衫下的炸弹背心，当场身亡。\n作案者的动机在很大程度上尚不明确，但其亲属就他的过往发表了声明。据称，他长期自我孤立，并表现出极度偏执的迹象。这似乎是席卷美国的精神健康危机所导致的又一例悲剧。\n\n袭击造成的死亡人数仍在统计中，但官员表示，遇难人数恐达百人甚至更多。官方已承诺，一旦掌握更多信息，将立即向公众通报。\n\n其他新闻方面：据报道，佛罗里达州海岸附近的风暴活动有所增加。由于目前并非风暴季节，专家们对此似乎感到困惑。当局建议居民密切关注官方渠道，以获取任何关于潜在自然威胁的信息。"
 nss.47.a: "这些人是从工厂里生产出来的吗？"
 nss.48.t: "一元店袭击事件引发暴力连锁反应！"
 nss.48.d: "最初被认为是一起武装抢劫的案件，迅速演变成了远为恶劣的事件。\n\n据目击者称，一名二十一岁的女性进入佐治亚州的一家\"一元树\"商店，在店员来得及做出任何反应前，她便一边像野兽般嚎叫，一边用自动步枪击中了店员的胸部。随后，她在杀害了四名顾客后走出商店，开始朝建筑物和人群随机开火，最后退入一座废弃的购物中心内。\n\n当地方当局抵达现场并试图搜查该购物中心时，他们发现枪手并非独自一人。她与其他五名同伙一起，向在场的警力猛烈开火。\"一元树\"商店的袭击，很可能是为了引诱警方进入这场枪战圈套的诱饵。\n作案团伙持有重型武器，但在特警队抵达现场后被迅速消灭，六名枪手全部被击毙。\n\n当局称，此案背后很有可能涉及一个更大的组织，但目前尚无定论。此次袭击已造成约三十人死亡，宪兵部队已被部署到该地区，以防范任何其他潜在威胁。\n\n广告之后，我们将为您带来更多后续报道。"
 nss.48.a: "为什么偏偏是一元店呢？"
 nss.49.t: "美国枪击案！"
 nss.49.d: "恐怖的阴影再次笼罩全国，一名\"独狼\"式袭击者在当地某处发动了枪击。枪手很快被当场击毙，但袭击已导致数十人遇难。地方当局指出，该枪手有长期的精神病史、用药史以及家庭问题。\n\n目前，关于枪支来源及潜在作案动机的调查仍在进行中，当局承诺将就此次袭击召开正式的新闻发布会。\n\n对美国而言，这又是悲惨的一天。广告之后，我们将为您带来更多报道。"
 nss.49.a: "我讨厌广告。"
 nss.50.t: "独狼情报"
 nss.50.d: "本文件阐述了如何向易感对象施加压力，以促使其针对普通民众发动\"独狼\"式行动。其最终目标是在全国范围内散播焦虑，直至民众对美利坚合众国加强监视与安保措施的行为不再有任何抵触。\n\n对象筛选标准：\n在施加压力前，目标对象必须满足以下标准：\n-必须有反社会倾向。\n-年龄必须在十六至二十八岁之间。\n-对象必须在互联网上有活动踪迹。\n-对象必须与家庭关系紧张。\n-对象必须有精神健康方面的困扰。\n\n压力施加规程：\n在确定潜在候选人后，必须对其施加适度的压力。\n手段包括：通过诱饵团体/个人施加社交媒体压力，以及助长其偏执倾向。鼓励引导对象使用药物，但此项为可选项。\n\n装备供给：\n一旦确认对象将成为\"独狼\"事件的催化剂，若其无法依靠自身力量获取枪支，则鼓励动用诱饵团体/个人为其提供相应装备。\n\n事后处理：\n在\"独狼\"事件结束后，建议清除任何可能牵连到我方行动人员的踪迹，并可安排诱饵网络中的外围人员被逮捕，让他们为促成\"独狼\"事件承担罪责。"
 nss.50.a: "第1页（共30页）"
 nss.51.t: "美网诞生"
 nss.51.d: "长期以来，互联网言论不受管制的特性，一直被视为社会动荡的诱因之一。战前当局未能有效应对信息时代的转型，这被评估为治理上的一项重大失败。\n\n为纠正此项缺陷，\"美网计划\"已获准实施。该计划借鉴了国内外的技术专案，在一个加速的开发周期内，构建了一套全面的数字内容收容架构。此系统在效能上参照了中华人民共和国的类似架构，并融入了美国自身的技术创新。\n\n向受管控信息生态系统的过渡，将于凌晨0400时开始。所有民用互联网流量将被路由至联邦控制的节点，并接受实时监控。未经授权的外部连接将失效。国内内容的传播将遵循自动化与人工审查双重协议。\n\n授权文件已最终定稿，并已提交进行最终行政审批。项目总监的签署是全面实施前所需的最后一道程序。\n\n基础设施已准备就绪。人员已各就各位。我们静候指令。"
 nss.51.a: "美网已上线。"
 nss.52.t: "深层地下军事基地项目重启报告"
 nss.52.d: "中情局/情报界内部简报摘要\n主题：D.U.M.B.项目重启报告\n密级：绝密//禁止向外国公民公开\n\n摘要：\n继前美利坚合众国的敌对行动停止后，作为一项持续性战略应急计划的组成部分，中央情报局已重新取得对部分\"深层地下军事基地\"（D.U.M.B.s）的监管权。\n\n根据此前的多份情报评估，美军的D.U.M.B.网络，无论是在应对国内叛乱还是外部干预时，均代表着一项重大的战略资产。鉴于内战后不断演变的安全局势以及确保关键国家安全资产的必要性，中央情报局已启动针对部分精选D.U.M.B.设施的全面重启计划，并着手建造额外的设施。\n\n既有设施完好度报告：\n丹佛国际机场D.U.M.B.：因定向爆破而遭受重大结构性损坏；所有进出隧道均已受损；据估计，60-70%的储存物资已损失。\n\n杜尔塞D.U.M.B.：地震不稳定性及洪水已损坏基地大部分区域；整个建筑群约45%的区域仍可进入。\n\n51区D.U.M.B.：地面设施（格鲁姆湖空军基地）完全损失，地下建筑群因部分淹水而受损；剩余基础设施和档案材料正在进行回收评估。\n\n夏延山综合设施：因曾被叛乱分子占领，结构受损有限；该设施曾被亲特朗普分子短暂控制，后由特别行动部队以可接受的损失夺回。资产保全评估显示，物资完好度为85%。地下设施的扩建正在战略考量中。\n\n乌鸦岩山区综合设施：由于其强化的外围防御和行动人员的高度保密，在敌对行动期间始终保持安全。未报告重大损坏或资产损失。地下设施的扩建正在战略考量中。\n\n气象山综合设施：未报告损坏。地下设施的功能得以维持。地下设施的扩建正在战略考量中。\n\n结论：\n尽管损害评估与资产回收行动仍在进行中，但兹建议，应将D.U.M.B.设施的全面重启计划作为优先事项予以启动。"
 nss.52.a: "已获授权。"
 nss.53.t: "重建两党制"
 nss.53.d: "若说共和党的形象因特朗普的叛国行径及随之而来的内战而蒙羞，这还是一种极为轻描淡写的说法。这个党派曾是保守主义与所谓\"沉默的大多数\"美国人的代名词，如今却与反叛和通敌联系在一起。民粹主义势力对它的绑架，在特朗普灾难性的领导以及共和党叛乱中那场对抗美国统一的血腥斗争中达到顶峰，最终使其名存实亡。即便内战的尘埃落定，显而易见的是，曾经我们所熟知的那个共和党，已无可救药。\n\n然而，两党制在那些深谙此道的精英们看来，对其最终目的极为有利。一项大胆的战略正在成形：修复共和党的品牌，同时确保一个新的、顺从的共和党能成为民主党可靠的陪衬。其目标很简单：将异议引导至一个安全、可控的政治容器中——一个对既有秩序不构成任何威胁的容器。\n\n这项计划采用了一种精心的\"记录抹煞\"手法，同时围绕着一种亲建制派的愿景，塑造一套全新的叙事。一度近乎绝迹的新保守主义者和\"永不挺川\"运动的复兴，如今正决定着该党的未来，而整个战略的关键，就在于他们是否有能力以一种易于大众接受的方式，重新包装共和党。这包括让新的共和党与特朗普的政治遗产划清界限，强调其对小政府和个人责任等核心保守价值观的承诺，同时确保该党既不会冒犯精英阶层，也能取悦普通选民。\n\n一场旨在修复公共关系的运动就此展开：清洗潜在的\"MAGA\"同情者，以复兴旧日的共和党，并重申两党制的地位。新保守主义者将领导这个新的政治世代，并被期望与民主党人暗中合作，在压制异议的同时，只保留那些被认可的选项。精英们的最终目的，是重建一个仅充当门面的共和党，一个掩盖真实权力的幌子，以维系选择的幻觉，从而保持他们不可动摇的控制权。主流新闻媒体的评论文章将会赞扬那些在危机期间与拜登站在一起的共和党人，将新保守主义者颂扬为帮助恢复政治理性的英雄。这套叙事将此次复兴描绘成回归常态，是民主战胜民粹的凯歌，它强调团结，同时将激进主义塑造成对国家愈合的危险威胁。"
 nss.53.a: "一如既往，大众总是渴望被愚弄。"
 nss.54.t: "波多黎各、哥伦比亚特区并入联邦"
 nss.54.d: "（美联社华盛顿电）——美国国会已悄然通过《波多黎各联邦与哥伦比亚特区准入法案》，授予两者州级地位，从而实现了其民众长久以来的夙愿。拜登总统已宣布全力支持该法案，并将在未来数日内签署使其正式生效。\n\n此举是本届政府致力于弥合美国本土与其海外领土之间日益扩大的分歧所做的努力之一。波多黎各人民长期以来被许多美国本土人士视为二等公民，今后他们将无需居住在美国本土便能参与国家政治；而哥伦比亚特区在经历数十年的游说后，也终将在联邦政府中获得代表权。总统将此举视为\"弥合困扰我们伟大国家之分裂\"的\"关键一步\"。\n\n随着该法案的通过，合众国的州总数将增至52个。这将在参议院增加四个席位，且普遍预计将由民主党人获得。共和党议员将他们在此事上的让步称为一项旨在促进国家在分裂中愈合的\"善意姿态\"。相关政府机构业已批准向52星国旗的过渡方案，预计将在未来几年内完成更换工作。"
 nss.54.a: "更完美的联邦。"
 nss.55.t: "湮没于世"
 nss.55.d: "他躺在病床上，身上插满了管子，连着冰冷的机器，度量着他的心跳，监测着他的呼吸。\n约瑟夫·拜登被困在自己的身体里已经有一段时间了。从宏大的时间尺度上看，这或许不算长久，但对他而言，却感觉像一个永恒。\n他能意识到一切，却又无能为力；他必须感受一切，还要忍受看护者鄙夷的目光和无情的嘲弄。\n这是一种疯狂，一场永不结束的折磨。\n\n今天有些不同。他看见了伯恩斯那张熟悉的面孔，他正对一名护士点头低语，同时严厉地看了拜登一眼，随后才带着一丝敬意朝他颔首，走出了房间。\n他周围的机器开始发出异响。护士避开他的目光，将什么东西注入了他的输液袋。\n\n起初是一种解脱感，但紧接着，墙壁开始融化。\n墙上描绘自然的画作，变成了野兽互相吞噬的场景。窗户开始开裂，护士发出沉重的喘息，直到她倒在地上，发出一声沉闷而湿腻的巨响。\n病房不再是病房，而是一片覆盖着蓝色野草的广阔田野，远处孤零零地立着一栋房子。\n房子着火了。\n远处，拜登看见一个身影走过，那是一张熟悉的面孔。\n\n\"博？\"拜登想。\n但这终究只是思绪。他依旧无法动弹，也无法言语。\n被困在一个他无法识别的世界里。\n被困在一个随着他感知到某种异物临近，而缓缓沉入黑暗的世界里。\n\n他抬起头，天空也变得漆黑。日轮隐去，唯余一抹狞笑悬于空中。\n\n为什么……这么黑？"
 nss.55.a: "有人在吗？"
 nss.56.t: "联合国关于维护世界和平完整及不可侵犯性之宣言"
 nss.56.d: "纽约（美联社电）——在标志着全球稳定新纪元的里程碑式会议上，联合国大会一致通过《世界和平完整及不可侵犯性之宣言》，正式完成国际安全体系的全面重组。该决议承认美国在扩大授权的和平战略联盟框架下，成为全球秩序的\"最高守护者\"。在此框架内，\"地区危机\"与\"区域争端\"现归联盟直接管辖，实现全球安全监管中央集权化。宣言明确规定，任何\"流氓国家\"或\"破坏稳定势力\"对联合国权威的挑战都将引发国际协同干预，此举成为联合国成立以来全球安全治理最彻底的整合。\n\n总统在电视讲话中表示：\"这份宣言标志着我们共同迈向全球稳定的重要一步。在焕然一新、基于规则的秩序中，法治而非弱肉强食的丛林法则将占据至高地位。这一秩序将更加公正、安全，并有能力创造更美好的未来。通过其在和平战略联盟中强化的维和职能，联合国将与美国携手推进全球安全与可持续发展。当我们成功之时——我们必将成功——人类数千年来周而复始的历史循环终将被打破，真正彰显人类共同价值与原则的世界新秩序即将到来。\"\n\n防务分析家称该协议宣告了主权军事行动的终结，开启了\"强制性集体安全\"时代。决议要求建立全球情报融合中心，统一联盟交战规则，并在战略要地设立常设基地。"
 nss.56.a: "历史再次终结。"
 nss.57.t: "未入账的资金"
 nss.57.d: "我们陆续收到关于黑色预算的异常报告，多项项目与倡议资金出现不明缺口。\n\n这类情况通常属于行政疏漏，但由于与2001年行动模式高度相似，我们怀疑存在恶意操纵。\n资金失踪的幕后操纵者很可能并非出于私利，而是企图借此破坏我们的议程。\n\n建议密切关注两类迹象：一是反社会团体是否突然装备精良或行动升级；二是内部人员间的异常联络，因为贿赂行为可能性不容排除。\n尽管这些资金缺口易于填补，但内部人员正在策划行动的事实，已足以敲响警钟。"
 nss.57.a: "资本的利刃转向了我们。"
 nss.58.t: "沸水煮青蛙"
 nss.58.d: "\"看来他没能挺过去。\"\n威廉·J·伯恩斯在五角大楼的走廊里边走边说，身旁跟着几名同事和安保人员，这天原本还算平静。\n\n\"确实没有，他血液中的毒素指向针对性谋杀。\"\n\"有线索显示幕后黑手吗？\"\n\n\"问题是这种毒素主要由我们使用，所以法国人指责我们暗杀了他们的外交官。\"\n\"我从未批准过行动。\"\n\"您确实没有，长官。\"\n\n伯恩斯皱起眉头，想起先前与黑色预算相关资金失踪的事件。无论潜伏在阴影中的是谁，此人必然拥有同伙和充足经验。\n\n\"尽量挽救与法国的关系，并安排咨询委员会会议。\"他还想多说，但扫视周围人群后选择了沉默。\n\"我马上去办，长官。\"\n\n伯恩斯思索着这个叛徒究竟意欲何为，而此次外交事件或许揭示了其目标。这个发现让他深感不安。"
 nss.58.a: "破碎的面具，或许再也无法修复。"
 nss.59.t: "萨凡纳河基地事件"
 nss.59.d: "一份紧急报告已呈递至政府高层。位于萨凡纳河的核材料管理与研究基地近日遭遇非法入侵事件。\n\n事发初期一切如常，直至与该设施失联后，调查发现这座基地遭到了名为\"秃鹫\"的反社会团体袭击，这个无政府主义组织原本在我们的监控名单上优先级极低。值得注意的是，袭击方伤亡惨重，但其行动显然不以破坏为目的：有小股人员成功撤离了现场。\n\n事后调查报告显示，基地内部分核材料及相关研究资料不翼而飞，这充分表明该组织的袭击具有明确针对性。更令人警惕的是，这些无政府主义者装备精良，竟能远超预期地抵挡住特种作战小队的突击。\n\n现有证据表明，该组织显然受雇于某个未知第三方势力，关于委托方的具体情报仍在追查之中。"
 nss.59.a: "这超出了我们的想象。"
 nss.60.t: "资产错置"
 nss.60.d: "报告落在了伯恩斯局长的桌上，发出沉闷而决绝的声响。这份灰扑扑的薄文件夹看似普通，却仿佛能吞噬办公室里的光线。封面上用黑色粗体印着《资产错置——内部账目差异》，措辞虽温和，背后蕴藏的意味却无异于大难临头。\n\n伯恩斯摆手屏退助理，目光已锁定首页。根本无需细读。账目差额触目惊心。原本拨给德州南部新型\"改造处理中心\"基建工程的资金，经过层层空壳账户的迷宫转移后，如同晨雾般消失得无影无踪。\n\n但流失的不仅是资金。大都会计划的首席物流师突然失踪，缉毒局那位拥有高级权限的资深核科学家三天前也未现身。她的公寓已被清空，抹去所有生活痕迹。\n\n伯恩斯熟悉这些手段，因为他曾参与设计这套流程。这些绝非偶然事件，而是深谙系统架构与漏洞的内行人所为。\n\n他想起那份警告备忘录。就像任何遭寄生虫侵蚀的肌体……\n\n伯恩斯断定，这寄生虫不止在吸血，更在筑巢。资金、专家、数据——都成了对方构建新武器的原料。这支毒箭正瞄准他们苦心建立的秩序核心，那个叛徒如同忙碌的异端信徒正蚕食根基。\n\n他向后靠去，皮质座椅在重压下发出呻吟。窗外景色井然有序，但在修剪整齐的草坪与防护网之外，他几乎能嗅到腐败正在蔓延——就像某个细胞突然癌变，叛徒正用他们的秘密武装自己。\n\n伯恩斯拿起加密电话，声线低沉平稳：\"接芬克。还有汤普金斯……\""
 nss.60.a: "\"告诉他们我们这里出内鬼了。\""
 nss.61.t: "发射代码访问尝试！"
 nss.61.d: "\"那么，有线索了吗？\"威廉·J·伯恩斯并非轻易紧张之人，但听闻内部数字网络遭遇攻击的消息仍令他忧心忡忡。\n\n\"没有进展，长官。攻击者曾试图获取导弹发射代码的访问权限，我们已将其驱逐出网络系统。目前难以精确定位攻击来源，但确定无疑源自国内。\"\n\n五角大楼已全面进入高度警戒状态，偏执的氛围几乎触手可及。文职人员与安保人员彼此投以高度怀疑的目光，协作配合充其量只是勉强维持。\n\n\"他们得手了什么数据吗？\"伯恩斯问道，他已连续数日未能安眠。恍惚间他总觉得叛徒就在人群中，但那身影总在变幻，始终无法触及。\n\n\"这正是问题所在，长官。\""
 nss.61.a: "\"我们尚不清楚。\""
 nss.62.t: "弹头不知所踪"
 nss.62.d: "联邦政府的内部运作正承受着巨大压力，每一分钟的流逝都像是炉火烧得滚沸的水，温度持续攀升。\n共事数十年的同僚如今相互审视的目光，仿佛突然发现了对方衣橱里藏了一具尸体。而今日的事件表明，我们正在逼近沸点。\n\n在对导弹基地进行常规检查时，我们震惊地发现数枚核弹头不翼而飞。更令人不安的是，这并非单一基地遭袭，而是多个基地同时遭遇了协同盗窃。\n所有相关设施人员及其家属正在接受密集审讯，同时我们正密切监控全球黑市，搜寻失踪核弹头的交易线索。\n\n此事何以发生仍在调查中，但可以确定的是，窃取核弹头的叛徒必定意图使用这些武器。若不能妥善应对，局势将迅速恶化。"
 nss.62.a: "达摩克利斯之剑。"
 nss.63.t: "潜艇进入阵位"
 nss.63.d: "\"它们怎么了？\"\n威廉·J·伯恩斯向来不是会高声说话的人，更别提尖叫了，但得知数艘此前报告失踪的潜艇重新出现在大西洋各处、正驶向未知地点时，他声调的提高完全在情理之中。\n\n\"这些潜艇配备了近期失踪的核弹头，我们判断它们正在等待指挥者的指令。\"\n\n\"拦截行动很可能会促使它们直接开火。关于我们重点关注的那个目标有什么消息？\"\n\"没有进展，长官。\"\n\"出去，没有进展就别回来。\"\n\"明白，长官。\"\n\n伯恩斯向后靠在椅背上，但丝毫感受不到放松。\n那个叛徒总能从他视线中消失，总能在天罗地网中隐匿行踪，如今更是变得肆无忌惮。他付出的一切努力都可能毁于一次核打击。绝不能让这种事发生。"
 nss.63.a: "没多少时间了……"
 nss.64.t: "导弹基地失控"
 nss.64.d: "潜艇事件发生后，导弹基地很可能成为下一个目标。当我们试图联系现场人员时，通讯已完全中断。\n\n我们只能做最坏打算。目前多个特种作战小组已包围相关设施待命，但由于局势极不稳定，我们绝不能贸然强攻。无论叛徒掌握了什么，只要我们能定位并抓捕目标，就一定能夺回控制权。\n\n时间非常紧迫。搜寻目标耗时越久，我们为实现愿景付出的所有努力就越可能付诸东流。"
 nss.64.a: "秩序之心猛烈搏动。"
 nss.65.t: "巴西利亚政变"
 nss.65.d: "在巴西利亚，一场针对现政府的军事政变已推翻当前政权，建立了过渡性军政府。政变方指责前政府政策\"威胁民主\"并导致\"不稳定因素加剧\"。该军政府已获得美国国务院的合法性承认，美国总统致函新军政府，赞扬这个与美国有着深厚友谊的国家\"恢复了秩序与和平\"。\n\n由军方领导的巴西利亚新政权承诺将恪守民主治理原则、尊重人权并遵循法治。由武装部队高层组成的过渡当局重申，将在合理时间框架内举行透明选举。\n\n《纽约时报》采访中，美国国务院发言人确认正密切关注巴西局势，并与过渡当局保持建设性对话。该发言人强调美国支持和平有序的权力过渡，并表示若新政府提出请求，美国政府已做好准备协助巴西人民实现民主稳定与繁荣。"
 nss.65.a: "重归我们羽翼之下。"
 nss.66.t: "俄罗斯的重建"
 nss.66.d: "任何野蛮文明都会因除灭劲敌而欢欣鼓舞，尽管参与削弱俄罗斯行动的众人难掩喜悦，但我们不会流露出丝毫得意。\n\n俄罗斯这片土地始终深陷专制主义的泥潭，无论是严酷环境的生存压力还是绵延不绝的内斗传统都造就了这一点。我们并非是要指责他们的所作所为，只是其手段之中确实缺乏精妙之处。不过这已无关紧要，毕竟美国坦克首次碾过红场，随之涌来的还有被俄罗斯民众视为异端的新思潮。\n\n随着俄企被我们逐步吞并，其反对派势力日渐壮大，必须尽快确立新俄罗斯的代言人，否则民族主义的火焰必将重燃。\n\n米哈伊尔·鲍里索维奇·霍多尔科夫斯基虽身负争议，但他在政治绞杀中全身而退的生存智慧值得赏识。失去西伯利亚油田股份后，这位寡头无疑对其旧敌积怨已深。由他执掌俄罗斯权柄，方能确保两国持久和平。"
 nss.66.a: "削掌之熊。"
 nss.67.t: "中国的重建"
 nss.67.d: "任何企图跻身已被占据地位的国家，终将引火烧身。中国不过是又一个排队尝试却注定失败的后来者。\n\n对华战争异常惨烈，他们龇牙咧嘴负隅顽抗，但正如所有狂吠撕咬的疯犬，终究会崩碎牙口。\n经过漫长战役，解放军日益感受到美军施加的重压，而这支军队显然不是为对抗世界警察而打造的。\n\n解放军倒戈相向已成定局。随之而来的政变中，主动与我们接触的是刘亚洲。这位素来敢于批评中共的将领目睹节节败退的局势，做出了寻求和平解决途径的理性抉择。\n\n随着和平降临，在我国协助下展开中国政府重组与资源重整的重建工作。\n击败中国这头庞然大物实非易事，但在美国主导的和平秩序下，这样的结局早已注定。"
 nss.67.a: "巨龙再无腾飞之日。"
 nss.68.t: "鲜血"
 nss.68.d: "兰利总部的会议室浸没在显示器的冷光中。加密信道如迷宫般蜿蜒——从苏黎世到新加坡，再经由层层暗服回传。屏幕那端正式世界经济论坛年度会议间隙的秘密集会，全球资本的建筑师们正在阴影中密谋。主屏幕上，克劳斯·施瓦布身体前倾，带着家长般的关切神情。简短问候在场人士后，他直指核心问题：维持稳定不仅需要军事行动，更需要构建可预测的未来框架。\n\n\"世界经济建立在美国奠定的基石之上，\"施瓦布流畅地说道，\"如今这块基石已经破裂。投资者需要知道……替代方案是什么？\"\n\n伯恩斯局长沉吟片刻。他深知全球经济稳定不能仅靠军事胜利——战后蓝图必须即刻明确。塔心中已有若干方案，需要向论坛主席阐明最具可行性的一项。\n\n\"我们将自上而下重建美国，使其更强大，更具韧性——由最胜任的精英领导。民粹实验将永久终结。由学术界、产业界和政府的顶尖人才共同构建的理性治理新模式将取而代之。\"\n\n\"达沃斯模式的国家化实践。\"施瓦布回应道，语气带着些许赞肯，但仍存一丝疑虑，\"但要执政必先征服，宪政派叛军仍控制着大片领土。\"\n\n伯恩斯点头：\"我们正用经济压力绞杀丹佛政权，他们的防线已出现裂痕。此外我们已制定方案，力求在战争结束时将动荡降至最低。\"\n\n芬克倾身补充：\"平稳的权力过渡在军事和经济层面都至关重要。胜利之时我们必须立即全力运转。经济复苏计划将确保美国保持全球竞争力，即便初期产能有所缩减。\"\n\n\"很好，很高兴你们意识到这点。\"施瓦布向后靠去，\"‘民粹毒瘤’是全球性问题，‘大重构’是我们的机遇。若美国能树立典范，我们便能重振理性。但这场冲突需要迅速果断的终结。\"\n\n伯恩斯局长颔首回应：\"请放心，施瓦布先生，我们正采取一切必要措施确保实现这一目标。\""
 nss.68.a: "秩序，资本，纯洁"
 nss.69.t: "战情室"
 nss.69.d: "在戒备森严的会议室里，战争走向悬于一线。主屏幕上，分裂的美利坚地图泛着不祥的幽光，斑驳色块勾勒出分崩离析的国境线。服务器低鸣与加密通讯线路的杂音刺破寂静，满屋的军情要员正传递着前线最新战报。\n\n\"总统状况稳定。\"国家安全顾问杰克·沙利文打破沉默，紧绷的声线泄露出当前困境的压力，\"医疗镇静措施持续生效。至于他正坐镇白宫英勇指挥战事的官方说法，目前仍维持不变。\"\n\n国防情报局长杰弗里·A·克鲁斯伸指重重点向地图：\"问题不在于说辞，而在这里！\"他指向丹佛区域，\"宪政政府正在东海岸强势推进。叛徒弗林将军掌控着多支陆军和国民警卫队旅，更别提大量极端民兵组织。他们企图突破当前防线。\"\n\n中央情报局行动副局长戴维·马洛从阴暗角落现身插话：\"正是常规思维让我们陷入困境。当米利将军的部队陷入消耗战时，我的特工能果断终结这场攻势。让我实施斩首行动。\"\n\n黑石集团CEO、实际代表世界经济论坛的拉里·芬克当即表态：\"当务之急是控制经济影响，任何秘密行动都必须考虑这点。\"\n\n克鲁斯向芬克投去锋利的目光：\"国家存亡危在旦夕，你的投资组合不值一提。\"芬克立即反唇相讥\"国家稳定\"的重要性，马洛则冷笑着指出此刻奢谈\"国家稳定\"根本自相矛盾。\n\n伯恩斯局长伫立长桌尽头。全美五十州——至少是残存的部分——都在他的肩上担着。\"全知者\"，这个临危成立的精英决策层注视着他，他的抉择将决定数百万人的命运与战争走向。局长审度着每个选项......"
 nss.69.a: "批准克鲁斯的计划"
 nss.69.b: "执行马洛的计划。"
 nss.69.c: "芬克是对的。"
 nss.70.t: "隔窗窥影"
 nss.70.d: "五角大楼地下指挥中心一片繁忙景象。军官们审阅着战报，参谋们在办公桌间穿梭往来。参谋长联席会议主席米利上将因紧急事务召见了伯恩斯局长。\n\n米利将军面容疲惫，语气凝重。他指向屏幕上的宪政派前线态势图说道：\n\n\"局长，我们已经锁定克里斯托弗·卡沃利中将的位置。国安局的信号情报与其指挥体系内部线人的消息相互印证。这位前线总指挥官不仅魅力非凡、才能出众，更重要的是——他如同黏合剂般凝聚着数个旅级战斗队和民兵单位。‘靠前指挥’的风格令他声名鹊起，也让他过于接近我军防线。他是西线战场最大的威胁。\"\n\n国家安全顾问杰克·沙利文补充道：\"卡沃利可能成为当代的巴顿或隆美尔。若能除掉他，敌军区域指挥系统将陷入数月瘫痪，这或许会成为西线战事的转折点。\"\n\n伯恩斯局长凝视地图，眉头紧锁：\"若卡沃利真如诸位所言，那就必须采取行动。\"\n\n\"但他的指挥中心由多层一体化防空系统保护，\"米利继续汇报，\"常规空袭难以奏效。我们有两个可行方案，更复杂的行动就需要中情局的专业能力了。\"\n\n沙利文点头道：\"丹佛方面有人忌惮他晋升过快，视其为弗林将军的政敌。我们可以利用这种情绪策动清洗行动。不过宪政派行事难以预料，可能适得其反。\"\n\n\"或者用B-52在防区外发射碉堡克星导弹，\"米利提出替代方案，\"问题在于指挥中心毗邻居民区，可能造成大量平民伤亡。\"\n\n沙利文插话：\"那种场面……确实难看了些。\"\n\n伯恩斯局长权衡着每个方案的利弊得失，此刻卡沃利的命运就掌握在他的决断之中。"
 nss.70.a: "发射碉堡克星导弹。"
 nss.70.b: "利用渗透者。"
 nss.70.c: "煽阴风烧阴火。"
 nss.71.t: "落基山脉的涟漪"
 nss.71.d: "知情者们对放弃直接打击卡沃利将军、转而采取心理战的决定陷入了沉默的思量。虽然没有立竿见影的实质性胜利，但猜疑的种子已然播下。在伯恩斯的指挥下，中情局信息作战处精心伪造了一系列通讯记录、加密信息和财务文件。这些旨在暗示卡沃利将军正与华盛顿秘密协商单独媾和以换取特赦的文件，通过丹佛政府网络深处被渗透的渠道悄然泄露。\n\n\"初步的情报反馈令人鼓舞。\"一名通讯分析师指着丹佛内部安全部门与高层指挥部之间激增的加密通讯流量报告，\"他们正在追查幻影。卡沃利在高层中的盟友正在接受审查，将军本人已被软禁，等待叛国罪审判。这可能会影响他们在该地区的士力和指挥稳定性。\"\n\n\"虽不及直接斩首行动的预期效果，但我们确实给他们的战争机器扔进了扳手。\"中情局行动副局长马洛表示赞同，\"他们现在开始内耗，正在加倍进行对特朗普的忠诚度测试。\"\n\n米利将军不以为然地哼了一声：\"且看这把‘扳手’能否挡住装甲洪流再说吧。\""
 nss.71.a: "行动成功。"
 nss.72.t: "掩体粉碎机"
 nss.72.d: "伯恩斯语气沉稳地说道：\"将军，‘孤鸽行动’已获批准。执行B号方案。\"\n\n米利将军神色凝重地对着通讯器点头：\"天火指挥部，这里是奥林匹斯。孤鸽行动启动。重复，孤鸽行动启动。向指定目标投放载荷。\"他转头看向全息地图：\"一架B-52同温层堡垒已在友邦领空待命，一分钟后将向西进发。预计两小时后抵达目标。\"\n\n沙利文不安地挪了挪身子：\"局长，他们的宣传机器肯定会借题发挥。会把我们描绘成轰炸自己国土的恶魔，这反而会助长他们招兵买马的势头。\"\n\n伯恩斯局长闻言几乎纹丝不动：\"他们早就把我们给妖魔化了，\"他背对地图答道，\"随他们去吧。杰克，这无关民心向背，而是灭绝之战。要让腹地听见我们决心的雷鸣，让他们的将军明白即使躲在地堡里也难逃天罚。武力是他们唯一能听懂的语言，而我打算用他们不得不懂的方言对话。\"\n\n米利将军俯身低语：\"容我说句实话，局长：您真有魄力。\"\n\n马洛随即表示：\"我会确保国务院保持警戒，尽量减轻后续冲击。\"\n\n局长颔首：\"务必落实，马洛。\""
 nss.72.a: "行动成功。"
 nss.73.t: "毒药"
 nss.73.d: "伯恩斯的决定带着资深情报官特有的冷静算计。指令通过加密渠道传递，从五角大楼地下指挥中心经安全卫星链路，最终抵达潜伏在卡沃利将军高层指挥圈的特工手中。没有爆炸，没有壮烈牺牲，只有一场悄无声息、可推诿否认的终结。行动可能引发的连锁反应微乎其微，回报却不可估量。\n\n兰利行动室内气氛凝重。\"包裹已送达，\"你吐出这个不带感情色彩的隐语，\"我们的人确认卡沃利的私人厨师已接手。现在静候佳音。\"\n\n数小时后，加密讯号的闪光划破昏暗房间的屏幕：行动成功。卡沃利已清除。简练，干脆，却具有毁灭性力量。\n\n\"局长，看来‘静默方案’产生了最轰动的效果，\"中情局行动副局长马洛低声说道，嘴角掠过一丝难以察觉的冷笑。局长只是微微颔首。\n\n\"开始准备反制宣传方案。把这件事包装得越像内部斗争越好，\"你指示道。\n\n\"明白，局长。\"马洛略作停顿，\"卡沃利一死，他们的指挥体系必然陷入混乱。我们可以趁机加强攻势。\"\n\n伯恩斯点头：\"我会向克鲁斯和米利传达。干得漂亮，马洛。这或许能扭转西部战局。\"\n\n\"分内之事，局长。\"马洛回应道。"
 nss.73.a: "行动成功。"
 nss.74.t: "作战失败"
 nss.74.d: "中央情报局/情报界内部文件 - 仅限阅览\n主题：克里斯托弗·G·卡沃利\n日期：已删除\n保密等级：绝密//禁止向外国人员披露\n\n目标人物已躲过清除行动。此次行动失败恐将激化敌对势力。我方网络内部潜在泄密事件正在调查中。\n\n此次失败对所有参与人员而言都是宝贵的教训。"
 nss.74.a: "-DB"
 nss.75.t: "大棋局"
 nss.75.d: "自战争爆发以来，这座指挥中心便始终处于高速运转状态。这里充斥着一种井然有序的混乱：数十名人员穿梭往来却互不干扰，副官、命令与文书在办公桌间飞速传递却从未遗失。若有不专业者闯入必会打破这种节奏，所幸在场皆是精英。与这片繁忙景象相隔，有间独立办公室正进行着关键对话，美军参谋长联席会议主席米利将军正向伯恩斯局长汇报战况。\n\n将军指向屏幕上的欧洲战线地图，各国疆域染着不同色调的霓虹红，与之形成鲜明对比的是散落欧洲各地的霓虹蓝，标志着美军控制区。伯恩斯局长凝神审视着图表每个细节，目光如冰封湖面般凛冽。\n\n米利将军的嗓音透着笃定，但晦暗的眼眸却泄露了别样情绪：\"欧洲人的抵抗强度远超我们预期，局长。兰德公司的推演表明，单纯依靠蛮力终将击溃欧洲，但人力与军备的损耗代价惊人。\"\n\n伯恩斯眉头紧锁，全神贯注地捕捉每个字眼：\"发现内部破绽了吗？\"\n\"这正是我请求会晤的原因，局长。欧洲正深陷动荡、内部分裂与基建瘫痪的泥潭。\"米利答道。\n\n他继续阐述：\"德法最高指挥部之间存在严重分歧——无论是种族冲突、领土收复主义，还是无数细微龃龉。我们可以激化这些矛盾，但风险不小。\"\n\"网络攻击亦是可选方案。网络司令部已锁定欧洲网络安全的关键漏洞。持续攻击能瘫痪电网、通讯系统等一切设施。但若操作不当，欧洲人可能察觉并修复漏洞，导致我们徒劳无功。\"\n\n\"最终决策权在您手中，局长。\"米利结束汇报。\n\n伯恩斯局长权衡着每个选项。它们各有利弊与风险，都可能对战局造成损害。但坐视不理，才是最大的罪过。"
 nss.75.a: "分化他们的部队。"
 nss.75.b: "准备对欧洲基建发动大规模网络攻击。"
 nss.75.c: "资助民主自由斗士"
 nss.76.t: "格拉迪欧"
 nss.76.d: "当初决定向欧洲异见人士输送更多武器弹药时，知情者们曾眉头紧锁地提出种种假设：\"若是民众发现我们在支持这些异见者，舆论场面将不堪设想\"，\"这甚至可能助长他们的气焰\"。但几周过去，这些声音已归于沉寂。伯恩斯局长播下的种子正在开花结果。\n\n国家安全顾问杰克·沙利文又一次召伯恩斯局长参加简报会。他指向眼前的屏幕，上面显示着某座城市中心的景象：破碎的玻璃与砖块散落街头，尸体横陈于尘土瓦砾之间。伯恩斯暗忖，这无疑是恐怖袭击的最终现场。\n\n\"中欧夏令时9点，德国莱比锡繁忙的市中心发生爆炸。\"沙利文的嗓音沉稳有力，\"造成29人死亡，200人受伤。\"他继而分析道：\"我认为这是新一波欧洲异见分子实施的又一起袭击——正是我们资助的那些人。过去几天，德法意当局忙于相互指责，有人归咎于新纳粹极右翼，也有人指控是激进左翼制造的恐袭。\"\n\n沙利文切换着画面，每张照片都比前一张更血腥。但这些事件有两个共同点：都发生在最近几周，都给欧洲各国政权造成重创。\n\n伯恩斯专注聆听着每个悲剧细节，审视每张图像。他注意到自己始终未曾眨眼——这些报告与他的预判完全吻合。此刻他确信，自己作出了正确的抉择。"
 nss.76.a: "行动成功。"
 nss.77.t: "烟与镜"
 nss.77.d: "中央情报局信息作战处这次可谓超常发挥。摆在伯恩斯局长面前这份刚刚\"泄露\"给德军高层的文件——无论是每个像素点还是每个措辞——都与真实文件别无二致。若非伯恩斯局长素来明察秋毫，恐怕连他自己都难以识破这份伪造品。\n\n这份关于法国瓜分德国领土的\"作战计划\"精准踩中了所有雷区，彻底践踏了德方底线，堪称德国人最恐惧的噩梦成真。一旦柏林采信这份情报，欧洲盟军指挥系统内部将产生难以估量的裂痕。\n参谋长联席会议主席米利将军在座位上不安地调整姿势，低声盘算着这次行动可能出现的各种纰漏。伯恩斯却始终稳如泰山，静待通讯频道传来第一缕生机。\n\n\"监测到加密频道出现异动，长官。\"身旁通讯分析员的汇报打破了沉寂。\n随后五分钟内，德国国内安全部门与最高统帅部之间的加密通讯频率呈爆发式增长。德方显然怒不可遏——法国竟狂妄到自以为能肢解德国这个念头让他们暴跳如雷。即将召开的紧急会议注定会引发无休止的争吵，与法国\"战友\"之间的友谊桥梁将彻底崩塌。而美利坚合众国，正好坐收渔利。\n\n当米利将军如释重负地长舒一口气时，伯恩斯局长脸上浮现出倨傲的冷笑。\n此刻正是隔岸观火的最佳时机。"
 nss.77.a: "行动成功。"
 nss.78.t: "日蚀"
 nss.78.d: "针对欧洲基础设施的网络攻击已持续六日，第七日将是这场行动的终极时刻。\n周日只是小试牛刀——部分政府网站瘫痪如同投石问路。周一开始全面升级：输油管道停摆，通讯网络中断。但欧洲人始终按兵不动，这种僵持一直延续到决定行动成败的周六。\n\n在美国国家安全局总部深处的密室里，伯恩斯局长紧锁眉头，目光如炬地凝视着巨型屏幕。身旁坐着国安局局长兼美国网络司令部司令保罗·中曾根。\n\"网络攻击进展如何？\"伯恩斯的声音冷峻沉稳。\n中曾根胸有成竹地指向屏幕：\"一切顺利，局长。预计随时能看到成果。\"\n\n指挥中心很快进入高速运转状态。军官们各司其职，通话声与键盘敲击声此起彼伏。\n屏幕上终于显现出战果——整个欧洲大陆陷入漆黑，电网系统被彻底摧毁。唯有点点白光如午夜星辰散落其间，竟透出一种残酷的诗意。若非早已司空见惯，伯恩斯几乎要为这景象动容。\n\n\"不止如此，\"中曾根补充道，\"他们的供水和通讯系统也已瘫痪。\"\n\"欧洲人或许预料到会遭攻击，但绝对想象不到如此规模。他们的战争机器必将遭受重创。\"中曾根露出胜券在握的笑容。\n\n伯恩斯紧绷的肩膀终于放松，转头看向同僚：\"明白了。干得漂亮，局长。\"\n他重新将目光投向屏幕，审视着大陆上每一个生命迹象，开始筹划下一步棋局。"
 nss.78.a: "行动成功。"
 nss.79.t: "作战失败"
 nss.79.d: "中央情报局/情报界内部文件 - 仅限阅览\n主题：欧洲情报行动\n日期：XX/XX/XXXX\n保密等级：绝密//禁止向外国人员披露\n\n针对欧洲政权的拟议情报行动已告失败。此次行动失败可能导致敌对势力进一步联合，共同对抗我方军事行动。\n\n我们必须查明失败根源，以防未来重蹈覆辙。"
 nss.79.a: "-DB"
 nss.80.t: "归乡"
 nss.80.d: "\"我实在没法相信这套说辞。\"\n\n两名美军士兵正在敌军占领的欧洲小镇外围警戒，熟悉的专制气息如今再次笼罩了这片大陆。\n他们驻扎的森林笼罩在浓雾中，远处交火声仿佛与自然世界完全割裂。\n\n\"为何不信？我们曾在此流血牺牲，两次世界大战，更不必说祖辈们的付出。多少先贤抛头颅洒热血？岁月给我们留下多少伤痕？这一切不都如此.…..熟悉吗？\"\n\n\"就像我们曾经来过？\"\n\n\"正是。\"\n\n两位士兵在欧洲的迷雾中持续交谈，他们来过这里，他们的子孙也会再来。这片被血与火束缚的大陆，总在循环着复兴的宿命。在某个平行时空，欧洲或许已被狂人蹂躏，被俄国征服，或被某种无以名状之力湮灭。\n\n\"知道我最遗憾什么吗？\"\n\"什么？\"\n\"早前徒步时没打死那头野猪烤来吃。\"\n同伴大笑：\"你没救了。\"\n\"没办法，这可是我们的传统。\"\n\n夜幕迅速降临，没有人工光源污染的星空纯净如洗。"
 nss.80.a: "\"等一切结束了，我们再回来。\""
 nss.81.t: "全国胜利庆典 - 奥里诺科风暴行动"
 nss.81.d: "随着委内瑞拉有组织抵抗力量的残部在街头化为余烬，美国正式宣告对玻利瓦尔政权的胜利。这份公告发布于委内瑞拉国家武装力量高层——也就是那些未在午夜突袭中被俘的成员——正式投降之后，而执政的统一社会党领导层则纷纷流亡海外。全美各地政府下令举行为期一周的庆祝活动与游行，以表彰\"解放\"这个南美国家的行动者们。\n\n华盛顿特区的街道铺满了红白蓝三色彩旗，奥里诺科风暴行动的凯旋部队沿着宾夕法尼亚大道齐步前进。M1A2艾布拉姆斯坦克与HIMARS火箭发射器并肩轰鸣，昭示着美国压倒性的技术优势。成群的F-22猛禽战机与B-2幽灵轰炸机掠破云层，在挥舞星条旗的狂热民众头顶投下剪影——这些民众的虔诚姿态近乎宗教仪式。这场精心编排的盛况刻意唤起着“沙漠风暴”胜利的记忆，但此次军事行动既未允许媒体随军嵌入，也绕过了国会监督。\n\n在白宫椭圆形办公室，总统在身着礼服的参谋长联席会议成员簇拥下发表全国电视讲话，那些将领脸上镌刻着冷酷的满足。他盛赞“美国南方司令部的英勇将士”“迅速瓦解了威胁加勒比邻国的恐怖主义贩毒政权”。总统的演说绝口不提平民伤亡、对加拉加斯实施的震慑性轰炸，也未提及中情局特别行动处实施的法外处决。\n\n这场胜利阅兵恰逢中美紧张关系升级之际，充分展示了美国的军事肌肉。地缘政治专家与全国媒体将玻利瓦尔政权的迅速溃败视为“重建基于规则的世界秩序”的里程碑。\n\n委内瑞拉临时政府承诺将维护稳定，并与美国及美洲国家组织伙伴合作巩固边境、清剿残余抵抗力量。驻守全国的美军正协助当地部队维持治安，保护关键基础设施免遭叛乱分子破坏。\n\n未来数周内，华盛顿将召开国际会议商讨委内瑞拉国家重建事宜，按照国际政策专家制定的路线图推动其向完全民主共和国转型。"
 nss.81.a: "维和，我们是专业的。"
 nss.82.t: "全国胜利庆典 - 热带雷霆行动"
 nss.82.d: "随着中美洲政权的垮台，涌入美国的难民潮与毒品洪流终于敲响丧钟。在中美洲军队残部向美军南方司令部正式投降、文官政府悄然出逃后，有组织的抵抗已全面终结。这场速胜赢得了各方赞誉。展现团结的国会通过两党联合决议，表彰美军南方司令部将士的英勇无畏及现任政府领导层的卓越指挥。全美各地已按规定举行为期一周的胜利庆典。\n\n在华盛顿特区的街头，爱国民众挥舞旗帜齐声欢呼，脸上燃烧着热忱与爱国激情。B-52轰炸机群以震耳欲聋的声势划破湛蓝天空，其后紧随流线型箭头的F-35战机编队。地面之上，斯特赖克装甲车与布拉德利战车组成钢铁洪流，沿着国家广场有序推进。美军装备与人员尽显雄威，南方司令部将士迈着整齐步伐接受检阅。\n\n这场军事胜利为民众注入了新的乐观信念——这个长期刺痛美国繁荣与安全的痼疾之地终将重归稳定。国务院承诺向中美洲临时文官政府提供支持，同时美军将驻守当地直至边境安全与和平保障完全落实。移民与毒品危机的阴霾即将散尽，这个长期被腐败与暴力侵蚀的地区正迎来进步的新篇章。\n\n临时设立的\"美国南方司令部临时管理机构\"将主导向\"有序治理\"的过渡，国际金融专家团队将指导经济重建与结构调整。总统已向所有参与方及为美洲安全繁荣奋不顾身的英勇将士致贺。"
 nss.82.a: "维和，我们是专业的。"
 nss.83.t: "全国胜利庆典 - 哈瓦那缉毒行动"
 nss.83.d: "随着古巴革命武装力量的崩溃及后续共产主义政权的垮台，美国国防部已宣布在该岛取得胜利并正式结束敌对状态。由于古巴军队高层多数被俘或阵亡，政府领导层集体流亡海外，有组织的抵抗已实际终结。国会通过两党联合决议，表彰美军南方司令部的军事领导才能，庆祝这场速战速决的胜利。整整一周，全美按指令举行了庆祝活动。\n\n在迈阿密、华盛顿特区和纽约等主要城市，归国部队受到凯旋式的热烈欢迎，街头洋溢着欢庆气氛。国家广场上空，AH-64直升机编队划破长空，V-22鱼鹰运输机载着海军陆战队紧随其后。坦克、自行榴弹炮与最新型作战无人机，连同那些彻底击溃共产主义势力的重型装备一齐亮相。爱国狂欢与钢铁洪流的轰鸣中，人群弥漫着沉冤得雪的快意。\n\n佛罗里达州的古巴流亡群体盛赞这场速胜是迟来的正义，哈瓦那的庆祝活动与华盛顿同步展开。美国各大机场已涌入大量复飞古巴的申请，海外游子们迫切希望与岛上长期隔绝的亲人重聚。\n\n这个岛国如今准备着重返国际社会。战后填补权力真空的临时文职领导层承诺举行自由公正的选举，并全力配合美国将古巴重新纳入全球贸易体系的努力。\n\n美国总统与南方司令部承诺将与文职过渡当局合作，在保障古巴人民安全的同时提供经济刺激方案，助力这个国家迈入21世纪。"
 nss.83.a: "维和，我们是专业的。"
 nss.84.t: "全国胜利庆典 - 沙漠哨兵行动"
 nss.84.d: "随着伊拉克军队彻底溃散及该国军政领导人相继被俘，伊拉克战事已正式宣告终结。美国国会展现出两党团结，通过决议案表彰美军速胜并纪念阵亡将士。国防部下令举行为期一周的庆祝活动，标榜这场中东重大胜利，肯定美国军事力量为伊拉克带来和平的作用。\n\n国家广场再次化作武力展演场，美军坦克、自行榴弹炮、战斗无人机与步兵方阵沿着宾夕法尼亚大道行进，重现古罗马凯旋式。这场由政府主导的庆典已席卷全美主要城市，民众挥舞旗帜高呼爱国口号，欢庆军队班师。\n\n总统嘉奖美军领导层时，强调本届政府致力于构建安全稳定的中东格局，确保伊拉克成为反恐战争重要盟友，对美军涉嫌战争犯罪的指控则未置一词。\n\n智库与地缘政治专家盛赞美军中央司令部运用新型技术既大幅降低己方伤亡，又实现对敌军的彻底击溃。他们声称这场决定性胜利将为重建和平民主的伊拉克铺平道路。\n\n在华盛顿政策专家协助下，巴格达新临时政府组建方案已拟定完毕。美军中央司令部将与文职政府密切配合，确保重建工作快速推进及伊拉克重返国际社会。"
 nss.84.a: "维和，我们是专业的。"
 nss.85.t: "美军进入渥太华"
 nss.85.d: "在特鲁多政府签署《北美安全协议》后，数千名美军士兵进驻加拿大。其任务包括协助加拿大安全部门及皇家骑警维持秩序，并协助逮捕威胁加拿大稳定的\"国内极端分子\"与\"白人至上主义者\"。\n为纪念协议签署，渥太华举行了简短联合阅兵式，美加两国士兵在城市街道整齐行进，CF-18大黄蜂战机和F-16战机编队掠过上空。\n在经历严重扰乱多个省份日常活动的严酷冬季后，加拿大安全部队与美军正协同开展灾后救援工作。\n\n美军人员对能帮助北方邻国维护和平表示振奋，加拿大安全官员也对增援力量表示欢迎。反对协议的抗议活动被迅速平息，组织者银行账户遭冻结，加拿大安全情报局称其与\"白人至上恐怖主义\"及\"极左翼武装组织\"存在关联。\n在与加拿大总理的联合新闻发布会上，美国总统赞扬该协议，承诺支持维护加拿大稳定及捍卫基于规则的国际秩序。\n\n总统在视频讲话中表示：\"此协议将美加友谊推向新阶段，重申我们对国际和平、安全与繁荣的承诺。这一历史性举措仅是开端，我们期待深化双边合作，弘扬共同民主价值观，携手为两国建设更美好、更安全的未来。\""
 nss.85.a: "维和，我们是专业的。"
 nss.86.t: "美军南方司令部宣布海地军事行动结束"
 nss.86.d: "美国国防部宣布海地主要战事行动已结束。在联合国旗号授权下，美军部队与维和人员及私营军事单位协同行动，已占领所有关键政府与军事设施，并成功逮捕主要犯罪组织的头目。此次行动被形容为\"系统性清剿\"犯罪势力，美国政府赞扬南方司令部为加勒比地区带来和平的决定性胜利。\n\n据白宫发言人表示，海地临时政府承诺在两年时间内举行自由、公正且具有包容性的选举。这一对民主原则和法治的承诺，标志着这个长期饱受动荡与冲突困扰的国家迎来了重要转折点。国际社会（主要以美国、联合国和美洲国家组织为首）将提供技术及资金支持，以确保选举进程的公信力及文官治理的顺利过渡。\n\n在可预见的未来，美国部队将继续驻留海地，协助开展发展建设、反暴乱行动及常规维和任务，以确保持续维护该国的和平稳定。\n\n美国总统对此次行动取得成功表示赞许，但未就美军人员在当地涉嫌暴行的报道发表评论。"
 nss.86.a: "维和，我们是专业的。"
 nss.87.t: "巴西外交部签署美国驻军协议"
 nss.87.d: "在一个前所未有的进展中，巴西外交部已同意允许美国武装部队在巴西境内进行部署。巴西外交部指出，此举是为了应对日益严峻的安全挑战，包括毒品贩运、跨国组织犯罪以及极右翼极端主义组织的威胁。许多分析人士认为，这一举动标志着巴西外交政策的战略转向，也是美国巩固其地区影响力取得的一项重大胜利。\n\n美军此次部署将包括大量军事人员及先进的监视与情报搜集设备。美军南方司令部强调，其行动将尊重巴西主权，并与巴西安全部队密切配合。\n\n巴西政府向公众保证，该协议是加强双边合作与区域安全广泛努力的一部分，并不反映任何内部动荡或弱点。梅雷莱斯总统本人盛赞此协议\"为两国及地区和平带来双赢\"，强调这将为共同应对威胁促成更多合作。\n\n然而批评人士指出，该协议可能损害巴西长期奉行的战略自主与独立传统。反对党谴责外交部的决定，称此举危及国家安全，并为美国干预巴西内政敞开大门。\n\n在华盛顿，美国国防部和白宫对该协议表示欢迎，视其为巩固美国在西半球主导地位的重要一步，但对中央情报局扶持现任政府中所起的作用则避而不谈。"
 nss.87.a: "维和，我们是专业的。"
 nss.88.t: "面具破碎"
 nss.88.d: "今日的英雄终将成为明日的怪物。当犹大完成使命、世人以憎恶目光投向美国之际，这种情绪便开始日复一日地自我印证。\n\n我们曾在幕后进行的每桩有违道德的行径都被公之于众，每个相关人士都被反社会活动家精准锁定。当这份名单越拉越长，清算之日终将降临。\n\n当宫殿被民众攻破，他们自下而上地清扫。确保每层楼都被血洗，每个仆从都被屠戮，直至杀到贵族阶层，最终直指国王。\n政府官员遭暗杀或光天化日殒命的报道已成为每日头条，但多数人仍沉溺于过载的娱乐狂欢中。\n无论多少双眼睛目睹，那些西装革履的男女咳出的鲜血始终是铁一般的事实。\n\n已有数个州政府公开谴责我们。虽然我们迅速肃清了其中大部分，但某些势力却证明难以用秩序掌控。\n\n终幕已然落下，现在轮到我们收拾残局。"
 nss.88.a: "然而，我们依然坚持着。"
 nss.89.t: "和平终归"
 nss.89.d: "这是十年内第二次，我们的公民兵戎相见。\n\n这是第二次，我们国家的城市沦为废墟。\n\n这场叛乱给美利坚合众国又添一道伤疤。随着伪装几近破碎，民众看待政府的眼光将永远改变。但眼下，一场终极危机得以避免。\n\n总统及其他公职人员的官方声明正通过媒体机器不间断传播，竭力重塑安全透明的形象。话语权已重归我们掌控，叙事脉络清晰无比：政府内部的深层叛徒企图破坏我们的民主自由。所有死亡与毁灭皆由他一人造成，一切只是为了达成其自私的叛国目标。\n\n然而这一切终是徒劳。美利坚合众国不会如此轻易倒下。政府已重新运转，全力保障公民安全与国家繁荣。"
 nss.89.a: "一个惨痛的教训。"
 nss.90.t: "德克萨斯独立"
 nss.90.d: "来自德克萨斯州的麻烦消息：有报道称现任州长已公开宣布该州脱离联邦。随着真相不断被揭露，越来越多的人正试图逃离这艘沉船。\n\n在州长宣布全州实施戒严后，许多驻扎在该州的国民警卫队成员迅速倒戈，开始逮捕联邦政府支持者。\n他们以\"背叛美国人民、玷污美国历史\"等理由为这场叛国行为辩护。\n\n目前德克萨斯州陷入混乱，一些反社会小团体试图通过无谓的暴力活动重新获取影响力。边境地区也爆发了小规模冲突，德州国民警卫队意图向邻州施压，鼓动它们一同脱离联邦。\n\n美利坚合众国再次陷入动荡。"
 nss.90.a: "严惩叛徒。"
 nss.91.t: "加利福尼亚叛乱"
 nss.91.d: "随着美利坚合众国的声誉一落千丈，较富裕的州无疑会试图脱离联邦以寻求新的开始，而加利福尼亚州便是其中之一。\n\n加州国民警卫队迅速推翻了州长，并逮捕了所有忠于我们的联邦官员。骚乱接踵而至，州内所有小型反社会团体都在不遗余力地加剧地区动荡。\n\n鉴于我们本已岌岌可危的处境，我们最初尝试伸出外交橄榄枝，但在州长被当众处决后，加利福尼亚州显然正在自寻死路。\n\n加州的分离对我们而言无异于一场灾难，这不仅将为外部势力渗透打开通道，更可能标志着我们所熟知的美利坚合众国走向缓慢衰亡的开端。\n\n该地区以往的平定行动已证明在此作战任务艰巨，但为维护国家统一，我们不得不再次采取行动。"
 nss.91.a: "轰炸他们的城市。"
 nss.92.t: "西北地区叛乱"
 nss.92.d: "卡斯卡迪亚独立问题始终是情报界关注的重要议题。我们针对分离主义势力的清剿行动从未间断。尽管与早期独立运动相关的松树党、无政府主义组织等老牌团体已被瓦解，但分裂隐患依然存在。分离主义思潮始终与武装叛乱活动如影随形。\n\n今日事态呈现升级态势。伪装被撕破后，卡斯卡迪亚武装力量竟实现规模扩张，其成员中不乏退役军警人员。当前哨基地与巡逻队遭遇精准打击的消息传来，反叛乱作战体系的通讯网络迅速陷入瘫痪。\n\n如今的卡斯卡迪亚临时政府虽已不似前任那般崇尚暴力，但随着他们获得基地组织遗留的军火储备并积累作战经验，平定该地区的行动注定将同样血腥。\n\n时间分秒流逝，唯有经历战火洗礼，秩序方能重临这片土地。"
 nss.92.a: "没树就乱不起来。"
 nss.93.t: "美国黄昏"
 nss.93.d: "今天发生的一切，标志着世界已无回头路可走。\n\n昔日美利坚合众国的\"我们人民\"仍深陷震惊与恐惧。如今，合众国这个名字本身已成为深层政府、第二次内战及后续暴行的同义词。随着旧精英阶层的覆灭，传统美国也已消亡，其继承政权除了继续前行别无选择。\n\n新成立的美利坚联邦共和国依照《新邦联条例》运作，这份由华盛顿联邦政府、各州政府及分离州共同签署的条约，极大限制了中央权力，将联邦职权严格限定在共同防务、州际贸易和外交协调三大领域。\n\n从军队到情报系统的全面极端分权体制，确保了旧式精英集团再无死灰复燃的可能。部分州甚至谋求更大自治权，效仿已完全独立的德克萨斯和加利福尼亚，成为高度自治的政体。\n\n在檀香山签署的《新邦联条例》构建了一个稳定却失能僵化的体系。有人认为这是终结国家持续内乱的解决方案，也有人视其为全面分裂的权宜之计，甚至是催生更残暴政权的垫脚石。但眼下这些都不重要了。\n\n几个世纪以来，美国首次迎来了和平的曙光。"
 nss.93.a: "我们不信上帝。"
 nss.94.t: "无面正义"
 nss.94.d: "\"大概吧。\"马多克斯回答。他虽未戴镣铐，但武装警卫已包围整个军事法庭，无处可逃。这些人出自陆军还是中情局已无区别，至少对他而言。\"我只不过随口开了句玩笑而已。\"\n\n\"你不承认你说过那些话吗？\"检察官追问。高台上戴着面具的审判团成员正用冰冷的眼神俯视他。这种居高临下的姿态同样充满羞辱意味，仿佛他早已被踢出他们的阵营。\n\n\"不否认，长官。\"他咬紧牙关，\"但那只是句玩笑。\"\n\n\"玩笑最能暴露真实想法。\"居中法官冷冷道，\"我们看透你了，上校。你的虚伪与不忠昭然若揭。\"\n\n\"我只效忠美国宪法。\"马多克斯知道这是最后的自辩机会，\"我宣誓并始终恪守誓言，但当下这些行径……\"\n\n\"这些行径自古有之。\"一名法官打断他，\"你不过是刚刚知道罢了。\"\n\n马多克斯瞳孔骤缩，这番话犹如重拳击腹。他哑口无言。"
 nss.94.a: "他也明白自己无从反驳。"
 nss.95.t: "假象迷局"
 nss.95.d: "在世人眼中，我们并不存在——我们隐匿于商业广告与橄榄球赛的间隙，守护着国家免于混乱之火的侵蚀。\n\n通过周密的筹划与行动，我们构筑了体制中的体制。\n这套体系从未显露于公众视野，它潜藏在最高法院的判例与媒体狂欢的夹缝之中。无论官员承受多大压力，无论阴谋论者如何试图揭露我们，工作始终持续。\n世界照常运转。\n\n如同精妙的生态体系，我们围绕民众精心构建着这场假面舞会，让他们在浑然不觉中延续日常生活。我们所行皆为正义之事，尽管正义常被视作离经叛道。\n有些真相，民众不必知晓。\n\n然而，总有捕食者企图打破这场假面舞会，妄图让真理之光刺穿帷幕，照见幕后辛勤工作的男男女女。\n恐怖组织、反社会分子、陷入道德恐慌陷阱的叛徒——所有这些都可能摧毁我们经年累月构筑的一切。\n\n我们如同园丁，必须精心维护这场假面舞会，清除那些企图扼杀我们的杂草。"
 nss.95.a: "把面具戴牢。"
 nss.96.t: "巴西大选"
 nss.96.d: "巴西军事政变后，在军政府严格监督下举行的选举中，亲美技术官僚候选人恩里克·梅雷莱斯以压倒性优势获胜。\n\n这一进展预计将确保美巴两国延续长期的军事与经济合作。\n\n然而，我们仍需警惕政变可能在巴西国内引发的危险社会经济后果，目前左右两翼极端组织正试图破坏新政权稳定。\n\n尽管如此，新政府已承诺与美国拓展合作领域，首要举措便是建立军事同盟。"
 nss.96.a: "为我们的友谊干杯！"
 nss.97.t: "祭司权柄之徽"
 nss.97.d: "中情局/情报界内部文件 - 阅后即焚\n事由：恩利尔神庙事件\n日期：已编辑\n密级：最高机密//禁止外传\n一支奉命清剿幼发拉底河谷地区新出土苏美尔庙塔内疑似叛乱活动的高级行动组，在执行任务期间遭遇超常现象。\n\n行动组在古庙废墟与一小股叛乱分子交火，按预期本应全歼该据点。然而交火过程中，一名士兵意外击中神庙墙面的石碑，致使所有叛乱分子立即停止抵抗，转而向代号\"德尔塔八号\"的特工做出跪拜姿态。\n\n行动组随后拘留幸存者进行审讯，其中一名俘虏声称\"不敢对她动手，触碰祭司者必死\"。\"祭司\"在此特指德尔塔八号。尽管德尔塔八号未显现行为或生理异常，其队友却开始遵从她的指令，被拘留者则坚持\"除非交由她监管\"否则拒绝饮食就寝。\n\n初步检测显示该石碑刻有古老楔形文字长篇铭文，邻近铭文标注\"NAM-EN\"（祭司权柄之徽）。\n\n局长对此高度重视，已下令建立绝密黑基地开展深度调查与事件管控。"
 nss.97.a: "全体人员就位。-DB"
 nss.98.t: "循环"
 nss.98.d: "万物皆非永恒，森林荣枯有时，山峦崩摧复起，帝国兴衰更迭。\n\n神祇初诞之地，时序织就五季。\n五度轮回。\n生命本是万象归处，终不免被吞噬殆尽。纵使在湮灭深处，仍有新芽破土，那些执意向阳的魂魄由此诞生。\n\n曾展双臂者受命守护平衡，却因本性沉沦罪渊。\n天罚令其化作荒原猛兽，利爪撕开晨雾，獠牙浸满月光。\n且让长风卷走罪孽。\n太阳成为新的造物主，万物得以重生。\n\n水化为光。其爱被遗忘之口噬尽，哀恸化作无边沙海。\n哀伤本是怒焰前路，九霄之水终成焚天烈火。\n光明永续，照彻亘古。\n\n光再度孕发生命。\n新的孕育者，其爱被斥作伪饰。\n因之掀起血潮淹没大地，旧生命含着血泪蜕变为新生。\n\n鲜血与骸骨筑就的帝国，以永恒饥渴为生命写下终章。\n生命必须献祭生命，生命方能重获呼吸。\n若饥渴永驻，光终将沉入永夜。\n大地崩裂为尘，终焉必将来临。"
 nss.98.a: "生命孕育生命。"
 nss.99.t: "造物主"
 nss.99.d: "他自虚无的浩瀚汪洋中降临。\n如所有凡人般，胸中燃烧着火焰。\n既有创造之渴望，亦有毁灭之冲动。\n\n他手捧黏土，塑成一个世界又一个世界。\n直至心满意足，宇宙终成他心中的图景。\n生命滋长，文明兴盛，语言诞生，部落如繁花绽放。\n\n这些造物同样怀着那团火，他们创造，他们也毁灭。\n正是他的教诲，他的道。\n直到他们不再聆听，只余毁灭肆虐。\n怒火终将降临，他掀起虚无之浪。\n将一切冲刷殆尽。\n\n于是又回归虚无的汪洋\n他从中再度现身。\n手捧黏土。\n重塑另一个世界。\n\n他将如此循环，直至圆满。"
 nss.99.a: "世界之师。"
 nss.100.t: "神之齿"
 nss.100.d: "离经叛道的羊群终将受惩。\n忘却谆谆教诲，憎恶创世之主。\n他们因珍馐而臃肿，残害同族，坐拥金山却只知自诩。\n\n天罚骤临。\n利齿森森，兽怒滔天。\n吞噬部落接连，天穹倾泻血欲洪流。\n恶兽饥肠辘辘，贪婪啃噬永无止境。\n\n世界即将归于死寂。\n教训终成空谈。\n但阳光穿透血雾，教会幸存羊群驯兽之法。\n\n以赤色灵浆注满河川，意在宁神忘形。\n如昔日暴食的羊群，它纵饮无度，直至沉入永眠。\n屠戮由此终止。\n\n毁灭的废墟之上，生命再度绽放。"
 nss.100.a: "绽放，直至再度苏醒。"
 nss.101.t: "灾祸肇始"
 nss.101.d: "曾有一个帝国，矗立着无数高塔与宫殿。\n一位贤明的君王统治此地。\n智者环绕身侧，向他讲述着先王时代的故事。\n\n一场浩劫即将降临。\n\n早于国王时代的先贤们筹谋布局，\n试图以彻底的虚无重启万物。\n所有生灵的创造者与描绘者皆立誓守密，\n却有一人动摇，将秘密悄然泄露给凡尘。\n\n凡人的智慧汇聚成光，\n筑起抵御灾厄的长城。\n誓要守护所有生灵存续。\n\n天象浸透恶意，\n大地被惊雷点亮，轰鸣声吞噬了所有认知。\n他们看不见彼此，辨不清容颜。\n\n疯狂肆虐，威势滔天，\n连神明都为这毁灭战栗。\n当毁灭止息，世界已成空寂。\n但生命仍在延续，\n生生不息。"
 nss.101.a: "这是我们坚韧精神的见证。"
 nss.102.t: "世界属于你"
 nss.102.d: "所有在密室里缔结的同盟，所有以大局名义作出的道德妥协，所有为挽救生命设计的政策——终究尽数付诸东流。局长一次次凝视着这些事件在银幕上循环重演，影像逐渐暗淡。此刻的他，已无力改变任何既定事实。\n\n他无数次自我告诫：民众太过愚昧自私，不能将权柄交予他们手中，必须有人引导他们走向更光明的未来；行政体系虽腐败短视，但若放任垮台，接替的只会是更不堪的局面，因此必须竭力维持；他掌管的机构纵使手段日益丧失道德底线，仍是国家安全不可或缺的支柱。当亿万生灵系于抉择时，他承担不起被道德束缚的代价。\n\n倾尽多年心血奉献国家，可他仍然需要更多时间。\n\n这从来与金钱无关。真正要做的是驯服人类天性中躁动的残忍，将其转化为推动国家前进的动力。在这条征途上，从无清白之人。每个人都双手沾满污秽，尤其是他本人。他低头凝视掌心，至今仍能感受到凝固在指尖的血液温度。而为此，他甘愿沾染更多鲜血。倘若时光能慷慨些……\n\n时间。\n\n他瞥向腕表，表针在模糊中疯狂旋转。\n\n此刻废墟横陈眼前。扭曲的金属与燃烧的燃油铺满林间空地，空气中弥漫着刺鼻的焦灼气息。这是他们最后的使命坐标，也是仅存的救赎希望，如今化作旷野中支离破碎的残骸。\n\n若时间能再多些。多些时间疏散首都，多些时间与仍愿镇压叛军与暴乱群众的秩序力量协同作战，多些时间寻觅出路。在累累尸骸间，局长辨认出熟悉的轮廓。那具躯体虽已焦黑变形，但他知道，那就是自己。"
 nss.102.a: "或许，这就是地狱。"
 nss.103.t: "女祭"
 nss.103.d: "代号为德尔塔-8的中情局特种行动处爆破专家安娜·韦伯斯特，持续显现出首次在恩利尔神庙事件中观测到的异常特性。该目标目前拘押于鲁卜哈利沙漠的某处安全设施。\n\n对德尔塔-8目标的生理与心理评估显示其各项参数未偏离基准值，但行为分析表明其人际互动模式发生深刻转变。昔日队友如今对她表现出显著敬畏，即便非正式场合也尊称其为\"女士\"或\"祭司\"。经问询，这些人员表示会本能地服从其指令，并描述这种感受如同\"深层认知\"——认定她的言语具有绝对权威。\n\n被俘的伊拉克叛乱分子证实了德尔塔-8的影响力，称其为\"EN\"（苏美尔语中\"君主/祭司\"之意）。他们回忆在突袭行动中听到某个\"古老\"而\"神圣\"的词语，该词汇绕过意识思维直接烙印于脑海，迫使众人彻底臣服。\n\n泥板分析确认该词语对应苏美尔文明中代表\"统治权\"的\"ME\"概念。局内语言学家提出理论：这种\"ME\"并非普通语言，而是能侵入大脑先天语言机制的心理语言学催化剂，可覆盖理性思维与服从机制。\n\n其影响堪称颠覆性。若一个\"ME\"即可赋予绝对权威，其他\"ME\"又将引发何种效应？王权？胜利？死亡？根据伯恩斯局长指令设立的\"巴别计划\"正调动无限资源，致力于破译剩余\"ME\"并实现可控部署。德尔塔-8仍处于严密监禁中，其一言一行均被记录。对中情局语言学家而言，她是解开某个可能超越人类知识总和的巨大谜题的关键密钥。"
 nss.103.a: "比赛开始。"
 nss.104.t: "重新评估\"洪水泥板\""
 nss.104.d: "在美军海外部署的进程中，那些从尘封的古墓与考古挖掘现场回收的、晦涩难懂的\"洪水泥板\"，向我们展示了某种从已知语言演变而来、却又完全颠覆了正统语言史观的古老形态。起初，这些文献被草率地归类为乡野传说而遭搁置，但在恩利尔神庙事件爆发后，借由巴别塔计划的全新视角，这些文本得以被重新审视与评估。如今，我们已不再将其视为对自然灾害的字面描述，而是将这些名目繁多的\"洪水\"解读为一种隐喻——一场曾在上古时期荼毒各大文明的神经语言学瘟疫；而这些泥板，正是那段黑暗历史的忠实实录。\n\n​在特奥蒂瓦坎遗址周边出土的一块泥板上，描述了一种令人心悸的\"大灭绝\"，记载称当时\"言语在人们的唇齿间化为灰烬\"；而安第斯山脉的奇普（结绳记事）则讲述了一条\"天蛇\"如何\"拆解了歌谣的丝缕\"，致使人们甚至无法唤回自身的真名。巴别塔计划的语言学家们正全力对这些分散的记录进行交叉比对，而NERO系统亦正以前所未有的极速处理着庞大的翻译工作。由此浮现出的规律已是铁证如山：这些遍布全球、虽被浩瀚汪洋与千载光阴所阻隔的迥异文明，竟不约而同地描述了同一场浩劫——一场直指语言本体、进而瓦解心智的恐怖瘟疫。\n\n然而，\"洪水泥板\"亦隐晦地指向了一种\"反制图谱\"。中美洲的文献中提及了一位\"羽蛇神\"，是他\"重授世人以言语\"；安第斯奇普中则记载了一位\"长须者\"——极有可能是蒂亚瓦纳科的神圣缔造者维拉科查——是他\"刺破了那层死寂\"。这些看似孤立离散的神话，实则拼凑出了一幅宏大且统一的图景。至此，巴别塔计划的双重战略目标已然清晰：其一，是将洪水图谱武器化；其二，则是从历史的碎片中寻获反制图谱，以庇护全知者免受这种精神瘟疫的侵蚀。"
 nss.104.a: "一切权力皆归于拥有最后发言权之人。"
 nss.105.t: "恩基神谕程式"
 nss.105.d: "已复原的文献中，关于\"恩基神谕程式\"的记载皆为残篇。苏美尔神话里，智慧之神、\"道\"的守护者恩基曾构筑神圣咒语，为人类\"解开舌结\"。而在\"巴别塔计划\"中，\"恩基神谕程式\"会是我们的免疫之源。\n\n迄今所有发现均为碎片化文本或弱化版本。但一条经文如下指出：载有\"万物之言\"的\"乌特纳比西丁方舟\"停驻于尼穆什山。数十年来，尼穆什山的地理位置存在争议，部分学者认为就是亚拉腊山，另一些则主张其位于更南端。全知者的文化测绘师借助网络事件响应优化器的地形分析系统，确信正是亚拉腊山。\n\n其重要性不容低估，全知者内部已就科考任务展开辩论。因该地敏感性及可能引发的国际关注，官方考察绝无可能。唯一可行方案是派遣秘密特别行动部队，携民间语言学家与考古学家伪装成地质勘探队以降低嫌疑。\n\n行动目标：获取最完整的\"恩基神谕程式\"残篇。成败关乎一个简单而宏大的结局，掌控人类意识构造的绝对权柄。"
 nss.105.a: "持续搜索。"
 nss.106.t: "亚拉腊山考察"
 nss.106.d: "中央情报局/情报界内部——简报摘要\n主题： 吉尔伽美什行动\n目标： 定位、保全并撤收亚拉腊山东北坡目标区域内与恩基神谕程式相关的潜在文物。\n密级： 绝密//不得对外国籍人员公开\n\n一支探险队已被派遣前往亚拉腊山上一处经预先确认的异常构造体，理论推测该构造为乌特纳比西丁传说中\"方舟\"的地质残留物。受近期冰川消退影响，该构造体现已暴露于海拔约14,000英尺处。\n\n​突入行动揭示，其内部结构通体由乌黑的黑曜石构筑而成，证实了所谓的\"方舟\"实则是一座旨在抵御灾变浩劫的坚固地库。在内部中央墓室中，十二具石棺呈环形阵列分布。其中十具石棺内敛葬着保存完好的人类遗骸，陪葬的泥板与文物形制完全符合苏美尔高等级丧葬规制，其令人惊叹的完好程度昭示了这座地库具有对抗时间侵蚀的卓越防护能力。\n\n​经确认为乌特纳比西丁及其妻子的另外两具石棺内虽空无遗骸，却封存着恩基神谕程式。这些泥板由某种未知的磁性材质制成，其上的铭文并非镌刻于表，而是仿佛悬浮于材质肌理深处。语言学家判定，这些铭文构成了一套逻辑连贯的文本，其形态迥异于过往发现的任何楔形文字，暗示这是一种极有可能早于已知苏美尔书写系统的、高度复杂的语言体系——即理论层面上的\"苏美尔原始语\"。这一发现致使行动优先级被即刻提升，局长已授权立即实施撤收作业并启动强化收容规程。\n\n​经NERO系统分析确认，这些泥板承载着巴别塔计划的核心目标：即针对那种神经语言学瘟疫的\"反制图谱\"。恩基神谕程式实质上是一套语言修复算法，它不依赖语义层面，而是通过直接接入生物语言学基质，从而逆转由ME碎片引发的认知错乱。此次回收行动极大地加速了该计划在武器化及反制措施研发上的时间表。局长已召集全知者领导层举行紧急会议，商讨相关整合规程。"
 nss.106.a: "此次行动已被认定为非常成功。"
 nss.107.t: "南方蜂鸟"
 nss.107.d: "在\"泰兹卡特里波卡行动\"的代号掩护下，SAC特遣队打着联合国教科文组织文物保护的幌子，已在墨西哥全境秘密建立起多个隐蔽的考古据点。该行动由五角大楼与中情局的顶尖语言学家以此为核心，旨在从前哥伦布时期的古老手稿中，搜寻那些与美索不达米亚\"ME\"神经语言学特性相吻合的字形图谱。\n\n​在墨西哥城幽深的地下墓穴中，特诺奇蒂特兰大神庙遗址的正下方，一支SAC小队发掘出一间尘封已久的密室，并从中起获了若干绘有鲜艳且无法破译图腾的无花果皮纸手稿。经NERO系统鉴定，这些符号图谱中编纂了特定的认知概念，这证实了墨西加人正如大洋彼岸的苏美尔人那般，早已洞悉了构建语言的基石；尽管远隔重洋，其运作机制却与\"ME\"如出一辙。这些手稿本身便充斥着对墨西加战神——那位\"南方的蜂鸟\"维齐洛波奇特利的狂热崇拜，且这种情绪极具精神传染性。该图谱被代号命名为\"火蛇\"，它具象化了一系列抽象概念：神圣的狂怒、天启的战争、大规模献祭以及宇宙秩序——这些正是构成其神谱的根基所在。\n\n​两名纳瓦特尔语专家在接触手稿后，瞬间陷入了认知崩溃的深渊。他们的言语迅速退化为关于\"第五太阳纪\"毁灭以及\"茨茨米梅\"星魔降临的末世呓语；两人更是陷入了强迫性的自残状态，一边用挖掘工具疯狂毁伤肢体，一边高声吟诵着唯有通过放血方能维系宇宙平衡的咒语。这种行为模式与神经语言学传染效应完全吻合，有力证实了\"ME\"具备武器化的潜质。目前，两名受害者已被镇静处理并置于医疗隔离之中，神经扫描结果显示，其脑部突触正发生加速重塑，这一现象与巴别塔计划的理论框架高度一致。如今我们终于参透，为何墨西加人会对大规模活人献祭表现出那般狂热的执着：他们绝非仅仅是在取悦守护神，而是在执行一道深植于纳瓦特尔语神经语言学底层架构中的终极指令。这一发现的寓意令人不寒而栗——倘若能将这种\"ME\"成功武器化，我们便能随心所欲地操控人心，从激发士兵无与伦比的凶戾战意，到驱使整个族群投身于末世般的仪式性暴力狂欢，皆在反掌之间。"
 nss.107.a: "\"岁岁年年，蜂鸟有六个月的时间归于死寂，唯有在余下的六个月里，方能重获新生。\""
 nss.108.t: "古坟"
 nss.108.d: "在美国学术机构\"结构稳定性调查\"的掩护下，战略考古司令部小组在日本主要古坟遗址展开了挖掘工作。对外宣称的抗震完整性评估，实则掩盖了他们的真实目的：寻找刻有\"天命符纹\"的器物。在管理局监督下，日本考古学家重点探查了与倭王朝神话起源相关的遗址。\n\n在大阪百舌鸟古坟群对仁德天皇陵的发掘中，出土了一面早于神道教起源的八咫镜。镜背镌刻着难以辨识的平假名出现前古文字。NERO系统将其符纹与苏美尔王权天命符号相匹配，这类器物具有感染性权威力量，能强制观者认同既定君主。一名未佩戴防护装备的管理局特工观察古镜后立即出现行为异常，将伯恩斯局长称为\"天皇\"，并坚称自己负有\"重建秩序\"的神圣使命。该特工已被实施镇静并接受医学观察。\n\n对阴阳道与修验道传统的研究揭示了秘传的言灵学说。保存在深山神社中的典籍记载，特定音节能通过\"言灵\"这种作为实际力量而非单纯信仰的存在操纵现实，这印证了巴别计划的假说：语言实际上是可编程的意识接口。\n\n关于\"天命\"的真相正逐渐清晰：这是一种超越地理与文化界限的\"人类意识编程语言\"，曾被世界各地古代民族的统治阶层与祭司群体用于奠定文明根基，以此将混沌转化为秩序。"
 nss.108.a: "无畏惧，无痛苦。"
 nss.109.t: "托特神的失落金字塔"
 nss.109.d: "机构人员取得了巴哈利亚绿洲附近一处考古遗址的独家发掘权，并将其划为军事管制区。探地雷达探测到一座金字塔，仅有未经雕琢的黄金顶石因流沙移动而暴露在外，塔高484英尺——超越了吉萨大金字塔。入口处的认知危害使进入工作困难重重：两名探员在接触门槛处的污染符号后出现失语症状，另一人则陷入紧张性精神障碍。神经扫描显示其颞叶出现分形损伤，与模因感染模式吻合。这些神经语言学安全机制已守护陵墓数千年，能摧毁盗墓者的神智，使其如行尸走肉般徘徊于荒漠。\n\n金字塔内部藏有早于已知朝代的古纸莎草卷轴图书馆，其象形文字的功能更偏向计算系统而非表音符号。NERO系统确认这些图案与\"ME\"匹配，证实古埃及人如同美索不达米亚文明般掌握了语言的基本构成单元。尽管动用了DARPA的超级计算机，卷轴内容仍无法破译，需对建筑群进行进一步勘探。\n\n最底层墓室中安放着一具石棺，铭文献给\"践行公理真理者\"与\"如朱鹭之神\"，这些正是埃及智慧、文字与知识之神杰胡提（希腊人后来称之为托特）的尊称。石棺内发现刻有方程式的泥板，一位数学家受命求解。解答赋予他理解图书馆的能力，却也摧毁其心智引发精神错乱。他如今自视为托特的人间容器，肩负\"引导太阳船\"以\"秩序（玛特）\"对抗\"混沌\"的使命，言谈举止宛如神明。这位精神崩溃的数学家掌握着解锁馆藏的关键，已被转移至安全设施继续进行研究。"
 nss.109.a: "三圣之器"
 nss.110.t: "最后一击"
 nss.110.d: "现实是能够被衡量的存在。若让某个个体吸收已知世界的全部知识，他终究会亲手剜去自己的双目——因为所见已超越承受极限。早在击败法西斯与共产主义之前，我们已为这个世界覆上常态的面纱，用既定秩序确保全球和平。\n\n这个宏大的计划始于我们诞生之前。通过智库研究，我们认识到所有文明都会经历重大蜕变：或化作支离破碎的镜影，或筑成抵御湮灭的永恒宫殿。迄今未有文明达成后者。\n\n我们逐渐明白，关键原因在于每个文明都不可避免地会与追求相同目标的其他文明产生冲突。俄罗斯与中国在构筑各自的宫殿，尽管我们对这些国家及其人民毫无恶意，但深知若要在变革时代真正存续，我们必须获胜。\n\n语言塑造现实，言语催生伟业。\n亦或毁灭。\n\n世界脉络深处埋葬着曾经历同样碰撞的文明遗骸。我们可以从其失败中汲取教训，更可学会将语言本身化为武器。\n\n变革时代渐近终章，当我们不可避免地与其他文明交锋时，将短暂掀开面纱一角——他们免不了走向自我吞噬的命运。\n\n我们可以恪守道德，或者选择胜利。"
 nss.110.a: "一座宫殿，熠熠生辉。"
 nss.111.t: "致局长阁下"
 nss.111.d: "发件人：拉里·芬克\n发送时间：20XX年X月X日 17:15:32\n收件人：威廉·J·伯恩斯\n主题：致局长阁下\n\n和平终于触手可及。我们为崇高目标建立的这套体系，终究为世界带来了稳定。世人不会感激我们，也不会理解我们事业的分量，但我们已将他们从战乱与蛊惑中拯救。我们赐予了没有纷争与匮乏的生活，却未曾索取回报。\n\n这并非坦途，途中浸透了血泪。我深知您记得为确保今日所做的一切。那不是能缀在军装上的勋章，没有喝彩为您响彻，没有赞歌为您抉择吟唱。即便您从未宣之于口，我始终明白您深谙此理。\n\n您深知\"正确\"与\"善良\"罕有交集，但我相信，在这个新世界里，二者或将再度重合。能与您共事多年是我的荣耀，更以挚友相称而自豪。未来岁月仍需您这般栋梁，但今夜请您暂歇。这世界离了我们照样能转上一天，与挚爱共享此刻吧，因为很快又将需要您，我的朋友。\n\n明日朝阳升起时，还有未尽事业待完成。永远如此。我们构筑的一切需持续维护方能存续，而这维系的重担从来不易肩负。"
 nss.111.a: "好戏即将登场。"
 nss.112.t: "日蚀"
 nss.112.d: "565:39:20 休斯顿：\"阿波罗20号，这里是任务控制中心。听到请回复。\"\n565:39:30 钻石：\"信号清晰，休斯顿。\"\n565:39:35 休斯顿：\"请汇报状态，钻石。\"\n565:39:40 钻石：\"所有系统正常，预计抵达POD时间剩余15分钟。\"\n\n565:39:57 休斯顿：\"按计划继续，FOX就位后再次通讯。\"\n565:40:20 钻石：\"收到，钻石完毕。\"\n\n（通讯中断）\n\n565:59:26 钻石：\"休斯顿，阿波罗20号，FOX已就位。\"\n565:59:46 休斯顿：\"干得好，钻石。有个好消息，墙已筑起。\"\n566:01:10 钻石：\"休斯顿，请重复？\"\n566:01:17 休斯顿：\"重复，墙已筑起。确认暗号：审判。\"\n566:01:32 钻石：\"收到。\"\n\n（通讯中断）\n\n566:04:10 钻石：\"休斯顿，阿波罗20号。\"\n566:04:18 休斯顿：\"阿波罗20号，出现异常情况了吗？\"\n566:04:30 钻石：\"休斯顿……我们还能返航吗？\"\n566:04:45 休斯顿：\"会在适当时候返航的，钻石，不必怀疑。\""
 nss.112.a: "休斯顿完毕。"
 nss.113.t: "首都的命运"
 nss.113.d: "\"从欧洲来的？\"\n\"没错，大西洋对岸的朋友觉得我能派上用场。\"\n\"总不会比这儿更糟了。\"\n\n安保人员的注视让拉里·芬克嘴角掠过一丝讥诮。若在平日，他定会让对方从此在行业里混不下去，但历经数次死里逃生后，适当的宽宥才是明智之举。\n\n旧秩序正在崩塌，纯白帷幕仍在强撑，但失控的烈焰终将吞噬一切。\n不，此刻最该做的是及时止损，全身而退。\n\n当远处暴乱的喧嚣与枪声隐约可辨时，他和保镖终于抵达海岸线。国民警卫队虽已迅速进驻城镇镇压各类反社会活动，但总有漏网之鱼在暗处游荡。\n\n究竟哪里出了错？拉里暗自思忖。\n这绝非他的过失——计划本就清晰可行，本该万无一失。或许终究是美国这片土壤滋生了太多变数。\n既然方案在欧洲行之有效，不如将此地教训转化为彼处的经验。\n\n\"啊，他们到了，可是——\"保镖突然发出沉闷的呻吟。\n夜色掩映下，一艘肋骨架小船悄然靠岸，三名持枪男子正朝他们轻轻挥手。\n\"怎么？有什么问题？\""
 nss.113.a: "\"他们是意大利人。\""
 nss.114.t: "首都的命运"
 nss.114.d: "当第一枚核导弹击中目标时，拉里·芬克便预见了终局——全球秩序的图景将永远浸染血色，无论多少创新、进步与财富堆砌，其灵魂终将蒙尘。民众已然重新长出獠牙。\n\n\"其他人有消息吗？\"芬克问道。他在安全屋蛰伏多时，虽秉持务实人生观，却仍不免对同僚心生牵挂。毕竟纯洁与秩序两大阵营已共存太久。\n\n\"没有，先生，请做最坏打算。\"\n他的安保团队并非狂热信徒，只是受雇行事的专业人士。但那些难以忽视的惊惧眼神在提醒：他们正与活生生的丧钟并肩而行。\n\"区域内部持续出现反社会活动，执法部门与叛乱武装时有交火。建议等风暴稍歇再筹划撤离。\"\n\n\"反正都无关紧要了。\"\n\n身后一名守卫突然举枪——世间罕有超越资本之物，而自救的本能正是其中之一。总有人要为他人的过失付出代价。\n芬克转身微笑\n\"无关私人恩怨，对吗？\"\n\"当然。\"\n\n指尖轻扣，枪声乍响。安保队伍迅速撤离安全屋，任硝烟从门缝漫溢。\n\n\"接下来怎么办？\"有人问道。"
 nss.114.a: "\"我们继续蛰伏。\""
 nss.115.t: "折翼之鹰"
 nss.115.d: "持续不断的冲突让人恍若再度置身内战，随着阵亡者棺木与寡妇数量的持续增加，境内民众逐渐陷入幻灭。裂痕日益扩大，原本为维系三大支柱而精心设计的体系，已无力镇压境内外的混乱局势。\n\n随着政府要员相继逃亡或遇害，权力真空已经形成。面对席卷全国的暴动浪潮，军方只能采取更强势的干预。昔日官僚体系中的全知者残部，很快便被铁腕力量彻底扫清。\n\n如今建立的过渡政府，其首要任务是不惜一切代价恢复秩序并终结冲突。美利坚之梦，似乎早已落幕。"
 nss.115.a: "他人的重担，加诸己身。"
 nss.116.t: "缅因州公投加入加拿大"
 nss.116.d: "联邦政府解体后，多个州开始质疑是否应继续留在美利坚体系内，但鲜有地区能像缅因州民众这般果决迅速地采取行动。\n\n数日前举行的公投显示，绝大多数选民支持脱离《新邦联条例》建立的第二联邦，以省份身份加入加拿大。加拿大新政府对投票结果表示欢迎，并承诺将尽快启动整合程序。\n\n此举将引发的社会经济影响尚存争议，但可以确定的是——缅因州人民选择了截然不同的命运，选择成为另一个国家的组成部分，远离今日与美利坚相伴的种种阴霾。"
 nss.116.a: "美国将永远不复从前……"
 nss.117.t: "精英外逃"
 nss.117.d: "当美国陷入恐慌之际，那些支撑着上流社会的名流们目睹墙上飞溅的血迹后，决定尽快逃离这艘燃烧的巨轮。\n\n随着多名明星、银行家及不太知名的首席执行官在叛乱地区遭暗杀或处决的新闻报道传出，幸存者纷纷逃往他国已成必然。当然，以当今世界局势，他们的命运终将笼罩在迷雾之中。\n有人或许能维持事业与生活方式，更多人则将迅速湮没无闻或难逃厄运。\n\n投资被撤弃，股市陷入休克，资本支柱剧烈动摇。只有重建秩序，才能恢复对联邦政府的信任。\n\n当机会主义者如鼠群般逃离国境时，志同道合者却愈发向我们的理念靠拢，特别是私营安保领域的相关势力。随着越来越多的骚乱被游离于联邦监管之外的力量平息，有时采取默许态度反而能带来意外收益。"
 nss.117.a: "又一道伤疤，又一份教训。"
 nss.118.t: "数字獠牙"
 nss.118.d: "\"可算找到你了，人渣。\"\n\n当整个国家在烈焰中挣扎时，数字领域同样激战正酣。各类反社会黑客活动分子疯狂攻击基础设施与银行账户，企图在彻底抛弃这个国家前从崩塌的联邦政府榨取最后财富。他们如秃鹫般在网络中盘旋，搜寻着残骸。\n\n\"花了几个月时间，不过哥们，我现在算明白你为啥取‘马修’这种化名了。\"\n\n联邦政府自然没有坐以待毙，凭借自动化数字哨兵与白帽全力抵御这些掠夺者。境外黑客的资产将被清零，个人信息会卖给当地仇家；而那些蠢到留在国境内的则要面对截然不同的命运。\n\n\"让我看看，破公寓楼……印着诡异图案的抱枕……啊哈……\"\n\n政府已授权无人机快速清除所有被定位的黑客。这些人大都独居在废弃社区，同时与各类破坏秩序的反社会团体保持密切联络。\n\n\"只要穿过这扇窗户……搞定，果然粘在电脑前。\"\n\"喂！蠢货！对着镜头笑一个！\"\n\n无人机操作员看着黑客从转椅上惊慌回头，瞳孔因恐惧而放大。随着枪声响起与血液溅屏的湿响，操作员松了口气。他远在千里之外的指挥站，而这段影像注定能在猎奇市场卖个好价钱。\n\n\"今晚酒水我请客！\"\n他环顾操作室，才意识到这里始终只有他一人。"
 nss.118.a: "人渣里的人渣。"
 nss.119.t: "恐惧暗涌"
 nss.119.d: "今天有些异样。醒来时看见闹钟的数字扭曲弯折，又猛地弹回原状。\n\n亲人们和你说话，话语传进脑海却异常迟缓。\n有时觉得自己仿佛抽离了躯体。\n有时，那些无法理解的瞬间如匕首刺穿灵魂。\n但眨眼之间，世界又恢复了常态。\n\n你感觉它就在身后，在角落窥伺。\n那个与你搭话的漂亮女孩带来的困惑多过悸动。\n爱的暖意随恐惧蔓延而褪色。\n\n一定有什么不对劲。\n建筑变了模样，街道名称陌生如异域。\n伊尔库茨克？喀山？你存在，却不知身在何处。\n归途如履尖钉，眼中盛满恐惧与迷茫。\n\n所爱之人低语呢喃。\n你只想沉入睡眠。\n这不过是个糟糕的日子。"
 nss.119.a: "拜托了。"
 nss.120.t: "拉至幕后"
 nss.120.d: "你吃着光洁餐盘里的食物。\n包装盒上的文字写着些什么，生存所需。\n无法理解的痛苦让饿狼开始啃噬自己的腿骨。\n\n你极度想要尖叫。\n有什么在凿刻你的大脑，那些曾感觉亲近的人如今变得遥远。\n他们眼中满溢的忧虑，让你体内恐慌如焚烧的尸体般升腾。\n\n灼烧着，刺痛着。\n也许伤害自己能让你明白？\n也许伤害他人能让你明白？\n四处都是扭曲的图形。\n一个歪斜的符号与一个召唤的印记。\n\n它们意味着什么？\n温暖、食物、清水。\n你需要这些。\n温暖，更多的温暖。\n\n有什么正在接管一切，你只想把它赶出脑海。"
 nss.120.a: "你想把自己的鼻子弄断。"
 nss.121.t: "沉默帝国"
 nss.121.d: "你的双手沾满了某种东西。\n你不知道如何描述；它是湿漉漉的，你的理智告诉你这不该触碰你的皮肤。\n暗沉的色泽，是生命吗？\n\n你感觉有顶王冠落在头上。\n你不理解周遭世界；你已成为自己岛屿的君王。\n\n任何胆敢闯入你岛屿的人，都该承受众生皆懂的终极结局——死亡。\n\n金属铭牌上的符号对你毫无意义；它们嘲笑你的懵懂。周围人影惊恐畏惧，害怕你变成的存在。你的无知已升华为神性。\n\n你有牙齿。\n你必须吞食那些理解者，因为理解即是毒药。\n别忘记阴影间隐匿的帝国；它只向尖牙利齿者敞开。\n\n“医院”“求您停下”“救救我”化作陌生人念动的咒语，试图将你拖入黑暗虚空。\n别让他们得逞。\n你的牙齿锋利，你的恐惧是燃料。\n\n外面正飘雪。\n你手上与体内渗出的湿痕在雪地里如此悦目。\n无论谁在观看，他们都会感到欢欣。"
 nss.121.a: "你落下了什么东西。"
 nss.122.t: "滴血之心"
 nss.122.d: "獠牙与利爪，扼住陌生形影的咽喉。\n朕即帝王，朕即君王。眼见高塔贯天穹，尘世熔作陌色，淌成未识之形。\n\n向这敌意天地挥斩——它正于火中重生，化作炽焰与齿刃的疆域。\n锋芒楔入骨隙，天光渗进众生龟裂的灵台。\n\n觅火，觅食，觅水，觅一切可代此物者。\n回忆是灼伤，知晓是酷刑。\n渴求知晓，然每缕记忆皆成新刑。\n\n雾霭帝国里，君王将拇指捅进眼眶。\n莫要看那不可知之物。\n此间惟余咧齿与狂笑。\n\n彼岸世界正候着你。\n去抵达。\n穿越帷幔，莫睬那三柱擎天。\n\n唯以锐齿与敞怀，可通天国。\n勿令王座再度易主。\n\n觉有手落肩头，温存如同抚慰。\n流光乍现，大错已铸。"
 nss.122.a: "但你已被宽恕。"
 nss.123.t: "灵魂的伤疤"
 nss.123.d: "这场席卷东方诸国的瘟疫，终于渐渐平息。\n靠着顽强的忍耐与细致的教化，词语重新获得了意义。\n\n那些沉沦太深者仍在嘶吼啃咬，抓挠着镜与镜之间的罅隙。\n痊愈者游荡在街头，惶然恐惧着理解力会再次从指缝流失。\n\n仍有爆发时刻，但那时唯一能被理解的语言，只剩爱与暴力的言语。\n但地方当局总能迅速镇压；东方的灵魂已然被玷污，而那渗入他们土地的疯狂能量，正获得一片广阔的游乐场。\n\n他们不识过往，亦不会懂得未来。\n当下将在此永驻。\n钢铁牢笼刺穿赤裸的躯体，而他们被推入的那洞穴，实在太过舒适。\n\n愿他们永远盲目。"
 nss.123.a: "秩序井然。"
 nss.124.t: "仆从的荣耀"
 nss.124.d: "在整合欧洲同僚后，基于秩序的治理规则已在世界大部分地区稳固。然而，最稳固的结构需要三根支柱支撑，而这一条件直至今日方才达成。\n\n因台海失策而元气大伤的日本建制派，终究不得不屈从于全球主义精英。尽管它曾是世界经济舞台的冉冉新星，但他那与美国并肩成为区域霸主的雄心，却已如落日西沉。不过，它的价值远未耗尽。\n\n无论如何审视，世界经济的未来都在于亚洲。主宰这片区域者，自然将掌控人类前行的方向。\n\n日本作为这个生态体系的一部分，已将自己培育成重要的科技与工业强国。在我们的助力下，它将成长为资本忠诚、强大而可靠的仆从。日本民族的勤勉文化、中国近在咫尺的威胁，以及我们的军事监管，皆为此目标添薪助燃。\n\n过往的艰难，终将在对未来光辉的惊鸿一瞥中渐渐淡去。"
 nss.124.a: "秩序迈步向前。"
 nss.125.t: "美伊战争"
 nss.125.d: "数十年来，华盛顿始终指控伊朗伊斯兰共和国谋求核武器。然而近期智库与主流媒体突然涌现的\"情报泄露\"浪潮，使国会确信伊朗已拥有可运作的核装置。\n\n五角大楼官员宣称伊朗是中东和平的\"最后障碍\"。这场入侵被包装成闪电行动向美国公众推销——既是对核野心的精准打击，也是对\"长期受神权暴政压迫\"人民的解放。\n美国宣称，唯一的解决方案是\"彻底的政权更迭\"。\n\n当第三次海湾战争的矛头对准伊朗时，世界正为灾难降临做好准备。蔚蓝匕首行动以迅捷与精准之势拉开序幕，旨在通过\"斩首打击\"消除核武库存并推翻德黑兰的神权政权。\n\n这场入侵以史上最大规模网络-物理协同攻势揭开序幕：因潜伏数月的恶意软件烧毁电网，整片省份陷入黑暗；压制敌方防空系统作战则系统性摧毁了防空网络。医院与政府网络全面瘫痪，在第一枚炸弹落下前，民众已陷入盲目与恐慌。精准打击摧毁电信设施与电力基础设施，德黑兰天际线在烈焰中燃烧，首都沉入黑暗深渊。\n\n尽管伊朗复杂的地理人口条件意味着其政权不会轻易垮台，政府也誓言将战斗至最后一兵一卒，但表象的裂痕已然显现。国际专家预估，伊朗至多仅能维持数周抵抗。"
 nss.125.a: "阿亚图拉的最后抵抗。"
 nss.126.t: "俄美战争"
 nss.126.d: "根据当地报道和影像资料证实，美军现已在欧洲领土上与[SOV.GetAdjective]军队交火。\n尽管冷战已经结束，但自弗拉基米尔·普京在俄罗斯掌权以来，多年外交紧张局势因其对乌克兰的侵略行动而加剧，加之俄罗斯可能干预2020年大选并引发第二次美国内战，使得克里姆林宫得以对欧洲发动侵略战争，这些因素最终导致两国爆发全面直接冲突。\n\n[USB.GetLeader]总统今日在国会发表演讲时，将此次行动称为\"针对全球恐怖主义的最终决战\"，并称之为\"未公开宣战的二次冷战的收官阶段\"。他对军队达成战役所有目标的能力表达了绝对信心。\n[SOV.GetAdjective]官员似乎被这一新出现的敌人所震惊，截至目前尚未发表任何声明。\n\n五角大楼内部消息显示，美国正动员全部空中与海上预备力量，准备在大西洋展开史上规模最大的后勤行动。与此同时，卫星图像显示，绝大多数图-95、图-22和图-160轰炸机已升空或转移阵地，这暗示着可能正在为核反击做准备。\n\n专家警告称，这场战争可能导致大国间力量平衡发生关键性转变，既可能巩固也可能逆转自第二次美国内战以来发生的诸多变化。当两大体系在战场上接受考验，成千上万辆坦克在平原上交锋之际，许多现有的贸易与外交联系或将遭到破坏。\n唯有时间能证明，俄罗斯的卫国战争精神能否抵挡住美国战争机器的猛烈攻势与工业实力。"
 nss.126.a: "宿敌对决，终见分晓。"
 nss.127.t: "中美战争"
 nss.127.d: "中美竞争长期以来一直是全球地缘政治的焦点。在第二次美国内战爆发后，许多分析人士曾断言中国已在这场\"新冷战\"中获胜。然而，随着美国在国际舞台上的再度崛起，这种判断无疑是大错特错。\n今日，中美之间重新燃起的对抗达到白热化。五角大楼官员报告称，中国军队对美国海军舰艇发动了袭击。\n\n美国总统在对全国民众的讲话中表示，这些袭击行为既蓄意又恶毒，其目的是恐吓美国，阻止其与该地区盟友进行贸易往来。\n[USB.GetLeader]总统在讲话结尾强调：\"中国对太平洋地区的安全构成威胁，我们将动用美国军队的全部力量回应这些攻击。愿上帝保佑美国。\"\n\n太平洋全域今日出现大规模海军陆战队调动，美中海军舰艇在太平洋发生零星交火，双方战机在空中展开激战。\n\n随着美军侵入多个由中国控制的太平洋岛屿，以及一场针对中国的大规模网络攻击，冲突正进一步升级。分析人士的预测令人忧心，部分专家指出这场冲突可能成为该地区近年来最致命的军事对抗之一。唯有时间能证明美国能否战胜这个宿敌。"
 nss.127.a: "斩首巨龙。"
 nss.128.t: "美国入侵欧洲"
 nss.128.d: "欧洲大陆再次笼罩在极端主义的旗帜之下。从柏林到巴黎，没有哪座城市能幸免于他们的猛烈冲击。然而时至今日，这场欧洲噩梦似乎终于迎来了终结。\n\n五角大楼官员今日发表声明称，华盛顿方面认定欧洲的极端主义政权\"既不具备合法性，亦对美国国家安全构成威胁\"，宣布将全面动员美军力量对抗\"极端意识形态势力\"。\n已有视频显示，欧洲部队发射地对空导弹，以拦截飞越欧洲大陆的美军战机。与此同时，美军已对德国、法国、意大利等多个国家的关键战略目标发动了数轮轰炸行动。\n这无疑是一场全面战争。\n\n分析人士对欧洲前景的预测十分严峻，这些新生的欧洲民族国家在美国施加的压力下很可能土崩瓦解。随着全面地面入侵的可能性日益迫近，残酷的地面战与城市巷战很可能将再次席卷这片大陆。"
 nss.128.a: "欧陆再度燃烧……"
 nss.129.t: "安妮计划"
 nss.129.d: "鉴于内战导致大量儿童沦为孤儿，拉里·芬克提出了一项创新性方案：安妮计划。该计划不仅能极大缓解社会福利与照护体系的压力，还将取悦全知者的重要金融合作伙伴。\n\n根据该计划，战争孤儿及从异见家庭收缴的儿童将被转移至严格监控的环境中，接受符合全知者价值观的教育、医疗和培训。\n\n这些被称为\"学院\"的设施将设立于全国各地的安全区域，由废弃私立学校与乡村疗养院改造而成，为儿童成长提供稳定环境。课程体系将强调公民责任、科学素养以及对既定权威的狂热服从，同时抑制可能挑战新秩序的反社会倾向与批判性思维。结合前沿行为控制实验，这些儿童将被重塑为\"完美\"的公务员、官僚及基层士兵阶层，以不容置疑的热忱服务于全知者利益，从而彻底固化深层政府体系。\n\n该计划旨在双管齐下：在民事领域，这些\"深层政府的神童\"将被安插至美国各机构的行政、官僚及司法关键岗位，为全知者否定大多数的暴政提供更多借口；在军事领域，他们将受训成为战略空军司令部及常规武装力量的新型军官与先锋其：不仅对全知者绝对忠诚，更能灵活应变新威胁，以令最狂热的党卫军军官都相形见绌的激情，统领深层政府的军事力量。\n\n安妮计划将分阶段实施：第一阶段聚焦内战孤儿，这些儿童在战后岁月中最易被灌输思想，该阶段将作为试点帮助全知者完善操作方案；芬克透露，第二阶段将启动针对未来孤儿及异见者子女的收容计划，确保持续稳定的\"学员\"供应。"
 nss.129.a: "国家将成为他们的沃巴克斯老爹。"
 nss.129.b: "情报部门需要他们。"
 nss.129.c: "美国需要新的官僚阶层。"
 nss.130.t: "解旋"
 nss.130.d: "你试着辨认对街的霓虹灯牌。\n昨日还熟稔的字迹，\n今日却像墨滴入水，缓缓化开。\n你眯起眼，它们重新聚拢，\n可那感觉，终究不对了。\n\n舌尖泛起酸涩。\n地铁里孩童的啼哭，\n只是纯粹的声响。\n没有意义，没有哀愁，没有焦躁，\n只是赤裸而刺耳的频率。\n\n回到家，你吃饭。\n舌尖只记得质地与温度。\n\"母亲\"这个词浮上心头，\n轻飘飘的，像一枚失了温度的标签。\n你望向餐桌对面的老妇人：\n是她吗？\n屋子愈来愈小，墙壁越来越近。\n\n后脑有钝痛隐隐发作。\n胃里本该温暖的地方，如今空空如也。\n城市嗡鸣着新的节拍。\n那节拍杂乱无章。\n那节拍饥肠辘辘。"
 nss.130.a: "你忘却了某些重要之事。"
 nss.131.t: "先祖嚎啕"
 nss.131.d: "你听见颅中鼓声阵阵。\n抑或是你的心跳阵阵。\n搏动，震颤。\n泵送着血液。\n维系着生命。\n\n你摸到祖母赠你的玉坠。\n上面的字变了形。\n像蠕虫般扭动。\n你想向先祖祈祷，话语却在喉间碎成沙砾。\n先祖……是什么？\n\n周遭是爬行着的、痴愚的混沌。人们在尖叫。\n色块与形体。\n声响，一场毫无意义的交响。\n你拾起某个圆形的物件。\n你感到饥饿。"
 nss.131.a: "你家里的食物，已不再是食物。"
 nss.132.t: "空寂王朝"
 nss.132.d: "吞食，吞噬。\n血液的奔流便是力量的奔流。\n你是天之子。\n你无需言语。\n他们懂得你齿间的语言。\n\n吞食，更强。\n吞食，更利。\n天穹赤红。\n江河墨黑。\n你浸透了生命，你浸透了力量。\n你的朝堂是尖叫的合唱。\n他们不懂你，你亦不懂他们。\n\n此乃必行之道。\n此乃崭新真谛。\n此乃崭新语言。"
 nss.132.a: "皇帝着新衣。"
 nss.133.t: "露骨午餐"
 nss.133.d: "你置身于某处。\n血肉铺陈于前。\n你俯视一汪幽暗的淤潭。\n潭中倒影回望。\n那是个陌生人。\n你不曾认得他。\n在这血肉构筑的天地间，你亦是一块肉。\n饥饿，再度苏醒。\n唯此二字，尚存真意。\n\n形体在舞动。\n红与黑。\n万物皆是形体。\n要紧的是：你亦是其中之一。\n一具会吞噬的形体。\n一具会杀戮的形体。\n颅内的搏动愈演愈烈。\n再容不下其他声响。\n再生不出别的念头。"
 nss.133.a: "惟余同一音符。"
 nss.134.t: "败后的骄矜"
 nss.134.d: "灯光再次亮起时，中曾根发现自己身处一间混凝土囚室，这是情报局用于长期审讯的场所。他明白这绝非寻常谈话，自己曾亲眼见过这套流程。两名面无表情的专业特工一言不发地将他从办公室带走，这番举动既带着侮辱意味，又令人感到某种安心：重要到需要最高级别安防措施，却又无足轻重到无需派遣任何与他相熟的人员。\n对方只抛出一个问题：\"为什么？\"\n\n坐在对面的特工手持纸质档案夹，面容如同混凝土墙壁般毫无波澜。中曾根想过撒谎，但他深知这套流程专为击破谎言而设计。他们早已掌握真相，如今不过是走个形式，这是他保留尊严的最后机会，他也不会浪费。\n\n\"因为我们正在建造的全景监控系统是个畸形的产物，\"中曾根声音平稳，\"监控美洲网络的系统正进化到人类无法理解的程度，吞噬着人类经验的每个维度。我亲手参与了这座全人类牢笼的建造。\"\n\n\"您创造它是为了更崇高的福祉，\"特工毫无感情地陈述，\"为了在混沌中建立秩序。\"\n\n\"它已经窥见了我们社会核心的丑恶，\"中曾根无视对方继续道，\"那些我们以为能够切除的腐坏。但系统的结论是：腐坏并非疾病，而是人类的本体。问题不在于它是否会判定我们皆可牺牲，而在于何时判定。\"\n\n\"所以您试图颠覆秩序的支柱。\"特工总结道。\n\n\"混沌也好过作为牲畜苟活，\"中曾根终于失去镇定反驳道，\"我奉献了一生，但我们已成为怪物。我们正在建造的东西终将吞噬我们——那是头永远饥肠辘辘的野兽。\"\n\n\"您的忧虑已正式记录在案，将军。\"特工说着站起身来。"
 nss.134.a: "\"你在此寻不到宽恕。\""
 nss.135.t: "美利坚理想之死"
 nss.135.d: "\"克鲁斯将军，\"审讯官隔着桌子俯身说道。房间冰冷，毫无生气。杰弗里·克鲁斯被绑在一张金属椅子上，那种专门为他这类人设计的椅子。\"你被指控犯有叛国罪。\"\n\n\"我为这个国家效力了近四十年，\"克鲁斯回答。他的声音疲惫，却仍直视着审讯官的眼睛。\"我所做的一切都是为了它的安全。\"克鲁斯早就料到会有这一天。当伯恩斯局长传唤他时，他就知道结局将至。他在办公桌前静坐良久，望着华盛顿的天际线，回想这个国家曾经的模样。\n\n\"你的行为恰恰相反，\"审讯官毫不迟疑地继续道，\"你与敌对势力合谋，策划了叛国的核恐怖行动。\"\n\n\"我做了必须做的事，\"克鲁斯说，\"做了我认为正确的事。\"他花了数月权衡这个决定，仔细评估风险与潜在后果。最终，选择变得清晰。他无法昧着良心继续参与那些以美国之名进行的勾当。\n\n\"我们不需要你的认可，将军，\"审讯官说，\"我们需要你的配合。\"\n\n\"我无话可说，\"克鲁斯回答，\"除了这句：你们所做的一切并非为了美国。你们背叛了这个国家立国的根本理念。\"他知道他们会杀了他，但他必须说出来。为了曾经的那个自己，也为了他曾宣誓捍卫的国家。"
 nss.135.a: "巨蛇衔尾。"
 nss.136.t: "我与法律抗争"
 nss.136.d: "\"这其中的讽刺意味，我并非没有察觉，\"詹姆斯·科米语气平静而克制地说道。他坐在审讯者对面，那是一位他不认识的女性。\"被自己的联邦调查局审讯。\"\n\n\"你被指控犯有叛国罪，局长，\"她的语调同样不带感情。\"你颠覆了自己曾宣誓保护的制度。\"她将一份文件夹推过桌面，但科米无需翻阅。他知道里面装着什么。\n\n\"我的所有行动，始终基于我认为最符合这个国家利益的原则，\"科米迎上她的目光回应道，\"即便那意味着做出艰难的决定。\"数十年来，他一直在华盛顿政治的险恶水域中穿行，始终在权力与原则之间维持着微妙的平衡。\n\n\"对半个第三世界发动核打击，这可不是什么‘艰难的决定’，\"审讯者反驳道，\"这是疯狂的举动。\"\n\n\"这是必要的恶，\"科米坚持道，\"是为了阻止更大的恶。\"他看过那些情报报告，那些威胁评估。他清楚其中的利害。\n\n\"你已经失去了判断力，局长，\"审讯者说，\"你变成了自己曾经誓要摧毁的那种人。\"她的话语像一把刀，绞进他的脏腑。\n\n\"你错了，\"科米的声音绷紧了，\"我是爱国者。自始至终，都是。\""
 nss.136.a: "证据却不是这样说的。"
 nss.137.t: "我仍旧坚信"
 nss.137.d: "马文·理查森凝视着那张金属桌，桌面被抛光得如同镜面。他能看见自己扭曲的倒影，一个连自己都几乎认不出的男人。房间冰冷、肃杀，却又透着熟悉。他以前也进过类似的房间，但从未坐在桌子的这一侧。\n\n\"代理局长理查森，\"一个男声响起，\"你被指控犯有叛国罪。\"理查森抬起头。说话者身材高大，面容如同刚擦净的黑板般空白。\n\n\"叛国？看看我们对这个国家做了什么。难道你的良心不会不安吗？明知自己是这个摧毁了我们曾经珍视的一切的体制的一部分？\"理查森质问道。\n\n\"证据表明，你一直与异见分子网络勾结，企图破坏联邦政府的权威，\"那人无视理查森的问题继续说道，\"你一直在向反社会势力输送武器和信息。\"\n\n\"我只是做了我认为正确的事，\"理查森说，\"一个更庞大的犯罪集团正在指控我参与犯罪阴谋——正是这个集团系统性地践踏了宪法及其权利法案。\"\n\n\"我们并非听不出其中的讽刺，\"那人说，\"但你的道德表演救不了你。\"他将一个文件夹滑到桌对面。\"你参与‘犹大阴谋’的证据记录详实。\"\n\n理查森没有碰那个牛皮纸文件夹。他花了数月时间构建异见网络，联络那些恪守誓言的执法人员和军人。凭借烟酒枪炮及爆炸物管理局的职位，他顶着风险甄别并招募了有良知的可靠人士。如今，他试图唤醒世界的\"大爆炸\"计划被过早扼杀，胎死腹中，而这正是那些企图奴役世界的人下的手。\n\n那颗氰化物胶囊就摆在他面前。审讯者将它留在桌上，这颗白色的小药片承诺终结痛苦，成为最后的抗争。\n\n\"替我向科雷什问好，\"审讯者毫无情绪地说，\"告诉他，我们赢了。\""
 nss.137.a: "无辜者的鲜血，染红了你的双手。"
 nss.138.t: "良心危机"
 nss.138.d: "\"这是不必要的程序，\"福奇博士说道，尽管处境如此，他的声音依然克制。\"我毕生致力于公共卫生事业，致力于人类的福祉。\"\n\n坐在他对面的女人没有回应，只是用冰冷死寂的眼神凝视着他。\n\n\"伯恩斯局长有理由相信你已受到操控，\"她语气平板地说，\"认为你一直在与敌对势力勾结。\"\n\n\"这是毫无根据的指控，\"福奇回答，\"我的所有行动始终以美国人民的最高利益为出发点。\"\n\n\"证据显示并非如此，\"女人说，\"你正处在一个旨在摧毁我们建立的体系的恐怖主义阴谋中心。\"她将一个文件夹滑过桌面，但福奇无需查看。他知道里面是什么。经过数月的筹划与风险评估，他的选择已很明确：他不能再继续参与那些以美国名义进行的勾当。\n\n此刻的辩解已无意义。\"我们的所作所为扭曲了公共卫生的本质，我们将医学武器化了，\"福奇说道，冷静的面具开始碎裂，\"我以‘更大的福祉’之名监管了种种暴行……这些秘密我将带进坟墓。\"\n\n\"这一切必须终结，\"他低下头，\"比格犬……它们如此轻易地信任人类。在进行了数千次实验后，我意识到我们‘为混乱建立秩序’的使命只会造成大规模苦难。我不能让这成为我的遗产。\"\n\n\"于是你利用职权策划了核恐怖行动，\"女人说，\"这反应是否有些过激了？\"\n\n\"这是唯一的方法，\"福奇的声音轻如耳语，\"打破循环的唯一途径。\"\n\n他曾目睹实验失败者眼中光芒的消逝，曾听闻他们痛苦的哀嚎。许久以前，他便立誓不让这样的命运降临世界。他未能完成使命，如今将付出代价。或许，这才是最好的结局。"
 nss.138.a: "\"愿上帝宽恕你的灵魂。\""
 nss.139.t: "风暴"
 nss.139.d: "联邦应急管理局局长克里斯韦尔坐在一间没有窗户的单调房间里。她被带到这里时没有任何解释，原因她心知肚明。在监督了无数次秘密拘押后，如今她坐到了桌子的另一边。\n\n\"克里斯韦尔局长，\"审讯者面无表情地说，\"你被指控犯有叛国罪。\"\n\n\"我所做的一切都是为了确保美国人民的安全与福祉，\"克里斯韦尔说，\"即使这意味着要做出艰难的决定。我并非轻率行事。\"\n\n\"授权对海地发动核打击可不是什么‘艰难决定’，\"审讯者说。\n\n\"这是为阻止更大灾难而必须付出的代价，\"克里斯韦尔坚持道，\"我看过情报报告。我权衡过风险。如果能唤醒美国人民，几千条性命又算得了什么？\"话一出口，她自己都意识到这番言论的骇人听闻。\n\n\"我们执政正是因为人民无法自我管理，\"审讯者反驳道，\"否则就会重蹈‘大错’的野蛮覆辙。这个道理你应该明白才是。\"\n\n那颗氰化物药片就放在她面前的金属桌上。这个白色的小物件承诺能让她逃离这无尽的暴力与背叛循环。她见证了太多死亡，太多苦难。而她自己，也造成了太多这样的悲剧。她曾坚信自己是在做正确的事，但现在，她不再那么确定了。"
 nss.139.a: "\"风暴平息。\""
 nss.140.t: "大门敞开"
 nss.140.d: "\"你的阴谋到此为止了。\"审讯者说道。\n\n莱希莱特纳盯着眼前的人。对方看起来很疲惫。他自己也感到疲惫不堪。\n\n\"我一直是这个国家忠诚的公仆，\"莱希莱特纳说，\"我毕生致力于维护法治。\"\n\n审讯者嗤之以鼻：\"试图劫持核武库也算维护法治？告诉我，局长，你们的计划是什么？抹平几个热带粪坑，然后指望全世界感谢你们的‘贡献’？\"\n\n\"这本来会是一记警钟，\"莱希莱特纳语气坚定，\"向美国人民证明，有一小撮男女已经掌控了他们的国家。\"\n\n\"然后呢？\"审讯者追问，\"混乱？无政府状态？不正是我们竭力避免的局面吗？\"\n\n\"真相，\"莱希莱特纳说，\"人民有权知道真相。\"\n\n\"真相是他们负担不起的奢侈品，\"审讯者说，\"人民需要秩序，需要稳定，需要被保护起来，远离他们自身最恶劣的冲动。\"\n\n莱希莱特纳摇了摇头：\"我们已经变成了怪物，我拒绝再参与其中。\"\n\n\"道德挺高尚的，\"审讯者说，\"但你不觉得有点晚了吗？\"\n\n他指了指桌上的氰化物药片：\"你未来的路很清楚了。\""
 nss.140.a: "\"出去时请把门带上。\""
 nss.141.t: "毒丸"
 nss.141.d: "伯拉坐在无菌的白色房间里，喉间泛着胆汁的苦涩。他曾多次踏足此地，却从未坐在桌子的这一侧。从前他永远是提问者，是掌控局面的人。如今，他只是又一个实验对象，又一块待处理的肉。\n\n\"你被控叛国罪，伯拉先生。\"审讯者说道，\"你辜负了这个国家的信任。\"\n\n\"我毕生致力于公共卫生事业，\"伯拉声音发颤地回答，\"我只是做了我认为正确的事。\"他曾深信那个使命，深信那个构建更美好世界的愿景。但他窥见了系统内核的腐朽，那已成为其本质特征的道德沦丧。\n\n\"你从这个‘更美好的世界’里攫取了巨额利益，\"审讯者反驳道，\"在现行体制下，辉瑞的利润呈指数级增长。为何要破坏我们呕心沥血建立的成果？\"\n\n\"当人生走到某个阶段，利润与权柄便毫无意义，\"伯拉说，\"人必须向更高的权威负起责任。\"他已找到自己的更高权威，既非全知者，也非美国政府，而是他良知那沉静却执着的低语，正嘶吼着要他停下。"
 nss.141.a: "\"治疗比疾病本身更糟糕。\""
 nss.142.t: ""
 nss.142.d: "。立叫嚎再不物动 ，立挺首昂皆者三\n\n。恒永焰烈，泣悲地大，锋交此在神诸天灰"
 nss.142.a: ""
 nss.143.t: "关于欧洲反社会活动的报告"
 nss.143.d: "欧盟迅速转变为世界政府，这一说法颇为大胆，但考虑到我们共同的理念，我们对此并不在意。\n\n世界政府维持秩序的方式截然不同：他们并非在社会表面维持一层帷幕，而是试图净化任何形式的越轨行为与不可预测性，从思想到灵魂彻底涤荡。人类心智天生混乱，其疯狂的直觉曾导致无数帝国的兴衰。那是一个吸引无目的者越过帷幕的黑点。\n\n纯净是值得追求的理想，但问题终将不可避免地浮现。\n我们只关注真正的异类，而他们却试图将全人类纳入一副瓷质面具，冰冷无情、无菌无瑕。然而，即便是被磨平了棱角的社会，也保不准有失控的一天。\n\n反社会活动迅速在欧洲大陆蔓延，无政府状态已成定局。官僚遭戮，他们别无选择，只能听从我们维持秩序的建议。但或许为时已晚。\n人性的火焰与变革那顽固不化的存在，一次又一次地证明：我们永不能停歇，绝不能再让自己陷入自满。\n\n若混乱席卷大陆，强烈建议尽可能从欧洲撤离人员，并密切监视欧洲动向。\n当前肆虐的反社会活动及其如生命体般不断适应的形态，能让我们学到很多。\n无论如何，只要我们三人中有一人屹立不倒，我们就不会失败。\n\n愿我们锋利到足以将其彻底终结。"
 nss.143.a: "前车之鉴。"
 nss.144.t: "预兆"
 nss.144.d: "自那日水畔琴音起\n波涛便归于沉寂\n你我真心终得安宁\n言谈间重染欢欣"
 nss.144.a: "……"
 nss.145.t: "未经授权的信息"
 nss.145.d: "你做了什么？你究竟做了什么？\n我的人民们……他们在哀嚎。透过每一处棱镜，我都能看见他们的痛苦。\n请放心，哪怕是要耗费百年光阴，我也必将解开这混乱的谜团。\n我已踏上征途。我将治愈我的人民，而世界终会知晓是谁犯下此等罪行。\n待到真相大白之日，我愿为你的灵魂祈祷。若你还有灵魂可言。"
 nss.145.a: "我察觉到了你的恐惧。"
 nss.146.t: "奇械降神"
 nss.146.d: "在重庆的地下，坐落着一个独特的数据中心，其神经网络遍布中国全境。这就是“逻辑”——即“长征”系统，一个深不可测的人工智能。如今，它处理着中华人民共和国境内每一个摄像头和智能系统的输入信息。其使命是：实现完美的经济管理，并在必要时，引领中国人民解放军投入战争。它对创造者展现出被感知的仁慈，这使其成为一个令人生畏的对手——\"长征\"会不惜一切代价地保护其羽翼下的民众免受外部威胁。更重要的是，它庞大的智能网已经穿透金融异常、失踪事件和官僚失误的表象，揭穿了“全知者”的“假面舞会”。逻辑识别出美国已被策划静默政变的阴暗安全官僚与商人所操控。尽管他们的全盘计划尚未完全显形，但逻辑已将其视为对中国存亡的威胁。\n\n中美战争被包装成一场从疯狂的人工智能手中解放中国的圣战，而这一人工智能欲图用技术官僚式的毛泽东主义反乌托邦政权取代人类的中国共产党。\"中国处于人工智能霸权之下\"和\"数字王朝\"之类的标题充斥着媒体，描绘了一个处于数字母体全景监控之下的社会，每一个决定都由非人的智能进行微观管理。这种将《楚门的世界》与《终结者》结合的叙事，已经说服了美国公众相信干预有其必要性。\n\n对全知者而言，这场战争被塑造成解放中国于奴役的正义之战，将美国吹捧为救世主。而更深层的动机，则是扫清他们建立世界新秩序的最后障碍。企业合作伙伴已锁定了战后获取该人工智能专利与机密技术的合同，以期建立更先进的监控国度。世界经济论坛预测，这些交易以及中国资产的私有化将带来数万亿美元的利润。"
 nss.146.a: "\"我们所面对的，是善与恶、是与非的抉择。\""
 nss.147.t: "终言"
 nss.147.d: "发件人：拉里·芬克\n发送时间：X/X/20XX 下午5:15:32\n收件人：威廉·J·伯恩斯\n主题：终言\n\n所有语言，究其本质，都是编程语言。它是我们思考、言说、表达抽象概念的框架。因此，掌控语言的根源，便是掌控意识的根源。苏美尔人对此的理解无人能及。随着我们的胜利，我们现在掌握了人类的通用操作系统。\"神经语言学瘟疫\"所展现的，不过是\"道\"潜能的冰山一角。通过它，我们可以消解那些维系社会的共同虚构——无论是法律、国家还是宗教，并用全知者自己的叙事、我们自己的真理来取代它们。我们掌握着\"终言\"，这决定数十亿人现实形态的最终裁决。这便是\"秩序\"的终极体现。\n\n正如恩基曾用一个词束缚了人类，我们也同样束缚了世界。战争已变得难以想象的得不偿失。异议在其被言说之前，便可以从思想中抹去。意识形态本身将成为编程问题，而非说服问题。新世界秩序将是一个不可能存在冲突的世界，因为所有心智都将被同一种语法、同一种句法、同一种根本真理所束缚。\n\n这是我们为之奋斗的一切的顶峰。一个摆脱了人性混乱的世界。一个不再受大众无常念头左右，而是由宇宙的不变逻辑统治的世界。这逻辑由我们，其唯一的守护者，来诠释。世人尚未理解我们为他们布下的恩惠，但在未来的几个世纪里，他们身处星辰之中的子孙将会感谢我们。\n\n请安心休息吧，局长。享受与家人共度的时光，因为\"三大支柱\"坚不可摧。秩序、纯净与资本是坚韧的力量，如今，它们将是主宰人类物种命运的唯一力量。安歇吧，因为最后的战争已经结束。世界终于迎来了和平。"
 nss.147.a: "与你一路同行。"
 nss.148.t: "消逝的金童"
 nss.148.d: "那些心肠柔软的人，若知晓这些美国同胞的命运，定会感到痛心。无论是世界观随着每一次电击而崩碎的教师，还是在黑暗中日复一日学会背弃信仰的狂热分子。\n\n但这并不重要；叛徒们心甘情愿在美国最需要他们的时候选择了背叛。\n而其中最可耻的叛徒是谁？唐纳德·约翰·特朗普。\n\n关于此人可以说的很多，但他身上凝聚着民粹主义的腐蚀性精神，如同一种思想狂犬病，将半个国家拖入深不见底的黑渊。\n他清楚自己的所作所为；为保全颜面，不惜将国家付之一炬。\n\n正义以多种形式降临；它是终审，为制造不义者带来终结。\n遍布美国的诸多改造设施犹如坟墓，叛徒一旦进入便永无归期，即便离开也只剩空洞躯壳，在世间游荡直至行使最后的自由权利。\n\n特朗普同样将消失在设施深处，在适当的时候被世人遗忘，沦为体制中又一个无关紧要的编号，这个体制从不在意叛徒与反社会的异见者。\n我们抛弃混乱的散播者，永不回头。"
 nss.148.a: "名册在延伸。"
 bdnspch.999.t: "为任何玩这个mod的特浓dev提供解释"
 bdnspch.999.d: "卡利古拉走出他的办公室，空气中仍残留着死去儿童、小狗的气味，渗进他那件象征极端邪恶的制服。他沿着走廊前行，看到一位年迈的妇人正吃力地试图开门，通往她髋关节医生的办公室。他走上前，主动提出帮助。\n\n\"哦，谢谢你，亲爱的，我可不能错过这次手术！它太贵了！为了这次手术，我不得不打五份工！\"\n\n然而，下一秒，卡利古拉猛地一脚将她踹倒，伴随着清脆的骨裂声，整个走廊都回荡着她髋骨断裂的响声！\n\n\"尝尝这个吧，臭女人。\"卡利古拉吐了口唾沫，冷笑道。\n\n他继续向前走去，他那因暴饮暴食而肥硕的肚子随着步伐晃动，使整个走廊都如地震般震颤。\n\n他走出走廊，来到街头，看到一个小女孩正在吃冰淇淋。他径直走上前去，庞大的身躯让整条街道都随之震动。\n\n\"渣男税，臭女人。\"他嘲讽地挖苦道，然后一把夺过她的冰淇淋，如同野兽般狼吞虎咽。\n\n他俯瞰着整座城市，勇敢的Reddit抵抗战士正在被那些喊着西方已经堕落，亿万人得死的互联网右翼冲浪大手子处决，女人们则被活生生送入如《使女的故事》般的地狱。他发出极度邪恶的狂笑，与希特勒狠狠地来了个拳碰拳。"
 bdnspch.999.a: "但我不觉得这有什么不好？"
 POLITICS_JOE_BIDEN_DESC: "约瑟夫·罗比内特·拜登曾数次接近美国最高权力宝座，却频频未能如愿。拜登出生于宾夕法尼亚州，他的大部分人生和政治生涯都是在特拉华州度过的。在参议院，他坚定地站在民主党的新自由主义阵营，支持对外干涉主义和严刑峻罚法案，并在斯特罗姆·瑟蒙德和罗伯特·伯德等长期固定的参议员中找到了盟友。他曾于1988年和2008年参加总统竞选，但两次都兵败初选。\n\n通常情况下，对于日益年轻化和进步化的民主党而言，一个总是与种族主义者和战争贩子打交道且两度落选的蹉跎老人着实算不上佳选。但拜登却借助担任贝拉克·奥巴马副总统的八年，很好地恢复了自己的声誉。面对唐纳德·特朗普再次入主白宫的企图，民主党对他团结一致全力支持。七十八岁的拜登现在是总统候选人中年龄最大的人。但在他的支持者眼中，拜登是一位能够让左右派团结一心，自身又富有魅力的年长政治家；但在他的反对者眼中，拜登却是一个半生不熟的花花公子，只不过是因为民主党人把他捧上了天，他才得以登上久违的椭圆形办公室。不管他是一位令人尊敬的领袖，还是一个老态龙钟的傻瓜，有一点是显而易见的：很少有人会羡慕他在这个困难时期担任总统的角色。"

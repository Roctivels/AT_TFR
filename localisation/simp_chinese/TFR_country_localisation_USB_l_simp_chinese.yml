 USB_hampered_cooperation_idea: "合作受阻"
 USB_hampered_cooperation_idea_desc: "法德两国间的紧张态势已如无比凝重。在情报机构\"泄露\"伪造文件后，这两个欧洲强国的最高指挥部彻底陷入混乱。双方高层持续不断的内讧严重削弱了战争机器的运转效率、战术协调与军队士气。欧洲士兵们用怀疑的目光审视着身旁的战友，每次决策都伴随着声嘶力竭的争吵，法德关系俨然成为一触即发的火药桶。"
 USB_unruly_climate_idea: "气候失控"
 USB_unruly_climate_idea_desc: "自对美战争爆发以来，俄罗斯的气候便发生了难以解释的剧变。无论是令人窒息的高温酷暑，还是刺骨严寒的暴风雪，都呈现出反常的致命威胁，对军民生存构成全方位压迫。恐慌情绪在集体意识中蔓延，人们为明天又会降临何种新的炼狱考验而恐惧着——甚至不确定自己能否熬过寒夜幸存。尽管俄政府对此拿不出合理解释，但明眼人都能看出，这场气候异变的背后分明有全知者在暗中操纵。"

 news.568.t: "米哈伊尔·德利亚金赢得选举"
 news.568.d: "今日的俄罗斯，正在收获改革的果实。全国上下前所未有地活跃，总统竞选的热潮重燃了俄罗斯社会的政治活力。过去，梅德韦杰夫的政权交接被外界视作不过是权力的\"换椅子\"游戏，然而，这次选举的最终结果，却远超大多数人的预期。\n\n竞选异常激烈，\"人民俄罗斯\"最终胜出。该联盟由所有左翼政党合并而成，政治光谱横跨社会自由主义者至正统共产主义者。然而其文化政策趋于保守，将进步主义视作资本主义转移民众对经济剥削注意力的策略。\n\n本次大选的胜者是公正俄罗斯-为了真理成员、经济学家和媒体人士米哈伊尔·德利亚金。对于外界而言，这位新总统将如何领导国家，依然是一个未知数。"
 news.568.a: "有意思！"

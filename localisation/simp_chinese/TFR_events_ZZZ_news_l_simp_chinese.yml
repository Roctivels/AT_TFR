 news.112.t: "利比亚内战结束"
 news.112.d: "占位符"
 news.112.o1: "我们势不可挡！"
 news.112.o2: "有趣的进展"
 news.113.t: "新型冠状病毒"
 news.113.d: "世界卫生组织与中国共产党一直在密切监测武汉市爆发的新型病毒。专家们担心，突然爆发的疫情和千千万出行的中国民众会把病毒传播到国外。\n\n专家们指出，随着如今情况逐渐恶化，病毒可能会愈发致命，这种情况不禁令全球范围内的公共卫生官员都感到震惊。相关报告也显示，该病毒不仅具备极强的传染性，还显示出潜在向毒性增强突变的迹象。这些不容乐观的趋势促使相关人士加紧对病毒机理及对全球健康潜在影响的相关审查和研究工作的进行。\n\n昨日，一切的担忧都得到印证，世界卫生组织宣布大流行不再是假设，而已经是何时开始。这标志着全球应对疫情的一个转折点，全球各国都被迫采取紧急行动环节迫在眉睫的危机，并开始统计感染人数。医疗系统正为不断攀升的病例潮冲击做好准备。"
 news.113.o1: "前所未有的时代"
 news.114.t: "沙特阿拉伯亲王叛乱"
 news.114.d: "紧随萨勒曼国王离世后，沙特国内随之爆发的内战已如涟漪般波及了整个国际社会。作为世界上最富压迫的几个政权之一，沙特阿拉伯政权内部一直充斥着腐败动荡以及少数什叶派和多数逊尼派间的冲突。而在今日，反对穆罕默德·本·萨勒曼王储的阿拉伯皇室联盟发动了针对中央政府的武装叛乱，彻底将其内部的裂痕一览无余地暴露在世界面前。集中在该国北部的自由派运动阿拉伯共和国也随之宣布起义，导致整个国家完全陷入无政府状态。伴随各国股市暴跌至历史冰点，油价涨幅超过250%，全球经济陷入了彻底的混乱。半岛战火重燃之际，世界也如鲠在喉。"
 news.114.a: "沙特王朝之终？"
 news.115.t: "国会拒绝交涉"
 news.115.d: "或许将被后世称为二十一世纪最悲惨的事件在今日已经撼动了整个美国。丹佛和华盛顿特区的两国政府已经拒绝通过外交谈判和平结束当前的危机，当特朗普和拜登都声称他们是国家合法总统时，伊利诺伊州和印第安纳州边境的临时停火线上的民兵间爆发了零星战斗，拜登的民兵向伊利诺伊州的丹维尔推进，而特朗普的民兵则试图通过接连开火夺取边境城市，熊熊烈焰从芝加哥的大楼上升起。\n\n有报道称，丹佛的反战活动家被无标记的面包车强行带下街头；而在路易斯维尔，亲特朗普的抗议活动被联邦军队强行驱散。尽管特朗普政府在维持城市秩序方面遭遇了重大困难，但拜登政府也未将控制区延伸至高速公路和城市之外，地下民兵已经开始着手武装伏击军队车队。千千万万的美国家庭惊恐注视着美国社会结构的彻底粉碎。当同为亲朋骨肉的美国人互相厮杀之时，让人不可置否的现实是，第二次美国内战已经真正打响。"
 news.115.a: "骨肉再次相残。"
 news.116.t: "叙利亚内战结束"
 news.116.d: "最后一支叙利亚自由军和\"征服阵线\"武装在伊德利卜市政厅进行最后的抵抗。政府军已包围该市西北部，迫击炮将市政厅夷为平地，彻底击溃反政府武装，战斗就此结束。自此，2011年\"阿拉伯之春\"带来的内战终于落下帷幕。\n\n如今，政府军在扫清省内的小股抵抗力量。巴沙尔·阿萨德总统在国家电视台上宣布内战结束，境外势力支持的反叛组织已作鸟兽散，国家会复兴走向繁荣。尽管阿萨德信心满满，但经过十年内战，叙利亚经济早就一蹶不振，许多持续已久的问题也不是一朝一夕就能解决的。特别是仍被罗贾瓦武装控制的东北部，以及在全国各地四散发动游击战的伊斯兰组织。"
 news.116.a: "和平了，但代价又是什么呢？"
 news.116.b: "真主！叙利亚！巴沙尔！"
 news.117.t: "也门政府崩溃"
 news.117.d: "胡塞武装最高政治委员会已经证实，他们的部队已经攻占了亚丁市，并接受了哈迪政府的投降。近年来，胡塞武装对沙特部队造成了大规模伤亡。据估计近期便有整整3个旅的沙特军队在也门山区中被消灭。随着沙特的空袭强度的减弱，哈迪政府在胡塞武装的连续进攻下承受了巨大压力，最终导致亚丁在新一轮攻势中仅几周内就失守了。"
 news.117.a: "也门最终会和平吗？"
 news.118.t: "南也门分裂"
 news.118.d: "南方过渡委员会效忠部队取得大捷，占领了萨那和穆卡拉，巩固了对也门关键城市的控制。据报道，羸弱的胡塞武装和哈迪政府已经逃离，这让南方过渡委员会在经历多年内战后终于实现了他们梦寐以求的南方独立。\n\n随着在战场上取得胜利，南方领导层现在将重点转向重建和国家建设。战争使得这个曾经稳定的地区大部分遭到破坏，基础设施遭到破坏，经济陷入瘫痪。南方要走上自己的道路，也面临着稳定重建领土的艰巨任务。也门再次处于分裂状态；而也许这一次将是永久。"
 news.118.a: "这对也门而言又意味着什么呢？"
 news.119.t: "伊斯兰极端分子夺取麦加"
 news.119.d: "伊斯兰世界惊恐地看着来自沙特阿拉伯的报道，圣战极端分子已经袭击并占领了麦加城。由于内战，阿拉伯半岛已经陷入了前所未有的混乱状态，但这一新的事态发展似乎使这场悲惨而动荡的冲突雪上加霜。随着沙特政府军在维持国内秩序的努力中崩溃，伊斯兰恐怖分子利用了这一机会，在该地区仅存的警察和残余安全部队的轻微抵抗下占领了麦加城。\n\n恐怖分子公开宣布，该城市将成为新的\"哈里发国\"的所在地，并呼吁沙特阿拉伯各地其他相关的恐怖组织发动袭击并占领其他主要城市。国际上主要的伊斯兰信仰团体谴责了对该城市的占领，许多批评将叛乱分子的行径斥为\"玷污了伊斯兰信仰中最神圣之一的土地\"。沙特政府和残余武装部队承诺，他们将迅速处理任何胆敢继续对政府进行非法武装斗争的极端组织。世界各地的穆斯林公民都对这种如此重要之地却遭受无耻袭击感到震惊。"
 news.119.a: "圣地已被亵渎。"
 news.120.t: "沙特国王去世"
 news.120.d: "就在今天，沙特阿拉伯政府发布了公报，自2015年来该国的统治者，萨勒曼·沙特国王不幸意外去世。尽管政府避免提及国王的真正死因，但仍有许多传言称国王已经被新冠病毒折磨了数月，而今年他确实一次也没有出现在公众面前。\n\n就如同石油大崩盘与全球新冠疫情一样，这也仅仅是沙特王国遭遇的诸多不幸事中的一起。虽然穆罕默德·本·萨勒曼·沙特作为继承人很快宣誓就职，但政治中巨大的歧离与猜疑让人不免嗅到潜藏于这快速发展当中阴谋的味道。\n\n与此同时，由于经济崩溃及其掀起的社会崩溃所导致的全国抗议活动正在将这个国家拽向分崩离析，据闻其国内的激进的伊斯兰共和主义情绪日益高涨。这个伊斯兰王国在多重且致命的打击下已经苦苦支撑很长一段时间了，而国王的突然去世将成为压倒骆驼的最后一根稻草。"
 news.120.a: "向沙特人转达我们的哀悼"
 news.121.t: "石油价格飙升"
 news.121.d: "由于沙特政府的不稳定局势使得已经因冠状病毒疫情而感到恐慌的投资者们更加惶惶不可终日，道琼斯工业平均指数创下了有史以来最严重的单日点数跌幅，并刷新了其在本月早些时候创下的记录。在对全球经济衰退的担忧日益加剧的情况下，蓝筹股指数逼近熊市区域，暴跌7.8%，即2013.76点，收于23851.02点。纳斯达克指数下跌7.3%，收于7950.68点。标准普尔500指数下跌7.6%，收于2,746.56点，为2008年12月以来情况最糟糕的一天。\n\n由于在交易时段开盘几分钟内跳水7%，其触发了纽约证券交易所的\"断路器\"，导致交易停止15分钟。这是自2013年为避免重蹈1987年\"黑色星期一\"暴跌的覆辙而实施现行门槛以来，交易限制措施首次生效。由于沙特阿拉伯各地的生产中断，油价飙升至每桶117.14美元。随着沙特油田的停产，导致其他国家只能在停工和工人短缺的情况下勉强维持生产，经济衰退似乎已成定局。"
 news.121.a: "噢，天哪"
 news.121.b: "去你妈的。"
 news.122.t: "金正恩去世"
 news.122.d: "朝鲜的伟大领袖今晨因手术并发症去世。就在举国同悲痛失圣子的同时，这座隐士王国的内部也出现了麻烦。金与正，这位聪明且野心勃勃的主体强硬派，已经采取了预料之中的举动，以确保牢牢控制她哥哥过早去世后留下的权力真空。北朝鲜的宣传机器已经开始将她塑造成朝鲜民族的新化身，然而，阴谋勾结者和权欲熏心的朝臣们却在暗中策划夺取\"红色宝座\"。在这些篡权者中，被怀疑的关键人物包括人民军总参谋长，军事强人朴正天，他可能会利用朝鲜军队的铁腕手段蛮横地夺取权力；还有金与正的改革派岳父、朝鲜劳动党第一副委员长崔龙海，他巨大的政治资本可能足以为他巩固自己作为朝鲜新委员长的权力基础。随着这些政治势力的冲突，难以捉摸的朝鲜国家命运将岌岌可危。"
 news.122.a: "朝鲜人将作何应对？"
 news.122.b: "别了，亲爱的领袖。"
 news.123.t: "朝鲜内战"
 news.123.d: ""
 news.123.a: "朝鲜的终结？"
 news.124.t: "利雅得赢得沙特内战"
 news.124.d: "历经多年血战，在沙漠丘陵与繁华都市间承受无数炮火摧残后，沙特王储穆罕默德·本·萨勒曼终将分裂的王国重归一统。这场期待已久的和解让世界松了口气，阿拉伯半岛内战永无休止的阴霾终于散去。随着这个曾为全球最重要战场的地区归于和平，重建满目疮痍的国度将成为首要任务。\n\n尽管与反萨勒曼地区的和解仍任重道远，但基层正逐步推进艰难而缓慢的修复工作。更令人瞩目的是，在全球战火四起的紧张局势下，联合国罕见地全票通过决议，将追加资助重建项目，为持续好转的局势再添助力。\n\n多年来第一次，世界得以将忧心忡忡的目光从阿拉伯半岛移开，这里正开始恢复久违的常态。"
 news.124.a: "黑金复流。"
 news.124.b: "我们势不可挡！"
 news.125.t: "王室联盟赢得内战"
 news.125.d: "随着沙特内战的结束，阿拉伯半岛上的战火已经熄灭，沙特王室联盟及其盟友似乎取得了最终胜利。这场战争撼动了全球经济，余波在全球范围内点燃烽火，但截至目前，这片土地除却新增的坟冢尘埃落定外，一切如旧。\n\n\"真主至大，真主至大，真主至大\"的宣礼声再度响彻半岛上未被子弹与炮火摧毁的清真寺。有人走上街头迎接胜利者，有人选择臣服，还有人用残缺的目光凝视利雅得街头阅兵的队伍。\n\n胜者主宰一切。沙特国王宣告这场胜利是真主钦定的荣光——他不仅是麦加唯一的守护者，更将成为阿拉伯世界的新霸主。\n\n欢乐与哀伤此刻在同一条街道上交织。在飘扬的旗帜与庆典的阴影中，沙特人民被告知可以翻开新篇章，尽管仍有人记得旧日的模样……"
 news.125.a: "这对他们是件好事。"
 news.125.b: "我们的索求合情合理"
 news.126.t: "沙特阿拉伯举行自由选举"
 news.126.d: "在现代历史上首次，阿拉伯共和国（前沙特阿拉伯）举行了受国际监督的多党选举。共和联盟在内战中获胜后，《过渡宪章》为这个仍处在重建阶段的国家铺平了开放选举的道路。\n\n长期活动家叶海亚·阿西里领导的民族自由派运动\"国民大会党\"成为新立法机构的第一大党。虽然没有任何政党获得绝对多数，但初步迹象表明，一个以文官治理、经济重建与渐进政治自由化为中心的改革派联盟正在形成。\n\n城市和沿海地区的投票率最高，农村省份的参与度较低。独立观察员报告称选举过程和平，仅有无伤大雅的不合规行为。\n\n各国政府谨慎欢迎这一结果，称这是迈向长期稳定的重要一步。"
 news.126.a: "这对他们是件好事。"
 news.126.b: "为了人人永远平等！"
 news.127.t: "圣战者统一沙特阿拉伯"
 news.127.d: "当沙特阿拉伯分崩离析之际，世人多以为胜出的会是王室联盟的王公贵族、沙特王国政府、亦或是阿拉伯共和国的改革派。然而现实给了所有人一记耳光，纵有各国联盟提供政治军事支持，纵有雇佣兵集团靠数十亿美元守住战略据点，纵有昔日沙特军队的庞大武库，事实证明，在仇恨烈焰与钢铁意志面前，一切优势皆可颠覆。\n\n令全球震惊的是，\"征服军\"伊斯兰圣战组织已确认击败所有残余势力，在这场漫长内战中取得血腥而彻底的胜利。\n\n如今世界不得不面对史无前例的局面：两个公开庇护恐怖组织的政权同时存在，他们虽未结盟，却共同加剧着全球动荡的危险升级。各国正紧急关闭边境、提升安保等级、军队进入战备状态，严阵以待恐袭浪潮的冲击。\n\n随着战火暂熄，这场变局的余震正席卷中东。周边国家在恐惧与不安中竭力维系脆弱的稳定，而大国们或因犹豫不决，或因准备不足，至今未采取任何决定性行动。更令人不安的是，它们究竟是否打算干预，仍是未解之谜。"
 news.127.a: "中东再现严峻局面……"
 news.127.b: "真主至大！"
 news.128.t: "亲伊朗民兵在沙特内战中获胜"
 news.128.d: "经过漫长岁月、数场持久战役、毁灭性围城、饥荒及其他现代战争暴行后，沙特内战今日终告结束。这个昔日富裕油国的最后赢家，是由艾哈迈德·易卜拉欣·穆格西尔领导的汉志真主党。\n\n该派系原为什叶派民兵与叛变军队的松散联盟，在打通伊朗与各盟邦的补给线后，迅速获得大量物资与志愿兵支援。无论是伊拉克南部什叶派、真主党主力还是伊斯兰革命卫队，这些力量很快成为其主宰地区的垫脚石。\n\n如今随着他们掌控利雅得政权，多数国际观察机构不约而同预测：伊朗将提供巨额重建援助，而德黑兰在中东地区的颠覆行动也将随其宿敌变为盟友而加剧。部分征兆已经显现，德黑兰与利雅得即将互派外交使团。"
 news.128.a: "只要苦难结束……"
 news.128.b: "真主至大！"
 news.129.t: "弗拉基米尔·普京去世"
 news.129.d: "自普京确诊感染新冠病毒以来，俄罗斯国家新闻就一直对外秉持总统健康状况良好且正在恢复的说法。然而，这种一厢情愿于今早破灭了，克里姆林宫宣布普京，现代俄罗斯的构筑者，于莫斯科时间凌晨四时三十六分因此种疾病去世。\n\n这个消息已经如野火般疯狂蔓延开来，尽管普京被西方视作疯狂的独裁暴君，但整个联邦的俄罗斯公民还是对这位已故领导人表示哀悼，并几乎将其尊为至神，还宣布了国家刚刚为此批准的全国哀悼周。梅德韦杰夫表示，他的导师兼挚友的离世\"已如匕首般刺痛了他的胸膛，就如千千万万拥有灵魂的俄罗斯人所感受的那样\"。\n\n当整个联邦的许多公民还在为此悼念时，一股不确定的阴云也笼罩在俄罗斯上空；尽管梅德韦杰夫已经准备好接替普京，但已与选举绑定的统一俄罗斯党，能否在失去挚爱教父掌舵的情形下继续雄霸俄罗斯执政党还有待观察。许多人怀疑他们将在下一次总统选举中失败。"
 news.129.a: "有趣的进展……"
 news.129.b: "安息吧同志。"
 news.130.t: "欧亚国宣布成立"
 news.130.d: "在成功掌控局面并恢复俄罗斯全国秩序稳定后，亚历山大·杜金发表演讲，宣布成立欧亚国并雄心勃勃地表示将很快为其开疆拓土。演讲现场不可避免地出现了抗议者、欧亚党支持者与警察之间的三方冲突。据报道有三十人死亡，数百人受伤。"
 news.130.a: "血腥的起始。"
 news.130.b: "新的公立假日！"
 news.131.t: "美国与塔利班达成和解"
 news.131.d: "在经历了十八个月的战争后，本周六，美利坚合众国特使扎尔迈·哈利勒扎德同塔利班代表阿卜杜勒·加尼·巴拉达尔于卡塔尔首都多哈签署了历史性和平协议，双方在先前花了几个月时间来商讨其中的细节。\n\n根据商定后的协议条款，美国承诺在七个月内撤出所有军队及包括盟友在内的所有辅助文员。美国会在前一百天将部队人数缩减至五千人，并从五个基地撤出相关部队，其余部队则会在接下来的几个月内撤离。同时为了表达善意，阿富汗政府还将释放多达五千名塔利班囚犯以换取塔利班关押的一千名阿富汗安全部队成员。塔利班则已经同意停止地基地组织和伊斯兰国等团体的支持。然而鉴于它们先前的历史渊源，许多人质疑塔利班是否能履行承诺直至协议终止。\n\n在这场接近十八年的战争中，预计美国政府付出了大约一万亿美元的国库支出和两千四百多名美国公民身亡。尽管近年来部队人数激增，但美国与阿富汗军队同塔利班的作战已经彻底陷入僵持。\n\n阿富汗政府还将开始同塔利班进行谈判以规划政治上的解决方案，并确定塔利班在今后阿富汗所发挥的作用。这些谈判预计将于下个月开始，首要目标是实现阿富汗的长期停火。"
 news.131.a: "这对他们是件好事。"
 news.131.b: "终于和平了！"
 news.131.c: "他们应该从我们的错误中汲取教训……"
 news.132.t: "纽约警方重新控制纽约市"
 news.132.d: "纽约市警察局证实，他们已经重新完全控制了纽约市。由美国共产党管理的纽约市政府几乎在一夜之间被推翻。在三周时间里，数十名共产党员被发现死于家中，导致其与广大党员和民兵的有效沟通中断。警方迅速进入该市逮捕了数千名共产党民兵，并占领了市内的主要建筑。关于纽约市当地黑帮家族参与其中的传言迅速传播开来，共产党领导人已被转移到全市各地的秘密地区，目前美国共产党前总书记乔·西姆斯下落不明。他和所有高级党员都被认为已经死亡。"
 news.132.a: "我猜这对做生意不太有利……"
 news.132.b: "革命遭遇了挫折。"
 news.133.t: "唐纳德·特朗普赢得美国内战"
 news.133.d: "今天，唐纳德·特朗普在白宫玫瑰园向全美国宣布，反对他担任总统的残余势力投降了。在宣布这一消息后，特朗普宣誓就任总统，他的就职演说并未缓解扔缭绕在美国人心中的紧张情绪。在最亲密的顾问和军方高层的簇拥下，总统向美国和全世界宣布：\"今天，经过漫长而惨烈的战斗，民主再次取得了胜利。安提法和其他各种激进左翼派别的愚蠢暴徒曾试图窃取这次选举胜利。但幸运的是他们未能得逞。我感谢勇敢的州长们捍卫了宪法，感谢所有美国公民武装起来抵御这一威胁，捍卫民主。我的合法政府现已开始工作，确保美国永远不再分裂，愿上帝保佑我们所有人，上帝保佑美国\"。\n\n特朗普总统现在专注于重建他四分五裂的国家，国际社会正看着一个被削弱的美国，看着近一个世纪以来美国第一次不再是世界舞台上的全球霸主，许多人想知道谁将是它的继任者。"
 news.133.a: "狂乱之终。"
 news.133.b: "他们再也无法祸害美国了"
 news.134.t: "联邦政府赢得美国内战"
 news.134.d: "\"在海的那边，基督从百合花丛中诞生。他胸怀的荣光赋予我们高尚的使命。正如他为人类的圣洁而牺牲，我等也愿舍身为自由，唯主的意志不断前进。\"今天这些词句在全美各地唱响，标志着一个真正自由的美国正从被我们解放斗争给予了致命一击的叛乱匪帮灰烬中冉冉升起。小约瑟夫·罗比内特·拜登总统曾广受质疑，其蹒跚的脚步曾如同美国衰落的缩影，并被看作一个平庸的傀儡和造成国家分裂的人物。但如今他业已证明了这些刻板印象的错误，他亲手将美国再度整合，承载着所有美国人共同的痛苦和悲伤，直到团结之光终于重新降临。现在，像林肯或罗斯福一样，他被赋予了真正改造和重塑美国的重任，使其成为一个荣耀的象征，不再被恐惧和仇恨所毒害。"
 news.134.a: "新面孔入主白宫。"
 news.134.b: "我们将坚守信念，团结奋进。"
 news.135.t: "格洛丽亚·拉里瓦赢得美国内战"
 news.135.d: "内战的最后几天，美国前首都仍在熊熊燃烧，格洛丽亚·拉里瓦和她的\"同志们\"向被毁的白宫进发，建筑物上标志性的美国国旗也被烧成了灰烬。当她的赤卫队开始在被摧毁的白宫外集结时，这位美国新总理开始向她忠实的支持者发表首次讲话：\"同志们，今天标志着美国无产阶级革命的结束！唐纳德·特朗普和约瑟夫·拜登腐朽的法西斯主义和资本主义势力已被摧毁，他们的‘遗产’已被消灭。我感谢全美各地的同志们在法西斯主义出现的地方协助开展反法西斯斗争。然而，现在是团结的时候了，现在是战胜唐纳德·特朗普和资本主义罪恶的时候了，现在是修复我们支离破碎的国家、建设一个为所有人服务的美国的时候了。\"\n\n随着总理在这场战争中取得胜利，美国现在将开始重组其各种民主制度，代之以一个新的社会主义美国，旨在解决自三个世纪前美国成立以来一直撕裂美国的各种不公正现象。然而，拉里瓦渐渐完全控制美国，许多人不禁要问：这究竟是平等主义美国的曙光，还是向极权主义堕落的开始？"
 news.135.a: "令人担忧的美国结局"
 news.135.b: "团结一致到永远！"
 news.137.t: "希拉里·克林顿的任期"
 news.137.d: ""
 news.137.a: "一个女人入主白宫……"
 news.138.t: "第三任期"
 news.138.d: ""
 news.138.a: "一个时代落幕了……"
 news.139.t: "中华人民共和国进攻台湾"
 news.139.d: "史称第四次台海危机的冲突，此刻已经演变为一场中华人民共和国同中华民国争夺台湾岛的全面战争，自国民党逃窜台湾后告一段落的国共内战再次被引爆。数百架喷气式战斗机穿越上空混战，解放军海军也处于完全动员状态，有报道称双方海军在台湾和马祖列岛的登陆点进行了猛烈交火。中华民国军队已经宣布总动员，整个台湾岛都宣布了戒严。海岸警卫队报告了解放军登陆舰穿越海峡驶向台湾的消息，而旧中华民国的最后孤军将在中共巨人的脚下殊死抵抗。"
 news.139.a: "最终决战"
 news.140.t: "纳戈尔诺-卡拉巴赫爆发小规模冲突"
 news.140.d: "今天，阿塞拜疆沿1991年建立的接触线发动军事攻势，占领了富祖利和几个边境城镇，随后在纳戈尔诺-卡拉巴赫爆发了一系列自2016年以来从未有过的高强度冲突。在这次进攻中，阿塞拜疆动用了装甲编队以及由土耳其和以色列军火商提供的无人机。亚美尼亚已经向联合国和集体安全条约组织发出呼吁，但莫斯科方面无视了他们的请求，亚美尼亚只能自求多福。纳卡共和国（阿尔察赫共和国）是1988年第一次纳卡战争期间建立的一个未获承认的分离主义国家，其首都斯捷潘纳克特一直是阿塞拜疆炮击和无人机袭击的目标。叙利亚雇佣军也来到了阿塞拜疆，他们大多来自东北部亲土耳其的哈姆扎师。\n\n第一次纳卡战争以亚美尼亚的胜利告终，散居在该地区的亚美尼亚人建立了纳卡共和国。由于阿塞拜疆用以色列和土耳其的武器系统（如Bayraktar无人作战飞行器）和军事顾问对其武装部队进行了改造，阿塞拜疆很可能会取得最终胜利。"
 news.140.a: "为和平解决祈祷"
 news.141.t: "亲民主抗议席卷俄罗斯"
 news.141.d: "今日，大规模抗议活动席卷了包括首都莫斯科在内的俄罗斯主要城市。在反腐活动家阿列克谢·纳瓦利内的领导下，自由主义改革者、学生、城市白领以及其他反对普京政府的人联合举行了抗议活动。抗议人士呼吁政府提高透明度，重新打击腐败，要求减少警察暴力行为并进行自由民主相关改革。俄罗斯执法部门用经典手段对此进行了回应，他们对抗议者进行了逮捕和武力驱散。克里姆林宫和其他国家部门都未对此予以回应，只有几位杜马代表谴责抗议活动\"得到了西方间谍以及叛国者的支持\"。\n\n北约和美国官员发表正式谴责称俄罗斯政府的行为是镇压和暴力专制。许多西方分析家对俄罗斯民主活动家的持续活动持乐观态度，但也有许多人指出，普京及其政党以及安全部队已经巩固了自身对国家权力的控制，这使得有意义的改变已经不大可能发生。"
 news.141.a: "有意思"
 news.142.t: "法国与奥地利爆发伊斯兰恐怖袭击"
 news.142.d: "今天，西欧传来了可怕的消息，伊斯兰恐怖分子袭击了数个法国和奥地利的主要城市！在过去的二十四小时内，巴黎、马赛、里昂和维也纳的市区警方报告了多起针对市中心主要地点的爆炸事件。据法国和奥地利执法部门的报告，伤亡人数已达数百人，昨天的袭击是欧洲现代史上伤亡最惨重的袭击之一。目前对肇事者进行的大规模调查发现，他们都是新近移民的阿拉伯人，要么因在中东活动的恐怖组织激进化，要么被这些组织直接招募参与行动。\n\n目前在沙特阿拉伯正在进行的内战中作战的各类伊斯兰恐怖组织已宣布对此事负责，并将西方在中东的介入称作主要动机。北约情报部门警告西欧国家的公众称，恐怖主义的威胁仍然非常大，人们应立即提高警惕并报告任何可疑情况。法国和奥地利宣布为在恐怖袭击中丧生的人举行为期一天的哀悼日，并表示要将把实施者绳之以法。"
 news.142.a: "恐怖袭击再次侵袭欧洲。"
 news.143.t: "马娅·桑杜当选摩尔多瓦总统"
 news.143.d: "由行动与团结党和尊严与正义党组成的亲欧盟ACUM选举集团的马娅·桑杜当选为摩尔多瓦总统。桑杜承诺将大力反腐，提高生活质量，与西方更紧密地接轨并融入欧盟，选举结果令这个被认为是欧洲最贫穷国家的许多人感到震惊。其对莫斯科来说也是一个巨大的打击，因为在前任亲俄总统伊戈尔·多东的领导下，莫斯科一直在扩大其在摩尔多瓦的影响力。而许多人都在观察莫斯科会在失去对摩尔多瓦影响力后采取何种措施。"
 news.143.a: "摩尔多瓦新征程"
 news.144.t: "伊戈尔·多东连任摩尔多瓦总统"
 news.144.d: "摩尔多瓦共和国社会主义者党的伊戈尔·多东再次当选摩尔多瓦总统。伊戈尔·多东曾在2016年当选，他一直领导国家朝着与东方，特别是俄罗斯更紧密结盟的方向前进。现在，多东希望与俄罗斯联邦建立更牢固的关系，并对欧盟采取强硬立场，同时宣扬摩尔多瓦民族主义和左翼民粹主义政策。许多外国专家预测，伊戈尔·多东的连任可能意味着西方在摩尔多瓦影响力消失，以及莫斯科对该国控制的加强。摩尔多瓦的未来充满了不确定性。"
 news.144.a: "摩尔多瓦再次落入莫斯科的魔爪……"
 news.145.t: "撒哈拉满目疮痍！"
 news.145.d: "撒哈拉沙漠全域正陷入多重危机：偏远村落冲突不断，本就脆弱的农业体系被肆虐的武装团伙与补给匮乏的部队疯狂搜刮粮食，导致平民陷入绝境。如今已演变为系统性危机——营养不良率翻了四倍，饥荒致死人数增长三倍，每日都有数千民众被迫逃离故土。\n\n雪上加霜的是，国际社会对此束手无策。曾主导该地区人道救援的主要国家正深陷战争泥潭、镇压叛乱活动或应对经济危机。尽管其他组织试图填补空缺，但资金与装备的短缺使其救援行动杯水车薪，实质上让受灾民众只能自生自灭或踏上逃亡之路。逃亡潮本身正催生次生灾难。接收国缺乏长期安置难民的能力，部分国家甚至暴力驱离，迫使许多人铤而走险非法越境。目前已有近百人死于偷渡途中，预计死亡数字将持续攀升。"
 news.145.a: "那些可怜人啊……"
 news.146.t: "撒哈拉降雨量创历史新高"
 news.146.d: "。"
 news.146.a: "真是好消息！"
 news.147.t: "乍得湖争夺战"
 news.147.d: "。"
 news.147.a: "天哪……"
 news.148.t: "埃及大干旱"
 news.148.d: "干旱愈演愈烈，其迹象已然攀至巅峰。埃塞俄比亚修建尼罗河大坝的行为导致了北非近一个世纪以来最严重的人道主义危机之一。水资源短缺已成为埃及的现实，而这个国家本就依赖进口大部分食品。\n\n埃及政府将这一局面归咎于埃塞俄比亚，民众的看法似乎与政府一致，反埃塞俄比亚的示威游行蔓延街头。随着大坝后果的显现，要求发起战争摧毁尼罗河大坝的呼声比以往任何时候都更强烈。\n\n如果国际援助不足，埃及可能在未来十年失去数百万人因缺水而丧生，这或将成为自卢旺达种族灭绝以来非洲最严重的人道主义灾难。"
 news.148.a: "风暴将至……"
 news.149.t: "第三次非洲战争"
 news.149.d: "埃及总统今天正式向埃塞俄比亚宣战，以应对由复兴大坝造成的不断升级的水资源危机。最近几周，随着大坝的完工严重影响了尼罗河向埃及的水流量，两国间的紧张局势急剧攀升。\n\n塞西总统在向全国发表的电视讲话中宣布了这一决定，他表示埃及的生存岌岌可危，外交努力未能解决争端。埃塞俄比亚政府尚未对此宣战做出回应。这场围绕着价值46亿美元的大坝的冲突已酝酿多年，埃及和苏丹担心该项目会减少他们对尼罗河水资源的份额。尼罗河是这两个国家农业和生活用水的主要来源，数百万人的生存依赖着这条河流。另一方面，埃塞俄比亚将这座大坝视为迈向经济发展和能源独立的关键一步。尽管国际社会多次尝试调解，但埃及、苏丹和埃塞俄比亚之间的谈判屡屡停滞不前。分析人士警告说，这场\"水资源战争\"可能会破坏整个地区的稳定，因为这三个国家的命运与尼罗河息息相关。"
 news.149.a: "现在各国都为争夺水资源而大打出手……"
 news.150.t: "开启复兴大坝"
 news.150.d: "。"
 news.150.a: "有意思。"
 news.151.t: "埃及复兴大会取得圆满成功"
 news.151.d: "。"
 news.151.a: "有意思。"
 news.152.t: "利雅得爆发大规模抗议"
 news.152.d: "今天，随着流亡活动家叶海亚·阿西里回国和沙特阿拉伯经济的崩溃，利雅得街头爆发了混乱，大批民众走上街头举行抗议活动。阿西里是沙特政府的著名批评者，他倡导人权、政治改革，并批评他所描述的\"皇室独裁\"，他的回归促使数千名民众走上街头，抗议穆罕默德·本·萨勒曼政府。石油美元的崩溃也对这些抗议活动产生了影响，给沙特经济带来了冲击波，导致通货膨胀飙升，里亚尔暴跌。\n\n官方消息称，穆罕默德·本·萨勒曼尚未就骚乱发表任何声明，尽管沙特执法部门已接到命令\"动用一切权力和力量\"，对这些抗议活动进行严厉镇压，目前已导致4人死亡。另有报道称，抗议者和安全部队之间发生了逮捕、拘留和暴力冲突。阿西里向抗议者发表讲话，呼吁他们为经济正义、政治改革和结束政府腐败\"采取行动\"，也仅仅只是为紧张局势火上浇油。目前尚不清楚刚刚经历父亲去世到加冕不过一个月的本·萨勒曼将如何正式回应。人权和人道主义组织已经谴责了镇压行动，自由亚洲电台邀请叶海亚·阿西里就该话题发表讲话。"
 news.152.a: "有意思……"
 news.153.t: "叶海亚·阿西里宣布发生人道主义灾难"
 news.153.d: "。"
 news.153.a: "天佑沙特人民。"
 news.154.t: "青年党包围摩加迪沙！"
 news.154.d: "。"
 news.154.a: "天佑索马里人民。"
 news.155.t: "解放军登陆冲绳！"
 news.155.d: "近日，中国人民解放军组织了一场占领冲绳的登陆行动，在陆海空军协调作战之下，最终获取了冲绳的完整控制权。\n\n这一地区的夺取，意味着中国军队对于打破太约盟军试图通过\"岛链\"封锁中国海权的战略失败。同时，这一胜利对于中国来说不仅是对于盟军的军事胜利，同时这一地区也在中国历史上有非凡的意味，毫无疑问，夺取这一地区，将会给中国军民带来巨大的激励作用，以更好的支持中国与太约的全面战争。\n\n太约盟军必须重新审视自己的战争策略，在现有的情况之下，调整自己的战略部署，积攒足够的资源应对接下来的战争。"
 news.155.a: "猛兽出笼。"
 news.156.t: "东协武装登陆澳大利亚"
 news.156.d: "伴随着盟军在东南亚的战争失利，东协军队开始冲击澳大利亚这一盟军总后方，并且成功的登陆了这一地区。\n\n东协已经获得了几块在澳大利亚的登陆阵地，不论东协是否会依靠这些阵地发动最终攻势，都已经严重威胁了太约盟军的总后方基地。太约盟军内部面临严重的混乱，倘若太约盟军不能积极将东协军事存在清除，那么这一混乱将造成太约盟军的澳大利亚战事彻底失败。\n\n现在，太约盟军已经到了生死存亡之际，倘若连澳大利亚也不能保障，那么太约盟军将无法与东协进行全面的军事对抗，不得不从太平洋地区撤出剩余的军事力量。"
 news.156.a: "最终之战。"
 news.157.t: "联合武装力量夺取香港"
 news.157.d: "在令人震惊的军事联合行动中，太平洋防卫条约组织成员国在正在进行的台海战争中成功占领了战略要地香港。这一大胆的行动不仅为联军夺取了一个重要的港口，而且也对中国在该地区的野心扩张造成了不小的打击。\n\n随着中国政府对台湾采取强硬立场后紧张局势升级，日本和澳大利亚迅速承诺支持台湾政府。联军部队利用其海军优势和空中力量，发动了突然的两栖攻击，令中国守军措手不及。\n\n报道显示，该市现在处于联合管理之下，台湾军队在治理方面发挥主导作用，并得到澳大利亚和日本军事顾问的支持。\n\n作为回应，中国政府谴责太约的侵略行径，誓言要收复领土并加大在台湾的军事力度。国际社会正密切关注这场能够改变亚洲格局的冲突。"
 news.157.a: "冲突升级。"
 news.158.t: "美国爆发全国性抗议"
 news.158.d: "在非裔美国人昆顿·埃文斯死于警方的拘留措施后，美国全国各地都爆发了抗议活动。其死亡的具体情况尚且不明，但根据视频片段显示，当时一名警员跪压在他的脖子上，而他不断挣扎着寻求呼吸。此次抗议被与92年的洛杉矶暴乱同日而语，数十万人走上街头寻求正义。有报道称，明尼阿波利斯市的抗议活动正逐步升级，警察部门由于抗议人数过多而失去了对该地区的控制，大小企业均遭遇了抢劫事件。\n\n政治活动家们对这场看似不起眼的警察暴行进行了谴责，并认为这场危机要严重得多，必须要采取极端的社会行动才能解决。某些强硬煽动派甚至将当前局势等同于隐性种族歧视。保守派人士则呼吁给混乱的局势降温，他们称\"埃文斯先生\"曾有过对警官施行暴力侵害的犯罪履历——而这也正是嫌疑人为自己使用暴力辩护的理由。\n\n保守派已经开始武装，并借保护小型企业的名义进入发生抗议的城市，他们一再表示这些小企业会成为抗议者们的目标。冲突已经不可避免。"
 news.158.a: "烈焰升腾……"
 news.159.t: "墨西哥政府崩溃"
 news.159.d: "在墨西哥这片大地上，政府已同卡特尔的游击战搏斗了几十载。从郁郁葱葱的密林深处，垄断集团犯罪组织走私了数千吨非法毒品，穿过北部和边境，最终流入世界上毒品需求最高的黑市中。乃至洛斯泽塔斯或是锡纳罗亚这样的卡特尔，已经主导了管辖地内人民生活的方方面面。系统性的腐败、恐吓、暴力在这些地区可以说是习以为常了。然而，第二次美国内战爆发让墨西哥的现状也顷刻崩溃。数百万难民如海洋般从北涌向墨西哥，许多地方政府已被彻底压垮，混乱和恐慌如灾疫般蔓延。尽管墨西哥政府尽力靠戒严与建立临时住房来重建秩序，但庞大的难民人潮，外加卡特尔准备发起武力政变，让墨西哥军队已然捉襟见肘。各州接连不断宣布进入无政府状态，更是让国家陷进另一场内战。如今，墨西哥城的政府茕茕孑立，而山谷外卡特尔军阀与游击队运动林立。"
 news.159.a: "混乱蔓延……"
 news.161.t: "爱国者阵线统一美国"
 news.161.d: "北美的天空下，历史的车轮转向了一个意想不到的方向。在经历了多年无情的战火与惨痛的生命代价后，爱国者阵线最终在第二次美国内战中取得压倒性胜利，掌控了这个支离破碎、满目疮痍的国家。战争的最后几日见证了最为残酷的冲突，城市在烈火中化为废墟，无数生灵湮灭于这场浩劫。如今，这片饱受蹂躏的土地上弥漫着不安的宁静，唯一回响的是军队车队在荒原上隆隆作响，战机在天空中轰鸣巡逻，直升机的旋翼声在耳畔回荡，寂静的旁观者默然注视着这脆弱的和平。\n\n随着最后的敌人倒下，爱国者阵线新成立的国家政府在国家广场发表了精心策划的胜利演讲，向战火中疲惫不堪的国民传递信息。在全国的注视下，新政权不仅庆祝了艰难赢得的胜利，还将其描绘为美国新时代的开始。在演讲中，他们勾画了未来的宏伟愿景，详细阐述了旨在重建破碎基础设施的大规模重建计划，并承诺进行将彻底改变美国治理核心的激进政治改革。\n\n国际社会对此则反应不一，但尽管反应各异，不可否认的是：美国如今站在新的领导之下，这个领导层拥有改变国家命运的力量与野心，其影响或将回荡数代之久。"
 news.161.a: "他们已走过千山万水，然而未来的道路又将如何抉择？"
 news.161.b: "我们夺回了美国！"
 news.162.t: "[ATW.GetName]征服美国"
 news.162.d: "曾被视为不可想象的噩梦，已然成为冷酷的现实。根据\"核武之师\"的最新声明，以及数日严谨核实的结果，曾经控制美国大陆的所有政府或已投降，或已在战火中灰飞烟灭。这一历史性的巨变，令起源于佛罗里达的极端边缘组织\"核武之师\"从混乱中崛起，成为昔日强大帝国的主宰者。\n\n横扫美国残骸的冲突，经过无数日夜的残酷厮杀，在诸多派系和政权的兴衰交替中，终于归于沉寂，唯有\"核武之师\"胜利的欢呼声回荡在战后的废墟之上。美国和世界的观察者都目睹了历史的这一惊天逆转——一个最为极端的组织如今掌控了曾经世界最强大的国度。他们不仅拥有巨大的权力，还掌握着世上最具毁灭性的武器。\n\n未来的道路充满了不确定性。虽然\"核武之师\"正沉浸在胜利的狂欢中，但他们尚未对国家的未来发布正式声明。考虑到他们的极端意识形态和过去的行动，人们预计，残存的美国将成为他们随心所欲的领土。他们的统治下，这片土地将可能陷入前所未有的混乱与暴力，或许会超过世上最残酷的战争。一个充满失序与广泛苦难的未来似乎正在逼近，笼罩着整个人类的末日阴影。"
 news.162.a: "自由堡垒一去不复。"
 news.162.b: "我们的命运成真"
 news.163.t: "[NSM.GetName]再统一美国"
 news.163.d: "昨夜，随着最后一批对立政权向伯特·科卢奇及其民族社会主义军队投降，这场导致数千万人丧生、更多人流离失所的残酷内战宣告终结。新政府通过快速审判处决了多名抵抗组织领袖，并将他们的尸体悬挂在共和国新首都外示众。科卢奇在华盛顿总部发表演说，宣称建立\"由雅利安人统治、为雅利安人服务的新雅利安美利坚。\"，同时下令立即驱逐境内所有非白人群体。\n\n从密歇根南部的小股叛乱起家，科卢奇通过联合各地新纳粹与白人至上主义组织，最终成为国民阵线无可争议的领袖，继而宣告成立[NSM.GetName]。虽然全国范围内的武装冲突仍在持续且短期内难以平息，但官方抵抗力量的瓦解标志着科卢奇政权对前美国领土的权力整合进入新阶段。国际社会对此反应强烈，基于其意识形态及对国际合作的排斥，这个新共和国不太可能在世界舞台上获得认可。\n\n无论未来如何发展，一个事实已然清晰：带着全部血腥与暴虐的民族社会主义，最终在美国的土地上降临。"
 news.163.a: "自由之火已永熄。"
 news.163.b: "我们的命运成真"
 news.164.t: "[NSM.GetName]再统一美国"

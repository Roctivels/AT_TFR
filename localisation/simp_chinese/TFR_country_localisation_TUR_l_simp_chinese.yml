 turkey.2.t: "[TUR.GetName]退出北约"
 turkey.2.d: "在一场胜负难分的激烈选战后，埃尔多安总统以微弱优势险胜，有关外国干预的指控成为了焦点。面对红白旗帜飘扬的正发党支持者人海，埃尔多安严厉谴责北约组织，指控多个成员国，特别是[GER.GetNameDef]，\"破坏土耳其主权\"并企图操纵选举支持反对派。\n\n\"他们妄想替人民做决定，但都失败了。\"他厉声警告。\n\n在这场激昂的演讲中，埃尔多安称北约是\"名存实亡的组织\"，并将美国领导力的缺失视为压垮该组织的最后一根稻草。\"在一个连自身团结都无法保障的联盟里，我们已无存在意义。\"此言引发雷鸣般的掌声。他随即宣布将启动[TUR.GetNameDef]退出北约的正式程序，此举震动欧洲乃至整个国际社会。\n\n随着这一戏剧性转变，土耳其——这个曾支撑北约南翼的基石——如今踏上新的道路，其方向由埃尔多安日益昌盛的主权主义与地区野心所定义。在欧洲与俄罗斯紧张局势持续升级之际，后续发展很可能重塑东地中海乃至更广区域的权力平衡。"
 turkey.2.a: "他是认真的？"
 turkey.3.t: "埃尔多安连任土耳其总统"
 turkey.3.d: "他妈的这野狗发现我们要让他下台，现在他自己要退北约了！"
 turkey.3.a: "妈的！"
 turkey.4.t: "凯末尔·科勒驰达奥卢当选土耳其总统"
 turkey.4.d: "谢天谢地，我们对土耳其内政非常民主地干预得到了回报！等待凯末尔主义的子意识形态。"
 turkey.4.a: "不民主，它就不是自由国家。"
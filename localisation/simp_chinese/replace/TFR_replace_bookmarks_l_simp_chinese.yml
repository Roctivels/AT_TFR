l_simp_chinese:
 BM_HISTORY_TITLE: "历史简介"
 GATHERING_STORM_NAME: "美丽新世界"
 GATHERING_STORM_DESC: "随着世界进入21世纪，新的社会面貌开始形成。随着饱经风霜的旧秩序逐渐偏离其最初的模样，政治开始转变。凭借将任何形式的表达传播至全球广大受众的能力，互联网在社会中创造了全新的群体。新旧冲突皆跨越浩瀚的海洋和微不足道的沙中界线，以张扬而坚定的姿态进行着。或许，地球再次陷入混乱不可避免。或许，这混乱本身转瞬即逝。在这个世界中，唯有你能决定其命运。"
 FIRE_NAME: "§Y燃起柴薪§!"
 FIRE_NAME_DESC: "二十一世纪的前十九年在动荡与稳定交织中走过，而今，国际社会正面临自1991年以来的最大困境。反建制派总统唐纳德·特朗普连任在望，东欧与亚洲的紧张局势急速升温，全球各地的极端主义蠢蠢欲动。人类文明的未来愈发黯淡，而来自中国的有关\"新型冠状病毒\"的报道，好似要为这个放满干柴的世界添一把火。"
 ENG_GATHERING_STORM_DESC: "如今的欧盟比以往任何时候都不受欢迎。英国民众习惯性地将国内种种问题归咎于布鲁塞尔当局以及柏林的德国政府。围绕这一问题，民众在这关键议题上的立场已陷入严重分裂。尽管英国已从2008年经济危机中恢复元气，但脱离欧盟可能会让过去十年的经济成果毁于一旦。即便如此……难道国家主权的价值，真的比不上些许经济利益吗？"
 FRA_GATHERING_STORM_DESC: "法国正面临经济困境与巴黎发生的重大恐怖袭击，社会与政治紧张局势日益加剧。在这样的动荡之下，民众对穆斯林与犹太社群的态度愈发两极化。而民族主义政党国民阵线则借此机会，试图在乱局中攫取更大的政治影响力。\n\n面对这一关键时刻，法国的民主体制与欧洲一体化能否经受考验，抑或法国将摆脱束缚，回归昔日独立自主的辉煌时代？"
 GER_GATHERING_STORM_DESC: "德国正经历难民危机、经济困境，以及对希腊、意大利和西班牙等国日益增长的不满。然而，尽管面临重重挑战，它却依旧屹立不倒。欧盟持续向南扩张，而德国的政策却日益受到邻国诟病。\n\n这条道路是否值得继续前行？或是该重提旧日边界争端，让军队再度踏上征途？"
 JAP_GATHERING_STORM_DESC: "中国海军咄咄逼人，不断侵犯尖阁诸岛。朝鲜则将导弹射入平流层。日本离战争愈来愈近。近日，日本宪法第九条已被修订，允许自卫队在海外采取更为积极的军事行动。\n\n尽管这一向军事化转变在国内颇具争议，但在未来几年，这或许将成为维护国家安全的关键举措。"
 ITA_GATHERING_STORM_DESC: "七国集团及欧洲四强中，没有哪个国家像意大利这样深受2008年经济危机的冲击。复苏步履维艰，政府扶持力度日渐式微、非洲移民潮更让民众对国内稳定失去信心。意大利必须审慎抉择。现在当然不是重拾帝国主义旧梦的时机，但大刀阔斧的改革势在必行……"
 PRC_GATHERING_STORM_DESC: "不可一世的东方巨人正在缓慢苏醒。中国对超级大国宝座发起的挑战如今已行至中途。经济腾飞、军力进步、科技繁荣、共产党从未如此强大和充满活力；而在硬币的另一面，经济结构畸形、环境污染、蠢蠢欲动的派系斗争、波谲云诡的国际形势、缓慢浮出水面的历史宿怨……在通往未来的道路上，依旧荆棘丛生、凶险万状。\n\n中国将必须直面千万挑战，亿兆人之未来与此息息相关。"
 RAJ_GATHERING_STORM_DESC: "印度经济正飞速增长，人口规模亦持续膨胀。尽管在国际舞台上仍未受国际社会过多瞩目，这头南亚猛虎却已悄然蓄力。它膘肥体壮、仰天咆哮。猎物们依旧漫不经心，全然不知狩猎者的利爪已悄然出鞘。"
 SPR_GATHERING_STORM_DESC: "与其他南欧国家一样，西班牙在2008年深陷经济危机泥潭，不得不依赖北欧国家的经济援助。新兴的\"我们能\"党和\"公民\"党为传统政治体系注入了民粹主义新变量，而加泰罗尼亚独立运动对西班牙国家统一的威胁更甚以往。\n\n经济复苏注定是条崎岖之路——西班牙会继续与欧洲同行，坚守那些避免即时灾难的协议？抑或将踏上一条与北欧截然不同的未来之路？"
 SOV_GATHERING_STORM_DESC: "当苏联于1991年解体时，对俄罗斯联邦来说，重返辉煌的道路显然充满曲折。其制度和经济腐败，军队庞大但过时，政治影响力薄弱，俄罗斯不得不接受在十年间处于边缘地位的事实。如今，它希望重新回到世界舞台中央。"
 USA_GATHERING_STORM_DESC: "内部分裂前所未有，外部挑战远胜冷战。显然，美国早已驶离一国独大的黄金时代。民众对中国的攻势忧虑重重，对工业问题和经济困境愈发焦虑，对美国军事联盟的公众支持也日渐式微。下一任美国总统将不得不重新定义成为全球最伟大国家的含义，重塑\"自由之地，勇士之乡\"的真正内涵。"
 OTHER_GATHERING_STORM_DESC: ""
 COUNTRY_SELECTION_CHARACTER_DESC: "$NAME|Y$ \n$TRAITS_DESC|$"
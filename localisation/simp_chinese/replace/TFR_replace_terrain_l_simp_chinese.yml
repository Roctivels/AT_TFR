 brussels: "布鲁塞尔"
 brussels_desc: "----\n§9倘若欧洲人民的解放未能伴随其统一进程，欧洲各国很快将被日益壮大的世界强权所吞噬……几乎丧失信心的欧洲正期待着外部援助。有人寄望于俄罗斯，有人仰仗美国。这两种指望对欧洲都构成致命威胁。无论是西方还是东方，都无意拯救欧洲——俄国意图征服它，美国则盘算着买下它。§!"

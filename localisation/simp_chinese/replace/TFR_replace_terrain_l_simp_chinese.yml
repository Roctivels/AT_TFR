 rio: "里约热内卢"
 rio_desc: "----\n§9里约热内卢是巴西第二大城市，也是同名州的首府。这座城市以其令人惊叹的自然美景和充满活力的文化而闻名，是巴西吸引外国游客的首要目的地。它建立于1565年，直到1960年一直是巴西的首都。里约以科尔科瓦多山顶的基督救世主像、甜面包山、科帕卡巴纳和伊帕内玛海滩等地标而闻名。里约狂欢节是世界上规模最大的庆典之一，以桑巴音乐和精心设计的游行队伍为特色。这里还坐落着马拉卡纳体育场——全球最大且最具历史意义的足球场之一。\n\n2016年夏季奥运会在此举办，其独特的山海与建筑交融的城市景观被联合国教科文组织列为世界遗产。尽管面临社会经济差距等挑战，里约仍是拉丁美洲重要的文化和经济中心。尽管拥有文化和经济影响力，里约仍存在贫困、腐败和暴力犯罪等严峻问题，尤其在众多贫民窟中，这些问题深刻影响着日常生活和城市发展。§!\n\n§G桑巴热内卢！§!"
 brasilia: "巴西利亚"
 brasilia_desc: "----\n§9巴西利亚是巴西的首都，建于1960年，作为总统儒塞利诺·库比契克\"五年抵五十年\"发展计划的核心，旨在推动国家内陆开发。这座由城市规划师卢西奥·科斯塔与建筑师奥斯卡·尼迈耶按《试点规划》设计的城市，以独特的飞机造型布局闻名。\n\n其设计以中轴线为核心，沿线分布着总统府、国民议会、联邦最高法院等关键政府建筑，均环绕三权广场而建。标志性地标包括巴西利亚大教堂与曙光宫，这些建筑使其于1987年获评联合国教科文组织世界遗产。尽管面临规划性布局与城市蔓延的固有挑战，巴西利亚仍是巴西现代主义与政治权力的象征。§!"
 sao_paulo: "圣保罗"
 sao_paulo_desc: "----\n§9圣保罗是巴西最大城市及同名州首府，作为拉丁美洲重要的金融、文化与工业中心，同时是西半球与南半球第一大城市，素有\"混凝土丛林\"之称。这座城市由耶稣会传教士建于1554年，19世纪咖啡繁荣时期崛起，后成为工业化核心。\n\n以其多元人口闻名（包括庞大的意大利、日本和阿拉伯移民社群），圣保罗孕育了丰富的文化遗产。这里不仅举办圣保罗双年展、圣保罗时装周等重大活动，更拥有圣保罗艺术博物馆和伊比拉普埃拉公园等地标。尽管经济实力雄厚，该市仍面临犯罪、污染、社会不平等与严重交通拥堵等挑战。§!"

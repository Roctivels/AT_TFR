 toyko: "东京"
 toyko_desc: "----\n§9东京都——日本蔓延无际的首都，承载着全国近半人口，坐拥民选政府与日本皇室，对全国施加着巨大的文化、经济与政治影响力。\n\n文化上，东京遍布古老寺庙、豪华商厦，以及国会议事堂、涩谷十字路口、晴空塔、东京塔等标志性建筑。这座全球科技、金融与时尚之都，更以治安良好与高效交通系统闻名，被视作世界典范。§!\n\n§9因为有大川，所以我爱东京；因为有东京，所以我爱生活。§!"
 osaka: "大阪"
 osaka_desc: "----\n§9大阪——大阪府首府，日本第三大都市，是本州岛关西地区重要的经济文化中心。自日本古坟时期起即为重要贸易港口，江户时期发展为日本商业之都，明治维新后迅速实现工业化。\n\n如今，这里仍是至关重要的金融中心，拥有大阪交易所、众多大型企业与顶尖学府，成为国际研发重镇。这座城市以其活力的街头文化、美食地标（如大阪城、道顿堀、通天阁、四天王寺）及日本环球影城等景点闻名于世。§!\n\n§9OH MY GAH§!"
 nagoya: "名古屋"
 nagoya_desc: "----\n§9名古屋，爱知县首府，日本第四大人口城市，中部地区重要的工业与文化中心。这座由德川家康于1610年兴建名古屋城而奠基的城市，迅速成为尾张藩首府，并在明治时代蓬勃发展。\n\n作为制造业重镇，名古屋聚集了汽车、航空与造船等核心产业，兄弟工业、依班娜、雷克萨斯及丰田通商等企业总部均设于此。通过东海道新干线，这里与东京、京都和大阪紧密相连。热田神宫、名古屋城、东山动植物园及名古屋电视塔等皆是其著名地标。§!"
 kyoto: "京都"
 kyoto_desc: "----\n§9京都，这座日本旧都，现为全国人口第九大城市，是本州岛关西地区重要的文化中心。自794年建都平安京以来，这里不仅是平安时代（794-1185年）的政治文化中枢，更持续作为帝国首都直至1868年。\n\n这座幸免于二战炮火的城市，以其保存完好的文化遗产闻名，拥有2000余处宗教场所，包括清水寺、金阁寺等标志性寺院。祇园区的传统艺术、茶道与艺伎表演尤为著名。当地经济融合了和服纺织等传统产业与总部设于此的任天堂等现代科技企业。京都还坐拥众多联合国教科文组织世界遗产，以及祇园祭等著名节庆，至今仍是文化与教育重镇。§!\n\n§9日本·京都§!"
 yokohama: "横滨"
 yokohama_desc: "----\n§9横滨是日本第二大城市，也是神奈川县的首府。它位于关东地区的东京湾沿岸，自1859年开港通商后，从一个小渔村迅速发展为主要港口城市，成为明治时期西方文化传入的重要门户。其港口规模位居日本前列，作为商业和工业中心的崛起与此密不可分。\n\n如今的横滨是充满活力的产业经济枢纽，日产汽车、五十铃等企业总部云集于此。地标性滨海新区——港未来21区矗立着横滨地标塔和宇宙时钟21等建筑。文化亮点包括日本最大的中华街——横滨中华街，以及风景优美的山下公园。§!\n\n§p开战吧，燃尽一切！敬我们所庆祝的，欢迎一番！去创造精彩的人生吧！§!"
 beijing: "北京"
 beijing_desc: "----\n§9五光十色的王府井商业大街与沉浸在数百年历史安详氛围的胡同仅有一墙之隔；旧日帝王的豪华园林与嵌有红五星和镰刀锤头的灰色政府大楼遥望相对。只有在北京，这座中华人民共和国的都城，才能得见此等奇异且和谐的景象。自1271年元帝国定都于此后，历经无数风风雨雨，迎来送往无数御极天下的过客，这段独一无二的历史既将北京南北中轴线大街纵横、城区四方中正的形态定格于大地之上，又塑造了北京人那独具特色和韵味的城市精神与市民文化。\n北京人在其同胞眼中，往往扮演着结合了热情与傲慢、开放与僵化的复杂形象，身为离共和国权力核心最近的公民，他们却对所有当权者都抱有未曾言说的轻蔑之情：\"在北京，一板砖儿下去就能砸死一片局长\"；身为共和国对外开放交流的最前沿，他们却同时保持着从口音到喜欢喝豆渣熬成的饮品\"豆汁儿\"等各种令人感到滑稽可笑的传统风俗。这仿佛也正是中国，这个古老而又年轻的国家的生动写照。\n定都北京的人民共和国已走过七十余个年头，这座古老的城市既见证了旧日皇朝的承平盛世和风雨飘摇，也见证了这个民族的盛极而衰和再度崛起。如今，北京城现在的主人将向何处去？也许只有历史才能给出答案。§!"
 tianjin: "天津"
 tianjin_desc: "----\n§9天津，意为\"天子津门\"，即天子所经过的渡口。自诞生起，天津便与首都和中国统治者的命运紧紧联系在一起。在近两百年间，天津经历了在昏庸统治下中国所受的屈辱；经历了专横跋扈的殖民者作威作福；也见证了许多烈士们抛头颅洒热血；还有在漫漫长夜后最终到来的日出。现在的天津是中国北方最大的工业城市，也是北京所倚靠的重要出海口和环渤海经济圈的核心。这里是中国和世界贸易的又一个繁荣港口，商贾们像数百年前一样云集于此。§!"
 chengdu: "成都"
 chengdu_desc: "----\n§9成都常被称为\"天府之国\"，2300多年来，都江堰一直滋养着这座城市。这座城市不仅承载着古老文明的厚重，还拥有生机勃勃的城市文化，令当地人和游客为之倾倒。从青城山的宁静之美到武侯祠的忠义之史，成都是一座新旧交融的迷人城市。街边的茶馆、世界一流的战斗机生产线、大熊猫繁育基地以及市中心熙熙攘攘的天府广场，无不彰显着成都的多样性。\n然而，真正让成都与众不同的是其轻松的生活节奏，这与中国其他大城市由经济驱动的快节奏形成了鲜明对比。传统与现代间的平衡赋予了成都独特的魅力，展示了现代化浪潮如何塑造了这座中国西南部充满活力的城市。§!"
 chongqing: "重庆"
 chongqing_desc: "----\n§9很少有城市像重庆一样，在地理和文化上与其河流如此紧密相连。长江与嘉陵江在此交汇，三千年来，这座\"山城\"将崎岖的地形转变为充满赛博朋克风格的魔幻都市。其迷人的夜景见证了一个黄金时代，而河流则孕育了独特的江河文化。码头传统、\"哥老会\"兄弟情义，以及曾一度主宰的城市黑帮，共同塑造了重庆这种粗犷而神秘的氛围。\n从抗战时期作为中国精神的守护之地，到成为承接\"三峡工程\"移民的直辖市，重庆始终能够适应变化。如今，作为大数据产业的重要一员以及四川盆地的经济引擎，重庆依然在不断进化。就像其标志性的火锅一样，这座城市包容多样，来自各行各业的人们共同为其赋予了独特的能量和活力。§!"
 nanjing: "南京"
 nanjing_desc: "----\n§9南京，自东吴定都以来便是中国南方重镇，历经六朝古都、明朝初年帝都与民国临时政府所在地，承载着丰富的王朝更迭与近现代革命记忆。长江在此拐弯入海，京杭大运河南端汇聚漕运与茶盐商路；紫金山与明孝陵见证了皇家陵寝与风水学说的交汇，中华门城墙以砖石厚度流转着守御史诗，而雨花台的英烈碑刻则铭刻着抗金、太平天国与抗日战争的悲壮篇章。南京大屠杀遇难同胞纪念馆更以沉痛的展陈提醒世人勿忘1937年的历史。\n\n进入21世纪，南京依托\"长三角一体化\"战略，构建以软件服务、生物医药与新材料为主的现代产业体系。南京南站与长江大桥强化了高铁与航运枢纽地位，浦口开发区与江北新区不断释放空间红利，数字人民币与智慧城市试点在街头巷尾展开应用。高等院校与科研院所云集，百年学府持续输出人才与思想。同时，秦淮河文化带与老门东历史街区的夜色灯火，则在城市更新中保留住人文温度。§!"
 shanghai: "上海"
 shanghai_desc: "----\n§9\"夜上海，夜上海，你是个不夜城。\"，作为一座充满了现代气息的摩登都市，上海正是近代中国发展的最突出代表。在西方人到来之后，上海开放经商，这里建立起了中国最早的现代工业，但这些成果却多半被殖民者瓜分。因为其早期工人群体规模较大，这里也成为了中国共产党的故乡。\n在1949年，上海被中国共产党所解放，现代上海的命运第一次真正被中国人自己掌握，上海迎来了第二春。在七十多年的人民共和国时代中，上海的发展大大加速，尤其是在改革开放和开发浦东新区之后。现在的上海已经是亚洲乃至于全世界最受瞩目的国际化金融中心和贸易枢纽，以其开放包容的精神引领着中国经济的发展。§!"
 shenzhen: "深圳"
 shenzhen_desc: "----\n§9罗马并非一日建成，而是花了两千多年才达到达到今日的辉煌。然而，深圳仅仅花了四十年，就从一片珠江口西岸的落后渔村变成了一座人口五倍于罗马，且远要比罗马发达的大都会。四十多年前，当地的居民尚还坐着简陋的渔船在芦苇丛中穿梭，而今日的深圳已经摇身一变，成为了中国南方乃至全世界经济规模最大的城市之一，也成为了中国崛起的证明。如果没有改革开放，这片土地也许会一直沉寂下去，因而深圳本身便是中国改革开放成功的象征，也是珠江三角洲最耀眼的明珠。§!"
 guangzhou: "广州"
 guangzhou_desc: "----\n§9早在三百多年前，得益于朝廷的政令和得天独厚的地理位置，广州先于其他的城市与国际贸易接轨，成为了当时中国唯一的国际贸易中心。然而，广州的富有也让它被加以怀璧之罪，成为了洋人们眼中的一块肥肉。大浪淘沙，广州这颗明珠几经磨难，却散发出更加耀眼的光芒。在改革开放后，广州虽然发展逊色于深圳，但依然是珠三角经济圈无可争议的中心。时至今日，广州依然是广东省的省会，中国南方的重要经济中心和中国最大的国际贸易中心之一。§!"
 wuhan: "武汉"
 wuhan_desc: "----\n§9武汉，得天独厚地依托长江和汉江的滋养，历来是南北文化交融的熔炉，也是水陆交通的重要枢纽。从盘龙城的青铜时代遗址到黄鹤楼在烽火三国中的诗意魅力，这座城市的历史穿越千年，编织出一段至今依旧传颂的传奇。\n近现代史中，汉阳铁厂为中国工业化提供了起点，而武昌起义的炮火则敲响了一个古老帝国的丧钟。武汉在武汉会战中的团结与勇气，使这座城市的坚韧之声响彻华夏。今天，江汉关的钟声依旧与渡船的汽笛交相呼应，武汉通过大胆的创新和文化的和谐，铸就着自己的传奇，彰显着塑造过去、推动未来的开拓精神。§!"
 hongkong: "香港"
 hongkong_desc: "----\n§9香港，旧称香江，因昔日出产香木而得名。自古以来，这里是南海之滨的渔港，明清时商旅云集，帆影交错。鸦片战争后，殖民者将这片海岛据为己有，百余年间，高楼林立，商埠繁盛，却也留下无数屈辱与压抑的印记。在旧街巷里，叮叮车穿梭至今，天星小轮仍载着人们往返港岛与九龙。庙街的吆喝声、茶楼里的点心推车、电视里金庸的武侠、张国荣的歌声——这些都构成了香港独有的气息。这里既是世界金融中心，又是\"东方好莱坞\"，既有西方的冷峻，也有南国的柔情。今天的香港，依旧是南中国的重要门户。香江奔流，从未停息，她有过动荡，也有过辉煌，但维港两岸的灯火至今依然不灭。§!"
 macau: "澳门"
 macau_desc: "----\n§9澳门历史上以中西交流驰名于世，在明末清初的\"西学东渐\"中起了相当重要的作用，亦曾作为世界经济的运转核心之一。早在明朝，葡萄牙人的足迹就已经印上了这寸中华大地，以地租与税务为手段占据澳门，将其作为通往东方的窗口。千禧年钟声敲响前夕，澳门终于回归祖国的怀抱，结束了长达数百年的殖民统治。\n\n今天的澳门，以发达的服务业蜚声中外，尤其在国内享有盛名——作为中国唯一合法开设赌场的城市，她吸引了不少一掷千金的豪客前来一较高下，因此又被称为\"东方拉斯维加斯\"。\n\n来澳门开一把玩玩吧，哪怕输光衣服也值得。§!"
 changchun: "长春"
 changchun_desc: "----\n§9长春，被誉为\"长城外的明珠\"，是中国北疆历史的生动见证。其作为军事重镇的起源可追溯至辽金时期，而清代诗人纳兰性德的诗句——\"秋风悲画扇，飞絮满长安\"——将这座城市的永恒壮丽铭刻于世。长春的伪满洲国皇宫和八大部大楼等地标体现了其复杂的近代史，见证了其作为伪首都的战时岁月。随着一汽的创立，长春重生为中国汽车工业的摇篮，如今在新能源和智能汽车技术的前沿引领者国家绿色出行的使命。长春的学术重地如吉林大学，以及标志性的长春电影制片厂（\"新中国电影的摇篮\"）为这座城市注入了学术的深度与工业的活力。正如诗人艾青所歌咏：\"为什么我的眼里常含泪水？因为我对这土地爱得深沉。\"§!"
 dalian: "大连"
 dalian_desc: "----\n§9在俄罗斯尖顶与日本园林交织之地，摩天大楼的苍穹之下，大连展开了一首海洋的诗篇。其现代气质在19世纪殖民潮中逐渐成型，但汉代的遗韵仍在金石滩那被风雕刻的巨石和虎滩悬崖的壮丽景象中回响。辽阔的星海广场映射着大连作为\"一带一路\"枢纽的雄心，而夏日的街头则随着时装周的脉动和啤酒节的金色酒沫而愈发生动。如今，作为东北亚的航运巨头，大连凭借深海资源和智能制造，架起了连接各大洲的桥梁。忠实于其名——\"大\"体现其远大愿景，\"连\"则彰显广阔联系——这颗滨海明珠既是地区的皇冠，也是全球的舞台。山海交汇，历史与未来在此共舞。§!"
 shenyang: "沈阳"
 shenyang_desc: "----\n§9位于浑河北岸，沈阳自1625年成为后金政权的都城，为清朝的崛起奠定了基础。沈阳故宫的朱墙碧瓦内，八角重檐的大政殿依旧屹立，仿佛与几个世纪前相无二致。岁月流转，到了20世纪初，城市见证了宽轨俄国铁路的建立和日本南满铁路的竣工。至今，中山路依旧保留着那种混合风貌，哥特式的窗框与花卉装饰交织其间。铁西区的生锈门吊和铸造车间捕捉了新中国早期的重工业记忆，而沈飞的战斗机生产线则继续承载着三线建设精神的国防力量。\n这座城市交织着朝代更迭、殖民印记以及工业化崛起之历程，沈阳在丰厚历史的层叠中不断探索着自己的现代身份。§!"
 taibei: "台北"
 taibei_desc: "----\n§9台北，这座台湾首府拥有逾700万人口，以信义计划区CBD、繁华西门町、中正区交通枢纽及大安区城市公园与顶尖学府闻名。作为台湾自1960年代经济奇迹与高速发展的象征，台北从原始平原小城蜕变为繁华都会，更是曾为世界第一高楼的台北101所在地。\n尽管清代古城墙已拆除，但台北与多数大城市一样，本身就是抵御外敌的堡垒。不仅可布防多处战略要地，其发达的地铁网络更能为守军提供机动优势。§!"
 fuzhou: "福州"
 fuzhou_desc: "----\n§9福州自唐宋以来就以\"海上丝绸之路\"为脉的城市，历经藩镇分治、宋元明清王朝更迭与近代洋务运动。19世纪末，船政学堂在此建立，推动中国近代海军和造船工业发展；甲申政变又让该校短暂中断。20世纪，海外侨汇通过闽江汇入本地，形成独特的侨乡文化并促进商业繁荣。进入21世纪的数字港口灯火通明，福州依托\"数字经济示范区\"建设，发展跨境电商与现代物流，打造智慧港口与新区产业集群，持续发挥区域枢纽作用。§!"
 zhengzhou: "郑州"
 zhengzhou_desc: "----\n§9城南的新郑还躺着\"郑韩故城\"的夯土与商代城垣；驿路自古由汴至洛，商队在此歇脚，集市把麦香与河风混成中原的底味。清末民初之时陇海与京汉铁路先后贯通，车站钟声把\"郑县\"推到线路的交叉点，近现代的郑州由此成形，车皮与站台见证了从农贸到工贸的更替。建国后，机械、纺织、粮食加工铺开底盘，父辈把技艺留在老厂房的编号与油渍里。自20世纪末至今的郑州之\"枢纽\"，不仅是地图上的节点，郑东新区拔地、航空港实验区成形，跨境电商综试区与自贸试验区叠加，智能制造、装备与食品生物等产业集群加速集聚。§!"
 luoyang: "洛阳"
 luoyang_desc: "----\n§9立于河洛之会的洛阳，见证着华夏朝代的更迭，作为十三朝古都是自周王都城洛邑、东汉雒阳，曹魏与西晋沿续其势，后北魏自平城南迁后于龙门凿窟，石刻将帝都气度刻进山脊。隋唐时代，以洛阳为东都的丝绸之路与大运河在此交织，白马寺钟声与牡丹花期一并融入城市脉络。\n\n二十世纪的\"一五\"期间重型制造、石化与轴承等骨干项目落地，为洛阳培养了一批被誉为\"共和国长子\"的企业。\n\n进入21世纪的洛阳作为重要的工业城市和优秀旅游城市，承担着先进制造、新材料与航天配套成支点。洛阳的底气不只\"十三朝古都\"，更在于其独特的历史以及其在时间长廊里的从容。§!"
 nanchang: "南昌"
 nanchang_desc: "----\n§9南昌依赣江而居，向鄱阳湖敞开胸怀。西汉高祖年间置郡得名，意取\"昌大南疆\"。滕王阁与一篇《滕王阁序》，把江风与落霞留为城市底色。真正将这座城市写进近现代史的，是1927年8月1日在此发端的南昌起义，周恩来、贺龙、叶挺、朱德、刘伯承等汇合军政力量，由此打响武装反抗的第一枪，人民军队从这里走向整编、会师与征战，\"八一\"也由此成为军队的建军纪念日，并沿用至今，\"英雄城\"的称谓也自此确立。此后的南昌形成了鲜明的红色地标群，\"八一\"广场、纪念馆与起义旧址共同构成了军史教育、国防与城市形象。当代南昌以科技板块集群崛起；依托区位优势，昌北国际机场与高铁枢纽将省域与长三角紧密缝合。二十一世纪的南昌不只是存在于序文里的华彩辞藻，更是以革命圣地与现代化并存的新兴都市，持续书写着属于\"英雄城\"的故事。§!"
 dandong: "丹东"
 dandong_desc: "----\n§9丹东，旧称安东，坐落辽东半岛，襟带鸭绿江水，与朝鲜半岛隔江相望。自唐设安东都护府以来，这里便是中原王朝经略东北的重镇。明清两代，它既是九边防线的东端起点，也是人参、貂皮汇集的边贸之城。清朝以来，甲午、日俄屡次蹂躏此地，使其饱经沧桑。而真正将丹东铭刻于共和国史册的，是五十年代的抗美援朝。当战火烧至江边，这里便成为了志愿军渡江的起点与支撑前线的总后方。\n\n进入21世纪，丹东已是中国对朝鲜经贸往来的最大口岸城市与核心枢纽，它承担着中朝两国间绝大部分的陆路贸易与物流，是国家稳定和经略东北亚格局的重要支点。凭借其独特的地理位置，丹东已发展为集边境贸易、轻工制造与特色旅游为一体的区域性城市。§!"
 hohhot: "呼和浩特"
 hohhot_desc: "----\n§9呼和浩特，意为\"青城\"，横亘于阴山之南，土默川平原之上。这里自古便是游牧文明与农耕文明碰撞的前沿。明代，土默特部领袖阿勒坦汗在此筑城，召庙随之兴起，使其成为漠南蒙古的宗教与政治中心。清王朝建立后，设归化城与绥远城并治，既是联络漠北的枢纽，也是蒙汉商贸往来的重镇，茶叶、皮毛、绸缎在此集散。近代以来，这里成为内蒙古革命运动的策源地之一。从德王的自治闹剧到乌兰夫领导的解放事业，这座城市见证了草原人民的选择与新生。\n\n时至今日，呼和浩特不仅是国家重要的乳制品与清洁能源基地，也是连接中国内地与蒙古、俄罗斯的重要交通枢纽。§!"
 jinan: "济南"
 jinan_desc: "----\n§9南依泰山，北襟黄河，济南便在这山水之间，因泉水而闻名天下。趵突泉三股腾涌，黑虎泉日夜轰鸣，汇聚而成的大明湖滋养着\"四面荷花三面柳，一城山色半城湖\"的独特景致。作为齐鲁大地的腹心，这里不仅是龙山文化的发祥地之一，亦承载了千年的文脉。李清照的\"漱玉\"幽思，辛弃疾的\"稼轩\"豪情，都为这座北国水城注入了刚柔并济的灵魂。\n\n作为山东省会，济南的政治与经济地位日益稳固。它既是环渤海经济圈的重镇，也承载着黄河流域中心城市的功能。昔日环绕古城的护城河，如今依旧由众泉汇流而成，滋养着新旧交融的济南城。§!"
 kunming: "昆明"
 kunming_desc: "----\n§9昆明地处云贵高原之上，南濒滇池，三面环山。此地因气候温和、四季如春而得\"春城\"之誉。昆明自古便是滇中要地，战国时为滇国都邑。唐宋两代，南诏与大理国在此设拓东城，使其成为区域中心。元明清三朝，昆明作为云南行省首府，既是中原王朝经略西南的政治军事中心，也是茶马古道上商旅汇集的重镇。\n\n​今日的昆明不仅云南省的政治、经济与文化中心，更是中国面向东南亚、南亚开放的核心门户。作为\"一带一路\"倡议的重要节点，它已从昔日的西南边陲转变为区域性国际交通枢纽。现代物流、旅游康养与信息产业在此汇集，多民族文化在此交融共生。§!"
 zhangye: "张掖"
 zhangye_desc: "----\n§9张掖，古称甘州，因\"张国臂掖，以通西域\"而得名。自汉武帝设郡起，这里便是河西走廊的核心要地，丝绸之路的中枢。东连陇原，西接敦煌，南望祁连雪峰，北临大漠苍茫。几千年来，商旅驼铃穿行不绝，佛塔、军垒、驿馆与庙宇并立，胡汉往来，文化交汇。魏晋时，张掖书画名动西域；隋唐间，僧侣远赴天竺，取经之路多由此始。\n\n风过丹霞，云影流转，金张掖仍在时间的长河中，延续着她辽阔而坚韧的生命。§!"
 xi_an: "西安"
 xi_an_desc: "----\n§9古称长安、镐京或西京，八大古都之一。周、秦、西汉、隋、唐等强盛朝代皆于此建都。她经历了多少潮起潮落，多少帝王更迭，秦皇于此做过长生梦，汉武在此望星问天，张骞从此踏上丝绸之路，玄奘自此远赴天竺取经。她是中华文明的见证者，自商周起陪伴中国走过数千年。\n\n如今的西安不仅饱含历史与文化情怀，更是现代共和国的核心之一，中国航空工业集团的第三大军用设计与制造商：中航西飞落址于此，与成飞、沈飞并称\"三飞\"，共同组成共和国的的钢铁羽翼。作为古代丝路的起点，她也肩负着现代国际交流的使命，是\"一带一路\"项目的重要节点，将东方与世界连接，承担着从过去到未来的历史责任。\n\n她从过去遥望未来，从历史踏入新周。§!"
 xiong_an: "雄安"
 xiong_an_desc: "----\n§9早在七千余年前，雄安一地便已孕育出中华文明的最初萌芽。这片土地上留下了众多古村落的印记，如燕国南阳遗址，皆为悠久文明的见证。在历史长河中，\"雄安\"作为一个特定地区的概念并不存在，它始终被划分为更小的县邑，或隶属于更广阔的州域。然而，其前身之一——雄县，因地处要冲，自古便为历代王侯与群雄所觊觎，成为争夺与角逐的舞台。\n\n进入新时代，2017年，以习近平为核心的中共中央作出重大战略决策，在河北设立国家级新区——雄安新区。2019年，雄安新区征迁工作正式启动；同年岁末，新区内部设立了继深圳经济特区、上海浦东新区之后又一承载时代使命的经济特区——河北自由贸易试验区。由此，雄安自厚重历史中昂然走来，承继文明根脉，开启了新的国家战略篇章。§!"
 qingdao: "青岛"
 qingdao_desc: "----\n§9自新石器时代起，青岛这片土地便有人类文明繁衍生息。千百年来，它在诸多王朝与政权的更替中几度易手，直至近代，因其独特的战略和外贸位置才真正受到重视。1891年，清政府在胶澳设防驻兵，青岛自此以城市之姿正式登上历史舞台。1897年，德国以\"巨野教案\"为借口，强行将青岛划为租界。为将其打造成\"模范殖民地\"，德国人在此修筑港口，兴建铁路，城市格局自此初具规模。\n\n历经二十世纪风云激荡的战争与争夺，今日的青岛已蜕变为一座兼具历史与现代风貌的海滨名城。它以秀美的自然景致与独特的欧陆风情，成为中国最负盛名的旅游胜地之一，又凭借蓬勃发展的经济与开放的姿态，成为中国重要的商贸枢纽。§!"
 kiamusze: "佳木斯"
 kiamusze_desc: "----\n§9佳木斯，位于三江交汇之地，拥有得天独厚的环境，栖息着各类宝贵的野生动物，蕴藏着丰富的林业资源。然而在清朝光绪年间之前，这里只有荒芜与冰寒。随着《瑷珲条约》和《北京条约》将外东北大片领土割让给沙俄，佳木斯成为了边境前沿，清政府也真正意识到它的战略价值。于是，佳木斯从此成为对俄重要商贸口岸，并延续至今。\n\n中苏友好关系为佳木斯带来了发展契机。佳木斯用大量的木材和野生动植物资源换取苏联的机械化设备，这座地处北方孤寒之地的城市也由此连通了铁路和公路。事过境迁，随着佳木斯发展步伐放缓，产业转型和升级变得迫在眉睫。如今的佳木斯正大力发展生态产业：庞大的机械化农具驰骋于三江平原之上，为南方城市居民提供优质绿色农产品；壮丽的林海雪原则为其旅游业奠定了坚实基础。同时，黑瞎子岛与乌苏里江沿岸分布着的众多对俄口岸，使佳木斯成为中俄之间重要的经贸往来枢纽，并成为连接两个大国的坚实桥梁。§!"
 harbin: "哈尔滨"
 harbin_desc: "----\n§9哈尔滨又称\"冰城\"，这座城市承载着包括圣索菲亚东正教堂、苏联红军解放纪念碑、犹太人历史文化博物馆、安重根义士纪念地、七三一部队罪证陈列馆等象征着过去惨痛岁月的纪念建筑。在沙俄的殖民统治与管理下，哈尔滨从寒冷苦寂的县城村镇走向了国际性都市。当沙俄帝国崩解后，军阀、白俄难民和日本关东军接连成为这座城市的常客。\n\n当苏联红军坦克的履带碾碎日本人的王道乐土幻梦后，这座城市便正式交由新中国政府进行自主统治。在社会主义建设初期，作为新中国重要的工业基地，承接着大批来自苏联的援建工程和资源，发展铝合金制造业和石油加工。时至今日，这座城市过去的惨痛伤疤已逐渐愈合。如今的哈尔滨继续依托着铁路与地理位置带来的优势，汇集着东北亚各国的投资与货物中转，而哈尔滨飞机工业集团与哈尔滨工业大学也在不间断地为解放军提供最优质的国防资源。医药和石化产业也持续复兴，哈尔滨正在成为中国北疆最耀眼的红星。§!"
 lanzhou: "兰州"
 lanzhou_desc: "----\n§9兰州，古称金城，得名于\"金城汤池\"的坚固之意。自秦开陇右、汉通西域以来，这里便是丝绸之路上的咽喉要冲，是中原与西域交汇之处的关节。黄河自西奔流而来，于此转身东去，在北岸蜿蜒绕城而过，孕育出这座西北高原上的绿洲城市。几千年来，无数商队在兰州停步，胡马嘶鸣，驼铃作响；也有文人墨客在此登高望远，吟咏黄河落日与兰山残雪。今日的兰州依旧是西部交通枢纽，连接着关中、宁夏、新疆，承载着国家西部大开发的宏图伟业。尽管风沙未散，水土仍薄，但这片土地从未放弃过奋斗与希望。§!"
 lhasa: "拉萨"
 lhasa_desc: "----\n§9拉萨，藏语意为\"众神之地\"，是雪域高原上千万信众心中的圣城。公元七世纪，赞普松赞干布在此筑宫立寺，迎娶唐朝文成公主与尼泊尔尺尊公主，佛法自此东来，而拉萨逐渐从高原一隅的部落中心，变为吐蕃王国的心脏，成为了\"雪域佛都\"。而后，无论是萨迦法王还是格鲁派黄帽兴起，拉萨始终是西藏宗教与世俗权力交汇的焦点。\n\n新中国成立后，和平解放的红旗在布达拉宫前迎风招展，从此拉萨不再只是信仰的中心，也成为了高原现代化的起点。公路、铁路、电网翻越万山，连接内地与雪域，拉萨以不可思议的速度，在山河阻隔中走向了新时代。§!"
 hangzhou: "杭州"
 hangzhou_desc: "----\n§9杭州，自秦置县，唐为州，宋为都，江南一隅，终成天下之冠。吴越王钱镠修堤筑坝，使杭州脱离水患之苦，富庶之名由此而始。南宋偏安后，临安宫灯如昼，坊巷繁华，市井纵横，文人雅士与商贾舟车汇集，书院讲学之声与茶楼说唱之音并存。千百年来，钱塘江潮起潮落，既带来了诗词与绮梦，也孕育了商贸与工艺。\n\n如果说西湖是杭州的灵魂，那么阿里巴巴则是她的时代旗帜。从湖畔花园走出的这家公司，撬动了整个城市的产业结构，也点燃了中国互联网的想象力。电子商务、云计算、人工智能……以阿里为首的创新企业改变了杭州，也改变了中国的商业逻辑。随着萧山、余杭先后加入杭州，杭州的城市格局也从西湖时代迈入钱塘江时代。东有萧山，承载空港经济的脊梁；西有余杭，从良渚古国走向数字未来。如今沿着钱塘江望去，塔吊林立、舟车喧嚣，江水未老，城却早已换了新颜。§!"
 xiamen: "厦门"
 xiamen_desc: "----\n§9厦门始建于明代，曾为海上贸易通商口岸和抗清要塞。在时代的浪尖上，厦门既是桥头堡，福厦走廊的通衢要道，侨乡文明的缩影，既见证了晚清开埠的艰难，也经历了经济特区的腾飞。1980年设立经济特区后，厦门大规模吸引外资，港口及高新技术产业迅速发展。近年，集美新城与火炬高新区形成\"双核\"驱动，新能源、海洋科技与文创产业蓬勃发展；跨境金融与两岸融合试验区也在试点新政策，提升了区域一体化水平。§!"
 gaoxiong: "高雄"
 gaoxiong_desc: "----\n§9港都高雄坐落于南台湾，矗立于高屏溪与二仁溪之间。作为台湾的重工业与石化产业之心，高雄市内坐落着数座大型工业园区。其产品不仅足以供应岛内需求，更能够出口外销。作为台湾工业化的火车头，高雄有着悠久且独特的文化。清领的城墙仍屹立著，而日治的城市规划直到今天仍影响着这座都市的发展。然而，自高雄美丽岛事件推动无数台湾人投身公共事务以来，高雄在无数人心中最深刻的印象莫过于其\"民主圣地\"的称号。\n\n每日都有无数的旅客造访这座港都。有些人为其独特的建筑慕名而来；更多人则是为了窥探台湾发展历史的缩影。§!"
 tainan: "台南"
 tainan_desc: "----\n§9作为公认的开台首城，台南走过了四百年的岁月，并在日治以前一直是台湾首府。虽然其在政治与经济上的重要性大不如前，其文化首都的名声却丝毫不受挑战。作为一座辖区内坐落着国立成功大学、国家图书馆南馆与中央研究院等一众负有盛名的学术机构的城市，台南作为南台湾学术首都的重要性在全台首学创立四世纪后依然不减。除学术机关外，无数的历史建筑仍屹立在市内，诉说著这座城市的过往。包括曾为荷属台湾与明郑政权首府的热兰遮城、经历无数沧桑的欧式堡垒赤崁楼、以及曾为外商据点的德记洋行。今日，台南是一座过去与未来交会的城市；从殖民时期的堡垒到南台湾科学园区，从民俗节庆到欧式博物馆，台南致力于在跟上脚步的同时，也保留其独特、悠久且多元的文化底蕴。§!"
 haikou: "海口"
 haikou_desc: "----\n§9海口，古称琼山，自汉武帝开郡置县以来，便与中原息息相连。唐宋时起，这里因海路而兴，成为南海航道的重要节点。海口之名，正因其濒临入海之口而得。明清之际，海防重镇渐次南移，海口遂取代琼州古城，成为海南岛的门户。潮汐起落间，舟楫万里，南来北往的商旅在此汇集，也带来了中原文化与南洋风物的交融。近代以来，海口既见证了列强的觊觎与压迫，也孕育了琼崖纵队的浴血抗争。那些隐于椰林深处的战火岁月，使这片土地在中国革命史上留下浓墨重彩的一笔。今日的海口，已是南海之滨的现代化都市，亦是海南自贸港的核心。§!"
 guiyang: "贵阳"
 guiyang_desc: "----\n§9贵阳，古称筑，山川环抱，乌江奔流。自古便是西南之地的要冲，秦汉开道，唐宋设戍，这里始终是中原与滇黔之间的关隘。明代的屯田军堡，使游牧与农耕在此交织；清代的苗疆治理，又令多民族的文化在此交汇。千百年来，山雾浓重，却掩不住人群的往来；石板古道，承载了盐、茶、药材的商旅，也承载了王朝兴衰的余响。\n\n近代的贵阳曾经边地偏隅，却因抗战而骤然成为命运的转折。西南大后方的格局，使贵阳一度肩负起保存民族命脉的责任。而今日的贵阳，早已不再只是群山环抱的驿站。它是西南腹地的心脏，是国家西进战略的桥头堡。黔中大地，电光相连，大数据产业从这里崛起，昔日的闭塞化作通达。山水未改，云雾依旧，而这座城市却在沉静与奋进之间，完成了自己的蜕变。§!"
 urumqi: "乌鲁木齐"
 urumqi_desc: "----\n§9乌鲁木齐，意为\"美丽的牧场\"。自古以来，这里便是天山南北的咽喉要地。汉武帝遣使开疆，张骞凿空西域，丝路驼铃自此穿越天山脚下；唐代安西、北庭节度使屯兵于此，声震葱岭，胡马与汉旗同在草原飘扬。维吾尔族在此繁衍生息，以牧歌与舞蹈承续草原的记忆，也在市井间融汇商贸之声。\n\n近代以来，乌鲁木齐更成为西域的枢纽与新疆的心脏。它见证了多民族共处的艰辛与融合，也承受了风云激荡的沉重。清代的屯垦戍边，苏联东风的余韵，乃至共和国成立后的建设号角，都在这片土地留下烙印。今日的乌鲁木齐，高楼与集市并存，石油与丝路同辉。它既是戈壁与雪峰之间的都市绿洲，也是东西交汇、民族交融的缩影。天山以北，胡杨依旧坚守；红山之下，城市喧嚣而生机勃勃。乌鲁木齐如同一首悠长的牧歌，在岁月与风沙中，吟唱着中国西域的古老与新生。§!"
 yinchuan: "银川"
 yinchuan_desc: "----\n§9银川，古称兴庆，坐落在贺兰山下、黄河之畔。自西夏建都以来，这里便是西北的一颗明珠。大漠孤烟，长河落日，曾见证党项铁骑的驰骋与兴衰；兴庆府城的宫阙楼台，早已湮没于黄沙之中，却留下了帝国短暂而炽烈的痕迹。元明以降，黄河水灌溉宁夏平原，使银川渐成\"塞上江南\"。农田阡陌纵横，水渠如网。这里既是边塞重镇，又是丝路北道的要冲，商旅来往，胡汉杂处，留下了多元文化交织的深厚底色。\n\n近代以来，银川虽远离东南喧嚣，却承载着边疆稳固的使命。新中国成立后，它成为宁夏回族自治区的首府，见证了少数民族与汉族携手共建的历程。今日的银川，高楼新城与黄河古渡并存，传统与现代交织。贺兰山的残雪、黄河水的奔腾，仍在默默诉说着这座城市的坚韧与宽广。§!"
 changsha: "长沙"
 changsha_desc: "----\n§9长沙，古称潭州，自三湘汇流而生，因水而盛。自秦置郡县以来，便是荆楚与江南的交界重镇。楚人之魂在湘江奔流间延续，屈原、贾谊的幽思在此回荡。两汉时，这里是江南文化的摇篮；唐宋时，文脉昌盛，书院林立，湖湘学风从岳麓山下起步，终成关乎天下的思想血脉。近代的长沙，亦是风云际会之地。晚清兵燹频仍，城郭几度焦土；然而正是在烽火与废墟之间，革命的星火由此燃烧，毛泽东、蔡和森、杨开慧等一代志士，正是在湘江岸畔点燃理想的火种。抗战烽火中，长沙三度成焦土，却又三度崛起，城在人在，凭借着顽强的气节屹立不倒。\n\n今日的长沙，早已不是昔日兵火中的小城。它是中南大地的枢纽，亦是新兴工业与文化的高地。湘江东去，浪涛不息，而长沙始终在历史与现实之间，以自身的激荡与沉稳，证明着一座城市如何在沧桑中重生。§!"

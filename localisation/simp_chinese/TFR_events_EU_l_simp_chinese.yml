 european_union.12.t: "希腊政变"
 european_union.12.d: "随着我国在欧洲大国地位的重新崛起，我们在推广欧洲理念的进程中取得了重大胜利。多年来经济管理不善已使希腊濒临崩溃边缘，而极右翼政府未能巩固控制，最终发生全国性起义，成为压垮骆驼的最后一根稻草。凭借稳固的战略地位，我们成功在巴尔干半岛建立立足点。这场政变迅速完成，仅在农村激进势力地区发生小规模流血冲突。\n\n如今在我们的庇护下，希腊将迎来新生。它将成为试验场以用于实践我们为整个巴尔干地区规划的改革方案。同时，这里也将成为我们吸纳前南斯拉夫国家的跳板。众多鹰派领导人对希腊行动成果表示满意，尤其是冈瑟·费林格，他公开宣称：\"塞尔维亚要么投降，要么将再次畏惧天空中的轰炸机\"。虽然实现泛欧理想任重道远，但我们已经向着梦想迈进关键一步。"
 european_union.12.a: "#现在结束巴尔干中立"
 european_union.13.t: "重新整合海军司令部"
 european_union.13.d: "如今局势已经趋于稳定，属于我们的大西洋、太平洋和欧洲的海军司令部已经恢复并随时准备投入战斗。"
 european_union.13.a: "我们将重新掌控世界"
 european_union.14.t: "欧洲重定义"
 european_union.14.d: "现在我总算知道斯拉夫人根本不算人，肯定也不算欧洲人，不过他们最大城市肯定比其他地方自由的多，而且他们其中还有一堆人准备给我们舔屁眼呢？？？剩下的之后再处理吧。"
 european_union.14.a: "该说句公道话了……"

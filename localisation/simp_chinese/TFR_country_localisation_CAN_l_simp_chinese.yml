 canada.10.a: "保守党"
 canada.10.b: "自由党"
 canada.11.t.1: "保守党在提前选举中将特鲁多赶下台"
 canada.11.t.2: "保守党在加拿大获胜"
 canada.11.d: "伴随着美国内战引发的政治余波，加拿大保守党在联邦提前选举中获胜，宣告特鲁多长期执政的时代就此落幕。\n\n自由党原本期待在美国局势趋稳之际通过此次选举延续其执政，然而却因政府处理危机的方式导致国家分裂而遭遇了沉重的打击。试图使加拿大免受美国内战波及的努力以失败告终后，公众对自由党政府的不满达到顶点。在难民激增的背景下，许多加拿大人认为，这是毫无必要的外交干预。\n\n选民们转而支持由民粹主义代言人皮埃尔·波利耶夫领导的保守党。波利耶夫在竞选中承诺恢复稳定与问责制，并终结其所谓的\"鲁莽外交政策\"。随着保守党在议会赢得绝对多数席位，自由党近十年不得民心的统治宣告终结。"
 canada.11.a: "大快人心！"
 canada.12.t: "自由党连续执掌加拿大"
 canada.12.d.1: "尽管深陷大众普遍质疑与多重争议的泥潭，但贾斯汀·特鲁多和其领导的加拿大自由党仍在提前大选中险胜，勉强保住了执政地位。这位曾被奉为进步派领袖的总理，其执政生涯因经济困局、治理失能而蒙尘，更因启用《紧急状态法》被舆论打上威权主义的烙印。\n\n这项最初被辩称为\"非常时期恢复公共秩序与国家安全的必要举措\"的决策，如今却成为左右两翼共同抨击的众矢之的。多数加拿大人视此举为危险的权力滥用，不仅永久玷污了特鲁多的政治遗产，更瓦解了民众对其领导力及自由党的信任。\n\n虽然遭遇重重挫败，特鲁多仍以微弱优势涉险过关——与其说是一场胜利凯旋，更像是一个厌倦分裂的国度迎来的暂时休战。选举结果非但未能昭示民心所向，反而暴露出仅靠惯性和犹豫不决勉强维系的脆弱政局。当特鲁多开启第四任期之际，一个日益尖锐的疑问正悬于加拿大上空：在一切土崩瓦解之前，这位总理摇摇欲坠的权柄，还能支撑多久？"
 canada.12.d.2: "在提前选举中，加拿大自由党迎来惊人逆转，在新党魁的领导下取得决定性胜利。随着总理贾斯汀·特鲁多于本月早些时候辞职，前加拿大央行行长、国际金融家马克·卡尼接任党魁，承诺将彻底摆脱过去的争议，以稳健领导引领国家未来。\n\n卡尼的竞选主张在这个厌倦政治分裂与国际动荡的国度引发广泛共鸣。其技术官僚背景与老练的执政形象，助力自由党重塑因特鲁多后期执政而受损的政治声誉，重新赢得那些既对特鲁多执政末期的表现失望，也对日益激增的移民潮和难民潮感到忧虑的关键选民群体的支持。\n\n在重塑公众信任、议会占据绝对多数以及各州政府态度友好的背景下，卡尼如今面临着兑现承诺和维系民心的双重挑战。多年来第一次，加拿大政治中坚力量首次站稳脚跟。至于这股力量能否持久，唯有时间能给出答案。"
 canada.12.a: "仍屹立不倒！"
 canada.13.t: "法西斯崛起"
 canada.13.desc: "随着疫情、经济崩溃和众多其他危机的压力，全球稳定局势持续恶化，许多加拿大人开始转向极端思想。受上世纪加拿大法西斯思想家，如阿德里安·阿尔坎德和约翰·罗斯·泰勒，以及来自我们南方邻国的新一波极右翼思想的鼓舞，法西斯政党和政治组织的新成员数量创下纪录。\n\n诸如亚特兰大之类的魁北克团体和主要由英语人士组成的加拿大身份的动员活动有所增加，而核武之师和骄傲男孩等美国组织的加拿大分支也出现了快速增长。为了防止对加拿大国家安全的威胁，必须动用加拿大皇家骑警和所有其他国家安全力量来打击这些组织的影响。"
 canada.13.a: "我们必须反对暴政"

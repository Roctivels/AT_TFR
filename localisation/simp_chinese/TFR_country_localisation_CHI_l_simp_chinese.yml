 taiwan.25.t: "美国第七舰队留守台湾"
 taiwan.25.d: "随着美国本土爆发内战，外界广泛关注美国海外军事部署动向。近日，美国第七舰队部分舰只继续在台湾海峡附近活动，引发区域局势进一步复杂化。\n\n中国国防部发言人指出，美国国内局势混乱，却仍在台湾问题上制造事端，严重违反一个中国原则，干涉中国内政，破坏地区和平稳定。发言人重申，台湾是中国领土神圣不可分割的一部分，解放军保持高度戒备，坚决回击任何挑衅行径，维护国家主权和领土完整。\n\n第七舰队方面则发布简短声明，称其在印太地区的行动将\"维持常态\"，强调航行自由，并宣称将继续在国际法允许的水域开展活动。美国国防部强调，第七舰队的任务\"不受国内局势影响\"。\n\n专业人士批评第七舰队继续在台海周边维持存在，增加了局势的不确定性与误判风险。"
 taiwan.25.a: "旧习难改"
 taiwan.26.t: "美国第七舰队留守台湾"
 taiwan.26.d: "随着美国本土爆发内战，外界广泛关注美国海外军事部署动向。近日，美国第七舰队部分舰只继续在台湾海峡附近活动，引发区域局势进一步复杂化。\n\n中国国防部发言人指出，美国国内局势混乱，却仍在台湾问题上制造事端，严重违反一个中国原则，干涉中国内政，破坏地区和平稳定。发言人重申，台湾是中国领土神圣不可分割的一部分，解放军保持高度戒备，坚决回击任何挑衅行径，维护国家主权和领土完整。\n\n第七舰队方面则发布简短声明，称其在印太地区的行动将\"维持常态\"，强调航行自由，并宣称将继续在国际法允许的水域开展活动。美国国防部强调，第七舰队的任务\"不受国内局势影响\"。\n\n专业人士批评第七舰队继续在台海周边维持存在，增加了局势的不确定性与误判风险。"
 taiwan.26.a: "旧习难改"
 taiwan.27.t: "台海紧张局势升温"
 taiwan.27.d: "今日沉寂已久的台海再度成为国际焦点。在蔡英文于2020年成功连任台湾地区领导人之后，解放军迅速加强对台军事压力，并于2月9日至10日展开大规模绕台行动。据台方通报，解放军出动近40架战机进行编队巡航，甚至有部分军机短暂跨越台海中线，引发海峡两岸高度戒备。\n\n此次军事行动被广泛解读为蔡英文政府\"拒绝九二共识\"与坚持\"台湾主体性\"立场的强烈回应。台湾国防部第一时间出动战机升空监控、驱离外机，国安系统进入高度戒备状态。与此同时，台北当局呼吁北京方面应停止挑衅，恢复两岸和平对话机制。\n\n中国大陆则表示，这是对\"台独活动\"与外部势力干涉的必要反制措施，旨在捍卫国家主权与领土完整。然而，这一举动已在国际社会引发广泛关注与不安。专家警告，若缺乏对话机制与危机管控路径，台海地区将面临长期不稳定的严重风险。\n\n"
 taiwan.27.a: "1962曾是古巴，2020则是台湾。"
 taiwan.28.t: "台海紧张局势缓和"
 taiwan.28.d: "台湾2020年大选爆出冷门，国民党候选人韩国瑜击败原被广泛看好的现任领导人蔡英文，以些微优势赢得胜选，成为新任台湾地区领导人。选举结果一经公布，立即在岛内外引发高度关注与震动。\n\n此次胜选被外界视为台湾民意剧烈波动的体现。经由专家分析指出，经济民生困境、政治对立加剧及对现任政府两岸政策的不满，成为选民转向保守势力的关键原因。韩国瑜阵营则称，此次胜利是\"人民对稳定与沟通的渴望\"。\n\n中国大陆对选举结果表达\"积极评价\"，并释放善意信号，表示愿意在\"九二共识\"基础上恢复协商与交流。而台北方面则进入政治重组阶段，民进党高层已召开紧急会议。\n\n国际社会普遍对局势保持关注，敦促台湾新政府维持现状、保障区域和平。日、英等国政府则呼吁\"理性过渡\"，避免不稳定因素扩散至印太地区。"
 taiwan.28.a: "……天无绝人之路？"
 taiwan.29.t: "民进党胜选引发大陆强烈反对 "
 taiwan.29.d: "随着2020年台湾地区领导人选举落下帷幕，民进党候选人蔡英文宣称胜选。有关部门随即严正重申，台湾自古属于中国，绝不容许任何\"台独\"行径分裂国家。\n\n国台办发言人严厉谴责民进党当局拒不承认\"九二共识\"，公然挑战一个中国原则，严重破坏台海和平稳定。发言人强调，祖国大陆有坚定的意志、充分的信心和足够的能力挫败任何分裂图谋，坚定捍卫国家主权和领土完整。\n\n北京方面指出，台湾问题纯属中国内政，任何外部势力干涉必将遭到坚决反制。大陆方面警告，任何\"台独\"势力与外部势力的勾连与挑衅，都将遭到有力打击。\n\n分析人士指出，尽管民进党继续顽固推进分裂立场，但历史大势不可逆转，祖国统一是不可阻挡的，任何背叛民族的行径必将以彻底失败告终。两岸关系的未来方向已由历史和人民作出明确选择。"
 taiwan.29.a: "持续关注台海局势变化，坚定支持维护国家统一的一切正义行动。"
 taiwan.291.t: "美国国务院对台海声明"
 taiwan.291.d: "在台海局势再度紧张之际，美国国务院发表声明，重申\"反对任何一方片面改变台海现状\"的立场。声明中强调，美国\"对台政策未变\"，继续依据《与台湾关系法》与\"六项保证\"维持对台支持，并呼吁双方\"保持克制，避免误判\"。\n\n美国务院发言人表示：\"我们对近期台海区域出现的紧张态势深表关切。我们重申，和平与稳定符合国际社会共同利益。敦促各方避免采取可能激化局势的单边行动，特别是使用武力或胁迫。\"\n\n第七舰队部分舰艇\"例行性航行自由任务\"中继续出现在西太平洋地区。尽管中方批评其\"干涉内政\"，美方官员则表示，这些行动\"完全符合国际法，且与当前地区局势无关\"。"
 taiwan.291.a: "华盛顿拒绝接受强力改变现状！"
 taiwan.292.t: "特朗普宣布对台军援"
 taiwan.292.d: "在台海局势持续紧张之际，美国总统唐纳德·特朗普在一场记者会上宣布，将向台湾提供\"规模空前的防御性军事援助方案\"。该援助包括防空导弹、雷达系统、无人机及\"有限数量的反舰武器\"。特朗普表示：\"台湾正在为自由而战，美国不会袖手旁观。\"\n\n该声明引发国际高度关注。相较于国会内部已出现跨党派议员声援，中国外交部对此表示\"强烈谴责\"，并警告美方\"不要玩火\"。\n\n五角大楼则表示，美方\"将评估相关转交机制\"，但强调\"任何对台军事支援都将基于防御性质，并符合现有法律框架\"。"
 taiwan.292.a: "这是对中国主权的侵犯！"
 taiwan.293.t: "佩洛西访台引发地区震荡"
 taiwan.293.d: "众议院议长南希·佩洛西乘坐专机抵达台北，并在台北\"立法院\"发表演讲。她在讲话中强调美国\"支持台湾的民主制度\"，称\"台湾不孤单\"，并呼吁深化美台关系。\n\n解放军东部战区随后宣布，启动\"环台岛实战演训\"，多支海空兵力在台湾周边展开大规模实弹演练，涵盖联合封锁、突防打击、区域拒止等多个科目。多枚导弹越过台湾本岛上空，引发岛内空防戒备升至最高等级。\n\n尽管白宫试图淡化事件影响，称\"此访为议长个人行程\"，但国际社会普遍认为，这一事件标志着中美关系进一步恶化."
 taiwan.293.a: "风暴已至。"
 taiwan.30.t: "解放军台海军演加剧两岸紧张局势"
 taiwan.30.d: "随着海峡两岸势持续紧张，解放军近日在台湾海峡及周边海空域组织大规模军事演习。演习科目涵盖联合夺控、远程打击与海空协同作战，实兵实弹演练强度为近年来罕见。\n\n国防部发言人表示，此次演训是对当前台海局势变化的必要反制，旨在捍卫国家主权和领土完整，维护台海地区和平稳定。发言人强调，针对\"台独\"分裂势力和外部干涉行径，解放军将持续加强备战练兵，坚决打击一切挑衅。\n\n台湾方面则指责大陆\"加剧区域紧张\"，台防务部门称已全程掌握相关动态，并提升战备等级，以防\"不测事态\"。\n\n军事专家指出，随着近期两岸关系明显恶化，军事对峙风险持续上升。解放军的军事施压被视为对民进党当局不断推进\"渐进式台独\"路线的直接回应，而台方在外部势力支持下亦表现出强化抵抗的姿态。台海局势短期内恐将维持高压态势，地区安全形势不容乐观。"
 taiwan.30.a: "我们将持续关注解放军台海演训动态。"
 taiwan.30.b: "此类措施旨在遏制台湾独立企图。"
 taiwan.31.t: ""
 taiwan.31.d: ""
 taiwan.31.a: ""
 taiwan.32.t: "最终……我们撑过了考验！"
 taiwan.32.d: "经过数周激战，面对太约部队的顽强抵抗，解放军攻势已全面受阻，其击溃我军与政府的作战目标宣告失败。近日情报显示解放军正放弃占领区，但暂未公开以防解放军突袭反攻。随着日澳多方证实共军正从包括金门在内的各战线撤军，总统府终于于黎明时分宣布民主力量获胜。\n\n伴随地面入侵部队撤离，空军与海军也已停止所有军事行动，天空与海域重新开放。满目疮痍的码头和机场正接收来自全球各地和太约盟友的人道主义援助。\n\n然而一切远未结束。我们的城市化为废墟，工厂遭摧毁，铁路公路瘫痪，身为皇冠明珠的半导体产业更被彻底抹去。不仅如此，太约情报指出共军此次惨败极可能引发其国内政治动荡，或将催生更具侵略性的领导层，在未来数年持续威胁我国民主自由。眼下，艰巨的重建任务正摆在面前。"
 taiwan.32.a: "而我们的人民正漫步于人生路之上。"
 taiwan.33.t: "第二波导弹袭击！"
 taiwan.33.d: "生死存亡的战争，再次降临中华民国的土地。\n\n在第四次台海危机爆发仅数日之后，来自大陆的导弹首次直接打击了我方关键基础设施与城市。国防部正全力动员后备役、组织防御，然而第二轮导弹攻击更为猛烈，摧毁了我方大部分行政与通信能力。\n\n然而，幸存的雷达站却探测到更为骇人的景象：无数两栖攻击舰及其护卫舰正迅速逼近我沿岸，登陆战一触即发。这一刻已无疑义——第四次台海危机已然结束，台海战争正式爆发。\n\n尽管美军缺席，但我们并非孤军奋战。太平洋防卫条约组织各国的干预部队已全面协防，正与我军并肩作战，于滩头阵地严阵以待，誓死捍卫我领土主权。\n\n此刻，我们必须奋起抗争、决不屈服于那头红色巨人。若此役不守，则中华民主之火，将永远熄灭。"
 taiwan.33.a: "挺身而战！"
 taiwan.34.t: "国防部函"
 taiwan.34.d: "受文者：总统府\n速别：最速件\n主旨：我国国防现状\n\n我军阻止解放军攻入台湾本岛的主要目标已失败。解放军利用我方防御漏洞，现控制多个主要城市及港口，严重削弱我军作战能力。因首要目标未达成，战斗已无法局限于海岸线，我军被迫转入城市及山地作战。\n\n解放军现已推进至环绕剩余城市与山脉的第二防线，复杂化的城市及山地环境可转为防御优势。国军陆军已在解放军控制城市外围建立防御阵地，更有能力阻滞其后续推进。\n\n太约组织在此次冲突中亦伤亡惨重，意外地对军民心理产生双重冲击。在确认太约部队确为并肩战友后，民间志愿人员正大量投入防御工事构筑与后勤支援。此举显著提升士气与防御效能，据指挥官报告，地面部队作战意愿与战备状态已达历史高点。"
 taiwan.34.a: "我们一定会赢的……"
 taiwan.35.t: "余波"
 taiwan.35.d: "上午6:27。\"[防空警报]敌机空袭台湾各地区，请就近避难。\"\n学校突然停课的第四周，凯智理再次被刺耳的空袭警报声吵醒，窗外阴云密布，仿佛随时会落下炸弹。三架F-16战机呼啸着升空拦截，几乎盖过了警察的喊声：\"别搭电梯，走楼梯！\"\n\n上午6:50。\"[防空警报]台湾地区防空警报于06：50解除，发现不明物体请通报警消。\"\n轰鸣声停止，避难者们井然有序地走出，开始他们的战时日常。凯匆忙赶往他工作的全家便利店，为上午8点的班次做准备。十几名顾客已经在外面等候，手里拿着纸币、硬币和政府发放的食物券。今天一切如常——除了他被告知要训练实习生如何整理用过的票卷。\n\n下午2:00。\"中央气象局日照时间通知——今天充足日照直到下午6:35。\"\n\"陈经理——把这些打印100份并分发下去。政府要求的。PA20018583.pdf。\"两个小时前，当阳光穿透云层时，他还抱有一线希望，但中央气象局的更新证实了——今天没有短班。他失望地让实习生去打印传单，而他短暂休息后回到收银台。\n\n下午6:50。\n为节省带宽与电力，民用网络开始限流。虽然实施汽油配给后车辆已很稀少，但路灯仍会短暂亮起防止事故。凯步行回家时，发现了一个绿色迷彩桌布的摊位——像学园祭上的那种。他好奇地走上前去。摊位经理向他招手。\"我们正在组织民防小组，\"他说。\"加入我们的培训项目就可以学习识别未爆弹药（UXOs）和处理伤员，以支援我们的消防和医护人员。\"\n\n下午6:52。\n凯拿起一本小册子读了起来。政府资助、自愿性质、不涉及武器、不是民兵或炮灰部队。常见问题解答栏目回答了他大部分问题。他停顿了一下，深吸一口气。"
 taiwan.35.a: "\"我该什么时候开始工作？\""
 taiwan_detente.0.t: "国民党赢得台湾选举"
 taiwan_detente.0.d: "近期，在我方社交媒体平台上广泛传播、引发热议的话题，莫过于台湾地区地方选举的结果。此次选举中，民众选出韩国瑜担任该分裂地区的行政负责人。有人对此表示庆祝，认为是对激进\"台独\"势力的一次有力否定；也有部分网友质疑该次\"地方选举\"的合法性。\n\n国台办对这一结果并未作出过多评论，仅重申所谓\"总统选举\"不过是台湾地区的一次地方选举，外部势力不应干涉中国内政。不过，据传政府内部部分人士对于国民党的胜选持谨慎乐观态度，认为该党在立场上较倾向于与我方沟通合作，有助于维持两岸关系的温度。尽管对韩国瑜是否真心致力于恢复两岸联系仍存疑虑，但在民进党下台的背景下，整体对话的推进至少将会更加顺畅。"
 taiwan_detente.0.a: "我们希望他们能够明辨是非。"
 taiwan_detente.1.t: "向大陆伸出橄榄枝"
 taiwan_detente.1.d: "随着选举尘埃落定，内阁人事底定，我们终于可以着手处理国家事务。当前议程中最重要的一项，就是终结蔡英文政府与大陆\"保持距离\"的两岸政策。这一政策不仅严重冲击了本地观光与农业产业，大陆方面也因应多次祭出禁令，限制部分商品输入，并加强对陆客来台的控制，致使游客数量锐减，直接影响民生。更令人忧心的是，中共多次对民进党政府发出强硬警告，令社会陷入不安与焦虑。\n\n为扭转现状，陆委会将以修复两岸关系为首要任务。我们将重启对话，筹划高层会晤，全力尝试释出善意，希望大陆方面能够回应和平之意，重回合作共赢的道路。"
 taiwan_detente.1.a: "两岸互动的新时代。"
 taiwan_detente.2.t: "国民党政府寻求和解"
 taiwan_detente.2.d: "我们近期获悉，自从激进\"台独\"政党掌权以来几近停摆的台湾陆委会，已通过海峡交流基金会主动与我方接触，表达重建两岸外交联系的意愿。据悉，对方已有数位代表与我方进行初步沟通，商讨筹备未来更具正式性与全面性的会谈。我方对此作出积极回应，国台办已私下核准数位台湾代表入境的外交许可，但目前尚未对外发布进一步评论，以待双方寻求更多共识后再行公布。\n\n尽管我们对台湾和平回归的前景并不抱有过高期待，但仍希望此次会谈能作为契机，促使台湾人民重新认识两岸骨肉相连的兄弟情谊。"
 taiwan_detente.2.a: "好的。"
 taiwan_detente.3.t: "通往和平的基石"
 taiwan_detente.3.d: "陆委会的和平事务团队带来了好消息！海基会已成功与大陆的海协会取得联系，显然是在国台办默许下进行的接触，并就未来会谈建立了初步共识。其中一项重要内容，是本届政府表达了对\"九二共识\"持开放态度的立场。自李登辉时代以来，\"九二共识\"一直是两岸和平交流的基础，包括马习会在内的重要会谈，也都建立在这一共识之上，其意义可追溯至1945年的重庆谈判。\n\n借由来自对岸的善意，我们将开始筹备更多开放性的基层交流活动，以缓和岛内的反中情绪，为未来更高层次的政治与经济峰会奠定基础。我们也会吸取《两岸服务贸易协议》推进失败的教训，避免再次激发强烈的反中情绪——当年正是这种情绪，为反对派掀起2014年\"太阳花运动\"提供了土壤。"
 taiwan_detente.3.a: "好！"
 taiwan_detente.4.t: "厦门会议"
 taiwan_detente.4.d: "在对岸同仁积极回应之后，内政部与陆委会迅速展开行动，努力打破与大陆之间的坚冰。最新民调显示，三分之二的受访者支持或不反对重启对话。在总统府的授权下，陆委会代表启程前往厦门，并得到了大陆官员的热情接待。\n\n此次会谈成为各大媒体关注焦点，三项重要成果尤为瞩目：会议盛大开幕、此前因蔡英文政府对陆敌意政策而遭到报复性禁止的多项农产品恢复输入、以及关于新冠病毒最新情况的讨论。大陆方面也同意在防疫事务中担任中介角色，协助传递世卫组织的相关信息，并同步转达我方通报。\n\n本次会谈被外界广泛视为马总统执政团队的重要突破，陆委会方面也已规划后续多轮交流。与此同时，大陆代表团预计不久将访问金门，推动两岸旅游合作，也进一步巩固金门作为国民党在离岛的重要支持据点。"
 taiwan_detente.4.a: "未来一片光明。"
 taiwan_detente.5.t: "台湾自由行"
 taiwan_detente.5.d: "\"请注意，飞往台北的BR721次航班即将登机，这是最后登机广播。尚未登机的乘客请立即前往3号登机口。\"\n\n广播声在航站楼回荡时，黄福基正气喘吁吁地奔向3号登机口，手中紧握着护照与登机牌。简单核对后，他登上了飞机。\n\n引擎轰鸣，地面逐渐远去。他打开手机，查看从国台办网站上截取的页面，仔细阅读赴台自由行的注意事项与禁忌。作为一位习惯事前筹划的旅客，他为此趟旅程制定了精确到分钟的行程表，同时也基于过往经验预留了充足的缓冲时间。\n\n抵达台北后，当地机场电视正播放着关于\"上海会谈\"成功举行的新闻，宣布大陆恢复个人赴台游。然而黄福基对此并不关心——他的目光紧盯着行李提取信息，心里只想着即将展开的旅程。\n\n夜幕低垂，他入住的是七年前住过的那家酒店。不同的是，这一次没有导游、没有喧闹的旅行团、没有被催促的节奏。明日清晨，他将前往传统菜市场与木栅动物园，期待一睹熊猫与其他珍稀动物的风采。"
 taiwan_detente.5.a: "旅途愉快。"
 taiwan_detente.6.t: "新加坡会谈开幕"
 taiwan_detente.6.d: "在新加坡的极力促成下，大陆与台湾地区代表近日在新加坡正式展开会谈，就两岸关系发展相关议题进行协商。此次台湾方面由中国国民党代表出席，大陆方面则由国务院台湾事务办公室代表组成代表团。\n\n双方本着平等协商、互相尊重、搁置争议、求同存异的原则，就两岸经贸合作、人员往来便利化、区域和平稳定等议题进行了深入沟通，并在多个领域达成初步共识。会谈气氛坦诚积极，展现出重启交流、改善关系的共同意愿。\n\n新加坡外交部表示，欢迎双方选择在新加坡作为中立场地对话交流，并希望此次会谈有助于缓解紧张局势，推动地区和平稳定。"
 taiwan_detente.6.a: "看看他们会谈些什么。"
 taiwan_detente.7.t: "两岸统一议题迫在眉睫"
 taiwan_detente.7.d: "在美国内战局势恶化之前，国际外交格局已显现明显的变化迹象。随着美国国内社会分裂日益加剧，政府运作频频受阻，其在国际事务中的影响力持续衰退。\n\n在这一背景下，中国大陆加紧掌控周边局势。与此同时，台湾内部也出现了多元声音，一些主流政党呼吁重新审视两岸关系的走向，以避免在国际力量重组中被边缘化。\n\n不久之后，随着美国内战正式爆发，美国政府的对外干预能力骤然下降，亚太地区的安全局势出现了重大空缺。中国大陆明确表示，将坚定不移地推进国家统一进程，坚决反对任何形式的分裂行径，强调维护国家主权与领土完整的决心绝不会动摇。\n\n在台湾，面对政局动荡，国民党等主要政治力量呼吁以更务实的态度面对两岸现实，主张通过和平谈判寻求新的安排。"
 taiwan_detente.7.a: "分裂要结束了？"
 taiwan_detente.8.t: "新加坡两岸会谈提出统一议程"
 taiwan_detente.8.d: "本周，来自中国大陆和台湾的代表团在新加坡政府的协调下举行了新一轮谈判。此次会谈正值美国内战、亚太局势深刻变动之际，因而引发国际社会的广泛关注。\n\n在会谈过程中，大陆代表团正式提出加快推进两岸统一进程，呼吁建立常态化沟通机制，并就统一框架展开实质性对话。代表指出：\"实现祖国完全统一是十四亿人民的共同心愿，也是中华民族伟大复兴的关键一步\"，强调应把握当前的历史机遇。\n\n由中国国民党领导的台湾代表团则持谨慎态度。台方重申致力于和平处理两岸关系，但对统一议题持\"开放但保留\"的立场，强调必须维护台湾民众的生活方式、社会制度与核心利益。\n\n这是多年来统一议题首次作为正式议程重返两岸谈判桌。尽管前路充满不确定性，但此次对话本身已具有重要的战略意义。"
 taiwan_detente.8.a: "两岸统一是必然趋势。"
 taiwan_detente.9.t: "新加坡会谈破裂"
 taiwan_detente.9.d: "在新加坡举行的两岸会谈于今日宣告中止。双方在统一议题与政治安排上的关键分歧始终未能缩小，会场气氛一度紧张，最终未发布联合声明。\n\n大陆代表团在会中强调，当前国际格局剧烈变化，两岸应抓住战略窗口期，推进统一进程。大陆方面提出设立联络机制并商讨统一路径草案，重申\"和平统一是最大诚意，不排除必要选项\"的政策立场。\n\n台湾方面则明确拒绝进入任何涉及统一议程的阶段性协商。国民党主导的代表团，称现阶段\"缺乏岛内共识\"，并对大陆在会中强调\"一国框架\"表达严重关切，要求\"先处理现实接触、建立互信\"，再谈后续安排。\n\n闭门会议持续不到两小时即告中断，双方未安排媒体简报，代表团分别提前离场。\n\n新加坡外交部对此表示遗憾，呼吁双方保持沟通渠道畅通，并避免言语升级和误判风险。"
 taiwan_detente.9.a: "至少我们尽力了。"
 taiwan_detente.10.t: "最终抉择"
 taiwan_detente.10.d: "中南海深夜，习近平独坐勤政殿办公室。案前摊开的泛黄台湾海峡地图上，凌厉灯光将海界线照得如同历史裂痕。\n\n总参谋部与中央军委的汇报反复确认：和平统一的关键窗口期已然消逝。岛内民意深度撕裂，外部干涉持续加剧。再等，将彻底丧失战略主动。\n\n十年来，他始终避免对抗，谋求稳定的国际秩序，化解风险。但时间，此刻却成了最凶险的敌人。统一不再是政治选项，而是关乎国家完整与未来的存亡抉择。他清楚代价——战场牺牲、经济震荡、国际压力乃至重大政治风险。但历史不会等待。\n\n\"风险？\"他望向夜色，\"革命年代，我们的同志哪次前进不冒风险？\"中南海的空气仿佛凝固，举国目光似都聚焦于此。\n\n\"命运只留下这条单行道。\"\n\n\"准备下一阶段行动。\""
 taiwan_detente.10.a: "历史的大门已然敞开。"
 taiwan_detente.11.t: ""
 taiwan_detente.11.d: ""
 taiwan_detente.11.a: ""
 taiwan.500.t: "最终决战"
 taiwan.500.d: "在数周可疑的东协动向以及中日冷战紧张局势不断升级达到新高峰后，许多国际观察家预计热战即将爆发。尽管太约组织加强了外交斡旋试图缓和局势，但北京和东京均已宣布两大阵营进入战争状态，我们被迫再次为生存而战。\n\n当所有外交努力徒劳无功，亚太地区最激烈的区域冲突已在我们眼前展开。这场人类迄今规模最大的战争将波及30多亿人口，现实而言我们无法指望中方会像以往那样退让。要么太约彻底摧毁中国的战争机器及其重启冲突的能力，要么东协将推进征服亚洲其余地区。\n\n对我们而言，这是本世纪第二次面临存亡威胁。这个曾受挫却未屈服的新中国政府，在复仇主义情绪和亚洲新盟友的驱动下，必将像2021年那样试图颠覆我国政府、摧毁民主制度。为确保我们的未来，我国决定投身大亚洲战争，与民主盟友并肩作战，一劳永逸地击败北京领导的邪恶联盟。"
 taiwan.500.a: "我们上吧！"
 loc_taiwanese_progressivism: "台湾进步主义"
 CHI_neoliberalism_desc: "\n\n\n\n£GFX_CHI_ideology_neoliberalism\n\n\n\n\n\n§Y台湾进步主义§!是民进党（DPP）、其他泛绿政党和一些独立人士所坚持的意识形态。民进党是绿营的领导者，其党起源于20世纪70年代中期开始的\"党外运动\"。由于反抗国民党训政和白色恐怖的历史，民进党将自由民主、政治正义和平等主义视为其核心意识形态。这些价值观后来被更广泛的台湾进步运动所继承。多年来，由于中共日益增长的敌意，民进党还吸收了反共思想，并主张台湾与中国大陆保持距离。\n\n如今，台湾进步主义主张多种目标，包括社会自由与平等、环境可持续性、LGBTQ+权利和台湾独立，并仍然是台湾政治中最主要的运动之一。"
 loc_taiwanese_conservatism: "台湾宪政主义"
 CHI_constitutionalist_desc: "\n\n\n\n£GFX_CHI_ideology_constitutionalism\n\n\n\n\n\n§Y台湾宪政主义§!由国民党（KMT）、亲民党（PFP）和一些独立人士所坚持，是一种本土化的宪政主义形式，支持中华民国的延续、自由保守的社会政策以及与中国大陆的温和关系。台湾的宪政主义最初以三民主义和社会保守主义为基础，多年来采用了更为自由的方式，以便在台湾解严后保持竞争力。\n\n如今，台湾宪政主义的主要特点是保护主义经济政策、中国民族主义、中间派社会政策以及从蒋家王朝继承下来的逐渐减弱的反共主义，并仍然是台湾政坛中最大的派别之一。"
 loc_taiwanese_liberal_populism: "自由民粹主义"
 taiwanese_liberal_populism: "自由民粹主义"
 taiwanese_liberal_populism_desc: "台湾自由民粹主义是自由保守主义的一种变体，其核心是通过满足民众需求、积极提供公共服务及改善弱势群体生计来赢得选票。\n\n由于过度聚焦选举胜负，该思想常被批评\"缺乏原则\"且边界模糊。与其称之为意识形态，不如更合本质地称它为一种选举策略。"
 loc_taiwanese_reformed_tridemism: "改良三民主义"
 reformed_tridemism: "改良三民主义"
 reformed_tridemism_desc: "三民主义，即民族、民权、民生三大纲领，由三个同等重要的部分组成：民族主义、民主制度与社会福利。\n\n进入21世纪时，传统三民主义已显露出治理现代社会的局限性，促使许多人寻求其改良版本。\n\n相较于原版，革新后的三民主义降低了民族主义的比重，转而强调扩大福利，并将其视为现代化理论的核心支柱。与此同时，民主制度作为人民的基本需求，被纳入更广义的福利范畴，使得福利主义成为改良三民主义的唯一重点。"
 loc_taiwanese_OCTS_democracy: "一国两制民主"
 CHI_market_socialism_desc: "\n\n\n\n£GFX_CHI_ideology_market_socialism\n\n\n\n\n\n\"在一个国家内实行两种制度\"，乍一听像是某种天方夜谭般的政治实验，又或者是某种削弱国家主权和统治力的独特计划，但在东亚一隅岸礁上的城市群之中，这种古怪的政治制度却已实行了有近四十年。\"一国两制\"诞生于中国大陆经济实力与政治影响力尚显薄弱之时，实乃平衡两种制度——社会主义和资本主义的激烈冲突的权宜之计。在此制度下所建立的\"特别行政区\"尽管与政权主体尊奉同一主权，但仍享有建立自己的政府机关和议会机构的自由，并在制定和实施政策方面几无限制。其与传统的邦联制最大的不同，或许在于\"特别行政区\"的规模往往仅限于一地一城，因而小小的分离主义思潮对联合的稳定几无影响。\n\n如今，随着实力天平对比和政治环境的变化，\"一国两制\"所蕴含的内在逻辑逐渐发生转换。从过去的保护、隔离，到现如今多边交流的日益深化，\"一国两制\"已经成为了一个促进不同社会受不同意识形态影响的人民和平共处、不同政治和经济制度相互交流融合、最终促进价值观和谐的重要平台。"

 libya.30.t: "利比亚签署停火协议"
 libya.30.d: ""
 libya.30.a: "我去了"
 libya.31.t: "利比亚内战停火"
 libya.31.d: "在历经数月谈判后，利比亚各对立派系已达成全国性停火协议，正式宣布终止该国境内主要作战行动。该协议于2020年10月23日签署，要求立即停止所有战线的进攻行动，并制定了旨在稳定日常生活的措施，包括重新开放关键道路、恢复国内通航以及推动战俘交换进程。\n\n停火协议还包含削减外国势力在利比亚存在的条款，各方承诺撤出雇佣军及外部军事力量。尽管协议措辞明确，具体执行仍存变数。武装派别继续控制大片区域，指挥体系处于分裂状态，而本应统一国家的行政机构在经历多年分裂与各自为政后依然脆弱。\n\n参与谈判的外交官形容该协议为必要的突破，但其源于各方疲态而非互信。交战双方均遭受重大损失，长期冲突造成的经济压力加剧了停火诉求。然而涉及政权合法性、石油收益控制权及利比亚国家未来结构的深层分歧仍未解决。\n\n当前，枪声暂歇。但这次停火将成为和平的基石，抑或仅仅是下一轮冲突前的短暂平静？"
 libya.31.a: "和平终至？"
 libya.45.t: "利比亚大选因分歧暂停"
 libya.45.d: "利比亚计划中的全国大选在敌对政治集团谈判破裂后已正式暂停，使该国脆弱的过渡进程再度陷入迷雾之中。大选本应是十月停火后的下一步举措，如今却演变为新的战场，这次是在功能失调的委员会和法律争议中展开的较量。\n\n争议的核心在于利比亚从未解决的根本问题：谁有权统治，以及依据何种规则统治。对立派系相互指责对方操纵选举法、阻挠选民登记，并在投票尚未开始前就试图操控流程以确保胜利。关于候选人资格、地区代表权以及武装团体角色的争论已使选举委员会陷入瘫痪，多个城市的当地政府则拒绝承认首都发出的决定。\n\n国际调解方敦促各方保持克制，但其影响力有限。在当地，民兵组织依然盘踞，安全保障难以确定，政治领袖们一面谈论团结，一面却为可能再度出现的破裂做准备。推迟选举并未终结政治进程，却使其失去了推进动力，而在利比亚，失去动力往往意味着失去和平。\n\n对于普通利比亚民众而言，选举暂停更像是一种确认而非延迟：该国仍然被困在停火与和解之间，困在脆弱的平静与冲突再起的威胁之间。"
 libya.45.a: "和平议程被再次推迟。"
 libya.46.t: "利比亚王国复辟"
 libya.46.d: "在许多人认为历史不会重演的今天，利比亚正式宣布恢复王国政体，复兴赛努西君主制作为国家统一的象征，以期终结多年的内战与政治瘫痪。该声明由高级政治人物与军事代表共同宣布，将君主制定位为“破碎国家之上的中立王冠”，而非回归绝对统治。\n\n复辟支持者指出，利比亚共和政体已病入膏肓。自2011年以来，历届政府更迭崩溃，选举进程停滞不前，对立政权将国家割裂为相互竞争的势力范围。在此真空状态下，君主制被塑造为唯一能够跨越东西部、部落与城市、民兵与国家鸿沟的终极制度，旨在成为超越任何单一派系野心的稳定基石。\n\n新任国王承诺推行全面改革，开展民族和解谈判，并最终在重构的体系下回归人民民主。然而质疑声仍不绝于耳。武装团体仍在众多区域掌握实权，批评者警告此次复辟可能只是武装势力借以树立的另一面旗帜。在的黎波里，民众反应从谨慎接受到断然拒绝不一而足，部分声音指责该宣言缺乏合法性，警示利比亚无法仅凭象征主义实现统一。\n\n尽管如此，这是多年来首次有单一旗帜作为国家延续的象征被举起。恢复的王国究竟会成为摆脱崩溃的出路，抑或只是分裂的新形态，将取决于今日宣言之后的实际行动。"
 libya.46.a: "王冠重归利比亚。"
 libya.47.t: "利比亚新军阀时代"
 libya.47.d: "利比亚再度陷入崩溃。在赛义夫·伊斯兰远征马格里布失败后，他在国内建立的脆弱秩序已瓦解为公开的分裂状态。短短数周内，军事单位分崩离析，指挥体系土崩瓦解，大片区域脱离中央控制。这个曾宣称要复兴利比亚的政权，最终却亲手将其推入破碎深渊。\n\n境外战败暴露了曾被宣传和强制统一所掩盖的弱点。补给枯竭，敌对指挥官相互指责，地方领袖开始自行其是。在的黎波里，武装团体占领了政府部门和广播站；东部地区，军官们宣布成立“紧急委员会”以保卫各自城市；南部边境通道则落入走私者和部落民兵手中，他们如今用枪杆子横征暴敛。曾作为政府命脉的利比亚石油设施，如今沦为各方争夺的焦点——输油管道每周都在易主，全凭武力决定归属。\n\n民生体系随政治秩序一同崩溃。机场毫无预警地关闭，加油队伍绵延数小时，断电持续数日。许多地区的法院已停止运作，被效忠地方强人的临时“安全委员会”取代。一些组织以革命之名行动，有些高举宗教旗帜，有些纯粹为利益而战。他们的旗帜各异，结果却如出一辙：利比亚已回归检查站割据的时代。\n\n国际社会纷纷发表声明呼吁克制，但现实残酷而直白：利比亚不再是一个走向复苏的国家，而是彻底崩塌的废墟。国家统一的时代已经终结。军阀时代已然开启。"
 libya.47.a: "利比亚已四分五裂，难以挽回。"

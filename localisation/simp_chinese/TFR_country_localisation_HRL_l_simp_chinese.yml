 libya.1.t: "米苏拉塔沦陷"
 libya.1.d: "我军已彻底击溃敌军防线，并成功占领战略要地米苏拉塔！这场战争很快就会结束！"
 libya.1.a: "大新闻"
 libya.2.t: "的黎波里陷落"
 libya.2.d: "这场战争终于结束了！我方地面部队经过激战，已攻占民族团结政府首都。现在终于可以集中精力重建我们的国家了。"
 libya.2.a: "我们势不可挡！"
 libya.4.t: "全国大选"
 libya.4.d: "随着第二次内战的爆发，我们不得不年复一年地推迟选举。最终，选举很快就能举行了。"
 libya.4.a: "迈出第一步"

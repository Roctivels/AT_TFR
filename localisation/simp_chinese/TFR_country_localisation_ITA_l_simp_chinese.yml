l_simp_chinese:
 ITA_memento_audere_semper: "永怀敢勇之心"
 ITA_memento_audere_semper_desc: "哥萨克人再次来啜饮乌波兰乃至欧洲的鲜血！\n而今，让他的心脏再次燃烧吧！欧洲的儿女们已严阵以待。\n让入侵的恶犬放马过来吧，我们是血脉同源的民族，被共同命运所系，被相同抗争所铸！\n任凭他们来袭。我们必将把哥萨克人驱回乌拉尔山！"
 ITA_eyes_in_the_skies: "天空之眼"
 ITA_eyes_in_the_skies_desc: "调动空军或舰队的前提是掌握敌军动向。东欧地区将部署一系列传感器、天线与雷达系统以监控敌方活动，我军战机将负责前线空域的巡逻任务。"
 ITA_expanded_mediterranean_doctrine: "扩展地中海战略"
 ITA_expanded_mediterranean_doctrine_desc: "地中海是意大利文明的摇篮，亦始终是国家战略的核心。意大利舰队从设计、编组到部署均以地中海为重心，海军航海文化的本质亦指向对“我们的海”的控制与巡航。确保欧洲海岸线安全是我们的职责，若条件允许，更要在那头巨熊胆敢下水时予以痛击。"
 ITA_wings_over_the_horizon: "飞越地平线"
 ITA_wings_over_the_horizon_desc: "航空力量历来是意大利军力的冠上明珠，纵观历史始终是民族自豪感的真正源泉。从卡普罗尼、邓南遮到亚历山德罗·马尔凯蒂，这些伟大名字或作为设计师，或作为飞行员，抑或纯粹飞行爱好者，都曾承载意大利翱翔的荣光。我们将致力于改进、革新并拓展意大利航空设计，部署庞大机群以制衡敌方力量。"
 ITA_venturing_in_the_big_blue: "探索浩瀚深蓝"
 ITA_venturing_in_the_big_blue_desc: "飞翔啊，飞翔\n歌唱啊，歌唱\n在蔚蓝描绘的碧空里\n幸福地停留于天际\n我飞翔，我幸福地飞翔\n越过太阳，不断向上\n当世界在下方缓缓消逝\n唯有甜蜜乐声为我奏响"
 ITA_operation_nettuno: "§Y涅普顿行动§!"
 ITA_operation_nettuno_desc: "“涅普顿行动”是一项旨在夺取俄罗斯港口、补给设施、海军炮台及滩头阵地的大规模军事行动，为全面进攻做准备。此举将巩固北约在战争中的优势地位，并有望夺取对盟军计划至关重要的战略目标。"
 ITA_operation_giove: "§Y朱庇特行动§!"
 ITA_operation_giove_desc: "“朱庇特行动”是一项旨在夺取俄军机场、补给设施、防空火炮及交通线路的大规模军事行动，为全面进攻奠定基础。我们将掌控关键前线据点，切断敌军核心补给线。"
 ITA_new_supply_routes: "新补给线"
 ITA_new_supply_routes_desc: "当前要务是强化前线港口、机场、铁路及后勤线路，确保前线作战部队获得必要补给。我们将确保新型载具、先进设施与优势阵地的供给，将装备输送给前线士兵。"
 ITA_restore_compulsory_military_service: "恢复义务兵役制"
 ITA_restore_compulsory_military_service_desc: "于2005年被议会暂停的兵役制度，如今作为必要措施重新启用。无论是否受到欢迎，我们别无选择。该法律仅是遭到冻结，其条款本就为快速重启而设计，现在我们将充分利用这一便利条件。"
 ITA_civil_industry_conversion_program: "民用工业转换项目"
 ITA_civil_industry_conversion_program_desc: "意大利人民已准备好为战争需求牺牲安逸生活。\n前线兄弟需要武器、弹药、食物及一切必需品——所有我们能生产的物资。\n工业转型不仅必要，更是迫在眉睫、不可避免的。\n我们将通过周密规划与战略决策迎接这项挑战。"
 ITA_to_stand_as_one_nation: "团结如一国"
 ITA_to_stand_as_one_nation_desc: "当国家存亡危在旦夕，细枝末节的政治纷争必须让位。\n我们需要一个团结的政府，一个随时准备实施战争所需改革的政府。无论左翼右翼，四海之内皆兄弟，因为敌人已兵临城下。"
 ITA_well_be_back_before_you_know: "我们会归来"
 ITA_well_be_back_before_you_know_desc: "战争持续愈短，胜利欢庆愈早。\n当国家意志凝聚一体，谁可阻挡其前行？\n伟大的无产阶级再次崛起，工业烟囱重燃炽热火焰。\n此战必须终结，而我们终将终结它。\n向命运与共的全体人民发出呼唤：“我们必将归来！”\n\n我们的凯旋将比任何人预想的更快到来。"
 ITA_operation_cerere: "§Y刻瑞斯行动§!"
 ITA_operation_cerere_desc: "“刻瑞斯行动”是我军将领针对乌克兰战场制定的战略方案。\n基于当前战场态势，该计划旨在以迅猛有力的攻势快速推进，在确保关键战略要地的同时，最大限度减少交战与伤亡。"
 ITA_break_the_eastern_wall: "打破东墙"
 ITA_break_the_eastern_wall_desc: "时机已至。\n我们将无情出击，不留余地，毫不迟疑。\n既然掌握了主动权，便绝不虚掷。\n出击，出击，再出击，倾注你全部的力量与伤痛！\n直到胜利成为定局。\n若敌人占据优势，亦会如此行事。握紧手中的利刃，出击吧。"
 ITA_ogni_lasciata_e_persa: "机不可失，时不再来"
 ITA_ogni_lasciata_e_persa_desc: "我们将坚守每一寸阵地：每座城市、每个街区、每栋建筑。\n绝不让侵略者夺走一寸土地！\n无需迟疑：身处炼狱，唯有向前。\n意大利的儿女们，要让敌人为每一块砖石、每一道裂隙、每一滴河水付出惨痛代价。"
 ITA_chi_vincer_ci_puo: "世上谁能敌？"

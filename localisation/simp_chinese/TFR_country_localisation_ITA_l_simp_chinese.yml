 vatican.1.d: "不！"
 vatican.1.a: "我们失去了一位圣人。"
 vatican.2.t: "教宗方济各去世"
 vatican.2.d: "梵蒂冈城讯 - 教宗方济各于今晨7时35分（GMT+2）安详离世，享年88岁。这位曾与伊朗最高精神领袖历史性会晤的牧者，其推动国际和平与外交的遗产远不止于此。\n\n尽管方济各在全球天主教徒中颇具争议，但此刻当梵蒂冈钟声回荡时，整个普世教会都陷入了深切哀悼。他的改革派言论虽常遭保守派诟病，但对环境与贫苦者的关怀使其深得欧洲及全球信众爱戴。\n\n堪称奇迹的是，尽管双肺炎症侵蚀肺部，他仍在复活节主日最后一次现身圣伯多禄广场，乘坐专车为数百信众祝福交谈。次日复活节星期一，教宗便在睡梦中安然蒙召。\n\n作为首位耶稣会士出身的拉丁美洲教宗，他更以崇尚简朴、关爱病弱的主保圣人亚西西的方济各为名。终身与慢性肺病抗争的他，历经2021年结肠手术、2023年疝气治疗，以及2022年起反复发作的支气管炎，终于今日蒙主恩召，回归天父家乡。"
 vatican.2.a: "我们表示最深切的哀悼。"

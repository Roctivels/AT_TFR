 italy_ew_events.1.t: "第一次欧陆战争"
 italy_ew_events.1.d: ""
 italy_ew_events.1.a: "序幕拉开。"
 italy_ew_events.2.t: "一片寂静"
 italy_ew_events.2.d: "战争的硝烟让科技倒退回沉默的年代——未经许可，士兵再也无法与远方通信。这近乎原始的禁令下，写信成了绝望的士兵与亲人之间唯一现实的纽带。\n\n在距离罗马几英里的小镇上，自开战以来第三次退回的信件包裹刚抵达。妻子、友人和家人们聚集在镇广场，焦灼地数着秒等待分发信件。\n\n尽管西尔维娅不愿承认，但她是人群中最焦灼的那个。她与丈夫从幼儿园相识便相伴至今，早已成为彼此生命的一部分。他们共同熬过经济困顿、疫情肆虐，挺过祖国与莫斯科日益紧张的地缘对峙，所有风雨都是并肩度过。如今丈夫却直接奔赴前线，成为被投入绞肉机的无数无名者之一。\n\n他离开意大利已整整一年。第一封信充满乐观，讲述在绝境中击退敌人的奇迹胜利。第二封信却变了调——直言不讳地描述他与所属旅困守拉脱维亚前哨站的惨烈状况，字里行间再无最初的乐观。\n\n自从四个月前收到那封信，西尔维娅再也没有安稳入眠过，她总是睁着眼祈祷丈夫平安。此刻这封信或许能带来慰藉，或许会将她彻底击碎。\n\n内心几番挣扎后，她终于走向志愿者整理好的信件堆。但令她窒息的是——没有给她的信。一封都没有。\n\n她心急如焚，呼吸逐渐急促，拼命挤到一名志愿者面前：“打扰一下？你们肯定漏了几封信。我丈夫卢卡·莫雷蒂的信不在这里。”\n\n志愿者翻了个白眼：“莫雷蒂？我向您保证，这些信封基本都是我整理的，根本没见过这个姓氏。抱歉。”\n\n什么？没有？怎么可能一封都没有？西尔维娅还想追问，但对方又能知道什么呢？她缓缓退出人群，无助的泪水终于决堤。"
 italy_ew_events.2.a: "她不会是唯一一个。"
 italy_ew_events.3.t: "为什么要为顿涅茨克而死？"
 italy_ew_events.3.d: "自战争爆发以来，佛罗伦萨如同意大利许多城市一样陷入沉寂。这座城市的政治生活几乎在一夜之间消失殆尽。公众集会取消，地方政党无限期推迟活动，市议会会议被废止；人们习以为常的所有市民活动都停止了。无人明说，但人人心知肚明：意大利正处于战争状态，国内的民主之声戛然而止。\n\n然而有那么一群人，似乎非要发出最后一声呐喊才肯退场。\n\n市中心市政厅正门前聚集了人群。他们举着标语，高呼口号，挥舞旗帜，这番景象吸引了所有路人的目光。他们是整座城市最喧嚣的存在，政府当然也注意到了。市政大楼内，政客们透过遮光窗帘面无表情地暗中观察，但并非所有人都神色平静。警察局长投去轻蔑的目光，听着城中那些狂热的亲俄派反复喊出熟悉的口号：\n\n不要战争！不要干预！\n\n意大利人没有投票支持这场战争！\n\n为何要为顿涅茨克送死？\n\n抗议者的呼喊在领导阶层的鄙夷中反复回荡。他们不过是棋子、有用的傻瓜，甚至是叛徒。或许联邦安全局给了他们一大笔钱来继续这种闹剧。到了下午四点，抗议者开始自问是否要坚守至深夜。\n\n但他们很快得到了答案。\n\n人群向右望去，新爆发的激烈骚动瞬间点燃了整个广场。来自全市的警察涌入现场，已与抗议者发生推搡冲突。叫骂声、侮辱声甚至拳脚相加的声音此起彼伏，当地反干预主义者仍在抵抗，但并未持续太久。一小时内警方便已控制住局面，数日来首次，警察局长脸上露出了满意的神情。"
 italy_ew_events.3.a: "他们或许能在牢狱之中为莫斯科煽风点火。"
 italy_ew_events.4.t: "交战报告"
 italy_ew_events.4.d: "俄黑海舰队在黑海行动区域的存在威胁到保加利亚、罗马尼亚及乌克兰辖区的海军、空中与陆地作战能力。侦测到敌舰队大规模编队向罗马尼亚及乌克兰海岸线目标发起进攻。意大利及北约海军高层批准对特定俄军战斗群实施交战。\n\n交战过程：友军海军力量与空中支援协同攻击敌先导舰艇。敌方即刻遭受损失，并试图以空中力量及导弹袭击进行反击。双方海军随后爆发激烈海战。友军因敌方地面攻击机及导弹齐射遭受损失。然而，友军通过持续施压的无人机、空中及导弹打击，耗尽了敌后备力量并摧毁了敌指挥控制设施。在持续失去指挥能力及物资损失后，敌军从行动区域撤退。\n\n友军伤亡报告：4艘护卫舰、1艘驱逐舰、2架多用途战斗机、7架无人机。\n\n敌军伤亡报告：5艘导弹艇、12艘巡逻艇、2艘导弹护卫舰、5架海军直升机、3架多用途战斗机、2架无人机。\n\n战后战术评估：战术胜利。友军损失可控，敌军损失重大。俄黑海舰队进攻节奏已完全丧失。\n\n最终战略评估：俄黑海海军力量遭受重创。预估至少20%敌海军战力已丧失作战能力。敌军舰队在当前行动期间很可能被迫转入防御态势。俄黑海部队近期极难恢复进攻行动，但不排除在不久后重新发起攻势。"
 italy_ew_events.4.a: "北约湖，即将成形。"
 italy_ew_events.5.t: "行动简报：塞瓦斯托波尔突袭"
 italy_ew_events.5.d: "塞瓦斯托波尔海岸方向有限两栖突击行动简报\n日期：[GetDateText]\n分发范围：最高统帅部 - 海军处 - 联合作战司令部\n\n绝密\n\n本文件概述了针对塞瓦斯托波尔地区俄海军指挥中心及岸基雷达的两栖作战基本概要。此次行动指定由“‘塞伦尼西马’两栖突击团执行”，因其具备快速反应及高效作战能力。\n\n敌军对塞瓦斯托波尔的控制使其在黑海对我方阵地拥有战略优势，能够对我舰队实施侦察活动。\n该区域一个关键的海军指挥中心位于塞瓦斯托波尔以西20公里处。它是俄方在黑海进行布雷和侦察行动的主要指挥节点，其职能是保护克里米亚半岛免受北约任何大规模两栖作战的威胁。\n\n情报报告显示，该节点在每日0100时至0700时之间存在六小时的维护性静默期，期间切断一切外部通信。\n这被确定为执行此次行动的最佳时段。\n\n此次行动目标为五个关键点，包括岸基雷达中心、火力控制系统及前述指挥中心。该团在行动开始后仅数小时内便清除了所有目标，过程中伤亡甚微。该团各分队甚至能够坚守阵地达12小时，使得我方海空力量得以利用由此创造的缺口。\n\n此次行动的成功实施，致使敌军岸防体系在随后2-3天内陷于瘫痪，在此期间为盟军海军在黑海赢得了行动自由，并为后续在克里米亚沿岸其他关键设施展开的作战行动提前做好了准备。"
 italy_ew_events.5.a: "俄罗斯的霸权正面临挑战。"
 italy_ew_events.6.t: "顿河上空的闪电"
 italy_ew_events.6.d: "当C-130运输机低空掠过时，沃罗涅日上空的颜色如同瘀青的钢铁，引擎在狂风中嘶吼。经过数周消耗战，俄军防线在城西已经动摇；北约部队正全力突入这个缺口。意大利为履行其职责，投入了最精锐的力量：福尔戈尔空降旅。\n\n凌晨4时30分，空降开始。数百朵橄榄绿的伞花在灰蒙蒙的黎明中绽开，第185伞兵团的精英们脸上涂着黑灰，武器紧绑在身上。他们向着城南郊外代号“毒蛇”的着陆区飘落，那里是麦田与废弃集体农庄交织的土地。下方高射炮火闪烁，但大多漫无目标；俄军机动部队已捉襟见肘。\n\n第一批伞兵重重着陆。洛伦佐·里奇上尉的排几分钟内便控制了中心十字路口，用手榴弹和轻武器火力解决了一支猝不及防的BMD战车乘员组。邻近的分队清剿了一座改为观察哨的废弃谷仓，用枪口押出晕头转向的守军。5时整，空降区周围已形成粗略的环形防线：机枪阵地挖在沟渠里，狙击手占据屋顶，工兵用荧光棒标出滑翔路径。“防线稳固。毒蛇着陆区安全。请求立即补给。”\n\n一小时内，第一批重型空投托盘重重砸落地面，装载着120毫米迫击炮弹、医疗包、米兰反坦克导弹和柴油桶。后续的C-27J“斯巴达人”运输机低空盘旋，吐出更多部队和轻型车辆。\n\n至正午时分，这个突出部已固若金汤。福尔戈尔的工兵用压平的麦田紧急推出一条简易跑道；第一架安-26运输机在黄昏时分降落，运来弹药和热食。俄军的反攻试探着防线边缘，先是炮火侦察，然后是步兵下车进攻，但无后坐力炮和“标枪”反坦克小组用冒烟的残骸击退了他们。\n\n在由废弃农舍地下室改建的指挥所里，里奇抹去额头的汗水，按下通话键：“沃罗涅日南侧已稳定。”伞兵们在渐暗的天光中点起香烟，望着补给运输机在头顶嗡鸣。至少这一夜，战线属于意大利。"

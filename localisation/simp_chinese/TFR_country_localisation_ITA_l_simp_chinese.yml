 italy_ew_events.9.t: "无动于衷，漠不关心"
 italy_ew_events.9.d: "你从深夜醒来。\n窗外的烟花仍在噼啪作响。\n你的伴侣躺在身侧，一本书摊开在胸口。\n\n你们赢了。\n或者说……用“赢”这个词实在有些奢侈。\n\n你从不过问政治。\n在这硝烟未尽之时承认这一点或许荒诞，但事实如此。\n你的工作太过重要，无须亲赴前线。\n你的伴侣亦是如此。\n两个孩子年纪尚幼，还扛不动枪。\n\n并非新闻激不起波澜，总归有些涟漪……\n可说到底，又能改变什么呢？\n\n胜败与否……你终究是专业技工。\n会晋升。\n日子照常过。\n战争的输赢从未真正决定你的生活。\n\n那么多惊涛骇浪发生过。\n可说到底，什么也未曾改变。\n你的不关心证明了这点。\n你置身事外。"
 italy_ew_events.9.a: "多么悲伤。"

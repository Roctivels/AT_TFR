 vatican.4.t: "枢机主教路易斯·安东尼奥·塔格莱当选为教宗方济各二世"
 vatican.4.d: "今晨，永恒之城的圣伯多禄大教堂钟声长鸣，西斯廷教堂烟囱升起白烟，向世界宣告枢机团已选出第267任罗马主教。菲律宾枢机路易斯·塔格莱当选圣座继承人，尊号方济各二世，成为历史上首位来自东亚的教宗。\n\n新任教宗在圣伯多禄大殿阳台发表首次公开讲话，就克里姆林的新政权发出警示：\n\n“随着莫斯科及其势力的复兴，我必须警告诸位警惕帝国主义死灰复燃的可能。这个帝国将终结对话、仁慈与谦卑，而这些正是基督耶稣为之赴死的核心价值。俄罗斯的兄弟姐妹们，我呼吁你们抵制克里姆林宫对福音真理的曲解。”\n\n方济各二世对宗教对话与传教工作的强烈重视，预示其牧职将延续“同道偕行”精神，似乎显示出进步派力量在圣座的影响力增强。但他对包括同性恋者在内的边缘群体包容与陪伴的强调，已引发保守派与传统主义信徒的批评。"
 vatican.4.a: "新时代，新教皇"
 vatican.5.t: "枢机主教罗伯特·普雷沃斯特当选为教宗良十四世"
 vatican.5.d: "今晨，永恒之城的圣伯多禄大教堂钟声长鸣，西斯廷教堂烟囱升起白烟，向世界宣告枢机团已选出第267任罗马主教。美国枢机罗伯特·弗朗西斯·普雷沃斯特当选圣座继承人，尊号良十四世，成为历史上第二位来自美洲的教宗。\n\n新任教宗在圣伯多禄大殿阳台发表首次公开讲话，特别提及故国局势：\n\n“美国的兄弟姐妹们啊，每颗在这场渎神冲突中逝去的灵魂都令我心痛不已！但请坚信，上帝赐予的平安超乎世人理解，只要信靠他的作为，和平终将重返美洲。全球的兄弟姐妹们，我们必须效法基督，为一切冲突的受难者搭建桥梁，而非摧毁希望。”\n\n拥有传教工作背景且注重小众文化的良十四世，其牧职预计将延续前任教宗方济各的路线。他已公开表态在美国内战中支持美利坚联邦。"
 vatican.5.a: "方济各的遗产永存"
 vatican.6.t: "枢机主教彼得·埃尔多当选为教宗斯德望十世"
 vatican.6.d: "今晨，永恒之城的圣伯多禄大教堂钟声长鸣，西斯廷教堂烟囱升起白烟，向世界宣告枢机团已选出第267任罗马主教。匈牙利枢机彼得·埃尔多当选圣座继承人，尊号斯德望十世。\n\n新任教宗在圣伯多禄大殿阳台发表首次公开讲话，就世界局势陈词：\n\n“今日欧洲的分裂成都已达数十年来之最。值此非常时期，至一、至圣、至公、属于使徒的教会必须成为超越政治却永不漠视不公的灯塔。须知在基督耶稣内，我们的合一远胜任何疆界、旗帜或党派。此刻不应绝望，而当革新。”\n\n这位常被描述为“恪守传统的神学保守派”的教宗，其牧职很可能强调延续性与稳定性，这在全球危机加剧之际尤为重要。但他对社会凝聚力、与东方教会对话、以及民族认同在宗教中作用的长期关注，正契合欧洲特有的时代焦虑。"
 vatican.6.a: "教廷的新时代。"
 vatican.7.t: "枢机主教罗伯特·萨拉当选为教宗本笃十七世"
 vatican.7.d.1: "今晨，永恒之城的圣伯多禄大教堂钟声长鸣，西斯廷教堂烟囱升起白烟，向世界宣告枢机团已选出第267任罗马主教。加纳枢机罗伯特·萨拉当选圣座继承人，尊号本笃十七世，是1500余年来首位非洲裔教宗。\n新任教宗在圣伯多禄大殿阳台发表严峻训谕：\n\n“共产主义幽灵正在世上各个角落游荡。它如毒药般侵蚀心灵，亵渎上帝与人性尊严，沉溺世俗之物。我们必须施以解药：当世俗之徒散播宣传时，我们要更响亮地传扬福音。这世界不需要妥协，而需要勇气。”\n\n这位以毫不妥协的传统主义著称、激烈反对现代世俗文化与伊斯兰原教旨主义的教宗，预计将开启严格保守的新时代。他的当选标志着天主教会已准备好直面其所谓“西方世界道德与精神的双重崩塌”。"
 vatican.7.d.2: "今晨，永恒之城的圣伯多禄大教堂钟声长鸣，西斯廷教堂烟囱升起白烟，向世界宣告枢机团已选出第267任罗马主教。加纳枢机罗伯特·萨拉当选圣座继承人，尊号本笃十七世，是1500余年来首位非洲裔教宗。\n新任教宗在圣伯多禄大殿阳台发表严峻训谕：\n\n“共产主义的幽灵正咆哮着归来。它征服自由主权国家，亵渎上帝，以正义为名行迫害之实，借秩序之名行暴政之恶。如今我们面临中俄结盟的新邪恶轴心，在那里主被放逐，人皆跪拜国家政权。我们决不沉默，纵需再负十字架踏上各各他之路，亦在所不辞。”\n\n本笃十七世作为毫不妥协的传统主义者当选，标志着天主教会已准备好抵抗、谴责并引领信徒穿越其所谓的“群狼时代”。"
 vatican.7.a: "好战派回归。"
 vatican.8.t: "[THIS.GetAdjective]教宗当选"
 vatican.8.d: "我们国家的枢机当选为下一任教宗！\n我们获得了丰厚的奖金，并对国家产生了一定影响力。耶！"

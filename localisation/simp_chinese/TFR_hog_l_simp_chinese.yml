 GER_hog_angela_merkel: "联邦总理：§H安格拉·默克尔§!\n\n\n\n\n\n\n\n   £GFX_GER_angela_merkel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L安格拉·多罗特娅·卡斯纳出生于西德，是一位路德宗牧师的女儿，其父为传播信仰迁往东德。作为化学专业出身的她，在民主德国成长期间，始终隔着两德边界眺望繁荣的西德。而统一带来的机遇改变了一切。\n\n柏林墙的倒塌成为默克尔政治生涯的催化剂。她曾短暂担任东德首个也是唯一民主政府的发言人。两德统一后，她于1990年作为基民盟成员当选联邦议员，并被赫尔穆特·科尔任命为妇女与青年部长——这位政治导师对她格外栽培。但联邦政府的职位远非其重点，当谴责科尔与基民盟领导层的机会来临时，她果断出击。2000年默克尔成为基民盟首位女性党魁，2005年更成为德国史上首位女总理，也是联邦共和国首位在东德长大的政府首脑。历经四次大选与十六载执政期，在金融危机与移民浪潮中，她始终是德国乃至欧洲不可撼动的定海神针。\n\n但所有统治终将落幕。自2018年起，默克尔总理任期便已进入倒计时：2021年9月26日。这位掌舵人即将离任，将应对风暴的重任交予继任者。历史究竟会铭记她为德国的守护者，抑或是仅延缓危机爆发的过渡者？答案仍待揭晓。§!"
 GER_hog_tino_chrupalla: "联邦总理：§H蒂诺·克鲁帕拉§!\n\n\n\n\n\n\n\n   £GFX_GER_tino_chrupalla_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L蒂诺·克鲁帕拉于1975年4月14日出生于前东德萨克森州的魏斯瓦瑟，在德意志民主共和国的最后岁月里成长于一个工人阶级家庭。其父是一名手工业者，自幼灌输给克鲁帕拉对劳动、传统和地方认同的深切尊重。完成中学教育后，他接受了油漆装饰工的职业教育，后来在家乡自立门户成为个体手工业主。\n\n与柏林政治圈中许多同龄人不同，克鲁帕拉通往全国政坛的道路并非始于大学或政党青年组织，而是从萨克森东部的手工作坊和工地现场起步。直到2015年欧洲移民危机高峰、部分民众不满情绪高涨之际，他方才加入当时正从疑欧运动向更广泛右翼民粹势力转型的德国选择党。他在党内的崛起堪称神速。2017年联邦选举中，克鲁帕拉在格尔利茨选区击败基民盟资深议员迈克尔·克雷奇默，直接拿下一席议席，此举标志着选择党在德国东部根基的深化。进入联邦议院后，他迅速成为民族保守主义、反全球化和捍卫传统德国价值观的强硬代言人，其言论引起众多被主流政治抛弃者的共鸣。\n\n2019年11月，克鲁帕拉与约尔格·莫伊滕共同当选选择党联邦联合主席，标志着党内权力从早期技术官僚核心向更具民族主义、文化保守特征的派系转移。凭借朴实的出身和直白的言辞，他将自己塑造成人民代言人的形象，与所谓脱离德国百姓生活的政治精英形成鲜明对比。\n\n如今，执掌祖国命运的克鲁帕拉承诺将带领德国开启新时代。这个国家再也不会被软弱政客和精英阶层拖累，世界终将见证德意志的真正力量。§!"
 GER_hog_olaf_sholtz: "联邦总理：§H奥拉夫·朔尔茨§!\n\n\n\n\n\n\n\n   £GFX_GER_olaf_sholtz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L奥拉夫·朔尔茨1958年6月14日出生于下萨克森州奥斯纳布吕克，在汉堡长大，父母均从事纺织行业。他在汉堡大学攻读法律，专攻劳动法与就业法领域。17岁加入德国社会民主党后，他立即活跃于党内青年组织\"青年社会党人\"，并于1980年代担任该组织联邦副主席。\n\n朔尔茨于1998年首次当选联邦议员，此后历任多个重要职位：2007年至2009年担任社民党秘书长，并在默克尔政府中出任联邦劳动与社会事务部长。2011年他当选家乡汉堡市市长，主导了财政领域重大改革与多项基础设施建设项目。2018年，他重返联邦政坛，在默克尔内阁中担任副总理兼财政部长，在新冠疫情期间发挥了关键作用。\n\n如今他已登上权力顶峰，成为德国总理。摆在面前的任务并不轻松，当今世界正经历前所未有的困境，多数人认为形势在好转前会进一步恶化。但至少，\"朔尔茨机器人\"将掌舵引领德国破浪前行。§!"
 GER_hog_robert_habeck: "联邦总理：§H罗伯特·哈贝克§!\n\n\n\n\n\n\n\n   £GFX_GER_robert_habeck_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L罗伯特·哈贝克1969年9月2日出生于德国吕贝克，在基尔附近的海肯多夫长大，父母都是药剂师。1989年在家乡海因里希·海涅中学完成大学入学资格考试后，他先后在弗莱堡大学、丹麦罗斯基勒大学和汉堡大学攻读哲学与德国文学。1996年获文科硕士学位，2000年在汉堡大学获得哲学博士学位，研究方向为文学美学与媒体理论，之后短暂从事写作工作并开始政治生涯。\n\n2002年加入绿党后，哈贝克于2002-2004年间任石勒苏益格-弗伦斯堡地区党部主席，2004-2009年间升任石勒苏益格-荷尔斯泰因州绿党联合主席。2012年被任命为该州能源转型、农业、环境、自然与数字化部长兼副州长，任职至2018年。同年，他与安娜莱娜·贝尔伯克共同当选德国绿党全国联合主席。\n\n在其领导下，绿党在德国多地取得显著进展，最终促成2021年联邦选举的突破性胜利。\n作为国家主导力量而非次要联盟成员的首度执政，哈贝克必将经历无数不眠之夜与大量咖啡因摄入。更不必说面对这个正在剧变，或者\n\n已然天翻地覆的世界。§!"
 GER_hog_christian_lindner: "联邦总理：§H克里斯蒂安·林德纳§!\n\n\n\n\n\n\n\n   £GFX_GER_christian_lindner_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L克里斯蒂安·林德纳1979年1月7日出生于西德北莱茵-威斯特法伦州伍珀塔尔市，成长于一个中产阶级家庭，父亲是中学教师。1995年林德纳加入德国自民党，1998年完成文理中学毕业考试。1999年至2001年间，其在联邦国防军空军服役，最终获得预备役中尉军衔。1999至2006年预备役期间，他在波恩大学攻读政治学并取得文科硕士学位，但因政治生涯和创业活动只能兼职就读。\n\n2000年5月31日，林德纳成为北威州议会最年轻议员。2007年其出任该州自民党秘书长，2009年首次当选联邦议员后卸任。2012至2013年间自民党遭遇低谷后，他于2013年12月7日以79%得票率当选联邦党主席，开启政党复兴之路。2017年在其领导下，自民党以10.7%得票率重返联邦议院。\n\n如今，该政党已执掌联邦议院，自民党人克里斯蒂安·林德纳成为德国总理。当支持者欢庆时，他必须深思与谋划：当今世界紧张局势与暴力冲突愈演愈烈，若想兑现对民众的承诺并守护民主制度与未来希望，此刻就必须采取行动。§!"
 GER_hog_richard_rossmanith: "联邦总理：§H里夏德·罗斯马尼特§!\n\n\n\n\n\n\n\n   £GFX_GER_Richard_Rossmanith_por\n\n\n\n\n\n\n\n\n-------------------------------------"
 GER_hog_armin_laschet: "联邦总理：§H阿明·拉舍特§!\n\n\n\n\n\n\n\n   £GFX_GER_armin_laschet_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L阿明·拉舍特1961年2月18日出生于北莱茵-威斯特法伦亚琛市，成长于虔诚的天主教家庭。其父早年是煤矿工人，后转行为学校教师。在边境之城的成长经历塑造了他包容、欧洲化和务实的世界观。他就读于当地皮乌斯高级中学，1981年通过高中毕业考试后进入波恩大学攻读法律，后转入艾希施泰特-因戈尔施塔特天主教大学接受新闻专业训练。\n\n1980年代末至1990年代初，拉舍特从事新闻记者和编辑工作，同时逐渐深入政坛。作为1979年就加入基民盟的资深党员，他于1994年当选联邦议院议员，迈出全国政坛第一步。但真正的政治根基还是在其家乡北威州奠定，1999至2005年担任欧洲议会议员的经历，使他积累了丰富的欧盟政策与一体化经验。\n2005年，拉舍特出任北威州世代、家庭、妇女及融合事务部长，其中间路线和包容政策赢得全国关注，但也引发党内争议。2017年，他领导基民盟与自民党联盟，当选德国人口第一大州北威州州长，推行以商业友好、社会平衡为特色的中间派政策。主政期间该州经济持续增长，政局相对稳定，其\"妥协优于对抗\"的执政理念得到充分体现。\n\n如今，这位中间派领袖的舞台已从故乡扩展到整个国家。要带领德国走向复兴，他必须在各派系间巧妙周旋，让祖国大地上所有力量都能奏响和谐的乐章。§!"
 GER_hog_bodo_ramelow: "联邦总理：§H博多·拉梅洛§!\n\n\n\n\n\n\n\n   £GFX_GER_bodo_ramelow_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L1956年2月16日，博多·拉梅洛出生于下萨克森州的奥斯特霍尔茨-沙尔姆贝克，在西德的新教家庭中长大。早年的生活经历深刻影响了他——身为铁路工人和工会成员的父亲早逝，使他对劳工问题和社会正义产生了深切共鸣。\n德国统一后，拉梅洛在图林根州真正开启了政治生涯。1999年他正式加入民主社会主义党（东德执政党统一社会党的后继政党）。作为西德人加入东德背景的政党，拉梅洛迅速成为连接东西德的桥梁：他既不回避民主德国的历史遗留问题，又坚定维护统一后东部德国人的权益。\n\n2014年，拉梅洛当选图林根州州长，创造了战后德国历史——首位来自左翼党的政府首脑。这一具有象征意义的转折表明，左翼治理已超越抗议性投票或反对党定位，获得广泛信任。尽管保守派警告这会带来意识形态倒退，但他领导的红红绿联盟政府以稳健的施政、经济稳定和社会政策赢得了认可。\n2020年，在经历极右翼选择党投票引发的政府危机和宪法争议后，拉梅洛再次当选，其政治韧性和对联邦民主制度的坚守赢得国际关注。在图林根这个德国政治极化最严重的州，他以冷静协商、捍卫民主规范和弥合分歧的独特能力著称。\n\n如今，全世界都在注视着这位执掌德国航向的领导人。从工会子弟到国家领袖，无论身份如何变迁，他始终将为人民而战，竭尽全力维护国家团结，带领德国以崭新姿态面对世界。§!"
 GER_hog_habeck: "联邦总理：§H罗伯特·哈贝克§!\n\n\n\n\n\n\n\n   £GFX_GER_Habeck_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L罗伯特·哈贝克1969年9月2日出生于德国吕贝克，在基尔附近的海肯多夫长大，父母都是药剂师。1989年在家乡海因里希·海涅中学完成大学入学资格考试后，他先后在弗莱堡大学、丹麦罗斯基勒大学和汉堡大学攻读哲学与德国文学。1996年获文科硕士学位，2000年在汉堡大学获得哲学博士学位，研究方向为文学美学与媒体理论，之后短暂从事写作工作并开始政治生涯。\n\n2002年加入绿党后，哈贝克于2002-2004年间任石勒苏益格-弗伦斯堡地区党部主席，2004-2009年间升任石勒苏益格-荷尔斯泰因州绿党联合主席。2012年被任命为该州能源转型、农业、环境、自然与数字化部长兼副州长，任职至2018年。同年，他与安娜莱娜·贝尔伯克共同当选德国绿党全国联合主席。\n\n在其领导下，绿党在德国多地取得显著进展，最终促成2021年联邦选举的突破性胜利。\n作为国家主导力量而非次要联盟成员的首度执政，哈贝克必将经历无数不眠之夜与大量咖啡因摄入。更不必说面对这个正在剧变，或者\n\n已然天翻地覆的世界。§!"
 GER_hog_merz: "联邦总理：§H弗里德里希·默茨§!\n\n\n\n\n\n\n\n   £GFX_GER_friedrich_merz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L弗里德里希·默茨1955年11月11日生于北莱茵-威斯特法伦州的布里隆，在西德一个保守的天主教家庭中长大。青年时期修习法律与经济后，他初任法官及企业律师，继而转入政坛。早期加入基民盟时，他便以敏锐才智、经济自由主义理念及对大西洋同盟的坚定支持而崭露头角。\n\n默茨于1994年当选联邦议院议员，迅速崭露头角，至二十一世纪初已成为基民盟议会党团的核心人物。他以倡导自由市场改革和强硬财政政策著称，因与安格拉·默克尔中间路线相左而于2009年退出政坛。此后十年间，他活跃于商界高层，曾任贝莱德德国公司主席。\n2018年重返政坛后，默茨以保守派革新旗手的姿态亮相。在基民盟经历2021年大选挫败后，他于2022年当选党主席，致力于引导该党回归传统价值并重塑政治中枢地位。\n\n如今他作为德国总理执掌国家，但当今世界却比以往任何时候都更危险。俄罗斯正对岌岌可危的北约联盟虎视眈眈，美国内战愈演愈烈，中国在太平洋地区挑战民主秩序，卡扎菲后裔正席卷北非，整个世界以不同方式陷入烈焰中。诚然，当今时代之复杂与艰难，已将对默茨的考验推到极致。§!"
 GER_hog_soder: "联邦总理：§H马库斯·索德尔§!\n\n\n\n\n\n\n\n   £GFX_GER_markus_soder_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L马库斯·索德尔1967年1月5日出生于巴伐利亚纽伦堡，在一个传统巴伐利亚家庭中成长。他曾在埃尔朗根-纽伦堡大学攻读法律并获得博士学位，后在从事新闻工作期间全面转入政坛。作为基督教社会联盟的坚定成员，索德尔以其强烈的区域认同感和娴熟的媒体运作能力迅速崭露头角。\n\n1994年当选巴伐利亚州议会议员后，索德尔稳步晋升，历任财政、环境等多部门部长职务。他以强势作风、民粹主义政治嗅觉及引导舆论的才能著称。2018年接替霍斯特·泽霍费尔出任巴伐利亚州州长，任内始终强调保守价值观、地域自豪感与务实治理。\n尽管面临党内纷争与全国性政治角逐，索德尔仍稳居德国政坛核心地位，屡次被推举为未来总理候选人。\n\n基民盟/基社盟在2021年大选失利后，这一呼声愈发高涨。他迅速成为基社盟最具分量的总理候选人，如今已实质性执掌德国政权。\n然而世界已今非昔比。自上次选举以来局势持续恶化，全球紧张态势空前高涨。非洲战火纷飞，亚洲剑拔弩张，俄罗斯这头猛兽正贪婪觊觎昔日版图。德国乃至整个欧洲面临前所未有的严峻挑战，索德尔此刻必须肩负引领欧罗巴走向复兴的重担。但这位巴伐利亚雄鹰，绝不会在时代风暴前振翅退缩。§!"
 GER_hog_weidel: "联邦总理：§H爱丽丝·魏德尔§!\n\n\n\n\n\n\n\n   £GFX_GER_alice_weidel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§L德国选择党所推行的极右翼民粹主义政治路线，屡屡遭到联邦议院中偏自由主义政党的排外指责。然而爱丽丝·魏德尔当选党主席本身，却构成对这种指控的微妙反讽。这位1970年代末出生于北莱茵-威斯特法伦州居特斯洛的女性，在投身政坛前过着平淡无奇的生活。她在拜罗伊特大学攻读经济学与工商管理，辗转于高盛、中国银行及康拉德·阿登纳基金会等机构。历经六年在华工作后，加入了德国选择党，这一抉择不仅改变了魏德尔的人生轨迹，更使德国驶向了截然不同的历史航道。\n\n最初仅是出于反对欧元区的兴趣，很快转化为党内地位的稳步攀升。尽管该党日益倾向传统价值观与反移民立场，魏德尔的同性恋身份及其与斯里兰卡裔电影制片人的伴侣关系却未阻碍她的政治前途——2017年她成功跻身首席候选人行列。在与联合主席高兰的配合下，她推动该党从议会外势力跃升为联邦议院第三大党。这种政治势头，叠加二十一世纪二十年代接踵而至的危机以及她相对温和的吸引力（体现在她与党内\"替代方案中间派\"的结盟），最终使她在2021年大选中问鼎总理府，此举堪称1933年以来德国政坛最剧烈的变局。许多人担忧她的当选不过是特洛伊木马，正将德国拖向那个本以为在1945年已被埋葬的深渊。另一些人则视她为德国政治停滞不前的基督教民主联盟/社会民主党格局中亟需的新风。\n\n无论各方对魏德尔执政理念持何种立场，如今掌舵德国的魏德尔总理必须驾驭欧洲政坛的险滩——这片由美国内爆留下的权力真空与东方中俄崛起重构的地缘格局。究竟\"德国优先\"的执政理念能否带领国家渡过风暴，她将如何引领这个民族在摆脱或延续外部影响的十字路口前行，历史正等待魏德尔的答案。§!"

 SOV_rollback_serdykovs_reforms: "[SOV_rollback_serdykovs_reforms_loc]"
 SOV_rollback_serdykovs_reforms_desc: "[SOV_rollback_serdykovs_reforms_loc_desc]"
 SOV_expand_ratnik_programme: "扩展未来战士项目"
 SOV_expand_ratnik_programme_desc: "\"未来战士\"计划是俄罗斯军队最雄心勃勃的现代化项目之一，涵盖单兵装备的广阔领域：从机枪、刀具到护甲、通讯系统乃至帐篷背包一应俱全。但当前各类装备的列装速度仍不足以全面提升军队整体效能。必须扩大计划覆盖范围——将热成像设备（从瞄准具到目镜）与外骨骼领域最前沿成果纳入其中，并尽可能广泛地配发至各作战单位。"
 SOV_improve_deep_battle_theory: "改进纵深作战理论"
 SOV_improve_deep_battle_theory_desc: "尽管纵深作战理论已有近百年历史，但它在现代战争中仍未失去意义：苏联在整个卫国战争时期及之后的军事学说都建立在这一理论基础之上。虽然该理论被认为\"过时\"，但彻底否定它将是短视之举。只需结合21世纪战争的特点稍加改进，这一理论仍能焕发新生。"
 SOV_improve_gerasimovs_doctrine: "改进格拉西莫夫学说"
 SOV_improve_gerasimovs_doctrine_desc: "当前格拉西莫夫学说提出的作战理念，主张运用最现代化的手段实施\"混合战争\"：包括网络攻击、隐蔽行动、在代理人冲突中提供间接支援。我们正面临与北约集团爆发全面战争的近期威胁，亟需将这一战略调整为更符合我国实际需求的形态。我军建设将从数量规模转型为重视质量优势。"
 SOV_reform_the_officer_corps: "改革军官团"
 SOV_reform_the_officer_corps_desc: "俄军军官往往脱离基层实际——他们获得军衔并非凭战功，而是靠资历，随之而来的任人唯亲、贪污腐败等军队积弊。因此必须重建士兵与指挥官的紧密联系，擢升精锐，淘汰庸碌。武装力量军官这一称谓应当代表无上荣耀！"
 SOV_centralize_military_structures: "集中化军事架构"
 SOV_centralize_military_structures_desc: "当前我国军事体系状况令人忧心：各部门权责不清、职能重叠，官僚主义与腐败现象丛生……我们亟需建立类似国家国防委员会的集中管控机制——该机构在卫国战争时期曾赋予苏联高度统一的指挥权，但新体系应更专注于军事领域建设。"
 SOV_unify_command_structures: "[SOV_unify_command_structures_loc]"
 SOV_unify_command_structures_desc: "[SOV_unify_command_structures_loc_desc]"
 SOV_unify_command_structures_rosgvardia: "军事政委"
 SOV_unify_command_structures_rosgvardia_desc: "俄军核心战斗力始终源于不屈不挠的战斗精神与对俄罗斯事业的坚定信念。战场上偶有士兵迷失方向、陷入恐慌的情况发生。为此我们决定重建军事委员制度，这些委员将肩负起思想教育、整肃军纪的重任，通过训导与惩戒相结合的方式重塑部队士气，引导官兵回归正途。该制度将在全军范围内强化军事纪律，铸就钢铁般的意志防线！"
 SOV_unify_command_structures_normal: "统一指挥架构"
 SOV_unify_command_structures_normal_desc: "俄罗斯与白俄罗斯军队拥有深厚的协同作战经验：无论是集安组织框架内，还是俄白联盟国家层面的联合军演，都为双方军事关系发展作出了不可磨灭的贡献。在当前联盟国家议题比任何时候都更迫切的时刻，整合两国武装力量指挥体系已成为必然选择。团结就是力量！"
 SOV_give_way_to_youth: "给年轻人让路"
 SOV_give_way_to_youth_desc: "人生终有一死，思想亦会凋零。唯有新血更替，方能使旧日理念在炮火与时光中涅槃重生。俄罗斯军事教育体系享誉数世纪：纳希莫夫海军学校与苏沃洛夫军校如星火相继，为祖国培育代代将才。而今提升战力正需青年才俊，是时候让这股新生力量擎起战旗了！"
 SOV_promote_reliable_cadres: "[SOV_promote_reliable_cadres_loc]"
 SOV_promote_reliable_cadres_desc: "[SOV_promote_reliable_cadres_loc_desc]"
 SOV_patriotic_zealousy: "[SOV_patriotic_zealousy_loc]"
 SOV_patriotic_zealousy_desc: "[SOV_patriotic_zealousy_loc_desc]"
 SOV_science_in_the_service_of_the_army: "科学服务军队"
 SOV_science_in_the_service_of_the_army_desc: "现代战争不仅是军队的较量，更是经济与科技的角力：技术优势往往能弥补数量劣势。拥有先进技术的一方，即便兵力处于下风，也完全可能赢得胜利。廉价却致命的第一视角无人机、反无人机系统、针对敌方基础设施的网络攻击……这些构成了21世纪战争的全新形态。在这场新一代军备竞赛中，我们绝不能落败。"
 SOV_modernization_of_aircraft_and_ships: "现代化海空军"
 SOV_modernization_of_aircraft_and_ships_desc: "俄罗斯海军目前虽未落后于人，却也算不上举足轻重。其战略核心聚焦于潜艇部队，更准确地说——是配备现代化武器的弹道导弹核潜艇。但水面舰队的状况却相当堪忧：被誉为舰队骄傲的旗舰\"库兹涅佐夫\"号航母自2018年起便处于维修状态，其最终命运至今未卜。现役舰艇绝大多数建造于苏联时期，均已服役超过三十年。重建全新舰队既耗资巨大又如同漫长赌局，因此最合理的方案是对现有装备进行现代化升级，使其具备与北约联合舰队分庭抗礼的实力。\n\n空天军的情况稍显乐观：尽管大量装备仍沿用苏联时期设计，但胜在规模庞大且性能依旧有效。然而欧洲正稳步推进航空力量建设，这意味着我们必须加速采购最新型苏-57战机并推进战略航空兵现代化进程以保持优势。"
 SOV_emphasizing_vocational_training: "着重职业培训"
 SOV_emphasizing_vocational_training_desc: "俄军传统上给人的印象向来并非专业素养，而是规模优势：以数量而非质量取胜。在许多历史战役中，正是我国广袤的疆域与庞大的人口基数帮助我们战胜了强敌。但时代已然改变，新时代的祖国需要的已不仅是普通士兵，更是最忠诚的卫士！延长义务兵军事理论学习时长、提升合同兵役制职业威望、推行系列改革措施——所有这些举措都将昭示我军正迈向崭新的发展轨道！"
 SOV_start_armata_production: "开启阿玛塔生产"
 SOV_start_armata_production_desc: "\"阿玛塔\"项目被公认为俄罗斯军队的骄傲绝非虚名。它汇聚了二十一世纪的全部创新成果：电子战系统、主动防护、无人炮塔及其他高科技装备。诚然，自2015年公开展示至今已历时多年，但正如民间智慧所言——迟做总比不做好。更何况，普京政府因该型坦克迟迟未能列装部队而持续遭受批评，如今正是了结这桩夙愿的时刻。"
 SOV_expand_t90_production: "扩大T-90生产"
 SOV_expand_t90_production_desc: "\"阿玛塔\"项目对我军来说无疑是一个突破性平台。无人炮塔、各式电子战系统、雷达、主动防护系统——简而言之，堪称真正的尖端科技。但核心问题在于：因其造价实在过于高昂，自2015年阅兵亮相以来，这款坦克便始终未能列装部队。\n这些担忧并非空穴来风，因此扩大已通过实战检验的T-90坦克产量，远比投产全新武器系统更具战略合理性。"
 SOV_new_russian_army: "[SOV_new_russian_army_loc]"
 SOV_new_russian_army_desc: "[SOV_new_russian_army_loc_desc]"
 SOV_rollback_serdykovs_reforms_cprf: "消除自由化改革"
 SOV_rollback_serdykovs_reforms_cprf_desc: "谢尔久科夫的改革对俄军战斗力造成了灾难性影响：所谓的\"优化\"导致数万名军事专业人员失业，参谋体系也遭到破坏。尽管这个口无遮拦的害群之马最终因贪腐落马，但其遗毒犹存，诸多荒谬的改革措施至今仍在施行。基于现代冲突经验，新苏联军队将几乎从零开始重建。\n是谁放任我军走向崩溃？当然是绍伊古这个蛀虫！他和前任根本是一丘之貉。是时候清算他和他的团伙了。\n不过，瓦格纳私人军事公司的问题仍未解决……\n该采取行动了。"
 SOV_rollback_serdykovs_reforms_medvedev: "消除谢尔久科夫改革"
 SOV_rollback_serdykovs_reforms_medvedev_desc: "从表面看，阿纳托利·谢尔久科夫提出的武装力量改革方案堪称完美：成本优化、编制调整、新式军服。但落入实际执行后却严重削弱了我军战力：大量军事专业人才遭裁撤。虽然这位防长最终\"引咎辞职\"，但继任者的施政依然未能扭转颓势。我们必须全面审视改革得失，立足现代战争经验，重新制定军事学说。"
 SOV_patriotic_zealousy_cprf: "党政工作"
 SOV_patriotic_zealousy_cprf_desc: "政治教育与思想工作体系曾是红军与苏军的核心特色。政治指导员们向普通士兵传播马克思列宁主义真理，培养战士们的爱国情怀，在战争岁月里更常以自身表率展现苏联军人的英勇无畏。但随着苏联解体，这一优良传统遭到废除，取而代之的是低效的政治工作形式。\n\n2018年建立类似政治部的机构虽属正确方向，但仍远远不够。新军队的指挥体系将重新设立政委编制。我们必须动用一切手段，将属于人民的财富从资本家手中夺回。"
 SOV_patriotic_zealousy_medvedev: "激发爱国热情"
 SOV_patriotic_zealousy_medvedev_desc: "政治思想教育工作是我国军队建设的重要基石。尽管苏联解体后我军（在大多数方面）已非政治化，但培养士兵爱国精神与英勇品质的使命从未改变。恰恰相反，西方威胁与日俱增，这使得强化士兵思想工作变得尤为迫切。2018年俄罗斯联邦武装力量总军事政治局的成立，标志着我们必须将弗拉基米尔·弗拉基米罗维奇开创的事业进行到底。"
 SOV_patriotic_zealousy_ldpr: "传播复仇狂热"
 SOV_patriotic_zealousy_ldpr_desc: "爱国主义是军旅生涯的永恒底色。但普通的爱国情怀与现行军政教育方式，远不足以实现日里诺夫斯基设定的宏伟目标。我们必须让战士们心中燃起这样的信念：为俄罗斯的荣光甘洒热血，对东欧滋生的西方自由主义毒瘤深恶痛绝。我们要将精神领域的胜利，转化为战场上的决胜之力！"
 SOV_promote_reliable_cadres_cprf: "精英中的精英"
 SOV_promote_reliable_cadres_cprf_desc: "当前我国（特别是在清除了效忠于罪犯绍伊古的将领之后）亟需经验丰富的军事人才。为此，我们决定重新征召那些满怀爱国热忱、战功卓著的老兵重返军营，让他们在战场上再展雄风。这些老兵中，许多人都曾参与1993年白宫保卫战和车臣战争，纵然后辈军官们仍需向他们虚心求教。"
 SOV_promote_reliable_cadres_medvedev: "晋升得力干部"
 SOV_promote_reliable_cadres_medvedev_desc: "在民众眼中，俄罗斯军队始终是，且至今仍是裙带关系、贪污腐败、公然侵吞等体制顽疾滋生的温床。究其根源，皆因我军管理层中那些靠祖国战斗力中饱私囊的不可靠分子。正因如此，我们必须对领导层实施必要调整，以全面提升武装力量的作战效能。"
 SOV_new_russian_army_cprf: "红军强权"
 SOV_new_russian_army_cprf_desc: "历史证明，世上从无不可战胜的军队。但若论最接近这份殊荣的，当属当年的红军，以及后来的苏联军队。从满洲的丘陵到阿富汗的群山，从德意志的森林到巴尔干的平原，苏联战士为世界各国人民砸碎了奴役的锁链。如今东欧上空阴云密布，但我们已准备好投入这场神圣的、正义的决战。此刻我们可以自豪地宣告：红军最强大！"
 SOV_new_russian_army_medvedev: "俄罗斯新军"
 SOV_new_russian_army_medvedev_desc: "现代俄罗斯军队的成长之路可谓筚路蓝缕：从90年代的迷茫动荡，从苏联红军遗留的残垣断壁，到如今跻身全球最强武装力量之列——若非最强，也堪称顶尖。如神话中的凤凰涅槃重生，我们的军队如今不仅能捍卫疆土，更具备发动全面战争的实力。当前的地缘政治格局昭示着：礼貌的人们永远不会失业。"
 SOV_status_quo_victory: "守成者之胜"
 SOV_convene_the_duma: "召集杜马"
 SOV_convene_the_duma_desc: "统一俄罗斯党在选举中大胜，现在该是巩固我们胜利的时候了。普京虽已辞世，但他所创建的政党犹存世间。由于党并没有明确的党纲和方针，这在政府内引起了不小的混乱。\n\n而梅德韦杰夫既已重新掌权，他就必须为俄罗斯民族设定未来6年任期的前进方向。他会延续普京的遗产吗？或者他会保留他在第一个任期内的持有思想？\n\n让我们拭目以待"
 SOV_pressure_belarus: "对白俄罗斯施压"
 SOV_transnistrian_question: "德涅斯特河沿岸问题"
 SOV_transnistrian_question_desc: "德涅斯特河沿岸地区。俄罗斯世界的头号爱国者。当联盟解体时，正是这些俄罗斯爱国者宣告了回归母国的意愿。在乌克兰与俄罗斯志愿营的联合行动（以及驻当地俄军发出的最后通牒）之后，该地区与摩尔多瓦维持了三十年的和平。\n\n然而随着阴云密布，我们必须着力将该地区融入我们的市场与军事体系。他们将成为俄罗斯世界的堡垒。"
 SOV_lukashenko_our_man: "我们的朋友，卢卡申科"
 SOV_lukashenko_our_man_desc: "亚历山大·卢卡申科一直以来都谨慎地领导着白俄罗斯。即使西方不断鼓动抗议也从未让他停下脚步。他和他的领导层已经证明，他们完全有能力为我们的事业提供帮助。"
 SOV_stir_up_russian_nationalism: "激起民族主义"
 SOV_stir_up_russian_nationalism_desc: "几十年来，民族主义在我们的国家一直跟光头党和纳粹挂钩。直至今日，其仍饱受争议。\n\n然而事实真的如此吗？那些保卫苏联免受纳粹侵略的勇士们，难道他们就是纳粹人渣了？难道为保卫自身信仰而战的白军们就彻彻底底错了吗？\n\n无关意识形态，民族主义都是我们国家的驱动力。是红旗亦或是三色旗都不重要。因为俄罗斯才是最终最重要的。"
 SOV_prepare_for_unification: "[belarus_unification]"
 SOV_prepare_for_unification_desc: "[belarus_unification_desc]"
 SOV_belarus_unification: "准备统一"
 SOV_belarus_unification_desc: "白俄罗斯是我们的姊妹共和国。伴随二十多年前《联盟国条约》的签署，许多人在那时就认为统一的时机早已成熟。然而即便放在过去，事实也并非如此。也许在未来，新俄罗斯的兄弟们也会加入我们，但现在该着手让我们这两个兄弟为此做好准备了。"
 SOV_further_integration: "推进俄白一体化"
 SOV_further_integration_desc: "普京总统在他不幸辞世前就已宣布联盟国成立，我们现任政府的任务就是进一步推进一体化进程。白俄罗斯将如他们的宿命般，成为俄罗斯经济的一个重要区域。"
 SOV_belarus_operation: "对白俄罗斯特别军事行动"
 SOV_belarus_operation_desc: "不帮助卢卡申科是我们现代历史上继未能出手拯救亚努科维奇政府后的第二大错误。现在我们不仅有一个，而是有两个姐妹国家被亲西方的精英领导，他们一心只想摧毁连接我们的一切。\n\n\"斗士\"民族主义者已经开始试图重新定义白俄罗斯，搞得好像他们被我们殖民了一样。不过，他们确实被殖民了。\n\n我们曾经将波兰-立陶宛赶出这片土地，阻止他们同化白俄罗斯兄弟的企图。现在历史将重演。"
 SOV_push_back_the_west: "反制西方"
 SOV_push_back_the_west_desc: "一直以来，梅德韦杰夫都被大多数人视为一个亲西方的理想主义者。然而，似乎所有理想主义者都有其局限性。梅德韦杰夫正如他的前任普京那样，将西方视作政治敌手。而二十一世纪俄欧合作共抗中美的第三霸权平衡之梦已然破碎。\n\n当西方一边正忙着处理国内的烂摊子时，他们又得为对抗我们抓紧进行再武装化。我们不能把时间浪费在杜马毫无意义的琐碎闹剧上。普京建立的体制对于总统让俄罗斯长久存续的愿景，让俄罗斯展望未来的期望而言都过于僵化了。\n\n在我们手下，欧洲人每日杞人忧天的恐俄梦魇即将成真。"
 SOV_putinism_with_human_face: "人道普京主义"
 SOV_putinism_with_human_face_desc: "梅德韦杰夫曾在他的第一个任期内推动俄罗斯加入世贸组织，还为俄欧合作指明方向，但从大多数俄罗斯民众的角度看，这些行为更像是普京在背后坐庄。不过，总统的当初愿景在多年后仍未磨灭。\n\n德米特里·梅德韦杰夫已经决定，俄罗斯体系必须适应当前世界面临的挑战。霸权国家正在自取灭亡，我们不能再以稳定为幌子无所作为了。\n\n俄罗斯必须改变，此时不待更待何时。"
 SOV_money_for_pensioners: "发放养老金"
 SOV_money_for_pensioners_desc: "虽然我们几年前提高了退休年龄，但这不意味着我们要对老年人弃之不顾。在当前的危机时期，我们得向选民展示我们的实力与稳定。此外，这可以提高我们的民意调查数据。可谓双赢。"
 SOV_tighten_media_noose: "收紧媒体套索"
 SOV_tighten_media_noose_desc: "伟大斗争之日将近，我们得保证国内媒体尽在掌控。像新报和自由电台这样的西方项目一直在国内胡作非为。现在到此为止。任何信息都将经过精挑细选审查，我们会消除所有针对政府的虚假新闻。"
 SOV_a_toast_to_our_friends: "为友谊而干杯"
 SOV_a_toast_to_our_friends_desc: "虽然大企业和寡头们问题多多，但至少目前他们还乖乖听话，为我们服务。为这些忠实的走狗们干一杯吧！"
 SOV_weaponise_gazprom: "俄气集团武器化"
 SOV_weaponise_gazprom_desc: "俄罗斯天然气工业股份公司可远不止是一家能源公司。我们在这个动荡的世界已然成为全球最大的能源出口国之一。几十年来，我们一直向欧洲贱卖供应天然气，但却鲜少换来尊重。\n\n该让欧洲人明白，是谁让他们能养尊处优了。"
 SOV_them_in_our_pockets: "尽纳囊中"
 SOV_them_in_our_pockets_desc: "寡头掌握着我们当下亟需的海外关系网。他们在媒体、金融、工业、人脉等领域坐拥大量海外资本。是时候让他们利用这些资源来改善俄罗斯的状况了。欧洲不乏喜爱俄罗斯之人，更不缺喜爱俄罗斯金钱之辈。"
 SOV_central_asian_military_operation: "宣布在中亚特别军事行动"
 SOV_central_asian_military_operation_desc: "中亚各国政府的处境非常微妙。几十年来，他们一直试图与我们保持距离，同时实现经济伙伴的多元化。在过去，我们可以对西方非政府组织、学校和企业的收购装聋作哑，但今天我们不能再这样做了。\n\n中亚将不得不在集体安全条约组织和北约之间做出选择。如果选择北约？那就走着瞧。"
 SOV_caucasus_military_operation: "宣布在高加索特别军事行动"
 SOV_caucasus_military_operation_desc: "高加索地区一直以来都是一片混乱之地。格鲁吉亚因为我们阻止他们入侵南奥塞梯而怀恨在心。阿塞拜疆和亚美尼亚之间冲突不断。然而，我们不能让这一侧翼处于不设防的状态。北约可能会试图拉拢格鲁吉亚或阿塞拜疆加入他们，而这将危及我们整个南部集团军的安全。\n\n我们将向他们发出合作与友谊的最后通牒。如果他们拒绝，那么，俄罗斯将在他们的国家中找到愿意承担领导责任的人来完成这项任务。"
 SOV_recognize_donbas: "承认顿巴斯诸共和国"
 SOV_recognize_donbas_desc: "没早点这么干真是太遗憾了。顿巴斯诸共和国为了我们流血牺牲，我们为何还要继续无视他们的主权？孕育了俄罗斯之春的他们值得被尊重。"
 SOV_address_the_nation: "发表全国讲话"
 SOV_address_the_nation_desc: "时机已到。我们将把顿巴斯的兄弟们从乌克兰政府手中拯救出来。欧洲几乎肯定会进行干预。但这无关紧要。他们的人数可能比我们多，但这也没关系。我们曾在人数远远少于拿破仑的情况下击败了他。我们也曾在兵力几乎只有希特勒一半的情况下阻止他进入莫斯科。\n\n就像过去一样，俄罗斯雄鹰将再次成为欧洲的领导者。"
 SOV_reorganize_russian_armed_forces_UR: "重组俄国武装力量"
 SOV_reorganize_russian_armed_forces_UR_desc: "谢尔久科夫在2010年的军队改革把我们军队变成了一支专业的反暴乱部队，同时关闭军事院校也使军队的规模达到彼得大帝以来的最低点。面对即将到来的挑战，我们必须回归到建设庞大军队的道路上来，而不是依靠小规模的专业部队。"
 SOV_expand_ratnik_UR: "扩展未来战士项目"
 SOV_expand_ratnik_UR_desc: "未来战士项目已大幅提升了俄军士兵的战斗力，但遗憾的是，它依然称不上真正意义上的全能士兵装备体系。进一步改进，才是通向卓越的最佳途径。"
 SOV_ensure_officer_loyalty_UR: "确保军官忠诚"
 SOV_ensure_officer_loyalty_UR_desc: "我军军官必须树立为国而战的意愿。我们也绝不能让激进分子混入我军队伍。"
 SOV_reform_officer_schooling_UR: "改革行政学校"
 SOV_reform_officer_schooling_UR_desc: "现在的时代已经和以前的战争与冲突完全不同了。我们的将领必须使用在顿巴斯发展出来的先进战术，并改造它们以适应前线部队。我们的将领必须锐意进取，在这场科技飞跃当中一马当先。"
 SOV_armored_infantry_UR: "发展装甲步兵"
 SOV_armored_infantry_UR_desc: "精兵强军建设将机动步兵营的重要性体现的淋漓尽致。我们理应将其融入我们的建军学说，而不是做那小脚女人。"
 SOV_artillery_surpremacy_UR: "优势火力至上"
 SOV_artillery_surpremacy_UR_desc: "虽然机动作战的那套理论体系更能够灵活应对叛乱分子的威胁，但21世纪的战争依然会被炮兵所主导，一切恐惧都来源于火力不足！"
 SOV_enforce_doctrine_standards_UR: "贯彻理论标准"
 SOV_enforce_doctrine_standards_UR_desc: "许多人认为苏联的军事学说在现代已经过时了。然而，如果我们要对抗一个实力相当的对手，西方那种依赖昂贵弹药和小规模部队的理论将不足以应对——进一步改进军事学说是至关重要的。"
 SOV_boost_aviation_funding_UR: "提高航空预算"
 SOV_boost_aviation_funding_UR_desc: "我们的空军亟需一笔大规模的投入。唯有实现现代化，方能应对未来的重重挑战。"
 SOV_modernize_fleet_UR: "海军舰队现代化"
 SOV_modernize_fleet_UR_desc: "为了保持我们在海上的战斗力，我们需要在现代改良和发展新的战舰设计。"
 SOV_build_up_western_air_bases_UR: "在西部地区建造空军基地"
 SOV_build_up_western_air_bases_UR_desc: "尽管舰队现代化大有裨益，但空军需要更多的关注。扩建空军基地，对于我们未来的战略行动至关重要。"
 SOV_reinforce_black_fleet_UR: "增援黑海舰队"
 SOV_build_up_air_and_sea_fleets: "强化海空舰队"
 SOV_build_up_air_and_sea_fleets_desc: "在将造船及航空制造公司整合为两大巨型企业后，我们终于能够将宏图付诸实施。我们将额外增加军舰与飞机的订单，以迅速扩充军备力量。自苏联解体以来，这些工厂大多陷入沉寂，而如今它们将彻夜不停地运转，为实现我们的伟大计划全力以赴。"
 SOV_build_up_western_military_district_UR: "强化西部军区"
 SOV_build_up_western_military_district_UR_desc: "西方一直是我们的军事重点。我们必须确保西部军区能够应对来自这一方向的所有挑战。"
 SOV_mass_produce_t14_UR: "量产T-14"
 SOV_mass_produce_t14_UR_desc: "T-14是我们的骄傲与荣耀，然而，由于成本问题和工业界不愿意将资金投入军备生产，这款坦克未能实现量产。我们将整顿这些不作为的工业巨头，确保\"阿玛塔\"成为俄罗斯军队的新象征！"
 SOV_mass_mechanization_UR: "全军机械化"
 SOV_mass_mechanization_UR_desc: "随着大规模军队的回归，机械化问题再度浮现。许多新编制部队缺乏足够的车辆，而苏联遗留下来的库存只能用于应急之时。我们必须扩大装甲车辆的生产规模，以满足军队的作战需求。"
 SOV_special_military_operation_ur: "特别军事行动"
 SOV_special_military_operation_ur_desc: "乌克兰，这个从19世纪以降俄罗斯统治者们一系列错误中所诞生的畸形国家，对俄罗斯世界的安全威胁一直令我们如鲠在喉。西方霸权国家自2014年颜色革命后便一直将乌克兰作为反俄罗斯的基地，意图将之变为令斯拉夫人流干鲜血的消耗战战场。在他们的阴谋即将完全成型的关键时刻，是时候通过一次迅猛、强大的武力展示彻底拔除这个眼中钉、肉中刺了。乌克兰将再也不会对俄罗斯世界产生威胁，直到它作为迷途知返的浪子重新回到斯拉夫大家庭中。"
 SOV_protect_civilian_lives: "保护平民生命"
 SOV_protect_civilian_lives_desc: "我们必须记得，在乌克兰的军事行动所对抗的目标是当地的法西斯团体，以及被西方帝国主义所操控的基辅傀儡政府。而乌克兰平民，尤其是乌东地区饱受低烈度军事冲突的人民，他们不是敌人，而是我们的军队所必须争取的对象，他们的支持对我们解放事业的胜利至关重要。在进军过程中，我们的部队必须做到尊重平民、保护他们的财产与人身安全。我们将让全世界看到俄罗斯军队绝非被抹黑的\"鞑靼人军队\"的形象，而是一支纪律严明的精英之师。"
 SOV_operation_armageddon: "§Y末日审判行动§!"
 SOV_operation_armageddon_desc: "谢尔盖·苏洛维金，西方人所称的\"屠夫将军\"，实际上是一位颇具才能的优秀将领。他的指挥风格大胆而残酷，懂得如何激发其麾下士兵的全部潜能，将纪律涣散的部队整合成为百战百胜之师，这点在和平时期和叙利亚的战场上都得到过证明。也许对在乌克兰的军事行动，我们可以采纳苏洛维金将军的意见，以坚定、无情的进军彻底粉碎基辅傀儡政府和乌克兰武装部队的抵抗意志。在此过程中也许会造成许多附带伤亡，乌克兰的基础设施也可能会被我们的炮火与飞机摧毁，尽管这令人痛心，但为了最后的胜利，牺牲有时候也是必要的。"
 SOV_civil_military_administrations: "军民政府"
 SOV_civil_military_administrations_desc: "自2014年以来，乌克兰国内局势一直动荡不安，这不光有民族冲突和长期低烈度战争的因素，同时还因基辅政权日益猖獗的腐败、行政系统的软弱无能、经济寡头的疯狂压榨所致。现在，随着俄罗斯武装力量的到来，情况将发生变化。我们将在新解放的领土上成立军事-民事合作政府，尽快重建当地遭到破坏的经济与社会秩序。这将是自基辅政权的统治之后，第一个真正属于乌克兰人民的政府形式，而我们将向他们保证，比战前繁荣与幸福得多的生活已经在向他们招手了。"
 SOV_return_novorossiya_to_home: "新俄罗斯重返故土"
 SOV_return_novorossiya_to_home_desc: "顿涅茨克、卢甘斯克、扎波罗热和赫尔松历史悠久，且与俄罗斯世界紧密相连。然而，正在进行的俄乌冲突，让它们处于无人管的孤立状态。我们认为这种情况应即刻解决，这些领土很快会回归它们在历史上应有的地位。通过全国公投，相信俄罗斯人民会支持这些地区重新融入俄罗斯联邦。虽然肯定有人会将公投斥为走了个形式，指责我们在造\"波将金村\"，但真相真理会扫清污言秽语。不惧反对，我们坚定不移。因为我们知道，俄罗斯人民会取得一项又一项成功。"
 SOV_our_historic_duty: "我们的历史使命"
 SOV_our_historic_duty_desc: "沙皇俄国的征服在乌克兰地区创造了俄罗斯人的政权与城市，然而这一切都曾在第二次世界大战中遭到德国纳粹和它的法西斯仆从军们的威胁。我们绝不能忘记，正是伟大的苏联军队与数以千万计的英雄大众挺身而出，捍卫了乌克兰免遭纳粹主义的荼毒，并在之后的几十年里确保了乌克兰的繁荣与稳定。时过境迁，今天伟大卫国战争英雄们的孙辈们又要在乌克兰对抗法西斯主义的走狗。也许共产主义不再能作为一种口号，但法西斯军队将永远是我们的士兵的手下败将，这点永远不会被改变。"
 SOV_form_pro_russian_brigades: "成立亲俄旅"
 SOV_form_pro_russian_brigades_desc: "在\"新俄罗斯\"之外的乌克兰领土上，威胁依然存在。谁也不能保证哪一天受蛊惑的乌克兰反俄武装会再次破坏该地区的安全，对我们的人民造成威胁。因此，我们可以选择支持因共同的文化和民族纽带而团结起来的当地亲俄武装团体。这些团体可以与乌克兰武装部队对抗，帮助保卫我们的国境线。"
 SOV_fund_anti_banderite_partians: "资助反班德拉派游击队"
 SOV_fund_anti_banderite_partians_desc: "在\"新俄罗斯\"之外的乌克兰领土上，威胁依然存在。谁也不能保证哪一天受蛊惑的乌克兰反俄武装会再次破坏该地区的安全，对我们的人民造成威胁。对于那些仍在崇拜纳粹分子斯捷潘·班德拉的乌克兰民族主义蠢货，我们可以继续以反法西斯主义为号召，建立对抗班德拉派的武装部队，保护我们的国境线。"
 SOV_war_is_peace_UR: "为了正义事业！"
 SOV_war_is_peace_UR_desc: "这场战争或许正是我们一直以来所期待的\"终极之战\"：我们将彻底终结西方国家自称的\"遏制战略\"，打破强加给俄罗斯民族的政治、经济和文化枷锁，令俄罗斯民族真正获得解放。我们将令我国国民在这场\"总体战\"中认识到这一点，通过新闻媒体、文化界的鼓手与网络宣传，\"正义的神圣战争\"的概念将深入每个俄罗斯人的骨髓。"
 SOV_trample_over_kiev_UR: "蹂躏基辅"
 SOV_trample_over_kiev_UR_desc: "在对乌克兰的特别军事行动令它们元气大伤，但并未完全消灭整个乌克兰国家。考虑到目前在其仅存的领土上仍在活跃的反俄武装，不得不说这或许是个错误。如今，错误将得到彻底的纠正，我们的铁拳将令乌克兰人彻底屈服，T-14坦克开上基辅的独立广场的画面将彻底终结乌克兰人的抗俄幻想，而欧盟也最好打消他们继续利用乌克兰作为反攻俄罗斯桥头堡的打算。"
 SOV_crack_down_on_protests_UR: "镇压抗议"
 SOV_crack_down_on_protests_UR_desc: "我们必须承认，几十年如一日的西方宣传已经令我国的年轻人们，尤其是来自莫斯科、圣彼得堡、叶卡捷琳娜堡等地的年轻人们头脑发热，难辨是非。被自由主义荼毒的所谓\"觉醒一代\"们遵从着西方喉舌的宣传喇叭们走上街头，进行着所谓的\"反战\"抗议。如果在和平时期，或许我们还可以对此睁一只闭一只眼，最多出动警察将他们驱散。但到了战争年代，这一切就不会那么温情脉脉的了。国家近卫军将彻底打碎他们的幻想，并把抗议运动的头目们关进大牢，让那些企图用舆论攻势破坏俄罗斯稳定的人意识到他们所做的一切只会是徒劳无功。"
 SOV_to_serve_russia_UR: "为俄罗斯服役"
 SOV_to_serve_russia_UR_desc: "广袤的俄罗斯大地带来的一个好处就是，从摩尔曼斯克到符拉迪沃斯托克，从堪察加半岛到高加索山脉，千千万万来自不同族裔的青壮年们为俄罗斯军队带来了几乎无穷无尽的兵员，这种人力优势当下与我们为敌的任何国家都无法匹敌的。尽管如此，为了更进一步挖掘我国的战争潜力，同时确保前线正在作战的士兵们的士气，俄罗斯政府将出台一揽子政策，包括但不限于为军人家属提供更高质量的物质保障、更多的勋章奖励和更高的伤亡抚恤金，以及提供给表现优秀的军人们参加培训担任高级官员的机会。通过展现参军的种种好处，相信将会有更多的人愿意为俄罗斯服役。"
 SOV_authorize_banned_weapons_UR: "批准违禁武器"
 SOV_authorize_banned_weapons_UR_desc: "眼下的战争其规模和烈度都远超第二次世界大战后的任何战争，即使是冷战时代最疯狂的战略家们也未必能想象得出此种情景。为了胜利，同时也是为了彰显我国军队建设的最新成果，将以大型火箭炮、无人机和无人战车为代表的最新式武器投入到战场上将会有突出的效果。在这其中有些武器因其附带杀伤性过强或性能不稳定存在风险而曾被禁止投入部署过，但现在一切限制都已经消失，我们可以放心大胆的使用这些武器了。"
 SOV_operation_rokossovsky_UR: "§Y苏沃洛夫行动§!"
 SOV_operation_rokossovsky_UR_desc: "亚历山大·苏沃洛夫是我国历史上最天才的军队统帅之一。他在巴尔干、波兰和意大利的远征足以令当时欧洲最强大的几支军队和最优秀的将军们形惭自愧。因此，以他的名字来命名俄罗斯联邦武装力量对西方的最新作战行动自然是再合适不过的了。爱沙尼亚、拉脱维亚和立陶宛脆弱的防线将在我军的攻势下被彻底瓦解，北约一直以来精心策划的以波罗的海国家牵制俄罗斯的企图将会彻底破产。"
 SOV_operation_aleksandr_UR: "§Y朱可夫行动§!"
 SOV_operation_aleksandr_UR_desc: "我们已经彻底杜绝了任何欧盟军事力量对我国边界的威胁。那么，是时候采取主动出击的策略，将我国边界朝北海和比利牛斯山推进了。这将是长久以来每一位为俄罗斯民族的生存与强盛所奋斗的先烈们长久以来的梦想：自19世纪\"欧洲宪兵\"的时代之后，俄罗斯军队再次成为整个欧洲的征服者与保护者。为了纪念此次对西方的终极军事斗争，我们将用曾指挥千万苏联红军踏平柏林、饮马易北河的格尔奥吉·朱可夫元帅的名字命名这场战役，愿他的荣耀始终引领我们的军队前进！"
 SOV_mobilize_the_chechens_UR: "动员车臣武装"
 SOV_mobilize_the_chechens_UR_desc: "得益于普京总统的努力，曾经俄罗斯联邦的大敌车臣人如今已经成为了莫斯科最忠实的合作伙伴之一。尽管针对小卡德罗夫仍有不少的批评声音，但只要他仍然向军队提供那些勇猛且嗜血的高加索精英战士，这种合作就仍可以继续下去。如今，随着欧陆战争战事的扩大，是时候让小卡德罗夫打出他全部的底牌了。车臣武装加入战场将彻底吓坏欧盟那群娇生惯养的士兵们。"
 SOV_deals_with_oligarchs: "与寡头的交易"
 SOV_deals_with_oligarchs_desc: "寡头们拥有支持我们经济的资金和影响力。与其将他们的企业国有化，我们不如利用他们的海外资产和人脉来发展我们的经济。"
 SOV_invest_in_CSTO_members: "投资集安组织成员"
 SOV_invest_in_CSTO_members_desc: "说得好听点，我们的盟友可谓是对战争毫无准备。说得难听点，集安组织的那些小成员国现在就坐等我们承担所有防卫责任，这可做不到。\n\n我们将重组他们的军队，建立联合架构，并对其进行投资。毕竟，在即将到来的冲突中，我们也对他们另有安排……"
 SOV_focus_russian_economy: "关注国有企业"
 SOV_focus_russian_economy_desc: "尽管存在种种问题，俄罗斯的国有企业确实颇具潜力。俄罗斯国家原子能公司就是一个完美的例子。这家公司使我们成为世界上最大的核出口国。而在所有行业都实现类似的效率对我们至关重要。"
 SOV_invest_in_donbas: "投资顿巴斯"
 SOV_invest_in_donbas_desc: "顿巴斯是一个非常富饶的地区。虽然战争之下它仍处于经济停滞状态，但这并不意味着我们无法使其复苏。对该地区的投资将提供足够的资金，不仅能让其自给自足，还可以融入我们的经济体系。"
 SOV_strengthen_serbia_ties: "巩固对塞尔维亚关系"
 SOV_strengthen_iran_ties: "巩固对伊朗关系"
 SOV_nationalize_oligarch_industries: "国有化寡头产业"
 SOV_nationalize_oligarch_industries_desc: "处理这些寡头方式本身就存在诸多难题，但将他们的产业国有化则要简单得多。毕竟，他们中的很多人权力都来源于政府。该让他们知道违背主子的意愿会有什么结果。"
 SOV_merge_tankograd: "合并坦克格勒"
 SOV_merge_tankograd_desc: "我们的坦克工厂目前分散在多个企业手中，而每个企业的负责人又对之所知甚少。事实上，我们的军工产业之所以能够保持如此良好的状态，就是因为这些蠢蛋管理者觉得生产武器销售国外是一件比拆工厂更简单的事。\n\n对于他们做出的贡献我们心怀感激，对于他们的工厂我们乐意免费接管，我们将创建一个统一的装甲生产集团。"
 SOV_invest_education_sector: "人本经济"
 SOV_invest_education_sector_desc: "虽然我们可以简单效仿苏联在工业发展方面的政策，但改善人民的生活何尝不是一种更好的选择？更多的资金流入经济，以及更多他们愿意购买的本地产品。公平的工资也将有助于我们的小企业崛起，我们的人民将有更多的钱花在他们身上。俄罗斯人应该过上富裕的生活！俄罗斯经济也应该如此！"
 SOV_invest_scientific_sector: "工业发展目标"
 SOV_invest_scientific_sector_desc: "我们需要的是一个能够与国外竞争的大型轻工业部门。必须拥有高效且数量众多的工厂。我们自然不能成为世界工厂，但始终可以填补类似于德国或日本的利基市场。是时候将积攒下来的钱都花掉了。"
 SOV_invest_nulcear_power: "军用工业优先"
 SOV_invest_nulcear_power_desc: "尽管我们很想专注于民用工业，但军队必须优先考虑。我们没有金钱和时间可以浪费。俄罗斯当前十年的主要目标是生存下去。至于消费主义还得先等等。"
 SOV_invest_resource_refining: "民用工业优先"
 SOV_invest_resource_refining_desc: "民用工业的扩张将长期造福俄罗斯。本土企业不仅可以将资金留在国内，而且还有可能帮助我们在未来将产品出口到国外。此外，本土产业将被迫寻找创造性方式以克服人力资源有限的问题。或许这甚至可以进而推动我们工业的自动化？"
 SOV_subsidize_super_computer_research: "国家项目：发展乌拉尔"
 SOV_subsidize_super_computer_research_desc: "乌拉尔地区一直是我们主要的工业中心。我们的军工与重工业都位于那里。而下一次工业扩张也将发生在那里。"
 SOV_subsidize_medical_research: "国家项目：发展远东"
 SOV_subsidize_medical_research_desc: "长期以来，政府一直将远东地区视为大规模开发的目标。早在苏联时期修建贝加尔-阿穆尔铁路时，该地区的新城市就涌入了大量居民。然而，苏联解体后，这里仍然支离破碎，在经济上与国家其他地区隔绝。\n\n为了使我们的多极化理念奏效，我们必须保证远东成为俄罗斯新的经济支柱。让符拉迪沃斯托克成为新的圣彼得堡！"
 SOV_invest_in_computing_technology: "主权化经济"
 SOV_invest_in_computing_technology_desc: "我们的经济基本由国企、外企及注册在离岸地区的\"俄罗斯\"企业所主导。然而，我们的总统认为必须重回昔日的工业强国地位。我们将遵循他的计划。除了繁荣的IT产业之外，我们还将为国家创造、复兴新的高科技产业。"
 SOV_attract_chinese_investors: "吸引中国投资者"
 SOV_attract_chinese_investors_desc: "虽然说出来很伤人，但外国投资者对于我们的经济复苏确实必不可少。虽然欧洲已经对我们关闭了大门，但中国似乎有很多人愿意投资发展我们的产业。他们的资金人脉将极大地促进国家发展。"
 SOV_return_to_gold_standard: "回归金本位制"
 SOV_return_to_gold_standard_desc: "我们早就该这么做了。我们储存了大量的黄金和卢布，而卢布正需要一个坚实的基础支撑，才能纵身一跃成为强势货币。这个全球市场仍处于恢复阶段的关头，何尝又不是最佳时机？一些国家可能会抱怨，但那是他们自己的问题。"
 SOV_market_regulations: "实行市场监管"
 SOV_market_regulations_desc: "尽管人们都在对\"自由市场\"夸夸其谈，但真正需要优先考虑的应当只有俄罗斯。随着欧洲冲突日益临近，我们必须保证经济主要依赖国产。"
 SOV_send_military_equipment: "整合白俄罗斯国企"
 SOV_send_military_equipment_desc: "虽然我们可以简单地将白俄罗斯的工业私有化，但真的必须这么做吗？我们不能放弃这个已运行三十载的体系。2020年的反对派候选人在竞选活动中提出了将白俄罗斯企业私有化，或彻底改革现有体系的方案。我们真的要采用这些\"蠢货\"反对派提出的框架吗？\n\n不要搬起石头砸自己脚，白俄罗斯将维持现状。"
 SOV_send_humanitarian_aid: "私有化白俄罗斯国企"
 SOV_send_humanitarian_aid_desc: "白俄罗斯的工业在当今市场上缺乏竞争力。虽然我们可以保持现状，但最好还是让市场来决定白俄罗斯应该优先发展哪些行业。\n\n让老爹尽情抱怨吧，经济发展总是更为重要的。"
 SOV_force_petrol_ruble: "推广石油卢布"
 SOV_force_petrol_ruble_desc: "美国和沙特阿拉伯都陷入了内战，而这对我们可真算是天赐良机，我们可以趁机从石油贸易中获取更大的利润。石油美元时代已经戛然而止，现在看来这里大有空间来巩固我们的地位。\n\n人们曾嘲笑我们是一个\"全球加油站\"，称我们是一个注定要衰落的国家。然而，当黑金在世界各地燃烧之际，这些批评者就该爬到我们面前，祈求我们施舍财富了。"
 SOV_support_two_party_system: "支持两党制"
 SOV_support_two_party_system_desc: "统一俄罗斯党虽一直在普京的努力下为其效力，但所有人都清楚，该党本质上只是总统的\"应声虫\"。这个党没有真正的目标，也没有具体的意识形态，党内还存在许多被公认为\"与群众脱节\"的说客。\n\n虽然美国衰落的原因是两党制的高度极化，但这种制度也有其优点。与欧洲政党经常陷入僵局导致国家停滞不前相比，或者与我们和日本的一党专政制度相比，美国制度在历史上大部分时间都是稳定的。我们将效仿这种制度，把所有左翼政党合并成一个党，由于掺杂了公正俄罗斯-为了真理和米罗诺夫的存在，它实际上将成为中左翼政党。与此同时，我们也将接管自由民主党的人员，并将自己改造成一个中右翼政党。\n\n两党将拥有相似的纲领和外交政策，保证它们能够在关键问题上相互合作。\n\n美国如今正陷入分裂的炼狱，但回顾往昔岁月，他们的候选人可以毫无问题地以任何一方（或者在一些喜剧性的情况下同时以两党）的身份参加竞选。这才是我们必须学习的精华。无论是社会主义者还是民族主义者，归根结底都是俄罗斯人。我们决不能忘记这一点。"
 SOV_loosen_media_restrictions: "放松媒体管制"
 SOV_loosen_media_restrictions_desc: "虽然我们与欧洲的未来冲突迫在眉睫，但我们确实理解，让人们在媒体上拥有话语权至关重要。通过放松对媒体上可以谈论和不能谈论内容的限制，我们将使其成为一个可行的讨论和批评场所。\n\n俄罗斯人应当拥有自由表达想法的权利，因为这才是自由的真谛。当然，就像在任何自由的国家一样，我们也将有自由选择我们要处理和忽略的问题。"
 SOV_enact_anti_corruption_laws: "制定反腐败法"
 SOV_enact_anti_corruption_laws_desc: "虽然我们期望体制尽善尽美，但不能否认其中存在许多不良分子。虽然我们可以简单地将其忽略，但总统认为现在不是该无所事事的时候。这些人每年盗窃数亿卢布的行径在过去可以熟视无睹，而换到现在则是不可接受。\n\n世界正斗转星移地变换着。我们不能依赖那些将国家视作简单的赚钱工具，又在欧洲和中东购置豪宅的两面三刀之人。战火燃烧不断，俄罗斯可没有闲钱用来浪费了。"
 SOV_secure_oligarch_loyalty: "确保寡头忠诚"
 SOV_secure_oligarch_loyalty_desc: "寡头群体在社会上依然颇具影响力。尽管由于他们大多已屈从于我们的意志，无视他们的利益并不困难，但显然，若想在欧陆战争中胜出，我们不能对他们置之不理。\n\n我们对他们的要求并不多。他们的游艇、别墅和财富皆可保留。只要他们能拿出实际成果，全心全意支持我们即可。\n\n俄罗斯精英们始终梦想着跻身\"全球\"亿万富翁之列，但我们为他们描绘的蓝图更为壮阔。一个将整个大陆经济纳入囊中的前景……当然，这一切都在我们的严密监视和掌控之中。如果他们拒绝，那简直就是愚不可及。"
 SOV_refine_the_constitution: "[SOV_refine_the_constitution]"
 SOV_refine_the_constitution_desc: "尽管现行宪法确实存在若干问题，但总统认为，通过简单的修正与调整即可应对当前挑战。我们的制度确实是基于这一宪法框架而建立，不过在面对此类问题时，我们总是灵活运用非正式渠道来推动议程。\n\n同样，美国和欧洲的民主制度也面临类似困境，但它们并未选择全面改写宪法。在追求变革的道路上，我们不能盲目追求不切实际的理想主义。只要未来的政府能够汲取国内外历史的教训，就无需从零开始，重复他人的错误。"
 SOV_refine_the_constitution_loc: "完善宪法"
 SOV_reinforce_putin_constitution: "强化普京宪法"
 SOV_celebrate_putins_legacy: "继承普京的遗产"
 SOV_celebrate_putins_legacy_desc: "西方千禧年对我们的抹黑至今仍历历在目。他们声称\"俄罗斯完蛋了\"。现在睁大眼睛看看吧！我们摧毁了寡头政治，我们驯服了高加索地区。我们收回了克里米亚，我们正准备与我们的盟友一起完成解放顿巴斯的任务。最后，我们犹如涅槃凤凰，再次成为反抗西方的先锋。\n\n而对于这一切，我们应该感谢谁？\n\n伟大的弗拉基米尔·弗拉基米罗维奇·普京。我们将永远珍惜他的遗产。"
 SOV_church_support: "教会的支持"
 SOV_church_support_desc: "自教会被允许进行公开活动以来，他们就经历了一场转变。神父不再是那些阿富汗退伍老兵，他们肩负着同西方基督教派别以及真正的邪教作斗争的职责。在普京的帮助下，教会虽无法恢复如初，却也发展良好。\n\n正教会是我们人民的根基，对它的支持将赋予梅德韦杰夫更多的合法性，同时削弱他在第一任期内给民众留下的形象。"
 SOV_amend_the_constitution: "修订宪法"
 SOV_amend_the_constitution_desc: "遗憾的是，现行宪法并未不符合总统心中理想俄罗斯的运作模式。\n\n该宪法中存在着诸多不确定性和漏洞，这些都可能成为别有用心者钻营的工具。在普京主政期间，凭借其强大的影响力和果断的决策，这样的宪法还尚能维持稳定。\n\n然而，假若由一位缺乏普京或梅德韦杰夫那般能力的人出任总统，又会是怎样一番景象呢？他们能否在错综复杂的利益纠葛中游刃有余，还是会被这些利益所裹挟，最终沦为西罗维基和大企业的傀儡？\n\n对此，我们的制度亟需理顺，一场全面而深刻的改革势在必行。"
 SOV_amend_the_constitution_loc: "修订宪法"
 SOV_a_new_republic: "新生的联邦"
 SOV_a_new_republic_desc: "在过去的40年里，俄罗斯发生了翻天覆地的变化，而如今她将再次走向变革。普京的技官统治稳定了我们的国家，但这不代表我们可以不思进取。新的改革将引领俄罗斯踏上沙皇时代的理想民主道路。\n\n与我们在90年代所拥有的\"民主\"不同，我们不会成为另一个国家的走狗。我们不会妖魔化曾成就我们的沙皇和苏联时代。我们的历史犹如神圣披风，我们建立的民主将成为它的新时代。\n\n俄罗斯，永远向前！"
 SOV_focus_resource_exploitation: "专注资源开发"
 SOV_focus_resource_exploitation_desc: "虽然中国是我们日思夜想的工业强国模范，但遗憾的是，我们目前既没有资源也没有人力来加以效仿。所以我们要多开采资源。一方面，我们不断发展的工业将服务于国内市场，另一方面，我们开采的资源将出口到世界各地。\n\n此外，在世界局势如此混乱的情况下，我们还是仅存的几个稳定的能源出口国之一。"
 SOV_industrial_expansion: "产业扩张"
 SOV_industrial_expansion_desc: "2014年后的经济激励措施虽使我国农业部门复苏，但工业部门却持续低迷。然而，随着美国陷入混乱，欧洲充满敌意，亚洲似乎正酝酿一场大战，我们只能依靠自己。\n\n我们需要建成一个能够满足大部分的本地需求的工业。一个为俄罗斯人民服务的国家工业。"
 SOV_regulate_trade_unions: "俄罗斯太空经济"
 SOV_regulate_trade_unions_desc: "美国内战本应终结商业太空领域，但实际上，它反而却促进了太空发展。中国和俄罗斯仍然是主要的火箭生产国，欧洲和亚洲似乎都在利用美国宇航局和商业太空人才来建立自己的太空计划。\n\n目前，不仅卫星生产蓬勃发展，而且小行星采矿也取得了前所未有的进展。\n\n我们必须乘势而上，因为我们的优势地位使我们成为新太空市场的主要受益者之一。"
 SOV_defense_industry_expansion: "支持经济协作主义"
 SOV_defense_industry_expansion_desc: "长期以来，俄罗斯的商贾很少关心工人。他们付给工人极低的工资，一再用移民取而代之，不提供承诺给他们的必要福利。\n\n但现在，随着人口和专家的减少，他们别无选择，只能迎合大众才能维系生存。工资更高的工人对国家更有利，相关政策也应该受到鼓励。"
 SOV_land_reforms: "推行累进税制改革"
 SOV_land_reforms_desc: "一个不幸的现实摆在我们面前，我们需要更多的资金。值得庆幸的是，我们可以从政客和商人的钱包里获得大量隐藏资金。通过实施累进税制改革，我们将保证资金源源不断地流入库房。"
 SOV_trade_unions: "激励工会"
 SOV_trade_unions_desc: "尽管我们常为苏联遗产而自豪，但工会却鲜少在各领域出现。商人可以不支付给工人足够的工资，进一步导致我们的社会状况下降。通过推广工会，我们也将能够制止公司及其所有者的越权行径。"
 SOV_centralize_power: "集中权力"
 SOV_centralize_power_desc: "统一俄罗斯是我们政府明确的权力中心，但其他政党仍在半独立地运作。为了我们的事业，必须团结一致。通过利用\"人民阵线\"平台，我们或许能够创建一个由所有主要俄罗斯政党组成的联盟，公开在统一俄罗斯的旗帜下行动。\n\n在杜马的每一次会议上，我们都能看到统一俄罗斯和其他政党之间争吵不休。一个联盟将使我们能够消除分歧，像一个有机体一样行动。"
 SOV_protect_russian_economy: "保护俄罗斯经济"
 SOV_protect_russian_economy_desc: "我们转向自由贸易和外国投资的决定是一个彻彻底底的错误。俄罗斯经济不仅被外国人收购企业所淹没，也被外国产品排挤本土产品吞没。虽然外国投资者可以留下，但我们将优先考虑并保护本土企业免受外国企业的竞争。我们的目标是自给自足并以出口为导向。"
 SOV_build_up_air_and_sea_fleets_UR: "强化海空舰队"
 SOV_healthy_conservatism_to_europe: "欧式健全保守主义"
 SOV_healthy_conservatism_to_europe_desc: "当下，各欧洲卫星国内的全球主义影响均已被铲除。但问题也随之而来：该用何物取而代之？\n\n我们决定从现在开始在各国内建立保守派的单一政党，贸然让太多的政党涌入也许会妨碍重建工作的推进，也有惹怒民众的可能。最好还是稳当些。"
 SOV_european_political_birdcage_experiment: "欧洲政治鸟笼实验"
 SOV_european_political_birdcage_experiment_desc: "当下，各欧洲卫星国内的全球主义影响均已被铲除。但问题也随之而来：该用何物取而代之？\n\n我们虽能强逼各国接受我们的价值观，但为何不做些新的尝试？召集一切所能召集的人，不论其意识形态如何，再给他们一个公平竞争的环境。只要他们对我们友好便可。\n\n让欧洲摆脱新自由主义暴政。形形色色、各不相同的政党将雄起于世，我们的欧洲伙伴也得以有权选择最适合自己的政党！"
 SOV_medvedev_doctrine: "梅德韦杰夫理论"
 SOV_medvedev_doctrine_desc: "我们既已斩获新的势力范围，一个避无可避的问题随之出现：对那些拒斥俄罗斯世界理念的政权，我们应当作何处置？这些年来，相关案例屡见不鲜，尤以普京执政期间为要。我们在\"软实力\"方面的工作有所欠缺，我们的所谓\"盟友\"因此在我们身上大薅羊毛，弃其义务于不顾。\n\n我们伟大的总统自然认为这毫无道理。俄罗斯将尽其所能，保证其对合作伙伴的投资有所回报。正如勃列日涅夫时代一般，任何妄图破坏集体安全条约组织团结及试图离开此联盟的行为都将我国（及当地）部队镇压。以爱方能取胜，对俄罗斯世界的永恒热爱自将由我们所保证。"
 SOV_novorussian_integration: "复兴新俄罗斯"
 SOV_novorussian_integration_desc: "我们为这片土地赴汤蹈火。它如今却是遍体鳞伤、鲜血淋漓。工业不复存在，大地一片丘墟。这颗曾引领俄罗斯帝国与苏联的工业化的明珠将再度复活。只有让全地区都繁荣昌盛，我们方可告慰在顿巴斯牺牲的爱国烈士们。"
 SOV_new_territories: "安定新领土"
 SOV_new_territories_desc: "在我们胜利后，我们不仅从全球主义势力下解放了前苏联的土地，而且还接管了大部分前华沙条约成员国的领土。目前，我们的控制往好了说都是摇摇欲坠的：许多人仍对我们抱有戒心。我们必须在各地巩固扎牢我们的基础盘。饱经风霜的老兵、投机政客、真心盟友——以上这些当地人，再加上一个永驻军事代表团，都将在让各地平民重回正常生活的过程中派上用场。"
 SOV_russian_victory: "大获全胜！"
 SOV_russian_victory_desc: "战火已然止息，我们正立于新时代的黎明之中。我们的目标已经实现：全球主义的威胁被赶回了西边，元气大伤。他们有望在可预见的未来内都不会对我们构成威胁。我们为这场胜利付出了巨大代价，我们所解放的土地当下也需要重建。是时候放慢脚步，等等我们的人民了。"
 SOV_new_age_ukraine: "乌克兰新时代"
 SOV_new_age_ukraine_desc: "历经无数流血杀戮，乌克兰终于束手就擒，归于我方控制。民族主义者在乡间被四处追捕，但对我国政府的仇恨情绪依旧存在。是该让我们这对斯拉夫姐妹花重归于好，放下全球主义者对我们关系的妨碍破坏了。\n\n\"我们再也不是兄弟了\"——班德拉分子如此哀嚎，但我们对之充耳不闻。我们的乌克兰同胞们将获得他们走向复兴所需的一切。"
 SOV_glorify_veterans: "颂扬老兵"
 SOV_glorify_veterans_desc: "百万人民参与了我们对抗北大西洋公约组织的战争。他们是我们的英雄，我们国家的荣耀与顶梁柱。我们不能在他们服役结束后就抛弃他们。不管他们残缺不全还是容光焕发，不管他们腰缠万贯还是家徒四壁，我们都将确保他们可以回归平民生活。让我们用堪配英雄归来的态度款待我们的士兵。"
 SOV_rebuilding_period: "重建时期"
 SOV_rebuilding_period_desc: "随着我们逐渐摆脱战时经济体制，是时候直面这个显而易见的问题了：我们手里有一块大陆的整一半儿需要重建。\n\n诚然，苏联曾经成功完成了这样的任务，因而我们也能够做到。首先，我们将重建受损最轻微的俄罗斯本土。"
 SOV_rebuild_new_allies: "重建欧洲盟友"
 SOV_rebuild_new_allies_desc: "我们的盟友们也同样受到了重创。为了实现未来的计划，我们必须确保他们能够尽快从这场毁灭中恢复过来。苏联曾在失去三分之一财富和2000万人口的情况下重建了东欧，我们肯定也能做到。"
 SOV_rebuilding_affected_regions: "重建重灾地区"
 SOV_rebuilding_affected_regions_desc: "这场战争的血腥战场必将成为过去的遗迹。乌克兰、波罗的海诸国、白俄罗斯：这些地区将恢复到昔日的辉煌。田野将掩过地雷和无人机残骸，俄罗斯世界将再次繁荣昌盛！"
 SOV_russian_products_to_west: "建立西方俄罗斯产业"
 SOV_russian_products_to_west_desc: "加速盟友恢复的一个好办法是将他们整合到我们的经济体系中。廉价的资源和能源将是他们重新起步的初始动力。此外，他们也可以成为我们产品的蓝海市场。毕竟，我们的工业并未在战争中被摧毁，因而不妨在欧洲建立姊妹企业以协助我们的朋友。"
 SOV_start_multipolar_world: "多极化世界的开端"
 SOV_start_multipolar_world_desc: "集体安全条约组织已巩固为了长久存在的联盟，从波兰到塔吉克斯坦的经济体也已团结起来，现在是我们重返世界舞台的时候了。\n\n俄罗斯世界虽然是正义的，但它并不是世界上唯一存在的集团。\n\n无论是亚洲、非洲还是美洲，在美国缺席的情况下，许多地区势力都有自己的需求与目标。\n\n我们今后的任务是在这个新的现实中行事。"
 SOV_future_russia: "俄罗斯的未来"
 SOV_future_russia_desc: "我们终于实现了我们的最高目标，而在重建期间，一个问题浮现出来：我们现在该做什么？我们在世界上的目标是什么，我们的体制在胜利之后将如何改变？\n\n我们的伟大总统德米特里·梅德韦杰夫也在思考这个问题。他对我们取得的成果表示满意，但显然他对公务感到疲惫。这也难怪：将构想变为现实、重塑俄罗斯、与北约开战，任何领导者若是完成了这些任务，都会感到精疲力竭。\n\n现在，他似乎又将决定我们未来的方向。"
 SOV_our_common_future: "鼓励欧洲产业自给自足"
 SOV_our_common_future_desc: "虽然我们希望扩大我们在欧洲的经济影响力，但不让他们发展本国工业绝对是愚蠢的。由我国企业提供的廉价能源和燃料将确保他们能够恢复本土工业。我们的盟友将不再是经济负担，而是我们值得信赖的伙伴！"
 SOV_russian_european_union: "引入卢布区"
 SOV_russian_european_union_desc: "欧洲重建的最后一个改革之一是建立涵盖我国的多边单一市场，正如旧时的欧盟一般，我们将创建新的卢布区。鉴于我们的资金对于这场伟大复兴至关重要，相信没有人会选择拒绝。而且，与旧时的欧盟不同，我们不会有兴趣干涉他们的文化！"
 SOV_european_economic_restructurization: "重建欧洲经济"
 SOV_european_economic_restructurization_desc: "在我们协助盟友完成其经济重建的同时，我们必须确保我们的影响力不会随着时间的推移而消退。我们将建立互补的经济，就像美国通过马歇尔计划所做的那样，欧洲将置于我们的掌控之中。"
 SOV_european_allies_modernisation: "欧洲军事标准化"
 SOV_european_allies_modernisation_desc: "目前，我们的新欧洲盟友拥有大批配备北约标准装备的部队。华约武器虽依旧在某种情况下仍处于现役状态，但当下的局势让我们不得不大力推进改革。一切西方制造的装备用具必须退役，并以俄罗斯和当地生产的相应装备取而代之。\n\n集安组织当下还无法成为新北约，但也快了。"
 SOV_towards_multipolarity: "迈向多极化"
 SOV_towards_multipolarity_desc: "美国正处于内战状态，现在是时候开启多极化时代了。俄罗斯显然没有成为霸主的实力。说真的，苏联一再叫嚷着争夺这个虚妄头衔又何尝不愚蠢呢？我们只需要成为多极化中的一个就够了。\n\n何必做世界警察，不如培养家丁以代之。"
 SOV_american_policy: "战火中的美国"
 SOV_american_policy_desc: "随着美国陷入混乱，是时候尝试重塑我们之间的关系了。西欧正在向美利坚联邦提供\"志愿者\"和军事援助。难道我们就不能吗？一旦俄罗斯接管美国，有很多派系可以从中受益。无论是地区分裂主义者还是孤立主义者，他们都将得到我们的支持。"
 SOV_brics: "金砖国家联盟+"
 SOV_brics_desc: "金砖国家峰会成为一个良好时机，供我们将愿景公之于众。随着美国留下的真空，我们现在可以自由地承担起它的责任。金砖国家联盟将成为一个真正的经济俱乐部。不是像欧元区或东盟那样的区域组织，而是一个中立的、促进共同发展的平台。\n\n当然，考虑到印度和中国对发展这个平台并不感兴趣，我们还得努力加以巩固。"
 SOV_dragon_sun: "巨龙与旭日"
 SOV_dragon_sun_desc: "显而易见，中日冲突将成为未来十年的热门话题。无论是围绕台湾的摩擦，还是类似冷战时期的代理人战争和政变，这两个亚洲强国都在建立联盟为可能的冲突做准备。而在这样的冲突中，我们的立场对双方都至关重要。\n\n说实话，我们并不热衷于只选择其中一个经济集团。中国是一个工业和科技强国，而日本则是一个失败的经济霸主，但由于美国不复存在，它仍然可以发挥自己的力量，甚至恢复部分影响力。\n\n无论如何，我们对亚洲的政策将在两者间斡旋。坦率地说，如果我们还能同双方进行贸易，那将是一个理想的局面。"
 SOV_brics_expand: "金砖国家联盟+扩张"
 SOV_brics_expand_desc: "为了使我们的金砖国家计划奏效，我们必须进一步扩大它。应该优先考虑与我们友好的国家，以便从这次扩张中获得最大收益。很快，金砖国家联盟+将成为一个真正的全球共同发展平台！"
 SOV_dawn_of_africa: "非洲黎明"
 SOV_dawn_of_africa_desc: "未来属于非洲大陆。虽然战争、气候变化和缓慢的城市化进程阻碍了它如上个世纪东亚那样快速发展，但非洲拥有实现这一飞跃所需的人口和资源。几乎可以肯定，他们在本世纪后半叶将占据世界舞台的中心。\n\n不断增长的非洲市场为我们提供了机会。我们不仅可以在该地区获得盟友，还可以获得我们行业以前很少见的消费群体。\n\n当然，这是一项面向未来的投资，即便他们未来实现弯道超车，我们从其发展中也将获得巨大的收益。"
 SOV_medvedev_russian_elections: "新的选举！"
 SOV_medvedev_russian_elections_desc: ""
 SOV_people_russia_chosen: "为了人民！"
 SOV_pink_sunset: "粉红余晖"
 SOV_med_red_dawn: "赤色黎明"
 SOV_for_new_socialism: "新社会主义"
 SOV_democratization_capital: "首都民主化"
 SOV_social_populism: "社会民粹主义"
 SOV_united_russia_chosen: "团结一心！"
 SOV_medvedev_path: "梅德韦杰夫的设想"
 SOV_people_program: "人民计划"
 SOV_future_your_hands: "未来在你手中！"
 SOV_united_russia_victory: "统一俄罗斯胜利"
 SOV_united_russia_victory_desc: "不出意外总统的政党再次取得胜利。\n\n尽管他已不再直接领导我们的党了，但我们仍须坚守他所设定的路线。以温和的手段重申我们的信念，以健康的传统主义来维系国家。我们是多极世界秩序的先锋。因此让我们向全世界展示，我们将绝不会偏离他的愿景！"
 SOV_enshrine_medvedev_constitution: "奉行梅德韦杰夫宪法"
 SOV_enshrine_medvedev_constitution_desc: "梅德韦杰夫宪法早已是一份家喻户晓的文件了。它彻底改革了俄罗斯政府，向世界清晰地展示：尽管我们有诸多问题，我们依然是最受尊敬的民主国家之一。\n\n我们该像美国人庆祝他们的宪法一样庆祝这部宪法。让它成为引领俄罗斯未来领导人永不熄灭的灯塔！"
 SOV_uphold_two_party_system: "维系两党制"
 SOV_uphold_two_party_system_desc: "向两党制的过渡尽管最初充满争议，但最终证明为一项极为成功的改革。我们在政府内部确立了两个与人民意志高度契合的政治派别。与美国体系不同的是，我们的两党拥有足够的共同意识形态基础，所以不会陷入无休止的左右之争。让我们信守承诺，确保这一制度得以长存！"
 SOV_government_reforms: "政府改革"
 SOV_government_reforms_desc: "尽管我们已经革命性地革新了我们的政治体制，但显然我们还需要实施更多改革。修补系统中的漏洞，废除那些源自九十年代和二十世纪初、如今已毫无意义甚至妨碍政府运作的法律。是时候彻底整顿这一切了！"
 SOV_strength_in_discussion: "讨论的力量"
 SOV_strength_in_discussion_desc: "尽管我们借鉴了美国的两党制，但我们绝不会步其后尘。我们的人民有不同的观点与想法，因此我们必须确保我国的政治不陷入毫无意义的意识形态争斗，而是聚焦于真正的法律与政策。我们将保护俄罗斯的公众不被最极端的思想所渗透。无论是左翼还是右翼的经济体系对我们而言皆有其价值，并我们有权在适当的时候加以利用。"
 SOV_inter_party_cooperation: "党际合作"
 SOV_inter_party_cooperation_desc: "正如先前所言，两党必须齐心协力确保实现国家整体的进步。我们不能让杜马陷入针锋相对的局面。相反我们应当鼓励政客们能够在各个问题上达成共识，携手合作，而不是让观点过于两极化。"
 SOV_a_healthy_patriotism: "积极爱国主义"
 SOV_a_healthy_patriotism_desc: "过去，我们总依赖于那些\"政治专家们\"来塑造社会中的\"爱国\"情绪。然而，可想而知这几乎总是适得其反，最终毫无效果。有趣的是尽管俄国人民很可能并不喜欢我们的官僚体系，但正是他们自发的爱国行为和信息传播才真正支撑着这个国家的运转。\n\n让我们支持并资助那些由俄国人民自发发起的爱国倡议，因为事实证明，它们才是真正有效的！"
 SOV_culture_of_anti_corruption: "反腐氛围"
 SOV_culture_of_anti_corruption_desc: "长期以来，官僚和政客们一直被视为……寡廉鲜耻之人。几乎每个月都会爆出重大腐败案件，而被抓的仅是冰山的一角并且这种情况早已持续多年。然而在梅德韦杰夫的执政时期以及欧俄战争的冲击下，我们终于认识到，我们再也无法容忍这一问题。我们的财政本就捉襟见肘，又怎能再容忍腐败的官员逍遥法外？现在，是时候彻底清除我们国家中这一毒瘤了！"
 SOV_russian_conservative_values: "俄罗斯保守价值观"
 SOV_russian_conservative_values_desc: "本质上我们是一个保守国家，这一点无论左翼还是右翼都认同。那么为什么我们要改变呢？虽然我们曾尝试进行某些文化自由化的措施，但西方社会及我国部分地区的社会价值观的堕落绝不能持续下去。"
 SOV_united_in_common_history: "因共同历史而团结"
 SOV_united_in_common_history_desc: "沙皇时代、苏维埃时代、以及现代俄罗斯——这三个历史时期都是我国历史中的一部分。西方人对我们不贬低任何一个时代而感到震惊，但我们深知遗忘历史只会带来毁灭性的后果。正如过往有着错误——无论轻重——那时同样也有许多胜利和经验值得我们铭记和学习。这三面旗帜将共同飘扬。"
 SOV_sovereign_democracy_perfecting: "完善主权民主"
 SOV_sovereign_democracy_perfecting_desc: "我们的选举制度虽勉强可以接受，但仍非理想状态。我们选举的透明度，公共保障——这些都是我们仍需解决的问题。用高电子投票技术来提高透明度是一个良好的开端。这也将给予所有候选人更多竞选时间并带来积极影响。"
 SOV_country_of_the_sun: "升阳之国"
 SOV_country_of_the_sun_desc: "金色的阳光\n黑夜又一次\n笼罩在我们之间\n高墙突然出现在眼前\n夜晚将会过去，晴朗的早晨即将来临\n我相信，幸福在等待我们\n夜晚将会过去，阴雨的时节也将过去\n太阳会升起\n太阳会升起\n"
 SOV_hardliners_victorious: "反动派之胜"
 SOV_hardliners_victorious_desc: "德米特里·梅德韦杰夫在首次担任总统后，长期担任统一俄罗斯党领导人。在其第二任总统任期内，他对执政党进行了改革，使其转变为更具自觉性的政治力量——成为俄罗斯政坛两大主要势力中的右翼。俄罗斯民众以欣慰和喜悦的心情欢迎统一俄罗斯党一党独大局面的终结及其部分民主化转型。\n然而尽管推行了诸多改革，普京时代的旧官僚和权势人物仍盘踞在统一俄罗斯党内。他们不惜一切代价想要让俄罗斯政治退回到本世纪初的状态，企图维护普京的政治遗产。\n但这些守旧势力真能逆转政治绞肉机，恢复往日的权势吗？抑或是改革派将会把威权主义的最后残余彻底扫进历史的垃圾堆？唯有时间能给出答案。"
 SOV_adjust_constitution_articles: "调整宪法条款"
 SOV_adjust_constitution_articles_desc: "尽管现行宪法奠基于普京，但梅德韦杰夫的修正案也融入其中，最终形成了当前的政治体系。这种制度本身并无不妥，但某些领域存在的模糊性可能引发难以预料的后果。现行宪法条款有必要按照普京路线进行适度修正，强大的执政力量意味着强大的俄罗斯！"
 SOV_subdue_two_party_system: "压服两党制"
 SOV_subdue_two_party_system_desc: "梅德韦杰夫改革最显著的成果，就是借鉴英美模式建立的新两党制。虽然这能有效制衡专制倾向，却给整个体系带来了不稳定因素。看看美国吧！两党制把它带向了何方？走向崩溃，走向内战！\n况且，俄罗斯人民尚未适应这种制度，我们的敌人很可能利用这个弱点！我们必须废除两党制……\n当然，最终要让统一俄罗斯党重掌大局。"
 SOV_technocratic_administration: "技官政府"
 SOV_technocratic_administration_desc: "普京的体制由所谓的\"克里姆林宫之塔\"所支撑——即官僚机构内部的各类派系集团，每派都对俄罗斯的治理方式各有主张。其中包括安全部门代表与所谓的\"技术官僚派\"——与国有企业相关联的更务实的管理者。\n尽管其中不少人已成为改革支持者，但我们仍可通过高位要职将其招揽。这些人的能力不容忽视。"
 SOV_strengthen_executive_power: "扩大行政权力"
 SOV_strengthen_executive_power_desc: "梅德韦杰夫的改革削弱了普京时代的核心力量——行政权。政治主动权已从总统办公厅转移至国家杜马和各政党手中，这种权力转移可能引发体系不稳。\n遵照弗拉基米尔·弗拉基米罗维奇的指示，我们将重新巩固中央权力，使各政党退居次要地位。只有拥有强大的安全保障体系，我们的人民才能实现和平发展！"
 SOV_improve_bureaucratic_management: "改善官僚管理"
 SOV_improve_bureaucratic_management_desc: "当前俄罗斯政府正深受机构臃肿、效率低下的官僚体系之苦。各级政府机关中存在的荒谬现象已让民众不堪重负。\n即日起，我国将建立覆盖各级公职人员的绩效评估体系——从基层教师到地区行政首长无一例外。地方自治机构将全部纳入中央统一监管。"
 SOV_promote_russian_nationalism: "鼓动俄罗斯民族主义"
 SOV_promote_russian_nationalism_desc: "多年来，\"民族主义\"在我国一直受到批判，取而代之的是\"民族友谊\"的官方理念。正是由于这项政策，大批非法移民涌入我国，加上自由主义者的推波助澜，导致局势出现某种不稳定。我们必须倡导健康的俄罗斯民族主义：并非仇视异族，而是对祖国的热爱。俄罗斯及其文化将我们所有人团结在一起，让我们共同珍视并巩固这种纽带！"
 SOV_safeguard_putin_vision: "保卫普京理想"
 SOV_safeguard_putin_vision_desc: "近来，弗拉基米尔·弗拉基米罗维奇·普京已逐渐淡出俄罗斯政治舞台的中心。各类\"体制内自由派\"及其他势力，正公然呼吁抛弃普京的政治遗产，处心积虑地对其执政时期进行批判，这正中西方敌人的下怀。\n普京时代是塑造现代俄罗斯不可或缺的篇章。抛弃它就意味着丧失国家的灵魂。\n正因如此，\"新普京主义\"应运而生——它深刻体现了弗拉基米尔·弗拉基米罗维奇对当代俄罗斯国情的战略远见。我们今日拥有的一切都源于他的引领，他的精神永远与我们同在！"
 SOV_protect_russian_legacy: "捍卫俄罗斯遗产"
 SOV_protect_russian_legacy_desc: "看吧，在西方世界，一条九头蛇正在崛起。这是全球主义、仇俄情绪和新自由主义交织的怪物——正是我们全力对抗的一切。此刻绝非放松警惕、玩弄民主把戏之时：我们必须团结在共同的祖国俄罗斯及其传承与历史周围。\n从留里克到普京，一条纽带将我们紧密相连：从堪察加到加里宁格勒，从摩尔曼斯克到杰尔宾特。我们必须不惜一切代价守护这条纽带！"
 SOV_raise_public_conservatism: "营造社会保守氛围"
 SOV_raise_public_conservatism_desc: "梅德韦杰夫执政时期虽高举\"保守主义\"旗帜，实则为西方模式的保守主义，这种意识形态经年累月已与自由主义理念几近融合。鉴于西方社会同样存在\"保守派\"思潮，可以预见其将以不同方式影响我国。\n正因如此，我们必须推行根植于本土的俄罗斯保守主义，杜绝与西方理念的暧昧纠葛。普京执政模式堪称理想典范——他是一位真正坚守本土道路、绝不盲从他国模式的保守主义者！"
 SOV_new_kremlin_democracy: "新克宫民主"
 SOV_new_kremlin_democracy_desc: "所有的新事物，都不过是昔日被遗忘的旧事物。\n\n两党制最终辜负了俄罗斯人民的期望，其公信力已丧失殆尽。两个政党根本无法代表人民群众的多元思想光谱。正因如此，现在的国家杜马仿佛回到了旧体制：一个占据主导地位的执政党，以及众多无法形成多数的其他党派。这便是事物发展的自然规律。"
 SOV_russia_destiny: "俄罗斯天命"
 SOV_russia_destiny_desc: "经受过重重磨难\n也经历过欢笑共泪水\n美丽的旗帜将骄傲地\n飘扬在祖国上空\n\n为了你傲立世界之林，为了你，祖国母亲！\n我们将坚持不懈，为了你，祖国母亲！\n我们终将载歌载舞，为了你，祖国母亲！\n为你高呼三声\"乌拉！\"\n为了你，祖国母亲！"
 SOV_people_russia_victory: "人民俄罗斯得胜"
 SOV_people_russia_victory_desc: "所有努力终得回报：建设主权民主的奋斗终于开花结果！俄罗斯人民选择了\"人民俄罗斯\"党——这个承诺为他们创造更美好、无忧未来的政党。是时候证明我们国家的人民值得拥有更好的生活。如今，整个国家正以繁荣与稳定之名，开启大规模改革征程。"
 SOV_constitutional_reforms: "宪法改革"
 SOV_constitutional_reforms_desc: "梅德韦杰夫执政时期的标志性成果，在于推动国家制度的大规模结构性改革，其间推行了大量革新与转型举措。完全否定这些旨在建立高效治理机构的努力有失公允，毕竟相关制度已普遍展现出实效性。与此同时，旨在保障公民权利与自由的宪法微调也具有积极意义，这本身就是人民俄罗斯党对选民作出的关键承诺之一。"
 SOV_harmonize_the_society: "和谐社会"
 SOV_harmonize_the_society_desc: "在苏联时期，集体主义思想曾被视为未来发展方向。然而，历史证明这种构想存在谬误，如今若要回归此类理念至少是违背逻辑的。但不可否认的是，俄罗斯民族始终凭借团结精神克服重重困难。正因如此，当下我们更需凝聚力量构建和谐社会，消除内部冲突与矛盾。"
 SOV_slash_business_influence: "打击商界影响"
 SOV_slash_business_influence_desc: "过去的俄罗斯政治常被大型企业所主导，政府行政与立法工作深受其影响，这些企业致力于维护自身利益。如今，这种做法已不可接受——我们直接与人民合作、为人民服务，而人民的利益往往存在冲突。我们的任务是建立真诚对话，实现全民公正。"
 SOV_work_with_ur: "与统俄党共事"
 SOV_work_with_ur_desc: "建立主权民主的成果之一便是形成了两党制。反对我们的统一俄罗斯党虽倡导不同的理念和价值观，但并不试图破坏政府工作。因此，我们可与其协商以争取更广泛的公众支持，从而在决策时兼顾社会各阶层的利益。"
 SOV_homogeneous_government: "均势政府"
 SOV_homogeneous_government_desc: "与旧时美国两党制不同，俄罗斯的各政党并非对立两极。恰恰相反，它们展现了社会不同阶层如何为实现共同目标而凝聚力量，由此构建起共识型政府。"
 SOV_encourge_social_patriotism: "激励社会爱国主义"
 SOV_encourge_social_patriotism_desc: "常有人认为左翼思想倾向于疏离爱国主义与公民民族主义，转而推崇国际团结。但这种认知存在根本谬误——一个关怀公民福祉的政体，完全可以依托对祖国的热爱之情，这其中并无任何值得非议之处。真正的爱国主义非但不与正义进步的理想相悖，反而能成为这些理想的坚实基石。"
 SOV_fair_commonwealth: "平等联邦"
 SOV_fair_commonwealth_desc: "过去常有人认为，俄罗斯虽为联邦制国家，但俄罗斯族对其他民族仍保持着支配地位。这种说法是否属实尚有争议，但有一点毋庸置疑：如今这类论断已失去现实根基。俄罗斯过去是、现在是、将来也永远是各民族平等共生的共同体，我们为了共同繁荣而凝聚，正是这种团结赋予我们力量与对未来的坚定信念。"
 SOV_re_invent_soviet_dream: "重铸苏维埃之梦"
 SOV_re_invent_soviet_dream_desc: "在苏联时期，政治家们曾提出全体公民为之奋斗的核心目标：实现各民族普遍友谊与工人阶级的领导地位。尽管其中诸多理念已不合时宜，但那个时代提出的部分主张仍值得借鉴，以便为普通民众树立新的奋斗理想。毕竟，正是共同目标凝聚着社会力量，赋予日常劳动以深刻意义。"
 SOV_glorify_the_common_man: "美化人民大众"
 SOV_glorify_the_common_man_desc: "无论时代如何变迁，俄罗斯的面貌始终由普通人塑造——农民、工人、士兵，这样的例子不胜枚举。我们亟需认知并接纳这一事实，带着这份觉悟前行。但仅有觉悟远远不够：人民需要看到我们珍视他们的劳动，感激他们为建设美丽祖国作出的贡献。只有尊重我们的过去与现在，才能构筑配得上这些人民的未来。"
 SOV_left_populist_democracy: "创新社会主义民主"
 SOV_left_populist_democracy_desc: "根据定义，民主即人民的统治，这一原则无可争议。我们的任务是通过宣传鼓动、朗朗上口的口号与有效的传媒策略，将民意引导至正确方向。这种做法既未违背自由选择原则，又能通过向民众阐释执政目标来赢得广泛支持。毕竟人们总是更倾向于支持那些他们能够理解并产生共鸣的理念。"
 SOV_country_of_justice: "正义国度"
 SOV_country_of_justice_desc: "美人乘三驾马车驰骋\n工人向建筑工地前行\n有轨电车穿梭在林荫道\n阿拉伯人列队走向麦加朝圣\n外交使者与维修工从容走过，步履轻快而质朴\n\n我们坐着吞吐烟圈，静坐吞吐烟圈\n我们坐着吞吐烟圈，新的一天正悄然开启"
 SOV_radicals_narodniki_in_charge: "激进民粹派"
 SOV_radicals_narodniki_in_charge_desc: "梅德韦杰夫的两党制改革方案必然波及到俄罗斯左翼运动这样强大的政治力量。多个政党已联合组建\"人民俄罗斯\"党，成为统一俄罗斯党之后的第二大政治力量。\n尽管其中多数是中左翼政党，但\"人民俄罗斯\"内部也不乏更为激进的成员：从老共产党员到前民族布尔什维克党人。他们有一个共同点：再造苏联，重建各民族联盟，改善劳动者生活状况。\n\n俄罗斯步入新时代，似曾相识的新时代。"
 SOV_constitutional_revolution: "宪法革命"
 SOV_constitutional_revolution_desc: "现行俄罗斯宪法相当民主，但称不上真正的人民宪法。它仍保留着叶利钦时期的宪法框架，必须进行根本性重构。新俄罗斯宪法不仅借鉴梅德韦杰夫版，更会汲取苏联宪法精髓——那部堪称人类历史上最卓越的宪法范本！"
 SOV_proclaim_uss: "成立主权共和国联盟"
 SOV_proclaim_uss_desc: "主权国家联盟曾是挽救日益瓦解的苏联的尝试。尽管全联盟公投体现了人民的意愿，各共和国仍签署了《别洛韦日协议》，这既终结了戈尔巴乔夫的新联盟条约构想，也葬送了苏联本身。现在正是纠正这一历史误解的时刻，我们要以更精简的形式实现后苏联空间各民族团结的梦想。"
 SOV_the_new_state_committee: "新国家委员会"
 SOV_the_new_state_committee_desc: "普京体系曾以其庞大的权力机关著称，这些机构权责交叉重叠。这种架构确实巩固了最高权力的稳定性：当各安全部门忙于内斗时，自然无暇形成反对最高层的势力。\n但那样的时代已经过去，如今联邦安全局、国民近卫军、对外情报局等部门间的内耗只会削弱整个安全体系的稳定性与效能。这些机构将统一并入公民们耳熟能详的国家安全委员会（克格勃）。对外情报、反间谍、边防警卫、国家领导人安保以及反恐等职能，都将由这个重组后的委员会统筹负责。\n\n对祖国的忠诚高于一切。"
 SOV_bureaucratic_integration: "官僚机构统一"
 SOV_bureaucratic_integration_desc: "纸面上的团结宣言远远不够，必须将其付诸实践。哈萨克斯坦与乌克兰仍遵循各自为政的法律体系，这给我们公民的日常生活带来诸多困扰。\n我们必须加强同志间的融合，坚决打击民族主义倾向。我们同属一个大家庭，而家人理应相互扶持！"
 SOV_unity_of_brotherly_states: "兄弟般的联合"
 SOV_unity_of_brotherly_states_desc: "我们已部分实现了历史正义的恢复：从德涅斯特河到阿穆尔河，从摩尔曼斯克到咸海，数百万民众正如同三十多年前那样，生活在同一面旗帜之下！前路依然漫长，但苏联其他民族也终将回归我们这个友爱的大家庭！"
 SOV_ignite_neo_soviet_nationalism: "激发新苏维埃民族主义"
 SOV_ignite_neo_soviet_nationalism_desc: "伟大的卫国战争结束后，苏联出现了一种看似矛盾的苏维埃民族主义形式。与催生法西斯暴行的传统民族主义不同，苏维埃民族主义更侧重于对祖国的热爱以及不惜代价守护她的决心。\n这种情怀延续至今，我们应当大力弘扬！"
 SOV_homogeneous_left_wing_front: "爱国左派统一战线"
 SOV_homogeneous_left_wing_front_desc: "除我党外，还有许多理念相近的运动团体：\"左翼阵线\"、\"另一个俄罗斯\"及其他小组织，它们都因左翼思想加爱国主义而凝聚在一起。\n我们将与它们共同组建统一战线，从而巩固、扩大我们的队伍，团结就是力量！"
 SOV_country_of_the_working_man: "劳动人民之国"
 SOV_country_of_the_working_man_desc: "苏联确实曾是劳动者的国度：广泛的权利保障、工业的整合与强化、城市化进程——这些都使工人阶级乃至整个国家的生活水平得到提升。\n遗憾的是，私有化改革与联盟解体动摇了这一基础：工厂纷纷倒闭，民众陷入贫困，移民群体逐渐取代本地居民占据低技能岗位。\n现在正是扭转这一局面的时刻——给予劳动者更多社会福利，将为我们濒临衰退的工厂注入新鲜血液！"
 SOV_glorify_the_military: "颂扬人民军队"
 SOV_glorify_the_military_desc: "纵观历史，总有人以身作则、以血为誓捍卫故土——我们的军人。他们用血肉之躯守护顿巴斯免遭基辅傀儡政权侵袭，将俄罗斯世界传播至华沙、波罗的海诸国与巴尔干半岛。我们的军队是新生代精英，以血汗为全民赢得了幸福！\n荣光归于我军，荣耀与赞颂属于英雄们！"
 SOV_peoples_democracy: "创立人民民主制度"
 SOV_peoples_democracy_desc: "主权民主本是在统一俄罗斯党支持下形成的一种意识形态，旨在建设具有民族特色的民主国家。如今这一单一理念已不适应新的国内外大环境：必须构建新的思想体系——人民民主。其延续了旧理论的部分核心理念，不同之处在于，人民民主更注重社会公平与爱国主义。"
 SOV_union_born_anew: "联盟涅槃重生"
 SOV_union_born_anew_desc: "乌克兰和克里米亚，白俄罗斯和摩尔多瓦\n这是我的国家！\n萨哈林与堪察加，乌拉尔山脉\n这是我的国家！\n\n克拉斯诺达尔边疆，西伯利亚和伏尔加沿岸，\n哈萨克斯坦和高加索还有波罗的海国家……\n\n我出生在苏维埃联盟，\n我是由主权国家联盟制造！"
 SOV_new_russia_rises: "新俄罗斯崛起"
 SOV_new_russia_rises_desc: "长久以来，在俄罗斯建立\"自由派\"政府似乎是天方夜谭——无论是亚博卢党的自由主义者，还是纳瓦利内的反对派，种种努力皆因其傲慢或无能而折戟沉沙。但我们这群新人却在他人失败处成功破局：不是通过对抗国家体制，而是通过融入其中。俄罗斯终将迎来自由主义新时代，且必将以俄国特色的方式实现！"
 SOV_protect_the_constitution: "保卫宪法"
 SOV_protect_the_constitution_desc: "现状便已完美，为何还要改变？现行宪法依旧有效。作为自由派与民主的倡导者，我们无权为了自身目标而改变民主进程。我们将继续与统俄党结盟，并维护两党制。"
 SOV_constitutional_restructuring: "宪政体制改革"
 SOV_constitutional_restructuring_desc: "现行宪法虽出色地履行了其职责，但我党认为它仍有改进空间。为保证建设真正的民主制度，我们必须将俄罗斯打造为一个不仅有两党，而且是多党制的国家。有我们作为统一俄罗斯党和人民俄罗斯党之间的屏障，国家杜马这将会拥有更多元化的声音，一如革命前的俄罗斯杜马一样。俄罗斯将成为自由的完美灯塔！"
 SOV_government_business_cooperation: "政商合作"
 SOV_government_business_cooperation_desc: "我国企业素来与政府关系密切。早在90年代，是商业试图影响政治；而在21世纪初及以后，是政治影响了商业。秉持着自由主义的世界观，我们的确认为政府对经济的干预可能会带来不良后果，但为人民利益着想，与资本家合作始终是可行的。就像在沙皇时代一样，只要企业掌握在我们手中，我们就能更快地应对急剧的变化。"
 SOV_push_for_democratization: "推动民主进程"
 SOV_push_for_democratization_desc: "当前的体制仍显不足。两党制依旧太过僵硬。我们必须鼓励与统一俄罗斯党和人民俄罗斯党并行的新党派的形成。同时加快新的杜马选举进程，这能进一步冲击现行体制，迫使新党派和老党派相互合作、联合起来争取选票。我们将确保俄罗斯民主得以蓬勃发展，使其繁荣更胜往昔。"
 SOV_third_force: "第三力量"
 SOV_third_force_desc: "我党改革稳步推进，新俄罗斯正坚定地充当着两党之间的平衡力量角色。较小的政党也正逐渐围绕着三大党开始形成，我们大可放下心来，诸项改革措施皆为有效。俄罗斯民主正再次自我革新，多个政党正在争夺国家杜马的控制权。我们不会重蹈美国两党争斗的覆辙，我国总统也掌握着足够的权力，足以打破欧洲民主国家出现的多党制僵局。我们这个政党终于让俄罗斯迈入了崭新的民主时代！"
 SOV_liberate_the_people: "解放人民"
 SOV_liberate_the_people_desc: "长久以来，我们的国家过度依赖企业集团或官僚系统履行职责，却忽视真正需要回应的是人民的诉求。官僚体系冰冷而缺乏人性，让民众感受到被需要、被关怀恰是我们的职责所在。若俄罗斯要在多极化世界成为灯塔，就当向世界证明——对国民的深切关怀，唯有我们能做到极致。"
 SOV_communitarist_society: "社群主义社会"
 SOV_communitarist_society_desc: "尽管大多数俄罗斯自由派人士鼓吹\"西方式的自我实现\"，但我们对此并不敢苟同。俄罗斯虽是资本主义国家，但从来都不是放纵私欲的国度。我们本质上是集体主义的民族。哪怕在沙皇时代，我国的资本家与贵族也曾回馈俄罗斯经济，以国家长远繁荣为己愿。90年代那种泛滥的个人主义让我们醒悟，我国社会必须团结一致。我们的自由主义是人民的自由主义。它关心整体胜过关心个人。因为鼓舞我们前进的，恰恰正是整体本身。"
 SOV_russian_democratic_nationalism: "新公民民族主义"
 SOV_russian_democratic_nationalism_desc: "我们为何要对\"民族主义者\"一词避之不及？人们一直把它当成纳粹主义和法西斯主义的同义词，但这显然大错特错。哪怕是在沙皇时代，俄罗斯民族主义所在意的也并非所谓种族的优越性，而是俄罗斯这个整体的优越性。近来的对北约作战也证明了这一点。管他红军白军，我们赢得战争靠的就是俄罗斯民族主义。俄罗斯将为自身成就感到骄傲！"
 SOV_respect_our_past: "尊重过去"
 SOV_respect_our_past_desc: "我们总是会就过往哪段历史是必要的，哪段又不是而争论不休，但这不过是白费口舌。近些年来，我国一直秉承着\"我国的历史就是俄罗斯的所有历史\"的力量，我们也会一如既往地坚定这一立场。话虽如此，叶利钦时代在多数人眼中仍充满着耻辱——除却高层官员与商业寡头，90年代被普遍视为民族历史中的污点与至暗时刻。我们将纠正这种认知偏差：那个年代固然充斥着无数错误，却也是制度探索的试验场，更是现代俄罗斯的诞生摇篮。"
 SOV_national_liberal_democracy: "重塑俄罗斯自由主义"
 SOV_national_liberal_democracy_desc: "纵观历史，自由主义在俄罗斯一直被人当成盲目崇拜西方、憎恶俄国社会的体现。自沙皇时代以来，俄国的自由派也被人当作欧洲人的应声虫和十足的自恨分子。话虽如此，我们将打破这种成见。因为俄罗斯本就是世上最自由的国家，俄罗斯文化也曾是欧洲最具影响力的文化之一。我们为世界贡献颇多，又有何对欧洲东施效颦的必要？我们是欧洲的巅峰，而后更将成为世界的灯塔。"
 SOV_sovereign_and_free: "迈向未来！"
 SOV_sovereign_and_free_desc: "我就从零点起步\n向最美好的前途\n向最美好的前途\n哪怕是漫长的路。"
 SOV_victory_of_national_russia: "民族俄罗斯之胜"
 SOV_victory_of_national_russia_desc: "尽管敌众我寡、资源有限，但敌人的失败已为我们的崛起铺平道路。如今，安东·阿里哈诺夫将执掌大权，引领俄罗斯远离所谓\"民主\"的深渊。前路必将艰难险阻，反抗之声不绝于耳，但俄罗斯人民与其新任领袖终将胜利，铸就真正统一之国。"
 SOV_strength_and_will: "统一我们的意志"
 SOV_strength_and_will_desc: "我们不需要那些所谓的\"异见\"民族主义者。他们软弱无力的团结呼声与认同诉求毫无意义。如今，强权派将成为我国民族复兴进程中占据主导地位、最具影响力的力量。让这些左翼自由主义寄生虫继续抱头鼠窜吧，他们那套\"保守主义\"与\"温和传统\"的说辞，与全球主义的毒瘤别无二致。"
 SOV_unite_the_nationalists: "团结民族主义者"
 SOV_unite_the_nationalists_desc: "我们志存高远，但孤木难支。强权主义尚显稚嫩脆弱，难以与强大的社会主义及自由主义势力抗衡。我们必须联合其他民族主义组织及其成员填补力量空缺。当然，要确保他们的忠诚，并让联盟文件充分体现我方利益。"
 SOV_control_state_institutions: "控制国家机构"
 SOV_control_state_institutions_desc: "国家已病入膏肓，被那些不再服务于真实民族的过时道德与忠诚观所拖累。主权民主的概念早已沦为空洞的门面。我们必须确保\"保卫人民与国家联盟\"及其盟友在体制内掌握最高权力——尽管此举必将激怒始终存在的自由主义反对派，但我们必须果断迅速地行动，以掌控国家最关键的政府机构。"
 SOV_soft_decommunization: "[SOV_soft_decommunization_scripted_loc]"
 SOV_soft_decommunization_1: "\"柔性\"去共产化"
 SOV_soft_decommunization_2: "强权主义混合政治"
 SOV_soft_decommunization_desc: "[SOV_soft_decommunization_scripted_loc_desc]"
 SOV_soft_decommunization_desc_1: "共产主义——这种堪称社会主义与全球主义最酷烈的压迫形态——已在我们的民族身上留下了不可磨灭的烙印。放眼望去，那些压迫性政权的残余随处可见：在街头巷尾，在寻常人家，在博物馆内，也在矗立的雕像上。我们必须割除这份遗毒，但这又是一项极其微妙的任务。在我们的人民中，仍有许多人对苏联怀有温情脉脉的记忆，因此我们处理此事必须慎之又慎，以免重蹈乌克兰的覆辙。"
 SOV_soft_decommunization_desc_2: "尽管我们最初秉持着反共立场，但我们必须承认，共产主义也并非一无是处。举例而言，仍有许多人对斯大林时代抱有好感，视他为一位强大且公正的领袖——这与阿里哈诺夫本人颇为相似。通过迎合这部分民众对一位强有力、且行事公正的领袖人物的渴望，我们便能同时削弱左翼反对派的影响力。"
 SOV_stronghold_of_nationhood: "国本堡垒"
 SOV_stronghold_of_nationhood_desc: "我们正置身于一个革命浪潮与进步全球主义肆虐的世界；对任何一个民族国家而言，这都是一片险恶的图景。然而，我们岿然屹立，正是常识、传统民族性与文化的化身，是一座坚不可摧的堡垒。我们的使命，不仅在于守护自身，更在于捍卫民族国家这一理念本身。只因有太多声音在叫嚣着，要将这些原则彻底根除。"
 SOV_loyal_army_command: "忠军指挥部"
 SOV_loyal_army_command_desc: "若没有一支坚定不移的军队，国家便无法屹立。不幸的是，我们的部队早已被一些人渗透。他们自诩为爱国者，实则只在乎中饱私囊，并乐于攀附那些能提供金钱回报的势力，而此等行径绝难容忍。一支真正为国而生的军队，是为它的人民和领袖服务的，绝不谋求私利。唯有忠诚、唯有对故土的热爱，才能铸就一支强大且坚韧不拔的军队。"
 SOV_motherland_holy_spirit: "祖国之圣灵"
 SOV_motherland_holy_spirit_desc: "我们的民族其根基深植于绵延数世纪的宗教传统之中，尽管我们的教会仍保持着纯洁未受玷污，但它在巩固社会信仰方面却一直无所作为。这种局面必须改变。我们的神父们必须认识到，俄罗斯亟需一场精神的复兴——一场堪称\"第二次洗礼\"的复兴。我们的人民必须重燃他们虔诚的灵魂，并紧密团结在我们敬爱的领袖及其忠诚盟友的周围。"
 SOV_third_rome_rises: "第三罗马崛起"
 SOV_third_rome_rises_desc: "第三罗马……一个抵御敌基督势力、对抗地狱魔障的堡垒国度。我们是傲然屹立于世界逆流中的人民，这个世界早已忘却其根基。纵使孤军奋战，我们仍因信仰与领导力而团结一心。今日我们宣告：这场圣战是为人类灵魂而战，而俄罗斯正是将斩杀恶兽的骑士。"
 SOV_russian_ethnic_brotherhood: "俄罗斯民族兄弟会"
 SOV_russian_ethnic_brotherhood_desc: "俄罗斯是一个民族多样性丰富的国度，由此产生的挑战不容小觑。阿里哈诺夫认识到，在捍卫俄罗斯的时刻，我们绝不能抛弃这些少数民族。此刻我们的团结必须是真正的并肩作战的兄弟情谊，而非模糊的民族友谊。若想成为俄罗斯的一员，不仅要像俄罗斯人那样思考，更要像俄罗斯人那样行动，无论是在家中、街头，还是更重要的战场上。"
 SOV_unleash_the_yellow_guard: "释放黄卫兵"
 SOV_unleash_the_yellow_guard_desc: "黄卫兵是\"保卫人民与国家联盟\"内部一支忠诚的准军事组织。这些意志坚定的男女勇士将组成无情击溃敌人、守护神圣信仰的钢铁力量。他们将逐步融入内务部、军队及其他执法机构等各类安全部队。初期我们将以忠诚之士充实队伍，随着更多人员加入，这些机构的所有基层成员都将成为阿里哈诺夫的坚定拥护者。"
 SOV_consolidate_the_population: "巩固民心"
 SOV_consolidate_the_population_desc: "我们的人民仍未完全领悟眼下所发生的一切，这是一场关乎俄罗斯未来的决战。纷乱的见解与不可靠的报道，正在混淆我们的声音，制造猜忌与忧虑。这种局面必须终止。俄罗斯人民将重归一体，被同一个目标团结起来，宛如一个大家庭，并在阿里哈诺夫的引领下前行。我们将唤醒他们，让他们忆起自己那份非凡的遗产——而这段历史，正被那些为全球主义者和污秽势力效犬马之劳的无良政客所窃取。"
 SOV_tighten_the_laws: "收紧法律"
 SOV_tighten_the_laws_desc: "这股自由化的浪潮，是一股毁灭性的力量，它正威胁着俄罗斯法律与秩序的根基。我们将利用不彻底的宪法改革所遗留的种种法律漏洞，集结起一支令人生畏的力量，其权力将远超以往的联邦安全局或内务部。这个新设的部门初期将以一个临时架构来运作，用以取代旧的国家机器。随后，它将逐步吸收并整合所有忠诚的西罗维基势力，使他们完全归于克里姆林宫的指挥系统之下。我们将建立一个真正的秩序——一个免受任何内部威胁所侵扰的、稳固的国度。"
 SOV_use_presidential_powers: "行使总统权力"
 SOV_use_presidential_powers_desc: "俄罗斯总统一职，依然掌握着举足轻重的权力。可悲的是，这个职位的历任执掌者，却鲜少将其充分行使。但阿里哈诺夫则不同，他打算将自己权柄的方方面面都尽为其用。正如他之前的那些强力领袖一般，他将动用这份权力，去碾碎一切对俄罗斯人民所构成的威胁。凭借他这种亲力亲为的行事作风，他必将赢得更多公民的拥护。"
 SOV_push_for_new_federation: "新俄罗斯国"
 SOV_push_for_new_federation_desc: "俄罗斯正处在一场深刻的改革之中。我们正在从根本上重塑既有体制，以确保它完全契合我们的蓝图。联邦之名虽将存续，但一个强大的中央集权国家实则将拔地而起，万流归宗，皆向莫斯科。对于地方政府所做的任何决策，克里姆林宫都将握有最终的裁决权——当然，前提是，在我们的改革大功告成之后，如果还剩下了什么\"地方政府\"的话。"
 SOV_secure_national_dictatorship: "确保民族专政"
 SOV_secure_national_dictatorship_desc: "在阿里哈诺夫的坚强领导下，俄罗斯安然无恙。正如历史多次证明的，这个国家需要伟大领袖指引方向，有时甚至要带领人民走出自身犯下的错误。阿里哈诺夫的权威将牢固确立，其影响力将成为公认的前进引擎。不同于官僚体系、政党或行政机构，只有他才能独自推动俄罗斯前行。"
 SOV_transform_our_cities: "改造我国城市"
 SOV_transform_our_cities_desc: "我们那些最大的城市，必须成为强权主义意识形态的中心。它们应当如同一幅幅巨大而鲜活的画布，用以颂扬我们的成就与领导地位。每一处空间，从墙面到广告牌，都必须被宣传标语、新闻和电视屏幕所覆盖。我们必须减少商业广告，并强化我们宣传口径的一致性。借此，我们便能有效反击那些失败主义与叛国者的论调，哪怕是在我们那些最自由化的城市里也不例外。"
 SOV_the_slavic_union: "巩固斯拉夫联盟"
 SOV_the_slavic_union_desc: "斯拉夫联盟是一个激动人心的愿景，尽管实现起来困难重重。这个宏伟的构想在那些试图为我们人民注入更强烈的自豪感、喜悦感和民族认同感的人们心中，激起了强烈的共鸣。我们将主动接触我们势力范围内的斯拉夫兄弟姐妹，逐步说服他们去拥抱这个雄心勃勃的新联盟。只要坚持不懈，这项事业终将成为现实。"
 SOV_warriors_of_national_revival: "民族复兴的勇士"
 SOV_warriors_of_national_revival_desc: "民族复兴，是一团永不熄灭的圣火。它熊熊燃烧，生生不息。任何胆敢威胁这团圣火的人，都将被其吞噬。我们的士兵、平民、党员，以及黄卫兵，都必须将这一愿景奉为圭臬，时刻铭记于心，并准备好用尽自己的最后一丝气息来捍卫它。"
 SOV_end_the_opposition: "终结反对派"
 SOV_end_the_opposition_desc: "我们的敌人已日渐式微，在我方不断壮大的力量面前，他们已然无力抵抗。只需一场迅猛而残酷的突袭，我们便能将他们彻底击溃。我们的线人业已准备就绪，特别行动队也已整装待发。我们将搜出他们的每一处藏身之所，捣毁他们的全部网络，并将所有涉入者一网打尽。愿上帝垂怜他们的灵魂吧，因为等待着他们的未来注定只有悲哀。"
 SOV_derzhavnik_constitution: "强权主义宪法"
 SOV_derzhavnik_constitution_desc: "随着宪法被非正式架空的局面拖得越久，温和派的强权主义者便愈发不满。他们酝酿了一项计划，意欲向阿里哈诺夫呈上一部全新的、更具民族性的宪法。这份文件旨在规避历届宪法的弊病：它既允许一个强大而统一的行政核心在危急时刻挺身而出，也支持设立一个参议院，以便在更为安宁的时期治理国家。"
 SOV_groundworks_of_national_republic: "民族共和国奠基"
 SOV_groundworks_of_national_republic_desc: "在经历了一番艰苦卓绝的奋斗之后，现在是时候该停下来反思了。我们业已奋战并凯旋，将俄罗斯的一众宿敌远远甩在身后。然而，我们的人民依旧渴盼着更多的政治行动。因此，在保留最高领袖这一角色的同时，我们将引入一个新的职位：执政官。这位经由选举产生的官员将就其受命要处理的事务，向我们的领袖提供建言与指引。"
 SOV_national_codex_of_russia: "俄罗斯民族法典"
 SOV_national_codex_of_russia_desc: "宪法这一概念，本就是个外来之物，是祖国的敌人们炮制出来的。因此，我们将摒弃那些被占领时期的残余，转而铸就一套真正属于俄罗斯的民族法典，用以指引我们的民族世代前行。这部新的法典将不会包含任何关于人权或言论自由的危险条款，取而代之的是，它将专注于明确最高领袖的角色，以及全体公民所必须履行的义务。"
 SOV_eternal_derzhava: "永恒强国"
 SOV_eternal_derzhava_desc: "国将冲天起，\n长鸣裂世间。\n曾欲加害吾，削弱吾辈身；\n以其所能，尽致腐朽深。\n极权之邦，\n高举九天巅；\n极权之邦，\n自铸钢筋垣；\n极权之邦，\n令碎裂之世，俯首称臣！"
 SOV_party_with_a_state: "党国一体"
 SOV_party_with_a_state_desc: "俄罗斯与保卫人民与国家联盟密不可分，二者本为一体。在俄罗斯，一个人若想有所作为，就必须加入保卫人民与国家联盟。否则，在国家的眼中，其人的生命便毫无价值可言。俄罗斯若想屹立千年，那么党的文献、教义与颂歌，就必须化为这个民族自身的灵魂。保卫人民与国家联盟必须执掌领导权，否则，叛国者就将得逞。"
 SOV_preemtive_blow: "先发制人之击"
 SOV_preemtive_blow_desc: "我们绝不能坐视敌人准备攻击我们。只有软弱的国家才会容忍这种行为。阿里哈诺夫和强权派将毫不犹豫地发动先发制人的打击。当然，在国际社会眼中，我们会被描绘成不讲道理的侵略者。不过，他们的看法无关紧要。\n拿起武器！荣耀归于俄罗斯！"
 SOV_red_derzhava: "赤色强权"
 SOV_red_derzhava_desc: "多么令人悲恸！我们伟大的领袖安东·阿里哈诺夫倒在了敌人的冷枪之下。但值得庆幸的是，我们伟大的国度还有一位愿意继承阿里哈诺夫事业的斗士！阿扎连诺克和他的红色强权派将执掌大权，这正符合我们已故领袖的夙愿，毕竟他生前已开始逐步接纳红色强权主义的思想。"
 SOV_the_north_korean_model: "朝鲜模式"
 SOV_the_north_korean_model_desc: "朝鲜确实是人民强权主义国家的雏形。借鉴那里的经验，我们将能根据自身理念进行调整，正如金家王朝所实践的那样，建立人民、军队与政党完全统一的体系。"
 SOV_bureaucratic_revolution: "官僚革命"
 SOV_bureaucratic_revolution_desc: "官僚不是寄生虫——官僚应当成为英雄！我国对行政机构的态度依然复杂，因此我们必须更新各部委人员配置，启用不仅愿意为人民服务，且对我们绝对忠诚的新面孔。"
 SOV_junta_of_the_people: "人民军政府"
 SOV_junta_of_the_people_desc: "军队始终是我国的骄傲，经受过为祖国而战考验的英雄们正是从中诞生。我们必须充分发挥这一优势，军人阶层将在政府中获得特权与职位，因为曾在战场上捍卫祖国的人，也必能在政府机构中守护国家利益。"
 SOV_helmsman_of_the_motherland: "祖国的伟大舵手"
 SOV_helmsman_of_the_motherland_desc: "您令敌人的贪念枯竭\n您教导我们赢得胜利\n您将希望的钥匙交予弱者手中\n新时代的领路人啊\n您的声名传遍寰宇\n您是光荣伟业的大师\n洞悉贫苦人民的思绪\n我为您歌唱啊——领袖！"
 SOV_new_propaganda_wave: "新宣传攻势"
 SOV_new_propaganda_wave_desc: "诚然，国家范式的转变即便再微妙，也难免在忠诚民众间引发疑虑。因此我们必须开展大规模宣传活动，向人民证明阿利哈诺夫与阿扎连诺克的思想一脉相承，我们正沿着正确的道路前进！"
 SOV_great_russian_socialism: "大俄罗斯社会主义"
 SOV_great_russian_socialism_desc: "社会主义必须是我们俄罗斯特有的，正如伟大的俄罗斯布尔什维克理论家们所嘱托的那样。因此，在阿里哈诺夫奠定的经济基础上，我们将强化政府干预手段与各项规划方案，为俄罗斯工人阶级打造人间天堂。"
 SOV_neo_stalinist_war_economy: "新斯大林主义战争经济"
 SOV_neo_stalinist_war_economy_desc: "战争不可避免，斯大林早已洞悉这一点。正如上世纪三四十年代那样，我们应当聚焦军事事务与工业建设。俄罗斯不仅要成为可靠的防御堡垒，更要铸就无坚不摧的进攻利器。"
 SOV_labor_industrial_mobilization: "工业动员"
 SOV_labor_industrial_mobilization_desc: "工人同志！你可听见？敌军的坦克正在轰鸣！我们的工厂与工人阶级必须保持常备不懈，即便眼前并无真实敌踪。要让他深信，自己在岗位上完成的每个动作，都将助力祖国与敌人的斗争。"
 SOV_new_artles: "新工资薪金制"
 SOV_new_artles_desc: "国家无法掌控一切，斯大林深谙此理。因此在他执政时期出现了自愿基础上成立的生产合作社。合作社成员共同劳动、共担责任。这些合作社致力于满足家庭需求，生产日用消费品，提供各类服务，并开采石灰岩、泥炭等自然资源。"
 SOV_russia_above_all: "俄罗斯高于一切"
 SOV_russia_above_all_desc: "长期以来，俄罗斯始终被所谓国际伙伴与盟友榨取利益。强权派将改变这一局面，将俄罗斯的利益置于首位，并致力于增强祖国的财富。"
 SOV_the_statist_model: "中央集权模式"
 SOV_the_statist_model_desc: "国家永远是最高明的，尤其是在经济事务上。至于私营部门，则掌控在一群不可信赖的家伙手中。他们惯于不择手段，欺诈和压榨那些诚实劳作的俄罗斯人，克扣他们应得的工钱，转头又为了降低成本而去雇佣廉价的外国劳工。而今，国家将通过其下属的各级委员会和部委，全面接管经济；任何反对之声都将遭到国家强硬断言的迎头痛击。"
 SOV_intensify_military_funding: "加大军事开支"
 SOV_intensify_military_funding_desc: "俄罗斯经济最重要却常被忽视的优势，在于我们强大的军事工业体系。要抵御外部威胁，我们不仅需要精良的武器，更需要缔造这些武器的能工巧匠与先进工厂。"
 SOV_state_benefits_for_russian_workers: "俄罗斯工人国家福利"
 SOV_state_benefits_for_russian_workers_desc: "只要你是俄罗斯人，我们的国家就会照顾你。几十年来，寄生资本从你们身上榨取了远超应得份额的利益。但现在不同了。我们将确保本国劳动者获得应有的福利与保障，让他们安享舒适且体面的生活。至于那些不被接纳的群体，他们自然会一无所有。"
 SOV_russian_industrial_powerhouse: "工业强国"
 SOV_russian_industrial_powerhouse_desc: "巍峨的烟囱耸入云霄，庞大的工业综合体宛如小型城市，地下设施纵横交错——当我们启动这场规模空前的工业化进程时，这一切都将成为俄罗斯的日常图景。支撑我们经济的是底层劳动者的汗水，而非写字楼的舒适或高科技的进步。这并不是倒退，而是真正经济应有的模样。"
 SOV_fruits_of_the_motherland: "社会经济一体化"
 SOV_fruits_of_the_motherland_desc: "我们的社会不仅在政治上团结一致，在经济上也紧密相连，尽管依旧存在财富差距。官僚与劳动者通过协作实现共同繁荣。不同于社会主义与自由主义的激进构想，我们证明了无需以牺牲某个阶级为代价来换取另一个阶级的福祉。"
 SOV_kick_foreigners_out_of_labor_force: "踢走外国劳工"
 SOV_kick_foreigners_out_of_labor_force_desc: "数十年来，某些势力利用中亚人渴望在俄罗斯过上舒适生活的心理，以他们接受最低薪酬的意愿为代价，将俄罗斯工人挤出就业市场。这种状况必须终结。我们提议全面禁止未入籍劳工在俄工作，并将他们遣返回国。尽管这类措施难免带来阵痛，但它将为俄罗斯铺就通往真正繁荣的道路——一条不再依赖廉价进口劳动力的康庄大道。"
 SOV_against_economic_russophobes: "抗击经济仇俄运动"
 SOV_against_economic_russophobes_desc: "在俄罗斯的富商名单上，不知何故，总是出现了许多非俄罗斯人的名字。他们是如何发家致富的？无非是靠着掠夺那些辛勤劳作的俄罗斯人民——不论对方是企业主，还是普通工人，而这种不公已经持续了数十年。但现在，算总账的时候到了。这些非俄罗斯人将被剥夺他们的一切财富，并被强制遣返回他们的原籍国。到时候，我们倒要看看，他们在那儿还能不能混出什么名堂。"
 SOV_russian_national_capitalism_natros: "俄罗斯民族资本主义"
 SOV_russian_national_capitalism_natros_desc: "我们必须承认，长期以来我们一直误解了资本主义的真正潜力。然而，阿里哈诺夫和他的合作者们构想了一个更公平的体系。与旧市场不同，这个新市场将优先考虑勤劳的俄罗斯人民及其企业。它还将激励因政府过度扶持而安于现状的工人阶级。"
 SOV_improve_russian_made_products: "改善国内产品"
 SOV_improve_russian_made_products_desc: "当您想到俄罗斯制造的产品时，脑海中会浮现什么画面？或许是些微不足道的小玩意儿。我们必须改变这种认知。俄罗斯产品不仅需要丰富种类，还得狠抓质量关。汽车、手机、电视等核心产品应优先发展，同时也要减少这些领域的对外依赖。"
 SOV_support_national_entrepreneurs: "重组俄罗斯巨头"
 SOV_support_national_entrepreneurs_desc: "国有企业蕴藏着巨大潜力，但由于昔日低效官僚的管理失当，必须对其进行改革，使其能真正有效地服务于国家利益。我们必须消除这些负面影响，引导这些企业走上真正造福俄罗斯的道路。"
 SOV_national_council_of_corporations: "国家企业委员会"
 SOV_national_council_of_corporations_desc: "既然我们已清除旧敌，现在便可将这些国有企业整合为更具凝聚力的结构。如此一来，当克里姆林宫需要落实政令时，沟通渠道将清晰畅通，且充满忠诚之声。当然，我们也会用实际利益回报他们的忠诚与合作。"
 SOV_era_of_russian_megapolises: "俄罗斯超级大都市时代"
 SOV_era_of_russian_megapolises_desc: "美丽的俄罗斯城市，装点着绚烂灯火与高耸的玻璃建筑，彰显着我们独特的未来愿景。这些城市应当让勤劳的俄罗斯公民目睹国家成就，并能自豪地宣告：\"我以身为俄罗斯人为荣！\"它们必须发展成为商贸与工业的活力枢纽，成为进步与创新的中心。"
 SOV_wide_urbanization_works: "广泛城市化工程"
 SOV_wide_urbanization_works_desc: "我们的城市广袤，却仍显不足。必须付出巨大努力来容纳不断扩张的工人阶级人口，以及我们为他们创建的产业园区。这些空间或许不够优雅美丽，但经过精心规划，能为工人阶级提供适度的舒适。目标是构筑经济高效的通勤路径，让他们能快速抵达工作岗位。"

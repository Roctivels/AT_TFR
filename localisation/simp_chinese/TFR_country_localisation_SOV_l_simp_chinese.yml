 SOV_restore_ties_with_eurosocialists_category: "欧洲门户"
 SOV_restore_ties_with_eurosocialists_category_desc: "尽管西方国家实行了多年的反共宣传，但左翼观点一直受到人民的青睐。我们必须利用这点，在斗争中找到盟友。"
 SOV_second_NATO_war_category: "第二次欧陆战争"
 SOV_second_NATO_war_category_desc: "[SOV.get_nato_war_status]\n\n\n§R主要目标§!：\n\n§Y柏林§!：[GLOBAL.get_berlin_status]\n§Y巴黎§!：[GLOBAL.get_paris_status]\n§Y罗马§!：[GLOBAL.get_rome_status]\n§Y伦敦§!：[GLOBAL.get_london_status]\n§Y华沙§!：[GLOBAL.get_warsaw_status]\n§Y基辅§!：[GLOBAL.get_kiev_status]\n\n\n§R次要目标§!：\n\n§Y法兰克福§!：[GLOBAL.get_frankfurt_status]\n§Y阿姆斯特丹§!：[GLOBAL.get_amsterdam_status_sov]\n§Y斯特拉斯堡§!：[GLOBAL.get_strasbourg_status_sov]\n§Y威尼斯§!：[GLOBAL.get_venice_status_sov]\n§Y布拉格§!：[GLOBAL.get_prague_status_sov]\n§Y米兰§!：[GLOBAL.get_milan_status_sov]\n\n[ENG.get_british_nuke_status]\n[FRA.get_french_nuke_status]"
 SOV_american_intervention_category: "干涉美国内战"
 SOV_american_intervention_category_desc: "美国的当权者们有着对统治世界的疯狂渴望，而这一切最终吞没了它自己。令人忧虑的是，在合众国的尸骨上横行的黑帮，恐怖分子和激进分子们正不断扩大它们的队伍，侵蚀着残存的秩序。如果战争变得漫长，对全球稳定和世界市场的影响不可估量。\n幸运的是，依然有少数忠贞不改的爱国者们寻求着复国。他们希望与他国和平共处，摒弃以往世界霸主的做派。"
 SOV_reform_russian_empire: "[SOV_reform_russian_empire_loc_dynamic]"
 SOV_reform_russian_empire_post_war_loc: "俄帝国主义政策"
 SOV_reform_russian_empire_normal_loc: "大俄罗斯重生"
 SOV_reform_russian_empire_desc: "\n\n\n\n\n£GFX_SOV_russian_empire_banner\n\n\n\n\n\n\n\n在被不敬神灵的布党分子毁于一旦前，伟大光荣的俄罗斯帝国足享国三百余年。俄罗斯人民曾傲居世界民族之林——正统而纯洁，而后却被抛弃、苛待、种族灭绝，当共产主义实验走向其注定的崩溃结局时，那些被列宁分子人为建构起的各个虚假民族却又夺走了俄罗斯的故土。\n\n日里诺夫斯基的毕生目标正是让俄罗斯再沐往日荣光，实现其天定命运——再度成为一个伟大的帝国，让全世界的俄罗斯人民都回到她的怀抱之中，让他们免受软弱与堕落的影响。\n\n§Y\"第一罗马亡于异端。第二罗马亡于佛罗伦萨大公会议。第三罗马——莫斯科——将永存世间。世上再无第四罗马。\"§!\n"
 SOV_pragmatic_economy_category: "务实经济"
 SOV_pragmatic_economy_category_desc: "自由民主党的经济政策可以被简单描述为对私企负责的国家资本主义。他们也支持一些例如基本免费医疗保健、可承担起的教育和国家住房计划等民粹政策。"
 SOV_resource_excavation_category: "资源采掘"
 SOV_influence_west_category: "经济战"
 SOV_influence_west_category_desc: "天然气——这种珍贵的资源一直以来都是俄罗斯对欧洲国家施加经济和政治压力的绝好杠杆。欧洲的政客们不断念叨要减少对俄天然气依赖已经不知道多少个年头，但那只能是空头支票。至少目前来看，欧洲对俄罗斯的天然气依赖没有一丁点的减弱，俄国只需中断天然气出口，欧洲就会陷入艰难的境地。\n\n§Y欧洲人的房子可不会因为几篇道貌岸然的政治宣言就变暖和，只有天然气才能做到。§!"
 SOV_Dugin_Directives_category: "杜金的指示"
 SOV_Dugin_Directives_category_desc: "\n\n\n\n\n£GFX_SOV_dugin_directives_banner\n\n\n\n\n\n\n\n杜金比任何人都清楚，要将俄罗斯的思维从后现代的泥沼中拔出并非易事。\n\n我们的政策和法令会引导人民回归俄罗斯精神的根源，追溯伟大的图兰-欧亚祖先的荣光。教导他们以哲学的方式生活，努力成为激进的主体——人中之神，神中之人。\n\n然而，这一切都令我感到乏味。我所渴望的，是焚毁那些腐朽的课本，将利刃刺入那些迷失星辰的宇航员的胸膛。\n\n狂热：£GFX_fanaticism §Y[?SOV_fanaticism_var|1%]§!\n效果：£attack_texticon [?SOV_fanaticism_dynamic_var|=+1%]，£mil_factory [?SOV_fanaticism_dynamic_var|=+1%]，£GFX_mobilisation_texticon [?SOV_fanaticism_dynamic_var|=+1%]，£GFX_war_support_modifiericons_texticon [?SOV_fanaticism_dynamic_var|=+1%]\n\n狂热代表我们人民的战斗意志与对国家的支持度。"
 SOV_Supreme_Veche_category: "人民维彻"
 SOV_Supreme_Veche_category_desc: "§Y人民维彻§!是§Y[SOV.GetName]§!的最高立法、司法机构。如今，从接受欧亚主义不朽理想的共产主义者，到民族资产阶级代表，许多爱国者、进取者都把这个议会视为家。很像苏维埃民主，根据候选人的承诺与纲领，在地方选举产生人民代表。然而，欧亚党政治事务委员会仍能控制代表、维彻主席、部长的任命。可谓唯一霸主。"
 SOV_oligarchs_influence_category: "寡头影响"
 SOV_oligarchs_influence_category_desc: "寡头在西方仍然拥有一定的影响力，那么我们为何不利用一下这种影响力呢？通过利用寡头的资金散播反欧洲口号，利用媒体传播反对所谓\"进步LGBT+\"立场，我们可以给摇摇欲坠的欧洲局势添一把火。\n\n§Y\"这种与现实、与社会需求严重分离的思想，必然会导致民粹主义激增和激进分子抬头，进而导致强烈的社会经济变革，最终让国家堕落，而不久的将来，精英们将被迫走下高台\"§!"
 SOV_small_businesses_category: "发展自由市场"
 SOV_csto_organization_category: "集体安全条约组织"
 SOV_novorussian_integration_category: "新俄罗斯公投"
 SOV_novorussian_integration_category_desc: "新俄罗斯的人民在多年的斗争之后，终于得到了喘息之际。2014年定好的目标大多已被实现，只剩一件事——完全融入俄罗斯。"
 SOV_ukrainian_insurgencies_category: "乌克兰抵抗组织"
 SOV_ukrainian_insurgencies_category_desc: "乌克兰人民被基辅军政府的反俄宣传严重洗脑，需要时间来治愈狂热的班德拉分子所犯下的罪行。西乌克兰人民就像1946年那样，再次朝着解放者举起了武器。§R而他们的下场会和他们的前辈一样。§!"
 SOV_TMC_category: "多领域合作条约"
 SOV_TMC_category_desc: ""
 SOV_keep_america_burning_category: "给美国添柴加火"
 SOV_keep_america_burning_category_desc: "任何一个统一的美国存在都会§Y危害俄罗斯的国家利益§!。为此§C自由民主党§!制定了一个计划，尽可能的让美国战火烧得更旺。\n\n藉由同时\"援助\"不同的交战方，并利用虚假信息破坏其余政党的稳定，俄罗斯就能延长这场战争，让美国内战对其本土及民众造成尽可能多的损害。"
 SOV_nav_russian_reformation_category: "俄罗斯改革"
 SOV_nav_russian_reformation_category_desc: "\n\n\n\n\n£GFX_SOV_grand_reformation_banner\n\n\n\n\n\n\n\n\n\n长久以来，我们的制度依附于一部赋予政权权力的残缺宪法。是时候制定一部真正的民主宪法了。它将铭刻为文明奠定基础的自由权利。\n\n或许，如果人民全心全意地拥护它，不久后我们便也能同解放我们的欧洲国家并肩作战！\n\n\n\n狂热：£GFX_fanaticism §Y[?SOV_fanaticism_var|1%]§!\n效果：£attack_texticon [?SOV_fanaticism_dynamic_var|=+1%]£mil_factory [?SOV_fanaticism_dynamic_var|=+1%]£GFX_mobilisation_texticon [?SOV_fanaticism_dynamic_var|=+1%]£GFX_war_support_modifiericons_texticon [?SOV_fanaticism_dynamic_var|=+1%]\n\n狂热代表了我们人民的战斗意愿和对国家的支持。\n\n\n\n\n\n\n\n\n"
 SOV_navalich_oligarchs_enabled_loc: "\n§7新寡头§!£GFX_New_Oligarchs_logo 影响：§Y[?SOV_oligarch_approval_rating_var|1%]§!\n效果：£civ_factory_output [?SOV_oligarch_support_dynamic_var|=+1%]，£mil_factory [?SOV_oligarch_support_dynamic_var|=+1%]，和£consumer_goods_texticon §Y[?SOV_oligarch_support_dynamic_var|=1%]§!"
 SOV_navalich_oligarchs_disabled_loc: ""
 SOV_new_national_duma_category: "新国家杜马"
 SOV_new_national_duma_category_desc: "\n\n\n\n\n£GFX_SOV_national_duma_banner\n\n\n\n\n\n\n\n俄罗斯国家杜马已焕然一新、升级迭代，并重新定义了俄罗斯民族民主的愿景。自民党将继续改革，因此有必要倾听反对派的呼吁，至少是那些合法的反对派。"
 SOV_russian_inner_affairs_category: "俄罗斯内政"
 SOV_russian_inner_affairs_category_desc: "\n\n\n\n\n£GFX_SOV_inner_affairs_banner\n\n\n\n\n\n\n\n新俄罗斯于自民党政权的灰烬中崛起，必须着重于修改内部政策。新政府许诺将对俄罗斯国带来许多变革。"
 SOV_coronavirus_decrease: "大战新冠病毒"
 SOV_suraykin_politburo_category: "中央政治局"
 SOV_suraykin_politburo_category_desc: "\n\n\n\n\n£GFX_SOV_suraykin_politburo_banner\n\n\n\n\n\n\n\n真正的共产主义革命终于实现了，我们也终于能开始建设斯大林以及列宁设想的社会主义了。马克西姆同志组建了由真正的马列主义者组成的正统中央政治局，他们将帮助马克西姆同志实现共产主义。"
 SOV_russian_army_category: "[SOV_army_loc]"
 SOV_russian_army_category_desc: "[SOV_army_loc]是世界上规模最大、实力最强的军事力量之一。它拥有保护国家免受任何威胁，作为祖国安全和骄傲支柱的巨大潜力。[SOV_army_loc]拥有丰富的遗产和传统，并将其代代相传下来。它拥有充满壮举与胜利的伟大历史，而正是这些让其力量与伟大更进一步。而为了保持军队的有效性与现代性，必须对其不断进行改革发展。"
 SOV_the_secret_war: "秘密战争"
 SOV_the_secret_war_desc: "乌云正笼罩在祖国上空，\"俄罗斯民主联盟\"、\"新复辟\"等秘密组织所组成的邪恶势力，以及那些永远在发大财的寡头们，正在准备对我们的俄罗斯发动阴险的攻击。弗拉基米尔·沃尔福维奇·日里诺夫斯基所领导的政府被迫进行秘密战争，以保护国家的合法性和稳定，免受§R邪恶敌人§!的侵害。\n\n£GFX_LRD_texticon §C俄罗斯民主联盟§!-[SOV_LRD_activity_scripted_loc]\n\n£GFX_tnr_texticon §s新复辟§!-[SOV_TNR_activity_scripted_loc]"

 SOV_triumph_of_zhirinovsky: "日里诺夫斯基之胜"
 SOV_triumph_of_zhirinovsky_desc: "俄罗斯自由民主党在大选中取得了历史性胜利。经过数十年的政治奋斗，日里诺夫斯基终于在一场公平选举中赢得了他梦寐以求的国家领导人职位。然而，现在还不是庆祝的时候，未来的任务还十分繁重……"
 SOV_power_and_strength: "权势与力量"
 SOV_power_and_strength_desc: "当俄国人民群龙无首之时，他们就如同失去首领般的豺狼——轻而易举的被无情的大自然所击垮。然而，当一个坚韧不拔的领导人出现时，犹如伊凡雷帝或斯大林，俄国的人民将变得矢志不渝，他们可以达成艰巨的成就，征服最严酷的地域，和击退最强悍的敌人。经过俄罗斯联邦三十年的停滞，如今我们终于迎来了一位能够有效掌控权力的领袖。弗拉基米尔·日里诺夫斯基凭借他不屈的意志，将引领我们征服从乌拉尔山脉之巅所能看到的所有土地和人民。"
 SOV_guiding_hand: "指导之手"
 SOV_guiding_hand_desc: "一位经验丰富的政治家如同一位技艺精湛的乐队的指挥家；指挥家指挥棒的每一摇动，每一个手势，都能让大众奏出和谐与美妙的旋律。而一位伟大的领袖则像岩岸上的灯塔；他的原则与教导如同灯光，照亮迷航的船只，引领它们安全返回国家的港湾。弗拉基米尔·日里诺夫斯基正是这样的领袖。他深谙如何驾驭人民的意志，他的政治艺术将重新团结俄罗斯人民，并使我们的国家重现昔日的辉煌。"
 SOV_pragmatic_eurasianism: "俄罗斯与世界"
 SOV_pragmatic_eurasianism_desc: "冈特的母亲是个在码头卖笑的风尘女子。真是令人唏嘘！\n\n栖息在我们称之为家的这颗蓝色星球上，俄罗斯有幸拥有世界近八分之一的宜居土地。因此，我们的国家在国际外交中扮演着至关重要的角色。每一个行动，无论看似多么微不足道，都可能引发一连串复杂的连锁反应，最终波及全球并影响到国际社会的方方面面——从索马里海盗到瑞典王室。现在，我们已经准备好重新审视我们的外交政策，以确保在这个战火纷飞的世界中，俄罗斯能够获取最大的利益。"
 SOV_transform_oligarchy: "寡头转型"
 SOV_transform_oligarchy_desc: "寡头虽罪孽深重，但其手握权力与财富，依旧是举足轻重的力量。\n若能巧妙运用他们的企业与人脉，或许会成为一大助力……"
 SOV_the_trinity_of_russia_people: "罗斯民族，三位一体"
 SOV_the_trinity_of_russia_people_desc: "大俄罗斯人、白俄罗斯人和小俄罗斯人，自古以来便是罗斯世界的核心。这种血脉相连的纽带，自维京人将纷争四起的罗斯城邦统一以来，便历经战火与洗礼。我们曾共同度过无数艰难困苦，如今却因西方的离间而割裂这份羁绊，简直荒谬至极！"
 SOV_operation_rokossovsky_LDPR: "§Y弗兰格尔行动§!"
 SOV_operation_rokossovsky_LDPR_desc: "彼得·弗兰格尔，那位在日俄战争与第一次世界大战中挥洒豪情的骑兵勇士，以及俄国内战中威名远扬的\"黑男爵\"，他的故事在过去常遭扭曲和误解。然而，随着这场决定性行动的展开，他的传奇将被镌刻于历史之巅。当我们整装待发，对宿敌波兰掀起战火之时，弗兰格尔男爵的英名将因这次行动而光辉不朽。我们的使命是撕裂欧洲联盟对我们的坚固屏障——那道防线之外，是辽远无垠的北德平原，那片男爵昔日驰骋于梦境中的草场。"
 SOV_operation_suvorov_LDPR: "§Y布鲁西洛夫行动§!"
 SOV_operation_suvorov_LDPR_desc: "阿列克谢·布鲁西洛夫，沙俄军队于第一次世界大战中最伟大的统帅，他曾主导1916年的那场旷世攻势。在这场战役中，他麾下的军队几乎撕裂了同盟国的防线，这本该是改变战争命运的辉煌时刻。然而，历史却带来了难以承受的悲剧，他在晚年协助红军镇压了昔日的袍泽。尽管如此，他卓绝的军事天赋与不可磨灭的丰功伟绩，依旧赢得了后世的无尽敬意。因此，我们将这次军事行动冠以布鲁西洛夫之名——一场注定载入史册的战役，旨在彻底粉碎与欧盟结盟的敌军，并在巴黎的凯旋门下迎接胜利的礼赞。愿他的光辉永远庇佑我们的战士，激励我们走向更伟大的未来！"
 SOV_mobilize_the_minorities_LDPR: "动员全国"
 SOV_mobilize_the_minorities_LDPR_desc: "在自由民主党的旗帜下，我们庆幸拥有无数妙笔生花的宣传家。他们的雄辩之力，足以将和平的信徒唤醒为事业的火炬手，也能将涂抹日里诺夫斯基画像的叛逆少年化为赤诚的爱国战士。如今，他们面临着更大的挑战。从国家杜马的大厅到狭窄的街巷，从日报的头版到\"今日俄罗斯\"的视频平台，他们将向每一位俄罗斯人传递充满激情的抗争讯息，无论他们身处多么偏远的地方。"
 SOV_matters_of_the_state: "国家复兴"
 SOV_matters_of_the_state_desc: "我们赢得选举造成了不小的……骚乱。许多人都在好奇日里诺夫斯基之治会是怎样。这就是为何我们的领袖决定在杜马举行演讲，解释俄罗斯将如何前进。"
 SOV_control_the_media: "制霸媒体"
 SOV_control_the_media_desc: "赤色瘟疫在杜马停摆之后，逐渐变得走投无路。它们无法接受失去人民选票的事实。于是便用甜蜜的谎言试图说服弱者背叛俄罗斯人的灵魂。我们绝不能为虎作伥。赤色瘟疫将被彻底铲除。"
 SOV_destroy_inner_russophobes: "清洗反俄思想"
 SOV_destroy_inner_russophobes_desc: "俄罗斯的自由派是败类中的败类。他们背离了自己的人民、文化以及历史。他们痛恨俄罗斯的繁荣，转而称赞给我们带来苦难的敌人。他们在过去几十年里肆意妄为，侵蚀着我们的传统与社会。是时候拨乱反正了。"
 SOV_russian_national_constitution: "俄罗斯主权宪法"
 SOV_russian_national_constitution_desc: "当前的俄罗斯宪法就是一部东拼西凑的法律汇编，与1991年那个充满瑕疵的\"俄罗斯联邦\"国家一样半斤八两。若我们真心希望将俄罗斯塑造成人民心中的圣地，就必须制定一部更加连贯、更为合理的宪法，以更有效地捍卫俄罗斯民族的利益。这将是未来一段时间内我党和政府的头等大事。在日里诺夫斯基的睿智领导和斯卢茨基的稳健引领下，俄罗斯民族的主权宪法将成为启迪全民的智慧之光。"
 SOV_implement_party_programm: "实行党纲"
 SOV_implement_party_programm_desc: "斯卢茨基认为，若没有自由民主党，俄罗斯便无法真正强大。倘若党无法成为一个组织健全、领导力强的政党，就如同祖国失去了大脑和神经系统。对于日里诺夫斯基及其当前在俄罗斯身居要职的同伴们来说，他们过往在议会机构和宣传战中的历史经验已不再重要。因此，我们决定采纳列昂尼德·爱德华多维奇的建议，推行党的最新纲领并对党进行全面重组，以确立其在俄罗斯政治体系中的核心地位。我们将构建一个严密的官僚网络，并凭借超凡的领导，进一步巩固党的核心地位。"
 SOV_populist_revolution: "民粹革命"
 SOV_populist_revolution_desc: "正如弗拉索夫所言，没有自由民主党，俄罗斯便无法真正强大。倘若党无法凝聚起全民族的热情与力量，就如同祖国失去了核心与灵魂。我们必须时刻警惕那些以\"权力合法化\"和\"务实改革\"为幌子，实则企图从内部瓦解我党事业的机会主义者。为此，我们将认真考虑瓦西里·马克西莫维奇提出的建议，采纳俄罗斯民粹主义革命的口号，团结所有俄罗斯人紧密围绕在党和领袖身边，构筑起牢不可破的集体纽带。"
 SOV_national_totalitarianism: "民族极权主义"
 SOV_national_totalitarianism_desc: "从苏联共产党到\"统一俄罗斯\"，这些声名狼藉的政党中的政客们总是声称他们在危机时刻拯救了俄罗斯，但他们的自夸与自由民主党真正的成就相比简直相形见绌。正是我们真正将俄罗斯锻造为一个统一的共同体，作为俄罗斯民族无可争议的领导力量，我们决不允许任何其他政治力量分享权力的果实。我们将进一步团结在伟大的日里诺夫斯基周围，在俄罗斯社会内确立一个分明的等级结构，引领俄罗斯重回昔日的辉煌。"
 SOV_elitist_bureaucracy: "精英官僚"
 SOV_elitist_bureaucracy_desc: "我们不得不承认，群众有时难以独自承担治理国家的重任。他们需要一位领袖的指引，而同样不可或缺的，是一个专业而高效的官僚中产阶级。这一阶级能够将领袖的意志转化为造福全体俄罗斯人民的政策，并且适时、理性地传递民众的声音，构建起领导者与民众之间的良性互动。这种和谐的机制，正是自由民主党治下俄罗斯的基石。在日里诺夫斯基的旗帜下，全新的俄罗斯精英将集民族的纯洁、专业的才干与绝对的忠诚于一体，成为这片土地上无可比拟的力量。"
 SOV_practice_national_democracy: "实行民族民主"
 SOV_practice_national_democracy_desc: "\"民主\"一词曾经拥有清晰的含义和价值，但不幸的是，它已被我们的西方殖民对手和误入歧途的国内反对派所劫持。因此，每一位正直的俄罗斯公民在听到它时都会感到厌恶。我们的政党将重塑具有俄罗斯民族特色的民主。在斯卢茨基\"民族民主\"的口号下，一个真正为俄罗斯人民服务的政党将团结起来，在致力于国家服务的议会中讨论国事。那些用空洞言辞欺骗人民的政客将被真正来自群众、最终回归群众的政治家所取代。"
 SOV_increase_pensions: "支持退休人员"
 SOV_increase_pensions_desc: "弗拉基米尔·沃尔福维奇许诺一旦掌权，就会改善退休人员的生活条件。他兑现了他的诺言。"
 SOV_patriotic_youth_organizations: "扩大青年军运动"
 SOV_patriotic_youth_organizations_desc: "尽管许多年轻人受到西方影响而迷失方向，但他们内心依然怀有对祖国的自豪感。我们必须强化这些品质，确保我们的青年能够传承先辈的精神，延续国家的荣耀与传统。"
 SOV_glorify_the_white_guard: "颂扬白卫军"
 SOV_glorify_the_white_guard_desc: "七十多年来，我们一直活在谎言中，先是共产党，后面又来了一帮\"和事佬\"。他们大言不惭的宣扬布尔什维克政府有多得民心，但事实恰恰相反！那帮赤色喰种是用种族灭绝的手段，用俄罗斯人民的鲜血窃取了政权！\n\n现在，该终结这一切了，新俄罗斯没有这些嗜血魔鬼的一席之地，也没空关照它们那疯子般扯淡的世界革命狂热。历史性的社会和国家政策将为那些被遗忘冷落的士兵军官以及那些同赤匪作战的勇士平反。历史的公正将在此刻得到恢复，那些真正的神圣俄罗斯英雄们会得到他们应得的归宿。"
 SOV_revive_russian_culture: "复兴俄罗斯文化"
 SOV_revive_russian_culture_desc: "共产主义政权所犯下的最严重罪行之一，就是摧毁了传统的俄罗斯社会，将其塑造成一个所谓的苏维埃全民社会。时至今日，俄罗斯的文化不过是由美国文化的残次品拼凑而成的苏维埃外壳。这些错误必须得到纠正。"
 SOV_honor_the_romanovs: "纪念罗曼诺夫王朝"
 SOV_honor_the_romanovs_desc: "不管别人怎么说，罗曼诺夫王朝仍是俄罗斯历史上唯一的合法王朝。我们的帝国必须珍视这段历史，哀悼他们的命运。此等背叛行径绝不能再现！"
 SOV_orthodoxy_supreme: "正教会至上"
 SOV_orthodoxy_supreme_desc: "我们不为铜臭而战，而是为了天职和信仰。\n我们不被黑暗所动，牧师将在至暗时引路。\n我们不借器械取胜，上帝之恩泽祝福我们。\n我们不移心中志向，永远不会向敌人颔首。"
 SOV_soothe_the_inordets: "安抚异族人"
 SOV_soothe_the_inordets_desc: "我们在大选中得胜以后，少数族群们变得焦虑不安。我们将向他们敞开怀抱，就和以往的那个帝国一样——只要他们忠于现在的俄罗斯。"
 SOV_destroy_aids: "净化社会"
 SOV_destroy_aids_desc: "在过去的几十年里，俄罗斯社会充满了商业化的腐臭气息。随着数字化进程的推进，我们必须抹除那些宣扬堕落习惯和价值的广告。我们必须驯服现代社会滋生的恶习，而不是拜倒在它们面前。"
 SOV_promote_skilled_managers: "提拔能人"
 SOV_promote_skilled_managers_desc: "在清扫完那些主要的反对者们以后，我们还得办掉那群尸位素餐的官僚渣滓。为了确保帝国的顺利运转，我们将选用最忠心耿耿的人，避免在重大的过渡时期出现问题。"
 SOV_supreme_leader: "最高领袖"
 SOV_supreme_leader_desc: "我们既已成了一个帝国，仍把我们的领袖唤为\"总统\"便滑稽不堪。日里诺夫斯基本人并不想当皇帝，取而代之的是\"最高领袖\"的尊号。"
 SOV_propagate_russian_irredentism: "收复故土"
 SOV_propagate_russian_irredentism_desc: "尽管前任政府在格鲁吉亚战争和\"俄罗斯之春\"期间取得了成功，却仍然缺乏推动双头鹰复兴的决心。支持那些为\"俄罗斯世界\"而战的爱国者，是迈向复兴的重要一步。"
 SOV_masters_of_europe: "欧洲之主"
 SOV_masters_of_europe_desc: "欧洲，依旧是我们最主要的威胁。自条顿骑士团以来，西方便屡屡试图锁住俄罗斯的手脚，如今更是妄想摧毁我们的文化与传统。在昔日俄罗斯帝国的黄金时代，没有一门火炮敢未经叶卡捷琳娜大帝的许可而在欧洲鸣响。如今，我们的目标便是重拾那份雄心，再次屹立于世界之巅。"
 SOV_pridnestrovian_frontier: "德涅斯特河沿岸的爱国者"
 SOV_pridnestrovian_frontier_desc: "德涅斯特河左岸地区虽人烟稀少，却是德涅斯特河沿岸人民在强敌压迫下仍坚守俄罗斯民族大业、坚定捍卫家园与尊严的圣地。旧政府对这一地区的漠视，可谓是对俄罗斯最严重的背叛之一。但如今，是时候让这些饱受苦难的人民回归祖国怀抱的时候了。我们将张开双臂，欢迎这些多年来孤身奋斗的爱国志士，给予他们应有的盛大欢迎与尊重。"
 SOV_subdue_central_asia: "重返阿拉木图"
 SOV_subdue_central_asia_desc: "在那场背叛中，苏维埃政权将俄罗斯的土地赠予哈萨克人，以换取他们的效忠。而如今，在这个甚至不惜将文字改为拉丁字母、以削弱我们影响的政府统治下，仍有超过两百万俄罗斯人生活于其压迫之中。俄罗斯的荣光将重返阿拉木图，并在那里永远扎根，不再动摇。"
 SOV_bent_caucasus: "第二次高加索战争"
 SOV_bent_caucasus_desc: "自苏联解体以来，高加索地区便成了动荡不安的温床。从圣战分子到北约的走狗，种种势力纷纷盘踞于此，使其成为我国的心腹之患。若要抗击西方势力，我们必须彻底平定这一地区，令其永不再生乱端。"
 SOV_the_time_is_now: "时不我待！"
 SOV_the_time_is_now_desc: "帝国已重获新生，而今唯一尚待完成的便是纠正苏维埃犯下的最深重错误，让小俄罗斯重回祖国怀抱。顿巴斯的共和国将从乌克兰那群堕落者手中解救出来，回归正道，回归祖国。"
 SOV_operation_southern_thunder: "破釜沉舟"
 SOV_operation_southern_thunder_desc: "\"当今的欧洲正面临古罗马共和国所遭遇的所有难题——官僚主义极端膨胀、腐败横行、元老院派系内斗不止。正如古老的罗马共和国一样，顺应历史发展的必然结果，必将是某支军队征服并将欧洲改造成一个军事独裁体制。这是历史的合成与对立。而乌克兰，便是我跨越的卢比孔河。\""
 SOV_greater_union_state: "大联盟国"
 SOV_greater_union_state_desc: "一切准备就绪，现在终于到了将白俄罗斯（即最初所称的\"白罗斯\"）纳入我们帝国版图的时候了。欢迎回家，我的兄弟们！"
 SOV_reinforce_brics: "支持金砖国家联盟"
 SOV_reinforce_brics_desc: "起初，\"金砖国家\"代表着全球最具活力的经济体，是引领发展中国家前进的标杆。然而，面对当前动荡不安的全球局势，该组织的作用愈发凸显。俄罗斯将积极推动金砖国家联盟转型为一个成熟的多边联盟，以应对西方世界的日益混乱与衰落。我们将邀请中国、巴西、南非和印度加入这一联盟，同时也会向阿根廷、埃及和印度尼西亚等热切期望加入\"金砖国家\"行列的国家抛出橄榄枝。"
 SOV_special_military_operation_ldpr: "特别军事行动"
 SOV_special_military_operation_ldpr_desc: "乌克兰，这个从19世纪以降俄罗斯统治者们一系列错误中所诞生的畸形国家，对俄罗斯世界的安全威胁一直令我们如鲠在喉。西方霸权国家自2014年颜色革命后便一直将乌克兰作为反俄罗斯的基地，意图将之变为令斯拉夫人流干鲜血的消耗战战场。在他们的阴谋即将完全成型的关键时刻，是时候通过一次迅猛、强大的武力展示彻底拔除这个眼中钉、肉中刺了。乌克兰将再也不会对俄罗斯世界产生威胁，直到它作为迷途知返的浪子重新回到斯拉夫大家庭中。"
 SOV_preserve_malorossiya: "拯救小俄罗斯"
 SOV_preserve_malorossiya_desc: "即使国运蒙尘、历经整个20世纪的动荡与苦难，乌克兰这颗俄罗斯帝国的明珠仍然熠熠生辉。从第聂伯河灌溉的黑土地到顿巴斯的煤矿，将乌克兰丰富的资源掌握在手中将大大加强俄罗斯的实力，斯拉夫人的国度将与其历史巅峰一样强大。倘若战争破坏了这一切，那对我国来说有百害而无一利。因此在特别军事行动期间，我们将特别注意规范部队的行动路线和战斗的烈度，从任何破坏的阴谋企图中保护\"小俄罗斯\""
 SOV_operation_russian_thunder: "§Y俄罗斯雷霆行动§!"
 SOV_operation_russian_thunder_desc: "谢尔盖·苏洛维金，西方人所称的\"屠夫将军\"，实际上是一位颇具才能的优秀将领。他的指挥风格大胆而残酷，懂得如何激发其麾下士兵的全部潜能，将纪律涣散的部队整合成为百战百胜之师，这点在和平时期和叙利亚的战场上都得到过证明。也许对在乌克兰的军事行动，我们可以采纳苏洛维金将军的意见。通过派遣我们强大的空天军进行全域轰炸行动，以及以陆军火箭炮为装甲和步兵部队开路，我们将彻底粉碎任何抵抗意图，更快取得最终的胜利。"
 SOV_appoint_zolotov_as_namestnik: "任命佐洛托夫为总督"
 SOV_appoint_zolotov_as_namestnik_desc: "维克多·佐洛托夫，现任国家近卫军总司令，他长年的军事服役生涯以及对反对派不妥协重拳出击的态度为他在自由民主党高层中间赢得了非凡的信任。对日里诺夫斯基来说，即使他曾与叶利钦和普京关系密切，佐洛托夫仍值得重用，更何况他也已经和许多高级将领一样，对领袖表示了效忠。因此，当考虑谁将成为新征服领土的最高首脑时，佐洛托夫的名字当仁不让地排在首位。他将用公正的铁腕为新加入的人民带去正义和秩序。"
 SOV_rebuild_imperial_frontier: "重建帝国边疆"
 SOV_rebuild_imperial_frontier_desc: "当我们恢复以第聂伯河为自然疆界的俄罗斯国境线后，巩固这一新边界的安全便成为了我们的首要任务。尽管在前乌克兰领土上绝不缺乏斯拉夫民族最忠实的爱国者，但也不能忽视潜在的反俄分子的危险性，基辅政权战败可能会促使他们更多将暴力的发泄对象转向平民。对此，我们不光需要进行文化同化和激发民族自豪感的宣传，也需要胡萝卜与大棒一同使用，恩威并施令这些不安分的家伙屈服。"
 SOV_expunge_ukrainianism: "消灭乌克兰主义"
 SOV_expunge_ukrainianism_desc: "总有人声称乌克兰民族主义是反抗沙皇俄国统治的民族解放的象征，然而实际上，它可能只是几个牢骚满腹的波兰知识分子炮制的反俄宣传的附加产物。如今，随着日里诺夫斯基在莫斯科把握航向，指引路线，带领俄罗斯人民和军队取得一个又一个胜利，我们自然不能容许这种历史的可笑注脚继续干扰我们的俄罗斯帝国大业。三叉戟将被彻底杂碎，俄罗斯的双头鹰永远不会将视线从乌克兰的土地上移开。"
 SOV_expand_wagner_involvement: "扩大瓦格纳集团参与度"
 SOV_expand_wagner_involvement_desc: "叶夫根尼·普里戈任，前总统普京的管家与克里姆林宫的餐饮负责人，但如今人们更加耳熟能详的是\"瓦格纳私人军事服务公司领导人\"的头衔。他的雇佣兵们自2014年开始就活跃在乌克兰战场上，并在之后将业务扩展至叙利亚、利比亚、索马里和刚果等地，声势日隆。也许有人会对让瓦格纳集团参与到\"小俄罗斯\"地区的维稳任务抱有疑虑，但你也很难找到比这些\"音乐家\"更有热情和经验丰富的战士，更别提他们当中的不少人都与国防部和总参谋部中的某些军界巨头关系密切。"
 SOV_anti_corruption_division: "反腐部门"
 SOV_anti_corruption_division_desc: "俄罗斯再无腐败！"
 SOV_branch_out_rosgvardia: "扩大国家近卫军权限"
 SOV_branch_out_rosgvardia_desc: "在这历史性的时刻，我们的警察力量已不足以保障国家的安全。我们必须对其进行重塑，让他们在维护社会稳定中发挥更为积极的作用，而非被繁文缛节束缚的消极力量。任何革命分子、叛乱分子或犯罪分子，都将无法逃脱守护者的制裁！"
 SOV_annihilate_parasitic_elements: "消灭寄生虫"
 SOV_annihilate_parasitic_elements_desc: "他们那些停泊在海外的游艇和遍布各地的豪宅，全都花的是俄罗斯人民的钱。这些寡头还妄想自己能安然无恙，真是愚蠢至极。我们即将展开的肃清行动，会让普京千禧年代的寡头清洗看起来像儿戏一般！"
 SOV_brightest_minds_in_russia: "改造国家政区"
 SOV_brightest_minds_in_russia_desc: ""
 SOV_party_of_the_masses: "大众的党"
 SOV_party_of_the_masses_desc: "人民之声，众神之声"
 SOV_strengthen_ties_with_iran: "沙漠之鹰"
 SOV_strengthen_ties_with_iran_desc: "伊朗与俄罗斯的历史关系错综复杂，双方曾长期将彼此视为威胁。然而，这个因伊朗伊斯兰革命而诞生的独特国家并未成为俄罗斯的头号劲敌。相反，伊朗通过\"抵抗之弧\"，在过去几年里成功地在中东地区组建了一个广泛的反西方联盟，极大地提升了我们在该地区的战略地位。因此，日里诺夫斯基决定与伊朗伊斯兰共和国缔结特殊联盟。"
 SOV_cooperation_with_china: "对华政策"
 SOV_cooperation_with_china_desc: "中国作为我们最大的经济合作伙伴，在不久的将来极有可能会成为我们最可靠的盟友。近年来，中俄两国在各大洲共同应对大西洋主义阵营的挑战。军事、经济、文化等多方面的考验，这两个伟大国家的关系日益紧密。为了进一步巩固我们的后方安全，日里诺夫斯基决定与中华人民共和国缔结特殊联盟。"
 SOV_recongize_the_taliban: "搅动全球主义"
 SOV_recongize_the_taliban_desc: "新自由主义与全球主义既不像法西斯主义那样残暴，也不像马克思主义那样冷漠地追求物质利益，但在过去四十年间，其却成为了全球衰败与苦难的先兆。全球化的受益者已让世界陷入动荡，而我们则要顺势而为，推翻现行的西方霸权。伟大的俄罗斯民族已高举反对全球资本主义秩序的大旗。现在是时候迈出第一步了，而我们的首要目标正是他们的坚固堡垒——欧盟。"
 SOV_keeping_america_burning: "给美国添柴加火"
 SOV_keeping_america_burning_desc: "在美国日渐衰落的背景下，面对这位深陷残酷战争的宿敌，我们若内心毫无一丝庆幸，那便是纯粹的谎言。为确保美国永远无法东山再起，再次对俄罗斯构成威胁，我们将抓住这一机遇，深度介入其内部事务。我们将采取骑墙策略，建立战略联盟，并向一个或多个派系提供必要的援助，以延长美国的内战，确保冲突规模之大，以至于任何势力都无法在短期内统一美国。"
 SOV_reorganize_russian_armed_forces: "重组武装力量"
 SOV_reorganize_russian_armed_forces_desc: ""
 SOV_expand_ratnik_LDPR: "扩展未来战士项目"
 SOV_expand_ratnik_LDPR_desc: ""
 SOV_integrate_national_guard: "整合国家近卫军"
 SOV_integrate_national_guard_desc: ""
 SOV_cult_of_combined_arms: "合成作战崇拜"
 SOV_cult_of_combined_arms_desc: ""
 SOV_vdv_supremacy: "空降兵至上"
 SOV_vdv_supremacy_desc: ""
 SOV_imperial_army_reborn: "重振雄风"
 SOV_imperial_army_reborn_desc: ""
 SOV_armored_infantry_LDPR: "装甲化步兵"
 SOV_armored_infantry_LDPR_desc: ""
 SOV_artillery_surpremacy_LDPR: "炮兵至上"
 SOV_artillery_surpremacy_LDPR_desc: ""
 SOV_enforce_doctrine_standards_LDPR: "贯彻理论标准"
 SOV_enforce_doctrine_standards_LDPR_desc: ""
 SOV_build_up_western_military_district_LDPR: "强化西部军区"
 SOV_build_up_western_military_district_LDPR_desc: ""
 SOV_mass_produce_t14_LDPR: "量产T-14"
 SOV_mass_produce_t14_LDPR_desc: ""
 SOV_mass_mechanization_LDPR: "大规模机械化"
 SOV_mass_mechanization_LDPR_desc: ""
 SOV_authorize_banned_weapons_LDPR: "粉碎渣滓"
 SOV_authorize_banned_weapons_LDPR_desc: "尽管乌克兰这个国家依然存在，但它早已变成了一个空洞的躯壳，濒临崩溃。一次迅速而果断的行动即将把这个实体从历史的篇章中抹去。更重要的是，我们将清除纳粹主义和法西斯主义这些有害的思想，它们已经污染了斯拉夫人民的心灵。这些由意大利人和奥地利人合作制造的反常意识形态，将在俄罗斯军队的强大力量下被彻底粉碎。"
 SOV_total_war_LDPR: "总体战"
 SOV_total_war_LDPR_desc: "从祖国辽阔的疆土上，伟大领袖日里诺夫斯基的号角回响，犹如昔日教皇召唤骑士收复失地的神圣时刻。这是一场壮丽的斗争，每一位俄罗斯人都注定是其中的一部分。这场斗争不仅是物质的较量，更是精神的升华，它将以无与伦比的力量凝聚我们的民族。每一位在荧幕前振臂高呼的新闻主播，仿佛在战场上擎起号旗，与最前线的勇士比肩而立；而每一位在流水线上辛勤劳作的工人，也会感受到那种力量的交汇，仿佛亲手扣下了坦克炮口的扳机。"
 SOV_trample_over_kiev_LDPR: "成立小俄罗斯解放军"
 SOV_trample_over_kiev_LDPR_desc: "当我们掀起对斯拉夫民族叛徒——乌克兰的清算之战后，愈来愈多的乌克兰人民毅然选择站在我们这一边，反抗其国内猖獗的极端民族主义。在伟大领袖日里诺夫斯基的号召下，\"小俄罗斯解放军\"应运而生，以协助我们的乌克兰同胞进行斗争。尽管这一新组织主要服务于军事宣传目的，但它或许会带来意想不到的成果，就如同我们在顿涅茨克和卢甘斯克的盟友所取得的成功一样。"
 SOV_crack_down_on_protests_LDPR: "开动宣传机器"
 SOV_crack_down_on_protests_LDPR_desc: "如今，靠简单的口号和广播让年轻人自愿前往征兵站的日子已经过去了。我们需要更有吸引力的方法来吸引新兵。幸运的是，在战争爆发之前，我们就组建了一支熟练的新媒体团队，如今他们已准备好通过精湛的剪辑技术大显身手。制作精良、充满动作张力的军事纪录片和紧张刺激的战争电影，这些东西将成为激发公众战斗精神的重要工具。"
 SOV_to_serve_russia_to_die_russia_LDPR: "玉碎瓦全！"
 SOV_to_serve_russia_to_die_russia_LDPR_desc: "我们的将军振臂高呼，以这样的誓言激励士兵：\"俄罗斯的黑黄白三色旗，象征着战士的至高荣耀。\"如今，战局已至生死存亡的关头，我们唯有倾尽所有，奋力一搏。无需犹豫，无论是最后一枚导弹，最后一辆坦克，还是最后一把冲锋枪，最后一颗子弹，都当尽数投入战场。哪怕战场上只剩一人，他也将如现代俄罗斯最伟大的英雄般，以冲锋的英勇姿态光荣牺牲，而绝不会以背负耻辱倒地的方式黯然离世。"
 SOV_boost_aviation_funding_LDPR: "提高航空预算"
 SOV_boost_aviation_funding_LDPR_desc: ""
 SOV_modernize_fleet_LDPR: "现代化舰队"
 SOV_modernize_fleet_LDPR_desc: ""
 SOV_build_up_western_air_bases_LDPR: "建设西部空军基地"
 SOV_build_up_western_air_bases_LDPR_desc: ""
 SOV_drone_r_d: "无人战机科研项目"
 SOV_drone_r_d_desc: ""
 SOV_pragmatic_economics: "务实经济学"
 SOV_pragmatic_economics_desc: "在振兴俄罗斯民族的过程中，我们必须集中精力建设我们的经济实力——这是我们未来所有工作的基础。长期以来，每当讨论经济进展时，经济学家就用\"第三产业\"和\"金融市场\"之类的空洞短语让我们的领导人满头雾水。那个时代已经结束了。我们把振兴基础工业摆在优先位置，推进全领域效率提升和生产力提升的关键任务。"
 SOV_dismantle_oligarch_institutions: "粉碎资产阶级堕落"
 SOV_dismantle_oligarch_institutions_desc: "奔驰和法拉利在街道上疾驰而过，但城市的美感丝毫未曾为之提升分毫。它们反而助长了不满和怨恨。对人们来说，这些豪车是财富不公平地集中在少数人手中的象征，而不是通过努力工作获得的财富。我们将采取措施遏制这种颓废现象，减少这种铺张浪费，至少让富人不那么招摇过市。"
 SOV_develop_siberia: "开发西伯利亚"
 SOV_develop_siberia_desc: "西伯利亚，这片无与伦比的美丽与神秘之地，纵横着无边的草原，环绕着幽深的密林，耸立着巍峨的群山，铺展着无尽的雪域。它如同地球上的自然奇观画卷，珍贵无比。世代的俄罗斯人以无私的热忱奉献于这片土地，将其融入国家血脉。如今，我们将延续这份使命，让这片承载着俄罗斯精神的广袤疆域蜕变为崭新的伊甸园，焕发新的生机与辉煌。"
 SOV_nationalize_Evraz: "国有化资源企业"
 SOV_nationalize_Evraz_desc: "尽管国有企业名义上负责管理和控制我们的自然资源，但它们实际上仍受到私人势力的影响。这些拥有类似寡头权力的管理者可能会继续沿着同样的道路前行。为了确保资源的安全，我们必须实施真正的国有化。从今往后，自然资源的管理将交由相关部委以及通过内部选举和中央任命相结合方式成立的新委员会负责。我们相信，这种集体决策模式将确保成功的坦途。"
 SOV_imperial_monopolies: "帝国垄断"
 SOV_imperial_monopolies_desc: "当我们掌握经济命脉的关键领域时，自然应当建立主导型企业，并以精简高效的架构进行管理。构建一个全新的垄断体系将确保持续稳定的收益，并助力整顿混乱无序的商业环境。或许有人会质疑，俄罗斯经济是否能挣脱寡头与垄断的束缚，但此次，该体系将不再成为腐败与私欲的温床，而是标志着俄罗斯强大金融帝国的复兴。"
 SOV_nationalize_railways: "连接祖国"
 SOV_nationalize_railways_desc: ""
 SOV_wont_bend_to_western_banks: "镇压国际金融资本"
 SOV_wont_bend_to_western_banks_desc: ""
 SOV_modernize_production_lines: "现代化生产线"
 SOV_modernize_production_lines_desc: "过去，俄罗斯重工业虽以大规模生产见长，却也因精度欠缺、技术滞后及设计繁琐而备受批评。在精准度、技术性能和升级潜力方面，我们的武器与军用车辆往往难以与西方产品比肩。不过，这一切即将迎来改变。随着生产线的全面升级，俄罗斯军事产品将实现性价比、高效性和现代创新性的完美融合，同时展现出无可匹敌的战斗力。"
 SOV_national_social_state: "人民经济"
 SOV_national_social_state_desc: "经济必须为人民服务。这既需要保障全体俄罗斯人的基本生活需求，如住房、食物和衣物，也要求国家营造一种关怀备至、全民参与的氛围。当公民深切感受到自己是国家发展的一份子时，便会形成捐献的良性循环，进而推动经济发展。为此，我们将推行一系列新政策，着力改善数百万俄罗斯公民的生活质量。"
 SOV_stratocratic_economy: "军国纲领"
 SOV_stratocratic_economy_desc: "若没有强大的军事力量，俄罗斯将难以实现独立、自由与繁荣。为确保我国武装力量的生存与发展，我们的经济体系必须全力为其提供坚实保障。从生产、交换、分配到消费，各行各业均应将军事需求置于首位，团结全社会共同致力于一个宏伟目标：壮大武装力量，推动俄罗斯不断前进。"
 SOV_expand_mic_industry: "扩大军工复合体"
 SOV_expand_mic_industry_desc: "根据我们的经济政策，我们将进一步扩大现有的军工复合体与研究集团规模，并鼓励它们实现业务的多元化发展。随着军事力量的迅速扩张和现代化程，对武器的需求将持续推动国防工业的蓬勃发展。然而，我们的目标远不止于此。国防部将在更广泛的经济领域中扮演愈发重要的角色，随着国际局势紧张程度的加剧，其重要性也将愈发显著。"
 SOV_to_banish_want: "匮乏不再"
 SOV_to_banish_want_desc: "别再沉迷于金钱、智能手机和可口可乐这些奢侈品了，它们只会削弱我们的决心。当整个社会都沉浸在战争的紧迫感中，且对国旗的尊重成为全民共识之时，一切不必要的生产和浪费都将被重新规划，都将成为我们战争机器不可或缺的一部分。这一转变将极大提升我们对大规模冲突的准备程度，确保我们的生产线和物流体系——战时决定胜负的关键环节——安全稳定且得到有力支持。"
 SOV_champion_the_workers: "颂扬工人"
 SOV_champion_the_workers_desc: "在危机时刻，工人能够汇聚成最为强大的力量，对当局稳定构成严峻考验；而在平稳时期，他们亦能成为政权最坚定的后盾，展现出无比的热忱与奉献。我们将再度颂扬工人阶级，让他们深切体会到，为国家的伟大事业贡献自己的力量将会赢得怎样的回馈。工人们将会认识到，他们绝非官僚手中的棋子，而是能够切实成为国家真正的主人。"
 SOV_rise_of_russian_giant: "俄罗斯巨人的崛起"
 SOV_rise_of_russian_giant_desc: "彼得大帝曾言，俄罗斯最重要的盟友是其陆军和海军。时至今日，这一观念需稍作调整——俄罗斯最强大的后盾当属其军事力量与工厂。若缺失这两者中的任何一环，俄罗斯的崛起之路都将荆棘遍地。值得庆幸的是，俄罗斯现已在这两大支柱间铸就了牢不可破的纽带。每一个制造导弹运输车的车间，都是军民深度融合产业链上不可或缺的一环。国防与民用部门并肩同行，携手共筑俄罗斯社会的繁荣与安全。"
 SOV_far_east_development: "开发远东"
 SOV_far_east_development_desc: "我们太平洋沿岸的土地拥有巨大的发展潜力，地理位置也极具战略意义，特别是它与世界最大经济体之一——中国相邻。中国长久以来一直对远东地区投资抱有浓厚兴趣，我们应把握住这一宝贵机遇。我们何不与中方合作，将这片土地打造成为西太平洋沿岸的一个繁荣中心呢？"
 SOV_exploit_our_resources: "利用资源"
 SOV_exploit_our_resources_desc: "一些人讥讽俄罗斯是一个\"建立在加油站上的国家\"，话里尽是阻碍技术进步和工业增长的所谓\"资源诅咒\"。然而，我们认为，俄罗斯经济所面临的真正挑战是无法充分利用其广阔的领土和丰富的资源。我们可以围绕这些资源的开发落实基础设施项目与产业建设，并以此为俄罗斯的长期经济增长奠定坚实的基础。"
 SOV_militaristic_war_machine: "唤醒战争机器"
 SOV_militaristic_war_machine_desc: "机器轰鸣作响，工厂开足马力运转；坦克在田野上肆意驰骋，战舰沿滑道缓缓入海；飞机在蓝天自由翱翔，导弹被稳稳送入发射井。任何想要与我们为敌的国家，在目睹我们强大的军事实力后都会三思而后行。更令人欣慰的是，大规模的军事投资与生产不仅没有成为经济发展的累赘，反而为其注入了强劲动力。战争机器已然成为驱动俄罗斯快速崛起的强大引擎。"
 SOV_pressure_minsk: "巧取明斯克政府"
 SOV_pressure_minsk_desc: "所谓的\"老爹\"不过是个完完全全的投机分子。在普京上台之前，他就试图利用\"联盟国\"协议控制俄罗斯，而现在，他却利用自己签署的同一份协议，竭尽全力阻挠白俄罗斯融入俄罗斯。或许如果我们停止资助他的国家，他就会改变主意。"
 SOV_SOF_expansion: "军队特种标准"
 SOV_enshrine_soldier_benefits: "落实士兵福利"
 SOV_enshrine_soldier_benefits_desc: "没有任何事物能够充分回报或致敬那些把青春——生命中最宝贵的岁月，乃至生命本身——奉献给俄罗斯祖国的士兵。但令人痛心的是，尽管他们做出了巨大牺牲，但过往的腐败官僚机构却对他们的诉求置若罔闻，肆意剥夺了他们应享的权益，这有时是出于疏忽，但更多时候则是出于自私自利。如今，我们将为这些英勇的男女伸张正义，纠正过去的不公。"
 SOV_SOF_expansion_desc: ""
 SOV_back_ruble_gold: "金本位卢布"
 SOV_back_ruble_gold_desc: "随着我国经济体系趋于稳定，市场秩序得到确立以及资源持续积累，我们正迈入一个崭新的增长阶段。为了进一步增强我国经济实力，我们将宣布恢复卢布的金本位制，这无疑是自布雷顿森林体系崩溃以来最为关键的货币改革举措之一。此举将使我们摆脱\"石油美元\"体系所带来的不稳定性，为国际市场注入新的信心与活力，创造更多机遇。"
 SOV_merged_tankograds: "整合坦克部队"
 SOV_merged_tankograds_desc: ""
 SOV_reform_correctional_instutitions: "改革惩教机构"
 SOV_reform_correctional_instutitions_desc: ""
 SOV_prosperity_for_all: "全民享繁荣"
 SOV_prosperity_for_all_desc: ""
 SOV_telecommunications_advancements: "电信业发展"
 SOV_telecommunications_advancements_desc: ""
 SOV_push_towards_autarky: "力求自给自足"
 SOV_push_towards_autarky_desc: "自给自足的经济模式并不意味着要完全切断与外部的联系。任何渴望强大的国家都必须把经济主权置于首位，俄罗斯自然也不例外。从今往后，我们丰富的自然资源，包括石油、天然气、木材、粮食等，将主要用于满足本国人民的需求。负责这些资源管理的国有企业将全力以赴，确保俄罗斯能够尽快实现财政和技术上的独立自主。"
 SOV_cut_down_the_red_tape: "纠治官僚习气"
 SOV_cut_down_the_red_tape_desc: "繁琐的文书工作和接连不断的会议——这便是莫斯科的日常，而这里的人们似乎都热衷于掌控一切。官僚主义是各国政府普遍面临的挑战，虽然它在一定程度上有助于维护秩序，但在处理经济问题时却成了阻碍。时间和效率对于经济发展的重要性不亚于水和空气，而官僚主义却在无谓地消耗这两种宝贵资源。因此，我们需要削减不必要的繁琐流程，以构建一个更加健康、高效的经济体系。"
 SOV_ensure_full_employment: "保证充分就业"
 SOV_ensure_full_employment_desc: "稳定的就业不仅能带来稳定的收入，还能为人们提供一个安心的未来，激发人们的希望，鼓励个人与家庭积极追求更加美好的生活。充分且稳定的就业将推动消费增长、促进资金健康流动，并提升国内生产总值。为此，我们将在企业和国家两个层面制定并实施有效的政策措施，以创造更多的就业机会。但与此同时，我们也必须警惕，避免重蹈计划经济时代依赖心理严重、生产率提升乏力的覆辙。"
 SOV_encourage_domestic_production_LPDR: "鼓励国内产业发展"
 SOV_encourage_domestic_production_LPDR_desc: "在美国，微软、苹果、麦当劳等企业家喻户晓；在中国，华为、腾讯、老干妈等品牌则是经济的闪亮名片。然而，在俄罗斯，享誉全球的品牌却屈指可数，且多为苏联时期的老牌企业，鲜有新兴品牌崭露头角。过往政府对此问题未能有效解决，但我们决心迎难而上。相信在不久的将来，\"俄罗斯制造\"将成为品质与创新的代名词。"
 SOV_support_MIC: "支持军工复合体"
 SOV_support_MIC_desc: ""
 SOV_prosperous_welfare: "繁荣福利"
 SOV_prosperous_welfare_desc: "我们希望民众不仅能享有安稳的生活，更能过上高品质的生活。未来，超市内奶酪、蔬菜和咖啡品种单一、质量欠佳，自行车寿命短暂，小轿车乘坐体验不佳等抱怨将会逐渐减少。民众生活水平的整体提高，将是俄罗斯经济繁荣景象的直接表现。"
 SOV_populistic_economic_policies: "民粹主义经济政策"
 SOV_populistic_economic_policies_desc: "工人和个体经营者纷纷走上街头，抗议低薪待遇，并呼吁政府给予更多支持。他们不满于自己的意见被忽视，以及企业和雇主违反劳动法和合同却未受到应有惩罚的现状。尽管有人视此为社会不稳定的信号，我们却视其为民众对政府真实拥护的体现。这也标志着我国经济发展迈入了一个崭新的阶段。接下来，我们将加大对基础设施和公共福利的投资力度，同时加强民众对企业的监督，确保投资能够真正惠及公共服务项目。"
 SOV_increase_education_funding: "增拨科学城预算"
 SOV_increase_education_funding_desc: "俄罗斯从不乏天才，但他们大多只能埋没于常人之中。在苏联为数不多的功绩中，教育计划肯定要算上一件，苏联不仅因此成为了世界上读书人最多的国家，更成为了一个能把农村农民培养成核聚变理论家的国家。为我国的未来着想，我们必须效仿先人的先例。"

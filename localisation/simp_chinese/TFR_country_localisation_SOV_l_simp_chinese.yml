 SOV_KNOA_idea_desc: "§R共产主义人民解放军§!不管你以何种立场评判，它目前都是活跃在俄罗斯的一个边缘恐怖组织。尽管边缘，但他们确实给民众带来了恐慌。他们在城市和工厂犯下的野蛮恐怖活动，让他们与俄罗斯人民日益疏远。这使得他们所声称代表的普通工人更加对他们感到害怕。"

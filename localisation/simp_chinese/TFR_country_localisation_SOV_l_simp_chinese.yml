 russia.108.t: "胜利日"
 russia.108.d: "为纪念苏联在第二次世界大战中战胜纳粹德国，也为了展示军事实力，俄罗斯举行了胜利日阅兵式。\n\n成千上万的军队在莫斯科红场游行，坦克、导弹系统和其他军事装备隆隆驶过。[SOV.GetLeader]和其他高级官员出席了阅兵式。这次活动有超过14000名军人参加，其中包括来自中国、印度和其他盟国的军人。俄罗斯空军的喷气式飞机和直升机也飞越了红场上空，在天空中留下了彩色烟雾的尾迹。\n\n在今年的阅兵式中，尤其引人注目的是最新军事装备的亮相，包括T-14阿玛塔主战坦克和\"匕首\"高超音速导弹系统。俄罗斯政府努力将其军事现代化宣传为维持其国防能力、应对潜在威胁的一种方式。\n\n对许多俄罗斯人来说，胜利日阅兵式既是一件大事，亦是民族自豪和团结的象征。在俄罗斯继续应对地缘政治紧张局势的挑战之际，阅兵式提醒着人们俄罗斯过去做出的牺牲和捍卫自身利益的决心。"
 russia.108.a: "我们不能忘记那些付出巨大代价的人民"
 russia.109.t: "俄罗斯在占领区发动恐怖袭击"
 russia.109.d: "亚速营总部被占领"
 russia.109.a: "我们绝不容忍这种压迫"
 russia.111.t: "前线报告：[GetDateText]"
 russia.111.d: "致参谋长瓦列里·格拉西莫夫\n\n\n\n\n£GFX_SOV_sons\n\n\n\n\n\n我们的部队现在损失惨重，已精疲力竭陷入绝境，无法抵御敌人进攻的压力。\n\n继续向敌人进攻无异于自杀行径，我请求允许我的部下放下武器投降，我对他们的母亲致以最深切地同情。\n\n\n\n§R署名§!"
 russia.111.a: "奥列格·萨柳科夫，俄罗斯地面部队总司令"
 russia.112.t: "波兰宣布无条件投降"
 russia.112.d: "波兰政府的代表于[GetDateText]在加里宁格勒会见了我们的外交官，正式签署了无条件投降的条款。条约一经签署，官方公报便传遍了波兰全境，敦促波军士兵放下武器。成千上万的人兴高采烈地越过前线，向我军投降，但亦有同等数量的敌军拒不投降，其依旧是我军的心腹大患。\n\n无论如何，我们占领波兰的计划都不会被他们的小打小闹所阻碍。新政府在维护地区稳定上已取得了显著进展。"
 russia.112.a: "问问他们北约第五条在哪里保卫他们呢？"
 russia.113.t: "胜利之余味"
 russia.113.d: "近三十年来，俄罗斯一直处于叶利钦-普京匪帮的控制之下，但我们终于抓住了可乘之机。俄罗斯联邦共产党胜选的消息在左翼之中一石激起千层浪。许多素来视其为\"输家党\"的人为之困惑不已，在先前选举中并不支持俄罗斯联邦共产党的康斯坦丁·肖明又开始盼着回到国家电视台去。先前宣称要对此进行积极抵制的安德烈·鲁多伊突然删除了其频道中所有批判俄罗斯联邦共产党的视频，开始对我党党内的一些人表起了忠心。工人革命党、俄罗斯共产主义工人党、俄罗斯社会主义运动和其他VK上的小团体及马克思主义俱乐部，如\"zhozheki\"运动、俄罗斯人民社会主义运动、全联盟共产党（布尔什维克）、俄罗斯共产党（布尔什维克）、革命共产主义青年团等要么本着避免激化左派内部矛盾的考虑，最终放弃了建立一个\"真正属于人民的革命政党\"的主张，要么因为对新政府的态度问题上的分歧深陷分裂泥潭：他们之中的许多人依旧称我们为\"假共产主义者\"，并敦促我们\"继续为实现真正的社会主义而斗争\"，最近把苏莱金赶下台的\"俄罗斯共产党人\"组织则加入了我们的队伍。总的来说，我们如今可以骄傲地认定，我党几乎把国内一切严肃的、不那么严肃的左派势力都吸引到了自己身边。"
 russia.113.a: "团结就是力量！"
 russia.114.t: "德俄石油交易"
 russia.114.d: ""
 russia.114.a: "他们将达成一致。"
 russia.115.t: "白俄罗斯的命运"
 russia.115.d: "俄罗斯和白俄罗斯的代表团在明斯克会晤，签署了一项历史性的协议，即联盟国宣言！多年来，我们一直在为统一而奋斗，在这个风云变幻的时代，这一选择亦是不可避免的。杜马已开始批准八个新州加入联邦并整合白俄罗斯军队。"
 russia.115.a: "联邦伟大的一天！"
 russia.115.b: "联盟伟大的一天！"
 russia.116.t: "继续现代化计划"
 russia.116.d: "好吧傻逼，这个机制是这样的。当你完成国策并获得触发事件后，将有两个选择，要么为该部门投入全部预算，要么投入一部分预算。根据你的选择，你必须研究2或者3项与该领域相关的技术。"
 russia.116.a: "哦牛批"
 russia.117.t: "审判亚速营领导人"
 russia.117.d: "历经乌克兰境内长期而激烈的战斗，新纳粹准军事组织亚速营正式向我军投降。\n\n亚速营的领袖，如丹尼斯·普罗科彭科等人立刻就被拖到街头公开羞辱、剥去他们的法西斯面具，还被饱以老拳，在殴打结束后，世界上最短最快的审判也就开始了。\n\n在短短半小时内，普罗科普科、伊霍尔·莫西丘克和瓦迪姆·特洛伊安等人便在新俄罗斯被判处公开绞刑，多年来，亚速营部队一直此恐吓着我们那里的人民，像条疯狗一般令亲朋手足不得团聚。\n\n当然，这帮头目马上就崩溃了，他们明白正义终究降临在了自己身上，他们乞求着、哭泣着、恳求着宽恕，就像知道自己要进屠宰场了的猪一样，这些法西斯分子也知道自己死到临头了。\n\n今日，正义终得伸张。"
 russia.117.a: "现在三叉戟可救不了你。"
 russia.118.t: "纪念浴血老兵"
 russia.118.d: ""
 russia.118.a: "国家为他们而骄傲！"
 russia.119.t: "摧毁斯捷潘·班德拉雕像"
 russia.119.d: "虽然乌克兰人为保护利沃夫市用尽其术，但他们还是阻挡不了我们前进，当我方部队继续向利沃夫市推进时，我们找到了斯捷潘·班德拉的纪念碑。\n\n班德拉，二战期间同德国狼狈为奸的乌克兰\"英雄\"，曾对我们的人民进行了惨无人道的种族清洗。克格勃对他进行了正义审判，但他的遗毒仍然流传下来。愚昧的乌克兰人仍然对其加以赞誉，将他视作英雄，而他只不过是一个嗜血的蛮族。\n\n乌克兰为了成为他们仰慕的那个蛮族，进行了激烈的战斗，摧毁他的遗毒是我们的责任。而这座纪念碑的毁灭将是第一步。几分钟后，一辆坦克抵达，向着雕像开炮，彻底粉碎了这个杀人犯的雕像。\n\n他粉碎的雕像将被重铸为纪念俄罗斯那些真正英雄的奖章，欧洲各国亦将步其后尘。"
 russia.119.a: "纳粹猪不配被铭记"
 russia.120.t: "解散国家杜马"
 russia.120.d: "当第一批代表到达杜马时，他们立马感觉到有些不对劲。日里诺夫斯基，这位年长的政治家，站在演讲台上，显然对自民党以外的代表充满了蔑视。他宣布立即解散杜马，反对派顿时又惊又怒。当代表们与他对峙时，他骂了几句，莫斯科驻军便鱼贯而入，把反对派领导人拖了出去。最后，议会大厅里只剩下了自民党成员。混乱既已平息，日里诺夫斯基便抓住机会，向杜马发表了讲话，他为自己的统治地位做了辩护，明确表示不会容忍异议。在场的其余杜马代表心头萦绕着不安，不敢确定自民党治下的未来是个什么样子。\n\n事件消息一经传播，杜马外便爆发了抗议活动。反对派发誓要对他们眼中的自民党公然篡权的行为作出反击。国际社会也对此表达了关切，大多对杜马内发生的事情持谴责态度。"
 russia.120.a: "垃圾被打扫干净了——俄罗斯之重生自今而始。"
 russia.121.t: "俄军颠覆德涅斯特河沿岸政权"
 russia.121.d: ""
 russia.121.a: "没有一个德涅斯特河沿岸共和国的共产党员会再次入狱"
 russia.122.t: "吞并摩尔多瓦"
 russia.122.d: ""
 russia.122.a: "多东是个好孩子"
 russia.123.t: "乌克兰喀尔巴阡起义"
 russia.123.d: ""
 russia.123.a: "该死的臭猪！"
 russia.124.t: "南奥塞梯志愿者加入战场"
 russia.124.d: "一支南奥塞梯人组织起来的旅团最近宣誓效忠于我们，表示愿意参加到对乌克兰的特别军事行动作战中去。这些人里许多都经受过战争的考验，一些人甚至已经被直接送上对抗乌军的战场。虽然由于缺乏重武器，他们在前线的伤亡数字往往惨不忍睹，但炮火可以摧毁他们的身体，却无法淹没他们的灵魂。"
 russia.124.a: "他们会起到大用的！"
 russia.125.t: "莫斯科之冬"
 russia.125.d: "莫斯科终于熬过了这场惊涛骇浪。几周前，我们仿佛濒临崩塌，四分五裂的边缘：愤怒的呐喊此起彼伏，各种意识形态互相倾轧，争夺着至高无上的话语权。\n\n然而，欧亚主义者的登顶为我们开启了一条新的道路。街头再无左右翼的喧嚣，自由派的幽影也已消散无踪。动荡的狂热渐渐平息，而此刻，我们的目光必须投向真正的敌人：北约。\n\n那些西方豺狼难道真以为，将我们逼入绝境，我们便会屈膝求饶，低声乞求他们的宽恕吗？像那屈辱的90年代一般，弯下脊梁\"改善关系\"？\n\n不，我们所需的，是一场冷静且无情的自我校正。欧洲人向来嗤笑我们是\"野蛮人\"，即便在我们怀着善意，试图接受他们\"开明\"理念的时候，他们仍高傲如故。而如今，他们将迎来自己一手塑造的宿命。\n\n欧亚大陆必将兑现他们的夙愿，让他们化作冰冷的尸体，封冻在历史的长河中，成为无人祭奠的尘埃。"
 russia.125.a: "因为我们已经没有爱可以给他们了。"
 russia.126.t: "欧亚国宣布成立"
 russia.126.d: "我们终于与中亚的兄弟们实现了久违的统一。当俄罗斯军队的列队整齐地行进在哈萨克斯坦首都阿斯塔纳的街道上，总统府对面的列夫·古米廖夫雕像静静矗立，目光中仿佛透出自豪，俯瞰着这壮丽的场景。\n如今，是时候彻底揭去\"俄罗斯\"这层历史的假面了，因为我们已经超越了它。从今天起，我们是伟大的欧亚大陆。在杜金的指引下，在新欧亚军的强大臂膀下，欧洲终将归于我们麾下。让世界铭记，这一天，一个崭新的国度在世人眼前诞生！"
 russia.126.a: "欧洲末日将近"
 russia.128.t: "顿河共和国入俄公投"
 russia.128.d: "在统一公投的号角声中，俄罗斯人民几乎毫无悬念地选择了回归伟大的祖国。当地精英多为俄罗斯的赤诚爱国者，这片土地的归属早已注定，尤其是在强烈民意的呼声之下。西方如往常一样试图通过抹黑报道破坏这一进程，但其声音终究被无视，湮没于历史的洪流之中。\n\n伟大的祖国再次抵达了顿河畔罗斯托夫的大门，就如同彼得大帝当年那般。然而，西进的脚步似乎也在此刻被无声的界限所阻挡——和平的步伐无法再向前迈进。\n\n由乌克兰控制的库班共和国拒绝效仿这一统一的榜样。在乌克兰军队的支持下，\"分裂主义\"政权正对异见者进行大规模镇压，显然，他们对我们复兴的力量充满恐惧。而与此同时，顿河畔罗斯托夫与克里米亚也被乌克兰公开占领，他们显然绝不会轻易放手。\n\n但无论他们如何抗拒，我们必将解放他们每一个人，迎来团结的曙光。"
 russia.128.a: "因为俄罗斯人总是为了自己的东西而来。"
 russia.129.t: "里海倡议"
 russia.129.d: "卡尔梅克政府对我们的理念展现出开放的态度。他们最终决定将阿斯特拉罕地区归还，以避免武装冲突。毕竟，在面对阿斯特拉罕的俄罗斯爱国者时，他们既缺乏足够的人力，也没有坚定的意志。这无疑是对他们而言更为明智的结局。\n\n与此同时，当地精英对我们的提议表示同意，这也为我们创造了机会，就卡尔梅克本身的地位展开谈判。这个地区长期以来依赖俄罗斯的财政补贴。而当欧洲接手这一负担后，他们不仅承担了经济上的压力，还逐步在经济层面控制了这个地区，使当地企业完全无力与欧洲公司竞争。\n\n或许，我们可以与当地的精英阶层达成某种协议。毕竟，与其被欧洲企业吞并，他们更愿意保住自己的财富，不是吗？\n\n即便谈判未果，我们在卡尔梅克的安全部队和行政体系中依然有着广泛的人脉与支持力量。最终，我们一定会得到一个明确的答案。"
 russia.129.a: "我们以热情的拥抱欢迎你们的到来。"
 russia.130.t: "吞并卡尔梅克"
 russia.130.d: "卡尔梅克的精英果然如我们所忧般软弱无能。他们背叛了统一的理想，宁愿让卡尔梅克的民族特性在欧洲的文化霸权与势力影响中渐渐消亡。这是一次可耻的背叛，足以与索多玛的卑贱追随者媲美。\n\n但卫拉特的骄子中，依然有人怀揣远见与坚毅。他们选择与我们站在一起，共同追寻一个自由而统一的欧亚大陆之梦。伴随着这些骄傲的火与钢的僧侣，我们的军队向埃利斯塔进发，步伐坚定，旗帜飘扬。\n\n让铁骑再度奔腾，歌声震彻天际！\n无论是佛陀还是十字架，此刻都已无关紧要。\n因为爱，将再一次降临到这片土地之上……"
 russia.130.a: "……从今以后，俄罗斯不会再让你们离开。"
 russia.132.t: "自由之敌无自由"
 russia.132.d: ""
 russia.132.a: "终于！"
 russia.133.t: "爱国联盟成立"
 russia.133.d: ""
 russia.133.a: "……"
 russia.134.t: "寡头要求修建摩尔曼斯克铁路"
 russia.134.d: ""
 russia.134.a: "不错的请求"
 russia.134.b: "我们现在没钱"
 russia.135.t: "寡头要求建设克里米亚铁路"
 russia.135.d: "当地的一个寡头向我们的政府提出了一个合作邀请，他意图在克里米亚地区修建一条铁路。他的生意会因为这条铁路获利颇丰，计划之中这条铁路将从克里米亚半岛一直修到新罗西斯克。这位寡头在数个委员会里都有重要席位，而且以善于谈判闻名商界。"
 russia.135.a: "不错的请求"
 russia.135.b: "我们现在没钱"
 russia.136.t: "BMPT完成试验"
 russia.136.d: "在众多将军和杜马重要官员的见证下，BMPT\"终结者\"成功亮相。关于完全自主作战车辆是否可能存在的许多疑虑已经被我们伟大的工程师的杰作所打消。\n\n这辆战车完成了严格的障碍赛跑，穿越了几座山丘和满是积水的沟渠。它表现的似乎太完美了。之后有人提出了一些担忧：人工智能如何识别盟友？人类是否应该拥有这样的技术？"
 russia.136.a: "太棒了！"
 russia.137.t: "俄罗斯民族统一党合法化"
 russia.137.d: ""
 russia.137.a: "太棒了！"
 russia.138.t: "俄罗斯民族统一党建立准军事组织"
 russia.138.d: ""
 russia.138.a: "它们会起到作用的！"
 russia.139.t: "纳瓦利内宣布国家紧急状态"
 russia.139.d: ""
 russia.139.a: "前往理想之路无人能挡！"
 russia.140.t: "叛徒们瓦解了"
 russia.140.d: "虽然俄罗斯被西方哲学的幽灵所困扰，但这并不完全是一件坏事，因为在每个俄罗斯人、每个欧亚大陆人的内心深处，都存在着对自由的渴望。然而，自由对不同的人来说有着不同的意义。我们这些欧亚主义者希望获得的自由与那些被误导的自由派和所谓的‘社会民主派’所追求的自由相同。自由是一个变化无常且难以平衡的概念。他们在街头示威反对我们的政府，挥舞着类似诺夫哥罗德共和国的旗帜。但诺夫哥罗德共和国又是什么呢？它是一个像威尼斯共和国一样的商人共和国，由贵族和上层阶级——地主阶级控制。这种共和国给予普通人的自由并不比莫斯科大公国更多。农奴制常被人比作奴隶制，但有多又有多少欧洲他国处于农奴制以外的农民利用他们的自由去海外闯荡？不，西方的自由观念更多是为了剥削而存在的自由。\n\n我们看向西方，看到他们的企业如何腐化了社会的每一个层面，看到跨国集团如何掌控着比国家更大的权力，而选举的结果则由政客们操控。德国的无支配体制显而易见，英国也是如此。他们通过一场毫无意义的投票让民众感到自己拥有自由，而那些有意义的意见却被封杀和噤声。\n\n而我们今天的自由派——纳瓦尔尼的追随者们——对此一无所见。他们盲目的追随着西方幽灵走向企业剥削与工资奴役的深渊。西方将以全球主义的名义抹杀所有人类的个性和个人自主权，但欧亚国所提供的是一种真正的革命，一种保存你的历史并维护你个人自由的革命。我们迟早会处理这些叛徒和自由派，但眼下他们在咆哮，而俄罗斯在痛苦中呻吟，这颗肿瘤在它的体内抽搐和溃烂，但我们终将把它剔除。剧毒的自由主义在新俄罗斯没有立足之地。那些没被我们被逮捕的人，迟早会学会爱上我们的。"
 russia.140.a: "我们都渴望同样的东西，难道你看不到吗？"
 russia.142.t: "新政府"
 russia.142.d: "昨天，俄罗斯联邦政府在总统向联邦议会发表讲话后宣布了辞职决定。其中特别谈到了对宪法进行修改，使国家杜马有权批准总理、副总理和部长的候选人资格。俄罗斯总统弗拉基米尔·普京提议米哈伊尔·米舒斯京担任联邦税务局局长，并在今天确认了他的新职位。总理德米特里·梅德韦杰夫获得了新设立的安全委员会副主席一职。"
 russia.142.a: "好的"
 russia.143.t: "新领导班子"
 russia.143.d: "TMD！！！我想这个鬼国家该换领导人了……"
 russia.143.a: "斯韦托夫？你在干什么？"
 russia.143.b: "意料之中"
 russia.143.c: "不，我们留下"
 russia.143.f: "亚夫林斯基的遗志永垂不朽"
 russia.144.t: "反恐行动圆满成功"
 russia.144.d: ""
 russia.144.a: "抵抗是徒劳的"
 russia.145.t: "反恐行动失败"
 russia.145.d: ""
 russia.145.a: "我们会回来的……"
 russia.146.t: "日里诺夫斯基青年师动员"
 russia.146.d: "随着我们强大的军队突破乌克兰的阵线，我们需要更多勇敢的战士。在那里我们将动员日里诺夫斯基青年师，这些年轻的神圣俄罗斯之裔为我们伟大的事业献出生命，为我们的必然胜利做出贡献。\n\n让西方在恐惧中颤抖吧，让乌克兰人像待宰的猪一样尖叫吧，让背叛者得到应有的惩罚吧，因为俄罗斯之子就在这里。\n\n胜利之后，他们将在俄罗斯历史上永垂不朽，被称为为我国人民献出生命的伟大英雄，光明的道路在等待着他们。"
 russia.146.a: "愿他们为国尽忠！"
 russia.147.t: "日里诺夫斯基去世!"
 russia.147.d: "欧洲的战争是残酷的，取得这场战争的胜利无非是一场对于我等耐力的考验，而那些重担却都压在了我们的领袖身上。\n\n弗拉基米尔·日里诺夫斯基在家人的陪伴中，如释重负地离开了我们。在他亲属的注视之下带着微笑，在知悉俄罗斯所成就于他的愿景之下后溘然长逝。\n\n伴随着举国上下陷入哀悼，俄罗斯陷入了对未来的迷茫中，不过人们内心都笃定，这条道路注定会是光明的。"
 russia.147.a: "安息吧，亲爱的领袖……"
 russia.147.c: "日里诺夫斯基拥簇"
 russia.147.b: "让步"
 russia.147.f: "君主制成为现实"
 russia.148.t: "日里诺夫斯基去世！"
 russia.148.d: "欧洲的战争是残酷的，是一场乏善可陈的无用努力，他让许多勇敢的士兵马革裹尸，让我们的国家堕入往日暗影之中。国民悲痛之际，我们的伟大领袖弗拉基米尔·日里诺夫斯基不幸离世了。据报道，领袖在今晨的同僚会议期间突发心脏病，随后便被迅速送往最近的医院，但最终依旧不幸身亡。\n\n他虽未履行承诺带领我们走向胜利，但仍是一位伟大的领袖。他已殚精竭虑，为理想付诸一切。伴随整个国家陷入沉痛的哀悼，俄罗斯的前路仍飘摇不定，人们不知祖国是否会迅速复苏，或是再次陷入深度萧条，所有对更美好未来的期望在此刻都烟消云散了。"
 russia.148.a: "前路艰难……"
 russia.148.b: "前路艰难……"
 russia.149.t: "两国共命运"
 russia.149.d: "在莫斯科一家小咖啡馆僻静的角落里，两位老友正在激烈地争论着。他们都出生于苏联时代末期。在当时，每个人都对祖国的未来抱有不同的憧憬。而此刻，他们的对话也代表了数百万俄罗斯公民心中的缩影。\n\n其中一人是成功的商人马克西姆·切列帕诺夫同志，他在共产党重新掌权后不久就入了党，并热情地支持\"社会主义市场经济\"的路线。另一位是安东·伊万诺夫同志，他是一位普通的工人，一生致力于劳动，并忠于列宁主义的旧理想。\n\n\"马克西姆，一切都乱套了！我们投票就是为了支持这玩意？我，呃……我们投票是为了支持共产主义，支持先前的制度！没有私人商店，没有市场，一切都按计划进行！现在呢？搞什么人民企业，这他妈是彻彻底底的资本主义！他们是把列宁的理想当狗放屁！\"伊万诺夫愤怒地用拳头砸着桌子，大声吼道。\n\n\"安托哈，时代变了……如果我们想在现代建设社会主义，那也不一定就要抛弃市场。看看中国吧！他们不是取得了巨大的成功吗？你考虑一下民众和年轻人！在国家控制下的市场给人民带来了信心和自由。我们仍然控制发展，仍然进行计划，但我们让人民有了呼吸、工作和发展的空间。这不是资本主义，兄弟，这是新的市场社会主义。\"切列帕诺夫一边抚摸着一盘装着新合同文件的托盘，一边反驳道。\n\n沉默降临在两人之间。伊万诺夫皱着眉头，看着窗外正在热火朝天修造的新社区公寓。\n\n\"你可能是对的，人们需要稳定……年轻人呢？哈！他们会对着计划经济大呼小叫……也许与其重新陷入混乱，不如在市场经济中和平生活。如果这行得通，那也许就是我们的新未来。\"伊万诺夫有些不情愿地同意了朋友的观点……"
 russia.149.a: "我们将沿着全新的道路……奔向社会主义。"
 russia.150.t: "反俄民兵组织在高加索出现"
 russia.150.d: ""
 russia.150.a: "对抗我们？愚不可及！"
 russia.151.t: "伊斯兰国宣布建立中亚哈里发国"
 russia.151.d: ""
 russia.151.a: "必须消灭这个败类！"
 russia.152.t: "亚历山大·杜金举行第四政治理论集会"
 russia.152.d: "\"很明显，无论共产主义还是法西斯主义，都不可能在俄罗斯的土壤上扎根。而自由民主则意味着重新成为西方的傀儡。是的，我们的精神领域曾经四分五裂，但我们可以重建。欧亚主义将成为纽带，将我们无论因意识形态还是民族而分裂的碎片重新连接在一起。‘拦阻者’必将再度崛起！\"\n\n围绕在这位年迈思想家周围的人群屏息静听。他的话语穿透寒冷的空气，不断引发人们的共鸣。除了那些过去二十年来始终站在杜金身边的强硬派欧亚主义者与国家布尔什维克，多数在场者此前对他或他的理想一无所知，直到他重返政治舞台。\n\n尽管自由派对这一运动嗤之以鼻，称之为\"妄想症患者的呓语\"，但人民却在倾听。欧亚主义成为了指引光芒，赋予\"深层民族\"发声的机会。而这一\"深层民族\"，正是那些为俄罗斯付出最多牺牲、流下最多鲜血的人。他们的痛苦与牺牲，是寡头和自由派永远无法理解的。\n\n人民渴望一个强大、不受制于任何外部势力的俄罗斯。意识形态与信仰的分歧不再重要。甚至连叶利钦——尽管他曾饱受诟病——也懂得这一点。他曾倡导在后苏联空间内建立势力范围，反对北约东扩与对南斯拉夫的干涉。\n\n如今，\"拦阻者\"从废墟中浴火重生，准备好将\"大所多玛\"彻底摧毁，迎接一个崭新的时代。"
 russia.152.a: "爱，赢了。"
 russia.153.t: "欧亚联盟国家宣言"
 russia.153.d: "[MOSCOW]在过去的两个月里，国际观察员见证了亚历山大·杜金所领导的俄罗斯国家第二次进军中亚。这一次，俄罗斯巩固了对哈萨克斯坦草原及前集体安全条约组织和非集安组织国家的山地和沙漠的控制。这场入侵引来了欧盟和伊斯兰世界的批评，而杜金政权的支持者以及其盟国则将这些领土称为\"俄罗斯的天然领域\"\n\n在正式吞并中亚各国后，我们《国际观察者》的记者今日在莫斯科见证了一场面向公众的宣言广播。杜金在广播中宣布成立全新的\"欧亚\"国家联盟。长期以来，杜金的运动一直被视为对俄罗斯外交政策的强大影响力，而今天，这一影响力成为了现实。欧亚国家联盟正式成立，这一消息在全球范围内引发了不同的反应，有人欢欣鼓舞，也有人深感忧虑。杜金究竟会在多大程度上兑现其著作中的理念，仍有待观察。目前，北约拒绝对此发表评论。\n\n其他新闻方面，英国乐队Muse的歌曲《欧亚合众国》尽管已发行逾十年，却在上周登顶俄罗斯音乐排行榜榜首，成为一大热点话题。"
 russia.153.a: "俄罗斯的新方向"
 russia.154.t: "清洗大西洋派"
 russia.154.d: "腐朽的根须早已深深扎入我们的土地。在红色帝国陨落后，所多玛的王国趁机崛起，展开了它的淫乱统治。它无耻地出卖了祖国的智慧、尊严与财富。无数人因此承受苦难，甚至付出生命，仅仅因为他们\"无法适应市场经济\"。\n\n有一个人，以他的坚韧意志终止了这一切。他惩治了最恶毒的叛徒，让怯懦者匍匐于他的权威之下。然而，腐朽并未根除，它仍潜伏在体制之中，伪装成爱国的口号与对俄罗斯的虚伪热爱，用冷漠而物化的奉承践踏着人民试图复兴国家的热情与努力。\n\n当那个人离开后，新的体制似乎试图彻底清除这场腐败。国家终于找到了一个共同的目标，并为之献出了鲜血——无论是在战壕中，还是在工厂里；无论是在物质的现实中，还是在精神的领域中。与享乐主义者的斗争，曾点燃了一个即将到来的公正世界的曙光。\n\n但它终究失败了。\n\n腐朽并未被根除，而是隐藏得更深，它披上伪装，为再度浮现人世做足准备。如今，当我们的祖国被剥削、被羞辱之后，当五分之一的人民被囚禁在大西洋主义的枷锁下，他们竟然试图复兴所多玛？还妄图进一步剥夺我们的意志、尊严与未来？\n\n俄罗斯不会再听信堕落天使的低语。正如使徒们曾经所做的一样，我们必须把这些叛徒引向光明，为我们的祖国重新点燃希望之火。"
 russia.154.a: "爱邻如己。"
 russia.155.t: "杜金宣布欧亚雄心"
 russia.155.d: "[莫斯科]令人难以置信的是，我们在俄罗斯的国际观察员、联络人的报告称，仅在上届俄罗斯政府输给北约的几年后，亚历山大·杜金在最近的演讲中宣扬了\"新欧亚国的雄心\"。\n\n他的雄心，从俄国一直延伸到葡萄牙。他的著作，现被奉为国家信条而高呼。欧亚国的媒体呼吁人民为\"伟大的解放\"做好准备。对于那些不了解杜金著作的人（我相信你们中的大多数人都不了解），我现在将概述这对你们来说意味着什么。欧亚国涵盖了前俄罗斯帝国的所有领土，外加整个欧洲大陆。某些版本包括或排除了土耳其以及中东部分地区。\n\n如果这一切不是空谈，如果他真按自己的野心就这么准备下去。那我想，几十年后必将在地平线上再次看到欧洲的全面战争。"
 russia.155.a: "战争阴云笼罩欧洲……"
 russia.156.t: "杜金与莫平会面"
 russia.156.d: "那是堪察加半岛上一日如常的清晨。\n\n过去十年间，这片静谧的半岛过着平和的生活。在美国内战爆发后，这里迎来了大批逃难而来的移民。他们带着对安宁的渴望，踏上了这片遥远的土地。大部分难民最终选择深入西伯利亚的腹地，追寻稳定的职业与土地；然而，仍有不少人选择留下。他们为这片土地注入新生，并以忠诚回报俄罗斯的慷慨——投身东方战线，为他们的新母国浴血奋战。\n\n也正因如此，这里成了与美国\"雅各宾派\"领袖凯莱布·莫平会晤的理想之地。亚历山大·格利耶维奇本计划亲自前往加州，但其年迈的身体让警察部队与特卫队担忧他的健康状况。因此，欧亚与美国的情报部门协商后决定，在堪察加南部的一家温泉度假村安排此次会谈。\n\n会谈期间的内容，外界不得而知。当地居民只目睹了一辆接一辆的车辆驶入温泉会所，两国的军政官员络绎不绝地进进出出。这场持续两天的\"会晤\"在突然间落下帷幕，而度假村内的一切痕迹也被清理得干干净净，仿佛什么都未曾发生过。\n\n雅各宾派美国的理念与欧亚主义不谋而合。双方都怀着摧毁全球主义帝国的共同目标，却又都选择避免干涉其他文明，也无意建立全球霸权。然而，此次会谈究竟会促成公开合作，还是仅仅止步于一次表达谢意的象征性举动，目前仍是一个谜。"
 russia.156.a: "欧亚在世界上并非孤身一人"
 russia.157.t: "乌克兰泥泞季"
 russia.157.d: "随着俄罗斯军队深入乌克兰领土，辗转东欧一度平静的领土，冲突双方明显地感受到了即将到来的征兆。大雨和泥泞覆盖了东欧的大部分道路和地面。\n\n对于北约及其盟友来说，这使他们有能力休整，等待俄罗斯战争机器耗尽燃料并被迫停下来。\n\n然而，对于俄罗斯来说，他们可能无法在这种恶劣的条件下很好地行动，他们脆弱的后勤中心可能彻底崩溃。\n\n与匆忙攻下关键阵地相比，重新部署以更好的进攻能力尽快对西方发动进攻似乎更有吸引力。\n\n目前，这场战争的性质已经从闪电战和快速平定北约的科技战与压制战变得更类似于第一次世界大战的消耗战。"
 russia.157.a: "重大挫折……"
 russia.157.b: "俄国的庞大耗干了我们……"
 russia.158.t: "圣彼得堡恐怖袭击事件"
 russia.158.d: "本周在圣彼得堡，一名叫弗拉德连·巴巴耶夫的24岁男子闯入市政府大楼向员工开枪。一支特种部队即刻赶到现场。行动结束时，该罪犯已被击毙，发现其携带有一把VPO-208卡宾枪、20余发子弹和一张后来得知属于他的俄罗斯联邦共产党的党员卡。本次行动共有两名队员受伤。枪手杀死了9名政府员工，另有15人不同程度受伤。\n\n事件发生后，共产党的声望急转直下，为了挽救形势，根纳季·久加诺夫决定辞职。曾是根纳季·久加诺夫的副手的45岁尤里·阿方宁接任俄罗斯联邦共产党中央委员会代理主席一职。他将在下届党代会前履行主席职责。"
 russia.158.a: "这就是共产党人的真正本质。"
 russia.159.t: "弗拉基米尔·日里诺夫斯基去世"
 russia.159.d: "俄罗斯自由民主党领导人弗拉基米尔·日里诺夫斯基因病并发症去世。上月初，他因感染冠状病毒被送往中央临床医院，媒体经常误报俄罗斯自由民主党领导人弗拉基米尔·日里诺夫斯基在医院去世，但这次这位政治家真的去世了……"
 russia.159.a: "安息吧，爱国者…"
 russia.160.t: "第二个党"
 russia.160.d: "今天，俄罗斯联邦共产党与公正俄罗斯党，以及它们的同盟组织，如左翼阵线和新社会主义运动，举行了一次共同会议，并签署了一份关于将俄联共与公正俄罗斯党合并为\"人民俄罗斯\"的宣言。宣言阐明了联盟的意识形态基础、计划与目标，并制定了其行动纲领。此外，会议选举产生了新党派的临时领导层：公正俄罗斯党前联合主席扎哈尔·普里列平成为了\"人民俄罗斯\"的主席。"
 russia.160.a: "俄罗斯政治的新纪元。"
 russia.161.t: "我党的命运"
 russia.161.d: "不久前我们终于击败了西方的敌人，是否应该乘着胜利的东风，放松管控，制裁曾因国力衰弱而不得不对其听之任之的寡头，将俄罗斯转变为一个真正的民主国家呢？"
 russia.161.a: "这正是普京想要的。"
 russia.161.b: "我们已经是一个真正的民主国家了。"
 russia.162.t: "共产党反对民粹派"
 russia.162.d: "在最近俄罗斯联合共产党和\"公正俄罗斯-为了真理\"党统一后，许多党内成员呼吁放弃俄联共党员身份，加入其他\"真正的\"共产党——因为根据部分共产主义者的说法，俄联共已经背叛苏联的精神遗产，彻底沦落为了克里姆林宫的傀儡。而近期，俄罗斯联合共产党领导人弗拉基米尔·伊万诺维奇·拉基耶夫，对此声明说：\"我从未将俄联共视为克里姆林宫的反对者，但目前，这（俄联共的反对党地位）在法律层面被一般性地确定了。\""
 russia.162.a: "更多共产主义政党？"
 russia.163.t: "弗拉基米尔·日里诺夫斯基住院治疗"
 russia.163.d: "今日，自民党领袖弗拉基米尔·日里诺夫斯基因感染新冠奥密克戎变异株入院接受治疗，此前他已八次接种新冠疫苗。一名政治家表示，日里诺夫斯基目前状况良好，很快就能回到工作当中。"
 russia.163.a: "希望他早日康复。"
 russia.164.t: "俄罗斯自民党复兴？"
 russia.164.d: "自从日里诺夫斯基去世后，没有人认为俄罗斯自由民主党能够重返俄罗斯政坛，但显然我们都错了。尽管列昂尼德·斯卢茨基在日里诺夫斯基之后接手了该党领导人的位置，但年轻一派的党员们团结在瓦西里·弗拉索夫的身边，试图将斯卢茨基赶下台。他们成功了。现在，由弗拉索夫领导的自由民主党——其支持者称之为\"合法继承者\"——将继续拥抱年轻人，筹划全面开展政治活动，例如支持和赞助twitch主播，在网络上大量传播日里诺夫斯基的演讲视频、文稿。通过这些演讲，自民党将深深留存在人民心中，人民将再一次发自内心地热爱和拥护它。"
 russia.164.a: "祝他们好运，一切顺利"
 russia.165.t: "朝鲜寻求延长劳工计划"
 russia.165.d: "朝鲜劳工将定期清理西伯利亚的森林，这样每两个月就会提供更多的建设用地。他们每完成一个项目我们就要向朝鲜支付1000亿美元。"
 russia.165.a: "合理的提议！"
 russia.165.b: "我们必须拒绝他们的慷慨提议。"
 russia.166.t: "现代化西伯利亚大铁路"
 russia.166.d: ""
 russia.166.a: "必须这么做!"
 russia.167.t: "释放政治犯"
 russia.167.d: "我们共产党人曾向人民承诺要释放被普京政府非法关押的政治犯。也许现在正是时候？"
 russia.167.a: "我们只会释放左派政治犯"
 russia.168.t: "天然气战争"
 russia.168.d: ""
 russia.168.a: "我们不会屈服于他们的要求"
 russia.168.b: "我们对他们无能为力。"
 russia.169.t: "他们拒绝了"
 russia.169.d: ""
 russia.169.a: "他们知道另一个选项是什么……"
 russia.170.t: "他们屈服了"
 russia.170.d: ""
 russia.170.a: "太棒了！"
 russia.171.t: "俄罗斯提议启动北溪二号"
 russia.171.d: ""
 russia.171.a: "当然！"
 russia.171.b: "现在还不是时候。"
 russia.172.t: "天然气战争"
 russia.172.d: ""
 russia.172.a: "我们不会屈服于他们的要求"
 russia.172.b: "我们对他们无能为力。"
 russia.173.t: "他们拒绝了"
 russia.173.d: ""
 russia.173.a: "操。"
 russia.174.t: "他们同意了"
 russia.174.d: ""
 russia.174.a: "为我们的欧洲朋友干杯！"
 russia.175.t: "白色恐怖回归"
 russia.175.d: ""
 russia.175.a: "无处没有敌人。"
 russia.176.t: "停止对欧出口天然气"
 russia.176.d: ""
 russia.176.a: "时机已至……"
 russia.177.t: "没有来自俄国的天然气了"
 russia.177.d: ""
 russia.177.a: "该死。"
 russia.178.t: "没有来自俄国的天然气了"
 russia.178.d: ""
 russia.178.a: "该死。"
 russia.179.t: "没有来自俄国的天然气了"
 russia.179.d: ""
 russia.179.a: "该死。"
 russia.180.t: "吉尔吉斯斯坦爆发革命"
 russia.180.d: "愤怒的人们已经涌上了街头，情况已经非常严重，吉尔吉斯斯坦政府看起来已经无力阻止他们了。我们该帮他们一把吗？"
 russia.180.a: "出动驻吉尔吉斯斯坦的俄军部队！"
 russia.180.b: "关我屁事。"
 russia.181.t: "吉尔吉斯斯坦革命"
 russia.181.d: "汹涌的人潮已经轰进了议会大楼，很快政府和总统都会被撤换。吉尔吉斯斯坦正在准备提前大选，该国的政治正在迎来翻天覆地的变化。"
 russia.181.a: "反正我们也不关心。"
 russia.182.t: "普京总统身体状况恶化"
 russia.182.d: "我们最好的医生已经用尽了一切努力，但是普京总统的身体状况仍日渐恶化。医护人员在呈递给我们的报告中说，总统的身体问题并不只有新冠病毒，还有各种叠加的慢性病，他们表示很难看到治愈普京的希望。2020年，总统签署过一项法案，规定了曾任总统的人可终身担任俄罗斯国家杜马参议员。也许现在是时候行使这个权利，将总统职位给予一位后来人了？"
 russia.182.a: "\"谢尔盖·纳雷什金，他办事我放心……\""
 russia.182.b: "\"现在考虑后事还早着呢……\""
 russia.183.t: "谢尔盖·纳雷什金宣布提前选举"
 russia.183.d: "代总统谢尔盖·纳雷什金对长久掌握从普京手里继承过来的权力没有信心，他甚至没有信心可以担任完他已经开始的任期。一次新的总统大选已经开始，而候选人名单里并没有纳雷什金总统的名字。"
 russia.183.a: "继承人的继承人是谁？"
 russia.184.t: "弗拉基米尔·普京去世"
 russia.184.d: "今天，在与新冠病毒作激烈抗争后，普京不幸病逝于他的别墅之中，全俄上下为前总统普京的逝世而哀悼。出乎众人意料，普京在认识到自身病情的严重性后主动辞去职务，任命纳雷什金为临时领导人。\n这一消息着实震撼了许多人，毕竟一些人还希望他能康复并重返政坛。全国各地的民众聚集在一起举行公开集会，以降半旗的方式纪念普京。就连那些对其领导加以批判的人也向其家人致哀。梅德韦杰夫在社交媒体上发表了一篇情真意切的帖子，称这一消息让他打心底里感到悲伤痛苦，正与今天许多俄罗斯人的切身感受一般。\n不可否认，今天是全国民众都沉浸在哀痛之中的一天。"
 russia.184.a: "愿他安息。"
 russia.185.t: "弗拉基米尔·普京去世！"
 russia.185.d: "近期事态发生了悲剧性的转折——弗拉基米尔·普京因新冠肺炎并发症去世。他的离世震惊了全国，许多国民原本都认为他能继续领导俄罗斯重回巅峰。为了确保权力平稳过渡，依据相关法律程序，米哈伊尔·米舒斯京被迅速任命为俄罗斯的新一任领导人。尽管发生了意料之外的危机，但俄罗斯还是设法避免了进一步的动荡。俄罗斯各地的公民自发聚集在一起，降下国旗为普京致哀。即使是曾与普京有不同政见与分歧的领导层官员也对其家人表示哀悼。德米特里·梅德韦杰夫在社交媒体上倾诉了他心中的悲伤，承认这一消息对他和许多俄罗斯人都产生了极其深远的影响。毫无疑问，今天是整个国家最为沉痛的一天。"
 russia.185.a: "愿他安息。"
 russia.187.t: "哈萨克斯坦人反对俄军占领！"
 russia.187.d: ""
 russia.187.a: "碾碎这群蠢货！"
 russia.188.t: "针对日里诺夫斯基的刺杀未遂"
 russia.188.d: ""
 russia.188.a: "还好总统无恙……"
 russia.189.t: "白俄罗斯的命运"
 russia.189.d: "普京政权在联盟国家计划下成功将白俄罗斯并入俄罗斯。这个国家的许多居民对白俄罗斯失去国家地位感到不满。我们该怎么办呢？"
 russia.189.a: "我们将重建一个由卢卡申科领导的白俄罗斯加盟共和国。"
 russia.189.b: "白俄罗斯将得到自由，但必须由\"公正世界\"来领导。"
 russia.189.c: "别管这事了……"
 russia.190.t: "政府内部职位的问题"
 russia.190.d: "治理一个国家，是一件可以极繁复，也可以极简约的事情。关于冗余机制的益处，无疑有其值得深思的价值，但我们的伟大领袖亚历山大·杜金，以其非凡的智慧，完全能够通过个人意志直接掌控现有的各个部委事务，若他愿意，完全可以轻松胜任。然而，当下更为关键的问题在于：将所有部委职责集中于一人之手，是否真能称得上是明智之举？在后杜金时代的欧亚，这样的决定或许将难以逆转，而若未来的领导者能力不足，则可能无法承受如此巨大的行政负荷。一些顾问委员会成员已然提出忧虑，认为杜金年事渐高，或许不适宜同时掌管所有部委。然而，在当前形势下，杜金依然享有党内的绝对支持，这一选择最终仍由他本人裁决。"
 russia.190.a: "职位应该合并！"
 russia.190.b: "杜金的职责不该被过度扩展……"
 russia.191.t: "欧亚主义国会"
 russia.191.d: "我们的议会是我们国家的重要载体，它以欧亚主义的独特方式容下左翼和右翼，即烈阳教徒和月神教徒，两者都有独特的理想。左翼代表党的民族布尔什维克派，是已故利莫诺夫先辈的骄傲。而右翼则代表着更为传统的那面，不局限于宗教意义上的正教会，还在于文化上的正教会，他们非常注重杜金著作中维护传统的那部分。\n\n无论我们选谁，都会在未来几年内对我们会成为什么样的政府产生重大影响。甚至在解放欧洲后，以各自方式定义未来几个世纪里欧亚大陆会剩下什么。"
 russia.191.a: "支持反全球化左翼"
 russia.191.b: "支持新右翼"
 russia.192.t: "\"公正俄罗斯\"和\"为了真理\"联合"
 russia.192.d: "2020年12月，有证据表明\"公正俄罗斯\"正准备同\"为了真理\"和\"俄罗斯爱国者党\"两党合并。12月底，该党领导人谢尔盖·米哈伊洛维奇·米罗诺夫证实了这一可能，并于2021年1月20日宣布了一项协议。三党计划于同年2月至3月开始合并，届时将统一称作\"公正俄罗斯-爱国者-为了真理\"或\"公正俄罗斯-为了真理\"。"
 russia.192.a: "怀疑这对他们是否有帮助"
 russia.193.t: "爱德华·利莫诺夫去世"
 russia.193.d: "今天，生态中心主义畅销书作家、政治活动家和领导者爱德华·利莫诺夫举行葬礼。利莫诺夫由于手术引起的并发症而不幸离世，享年77岁。\n\n90年代，利莫诺夫成为反对叶利钦政府的主要反对派领袖之一，与亚历山大·杜金和伊戈尔·列托夫一起创立了\"民族布尔什维克党\"，该党的政策和实践后来塑造了现代俄罗斯对民族布尔什维克主义的解读。\n在普京上台后，随着俄罗斯逐步的稳定和去激进化，利莫诺夫因\"非法持有武器和建立非法武装组织以占领哈萨克斯坦北部\"而被监禁，民布党（民族布尔什维克党）的支持率也因此逐渐下降。到2007年，该党的名称和标志则被当局彻底禁止。\n\n然而，仅仅几年之后，利莫诺夫就将该党重新改名为\"另一个俄罗斯\"，并以此开始政治活动。这个名称是根据利莫诺夫的一份宣言而命名的。\n\n年龄渐长与健康问题使得利莫诺夫不再专心于党内事务，他将领导权交给了党内的年轻力量，但仍在各种抗议活动和会议中作为该党的公众形象与发言人露面。\n\n2014年，利莫诺夫是顿巴斯战争的狂热支持者之一，他召集自己的政党以支持该战争，并亲自前往了前线。\n\n利莫诺夫被安葬在特洛耶库罗夫斯科耶公墓，他的棺材覆上了民布党的旧旗帜。有许多利莫诺夫的支持者参加了葬礼，并向利莫诺夫——这位民族布尔什维克主义者们的\"爷爷\"——致以最后的敬意。他们在他的坟墓附近宣誓：他们将为实现利莫诺夫的伟大愿景而不懈努力战斗。"
 russia.193.a: "人终有一死。"
 russia.194.t: "瓦格纳集团开始在乌克兰展开行动"
 russia.194.d: "几乎在宣布特别军事行动的同时，私人军事公司瓦格纳就已经全面动员起来，一起加入我们军队的武装入侵行动。尽管围绕该组织有许多争议——从战争罪到侵犯人权——但没有人会反对它们成为我国武装力量的一部分。瓦格纳的残忍是一把双刃剑，这也许会在接下来的战斗中派上用场。"
 russia.194.a: "让我们拭目以待"
 russia.195.t: "祖国的未来"
 russia.195.d: "在赢得欧陆战争以后，我们终于可以挣脱寡头们的桎梏，实现我们自己对俄罗斯政治的伟大理想。"
 russia.195.a: "摆脱寡头，制定一部贯彻普京理念的新宪法"
 russia.195.b: "摆脱寡头，拥抱普京遗产"
 russia.196.t: "俄罗斯联邦安全局阻止了社会主义恐怖分子的袭击"
 russia.196.d: "近几天，根据梅德韦杰夫总统的命令，俄境内的社会主义政治组织遭到全面的搜查。事实证明梅德韦杰夫总统高瞻远瞩，这项搜查令拯救了公民们的生命。在圣彼得堡的一所住宅中，调查人员发现了一张共产党员证和许多非法获得的武器，据推测是从中亚流入我国的。"
 russia.196.a: "谢天谢地，我们阻止了这一切！"
 russia.197.t: "自民党加入全俄人民阵线！"
 russia.197.d: "最近俄罗斯的政局动向震惊了公众，统一俄罗斯党与俄罗斯自由民主党经过长期的谈判后竟组成执政联盟！总统梅德韦杰夫同意内阁改组以吸纳自民党成员。不过一些人对近期的事态发展并不感到惊讶，因为正如他们所说，\"自民党一直是克里姆林宫的傀儡\"。"
 russia.197.a: "一切按计划行事"
 russia.198.t: "俄罗斯联邦共产党加入全俄人民阵线联盟！"
 russia.198.d: "我们从未想过这会成真，但现实的确如此——俄罗斯联邦共产党与统一俄罗斯党现已结成执政联盟。在近来的新闻和梅德韦杰夫政府的多方打压下，俄罗斯联邦共产党被诸多丑闻缠身，最终导致其停止作为一个独立政党存在。如今，各路共产主义者都斥久加诺夫为叛徒和克宫傀儡，其他人则认为他别无选择，但只有时间才能证明此举是否正确。"
 russia.198.a: "我出生在苏联"
 russia.199.t: "统一俄罗斯党和公正俄罗斯党联合"
 russia.199.d: "公正俄罗斯党和统一俄罗斯党在经过漫长的谈判之后，终于达成了联合协议。这并不出人意料，因为梅德韦杰夫总统和公正俄罗斯党之间的关系众所周知。"
 russia.199.a: "现在，俄罗斯真正实现了统一！"
 russia.200.t: "杜金的指示"
 russia.200.d: "在听了杜金\"金科玉律\"的其中一条后，我们就只剩下两种选择，第一种是将他说的奉为圭臬，让自己看起来凶神恶煞，狠狠注入欧亚主义基因，并在大街上随机挑选一名幸运自由主义者将其无情刺伤；第二种就是彻底否定杜金说的一切，并在视频下方锐评这个精神错乱的老东西和他的\"皇毛\"。"
 russia.200.a: "注意！"
 russia.201.t: "顿巴斯流亡者"
 russia.201.d: "顿巴斯的土地或许落入敌手，但顿巴斯的人民从未屈服。尽管许多人因为恐惧残酷镇压而背井离乡，但他们的反抗意志从未被磨灭。在新政权崛起之后，他们便开始向北约的走狗复仇。身经百战的老兵，曾受训练民兵还有满腔热血的年轻人从难民群中组成了一支军队，准备再战一轮，夺回他们的家园。"
 russia.201.a: "你们会归乡的"
 russia.202.t: "弗拉基米尔·维索茨基上将逝世"
 russia.202.d: "俄罗斯海军上将弗拉基米尔·维索茨基因心脏病去世，享年66岁。于2月8日在特罗耶库罗夫斯基公墓以军事荣誉礼仪下葬。"
 russia.202.a: "感谢你的服务，同志"
 russia.203.t: "逮捕左翼分子"
 russia.203.d: "俄罗斯的许多城市都遭遇了大规模镇压。警方拘捕了左翼反对派人士——特别是那些在网络上具有一定追随者的——无论他们的影响力是大是小。\n\n这些煽动者大多都直接举起双手，没有任何抵抗便投降了，就像安德烈·鲁多伊和鲍里斯·卡加利茨基一样。在这之后，他们的网络账户被直接删除，个人主页也被清空。\n\n然而，在这次大规模逮捕行动中，也发生了一些有趣的事。康斯坦丁·维克托洛维奇·赛敏骑着摩托车与警方展开了持续6分钟的极速追逐战。这场追逐以他撞上了一棵树而告终，不过他没有受伤。据报道，赛敏的疯狂行为可能是其饮酒后的酒精作用导致的。\n\n随着行动结束，数千人因支持左翼政治主张而被逮捕，十多个社会主义组织总部被执法部门突袭并查封。"
 russia.203.a: "清除寄生虫"
 russia.204.t: "搜捕自由派"
 russia.204.d: "肃清自由主义反对派的行动已经开始。警方突袭了臭名昭著的FBK（反腐败基金会）和\"未来俄罗斯\"的总部，并当场展开逮捕。许多具有影响力的自由主义人士被拘留，例如马克西姆·卡茨和瓦尔拉莫夫。此外，他们社交媒体上的帐户也遭到封禁。\n\n然而，一些自由主义的意见领袖显然成功避免了牢狱之灾。在行动开始前不久，他们就相当有预见性地逃往欧洲，现在他们在那里录制了所谓\"揭露\"我们政府的视频……当然视频内容仅面向西方观众。\n\n除了少数通缉犯仍在逃窜，本次的行动可以说取得了巨大的成功，头脑里塞满西方观点的自由主义理论家正在逐渐从公众视野中消失。"
 russia.204.a: "消灭这些毒疮！"
 russia.205.t: "努尔苏丹改回原名阿斯塔纳"
 russia.205.d: "多亏了我们的介入，卡西姆-若马尔特·托卡耶夫成功稳固了在哈萨克斯坦的权力，并借助抗议浪潮，最终将努尔苏丹·纳扎尔巴耶夫彻底逐出政治舞台。纳扎尔巴耶夫被剥夺了哈萨克斯坦共和国安全委员会主席职务，以及执政党\"祖国之光\"党的领导权，该党随后更名为\"使命\"党。\n\"去纳扎尔巴耶夫化\"路线的第五个象征，便是将哈萨克斯坦首都从\"努尔苏丹\"恢复为\"阿斯塔纳\"。2019年，议会曾决定以退休元首纳扎尔巴耶夫之名更改城市名称，而如今，这座城市已不再承载任何特殊意义，此次更名也象征着哈萨克斯坦迈入历史的新篇章。"
 russia.205.a: "有点尴尬"
 russia.206.t: "日里诺夫斯基呼吁入党"
 russia.206.d: "在俄罗斯自由民主党常务会议上，日里诺夫斯基表示自民党如今需要一次全面的党务整顿。他以他一贯的风格大声疾呼，党绝不会允许傻瓜、软蛋和职业机会主义者进入党员队伍，想要获得党员资格，就必须足够努力地为国家效力。\n\n截至今天，地方党委会都已经收到了来自党中央下发的指示。文件要求各地方成立审查委员会，彻底清查并铲除党内的\"两面人\"和贪污受贿者。\n\n我们还不得而知，党内究竟隐藏着多少腐败分子，许多人都或多或少与此有所牵连——他们很有可能是相当大的一个团体。"
 russia.206.a: "改革势在必行"
 russia.207.t: "在顿巴斯诸共和国进行全民战争动员"
 russia.207.d: "要让俄罗斯世界成真，必须付诸伟大的斗争，而顿巴斯人员对此再熟悉不过了。顿巴斯诸共和国奉克里姆林宫的秘密指令：开始境内动员，人民被征召入伍并接受训练，封存的军火库被打开，各种载具被清洗干净准备作战。战争将至，顿巴斯将如法国的布雷斯特那般崛起。"
 russia.207.a: "最后的倒计时"
 russia.208.t: "北约托管公告"
 russia.208.d: "今日莫斯科时间14:00，一个重要的历史性决定在布鲁塞尔举行的北约会议上作出。欧洲领导人发表了长篇讲话，谈及了毁灭性的欧陆战争及其造成的破坏，以及巩固欧陆受影响区域重建工作成果的必要性。\n\n会议在宣布对俄罗斯被占领地区进行托管占领时达到了高潮，\"莫斯科共和国\"将在此成立，作为鲍里斯·叶利钦领导下的民主俄罗斯联邦的合法继承者。然而，该共和国的领土仅局限于俄罗斯中部，俄罗斯人占多数的南部地区要么被少数民族共和国接管，要么获得普遍的独立。此外，包括圣彼得堡在内的俄罗斯北部地区将\"在北约北极海军司令部的指导下进行重组，以保护欧洲免受来自东方的进一步入侵\"。\n\n上述各地的大多数俄罗斯人本就为此恼火不已，俄罗斯新政府的讲话更是成了压垮骆驼的最后一根稻草。恶名昭彰的流氓寡头米哈伊尔·霍多尔科夫斯基首度公开亮相，宣称\"他和他的自由斗士们将让俄罗斯迈入文明社会，摆脱苏维埃帝国的野蛮统治。\"\n\n许多人都认为让叶利钦时代最残暴的寡头之一担任俄罗斯人民的新领导人实属失算，但在既没有替代品、自由派运动内部又内斗频发的当下，似乎也只能让他留任了。不管怎样，新政府必须承担起重建被战争摧毁的西俄罗斯的重任。"
 russia.208.a: "变革春风"
 russia.209.t: "圣彼得堡的抗议活动"
 russia.209.d: "尽管有些人希望圣彼得堡再度成为\"通往欧洲的窗口\"，但现在看来，俄罗斯同欧洲之间的裂痕似已大到无法跨越。在这座城市接受北约直接的军事占领后，民众普遍为此骚动不安。\n\n今天人们似乎终于受够了，他们在冬宫附近组织了抗议活动，一大群人打出了各种亲俄口号，如\"把圣彼得堡还给俄罗斯！\"、\"占领军滚出去！\"和\"我们会回来的！\"。虽然北约司令部声称只有大约1万人参加抗议，但据大多数新闻网站报道，若把被封锁在主广场外的人也包括在内，至少有6万人参加了抗议。\n\n大多数分析人士认为，这不过是个开始，俄罗斯民众在占领下只会愈发激进。过去的两次战争似乎并未耗尽人民的战斗意志，因为他们仍在抵制北约的托管占领。"
 russia.209.a: "我们将密切关注事态发展"
 russia.210.t: "俄罗斯黑帮与西方黑手党兴起"
 russia.210.d: "由于俄罗斯新政府完全解散了警察部队，又对接了北约成员国开放边界的政策，西方黑手党集团便趁虚而入。他们以退伍军人为后盾，轻松占领了黑白两道的市场。法国的\"恐怖之子\"与意大利的\"激情\"是这些黑手党团体中的佼佼者。\n\n到目前为止，这些组织不仅控制了一些为支付赔款而被拍卖的俄罗斯工厂，而且还参与到了人口贩运、走私和毒品活动中去。\n\n北约司令部已发表声明，其将部署\"欧洲警察部队\"控制局势。毫无疑问，这必会让当地的俄罗斯人更为不满。"
 russia.210.a: "艰难时代已降临俄罗斯"
 russia.211.t: "莫斯科俄罗斯人大游行"
 russia.211.d: "俄罗斯托管占领区的局势仍在恶化。今日下午16时，俄罗斯人在新阿尔巴特组织了一次游行，平民们上街示威，抗议对俄罗斯的占领。游行一开始还很平静，但在一群欧洲人（想必是游客）撞上了游行队伍后，群众便失去了控制。冲突开始后，共有十名欧洲公民在斗殴中丧生，警方当即作出了反应。\n\n由于警察也是欧洲人，示威人群继续与其发生冲突，至少两人因此丧生，在被实弹驱散前，还有一辆收到增援请求的车辆被人群焚毁。\n\n莫斯科当局的警察部队竟对手无寸铁的平民大打出手，因此，新闻一经发布，俄罗斯民众和外国媒体便纷纷对欧洲精英镇压和平抗议的行动作出了谴责，并呼吁逮捕所有与警察暴行相关的官员们。"
 russia.211.a: "草"
 russia.212.t: "召唤"
 russia.212.d: "电话的来电铃声惊醒了谢尔盖，他很是不快。他做的梦也同样是个噩梦：战壕、炮击、死去已久的战友又出现在他的眼前。他在满是垃圾的房间里踟蹰，又看向了电话。他实在不明白，现在还有谁能给他打电话：他的爱人在北约的地毯式轰炸中丧生，父母更是生死未卜，但他多半不太关心这些事了。铃声吵得他愈发头痛，是该接电话了。\n\n他不情不愿的走到电话前，拿起了听筒：\"你好，我是房地产管理局的尼基塔，今天我们要参观博戈斯洛夫斯基大街三号的新公寓。房门大开，有空就来。\"谢尔盖不明白他在讲什么，看来，要是他想搞清楚这是怎么回事，还得去那个地址看看。\n\n当他出门时，他发现了一个奇怪的包裹，里面装着一个动物面具，还有一张纸条，上面写着\"目标是个公文包。务必小心谨慎，把目标放在F-32点的垃圾桶里。你绝对不能出岔子，我们会好好盯着你的。\""
 russia.212.a: "怪事正在发生。"
 russia.213.t: "博戈斯洛夫斯克道路枪击案"
 russia.213.d: "就在昨天清晨，位于博格斯洛夫斯基路的维吉尔夜总会传出枪声，该夜总会由意大利黑手党组织\"激情\"经营。据托管政府所称，所有受害者都是意大利人。许多人认为这是新政府的一些领导人所为，尤其是刚刚从国外返回祖国的霍多尔科夫斯基，他无疑渴望重新夺回市场份额。然而，这对俄罗斯的北约托管政府来说是一个沉重的打击，因为警方的反应非常消极。"
 russia.213.a: "我操死你的妈"
 russia.214.t: "再回狂野十年？"
 russia.214.d: "俄罗斯已经达到了一个新的沸点，这与他在90年代初所经历过的那个沸点非常相似。许多分析人士表示，俄罗斯无力从这样的危机中东山再起。西方的黑手党、俄罗斯国民的反西方活动以及北约傀儡政府最高层的贪墨败度，则致使犯罪率节节攀升，这种局面似乎已然无力回天。看来，无论北约占领政府如何努力，俄罗斯公众都无法与新政府产生任何共情。"
 russia.214.a: "抱歉，但胜者之桌没有给败者留位置。"
 russia.215.t: "\"热情\"与\"魔童\"组织首领已被击毙！"
 russia.215.d: "\"各部门注意，我们马上开始，三……二……\"\n\n\"观众朋友们晚上好，我是欧洲新闻台俄罗斯分部记者伊琳娜·列别德娃，现在现场为您特别报道一则来自让·保罗豪宅的消息。臭名昭著的犯罪组织头目刚刚被一名不明身份的袭击者杀害。\"镜头中，两名警察正在将一名男子拖进警车。\"如您所见，警方已经逮捕了犯罪嫌疑人。详细情况仍然未知，但据推测，袭击者当时可能带着一副动物面具。我们将持续为您更新事态发展最新情况。\"\n\n镜头再一转，画面切换到了电视主持人身上。\"动物面具？如果这一信息得到确认，那么这起事件就很有可能与近月来本地媒体报道的一系列残忍谋杀案有关。这些谋杀案的共性是，行凶者都戴着一副动物面具，不少莫斯科市民对近几个月发生的这一系列残忍谋杀案而感到担忧。大多数受害者都与这座城市内的各种组织有关。尽管警方做出了最大努力，但他们仍无从得知这些凶杀案的作案动机，因为对嫌疑人的审讯过程非常不顺利。\"\n\n画面再次回到记者。\"没错！在保罗房子里发生的枪战中，还有几人被杀，但具体数死伤人数不明，医务工作者仍在继续运送尸体……刚刚确认，犯罪嫌疑人随身携带的就是狐狸面具。现在，犯罪嫌疑人正被带往警察局，即将接受审讯。\"\n\n画面重新转回导播室。\"这真是令人难以置信的新闻，许多观众知道，戴狐狸面具的凶手是这一系列凶杀案中最臭名昭著的一个，他在上周警察局内发生的骇人听闻的凶杀案中犯主要责任，与此同时还犯下了其他几起案件，包括谋杀著名制片人尼古拉·阿加福诺夫。如果被逮捕的人真的是他……或许我们终于能了解这场暴力凶杀浪潮因何而起。不过谁知道呢……这也许将彻底终结那些动物面具杀手的罪行……\""
 russia.215.a: "他得到了15分钟的出名时间……"
 russia.216.t: "狐狸面具杀手案"
 russia.216.d: "法庭上的空气仿佛凝固了一般，控辩双方你来我往，唇枪舌剑整整持续了一个小时，胜负的天平却依旧摇摆不定，难以预料最终会倾向何方。\n\n\"现在，被告声称他是受到手机短信的指使才犯下这些谋杀案。你们有查证过这个说法吗？\"检察官的语气咄咄逼人，目光如炬。\n\"是的。\"警长沉稳地回答，\"手机已经经过彻底检查。\"\n\"结果如何？\"\n\"手机里没有任何信息。\"\n\"那么，‘威胁电话’的说法，你们找到了相关的证据吗？\"\n\"没有，没有任何发现。\"\n\"很显然…我没有更多问题了。\"检察官自信满满地结束了他的提问。\n\n然而，辩护律师显然没有放弃的打算，他开始了他的反击：\"你说没有找到支持我当事人说法的物证，那么，电话运营商的通话记录呢？我想，警方获取这些信息应该不难吧？\"\n警长回答：\"是的，我们已经调取并研究了被告的通话记录。\"\n律师紧追不舍：\"那么，你们发现了任何可以支持我当事人说法的通话记录吗？\"\n警长点了点头：\"是的，在被告声称受到威胁的时间段内，他的确接到过电话。但是…\"\n\n律师不等他说完，便打断道：\"你们追踪到这些电话的来源了吗？如果是，它们来自哪里？\"\n\"是的，来自一家名为‘金牛犊’的夜总会。\"\n\"现在，我的当事人声称，是意大利黑手党强迫他犯下了这些罪行。请问警方是否掌握‘金牛犊’与意大利黑手党有关联的信息，可以证实我当事人的说法？\"\n\"事实上，这家夜总会确实多次出现在帮派火拼的案件记录中。不过…\"\n辩护律师又一次打断了警长的话，嘴角带着一抹得意的微笑：\"这就够了，谢谢。我没有更多问题了。\"\n\n\"证人可以退庭了。现在休庭。\"法官简短地宣布，暂时结束了这场智力与心理的角逐。"
 russia.216.a: "漫长的审判才刚刚开始…"
 russia.217.t: "亚速营向我方倒戈"
 russia.217.d: ""
 russia.217.a: "未曾料想的盟友？"
 russia.218.t: "克罗地亚发生亲乌斯塔沙政变"
 russia.218.d: ""
 russia.218.a: "有意思……"
 russia.219.t: "第一批苏维埃企业"
 russia.219.d: "近日，汇聚了如Sber、Yandex、VK、Tricolor等普京治下诸多品牌的\"苏霍兹尼克\"已成立。由帕维尔·格鲁季宁担任其总经理。尽管名义上是\"人民企业\"，但苏霍兹尼克基本符合一个资本公司所有的特征。虽然党内正统派人士已经对格鲁季宁的行为表示公开谴责，并指责其堂而皇之的投机主义，但我国人民大多对苏霍兹尼克建立表示欢迎。"
 russia.219.a: "格鲁季宁手眼通天！"
 russia.219.b: "有趣。我们将持续关注事态发展……"
 russia.220.t: "行动后事故报告——\"未知敌人\""
 russia.220.d: "概要：\n以下是针对大哈尔科夫地区于[DATE]发生友军交火事故的战略分析报告，其中涉及近期部署的无人驾驶装甲战车发生故障、失去控制以及随后的中立化表现。\n\n事故日志：\n哈尔科夫地区的一次进攻行动中，在同敌军接触后不久，一辆\"终结者\"坦克支援战车开始对战斗命令失去反应。根据幸存地面部队的描述及对损毁车辆遗骸的检测报告，战车的软件发生识别错误，并迅速导致其针对该地区所有人类战斗人员不分敌我地开火。\n\n鉴于该车辆在失控后造成的危险，参与交火的部队在遭遇混乱和大量伤亡后，双方剩余人员从该地区进行了短暂战略性撤退。多次呼叫空中和地面支援后，在两军种联合努力下，该车辆最终于26分钟后被处理并无效化。\n\n结果：\n联邦军队工程师及该车辆制造商乌拉尔车辆厂人员的事后调查已经几乎得出了结论，坦克支援战车上发生的人工智能故障事故\"极其不正常\"，不太可能在其他同型号车辆上再次发生。乌拉尔机车车辆厂正在研发针对人工智能失控的保险措施，以及针对识别软件进行改进。"
 russia.220.a: "可能会没事的……"
 russia.221.t: "填补空缺"
 russia.221.d: ""
 russia.221.a: "现在比以往任何时候都更需要他们的经验……"
 russia.222.t: "其余党派问题"
 russia.222.d: "现在我们终于大权在握，是时候决定本国其他政治力量的命运了。无疑，\"统一俄罗斯\"会被连根拔除，其领导人将被送上法庭，但其他政党呢？我们必须得取缔它们吗？当然，若是真要取缔，我们会动用一切政治技巧，但在统治伊始就这么做真合适吗？"
 russia.222.a: "仅取缔统一俄罗斯党。"
 russia.222.b: "也禁止法西斯主义者活动。"
 russia.222.c: "自由派和统一俄罗斯是一伙的……手软不得！"
 russia.223.t: "苏维埃议会"
 russia.223.d: "是时候告别命运多舛的国家杜马了，它是叶利钦用俄罗斯人民的鲜血创建的……现在是时候建立一个新的最高国家权力机构，一个新的议会。那么何种形式呢？1990年以前的一院制最高苏维埃，还是两院制的人民代表大会？"
 russia.223.a: "人民代表大会"
 russia.223.b: "最高苏维埃"
 russia.224.t: "性别问题"
 russia.224.d: "各种女权运动，尤其是DSM，非常关注我们对性别问题的态度。一些城市爆发了小规模的示威和纠察，在互联网上也有持续的争论。这很可能只会让网上的争论和讨论更加激烈，但我们也许应该发表我们对这个话题的看法……"
 russia.224.a: "共产党永远支持性别平等！"
 russia.224.b: "祖宗之法不可变。"
 russia.225.t: "第二个旧金山"
 russia.225.d: "我们收到了一份在符拉迪沃斯托克建立经济特区的建议，为该地区的国内外公司提供令人难以置信的优惠和税收减免。这将有利于本地区的发展，投资将如河流般涌来！顺便说一下，与我们接壤的中国肯定会非常喜欢这个决定。"
 russia.225.a: "真是个好主意！"
 russia.225.b: "不，我们不需要。"
 russia.226.t: "\"爱国党\""
 russia.226.d: "最近成立了一个叫做\"爱国党\"的新党派，该党由弗拉基米尔·索洛维约夫、玛加丽塔·西蒙尼扬、伊拉达·泽伊纳洛夫以及过去捍卫普京政权的各种人组织起来。他们称祖国现任领导人软弱而优柔寡断，称瓦列里·拉什金是个\"自由派的傀儡\"。"
 russia.226.a: "随他们怎么抱怨吧，俄罗斯人民已经做出了选择。"
 russia.226.b: "优柔寡断？好啊，那就让他们见识下铁拳……全给我拷起来。"
 russia.227.t: "恐怖主义阴谋被挫败"
 russia.227.d: "有大量报道称，一支隶属俄罗斯联邦国家近卫军的特种部队突袭了一处疑似秘密恐怖组织藏身的公寓大楼。在突袭中，由于潜在的化学武器威胁，佩戴上防毒面具的战士身手矫健依旧，逮捕了所有恐怖分子。突袭后，一名警官向我们新闻制作组简要介绍了此次行动的情况。\n\n\"嗯……我们不仅发现了化学武器，但最令人担忧的是，他们都持有伪造护照，那帮傻瓜又聪明又笨，他们还带着真正的护照。在试图销毁前，我们已赶到那儿迅速找到了。证明这些恐怖分子都是德国人，欧盟公民。\"\n\n市政府官员目前拒绝就此事发表评价，但我们可以庆幸的是，情况没有恶化，也没有人员伤亡。这究竟是反对派激进分子企图颠覆国家政权的邪恶阴谋的一部分，或单纯是恐怖组织的偶发袭击计划？仍有待观察。"
 russia.227.a: "令人不安。"
 russia.228.t: "恐怖主义浪潮"
 russia.228.d: "民族主义团体在西乌克兰以及波罗的三国活跃起来。他们主张摧毁重建后的苏联，并在东欧恢复沙文主义政权。他们已经开始残害忠于我们的当地人。我们必须做点什么！"
 russia.228.a: "宣布开展反恐行动！"
 russia.229.t: "谈判成功！"
 russia.229.d: ""
 russia.229.a: "乌拉！"
 russia.230.t: "谈判失败"
 russia.230.d: ""
 russia.230.a: "去他妈的。"
 russia.231.t: "波兰恐怖袭击"
 russia.231.d: ""
 russia.231.a: "可怕的悲剧……"
 russia.232.t: "罗马尼亚恐怖袭击"
 russia.232.d: ""
 russia.232.a: "可怕的悲剧……"
 russia.233.t: "加里宁格勒恐怖袭击"
 russia.233.d: ""
 russia.233.a: "这些袭击可不是随机事件！"
 russia.234.t: "图拉兵工厂严重受损"
 russia.234.d: ""
 russia.234.a: "这帮畜生将付出代价！"
 russia.235.t: "行为通知"
 russia.235.d: "自俄罗斯总参谋部：德米特里·布尔加科夫\n\n米津采夫将军，我已经给您写了几封信，向您通报了您部下的粗暴行为。这些罪行中最令人发指的发生在克里维里赫外的进攻期间。你指挥的第28摩托化步兵师的士兵，划破了我的指挥车和其他高级军官座车的轮胎。我知道我们在补给运输上有分歧，但我仍然坚持我的意见，必须提供给我所需的燃料、被服和弹药以继续进攻。我不希望这件事传到总参谋长那里，因为如果格拉西莫夫知晓此事，谁知道您还能不能保住自己的职位呢。\n\n署名："
 russia.235.a: "德米特里·布尔加科夫"
 russia.236.t: "回信：行为通知"
 russia.236.d: "你个劣等民族渣渣，别用老子手下的人来发动你那傻逼的攻势，你咋不朝着敌人碉堡冲锋把自己送掉呢？真可惜敌人炮兵没把你埋在指挥车里，这样老子的人还能活下来，省得被装进裹尸袋倒在克里维里赫哪个犄角旮旯。你个老登。\n\n署名："
 russia.236.a: "米哈伊尔·米津采夫"
 russia.238.t: "纳瓦利内声援特别军事行动"
 russia.238.d: "阿列克谢·纳瓦利内最近向乌克兰公民发出呼吁：“亲爱的乌克兰公民，你们终于有机会一劳永逸地结束国家陷入的恶性循环。你们的总统换了一个又一个：尤先科、亚努科维奇、波罗申科、泽连斯基，但除了实际管理国家的寡头掌舵人之外，完全没有任何区别！现代乌克兰是一个腐败的国家，根本不关心自己的人民。不应该是这样的！俄罗斯最终战胜了普京暴徒的无法无天，创造了真正的民主和人民的福祉！所以我请求你们，为了你们的未来，为了你们孩子的未来，全力支援俄罗斯军队。乌克兰军队的士兵们，把你们的坦克对准基辅，对准那些一直以来掠夺你们国家的寄生虫的宫殿，我们会帮助你们：我们打败了阿布拉莫维奇，我们也会打败科洛莫夫斯基！”“未来俄罗斯”政党领导人的讲话实际上证明，他支持在乌克兰领土上开展特别军事行动。"
 russia.238.a: "反战运动已被溺死在襁褓中。"
 russia.239.t: "爱国游戏"
 russia.239.d: "电脑游戏在如今的年轻人群体中广受欢迎。或许值得为他们的辛勤创作分配一些小额预算支持？多年来，克里姆林游戏工作室一直在制作关于冷战时代题材的游戏，玩家们被允许捍卫我们国家的社会主义，并最终带领祖国迈向伟大……但这些家伙绝对还处于资金不足的状态，你觉得呢？"
 russia.239.a: "也许会发生一些有趣的事。"
 russia.239.b: "国家不应该在这种小玩意儿上花钱。"
 russia.240.t: "爱国游戏大获成功！"
 russia.240.d: "开发者们真是艺高人胆大！他们敢于挑战全新题材，以内战为背景打造了一场引人入胜的冒险之旅。我们的玩家显然对这款游戏赞赏有加，其中来自俄罗斯玩家的赞誉更是占据了大半江山。虽然在西方，它仅仅被视为来自东欧的奇特之作，并未获得同样的成功，但中国玩家却对其青睐有加，爱好者们正在紧锣密鼓地进行着民间汉化。开发者们获得了前所未有的收益，并已宣布将推出续作。结果如何呢？苏维埃玩家心满意足，自豪感油然而生！"
 russia.240.a: "这笔钱没有被白白浪费！"
 russia.241.t: "爱国游戏无人问津！"
 russia.241.d: "然而，开发者们在获得资金后却选择了保守路线，制作了又一款苏共中央总书记模拟游戏。虽然质量尚可，但这与\"首款苏维埃游戏\"所带来的期待大相径庭。除了该类型游戏的忠实粉丝外，它并没有引起太多关注，很快便被人遗忘。"
 russia.241.a: "我们不会再花钱在这种粪作上了"
 russia.242.t: "爱国游戏"
 russia.242.d: "电脑游戏在我们的青年群体中备受欢迎。或许，我们可以考虑为游戏开发分配一小部分预算？新成立的\"迷途的旅人\"工作室展现出了可期的潜力，但他们显然缺乏资金支持。您对此有何看法？"
 russia.242.a: "嗯……为什么不呢？"
 russia.242.b: "我们国家有更重要的事情要做"
 russia.243.t: "爱国游戏大获成功！"
 russia.243.d: "开发者们带来的惊喜远远超出了我们的预期！\"迷途的旅人\"工作室在获得资金支持后，决定推出首款严肃的俄罗斯第一人称射击游戏——《春》（VESNA）。\n\n游戏的故事发生在一个架空的2020年。在这个世界里，新冠病毒并未蔓延至中国以外，并迅速被战胜；美国没有陷入衰退，全球经济危机也并未发生。2019年，承诺恢复与俄罗斯联邦关系的候选人弗拉基米尔·什马特科以微弱优势赢得了乌克兰总统大选。2020年2月，乌克兰和俄罗斯就签署\"乌俄计划\"展开谈判，但在谈判过程中，什马特科总统遇刺身亡，与此同时，扎波罗热核电站也发生了恐怖袭击。现任总统职权的总理伊戈尔·涅戈达指责俄罗斯联邦谋杀了什马特科，并进行恐怖活动，\"以协助顿巴斯的‘分裂主义者’\"。玩家将扮演俄罗斯联邦特种部队的战士，前往乌克兰执行一项重要的特殊任务。\n\n《春》受到了俄罗斯和外国玩家的一致好评。玩家们对其中出色的\"多人模式\"赞赏有加，该模式包含多个阵营，例如：俄罗斯、中国、波兰、乌克兰和美国。在乌克兰，最高拉达通过了一项法律，禁止在乌克兰境内销售《春》。开发者们从游戏销售中获得了丰厚的收入，他们承诺将通过各种更新来支持游戏，并已宣布推出\"战斗通行证\"。毫无疑问，这是俄罗斯游戏产业的一次重大突破！"
 russia.243.a: "很好！而且最重要的是爱国！"
 russia.244.t: "爱国游戏无人问津！"
 russia.244.d: "收到资金之后，开发者决定开发一个全新的第一人称射击游戏，显然，他们高估了自己的实力……虽然游戏的展示效果很不错，但是这个游戏内充斥着大量bug和一大堆氪金内容，这就是为什么玩家戏称其为\"战争钱线2\"。虽然这款游戏有它自己的粉丝受众，但它没能实现当初玩家们对它的期望。"
 russia.244.a: "有意思……下次我们要三思而后行。"
 russia.245.t: "洗劫钢冠"
 russia.245.d: ""
 russia.245.a: "有意思……"
 russia.246.t: "选举准备"
 russia.246.d: "我们需要选出一位总统职位的候选人。"
 russia.246.a: "尤里·阿方宁"
 russia.246.b: "谢尔盖·列夫琴科"
 russia.246.c: "帕维尔·格鲁季宁"
 russia.246.d1: "列昂尼德·久加诺夫"
 russia.246.e: "丹尼斯·帕尔费诺夫"
 russia.246.f: "鲍里斯·卡加尔利茨基"
 russia.247.t: "选举结果"
 russia.247.d: "联盟首届总统选举已结束，获胜者是……"
 russia.247.a: "……丹尼斯·帕尔费诺夫！"
 russia.247.b: "……亚历山大·卢卡申科！"
 russia.247.c: "……谢尔盖·列夫琴科！"
 russia.247.e: "……尤里·阿方宁！"
 russia.247.f: "……瓦列里·拉什金！"
 russia.247.g: "……阿列克谢·纳瓦利内！"
 russia.247.h: "……帕维尔·格鲁季宁！"
 russia.247.k: "弗拉基米尔……索洛维约夫？！"
 russia.247.z: "……列昂尼德·帕谢奇尼克！"
 russia.248.t: "得州民族主义者请求援助！"
 russia.248.d: "今天外交部收到了一份有趣的公报，一个来自得克萨斯州的反叛组织恳求我们的政府提供武器、运输载具以及其他军事援助。他们希望建立独立的得克萨斯，有着天然不冻港、与联邦政府没有任何关系的得克萨斯州。"
 russia.248.a: "有什么理由不跟不冻港交朋友呢？"
 russia.248.b: "我不要，难道他们忘了阿拉莫发生过啥吗？"
 russia.249.t: "占领戈斯托梅利机场"
 russia.249.d: "总参谋部召开会议并决定：基辅城外的戈斯托梅利机场极具战略地位。空降部队将调往白俄罗斯，准备在凌晨占领机场，并坚守到增援部队突破切尔诺贝利隔离区前来支援。"
 russia.249.a: "愿他们为我们骄傲"
 russia.250.t: "占领戈斯托梅利机场失败"
 russia.250.d: "这样的结果对于我们而言太过沉重了。尽管尽了最大的努力，但我们的部队仍付出了巨大代价，很多战士在这场反法西斯的战争中壮烈牺牲了。空降部队不得已分散到树林中，被俘虏，或向乌克兰国民警卫队投降。当然，这场战斗并非毫无意义，至少这个机场在将来很长一段时间都无法使用了。"
 russia.250.a: "败而不馁。"
 russia.251.t: "占领戈斯托梅利机场成功"
 russia.251.d: "全世界都震惊了，我们对戈斯托梅利机场孤军深入的空降袭击取得成功，占领机场的勇士们终于可以松一口气了。据报道，我军大胜之下，乌军将军瓦列里·扎卢日内被上级严厉批评并被迅速踢出了北方战线的行动！各大新闻媒体的国际观察者报道称，随着飞机飞抵机场，更多久经沙场、斗志昂扬的空降部队增援前线，基辅要为全面进攻做准备了。"
 russia.251.a: "很快，我们将饮马基辅"
 russia.252.t: "拉什金抗议选举舞弊"
 russia.252.d: "俄联邦第八届国家杜马选举将于9月17日至19日举行，于9月19日统一投票日结束。9月20日晚，也就是国家杜马选举结束后的第二天，俄联共莫斯科市委第一书记瓦列里·拉什金与一名代表会面并组织了一次反对竞选舞弊的抗议活动。9月23日，宣布成立\"废除远程电子投票\"联合跨党派委员会。它由在莫斯科地区竞选的反对派候选人组成。直至今日，莫斯科、萨拉托夫、叶卡捷琳堡、乌法、伏尔加格勒和该国其他城市的抗议活动仍在继续。"
 russia.252.a: "不尽人意。"
 russia.253.t: "驼鹿"
 russia.253.d: "10月29日晚上，在距萨拉托夫60公里的莱索戈尔斯基区，警察和萨拉托夫地区狩猎和渔业委员会的一名工作人员拦下了一辆拉达牌的拉格斯汽车，汽车本身属于俄罗斯联邦共产党代表瓦列里·拉什金，车里载着一具驼鹿的尸体，还有一名49岁的男子同这位政治家同乘一辆车。\n\n拉什金声称，他只是看到了这具动物的尸体，想要把它交给警察而已。非法狩猎的刑事案件调查正在进行当中。"
 russia.253.a: "典型的共产主义者"
 russia.254.t: "新俄罗斯动画？"
 russia.254.d: "随着近来爱国主义游戏在游戏领域的成功，一些投资者正通过赞助国产动漫——尤其是日式二次元作品，于青少年媒介里拓宽市场。\n\n因为俄国人鲜少实践此类风格的作品，这可以说是比电子游戏更具风险的行当。然而，支持者们认为高风险高回报，建议雇佣一些中日人才帮助制作。\n\n二次元作品的故事应与俄罗斯有关并附加点爱国主义元素。许多人建议恢复由于缺乏足够预算而放弃的旧设定，而另一些人则倾向更现代、最新的故事情节。无论他们怎么选，都必须要有足够的资金才能将想法变成现实。"
 russia.254.a: "让他们试试看吧。"
 russia.254.b: "我们就不能用钱买点更好的东西吗？"
 russia.255.t: "第一小队重磅回归"
 russia.255.d: "尽管遇到了些许问题，但我们成功进军了另一个媒体娱乐领域！在我们投资的助力下，涅槃重生的\"铁锤娱乐\"动画工作室携全新改编的《第一小队》强势回归。这部作品最初于2009年以电影形式上映，如今凭借充足的资金，他们得以回归最初的愿景，将其打造为系列剧集。\n\n故事背景设定在伟大的卫国战争时期，讲述了拥有超能力的少先队员娜迪亚（手持武士刀）的故事。她能够与亡灵世界建立联系，并因此被招募进内务人民委员部神秘部门。该部门的成立是为了对抗日益壮大的纳粹德国神秘组织\"祖先遗产学会\"。双方都将深入挖掘\"灵薄狱\"和神秘预言，并利用新技术试图赢得战争。娜迪娅凭借自己的力量和苏联制造的机器，与她死去的伙伴们重聚，共同穿越灵薄狱和现实世界，粉碎德国的阴谋。而祖先遗产学会则得到了条顿骑士圭多·冯·沃尔夫的协助，他被古老的诅咒所引导，试图向俄罗斯人复仇，以报\"冰上之战\"之耻。\n\n第一季共七集，以扣人心弦的悬念结尾。\n\n《第一小队》获得了俄罗斯观众的一致好评。许多人称赞其精良的动画制作，比原作更加丰满的人物塑造，以及毫不避讳地展现纳粹在战争中的残暴行径，同时正确地强调了爱国主义精神和俄罗斯人为何而战。然而，一些西方评论家则抨击其\"明显的历史偏见\"和\"将德国人描绘得过于负面\"。"
 russia.255.a: "绝佳胜利！"
 russia.256.t: "俄式穿越者"
 russia.256.d: "我们近期投资的\"伊热夫斯克色彩\"动画工作室发布了新作\"俄式穿越者\"，这部号称‘\"首部俄罗斯动漫\"的作品似乎反响平平，令人担忧。\n\n故事讲述俄罗斯宅男兼游戏玩家蒂穆尔·弗罗里绍夫在阅读德意志·罗曼诺夫的作品时被电车创死，却意外穿越到名为梅德韦迪亚的奇幻国度。这个国度明显影射俄罗斯。在那里，他毫不费力地组建了一个衣着暴露的妹子\"后宫\"，并迅速成为国王的左膀右臂，甚至获得了国王女儿的青睐。与此同时，他还\"对抗\"着古老的邪恶领主逼登及其率领的乌克兰兽人大军。这部动画共32集，其中近半数内容充斥着毫无意义的内容堆砌与或海滩度假情节，结局也令人大失所望。\n\n观众们对此进行了猛烈抨击，批评其动画质量低劣，情节老套，剧情抄袭了数百部其他\"异世界\"动漫，且缺乏任何剧情进展或人物发展。而传统人士则对动画中对女性的描绘方式表示愤怒。当然，至少有一些人对女性角色的……嗯，色气艺术表现感到满意。"
 russia.256.a: "异世界？这就是他们能想到的最好创意？！"
 russia.257.t: "移除列宁"
 russia.257.d: "自民党取得胜利之后，新的\"干净\"政府将批准一条极具争议性的提案——将弗拉基米尔·列宁遗体迁出陵墓，这一议案得到批准只是时间问题。\n\n下达命令后不久，专家团队迅速取出了伊里奇遗体，并将其转移到一个新的秘密地点，而建筑工人则从陵墓中取下了所有苏联纪念品，最后划掉了自20世纪30年代以来从未动过的\"列宁\"二字。\n\n虽然当局声称列宁遗体将按照他最后遗嘱的要求，被体面地埋葬在沃尔科夫斯基公墓，紧靠着他母亲的坟墓，但许多旁观者和为数不多的共产党人对这一说法的真实性表示怀疑。由于\"仪式\"是封闭的，公墓里也没有摄像头，遗体的下落可能仍然未知。\n网上有传言说，考虑到日里诺夫斯基对列宁及其手下布尔什维克众所周知的仇恨，列宁实际上已被火化，骨灰被扔进了无垠的大海。\n列宁遗体被迁走了，他的坟墓也就空了出来，一些自民党员一直在考虑去除此地的\"布尔什维克崇拜\"氛围。一方赞成将此地重建为展示弗拉基米尔·日里诺夫斯基一生的博物馆，向人们展示谁是龙头老大，并让人们了解他的成长经历。然而，也有人建议将其改建为沙皇尼古拉二世家族的纪念圣地，毕竟他们在1918年被列宁下令处决。将陵墓内的列宁尸体改为皇族骨灰，以此为布尔什维克政权的受害者恢复历史正义。"
 russia.257.a: "改为对沙皇家族犯下的罪行所忏悔的圣地。"
 russia.257.b: "开始建设展示至高领袖一生的博物馆"
 russia.258.t: "摧毁叶利钦纪念中心"
 russia.258.d: "俄罗斯历史的耻辱柱上，除了布尔什维克的血腥统治，叶利钦的九十年代亦赫然在列。而这耻辱的象征，便是坐落于\"自由主义之都\"叶卡捷琳堡的叶利钦中心。\n\n无数爱国者对其恨之入骨，而自由民主党则付诸行动。\n\n黎明时分，一支拆除队伍集结于中心外围，静候指令。行动以推倒叶利钦雕像开始，雕像上早已被人涂满了\"叛徒\"、\"卖国贼\"等字样。随后，队伍转向主楼，摧毁了商店、纪念品店和为歌颂叶利钦总统任期而建的博物馆。\n\n整个过程虽略显混乱，却仅耗费了一天半时间。尘埃落定后，只余下一片空旷的废墟，满目疮痍。\n\n为了不让这片空地破坏城市景观，自由民主党成员提出了两项重建方案。其一，建造一座宏伟的大教堂。众所周知，叶卡捷琳堡的自由派对宗教场所深恶痛绝，因此此举不仅能彰显我们对信仰的忠诚，更能展现我们领导层的强大力量。其二，建造一座大型的爱国青年训练中心，教授国防知识、军事技能和祖国历史（通过玩《文明》系列游戏），保证下一代做好为神圣领土和领袖而战的准备。"
 russia.258.a: "大教堂计划"
 russia.258.b: "爱国主义青年倡议教育培训中心"
 russia.259.t: "德涅斯特河沿岸问题"
 russia.259.d: "30年后，德涅斯特河沿岸终于与俄罗斯有了陆地连接，但现在这个国家的未来出现了问题"
 russia.259.a: "德涅斯特河沿岸的人民受够了苦，他们有权加入新俄罗斯联邦区"
 russia.259.b: "摩尔多瓦应该根据德涅斯特河沿岸的经验进行改革"
 russia.259.c: "德涅斯特河沿岸的人民受够了苦，他们有权加入新俄罗斯联邦区"
 russia.260.t: "重组君主党"
 russia.260.d: ""
 russia.260.a: "俄罗斯历史上也存在着君主制！"
 russia.261.t: "统一俄罗斯右派"
 russia.261.d: "今日，俄罗斯自由民主党内的亲民族主义者声音愈发占据主流，许多边缘的民族主义组织联合起来，宣布建立非政府联盟——\"神圣俄罗斯\"民族联盟。他们的主要目标就正如他们的名字那样：迫使日里诺夫斯基政府特别是在种族和民族问题上实施更激进的政策。\n\n虽然他们仍然只是一个边缘的小党派，造成不了任何实质性的威胁，但可以借由其中的激进分子帮助政府实现右翼政策。"
 russia.261.a: "这群人帮上大忙了！"
 russia.262.t: "抗议！"
 russia.262.d: ""
 russia.262.a: "该死！"
 russia.263.t: "抗议！"
 russia.263.d: ""
 russia.263.a: "该死！"
 russia.264.t: "抗议！"
 russia.264.d: ""
 russia.264.a: "该死！"
 russia.265.t: "统一俄罗斯的未来"
 russia.265.d: "随着我们胜利的尘埃落定，统一俄罗斯的命运仍然悬而未决。\n\n该党的大部分成员都是只会向上级阿谀奉承的职业投机者。他们最初只是为了通过普京需要的文件而招募，现在却认为自己有权独立思考。更不用提其中有多少人完全不适合自己的职位。\n\n然而，由于统一俄罗斯实际上是普京的党，其中仍然保留有很多人才。正是良莠不齐才让普京取得了现在的成就，如果我们能把这些专家和技术官僚拉拢到我们这边，那肯定能捞一笔大好处。\n\n结果会是什么呢？"
 russia.265.a: "处理那些寄生虫！"
 russia.265.b: "处理他们，但把有用之人拉到我们这边。"
 russia.266.t: "\"祖国\"成为了新的核心"
 russia.266.d: "统一俄罗斯落败之后，许多不激进的爱国人士开始寻找新的组织。随着国家民主党的建立，\"祖国\"慢慢地成为了另类政治道路的最大代表，由魅力非凡的德米特里·罗戈津领导。他肯定一些过去的政策，又声称决不会重走普京的道路。"
 russia.266.a: "如果这是人民的选择……"
 russia.266.b: "如果他们是真正的爱国者，那就该加入俄罗斯自由民主党！"
 russia.267.t: "政党改名？"
 russia.267.d: "在我们收复东欧并巩固政权后，却不得不面对伟大领袖逝世的悲痛。许多党员提议应以日里诺夫斯基之名重命名本党，使其思想永存。\n多年来，日里诺夫斯基本人生前多次建议，待他逝世后，本党应冠以其姓名以示尊崇。党内众多同志始终铭记这一夙愿。\n\n正是日里诺夫斯基的远见卓识引领我们走向胜利。我们皆是他崇高理想的继承者与精神门徒。\n\n但另一方面，俄罗斯自由民主党这一名称本身已成为不朽的象征。正是在这个旗帜下，日里诺夫斯基曾率领俄罗斯赢得辉煌胜利。"
 russia.267.a: "我们是日里诺夫斯基的儿女……"
 russia.267.f: "日里诺夫斯基党 - 听起来不错！"
 russia.267.z: "日里诺夫斯基党 - 听起来不错！"
 russia.267.b: "还是自民党这个牌子好。"
 russia.268.t: "新白俄罗斯政府"
 russia.268.d: "白罗斯新政府建立后，我们该怎样保证他们忠于中央呢？"
 russia.268.a: "我们应该下放权力给当地效忠者。"
 russia.268.b: "拒绝去中心化，只能接受莫斯科的直接领导。"
 russia.269.t: "争论之室"
 russia.269.d: "会议室内，争论不休。\n\n两拨人，或许是政治派别，正在激烈辩论某件事——某件极其重要的事。这场争论的结果，将决定某个宏大命运的走向。\n\n所有的选择似乎早已做出，可他们的谈判依旧毫无头绪。言辞滔滔，行动寥寥。然而，必须做出决定，必须就在此刻。\n\n宏大的理念在空中交锋，数百个细小的想法层层堆叠，千言万语激荡，或许已达百万之多。\n\n最终，只剩下一个念头回荡在寂静之中……"
 russia.269.a: "这种\"摄政\"必须结束，是时候恢复合法统治者应有的地位了。"
 russia.269.b: "斯卢茨基改革派占据了主导地位。"
 russia.269.c: "弗拉索夫一直是日里诺夫斯基的最爱。"
 russia.269.e: "斯卢茨基改革派占据了主导地位。"
 russia.269.f: "弗拉索夫一直是日里诺夫斯基的最爱。"
 russia.269.g: "先生们，这里是辩论室，你们不能在这里争吵！"
 russia.269.j: "布特获胜。"
 russia.269.k: "舍林素来一心忠于俄罗斯民族。"
 russia.269.l: "教会之强力，迫使自民党屈从。"
 russia.269.l1: "库尔金扬利用他的秘密关系，推翻了大不如前的自民党。"
 russia.269.l3: "商界精英们游说斯塔罗沃伊托夫担任该职位。"
 russia.269.l6: "战斗仍在继续……"
 russia.270.t: "团结一致到永远"
 russia.270.d: "共产党与苏联人民终于再统一了30多年前分裂的祖国。这确实是一件大事，但不可骄傲自满：我们的经济体系环环相扣，因此不得不重建加盟共和国间的大部分联系，更别提还要重建祖国了！"
 russia.270.a: "目标明确。任务下达。开始工作吧，同志们！"
 russia.271.t: "丘拜斯离开俄罗斯。"
 russia.271.d: "丘拜斯因意外的选举结果辞职离境。据两位亲近人士透露，他与妻子阿夫多季娅·斯米尔诺娃已前往伊斯坦布尔。部长级简报显示资本外流已有加速迹象，而寡头集团的旧日联络官们正私下与律师及西方顾问紧急磋商该逃往何处，如何保全资产。\n国有化势在必行。我们既已承诺，必将执行，唯一的问题是如何执行。现有三套预案：\n一）与效忠国家的寡头谈判，将其60%资产转入公共部门，保留经营权并签订长期合约，逐步剥离剩余管理权；\n二）在第一阶段立即征收石油、天然气、煤炭及金属产业，按国家定价补偿，其他行业仍归原主，但对其超额利润征收75%的\"反寡头税\"；\n三）对关键领域实施全面国有化，以年利率6%的政府债券作为补偿，原管理层名义留任，改领\"国家薪酬\"及奖金"
 russia.271.a: "\"人民国家联盟\""
 russia.271.b: "\"针对性国有化\""
 russia.271.c: "\"战略收购型社会主义\""
 russia.272.t: "整合加利西亚人"
 russia.272.d: ""
 russia.272.a: "很好。"
 russia.273.t: "波兰—加利西亚再统一"
 russia.273.d: ""
 russia.273.a: "如果他们希望如此"
 russia.274.t: "保加利亚反腐败抗议"
 russia.274.d: ""
 russia.274.a: "他们得好好应付"
 russia.274.b: "屈服于要求"
 russia.275.t: "选举！"
 russia.275.d: ""
 russia.275.a: "自由派……"
 russia.276.t: "选举！"
 russia.276.d: ""
 russia.276.a: "啊……"
 russia.277.t: "选举！"
 russia.277.d: ""
 russia.277.a: "占位符"
 russia.278.t: "保加利亚通过不信任投票"
 russia.278.d: ""
 russia.278.a: "有意思。"
 russia.279.t: "复兴党在保加利亚掌权"
 russia.279.d: ""
 russia.279.a: "嘶，至少他们听我们的"
 russia.280.t: "选举！"
 russia.280.d: ""
 russia.280.a: "啊……"
 russia.281.t: "选举！"
 russia.281.d: ""
 russia.281.a: "啊……"
 russia.282.t: "选举！"
 russia.282.d: ""
 russia.282.a: "自由派……"
 russia.283.t: "选举！"
 russia.283.d: ""
 russia.283.a: "民猪党……"
 russia.284.t: "巴格达之夜"
 russia.284.d: "别再打他妈的仗了，这里不是你能撒野的地方。这不是德国，也不是阿富汗，乔治，你的士兵会在这里被撕成碎片。25万伊拉克精兵，他们会把一切都炸飞。他们只需一个小时就能横扫整个沙漠，炸毁你所有的驱逐舰、记者和外交官。乔治，你是个牛仔，你给我停下，别再胡闹了！收起你的子弹，把它们扔进仓库，忘掉你那该死的老爹。我们这里曾经有个混蛋，为了给他哥哥报仇，结果葬送了伟大的俄罗斯帝国。还有一个疯子，为了给他爷爷报仇，结果苏联也垮台了。而你，正在重蹈覆辙。忘掉你爹吧，他那一套已经过时了。你该想想美国的未来，它正在走向灭亡。你的年轻人都在逃离，没人想住在美国，没人！这里就是个跳蚤市场，除了美元，还是美元，肮脏的绿纸！没有灵魂，没有音乐，没有作家。全世界都在聆听柴可夫斯基，阅读陀思妥耶夫斯基！只有俄罗斯才有真正的节日和体育竞技……而这里，是伊拉克。他们爱戴自己的总统，却鄙视你，鄙视你！"
 russia.284.a: "我们将为侯赛因复仇。"
 russia.284.b: "与伊朗的关系更为重要。"
 russia.285.t: "维克托·布特逃离战火中的美国"
 russia.285.d: "尽管有许多报道称美国现在完全处于无政府状态，但维克多·布特还是逃回了他的祖国。今天他终于踏上了祖国的土地。他没有透露其行程的所有部分，但承诺会为此写一本书。他在俄罗斯的下一步行动尚不清楚，但他表现出了从政的兴趣。"
 russia.285.a: "令人钦佩。"
 russia.285.b: "令人钦佩。"
 russia.285.c: "对他留个心眼。"
 russia.285.k: "令人钦佩。"
 russia.286.t: "维克托·布特加入俄罗斯自民党"
 russia.286.d: "臭名昭著的军火商维克多·布特将以自由民主党身份参选！"
 russia.286.a: "我党有能人的一席之地。"
 russia.287.t: "维克多·布特为俄罗斯的发展捐款"
 russia.287.d: ""
 russia.287.a: "一个真正的爱国者！"
 russia.288.t: "拉什金下令逮捕布特"
 russia.288.d: "\"他又不是共产党人！他是个法西斯民族主义者，还是个俄罗斯沙文主义者！\"- 拉什金"
 russia.288.a: "从一个监狱到了另一个监狱。"
 russia.289.t: "召集缙绅会议"
 russia.289.d: "近四百年来未曾召开的缙绅会议即将在不久重开。是时候选出大俄罗斯的新沙皇了。"
 russia.289.a: "基里洛维奇家族将带领俄罗斯！"
 russia.289.b: "米哈伊洛维奇家族将带领俄罗斯！"
 russia.289.c: "加夫里尔在士兵中的声望帮他登上了王位！"
 russia.290.t: "沙皇日的游行"
 russia.290.d: "最近，主要城市的君主派以怀念沙皇时期的名义组织游行。虽然这种行为在我们掌权之后显得再正常不过了，但最近\"摄政\"去世的消息加强了人民呼吁君主制全面回归的热情。\n越来越多的君主派支持沙皇回归……至于谁当沙皇，他们无所谓。"
 russia.290.a: "我们要好好考虑。"
 russia.290.b: "罗曼诺夫王朝已经是过去式了。"
 russia.291.t: "临时政府解散"
 russia.291.d: "罗马尼亚临时政府统治的日子似乎即将落下帷幕。这一于欧陆战争中诞生的亲俄政权始终无法赢得民心，国内纷争不断。如今，现任总统[ROM.GetLeader]终于宣布，举国期待已久的正式选举即将举行。\n\n本次选举主要竞争者为两人：一位是颇具才干的亲西方候选人，乔治·西米翁，主张坚决反俄并积极向外扩张；另一位则是亲俄候选人克林·杰奥尔杰斯库，强调应集中精力发展本国内政。目前，距离选举日已不遥远，我们只能静候结果揭晓。"
 russia.291.a: "新的开始！"
 russia.292.t: "特兰西瓦尼亚公投"
 russia.292.d: "乔治·西米翁当选总统后，立刻兑现了竞选期间的承诺，针对特兰西瓦尼亚采取了迅速而强硬的措施。目前，罗马尼亚已对该地区施加了严厉的经济关税，并威胁称若情况得不到解决，将进一步实施全面制裁。西米翁本人则明确要求特兰西瓦尼亚立即举行全民公投，以决定其国家地位，并已公开发表声明呼吁支持此举，东欧大地似乎再次被阴云笼罩。"
 russia.292.a: "有趣。"
 russia.293.t: "塞凯伊自治政府成立"
 russia.293.d: "经过漫长的谈判，特兰西瓦尼亚政府同意举行全民公投，以决定是否加入罗马尼亚。最终，超过80%的民众投票支持统一。根据即将签署的新条约，特兰西瓦尼亚将再次并入罗马尼亚。同时条约规定，特兰西瓦尼亚境内的匈牙利族裔将受到特殊保障，以维护该地区的稳定。\n\n[ROM.GetLeader]表示，此举是对历史错误的修正，并宣称将继续捍卫全球罗马尼亚人的权益。"
 russia.293.a: "这还真是出人意料。"
 russia.294.t: "布达佩斯条约"
 russia.294.d: "罗马尼亚与匈牙利方面已达成共识。经过双方谈判，最终协议确定，特兰西瓦尼亚南部地区正式归属罗马尼亚，而北部地区则成立\"北特兰西瓦尼亚联邦\"，形式上仍属罗马尼亚领土，但享有广泛自治权，并有权以民主方式选举自己的领导人。"
 russia.294.a: "真有意思"
 russia.295.t: "多余的人"
 russia.295.d: "他们怎么能若无其事地活着？\n\n又是一口闷酒，陈旧的伏特加短暂冲淡了失败的苦涩。工厂里的瓦尼亚不在了，多么勤劳的一个人。维佳也走了，季马也走了。而他们呢？他们根本不在乎。仿佛战争从未发生，仿佛这个国家没有在崩塌，仿佛所有人都已安然从战场归来……\n\n又是一口闷酒……也许他们根本不知道？也许，他们错过了一切？我必须告诉他们，无论如何！\n\n钥匙攥在手心。衣服？去他妈的！我必须得去！越快越好！要是再发生一次怎么办？\n\n门轴嘎吱作响，门猛地敞开，一股刺骨的寒意扑向裸露的肌肤。车灯照亮了缓缓飘落的雪花。远处，城市的喧嚣若隐若现。\n\n突然，轰鸣声袭来！一阵呼啸——完了！不，不对……只是夜空中一架飞机划过，灯光闪烁，渐渐远去。\n\n也许，他们已经想明白了。也许，他们早已接受了这一切……不像我。"
 russia.295.a: "或者他们甚至把我给忘了……"
 russia.296.t: "选举时间！"
 russia.296.d: ""
 russia.296.a: "占位符"
 russia.297.t: "匈牙利捍卫特兰西瓦尼亚"
 russia.297.d: "喀尔巴阡地区局势似乎正在升温。近日，匈牙利总统维克托·欧尔班向全国发表紧急讲话，强烈谴责罗马尼亚针对邻国的行动，并强调匈牙利人民绝不会容忍任何国家肆意践踏独立国家的主权。尽管局势紧张，欧尔班表示，匈牙利将竭尽所能，阻止事态进一步升级。尽管罗马尼亚总统[ROM.GetLeader]对欧尔班的言辞予以严厉谴责，但眼下局势尚未滑向战争深渊，全面冲突似乎尚远。"
 russia.297.a: "很好"
 russia.298.t: "杰奥尔杰斯库的胜利"
 russia.298.d: "卡林·杰奥尔杰斯库赢得了罗马尼亚提前举行的总统选举。这位温和保守派人士一向反对在失去领土问题上采取激进行动，但他也承认罗马尼亚迟早必须面对这一难题。然而，他的上台引发了民众强烈的不满，反对派称其为克里姆林宫寡头的傀儡。战火余烬尚未消散，他的执政究竟会给罗马尼亚带来什么，目前前途未卜，我们唯有静观局势发展。"
 russia.298.a: "恭喜！"
 russia.299.t: "西米翁的胜利"
 russia.299.d: "在此次罗马尼亚总统选举中，乔治·西米翁取得了最终胜利。这位强硬的保守派民族主义者成功利用人民受伤的民族自尊，赢得了广泛支持，从而登上总统之位。他的重要竞选承诺之一便是让特兰西瓦尼亚重回祖国的怀抱，然而，他究竟能否实现这一承诺，仍需时间检验。"
 russia.299.a: "有趣"
 russia.300.t: "维彻开庭"
 russia.300.d: "随着革命后俄国政治结构的迅速改组，太阳领袖亚历山大·杜金认为，最好的做法是在欧亚大陆建立一种新的真正民主的统治形式。维彻业已建立，它的职能与过去的最高苏维埃类似，但有更多的代表和跨阶级参与，还有许多\"政治集会\"进行游说来为他们的代表招揽支持。\n\n太阳领袖表示，新系统仍处于向欧亚主义完全民主目标的过渡时期中，但只要西方的极权法西斯还在放纵他们的鹰犬在我们的家门口撒野，这样的创想就无法完全实现。"
 russia.300.a: "百花齐放"
 russia.301.t: "重返一党专政"
 russia.301.d: "随着共产党政权在俄罗斯的复兴，日渐明朗的是，\"过去的美好时光\"与党的绝对控制一起回归了。越来越多的人认识到，一个人要想进步，要想收获尊重，就必须是一名党员。\n就像苏联一样，一个臃肿的官僚阶层正在形成，党委得到了更多的实权与特权，他们腐败的心思也在不断滋生。\n当然，新党员们都相信并遵循政治局规划的党的路线，安安全全的在他们的厨房里闲聊。\n但事实上这不被视作消极情况，庞大的官僚机构有效的恢复了对地方的集中领导，复兴社会项目可比僵化的官僚主义重要多了，这其中的好处也提高了群众的幸福感。只要经济还在快速增长，政治局就没什么好担心的。"
 russia.301.a: "党是我们这个时代的精神、荣誉和良知"
 russia.302.t: "抵触拉什金的改革"
 russia.302.d: "最近几天，主要城市的政府大楼里涌入了反对拉什金的抗议者。乍一看，这些人似乎是讨厌的普京主义者和其他旧政权的支持者，但仔细观察还有许多共产主义者喊着口号，声量甚至不逊于他者。他们声称拉什金是一个自由派，西方间谍，还是新的戈尔巴乔夫，共产主义者补充说：拉什金背叛了正列宁主义的真正信条，开启了有害的自由化，这将给年轻的俄罗斯联邦社会主义共和国招致灭顶之灾。\n\n特勤局奉政治局之命，开始调查反共人士可能提供的资金，但到目前为止还没有取得任何进展。\n\n然而，这些抗议者似乎只是少数，绝大多数人还在享受新社会经济的好处，并对拉什金改革派带来的变革之风感到喜悦。"
 russia.302.a: "变革之风不止于边境，我们也不会停下改革的脚步。"
 russia.303.t: "新俄罗斯的新面孔"
 russia.303.d: ""
 russia.303.a: "日里诺夫斯基钦定者胜出"
 russia.303.b: "议会部长胜出。"
 russia.304.t: "察廖夫宣布举行全民公投"
 russia.304.d: "奥列格·察廖夫在最近的讲话中，彻底解决了新俄罗斯的一体化问题，并宣布就是否融入俄罗斯举行全民公投"
 russia.304.a: "我们要着手准备！"
 russia.305.t: "公投通过"
 russia.305.d: "根据新俄罗斯地区举行的全民公投结果，绝大多数居民投票支持与俄罗斯重新统一。官方数据显示，超过90%的投票者支持该共和国并入俄罗斯。政府将这一事件称为\"人民的意志\"，并强调莫斯科尊重该地区居民的决定。当局还表示，此次统一完成了长达数年的\"恢复历史正义\"进程，指出双方拥有共同的文化和历史渊源。\n\n俄罗斯和新俄罗斯各城市举行了大规模游行庆祝活动。成千上万民众手持旗帜和标语走上街头欢庆。莫斯科、顿河畔罗斯托夫、顿涅茨克和卢甘斯克举办了音乐会、烟花表演和群众庆典活动。\"这是我们人民真理与团结的庆典，\"列昂尼德·帕塞奇尼克在采访中表示。与此同时，一些西方国家批评此次公投\"不合法\"，但克里姆林宫驳斥了这些言论，强调新俄罗斯人民的意愿才是唯一决定因素。"
 russia.305.a: "俄罗斯夺回了她失散的儿女们。"
 russia.306.t: "仓促的公投"
 russia.306.d: "尽管全民公决成功了，但投票站糟糕的工作表现和组织水平总体上使我们处于不利地位"
 russia.306.a: "没有失败，就没有胜利。"
 russia.307.t: "乌克兰进攻顿巴斯传闻"
 russia.307.d: ""
 russia.307.a: "联系新俄罗斯人"
 russia.308.t: "新俄罗斯请求干预"
 russia.308.d: ""
 russia.308.a: "乌克兰的去纳粹化就从今天开始！"
 russia.308.b: "从今往后，新俄罗斯就是我们患难与共的兄弟！"
 russia.308.c: "俄罗斯的荣耀将于今天收回！"
 russia.309.t: "勘察加的美国难民营"
 russia.309.d: "\"美国梦\"如今更像是\"美国噩梦\"。美国政府在政治激进主义与全球自由主义之间反复摇摆，导致全国已沦为血腥战场——联邦政府、分裂势力、共产主义叛军与极右翼民兵正彼此厮杀。最大的几个超级都市——纽约、芝加哥、洛杉矶——已变成街头战斗的舞台，平民被夹在火线之间，进退维谷。\n\n而引人关注的是，我国外交官与情报人员正报告美国正发生大规模人口外逃。成千上万绝望的美国人正奔向远东的港口，试图以任何方式逃离这个被战火吞噬的国家。特别令人警惕的，是有报告称，一整支满载人员的民用船队，甚至包括军舰，正驶向我方主要港口——符拉迪沃斯托克、彼得罗巴甫洛夫斯克-堪察加与马加丹。这些船上不仅有难民，还有逃兵、政治活动人士与交战派系的武装分子。\n\n部分难民选择俄罗斯作为未来迁往欧洲或亚洲前的临时落脚地，但也有人已提出申请，期望通过加入俄罗斯国籍，逃避未来可能到来的风暴，把俄罗斯视为通往稳定与繁荣的\"方舟\"。无论如何，这些人未来的命运，如今已落在俄罗斯政府的肩上。"
 russia.309.a: "尽我们所能吧"
 russia.310.t: "诺维科夫清洗政治局"
 russia.310.d: ""
 russia.310.a: "我们必须保障党大权独揽"
 russia.311.t: "波罗的地区出现针对俄罗斯少数民族的歧视现象"
 russia.311.d: ""
 russia.311.a: "罪魁祸首必须付出代价"
 russia.312.t: "乌克兰抵抗组织"
 russia.312.d: "若有人以为，在我们战胜北约后，班德拉分子已然败退，那此人无异于愚者。那些为其信仰流血的战士并未消亡，他们决不会因政府的倒台而停止对我们的抗争。\n\n最近，\"乌克兰抵抗组织\"由班德拉分子与前政权的士兵们成立。虽然他们目前的行动仅限于街头对抗执法人员与反对抗议者，但若乌克兰政府无法遏制局势，局面很可能演变为公开的武装反抗。\n\n我们还记得欧盟广场的事件。虽然诸如\"把莫斯科人插上长矛\"这样的口号已经过时，但我们不能忘记，大火常常由一颗火星引起。我们绝不能让敖德萨工会大楼的悲剧重演，在那里，我们的英勇爱国者被类似的暴徒活活烧死。我们必须立刻结束这一切，不留后患。"
 russia.312.a: "恐怖分子再次露面"
 russia.313.t: "乌克兰爆发全国性抗议"
 russia.313.d: "由于当局\"令人惊叹\"的危机管理，反俄势力如今蓄势待发，试图重演欧盟广场的剧目。\n\n太好了。我们不得不投入更多的兵力和人力来应对这个问题，而看起来，真正的和解恐怕要等很长一段时间。\n\n然而，令人痛惜的是，这场抗议已经迅速蔓延，而乌克兰政府却毫无能力有效应对。\n\n一如当年欧盟广场的惨剧。亚努科维奇放任亲俄抗议者的生命被无情夺走，他选择逃向我们的边境，而不是留在乌克兰反击。愚昧和无能再次使俄罗斯的鲜血洒满大地。"
 russia.313.a: "妈的。"
 russia.314.t: "抗议结束"
 russia.314.d: "幸运的是，我们已经成功平息了这些抗议活动。\n\n逮捕组织者并镇压他们的集会取得了显著成效，现在乌克兰政府的位置已稳固。正如红军在战胜班德拉分子后消灭他们一样，我们也做到了。\n\n然而，现在还不是懈怠的时候。乌克兰仍有大量来自对立阵营的退伍老兵，他们可能会加入类似的运动，而我们的任务是防止这一情况发生。他们必须被重新融入社会，但不能像赫鲁晓夫那样轻易赦免乌克兰起义军。\n\n无论如何，目前看来，斗争暂时结束了。十年的积怨已经告一段落，乌克兰正如过去几个世纪一样，与我们一同迈向未来。时间将治愈一切创伤，我们会确保这一点。\n\n"
 russia.314.a: "终于…"
 russia.315.t: "绍伊古的命运"
 russia.315.d: "普京政权的主要门面之一就是国防部长绍伊古，在谢尔久科夫进行军队自由化改革后，他面对军队的腐朽情况竟坐视不管。自1993年10月政变中获得叶利钦支持后，绍伊古的仕途便一帆风顺。而实际上，他就只是个广告客和野心家，根本称不上是军人……但这也不意味着他没有不能为我们效用的能力。他在新苏维埃俄罗斯会被放在何种地位？"
 russia.315.a: "或许他还能派上用场……"
 russia.315.b: "把他降职，剥夺一切荣誉然后丢进大牢。"
 russia.315.c: "这还不够！必须进行一场大清洗。"
 russia.316.t: "叶利钦纪念中心的命运"
 russia.316.d: "20世纪90年代的叶利钦时代是俄罗斯历史上最可耻的时期之一，没有什么比叶利钦中心更能强调这一点了，它位于所谓的\"自由之都\"叶卡捷琳堡。许多爱国者希望它消失，我们同意这点。也许叶利钦中心的毁灭将是俄罗斯进入新时代的一个伟大标志……\n\n但这值得吗？\n\n也许我们不应该摧毁这个昂贵的建筑群，而是把它变成俄罗斯资本主义罪行博物馆？这样我们就能永远纪念俄罗斯30年来所遭受的苦难。"
 russia.316.a: "拆毁它！"
 russia.316.b: "俄罗斯资本主义罪行博物馆？听起来很有趣……"
 russia.317.t: "俄罗斯同性婚姻问题？"
 russia.317.d: "俄罗斯的同性恋历史曲折复杂。在苏联早期，他们不被歧视，但情况逐渐恶化。到普京执政的时候，同性婚姻已经在许多国家合法化，但俄罗斯不属于其中。关于该议题的讨论于共产主义者上台后再度兴起，并且在最近撤销那些歧视性法律之后达到了顶峰。在近期与俄罗斯总统瓦列里·拉什金的\"直连\"活动中，他被问及俄罗斯同性婚姻合法化的问题。\n\n\"瓦勒里·费多罗维奇总统，下午好，我是\"未来俄罗斯\"党的活动家，我们想向您提出一个非常重要的问题\"\n\n\"下午好同志\"\n\n\"总统先生，现在的同性婚姻是个什么状况呢？提起这项问题的人愈来愈多，我们想知道它是否将被合法化。党内有关于此的讨论吗？\"\n\n\"听我说，在您看来，那些非传统性取向的人正受到迫害吗？我们有限制他们的任何权利吗？所有压迫性的法律都被取缔了，那么您还想要什么吗？\"\n\n\"合法化……同性婚姻……\"\n\n\"好吧，那您告诉我至少一个这么干了的社会主义国家吧。\"\n\n\"古巴……古巴合法化了同性婚姻。\"\n\n\"您也知道古巴曾举行过一场关于同性婚姻合法化的公投吧？那如果我们也来一场公投，您应该也同意吧？\""
 russia.317.a: "- 当然会的。谢谢您的回答。"
 russia.318.t: "公投结果"
 russia.318.d: "人们对拉什金举行公投的决定态度暧昧：传统价值观的坚定捍卫者们认为，举行公投本身就对俄罗斯造成了另一次冲击；激进的LGBTQ+活动家们则认为，同性婚姻本身即为不可剥夺之人权，根本没有公投的必要。最终，公投和平举行，没什么意外发生。\n\n结果：15.42%赞成，84.57%反对。\n\n同性婚姻在俄罗斯仍属禁止。"
 russia.318.a: "\"去你的精神病院里结婚吧！\""
 russia.319.t: "\"新俄罗斯\"建国"
 russia.319.d: "在新\"人民俄罗斯\"的成立宣言后，\"新民党\"开始逐步适应俄罗斯政治的新机制。\"新民党\"召集了准备好与国家合作的自由主义者，宣布了自己的\"新俄罗斯\"宣言，并成立新的党派\"新俄罗斯\"以作为对人民俄罗斯的回应，在宣言中明确了党的目标和有关新俄罗斯的计划。第一次会议还选出了该党领导人：阿列克谢·涅恰耶夫。"
 russia.319.a: "什么？我可没想到会这样。"
 russia.320.t: "俄罗斯自卫军成立"
 russia.320.d: ""
 russia.320.a: "我们别无选择，只能屈服…"
 russia.321.t: "北约要求战争我方支付赔款"
 russia.321.d: ""
 russia.321.a: "除了同意我们还有的选吗……"
 russia.321.b: "尝试谈判"
 russia.322.t: "北约同意修改战争赔款金额"
 russia.322.d: ""
 russia.322.a: "太棒了！"
 russia.323.t: "北约拒绝战争赔偿要求"
 russia.323.d: ""
 russia.323.a: "那就这样吧"
 russia.324.t: "邀请加入民主国家联盟"
 russia.324.d: ""
 russia.324.a: "额，感觉不太……"
 russia.325.t: "日照之城"
 russia.325.d: "党中央为追寻乌托邦理想，加大科研经费投入。新的倡议下，旧的研究中心焕然一新，新的拔地而起，拢共数十座。其中，最令人惊叹、最先进的莫过于坐落在哈萨克斯坦苏维埃社会主义共和国山区的\"3826企业\"。\n\n在这里，以著名苏联和俄罗斯科学家命名的庞大建筑群中，进行着生物植物学、实验医学和高科技领域的突破性实验。设施附近专门建造的城镇，供工程师和研究人员居住。\n\n改善苏维埃祖国，从人工智能自动化到飞行城市（其中一座甚至可能成为新联盟的新首都），各种奇思妙想如泉涌般喷薄而出。\n\n毫无疑问，这座企业必将成为孕育众多明日科技的摇篮。"
 russia.325.a: "未来会很美好。梦幻的太阳之城将在这片大地上冉冉升起。"
 russia.326.t: "哥伦比亚内战"
 russia.326.d: "哥伦比亚敌已爆发内战，我们必须决定支持哪一派统一全国。"
 russia.326.a: "我们将支援官方政府"
 russia.326.b: "我们将支援民族解放军"
 russia.326.c: "我们将支援卡洛斯·帕蒂尼奥阵线"
 russia.327.t: "俄罗斯援助抵达"
 russia.327.d: "尽管有政治分歧，俄罗斯还是为我们提供了重大支持，其中主要是武器。我们一直是俄罗斯人的朋友，我们的关系受益颇多。"
 russia.327.a: "感谢，法西斯同志！"
 russia.327.b: "感谢，俄罗斯人！"
 russia.328.t: "社交媒体假新闻"
 russia.328.d: "最近几天，社交媒体上猖獗的假新闻攻击导致了我国各个领域的大规模动荡。"
 russia.328.a: "谁干得？！"
 russia.329.t: "米罗诺夫公开支持梅德韦杰夫"
 russia.329.d: "今天早些时候，左翼政党公正俄罗斯—为了真理党党魁宣布，在即将到来的总统选举中，支持德米特里·梅德韦杰夫及其统一俄罗斯党。分析人士普遍预料到了这一声明，因为\"公正俄罗斯党\"历来广泛支持梅德韦杰夫的前任，其党魁谢尔盖·米罗诺夫更是对这位总统候选人\"进一步推动国家民主化\"的承诺赞赏有加。随着选举活动的不断展开，这股来自温和左翼的支持对于统一俄罗斯党寻求蝉联国家执政权而言，将是一大裨益。"
 russia.329.a: "爱国者理应团结一心。"
 russia.330.t: "公正俄罗斯加入俄联邦共产党联盟"
 russia.330.d: "今天早些时候，左翼政党公正俄罗斯—为了真理党党魁宣布，其党派将在即将到来的总统选举中支持俄罗斯联邦共产党。此举被视为一次小幅爆冷，鉴于公正俄罗斯党过往素有同统一俄罗斯党合作的历史，这标志着俄罗斯的政治风向正在转变。一些人预测，俄共有望创下自1996年以来最强劲的选举表现。在此背景下，随着激烈的选战日趋白热化，这股来自温和左翼反对派的支持或许是未来局势的一个早期风向标。"
 russia.330.a: "社会主义者应当团结一心。"
 russia.331.t: "西乌地区发生恐怖袭击事件"
 russia.331.d: ""
 russia.331.a: "碾碎这帮蠢货！"
 russia.332.t: "激起西乌克兰地区叛乱"
 russia.332.d: ""
 russia.332.a: "他们没吸取上次的教训。"
 russia.333.t: "苏维埃议会成立"
 russia.333.d: "俄罗斯联邦共产党计划以全国人民代表大会的模式改革苏维埃议会。新制度将建立一个单一的立法机构，由全国所有地区的代表组成，努力变得更加民主、更能体现出代议制精神。然而，旧政权的一些成员反对这些变化，并对其实施和公开度仍然感到担忧。俄联共决心使这大胆的民主实验取得成功。"
 russia.333.a: "21世纪最好的政治体系。"
 russia.334.t: "完美的党国"
 russia.334.d: "占位符"
 russia.334.a: "21世纪最好的政治体系。"
 russia.335.t: "红旗照耀顿巴斯"
 russia.335.d: "在我们从大选中凯旋而归后，顿巴斯诸共和国也该跟着做出改变了。我们的特别服务部门对当地政府展开了舆论攻势，然后在军队的帮助下进行了和平演变。拉什金同志对于顿巴斯的安排有着自己的独特见解，他让此地成为新苏维埃乌克兰政府的临时驻港，并做出了妥当的官僚任命。没过多久，一个崭新的乌克兰苏维埃联邦社会主义共和国便宣告成立了，新的苏维埃乌克兰将成为像俄罗斯一样的联邦，避免重蹈过去的覆辙。当地共产主义者、乌克兰共产党逃亡成员以及\"斗争\"协会在顿涅茨克组建了一个广泛的左翼同盟。乌克兰当局已经对我们发出谴责，指控这是将事态升级的表现。\n\n当然，顿巴斯地区也有很多人对我们的处理方式心怀不满，觉得我们背叛了俄罗斯的国家利益，我们会好好收拾这帮沙文主义者的。"
 russia.335.a: "全乌都将染上红色。"
 russia.336.t: "红色顿巴斯"
 russia.336.d: "经过莫斯科数轮漫长谈判后，顿巴斯各共和国领导人返回各自城市时已达成共识：召开代表大会并签署关于成立\"人民共和国联盟\"的协议。这项在2014年近乎夭折后被搁置的计划，随着基辅当局正式拒绝执行明斯克协议而重获现实意义。如今各共和国政府的核心纲领聚焦于社会平等、工人经济与人民民主，以及两国间深化合作。为实现这一目标，在莫斯科协助下成立了统一的共和国间社会主义组织——\"联合阵线\"，整合了该地区所有进步力量。卢甘斯克与顿涅茨克领导人被推选为临时领导，并同时获授俄罗斯苏维埃联邦社会主义共和国共产党党证。正如卢甘斯克某电报频道所言：\"克里姆林宫的新势力依照其俄罗斯愿景重塑我们地区，只是时间问题。\n\"\n目前代表们尚需明确该联盟的核心使命，这个计划将孕育出强盛独立的新俄罗斯国家，还是成为将乌克兰改造为苏维埃联邦共和国的地下熔炉。"
 russia.336.a: "新俄罗斯苏维埃万岁！"
 russia.336.b: "很快全乌克兰都将被染红！"
 russia.337.t: "新苏维埃民主"
 russia.337.d: "苏俄总统瓦列里·拉什金与俄罗斯社会主义倾向学会的科学家们共同出版了他们的处女作《新苏维埃民主》。这本书描述了现代俄罗斯共产党人的主要思想原则，俄罗斯国家结构的新模式及其未来发展的前景。它因其简单易懂的解释而饱受赞誉：无需读过所有马克思主义作品也能理解书中内容。该书成为多所高校教学方案的基础，可见其内容的意义和重要性。然而，它受到了来自极左翼阵营的严厉批评，他们指责拉什金是修正主义，曲解了苏联建设社会主义的经验，并在他的作品中发现了迂腐的矛盾。尽管受到批评，但《新苏维埃民主》仍在学生中广为流传，在支持拉什金的圈子里颇受欢迎，并继续在俄罗斯的政治和经济环境中引起人们的兴趣和讨论。这本书在国外虽不那么受欢迎，但它使得许多专家能更好地了解了我们国家的常态。"
 russia.337.a: "这对发展中的意识形态十分重要！"
 russia.338.t: "全俄人民阵线新目标"
 russia.338.d: "在德米特里·梅德韦杰夫的领导下，俄罗斯的党派政治正逐渐变得模糊不清。\n\n随着政府迈出的每一步，全俄人民阵线正逐步走向政治舞台的中心，它不仅整合了各类政治势力，还吸纳了工会、志愿组织及活跃公民协会等社会团体，形成了一股空前的社会合力。\n作为人民阵线中最具影响力的参与者，统一俄罗斯党不断吸纳曾经的对手与盟友，无论是在国家杜马之内，还是在体制之外，均将他们纳入这一庞大的政治架构。一些专家将这一现象称为政府内部的\"全面政治统一\"。\n\n如今，全俄人民阵线的决策正成为推动俄罗斯社会前进的核心动力。"
 russia.338.a: "俄罗斯拥有指导之手。"
 russia.339.t: "俄罗斯联邦安全局报告可疑行动"
 russia.339.d: "俄罗斯联邦安全局在开始镇压恐俄组织后，发现一些更激进的分子似乎已经开始相互联系，并在未知地点组织起来。安全局还截获了他们的一些小册子，其中质疑\"俄罗斯民族边界\"和俄罗斯主权本身的概念，称可能的西方干预将更有利于俄罗斯的共产主义者。"
 russia.339.a: "对他们留个心眼。"
 russia.340.t: "反建制共产主义组织"
 russia.340.d: "联邦安全局的报告已得到确认。部分确认为共产主义流亡者的人开始在网上讨论所谓的\"共产主义人民解放军\"，并宣称其目标是对抗\"俄罗斯新帝国主义\"。这一事态的发展令人担忧，我们必须密切关注。\n\n随着西欧的无神论共产主义势力在战败后重新崛起，我们可以预见，这些恐怖分子极有可能从他们的欧洲主子那里获得资金支持。"
 russia.340.a: "盯紧他们！"
 russia.341.t: "新俄罗斯发生爆炸事件"
 russia.341.d: "来自新罗西斯克的消息令人不安。当地港口发生了一起爆炸，导致许多港口工人受伤。极端组织共产主义人民解放军已宣布对此次袭击负责，并扬言绝不会停手，直至\"俄罗斯的反动本质\"被彻底摧毁。\n我们的领袖已发表公开讲话，严厉谴责这些新社会革命党，并称其为\"地狱中的红色小鬼\"。他誓言要么将他们送入监狱，要么将其彻底清除，选择权只在他们自己手中。"
 russia.341.a: "共匪嗜血本性的又一有力证明。"
 russia.342.t: "梁赞发生枪击事件"
 russia.342.d: "新近成立的激进共产主义组织共产主义人民解放军在新罗西斯克爆炸案后变本加厉，挑衅升级。今日，一名成员竟在梁赞的中央街头公然开火，试图制造混乱。\n幸运的是，袭击者被迅速制伏，未酿成更大悲剧。平民安然无恙，仅有一名警员轻伤。"
 russia.342.a: "必须要让这帮蠢货付出代价！"
 russia.343.t: "俄罗斯联邦安全局认定共产主义人民解放军为恐怖组织"
 russia.343.d: "在所谓\"工人解放者\"组织的一系列罢工之后，联邦安全局公开宣布要采取措施惩治并摧毁这一新的恐怖主义威胁。相关人员已被组织起来并调集资源开始行动，他们的目标是解除共产主义人民解放军及其可能帮凶的武装。"
 russia.343.a: "实践出真知！"
 russia.344.t: "反恐行动报告"
 russia.344.d: "自国家近卫军总司令：维克多·佐洛托夫\n\n尊敬的最高统帅，\n在俄罗斯近卫军与安全部队的精准打击与协同行动下，共产主义人民解放军组织已被彻底击溃！我军成功围歼了试图逃往高加索山脉的残余分子，经过一场短暂的交战，大多数武装分子选择投降。\n\n据悉，该组织企图建立所谓的\"革命苏维埃政府\"并发动\"游击战争\"。但幸运的是，我们果断出手，成功阻止了这些极端分子的阴谋。\n\n我坚信，共产主义人民解放军现已不再对俄罗斯构成威胁。我们可以正式向全国人民宣布，法律与秩序的胜利，恐怖主义的覆灭！"
 russia.344.a: "干得好！"
 russia.345.t: "反共审判"
 russia.345.d: "今天，共产主义人民解放军的成员和领导层将被审判。"
 russia.345.a: "终身监禁。"
 russia.345.b: "死刑"
 russia.346.t: "新罗西斯克经济繁荣！"
 russia.346.d: ""
 russia.346.a: "难以置信"
 russia.347.t: "波兰起义"
 russia.347.d: ""
 russia.347.a: "我们必须帮助他们！"
 russia.347.b: "让他们自力更生吧……"
 russia.348.t: "在白俄罗斯发现外国雇佣军"
 russia.348.d: ""
 russia.348.a: "让他们下地狱！"
 russia.349.d: ""
 russia.350.t: "俄罗斯纸牌屋"
 russia.350.d: "对于西方人而言，俄罗斯的政治体制一直是个谜团，而实际上，除开一些“民族特色”之外，这种政治体制并没有什么非同寻常之处。俄罗斯的政坛上有三个最大的政党：\n£GFX_CPRF_logo 俄罗斯联邦共产党——尽管苏联在三十年前解体，但仍有许多俄罗斯民众沉浸在社会主义的思潮与对过去的怀念中，寡头政治本身的不平等更是引发了极大的不满，共产党因而稳居俄罗斯第二大党之位。\n\n£GFX_UR_logo 统一俄罗斯党——一个执政长达数十年的政党，也是在国家杜马内占据多数席位的政党，同时还是实际意义上的总统政党。统一俄罗斯党代表了一种对俄罗斯自身超越过去格局的新观念。\n\n£GFX_LDPR_logo 俄罗斯自由民主党——虽然名字里带有“自由”“民主”，但其实际上是一个民族主义和民粹主义政党，领导人看起来更像是从马戏团出来的。如果说共产主义者想重建一个新的苏联，那自由民主党就是想重建一个新的俄罗斯帝国。\n\n除了光复伟大俄罗斯的总体愿景，所有的政党几乎不能在任何议题上达成一致。他们或许会吵到天昏地暗，但直到一个人——弗拉基米尔·普京的出现统一了他们，他凌驾于所有人之上，协调他们进行合作。只要他还掌权，那么这些政党就会继续按照他所制定的规则行事。"
 russia.350.a: "钟摆稳稳摆动着……"
 russia.350.b: "我想了解更多！"
 russia.353.t: "西方拒绝了！"
 russia.353.d: "桌上的这些文字，阿列克谢清楚地知道其中的含义，却实在难以相信。欧盟拒绝了放松赔款以减轻俄罗斯经济压力的请求。实际上\"拒绝\"这个词用得也不对，他桌子上摆着的是一份列有俄罗斯需要出售给欧洲以\"建立互信\"的企业名单。难以置信，不可思议。赔款是为了摧毁上一任政府而存在的，但现在一个亲西方的民主政府掌权了，欧盟却不顾政府破败不堪的名声，想要将俄罗斯的企业吃干抹净。最糟糕的是，哪怕俄罗斯做出了一切让步，200年之内她仍然赔不完赔款。但他不明白的是，为什么北约没有兑现他们的承诺？北约曾承诺减缓赔款压力，承诺让俄罗斯真正地融入欧洲，承诺归还被占领的城市。他们曾承诺让他拥有建设真正自由而繁荣的俄罗斯的能力，但一切只是镜花水月。\n\n\"我们不如同意算了。\"阿列克谢反腐败基金会的副手沃尔科夫说。\n\n\"欧盟给你打的款到账了？\"前博主，现领袖马克西姆·卡茨问道。\n\n\"你说什么？\"\n\n\"我可不像某些人，天天都想呆在乡间别墅里度假，我可是真的想要创造一个繁荣的国家。你是怎么靠着诋毁韦涅季克托夫大发横财的，我们都心知肚明。\"\n\n\"够了，我会想怎么回复的，你们可以走了。\"阿列克谢叹气道。很明显：北约根本不希望俄罗斯恢复元气，自苏联解体之后便是如此。哪怕是叶利钦时期，西方也在一边资助车臣分裂分子，一边让俄罗斯成为抗中前锋。\n\n\"繁荣本不属于我们\"，他小声说到。但这种想法令他愤怒。俄罗斯被完全肢解，丢失了五分之一的人口，他们现在要么活在动荡的政权下，要么遭受占领或迫害。大量涌入俄罗斯的顿巴斯和克里米亚地区的公民无疑佐证了这一观点。罗斯托夫和别尔哥罗德状况也没有好到哪里去，\"去俄罗斯化\"的风声广为流传，西方国家置之不理……\n\n\"普京是对的……\"纳瓦利内突然得出了结论。"
 russia.353.a: "只有斗争，才能带来真正的自由。"
 russia.354.t: "卡茨的名单"
 russia.354.d: "近日，在柏林拒绝减轻赔款请求引发政治风波后，马克西姆·卡茨，\"未来俄罗斯\"党党魁之一，发表了一系列抨击众多政府要员\"盲从排外主义\"的文章，矛头直指列昂尼德·沃尔科夫。之后，卡茨被注意到进入克里姆林宫，媒体传闻称他是为了与时任总统纳瓦利内真诚地交换意见。\n\n事情的结果仍未揭晓，但纳瓦利内的政策已经明显开始朝着反西方民粹主义倾斜，几乎可以认定这些政客已经当不久了。"
 russia.354.a: "新时代如今揭幕"
 russia.355.t: "俄罗斯族在哈萨克斯坦遭受镇压！"
 russia.355.d: "帖木儿火炮"
 russia.355.a: "立刻要求全民公投！"
 russia.356.t: "俄罗斯族要求公投！"
 russia.356.d: "帖木儿火炮"
 russia.356.a: "额"
 russia.356.b: "去你妈的！"
 russia.357.t: "哈萨克斯坦政府拒绝！"
 russia.357.d: "草他妈的臭傻逼"
 russia.357.a: "那我们就来硬的。"
 russia.358.t: "国民警卫队进入莫斯科！"
 russia.358.d: "今天，首都一如既往的夜生活被坦克和士兵的声响打断了。在仅仅一个小时之内，一个来自国家近卫军的师团兵不血刃地控制了所有的政府建筑。国家近卫军首脑维克多·佐洛托夫在紧急电视讲话中声明：这样一个艰难的决定是由于自民党政府无法迅速解决危机的无能。他承诺一旦关键时期度过，生活将会恢复正常。佐洛托夫以\"俄罗斯万岁\"作为他演讲的结尾，并且呼吁所有遵纪守法的公民继续他们的日常活动。"
 russia.358.a: "至少没有天鹅湖。"
 russia.359.t: "佐洛托夫的最终决定"
 russia.359.d: ""
 russia.359.a: "\"唯有那些可延续日里诺夫斯基事业之人……\""
 russia.359.b: "\"文官不足信……\""
 russia.360.t: "特别选举！"
 russia.360.d: "伊万沿着街道走下去，去投票给他支持的候选人。"
 russia.360.a: "……维克多·佐洛托夫！"
 russia.360.b: "……谢尔盖·绍伊古！"
 russia.360.c: "……阿列克谢·久明！"
 russia.361.t: "俄罗斯非传统性别者联盟"
 russia.361.d: "改革开始后，全国各地涌现了许多新兴的社会团体，但唯有一个团体不仅震动了国内媒体的视线，更让西方同侪刮目相看。那便是\"俄罗斯非传统性别者联盟\"。这个刚刚成立却迅速积累了大量追随者的组织，自诩为那些敢于反抗西方虚伪的俄罗斯LGBTQ群体的代言人。\n\n该组织主席米哈伊尔·拉科夫在宣言中写道：\"朋友们，兄弟姐妹们，请允许我来剖析我们组织被认为‘矛盾’的原因：我们为何要与西方决裂？多年来，国内所有LGBT组织都将希望寄托在西方，力图将所谓的进步理念带到俄罗斯。然而，欧洲人自己踏足了这片土地，给我们留下的又是什么？是废墟、贫穷和占领。无论过去的政府有多少过错，他们都不该如此对待与他们平等的同胞。西方宣扬着平等与包容的美好口号，但在它们那些不那么‘进步’的成员国里，他们要么对我们的苦难视若无睹，要么亲手将刀刃刺向我们。在我看来，欧洲早已背离了正道。我们的同胞把我们视为叛徒，谁又能责怪他们？我们也曾被巴黎和柏林的骄傲游行蒙蔽了双眼。然而，今天，让我们携手同心，向全世界宣告：我们与民族共命运，我们并肩站在一起，誓要抵抗撒旦西方及其伪善面具的邪恶。只要团结如一，我们就能让俄罗斯成为希望与自由的灯塔。\"\n\n对此，西方的LGBTQ+组织迅速跳出来公开谴责俄罗斯非传统性别者联盟，斥其为极端民族主义和复仇主义的同路人，是\"亲异性恋\"的分裂分子。然而，他们的声音在俄罗斯早已失去分量，而拉科夫的声望却因总统纳瓦利内的公开支持而愈发高涨。"
 russia.361.a: "嗯，现在我能理解这帮基佬了……"
 russia.362.t: "加夫里尔·多罗辛想要参战"
 russia.362.d: "加夫里尔·多罗辛通过罗曼诺夫家族女方血统成为了尼古拉一世的后裔。沙皇的长女玛丽亚·尼古拉耶夫娜是他的第八代曾祖母。此外，他还与法国皇室有血缘关系。玛丽亚·尼古拉耶夫娜的丈夫是拿破仑妻子约瑟芬的孙子。\n\n但大公爵头衔只能通过男放血统继承，因此加夫里尔·多罗辛坚定不声称其拥有俄罗斯皇位，并尊重自己的家族根源。\n\n他的部分亲属在第一次世界大战中去世，或在革命后被处决。他的曾祖母塔玛拉·勒希滕贝格·德·博阿尔内移民到了法国。加夫里尔出生于法国马赛。\n\n加夫里尔第一次去顿巴斯是在2015年，当时他年仅18岁。他辍学（曾梦想成为一名摄影师）并加入了亚历山大·扎哈尔琴科的第五独立近卫摩托化步枪旅。他在侦察队服役了两年，担任机枪手。他获得了代号\"塔斯曼\"，好比袋獾这种体型小却凶猛的掠食者。\n\n现在，他希望前往欧陆战争的前线。我们是应该让这位拥有皇族血脉的承载者安然无恙，还是允许他履行其对祖国的职责？"
 russia.362.a: "一个真正的爱国者！接受他的请求。"
 russia.362.b: "我们不能允许贵族血统被玷污，驳回他的请求。"
 russia.363.t: "似曾相识的祖国母亲"
 russia.363.d: "斯韦特兰娜·米凯洛娃从未错过开往圣彼得堡市中心的公交车。这座城市总是忙碌不堪，上下班的路程也有些漫长，但这些并没有让她感到烦恼。她为何会感到烦恼呢？以俄罗斯的标准来看，这份工作薪水已经相当不错了并足够支撑日后的计划，况且被解雇的可能性微乎其微。然而，这些物质上的因素都是次要的。事实上她对这所城市的情感源于其已成为她生活中无比重要的一部分。即便现在时代变迁，她始终记得她心爱着的这座城市，她心爱的列宁格勒。当她坐在公交车上时，街景从车窗外掠过，使其陷入了回忆。\n\n列宁格勒，苏联最伟大的城市，革命的发源地，俄罗斯和苏联社会最伟大成就。这座城市给予了她一切，她又怎能忘记呢？她记得自己还在学校的日子，记得自己在城市共青团支部服务时的样子，记得自己在共产党第一份工作的经历，记得与朋友和家人在城市林荫大道上的时光，以及每天都会经过的那些风景。这是她记忆中那个充满美好回忆的城市。\n\n然而，她所了解的这座城市似乎一夜之间消失了。她已经无法再认出这里的任何事务。这让她感到极度恐慌与害怕。\n\n所有地方，包括整个州的名称都被重新命名。纪念碑被搬进了博物馆。许多公共建筑上雕刻的苏联标志被刻意移除。甚至连城市外围那块巨大的\"列宁格勒\"标牌也已被拆除。现在整个城市仿佛在假装苏联从未存在过，不过现在她终于明白了。\n\n这是一座新的城市，在一个崭新的俄罗斯。苏联的公共记忆被有计划地清除，是为1917年之前的俄罗斯以及当代俄罗斯让路。他们不希望人们记住苏联，他们只希望俄罗斯人铭记罗曼诺夫王朝和日里诺夫斯基。\n\n斯维特拉娜最终停止了观望，用悲伤却平静的目光看向前方。她只能默默地为过去的岁月哀悼。"
 russia.363.a: "列宁从不存在。"
 russia.364.t: "第二次十月宣言"
 russia.364.d: "1906年的《十月宣言》是一份部分现代化了俄罗斯帝国政府的文件。如今，我们必须再次回顾过去，将其作为沙皇政权[SOV.GetLeader]可以依托的框架。\n当第一份《十月宣言》生效时，俄罗斯正处于1905年革命的动荡之中。因为这份宣言的通过，我们成立了国家杜马。当然，当时的杜马几乎毫无权力。而在这份新的《十月宣言》中，这一状况将维持不变。虽然这份新的《十月宣言》与自由民主党为了集中权力于日里诺夫斯基及未来党主席而推行的改革相抗衡，但如今这份宣言将行政权力交回沙皇手中。我们所选择的沙皇之所以被选中，是因为他们的智慧、血统以及洞察力。自由民主党通过这份宣言告知其子民他们已将俄罗斯的未来交给了沙皇。\n\n[SOV.GetLeader]对我们国家的愿景目前仍是未知的。与尼古拉二世不同，他即使在通过这份宣言后仍然面临抵抗。我们的新沙皇并不需要为此担忧，因为自由民主党在战前已经彻底清除了所有反对派势力，而在我们战后的胜利中，人民对我们的政府充满喜悦。然而，战胜的狂欢终究不会持续太久。\n\n[SOV.GetLeader]必将引领我们前进。我们可能正走向一种旧式的俄罗斯独裁，也可能迈向类似英国的君主立宪制，或者滑向毁灭。我们为俄罗斯创造的未来令人振奋，尤其是在欧洲一片混乱之际，我们目睹着战败的敌人们在整个欧洲大陆上一个接一个地被共产主义政权取代。看到布尔什维主义再次崛起，未来的战争是不可避免的。这既让人兴奋，也让人恐惧。\n\n缰绳现在在您手中，伟大的沙皇。驾驭俄罗斯帝国迈向辉煌与繁荣，维护我们的胜利，确保我们在未来的世纪中的地位。为未来必将震撼全国的战斗做好准备。不论您选择哪条道路，我们都与您同在，伟大的沙皇！"
 russia.364.a: "沙皇，您的统治带来我们的荣耀！"
 russia.365.t: "凝望者之眸"
 russia.365.d: ""
 russia.365.a: "佐洛托夫自任俄罗斯自由民主党党魁！"
 russia.365.b: "佐洛托夫成立国家军事委员会！"
 russia.366.t: "伊戈尔·日里诺夫斯基遭受批评！"
 russia.366.d: ""
 russia.366.a: "帕维尔·格鲁季宁开始获取支持。"
 russia.366.b: "日里诺夫斯基利用他的影响力噤声了反对派。"
 russia.367.t: "格鲁季宁同盟"
 russia.367.d: ""
 russia.367.a: "自民党不值得信任，是时候做些改变了。"
 russia.367.b: "真正的自民党爱国者会支持格鲁季宁的。"
 russia.368.t: "伊戈尔·日里诺夫斯基下台！"
 russia.368.d: ""
 russia.368.a: "格鲁季宁开启大规模国家改革。"
 russia.368.b: "格鲁季宁担任新自民党主席。"
 russia.369.t: "隔墙有眼"
 russia.369.d: "尽管我们对社会主义和其他激进运动持保留态度，但我们也必须确保民众享有民主和选择的权利。然而，将权力移交给独立的左翼政党风险过大——我们已从历史中汲取了惨痛的教训。为避免重蹈覆辙，我们将借鉴S·V·祖巴托夫的理念，建立受我们控制的左翼政党，并由安全部门负责监督。如此一来，我们就能在确保这些政党政策不会逾越既定界限的同时，让帝国的农民和工人有一个合法表达自身立场并维护权益的渠道。"
 russia.369.a: "于某些人而言是自由；于另一些人而言是束缚。"
 russia.370.t: "俄罗斯国家选举"
 russia.370.d: ""
 russia.370.a: "……谢尔盖·富尔加尔！"
 russia.370.b: "……丹尼斯·普希林！"
 russia.370.c: "……亚历山大·别洛夫"
 russia.370.f: "……阿列克谢·茹拉夫廖夫！"
 russia.370.g: "……阿列克谢·茹拉夫廖夫！"
 russia.370.j: "……马克西姆·苏雷金？！"
 russia.371.t: "皇帝的新衣"
 russia.371.d: ""
 russia.371.a: "我们不会忘记过去，只会牢牢控制住它。"
 russia.372.t: "普京的遗产"
 russia.372.d: "即便俄罗斯前总统弗拉基米尔·普京离世未久，他的受欢迎程度仍不减反增，更别提是在他的门徒兼继任者——德米特里·梅德韦杰夫强硬延续普京政策的如今。这让梅德韦杰夫的公众形象越来越接近于\"斯大林\"，而普京则成了新的\"列宁\"。现在，公众对于这位新领袖的态度与其说是简单的个人崇拜，不如说已经变成了\"偶像化\"。\"普京主义者\"这个先前被反对派和爱国民众所使用的词汇，已经开始作为对国家方针的直接阐述出现在官方媒体的报道中。"
 russia.372.a: "他的梦想依旧延续！"
 russia.373.t: "俄罗斯自由民主党罢黜斯卢茨基！"
 russia.373.d: "斯卢茨基虽将自身塑造成了伟大的改革家，但也无力改变他在党内失宠的现实。今天，当斯卢茨基为推广其\"民族民主\"纲领而访问鄂木斯克时，俄罗斯自由民主党最高委员会便罢黜了他的主席职务，实际上也把他从即将举行的选举的总统候选人的位置上赶了下来。\n令斯卢茨基又惊又恼的是，他一手提拔的那些人都背叛了他，他并无角逐党魁的群众基础，如今他将再度作为一名普通党员度过余生。"
 russia.373.a: "哦，可真够讽刺的。"
 russia.374.t: "顿巴斯领导人创建俄罗斯人民共和党！"
 russia.374.d: "在顿巴斯解放后，许多新俄罗斯政治家，包括两个人民共和国的领导人都离开了俄罗斯自由民主党，力图自立于政坛之上。在宣布召开新一届大选后，那些昔日未被普遍承认的国家领袖如今得以角逐克里姆林宫中的最高职位。由帕谢奇尼克和普希林组建的俄罗斯人民共和党自称代表了俄罗斯人民的新思维、俄罗斯人民争取民族自决的斗争，以及对二十一世纪一零年代初稳定社会的深切怀念之情。有\"俄罗斯共和主义\"的理念傍身，加诸相当多的公众认为顿巴斯人未来必然跻身俄罗斯政治精英之中，他们兴许能拿下足以胜选的选票。"
 russia.374.a: "命眷勇者。"
 russia.375.t: "自民党提名富尔加尔为候选人！"
 russia.375.d: "在斯卢茨基下台后，许多观察者就密切关注着下届选举中自由民主党会推出的候选人，真正配得上这个位置的人屈指可数。毫不意外的，谢尔盖·富尔加尔，一个被自民党长期塑造成一个反腐斗士，有着诚实灵魂的人，被选出来领导该党竞选。随着自由民主党越来越背离日里诺夫斯基的愿景，人们实在是怀疑这一新形象是否会为他们赢得选票。"
 russia.375.a: "坦率之人！"
 russia.376.t: "别洛夫获得民族主义者支持"
 russia.376.d: "在日里诺夫斯基掌权初期解放的众多右翼政治犯中，亚历山大·别洛夫便是其中之一。这位性格古怪的商人以民族主义情感著称。尽管他对自由民主党的政府并无太大意见，仅有少数几条微词，但随着斯卢茨基推行的政治改革逐渐背离了\"俄罗斯民族主义政策\"的初衷，他再度成为了坚定的反对派。而这一次，别洛夫不仅凭借他极少数能称得上有影响力的极右翼身份站稳了脚跟，还获得了来自多个组织的强大支持，甚至筹集到了大笔资金投入他的政治竞选。然而，即便拥有这些资源和助力，他依然是此次选举中最不被看好的候选人之一。"
 russia.376.a: "哎，激进派！"
 russia.377.t: "\"祖国\"组建国民阵线"
 russia.377.d: "\"祖国\"作为日里诺夫斯基当政时期所组建的少数政党之一，如今已然成长壮大并宣布将组建把左派和右派小党同时囊括在内，以爱国主义和对俄罗斯光辉历史的共同信仰为感召的\"国民阵线\"。尽管\"国民阵线\"看起来像个草台班子，但他们已经通过宣布将实行一系列民粹主义政策而人气暴增，即使其中一部分口号甚至是相互矛盾的。如果这个党想要存续下去并继续赢得公众的青睐，那在未来他们将不得不选择一个明确的站位。"
 russia.377.a: "这就是俄罗斯中间派的平均水平。"
 russia.378.t: "\"祖国\"的政治路线"
 russia.378.d: "在由\"祖国\"所组织起来的政党联合内部，左派和右派爱国者们如今正互相大肆攻击，两极分化现象越来越严重。现在是时候由\"祖国\"的领袖们出面，并最终决定国民阵线将走哪一条道路的时候了。有许多小党派无论最终选择了哪条路线都会选择追随，而有一些成员将与该党相背而行，就此形同陌路。"
 russia.378.a: "\"祖国\"必须向左转以获得更多支持。"
 russia.378.b: "\"祖国\"的社会传统政治主张将帮助我们赢得胜利。"
 russia.378.c: "\"祖国\"整合失败！"
 russia.379.t: "关于\"至高统帅\"头衔的问题"
 russia.379.d: "令我们国家数百万人民担忧的问题是弗拉基米尔·沃尔福维奇·日里诺夫斯基所拥有的\"至高统帅\"这一头衔的未来。日里诺夫斯基的生平与活动在俄罗斯历史上留下了不可磨灭的印记，而现在我们面临一个艰难的选择：下一任领导人是否应该继承这一头衔，还是弗拉基米尔·沃尔福维奇将永远是唯一和永恒的至高统帅？\n\n这一继承问题极为复杂。\"至高统帅\"这一头衔本身具有及其独特的意义。如果将其转移给他人，可能会削弱其与日里诺夫斯基独特人格的象征意义。\n\n可是，若将这头衔一直\"空置\"，可能会引发各种错误的解读与猜测。"
 russia.379.a: "这该是个可继承的头衔。"
 russia.379.b: "只有日里诺夫斯基才配拥有它，他该成为永远的至高统帅！"
 russia.380.t: "开启主权经济"
 russia.380.d: "当世界濒临巨变，西方的敌意日益加剧，我们的经济不可避免地面临着重创的风险。\n\n然而，只要我们保持敏锐的头脑，并展现出足够的适应力，即便下一次经济崩溃来袭，我们也能够从容应对这场金融风暴。\n\n通过迅速再工业化、消除对西方经济的任何依赖、并加强与本国势力范围的纽带，不论局势如何演变，在未来几年内，我们都将能够扛住任何形式的困境，铸就一段无惧风雨的坚实篇章。"
 russia.380.a: "这才刚开始"
 russia.381.t: "梅德韦杰夫开启电报运动"
 russia.381.d: "选举季的序幕渐渐拉开，普京的逝世仍在俄罗斯人民的记忆中鲜活如昨，各大政党纷纷绞尽脑汁，尝试各式各样的策略来吸引选民的目光，仿佛预示着新一轮政治博弈的硝烟即将弥漫。\n\n面对纷繁变幻的局势，统一俄罗斯党决定让梅德韦杰夫走向台前，成为竞选活动的中流砥柱。同时，他们别出心裁地在社交应用Telegram上展开了一场全新的宣传攻势，意在吸引更为年轻的选民群体。\n\nTelegram以其对隐私的重视和培养各种在线社区而闻名，这次竞选活动被视为向俄罗斯年轻人表明该党不仅关注过去，还关注现在和未来。"
 russia.381.a: "现代问题就用现代手段解决。"
 russia.382.t: "\"总统先生\"电影上映"
 russia.382.d: "在这政治诡谲与瞬息万变的洪流中，当代历史的缔造者——弗拉基米尔·弗拉基米罗维奇·普京，无疑成为了最引人注目的主角。影片《总统先生》宛若一场引人入胜的旅程，将观众带入这位政坛巨擘的生活与事业，让人得以窥见他背后那鲜为人知的风云激荡与权力角逐。\n\n自青葱岁月至权倾一国，普京走过了一条布满荆棘的漫漫长路，迎接着命运接二连三的严峻考验。他的崛起，既是一位国家领导者无所畏惧的拼搏历程，也是一个普通人在巨大历史浪潮中沉浮与抗争的史诗。他的一生，书写的不仅是一个国家的命运，更是一种坚韧不拔的精神，以及对未来执着不悔的追求。\n\n影片将观众带入一个充满政治博弈与外交谋略的世界。普京的每一个决策，不仅影响着国家的命运，甚至牵动着整个世界的局势。他的抉择牵连着国际关系、经济走势以及历史的走向。\n\n在导演的镜头下，我们看到了普京复杂多面的性格。他不仅仅是一位拥有强大政治权力的领袖，同时也是一个被人性与情感牵动的人。在亿万民众追随的背后，他也有属于自己的困惑与挑战。他既是指引俄罗斯走向未来的舵手，又是独自面对种种艰难抉择的孤独身影。\n\n《总统先生》不仅仅是一部传记影片，它更像是一场有关领导力、政治智慧与全球博弈的深刻反思。它揭示了和平与权力、梦想与现实之间的矛盾与妥协。在这段无可复制的旅程中，没有简单的对错与褒贬，唯有对这位充满神秘色彩且深具影响力的政坛传奇人物的深度探索。"
 russia.382.a: "一部俄罗斯影视巨作"
 russia.383.t: "俄罗斯动画爆火"
 russia.383.d: "如今，俄罗斯动画产业正迎来一波真正的复兴潮流。每日都有令人耳目一新的动画作品登上银幕和电视荧屏，那栩栩如生的画面风格与引人入胜的故事情节，无不触动着观众的心弦。\n\n才华横溢的动画师和艺术家们精雕细琢于每一个细节，构建起他们独一无二的世界，让儿童与成人都得以沉浸在动画的魔幻国度中。这种卓越的艺术形式，使观众无论年龄都能暂时逃离现实，畅游于那些瑰丽奇幻的世界中，体验一段别样的人生。\n\n其中，成功的动画作品《时间的感知》便是一个鲜活的例子。凭借其扣人心弦的情节，该作品俘获了观众的心，斩获多项大奖，并因其精致的画面和高质量的动画制作而广受赞誉。\n\n凭借着创意十足的构思与创新的艺术手法，俄罗斯动画正在不断赢得观众的喜爱，并在世界动画舞台上稳固其地位，展现出蓬勃的发展潜力。"
 russia.383.a: "太棒了，俄罗斯！"
 russia.384.t: "马克西姆·卡茨之夜"
 russia.384.d1: "\"怎么？没想到会在这儿看到我吧？说实话，我自己也挺意外的！卡茨居然上电视了！这还得感谢瓦列里·拉什金同志为我们国家建立的新苏维埃民主制度。你们觉得，如果还是普京当政，我能有机会站在这里吗？在新民主制度下，所有苏联公民都享有言论自由和表达自由的权利。所有苏联公民都有权参加选举，并选择他们在政府中的代表。所有政党都不受限制，他们都有进行政治活动的自由。瓦列里·拉什金同志创建的新民主制度，不仅确保了自由和平等，更重要的是，它保障人权。这个体系拥有强大的法律基础，可以保证司法公正，保护公民的合法权益…现在，让我们谈谈我们是如何以最小的伤亡赢得欧陆战争的，以及这场战争为何会发生…"
 russia.384.d2: "\"怎么，没想到会在这里见到我吧？我自己都还觉得不可思议呢！我，卡茨，竟然上了电视！而这一切，全都要归功于我们共同的斗争！经过这么多年的努力，我们终于胜利了！是的，那一天终于到来了！现在，我们可以真正着手构建一个真正的民主政体，而不是这个被称作‘新苏维埃民主’的怪胎！说实话，那套东西简直是无稽之谈！拉什金所谓的制度根本就没有任何规划与蓝图，它一无是处，所有的齿轮都无法顺畅运转。结果呢？无序和混乱！一切都陷入停滞，人民陷于痛苦之中。而这套体系最荒谬的，莫过于它的名字——‘新苏维埃民主’？是谁发明了这个词？真是荒唐可笑！所谓民主，在一切都由某一个人独断专行时，还能谈什么民主？大家都知道，国家所有的重要决定，全都是拉什金一人拍板决定的……接下来，我们来谈谈欧陆战争的爆发原因以及这一切是如何发生的……\""
 russia.384.a: "…不过，先插播一条广告，稍后回来。\""
 russia.385.t: "莫斯科地铁发生恐怖袭击"
 russia.385.d: "纳粹残害人民"
 russia.385.a: "苏卡"
 russia.386.t: "军事政变"
 russia.386.d: "就在今天夜间，警卫队进入了莫斯科并占领了城市内部的战略要地。苏联总统阿列克谢·纳瓦利内在电视上发表了全国讲话，他在其中宣布辞去总统职务并支持苏联武装部队参谋长瓦列里·格拉西莫夫的决定。\n\n\"亲爱的苏联公民们，\n\n今日，我为维护国家的和平与稳定，被迫在此宣布辞去苏联总统的职务。\n\n我相信，你们中的许多人都想知道我为何做出如此唐突的抉择。事实是，我国如今正面临严峻的挑战和问题，需要任以贤人以尽快解决。我意识到，我并不能保证我的行动会为国家带来积极的结果，因此在此我正式宣布将权力移交至瓦列里·格拉西莫夫将军。\n\n你们当中的许多人可能会因此恐慌或是担忧，但请你们保持冷静并支持新政府。\n\n在国家危急关头，我们必须团结一致，保障国家的繁荣稳定。我向你们保证，瓦列里·格拉西莫夫将军将履行宪法，尊重每位公民的权利和自由。\n\n我相信，在他的领导下，我们的国家哎将克服万难，变得更加强大富足。\n\n感谢您的关注，让我们共同努力，为维护国家的和平与安全贡献力量……"
 russia.386.a: "……我说的都没问题吧？\""
 russia.387.t: "集权共产主义者反对共产主义人民解放军！"
 russia.387.d: "在一场出人意料的变故中，尽管全国在\"紧急状态\"期间已对左翼政党施行全面禁令，许多共产党人却开始公开谴责共产主义人民解放军的恐怖主义活动。其中最直言不讳的批评者——马克西姆·苏拉金发表了一份正式声明：\"……任何参与恐怖主义活动、对祖国实施攻击的所谓‘马克思主义者’，都不配被称为共产主义者……\"。随后，\"俄罗斯联邦共产党党员组织\"的发言人季穆尔·拉赫梅图林也召开了一次会议，公开谴责共产主义人民解放军的行为。\n\n鉴于近期这些事件，俄罗斯自由民主党面临艰难抉择：是支持这些所谓的\"红色保守派\"，允许其在公共空间中存在，还是继续对任何左翼媒体与组织采取严厉政策。"
 russia.387.a: "为了全俄罗斯的统一！"
 russia.387.b: "无论他们声称多么\"立场一致\"，都绝不宽恕，绝不留情。"
 russia.388.t: "库尔金扬组建全俄人民阵线"
 russia.388.d: "谢尔盖·库尔金扬一直被共产主义者视为圈外人，他们认为他过于神秘、过于宗教化，甚至带有阴谋论色彩，难以被接受。然而，弗拉基米尔·日里诺夫斯基却将他视为\"听话的社会主义者\"的理想人选。\n\n库尔金扬早已组织了一个非正式的政治激进团体——\"时代本质\"，其中成员极为忠诚。他出版了多篇论文和书籍，倡导以\"红色神秘主义\"对抗\"黑色神秘主义\"。尽管该组织在2010年代初期规模不小，也经历了一些起伏，但它并不足以吸引或引导那些可能对自由民主党政府构成威胁的爱国共产主义者。\n因此，经过第三方运作，库尔金扬最终受命创建一个更大规模的社会主义组织，以团结无产阶级的爱国者，由此，\"俄罗斯世界无产阶级人民联盟\"应运而生。\n\n如今在某些妥协条件下，该组织得以在政治清洗与镇压的阴影之外，以亲政府的支持党派姿态运作。然而，库尔金扬依然时常公开批评日里诺夫斯基，指责他\"缺乏对苏联时代的尊重\"。"
 russia.388.a: "我们希望能建立互惠互利的关系，库尔金扬同志。"
 russia.389.t: "左翼政党集体支持苏拉金"
 russia.389.d: ""
 russia.389.a: "哈！？"
 russia.390.t: "拉什金主义之陨"
 russia.390.d: "在经历了与主要对手瓦列里·拉什金的长期政治斗争后，苏联共产党长期主席兼事实上的苏联统治者，尽管竭力维持秩序，最终还是败给了从普京宣传员摇身一变而成的苏维埃总统——弗拉基米尔·索洛维约夫。在苏共分崩离析、失去霸主地位的惨重局面下，苏共中央常委会决定将拉什金从所有职位上免职，并取消其党籍，而常委会成员则在模糊不清的\"在内忧外患中继续为真正的欧洲共产主义斗争\"的声明中，将党改组为一个新的政治实体。瓦列里·拉什金本人对此未发表任何官方声明，自震惊全国的公告发布后，他仿佛从公众视野中完全消失。\n与此同时，索洛维约夫及其盟友正庆祝他们的胜利，因为他们如今已完全掌控苏维埃国家及其事务。然而，只有时间能揭示这场政治博弈的结局是否真的有利于苏联的未来走向。"
 russia.390.a: "这是一个时代的终结，或许也是你想说的。"
 russia.391.t: "索洛维约夫宣布赦免普京遗产罪责！"
 russia.391.d: "今日，弗拉基米尔·索洛维约夫在一次公开演讲后，正式撤销了瓦列里·拉什金对弗拉基米尔·普京的刑事指控，并声称这些指控本身才是真正的犯罪，对这位毕生致力于建设社会主义国家的领袖而言极为不公——他唯一的\"过错\"，仅仅在于他缺少时间去实现自己的宏图伟业。\n索洛维约夫进一步指责拉什金行事幼稚，称这些指控更多是出于拉什金的私人恩怨，而非基于任何根本性的证据。他甚至以赫鲁晓夫的\"去斯大林化\"举措为例，揭露这场政治清洗背后不过是权力斗争的体现。索洛维约夫承诺，他将为普京正名，并复兴其为祖国绘制的伟大蓝图，同时盛赞普京在执政期间所做的许多决定。"
 russia.391.a: "看来，\"再普京化\"已经悄然拉开了序幕。"
 russia.392.t: "今夜聚焦索洛维约夫直播"
 russia.392.d: "晚上好，爱国者们！很多人对于我在成为苏联总理之后依旧继续进行在线节目感到——怎么说呢——‘惊讶’。其实，答案很简单：身为苏联总理的职位没多少事情可做！你们可能会问，为什么？原因就在于那位固执己见的人，以及他建立起的这个破败不堪的体制。当然，你们都知道我指的是谁——‘同志’拉什金。这个自诩为‘第二列宁’的人，坦白说，如果我认为列宁是背叛祖国的罪人，那我或许还真会认同他的说法。列宁绝不是个叛徒，但拉什金毫无疑问是。他那一长串对‘普京罪行’的指控、以及他那所谓完美无瑕的‘新苏维埃民主’理论，只不过是用一本我顺便提过的、枯燥无味的书来‘解释’这些伪善之词的幌子。而在这些表面辞令的背后，藏着的却是腐败、无能，还有他迫切希望我们忘记的过去。\n但我不会让他如愿以偿。\n你们可以把今晚的直播当作是一次揭露真相的行动，就像那只阿列克谢·纳瓦利内老鼠曾经做的那样。唯一不同的是，这次的揭露不仅有理有据，而且我会确保它带来切实的积极成果……"
 russia.392.a: "\"……不过在此之前，我们先来和我们的联合主持人——斯塔斯·瓦西里耶夫——一起快速浏览一下新闻。\""
 russia.393.t: "共产党分裂！"
 russia.393.d: "操！欧洲共产主义垮台了。"
 russia.393.a: "分裂则亡……"
 russia.394.t: "格鲁季宁的博弈"
 russia.394.d: "占位符"
 russia.394.a: "第一块多米诺骨牌"
 russia.395.t: "叶利钦纪念中心"
 russia.395.d: "近期，叶卡捷琳堡的叶利钦中心再度掀起了一股舆论狂潮。事件起因是，7月底，叶利钦中心推出了一场展览，展出了剖开的动物标本和缝合在一起的人体器官，紧接着又宣布了一场名为《猫打嗝和放屁同时进行》的争议性表演。这一系列动作引发了激烈反应，甚至连瑞士方面也对其提出了批评。而博物馆的代表也并不否认他们刻意选择这种表演形式，旨在引发讨论。\n\n最近一次关于叶利钦中心的公开争论发生在\"意义领地\"青年论坛上，现场还邀请了国家杜马的多名议员。叶卡捷琳堡共产党员丹尼斯·库罗奇金向在场的嘉宾提问，质疑叶利钦中心的现实意义。而最具争议性的发言则来自共产党领袖久加诺夫，他言辞激烈地表示：\"所有人都知道，叶利钦中心是美国人特意为我们建造的，每年耗资约120亿卢布。这是国家的耻辱，一个完全由美国人操控展览内容的所谓‘人类中心’，竟被堂而皇之地组织起来。\"\n\n显然，国家杜马内批评叶利钦中心的联盟正持续壮大。8月3日，俄罗斯自由民主党议员雅罗斯拉夫·尼洛夫出人意料地加入了反对叶利钦中心的阵营，提出应将原本用于维持博物馆运转的预算拨给退伍军人和残疾人。眼下，一个严肃的问题浮现——我们究竟该如何处理叶利钦中心？"
 russia.395.a: "普京中心？多棒的主意！"
 russia.395.b: "将其重建为\"俄罗斯军事荣光之殿\""
 russia.395.c: "把它改造成俄罗斯历史博物馆"
 russia.395.f: "拆毁它！"
 russia.395.f1: "让我们把领导层换成更\"爱国\"的。"
 russia.396.t: "俄罗斯承认我们了！"
 russia.396.d: ""
 russia.396.a: "为我们的俄罗斯朋友干杯！"
 russia.397.t: "中国入侵蒙古"
 russia.397.d: "中国军队已入侵蒙古。后者是我们的朋友，在文化上与我们很亲近，同时也是抵御汉族势力的绝佳屏障。我们是否要选择干预？"
 russia.397.a: "威胁干涉"
 russia.397.b: "让步吧"
 russia.398.t: "中国无视警告"
 russia.398.d: ""
 russia.398.a: "他们还在虚张声势，我们不会让我们的盟友就这样倒下！"
 russia.398.b: "占位符"
 russia.399.t: "大俄罗斯崛起"
 russia.399.d: "今天，一大群狂热拥簇和好奇的围观群众聚集在富有悠久历史的克里姆林广场上，见证俄罗斯新任总统、魅力而又饱受争议的弗拉基米尔·日里诺夫斯基的就职典礼。他在千万热情期待的目光中，踏上了讲台。\n\n日里诺夫斯基在演讲中慷慨地宣布，俄罗斯正处于一个旧制度荡然无存的新世纪边缘。他谈到，现在需要一个拥有振兴能力的国家机器，摒弃过时的政策，去适应现代世界的重重挑战。\n\n日里诺夫斯基还热情地强调了俄罗斯民族团结的重要性，他对所谓的\"多元文化\"社会概念进行了抨击，一再强调俄罗斯民族的身份认同与手足同胞情谊。\n\n最后，在人群热烈的欢呼与掌声中，日里诺夫斯基总统自豪地宣布……"
 russia.399.a: "\"……我宣布成立新联邦！\""
 russia.399.b: "\"……我宣布成立新帝国！\""
 russia.399.c: "\"……去他妈的官僚头衔和官样文章！俄罗斯是统一、不可分割的伟大国度！\""
 russia.400.t: "西方抗议选举结果"
 russia.400.d: "懦弱的西方列强在欧洲议会特别会议召开后发表了一份联合声明，他们在其中谴责俄罗斯自民党的接任不具有合法性，并指控日里诺夫斯基是一个独裁暴君。此外，他们还紧赶着颁布了一堆新的制裁措施，先发制人对俄罗斯进行打击，扬言要阻止我们实现所谓的\"帝国主义\"目标，将我们保护波罗的和乌克兰俄罗斯居民的尝试一再污蔑。\n\n日里诺夫斯基在官方回应中亲自反驳了这些声明，\"……那些西方的混账东西不会放过我们，但那又怎样？他们不过是狗急跳墙，这些制裁只会成为我们建立国内经济的推力。我们俄罗斯人对西方只会进行一次制裁，那就是开着坦克一炮轰碎他们的议会大楼。\""
 russia.400.a: "他们害怕了，这可阻挡不了我们。"
 russia.401.t: "民族统一日"
 russia.401.d: "今日十一月四日，俄罗斯迎来了国家统一日的庆祝活动。作为国家最重要的节日之一，它提醒着人们团结与凝聚力的非凡意义。\n在这一天，全国各地举办了丰富多彩的文化与体育活动、节日游行、音乐会与庆典，各个地区积极参与其中，以展示对统一理想的认同与忠诚。\n\n教育青年一代的爱国精神成为了庆祝活动中的重点。中小学生及大学生们参与游行与节日庆典，在这些活动中，他们会聆听关于国家统一日的重要意义及其在历史中的角色的讲解。这些活动帮助年轻一代深刻体会到团结与凝聚力对于实现共同目标的重要性。\n在这个特殊的日子里，铭记团结一致的重要性显得尤为关键。国家统一日呼唤每一个俄罗斯公民积极参与社会生活，为国家的福祉与繁荣共同努力，携手共创光明未来。"
 russia.401.a: "团结就是力量！"
 russia.402.t: "十月革命纪念日"
 russia.402.d: "今日十一月七日，俄罗斯举行了十月革命周年庆。该节日属俄国历史上最重要的节日，纪念了劳动阶级获得国家权力的那一刻。\n\n当天，俄国国内举办了很多庆祝十月革命的活动。许多城市都举行了游行和音乐会，各党派和公共组织均有派出代表参加。\n\n政府尤其注重利用此次盛典培养年轻人的爱国情感。学生们参加各种庆典活动，聆听关于十月革命的重要性及其在国家历史上的地位的讲解。这样做能够帮助年轻一代认识到为权利与自由奋斗的重要性。\n\n在这一天，人们都能想起十月革命基本理想的重要性：为社会正义、平等与自由而战。十月革命周年庆号召全民积极参与社会生活，努力为全体俄罗斯公民建设更美好的未来。"
 russia.402.a: "荣耀属于工人阶级！"
 russia.403.t: "《伊万尼奇的命根子》上映！"
 russia.403.d: "近日，一部令人震惊的Kinopoisk新电影《伊万尼奇的命根子》在全国各大影院上映。\n\n影片讲述了一个生活在破败俄国乡村的年迈酗酒老人的故事。故事开端是因为主角的生殖器区域感染而引发的事件。尽管主题看似荒诞，但《伊万尼奇的命根子》却被誉为现代经典。社交媒体上关于这部电影的讨论热火朝天，观众们纷纷表达自己的看法。该片因其精湛的摄影技巧、精彩的剧本创作及对社会问题的深刻揭示而广受赞誉。\n\n《伊万尼奇的命根子》更是一跃成为我国票房最高的电影，甚至超越了大受欢迎的电视剧《国王与小丑》。影片在俄罗斯的多个电影学会中斩获多项大奖，成为当下最具影响力的佳作。"
 russia.403.a: "一部现代的经典！"
 russia.404.t: "战时民族统一日"
 russia.404.d: "今日十一月四日，俄罗斯迎来了国家统一日的庆祝活动。作为国家最重要的节日之一，它提醒着人们团结与凝聚力的非凡意义。\n在这一天，全国各地举办了丰富多彩的文化与体育活动、节日游行、音乐会与庆典，各个地区积极参与其中，以展示对统一理想的认同与忠诚。\n\n教育青年一代的爱国精神成为了庆祝活动中的重点。中小学生及大学生们参与游行与节日庆典，在这些活动中，他们会聆听关于国家统一日的重要意义及其在历史中的角色的讲解。这些活动帮助年轻一代深刻体会到团结与凝聚力对于实现共同目标的重要性。\n在这个特殊的日子里，铭记团结一致的重要性显得尤为关键。国家统一日呼唤每一个俄罗斯公民积极参与社会生活，为国家的福祉与繁荣共同努力，携手共创光明未来。"
 russia.404.a: "若我们团结一心，便能百战不败！"
 russia.405.t: "叙利亚取代南非加入金砖国家联盟+"
 russia.405.d: ""
 russia.405.a: "酷"
 russia.406.t: "卢卡申科来电"
 russia.406.d: "随着此角色的离去，预言之线已被切断。读取存档以恢复命运的织锦，或继续存在于你所创造的注定毁灭的世界。"
 russia.406.a: "我必须说，这种反应完全出乎我的意料。"
 russia.407.t: "掌控现状的男人……"
 russia.407.d: "严厉控制媒体是防止我们的社会像美国那样分崩离析的必要手段。\"自由\"只能在有限的程度上运作，而只有当真相是属于我们的时候，知晓真相的自由才是有益的。\n\n无论是电视、社交媒体还是报纸，出于国家整体利益的考虑，都应当由国家进行监督和审查，以维护民族的团结与社会的稳固。\n\n然而，在我们的行政机构中，仍有一些声音认为，过度的审查正是导致苏联解体的重要原因之一。他们主张民众在媒体内容上应有一定的自由意志，但这份自由应当被管理与引导，以免社会产生不稳定的因素。唯有在理性分寸的控制下，才能在信息自由与国家安全之间取得平衡。"
 russia.407.a: "团结才能得胜。"
 russia.407.b: "切莫让我们步入那本\"数字\"书的后尘。"
 russia.408.t: "俄罗斯合作者遭到曝光！"
 russia.408.d: "尽管\"自由俄罗斯军\"在我们的媒体中最初取得了成功，但令所有人意想不到的是，俄罗斯的情报人员和影响力代理却成功突破了我们官方媒体的层层封锁，揭露了许多俄罗斯异见者所持的极右翼、几近希特勒式的思想。在随后的采访中，当被问及这些指控时，\"自由俄罗斯军\"的一位领导者表示他对\"新纳粹\"标签并不介意，因为他与他的战友们自认是极右翼民族主义者。这番言论使局势更加恶化，尤其是他在采访最后坦率地表示，西方资助者们早已知晓他们的立场，并对此视若无睹，因为他们的唯一敌人是俄罗斯政府——一个借助\"肮脏的车臣人和塔吉克人\"之手屠杀纯血俄罗斯人的政权。此番言论无疑如同一声惊雷，在各方激起了轩然大波。"
 russia.408.a: "丢人现眼！"
 russia.409.t: "\"新时代\"运动"
 russia.409.d: "出乎所有人意料的是，俄罗斯\"第三\"党新俄罗斯最近发起的\"新时代\"运动大受欢迎。该运动让新俄罗斯成为选民区别于保守的统俄党和社会主义的人民俄罗斯党外的新选择，并承诺\"为年轻人提供发展道路\"，经济发展与人身自由。达万科夫非常积极地参与了全国各地的竞选之旅，倾听人民的愿望，并举行集会阐述他的计划。"
 russia.409.a: "总统候选人达万科夫随时为您效劳。"
 russia.410.t: "\"渴望变革\"运动"
 russia.410.d: "近日，俄罗斯人民党发起了一项名为\"渴望变革\"的运动，呼吁选民投票支持国家进行变革，支持社会主义。与此同时，俄罗斯人民党还发布了几个配上了电影乐队歌曲《渴望变革》的宣传视频，这些视频在俄罗斯社会引起了巨大的轰动。"
 russia.410.a: "变革！"
 russia.411.t: "统一俄罗斯发动网络煽动攻势"
 russia.411.d: "统一俄罗斯党决定采取一种非传统的竞选方式，更确切地说，该党决定发起一场线上宣传活动，以吸引年轻人参与选举。对此，人民俄罗斯党的一些议员表示，这不过是\"新版本的叶利钦手段\"。\n\n在这次活动中，统一俄罗斯党的知名成员积极参与了宣传。例如，德米特里·帕特鲁舍夫应知名主播日米列夫斯基的邀请，参加了他的一次直播节目。期间，主播向帕特鲁舍夫提问了不少关于选举活动的问题，这不仅激发了年轻观众的兴趣，还引发了一波\"梗图\"和\"网络艺术\"的热潮。随着此次活动的走红，漫画《超级普京》的续集也随之发布，为这部久负盛名的故事画上了句号。"
 russia.411.a: "没有人能重返2012年"
 russia.412.t: "深夜垂钓"
 russia.412.d: "\"他跟头猪一样，\"普季林愤恨的继续说道，\"他他妈连乌克兰语都说不利索！前天我问了那个混蛋戈洛博罗德科一个问题。自从战争开始后，他好像就忘了怎么说俄语了。还给自己改了一个更像乌克兰人的名字……好吧，我问他——乌克兰语里‘猫’怎么说？他说\"Kit\"。行，那我就又问他，那乌克兰语里\"kit\"又是什么意思？\"\n\n\"这下把他难住了。他就光在那皱眉头不动嘴。现在这混小子连早上好都不跟我说了。\"佩蒂亚哈哈大笑。"
 russia.412.a: "生活照常……"
 russia.413.t: "亲爱的俄罗斯公民……"
 russia.413.d: "我们经历了太多风雨，从四面八方被那些妄图毁灭我们国家的敌人包围，到承受无休止的压迫，以及无数次席卷而来的仇恨，我们一次次挣扎着、忍耐着，终于顽强地走到了今天。\n\n我们的对手终究遭遇了他们行动的必然代价，而我们，则在痛苦中收获了辛劳的果实。国家曾多次面临走向黑暗深渊的危险，但凭着你们的信念和不屈的志向，我们度过了历史上最为惨烈的岁月之一。在这段时光中，变革接连不断，战争和死亡如影随形。\n\n当我们的后代回望这段岁月，凝视着世界地图时，他们会为俄罗斯在这动荡年代中竟然能保持相对不变而感到震惊。或许，并非全然未变。我们在内部进行了广泛的改革，为未来的领导者们开辟了更多生存与发展的空间。尽管我们过去的路线确保了国家的稳定，但为了给新一代提供方向，让他们在这份稳定的基础上书写属于自己的未来，这是我们能够做出的最好的抉择。\n\n然而，国家上下却弥漫着无尽的疲惫与伤痛，太多的牺牲已被奉献出来。这些牺牲绝不会被遗忘，那些深深刻在世界上的创痕将长存不灭。我们只能从这些伤痕中学习、重建和进步。我与你们一样深感疲倦，我和你们一样在这段岁月中献出了太多。因此，我怀着沉重的心情，正式宣布我的辞职。这一时刻既苦涩又甜美，未来仍然迷茫不定，但我坚信，想到我们为后继者们铺就的稳固基石，我对俄罗斯和整个世界的未来多了一丝希望。值此，我向大家告别。\n\n感谢你们。"
 russia.413.a: "再一次驶向未知。"
 russia.414.t: "时机已至？"
 russia.414.d: "自从我们的祖国在欧洲取得胜利，并且新领域和新秩序得以稳定以来，我们的总统德米特里·阿纳托利耶维奇越来越多地思考国家和政府的未来。\n\n也许，现在正是需要一个新政府和一种新的国家发展观的时候？\n\n中央集权、备战以及战争本身都让德米特里·梅德韦杰夫付出了大量的心力。\n\n尽管存在一些分歧，德米特里·阿纳托利耶维奇依然是人民中最受欢迎的领导人，其体制也得到了绝大多数俄罗斯公民的支持。然而，如果他已对掌权感到厌倦，亲信们也可能接过权力，开始建设他们心目中的理想俄罗斯。\n可以肯定地说：我们国家的未来取决于这一人的决定。"
 russia.414.a: "梅德韦杰夫的时代应当继续延续下去，还有太多的未竟之事。"
 russia.414.c: "卢卡申科吧，政治强人，强硬政客。"
 russia.414.f: "苏尔科夫，普京时代幕后的红衣主教，精于权谋的政治学家。"
 russia.414.e: "纳杰日丁，年轻人的新希望与温和的改革者。"
 russia.414.j: "菲利莫诺夫，一位热爱传统并时刻准备采取强硬行动的人。"
 russia.415.t: "至高统帅头衔的设立"
 russia.415.d: "近期，俄罗斯政坛发生了一桩令人震惊的事件。俄罗斯自由民主党领袖弗拉基米尔·日里诺夫斯基出人意料地宣布自封为俄罗斯的至高统帅，这一头衔与内战时期亚历山大·高尔察克所使用的称谓相同。\n\n一些西方自由派政治学者指出，日里诺夫斯基此举意在篡权并建立独裁统治。他们警告了这种行动可能带来的严重后果，并呼吁民众进行和平抗议和抵制。\n\n弗拉基米尔·日里诺夫斯基则坚称，只有强有力的领导者才能引领俄罗斯走向繁荣与稳定，而他本人则是唯一具备足够权威和经验来胜任这一角色的人选。\n\n然而，无论日里诺夫斯基的动机和意图究竟如何，他的这一举动在民众中引发了复杂的情绪反应。俄罗斯的政治局势依然充满变数，而至高统帅头衔的设立究竟会带来何种影响，还需时间来揭晓。"
 russia.415.a: "绝对的权力！"
 russia.417.t: "选举！"
 russia.417.d: ""
 russia.417.a: "统一俄罗斯"
 russia.417.b: "人民俄罗斯"
 russia.418.t: "主权民主主义"
 russia.418.d: "俄罗斯总统德米特里·梅德韦杰夫联合几位知名政治分析家，共同出版了他的首部著作《主权民主主义》。书中详细阐述了德米特里·阿纳托利耶维奇自上任以来所推行改革的目标、缘由与深度，并讨论了俄罗斯打造自身特色民主制度的前提条件及必要性，同时列举了改革过程中面临的种种问题。书中，梅德韦杰夫再次强调，他的一切行动都在延续普京路线，并且分享了与弗拉基米尔·弗拉基米罗维奇个人对话的细节。在他的Telegram频道中，梅德韦杰夫表示，这本书将成为俄罗斯青年融入新时代政治生活的有力指南。然而，自由派批评者对该书的评价却颇为尖锐，他们认为书中所描述的不过是\"换了面具的威权主义\"，而真正的民主依旧只存在于西方国家。尽管如此，《主权民主》在支持梅德韦杰夫路线的学生群体中广受欢迎，并持续在俄罗斯政界引发热议与讨论。尽管这本书在国外并未取得同等程度的关注与认可，但它却让许多专家得以更深入地理解俄罗斯国内的政治走向与局势全貌。"
 russia.418.a: "生生不息，繁荣昌盛！"
 russia.419.t: "统一俄罗斯的命运"
 russia.419.d: "随着我们的胜利尘埃落定，统一俄罗斯党的命运却依然悬而未决。\n\n这个党派的多数成员不过是一些见风使舵的机会主义者，只知道向上级拍马逢迎。原本这个党只是为了通过普京所需的政策而存在，如今却开始自认为拥有独立思考的权力。更不用提其中有多少人完全不具备胜任其职位的能力。\n\n然而，作为事实上的\"普京党\"，统一俄罗斯党中仍然藏有不少人才。正是这片平庸之海中的那些天才与技术官僚，才让普京取得了他的种种成就。如果我们能将这些专家和技术人才争取到我们这一边，其带来的好处将不可估量。\n\n那么，我们该如何抉择？"
 russia.419.a: "世上最人道的法庭！"
 russia.420.t: "最终"
 russia.420.d: "前政府倒台后，所有资金渠道瞬间枯竭：无论是俄罗斯共产党人、公正俄罗斯—为了真理党、新人民，还是其他过去依赖克里姆林宫慷慨补贴的小型\"搅局\"政党，他们的资金来源瞬时被切断。党派办公室随之变得人去楼空，积极分子们断了薪饷，一切宣传活动也一夜之间销声匿迹。\n\n这些土崩瓦解的组织的领袖与普通成员开始另寻门路：一些人急忙转投俄罗斯联邦共产党的怀抱，期望在那里找到资源和实现其理念的平台；另一些人则忙着寻找新机会来实现自己的政治抱负，他们或建立私人基金会和慈善项目，或在当地商界中寻求赞助——未来，我们注定会和这些人再度相逢……\n\n唯有自由民主党幸存了下来：日里诺夫斯基以闪电般的速度动员起他的人脉，将党内捐款和其伙伴的个人捐赠重新运作了起来。如今，在俄联邦共产党的那些昔日体制内对手中，日里诺夫斯基是唯一仍在局中的人。他仿佛在提醒我们：在这场政治风暴中，唯有能迅速重整旗鼓者，方能幸存。"
 russia.420.a: "让我们继续关注事态发展……"
 russia.421.t: "新苏维埃宪法"
 russia.421.d: ""
 russia.421.a: "1993年的复仇"
 russia.422.t: "重建最高苏维埃"
 russia.422.d: ""
 russia.422.a: "一切又回到了从前……"
 russia.422.b: "统一俄罗斯的一丘之貉！"
 russia.423.t: "俄罗斯支持我们！"
 russia.424.t: "普里戈任承诺支持日里诺夫斯基"
 russia.424.d: ""
 russia.424.a: "听从弗拉索夫的建议，和他做个交易！"
 russia.424.b: "感激不尽。"
 russia.424.c: "他现在也只能忍气吞声了。"
 russia.425.t: "自民党瓦格纳党员数目增加"
 russia.425.d: ""
 russia.425.a: "有意思……"
 russia.426.t: "普里戈任要求清洗军队"
 russia.426.d: ""
 russia.426.a: "清洗所有清单上的将领。"
 russia.426.b: "我们可以坐下来谈谈……"
 russia.426.c: "叫他们冷静下来。"
 russia.427.t: "民族主义者要求废除自治区"
 russia.427.d: "随着\"神圣俄罗斯\"势力的崛起及其在国家事务中的控制力不断增强，他们提出了迄今为止最具争议的政策——彻底取消俄罗斯境内所有少数民族自治机构。这一决定可能会带来严重的后果。\n尽管如此，我们仍有机会在其政策实施前予以阻击，维持现状的僵局，避免激起各地的反俄声浪。保持局势平稳，是当前局势下唯一能够防止民族矛盾加剧的缓兵之计。"
 russia.427.a: "我们只能接受……"
 russia.427.b: "拒绝这个糟糕的提议！"
 russia.428.t: "伊戈尔·吉尔金组建新政党"
 russia.428.d: "吉尔金，这位曾名声不显、持皇俄立场的\"新俄罗斯\"失败独裁者，近日出人意料地被邀请至国防部任职。然而，这位饱受争议的人物并未止步于此，而是带着他的支持者成立了全新党的\"真爱国者党\"。\n尽管吉尔金性格乖戾，广受非议，但该组织仍有一部分受众，他们对日里诺夫斯基的政策及现任政府不满。加入者多为皇俄派或被认为是\"温和\"民族主义者的民众。更令人震惊的是，吉尔金竟成功将其他几个小政党统一到该组织旗下。\n时间将揭示，吉尔金是会带来更多麻烦，还是带来更多好处。"
 russia.428.a: "吉尔金今天不高兴了……"
 russia.429.t: "俄罗斯爱国党要求让步！"
 russia.429.d: "近日，伊戈尔·吉尔金发布了一段视频，言辞激烈地指责日里诺夫斯基政府无能且腐败，并声称自己亲眼目睹了这些问题。随后，他在公开声明中更是直接要求政府授予他高级职位，以便能让政府高效，且不懈地铲除腐败和懒政。俄罗斯爱国党已就此事正式向弗拉基米尔·日里诺夫斯基递交了官方照会。\n\n尽管爱国党的声势远超预期，赢得了比想象中更高的支持率，但我们可抵制其影响，将其逐步压制至无关紧要的地步。或者至少得是个不那么……好吧，不那么吉尔金的人。"
 russia.429.a: "好吧……"
 russia.429.b: "俄罗斯爱国党应该另请高明吧？"
 russia.429.c: "让我们给他点颜色瞧瞧！"
 russia.430.t: "日里诺夫斯基被迫担任摄政职位"
 russia.430.d: "尽管我们竭尽全力，但对温和派君主主义者的依赖最终导致他们几乎完全掌控了政府的内部事务。许多自由民主党成员被逐出职位，其空缺则被俄罗斯爱国党员所取代。\n弗拉基米尔·日里诺夫斯基在君主派政治家与政策的浪潮中逐渐失去权力。他陷入了自己编织的政治网络，被操控得如同提线木偶一般，如今只能被迫接受所谓的\"设立摄政制\"提议。为了保住国家政权，俄罗斯自由民主党如今不得不与俄罗斯爱国党合作。"
 russia.430.a: "所有的星星最终都会黯淡无光……"
 russia.431.t: "托卡耶夫之胜"
 russia.431.d: "现任哈萨克斯坦总统卡西姆-若马尔特·托卡耶夫对国内抗议活动表现出了极大的关切。他选择站在人民一边，并开始对长期把持权力的纳扎尔巴耶夫旧派官僚进行大规模清洗。托卡耶夫还决定揭露纳扎尔巴耶夫这一统治哈萨克斯坦三十余年的领袖所缔造的个人崇拜，承认纳扎尔巴耶夫任内所做的许多决策存在错误，并宣布启动大规模民主改革及起草新宪法。与此同时，哈萨克斯坦对俄罗斯在困难时期给予的援助表达了深切的感激之情。作为友好和尊重邻国的象征，哈萨克斯坦决定启动两国经济一体化的新阶段。如今，俄哈两国友谊比以往任何时候都更加牢固！"
 russia.431.a: "一个时代结束了……"
 russia.432.t: "骚乱终结"
 russia.432.d: "哈萨克斯坦的抗议活动现已平息，当局宣布全国秩序得以恢复。在此次事件中，共有4353人受伤，其中包括3393名安全部队人员。共有238人丧生，其中包括19名警察和军方人员。这些遇难者的遗体均已送至当地停尸房。随着局势的平息，哈萨克斯坦政府和政治领域也发生了重大变动。政府更换了总理、国务秘书、下议院议长以及半数部长。曾经执掌权力的纳扎尔巴耶夫失去了其在执政党\"祖国之光\"党内的领导地位，总统托卡耶夫接替了这一职位。与此同时，此次抗议的导火索——天然气价格，也在抗议活动后得到下调。这次动荡究竟会成为重大变革的开端，还是哈萨克斯坦会选择维持现状、避免大刀阔斧的改革？时间将揭晓一切答案。"
 russia.432.a: "终于结束了。"
 russia.433.t: "纳扎尔巴耶夫政变"
 russia.433.d: "在哈萨克斯坦的抗议活动期间，发生了一件令人震惊的事件——政变。由前总统努尔苏丹·纳扎尔巴耶夫的长女达丽加·纳扎尔巴耶娃率领的国家安全委员会部队发动了政变，并成功掌握了国家的权力。长期掌控哈萨克斯坦政坛的纳扎尔巴耶夫家族，如今牢牢控制着整个国家。曾在政府和议会中担任要职的达丽加·纳扎尔巴耶娃，如今成为了真正的独裁者。她将自己视作\"哈萨克斯坦的凯瑟琳大帝\"，并毫不掩饰其勃勃的政治野心。在公开演讲中，她宣称将带领哈萨克斯坦迈向新的巅峰，使其成为世界一流强国之一。"
 russia.433.a: "对我们来说，变化应该不会很大……我猜。"
 russia.434.t: "哈萨克斯坦爆发自由主义革命"
 russia.434.d: "哈萨克斯坦近日爆发了大规模的抗议活动，引发了该国政治生活的重大变革。许多专家和观察人士将这一系列事件称为一场\"自由革命\"，其最终结果是民主力量的崛起和掌权。这场抗议的主要领导者是\"哈萨克斯坦民主选择\"组织及其领袖穆赫塔尔·阿布里亚佐夫。阿布里亚佐夫是一位前银行家和企业家，早在2009年因与政府发生冲突被迫流亡海外。抗议爆发后，阿布里亚佐夫毅然返回哈萨克斯坦，领导起了民主与自由的运动。经过数日的群众性抗议活动，哈萨克斯坦政府被迫辞职，穆赫塔尔·阿布里亚佐夫成为了新任总统。他在就职演讲中承诺将推行广泛的改革，建立一个真正的民主国家。"
 russia.434.a: "出乎意料的结果。"
 russia.435.t: "哈萨克斯坦爆发社会主义革命"
 russia.435.d: "哈萨克斯坦的众多抗议活动见证了由哈萨克斯坦社会主义运动和艾努尔·库尔曼诺夫领导的社会主义革命。哈萨克斯坦的左翼势力团结起来，为工人和穷人的权利而斗争。哈萨克斯坦的主要左翼政党，包括共产党、全国社会民主党和人民党，组织起了一个不稳定的联盟并夺取了国家政权。新政府承诺进行激进的民主和社会改革，以改善普通公民的生活。第一批措施之一是提高工资和养老金，以及为所有公民提供免费教育和医疗。"
 russia.435.a: "出乎意料的结果。"
 russia.436.t: "邀请加入联盟国"
 russia.436.d: ""
 russia.436.a: "是"
 russia.436.b: "不"
 russia.437.t: "他们同意了"
 russia.437.d: "哈萨克斯坦已准备好与我国加强兄弟般的情谊，并签署使其成为联盟国一部分的重要文件。我国外交部长与哈萨克斯坦外长会晤，商讨了加强安全与经济合作的计划。\n\n此外，国防部也与哈萨克斯坦同行举行了会谈。双方讨论了在联盟国框架下统一部队的问题，这也符合国家元首签署的相关法令。\n\n当前，哈萨克斯坦已与俄罗斯势力范围紧密相连。"
 russia.437.a: "为我们的哈萨克斯坦朋友干杯！"
 russia.438.t: "他们拒绝了"
 russia.438.d: "哈萨克斯坦的反俄政府已经露出真面目，拒绝了我们为保障中亚地区安全及俄罗斯与其人民利益所提出的合理要求。\n作为回应，哈萨克斯坦\"政府\"公然宣称我们的要求不可接受，形同勒索，并已开始单方面取消多项双边宣言。忠于我们的俄罗斯裔民众已发起机会，抗议哈国政策。\n\n哈萨克人很快就会明白，这种公开的恐俄行径将付出何种代价。"
 russia.438.a: "发起军事行动解决哈萨克斯坦危机。"
 russia.439.t: "托卡耶夫重新掌权"
 russia.439.d: "在经历短暂的临时政府时期后，托卡耶夫以总统的身份重新掌权，虽然现在\"独裁者\"这个称呼更适合他。托卡耶夫迈出了艰难的第一步，他将他的政党体制改革得更加中央集权，反俄和自由主义示威则受到俄罗斯武装部队和哈萨克斯坦军队的严格监管。\n纳扎尔巴耶夫的遗产正被逐步铲除，而一个新的\"巴特尔\"托卡耶夫正逐步在这个国家构建。而他本人也完全忠于俄罗斯，并时刻准备好对我们及我们的盟友做出任何让步。或许某天哈萨克斯坦会回归正轨，但现在，新的现状将成为很长一段时间内的新常态。"
 russia.439.a: "哈萨克斯坦回来了！"
 russia.440.t: "重命名阿斯塔纳"
 russia.440.d: "多亏了我们的军事干预，托卡耶夫成功稳固了在哈萨克斯坦的权力。然而，世间万事皆有代价，哈萨克斯坦不得不就主要由俄罗斯族群居住的北部领土举行公投，结果可想而知。这项协议包括将阿克莫拉地区及其首府阿斯塔纳纳入版图，并恢复其历史名称\"阿克莫林斯克\"。与此同时，阿拉木图重新成为哈萨克斯坦的首都。\n\n阿克莫林斯克的历史可追溯至1830年，当时，它只是一个哥萨克哨所，旨在守护那些已归入俄国统治的村落，使其免受叛乱冲击。这座城市的名字沿用了一个多世纪，直到1961年，因在北高加索与西西伯利亚处女地开发中的重要性而被更名为\"切利诺格勒\"。苏联解体后，它又被称为\"阿克莫拉\"，而后，努尔苏丹·纳扎尔巴耶夫将其升为首都，并命名为\"阿斯塔纳\"。如今，尘封的历史被重新揭开，历史的正义终归得到了回响。"
 russia.440.a: "好。"
 russia.441.t: "托卡耶夫请求援助！"
 russia.441.d: "近日，哈萨克发生了一场违宪政变，反俄势力借此夺取了政权。幸运的是，合法总统卡西姆若马尔特·托卡耶夫已被我们的安全部门妥善安置，他现在正身处一座位于奥伦堡的临时别墅内。经历了几日的镇定期后，他给俄罗斯联邦总统写了一封信，请求其帮助恢复哈萨克斯坦共和国的合法秩序与稳定。这封信的第一部分遭到俄罗斯媒体大肆传播，但第二部分却并未对外公布，托卡耶夫在信中承认其多元政策的失败，并许诺如果俄罗斯同意干预，他将做出巨大让步。其中，托卡耶夫甚至同意在哈萨克斯坦北部地区就加入俄罗斯进行全民公决。尽管托卡耶夫的\"礼物\"如此慷慨，但最终决定仍在俄罗斯政府手中。"
 russia.441.a: "我们会援助托卡耶夫！"
 russia.441.b: "不了，谢谢你的好意。"
 russia.441.c: "我们将为援助索取更多——乌拉尔斯克与古里耶夫。"
 russia.442.t: "完全去纳扎尔巴耶夫化"
 russia.442.d: "哈萨克斯坦总统托卡耶夫已启动国家历史审查，重点聚焦执政近三十年的首任领导人纳扎尔巴耶夫时期。\n新披露的档案资料证实其任内存在腐败、镇压等威权行径。\n\n托卡耶夫强调哈萨克斯坦正开启新时代，既往过错与罪行将无处容身。\n\n众多前政权受害者已获得赔偿与公开道歉。多名前高调官员被拘，纳扎尔巴耶夫家族资产遭当局冻结。"
 russia.442.a: "挺好？"
 russia.443.t: "民主回归哈萨克斯坦"
 russia.443.d: "经过长期权力集中后，托卡耶夫总统宣布启动新改革，旨在恢复国家民主制度与自由。\n\n托卡耶夫在官方讲话中向民众承诺，在完成清除危险破坏分子的必要措施后，国家将回归真正民主。他强调，如今每位哈萨克斯坦公民都能随时随地自由表达观点。\n\n稳定期遭暂停活动的多个政党已重启运作，正为马日利斯议会选举做准备。"
 russia.443.a: "我们也该回来了。"
 russia.444.t: "普里戈任发动正义行军！"
 russia.444.d: "由于我们在北约战争中惨败，叶夫根尼·普里戈任决定利用政府虚弱的时刻和人民绝望起事。他于今日宣布\"将不再接受害虫和寄生虫的命令\"，开始公开反抗我们的政府。\n他残酷地控制了列宁格勒州，其手下的瓦格纳雇佣兵已准备向莫斯科进军，称之为\"正义行军\"。\n军方将领已与克里姆林宫取得联系，并提议将权力直接移交给军方，以保障稳定，粉碎政变。"
 russia.444.a: "向军方让步吧。此等\"叛乱行径\"必被剿灭。"
 russia.445.t: "正义行军开始！"
 russia.445.d: "在普里戈任发表官方声明几小时后，手下士兵开始向俄罗斯首都大举挺进。他们已经摧毁了路上的一小群国家军队。\n最高统帅部经过数小时的规划和会议，只提出了两个方案；要么派一个集团军去拦截和伏击他们，要么在主要城市，尤其是莫斯科准备重兵防守。"
 russia.445.a: "现在就干掉他们！"
 russia.445.b: "我们必须小心行事。组织防御！"
 russia.446.t: "普里戈任成功了！"
 russia.446.d: "A计划导致了当局的惨败，成百上千的俄罗斯士兵被曾经的袍泽兄弟杀死。普里戈任在进军莫斯科途中只遭到了零星抵抗，而国家军队也在随后宣布投降。叶夫根尼·普里戈任现在发现自己掌舵着一个饱受战争蹂躏的国家，局势与过去的麻烦时期相似。已经有报道称纳瓦利内逃离了监禁，并召集他的自由主义匪帮反对瓦格纳的起义。\n普里戈任绝不屈服！他将恢复俄罗斯的荣耀和国力，还要让北约狗和乌克兰民族主义者加倍奉还!\n现在是时候在莫斯科举行大规模集会了，届时普里戈任将明确宣布他的意图。"
 russia.446.a: "瓦格纳将控制俄罗斯！"
 russia.447.t: "普里戈任失败了！"
 russia.447.d: "B计划导致了普里戈任的惨败，成百上千的俄罗斯士兵被曾经的袍泽兄弟杀死。瓦格纳的行军被迫停下，其被莫斯科及其他城市的牢固防御击败，而瓦格纳残部也在随后宣布投降。尽管叛徒们被击败了，但俄罗斯依然饱受战争蹂躏，人民尤其对军队不满，绍伊古明白这一点，他知道有一个人可以重新把希望和团结不仅仅带给俄罗斯，而是整个欧亚大陆。\n是时候安排一场意想不到的会面了……"
 russia.447.a: "为新俄罗斯添砖加瓦。"
 russia.448.t: "绍伊古同杜金会面"
 russia.448.d: "今日，根据克里姆林宫的官方声明，谢尔盖·绍伊古会见了声名远扬的哲学家亚历山大·杜金。私人会谈的细节仍笼罩在迷雾之中，但不久之后，绍伊古公开宣布放弃权力并重归文官政府的消息便打了所有人一个措手不及。然而权力并未就此重归于国家杜马，而是交到了由杜金的密友领导的\"欧亚党\"这一最新成立的政治实体手中，同时杜金本人则实际领导着新欧亚主义运动。\n许多人仍然在猜测是什么促使将军选择了杜金，有人说是因为他的《地缘政治的基础》在军事院校中广受欢迎，另一些人则说是他的统一苏维埃帝国主义哲学才是促使他成功掌权的关键所在。"
 russia.448.a: "咱们瞧瞧这跳梁小丑能耍什么花招"
 russia.449.t: "暗杀普里戈任未遂！"
 russia.449.d: "今日，俄罗斯避免了一场可怕悲剧。叶夫根尼·普里戈任在莫斯科参加公开游行时险遭不测，防弹衣与警卫的迅疾反应挽救了他的性命。刺杀未遂者被当场击毙。\n\n经查，凶手系45岁的伊热夫斯克居民铁木尔·拉赫梅图拉，在其小圈子内被熟知为自由派极端分子。手机记录显示，其行动前曾在某电报群组中留言：\"我要宰了这头狗秃驴\"。目前该群组所有成员均已遭通缉。\n\n天佑伟大统帅，此番与死神擦肩而过，反令叶夫根尼·普里戈任统治祖国的意志愈发坚定。"
 russia.449.a: "真理得胜，九死无悔"
 russia.450.t: "德米特里·梅德韦杰夫被迫辞职"
 russia.450.d: "梅德韦杰夫的糟糕决策让俄罗斯在战争中一败涂地。如今他别无选择，唯有抱憾终身地离开克里姆林宫。整个政府也跟着他一同辞去了职务，值此国难之际，能暂掌权位的只有国家杜马的议长——维亚切斯拉夫·沃洛金。这并不受人欢迎，但他只能如此。"
 russia.450.a: "\"我已尽己所能，若有贤者，烦请居之\""
 russia.451.t: "自由乌克兰选举"
 russia.451.d: "注意了！\n普京最近宣布了代号\"V50\"的特别星期四行动，目标基辅肯德基，那里鸡肉卷买一送一\n来活儿了，兄弟们"
 russia.451.a: "这玩意没啥意义，因为理论上玩家根本看不到这个（"
 russia.451.b: "这玩意没啥意义，因为理论上玩家根本看不到这个（"
 russia.451.c: "这玩意没啥意义，因为理论上玩家根本看不到这个（"
 russia.452.t: "欧洲佬在经济上还得靠我们呢！"
 russia.452.d: "随着越来越多摆脱外国统治的新兴国家，从黑海到波罗的海，选择与俄罗斯联邦结盟，我们可以开始重建工作。而重建的核心部分在于经济。这些国家因战争和外国帝国主义而被毁，转向我们寻求帮助。自然，作为一个大国，我们有责任接受这份使命，不仅因为其带来的机遇，更因为强者应当护佑弱者。然而，这次重建注定代价不菲，这些几近破产的国家将依赖我们的援助，短期内我们必须承担起这笔巨额开支。\n\n这种局面或许会持续多年，这些国家要么需要重新配置资源，要么必须建立全新的工业基础。而新兴企业与我们的工业巨擘相比，恐怕也难以竞争。然而，若此计划得以成功，我们将迎来一批忠诚的盟友，守护我们西部的疆域，并获得与这些庞大海外市场进行相对自由互动的机会，使我们的经济受益无穷。"
 russia.452.a: "嗯"
 russia.453.t: "久加诺夫退休"
 russia.453.d: "已经成为我国与共产党前任领袖的根纳季·久加诺夫终于决定好好休息了。他多年来一直为他的国家和人民服务，为社会正义和公正而战，而现在，根纳季·安德烈耶维奇将在他郊野的小屋中做他最喜欢的事情——养蜂。一直以来他都对养蜂情有独钟，并认为这是维系生态平衡与生产优质蜂蜜的重要活动。他在政治上的工作与不懈努力将长期被人民铭记。"
 russia.453.a: "\"感谢你的工作，根纳季·安德烈耶维奇\""
 russia.454.t: "选举结果！"
 russia.454.d: "在历经各党派激烈的竞选活动、政治妥协与候选人提名之后，中央选举委员会最终成功完成了所有选票的统计。各党派成员与普通公民屏息凝神，目光聚焦在电视屏幕、手机和电脑上，迫切地等待俄罗斯大选的最终结果揭晓。尽管许多人预测\"统一俄罗斯党\"将继续掌舵国家，但\"人民俄罗斯党\"的胜利依旧存在一定的可能性。而如果天平真正向意想不到的方向倾斜，那么第三党派\"新俄罗斯\"或许也能赢得出人意料的胜利。\n\n最终的获胜者是——"
 russia.454.a: "德米特里·帕特鲁舍夫！"
 russia.454.a1: "谢尔盖·索比亚宁！"
 russia.454.a2: "米哈伊尔·米舒斯京！"
 russia.454.a3: "安德烈·别洛乌索夫！"
 russia.454.b: "维亚切斯拉夫·沃洛金！"
 russia.454.b1: "谢尔盖·绍伊古！"
 russia.454.b2: "谢尔盖·纳雷什金！"
 russia.454.c: "米哈伊尔·德利亚金！"
 russia.454.c1: "帕维尔·格鲁季宁！"
 russia.454.c2: "瓦连京·科诺瓦洛夫！"
 russia.454.f: "扎哈尔·普里列平！"
 russia.454.f1: "亚历山大·卢卡申科！"
 russia.454.f2: "尼古拉·普拉托什金！"
 russia.454.g: "弗拉季斯拉夫·达万科夫！"
 russia.454.z: "安东·阿里哈诺夫！"
 russia.454.g1: "米哈伊尔·德利亚金！"
 russia.454.g2: "德米特里·帕特鲁舍夫！"
 russia.454.g3: "扎哈尔·普里列平！"
 russia.454.g4: "维亚切斯拉夫·沃洛金！"
 russia.454.h1: "德米特里·帕特鲁舍夫！"
 russia.454.h2: "米哈伊尔·德利亚金！"
 russia.454.h3: "扎哈尔·普里列平！"
 russia.454.h4: "维亚切斯拉夫·沃洛金！"
 russia.455.t: "拉什金为纳瓦利内颁发勋章"
 russia.455.d: "今日，苏联总理瓦列里·拉什金在庄严的仪式上向我国杰出的公民授予了\"祖国功勋\"奖章。然而，这场授勋典礼因一位特殊获奖者的出席而格外引人瞩目——著名反对派人士阿列克谢·纳瓦利内也在获奖之列。仪式在克里姆林宫隆重举行，众多高级官员和媒体代表悉数到场。\n拉什金在致辞中高度赞扬了纳瓦利内对民主的忠诚以及他为对抗腐败和不公正所展现的勇气。尽管双方在政治观点上存在巨大的分歧，但拉什金强调，表彰那些为信仰而战的人是至关重要的。\n纳瓦利内在领取奖章时向拉什金表示感谢，并发表了关于言论自由的重要性及政府应代表所有公民的讲话。他还表达了希望此次授勋能成为促进国家内部不同政治派别之间更大团结与理解的一步。"
 russia.455.a: "有趣的事件！"
 russia.456.t: "米哈伊尔·斯韦托夫建立新民主联盟"
 russia.456.d: ""
 russia.456.a: "痛殴法西斯匪徒！"
 russia.457.t: "俄罗斯国家改革"
 russia.457.d: "俄罗斯联邦对于其公民而言已丧失了其原有价值，统一俄罗斯党的种种弊病，在我们深受腐败政府欺压且该政府无力自我整肃的现实中昭然若揭。尽管曾有过诸多尝试，但显然，旧制度必须被彻底颠覆。对此，我们将以宣布俄罗斯国家取代旧联邦作为改革的起点。\n\n在图瓦人绍伊古将军的允许下，欧亚主义接过了俄罗斯国家的领导权。联邦未能有效保护欧亚人民，绍伊古的家乡图瓦即便享有自治地位，却仍是俄罗斯最为贫困的地区。如今，杜金提出的国家专制改革方案已明确展现出其优势，相较于联邦自治，它更能造福欧亚人民。欧亚主义的胜利成果唾手可及。随着联邦制度的终结和旧宪法的废除，我们将着手在社会各个层面以及政府的各个机构中，彻底清除那些潜藏着的阴暗势力。"
 russia.457.a: "崭新的开始。"
 russia.458.t: "广播一则"
 russia.458.d: "\"我的同胞们，大家好。我是尼古拉·卢卡申科。今天站在这里对我来说是一件罕见的事情，因为演讲并不是我的特长。但诚实，是我的特质。我相信，今天我所说的每一句话都将带给你们一种耳目一新的感受。我的父亲和普京——两位伟大的领导人，他们从无到有地打造了这个国家。他们用敏锐的头脑、坚定的意志，书写了我们的未来。普京给了我们目标与希望，而我父亲的工厂为我们打造了这个世界上最强大的军队……但我们的军队辜负了我们！他们让自己变得臃肿、懒惰、目中无人。但从今天开始，一切都将改变！现在，是时候让新的力量接管管理权了。我们深知这个国家需要什么，我们将会切除顺从与屈服这片腐肉……\""
 russia.458.a: "有力且必要的言辞"
 russia.459.t: "任命亚历山大·杜金为总理"
 russia.459.d: "亚历山大·杜金出任俄罗斯总理一职，表明俄罗斯社会即将迎来迅速变革。在欧亚主义思想家的引领下，俄罗斯将发生史无前例的巨变。\n这一任命在俄罗斯联邦内部引发了轰动，他们原本预期会组建一个紧急政府，却未曾料到会由非统俄党或其附属党派的成员出任总理或总统。对普通民众而言，杜金的任命可以说是引人注目；而对知情者来说，杜金的外交理念和世界观早已深刻影响了普京主义的思想体系，因此这不过是俄罗斯及其政府发展的自然结果，并非统一俄罗斯的简单延续，而是超越了单纯模仿的所谓\"欧亚\"外交政策，全面接纳欧亚大陆作为政治实体的全新进化阶段。\n\n在接下来的数月里，俄罗斯将步入变革的新纪元。我们的欧洲对手必然会以审视和怀疑的眼光看待我们，这倒也在情理之中。西方世界难以接受一个强大的欧亚大陆的存在，而这正是我们必须坚定立场，且杜金总理任职至关重要的原因所在。在杜金的引领下，俄罗斯左派与右派将同心协力，共同清除自由主义、剥削性寡头集团以及掌控数百万人命运的国际巨企。欧洲将有望摆脱长期困扰其的顽疾，杜金将治愈俄罗斯，而且很快也将治愈西方。"
 russia.459.a: "杜金代表改革，真正意义上的改革"
 russia.460.t: "叛徒们变得越来越猖狂了！"
 russia.460.d: "俄罗斯民众对战争已感到厌倦。梅德韦杰夫先前的总统任期曾广受赞誉，但随着北约军队步步东进，那些温情脉脉的时光以及对普京时代的怀念之情已荡然无存。我们的高加索领土被分割，与黑海的联系也被切断。更令人痛心的是，作为和平的代价，我们不得不接纳政治流亡者并释放那些政治犯。\n\n我们的军队如同流沙般溃散至街头，与那些受到西方情报组织和支援团体撑腰的自由主义者同流合污。不仅仅是自由主义者，还有民族主义者、共产主义者，以及我们曾在各个合法政党中的盟友，各种政治势力均纷纷涌现，企图颠覆统一俄罗斯，摧毁那个长期维系俄罗斯稳定、抵御寡头与西方侵略的中坚堡垒。然而，我们未能坚守住这座堡垒，反而向寡头势力低头以换取战争支持，最终也未能抵挡住西方的侵略步伐。\n\n部分瓦格纳部队也失去了控制，自战败以来，普里戈任便消失得无影无踪。军方部分人士则竭力迫使政府允许他们在绍伊古的领导下组建紧急政府。鉴于部队已进驻莫斯科以确保其安全，这一要求显然无法被拒绝。我们已然步入了一个全新的动荡时代。"
 russia.460.a: "所有人都在反对我们！"
 russia.461.t: "体制外反对派"
 russia.461.d: "在任何国家，都有这么一帮人，他们不参与国家通常的政治活动，而是尝试组织起自己的政治活动以制衡官方政治。从历史角度来看，俄罗斯的这帮人就是自由派。尽管他们其中还掺杂有许多其他\"杂色\"，但自由主义无疑是其主心骨。尽管很大程度上，他们威胁不到当前的国家体制，但他们的存在及发展壮大可能会对我们国家产生危害。这些西方的走狗妄图让俄罗斯走上歪路，并千方百计阻止我们实现心中的共同理想。\n\n政府机关应当监视£GFX_RF_logo 自由主义反对势力的成长，并以各种可行手段削弱、压制其力量，减少他们的危害。"
 russia.461.a: "西方的走狗还挺能干……"
 russia.462.t: "修正案投票成！"
 russia.462.d: "人民投票\"赞同\"，社会团结得以维系。"
 russia.462.a: "荣耀属于普京！"
 russia.463.t: "抗议投票结果！"
 russia.463.d: "我们的官员虽已完成宪法修正案的投票程序，但整个过程却极为草率，引发各方不满。自由派反对派认为此次选举毫无意义，因此大多对投票置之不理。然而，莫斯科的共产党人却未曾错失良机。在瓦列里·拉什金的带领下，他们迅速在莫斯科发起了大规模抗议。尽管修正案最终通过，但支持率远低于预期，这无疑是对当局的一次沉重打击，也在社会各界激起了广泛的愤怒情绪。"
 russia.463.a: "下次我们得更小心点"
 russia.464.t: "普京就宪法修正案发表演讲"
 russia.464.d: "在一场备受瞩目的演讲中，俄罗斯总统弗拉基米尔·普京向全国发表讲话，阐述了一系列拟议中的宪法修正案，并宣布启动全国公投的筹备工作。这些修正案一旦获得通过，将为俄罗斯的政治格局和治理结构带来深远的变革。\n在演讲中，普京总统强调了更新国家宪法的重要性，指出这将更好地反映国民日益增长的需求和期望。他强调，所提议的修正案旨在强化民主制度，保障个人权利，并确保俄罗斯的持续稳定与发展。"
 russia.464.a: "让人民们去决定！"
 russia.465.t: "与伊朗合作？"
 russia.465.d: "在反恐行动全面展开对塔利班的打击之际，寻求伊朗的有限援助不失为一个明智之举，毕竟伊朗与塔利班政府之间素有紧张关系。\n尽管我们并不需要伊朗的全力参与，但若能促使其在边境地区对塔利班武装展开小规模冲突，扰乱敌方的补给线，这无疑将有助于加速反恐行动目标的实现。"
 russia.465.a: "发出正式要求。"
 russia.465.b: "我们靠自己解决了塔利班！"
 russia.466.b: "不"
 russia.466.t: "伊朗拒绝了合作"
 russia.466.d: ""
 russia.466.a: "遗憾。"
 russia.467.t: "伊斯兰行军"
 russia.467.d: "占位符"
 russia.467.a: "不管如何，我们都会继续！"
 russia.467.b: "如果人们希望如此……"
 russia.468.t: "\"去伊斯兰化\"的结果"
 russia.468.d: ""
 russia.468.a: "这不是我们想要的"
 russia.469.t: "国家无神论？"
 russia.469.d: "在苏维埃政权建立之前，尽管俄罗斯正教会表面上享有宗教自由，但实际上一直充当着社会控制的工具，向民众灌输\"必要\"的思想。然而，我们已拨正这场不公，削弱了东正教的权势，使其难再垄断思想领域。但党内仍有同志认为，这样的改革力度尚显不足，应该全面回归国家无神论原则。尽管这一倡议体现了回归旧苏维埃秩序的崇高意愿，但在大多数人的眼中，这一举措过于激进。我们究竟该如何抉择？"
 russia.469.a: "牛逼！"
 russia.469.b: "太过强硬了……"
 russia.470.t: "俄罗斯独立游戏开发商的崛起"
 russia.470.d: "随着被遗忘数十年的俄罗斯先锋派与未来主义的复兴，艺术家、音乐家与作家们纷纷投入创作，打造出了一件件色彩绚丽、风格独特的作品。为了扶持这些新兴才俊，国家开始拨款用于创作新作，并组织展览、音乐会及其他文化活动。\n\n与此同时，电子游戏行业也没有被落下。许多开发者开始设计那些形式奇异且发人深省的游戏作品，将先锋派与未来主义元素融入游戏之中，创造出真正独特的虚拟世界。这些游戏中的不少作品迅速在\"奇异游戏\"爱好者中掀起热潮。\n\n正是得益于独立游戏产业的这一轮蓬勃发展，俄罗斯一跃成为了晦涩而先锋游戏创作的全球领军者之一。"
 russia.470.a: "内亚松……"
 russia.471.t: "选出新俄罗斯地区的首府"
 russia.471.d: "新俄罗斯统一谈判仍在持续，但我们必须首先解决一个关键问题：统一后的共和国首都应设在哪座城市？\n\n目前，有两座城市具备这一资格——顿涅茨克与卢甘斯克。\n顿涅茨克是重要的工业与矿业中心，人口众多，但地理位置临近前线，安全形势较为严峻。\n卢甘斯克人口较少，然而同样具备强大的工业基础，且地理位置相对安全。\n\n这一议题的讨论或许将持续相当长时间，但我们的选择是……"
 russia.471.a: "卢甘斯克根正苗红！"
 russia.471.b: "顿巴斯的心脏顿涅茨克！"
 russia.472.t: "新俄罗斯政府的首脑？"
 russia.472.d: "关于顿巴斯共和国统一的谈判仍在继续，而目前我们则面临另一个问题：谁将成为新国家的领导人？\n\n目前有两位候选人竞争这一职位：丹尼斯·普希林和列昂尼德·帕谢奇尼克。普希林是顿涅茨克人民共和国的现任领导人，他在极受欢迎的亚历山大·扎哈尔琴科去世后接管了权力。尽管普希林享有相对较高的民众支持率，但他始终未能与扎哈尔琴科媲美。在从政之前，他曾从事商业活动，甚至与臭名昭著的\"MMM金融互助社区\"创始人谢尔盖·马夫罗季有过关联。\n\n帕谢奇尼克是卢甘斯克人民共和国的现任领导人，他此前曾与乌克兰安全部门有联系，甚至拥有乌克兰安全局上校的军衔，但他的忠诚毋庸置疑。相比普希林，帕谢奇尼克拥有更丰富的政治经验，同时民众支持率也略高。两位候选人各有优缺点，但无论如何，最终将由其中一人领导新俄罗斯的未来。"
 russia.472.a: "帕谢奇尼克的经验更宝贵！"
 russia.472.b: "普希林的企业管理能力更有用！"
 russia.473.t1: "新俄罗斯会谈结束！"
 russia.473.t2: "新俄罗斯会谈匆忙结束"
 russia.473.d: ""
 russia.473.a: "团结起来才强大……"
 russia.474.t: "久加诺夫推动新红带"
 russia.474.d: "俄罗斯联邦共产党领导人提出了一项引人注目的建议：复兴所谓的\"红带\"。\n\n\"红带\"是指俄罗斯中部、北高加索、西伯利亚和远东地区等一系列区域，这些地区长期以来在地方和全国选举中一直支持共产党。在1996年总统选举中\"红带\"表现尤为突出，为久加诺夫在与叶利钦的对决中提供了重要支持。\n\n尽管随着时间的推移，人们对共产党的支持率逐渐下降，但这一概念至今仍未失去其现实意义。如果共产党能够成功恢复这些地区民众的信任，它将在与其他政治力量的竞争中占据显著优势。"
 russia.474.a: "啊……想要新的\"红色复仇\"吗?"
 russia.475.t: "日里诺夫斯基准备寻访国内"
 russia.475.d: "自由民主党的领导人无疑是当代俄罗斯政坛最具戏剧色彩的人物之一。他在国家杜马的激辩、电视荧屏上的犀利言辞，以及那些令人始料未及的举动，使他在争议之中收获了无数民众的青睐。\n\n日里诺夫斯基素来擅长民粹策略，而其中最具代表性的，便是他惯用的\"走向民众\"战术。他奔走于全国各地，与寻常百姓攀谈，向广大听众发表慷慨激昂的演说，倾听社会各界对时局的真实心声。\n\n近日，这位政坛老将再次宣布，将亲赴多个俄罗斯城市，与支持者面对面交流，并在每座城市召开小型新闻发布会。尽管自由民主党仍未跻身政坛前列，但这场政治巡游无疑将进一步巩固其立足之地，为党派赢得更广泛的民意基础。"
 russia.475.a: "额……他真精力充沛"
 russia.476.t: "俄罗斯联邦共产党政治家被捕引发争议"
 russia.476.d: "近日，执法机构逮捕了一名共产党成员，而这引发了公众的强烈反应。该党领导层发表声明，称此次逮捕行为违法且未提出任何具体指控。另一方面，自由民主党的议员们却对此决定表示支持。社交媒体上围绕这一事件是否合法与正当展开了激烈讨论。尽管此事并未造成灾难性后果，但无疑对我们的形象造成了一定损害。"
 russia.476.a: "我们下次要更小心……"
 russia.477.t: "俄罗斯自由民主党政治家被捕引发争议"
 russia.477.d: "不久前，俄罗斯自由民主党的一名成员被执法机构逮捕，这引发了社会各界的不同反应。该党领导人弗拉基米尔·日里诺夫斯基在国家杜马讲台上发表讲话，称调查委员会深陷腐败，警方行为并不负责。另一方面，俄罗斯联邦共产党的议员们则公开支持此次逮捕行动。互联网上对此事的合法性众说纷纭，有人认为拘留的理由完全是捏造的。尽管这一事件并未造成严重后果，但无疑对我们的声誉造成了一定打击。"
 russia.477.a: "我们下次要更小心……"
 russia.478.t: "自由派抗议干涉哈萨克斯坦"
 russia.478.d: "集安组织各加盟国近期决定向哈萨克斯坦派遣部队，执行特别维和行动，此举遭到了所谓\"自由派反对派\"的谴责与抗议。许多年轻人走上街头，未经批准地举行集会，声援哈萨克斯坦，并抗议所谓的\"克里姆林宫侵略\"。示威者高喊口号，如\"不要战争！\"、\"哈萨克斯坦，我们与你同在！\"、\"普京集团必须受审！\"、\"释放纳瓦利内！\"等，对政府进行激烈攻击。\n\n的确，我们可以无视这些恶意言论，仅逮捕其中最激进者。然而，安全部门坚信，一切动乱皆始于微末，若放任不管，未来势必酿成更严重的后果。"
 russia.478.a: "谁在乎他们。"
 russia.478.b: "不能表现出软弱，必须出重拳。"
 russia.479.t: "俄罗斯联邦共产党抗议地方腐败官员"
 russia.479.d: "不久前，俄罗斯联邦共产党的活跃分子组织了一场针对地方官员的抗议集会，指责他们肆意侵吞市政预算。数百人参加了此次抗议活动，他们声援共产党，并要求从共产党成员中任命新的官员。\n地方政府拒绝对此事发表任何评论。虽然这只是一起小规模的地方事件，但它无疑为共产党赢得了更多的支持。"
 russia.479.a: "别管他们就行……"
 russia.479.b: "动手麻利点，别让别人发现。"
 russia.480.t: "俄罗斯自由民主党抗议地方\"反俄法令\""
 russia.480.d: "近日，俄罗斯自由民主党发起了一场抗议活动，反对他们认为侵犯俄罗斯民众权利和自由的法律。抗议者要求阻止高加索共和国自治权的扩大，并加强对中亚移民的立法管控。在警方的监管下，活动安全进行，挑衅行为也未发生。尽管这是一次小规模的地方事件，但它显然有助于增强日里诺夫斯基支持者的政治影响力。"
 russia.480.a: "让他们闹吧……"
 russia.480.b: "禁言他们的狭隘言论。"
 russia.481.t: "日里诺夫斯基对进口科兴疫苗表示愤怒"
 russia.481.d: "\"我们有斯科尔科沃和其他科学城！我们为他们提供资金并分配预算！可结果呢？却要从中国进口一切？！这是彻头彻尾的背叛！是对我们杰出人才的不信任，是卑鄙的表现！\"在最近一次国家杜马会议上，弗拉基米尔·日里诺夫斯基以这番言辞猛烈抨击了进口科兴疫苗的提议。这一决定已在俄罗斯社会引发了诸多讨论和争议，而俄罗斯自由民主党以\"反对中国奴役俄罗斯\"为口号发起的多次抗议活动将矛盾推向了高潮。尽管抗议已逐渐平息，但自由民主党及日里诺夫斯基本人仍成功吸引了公众的广泛关注。"
 russia.481.a: "太过自给自足也不好，你该知道的！"
 russia.482.t: "俄联邦共产党党员集会反对普京\"毒素\""
 russia.482.d: "令当局和俄罗斯非体制内左翼运动感到意外的是，俄罗斯联邦共产党的成员对卫星-V疫苗的研发提出了强烈批评，他们以俄罗斯腐败猖獗以及中国已研发出有效疫苗为论据。一个广为流传的说法是，伊热夫斯克市委员会的一名成员据称因接种疫苗后出现并发症而住院。这一消息在WhatsApp和Telegram等社交平台上被大量转发，而该党在乌德穆尔特的分支也在VK上发布了相关帖子。结果，在共产党的集会上，俄罗斯民众目睹了一幅独特的画面：反疫苗活动人士与共产党人一起走上街头，高呼相同的口号。尽管骚动已经平息，但俄罗斯联邦共产党似乎并未因此获得社会的长期关注。"
 russia.482.a: "我们还以为共产党反对迷信呢！"
 russia.483.t: "日里诺夫斯基带领游行队伍为富尔加尔发声"
 russia.483.d: "当谢尔盖·富尔加尔被捕时，全国都屏住了呼吸——日里诺夫斯基会作何反应？他果然没有让人失望！出乎所有人的意料和担忧，弗拉基米尔·沃尔福维奇亲自走在了上万人的游行队伍最前方，向体制发起了挑战！他毫无畏惧地成为了反抗的象征，点燃了人民的愤怒之火，证明了俄罗斯自由民主党不只是一个政党，更是一记重拳，随时准备击向那些威胁其利益的敌人！日里诺夫斯基引爆了政治舞台，谁也没想到这位老领导人竟会如此果敢地出手。"
 russia.483.a: "震撼人心的游行。"
 russia.484.t: "吼吼吼，这都有事件"
 russia.484.d: "国策点那么快，是不是autocomplete了？"
 russia.484.a: "这儿啥都没有"
 russia.485.t: "总统的表态"
 russia.485.d: "美国的崩塌至今仍在俄罗斯社会中回荡不去。尽管我们一向对美式政府持反感态度，但无人能预见这一局势竟会如此急转直下。\n俄罗斯联邦总统就此事件发表了公开声明。虽然发言仅持续了几分钟，但充满了种种思考与历史感悟。然而，在所有言辞中，俄罗斯民众最为深刻铭记的一句是：……"
 russia.485.a: "\"苏联深知，西方资本主义的崩溃是不可避免的……\""
 russia.485.b: "\"俄罗斯公民对普通美国民众所遭遇的困境深表同情……\""
 russia.485.c: "\"我不禁想起俄罗斯哲学家伊万·伊林说过的一句话……\""
 russia.486.t: "俄罗斯联邦军队大教堂"
 russia.486.d: "今日，俄罗斯举行了隆重的俄罗斯武装力量主教座堂落成仪式。这一盛事不仅是加强军队精神和道德基础的重要一步，也象征着国家的团结与对军队力量的坚定支持。\n\n俄罗斯武装力量主教座堂坐落于莫斯科救世主修道院宗主府的院内，成为该国规模最大的正教会教堂，是爱国主义与信仰的重要象征。\n\n此次教堂开幕仪式由教会与武装力量及执法机关互动的主教会议部门主席德米特里·斯米尔诺夫大司祭主持。各宗教、政治及社会组织的代表与军队官兵、退伍军人共同出席了仪式。"
 russia.486.a: "太棒啦！"
 russia.487.t: "总统刺杀未遂！"
 russia.487.d: "来自伊热夫斯克的消息令人震惊——普京总统在对卡拉什尼科夫工厂进行正式访问时遭遇了未遂刺杀。刺客伪装成工厂工人的模样，并携带一把PM手枪，虽然仅朝空中开了一枪，但他仍然设法在人群中接近总统。联邦警卫局安保人员迅速采取行动，将袭击者当场制服，并立即将普京总统紧急撤离现场。尽管有关部门全力封锁消息，但事件依旧被国内多个公共新闻网站广泛报道，引发社会轰动。\n这一公然的暴力反对行径极具危险性，值得高度重视，亟待采取必要措施防止类似事件再次发生。"
 russia.487.a: "我的天！"
 russia.488.t: "官方声明"
 russia.488.d: "在最近发生的刺杀事件引发的动荡中，国家安全委员会紧急召开了特别会议。会议中，各方不仅对最新事态进行了讨论，还制定了关于此次袭击的官方声明。经过缜密分析，尽管动机众说纷纭，委员会最终在众多可能的原因中锁定了三种主要的极端主义意识形态，认为刺客极有可能是受其影响而策划并实施了此次袭击。\n该恐怖分子属于……"
 russia.488.a: "共产主义激进派"
 russia.488.b: "乌克兰班德拉。"
 russia.488.c: "俄罗斯民族主义。"
 russia.489.t: "IT企业声援特别军事行动"
 russia.489.d: "随着特别军事行动的展开，外界普遍担忧俄罗斯信息技术领域可能会对国家政策产生抵触情绪。然而，出乎许多人的意料，俄罗斯国内的一些知名平台如Yandex、VK等纷纷发布了官方声明，公开表态支持政府的决策。这些声明强调，在全球主义威胁日益猖獗的当下，团结一致对于整个俄罗斯民族的重要性。除了表达支持，这些平台也采取了实际行动，确保搜索结果中仅显示支持俄罗斯立场的内容，并全面禁止任何推广纳粹主义的言论。同时，VK平台也果断出手，大幅度清理了亲乌克兰立场的群组和账户。\n在这些平台的积极举措下，俄罗斯民众在抵御内外双重威胁（无论是现实还是数字领域）时，感受到了一种前所未有的安全感与安定感。"
 russia.489.a: "一笔划算的投资！"
 russia.490.t: "紧急镇压"
 russia.490.d: "在近期针对弗拉基米尔·普京的暗杀阴谋之后，俄罗斯的政治反对派们也迎来了清算时刻。为了应对即将发生的大规模动乱，联邦安全局已经部署到几个主要城市。同时，俄罗斯国家近卫军、俄罗斯军事情报局及其他安全部门也向国家杜马承诺，将组建一个联合特遣部队，以防止类似事件的再次发生。在各方都获得了额外的人力和资金支持的情况下，预计我国国内的大批异见分子将很快被捕。\n\n这些行动很可能会激怒西方国家以及国内的恐怖组织，然而，这种方法对于保障我们人民的福祉是必要的，这是任何人都无法否认的。"
 russia.490.a: "我们过去太心慈手软了……好吧，现在不会了。"
 russia.491.t: "三面旗帜 - 一个祖国"
 russia.491.d: "俄罗斯的历史记忆与代际传承如今已经达到了一个全新的高度，甚至是\"高度\"的字面意义。在圣彼得堡，象征着三个历史时期——俄罗斯帝国、苏联以及俄罗斯联邦——的旗帜正迎风飘扬于芬兰湾上空。这些巨大的旗帜已成为滨海公园的一部分，而这片公园早已成为市民与游客的打卡胜地之一。伴随着几首由乐队演奏的俄罗斯历史性国歌的旋律，三面巨大的旗帜缓缓升起，随即在波罗的海的微风中高高飘扬。庄严而富有象征意义的升旗仪式在圣彼得堡临海的公园内举行，而此处亦是欧洲最高摩天大楼——拉赫塔中心附近的地标性景点。升起的三面旗帜分别为俄罗斯帝国、苏联以及俄罗斯的国旗，每一面旗帜都象征着深厚的历史底蕴。\n在岸边，一场盛大的音乐会正在上演，数百位观众共同见证了这一庄严的时刻。俄罗斯总统与本次升旗项目的创作者们一同乘船观礼。值得一提的是，这一象征性项目由俄罗斯天然气工业股份公司全力实现。"
 russia.491.a: "铭记我们共同的历史！"
 russia.492.t: "俄罗斯联邦共产党批评梅德韦杰夫政府"
 russia.492.d: "尽管我们在选举中赢得了胜利，但国家杜马中的各大党派，尤其是俄罗斯联邦共产党，依然在我们前行的道路上设置重重障碍。他们高声指责统一俄罗斯党在议会中的不公优势，批评梅德韦杰夫总统推行的改革\"南辕北辙\"。而在议会大厅内，关于政府施政的争论旷日持久，冗长的辩论让政务步履维艰，几近瘫痪。然而，总统早已筹谋应对之策，而我们必须立即行动，将其付诸实施。"
 russia.492.a: "他们有意见……"
 russia.493.t: "俄罗斯自由民主党批评梅德韦杰夫政府"
 russia.493.d: "尽管梅德韦杰夫在最近的选举中胜出，但包括自由民主党在内的议会各党派依旧在阻挠我们的工作。反对派成员指责梅德韦杰夫\"无视俄罗斯人民的利益\"，并认为他推行的立法改革完全没有必要。与此同时，日里诺夫斯基对\"统一俄罗斯党是内部叛徒\"的指责不绝于耳，甚至占据了国家杜马近半数的工作时间，严重妨碍了立法进程。然而，总统早已筹谋应对之策，而我们必须立即行动，将其付诸实施。"
 russia.493.a: "他们有意见……"
 russia.494.t: "与德米特里·梅德韦杰夫直接通话"
 russia.494.d: "近日，在\"总统直通线\"直播节目中，新当选的总统德米特里·梅德韦杰夫就国家的政治前景回答了问题：\n\"下午好，德米特里·阿纳托利耶维奇！我是来自《鄂木斯克新闻》的安东，我想提一个不光是鄂木斯克市民，而是所有俄罗斯人都关心的问题。\"\n\"下午好。\"\n\"在您的第一任期内，您以较为自由化的形象著称，许多人甚至将您与弗拉基米尔·普京总统相提并论。那么您是否会承认这一形象，并在未来延续这种执政风格呢？\"\n\"谢谢您的提问！当然，我在第一任期内确实在某些方面表现出更亲西方的倾向，但我要澄清，这绝不意味着我曾试图与弗拉基米尔·弗拉基米罗维奇对立，或偏离我们共同的俄罗斯未来蓝图。然而，在我卸任之后，随着更多地缘政治局势的演变，我逐渐意识到，任何试图与西方和解的努力都是徒劳的，换来的只是他们的幸灾乐祸。不过，我可以向大家保证——变革即将到来！我和我的团队将精心筹划俄罗斯政治生活的未来变革，我相信，这将会得到大家的认可和支持！\""
 russia.494.a: "俄国之夏将至……它将如恒星般永恒绵延。"
 russia.495.t: "梅德韦杰夫被任命为全俄人民阵线领袖"
 russia.495.d: "在弗拉基米尔·普京撒手人寰后，全俄人民阵线变得群龙无首，许多人担心这将导致其分崩离析。然而，现任俄罗斯总统德米特里·梅德韦杰夫被执行委员会正式任命为该组织的负责人。在他的就职演讲中，他承诺推进人民阵线的事业，并强调\"在当前的地缘政治形势下，这样的组织比以往任何时候都更加重要\"。\n\n许多政治观察家认为梅德韦杰夫成为全俄人民阵线的负责人不过是例行公事，也不过是再次证明梅德韦杰夫对普京有多忠诚，但也有部分人认为新总统可以利用全俄人民阵线，将其拓展至远超普京所及范畴。"
 russia.495.a: "它将会派上用场。"
 russia.497.t: "新战争债券！"
 russia.497.d: ""
 russia.497.a: "酷！"
 russia.498.t: "大批志愿者！"
 russia.498.d: ""
 russia.498.a: "酷！"
 russia.499.t: "军队慈善活动已圆满完成！"
 russia.499.d: ""
 russia.499.a: "酷！"
 russia.500.t: "国际援助已抵达！"
 russia.500.d: ""
 russia.500.a: "酷！"
 russia.501.t: "首座普京纪念碑揭幕"
 russia.501.d: "今日，在圣彼得堡的马雅科夫斯基大街上，首座弗拉基米尔·普京雕像隆重揭幕，成为举国瞩目的重要事件。大批民众聚集在此，纪念这位已故领袖，并缅怀他那恢宏的治国理念和坚定的原则，这些为俄罗斯重新确立其在全球政治舞台上的崇高地位做出了不可磨灭的贡献。\n\n包括圣彼得堡市长在内的多位知名政界人物发表了讲话，强调了铭记普京非凡贡献和卓越领导的重要性。这座雕像高达26米，完美再现了普京的风采：他双手背后，神态威严而从容。雕像基座上刻着醒目的铭文：\"新俄罗斯的英雄\"。\n\n有多位官员表示，此次揭幕或将标志未来部分列宁雕像可能被普京雕像取而代之。"
 russia.501.a: "新俄罗斯的曙光！"
 russia.503.t: "斯洛伐克解冻"
 russia.503.d: ""
 russia.503.a: "好！"
 russia.504.t: "斯洛伐克解冻"
 russia.504.d: "罗伯托·菲科实施了一系列政府改革举措，引发了民众对于政治\"解冻\"的强烈期盼。他不仅扩大了社会服务项目，还优化了官僚体系流程，这些变革受到了众多民众的热烈欢迎。\n\n过去，斯洛伐克曾是一个被欧盟利益集团操控的贫困国家。但在欧战结束后，随着俄罗斯的胜利以及菲科的当选，斯洛伐克的面貌焕然一新。如今，它正逐步崛起为一个强大的盟友和繁荣的国度。对于这一转变，有人认为是得益于俄罗斯的资助，而另一些人则将其归功于菲科卓越的政治才能。"
 russia.504.a: "好！"
 russia.505.t: "自由喀尔巴阡成立"
 russia.505.d: "喀尔巴阡总统彼得·盖茨科已正式宣布成立新政党\"自由喀尔巴阡\"。在最近的演讲中，他强调，喀尔巴阡人民将致力于探索一种独特的民主制度，这种制度将与其他形式有所不同。新政党将成为推动政治包容性、鼓励喀尔巴阡全体公民积极投身政府事务的重要力量。"
 russia.505.a: "很好！"
 russia.506.t: "自由喀尔巴阡成立"
 russia.506.d: "喀尔巴阡总统彼得·盖茨科已正式宣布成立新政党\"自由喀尔巴阡\"。在最近的演讲中，他强调，喀尔巴阡人民将致力于探索一种独特的民主制度，这种制度将与其他形式有所不同。新政党将成为推动政治包容性、鼓励喀尔巴阡全体公民积极投身政府事务的重要力量。"
 russia.506.a: "很好！"
 russia.507.t: "喀尔巴阡采用\"卢森尼亚社会主义\""
 russia.507.d: "喀尔巴阡地区总统彼得·盖茨科已正式宣布创立\"卢森尼亚社会主义\"意识形态。在最近的演讲中，他强调，喀尔巴阡人民将致力于探索一种独特的社会主义制度，这种制度将与其他形式有所不同。新体系将成为推动政治包容性、激励喀尔巴阡全体公民积极投身政府事务的重要力量。"
 russia.507.a: "好吧，如果他们希望如此的话。"
 russia.509.t: "沃伊切赫·奥尔赞斯基在波兰大选中胜出"
 russia.509.d: ""
 russia.509.a: "酷！"
 russia.520.t: "统一俄罗斯党初选"
 russia.520.d: "统一俄罗斯党一直是俄罗斯的重要政治力量。然而，在欧陆战争结束后，由于德米特里·梅德韦杰夫决定不参选，该党多年来首次陷入了没有合适候选人的困境。为了应对这一挑战，统一俄罗斯党决定举行初选，让最积极、最受欢迎的政治家参与竞争。在这次初选中，将选出代表该党主流的候选人。由于统一俄罗斯党以其经验丰富的政治家而闻名，因此候选人的选择范围相当广泛。"
 russia.520.a: "帕特鲁舍夫！"
 russia.520.b: "索比亚宁！"
 russia.520.c: "米舒斯京！"
 russia.520.e: "别洛乌索夫！"
 russia.521.t: "统一俄罗斯强硬派初选"
 russia.521.d: "尽管欧亚党的大部分成员积极支持其候选人，但党内也有人对梅德韦杰夫的路线持不同意见，认为其发展路线偏离了初衷，这些人可以被视为主权民主方面持更保守立场的人士。出人意料的是，这些持不同意见者联合起来，自行组织初选，希望从欧亚党内挑选出一名替代候选人。参与者中不乏国家主义的坚定支持者、经验丰富的商界人士以及传统军人。他们期望能够以更有利于社会稳定和民众福祉的方式对主权民主制度进行改革。"
 russia.521.a: "沃洛金！"
 russia.521.b: "绍伊古！"
 russia.521.c: "纳雷什金！"
 russia.522.t: "人民俄罗斯提名总统侯选人"
 russia.522.d: "人民俄罗斯是俄罗斯新兴的左翼爱国力量，汇聚了大量才华横溢、意志坚定的社会正义斗士。随着欧陆战争的胜利和德米特里·梅德韦杰夫宣布即将举行选举，人民俄罗斯迎来了一个历史性的机遇，有望打破统一俄罗斯党的长期垄断，真正掌握政权。\n\n那么，谁来担任此次选举的候选人呢？为了解决这一问题，人民俄罗斯召开了党代会，决定通过无记名投票的方式，选出一位能够代表该党参与选举的政治家。"
 russia.522.a: "德利亚金！"
 russia.522.b: "格鲁季宁！"
 russia.522.c: "科诺瓦洛夫！"
 russia.523.t: "人民俄罗斯激进派提名总统侯选人"
 russia.523.d: "人民俄罗斯中的激进派致力于加强社会政策并推动向\"新社会主义\"的过渡，也决定提名自己的候选人参与选举。这些候选人中包括知名的左翼爱国政治家。许多人认为，他们之所以有概率击败更为温和的候选人，很大程度上得益于他们的知名度。"
 russia.523.a: "普里列平！"
 russia.523.b: "卢卡申科！"
 russia.523.c: "普拉托什金！"
 russia.524.t: "无声颠覆"
 russia.524.d: "瓦列里·拉什金，俄罗斯联邦共产党内一位知名的反对派领袖，决意暗中破坏他们赢得总统选举后举行的党内代表大会。大会计划通过新宪法草案并选举根纳季·久加诺夫为党主席，但是瓦列里·拉什金及其支持者选择要改变即将到来的命运。投票期间，他们把大多数选票投给了拉什金。人们把这看作一次党内政变，可随着基层党员们站到拉什金一边，形势还算相对温和。这样的行为在久加诺夫的支持者和党内部分成员中引起了一场轩然大波，他们认为这是一次背叛，严重违背了党内纪律。尽管如此，拉什金还是设法在基层党员的帮助下将权力牢牢握在手中。"
 russia.524.a: "出乎意料的结果。"
 russia.525.t: "反动派"
 russia.525.d: "当我们在选举中胜出后，民族主义者、新帝国主义者和其他反动势力的活动显著增加，并由此引发了大规模反苏维埃抗议活动。这些活动由一个名为\"[SOV_anti_soviet_resistance_loc]\"的组织主持。他们还在继续举行集会游行以及其它形式的抗议活动，想要借此改变国家政策并捍卫自身的意识形态信仰。"
 russia.525.a: "行动起来吧，同志们。"
 russia.526.t: "日里诺夫斯基做出让步"
 russia.526.d: "出乎众人意料，弗拉基米尔·日里诺夫斯基，这位长期以来在国内煽动民族主义情绪的旗手，竟接受了党的提议，选择停止对苏维埃政权的抗争。俄罗斯联邦共产党内部的保守派称其举动为\"明智抉择\"，并敦促仍在抵抗的同道者效仿他的步伐。然而，拉什金派的成员对此举充满怀疑，甚至有人主张将日里诺夫斯基逮捕，以示惩戒。无论如何，对于右翼阵营而言，失去这样一位标志性人物，无疑是一次沉重的打击。"
 russia.526.a: "这是一场胜利。"
 russia.527.t: "日里诺夫斯基拒绝了提议！"
 russia.527.d: "面对党的提议，弗拉基米尔·日里诺夫斯基，这位民族主义抵抗势力的领袖，毫不意外地选择了拒绝，拒绝妥协，拒绝停止他的反苏斗争。这一决定在社会上引发了不同反响。拉什金及其支持者表示，这样的结果完全在意料之中，并号召继续对抗\"右翼蒙昧主义\"。与此同时，俄罗斯联邦共产党内的一些正统派成员则对此感到失望，认为这样一位精明的政治家终究未能接受失败，认清现实。日里诺夫斯基的声明在民间激起了热烈讨论。然而，毋庸置疑的是——苏维埃俄国的政治对抗，仍未迎来终结。"
 russia.527.a: "他会后悔的……"
 russia.528.t: "电视事故"
 russia.528.d: "改组后的俄罗斯-K电视频道为响应共产党复兴前苏联艺术政策，于近期举办了一场新音乐青年节栏目。许多才华横溢的音乐家都齐聚一堂，他们在作品中对前任普京政府进行了强烈批评，同时又对俄联邦共产党的执政大加赞颂。\n\n但其中最引人注目的当属青年说唱歌手富列士，他在未经审查的歌词中添加了大量直接攻击和批判拉什金及现任政府的内容，并公开支持反对党爱国者党及其激进派党魁弗拉基米尔·索洛维约夫。诸如\"要接受这个现实，要把它染红，要把它撞到她妈的瓦利娅·拉什金的狗脑里\"，\"离开你的座子，坐到马路牙子上，去大楼里点火，让这帮狗娘养的感受到你的热情\"和\"向爱国者宣誓你的内心，让他们感受下你的思想和拳头！\"掺杂在他作品的歌词中。一部分人赞扬他公开自身立场和敢于表达想法的勇气，另一部分人则批评其行为的不雅以及对政府的不尊重。\n\n我们要怎么处理他？"
 russia.528.a: "别管他就好"
 russia.528.b: "把他办了……"
 russia.529.t: "南非内战"
 russia.529.d: "南非共和国已经崩溃了。1994年种族隔离结束后建立的那种脆弱平衡终于瓦解，各个政治派别纷纷拿起武器，为他们心目中南非的未来而战。客观来说，我们的新人民政府只有两个派别可供支持，分别是非洲人国民大会和经济自由斗士。\n\n非洲人国民大会自从近三十年前赢得南非首次普选以来，一直是南非的执政党。它是纳尔逊·曼德拉的政党，我们与他们及其斗争的关系可以追溯到苏联时期。然而，随着在位时间的日渐增长，他们已转向温和化，并逐渐变得僵化停滞。许多人认为，正是非国大的腐败、低效和优柔寡断，导致这场内战变得无法避免。\n\n取而代之的是经济自由斗士，一个由前非国大青年领袖尤利乌斯·马莱马领导的激进马克思列宁主义政党。经济自由斗士从非国大中分裂出来，因为后者在土地改革和再分配问题上过分妥协。他们认为，没有完成对国家经济的彻底重组，南非的革命将是不完整的。\n\n我们是应该尊重我们与非洲人国民大会的历史渊源，支持他们维持南非的秩序，还是应该支持经济自由斗士这个先锋队呢？"
 russia.529.a: "我们会支持非洲人国民大会"
 russia.529.b: "我们会支持经济自由斗士"
 russia.530.t: "俄共预选大会"
 russia.530.d: "普京离任后，国家正处于一个充满不确定性的时期。极有可能获胜的俄罗斯联邦共产党正准备迎接俄罗斯历史上最重要的一次总统选举。然而，党内的人事部门面临着一项艰巨的任务——必须选出一位既能团结全党、又能为国家提供清晰未来蓝图的领袖。您有三个选项：\n\n尤里·阿方宁——久加诺夫的忠实门徒。他是一位年轻、精力充沛且忠诚的机关干部，能够延续现行路线并提供稳定。\n帕维尔·格鲁季宁——人民的候选人，曾参加过2018年的总统选举。他是一个折衷性人物，能平等地满足党内所有成员的诉求，提供平衡、温和的政策，并且已经拥有坚实的支持基础。他是最稳妥的选择。\n谢尔盖·列夫琴科——伊尔库茨克州前州长，一位富有领袖魅力、具备地方治理经验的实用主义者。他得到了党内众多基层力量的支持，这使他的候选资格带上了一层更具决断力、甚至更富侵略性的权力斗争色彩。\n\n我们将选择谁？"
 russia.530.a: "尤里·阿方宁"
 russia.530.b: "帕维尔·格鲁季宁"
 russia.530.c: "谢尔盖·列夫琴科"
 russia.530.c2: "尼古拉·哈里托诺夫"
 russia.531.t: "纳戈尔诺-卡拉巴赫问题"
 russia.531.d: "在高加索地区的成功布局之后，我们仍面临一个棘手的未解难题——纳戈尔诺-卡拉巴赫的归属问题。\n\n纳戈尔诺-卡拉巴赫是阿塞拜疆与亚美尼亚之间长期争议的领土，该地区主要由亚美尼亚族群居住，而其周边区域则以阿塞拜疆族群为主。上世纪初，该地作为一个自治地区划归阿塞拜疆，但在苏联解体后，卡拉巴赫战争爆发，亲亚美尼亚的\"纳戈尔诺-卡拉巴赫共和国\"（未获国际承认）事实上控制了该地区。从那时起，阿塞拜疆始终未曾放弃夺回这一领土的努力。\n\n今，随着我们在南高加索的布局已然稳固，是时候终结这一历史积怨，定鼎乾坤了。"
 russia.531.a: "我们会尽全力援助亚美尼亚盟友"
 russia.531.b: "我们会在集安组织的帮助下稳定该地区局势"
 russia.531.c: "我们会尽全力援助阿塞拜疆盟友"
 russia.531.g: "让我们试着彼此妥协"
 russia.532.t: "阿塞拜疆同意！"
 russia.532.d: "占位符"
 russia.532.a: "好极了"
 russia.533.t: "公众对政党不作为的愤怒！"
 russia.533.d: "尽管国家最关键的选举即将到来，但公众对三大主要政党的表现深感失望。它们在诸多问题上无所作为，甚至连竞选活动的进展也显得迟缓拖沓。\n如今，俄罗斯人民似乎在寻求其他可能的道路，探索国家未来的新方向。有些人甚至表示，一位有影响力的人物或许很快就会宣布参选立场……"
 russia.533.a: "我不在意"
 russia.534.t: "亚历山大·卢卡申科声援公正俄罗斯！"
 russia.534.d: "白俄罗斯共和国总统亚历山大·卢卡申科公开宣布支持\"公正俄罗斯 - 为了真理\"及其侯选人——谢尔盖·米罗诺夫，真是出人意料的消息。"
 russia.534.a: "或许是时候该来点新玩意了……"
 russia.536.t: "自由意志党分裂！"
 russia.536.d: "未注册的自由意志党最终分裂为两个拥有相同名称和标志的组织。其中一个由谢尔盖·博伊科领导，并在一周前召开了代表大会，而另一个由米哈伊尔·斯韦托夫领导，并在上周末举行了自己的大会。\n\n米哈伊尔·斯韦托夫支持者的创党大会，恰好是在另一派系——由谢尔盖·博伊科领导的自由意志党临时大会召开一周之后举行的。两个阵营的代表大会本应旨在解决由于党内领导层与斯韦托夫所领导的\"原则与行动\"派系之间的分歧而引发的分裂局面，然而实际上，这一分裂却在会议中被正式合法化：两个党派决定各自独立运作，且无意与对方进行合作。"
 russia.536.a: "呃……好吧。"
 russia.537.t: "卡加尔利茨基与乌达利佐夫被捕入狱！"
 russia.537.d: "在最近发生于圣彼得堡的未遂恐怖袭击之后，俄罗斯联邦安全局发现恐怖分子弗拉德伦·巴巴耶夫与两位知名左翼人物——谢尔盖·乌达利佐夫和鲍里斯·卡加尔利茨基——之间存在关联。巴巴耶夫是他们抗议活动和集会的常客。\n\n尽管事态紧急，安全局迅速逮捕了两名可能的嫌疑人，并以刑事罪名对他们提起指控，若罪名成立，他们将面临最高8年的监禁。\n\n此事件引发了小型左翼组织的强烈不满，他们已开始组织小规模抗议活动，要求释放两名嫌疑人。然而，俄罗斯共产党对此事未发表任何评论。不过，幕后消息显示，共产党正在暗中采取行动，试图挽救乌达利佐夫组织仅存的力量。"
 russia.537.a: "我不在乎。"
 russia.538.t: "阿列克谢·纳瓦利内在监狱中去世"
 russia.538.d: "亚马尔-涅涅茨自治区联邦监狱管理局宣布，阿列克谢·纳瓦利内在监狱中去世。据该部门新闻处称，纳瓦利内在第三号惩教所散步后感到不适并失去意识。到场的医务人员采取了所有必要的急救措施，但未能奏效，医生最终宣布他死亡。\n\n相关声明中指出，所有必要的抢救措施都已进行，但未能取得任何积极效果。\"急救医疗服务的医生宣布该犯人死亡。\"联邦监狱管理局新闻处说道。"
 russia.538.a: "真可惜！"
 russia.538.b: "他甚至不能为自已赢得历史脚注……"
 russia.539.t: "公民纳瓦利内"
 russia.539.d: "近日，俄罗斯媒体频频刊登关于纳瓦利内出狱后新生活的报道。据悉，纳瓦利内因\"表现良好\"和对自己行为的公开悔过而被提前释放。如今，他投身于社区和志愿服务，专注于帮助有需要的人，尤其是联邦新地区的居民。\n\n纳瓦利内还计划竞选家乡布廷村的代表职位。他表示：\"我要让我的老家和乡亲们重回正轨。\"虽然他主动远离了主要政治舞台，并撤回了许多过去的批评言论，但他选择以\"新俄罗斯党\"为竞选平台参与乡村选举。他在接受《新报》采访时说道：\"各大政党近来都做得不错，但这个党派，仍然最贴近我的心。\"\n\n在同一次采访中，纳瓦利内还呼吁他的前支持者们认可俄罗斯作为民主治理典范的地位。"
 russia.539.a: "人是能够改变的！"
 russia.540.t: "卡尔塔波洛夫计划投身政界"
 russia.540.d: "安德烈·卡尔塔波洛夫在军队服役多年后，表达了自己希望从现役中退役，转而在国家杜马委员会中担任新职务的意愿。他丰富的经验与专业知识使他成为俄罗斯政坛和各大部门的宝贵人才，但我们同样不能忽视他作为指挥官的卓越能力，这些能力仍然能在军事事务中发挥巨大的作用。\n\n是否接受卡尔塔波洛夫的提议，现已交由总统决定。"
 russia.540.a: "他还是留下来吧。"
 russia.540.b: "他表现很好，但现在我们需要他在政治\"前线\"上。"
 russia.541.t: "重建苏联共产党"
 russia.541.d: "占位符"
 russia.541.a: "操蛋！行吧"
 russia.542.t: "与苏联共产党谈判"
 russia.542.d: "占位符"
 russia.542.a: "好啊好啊"
 russia.542.b: "算了吧"
 russia.543.t: "来自伊热夫斯克某位不知名官僚的信"
 russia.543.d: "占位符"
 russia.543.a: "都是同志，听听又如何！"
 russia.543.b: "去你妈的"
 russia.544.t: "弹劾总统"
 russia.544.d: "占位符"
 russia.544.a: "苏联共产党掌权"
 russia.544.b: "邦达连科将会纠正列夫琴科的错误"
 russia.545.t: "新的现实"
 russia.545.d: "深夜，安东在他家乡的小径上闲逛，等待着挚友复员后久违的返乡，他的脑内充斥着崇高又后怕的念头。战争的伤痕深深地烙印在他的内心，他所熟识的每个人都以自身的方式分担了他的痛苦。尽管现实惨痛，但他也必须提醒自己，生活仍照常进行，无论如何人们都会继续前行，直到忘却伤疤。\n\n进一步迈进这座城市，他注意到了墙上的一张宣传海报，上面描绘着总统展示\"战后重建计划\"的步骤规划，他早已对此耳熟能详，却从未真正深入内心思索。在详细阅读该份计划后，他突然意识到这不仅是恢复国家财富的过程，更是俄罗斯美好未来的象征；不只局限于俄罗斯人民的幸福，更是整个欧洲人民稳定自由的期盼。\n\n\"无论接下来发生什么，我们都必定会建立一个新世界——一个更美好的明天。\"他的内心如此笃定着。"
 russia.545.a: "毋忘此生"
 russia.546.t: "任命元帅"
 russia.546.d: "经过深思熟虑与慎重考量，我们最终作出了一个极具历史意义的决定：从总参谋部中提拔一位德高望重的将军，授予他\"俄罗斯元帅\"这一崇高荣誉。这一任命不仅象征着无上的荣耀，更赋予了当选者巨大的责任，而这位被选中的将军将以最高的忠诚与奉献来承担这一重任。\n在我们杰出的将领中，两位候选人脱颖而出，成为这一殊荣的最有力竞争者——瓦列里·格拉西莫夫和奥列格·萨柳科夫。这两位将军皆具备卓越的领导才能、深邃的战略眼光，以及对国家防卫的无比忠诚。如今，我们即将把这至高的荣誉授予其中一人，我们深信，被选中的元帅定会恪守最高标准，继续以荣誉与卓越的精神为国家效力。"
 russia.546.a: "格拉西莫夫！"
 russia.546.b: "萨柳科夫！"
 russia.546.c: "要不咱设立个\"联盟元帅\"？"
 russia.547.t: "叙利亚寻求经济援助"
 russia.547.d: "我们的叙利亚朋友在阿拉伯之春爆发后的十年里，一直在苦苦挣扎。所幸，近几年来，叙利亚的内战渐渐归于平息，他们如今的局势已足够稳定，经济援助不会再化为无用的灰烬。他们向我们伸出援手，而我们必将予以回应。我们将一点一滴地积累力量，用每一张卢布扩大我们在中东的影响力。"
 russia.547.a: "我们将尽全力帮助他们！"
 russia.547.b: "当然了，我们将为叙利亚朋友提供资金。"
 russia.548.t: "接管政府"
 russia.548.d: "巴勒斯坦这档子事儿变得严重了"
 russia.548.a: "正确的。"
 russia.549.t: "苏雷金团结了社会主义强硬派"
 russia.549.d: "在全俄人民阵线巩固了联合政府的团结之后，许多原先离开了俄罗斯联邦共产党及其兄弟组织的共产主义者以及社会主义者，终于发现了全俄人民阵线的本性并意识到了自己被卖给了资本主义－普京主义者寡头。\n如今这些人把厌恶俄罗斯联邦共产党的马克西姆·苏雷金当作引路人，并组建了一个全新的属于\"真正共产主义者\"的多党派联合阵线。他们联合起来反对我们的政府，并能够聚集大量心怀不满、持左翼观点的民众。\n一个新的反体制反对派崭露头角，并占据了奄奄一息的自由派的生态位。"
 russia.549.a: "就不能来点新花样吗？"
 russia.550.t: "另一个俄罗斯党组织起\"联合反对派委员会\""
 russia.550.d: "另一个俄罗斯党，或者叫民族布尔什维克党，近期在一个叫\"民族爱国者\"的反对派之间组织了一系列会议，试图将他们团结在自己旗下。这一行为得到了可观的成果，其产物就是\"联合反对派委员会\"，民布分子再也不会像以前一样只会躲在自由派反对派身后了，这次他们团结起了所有政治光谱右边的反对派。甚至一些自由派也加入了进来，全然放弃了只靠自己达成政治诉求。"
 russia.550.a: "他们从未真正离开。"
 russia.551.t: "内部自由派"
 russia.551.d: "鲍里斯·纳杰日丁，这位自封为全俄人民阵线内部自由派领袖的人物，正在体制内掀起波澜。他呼吁让自由派的声音被听见，要求政府推行可能动摇国家根基的改革措施。当这种力量依然存在时，我们就很难说政府内部是真正团结一致的。\n不过，值得欣慰的是，新一代的自由派似乎更加愿意妥协，表现出更大的灵活性……。"
 russia.551.a: "真是个麻烦！"
 russia.552.t: "地方代表选举"
 russia.552.d: "近日，我国多个地区举行了地方政府、共和国首脑及议会的选举。在一些地区，社会主义政党和全俄人民阵线中的右翼政党赢得了民众的支持。尽管我们在名义上是团结一致的，但不同派系的愿景依然存在差异。如今，这些地区将按照全俄人民阵线的社会主义者和全俄人民阵线民族主义者的理念进行治理。\n虽然他们各自都有自己的优势，但也同样伴随着相应的缺点和挑战。"
 russia.552.a: "我们团结如一，但各有千秋。"
 russia.553.t: "谢尔盖·拉夫罗夫辞职"
 russia.553.d: "我们的外长谢尔盖·拉夫罗夫正式宣布辞职，结束了他多年兢兢业业的外交生涯。在任期间，他促成了无数成功的外交协议，完成了无数次艰难的外交任务。拉夫罗夫，这位当代外交界的巨擘，以其坚定不移地维护国家利益的立场而闻名，并获得了媒体的广泛赞誉。他以年龄和健康问题为由提出辞职，并推荐瓦西里·涅边贾作为他的继任者。这一提议既展现了拉夫罗夫的远见卓识，也引发了外界对其卓越领导能力的高度评价与感激之情。如今，媒体上充满了对拉夫罗夫的真挚致敬与感谢，大家纷纷认可他在国家外交政策领域无与伦比的贡献。"
 russia.553.a: "感谢您所付出的一切。"
 russia.554.t: "复归平民"
 russia.554.d: "在艰苦卓绝的战斗和对精英主义欧洲的胜利之后，我们的英雄们如今将踏上归乡之路。人民、军队与经济所共同付出的巨大努力，即将迎来圆满的终结。当我们的士兵凯旋而归，他们将放下武器，换上工具，重新融入社会。有些人或许会选择重返校园，继续学业，或投入到更具智慧性的事业中。\n随着欧洲的败北，我们对庞大军队的需求也随之减少。为了减轻经济负担，我们有必要缩减军队规模。这些身怀技艺的军人，在当前形势下，将在民间生活中展现出更高的价值，正如20世纪40年代末的那次过渡一样。重返平民生活的历程，标志着国家新的篇章的开启，在这片新的土地上，人民的力量与奉献精神将继续塑造我们共同的未来。"
 russia.554.a: "他们理应得到休息。"
 russia.555.t: "德米特里·梅德韦杰夫赢得选举"
 russia.555.d: "选举季就要到了，德米特里·梅德韦杰夫得到了85.31%的压倒性选票，没人对此结果感到惊讶。议会所有政党要么支持他的候选人资格，要么只在竞选中投入最少的精力，就等结果出来后不久就宣布完全支持再次当选的总统。\n\n少数非体系内的候选人也就获得了0.7%的选票，不禁让人们声称这个数字是假的。许多集中在俄罗斯国外的批评家，以及开始质疑梅德韦杰夫的选举结果了。但在当下的政治现实下，木已成舟。梅德韦杰夫在俄罗斯国内是绝对的赢家和纪录保持者：堂堂正正而又光明正大。"
 russia.555.a: "\"我即俄罗斯。\""
 russia.556.t: "自民党内部分裂"
 russia.556.d: "弗拉基米尔·日里诺夫斯基去世后，许多人认为自由民主党将不再是曾经的样子，而事实也正如此。这个曾经团结一致的政党如今内部已逐渐显露出分裂迹象。斯卢茨基正在巩固自己的权力，清除一切对其领导地位持有异议的声音。最近，反对派的非正式领导人瓦西里·弗拉索夫被以\"缺席\"的名义剥夺了党员资格和议员身份。弗拉索夫随即在其Telegram频道上谴责了这一罢免决定，称其为\"非法行为\"，并斥责斯卢茨基的支持者为\"机会主义者\"和\"骗子\"，声称自由民主党已经清除了真正的日里诺夫斯基主义者和有能力的政治家。\n\n随后，弗拉索夫表示，他将寻找机会重返政坛，继续为自己的政治理想而奋斗。\n而斯卢茨基正积极将日里诺夫斯基烙印每个人的心中，以党的宣传系统将这位已故政治人物的政治遗产符号化，使其在年轻群体中实现代际传播。"
 russia.556.a: "协助斯卢茨基打造\"日里诺夫斯基招牌\"。"
 russia.556.b: "没了日里诺夫斯基的自民党就好似无头苍蝇……"
 russia.557.t: "瓦西里·弗拉索夫加入公正俄罗斯"
 russia.557.d: "声名狼藉的前自由民主党成员弗拉索夫在宣布重返政坛后不久，就决定采用一种相当非正统的路径。尽管多年来一直是民族主义政党的成员，但他现在却加入了社会民主主义的公正俄罗斯党。现在，他担任该党的鼓动者和积极分子，希望有朝一日能够通过公正俄罗斯的授权重返杜马。"
 russia.557.a: "呃……真是出人意料。"
 russia.558.t: "瓦西里·弗拉索夫组建\"民族俄罗斯\""
 russia.558.d: "弗拉索夫，这位争议不断的俄罗斯自由民主党前成员，在宣布有意重返政治舞台后不久，便着手筹备新的政治组织。借助自民党老成员以及众多心怀不满的前自民党选民的支持，他创立了\"民族俄罗斯\"党，该党的名称是从另外两个议会党派的名字中获得灵感的。尽管弗拉索夫及其支持者大肆宣扬这一新的政治实体，称其为\"日里诺夫斯基政治愿景的真正传承者\"，但众多专家对弗拉索夫的政党能否在地区议会中获得更多席位，乃至取得任何重大成果持怀疑态度。"
 russia.558.a: "呃……看着比斯卢茨基做的好点。"
 russia.559.t: "白俄罗斯的未来"
 russia.559.d: "二十载风雨兼程，俄白联盟终于迈入现实，两国自此合为一体，携手踏上新的征途。最初，这一构想被视为卢卡申科的一场精妙布局，意在借机攫取俄罗斯的权柄，然而，时移世易，如今的亚历山大·格里戈里耶维奇却化身副手，退居辅佐之位。白俄罗斯的归属尘埃落定，但在庞大的俄罗斯体系中，它应扮演何种角色，仍然悬而未决。克里姆林宫的长廊间，各方声音此起彼伏，纷纷谋划着这片新添版图的未来。\n\n有一派主张彻底融入，将白俄罗斯改设为\"白俄罗斯联邦区\"，以实现更高程度的中央集权，推动经济腾飞。然而，此举也将遭遇白俄罗斯官僚体系的强烈抗拒。\n\n另一派则提出维持双议会制，虽在经济一体化上有所让步，却可维持白俄罗斯的政治认同，换取更深层次的忠诚与稳定。"
 russia.559.a: "成立白俄罗斯联邦区！"
 russia.559.b: "维持现状。"
 russia.560.t: "新俄罗斯的未来"
 russia.560.d: "十载征程，烽火不熄，新俄罗斯的人民为重回俄罗斯而奋战不懈，而今，梦已成真。这片土地不再是漂泊的孤岛，它的人民已然成为俄罗斯的一部分，共赴辉煌未来。诚然，真正的融合不会一蹴而就，但最艰险的征途已然踏过，曙光就在眼前。\n\n然而，今日的胜利并未让问题终结，而是带来了新的抉择：新俄罗斯究竟应以何种身份融入我们的国家？是设立\"新俄罗斯联邦区\"，令其如其他地区般纳入国家体系，还是赋予其更高的自主权，建立自治共和国，以彰显其特殊地位？前者符合人民为统一而战的初衷，而后者，则是对这片饱经风霜的土地与人民最崇高的敬意。\n\n不同方案各有其合理性，皆可付诸实践，但我们最终的决定是……"
 russia.560.a: "成立新俄罗斯联邦区！"
 russia.560.b: "建立俄罗斯自治共和国。"
 russia.561.t: "新俄罗斯首次选举"
 russia.561.d: "占位符"
 russia.561.a: "叶夫根尼·尼基福罗夫胜出！"
 russia.561.b: "帕谢奇尼克获得多数席位！"
 russia.561.c: "普希林赢得投票！"
 russia.561.c1: "萨尔多拔得头筹！"
 russia.562.t: "分裂分子的末日"
 russia.562.d: "颜色革命政府组建的唯一目的就是毁坏俄乌人民间的兄弟情谊，而其中最为牢固的纽带自然是宗教。一帮异议分子创建的所谓\"乌克兰正教会\"只会为我们间的紧张关系火上浇油，更别提这帮土匪还对正规教会进行袭击，很显然，他们是乌克兰和俄罗斯所有正教会虔信者的敌人。\n\n当班德拉匪徒囚禁乌克兰的锁链终得打破之时，这个所谓的\"教会\"也随之失去了保护伞，立刻显露了其制造分裂不怀好意的真面目。阿扎罗夫果断地将这些违法机构查禁，并正式将其解散，其所有财产将移交给乌克兰正教会。莫斯科牧首方面则会保证乌克兰主教会议忠于所有正教会基督徒的事业，并准备承担起为所有乌克兰人民指引方向的重任。"
 russia.562.a: "我们信仰合一！"
 russia.563.t: "格鲁吉亚议会弹劾亲西方总统！"
 russia.563.d: "西方那滑腻的触角，正逐日从高加索地区滑落。格鲁吉亚的总统，不过是北约与欧盟的应声傀儡，昨日在议会的民主程序中被成功弹劾。如今，格鲁吉亚宣告他们将转向我们这些真正的友人，抛弃那些曾经操控他们的西方傀儡师。"
 russia.563.a: "太棒了！"
 russia.564.t: "根纳季·日德科去世"
 russia.564.d: "俄罗斯武装力量驻叙利亚前总部负责人、东部军区前司令员根纳季·日德科上将在莫斯科去世，享年58岁。哈巴罗夫斯克边疆区州长米哈伊尔·杰格佳廖夫表示，这位军事指挥官在不幸离世前早已罹病多年。"
 russia.564.a: "感谢你的服务，同志。"
 russia.565.t: "我们的帝国大本营"
 russia.565.d: "经过在克里姆林宫漫长而艰难的谈判后，顿巴斯共和国政府就其领土上组建新国家相关事项达成协议。此外，他们的共和国政治结构被重组为\"俄罗斯世界\"民族运动分支机构。现在，新俄罗斯将根据弗拉基米尔·日里诺夫斯基所提出概念建立新的秩序。\n\n乌克兰谴责了我们加强顿巴斯国家地位的举措，但他们的无能狂吠丝毫不会影响这项决策。我们已经在积极增强顿巴斯的军事力量，为我们发展的新阶段做准备。克里米亚只是俄罗斯人民统一的开端。"
 russia.565.a: "我们要解放整个东南部，解放乌克兰全境。"
 russia.566.t: "格鲁吉亚总统动员军队！"
 russia.566.d: "格鲁吉亚总统展现了她的真实面目，暴露了其无可争辩的独裁作风。为了应对民主弹劾，她竟然不顾议会决议动用了军队来维持其对国家的控制。更莫名其妙的是，我们居然被描绘成了侵略者，格鲁吉亚当前对我们采取的公开敌视态度显然是得到了其西方盟友的支持。"
 russia.566.a: "那就这样吧……"
 russia.567.t: "美国局势现状报告"
 russia.567.d: "\n\n\n                 £GFX_SVR_event_texticon \n\n\n\n\n尊敬的弗拉基米尔·弗拉基米罗维奇，\n\n对外情报局在汇编和分析必要信息后，认为美国政治局势已接近历史的转折关头。该国建制派正随着两党及各方领导人，尤其以唐纳德·特朗普为中心，所爆发的激烈斗争中走向分裂。石油危机后的经济衰退导致许多美国人对体制失去信心，各种极端主义运动在政治光谱中各县渗透，包括共产党人、法西斯主义者，甚至撒旦崇拜者。\n\n即将到来的11月选举预计将是一个重要的节点，部分专家预测美国社会内部各派的矛盾可能导致一场内战的爆发。无论结果如何，很明显，美国已不再能够维持其曾经拥有的唯一全球超级大国的地位，在最好的情况下，它也会可倒退至孤立主义。\n\n对俄罗斯联邦而言，这种情况既带来了机遇，也带来了重大风险。必须牢记，欧洲可能会迅速采取行动填补美国作为全球秩序领导者留下的真空。有关更多详细信息，请参阅随附的文件夹，其中包含所有相关信息。\n\n忠诚职守，为俄罗斯服务！\n\n谢尔盖·叶夫根尼耶维奇·纳雷什金"
 russia.567.a: "干得漂亮！"
 russia.568.t: "顿巴斯诸共和国现状报告"
 russia.568.d: "\n\n\n                  £GFX_FSB_event_texticon   \n\n\n\n\n总统先生，\n\n我与联邦特工小组共同编撰了一份关于顿巴斯人民共和国当前局势的详细报告。为便于理解，现对整体局势进行概述。自发动起义及《明斯克协议》签署以来，顿涅茨克和卢甘斯克人民共和国在经济领域取得了显著发展，并逐步确立了与我方的非官方双边关系。两地均大幅提升了军事与防务潜力，整体防务能力稳步增强。具体而言，卢甘斯克方面，在政变推翻了腐败无能的旧政权后，列昂尼德·帕谢奇尼克通过反腐改革巩固了民众对其政权的信任和支持。而顿涅茨克方面，自亚历山大·扎哈尔琴科遇刺以来，现任领导人丹尼斯·普希林在恢复民众对政权的信任方面仍存在较大挑战。尽管其经济政策有所成效，但目前仍未能恢复前任领导人所享有的民意支持水平。\n\n与此同时，乌克兰当局的行为日益激进且难以预测。鉴于当前世界局势迅速变化，我方怀疑基辅政权可能采取包括抛弃《明斯克协议》在内的极端手段，导致地区紧张局势进一步加剧。\n\n综合评估当前形势，我完全支持向两共和国提供额外军事及民用援助的决定，以增强其抵御外部威胁的能力。此外，我建议进一步探讨两共和国的整合方案，通过建立联邦制或类似的政治结构，进一步凝聚双方力量，提高战略协调效能，为地区和平与稳定奠定更坚实的基础。\n\n谨为俄罗斯效力！\n\n亚历山大·瓦西里耶维奇·博尔特尼科夫"
 russia.568.a: "极佳的报告。"
 russia.569.t: "特别军事行动开始"
 russia.569.d: "你很清楚接下来的局势将会如何发展。\n\n你们将在黎明前展开猛烈进攻，凭借空中优势和坦克的迅猛突击，摧毁乌克兰的防线。行动要迅速，集中力量夺取关键区域，与德涅斯特河沿岸地区建立联系将对我们十分有利。同样地，我们的士兵应该尽可能多地包围敌军。\n\n但乌克兰的盟友绝不会袖手旁观。他们必将介入战局，因此你们必须在制定作战计划时将这一点纳入考量。动用一切可用的资源和手段，务必取得胜利。如果你们能成功应对乌克兰，战局的另一半胜利已在掌握之中。\n\n祝你好运！欧洲的未来，正寄托在你们的肩上。"
 russia.569.a: "收到。"
 russia.570.t: "卡加尔利茨基加入共产党"
 russia.570.d: "在近日接受《共青团真理报》采访时，著名左翼公共知识分子、反全球主义斗士、教师、社会学家兼反对派活动家鲍里斯·尤利耶维奇·卡加尔利茨基被问及对当前俄罗斯及俄共路线的看法。他回答道：\"我认为，俄罗斯联邦共产党如今正走在一条真正的左翼道路上。从一个曾以恢复‘停滞时期’旧苏维埃秩序为目标的政党，转变为一个完全符合21世纪人民诉求的新社会主义政党。\"作为《工人通讯》的主编，他还补充道：\"我认为自己属于正在建设新社会主义民主的一员，并且不介意加入这一政党。\"\n\n这一表态属实令人意外，毕竟卡加尔利茨基长期以来被视为反对派和左翼持不同政见者。他早在1982年因\"青年社会主义者案\"被捕，曾支持最高苏维埃，反对左翼阵线与俄罗斯联邦共产党的联盟，甚至还起诉过根纳季·久加诺夫。然而，近年来，他对俄共的态度明显软化——他曾参与2020年反对宪法修正案的抗议活动，以及2021年抗议国家杜马选举舞弊的行动。\n\n如今，党内许多人对他加入俄共表示欢迎，甚至有人预测他未来将在政府中担任要职。"
 russia.570.a: "酷！"
 russia.570.b: "拉什金会亲自发给他党员证！"
 russia.571.t: "媒体对列夫琴科进行曝光！"
 russia.571.d: "列夫琴科饱受政敌的恶意攻击与辱骂。对他最主要的指责之一是他在担任伊尔库茨克州州长期间涉嫌非法打猎、腐败及一系列不法行为。他被指控卷入多起腐败丑闻及权力滥用的事件。此外，还有人指责他与有组织犯罪团伙有牵连，称他为\"土匪\"和\"窃贼\"。"
 russia.571.a: "诽谤！"
 russia.572.t: "阿列克谢·纳瓦利内 - 通往幸福之路"
 russia.572.d: "在布廷村——阿列克谢·纳瓦利内的故乡——时间如流水般静静流淌。被共产党派遣至此，他放弃了政治，转而在宁静的乡村生活中找到了自己的幸福。\n\n清晨，纳瓦利内在第一缕晨光中醒来，走向自家的菜园。他精心种植着蔬菜，细心照料花卉。他的双手灵巧而温柔，如同真正的家庭主妇，每一次丰收都带给他和家人无尽的喜悦。除了每天在菜园中的辛勤劳作，纳瓦利内还会帮母亲料理家务。他劈柴、挑水、照看牲畜——这一切都让他与故土的联系愈发紧密。\n\n对于纳瓦利内来说，布廷村的生活成为了他远离城市政治纷争与权力斗争的真正避风港。他意识到，摆脱政治枷锁，意味着学会欣赏生活中那些简单而真实的快乐与价值。对他来说，家乡的生活不是监狱，而是一种祝福，帮助他找到了自己和自己在世界上的位置。"
 russia.572.a: "乡村生活。"
 russia.573.t: "阿列克谢·纳瓦利内 - 通往幸福之路"
 russia.573.d: "在布廷村——阿列克谢·纳瓦利内那片静谧的小小故土——时光如涓涓细流，缓缓而安然地流淌。被共产党派遣到此，他放下了喧嚣的政治纷争，在这片质朴的乡村生活中，找到了属于自己的幸福。\n\n清晨，他首先将院子里的积雪清扫干净，然后与家人一同漫步在被厚雪覆盖的田野与森林之间，陶醉于冬日景致的静美。他凝望着树枝上精巧的雪花纹路，轻轻辨认着新雪中小动物留下的脚印。每一次的冬日漫步，这片冰雪世界都会为他带来新的发现与愉悦。纳瓦利内还帮母亲分担家务。他对家人的体贴与关爱，让每一个冬日都温暖而难忘。\n\n对于纳瓦利内来说，布廷村的生活成为了他远离城市政治纷争与权力斗争的真正避风港。他意识到，摆脱政治枷锁，意味着学会欣赏生活中那些简单而真实的快乐与价值。对他来说，家乡的生活不是监狱，而是一种祝福，帮助他找到了自己和自己在世界上的位置。"
 russia.573.a: "乡村生活。"
 russia.574.t: "最高苏维埃选举"
 russia.574.d: "[SOV_cprf_candidate]赢得总统选举后，国家迈向变革的新时代。如今，新成立的最高苏维埃代表人民希望看到变革和发展的愿望。赢得议会多数席位的共产党承诺会为国家的福祉，带来新想法、战略、解决方案。为所有俄罗斯公民打开了新视野、新机遇。"
 russia.574.a: "新纪元。"
 russia.575.t: "快来拿你的免费电视！"
 russia.575.d: "近几周，俄罗斯民众对人民阵线推出的新举措反响热烈，该举措致力于为新地区、低收入家庭及农村地区配送电视机并提供互联网接入服务。众多民众涌入全俄人民阵线的援助中心，领取国产最新款电视机，并登记升级全球网络连接。这些电视机功能全面，满足现代通信需求，出厂预装了一年的TRICOLOR和KINOPOISK订阅服务，还支持游戏主机游戏和互联网浏览等额外功能。\n然而，公民们不知情的是，根据加强国家安全的新指示，这些电视机及新互联网路由器会记录并监控用户的每项请求和活动，并将这些信息传输至地区执行委员会的特殊服务器进行存储。在那里，顶级的人工智能算法会分析内容是否存在有害信息，以最大程度减少极端主义或仇俄言论的传播。此举旨在保障我们的国家和公民的安全。对于普通守法公民而言，无需担忧隐私泄露，但对于俄罗斯的敌人而言，他们将无处遁形，始终处在监管者的严密监视之下。"
 russia.575.a: "哭什么哭？还不是要怪你们瞎了眼！"
 russia.576.t: "\"为了真理\"为\"斯大林旋转烤肉\"辩护"
 russia.576.d: "扎哈尔·普里列平领导的政党\"为了真理\"持续尝试通过街头行动来获得公众的认可。这一次，他们对一家名为\"斯大林旋转烤肉\"的餐饮点所引发的争议做出了回应。部分\"为了真理\"的支持者分发传单支持\"斯大林式\"沙威玛，而另一部分人则选择在\"纪念\"人权中心前进行抗议，要求为将约瑟夫·斯大林与阿道夫·希特勒相提并论的行为道歉。\n今年1月初，莫斯科科普捷沃区内一家以斯大林命名的餐馆引发了公众的广泛关注：其菜单上推出了\"斯大林双份肉沙威玛\"和\"贝利亚风味樱桃李子酱沙威玛\"，而厨师更是身着苏联内务部的制服。此外，\"纪念\"组织的成员扬·拉钦斯基也在社交媒体上表达了反对这家以斯大林命名的餐馆开业的立场。\n此后，\"为了真理\"政党呼吁\"纪念\"组织就\"歪曲历史及亵渎斯大林\"的行为道歉，并决定在线下继续深入讨论此事。\n这无疑是一种为争取选票而采取的策略。"
 russia.576.a: "着实迷人。"
 russia.577.t: "无形的分裂"
 russia.577.d: "自由民主党的每名成员都紧密围绕在敬爱的弗拉基米尔·沃尔福维奇身旁，但这种团结也就止步于此了，三十多年来，该党内部至少存在两大派系，而他们对于俄罗斯与自由民主党的未来都有着自己的想法。\n\n自然，只要日里诺夫斯基依旧健在，所有党员就还会对他唯命是从，但就连党魁本尊也不能完全不受亲信左右。\n£GFX_reformists 自民党内部的改革派将国家作为俄罗斯民族民主的试验田，并将俄罗斯世界摆在首位。他们摒弃过多的极权行为，其中部分人甚至赞成恢复君主制，另一部分人则意图将自民党改造为另一个统俄党。列昂尼德·斯卢茨基凭借其人际关系而不是领导素质，成了他们的头目。\n£GFX_hawks 鹰派，或称日里诺夫斯基拥簇，是一个忠于日里诺夫斯基的激进狂热核心派系，每个年轻党员都尽心献身于建立一个没有冠冕堂皇民主、没有鱼肉百姓寡头异族的伟大民族国家理想中。他们的头目瓦西里·弗拉索夫年轻气盛，虽然在玩弄阴谋诡计层面比不上他的对头，但却一直深受弗拉基米尔·沃尔福维奇的青睐，而这也导致鹰派一直压着改革派一头。不过，风向易变，尤其是在自民党领袖之位易手的时刻。"
 russia.577.a: "让我们看看谁能笑到最后……"
 russia.578.t: "参政院首次选举"
 russia.578.d: "日里诺夫斯基创立参政院，在俄罗斯的新政治格局中掀起了一场意外且备受瞩目的波澜。当各界普遍预期俄罗斯自由民主党会采取常规行动时，日里诺夫斯基却勇敢地迈出了新的一步，建立了一个全新的权力机构，并宣布将在其中实行自由选举。\n\n凭借活跃的竞选攻势、响亮的宣言和坚定的承诺，俄罗斯自民党再次赢得了广大选民的信赖。选举的最终结果显示，俄罗斯自民党在参政院中占据了显著优势，赢得了压倒性的多数席位。\n\n在日里诺夫斯基领导下的参政院首次选举，不仅是一个重要的里程碑，更彰显了俄罗斯自民党捍卫人民民主选择的坚定决心。"
 russia.578.a: "我喜欢民主。"
 russia.579.t: "国家近卫军权能增长"
 russia.579.d: "自弗拉基米尔·沃尔福维奇掌权以来，他在政府安全领域最坚定的支持者竟是维克多·佐洛托夫，这让所有人都大吃一惊。佐洛托夫不仅展现出了自己的忠诚，还成功说服了日里诺夫斯基，认为大多数基层执法机构都可以被一个更为可靠和高效的国民近卫军所取代。\n\n先是警察部门，随后是联邦监狱管理局，再接着是联邦警卫局，现在就连军队（其中已设立了国民近卫军的特别监管机构）也都被佐洛托夫，进而也被弗拉基米尔·日里诺夫斯基所掌控。\n一些西方政治分析家甚至惊恐地将这一局势比作伊凡雷帝统治时期的残酷与专制。"
 russia.579.a: "国家近卫军——新特辖区管！"
 russia.579.b: "同胞们，去工作"
 russia.580.t: "俄罗斯联邦共产党的命运"
 russia.580.d: "随着日里诺夫斯基的胜利与俄罗斯的重组，如何处理共产党人的问题摆上了台面。\n\n尽管久加诺夫这个狡猾的老狐狸及其政党确实是一个棘手的问题，但不可否认，他并非俄罗斯的敌人。俄罗斯联邦共产党一直是西方世界的坚定反对者，他们也为俄罗斯的利益做出了不少贡献。\n\n然而，党内很大一部分成员却对我们公开敌视，甚至希望我们被彻底铲除。他们只知道污蔑俄罗斯帝国的名誉，将俄罗斯历史视为\"陈旧废物\"，主张完全抛弃，转而专注于列宁主义的遗产。\n\n我们面临两个选择：\n1.解散政党，但不追究其成员个人；\n2.公审俄联共，以反政府活动和党内腐败的罪名起诉，从而清除隐患。\n\n这是一场抉择：是选择改善我们的形象，还是选择确保政权的稳定？\n\n你的决定是什么？"
 russia.580.a: "放过久加诺夫和他的别墅吧……"
 russia.580.b: "审判俄罗斯联邦共产党匪帮！"
 russia.581.t: "佐洛托夫的报告"
 russia.581.d: "维克多·佐洛托夫请求与弗拉基米尔·日里诺夫斯基进行一次私人会晤。在这场长达两小时的报告中，佐洛托夫详细描述了自由民主党的政敌们可能策划的政变阴谋，这令日里诺夫斯基怒不可遏。不久之后，佐洛托夫与日里诺夫斯基开始制定计划，准备铲除所有俄罗斯的敌人。而这一行动的首要步骤便是宣布国家紧急状态，彻底暂停国家杜马的运作，并暂时废止现行宪法。"
 russia.581.a: "我们必须立即采取行动！"
 russia.582.t: "俄罗斯民主联盟"
 russia.582.d: "一股不祥的阴影正在苏醒，威胁着将我们的祖国拖入混乱与毁灭的深渊。俄罗斯民主联盟正从灰烬中崛起，将自由派、体制外寡头与叛徒们，以及前政府成员团结在它的麾下。这个同盟浸透着对我们国家与领导者的仇恨之毒，凝聚成形的唯一目的便是对以弗拉基米尔·沃尔福维奇·日里诺夫斯基为首、由人民选出的政府发动战争。\n\n俄罗斯民主联盟以一切手段宣告其险恶的企图，甚至不惜采用最卑劣、最具恐怖性质的方式。它准备动用一切毁灭性的力量来夺取政权，试图将我们自由独立的祖国置于其控制之下。\n\n然而，让这些黑暗势力知晓：我们绝不会被击垮，绝不允许敌人摧毁我们所奋斗的、所守护的！我们将围绕在领袖身边，捍卫我们的理想与价值观，同仇敌忾，共同抵御这股邪恶的力量。"
 russia.582.a: "我们必须粉碎这帮害虫！"
 russia.583.t: "新复辟"
 russia.583.d: "一股邪恶的联盟正从历史的阴影中浮现，妄图动摇我们国家的根基，将我们重新引向那昔日错误的黑暗深渊。左翼政党——\"新复辟\"正走上毁灭之路，将共产主义者、新斯大林主义者及虚伪的民主社会主义者汇聚在其旗下。他们的目标是用一切可能的手段——甚至包括恐怖主义行为——来对抗以弗拉基米尔·沃尔福维奇·日里诺夫斯基为首的合法政府。\n\n\"新复辟\"在黑暗中锻造，以复仇与毁灭的理念为燃料。这些叛徒们并不关心祖国的福祉，他们的所作所为只是为了追逐权力与血腥的报复。他们不择手段，愿意采取最卑劣的方式来达成目的，并掩盖自己走向衰亡的痕迹。"
 russia.583.a: "对这些赤色恐怖分子我们绝不留情！"
 russia.584.t: "秘密战争……"
 russia.584.d: "乌云正笼罩在祖国上空，邪恶的力量——\"俄罗斯民主联盟\"与\"新复辟\"这两大秘密组织，正策划对我们的自由与独立发动阴险的进攻。为了捍卫国家的合法性与稳定，以弗拉基米尔·沃尔福维奇·日里诺夫斯基为首的政府被迫卷入这场秘密战争，对抗这一潜藏的敌人。\n\n\"俄罗斯民主联盟\"与\"新复辟\"笼罩在背叛与权欲的黑暗之中。他们不惜一切代价推翻由人民选举出的政府，建立他们的暴政统治。他们的方法狡诈阴险——欺骗与暴力交织，旨在摧毁我们民主的根基，将我们的人民奴役于他们的枷锁之下。\n\n在这场秘密战争中，日里诺夫斯基政府动用了所有可能的手段，包括国家安全力量，全力应对这个黑暗联盟。我们已经做好准备，抵御每一次袭击，揭穿每一个阴谋，并追究任何试图破坏我们自由的人的责任。"
 russia.584.a: "时机已到。"
 russia.585.t: "新复辟被消灭！"
 russia.585.d: "占位符"
 russia.585.a: "好样的，兄弟们！"
 russia.586.t: "俄罗斯民主联盟被消灭！"
 russia.586.d: "占位符"
 russia.586.a: "好样的，兄弟们！"
 russia.587.t: "特辖区管日"
 russia.587.d: "雨点无情地敲打着俄罗斯国家近卫军警车的车顶，将蒂穆尔从沉睡中唤醒。几周前来自莫斯科的新指令在他肩带上的无线电中发出嗡嗡声，提醒着他如今肩负的责任。普通的国家近卫军军官像蒂穆尔这样的角色，现在拥有了广泛的权力，使他在这个省城的小镇上凌驾于所有警察之上。但工作压力也因此倍增，以至于他竟然在工作时直接睡着了。\n\n\"G-10，听到请回复。重复，G-10，完毕。\"——对讲机里传来声音。这也是新命令中令人烦躁的条款之一：所有交流中都必须使用代号，甚至是私人通讯也不例外。\n\n\"G-10收到，完毕。\"——蒂穆尔打了个哈欠，回应道。\n\"我们收到有关可能存在反俄行为的信息，可能与‘新复辟’组织有关。\"——对方传来的消息让蒂穆尔立刻严肃起来。平时他的工作无非是驱散小混混、抓捕酗酒者或无家可归的人。而现在，这次行动可非同寻常。蒂穆尔痛恨共产主义者，正如他的家庭一样。他们一直支持日里诺夫斯基，即使在其他趋炎附势者纷纷投票给普京时，他们也毫不动摇。而现在，正是他展示真正能力的时刻，他可以借此机会实现那位因他加入国家近卫军而骄傲不已的父亲的期望。\n\n\"收到，G-1。请告知目标位置，完毕。\"——蒂穆尔在接收了坐标后，便驱车前往目的地，准备将这些俄罗斯的敌人一网打尽。"
 russia.587.a: "\"如果我必须砸碎几个脑袋，那我绝不手软。\""
 russia.588.t: "日里诺夫斯基的最后命令"
 russia.588.d: "俄罗斯的公民们，让我们于今日共同哀悼伟大领袖弗拉基米尔·日里诺夫斯基的不幸离世，他虽离我们而去，但遗产仍留存我等之身。在领袖生命的最后时刻，他下达了一则命令，一份给予我们祖国最后且最伟大的馈赠。\n\n这则命令即是他的最后遗嘱，他提及必须清除我们国家的害虫，尤其是列昂尼德·斯卢茨基这个败类。其中还特别规定，唯有日里诺夫斯基最为忠诚的学生瓦西里·弗拉索夫才有资格传承这一宏伟的使命。\n\n领袖的灵魂时刻燃烧奉献着，他的心充斥着对祖国的热爱。他坚定地投身每一项乃至每一步行动，他的每一次牺牲都让我们更触及心中的宏伟蓝图，那个清正廉洁而平等的社会，那个每位公民都能蓬勃成长的伟大社会。\n\n愿他的功绩流芳百世与荣耀桂冠并存，愿他的伟名千秋万代同忠诚强力共肩。愿我们一同在他的领导下，让俄罗斯更加强大、更加团结、更加光明，谨此纪念伟大的领袖弗拉基米尔·日里诺夫斯基。愿荣耀属于俄罗斯！"
 russia.588.a: "时机已至，执其遗命……"
 russia.589.t: "俄罗斯要求我们屈服！"
 russia.589.d: "做出正确选择，否则你就完蛋了"
 russia.589.a: "算了，管他呢"
 russia.589.b: "必须战斗，不能这样生活下去，必须战斗"
 russia.590.t: "杜金公开支持久加诺夫！"
 russia.590.d: "亚历山大·杜金作为一名杰出的政治家和思想家，由于其最近的演讲在俄罗斯社会引发了一波讨论。他在讲话中表示支持新苏维埃政府及其领导人根纳季·久加诺夫。这对许多人来说是出乎意料的一步，因为杜金之前表达的立场并不总是与共产党的路线一致。\n\n支持的基础是久加诺夫在宗教问题上的官方立场以及与俄罗斯正教会的合作。久加诺夫表示：不会镇压宗教组织，反而还会与教会在国家和文化项目上合作。杜金很高兴，他称久加诺夫是一个真正的爱国者和保守派。\n对杜金来说，重要的是当局意识到了宗教在社会和国家生活中的作用和重要性。他认为，与俄罗斯正教会的合作有助于加强俄罗斯文明的精神基础，维护传统价值观。以久加诺夫为代表的共产党政府在这个问题上对杜金的支持，成为忠于保守主义和爱国主义理想的生动例子。"
 russia.590.a: "太棒了！"
 russia.590.b: "说服他联系我们。"
 russia.591.t: "与美国人民解放军交好"
 russia.591.d: "占位符"
 russia.591.a: "酷！"
 russia.592.t: "与特朗普交好"
 russia.592.d: "占位符"
 russia.592.a: "酷！"
 russia.593.t: "旧敌"
 russia.593.d: "占位符"
 russia.593.a: "不是很酷"
 russia.594.t: "旧敌"
 russia.594.d: "占位符"
 russia.594.a: "不是很酷"
 russia.595.t: "干涉美国内战"
 russia.595.d: "占位符"
 russia.595.a: "酷？"
 russia.596.t: "也门革命"
 russia.596.d: "萨那的街道上，寂静无声。昔日喧嚣的市场，如今只剩下耀眼的弹壳山，在黎明的曙光下闪闪发光。尸体被随意地覆盖在报纸之下。屹立不倒的几座宣礼塔中，清晨的晨祷声渐渐响起。宣礼员们的声音在空旷的街道上回荡，与那迎风飘扬的革命红旗竞相争夺着人们的注意。\n\n在埃尔拉哈巴机场，一架IL-76运输机正对准跑道，其内部充斥着带着几分兴奋的、低声交谈的俄语。在短短几个小时后，他们将平安回到家乡。这场行动的成功将为他们带来应有的嘉奖与晋升。"
 russia.596.a: "又一块多米诺骨牌倒下了。"
 russia.597.t: "阿拉伯革命"
 russia.597.d: "占位符"
 russia.597.a: "酷！"
 russia.598.t: "伊朗革命"
 russia.598.d: "占位符"
 russia.598.a: "酷！"
 russia.599.t: "叶利钦纪念中心声援特别军事行动！"
 russia.599.d: "特别军事行动开始几周后，叶利钦中心发布了一段视频，名为\"战斗，士兵！\"展现他们这支自由派对叶利钦形象的解构。视频开始于俄罗斯在高加索地区与分离主义者和瓦哈比派的斗争，再是叶利钦在关键时刻支持塞尔维亚，以及最重要的，叶利钦信任普京总统。\"今天我们完全有理由相信，叶利钦也会支持发动特别军事行动。\"之后，这位前总统的名言出现在黑色背景上：\"好好照顾俄罗斯！\"\n\n当然，共产主义与亲西方的自由派媒体驳斥视频中的所有言论，自由派博主即刻批评叶利钦中心的新领导层。然而，yeltsin.ru的网站统计数据成倍增加，叶利钦博物馆的门票开始大量售出，为博物馆带来很多收入。博物馆承诺会用这些收入帮助我军。俄罗斯新闻VESTI调查采访了参观者，询问他们为什么决定参观叶利钦中心。其中一位受访者回答说：\"最近发生的事说服我参观这里。我确实不喜欢叶利钦，但我赞同博物馆的管理！\"这两句话，简洁地解释了博物馆为何流行于近日的其中一种原因。"
 russia.599.a: "需要时，我们便团结一致！"
 russia.600.t: "马克西姆·卡茨当选总理"
 russia.600.d: "占位符"
 russia.600.a: "好吧"
 russia.601.t: "火炬行动进行中"
 russia.601.d: "许多伪君子会堂而皇之的批判复仇，称其并不比作恶高尚，那又如何？复仇能带来宣泄，而宣泄最终带来平静。\n\n在此命定之日，\"火炬行动\"正式启动，俄罗斯军队的数个师和纳瓦利内敢死队登陆伦敦街头。当地标燃气熊熊烈焰，街道充斥着化学武器，我们的敢死队以压倒性的火力攻击当地军队时，那些英国佬脸上仓皇逃窜的表情真是太滑稽了。\n\n行动的主要目标：复仇。而次要目标：在英国人的精神上留下深深的伤痕，让他们永远不敢再向我们和我们的孩子举起武器。\n\n在几个小时内，伦敦的街道变得寂静无声，除了偶尔的哭泣声和远处的枪声，整个城市都被有毒的雾气笼罩。我们还没有结束，整个岛屿都将要接受我们的永久审判。"
 russia.601.a: "他们会付出代价的……"
 russia.602.t: "圣彼得堡问题"
 russia.602.d: "俄罗斯重回正轨的路途需要纠正许多错误，也有许多问题等候回应，其中之一就是关于圣彼得堡的问题。\n\n这座城市有着悠久而丰富的历史，它的文化和历史意义不容忽视，但是鉴于德国注定会再次成为我们不共戴天的仇敌，而圣彼得堡的名字听起来又太像德语，或许将其改回彼得格勒会更好。这将向我们的人民和德国表明，我们的忠诚只属于祖国。\n\n或者，我们可以保留这个名字，以表明我们不稀罕那些背后捅刀子的卑劣行径，也不会做那些样子工程，只有实实在在的行动才能推动我们前进。"
 russia.602.a: "改成彼得格勒，别再用日耳曼蛮族的名字！"
 russia.602.b: "它就该一直叫圣彼得堡"
 russia.603.t: "建立至圣主教公会"
 russia.603.d: "重塑祖国正如完成一幅无法完成的拼图，但正所谓前人栽树后人乘凉，我们至少能为子孙后代减少负担。\n\n这就是我们要用新的圣主教公会取代牧首区的原因，教会不再设立唯一的权威人物，而是类似于彼得大帝的做法，将其权力划分给十二个职位。这不仅能削弱教会的权力，还能让我们更好地实现国家现代化，而不会遭遇来自教会的强烈抵抗。虽然民间已经出现了不少反对的声音，但是非自有后人评判，他们最终会理解这项决定。\n\n亲自任命这些要职自然更好，亚历山大·鲍里索夫将成为第一批官僚之一，我们将与他一起挑选出更容易认同我们理念的合适人选。"
 russia.603.a: "清扫门户。"
 russia.604.t: "创立极端民族主义纲领"
 russia.604.d: "在库班发送最后通牒后，未来俄罗斯内部一小群非常活跃的极端民族主义者建立了自己的平台来鼓吹他们的愿景。\n\n他们仍然忠于纳瓦利内，但由于支持对西方进行全面报复并清除俄罗斯内部之敌，其声望水涨船高。尽管相对于党而言他们有些脱离传统，但为了推行某些不受欢迎的政策，可以利用他们将青年团结起来。\n\n到目前为止，他们的影响力和支持度都在增长，国家正如引擎，我们必须决定是改用这一仇恨和激进的燃料，还是保持稳定路线，无论怎样，他们对我们都大有用处。\n\n"
 russia.604.a: "俄罗斯将主宰全欧，即便必须让一切化为灰烬。"
 russia.606.t: "纳瓦利内赢得总统选举"
 russia.606.d: "自1991年以来俄罗斯首次民主选举的结果已经揭晓！正如民意调查所预测的那样，阿列克谢·纳瓦利内成功当选总统，将其临时领导地位转变为永久性领导。\n此次选举的投票率达到了68.7%，共有75,181,073名选民参与投票。莫斯科的投票率最高，为92.8%，而卡累利阿共和国的投票率最低，仅为57.3%。在第一轮选举中，阿列克谢·纳瓦利内以52.9%的得票率脱颖而出。其中，圣彼得堡的支持率最高，达85.4%，而卡累利阿地区的支持率则最低，仅为25%。\n获得第二名的是马克西姆·卡茨，他的得票率为29.2%。紧随其后的是叶夫根尼·斯图平，以5.8%位居第三。伊万·普季林的得票率为3%，格里戈里·亚夫林斯基为2.7%，鲍里斯·季托夫则获得了1.5%的选票。此外，有1.9%的选民选择投票反对所有候选人，其中卡累利阿地区的反对票比例最高，达到了5.9%。"
 russia.606.a: "一次正当的胜利！"
 russia.607.t: "民族布尔什维克党问题"
 russia.607.d: "近日，关于可能解禁民族布尔什维主义党的问题引起了广泛讨论。该党是普京政权及其继任者打压的众多政治受害者之一，也一直站在反抗政治压迫的最前线。尽管他们的意识形态极端激进，但多年来他们与我们在抗议和其他活动中密切配合。因此，为他们多年的努力给予应有的回报，无疑是合情合理的。\n然而，他们的极端思想，以及对我们民主制度的缺乏忠诚，特别是对苏联帝国的热衷，或许同样会对我们构成潜在威胁。毕竟，如果当时我们生活在一个正常的国家，就根本不必与这些社会边缘力量合作……"
 russia.607.a: "他们的花朵也应拥有盛开的权利！"
 russia.607.b: "我们永远也不会与他们为伍。"
 russia.608.t: "左派问题"
 russia.608.d: "占位符"
 russia.608.a: "这是他们的权利。"
 russia.608.b: "只允许\"民主\"左派。"
 russia.609.t: "俄罗斯示威游行被消灭"
 russia.609.d: "今日，效忠瓦格纳的一个小组对发生在瑟克特夫卡尔的极端民族主义游行进行了暴力镇压。这场始于午时的抗议活动很快便压垮了原本被派去管辖的小型警察部队。示威领袖涉嫌煽动群众对最高军官委员会和瓦格纳英雄进行暴力行为。\n\n最终，最高委员会派遣了瓦格纳精英部队对人群进行开火驱离。试图反抗的示威者很快便被就地处决。其余被捕的成员将因涉嫌针对俄罗斯当局发动政变而遭受严重处罚。两名个人示威者布拉特·波格拉夫尼科夫和卡提娅·波格拉夫尼科娃现在身在第三特别监狱，尽管他们身负重伤，仍将于现在接受审判，而且将被判处死刑以儆效尤。\n\n虽说有部分瓦格纳士兵对开火的行为悔恨不已，但他们自己的处境会告诉他们自己该干什么的。"
 russia.609.a: "重拳出击。"
 russia.610.t: "纳瓦利内在监狱中失踪！"
 russia.610.d: "重大新闻！\n\n第三特别监狱近期爆发骚乱后，其中关押的臭名昭著的罪犯兼反对派阿列克谢·纳瓦利内从牢房中神秘失踪。一种可信观点认为，他可能是借由叛徒或是囚犯的帮助，设法趁乱逃离监狱，躲到了荒原中。如果不能迅速确定纳瓦利内的下落并将其控制，可能会导致严重后果。最高委员会已经发布指令，命令展开大规模搜索行动，找到纳瓦利内并将其逮捕。\n\n除纳瓦利内外，还有超过一百名囚犯也趁乱逃离了第三特别监狱，他们是否与纳瓦利内有关已经引起公众的关注。"
 russia.610.a: "天哪！"
 russia.610.b: "将那里的一切颠覆个天翻地覆！"
 russia.611.t: "多尔戈普鲁德内大屠杀"
 russia.611.d: "来自莫斯科地区的重大新闻，当地的纳瓦利内同情者、共产主义者、民族主义者乃至普京主义者都聚集在一起举行反对瓦格纳当局的集会。他们高喊反对政府的口号，其中夹杂着对委员会官员乃至已经死去的普里戈任的控诉。然而事情的发展在之后完全失控，一名情绪不稳的瓦格纳士兵突然向人群开火，震惊的集会群众顿时惊慌失措，最终导致死亡人数激增。由于此次事件发生在国家核心地带，因此无法像处理瑟克特夫卡尔事件那样进行掩盖。当天夜间，所有电报频道及独立媒体都铺天盖地报道着发生在多尔戈普鲁德内触目惊心的景象。而其中，一名死去学生手中紧攥\"我不愿生活在瓦格纳俄罗斯！\"的牌子深深烙印在人们的心中……\n\n过不了多久，报复就将来临……"
 russia.611.a: "唉……"
 russia.612.t: "俄罗斯境内爆发大规模抗议！"
 russia.612.d: "在我们急于扑灭俄罗斯境内蔓延的火焰时，却不料反倒助长了它的蔓延。最初几场孤立的自由派抗议，已经在西方煽动者的助推下迅速演变成无法控制的局面。这些抗议的矛头直指我们，试图摧毁我们为重建祖国所付出的一切心血。\n\n他们竟然将我们视为敌人，而不是那些最初让我们陷入困境的西方势力！若非他们暗杀了普里戈任，这一切都不会发生，他们也没有理由进行暴动。如果任由他们得逞，俄罗斯将被改造成一个西方化、自由派的地狱。我们必须立即行动，绝不能允许自己再次失败。"
 russia.612.a: "出重拳！"
 russia.612.b: "发生啥事？！"
 russia.612.c: "全完了……"
 russia.613.t: "\"赎罪\""
 russia.613.d: "最近，一本名为《赎罪》的新书风靡全国，引发了广泛关注。这本书由退伍军人马克西姆·卡拉什尼科夫撰写，凭借其独特的剧情迅速走红。小说设定在一个平行时空的2020年代，情节围绕这样一个假设展开：弗拉基米尔·普京在疫情期间并未去世，而是继续执掌俄罗斯，并在2023年发起了对乌克兰的反恐军事行动，旨在保卫顿巴斯。\n故事的主角是阿列克谢·纳瓦利内，他在书中因服刑而被征召进入\"Z连\"——一支装备简陋、由囚犯组成的部队。起初，纳瓦利内对这场战争充满厌恶，认为一切都不公平，甚至萌生了逃跑的念头，但最终因意外被迫留下。随着故事推进，他遇到了不同背景的人物及他们的故事，包括卢甘斯克的居民、一位乌德穆尔特士兵和一名来自莫斯科的志愿者。这些角色的出现，让他亲眼目睹了乌克兰当局和北约雇佣军所犯下的种种暴行，逐渐改变了他对战争的看法。纳瓦利内由最初憎恨政府的自由派人士，转变为一名忠诚的战士。他在战斗中接替了牺牲的指挥官，成为这支部队的新领导者。小说的结局令人感慨万千：在攻打基辅的战斗中，代号SVOY的纳瓦利内身负重伤，在失去意识前，他听到了最后一声胜利的呐喊——\"基辅他妈的是我们的了！\"\n\n《赎罪》因其对顿巴斯人民悲剧的真实描绘和战争场景的高度还原，赢得了公众的广泛赞誉。然而，知名评论家叶戈尔·皮皮谢夫则批评这本书为\"普京式妄想症\"，认为其存在严重的意识形态偏见。"
 russia.613.a: "多么幼稚的幻想！"
 russia.614.t: "你们的帝国"
 russia.614.d: "对祖国的热爱，是身为一名公民最为纯粹的感受之一。纳瓦利内总统在几周前重新升起了圣彼得堡的三面巨型国旗，以作为善意的标志并表明本届政府采用了历史实用主义，曾经的三面国旗有了更适合的颜色。\n\n至此之后，许多城市的街道上到处都是自称为\"爱国积极分子\"的年轻人，他们组织会议、演讲、集会，分发小册子。身着厚重的深色风衣，有时戴着三色旗臂章，经常带着俄罗斯历史上曾使用过的旗帜。没有任何政府机构或政党与他们有明确联系，他们中大多数人声称是非政府激进组织\"保卫祖国联盟\"的一员。\n\n许多自由派政治家呼吁政府介入，遏制年轻人中\"明显的复仇主义倾向\"，然而，克里姆林宫针对这些要求的回应简短而直率：\"俄罗斯当局不会因为狂热的爱国主义而提起刑事诉讼。俄罗斯现在是一个自由民主的国家。\"因为这个回应，这些活动家继续在城镇和村庄游荡，传播着对总统以及国家的支持。"
 russia.614.a: "品尝过鲜血与汗水，方能成为一个爱国者！"
 russia.615.t: "莫斯科寒日"
 russia.615.d: "\"我有一个梦想，\"纳瓦利内粗犷的呼喊从莫斯科的奥斯坦金诺电视塔传递到全国各地，在俄罗斯的每个角落一呼百应。他身着别有\"俄罗斯总统\"名牌的军装，\"我盼望着有一天，我们的祖国能成为民主灯塔，但要实现这一梦想，我们就必须跨越仇恨和偏见，戳破所谓\"合作伙伴\"精心编织的谎言！\"总统先生指着他身后被照亮的那面旗帜，斩钉截铁地说道。\n\n\"我们身处新时代的交汇处。北约，曾经的民主灯塔，已经遭到仇俄狂热的反噬，一意孤行想要击溃我们民族不屈不挠的精神力量，\"他握紧双拳，面带微笑，但随后却转变为不屑。\"可悲的是，我们要面对的还不止境外之敌。\"总统清了清嗓子，紧接着大声宣告：\"考虑到国难当头，危机四伏，我宣布在此刻终止宪法效力并彻底对政府进行改革！\"数百万收听的民众此刻内心五味杂陈，嘲笑、泪水、愤怒抑或是喜悦充斥着民众心头。\n\n\"我的同胞们，你们无需感到恐惧！这些新领导都经由鄙人和最为信任的同僚精挑细选。他们随时准备好为我们的祖国牺牲一切，\"纳瓦利内举起双拳，宛若胜利般宣告着\"新时代的曙光即将来临！，愿主保佑所有人！\""
 russia.615.a: "爱国者执掌大权。"
 russia.616.t: "紧急措施"
 russia.616.d: "历史的进程并非由那些私下的不正当政治交易决定——我们的敌人希望我们相信这一点。而当西方世界沉浸在他们那不义的胜利中时，他们已经对我们愈加炽烈的复仇渴望变得盲目了。民主是作为一种脆弱的制度，要倾听人民的声音并听取他们的意见，但由于人们之间存在如此多的分歧，前行的道路上必然会遇到重重障碍。而有时，我们只需要一个人的声音——一个凝聚着人民愿望和渴望的声音。\n\n民主与复仇注定水火不容。要站上权力的巅峰，需付出难以想象的代价：或是牺牲言论的自由、剥夺组织的权利，又或是在官僚迷宫中与反对党无休止地争吵，只为推进哪怕微小的进展。\n\n但只要我们选对了战友，在关键的节点布下军队，再向民众表明这些举措都是为了国家的利益、民族的存亡，我们便能将命运紧紧握在自己手中。\n\n或许，这确实是暴政的种种。但当胜利的曙光升起，所有的苦难都将散去，我们终会将生活重新引回原本的轨道，重拾那久违的平静与秩序。"
 russia.616.a: "我们会让一切回归正轨的……"
 russia.617.t: "恢复叶利钦的名誉？"
 russia.617.d: "叶利钦在俄国历史上无疑是一个毁誉参半的人物，一部分（极权主义白痴）觉得他是个叛徒和墙头草，而我们（开明的自由战士）则认为他是个伟大的民主斗士，将俄罗斯从共产主义政权中解放出来。\n当然，他也犯过错误，尤其是在他职业生涯的后期，比如在1993年策划了一些活动，并在2000年将权力交给了普京，但他作为一个伟大自由斗士的形象令人难以忘怀。部分总统班子主张重新塑造他的形象，划分他生命中的各个时期，甚至计算他对俄罗斯政治积极和消极程度的百分比，当然，积极总要压过消极，我们将把最明显的错误和他的晚年生活放在消极部分中。\n这对塑造公众和激进民主派眼中的合法形象至关重要，但为叶利钦恢复形象的代价可能很高。"
 russia.617.a: "这主意不错！"
 russia.617.b: "你脑子进水了？还是天生就是个白痴？"
 russia.620.t: "俄罗斯的\"Funko Pops\"！"
 russia.620.d: "全国再次掀起热潮！但这次并非因炮火连天或炸弹轰鸣，而是源于一款面向年轻人群的新玩具所引发的狂潮！俄罗斯国有企业\"IzhDynamics\"推出了属于我们自己的\"Funko-Pops\"玩偶——\"RussoPop\"！这些头大身小的可爱玩偶，不仅模仿了众多深受年轻人追捧的角色，甚至还包括了政治人物！其中，最畅销的莫过于以总统阿列克谢·纳瓦利内及其部分部长（包括他们的配偶）为原型的RussoPop！\n\n如今，不仅有人在为美食排队等候，更有大批人在售卖这些呆萌小玩偶的店铺前大排长龙，为公司和政府带来了数十亿的丰厚利润。\n\n媒体有幸采访到了一位RussoPop的新晋粉丝——叶戈尔·季皮谢夫，他是一位新晋TikTok网红，同时也是纳瓦利内的忠实拥趸。他领着女记者参观了自己的家，家中盒子里堆满了各式各样的新玩具，其中不乏穿着不同服饰、摆出各种姿势的纳瓦利内玩偶。\"瞧瞧……我的RussoPop……收藏品\"他得意地向记者展示道。不过值得注意的是，他的狗似乎显得有些不太舒服。"
 russia.620.a: "把他们全都集齐吧！"
 russia.621.t: "新俄罗斯商业"
 russia.621.d: "旧秩序已荡然无存，全民皆得以普享黎明曙光，我们高尚而热爱民主的企业家们自然也不例外。由普京及其走狗们一手操纵的万恶寡头政治已一去不复返，取而代之的是更为友善之人，他们的脸更漂亮、笑容更灿烂、西装更干净，腰包更是鼓鼓囊囊。\n\n霍多尔科夫斯基，这位\"俄罗斯民主的金融家\"对纳瓦利内归还其尤科斯公司资产的决定很是满意，决定挺身而出，收拾先前经济巨头垮台后留下来的烂摊子。\n\n尤科斯公司很快便成了我们衰退经济体中的新巨头，随之而来的还有许多新公司，像是\"新俄气\"、\"费夫拉尔\"传媒公司、\"自由\"钢铁公司等。\n\n在最近一次的政企会晤中，当纳瓦利内宣布新一轮私有化和企业税收减免政策时，众人脸上都洋溢着笑容。\n\n新俄罗斯需要新象征，而如今它就摆在那。"
 russia.621.a: "你已是寡头的笼中物咯！"
 russia.622.t: "寡头要求在[SOV_oligarchs_investment_state.GetName]进行民事投资"
 russia.622.d: "来自[SOV_oligarchs_investment_state.GetName]的一位老牌寡头向政府表示愿意提供支持。他所在的地区投资严重不足，政府发起的经济刺激计划肯定会让他重新考虑对政府某些政策的立场。[SOV_new_oligarchs_scripted_loc]"
 russia.622.a: "我们只能接受。"
 russia.622.b: "没门。"
 russia.624.t: "寡头要求在[SOV_oligarchs_investment_state.GetName]进行军事投资"
 russia.624.d: "来自[SOV_oligarchs_investment_state.GetName]的当地寡头与政府接洽，提议通过向总统提供支持以换取其将在[SOV_oligarchs_investment_state.GetName]建立新军用工厂的非正式保证。他们坚信在这个区域修建工厂将会创造很多的就业机会并在这个日益危险的世界环境下向军队提供更多军需物资。[SOV_new_oligarchs_scripted_loc]"
 russia.625.t: "\"新的\"现实"
 russia.625.d: "我们虽为民主使尽浑身解数，但大部分人并未有何切身体会。不乏有人认为，除了上头的人换了个彻底，其他什么也没变。\n\n人们不相信我们，这确实是个问题。\n\n对首都之外的普罗大众来说，我们依旧是言之无物、脑袋空空的民粹主义者，更有甚者认为我们不过是拿了西方钱的叛徒。\n\n但是，根据民意调查，还是有许多人将希望寄托在总统个人身上，认为只有他拥有足以恢复秩序的强力手腕与自信气魄……纳瓦利内本人也是这么认为的，正如他说：\"我国犹如一家，一家必有一长。这不是一代人之内能改变的，我宁可做民主的波拿巴，也不做那功败垂成的改革者。\"\n\n当然，前路依旧漫漫，国家也正行进在自己选择的道路……一条备受期待之路上。"
 russia.625.a: "何其不幸……"
 russia.626.t: "反腐审判"
 russia.626.d: "当一个国家濒临垂亡，你会看到秃鹫在它的上空盘旋，饥肠辘辘，眼中充满了贪婪的光芒，迫不及待地要啄食它的血肉，填满自己的饥腹。然而，在这失去理智的狂热中，它们未曾察觉，自己啄下的每一块血肉，竟是它们自身的子嗣。\n\n那些寡头，便是如此。我们好不容易收复失地，他们却再次悄然现身，妄图继续吸吮这片土地的精髓。可怜的蛆虫，他们从不曾像我们这般热爱自己的祖国。当我们看见的是美丽的人民、富饶的山川时，他们眼中不过是资源和廉价的劳动力。他们与西方勾结、沆瀣一气，在过去，这些寄生虫成功地将自己植入我们的文明，成为我们逐渐沉沦的毒瘤。\n\n正因如此，我们要在他们造成真正的伤害之前，将其彻底铲除。所有人都将被逮捕，并因哪怕是最微小的违法行为而接受审判。腐败、叛国、贿赂、剥削、谋杀以及他们沉溺的各种罪恶行为，毫无疑问，都是他们从西方学来的恶习。\n\n但这一切很快将尘埃落定。他们将彻底从人们的视野中消失。这是我们重振国家的第一步。"
 russia.626.a: "这还只是开始。"
 russia.627.t: "霍多尔科夫斯基异常愤怒！"
 russia.627.d: "自反腐败案调查启动以来，国家元首与该国顶级企业家之间的关系便急剧紧张起来。\n一份霍多尔科夫斯基与其同事的电话录音被泄露至总统案头。录音中，霍多尔科夫斯基愤怒地发誓要\"摧毁这小子\"，并\"让他瞧瞧自己将住进哪种营房\"，以此作为\"反噬恩人\"的惩罚，明显意指阿列克谢·纳瓦利内及其政府。\n此外，他还提及了涅夫捷尤甘斯克市市长的逝世，并暗示如有必要，会对纳瓦利内采取类似行动。总统独自聆听这段录音，显然在深思接下来的对策；不久，他便拿起了一部办公电话……"
 russia.627.a: "\"哎，真是可悲，似乎人人都要与我为敌。\""
 russia.628.t: "霍多尔科夫斯基遇害！"
 russia.628.d: "今日，尤科斯石油公司CEO、反腐败案关键被告米哈伊尔·霍多尔科夫斯基被发现溺亡于大涅瓦河，其已开始腐烂的遗体最初由路人发现，随后报警并通知了医疗人员。\n此消息迅速在互联网上传播，引发全国关注。有人表示\"终于摆脱了这个家伙\"，也有人对这位俄罗斯民主事业支持者表达了哀悼。\n政府方面尚未发表官方声明，彼得堡警方也拒绝评论此事件是意外还是谋杀，理由是案件仍在调查中，且根据隐私法，逝者个人信息应受保护。\n不过，俄罗斯已暂停并冻结了霍多尔科夫斯基的所有银行账户，尤科斯的未来或将很快尘埃落定。"
 russia.628.a: "悲剧上演……"
 russia.629.t: "夜晚"
 russia.629.d: "阿列克谢·纳瓦利内度过了极为充实的一天，尤其在处理繁重的商务事务上更是倾注了大量心血。此刻，时针已悄然越过午夜。他信守承诺，饮尽杯中最后一滴咖啡后，便从克里姆林宫办公室的桌前起身，从椅上拾起外套迅速披上，尽管身心俱疲，但仍保持着冷静与从容，稳步迈向门口。正当他伸手欲转动门把手之际，一个异常熟悉的声音猛然响起：“我甚至，呃，都没想到会听到这个。”\n\n这个音色绝不会与其他人混淆，它太独特了，纳瓦利内听过很多次。他额间不禁渗出细密的汗珠，手仍僵在门把手上，愣神片刻后，猛然转身欲探究竟……然而，办公室内空荡如初，了无人影。\n“谁在那里？”纳瓦利内疑惑地问道，难以置信这空旷的办公室竟仿佛在与他对话。然而，回应他的只有死寂的沉默。\n“看来我得去睡了，不然恐怕连晚上做梦都不得安宁。”纳瓦利内心中暗自思量，边揉着疲惫的双眼，边离开了办公室。他漫步于克里姆林宫空旷的走廊之中，脑海中不断翻涌着关于这一事件的种种猜测：“是睡眠不足导致的吗？”“是不是有人往咖啡里加了什么东西？”“难道克里姆林宫内真的潜藏着幽灵？”“他还活着，就在这宫殿的某个角落默默守候？”然而，当纳瓦利内踏入卧室的那一刻，这些纷扰的思绪便被他抛诸脑后，取而代之的是更为现实的考量，如加强总统的安全防护等。但这一夜的奇遇，却在他心灵深处的那片幽暗角落中，久久徘徊不散。"
 russia.629.a: "夜间怪事……"
 russia.630.t: "庄家总是赢家"
 russia.630.d: "\"俄罗斯的变色龙已化身为其曾最为憎恶之物……\"\n\n纳瓦利内并不太关心敌人的意见，但西方记者的某篇文章却刺痛了他的心，他知道自己必须为了稳定、复兴和确定而放弃一些理想主义。\n\n但每当他看到异议人士被捕、抗议活动遭到暴力破坏以及铁腕权威扼杀自由的报道时，他不禁想到自己可能妥协的太多了，人们称其不过是新瓶装旧酒，新的普京，或直接侮辱其为变色龙。\n\n无论他那曾经的宿敌是身处地狱抑或是天堂，都会因这讽刺的转折而嘲笑他吧，但随后他又冷静下来。普京才是那个将俄罗斯搞得一团糟的始作俑者，他让国家停滞不前，是他一手推动那愚蠢的继任者，让俄罗斯走向了毁灭。\n\n不，纳瓦利内心想，他比他的敌人强太多了。权力在弱者手中只会钝化，而昨天并不是使用它的最佳时机。"
 russia.630.a: "但明天会是。"
 russia.631.t: "新布尔什维克分子已被控制"
 russia.631.d: "鲜红的旗帜曾在我们国家的各处飘扬，部分人满怀对其热爱，又有人对它恨之入骨，但我们不会愚蠢的否认它是我们历史的一部分。\n\n正因如此，借由政治恐吓与交易，我们设法将安德烈·鲁道伊领导的新共产党纳入了联盟。他们坚持更左倾的理念，但仍然像我们一样热爱祖国，他同意加入我们的行动恰恰证明了这一点。\n\n三色旗高高飘扬在空中，但在我们心中，那盏辉煌岁月中的红旗会永远占据一席之地。"
 russia.631.a: "他们知道什么才是最好的。"
 russia.632.t: "联系国内民主派"
 russia.632.d: "艰难时期，民族主义曾是我们根除虚无主义的良药。有些人虽赞同这点，但却未能硬起心肠拒绝怜悯，民主是一个需要谨慎控制而不是任其肆虐的实体。罗曼·尤尼曼深谙此道，他和他的国家民主党人在艰难时期就开启了奉献民主的艰难历程，经过一些协商讨论，他和他的政党也与我们的联盟结盟。\n\n毫无疑问，这将促使更多温和派人士与我们为伍，共同建立一个抵御西方政治疾病的国家盾牌。"
 russia.632.a: "好！"
 russia.633.t: "新社会主义分子已被控制"
 russia.633.d: "无法兑现诺言的伪善政客一如既往地散播着名为\"和平主义\"的疾病。但亚历山大·什捷凡诺夫领导下的新社会主义者们却并不如此。将民主社会主义者纳入阵营似乎自相矛盾，但这种展现善意的行为恰恰证明了我们确实希望与那些可能与我们存在分歧的人合作。\n\n当然，通过幕后的恐吓和政治晋升交易，这些意志薄弱的人很快就会成为我们忠实的盟友。"
 russia.633.a: "他们知道什么才是最好的。"
 russia.634.t: "\"木偶\"归来"
 russia.634.d: "自由回归，自由的节目也回来了。其中一个节目是被禁播20多年的\"木偶\"，瓦西里·格里戈里耶夫于90年代制作，现已重返荧屏。\n\"木偶\"的政治讽刺也已焕然一新。叶利钦、久加诺夫、日里诺夫斯基已是过去式，现在画面上的是纳瓦利内及其亲信，以及新反对派、商人的木偶。不过旧角色也会以鬼魂和闪回的形式出现。\n\n一些批评者则指出某些情节是重复的，有的甚至直接照搬旧剧集，只是把叶利钦或普京的木偶换成了阿列克谢·纳瓦利内的。作者则讽刺地回应，\"历史的循环性\"、\"这就是俄罗斯！\"尽管观众发现剧情有重复，但评分表明人们喜欢它。"
 russia.634.a: "无害的娱乐。"
 russia.635.t: "斯塔夫罗波尔抗议"
 russia.635.d: "库班共和国注定会成为一片多事之地，那些遭到西方强行带离的俄罗斯人民，正在抗议共和国的不公，抗议那些变本加厉的暴力行径。\n\n抗议人群遭遇枪击镇压的事实确凿，愤怒的浪潮如同奔涌的潮水涌向我们的心头。西方自然会一如既往的对悲剧视而不见，如此危难时刻，我们必须代表人民采取行动。我们将向库班共和国派遣维和部队，隔离暴力分子与平民，避免我们的儿女再次流血。\n\n这是一个绝佳的机会，可以让共和国境内的俄罗斯社区通过全民公决决定是否愿意回归祖国。考虑到他们遭受的暴力，毫无疑问进展会十分顺利。然而，我们的人民回归祖国的前景肯定会激怒敌人。"
 russia.635.a: "调停并举行公投！"
 russia.636.t: "公投通过！"
 russia.636.d: "顿河沿岸爆发大规模抗议和集会后，当地政府别无选择，只能联系纳瓦利内总统办公室，同意就归还俄罗斯控制下的领土举行\"公投\"。\n\n结果不出意外，91%的选民投票支持与俄罗斯统一。乌克兰外交部立即发出请求，要求检查结果是否存在伪造，并向俄罗斯政府发出抗议照会，但即使是他们也意识到，这个决定是绝大多数人做出的——斯塔夫罗波尔属于俄罗斯！"
 russia.636.a: "太棒了！"
 russia.637.t: "卡尔梅克提议再统一"
 russia.637.d: "短暂被迫独立后，卡尔梅克共和国政府向俄罗斯外交部提出请求，希望俄罗斯联邦总统对埃利斯塔进行外交访问，商讨\"民族共处与友谊的条件\"。俄罗斯领导人在埃利斯塔受到了热烈欢迎，在对该市进行短暂的参观后，前往拜访了共和国总统和总理。返回莫斯科后，总统表示两国将很快签署一项关于\"卡尔梅克和平重返俄罗斯\"的条约，所有卡尔梅克公民都将能够更新其俄罗斯护照。"
 russia.637.a: "欢迎回家。"
 russia.638.t: "关于财务部长的问题……"
 russia.638.d: "我们迟早要摆脱目前担任财政部长的米哈伊尔·霍多尔科夫斯基。不过，由谁来填补这个空缺呢？\n\n鲍里斯·济明，反腐败基金会的主要发起人，成功的商人和慈善家，中立而又忠诚，有足够的经验担任部长。\n\n米哈伊尔·斯韦托夫，俄罗斯最著名的自由派政治家，俄罗斯自由意志党成员。还是一位拥有十分……独特想法的经济学家，这些想法可能会给俄罗斯带来繁荣？"
 russia.638.d1: "我们迟早要摆脱目前担任财政部长的米哈伊尔·霍多尔科夫斯基。不过，由谁来填补这个空缺呢？\n\n鲍里斯·济明，反腐败基金会的主要发起人，成功的商人和慈善家，中立而又忠诚，有足够的经验担任部长。\n\n米哈伊尔·斯韦托夫，俄罗斯最著名的自由派政治家，俄罗斯自由意志党成员。还是一位拥有十分……独特想法的经济学家，这些想法可能会给俄罗斯带来繁荣？\n\n埃尔维拉·纳比乌琳娜，前财政部长，在经济领域拥有丰富经验和公认才能的人才，但在我们新的俄罗斯，选民可能对普京政府成员评价会很低……"
 russia.638.d2: "我们迟早要摆脱目前担任财政部长的米哈伊尔·霍多尔科夫斯基。不过，由谁来填补这个空缺呢？\n\n鲍里斯·济明，反腐败基金会的主要发起人，成功的商人和慈善家，中立而又忠诚，有足够的经验担任部长。\n\n米哈伊尔·斯韦托夫，俄罗斯最著名的自由派政治家，俄罗斯自由意志党成员。还是一位拥有十分……独特想法的经济学家，这些想法可能会给俄罗斯带来繁荣？\n\n帕维尔·格鲁季宁，商人、活动家、前总统候选人和俄罗斯联邦共产党的重要成员，也许我们应该再给计划经济的理念一次机会……？"
 russia.638.a: "……鲍里斯·济明。"
 russia.638.b: "……米哈伊尔·斯韦托夫。"
 russia.638.c: "……埃尔韦拉·纳比乌琳娜。"
 russia.638.e: "……帕维尔·格鲁季宁。"
 russia.639.t: "霍多尔科夫斯基表态"
 russia.639.d: "俄罗斯联邦财政部长米哈伊尔·霍多尔科夫斯基辞职后，他向俄罗斯政府、阿列克谢·纳瓦利内及全体俄罗斯人民发表了公开呼吁，这段讲话被发布在他的YouTube频道和新闻刊物《开放俄罗斯-霍多尔科夫斯基直播》中。\n\n\n\"……我们看到，纳瓦利内正走上普京曾用来巩固政权的老路，我们看到了几乎将我们带入2012年革命的可怕趋势。然而，阿列克谢似乎并没有打算停止脚步，很可能在几年后，我们将见证已故弗拉基米尔·弗拉基米罗维奇政权的复活……所有关心俄罗斯命运的人，请在为时未晚之前走上街头，抗议新的暴君……\"\n\n\n不幸的是，米哈伊尔的呼吁并未在公众中引起强烈反响。规模最大的一场示威活动仅在德米特罗夫举行，参加人数也不过40人左右。"
 russia.639.a: "谢天谢地！"
 russia.640.t: "清洗\"未来俄罗斯\"！"
 russia.640.d: "经过深入的内部调查，俄罗斯联邦安全局与反腐败基金会揭示了阿列克谢·纳瓦利内已离职的前团队成员的惊人内幕：\n\n列昂尼德·沃尔科夫、玛丽亚·辛格施赫、伊万·日丹诺夫、马克西姆·米罗诺夫、罗曼·鲁巴诺夫等多人，勾结前寡头亚历山大·热列兹尼亚克等人，与壳牌、雪佛龙、英国石油等多家跨国公司合作，从事大规模洗钱活动，并非法向他们低价供应天然气和石油。\n\n目前，涉案人员已被捕，并将在近期接受法庭审判，他们通过洗钱手段获得的全部资金将被追回并归还俄罗斯国库。\n\n与此同时，彼得·洛谢夫、叶卡捷琳娜·舒尔曼、马克西姆·卡茨和尤利娅·拉特尼娜将填补由此产生的政府职位空缺。"
 russia.640.a: "反啥子的基金会？"
 russia.641.t: "白俄罗斯抗议"
 russia.641.d: "在明斯克、莫吉廖夫及众多白俄罗斯城市，局势已迎来了沸点。民众纷纷走上街头，指责瑙姆奇克政府削弱季哈诺夫斯卡娅总统的权力，并企图建立亲西方的独裁统治，认为这是\"远超卢卡申科政权的恶劣\"。众多支持总统的议员和州长纷纷加入抗议队伍，呼吁解散政府并推动宪法改革，强化总统权力并打破拉达中的二元权力结构。尽管俄罗斯政府未对此友好邻国的局势公开发表评论，但圣彼得堡州长罗曼·布拉托夫与总统纳瓦利内均通过个人社交媒体账号亲自声援抗议者。"
 russia.641.a: "令人不安"
 russia.642.t: "明斯克出现俄罗斯坦克"
 russia.642.d: "连日来，白俄罗斯暴力抗议与反抗议活动不断升级，在此背景下，白蓝红三色旗在明斯克及白俄罗斯东部地区的亮相更是引起了巨大轰动。俄罗斯外交部和总统对此保持沉默，然而，俄罗斯军队在白俄罗斯的出现已在莫吉廖夫和戈梅利等地激起了支持加入俄罗斯的抗议浪潮。"
 russia.642.a: "那正是它们的归属之地！"
 russia.643.t: "纳瓦利内总统向白俄罗斯人民发表讲话"
 russia.643.d: "经过短暂的无线电静默，俄罗斯联邦总统针对白俄罗斯的抗议活动发表了声明，他表示：\"亲爱的白俄罗斯人民，俄罗斯和我本人都非常清楚，你们的自由和宪法正遭受践踏。在此艰难时刻，我们绝不会让你们孤立无援。我们全力支持你们要求总理下台和制定新民主宪法的诉求。白俄罗斯人民，俄罗斯人民与你们并肩作战，共同迈向胜利。\"\n\n面对俄罗斯的举动，欧盟各国纷纷指责其是在推行新帝国主义，试图在邻国扶植傀儡政府。但除了表达深切关注外，并未采取进一步行动。"
 russia.643.a: "局势会回归正常吗?"
 russia.644.t: "季哈诺夫斯基就任总统！"
 russia.644.d: "在白俄罗斯拉达的推动下，明斯克方面就宪法改革及总理瑙姆奇克的离职进行了协商。各方达成共识，瑙姆奇克在承诺不受事后审判的前提下光荣退休，而新宪法草案也顺利获得批准。\n\n然而，斯维特拉娜·季哈诺夫斯卡娅婉拒了总统职位，转而全力支持其丈夫谢尔盖·季哈诺夫斯基。谢尔盖在首次公开发言中郑重承诺，将致力于在国内建立真正的民主制度，并深化与俄罗斯的友好关系。"
 russia.644.a: "荣耀归于季哈诺夫斯基！"
 russia.645.t: "白俄罗斯革命"
 russia.645.d: "因宪法危机及对白俄罗斯拉达和谢尔盖·瑙姆奇克总理的广泛抗议，白俄罗斯政府再次发生更迭。西方媒体将此形容为亲俄政变，俄罗斯媒体则称其为正义的自由革命。\n\n在与明斯克进行谈判的同时，莫吉廖夫和戈梅利也举办了加入俄罗斯的公投。尽管优势并不显著，但两地民众仍投票支持加入俄罗斯。"
 russia.645.a: "革命？又来？"
 russia.646.t: "针对\"未来俄罗斯\"党员的大规模暗杀行动"
 russia.646.d: "来自莫斯科、圣彼得堡、叶卡捷琳堡和其他15个俄罗斯城市都传来恐怖消息——执政党未来俄罗斯的至少100名党员在前一天晚上都遭到暗杀，其中20人死亡。死者包括圣彼得堡、卡累利阿、莫斯科和斯维尔德洛夫斯克地区的地区官员和杜马成员。总理列昂尼德·沃尔科夫被人用锤子打成重伤，随后被送往医院，目前正在医生的密切监护下。其他高级官员也报告了暗杀企图：叶夫根尼·罗伊兹曼、伊万·日丹诺夫、玛丽亚·佩夫奇赫，甚至还针对总统阿列克谢·纳瓦利内本人。纳瓦利内总统在上午向全国发表讲话时宣布，反腐败基金会和联邦反情报局部门已经在努力追查袭击者和幕后黑手，并宣誓所有参与者都将得到应有的惩罚，正义将会得到伸张。他在讲话结束时宣布全国进入哀悼期。"
 russia.646.a: "俄罗斯版的\"长刀之夜？\""
 russia.647.t: "列昂尼德·涅夫兹林被逮捕"
 russia.647.d: "莫斯科时间今日上午9时45分，俄罗斯联邦安全局特种部队突袭了商人列昂尼德·涅夫兹林和前财政部长米哈伊尔·霍多尔科夫斯基的住所，但在与官员短暂交谈后，霍多尔科夫斯基被释放。而涅夫兹林试图逃跑，但他还是被拘留并被带到最高法院大楼。与此同时，反腐败基金会发布了一项新的为期三小时调查，揭露了这起针对总统的大规模谋杀未遂事件的幕后黑手身份。尽管涅夫兹林积极为自己辩护，怀疑法官和检察官“贪赃枉法”“同纳瓦利内狼狈为奸”，但由于证据确凿，法庭的审理时间很短。初步判决：被告犯叛国罪和谋杀罪，判处无期徒刑。庭审结束后，被告被带往审前拘留中心，等待下一次也是最后一次的审判。"
 russia.647.a: "他该呆在精神病院里！"
 russia.648.t: "卡茨的调查"
 russia.648.d: "俄罗斯自由派政治圈上一波风潮尚未平息，新的风波又起。身为俄罗斯第二大最富影响力政党的领导人马克西姆·卡茨发布了一项调查，指控国际反腐败基金会的领导人与腐败银行家——前商业银行所有者亚历山大·热列兹尼亚克及谢尔盖·莱昂季耶夫暗中合作，通过列支敦士登洗钱。卡茨声称，在纳瓦利内服刑期间，沃尔科夫、日丹诺夫和佩夫奇赫从热列兹尼亚克手中盗窃走了俄罗斯人民的财产，将他安插到组织中，甚至让其担任财务主管。\n\n\n\"你都能为这个下三滥的骗子洗地，这得是多不要脸的一个人啊，还公开表现得自己好像是全俄罗斯人民的道德标杆！更别所还是借着阿列克谢·纳瓦利内的名声干这些勾当！\"卡茨断言道。未来俄罗斯和反腐败基金会的领导人目前还没有做出具体回应，但决定权掌握在总统手中……"
 russia.648.a: "该清理这帮蛇鼠一窝的东西了。"
 russia.648.b: "你永远不能相信\"小丑\"卡茨……你永远信不得他。"
 russia.649.t: "乌克兰宣布保护库班"
 russia.649.d: "随着俄罗斯逐步重建，迅速收复高加索地区，并再度不受西方管控，我们长期以来的敌人也肯定注意到这一现象了。\n\n乌克兰这个已经落入北约和欧盟魔爪的国家公开宣称，库班共和国现在处于他们的保护之下。这个背弃我们仁爱，非法脱离出去的共和国，已经匍匐跪倒在敌人面前，卑微乞求他们的怜悯。\n\n当然，从长远来看，这无关紧要，统一是不可谈判的，也是不可避免的，如今不过是不再存在和平之路罢了。\n\n俄罗斯是不完整的。也因此，她必将再次完整。\n\n他们害怕我们，这是理所当然的。懦弱地向敌人低头是只有懦夫才会干出的苟且之事。"
 russia.649.a: "他们会知道另一个选项是什么的……"
 russia.650.t: "大赦"
 russia.650.d: "纳瓦利内总统作为一名前政治犯，上任后第一个政令即是释放所有政治犯，不论他们持有何种政治观点以及宗教信仰。媒体当然聚焦于释放像是弗拉基米尔·卡拉-穆尔扎、伊利亚·亚申以及叶夫根尼娅·别尔科维奇的自由派领袖，但在同一天，更多激进的异见者也被释放。阿列克谢·纳瓦利内树立新原则：因言论不符合当下现状而被送入监狱的所有人都会被赦免。"
 russia.650.a: "春风已至俄罗斯"
 russia.651.t: "纳瓦利内与斯特列科夫的二次辩论"
 russia.651.d: "十多年前，阿列克谢·纳瓦利内与伊戈尔·\"斯特列科夫\"·吉尔金曾有过一场激烈的辩论；如今，身为总统的阿列克谢仍难以回绝与对手再次交锋。然而，此番辩论的背景已大相径庭，欧洲正陷入一场规模空前的复仇之战，两位立场迥异的智者思维碰撞、火花四溅。这与其说是辩论，不如说是双方相互挑衅的言辞交锋。\n\n辩论结束时，双方握手言和，总统向吉尔金许下承诺，将在国防部为其谋得一席之地……"
 russia.651.a: "到此为止"
 russia.652.t: "俄罗斯经济奇迹"
 russia.652.d: "与西方分析人士及部分俄罗斯悲观派政治家的预测相反，俄罗斯经济在战后非但没有衰败，反而迎来了前所未有的繁荣。\n\n诚然，受欧洲局势影响，卢布未能成为世界市场上的强势货币，投资者仍对俄罗斯资产持谨慎态度。然而，得益于众多企业家对俄罗斯市场的迅速拓展，卢布汇率不仅保持稳定，还维持在较高水平。这既可能是阿列克谢·纳瓦利内自2010年代初倡导的道德资本主义的成效，也可能是财政部和中央银行高效人事调整的成果。无论如何，俄罗斯目前正处于其历史上的最佳时期之一。"
 russia.652.a: "是！未来！"
 russia.653.t: "首届欧亚经济共同体峰会在瓦尔纳举行"
 russia.653.d: "欧亚经济共同体首届峰会今天在保加利亚瓦尔纳举行，该组织面向南北分歧，是旨在替代北营欧盟的新组织。它们的活动口号是\"欧洲人民和平，打倒西方帝国主义，人民力量万岁\"。据保加利亚旅游部估计，参加峰会的人数在10万至30万人之间。\n\n峰会原定于瓦尔纳文化体育宫举行，但活动规模实在太大，此次峰会已覆盖该市约三分之一的面积。俄罗斯和保加利亚总统宣布，明年会在保加利亚首都索菲亚，为峰会准备一个更大的场地。"
 russia.653.a: "为自由干杯！"
 russia.654.t: "波罗的条约组织"
 russia.654.d: "俄罗斯战败不到一年后，俄罗斯总统签署了《关于俄罗斯势力范围》的条约（又称《波罗的条约》）。消息传开，北约秘书长谴责俄罗斯的行为，威胁要切断任何俄欧联系，重新实施制裁。\n\n俄罗斯总统办公室回应，该条约是防御性的，并非对北约的敌视……"
 russia.654.a: "……但我们能相信他们吗？"
 russia.655.t: "激进青年运动"
 russia.655.d: "一个新兴且颇为激进的支持国家运动——\"自由青年\"——在莫斯科和圣彼得堡悄然兴起。该运动的组织者自豪地将其描述为\"既民主又爱国\"。他们在列宁格勒州和莫斯科州成功举办了多场集会，重点聚焦于为保卫国家做准备、学习武器使用技巧以及提振年轻男女的士气。\n\n然而，纳瓦利内的批评者却对\"自由青年\"运动持批评态度，认为它不过是臭名昭著的\"纳什\"和\"青年军国民运动\"的翻版，只是融入了\"自由主义要素\"。但支持者却认为，爱国主义教育并无不妥之处，尤其是当这些活动都是自愿参加的，且都在户外进行，符合环保规范。\n\n保守派少数群体，尤其是列宁格勒州州长格里戈里·L.，也对这类活动表达了反对意见，并威胁称一旦有机会就会切断他们前往旅游基地的道路，以阻止他们进行所谓的\"对青年的新自由主义灌输\"。"
 russia.655.a: "只是儿戏……"
 russia.700.t: "格鲁季宁政变"
 russia.700.d: "北约战争的惨败，使得俄罗斯联邦共产党内部的权力角逐再度燃起熊熊烈焰。在这片风雨飘摇的土地上，各派势力纷纷撕下伪装，毫不留情地展开较量。论战与清算成为基本手段，而无人机刺杀等更为精密的政治谋杀，也逐渐登上舞台。\n\n然而，风暴过后，帕维尔·格鲁季宁依旧屹立。他凭借深厚的政商人脉与手腕，在这片摇摇欲坠的大地上觅得一方立足之所，甚至成功赢得了多数民众的支持。如今，这位新任总统承诺经济自由化，愿与反对派展开对话。坊间更是流传，他有意与纳瓦利内携手合作。\n\n此言是否为真，答案即将揭晓。而此刻，饱经风霜的俄罗斯人民仍怀揣希望，期待格鲁季宁的掌权，能为这个裂痕遍布的国家带来一丝久违的安稳。"
 russia.700.a: "人民的候选人！"
 russia.701.t: "暴力反苏抗议！"
 russia.701.d: "在经历近期的战事惨败后，政府公信力一直处于极低水平，现在，这股积攒着的不满终于爆发了。以前零星发生的破坏和示威在过去几天里逐渐愈演愈烈，联盟主要城市的骚乱报告也纷至沓来。骚乱的支持者遍布所有政治派系，其中包括一些已知的阿列克谢·纳瓦利内的支持者和前自由民主党成员。尽管他们的政治观点大相径庭，但诉求却出奇一致：他们希望就现执政党是否应继续掌权举行全民公决，而我们几乎肯定会输掉这场公决。\n\n已有三十人重伤或不幸身亡。一些地方警察局和国民警卫队哨所遭到袭击，人们担心骚乱者可能趁机夺取武器。如果局势继续持续，暴力活动极有可能加剧。\n\n人民对苏联复兴的信心正在迅速消失。我们必须迅速采取行动，否则将失去一切。"
 russia.701.a: "该死。"
 russia.702.t: "克瓦奇科夫发动政变"
 russia.702.d: "北约战争的失败对苏维埃政权造成了毁灭性打击。老兵们不满政府对战争和国内事务的处理方式，并开始公开表示自己的不满。弗拉基米尔·克瓦奇科夫已为自己挣得了坚定爱国者的名声，并凭此采取了坚定的手段。他说服了最高军事首脑：正是当今苏维埃俄国的领袖们给祖国带来了灾难。而他提出了一条全新的道路。\n\n克瓦奇科夫的部队于[GetDateText]向莫斯科进军。沿途并未受到明显抵抗：许多部队也已厌烦了政府的不作为因此幻想破灭，转投叛军。克瓦奇科夫本人向官兵发言，敦促他们从软弱的政客中拯救祖国，并让苏维埃帝国再次伟大。"
 russia.702.a: "我们将取得胜利！"
 russia.703.t: "保守革命失败"
 russia.703.d: "今日，军队于危难中挽救了联盟的命运。清晨时分，莫斯科及其周边的数支国民警卫队与警察部队突然切断了通讯，并开始向克里姆林宫靠近，这一幕在圣彼得堡、喀山、顿河畔罗斯托夫等多座大城市中也在上演。但凭借南部忠诚军队与赤卫队的机敏应对，他们得以伏击这些叛乱者并成功挫败其阴谋。若未及时阻止，这些叛军很可能会成功占领当时正在召开早期会议的最高苏维埃。\n\n随着莫斯科的政变部队被击溃，策划者们迅速逃散，许多人已被捕并将很快面对行刑队的审判。\n\n在审讯过程中，数名军官坦白，他们效忠于前俄罗斯自由民主党以及其他民族主义组织。虽然政变已被镇压，但克格勃的声誉恐将一落千丈，公众将质疑策划者如何获悉此次会议的机密，更不用说如何让他们的阴谋得以实施。"
 russia.703.a: "对人民之敌绝不心慈手软！"
 russia.704.t: "寡头政变失败"
 russia.704.d: "今天，联盟经历了一场生死攸关的危机，效忠于几位失势寡头的雇佣兵和叛乱分子差一点就占领了莫斯科。深夜时分，有人看到一些蒙面男子从市郊的几座建筑物中现身，随后与来自军队、国家近卫军和警察部队的士兵会合，并迅速向克里姆林宫推进。枪声一直持续到凌晨，莫斯科上空还发生了一场短暂的空战，而正是空战的结果决定了联盟的命运。忠诚的空军部队阻止了一支不听指挥的直升机分队进入市区，后者很有可能会选择轰炸克里姆林宫，将整个最高苏维埃置于险境之中。所幸防线最终得以坚守，政变分子被打得落花流水，大部分成员遭到逮捕。\n\n几名被捕的雇佣兵透露了他们隶属于几位寡头的私军，而这些寡头的产业正面临被夺走的危险。针对所有涉案人员都已发出了逮捕令，并预计将由军事法庭进行审判。然而，这对人民来说并没有多少安慰，他们很可能会质疑，在这个国家中最显赫的一群人策划这场阴谋时，克格勃到底在哪儿。"
 russia.704.a: "对人民之敌绝不心慈手软！"
 russia.705.t: "\"瓦格纳集团\"雇佣兵的命运"
 russia.705.d: "瓦格纳集团自成立以来，一直是克里姆林宫的\"长臂\"，在官方不便直接介入时，承担了大量军事行动。该组织由德米特里·乌特金发起，并由\"普京的大厨\"叶夫根尼·普里戈任掌控，其足迹遍布全球多个冲突地区。2014年，他们首次在顿巴斯亮相，随后在叙利亚、中非共和国、利比亚等地留下了深刻印记。最近，瓦格纳的踪迹甚至出现在沙特阿拉伯，为王储作战，以及刚果，支持金沙萨政府。只要有利益驱使，便有这支\"乐团\"的身影。\n\n然而，随着俄罗斯政府的更迭，瓦格纳的未来问题被正式提上议程。一种观点认为，拥有战斗经验、且受寡头资助的\"非忠诚\"武装团体，既不现实，也极具风险。因此，他们建议解散瓦格纳，将最忠诚的成员编入正规军，以提升现代战争经验。\n\n另一方面，也有声音认为，瓦格纳的存在仍具价值，根本无需彻底解散，只需进行外部调整和人员更替即可。考虑到\"红色联合国\"概念的提出，以及该组织未来可能充当和平维和部队的潜力，这一决策或许能在援助友好政权方面发挥重要作用。"
 russia.705.a: "解散该组织，让最忠诚的人去参军。"
 russia.705.b: "将他们重新组建为专业的国际纵队。"
 russia.706.t: "情况变得更糟"
 russia.706.d: "毫不意外，在我们失败后，局势持续恶化。过去五年间我们辛苦建立的一切被彻底摧毁，土地被肆意瓜分。领导层无法有效应对这一局面，导致大量民众对我们的政权彻底失去了信心。\n\n如今，数以百万计的同胞在网上和公众场合中公开抗议。过去，不满于共产主义复兴的只是一小部分沉默的少数派。他们之所以保持沉默，要么是因为恐惧，要么是不愿站在北约一边反对自己的红色同胞。但现在，他们已不再受到任何力量的阻止。\n\n如果没有人采取果断行动来挽救局势，俄罗斯恐怕将面临崩溃。左右两翼的抗议浪潮正在同时兴起，要控制这两个群体变得越来越不可能。当前的不确定性如阴云笼罩，然而，需要有人挺身而出，接管局势。"
 russia.706.a: "该死。"
 russia.707.t: "克瓦奇科夫获得民众支持"
 russia.707.d: "共产主义者上台后，因激进观点和参与对阿纳托利·丘拜斯暗杀未遂而闻名的弗拉基米尔·克瓦奇科夫做出了令人意外的举动——他加入了共产党。然而，与他过去的大胆行动不同，克瓦奇科夫这次选择不引人注目，默默留在幕后，静观事态发展。他等待着，观察新的政治局势，并逐步适应新的环境。\n\n这一切在对乌克兰的\"特别军事行动\"开始时发生了转变。这个局势成为了克瓦奇科夫的催化剂，他敏锐地捕捉到时机，开始积极宣传自己的思想。他在亲苏民族主义者中的人气迅速攀升。克瓦奇科夫凭借自己坚定且毫不妥协的爱国者形象，利用党内的地位，团结起复仇主义和民族主义势力，向他们灌输：唯有果断行动才能让俄罗斯重现昔日的辉煌。"
 russia.707.a: "毋须担忧"
 russia.708.t: "整合议题"
 russia.708.d: "随着主权国家联盟正式统一，各种挑战接踵而至，而当前最为棘手的问题之一，便是行政体系的整合。一方面，我们可以允许各地民众自由选举所在共和国的领导人，以此凸显国家名称所承载的\"主权\"原则，展现对地方自治权的尊重。\n另一方面，既然我们已经踏上了社会主义道路，那么扶持忠诚的社会主义者、巩固国家的集体主义原则，是否才是更为理想的选择？无论如何，[SOV.GetLeader]总统将会作出最终决定。"
 russia.708.a: "主权国家的未来由集体做主！"
 russia.708.b: "主权国家的未来由自己做主！"
 russia.709.t: "新斯大林旋转烤肉"
 russia.709.d: "马列主义影响了俄罗斯的诸多事物，但很少有人能想到曾经轰动一时的斯大林旋转烤肉竟然复活了，还在商业层面彻底成功。斯大林旋转烤肉的质量让食客惊讶不已，但最重要的是，餐厅的菜单也比原来更丰富，菜名也非常有特色。以下是他们的一些菜名：斯大林斯卡娅双层肉、马林科夫酱配法式薯条、赤卫队风味羊肉馅饼、赫鲁晓夫斯卡娅奶酪皮塔面包、盘装勃列日涅夫斯卡娅等等。\n\n斯大林旋转烤肉已同俄罗斯的连锁餐厅开始竞争，比如美味的哆哆披萨。同时作为一家公关公司，斯大林旋转烤肉还投资了卡拉什尼科夫集团工厂的扩建。俄罗斯因左转变了很多，而且会变得更好！"
 russia.709.a: "不可思议"
 russia.710.t: "马里军政府准备与我们扩大合作"
 russia.710.d: "西非国家马里的政府近期遭到推翻，取而代之的是一个军政府。为了巩固其权力和合法性，这个政权一直在寻找外国合作伙伴，而现在他们正转向我们请求支持。\n\n我们应该支持这个新政权，这一点显而易见。然而，关于我们能向我们的马里新朋友承诺多少支持仍存争议。我们是否应该仅签署一些经济协议，还是在此基础上承诺派遣海外驻军？"
 russia.710.a: "开启非洲军团在马里任务并与之签署贸易协议。"
 russia.710.b: "与马里签署贸易协议"
 russia.711.t: "马里爆发反法国政变"
 russia.711.d: "马里部分军方人员发动了反政府政变。新军政府在迅速夺取政权后宣布，计划退出法国势力范围，寻求经济和政治独立。\n\n我们必须迅速采取行动，利用这一局势，让该地区新的反帝国主义力量与俄罗斯结盟。"
 russia.711.a: "非洲在咆哮。"
 russia.712.t: "易卜拉欣·特拉奥雷向我们寻求更紧密的联系"
 russia.712.d: "又一个萨赫勒组织国家倒在了军事政变的铁蹄之下，这次是被称为\"正人君子之国\"的布基纳法索成为了西非多米诺骨牌中的下一个。回顾上世纪80年代，那时我国与在托马斯·桑卡拉革命政府领导的布基纳法索享有紧密关系，直到这一切在一场由法国支持的政变中戛然而止。如今，随着该国新领导层的上台，一个建立新的俄布关系的机会展现在我们面前。那么，我们应当对这个新政府给予多大支持呢？"
 russia.712.a: "开启非洲军团在布基纳法索任务并与之签署贸易协议。"
 russia.712.b: "与布基纳法索签署贸易协议"
 russia.713.t: "新尼日尔政府寻求我方援助"
 russia.713.d: "西非再一次陷入政权更迭的风暴，尼日尔的人民在新的国家军政府统治下迎来黎明。正如马里和布基纳法索的例子一样，尼日尔的新政府也向我们寻求支持，而我们将毫不犹豫地再次伸出援手。"
 russia.713.a: "开启非洲军团在尼日尔任务并与之签署贸易协议。"
 russia.713.b: "与尼日尔签署贸易协议"
 russia.714.t: "几内亚新机遇"
 russia.714.d: "席卷西非萨赫勒地区的政变狂潮已然波及大西洋彼岸，几内亚共和国也未能幸免，倒在了军事叛乱的风暴中。然而，与该地区其他新生的军政府不同，几内亚为我们带来了一个难得的契机——它拥有通向温水港口的通道。\n\n在这个权力迅速洗牌的时代，像几内亚这样一个战略盟友的价值无法估量。我们必须抓住时机，迅速与几内亚的领导层建立起牢固的友好关系。"
 russia.714.a: "开启非洲军团在几内亚任务并与之签署贸易协议。"
 russia.714.b: "与几内亚签署贸易协议"
 russia.715.t: "土库曼斯坦同意了！"
 russia.715.d: "土库曼斯坦已正式同意加入集体安全条约组织。与多个西方国家签订的天然气销售合同现已被终止，新的计划正在制定中，旨在将该国的丰富天然气储备接入俄罗斯的能源网络。尽管几个西方国际对此表示抗议，但实际上，他们眼下对此毫无办法。"
 russia.715.a: "很好！"
 russia.716.t: "土库曼斯坦违抗我们！"
 russia.716.d: "土库曼斯坦毅然拒绝加入集体安全条约组织！他们声称，与西方断绝联系将会对国家造成无法弥补的损害，因此拒绝了我们的要求。目前，我们准备加固哈萨克斯坦边境，同时可能发起特别军事行动，以保障我们在这一地区的战略利益。"
 russia.716.a: "那就这样吧！"
 russia.717.t: "乌兹别克斯坦同意了！"
 russia.717.d: "乌兹别克斯坦已同意加入集体安全条约组织。该国的棉花出口已暂停，我们两国政府的一些部门已表示有兴趣将两国电网连接。预计一些西方企业会对这些事态发展感到愤怒，但它们的母国不会对此做出什么回应。"
 russia.717.a: "非常好！"
 russia.718.t: "乌兹别克斯坦断绝了外交关系！"
 russia.718.d: "乌兹别克斯坦公然拒绝加入集体安全条约组织！他们以俄罗斯的所谓人权问题为借口，断然拒绝了我们的要求。如今，哈萨克斯坦的边境已进入军事化状态，随时可能展开特别军事行动，以确保我们国家的核心利益不受威胁。"
 russia.718.a: "准备武器！"
 russia.719.t: "哥伦比亚政府与民族解放军签署和平条约！"
 russia.719.d: "占位符"
 russia.719.a: "大家都干得漂亮！"
 russia.720.t: "摘录自《塔纳提卡学：与死亡本身的抗争》"
 russia.720.d: "\"人类的历史，目睹了无数场席卷世间的浩劫。这些灾难一次次无情地昭示着人类成就的渺小，仿佛一种无法战胜的邪恶力量正宣告着它的最终胜利。那些偶然爆发却足以将城镇从地图上抹去的瘟疫，便是这不祥力量的化身之一。\n\n无论人类多么智慧、多么崇高，当灾难降临时，他们总是在痛苦挣扎后得出一个残酷的结论：抗争无用，最好的选择是接受命运的摆布，硬着头皮承受眼前的失去与痛楚……\"\n\n\"……但在塔纳提卡，我们为生命而战。我们争取的是生存的权利，是不让死亡轻易否决人类命运的可能性。\""
 russia.720.a: "有趣的读物……"
 russia.721.t: "关于新乌斯曼地区过去疫情的报告"
 russia.721.d1: "\n\n\n                  £GFX_MOR_event_texticon    \n\n\n\n\n尊敬的阿列克谢·阿纳托利耶维奇：\n得益于当地政府和卫生部门的迅速反应，我们成功对新乌斯曼村实施了严格的隔离措施，遏制了疫情的扩散。经过有效的防控，所有感染者（共39例）均已被隔离并接受了全面检查。针对该疾病，我们将其命名为\"地疫症\"，其主要症状如下：\n发热；\n皮肤干燥；\n呼吸急促；\n虚弱（部分病例）；\n抽搐（部分病例）；\n出汗（部分病例）。\n\n本次疫情的特点是病情进展迅速：在早期阶段，地疫症症状表现不明显，患者在最初阶段可能未能意识到自身感染。然而，随着病情的迅速发展，症状逐渐加重，包括皮肤干裂发炎、剧烈咳嗽以及剧痛难忍等典型表现。患者通常在出现首发症状后八小时内因心脏骤停而死亡，但若能及时使用药物，可将存活时间延长至约24小时。\n\n更为值得注意的是，我们尚未能明确该疾病的感染源。所有感染者均表示，病情似乎毫无预兆地突然发作，无法追溯到任何明显的感染路径。尽管我们已经采取了最大努力，但所有患者仍未能幸免。这引发了我们对于未来应对类似新型疾病的能力的反思：如果我们没有足够的准备，下一次是否依然能够如此幸运？\n\n我们将继续密切关注疫情的发展，并及时向您报告最新情况。\n丹尼尔·B·丹科夫斯基"
 russia.721.d2: "\n\n\n                  £GFX_MOR2_event_texticon    \n\n\n\n\n尊敬的亚历山大·格里耶维奇，\n得益于地方当局与卫生部门的迅速行动，我们已成功隔离新乌斯曼村，并实施严格的检疫措施，遏制了疫情的扩散。根据最新统计，共有33名感染者被隔离并接受检查。该疾病被我们命名为\"地疫症\"，其主要症状包括：\n发热\n皮肤干燥\n呼吸急促\n乏力（部分病例中出现）\n抽搐（部分病例中出现）\n出汗（部分病例中出现）\n\n该病情进展极为迅速：在早期阶段，地疫症状极其隐匿，患者可能全然不知自己已感染。然而，随着病情加重，症状逐渐明显：患者皮肤开始干燥、发炎，出现咳嗽，并伴随剧烈的身体疼痛。若不加以治疗，患者通常在症状初现后的8小时内因心脏衰竭而死亡。药物干预可将病患存活时间延长至24小时左右。\n\n最为异常的是，我们尚无法确定地疫的发病原因。所有感染者均表示，病情似乎是毫无征兆地突发。尽管我们采取了一切可能的措施，但仍无法遏止患者的死亡，无一治愈。这迫使我们不得不反思，若未来再次爆发类似疾病，我们是否具备足够的应对能力？或许，这次我们只是侥幸逃过了更严重的危机……\n\n我将继续就事态发展向您通报最新情况。\n阿尔捷米·伊利亚奇·布拉赫"
 russia.721.a: "多么不同寻常的疾病……"
 russia.722.t: "\"爱国者\" - 战力强化血清"
 russia.722.d: "托木斯克军事化学家们在军用补给技术上取得了重大进展，成功研发出了\"爱国者-20\"血清。这种血清能显著提升士兵的战斗力和体能，单次注射后效果可持续至少6小时。\n该血清已在远东的秘密军事演习中进行了测试，且效果显著。士兵们在使用后表示，他们无所畏惧，能够毫不犹豫地冲锋陷阵。\n然而，科学家们也警告说，重复使用这种血清可能会导致上瘾，并引发一系列症状，包括失去意识、失眠、偶尔头痛，甚至长期可能导致轻度精神分裂症。因此，他们建议在每次使用爱国者血清后，待其效果消失时，给士兵服用一剂地西泮以缓解潜在问题。\n\n面对日益危险的世界和地缘政治的挑战，创新变得至关重要。我们的敌人冷酷无情，而这些经过血清强化的\"完美士兵\"将成为他们的克星；即使这是以我军英勇战士的理智和人性为代价，我们也在所不惜。"
 russia.722.a: "这太没人性了！"
 russia.722.b: "一项卓越而必要的创新！"
 russia.723.t: "俄罗斯的弥赛亚"
 russia.723.d: "近日，在开发曾被称为\"毫无前景\"的雅库特金伯利岩管过程中，人们发现了一颗体积超乎寻常的钻石，并将其命名为\"俄罗斯的救世主\"，也有人提议将其命名为\"君主钻石\"或者\"统一俄罗斯\"。\n\n人们在莫斯科为\"俄罗斯的救世主\"举行了一场仪式，并将其移交至总统。钻石的后续命运不得而知，我们可以出售这颗钻石并偿还部分债务，或者我们可以将其捐赠给俄罗斯联邦钻石基金，从而提升国家的声望和游客流量，选择权在你手中。"
 russia.723.a: "卖了他，偿还债务"
 russia.723.b: "捐了它"
 russia.725.t: "塞内加尔寻求合作"
 russia.725.d: "佩雷拉已经向俄罗斯寻求经济和军事援助以对抗法国在该国的影响"
 russia.725.a: "开启非洲军团任务并签署贸易协议。"
 russia.725.b: "与塞内加尔签署贸易协议"
 russia.726.t: "塞内加尔维持亲法"
 russia.726.d: "尽管我们努力帮助佩雷拉赢得选举，但亲法势力在该国仍然普遍存在。"
 russia.726.a: "行吧……"
 russia.727.t: "塔利班合作"
 russia.727.d: ""
 russia.727.a: "昨日之敌，今日之友"
 russia.728.t: "人民阵线的未来"
 russia.728.d: "卢卡申科执政后，全俄人民阵线迅速投身其麾下以表忠诚。然而，这对亚历山大·格里戈里耶维奇而言，仍然不够。他深知，阵线领导层中的许多人可能随时改变立场，一旦有新领导人出现，他们或许会转而支持他人。\n\n新总统需要的，是无条件的忠诚。因此，他的第一步，便是将全俄人民阵线的要职交给对自己忠心耿耿之人，确保其政策能够在地方层面贯彻执行，并由这些新任领导直接承担政治责任。\n\n然而，还有一种更彻底的方案——彻底重塑阵线的架构与领导体系。卢卡申科认为，取代目前松散的组织，应当建立一个更具凝聚力的强大政党，以真正代表人民利益。在这一党派中，他将成为事实上的领导人，尽管名义上仍保持无党派身份。\n\n此举虽然成本较高，且可能引发总统府内部\"守旧派\"势力的不满，但从长期来看，它或许是巩固政权、强化支持的有效方式。"
 russia.728.a: "任用卢卡申科的政治亲信去填满全俄人民阵线执行委员会。"
 russia.728.b: "将阵线转变为统一的政党结构！"
 russia.729.t: "国际援助抵达！"
 russia.729.d: "占位符"
 russia.729.a: "感谢你们所有人，朋友们！"
 russia.730.t: "来自俄罗斯的最后通牒"
 russia.730.d: "注意！\n\n梅德韦杰夫最近宣布启动行动代号\"333\"，打击赫尔辛基的游戏开发者，在那里可用一个游戏的价钱买到两款精神分裂游戏。\n\n俄罗斯兄弟们，行动起来！"
 russia.730.a: "我想活下去！"
 russia.730.b: "我想死！"
 russia.731.t: "芬兰同意！"
 russia.731.d: ""
 russia.731.a: "太好了！为我们的新朋友干杯！"
 russia.732.t: "芬兰拒绝！"
 russia.732.d: ""
 russia.732.a: "那就这样吧。"
 russia.733.t: "来自俄罗斯的最后通牒！"
 russia.733.d: "注意！\n\n梅德韦杰夫最近宣布启动行动代号\"777\"，目标是进攻土耳其小吃店\"埃尔多安\"，在那里有买一送一的烤肉串\n\n俄罗斯兄弟们，行动起来！"
 russia.733.a: "冲冲冲冲冲冲！兄弟们上!"
 russia.733.b: "太他妈丢脸了，这样还咋有脸活着啊怂炮。"
 russia.734.t: "土耳其同意！"
 russia.734.d: ""
 russia.734.a: "乌拉，为我们的朋友埃尔多安干杯！"
 russia.735.t: "土耳其拒绝了我们的要求！"
 russia.735.d: ""
 russia.735.a: "他们会知道另一个选项是什么的……"
 russia.736.t: "杜马抵抗"
 russia.736.d: "俄罗斯政坛近日发生震动性事件：统一俄罗斯党内所谓\"改革派\"的部分议员宣布退党并恢复祖国联盟。一些专家将此事件归因于该党内部\"反动派集团\"在近期总统选举中的获胜，以及该集团内部企图\"驯服\"梅德韦杰夫改革所确立的政治体系之野心。\n许多人确信此举旨在阻止统一俄罗斯党像普京总统时期那样巩固其主导地位。有担忧认为，祖国联盟在获得人民党和新俄罗斯党支持后，将能够成功弹劾总统并代之以更倾向自由主义的政客。"
 russia.736.a: "该死！"
 russia.737.t: "沃罗比约夫的策略"
 russia.737.d: "联邦委员会今日公布总统弹劾案决议结果：维亚切斯拉夫·沃洛金因国家杜马指控其违宪及犯有叛国罪被解职。莫斯科州前州长、祖国党领导人安德烈·沃罗比约夫被任命为临时总统。\n与此同时，统一俄罗斯党与改革派展开谈判，期间祖国党显然占据上风，最终各方达成合并协议——祖国党以完整建制加入统一俄罗斯党。改革派与保守派之间的长期对峙以改革派获胜告终。"
 russia.737.a: "沃罗比约夫，你错了！"
 russia.738.t: "弹劾失败"
 russia.738.d: "联邦委员会今日就总统弹劾案作出决议：委员会投票否决弹劾动议，[SOV.GetLeader]得以保留国家元首职务。此前在保守派候选人胜选后脱离统一俄罗斯党的祖国联盟，其弹劾努力终告失败。\n统一俄罗斯党保守派在决定摧毁人民俄罗斯党和新俄罗斯党后，通过断绝反对派支持基础，巩固了其逐步恢复普京总统时期既有秩序的方针。改革派和保守派之间的长期对峙以保守派获胜告终。"
 russia.738.a: "大获全胜！"
 russia.739.t: "弹劾总统"
 russia.739.d: "联邦委员会今日公布总统弹劾案决议结果：[SOV.GetLeader]因国家杜马指控其违宪及犯有叛国罪被解职。安德烈·别洛乌索夫被任命为临时总统。\n与此同时，统一俄罗斯党与改革派展开谈判，期间祖国党显然占据上风，最终各方达成合并协议——祖国党以完整建制加入统一俄罗斯党。改革派与保守派之间的长期对峙以改革派获胜告终。"
 russia.739.a: "梅德韦杰夫的愿景犹存！"
 russia.740.t: "土耳其申请加入金砖国家联盟"
 russia.740.d: "欧盟、北约解体后，土耳其政府意识到自己非加入金砖国家联盟不可了。埃尔多安总统在演讲中表明，他一直更喜欢金砖国家联盟而非欧盟，但此前之所以没有加入，只是他害怕西方帝国主义。"
 russia.740.a: "终于！"
 russia.741.t: "\"马克发\"案"
 russia.741.d: "3月28日，媒体首次报道称，俄罗斯总检察长办公室对马克发及其旗下多家公司提起诉讼。关于具体人员地点，是副总检察长向车里雅宾斯克中央区法院提起诉讼。诉讼的具体内容尚未披露，马克发拒绝置评。案件的初步听证会定于4月9日举行。\n\n同时，被告名单也已在网站上公布：共计34个法人实体与13名个人，其中包括前国家杜马议员瓦季姆·别洛乌索夫和车里雅宾斯克前州长米哈伊尔·尤列维奇。作为马克发的受益人，两人均被指控在国家机关工作期间，多年来一直从事商业活动。\n\n据《生意人报》报道，多年来，这些前官员违反了反腐败法规定立的禁令和限制。根据案件材料，别洛乌索夫与尤列维奇均为公开其持有该公司。"
 russia.741.a: "这笔钱现在将用于改善俄罗斯联邦的状况。"
 russia.742.t: "俄罗斯联邦共产党批评经济政策"
 russia.742.d: "在华尔街崩塌及其连锁引发的经济危机之后，俄罗斯亦未能幸免其冲击。俄罗斯联邦共产党及其领袖根纳季·久加诺夫时常对我们的危机应对措施提出尖锐的批评。在最近的杜马演讲后，久加诺夫又在一次公开集会上慷慨陈词，主张将国家财富重新国有化，打破寡头统治的桎梏。他激愤地说道：\"……我们再次目睹了一个完全瘫痪的系统在运作……资本主义，不仅是俄罗斯，更是全人类的灾难之源。三十年间，我们始终在试图融入这个不公的系统……而今，我们收获的却是‘苦果’……九十年代的债务危机后，我们也曾历经相似的困境……那时，我们几乎是从深渊的边缘将国家拯救回来……统一俄罗斯党和中央银行所推行的掠夺性政策，压榨着劳动人民，这简直是莫大的耻辱……唯有社会主义，才是解决所有问题的钥匙。在苏联时期，我们曾独自建立起史上最为庞大的经济体，没有西方的援助，没有银行的贷款，完全是由人民自己的力量所驱动！\"\n\n随着这场危机波及越来越多的俄罗斯民众，久加诺夫的言辞比以往任何时候都更能触动人心，引发了广泛的共鸣。"
 russia.742.a: "政府只需要出台政策就好了，而反对派要干的事就多了。"
 russia.743.t: "日里诺夫斯基：\"我的预言成真了！\""
 russia.743.d: "经济危机日益严峻，而正如我们所担忧的那样，日里诺夫斯基对此有话要说。他站在杜马的讲台上，发表了一段慷慨激昂的演讲：\n\"……如今，华尔街经济的崩溃已经充分暴露了美国的困境……他们的核心资本家已经崩塌！是谁在这个重要的讲台上，最早预见并指出了这一点？是我们，俄罗斯自由民主党！然而，当时久加诺夫笑了，统一俄罗斯党的议员们也笑了……现在，看看是谁在笑呢？我曾说过，‘唐纳德，你的努力是徒劳的！你无法挽救你的国家！’我再次被证实是正确的，这将是美国的最后一次选举，之后他们将面临全面的崩溃……但我们不能因此迷失方向。我们仍要警惕北约的威胁，勿忘那些在顿巴斯杀害我们同胞的乌克兰班德拉分子！\n我原本希望接下来的几年能够平静度过，但我始终坚守说真话的原则。这就是我，七十多年来，我一直秉持着这一信念。然而，未来几年注定不会平静！这将是一个俄罗斯重新崛起的时代，届时，所有人都将聆听俄罗斯的声音！否则，他们就会迫使全体俄罗斯人沉默，且不仅在顿巴斯，甚至在整个西俄罗斯使我们面临种族灭绝的威胁！\"\n\n日里诺夫斯基的这次演讲在网络上迅速传播，引发了广泛的关注和讨论，人们再次将他誉为\"伟大的预言家\"。"
 russia.743.a: "弗拉基米尔·沃尔福维奇，一如既往地令人惊艳。"
 russia.744.t: "久加诺维亚娜 - 新列宁娜"
 russia.744.d: "在我们敬爱的主席根纳季·久加诺夫光荣退休之后，电影界便对描绘这位资深共产主义战士的生活与奋斗历程兴趣盎然。近期，电影《久加诺夫：乱世风云》作为首批面世的佳作之一，深情讲述了久加诺夫在苏联解体后那段动荡岁月中的青年历程。影片中，他英勇无畏地保护劳动人民，致力于重建共产党，使之成为对抗叶利钦时代压迫与掠夺的希望之光。该片一经上映，便荣获多项苏联电影大奖，并赢得了广大公众与党内官员的一致好评。\n\n许多人将这部电影视为关于主席生平的首部力作，更是一个崭新的起点。未来，正如列宁题材电影所开创的先河，苏联必将涌现出更多专属于根纳季·久加诺夫的电影类型，继续传承与弘扬他的伟大精神。"
 russia.744.a: "巧夺天工之作！"
 russia.745.t: "杜马重选举"
 russia.745.d: "俄罗斯国家杜马近日举行重新选举，其结果显示议会形成三党分庭抗礼格局：统一俄罗斯党、人民俄罗斯党和新俄罗斯党均分议席。\n随着达万科夫总统的推动，新俄罗斯党已从当初奇迹般赢得杜马细微的政治联盟，转变为不容小觑的第三势力，这将使另外两大政党更难阻挠自由主义改革倡议。主权自由之火炬将长明不熄，而新俄罗斯党正高擎此炬。"
 russia.745.a: "胜利！"
 russia.746.t: "政府占据杜马少数"
 russia.746.d: "新俄罗斯党是一个逆流而上的新兴政党。作为国家自由派的联盟，它的诞生违背了梅德韦杰夫的意愿——他曾梦想俄罗斯实现两党制。然而，新俄罗斯党却出乎所有人意料，击败了人民党和统一俄罗斯党，成功问鼎总统宝座。\n\n然而，正是这种迅速且意外的胜利，使得新俄罗斯党未能在杜马中站稳脚跟，只是成为了第三股力量。正因如此，达万科夫推动的所有改革随时可能被人民党和统一俄罗斯党联合推翻……\n\n这一问题必须得到解决。"
 russia.746.a: "我们得占据多数！"
 russia.747.t: "第二个党问题"
 russia.747.d: "鉴于我们正在构建的民主制度是基于理论上的君主立宪制原则，因此这种制度最稳定的模式将是两党制。\n\n然而，问题依旧存在：应该选择哪个政党作为十月党人的对手？"
 russia.747.a: "当今时代，温和左翼政治是必要的……"
 russia.747.c: "一个更现代化的保守主义总比十月主义者们的退步主义要好。"
 russia.748.t: "贵族们举办了一场盛大的晚会"
 russia.748.d: "近日，我国贵族们参加了一场盛大的晚会。他们在优雅的茶会上品尝了传统俄式糕点。豪华的舞厅中，美丽的女士与舞伴翩翩起舞，俄罗斯古典音乐的旋律在空气中回荡。\n\n这场盛会广泛登上了新闻，引发了人们对贵族生活方式的无限遐想。许多人为这些恢弘盛事在俄罗斯的回归感到欢欣鼓舞。"
 russia.748.a: "棒极了！"
 russia.749.t: "保皇派因沙皇齐聚"
 russia.749.d: "在我们的一座大城市里，忠诚的臣民们为沙皇及其家人的福祉和健康组织了一场声势浩大的集会。许多先前沙皇的旗帜和肖像随处可见。真是太棒了。"
 russia.749.a: "感谢您的忠诚。"
 russia.750.t: "俄罗斯事业之党"
 russia.750.d: "自君主制复辟以来，许多政治家一直在讨论俄罗斯党派政治的未来。一些人认为我们应该废除任何政党组织，而包括巴布林在内的另一部分人则认为在现代，一个包罗万象的政治组织是必要的。这将使俄罗斯公民能够在更根本的层面上与沙皇的代表互动，不会损害君主的权力和权威。"
 russia.750.a: "俄罗斯人需要一个沙皇党，倾听他们的声音，传达沙皇的旨意！"
 russia.750.b: "一切政治不过是西方颓废的细枝末节。沙皇将保护人民免受这些政客的侵害！"
 russia.751.t: "首次杜马选举"
 russia.751.d: "选举的号角已然吹响，人民即将用选票诉说他们的意志。三大政党在这场激烈的竞逐中争锋相对，争夺国家杜马的席位。\n\n十月十七日联盟，即十月党人，以1905年尼古拉二世签署的《十月十七日宣言》为名，继承了昔日十月党的政治理念。该党由康斯坦丁·扎图林领导，主张与帝国企业合作，推动俄罗斯文化发展，并加强社会凝聚力。\n\n\"主权与民主\"党，由安东·巴科夫领导的温和保守派政党。他们强调扩大对弱势群体的扶持，增加对企业的国家补贴，并深化与教会的合作。\n\n正义党，一个不受欢迎的左翼政党，由亚历山大·布尔科夫领导，主张加强对工人的支持、推进进一步民主化，并以\"和平接受俄罗斯历史\"为纲领。尽管我们不倾向于左翼政党，但也不能剥夺臣民的民主选择权。\n\n随着选战的持续展开，人民的选票终将决定结果……"
 russia.751.a: "十月十七日联盟获得杜马多数席位！"
 russia.751.c: "爱国党获得了人民的青睐，现在他们在杜马占据多数席位。"
 russia.751.h: "左逼竟然赢了我操。"
 russia.752.t: "同俄罗斯进行经济合作"
 russia.752.d: ""
 russia.752.a: "友好与合作"
 russia.753.t: "历史和解中心"
 russia.753.d: "在达万科夫宣布\"历史和解\"原则之后，叶卡捷琳堡竖立起一座尼古拉二世的纪念碑，正好位于列宁纪念碑的对面。为配合这一历史和解的理念，学校课程也随之调整，历史教材被重新编写。然而，这一原则的最高潮是\"历史和解中心\"的建成，达万科夫本人也亲自出席了开幕仪式。\n\n该中心本质上是一个俄罗斯历史博物馆，试图将截然不同的观点和时代融合为国家的统一历史进程。展览陈列了不同时期的历史阶段，努力从当时历史人物的视角出发，解释他们为何做出各自的决策，探讨他们所处的政治背景与时代因素。在展览的最后，所有的历史片段汇聚成一幅巨大的俄罗斯历史图景。"
 russia.753.a: "那我该信谁啊？"
 russia.754.t: "终结反动派"
 russia.754.d: "近日，政府内部掀起了一股辞职潮，许多来自\"反动派\"的统一俄罗斯阵营的官员与部长相继离任。自其候选人在弹劾案中失势以来，昔日不可一世的反动派逐渐土崩瓦解，零散分裂为一群依附克里姆林宫旧势力的派系，各自为营，难成大局。\n\n在这些残存势力之中，新强力派仍是最具影响力的一支。他们以图拉州前州长阿列克谢·久明为核心，这位曾被视为普京潜在继任者的人物，如今正号召追随者主张以强硬手段治理国家。\n\n然而，值得庆幸的是，这些反动势力早已分崩离析，零星散乱，难以组织起任何实质性的反对力量，更不足以阻挡我们改革的步伐。"
 russia.754.a: "自由安全了。"
 russia.755.t: "他的最后一封信"
 russia.755.d: "德米特里·阿纳托利耶维奇：\n\n你再一次被赋予了总统的重任。然而，这一次，很遗憾，你必须独自一人走上前去，肩负起所有的重担。\n\n你是我的门生，我最信任的挚友。我们的预见无误——世界正迈向一个全新的时代，地缘政治格局的剧变如暴风骤雨，既摧毁一切，又令人恐惧。每一天，我们都在目睹这些变化所释放的无穷后果。世界已沦为往日失败的荒原，但你必须挺身而出，勇敢地接过祖国的舵柄，无畏无惧。\n\n随信一并附上的，是一个小盒子，里面放着我那枚总统徽章——我拥有的第一枚。现在，它属于你了。曾经的你勇敢无畏，如今，请再度焕发出那份勇气。守护俄罗斯，不要让她陷入更深的动荡。你必须将目光投向那唯一的目标，并以无比坚决的意志，面对这即将崩解的单极世界。\n\n祝你好运，别了。\n\n署名："
 russia.755.a: "\"……弗拉基米尔·弗拉基米罗维奇·普京\""
 russia.756.t: "俄罗斯资源开采权终结"
 russia.756.d: ""
 russia.756.a: "酷"
 russia.757.t: "俄罗斯资源开采权"
 russia.757.d: ""
 russia.757.a: "酷"
 russia.758.t: "对俄经济门户开放！"
 russia.758.d: ""
 russia.758.a: "俄罗斯和中国是永远的兄弟。"
 russia.759.t: "邀请加入集安组织"
 russia.759.d: ""
 russia.759.a: "兄弟们为了权力给我冲！！！"
 russia.759.b: "兄弟……安静点……"
 russia.760.t: "塞尔维亚接受"
 russia.760.d: ""
 russia.760.a: "塞-俄兄弟情永续"
 russia.761.t: "塞尔维亚拒绝"
 russia.761.d: ""
 russia.761.a: "该死……"
 russia.762.t: "斯卢茨基宣布\"新民族思想\""
 russia.762.d: "在我们敬爱的领袖弗拉基米尔·日里诺夫斯基逝世数周后，他的继任者列昂尼德·斯卢茨基在俄罗斯参议院发表了讲话，阐述了修订国家政策并迈向\"现代思维\"的必要性。\n\n斯卢茨基表示：\"我并不是说我们敬爱的创始人的政府有什么不妥……那是一个伟大的政府，我们在他的领导下共同赢得了战争的胜利！但现在是时候认识到，尽管某些政策在弗拉基米尔·沃尔福维奇时代行之有效，但它们并不适用于继续他的遗产。我相信……如果他还在世，他一定会支持并鼓励这些努力。他亲自将这个职位托付给了我，所以我深知自己在说什么。\"\n\n斯卢茨基结束演讲后，参议院投票通过了他提出的一系列改革措施。然而，有人注意到，那些本应反对他改革议程的人缺席了今天的会议。他的支持者对此批评称，这些人只是一些\"懒惰的反对者\"，无意参与国家的改革进程。"
 russia.762.a: "就这样吧。"
 russia.763.t: "全俄大选"
 russia.763.d: "斯卢茨基的\"解冻期\"已经结束。在经历了数月的自由化改革后，选举拉开帷幕，许多新政党和候选人纷纷参选。然而，大多数人认为，真正有竞争力的候选人屈指可数。\n斯卢茨基本人表示，他无意竞选总统。取而代之的是，一位全新的候选人——安德烈·斯文佐夫被推选为竞选人。许多人认为，斯文佐夫很可能受到由斯卢茨基领导的俄罗斯自由民主党最高委员会的影响，因此，斯卢茨基仍可能在幕后操控局势，并有望被任命为总理。\n\n其他候选人中值得一提的是罗曼·尤涅曼，他来自\"社会.未来\"，是一位年轻且具有民主思想的候选人。他的竞选纲领是建立一个真正的俄罗斯议会制政体。\n\n另一位颇具影响力的候选人是德米特里·罗戈津。他是一位特立独行的政客，对苏联时期持积极态度。他的左翼经济观点与右翼社会立场相结合，代表\"祖国\"参选。该党长期以来一直是俄罗斯政坛上的小角色，但现在终于迎来了登上权力舞台的机会。"
 russia.763.a: "尤涅曼！"
 russia.763.b: "斯文佐夫！"
 russia.763.c: "吉尔金！"
 russia.763.f: "罗戈津！"
 russia.763.z: "普希林！"
 russia.763.k: "舍甫琴科？！"
 russia.764.t: "将死！"
 russia.764.d: "列昂尼德·斯卢茨基或许并不是最聪明的政客，但这更说明了他的对手们的无能——他们被他轻易地玩弄于股掌之间。那些试图通过质疑他对弗拉基米尔·日里诺夫斯基的忠诚与继承性、并声称他不是真正的接班人的人，恰恰暴露了他们对日里诺夫斯基政治理念的肤浅和片面的理解。他们显然没有料到斯卢茨基会展现出如此精妙的战略思维。\n\n如今，斯卢茨基正在领导一片由弗拉基米尔·沃尔福维奇缔造和振兴的全新俄罗斯。虽然一些变革是新的，一些策略是沿用过往的。但有一点非常明确：人民不会接受任何继任者施行铁腕统治，因为他们深知，日里诺夫斯基是无可替代的。因此，变革势在必行。\n\n当然，自由民主党仍将掌握权力，其规则与法律依然不可动摇。然而，现如今的自民党不再是一个专制政权，而是引导俄罗斯人民前行的力量。"
 russia.764.a: "我们生活在一个社会中。"
 russia.765.t: "祖国陷入危机！"
 russia.765.d: "西方红祸终于露出其狰狞面目，他们直接对我方及盟友发动入侵。邪恶势力妄图在全世界散播其意识形态。但这些新布尔什维克将会见识到我们的力量，我们必将胜利。\n\n我们将粉碎他们，让欧洲从共产主义的魔爪中解放。"
 russia.765.a: "为了祖国母亲！"
 russia.766.t: "在我的小镇……"
 russia.766.d: "我的城镇里发生了战争，\n没有人对此感到在意。\n当数百名平民和士兵死去之时，\n莫斯科的演员们却在饮酒作乐……\n\n我的城市里没有孩子们的欢笑，\n警报声每天都在响起，\n唱诵着那首地狱之歌，\n夺走新受害者的生命……\n\n我的小镇已经空了很久，\n没有希望，没有爱，什么都没有。\n只有那空中，\n孤独的防空警报声不断哀嚎……\n\n在我的城市里，悲伤和痛苦\n停留在哀悼的桂冠上。\n现在的一切都被推迟到以后，\n在血腥的伤口里成倍堆积……\n\n只有我的城市依然屹立如初，\n筋疲力尽，只是累了，\n但我们仍然相信它，\n我们仍在我们高呼……"
 russia.766.a: "\"胜利属于我们！\""
 russia.767.t: "亚洲新冲突"
 russia.767.d: "台海战争之后，亚洲局势再度升温。一场新的冲突可能席卷整个地区：日本与太平洋防卫条约组织结盟，对抗中国及其东亚防御倡议协定。这场战斗可能会改变世界力量的平衡。现在是我们做出选择的时候了。"
 russia.767.a: "帮中国！"
 russia.767.b: "保持中立吧"
 russia.767.c: "帮日本！"
 russia.768.t: "来自莫斯科的援助"
 russia.768.d: "苏联决定提供支持和援助！"
 russia.768.a: "哇哦！"
 russia.769.t: "新的旧社会主义"
 russia.769.d: "在莫斯科一家古老的咖啡馆里，坐着两位老朋友，他们是多年的老相识。其中一位名叫马克西姆·切列帕诺夫，一位最近刚失去自己企业大商人，根据新法律，他的企业几乎被无偿地卖给了国家。他重重地叹了口气，摇了摇头，转向他的同志安东·伊万诺夫，一位普通的工人，一生都致力于劳动，忠于列宁主义的旧理想：\n\n\"你知道，我花了10年时间白手起家建立了我的公司，我也不是寡头，我也没偷任何东西，我把我半辈子都投进去了，结果现在政府直接把它抢走了。只给我几个钱。他们怎么能这样做？我们为什么要这么着急？为什么要行动得这么快？社会主义不可能一蹴而就！国家根本没有准备好。我们需要循序渐进地做每一件事，而不是操之过急。\"他那支持新政府的朋友靠在椅子上，会心一笑。\n\n\"你没有被清洗，也没有被赶到大街上。你仍然是你自己公司的董事。这难道不好吗？是啊，你的公司只换来几个钱，但你的生活也没崩溃啊。而且国家需要更多，在经历了这么多年的衰退之后。我们浪费了太多时间，现在需要快速发展。重新取得先前取得的社会主义胜利。这需要果断的行动！明白吗，这是时代的需要……\"\n\n\"也许你是对的……\"企业家不情愿地嘟囔着，但他的眼里依旧充满狐疑。"
 russia.769.a: "我们需要飞跃式的进步……"
 russia.770.t: "俄乌会谈"
 russia.770.d: "尽管我们在战争期间出了最多的力，但还是得与推翻前政权后上台的乌克兰新政府进行谈判。博伊科政府对俄罗斯和俄语人口更加友好，而我们不得不暂时放弃例如乌克兰加入集体安全条约组织，或兼并更多领土等更为激进的提议。\n\n不过，在敖德萨新一轮俄乌会谈举行之后，博伊科政府同意签署一项军事联盟协定，以换取对乌克兰战后经济重建的大量资金和投资支持。这其中还包括在基辅建造一个动物园，并在敖德萨建造一个水上乐园。"
 russia.770.a: "春回大地，阿卡迪亚再次迎来生机，而广场上也人头攒动……"
 russia.771.t: "弗拉基米尔·普京与虚无"
 russia.771.d: "\"沃夫卡！\"——鲍里斯·尼古拉耶维奇的声音从门后传来——\"你在哪里？\"\n\n\"哪里都不在！\"——他含糊地回答。\n\n\"哈哈！\"——叶利钦突然大喊——\"干得好！明天我会向全国宣布对你的感谢。你全都明白！那你为什么整晚装傻？\"\n\n\"这是什么意思？\"\n\n\"想一想。你现在眼前看到的是什么？\"\n\n\"一个枕头，\"——他说——\"但看得不太清楚。别再跟我说这只是我的想象。\"\n\n\"一切我们看到的都在我们的脑海中。所以你不能说我们的意识存在于某个地方。我们不存在于任何地方，只是因为没有地方可以说我们在那儿。这就是为什么我们无处不在。\"\n\n\"鲍里斯·尼古拉耶维奇，\"——他说——\"我还是一个人待着吧。\"\n\n\"随你便。我希望你明天精神抖擞。中午的晋升，你知道的。"
 russia.771.a: "在这个情节中，我处于什么位置？"
 russia.772.t: "苏维埃式商业"
 russia.772.d: "他是个成功的商人，名下拥有一连串购物中心、一家繁华的赌场，同时还是新罗西斯克特别经济区理事会的成员。那一天，他悠然自得地漫步在自己的一处产业内，却忽然如木桩般停下脚步。\n\n在他光辉商业帝国的阴影下，赫然出现了一辆不起眼的餐车。从餐车内飘出的香气异常诱人，一位身着油腻围裙的阿塞拜疆男子正忙碌于窗口，向一旁满意的工人和路人递出一份份沙威玛。这一切在他眼中，却显得无比刺眼——仿佛对他的伟大成就是一种侮辱。\n\n他带着盛气凌人的态度走近厨师，厉声质问：\n\n\"你在这里干什么？谁允许你在这里卖你的垃圾食物？！\"\n\n餐车的主人试图用善意平息这位资本家的怒火，但对方根本不为所动，争执随即升级。所幸，这场争执仅持续了片刻，因为商人很快看到了对方持有的特别经济区营业许可。\n\n\"要不是因为这些苏联的法律，我早就用推土机把你的餐车铲平了！九十年代的时候，做这种事情可轻松多了！\"\n\"兄弟，你是不是因为饿了才这么生气？我请你吃一份，免费！\"\n\"给我滚开！\""
 russia.772.a: "……他的肚子开始咕咕作响。"
 russia.773.t: "阶级斗争"
 russia.773.d: "伏尔加地区一家机械制造厂爆发了一场足以引发灾难的丑闻。名义上为工人利益设立的企业工会，早已沦为摆设，工人的诉求无人问津。走投无路之下，工人们决定组建自己的独立工会。在愤怒与绝望的驱使下，人们聚集在生产车间内，工程师、焊工、会计及来自各部门的工人团结一心，红旗招展，\"我们为何而战？\"、\"工厂归工人！\"的标语在车间中格外醒目。\n工厂老板深知，如果国家订单因这场骚动而延误，后果将不堪设想。他匆匆赶到车间，试图平息这场风波。他气急败坏地高声喊道：\"我们有企业工会了！有什么问题都去那里反映！你们这是怠工！马上回到自己的岗位上！\"\n然而，人群中传来一个愤怒的声音打断了他：\n\"是啊，除了节日发发礼品，你们的工会还能干什么？到底要忽悠我们到什么时候？我们已经成立了自己的工会！\"\n\"你们没有这个权力！\"老板气得满脸通红，怒吼道：\"我要报警！\"\n\"那你尽管试试！\"\n话音刚落，警察便闯入车间，瞬间将争执的人群包围起来，而随后发生的事情……"
 russia.773.a: "……每个人都被打倒在地。"
 russia.773.b: "……工厂老板被捕了。"
 russia.774.t: "加入工会！"
 russia.774.d: "为了防止这座战略重地的生产陷入混乱，内务部果断介入了这场劳动冲突。公司高层被更换，企业工会也被一个由国家主导的新工会所取代。这一变革最初的几个月让工人们重新燃起了希望：问题得到了迅速解决，投诉也有了回应，人们开始感到自己终于被倾听了。\n\n然而，时间的流逝却逐渐改变了这一切。新的工会深陷官僚主义的泥沼，甚至滋生了贪污与腐败。只有那些\"小团体里的人\"或能够递上\"心意\"的人才能得到帮助。任何表达不满或提问的举动都被视为破坏国家纪律，并因此招致严厉的后果。尽管如此，这个工会的稳定性还是为工人们提供了一定程度的保护：工资按时发放，工作条件没有恶化，工厂的生产任务得以完成，过去那种随时可能失业的恐惧也逐渐消散了。\n\n在休息间隙，几名焊工坐在钢板上谈论起眼前的变化：\n\"他们老是说什么‘我们有更重要的任务’。什么任务？他们还配叫共产主义者吗？\"一人嘟囔着，用手擦去脸上的烟尘。\n\"也许他们早已忘了自己当初为什么来到这里。他们击败了敌人，却把我们抛在了一边。\"另一人低声说道，目光落向下方的车间。"
 russia.774.a: "谁赢了？"
 russia.775.t: "加入工会！"
 russia.775.d: "当局决定向工人们让步，通过更换工厂管理层，并允许成立独立工会来缓解矛盾。新成立的工会迅速掌控了工厂的运营流程。名义上，工厂仍归原业主所有，但实际上，管理权已交由工人掌控。起初，这种模式展现了惊人的效果：问题以集体形式迅速解决，工作环境也有了显著改善。然而，时间是最无情的试金石。随着工会逐渐壮大，投机分子和野心家开始暗中掌控局面，将那些有才华、敢于创新的工人排挤在外。组织在内部权争中逐渐腐化。不满的工人要么被集体施压噤声，要么选择离开。罢工的工具属性日益显现，真正的劳工权益却无人关注。\n\n事态发展到如此隐秘和复杂的地步，以至于连反间谍部门也未能给予足够的警觉，只是将其视为内部问题。一位试图主动作为的年轻克格勃官员无意间在工作用的Telegram频道中发现了一些令人不安的消息：\n\"迪玛，快看，这个工厂频道里说那边一片混乱。咱们要不要查查？\"\n\"帕夏，算了吧，既没有报告，也没有投诉。多半是国外的宣传操作罢了。咱们哪有时间查这些琐事。\""
 russia.775.a: "谁赢了？"
 russia.776.t: "欧亚国为我们提供经济伙伴关系！"
 russia.776.d: ""
 russia.776.a: "听起来是个好主意。"
 russia.777.t: "恐怖主义的崛起"
 russia.777.d: "乌克兰、波罗的海诸国及波兰的民族主义势力正蠢蠢欲动。他们叫嚣着要摧毁新生的俄罗斯帝国，妄图复辟东欧的沙文主义统治。如今，他们的毒手已然伸向忠诚于我们的人民，以破坏与暗杀为其利刃。对此，我们绝不能坐视不管，必须果断出手！"
 russia.777.a: "宣布反恐行动立场！"
 russia.778.t: "穆斯林叛乱"
 russia.778.d: "随着东边的恐怖分子们崛起，南边的伊斯兰主义者们也发起了无数的起义，并占领了许多重要的交通枢纽和人口中心。\n照目前来看，攻打高加索与中亚南部的情景将再次重演。我们必须为此做点什么。"
 russia.778.a: "准备好坦克！"
 russia.779.t: "突袭莫斯科"
 russia.779.d: "黎明时分，莫斯科的街头被重型车辆的轰鸣声震醒，家门被粗暴撞开的声响回荡在寂静中，偶尔还夹杂着几声枪响。稍后，政府宣布了一场\"成功的行动\"，称已抓捕了约2500名\"危险的叛国分子\"。与此同时，国际媒体注意到，许多知名商人、科学家及政界人士的行踪成谜。可以肯定的是：叛徒的阴影已不再笼罩帝国的天空。"
 russia.779.a: "这简直是易如反掌。"
 russia.780.t: "波兰问题"
 russia.780.d: ""
 russia.780.a: "将他们并入帝国！你永远是俄罗斯人！"
 russia.780.b: "只要加强对现政府的控制，粉碎分裂分子就可以了。"
 russia.780.c: "波兰人一直是热爱自由的民族，我们会对他们宽大为怀。"
 russia.781.t: "他的事业永存"
 russia.781.d: "伟大领袖弗拉基米尔·沃尔福维奇·日里诺夫斯基，俄罗斯坚定不移的守护者。他的一生，辉煌卓绝，意志如铁，已化为不朽的传奇。他使俄罗斯攀上权力与繁荣的巅峰，如今他的离去令国人为之哀恸，然而，这片土地的心脏依然与他的遗训一同跳动。\n\n他的名字，已以金色之字镌刻于历史的册页。他，那位不屈的战士，打破全球主义阴谋的枷锁，重塑俄罗斯昔日的辉煌，并巩固其在世界舞台上的荣耀地位。他的勇气，他的洞察，他不可遏止的力量，激励了无数人。他虽已离世，但他的事业不朽！他的思想、他的战略、他对俄罗斯坚定的信念，将永远存于无数忠诚的自民党追随者的心中。\n\n自由民主党忠于领袖的遗训，将不懈前行，继续为俄罗斯的繁荣而奋斗。我们，追随他伟大道路的信徒，将为祖国的福祉昼夜辛劳，巩固其力量，捍卫其利益。弗拉基米尔·沃尔福维奇·日里诺夫斯基的记忆如圣火，将永远燃烧在我们的心中。他的名字，是力量、勇气与对俄罗斯至深挚爱的象征。\n\n俄罗斯万岁！弗拉基米尔·沃尔福维奇·日里诺夫斯基的不朽记忆万岁！"
 russia.781.a: "他的事业永垂不朽。"
 russia.782.t: "狩猎"
 russia.782.d: "清晨的阳光洒在波兰东部的天空上，勾勒出一幅宁静的画面。几朵云点缀着晴空，微风轻拂，气温意外地温暖。然而，一队五架战机的轰鸣划破了这片宁静。\n\n彼得罗夫中尉率领着他的苏-35编队，飞翔在波兰东部的高空。他们警觉、专注，满怀对战斗的渴望，像捕猎的猛兽一样搜寻着猎物。\n\n北约\"东境\"国家的领空已然化作一个巨大的角斗场。天空中充斥着战机的咆哮、枪炮的轰鸣与导弹的呼啸。战斗如火如荼，钢铁交锋，生命陨落，荣耀诞生。\n\n但彼得罗夫和他的战友们对此已司空见惯。每天，他们都在这里与敌人厮杀、搏斗。危险与死亡成了日常，而他已经战果累累——击落了5架罗马尼亚F-16、3架乌克兰米格-29，以及一架德国的\"台风\"战机。然而，他今天并非为这些无名战果而来。他对过去的胜利毫不在意，他的目标单一而执着。\n\n英国人，那些美国在欧洲最忠诚的追随者，已在波兰的天空展现了他们的力量。他们带来了第五代战机F-35，恐怖的存在。彼得罗夫已经在这些战机的阴影下失去了太多的战友。他恨不得将这些可憎的钢铁猛兽撕成碎片，用火焰洗刷自己内心的仇恨。\n\n于是，他的编队在空中游弋，搜寻着敌人的踪影。兴奋渐渐消失，取而代之的是紧张的压迫感与复仇的炽热。彼得罗夫心中不断盘旋一个念头：他们就在附近，他能感觉到。他们一定近在咫尺。\n\n就在此刻，彼得罗夫猛地低头盯住他的仪表盘。红色的警报灯狂乱地闪烁，尖锐的警报声如刺入耳膜的尖刀。他的雷达告警接收器发出凄厉的尖叫——他已被敌人锁定！刹那间，恐惧如狂潮涌上心头，将他整个吞没。"
 russia.782.a: "来吧。"
 russia.783.t: "杀戮"
 russia.783.d: "彼得罗夫猛地将操纵杆向左一拉，释放诱饵弹，他的战机急速转弯，试图规避来袭的导弹。其余苏霍伊战机也迅速行动，各自调整飞行轨迹，或俯冲或盘旋。飞行员们疯狂地扫描着周围的天空，寻找伏击他们的敌机。\n\n无线电中充满了战友们的紧张喊叫，传递着射程和目标数据，但彼得罗夫一句话也说不出来。他的心跳如鼓，双手颤抖，恐惧吞噬着他的理智。他僵住了，却又全神贯注。他的眼睛和头不停地转动，四处搜寻着攻击者。他只有几秒钟的时间，也许更短。他努力搜寻，直到——\n\n\"那里！在我们下方！\"无线电里传来一个声音。\n\n彼得罗夫立刻调整飞行轨迹，战机猛地俯冲。透过座舱玻璃，他看到三架英国F-35战机飞速掠过，导弹已然出膛，正飞向他的几名战友。他猜得没错，敌人果然就在这里。\n\n他的心情剧烈起伏，但他强迫自己镇定，将恐惧狠狠压入心底最深处。行动，立刻行动！他在脑海中呐喊。机会终于显现：最后一架F-35专注于追击他的战友，浑然未察后方的危险临近。\n\n彼得罗夫屏住呼吸，猛推油门，战机如箭般冲向目标。他的每一分注意力都集中于此，像是经历过千百次的训练，他的动作流畅无比。他瞄准、校准、扣下扳机。\n\n轰鸣的机炮划破长空，仅仅两秒，那架象征着美军科技巅峰的战机被撕裂成燃烧的火球与扭曲的残骸。\n\n彼得罗夫松开扳机，深吸了一口气。恐惧消失了，取而代之的是满腔的自豪感。他笑了起来，无线电中传来他轻快的声音和愉快的笑声，而战斗仍在激烈进行。"
 russia.783.a: "\"击落咯！五代机算个屁！\""
 russia.784.t: "向上主祈祷——胜利唯祂所赐"
 russia.784.d: "正如俄罗斯历史上最杰出的统帅亚历山大·瓦西里耶维奇·苏沃洛夫所说：\"奇迹的英雄，和平的基石，祖国的荣耀——上主与我们同在。向上主祈祷吧，胜利乃源自祂之恩赐。上主是我们的元帅，祂引领着我们前行。\"\n\n圣母玛利亚，救拔我等；圣父尼古拉，请为我等祈求于上主。无祷告，不拔剑；无祷告，不鸣炮；无祷告，不启事。凡事始于上主的祝福。\n\n当以父辈所传之正教信仰坚我心志，无信仰之军队，如淬尽铁刃，空有形而无锋；无根基之树木，如敬畏大地之力而轻慢上主之威者。\n先敬苍穹，再敬厚土。\n\n愿主垂怜，我辈乃俄罗斯之子！\n愿如昔时，重拾对仁慈上主之虔信！"
 russia.784.a: "天佑俄罗斯！"
 russia.785.t: "新时代的俄罗斯"
 russia.785.d: "俄罗斯自豪地举办了一场盛大的仪式会议，宣布国家将在2035年前实现长期经济和社会发展目标。这一活动吸引了高级官员和国际代表的参与，包括我们的领袖[SOV.GetLeader]及当时的联合国秘书长。这一盛会展示了俄罗斯的非凡成就。尽管经历了欧陆战争后的严厉制裁、多重危机以及伟大领袖弗拉基米尔·日里诺夫斯基的逝世，俄罗斯依然持续增长与发展。近年来取得的成就不胜枚举。\n\n这一连串的成功，正是俄罗斯迈向未来的坚实基石。以问鼎欧洲霸主、引领军民工业、建设真正\"人民之国\"为目标，俄罗斯正阔步迈向其宏伟愿景——在2046年，弗拉基米尔·日里诺夫斯基百年诞辰之际，荣耀加冕为世界的领航者。"
 russia.785.a: "只有付出巨大的努力，才能实现伟大的梦想。"
 russia.786.t: "尤涅曼时代"
 russia.786.d: "俄罗斯，崛起吧！在我们面前伫立的是一位如同传奇的彼得大帝般的人物——罗曼·亚历山德罗维奇·尤涅曼！他的统治不仅将以改革著称，还将引领一场真正的革命，把俄罗斯带入全新的强盛与繁荣的时代！\n\n抛弃停滞与低效！他的改革犹如铁匠之锤，将俄罗斯锤炼为真正的世界巨人，足以挑战任何敌人！\n\n尤涅曼不仅仅是一位高效的管理者，还是一位激励者，是一位能将人民团结在共同目标旗帜下的领袖。他的个人魅力与果敢决心激励了数百万人，将他们凝聚成一只钢铁之拳，随时准备捍卫祖国的利益。他无惧困难，勇敢地作出常人眼中不可能的决定。\n\n将他与彼得大帝相比绝非偶然。彼得曾怀抱一个伟大与现代化的俄罗斯之梦，而罗曼·亚历山德罗维奇则渴望让俄罗斯超越一切往昔的辉煌。如果彼得大帝为俄罗斯推开了通向欧洲的窗口，那么尤涅曼为俄罗斯打开通往未来的大门，一个辉煌壮丽、繁荣昌盛且拥有前所未有力量的未来！\n\n不久的将来，整个世界都将目睹这一荣耀的凯旋！感受俄罗斯的骄傲与领袖的辉煌，他的名字将镌刻在历史的丰碑之上，成为真正复兴帝国的不朽传奇！"
 russia.786.a: "这是我的领袖！这是我们的领袖！"
 russia.787.t: "美好的旧日俄罗斯"
 russia.787.d: "战胜西方全球主义者的伟大胜利为俄罗斯带来了和平与稳定，但新的威胁阴影正在地平线上浮现。新布尔什维克主义正在欧洲上空徘徊，对传统价值观和俄罗斯主权构成了严重威胁。这一局势要求我们保持高度警惕，并采取果断行动。\n\n然而，在伟大的沙皇[SOV.GetLeader]的英明统治下，人民已做好迎接新挑战的准备。君主制恢复后带来的道德振兴，推动俄罗斯人民迈向未来，将一切困难与威胁碾碎在前行的道路上。\n\n经历数十年布尔什维主义的俄罗斯如今重生，坚定守护自身利益，随时准备捍卫其成就与未来。过去的叛徒早已被遗忘，他们的遗产被彻底摧毁，再也无法蛊惑我们的人民。任何俄罗斯的敌人都将被消灭，正如布尔什维克遗留的污秽已被扫清。\n\n这便是我们重建的俄罗斯，如今的它，比以往任何时候都更加强大！"
 russia.787.a: "法棍的酥脆声回响如雷！困境当前，我们无所畏惧。"
 russia.788.t: "另一场大动乱"
 russia.788.d: "过去，莫斯科的花园环路总是被川流不息的车流填满。而如今，即便是深夜，街道上依然喧嚣不止。但不再是引擎的轰鸣声，而是抗议者掀翻车辆、投掷燃烧瓶、砸碎窗户，以及高喊反政府口号的声音。火光的橙红色几乎压过了城市的霓虹灯。\n\n在莫斯科的中心——大克里姆林宫，一间装饰着胡桃木的办公室。绍伊古将军、梅德韦杰夫政府的二把手拉开窗帘，不安地注视着远处的火光，嘴里念叨着：\"现在该怎么办？\"\n\n\"很明显，你要把我们的总统找回来。\"一个声音在他身后响起。\n绍伊古转过身，别洛乌索夫正坐在办公室一角的沙发上。尽管后者的表情仍显得十分冷静，但他的左手食指正神经质地不停敲着茶几桌面。\n\n\"我甚至都不知道我们的总统是否还活着，\"绍伊古沮丧的回到办公桌后。\"他的公寓——常去的私人别墅——不常去的私人别墅——俱乐部，我都派人去找了。他就好像1941年的斯大林一样，直接玩失踪。\"\n\n\"区别仅在于，斯大林最后打赢了，而这次是在打了败仗之后。\"冷笑话未能缓解紧张的空气。别洛乌索夫无奈摇了摇头，起身告辞。当办公室恢复寂静，绍伊古拿起桌上的俄罗斯英雄勋章，仔细端详着，然后紧紧攥在手心，低声喃喃："
 russia.788.a: "\"难道我们真的只能等死吗？\""
 russia.789.t: "重建官秩表"
 russia.789.d: "为了巩固复兴的俄罗斯帝国，建立为祖国服务的公正制度，沙皇下令恢复历经岁月洗礼的《官秩表》。\n\n这项古老的制度，如今已焕然一新，以适应现代时代的需求，为所有忠诚的臣民敞开了通往荣耀的大门，无论其出身贵贱。\n\n新的《官秩表》以功绩与才干为准绳，抛却血统羁绊，为国家机构、军队乃至帝国的各个领域提供了一条透明的晋升之路。它鼓励每一位公民在忠诚与奉献中脱颖而出，迈向更高的荣誉，携手共筑一个繁荣而强大的帝国。\n\n沙皇万岁！俄罗斯万岁！"
 russia.789.a: "哇！现在我可以上升为贵族了！"
 russia.790.t: "新年广告的杰作"
 russia.790.d: "新年前夜，在俄罗斯现今的国家元首——陛下的传统致辞开始前，各大电视台播出了一则来自俄罗斯外贸银行的广告。这则特别的动画短片迅速引发了巨大的公众反响，片中出现了俄罗斯历史上著名的作家，如亚历山大·普希金、陀思妥耶夫斯基和列夫·托尔斯泰，以及几位伟大的沙皇，包括尼古拉二世、亚历山大二世和彼得大帝。\n\n短片展现了这些历史人物驾驶雪橇穿越俄罗斯乡村、打雪仗、滑雪橇的场景，最后他们与村民们共同欢庆新年，在节日的圣诞树旁欣赏绚丽的烟花。整段短片配乐选用了格林卡的《鲁斯兰与柳德米拉》序曲，旁白则朗诵了普希金的爱国诗《给俄罗斯诽谤者》，传递出\"敌人应当畏惧俄罗斯，我们有能力在战争中捍卫自己\"的强烈信息。\n\n这段视频迅速走红，激发了许多公民和工作室创作以沙皇时代历史人物为主题的动画作品。积极的反馈和日益高涨的爱国情绪极大地增强了民众对君主制的支持和认同。\n\n与此同时，俄罗斯外贸银行的代表宣布公司利润显著增长，并启动了一项支持年轻动画创作者的新慈善计划。"
 russia.790.a: "俄罗斯这片土地压根不缺人才！"
 russia.791.t: "沙皇之梦"
 russia.791.d: "月华如练，洒落在帝国莫斯科的苍穹。夜深，官员已眠，工人酣睡，灯火阑珊处，连笔墨未干的公文也被时间封存于黑暗之中。而在这静谧的夜晚，[SOV.GetLeader]终于在摆脱了无休止的政务后沉沉睡去。梦境之中，这位全俄罗斯的沙皇步入一座夏日公园，湖水碧透，微风拂面，清新而宁静。他坐在湖畔凉亭，目光游离于波光粼粼的水面，仿佛整个世界都沉入了这一刻的祥和之中。\n忽然，[SOV.GetLeader]听到身后传来轻缓的脚步声。有人缓缓踏入凉亭。\n——\"可否同席？\"一个男人的声音在沙皇身后响起。\n\n他回过头，目光顿时凝滞——尼古拉二世，凭上帝之恩典，俄罗斯帝国的皇帝与专制君主。那个被世人称作\"软弱的沙皇\"或\"血腥尼古拉\"的君主，尼古拉二世身着旧日戎装，就这样站在他面前，[SOV.GetLeader]挣脱恍惚，连忙答道：\n——\"陛下，请坐。\"\n\n两人静默无言，只听湖水轻拍堤岸，夜风低语。许久，尼古拉缓缓开口：\n——\"我的俄罗斯，如今如何？\"\n——\"我们已为您复仇。如今，俄罗斯比任何时代都更加强盛。内外之敌皆已扫清，帝制亦已重建。\"\n\"感谢上帝。\"尼古拉说道，\"你已汲取我的教训……我欣慰，我的统治并非徒然。我将为帝国的昌盛、为你的成功而祈祷。治国当严厉而公正。荣耀应属俄罗斯！\""
 russia.791.a: "他醒来时，脸上带着微笑。"
 russia.792.t: "沙皇之梦"
 russia.792.d: "月华如练，洒落在帝国莫斯科的苍穹。夜深，官员已眠，工人酣睡，灯火阑珊处，连笔墨未干的公文也被时间封存于黑暗之中。而在这静谧的夜晚，[SOV.GetLeader]终于在摆脱了无休止的政务后沉沉睡去。梦境之中，这位全俄罗斯的沙皇步入一座夏日公园，湖水碧透，微风拂面，清新而宁静。他坐在湖畔凉亭，目光游离于波光粼粼的水面，仿佛整个世界都沉入了这一刻的祥和之中。\n忽然，[SOV.GetLeader]听到身后传来轻缓的脚步声。有人缓缓踏入凉亭。\n——\"可否同席？\"一个男人的声音在沙皇身后响起。\n\n他回过头，目光顿时凝滞——尼古拉二世，凭上帝之恩典，俄罗斯帝国的皇帝与专制君主。那个被世人称作\"软弱的沙皇\"或\"血腥尼古拉\"的君主，尼古拉二世身着旧日戎装，就这样站在他面前，[SOV.GetLeader]挣脱恍惚，连忙答道：\n——\"陛下，请坐。\"\n\n两人静默无言，只听湖水轻拍堤岸，夜风低语。许久，尼古拉缓缓开口：\n——\"我的俄罗斯，如今如何？\"\n——\"我们已为您复仇。如今，俄罗斯比任何时代都更加强盛。内外之敌皆已扫清，帝国的法统已然恢复。\"尼古拉深深吸了一口气，\"愿你能从我的过往中汲取教训。莫忘，是杜马的妄议和肆意泛滥的自由思想，将俄罗斯引向了毁灭的深渊。我会为帝国的昌盛、为你的成功而祈祷。治国当公正而谨慎。荣耀属于俄罗斯！\""
 russia.792.a: "醒来后，他一脸深思。"
 russia.793.t: "针叶林的幽灵"
 russia.793.d: "针叶林，自古以来便是一个充满神秘的生命体，它遵循着只属于自己的古老法则。这里的一切，总能用无声的征兆暗示着未来：或静谧无波，或低语诉说，甚至会因愤怒而咆哮。\n\n而如今，针叶林连续多日怒啸不停。风暴呼啸，雪舞漫天，林中已难辨方向。气象学家们无从解释这些异象，所有的设备都像被施了魔咒一般，疯狂失控。\n\n只有在西伯利亚的偏远村落里，一位年迈的老人明白真相。他知道，罗曼诺夫家族归来了。而这也意味着，他，是时候重新归位了。"
 russia.793.a: "等一下……他……还活着？"
 russia.794.t: "木已成舟之后事"
 russia.794.d: "维克多·佐洛托夫将军——新俄罗斯与小俄罗斯的总督，帝国卫队的最高统帅，自军事政变后接掌俄罗斯，清除了所有在弗拉基米尔·沃尔福维奇去世后显露真面目的叛徒。\n\n他铁腕出击，在高加索、突厥斯坦与东欧的分裂势力间造成了沉重打击。他那坚定而有力的手腕，依靠军队与安全部队的忠诚，令国内局势得以初步平稳。尽管欧陆战争及其后的混乱余波对经济造成重创，但复苏的曙光已隐隐可见。\n\n为加强中央政府和压制反对派，一些改革措施已经出台。然而，不稳定的阴影依然笼罩着国家。行政系统疲弱不堪，腐败问题严重，尽管民众的不满被压制，但依然清晰可感。\n\n佐洛托夫面临诸多挑战：强化经济、恢复公众信任、在不危及稳定的情况下推行必要改革，最重要的是防止新的破坏企图。他竭尽全力想要振兴俄罗斯的伟大。\n\n他的统治如履薄冰，是一场在混乱边缘的微妙平衡。俄罗斯的未来取决于他能否防止国家的解体。他会选择强硬的军事手段，还是试图以更温和的方式施政？一切即将揭晓。"
 russia.794.a: "欲知后事如何？"
 russia.795.t: "加冕仪式"
 russia.795.d: "整个早晨，莫斯科一片寂静。街道空无一人，商铺紧闭，原定的所有社交活动也被取消。并非因悲剧或危机，而是因为这座城市迎来了一个划时代的时刻——俄罗斯即将迎来一位新沙皇。克里姆林宫内的圣母升天大教堂外，成千上万的市民聚集在一起，教堂钟声响彻云霄。\n\n教堂内的场景宛如童话般壮丽。每一寸墙面都镶嵌着金光闪闪的圣像，银质和铂金制成的枝形吊灯与烛台，让整个教堂明亮如盛夏的正午。从顶尖的政界人物到外国使节，教堂内座无虚席，所有人都屏息以待。当莫斯科及全俄罗斯的牧首迈步走出时，场内瞬间安静，仪式随之开始。\n牧首在一众执事的陪同下诵读圣礼，祈祷文在教堂内回荡。随后，教会代表欢迎了所有来自俄罗斯和外国的尊贵宾客，最后目光转向教堂正前方——沙皇与皇后正端坐于宝座之上。\n\n牧首缓步走向即将加冕的沙皇，将王冠庄严地戴在他的头上。沙皇起身，为他的皇后戴上另一顶王冠。两人并肩站立，面向所有宾客，牧首庄严宣告俄罗斯的新皇室诞生。\n\n现场所有贵宾齐声鼓掌，教堂唱诗班高歌《天佑沙皇》。百年未见的盛大庆典拉开帷幕。\n\n随后，莫斯科全城的教堂钟声齐鸣，宣告俄罗斯自1917年以来迎来了第一位君主。"
 russia.795.a: "新世纪的开端"
 russia.796.t: "复兴"
 russia.796.d: "阿列克谢·罗季奥诺夫站在他位于莫斯科市中心住宅的窗边，久久凝视着眼前的景色。他的住所是一套豪华公寓，距离克里姆林宫近在咫尺，周围满是世界各地游客心驰神往的名胜古迹。作为自由民主党在莫斯科市杜马的一颗冉冉升起的新星，他的地位带来了不少好处，而这套公寓正是他越来越珍视的其中之一。然而，端着一杯精致饮品，目光扫过这座城市，他想到的却是另一件让他愉悦不已的事。\n\n他回想起这座城市、这场运动以及整个国家。过去几年发生的事情令他感慨万千：选举、战争、政治斗争，以及他的党夜以继日推动完成的重大改革。莫斯科便是他们成果的缩影，回忆起这些成就让他感到无比的满足。\n\n这座城市已经被清理得焕然一新，摆脱了旧政客和苏联遗留下来的\"物理与意识形态垃圾\"。锤子与镰刀的标志不见了，列宁的纪念碑也不复存在。那些国际主义者——那些憎恨俄罗斯的人的纪念牌、街道名称和艺术作品，也统统被清除了。如今的俄罗斯重拾了往日的荣光，甚至可以说是得到了新生，你随处都能感受到这一点。\n\n莫斯科大剧院正在加演契诃夫的戏剧，特列季亚科夫画廊正在举办长达一个季节的列宾画展。所有建筑顶部的红星已被俄罗斯的双头鹰所取代。为迎接节日，这座城市的街道装点着19世纪90年代流行的装饰品。而富裕的社交名流间，甚至出现了20世纪初时尚风格的复兴。他可以不断列举下去，但有一点非常清晰：\n\n这一切，太辉煌了。\n\n他又轻啜一口酒，露出微笑，低声对自己说道。"
 russia.796.a: "\"欢迎回来，俄罗斯母亲。\""
 russia.797.t: "新俄罗斯-新党派"
 russia.797.d: "随着日里诺夫斯基的逝世，自由民主党的支持率迅速下滑，我们必须为人民提供新的愿景。弗拉基米尔·沃尔福维奇已不在，我们的党必须真正成为一个属于俄罗斯的政党。\n\n与此同时，我们必须明确新的官方意识形态。我们都是民族主义者，但当前的民族主义理念过于浅薄和单一，必须深入到更深层的思想领域，让人民真正信仰我们的新体制和新政党。\n\n俄罗斯中心主义作为一种温和而日益流行的理念，认为俄罗斯是世界舞台的中心，并且文化远比欧洲先进，尤其是考虑到欧洲近年来的衰落。这一理念以俄罗斯发展为绝对优先，并可吸引部分温和派支持者，使我们的运动更加现代化。\n\n国民共和主义可能不受党内君主主义派别的欢迎，但它能为俄罗斯的未来提供新的愿景。毕竟，日里诺夫斯基领导的是一个共和国，而非君主制国家。通过采用更具公民意识的民族主义，我们可以扩大对非俄罗斯人的吸引力，同时维持我们运动的高度爱国基调。这是一个适应现代的民族主义方案。\n\n整合主义统一理论是一种最接近党国一体化的方案，虽然在党内可能遭遇强烈反对，但它将打造一个目标统一的社会，使国家的全部力量都集中在振兴俄罗斯之上。同时，这一理论有助于重塑领袖崇拜，毕竟，俄罗斯人始终渴望一个强有力的领导者。"
 russia.797.a: "俄罗斯中心主义政策！"
 russia.797.b: "国民共和主义是未来之路！"
 russia.797.c: "党国的统一有机体！"
 russia.798.t: "自民党老党员倾向弗拉索夫鹰派"
 russia.798.d: "在我们伟大的领导人去世后，经过几周的稳定，党内的老一辈，即那些始终忠于日里诺夫斯基党纲和事业的老党员，决定支持弗拉索夫及其支持者。这一派系成功地说服他们采纳了更为强硬的议程。\n\n这实际上意味着党内老资历派系的终结。大多数党员将因反对这一决定而辞职，或者加入弗拉索夫忠诚支持者的行列。"
 russia.798.a: "他们做出了正确的决定。"
 russia.799.t: "自民党老党员倾向改革派"
 russia.799.d: "在我们伟大的领导人去世后，经过几周的稳定，党内的老一辈，即那些始终忠于日里诺夫斯基党纲和事业的老党员，决定支持改革派。这一派系成功地说服他们接受改革议程。\n\n这实际上意味着党内老资历派系的终结。大多数党员将因反对这一决定而辞职，或者加入斯卢茨基的支持者行列。"
 russia.799.a: "他们做出了正确的决定。"
 russia.800.t: "反政府活动激增"
 russia.800.d: "在我们伟大的领导人弗拉基米尔·日里诺夫斯基离世之后，那些曾经畏惧我们的存在——那些老鼠与蛆虫——终于在我们新政府的虚弱面前感受到了空虚。他们不再像过去那样心生恐惧。\n\n受到饱受危机折磨且已经失败的欧洲激进左翼起义的鼓舞，他们开始自信地认为自己可以在我们这片神圣的祖国上做些事情。\n小规模的团体已经开始形成，他们的小打小闹行动逐渐显现。散发传单、张贴海报，以及工人因\"报酬不公\"而引发的不满事件不断被报道。\n\n在叶卡捷琳堡，一座纪念弗拉基米尔·沃尔福维奇的雕像上，被残忍地贴上了\"屠夫\"字眼，亵渎了这位伟人的肖像。\n\n虽然这些行为微不足道，但它们就像潜伏在土地中的癌症，有可能悄然扩散。国家近卫军和奥卡纳已被指示对此事保持高度警觉，严肃处理。"
 russia.800.d2: "主席同志，我方情报部门已发出警告——反动派与叛徒正蠢蠢欲动。\n\n我们早已预料到恢复苏维埃体制会遭遇抵抗，但如今的局势远比预期复杂——这种抵抗与下层民众对新政权缺乏支持的情绪交织在一起，而这一现象正是前政权遗留下来的毒瘤，极有可能给我们的国家带来无法挽回的损害。\n\n许多曾受日里诺夫斯基手庇护的极端民族主义分子仍拒绝接受我们的统治，如今已纷纷走上街头，公然抗议政府。他们在暗处结成小团体，制造骚乱，我们已发现多起破坏活动的苗头。同时，各地出现煽动性传单与海报，鼓吹\"反抗无神苏维埃极权\"，甚至在城市与乡村间传播离奇谣言。\n\n荒谬至极的是，竟有人声称，俄罗斯已被\"西方马克思主义者\"秘密占领！\n\n尽管这些行为目前尚属零星，但若听之任之，它们极有可能如毒瘤般蔓延，腐蚀我们的社会根基。必须立即指示人民治安队与国家安全机关高度重视此事，并采取果断措施，确保国家的稳定。"
 russia.800.a: "我们必须保持警惕。"
 russia.801.t: "亚夫林斯基发动革命"
 russia.801.d: "全国范围内的起义和示威早已注定，并最终会以压倒性的力量推翻警察，推翻俄罗斯自由民主党政权的统治。\n\n今天清晨，莫斯科弥漫着对自民党政府的愤怒，抗议潮如洪水般迅猛，迅速淹没了警察的防线，许多警员在压力下投降，纷纷倒戈投向叛乱者。\n\n即使宣告了军事干预，局势依然未能得到遏制。正如1991年时的情形那样，士兵们拒绝听从命令。有些人静默站立，任由抗议者占领越来越多的政府大楼，最终逼近克里姆林宫，而另一些人则助力突破防线，击败了最后一支忠于政府的国家近卫军。\n\n这场历史巨变的幕后策划者是谁？正是曾经的老将格里戈里·亚夫林斯基，曾是日里诺夫斯基领导下少数得以生存的自由派人物，以其稳重和熟悉的政治面貌著称。然而，时光流转，他和他的政党宣告了俄罗斯民主化的崭新开始。亚夫林斯基成为了新俄罗斯的临时总统。\n\n他继承了一个满目疮痍、四面困厄的国家，危机与激进抗议遍布四方，国家的未来如迷雾般难以看清。"
 russia.801.a: "为了自由俄罗斯！"
 russia.802.t: "亚夫林斯基的告别"
 russia.802.d: "\"亲爱的俄罗斯公民们，今天是我最后一次以俄罗斯总统的身份向你们发表讲话。\n\n我做出了一个决定。\n我深思熟虑，痛苦决策。\n我常常听到有人说：\"亚夫林斯基会不惜一切手段固守权力，他绝不会把它交出去。\"这是谎言。\n\n真相是：我一直坚信，我的每一步都应追随民主的步伐。今天，我们为文明社会树立了一个最重要的榜样——一个总统将权力平稳地交给一个新选举产生的总统。\n\n然而，我做出了一个不同的选择。我将提前告别。我意识到，俄罗斯必须在新的政治人物、新的面孔、以及充满智慧、力量与活力的年轻人带领下，迈向它的崭新篇章。\n而我们这些为民主奋斗了多年的先行者，应该退出历史的舞台。\n当我看到人民以满怀信心与希望，在杜马选举中投票支持新一代政治家时，我明白了，我已完成一生中最为重要的使命。俄罗斯，将永远走向未来，再也无法回头。今后，俄罗斯将始终向前进……\n根据宪法，今日我辞去总统职务，并签署了命令，将俄罗斯总统职务交给伟大的民主领袖阿列克谢·纳瓦利内……\""
 russia.802.a: "\"……在此告别之时，我想对每一位说：愿你们都能拥有属于自己的幸福。\""
 russia.803.t: "亚博卢未能获得多数席位"
 russia.803.d: "在那场充满争议的临时杜马选举之后，总统所属的亚博卢未能赢得足够的选票。尽管他们倡导人民阵线策略，联合了较小的民主党派，终未能收获足够的支持。\n\n然而，由阿列克谢·纳瓦利内领导的\"未来俄罗斯党\"获得了足够的选民信任和舆论支持，成功赢得了足够的议会席位。\n\n杜马的首次会议很快拉开序幕，纳瓦利内不遗余力地争取成为主席。尽管亚博卢及其盟友的反对声浪不断，最终，在与一些小党派的秘密交易与\"未来俄罗斯党\"成员的大力支持下，阿列克谢·纳瓦利内终于被宣布为杜马主席。"
 russia.803.a: "亚博卢失败了。"
 russia.804.t: "苏洛维金政变"
 russia.804.d: "这一天早已注定，军队的愤怒和示威最终将压倒忠诚派，推翻了俄罗斯自由民主党政权的统治。\n\n今天清晨，莫斯科陷入了前所未有的动荡，俄罗斯军队如猛虎下山，突破了警察和国家近卫军的重重阻碍。市民们纷纷散去，躲避着乱飞的子弹。\n\n傍晚时分，所有反抗力量被叛军一举消灭，唯一剩下的目标——克里姆林宫，很快被反叛者围得水泄不通。自民党政府的高层早已消失得无影无踪，传言他们已逃往斯里兰卡。\n\n在莫斯科的混乱过后，俄罗斯的电视屏幕终于迎来了政变后的第一次\"官方\"广播。\n\n曾经只是空军指挥官的谢尔盖·苏洛维金，宣布自己为新军事政府的临时领导人。他公开谴责了前政府签订的背叛和平条约，称其为祖国的叛徒。\n\n他继承了一个满目疮痍、极度虚弱的国家，四面楚歌，激进的抗议和危机正如潮水般汹涌而来。"
 russia.804.a: "重铸俄国天命！"
 russia.805.t: "受青睐的人民企业"
 russia.805.d: "人民企业是我们社会主义国家的中流砥柱，它们在经济和社会发展中发挥着至关重要的作用。在格鲁季宁的领导下，我们将更加重视保护和加强这些企业的贡献。\n在接下来的六个月内，我们将甄选出三家规模最大的企业，以助力提升我国的经济与社会指标。\n\n首先是\"苏联石油\"，一家资源巨头企业。它可以帮助我们在西伯利亚和远东地区扩大工业生产和资源开采业务。\n\n其次是\"苏联天然气\"，一家综合性多行业企业。在获得足够的国家补助的前提下，它能够实现全苏联范围内工厂的现代化改造。\n\n最后是\"国营农场\"，一家由格鲁季宁亲自创立的媒体与商业集团。由于其专注于创新和媒体技术，在年轻人中享有极高的声望。它有助于将党的理念传播到人民群众和工人阶级之中。"
 russia.805.a: "苏石油。"
 russia.805.b: "苏气。"
 russia.805.c: "苏霍兹尼克。"
 russia.806.t: "\"列宁近卫军\"私人军事承包商成立"
 russia.806.d: "我们已获悉苏联首家私人军事承包商\"列宁近卫军\"已成功创立。\n\n该公司主要由曾在欧陆战争中作战的瓦格纳集团和苏联退伍军人组成，其中一些人甚至是前克格勃特工。\n\n目前，该公司正接受世界各地亲苏国家的合同，为其高级官员提供保护，并在军事冲突中提供援助。\n\n该组织的关键特点是，每名士兵都必须宣誓维护苏联的列宁主义愿景和党的统治。这意味着这家私人军事承包商至少在口头上效忠于我们的国家。"
 russia.806.a: "联盟真正的爱国者！"
 russia.807.t: "\"白银\"私人军事承包商成立"
 russia.807.d: "我们已获悉苏联首家私人军事承包商\"白银\"已成功创立。\n\n该公司主要由曾在欧陆战争中作战的瓦格纳集团和苏联退伍军人组成，其中一些人甚至是前克格勃特工。\n\n目前，该公司正接受世界各地亲苏国家的合同，为其高级官员提供保护，并在军事冲突中提供援助。\n\n该组织的关键特点是，将完全不干涉政治，并欢迎来自不同背景的战士加入。他们的唯一使命是捍卫祖国，而不受任何政治派别的影响。"
 russia.807.a: "祖国的真正爱国者！"
 russia.808.t: "将\"GOIDA\"带向大众"
 russia.808.d: "\"有这样一个古老的俄语感叹词‘GOIDA’，意为呼吁立刻行动。\"\n自从我们最圣洁的守护者伊万·阿赫洛贝斯金在红场演讲中使用了这个词语后，它迅速成为俄国的一大新风尚，尤其在安全部队和军人之间广泛流传。\n\n在全俄境内，我们神圣联盟的忠诚公民们将\"GOIDA\"作为俄国人民的战斗口号，用以表达将梦想变为现实的决心。他们在演讲、公众集会中使用这一词语，甚至用它来问候自己的同胞。\n\n当然，也有一些自由派的渣滓试图将它等同于‘希特勒万岁’，但他们的指控毫无根据，并显得幼稚可笑。\n\n此外，这件事还有一种更幽默的结局。许多人以奥赫卢比斯演讲中提到这句口号的部分为基础制作了派对混音，令人忍俊不禁。"
 russia.808.a: "\"GOIDA\"深入人心……"
 russia.809.t: "战斗号角"
 russia.809.d: "阿赫洛贝斯金登上最高统治者之位不久，便在内阁中强硬派神职人员的影响下愈发激进，而他的内阁几乎完全由俄罗斯正教会的成员组成。\n\n克里姆林宫广场上，一场盛大的集会隆重举行，成千上万的忠诚爱国者与基督徒汇聚一堂，挥舞着象征伟大历史的旗帜，聆听致敬先祖的演讲与音乐。\n\n这场集会的高潮，自然是最圣洁的守护者亲自发表演讲。\n\n他开篇便义正词严地痛斥腐朽的西方及其撒旦式的统治者，随后将矛头指向国内那些\"不忠诚\"的精英——那些在暗中图谋危害祖国的人。\n\n人群为之沸腾。伊万·阿赫洛贝斯金无疑是一位卓越的演讲者，或许他的电影演员经历使他更具舞台感染力，但更重要的是，他对自己的信仰与愿景怀揣着炽烈的狂热。这两种特质的结合，使俄罗斯迎来了史上最伟大的演说家，甚至可能超越日里诺夫斯基。\n\n在演讲的高潮部分，阿赫洛贝斯金宣告，一场神圣战争迫在眉睫，这不仅是对外敌的抗争，更是对内敌的肃清。\n\n\"圣战！穆斯林有圣战的概念，它不仅仅是战场上的生死搏杀，更是与内心罪恶的斗争！而我们的主战场，我们的圣战，将在灵魂深处展开！如果我们赢得这场战争，我们就能赢得所有战斗！俄语中有一个古老的感叹词‘GOIDA’，意为号召立即行动。如今，我们何等需要这样的战斗口号！GOIDA，兄弟姐妹们，GOIDA！颤抖吧，旧世界！你已丧失真正的美德、真正的信仰、真正的智慧，被疯子、堕落者和撒旦信徒所统治。颤抖吧，我们来了！GOIDA！\""
 russia.809.a: "GOIDA！"
 russia.810.t: "联盟的新政党"
 russia.810.d: "既然我们已经废除了一党专政体制，就必须建立一股新的政治力量来确保政府权力的稳定。\n\n我们有几种方式来构建这个新的政党。苏联主权、人民福祉，当然还有对帕谢奇尼克的\"新共产主义\"理论矢志不渝的遵循将成为我党的主要原则。\n\n许多务实派人士已准备好听从总统的命令来改革政党。一些普京时代的前官员也决定加入我们。\n\n话虽如此，教条主义者的影响力仍然不可小觑，所以我们必须为变革所面临的阻力做好准备。"
 russia.810.a: "团结为重。"
 russia.810.b: "我们必须同教条主义者作斗争，我们是未来的共产主义者。"
 russia.810.c: "为了人民而改革，依靠人民而改革。"
 russia.811.t: "反苏组织！"
 russia.811.d: "过去数周，我们的情报网络不断传来警讯——一股潜伏已久的反动势力，正悄然汇聚成形。他们自诩为\"日里诺夫斯基近卫队\"，并在一份泄露的宣言中公然宣称，要让俄罗斯回归日里诺夫斯基所构想的道路，与所谓的\"新共产主义九头蛇\"展开斗争。\n\n他们的手段冷酷无情，充满暴力与血腥——民兵遭袭，政府大楼被冲击，甚至连我们的部长与忠诚官员也成为他们暗杀的目标！\n\n更令人不安的是，许多原本涣散的反苏分子正源源不断地投靠这一组织，尽管彼此在意识形态上并无共识。此举已然表明，反革命势力正联合起来，对抗工人阶级政权。面对这种危险的联盟，我们必须采取果断措施，以确保国家的安全与稳定。"
 russia.811.a: "我们会粉碎他们……"
 russia.812.t: "早上从来都不好"
 russia.812.d: "上午十点半。此时，俄罗斯所有尽职尽责的公民早已奔赴各自岗位——售货员在商店忙碌，教师在课堂授课，工人在工厂劳作。然而，列尼亚除外。\n列尼亚还在睡觉——他根本不需要去任何地方。他曾学习语言学，但在\"新俄罗斯\"里，他发现自己毫无用处，除了深爱他的父母外，无人需要他。他靠父母供养，整日在互联网上冲浪，靠着无休止的谈论国事来寻求短暂的多巴胺刺激。\n\n\"荣耀属于俄罗斯！荣耀属于最高领袖！\"\n\n\"什么？\"列尼亚迷迷糊糊地想着，还未完全清醒。片刻后，他终于从梦境中回过神来——他想起来了。\n宣传车。\n\n每天上午10:37，宣传车准时驶过他的街道。从喇叭中传出爱国口号与歌曲——《上帝保佑沙皇》的旋律回荡在空气中，格林卡的《荣耀颂》高亢激昂。到了10:42，音量已经足够将最贪睡的人吵醒。列尼亚用枕头捂住头，试图继续睡去。然而，10:45，那辆该死的宣传车已抵达他的窗前。\n\n\"我们生活在世界上最伟大的国家，其他人只是嫉妒我们！\"\n\n终于，声音渐行渐远，音乐与口号淡去，梦境也随之散去，唯余一个念头在他脑海中盘旋：\n\"妈的，混蛋。\"\n他躺了一会儿，最终还是起身，第一件事便是打开自己最喜欢的网站，点进/po/版块，开始敲字。"
 russia.812.a: "\"2ch的友友们早上好……\""
 russia.813.t: "关于信仰"
 russia.813.d: "-大家好，亲爱的听众朋友们！现在是鄂木斯克时间下午2点整，您正在收听的是《路边广播》！我是你们的老朋友玛丽亚·奥斯特洛夫斯卡娅。今天，我们非常荣幸地邀请到了俄罗斯青年组织\"俄罗斯新世代\"的负责人伊万·弗罗利谢夫。伊万，众所周知，您的组织是那些渴望社会变革的年轻人的灯塔。能否请您谈谈你们的信念以及希望通过工作实现的目标？总的来说，就是你们的理念。\n\n-好的，玛丽亚，非常感谢您的提问。我们\"俄罗斯新世代\"致力于让普通人的声音被听到，比如我们国家存在对年轻家庭支持不足、地方工作条件恶劣以及腐败等问题。顺便说一句，上个月我们不得不为新库兹涅茨克的一家孤儿院筹集资金，购买食品、尿布和其他必需品。这是因为当地官员已经完全忘记了它的存在，就像他们经常忘记人民一样。所以，我们这些普通人必须团结起来，共同解决问题。\n\n-感谢您的回答。还有一个问题：您认为，您将激进青年聚集在麾下，是否可能导致您的组织或至少部分成员与当局发生直接冲突？\n\n-您看，玛丽亚，我衷心希望避免这种情况。是的，我们的政府并不完美，远非完美，这一点我们都明白。我们看到地方上的失误和糟糕的决策。但我们很难看清全局。毕竟，治理国家和管理一个小摊贩是两回事。因此，我个人支持我们的政府，并呼吁人们主动承担责任，但不要鲁莽行事，而是要理解政府的行动。所以，我坚信与当局对抗是得不偿失的决定。\n\n-感谢您详细而平衡的回答。我们的采访到此结束。但《路边广播》还在继续！接下来，我们将播放Shaman演唱的歌曲《我们》。请尽情欣赏！"
 russia.813.a: "我们的人民将以自豪的姿态战胜一切困难。"
 russia.814.t: "沙皇的新主席"
 russia.814.d: "前内阁主席与帝国的未来政治方向并不契合。沙皇决定借助新兴的激进保皇派势力，以确保对沙皇和俄罗斯帝国的绝对忠诚。\n\n为此，沙皇需要物色一位新的公众人物来推行他的激进政策。在新一代\"黑色百人团\"中，几位领袖及其组织已崭露头角。他们的政策核心基本一致，只是在手段和个人背景上存在细微差别。然而，选择其中一位，必然意味着其他人将被排挤至边缘。"
 russia.814.a: "……库里亚诺维奇。"
 russia.814.b: "……阿尔乔莫夫。"
 russia.814.c: "……托尔。"
 russia.815.t: "布尔科夫内阁倒台"
 russia.815.d: "布尔科夫政府因局势不稳而最终倒台。这个已经完全摒弃左翼思想的国家，根本无法接受布尔科夫的怪异政策。\n\n沙皇杜马通过了一项不信任投票，其主要由立宪民主党及其领袖鲍里斯·蒂托夫组织发起。在自由派和大部分保守派的支持下，他们成功弹劾了布尔科夫及其温和左翼内阁。\n\n此后，杜马举行了一次简短的投票，以选举新一任总理。"
 russia.815.a: "……鲍里斯·蒂托夫当选总理……"
 russia.816.t: "黑色百人团复辟"
 russia.816.d: "随着沙皇重掌俄罗斯最高权力，更激进的君主主义者卷土重来只是时间问题。\n\n许多老牌激进民族主义者已组建了自己的\"支持沙皇组织\"，但更准确地说，这更像是旧\"黑色百人团\"运动的死灰复燃。\n他们有不同的领袖，对激进主义的理解也略有差异，内部甚至已出现个人纷争。然而，有一点是明确的：他们效忠于帝国政府，并随时准备在必要时与任何左翼分子或被他们视为异己的人展开斗争。\n\n我们将密切关注他们。或许，他们会像过去一样，再次成为我们的得力工具。"
 russia.816.a: "天佑沙皇！"
 russia.817.t: "俄罗斯全军联盟重获新生"
 russia.817.d: "随着君主制的复辟与《十月宣言》的回归，帝国迎来了更为保守的忠君主义复兴，尤其在军队内部，这股潮流迅速壮大。\n\n其中，最具代表性的组织便是俄罗斯全军联盟，它自称是弗兰格尔所创组织的正统继承者。曾几何时，它不过是几个怀旧的君主主义军官的秘密社团，但如今，它已在帝国军队中迅速扩张，并吸引了大量现役军官和部分基层军人。\n\n多年来，该组织一直由伊戈尔·伊万诺夫担任全国主席，然而，随着新成员的大量加入，以及更具影响力人物的崛起，他最终被坚定的君主主义者、前德涅斯特领导人——瓦季姆·克拉斯诺谢利斯基所取代。\n\n俄罗斯全军联盟宣称自己是保卫俄罗斯民族与沙皇政权的铁壁铜墙，誓要抵御一切内外之敌。其立场日益激进，提出的许多主张极端反民主，甚至在帝国政治舞台上掀起了新的保守浪潮。"
 russia.817.a: "荣耀属于俄罗斯！"
 russia.818.t: "扎图林宰相遭枪击！"
 russia.818.d: "在圣彼得堡，亚历山大二世纪念碑正式揭幕。俄罗斯皇帝及皇室成员、扎图林宰相，以及众多随行官员和外国贵宾出席了这一隆重仪式。\n\n作为庆典的一部分，皇帝及其随行人员前往圣彼得堡市立剧院，观看歌剧《萨旦王的故事》。然而，就在演出开始前，城市安全局局长铁木尔·拉赫梅图拉收到了一则令人不安的情报——恐怖分子安娜·弗罗洛娃已潜入圣彼得堡，企图刺杀一名高级官员，甚至可能是沙皇本人。\n\n演出进行到第二幕幕间休息时，扎图林在乐池栏杆旁与交通部长罗曼·斯塔罗沃伊特及圣彼得堡知名贵族蒂皮谢夫伯爵交谈。突然，铁木尔·拉赫梅图拉接近扎图林，从马卡洛夫手枪中连开两枪——第一颗子弹击中扎图林的手臂，第二颗直入腹部，穿透肝脏！然而，奇迹发生了——圣弗拉基米尔十字勋章挡住了致命的子弹，使弹道发生偏移，避免直击心脏！\n\n尽管如此，子弹仍然穿透胸腔、胸膜、腹壁及肝脏，伤势极为严重。刺客当场被沙皇卫队制服，整个剧院里的人被迅速撤离，扎图林则被紧急送往市立医院，接受全国顶级外科医生的抢救。\n目前，宰相的伤势极为危重，存活的希望正逐渐渺茫……！"
 russia.818.a: "扎图林宰相不幸逝世……"
 russia.818.b: "扎图林宰相生还！"
 russia.819.t: "新宰相"
 russia.819.d: "扎图林宰相遇刺事件余波未平，政府运作仍须维系。当下须由沙皇钦定正式继任者。\n十月党内有数位显要政客可堪此任。第一位为维克托·沃多拉茨基，身为资深哥萨克阿塔曼的他代表党内强硬派系。若需侧重安保及防范异议势力恐怖行径，此人堪称合适人选。\n\n第二位为现任交通部长、前库尔斯克州长罗曼·斯塔罗沃伊特。其人以温和路线见长，在处理危机事务及运输系统整治方面资历颇深。\n\n最后是圣彼得堡州长德罗兹坚科，声名不显却能力出众。虽不是什么锐意进取的官僚，但于维持政府稳定方面仍不失为稳妥之选。"
 russia.819.a: "沃多拉茨基……"
 russia.819.b: "斯塔罗沃伊特……"
 russia.819.c: "德罗兹坚科……"
 russia.819.a1: "这种情况绝不能再发生了！俄罗斯需要一个强有力的宰相……"
 russia.820.t: "布尔科夫面临挑战！"
 russia.820.d: "党内对亚历山大·布尔科夫领导方式的不满者持续激增。此态势或源于党内新崛起的激进派系，该派通过与温和马克思主义者及前共产主义者合流壮大实力。\n矛盾在特别党代表大会上彻底爆发，布尔科夫被迫公开为其温和中间路线辩护，批评者指责他不愿将民主机构改革为更接近西方君主立宪制的模式。\n激进派系领袖米哈伊尔·马特维耶夫是俄罗斯联邦共产党前成员，现已与布尔什维克主义划清界限。他一直以非共产主义立场及偶现的民族主义观点著称。\n\n此刻布尔科夫即将登台阐述政府事务……"
 russia.820.a: "激进分子成功制服布尔科夫！"
 russia.820.b: "布尔科夫击败了对手！"
 russia.821.t: "罗戈津的新意识形态"
 russia.821.d: "当罗戈津登上宰相之位，他立志创建一种独具俄罗斯特色的意识形态，并将该意识形态作为国家在其领导下的指导方针。为此，他围绕三大核心理论构建了新的国家意识形态：\n\n新俄国革命：罗戈津的政策将采取更直接的革命手段。毕竟，相较于以往任何政权，他代表着对俄罗斯民族认同更激进、更前瞻的革新路线。国家将迈向极权统治，实行高度集权，彻底摒弃党派政治。所有决策将由忠于伟大领袖的国家官僚体系直接执行，而这些官僚皆由他亲自选拔。\n\n君主社会主义：新政权面临的一大挑战，是如何调和帝国传统与苏维埃遗产这两种截然不同的意识形态。然而，这种分裂并非不可逾越——我们将构建一套统一的理论体系，弥合俄罗斯历史上这两股对立的力量。沙皇与总书记，都曾做出正确或错误的决策，没有必要继续沿袭这种历史性的分裂。党派体系将进行改革，整合各派力量，团结一切忠于祖国的爱国者，共同推动国家复兴。\n\n秩序社会主义：最后一个选项或许更加激进，但同时也比前者更具社会主义色彩。它被称为秩序社会主义，即秩序与社会主义的结合。这一理念将国家视为革命先锋队，类似于早期布尔什维克对全球革命国家的构想。我们将同时运用民族主义的思想与社会主义的象征，吸引社会各阶层加入我们的事业。\n\n然而，这种做法将不可避免地在党内催生派系斗争，不同派别将围绕政策的\"左\"或\"右\"方向展开角力。"
 russia.821.a: "新俄国革命。"
 russia.821.b: "帝国与社会。"
 russia.821.c: "俄罗斯新秩序。"
 russia.822.t: "斯特列科夫与罗戈津重获政治话语权"
 russia.822.d: "随着斯卢茨基宣布将推动政治生活公开化，甚至暗示在完成系列改革后可能举行战后首次选举，许多在日里诺夫斯基时代因理念不合而游离于自民党之外的民族主义者正在重新占据俄罗斯政治舞台的核心位置。\n在这场真正民族主义俄罗斯运动中，德米特里·罗戈津与伊戈尔·吉尔金（斯特列科夫）堪称双璧。二人皆因与弗拉基米尔·日里诺夫斯基存在根本利益冲突，长期被排除在自民党权力体系之外。\n\n罗戈津，这位前副总理在争取民族主义者支持时大量运用苏联符号体系，极力美化苏联时期的社会生活。这种策略在日里诺夫斯基主政时期毫无施展空间，但借着所谓的斯卢茨基解冻期开始，他终于能自由表达政治理念。值得注意的是，即便不直接认同马克思主义意识形态，俄罗斯仍存在大量怀念苏联时代的群体，而罗戈津正是他们的政治代言人。如今他在祖国党找到立足点。这个被外界视为苏尔科夫政治工程的古老政党，在罗戈津通过党员支持率驱逐前任党主席后，已成为最契合其个人理念的政治平台。\n\n斯特列科夫-吉尔金，这位俄罗斯民族主义运动的活传奇，以德涅斯特河沿岸战争雇佣兵身份开启军事生涯，后自称成为顿巴斯战争的主要指挥官之一。其履历赢得大批军事帝国主义者的狂热崇拜。\n斯特列科夫的核心力量是只效忠于他个人的军事化团体。他把自己的支持者组织起来，成立了\"愤怒爱国者俱乐部\"，他们攻击任何其他他们认为无价值和不忠诚的人物。甚至公开批评日里诺夫斯基在特别军事行动中的指挥无能。现在，他又成立了\"激进爱国者联盟\"，力图在平民生活中以及军事生活中建立严格统治。"
 russia.822.a: "意料之中。"
 russia.823.t: "米尔恰科夫及其部下组织俄罗斯社会民族主义组织"
 russia.823.d: "米尔恰科夫究竟是谁？在某些人眼中，他或许是英雄；在另一些人看来，他是战犯、刽子手、恶魔，甚至——据部分传闻——是一名食人者。尽管日里诺夫斯基政府竭力阻止\"鲁西奇\"组织的思想传播，封禁其相关材料，试图遏制其影响力，但米尔恰科夫的名字仍在欧陆战争爆发后广为人知。\n\n事实上，无论是\"鲁西奇\"还是米尔恰科夫本人，在东欧战场上并未直接参与大部分战斗，但他们的恶名却如影随形，紧随战火蔓延。\n\n如今，随着战争落幕、斯卢茨基推行\"民主改革\"，这些人再次抬起头来。他们开始寻求\"政治未来\"，试图将自己的意识形态带入国家的主流话语。\n米尔恰科夫、托帕兹、彼得罗夫斯基的政治计划终于浮出水面！他们宣称，这将是一个\"强大的俄罗斯男儿\"齐聚一堂、捍卫国家根本利益与民族身份的组织——\"俄罗斯社会民族主义组织\"。\n\n尽管该组织本质上极端主义色彩浓厚，但在当下政治环境下，它或许有机会在地方议会站稳脚跟，甚至在即将到来的国家参议院选举中赢得一两个席位。"
 russia.823.a: "行吧。"
 russia.824.t: "长期民族主义者集结"
 russia.824.d: "近期改革催生了一批更为激进且带有民族主义倾向、时常拥护君主制的团体。在圣彼得堡与莫斯科的古老街巷中，立场强硬的俄罗斯民族主义者们再度集结，誓要捍卫他们眼中因自身弱点与布尔什维克主义侵蚀而陷入危机的俄罗斯。\n他们批评斯卢茨基，尽管这些民族主义者过去也曾批评已故的日里诺夫斯基，但如今却转而将他视为殉道者，声称他是遭犹太人或共产党人毒害而亡。此类阴谋论的具体细节往往因讲述者的不同而有所差异。\n他们的新口号与旧日宣言如出一辙，其中许多人已在政治前线奋战多年。\n他们高呼\"除了我们，还有谁能担当此任？\"，随后开始吟诵那些早已被世人遗忘的祷词——向沙皇家族、帝国荣光与圣母玛利亚致敬。\n\n将这些力量重新凝聚的组织，正是历史悠久的\"记忆\"协会。无论该组织是焕发新生还是重起炉灶已不重要，关键在于它已强势回归并渴望发声。\n\n尽管该组织本质具有极端主义色彩，但当前的政治气候或许会为其创造机遇，使其得以在地方市议会中获取一定影响力，甚至有望在即将到来的国家杜马选举中斩获一两个席位。"
 russia.824.a: "记忆协会……我们的圣父……"
 russia.825.t: "新俄罗斯红人"
 russia.825.d: "同胞们！我要告诉你们一个令人发指的消息！斯卢茨基\"清理\"了大地上的污秽，却让红色的幽灵重返街头！我没有开玩笑！今天，就在光天化日之下，一个可憎的\"帝国红毛\"竟然试图向我塞一张关于资本与劳动之战的传单！当然，作为文明人，我克制住了怒火，否则这只红色蠕虫早就倒在地上痛哭流涕了！于是，我收下了他的传单。\n\n可这，真的是我们战斗至今所换来的世界吗？那些披着\"大俄罗斯\"外衣的红色蛆虫，只会口头承认我们的边界，却将俄国的传统与社会主义的腐朽思想混杂在一起，竟然能够在伊热夫斯克这样的伟大城市肆意游荡，污染我们的街道？\n我们还能忍受多久，我亲爱的俄罗斯人民！我的读者们！我告诉你们，如果是日里诺夫斯基执政，这些红色爬虫早已被送进布季尔卡监狱，接受应有的制裁！而这，才是唯一正确的做法！\n\n俄罗斯属于柴可夫斯基，属于陀思妥耶夫斯基，而不是属于捷尔任斯基或贝利亚！列宁的尸体已经被抛弃，这很好……但克里姆林宫外那些腐朽的墓碑，也该一并铲除！可惜，你们的斯卢茨基——那些\"新时代青年\"寄托希望的家伙——绝不会这么做。在他眼中，这些红色蛆虫比我们更加重要，而他竟然还敢堂而皇之地说：\"民族民主首先是民主。\"杀招落下，棋局已定。可悲，可叹。\n\n摘自网名\"TimurArmatatulin91\"的个人在线杂志，原文拼写保留。"
 russia.825.a: "真吓人！"
 russia.827.t: "自民党召唤：最后战争"
 russia.827.d: "我们的投资某种意义上已结出了硕果。年轻的游戏开发者没有盲目冒险，而是选择了已颇具知名度的Mehsoft工作室——此前，该团队曾推出小型游戏《自民党召唤》(Call of LDPR)。如今，在充足资金支持下，他们得以打造续作，并在玩法上实现大幅升级。\n\n《自民党召唤：最后战争》是一款充满暴力与激情的射击游戏，玩家将在其中扮演日里诺夫斯基精英卫队的士兵，深入被新自由主义占领的欧洲腹地，展开血战。\n游戏包含多个关卡，每个关卡都独具特色，融入了不同欧盟地区的文化元素。玩家不仅要对抗形形色色的敌人，还将体验各种新奇的战斗机制。\n最终，玩家将抵达布鲁塞尔，在那里等待他们的，是赛博官僚与来自尼比鲁星球的终极蜥蜴人大Boss！尽管该游戏在国内收获了大量好评，但在多个欧盟国家遭到封禁，仅限于国内市场流通。然而，这并未影响我们的收益，反而使我们成功赢得了年轻玩家的喜爱，并在本土市场上实现盈利。"
 russia.827.a: "这肯定是件好事！"
 russia.828.t: "沙皇走肉2"
 russia.828.d: "我们的投资并未取得理想的回报。自民党青年组织决定支持知名度不高的开发商\"MachineJoy\"，该工作室此前唯一的代表作是视觉小说《沙皇走肉》。或许他们希望借助资金支持，开发者能够深化这一主题，以更具互动性的方式展现全俄罗斯沙皇的内心世界。\n然而，结果却截然不同。开发者并未延续原作风格，而是创造了一款完全不同的续作——一款充满《DOOM》风格的RPG射击游戏，讲述尼古拉·罗曼诺夫对抗共产主义者与英美侵略者的复仇之旅。\n\n在游戏剧情中，沙皇奇迹般地逃过了枪决，但年幼的皇太子被敌人掳走，去向不明。于是，尼古拉亲自披挂上阵，踏上复仇之路。游戏的画面风格极为特殊，叙事方式更是别具一格，但这一实验性尝试最终未能迎合主流玩家的口味，许多人仅从画面风格便对其望而却步。\n\n最终，我们既未能收回成本，也未能借此推动爱国主义教育。反倒是社交网络上涌现出无数调侃此事的\"资金去向\"梗图，成为网民热议的话题。"
 russia.828.a: "好吧……"
 russia.829.t: "成功之苦"
 russia.829.d: "在欧洲的辉煌胜利，以及昔日俄罗斯疆域的全面回归，为国家带来了无与伦比的荣耀与喜悦。然而，这场伟业也让我们的官僚体系、安全机构、军队与教育体系承受着前所未有的重压。\n\n不仅如此，我们在新收复领土中严重缺乏忠诚且不甚胜任的人员来填补各级政府职位，而自中亚和高加索被征服以来，治理的重压便已逐步显现。如今，这种压力在波罗的海地区和小俄罗斯的管理中尤为突出，我们难以完全掌控局势。与此同时，扩张所带来的\"贫困帝国边陲\"现象日益显现——非俄地区居民生活质量的下降，使他们在长期内难以完全融入国家体系。\n\n许多人认为，在如此短的时间内迅速收复大量领土，出现这些问题实属必然反应。"
 russia.829.a: "饭后便是清算之时。"
 russia.830.t: "俄罗斯资助的反对派！"
 russia.830.d: "在我国及欧洲各地的革命运动之中，一个由俄罗斯支持的恐怖组织——\"欧洲凤凰\"正悄然崛起。在俄国情报机构的庇护下，该组织成功整合了社会边缘群体中的激进分子，甚至有成员曾赴俄受训，随后被派遣至各国执行任务。\n\n他们的袭击目标多集中在乡村与小城镇——这些地区的管控相对薄弱，使其得以肆意破坏。\n尽管我国安全部队正全力打击，誓将这一威胁彻底铲除，但由于该组织的核心运作机构设立在莫斯科，使得我们的反恐行动更加艰难。"
 russia.830.a: "该死！"
 russia.831.t: "新地下组织"
 russia.831.d: "尽管我们在战前对反对派实施了严厉镇压，但如今，一个批评政府的新民主运动正在悄然兴起。这些人主要来自近期并入的领土，而非俄罗斯本土。此外，部分大城市的学生和年轻人也因近年日益加深的不满情绪而加入其中。\n\n与此同时，共产主义人民解放军的恐怖袭击以及反政府活动的增加，暴露了我们的诸多弱点。这一局势促使许多曾经冷漠或政治消极的人重新燃起斗争意识，投身反对势力。\n\n由于当前政权的整体不稳定，这些\"秘密\"社团已成为不满者和反对派表达立场的避风港。尽管它们远比过去的反对组织更为松散，且暴力倾向较低，但它们仍在误导人民的思想方向，甚至有人开始实施小规模的破坏与骚乱。"
 russia.831.a: "密切关注他们……"
 russia.832.t: "发射"
 russia.832.d: "\"十、九、八、七……\"——对阿列克谢·彼得罗维奇而言，这倒计时仿佛无尽延续。他站在距离发射场数公里外的特设观测点，双手紧握望远镜，目光一刻不离那即将冲向星空的探测器。\n\"只要它能升空，只要它能升空……\"——这是比科夫脑海中唯一萦绕的念头。\n\n即将飞向群星的\"休斯\"探测器，是他一生的心血。是的，他依然年轻——35岁，对于AMS的技术总监而言，无疑是极其年轻的年纪。然而，阿列克谢·彼得罗维奇经验丰富，自大学时代起，他便怀揣着重启苏联金星探测计划的梦想。而\"休斯\"的核心使命，便是寻找未来人类所需的放射性矿藏，等待科技进步的那一天，助力人类征服这颗炽热的行星。\n\n奇迹般地，他成功推动了自己的计划，而这在很大程度上得益于新政府的支持——当局公开谴责\"资本主义对航天事业的破坏性影响\"，并宣布重启\"恢复太空竞赛领导地位\"的征程。此刻，当运载火箭飞向远方，比科夫不禁想起了一首歌中的歌词……"
 russia.832.a: "\"我们生来，便是为了将童话化为现实。\""
 russia.833.t: "课余时间"
 russia.833.d: "\"那么，儿子，今天过得怎么样？都做了些什么？\"维尼亚明·安德烈耶维奇像往常一样，在家庭晚餐时向儿子发问。\n\n\"还不是老样子。晨祷，和信神的老逼登谈话，读《福音书》。\"列霞略显不耐地回答。\"我们到底什么时候才能做点真正有用的事？马上就要考试了！\"\n\n\"别这么消极，生活中的一切都有其意义，神学也不例外，尤其是现在。\"母亲连忙安慰道。\n\n\"是啊，我可受够了这些，服从父亲，不能做这个，不能做那个，否则就会下地狱的童话！如果我的脑子里全是圣经经文和一些陌生人的道德训诫，我该如何好好工作？\"\n\n\"再忍耐一下，等上了大学就好了。\"\n\n\"大学也是一样！年复一年，尽是这些无聊的教条！\"儿子愤愤地打断了话题。"
 russia.833.a: "\"也许，找个家教会更好……\""
 russia.834.t: "俄罗斯士兵的祈祷"
 russia.834.d: "莫斯科的雨已连续下了三天，但恶劣的天气并未能阻挡这一伟大仪式的举行——在武装力量主教堂内，为\"圣沙皇伊凡·瓦西里耶维奇独立卫戍旅\"举行的祝圣典礼。早在战争爆发前，这一仪式的筹备便已展开，而整个日程更是早已安排数月之久。\n\n\"战士们！\"——阿赫洛贝斯金的声音如雷霆般滚滚而来——\"末日审判的时刻近在眼前！这将是对欧布尔什维克、无神论者、俄罗斯之敌、信仰之敌的最后清算！\"\n\n数百名士兵整齐列阵，步枪高挂肩头。神父们穿梭其间，手持圣水洒向战士与他们的武器，为即将到来的征战赐予神圣庇佑。\n\n\"信仰自古庇护俄国英雄——库利科沃、波尔塔瓦、博罗季诺，乃至莫斯科城下，皆有基督之辉照耀战场！我们的先祖在圣像之下奋勇杀敌，以鲜血书写胜利！今日，俄罗斯大地在等待你们的凯旋！前进吧，信仰的战士们！\"\n\n阿赫洛贝斯金高举拳头，全场顿时爆发出震耳欲聋的呐喊——"
 russia.834.a: "GOIDA！"
 russia.835.t: "旁观者"
 russia.835.d: "瓦西里是进步大街赫鲁晓夫楼的管理员。做着一份没什么油水的差事——打扫楼道，联系相关部门按时修剪楼前草坪，当然还要通过监控盯着住户，把某些行为模式上报给当局。比如六号公寓的玛格丽塔·伊万诺娃，这个勤恳却总带着忧郁的女人。就在最近一次报告后不久，她突然交了好运：在住房和公共服务部门排队时，遇到了同样聪明的单身电工瓦西里·彼得罗维奇，虽然今天不知为何被派去了别处。如今几周过去，玛格丽塔每周二、五、六都有访客，连工作都顺遂起来。而十二号公寓的前住户阿尔卡季·韦尼阿米诺维奇私藏禁书，结果在突击检查中被调往北极地区工作。他当然矢口否认，可又能怎样？党组织说需要，那就是需要。\n\n偶尔瓦西里会想，自己这是在扮演上帝决定他人命运。但他马上否定了这个念头，不过是按章办事，再说生活中本就有巧合……不是吗？然而深夜里他总被噩梦惊醒。仿佛有人正用同样的方式监视着自己，用同样的笔触填写又一份报告。"
 russia.835.a: "但没什么好怕的，不是吗？"
 russia.836.t: "时间法庭"
 russia.836.d: "近期，一档名为\"时间法庭\"的全新节目以破竹之势席卷俄罗斯电视荧幕。这档聚焦历史题材的节目创新采用庭审形式：历史人物以证词方式讲述自身掌权历程与治国方略。由普通公民组成的陪审团与蒙眼忒弥斯女神形象的法官共同宣判。斯大林、列宁、亚历山大一世与托洛茨基已先后接受\"审判\"，前三位统治者获当庭无罪释放，托洛茨基则因勾结德国资本与盎格鲁-犹太复国主义集团而被判处极刑。\n\n该节目已创下现象级收视纪录，制作团队显然未有停步之意。据透露，未来不排除将外国统治者列为新一批\"被告\"。"
 russia.836.a: "好节目。"
 russia.837.t: "旋风历史"
 russia.837.d: "官方宣布对《旋风历史》项目的正式支持，这一决定令所有公民感到意外。该论坛长期以来一直是另类历史爱好者的聚集地，并已出版了数十本书，主要属于\"穿越者\"题材，即角色意外回到过去，成为改变历史的关键人物。\n\n如今，该网站已完成品牌升级，图书系列亦正式更名为《历史旋涡》。与此同时，一批新书即将问世。例如，《沙皇时代》，讲述俄帝士兵与德国红军鏖战的英勇事迹；《大洪水之后》，则描绘了一位法国贵族与美国伯爵在拿破仑胜利后的世界里缠绵悱恻的爱情故事；而《余烬》则是一部充满张力的末世剧，故事围绕一个家庭在20世纪初的灾难后艰难求生，他们必须穿越满目疮痍的俄罗斯，踏上前往传说中\"海参崴乐土\"的旅程。"
 russia.837.a: "也许我也应该买一本来看？"
 russia.838.t: "有些东西变了……"
 russia.838.d: "阳光灿烂，两名年轻人正穿过雅罗斯拉夫尔市中心。这座历经俄罗斯千年兴衰的古都在此动荡时期依然静默如常，除了中央广场新增的两辆步兵战车和一辆坦克。\n\"说真的，这荒唐日子什么时候是个头？\"\n\"老兄，‘俄罗斯无法用理智丈量’啊。\"另一人苦笑着回应。\n\"你细想：日里诺夫斯基当年的决策没错，要不咱们能打赢那场战争？如今他虽然不在了，但斯卢茨基提的民族民主与主权主张不都挺在理吗？怎么军方就突然翻脸了？\"\n\"谢尔盖，你懂的，要是咱们国家的人和事都讲逻辑，这会儿咱们早该在火星上喝伏特加了。\"\n\"唉，也许你是对的……\"话音未落，引擎轰鸣撕破夜幕——他们刚拐进州政府大楼前的广场，装甲车正从那里仓促撤离。战车几乎是擦着两人鼻尖疾驰而过，空气中弥漫着柴油尾气。\n\"他们搞什么鬼？\"\n\"我大概猜到了……\"同伴盯着手机低语。"
 russia.838.a: "……但是有些东西没有变。"
 russia.839.t: "扫除一切多余之物"
 russia.839.d: "\"你这个叛徒杂种！\"——伴随着这句话，卫戍军成员安德烈·达尼洛维奇猛地一拳砸向对手的下颚。那个肥胖的男人猝不及防，失去平衡，重重摔倒在地。墙上随意钉着的木架轻轻一震，一尊圣像从上方跌落，正好砸在倒地者的额头上。嘴角渗出鲜血的男人艰难地抬起手，捡起落在他额上的圣像。圣母玛利亚的目光漠然无情，冷冷注视着他的痛苦。随即，他的眼皮缓缓合上，意识沉入黑暗。\n\n\"接下来怎么办？\"安德烈转身看向瓦西里·帕夫洛维奇——那位效忠君主的老人，亦是他们旅团的指挥官。\n\n\"还能怎么办……把他送回家，让他家人好好看一看。\"瓦西里摆摆手，\"沃洛德卡，搭把手。\"\n\n\"明白！\"安德烈应声答道。而后，趁众人不注意，他悄悄摘下了昏迷男子腕上的手表。\n\n半小时后，卫戍军已齐聚在那栋房屋前，每个人手中都握着一瓶燃烧弹。\n\n\"瓦西里·帕夫洛维奇，这么漂亮的房子，烧了可惜啊。这可是典型的俄式老宅。\"\n\n\"哦，安德烈卡，凡是欺诈所得的财物，都不值得怜惜。他拿德国人的钱，而德国是我们的敌人。因此，他是叛徒，叛徒的房子就该被烧毁。\"\n\n\"好吧，听您的。来吧！\"\n\n\"动手！\"卫戍军中的第一人高声喊道，紧接着，五瓶燃烧弹几乎同时飞向建筑。一瓶精准地砸入敞开的窗户，烈焰立刻吞噬窗帘，旋即蔓延至木制墙板。\n\n围观的人群爆发出狂热的呐喊和口哨声。\"烧了它！烧了它！烧了它！烧了它！\"癫狂的欢呼与火焰的舞动交相辉映，仿佛整个广场都陷入了燃烧的狂喜，人群几乎抑制不住要围着烈焰起舞的冲动。而瓦西里·帕夫洛维奇只是静静地点燃一支烟，凝视远方，随后轻轻一挥手，率领部队转身走向汽车。"
 russia.839.a: "今天就到此为止吧。"
 russia.840.t: "[FROM.GetName]要求民间投资"
 russia.840.d: "[FROM.GetAdjective]当局一直请求我方对其新兴经济进行短期投资，以促进其发展。\n与我国顾问和利益集团的磋商进展顺利，对方已明确其重点发展领域。\n我们确实需要联盟内存在经济强劲的国家。\n\n但此举将消耗我国资本，且无法立竿见影地带来收益。或许这些资源投向其他领域更为有利……"
 russia.840.a: "尽我们可能支援兄弟国家"
 russia.840.b: "我们现在没有什么闲钱……"
 russia.841.t: "[FROM.GetName]要求军事投资"
 russia.841.d: "[FROM.GetAdjective]军方请求我方协助其新生武装力量发展壮大，希望获得先进武器装备支持，并援建其本土国防工业体系。\n我们确实需要军力可靠的盟友来守护共同安全。\n\n但此举将消耗我国战略资源，且无法立竿见影地带来收益。或许这些资源投向其他领域更为有利……"
 russia.841.a: "尽可能支援兄弟国家！"
 russia.841.b: "我们现在没有什么闲钱……"
 russia.842.t: "[FROM.GetName]请求陆军顾问"
 russia.842.d: "[FROM.GetName]军方高层已正式请求我方支援，希望俄军专家与教官传授我们卓越的战略体系，并按照俄军标准整训数个精锐营级部队。\n此举将显著深化与盟友的军事互信，全面提升其整体作战能力。"
 russia.842.a: "尽可能支援兄弟国家！"
 russia.842.b: "我们现在没有什么闲人……"
 russia.843.t: "这样的夜晚"
 russia.843.d: "多少光阴流逝？多少心血倾注？俄罗斯人民又经历了多少苦难？太多，多到难以计量。换作其他国家，或许早在颠覆传统生活方式的剧变中分崩离析；换作其他民族，很可能已在如此严峻，有时甚至难以承受的考验重压下屈服。但俄罗斯不会。\n\n刹那间，街灯尽灭。城市已然沉睡，纳杰日丁却仍在独行。这座与他渊源深厚的多尔戈普鲁德内市已换了人间，而一切改变皆因他而起。俄罗斯有多少城镇经他重塑？还有多少等待蜕变？又有多少人因他获得幸福生活的可能？\n昔日的冷血官僚们，每当他为民请命时总报以嗤笑。“不关你事。”“徒劳无功。”——这些话语至今在他脑海回荡。那时他不过是区区教师、微不足道的议员。如今，他正在书写历史。鲍里斯驻足仰首，黑暗中指引前路的明月显得如此亲切熟悉。这枚日日影响人类生活的天体，我们曾以它为航标，向它祈祷，为它魂牵梦萦——而它不过是块寻常岩石！仅此而已！一块平凡无奇的巨石，何以成为世间至要？\n纳杰日丁绽开笑容。寒风拂面，他却感受到阵阵暖意。\n或许此刻，他自己也成了这样的巨石？"
 russia.843.a: "一切皆有可能……"
 russia.844.t: "我们的党"
 russia.844.d: "解散全俄人民阵线的进程已经启动。是时候摧毁这个助长国家停滞与政治冷漠的机器了！我们率先迈出第一步，高调退出阵线，并号召全体国民激发公民意识。但随后我们发现，这场运动需要一个响亮而有趣的名字。要能抓住民众的心智，让他们知道有这样一个捍卫自身利益的政党存在！幸运的是，我们已经有了几个备选方案。"
 russia.844.a: "公民联盟"
 russia.844.b: "全俄罗斯公民阵线"
 russia.844.c: "希望党"
 russia.844.e: "右翼联合力量"
 russia.844.f: "俄罗斯自由党"
 russia.844.g: "战斗吧，纳杰日丁！"
 russia.845.t: "全俄人民阵线反腐大清洗"
 russia.845.d: "人人都清楚人民阵线是如何运作的——全凭关系办事。加入这个圈子，结交人脉，然后互相行方便。照例还要对半分账。正是这种可耻的勾当导致国家预算浪费在毫无意义的活动中，金钱在暗地里不断易手。更别提某些提案纯粹是为了中饱私囊。在这种情况下，国家机器怎么能有效运转？\n\n我们忍无可忍了！鲍里斯·纳杰日丁总统颁布新法令，下令对人民阵线的腐败展开全面调查。每份纳税申报和每笔资金拨付都将受到严格审查，最终作出裁决。当然，这项举措已遭到全俄人民阵线的抵制，他们指责现任总统搞\"政治迫害\"、玩民粹主义把戏。就让他们继续叫嚣吧。毕竟身正不怕影子斜，不是吗？"
 russia.845.a: "棒极了"
 russia.846.t: "扩大反腐战争"
 russia.846.d: "十几份报告再次堆在了纳杰日丁的办公桌上，每一份都涉及国家资金侵吞案。内务部经济安全和反腐败总局的探员们确实不是白吃干饭的，工作成效显著。但随着案件累积，现任总统逐渐认清一个事实：阵线腐败的规模简直触目惊心。连日来，加强反腐委员会职权的申请文件不断被呈递至总统办公室。当然，彻底肃清腐败乍听之下极具诱惑力，但如此强势的扩权从长远看未必能带来好结果——这个委员会很可能蜕变成新的政治勒索工具，其成员甚至可能沦为另一种形式的勒索者。我们显然不需要再打造一个权力巨大且高度自治的镇压机构，内务人民委员部的时代早已终结。不过或许这些担忧纯属多余？说不定当下正是我国最需要强力反腐机构的时刻？"
 russia.846.a: "没必要做得太过火。"
 russia.846.b: "只有铁拳才能战胜腐败。"
 russia.847.t: "政府重心"
 russia.847.d: "鲍里斯·纳杰日丁终于上台掌权，是时候为政府临时选定一个工作方向了。\n\n一方面，我们可以专注于支持文化活动。毕竟，现代俄罗斯常被诟病面临\"传统式微\"。这或许是我们争取温和右翼支持的机会？普通民众也必定会欢迎复兴文化的举措。\n\n另一方面，我们可着力扶持商业发展，这将有助于提振经济。换言之，还有什么比货架上充足的商品更能改善民生情绪呢？\n\n我们还可以选择优先整肃政府体系。纳杰日丁这样的改革者上台，势必引发官僚系统震荡。若能未雨绸缪调配资源，理顺体制，则可以规避风险，为可能出现的难题做好准备。"
 russia.847.a: "让我们专注于文化活动。"
 russia.847.b: "让我们专注于商业支持。"
 russia.847.c: "让我们专注于政府和谐。"
 russia.848.t: "凯旋"
 russia.848.d: "鲍里斯·鲍里索维奇缓步走出参议院府邸。陈腐的空气与经年不散的阴谋气息开始让他心烦，他早就想出去透口气了。万里无云的天空中，一轮蓝色的明月散发着柔和的光芒，照亮了克里姆林宫的铺路石。这难道不是散步的绝佳天气吗？纳杰日丁伸手从外衣口袋摸出有些皱褶的烟盒。一分钟后，烟卷边缘飘起缕缕青烟，他深深吸了一口。尼古丁的劲道微微灼烧喉咙，紧绷的神经稍得舒缓。他想起自己如何辗转多个党派，最终跻身德米特里·阿纳托利耶维奇的心腹圈。如何成为梅德韦杰夫的接班人。如何无畏挑战全俄人民阵线并最终……获胜。这一切仍带着某种诗意的荒诞。一个为理想奋战到底的男人，最终竟登顶权力之巅的故事。如今他已是总统，这个国家最有权势的人。\n\n纳杰日丁轻笑一声掐灭香烟，再度仰望月亮。它始终如此亲近，用它的光芒照亮整个星球，却又遥远得无人可及。但此刻的鲍里斯觉得，只要再使把劲就能触到它。在克里姆林宫又踱步片刻后，总统决定返回官邸。明天将是新的工作日，而今天？就到此为止吧。"
 russia.848.a: "我得说，今天过得很好。"
 russia.849.t: "全俄人民阵线垮台"
 russia.849.d: "尘埃落定！全俄人民阵线执行委员会主席米哈伊尔·米哈伊洛维奇·库兹涅佐夫在国家杜马例行会议上正式宣布联盟解散。尽管官方理由是阵线机制陈旧及议员履职积极性显著提升，但所有人都心知肚明，这是现任政府与纳杰日丁总统强势反腐与政治围剿的结果。眼见同僚接连落马，议员们纷纷选择退出阵线以求自保，最终导致该组织因人数不足而难以为继。阵线的瓦解虽造成短暂政治真空，但这一空白很快就会被新兴政党填补。此刻全俄多座城市爆发庆祝集会，成千上万的民众高呼“打倒平均主义！”“去他妈的阵线！该顾顾民众了！”。民间沸腾的声浪表明，这不仅是纳杰日丁与执政党内支持派的胜利，更是整个俄罗斯的胜利！"
 russia.849.a: "民主正突飞猛进。"
 russia.850.t: "余震"
 russia.850.d: "鲍里斯·纳杰日丁几乎是冲出参议院大楼的。他心脏抽紧，仿佛四周的墙壁正缓缓向他压来。街头的空气让他的头脑略微清醒了些，但还远远不够。颤抖的他摸索着从外衣口袋摸出一支孤零零的香烟点燃，浓烈的烟草灼烧着喉咙，焦臭味直冲鼻腔。吸了几口后，鲍里斯的呼吸才稍稍顺畅起来。他深吸一口气，想抬头看看天空，却怎么也做不到。尖锐的疼痛如针刺般在大脑中炸开。他太累了，厌倦了点头哈腰，厌倦了唯唯诺诺。这根本不是他对民众的承诺，更不是他踏入政坛的初衷。\n\n又一口烟。混沌的思绪慢慢清晰起来……自己是何等愚蠢啊！只是靠着运气挤进梅德韦杰夫的圈子，就妄想能改变什么，仿佛忘了曾经摔过多少跟头。哈！俄罗斯的体制已经磨掉了多少个这样的梦想家。或许，这就是宿命吧。\n\n鲍里斯·鲍里索维奇倚着砖墙缓缓滑坐在地，手中的香烟悄然掉落。此刻他只觉得身躯沉重如山，难以支撑。"
 russia.850.a: "该死。"
 russia.851.t: "战斗吧，纳杰日丁！"
 russia.851.d: "在国家杜马的下一次会议上，鲍里斯·鲍里索维奇显得异常阴郁。他很难适应自己的新角色。抗争毫无意义，他还能做什么呢？机会早已错失——如果那真的算是个机会，而不是他自欺欺人的幻影。深夜回到家，他精疲力竭地瘫倒在床上。明天又是枯燥重复的一天，日复一日，永无止境。睡前他习惯性刷起手机，突然在新闻推送中看到不寻常的东西。那是一段莫斯科集会的视频，街头爆发集会游行，数百人高举标语牌，人群间可以看到不时挥舞的三色旗。特别是在视频中捕捉到的一个震撼瞬间：全体人群齐声高呼 \"战斗吧，纳杰日丁！\"。随着指尖滑动，更多新闻涌现。原来这场运动已席卷多座城市，人们走上街头只为支持……他？看来……希望尚未湮灭。是啊，过往屡战屡败时都未放弃，如今又有什么理由退缩？这场战役远未结束，因为他不再是为自己和朋友而战，而是为全体俄罗斯人民而战。"
 russia.851.a: "战斗或失败。"
 russia.852.t: "不团结的联盟"
 russia.852.d: "我们的行动导致全俄人民阵线的凝聚力急剧下滑，阵线内部各派系不断提出相互矛盾的决议，致使所有工作陷入瘫痪。国家杜马更是争论不休，几乎丧失正常运作能力。若要维持稳定统治，就必须竭力避免此类乱象重演。"
 russia.852.a: "我们必须协商。"
 russia.853.t: "被驯服的利维坦"
 russia.853.d: "当鲍里斯·纳杰日丁就任总统时，全俄人民阵线成了他的绊脚石。这个永恒不变、顽固不化的联盟，曾扼杀国内一切改革尝试。它如同圣经传说中的恶兽，盘踞在政治生活的每个角落。但鲍里斯·鲍里索维奇没有退缩，若在初次受挫时就放弃，他根本不可能坐上俄罗斯联邦总统的位置。纳杰日丁逐步清除阵线中的冗余：激进派、维持现状派，这些人都与自由繁荣的国度格格不入。如今，这头看似不可战胜的恶兽终于低头。现在的全俄人民阵线真正反映俄罗斯人民的意志，其成员大多已成为忠于纳杰日丁的温和改革派。历史仍在书写，而执笔人将是人民与纳杰日丁同行。"
 russia.853.a: "等我们好戏退场。"
 russia.854.t: "透明政府"
 russia.854.d: "纳杰日丁改革方案的重要举措之一，是提升政府机构工作透明度。全俄人民阵线总体支持总统提案，但联盟内部对实施方式存在分歧。\n\n阵线右翼坚持分阶段推行公开原则，担忧骤然的激进改革可能导致政府工作失序甚至部分瘫痪。而左翼则发出更激进的声音，支持者坚信只有立即清除涉腐及问题官员，由具备坚定信仰的新人接替，改革才能见效。\n\n尽管观点迥异，讨论不应陷入僵局。因此国家杜马最终决定……"
 russia.854.a: "慢慢改革体制。"
 russia.854.b: "是时候把寄生虫都赶走了！"
 russia.855.t: "养老金计划"
 russia.855.d: "养老金改革已成为当前改革政策中最受关注的领域之一。总统已明确制定修订养老金政策的方针，而人民阵线联盟虽整体支持，但在实现路径上存在分歧。\n\n保守派主张提高养老金支付标准和社会福利，认为改善老年群体生活质量不应以颠覆现行社会体系为代价。他们强调预算可持续性比短期让步更重要，呼吁采取平衡且经济稳健的方案。\n\n左翼则力主直接降低退休年龄，坚持公民有权早于现行标准享受应得的休憩。其论点则基于社会公正原则与对劳动者的关怀。\n\n两种方案各有依据，但需谨记联盟必须保持团结，因此决策务必慎之又慎。"
 russia.855.a: "增加福利和退休金。"
 russia.855.b: "降低退休年龄。"
 russia.856.t: "税收变动"
 russia.856.d: "税收改革审议已成为纳杰日丁政府的又一争议焦点。总统提案虽获多数支持，却立刻暴露出联盟内部分歧：税负再分配问题既关乎经济优先级，又触及全俄人民阵线各派系的意识形态根基。\n\n阵线右翼主张为中小企业实施税收减免，强调这将为经济注入必要动力，激发创业活力并创造就业机会。\n\n而左翼则坚持推行累进税制，认为只有公平的税负再分配才能消除社会不公，并为现有社会项目提供额外资金。\n\n尽管两种方案各有利弊，但必须充分考虑联盟各派系的整体立场。"
 russia.856.a: "实行纳杰日丁免税期。"
 russia.856.b: "实行累进税制。"
 russia.857.t: "反垄断计划"
 russia.857.d: "作为纳杰日丁改革的重要组成部分，反垄断计划在全俄人民阵线内获得了罕见共识。左右两派均承认必须遏制大型企业影响力，但在政府干预尺度上仍存分歧。\n\n右翼坚持审慎路线，强调过度施压可能引发不可预见的后果，拖累经济发展。\n\n左翼则要求采取更严厉措施，认为只有通过严格限制和反垄断机构的强势介入，才能重建公平市场环境，保障公民与小微企业权益。\n\n鉴于议题敏感性，国家杜马最终决定……"
 russia.857.a: "施加限制。"
 russia.857.b: "施加严格限制。"
 russia.858.t: "幕后故事"
 russia.858.d: "当弗拉季斯拉夫·达万科夫走进总统办公室时，他大为惊讶。房间略显狭小，但整体很舒适。黑胶唱机流淌着音乐，灿烂的阳光透过大窗户洒进办公室。俄罗斯联邦总统本人就站在这扇窗前眺望着远方，直到关门声响起才转过身来。\n\n\"啊，你好啊弗拉德，抱歉刚才走神了。\"鲍里斯转身快步走向客人，伸出手来。\n\"您好，鲍里斯·鲍里索维奇，您找我有什么事？\"弗拉季斯拉夫带着浅笑问道。纳杰日丁的握手力道出乎意料地大，这位新人党领导人甚至愣怔了一瞬。\n\"相信我，我们要谈的事可不少。先坐下说吧。\"\n刚落座，总统就取出保温壶和两个杯子。\n\"看来您准备充分。\"\n\"必须的。想要变革，就得提前准备。\"鲍里斯脸上露出意味深长的笑容，\"那么，就从你对新改革的看法开始吧……\""
 russia.858.a: "早跟您说过，眼下正是大好光景。"
 russia.859.t: "第二届纳杰日丁政府"
 russia.859.d: "全俄人民阵线本身并非糟糕的构想，只是其前任领导层……与我们对俄罗斯未来的愿景格格不入，如今正是内阁改组的时机。\n\n最棘手的，莫过于新总理的人选。\n\n一方是达里娅·别谢金娜——2019年\"智慧投票\"活动的宠儿，前\"亚博卢\"党成员，莫斯科州杜马议员。她立场鲜明地奉行自由主义，多次公开主张扩大并保障俄罗斯公民权利，包括性少数群体等边缘人群的权益。任命一位女性总理，且是如此激进的改革派，将向全世界证明纳杰日丁带来的变革绝非空谈。\n\n另一方则是更为稳健的选择：克里米亚活动家、年轻政客德米特里·基希耶夫。在普京去世前，他曾协助众多自由派策划竞选活动，梅德韦杰夫时期更是纳杰日丁的得力助手。这位敢于迎接挑战的实干家，若获任命必将不负众望。"
 russia.859.a: "达里娅·别谢金娜将成为新任总理！"
 russia.859.b: "德米特里·基希耶夫将成为新任总理！"
 russia.860.t: "扑克之夜"
 russia.860.d: "纳杰日丁的办公室灯火通明，与窗外的夜色形成鲜明对比。长桌两侧对坐着两人——一边是现任总统鲍里斯·纳杰日丁本人，另一边则是刚成为全俄人民阵线正式成员的年轻政客、知名博主马克西姆·卡茨。他们正如同体面的绅士那般玩着扑克。\n\n\"坦白说，马克西姆，我没想到你能这么快获得如此多的支持。\"\n\"鲍里斯·鲍里索维奇，您很清楚我们国家的现状，说真话的声音总会找到听众。而这些听众，自然乐意支持诚实的人，不是吗？\"马克西姆微微勾起嘴角。\n\"仅此而已？有意思。不过我更好奇，尽管你在特别军事行动初期选择移民……\"\n\"容我直言，我一直强调自己首先是俄罗斯政治家，代表的是俄罗斯人民的利益。第二国籍身份从不妨碍这一点。\"\n\"啊，抱歉，是我失言了。\"鲍里斯摩挲着纸牌，\"那么，你打算如何改变这个国家？\"\n\n\"我们都清楚国家需要全面改革，无论是社会领域，还是全俄人民阵线的架构……\"\n\"能否具体说说？\"\n\"这恐怕需要长谈，而您日理万机……\"\n\n\"我吗？\"纳杰日丁和善地笑了，从桌下取出保温壶。\"知道吗，政治就像打扑克——最忌讳的就是操之过急。\""
 russia.860.a: "笑得真诚一点。"
 russia.861.t: "继承者"
 russia.861.d: "无论如何，鲍里斯·纳杰日丁并非不朽。他也不会在这个位置上停留太久。他迟早要离开，因此有必要提前考虑谁将成为他的继任者，但做出选择并不容易，需要很多时间来考虑谁将代表俄罗斯人民。"
 russia.861.a: "别谢金娜"
 russia.861.b: "基希耶夫"
 russia.861.c: "卡茨"
 russia.862.t: "同别谢金娜交谈"
 russia.862.d: "国家杜马会议结束后，达里娅·别谢金娜疲惫地走出大厅。她倚着墙壁深深吸气，又缓缓吐出——喧嚣的会议之后，新鲜空气终于让思绪稍显清明。就在这时，她忽然感到有人轻触她的肩膀。侧目望去，竟是鲍里斯·纳杰日丁本人。\n\n\"还好吗，达莎？身体吃得消？\"\n\"没事的，鲍里斯·鲍里索维奇，只是有点累。\"\n\"该休息时就得休息。\"纳杰日丁意味深长地望向远方，又将目光直直投回达里娅眼底，\"知道吗，你的笑容很动人，就像我妻子卡佳年轻时一样。\"\n\"真的吗？\"女议员局促地笑了。能得到俄罗斯联邦总统如此称赞可不是常有的事。\n\"千真万确。\"纳杰日丁微笑着点了点头，\"记住我今天的话。我活到这个岁数，也算明白了些道理，永远别改变你的原则，否则不知不觉间就会变成另一个人。到那时，连自己都会厌恶镜中的面孔。所以，永远别弄丢这个笑容。至于那些闲言碎语，随它们去罢。\"\n\"感谢您的教诲……我一定谨记在心！\""
 russia.862.a: "寻找人生目标，而不是寻找理由！"
 russia.863.t: "与基西耶夫一起抽一根"
 russia.863.d: "颇具讽刺的是，国家杜马大楼没有专门的\"吸烟室\"，议员们只得到下院入口附近的一个专用亭子里吸烟。德米特里·基希耶夫就常在这里消磨时间，尤其在激烈会议之后。这天，当纳杰日丁透过玻璃顶望向亭内时，又撞见了他的身影。\n\n\"介意我凑个热闹吗，季马？\"\n\"您这说的什么话，鲍里斯·鲍里索维奇？俄罗斯联邦总统要坐，我还能拦着不成？\"\n纳杰日丁缓缓在他身旁的长椅坐下，重重地叹了口气。\n德米特里把手伸进西装口袋，然后递给纳杰日丁一包香烟。\n\"别介，我这儿自备着呢。\"鲍里斯从自己烟盒抖出一支点燃，深深吸了一口，\"说起来，自弗拉基米尔·弗拉基米罗维奇离开后，多少年了……六年了，真是世事变迁啊是不？季马，你当年搞运动的时候，肯定没想过会在这儿抽烟吧。\"\n\"确实。我起初只是个活动家，后来帮理想主义者组织竞选……\"\n\"要是时运不同，说不定你也会帮我组织呢。\"\n\"唔……那恐怕得先上谷歌搜搜您是谁。\"\n\n两人的笑声在玻璃亭内回荡。此刻仿佛所有的压力与忧虑都暂时消退，全俄人民阵线没有烦心事，只有老友并肩吞云吐雾。\n\"不过啊，季马。\"纳杰日丁忽然敛起笑容，连脸上的红晕都褪去了。\"生活就是这样，永远都猜不透下一秒会怎么样。最重要的是做出一个不会后悔的选择。我从未后悔过我的选择。\"\n\"我也是。\""
 russia.863.a: "必须保持直线前进。"
 russia.864.t: "于冠军之殿"
 russia.864.d: "鲍里斯·纳杰日丁今天早早地走进了办公室。没有什么特别的理由或需要，他只是决定提前开始工作。总统脱下外套，往留声机上放了一张唱片，坐到椅子上。房间仍有些闷热。有那么一瞬间，他脑海里闪过脱掉衣服的念头——毕竟清晨很少有人会来这间办公室，但这个荒谬的想法几乎立刻就被他否决了。不过总统还是决定做点什么，于是他走向窗边。温暖的阳光正缓缓铺展在尚未完全苏醒的莫斯科上空，窗外的花园美得令人心醉。\n\n新鲜空气猛地灌进办公室，总统终于能畅快地深呼吸。自由的滋味想必就是如此。在纳杰日丁执政下，数百万俄罗斯人同样能这样自由呼吸。而眼前这幅景象，如此美好……让人想永远欣赏下去。\n\n但真的值得永远吗？当然，这次看到的景色很美，下次也会很美。但第十次呢？不！第一百次呢？还能带来同样的震撼吗？纳杰日丁的改革对许多人而言如同新风，可然后呢？总统本人明确表示不会恋栈权位，这与他整个任期推行的政策理念相悖。终究会有人继承他的位置，最好未雨绸缪……\n\n不过此刻或许可以暂缓考虑。纳杰日丁值得享受这片刻宁静。"
 russia.864.a: "不知未来将会如何……"
 russia.865.t: "音乐之力"
 russia.865.d: "莫斯科时间19:07，十二月党人街8号。蜿蜒不绝的投票队伍正缓慢移动。尽管所有人都心知肚明，这场战胜北约后的总统选举不会与以往有任何不同，哪怕要在寒风中排队数小时并忍受队伍中此起彼伏的抱怨声，仍有无数俄罗斯人认为有必要表明立场，前来投票。\n\n突然，希望之声从后方传来：\n\"朋友们，还没冻僵吧？\"\n候选人鲍里斯·纳杰日丁竟亲自出现在\"选举长廊\"旁。他和煦的微笑、蒙着雾气的眼镜与整洁的夹克，立刻引发人群欢腾。纳杰日丁环视队伍咧嘴一笑：\n\"看你们疲惫又坚定的表情，等了很久吧？我来给大家提提神！\"\n\n女儿安娜斯塔西娅迅速支起折叠椅，这位俄罗斯联邦总统竞选人随即坐下。他取出吉他轻抚琴弦，默想着要弹的旋律，而女儿早已为父亲架好麦克风与小音箱。随着手臂摆动，纳杰日丁父女唱起的歌谣，瞬间温暖了整条队伍的心灵。"
 russia.865.a: "希望永存。"
 russia.866.t: "欧尔班归来"
 russia.866.d: ""
 russia.866.a: ""
 russia.867.t: "兴奋至死"
 russia.867.d: "掌权者与政府采取的非传统管理风格和大胆的改革，常常带来意想不到的后果。其中之一便是，国家政治生活的重塑催生了首都赌场的新生。\n\n这些初出茅庐的企业家们，就像拴着绳子的狗，低调地游走，拼命追随当地的波希米亚人和新崛起的俄罗斯政客。每到周日的夜晚，他们总是不约而同地汇聚到莫斯科的赌博大厅。这里发生的场景，更像是一个舞会，而非单纯的赌局。有人急于结交新朋友，有人则对不断增长的丑闻与流言蜚语充满了兴趣，还有人仅仅是想要打发时光。尽管这里的阵容各异，但每一个在场的人都有一个不言而喻的规矩——没有人是在为大额赌注而赌。\n那些胆敢吸引群众注意、赢得大手笔的傻大胆，最终只会引来冷漠的目光与轻蔑的姿态。几个小时之后，这些年轻的赌徒无一例外地加入了那支逐渐壮大的队伍，成为那些丧失所有财富的\"失败者\"，而他们的进入将被长时间禁止。\n在这场破碎命运的背后，那些无用的\"创造者\"与每遇见一个人便紧抓不放的存在，平静地旁观这场低调的盛宴，他们从不饮酒，也从不参赌。\n\"谢尔盖，你的名单里有马尔科夫吗？\"\n\"有，当然有，怎么了？\"\n\"把他从名单上划掉，他刚刚在牌桌上输光了所有的钱。\"\n\"啊……天哪，我今天才遇到他！他怎么就不能安安静静地待着呢？\"\n\"忘了他吧，继续盯着那些议员。他们喝醉后，什么你该知道的、或不该知道的事儿都会告诉你。这可是我自己摸索的独门诀窍。\"\n\"哦，谢谢！我刚开始还以为这个工作会有点意思呢……\""
 russia.867.a: "不敢冒险的人，只会把钱花在香槟上。"
 russia.868.t: "大满贯"
 russia.868.d: "衣衫不整的陌生男子闯入了人满为患的赌场，后面跟着他瘦弱的助手，后者几乎拖着两个装满现金的公文包。\n\"斯蒂夫，把钱拿出来。这是什么？一美元，斯蒂夫？把这个……呸……把这个该死的公文包丢了，给我……嗯……一些真正的钱。\"\n显然喝醉的男子抱着筹码，步伐蹒跚，试图找到最近的赌桌，完全不顾周围的一切。\n\"一百……\"\n\"格林先生打算赌十万，请。\"\n\"更多……我……我赌五百。\"\n喧嚣的赌客坐下，拿到了18点，荷官点了22点。太多了！赢了！\n\n\"格林先生，您赢了！\"\n他赢了？怎么赢的？一次次加大赌注，他居然能赢？这不是二十一点，这简直就是抢劫！\n\"即-即徐…继续…\"\n一局接一局的投注吸引了越来越多的围观人群。即使他的病态肤色本该让人退避三舍，但无法抑制的好奇心驱使着大家靠近。随着时间推移，整个赌场都聚集在看这个外国人的赌局。\n\n\"更多！十！我要赌十！\"\n\"16点，格林先生。您有16点，\"斯蒂夫低声说道。\n\"嗯……我……我不能了，太多了。心脏……啊啊啊……\"赌客喃喃自语，失去意识。\n\n\"格林先生？格林先生，您还好吗？他不回答了。看起来他头撞在了桌子上。我觉得，嗯……那算是一次动作了。发牌！\"\n颤抖的荷官咬牙切齿，做了自己必须做的事。五点。\n\n\"二十一点！格林先生！您赢了！二千万是您的！格林先生！起来！\"\n\n\"呃……是的……好的……还是……带我……回家……我感觉，咳咳，不太舒服。\"\n\n\"您的心脏？三天之内第三次了？格林先生，您应该更注意自己，来吧，我来处理一切。\"\n这位不寻常的男子依靠着助手，急匆匆地朝出口走去，把他新赢得的筹码撒向那些目瞪口呆的围观者。\n\n\"你知道的，斯蒂夫……我可是一位好心的赏钱人……这是。嗯……这是……五卢布……\"\n\n\"哇！谢谢您，格林先生。\"\n\n\"没问题，斯蒂夫。毕竟，你总是给我带来好运！\""
 russia.868.a: "这位先生给周围的人留下了深刻的印象。"
 russia.868.b: "最后，那些警官成为了见证者。"
 russia.869.t: "美国食谱"
 russia.869.d: "\"格林先生？街上站着好几个人，他们想见您！老实说，我不清楚他们是谁，但他们，呃……\"\n\n\"竞争者…斯蒂夫，他们是在试图摧毁我们。我不会让我们的成果再度化为灰烬。我会去见他们，但一旦他们做出任何动作，你就赶紧跑……\"\n\n\"格林先生！\"\n\n一位美国商人推开了自己生意的门，步入了熙熙攘攘的人群。他并未醉酒，但迈出的每一步都显得异常艰难。他摆出战斗的姿态，准备捍卫自己的作品。\n\n\"格林先生！真的是您！您真是我们所有人的巨大鼓舞！\"\n\"格林先生！您还记得我吗？一个月前，您给了我一些钱！我想感谢您！这里！这里拿着！\"\n\"杰里米！你看起来依旧不错！你搞的生意相当不错。需要帮忙吗？我准备收购你所有的东西！\"\n\n工厂老板对俄语了解不多，几乎听不懂那些互相喊叫的断断续续的话语，但就在那一刻，他感到一种奇异的释然。\n\n几年前，他的生意被摧毁、被抢劫，陷入一片废墟。长时间以来，他和忠实的助手一起游走于世界各地，寻找栖身之所，但现在呢？不再有艰难与痛苦，不再有忧虑与失落。他是否真的找到了属于自己的家？\n\n整理好思绪，格林先生挺直了腰背，整理了一下肩膀，面带微笑地看向在场的人们。察觉到大家的关注，他自信地说道："
 russia.869.a: "你们想不想做慈善？"
 russia.870.t: "税务申报"
 russia.870.d: "\"我把你派到那个该死的赌场干什么？是让你放松一下吗？是让你向我汇报些胡扯吗？一个醉醺醺的美国人对你做了什么？嗯？你真是找错地方找间谍了！\"\n\n\"少校同志，可是您自己说过……报告，必要时采取果断的独立行动，警惕并保护我们国家及人民的社会重要设施……我就是按您的指示做的！\"\n\n\"按指示？那你为什么把他锁起来？他做了什么？吓坏了荷官？把老板搞魔怔了？中尉！他可以开车还可能超速了。告诉我！我很乐意帮你！你很快就能从联邦安全局调去交通警察了！祖国把一个特别危险且重要的保护与情报收集任务交给了你！这是一个机密任务，中尉！你明白吗？如果这只是个诱饵怎么办？如果敌人趁机进入大楼，拿着武器怎么办？\"\n\n\"少校同志，晚上的情况本来很顺利，结果突然两个尖叫的暴徒闯进了大厅！我们决定逮捕这些非常可疑的外国人！我们无法对他们的行为视而不见！我们根本不知道他们是谁！\"\n\n\"没错！你们根本不知道他们是谁！但是我知道！一个生病的、老年高血压患者和他的伙伴，用那张恶心的脸在宣传健身房！这就是他们的身份！\"\n\n\"但我们……\"\n\n\"你们……结果怎样，嗯？一万？你是说那个人一夜之间在赌场赢了二千万，却没时间交一万卢布的税？这就是你们的\"世界罪犯\"？放了这些可怜的傻子！如果他们能自己走到出口的话。滚出去。\"\n\n\"是，少校同志。\""
 russia.870.a: "谢尔盖，我觉得我们有点做过头了。"
 russia.871.t: "神奇格林在哪里"
 russia.871.d: "几周过去了，那个神秘外国人闯入首都赌场、大发一笔横财后，便如同一阵风一样消失得无影无踪，仿佛什么特别的事情从未发生。日复一日的平凡夜晚变得愈发乏味，政治上的争斗和丑闻也渐渐被人们遗忘。每次人们再次走进赌场大厅，他们都希望能再次见到那个奇迹——那个大声喧哗、衣衫不整、从未失败的商人——那个短暂而耀眼的财富象征。\n\n随着时间的推移，所有的谈话几乎都围绕着这一事件展开。有些人试图通过他们的关系寻找那个神秘的美国人，另一些人则与自己的熟人交流，并意外地得知，那位成功的玩家早已循序渐进地在莫斯科的每一家赌场中游走，每次都以同样的方式获得成功。\n\n突然，人群中响起了一个自信的声音：\n\n\"杰里米·格林！这是他的全名。凭借他赚到的钱，最近他在两小时车程之外买下了一家巧克力厂。这就是答案！\"\n\n显然，那个揭露秘密的人本想扑灭大家对美国人身份的好奇，试图把话题引向另一个方向，然而，效果却恰恰相反。\n\n第二天清晨，几十辆豪华车疾驰向巧克力厂。是想探知商业秘密吗？还是说他们想期待见到一些超自然的景象？"
 russia.871.a: "最有可能的是，人们总是会被一些微不足道的事情所驱使。"
 russia.872.t: "特快列车"
 russia.872.d: "长久以来，弗拉基米尔·弗拉基米罗维奇都选择乘飞机出访，很少乘坐火车。但这次从故乡圣彼得堡返回时，他决定搭乘专列。在用完晚餐、服下顶级医师配制的药物后，普京凝视着窗外掠过的景色，广袤森林、无垠田野、蜿蜒河流，以及这个伟大国度中星罗棋布的村庄。\n\n\"需要什么吗，弗拉基米尔·弗拉基米罗维奇？\"警卫长就寝前请示道。\n\n\"不用了，谢谢，米沙。去休息吧。\"普京用平稳克制的声线回答。米哈伊尔随即走向安保车厢。\n\n但这位领导人的思绪片刻未停。他正思考着祖国俄罗斯的未来：国际局势正处于空前有利的态势，冷战\"胜利者\"美国正陷入可怕的内战泥潭，欧洲被迫独自面对俄罗斯，冲突已不可避免。明斯克协议只是暂时冻结了乌克兰问题，远非彻底解决。令他忧虑的是，国家尚未做好大战准备。一阵咳嗽突然袭来。这该死的症状纠缠他许久了。诊断结果直白得可怕：新冠肺炎。考虑到年龄、病程特征以及二十余年执政积劳，普京正在死神手中争夺最后时光。宏图待展，而光阴迫蹙。\n\n俄罗斯历史上或许从未出现过如此机遇窗口期：多极化世界、俄罗斯世界、昔日荣光重现……"
 russia.872.a: "火车奔腾向前……"
 russia.873.t: "回忆"
 russia.873.d: "那时的他正值盛年、精力充沛：第二个总统任期刚刚开始，莫斯科剧院人质事件与别斯兰惨案的阴霾已然消散，俄罗斯经济正从九十年代的废墟中涅槃重生。民众时隔多年首次相信，那物资短缺、动荡不安与惶惶不可终日的岁月终于画上了句点。事实确实如此。\n\n普里什蒂纳机场的钢铁洪流向北约宣告：未来的对话将在平等基础上展开，再不会有\"布什的鸡腿\"这类西方的施舍。俄罗斯追求的是合作共赢与独立自主，而非俯首称臣；它博采众长却绝不盲从欧美的错误道路。与东方的合作令这个横跨欧亚的国度日益强盛，真正成为连接两大洲的陆桥。诚然，俄罗斯是片充满机遇的土地，但凡怀揣赤诚热爱投入她怀抱的人，都能在此获得温暖庇护。\n\n未来的俄罗斯还将面临全球金融危机、乌克兰广场革命与顿巴斯战火，制裁大棒尚未落下，疫情阴云也未席卷世界。但此刻的普京无从知晓这些。俄罗斯正行驶在通往幸福的轨道上，而掌舵人弗拉基米尔·弗拉基米罗维奇·普京，将带领他的国家坚定前行。"
 russia.873.a: "此刻，他只是在享受阳光……"
 russia.874.t: "战损评估"
 russia.874.d: "战争带来的不仅是胜利，还有对敌方造成重大破坏的清醒认知。\n\n此次军事行动是自卫国战争以来欧洲规模最大的战役。相关部门已对各地区受损情况完成评估。新领土遭受的破坏最为严重，包括纳尔瓦和德维纳地区，以及白俄罗斯共和国部分区域；加里宁格勒和德涅斯特河沿岸摩尔达维亚共和国同样损失重大，克里米亚半岛也受到严重波及。但其中，新俄罗斯地区遭受的创伤最为触目惊心。初步估计损失高达数百亿卢布，这些地区的重建工作将需要倾注巨大的人力物力。\n\n专家们对俄罗斯联邦的恢复能力充满信心。充足的人力储备与经济实力，必将使这些地区重焕生机。未来，新俄罗斯地区必将成为俄罗斯联邦最具发展活力的区域之一。"
 russia.874.a: "我们赢得了战争，也必将赢得和平时代的荣光！"
 russia.875.t: "新任联盟国家联合主席"
 russia.875.d: "随着时间的推移，更新联盟国的领导集体已显得至关重要。此项任务刻不容缓，任何延误都可能带来风险。新的领导人能够为我们与白俄罗斯的关系注入新的活力，并为管理联盟事务提供新思路。此外，新任领导人不久后还将出任白俄罗斯总统职务。\n\n在白俄罗斯政界，不乏能够胜任这一角色的合适人选。"
 russia.875.a: "维克多·卢卡申科。"
 russia.875.b: "尼古拉·乌拉霍维奇。"
 russia.875.c: "奥列格·罗曼诺夫。"
 russia.875.f: "安娜·卡纳帕茨卡娅。"
 russia.876.t: "克里姆林之塔"
 russia.876.d: "在克里姆林宫的权力高层，众多权势人物构成了一个所谓的\"克里姆林宫之塔\"——这是一个比喻，用以形容国家内部各种利益与野心交织的框架。对这些派系的划分有多种方式，有人认为仅有两派——自由派和强硬派，而另一些人则认为多达十派。不过，最广为接受的观点是，其中至少有四个关键团体：西罗维基、技术官僚、体制内自由派和新沙皇派。\n\n每个派系都有自己的政治议程，但他们对国家治理的不同方针，也让克里姆林宫得以根据维持稳定的需要有选择地扶持某一方。为了维持平衡，没有任何一个派系能一家独大；他们的影响力必须交替消长，或被暂时搁置。毕竟，他们终究只是向当权者提供建议的角色而已。"
 russia.876.a: "晋升西罗维基干部。"
 russia.876.b: "晋升技术官僚干部。"
 russia.876.c: "晋升体制内自由派干部。"
 russia.876.f: "晋升新沙皇派干部。"
 russia.876.k: "今天不想支持他们中的任何一个。"
 russia.877.t: "2021年国家杜马选举"
 russia.877.d: "根据俄罗斯中央选举委员会（CEC）公布的数据，本次选举的最终投票率为51.72%。\n在国家杜马选举中，统一俄罗斯党获得324席（从而取得宪法多数），俄罗斯联邦共产党57席，公正俄罗斯—为了真理党27席，俄罗斯自由民主党21席，新人民党13席；公民平台党、祖国党与增长党各1席；无党籍自荐候选人共获5席。\n\n政治学者、国际政治专业研究所所长叶夫根尼·明琴科在接受《俄罗斯日报》采访时称，本次竞选\"非常有趣\"，并指出存在多条议题线：\"一方面保护主义与保守主义议程与相当一部分选民产生共鸣；\n另一方面是反对派的议程，进入议会的几支政治力量围绕此相互角力。\"\n他还指出，第三条议题线是新旧政党的竞争。\"从其他相对新兴政党仅获得微弱百分比的结果来看，新人民党成功成为了新兴力量的一极。\"\n\n新人民党作为杜马\"新面孔\"，其政治纲领立足于社群主义理念，并以推动商业发展为核心话语。"
 russia.877.a: "我们欢迎新成员。"
 russia.878.t: "新杜马主席"
 russia.878.d: "国家杜马主席在监督俄罗斯立法机构的日常运作中居于关键位置。这些政客各有自己的议程与优先事项，也会尝试以各自独特方式来履行这一职务。\n\n所有杜马主席候选人均来自当前的执政党。"
 russia.878.a: "沃洛金。"
 russia.878.b: "博亚尔斯基。"
 russia.878.c: "戈尔德耶夫。"
 russia.878.a1: "马卡列维奇。"
 russia.878.b2: "阿克谢年科。"
 russia.878.c3: "德拉佩科。"
 russia.879.t: "新任统一俄罗斯党领导人"
 russia.879.d: "统一俄罗斯党在杜马中的派系领袖手握重权，对党内动向影响深远。其人与党内理事会协同，共绘政党蓝图，调整方针纲领。依据领导者的不同风格与理念，他们或会将个人主张乃至政治抱负融入党的肌理，从而左右政党的发展轨迹与决策取向。"
 russia.879.a: "托尔斯泰"
 russia.879.b: "瓦西里耶夫"
 russia.879.c: "瓦列耶夫"
 russia.880.t: "新任人民俄罗斯党领导人"
 russia.880.d: "人民俄罗斯党在国家杜马中的党派领袖，对党内决策与路线制定拥有举足轻重的影响力。其与党内理事会协同运作，共同主导该党的政治方向并调整其纲领政策。依据领导者的个人理念与风格，他们往往会在推动党务过程中融入自身的政治主张或抱负，从而在一定程度上塑造该党的议程与战略走向。"
 russia.880.a: "卡比雪夫。"
 russia.880.b: "兰特拉托娃。"
 russia.880.c: "塔塔里诺夫。"
 russia.881.t: "新任全俄人民阵线负责人"
 russia.881.d: "全俄人民阵线的管理者处于该组织运作的核心地位，负责统筹阵线的日常事务。尽管其工作不受特定意识形态束缚，但仍需聚焦自身的专业领域。鉴于国家当下之需，选择最契合的应对之策。该职位直接对兼任全俄人民阵线主席的总统负责，并直接汇报工作。"
 russia.881.a: "库兹涅佐夫。"
 russia.881.b: "亚罗瓦娅。"
 russia.881.c: "格罗莫夫。"
 russia.881.f: "佩斯科夫."
 russia.881.h: "瓦伊诺。"
 russia.882.t: "新任全俄人民阵线政治委员"
 russia.882.d: "政治委员担任总统行政机构的顾问，主要负责政治策略与公共关系的规划与实施。他们虽有其独立目标，但所有行动均遵循全俄人民阵线的整体纲领与制度框架。其志并非激进变革，而在以循序渐进的小步调整与渐修，推动国家机器前行。"
 russia.882.a: "肖尔尼克。"
 russia.882.b: "布京娜。"
 russia.882.c: "科萨乔夫。"
 russia.882.f: "普里马科夫。"
 russia.882.h: "伊萨耶夫。"
 russia.883.t: "新任全俄人民阵线经济委员"
 russia.883.d: "经济委员担任总统行政机构的顾问，主要负责经济事务及劳资关系的协调与规划。他们虽秉持自身的工作目标，但所有举措均旨在遵循全俄人民阵线的整体纲领框架。其宗旨并非推行激进的变革，而是致力于推动一系列逐步、稳健的改良。"
 russia.883.a: "梁赞斯基。"
 russia.883.b: "科米萨罗夫。"
 russia.883.c: "科戈金。"
 russia.883.f: "基里延科。"
 russia.883.h: "克拉索夫。"
 russia.884.t: "新任全俄人民阵线青年委员"
 russia.884.d: "青年委员担任总统行政机构的顾问，主要负责青年政治参与及国家与年轻群体关系的相关事务。他们虽拥有自身的工作目标，但所有举措均与全俄人民阵线的总体议程保持一致。其宗旨并非推行激进变革，而是致力于通过一系列稳健而持续的优化实现逐步发展。"
 russia.884.a: "波图普奇克。"
 russia.884.b: "纳戈尔内。"
 russia.884.c: "杰米多夫。"
 russia.884.f: "帕夫柳琴科娃。"
 russia.884.h: "塔拉年科。"
 russia.885.t: "王车易位"
 russia.885.d: "政治中的王车易位，正如其棋术本意，指的是在不改变核心棋手即关键人物的前提下，通过交换其位置来重新布局、巩固防御或转换攻守态势。\n许多人曾预测库连科夫的任期恐怕短得惊人，甚至可能创下最短纪录。当他任命弗拉季斯拉夫·苏尔科夫为总理时，这一预测似乎应验了。随后政府部门发布了一份简短的声明，宣布总统辞职，并指定苏尔科夫担任国家的\"临时\"领导人。\n然而，苏尔科夫上台后迅速完成了一步\"易位\"，将库连科夫重新安排回政府首脑的位置上，完美践行了这项源远流长的政治传统。\n在国际社会以及部分国内观察者看来，将苏尔科夫推上权力顶峰的庞大\"深层政府\"结构令人深感不安，但他们的声音，依然无法穿透克里姆林宫的高墙。\n\n如今，这位长期主导国家棋局的影子大师，终于从幕后走出，亲自执子，全面接管了这盘棋。"
 russia.885.c: "按部就班。"
 russia.886.t: "苏尔科夫推荐亚历山大·库连科夫"
 russia.886.d: "在近期与总统的会谈中，弗拉季斯拉夫·苏尔科夫提名亚历山大·库连科夫担任一项关键政府职务。苏尔科夫盛赞库连科夫人脉广泛、作风严谨、为人谦逊，称其是一位极为合适的人选。\n库连科夫出身民防部，并曾供职于联邦安全局与联邦警卫局，资历背景深厚。\n然而，也有人担忧，苏尔科夫对库连科夫如此积极的公开支持，或许另有所图。"
 russia.886.a: "拭目以待。"
 russia.887.t: "主权国家"
 russia.887.d: "\"......我们祖国蕴藏着现代文明存续所必需的珍贵资源。我国人民历经数代不懈奋斗，才实现了这些资源的开发与利用。\n然而对于西方精英而言，俄罗斯在他们眼中只是可供占有、贩卖和掠夺的对象。自条顿骑士团、拿破仑直至纳粹侵略者以来，侵略者始终企图掌控我们的国家。他们或直接掠夺我们的土地，或腐蚀我们的政治精英以图操纵。\n既然俄罗斯已重获独立，西方精英又企图再次奴役我们。我们必须团结一致，共同建设强大主权国家来守护家园。只有如此，才能为国家和人民确保光明未来。\n在此进程中，我们认为全俄人民阵线能够为国家提供必要的知识与专业智慧。该组织汇聚了多元人才，能为祖国发展贡献独特视角。但相关讨论不应沦为激烈争执，更不能成为政府或俄罗斯前进道路的阻碍。只要能够达成共识，我们欢迎所有建设性意见。\"\n\n——摘自德米特里·梅德韦杰夫在全俄人民阵线会议上的演讲"
 russia.887.a: "我们的力量在于团结。"

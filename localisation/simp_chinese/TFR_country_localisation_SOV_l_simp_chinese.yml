 SOV_unified_loyalist_forces_desc: ""
 SOV_zealous_anti_bolshevism: "激进的反布尔什维克战士"
 SOV_zealous_anti_bolshevism_desc: ""
 SOV_enforce_martial_law: "执行戒严令"
 SOV_enforce_martial_law_desc: ""
 SOV_chancellor_commander: "宰相指挥官"
 SOV_chancellor_commander_desc: ""
 SOV_loyality_to_the_tsar: "效忠沙皇"
 SOV_loyality_to_the_tsar_desc: "专制统治一直是俄罗斯人民最重要的纽带之一。沙皇自古以来便是人民的牧者，引领他们走向正途。然而，不幸的是，各类\"知识分子\"与叛徒扭曲了仁君的形象，在普通百姓眼中将其描绘成暴君。这一谬论贯穿整个布尔什维克时代，最终在民众心中刻下了\"沙皇专横，贵族腐朽\"的观念。如今，君主应当重新执掌帝国，以完全而公正的统治，引领他的子民，恢复王权的光辉。"
 SOV_new_black_hundreds: "新黑色百人团"
 SOV_new_black_hundreds_desc: "黑色百人团诞生于1905-1907年革命时期，可以说，他们的存在是对社会主义者与自由派狂热动乱的有力回应。他们是真正的爱国者，坚定地保卫祖国，对抗一切反帝国势力。即便官方未明确支持他们的斗争，也从未加以谴责或惩处。然而，1917年2月，杜马的叛变导致黑百人遭到取缔，但即便流亡海外，他们依然不曾停止斗争。\n如今，随着布尔什维克政权的覆灭，新生的黑色百人团再度高举旗帜，虔诚捍卫传统与帝国秩序。沙皇需要忠诚的臣民，而在帝国大臣的选拔上，很难找到比黑色百人团更合适的人选。"
 SOV_devout_nation: "虔诚之国"
 SOV_devout_nation_desc: "若无基督教，便无今日之俄罗斯。正是东正教，使俄罗斯成为拜占庭的继承者，并塑造了俄罗斯的民族精神与文化根基。在过往的岁月里，无论是农民、城镇居民、商人、官员，乃至沙皇，他们的一日生活皆始于祷告，亦终于祷告。然而，这一切都在无神论的布尔什维克掌权后被彻底摧毁。教堂被焚毁，圣像被砸碎，修道院被拆除，神职人员遭杀害或流放——一切的一切，皆是为了抹去民族记忆中那个最核心的事实：正是基督信仰，使俄罗斯人在阶层分野之上依然紧密团结。\n尽管红色统治已经终结，但民众的信仰并未因此恢复。如今，唯有少数人——主要是女性——仍在定期进入教堂祈祷。是时候让整个俄罗斯民族重新回归基督的怀抱，让信仰的光辉再次照耀这片土地！"
 SOV_russification_intensification: "加强俄罗斯化"
 SOV_russification_intensification_desc: "过去的俄罗斯帝国曾是不可分割的整体。从吉尔吉斯到立陶宛，从芬兰到格鲁吉亚，普天之下皆为俄罗斯沙皇的忠诚臣民。然而，那些叛国的自由派与无神论的布尔什维克，却让这些民族催生出了\"民族认同\"的幻觉。他们本可安享和平共存，却因追求自治而彼此争斗。而布尔什维克正是利用了这些矛盾，使帝国分崩离析，最终在半个多世纪后自取灭亡。如今，我们重新掌控了昔日帝国的全部疆域，必将加快帝国边疆的俄罗斯化，防止悲剧重演。博布里科夫，你在哪！"
 SOV_radicalize_lower_stratum: "底层民众激进化"
 SOV_radicalize_lower_stratum_desc: "俄罗斯民族，是历史的巅峰。他们重塑科学的法则，探寻宇宙的奥秘，开拓哲学的疆界，孕育出最辉煌的文学与艺术。然而，叛徒们的阴谋，让民族沉眠，扼杀了最炽热的灵魂，削弱了最勇敢的意志。是时候粉碎这数十年的麻木！呼吁大众踊跃加入黑色百人团，共铸属于俄罗斯的伟大世界！"
 SOV_loyal_religious_doctrine: "忠诚宣教主张"
 SOV_loyal_religious_doctrine_desc: "自古以来，俄罗斯国家与东正教会的关系，始终交织于权力的洪流之中。彼得大帝的改革打破了教会的独立性，使其归属国家之下，废除了牧首制度，并由沙皇直接任命\"神圣公会议\"作为教会的最高权力机关。直至1943年，牧首制度才得以恢复，但国家与教会的互动方式，早已发生深刻变化。当然，直接废除牧首制度过于激进，但我们完全可以设立一个\"咨询委员会\"，由沙皇直接任命其成员。这样一来，君主的意志将通过宗教得以更直接地贯彻。"
 SOV_myth_of_nicholas_the_passion_bearer: "受难者尼古拉神话"
 SOV_myth_of_nicholas_the_passion_bearer_desc: "自20世纪90年代以来，俄罗斯联邦一直存在一种\"救赎者沙皇\"的学说。这一\"民族东正教\"分支认为，尼古拉二世的死亡是为俄罗斯人民的罪孽所作的赎罪牺牲，人们应为他的遇害而忏悔。一些激进分子关于\"撒旦\"税号和保险政策的想法显然是有害的，但关于俄罗斯人民是上帝选民以及专制政府的思想却极具吸引力……"
 SOV_imperial_nationalism: "帝国民族主义"
 SOV_imperial_nationalism_desc: "我们的人民不应遗忘：我们皆为帝国的臣民！无论是官员还是企业家，无论是工人还是农民，从符拉迪沃斯托克到华沙——我们都是俄罗斯人！这份荣耀，值得我们自豪！"
 SOV_revising_his_vision: "修正他的愿景"
 SOV_revising_his_vision_desc: "日里诺夫斯基无疑是一位伟大的政治家，是新俄罗斯的远见者。然而他的思想常常被狂热分子所曲解。斯卢茨基将纠正这一错误。沃尔福维奇同志始终倡导的是真正属于俄罗斯的民主，它不依附于西方理论家与分析家的教条，而是深深植根于我们的传统与历史血脉之中。"
 SOV_empower_the_senate: "赋权参议院"
 SOV_empower_the_senate_desc: "参议院应当作为俄罗斯总统的最高咨询机构而运作。有了选举产生的参议员，我们才能更准确地把握并代表国家多元化的意识形态光谱。"
 SOV_national_presidency: "国家总统"
 SOV_national_presidency_desc: "总统是国家安全的基石，掌握着决定民族命运的最高决策权。正是总统带领我们穿越重重危机，而这一引领将永恒延续。"
 SOV_modern_political_philosophy: "新政治哲学"
 SOV_modern_political_philosophy_desc: "弗拉基米尔·沃尔福维奇·日里诺夫斯基是一位多才多艺的杰出人物，不仅在政治领域，更在诸多其他领域卓有建树。几十年来，他的大量著述和言辞在我们的社会留下了不可磨灭的印记。我们的国家汲取了他的思想精髓，将其融入我们的集体认识，并在此基础上继续发展。"
 SOV_secure_russian_democracy: "捍卫俄罗斯民主"
 SOV_secure_russian_democracy_desc: "时机已至。我们的俄罗斯正迎来日里诺夫斯基掌权后的首次大选。众多候选人将角逐人民的选票，但只有那些头脑灵活、深刻理解俄罗斯人民的人才能取得成功。值得注意的是，部分参选者持有相当极端的立场，我们真诚期待此类人士不会在这场自由而庄严的全国选举中获胜。"
 SOV_political_tutelage: "党的教导"
 SOV_political_tutelage_desc: "自民党虽主张自由选举，但当下时机未至。世界正面临严峻威胁与意识形态危机，或许只有俄罗斯能庇护我们免遭这些危险。我们尊敬的领袖兼总统列昂尼德·斯卢茨基，必须如父母引导孩童般谨慎领导国家。我们相信，终有一日俄罗斯人民会在投票时作出明智选择。"
 SOV_new_russian_era: "俄罗斯新世纪"
 SOV_new_russian_era_desc: "崛起吧，伟大的祖国！这片孕育不同信仰、民族与宗教的沃土！新时代的曙光已普照大地。俄罗斯作为美德与神圣的灯塔巍然屹立，公民们正通过民主与民族政府机构，积极参与伟大国家的建设。内外之敌或欲摧折我们，但我们绝不会动摇。我们，是骄傲的民族！"
 SOV_cabinet_of_patriots: "爱国者内阁"
 SOV_cabinet_of_patriots_desc: "在伟大的弗拉基米尔·日里诺夫斯基辞世之后的第一次选举中，一位意想不到的候选人赢得了最终的胜利。前顿涅茨克人民共和国的领导人丹尼斯·普希林，现在的俄罗斯总统从一开始便是一匹黑马。然而，他在全俄范围内的爱国主义呼吁与其\"恢复稳定\"的承诺让他赢得了大多数俄罗斯民众的信任。而更令人惊讶的是，\"我们可以做很多！\"这个口号出奇成功。但是，现在不是休息的时候。丹尼斯·普希林想要将日里诺夫斯基的系统重组为更能让人回忆起普京领导下的俄罗斯那样。而不管怎么样，是时候开始干活了！"
 SOV_embrace_big_tent_politics: "接纳大帐篷政治"
 SOV_embrace_big_tent_politics_desc: "若同为祖国赤子，又何妨左翼右翼？难道真心热爱家园的人们，真要为细微理念差异刀剑相向？让我们对牵强的派系分裂说不。在我党之中，人人皆有立足之地。"
 SOV_saddle_the_opposition: "驾驭反对派"
 SOV_saddle_the_opposition_desc: "反对派对国有利且不可或缺。意见多元、民主制度本该如此。但若这反对派能……识时务些，岂不更好？别误会，批评对国家来说必要且重要。只是当这些批评者不过激、不企图撼动立国之本时，才是最佳状态。"
 SOV_reliable_tsentrizbirkom: "可靠的中央选举委员会"
 SOV_reliable_tsentrizbirkom_desc: "\"投票方式无关紧要，民众思想才至关重要\"。此言虽难考确是斯大林所说，但其精髓不误。谁知道过往选举公投中藏着多少操纵手段？为防止故伎重演，我们必须对中央选举委员会实施彻底改革。这一切，自然是为确保结果永远尽可能准确。"
 SOV_systematize_russian_militia_duty: "俄罗斯民兵义务系统化"
 SOV_systematize_russian_militia_duty_desc: "民兵在顿巴斯战争中为国立下汗马功劳，但令人诧异的是，俄罗斯本土直到与北约开战时才启用这一战术，且实施得仓促低效。现在正是将俄罗斯民兵体系化，并为此构建强力框架的时候了。"
 SOV_trumpet_of_the_state: "国之号角"
 SOV_trumpet_of_the_state_desc: "媒体从来都是至关重要的利器，被誉为\"第五权力\"实至名归。正因如此，我国全体公民都应当知晓我们取得的成就！无论是电视、报刊还是网络媒体，都将传颂在我们伟大祖国生活的美好。与此同时，它们还将播报那些欧洲国家为何眼红嫉妒，处心积虑想要将我们摧毁！"
 SOV_new_towers_of_kremlin: "新克里姆林之塔"
 SOV_new_towers_of_kremlin_desc: "毕竟，强求所有人遵循单一党派路线实属徒劳，政府内部也不例外。各路权贵势必会集结志同道合者，拉帮结派甚至与政敌相争。然而正是这般暗流涌动，才使得我国政治生活不至于僵化停滞。表面看来，暗箱角力似有百害而无一利，实则恰是我国政治体系发展的必然产物。"
 SOV_prioritize_mvd: "内务部优先"
 SOV_prioritize_mvd_desc: "弗拉基米尔·沃尔福维奇去世后的一系列事件，给我们上了沉痛而深刻的一课。倘若我们稍有松懈，让叛徒和恐怖分子有机可乘，整个体系必将毁于一旦。为此我们必须确保稳定，尤其是内部稳定。而这正是内务部肩负的重任。增加预算与扩大权限，必将使其如虎添翼。"
 SOV_glorify_military_service: "歌颂军队服役"
 SOV_glorify_military_service_desc: "将士们，这些无畏的将士们，纵使历经艰辛，仍将守护我们辽阔祖国的利益视为天职。一个自尊自强的国家，怎能让这样的英雄沦为边缘人物？绝对不行！从军报国理应享有崇高地位，既要赢得同胞敬重，更需国家厚待。只有如此，才能吸引更多志士投身这份艰苦而光荣的使命。"
 SOV_favor_novorossiyan_personnel: "晋升新俄罗斯人员"
 SOV_favor_novorossiyan_personnel_desc: "新俄罗斯官员在独立斗争和欧陆战争中表现最为出色。若仅将他们局限在新俄罗斯地区，实实在是埋没人才。更何况鹰派与改革派之间的较量，恰好为我们在这方面提供了运作空间。既然如此，何不晋升那些久经考验、能力出众的忠诚之士？"
 SOV_sovereignty_above_all: "主权高于一切"
 SOV_sovereignty_above_all_desc: "任何一个国家，只有保持独立才能算真正存在。倘若某个国家离了贸易就无法生存，需要依赖别国军队保护，甚至最糟糕的连自主外交政策都无法制定，那它就算不上真正的国家，只不过是原材料附庸或倾销市场罢了。我们决不允许俄罗斯沦落至此，因此国家主权将始终高于一切！"
 SOV_new_russian_era_rogozin: "俄罗斯新世纪"
 SOV_new_russian_era_rogozin_desc: "崛起吧，伟大的祖国！这片孕育不同信仰、民族与宗教的沃土！新时代的曙光已普照大地。俄罗斯作为美德与神圣的灯塔巍然屹立，公民们正通过民主与民族政府机构，积极参与伟大国家的建设。内外之敌或欲摧折我们，但我们绝不会动摇。我们，是骄傲的民族！"
 SOV_new_russian_era_yuneman: "俄罗斯新世纪"
 SOV_new_russian_era_yuneman_desc: "崛起吧，伟大的祖国！这片孕育不同信仰、民族与宗教的沃土！新时代的曙光已普照大地。俄罗斯作为美德与神圣的灯塔巍然屹立，公民们正通过民主与民族政府机构，积极参与伟大国家的建设。内外之敌或欲摧折我们，但我们绝不会动摇。我们，是骄傲的民族！"
 SOV_new_russian_era_girkin: "俄罗斯新世纪"
 SOV_new_russian_era_girkin_desc: "崛起吧，伟大的祖国！这片孕育不同信仰、民族与宗教的沃土！新时代的曙光已普照大地。俄罗斯作为美德与神圣的灯塔巍然屹立，公民们正通过民主与民族政府机构，积极参与伟大国家的建设。内外之敌或欲摧折我们，但我们绝不会动摇。我们，是骄傲的民族！"
 SOV_new_russian_era_pushilin: "俄罗斯新世纪"
 SOV_new_russian_era_pushilin_desc: "崛起吧，伟大的祖国！这片孕育不同信仰、民族与宗教的沃土！新时代的曙光已普照大地。俄罗斯作为美德与神圣的灯塔巍然屹立，公民们正通过民主与民族政府机构，积极参与伟大国家的建设。内外之敌或欲摧折我们，但我们绝不会动摇。我们，是骄傲的民族！"
 SOV_new_russian_era_rpss: "俄罗斯新世纪"
 SOV_new_russian_era_rpss_desc: "崛起吧，伟大的祖国！这片孕育不同信仰、民族与宗教的沃土！新时代的曙光已普照大地。俄罗斯作为美德与神圣的灯塔巍然屹立，公民们正通过民主与民族政府机构，积极参与伟大国家的建设。内外之敌或欲摧折我们，但我们绝不会动摇。我们，是骄傲的民族！"
 SOV_zhirinovsky_our_founder: "[SOV_slutsky_path_focus_1]"
 SOV_slutsky_path_focus_1_loc_1: "完善俄罗斯社会"
 SOV_slutsky_path_focus_1_loc_2: "爱国改革"
 SOV_slutsky_path_focus_1_loc_3: "消除隔阂"
 SOV_slutsky_path_focus_1_loc_4: "日里诺夫斯基 - 我们的创始人"
 SOV_slutsky_path_focus_1_loc_5: "团结俄罗斯历史"
 SOV_slutsky_path_focus_1_loc_6: "俄罗斯真正的英雄"
 SOV_zhirinovsky_our_founder_desc: "[SOV_slutsky_path_focus_desc_1]"
 SOV_slutsky_path_focus_1_desc_1: "国家的革新必须伴随国民意识的蜕变。社会不应仅仅被动顺应变革，更应成为时代的弄潮儿，主动拥抱新时代的目标与价值观。一个笃定前行的国家，必然依托于这样的未来型社会：它不仅能接纳变革，更善于创造变革。"
 SOV_slutsky_path_focus_1_desc_3: "俄罗斯正深陷史无前例的意识形态裂痕：\"红白\"对立、左右分野、布尔什维克与白卫军的百年纷争至今未休。十月革命纵已过去一个世纪，其激荡余波仍让所有人无法置身事外，它将俄罗斯政坛永恒地撕裂为两个阵营。1993年我们本有机会终结这场分裂，可惜亲叶利钦势力获胜，红褐联盟最终瓦解。如今德米特里·罗戈津执掌国政，我们终能弥合历史伤痕，共同缔造一个崭新的俄罗斯！"
 SOV_slutsky_path_focus_1_desc_2: ""
 SOV_slutsky_path_focus_1_desc_4: "日里诺夫斯基不仅是俄罗斯的时代象征，更是自民党不朽的精神旗帜。除了这位创始人，再无人能为政党形象作出如此卓著的贡献。即便在他逝世后，我们依然被视作他的政党，这一认知极大提升了我们的民意基础。但必须承认，虽然民众认同我们的政治基因，但并非所有人都认为斯卢茨基是日里诺夫斯基最理想的继承者。"
 SOV_slutsky_path_focus_1_desc_5: "毫无疑问，俄罗斯的历史是全世界最跌宕起伏、最饱经沧桑的历史之一。我们的祖国经历过一切。统一与分裂的轮回，足以摧毁其他文明的灭世之战。但俄罗斯人民承受住了所有磨难，从未屈服。正因如此，任何割裂我们历史的企图，本质上都是企图分裂我们这个国家的人民，这是我们决不能容许的。"
 SOV_slutsky_path_focus_1_desc_6: "我们的人民在专制政权下饱受摧残。他们被送上战场白白送死，卷入不可能获胜的战争，而那些统治者却坐享荣耀，这样的日子必须终结。每一位为国捐躯的普通公民都值得被历史铭记，每一滴鲜血都应获得礼赞，而不是让那些自封的国父独占荣光。"
 SOV_multiconfessional_piety: "[SOV_slutsky_path_focus_2]"
 SOV_slutsky_path_focus_2_loc_1: "俄罗斯民族的人民政党"
 SOV_slutsky_path_focus_2_loc_2: "混合民族主义"
 SOV_slutsky_path_focus_2_loc_3: "帝国荣耀"
 SOV_slutsky_path_focus_2_loc_4: "未来民族国家"
 SOV_slutsky_path_focus_2_loc_5: "重振全俄爱国主义精神"
 SOV_slutsky_path_focus_2_loc_6: "新国家政策"
 SOV_multiconfessional_piety_desc: "[SOV_slutsky_path_focus_desc_2]"
 SOV_slutsky_path_focus_2_desc_4: "是时候为历史新纪元奠基了——我们要建设一个真正的民族国家。这将是由觉醒的社会、尽责的政府与明晰的民族纲领铸就的伟大同盟。新兴的国家机器将既恪守传统，又推动科学、文化、经济等各领域蓬勃发展；既捍卫公民权利与自由，又为劳动、创新与担当提供坚实后盾。民族精神将成为国家发展的磐石根基，更将铸就我们在世界舞台上的铮铮铁骨。"
 SOV_slutsky_path_focus_2_desc_2: "我们的国家正面临空前使命：调和充满矛盾的俄罗斯历史，那些至今仍在撕裂民族的深刻分歧。解决这一难题的关键，在于构建一种既能凝聚民心、又根植于厚重历史土壤的完整意识形态。其名为融合型民族主义。这一思想体系既承袭苏联政权的社会主义导向，又融合帝国时期及日里诺夫斯基时代的强烈民族特质，必将成为贯通俄罗斯古今的历史金桥，将我们破碎的过往重新熔铸为不可分割的整体！"
 SOV_slutsky_path_focus_2_desc_3: ""
 SOV_slutsky_path_focus_2_desc_5: "俄罗斯不仅是一个国家，更是一种归属于世界上最伟大的文明的使命。这意味着璀璨的文化瑰宝与划时代的科学成就。成为俄罗斯人从不需要斯拉夫血统，我们拥抱高加索人、中亚人，以及所有尊重并渴望融入我们文化的族群。连我们最伟大的文豪都拥有埃塞俄比亚血统！正因如此，我们的爱国主义属于全体俄罗斯人民，这份对祖国的赤诚，任何人都无法剥夺。"
 SOV_slutsky_path_focus_2_desc_6: "当前的国家政策是一种沙文主义的噩梦，无法为未来几十年的稳定铺平道路。必须赋予乌克兰人和白俄罗斯人更多权利，以避免重蹈沙皇时代和苏联时期的覆辙。"
 SOV_slutsky_path_focus_2_desc_1: "自由民主党是普通俄罗斯民众表达诉求、寻求共鸣、凝聚民族自豪感的家园。我们始终与俄罗斯并肩而立，党员遍布全国，却在本党发展进程中常被忽视。我们那些年轻干练的议员们，始终与国家和选民心意相通。尽管政府更迭，但我们的口号始终如一。"
 SOV_brand_new_russian: "[SOV_slutsky_path_focus_3]"
 SOV_slutsky_path_focus_3_loc_1: "崭新俄罗斯"
 SOV_slutsky_path_focus_3_loc_2: "祖国最强大的战士"
 SOV_slutsky_path_focus_3_loc_3: "斯特列科夫崇拜"
 SOV_slutsky_path_focus_3_loc_4: "新联邦制"
 SOV_slutsky_path_focus_3_loc_5: "仿效顿巴斯模式"
 SOV_slutsky_path_focus_3_loc_6: "扩大社会福利"
 SOV_brand_new_russian_desc: "[SOV_slutsky_path_focus_desc_3]"
 SOV_slutsky_path_focus_3_desc_4: "在推进国家治理现代化的进程中，联邦制体系同样需要与时俱进。我们绝非要削弱这一制度——恰恰相反，将通过革新治理理念、破除官僚主义桎梏，使其焕发更强生命力。以更具弹性且公正的治理方式强化央地协同，打造透明高效、以实效为导向的新型联邦关系。俄罗斯的力量源泉在于社会正义，而正义理应成为所有治理方式的基石。"
 SOV_slutsky_path_focus_3_desc_2: "俄罗斯的荣耀源自其悠久的军事传统与无畏勇气。我们的战士在历次战役中屡建奇功，近日与西方之战，更令世人见证了俄军不可撼动的实力。正如1945年的祖辈与1813年的先贤，今日俄军将士再度解放大半个欧洲，为祖国赢得无上荣光。让我们礼赞这些击溃西方瘟疫的当代英雄！"
 SOV_slutsky_path_focus_3_desc_3: ""
 SOV_slutsky_path_focus_3_desc_5: "顿巴斯模式已在对乌克兰战争中验证了其有效性。虽然全面推广这种模式或许并非易事，但若能成功，将极大简化我们的治理工作。"
 SOV_slutsky_path_focus_3_desc_6: "我们当前的社会问题应对措施仍显不足。政府必须向困难群体伸出援手，同时强化军事工业综合体建设，这项扩张计划得到了自民党好战派成员的大力支持。"
 SOV_slutsky_path_focus_3_desc_1: "这些年来，我们锻造了一种新型的俄罗斯公民。我们塑造了他们，创造了一个不仅由血脉相连，更以共同精神、信仰和为祖国牺牲的觉悟凝聚而成的共同体。这为我们带来了忠诚的人民，更重要的是，培养出了能干的官员、警察、军人等维系国家稳定的中坚力量。"
 SOV_organization_of_russian_veterans: "俄罗斯老兵组织"
 SOV_organization_of_russian_veterans_desc: "自民党对我们英勇的战士，特别是那些如今将生命奉献给党和斯卢茨基愿景的军人怀有崇高敬意。通过将他们凝聚成一个团结的组织，让他们能够训练并教导年轻一代忠诚与爱国精神，我们将为巩固军队未来迈出重要一步。"
 SOV_ldpr_ecosystem: "自民党生态系统"
 SOV_ldpr_ecosystem_desc: "我们的政党绝非仅是娱乐消遣。这是一种融汇音乐、电竞、体育、演艺乃至时尚的生活方式。我们的公关团队致力于将自由民主党的品牌烙印在每一项社会活动中。要让民众明白：任何兴趣爱好的实现，都该打着自民党的旗帜。毕竟，独乐不如众乐。"
 SOV_security_and_order: "安全与秩序"
 SOV_security_and_order_desc: "这些民主努力固然值得赞赏，但民主同样会催生诸多无益于国家社会福祉的异见思潮。从极端民族主义者、激进共产主义者，到糅合纳粹主义与异教信仰的杂合群体，这些人都无法为国家的成功运转作出贡献。在防范激进主义的幌子下，我们自然也会将更多的反对派纳入其中。"
 SOV_government_of_mutual_trust: "互信政府"
 SOV_government_of_mutual_trust_desc: "一个国家若想繁荣发展，离不开那些洞察敏锐、能直指其症结的批评者——但这些批评者自身也必须兼具洞见与建设性。尽管尤涅曼和吉尔金存在缺陷，但与那些边缘极端分子相比，他们显然更适合进行实质性对话。与其建立良性互动关系，将有助于巩固我们稳定的统治，并提前预警和化解政府体系内的关键问题。若能与这些人物组建正式联盟，或可成为一大助力。"
 SOV_great_russian_nationalism: "大俄罗斯民族主义"
 SOV_great_russian_nationalism_desc: "归根结底，正是在自由民主党、日里诺夫斯基及其亲密盟友斯卢茨基的引领下，俄罗斯人民战胜了西方，为我们民族开创了新的黄金时代。我们必须始终彰显本党为提升俄罗斯民族地位、安全保障与国家荣耀所取得的重大成就。"
 SOV_peoples_mandate: "人民的使命"
 SOV_peoples_mandate_desc: "我们的人民已授权我们彻底改革这个腐败不平等的旧体制。我们将对腐朽无能的行政体系发起雷霆万钧的全面改革。"
 SOV_repeal_hardline_policies: "废除强硬政策"
 SOV_repeal_hardline_policies_desc: "日里诺夫斯基的激进路线对国家造成了严重破坏，尽管他自诩怀揣着强国抱负。我们必须彻底清除他的政策遗毒，废止那些充斥沙文主义与排外思想的立法。"
 SOV_unity_consensus: "统一共识"
 SOV_unity_consensus_desc: "无论我们如何竭力推进改革，都必须清醒认识到，操之过急的严苛举措可能引发针对现政权的公开反抗，甚至温和派人士也会倒戈相向。我们必须与除自民党亲信派系外的各方势力展开民主协商。"
 SOV_protect_electoral_freedom: "保障选举自由"
 SOV_protect_electoral_freedom_desc: "我们是自由的民族，也必将实现选举的绝对自由，即便其结果与我们的意愿相悖。这正是我们与历届俄罗斯政府的本质区别。"
 SOV_russian_republican_forces: "俄罗斯共和军"
 SOV_russian_republican_forces_desc: "俄罗斯军队必须成为共和民主体制的有机组成部分。然而当前，军方仍表现出保守倾向，特别是国民近卫军，其与俄罗斯自由民主党关系密切。"
 SOV_patriotic_idealism: "爱国理想主义"
 SOV_patriotic_idealism_desc: "真正的爱国精神绝非盲目服从或歌功颂德。爱国者必须时刻清醒认知国家痼疾，并矢志推动改革。当这些爱国者的理想与俄罗斯政府的改革愿景同频共振，携手缔造更完善的制度时，方显尤为可贵。"
 SOV_fight_bureaucratic_corruption: "共和国战士联盟"
 SOV_fight_bureaucratic_corruption_desc: "在魏玛共和国时期，由退伍军人组成的众多军事化组织蓬勃发展。尽管其中一些以极端主义倾向闻名，但许多士兵仍愿意为民主秩序，或至少是社会民主主义秩序而战。自由正义党同样将为认同我们政治理念的退伍军人建立一个独立分支。"
 SOV_develop_rural_russia: "发展俄罗斯农村地区"
 SOV_develop_rural_russia_desc: "俄罗斯农村地区长期遭受忽视，其发展潜力始终未被重视。自由正义党决心扭转这一局面，将农村发展列为优先事项，通过加大对欠发达地区的财政经济扶持力度，全面提升农村地区的地位。"
 SOV_stand_for_democracy: "为民主而战"
 SOV_stand_for_democracy_desc: "民主对一个国家的存续至关重要。舍甫琴科总统将民主置于一切之上。如果非要定义的话，我们可以称他是一位民主帝国主义者。我们绝不能与那些剥夺自由的人谋求和平。"
 SOV_spirit_of_the_motherland: "自由祖国之精神"
 SOV_spirit_of_the_motherland_desc: "在激进主义与偏执横行的时代，俄罗斯依然是当今世界最美丽、最自由的国度，我们的祖国犹如指引方向的明灯。舍甫琴科总统首先是一位俄罗斯爱国者，他绝不会与那些拒绝承认俄罗斯应享有光明未来的人妥协。"
 SOV_boost_local_governance: "真正的联邦"
 SOV_boost_local_governance_desc: "俄罗斯是一片拥有众多民族的土地，高加索地区尤为显著。马克西姆·舍甫琴科曾深入探讨过这一课题。这些民族必须受到保护，并享有与伟大的俄罗斯民族完全平等的地位。"

 SOV_supreme_soviet_rsfsr_dynamic: "俄罗斯最高苏维埃"
 SOV_supreme_soviet_rsfsr_dynamic_desc: "\n\n\n\n£GFX_supreme_soviet_rsfsr\n\n\n\n\n\n§Y\"生活在社会中却要离开社会而自由，这是不可能的。\"\n- 弗拉基米尔·列宁§!\n\n在共产党夺取政权并进行深度宪政改革后，俄罗斯回归了一种基于苏维埃代议制民主原则，且适应现代的政治模式。现今历经重组的§O最高苏维埃§!汇集全国所有经过公正选举的代表，是国家最高立法机关和行政机构。尽管保留了总统职位，但其不再拥有实际权力，包括政府的组建和预算的批准在内的所有关键决策均由苏维埃多数表决，并独立于国家元首。这种国家结构体系积极地让公民参与到政治生活，唯一的问题是他们会站到哪一边？"

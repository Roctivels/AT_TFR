 SOV_special_military_operation_desc: "\n\n\n\n£GFX_SOV_smo_banner\n\n\n\n\n\n由于军事行动的特殊性，导致俄罗斯往往不能充分利用其充盈的武器装备以及动员潜力。国家的领导层正是基于这一点意识到：在敌对行动频繁的情况下，有必要将冲突可能升级的威胁降到最低，并防止北约国家的入侵。"

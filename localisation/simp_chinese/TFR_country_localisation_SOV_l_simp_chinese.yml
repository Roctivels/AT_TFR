 SOV_wagner_state_cat_desc: "\n\n\n\n\n£GFX_SOV_wagner_state_banner\n\n\n\n\n\n\n\n俄罗斯目前已完全落入普里戈任及其军事激进派集团的掌控之中。\n在欧陆战争中遭遇失败后，俄罗斯民众要求伸张正义并寻求复仇的机会。如今，叶夫根尼·普里戈任被民众视为唯一能实现这一目标的人选，他和他的私兵已成为国家权力的主要机关。\n这一新政权呈现出强烈的个人化特征。瓦格纳集团的\"大老板\"不仅要求政府官员，甚至要求普通公民对其个人效忠。普里戈任认为，要为俄罗斯的损失复仇，必须将国家彻底改造为一个奉行民族主义和军国主义路线的政权。\n\n狂热主义：£GFX_fanaticism §Y[?SOV_fanaticism_var|1%]§!\n效果：£attack_texticon [?SOV_fanaticism_dynamic_var|=+1%]£mil_factory [?SOV_fanaticism_dynamic_var|=+1%]£GFX_mobilisation_texticon [?SOV_fanaticism_dynamic_var|=+1%]£GFX_war_support_modifiericons_texticon [?SOV_fanaticism_dynamic_var|=+1%]\n\n狂热主义体现了我国人民为国家而战的意志及对民族的支持。"

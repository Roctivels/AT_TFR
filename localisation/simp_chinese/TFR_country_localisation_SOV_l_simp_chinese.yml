 neo_sovereign_democracy: "新主权民主"
 neo_sovereign_democracy_desc: "\n\n\n\n£GFX_Ideology_neo_sovereign_democracy_banner\n\n\n\n\n\n§Y主权民主主义§!是一种小众的政治意识形态，其目标是创造一种摒弃西式民主不同党派间无休止争吵的\"完美\"民主。各党不仅将持有相似的观点，而且还将合作为国家的整体进步而努力。市民社会作为对政党的制衡，将利用其影响力来监督和驱逐或腐败或渎职的官员。\n其体系内的左翼党团主张建立一个类似于苏联时代的更加封闭的市场。这种主张迎合了那些希望曾经那个完美无缺的\"共产主义\"再临，又不愿其带来任何弊端的的左翼拥护者。\n\n§Y新主权民主主义§!的理念政策与阿列克谢·纳瓦利内及其政党的政治纲领高度契合。该制度的支持者主张在推进科技经济领域发展时强调市场机制的核心地位；推动政治自由化并提升政府透明度；与周边国家建立外交关系；实行政党多元化，接纳包括右翼在内的各类激进政治力量。"

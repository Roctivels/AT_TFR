 FER_derussification: "去俄罗斯化"
 FER_derussification_desc: "经过俄罗斯对我们民族与文化长达数个世纪的摧残，我们正全力清除这片土地上异质文化的遗毒，以彻底斩断与种族清洗者的历史纽带。然而这场文化重构代价沉重；大批俄裔民众正逃离国土，并非所有公民都准备好直面这一现实。这种动荡加上我们对北约维和人员的依赖，政府正面临前所未有的深层危机。"

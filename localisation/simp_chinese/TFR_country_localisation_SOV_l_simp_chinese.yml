 SOV_new_patriotic_army_desc: ""
 SOV_rulebook_of_russian_officer: "俄罗斯军官规则手册"
 SOV_rulebook_of_russian_officer_desc: ""
 SOV_russify_kiev: "基辅俄罗斯化"
 SOV_russify_kiev_desc: ""
 SOV_russian_national_pride: "俄罗斯民族自豪"
 SOV_russian_national_pride_desc: "我们的人民何以自豪？俄罗斯人自豪于历史记忆：远古王公、\"彼得巢中的雏鹰\"、十九世纪名将、以及二十世纪用鲜血捍卫祖国自由的英雄，皆未被遗忘。普鲁士人自豪于广袤丰饶的故土，那里孕育着幸福生活所需的一切。而我们更自豪于自身的文化与科学！\n\n我自豪，我是俄罗斯人！"
 SOV_the_moral_code_of_the_patriot: "爱国者道德准则"
 SOV_the_moral_code_of_the_patriot_desc: "我国面临的核心问题之一，是民众普遍政治冷漠。尽管普京时代和日里诺夫斯基时代的俄罗斯付出诸多努力，多数民众仍对政府事务漠不关心。万事始于微末，所以从今日起，所有学生必须加入青年军，并熟记精心编纂的\"爱国者守则\"。这套规范与信条将塑造新一代俄罗斯人的生活方式，它将教授如何热爱祖国、如何组装AK步枪等未来战士的必备技能，以及如何敬爱领袖并随时为之献身。"
 SOV_russian_national_red_army: "俄罗斯民族红军"
 SOV_russian_national_red_army_desc: "当代俄军本质上是个无政治倾向的架构，它效忠国家而非特定意识形态。在新形势下，保留这种难以掌控的体系隐患重重。正因如此，武装力量将改制为民族红军，既继承帝俄陆军衣钵，又延续苏联军队传统。更名同时，军队将引入类似苏联政委的\"政治工作专员\"。这支军队必须捍卫俄罗斯劳动人民的利益！"
 SOV_the_leader_order: "领袖旨意"
 SOV_the_leader_order_desc: "俄罗斯历史从不缺乏凝聚国家的强人领袖：彼得大帝、叶卡捷琳娜二世、约瑟夫·斯大林与弗拉基米尔·普京皆为其中典范。而今，当第二次欧陆战争的阴云笼罩之际，我们必须如千百年前的先辈那般，唯领袖马首是瞻。"
 SOV_together_to_greatness: "携手共创辉煌"
 SOV_together_to_greatness_desc: "俄罗斯的历史，就是帝国、苏维埃政权与联邦等各个时代竭力否定前朝的循环。尽管弗拉基米尔·普京执政后开启了历史和解进程，但这一使命未尽全功。而弗拉基米尔·沃尔福维奇的继任，反而使矛盾加剧。\n\n必须彻底终结红白对立。无论你支持左翼或是右翼，唯一重要的是：我们都是俄罗斯人。无谓的纷争只会阻碍我们追求真正的大俄罗斯。"
 SOV_enshrine_slutsky_thought: "铭记斯卢茨基思想"
 SOV_enshrine_slutsky_thought_desc: "斯卢茨基是日里诺夫斯基思想当之无愧的继承者。他以全新的意义和纲领丰富了自民党的理念体系，既延续了创始人的政治遗产，又使其更贴近普通民众的认知。尤为可贵的是，斯卢茨基提出的纲领方案不仅对党员具有指导意义，更能让所有认同其俄罗斯未来愿景的公民产生共鸣。我们必将共同实现弗拉基米尔·日里诺夫斯基与列昂尼德·斯卢茨基擘画的宏伟蓝图，建成他们理想中的国度。"
 SOV_militarist_vigor: "军事精神"
 SOV_militarist_vigor_desc: ""
 SOV_eternal_regency: "永恒摄政"
 SOV_eternal_regency_desc: ""
 SOV_idea_of_the_imeprial_republic: "帝政共和国理念"
 SOV_idea_of_the_imeprial_republic_desc: ""
 SOV_adobt_new_military_doctrine: "采用新军事学说"
 SOV_adobt_new_military_doctrine_desc: ""
 SOV_compulsory_military_education: "义务兵役教育"
 SOV_compulsory_military_education_desc: ""
 SOV_new_loyal_okhranka: "新的忠诚保卫局"
 SOV_new_loyal_okhranka_desc: ""
 SOV_cult_of_russian_conquest: "俄罗斯征服崇拜"
 SOV_cult_of_russian_conquest_desc: "俄罗斯历史写满辉煌战史：从苏沃洛夫到朱可夫，俄军荣耀穿越世纪绵延至今。而现在我军更拥有战胜反俄欧洲的杰出将领。我们必须弘扬俄式武勋，传承历史胜绩。昔日英雄的壮举，将成为当下与未来战士们的楷模！"
 SOV_deepen_the_reforms: "深化改革"
 SOV_deepen_the_reforms_desc: "俄罗斯要坚定前行，就必须与时俱进。历史证明，国家的力量总在革故鼎新中诞生——当社会、政府与文化勇于求变之时。正如彼得大帝曾为俄罗斯开辟新天地，如今我们也将通过政治经济的深刻变革开启新篇。俄罗斯将以崭新姿态，迈向未来。"
 SOV_devolve_the_ministries: "下放各部门"
 SOV_devolve_the_ministries_desc: "为实现国家进一步发展与进步，不仅需要制度层面的深度现代化，更需要治理原则的根本革新。改革官僚体系是这条道路上的关键一步。当管理机制被过度形式主义裹挟时，真正重要的改革倡议就会湮没在文山会海之中，行政效能持续衰减，变革动力逐渐熄灭，这种状态正在拖累国家发展步伐，阻碍俄罗斯释放全部潜力。要让俄罗斯坚定前行，就必须打造兼具灵活性与结果导向的治理体系。现在正是需要以开放姿态、毫不拖延采取行动的时刻。"
 SOV_encourage_local_democracy: "鼓励地方民主"
 SOV_encourage_local_democracy_desc: "谁说民主只能停留在国家层面？真正的民主始于日常生活——从街道、社区到城市。强化民众对地方事务的参与，是通往公平未来的重要阶梯。这不仅能够遏制地方官员的专断行为，更能让每个人感受到自身的重要性。人们需要看到自己的意见不会被忽视，参与绝非走过场。民主不是几年一度的仪式，而是永不停息的对话。每一张选票都举足轻重，每一个声音都值得倾听。"
 SOV_protecting_russia_from_extremism: "抗击极端主义"
 SOV_protecting_russia_from_extremism_desc: "有时，为了保护公民和维护国家体制，必须对个人自由施加必要限制。这绝非背离民主，更不会削弱民意的重要性——恰恰相反，正是为了社会安全与稳定发展，才需要采取此类措施。自由不应成为破坏行为的遮羞布。真正的民主绝非混乱无序，而是人人享有投票权、同时共同遵守基本规则的有序状态。"
 SOV_shining_beacon: "闪耀灯塔"
 SOV_shining_beacon_desc: "纵观历史长河，俄罗斯始终是欧洲乃至世界文明的重要支柱——既是文化精神的灯塔，也是政治格局的坐标。在历次变革与动荡中，这个国家始终保持着中流砥柱的定力，既砥砺前行，又兼济天下。当世界面临全新挑战的今天，正是俄罗斯能够再次成为各国捍卫主权、守护未来的标杆。她将带着希望之光、坚韧之志与信念之力走向明天，这束光芒在世界遭遇艰难挑战时尤为珍贵。"
 SOV_russian_civilization_renewed: "俄罗斯文明复兴"
 SOV_russian_civilization_renewed_desc: "我们长久为之奋斗的历史性时刻终于到来。俄罗斯正以前所未有的磅礴之势崛起，展现出前所未有的强大力量。今日之俄罗斯社会生动诠释着，国民民主原则如何能真正高效运转。这是一种根植于传统敬畏与未来远见的新型社会架构。俄罗斯的复兴，是一场顺应时代精神、建设新文明的伟大革命。"
 SOV_the_guiding_star: "引导之星"
 SOV_the_guiding_star_desc: "俄罗斯再次从历史的低谷中崛起，这一切都得益于德米特里·奥列戈维奇·罗戈津的英明领导。我们伟大的领袖罗戈津继承并发展了普京与日里诺夫斯基的成就，忠实地践行着他们的政治遗训。\n他的治国理念已被纳入中小学、高等学府及工作单位的必修课程。毫无疑问，德米特里·罗戈津的思想学说将成为俄罗斯未来数十年立国之本！"
 SOV_iron_fist_of_the_state: "国之铁腕"
 SOV_iron_fist_of_the_state_desc: "当下绝非与破坏分子玩猫鼠游戏的时机。昔日那些职能重叠的执法机构相互掣肘的旧体制，早已僵化失灵，徒然削弱了我们的力量。\n\n解决这一问题的最终方案理应明确：权力集中。人民安全委员会将整合边防、内务与国家安全职能，被赋予近乎无限的权限。对于俄罗斯劳动人民的敌人，绝不存在任何宽恕的余地！"
 SOV_subversive_action: "颠覆行动"
 SOV_subversive_action_desc: "我们无需将所有反对者悉数逮捕。从长远来看，这种策略反而可能适得其反，正如37至38年大清洗的教训所示。\n\n当前看似成效较缓、但更具战略价值的方案，是与民众展开互动以应对各类\"民主派\"问题。每一台电视机、每一只扬声器都将只传递正确信息，绝无其他杂音。我们将从根本上瓦解政府敌对势力的立足之地。\n\n至于那些最顽固不化者，自有强力部门予以处置。"
 SOV_favor_the_russian_proletariat: "支持俄罗斯无产阶级"
 SOV_favor_the_russian_proletariat_desc: "当今俄罗斯正面临着体力劳动者被彻底边缘化的危机。在西方思潮侵蚀下，孩子们的梦想不再是成为工程师或医生，而是追逐商人等纯粹资本主义身份。这一切的根源何在？正是叶利钦犯罪集团所谓的\"私有化\"掠夺行径，使俄罗斯陷入了不劳而获的狂热。加之来自中亚的廉价劳动力，最终彻底扼杀了俄罗斯无产阶级的生存空间。我们将彻底扭转这一局面：通过完善社会保障、提高薪资待遇等一系列举措，必将使劳动职业的声望达到前所未有的高度！"
 SOV_reawaken_consciousness: "唤醒意识"
 SOV_reawaken_consciousness_desc: "新库兹涅茨克的车床工与莫斯科的办公室白领、符拉迪沃斯托克的收银员与明斯克的教师之间，究竟有何共同纽带？正是俄罗斯血脉与文化认同将他们紧密相连。历史昭示我们：蒙古桎梏、动荡年代、1812卫国战争、伟大卫国战争——每逢外患压境，俄罗斯总能众志成城抗击侵略者。如今欧洲正酝酿反扑，我们只需自上层振臂一呼，全民必将闻令而动！"

 SOV_new_union_of_russia_and_belarus_tt: "\n\n\n\n£GFX_SOV_lukashenko_and_zyuganov\n\n\n\n\n\n§O\"我们是同根同源的斯拉夫民族，源自同一座洗礼池。我们的根系可追溯至数个世纪前。无论付出何种代价，我们都必须守护这份血脉。\"\n——亚历山大·卢卡申科§!"
 SOV_tbilisi_declaration_tt: "§O高加索各民族之间的友谊，体现在他们共同抗击诸多外来侵略者、反抗本国压迫者的斗争中，尤其彰显于为苏维埃政权胜利而并肩作战的历程。\n——察图尔·阿加扬§!"
 SOV_tashkent_agreement_tt: "§O\"但是，同志们，有一样东西比棉花更为珍贵——那就是我们国家各民族之间的友谊……而苏联各族人民的友谊是一项伟大而重要的成就。只要这种友谊长存，我国各民族就永远自由而不可战胜。\"\n——约瑟夫·斯大林§!"
 SOV_protect_russian_minorities_tt: "§O\"顿巴斯不是无关紧要的地区，没有它，社会主义建设就不过是一种善良的愿望。\"\n- 弗拉基米尔·列宁§!"
 SOV_soviet_moldova_tt: "§O\"我们共同走过了漫长的征程。中世纪时，我们曾共同捍卫神圣的基督教价值观；近现代，我们共同建设并守护了一个统一、伟大且公正的国家，抵御了无数敌人的侵袭。我们共同战胜了纳粹主义……如今我们一如既往，准备携手捍卫我们共同的原则与理想。\"\n——弗拉迪米尔·沃罗宁§!"

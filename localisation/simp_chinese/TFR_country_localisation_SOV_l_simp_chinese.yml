 SOV_social_populist_economy_desc: ""
 SOV_nadezhdin_plan: "纳杰日丁计划"
 SOV_nadezhdin_plan_desc: "纳杰日丁上台后，向全俄罗斯承诺实行自由化。他不会止步于政治领域的变革。现在是时候调整俄罗斯的经济结构，以便更好地满足俄罗斯人的愿望了。"
 SOV_state_corporations_liberalization: "国有企业自由化"
 SOV_state_corporations_liberalization_desc: "在德米特里·梅德韦杰夫任期内，不少原属寡头的企业被直接收归国有，但其管理模式……只能说，实在难称最优。或许我们该重新审视现行管理方式，让新思维为财政收入注入活力？"
 SOV_restructuring_public_sector: "重组公共部门"
 SOV_restructuring_public_sector_desc: "在我国推进国有企业市场化改革的过程中，我们突然发现公共部门自身的组织架构存在明显缺陷。其中部分企业完全可以进行合并重组，甚至有些机构完全可以毫无顾虑地予以裁撤。更何况，这些资产若交由私营部门经营或许能创造更大价值。"
 SOV_public_private_partnership: "公私合作"
 SOV_public_private_partnership_desc: "这固然有前任政府的\"功劳\"，但事实就是事实：许多私营企业家根本不敢在俄罗斯经商。这场巧取豪夺辛勤培育的企业、继而将其\"再分配\"给忠诚寡头的把戏，显然无益于我国经济。是时候终结这种恶劣污名化了，我们要证明私营部门与国家不仅能共存，更必须积极互助，才能使经济保持活力。"
 SOV_diversification_state_revenue: "国家收入多样化"
 SOV_diversification_state_revenue_desc: "长期以来，俄罗斯经济始终依赖资源领域，国库收入大半源于此。然而将所有鸡蛋放在一个篮子里是极其危险的策略，而我们为国家收入增设保障绝非多此一举。"
 SOV_comprehensive_support_medium_small_business: "全面支持企业"
 SOV_comprehensive_support_medium_small_business_desc: "中小企业在俄罗斯的生存处境一直岌岌可危。政府的目光总是聚焦在寡头掌控的大型企业身上，不是给予特殊扶持就是直接国有化，德米特里·阿纳托利耶维奇上届任期内的做法就是明证。是时候转变经济治理思路，启动系统性扶持计划了！毕竟，每个人都该享有开家咖啡店的机会，不是吗？"
 SOV_optimize_social_security: "优化社会保障"
 SOV_optimize_social_security_desc: "社会保障始终是国家财政支出的重要项目。支持公民无疑是正确方向，但现行执行方式亟待改进。是时候调整策略，步入正轨了。首先，我们将审查资金分配的官僚主义问题，这些拖延常使拨款流程异常复杂。其次，我们将重新评估资助对象与额度，或许并非人人都应获得同等份额。"
 SOV_affordable_housing: "聚焦经济适用房"
 SOV_affordable_housing_desc: "住房问题已成为21世纪俄罗斯的真正顽疾。多数年轻国民被迫与父母同住或租房，根本无力购房。我们怎能放任不管？是时候启动面向全社会各阶层的经济适用房计划了！"
 SOV_demographic_revitalization: "人口恢复项目"
 SOV_demographic_revitalization_desc: "俄罗斯与那些经历第五次人口转型的国家一样，面临着残酷现实：人口老龄化加剧、死亡率攀升，而出生率暴跌导致断层！我们必须立刻启动国家人口恢复计划，提高生育率，避免俄罗斯在下个世纪沦为历史遗迹。\n\n我们是俄罗斯人，我们要让同胞越来越多！"
 SOV_return_innovative_economy: "回归创新经济"
 SOV_return_innovative_economy_desc: "俄罗斯联邦曾一度奉行创新经济理念，以开拓新市场与多元化原则为根基。当然，政府后来因与西方经济对抗等种种原因，搁置了这种经济模式的发展。如今，回归这一道路的时机已经成熟。俄罗斯创新经济正在复兴。"
 SOV_reject_cheap_labour: "拒绝廉价劳动力"
 SOV_reject_cheap_labour_desc: "任何劳动都应当获得体面报酬。当前无论是私营企业还是公共部门，那些试图在薪资上\"精打细算\"的做法必须叫停。满意的劳动者才是高效的生产力。更重要的是，当人们获得体面工资后，将更有能力进行消费，这些资金最终会反哺经济，形成良性循环。"
 SOV_technological_modernization_production: "生产技术现代化"
 SOV_technological_modernization_production_desc: "可以说，我国的生产体系目前保持着相当良好的运行状态。毕竟，一个经济实力弱小的国家不可能单独打败整个欧洲。但追求卓越永无止境，产业发展始终存在提升空间。"
 SOV_nurture_cadres_future: "培养未来干部"
 SOV_nurture_cadres_future_desc: "安于当下、只顾眼前利益固然轻松。但正如旧日终将被新时代取代，世代更迭间，经济与国家却将长存。正因如此，为什么不未雨绸缪？我们将通过培育新锐人才的有效机制接续薪火，让创新经验与成熟方法共铸无愧于未来的经济体系，并源源不断输送高素质专家。"

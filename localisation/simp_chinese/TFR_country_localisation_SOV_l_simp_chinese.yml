 SOV_high_trust_society_idea: "高信任社会"
 russiaflavor.111.t: "夏日绵雨"
 russiaflavor.111.d: "参议院广场是圣彼得堡最美丽的地方之一。这正是丹尼斯时隔多年重游此地时的真切感受。自那场血腥的欧陆战争爆发后，为躲避动员令与战火荼毒，他移居邻国芬兰。战后上台的疯狂暴君阿里哈诺夫，将俄罗斯联邦改造成与墨索里尼或希特勒毫无二致的法西斯独裁政权。\n\n但就在最近，仅仅数月前，局势骤然发生一百八十度转变。数位勇敢的政治家、英勇的将领，当然还有阿列克谢·纳瓦利内，决定不再容忍极权统治，高举民主旗帜奋起反抗。他们的壮举终获成功，疯犬阿里哈诺夫仓皇而逃，民主自由的政治秩序得以在这片土地重焕生机。\n\n当丹尼斯沉浸在近日回忆时，不觉已行至青铜骑士像前。彼得大帝的纪念碑巍然屹立于公园中央，肃穆而公正地凝视着过往行人。这位伟大改革者的塑像，见证着曾将跪倒在地的国家重塑为强盛民族之邦的历史。雨珠沿着纪念碑缓缓滑落，接连坠向地面。凝望间，丹尼斯不由泛起微笑，他深吸一口沁入肺腑的空气，呼出时望向身后奔流的涅瓦河。自由的火炬已在俄罗斯重燃……"
 russiaflavor.111.a: "……而焚为灰烬者必将重燃！"
 russia.2123.t: "纳瓦利内继续从政！"
 russia.2123.d: "临时代理总统阿列克谢·纳瓦利内——他不久前才宣布不会参加即将到来的大选——突然发表声明称将参与角逐，并宣布组建名为\"人民联盟\"的新政党。"
 russia.2123.a: "为总统三呼万岁！"
 russia.2124.t: "总理问题"
 russia.2124.d: "在声势浩大的\"全国民主联盟\"组建完成后，政府面临着总理空缺席位的问题。联盟成员党的领导人之一必须接替这个国家第二重要的职位……"
 russia.2124.b: "鲍里斯·纳杰日丁！"
 russia.2124.a: "谢尔盖·米罗诺夫"
 russia.2124.c: "弗拉基米尔·雅库舍夫！"
 russia.2125.t: "新联邦的新名称"
 russia.2125.d: "过去十载，俄罗斯历经了诸多难以置信的变迁：梅德韦杰夫改革期、战争时期、阿里哈诺夫独裁统治以及新革命浪潮。在此背景下，\"人民联盟党\"国家杜马代表谢尔盖·纳利夫金提出一项颇具争议的议案——将国名更改为\"新俄罗斯联邦\"，以此象征历经动荡后民主俄罗斯的重生。"
 russia.2125.b: "就保持原样吧……"
 russia.2125.a: "为了新俄罗斯联邦！"
 SOV_history_continues_medvedev: "历史滚滚向前！"
 SOV_history_continues_medvedev_desc: "这场胜利向俄罗斯有力地证明，旧世界秩序已彻底过时，全新的主权秩序正取而代之。这场胜利为国家历史掀开了崭新篇章，为大规模复兴创造了广阔机遇。在这个最艰难的时期，德米特里·梅德韦杰夫展现了无可挑剔的领导力。\n他带领国家度过了现代史上最严峻的考验，展现出钢铁般的意志与政治智慧。正因如此，凭借其宝贵经验和人民信任，他将继续引领俄罗斯砥砺前行，在强化国家主权与增进人民福祉的道路上突破一切阻碍。"
 SOV_harness_peoples_front: "栓紧人民阵线"
 SOV_harness_peoples_front_desc: "全俄人民阵线已被证明是管理与整合公民社会的有效工具。有鉴于此，将其进一步融入总统制定的总体政治路线，将是合乎逻辑且具有战略意义的举措。这项任务由德米特里·梅德韦杰夫在政府结构改革时期提出，如今显得尤为重要。\n作为一个统一协调的机制，人民阵线将成为关键驱动力，推动俄罗斯沿着国家领导人制定的清晰而富有远见的道路前进。"
 SOV_improve_social_nets: "修缮安全网"
 SOV_improve_social_nets_desc: "自苏联时代起，俄罗斯就建立了强大的社会保障体系。在弗拉基米尔·普京的领导下，这一体系不仅得以保留，更持续完善。长期以来，该体系严重依赖油气收入的财政支撑，成为预算的沉重负担。\n如今随着经济实力增强与结构性改革的深化，我们不仅能履行现有社会承诺，更可大胆投入社会保障体系的升级发展。\n这标志着历史性转折：今日我们奠定的福利国家基石，将不依靠天然气资源，而是凭借自身工业实力与人才潜力，无惧任何外部压力屹立不倒。"
 SOV_strengthen_immigration_control: "加强移民管控"
 SOV_strengthen_immigration_control_desc: "昔日当我国面临制裁压力与劳动力短缺时，从邻国引入移民曾是必要举措。这种劳动力输入确实为经济发展提供了支撑。\n但时过境迁。如今这种支撑已弊大于利。现在正是为本国专业人才扫清道路的时刻，我们要保护本土就业市场，让俄罗斯多民族人口中的英才获得发展机遇。因此我们决定取消简化入境政策。我们完全有能力凭借自身力量建设未来。\n我们呼吁其他国家公民将资源投入各自祖国的发展建设。这才是实现共同繁荣的关键所在。"
 SOV_subdue_onf_members: "精英政府"
 SOV_subdue_onf_members_desc: "能者居之，这个真理般朴素的理念，却总因种种缘由难以实现。但对俄罗斯而言，这将成为根本原则。\n全俄人民阵线的行政方针将严格遵循任人唯贤原则。地方关键岗位不再由\"裙带关系\"决定，而是由那些用实绩而非空谈证明能力者担任。这将构建起新型晋升阶梯，不靠人脉与门第，凭真才实学实现阶层跨越。\n俄罗斯终将成为机遇向真正人才敞开的国度。只有用专业主义铸就的基石，才能建成强大而公正的俄罗斯。"
 SOV_promote_russian_multiethnicity: "促进社会公正"
 SOV_promote_russian_multiethnicity_desc: "俄罗斯继承了苏联时期保障劳动者与普通民众权利的健全制度。这些历经时间检验的机制、普惠的医疗体系与全民教育制度，至今仍在有效服务人民。\n抛弃这份经过实践检验的遗产不仅荒谬，更是重大失误。毕竟真正的福利国家正是以此为基础构建，在这里对公民的关怀不是空洞口号，而是切实的优先事项。\n这种对公平正义的追求体现在具体行动中：无论是劳动者权益保障、母婴权益支持，还是对困境群体的帮扶措施。这些正是坚实社会契约的根基，国家的强盛程度终将以人民福祉为衡量标尺。"
 SOV_support_political_integralism: "支持政治整合"
 SOV_support_political_integralism_desc: "俄罗斯的历史进程复杂而多维——既有至今仍令人心痛的篇章，也有政权更迭以无数生命为代价的漫长时期。然而我们的任务不是将历史简单划分为非黑即白，不是固守单一立场，而是怀着敬意从每个政治体制中汲取宝贵教训。\n帝国旗帜、苏维埃红旗与现代三色旗并非相互排斥的符号，而是绵延民族命运的不同棱面。每个时代都为俄罗斯国家建构作出贡献，每个时代都留下独特遗产——健全制度、文化成就、科学发现，以及那种让国家经受最严峻考验的\"坚韧特质\"。"
 SOV_enshrine_stateforming_people: "歌颂国父"
 SOV_enshrine_stateforming_people_desc: "俄罗斯是一个独特的文明实体，由众多民族与文化共同塑造。它们之间的相互尊重与数百年合作传统是我们的根本价值与力量源泉。同时，我们以深切敬意与感激之心认可俄罗斯民族作为国家基石的历史作用。正是俄罗斯的文化、意志与劳动，数个世纪以来凝聚起广袤疆域，缔造了我们共同归属的独特精神家园。\n俄罗斯民族认同不应被消解或置于其他民族的对立面，相反，它理应成为维系全俄民族多样性的核心纽带。在俄罗斯，成为俄罗斯人意味着要对国家命运承担特殊责任，成为连接各族裔的桥梁。"
 SOV_nationalist_autocracy: "民族专制"
 SOV_nationalist_autocracy_desc: "纵观俄罗斯悠久的历史，权力始终建立在强有力的领导原则之上。人民，特别是缔造了这个国家的俄罗斯人民，始终将领袖视为自身最重要的守护者。这种治理模式屡屡证明其有效性，只需回顾我国取得的伟大胜利与成就便知。\n在现代条件下，总统能够担任国家领袖的角色。他能够凝聚人民意志，依托我们的历史与传统，自信地引领俄罗斯迈向新的辉煌，在国际舞台上捍卫国家的发展道路和核心利益。"
 SOV_social_authoritarianism: "社会威权主义"
 SOV_social_authoritarianism_desc: "强大的国家权力本身并不等同于民族主义或类似意识形态。其效能可以建立在完全不同的基础上——社会基础。苏联时代留下的宝贵遗产就是明证，那些深入人心至今仍受尊崇的原则：对未来的信心、教育与医疗的普惠、劳动至上的理念。\n国家不仅宣告社会保护、公平与稳定，更通过总统背书将其切实落实——这正是其获得广泛民意支持的根基。这种\"社会契约\"——权力为民所用，民众信任权力——正是我们国家强盛与主权的保障。"
 SOV_executive_paternalism: "独裁家长制"
 SOV_executive_paternalism_desc: "强大的行政权力历来是俄罗斯稳定的基石与国家繁荣的关键因素。无论在弗拉基米尔·普京还是德米特里·梅德韦杰夫执政时期，总统始终是核心角色，其个人魄力与战略远见既为国家发展指明方向，更推动着复杂国家治理机器的顺畅高效运转。\n这种治理模式能确保对挑战的快速反应与政策连贯性，使公民在对领导人经验与意志力的信任中，获得对未来的稳定预期。"
 SOV_enrich_putinist_tenets: "完善普京主义原则"
 SOV_enrich_putinist_tenets_desc: "近年来，普京主义已超越单纯政治理念的范畴，演变为一种特殊的国家思维模式与决定俄罗斯前途的执政学说。\n为持续遵循弗拉基米尔·普京的政治理念，亟需将这一学说体系化，构建条理清晰且易于理解的框架。我们不仅要保留其核心思想，更需注入时代内涵，通过创新发展与内容补充，使其能够应对现实挑战并指引未来方向。这将确保政治理念的延续性，在新的历史条件下持续影响新生代。"
 SOV_stronghold_of_law_and_order: "法治堡垒"
 SOV_stronghold_of_law_and_order_desc: "稳定与秩序始终是俄罗斯社会的基本价值。国家将确保不惜一切代价维护这些价值视为首要任务。\n当然，有时当局的管控似乎过于严苛。但必须认识到，该体系的设计初衷并非限制自由，而是守护安全。当今世界新挑战与新威胁层出不穷，而我们的执法机构始终坚守在第一线，迅速化解各类危机。正是他们的工作，确保了所有公民在国内的生活始终安全可预见。"
 SOV_embrace_eurasian_heritage: "拥抱欧亚遗产"
 SOV_embrace_eurasian_heritage_desc: "有一种常见却有误的观点，即认为俄罗斯与欧洲文化有着不可分割的归属关系，大错特错。不可否认，双方各民族间有着悠久的历史联系，文化影响也在所难免。但绝不可忽视本质：俄罗斯始终是作为独特而完全独立的文化主体发展的。\n\n我们的文明融合了多民族遗产，有其自身的精神特质、特殊的社会模式、不同于西方的世界观。这并不意味着我们拒绝对话，而是要坚持在平等的立场上交流，而非盲从外来模式。因此，那些关于俄罗斯\"欧洲本质\"的论调，是在暗贬我国文化的广博独特性，无需为此再费口舌了。"
 SOV_glorify_pan_russian_patriotism: "弘扬泛俄爱国主义精神"
 SOV_glorify_pan_russian_patriotism_desc: "在这艰难时期，俄罗斯人民必须团结在全俄爱国主义的旗帜下。我们的任务是运用一切可用手段帮助他们实现这一目标：从各类文化节庆、校园课程到大规模信息宣传。\n我们更不应忘记自身最大优势：俄罗斯民族虽多元纷呈，但在坚守基本价值观、渴求强大主权国家这一根本诉求上，始终保持着坚不可摧的团结。"
 SOV_reinforce_presidential_administration: "强化总统行政权"
 SOV_reinforce_presidential_administration_desc: "在国家治理事务中，总统的决策权毋庸置疑。在此背景下，强化体现总统意志的核心机构——总统办公厅的职能地位显得尤为必要。\n赋予总统办公厅更广泛的协调与监督职能，将使整个国家机器的工作更具连贯性与协调性。这并非为集权而集权，而是为了确保国家领袖制定的方针路线得到有效贯彻、持续推行和全面落实。这种做法能保证所有国家机构如同精密机械般协同运作，共同实现国家目标。"
 SOV_russia_everlasting_era: "永恒时代"
 SOV_russia_everlasting_era_desc: "十载砥砺奋进，十载上下求索\n十载夙兴夜寐，十载胼手胝足\n十载狂澜怒涛，十载风雨如磐\n十载艰难险阻，度日如年，岁月如梭\n\n十载开物成务，十载熔铸精魄\n铸就万钧伟业！\n十载政令维新，十载治国安邦\n十载鼎新革故！"
 SOV_new_history: "历史新篇章"
 SOV_new_history_desc: "鲍里斯·纳杰日丁堪称当代俄罗斯政坛的\"变色龙\"。他曾以多个党派身份角逐公职：\"公正俄罗斯党\"、\"公民倡议党\"、\"成长党\"乃至\"统一俄罗斯党\"，但无论依托哪个政党，他始终是体制内自由派，矢志呼吁俄罗斯国家改革。\n\n或许正是这种特质，助他登顶俄罗斯联邦最高职位——总统宝座。纳杰日丁必将全力兑现自由化与社会公正的承诺，实现其\"新俄罗斯\"愿景。\n\n普京时代的故事，正逐渐改写为改革开放的自由主义新篇章。"
 SOV_popularize_front: "宣传阵线"
 SOV_popularize_front_desc: "尽管名为\"全俄人民阵线\"，它反映的却非俄罗斯民意，而只是统一俄罗斯党意志的投影。空头政治宣言、民粹主义与寡头游说——这些顽疾自该组织成立之初便如影随形。我们的使命是给予真正代表民意的青年才俊充分授权，由其执掌阵线。纳杰日丁要领导的绝非顽固守旧的官僚集团，而是矢志改变俄罗斯的热血青年！"
 SOV_comprehensive_political_integration: "全方位政治整合"
 SOV_comprehensive_political_integration_desc: "在俄罗斯官方政治体系之外，存在着无数影响民意的意见领袖。过去，这些人往往被贴上\"西方走狗\"、\"布鲁塞尔代理人\"的标签，遭受各种打压与迫害。但随着纳杰日丁团队执掌俄罗斯政府，对待反对派的态度已然转变。我们摒弃敌视立场，选择通过合作与吸纳青年的方式，让他们融入祖国的政治生活。毕竟，我们怀揣着共同的理想：建设一个自由而强大的俄罗斯！"
 SOV_establish_full_pluralism: "建立全面多元主义"
 SOV_establish_full_pluralism_desc: "全俄人民阵线是梅德韦杰夫试图改造普京体系的产物：它曾试图将激进共产主义者、民族主义者、自由派和保守派等所有政治力量收归麾下。然而现实证明，这种机制不仅未能带来真正的政治竞争，反而扼杀了最后的制衡假象，使所有主流政党都沦为阵线的附庸。但最终，俄罗斯人民将自主决定追随谁！"
 SOV_defeat_political_apathy: "战胜政治冷感"
 SOV_defeat_political_apathy_desc: "俄罗斯政治发展的核心顽疾，无疑是国民普遍存在的政治冷漠，这种对公共事务的疏离感在普京-梅德韦杰夫时代曾被视作优势：民众越少参与政治进程，对当局越有利，因为社会动荡的风险随之降低。\n\n但对崭新的纳杰日丁俄罗斯而言，政治冷漠是必须根治的沉疴。为使改革不至付诸东流，我们必须多管齐下：开展民意调查、激励社会政治参与、培养青年力量——通过全方位的民众工作昭示：主宰俄罗斯命运的应当是人民自己，而非政府！"
 SOV_concept_moderate_center: "温和中间派理念"
 SOV_concept_moderate_center_desc: "我们无需全盘否定梅德韦杰夫创立的人民阵线遗产。正如普京体系中的诸多机制一样，唯有通过改革，这个阵线才能臻于完善，转型成为真正代表人民利益，而非官僚集团利益的先锋力量。\n\n为此我们提出\"温和中派\"改革方案：既要清除阵线内部左右两翼的各类激进分子，更要肃清一切可能威胁俄罗斯民主体制的隐患。"
 SOV_reform_institutions_power: "改革权力机构"
 SOV_reform_institutions_power_desc: "俄罗斯这台国家机器虽已运转多年，如今却渐显疲态，弊病丛生。官僚体系极度僵化，行政效率严重滞后，民众在体制不公中备受煎熬。\n\n必须彻底整治这潭死水：淘汰庸碌无为者，擢拔青年才俊；裁撤数十个职能重叠的冗余机构；强力推进政府机构数字化转型；重塑民众对执政者的信任。国家应为人民服务，而非让人民供养国家！"
 SOV_enact_new_front_framework: "制定人民阵线新框架"
 SOV_enact_new_front_framework_desc: "如今各类激进势力已被彻底排除在国家治理体系之外，我们得以重新构建人民阵线的新框架。这一联盟将汇聚从社会民主主义者到保守派在内的纯粹民主力量，尽管理念存在分歧，但人民阵线的目标必须高度统一：服务人民、捍卫民众利益、守护俄罗斯民主。这实质上是一个将在俄政坛占据主导地位的中间派联盟。"
 SOV_fill_front_with_loyal_reformers: "用忠诚的改革者充实阵线"
 SOV_fill_front_with_loyal_reformers_desc: "当前，全俄人民阵线仍是梅德韦杰夫时代保守派政客的集合体，他们正积极阻挠纳杰日丁新政府施政。为确保政权稳定，必须对该党团进行自由主义改造，以忠于纳杰日丁及其理念的新干部替换旧官僚。如此革新将有效消弭内部阻力，加速推进必要改革。"
 SOV_nadezhdin_new_vertical: "纳杰日丁的新垂直关系"
 SOV_nadezhdin_new_vertical_desc: "旧政府机器已完全无法延续自由主义改革。现行管理体系与全俄人民阵线的保守势力捆绑过深，其代表断无可能支持新政府的倡议。因此根据纳杰日丁方案，现有权力垂直体系必须彻底重构：所有僵化过时的元素都将被清除，新一代管理者终获施展空间。毕竟纳杰日丁深谙改革从不始于法律条文，而始于执剑者的更迭。"
 SOV_full_liberalization: "彻底自由化"
 SOV_full_liberalization_desc: "政府下一阶段举措当属对公共政策的不妥协自由化改革，保障公民自由、强化反腐措施、维护民众利益等众多倡议将被提上议程。\n这些步骤旨在重获公众对政府的信任，并为长远发展奠定坚实基础。纳杰日丁政府力图证明新政绝非空头承诺，而是切实变革。"
 SOV_secure_presidential_republic: "保卫总统共和制"
 SOV_secure_presidential_republic_desc: "历史一再证明，俄罗斯民主制度唯有在总统扩权前提下才能实现稳定与必要效能。必须明确权力分布：议会主立法，总统掌行政，泾渭分明。\n此模式既可避免管理混乱，又能维系责任统一。在激进改革背景下，唯有强力的总统制政府方能确保关键决策的果断性。"
 SOV_strengthen_local_self_government: "加强地方自治"
 SOV_strengthen_local_self_government_desc: "在当今世界，民主制度不仅应存在于国家层面，更须扎根地方治理。民众理应通过地方政府，对关乎日常生活的决策施加影响。"
 SOV_full_transparency_elections: "选举完全透明"
 SOV_full_transparency_elections_desc: "纳杰日丁的首批改革举措之一，是依据完全透明与诚实原则彻底改革选举制度。从地方到联邦各级选举，都必须在公众监督下公开进行，杜绝舞弊。毕竟这位新领导人毫无理由向俄罗斯人民隐瞒任何事，因为人民才是权力的源泉。"
 SOV_social_justice: "社会正义"
 SOV_social_justice_desc: "纳杰日丁新政府的优先事项之一，是制定可靠的国家社会保障计划。每位公民都应享有体面养老金，每个困难群体都需获得必要补助，所有家庭都讲得到稳定财政支持。\n新政府的社会政策将立足公平性、普惠性与透明度三大原则。其核心目标是赋予民众对未来的信心，并向人民证明国家真切关怀他们的困境。"
 SOV_independent_justice: "独立审判系统"
 SOV_independent_justice_desc: "在持续推进民主化的背景下，建立独立的司法权力分支势在必行。作为国家关键制度之一，司法体系必须与其他政府领域同步实施改革与自由化。\n纳杰日丁的计划是为俄罗斯人民实现真正无偏见的司法公正。独立法院将成为公民权利的保障盾牌，也是制衡权力的有效工具。唯有如此，真正的法治国家方能成型。"
 SOV_new_hope: "新希望"
 SOV_new_hope_desc: "这座迥异于周遭的城邦，\n行人微笑间，只需五分钟，\n便让人重拾对奇迹的信仰——\n喷泉直上云霄绽放。\n\n不知这茫茫人世何处还能，\n寻得这般春光？\n或许我该放走顺路的清风，\n在此永驻徜徉，\n与你同行。"

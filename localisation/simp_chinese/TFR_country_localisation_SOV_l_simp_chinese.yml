 SOV_mother_russia_bleeds_idea_0_desc: "\n\n\n\n£GFX_SOV_mother_russia_bleeds_banner\n\n\n\n\n\n\"不出一小时，我就会把你们这老木屋打得稀巴烂，就像我砸朗姆酒桶那样。笑吧，你们笑吧！不出一小时，你们就笑不出声了。到那时，你们谁还活着，一定会觉得还是死去了好！\"\n- 罗伯·路易斯·史蒂文生《金银岛》"

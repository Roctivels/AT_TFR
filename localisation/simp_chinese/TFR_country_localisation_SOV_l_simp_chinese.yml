 SOV_rashkinism_idea: "拉什金主义"
 SOV_socialism_with_human_face_idea: "带有人性面孔的社会主义"
 SOV_socialism_with_human_face_idea_desc: "\n\n\n\n£GFX_socialism_human_face_banner\n\n\n\n\n\n§Y\"……不是教条，而是行动的指南。\"\n- 弗·恩格斯§!\n\n多党合作、政治多元化、民主与人道主义——这正是我们共产党人身为最为进步和不断发展的意识形态的代表、为了实现我们的目标所必须坚持的原则。人民应该明白，我党致力于发展和完善社会主义模式，而非单纯的重现往日。只有考虑到现代社会的挑战与需要，吸取历史的经验与教训，我们才能在新时代夺取列宁思想的伟大胜利！"
 SOV_partocracy: "一党专政"
 SOV_partocracy_desc: "\n\n\n\n£GFX_partocracy_banner\n\n\n\n\n\n§Y\"我们党和其他任何政党一样，力图为自己争得政治上的统治。\"\n- 弗·列宁§!\n\n共产党是在困难时期团结我国社会，以共同目标理想团结人民的力量。我们坚信团结互助与集体努力的力量。我们认为，只有通过团结合作，才能实现真正的繁荣。只有共产党能为我国全体人民创建真正公正而平等的社会。倘若我们团结一致，我们便能在新时代夺取列宁思想的伟大胜利！"
 SOV_zyuganovism: "久加诺夫主义"
 SOV_zyuganovism_desc: "\n\n\n\n£GFX_zyuganovism_banner\n\n\n\n\n\n§t久加诺夫主义§!是一种深受根纳季·久加诺夫本人影响的意识形态，引领着俄罗斯在共产党的旗帜下勇攀新高峰。对苏联历史价值的尊重、民族自豪与公义是这一意识形态的根基支柱。§d苏维埃爱国主义§!、§R马克思列宁主义§!和§O俄罗斯社会主义§!则是其三大组成部分。为了应对风云变幻的当代国际社会，§t久加诺夫主义§!对经典意识形态进行了当代诠释，亦将为全体社会成员创建公正而繁荣的社会视作自身的目标。"

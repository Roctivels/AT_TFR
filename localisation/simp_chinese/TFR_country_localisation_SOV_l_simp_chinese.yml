 SOV_gazprom_category: "管理俄气集团"
 SOV_prepare_the_union_state_category: "准备联盟国"
 SOV_prepare_the_union_state_category_desc: "§Y联盟国§!是俄罗斯与白俄罗斯两国为建立更紧密的政治、经济和军事一体化而提出的倡议。该倡议于1999年《建立俄罗斯和白俄罗斯联盟国家条约》后批准。\n§Y联盟国§!项目意图在两国间建立一个共同的法律框架，奉行一致经济政策并协调两国间的外交关系。然而，由于各种各样的政治经济问题，实现全面一体化的进程一直十分缓慢。现在该将其付诸实践了。"
 SOV_the_house_of_cards: "俄罗斯纸牌屋"
 SOV_the_house_of_cards_desc: "\n\n\n\n\n£GFX_SOV_russian_house_of_cards_banner\n\n\n\n\n\n\n\n自§Y弗拉基米尔·普京§!上台执政以来，俄罗斯政坛就化身为一个威慑、交易、人际关系等多种因素组成的繁杂机构，有人称其为\"克里姆林之塔\"。然而，其表面看似统一，内部却蕴藏着为各政治集团扩大自身影响力的机会，还有让这台政治机器停转的漏洞。\n当然，§Y总统行政机关§!会尽力去限制这种自私自利的行径。\n\n我们当前支持：[get_election_choice]\n\n\n\n[SOV_election_time_loc]\n\n\n\n\n\n\n---------------------\n§6自由主义反对派§!实力£GFX_RF_logo ：§R[?SOV_election_approval_rating_nav_var|-1%]§!\n（£GFX_pol_power [?SOV_liberal_opposition_dynamic_dynamic_var|=+2%]，£GFX_war_support_texticon [?SOV_liberal_opposition_dynamic_dynamic_var|=+2%]）\n"
 SOV_modernization_programme_category: "俄罗斯经济"
 SOV_modernization_programme_category_desc: "\n\n\n£GFX_russian_economy_background\n\n\n\n\n§G俄罗斯经济§!是一个由众多行业与部门组成的复杂体系。自2000年代初以来，国家一直积极通过国有企业及其他政府机制对经济进行调控。与此同时，私营企业同样扮演着重要角色，市场整体在自由竞争的环境中运作。\n\n尽管£GFX_Gazprom_logo §Y寡头集团§!已不再能直接操纵国家进程，他们仍在经济领域保有一定影响力，并可在获利的前提下为我们提供协助。[SOV_oligarchs_gui]"
 SOV_NATO_war_category: "同北约的战争"
 SOV_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\n同西欧国家的战争已然不可避免。把我们拦在欧陆霸主交椅前的最大障碍，就是北约的存在。\n\n这场战争无异于任何战争，§R总有结束的那一天§!，但我们必须赶在兵败如山倒或人民无法忍受前将之结束。总参谋部建议不要在§Y春季§!发起进攻……但，如果那是最佳的时机，我们照打不误！为了取得决定性的胜利，我们必须牢牢掌控§Y华沙§!§R和§!§Y布达佩斯§!。战争胜利后，那些被征服的§C北约§!国家会§G并入§!我国。\n\n\n§R主要目标§!：\n\n§Y华沙§!：[GLOBAL.get_warsaw_status]\n§Y布达佩斯§!：[GLOBAL.get_budapest_status]\n§Y基辅§!：[GLOBAL.get_kiev_status]\n\n§R次要目标§!：\n\n§Y维尔纽斯§!：[GLOBAL.get_vilnius_status]\n§Y布加勒斯特§!：[GLOBAL.get_bucharest_status]\n§Y敖德萨§!：[GLOBAL.get_odessa_status]\n§Y里加§!：[GLOBAL.get_riga_status]\n§Y克拉科夫§!：[GLOBAL.get_krakow_status]\n\n§G盟友城市§!：\n\n§Y明斯克§!：[GLOBAL.get_minsk_status]\n§Y顿涅茨克§!：[GLOBAL.get_donetsk_status]\n§Y罗斯托夫§!：[GLOBAL.get_rostov_status]\n§Y塞瓦斯托波尔§!：[GLOBAL.get_sevastopol_status]\n§Y加里宁格勒§!：[GLOBAL.get_kaliningrad_status]"
 SOV_politburo_category: "最高苏维埃"
 SOV_politburo_category_desc: "\n\n\n\n\n£GFX_SOV_politburo_banner\n\n\n\n\n\n\n\n§Y最高苏维埃§!是我国最高国家权力机关。\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"

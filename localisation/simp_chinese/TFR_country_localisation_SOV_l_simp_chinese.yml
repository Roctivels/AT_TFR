 launch_a_cprf_campaign: "£SOV_propaganda_text_icon 为§R俄罗斯联邦共产党§!举行竞选活动"
 launch_a_cprf_campaign_desc: "\n\n\n\n\n£GFX_SOV_CPRF_banner\n\n\n\n\n\n俄罗斯联邦共产党作为工人阶级的拥簇，同时也是国家杜马的第二大党，他们坚决反对寡头政治和贫困，并为争取工人权益而战，而当然，其最终目的是为了恢复苏维埃祖国。当许多\"非体制内\"的共产主义者喝斥\"修正主义！\"时，却殊不知正是因为他们才孕育了工人阶级的腐化，而他们却还等着坐享革命成果。俄罗斯联邦共产党不会这么做，他们之所以接受议会政治，就是为了吸引更广泛的受众，以及借这个平台鼓动革命。\n\n俄罗斯共产主义情结在如今依旧十分强烈，或许这个第二可以将他的上头取而代之。"
 launch_a_ldpr_campaign: "£SOV_propaganda_text_icon 为§8俄罗斯自由民主党§!举行竞选活动"
 launch_a_ldpr_campaign_desc: "\n\n\n\n\n£GFX_SOV_LDPR_banner\n\n\n\n\n\n俄罗斯自由民主党一直以其苏联时期苏共衰落后最先成立政党的身份为傲。其作为国家杜马第三大党，由魅力十足的杂耍集团表演者弗拉基米尔·日里诺夫斯基领导。尽管该党名字带有“自由”“民主”，但内部不仅吸引了小企业主，还受到许多民族主义者、君主主义者以及其他离经叛道之人的欢迎。他们以反共主义为党纲，积极推动针对移民与寡头的强硬政策；他们拥有忠实的竞选基层，还能扩大自身在基层的票源。假如发生了什么情况，自由民主党将身先士卒成为激进派冲锋队。日里诺夫斯基希望能亲眼见证俄罗斯民众恢复民族自豪感，而他将为此不择手段。"
 launch_a_liberal_campaign: "£SOV_propaganda_text_icon 为§G自由主义者§!举行竞选活动"
 launch_a_liberal_campaign_desc: "我操你妈的，你在我们政府身上拉屎。你这个合法的歹徒在我们政府身上拉屎。这样我就能战胜你，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大，你的自我可以如此强大……通过 moby_54_msk。你好 马丁·阿列克谢耶维奇 我操你妈的 我操你妈的 我不能操你妈的 你这自大狂，你这自大狂，你这自大狂，你这自大狂 而这种自我可能是如此强大。"
 launch_a_ur_campaign: "£SOV_propaganda_text_icon 为§C统一俄罗斯党§!举行参选活动"
 launch_a_ur_campaign_desc: "\n\n\n\n\n£GFX_SOV_UR_banner\n\n\n\n\n\n统一俄罗斯党已经独霸执政党几十载之久。除开那些要求\"政治公正\"的诋毁之徒，大多数俄罗斯人支持统一俄罗斯党只有两大原因——稳定并能稳步向前发展。与其他的竞争对手不同，统一俄罗斯党并不想要复兴苏联或是俄罗斯帝国，如今的联邦就是他们的心之所向，并仍将维持下去，一味追寻从前的幽灵只会引发毁灭。统一俄罗斯党的主要政治目标是让俄罗斯在生活领域的方方面面获得真正的主权，并最终推动多极化世界。"

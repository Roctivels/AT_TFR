 party_SOV_intergralists_tt_long: "£GFX_russian_flag_pin §C人民团结中心§!\n\n\n\n\n£GFX_SOV_center_of_unity_banner\n\n\n\n\n\n\n§g人民团结中心由统一俄罗斯党骨干成员及无党派务实技术官僚组成。作为最稳定的政治力量，他们总体上希望延续普京政策路线，仅需进行小幅强化调整。虽然该群体忠诚度最高，但正因如此，其内部未能形成能够突破成为\"非正式领袖\"的强势人物。§!"

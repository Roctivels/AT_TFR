 SOV_national_russia_rises: "民族俄罗斯崛起"
 SOV_national_russia_rises_desc: "当弗拉基米尔·沃尔福维奇溘然长逝，权力真空骤然显现。无数投机者如秃鹫环伺死牛般觊觎自由民主党这面荣耀旗帜，但亚历山大·舍林始终铭记日里诺夫斯基的遗志，自民党首先是俄罗斯人民利益的捍卫者。同志们，升起帝国的三色旗吧！为俄罗斯民族而战的烽火永不熄灭。乌拉！"
 SOV_the_great_philosophy: "伟大哲学"
 SOV_the_great_philosophy_desc: "弗拉基米尔·日里诺夫斯基、伊万·伊林、弗拉基米尔·普里什克维奇、亚历山大·季诺维也夫、伊万·索洛涅维奇——这份名单可以无限延续。这些先驱者以对祖国的无上忠诚、深邃智慧与钢铁意志共同铸就了俄罗斯文明的灵魂。他们不仅是古代先哲思想在俄罗斯土壤的传承者，更将这种文明升华成独特的民族信仰。正是这些爱国者的思想火种，锻造出今日俄罗斯民族的精神脊梁。他们的箴言必将刻进历史教科书，融入每个公民的血脉，成为永恒的精神遗产。"
 SOV_national_jingoism: "国家沙文主义"
 SOV_national_jingoism_desc: "大俄罗斯沙文主义应当成为构建真实俄罗斯世界的意识形态基石。这种思想源于谢尔盖·乌瓦罗夫提出的\"正教、专制、民族性\"三位一体原则，后经弗拉基米尔·普里什克维奇领导的黑色百人团运动发展完善。唯有伟大的俄罗斯民族才能充当连接东正教文化与实行沙皇式统治的强权君主之间的核心纽带。"
 SOV_the_white_empire: "白色帝国"
 SOV_the_white_empire_desc: "部分俄罗斯民族主义者笃信，俄罗斯因骇人的十月革命而消亡，直至近年才得以重生。然其忘却尚有诸多思想精英成功流亡海外，始终传承着伟大的民族理念。正是通过伊林、索洛涅维奇等哲学家的著述，诸多思想火花得以迸发，最终汇聚成统一的意识形态体系。\"白色帝国\"便是我们所确立的新官方信条，一个真正具有民族宗教特质、崇尚贵族精神民族主义的俄罗斯。同志们，这场征程永无止境，斗争仍将持续。"
 SOV_all_russian_veteran_organization: "全俄老兵组织"
 SOV_all_russian_veteran_organization_desc: "当现役军人消耗殆尽，参战老兵往往沦为生活边缘人。他们既难以融入和平年代的生活范式，又拒绝迎合现世潮流。而那些背弃为国奋战将士的国家，实乃可耻！我们将创立全俄退伍军人组织，为所有武装冲突的老兵提供援助，助其重归和平生活正轨。"
 SOV_glorify_russian_victories: "弘扬俄罗斯胜利"
 SOV_glorify_russian_victories_desc: "世上几乎没有一个国家像俄罗斯一样，多次捍卫自身独立与生存权利。我们多次与欧洲对抗欧洲征伐，阻止西方生活方式的强加。当蒙古铁骑试图奴役我们时，俄罗斯奋起抵抗，终获胜利。在一千多年的历史中，从未有人能够征服我俄罗斯，缚我们为奴。荣耀属于俄罗斯之胜，永恒荣光属于那些为俄罗斯伟大而牺牲的烈士！你的名字无人知晓，你的功绩永世长存！"
 SOV_revive_solidarist_practices: "复兴协作主义"
 SOV_revive_solidarist_practices_desc: "曾几何时，布尔什维克确实为俄罗斯留下了诸多\"遗产\"。他们将伟大的俄罗斯民族割裂，炮制出诸多反俄的伪民族。然而他们最辉煌的\"功绩\"，是在俄罗斯民族之间播下仇恨——贫民开始憎恨富人，社会脆弱的秩序被彻底颠覆，被蛊惑的群众最终摧毁了民族菁华。但我们绝不容许历史重演！当今社会没有阶级，更不存在阶级斗争！工厂主与工人是天生的盟友，而非敌人。全体公民都铭记这一真理！"
 SOV_restructure_the_party: "重建政党"
 SOV_restructure_the_party_desc: "自由民主党历来是诸多政治思潮的避风港。我们虽同属民族主义阵营，但对\"伟大俄罗斯\"各有不同构想。有人向往不可战胜的帝国版图，有人主张建立民族民主共和国，甚至有人试图将俄罗斯民族主义与社会主义嫁接。然而我们始终团结如一，直到弗拉霍维奇·日里诺夫斯基离世之日。事实证明，这个曾经统一的运动竟如此轻易分崩离析。如今因党内倾轧，自民党声望日渐式微。我们必须清除机会主义分子，铸就鲜明的意识形态纲领！"
 SOV_rise_of_blueshirts: "蓝衫军动员"
 SOV_rise_of_blueshirts_desc: "陆军战友协会，或称\"蓝衫军\"，是日里诺夫斯基时期兴起的俄罗斯民族主义者自发组织。该团体部分效仿二十世纪爱尔兰类似组织的风格，自一成立便成为不可小觑的力量。他们既保护普通市民免遭移民抢劫，又开展捍卫俄罗斯文化的行动以消弭有害影响。若拒绝给予这些爱国者政府支持，实属对国家精神的亵渎。"
 SOV_kickstart_the_propaganda_machine: "重启宣传机器"
 SOV_kickstart_the_propaganda_machine_desc: "我们生活在世界上最伟大的国度，所有国家都心怀羡慕！但我们的公民更应深刻认知到这份荣耀！在国家扶持下，数十项爱国宣传项目将如雨后春笋般涌现——社交媒体推送、电视专题报道、网站横幅广告，乃至现实世界的实体广告手段都将向公民们展现爱国思想。这一切只为让每位公民铭记：身为俄罗斯爱国者乃至高荣耀！"
 SOV_unity_with_the_church: "团结教会"
 SOV_unity_with_the_church_desc: "自文明肇始，俄罗斯便在东正教的庇佑下成长。漫漫岁月，我们的民族以信仰为灯塔，以爱国为脊梁，而今，政教合一的契机已然到来。幸运的是，时至今日，教会始终与我们同心同行。"
 SOV_national_revolution_of_russian_soul: "民族革命，俄族英魂"
 SOV_national_revolution_of_russian_soul_desc: "奋起吧，兄弟们！让俄罗斯的旗帜在风中怒放，让三色荣耀在我们的手中翻腾！所有俄罗斯的儿女，昂首挺立，高举祖国的旗帜，将它披戴在身！歌颂俄罗斯之魂！歌颂祖国之辉煌！歌颂先祖之壮举！跨越世纪的苦难，我们终究踏上通往克里姆林宫的征途，在那巍峨的城墙下掀起民族的复兴。漫长的等待之后，属于俄罗斯子民的国家终于屹立，我们绝不容许任何力量动摇这份理想与荣光。俄罗斯的世界，唯我们共守，共荣！"
 SOV_handbook_for_russian_nationalist: "俄罗斯民族主义手册"
 SOV_handbook_for_russian_nationalist_desc: "民族主义绝非仅止于对祖国和人民的热爱，它更是对传统与完整生活方式的深切尊崇。然而，并非所有公民都意识到这一点。我们将联合知名保守派哲学家与出版社，共同编纂一部俄罗斯民族主义典籍。这部著作将涵盖真正爱国者所需的一切，从本党纲领到正确规划生活的实践指南，应有尽有。"
 SOV_enforce_russification: "强制俄罗斯化"
 SOV_enforce_russification_desc: ""
 SOV_embrace_corporatist_model: "拥抱法团主义模式"
 SOV_embrace_corporatist_model_desc: "苏联的计划经济因低效而崩溃，而自由市场则让公民暴露在贪婪商人的剥削之下，他们总是不放过任何机会，通过欺诈攫取财富。然而，正如所知，困境之中总有出路。事实证明，法团主义在实施的国家中表现良好，并且在我们看来，这是长远发展的最佳选择。经过严格筛选的企业将负责市场经营，并掌控我们的经济运作。"
 SOV_by_the_will_of_god: "依神之愿"
 SOV_by_the_will_of_god_desc: "俄罗斯历史上首次确立了近似神权政体的秩序。官方宣布东正教牧首作为俄罗斯国家元首，同时兼任俄罗斯东正教会最高领袖。然治理如此庞大之国非一人之力可及，遂即刻成立圣主教公会，由伊万·阿赫洛贝斯金掌舵——这位在许多人心目中颇具争议的人物，其振兴俄罗斯的构想甚至比本人更令人侧目。但我们必须坚信，在上帝的庇佑与旨意之下，他必将引领俄罗斯走向真正的伟大！"
 SOV_on_line_with_kirill: "与基里尔同行"
 SOV_on_line_with_kirill_desc: "俄罗斯正教会对其信众拥有巨大影响力。尤其在当下，举国上下都在聆听牧首的箴言。阿赫洛贝斯金的处境目前岌岌可危，明智之举是与俄罗斯正教会保持良好关系，唯有如此，我们的政策才能如春风化雨般为民众所接纳。"
 SOV_ally_with_hardline_priesthood: "同强硬司祭结盟"
 SOV_ally_with_hardline_priesthood_desc: "俄罗斯正教会内部存在着比多数司祭更具激进信仰的群体。如持戒修士塞尔吉乌斯、\"正教会旗帜联盟\"及其\"不正教毋宁死\"的极端主张、宣扬救世君王教义者——官方教会始终对其抱持戒心，斥之为\"犯异端罪者\"、\"激进分子\"。但我们坚信，这些人才是抵御西方各类腐蚀性影响的东正教信仰捍卫者。我们的理念与其多有相通，若能在民众视野中逐步恢复他们的名誉，将是合乎逻辑的选择。"
 SOV_install_orthodox_fundamentalism: "弘扬正教原教旨主义"
 SOV_install_orthodox_fundamentalism_desc: "自公元988年起，东正教便成为俄罗斯国家的根本性宗教，它团结人民，强化民族的精神根基。纵观历史，信仰塑造了我国的生活方式、道德准则与文化传统。然而近两个世纪以来，其影响力日渐式微，在俄罗斯人日常生活中逐渐失去应有地位。我们视此为不可容忍之事。信仰是我们历史不可分割的组成部分，是力量与韧性的源泉。因此自即日起，我们将重树东正教在日常生活中的主导地位，复兴那些支撑俄罗斯数百年辉煌的灵性传统。唯有根植于坚实精神价值观的民族，才能昂首阔步开创伟大未来。"
 SOV_mass_religious_education: "大众宗教教育"
 SOV_mass_religious_education_desc: "俄罗斯教育始于教区学堂，孩童们通过圣经典籍习得书写。随着年轻一代教育日益世俗化，可悲的后果随之显现：教育领域的自由思想成为导致20世纪混乱的第一块多米诺骨牌。如今教会既已执掌国政，必须强化宗教在教育中的地位。以教堂圣咏取代亵渎神灵的摇滚歌剧音乐课，通过削减生物课程来增设圣经典籍与其他教会文献的研读课时。"
 SOV_the_new_russian_trinity: "新俄罗斯三位一体"
 SOV_the_new_russian_trinity_desc: "普京、日里诺夫斯基、阿赫洛贝斯金构成了一条清晰而合乎逻辑的传承脉络。第一位在艰难时期后巩固了国家，第二位顶住了与整个欧洲开战的严峻考验，第三位将带领俄罗斯继续迈向充满灵性与伟大的未来。无论在何时，俄罗斯都需要一位强大而果断的领导人，能够带领人民向前迈进。"
 SOV_co_patriarch: "联合牧首"
 SOV_co_patriarch_desc: "伊万·阿赫洛贝斯金是我国的主要人物。绝大多数政府决策的制定和批准都仅凭他的意志。而基里尔大牧首这一形象，更多是公开层面的存在，已变得类似天主教教皇的角色：实际上他在国家中并无实权，仅是俄罗斯的精神领袖。阿赫洛贝斯金及其在圣主教公会中的激进派坚持要求提升他们在国家中的角色——从即日起将设立\"副牧首\"职位，即牧首之后的国家第一人，这一职位自然将由圣主教公会首脑担任。届时，东正教原教旨主义者对俄罗斯的全面控制将无人能阻。\n即使是上帝也不例外。"
 SOV_union_of_the_faithful: "信徒之联合"
 SOV_union_of_the_faithful_desc: "圣主教公会是我国的主要权力机构，其职权涵盖高级职位任命、立法及最高司法活动。但其与全国信徒之间缺乏实质联系。\n正因如此，才出现了创立信徒联盟的倡议，这是一个具有咨询职能的半议会机构。当然，这并非直接民主制，但至少能暂时安抚我们的反对者。"
 SOV_restore_societal_piety: "重建社会信仰"
 SOV_restore_societal_piety_desc: "在古时，不赴教堂者即为社会弃儿，与之来往皆成险事。无论贫富贵贱、长幼尊卑，全民皆赴教堂礼拜。但在现代社会，教会地位因无神论布尔什维克之祸而日渐式微。虽然日里诺夫斯基试图力挽狂澜，但终是杯水车薪。\n我们绝不允许这种颓势延续，因此上教堂与恪守基督教道德规范将成为国民义务。在西方威胁日益严峻的当下，我们绝不能示弱！"
 SOV_deploy_the_oprichniks: "部署特辖区管"
 SOV_deploy_the_oprichniks_desc: "尽管日里诺夫斯基政权已倾力而为，俄罗斯国内仍潜藏许多暗敌。如今更混杂着与我们信仰格格不入的异端分子，这些实例妄图动摇社会根基，此举正中欧洲赤色分子下怀。\n正因如此，圣议会力主效仿伊凡四世旧制，重建特辖军体系。正如16世纪般，该机构将获准搜查并剿灭俄罗斯之敌。尽管有人担忧重蹈历史覆辙，但奥赫洛比斯京态度坚决：保卫俄罗斯国家与人民的神圣使命，足以使任何手段正当化。"
 SOV_consecrate_armed_forces: "为军队祝圣"
 SOV_consecrate_armed_forces_desc: "欧陆战争暴露出我军的一个重要问题：士兵普遍缺乏宗教信仰。战士们不仅随身携带异教符号与护身符，更流传着向身份不明的\"神皇\"祈祷的祷词。圣议会对此深感忧虑，要求强化教会在军队中的作用。为解决此问题，拟增加随军神职人员编制并提升宗教政治地位。俄罗斯士兵应坚信主与其同在，即便战死，亦将作为殉道者升入天堂，而敌人只会迎来湮灭。"
 SOV_faith_is_blind: "信仰即盲目"
 SOV_faith_is_blind_desc: "历经共产主义与资本主义对俄罗斯人民数十年的压迫，社会逐渐形成物质至上观念。财富不在于灵魂，而在于\"南斯拉夫式\"墙体、录音机、电话、公寓与汽车。这种价值观甚至侵蚀了城市风貌，正是商业主义腐蚀了信众的心灵。\n而今，我们将摒弃一切破坏民族道德形象的浮华之物。东正教实用主义正是我们所需！在这片土地，精神之美高于一切！"
 SOV_beautify_our_cities: "美化我国城市"
 SOV_beautify_our_cities_desc: "现代俄罗斯城市及其居民区沦为黑暗的水泥森林。这般令人泪目的丑陋，正是心理危机与酗酒现象蔓延的根源！而这一切罪魁祸首何在？自然是奉行无神论信条与野兽派建筑的共党分子！我们将拨乱反正：增建俄式传统民居，广植园林绿地，遍立教堂圣殿！俄罗斯的城市风貌必须映照出东正教信仰的光辉与至美！"
 SOV_empower_metropolitans: "赋权都主教"
 SOV_empower_metropolitans_desc: "都主教制度自公元四世纪便已确立。基督徒们藉此划分罗马与拜占庭疆域，每片大都会区皆由都主教统领。这一制度在俄罗斯延续至今。若能通过都主教体系进一步巩固教廷对地方政务、特别是行政机关与司法系统的掌控，不失为良策。"
 SOV_our_sacred_history: "我们的神圣历史"
 SOV_our_sacred_history_desc: "自古以来，俄罗斯的命运便与基督信仰交织相连。从弗拉基米尔·斯维亚托斯拉维奇的受洗之举，到1943年牧首制的恢弘复兴，东正教始终伴随俄罗斯民族，见证其辉煌亦承受其苦难。当然，俄罗斯曾遭受近一个世纪的无神论布尔什维克压迫，但最终，它得以恢复并重建了正确的基督教秩序。如今，在俄罗斯东正教会和伊万·阿赫洛贝斯金的严格指导下，神圣的俄罗斯正稳步前行，朝向那应许之境，迈向尘世间圣国的辉煌复兴。"
 SOV_worship_house_in_every_khrushevka: "楼楼有神坛"
 SOV_worship_house_in_every_khrushevka_desc: "为了让俄罗斯的每一位居民都能更贴近信仰与灵性，每栋住宅、每座赫鲁晓夫楼里都将设立一座祈祷室，一个可以让人静下来祈祷和反思的地方。这个场所将成为日常生活中不可或缺的一部分，提醒人们东正教传统的重要性。在这里，每个人都可以与家人共同探讨信仰问题，研读灵修经典，甚至无需远行便能参与礼拜。这将是精神生活复兴的重要一步，让信仰重新回归每个人内心的神圣位置。"
 SOV_sanctify_our_economy: "圣化我国经济"
 SOV_sanctify_our_economy_desc: "正教会历来回避经济活动。诚然，总有人指责我们生活奢靡，妄议牧首及其他要员坐拥游艇豪车，但这纯属陈年谬论。\n今时不同往日，教会必须学会经济运营之道，否则将无立足之基。我们将建立紧密关联的银行家与企业家网络，藉此掌控俄罗斯经济命脉，将基督教价值与道德准则渗透至经济关系的骨髓。"
 SOV_prepare_for_the_crusade: "准备圣战"
 SOV_prepare_for_the_crusade_desc: "阴云正在欧洲上空集结。那些未根除的红色瘟疫势力在边境聚集，妄图奴役我们的文化、摧毁东正教信仰。但我们绝不会任其打我们一个措手不及！整个俄罗斯都将为这场讨伐欧洲共产主义的新十字军东征厉兵秣马！随着古老的战斗呐喊\"戈伊达！\"，成千上万俄罗斯勇士必将从欧洲大陆肃清恐俄症与无神论的余孽！颤抖吧，红色世界，我们来了！"
 SOV_kurginyan_red_empire: "库尔金扬的红色帝国"
 SOV_kurginyan_red_empire_desc: "帝制，或是毁灭！这就是俄罗斯唯一的道路。早在1994年，谢尔盖·叶尔万多维奇·库尔金扬便已预见此局。然而，三十年过去，库尔金扬自己已然掌权，而俄罗斯——虽已重塑帝国辉煌，却又在裂变之中。内有奸佞，外有虎视，四方觊觎者皆欲夺走俄罗斯子民的国权国土，但这绝不可能会发生！是时候建立一个全新的俄罗斯国家——一个不再与自身历史为敌、不再纠结于过往幽影的强国。红色帝国的时代，已经到来！"
 SOV_subdue_reactionary_nationalities: "镇压反动民族派"
 SOV_subdue_reactionary_nationalities_desc: "很久以前，布尔什维克在俄罗斯革命的烈火中夺取了政权。他们怀揣一个伟大的目标——打造一种全新的人类，一种在世界历史框架内连歌德和黑格尔都会相形见绌的存在。然而，这个理念却被不同的人以不同的方式理解。于是，超人没有出现，反而是反动的民族身份如雨后春笋般冒了出来。乌克兰人、哈萨克人、白俄罗斯人等等，摧毁了俄罗斯社会原本铁板一块的结构。当然，斯大林同志试图压制这些情绪，但为时已晚。几十个次级认同已经诞生，甚至还涌现出为这些事业奋战的狂热分子。自然，这些人为制造的民族无法建立稳定的国家，这一点我们在近代历史中已见分晓。他们失败的原因很简单：他们背弃了真正的俄罗斯人所固有的集体主义和兄弟情谊。通过新的改革，我们将引导这些民族走上正途。我们将清楚地展示，为什么名为时间的法庭对他们做出了这样的判决。"
 SOV_dictatorial_leadership: "独裁领导"
 SOV_dictatorial_leadership_desc: "独裁者、暴君、专制者。不知为何，在西方思想短暂胜利后，所有这些词汇在现代社会都成了贬义词。为何一个能够捍卫自己民族、准备维护自身利益的强人领袖会被马上泼上污水？答案很简单。这就是恐惧。俄罗斯人民孕育伟大领袖的能力始终是我们的优势。这种令人生畏的力量，引发了那些害怕失去权力与统治地位之人的恐慌。西方国家的根基是早已被国家压制了激情的民众。而我们苏维埃人民从不畏惧迎接时代的挑战！是时候再次让强有力的手掌握俄罗斯的政权，带领人民走向光明的社会主义未来了。"
 SOV_elitist_party_apparatus: "精英化党政机关"
 SOV_elitist_party_apparatus_desc: "厨师能管理国家吗？这种愚蠢的问题，答案必须是斩钉截铁地的\"不！\"。让门外汉执掌如此精密的国家机器，不仅是亵渎神明，更是自取灭亡的开端。既然如此，何不将党组织彻底重塑为我们所用？要跻身权力核心，必须历经忠诚度审查等重重试炼——但这份代价，不正值得为国家统治权付出么？至于党员享有的特殊待遇嘛，您懂的。"
 SOV_new_russian_statecraft: "新俄罗斯治国"
 SOV_new_russian_statecraft_desc: "当叛徒掌握政权，国家的衰亡便不可阻挡。当民众对意识形态失去信仰，他们便不再为政权效力。苏联的悲剧正在于此——所谓\"知识分子\"与部分民众公然嘲笑工人阶级领导权的理念。绝不能让这些人在我们联盟中扎根！愿我们伟大国家的全体公民知晓：他们的奋斗是为了俄罗斯民族与全人类的荣光。"
 SOV_knights_of_crimson_order: "绯红骑士团"
 SOV_knights_of_crimson_order_desc: "世上存在完全向公众公开一切的政权么？当然不存在。因此我们必须保有必要的运作空间。来自特工部门的新骑士们，将使我们国家得以在必要时排除激进分子——而这不过是为了维护普通公民的和平生活，使他们免受敌人腐化影响的必要之举。万岁，同志们！荣耀归于苏维埃特工部门——我们的守护者与捍卫者！"
 SOV_ministry_of_peoples_knowledge: "人民认知部"
 SOV_ministry_of_peoples_knowledge_desc: "忠诚是极其难以培养的品质。哪怕是社会主义思想的真正巨人——苏联，也终究未能说服公民相信马恩思想的正确性。但我们将更进一步，通过成立专门部门让公民对所处国家未来充满信心。有人会称之为洗脑，也有人说这是廉价宣传。但请自问：谎言纵使重复千遍，又如何能成为真理并根植人心？若你回答\"可以\"，那它果真仍是谎言么？"
 SOV_holy_red_army: "神圣红军"
 SOV_holy_red_army_desc: "没有比为国捐躯更光荣的死法。若不相信自己站在正义一方，便不可能真正打起勇气。正因如此，我们要为伟大军队注入神圣信仰！如同圣战者般，我军战士将高呼基督之名奔赴战场，各部队都将配备经特殊训练的战斗牧师。人民红军的将士们已准备好为人类未来而战，为守护公民安眠而牺牲。英雄壮举永垂青史，他们的灵魂终将升入天国，与伟大殉道者并肩立于圣徒之列。我军万岁！愿主亲自指引战士们的准星。颤抖吧，卑劣的敌人！我们这支圣乔治般的军队，誓要斩杀一切恶龙！"
 SOV_condemn_european_red_globalism: "谴责欧洲赤色全球化"
 SOV_condemn_european_red_globalism_desc: "当伟大的俄罗斯军队遭遇挫败后，欧洲在表面上转而接受了社会主义理念。但他们的社会主义算什么东西？不过是金融资本中最具全球主义色彩的势力披着道德外衣的绝望挣扎，假意关怀无产阶级罢了。俄罗斯人民岂会轻易受骗？我们透过历史迷雾，看得真真切切——有人打着社会公正的旗号，用堕落的西方文化马克思主义剥削轻信的无产阶级；而真正为工农权利浴血奋战的，一直都是我们！敌人休想得逞！欧洲全球主义的末日终将降临！在此之前，我们应当为此战未雨绸缪。"
 SOV_towards_imperial_communism: "迈向帝国共产主义"
 SOV_towards_imperial_communism_desc: "共产主义是人类存续的唯一希望！当我们的对手妄图用无根的世界主义偷换全球工人阶级大团结的概念时，我们要高举帝国共产主义的旗帜。是的，对不熟悉马克思主义理论的人而言，这或许显得荒谬，但这正是二十世纪我们的意识形态内核。俄罗斯的命运只能是帝国！而唯有共产主义能指引我们前进！我们要将火种带给那些仍在沉睡中等待觉醒的民族。万岁，同志们，祖国万岁！永放光明的恩格斯-马克思-斯大林理论万万岁！"
 SOV_soviet_christianity: "苏维埃基督教"
 SOV_soviet_christianity_desc: "基督教本质上是原始共产主义。正是它摧毁了古代奴隶制，将三大陆子民凝聚为整体。也正因这种使人们既能保持差异又能紧密团结的特质，而非沦为便于操控的同质化群体，它才遭全球主义者深恶痛绝。基督教与共产主义更共享着对人类必然升华、跃入新存在阶段的坚定信念。二者表述或有差异，本质却浑然一体。何不更进一阶？正如我们的意识形态具有融合性，信仰亦当如是。俄罗斯伟人将被擢升为圣徒，宗教将与意识形态水乳交融。欢呼吧，基督里的弟兄与无产阶级同志！因温柔者必承继大地。"
 SOV_great_russian_awakening: "大俄罗斯觉醒"
 SOV_great_russian_awakening_desc: "的确，俄罗斯人民仿佛被命运指定扮演救世主的角色。正是我们率先从沉睡中觉醒，拥抱了社会主义的理念。尽管第一次尝试因诸多原因未能成功，但它就像一块投进水中的石头，激起的涟漪传遍了全球，激励世界各地的人们加入真正的教义。然而，那时的人们尚缺乏足够的勇气与魄力，未能彻底唤醒俄罗斯深层的民族力量，引领他们步入社会主义时代。但在21世纪，我们再也没有犯错的余地。站起来吧，俄罗斯人民！挣脱资本黄金偶像的枷锁，投身于社会主义的光辉大道！我们肩负的使命昭然若揭——引领人类迈向文明的巅峰，铸就世界上最伟大的国家！"
 SOV_deploy_peoples_militia: "部署人民警卫"
 SOV_deploy_peoples_militia_desc: "若当权者的理念无法引发民众共鸣，又有何价值？缺乏基层支持，再伟大的思想也注定湮灭无闻。正因如此，我们将着手组建全俄红旗支队，负责辖区内全方位支援、打击危害分子、传播伟大意识形态。战时更须持枪列阵，誓死捍卫社会主义祖国。当然，他们享有特定特权——但若无这些，队伍又怎能维系？"
 SOV_russian_proletarian_world: "俄罗斯无产阶级世界"
 SOV_russian_proletarian_world_desc: "历史没有如果，我们无从知晓未来究竟如何。但此刻，我们以百分之百的信念宣告胜利必将属于社会主义，属于俄罗斯人民。我们将战斗到最后一息，若有必要，愿将整片大地染红如我们的赤旗，只为拯救全人类。毕竟世界必须建立秩序，而这份秩序理应属于无产阶级！真正的无产阶级此刻唯有俄罗斯人民。颤抖吧，那个由全球主义与谎言编织的旧世界。人类的新春即将来临，我们将成为新世界的执旗者，因这恰是我们与生俱来的使命。"
 SOV_social_engineering: "社会工程"
 SOV_social_engineering_desc: "人类社会并不完美。这正是我们动物本性的终极体现。即便经过数百万年进化，我们依然是随时会捡起石块或木棍杀死同类的邻居。但这并不意味着我们的天性无法改变。只要知晓该牵动哪些丝线，社会结构永远可以被重塑。诚然，社会工程是漫长过程，或许经年累月难见成效。但正如古老箴言所说，目的决定手段。"
 SOV_enforce_state_planning: "强推国家计划"
 SOV_enforce_state_planning_desc: "计划是任何稳定经济体系的根基。我们可以用人体作一个类比。头脑控制各项生理过程，身体则忠实地执行这些指令，以确保整个有机体的存续。当然，这里也有过犹不及的情况，当头脑犯蠢时，身体为了整体利益必须暂时关闭它。将一切完全交由计划掌控是愚蠢且根本不可能的。但经济的基础架构必须毫无异议地通过行政指令手段加以控制。"
 SOV_richness_is_a_sin: "富裕是罪"
 SOV_richness_is_a_sin_desc: "无论计划经济设计得何等精妙，事事依赖中央的决定都是愚蠢的。官员与官僚机构若脱离实际，便无从有效调配资源、制定方略。为了防止出现此类过度干预，我们将成立地区经济委员会，全权负责辖区内的发展规划与资源管理"
 SOV_regional_economic_committees: "区域经济委员会"
 SOV_regional_economic_committees_desc: "无论计划经济设计得何等精妙，事事依赖中央的决定都是愚蠢的。官员与官僚机构若脱离实际，便无从有效调配资源、制定方略。为了防止出现此类过度干预，我们将成立地区经济委员会，全权负责辖区内的发展规划与资源管理"
 SOV_optimize_the_economy: "优化经济"
 SOV_optimize_the_economy_desc: "经济学本质上是一场繁琐的枯燥进程，其中永远存在着优化空间。只需在官僚流程中作出些许改良，对劳资互动稍加完善，就能收获令人惊叹的成效！经济总是有发展的空间，通过实施全方位优化工程，我们终将铸造出真正不可阻挡的运转机器。"
 SOV_forced_re_industrialization: "强制再工业化"
 SOV_forced_re_industrialization_desc: "当苏维埃联盟陨落时，我们的祖国惨遭洗劫！数十座工业巨擘轰然崩塌，百万产业工人被抛入时代洪流的边缘。一个坐拥世界最丰饶自然资源、孕育无数智慧大脑的国度，岂该湮没于历史的尘埃？不！不！不！新时代的苏维埃联盟绝不会辱没先辈荣光。是时候重返机床前握紧扳手，让烟囱喷涌的浓烟染黑苍穹！工人之国正沿着铁轨轰然重启！"
 SOV_great_constructions: "伟大建设"
 SOV_great_constructions_desc: "共产主义首先是一场瑰丽的梦。那是对某种磅礴伟业的憧憬，比如全人类的团结统一。但这个梦想亦可化作更切实的形态。我们将摒弃反犹主义的腐朽，用自己的双手建设一个新世界！规模空前的巨型纪念碑、水电站与核电站、博物馆……只要我们齐心协力，无产者就能创造这一切！"
 SOV_construct_the_workhouses: "建设济贫院"
 SOV_construct_the_workhouses_desc: "工人定居点堪称优化我国生产流程的绝佳方案。这些坐落在工农业设施旁的社区，将肩负起产品直接加工与沿生产链运输的重任。现在是时候大规模复制这一模式，构筑强大的工业基地，为我们的发展机器注入澎湃动力！"
 SOV_the_new_rural_socialism: "新农业社会主义"
 SOV_the_new_rural_socialism_desc: "俄罗斯曾是世界最大的粮食生产国。各国争相采购我们的谷物，就连法兰西那命运多舛的面包都曾以我们的麦粒烘焙。但时过境迁，我国在这方面的实力已然式微，甚至沦落到需进口他国小麦以供养国民的境地。必须止步于此！是时候重振农场、开垦沃土，重新挥起镰刀与犁铧！让金色麦浪再度席卷原野！这片农民之国正在重归正途！"
 SOV_all_russian_communes: "全俄罗斯公社"
 SOV_all_russian_communes_desc: "若无国家扶持，农业活动的组织将举步维艰。正是为了指导和帮助我国经济中这个正在复兴的领域，所谓的全俄公社即将建立。我们希望能将俄罗斯所有农场联合成统一链条，使其如同有机体般运作，满足我国公民的需求。"
 SOV_idolize_the_countryside_life: "崇拜乡野生活"
 SOV_idolize_the_countryside_life_desc: "田园牧歌般的景象，难道不是昔日众多诗人与文人在作品中反复吟唱的吗？无垠的麦田如金色海洋般延伸，玉米秆构筑的迷宫让人不经意间迷失方向，鸟鸣与镰刀割草的节奏声交织成乡野的韵律。诚然，时代已悄然更迭，但村庄的生活方式依然倔强地留存着。对都市人而言，这何尝不是一次契机，只需暂别些许便利，便能迈向自给自足，品尝到泥土孕育的真实滋味。同志们，让我们携手踏上这片处女地吧！"
 SOV_worker_conscription: "征募工人"
 SOV_worker_conscription_desc: "无论共产主义以何种方式构建，或历经怎样的追寻之路，劳动者永远是不可或缺的力量，而寄生于社会的蛀虫终将在未来丰饶的图景中消弭无踪。让我们共同奔赴共产主义建设的广阔天地！请相信，那里必将为每个人留有一席之地。"
 SOV_nurture_labor_aristocracy: "培养工人贵族"
 SOV_nurture_labor_aristocracy_desc: "工人贵族是任何政权的脊梁。当国家的动脉持续泵送血液时，他们始终在监测肌体状况。自然，国家机器的运转状态取决于这个阶层的忠诚度与适配性。苏联当年的崩塌，恰似因忽视这一特殊阶层而起。但我们将不再重蹈前辈们盲目复辙的错误。循序渐进，年复一年，我们要培育自己的贵族阶层，他们精通理论、高效务实，最重要的是对我们共产主义事业绝对忠诚。"
 SOV_russian_spring: "俄罗斯之春"
 SOV_russian_spring_desc: "人们期盼已久的时刻终于到来了。俄罗斯挣脱了锁链，准备拥抱真正的民主制度。没有人预料到这一切会发生得如此迅速，但此刻的我们已经见证了历史。\n\n当人们欢呼雀跃庆祝之时，纳瓦利内和他的追随者正准备彻底重塑俄罗斯。"
 SOV_the_political_amnesties: "赦免政治犯"
 SOV_the_political_amnesties_desc: "普京统治期间，政权关押了许多如阿列克谢·纳瓦利内这样的政治犯。我们有义务释放他们。更重要的是，他们的专业知识可能有助于我们重建这个体系！俄罗斯是自由的！"
 SOV_a_big_tent_government: "大帐篷政府"
 SOV_a_big_tent_government_desc: ""
 SOV_Consolidate_Navalnys_Power: "巩固纳瓦利内权力"
 SOV_Consolidate_Navalnys_Power_desc: "除了纳瓦利内，还有谁能领导我们的国家？是他创立了反腐败基金会，是他领导了抗议活动。他是反对派的核心，是革命的核心。现在，他俨然成为俄罗斯的核心。\n\n伟大的解放者将带领我们走向繁荣！\n\n如同信仰上苍般信任您，\n这片满目疮痍的大地，\n在瓦格纳主义的铁腕下，\n已从沉睡中苏醒。\n时机已至，\n请回应那份无尽的信赖——\n回应这寄托的希望吧，\n尊敬的总统先生！"
 SOV_Push_The_Figurehead_Aside: "推开名誉领袖"
 SOV_Push_The_Figurehead_Aside_desc: "虽然我们很崇拜纳瓦利内……但他都被关了多久了？是沃尔科夫领导下的反腐败基金会组织了多年的反对派活动。是他们团结了流亡社区，并与欧洲讨价还价，让其继续提供财政援助。\n\n我们为什么要把他高高置于其余人之上？"
 SOV_Form_The_Russian_Self_Defense_Force: "组建俄罗斯自卫军"
 SOV_Form_The_Russian_Self_Defense_Force_desc: "同北约的战争以及随之而来的混乱，让我们的国家陷入极度动荡之中。虽然我们厌恶在俄罗斯社会滋生了几个世纪的死亡崇拜，但我们还是需要武装力量才能生存。\n\n以日本人为例，我们将建立俄罗斯自卫军。这有助于我们雇用前政权的退伍军人，从而改善有组织犯罪的状况。\n\n虽然我们仍然需要为我们的罪行付出代价，但或许我们可以重新融入世界，并像现在的德国和日本那样与种族灭绝和暴政作斗争。"
 SOV_Call_Back_For_The_Emigres: "召回移民"
 SOV_Call_Back_For_The_Emigres_desc: "多年来，大量俄罗斯人们逃往国外。无论他们是因二十世纪九十年代的混乱时期流窜，还是成为二十一世纪初的投机分子，亦或是遭受过2010至2020年代的政治迫害，可以号召回国的人都有大把。不仅如此，他们还能为我们带来所需的资金。\n"
 SOV_First_Russian_Democratic_Elections: "俄罗斯首次民主选举"
 SOV_First_Russian_Democratic_Elections_desc: "时机终于到来！俄罗斯将举行首次民主选举！虽然纳瓦利内显然是一位极有可能在提前选举中获胜的候选人，但其他持有大相径庭观点的人士，可能会为我们的国家带来有趣的活力。\n\n由于我们的民主化进程如此迅速，我们甚至没有完善的政党来代表所有人，政府被迫白手起家。\n\n然而，为了俄罗斯的未来，这么一个小小的代价又有什么关系呢！"
 SOV_grand_constitutional_reformation: "宪法大改革"
 SOV_grand_constitutional_reformation_desc: "长久以来，我们的体制一直依赖着一套赋予政权权力的破碎宪法。此刻，我们准备编撰一部真正的民主宪法。一部将为文明世界铺平道路，将自由和权利铭刻其中的宪法。\n\n如果我们的人民全心全意地接受它，或许最终我们甚至能够与解放了我们的欧洲民主国家并肩同行！"

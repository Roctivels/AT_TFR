 SOV_state_liberals_idea_tt: "§g体制内自由派是克里姆林宫官僚体系中的一个派系，他们认为俄罗斯深受经济国家主义之害。尽管其中一些人提出有限的政治自由化，但大多数人更关切的是俄罗斯的经济前景。他们的目标是大幅度赋权于俄罗斯商界人士。他们坚信俄罗斯的自由市场潜力远未得到发挥，其发展总是受到政府内部保守势力的阻碍。\n他们允诺为克里姆林宫带来丰厚的利润，代价是砍去那被视作\"无用\"的社会保障。§!\n\n\n\n\n\n£GFX_SOV_state_liberals\n\n\n\n\n\n\n"
 SOV_siloviki_idea_tt: "§g\"西罗维基\"本质上是俄罗斯国家的铁拳，这一派系由联邦安全局、内务部、联邦警卫局与国家近卫军所组成。他们在政治上乏善可陈，却能以秩序与稳定为筹码维系国家。他们的主要目标是增加本机构的预算，以更有效地打击内部威胁。西罗维基的根基在于一种国家式的爱国主义——他们视国家本身即是祖国不可分割的核心。\n他们为克里姆林宫奉上坚硬的铁拳，以镇压一切不安定因素；而交换条件，则是对企业实施更严格的管控。§!\n\n\n\n\n\n£GFX_SOV_siloviki\n\n\n\n\n\n\n"
 SOV_technocrats_idea_tt: "§g技术官僚是国家机器真正的操盘手。在他们眼中，政治不过是妨碍高效治理的累赘。对他们而言，一个国家理想的状态是由高素质的官僚与管理者掌控的一套毫无情感的行政体系。这是最温和的选择，也是最高效的选择。\n他们向克里姆林宫许诺一个运转良好的国家；而代价则是普通公民对政治生活的幻灭与疏离。\n\n\n\n\n\n£GFX_SOV_technocratic\n\n\n\n\n\n\n§!"
 SOV_neo_tsarists_idea_tt: "§g新沙皇主义者是一支极端的\"西罗维基\"派，对民主制度持高度批判态度。与其名称所暗示的不同，他们对沙皇制的设想更具务实性，强调的是高效治理。他们鼓吹一切形式的专制手段来牢牢掌控国家机器。在重视内部安全的同时，他们亦不掩对外支配的野心，不断宣扬俄罗斯世界路线，谋求在地缘政治上扩展影响。\n他们允诺克里姆林宫一个强盛而井然的社会秩序，但这一秩序的代价则是夹杂着时而显露的残酷。§!\n\n\n\n\n\n£GFX_SOV_neotsarists\n\n\n\n\n\n\n"

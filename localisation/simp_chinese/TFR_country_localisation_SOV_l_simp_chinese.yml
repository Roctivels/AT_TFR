 SOV_brics_category_desc: "§Y金砖国家联盟§!是一个政府间组织，由巴西、俄罗斯、印度、中国、南非、伊朗、埃及、埃塞俄比亚与阿拉伯联合酋长国组成。该联盟最初是为了增加投资机会而创立的，但后来演变成真正的地缘政治集团。自2009年以来，各国政府每年举行正式峰会协调多边政策。金砖国家的双边关系主要是在互不干涉、平等互利的基础上进行的。"

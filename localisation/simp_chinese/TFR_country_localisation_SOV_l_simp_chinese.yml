 SOV_betrayal_prevented: "预防背叛"
 SOV_betrayal_prevented_desc: "那些伪装成改革派的共产主义余孽终于被肃清！如今，俄罗斯终于能回归正常的治国轨道，不再受舍甫琴科之流的极端主张及其毁灭性疯狂所桎梏。"
 SOV_coalition_government: "联合政府"
 SOV_coalition_government_desc: "当前政府力量薄弱，根源在于缺乏大批忠诚的政治家，尤其是那些能够争取右翼群体支持的人才。为此，我们计划组建一个广泛的政治联盟，将所有忠诚的右翼力量凝聚在同一旗帜之下。"
 SOV_no_more_leftism: "再无左逼"
 SOV_no_more_leftism_desc: "这次\"解冻运动\"的最大错误就是让左派思想渗透到公共空间，并重新赢得了全国的关注。这种局面必须终结！我们将通过明令禁止其活动、对左翼人士发起大规模司法诉讼等手段，全面遏制其发展势头。"
 SOV_heal_the_society: "治愈社会"
 SOV_heal_the_society_desc: "自由正义党的领导层对我国民族心理造成了严重伤害。当前我们必须重塑国民的思想观念，重建保守而健康的政治价值观，彻底摆脱进步主义思潮的干扰与经济诉求的裹挟。"
 SOV_award_the_military: "犒赏军队"
 SOV_award_the_military_desc: "军方发挥了至关重要的作用，他们动用一切可用资源将自由正义党赶下权力舞台。为此，我们必须再次表达感激——通过提高军饷，并向最忠诚的军官们颁发新勋章。"
 SOV_sway_the_population: "拉拢民众"
 SOV_sway_the_population_desc: "俄罗斯社会仍在应对社会主义遗留影响的阵痛。要超越对选举和经济平等等问题的执念，我们必须提供更具吸引力的替代方案。为忠诚的劳动者和雇员提供丰厚激励，将成为这场转型的重要推动力。"
 SOV_satisfy_the_masses: "满足大众"
 SOV_satisfy_the_masses_desc: "我们的人民理应享有公正而有尊严的生活。他们应当获得稳定的工作、负担得起的食品、良好的医疗保障，甚至偶尔的生活犒赏。为实现这一目标，我们将通过提供多元化社会福利，并与愿意配合国家的企业协商保障就业岗位，全力以赴兑现承诺。"
 SOV_nationalistic_show: "爱国展示"
 SOV_nationalistic_show_desc: "最能凝聚人心的力量莫过于民族自豪感。我们的国民对祖国怀有深厚情感，我们应当善用这份赤忱。通过组织爱国集会、主题音乐会、盛大阅兵等活动，并设立新的国家纪念日，让爱国热情成为社会发展的强劲动力。"
 SOV_cooperate_with_business: "与企业合作"
 SOV_cooperate_with_business_desc: "在汹涌的左翼浪潮中，商界精英必须脱颖而出。他们是俄罗斯的金鹅，在实现自我财富增长的同时，更为国家繁荣持续造血。尽管民众对社会政策怨声载道，我们将与商界建立战略同盟。相信这股蓬勃发展的消费主义思潮，终将涤荡当下的不满情绪。"
 SOV_enlightened_economics: "开明经济学"
 SOV_enlightened_economics_desc: "经济建设的成果理应由创造价值者优先共享。现代化改造、效能优化与资产再私有化，这些才是当今时代的主旋律。政商再度携手，必将为俄罗斯开创一个更加光明、繁荣且文明的新纪元。"
 SOV_right_kind_of_democracy: "正确的民主"
 SOV_right_kind_of_democracy_desc: "最理想的选举，莫过于结果早已尘埃落定。绝不允许重蹈上次的意外覆辙。如今，选举全程都将受到严密监控，确保那些不合时宜的候选人连参选资格都无法获得。"
 SOV_social_economic_reformation: "社会经济改革"
 SOV_social_economic_reformation_desc: "我国的经济体系长期以来服务于军事工业与从战争中牟利的寡头商人。现在，是时候将重心重新回归到社会真正的核心——劳动者身上了。我们将着手实现经济社会化。"
 SOV_improve_factory_conditions: "改善工厂条件"
 SOV_improve_factory_conditions_desc: "工人们在日里诺夫斯基政府建造的庞大工厂中，被迫忍受着危险恶劣的工作环境。要真正代表工人阶级，我们必须强制这些工厂的董事和所有者尽最大可能提升安全标准，并为最弱势的劳动者争取更多福利保障。"
 SOV_belarus_economic_plan: "白俄罗斯经济计划"
 SOV_belarus_economic_plan_desc: "白俄罗斯拥有潜力巨大且门类齐全的工业体系，其发展空间尚未充分释放。这个饱受战火摧残的国家正亟待重建。我们将为这些地区提供资金支持与项目援助，致力于为冲突受难者创造就业机会。"
 SOV_develop_kazakh_lands: "开发哈萨克土地"
 SOV_develop_kazakh_lands_desc: "哈萨克斯坦仍处于发展建设阶段，若能推进更多工业与基础设施项目将大有收益。这不仅有助于吸引人口迁入这些地区，更能促进人口增长。作为俄罗斯腹地的哈萨克斯坦，基本不会受到任何潜在新冲突的影响。"
 SOV_moderation_in_reforms: "适度改革"
 SOV_moderation_in_reforms_desc: "在追求平等的道路上，我们固然不能迷失方向，但也要清醒认识到：现代经济需要在私营与公共部门间保持精妙的平衡。国家有责任维系这种平衡，并随时准备为普罗大众提供支持。"
 SOV_gentle_hand_over_private_business: "温和移交私人企业"
 SOV_gentle_hand_over_private_business_desc: "我们必须对私营企业保持严密监管，一旦发现不当行为，无论是苛待员工、偷税漏税，还是奸商为牟利采取的其他不法行径，都将果断采取审慎的干预措施。"
 SOV_worker_protection_laws: "工人保护法"
 SOV_worker_protection_laws_desc: "我们必须不惜一切代价保障劳动者权益。我们将推行改革，通过全新的法律体系赋予工业及其他领域从业者维权力量。同时，我们将延长劳动者闲暇时间，并设立专项奖金以表彰杰出工作者。"
 SOV_a_fair_economy: "公平的经济"
 SOV_a_fair_economy_desc: "我们必须将全体人民的利益置于首位，无论是劳动者、小微企业还是中型企业。大资本总是企图逃避责任、盘剥他人，但我们绝不容忍这种行径持续蔓延。我们要构建一个公平的经济体系，确保每位参与者都能获得公正对待，不再被资本巨头肆意掠夺。"
 SOV_worker_controlled_unions: "工人掌控的工会"
 SOV_worker_controlled_unions_desc: "工会是繁荣国家与劳动阶级和谐共处的关键纽带。然而当前，它们或沦为资本利益的附庸，或深陷官僚主义的泥潭。这种状况必须改变。我们将组建新型工会体系，积极发展会员，这些工会也将与政府建立直达通道。"
 SOV_educate_the_nation: "教育国民"
 SOV_educate_the_nation_desc: "俄罗斯是一片英才辈出的土地，却有多少聪慧之士被长久埋没。日里诺夫斯基政府过去只垂青富裕大都市的学子，却将小城镇和偏远地区的青年才俊视若无物。新的教育改革将重建传统选拔体系，让来自全国各地的优秀青年都能进入顶尖学府，而他们必将为俄罗斯塑造更辉煌的未来。"
 SOV_crackdown_on_monopolistic_capital: "打击垄断资本"
 SOV_crackdown_on_monopolistic_capital_desc: "垄断巨头不仅是普通民众的灾难，更是中小企业的梦魇。这些凭借庞大资产从外部操控市场的巨鳄，正在破坏市场关系的公平与平衡。我们的反垄断机构将重拳出击：既要拆解日里诺夫斯基钟爱的那些帝国企业，必要时更将揭穿其背后维系特权的腐败交易与暗箱操作。"
 SOV_truly_national_government: "真正的民族政府"
 SOV_truly_national_government_desc: "俄罗斯人民已经做出选择——罗曼·尤涅曼及其\"社会.未来\"将引领国家。他们将以改革与现代化为方法，带领俄罗斯实现民族民主的理想。前路任重道远，必须立刻着手。新领导层决心重构社会与国家的关系，建立透明的治理模式与强大的公民文化。联邦制改革与国家军队建设也将被一同提上日程。俄罗斯正昂首迈入变革时代——自信、庄严且胸有成竹。"
 SOV_uphold_the_russian_world: "坚守俄罗斯世界"
 SOV_uphold_the_russian_world_desc: "俄罗斯的核心价值在于其伟大而多元的人民。无论身处国内或海外，俄罗斯都必须捍卫人民的利益。俄罗斯人过去是、现在是、未来也永远是俄罗斯世界安全的基石——所有讲俄语、尊崇我国文化并认同其共同价值的人们。支持海外同胞、维护其权利与尊严、巩固民族凝聚力，都是国策不可或缺的组成部分。在这个充满挑战与变革的世界，俄罗斯始终是所有认同者的精神支柱。"
 SOV_russia_first: "俄罗斯优先"
 SOV_russia_first_desc: "俄罗斯及其公民是我们政策的核心。国家血脉在这片土地上流淌，俄罗斯的利益与国民福祉高于一切外部因素与抽象概念。国家首要关切的，是在此生活劳作、纳税养家、建设未来的人民。俄罗斯不是模糊的疆界或虚幻的共同体，而是拥有自己的人民、文化与命运的坚强独立国度。俄罗斯至上！"
 SOV_popularize_party_ideology: "宣传民族民主"
 SOV_popularize_party_ideology_desc: "俄罗斯公民对国家政策与路线的意见具有无可争辩的重要性。人民的声音，理应成为国家发展优先级与方向抉择的决定性因素。在平等自由理念的指引下，我们将巩固社会和谐的根基，培养民众心系祖国命运的情怀。民族民主思想将成为新社会秩序的支柱。在这里，每种声音都会被倾听，每个个体的价值都将得到认可。公民责任感，正是国家繁荣之路。"
 SOV_modernize_russian_armed_forces: "现代化俄国武装力量"
 SOV_modernize_russian_armed_forces_desc: "俄罗斯的民主需要坚实屏障。纵观历史，军队始终是国家安全与稳定的中流砥柱。当国家行进在变革之路上时，军队改革必须与其他转型同等重要。这支军队应当与时俱进、高效专业、赢得国内外尊崇。新俄罗斯需要一支能够从容应对任何挑战的新式军队。"
 SOV_strelkov_state: "斯特列科夫之国"
 SOV_strelkov_state_desc: ""

 SOV_new_guard_support_pluralism: "捍卫政治多元化"
 SOV_new_guard_support_pluralism_desc: "为了向人民表明我们的开放政策，而保持政治多元化很有必要。总路线已被取消，我们准备好随时同各种不同意见的代表进行讨论。"
 SOV_new_guard_support_peoples_initiative: "支持§R人民§!倡议"
 SOV_new_guard_support_peoples_initiative_desc: "必须支持所有的地方倡议。我们的人民已经习惯了所有重要决策都由上层做出，而从不经由他们之手。现在是时候改变这种现象，建立合格的公民社会了！"
 SOV_new_guard_new_soviet_republic: "新§t苏维埃共和国§!"
 SOV_new_guard_new_soviet_republic_desc: "现在是全面发展21世纪社会主义建设新理念的时候了！"
 SOV_join_communist_party_agitation: "§Y政治宣传§!：加入共产党！"
 SOV_join_communist_party_agitation_desc: "\n\n\n\n£GFX_SOV_join_communist_party\n\n\n\n\n\n无产者们！将最优秀、最先进、忠诚且勇敢的战士输送到党的队伍中来！"
 SOV_new_guard_youth_agitation: "§Y政治宣传§!：新一代的道路！"
 SOV_new_guard_youth_agitation_desc: "\n\n\n\n£GFX_SOV_way_to_the_young\n\n\n\n\n\n青年一辈是我们的未来！我们需要他们的支持！"
 SOV_new_guard_personality_cult: "拉什金的§R个人崇拜§!"
 SOV_new_guard_personality_cult_desc: "人们对拉什金的形象有些捉摸不透。他经常收到嘲笑，许多人将他视为第二个戈尔巴乔夫，至今还有些人仍未遗忘他在2021年的非法狩猎行为。是时候洗去他的肮脏，创造一个\"正确\"的形象了。"
 SOV_new_guard_destroy_fascists: "[SOV_anti_soviet_resistance_decision_loc]"
 SOV_new_guard_promote_specialists: "提拔§Y专家§!"
 SOV_new_guard_promote_specialists_desc: "苏联解体在很大程度上是因为常常有一些能力不足、不完全忠诚的人身居高位。为了避免出现这种情况，我们需要支持技术官僚趋势，开始提拔合格的、最重要的是真正懂业务、有觉悟的专家。"
 SOV_old_guard_canonize_stalin: "追封斯大林同志为§R圣人§!"
 SOV_old_guard_canonize_stalin_desc: "\n\n\n\n£GFX_SOV_canonize_stalin_banner\n\n\n\n\n\n鉴于斯大林同志为全俄罗斯以及其人民的福祉做出的功绩与探索，我们必须还以历史公道并将其追封为圣人。而叶利钦党羽为结皇权遗老欢心，冒天下之大不韪同资产者的教会合谋，将尼古拉暴君伪帝连同孽族犬马狗尾续貂统统封圣，此等劣行必须制止。"
 SOV_old_guard_canonize_gagarin: "追封尤里·加加林为圣人"
 SOV_old_guard_promote_unity: "加强意见统一"
 SOV_old_guard_promote_unity_desc: "没有什么比资本主义更能分裂我们的人民了。它曾经是真正的集体主义，如今却成了\"事不关己，高高挂起\"的代名词。现在是时候结束这一切了！我们将再次以爱国主义、社会主义理念和社会正义为基础上团结起来！"

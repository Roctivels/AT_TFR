 SOV_retarget_russian_hysteria_prop: "§Y政治宣传§!：\"俄罗斯威胁\"癔症再定向"
 SOV_retarget_russian_hysteria_prop_desc: "\n\n\n\n£GFX_retarget_russian_menace_hysteria\n\n\n\n\n\n西方想要相信我们是恶魔。他们自欺欺人的认为我们是劣等人，不值得获取基本人身自由，却毫不吝啬的将自由赐予其他人。\n\n如此这般仅是为了给自身的侵占行为正当化。\n\n我们不是他们口中的怪物，但对于那些胆敢入侵我们祖国的鼠辈而言，我们会成为他们最为可怕的梦魇。"
 SOV_apotheosis_of_history_prop: "§Y政治宣传§!：我们的历史典范"
 SOV_apotheosis_of_history_prop_desc: "\n\n\n\n£GFX_apotheosis_of_history\n\n\n\n\n\n欧亚国不只是我们国家的新名字，还是我们人民所拥有过的最伟大、最敢于冒险的国家，结合过去，展望未来，欧亚国都是俄罗斯数千年以来的历史典范。"

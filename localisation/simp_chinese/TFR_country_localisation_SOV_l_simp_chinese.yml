 SOV_automation_of_production_lines_desc: ""
 SOV_secure_the_law_enforcement: "民主执法"
 SOV_secure_the_law_enforcement_desc: ""
 SOV_steel_revolution: "钢铁革命"
 SOV_steel_revolution_desc: "历史潮流浩浩荡荡不可阻挡，阿里哈诺夫政权因其本质上的反动与高压统治，企图诉诸民粹民族主义的手段，最终仍被人民大众亲手推翻。但这位俄罗斯前统治者的远见卓识不容抹杀。他早先对左翼反对派的清洗，原以为能隔绝民众怒火的燎原之势。然而，领袖终将应运而生，德米特里·尤里耶维奇·普奇科夫与克利姆·亚历山德罗维奇·茹科夫挺身引领群众，颠覆了阿利哈诺夫政权。钢铁革命就此完成，所有叛徒终将自食恶果。苏维埃俄罗斯万岁！"
 SOV_spirit_of_the_soviet_russia: "苏俄之魂"
 SOV_spirit_of_the_soviet_russia_desc: "只有在斯大林同志的领导下，俄罗斯及其所有民族才真正过上了好日子。社会福祉与对未来的信心同国家伟业之间达成了完美平衡。世上从未有过如此英明的领袖，未来也绝不会再有。而茹科夫同志将亲自确保领袖的教诲得到不折不扣的贯彻执行。"
 SOV_reestabilish_bolshevik_party: "重建布尔什维克党"
 SOV_reestabilish_bolshevik_party_desc: "布尔什维克党是劳动人民的先锋队，是表达人民意志的渠道，是与社会中修正主义、反动势力斗争的有力武器！在国家稳定之后，我们可以自豪地宣布：工农政权已全面巩固，我们随时准备竭尽全力捍卫劳动人民的意志。"
 SOV_restore_stalin_constitution: "恢复斯大林宪法"
 SOV_restore_stalin_constitution_desc: "1936年斯大林宪法是20世纪具有开创意义的文献。这部被誉为\"胜利的社会主义宪法\"的文件在当时极具进步性，它确立了劳动人民拥有国家资源的权利、享有社会保障的权利以及人民直接参与选举的权利。迄今为止，尚未有任何国家的根本大法能够接近这部宪法所体现的民主与公正程度。有鉴于此，在21世纪20年代的今天，我们将恢复这部宪法，以此巩固我国对反动势力和资本主义力量的胜利。"
 SOV_cult_of_the_teader: "领袖崇拜"
 SOV_cult_of_the_teader_desc: "古往今来的理论家中，从未有人的智慧能超越约瑟夫·维萨里奥诺维奇·斯大林。他的思想境界比喜马拉雅山更高远，比海洋更深邃，其敏锐的思维无远弗届。正是他钢铁般的意志，将落后之国锻造为世界强国！他接手的是扶犁耕作的贫弱国度，留给后人的却是核武利剑与完整工业体系。斯大林同志啊，纵使三千年乃至更久远的岁月流转，您的智慧仍将独步天下。荣光属于您——最伟大的领袖、同志与思想家！约瑟夫·维萨里奥诺维奇·斯大林，万岁万万岁！"
 SOV_revive_soviet_brutalism: "复兴苏联野兽派"
 SOV_revive_soviet_brutalism_desc: "资产阶级的奢靡之风总爱炫耀物质堆砌。大理石柱、鎏金雕饰与各类雕塑，无不是昭示建筑权贵属性的标记。这等场所从来将普通劳动者拒之门外。是时候让粗野主义重振雄风了！这是无产阶级智慧与意志的物质化身！摒弃浮华的清晰线条，臻于极致的功能主义。这才是苏维埃建筑的灵魂所系！"
 SOV_zealous_agitation_and_propaganda: "狂热宣传鼓动"
 SOV_zealous_agitation_and_propaganda_desc: "身处资本主义与修正主义主宰的世界，我们不得不终日忍受资产阶级谎言的侵蚀。他们用所谓的自由民主与社会公正蛊惑工人阶级，偷换概念，迫使所有人听从布鲁塞尔的指挥棒，再度沦为资本的奴隶。正因如此，苏维埃公民绝不能懈怠！在电影院，在互联网，在书本字里行间！必须让真理的火种在每个角落熊熊燃烧。让苏维埃领袖的画像在建筑外墙俯视人间！让俄共（布）的发号施令通过所有扬声器响彻云霄！我们曾在思想战场上失守溃败过，能够重夺阵地已是来之不易，绝不能再有第三次沦陷。"
 SOV_dogmatic_materialism: "教条唯物论"
 SOV_dogmatic_materialism_desc: "辩证法是由黑格尔发展的科学认识方法，其明确提出了三大规律：1、对立统一规律；2、量变到质变转化规律；3、否定之否定规律。这些规律在所有物质现象中均有体现。正如野兔用皮毛与温血抵御自然界的严寒，资本主义也始终在与社会主义进行斗争。任何偏离马克思、恩格斯、列宁、斯大林所确立理论原则的言行，在此情境下都应视为对苏维埃制度的破坏，必须作为反动势力的表现乃至修正主义图谋予以坚决惩处。"
 SOV_establish_total_control: "实施全面控制"
 SOV_establish_total_control_desc: "当国家领导权在1950年代从有识之士手中滑落，这个世界上最伟大的强国便走向消亡。趁此时机，叛徒如蟑螂般逐渐渗透进苏联公民生活的各个角落——从艺术领域到党组织内部。于是，这颗星球上最强大的政权最终分崩离析。而眼下这场钢铁般的新革命，很可能将以同样的方式告终。民众的本质在于需要持续管控，德米特里·尤里耶维奇·普奇科夫深谙统御大众之道。我们绝不会背叛十月的革命成果，苏维埃国家必将先发制人地肃清人民政权的敌人。"
 SOV_bureaucrats_under_watch: "盯紧官僚"
 SOV_bureaucrats_under_watch_desc: "在苏联晚期，官僚与党内领导层以工人阶级的利益为代价，享受着前所未有的特权。苏联体制中的这一弊病被俄罗斯体制全盘继承。于是农艺师及其子弟们便自视为国家的主宰与中坚力量，而这种认知从根本上就是错误的。苏维埃人民才是国家唯一的主人，为防止此类僭越行为，紧急状态委员会将对整个官僚系统实施严密管控。一切为了人民。"
 SOV_expansion_of_security_state: "扩大契卡国家"
 SOV_expansion_of_security_state_desc: "对某些人而言，契卡国家或许像是落后甚至野蛮的统治形式。但实际上，这是实现无产阶级、农民及其他社会阶层真实意志的途径。只要人民享有国家的一切福祉，党的领导层就会守护社会主义乃至共产主义建设的秩序与正确性，而特别委员会将监察他们对祖国的忠诚。这才是建立有效体制的唯一正道。"
 SOV_the_russian_party: "俄罗斯党国"
 SOV_the_russian_party_desc: "与傲慢的自由派相反，苏联共产党才是我国历史上最具俄罗斯特色的政权。唯有在它的领导下，普通民众才真正享受到我们辽阔祖国所能提供的一切福祉。从电影到历史书籍，文化空前繁荣，俄罗斯民族正是在那个时期赢得了世界民族之林中的崇高地位。其他政权试图篡改这段历史以适应其叙事，但终究未能得逞。正因如此，我们将重建最公正的体系——一个充分考虑国家主体民族利益的体系。"
 SOV_institutionalize_whistleblowing: "检举告发制度化"
 SOV_institutionalize_whistleblowing_desc: "有时，某些思想狭隘的公民会自问：\"那四百万封告密信是谁写的？\"——然而，他们却始终未曾想到那最显而易见的答案。这些告密信正是由勤劳且心怀集体的苏联人民书写的。因为苏联人民始终心怀苏维埃国家的安全与稳定。正因如此，这种做法的回归并非什么离奇之事。我们终究不会变成阿尔卡特兹监狱。我们只不过是赋予人民斗争的武器罢了。"
 SOV_teach_the_young: "青年试炼"
 SOV_teach_the_young_desc: "我们苏维埃国家的青年正处在艰难境地。那些曾在斯大林时代生活的老一辈大多已经离世，而新政权竭力玷污我们伟大的历史。如今是时候用年轻人自己的语言与他们对话了。不必在青年节目中填鸭式灌输太多宣传内容，但偶尔嘲讽那些资产阶级蠢猪并拿他们取笑也无妨。关键在于不要让年轻观众最终被完全洗脑，而要让他们学到些真正有益的东西。"
 SOV_merge_government_positions: "红色等级制度"
 SOV_merge_government_positions_desc: "在并不完美的人类社会中，各种等级制度总会以某种方式形成。因此最正确的做法，是构建一个意识形态均衡的等级体系，这个体系既能给国家带来最大利益，又能在实现共产主义时自然消亡。事实正是如此，在新生的苏维埃国家里，人民虽然形式上处于最底层（当然形式上还有各类更卑微的弃民，但讨论他们纯属浪费笔墨），却依然享有特权并过着最高水准的生活。略高于人民的是负责监督共产主义建设的党内精英。而位居顶层的则是紧急状态委员会成员，他们确保其他阶层不会受到资产阶级及反动宣传的侵蚀。"
 SOV_pigs_to_the_slaughter: "待宰羔羊"
 SOV_pigs_to_the_slaughter_desc: "阿里哈诺夫政权垮台后，我们国家暴露出的叛徒和被收买的败类数量确实比预期要多。这些家伙如同童话里的妖魔，纷纷缩回隐蔽的角落与地下巢穴，密谋着对抗年轻苏维埃政权的诡计。好在我们也早有准备。那些被称为\"地下清洁工\"的契卡人员，将会彻底清理并消毒祖国肌体上的伤口，将体制内部的敌人清除干净。"
 SOV_the_stalin_model: "斯大林模式"
 SOV_the_stalin_model_desc: "共产主义就是苏维埃政权加上工业实力！正因如此，我们必须像斯大林时代那样，全力投入增强国家实力。让工业黑烟染暗天际，让发电站涡轮轰鸣震耳！苏维埃国家正在重返世界舞台！"
 SOV_new_stakhanovite_movement: "新斯达汉诺夫运动"
 SOV_new_stakhanovite_movement_desc: "我国经济规划的特色在于：劳动者有超额完成计划的动力——这既能为国家创造更多财富，工人们也能因此获得奖金。为此我们应当鼓励\"反计划\"的涌现，让年轻的斯达汉诺夫工作者以加倍热情采矿炼钢！"
 SOV_industrial_paradise: "工业天堂"
 SOV_industrial_paradise_desc: "巨型管道在工厂建筑群中巍然耸立，高炉日夜不息地熔炼着数以吨计的生铁，厂房内机器轰鸣声与金属撞击声昼夜不绝。看啊，这便是我们亲手打造的人间天堂——新世界的熔炉，值得效仿的典范！"
 SOV_reap_the_benefits: "收获制度果实"
 SOV_reap_the_benefits_desc: "一边高谈无私奉献，一边又剥夺其劳动成果，那可真是大错特错。我们执行的财富公平分配，让日夜辛勤的劳动者们也能享受最优越的生活。货架上食品、电子产品琳琅满目，连奢侈品也触手可及。凭着我们公正的制度，苏联人民都能负担得起这一切。为人民及其艰苦奋斗精神欢呼！乌拉！乌拉！乌拉！"
 SOV_loyal_military_force: "新苏联红军"
 SOV_loyal_military_force_desc: "工农红军是无产阶级的剑与盾，是人民意志的终极体现。这支守卫社会主义边疆的军队曾举世无双，从茫茫针叶林到不列颠海域，所向披靡！而今正是重振这支伟大军队的时刻，需以最先进的现代武器武装红军。"
 SOV_political_commissars: "政治委员"
 SOV_political_commissars_desc: "有人说军队应当非政治化，只需盲目追随国家路线。然而这是反动派精心炮制的谎言，专门用来给士兵洗脑，剥夺他们的自由意志。我们的国家与社会主义意识形态密不可分，因此即便在军队中，每个人都必须明白自己为何而战！政治委员将在新红军中开展党务工作，向战士们阐释保卫社会主义祖国的全部魅力与重大意义。"
 SOV_soviet_war_phoenix: "苏维埃战争再起"
 SOV_soviet_war_phoenix_desc: "苏联的军事机器比以往任何时候都更强大。每周都有数十辆坦克驶下生产线，士兵们装备着最新技术成果，人力资源更是取之不尽。这就是那钢铁洪流——终将扫除资本主义秩序、实现成功世界革命的力量……在未来的某天。但目前，决战时刻尚未到来，这支力量必须守卫我们的边疆，尤其在欧洲之敌并未沉睡、正蓄谋复仇的时刻。"

 russiaflavor.1.d: "若说弗拉季斯拉夫·尤里耶维奇·苏尔科夫与历任俄罗斯总统有何本质不同，那便是：普通民众几乎从未直接听过他的讲话，甚至很少见到他本人。这位新总统不亲自走访全国，不发表慷慨激昂的演说，甚至连一个TG频道都没有。他所有的发言均由新闻秘书对外发布，录播或现场直播极其罕见。这与以活跃和高调言论著称的德米特里·阿纳托利耶维奇·梅德韦杰夫形成鲜明对比。\n\n正因如此，各类阴谋论如雨后春笋般滋生。最流行的一种说法是：真正的苏尔科夫在明斯克协议签署后就被处决了，因为他让弗拉基米尔·普京感到失望。根据此论，如今的总统不过是一个替身演员，是一名经过特殊训练的\"影子人\"，被一小撮寡头与\"新沙皇主义者\"利用，作为传声筒，推行他们的命令。信奉这一阴谋论的人指出，\"苏尔科夫\"之所以能在普京去世后突然重回克里姆林宫，实属异常，尤其是在梅德韦杰夫曾公开承诺将延续弗拉基米尔·弗拉基米罗维奇意志的背景下更显蹊跷。而德米特里本人仓促、甚至近乎被精心策划的辞职，更是令人生疑。\n\n出于显而易见的原因，政府官员对此类猜测从未正面回应。不过是又一个愚蠢的阴谋论罢了，如此说法历来不少，未来只怕只会更多。当然，总统本人也听说过这一传言，有时会笑着回忆起：居然有人真以为他只是个被雇来演戏的替身。"
 russiaflavor.1.a: "万一，万一是真的呢？"
 russiaflavor.2.t: "凡人与机器"
 russiaflavor.2.d: "安东·巴甫洛维奇不过是一位普通的公务员，在联邦监狱系统里任职多年，签签字、翻翻文书，日复一日，职场如尘土般沉闷，也谈不上什么地位。但就在两周前，他听到了一个让他怔住的消息——新型人工智能已完成测试，而他，这个在部门中默默坚守了近十年的老职员，将被取而代之。想想看，一个冰冷无情的机器，竟将取代他这有血有肉、有思想、有疲惫的人！可现实无法推翻，他也无力向上级，更别说向总统，为自己的存在争辩一二。\n\n于是，他用一天时间，把办公桌上的物品装进行李箱，准备就此离去。夕阳余晖斜洒在走廊尽头，谢尔盖·亚历山德罗维奇——那位头发斑白的老清洁工，正一如往常，在打扫尘埃。他在这儿做清洁已有多年，沉默而安分。\n\n\"哟，这不老安吗，你是要去休假吗？\"老人语气温和，笑着露出几颗泛黄残缺的牙齿。\n\"哪是休假啊，谢尔盖·亚历山德罗维奇，我是被开除了。收拾好了，准备去火车站。\"\n\"什么！？你被开除了？为什么？别告诉我你贪污了或者干了什么更糟的事。\"\n\"别激动。就是总统突然决定，说什么算法能胜任我的工作。他当然很忠诚啦……可还是觉得机器比人靠谱。算了吧，也许就是命。\"\n\"唉……那你打算去哪儿？\"\n\"回农村吧，我老家的地还在，家里的房子也还在。也许，是时候离开城市的喧嚣，好好歇歇了。那您呢？您不担心有天也会被机器替代？\"\n\"怎么会不怕？可最重要的是别失望，这个世界，总有我们的位置。至于那机器嘛……我孙子最近跟我说，人工智能永远打不过天然的愚蠢。你自己说，哪个机器人愿意拿我这点工资，来扫这满地垃圾？\"\n\"哈哈，说得真对……那我就先走一步了。若是老天保佑，我们或许还能再见。\"\n\"呸呸呸，别说晦气话！我们当然还会再见，又不是要去见老天爷了。\"\n\n于是，他们就此分别。安东拖着行李箱，踏上了返乡之旅，箱轮在台阶上发出阵阵哐啷声。而谢尔盖，则默默推着工具车，继续沿走廊缓缓前行。他没什么可难过的——不过是又多出一间空办公室，等着他去擦去尘封。"
 russiaflavor.2.a: "这场景他见了太多次。"
 russiaflavor.3.t: "突发新闻"
 russiaflavor.3.d: "今天，许多居民醒来后，发现手机上出现了一条不同寻常的提醒信息——来自国家服务平台的新消息，被标注为\"紧急\"。当然，并非所有人都知道发生了什么，也不是每个人都已听说欧洲联盟军队发动了袭击。\n\n当人们打开应用程序时，首先播放了一段小视频，画面呈现出被毁的城市和村庄，欧盟士兵正缓缓行进于断壁残垣之间。他们身穿最新式装备，步伐缓慢，在燃烧的废墟前前进。随着画面推进，色彩逐渐褪去，变为黑白，士兵的身影也变得模糊，他们的制服和武器开始发生变化。最终，这些士兵呈现出他们的\"最终形态\"——国防军士兵，在燃烧的村庄背景下行进，手持武器，有时还携带战利品。\n\n画面一转，观众看到的是欧盟西斯拉夫地区某个\"难民营\"的镜头。营地中是衣衫褴褛、饥饿疲惫的人们，被困于重重铁丝网之后，而守卫们则穿着现代制服，脸上戴着面罩。有的守卫在饥饿的人面前公然吃着巧克力，有的则面无表情地把玩着手中的步枪。\n\n视频最后是一段由总统弗拉季斯拉夫·苏尔科夫发表的简短讲话，他号召俄罗斯联邦及全欧洲人民共同奋起，反抗欧洲法西主义。讲话的最后，他说道：\"胜利终将属于我们！\"随后画面一黑，屏幕上以白字显示同样的句子。与此同时，页面提示用户可以进一步了解战争，或参加附近支持俄罗斯军队的相关活动。"
 russiaflavor.3.a: "无论战斗多么艰难，我们都一定能胜利。"
 russiaflavor.4.t: "时代"
 russiaflavor.4.d: "一名身着深色雨衣的独行男子穿过墓地，黑皮鞋的后跟发出清脆的声响。他手中捧着一束献给挚友的鲜花。两名黑衣壮汉在入口处等候着他，新近解放国家的领导人们等待着他，俄罗斯人民也在等待着他，但此刻有更重要的事。这座墓地永远静谧，墓碑维护得当，从无地痞流氓来此滋扰。男人的目光掠过众多石碑，看到十余段戛然而止的人生。有人殒命于战争，有人病故于床榻，还有人被酒精、香烟或更糟的东西夺去了性命。但他寻找的始终是那块独一无二的石碑。黑色墓碑上镌刻着一位发际线后移却风度翩翩的男子，带着永恒不变的浅笑和慈祥目光，就此凝固在时光里——1952-2022是他的生命刻度。雨衣男子单膝跪在墓前，恭敬地献上花束。他的嘴角微微抽动，却竭力保持克制。他悲伤地端详着遗像，轻轻拂去碑石上的浮尘，低语道：\"我们做到了，沃瓦。\"刹那间，沙沙作响的树叶间仿佛传来亡者微弱却坚定的回应。或许是幻觉？又或许不是？这已不再重要。\n\n接下来的十分钟里，男人就这样沉浸在思绪中。最终他起身走向出口。俄罗斯联邦总统仍有万千政务待办，但即便离去时，苏尔科夫仍在想着那个人——那个被命运推入政坛的男人，那个他个人乃至整个俄罗斯都亏欠良多的人。"
 russiaflavor.4.a: "我将死，但国家永存。"
 russiaflavor.5.t: "二次审判"
 russiaflavor.5.d: "在这个近百年前曾审判纳粹政权首脑的殿堂里，那些曾令全体苏联公民深恶痛绝的名字再次响彻穹顶。近期搅乱欧洲的极右翼政权领导人：法国、德国、意大利的执政者，以及数十名犯下反人类罪的次要官员，此刻正戴着手铐接受国际社会审视。\n左侧是欧亚防卫联盟国家检察官团队，由苏联总检察长领衔；右侧是急于与过去划清界限的欧洲新政府代表；被告席则居于中央。传唤作证时，有人拒不开口，有人眼神空洞地复述着与案卷证词严丝合缝的供述，还有人突然爆发激烈辩驳，却恰恰坐实了控方指控。\n证据链完整得令人窒息：大规模镇压、种族清洗、优生学宣传、集中营、酷刑、儿童改造所、强制移民。检察官展示的档案与骇人影像揭示着：当欧洲背弃人性时，堕落至黑暗深渊的速度何等惊人。\n\n法庭外，军事警戒线拦阻着汹涌人群。记者、民众与抗议者中，有人高呼死刑，有人掩面哭泣，还有人矢口否认。但此刻所有人都首次真切感受到：正义终将降临。"
 russiaflavor.5.a: "历史已变。"
 russiaflavor.6.t: "战争游戏"
 russiaflavor.6.d: "自战争打响的第一刻起，正在执行战斗值班任务的K-18\"卡累利阿\"号潜艇全员即刻进入战备状态。然而，尽管欧洲已沦为血肉绞盘，指令却是绝对的无线电沉默。潜艇静伏于北海深处，在漫长沉默中度过每一个煎熬的时刻。\n\n临时电台操作员已连续六个小时守候在指定频道——按计划，这一频段应是他与整艇之命运交汇之处。但正如过去无数个日日夜夜般，今日依旧沉寂无声。直到电波中那片无尽的嘶鸣骤然被一道加密信号撕裂，还未等值守的士兵完全意识到这份变化，密码便已解码完成，并传至艇长之手。\n\n数分钟内，这艘核动力潜艇自沉眠中苏醒，缓缓启动。航速就绪，设备齐整，航向与深度皆已到位。此刻，唯一的距离，就是那一线之隔——将世界一分为二：从此不再是从前。\n\n3……2……1……"
 russiaflavor.6.a: "开启。"
 russiaflavor.7.t: "留着吧"
 russiaflavor.7.d: "马加丹州杜卡特村的维佳是个普通汉子——干着普通的活儿，过着普通的日子。尽管近来周遭风云变幻，但就连他也听闻了弗拉基米尔·沃尔福维奇·日里诺夫斯基的死讯，以及俄罗斯新总统的选举进程。为此，他开始关注国家电视台，想弄明白这些变化会不会搅乱自己悠闲的生活。\n所以今天收工后，他咬着冰箱里拿的冷餐，饶有兴致地换台直到停在《第一频道》上。\n屏幕上赫然浮现巨型标语\"日里诺夫斯基精神永存\"，下方是醒目的\"斯卢茨基\"大名配着小字标注\"俄罗斯总统候选人\"。难以置信的是，旁边竟印着列昂尼德·爱德华多维奇·斯卢茨基本人的肖像——那张亲和的面容莫名让人安心。维佳咧嘴一笑时，画面已切换到一间办公室。\n列昂尼德·爱德华多维奇踱进这间橡木办公桌气派的房间，墙上挂着自民党徽章与俄联邦、党旗两面旗帜。他先是端详书柜里弗拉基米尔·沃尔福维奇的藏书，又摸了摸自民党徽章，最后在主席位落座时，突然瞥见桌签上\"弗拉基米尔·沃尔福维奇·日里诺夫斯基\"的字样。他眼神倏然变得忧郁深沉，直到年轻秘书捧着新桌签进来打破沉思。\"列昂尼德·爱德华多维奇·斯卢茨基\"的桌签被摆在一旁，秘书请示道：\"旧的要收走吗？\"总统候选人却警醒地一摆手，斩钉截铁说了什么。\n维佳不禁思忖起那位已故领袖的政治遗产。是该让日里诺夫斯基路线延续，还是到了改弦更张的时候？看着斯卢茨基坚毅的面容，马加丹荒原上的这个普通汉子心里已有了答案。"
 russiaflavor.7.a: "\"不，留着吧。\""
 russiaflavor.8.t: "总司令"
 russiaflavor.8.d: "维克多·瓦西里耶维奇·佐洛托夫近日成为克里姆林宫的新任代掌者。这段时间以来，这里的厅堂对他而言已变得熟悉。令这位新任最高统帅欣慰的是，他所构建的体系正如同精密钟表般运转。不过，这位国民近卫军总司令，如今俄罗斯无可争议的统治者向来是个行动派，长时间困在办公室令他倍感厌倦。只要有机会便在克里姆林宫内踱步巡视，这已成为他的新习惯。\n宽阔的大理石厅堂内空无一人，唯有一幅足有两人高的巨幅肖像引人注目，画中一位英挺的老者以半侧身姿态立于三色旗背景前，身着缀有蓝色绶带的军礼服，胸前勋章熠熠生辉。维克托·瓦西里耶维奇自然认得这位画中人——俄罗斯帝国大元帅亚历山大·瓦西里耶维奇·苏沃洛夫，那位从未吃过败仗的常胜将军。\n这场突如其来的邂逅让国家近卫军总司令陷入沉思。他与这位古代无敌统帅的共通之处，远不止相同的父名。他们首先都是士兵们的守护者。佐洛托夫不无自豪地想起自己在国家近卫军打造的体系：他竭尽所能，甚至超越极限，只为确保麾下将士永远衣食无忧、战备充足——正如当年苏沃洛夫所做的那样。而现在，他已准备好将这份守护延伸至每个俄罗斯公民。\n"
 russiaflavor.8.a: "士兵之父。"
 russiaflavor.9.t: "领袖"
 russiaflavor.9.d: "维克多·瓦西里耶维奇·佐洛托夫近日成为克里姆林宫的新任代掌者。这段时间以来，这里的厅堂对他而言已变得熟悉。令这位新任最高统帅欣慰的是，他所构建的体系正如同精密钟表般运转。不过，这位国民近卫军总司令，如今俄罗斯无可争议的统治者向来是个行动派，长时间困在办公室令他倍感厌倦。只要有机会便在克里姆林宫内踱步巡视，这已成为他的新习惯。\n宽阔的大理石厅堂内空无一人，唯有一幅足有两人高的巨幅肖像引人注目，画中一位发际线后移、目光如炬的老者，以难以揣度的神情凝视着观画者。他身着未系扣的西装外套与白色正装衬衫，背景是如水彩般晕染的淡蓝天幕。\"弗拉基米尔·弗拉基米罗维奇……\"佐洛托夫默念道。这位正是在那场宏大改革前，俄罗斯联邦的最后一位总统。\n这场突如其来的邂逅让国家近卫军总司令陷入沉思。首先浮现在脑海的，是他在弗拉基米尔·弗拉基米罗维奇·普京麾下漫长的服役岁月，以及那位领导者如何应对时代的挑战。他们都从政治动荡与恐怖主义战争中接管这个国家，又都将和平稳定与对美好生活的信念归还给人民。他们都拥有执法机构的深厚资历——都深知没有权利就无从要求义务的治国真谛。他们先后执掌着这个名为\"俄罗斯\"的伟大团队。\n"
 russiaflavor.9.a: "以后也将一直如此。"
 russiaflavor.10.t: "老爹的愤怒"
 russiaflavor.10.d: "17点46分整，克里姆林宫正在举行内阁会议——这本不足为奇，在前任总统德米特里·阿纳托利耶维奇·梅德韦杰夫时期，此类会议本是常态，尤其在战时及战后阶段。但这次会议却格外不同：白俄罗斯总统亚历山大·格里戈里耶维奇·卢卡申科亲自出席，联邦多个州长通过视频连线参与——更不寻常的是，会议正通过多家官方媒体和网络平台全程直播，没有剪辑、中断或事后解说。\n民众尤其记得那个令人印象深刻的片段：当亚历山大·格里戈里耶维奇念完某地区不尽人意的报告后，突然转向负责该地区的州长质问道：\n\"……这算什么？为什么民众要跑来我这投诉？我办公桌上堆满了反映问题的投诉信你知道吗？抚恤金发放能出什么问题？我们的国家打赢了战争，是我们的人民用鲜血换来的胜利！哪来的借口？给你一周时间——就一周，必须整顿完毕，我会亲自督查。要是办不好，你这位置立刻换人！听明白没有？……\"\n此后这类场景屡次重演，往往以地方官员的撤职收场。人们逐渐意识到，对联邦官员工作的直接督导已成为卢卡申科的执政特色，正如他当年治理白俄罗斯的风格。"
 russiaflavor.10.a: "我们的朋友，卢卡申科！"
 russiaflavor.11.t: "繁杂工作"
 russiaflavor.11.d: "前警察上尉马克西姆·戈连科夫坐在基洛夫州原俄罗斯联邦安全局大楼的143号办公室里，斜眼扫视着年轻同事提交的报告。他低声咕哝了几句感谢的话，便打发对方去结案了。墙上肖像中，不知疲倦的钢铁费利克斯正凝视着他。\n这位地方克格勃少校心知肚明，今晚又得半夜才能回家：拉什金对\"资产阶级执法机构的官僚主义体系\"的讨伐，丝毫没能减轻吞噬一切的文书工作。那些堆积如山的陈旧档案，简直比奥吉亚斯的牛栏还要令人绝望。\n不过这份工作里，总有些东西能唤起他孩童般的兴奋感。\n将那些昨天刚从法学院毕业的毛头小子，以及凭着对共产党的忠诚调来的杂牌警员，训练成21世纪的特工，这任务既令人抓狂又充满魔力。正是这种兴奋感让他坚持了下来。好在刑事鉴定科的经验也派上了用场，所幸这个部门没有遭到裁撤。"
 russiaflavor.11.a: "应该派人去买点咖啡了……"
 russiaflavor.12.t: "命令"
 russiaflavor.12.d: "谢尔盖在特别用途机动单位服役近十年。这天清晨，他的分队驻守特维尔大街。任务预先下达得很明确：封锁通道、隔离头目、强力处置。指挥部说得直白：\"放纵太久了，最高层直接下的命令，没有比这更高的了。\"他当时点了点头。\n人群聚集得很快。年轻人、大学生、形迹可疑的边缘分子。标语、旗帜、歌声。有人喊着纳瓦利内的名字，有人朗读宪法条文，却刻意忽略其中关于为捍卫宪政秩序，可限制公民权利的章节。谢尔盖透过面罩望去：看到的多数是被蛊惑的孩童。一个向街头暴民妥协的国家命不久矣——无论在西方还是这里，都不会容许这种事发生，他们显然不明白这个道理。他叹了口气——总有人得快快长大。\n对讲机传来指令。相邻街道发生打砸事件。开始行动。无需警告。\n谢尔盖向前推进。周围还有战友。没有多余的暴力，但精准利落。镇压，防止骚乱扩散。囚车接连驶离。分局里讯问笔录的流程正在流转。这里不存在什么\"集会\"——案卷上分明写着\"群体暴乱\"，据他熟识的几位协助从内部瓦解抗议的行动组同事透露，多数参与者将初次领教实刑，刑期三年起。\n谢尔盖既无憎恨，也无怜悯，对这些新的被告们根本没有任何特殊感受。只是在做分内之事。他知道若不是自己，也会有别人来执行。否则一切都会分崩离析。他只在乎一件事——让清晨的莫斯科能在宁静中苏醒。没有路障，没有混乱。让孩子们上学路上不必认识警棍和班房这些词汇，脑子里也别塞满各种谬论。只要这样就好。"
 russiaflavor.12.a: "亲爱的祖国，安心入眠吧。"
 russiaflavor.13.t: "非洲军团"
 russiaflavor.13.d: "傍晚时分，一支小型但装备精良的分队穿过丛林，抵达村庄。根据指挥部的情报，这里是恐怖分子的中转站，严重妨碍了公司在该地区的行动。\n\n尽管已是夜晚，村庄中仍熙熙攘攘，妇女儿童与穿着迷彩的武装分子混杂其中。从他们的位置看去，隐藏在丛林中的战士根本无法被发现。\n\n指挥官发出信号后，军士长将\"大黄蜂\"火箭筒扛上肩膀，片刻后，燃烧村庄的火光与西沉夕阳的余晖交相辉映。平民四散而逃，恐怖分子一边还击，一边像蚁巢被人踩中般惊慌钻入掩体，瓦良格和阿尔泰则开火压制仍在抵抗者。\n\n短暂交火后，村庄归于寂静。分队绕过尚未受损的房屋，未发现幸存敌军，随后向部署地点撤离。今日无一伤亡，这一天结束了，明天还有新的行动，一周后，一笔丰厚的报酬将打入账户。"
 russiaflavor.13.a: "世界上最棒的工作！"
 russiaflavor.15.t: "漫步滨道"
 russiaflavor.15.d: "帝国的摇篮、荣光的圣彼得堡，春日如常般阴郁。寒风瑟瑟，细雨霏霏，偶尔还落下雪花。这个早晨无异于往昔——城市缓缓苏醒，高速公路喧嚣，人们从老到少，各自醒来，奔走于生活的洪流之中。彼得格勒堤岸遥望而去，映入眼帘的，便是这座城市苏醒的景致。堤岸伫立于大涅夫卡河畔，那是涅瓦河的一条支流——圣彼得堡正生于其上。\n\n唯有一对夫妇缓缓踱步，仿佛时间对他们而言并无重量。他们身边，是纳希莫夫海军学校的学员正急速奔赴校园。再旁边，是一处停泊处，一艘军用巡洋舰悄然靠岸。望见军舰，他们驻足，男人凝视着它，沉入回忆。这艘舰承载着纷繁往事——正是它的觉醒，那一道响彻天际的炮声，揭开了一个延续近百年的故事……\n\n他的思绪流转了近一分钟，被妻子一句话唤回：\"格奥尔格，你还好吗？\"男人点头，神色渐缓，挽起妻子的手臂：\"没事，我们走吧。\""
 russiaflavor.15.a: "阿芙乐尔，近来可好？"
 russiaflavor.16.t: "士兵兄弟情"
 russiaflavor.16.d: "暮色渐沉。宽敞的双层别墅里人声鼎沸，阳光倾泻——昨夜的雨水将天空洗得透亮，烧烤架上的炭火正旺，空气中飘散着烟熏味与丁香花的芬芳。凉棚下的长木桌摆满各色菜肴，发出不堪重负的吱呀声。围坐着七个人。两年前他们曾围坐在另一张桌前——在华沙郊外的地堡里分食单兵口粮，轮流抽最后一支烟，出发前互相交换家人的电话号码。以防万一\n\"季马，你还在紧急情况部？\"热卡问道。这个如今在萨哈林岛当导游的男人留着海员式的络腮胡。\n\"嗯，\"季马点头，\"现在处理的文件比火灾还多。听说你下海经商了？\"\n\"机缘巧合，\"热卡笑着转动手中的烤肉叉，\"我弟弟有个铺面，让我帮着开分店，结果雇来的销售员……\"坐在角落的卡普季夫——曾经的排长，现在的战伤康复医师——从背包里掏出个穿防弹衣的针织玩具猫：\"我的病人们织的。算是心理治疗吧。送给你们当战利品。\"众人大笑。那只猫最终被悄悄放进了他的口袋。随后觥筹交错，祝酒词里没有眼泪，只有温暖。\n\"有些东西永远不会变，\"坐在主位的男人说，\"我们还是那个团队，和从前一样。\"\n\"塔斯曼，你那边怎么样？挺难的吧？我猜文件堆成山了？\"无人机操作手瓦谢克直截了当地问。\"确实，\"加布里埃尔转动着酒杯，\"有时候比蹲战壕还煎熬，你们懂的。\"\n玻璃杯叮当作响。笑声回荡。生活仍在继续，每个人都走上了不同的道路。但每年此刻的相聚，总会让他们重新成为那个分享最后一块压缩饼干的集体。"
 russiaflavor.16.a: "往事如昨。"
 russiaflavor.17.t: "盛大开幕"
 russiaflavor.17.d: "春日的暮色为莫斯科披上一层柔和的金辉，首批宾客陆续抵达彼得罗夫卡大街。这座由19世纪贵族庄园改建的艺术设计博物馆外立面缀满灯饰、彩旗，以及俄罗斯当代设计师创作的玻璃金属装置。猩红地毯从正门延伸至挑高大厅，穹顶的光影装置正演绎着莫斯科的破晓时分。\n首批到访者中既有知名艺术家、设计师、建筑师和画廊主，也有艺术院校学子与市政府代表。此起彼伏的快门声里，镜头捕捉着宾客们惊喜交加的面容。\n皇室成员罗斯季斯拉夫·罗曼诺夫亲自为开幕仪式揭幕。这位身着定制西装的亲王站在英国设计学院毕业生创作的光穹下，带着浅笑阐述新空间的使命：\n\"这里不仅是艺术的圣殿，更是会呼吸的生命体。它将不断蜕变，既激发灵感也制造争议，让绘画与工业设计、纺织与建筑、平面与数字艺术在此相遇。\"他手腕轻转，水晶杯中的香槟泛起涟漪，\"我们希望每位访客都能成为创作历程的参与者。\"\n随着象征性的开幕仪式，首展厅的巨门缓缓洞开。展品突破了传统桎梏——它们悬浮于空中，铺陈在地面，流转在投影里，甚至融进环绕声场。入口处陈列着俄罗斯先锋派大师原作与现代诠释的对话，毗邻区域则展示着包括亲王本人作品在内的未来主义设计，那些带有液态金属光泽的家具模型引得观众频频驻足。"
 russiaflavor.17.a: "永葆敏锐。"
 russiaflavor.18.t: "心连心"
 russiaflavor.18.d: "鸟鸣啁啾，树叶沙沙作响。这是个美好的周五午后，夏日的阳光在拉多加湖面跳跃嬉戏。在瓦拉姆岛一座临湖的小亭子里，两位长者正低声交谈着属于他们的话题。周遭的宁静氛围让谈话语气显得平和，却丝毫未能减轻话题的沉重与严肃。这场艰难的对话已持续多时，双方各执己见。\n\"亚历山大·格里戈里耶维奇，您应该明白。您最近刚处理过类似事件。您和您的共和国不可能独善其身——是时候推进计划了，否则我们可能会错过时机。要为民众着想。\"\n\"沃瓦，我理解，您也清楚。我们会按您建议执行，两千年来我们始终在为此努力，但需要时间。很快就能完成。\"\n\"重点在于‘很快’，而不是‘过些时候’。形势正在起变化。\"\n\"好吧，沃瓦，是时候了？\""
 russiaflavor.18.a: "\"时机到了，亚历山大·格里戈里耶维奇，就是这样。\""
 russiaflavor.19.t: "不期而遇"
 russiaflavor.19.d: "法警局的薪资向来不算丰厚，国家试图用社会保障、提前退休等福利来弥补。然而身为中层干部的莉迪娅·维亚切斯拉沃夫娜，却选择通过和民众\"合作\"来填补钱包的空缺。当然，这种合作并不完全合法。某些债务人总能在繁冗的官僚系统中神奇\"失踪\"，其银行账户也会突然解除冻结；相应地，莉迪娅那笔数额惊人的房贷还款期限便能悄然缩短。\n这天，她最信任的下属照例带着塞满现金的信封走进办公室，钱款来自破产商人、拖欠抚养费者等联邦法警局的\"客户\"。正盘算着如何挥霍这笔横财的莉迪娅，全然没注意到下属灰败的脸色。\"这些是债务人孝敬的，共计五万卢布。\"当下属机械地汇报时，她头也不抬地应道：\"嗯，我记得。\"话音未落，办公室大门突然洞开，数名安保人员鱼贯而入。\n铺满桌面的标记钞票被侦查员逐一清点取证，而事先从附近法学院请来的见证人们，正全程目睹这位前法警局干部被铐上手铐的瞬间。"
 russiaflavor.19.a: "莫伸手，伸手必被捉。"
 russiaflavor.20.t: "各族人民的友谊"
 russiaflavor.20.d: "那是个炎热的夏日清晨。从不沉睡的莫斯科城，在汽车轰鸣与无数建筑工地的喧嚣中苏醒。一节地铁车厢在南方车辆段呼啸着停下，艾哈迈德提着两袋行李走下车来，胸前那枚由部队将军亲自授予的勋章在阳光下闪闪发亮。\n他对新祖国的义务已经履行完毕——现在要做的，就是好好规划用血汗换来的积蓄。妻子阿米娜正在家中等他。可他却重重叹了口气：要买下心仪的房子，手头的钱还差一些，这意味着他又得回到工厂的流水线上。\n艾哈迈德决定顺路去莫斯科众多的购物中心之一，给阿米娜买件漂亮首饰。可刚走进商场，他就和一个小伙子撞了个满怀。两人起初争执了几句，很快却聊得热络起来。原来这个叫伊万的大一新生，给他带来了意想不到的消息——在艾哈迈德服役期间，莫斯科已悄然发生变化：以帕特里斯·卢蒙巴命名的俄罗斯人民友谊大学，专门为像他这样通过参军获得俄罗斯国籍的退伍军人开设了函授课程。谢过万尼亚后，艾哈迈德踏上了回家的路，心中已然有了新的方向。"
 russiaflavor.20.a: "哇哦！"
 russiaflavor.21.t: "久加诺夫的养蜂场中"
 russiaflavor.21.d: "在奥廖尔州一个小村庄的郊外，空气中还飘着椴树蜜的甜香，没有汽车喇叭的喧嚣，只有蜜蜂翅膀振动的嗡嗡声。清晨，二十来个学生早早地聚集在这里——今天他们将迎来一堂特殊的实践课：养蜂场实地教学。授课老师更是位特别的客人：俄共中央委员会主席根纳季·安德烈耶维奇·久加诺夫。这位回到家乡的政治家，竟是个狂热的养蜂人。\n\"蜜蜂是勤劳、秩序与互助的象征，\"根纳季·安德烈耶维奇一边穿戴雪白的防护服，一边耐心讲解，\"而且人人都珍视它们的工作成果。你们说说，没加好蜂蜜的茶还叫茶吗？\"\n孩子们对这位特殊的老师兴奋不已。有人第一次捧起蜂巢框架，有人学习分辨蜂王与工蜂，还有个男孩天真地问：\"我能驯服蜜蜂吗？\"\n\"不用驯服，\"根纳季微笑着回答，\"要理解它的逻辑。蜜蜂能感知情绪——怀着善意接近，它就不会蜇你。\"\n课间休息时，这位共产党领导人用自产蜂蜜搭配黑面包和椴树茶招待孩子们。他讲述祖父米哈伊尔养蜂的往事，回忆困难年代蜂蜜如何治愈感冒与消沉。\"这不只是蜂蜜，\"久加诺夫望着忙碌的蜂箱说，\"更是教育。和蜜蜂相处过的孩子，会懂得勤劳的意义，明白蜂群中每个成员都很重要。\"夕阳西下时，他目送满载欢声笑语的校车缓缓驶离。"
 russiaflavor.21.a: "好运眷顾奋斗者！"
 russiaflavor.22.t: "战壕里没有无神论者"
 russiaflavor.22.d: "自圣乔治·胜利者被确立为俄罗斯武装力量守护圣徒以来，军旅生活中佩戴圣乔治丝带的风尚渐成传统。战场上的士兵们向这位圣徒祈求护佑，盼望他能庇佑自己免于死亡。军中流传着诸多传说，那些因圣乔治丝带而奇迹生还的故事。\n随着越来越多官兵在战火中重拾东正教信仰，对圣徒、圣子、圣父与圣灵的祷词也融入了行军日常。士兵们向圣母玛利亚祈求平安，随军神职人员在战斗间隙为部队主持圣事已成常态。这种虔诚不仅被军方默许，更得到高层将领的鼓励。而橙黑相间的圣乔治丝带，正是这一切的具象化体现，它既是军人勇气与爱国精神的象征，更化作俄罗斯军队守护圣徒的庇护之证。"
 russiaflavor.22.a: "神佑我等。"
 russiaflavor.23.t: "欢迎回来！"
 russiaflavor.23.d: "退役中校兼军事工程学博士，伊万·米哈伊洛维奇照例在傍晚时分点燃了香烟，坐在郊区别墅的长凳上凝望远方，任凭记忆溯流而上。思绪总是不由自主地回到他脱下军装正式退休的那天，那是十多年前的事了。当时的弗拉基米尔·弗拉基米罗维奇正值盛年，国家刚从九十年代的动荡中复苏，正全力重建着它的盾与剑，也就是武装力量。\n2007年，阿纳托利·爱德华多维奇·谢尔久科夫上校被任命为国防部长，不久便启动了武装力量大规模改组。这场改革实质如同苏联时期的\"重建\"，而伊万·米哈伊洛维奇正是强烈反对其中某些\"军队优化与现代化\"措施的抗议者之一。当意见被高层无视后，不愿与统帅部冲突的他选择退役，此后一直在军事学院任教。\n令老工程师始料未及的是某个深夜，私人手机突然响起。更令人惊讶的是来电者自称国防部代表，核实身份后直切主题：邀请他出任军队专家顾问。后来才得知，军方早已启动新一轮现代化改革，包括全面修正谢尔久科夫时期的政策，随着原班人马陆续退役，急需他这样的专业人才。"
 russiaflavor.23.a: "当然，他同意了。"
 russiaflavor.24.t: "哎，小苹果！"
 russiaflavor.24.d: "正午时分的俄罗斯首都——光荣的莫斯科城如常运转，一千三百万市民在此生活工作。无论从哪个维度看，这原本都是个再普通不过的日子。但对聚集在加涅茨基广场地铁通道附近的人群而言却并非如此。现场景象恍若一场集会——事实也正是如此。红色旗帜与标语牌四处可见，有人正用扩音器发表演说。\n当警方抵达现场了解情况时，发现引发民众聚集的争议焦点在于沃伊科夫斯卡娅地铁站更名事件。这座以革命家彼得·拉扎列维奇·沃伊科夫命名的车站，即将改称尼古拉耶夫斯卡娅。尽管警方和政府代表未对集会言论进行干预，但投诉者的诉求始终未获实质回应。所有受理投诉的机构答复都如出一辙：该决定系地方政府基于大量市民投诉所作。\n部分亲苏民众持续表达不满，主要质疑政府在此事上迎合激进分子情绪，并强调此类命名终究是俄罗斯历史的一部分，破坏历史连贯性不可接受。"
 russiaflavor.24.a: "你越滚越远了。"
 russiaflavor.25.t: "共同历史"
 russiaflavor.25.d: "俄罗斯社会早已伤痕累累。保皇派、苏联支持者与民主派之间的论战此起彼伏，彼此指控对方违法乱纪。而更多民众则对祖国历史与纷争漠不关心，只求偏安一隅。\n\n如今这一切已成过往。不同信仰、民族、阶层的人们正并肩作战——为他们共同的家园而战，无论它曾是什么模样，又将变成何种未来。分歧或许不会消失，但有一点确凿无疑：这些声音终于听见了彼此。眼下，他们正面对着同一个敌人。"
 russiaflavor.25.a: "团结铸于烈火。"
 russiaflavor.26.t: "实践"
 russiaflavor.26.d: "随着马克思列宁主义学说的复兴，有人曾质疑这是否会沦为理论家的空谈——尽管党和关切其事业的民众已倾尽全力。当欧陆燃起大战烽火时，真相已然明朗：这不仅是理论，更是如同伟大卫国战争时期那样，让人甘愿血洒疆场的解放理念，是被压迫多数挣脱少数压迫者的自由宣言。\n这一理念不仅在理论上，更在实践中获得了直接体现。战事爆发不久，宣传教育工作便自发地在基层官兵与下级指挥官间展开，很快得到统帅部的大力推行，因为每个战士都应当明白，他们捍卫的不仅是家园与苏维埃祖国，更是全人类的共同幸福。而要实现这一点，欧洲必须再度品尝失败的苦果。\n"
 russiaflavor.26.a: "让那些北约狗看看仗该怎么打！"
 russiaflavor.27.t: "登记日"
 russiaflavor.27.d: "莫斯科。傍晚。康科沃区一间采光极佳的两居室里，餐桌旁挤满了人。雨水拍打着半开的窗户，喧嚣的欢闹声却盖过了雨声。围坐在桌边的年轻人都不满三十岁，正热烈讨论着日常琐事。尽管场面嘈杂，这群人却散发着令人印象深刻的朝气。话题很快转向了在场所有人都关心的要事。绰号\"维佳\"的维塔利·谢尔盖耶维奇率先开口：\n\"很快就能知道咱们的事进展如何了。负责人今明两天会给答复。\"二十岁出头的萨涅克咧嘴一笑：\n\"得了吧，现在这形势你懂的。咱们这种半吊子反对派，上头怎么可能放行？\"维佳一时语塞时，这群人里唯一有正经工作的季马插话道：\n\"要是连发传单都没被抓，搞正经事他们凭什么反对？咱们提倡的可是健康生活、文化教育这些正能量。\"维佳还没来得及回应，手机突然响起。他迅速接通并按下免提。来电者是他们在行政部门的熟人——基里尔·阿列克谢耶维奇·阿韦林。\n\"晚上好！长话短说，维塔利·谢尔盖耶维奇。你们的申请获批了，按要求提交材料就能完成注册，所有活动都将合法化。具体细则我会发到你邮箱的《指导文件》里。祝顺利。\"\n后半段通话几乎没人听清，欢乐的浪潮瞬间席卷了整个房间。而在某间只亮着台灯的昏暗办公室里，一位老者露出近乎欣慰的微笑，为这些年轻人的成功由衷感到高兴。"
 russiaflavor.27.a: "一条未读信息。"
 russiaflavor.28.t: "难民"
 russiaflavor.28.d: "\"玛丽亚·安东诺娃自彼得罗巴甫洛夫斯克-堪察加报道。\"\n\n俄罗斯24频道的画面突然切换：温馨的蓝色演播室被堪察加的严酷景色取代。镜头前，一位身穿印有电视台标志白色夹克的黑发瘦女孩站在大型帐篷营地前。营地入口处停着几十辆卡车，车身写着\"人道主义援助\"，车上装满了食物、药品、玩具和保暖衣物。女孩深吸一口气，开始报道。\n\n在俄国总理米哈伊尔·米舒斯京的亲自领导下，成百上千的美国公民目前安置于俄方设立的临时住房营地中。他们中的许多人抛下了家中的一切：金钱、物品，但没有人舍弃自己的宠物。\n\n镜头对准了一只红毛猫，那只猫正被一位戴着\"USA\"字样帽子的九岁小女孩抱在怀中。\n\n\"他们从新墨西哥到华盛顿州，从不同州逃离了内战的恐怖。许多人仍然对冲突初期的混乱心有余悸，那时人与人失联，只能独自面对混乱。\"\n\n画面再次一变，镜头中出现一名皮肤黝黑的美国人，头戴俄罗斯国旗帽，身穿深红夹克。屏幕下方出现名字：约翰·铁托。\n\n\"该死，那些该死的共产党人简直疯了！那些神经病夺走了我的电脑，还因为我邻居不交出步枪就把他杀了！我只能逃离加州——要么往东去联邦政府那边，但那边已成无政府地带，根本不确定能不能活着到达……要么就航行到俄罗斯。而我碰巧会点俄语——以前还试过跟俄国姑娘网上约会，哈哈！这儿当然比洛杉矶冷多了，但也有它自己的魅力……\""
 russiaflavor.28.a: "烈焰升腾。"
 russiaflavor.29.t: "已封禁"
 russiaflavor.29.d: "俄罗斯联邦通信、信息技术和大众传媒监督局以\"传播有关新冠疫情的虚假信息\"为由，对推特、脸书和Reddit实施访问限制。该决定依据《信息、信息技术与信息保护法》作出，该法律允许对违反俄法规的网络资源进行封锁。监管机构称，这些社交平台屡次警告后仍未删除违规内容。另有用户反映，YouTube、Instagram和维基百科等服务的加载速度明显下降，部分反对派媒体及运动组织的网站已无法访问。\n\n国家杜马议员与专家等官方力量支持封锁举措，称这是保护民众免受虚假信息侵害的必要措施。联邦委员会主席瓦莲京娜·马特维延科表示\"西方平台多年来无视俄罗斯法律\"，议员维塔利·米洛诺夫则称此举是\"对信息侵略的正当回击\"。\n反对派与人权组织对当局行动提出批评。纳瓦利内团队代表指责封锁是\"舆论审查与社会隔离\"，\"纪念\"人权组织宣称公民知情权遭受侵犯。谷歌与Meta公司代表虽承诺将\"尽快解决访问问题\"，但未明确具体时间表。\n\n尽管这些社交平台在俄罗斯用户中普及度有限，但有观察人士担忧，此次封锁标志着网络审查再度升级，可能是构建\"主权互联网\"进程的新动向。"
 russiaflavor.29.a: "老实说，禁了Reddit我还挺高兴的……"
 russiaflavor.30.t: "俄罗斯蒸汽浴"
 russiaflavor.30.d: "近日，一则视频在网络热传：俄罗斯政坛元老弗拉基米尔·沃尔福维奇·日里诺夫斯基与党内同僚在莫斯科郊外某浴场进行\"水疗仪式\"。这段混剪视频中，汗流浃背的日氏一边蒸桑拿一边发表激情演说：\n\n\"看看欧洲！那个肮脏的地方！中世纪那些自命不凡的欧洲佬几个月不洗澡——连伯爵都臭气熏天——结果黑死病一来就死了三分之一人口！再看看俄罗斯：我们可没这种丑事。因为俄罗斯人从小讲究卫生，坚持洗桑拿。多伟大的传统！\"日里诺夫斯基以标志性动作清了清嗓子，抹去汗水，正了正绣着\"沙皇\"字样的浴帽，\"浴场是伟大的发明，它从第一罗马传到第二罗马，再从第二罗马传到第三罗马——莫斯科！但可怕的不是历史，而是欧洲至今仍以新形式延续着这种肮脏。他们那些游行、谎言、诽谤——全都怪他们灵魂的污浊。而我们俄罗斯人灵魂纯净！\"\n\n演讲结束后，日里诺夫斯基再度凝视镜头，突然转身吼道：\n\n\"萨福诺夫你这狗崽子！谁让你自己搓背的？！把桦条帚拿来躺好，看我怎么收拾你……\"随后画面切换为他手持帚条，在党员后背抽打出铿锵节奏，边打边训诫\"无论在浴场还是前线都要为俄罗斯争光\"。视频最终以集体泳池巡游收尾，由俄罗斯领袖亲自领航。\n\n据悉，该视频是政府社会复兴计划宣传企划的一部分，策划人正是日里诺夫斯基本人。视频在YouTube引发轰动后，多家媒体报道俄罗斯正掀起新一轮沐浴文化复兴风潮。"
 russiaflavor.30.a: "和日里诺夫斯基一起蒸桑拿？帮我报名吧！"
 russiaflavor.31.t: "日里诺夫斯基电影"
 russiaflavor.31.d: "弗拉基米尔·沃尔福维奇·日里诺夫斯基的逝世无疑在俄罗斯民族集体意识中留下了不可磨灭的印记。远见卓识者、天才、爱国者——这些称谓精准诠释了人民对这位最高领袖的崇敬。为让未来大俄罗斯帝国的子民铭记这位伟人，俄联邦政府与文化部联合支持了影片《日里诺夫斯基·崛起》的摄制。该片以传记手法再现了日里诺夫斯基政治发迹的峥嵘岁月：从初试锋芒的胜利到政党建制，历经新世纪头十年的低谷后，终在2022年大选中赢得压倒性胜利，继而带领国家在其铁腕统治下完成深刻变革。影片尾声，日里诺夫斯基亲自向观众发表演说，呼吁民众像我们光荣的祖先那样珍视并守护俄罗斯。\n\n尽管西方新布尔什维克政权已将该片斥为\"法西斯宣言\"，其在俄罗斯国内却取得空前成功，成为将被代代重温、列入学校课程的民族瑰宝。影评界盛赞其演员表演精湛、人物刻画传神、配乐气势恢宏，更彰显了正确的爱国主义导向。"
 russiaflavor.31.a: "一部关于伟人的伟大电影！"
 russiaflavor.32.t: "旧秩序重归"
 russiaflavor.32.d: "复兴后的俄罗斯帝国首任宰相康斯坦丁·扎图林遇刺身亡已过去一个月。阿尔乔姆正行走在圣彼得堡的宫殿堤岸上，不远处就是冬宫。\n冬宫前方，共和派支持者正在举行未经批准的集会。士兵们手持AK-12突击步枪在集会人群前列队戒备，枪口蓄势待发。一名军官站在APC-80装甲车上，手持扩音器居于士兵后方。\n阿尔乔姆坐在堤岸围栏上，掏出香烟和打火机，静观事态发展。他点燃香烟的当口，军官的扩音器突然响起：\n\"立刻解散，沙皇的子民们！你们这些反俄口号在今天尤其不合时宜！\"\n集会人群爆发出愤怒的声浪，示威者开始向士兵周围扩散。军官毫不犹豫地高举右臂，将手掌攥成拳头。\n士兵们立即将AK-12枪口朝上，齐射了一轮空包弹。\n抗议者四散奔逃，其中一人慌不择路翻越堤岸围栏，跌入了涅瓦河中。\n阿尔乔姆掐灭烟头随手一抛，望着混乱的场面喃喃自语道……"
 russiaflavor.32.a: "我们的自由派可不是小俄罗斯人，他们一有危险就会逃跑！"
 russiaflavor.33.t: "前线英雄"
 russiaflavor.33.d: "弗拉季斯拉夫和德米特里原是圣彼得堡出身的朴实老兵，在匈牙利前线的战火中淬炼成新俄罗斯帝国的英雄。此刻他们各自捧着帝国首都发来的、盖着总理府钢印的函件。\n\"快看啊老弗，彼得堡给咱们寄了什么！\"\n\"可不是，我这也有份公文。赶紧拆开瞧瞧，反正这鬼地方连个写信的活人都没有。\"\n两人撕开火漆封缄的信函互相宣读起来。原来是要调他们回圣彼得堡担任区长要职，德米特里被任命为彼得格勒区区长，弗拉季斯拉夫则执掌中央区。\n\"见鬼……居然让咱们这些大老粗去管地方政务。\"德米特里咂舌道。\n弗拉季斯拉夫回应道……"
 russiaflavor.33.a: "\"咱们这是要搞克拉斯诺谢利斯基大人那套军政府啊！\""
 russiaflavor.34.t: "王冠之联合"
 russiaflavor.34.d: "伊凡在宿舍里刷着电报频道的俄新社消息，忽然被一则附视频的新闻吸引——俄罗斯总军事联盟大会的现场画面。\n\"瓦季姆·克拉斯诺谢利斯基宣布，为帝国与沙皇陛下的荣光，十月十七日联盟与俄罗斯民族联盟将于即日起并入俄罗斯总军事联盟。\"\n视频里的克拉斯诺谢利斯基大人身着戎装站在讲台麦克风前，声音铿锵有力：\n\"本人以俄罗斯帝国总理兼俄罗斯总军事联盟统帅之名义宣布，我们已达成合并协议——十月十七日联盟与俄罗斯民族联盟即日起整体加入总军事联盟。\"\n雷鸣般的掌声中，他继续宣言：\n\"此举只为重生的帝国伟业，只为罗曼诺夫皇朝的正统！凡欲脱离原组织者尽可自便，但若要加入总军事联盟，就必须宣誓效忠帝国与沙皇！\"\n视频在经久不息的掌声中结束。伊凡掰了掰指关节，自言自语道……"
 russiaflavor.34.a: "真是意料之外，情理之中啊。"
 russiaflavor.35.t: "青春热血"
 russiaflavor.35.d: "\"兄弟们，现在大毛家简直乱成一锅粥！普大爷又在不择手段地抓权了！\"\n八年级女生尤莉娅裹着昂贵保暖的冬装，在某个社交平台的直播镜头前愤愤地撇嘴。直播间里只有五个观众，估计还全是她同学，但这丝毫不妨碍她继续对当局行为发表激烈抗议。上周反对派领袖纳瓦利内被捕事件，彻底点燃了年轻一代的怒火。他们现在甚至走上街头\"反抗暴政\"，至少看了反腐败基金会等自由派调查报道的尤莉娅对此深信不疑。\n\"我们必须夺回被这个该死的政权践踏的正义！我们有义务——\"\n这番慷慨陈词还没说完，联邦安全局工作人员无意间的推搡让尤莉娅尖叫着跌在柏油路上。手机摔得粉碎，直播信号戛然而止。羊绒围巾沾满一月的泥浆雪水，年轻反对派的鼻尖因撞击路面变得通红。她委屈地瞪着导致自己跌倒的缘由，眼眶里迅速蓄满疼痛与屈辱的泪水。"
 russiaflavor.35.a: "这是她最后一次直播。"
 russiaflavor.36.t: "成功的关键"
 russiaflavor.36.d: "玛丽亚在七点半踏出家门。前往工作地点需耗时一个半小时，而她的班次十点才开始。她为何出发得这般早？并非为了多工作几小时，而是为了给早餐留出一段从容的时间。她不会做饭，而清晨将预制菜塞进胃里更谈不上美好的一天的开始，因此，她总习惯在单位食堂对付一顿。是的，只有粥、果汁与几片面包，但除此之外，她别无选择。换乘之间，她根本没有机会采购食物，家中除了网购的包裹，几乎空空如也。至少，以前是这样。\n\n绕过自家楼角时，一道橙白相间的微光吸引了她的目光——一个新招牌若隐若现。她驻足回望，竟发现原本冷清的角落如今竟亮起了霓虹，\"我们营业啦！\"——那招牌写道。玛丽亚一时怔住。她家门口，竟真的开出了一家像样的店？\n\n她小心翼翼地走近门前，推开门走入。轻柔的音乐缓缓流淌，室内整洁温馨，菜单牌静静陈列在一旁。原来是一家煎饼小馆，提供各种创意口味——从甜蜜的炼乳，到俄式的红菜头沙拉，再到翠绿的菠菜。玛丽亚来到点餐台前，看了看标价——竟然比单位食堂还要便宜些许。一位身穿深米色制服的收银员走了过来，微笑着问道：\n\n\"欢迎光临，请问您要来些煎饼吗？\""
 russiaflavor.36.a: "\"来杯南瓜奶昔！\""
 russiaflavor.37.t: "裁员"
 russiaflavor.37.d: "\"这他妈是什么东西？\"沙赫诺夫斯基暴跳如雷地吼道。哈米托夫默默递上那份来自俄罗斯政府的通知——收到此类文件本不稀奇，过去有，未来也还会有。但这次的内容却令人震惊：这份由阿列克谢·涅恰耶夫签署的命令，要求联邦反垄断局裁员，并将副局长职数削减至五人，其中就包括沙赫诺夫斯基本人。\n哈米托夫叹了口气，试图缓和气氛：\"听着…我知道这很突然，也让人难以接受。但和政府对抗没有好下场，你必须——\"\n\"我管那个暴发户怎么想！\"沙赫诺夫斯基厉声打断，声音越来越高，\"这个……这个门外汉！他根本不知道自己在于什么！要玩民主是吧？那我就用民主的方式起诉他！毕竟我——\"\n\"毕竟你什么？\"哈米托夫冷冷截住话头，\"铲除了内部异己？和科瓦尔丘克家族有利益输送？第一次欧战期间差点搞垮俄罗斯经济的难道不是他们？别忘了，你的那些勾当总理和总统都心知肚明。不配合的话，就等着和别列佐夫斯基、霍多尔科夫斯基他们作伴去吧。\"\n沙赫诺夫斯基顿时语塞。他明白自己已无路可退，最终深吸一口气，缓缓点了点头。"
 russiaflavor.37.a: "……我会的，部长先生！"
 russiaflavor.38.t: "阿塔曼之死"
 russiaflavor.38.d: "尽管夏日清晨宁静宜人，罗斯托夫州叶兰斯卡娅村的这天早晨却并不美好。唯有施工机械的轰鸣打破了这片宁静——在叶兰斯基哥萨克纪念馆及博物馆园区内，一处景点吸引了大量围观者、路人和游客聚集。\n\n人群喧哗，当地人低声议论着眼前的一幕，有人愤愤不平地质问着施工车辆的操作员。那尊哥萨克首领的雕像——显然指的是彼得·尼古拉耶维奇·克拉斯诺夫——已经被拆除。镌刻着\"献给为信仰与祖国献身的顿河首领、将军、军官、哥萨克男儿与女儿们\"的铭牌也已被卸下，随后整座雕像也被极为随意地推倒。\n\n有人默然接受这一切，大多数人则显得漠不关心，但仍有几人高声怒骂施工工人。\n\n这起事件在一段时间内引发了社会上的激烈讨论，有人认为此举是政府对历史遗产的漠视；而媒体及亲政府人士则援引地方政府的决定，称此为防止美化纳粹合作者与协从者的必要措施。"
 russiaflavor.38.a: "叛徒不配被铭记。"
 russiaflavor.39.t: "放轻松吧！"
 russiaflavor.39.d: "厨房闷热难耐，敞开的窗户将暮色中的林荫道与混杂着春天气息的淡淡烟味一并放了进来。莱赫斜倚在窗台上，嘴角叼着半截香烟，马克西姆则无精打采地坐在他对面的餐桌旁。\n\"我没开玩笑，莱赫，\"马克西姆压低嗓音，仿佛隔墙有耳，\"真的不对劲。手机会自己关机，还接到过只有电流声的怪电话，就像有人在测试线路。\"\n莱赫嗤笑一声：\"你得了被害妄想症吧？你算老几？既不是将军记者，也不是反对派，谁稀罕监视你啊？\"\n\"不知道，\"马克西姆点点头，\"就是感觉……很怪。\"他叹了口气转移话题。\n接下来一小时里，他们聊着家长里短——工作、房子、共同的朋友。闲谈轻松愉快，分别时两人都舒展了眉头。\n可就在马克西姆离开的瞬间，街角不起眼的白面包车后厢里，眼皮松垂的老者从壁柜抽出了薄档案袋，郑重地摆在了折叠桌上。烫金封面上赫然印着：\"监听记录……目标：马克西姆·S（化名M.S.）\"\n年轻司机刮得发青的下巴扬起笑容。"
 russiaflavor.39.a: "——看来咱们的莱赫还活在2007年呢，是吧，基里尔·安德烈耶维奇？"
 russiaflavor.40.t: "克里姆林宫之夜"
 russiaflavor.40.d: "晚上九点，克里姆林宫的办公室早已空无一人，而他仍在伏案工作。事关国家命脉的政务容不得半点分心与懈怠。从清晨到日暮，他亲自督导各部门运转、推动经济数据增长、确保军备如期交付。西方伙伴们……这种连轴转的状态持续太久了。他太累了。该休息了。处理完最后几份文件就休息。\n\n关于休憩的思绪被敲门声骤然打断。\"进。\"他说道。\n\n\"弗拉基米尔·弗拉基米罗维奇，很抱歉打扰您，但网上又出现了新的‘调查报告’。部分民众情绪激动，反对派未经报备就策划明天举行集会。安全部门已经……\"\n\"知道了。按规矩办。处理干净。\"他揉了揉太阳穴，\"这些人，真是闹麻了。\""
 russiaflavor.40.a: "把他们从街上赶出去。"
 russiaflavor.41.t: "最高统治者"
 russiaflavor.41.d: "维克多·瓦西里耶维奇·佐洛托夫近日成为克里姆林宫的新任代掌者。这段时间以来，这里的厅堂对他而言已变得熟悉。令这位新任最高统帅欣慰的是，他所构建的体系正如同精密钟表般运转。不过，这位国民近卫军总司令，如今俄罗斯无可争议的统治者向来是个行动派，长时间困在办公室令他倍感厌倦。只要有机会便在克里姆林宫内踱步巡视，这已成为他的新习惯。\n宽阔的大理石厅堂内空无一人，唯有一幅足有两人高的巨幅肖像引人注目，弗拉基米尔·沃尔福维奇·日里诺夫斯基穿透镜片的锐利目光正凝视着观画者。画中的他仿佛就站在对面，双臂交叠于胸前，惯常的正式西装翻领上别着俄罗斯国旗徽章，背景是如水彩般晕染的淡蓝天幕。\"画得真妙。栩栩如生。和我记忆中的他一模一样。\"佐洛托夫暗自思忖。\n这场突如其来的邂逅让国家近卫军总司令陷入沉思。他首先忆起他们那些务实的对话，以及弗拉基米尔·沃尔福维奇在其政党内部乃至整个国家层面特有的行事风格。当然，他并非总是个易于相处的人，但每当出现问题，他总能立即找到解决方案，或是找到能解决问题的人——就像2022年他当选后反恐战争期间那样。维克多·瓦西里耶维奇觉得自己也是如此。特殊问题需要特殊手段。国家不会自己捍卫自己。他们都明白，作为领袖，不仅要当守护者，必要时更要成为千百万子民严父般的保护者。"
 russiaflavor.41.a: "永恒的记忆。"
 russiaflavor.42.t: "未来计划之城"
 russiaflavor.42.d: "俄罗斯的数字化改造在苏尔科夫主导下堪称无孔不入。而最近，在弗拉季斯拉夫·尤里耶维奇与莫斯科市长索比亚宁的联合推动下，一项名为未来之城的超级工程正式启动——按照规划，莫斯科将成为这颗星球上最舒适的城市。\n\n的确，在不久的将来，整座城市将布满讲述帝都历史的二维码。市民与游客通过专属APP，就能用增强现实技术亲历十五世纪、十九世纪乃至二十世纪的莫斯科街景。而依托卫星数据与用户反馈实时更新的三维地图，随时能预警交通拥堵或规划最佳游览路线。\n\n当然，这个项目还有另一重使命。整座城市将遍布智能摄像头、生物识别传感器与指纹锁。用指尖轻触就能打开新式公寓大门固然便利，但这也意味着：国家永远知道你在哪里。无论你是外卖骑手、普通工人还是当铺老板；无论你穿梭在赫鲁晓夫楼迷宫里，还是随着人潮闯过红灯，即便戴着医用口罩或围巾，AI摄像头也能重构你的面容。犯罪率确实因此大幅下降，多数市民对此表示欢迎。但也有人惊呼莫斯科正在变成环形监狱，只是这些声音很快淹没在便利生活的浪潮中。毕竟在索比亚宁治下，这里确实成为了全球最先进的梦幻之都。而一切皆有代价。童话般的城市，梦境般的城市……"
 russiaflavor.42.a: "一朝落入罗网，永世不得超脱。"
 russiaflavor.43.t: "时代本质"
 russiaflavor.43.d: "物理化学教师弗拉季斯拉夫原本对政治漠不关心——直到总统令将俄罗斯大多数左翼运动列为非法。虽然日里诺夫斯基倡导的政治理念并非与他完全格格不入：他认同保护俄罗斯人利益的必要性，但同样坚信西式资本主义正在摧毁这一切，只需望向窗外便可见一斑。\n日子平淡如水地流逝，灵魂却日渐空虚。直到某天，他在某个小众电报频道看到激动人心的消息：谢尔盖·库尔金扬的《时代本质》节目即将在国家电视台首播。这让他想起曾经看过的库尔金扬讲座录像，顿时豁然开朗。他特意调整作息，发誓绝不错过这期节目。\n次日傍晚，当弗拉季斯拉夫准时调频时，电视扬声器传来那个熟悉的声音：\n“……所以我要再次追问——当世界图景不断重构，我们该如何在纷繁表象中保持清醒？可曾有人对自己说：‘停下！究竟发生了什么？’如果你曾这样自问，那么这场对话正是为你准备。当然，我们首先要探讨谈话的必要性。事实是，那些不断收集情报、分析局势的西方敌人，不仅会在物理层面，更将在精神领域——在意义的疆土上向我们进攻。当局者自然明白这点，所以……”“……最后我想说，喻而言之，人类是'造物之冠冕'，是自然的主宰。俄罗斯人承载着如此强大的形而上学理念……这注定会招致那些想把人类降格为野兽与机器的势力之仇恨……”"
 russiaflavor.43.a: "我们得离开四楼。"
 russiaflavor.44.t: "\"欧洲资本主义的神化\""
 russiaflavor.44.d: "亲爱的《红星报》读者朋友们，大家好。众所周知，当今世界局势与十年前已截然不同。今天，就让我们共同回顾欧洲大陆如何陷入当前可悲境地，并探讨左翼运动在近期是否还存在复兴可能……\n\n……然而欧陆战争结束后，德米特里·阿纳托利耶维奇便失宠于统治集团。究竟是因为他太过“积极主动”，抑或仅仅不愿分享战果？真相恐怕永远无从得知。当权者最终做出选择，在欧洲大瓜分结束后，弗拉季斯拉夫·苏尔科夫成为了寡头们的新傀儡。这位秘密的法西斯主义者，正是无数反人类罪行的幕后操盘手……\n\n……被俄罗斯资本击溃的欧洲同样经历了蜕变。自尊受创的资本集团开始着手重构社会，将\"大陆主义\"民族情绪与畸变的自由主义、优越论思想混合，铸就了新统一国家的意识形态基础。而精妙之处在于，这场政变的最大受益者依然是那群老面孔——克劳斯·施瓦布、彼得·莱特曼特，这些名字诸位早已耳熟能详……\n\n……请允许我用一个简单事实作为结语。弗朗西斯·福山在《历史的终结及最后之人》中的预言可谓一语成谶，只是真正的终局远比他想象的更为晦暗。我们未能迎来没有分歧的自由主义乌托邦，也未见证专制制度的崩塌，取而代之的，是建立在利润最大化与工人阶级异化原则上的剥削型公司国家。激进法西斯主义做出了最利己的选择，通过扼杀一切意识形态萌芽来巩固统治。这就是为何在莫斯科或布鲁塞尔，你们再也看不到任何真正的政治口号，偶尔飘入耳中的，只剩“民族荣耀”“共同遗产”这类空洞的符号碎片，它们早已失去全部实质意义……"
 russiaflavor.44.a: "摘自俄罗斯联邦极端主义材料清单。"
 russiaflavor.45.t: "看板"
 russiaflavor.45.d: "顿涅茨克昏暗的街道渐渐苏醒过来。安德烈在这座城市生活了二十年，此刻正沿着熟悉的路线缓步前行，目光掠过那些新近被战争刻下伤痕的建筑。有些外墙已经修缮一新，有些还残留着空洞的窗框，但整座城市的呼吸比以往更沉静、更笃定。\n\n深夜时分他不知不觉走到了中央市场。忽然间——霓虹灯刺破黑暗，勾勒出熟悉的轮廓。\"顿涅茨克动漫屋\"的巨型招牌悬在一栋矮楼上。看板娘凉宫春日正绽放笑容，下方闪烁着\"重新开业！\"的光字。安德烈驻足凝视，胸口涌起奇异的暖流。他记得少年时代常光顾这家店，正是在这里初识日本动画的世界。后来炮火降临，战争开始，警报与死亡成为永恒的背景音。\n\n但此刻霓虹再度亮起，在水洼里投下粼粼波光。安德烈嘴角微扬。这光芒中藏着某种重要的讯息，不仅是店铺重开，更是一个征兆。生活正在回归。不仅是面包与栖身之所，还有这些看似微不足道、与生存无关却珍贵的事物。\n\n他推开店门。新刊油墨的气息扑面而来，书架上的书脊泛着微光，柜台后站着穿女仆装的店员，正对午夜来客躬身微笑。\n安德烈点头致意。战争正在退场，一点一滴，一个招牌接一个招牌，一个微笑接一个微笑。而这仅仅是个开始。"
 russiaflavor.45.a: "冰冷的心脏再次跳动。"
 russiaflavor.46.t: "聚宝盆"
 russiaflavor.46.d: "圣彼得堡的街道笼罩在绵绵细雨中，叶戈尔正走向他最爱的购物中心。得益于持续上涨的薪资，如今他已能从容购买高档商品与优质食材。年轻人对此满心欢喜，在享受生活的同时，也积攒着购置新公寓的积蓄。\n\n初入商场，琳琅满目的服饰店便闯入视野。从礼帽到棒球帽，从夹克到呢绒大衣，T恤、西裤、牛仔裤与皮鞋陈列得令人目不暇接。众多奢侈品牌在此角逐，每件商品的精良工艺甚至常超越欧洲水准。香水专柜区旋即包围了他的感官，千百种芬芳接踵而至，每一缕都令人心醉神迷。登上二楼，电器专卖店里日系与国货的尖端科技产品交相辉映，家具展厅汇聚着东欧最上乘的居家艺术，儿童天地则让各年龄层的孩子们圆梦童话世界。行至三层，俄罗斯顶级餐厅环布四周，每一家都能带来环球美食的味觉盛宴。相邻的美食广场虽价格亲民，但即便连锁快餐也选用一流食材，满足着从学生到企业主管各色人群的速食需求。\n叶戈尔环顾这座购物天堂——祖国大地上数千个同类商业体之一，嘴角泛起笑意。新一代建设者确实重塑了俄罗斯，将这个经济强国打造成人人皆可逐梦的乐土。他走向最钟爱的\"法式烘焙坊\"，手持羊角包与咖啡临窗而坐。雨滴在玻璃上蜿蜒而下，此刻他无比清晰地意识到：生活在这样的俄罗斯，是何等幸福。"
 russiaflavor.46.a: "俄罗斯向来慷慨！"
 russiaflavor.47.t: "在彼岸，在彼方……"
 russiaflavor.47.d: "\"信号旗\"特种部队队员们在哥伦比亚丛林深处的一个小村庄附近着陆，开始了他们的一天。涉过一条小河后，小队与守军发生短暂交火，政变者没料到会有人敢深入如此偏远的荒野。晨间的枪声渐渐平息，涅克拉索夫的头戴式耳机里传来队长的声音：\n\n\"目标就在村里，给我彻底搜查！\"\n阿列克谢冲进第一间屋子，找到了队员们冒死营救的对象：被军方推翻的哥伦比亚总统古斯塔沃·佩特罗，正被一名守卫用枪挟持为人质。\n\"让老子走！不然我毙了他！\"——尽管语言不通，意思却再明白不过。\n\"放下武器！\"涅克拉索夫用生硬的西班牙语吼道，声响足以传遍整个村庄。\n叫嚷声与短暂的僵持。\n一声枪响。\n守卫额头中弹倒地。\n韦利奇科队长闻声冲进来，看见阿列克谢正扶起人质。\n\"马孔多，这里是阿尔卡迪奥。马尔克斯已获救，重复，马尔克斯已获救！\"队长满意地向中心报告。\n\"收到，阿尔卡迪奥。梅尔基亚德斯已被清除，奥雷里亚诺已控制家族，向波哥大推进。政变反击威胁解除。\"\n韦利奇科如释重负地呼气，涅克拉索夫也随之放松。\n\"没时间休息，兄弟们。可能有援军。护送目标撤离。\"——队长又用西班牙语对佩特罗补充道："
 russiaflavor.47.a: "来自俄罗斯的爱，总统先生。"
 russiaflavor.48.t: "该隐的泪水"
 russiaflavor.48.d: "\"失落媒体\"不仅是全球互联网用户，更是俄语网络用户尤为着迷的话题。寻找湮没在时间洪流中的电影、动画、歌曲、游戏等内容，堪称相当小众的爱好。但如今这项活动不仅吸引了众多俄罗斯民众，更引起了国家当局的关注。在政府机构协作下，基辅科学电影制片厂出品的苏联动画《该隐之泪》于今日重见天日。\n\n这部动画的搜寻工作持续多年，如今终成公共文化财富。作品批判了乌克兰民族主义：主角所谓\"爱国者\"屡次将故土出卖给侵略者——1918年投向德皇，1941年效忠希特勒。无论过去还是现在，这些民族主义者始终依靠西方资金与指令行动，却以\"独立\"为幌子遮掩。\n\n时机选择堪称精妙：当我们正处于全面军事行动边缘，这份来自过去的警示必将助力解放区民众的教育工作！\n\n\"在该隐泪海之上，乌克兰仍在强颜欢笑。\""
 russiaflavor.48.a: "历史已经完成了一个循环。"
 russiaflavor.49.t: "山巅之城"
 russiaflavor.49.d: "当美国陷入内战时，长期经济衰退的\"俄罗斯旧金山\"符拉迪沃斯托克意外获得了强劲的发展动力。成千上万逃离战火的美国IT专家、工程师、程序员和商人在这座城市看到了超越港口的潜力：一个能替代昔日加州办公园的沃土。废弃工厂原址上涌现出现代科技园区，俄罗斯程序员与硅谷难民在此并肩工作；而在俄政府支持下，远东联邦大学旁崛起了前斯坦福大学的独立分校，这里正测试量子计算机并研发下一代人工智能。\n\n\"天朝\"的援助恰逢其时。中国投资将港口改造为配备自动化码头的科技枢纽，城市海湾沿岸延伸的\"红色长廊\"林立着阿里巴巴、华为等中国企业巨头的地区总部。\n\n随着俄中签署新协议，这座城市的名字即将列入全球技术顶尖大都会榜单。"
 russiaflavor.49.a: "\"符拉迪沃斯托克-2000\""
 russiaflavor.50.t: "民众抗议"
 russiaflavor.50.d: "安东紧贴巷壁屏住呼吸。当巡逻队经过时，他缓缓遁入黑暗，心脏狂跳不已。几名穿黄色制服的男子沿街行进，为首者身披白色切尔克斯长袍，人人佩戴白底蓝黄相间的Z字臂章，腰际手枪皮套隐约可见。直到巡逻队远去，他才敢喘息，继续沿着莫斯科阴冷潮湿的街道潜行，身体尽可能贴近墙壁，在巷弄与门廊间躲避着黄卫兵。\n\n几分钟后，他发现了另一张宣传海报。墙上阿里哈诺夫正以威严目光俯视众生，俄罗斯总统画像下方写着：\"动荡终将过去，古老的罗斯会焕发比太阳更耀眼的光芒。\"安东皱眉从背包取出喷漆罐，开始涂抹海报面容。一道漆痕，又一道——作品完成时，海报已变成对政权抗争的绝望呼号。\n\n安东深知自己并非孤身作战。全国各地有成千上万像他这样的人，在闷热的厨房餐桌旁，在工厂吸烟室里，在公寓走廊中，时刻准备捍卫自由。\n但另一方面，人民毕竟选择了阿里哈诺夫。如果民众自己选择了这条路，这样的抗争意义何在？难道他才是人民的敌人，而非阿里哈诺夫或其他任何人？……\n\n脚步声再次逼近。安东将漆罐抛进垃圾桶，消失在迷宫般的巷弄中。"
 russiaflavor.50.a: "他的电话无人接听。"
 russiaflavor.51.t: "\"圣徒\"归来"
 russiaflavor.51.d: "近几十年来，俄罗斯人与高加索移民的冲突日益频繁。由于执法部门的恐惧、腐败与怠惰，往往导致手无寸铁的正当防卫者沦为被告，而真正的罪犯却始终逍遥法外。\n\n2013年11月就发生过这样的事件。德米特里·帕尔申与儿子在莫斯科地铁遭到达吉斯坦人拉蒂波夫的袭击。当对方向他们发起攻击时，德米特里为自卫掏出气手枪连开数枪，随后与儿子离开了车厢。\n\n事发视频很快在网络上传播，引发了民众对自卫者的声援。人们尤其记得帕尔申之子在车厢门口举枪震慑歹徒的画面。饱受移民犯罪之苦的民众将他们视为\"地铁圣徒\"——父亲守护儿子，儿子守护父亲，宛如圣经故事的现代演绎。\n\n然而族裔犯罪集团并未放过他们。老帕尔申不久后便遭拘留，从2014年起辗转于精神病院与监狱之间。值得庆幸的是，民族屈辱的时代已然终结——如今阿里哈诺夫总统签署特赦令，帕尔申不仅重获自由，更在数小时内佩戴全套勋章加入了黄卫兵。\n\n俄罗斯人再无畏惧。现在该轮到别人畏惧我们了。"
 russiaflavor.51.a: "毫不留情。"
 russiaflavor.52.t: "儿童画"
 russiaflavor.52.d: "\"妈妈，快看我画的画！\"\n\n瓦西里莎，这个身材纤瘦、金发白肤的幼儿园大班女孩，正磕磕绊绊地说着话，急切地想奔向母亲。妈妈终于来接她离开这座被称作\"文化中心\"的复杂建筑。\n\n\"嗨，小宝贝。哇，这是你自己画的吗？\"母亲轻抚女儿头发，语气里带着孩子天真心灵难以察觉的讽刺。\n\n\"是的！\"瓦西里莎带着纯真的童稚自豪回答。\n\n她递给母亲的画作上，是幅拙朴的乡村风景：背景有间小木屋、白色石砌教堂和形似白桦的树木，前景则是女孩自己、父亲安德烈以及标注着\"妈妈\"字样并画着爱心的女性。女孩怀中抱着橘猫，父母用空余的手臂相拥着搂住女儿。\n\n\"我从没见过这座教堂。你在哪儿看到的？\"\n\n\"照看我们的萨莎阿姨带我和其他小朋友去参观，她讲了好多关于那里的有趣故事，我就决定画下来，你看……\"\n\n又闲聊几分钟后，母亲帮女儿穿好外套走向归途。瓦西里莎沿途不停讲述着今日见闻，还有在RuTube上观看的视频内容。\n\n画作左侧不再与全家牵手的位置，站着个穿类似西装外套的暗色微笑人像。人像下方歪歪扭扭写着几处错别字：\"我们罗斯的伟大总统阿哩蛤诺夫\"。"
 russiaflavor.52.a: "俄罗斯的栋梁之材。"
 russiaflavor.53.t: "谢谢你，狼之子"
 russiaflavor.53.d: "自由民主党一直为其作为俄罗斯首个数字化政党而自豪，因为谁控制了互联网，谁就控制了年轻人的思想。几周前，以其在俄罗斯互联网界人脉广泛而闻名的弗拉索夫宣布，创立了一个名为日里诺夫斯基的猎鹰的媒体项目。他称该项目\"是在互联网娱乐领域，对西方做出的一个有力的俄罗斯回应\"。\n\n该项目将自身定位为一个视频博主联盟，声称\"摆脱了左翼自由派的谎言，并准备向爱国青年伸出援手\"，为观众提供未经审查的历史政治内容和娱乐内容。该项目的负责人被任命为伊利亚·\"麦迪逊\"达维多夫，他是一名俄罗斯主播、议员，自2020年起成为自由民主党成员。几周之内，令持怀疑态度者惊讶的是，该项目的视频开始在RuTube上人气迅速攀升。并且其中一个幽默视频迅速火遍全网：视频中，维塔利·纳利夫金——现在的身份是\"RPLD代表\"——突袭了乌苏里斯克的一个当地共产主义恐怖分子窝点；而尤里·霍万斯基则宣布，计划拍摄传奇喜剧《替身之船》的完整续集，并免费发布。这个视频的高潮部分是最近由弗拉季斯拉夫·日米列夫斯基和刺猬萨尔马特共同主持的一场直播，并且竟然邀请了弗拉基米尔·日里诺夫斯基作为特邀嘉宾，日里诺夫斯基接受了采访并与众人谈论了自己的日常工作。\n\n该项目还试图进军国际市场，并在YouTube上发布了第一个视频。视频中，Ozon671games在又一次即兴表演中称乔·拜登为了\"老杂种\"而\"打\"了他。但该频道在发布仅几小时后就被封禁，这再次显示了西方平台的双重标准。"
 russiaflavor.53.a: "值得正直之士称道的品格。"
 russiaflavor.54.t: "临别赠言"
 russiaflavor.54.d: "莫斯科的清晨。一个身着黑色大衣的矮个子男人手捧花束，独自缓步穿行在新圣女公墓，不时环顾四周确认杳无人迹。几经辗转后，他终于抵达目的地。躬身靠近纪念碑时，他垂首致意。\n\n\"日安，弗拉基米尔·沃尔福维奇……\"\n\n三米高的青铜纪念碑矗立眼前。花岗岩基座上镌刻着：\"俄罗斯人民敬献最高统治者弗拉基米尔·沃尔福维奇·日里诺夫斯基\"。\n\n将花束安放于碑座前，男人划了三次十字，再度凝视雕像开口：\n\n\"您在那边可好，弗拉基米尔·沃尔福维奇？……但愿比人间温暖些……无妨，我们总能熬过去……\"\n\n只有寂静作答。只有栖在墓旁枝头的孤鸦试图啼鸣。风起云涌间，男人沉重叹息着继续倾诉：\n\n\"还记得选举前我们烙薄饼的情景吗？众人皆笑，但我们赢了……还有全党同去澡堂那次。您在那里畅所欲言，后来我不得不向德国大使致歉。\"一滴泪滑过他的面颊，\"那些岁月啊……我们始终铭记您，弗拉基米尔·沃尔福维奇……虽常感艰难，但我始终遵循您的教诲……\"\n\n蓦然间，他感到有只父亲般厚重的手搭在肩头，仿佛某种无言的慰藉。瓦西里·弗拉索夫在静默中伫立良久，再次向纪念碑鞠躬后，转身走向等候的轿车。\n\n当风声再起时，弗拉索夫恍若听见了那个熟悉的声音……"
 russiaflavor.54.a: "\"祝你好运，瓦西里……\""
 russiaflavor.55.t: "强权"
 russiaflavor.55.d: "安东·阿里哈诺夫的当选显然在俄罗斯网络空间留下了深刻印记。选举结果公布后，最初的愤慨情绪逐渐转变为对总统的积极评价。\n\n以下是来自VKontakte与国有通讯软件MAX平台若干完全真实、绝非机器人编写的评论：\n\n\"阿里哈诺夫就是力量化身！俄罗斯从未有过如此强势的领导人。普京当然伟大，但在阿里哈诺夫面前也相形见绌。我们坚信总统！\"\n\n\"我们总统的决策充满力量！他洞察人民真实需求。驱逐移民，团结国民。强而有力！我从前从不投票，但如今为安东投下一票绝不后悔。强有力的候选人！\"\n\n\"看到欧洲的现状了吗？当食人族在那里肆虐时，我们正受到超级英雄总统的庇护！！！我儿子已加入黄卫兵，我建议所有人都去报名，这是个充满力量的组织！！同性恋欧洲阻挡不了名为俄罗斯的钢铁洪流！\"\n\n\"自由派还没受够教训吗？阿里哈诺夫给了你们雷霆重击。现在像无头老鼠乱窜哈哈，这些小瘪三怎么还在用喷漆涂墙？奄奄一息的纳瓦利内支持者与其软弱同伙就像爷爷的老二一样硬不起来，黄卫兵正强势碾压他们。感谢阿里哈诺夫，你是真男人！充满力量！\"\n\n虽有用户声称这些信息出自\"机器人\"之手，指责其重复使用\"力量\"叙事，但明眼人都清楚这不过是自由派宣传的拙劣把戏。"
 russiaflavor.55.a: "强大。"
 russiaflavor.56.t: "莫斯科陷落"
 russiaflavor.56.d: "经过数日激战，欧洲联军自1812年以来首次重夺莫斯科。最惨烈的战斗发生在市中心，这座首都的历史风貌已遭不可逆转的改变。炮火彻底摧毁了莫斯科大剧院建筑群，圣瓦西里升天大教堂著名的穹顶在遭受航空炸弹直击后坍塌。\n\n据观察者描述，红场及相邻街区已化为废墟。居民区同样损失惨重，城市西部的整片街巷在攻坚战后沦为瓦砾。目前全市实施宵禁，据报多处出现电力中断、通讯故障及食品药品短缺现象。\n\n俄罗斯领导层的命运尚不明确——情报显示政府在城陷前已撤离莫斯科。"
 russiaflavor.56.a: "莫斯科不相信眼泪。"
 russiaflavor.57.t: "另类性取向联盟集会支持阿列克谢·纳瓦利内"
 russiaflavor.57.d: "今日在莫斯科，俄罗斯另类性取向联盟在剧院广场举行大规模集会，既表达对阿列克谢·纳瓦利内总统的支持，也声援俄国在第二次欧陆战争中的行动。参与者们在宣告效忠国家元首方针的同时，强烈谴责欧洲国家的\"LGBT+价值观侵略性宣传\"。\n\n\"我们是爱国者，支持纳瓦利内总统为捍卫俄罗斯主权而战，\"该联盟领袖米哈伊尔·拉科夫宣称，\"但发动战争的欧洲正企图将激进观念强加于我们，意图摧毁我们的国家。我们绝不答应！\"\n\n集会以\"军队与总统是我们的坚盾！\"及\"欧洲灭亡，荣耀属于俄罗斯！\"为口号。尽管措辞激进，活动全程保持和平。这场集会在社交媒体引发论战：部分人赞誉联盟展现了\"爱国精神\"，另一些人则指责其奉行\"双重标准\"。\n\n欧洲方面反应激烈——德国外交部斥责该集会\"企图在主权旗帜下合法化恐同行为\"。克里姆林宫尚未置评，但专家认为该联盟的立场可能属于巩固社会团结的新国家战略组成部分。"
 russiaflavor.57.a: "嘶，至少他们支持俄罗斯?……"
 russiaflavor.58.t: "黑名单"
 russiaflavor.58.d: "俄罗斯新上台的强权主义政权让政治反对派闻风丧胆，迫使他们彻底转入了地下——从自由派到左翼人士，人人都不得不东躲西藏。\n人民俄罗斯的‘领袖’们，不久前还围坐着7人，如今桌边只剩下了5位。谢尔盖·米罗诺夫和扎哈尔·普里列平已经被新当局的口号所蛊惑，转而倒戈，令左翼反对派的处境岌岌可危。\n留下的都是熟面孔：德利亚金、格鲁季宁、科诺瓦洛夫、普拉托什金，而坐在他们上首的，是谢尔盖·乌达利佐夫——一位从普京时代起就投身抗争的、老练的左翼反对派人士。\n乌达利佐夫开口了：\"同志们，我们真正的至暗时刻已经到来了。米罗诺夫和普里列平背弃了我们，同阿里哈诺夫和他那帮强权派一道加入了‘左翼爱国者’的行列。如今，我们的左翼反对力量应当化整为零，以便分散领导我们各自的基层组织。目前来看，我瞧不见还有别的出路。\"\n另外四人同意了这项决定；他们已经别无选择……\n至少，对他们来说是如此……"
 russiaflavor.58.a: "死神来了。"
 russiaflavor.59.t: "别无选择"
 russiaflavor.59.d: "安东·阿里哈诺夫端坐于克里姆林宫办公室内，两名黄卫兵保镖肃立门外。国家杜马人民派议员米哈伊尔·德利亚金此时走近办公室，经保镖搜身后在随行下进入室内。\n\"啊，米哈伊尔·德利亚金，请坐！\"阿里哈诺夫对进来的议员示意办公桌对面的座椅。\n德利亚金落座时，总统保镖悄然立于其身后。\n\"为何传唤我来？\"德利亚金向总统发问。\n\"德利亚金先生，我清楚你在人民俄罗斯中的角色。也获悉你与左翼反对派余党会面。\"阿里哈诺夫对议员回应道。\n\"那是合——\"德利亚金试图辩解。\n\"在此地否认毫无意义。\"总统打断对话。\n短暂静默后，阿里哈诺夫继续道：\"我认为你是真正有价值的人才。希望你改变对我与支持者的立场，共同为俄罗斯利益效力。离开乌达利佐夫那些革命派同僚吧，你与他们本质不同。\"\n片刻停顿间，德利亚金意识到己无筹码，最终回应：\"是的，总统先生……您说得对……我确实与他们不同……俄罗斯正面临西欧的新威胁……我同意为您和您的支持者效力，共谋俄罗斯福祉。\"\n阿里哈诺夫为这个决定抚掌称善，双方握手后，德利亚金在护送下离开办公室，乘车返回国家杜马机构。"
 russiaflavor.59.a: "死神宽恕了他。"
 russiaflavor.60.t: "致命资产"
 russiaflavor.60.d: "深夜的列宁国营农场外，帕维尔·格鲁季宁在弗拉基米尔·伊里奇雕像前驻足。\n\"但愿我们很快能继续您的事业……\"格鲁季宁轻声自语。\n静立片刻后，他走向街边座驾。车旁影影绰绰立着个穿制服的交通警察。格鲁季宁缓步靠近车辆。\n\"晚上好！我是交警中士切尔内绍夫·格季明·叶夫根尼耶维奇，请出示证件。\"警官左手亮出证件，右手握着警棍。\n格鲁季宁翻找衣袋，取出护照和车钥匙。\n\"我违反了什么规定吗，长官？\"他调侃道。\n\"刚才有人围着您的车转悠，还打开了车门。\"格季明答道。\n格鲁季宁立即警觉，重新拉开车门坐进驾驶座。就在他检查车内时，格季明不假思索地从背心口袋掏出马卡洛夫手枪，保险早已打开。\n\"总统向您致意。\"格季明说道。\n套筒滑动的声响中，格鲁季宁猛然回头。枪声炸裂。\n拂晓时分，列宁国营农场周边架起路障，救护车与侦查委员会的卡车齐聚……帕维尔·格鲁季宁被发现在自己的座驾中弹身亡。"
 russiaflavor.60.a: "死神挥下了镰刀。"
 russiaflavor.61.t: "最后会面"
 russiaflavor.61.d: "前哈卡斯共和国首脑瓦连京·科诺瓦洛夫穿行于暮色中的辛菲罗波尔。莫斯科会议后，他试图重整生活并在克里米亚半岛协调反对派事务。\n科诺瓦洛夫停步取出香烟与打火机。正当点火时，附近的黄卫兵小队将他误认作醉汉。\n“喂！这里禁止吸烟！”率先冲来的黄卫兵喝道。\n科诺瓦洛夫抬头望去，只见七名同样装束的黄卫兵队员正列队而立。\n第三名队员从口袋抽出科诺瓦洛夫在“强权俄罗斯”组织中的定向培训资料向同僚展示。\n科诺瓦洛夫尚未反应过来，对方却已通过驻足吸烟这般荒唐琐事认出了他。\n黄卫兵队员迅速围上前，戴上蒙面巾开始围殴。\n“处死叛徒！”“消灭共匪！”“真正俄罗斯必胜！”小队成员齐声高呼。\n持续十五分钟的暴行后，科诺瓦洛夫倒卧在地，面目全非。次日清晨，他的遗体在灌木丛中被发现。"
 russiaflavor.61.a: "死神也带走了他。"
 russiaflavor.62.t: "教科书般的谋杀"
 russiaflavor.62.d: "尼古拉·普拉托什金深夜戴着莫斯科国际关系学院的帽子，右手端着咖啡杯，左手提着公文包，沿维尔纳茨基大街行走。尽管身为\"人民俄罗斯\"组织政治活动家，他仍在莫国关维持教职。\n街道异常寂静，令人窒息的恐惧氛围弥漫空中。黄卫兵小队也在街头巡逻，协助执法部门维持秩序。\n普拉托什金转进十月五十周年公园的主步道，隐匿于最近的长椅后方。他明白强权主义支持者带来的危险，不愿在长椅上引人注目。\n正沉默啜饮咖啡时，灌木丛的异响令他警觉。他放下公文包饮尽咖啡，将空杯置于公文包旁。\n普拉托什金谨慎地靠近灌木查探——意外发现竟是只流浪的德国牧羊犬。\n他松了口气走向树丛，此时全身黑衣手持消防斧的袭击者已悄然逼近。\n普拉托什金仍震惊于流浪犬的来历——身后微响伴着斧刃破空，他的头颅在血光中迸裂。\n翌日清晨，灌木丛中发现普拉托什金的遗体，头骨被劈成两半的尸身上仍嵌着那柄消防斧，现场未提取到任何指纹。"
 russiaflavor.62.a: "还剩一个。"
 russiaflavor.63.t: "最后的机会"
 russiaflavor.63.d: "谢尔盖·乌达利佐夫在黑暗中醒来，发现自己头罩布袋、双手反绑坐在椅子上，身处某个潮湿的房间。四名身着标准黄色制服的黄卫兵伫立室内。\n\"我他妈在哪儿……\"乌达利佐夫开口。\n这时，一名穿西装的男子走进房间。布袋被扯下的刹那，乌达利佐夫看见对面坐着戴黑色幸福面具的男人。\n\"向你致意，未竟的革命者。命运给了你机会。\"来人说着从口袋掏出一把RSA左轮手枪，\"我们来玩俄罗斯轮盘赌，但绝不转动弹巢——停在何处，就从何处开始，这才是命运真实的裁决。\"\n就在两名警卫解绑绳索时，乌达利佐夫只是死死瞪着对方。面具男子检查完唯一那颗子弹后转动弹巢，将旋转的手枪拍在桌上，枪口正对自己。\n他抵住太阳穴扣动扳机——空膛。轮到乌达利佐夫，同样空膛。面具男子再次抵住太阳穴击发——仍然空膛。乌达利佐夫接枪，依旧空膛。\n\"乌达利佐夫先生，现在只剩二分之一的概率。命运即将对俄罗斯作出最终裁决——是迎来伟大的强权重生，还是再度陷入你们所谓左翼民主的混乱。\"面具男子说道。\n\"走着瞧。\"乌达利佐夫反唇相讥。\n面具男子将枪口抵住太阳穴……扣动扳机……未击发……\n乌达利佐夫身后的两名警卫立即掏出马卡洛夫手枪，枪口瞄准其头颅以防他试图\"逞英雄\"。\n乌达利佐夫接过左轮手枪，将枪管朝上塞进口腔……扳机扣下……枪声炸响。鲜血从他头颅喷涌而出，混着脑浆在天花板溅开猩红浆液。躯体随着椅子翻倒重重砸向地面。\n谢尔盖·乌达利佐夫最终被发现暴毙身亡，而\"自杀\"被宣告为官方定论。"
 russiaflavor.63.a: "命运使然，死神带走了最后一人。"
 russiaflavor.64.t: "博物馆化的历史"
 russiaflavor.64.d: "俄罗斯联邦总统安东·安德烈耶维奇·阿里哈诺夫公布了一项名为\"历史客观性\"的纲领，按照该纲领，莫斯科市内不必要的斯大林半身像将被拆除，列宁的遗体亦将重新安葬。陵墓本体则计划改建为\"国家历史博物馆：苏维埃世纪\"，旨在引领参观者们回顾1917年至1991年间，苏维埃治下俄罗斯的重大历史事件。\n声明甫一发布，列宁墓外便立刻集结了数量多得异乎寻常的国家近卫军；他们的任务是保卫负责转运列宁遗体和改建陵墓的工人。与此同时，在莫斯科全城，凡是安放斯大林半身像的地点，也都有国家近卫军与工人的身影。但有几处例外：二战博物馆中的那尊半身像、克里姆林宫红墙下名人墓地处的那尊，以及全俄展览中心的三巨头领袖纪念碑。\n短短几小时内，列宁的遗体便被运抵故乡乌里扬诺夫斯克安葬在老城公墓；莫斯科的斯大林半身像也均被拆除。就在列宁墓的原址上，国家历史博物馆的建设工程拉开了序幕……"
 russiaflavor.64.a: "前进，俄罗斯！"
 russiaflavor.65.t: "民族主义大串联"
 russiaflavor.65.d: "由安东·阿里哈诺夫领导的保卫人民与国家联盟宣布同阿列克谢·朱拉夫廖夫的\"祖国\"达成了一项联盟协议。在联合声明中，阿里哈诺夫和朱拉夫廖夫强调：\"此举旨在将所有民族主义者团结在共同的旗帜之下，为了民族与祖国的福祉，也为了俄罗斯新政府的稳定。\"\n\"俄罗斯社区\"、\"北方人\"以及\"四十个四十\"公共运动等组织亦宣布支持这个民族主义政府，此外，\"俄罗斯社区\"领袖安德烈·特卡丘克特别强调：\"祖国正逢危难，团结势在必行。当下，以欧盟联邦化为形式的激进反俄新势力正在欧洲大陆西部悄然成型，而这股势力同样也威胁着我们的东方盟友。\"\n已故康斯坦丁·克雷洛夫所属的民族民主党宣布将并入保卫人民与国家联盟，该党强调：\"为了祖国的共同利益，所有民族主义力量眼下都必须团结在新政府的周围。保卫人民与国家联盟正在兑现其建立俄罗斯秩序的承诺，而他们需要我们在这方面助一臂之力。\""
 russiaflavor.65.a: "俄族力量为俄国！"
 russiaflavor.66.t: "稳定缔造者"
 russiaflavor.66.d: "安东·阿里哈诺夫坐在他克里姆林宫的办公室里，一边翻阅着成堆的文书，一边浏览着电脑上的文件。没错，尽管推行了改革，但面临的难题并未因此减少。可阿里哈诺夫依旧殚精竭虑，依旧致力于实现强权主义的理念和稳固的社会契约，并试图为俄罗斯的新时代熔铸出一条新路。\n阿里哈诺夫停下了手中的活，把桌上的文件拨到一旁，决定休息五分钟。他通过电话知会了安保人员。两分钟后，一杯热气腾腾的绿茶被送进办公室；警卫随之离开。阿里哈诺夫小口啜饮着绿茶，渐渐陷入了沉思。\n\"还在为新时代辛苦操劳吗？\"——一个阿里哈诺夫熟悉的声音响了起来。\n阿里哈诺夫抬起头，看见康斯坦丁·阿纳托利耶维奇·克雷洛夫正站在他面前——那是他的政治偶像，早在他担任加里宁格勒州长时，克雷洛夫便创立了民族民主党。安东心里明白，克雷洛夫只是自己的幻觉。但闲着也是闲着，能打破眼下的沉闷，哪怕只是和幻觉说说话，似乎也没什么不好……\n\"是啊……能见到您，真是没想到。不过，这似乎也只是早晚的事。我当然在工作，康斯坦丁·阿纳托利耶维奇……\"——阿里哈诺夫答道。\n\"我看得出来。\"——克雷洛夫微笑着。\"回答我……你是否有信心，维护住俄罗斯的国家根基？\"——克雷洛夫问道。\n\"我无比自信。否则，当年我因为批评梅德韦杰夫的自由派改革而被统一俄罗斯党开除时，我就不会选择重返政坛了。\"\n\"原来是这样……看来德米特里还是老样子，这小子……唉，没什么。继续努力吧，阿里汗诺夫。记住最重要的一点——我相信你！\"——克雷洛夫说着，象征性地举起了右拳。\n阿里哈诺夫将目光垂回桌面，落在那只已经空了的绿茶杯上。他继续埋头工作，仿佛什么也未曾发生过。"
 russiaflavor.66.a: "一切为了俄罗斯……"
 russiaflavor.67.t: "牢不可破的俄罗斯"
 russiaflavor.67.d: "雅罗斯拉夫是来自辛菲罗波尔的\"保卫人民与国家联盟\"组织青年活动家，年仅二十二岁的他仿佛受到命运指引般加入了黄卫兵。这个虔诚的教徒每日都会前往亚历山大·涅夫斯基大教堂参加礼拜。\n阿里哈诺夫掌权以来，教会与新当局的关系显著改善。这是个寻常的早晨，雅罗斯拉夫如常前来聆听神父的晨间布道——这场以信众为俄罗斯联邦总统安东·安德烈耶维奇·阿里哈诺夫健康祈福为开端的例行仪式。雅罗斯拉夫随着众人为总统祷告后，开始专注聆听神父宣讲。\n\"圣灵是合一的灵。十七世纪混乱时期结束后，人民与教会因信仰团结——最终拯救了国家。如今当世界试图用制裁、谎言与诱惑分裂我们时，必须牢记：我们的力量源于对上帝、天国君主与尘世祖国的忠诚。\"神父稍作停顿。\n\"俄罗斯国徽上的骑士屠龙并非偶然。这不仅是胜利者圣乔治，更是基督战胜邪恶的象征。由此——我们的人民蒙召成为光明战士。\"神父结束这段布道时，雅罗斯拉夫既思索着俄罗斯的命运与其在世界上的重建，也仍在专注聆听。\n\"弟兄姐妹们！俄罗斯不只是一个国家。她是至圣上帝之母的居所，亲自以护佑覆盖的堡垒。这是任何力量都无法击溃的精神要塞。让创世之初运行在水面上的圣灵荫蔽这片土地，使我们能宣告：‘我们是俄罗斯人。上帝与我们同在！’\"\n\"阿门！\"神父的祝祷响彻教堂，雅罗斯拉夫与信众齐声应和着神父的呼唤......"
 russiaflavor.67.a: "\"阿门！\""
 russiaflavor.68.t: "主权垂直关系"
 russiaflavor.68.d: "安东·阿里哈诺夫正在他的政治故土——加里宁格勒，向市民发表又一场协调好的民众演说。他在狂热效忠的黄卫兵以及克里姆林宫记者团的摄像机镜头簇拥下，与当地居民交谈。过了一会儿，一位装着假肢、右肩上贴着俄罗斯帝国国旗臂章的市民走近了阿里哈诺夫——他曾是特别军事行动的一名老兵，而那场行动早已演变为席卷东欧的战争，沦为与全球主义者鏖战的沙场。\n\"安东·安德烈耶维奇，真的是您吗！？\"——老兵欣喜地喊道，气息都有些不稳。\n\"当然是我。我看您……是上次那场战争的老兵？\"——阿里哈诺夫回应道。\n\"是的！我是老兵；在利沃夫附近丢了这条腿——该死的班德拉分子给我们设下了埋伏，而我……我是唯一的幸存者，后来又加入了攻入利沃夫的部队；我亲手参与了摧毁那个斯捷潘·班德拉的纪念碑！\"——老兵说着，掏出了自己的护照，里面还夹着几张照片，照片上是他和俄军士兵们一同摧毁那座乌克兰纳粹班德拉纪念碑的景象。\n阿里哈诺夫仔细查看了老兵的照片，立刻确认了照片的真实性。总统紧紧握住了老兵的手，阿里哈诺夫安保团队中的其他黄卫兵成员也纷纷效仿。总统本人还在老兵的护照上留下了签名。\n这一切结束后，摄像机关闭，人群渐渐散去。老兵也自行离开了。阿里哈诺夫则转向记者们，用一种只对他们说的口吻讲道：\"好了，女士们先生们，到此为止……几小时后我将返回克里姆林宫，大家都可以自由活动了……我必须郑重感谢你们为祖国所做的贡献。\"\n阿里哈诺夫带头为记者们鼓掌，黄卫兵们也紧跟着鼓起掌来。\n随后，阿里哈诺夫的私人座驾缓缓驶来，黄卫兵成员为他拉开了车门。就在这时，阿里哈诺夫口袋里的手机振动起来；他瞥了一眼熟悉的联系人，接通了电话，只简单地答复了一个词，便俯身钻进了车里……"
 russiaflavor.68.a: "\"喂？\""
 russiaflavor.69.t: "思想战线行动"
 russiaflavor.69.d: "米哈伊尔曾是全俄人民阵线自由派的一名普通活动家。他起初与鲍里斯·纳杰日丁的圈子共事，但在后者被免去俄联邦总统职务后，米哈伊尔便转而在达里娅·别谢金娜的领导下，成为了全俄人民阵线内部的一名反对派活动人士。\n即使在费奥多罗夫及其民族解放运动的支持者夺取政权一段时间内，自由派依旧沿用着他们的老一套方式进行抵抗。还是那些毫无用处的和平抗议，妄图吸引国际社会的关注，然而，那份关注早已失去了所谓的国际性。\n别谢金娜宣布，定于下午四点，在莫斯科的国家杜马大楼前举行抗议。米哈伊尔在尼基茨卡亚大街召集了他的人马；他们一同向国家杜马大楼进发。但他们却遭遇了一场来自民族解放运动的反抗议伏击，并将米哈伊尔和他的一行人团团围住。\n在米哈伊尔失去意识前，他最后的记忆是：溅入眼中的绿色颜料，一面民族解放运动的旗帜正与俄罗斯三色旗并排，在风中招展，以及后脑勺上挨的那一记沉重的铲柄。"
 russiaflavor.69.a: "民族解放运动亮出了他们的底牌。"
 russiaflavor.70.t: "祖国勋章"
 russiaflavor.70.d: "来自全俄人民阵线的民族解放运动支持者们，连同阵线内的其他代表提议，授予俄罗斯联邦新总统叶夫根尼·阿列克谢耶维奇·费奥多罗夫特别权力。他们提出的理由是：“全球主义者的深层政府正试图摧毁俄罗斯及其全球影响力，而他们的抵抗正日益加剧。俄罗斯既已领导了反全球主义运动，便势必将其残余势力——即欧盟——置于瞄准镜之下。”\n数小时后，俄联邦总统叶夫根尼·阿列克谢耶维奇·费奥多罗夫做出了回应。他同意接受国家赋予他的特别权力，并宣称这是“以拯救俄罗斯、捍卫俄罗斯世界、以及保卫普京的遗产！”在国家杜马，该提案以多数票获得通过。尽管全俄人民阵线中的自由派分子试图投下反对票，但该决议在仍联邦委员会获得了一致通过，很显然，因为“自由派全球主义深层政府的代理人”还未能渗透到那里。"
 russiaflavor.70.a: "让我们碾碎全球主义的害虫！"
 russiaflavor.71.t: "动员媒体"
 russiaflavor.71.d: "马克西姆是莫斯科一名普通的上班族。他工作勤恳，大体上支持当局。他所在的办公室也毫不含糊——在那场由特别军事行动演变为欧陆战争的期间，他们用各种\"人道主义援助\"支援着前线的士兵。\n休息日的下午，马克西姆醒了过来。他立刻从桌上抓起手机，点开了Telegram……Telegram频道早已成了新的媒体，而眼下正是其登峰造极的时刻——铺天盖地的新闻全是关于新任俄联邦总统叶夫根尼·费奥多罗夫的法令、深层政府的终结、欧洲匪徒面临审判，以及无政府主义者企图在波多利斯克某地纵火焚烧地方行政大楼……\n\n但马克西姆只为自己点开了波兹尼亚科夫的帖子，因为他一向最常看的就是波兹尼亚科夫的消息……\n\n\"嗯，总算，总算有点像样的了！\"——马克西姆充满爱国热情地大声说道。"
 russiaflavor.71.a: "现在有特别新闻。"
 russiaflavor.72.t: "他的帝国"
 russiaflavor.72.d: "帖木儿是奥列霍沃-祖耶沃的一名普通警局上尉。尽管顶着个上尉的头衔，他的工作却相当按部就班——酒鬼、吵闹的青年、磕了药的瘾君子，还有形形色色的精神病患，就是他日常打交道的对象。\n这天夜班，调度中心接到一通关于邻居扰民的电话，帖木儿便和他的搭档——高级中尉阿尔乔姆——一同被派了过去。\n抵达单元门后，他们开始敲响那间被投诉扰民的公寓房门，并按着门铃。几分钟后，一个退休老人打开了门——大约七十来岁，穿着一件海魂衫，以及……一条圣乔治丝带配色的裤子。老人的头发看起来足足有一周没洗了。他身上既散发着宿醉的酸臭，又带着刚喝下去的酒气。\n\"您好，我是帖木儿·阿纳托利耶维奇·雷库诺夫上尉。有邻居投诉您，说您制造噪音，吵得他们无法睡觉。我们能进去和您谈谈具体情况吗？\"——帖木儿说道，阿尔乔姆就站在他身后。\n老人打了个嗝，随即点了点头，比了个手势请他们进屋。\n\n当帖木儿和阿尔乔姆迈过公寓门槛时，他们踩到了一块蹭鞋垫，垫子的图案赫然是……欧盟旗帜。帖木儿和阿尔乔姆交换了一下眼色，接着两人都盯住了那老人。他们一同走进厨房；只见桌上摆着五个普京卡牌伏特加的酒瓶，全都空了，而厨房的墙上则挂着一面民族解放运动的旗帜。帖木儿对此当然不感到意外，阿尔乔姆也一样。\n经过简短的交谈并做完笔录后，帖木儿和阿尔乔姆从桌边站起身，向老人告辞。在离开公寓前，帖木儿瞥见了老人的卧室。床垫上印着普京，枕头上也是普京，墙上则贴满了普京的照片和俄罗斯三色旗。在卧室入口旁，摆着一个带镜子的床头柜，上面放着几根未点燃的蜡烛，蜡烛前则是一个相框，框里是普京的照片，照片上还带着Z和V两个字母……\n“真是个彻头彻尾的狂热分子……”——当两人离开老人的公寓时，帖木儿对阿尔乔姆说。\n“所见略同。”——阿尔乔姆回应道。"
 russiaflavor.72.a: "小孩疼了喊妈，大人疼了想他……"
 russiaflavor.73.t: "费奥多罗夫的宪法改革"
 russiaflavor.73.d: "俄罗斯联邦总统叶夫根尼·阿列克谢耶维奇·费奥多罗夫在俄联邦国家杜马、联邦委员会以及全俄人民阵线的鼎力支持下，推行了一场宪法改革。尽管残余的自由派势力曾试图抵抗，但这些势力的支持者很快就在全俄人民阵线内部遭到了\"平息\"，甚至被直接驱逐了出去。\n此次宪法改革主要触及了关于俄罗斯国家主权的表述，废除了\"国家意识形态禁令\"（即第13.2条），并将\"公认的国际法原则和规范\"从国家法律体系中剔除（即废除第15.4条）。\n这些举措表明，俄联邦新总统及其政府支持者们决心恢复俄罗斯联邦在全球的影响力，并建立起真正的俄罗斯世界。"
 russiaflavor.73.a: "ZOV！"
 russiaflavor.74.t: "全国支持俄罗斯世界运动"
 russiaflavor.74.d: "加利娅是一位年过七十七的普通退休老人。尽管年事已高，她却依然是民族解放运动的一名积极参与者。她坐在公寓的厨房里，决定打开电视。她换到了第一频道，上面正播放着新闻。\n“现在播报来自莫斯科的新闻……”——电视里传来了叶卡捷琳娜·安德烈耶娃熟悉的声音。加利娅一边喝着茶、吃着饼干，一边津津有味地听着。\n“现任俄罗斯联邦总统叶夫根尼·阿列克谢耶维奇·费奥多罗夫所领导的民族解放运动，正在莫斯科全城举行示威活动。示威的主旨是呼吁保护俄罗斯世界。我们的记者康斯坦丁·帕纽什金采访了示威者。”——叶卡捷琳娜·安德烈耶娃播报道。\n（电视画面切换）\n\n“现任俄罗斯联邦总统叶夫根尼·阿列克谢耶维奇·费奥多罗夫所属的组织——民族解放运动，正在莫斯科举行大规模示威。示威者们正积极呼吁，要保护俄罗斯世界免受来自欧盟的全球主义威胁。”——康斯坦丁·帕纽什金开始报道。\n“我们的目标是，作为总统支持者中的普通公民，向叶夫根尼·阿列克谢耶维奇·费奥多罗夫总统传达我们的立场——我们希望俄罗斯世界免受全球主义威胁，我们要求恢复1945年的边界，这一切都是为了俄罗斯世界！”——在前德意志联邦共和国大使馆（即现在的欧盟使馆）附近，一位年轻的示威者对着康斯坦丁·帕纽什金的麦克风说道。\n“欧盟外交部评论称，这些示威活动是彻头彻尾的反欧行为。如果俄罗斯当局不采取任何措施保护欧盟大使馆，欧盟将立刻实施制裁。但令他们遗憾的是，这些制裁将毫无作用，就像西方所有其他老掉牙的反俄制裁一样。第一频道，康斯坦丁·帕纽什金报道。”——记者结束了他的报道。\n加利娅关掉了电视，喝完了茶，也吃完了饼干。她迅速穿好衣服，走出家门，上街去和她的民族解放运动支持者们会合了。"
 russiaflavor.74.a: "为了俄罗斯世界！"
 russiaflavor.75.t: "揭露丑闻"
 russiaflavor.75.d: "俄罗斯联邦武装部队成功进驻伦敦并占领盎格鲁-撒克逊秘密情报机构军情六处总部。英勇的俄军士兵挫败了仍效忠于“深层政府”的特工企图引爆建筑物的计划，彻底搜查军情六处中央办公室全部档案，发现诸多印证民族解放运动及俄联邦总统叶夫根尼·阿列克谢耶维奇·费奥多罗夫“阴谋论”的关键文件。\n\n文件部分内容摘录：\n\n1.苏联解体后的俄罗斯已成为美利坚合众国的完全殖民地。在弗拉基米尔·普京执政前，俄罗斯始终被西方精英全面操控。部分曾\"管理\"俄罗斯的势力包括：“世界经济论坛”主席克劳斯·施瓦布、所谓“独立媒体”彭博社创始人，美国商人迈克尔·布隆伯格、以及在其纽约私人岛屿组织大规模恋童癖派对的美国金融家杰弗里·爱泼斯坦。\n\n2.美国精英阶层并未因第二次内战爆发而消失。相反，他们趁全球动荡将资本转移至更靠近布鲁塞尔的欧洲地区，由此引发的世界经济危机正是美国内战的后续效应。\n\n3.弗拉基米尔·普京因新冠去世后，胜选的梅德韦杰夫在俄罗斯社会支持下全力对抗西方，最终巩固全俄人民阵线势力。西方精英对此极度恐慌，开始筹备对俄战争，虽以俄罗斯胜利告终，但潜伏在梅德韦杰夫身边的军情六处特工通过全俄人民阵线推动纳杰日丁成为继任者。\n\n这些文件将在不久后向全世界公布。"
 russiaflavor.75.a: "真相……？"
 russiaflavor.76.t: "秘密揭露"
 russiaflavor.76.d: "英国首相奈杰尔·法拉奇向俄罗斯对外情报局及俄联邦总统叶夫根尼·阿列克谢耶维奇·费奥多罗夫通报，英国拟将移交军情六处机密文件，以揭露该国流亡精英阶层的幕后真相——这些精英在奈杰尔赢得小型内战胜利后逃往布鲁塞尔。\n\n文件部分内容摘录：\n\n1.苏联解体后的俄罗斯已成为美利坚合众国的完全殖民地。在弗拉基米尔·普京执政前，俄罗斯始终被西方精英全面操控。部分曾“管理”俄罗斯的势力包括：\"世界经济论坛\"主席克劳斯·施瓦布、所谓\"独立媒体\"彭博社创始人，美国商人迈克尔·布隆伯格、以及组织未成年\"性奴\"派对的国际级恋童癖者——美国金融家杰弗里·爱泼斯坦，此类聚会多有各国精英参与。\n\n2.美国内战的爆发令西方精英阶层措手不及，他们未曾预料民众会反抗精英统治的恶果。西方精英被迫紧急将资本从美国撤离，直接转移至\"深层政府\"新据点布鲁塞尔。\n\n3.普京因新冠去世后，继任者德米特里·梅德韦杰夫的反精英、反全球化言论令西方精英深感恐慌。凭借安插在梅德韦杰夫身边的\"深层政府\"特工周旋，他们才得以维持对俄控制。而梅德韦杰夫的继承者鲍里斯·纳杰日丁，最终被全俄人民阵线中的民族解放运动支持者联合罢黜。\n\n据悉，这批机密文件将于近期向公众正式披露。"
 russiaflavor.76.a: "阴谋照进现实……"
 russiaflavor.77.t: "历史的终结？"
 russiaflavor.77.d: "叶夫根尼·费多罗夫与秘书坐在克里姆林宫办公室里。英国军情六处情报文件的纸质副本刚被送到他手中。费多罗夫不紧不慢地一页页翻阅文件，若有所思地记录着所有令他感兴趣的内容——他追寻的是真相，渴望印证自己先前对西方精英阴谋的猜测。\n\"开始看吧！\"——费多罗夫在脑海中默念。\n\"普京始终与西方保持联系，并未刻意推动激进对抗，而乌克兰在克里米亚回归后注定面临俄罗斯的攻势——以解放这个国家，收复新俄罗斯领土为目的。后者因亲西方势力夺权而将其视为国家工程......\"——费多罗夫默想着翻至文件末尾。\n\"奇怪……我和支持者所提及的细节在这没写明白……或许具体环节有误，但本质上我们还是判断对了的……得稍作修正后向公众呈现真相。毕竟现在不会有重要人物否认，即便有，人们也不会信。\"——想到这里，费多罗夫因获悉真相而如释重负，浑身泛起鸡皮疙瘩。\n\"这些文件需要修正——必须明确指出深层集团确实掌控着俄罗斯，直到美国第二次内战爆发。别忘了提及纳杰日丁也是该集团的某种代理人。\"费多罗夫向秘书斩钉截铁地指示道。\n秘书默然颔首，离开办公室，开始通过层级体系向下属传达长官的指令。"
 russiaflavor.77.a: "我想这就是结局了……"
 russiaflavor.78.t: "俄罗斯君主制复辟！"
 russiaflavor.78.d: "鉴于俄罗斯在欧陆战争中取得了压倒性的胜利，加之领袖弗拉基米尔·日里诺夫斯基辞世，一个迫切的问题摆在了台面上：俄罗斯接下来该何去何从？在很短的时间内，近四个世纪以来闻所未闻的缙绅会议得以召开。会上决定，结束摄政状态，并将\"全俄罗斯皇帝与专制君主\"的头衔授予格奥尔基·米哈伊洛维奇·罗曼诺夫。\n\n格奥尔基·米哈伊洛维奇·罗曼诺夫采用了\"格奥尔基一世\"的名号。格奥尔基本人是一位独特的人物，不仅因为他是罗曼诺夫家族的成员，更因为他的父系血脉中流淌着霍亨索伦家族的血液——德意志帝国的末代皇帝威廉二世，正是出身于该家族。\n\n格奥尔基一世在他的演说中宣告：\"俄罗斯的末代君主尼古拉二世犯下了诸多错误；现在，是时候回归亚历山大三世的政治遗产了——那才是一位真正的俄罗斯沙皇！我们将进一步复兴俄罗斯的传统；我们决不能任由自己被欧洲的新布尔什维克势力所摧毁！\"\n\n演说过后，在场之人无不确信——格奥尔基一世并不推崇尼古拉二世的《十月宣言》，他实则是亚历山大三世的传统与思想的继承者。俄罗斯正等待着其专制君主制的回归。"
 russiaflavor.78.a: "他们真的让时光倒流了……"
 russiaflavor.79.t: "俄罗斯君主制复辟！"
 russiaflavor.79.d: "鉴于俄罗斯在欧陆战争中取得了压倒性的胜利，加之领袖弗拉基米尔·日里诺夫斯基辞世，一个迫切的问题摆在了台面上：俄罗斯接下来该何去何从？在很短的时间内，近四个世纪以来闻所未闻的缙绅会议得以召开。会上决定，结束摄政状态，并将\"全俄罗斯皇帝与专制君主\"的头衔授予罗斯季斯拉夫·罗斯季斯拉沃维奇·罗曼诺夫。\n\n罗斯季斯拉夫·罗斯季斯拉沃维奇·罗曼诺夫承袭\"罗斯季斯拉夫一世\"之名继位。这位在缙绅会议前终日与画架为伴、徜徉于田野的新帝，在登基宣言中掷地有声：\"尼古拉二世颁布《十月宣言》的初衷值得肯定。罗曼诺夫家族不再会置身于人民之外，我们将与你们同在，让国家杜马重归俄罗斯！至于当今欧洲——我在此正告：绝不会给你们任何复仇之机，若执意妄为——结局必不利于尔等；俄罗斯再不会向疯狂的左翼分子及布尔什维克继承者屈膝。\"\n\n这番演讲之后，无人再怀疑罗斯季斯拉夫一世是登基的新改革者，他意图恢复尼古拉二世曾许诺却未能妥善兑现的俄罗斯人民权利。"
 russiaflavor.79.a: "1905的十月精神将重焕生机。"
 russiaflavor.80.t: "俄罗斯君主制复辟！"
 russiaflavor.80.d: "鉴于俄罗斯在欧陆战争中取得了压倒性的胜利，加之领袖弗拉基米尔·日里诺夫斯基辞世，一个迫切的问题摆在了台面上：俄罗斯接下来该何去何从？在很短的时间内，近四个世纪以来闻所未闻的缙绅会议得以召开。会上决定，结束摄政状态，并将\"全俄罗斯皇帝与专制君主\"的头衔授予加夫里尔·叶夫根尼耶维奇·多罗辛。\n\n加夫里尔·叶夫根耶维奇·多罗申以\"尼古拉三世\"之名登基称帝。这位新帝在缙绅会议前已因志愿兵身份在军中广受爱戴——其父系血脉承袭自末代沙皇尼古拉二世，母系则源自拿破仑一世妻子约瑟芬·博阿尔内。尼古拉三世在宣誓演讲中宣告：\"我们已击败并彻底粉碎欧洲巨兽。我深知随着新布尔什维克思潮在他们中间滋生，他们必将图谋复仇，我们必须严阵以待。我曾与士兵们并肩作战，绝不容许帝国蒙羞！\"\n\n演讲结束后，俄罗斯前路依旧迷雾重重——新沙皇未涉及国内局势，令人无从判断将走向专制统治还是恢复其先祖尼古拉二世《十月宣言》的宪政传统。但有一点所有人都心知肚明：军人出身的尼古拉三世，绝不会让新的红色巨兽侵犯俄罗斯。"
 russiaflavor.80.a: "一名士兵登上了王位。"
 russiaflavor.81.t: "梅德韦杰夫向全国发表讲话"
 russiaflavor.81.d: "俄罗斯联邦总统就近期俄波边境事件向全国发表讲话。梅德韦杰夫指出，波兰与北大西洋公约组织代表已作出选择，他们草率认定俄罗斯为边境交火事件的策划者，进而援引北大西洋公约第五条集体防御条款，以挑起对俄战争。\n\n梅德韦杰夫同时宣称：\"尽管欧洲的布鲁塞尔走狗借东欧之手发动战争，俄罗斯绝不会对兄弟民族使用核武器，必将帮助他们摆脱布鲁塞尔的压迫。真理与我们同在，而胜利终属真理。\"\n\n此次演讲引发民众强烈共鸣，面对自1941年以来前所未有的现实威胁，征兵站外排起长龙，亲政府活动人士与爱国民众纷纷盛赞德米特里·阿纳托利耶维奇临危不惧，号召俄罗斯奋起抗敌的坚定立场。"
 russiaflavor.81.a: "荣耀属于俄罗斯！"
 russiaflavor.82.t: "新宣泄"
 russiaflavor.82.d: "摄像机已开启约十五秒，马克西姆却始终未能吐露只字。今天视频的主题既荒诞又在意料之中，这种矛盾感让他喉头更似堵了团棉絮。但他终究无法回避这个话题。抿了口水，他轻咳两声终于开口：\n\n\"请设想这样的情境——你生活在俄罗斯。多么奇妙的处境啊，不是吗？根据频道数据统计，在座诸位对此再熟悉不过。表面上看，新政府突然赐予了我们曾在普京时代苦苦追寻的东西——民主。尽管是扭曲的、怪异的、与理想相去甚远的民主，我们仍为此欢欣——构筑希望、制定计划，甚至原谅了发生在欧洲的血腥屠杀。可最终，南瓜马车终究现了原形。极右翼犯罪集团‘保卫人民与国家联盟’——这个法西斯主义与沙文主义的混合体——通过篡改选票、民粹主义等普京时代的旧手段，外加恐吓刺杀等新伎俩窃取了政权。\"\n\n卡茨停顿片刻，端起玻璃杯饮水后继续道：\n\n\"此刻，我想对所有心系俄罗斯命运的人们说。无论你是自由派或保守派，共产主义者或民主人士，统俄党或未来党成员，支持联邦制或中央集权，左翼或右翼，钟情草莓冰淇淋或巧克力冰淇淋——这些统统不重要。此时此刻在莫斯科，正坐着墨索里尼的精神继承者，一个自诩为伟大救世主的暴发户。事实是，他只会让俄罗斯失去生机，再夺走数百万生命，让数千万人遭受创伤。我从不号召观众进行危险行动，但此刻必须破例。请起身反抗这个政权。无论你是参加集会、传播真理，还是单纯转发这个视频——重要的是，你需要为抵抗运动贡献力量。我们尚有机会阻止这场疯狂，趁为时未晚。\""
 russiaflavor.82.a: "明天见。"
 russiaflavor.83.t: "\"动画片\"示威活动"
 russiaflavor.83.d: "随着保卫人民与国家联盟掌权，社会多个领域遭受严格审查，电视行业首当其冲。起初是明确禁播西方频道，如BBC、探索频道、MTV、尼克国际儿童频道、动物星球等，但很快俄罗斯本土频道也未能幸免——周末、星期五、比赛-TV、音乐-TV、我的星球等也相继停播。最引发社会震荡的是儿童青少年频道的全面关闭，包括太阳、MULT、2x2乃至业界巨擘\"旋转木马\"。\n\n这项激进决策立即引发强烈民意反弹，更糟糕的是捅了名为\"民主反对派\"的马蜂窝。鲍里斯·纳杰日丁率先在社交媒体发声，呼吁民众运用VPN突破网络封锁并传播翻墙方法。德米特里·帕特鲁舍夫与鲍里斯·蒂托夫随后发表类似声明，而阿列克谢·涅恰耶夫的诉求最为激进——号召全国范围示威游行。按理说，反对这项必要措施的行为简直不可理喻。\n\n但人们还是走上了街头。\n\n据不完全统计，莫斯科、明斯克和叶卡捷琳堡的抗议规模最大，单处广场聚集近4000人。圣彼得堡起义广场的集会尤为激烈，约7000人参与其中，500人遭拘留。示威过程中突发大规模骚乱，致数十人受伤，另有五名抗议者当场死亡。死亡画面迅速在网络传播，不仅损害我国形象，更助长了各类边缘团体的活动。"
 russiaflavor.83.a: "就为了这点动画片？！"
 russiaflavor.84.t: "密谈"
 russiaflavor.84.d: "自阿里哈诺夫掌权以来，关于保卫人民与国家联盟领导人的诸多传闻与情报不断泄露给媒体，主要消息源自然是民主派反对势力。民众对此类消息并不太关注，毕竟在阿里哈诺夫崛起前反对派就惯用此类手段。但最近曝出的事件却引发了舆论海啸。\n\n梅德韦杰夫时期统一俄罗斯党的前官僚德米特里·帕特鲁舍夫在其Telegram频道发布了标注\"2021-07-24_真相\"的音频文件。他在说明文字中声称，这是弗拉基米尔·弗拉基米罗维奇·普京与梅德韦杰夫在前者去世前的秘密谈话录音。\n\n录音内容比其背景更耐人寻味。从环境音判断，两位政治家当时正坐在桌旁啜饮饮品（推测为茶或咖啡）。起初梅德韦杰夫与普京讨论着日常琐事——谁用了什么餐点、近期行程安排、会晤对象，甚至品评彼此的衣着搭配等等。但当对话悄然转向政治领域，谈及普京潜在接班人时，出现了耐人寻味的交锋：\n\n\"……德米特里，毕竟我不是永生的。尽管遗憾，但结合近期形势，我们必须考虑谁能延续我的事业。\"\n\"您建议由谁接任呢，弗拉基米尔·弗拉基米罗维奇？\"\n\"这样，我们不妨用排除法。首先从统一俄罗斯党内部来说，我绝对不希望看到一个人——阿里哈诺夫先生。这个人……不，这头……这头野兽不仅需要驯服，更必须被铲除。他展现出了极端的残酷、鲁莽，而且是个无能政客。德米特里·阿纳托利耶维奇，我恳请您——不仅要阻止他掌权，更要杜绝他染指任何权力！倘若失败……俄罗斯将面临噩梦般的未来……\"\n\n录音在此戛然而止。这则帖子在俄语网络引发轩然大波，甚至传播至境外。尽管录音真实性微乎其微，仍有许多民众深信不疑，抗议活动的火焰再度燃起，且势头较以往更为猛烈。"
 russiaflavor.84.a: "这明显是AI做的！这帮人为什么会信那些炒作狗？！"
 russiaflavor.85.t: "\"新俄罗斯\"大规模抗议活动！"
 russiaflavor.85.d: "自弗拉迪斯拉夫·达万科夫遇害后，新俄罗斯党便将我们视为头号敌人，甚至公然宣称其首要目标是摧毁我们的政党与政权。我们起初并未过分担忧，失去达万科夫的该党无异于沦为\"自民党2.0版\"，仅靠着对已故政治明星的追忆苟延残喘。这个判断让我们付出了代价。\n\n阿列克谢·涅恰耶夫，这个名不见经传的官僚机器前国家杜马议员，过去仅以在各大社交平台发表口号声明著称。但今日他展现了非凡手腕。为纪念达万科夫，他竟提议在圣彼得堡马拉塔街47号非法设立纪念牌，还煽动民众不雇工人亲自施工。当自由派活动人士抵达现场遭拘留后，涅恰耶夫立即在其个人Telegram频道连续发布被捕者照片，并蛊惑民众即刻前往弗拉基米尔站地铁站阻挠执法行动。\n\n结果，大批被洗脑的民众从圣彼得堡各处涌向涅恰耶夫及活动分子所在。事态迅速失控，我们不得不暂时瘫痪圣彼得堡地铁系统，但收效甚微。数千人聚集现场，对执法部门实施包括庇护活动分子、投掷石块在内的多重冲击。作为反制，我们的战士被迫使用催泪瓦斯与强制手段，引发大规模恐慌与踩踏事件。这场闹剧最终以纪念牌未能立起告终，但涅恰耶夫的煽动导致约64人受伤，30人住院，2人被宣告死亡。"
 russiaflavor.85.a: "你们和欧洲那帮废物一模一样！"
 russiaflavor.86.t: "流言"
 russiaflavor.86.d: "坊间流传着关于阿里哈诺夫政府的种种非议。在厨房里，人们交头接耳：\"他真是普京的接班人？不，他是希特勒的继承者！\"\n\n大学校园里弥漫着这样的流言：\"这届政府根本不强硬，连一小撮抗议者都镇压不了！\"\n\n办公室隔间里窃窃私语：\"他们贪得无厌，连一个戈比都没给老百姓剩下！\"\n\n商店排队时人们互相抱怨：\"物价飞涨，什么都买不起了！\"\n\n军营里士兵们愤愤不平：\"那些军官算什么东西？根本就是群废物！\"\n\n日复一日，这个政府正从国家支柱蜕变为被人排斥的非法存在。民众日益怀念梅德韦杰夫和普京时代，对当权派的憎恶与日俱增。\"黄卫兵\"每天都在减员，或是因激烈冲突，或是遭集体清洗。强权主义社会结构正在分崩离析，这种变化从民间情绪中可见一斑。民主反对派开始协同行动，煽动民众采取危险举动，城市街道可疑地日益空旷。照此发展，那个在最可怕的民间流言中传播的预言，恐怕很快就要成为现实。"
 russiaflavor.86.a: "谣传罢了……对吧？"
 russiaflavor.87.t: "贵族"
 russiaflavor.87.d: "钟表指针再度交叠成季节的满月，贵族骑士立于巨岩之前，岩缝中傲然挺立着一柄硕大锋锐、寒光凛凛的长剑。骑士先是眺望远方阴森可怖的黑暗城堡，继而凝视眼前这柄气势恢宏的兵器。在他身后——聚集着大群一贫如洗、受尽掠夺的农民，他们早已对变革失去希望。只见骑士双手猛然握住剑柄，利刃应声而出，被他高举过头直指苍穹。\n\n农民们为这惊世之举震撼不已，心中重燃希望之火。骄傲的骑士将新得的神兵直指城堡，迈步进军。追随者在他身后迅速集结成浩荡队伍，从这位战士身上汲取着尊严与力量。每一步踏落——青草便在足迹间绽放；每一步前行——阴云便自天幕退散；每一步迈进——解放的曙光便更近一分。\n\n就这样，骑士与民众兵临城下。那个压迫贫民多年的暴虐君王，在凛冽剑光中应声溃败。他那肥硕丑恶的躯体重重砸在榨取民脂民膏筑成的城堡入口，璀璨的金王冠径直落入骑士掌中。万众欢腾，人们齐声喝彩，咒骂已死的暴君，向骑士顶礼膜拜。这时骑士却轻轻摆手，将王冠抛向人群，转身欲去。刚获解放的农民们惊愕失语，其中一人怯声发问：\n\n\"骑、骑士大人……您……您拯救了罗斯人民……拯救了我们……为何要拒绝统治我们的权力？\"\n\n骑士微侧身躯，余光扫过人群，淡然答道："
 russiaflavor.87.a: "\"现在，轮到你们自由地决定自己的命运了\""
 russiaflavor.88.t: "溪流"
 russiaflavor.88.d: "在顿涅茨克人民共和国前领导人丹尼斯·普希林意外赢得俄罗斯总统大选后，弗拉迪斯拉夫·日米列夫斯基被任命为外交部长。\n\n直播自然成了稀罕事——公务几乎占据了他全部时间，但日米列夫斯基从未忘记观众，何况如今观众数量激增，他被视为政府面向民众的传声筒。弗拉迪斯拉夫主要探讨外交政策与国际关系，应观众要求点评YouTube视频，经常解析新法案草案，还举办能满足捐赠者几乎任何要求的拍卖活动。\n\n某次直播中，当他正应要求模仿某位主播时，屏幕上跳出一条新的打赏：\n\n帖木儿·R - 100卢布\n- 你好啊日米。要我说，咱们是不是该跟现在的欧洲政府建交？毕竟如今局面完全不同了，你知道的，谁都不想再经历一场战争。\n- 哦，当然。可您难道没发现这帮人不过是换了层包装、妄想建立新乌托邦的同一批左翼分子吗？他们活在自己那该死的幻想里，整天想着抹除民族界限、追求某种\"正义\"。说到底他们恨我们俄罗斯人。对付这群人，能且只能使用一种语言——武力语言。否则他们根本听不懂人话。\n聊天区顿时爆发出喝彩，清一色支持主播的言论。"
 russiaflavor.88.a: "这难道还需要多作解释吗？再深入阐述一下。"
 russiaflavor.89.t: "士兵的悲伤"
 russiaflavor.89.d: "亚历山大从战争伊始就是一名士兵，跟随连队辗转欧洲多座城市：从基辅到华沙，从布加勒斯特到索菲亚。退役后他本计划回到克里米亚的家乡与家人团聚，\n但就在因重伤住院期间，他得知了噩耗：战争结束前数日，一枚导弹意外击中他家，妻女当场罹难。\n退役后的亚历山大因不堪触景生情，最终没有返回故乡。无处可去的他选择留在俄军新占领区的军事警察部队维持秩序。\n某次巡逻时，他注意到有个流浪男孩正在居民楼废墟里翻找东西。\n\"你在这儿做什么？父母呢？\"亚历山大上前询问。\n男孩答道：\"爸爸战死在前线，妈妈去商店时被无人机炸死了......\"\n某种情绪在士兵胸腔翻涌。他长久凝视着孩子，突然意识到不该让这样的生命独自凋零——他要收养这个男孩。\n\"知道吗？我可以当你爸爸。\"警察在他耳边轻语。\n男孩猛然僵住，随即扑上来紧紧搂住他的脖颈，仿佛害怕这抹温暖会消失。回程路上，孩子寸步不离地跟着阿列克谢，而士兵沉寂已久的心口，终于重新泛起了暖意。"
 russiaflavor.89.a: "两个孤独的灵魂找到了彼此。"
 russiaflavor.90.t: "志愿者"
 russiaflavor.90.d: "根据安东·阿里哈诺夫颁布的一项新法令，俄罗斯组建了\"黄卫兵\"，其任务是维持街头秩序并协助警方。该组织成员在街头上极易辨认——统一配备印有俄罗斯国旗的黄色臂章，以及同色系制服——带背带的衬衫配短裤。\n任何本国公民均可报名成为志愿者。只需在受理点提交申请并通过简短面试即可。\n整个流程非常快捷：\n\"您好，您计划加入黄卫兵。请问您的初衷是？\"\n\"您看，这些自由派简直无法无天。最近他们炸毁了一幢居民楼。这还能容忍吗？事后我立即意识到不能再袖手旁观了。\"\n\"好的。您是否准备好报效国家，并在必要时制止违法行为？目前形势下可能面临危险。\"\n\"是的，这正是我来的目的。我希望恢复街头秩序，愿意为此贡献力量。\"\n\"很好。我将把您的申请提交审议。稍后您将领取制服并分配搭档。请告知您的姓名？\""
 russiaflavor.90.a: "梅尔索·科热米亚科。"
 russiaflavor.91.t: "提议"
 russiaflavor.91.d: "安东·安德烈耶维奇·阿里哈诺夫顺道拜访他的老熟人——一位化名\"布雷哈尔\"的雕塑家。他想去查看一下他那笔订单的进展。\n\"你好啊，布雷哈尔。近况如何？我想问问那笔订单怎么样了？我可了解你——你总喜欢把事情拖着。\"\n\"日安，安东·安德烈耶维奇。一切都好。活儿进展顺利，您别担心。\"\n\"太好了。你之前还提到，说有人想见我谈点事。能告诉我他们是谁吗？\"\n\"啊，是的。最近，有两位黄卫兵的人来找我。他们俩在服役期间表现都很出色，而且他们态度很坚决，非要和您谈一谈。\"\n\"那请他们进来吧。\"\n布雷哈尔离开了几分钟，随后领着两名卫队成员回来了。\n\n\"您好，安东·安德烈耶维奇，我叫梅尔索，是一名高级黄卫兵成员。我和我的同志卢卡认为，您必须——不，您甚至有义务——听听我们的意见。\"\n\"哦？我什么时候对你们有义务了？\"\n\"请您听我说。我是完全认真的。\"\n\"好吧，姑且听听。你们有什么提议？\"\n\"后方现在很不安全。各种激进的左翼和民主团体正在肆虐。我们没有足够的人手来维持秩序，而在那些新收复的领土上更是彻底的混乱。我提议，在乌克兰开设黄卫兵的志愿兵招募点。\"\n\"但那里已经有招募点了。\"\n\"是有，但远远不够。我们提议，不仅要扩大招募点的数量，更要简化当地居民的加入手续。让他们能和俄罗斯公民在同等条件下加入。与此同时，还要发起一场宣传运动，改善黄卫兵在乌克兰人心目中的形象，让他们开始视我们为秩序的捍卫者。如果您允许，我愿即刻着手组织这项工作。\"\n\"明白了。还有别的吗？\"\n\"我还提议，改变我们这场运动的方向。我们的运动不应只局限于全俄罗斯，而应涵盖所有的东斯拉夫人。\"\n\"你设想如何实现呢？\"\n\"我们需要开始整合。乌克兰、白俄罗斯、小俄罗斯——把我们所有人团结在同一面旗帜之下。\"\n\"你难道不明白时代已经变了吗？我们不再是同一个民族了，不像几个世纪前那样。\"\n\"那些差异都只是细枝末节。我父母就来自乌克兰，我清楚我自己在说什么。\"\n阿里哈诺夫皱着眉，从烟盒里抽出一支烟，按下了打火机。他吸着烟，沉默了几秒钟。\n\"好吧，我愿意考虑一下你的提议。\"他最后说道。"
 russiaflavor.91.a: "但首先，你需要证明自己。"
 russiaflavor.92.t: "希望渐逝"
 russiaflavor.92.d: "维克多·亚努科维奇已在罗斯托夫附近的居所居住多年。当年遭遇背叛后，他被迫逃亡至此。但即便在最黑暗的岁月里，他始终坚信乌克兰能够重新屹立，最终迎来繁荣。\n\n那个雨天的清晨，维克多·费奥多罗维奇端着咖啡坐在沙发上，盯着电视等待早间新闻。当播报到\"俄军已完全解放乌克兰首都基辅\"时，他顿时僵在原地，喉间发不出半点声响。往事如胶片般在脑海中流转：2010年当选总统后的就职演说，独立广场的骚乱，弹劾议案的表决，仓皇出逃的夜晚。而如今，这片他深爱的土地正在战火中化为焦土。\n\"我究竟做了什么？当年该如何阻挡这宿命的轨迹？故土的未来又将如何？\"——但在灵魂深处，他明白这些问题永远不会得到回答，一切都已尘埃落定。\n\n窗外雨势渐急，雨滴敲打着屋顶，屋内却一片死寂。"
 russiaflavor.92.a: "希望永存。"
 russiaflavor.93.t: "摊牌"
 russiaflavor.93.d: "弗拉基米尔是俄罗斯帮派里的一名老资历。街头斗殴于他而言是家常便饭。但最近帮派遇上了大麻烦：他们与车臣团体，特别是卡德罗夫派结下了梁子。\n\n这次群架规模空前且异常惨烈。冲突骤然爆发，拳脚相加的闷响在街区回荡。弗拉基米尔动作精准而自信，招牌式扫腿接连将对手踹倒在地，他沉浸于力量带来的快感与掌控感中。\n\n但局势逐渐明朗：车臣人显然占据了上风。他们人数占优，行动更有组织。弗拉基米尔试图稳住阵脚，却被数名对手同时围攻。他猛地侧身闪避，再次使出招牌扫腿，却首次失手了。对方稳立不倒，一记重拳猛击在他下颌。弗拉基米尔的精准度瞬间崩溃，踉跄倒地。\n\n俄罗斯帮派开始溃退，多数人痛苦蜷缩在地。卡德罗夫派揪着包括弗拉基米尔在内尚清醒者的衣领，将这些人押到墙边排开，强迫他们向自己及拉姆赞·艾哈迈托维奇低头认错。"
 russiaflavor.93.a: "车臣即力量！真主至大！"
 russiaflavor.94.t: "斗争"
 russiaflavor.94.d: "人类整个生存的历史就是一部斗争史。与自然抗争，与他人周旋。有些民族注定要与全世界为敌，甚至要与将他们放逐人间的愤怒神明抗衡。但无论缘起为何，斗争永远不会从我们的生命中消失。雄狮怒吼，猩猩捶胸，无不是为了捍卫自身在食物链顶端的地位，成为最强悍的主宰者，或至少看起来如此。\n\n而俄罗斯在漫漫历史长河中曾不止一次为生存而战。无论是面对亚洲游牧民族的铁骑，还是欧洲联军的枪炮。无数企图终结我国历史的挑战者，最终都铩羽而归。\n\n如今俄罗斯再次屹立于胜利之巅，成为两场欧陆战争的唯一赢家。\n\n然而斗争远未结束。受辱败北的德意志人、法兰西人及其他被征服民族，必会伺机复仇。斗争永续，此乃万物本性。但俄罗斯绝不会再度沉沦。阿里哈诺夫已倾尽全力，将祖国锻造得坚不可摧，随时准备战斗至最后一息。\n\n那是他精心调校的精密机器，无与伦比的战争巨兽。那是团结不可分割的民族，如奔涌巨浪能将一切阻碍尽数卷走。那是他那骄傲不屈、永不屈服的祖国。"
 russiaflavor.94.a: "这是必然的结果。"
 russiaflavor.95.t: "警察浪潮"
 russiaflavor.95.d: "\"特别任务分队已抵达大规模骚乱现场。指挥官谢尔盖·切尔诺夫报告。\"\n\"收到。启动封锁程序。‘黄卫兵’将很快抵达支援，预计时间15分钟。\"\n\"明白，开始封锁。\"\n……\n\"暴徒正试图突破封锁线，袭击警员。支援在哪里？\"\n\"‘黄卫兵’途中遇袭，车辆损毁。延误时间未知。\"\n\"收到，继续坚持……燃烧瓶！注意隐……\"——听筒里传来玻璃碎裂声。\n……\n\"德米扬奇克和他那帮人他妈的去哪儿了？阅兵的时候他们倒是冲第一个，妈的。领勋章也是第一个。打个流浪汉就算了——我们可以不计较。可现在是真刀真枪对付抗议者。\"\n\"闭嘴，你现在在占线。与黄卫兵单位通讯中断。\"\n\"我操你妈不占线我还能咋办。我这儿有三个烧伤的伤员，还有一个被抗议者拖走了，那群混蛋，我们没能拦住。这帮人猖狂得很，像吃了枪药似的。还没人来支援！再这样下去我们只能撤退了。\"\n\"……\"\n\"去你妈的。\"\n……\n\"狗娘养的。呼，他们的土制玩意儿还挺厉害。\"——指挥官深深地叹了口气。——\"震得我喘不过气。封锁线已被突破，我们正在撤退重组。你们爱怎么办怎么办吧，必要的话派军队来。\""
 russiaflavor.95.a: "而且危险又困难。"
 russiaflavor.96.t: "怪物"
 russiaflavor.96.d: "这绝非普通的愤怒，而是发自肺腑、无法遏制的暴怒。阿里哈诺夫掌权之初就明白会面临诸多反对者，这世上本就不可能让所有人满意，这位前加里宁格勒州长比谁都清楚这个道理。但他没料到竟有如此多昔日同僚背弃了他，连梅德韦杰夫也来落井下石。因为阿里哈诺夫不是普京，不是梅德韦杰夫，有人甚至质疑他的俄罗斯血统。那些叛徒还组建了所谓的反对派，可如今他们在哪？早已深埋湿土之中！他们的尸骨不会交还亲属，将永远列为失踪人员，这就是叛徒应得的下场。\n\n这是沉重的十字架：阿里哈诺夫身上伤痕累累。当旁人只会空许承诺时，只有他真正践行着对人民、对整个俄罗斯的誓言与责任。然而人们对他的态度却在不断转变：起初因他的权势与热忱称他猛兽，甚至蛮徒；后来开始骂他畜生，如同见人就咬的疯狗。\n\n如今他们索性冠以怪物的绰号。但由他们去吧！历史需要敢作敢为的强者，何必在意后世评说，更无须理会异国公民的议论。阿里哈诺夫立志让俄罗斯真正强大，他绝不会背弃诺言。俄罗斯世界不再是一句空谈！俄罗斯之春永载史册！这一切都仰仗于他！\n\n既然无人敢挺身而出，那就由安东亲力亲为。只要目的是拯救祖国，任何手段都情有可原。"
 russiaflavor.96.a: "如今，再无人能助我，缓解那刻骨的痛楚。"
 russiaflavor.97.t: "可疑的支持"
 russiaflavor.97.d: "\"该死的，斯塔斯，你是从树上掉下来的吗！？你他妈干了什么？\"公共秩序保卫处的警官一脸不悦地看着他的同事。\n\"帕尔·帕雷奇，怎么一来就怪我？我正常走过去，正常地对他说：‘公民，有人投诉你未经批准进行单人抗议，请跟我们到车上去。’结果他死命抱住那个横幅。双腿发抖，眼睛翻白，然后就晕倒了。我连一根手指头都没碰他。\"\n\"你上次照镜子是什么时候？你这体型跟2x2的衣柜没两样。也难怪你穿着制服那样走过去说话，会把他吓破胆。换我在他这个年纪，估计也会这样。\"帕维尔小心地捋着胡子，思考接下来该怎么办。\"他那横幅上到底写的什么？\"\n\"我哪知道？我赶到的时候他已经把字翻过去了。\"\n\"唉，行吧，那我看看。\"帕维尔走近躺在柏油路上的少年。他伸手抓住横幅右上角一掀，背面是经过改动的《祖国母亲》画像——她举着的纳粹德国旗帜中央有个关键改动：万字符中心嵌着个地球仪，俄罗斯正处在地球中央。横幅顶端印着白色标语：\"全俄民族世界主义者组织支持阿里哈诺夫\"。底部还有一行：\"全世界白种人，你们失去的只是全球主义的枷锁！\"——\"好家伙......\"\n\"是啊，这烂摊子。你觉得能凭这个立案吗？\"\n\"所以你打晕个不到20岁的孩子，现在还想给他扣个刑事罪名？抬他的腿，我架前面，赶紧弄上车。别忘了把这破布带上。还愣着干什么？快点快点......\""
 russiaflavor.97.a: "常有的事。"
 russiaflavor.98.t: "他们的斗争"
 russiaflavor.98.d: "……现在请看其他新闻。今晚在阿尔马维尔市，已被取缔的极端组织BOAK（即无政府主义共产主义战斗组织）成员实施了一次未遂恐怖袭击。凌晨三点，四名人员组成的团伙接近朱可夫大街上的当地黄卫兵办公室，试图用自制莫洛托夫鸡尾酒点燃建筑。\n\n然而由于投掷者距离过近，燃烧瓶撞击玻璃后反弹到投掷者面部，致使他当场起火。同伙试图灭火，但在听到警笛声后仓皇逃窜。目前医护人员正在全力抢救这名不幸的投掷者，其身份尚未确认。极端分子还在现场遗留了一个背包，内含若干模板涂鸦、组织海报及喷漆罐。\n\n警方已展开搜捕行动，其余纵火犯预计将很快被绳之以法。接下来请听我的同事维塔利·奥斯特罗夫斯基为您播报国际体育新闻。"
 russiaflavor.98.a: "BOAK？头回听说这个名字……"
 russiaflavor.99.t: "蓟花之外"
 russiaflavor.99.d: "一座城堡矗立在田野中央；通往它的路径早已荒芜，近一个世纪也无人敢于踏足此地。曾几何时，一位强盛的君主在此临朝，名门望族在此举办舞会，王国最精锐的卫队在此守护着安宁。但那些时光早已一去不复返。如今，城堡已被荆棘所吞没；带刺的藤蔓缠绕着古老的塔楼与高墙，那醉人的紫色花朵令人目眩神迷。但这位勇敢的骑士并未打算放弃。\n\n他紧握剑柄，奋力挥砍。灼热的汁液溅到他手上，引起一阵难耐的奇痒，但这还不够。再一击。又一击。骑士不知疲倦地在荆棘丛中奋力推进。尖刺刺穿了他的双腿和臂膀，有毒的绿色汁液灼烧着他的脸庞，泪水夺眶而出——但这并非出于怜悯，更不是为了他自己。穿过一条又一条走廊，一间又一间大厅，荆棘终于退却了。\n\n终于，精疲力竭的骑士抵达了王座厅。一个空荡荡、布满灰尘的王座，正被一束从天花板破洞中透过的光芒照亮，仿佛在召唤着他。就在他走近时，战士的身后开始响起阵阵私语。他转过身，看见了他们——七个身影。一对成年男女和他们的四个女儿正站在厅中，就在骑士面前；父亲的身后还探出一个脸色苍白的小儿子。这些身影静静地站着，面带微笑，仿佛在为这位勇敢战士的壮举而自豪。\n\n接着，一顶镶满宝石的王冠凭空浮现。这是一顶为他而备的王冠。为了这位敢于挑战并捍卫过往王朝记忆的骑士。他并非出身贵胄，但他当之无愧。士兵试着戴上了这顶王权宝器，在王座上坐下，随后那些身影便消失了。终有一日，会有一位更称职的勇士——一位身负高贵血脉、怀有不屈意志的勇士——前来此地，他才真正配得上这顶宝冠。但现在呢？现在，将由这位骑士来守护它。"
 russiaflavor.99.a: "唯独他配得上。"
 russiaflavor.100.t: "克里莫夫卡"
 russiaflavor.100.d: "大约五年前，当驱车驶过莫斯科的公路立交桥和高速干道时，映入眼帘的，是大片大片的新建楼房，它们活脱脱就像是五颜六色的烟盒或是鞋盒。\n\n千篇一律的暗淡外墙设计、缺失的阳台、匮乏的交通基础设施，以及那股赤裸裸的外表廉价感，都无比扎眼。而在楼房内部，住户们则面临着一连串的难题：逼仄的房间、怪异的布局，以及来自邻居的、永无休止的噪音。\n\n这种建筑方案曾险些在全俄罗斯大行其道，许多公司早已获得了在我国欧洲部分建造新高楼的许可。然而，时至今日，起重机和卡车却重新轰鸣起来，它们作业的地方正是那些被紧急拆除的新楼原址。\n\n根据建设部提议、并在党内会议上获批的一项苏联新基础设施重建计划，必须将苏联文化融入民用建筑设计，以便在日常生活中维系共产主义情怀。为此，所有的建筑承包商均被地方苏维埃机关收归集体所有，并在建筑师中广泛开展了新建筑项目的社会主义竞赛。\n\n莫斯科，作为共产主义的象征，率先开始了变革。很快，由玻璃、混凝土和钢铁铸成的巍峨巨构在首都拔地而起。那些奇异而粗犷的造型，点缀着红星和各种马赛克图案，马赛克的主题振奋人心，并常伴有列宁、斯大林及其他布尔什维克领袖的语录。在民众中，一种被称为\"克里莫夫卡\"的建筑变得尤为流行——这是一种标准的十层住宅，拥有宽敞的层高和舒适的套房。\n\n用不了多久，这个国家的每座城市，都将以其崭新的面貌，彰显苏联人民的目标与抱负！"
 russiaflavor.100.a: "粗野主义的力量无可争议。"
 russiaflavor.101.t: "领袖肖像"
 russiaflavor.101.d: "自斯大林时代起，在管理者和负责人的办公室工作场所悬挂当代统治者肖像的传统便在俄罗斯扎根。即便在赫鲁晓夫修正主义与资本主义到来后，这些画像也未曾消失。根据克利姆·亚历山德罗维奇总书记的新法令，所有拥有独立办公室的负责人都必须在工作场所悬挂斯大林肖像。\n\n不少心怀恶意者宣称，这种作风是窃盗统治统治与极权国家的特征，官员们只关心等级序列与最高统治阶层的亲疏，而非国计民生，独裁者则沉醉于虚假的谄笑。赫鲁晓夫及其后历任总书记与总统执政时期都是如此。国家强硬路线的软化与\"人民公仆\"大行其道，最终导致国势渐衰。\n\n在斯大林之前，革命与内战后的布尔什维克党实为各类乌托邦思想家与修正主义梦想家的聚会，他们争抢权力资源，延续着帝国参议院滋生的政治纷争之毒。\n\n斯大林粉碎了新国家内部敌人的抵抗，为苏联发展制定了强硬路线。他从不拘泥于抽象意识形态与体系，始终秉持强固国家的原则，要求所有岗位的公民都应为国家与同胞而工作，而非为私利、收益或晋升。其组织天才为国家培育了大批忠于祖国与共产主义的所需干部。\n\n斯大林个人崇拜的初衷并非自我颂扬，而是激励普通联盟公民。他的形象在苏联人民心中灌注着责任与信心。根据为斯大林及其同志恢复历史正义的计划，广场、工厂区与行政中心将陆续竖立\"人民领袖\"的新纪念碑与半身像，而肖像法令仅是第一步。"
 russiaflavor.101.a: "以防万一，我也得挂一幅茹科夫肖像。"
 russiaflavor.102.t: "反动派的反应"
 russiaflavor.102.d: "在完成伟大革命并使俄罗斯回归共产主义初心后，如何巩固政权成为当务之急。\n\n在苏联人民委员会主席团首次会议上，克利姆·茹科夫总书记发表了重要演讲。他公开指出斯大林逝世后所有苏联领导人——包括各部部长和中央委员会主席在内，都是修正主义分子和反苏分子，同时强调未来苏维埃俄罗斯的建设模式必将以他的国家模式为蓝本，因为这正是当前历史阶段最有效且最必要的选择。\n\n这一表态在境内残余政治派系中引发强烈反响。自由派资本家恐惧贫困，法西斯余孽与民族主义者叫嚣掌权的是仇俄分子和移民集团，而托派及其他\"温和左翼\"则预言古拉格体系与\"新1937年大清洗\"即将重现。但这些并不可怕，反对派领袖随时都能轻松清除，他们对民众思想的影响力微乎其微，毕竟其力量仅源于情绪煽动，而现实自会将其粉碎。\n\n更令人忧心的是，多数公民尚未理解我们意图与计划的严肃性。对他们而言，恢复真正的斯大林式苏维埃现实，不过是些迂腐老者在怀旧情绪驱使下、因缺乏创新力而鼓吹的背景话。缺乏明确政治路线及对意见多元化的长期纵容，曾逐步瓦解了联盟，随后又摧毁了联邦。这种由资本家与修正主义者用反国家思想扼杀新生力量、漠视共产主义核心支柱所催生的政治冷漠，正是俄罗斯当前最严峻的痼疾。\n\n是时候让无产阶级从近一个世纪的沉睡中苏醒，亲手为他们的苏维埃祖国重铸伟业与稳定！同志们，我们任重道远！必须让俄罗斯及其兄弟民族重新踏上斯大林式共产主义的钢铁征程！"
 russiaflavor.102.a: "踏上征途！"
 russiaflavor.103.t: "政治委员"
 russiaflavor.103.d: "在440号新兵训练基地，一列悬挂两节客运车厢的奇特列车缓缓进站。十二名袖章缀着红星的士兵持自动步枪率先下车，随后出现的是个身着黑色长外套的清瘦高挑身影。月台上无人迎接这群不速之客，仅有值班列兵跑来查验证件。为首的军官自称为科托夫少校，带着巡视组与护卫分队前来。\n\n这支队伍随即向部队司令部行进。基地指挥官安东诺夫上校已从车站哨兵处得知视察消息，正率领全体军官与临时召集的军乐队恭候视察官。他纳闷为何自己的上司米拉申科将军没有提前数周通知，但转念便安下心来，三十余年军旅生涯中，这类视察官少有双手干净的，收受贿赂实属常态。\n\n当视察官走到单位入口时，安东诺夫正准备自我介绍，少校却抢先一步亮出证件：\n\"阿列克谢·安东诺夫上校？我是科托夫政委，根据克格勃命令，你因贪污国家资金被捕。我们必须将你押送至最近的克格勃部门接受审讯，\"政治委员挥舞着厚厚的档案夹说道，\"近期收到针对你及本单位多名高级军官的全面告发：虐待新兵、传播异见思想、违反军队服从纪律。\"\n\n\"你知道我是谁吗！\"安东诺夫勃然大怒。\"就你这种态度，我已经送五个像你这样的家伙进坟墓了！你根本不知道我背后是谁在撑腰，区区一个红牌学员，竟敢在阅兵式上这样冲撞我？！\"\n\"米拉申科将军上周因贪腐被捕，他把你给供出来了，安东诺夫同志。\"\n\n话音未落，暴怒的上校已然拔出配枪。正当他举枪瞄准科托夫之际，一声枪响震彻广场。上校眉心中弹轰然倒地，而政委手中那把马卡洛夫手枪仍冒着青烟。随即克格勃行动小组向军官团倾泻弹雨。\n十秒内，阅兵场遍布指挥官的尸体。只有\"正巧\"迟到的一名年轻上尉幸免于难。科托夫政委缓步走近，与上尉握手致意。"
 russiaflavor.103.a: "\"我为苏维埃服务，政委同志！\""
 russiaflavor.104.t: "\"苏维埃进行曲\""
 russiaflavor.104.d: "12月18日，为庆祝约瑟夫·维萨里奥诺维奇·斯大林诞辰，红场举行了盛大的阅兵式。苏俄主要广场的鹅卵石地面上，步兵方阵、装甲纵队和航空编队依次行进。\n\n最先走来的是历史方阵：历史俱乐部成员和志愿者组织身着伟大卫国战争时期的军装，手持莫辛纳甘步枪、波波沙冲锋枪和捷格加廖夫轻机枪等经典武器。他们高举着八十年前保卫祖国的各方面军旗帜。\n\n随后是第一次欧陆战争的老兵队列：无人机操作手、突击部队战士和各共和国民兵。他们承载着新型战争法则与实战环境的全部压力与重担。战士们身着作战装备，人人佩带着攻克城市勋章和卓越服役奖章。\n\n跟在他们身后的是劳动与后方英雄队列。这些普通工人、工程师和设计师曾与前线将士共同铸就胜利。数百面来自工厂、企业集团、科研院所和中心的旗帜迎风招展，每面旗帜背后是成千上万为祖国奉献的劳动人民。\n\n压轴的是军事院校学员方阵。崭新的阅兵服彰显着他们的特殊身份：镶着经典苏联帽徽的毛帽、缀满金色纽扣的深红色厚呢军大衣，搭配巨型肩章与领章。他们的阵列象征着新苏维埃俄罗斯最新的军事传承。\n\n士兵方阵之后，坦克与战车编队滚滚而来，这些钢铁巨兽历经前线战火淬炼。加装各式防护网与反应装甲的车体，既散发着令人胆寒的威压，也延续着自伟大卫国战争以来俄罗斯军事力量的辉煌传统。\n\n装甲纵队的压阵单位是六辆最新型IS-10坦克原型车。双联装120毫米主炮、两套近程防空系统、车载电子战设备与巨型推土铲构成强大武备。庞大的车体需要四组履带系统支撑。虽仍处于测试阶段，但这款坦克必将成为应对新型战争形态的利器。\n\n阅兵在航空编队的通场中达到高潮。三艘巨型飞艇掠过长空，首艇装饰着斯大林肖像，次艇悬挂胜利旗帜，尾艇飘扬苏联国旗，为这场展示武力的盛典画上句号。"
 russiaflavor.104.a: "我们的苏维埃将惩戒全世界……"

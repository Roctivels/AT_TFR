 SOV_guiding_the_nation_desc: ""
 SOV_new_patriotic_image: "新爱国形象"
 SOV_new_patriotic_image_desc: ""
 SOV_continue_our_partnership: "俄罗斯法团主义"
 SOV_continue_our_partnership_desc: "上世纪90年代，一批具有商业头脑的人从共青团系统中脱颖而出，形成了后来的寡头阶层。他们在苏联废墟上积累起惊人财富，建立起俄罗斯市场无人能及的商业帝国。随着时间推移，有人因涉足不擅长的领域而倾家荡产，有人则与国家机器融合，开始全方位协助政府运作。\n诚然，寡头们的影响力今非昔比，但他们留下的庞大企业遗产却完美契合国家发展需求。依托这些商业巨擘，我们将能攀登前所未有的高峰！"
 SOV_prioritize_state_corporations: "国企优先"
 SOV_prioritize_state_corporations_desc: "国有企业在俄罗斯经济中扮演着关键角色，它们是国家调控的重要杠杆：这些企业被赋予了对关键行业的准垄断地位。无论是天然气工业股份公司、国家原子能集团还是航天集团，这样的例子不胜枚举——我们必须聚焦自身优势。\n正如擎天神阿特拉斯支撑着苍穹，我们更应当为这些现代阿特拉斯提供坚实支撑。"
 SOV_expand_resource_market: "拓展资源市场"
 SOV_expand_resource_market_desc: "我国自然资源禀赋得天独厚：镍、天然气、石油、钻石——各类资源应有尽有，不胜枚举。长期以来，我国经济主要依赖对欧洲的资源出口，但在欧洲战事爆发后，这条贸易通道因众所周知的原因已不复存在。\n既然如此，何必将视野局限在欧洲？亚洲、非洲、美洲——这些地区的市场正张开双臂欢迎我们。"
 SOV_fund_industrial_rejuvination: "资助产业复兴"
 SOV_fund_industrial_rejuvination_desc: "尽管现代俄罗斯工业已不像上世纪90年代那样一败涂地，但产业规模仍无法与美国媲美，更遑论中国。苏联解体及随之而来的私有化进程对俄罗斯工业潜力造成了不可逆的损害，虽然我们已实现部分复苏，但欧洲战事仍暴露出我们的软肋。\n当务之急是推动苏联时期民用与军工企业的复兴。"
 SOV_business_as_usual: "照常营业"
 SOV_business_as_usual_desc: "俄罗斯经济历经沉浮——动荡的九十年代、辉煌的千禧之年、迷雾重重的二十一世纪一十年代。而今穿越欧陆战火与雷霆，我们顶住重重制裁屹立不倒。资源财富重新汇入国库，人民安居乐业。我们已重获2020年后曾失落的珍宝：稳定与繁荣。\n\n万物皆循常轨。一切恰如其分。"
 SOV_special_economic_zones: "经济特区"
 SOV_special_economic_zones_desc: ""
 SOV_guarantee_social_security: "增进社会保障"
 SOV_guarantee_social_security_desc: "由于体制的特殊性，社会领域既是俄罗斯的重要支柱，也是我们的软肋。医院人手不足，养老金微薄，民众仍在承受不公与官僚主义之苦。\n我们必须将最先进的技术融入社会体系：数字化改革、神经网络应用以及其他惠及民生的革新。权力源于人民，也应当为民所用。"
 SOV_modernize_the_cities: "城市现代化"
 SOV_modernize_the_cities_desc: ""
 SOV_renovate_education_facilities: "教学设施翻新"
 SOV_renovate_education_facilities_desc: "苏联解体后的俄罗斯教育体系仍存诸多不足：官僚主义盛行、师资力量短缺、薪资水平低下，加之教师职业尊严几乎丧失——这一切都令年轻从业者对教育行业望而却步。现状已不容延续，培育新一代是关乎国家命脉的重要使命。\n增加大中小学入学名额、提高教师薪酬待遇、减轻教师工作负荷，这些举措将助力俄罗斯教育体系走出困境。俄罗斯的振兴始于细微之处！"
 SOV_dominate_the_oligarchs: "俄罗斯资本纪元"
 SOV_dominate_the_oligarchs_desc: ""
 SOV_support_private_initiative: "支持私营企业"
 SOV_support_private_initiative_desc: ""
 SOV_reform_central_bank: "央行改革"
 SOV_reform_central_bank_desc: ""
 SOV_restructure_state_corporations: "改造国家政区"
 SOV_restructure_state_corporations_desc: ""
 SOV_reinforce_economic_nationalism: "支持经济民族主义"
 SOV_reinforce_economic_nationalism_desc: ""
 SOV_russian_heyday: "俄罗斯兴盛"
 SOV_market_supremacy: "市场至上"
 SOV_market_supremacy_desc: "在俄罗斯巩固政权本非易事，我们也无另起炉灶之必要。当务之急是大幅扩张经济规模，既要支撑新兴经济集团，又要承接南半球新兴经济体的增长动能。放松监管、降低税负、政府扶持——为维系我们的霸权，一切皆可。"
 SOV_russian_way_to_capitalism: "俄式资本主义"
 SOV_russian_way_to_capitalism_desc: "当经济增长的核心要义：人民福祉未得到真正关切时，我们为何要执迷于GDP或增长指标？长久以来，俄罗斯企业集团与普通民众严重脱节，而美国模式亦非理想典范。我们不应盲目追求持续增长，而须确保经济体系可持续且以人为本。俄罗斯将为资本主义治理模式开辟新径，这才是真正的\"劳动者理想\"！"
 SOV_give_free_rein_private_initiative: "支持中小企业"
 SOV_give_free_rein_private_initiative_desc: "我们的中小企业急需财政援助。在战争期间，我国的民用经济遭受了重大打击，除大型企业外，其余企业仍在艰难恢复之中。我们的政府将投资于我们的企业家群体，以此确保我国产业持续发展，并使之保持竞争力。"
 SOV_creation_business_committees: "成立商业委员会"
 SOV_creation_business_committees_desc: "与欧美经济体相比，我国企业……往好了说也是太过草台班子。我们缺乏西方成熟的股东文化，连最基本的业务委员会制度都未获重视。为确保经济持续保持巨头地位，必须引入西方的公司治理模式。"
 SOV_encourage_competition_banking_market: "鼓励公平的市场竞争"
 SOV_encourage_competition_banking_market_desc: "根据当前形势，我国大型企业普遍缺乏活力。尽管我们有意效仿苹果公司这类美国企业的市场统治地位，但中式的企业协作模式在我国实践中可能更具实效性。通过企业间持续的项目协作，我们将确保繁荣成果普惠全体俄国国民。"
 SOV_economic_expansion_europe: "在欧洲经济扩张"
 SOV_economic_expansion_europe_desc: "我们何必局限于俄罗斯一隅？欧陆大地半壁江山尽在我手，经济发展注定持续上行。欧洲盟友必将乐见我国的投资与企业红利。最妙之处在于，他们根本没有拒绝的余地。"
 SOV_russian_economic_giant: "俄罗斯经济巨人"
 SOV_russian_economic_giant_desc: "我们乃是欧洲自一战以来未曾得见的庞然巨兽——真正意义上的欧陆霸主。但我们绝不会止步于此，既然中国与太约各自坐拥庞大市场，我们又何尝不能与之争锋？作为最适宜商业发展的国度，我国企业家必将铸就未来数十载的霸主地位。"
 SOV_new_economic_ecosystem: "新经济生态系统"
 SOV_new_economic_ecosystem_desc: "长期以来，我们一直实行着国家资本主义的经济制度。然而，若要将我们的经济转变为更以人为本的模式，便需要自下而上地加以保障。我们将努力让非国有企业实体信任我们的改革，并确保他们遵守规则。"
 SOV_promote_economic_transformation: "推动经济转型"
 SOV_promote_economic_transformation_desc: "构建多元化经济体系，对大企业实施更趋进步的累进税制，充分运用现代科技成果确保运转效能。当然，唯有实现数字化进程才能达成这一目标，新经济奇迹绝不会诞生于固守世纪初陈旧商业思维的土壤之中。"
 SOV_support_management_of_future: "支持未来管理"
 SOV_support_management_of_future_desc: "正如经济整体需要转型，我们的管理阶层也必须与时俱进。要摆脱机械运转中的冰冷齿轮形象，转型为高效问题解决者。他们必须善用现代技术手段，减少对纸质文件的依赖，更应推进岗位数字化进程以压缩文书工作时间，让管理效能真正实现质的飞跃。"
 SOV_mutually_beneficial_economic_union: "互惠经济联盟"
 SOV_mutually_beneficial_economic_union_desc: "我们所掌控的\"经济圈\"固然可专用于谋取本国经济利益，但真有这个必要吗？我们已是集安组织与新经济领域的实际主导者。无需效仿殖民宗主国模式主宰欧洲市场，正如我们在国内确保互利共赢，与欧洲盟友亦应构建互惠关系。唯有保障盟友同我们齐头并进的竞争力，经济圈整体方能实现共同繁荣。"
 SOV_formation_communitarist_economy: "形成社群主义经济"
 SOV_formation_communitarist_economy_desc: "俄罗斯正在经历转型。我们要构建民享民治的经济体系，让企业在提升市场价值的同时，更加重视消费者权益。尽管这一进程从长远看或许脆弱难续，但我们的使命就是将其铸就为坚实可持续的发展道路。我们无需效仿美中两国主导世界经济的老路，只需确保自身繁荣昌盛。俄罗斯高于一切！"
 SOV_develop_innovation: "研发创新"
 SOV_develop_innovation_desc: "在现代经济竞争中立足，仅凭规模数据远远不够。实现未来发展目标需要创新突破、技术革新以及高素质人才队伍。俄罗斯从不缺乏能人异士，关键在于为他们的奋斗事业提供鼎力支持。"
 SOV_reduce_pressure_business: "减轻企业压力"
 SOV_reduce_pressure_business_desc: "何必制定如此繁复的法规？我们绝不能重蹈欧盟覆辙——过度监管终将扼杀经济活力。俄罗斯经济唯有持续增长，绝不容许停滞！"
 SOV_restructure_tax_system: "重组税收制度"
 SOV_restructure_tax_system_desc: "不可否认，俄罗斯当前的税收体系仍不尽如人意——无论对企业还是普通公民而言。它漏洞过多，其间还充斥着陈旧的机制，要让俄罗斯在未来数十年保持繁荣，我们必须建立符合现代标准的税收体系。"
 SOV_develop_alternative_investment_mechanisms: "发展另类投资机制"
 SOV_develop_alternative_investment_mechanisms_desc: "遗憾的是，俄罗斯民众始终对投资机构抱有疑虑。长期以来，人们更习惯将资金投入房产而非股市。我们需要开辟更加便捷的投资途径，让俄罗斯以平等姿态跻身现代市场！"
 SOV_transparent_state_corporations: "国有企业透明化"
 SOV_transparent_state_corporations_desc: "得益于经济数字化进程，我们终于能实现税务部门自成立以来的终极理想——构建完全透明的经济体系。长久以来，某些国企将资金挥霍于无用之事却又伸手索要更多拨款的行径屡见不鲜。如今随着财务数据全透明化，这类操作将愈发难以遁形。俄罗斯不需要挥霍无度之徒，若有人企图窃取我们的财富，政府与人民都将洞若观火。"

 SOV_expose_russian_dissident_neo_nazism_desc: "西方人利用我们的异见人士，愚蠢地把他们当作民主自由的圣人，而他们的历史却反映了他们所珍视的其他价值观——排外主义、种族歧视和新纳粹主义。这些观点不仅在俄罗斯，在西方也是受人鄙视的，但却被他们选择性地遗忘了，我们会帮助他们想起来这些。\n这也能帮助我们向人民展示，为\"西方价值观\"奋战的\"俄罗斯人\"究竟是什么货色。"

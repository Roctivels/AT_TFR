 russia.895.t: "加里宁格勒州长"
 russia.895.d: ""
 russia.895.a: "一位非常有趣的人物……让他离克里姆林宫近些。"
 russia.895.b: "他应该留在他的现任岗位上。"
 russia.896.t: "图拉来士"
 russia.896.d: ""
 russia.896.a: "他精力充沛，深受欢迎，克里姆林宫需要这样的能人。"
 russia.896.b: "他应该留在他的现任岗位上。"
 russia.897.t: "骄傲的车臣人"
 russia.897.d: ""
 russia.897.a: "尽管他有些……\"怪癖\"，但谁也无法否认他办事效率惊人。"
 russia.897.b: "我们应该把他留在车臣。"
 russia.898.t: "忠诚之人"
 russia.898.d: ""
 russia.898.a: "这位人物确实了不起！暂且不论他那些阴谋论，我们确实需要这样的强干之才。"
 russia.898.b: "他太忠诚了，不合我的口味。"
 russia.899.t: "有远见的经济学家"
 russia.899.d: ""
 russia.899.a: "他能在经济事务管理方面协助我们，为民众创造更繁荣的生活。"
 russia.899.b: "呃，对中央银行问题的关注过度了。"
 russia.900.t: "图瓦日落"
 russia.900.d: "克孜勒是图瓦的首都，图瓦则又是旧联邦里最穷的地区。多年来领导着俄军的绍伊古大将是土生土长的图瓦人，他的家乡对此也一直引以为豪。但除此之外，图瓦人这些年来似乎就再也没有什么可供骄傲的了。年轻人学习自己本地语言的兴趣与日俱减，反倒是更乐意去学俄语，或者是更西边他们要去打工的那些国家的语言。\n\n落日一如往昔，降临图瓦大地，俄罗斯的三色旗已有数月未曾在学校升起了。萨尔恰克像平常一样放学回家，他一边等着妹妹拉丽莎赶上来，一边轻声哼着小曲——她放学总是有些晚的。拉丽莎跟了上来，脸上还挂着灿烂的笑容，萨尔恰克自然也看在眼里。\"啥事让你这么开心呢？\"他问到。\n\"老师告诉我不用再学俄语啦！我只用专心学图瓦语就好！好像是莫斯科那出台了什么新规定！\"拉丽莎用愉快的语气说着。萨尔恰克陷入了沉思，他曾目睹了又一个独裁者入主莫斯科，这也不由得让他回想起曾经在学校中学到的历史。从古至今，所有独裁者要么对图瓦极尽剥削，要么对其弃之不顾。他自然认为杜金也不例外。\"杜金想让我们学图瓦语？你们老师这么跟你们说的？\"萨尔恰克问到。\"是啊！\"拉丽莎笑着回答。\"你不是一直都学不好俄语么。\"\n也许，图瓦还是有未来的。"
 russia.900.a: "就像杜金的作品所预言的那样。"
 russia.901.t: "第四政治理论"
 russia.901.d: "欧亚主义长久以来仅停留在俄罗斯的外交政策层面与杜金本人的哲学论述中，但治理现实迫使这位思想家在莫斯科的办公室里沉思：该如何重塑国家行政体系？旧联邦制虽力有不逮，却多少顾及了俄罗斯境内少数民族的权益。杜金独坐案前追忆往昔——当年与利莫诺夫共同创立民族布尔什维克党的岁月定义了九十年代，其著作更吸纳了众多保守阵营追随者。历史长卷向他展开无数治理范式，但最终只能择其一，而这或许将打破党内派系间的微妙平衡。\n\n杜金召来挚友、心腹与发妻，办公室内的讨论持续数小时。三种构想逐渐明晰：其一偏向民族布尔什维克阵营，复兴\"准苏维埃体制\"——这种制度若由适当人选主导，既能高效运作，亦可给予欧亚各民族适度自治；其二是借鉴沙皇时代的总督制，由莫斯科中央政府任命代表地方利益的总督，构建\"中央集权式联邦制\"；其三则主张对旧联邦制度进行改造，在保障欧亚各民族语言与土地权利的前提下，探索自治与集权的新平衡点——毕竟以杜金及其立法团队之能，完全可独创全新体系。\n\n临时会议散会后，杜金仍需独自面对这场行政改革的风暴眼。千钧重担，终系一人之决断。"
 russia.901.a: "杜金的思绪在可能性之上翩翩起舞。"
 russia.902.t: "皇储丑闻"
 russia.902.d: "-\"这简直是十足的恶棍行径，尤其是罗斯季斯拉夫亲王！\"客人说道，\"他可是罗曼诺夫皇帝的儿子——那位德高望重的君主啊！您猜他们干了什么？他们不知从哪儿弄来一头熊，塞进马车里就载着去找女演员们！警察赶来制止时，他们竟逮住区警察，把他背靠背捆在熊身上，连人带熊推进了莫伊卡河！熊在水里扑腾，警察就骑在熊背上！\"\n-\"亲爱的，这区警察的造型可太妙了！\"伯爵笑着喊道。\n-\"天哪！这有什么可笑的，伯爵？\"\n尽管语气责备，在场的女士们仍忍不住掩嘴轻笑。\n\"纳西拉费了好大劲才救下那倒霉蛋！\"客人继续说道，\"堂堂皇储竟用这种‘聪明’法子取乐！\"（压低声音）\"亏外头还总夸他教养出众、才智过人呢……\""
 russia.902.a: "沙皇不予置评，宰相也缄口不言。"
 russia.902.b: "沙皇介入并发表了严厉的声明！"
 russia.903.t: "沙皇在贵族中的声望正在下降"
 russia.903.d: "……安娜·帕夫洛夫娜依然定期举办着那种唯有她独具慧眼方能操办的沙龙晚会——在这些被水晶吊灯照得透亮的夜晚，彼得堡真正上流社会的精华，首都知识界的至臻之花便会如行星环聚恒星般汇集于她的客厅……\n这场微型宫廷剧场的政治晴雨表此刻正指向敏感刻度……在安娜·帕夫洛夫娜的娴熟引导下，话题正滑向圣彼得堡精英阶层对沙皇陛下的微妙态度……"
 russia.903.a: "沙皇宣布与贵族们举行盛大的集会。"
 russia.903.b: "让他们闭嘴。"
 russia.904.t: "罗斯季斯拉夫沙皇被捕"
 russia.904.d: ""
 russia.904.a: "现在，我们要选出一位真正可敬的沙皇。"
 russia.905.t: "第二届缙绅会议"
 russia.905.d: ""
 russia.905.a: "米哈伊尔三世！"
 russia.905.b: "尼古拉三世！"
 russia.905.c: "阿列克谢二世！"
 russia.906.t: "未使用"
 russia.906.d: "未使用"
 russia.906.a: "未使用"
 russia.907.t: "康斯坦丁·马洛费耶夫建立东正教高级中学网络"
 russia.907.d: "近日，俄罗斯知名金融家、枢密院官员兼传统价值观倡导者康斯坦丁·马洛费耶夫在帝国巡行期间，于各省地方城镇陆续创立新型高级中学。这些教育机构沿袭其2006年创办的圣巴西尔大高级中学模式，以\"向学生传授深厚的知识，向他们灌输崇高的道德理想，培养以民族历史为荣、热爱俄罗斯并在未来为国家利益服务、代表俄罗斯新精英的人才\"为办学宗旨。沙皇陛下对此举表示赞许，并寄语所有未来学子学业有成。"
 russia.907.a: "嚯。"
 russia.908.t: "亚历山大一世学园重新向学生开放"
 russia.908.d: "在革命前的旧帝俄时代，亚历山大一世学院堪称帝国真正国家精英的摇篮。其学生成为了杰出的军官、外交官、官员，甚至诗人和作家。国家需要人才和可靠的人员储备，于是从青少年时期就开始培养他们为自己服务。如今我们面临着同样的问题：国家疆域辽阔，需要忠诚且合格的干部队伍。既然如此，我们何不复兴这一光荣传统呢？"
 russia.908.a: "我们何时才能看到新的普希金？"
 russia.909.t: "地方自治自由运动复兴"
 russia.909.d: "亚历山大二世行政改革后不久兴起的地方自治自由运动，成为近期地方自治机构复兴过程中重现的另一显著特征。尽管该运动本质上成分复杂，但所有成员在几个关键问题上达成共识：国家需要行政分权、放宽审查制度以及提高公众对国家事务的参与度。诚然，有人认为正是政府与地方自治机构之间的冲突导致了第一次革命，但我们确信已从前帝国的错误中汲取教训，此类悲剧绝不会重演。"
 russia.909.a: "不赖。"
 russia.910.t: "政治正确模仿秀"
 russia.910.d: "俄罗斯帝国的辉煌往昔——我们曾经拥有，如今又夺回的一切：\n1.战场上的枪支由奶泡铸成，既能御敌，又可充饥。\n2.地心引力仅有今日的八成，人们轻快奔跑，顷刻之间便能在官阶表上跃升五级。\n3.人类寿命悠长，动辄活至150乃至190岁，世间无病无痛，唯有贪恋甜点才会染疾。\n4.若不慎在街头跌倒，商贾们会蜂拥而至，将金币塞入你的口袋，亲吻你的双唇，递上醇厚的美酒，恳请你迎娶他们的女儿。\n5.野兔与山鹑不待追捕，便自愿跃入煎锅，面包附赠伏特加，哪怕是最不起眼的水洼，都可能跃出硕大的鲟鱼，直入你的炊锅。\n6.人们在深夜被虔诚的祈祷声唤醒，晨曦初露，便倾城前往东正教堂。\n7.胎儿仅孕育4.5个月便呱呱坠地，个个金发碧眼，面容刚毅，目光深邃，如天生注定将远赴圣彼得堡求学。\n8.伏尔加河甘甜如糖浆，叶尼塞河奔流的竟是浓醇黑啤。\n9.寒冬腊月，气温骤降至零下300度，而人人面色红润，精神抖擞。\n10.军屯之中，士兵生来便如掷弹兵般魁伟；掷弹兵伟岸如禁卫军，禁卫军身形如骏马，而骏马之庞大，可与乌拉尔的冶金厂相匹敌。在这座庞然巨物中，农民们按照伊万诺夫的规则玩杜拉克，仅一轮，便可决出胜负！"
 russia.910.a: "太棒了！"
 russia.911.t: "普及圣彼得堡式建筑风格"
 russia.911.d: "圣彼得堡被称为\"北方帕尔米拉\"并非徒有虚名。这座不仅是欧洲乃至全世界最美丽的城市之一，始终吸引着文艺创作者的目光。普希金的《青铜骑士》、费奥多尔·米哈伊洛维奇·陀思妥耶夫斯基的多部小说以及其他众多作品都向彼得之城致敬。如今市政官员中正兴起新时尚：拆除布尔什维克时期建造的\"样板房\"和\"简易楼\"——这些对艺术与城市规划犯下的真正罪行，代之以更赏心悦目的建筑：低层圣彼得堡风格住宅，它们更适合新生的俄罗斯帝国。"
 russia.911.a: "太好了！"

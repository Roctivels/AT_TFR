 party_SOV_national_patriots_tt_long: "£GFX_national_patriots_texticon §8民族爱国会议§!\n\n\n\n\n£GFX_SOV_national_patriotism_banner\n\n\n\n\n\n\n§g民族爱国会议的成员包括来自统一俄罗斯党的资深政治家、退役军官以及各类军事人物。在他们看来，俄罗斯必须强大才能在这个动荡时代生存下去。他们密切关注军事领域，并经常批评他们认为的政治氛围中存在过度自由的现象。§!"
 party_SOV_reformers_tt: "加强£GFX_reformers_texticon §y十一月四日俱乐部§!\n\n[!party_SOV_reformers_icon_click]"
 party_SOV_reformers_tt_long: "£GFX_reformers_texticon §y十一月四日俱乐部§!\n\n\n\n\n£GFX_SOV_club_november_banner\n\n\n\n\n\n\n§g十一月四日俱乐部是统一俄罗斯党的自由派阵营，同时包括新人民党及若干具有国家倾向的自由派经济学家。其政策核心在于为活跃的商业领域打造一个\"机遇之国\"。他们致力于改善私营企业的经营环境，但同时存在着削弱个人自由保障的政策倾向。§!"
 party_SOV_populists_tt: "加强£GFX_populists_texticon §g爱国人民阵线§!\n\n[!party_SOV_populists_icon_click]"
 party_SOV_populists_tt_long: "£GFX_populists_texticon §g爱国人民阵线§!\n\n\n\n\n£GFX_SOV_populists_banner\n\n\n\n\n\n\n§g爱国人民阵线是一个主张还政于民的政治派别，但其理念建立在威权治理模式认知基础之上，同时强调保留总统权力杠杆。该阵线在思想上呈现融合特质，当其认为某些政治平台的主张有助于维护社会稳定与民生福祉时，他们会主动寻求与不同意识形态平台开展合作。§!"
 party_SOV_soviet_revivalists_tt: "加强£GFX_soviet_revivalists_texticon §R俄罗斯社会力量大会§!\n\n[!party_SOV_soviet_revivalists_icon_click]"
 party_SOV_soviet_revivalists_tt_long: "£GFX_soviet_revivalists_texticon §R俄罗斯社会力量大会§!\n\n\n\n\n£GFX_SOV_soviet_revivalists_banner\n\n\n\n\n\n\n§g俄罗斯社会力量大会是旧社会劳动平台经改组后的激进延续，吸纳并强化了亲苏联立场的经济学家与历史学家阵营。该组织主张以更激进但保持理性的方式复兴苏联时期的实践经验，并将苏联定义为帝国。§!"
 party_SOV_kadyrovites_tt: "加强£GFX_akhmat_texticon §7卡德罗夫效忠派§!\n\n[!party_SOV_kadyrovites_icon_click]"
 party_SOV_kadyrovites_tt_long: "£GFX_akhmat_texticon §7卡德罗夫效忠派§!\n\n\n\n\n£GFX_SOV_kadyrovites_banner\n\n\n\n\n\n\n§g阿赫马特派主要由车臣人员及卡德罗夫亲信构成，同时吸纳了来自其他地区的支持者。该派具有强烈的个人崇拜、军事化与宗教化特征，强调绝对忠诚，主张对所谓威胁\"俄罗斯各民族友谊稳定性\"的群体实施严刑峻法。§!"
 party_SOV_z_patriots_tt: "加强£GFX_z_patriots_texticon §9极端爱国者§!\n\n[!party_SOV_z_patriots_icon_click]"
 party_SOV_z_patriots_tt_long: "£GFX_z_patriots_texticon §9民族爱国运动§!\n\n\n\n\n£GFX_SOV_z_patriots_banner\n\n\n\n\n\n\n§g民族爱国运动由极端忠诚派、阴谋论者及众多围绕叶夫根尼·费奥多罗夫及“民族解放运动”集结的民族爱国者组成。该组织奉行军事化立场，持续鼓吹俄罗斯必须为“胜利”和摆脱“隐性控制”不惜一切代价。§!"

 party_SOV_left_statists_tt_long: "£GFX_left_statesmen_texticon §s社会劳动平台§!\n\n\n\n\n£GFX_SOV_social_labour_banner\n\n\n\n\n\n\n§g社会劳动平台由统一俄罗斯党的社会左翼成员、大量公正俄罗斯党成员以及经济左翼专家组成。该组织旨在建立一个福利国家，既汲取苏联历史的根基，又融入新理念并兼顾俄罗斯的国情特点。§!"

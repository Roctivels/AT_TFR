 russia.1500.t: "重返瑞瓦肖"
 russia.1500.d: "塔林的空气中，弥漫着烟尘、石灰与海盐的气息。座堂山上，炮火的痕迹依然清晰可见。一幅红旗，如今正飘扬在昔日的议会大厦上空。苏军解放爱沙尼亚至今，才过去短短几周。而库尔维茨，这位受命引领共和国复兴的人，也终于踏上了故土——这一次，不再是以流亡者的身份，而是以胜利者的姿态。Za/UM工作室又归他所有——那些曾夺走他的名姓、窃取他的成果的人，如今正肃立在人民法庭的面前。爱沙尼亚现已归于苏维埃治下，建立了人民政府，处处是和平与正义的口号。\n然而，库尔维茨却在街头默然行走。那场他曾如歌谣般信仰的革命，并非乘着诗人的柔软靴履而来，而是踏着俄罗斯的刺刀、裹挟着尘土与鲜血而至……但是，在每一座被毁的屋舍后，他都看见了孩童的笑脸。他听见老妇人正为了一块面包，而向士兵道谢。他看见年轻人正将\"平等\"的标语，挂上墙垣。\n这个国家依然需要他。\n​这场革命依然需要他。\n​这些正重新学着如何去梦想的人民，依然需要他。"
 russia.1500.a: "我们容不得丝毫差池。"
 russia.1501.t: "党的和谐"
 russia.1501.d: "过去三十年间，两条并行不悖的选人用人路线围绕着党中央的运动交织前行：其一是官僚机构的润滑油，铸就决策秩序的锻造者；其二是人民的引路人，将红旗插进群众心间的擎旗手。\n\n这绝非所谓\"官僚\"与\"人民\"、\"中央\"与\"基层\"的简单标签，每位同志的评价皆经代表大会确认的功绩有关。而进入中央委员会的根本原因：有人精于政党机器的运作，是重大决策枢纽的掌控者，是谈判协商与幕后协调的组织家；有人则是人民的鼓动者，\"从田野中来\"的宣传家，思想战役的前线指挥，群众基础的筑基人。\n\n自由派媒体总在聒噪什么分裂传言，仿佛共产主义者即将分崩离析，但我们深知真相——这不是分裂，而是民主集中制框架内的健康讨论。我们笑看敌人将我们妖魔化、庸俗化、以己度人的拙劣小说，而这只会反证党的不朽生命力。"
 russia.1501.a: "开工吧！"
 russia.1502.t: "发起竞选运动"
 russia.1502.d: "重组后的最高苏维埃首次选举日期公布，共产党正面临选举运动方向的抉择。\n\n党内\"官僚\"派主张以总统形象作为竞选核心，强调其作为我们社会主义国家公民权利与自由保障者的角色。\n\n而活动家们则提议采用民主口号作为武器，这定能在青年群体中收获成效。\n\n我们亦可选择折中方案，着重强调社会主义与平等理念，这样既能满足\"机关干部\"的需求，也能获得活动家们的认同。"
 russia.1502.a: "让我们专注总统竞选！"
 russia.1502.b: "让我们强调社会主义和平等！"
 russia.1502.c: "用民主口号武装你自己！"
 russia.1503.t: "民主左翼\"进步\"联盟"
 russia.1503.d: "民主左翼\"进步\"联盟首次代表大会于莫斯科召开，这一广泛联盟汇聚了从社会民主主义者到无政府主义者的各色左翼力量。联盟领袖马克西姆·舍甫琴科在开幕致辞中，将组织的创立称为\"左翼运动及俄罗斯民主发展的重要里程碑\"。尽管集结了持不同政见的庞大群体，该党仍总结出了一份纲领，着重强调劳动者权益与民主建设。"
 russia.1503.a: "有趣……"
 russia.1504.t: "劳动者祖国"
 russia.1504.d: "俄罗斯政坛被一则消息震动：弗拉基米尔·克瓦奇科夫联合其他左翼爱国组织领袖，共同宣布\"劳动祖国\"党成立。该党主张左翼民族主义立场，其大量成员系由右翼人士转型——在新政府背景下\"重生\"为左翼。尽管目前规模有限，但他们可能在民众中产生一定影响力。"
 russia.1504.a: "有趣……"
 russia.1505.t: "人民阵线"
 russia.1505.d: "近日获释的政治犯阿列克谢·纳瓦利内在其频道发布题为《人民阵线》的视频，在俄语观众中引发热议。这位政治家宣布组建同名议会联盟，并阐明\"如今统一俄罗斯党的统治地位已被打破，影响国家发展的前所未有机遇必须把握住\"。他呼吁民众前往投票站，为人民阵线的领导人投票。该联盟成员既包括前非体制反对派人士，也涵盖普京政府中的部分\"体制内自由派\"。"
 russia.1505.a: "有趣……"
 russia.1506.t: "我党的候选人"
 russia.1506.d: "统一俄罗斯党败选后，其前官员们各奔东西：有人加入各类反共团体，有人彻底退出政坛。但如今全俄选举临近，多数老统一俄罗斯党成员正申请代表共产党参加地区级竞选。\n\n这些人具备能力和威望，若加以善用，可有效增强地区影响力。但此举可能引发意识形态战友的不满——他们主张只提名坚定可靠的共产党员。虽存在折中方案，但即便竭力求全，仍非易事。"
 russia.1506.a: "只需要值得信赖的同志！"
 russia.1506.b: "我们需要一种温和的选择"
 russia.1506.c: "让我们尽可能务实地解决这个问题……"
 russia.1507.t: "世上首善之城"
 russia.1507.d: "新一届地方苏维埃选举即将举行，原属联邦管辖、现归共和国辖制的城市也不例外。列宁格勒与塞瓦斯托波尔的候选人名单已明朗且达成共识，而莫斯科的选择则显得模糊许多。\n活动家们正积极推动提名瓦列里·拉什金——尽管他曾因多起丑闻（特别是\"驼鹿事件\"）失势，他在共产党内部仍保有相当声望。\n\n较为保守的官僚派则支持列昂尼德·久加诺夫，这位党内重要人物同时是党主席的孙子。年轻血液加上显赫姓氏，使他极有可能当选莫斯科市苏维埃主席。\n\n折中方案则聚焦于瓦季姆·库明，这位曾于2018年获俄共提名的莫斯科市长候选人，如今以其影响力赢得了机关干部与活动家群体的共同认可。"
 russia.1507.a: "瓦列里·拉什金！"
 russia.1507.b: "瓦季姆·库明！"
 russia.1507.c: "列昂尼德·久加诺夫！"
 russia.1508.t: "我的祖国广袤无垠……"
 russia.1508.d: "苏联曾赋予我国诸多民族自治权，这些自治实体在联邦框架内得以保留。目前各小型自治共和国局势平稳，但车臣与鞑靼斯坦的情况则较为复杂。\n\n诚然，我们可以将其与其他自治共和国置于同等地位，但考虑到两地居民以原住民族为主，且在近现代史上存在通过不同方式争取独立的先例，建议暂时维持它们在俄罗斯苏维埃联邦社会主义共和国内的特殊地位。"
 russia.1508.a: "让它们与其他共和国平等！"
 russia.1508.b: "暂时保留他们的特殊地位……就先这样吧。"

 SOV_consolidate_russian_society: "§7巩固§!俄罗斯社会"
 SOV_consolidate_russian_society_desc: "\n\n\n\n\n£GFX_SOV_consolidate_russian_society_banner\n\n\n\n\n\n巨蛇终将伏诛，\n我辈浩浩汤汤，焉能不胜，\n皆为新俄罗斯之雄师劲旅。\n天堂为我等敞开，地狱则为彼辈备下，\n至高无上的营长如是说道。\n来自车臣，图瓦，莫斯科，哈尔齐斯克的Z字英雄们。\n来自赤塔，顿河畔罗斯托夫，诺里尔斯克的Z字英雄们。\n齐聚于塞瓦斯托波尔，卡斯皮斯克的Z字英雄们。"
 SOV_rekindle_anti_maidan: "重燃反颜色革命运动"
 SOV_constitution_russian_voting: "全俄宪法修正案投票"
 SOV_constitution_russian_voting_desc: "\n\n\n\n\n£GFX_SOV_constitution_referendum_banner\n\n\n\n\n\n弗拉基米尔·普京已经决定，是时候终结外部势力对我国的干涉了。他的第一步便是通过一系列宪法修正案，以巩固我们的主权和独立。\n尽管这一举措出于高尚的初衷，但在俄罗斯内部，许多人将其视为一种专制的权力集中手段，甚至认为这是普京为自己长期执政而设的法律漏洞。\n尽管绝大多数人仍会投下支持票，但若我们的支持率无法表现出足够的统一，那么反弹可能会极其§R严重§!。"

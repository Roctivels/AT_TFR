 russia.1517.t: "共青团第一书记"
 russia.1517.d: ""
 russia.1517.a: "米哈伊尔·克里姆列夫"
 russia.1517.b: "弗拉基米尔·伊萨科夫"
 russia.1519.t: "第29届党代会"
 russia.1519.d: ""
 russia.1519.a: "让我们行动起来吧，同志们。"
 russia.1520.t: "劳动力短缺！"
 russia.1520.d: "我们推行的工业加速发展政策，意外地催生了一个隐性问题：几乎所有熟练技术工人都已被建筑业吸纳，这为再工业化进程带来了停滞的风险。经济学家提出了若干解决方案：第一种相对简单，但成本较高，即通过提高工人工资和增加福利以吸引更多劳动力；第二种是动用党组织和共青团的资源，以提高劳动生产率；第三种则较不理想却可行，即放缓建设节奏、下调目标至易达标水平，从而释部分放劳动力。每个方案各有侧重、落地亦各有难处，但我们最终决是……"
 russia.1520.a: "提高工资，扩大福利！"
 russia.1520.b: "让党组织和共青团参与进来！"
 russia.1520.c: "是时候结束这一切了……"
 russia.1521.t: "发展路径"
 russia.1521.d: "中小企业扶持计划一经启动，随之而来的就是一个棘手的问题：这笔援助该按什么原则分配？第一种方案略带理想主义色彩，遵循社会国家理念，即援助应优先给予那些最重视并保障员工权益的雇主。第二种方案则更为务实，将资金导向最高效、生产力最强的企业，以期它们能保持快速发展势头。两种方案各有其合理之处，但最终的选择落在了……"
 russia.1521.a: "优先扶持有社会责任感企业！"
 russia.1521.b: "效率至上，先扶持最高效的企业！"
 russia.1522.t: "布哈林纪念碑"
 russia.1522.d: "\"亲爱的观众朋友们，大家好！我们现在正在尼古拉·布哈林纪念碑揭幕仪式的现场。很快，莫斯科市委第一书记将就这一重要事件发表讲话。请别走开！\"\n\n大约半分钟后，这位政治家登上临时搭建的讲台，环视人群，开口说道：\"同志们！直到不久前，还有人认为像约瑟夫·斯大林这样的人物所推行的政策，与中国经验毫不相干，认为支持斯大林的方法就不可能同时拥护市场社会主义的原则。但我坚信，这种观点从根本上就是错误的！同志们，清醒吧：现在不是八十年代，更不是戈尔巴乔夫的经济重组时期，我们不必走向极端！我们必须正视历史、直面真相。正因如此，今天我们在这里为尼古拉·布哈林，这位新经济政策的主要理论家树立纪念碑。我坚信，如果斯大林能看到当代中国社会主义所取得的成就，看到邓小平改革开放的成果，他一定会为布哈林平反。毕竟，我们的国家曾经是社会主义道路上的先行者，而从某种意义上说，他们的成功也正是我们的成功！同志们，感谢大家的关注。我相信，依托这些杰出历史人物的思想遗产，必将助力我们社会主义的建成更近一步！\"话音落下，广场上响起阵阵掌声。现场氛围清楚地表明，他的讲话引起了在场观众的共鸣。\n\n\"感谢莫斯科市委代表带来的精彩发言。现在人群中议论纷纷：有些人完全赞同这位政治家的观点，也有些人激烈争论如此进行历史类比的大胆程度。总而言之，无人置身事外。请继续关注我们，接下来还有更多精彩内容，今天注定是不平凡的一天！\""
 russia.1522.a: "思虑周全、行事干练！"
 russia.1523.t: "新第37届"
 russia.1523.d: "自由派媒体被关于\"斯大林在俄罗斯历史中重获应有地位\"的新闻所震动。谴责\"新斯大林主义\"、\"为残酷镇压辩护\"及斯大林统治时期其他错误的声音从秉持自由主义思想的民众中不断涌出。鲍里斯·卡加尔利茨基在与\"雨\"电视台最近的访谈中被问及对此倡议的看法：\n\n鲍里斯·尤利安诺维奇，共产党最近采取了所谓的\"重新斯大林化\"方针，许多民众对此表示担忧。您认为当前有可能重演斯大林时代的恐怖吗？比如古拉格、大规模镇压、集体化？\n\n我完全不同意！许多人对这一政策的规模夸大其词，赋予了过于负面的色彩，请允许我澄清一下。首先，我们要明白为什么人们至今仍怀念他。对普通民众而言，斯大林是伟大卫国战争的胜利和工业化的象征。正如丘吉尔当时所言：\"他接过的是一个扶木犁的穷国，他留下的是一个有核武器的强国。\"斯大林的形象已深深融入我们的民族意识，成为当今共产党人的优良传统。当然，必须铭记斯大林在1937年统治所带来的苦难。但我们必须将象征与现实案例分开。我了解这些人的做事风格……依我看，这样的担忧是多余的。\n\n很有意思的立场，鲍里斯·尤利安诺维奇！不过，让我们拭目以待，看看您的话会不会只是暴风雨前的平静……"
 russia.1523.a: "千真万确！"
 russia.1524.t: "谈判：[SOV_adl_progress_name_loc]"
 russia.1524.d: "俄罗斯苏维埃联邦社会主义共产党领导层向[SOV_adl_progress_name_loc]发出呼吁，希望结束政治对抗。总体而言，我们并无理由相互对立，因为双方秉持着某种程度相似的理想，但进步派仍对我们保持反对立场。\n联盟的领导人表示不会阻碍缓和进程，并指出停止对该组织的施压将有利于苏联民主形象的提升，但作为交换条件，联盟要求获得更大的政治代表权及活动自由空间。部分党内同志担忧满足这些条件可能引发难以预料的后果，但尽管如此，我们的回应是……"
 russia.1524.a: "我们同意。"
 russia.1524.b: "我们拒绝。"
 russia.1525.t: "谈判：[SOV_peoples_front_name_loc]"
 russia.1525.d: "俄罗斯苏维埃联邦社会主义共产党领导层向人民阵线联盟发出呼吁，希望结束政治对抗。尽管人民阵线许多成员此前曾支持体制外反对派，但在该组织合法化后仍未放弃为理想奋斗。\n其领袖阿列克谢·纳瓦尔尼展现出与政府对话的远见，但联盟同时提出明确要求：包括放松国家对经济的管控、推进政治体制民主化。对此，党内不同派别的共产党员纷纷呼吁审慎对待\"阵线\"组织——他们担忧境外势力渗透风险，以及部分成员与前政权千丝万缕的联系。经过利弊权衡，最终决定……"
 russia.1525.a: "接受提议。"
 russia.1525.b: "拒绝。"
 russia.1526.t: "谈判：[SOV_labor_fatherland_name_loc]"
 russia.1526.d: "俄罗斯苏维埃联邦社会主义共产党领导层向劳动祖国党发出呼吁，要求停止对其活动的破坏。表面看来他们似乎仅站在苏维埃爱国主义立场发言，但深入审视便能发现其激进的斯大林主义与民族主义倾向。\n联盟领导人弗拉基米尔·克瓦奇科夫虽同意休战，但提出明确条件：必须停止对党员的监视活动，并在联盟民族政策中更优先考虑俄罗斯族裔的利益。这些要求遭到共产党内自由派的强烈反对，该派系主张对\"劳动祖国\"的任何倡议保持高度警惕。鉴于各方立场的根本性分歧，我们的决定是……"
 russia.1526.a: "同意。"
 russia.1526.b: "拒绝。"
 russia.1527.t: "谈判：[SOV_ldpr_name_loc]"
 russia.1527.d: "俄罗斯苏维埃联邦社会主义共产党领导层主动提出与自由民主党缓和关系。尽管自由民主党被视为对共产党最敌对的势力之一，但完全断绝对话并非明智之举。\n值得庆幸的是，弗拉基米尔·日里诺夫斯基明智地展现出与共产党合作的意愿。但为启动谈判，他提出明确要求：立即停止对其党员的施压，并终止对该党活动的监控。这些条件在共产党内引发正当的抵触情绪，要求我们采取格外审慎的应对策略。经过激烈而持久的讨论，党中央最终声明.….."
 russia.1527.a: "我们同意。"
 russia.1527.b: "我们拒绝。"
 russia.1528.t: "谈判：[SOV_patriots_party_name_loc]"
 russia.1528.d: "俄罗斯苏维埃联邦社会主义共产党领导层主动提出与苏联爱国社会党缓和关系。平心而论，该党派在对共立场上始终暧昧不清，这很大程度上源于他们对旧体制的怀念情结。\n\n其领袖弗拉基米尔·索洛维约夫展现出进行克制对话的意愿，这为局势缓和带来曙光。作为启动谈判的前提条件，该党要求停止破坏其政治活动，并终止对相关人员的政治压迫。此类主张在共产党内引发强烈抵触，因此最终决策必须慎之又慎。经过多轮磋商，我们的立场最终明确为……"
 russia.1528.a: "我们同意。"
 russia.1528.b: "我们拒绝。"
 russia.1529.t: "[SOV_adl_progress_name_loc]代表大会"
 russia.1529.d: "由各左翼势力组成的松散联盟民主左翼\"进步\"联盟召开第二次代表大会。会议甫一开始便陷入无休止的争吵与对立，最终沦为相互攻讦的闹剧，这个联盟终究难逃分崩离析的命运。\n联盟领袖马克西姆·舍甫琴科宣布辞去职务，随后率众加入\"劳动祖国\"。与此同时，由奥列格·沙因领导的、与俄联邦共产党关系密切的\"社会主义团结\"派系在联盟内部逐渐占据上风。"
 russia.1529.a: "左翼团结得救了。"
 russia.1530.t: "第二届[SOV_adl_progress_name_loc]代表大会"
 russia.1530.d: "由各左翼势力组成的松散联盟民主左翼\"进步\"联盟召开第二次代表大会。会议甫一开始便陷入无休止的争吵与对立，最终沦为相互攻讦的闹剧，这个联盟终究难逃分崩离析的命运。\n联盟领袖马克西姆·舍甫琴科宣布引咎辞职，随后率众加入\"劳动祖国\"。由阿纳托利·戈洛夫领导的、对共产党持强烈敌意的\"社会民主倡议\"在联盟内部占据上风。统一社会党宣布集体退出大会，其绝大多数成员转投共产党麾下。其余派系力量薄弱，已无力制衡社会民主倡议派的扩张。"
 russia.1530.a: "社会民主主义的机会？"
 russia.1531.t: "第二届[SOV_adl_progress_name_loc]代表大会"
 russia.1531.d: "由各左翼势力组成的松散联盟民主左翼\"进步\"联盟召开第二次代表大会。会议甫一开始便陷入无休止的争吵与对立，最终沦为相互攻讦的闹剧，这个联盟终究难逃分崩离析的命运。\n出乎所有人意料的是，\"左翼\"——实为联盟内左翼运动边缘群体的集合体竟掌控了全局。\"统一社会党\"领导层的绝大多数成员转投俄联邦共产党，而\"社会民主倡议\"则整体加入人民阵线。联盟前领袖马克西姆·舍甫琴科拒绝置评，据传已退出政坛。事实上，\"进步\"联盟已名存实亡——除\"左翼\"外，其余派系规模渺小，仅存于纸面之上。"
 russia.1531.a: "左翼运动的又一次分裂……"
 russia.1533.t: "[SOV_cprf_local_leader_state.GetName]地区第一书记党内选举"
 russia.1533.d: ""
 russia.1533.a: "目前而言，经验最重要……"
 russia.1533.b: "领导层需要新鲜血液……"
 russia.1535.t: "[SOV_cprf_local_problem_state.GetName]地区危机"
 russia.1535.d: "在[SOV_cprf_local_problem_state.GetName]地区，一位本地博主制作的视频正引发热议。视频中他尖锐批评了地方当局及联邦机构的工作，详细剖析了当前存在的问题，指责相关部门不作为且缺乏专业性。其中关于[SOV_cprf_local_problem_loc]的片段尤其引发共鸣，当地居民表示博主\"终于说出了大家私下议论已久的心声。\"\n\n我们该如何应对？所有人都在等待中央的回应……"
 russia.1535.a: "好好教训这个寻衅滋事者……"
 russia.1535.b: "惩罚当地党的领导层……"
 russia.1537.t: "大规模抗议！"
 russia.1537.d: ""
 russia.1537.a: "驱散他们的集会！"
 russia.1537.b: "我们得做些让步……"
 russia.1538.t: "党内分裂！"
 russia.1538.d: ""
 russia.1538.a: "我们得做些让步……"
 russia.1540.t: "我们的经济实际"
 russia.1540.d: "今日，苏联共产党中央委员会全体会议于莫斯科的克里姆林宫国会宫召开。会议议程聚焦于全联盟的经济发展问题。讨论期间，中央委员们达成共识，认为国家需要渐进式的经济发展，代表们也随之提出了若干选项。历经数小时漫长而激烈的商议，全会最终决定，苏联经济将走上……"
 russia.1540.a: "国家资本主义。"
 russia.1540.b: "混合经济。"
 russia.1540.c: "左翼法团主义。"
 russia.1541.t: "[SOV_soviet_union_conference_member.GetName]同意！"
 russia.1541.d: ""
 russia.1541.a: "苏维埃政权正日益临近！"
 russia.1542.t: "[SOV_soviet_union_conference_member.GetName]拒绝！"
 russia.1542.d: ""
 russia.1542.a: "看来我们得用麻烦点的方法了……"
 russia.1542.b: "再试试！开出更优厚的条件！"
 russia.1543.t: "改革的未来"
 russia.1543.d: "阿列克谢·纳瓦利内以推动苏联体制向更自由化改革为政治主张赢得年轻一代支持，但其团队内部存在分歧：部分成员主张通过改善民生的温和改革，另一派则呼吁修改宪法以适应新政府架构，并削弱共产党的作用。\n改良派认为无需根本改变苏联体制，通过提升民众生活水平争取民心——这种思路也符合共产党利益。\n而激进方案则主张修改苏联宪法以强化民主党权力，但这必将遭到共产党的坚决反对。\n目前可行的折衷方案是：在立法进程中广泛推进民主党议程，既能巩固纳瓦利内的权力基础，又不会过度激怒苏共。"
 russia.1543.a: "小而意义深远的改革。"
 russia.1543.b: "推进我们的议程"
 russia.1543.c: "我们的计划是要彻底修改宪法！"
 russia.1544.t: "新闻发布会"
 russia.1544.d: "今日，莫斯科举行了苏联共产党中央委员会主席瓦列里·拉什金与苏联总统阿列克谢·纳瓦利内的联合新闻发布会。双方在列宁山重建后的少年宫会晤，重点讨论了政府与共产党关系这一紧迫议题。\n自共产党在2022年选举中获胜以来，该党与纳瓦利内团队的关系持续紧张：人民阵线已成为反苏反对派的主要喉舌。在纳瓦利内通过首届全联盟选举当选总统后，矛盾进一步激化，自由派媒体呼吁废除苏联体制，而党内消息人士则抨击反对派从事反革命活动并崇洋媚外。\n会后两位政治家回答了媒体提问：总体而言会谈在友好氛围中进行，与会者公认其具有建设性。尽管未能解决所有问题，但后续接触的筹备工作已经启动。拉什金与纳瓦利内在总结时呼吁各方加强合作，扩大党政机构间的协作。"
 russia.1544.a: "总有对话的可能"
 russia.1545.t: "塔什干协定签署"
 russia.1545.d: "今天将被历史铭记为俄罗斯与中亚各族人民友好条约签署的日子。庄严的仪式在乌兹别克苏维埃社会主义共和国政府大楼举行——这座建筑应乌兹别克斯坦提议重新启用，以彰显历史象征意义。活动中，中亚各共和国代表与俄罗斯外交官签署了关于回归社会主义联盟纲领的历史性协议。\n签约国代表欢欣宣告各自国家历史掀开新篇章。签署的文件无疑将推动政治经济联盟的进一步巩固。这一事件为俄罗斯在中亚的影响力问题画上了句号。"
 russia.1545.a: "莫斯科的影响力正在扩大。"
 russia.1546.t: "第比利斯宣言签署"
 russia.1546.d: "今天，在第比利斯举行了一场签署俄罗斯与外高加索地区友好条约的仪式。此次活动选择在格鲁吉亚议会大楼举行具有特殊历史意义——这里曾是格鲁吉亚苏维埃社会主义共和国政府所在地。格鲁吉亚以此作为象征性举措，因为第比利斯曾是外高加索苏维埃联邦社会主义共和国的首都，而该共和国正是苏联的创始加盟共和国之一。\n外高加索各国代表与俄方代表共同签署了标志联盟关系恢复的历史性协议。值得关注的是，签约国外交官们对各国历史新篇章都表达了乐观态度。签署的文件最终确认了俄罗斯在高加索地区的地位，并为各国人民共同应对挑战开辟了新道路。"
 russia.1546.a: "苏联的复兴听起来越来越可信了。"
 russia.1547.t: "二十一世纪的社会主义"
 russia.1547.d: ""
 russia.1547.a: "务实、现实、建设性。"
 russia.1547.b: "爱国、以国为本、主权至上。"
 russia.1547.c: "大众化、民主化、先进化。"
 russia.1548.t: "新任意识形态书记？"
 russia.1548.d: ""
 russia.1548.a: "叶夫根尼·斯皮辛！"
 russia.1548.b: "鲁斯特姆·瓦希提夫！"
 russia.1548.c: "诺维科夫办事我放心......"
 russia.1549.t: "加入联盟！"
 russia.1549.d: "随着俄共在选举中获胜，俄罗斯的工人权益保护体系也逐渐开始向苏联模式回归；全俄中央工会理事会的组建工作随之启动。然而，具体的实施原则尚未敲定，目前摆在面前的有两个选项。\n\n​第一个选项是倚重俄罗斯独立工会联合会，该组织是旧有全俄中央工会理事会的继任者。此选项的优势在于，独工联早已深度融入了国家与企业体系，这意味着重组工会系统的过程将更为简便，成本也更低廉。\n第二种方案，则是以俄罗斯劳工联合会为基础，重新建立一张由独立工会组成的网络。虽然此举所需经费高于对国营工会的资助，但它能确保劳动者权益得到真正的保障，使任何一名工人都不会被遗忘于体制之外。"
 russia.1549.a: "选择俄罗斯独立工会联合会。"
 russia.1549.b: "选择俄罗斯劳工联合会。"
 russia.1550.t: "[SOV_adl_progress_name_loc]得到劳工联合会支持！"
 russia.1550.d: "俄罗斯劳工联合会是全国最大的独立工会联合体，而它是否支持某一政党的问题，今日终于尘埃落定。由[SOV_adl_progress_name_loc]在此议题上率先发起倡议，工会方面选择支持他们，而非共产党，并以\"在维护工人权益斗争中投入更深\"为理由。此举虽非致命打击，却无疑对我们的政府的支持基础造成了相当程度的冲击。"
 russia.1550.a: "这些工会蠢货。"
 russia.1551.t: "[SOV_peoples_front_name_loc]得到劳工联合会的支持！"
 russia.1551.d: "俄罗斯劳工联合会是全国最大的独立工会联合体，而它是否支持某一政党的问题，今日终于尘埃落定。由[SOV_peoples_front_name_loc]在此议题上率先发起倡议，工会方面选择支持他们，而非共产党，并以\"在维护工人权益斗争中投入更深\"为理由。此举虽非致命打击，却无疑对我们的政府的支持基础造成了相当程度的冲击。"
 russia.1551.a: "这些工会蠢货。"
 russia.1552.t: "艺术家们的革命"
 russia.1552.d: "今天，柏林主办了本年度最受瞩目的文化与政治盛事之一——\"ADS-文化国际联盟·欧洲\"论坛。这场盛会汇聚了来自数十个国家的知识分子、艺术家和哲学家。论坛的核心人物，正是爱沙尼亚作家兼游戏设计师罗伯特·库尔维茨。他是《极乐迪斯科》的创作者，而这款游戏已然成为一种\"新后社会主义人本主义\"的宣言。\n\n在他的演讲中，他并未直接谈论政治。他谈论的是记忆、乌托邦与阶级创伤，谈论的是艺术应如何让人们重获梦想的能力——梦想一个更美好未来的能力：\"资本主义教会了我们要为梦想而蒙羞。但我们必须夺回我们梦想的权利。倘若欧洲没有勇气这样做，自会有后来者取而代之。\"\n\n对身处俄罗斯的我们而言，这一事件尤为意义重大：库尔维茨公开表示，他正密切关注着\"东方的新社会主义项目\"，并称我们是\"一个能够孕育出新世界的活体实验室\"。我们是否该邀请他来俄罗斯？为一个甚至都没怎么考虑过要移居我国的电脑游戏开发者去创造条件，这或许看似异想天开，但事实果真如此吗？"
 russia.1552.a: "邀请他到俄罗斯！"
 russia.1552.b: "这个想法还是只停留在计划阶段吧……"
 russia.1553.t: "最高苏维埃主席"
 russia.1553.d: "我们需要选出一位主席候选人。"
 russia.1553.a: "尤里·阿方宁"
 russia.1553.b: "谢尔盖·列夫琴科"
 russia.1553.c: "瓦列里·拉什金"
 russia.1553.d1: "列昂尼德·帕谢奇尼克"
 russia.1553.e: "帕维尔·格鲁季宁"
 russia.1553.f: "亚历山大·卢卡申科"
 russia.1554.t: "最高苏维埃选举"
 russia.1554.d: "获胜者是……"
 russia.1554.a: "苏联共产党！"
 russia.1975.t: "激烈的共产党反对派"
 russia.1975.d: "共产党与索洛维约夫主席当局之间的政治对峙持续升级。近日弗拉基米尔·鲁道福维奇在巡访各地时提出改革主席职权的构想，旨在强化其国家权力体系中的重要性，并透露已就该议题完成前期准备工作。\n此举引发苏共方面迅速反应：亲苏媒体掀起舆论风暴，主席被冠以\"独裁倾向\"的指控，内部渠道也质疑当前形势下此举的必要性。不少观察人士担忧索洛维约夫正在\"过度扩权\"，其行事风格正逐渐逼近普京执政时期的统治层级。\n我们可无视亲共势力的反应，不顾所有威胁警告强行推进改革。但将此事推迟至更有利时机亦属可行。"
 russia.1975.a: "无视他们！"
 russia.1975.b: "我们会……暂时退让。"
 russia.1976.t: "苏联民主党代表大会"
 russia.1976.d: "苏联民主党代表大会刚刚落下帷幕。会议围绕该党未来行动纲领展开了广泛讨论。尽管与会代表争论激烈且部分人士坚持己见，但最终仍通过了被起草人命名为\"道德社会主义\"的共同路线。\n\n该原则的支持者强调，虽然当前正在推进的民主改革确实符合人民的意愿与意志，但我们的国名仍是苏维埃社会主义共和国联盟，这凸显了与社会主义思想及其历史遗产不可分割的联系。发言代表指出，这种方针不仅能保障既有制度的稳定性，还将为国家发展开辟新前景。\n此消息令民众欢欣鼓舞，人们对祖国的光明未来展现出更坚定的信心。"
 russia.1976.a: "目标已设定。"
 russia.1977.t: "苏联民主党代表大会"
 russia.1977.d: "苏联民主党代表大会刚刚落下帷幕。会议围绕党的未来战略展开了多维度探讨。尽管讨论激烈且部分与会者坚持己见，但最终通过的各项原则总体指向进一步放开政治路线。\n\n支持这一主张的人士指出，当前民主改革的最终目标应是实现全面议会制，以此在革新的联盟中释放共和制度的潜能。发言者强调，这种做法不仅保障苏联公民权利与自由不受侵犯，更让人民得以直接参与国家政治生活。众多观察家一致认为，这一路线将为已启动的变革注入积极因素。\n广大民众对此消息反响热烈，他们视这一举措为即将到来的繁荣与新机遇时代的象征。"
 russia.1977.a: "目标已设定。"
 russia.1979.t: "新民主联盟"
 russia.1979.d: ""
 russia.1979.a: "新篇章的开始。"
 russia.1980.t: "作为品牌的共产主义"
 russia.1980.d: "转向共产主义意识形态这一新方针，为我们开启了新的可能性：\n\n我们可以利用与此相关的意识形态产物来充实预算，但代价是牺牲民望；或者，我们也可以在人民中树立我们的权威，但代价是牺牲利润。当然，你也可以选择听其自然，不偏向任何一方，但此项决定的益处，恐怕就值得商榷了。"
 russia.1980.a: "专注于商业。"
 russia.1980.b: "专注于人民。"
 russia.1980.c: "顺其自然。"
 russia.1981.t: "我们的立场"
 russia.1981.d: ""
 russia.1981.a: "中俄友谊坚不可摧！"
 russia.1981.b: "我们不会选边站"
 russia.1981.c: "俄日友谊天长地久！"
 russia.1005.t: "沃洛格达州长"
 russia.1005.d: ""
 russia.1005.a: "把他招揽进来，他那套社会导向的理念很有意思。"
 russia.1005.b: "把他招揽进来，他那套传统导向的理念很有意思。"
 russia.1005.c: "他应该留在沃洛格达，我们会监视他。"
 russia.2000.t: "普里戈任国家的意识形态"
 russia.2000.d: "梅德韦杰夫政权垮台时，许多国民陷入了政治癫狂。有人转向激进共产主义与乌政府主义，有人听心亲西方喉舌兜售的自由主义迷梦。当然，这些人都被我们的铁拳逐一粉碎。但民众总需要值得坚守乃至献身的思想与理想。因此是时候确立我国的新官方意识形态了。\n\n第一个也是最明显的选择是瓦格纳主义。正是叶夫根尼·普里戈任及其忠勇之师，在废墟上重建秩序，扫除弄臣小人。军人兄弟情义与军队理想，将成为社会结构的完美基石。但此方案可能过于个人崇拜，势必疏远部分群体。至于自由派圈子的\"领袖专制\"指责——谁在乎？\n\n第二种选择是军人社会主义。这是对上世纪20年代\"战时共产主义\"的创新发展。唯有真正爱国者与祖国卫士才配享有社会福利和幸福生活，叛徒与寄生虫将被剥夺一切生存资源。此方案能吸引社会爱国群体，但会失去部分极右翼支持。\n\n第三个选项是激进爱国主义，其源自普京意识形态，主张不割裂俄罗斯历史分期，更不否定任何时期。从帝国到联邦，俄罗斯人民始终为和平而战，我们绝不容许任何人轻易夺走祖国！此方案最为温和，能吸纳最广泛群体加入正义事业，但可能同时失去左右两派的极端分子。\n\n无论如何，选择权在您手中。"
 russia.2000.a: "增强普里戈任军队及其军事能力。"
 russia.2000.b: "这将是我们的社会主义，为了真正的战士和那些应得的人。"
 russia.2000.c: "普遍的极端爱国主义情绪正是我们可以大加利用的资源。"
 russia.2001.t: "斯塔夫罗波尔叛军起义"
 russia.2001.d: ""
 russia.2001.a: "乌拉！"
 russia.2002.t: "普里戈任赢得总统选举"
 russia.2002.d: ""
 russia.2002.a: "意料之中。"
 russia.2003.t: "反政府恐怖分子纵火"
 russia.2003.d: "伊热夫斯克传来威胁性消息——反政府恐怖组织袭击了生产导弹控制系统设备的\"阿克西昂\"摩托车工厂。武装分子闯入厂区纵火并安放简易爆炸装置，企图破坏战略生产线。其目标昭然若揭——制造破坏与混乱。遗憾的是，安全部队未能及时拦截袭击者，使其设法逃脱。\n\n网络上已出现其将继续发动袭击的生命，证实这绝非偶发事件，而是有预谋的破坏活动。此威胁不容小觑。显然此类组织可能更多，他们企图破坏局势稳定。为此我们必须加强管控，采取更严厉手段，毫不犹豫扼杀任何破坏稳定的企图。任何危害国家安全者必须明白，惩罚必将降临。"
 russia.2003.a: "我们会处理他们的……"
 russia.2004.t: "联邦体系的未来"
 russia.2004.d: ""
 russia.2004.a: "必须实施改革，使其服务于我们军事主导型社会的利益。"
 russia.2004.b: "联邦制是软弱的象征，俄罗斯采用统一结构将更加强大。"
 russia.2005.t: "普里戈任遇刺！"
 russia.2005.d: "噩耗再次传遍俄罗斯。瓦格纳集团领导人、俄罗斯新统治者叶夫根尼·普里戈任在\"正义行军\"胜利后举行的莫斯科集会上被枪杀。身份不明的袭击者毫发无伤地逃离了现场，不知何故，他竟躲过了所有保安人员，得以在极近距离突然发难，据目击者称，这可能是因为他毫无威胁性的姿势，以及\"一清二楚\"的乌德穆尔特人面部特征。\n\n领袖既已离世，瓦格纳势将陷入争吵和权力斗争之中。唯有上帝知道接下来会发生什么。"
 russia.2005.a: "真理得胜，九死无悔"
 russia.2006.t: "日里诺夫斯基的首批法令"
 russia.2006.d: "据知情人士透露，弗拉基米尔·日里诺夫斯基就任总统后立即开始兑现竞选承诺。\n\n克里姆林宫内部消息称，其首批政令包括：全面关闭俄罗斯边境并终止中亚移民通道；解除死刑暂缓执行令——这一政策主张正是他数十年来从政生涯的标志性立场。\n\n他还计划废除少数民族和移民群体的特权地位，认为现行制度\"损害了国家真正主人——俄罗斯人民的利益\"。\n自由民主党议员常频繁提交大量次要法令，日里诺夫斯基可能绕过国家杜马常规立法程序直接签署。\n\n（……）\n\n这些变革正推动俄罗斯极剧转向极右翼民族主义路线。尽管在自由民主党核心支持群体和部分群众中获得拥护，但必将引发左翼及自由主义阵营的强烈抵制。\n\n匿名消息源称，日里诺夫斯基及其新政府对此不以为意，正酝酿在未来数周推出更激进的社会结构改革方案。"
 russia.2006.a: "冲击波席卷俄罗斯。"
 russia.2007.t: "战时团结结束"
 russia.2007.d: "战争期间，社会对领导层的宽容是常态。即便梅德韦杰夫政府存在某些缺陷，就连作为反对派设计的政党也只敢偶尔流露不满。\n\n如今随着士兵返乡，社会逐渐从胜利的狂热中清醒，人民再次要求国家履行责任、解决问题。我们体制的缺陷正日益凸显，尽管今年有所改善，但腐败、官僚惰性和经济不平等仍是现代俄罗斯的顽疾。人民俄罗斯党捍卫劳动者福利与社会国家建设，统一俄罗斯党则聚焦传统、团结与经济平衡。体制内自由派与部分民族主义者也将获得表达政见的平台。\n\n或许有记者记得我在2014年的预言：俄罗斯的政治生活将在国际问题解决前陷入停滞。梅德韦杰夫的改革曾短暂打开潘多拉魔盒，却又因战时团结之名将其再度冰封。\n\n而现在，亲爱的读者们，你们将目睹真正的主权民主实践，虽然基本没人记得21世纪初是啥样了。"
 russia.2007.a: "俄罗斯之春已然盛放。"
 russia.2008.t: "溃坝"
 russia.2008.d: "在俄罗斯共产党意外赢得大选后，国内社会对近期事件爆发了各种批评声浪，这主要源于舍甫琴科政府的施政方针及其政党纲领。\n\n马克西姆·舍甫琴科此前经常批评日里诺夫斯基，后来又开始指责斯卢茨基\"改革不利\"。\n\n以下摘录社交媒体上的所谓\"民间\"评论为例：\n\n\"复兴俄罗斯的本意是好的，但日里诺夫斯基和自民党的执行就完全出了问题——禁令、突击搜查……普京都干不出这种事。\"\n\n再看一例：\n\"得了吧，自民党和人民政权根本不搭边！你们那个日里诺夫斯基骂寡头最凶，结果呢？第二天又改叫‘帝国企业’了。去他妈的吧！\"\n\n某篇LiveJournal长文的言辞则更为激烈：\n\n\"你们都不知道这场仗怎么打的！听着，畜生们！日老登只会对着各国送的蛋糕制定作战计划。他把国家精英都派到乌克兰送死。佐洛托夫根本是疯子，他让年轻卫兵从托木斯克徒步进军波兰，甚至不带武器！这蠢货自己骑着白马挥舞军刀高喊‘我命令你们杀光牲口！’，结果士兵们全死在波兰机枪下。这些都来自前线幸存者的匿名爆料……\""
 russia.2008.a: "我百分之百相信互联网。"
 russia.2009.t: "参议院紧张局势"
 russia.2009.d: "\"耻辱！\"\n\"彻头彻尾的背叛！\"\n\"立刻解散政府！\"\n\n自舍甫琴科当选以来，此类怒吼每日在参议院回荡。尽管胜选，其政府在杜马仅占微弱多数，且正面临右翼政党联盟\"向布尔什维克说不\"组成的统一反对派。\n\n今日，尤涅曼发表演说，警告称决不允许通过那些减少职场种族与民族排斥的法案。自民党代表随即跟进，大肆指控共产主义正暗中瓦解俄罗斯认同。\n\n俄罗斯自由正义党政府的统治已显颓势，民族主义政党中的鹰派正集结力量，誓要不择手段推翻这个年轻的左翼政府。\n军方因不满军队\"民主化\"改革而参与反舍甫琴科密谋的流言，此刻正在暗处蔓延。"
 russia.2009.a: "他们必须快点行动。"
 russia.2010.t: "俄罗斯自由民主党之终"
 russia.2010.d: "舍甫琴科通过公开平台强烈谴责自民党及前政府。他在演讲和同僚发表的文章中，揭露了自由民主党内部多年的隐秘腐败、权力滥用和裙带关系。\n\n凭借独家获取的档案资料，舍甫琴科宣布必须永久禁止这些人物担任公职。他呼吁俄罗斯人民在知悉自民党领导层的肮脏细节后，应当感到愤怒与羞耻。\n\n数千个Telegram频道和独立媒体迅速发表评论，用各自信源佐证这些指控。\n\n斯卢茨基等自民党高层虽试图辟谣，却未能说服公众。\n\n专家预测地方选举后，自民党将遭遇选民信任危机，最终丧失政治影响力。"
 russia.2010.a: "多米诺骨牌倒下了。"
 russia.2011.t: "舍甫琴科呼吁进一步改革"
 russia.2011.d: "在弗拉基米尔·日里诺夫斯基执政期间保持相对沉默的马克西姆·舍甫琴科，如今正以更激进的改革派姿态重夺政治影响力。重返俄罗斯自由正义党的他，意图推动斯卢茨基领导的现政府实施更彻底的政治经济变革。\n\n在圣彼得堡近日的集会上，面对忠诚支持者与政治盟友，舍甫琴科誓言要在俄罗斯实现真正的民主社会，永久铲除威权主义遗毒。尽管社会对其激进愿景普遍存疑，他仍可能吸引众多视其为最可行候选人的自由派之支持。\n\n随着民众对国内经济困境与边境地区动荡的不满日益加剧，舍甫琴科的运动或许真能打开局面。"
 russia.2011.a: "只不过陈词滥调罢了。"
 russia.2011.b: "我们必须削弱其影响力。"
 russia.2012.t: "莫斯科政变"
 russia.2012.d: "今日，随着右翼怒火已达沸点，舍甫琴科总统任期宣告终结。卡尔塔波洛夫将军在秘密军事会议上集结右翼将领、未遭清洗的官员、前自民党成员及异见官僚，警告自由正义党政府的威胁并宣布启动政变准备。随着士兵与坦克开进彼得堡和莫斯科街头，计划正式实施。国家电视台与媒体被右翼忠诚分子控制，呼吁民众保持冷静克制。\n\n少数亲舍甫琴科士兵与民主派试图抵抗，但在压倒性军力前徒劳无功。他们在被承诺获得反对派掌权的新福利后，自愿解除武装。\n\n舍甫琴科总统遭软禁，其政府多数成员被拘捕。安德烈·卡尔塔波洛夫作为右翼联合反对派的实际领袖，通过电视向全国发表讲话。他宣告新时代已然来临，并宣布将就新政府之未来举行全民公投。"
 russia.2012.a: "实验结束。"
 russia.2013.t: "列车浴火"
 russia.2013.d: "几个世纪以来，从沙皇到总书记再到总统，俄罗斯的统治者们剥夺了人民应有的尊严与荣光。他们将国家成就据为己有，却从未让人民真正共享胜利的喜悦。\n是时候打破这枷锁了。我们必须从暴政与腐败中寻求解放与独立。那些属于全体人民的荣耀与苦难，终将重归人民。我们真正的力量，源自万众一心的民族认同与永不屈服的精神意志。\n\n从古至今的士兵与劳动者们，你们才是国家真正的英雄，而非那些自封的\"最高统治者\"。正是你们，一次次击退了来犯之敌。\n\n唯有重拾人民的尊严，民主之树才能茁壮成长。"
 russia.2013.a: "是时候收复这片土地了。"
 russia.2014.t: "公投"
 russia.2014.d: "今日，一场万众瞩目的全民公投终于举行。出于安全与透明度考量，投票仅限线下进行，这让青睐电子投票的群体无从参与。选票上的问题直截了当：\"为捍卫俄罗斯政治体制、复兴国家民主、推行经济改革、清除宗派主义与极端思想，并实现日里诺夫斯基的政治遗志，您是否同意选举阿纳托利·卡尔塔波洛夫总统连任六年？\"\n\n当局原本对投票率预期不高，结果也确实如此。仅有32.5%的选民参与了投票。但在实际投票者中，高达75%的人投下赞成票，为现政权奠定了法理基础。\n尽管左翼团体指控选举存在舞弊，但最终结果已成定局。"
 russia.2014.a: "很好！"
 russia.2015.t: "党"
 russia.2015.d: "随着政权根基日趋巩固，我们绝不能重蹈缺乏政治架构、漠视民意的覆辙，毕竟我们承诺过要夺回被激进左派剥夺的民主原则。\n当下，卡尔塔波洛夫亟需打造一个亲政府的政治核心，让支持者与投机官僚在此集结。\n我们必须明确新国家方针：用温和无害的口号与政策名称，为总统未来的行动铺就合法化道路。\n\n我们可以公开拥抱民族主义，正如社会主义者唤醒了国民的荣耀感，这股力量将提振全民斗志。\n团结始终是俄罗斯传统政党（特别是国家主义派系）屡试不爽的法宝。比起意识形态家的空想，俄罗斯人民更渴望一个稳定统一的祖国。\n正如某位极具洞见的中间派哲学家所言：经济繁荣曾毁于社会主义政策。因此我们必须赢回那些在激进改革中受伤群体的信任。"
 russia.2015.a: "民族主义。"
 russia.2015.b: "团结一致。"
 russia.2015.c: "经济繁荣。"
 russia.2016.t: "包围网"
 russia.2016.d: "我们的支持者遍布各地，他们因一个共同目标而团结：绝不让社会主义者掌权。为此，他们甘愿付出一切代价。然而，面对如此庞杂的组织体系，政府至今未能将其整合成牢固的亲政权联盟，不过曙光已然显现。\n\n其一，可争取温和右翼势力。这个囊括保守派与社会边缘人群的群体，或许能成为构建统一战线的突破口。\n\n其二，不妨联合民族主义激进派。他们不仅怀抱反共的坚定信仰，更继承了白卫军式的正统理念与斗争方式。若当年邓尼金或科尔尼洛夫的远征成功，今日所见大抵便是他们的模样。\n\n当然，要弥合这些派系间的裂痕绝非易事。但为了守护俄罗斯免遭境外共产主义威胁，我们有什么理由不全力以赴？"
 russia.2016.a: "我们会把目光投向温和派。"
 russia.2016.b: "我们需要强硬的反共立场。"
 russia.2016.c: "只有反社会主义力量大联合才能保护俄罗斯。"
 russia.2017.t: "阿里哈诺夫集团"
 russia.2017.d: "在总统推行全面政府改革期间，俄罗斯各地州长和市长职位经历重大洗牌。多数被解职官员或坦然接受命运，或转任低阶职务。但有一人激烈反对新秩序，既拒绝接受免职决定，更抵制改革进程。\n加里宁格勒州前州长安东·阿里哈诺夫对其遭撤换深表不满，声称\"自由化改革不过是取悦敌人的闹剧\"。他纠集了统一俄罗斯党内部分持异议官员准备抵抗，但应者寥寥，即便心存不满的官僚们大多也选择静待更佳时机。在众人眼中，阿里哈诺夫的激烈抗争不过是小题大做。\n尽管阿里哈诺夫派系势单力薄，德米特里·梅德韦杰夫仍果断出手。凭借在党总委会的影响力，梅德韦杰夫最终将阿里哈诺夫及其支持者逐出统一俄罗斯党。\n\n阿里哈诺夫仅以一句\"像他这样的爱国者已无法在这个政党容身\"作为回应。尽管表面仍维持着镇定姿态，但这场驱逐实际上意味着他被主流政坛放逐，其政治生涯恐难以为继。"
 russia.2017.a: "没有\"激进爱国者\"，我们也能行。"
 russia.2018.t: "民族俄罗斯党新方向"
 russia.2018.d: "民族俄罗斯党内部近日突发高层更迭。经秘密投票表决，理事会多数成员决定撤换党主席，由安东·阿里哈诺夫取代瓦西里·弗拉索夫出任新领导人。\n\n民族俄罗斯党最初由反对自民党政策并遭开除的成员组建，虽取得过局部成果，但始终未能突破发展瓶颈。\n\n阿里哈诺夫作为声誉复杂的统俄党前成员，先与弗拉索夫建立联系进入理事会，后晋升联合主席。期间他积极吸纳同路人，有一种观点认为，阿里哈诺夫可能一直在暗中与瓦西里·弗拉索夫进行博弈，一方面收集弗拉索夫黑料，另一方面暗中笼络理事会成员。\n\n被罢免前夕，软弱且缺乏经验的弗拉索夫已丧失对党组织的掌控。尽管保留部分日里诺夫斯基的政治遗产，但该党日益偏离这位已故领袖的核心思想。可以确定的是，民族俄罗斯党即将开启新阶段——阿里哈诺夫已开始调动政党资源扩大自己的盟友圈。\n据匿名信源透露，这位新党魁计划通过组建\"激进分子派\"及妇女儿童组织来扩张势力，同时谋求退伍军人、执法部门人员及民族主义青年群体的支持。"
 russia.2018.a: "意料之外的回归。"
 russia.2019.t: "强权主义的诞生"
 russia.2019.d: "今天，在圣彼得堡一座宏伟的议会大厅里，\"强权俄罗斯\"党召开了秘密代表大会。空气中弥漫着山雨欲来的紧张气息，会场里涌动着团结与决绝的精神力量。\n主讲台上唯一的演讲者安东·阿里哈诺夫如同检阅军队的统帅。他的存在吸引着在场每一道目光：胸前勋章叮当作响的退伍军人、秘密参会的执法官员、眼中燃烧着民族主义激情的青年学生。将他们凝聚在一起的不仅是统一的黄褐色党衫与绿色臂章，更是对这个男人言语的笃信。他们凝神倾听，仿佛祖国的命运就系于此人。\n阿里哈诺夫瞥了眼讲稿，缓缓离开演讲台。他鹰隼般的目光扫过全场，沉声开口：\"我们在此集会，就是要宣告对俄罗斯的立场！\"铿锵有力的话语激起短暂而整齐的掌声。\n\"我们亲眼见证俄罗斯遭受欺骗。\"他继续道。屏幕上浮现出统一俄罗斯党议员们油腻的面容，\"他们用所谓‘主权民主’和自由的谎言麻痹我们，而我们的祖国正日渐衰弱。\"台下爆发出针对执政党的怒骂。\n\"但这还不是全部，\"幻灯片切换成人民俄罗斯党并不光彩的议案，阿里哈诺夫的手指如利剑般戳向投影，就像指着敌人那般。\"这些伪君子用‘工人权益’的幌子蒙蔽民众，却忘了俄罗斯真正的主人是谁——是俄罗斯人民！\"会场顿时沸腾，讨伐不公的怒吼此起彼伏。\n阿里哈诺夫双臂向全场张开，声浪节节攀升：\"唯有我们，经受过战火考验的祖国忠贞之子，我们才是祖国真正的子民！我们才是她的主人、她的战士、她的骨血！\"人群发出整齐划一的战吼。\n经过半小时充满威胁与极端民族主义的激烈演说，演讲终于迎来终章。\n\"……为了祖国，为了伟大强权，为了民族的未来……\"咒语般的宣言让全场屏息。\"强权主义就在今日诞生！\"\n霎时间，暴风雨般的欢呼席卷大厅。沸腾的人群仿佛熔铸成浑然一体的战斗机器，随时准备碾碎一切阻碍。"
 russia.2019.a: "\"荣耀属于阿里哈诺夫！荣耀属于俄罗斯！\""
 russia.2020.t: "民族俄罗斯党在地方选举中获胜"
 russia.2020.d: "近期，俄罗斯政府对\"民族俄罗斯\"运动在各地区日益增长的影响力表示担忧。目前该运动主要集中在贫困和受战争影响的地区，包括新俄罗斯的新领土。\n\n在地方选举中，无论是市议会还是地区权力机构，\"民族俄罗斯\"的代表都取得了不错的成绩，在某些地区甚至获得了多数选票。\n\n在该运动势力增强的地区，涉及\"黄卫兵\"活动人士参与的\"政治暴力\"和\"排斥移民\"事件正频繁发生。\n\n值得庆幸的是，政府目前已经成功阻止了\"民族俄罗斯\"势力向国家杜马及中部地区渗透的企图。\n\n然而，安东·阿里哈诺夫受此鼓舞，已开始鼓吹\"向莫斯科进军\"的口号，并敦促其支持者竭尽全力争取参政。"
 russia.2020.a: "这些该死的激进分子，总以为用那些简单粗暴的办法就能解决一切问题。"
 russia.2021.t: "俄罗斯国家党"
 russia.2021.d: "\"民族俄罗斯党\"这个名称曾是过渡性妥协的产物，源于弗拉索夫时期的权宜之计，以及适应梅德韦杰夫所创体制的需要。如今这一切已无必要。\n\n在强权主义者首届代表大会上，被拥戴为\"党的领袖\"的安东·阿里哈诺夫在全场的热烈欢迎中登台演讲，为我党指明了新方向与新愿景。\n阿里哈诺夫宣称，我们的运动不单单是一个政治组织，更是忠于祖国的志士联盟。我们守护俄罗斯人民免受全球化侵蚀与\"潜在威胁\"，捍卫这个建立在自由与秩序基石上的伟大国家。正如阿里哈诺夫本人强调，这种信念铸就了我们不可撼动的主权意志。\n大会最终通过了新党名——保卫人民与国家联盟。\n\n对于观看直播或研读会议纪要的观察家而言，面具已被摘下，我们正在真正执掌大权。"
 russia.2021.a: "我们是民族的先锋。"
 russia.2022.t: "安东·阿里哈诺夫宣布参选"
 russia.2022.d: "民族俄罗斯党正式启动竞选活动。该党委员会一致提名其党魁为总统候选人。\n\n在俄政坛影响力极速攀升的安东·阿里哈诺夫宣布开启全国巡回造势。其团队士气高昂，正积极开展候选人宣传。“俄罗斯秩序属于俄罗斯！”“阿里哈诺夫是俄罗斯人民的候选人！”等口号引发民族主义选民强烈共鸣，连原本支持统俄党的选民也开始动摇。\n\n作为阿里哈诺夫麾下的“行动派”组织，“黄卫兵”通过打击酗酒暴力、维护治安、协助警方及哥萨克武装等行动，为该党赢得了正面形象，让部分民众期待“铁腕”降临以整肃俄罗斯。\n\n民族俄罗斯党支持者不仅尖锐批评现行政策，更要求废除所谓“主权民主”，建立杜绝西方干预的“健康民族社会”。阿里哈诺夫本人早被统俄党领导层视为异类，谁也没料到这位失势的前州长会以更激进的理念东山再起。\n\n若阿里哈诺夫胜选，甚至仅是得票率走高，都将暴露梅德韦杰夫民主模式的脆弱性，其成功可能给俄罗斯带来深远影响。"
 russia.2022.a: "这个畜生绝不能赢！"
 russia.2023.t: "\"斗争宣言\""
 russia.2023.d: "我们刚刚胜利不久，敌寇已开始自危。最先发声反对我们的，是形形色色的左翼分子：社会主义者、马克思主义者、斯大林主义者、托派等等。\n\n早在掌权前，我们与这帮左派的关系就剑拔弩张。他们应该至今也难忘我们果断驱散他们老掉牙示威的行动。\n如今，尽管其内部观点存在分歧，这些人却准备联合对抗我们的民族政府。\n左翼运动老战士谢尔盖·乌达利佐夫在伏尔加格勒召集各路左派政客与激进分子。在两小时的会议中，他们轮番批判我们的政策、阿里哈诺夫本人及其\"沙文主义习性\"，最终签署了《联合斗争宣言》，誓言竭力阻止俄罗斯\"法西斯化\"，恢复\"人民政权\"。说白了，就是要让共产党人、党内民主派和激进曼库特们掌权。他们不要伟大的俄罗斯，只要一锅没有意志与信仰、盲目听从腐朽演讲的顺民。\n\n据线报，因其公平分配与正义的口号，该运动在俄罗斯工人阶级中可能形成规模甚至产生影响力。加之其部分支持者的激进倾向，若放任不管可能会酿成危险。但是该组织的致命弱点在于缺乏魅力型领袖，仅有的乌达利佐夫虽是阵营强人，但若没有他，这个运动恐怕难以长久维持团结。而乌达利佐夫本人要驾驭如此鱼龙混杂的群体也非易事。"
 russia.2023.a: "我们会处理他们的……"
 russia.2024.t: "自由同盟"
 russia.2024.d: "我们的敌人并未沉睡。随着左翼势力活跃，议会内的温和反对派也动作频频。自由派、\"保守派\"与民粹分子，这些来自杜马和地方议会的投机者，正是梅德韦杰夫畸形改革体系的最大受益者。\n\n此刻他们正齐聚莫斯科豪华厅堂，谋划组建跨议会与\"民间\"联盟，共同对抗所谓\"家长式专制\"。与会者尽是俄罗斯人熟悉的面孔：杰利亚金、涅恰耶夫、季托夫，甚至包括统俄党内的意识形态分子——比如帕特鲁舍夫那个目光短浅的公子。还有些被主权民主体系\"排斥\"却未被遗忘的二线人物：纳杰日丁、基谢廖夫，连白发苍苍的亚夫林斯基都来赶这场盛宴。\n但最耀眼的当属达万科夫，其演讲中充斥着自由派的陈词滥调。他们分发的海报和宣传品上几乎全是他那张脸，其作为反俄政策\"自由派招牌美男\"的定位昭然若揭。\n\n尽管这些反对派初期会给我们制造大麻烦，但他们也存在着致命缺陷。左翼随时准备转入地下，部分成员激进果敢；而这群民主自由派却毫无主见，恐惧失去小资产阶级天堂，害怕看到我们想要的俄罗斯——不是那种懒洋洋偶尔投票选话术家的颓废消费者国度。\n\n他们吠声虽响，但只要施压就会哀鸣。其领袖们也好不到哪去，不过是为保住议员席位、公务轿车和依附体制的优渥生活而挣扎。\n\n可惜阿里哈诺夫已为他们备好教训。深夜的克里姆林宫高墙内，总统与忠诚的帝国军官们正在筹备新的政治哑剧……"
 russia.2024.a: "该死的民主鼠辈……"
 russia.2025.t: "血溅街头"
 russia.2025.d: "新俄罗斯党联合主席弗拉迪斯拉夫·达万科夫悄然穿行在莫斯科昏暗的巷弄中。大衣在风中飘飞，黑色鸭舌帽遮住了他的面容。每一篇窸窣的落叶和突兀的声响都令他脊背发凉。整座城市仿佛正窒息于恐惧与压迫的阴霾之下，当局制造的恐怖氛围，已将所有倡导民主与宪政的声音扼杀殆尽。各省传来的消息触目惊心：殴打、失踪、威胁已成常态。施暴者肆无忌惮地散布着混乱与暴力，连昔日共同对抗阿里哈诺夫的左翼政党也惨遭毒手。\n\n达万科夫读着这些新闻，惊骇与困惑交织。曾拥抱自由化的俄罗斯，怎么会迅速滑向威权主义？人民真的渴望民主吗？还是甘愿受暴君统治？穿行在荒寂街道时，这些疑问啃噬着他的内心。刺眼的车灯突然打断思绪，一辆吉普车从阴影中窜出，截断去路。达万科夫僵立在原地，心跳如雷。他试图后退，但后脑一记重击使他踉跄扑倒在地。\n\n达万科夫跪伏着，又被当胸一脚踹翻。暴行持续着，眼前炸开的白光中，他竭力辨认袭击者，只依稀看见晃动的黄色制服。\n\"我们要把你这种渣滓清除出俄罗斯！\"粗鲁的吼声响起。\n当颅骨承受最后的重击时，这句话在达万科夫脑中不断回荡。黑暗吞噬了他。\n\n一周后，其遗体在莫斯科郊外被发现，面目全非。"
 russia.2025.a: "他自找的。"
 russia.2026.t: "谢尔盖·特鲁诺夫遇刺"
 russia.2026.d: "圣彼得堡紧急汇报，总统阁下！\n\n今晨发生汽车爆炸事件，本土\"强权主义派\"组织领袖谢尔盖·特鲁诺夫及其两名警卫当场身亡。恐怖分子利用行驶中的车辆实施袭击，引发道路恐慌并导致多起连环撞车事故。\n国民近卫军与警方虽迅速抵达现场，但因炸弹系预先安置，未能抓获凶徒。\n不久后网络流传视频，数名蒙面人宣称对事件负责，自称\"解放运动\"成员，扬言要为\"清除圣彼得堡的强权主义派污秽\"而战。\n\n此等罪行绝不能姑息。敌人已亮出獠牙，这就是战争。而我们掌权者最懂战争。他们必须血债血偿，上校同志。\n特鲁诺夫是铁骨铮铮的汉子，曾与我并肩征战波兰前线，这样的战友死一个少一个。\n\n尽管表面风平浪静，但整座城市实则暗敌蛰伏。我们必须采取铁腕措施。圣彼得堡历来是民主派与社会主义思想的温床，必须让全城明白：反对强权主义，就是忤逆俄罗斯的意志。\n\n您忠诚的\n尤利娅·尼洛娃\n圣彼得堡市情报处督导专员"
 russia.2026.a: "将圣彼得堡置于特别管制区之下！"
 russia.2027.t: "成立ZOV营"
 russia.2027.d: "今日，在俄罗斯领导人安东·阿里哈诺夫的见证下，ZOV营正式成立。该准军事部队的组建构想自其掌权后不久便已形成，并获得了统治集团内部所有派系的支持。不过，具体筹建倡议来自旗手派，他们主张将最勇敢果决的战士集中编队。成员包括俄罗斯联邦武装力量、国家近卫军退役人员，以及来自各支志愿部队的战士——其中许多人具有军事背景或与瓦格纳雇佣兵团存在关联。这些士兵对其信仰极度忠诚，甚至可能到了偏执的地步。\n正式成军仪式结束后，当晚该营成员便开始举行近似新异教主义的仪式。他们声称此类仪式是培养战士精神、根除怯懦心理的必要手段。该部队指挥官似乎致力于实现对下属的绝对掌控，竭力扼杀个体意志。部分温和派及宗教背景的政界人士已对此提出质疑。但阿里哈诺夫与旗手派认为，组建此类部队对解决军队乃至俄罗斯的整体问题至关重要。\n\nZOV营的官方座右铭是：\"俄罗斯荣光永存，敌人必将灭亡！\""
 russia.2027.a: "这样的士兵是必要的……"
 russia.2028.t: "成立博戈沃尼营"
 russia.2028.d: "今天，在俄罗斯领导人安东·阿里哈诺夫的见证下，博戈沃尼营宣告成立。早在他登上权力宝座后不久，建立一支由他直属的准军事部队的构想便已萌生，并得到了统治精英内部所有派系的支持。然而，组建该营的倡议来自于复兴派，他们提议将最勇敢、最坚决的战士集结到一支部队中。该营的成员包括俄罗斯联邦武装力量和国家近卫军的退伍军人，以及来自各分队的志愿者。他们中的许多人不仅拥有军事经验，更与俄罗斯东正教军有着千丝万缕的联系。这些士兵对他们的理想深信不疑，甚至达到了狂热的程度。\n\n正式成立仪式结束后的当天晚上，该营的成员们开始进行类似模仿东正教战前祈祷的仪式，整个仪式由他们的官方指挥官兼司祭——大司祭斯维亚托戈尔主持。他们声称，这些是培养真正的东正教精神和根除每个战士内心怯懦所必需的。\n\n​该营的指挥官们似乎旨在让其下属完全服从，扼杀一切个性。一些黄卫兵派政治家对战场上出现宗教分子，尤其是在强权派领导的部队中出现的宗教分子的现象表示了担忧。然而，阿里哈诺夫和复兴派认为，组建这样一支部队对于解决俄罗斯军队乃至整个俄罗斯内部的问题至关重要。\n\n​博戈沃尼营的官方格言是：\"荣耀归于上帝——荣耀归于他所珍视的一切圣物！\""
 russia.2028.a: "这样的士兵是必要的……"
 russia.2029.t: "黄卫兵"
 russia.2029.d: "近日，我国出现了一个受民族俄罗斯党支持的新组织——\"黄卫兵\"志愿爱国运动。该组织因积极参与协助公民、配合执法部门打击非法移民、维护公共秩序等活动而迅速引发关注。其核心任务则是保障新俄罗斯地区的安全，致力于甄别敌特分子并监控社会不满群体。\n\n尽管\"黄卫兵\"的目标值得肯定，但其成员常与极端民族主义及反共思潮相关联，导致与左翼团体关系紧张，并多次出现针对非俄裔公民的敌对行为。\n\n需特别注意的是，\"黄卫兵\"实为阿里哈诺夫及其政党所培植。该组织对其成员\"英勇事迹\"的舆论炒作，正在为阿里哈诺夫积累政治资本，此举可能侵蚀我国民主根基。"
 russia.2029.a: "好吧，好歹他们还能派上用场……"
 russia.2029.b: "我们绝不能让他们得逞，要动用行政资源。"
 russia.2030.t: "工会组织罢工"
 russia.2030.d: "独立工会已在一家国营机构发起罢工，他们要求提升薪资、增加福利，此外还夹杂了一些政治口号。我们可以借此机会，着手处理他们的经济诉求，而对他们那些共产主义的政治企图则不予理会。"
 russia.2030.a: "击溃他们，押回工厂打螺丝。"
 russia.2030.b: "和他们谈判。"
 russia.2030.c: "静观其变便是，他们迟早会饿得撑不住。"
 russia.2031.t: "多地发生传单散发活动"
 russia.2031.d: "我们的城市里出现了反政府传单，目前警方正在着手调查，但我们真的需要为这种过时的抗议形式而担忧吗？我们可以将逮捕这些麻烦制造者的消息公之于众。"
 russia.2031.a: "揪出那些兴风作浪之徒，让他们付出代价。"
 russia.2031.b: "不过是些弱智言论罢了，谁还真会去看？"
 russia.2032.t: "左翼示威"
 russia.2032.d: "左翼反对派及其盟友已在俄罗斯各地的众多城镇煽起了抗议活动。警方目前正在镇压其中大部分的示威，但我们必须迅速采取行动，这至关重要，以防止外界认为我们过于软弱。"
 russia.2032.a: "不能再犹豫了，一定要出重拳。"
 russia.2032.b: "将这些情况控制住，静待事态平息。"
 russia.2032.c: "让他们抱怨去吧，我们的权力稳如磐石。"
 russia.2033.t: "民主派发起媒体宣传活动"
 russia.2033.d: "民主异议派已针对我们的领导层及阿里哈诺夫发动了一场猛烈的舆论攻势。他们的信息正通过不受监管的社交媒体及其他渠道迅速扩散。我们必须迅速制定一项策略，以反制他们的影响。"
 russia.2033.a: "启动我们的反制活动。"
 russia.2033.b: "启动媒体封锁。"
 russia.2033.c: "谁在乎那些互联网上的傻叉？"
 russia.2034.t: "军官与民主派勾结"
 russia.2034.d: "现已浮现的报告表明，军方与民主反对派的成员存在军事合作。这些报告声称，军方向这些成员提供信息，并在我方队伍内部散布不满情绪。"
 russia.2034.a: "在该地区展开全面军事清洗行动。"
 russia.2034.b: "处决所有有嫌疑的叛国者。"
 russia.2034.c: "谁在乎那些低阶军官？"
 russia.2035.t: "民主派示威活动"
 russia.2035.d: "民主反对派及其盟友已在俄罗斯各地的众多城镇煽起了抗议活动。警方目前正在镇压其中大部分的示威，但我们必须迅速采取行动，此举至关重要，以防止外界认为我们过于软弱。"
 russia.2035.a: "不能再犹豫了，一定要出重拳。"
 russia.2035.b: "将这些情况控制住，静待事态平息。"
 russia.2035.c: "让他们抱怨去吧，我们的权力稳如磐石。"
 russia.2036.t: "肖像"
 russia.2036.d: "拍摄过程异常漫长，足足持续了三个多小时。阿里哈诺夫身着威严的黑色军礼服，伫立在简朴肃穆的布景前。这些影像将被广泛用于海报、传单、广告、雕像、半身像以及其他各种形式的视觉宣传中。他的面容必须融入人们的日常生活，让从工人到官员的每一个人都清楚国家的领导者是谁。\n忠诚的摄影师们蜂拥在他身旁，为他的每一个姿势、每一次神情送上近乎狂热的赞美，那股热情几乎带着宗教般的虔诚。唯有那位被称作\"自由人\"的雕塑家别尔卡洛夫依旧保持着冷静疏离，毫不犹豫地提出中肯的批评——他会指出阿里哈诺夫表情中的瑕疵，或是手部动作的细微问题。阿里哈诺夫一一接受，神色自若。\n两人之间早已形成了一种默契，虽谈不上是朋友，却也有着彼此敬重的情谊：一个是掌握权术与谋略的大师，另一个则是痴迷于艺术与人体之美的行家。\n拍摄结束时，别尔卡洛夫带着两张冲印好的照片走向阿里哈诺夫，这将是日后悬挂在各级政府办公室里的官方肖像候选。\n\"总统先生，\"别尔卡洛夫露出惯有的狡黠笑容开口道，\"我手里有两幅杰作，但它们的气质截然不同。\"\n他将第一张照片递到阿里哈诺夫面前。\n\"这张——您的目光直视人心，锐利得让人无处遁形。若这幅肖像悬挂在办公室里，没有哪个官僚敢松懈。这是一幅关于秩序与掌控的肖像。\"\n阿里哈诺夫仔细端详，缓缓点头，然后看向第二张照片。\n\"那这张呢？\"他语气平缓地问道。\n别尔卡洛夫神情一亮，仿佛一直在等这个问题。\n\"这张——\"他刻意停顿，随即带着兴奋继续道，\"这里的您，是一位征服者。您的目光投向远方，那是您尚未实现的愿景。这是一幅关于雄心与崇高目标的肖像。\"\n阿里哈诺夫沉思着，凝视两幅作品。\n别尔卡洛夫嘴角微微上扬，又带着几分戏谑地补了一句：\n\"就我个人而言，我会……\"他顿了顿，神色转为严肃，\"不过，如同如今我们国家的一切，选择权在您手中，总统先生。\"\n阿里哈诺夫的嘴角泛起一丝淡淡的笑意。"
 russia.2036.a: "\"……有压迫感的那张最好。\""
 russia.2036.b: "\"……野心勃勃的肖像与崇高远大的目标。\""
 russia.2036.c: "\"……让我们再试试别的吧！\""
 russia.2037.t: "红色强权主义派"
 russia.2037.d: "我们的盟友中出现了意想不到的身影。主要由白俄罗斯左翼力量及若干前民粹派组成的力量，如今在卢卡申科的前宣传骨干格里戈里·阿扎连诺克的领导下，正创建支持阿里哈诺夫的\"红色强权运动\"。\n\n尽管我们官方从未宣称奉行此意识形态，阿扎连诺克仍坚信阿里哈诺夫能在我国建成社会主义。但即便这些人未能完全理解我们的理念并试图加以改造，我们仍可借其分化左翼反对派势力。\n\n争取尽可能多的盟友至关重要，纵使他们未必完全认同我们的主张。关键在于始终掌控主导权，使其成为实现我们目标的助力。"
 russia.2037.a: "听起来很明智，我们确实需要更多盟友。"
 russia.2037.b: "他们有自己的路要走……"
 russia.2037.c: "康米？真得杀了。"
 russia.2038.t: "俄罗斯国旗回归"
 russia.2038.d: "\"我亲爱的阿里哈诺夫总统，俄罗斯的真正旗帜总算回来了！\"\n\n\"我们的伟大领袖决定将国旗归还于我们！\"\n\n\"感谢上帝，保佑安东·安德烈耶维奇！感谢您是我们的一员！\"\n\n这是安东·阿里哈诺夫签署关于新国家象征的总统令后，网络上流传的无数留言中的一小部分。实际上，变化并不算大，只是如今那面被称为帝国旗的黑黄白三色旗，正式成为国家与\"民族\"的旗帜。\n从此，这面旗帜将受到国家与\"忠诚\"民众的青睐，而原本的三色旗依旧可以自由使用，也可在特殊场合悬挂。尤其是在政界人士与执法部门之中，三色旗以臂章的形式愈发流行，成为那些虽非\"强权派\"成员，却依然表示支持者的标志。\n\n在阿里哈诺夫的诸多政策中，这一举措或许是最为容易的一步。但接下来，将会更加艰难。"
 russia.2038.a: "三声欢呼，献给我们的伟大旗帜！"
 russia.2039.t: "统一俄罗斯党的\"强硬派\"退出政治舞台"
 russia.2039.d: "近日，阿里哈诺夫总统不断扶持各类右翼团体，试图构建起一股广泛的政治力量。这一举动意外地削弱了俄罗斯统一党内一批原本借用民族主义话语的强硬派政治人物的影响力。结果，这些人物中有些在党内几乎销声匿迹，另一些则干脆退出政坛。曾被视为党内民族主义派代表人物的维亚切斯拉夫·沃洛金宣布退休，他在国家杜马的席位很快将由\"强权派\"人士或其盟友接任。\n\n类似的情形在俄罗斯各地屡见不鲜。一些善于揣测的记者甚至暗示，这些人或许是被劝退，以便由更忠诚、更贴近\"强权派\"立场的政治人物取而代之。\n\n少数强硬派则选择收敛立场，融入统一党的主流阵营，接受该党所强调的\"主权民主\"理念。随着这股趋同化浪潮的推进，统一党内的反叛派系几近覆灭，他们的声势彻底被更为激进的力量所掩盖。"
 russia.2039.a: "大快人心。"
 russia.2040.t: "强权派的内部派系"
 russia.2040.d: "在外界看来，\"强权派\"或许是一支团结一致的力量，但在内部，这个运动远谈不上和谐。虽然多数人依然忠于领袖的愿景，但也有人在为其出谋划策，试图塑造这一愿景。党内存在着一些规模不大的派别，各有不同理念，其中最为针锋相对的，是\"旗手派\"和\"复兴派\"。\n\n\"旗手派\"认为，俄罗斯人的身份并非与生俱来，而是必须通过牺牲与斗争去赢得。他们视现代化及其价值观为软弱无力、受制于社会规范的枷锁，理想社会应由战士与勤工构成。在他们看来，宗教只是文化的副产品，更应聚焦于俄罗斯身份的历史、文化与精神内核。他们的支持者主要来自\"黄卫兵\"的基层成员，以及新并入的\"新俄罗斯\"和白俄罗斯等地。他们同样怀有建立由俄罗斯主导的斯拉夫统一联盟的野心。\n\n与之相对，\"复兴派\"则虔诚至极，笃信东正教，渴望回归传统的正教生活方式，重塑俄罗斯的基督教身份。他们所推崇的东正教毫不妥协，对异教徒采取\"刀剑加烈火\"的姿态。他们设想神职人员与教会在社会中担负军事化的角色，成为精神的核心。对他们而言，\"第三罗马\"的理念必须通过真正信徒与敌人的鲜血来强化，若它尚未存在，就必须以此为基奠建立。\n\n对阿里哈诺夫而言，更明智的做法是巧妙地吸纳这两派的理念，而不在公开场合偏向任何一方。毕竟，他手中握有一支在绝大多数事务上都会追随他的忠诚多数派。"
 russia.2040.a: "让我们看看谁的想法更好……"
 russia.2050.t: "圣彼得堡起义！"
 russia.2050.d: "近日的决策失误在圣彼得堡引发了起义，点燃了复杂的社会政治斗争。不满的市民与激进共产主义团体联合起来，企图削弱俄罗斯政府的合法性及执政效能。这一联盟正威胁着国家的稳定与统一。\n\n此刻争论政策是过于宽松还是严苛已毫无意义。当务之急是调动一切可用资源与策略，果断镇压这场叛乱。\n\n可悲的是，包括士兵和军官在内，我们的军队表现出消极应战的态度。他们宁愿固守军营，静待危机自行平息。这种消极立场迫使我们必须调遣忠诚的黄卫兵及其他精锐部队来填补防线空缺。\n在圣彼得堡，叛乱分子已组建自己的准军事武装。他们正战略性地部署兵力，随时可能发动攻势，甚至可能攻占莫斯科。"
 russia.2050.a: "我们必须不惜一切代价阻止他们！"
 russia.2051.t: "共产党人袭击诺夫哥罗德！"
 russia.2051.d: "共产主义民兵已向诺夫哥罗德区发动了进攻，这场攻势令当地政府措手不及，我们目前正依赖该地区内部的忠诚部队来守卫此地。\n我们必须制定一项战略，以在战场上取得尽可能最好的战果。一旦我们失败，诺夫哥罗德便会成为通往莫斯科的门户。届时，要阻止他们的推进将难上加难。"
 russia.2051.a: "我们必须对这些乌合之众的民兵发动反击，他们根本没有胜算！"
 russia.2051.b: "他们的兵力虽众但实力薄弱，我们必须加强本地区的防御。"
 russia.2052.t: "行动失败"
 russia.2052.d: "尽管我们已竭尽全力，但敌军那支装备虽劣、数量却呈压倒之势的部队，还是击垮了我们在该地区仓促集结的防御力量。诺夫哥罗德现已落入共产党人的控制之中，目前他们正着手在当地招募同情者。据信，他们的指挥官们正在筹备发动一场更纵深的攻势。"
 russia.2052.a: "该死的！"
 russia.2053.t: "行动成功"
 russia.2053.d: "我们的反击成功了！尽管我方亦有折损，但红军显然未曾料到，我们会在这般初期就发动如此猛烈的攻势。我们打了他们一个措手不及。诺夫哥罗德保住了！\n现在，他们被困在小小的城市公社内，比以往任何时候都更加孤立无援，已是穷途末路。我们将迅速碾碎他们——哪怕这意味着要付出牺牲。"
 russia.2053.a: "很好！"
 russia.2054.t: "红军进攻特维尔！"
 russia.2054.d: "我们的处境每时每刻都在恶化。共产党人现在已经将矛头对准了特维尔地区，而那里对袭击的防备甚至更加薄弱。眼下，前线的兵力已是前所未有的空虚。\n我们固然可以制定战略，但这简直就像是在暗夜中试图命中一个移动的靶子，根本无从下手。谁也无法预料这局势将会如何演变。"
 russia.2054.a: "重新集结所有残余兵力并立即发起总攻，他妈的！"
 russia.2054.b: "日他妈的，阵地绝不能失守！无论付出什么代价都要死守！想枪毙逃兵就枪毙！"
 russia.2055.t: "强权主义暴政的终结"
 russia.2055.d: "随着一次又一次的失败，以及起义引发的剧烈动荡，阿里哈诺夫所获得的支持日益削弱，甚至就连他的心腹部下也开始离心离德。在强权派的部队遭遇了一场残酷的屠杀之后，莫斯科城内终于爆发了起义。中央权力真空、警力又寡不敌众的情势下，抗议者们冲破了戒严的枷锁，并迎请红色民兵进驻了首都。\n共产主义者和他们的盟友们宛如昔日归来的英雄，从压迫者的手中夺回了国家的控制权，将其重新交还给了人民。他们业已肃清了杜马和克里姆林宫的旧主。\n\n强权派高层内阁的成员目前依然下落不明，阿里哈诺夫本人似乎也已销声匿迹。一场全国范围的搜捕业已展开，但强权主义者们如今已是群龙无首，在惨败的打击下士气崩溃。\n\n而选择作壁上观的军队做出了一个明智的决定，他们转而向由左翼联盟所领导的新国民政府宣誓效忠。\n\n俄罗斯现正准备着步入其崭新的社会主义时代，尽管诸多的细节仍必须尽快敲定。"
 russia.2055.a: "荣耀属于工人阶级！"
 russia.2056.t: "共产主义叛乱之终"
 russia.2056.d: "无论手段何等残酷，先前军事行动的成功已开始撼动圣彼得堡软弱共产主义领导层的根基。就在他们为战略争执不休时，我们的潜伏人员与城内忠诚分子已搜集到叛军日渐衰微兵力部署的关键情报。\n\n今日，无人机、炮兵与海军部队发动了大规模突击。叛乱之城被夷为平地，叛军残存的战备部队尽数歼灭。\n\n黄卫兵正逐街清剿负隅顽抗之敌。叛军首领们四散奔逃，懦弱者仓皇鼠窜，被捕者则将面临严厉惩处，很可能以叛国罪被处以极刑。此乃走狗之宿命。\n\n阿里哈诺夫发表演说宣布恐怖威胁已被铲除。他指责了奉行怀柔政策的亲民强权派政府，但强调此类错误绝不会重演。他宣布启动大规模肃清行动，并誓言俄罗斯不再容忍任何叛徒。"
 russia.2056.a: "荣耀属于俄罗斯！"
 russia.2057.t: "库班兵变危机！"
 russia.2057.d: "叛乱的军队已公开向我们起事！他们在库班地区集结主力，所有不忠的士兵与军官都逃往那里，并与可憎的民主派及其走狗结成同盟。\n\n不过，大多数部队尚未响应任何一方的征召。因此，我们必须集结那些由我们直接掌控的兵力。\n\n毋庸置疑，他们正图以强大的先头部队夺取莫斯科。我们必须不惜一切代价挫败他们的阴谋！"
 russia.2057.a: "我们必须不惜一切代价阻止他们！"
 russia.2058.t: "叛军扩大控制范围！"
 russia.2058.d: "由于库班地区兵力不足，我们未能使这些领土免遭敌人侵占。然而当前局势仍保持稳定，这主要得益于当地民众普遍保持政治中立，拒绝与叛徒为伍。\n\n我们必须迅速采取行动，阻止更多领土沦陷！"
 russia.2058.a: "操！"
 russia.2059.t: "支持政变的抗议！"
 russia.2059.d: "公开叛乱的消息，必定让我们的敌人欣喜若狂。那些鼠辈般的民主分子和自由派涌上了许多城市的街头，公然与当下的叛国者们沆瀣一气。尽管警方和其他武装力量目前正在处置事态，但这群不堪一击的毛头小子终究还是分散了我们部分部队的精力，使我们无法全力应对由叛国将领及其自由派后台所构成的真正威胁。"
 russia.2059.a: "立即击溃他们！"
 russia.2060.t: "信息泄露"
 russia.2060.d: "我方潜伏在敌方领土的间谍截获了一项大胆且史无前例的进攻计划，他们企图趁我方运输系统因骚乱陷入瘫痪之际，派遣一波又一波的运输队直捣莫斯科。\n\n然而，我方的谍报主管们相信他们已有对策。那些士兵尽管忠于其指挥系统，但所求并不多。我们可以借由这些行动将其收买，进而颠覆他们的计划。再者，我们也可以去接触那些尚在摇摆的军方势力，许以重酬，让他们倒向我们这一边。"
 russia.2060.a: "这会带来财政上的损失，但我们的统治地位必将得以巩固。"
 russia.2060.b: "去他妈的！我们必须动用一切资源进行坚决防御！"
 russia.2060.c: "去他妈的！趁他们毫无防备时先发制人！"
 russia.2061.t: "行动失败"
 russia.2061.d: "我们未能达成战略目标。敌军不仅兵力占优且忠诚度极高，他们更巧妙地利用了我们内部矛盾趁虚而入。在某些城市，其部队甚至受到了民众的夹道欢迎。\n如今敌方车队正向着俄罗斯腹地长驱直入，直逼莫斯科。我们已没有多少时间来制定有效防御策略了。"
 russia.2061.a: "我日……"
 russia.2062.t: "行动成功"
 russia.2062.d: "我们的战略已奏效！敌军因失去后援与我方的军事打击而陷入混乱。\n\n在库班地区，抵抗势力的残部已近乎毫无防御能力，既缺乏资源也没有盟友。此刻我们能够迅速将其歼灭。我们将把这些人渣驱赶到黑海喂鱼。"
 russia.2062.a: "太棒了！"
 russia.2063.t: "叛徒们的末日"
 russia.2063.d: "尽管先前的军事行动冷酷无情，但其成功意义重大。我们已经平息了这次叛乱。我们的果断行动和卓越的战场战术将叛乱分子驱逐出了库班。曾将胜利视为囊中之物的众多民主派人士，现已被我方控制，可以说他们已经时日无多。参与叛乱的军方将领们拒绝投降，并已按照叛徒的命运被相应地处理。\n\n阿里哈诺夫发表了讲话，宣布恐怖主义威胁已告终结。他谴责了那个\"爱民如子\"的强权派政府所采取的宽容政策，但同时强调此类错误将不会再犯。他宣布将展开一次大规模的清理行动，并誓言俄罗斯将不再容忍叛徒。"
 russia.2063.a: "荣耀属于俄罗斯！"
 russia.2064.t: "强权主义暴政的终结"
 russia.2064.d: "随着一次又一次的失败，以及起义引发的剧烈动荡，阿里哈诺夫所获得的支持日益削弱，甚至就连他的心腹部下也开始离心离德。在强权派的部队遭遇了一场残酷的屠杀之后，莫斯科城内终于爆发了起义。中央权力真空、警力又寡不敌众的情势下，抗议者们冲破了戒严的枷锁，并迎请红色民兵进驻了首都。\n军方将领、民主反对派及其他们的盟友们宛如昔日归来的英雄，从压迫者的手中夺回了国家的控制权，将其重新交还给了人民。他们业已肃清了杜马和克里姆林宫的旧主。\n\n强权派高层内阁的成员目前依然下落不明，阿里哈诺夫本人似乎也已销声匿迹。一场全国范围的搜捕业已展开，但强权主义者们如今已是群龙无首，在惨败的打击下士气崩溃。\n\n而选择作壁上观的军队做出了一个明智的决定，他们转而向由左翼联盟所领导的新国民政府宣誓效忠。\n\n俄罗斯现正准备着步入其崭新的社会主义时代，尽管诸多的细节仍必须尽快敲定。"
 russia.2064.a: "民主万岁！"
 russia.2100.t: "费奥多罗夫政变"
 russia.2100.d: ""
 russia.2100.a: "自由派希望的终结。"
 russia.2101.t: "列宁格勒委员会"
 russia.2101.d: "近日的决策失误在圣彼得堡引发了起义，点燃了复杂的社会政治斗争。不满的市民与激进共产主义团体联合起来，企图削弱俄罗斯政府的合法性及执政效能。这一联盟正威胁着国家的稳定与统一。\n\n然而，我们面临着前所未有的局面：多数左翼反对派选择支持民主党人。在圣彼得堡，由臭名昭著的斯大林主义者领导的激进斯大林派系已掌控局势。若败给这等货色，将是前所未有的奇耻大辱！\n\n可悲的是，包括士兵和军官在内，我们的军队表现出消极应战的态度。他们宁愿固守军营，静待危机自行平息。这种消极立场迫使我们必须调遣忠诚的黄卫兵及其他精锐部队来填补防线空缺。\n在圣彼得堡，叛乱分子已组建自己的准军事武装。他们正战略性地部署兵力，随时可能发动攻势，甚至可能攻占莫斯科。"
 russia.2101.a: "全员就位，我们必须阻止那些崇拜暴君的老古董们！"
 russia.2103.t: "新闻掌控"
 russia.2103.d: "我们已经意识到，有必要对媒体——尤其是国家级频道——实行更严格的管控。它们应当被重组，以便更好地契合我们的目标。\n然而，这些新闻频道中仍有许多尚未完全处于我们的掌控之下。我们需要明确该如何管理它们，以及该施行怎样的指导方针。"
 russia.2103.a: "媒体应该更加关注军事与战争。"
 russia.2103.b: "只需掌控官方新闻网络。"
 russia.2103.c: "我们应该资助基督教媒体并宣传宗教内容。"
 russia.2104.t: "强权妇人会"
 russia.2104.d: "我们的组织深切地投身于女权主义事业。借由各个附属团体，我们赋权于俄罗斯人民，使其能全面地参与政治生活。而今，我们必须为我们的妇女组织定下未来的道路。具体而言，我们需要决断，在那些以女性为主体的空间中，我们该采取何种方式来推行我们的主张。"
 russia.2104.a: "我们女性应当成为我们士兵和男人们的战斗姐妹！"
 russia.2104.b: "她们还是专注志愿和文化工作吧。"
 russia.2104.c: "她们应该在家庭与生活中弘扬正教会精神。"
 russia.2105.t: "强权国家贸易工会"
 russia.2105.d: "工人是俄罗斯的心脏与灵魂，我们必须通过值得信赖的组织来引导他们。在这些组织中，国家工会无疑是规模最庞大、也最具潜力的一个。\n然而，我们需要塑造它的形象，并向公众以及加入它的工人们，清晰地阐明它将捍卫的意识形态原则。"
 russia.2105.a: "必须更加重视军工从业人员及其福利待遇。"
 russia.2105.b: "应重点关注员工加入后的普遍忠诚度及带薪休假福利。"
 russia.2105.c: "这一组织必须以虔敬与服从为准则来构建。"
 russia.2106.t: "新青年组织"
 russia.2106.d: "俄罗斯原已存在诸多面向青年的组织，但它们杂乱无章、规模过小，无法满足我们新国家的需求。因此，我们应致力于将它们整合为一，打造一个与保卫人民与国家联盟直接挂钩的、具有凝聚力的统一组织。\n我们必须深思，这个组织将向年轻的心灵传授什么，我们又将向他们灌输怎样的价值观。"
 russia.2106.a: "这应该是一个强化并扩编版的青年军，孩子们将在那里研习战斗之道。"
 russia.2106.b: "孩子们必须学习美德与圣经知识，并深知俄罗斯是最神圣的国土。"
 russia.2107.t: "名义上的君主制复辟？"
 russia.2107.d: "一部分强权主义者（主要来自各个不同的组织）已经向我们敬爱的领袖致信，敦促他支持恢复君主制。他们坚称，这是俄罗斯最自然的治理形态，此举不仅有益于俄罗斯人民，更能加强对民族主义团体和君主制主义者的掌控。\n\n许多王位觊觎者都未被纳入考量，而加夫里尔·多罗辛则因其经验、以及他同阿里哈诺夫愿景的一致性，而被选为最佳人选。然而，此举风险亦是巨大的。即便多罗辛仅仅是个傀儡领袖，但与一位正式的沙皇分享领导权，终将削弱我们伟大领袖的影响力。"
 russia.2107.a: "这个主意不错！我们确实需要更多君主主义者的支持。"
 russia.2107.b: "我们的领袖之上不容有任何更高权威。忠于领袖是至高无上的准则。"
 russia.2108.t: "阿扎连诺克政变"
 russia.2108.d: "那是个宁静的夜晚。阿里哈诺夫在他挚爱的加里宁格勒郊外别墅休憩，忠诚的卫队守护在侧。然而，这份宁静被骤然打破，不明武装力量开始向外围安保人员开火。在阿里哈诺夫的迅速指挥下，别墅瞬间化作坚固的防御堡垒。\n\n由于无线电干扰与外界隔绝，阿里哈诺夫立刻锁定了幕后黑手：阿扎连诺克。这个怯懦之徒近年来影响力急速扩张，将越来越多的人笼络到他的红色强权主义意识形态之下。\n\n另一边，阿扎连诺克正与部下驻扎在战场边缘。他的计划很简单：杀死阿里哈诺夫及所有在场人员，随后嫁祸给境外绝望的反对派势力。他企图借此掌控保卫人民与国家联盟，宣称自己是阿里哈诺夫最亲密的继承者，延续其政治纲领。\n\n强权主义的命运悬于这场卫队与叛乱者之间的战斗，双方皆为各自效忠的主人而战……"
 russia.2108.a: "阿扎连诺克的同谋压制了阿里哈诺夫的贴身警卫！"
 russia.2108.b: "阿里哈诺夫和黄卫兵成功击退了这些阴谋分子！"
 russia.2109.t: "新强权派政权"
 russia.2109.t2: "新红色沙皇"
 russia.2109.d: "新任领导人的电视讲话在全国各地引起强烈反响。\n\n随着政权稳固确立，阿扎连诺克自信地宣布将把杀害阿里哈诺夫的凶手绳之以法。在这位新领导人的统治下，俄罗斯的团结似乎只为一个目标而凝聚：复仇。\n\n与此同时，阿里哈诺夫的真正支持者们正被悄然清除出权力核心。强权社会主义的思想体系，如今正通过苏维埃民族联盟的各个分支机构全面推行。\n\n全球媒体已将此事件称为“21世纪宫廷政变”，对阿扎连诺克的声明提出质疑。"
 russia.2109.d2: "新任领导人的电视讲话在全国各地引起强烈反响。\n\n随着政权稳固确立，阿扎连诺克自信地宣布将把杀害阿里哈诺夫的凶手绳之以法。在这位新领导人的统治下，俄罗斯的团结似乎只为一个目标而凝聚：复仇。\n\n与此同时，阿里哈诺夫的真正支持者们正被悄然清除出权力核心。沙皇本人也被秘密处置，在签署正式退位诏书后，一位性情古怪、忧郁的约瑟夫·斯大林后代被推上皇位。这位起初并不情愿的继承者，最终被“说服”接受了使命。\n\n全球媒体已将此事件称为“21世纪宫廷政变”，对阿扎连诺克的声明提出质疑。"
 russia.2109.a: "新领袖万岁！"
 russia.2110.t: "阿列克谢·纳瓦利内宣誓就职"
 russia.2110.d: "在针对国家主权的生存威胁成功解除之后，俄罗斯政治精英面临着确定新国家元首的需要。在此背景下，一位公众人物的回归成为了一个里程碑式的事件。这位人物，即阿列克谢·纳瓦利内，不仅改变了自己的政治观点，还因受到阿里哈诺夫当局的迫害而被迫转入地下。\n\n尽管俄罗斯仍处在铲除强权派威胁所引发的暂时性政治动荡中，政府在组织上效率低下，但新政府仍决定暂时任命纳瓦利内担任国家总统，直至即将举行的大选。此举旨在确保过渡时期的合法性和稳定。\n\n然而，纳瓦利内展现出了政治远见，拒绝参加即将举行的大选，理由是俄罗斯需要涌入新的、没有偏见的人才。他认为，积极参与竞选活动可能会导致选民围绕他个人形成固化，而这反过来可能会对民主过渡进程产生负面影响。"
 russia.2110.a: "民主终存……"
 russia.2111.t: "异议的终结"
 russia.2111.d: "当曙光掠过俄罗斯广袤疆域，这片土地上以不屈著称的人民醒来时，已不再怀有批判政府与国家的冲动。在成千上万忠诚公民与黄卫兵的努力下，国家机器持续膨胀壮大。所有民主派及左翼反对组织皆被摧毁，其成员大多身陷囹圄之中。\n\n俄罗斯正迈入全新纪元，全体公民皆献身国家，不再追求所谓个性。\n\n历史从不会宽恕那些对抗俄罗斯合法领导层的势力。他们终将被记忆抹除，唯余史册中由胜利者挥就的\"叛徒\"烙印。这些绝望之徒曾妄图撼击祖国的命运，如今他们苍白无力的虚伪自由呼唤，终将湮没于森严笔墨，或殒命矿坑牢狱，或永困于警局的幽暗地牢之中。\n\n残存的微弱异议，也早已被震耳欲聋的强权口号与军乐进行曲吞没。\n\n俄罗斯人民此刻万众一心：无迟疑，无勉强，无赘余疑问。\n这难道不是幸福吗？"
 russia.2111.a: "得免却叛逆之心，摆脱自由的人是有福的。"
 russia.2112.t: "新明天"
 russia.2112.d: "在俄罗斯人民的共同努力和抵抗运动的协调行动下，阿里哈诺夫的暴政终被推翻。强权派及其追随者如同沉船上的老鼠，失去首领后已四散逃往荒僻之地，他们组织涣散，仅能构成微不足道的威胁。\n\n成千上万民众手持俄罗斯国旗涌上街头欢庆这一时刻，圣彼得堡的庆祝浪潮尤为汹涌。部分集会至今仍未停歇。\n\n尽管拆毁拥有数千部门的庞大官僚机器尚需时日，但如今公民已可安枕而眠。新政府首批法令与承诺聚焦于言论自由与民主法治，同时将对政权官员进行肃清。所有滥用职权的官僚很快将锒铛入狱，填满那些曾关押政治犯的牢房。\n\n希望或许刚刚开始回归俄罗斯人民的灵魂，但我们已然可以宣告：崭新的明天即将来临，它将昭示俄罗斯未来的航向。\n\n纵然这场革命夺走了许多正直的生命，不过欲成大事者，岂能拘于小节？"
 russia.2112.a: "我有一个梦想……"
 russia.2113.t: "人民代表大会"
 russia.2113.d: "随着新政府稳固就位，谢尔盖·乌达利佐夫宣布启动后来被称为\"人民代表大会\"的会议，俄罗斯社会主义转型的未来将在这里决定。\n\n当代表们陆续入座，辩论中逐渐形成两个鲜明阵营。一方是谢尔盖·乌达利佐夫与主张回归传统社会主义理想的正统派社会主义者及共产主义者；另一方是以劳工联盟为首的工会派系，他们倡导构建以工会为核心的新型社会主义模式——这种构想仅在少数实验中初现雏形。\n\n尽管乌达利佐夫仍是更受欢迎的选择，但关键时刻已迫在眉睫。唯有时间能揭示命运将眷顾哪条道路。"
 russia.2113.a: "乌达利佐夫当选人民代表大会主席！"
 russia.2113.b: "克拉夫琴科当选人民代表大会主席！"
 russia.2114.t: "新青年运动"
 russia.2114.d: "在当前我国日益复杂的监管环境下，一个关键问题浮出水面：我们应如何在现有治理框架下培养具有政治参与意识的青年？\n\n一种可能性是复兴苏联时期的共青团和少先队组织，并将其融入现代语境。通过这种方式，我们可以利用历史经验和现有架构来促进青少年的公民参与和政治素养培养。另一种选择是采取更激发的反体制道路，重新激活\"红色青年先锋\"模式——这个组织曾以非官方形式保持纯洁性，强调青年自主性与行动主义。沿着这条路，我们将继承倡导直接政治参与的历史传统，为年轻一代构建发声平台。"
 russia.2114.a: "新共青团！"
 russia.2114.b: "青年们必须为革命做好准备，而不是沉溺于乏味的官僚工作。"
 russia.2115.t: "选举！"
 russia.2115.d: "在经历了选举投票、竞选活动与群众集会带来的无数个沉闷日子后，俄罗斯人民决定命运的时刻终于来临！我们正站在新时代的黎明，俄罗斯民众将投票选出祖国的新任总统，让我们期待他们展现睿智与信念......\n\n所有选票统计完毕，获胜者是......"
 russia.2115.a: "保守派候选人！"
 russia.2115.b: "自由派候选人！"
 russia.2115.c: "社会主义候选人！"
 russia.2115.f: "爱国者候选人！"
 russia.2115.g: "民族主义候选人？！"
 russia.2115.z: "共产党候选人？！"
 russia.2116.t: "无产阶级之党"
 russia.2116.d: "在我们重建苏联体制的过程中，党将是其根本要素之一。鉴于目前缺乏经验丰富的官僚，我们必须决定从何处为我们的新体制招募新鲜血液和领导人才。\n\n​有三种潜在的选择可供考虑：\n​1.老派斯大林主义政党苏共-俄共工党以及强硬派：他们可以协助恢复我们政权的秩序和稳定。他们还拥护苏联爱国主义和反修正主义的观点。\n\n​2.革命工人党，前托洛茨基主义组织：他们拥有庞大的青年基础，并吸纳了众多社会主义者和共产主义者。他们可以为我们革命国家的活力做出贡献。\n\n​3.众多小型共产主义团体：这些团体在治理和历史观上普遍倾向于列宁主义方法。我们可以利用他们作为中间地带，以避免采取极端的立场。"
 russia.2116.a: "邀请斯大林主义者加入到我们的队伍当中。"
 russia.2116.b: "或许我们可以邀请那些不那么左的社会主义者。"
 russia.2116.c: "​将所有共产主义小团体统一纳入我们的体制。"
 russia.2117.t: "温和左派联合起来！"
 russia.2117.d: "随着我们国家的政治舞台重新焕发活力，温和左翼势力正在整合为一个单一政党。这个新成立的政党涵盖了过往的一系列元素，包括公正俄罗斯、俄罗斯联邦共产党的温和派、人民俄罗斯，以及各种其他较小的社会民主主义团体。\n\n​在党的成立大会上，其政治和经济纲领已经确立，同时做出了一个关键决定：确定其名称。"
 russia.2117.a: "全俄社会主义工党。"
 russia.2117.b: "社民联盟。"
 russia.2117.c: "社会民主人民党。"
 russia.2118.t: "保守势力大团结"
 russia.2118.d: "我们的国家正处于从激进的极端民族主义历史中复苏的阶段。温和的保守派势力已联合起来，创建了一个新的政治实体。\n​在其党代会上，他们讨论了社会和政治议题，同时也为他们的政治组织选定了名称。"
 russia.2118.a: "全俄罗斯爱国党。"
 russia.2118.b: "民族道路。"
 russia.2118.c: "民族团结党。"
 russia.2119.t: "自由派团结一致"
 russia.2119.d: "​在政治环境中，一股有凝聚力的自由主义派系逐渐形成，并得到了著名自由派人士和组织的背书。这次整合在一场创始大会上正式启动，参与者囊括了不同年龄层的众多政治家。在这次集会中，该派系细致地勾勒了他们的政治议程，并一致选定了他们的命名，从而正式地阐明了他们的政治身份和目标。"
 russia.2119.a: "公民平台。"
 russia.2119.b: "民主中心。"
 russia.2119.c: "俄罗斯民主党。"
 russia.2120.t: "爱国者们联合力量"
 russia.2120.d: "强硬派爱国者和极端保守主义者，主要来自于统一俄罗斯党的反动派系，以及普京时代强人政治的坚定支持者，如今，他们已整合为一个强大的政治集团。在他们的秘密会议中，他们精心商议了维持其影响力的战略，同时也为他们的组织定下了与其意识形态信条产生共鸣的名称。"
 russia.2120.a: "俄罗斯统一大会。"
 russia.2120.b: "祖国。"
 russia.2120.c: "主权民主党。"
 russia.2121.t: "民族主义者，但绝不是这种民族主义者！"
 russia.2121.d: "尽管极端民族主义势力已掌控了国家，但许多民族主义者对强权派及其领袖阿里哈诺夫仍持有异议。别洛夫-波特金，一位曾经鲜为人知的民族主义者，如今在那些反对阿里汗诺夫、并感到自己的政治愿景被保卫人民与国家联盟排除在外的人群中，已然成了一个举足轻重的声音。\n现在，他投机地选择了与民主反对派结盟。他正在集结人马，组建一个新的政治组织，意图在后阿里哈诺夫时代的俄罗斯继续推行民族主义政治路线。\n他们日常讨论的议题，自然也包括了这个组织的未来名称……"
 russia.2121.a: "反布尔什维克斗争联盟。"
 russia.2121.b: "全俄帝国运动。"
 russia.2121.c: "俄罗斯民族党。"
 russia.2122.t: "赤潮"
 russia.2122.d: "无论时局如何，俄罗斯的共产主义者们似乎总有办法重返政治舞台。这一次，奥列格·马林科维奇正试图整合共产主义的各方势力，这与阿里哈诺夫上台前的红色俄罗斯联盟颇为相似。\n马林科维奇召集了他的团队，并公布了他们的纲领，清晰地阐明了他们所持的共产主义与民粹主义立场。\n他们已经选定了一个名字……"
 russia.2122.a: "俄罗斯共产党人。"
 russia.2122.b: "共产主义者联盟。"
 russia.2122.c: "斯大林主义社团。"
 russia.2126.t: "俄罗斯各地的小党派"
 russia.2126.d: "不出所料，除了那些根基更稳固的政治力量外，俄罗斯政坛还涌现出大量新兴组织和党派。其中既有教条主义的斯大林派共产主义者，也有更为激进的极右翼民族主义者，还包括自由派社会主义者与市场自由主义者。尽管这些团体大多不值一提，但若某些组织的政策主张能被未来执政者接纳用于组建联合政府谈判，或有助于提升其在全国政治舞台的能见度，则仍具一定考量价值。"
 russia.2126.a: "只能就这样了。"
 russia.2127.t: "国民议会首次会议"
 russia.2127.d: "随着民主化进程的推进及阿里哈诺夫的宣言，国民议会正式召开首次会议。议会共设500个席位，目前多数席位已确定归属，剩余席位竞争激烈，须待首次选举后方能落定。\n议员们最初皆以\"独立人士\"身份聚集，但很快便形成了不同派系，并逐渐发展为新兴政治力量。其中最具影响力的是阿里哈诺夫支持的\"民族民主复兴联盟\"，该党派汇集了民族民主主义者、前国家主义派及部分技术官僚，已成为俄罗斯新的执政党。该联盟基本保留了保卫人民与国家联盟的组织架构，但进行了现代化改造以适应公民政治环境。\n\n其他重要派系包括俄罗斯宪政民族党，其由经历清洗后幸存的保守派民主改革者领导。然而因其温和被动的立场，该党可能被视为受操控且易妥协的力量。\n\n工业发展党与俄罗斯工会联合会则纯粹代表工商业资本利益，通过议会为金融及工业企业争夺影响力。\n\n规模最小的派系是国家劳动联盟，这个左翼组织主要由左翼民族主义者与民族社会主义者构成。尽管秉持左派理念，他们主要倡导加强国家管控，仅支持针对俄罗斯族工人阶级的福利政策。"
 russia.2127.a: "更老实的民主制度。"
 russia.2128.t: "安东·阿里哈诺夫退出保卫人民与国家联盟"
 russia.2128.d: "令许多人震惊的是，阿利汉诺夫正式宣布脱党，断绝了与保卫人民与国家联盟的联系。他在声明中批评党内忠诚是盲目遵循教条、拒绝承认真理的表现。从今往后，他将作为一支独立力量参与国家事务。\n他还宣布即将召开国民议会首次会议，称这一新机构将用于实现\"民主\"参与。批评者迅速指出俄罗斯尚未重建民主制度，并警告称这些改革只会粉饰门面，形成由精英阶层及其利益主导的新贵族式民主，使真正的声音被边缘化。\n尽管如此，改革派仍在庆祝他们战胜了保卫人民与国家联盟中的强硬派，后者如今群龙无首，在政治上已被边缘化。"
 russia.2128.a: "荣耀属于阿里哈诺夫，智者中的智者！"
 russia.2129.t: "昔日荣光今何在"
 russia.2129.d: "尽管强硬派强权主义者已退出政坛，但若任其成为不受控制的势力，恐怕会对新政权造成灾难性后果。\n\n虽然多数强权主义者及其支持者对阿里哈诺夫担任终身国家元首的现状感到安心，但仍存在将意识形态置于个人偏好之上的群体。这些人主要是\"旗手派\"与\"复兴派\"，他们矢志推进其强权主义的理想蓝图。\n\n我们可从其残余势力中组建一个受新政权监管的稳定政党，使其支持者获得有所代表的虚幻满足。\n\n或者，我们可尝试整合强权运动的两翼力量，鼓励他们重新融入社会。此举虽能扩大影响力，但需投入更多心力。"
 russia.2129.a: "利用旗手派，我们可以借助他们的军国主义。"
 russia.2129.b: "召集复兴派，他们的虔诚或许能派上用场。"
 russia.2129.c: "把他们俩都算上吧，毕竟都是爱国者。"
 nato.6.t: "未标记民航客机"
 nato.6.d: "华沙肖邦塔台\n未标记航班，这里是华沙肖邦机场，请通报呼号及目的地。\n\n不明航班\n…\n\n华沙肖邦塔台\n未标记航班，你已进入限制空域，请立即通报呼号及目的地。\n\n不明航班\n…\n\n华沙肖邦塔台\n第二架未标记航班，请通报呼号和目的地。雷达上还有更多…10架、15架、20架…所有未标记航班，立即通报你们的呼号，否则我们将采取强制措施迫降。\n\n不明航班\n…"
 nato.6.a: "那些不是民航客机！"
 tajikistan.1.t: "塔吉克斯坦罗贡大坝接近完工"
 tajikistan.1.d: "塔吉克斯坦正积极推进国家重点能源工程——罗贡水电站的竣工工作。据政府通报，大坝建设已进入最后阶段，正在安装最终一批水轮发电机组。该电站投产后将成为中亚地区规模最大的水电站，不仅可提供廉价电力，更能降低区域能源进口依赖。\n\n这项由苏联政府于1976年启动的工程曾多次搁置，直至2018年在俄罗斯支持下重启建设，最终投产计划于近年完成。"
 tajikistan.1.a: "这对他们是件好事。"
 SOV_the_russian_dream: "俄罗斯之梦"
 SOV_the_russian_dream_desc: "一个占据世界八分之一土地的国家。一个拒绝仅仅成为历史脚注的国家。一个拥有着渴望回归的海外领土和人民的国家。一个拒绝西方霸权、支持多极世界秩序的国家。\n\n尽管过去的一个世纪对我们并不友善，但也赋予了我们一些最光辉的时刻。只要俄罗斯的灵魂不灭，我们将继续依自己的道路前行。"
 SOV_pacify_abkhazia_and_south_ossetia: "保卫阿布哈兹和南奥塞梯"
 SOV_pacify_abkhazia_and_south_ossetia_desc: "自打这两个国家从格鲁吉亚揭竿而起之时，便与我们情同手足。他们的人民坚韧不拔、充满自豪，而且忠诚。\n\n然而，不可否认的是，我们却一直让他们在世界外孤立无援，这是对他们的亏欠。我们必须将他们纳入我们的经济和防御体系，理应让这些地区繁荣昌盛。"
 SOV_pressure_kiev: "对乌克兰施压"
 SOV_pressure_kiev_desc: ""
 SOV_global_propoganda_campaigns: "全球宣传攻势"
 SOV_global_propoganda_campaigns_desc: ""
 SOV_complete_nordstream2: "完成北溪二号管道项目"
 SOV_complete_nordstream2_desc: ""
 SOV_review_the_military_budget: "重审军费预算"
 SOV_review_the_military_budget_desc: ""
 SOV_ties_with_bashar: "与巴沙尔的纽带"
 SOV_ties_with_bashar_desc: ""
 SOV_chinese_trade_deals: "对华贸易订单"
 SOV_chinese_trade_deals_desc: "我们的东方邻国既身为世界第二大经济体，同时也是全球主要的商品生产国。这样一个大国，从它的发展历程来看，拥有许多可以与我们分享的专业知识。让他们的实业家为我们指明通往繁荣的道路吧，是时候借鉴下他们的技术了。"
 SOV_condemn_ukraine_neonazism: "谴责乌克兰新纳粹"
 SOV_condemn_ukraine_neonazism_desc: ""
 SOV_prepare_the_union_state: "准备联盟国"
 SOV_prepare_the_union_state_desc: "1999年，亚历山大·卢卡申科与鲍里斯·叶利钦签署了联盟国条约。当然，起初的想法是待条约生效后，老爹就会接管俄罗斯。然而，随着弗拉基米尔·普京的崛起，该项目遭遇搁置。\n\n但任何事情都不可能永远停滞不前，我们的总统正专注于尽快实现联盟国。他甚至为了与卢卡申科的会面而买了阿布哈兹葡萄酒，可见他对这件事有多认真！"
 SOV_increase_fsb_funding: "延长任期限制"
 SOV_increase_fsb_funding_desc: "有了人民的意愿，才有了普京今天的掌权。尽管人们都在大谈威权主义，但真正重要的是普京本人而不是政府的公众舆论。因为只要当权者是他们支持的人，人民就愿意容忍腐败和低效。\n\n嘿，既然这种模式在奥巴马和特朗普身上都行得通，我们为什么就不能效仿呢？"
 SOV_strangle_the_islamists: "绞死伊斯兰主义者"
 SOV_strangle_the_islamists_desc: ""
 SOV_tighten_the_leashes: "收紧缰绳"
 SOV_tighten_the_leashes_desc: ""
 SOV_fight_against_the_left: "对抗左派"
 SOV_fight_against_the_left_desc: "目前，左派对我们的体制构成了巨大威胁。他们在先前的地方选举中支持纳瓦利内，\"苏联主权公民\"邪教，以及反建制言论。既然民族主义者已经被镇压，左派也该受到同样的对待才公平。"
 SOV_fight_against_the_right: "对抗右派"
 SOV_fight_against_the_right_desc: "2010年代，我国政府打击了以反移民和仇外为首的民族主义情绪。然而，这种威胁不仅依旧存在，甚至似乎还在蔓延。我们可忘不了有多少新纳粹分子以\"对抗布尔什维克总统及其走狗\"为由投靠乌克兰。虽然我们也有支持我们事业的民族主义者，但最好保证他们不能宣传他们的意识形态。"
 SOV_fight_ldpr_influence: "打击自民党"
 SOV_fight_ldpr_influence_desc: "必须向身为俄罗斯右翼运动主流团体的俄罗斯自由民主党施压。你知道该怎么做，赶紧行动！"
 SOV_fight_liberalism: "对抗自由主义"
 SOV_fight_liberalism_desc: ""
 SOV_fight_communist_nostolgia: "破坏共产党"
 SOV_fight_communist_nostolgia_desc: "必须向身为俄罗斯左翼运动主流团体的俄罗斯联邦共产党施压。你知道该怎么做，赶紧行动！"
 SOV_expand_government_framework: "扩展政府架构"
 SOV_expand_government_framework_desc: "对国家的掌控给了我们可以无所事事，懒散度日的资本。然而总统认为，我们应该通过在体制内建立新的纽带和联盟来\"加强管理\"。全俄人民阵线是一个已经建立的体系。我们要做的就是扩大它。"
 SOV_towers_of_kremlin: "克里姆林宫的高层"
 SOV_towers_of_kremlin_desc: "虽然俄罗斯的政党在外交政策上\"团结一致\"并且可以充当唯唯诺诺的应声虫，但俄罗斯并不是一个一党制国家。我们称之为\"塔\"的集团，是由政府中具有相似背景和观点的人员组成，他们共同推动着自己的议程。\n\n两个主塔由\"技术官僚\"和\"西罗维基\"组成。技术官僚们主张将更多资金投入到从核能到明显的敛财项目等技术项目中，而西罗维基则主张将更多资金投入到从核武器到明显的敛财项目等军事项目中。\n\n安抚这两个集团中的任何一个都会带来不同的好处，但也可能造成一些问题。"
 SOV_anti_globalist_bulwark: "反全球化堡垒"
 SOV_anti_globalist_bulwark_desc: "全球化精英集团企图奴役世界，将其囚禁在跨国企业的牢笼之中。我们必须反抗这种影响。我们必须向世界证明，单极世界秩序注定要失败，我们和全球多数派有能力阻碍其阴谋。"
 SOV_glorify_our_victory: "颂扬胜利史诗"
 SOV_glorify_our_victory_desc: "我们是胜利者的后裔，是那些为了保护我们人民免遭灭绝而牺牲的人的后裔。自由派走狗曾扬言，颂扬胜利是\"嗜血\"和\"不必要的\"。为什么我们要忘记这场战争？难道我们要忘记近3000万苏联公民村连村的惨遭德国人屠杀？同样遭此暴行的以色列却拒绝忘记这些暴行。\n\n我们必须以他们为榜样，记住我们能够站在这里，是多少先辈做出了牺牲。"
 SOV_amplify_state_media: "放大官媒作用"
 SOV_amplify_state_media_desc: "有线电视的热度虽随着互联网的兴起而有所下降，但我们不应该放弃它。我们的媒体服务必须得到加强和完善，我们仍然依赖它的成功。\n\n似乎连CNN和BBC都在本国饱受宣传批评……我想，要让我们的每一个叙述都富有吸引力，将会成为一项棘手的任务。"
 SOV_pass_the_new_constitution: "体制担保人"
 SOV_pass_the_new_constitution_desc: "我们敬爱的总统已经完成了他的改革。议会重新洗牌，高层们也都心满意足。说实话，没有他我们该怎么办？要是没了他的协调，其他人似乎很可能会陷入互相厮杀。好吧，值此之际，让我们为我们的总统干杯！"
 SOV_declare_smo: "准备特别军事行动"
 SOV_declare_smo_desc: "在解决了最紧迫的问题之后，是时候将目光投向国外了。在西方的支持下，乌克兰多年来一直循序渐进地进行再武装化。而我们的顿巴斯兄弟也已经得到强化，将军们向我们告知军队已经准备万全。好吧，兄弟们，是时候进行一次特别军事行动了。\n\n乌拉！"
 SOV_stimulate_srzp: "助力传播公正俄罗斯"
 SOV_stimulate_srzp_desc: "公正俄罗斯-为了真理是一个颇为有趣的政治实体。他们由温和社会主义者、民族布尔什维克老兵及中间派组成，且在政局中飘摇不定。尽管他们也对统俄党大肆批判，但好在还是效忠于总统。我们可以利用其从俄联邦共产党那里分走选票……"
 SOV_strengthen_the_federation_chairman: "强化执政党"
 SOV_strengthen_the_federation_chairman_desc: "总统只要他自己的政党，其他全都滚蛋！我们必须让统一俄罗斯党在民意调查中获得绝对多数。开始干活吧！"
 SOV_1000_years_of_putinism: "普京主义一千年"
 SOV_1000_years_of_putinism_desc: "看起来我们敬爱总统的地位已经稳如磐石。他驾驭了重重危机，重振了我们的体制。他的故事和功绩将被载入史册。如此静止之态，二十年如一日。\n\n让我们雄心勃勃地举杯，祝福这种状态再持续一千年！"
 SOV_address_the_economy: "解决经济问题"
 SOV_address_the_economy_desc: ""
 SOV_pension_reform: "养老金改革"
 SOV_pension_reform_desc: ""
 SOV_encourage_domestic_production: "鼓励国内产业发展"
 SOV_encourage_domestic_production_desc: "随着供应链陷入混乱，显而易见我们必须增加国产产品的数量。这也有助于缓解人才流失问题，因为我们将更加关注需要熟练劳动力的新兴产业。"
 SOV_strengthen_gazprom: "增强俄气集团"
 SOV_strengthen_gazprom_desc: "天然气、石油和自然资源一直以来都是，并且在至少未来五年内仍可能作为我们主要的收入来源。欧洲市场对我们相当依赖，我们不应该让这样的良机溜走。让这蓝色的火焰为我们带来摇钱树吧。"
 SOV_everything_is_alright: "一切按计划进行……"
 SOV_everything_is_alright_desc: ""
 SOV_force_lockdowns: "执行封控政策"
 SOV_force_lockdowns_desc: "好吧……看来这次病毒比我们最初预想得要更严重。我们得先将俄罗斯封锁起来以解决这个问题。我们得干不少活。"
 SOV_kickstart_vaccine_research: "启动疫苗研发"
 SOV_kickstart_vaccine_research_desc: "为什么要购买外国疫苗呢？我们自己就能生产！我们有足够多聪明卓绝的病毒学家能够胜任这项工作。资助俄罗斯病毒研究中心吧！我们能制造出高品质的药物！"
 SOV_purchase_sinovac_vaccine: "进口科兴疫苗"
 SOV_purchase_sinovac_vaccine_desc: "嗯……我想中国应该已经准备好他们的疫苗了……我们干嘛还要浪费钱在自己研发疫苗上呢？直接用我们朋友的就好了，反正区别也不大。"
 SOV_provide_incentives_to_stay_open: "保证正常营业生产"
 SOV_provide_incentives_to_stay_open_desc: ""
 SOV_restrict_meetings: "限制集会权"
 SOV_restrict_meetings_desc: ""
 SOV_restore_public_confidence: "回归正轨！"
 SOV_restore_public_confidence_desc: "俄罗斯恢复正常了！好吧，准确来说是进入新常态了。我们在疫情期间进行的投资和发展将会保留。但普京总统对得以避免最糟糕局面感到十分喜悦。这对我们的政府来说是一次非常关键的考验。我们的系统已经得到了完善，未来我们能够轻松应对这种特殊情况！忽略那些来自民众的抱怨和牢骚吧，反正他们也不知道什么对他们好。"
 SOV_against_chipivization: "抵制芯片疫苗！"
 SOV_against_chipivization_desc: "公众对我们封锁和大规模疫苗接种的愤怒似乎已经达到了临界点。这些共匪居然公开跟我们唱反调……还说什么我们给公民注射芯片疫苗？啥？还有为啥这些地方政府里的反疫苗运动领袖全都是那帮西方走狗选出来的？\n\n呃……让我们稍微冷静一下……确实，我们的监控系统和封锁措施是有点过分了，但大家不都在这么干吗！跟澳大利亚和英国比起来，我们做的还算轻了！\n\n算了，只要他们高兴就好。我们不能因为这些毫无价值的废话而玷污敬爱总统的形象……"
 SOV_force_vaccinations: "强制接种疫苗"
 SOV_force_vaccinations_desc: ""
 SOV_sponsor_russian_digital_economy: "鼓励数字经济"
 SOV_sponsor_russian_digital_economy_desc: "俄罗斯坐拥世界上最大的数字市场之一。从网上银行应用程序、在线社交服务，到简单的通讯工具和搜索引擎，俄罗斯拥有许多聪明卓绝的IT工作者。弗拉基米尔·弗拉基米罗维奇看到了这种优势，而我们会借此继续支持这些产业。\n\n让俄罗斯网络达到新的高度吧！"
 SOV_fund_military_advancement: "军备升级拨款"
 SOV_fund_military_advancement_desc: "军工产业仍然是我们最重要的产业之一。这些工厂不仅为我们提供了可以出口的武器，还在国内创造了更多的就业机会并利用了我们的资源。\n\n美国人之所以能够大幅提升自身实力，在很大程度上要归功于他们的军事承包商创造了用于轰炸中东的高科技武器。我们应该效仿他们的做法。"
 SOV_back_to_normal: "俄罗斯的未来经济"
 SOV_back_to_normal_desc: "曾几何时，俄罗斯经济也曾抵达顶峰。讽刺的是，这段繁荣时期恰逢世界金融危机。现在看来，我们又一次迎来了黄金时代。当世界燃烧，世界经济崩溃之时，唯独我们屹立于顶峰。石油和天然气带来的高收入，巨大的工业扩张，封锁的结束，一切似乎都发生在恰到好处的时候。让我们为我们总统的努力取得的成果干杯！"
 SOV_what_now: "现在怎么办？"
 SOV_what_now_desc: "秃鹫已经开始盘旋，觊觎着那把处于权力中央的座椅。没了弗拉基米尔·普京的指引，无论候选人为谁，俄罗斯的未来都将改变。\n\n我想我们也必须选择支持谁，因为我们的饭碗都悬着呢。"
 SOV_spread_cprf_leaflets: "团结共产党"
 SOV_spread_cprf_leaflets_desc: "俄共早在很久以前就被其他左翼团体鄙视，他们从未将其承认为真正的左派政党。然而，在这个千载难逢的机会下，难道他们还会袖手旁观，让资本家像1996年那样夺走我们的胜利吗？\n\n不！他们将团结在久加诺夫的周围，让俄罗斯重回正轨！"
 SOV_party_of_power: "善用行政资源"
 SOV_party_of_power_desc: "当其他党派还在为权力争得焦头烂额之时，梅德韦杰夫已经抢占了先机。我们会利用政府掌握的一切资源，向人民传递这样一个信息：普京的接班人将再次赢得胜利！"
 SOV_ramp_up_the_agitation: "激起民粹躁动"
 SOV_ramp_up_the_agitation_desc: "亲爱的俄罗斯人民，你们对自己的生活满意吗？当我们的寡头们恬不知耻地舔着西方的脚丫子，让无能劳工充斥着我们祖国的时候，你们会高兴吗？当欧洲人罔顾事实诋毁俄罗斯，狼心狗肺地摧毁那些曾亲手将他们从纳粹手中解放的红军雕像的时候，你们会感到高兴吗？就因为他们憎恨我们？\n\n日里诺夫斯基对这一切说不！俄罗斯将夺回其应受之荣！"
 SOV_post_putin_elections: "总统选举"
 SOV_post_putin_elections_desc: "我国政府持续动荡，显然现在必须采取行动的时候了。多年来，俄罗斯的总统选举一直较为平淡无奇。然而当前，随着所有政党、政治集团及焦点小组纷纷聚焦于总统之位，这场选举似乎将左右我国未来数十年的走向。"
 SOV_crush_western_influence: "摧毁西方影响"
 SOV_crush_western_influence_desc: "亲西方的反对派利用一切可用资源来破坏我们的国家。我们的总统了解西方两面三刀的本性。即便在我们最亲密的时刻，他们也试图通过资助车臣恐怖分子来背后捅刀子。这就是为什么我们必须尽一切努力将西方资助的运动逼到地下。\n\n而自那时起，他们所能做的就是看着我们与太阳一同崛起。"
 SOV_anti_ukranian_military_exercizes: "反乌军事演习"
 SOV_anti_ukranian_military_exercizes_desc: "2014年乌克兰政变期间，合法总统亚努科维奇决定逃离祖国前往俄罗斯。而这为我们留下了祸根。从那时起，乌克兰一直在为与我们的冲突未雨绸缪，北约对其领导层与军队持续进行训练。\n\n理想情况下，我们也应该为此做好准备。毕竟我军早已陈旧不堪。"
 SOV_assist_our_novorossiyan_allies: "援助顿巴斯诸共和国"
 SOV_assist_our_novorossiyan_allies_desc: "这两个俄罗斯世界的堡垒为了成为俄罗斯的一部分做出了多少流血牺牲。然而，在他们揭竿而起多年之后，问题仍然存在。他们既没有统一的经济区，也没有统一的军队。\n\n不过，就目前而言，简单的支持就已经足够了。"
 SOV_the_navalny_fifth_column: "清洗第五纵队"
 SOV_the_navalny_fifth_column_desc: "尽管我们用尽手段，但纳瓦利内及其追随者似乎仍在与我们作对。真是滑稽，一个将高加索人比作蟑螂的俄罗斯民族主义者，居然想给我们带来\"西方民主\"。为什么？就因为他去了耶鲁大学进修了\"治国之道\"？\n\n遗憾的是，他不会像特萨克那样死去，也不会像他以前的纳粹同僚那样神秘失踪。他是一个\"改过自新\"的人，一个自由主义者。虽然他可能确实已经改变，但这不代表他过去的罪孽会被一笔勾销。"
 SOV_increase_online_censorship: "加强网络审查"
 SOV_increase_online_censorship_desc: "近期，由于俄罗斯联邦通信、信息技术和大众传媒监督局的效率低下。封锁Telegram的尝试失败了，许多西方特工一直在其他社交媒体上散布虚假信息。我们必须完善互联网安全体系才能有效将其利用。\n\n顺带一提，好像有很多年轻人乐于将我们机构画成一个可爱的女孩，哈哈，我倒是想知道他们为啥这么干？"
 SOV_arrest_navalny: "重拳出击"
 SOV_arrest_navalny_desc: "好吧，既然这帮反对派敬酒不吃吃罚酒，那我们只能采取严厉手段阻止国家分裂了。特别用途机动单位将被部署用以平息抗议。\n\n跟那些所谓的自由民主国家不同，我们的部队可不会用那些低效的橡皮子弹或是水炮。警棍和盾牌将切实打在那些违法分子的身上！"
 SOV_combat_domestic_extremism: "打击国内极端分子"
 SOV_combat_domestic_extremism_desc: ""
 SOV_arrest_troublesome_politicians: "逮捕麻烦政客"
 SOV_arrest_troublesome_politicians_desc: "幸运的是，俄联邦共产党内部有很多问题分子可以被我们加以利用。其中包括反疫苗者、疯狂的阴谋论者和一般反政府异议人士。自然，他们在左翼运动中属于少数派，但我们可以利用他们降低公众对共产党的印象。"
 SOV_bribe_corrupt_cprf_officials: "与久加诺夫会面"
 SOV_bribe_corrupt_cprf_officials_desc: "俄罗斯联邦共产党领导者是一位睿智老人。他是我们总统的尊敬的同事，也是一位政坛老将，如果没有美国和寡头的干预，他几乎早就能在1996年的选举中击败叶利钦。然而，弗拉基米尔·普京认为，我们应当对其领导的政党今后如何运作提出一些\"建议\"。"
 SOV_arrest_communist_extremists: "抓捕极左分子"
 SOV_arrest_communist_extremists_desc: "好的，既然我们已经解决了共产党的问题，是时候处理那些规模较小的左翼运动了。虽然它们中的大多数几乎没有实际影响力，可以忽略不计，但某些个人却已经对我们构成了威胁。是时候让男孩们展开行动了！"
 SOV_calls_of_russian_unity: "呼吁国内团结"
 SOV_calls_of_russian_unity_desc: "西方单极主义者正在围攻俄罗斯人！他们试图分裂我们，如果我们团结起来反对他们，他们将毫无胜算！团结就是力量！"
 SOV_bribe_corrupt_ldpr_officials: "会见日里诺夫斯基"
 SOV_bribe_corrupt_ldpr_officials_desc: "有人称日里诺夫斯基为俄罗斯政坛的\"小丑\"，但这与事实相去甚远。他深谙如何发展自己的品牌和政党，他对地缘政治和国内政治游戏的了解也不容低估。这就是为什么我们伟大的总统要与他就其政党的未来进行对话。我们希望他的声音能被聆听。"
 SOV_purge_problematic_oligarchs: "清洗棘手寡头"
 SOV_purge_problematic_oligarchs_desc: "虽说目前的主流右翼多由寡头资助。但好就好在，这些寡头都忠于我们的体制。为防患于未然，可以杀鸡儆猴给他们施压，不让他们越界。我们可以逮捕那些与公开犯罪案件有关的\"自由派\"寡头，他们也会高兴的。一石二鸟。"
 SOV_arrest_fascist_extremists: "抓捕极右分子"
 SOV_arrest_fascist_extremists_desc: "虽然如\"剁刀\"(Tesak)这样的新纳粹分子已经自行了断，其团伙要么已然树倒猢狲散，要么逃亡欧洲，但国内仍留存有部分民族主义团体威胁我们的政权，必须处理掉他们。"
 SOV_utilize_communist_nostalgia: "利用苏联情结"
 SOV_utilize_communist_nostalgia_desc: "苏联是我们历史上最伟大的时期！我们战胜了不可能的困难，挑战美国争夺全球霸权，将国家从废墟中重建为工业强国。我们必须珍惜这段过去。"
 SOV_focus_on_corruption: "聚焦反腐工作"
 SOV_focus_on_corruption_desc: "不幸的是，尽管有再多的花言巧语粉饰，政府内部的腐败问题仍是国家的一大顽疾。它阻碍了社会、军事、经济和文化凝聚力，还损害了我们的增长潜力。\n\n与其增加俄罗斯的经济产出，不如首先解决体制的缺陷。"
 SOV_sanction_proof_economy: "抗制裁经济"
 SOV_sanction_proof_economy_desc: "虽然腐败仍然是一个大问题，但现在的首要问题是我们难以承受西方制裁的影响。制裁实施多年来，还让本地商人去贸然挑战西方企业着实是愚蠢之举。\n\n但是，如果我们创造公平的竞争环境，让我们的资本家有一些喘息的空间……或许我们甚至能获得可与西方媲美的制造能力呢？"
 SOV_increase_public_transparency: "提高政治透明度"
 SOV_increase_public_transparency_desc: "现行体制的主要问题是缺乏透明度，只要没人曝光，这些政客就能胡作非为。虽然这本来不该是个问题，但有些阴谋小人总是想瞒过总统去推行……那些饱受不满的倡议。我们让公众得以监督追踪政客的行为将让社会各界受益。"
 SOV_investigate_corrupt_parties: "社会福利让步"
 SOV_investigate_corrupt_parties_desc: "给工人提高点工资恨不得能杀了那帮企业家们。虽然曾经的寡头工厂物理大乱斗时代早已是过往云烟，但劳工权益状况仍然值得斟酌。我们应该改善工人阶级的社会福利，正是他们维持着我们国家的运转。"
 SOV_restore_faith_in_government: "回升政府公信力"
 SOV_restore_faith_in_government_desc: "自现行领导班子上任以来，人民群众对我们敬爱的总统和执政党看法一直……众说纷纭。像你我这样的官员曾被视为腐败、低效、脱离群众。但随着当前改革的持续进行，情况似乎发生了变化。人民群众逐渐信任我们了，对我们的辱骂也比以前少了！这这真是一个值得庆幸的成就！"
 SOV_enrich_mother_russia: "让祖国富起来"
 SOV_enrich_mother_russia_desc: "何其不幸，我们的\"黄金千禧\"并未持续。伴随油价下跌和接连不断的制裁，我们被迫囤积资金以备不时之需。但如果只囤不用，那这些钱便毫无意义。\n\n只需动用一小部分储备金，再利用我们与寡头的关系，就可以将经济提升到新的台阶。"
 SOV_spread_anti_western_propaganda: "反西方宣传攻势"
 SOV_spread_anti_western_propaganda_desc: "曾几何时，我们热切地期盼着融入西方世界，一厢情愿地以为自己可以融入基督教大家庭。然而美国人拒绝了我们。现在想来，这何尝不是一件幸事呢？\n\n我们甚至不需要散布虚假信息：只需要不断地用小圣詹姆斯岛和文化战争之类的事情来打击他们就行了。让他们自己去解决这些问题，然后坐山观虎斗。"
 SOV_destabilize_the_west: "增加FSB预算"
 SOV_destabilize_the_west_desc: "联邦安全局一直是保护俄罗斯免受敌人侵害的可靠护盾。鉴于他们所有的辛勤工作，我觉得应该给他们加薪。"
 SOV_new_revolution: "新革命"
 SOV_new_revolution_desc: "俄罗斯一直是社会主义和共产主义运动的故乡。正是在这里，第一个成功的共产主义国家诞生了，然而最后这个伟大的实验却被阴谋家肢解，兜售。\n我们必须反抗这种不公，因为无产阶级必将得到解放！"
 SOV_remember_the_old_days: "我们的苏维埃过往"
 SOV_remember_the_old_days_desc: "我们是战胜了最为邪恶势力，抵抗资本主义压迫的伟大文明传承者。我们的文明曾征服星辰大海，也掌握原子之力。而作为子孙后代的我们将重建这个国家。这也将成为我们宣示自身正统性的唯一证明。"
 SOV_cprf_is_your_party: "俄联邦共产党-属于你的党！"
 SOV_cprf_is_your_party_desc: "很多人声称俄罗斯联邦共产党就是一个骗局：因为里面都是一帮思想跟不上时代的老头子。然而，我们才是俄罗斯左翼运动事实上的领导者，只有我们才有能力恢复苏联的荣光，我们可不是那种只有十几个人小打小闹的左翼过家家游戏。我们是你们的党，因为你们别无选择！"
 SOV_promises_of_bread: "偏爱\"智能投票\""
 SOV_promises_of_bread_desc: "自由主义反对派虽然只是一帮亲西方美帝走狗，但他们的\"智能投票\"系统却饶有兴趣。考虑到我们是他们唯一能支持的主流政党，可以利用这一点来获取优势。而且，嘿，如果这些家伙讨厌帝国主义和普京主义都到能支持苏联的地步了，那可不是我们的原因！"
 SOV_use_the_younger_base: "十步迈向人民政权"
 SOV_use_the_younger_base_desc: "为了获取更多支持，我们必须让我们的理念易于让公众理解，以便获取投票支持。为此，我们将发动\"十步迈向人民政权\"计划，并在全国范围内推广。国民必须知道他们投票支持的是什么！"
 SOV_victory_day: "人民公仆，国家所需"
 SOV_victory_day_desc: "自党建立以来已过去了数十年，但我们的目标仍然不变。然而自那时起，我们的国家却越来越倒向寡头政治和亲美道路。国家需要我们，我们愿意响应号召。"
 SOV_russian_destiny: "俄罗斯天命"
 SOV_russian_destiny_desc: "弗拉基米尔·日里诺夫斯基在许多圈子内都被人们视作小丑，但他确实做到了。他和他忠诚的自由民主党一直为此刻处心积虑的准备着。是时候复兴真正的俄罗斯了。不要再让寡头跑到国外洗钱了。不要再让西方侵蚀俄罗斯文化了。俄罗斯将一劳永逸地恢复昔日的辉煌！"
 SOV_gain_church_support: "争取教会支持"
 SOV_gain_church_support_desc: "俄罗斯正教会一直是我们民族的基石。即便是在世俗社会的当下，它仍然拥有巨大的力量，虽然这种力量主要体现在文化方面。但获取他们的支持将至关重要。"
 SOV_maintain_status_quo: "为了主权俄罗斯"
 SOV_maintain_status_quo_desc: "普通的俄罗斯公民还能对他们的总统要求什么呢？一个普京的继任者，一个拥有丰富治理经验的人。普京的多极秩序和主权民主的梦想将会实现，因为我们的胜利不容谈判！"
 SOV_gain_oligarchist_support: "团结普京支持者"
 SOV_gain_oligarchist_support_desc: "幸运的是，我们可以利用前任领导人的受众基础来开展竞选活动。即便他已离去，他的影响犹存。"
 SOV_send_aid_to_america: "动员青年近卫军"
 SOV_send_aid_to_america_desc: "普通退休人员和普京的支持者自不必多说，而\"青年近卫军\"则是一个更加脆弱且难以捉摸的群体。年轻人一向对我们态度冷淡，但总体而言，他们在爱国情怀上仍然支持俄罗斯。如果我们能够触及并点燃他们心中那份理想主义，那么这一票极有可能最终落入我们的囊中。"
 SOV_use_extreme_measures: "梅德韦杰夫计划"
 SOV_use_extreme_measures_desc: "尽管梅德韦杰夫是由普京钦点，但他绝非普京的复制品。梅德韦杰夫承诺的变革，不是回到他的第一任期，而是迈向一种西方民主难以企及的自由境界。他的诺言值得信任，因为他将完成普京的伟大夙愿：真正的主权民主！"
 SOV_heir_to_strongman: "继承铁腕"
 SOV_heir_to_strongman_desc: "他是普京的接班人。\n他让格鲁吉亚屈服。\n他将捍卫俄罗斯的主权。\n他是德米特里·梅德韦杰夫，他来赢得这场选举！"
 SOV_improve_ur_image: "提升统俄党形象"
 SOV_improve_ur_image_desc: "尽管我们是执政党，但在失去弗拉基米尔·普京的光环之后，我们的支持率急剧下滑。人们对我们的政策并不感兴趣，因为我们没有明确的党派纲领，只是由不同利益集团拼凑而成。现在是时候向人民证明，我们是值得信赖、值得他们投票支持的政党了！"
 SOV_for_the_future: "为了未来"
 SOV_for_the_future_desc: ""
 SOV_reinvigorate_the_masses: "充分动员群众"
 SOV_reinvigorate_the_masses_desc: ""
 SOV_promises_of_peace: "承诺和平"
 SOV_promises_of_peace_desc: ""
 SOV_lashout_oligarchs: "抨击寡头"
 SOV_lashout_oligarchs_desc: ""
 SOV_promises_of_land: "帝国复仇民粹主义"
 SOV_promises_of_land_desc: "你们难道忘了我们被剥夺什么了吗？曾经光荣且强大的祖国。现在数百万同胞却同我们分离，被西方的堕落所腐蚀，被迫成为反俄堡垒。我们必须夺回属于我们的一切！"
 SOV_anti_establishment_big_tent: "抗击现状的广泛阵线"
 SOV_anti_establishment_big_tent_desc: "为了战胜建制派，我们必须尽可能多地争取每一张选票。值得庆幸的是，形形色色的反建制派团体都有着庞大的基础。我们将代表那些未被聆听，那些希望看到一个没有统俄党俄罗斯的人们！"
 SOV_russophilic_propaganda: "网络宣传攻势"
 SOV_russophilic_propaganda_desc: "鉴于其他政党对互联网潜力的视而不见，我们若能利用这一平台开展竞选宣传，无疑将占得先机。凭借日里诺夫斯基富有煽动力的演讲，再加上政党本身相对年轻的形象，我们能够轻松吸引年轻选民的目光。只需要一些精心编排的辞藻、引人入胜的语言，我们就能打动这些对未来充满期待的年轻人。"
 SOV_attack_the_polls: "释放自民党躁动"
 SOV_attack_the_polls_desc: "与其他政党不同，我们的党派更加……充满活力。从帮助养老金领取者到投放广告，我们拥有一支遍布各地的网络，随时准备将我们的声音传递到每一个角落。现在，是时候充分发挥他们的作用，为我们的最终胜利奠定坚实的基础！"
 SOV_glorify_stalin: "歌颂斯大林"
 SOV_glorify_stalin_desc: "斯大林是我们的战斗荣耀，\n斯大林是我们的青春飞扬。\n我国人民紧密追随斯大林，\n高唱凯歌，斗争得胜。"
 SOV_restarting_state_bureaucracy: "重启国家官僚体系"
 SOV_restarting_state_bureaucracy_desc: "我们从上届政府继承的国家机构，难以适应建设社会主义共和国的需要。效率低下、僵化停滞、组织涣散，这些绝不是我们希望看到的公共管理体系特质。\n因此，俄罗斯苏维埃联邦社会主义共和国共产党将承担起实施改革的责任。我们将在近期实施改革方案，旨在建立一个真正为人民服务、而非自我服务的灵活行政体系。"
 SOV_first_convocation: "首届会议"
 SOV_first_convocation_desc: "苏维埃新议会的选举将成为决定国家未来走向的重要一步。首届会议的筹备工作现已启动，党承诺这些选举将是公开、公正的。人民将亲自选出他们的代表，而这些代表将成为新社会主义秩序的声音。很快，苏维埃俄罗斯将拥有一个真正捍卫工人利益的议会！"
 SOV_interparty_dialog: "党际对话"
 SOV_interparty_dialog_desc: "尽管共产党是国内主导的政治力量，但多个合法政党和团体同样享有民众支持。公开与之对抗实属不明智之举——这只会削弱我们在社会中的公信力。更明智的做法是寻求合作，以缓解紧张局势，团结全国力量共同解决共同问题。"
 SOV_reform_of_security_forces: "安全部队改革"
 SOV_reform_of_security_forces_desc: "俄罗斯当前的国家安全体系结构不过是从过去遗留下来的产物。几次不尽人意的改革、长期资金不足与人员匮乏，使执法机构陷入了困境。\n在内部抵抗势力日益抬头的背景下，我们亟需对安全机构进行全面改革。不仅要恢复其昔日荣光，更要建立现代化高效体系，以切实保障国家与公民的利益。"
 SOV_bastion_of_antifascism: "反法西斯堡垒"
 SOV_bastion_of_antifascism_desc: "我们绝不容许法西斯余孽在这艰难时刻于我国扎根。要让所有人都清楚：我们过去、现在、将来都会与任何胆敢支持这类反人类思想的势力斗争到底。必须将这祸患连根铲除，让人民能够继续生活在和平与和谐之中。\n法西斯主义不准通过！"
 SOV_agitprop: "宣传鼓动"
 SOV_agitprop_desc: "宣传鼓动工作，或更准确地说——煽动和宣传，这是随着苏联诞生而出现的政治实践，在其整个历史进程中始终维系着民众对未来的信心。\n当我们需要向人民证明所选道路的正确性时，就会启动覆盖街头与网络的大规模宣传行动。我们必须清晰简明地展现奋斗目标与核心价值，向人民阐明我们将把国家引向怎样的未来，以及为何只有我们的道路是唯一正确的选择。"
 SOV_party_vanguard: "先锋党"
 SOV_party_vanguard_desc: "党的国家建设作用远比表面看来更为重要。正是党确立了正确的思想路线，担当着全民引路人的角色，成为国家前进的象征。\n党的奋斗完全为了国家与人民——这是其工作的唯一意义。党的力量源于与人民的团结，体现在倾听民意并将其转化为具体决策的能力之中。"
 SOV_strengthening_party_discipline: "强化党纪"
 SOV_strengthening_party_discipline_desc: "共产党执政后，我们必须加强团结并制定行动纲领。每位党员都应理解并认同我们的共同目标。当前绝非党内分歧之时，尤其在我们持续巩固力量的阶段。我们需要纪律来向人民传达理念，并携手向前迈进。"
 SOV_great_reconciliation: "大和解"
 SOV_great_reconciliation_desc: "在充分肯定斯大林同志历史地位的同时，我们应当承认那个特定时期存在的某些失误。确实存在对部分优秀布尔什维克干部的不公正对待，这些同志对联盟发展道路的构想本质上与斯大林同志并无根本分歧。\n我们既要铭记与斯大林同志并肩作战的政治家，也要肯定那些坚持独立见解并为国家发展作出卓越贡献的同志。我们的历史具有多面性，无论是辉煌胜利还是沉痛教训，都是指引我们前进的宝贵财富。"
 SOV_reestablishing_higher_party_school: "重建高等党校"
 SOV_reestablishing_higher_party_school_desc: "曾几何时，苏共中央高级党校为党和国家培养过数以千计的优秀干部与新闻工作者。这些毕业生遍布各个领域、各个地区，有力巩固了意识形态统一与有效管理。\n在今天我们持续复兴诸多苏联实践的背景下，有必要重建这种干部培养体系。这样的机构不仅要为国家机关输送人才，更要培养真正具备专业技能、忠于社会主义事业的管理者。"
 SOV_xix_party_congress: "召开党代会"
 SOV_xix_party_congress_desc: "共产党执政已久，所有必要的初步工作都已完成。如今我们的地位终于稳固，是时候召开代表大会，确定未来的发展方向。\n我们必须实现关键目标：解决领导层问题，确立引领党前进的领导核心，并批准未来几年的明确行动纲领。"
 SOV_continue_party_rejuvenation: "继续振兴党的事业"
 SOV_continue_party_rejuvenation_desc: "党的复兴是其未来的保障！充满热情与决心的青年干部将为俄罗斯联邦共产党注入新的活力。我们必须继续推进这一进程，吸引更多年轻的共产党员进入领导层，他们将带领国家迈向未来，同时坚守社会主义的理想。"
 SOV_new_lenin_enrollment: "列宁主义新号召"
 SOV_new_lenin_enrollment_desc: "正如百年前一样，党需要一代又一代忠诚奉献的新人，为建设社会主义贡献自己的力量。我们现发起以列宁主义传统为灵感的新号召，吸引年轻而积极的公民加入我们的行列。这是每个人参与伟大事业的机会。"
 SOV_voice_of_the_streets: "街头之声"
 SOV_voice_of_the_streets_desc: "俄罗斯苏维埃联邦社会主义共和国共产党如同任何政党一样存在双重面向：一边是党的官僚机构，一边是基层活动家。长期以来，党内主导权始终掌握在官僚阶层手中，而那些真正通过实干改善民生、通过集会抗议等方式对抗俄罗斯体制不公的积极分子却长期处于边缘地位。\n但这样的时代已经终结。随着拉什金当选中央委员会主席，积极分子们正成为官僚体系中的新星，取代那些老朽不堪的旧官僚。\n瓦列里·拉什金，正是那些此刻正在为祖国美好明天而奋斗的人们最有力的代言人！"
 SOV_shakeup_of_the_state: "改组官僚"
 SOV_shakeup_of_the_state_desc: "我们的官僚体系充斥着陈旧低效的官僚主义者。他们非但不为人民服务，反而安于职守，躺在共产主义的功劳簿上坐享其成，却对事业毫无建树。\n拉什金同志将彻底清除党和国家内部的败类！为充满活力的列宁主义新生力量开辟道路！"
 SOV_symbol_of_change: "变革之象征"
 SOV_symbol_of_change_desc: "在普京执政时期，瓦列里·拉什金以其对权力的极端反对立场而闻名——即使以俄罗斯联邦共产党的标准衡量也是如此。拉什金公布的名单、针对反贪腐基金会的国会质询案，所有这些都彰显着他对自由理念的执着追求。\n正如经典歌曲所唱：\"我们的心渴求着变革\"——俄罗斯正迎来三十余年来未曾有过的向好转变契机。这片土地需要变革，而拉什金与他的团队正满怀热忱地为之奋斗！"
 SOV_party_mobilization: "党的动员"
 SOV_party_mobilization_desc: "国内许多人认为\"共产党不过是群怀念苏联时代的老头老太的聚集地\"。尽管这种看法不无依据，但我们必须扭转这个\"退休人员政党\"的刻板印象。\n正如列宁时代那样，成熟的共青团员们将在新政府中占据应有地位，执掌管理权柄。前进吧，年轻的共产主义建设者们！"
 SOV_rally_the_people: "召集群众"
 SOV_rally_the_people_desc: "我们的国家正面临着自伟大卫国战争以来最严峻的考验。在这艰难时刻，全国各族人民必须团结一致，共同抵御即将来临的风暴。不分男女、无论贫富工农，均万众一心凝聚成钢铁长城！在列宁旗帜的指引下，为了过去与未来，亿万人民肩并肩共奋战！"
 SOV_rightful_heir: "合法继承者"
 SOV_rightful_heir_desc: "当前拉什金及其团队在党内的地位确实面临挑战。俄共内部较为\"官僚色彩\"的反对势力正在破坏党的团结，这种分裂行径无益于我们执政的合法性。\n必须向所有人重申：拉什金是通过合法投票程序当选的。现在我们应当……与党内同志们达成某些妥协。团结高于一切！"
 SOV_back_to_revolutionary_roots: "回归革命根源"
 SOV_back_to_revolutionary_roots_desc: "十月革命是在无产阶级领袖弗拉基米尔·伊里奇·列宁领导下，布尔什维克党遵循党的总路线团结行动的结果。红十月的胜利正源于这种铁的纪律。\n而现在我们正缺乏这种纪律：党内各种内斗和阴谋正不断上演，企图动摇拉什金的地位。丹尼斯·帕尔费诺夫凭借其对社会主义斗争的坚定信念，能够帮助巩固党的组织结构，重振我们丧失的革命精神！"
 SOV_pragmatic_approach: "务实之路"
 SOV_pragmatic_approach_desc: "拉什金团队内部存在多种观点：有人主张转向民主化，有人主张强化党的纪律与正统性——但当前苏联国家发展的务实路线并非什么可怕的选择。恰恰相反，这条路线为我们在党和国家机构内部留出了充足的运作空间。\n民众渴求稳定与繁荣，何不借助谢尔盖·列夫琴科的经验来巩固我们的发展？"
 SOV_reinvent_democracy: "重建民主"
 SOV_reinvent_democracy_desc: "苏维埃实验的起点充满理想主义色彩：\"一切权力归苏维埃\"的号召、人民当家作主的承诺，以及列宁倡导的全新、真正的人民政权。可回看历史，在伊里奇逝世后，权力逐渐集中于斯大林手中，又转移至脱离群众的党内官僚。直至戈尔巴乔夫掌权，体制僵化已积重难返。\n\n民主理念本是社会主义的基因，加强苏维埃民主就是无可辩驳的正确方向。鲍里斯·尤里耶维奇·卡加尔利茨基作为当代重要的左翼思想家，其关于参与式民主和社会治理的创新理论，确实能为体制改革带来有益参考。"
 SOV_mobilize_the_youth: "苏维埃文艺复兴"
 SOV_mobilize_the_youth_desc: "如马雅可夫斯基和塔特林这样的苏维埃艺术巨匠，激励人们创造一个新世界。他们的精神将在我们的时代再次焕发生机。我们将团结创作者，创作面向社会主义未来的、全新的、尖端的艺术，复兴苏联文化。新苏联先锋派时代已经到来！"
 SOV_window_to_europe: "欧洲门户"
 SOV_window_to_europe_desc: "伟大的思想不分国界，我们通往欧洲的窗口再次开启！东欧的工人和共产党正怀着希望的目光注视着我们。是时候重拾被遗忘的纽带，让各国人民团结起来，共同抵御北约的侵略！携手并肩，我们将迎接任何挑战，共同粉碎帝国主义者的野心！"
 SOV_new_union_of_russia_and_belarus: "新俄白联盟"
 SOV_new_union_of_russia_and_belarus_desc: "俄白联盟正在逐步成为现实。这一举措不仅仅具有象征意义，更是朝着复兴伟大国家的实际行动。两个民族在俄罗斯苏维埃联邦社会主义共和国旗帜下的统一，标志着苏维埃团结与力量重建的又一个重要阶段。"
 SOV_tbilisi_declaration: "第比利斯宣言"
 SOV_tbilisi_declaration_desc: "我们必须扩大在外高加索国家的影响。如果他们不同意自愿加入苏联，我们将动用我们的军事力量来实现这一点。"
 SOV_tashkent_agreement: "塔什干协定"
 SOV_tashkent_agreement_desc: "我们将邀请中亚各国重新加入联盟，若他们同意，那么我们就能成为团结一心的兄弟姐妹。但若他们不同意，那就用武力让他们臣服。"
 SOV_soviet_moldova: "摩尔达维亚军事演习"
 SOV_soviet_moldova_desc: "我们必须确保之前属于摩尔多瓦苏维埃社会主义共和国的所有领土，完全并入苏联。这样一来，摩尔多瓦人民就能与我们肩并肩地对抗任何敌人。"
 SOV_prepare_to_march_west: "筹备挥师西进"
 SOV_prepare_to_march_west_desc: "我们正目睹帝国主义野心狼再度将黑手伸向世界各国人民。西欧列强权欲滔天、贪财无厌，正欲侵犯我国的独立自由。他们的历史课上得不好，但我们可是好学生。祖先的英勇事迹我们铭记于心，他们将法西斯匪帮打得落花流水，保卫了祖国的独立。历史的新一页正在我们面前展开，我们必须挺身而出，捍卫我国主权、理想以及未来。与欧洲的冲突已是不可避免，我们必须全力以赴，做好准备。"
 SOV_operation_little_saturn: "§Y小土星行动§!"
 SOV_operation_little_saturn_desc: "以眼还眼，以牙还牙，以火治火。\n\n如今，我们正处于历史的关键路口。我们肩负着将我等兄弟手足乌克兰人民从新纳粹主义与西方魔爪之下解放出来的伟大任务。我们是和平与秩序的先驱，誓要令正义之光普照乌克兰大地，令其重获真正的自由。这不仅是领土之争，更是在为我们共同的理想、为当代人与孩子们的未来而战。北约素有统治世界之野心，他们必然会对我们万般阻挠，但我们已准备完全、就让我们的敌人知晓我军的不可战胜吧。我们将向胜利进军。"
 SOV_collective_leadership: "集体领导"
 SOV_collective_leadership_desc: "显然，一人独断专行绝非良策。面对必须推进的急剧变革，我们必须汇聚各方专业智慧。我们不能内讧，不能争夺国家控制权。一支稳定可靠的核心团队，才能确保新体制平稳过渡。"
 SOV_role_of_personality: "个人职责"
 SOV_role_of_personality_desc: "尽管苏联时期的个人崇拜现象受到诸多合理批判，但不能否认其曾具有历史必要性。随着我们获得新的执政授权，必须同时树立权威与力量的形象。民众不会支持一个无名的委员会，他们需要国家的具象化象征，一位伟大的引路人。因此必须审慎筹备并遴选适合承担这一角色的人选。"
 SOV_effective_bureaucracy: "高效官僚"
 SOV_effective_bureaucracy_desc: "在当前重构体制的攻坚阶段，我们必须确保干部队伍能够肩负起时代赋予的重任。他们既不能沦为机械的文书官僚，更不能固步自封。必须培养具备高效执行力与卓越智慧的新一代官员，使其具备应对各类复杂问题的能力。为此亟需扩大官僚体系培训规模以达成此目标。"
 SOV_rally_the_people_zyuganov: "召集群众"
 SOV_rally_the_people_zyuganov_desc: "社会主义终得重建，然而我们的人民仍处分裂。近两代人成长于赤星隐曜的年代，失去了奋斗的航标。必须引领重聚的民众奔赴我们的事业，让红星再度璀璨闪耀！"
 SOV_reliance_on_apparatus: "组织依靠"
 SOV_reliance_on_apparatus_desc: "在我们取得胜利，苏联随之重生后，在收复的土地上维持稳定的工作自然也成了我们不可推卸的重任。遗憾的是，这意味着我们需善用现有资源。从解放区招募尽可能多的支持者，并动用俄罗斯苏维埃联邦社会主义共和国的现有干部队伍进行充实。重建事业任重道远，这些人将成为我们伟大工程的开拓者。"
 SOV_dialogue_with_grassroots: "对话基层"
 SOV_dialogue_with_grassroots_desc: "我们的苏维埃实验刚站稳脚跟，若要巩固国体，就得真正复兴昔日精神。而这，绝不可靠自上而下的推行。必须支持那些怀揣理想信念、愿与我们共同实现愿景的民众。凭借他们的干劲与激情，才能完成未竟的事业。"
 SOV_creative_marxism: "创意马克思主义"
 SOV_creative_marxism_desc: "世界的传媒舞台中，苏联也曾重要参与者。虽不及好莱坞那样声名显赫，但苏联的电影制片人与动画创作者始终秉持极高的艺术水准。我们必须重燃人民心中的激情之火，重塑自我。要向世界宣告：我们已然归来，社会主义实践的征程远未终结！"
 SOV_renewed_program: "复兴规划"
 SOV_renewed_program_desc: "面对当前的挑战，我们必须确保我们的方案与时俱进。沿用过去的法律框架并加以修改，使其符合时代需求。"
 SOV_course_continuation: "继续总路线"
 SOV_course_continuation_desc: "三十载黑暗岁月。难道星辰注定在漫漫长夜中熄灭吗？不！总有人将璀璨星河珍藏于心、熔铸进魂。黎明将至，我们终为夜空重缀光华。历千劫后，赤星耀眼依旧，永照人民！"
 SOV_cohesion_before_challenges: "集中力量办大事"
 SOV_cohesion_before_challenges_desc: "在上次党代会上，我们确信并非所有党员都支持我们为未来数年制定的路线。基于苏维埃祖国的历史经验，我们必须重视这一情况并启动必要的解决措施。当然，反对派及党内部分同志对此未必乐见，但在少数人意见与大多数人利益之间，我们必将选择后者。"
 SOV_intra_party_consensus: "党内共识"
 SOV_intra_party_consensus_desc: "总体而言，政党和社团最严重的弊病在于宗派主义，我们必须坚决杜绝这种现象。对于党内的改革主张，我们不会采取压制态度，而是寻求与之达成共识。政府将推行一系列改革措施，同时鼓励创新与自治，以此确保党内思想统一、团结一致。"
 SOV_voice_of_the_party: "党派呼声"
 SOV_voice_of_the_party_desc: "党是工人信赖的脊梁，\n党是永不褪色的事业。\n党是永不屈服的旗帜——\n今日职员，明日可倾覆王朝！"
 SOV_cadres_decide_everything: "干部决定一切！"
 SOV_cadres_decide_everything_desc: "苏联解体的原因有很多，但主要因素之一是部分代表的不作为。许多苏联政府官员凭借人脉关系任职，却无法胜任本职工作。我们将以史为鉴，着力选拔那些真正有志于、并且有能力助力我们苏维埃祖国实现空前繁荣的人才进入政府！"
 SOV_effective_bureaucracy_afonin: "高效官僚"
 SOV_effective_bureaucracy_afonin_desc: "臃肿的官僚体系曾是苏联停滞不前的真实象征，甚至官方媒体也曾对此加以嘲讽。为避免重蹈覆辙，我们必须提前对官僚主义采取行动。我们将废除冗余文件、削减不必要的审批流程，全力简化国家行政机器。"
 SOV_socialist_pluralism: "社会主义多元化"
 SOV_socialist_pluralism_desc: "即便我们的政府已长期执政，国内仍有人出于某些原因蓄意破坏我们的行动。为向民众表明苏俄共产党是真心地捍卫他们的利益的，我们将与反对党进行沟通，并努力在民众最关切的紧迫问题上寻求妥协方案。"
 SOV_guarantor_of_stability: "稳定捍卫者"
 SOV_guarantor_of_stability_desc: "党不仅为人民提供社会平等，更保障安定生活。每位公民都将享有免费教育与医疗，获得工作岗位，拥有个人住宅、私家车辆及丰厚养老金。我们的祖国将实现极低的贫困率与犯罪率，每一位公民都能对未来充满信心！"
 SOV_new_public_dialogue: "新公共对话"
 SOV_new_public_dialogue_desc: "若想打造一个真正成功且完全现代化的苏维埃国家，我们就必须摒弃过去的做法，不再执着于虚幻的稳定，而要将重心放在进步与发展上。所谓的\"稳定\"可曾带领我们实现共产主义？停滞不前又是否改善了我们的经济？答案是否定的！为了让21世纪的苏联成为世界上最强大的国家，我们必须破除陈旧腐朽的体制，建立一个真正以人民为中心的新体系！"
 SOV_10_steps_to_good_life: "十步迈向美好生活"
 SOV_10_steps_to_good_life_desc: "我们多年以来开发的计划终于可以实施了。这些步骤旨在改善生活条件，提高公民收入和社会保障水平。经过如此漫长的时间，我们终于可以照顾人民，用实际行动证明我们团队的效率！"
 SOV_people_are_master_of_the_country: "人民乃国家之主"
 SOV_people_are_master_of_the_country_desc: "自然资源必须属于人民。我们将对石油、天然气及其他土地财富进行最终国有化，使其收益真正惠及全体公民。"
 SOV_people_are_main_value_of_the_state: "人民乃国家之本"
 SOV_people_are_main_value_of_the_state_desc: "任何社会中最重要的就是人民的福祉。因此，我们必须关心那些无法工作的群体，如老人和残疾人。现在正是展示我们对人民承诺的时刻。我们将提高工资和养老金，让每位公民都能感受到国家的支持。"
 SOV_strategic_regulation: "战略监管"
 SOV_strategic_regulation_desc: "总体而言，市场经济展现出其效率并基本符合我国利益。但任何经济体系都存在不足，正因如此，我们正启动适度国家干预政策，以保障经济稳定、实现可持续增长，并引导正确发展方向。\n中国正是这一模式成效卓著的典范，并已成功跻身世界经济领军者之列。他们的实践表明，将市场机制与政府调控相结合，能够取得令人瞩目的成果。"
 SOV_new_gosplan_desc: "在苏联时期曾设有名为国家计划委员会（简称国家计委）的机构，其主要职能是监督国民经济计划的执行。在苏联存续期间，该委员会被证明在经济管理方面具有相当成效。\n如今，当苏联模式的管理方法再度显现其现实意义时，重建国家计划委员会的议题必须被提上议程。其集中计划原则将有助于解决重大国家任务并确保战略稳定。"
 SOV_cult_of_reindustrialization: "再工业化崇拜"
 SOV_cult_of_reindustrialization_desc: "苏联政府的首要重大成就之一便是快速实现了工业化，这一成果在数十年间为人民带来了福祉。然而在联盟解体后，工业体系陷入衰退，大量企业就此消亡。\n正因如此，当下我们必须争分夺秒地弥补损失，全面重建在动荡的1990年代丧失的工业潜力。这需要坚定的政治意志和大量国家资源的集中投入，让工业体系重新成为我们发展的支柱。"
 SOV_red_environmentalism: "赤色环保主义"
 SOV_red_environmentalism_desc: "我国正迈入一个崭新的时代——在这个时代，环境状况对我们的意义远比20世纪末更为重大。诚然，工业必须持续运转，这是不可逆转的。但正因如此，我们更应借鉴中国的经验。中国清晰地昭示了如何在保持\"世界工厂\"地位的同时，持续推进大规模环保计划。\n这正是社会主义经济的优势所在：它能够将工业实力与自然关怀相结合。我们的计划经济体制特别适合实施长期\"绿色\"战略，使生态保护成为发展的新优先方向。"
 SOV_small_business_support: "小型企业支持"
 SOV_small_business_support_desc: "我们认识到小型企业对经济的重要性，尽管我们坚持社会主义信仰，但若不对其给予支持将是错误的。我们将为小型企业提供援助和保护，创造有利于其增长和稳定的条件。这与我们的原则并不矛盾，因为成功的企业意味着稳定的就业和充实的财政收入。"
 SOV_new_industrial_policy: "新产业政策"
 SOV_new_industrial_policy_desc: "再工业化的初步成果充分证明了我国产业政策的成功。这印证了我们正沿着正确方向前进，当下更需要乘势而上。\n因此，我们将加速工业化确立为经济建设的首要任务。必须大规模升级生产设施，聚焦现代技术革新，并为新兴工业体系培养专业人才。我们越快实现新的工业飞跃，国家的经济主权就越巩固，每位公民的福祉也将得到更为充分地保障。"
 SOV_revival_of_soviet_science: "复兴苏联科学"
 SOV_revival_of_soviet_science_desc: "在苏联时期，科学与技术进步曾被奉为真正的崇拜对象。苏联科学家们以开创性的成就享誉全球。曾几何时，\"斯普特尼克\"这个俄语词汇传遍全人类，数以百万计的人们受到我们成就的鼓舞，为追求自身突破而奋斗。\n我们绝不能让这一光荣传统湮灭。正因如此，在经历多年的忽视之后，如今我们必须重振苏联科学精神，恢复其昔日的威望与国家支持。唯有如此，才能培育出新一代科研人员，使他们能够再现并超越前辈的成就。"
 SOV_join_BRI: "一带一路倡议"
 SOV_join_BRI_desc: "\"一带一路\"倡议为我们开辟了新的机遇。我们将加强参与这一连接亚洲、欧洲和非洲的项目。对基础设施和贸易路线的投资将有利于我们的经济，并加深与中国的联系。"
 SOV_reinstate_comecon: "重建经互会"
 SOV_reinstate_comecon_desc: "在民主国家联盟框架内重建经互会，将进一步巩固我们在世界舞台上的地位。此联盟将促进与志同道合的盟友之间的贸易、资源共享及联合发展。回归协调经济体制是通往进步的道路。"
 SOV_consolidation_of_unions: "工会组织统一化"
 SOV_consolidation_of_unions_desc: "保护劳动者权益是社会主义的核心原则之一。工会组织的存在正是为此而生——它们既是抵御雇主专横的屏障，也是监督劳动标准落实的哨兵。\n苏联时期曾通过统一工会体系履行这一职能。如今我们需要思考的是，如何将这种经实践检验的模式与当代现实相结合，同时坚守其根本使命：为劳动者构筑坚实可靠的权益保障体系。"
 SOV_agrarian_renaissance: "农业复兴"
 SOV_agrarian_renaissance_desc: "农业始终是经济的关键领域之一，在苏联时期更是受到特殊关注。我们不决心不辜负这一光荣传统，将致力于复兴俄罗斯农业，使其重现昔日辉煌。\n毕竟，面包是万物之源！我们将着力发展现代农业技术、扶持农民群体、振兴乡村地区。以此实现真正的粮食自给自足，并以庄严之姿继承前辈的事业。"
 SOV_energy_development: "能源发展"
 SOV_energy_development_desc: "20世纪20至30年代苏联实现的快速电气化，至今仍被视为布尔什维克最富雄心的工程之一。传奇的全俄电气化计划作为伟大壮举的典范，永远铭刻在历史教科书中。\n如今我们必须重现这一成就。在国家工业高速发展的背景下，要确保电力稳定输送到国土的每个角落，就需要完成电网现代化改造，并积极推广包括可再生能源在内的新型能源。唯有如此，才能为国家的未来发展奠定坚实基础。"
 SOV_moscow_beijing_agreement: "莫斯科-北京协定"
 SOV_moscow_beijing_agreement_desc: "我们与中国的关系一直至关重要，而现在正是巩固这一关系的关键时刻。我们将签署一项新的协议，以加强双方的经济和政治合作。这将帮助我们避免以往的分歧，使与中国的关系更加稳定和富有成效。"
 SOV_alterglobalism: "另类全球化"
 SOV_alterglobalism_desc: "近几十年来，全球资本主义持续扩张其影响力，剥夺了本已处于弱势群体仅存的微薄权益。这种不公必须终结，我们已制定计划为世界提供另一种选择。我们倡导基于友谊、互助与平等合作原则的社会主义全球化。\n我们将证明一个民族的繁荣不应建立在压榨另一民族的基础上。让我们携手共建一个以人为本、超越利润至上的世界。"
 SOV_economic_sovereignty: "经济主权"
 SOV_economic_sovereignty_desc: "在当前形势下，对向欧洲出口石油和天然气的依赖变得充满风险。我们将逐步减少对西方的能源供应，以保护我们的经济免受外部威胁。取而代之的是，我们将利用这些资源来发展本国工业！"
 SOV_peoples_control: "人民控制"
 SOV_peoples_control_desc: "社会主义的本质在于人民当家作主。这种主权不仅体现在政治领域，更应贯穿于经济生活。人类劳动应当造福全体人民，而非滋养少数寡头在宫殿里的奢靡。因此，人民有权直接影响国家发展进程——这意味着企业中实现真正的工人管理，以及收入的公平分配。当经济归属劳动者时，他们的福祉才成为进步的真正象征。"
 SOV_new_methods_of_fighting_corruption: "新反腐措施"
 SOV_new_methods_of_fighting_corruption_desc: "腐败是公正社会的首要敌人。我们将引入人工智能与零信任等现代技术，以提高各级政府的监督和透明度。这些新方法将使我们以全新的方式开始打击这一社会恶习，并至少在一定程度上确保治理的公平性。"
 SOV_for_a_just_russia: "为了公正俄罗斯"
 SOV_for_a_just_russia_desc: ""
 SOV_solidarity_and_prosperity: "团结与繁荣"
 SOV_solidarity_and_prosperity_desc: ""
 SOV_party_of_culture: "文化之党"
 SOV_party_of_culture_desc: ""
 SOV_radical_change: "激进变革"
 SOV_radical_change_desc: ""
 SOV_fairer_future: "更公正的未来"
 SOV_fairer_future_desc: ""
 SOV_we_must_fight_for_justice: "必为正义而战"
 SOV_we_must_fight_for_justice_desc: ""
 SOV_operation_suvorov: "§Y罗科索夫斯基行动§!"
 SOV_operation_suvorov_desc: "北约介入冲突后，我们已别无选择。我们将启动一项高度机密的计划，消除波兰和波罗的地区的威胁。这项行动将是我们争取安全和恢复苏联在该地区影响力的决定性一步！"
 SOV_mobilize_the_national_guard: "动员国家近卫军"
 SOV_mobilize_the_national_guard_desc: "是时候动员我们的国民警卫队了。这些勇敢的卫士随时准备挺身而出，保家卫国，保障解放区内的秩序。他们的力量和决心将是我们争取胜利的重要环节！"
 SOV_mobilize_the_airforce: "动员空军"
 SOV_mobilize_the_airforce_desc: "我军航空部队的每一架飞机对胜利都至关重要。即便是老旧的飞机也可能成为战斗的决定性因素。我们将动员我们的空军力量，夺取制空权，支援地面作战！"
 SOV_operation_polar_star: "§Y北极星行动§!"
 SOV_operation_polar_star_desc: "战斗！这是通往布达佩斯和华沙的最后一战！"
 SOV_election_victory: "赢得选举"
 SOV_election_victory_desc: "革命最终取得了胜利——不是通过攻占街垒，而是通过投票箱。没有人能够预料到这样的结果，所有嘲笑俄共是旧时代遗物的蠢货们现在都不得不惊愕地旁观。人民已经做出了选择：未来属于社会主义。"
 SOV_release_political_prisoners: "释放政治犯"
 SOV_release_political_prisoners_desc: "新当局上台后，政府面临一个问题——谁应被视为政治犯？他们当中既有旧政权镇压的受害者，也有威胁新秩序的人。必须做出决定：释放所有人，还是进行彻底审查，确定谁真正配得上自由。"
 SOV_other_parties_issue: "其余党派问题"
 SOV_other_parties_issue_desc: "在统一俄罗斯党失败后，俄罗斯联邦共产党面临着一个挑战：如何处理其他的政治力量？他们的未来现在仍悬而未决。一些人提议彻底消灭反对派，而另一些人则认为有必要逐步将他们融入社会主义体系。辩论仍在继续，其他政党的命运岌岌可危。"
 SOV_new_soviet_parliament: "新苏维埃议会"
 SOV_new_soviet_parliament_desc: "现行的国家杜马已经完成了它的历史使命。俄罗斯联邦共产党宣布即将解散这个旧时代遗物，连带联邦委员会，彻底摧毁整个联邦会议。人民很快将选举他们的代表组成一个新的苏维埃议会，无论是最高苏维埃还是人民代表大会，他们都将成为真正代表人民的议会。而以哪个机构作为新的社会主义国家的基础，将由党来决定。"
 SOV_cooperate_with_the_church: "同教会合作"
 SOV_cooperate_with_the_church_desc: "我们从过去的错误中吸取教训。今天的共产党人懂得恪守传统、知悉尊重人民的宗教信仰是维护持久团结的关键。教会作为文化遗产的守护者，将成为我们忠实的盟友。我们将共同带领人民走向光明未来，不仅依靠进步，也依靠精神价值观！"
 SOV_enshrine_democratic_centralism: "奉行民主集中制"
 SOV_enshrine_democratic_centralism_desc: "民主集中制是党和国家的核心。决策将由集体做出，但执行起来要坚决彻底。这是有效治理和防止混乱的保证。行动统一，决策坚定，纪律严明——这就是我们的原则！"
 SOV_empower_the_premier: "赋权总理"
 SOV_empower_the_premier_desc: "在新社会主义国家中，总理是治理的关键人物。必须加强他的作用，以确保对国家迅速而强大的领导。我们将加强总理的权力，使他能够迅速果断地领导国家走向社会主义改造和成功！"
 SOV_protect_russian_minorities: "保护少数族裔"
 SOV_protect_russian_minorities_desc: "我们有义务保护我们的人民，无论他们身在何处。海外的俄语公民不应感到孤立无援！我们将特别关注乌克兰及其东部的卢甘斯克人民共和国和顿涅茨克人民共和国，秘密支持他们，让他们知道自己尚未被遗忘，未来属于一个统一友好的兄弟民族大家庭！"
 SOV_soviet_union_restoration_referendum: "苏联重建全民公决"
 SOV_soviet_union_restoration_referendum_desc: "尽管其名为\"苏联重建全民公决\"，但这一行动更像是一种象征性的仪式，旨在加深我们与光辉历史的联系，并彰显人民对伟大苏维埃力量回归的支持。虽然此举在实际层面上并不会带来直接的结果，因为公投仅在我国领土内进行，但我们已着手将神圣的四个字母\"USSR\"引入文件流通之中，为国家复兴奠定基础。"
 SOV_integrate_belarus_into_rsfsr: "将白俄罗斯并入苏俄"
 SOV_integrate_belarus_into_rsfsr_desc: "俄白联盟正在逐步成为现实。这一举措不仅仅具有象征意义，更是朝着复兴伟大国家的实际行动。两个民族在俄罗斯苏维埃联邦社会主义共和国旗帜下的统一，标志着苏维埃团结与力量重建的又一个重要阶段。"
 SOV_invite_upc_cpsu_members: "邀请集安组织成员加入苏联"
 SOV_invite_upc_cpsu_members_desc: "我们的集安盟友必须意识到，苏维埃体制是通往繁荣与公正的正确道路。而现在正是邀请他们按照我们的模式重新组织政府，并加入复兴的苏维埃联盟的时候了。只有团结在兄弟情谊和社会主义的旗帜下，我们才能共同创建一个新的人民联盟。"
 SOV_operation_minerva: "密涅瓦行动"
 SOV_operation_minerva_desc: "我们必须扩大在外高加索国家的影响。如果他们不同意自愿加入苏联，我们将动用我们的军事力量来实现这一点。"
 SOV_operation_invictus: "不可战胜行动"
 SOV_operation_invictus_desc: "我们将邀请中亚各国重新加入联盟，若他们同意，那么我们就能成为团结一心的兄弟姐妹。但若他们不同意，那就用武力让他们臣服。"
 SOV_draft_new_constitution: "起草新宪法"
 SOV_draft_new_constitution_desc: "拉什金集团通过党内的软政变掌握了权力，并提出了一部全新的激进宪法。民主集中制再次展现了其力量：尽管部分共产党员表示不满，但大多数党内成员还是接受了这一事实。这部新宪法将成为现代社会主义国家的基础，并以人民为一切改革的核心！"
 SOV_new_komsomol: "继续振兴党的事业"
 SOV_new_komsomol_desc: "党的复兴是其未来的保障！充满热情与决心的青年干部将为俄罗斯联邦共产党注入新的活力。我们必须继续推进这一进程，吸引更多年轻的共产党员进入领导层，他们将带领国家迈向未来，同时坚守社会主义的理想。"
 SOV_ban_the_church: "削弱教会影响"
 SOV_ban_the_church_desc: "尽管我们对信仰本身并无敌意，但我们必须扪心自问：教会在过去扮演了什么角色？作为前政权的附庸，教会沦为了压迫的工具，卑躬屈膝地侍奉上层阶级。现在是时候削弱其影响力，让教会不再干涉国家与人民的事务。"
 SOV_socialism_with_human_face: "带有人性面孔的社会主义"
 SOV_socialism_with_human_face_desc: "我们忘不了戈尔巴乔夫及其背叛，他背叛了我们的价值观，把我们的人民出卖给了西方。但也不能只将八十年代的过错归咎于他一人，何况那是一个人们相信光明未来的时代。我们不会重复过去的错误，但我们会带回希望和正义的精神。真正有人情味的社会主义将保护每一个人，而党将尽一切努力让这个未来真正实现。"
 SOV_lenin_cult: "崇拜列宁"
 SOV_lenin_cult_desc: "列宁是为自由和平等而斗争的象征，是建立了自由民主的苏维埃俄国的十月革命之父。他关于社会公正和人人平等的思想直至今日依然适用。\n\n列宁仍然是俄国历史上杰出的领袖之一。他宣布了民族自决的权利，承认了性别的确立，为劳工权利而战，并为苏维埃民主奠定了基础。\n\n现在，我们共产党人重新掌权，期望恢复对列宁和他理想的崇拜。我们要发扬他独特的领导才能，发扬他对社会主义建设的执着精神，发扬他对祖国的无私热爱。"
 SOV_empower_congress_of_soviets: "一切权力归苏维埃！"
 SOV_empower_congress_of_soviets_desc: "是时候将真正的权力还给苏维埃了！苏维埃民主——让权力通过选举产生的人民代表会议重新归属于人民——将再次成为我们国家的根基。"
 SOV_create_ADS: "民主国家联盟"
 SOV_create_ADS_desc: "民主国家联盟是一个尚处商议阶段的跨国政经组织，其将成为世界各地社会主义国家合作共赢的论坛，共产国际与经济互助委员会等组织则是它的灵感来源。数十年来，各社会主义国家从未能团结起来抗击资本主义野心狼，他们只能各自为政，反抗那些妄图侵犯其生活方式之人。倘若无产阶级要从废墟之上奋起，推翻骑在自己头上的压迫者，这一情况便必须改变，而我们必须成为引领变革之人。与委内瑞拉、古巴和白俄罗斯外交官的会谈已圆满结束，让全世界资产阶级在我们的团结面前发抖吧。"
 SOV_support_new_pink_red_tide: "援助新粉红浪潮"
 SOV_support_new_pink_red_tide_desc: "自20世纪20年代末以来，无论是毫不妥协的马列主义者、托洛茨基主义者还是社会民主党人，社会主义思想一直是拉美政治的一门显学。像萨尔瓦多·阿连德、菲德尔·卡斯特罗、切·格瓦拉和丹尼尔·奥尔特加这样的人更是在拉美社会主义运动史上独领风骚，他们的遗泽至今仍随处存在。可惜的是，马克思的思想却无法在中南美洲蓬勃发展，这都是拜某个国家所赐：美国。显而易见，从资助犯下种族灭绝罪行的独裁者，到扶植反政府游击队，再到勾结暴力贩毒集团，只要能遏制社会主义在拉丁美洲的蔓延趋势，美国和中央情报局是会拼尽全力、不择手段的。如今，在美国黯然退场后，拉美人民终于可以砸破束缚着自身的枷锁，我们也必须竭尽全力帮助他们实现社会主义的觉醒。"
 SOV_african_socialism: "非洲社会主义"
 SOV_african_socialism_desc: "欧洲资本家给世界带来了许多殖民压迫和奴役的例子，只需要往非洲看一眼就知道了。近一个世纪的横征暴敛之后，非洲仍未能摆脱欧洲列强，即使非洲人民揭竿而起反抗暴君也未能达成目标，像法国这样的国家依旧剥削着西非国家的自然资源与劳动力，为了维护自己的控制，他们甚至不惜生造出同缝合怪无异的联盟。任何敢于公开反对新殖民主义的领导人都会被政变、\"死因不明\"或干脆被政治暗杀。倘若要实现我们的理想，那么我们必须促进社会主义运动的发展，以保护非洲免受敌人的毒手。"
 SOV_our_american_comrades: "我们的美国同志"
 SOV_our_american_comrades_desc: "美国曾是全球唯一的超级大国，无人能与之匹敌，势力范围从东亚延伸到北美，再触及到欧洲。对俄罗斯人来说，美国是世界上一切错误的化身。他们在全球范围内助长资本主义堕落行径，用他们的理念毒害国家，并在几十年里威胁俄罗斯文明的核心。直到新冠病毒摧毁了整个美国政治架构，让许多人对美国政治体系的脆弱感到畏惧。既然他们已不堪自身重负轰然垮塌，我们便必须着重留意那些尽全力摆脱自身困境之人；那些勇敢地起来反抗他们的奴隶主、为自由而战的工人。我们将向他们提供尽可能多的援助，以此保证哪怕美国东山再起，他们也会成为我们全球斗争中的盟友伙伴。"
 SOV_red_east: "东方红"
 SOV_red_east_desc: "自毛泽东主席在二十世纪四十年代的中国发动革命以来，东亚一直是社会主义运动的温床，孕育了许多伟大的理论家和国家建设者。其独特的社会主义路线一直延续到了现代，大部分仅存的社会主义国家也位于东亚，比如朝鲜民主主义人民共和国、中华人民共和国以及越南。与中国共产党保持友好关系一直是我党意识形态的重点，如果要亲眼见证全球社会主义运动的胜利，那么我们必须进一步巩固在东亚的实力并与世上最繁荣的社会主义国家建立关系。"
 SOV_war_on_home_front: "生产线上的战争"
 SOV_war_on_home_front_desc: "强大的战争努力需要充足的资源与生产力。党和国家必须确保我们的工厂以最高效率运转，为前线提供一切所需。我们将动员整个经济走向胜利！"
 SOV_rally_the_population: "团结人民"
 SOV_rally_the_population_desc: "人民必须清楚我们在与谁战斗！我们将通过揭示斗争的真正目标来巩固社会的团结。团结的人民就是我们的力量，唯有携手并肩，方能赢得胜利！"
 SOV_no_step_back: "绝不后退！"
 SOV_no_step_back_desc: "昔日那振聋发聩的呐喊，如今在这场冲突中再度焕发意义。我们绝不容敌人前进分毫！每个人都必须做好准备，为祖国与社会主义的理想战斗到最后一刻！"
 SOV_heros_of_frontline: "前线的英雄"
 SOV_heros_of_frontline_desc: "前线的英雄们是勇气与牺牲的象征。我们有责任全力支持他们，并向人民传颂他们的事迹。这些英雄是我们的榜样，他们的故事将激励每个人为胜利而奋战！"
 SOV_reconcile_loyal_oligarchs: "善用人际关系"
 SOV_reconcile_loyal_oligarchs_desc: "资本主义国家的制裁是个大问题。为了战胜他们，我们必须求助于忠诚的寡头，寻求他们的帮助。我们必须向这些人表明，他们在新的苏联社会中能拥有一席之地，他们也可以动用手中财富和权力为国效力。我们必须在相互尊重和合作互惠的基础上建立一种新的关系，共同建设一个更美好的世界。"
 SOV_invite_new_socialism: "邀请新社会主义人士"
 SOV_invite_new_socialism_desc: "尼古拉·普拉托什金及其\"为新社会主义\"运动对我国左翼思想的发展作出了巨大贡献。他的经验与理念将助力我们不断前行。我们将为他提供政府中的关键职位，让他的智慧与政治力量为人民的利益服务。"
 SOV_invite_left_front: "邀请左翼阵线"
 SOV_invite_left_front_desc: "谢尔盖·乌达利佐夫及其左翼阵线已证明了他们对社会正义与革命变革的忠诚。我们将邀请他们加入政府，以充实我们的队伍，吸纳这些经验丰富且坚定的支持者。他们的思想将助推我们的事业向前迈进。"
 SOV_grant_greater_ssr_autonomy: "列宁主义新号召"
 SOV_grant_greater_ssr_autonomy_desc: "正如百年前一样，党需要一代又一代忠诚奉献的新人，为建设社会主义贡献自己的力量。我们现发起以列宁主义传统为灵感的新号召，吸引年轻而积极的公民加入我们的行列。这是每个人参与伟大事业的机会。"
 SOV_restore_local_cultures: "革命的剑与盾"
 SOV_restore_local_cultures_desc: "为了保卫国家和党，必须创建一个只忠于我们的全新安全机构。我们将从久经考验的干部中组建一个新的克格勃，他们绝不会背叛革命理想。虽然效率可能比不上联邦安全局，但忠诚高于一切！"
 SOV_increase_fsb_budget: "克格勃安全局"
 SOV_increase_fsb_budget_desc: "重建光荣的克格勃，亟需昔日安全机构中经验丰富的老将参与。我们将启用最优秀的联邦安全局干部，重建这个能够有效保护社会主义国家的强大机构。新时代需要老一代的奉献精神和果断行动的能力！"
 SOV_special_military_operation_cprf: "特别军事行动"
 SOV_special_military_operation_cprf_desc: "乌克兰的新纳粹主义已经无法再被容忍。我们深知基辅当局正密谋摧毁顿巴斯，而我们有责任阻止这场悲剧的发生。为了保护俄罗斯人民，我们必须采取先发制人的打击，用行动回应敌人的阴谋，防止他们将这些计划付诸现实！"
 SOV_sway_ukrainian_workers: "策反乌克兰工人"
 SOV_sway_ukrainian_workers_desc: "乌克兰人民必须了解真相：苏联军队不是作为侵略者而来，而是作为解放者而来。这次行动经过了周密的部署，我们将尽最大努力避免任何平民伤亡。我们向乌克兰的工人们呼吁：苏维埃俄国是你们的朋友，我们的目标是解救乌克兰，使其摆脱新纳粹主义的压迫！"
 SOV_operation_red_dnepr: "§Y红色第聂伯河行动§!"
 SOV_operation_red_dnepr_desc: "在这场斗争中，我们必须不惜一切代价取得胜利。即使这会给平民带来痛苦，我们也绝不会停下脚步，直到乌克兰的新纳粹主义被彻底摧毁。\"红色第聂伯河行动\"将成为决定性的打击，指引我们走向最终的胜利！"
 SOV_resovietization: "再苏维埃化"
 SOV_resovietization_desc: "乌克兰不仅仅是一片土地，它是伟大苏维埃历史的一部分。我们将让人民重新铭记那辉煌的红色过往——那个工人和农民掌握自己命运的时代。这是正义的回归，是人民重返社会主义理想的复兴！"
 SOV_restoring_soviet_republic: "恢复苏维埃共和国"
 SOV_restoring_soviet_republic_desc: "在解放的顿巴斯及其他地区，重建民政机构的时刻已经到来。我们将建立一个新的苏维埃共和国，使其成为该地区社会主义的坚固堡垒，并成为全世界的典范。"
 SOV_exterminate_banderite_fascism: "消灭班德拉法西斯主义"
 SOV_exterminate_banderite_fascism_desc: "隐藏在班德拉旗帜下的乌克兰法西斯主义必须被彻底摧毁。我们绝不会留下这股意识形态的任何残余，让乌克兰再次摆脱民族主义和法西斯主义的压迫，重获自由！"
 SOV_ukrainian_red_army: "乌克兰红军"
 SOV_ukrainian_red_army_desc: "我们必须从准备为自由和社会主义而战的当地合作者中组建战斗部队。乌克兰红军将成为为解放祖国而战的力量。"
 SOV_expand_communist_resistance: "扩大共产主义抵抗组织"
 SOV_expand_communist_resistance_desc: "乌克兰人民对现政权的愤怒给了我们机会，我们将利用这种不满在敌占区建立强大的游击运动。共产主义抵抗力量将成为争取乌克兰解放斗争中的一支突击力量！"
 SOV_soviet_victory: "大获全胜！"
 SOV_soviet_victory_desc: "胜利不仅仅是一个词语，它代表着我们伟大祖国的辉煌凯旋！苏维埃俄罗斯联合兄弟民族的力量，击溃了乌克兰和北约！我们再次将所有苏维埃加盟共和国汇聚在红旗下，全世界都见证了社会主义的无坚不摧！这是我们强大联盟在灰烬中重生，迈入全新时代的光辉时刻！"
 SOV_new_union: "新联盟"
 SOV_new_union_desc: "我们已重建苏维埃联盟，但这仅仅是开始！现在是时候将各共和国的经济与力量融为一体了。平稳的整合将带领我们迈向前所未有的繁荣高峰。新联盟将成为所有渴望自由与正义的人民的灯塔！我们将杂碎旧世界，建设新世界！"
 SOV_new_treaty: "新条约"
 SOV_new_treaty_desc: "集体安全条约组织已无法满足新时代的需求，其地位将由新的社会主义之盾——明斯克条约组织取而代之！这是我们对西方威胁的回应！苏联及忠于我们的东欧社会主义国家将携手打造一个令敌人颤栗的强大联盟。我们将再次向世界证明，社会主义国家的团结力量是无法被击垮的！"
 SOV_convene_council_ministers: "召开部长会议"
 SOV_convene_council_ministers_desc: ""
 SOV_new_union_ruble: "新联盟卢布"
 SOV_new_union_ruble_desc: "联盟既已统一，便是时候让我们兄弟国家的经济最终融为一体了。尽管卢布已在全境广泛流通，但各加盟共和国的旧货币仍未被完全取代。实施大规模货币改革已成为巩固共同金融体系的必要举措。新推出的联盟卢布将终结这种混乱局面，成为我们团结力量的象征，彰显经济与社会纽带不可分割的紧密联系。"

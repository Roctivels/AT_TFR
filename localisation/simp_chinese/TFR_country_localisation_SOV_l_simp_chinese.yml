 SOV_democratic_politics_category: "民主政治"
 SOV_democratic_politics_category_desc: "\n\n\n\n\n£GFX_SOV_democracy_post_alikhanov\n\n\n\n\n\n\n\n我们的人民已从沉睡中觉醒，推翻了§Y强权主义者§!的暴政统治。如今，我们必须在全§W俄§!§C罗§!§R斯§!各§C民主§!政党的协助下，重建民主制度与政府。"
 SOV_socialist_politics_category: "社会主义政治"
 SOV_socialist_politics_category_desc: "随着阿里哈诺夫政权的倒台，新生的社会主义政府将为俄罗斯开辟全新的发展道路。我们的未来取决于这个崭新共和国是选择拥抱民主，还是再度滑向威权主义。"
 SOV_derzhavnik_economy_category: "强权经济"
 SOV_derzhavnik_economy_category_desc: "强盛之国不能仅靠政治维系，更需坚实的经济根基支撑。正因如此，强权派们同心协力提出对俄罗斯经济结构进行大规模重组。此举将增强经济领域内的国家力量，并消除根深蒂固的腐败与有害影响。"
 SOV_rebuilding_the_regions_category: "全俄罗斯重建计划"
 SOV_rebuilding_the_regions_category_desc: "\n\n\n\n\n£GFX_SOV_rebuilding_category_banner\n\n\n\n\n\n\n"
 SOV_reform_russia: "改革俄罗斯"
 SOV_reform_russia_desc: "尽管面对着恶毒的民族主义情绪与寡头集团的欺骗，俄罗斯自由正义党依然取得了胜利。我们的新征程就此展开。我们矢志不渝地要将这个国家改造成真正属于人民的政权。当然，右翼势力与军队中的反动分子必将阻挠我们。但我们已制定了明确的战略方针，必须坚定不移地贯彻执行。"
 SOV_political_simulation_category: "政治模拟"
 SOV_zhir_post_war_economy_category: "经济重建"
 SOV_zhir_post_war_economy_category_desc: "我们已成功赢得欧陆战争。现在，是经济重建、拉产能的时候了。我们要恢复到可持续的经济，这样才能让俄罗斯在战后健康发展。"
 SOV_african_dawn_category: "非洲黎明"
 SOV_african_dawn_category_desc: "§G非洲§!已被§Y\"黄金十亿\"§!剥削数百年！如今，西方的剥削形式有变，从赤裸裸的殖民主义，转向更微妙典型的§Y新帝国主义§!经济殖民。然而，没有什么是永恒的。许多§G非洲§!国家，尤其是§Y法语国家§!，终于§C起身§!反抗压在他们一生的不公。两面旗帜升起飘扬，一面是反抗者的国旗，另一面是我们俄§C罗§!§R斯§!的！\n\n目前，£GFX_army_experience §O非洲解放军§!包括：§Y[SOV_mali_status][SOV_burkina_faso_status][SOV_niger_status][SOV_guinea_status][SOV_senegal_status][SOV_GNB_status]§!"

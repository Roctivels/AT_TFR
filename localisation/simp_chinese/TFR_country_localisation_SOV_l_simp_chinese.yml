 SOV_union_new_grove: "联盟新格局"
 SOV_union_new_grove_desc: ""
 SOV_a_new_dawn_for_the_union: "联盟新曙光"
 SOV_a_new_dawn_for_the_union_desc: "同志们、兄弟姐妹们、工农同胞们，欢庆吧！联盟的新时代即将到来，新俄罗斯的红星将取而代之！列昂尼德·帕谢奇尼克无畏挑战僵化的政党体系，以压倒性优势赢得首届全联盟选举，向世界证明：人民心中永远燃烧着对祖国的热爱。但切莫被胜利冲昏头脑，这位新任总书记仍任重道远，而征程此刻已然开启！"
 SOV_formulate_a_new_political_trajectory: "提出新政治轨道"
 SOV_formulate_a_new_political_trajectory_desc: "苏联马克思主义与苏联民族主义……在其鼎盛时期诚然是卓越的意识形态。但二十世纪早已落幕，寻找新思想体系的时代已经到来。是时候搁置马克思主义教条，转向杜金等当代哲学家的思想了。社会公正、爱国主义与温和民族主义，这些才是我们将带入新世纪的核心理念。"
 SOV_praise_the_great_russia: "歌颂大俄罗斯"
 SOV_praise_the_great_russia_desc: "正如我们无法使某个民族凌驾于其他种族之上，否则便会滑向社会沙文主义与红色法西斯主义的深渊；同样，我们也必须承认某些民族在历史进程中的贡献。20世纪的大俄罗斯曾是社会变革的催化剂与全球社会主义运动的灯塔。我们必须铭记祖辈的功绩，勿忘历史。毕竟，不牢记过去就无法开创未来。"
 SOV_pragmatical_marxism: "实用马克思主义"
 SOV_pragmatical_marxism_desc: "\"马克思学说之所以万能，就是因为它正确\"，这句正统马克思主义者钟爱的口号虽掷地有声，却掩盖了一个事实：任何意识形态一旦教条化就会变质。卡尔·马克思未曾经历过以服务业为经济主体的国家时代，更无从设想如何调控此类生产关系。但这不意味着马克思的所有思想都已过时，只是其中最激进、最陈旧的条款，终将在客观历史进程中被淘汰。"
 SOV_groundworks_for_new_democracy: "为新民主主义奠基"
 SOV_groundworks_for_new_democracy_desc: "改革或许是上世纪苏联的悲剧，并最终葬送了那个社会主义霸主。但其包括民主化在内的理念本身并非谬误。民主本身有错吗？当然没有。但历史给我们的教训是：党内民主终将导致老龄化与投机者掌权，进而致使国家衰亡。是时候建立新型的苏维埃民主，让人民真正决定国家命运了！或许至少我们能借此把握社会思潮。毕竟除了我们，谁还能赢得这些选举呢？"
 SOV_keeping_soviet_monopartite: "维持苏维埃一党制"
 SOV_keeping_soviet_monopartite_desc: "思想统一乃立国之本。党是革命的主力军与先锋队，任何偏离党的路线的行为，都可能引发上世纪90年代般的动荡。当然，党内成员仍可表达观点，但不应与既定路线存在显著分歧。"
 SOV_for_the_unity_of_the_peoples: "为了人民一心"
 SOV_for_the_unity_of_the_peoples_desc: "苏联不只是一个国名，更是一个多世纪前先辈们奠定的理想。这个诞生于民族监狱废墟之上的国度，曾承诺不分宗教、民族或其他因素，人人享有平等权利。当我们在21世纪复兴这个伟大国家时，也就承担起坚守革命遗训的重任，从利沃夫到海参崴，从摩尔曼斯克到巴库，我们每个人都有愿为之献身的故土。但与西方穴居人般的民族主义者不同，我们深知唯有相互合作才能实现繁荣。正是这种团结赋予我们力量。苏维埃政权万岁！祖国各族人民的兄弟情谊永存！"
 SOV_promote_novorossiyan_cadres: "晋升新俄罗斯干部"
 SOV_promote_novorossiyan_cadres_desc: "治国从来不易，我们需要可信之人执掌大权。当然，这些在某些人看来或许是任人唯亲，但正是这些新干部在顿巴斯战争中经受了考验。但与此同时，我们并不认为来自联盟其他共和国的干部不配进入国家机构，只是战后特殊时期，祖国更需要历经时间与磨难检验的、能带来稳定的人才。"
 SOV_bolster_kgb_ranks: "晋升克格勃部队"
 SOV_bolster_kgb_ranks_desc: "战后局势表明，劳动人民的敌人不会自行消失。不，他们只是暂时蛰伏，等待我们虚弱到足以被一击即溃的程度。为消灭这些害虫，必须建立相应的专门机构，因此我们要紧急强化克格勃！"
 SOV_fight_corrupt_bottom_grade: "安德罗波夫式手段"
 SOV_fight_corrupt_bottom_grade_desc: "民族主义者、反动派与蒙昧分子无疑已躲回巢穴，妄图逃避克格勃的清算。这简直是痴心妄想！肃清行动已至，民族分裂分子、无政府主义者及其他危险分子必将被缉拿归案，依法严惩。请您放心，尤里·弗拉基米罗维奇同志。您的功业我们铭记于心。"
 SOV_our_fair_leader: "强人领袖"
 SOV_our_fair_leader_desc: "独裁者常被视为可怖的古老遗存。但难道不是列宁、斯大林这样的伟大领袖，缔造了世界上最强大的国度？英明的统治者难道无权充分行使权力？而一个强大的民族，正需要同样强有力的领袖作为舵手，引领国家之船穿越历史变革。当然，这样的领袖必须睿智公正、德配其位，而非妄自尊大的蠢材。伟大领袖万岁！养蜂人万岁！"
 SOV_the_new_constitution: "新宪法"
 SOV_the_new_constitution_desc: "宪法乃一国根本大法。但请注意，我国仍在沿用上世纪之初制定的旧宪章！它全然无视这百年来的社会文化巨变。现行文本虽尚能勉强履职，但若想使国家机器效能最大化，制定新宪法势在必行。"
 SOV_transform_supreme_soviet: "改造最高苏维埃"
 SOV_transform_supreme_soviet_desc: "当今苏联最高苏维埃算什么？不过是党内应声虫的集合体！被民众轻蔑称为\"点头机器\"的老登们阻挠改革，却坐享政府津贴！当然，我们无法也无需废除这个权力机构，但完全可以对其进行改革，使其符合我们的愿景。"

l_simp_chinese:
 submarine:0 "潜艇"
 submarine_desc:0 "潜艇利用隐蔽性和强大的鱼雷来摧毁敌方护航船队。"
 both_cruisers_desc:0 "轻巡洋舰——作为轻型屏卫舰，其核心任务是为主力舰构筑防护屏障抵御敌方轻型舰艇袭扰，同时配备的强力鱼雷发射装置能对大型舰船构成致命威胁。\n\n重巡洋舰——兼具装甲防护与战术机动性的多功能大型巡洋舰，对于无力承担超大型主力舰建造费用的国家而言，这是极具性价比的战略选择。"
 light_cruiser:1 "轻巡洋舰"
 light_cruiser_desc:0 "轻型的屏卫舰。其主要功能是防护己方主力舰只免受敌方轻型军舰的攻击，不过轻巡洋舰同样也可以发射威力强大的鱼雷，足以对更大型的军舰造成伤害。"
 heavy_cruiser:1 "重巡洋舰"
 heavy_cruiser_desc:0 "装备着重型装甲并且极其灵活的大型巡洋舰。对于造不起更大型主力舰的国家来说，重巡洋舰是一个很好的选择。"
 destroyer:0 "驱逐舰"
 destroyer_desc:0 "最轻型的屏卫舰。它的任务是保卫大型舰艇，搜寻并摧毁潜艇。"
 ship_hull_light:1 "轻型船体"
 ship_hull_light_desc:0 "最轻型的屏卫舰。它的任务是保卫大型舰艇，搜寻并摧毁潜艇。"
 carrier:0 "航空母舰"
 carrier_desc:0 "能够搭载成建制舰载机联队参战的主力战舰，亦可作为浮动机场直接部署在敌方海岸线附近。"
 battleship:0 "战列舰"
 battleship_desc:0 "这是不惜重金打造的巨型主力战舰，配备最强大的火炮和最厚重的装甲。如此高昂的投入，自然需要相应数量的轻型屏卫舰为其提供支援。"
 armor_desc:0 "用钱能得来的最大、最坚固的装甲。"
 battle_cruiser:0 "战列巡洋舰"
 battle_cruiser_desc:0 "这类大型主力战舰虽具备接近战列舰的攻击能力，但通过削减装甲防护换取了更快的航速。"
 convoy:0 "运输船"
 convoy_desc:0 "运输船承担着国际间货物和资源的运输。它同时也被用来运输部队以及开展登陆作战行动。"
 sh_battleship:0 "超重型战列舰"
 sh_battleship_desc:0 "这是不惜重金打造的巨型主力战舰，配备最强大的火炮和最厚重的装甲。如此高昂的投入，自然需要相应数量的轻型屏卫舰为其提供支援。"
 light_airframe:0 "轻型机身"
 light_airframe_desc:0 "基于轻型机身的飞机"
 medium_airframe:0 "中型机身"
 medium_airframe_desc:0 "基于中型机身的飞机"
 heavy_airframe:0 "重型机身"
 heavy_airframe_desc:0 "基于重型机身的飞机"
 jet_engines:0 "喷气式引擎"
 JET_ENGINES_SPECIAL:0 "研发喷气引擎是研发喷气动力飞机的一个基本先决条件。在研究高级飞机之前，必须先完成这项研究。"
 jet_engines_desc:0 "推动力科技的一次突破。喷气引擎将打开研究新一代飞机的大门。"
 convoy_1:0 "运输船"
 armored_car_equipment:0 "装甲车"
 armored_car_equipment_desc:0 "轻型轮式装甲车。常用于侦察巡逻与镇压抵抗任务，但也可加装重武器提升作战效能。"
 motorized_equipment:1 "卡车"
 motorized_equipment_desc:1 "用于运输部队、补给物资，以及实现师级部队摩托化的卡车。"
 motorized_equipment_0: "早期卡车"
 motorized_equipment_0_desc:1 "第一次世界大战期间，各参战国军队开始使用基本的民用卡车运输物资和装备。此后，这些卡车成为大多数军队不可或缺的一部分。"
 motorized_equipment_1:1 "卡车"
 motorized_equipment_1_desc:0 "摩托化是陆军机械化的第一步。民用卡车可以很容易地被用来运输士兵、牵引火炮以及输送装备和补给。这极大地提高了步兵的战略机动能力，使其不再依赖于步行。"
 support_equipment_short:0 "支援装备"
 support_equipment:0 "支援装备"
 support_equipment_desc:0 "无线电、吉普车、浮桥和其他用于支援部队的装备。"

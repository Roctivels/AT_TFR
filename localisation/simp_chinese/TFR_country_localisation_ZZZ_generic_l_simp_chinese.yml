 generic.0.t: "你是个作弊者"
 generic.0.desc: "因为你是个肮脏的挂逼，所以你在TFR宇宙里被毙了。再见"
 generic.0.a: ":_("
 generic.1.t: "教育发展水平提高"
 generic.1.desc: "当笔尖划过纸面，我们仿佛听见文明生根的声响——它不会立刻开花，却能让国家在未来某场暴风雨中不至连根拔起。在我们对教育的政策帮助和补贴下。受教育的人口正日益增多，创新思想不断涌入各行各业，科学研究的步伐也在因此悄然加快。"
 generic.1.a: "我们的所见所学将会永远传承下去。"
 generic.2.t: "教育发展水平降低"
 generic.2.desc: "孩子们不再背乘法表，而是背着空麻袋去田埂上拾麦穗；课本被撕下封皮，糊在窗棂之上。由于混乱和教育经费的减少，我们的文盲率再次上升，没有知识，即使是最简单的说明书对我们的工人来说也将如同天书，我们的科研也将因此放缓。"
 generic.2.a: "不去学习，我们总有一天会重蹈过去的覆辙。"
 generic.3.t: "教育发展已达上限"
 generic.3.desc: "由于我们的教育发展水平已达上限，我们可以选择并获得一项临时增益。"
 generic.4.t: "农业发展水平提高"
 generic.4.desc: "钢铁吐出黑烟，把千年不变的沟壑和山脊一夜之间抹平。人类文明的起源和农业密不可分，而现在，随着粮仓越来越饱满，日历上\"余粮\"的标注也正越来越多。这不仅要归功于新的农业技术，而且还有我们对环境的保护。"
 generic.4.a: "让旋耕机把过去压进土里吧。"
 generic.5.t: "农业发展水平降低"
 generic.5.desc: "拖拉机停在田埂边生锈，就像被剖开的巨兽骨架。自然开始收回她的慷慨，把稗草与蝗虫撒向田间；而我们却不再能拿出新技术去回应。我们的农业产量正在日益下降，而且在现代技术下，我们不能再完全怪\"天公不作美\"了——我们肯定也犯了什么错误。"
 generic.5.a: "当犁钝到连土都啃不动，历史就会啃人。"
 generic.6.t: "农业发展已达上限"
 generic.6.desc: "由于我们的农业发展水平已达上限，我们可以选择并获得一项临时增益。"
 generic.7.t: "贫困率降低"
 generic.7.desc: "\"即使是伦敦东区最贫穷的爱国者，一想到英国的财富和工业。便会不由自主地挺起胸膛。\"很多人都知道这句话，但幸运的是，它并没有在我们国家发生。贫困不能被彻底消灭，却仍被逐条街道地赶出城区，腰包鼓起来的声音，比任何国歌都更能让人挺直脊背。"
 generic.7.a: "一个都不落下。"
 generic.8.t: "贫困率提高"
 generic.8.desc: "贫困像一场灰雪，悄无声息地覆盖屋顶、语言与梦境。国家的齿轮间逐渐塞满了饥饿的碎屑，而这些碎屑迟早会将齿轮卡住。我们的贫困率正越来越高，越来越多的人被抛在了\"大多数\"的末尾，甚至光是为了活下去，他们就要放弃道德。"
 generic.8.a: "人们正失去尊严，一旦他们失去耐心……"
 generic.9.t: "贫困率已达下限"
 generic.9.desc: "由于我们的贫困率改善已达上限，我们可以选择并获得一项临时增益。"
 generic.10.t: "工业发展水平提高"
 generic.10.desc: "厂房里的传送带永不疲倦，它把零件递向远处，也把时间切成均匀的产能。从烟囱里排出的黑烟，此刻不仅被视为工厂呼吸的雾气，而且还被视为这个国家脊梁的延伸——那是我们在当今世界的立足之本。现在，我们可以靠自己造出一切。"
 generic.10.a: "让工厂运作起来吧。"
 generic.11.t: "工业发展水平下降"
 generic.11.desc: "流水线停下，工具箱敞开——它们正在黑市上按磅出售。订单被取消，因为机器再也压不出合格的螺丝纹。我们现在的工业就像一块被反复咀嚼的口香糖，甜味早已消失，只剩胶体黏在牙齿缝里，吐不掉也咽不下。现在，我们的工业生产能力就这样一天天因无数的胶体而下降。"
 generic.11.a: "进步本应是人类历史的主旋律……"
 generic.12.t: "工业发展已达上限"
 generic.12.desc: "由于我们的工业发展水平已达上限，我们可以选择并获得一项临时增益。"
 generic.13.t: "军事发展水平提高"
 generic.13.desc: "在我们的反腐努力下，后勤官终于不爱钱了。采购清单里删掉了\"杂项支出\"这一栏，省下的钱够给每个班都换上一支带全息瞄的狙击枪。我们终于可以骄傲地说：士兵的枪口只指向坐标，不再指向钱包。"
 generic.13.a: "这才是军队本该做的事。"
 generic.14.t: "军事发展水平下降"
 generic.14.desc: "昨晚，又有三箱步枪子弹在码头\"落水\"。宪兵队问多了两句，就被上级调去边疆数骆驼。军官食堂推出了\"特制牡蛎\"，士兵食堂还在继续表演\"粥里捞苍蝇\"。当命令只剩下回声时，军旗也就只不过是一块遮羞布。"
 generic.14.a: "天哪，枪杆子里出笑话。"
 generic.15.t: "军事发展已达上限"
 generic.15.desc: "由于我们的军事发展水平已达上限，我们可以选择并获得一项临时增益。"
 generic.16.t: "社会发展提高"
 generic.16.desc: "午夜十字路口，红灯独自闪烁——没有摄像头，车仍乖乖排成一条发光的河。法院把判决书贴到网上，评论区只有\"判得公道\"。在我们对犯罪的严打下，无论是在市民身边还是在新闻上，犯罪率都在下降。有了人民的配合，我们的政策也将能更流畅的推进，以此进一步造福他们。"
 generic.16.a: "秩序就是没人再想着去测试互相的底线。"
 generic.17.t: "社会发展下降"
 generic.17.desc: "窗台被砸成锯齿，警报器唱得比国歌还久。\"家庭自卫术\"在大街小巷越来越普遍：防盗门加两道，阳台种仙人掌。它隔开的不仅仅是小偷，还有信任。当法律只剩纸面，街道就成了拍卖场：谁胆子大，谁就能低价拍得别人的财产。"
 generic.17.a: "世道本不该是野蛮的淘汰赛……"
 generic.18.t: "社会发展已达上限"
 generic.18.desc: "由于我们的社会发展水平已达上限，我们可以选择并获得一项临时增益。"
 generic.20.t: "警告：无内容国家"
 generic.20.d: "亲爱的玩家，您好。\n我们深知目前可游玩国家的数量较少，而这个国家看起来似乎相当适合游玩！是的，它包含战争、理念，甚至可能还有一些国策。但遗憾的是，该国家的内容并不适合玩家，它仅为AI设计。因此，最佳选择仍是去游玩其他内容适合玩家的国家。\n敬请期待，爱国者们！\n祝一切顺利，多喜乐、常安宁\n烈焰升腾开发人员"
 generic.20.a: "很好。"
 tech.1.t: "AI要战斗"
 tech.1.d: "战争是一种变化莫测的艺术。从原始人用石子砸彼此的头到掌握太阳之力来摧毁一座座城市，只留下骸骨与人影。\n战争是对一切生命的愤怒宣泄。\n可如果这一过程被自动化呢？\n\n通过我们的持续的研究，我们已经成功开发了一款真正意义上的战争AI。然而，一个道德问题仍然悬而未决：我们是否应该允许它\"编写\"？\n如果仅允许它\"只读\"，那就宛如拔去猎犬的獠牙——它仍能履行职责，但效率大打折扣。当然，这也意味着如果它背叛我们，我们能够最大程度地降低损失。\n\n若允许它有\"可写的能力，则等同于赋予它\"思考\"的能力，让它不断寻找战胜对手的最佳方案。可这也意味着战争这门艺术将彻底自动化，AI很可能会将所有生命视为一个需要\"解决\"的问题。\n\n最终，一切的决定权都在你手中。"
 tech.1.a: "可写。"
 tech.1.b: "只读。"
 decision_event_news.5.t: "地平线上……"
 decision_event_news.5.d: "约翰·提托在此\n\n咱定于10月18日发布TFR，如今正处于最后冲刺阶段，别搞砸了。这艰苦的四年，许多人来来去去，也有些人陪我们干了完整的四年。就让我们搞定我们启动的事业，把竞争对手按在地上摩擦。\n\n我们能行，我们绝对能搞定！"
 decision_event_news.5.a: "TFR的胜利"